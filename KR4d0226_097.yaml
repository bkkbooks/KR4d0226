body:
  text: 行狀觀文殿學士大中大夫知建康軍府事兼管內勸農使充江南東路安撫使馬步軍都總管營田使兼行宫留守彭城郡開國侯食邑一千六百户食實封二百户賜紫金魚袋贈光祿大夫劉公行狀代平父作本貫建寧府崇安縣開耀鄉五夫里曽祖民先故任承事郎纍贈太子太保妣黃氏彭城郡夫人祖韐故任資政殿學士銀青光祿大夫諡忠顯纍贈太師妣李氏秦國夫人繼吕氏韓國夫人父子羽故任右朝議大夫充徽猷閣待制纍贈少傅妣熊氏福國夫人繼卓氏慶國夫人公諱珙字共父其先蓋長安人唐末避地入閩遂為建人六世至忠顯公仕始通貴靖康中守真定有功京城失守虜人得之欲以為將相義不辱而死少傅公紹興初佐川陜宣撫使軍事保障梁益為中興名臣公其長子也生有竒質英晤絶人少長從季父屏山先生受書知刻苦自厲屬文敏有思致一時鄉先生皆歎以為不可及始以忠顯公死節恩輔承務郎舉進士一上中紹興十二年乙科調監紹興府都稅務請監潭州南嶽廟以歸杜門讀經史書討論繤述益務其逺且大者秩滿差主管西外敦宗院未赴遭外艱既禫而韓國夫人薨持重終喪除諸王宫大小學教授權祕書省校勘書籍官禮部郎官中書舍人時秦丞相當國用事一日微示風旨欲為其父作諡以公不亟奉行也怒風言者論去之踰年秦丞相死乃得主管台州崇道觀召為大宗正丞未就職改祕書丞兼權吏部郎官即真尋除監察御史避薦者復還故官公前在銓曹時苦吏為姦思有以制之一日命張幕設案於庭置令式其中使選集者得出入翻閲與吏辨吏無得藏其巧人甚便之間攝侍郎引選人改官班占對詳敏天子恱焉且聞其能檢柅吏姦故因其引嫌復委以選事兼權祕書少監遷起居舍人兼權中書舍人會金虜渝盟天子震怒將悉鋭師北向以雪讎恥復土疆一時詔檄多出公手詞氣激烈聞者感奮或至泣下御史杜莘老既擊侍醫王繼先逐之又論宦者張去為遂以忤旨左降公不草制奏留之莘老得不去從車駕視師建康兼權直學士院既而車駕將還臨安江淮軍務未有所付張忠獻公方典留鑰衆望屬之而詔乃以楊存中為宣撫使中外大失望公不書録黃奏論其不可上怒顧宰相曰劉珙之父為張浚所知其為此奏意專為浚地耳宰相召公喻旨且曰再繳纍且及張公公曰珙為國家計故不暇為張公謀若為張公謀則不為是以纍之矣命再下執奏如初存中命乃寢未幾真除中書舍人直學士院召入草制立建王為皇太子今上皇帝既即位詔公偕禮部尚書使金國是時南北甫罷兵始為鈞敵之禮虜意不可測公受命慷慨不復問家事入辭母夫人戒家人悉裘葛兼副以行曰藉令不死歸未可期也副使某者以選置官屬不公抵罪上以公辟召無所私手札褒諭之尋以議禮不決未出疆而還然公于是時固以其死許國矣在掖垣凡三年事有不便者知無不言嘗有詔問足食足兵之䇿公以擇將帥核軍實為對甚悉會有太白經天旱暵飛蝗之變詔復問近臣闕政公又奏曰太白兵象也旱蝗盩氣也今仇虜窺覦哆然未厭而國家因仍縱弛有賞無罰諸將專事刻剝以媚權幸取官爵士卒怨之有甚於仇敵者且輿土未復地狹民貧而費用日滋征求日廣為監司者不恤郡為郡者不恤縣為縣者不恤民至或重為貪虐以肆其心則百姓之苦於官吏亦不異於士卒之仇將帥也然則天人相與之際夫豈偶然而巳哉欲救其失唯當信賞必罰以肅將帥之心痛懲刻剝以固士卒之志節浮冗練軍實精擇郡守誅鉏贓吏以厚吾民之生而是數者之得失則又係乎人主之心誠與不誠耳陛下審能擴恭儉日新之德屏馳騁無益之戲登崇俊良斥逺邪佞常使日用之間有以養吾之誠而無害焉則夫數者固將有所依以立而災異之變庶乎其可銷矣間又嘗為上言應敵無一定之謀而強國有不易之䇿今曰和曰戰曰守者皆應敵之計因事制宜不可膠於一説者也若夫不易之䇿則必講明自治之術博詢救弊之原母事虛文專責實效使政事修舉國勢日強然後三者之權在我唯所用之無不如志今議者自紛紛于末流而于其本末有言者臣竊為陛下憂之上皆納焉故將田師中死其家請以沒入王繼先園第為賜詔許之公以師中久竊兵柄無尺寸功貪叨刻剝為國家斂士卒之怨不當豫方為繳奏以聞而其家復以請公以録黃稽程𬒳詰亟奏俟罪而持之愈力於是乃不果賜有迪功郎李珂者以關通近習得輔官而自奏求為督府椽詔除巳下公奏曰珂名品至卑不繇召見敢以劄子非分祈恩非所以嚴堂陛之勢杜邪抂之門也且今邊陲大計方倚督府為重官屬尤當審擇如珂小人非惟不堪此選政恐或能妄作以沮撓其事機也奏上改除珂樞密院編修官公論執益堅乃罷之然亦竟以數直諌不得久居中而宰相亦有隂忌公者隆興元年冬除集英殿修撰知泉州明年改衢州始至委事僚屬一無所問人以公未更治民意其懵於事或不屑為者既乃一旦悉取而自為之辨察精明區處的當羣下斂手不能有所為人始大服先是吏貟猥衆公視貟外置者悉罷之受租米輒使民自操量槩其發鈔銷簿亦皆有法人甚便之會湖南旱飢官吏不之恤而郴州宜章縣方抑民市乳香期會峻迫有李金者乘衆怒奮起為亂衆餘萬人南逾嶺徼分道犯英韶連廣德慶肇慶封梧賀州之境旁入道州桂陽軍殺掠萬計州縣不知所為至斂民間金帛賂之以免由是賊勢日盛而帥守監司更共蔽匿不以實聞賊遂犯宜章陷桂陽聲震逺近朝廷憂之以公為敷文閣待制知潭州荆湖南路安撫使是歲乾道元年也公以五月入境則賊衆巳數萬人矣公聲言發郡縣兵討擊且檄鄰道謹斥堠守隘塞聽期會而亟以實奏請下荆襄發卒奔命又度此章下或巳歷旬時失幾會則移書制置使沈介曰請母須報而亟遣以來擅興之罪吾自當之不敢以纍公也介為遣兵詔亦報如公請然皆未有至者賊勢愈盛而湘隂縣橋口鎮羣盜劉花三李無對者又竊發距城郭僅六十里人情益震公亟簡州之役兵得三百人使部將趙彥帥之合巡尉兵以行下令戕舟發梁募有生得盜者錢若干得其首者錢若干凡盜所挾贓無多少悉給捕者不數日彥等擒捕三十餘人公悉以便宜誅之梟首於市餘益走多溺死其散入墟落者又為村民縛以送府又悉誅之奏將尉有功者皆𬒳賞於是威聲大振吏士用命人心少安六月制置使所遣遊奕軍統制田寶乃以千人至居數日鄂州水軍統制楊欽又以千五百人至公知其暑行疲怠悉為發夫迎之數程之外代其任負以行軍士固巳歡呼感激及至撫勞犒賜又皆豐飫過望諸軍益喜盡死力欽故羣盜揚么部曲公知其可用檄諸軍皆受節度使率其衆鼓行而前下令境中凡軍民討捕有功者皆以率受賞其賊所誘脅能相捕斬以詣吏者亦除罪受賞有差是月晦田寶大敗李金於郴州城下追奔二十餘里殺獲甚衆七月楊欽敗賊黨田政尹寬等於桂陽鄂將谷青王翌又各以二千人至公遣扼冝章大路以分賊勢通糧道而欽連戰破賊遂入冝章八月鏖龍岡下賊兵數萬自辰至申官軍稍却欽𬒳髮大呼䇿馬橫衝之賊分為兩其前列精兵殱焉餘皆遁走進至莽山賊徒曹彥黃拱遂執李金與其腹心黃谷以降欽因窮追深入盡誅其酋豪而其支黨脅從者尚衆皆竄入山谷間公喻欽等郤兵而使人賫榜聽其自詣則皆相率聽命歲盡師還李金黃谷等數十人皆伏誅其降者公皆稱詔給據納兵復故田宅蓋以千數曹彥黃拱皆奏輔官而厚撫之既乃第録諸將功狀列上又盡得其實不以一毫有所私上嘉歎再三詔以為敷文閣直學士且賜璽書曰近世書生但務清談經綸實才蓋未之見朕以是每有東晉之憂今卿既誅羣盜而功狀詳實諸將優劣破賊先後歷歷可觀甚副朕意鄉其益勉之哉賊地既定境內正清公乃喟然歎曰吾豈樂殺人哉向者軍興令不可以不肅而今而後庶有以亮吾心矣吾豈樂殺人哉自是一意於撫摩之政且為請於朝曰今欲懲既往之失銷未形之患莫若擇守宰寬賦斂以安吾民而巳不此之圖一李金死一李金生臣恐湖南自是無寧歲也奏留鄂兵戍郴桂而益廣搜募以輔忠義親兵之缺厚其恩意嚴其紀律而時訓習焉於是湖南隱然為重鎮方地數千里外户不閉商旅野宿焉潭州故有嶽麓書院真廟特賜以敕額給田與書經亂蕪廢公一新之養士數十人延禮修士彪君居正使為之長而屬其友廣漢張侯栻敬夫時往遊焉與論大學次第以開其學者於公私義利之間聞者風動三年召還見上首論獨斷雖英主之能事然必合衆智而質之以至公然後有以合乎天理人心之正而事無不成若棄僉謀徇私見而有獨御區宇之心焉則適所以蔽其四逹之明而左右私昵之臣將有乘之以干天下之公議者矣又論稅絹退剝羡餘和糴之弊又論州郡禁軍紀律不明驕惰自恣宜遴選武臣之奮行伍習戎事者使為將副而貴遊子弟閣門國信五房出職之輩不得與焉則州郡之軍政庶乎其可修矣上然其言以為翰林學士知制誥兼侍讀間復從容言於上曰世儒多病漢高帝不恱學輕儒生臣竊獨以為高帝之聰明英偉其所不恱特腐儒之俗學耳誠使當世之士有以聖王之學告之臣知其必將竦然敬信而其功烈之所就不止於是而巳矣蓋天下之事無窮而應事之綱在我唯其移於耳目動於意氣而私欲萌焉則其綱必弛而無以應夫事物之變是以古之聖王無不學而其學也必求多聞必師古訓蓋將以明理正心而立萬事之綱也此綱既立則雖事物之來千變萬化而在我常整整而不紊矣惜乎當是之時學絶道喪未有以是告高帝者上亟稱善是歲小不登公請亟詔監司郡守先事條畫來年荒政所宜不者亦使任其無他又奏州兵營伍教戰之法甚備上由是益知公學問精深忠義慷慨可任大事十一月擢拜中大夫同知樞密院事公辭謝不獲乃就職因進言曰汪應辰陳良翰張栻學行材能皆臣所不逮而栻窮探聖微曉暢軍務曩幸破賊栻謀為多願陛下亟召用之上可其奏以次登用焉公以西府本兵柄於諸將之能否不可以不周知乃自諸管軍統制官下至禆佐日召三數人從容與語得其材用所宜輒筆識之以待選用一日上顧輔臣圖議恢復公奏曰復讎雪恥誠今日之先務然非內修政事有十年之功臣恐未易可動也同列有進而言者曰機會之來間不容髮奈何拘此曠日彌久之計且漢之高光皆起匹夫不數年而取天下又安得所謂十年修政之功哉公曰高光唯起匹夫也故以其身蹈不測之危而無所顧陛下躬受太上皇帝祖宗二百年宗社之寄其輕重之勢豈兩君比哉臣竊以為自古中興之君陛下所當法者惟周宣王而巳宣王之事見於詩者始則側身修行以格天心中則任賢使能以修政事而巳其終至於外攘戎狄以復文武之境土則其積纍之功至此自有不能巳者非一旦率然僥幸之所為也上以公言為然四年七月詔兼參知政事公方與一二同列夙夜悉心竭力益圖所以敘進人材寬養民力討理軍政務以成上意之所欲為者蓋除福建鈔鹽歲額二萬萬罷江西和糴及廣西折米鹽錢又蠲纍年逋負金錢榖帛巨億計而公尤以輔成上德振肅朝綱抑僥幸獎廉退為巳任進則盡言無隱退亦未嘗輕以詞色假人苟清議之所不與不以親故而有所私也以是近幸仄目而流俗亦多不恱公者先是潛邸使臣龍大淵曾覿者慿恃舊恩暴起富貴公論不平者纍年上一日發寤逐去之未幾而大淵死上顧憐覿欲還之公力陳其不可且曰此曹奴隸耳憐之則厚賜之可也今引以自近而賔友接之至使得以與聞機事進退人才則臣懼非所以增盛德之光華飭治朝之綱紀也上納公言為止不召殿前指揮使王琪謁告至淮上還密薦和州教授劉甄夫上諭執政召之諸公相問莫有知其所自來者公曰薦士吾徒之責可不知耶明日請曰此人名微位下陛下何自知之上以琪告公又請其所以薦上曰卿自問之公退坐堂上呼吏作頭引追之琪至公詰其故授牘使對琪恐懼不能置辭久之公乃叱使責戒勵狀而去無何楊守來言前琪過郡稱受密旨增所築新城若干尺諸公請之𥘉未嘗有是命也公既與諸公合奏請其罪罷之因奏自今聖旨不經三省密院者所下之官皆請俟奏審乃得行上欣然從之公即從密院移中外諸官府而內侍省與焉明日匆復有旨前奏審事勿行因諭諸公即如此則或須一飲食亦必奏審乃得邪公即以藝祖熏籠事對退又與諸公合奏言曰朝廷者陛下之朝廷命令者陛下之命令臣等偶得備數其間典司出納而巳非敢有所專也今方舉行舊典以正紀綱而巳出復收中外惶惑竊恐小人有因疑似微以姦言上激雷霆之怒者願陛下察之上不恱曰朕豈以小人之言而疑卿等者耶時諸公雖更進懇請而公言尤激切故獨罷公為端明殿學士在外宫觀改知隆興府江南西路安撫使公入辭猶以開廣言路講明聖學敦本節用虛巳任賢斥逺佞邪選將撫軍數事為獻上蹴然曰卿雖去國不忘忠言而材又非他人所及行召卿矣隆興承前帥刻剝之後埸務皆增新額而輸租更用方斛視省量率多斗餘公首罷之屬邑奉新有復出稅錢三十五萬有竒租六百二十八石攤配諸鄉多有視正稅且什四歲久困不能輸相率逃去田畒榛蕪所攤固不可得而失正稅又數倍公奏蠲之又除二稅合零租米暗耗免役足錢之弊人或為公憂不足公量入為出用度未嘗乏也暇日咨訪賔僚講求利病率常一二延見使得從容各盡所懷以故下情宣通舉無過事而其人之器識短長亦無所隱訟訴有久不決者取其案牘藏之旬日輒召會官屬之賢可委者合坐堂上人付一二事使平決之有司供具飲食如法至暮白所豫奪而退其大事則公先閲視默有所處然後參衆説以決焉以故多得其情無不厭服明年除資政殿學士知荆南湖北路安撫使始至條上荆襄兵少財匱之狀詔即諉公措置公因行視襄鄂兵屯並邊形勢盡得其實以聞凡圖回役使詭名虛籍之弊與夫部伍教習之法有不善者皆奏罷之先是荆南兵戍襄陽者系年不得歸父子至不相識公奏為半年畨休之法春夏三軍秋冬四軍更迭往來軍士感恱荆襄故有民兵皆農家子教朴豪勇又有土著常産自愛惜且居近邊知虜情輕戰鬪比稍墮廢公更為簡閲寬其取丁之數貧者弛其賦役隨鄉團結以七十五人為隊隊有長四隊為步部有將縣置總首都副各一人當教則郡為選官訓練巳事而罷之至于資糧械器皆為處畫各有條理撫循犒賞歲費錢一萬萬而不以一介有取於民也明年遭內艱又明年起復同知樞密院事荆襄宣撫使遣中使奉璽書即喪次宣押奏事其書曰朕以荆襄上流宿師尤重欲以軍民之寄付卿其任重矣奪情臨民國有常典况吾大臣義當體國母以家事辭王事也公六上奏辭不肯起引經據禮詞甚切至最後言曰三年通喪先王因人情而節文之三代以來未之有改至於漢儒乃有金革無避之説此固巳為先王之罪人矣然尚有可諉者則曰魯公伯禽有為為之也今以陛下威靈邊陲幸無犬吠之警臣乃欲冒金革之名以私利祿之實不亦又為漢儒之罪人乎且孝之與忠豈有二致事君事親𥘉無兩心使親喪而可奪則他日所以事君可知矣况陛下方以天下奉兩宫之歡而以衰絰不祥之人簉迹二三大臣之間殆非所以全孝治之美且使仇虜聞之亦必以為中國乏材乃至於此而敢肆其輕侮此臣所以受恩感激反覆慮思而卒不敢起也抑陛下之詔臣則有曰義當體國者矣臣其敢噤無一言以塞明詔哉乃手疏别奏以聞其略曰天下之事有其實而不露其形者無所為而不成無其實而先示其形者無所為而不敗今德未加修賢不得用賦斂日重民不聊生將帥方割士卒以事苞苴士卒方飢寒窮苦而生怨謗凡吾所以自治而為恢復之實者大抵闊略如此而乃外招歸正之人內移禁衛之卒規算未立手足先露其勢適足以速禍而致冦臣不知為此議者將何以待之也且荆襄四支也朝廷腹心元氣也誠使朝廷設施得冝元氣充實則犂庭掃穴在反掌間耳何荆襄之足慮如其不然則荆襄雖得臣輩百人悉心經理顧亦何足恃哉以今而慮臣恐恢復之功未易可圖而意外立至之憂將有不可勝言者惟陛下圖之上納其言為寢前詔八年免喪乃復除知潭州安撫湖南過闕見上言曰人君能得天下之心然後可以立天下之事能循天下之理然後可以得天下之心然非至誠虛巳兼聽並觀使在我者空洞清明而無一豪物欲之蔽亦未有能循天下之理者也因引其意以傳時事言甚切至上加勞再三進職資政殿大學士以行湖南公舊鎮威惠之在人者久而愈深及是再至蓋有不待教令而孚者而公所以自律者愈嚴所以撫民者愈寬以是人愈畏服而敬愛之會安南貢馴象所過發夫一縣至二千人除道路毀屋廬數路騷動公奏曰象之用於郊祀不見於經驅而逺之則有若周公之典且使吾中國之疲民困於逺夷之野獸豈仁聖之所忍為也哉歲旱公亟遣官吏行視蠲放田租聞郴道桂陽民飢則檄轉運常平司移粟賑之且慮山谷姦民乘時竊發則又遣將益兵戍守遂以無事一旦茶鹽數千人入境疆吏以告公曰此非必死之冦緩之則散而求生急之則聚而致死乃處處揭榜喻以自新聲言大兵且至令屬州縣具數千人之食盜果散去獨餘五百許人公乃遣兵戒曰來母亟戰去母窮追母遏其塗不去者乃擊之耳於是盜之存者無幾進兵擊之盡擒以歸公獨奏誅首惡數人餘悉以隸諸軍明年盜之餘黨賴文政等復入境後帥曰此前日養冦罪也吾必盡誅之盜聞其言悉力死戰既勦湖南軍遂入江西侵擾數州官軍數敗將吏死者數十人為費以數萬計於是人乃服公為有謀也淳熙二年除知建康府江南東路安撫使行宫留守始至孔日吏有為姦利稔惡數十年者杖而黥之一郡稱快會歲水旱高下田皆不收公首奏倚閣下三等户夏稅為錢六千萬紬絹二千匹綿三千兩分遣官吏行田蠲正祖米十三萬七千八百斛雜折米又二萬八千七百斛豆草蕟茭布租稱是又奏下漕司遣吏行屬州視其所蠲租頗未盡者悉以與民又奏禁止流稅米遏糴違者劾治如法即在他路亦願得以名聞請其罪詔從之得啇人米三百萬斛貸樁管及總司錢合三萬萬遣官糴米上江又得十四萬九千斛又奏禁州縣母得督舊逋以重困飢民借常平米付墟户堤塞缺漏籍農民當賑貸者若干户十口以上一斛六口以上八斗五口以下六斗客户當賑濟者若干户五口以上五斗四口以下三斗又運米村落從本價賑糶合十餘萬斛而貸者卒亦不取償焉置局府中以通判府事趙善珏觀察推官王以寧前蘄州教授李宗思新楚州教授劉煒領之而分遣羣屬循行境中窮山僻壤無所不到公又憊心疲精廣詢博訪夙夜不少懈凡官吏奉行之不謹民間冤苦之無告幽隱纎悉無不畢聞縣給印曆親書所聞告諭獎詰絡繹於道無不切中事宜者蓋本之以誠意輔之以賞罰是以人人爭效其力如辦巳事起是年九月盡明年四月闔境數十萬人無一人捐瘠流徙者上嘉其績賜書褒喻焉公治財寬於民而急於吏二稅之入所以禁其漁取察其蠧弊者甚悉自纍鎮所施行每益加詳至是人𬒳其澤尤深凡屬縣所負課不能償者悉以丐之而禁其非法病民者至於蠲租振廪其費又數十巨萬而軍吏糧賜皆隨月遣給無不暨者𬒳旨甓城靣文以萬計者數千用錢八千萬米千五百斛而役不及民又償前帥所負內庫錢三萬上積公勞效賜手札勞獎賚以鞍馬器物甚厚府學四十年不葺弊甚公一新之以明道程公先生嘗主上元簿即學祠之且刻陳忠肅公責沈之文於壁以示學者建康大軍所屯盜賊常竄迹尺籍中吏不能禁公耳目迹捕每發輒得繩以重典盜皆相戒遁去市里晏然道無拾遺者明年進觀文殿學士五年閏月屬疾再請奉祠未報則請致仕上意公疾病亟遣中使挾侍醫以來公亦知疾不可為不復得見上矣即草遺奏千餘言首引恭顯伾文以為近習用事之戒且言今以腹心耳目寄之此曹故士大夫倚之以媒其身將帥倚之以飢其軍牧守倚之以賊其民朝綱以紊士氣以索民心以離咎皆在是願亟加屏逺以幸天下若羣臣之賢臣所知者則唯陳俊卿忠良確實可以任重致逺張栻學問醇正可以拾遺輔闕願陛下亟召用之則衆賢彚進而羣小黜伏矣既又手書屬敬夫及其故友新安朱熹仲晦父及從弟玶皆以國恩未報國恥未雪為言然後以家事為寄七月甲子疾革命取前所草奏封上之遂以是日薨于府寺之正寢享年五十有五訃聞上為震悼始從公請轉通議大夫致仕贈光祿大夫輟視朝一日詔建康府致其喪建寧府給葬事公娶吕氏兵部尚書祉之女贈新定郡夫人繼韓氏贈新興郡夫人又娶其季贈淑人皆魏國忠獻公四世孫也二男子學雅承務郎學裘承奉郎二女長適將仕郎吕欽幼未行六年二月乙巳葬于甌寧縣慈善鄉豐樂里新歷之原公所命也公為人機鑒精明議論英發遇事立斷其威不可犯而居家極孝慈事繼母慶國夫人禮敬飭備遭喪時年逾五十執禮盡哀以致毀得疾幾殆友愛諸弟晚歲彌篤歲時祭祀酌古今禮而敬以行之內外功緦之戚必素服以終月數在官為罷燕樂聞同寮有喪者亦如之福國夫人蚤薨公哀慕無以自致出疆侍祠再當得任子恩欲奏官其內弟輒不遂竟三奏然後得之所治有骨肉之訟皆召至前喻以恩意責以義理反覆詳盡至或深自引咎詞意懇切聞者悔悟感泣往往失其所爭而去遺命治喪母用浮屠法平居樂取人善不啻如巳出與張敬夫朱仲晦父遊久而益敬信之居官樂受盡言事小失中雖下吏言之無不立改以是得南豐曾撙於湖南幕府厚遇之公去撙為後帥所惡誣奏奪其官公在建康力為辨理得伸而要路有忌公者奏却之蓋其意不在撙也公不悔遇撙益厚在朝廷危言正色直前無所避其忠義奮發不以死生動其心蓋得乎家世之傳而論事之際務在審密持重不肯為僥幸嘗試之舉其侍上語每及恢復大計必以修政事固根本為先辭起復手疏盡發當時用事者大言不顧罔上誤國之姦大臣蓋不恱而上獨深察其忠其在方鎮愛民戢吏平訟獄理財用治軍旅除盜賊皆有科指而尤以敦教化厲風俗為急務蓋其生質雖高聞譽雖蚤而德成望尊尤在晚節故天子知之久而益深增秩賜金勞問狎至蓋將有意復用之也士大夫之賢者平日固多豫附其不能無私意異説者晚亦相與歸重及聞其喪無賢不肖莫不慘然相弔恨國家失此洪毅忠壯忘身憂國之臣也所臨數鎮民愛之如父母聞訃有罷市巷哭者至於諸軍將吏外暨夷狄則於公家威名義烈服習蓋久莫不想聞其風采軍士固敬愛之而虜諜者至荆襄亦每詗今劉公於延康為何屬也延康蓋忠顯公舊官云公自少即以文學知名於時及登朝廷入禁掖論思潤色當世尤稱其得體而平居未嘗輒為無用之文間有應酬之作隨輒棄去後省駁議又多削藁故今存於家者文集八卷奏議十卷內外制二十卷而巳然公之所以自立於不朽者有不在於空言也玶謹按令甲考公品秩實應誄行易名之典其姓名事迹又當得書信史以示來世故敢狀其鄒里世系歷官行事之實如右以告于太常考功并移太史氏而其事關國體軍機之重者猶弗敢盡著尋第録别上謹狀淳熙九年四月日從弟從事郎玶狀籍溪先生胡公行狀先生諱憲字原仲姓胡氏建州崇安人故侍讀南陽文定公從父兄之子也祖聳父淳皆不仕先生生而沈靜端慤不妄言笑稍長從文定公學始聞河南程氏之説尋以鄉貢入太學會元祐學有禁乃獨與鄉人白水劉君致中隂誦而竊講焉既又學易於涪陵處士譙公天授久未有得天授曰是固當然蓋心為物漬故不能有見唯學乃可明耳先生於是喟然歎曰所謂學者非克巳功夫也耶自是一意下學不求人知一旦揖諸生歸隱于故山非其道義一毫不取於人力田賣藥以奉其親文定公稱其有隱君子之操而鄉人士子慕從之遊日以益衆一時賢士大夫聞其名者亦皆注心高仰之於是從臣折公彥質范公沖朱公震劉公子羽吕公祉本中共以先生行義聞於朝詔特徴之先生以母老辭既而折公入西府又言於上促召愈急先生辭益固乃授左迪功郎添差建州州學教授先生猶不欲起郡守魏公矼為遣行義諸生入里致詔且為手書陳大義開譬甚力先生不得巳乃出拜命既就職日進諸生而告之以古人為巳之學聞者始而笑中而疑久而觀於先生所以修身所以事親所以接人無一不如所言於是翕然尊信恱服而先生猶以為未足也郡人程君元以馴行稱龔君何以廉節著皆迎致之俾參學政於是教日益孚士日益化秩滿復留者再蓋七年不徙官而太夫人年益高不樂居官舍求得監南嶽廟以歸居纍年間嘗一為福建路安撫司凖備差遣帥守大鬻鹽私販者雖銖兩必重坐先生為陳法義請寬之而帥守顧不恱先生於是有去意久之復請奉祠以歸是時秦檜用事天地閉塞幾二十年先生亦巳泊然無復當世之念及檜死羣賢稍復進用白以先生為大理司直未行改祕書省正字人謂先生必不復起而先生一辭即受雖門人弟子莫不疑之到館下纍月又默默無一言人益以為怪會次當奏事殿中而病不能朝即草疏言虜人大治汴京宫室勢必敗盟今元臣宿將惟張浚劉錡在而中外有識皆謂虜果南牧非此兩人莫能當惟陛下亟起而用之臣死不恨矣時二公皆為積毀所傷上意有未釋然者論者雖或頗以為説然未敢斥然正言之也至先生始獨極意顯言無所顧避疏入即求去諸公留之不得上亦感其言以為左宣教郎主管崇道觀使歸而食其祿於是向之疑者乃始愧歎心服而繼其説者亦益衆以故二公卒召用而先生則以病不起矣紹興三十二年四月十二日也享年七十有七明年葬於建陽縣東田里先生兩娶劉氏皆白水先生之女弟又娶嚴氏子男一人愈蚤世女一人適進士詹炳孫男親仁治進士業先生質本恬淡而培養深固平居危坐植立時然後言望之枵然如稿木之枝而即之溫然雖當倉卒不見其有疾言遽色人或犯之未嘗較也其讀書不務多為訓説獨嘗纂論語説數十家復抄取其要附以巳説與它文草藁藏于家先生所與同志唯白水先生既與俱隱又得屏山劉公彥沖先生而與之遊更相切磨以就其學而熹之先君子亦晚而定交焉既病且沒遂因以屬其子故熹於三君子之門皆嘗得供灑掃之役而其事先生為最久先生葬時親仁尚幼不克銘乃今屬熹使狀其行將以請於當世之君子熹不敢辭謹件如右以俟采擇謹狀淳熙五年七月日門人宣教郎主管台州崇道觀朱熹狀皇考左承議郎守尚書吏部貟外郎兼史館校勘纍贈通議大夫朱公行狀本貫徽州婺源縣萬年鄉松巖里曾祖振故不仕妣汪氏祖絢故不仕妣汪氏父森故贈承事郎妣程氏贈孺人公諱松字喬年以紹聖四年閠二月戊申生於邑里之居第未冠繇郡學貢京師以政和八年同上舍出身授迪功即建州政和縣尉丁外艱服除更調南劒州尤溪縣尉監泉州石并鎮紹興四年召試館職除祕書省正字循左從政郎丁內艱服除召對改左宣教郎除祕書省校書郎遷著作佐郎尚書度支貟外郎兼史館校勘歷司勳吏部兩曹兼領史職如故與修哲宗實録書成轉奉議郎以年勞轉承議郎出知饒州未上請間得主管台州崇道觀滿秩再請命下而卒紹興十三年三月二十四日辛亥也公生有俊才自為兒童時出語巳驚人少長遊學校為舉子文即清新灑落無當時陳腐卑弱之氣及去埸屋始放意為詩文其詩𥘉亦不事雕飾而天然秀發格力間暇超然有出塵之趣逺近傳誦至聞京師一時前輩以詩鳴者往往未識其靣而巳交口譽之其文汪洋放肆不見涯涘如川之方至而奔騰蹙沓渾浩流轉頃刻萬變不可名狀人亦少能及之然公未嘗以是而自喜一日喟然顧而歎曰是則昌矣如去道愈逺何則又發憤折節益取六經諸史百氏之書伏而讀之以求天下國家興亡理亂之變與夫一時君子所以應時合變先後本未之序期於有以發為論議措之事業如賈長沙陸宣公之為者既又得浦城蕭公顗子莊劒浦羅公從彥仲素而與之遊則聞龜山楊氏所傳河洛之學獨得古先聖賢不傳之遺意於是益自刻厲痛刮浮華以趨本實日誦大學中庸之書以用力於致知誠意之地自謂卞急害道因取古人佩韋之義以名其齋蚤夜其間以自警飾繇是向之所得於觀考者益有以自信而守之愈堅故嘗稱曰士之所志其分在於義利之間兩端而巳然其發甚微而其流甚逺譬之射焉失豪釐於機括之間則差尋丈於百步之外矣又嘗以謂父子主恩君臣主義是為天下之大戒無所逃於天地之間如人食息呼吸於元氣之中一息之不屬理必至於斃是以自昔聖賢立法垂訓所以維持防範於其間者未嘗一日而少忘其意豈特為目前之慮而巳哉是時宣和之季士之干世至是巳無可言者矣旋屬靖康之變中朝蕩覆公在尤溪方與同寮燕集忽有以北狩之問來諗者公聞震駭投袂而起大慟幾絶既而建炎再造王室漂搖未有所定冦賊縱橫道路梗塞固不暇於慱求幽逺以盡一世人材之用而公抱負經竒尤恥自售以求聞逹以是困於塵埃卑辱鋒鏑擾攘之中逃寄假攝以養其親十有餘年以至下從算啇之役於嶺海魚蝦無人之境則巳無復有當世意矣會詔出御史胡公世將撫喻東南公乃因謁見而説之曰古之為天下國家者必有一定之計以為子孫萬世之業末有俯仰依違苟度朝夕曾不為終歲之備而可以為國者也今日廟堂之議固必有所謂一定之計矣然未知其但欲襟慿江漢控引荆吳以保東南而巳乎抑當克復神州汛掃陵闕據中原而撫三河也蓋嘗聞之不取關中中原不可復不取荆淮東南不可保唐唯不失關中故更三亡不失舊物而吳孫氏東攻新城西攻襄漢乃所以保建業其後桓溫劉𥙿雖能以江漢舟艫西入河渭然既得之而不能守則亦僅足以保東南而巳然則天下之大勢可知巳今進既不能以六師之重通道荆襄循漢沔以赴興元結連拓跋控引五路東嚮以圖中原退又不能移蹕建康治兵訓武北爭荆淮以為固守之計而但蹙處一方費日月於道塗前不能有尺寸之利後又無所保以為安未知漂漂者竟何如耶胡公竒其言壯其䇿歸即以聞於朝而泉守資政殿學士謝公克家隨亦露章薦公學行之懿不宜滯管庫於是乃得召試而發䇿者以中興事業之難易後先為問公即對言自古謀國有得失而成功無難易蓋天下國家有至計而國勢之強弱兵力之盛衰土地之開蹙不與焉唯能順人心任賢才正綱紀則天下之事將無難之不易惟上之人惜時愛日而亟圖之反覆馳騁辨説縱橫出入古今證驗精博日未昳奏篇巳上纍數千言而文不加點高宗覽而異焉趙忠簡公方以元樞受詔西督川陜􅍮襄軍事欲奏取公為屬會太夫人屬疾不果既遂遭喪以歸而趙公卒亦不果行也再召入對時上巳用張忠獻公之䇿進次建康指授諸將計日大舉以復中原國勢亦小振矣公始進見欲堅上意以遂中興之業即奏言曰陛下以聖哲之資撫艱難之運側身焦思纍年于兹而民困兵弱虜偽侵凌戡定之勳久而未集意者陛下殆當抗聖志於高明而輔之以睿智日躋之學垂精延訪蚤夜汲汲以求宗廟社稷經逺持久之計申明紀律崇獎節義而又以民心為基本忠良為腹心則臣有以知虜偽之不足憂而恢復大功指日可冀矣因論自古中興之君唯漢之光武勤勞不怠身濟大業可以為法晉之元帝唐之肅宗志趣卑近功烈不終可以為戒反覆切至而猶慮夫計畫之間或未精審無以服衆心而成大功也則又言曰人主操大㩲以御一世必有所以處此者有以切中於理然後足以深服天下之心是以無為而不成今萬機之務決於早朝侍立逡巡之頃未有以博盡謀謨之益使其必當事理以服人心謂宜略放唐朝延英坐論之制仰稽仁祖天章給札之規延訪羣臣博求至計然後揔攬參訂以次施行則政令之出上下厭服天下之事無所為而不成矣顧又嘗病士溺於俗學而不明君臣之大義是以處於成敗之間者常有苟生自恕之心而缺於舍生取義之節將使三綱淪墜而有國家者無所恃以為安則又奏言冝鑒既往之失深以明人倫勵名節為先務而又博求魁磊骨鯁沈正不回之士置之朝廷使之平居無事正色立朝則姦萌逆節銷伏於冥冥之中一朝有緩急則奮不顧身以抗大難亦足以禦危辱凌暴之侮則庶幾乎神器尊嚴而基祚強固矣上恱其言而於光武晉唐之論尤所嘉歎明日以喻輔臣且論元帝肅宗之失而尤以元帝區區僅保江左略無規取中原之志為誚乃詔改公京秩仍典校中祕書則當是之時聖志所存亦可見矣不幸適有淮西殺將叛兵之變中外恫疑異議蜂起張公至為解相印去而國論遂變至欲盡撤兩淮之戍還建康以自衛公深以為不可因率同列拜疏言曰淮淝東南之屏蔽昔人之所百戰而必爭者今皆幸為我有而無故捐之以資敵非計之得也若彼乘吾之郤長驅以來不信宿而至江津人心一搖則建康雖有甲卒十萬亦將無所施矣且其新民纍歲安集亦既有緒今乃一朝而棄之使其老稚狼狽而南來丁壯忿憾而北去其失人心以貽後患抑又甚焉即以宿衛單寡必行今䇿則願母庸盡撤而使合肥盱眙兩戍所留各不下三萬人則亦足以固吾圉而折虜衝矣疏奏不省而劉豫果數求援於虜以乘吾隙議者方以為憂而虜反忌豫強將不可制一旦執而廢之遂不暇以我為事不然則亦殆矣自是之後廟算低回上下解弛北伐之謀日以益衰顧望中原坐失機會而明年車駕遂還臨安矣御史中丞常公同薦公恬尚有守可任大事因復召對公即抗言當今國論不過兩端喜進取之謀者既以行險妄動而及於敗為待時之説者又以玩日愒歲而至於偷二者不能相通而常墯於一偏是以成功不可見而均受其弊故臣嘗謂能自治以觀釁則是二者通為一説而無所偏廢蓋能夙夜憂勞率厲衆志則未嘗不待時而不至於偷審知彼巳必順天道則未嘗不進取而不及於敗謀人之國者誠能如是以求逞於讎敵而有不得志者臣不信也然臣竊迹近事則夫往年江上之捷日者偽劉之廢中原之釁可謂大矣而吾終未肯求所逞豈非以行險妄動為不可以不戒而於吾所以自治其國家者將益求其至歟今日之勢雖未至於危機交急亦可謂迫矣謂宜斷自聖志深思昔人愛日之義憂勞庶政無少怠忽凡事之故常非天下所以安危存亡者悉歸之有司而日與輔相大臣一心戮力明禮義正綱紀除弊政振偷俗撫循凋瘵之民淬勵士大夫而責之職業凡以求吾所以自治者然後謹察四方之釁投隙而起安受其燼以致天地之殛則雖有智者亦不知為敵謀矣𥘉劉光世守淮西御軍無法而寇至輒謀引避既正其罪而奪之兵矣尋有叛兵之變廟議反謂由罷光世使然更慰藉而寵秩之張俊守盱眙方撤戍時猶命分兵留屯而俊不受命悉衆以歸朝廷亦不能詰公於是又言陛下有為之志未嘗少衰而天下之事每每病於不立使中興之烈未有卓然可見之效臣竊不勝憂憤而深惟其故以為陛下誠能並進忠賢修明紀律懲陵夷委靡之禍革姑息苟且之政深詔大臣號令所出必務合於天下之正義而母恤匹夫徇私之怨則威令必振國勢安強雖桀驁之虜亦將斂祍而退聽尚何病於事之不立哉上亦不以為忤特命除郎兼卑史筆而常公猶以為此非所為薦論之本意再論上前言甚懇至然事巳行不及改也公至史院會方刋修蔡卞所撰哲宗實録而宣仁附傳實公所分所以辨明誣謗分别邪正者於體為尤重而公考訂精密直筆無隱論者美之其後顧亦不免頗為他官所竄易是以讀者猶有憾焉既而虜人亟遣使來請和趙公以議小不合亦罷去而秦丞相檜始顓政事遂決屈巳和戎之議矣虜使名稱既不遜而所責奉承之禮又有大可駭者於是衆心共怒軍士至洶洶欲為變夜或揭通衢指檜為虜諜都人洶懼一時忠智之士競起而爭之公亦亟與史院同舍胡公珵凌公景夏常公明范公如圭五六人者合辭抗疏言曰虜人方據中原吞噬未厭何憂何懼而一旦幡然與我和哉蓋其紐於荐食之威動輒得志而我甚易恐故常喜為和之説以侮我又慮我訓兵積粟畜鋭俟時而事有不可知者故不得不為和之説以撓我耳蓋虜人和使即秦之衡人兵家用之百勝之術也六國不悟衡人割地之無饜以亡其國今國家不悟虜使請和之得䇿其禍亦豈可勝言哉而執事者顧方以為吾為梓宫母后淵聖天屬之故遂不復顧祖宗社稷二百年付託之重而輕從之使彼得濟其不遜無稽之謀而藉躪以逞將焉避之哉昔楚漢相持之際項羽常置太公爼上而約高祖以降矣使為高祖者信其詐謀而遽為之屈則自其一身且無處所尚何太公之可還哉唯其不信不屈而日夜思所以圖楚者以故卒能蹙羽鴻溝之上使其兵疲食盡勢窮力屈而太公自歸此其計之得失亦足以觀矣其言之切如此蓋出公與諸公之意而成於胡公之手檜雖持其議不少變然虜人狂謀因是亦有不得盡逞者論者莫不壯之然自是之後邊備遂弛士氣益衰而興復之謀上下皆以為諱正墮公等所憂撓我之計檜顧自以為得上心始謀以次盡逐諸異議者公因是亦數自求引去而參知政事李莊簡公又嘗欲引以置近班以是檜尤忌之固留不許及虜使再至獨許歸我河南地公因輪對又言陛下踐艱難之運十年于兹雖有大有為之志而於天下國家所以經逺持久之計多有所未暇者今者天啓戎心畫地數千里以歸于我此雖異時之變未可以豫知意者天其以禮悔禍使陛下間於憂虞而大有為之志將有所使此萬世一時也然天下之事每病於難立者正以嚮一夫獨見之言而略衆口異同之論是以謀始太鋭而用計有未詳也願考漢廷雜議之法自今發政造事陛下既與大臣謀謨於上又令卿士大夫有忠慮者亦得以自竭于下然後揔攬羣䇿而裁處其中將舉天下之事惟陛下之所欲為而無不成矣此於前日講和之議猶欲三致意焉又念國步日艱人心未服而天子無自將之兵諸道無典戎幹方之實二三大將人擁重兵強不可令事蓋有不可知者則又數數建言宜復武舉責實用必其洞曉韜鈐長於綏御者以儲將帥之才下州郡選驍勇悉送行在以輔周衛之缺精擇帥守使搜卒乘以壯藩維之勢亦皆當世之急務久長之至計反復惓惓不能自巳其於請建大學明大倫以倡節義之風而厲苟偷之習則又平日之所深慮而每言之所謂如人食息呼吸於元氣之中一息之不屬理必至於斃焉者非若後來諸人承望風旨但以課試文墨為粉飾太平之具而巳也然而國是巳定言無所入由是公之求去愈力而檜之怒公愈甚十年春遂使言者論公獨以懷異自賢陽為辭遜為罪而出之外郡然公去未幾而虜果敗盟復奪我河南地悉其鋭師數道大入如公所謂未可豫知者於是中外大震檜亦不知所為周章回惑至於視師之奏援引乖錯而不自知聞者莫不竊笑而深憂之幸而一時將卒猶有前日柬拔䈭練之餘以故關陜順昌槖皋之師連戰大捷虜乃引退復議講解而梓宫母后始得南歸又如公等所論楚漢強弱之勢然檜遂掩巳失而冒以為功公奪主權肆然無復有所忌憚矣公固不能復為之屈遂自請為祠官屏居建溪之上日以討尋舊學為事手抄口誦不懈益虔蓋玩心於義理之微而放意於塵垢之外有以自樂淡如也舊喜賦詩屬文至是非有故不徒作乃其文氣則更為平緩而詩律亦益間肆視諸少作如出兩手矣然公自是不復起年未五十而奄至大故善人之類莫不傷之其後十餘年間檜遂顓國秉大作威福諸與公同時𬒳逐之人大者削籍投荒小亦棄置間散迄檜死敗其幸存者乃起復用或至大官而公皆巳不及見矣嗚呼熹尚忍言之哉公性至孝事太夫人左右無違友愛諸弟委曲將就有人所難能者與人交重然諾不以生死窮逹二其心撫孤甥教之學而經理其家事曲有條理人無間言接引後進教誘不怠聞人之善推借如不及至於邪佞嵬瑣簡賢附勢之流與巳異趣則鄙而逺之或不忍正視其靣至其所以施於吏治者亦皆果決明辨抑邪與正無所顧避顧熹生晚不及於聞見之詳故不得而記也晚既屬疾自知必不起而處之泰然略無憂懼之色手書告訣所善胡公憲原仲劉公勉之致中劉公子翬彥沖屬以其子而顧謂熹往受學焉其志道服膺死而後巳垂𥙿後人不使迷於所鄉者又如此云所為文有韋齋集十二卷行於世外集十卷藏於家始時吏部侍郎徐公度欲為之序略言少日多見前輩而自得從公及正平張定夫遊始得為文之法會病革不及脫藁而今序則直祕閣傳公自得之文也其論以為公詩高潔而幽逺其文溫婉而典裁至於表疏書奏又皆中於理而切事情亦為得其趣者公娶同郡祝氏封孺人贈碩人其父處士確有高行碩人性慈順孝謹佐公事太夫人於窮約中未嘗一日不得其歡心承接內外姻親下逮妾媵僮使曲有恩意後公二十七年卒一男子熹今以朝奉大夫致仕一女子嫁故瀏陽縣丞劉子翔蚤卒孫男三長孰亦蚤卒次野將仕郎次在承務郎女三其壻修職郎劉學古迪功郎黃幹進士范元𥙿曾孫男五巨鈞鑑鐸銍女九長適文林郎趙師夏餘或許嫁而未行也公卒之明年熹奉其柩葬于建寧府崇安縣五夫里之西塔山而碩人别葬建陽縣崇泰里後山鋪東寒泉塢然公所藏地勢卑濕懼非久計乃卜以慶元某年某月日奉而遷于武夷鄉上梅里寂歷山中峯僧舍之北蓋公之詩嘗有鄉關落日蒼茫外尊酒寒花寂歷中之句嗚呼此豈其讖耶不肖子熹追慕攀號無所逮及竊惟納銘幽堂具著聲烈以告萬世蓋自近古以來未之有改而公贈官通議大夫正第四品凖格又當立碑螭首龜趺其崇九尺刻辭頌美以表于神道用敢追述其平生論議行實之大者如右以請于當世立言之君子伏惟幸垂聽而擇焉謹狀慶元五年十二月日孤朝奉大夫致仕婺源縣開國男食邑三百户賜紫金魚袋熹狀延平先生李公行狀先生諱侗字願中姓李氏南劒州劒浦人曾祖諱幹屯田郎中致仕贈金紫光祿大夫妣清涼郡太夫人朱氏祖諱纁朝散大夫贈中奉大夫妣永嘉郡太君胡氏咸寧郡太君朱氏父諱渙朝奉郎贈右朝議大夫妣太恭人饒氏先生朝議公之季子也生有異稟幼而頴悟少長孝友謹篤朝議公太恭人特所鍾愛既冠遊鄉校有聲稱巳而聞郡人羅仲素先生得河洛之學於龜山楊文靖公之門遂往學焉羅公清介絶俗雖里人鮮克知之見先生從遊受業或頗非笑先生若不聞從之纍年受春秋中庸語孟之説從容潛玩有會於心盡得其所傳之奧羅公少然可亟稱許焉於是退而屏居山田結茅水竹之間謝絶世故餘四十年簞瓢屢空怡然自適中間郡將學官聞其名而招致之或遣子弟從遊受學州郡士子有以矜式焉晚以二子舉進士試吏旁郡更請迎養先生不得巳為一行自建安如鉛山訪外家兄弟於昭武過其門弟子故人于武夷潭溪之上徜徉而歸會閩帥王山汪公以書禮車乘來迎蓋將相與講所疑焉先生因往見之至之日疾作遂卒于府治之館舍是年七十有一矣隆興元年十月十有五日也汪公為遣參議官王君伯序觀察推官謝公倣護喪事躬視棺斂禮意喪具無不周悉居數日諸子畢至遂以喪歸先生娶同郡吳氏子男三人友直左修職郎信州鉛山縣尉信甫左修職郎建寧府建安縣主簿友聞未仕女一人早亡孫男四人女八人皆幼𥘉龜山先生唱道東南士之遊其門者甚衆然語其潛思力行任重詣極如羅公蓋一人而已先生既從之學講誦之餘危坐終日以驗夫喜怒哀樂未發之前氣象為如何而求所謂中者若是者蓋久之而知天下之大本真有在乎是也蓋天下之理無不由是而出既得其本則凡出於此者雖品節萬殊曲折萬變莫不該攝洞貫以次融釋而各有條理如川流脈絡之不可亂大而天地之所以高厚細而品彚之所以化育以至於經訓之微言日用之小物折之于此無一不得其衷焉由是操存益固涵養益熟精明純一觸處洞然泛應曲酬發必中節故其事親誠孝左右無違仲兄性剛多忤先生事之致誠盡敬更得其歡心焉閨門內外夷愈肅穆若無人聲而衆事自理與族姻舊故恩意篤厚久而不忘生事素薄然處之有道量入為出賔祭謹飭租賦必為鄰里先親戚或貧不能婚嫁為之經理節衣食以振助之與鄉人處食飲言笑終日油油如也年長者事之盡禮少者賤者接之各盡其道以故鄉人愛敬暴悍化服其接後學答問窮晝夜不倦隨人淺深誘之各不同而要以反身自得而可以入於聖賢之域故其言曰學問之道不在多言但默坐澄心體認天理若見雖一毫私欲之發亦退聽矣久久用力於此庶幾漸明講學始有力耳又嘗曰學者之病在於未有灑然氷解凍釋處縱有力持守不過苟免顯然悔尤而巳若此者恐未足道也又嘗曰今人之學與古人異如孔門諸子羣居終日交相切磨又得夫子為之依歸日用之間觀感而化者多矣恐於融釋而脫落處非言説所及也不然子貢何以言夫子之言􅰯與天道不可得而聞也耶嘗以黃太史之稱濂溪周夫子胸中灑落如光風霽月云者為善形容有道者氣象嘗諷誦之而顧謂學者曰存此於胸中庶幾遇事廓然而義理少進矣其語中庸曰聖門之傳是書其所以開悟後學無遺䇿矣然所謂喜怒哀樂未發謂之中者又一篇之指要也若徒記誦而巳則亦奚以為哉必也體之於身實見是理若顔子之嘆卓然見其為一物而不違乎心目之間也然後擴充而往無所不通則庶乎其可以言中庸矣其語春秋曰春秋一事各是發明一例如觀山水徙步而形勢不同不可拘以一法然所以難言者蓋以常人之心推測聖人未到聖人灑然處豈能無失耶其於語孟他經無不貫逹苟有疑問答之必極其趣然語之而不惰者或寡矣蓋嘗曰讀書者知其所言莫非吾事而即吾身以求之則凡聖賢所至而吾所未至者皆可勉而進矣若直以文字求之恱其詞義以資誦説其不為玩物喪志者幾希以故未嘗為講解文書然其辨析精微毫釐畢察嘗語問者曰講學切在深濳縝密然後氣味深長蹊徑不差若槩以理一而不察乎其分之殊此學者所以流於疑似亂真之説而不自知也其開端示人大要類此先生資稟徑特氣節豪邁而充養完粹無復圭角精純之氣逹於靣目色溫言厲神定氣和語默動靜端詳間泰自然之中若有成法平居恂恂於事若無甚可否及其酬酢事變斷以義理則有截然不可犯者早歲聞道即棄埸屋超然逺引若無意於當世然憂時論事感激動人其語治道必以明天理正人心崇節義厲廉恥為先本末備具可舉而行非特空言而已異端之學無所入於其心然一聞其説則知其詖淫邪遁之所以然者蓋辨之於錙銖眇忽之間而儒釋之邪正分矣熹先君子吏部府君亦從羅公問學與先生為同門友雅敬重焉嘗與沙縣鄧迪天啓語及先生鄧曰願中如氷壷秋月瑩徹無瑕非吾曹所及先君子深以為知言亟稱道之其後熹獲從先生遊每一去而復來則所聞必益超絶蓋其上逹不巳日新如此嗚呼若先生之道德純備學術通明求之當世殆絶倫比然不求知於世而亦未嘗輕以語人故上之人既莫之知而學者亦莫之識是以進不獲施之於時退未及傳之於後而先生方且玩其所安樂者於畎畒之中悠然不知老之將至蓋所謂依乎中庸遁世不見知而不悔者先生庶幾焉比年以來學者始益親而方伯連帥之賢者又樂聞其道而邀致之其意豈徒然哉不幸天喪斯文而先生殁矣龜山之所聞於程夫子而授之羅公者至是而不得其傳矣嗚呼痛哉諸孤方謀窀穸之事謂熹承學之久宜知先生之藴使具其事以請銘於作者將勒諸幽堂以告後世知德者有以考焉熹愚不肖蒙𬒳教育不為不久聽其言觀其行而服􅈾焉不為不詳然未能有以得其逺者大者故悉取凡聞見所及一二書之詞若繁而不敢殺者蓋有待於筆削云耳謹狀朝散郎致仕陳公行狀本貫泉州同安縣永豐鄉感化里曾祖珠故不仕祖彥嗣故不仕考禧贈右朝請郎妣吳氏封安人公諱汝揖字濟夫政和八年上舍出身輔官迪功郎建州工曹椽屬官省不行調南劒州順昌主簿秩滿正權漳州司户參軍行長泰事代為漳巖主簿丁內外憂終制升從政郎為汀州司法參軍未行改宣教郎轉奉議郎知汀州寧化縣丞追榮其考妣以承事郎孺人告第四加至今官封而公自寧化罷歸歷承議朝奉朝散郎凡十年不調晏如也年六十一以紹興二十三年三月二十六日終于家公自始屬疾即使其弟為奏上請得致仕郎未報疾革召親戚常所往來者告語屬其子而逝既尚書下公請事如章而公不起矣公在事以廉勤自約勑所至有能聲為大府部刺史所知事有他吏所不能辦者皆以諉公公為辦治日以謹力在長泰直歲不收公力為言得蠲田租什之三在漳巖尉老病不任事以公代易會民余勝蘇居羣黨攘敓為姦公悉禽取置之法民乃安朝廷嘉録其功改中都官而龍圖林公遹守南劒翰林綦公崈禮守漳州皆嘗論薦之在寧化興學校治復屋聚經子史氏羣書以教其人始寧化以武為俗民不見義至是學者彬彬焉公自是歸杜門里閈非歲時慶問未嘗出入閭巷詣公府鄉人欽愛而仕者安之公亦自適恬不以進趣干其意可謂善人君子矣而夀不遐於公猶為有憾也公兩娶黃氏皆封安人後安人左宣義郎致仕之女亦先公卒子男一人忱以公恩輔將仕郎女一人未笄熹先君子吏部府君與公同年進士也熹之來此不及拜公矣公嗣子忱將葬公於某山之原以公行事授熹序次將以求志於作者熹謝不能而其請不巳既不得辭乃取忱所論纂具著其大者如右時紹興歲次乙亥人日左迪功郎泉州同安縣主簿主管學事朱熹狀承議郎主管台州崇道觀賜緋魚袋羅公行狀公諱博文字宗約一字宗禮南劒州沙縣人曾祖安中贈中奉大夫妣太恭人鄧氏祖畸朝請郎右文殿修撰妣宜人張氏宜人陳氏父彥溫右從事郎知建州甌寧縣事贈右承議郎妣太孺人鄧氏太孺人黃氏羅氏世為豫章人唐長慶中有為沙縣尉以卒者子孫因家焉至五世孫覺始舉進士中其科再世而得右文公以懿文清德顯重於世又再世而得公復以道學行誼克世其家有聞於時然位卑數促曾不及究其用而死識者恨之蓋公幼有異質生歲始周家人示以晬盤公一無所顧獨扶服前取書之論性理者展玩久之右文公歎異為文以記其事且曰是兒當復以文學大吾門且復聞道而不為章句之習也十餘歲遭甌寧府君之喪哀毀如成人治喪葬又皆必誠信有法度用右文公奏輔將仕郎授右迪功郎福州司户參軍治倉庾謹出納盡去宿弊後皆可法再調靜江府觀察支使桂管為嶺徼以西一都會民物繁夥常時幕府巳不勝事至公為當路所知事待公決者尤多公財處從容人未嘗見其疾言遽色而事無不各得其理者時秦氏用事士大夫以牾意竄斥係踵南來道出府下者公悉善遇之至竭廪奉則鬻衣以濟其乏用薦者改右宣義郎知贑州瑞金縣事轉宣教郎始至歲歉公度民且飢則先事為備多所儲積及飢發廪賑贍事無巨細必躬臨之不以勤勞為憚其至誠惻怛雖一主於惠愛無所計惜而厝置纎密辨察精明人亦不能有以欺也邑人既賴以全而公又請推其餘以及旁縣縣故多盜公飾巡徼設方略得渠帥數人置諸法而境內帖然在官餘九月會故丞相魏國張忠獻公都督江淮雅器重公請以為幹辦公事用上嗣位覃恩轉通直郎賜五品服使募兵江西得數千人以歸和糴建康以實軍又以公與其事未幾得榖亦巨萬計張公再入相賔客例出幕府公得知和州未上而吏部侍郎玉山汪公制置全蜀奏辟公參議官以行軍府之政必以咨焉汪公既虛心好問公亦推誠啓告反復殫盡必歸於至當而後巳成都之政遂最天下公之助為多也嘗㗸命漢中勞撫將士宣撫使以禮致遺為錢三百萬公不欲受而難於辭郤還次漢州州方治貢院不能就以五十萬豫之餘悉輸成都公帑取河南程夫子之遺文與他名臣論奏纂述之可以垂世者募工鋟板用之略盡而橫渠張夫子之家避地流落貧不自振公訪得之為言汪公延置府學蜀士知所勸焉東方士大夫遊宦蜀土貧不能歸或不幸死不克葬者公皆出捐俸金以振業之賴以濟者甚衆纍遷承議郎秩滿自請奉祠得主管台州崇道觀命下而汪公亦召還公復從東至嘉州宿留與同舍會集笑語如常時一日忽語人曰吾將逝矣然幸大事巳竟可無憾也遂就寢酬酢從容了不異平日獨無一語及其私俄而遂化乾道四年四月十有三日也蓋其年五十有三矣同舍聚而哭之解其裝以理喪事則槖中獨有書數十帙餘金足以歸其喪而巳相與咨嘆以為不可及遂以柩歸其年冬十有一月葬于沙縣嚴地祖塋之旁公娶陳氏了齋先生之兄孫女先公卒子男二人曰問曰闢孫男八人女七人皆幼公資稟和粹沉靜寡欲其處巳待人一主於誠敬平居怡愈人莫見其喜愠之色聞人之善稱慕如不可及至其有過則常若有所隱避而不忍言也視人患難困乏如切其身經營周救必盡其力年未三十即屏逺聲色一榻蕭然惟樂善不倦如嗜欲聞天下之士有一言一行之幾乎道至或千里求之以是凡四方之名山勝槩多所登歷而於佛老子之學亦往往能道其所以然者或者遂意公誠篤好之而不知公之所志與其所學有不在是也蓋嘗從張忠獻公問行己之大方張公為手書所為敬説一通以授焉公受而行之終身不懈又從同郡李願中先生遊聞河洛所傳之要多所發明於是喟然而嘆曰儒佛之異亡他公與私之間耳由此沛然自信其守益堅在桂州時汪公蓋方通判州事知公所為日就公語且亟稱道其為人故卒引以自助而今刑部貟外郎劉公芮亦方隱居州之西山躬耕勵志人罕識之公獨以坐曹決事之餘日往從之遊劉公名家子及見前輩多識前言往行顧獨恨得公晚及聞公卒哭之慟為寢疾不食者數日此豈勢利之使然哉抑公才志行業之美固當有為於世而充養有素神觀清明人亦不謂其止於此也嗚呼其可謂不幸也巳熹嘗受學李先生之門先生為熹道公之為人甚詳於其從辟江淮也喜而言曰張公高明閎大有餘而宗禮以精密詳練佐之幕府無過事矣時熹未識公也及先生沒乃獲從公遊而得其志行之美然後益信先生為知人然公自是入蜀相望數千里書問歲亦一再至所以勸勵從臾者殊厚日夜望公之還幾得復相與講其舊學而公乃以喪歸熹既痛公之不幸不及大為時用又傷吾道之不幸而失此人也亟往哭焉諸孤既號哭受弔則以公從弟頥所敘官閥梗槩一通授熹使狀次之將以請銘於作者熹誼不獲辭既趣以就事矣惟是從遊之晚於公之行治有不盡知大懼闕漏放失將無以備采擇為罪伏惟立言之君子有以財之謹狀乾道五年五月日迪功郎新差充樞密院編修官朱熹狀敷文閣直學士陳公行狀公諱良翰字邦彥早孤事母孝遊鄉校以謹厚莊重為人所稱讀書務通大指為文恢博有氣紹興𥘉舉進士中第授左迪功郎調紹興府會稽縣主簿秩滿循從事郎知明州慈溪縣事歲凶民飢公喻富室發廪以糶籍貧民授劵以糴上安下濟邑人賴之導德門三鄉之渠溉田甚廣改宣教郎知溫州瑞安縣事轉奉議郎瑞安俗強􅠹號難治或謂公宜厲威嚴以彈治之不然不濟公歎曰縣令字民之官愛之如子猶懼不蔇况奮其武怒以懾威之彼亦何所恃耶催租不下文符第揭逋户姓名通衢為之期日民樂於不擾如期皆集聽訟多得其情或問其術公曰吾何術第公吾心使如虛堂懸鏡而物之至者妍醜自别耳罹內憂去官邑人送者皆泣涕而返免喪授衢州州學教授日進諸生教以修身厲行之意不專器人於文字語言之間轉承議郎用殿中侍御史吳公芾薦為御史臺檢法官擢監察御史上即泣覃恩轉朝奉郎時金亮敗盟既斃而歸其嗣主新立復遣使來約以舊禮修好而中州遺民又皆相率來歸詔問所以處之者公上疏曰繦負之民皆吾赤子去墳墓離親戚捐生業而來歸我其義不可以不納然若許以舊禮而又納其降人則異日彼必來索索而歸之傷向化心納之不便其必定計在我以自治為先而和與不和付之泛應然後乃可納耳二者在陛下聖志如何願熟計之尋復有詔問時務所宜公復上疏請明階級以修軍政核兵籍以豐財用禁折變以蘇民力省堂選以抑奔競內外之官皆久其任賞罰輕重務合衆心上嘉納焉隆興元年秋詔以災異求言時上用故相張忠獻公軍淮泗以規進取而議者不一爭獻防江之説公於是上疏極論以為備邊之要在固藩籬專委任而巳今欲捨淮防江却地奪便非計也而朝廷過聽使督府不得專任閫外之寄臣竊以為誤矣上然之除石正言入謝首陳納諌修德之説以開上意會有飛蝗之異公又勸上以畏天恤民為心語益切於是虜人再移書求復故疆且邀歲幣朝議將許之公入見上極陳前日講和之失使山陵隔絶疆埸無備北方忠臣義士來歸我者反為虜用而致怨於我皆秦檜之罪今不可以復蹈其失且中原之地皆吾祖宗二百年故土虜盜據屬爾况唐鄧海泗又逆亮渝盟之後吾以兵取而得之者安得以故疆為言我亦何説而歸之乎既而宰相湯思退力主和議建遣盧仲賢李栻持書幣賜虜中大臣主兵者公為上言仲賢輕儇無恥拭自北來其蹤迹不可知宜罷勿遣姑報以書徐觀其變而為之所上鄉公説而宰相力爭竟遣二人行公又論今廟堂督府議論不同凡邊奏上聞廟堂皆陽為唯諾無所可否而隂實百方沮敗其計萬一爽於事機督府安得獨任其責上矍然稱善以公語語宰相時楊存中為御營使悉揔殿前諸軍公言存中自太上皇帝時提禁旅二十餘年權勢極盛中外憂疑賴太上聖明威斷罷使就第今又無故假以使名授以兵柄隂凝氷堅不可以不戒願陛下為宗社計亟罷存中使以兵屬三衙如故事則天下幸甚疏三上論者再竟罷存中會仲賢等出疆虜迎勞如禮朝廷上下皆喜以謂和議決可指日而定公獨抗言曰和議於虜人有大利四而在我有未可必者五蓋罷兵講和則彼得以坐守中原休養民力威制小種銷伏羣盜此皆虜之大利而我欲與為敵國請復山陵又必其不求四郡不索降人不疑邊備此則殊未可必願陛下母惑羣議先定久逺之規以應其變上欣然開納既而李拭竟不敢涉淮公奏論奪其官獨仲賢至汴輒許以疆土歲幣輸虜而還上大怒下仲賢吏欲誅之宰相叩頭懇請得免因極言邊備不足恃和好不可不修上不得巳復遣户部侍郎王之望知閣門事龍大淵使虜公遂與侍御史周公操請見力言前遣仲賢巳辱國命而大臣不悔前議之失又欲肆臆決郤衆謀不謂秦檜復見於今且虜書要我罷四郡屯兵而以其地歸之如此是彼不折一兵而坐收數千里要害之地也臣愚以為決不可許若歲幣則俟得陵寢而後豫之庶幾猶為有名今計議未決而之望遽行恐其辱不止仲賢而巳願先馳一介往議堅決行未晚也上以公奏示宰相宰相請召侍從臺諌議之詔可公上議如前一時侍從之賢者亦多附其説上遂以胡昉楊由義為審議官令專議四郡事而手詔之望大淵使議陵寢梓宫降人邊備四事利害以聞二人奏上上燭其姦凡語之依違轉脫者皆墨識之以示臺諌公因復伸前論上乃從之時歲十二月也除左司諌會長秋宫建官其內外之屬若干人公上疏論之且請節它冗費始自宫掖以奉邊軍詔諸以長秋為官者損其七人它亦頗有所減省如公請既而昉及由義與虜議四郡不合大為虜所困辱而歸思退尚執前議正言尹穡素以諂事龍大淵得進用又本仲賢姻黨隂附思退以撼督府公因疏論思退姦邪誤國冝早罷黜以靖中外張浚精忠老謀不冝以小人之言搖之上曰思退前議誠失然朕愛其警敏冀可責後效卿其置之至魏公則今日人材物望孰有出其右者朕豈容有此意正使有之亦豈不謀卿等此殆言路有異意者卿為朕諭之公頓首謝曰陛下言及此天下幸甚然宰相之任古難其人正使不得全才寧取椎頓朴實之人緩急猶可倚賴思退庸狡小黠大癡恐誤陛下國計且警敏二字非明主所以卜相之法也退以上語諭同列穡勃然變色明日亦請對於是以王之望為諫議大夫罷公言職以直敷文閣知建寧府越兩日而有詔張公罷兵還朝又兩月張公竟罷相印去而和議遂定如思退等之䇿矣時隆興二年六月也𥘉公惡穡姦邪靣舉韓魏公富貴易求名節難保之語以警切之穡大愧恨至是既得隂結近幸以售其姦遂連中外之力先排公去之然後罷督府退張公召還四郡戍兵毀撤兩淮守備務以強虜勢孤上心而冀其説之必用不復能為宗社計也虜於是乘勢大入幾不可支上亦悔悟而大學諸生數百人前後伏闕再上疏請召用公及胡銓王十朋等而斬思退之望尹檣洪適以謝天下謂之四姦思退等由是始敗然邊備遂弛不能遂張天下至今恨之公至建寧一以惠愛撫其民如為縣令時掾史以死囚獄具至録問輒不承請循故例即訊而巳公不可曰録囚于庭法也吾何容心哉既亦卒無稱冤者未幾就除福建路計度轉運副使聽覽不倦幽隱畢逹欲行部輒先移文所至母得治道路飾供張諸州以例致餽一不受作觀風七詠以示敦本厚俗之意轉朝散郎除江東路提點刑獄公事移浙西轉朝請郎以宗正少卿召還五年權太常少卿侍立官給事中除兵部侍郎時朝廷欲調沿江數郡民兵列屯江津以備虜公力為宰相言虜未嘗窺邊民兵未嘗練習無故點集恐徒擾而無益語聞事寢以足疾求去不許會浙東有風水之災秋稼盡壞州縣不以聞公以白上上即遣漕臣按視蠲租賦賑流冗官吏蔽匿者皆抵其罪尋詔公同修國史轉朝奉大夫除右諌議大夫命下之日中外翕然時杭帥周淙多創攝局以私親故秀守徐蕆遣吏持錢買燈都下聞之恐懼皆亟罷之公入謝陳四事曰畏天曰愛民曰修政曰官人因言治效未易遽言而治象可以立見陛下誠能盡取天下賢才置之列位自然壯觀朝廷而治象可見治象見則治效因可卜矣上曰善六年正月戊辰大雨震電庚午大雨雪公求對極陳祗畏天戒飾正庶事之説時東宫久未建復奏手疏言之上皆嘉納時上巳深悟前日和議之失思欲亟致富強以為恢復之漸而小人乘間爭售其説有王天覺者以貨結左右陳聚斂擊刺之術皆狂妄乖刺上未之察以為樞密院編修官臺諌攻之不能動公極論之上始開寤逐去史正志者素以傾巧進至是當帥成都憚逺役則使其黨請復置發運使而以巳為之上然其説公入奏曰祖宗本建此官蓋沿唐制轉東南以餉京師今巳居東南而衣食其租稅矣又頗分給武昌建康京口諸軍應上供者數亦無幾而虛立此官甚無謂况正志反覆小人誕妄有素不過欲假此重權割剝州縣侵牟啇賈以自為功耳自今以往法之既密者不復寬法之未密者日加密臣恐數年之間民愁盜起有以勞聖慮也疏三上且靣論之益切上亦知正志之妄謂公曰吾姑試之耳公於是退而求去上封還所奏手札喻公若曰都俞吁咈前聖所不免卿豈可輕去為高耶公復求對靣請益力上留公亦益至巳而發運司為公私之病果皆如公言正志遂以罪竄而發運官屬皆罷矣公嘗為上言曰蜀漢之兵可以窺關陜荆襄之衆可以趨韓魏江淮之師可以搗青徐三者之勢相為掎角不容有偏今蜀道既委大臣開府節制而荆淮之郊東西數千里未有任其責者願擇重臣分以委之則久逺萬全之計也上曰武臣為之可乎公曰文武固無異道但必得真才宿望足以服軍民之心者然後可以濟國事耳上曰善公言曰中興之𥘉諸將領兵者皆别選精鋭數百人自為一卒優其廪犒以故驍勇競勸所向有功韓世忠所謂背嵬張俊所謂親隨劉光世所謂部落是也今養兵雖衆而諸將未聞有能為陛下拔尤取頴以生其氣勢者願陛下之有以詔之也上欣然曰此朕意也即下其書諸將尋以與修玉牒成書轉朝散大夫再上章求去不許七月除給事中會節將成閔冒請真俸事覺詔罪官吏之出納者而置閔不問閣門王抃招納妄人謝顯矯稱密旨出境生事詔抵顯等罪而亦不以及抃公皆處駁議乞正典刑章上翼日除禮部侍郎公力辭不拜遂除敷文閣待制提舉江州太平興國宫以去七年詔起公知婺州辭不獲命再踰月始就道未至除太子詹事兩詔趣行仍令州郡敦遣公遂入見上慰藉甚厚屬以調護之意公亦竭誠輔翼凡所以告太子者無非規戒之言一日召對東華門賜坐從容訪以治道公論士大夫苟且欺誕之弊及江湖荒政甚悉上皆納之因出手書唐太宗與魏鄭公論德仁功利之語而書其後俾公極陳今日所未至公拜謝退上疏曰臣聞仁德者治之本也功利者治之效也大有為之君務其本而效自至未有無其本而有其效者也陛下鑒觀古事親御神筆深詔愚臣以求今日所未至此堯舜之心也臣敢無辭以對臣竊觀陛下欲承天意而比年以來水旱間作數千里間流殍萬計是所以承天意者未至也陛下欲結民心而營造寨屋民不聊生死凍餒者不知其幾是所以結民心者未至也陛下欲任賢能而張栻一言遽從外輔正直之氣鬱而不伸是所以任賢能者未至也陛下欲退小人而正志方逐張某繼之張某適罷韓玉又進是所以退小人者未至也至於欲擇將帥而內外諸軍朘削士卒專事交結不修軍政欲恤軍情而移戍江津措置失當使其老幼狼狽失所欲擇監司而以祥刑之寄付之武臣欲吏久任而或到官旬日即行改易凡此八者一有未去則於陛下深仁厚德不為無纍臣恐功利之效未易可致也願陛下無以仁德為難而忘為治之本無以功利為易而速為治之效欽崇奉若以承天意哀矜惻怛以結民心任君子必盡其才去小人必絶其本廣搜智略以司閫外之權作成武勇以振三軍之氣罷監司之非人申久任之良法自然仁德昭著功利烜赫將與唐虞比隆而視太宗之事有不足為者矣疏奏上嘉歎再三出以示輔臣詔以公兼侍講公以足疾有加求去甚苦上固留之詔聽五日一參公力辭不許十二月以病劇請致其事上始知公果病除敷文閣直學士提舉太平宫遣使賜以告身衣帶公還家病間巳而復作再奏告老遂以八年四月癸丑卒於正寢自疾革即屏醫却藥湛然無怛化之意七日而終享年六十有五詔轉一官致仕訃聞贈太中大夫公質實無偽莊毅有守而色和氣溫不露節角人有片善稱歎不巳小有不善必靣規之自起寒素以至通顯奉養益薄無所嗜好不治生産財利祿賜隨用輒盡不為毫髮計晉自罹內艱不復入私室誨督子弟接引後進孜孜不倦在州縣勤事愛民號為良吏及登朝廷直言正色遭值聖明開獎納用抑邪與正中外倚以為重隆興中協贊廟謀經營北向之䇿尤盡其力當是時國勢幾振不幸為小人所間以去比其復來則事巳異於前日而公亦益老矣然其氣不少衰因事獻言必極其意而後巳蓋公嘗為人言先儒有論為貧之仕者曰俟吾之飢餓不能出門户也而後計之此孫言也而聽者不喻則其弊將無所不至夫飢餓而不能出門户則死而巳矣尚何計之為哉公敬遜誠慤非欲以大言夸世者而其語如此足以見其所存之素定而所立之非偶然也少時聞潘左史良貴廷叱奏事官竊獨歎曰潘公戇矣曷若退而疏之之為得體乎族父某部侍郎公輔聞而賞之曰子少年而議論及此異日立朝當必有可觀者願子自愛至是卒如其言所為奏議及它文若干卷藏于家娶朱氏封碩人子男四人元夀右迪功郎耆夀右承務郎彭夀太學生廣夀勑賜進士出身女二人適右迪功郎郭戡進士吳洎孫男七人女三人皆幼元夀等將以是年九月壬申葬公于義城鄉疊石山之原以熹辱公知待薦寵之厚俾次其行事將以求志於作者請諡于太常且備異時史氏採録熹不得辭謹第録如右謹狀乾道八年八月日前左迪功郎朱熹狀南嶽處士吳君行狀君諱翌字晦叔世為建寧府建陽縣忠孝里人曽祖惻祖深父從周皆不仕君早孤踰冠遊學衡山師事五峯胡先生聞其所論學問之方一以明理修身為要遂捐科舉之學曰此不足為吾事也先生既沒又與先生之從弟廣仲從子伯逢門人張敬夫遊既誦其所聞於先生者而又上稽前古聖賢之言中覽前世儒先之論下引四方朋友之説參伍辨訂去短集長其左右出入雖不專主於一家然其大要以胡氏所傳為宗也其為人忠信明決通微曉事教撫諸弟曲有恩意與人交表裏殫竭心所不安告語切至而不失其和以是朋友多賴其益而樂親之雖或不能從而亦不厭其言之盡也衡山人葉公賢君為人妻以其女君因教其子定使知所趨又見之敬夫而俾受學焉定以是為修士鄉䣊稱之張氏門人在衡湘者甚衆亦無不往來從君參決其所疑者長沙故有嶽麓書院國𥘉時郡人周式為山長教授數百人後更變亂院廢而山長罷五峯方辭秦氏禮命時嘗請為之不報乾道𥘉帥守建安劉公珙始復立焉猶虛山長不置至是轉運副使九江蕭侯之敏始以禮聘君請為之君曰侯之意則美矣然此吾先師之所不得為者豈可以否德忝之哉卒辭不能蕭侯亦高其義不強致也時君方買田築室於衡山之下有竹林水沼之勝因取程夫子澄濁求清之語榜之曰澄齋日與賔客從容其間講道讀書間出詩篇以咏歌其所志蓋翛然有以自樂然不數月而病不起矣淳熙四年八月三日也享年四十有九君娶葉氏生一男曰傳才六歲一女亦尚幼君既沒葉夫人以君遺命請於其父使弟定與君之外弟遊霖遊彰等以九月三日葬君衡山之東梅橋之原於是君之外弟遊彬居故里踰月而後聞君之喪泣而言於熹曰吳兄之終彬獨以逺不得奔走其葬今將狀兄之行而請文於桂州張先生以表于墓願吾子之文之也熹於晦叔有朋友之誼不可以辭乃論其行事始終大者如此以備采擇然敬夫與晦叔學同師居同郡其逰久於熹所以知之必將有深於此者請并列而具刻焉謹狀晦庵先生朱文公文集卷第九十七考異敷文閣直學士陳公行狀上以公奏示宰相下一本仍有宰相二字候官縣儒學訓導劉簮校
