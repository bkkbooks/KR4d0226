body:
  text: 書時事出處答張敬夫書垂喻曲折必巳一一陳之君相之意果如何今當有一定之論矣伏蒙不鄙令誦所聞以禆萬一此見臨事而懼之意推是心也何往不濟然此蓋非常之舉廢興存亡所繫不細在明者尚不敢輕况愚昧荒迷之餘其何敢輕易發口耶大抵來教綱領極正當條目亦詳備雖竭愚慮亦不能出是矣顧其間有所未盡計非有所不及恐以為無事於言而不言耳請試陳之夫春秋之法君弒賊不討則不書葬者正以復讎之大義為重而掩葬之常禮為輕以示萬世臣子遭此非常之變則必能討賊復讎然後為有以葬其君親者不則雖棺椁衣衾極於隆厚實與委之於壑為狐狸所食蠅蚋所嘬無異其義可謂深切著明矣而前日議者乃引此以開祈請之端何其與春秋之義背馳之甚耶又况祖宗陵寢欽廟梓宫往者屢經變故傳聞之説有臣子所不忍言者此其存亡固不可料矣萬一狡虜出於漢斬張耳之謀以誤我不知何以驗之何以處之熹昨日道間見友人李宗思相語及此李云此決無可問為臣子者但當思其所以不可問之痛沫血飲泣益盡死於復讎是乃所以為忠孝耳此語極當若朝廷果以此義存心發為號令則雖瘖聾跛躄之人亦且增百倍之氣矣何患怨之不報恥之不雪中原之不得陵廟梓宫之不復而為是紕繆倒置有損無益之舉哉不知曽為上論此意請罷祈請之行否此今日正名舉義之端不可不審萬一果有如前所陳張耳之説却無收殺若前日之言未盡此意當更論之此不可放過也其他則所論盡之但所謂德者當如何而修所謂人才者當如何而辨所謂政事者當如何而立此須一一有實下功夫處愚謂以誠實恭畏存心而逺邪佞親忠直講經訓以明義理為之輔凡廷臣之狡險逢迎軟熟趨和者以漸去之凡中外以欺罔刻剝生事受寵者一切廢斥而政令之出必本於中書使近習小人無得假託以紊政體此最事之大者又須審度彼巳較時量力定為幾年之􅒑若孟子大國五年小國七年之説其間施設次第亦當一一子細畫為科條要使上心曉然開悟知如此必可以成功而不如此必至於取禍決然不為小人邪説所亂不為小利近功所移然後可以向前擔當鞠躬盡力上成聖主有為之志下究先正忠義之傳如其不然則計慮不定中道變移不惟不能成功正恐民心內搖仇敵外侮其成敗禍福又非坐而待亡之比家族不足惜奈宗社何此尤當審處不可容易承當後將有悔而不及者願更加十思不可以入而後量也抑又有所獻熹幸從遊之久竊覸所存大抵莊重沉密氣象有所未足以故所發多暴露而少含蓄此殆涵養本原之功未至而然以此慮事吾恐視聽之不能審而思慮之不能詳也近年見所為文多無節奏條理又多語學者以所未到之理此皆是病理無大小小者如此則大者可知矣又丐免丁絹期反牛羊之説喧播逺近尤非小失不可不戒願深察此言朝夕點檢絶其萌芽勿使能立則志定慮精上下信服其於有為事半而功倍矣事之有失人以為言固當即改然亦更須子細審其本末然後從之為善向見舉措之間多有一人言而為之復以一人言而罷之者亦大輕易矣從之輕則守之不固必矣慕仰深切不勝區區過計之憂敢以為獻想不罪其僭易也虞公能深相敬信否頗聞尚有湖海之氣此非廊廟所宜願從容深警切之使知為克巳之學以去其驕吝之私更進用誠實沈靜之人以自輔其所不足乃可以當大任而成大功不然鋭於趨事而昧於自知吾恐其顚躓之速也熹向得汪丈書道虞公見問之意時巳遭大禍不敢越禮言謝今願因左右效此區區庶幾不為虛辱公之問者伯恭於此何為尚有所疑熹嘗以為內修外攘譬如直內方外不直內而求外之方固不可然亦未有今日直內而明日方外之理須知自治之心不可一日忘而復讎之義不可一日緩乃可與語今世之務矣答張敬夫今日既為此舉則江淮荆漢便當戒嚴以待不知將帥孰為可恃者近年此輩皆以貨賂倚託幽隂而得兵柄漫不以國家軍律為意今日須為上説破此病進退將帥須以公議折中與衆共之則軍不待自練而精財不待自節而𥙿矣此張皇國威之本不可不早慮也兩淮屯田兩年來措置不知成倫緒否議者紛紛直以為不可固不是議論然亦恐任事者未必忠信可仗其所措畫未必合義理順人心此亦不可不早為之所向見范伯逹文條具夫田之説甚詳似可行於曠土便為井地寓兵之漸試詢究其利病如何均輸之政見上曽及之否此決無益於事徒失人心今時州縣老兄所親見豈有餘剩可剗刷耶閩中之兵春間忽有赴帥司團教指揮七郡勞遣所費不資然後肯行至彼又無營寨止泊聞極咨怨出不遜語此等舉動誠不可曉昨日道間又見奉行強盜新法者殺傷人犯姦縱火皆死此固無疑於當戮但贓滿之限亦從而損之此似太過蓋所以改此法正以人之軀命為重耳今乃一例為此刻急則人但見峻文之迹而未察乎所以愛人之心者亦不得不駭矣不若改此一條使贓滿之數比舊法又加寬焉以見改法之本意所重乃在人之軀命而不在乎貨財則彼微有貪生惜死之情者為惡將有所極而人之𬒳劫者亦或可以免於殺傷之禍汙辱之恥矣又經貸命而再犯者殺之似亦太過不若斬其左足使終身不復能陸梁全生之仁禁非之義並行不悖乃先王制刑督姦之本意也憂居窮寂不聞外事接於耳目者僅有此耳一一薦聞幸少留意答張敬夫奏草巳得竊觀所論該貫詳明本末巨細無一不舉不欲有為則巳如欲有為未有舍此而能濟者但使介遂行此害義理失幾會之大者若虜人有謀不拒吾請假以容車之地使得往來朝謁不知又將何以處之今幸彼亦無謀未納吾使不若指此為釁追還而顯絶之乃為上䇿若必待彼見絶而後應之則進退之權𥘉不在我而非所以為正名之舉矣尊兄所論雖不見郤然只此一大節目便巳乖戾而他事又未有一施行者竊意虞公亦且繆為恭敬未必真有信用之實不若早以前議與之判決如其不合則奉身而退亦不為無名矣蓋此非細事其安危成敗間不容息豈可以坐縻虗禮逡巡閔默以誤國計而措其身於顚沛之地哉必以會慶為期竊恐未然之間卒有事變而名義不正彌綸又踈無復有著手處也彼若幸而見聽則更須力為君相極言學問之道使其於此開明則天下之事不患難立詳觀四牘却似於此有未盡也熹常謂天下萬事有大根本而每事之中又各有要切處所謂大根本者固無出於人主之心術而所謂要切處者則必大本既立然後可推而見也如論任賢相杜私門則立政之要也擇良吏輕賦役則養民之要也公選將帥不由近習則治軍之要也樂聞警戒不喜導諛則聽言用人之要也推此數端餘皆可見然未有大本不立而可以與此者此古之欲平天下者所以汲汲於正心誠意以立其本也若徒言正心而不足以識事物之要或精核事情而特昧夫根本之歸則是腐儒迂闊之論俗士功利之談皆不足與論當世之務矣吾人向來非不知此却是成巳功夫於立本處未甚端的如不先涵飬而務求知見是也故其論此使人主亦無下功夫處今乃知欲圖大者當謹於微欲正人主之心術未有不以嚴恭寅畏為先務聲色貨利為至戒然後乃可為者此區區近日愚見之拙法若未有孟子手假不若且循此塗轍之無悔吝也不審高明以為如何答張敬夫昨陳明仲轉致手書伏讀再三感幸交集蓋始見尊兄道未伸而位愈進實不能無所憂疑及得此報乃豁然耳向者請對之云乃為不得巳之計不知天意殷勤既以侍立開盡言之路而聖心鑒納又以講席延造膝之規此豈人謀所及哉竊觀此舉意者天人之際君臣之間已有響合之勢甚盛甚盛勉旃勉旃凡平日之所講聞今且親見之矣蓋細讀來書然後知聖主之心乃如此而尊兄學問涵養之力其充盛和平又如此宜乎立談之頃發悟感通曽不旋踵遂定腹心之契真所謂千載之遇也然熹之私計愚竊不勝十寒衆楚之憂不審高明何以處之計此亦無他術但積吾誠意於平日使無食息之間斷則庶乎其可耳夜直亦嘗宣召否夫帝王之學雖與韋布不同經綸之業固與章句有異然其本末之序愚竊以為無二道也聖賢之言平鋪放著自有無窮之味於此從容濳玩默識而心通焉則學之根本於是乎立而其用可得而推矣患在立説貴於新竒推類欲其廣慱是以反失聖言平淡之真味而徒為學者口耳之末習至於人主能之則又適所以為作聰明自賢聖之貝不惟無益而害有甚焉近看論語舊説其間多此類者比來尊兄固已自覺其非矣然近聞發明當仁不讓於師之説云當於此時識其所以不讓者為何物則可以知仁之義此等議論又只似舊來氣象殊非聖人本意才如此説便只成釋子作弄精神意思無復儒者腳踏實地功夫矣進説之際恐不可以不戒筵中見講何書愚意孟子一書最切於今日之用然輪日講解未必有益不若勸上萬幾之暇日誦一二章反復玩味究觀聖賢作用本末然後夜直之際請問業之所至而推明之以上之聰明英睿若於此見得洞然無疑則功利之説無所投而僥幸之門無自啓矣異時開講如伊川先生所論坐講之禮恐亦當理會也孟子論王道以制民産為先今井地之制未能遽講而財利之柄制於聚斂掊克之臣朝廷不恤諸道之虛實監司不恤州縣之有無而為州縣者又不復知民間之苦樂蓋不惟學道不明仕者無愛民之心亦緣上下相逼只求事辦雖或有此心而亦不能施也此由不量入以為出而反計費以取民是以末流之弊不可勝救愚意莫若因制國用之名而遂修其實明降詔旨哀憫民力之凋悴而思所以膏澤之者令逐州逐縣各具民田一畒歲入幾何輸稅幾何非泛科率又幾何一縣內逐鄉里不同者亦依實開州縣一歲所收金榖總計幾何諸色支費總計幾何逐項開有餘者歸之何許不足者何所取之俟其畢集然後選忠厚通練之士數人類會考究而大均節之有餘者取不足者與務使州縣貧富不至甚相懸則民力之慘舒亦不至大相絶矣陸宣公論兩稅利害數條事理極於詳備似可采用也是則雖未能遽復古人井地之法而於制民之産之意亦仿佛其萬一如此然後先王不忍人之政庶乎其可施也又屯田之議久廢不講比來朝廷似稍經意然四方未覩其效而任事者日𬒳進擢不知果能無欺誕否今日財賦歲出以千百巨萬計而養兵之費十居八九然則屯田實邉最為寬民力之大者但恐疆理不定因陋就簡則欺誕者易以為姦而隱核者難於得實此却須就今日邉郡官田略以古法畫為丘井溝洫之制亦不必盡如周禮古制但以孟子所言為凖畫為一法使通行之邉郡之地巳有民田在其間者以內地見耕官田易之使彼此無疆埸之爭軍民無雜耕之擾此則非惟利於一時又可漸為復古之緒高明試一思之今日養民之政恐無出於兩者其他忠邪得失不敢槩舉但政本未清幸門未窒殊未有以見陽復之效願更留意暇日為上一二精言之至於省中職事施行尤切伏想直道而行無所回互不待愚言之及矣猥承下問敢效其愚伏惟采擇答沈侍郎書熹伏蒙送示告命極感眷存竊計揄揚推挽之力多矣然熹愚不肖昨以憂苦之餘疾病殘廢不堪仕宦故召命之下不得不辭最後諸公以謂無故罷遣非朝廷待士之禮勢必難從不若以嶽祠為請庶幾有以藉手而罷始者猶以無事而食祿為嫌不敢出口久之然後敢言意謂向來遭喪既巳去官今若朝廷卑之舊秩從其所請使之得便私計而免於稽違偃蹇之罪則巳為非常之恩矣不謂今復橫𬒳殊私事出於望表始者聞之未敢遽信既而猶謂臺省諸賢必有能論其失者勢必中寢忽前日府中送省劄來乃知此命之遂行而今得竊窺訓誨叮嚀之意尤使人皇恐震栗而不敢當巳送建寧府寄內今有二狀申省輒以附內得賜台旨投逹為幸但其間所陳緣愧恐悚迫不能盡鄙懷敢乞因見丞相特借一言因熹之辭便從所請不惟孤踈之迹得免邀君釣寵之譏亦免以謬恩濫賞上纍公朝綜核之政則上下之勢兩便而俱全矣如其不然寧碎首瀝血以請違命之誅不敢蒙羞忍恥為徼幸苟得之人也切望台慈鑒此誠懇早賜矜念則覆護保全之賜終身銜佩何敢弭忘本欲自作劄祈哀又念孤逺不敢容易至感激知遇之厚則有不待言而喻者然亦頗恨其不能置此無用之人於度外而必為此以促迫之也此懷抑鬱無路自通正賴高明終惠之耳與建寧諸司論賑濟劄子一安撫司賑濟米合於冬前差船般運免至冬後與民間般載租米互有相妨或致延滯一廣南最係米多去處常歲啇賈轉販舶交海中今欲招邀合從兩司多印文榜發下福州沿海諸縣優立價直委官收糴自然輻湊然後却用溪船節次津般前來建寧府交卸一般運廣米須得十餘萬石方可濟用合從使府兩司及早撥定本錢選差官貟使臣或募土豪給與在路錢糧令及冬前速到地頭趂熟收糴潮惠州與本路界相近往回别無踈虞即與支賞約運到米一千石支錢三十貫充賞更多尤好其糴到米數最多之人仍與别議保奏推賞施行一上件福廣米既到府城即城下居人自無闕食之理不須過有招邀上溪般米反致鄉村匱乏將來却煩官司般米賑濟勞費百端今合先次出榜曉諭諸縣産户寺院除日逐出糶不得閉糴外每産錢一貫樁米三十石省禾亦依此紀數兩貫以下不樁委社首遍行勸諭親自封樁開具本都樁管米數及所樁去處限十一月內申縣祗備覆實不得輒徇顔情虗申數目及妄挾怨仇生事搔擾其社首家禾米即委隅官封樁一鄉下有外里産户等寄莊即仰社首及本處居人指定經官陳説封樁十分之七一鄉下有産錢低小而停積禾米之家仰鄰保重立罪賞陳告亦與量數封樁十分之五並依前法一上户有願於合樁數外别行樁糶之人許具實數經縣自陳收附出糶量行旌賞一所樁禾米更不預定價直將來隨鄉原高下量估平價出糶不使太貴以病細民亦不使太賤以虧上戶一所樁禾米自來年正月為始以十分為率至每月終即給一分還元樁産戶自行出糶直至稍覺民飢即據見數五日一次差隅官監糶大人一斗婦人七升小兒四升如至六月中旬民間不甚告飢即盡數給還産戶自行出糶一府城縣郭及鄉村居民合糴禾米之家合預行括責取見户口實數即見合用米數及將來分定坊保給關收糴庶免欺弊大人婦人小兒逐户分作三項一上户自有蓄積軍人自有衣糧公吏自有廪祿市戶自有經紀工匠自有手作僧道自有常住並不在收糴之限一鰥寡孤獨老病無錢糴米之人候三四月間别議措置如是飢荒須令得所右謹具呈第一項至第三項乞使府兩司早賜詳度定議第四項以後乞使府出榜通衢恐有未盡未便之處令諸色人詳其利害疾速具狀陳述廣詢審議然後施行庶使大户細民兩得安便伏候台旨此米須留以待來歲之用目今秋成在邇般運到人巳食新切乞存留無為虛費樁米多則上户不易少又儲蓄不足此數更乞裁酌更以户口之數計之方見實用米數與建寧傅守劄子熹竊以秋冬之交寒氣未應恭惟某官台候起居萬福熹北津建陽凡兩拜問必皆巳呈徹矣拜逺誨益忽巳纍日追思館遇勞貺之寵巳劇愧荷至於連榻奉教又皆潤澤忠厚老成人之言感發多矣幸甚熹昨日巳至山間弛擔兩日又當南下然旱久水澀更須數日乃可抵城下也歸塗訪問田畒豐儉相輔計已未至甚虧常數但備禦之䇿不可不講而知舊往往見尤不能深陳糜榖之害且云未論醖釀所耗只今造麴崇安郭內度費萬斛黃亭小市亦當半之而鄉村所損又未在數與其運於他州有風波之虞舟楫之費曷若坐完此榖了無事而百全也萬斛之麴將來所糜秫米又當以數萬計若能果如前日收糴秫米之説所完亦豈及此聞邵武巳行此令彼以蕞爾小邦尚能行之豈堂堂使臺大府之力而反不能乎到家得浦城知友書亦頗及此今謹納呈願高明更與楊丈熟計之也但恐巳緩不及事耳此人姓張名體仁好學有志佳士也似亦與景仁昆弟同年前此因垂問人物亦嘗及之矣又聞楊丈巳行下主簿糴米而未及粳秫之别不知果如何糴粳之害前巳陳之然千里之內户口不知其幾若必人人糴米而食之恐無以濟其勢須令上户樁留禾米如前日之説儲備乃廣但所遇縣道官吏之説皆憚於此計蓋恐上戶見怨又慮見欺殊不知救災之政與常日不同決無靜拱而可以獲禽之理夫富人之多粟者非能獨炊而自食之其勢必糶而取錢以給家之用今但使之存留分數以俟來歲聽官司之命以恤鄰里之闕何所不可正使其間不無冥頑難喻之人然喻之以仁恩責之以大義甚不從者俟之以刑其樂從者報之以賞何至憚其怨怒且慮其欺巳而不敢為哉似聞建陽之西巳有自言於宫願以家資二百萬糴米以俟來歲之荒而以本價出之若果如此則人亦豈為鬼為魅全不可化者但患上之人先以無狀期之故疆者視以為深仇而肆其凌暴弱者畏之如大敵而不復能以正義相裁二者其失均也嘗讀蘇明允書以為權衡之論為仁義之窮而作竊以為此乃不知仁義之言夫舒而為陽慘而為隂孰非天地生物之心哉仁義之於人亦猶是巳若仁義而有窮則是天道之隂陽亦有窮也而可乎故凡此所論雖若柱後惠文一切之説其實趨時救弊不得不然蓋其心主於救人而所及者慱故雖有人所不欲而疆之者初亦不出乎仁術之外也夜不能寐起坐作此信意直書無復倫次不審高明以為然否正使未必可行亦足以當一劇論也前日所稟弟子職溫公雜儀謹納上字巳不小似可便刋女誡本傳中有一序恐可并刋此印行𥿄內上數幅字數踈密須令作一樣寫乃佳仍乞早賜台旨當不日而就也刻成之日當以弟子職女誡各為一秩而皆以雜儀附其後蓋男女之教雖殊此則當通知者使其流行亦輔成世教之一事也雜儀之書蓋頃年楊丈嘗以教授者感今懷昔歲月如流而孤露至此言之摧咽不能自巳語次及之亦足為慨然也熹本更拜書楊丈昨日方歸今早有人行雞鳴起僅能及此遂不暇作然所欲言不過此想從容次必盡及之未拜侍前更乞以時自重前即詔除然區區竊與閩人俱不能無借留之願耳答傅守劄子垂喻曲折極感眷念之勤但兹事鄙意𥘉固料其如此蓋理法當然無可疑者台念不置宛轉至今事體益以明白在使府雖欲奉承朝廷矜恤之美意而在熹豈得執法令之疑文以冒受所不當得之祿哉熹雖貧病然為日巳久粗能自安實不敢以此自毁廉隅仰纍執事謹具狀申乞寢罷其未行者收毁其巳行者以安愚賤之迹切望憐其誠懇特與施行千萬幸甚答龔參政書乃者明公還朝一再旬朔即𬒳書贊延登廟堂近歲以來君臣之契感會神速未有若斯之盛者熹竊聞之不勝其喜即欲修咫尺之書以稱慶於門下顧以衰病懶廢因循前却以至于今而遂不知所以進也不謂明公眷念不忘枉賜手教伏讀感懼不知所言又得本府韓尚書報朝廷以熹未敢受祿之故申飾所司特給符劵府司既受而行之矣此非明公矜憐之厚則亦何以得之自是以往不惟得以少逭溝壑之虞抑使窮悴孤蹤不以矯異詭激得罪於公正之朝為幸大矣惟是支離伉拙無由進趨賔客之後自竭愚頓以報萬分伏惟明公深以平生所學為念仰體聖天子所以圖任仰成之心端本清源立經陳紀使隂邪退聽公論顯行則羣生蒙福海內幸甚熹不勝瞻望惓惓之至答龔參政書伏自去春拜啓之後不復敢貢起居之問蓋懼瀆尊之咎亦避援上之嫌其於瞻仰之私則不以一日而忘也兹蒙賜之手書眷撫甚厚區區感激蓋不勝言惟是恩除過望深所未安此雖參政記憐疇昔有以及此然熹之平生有志無才少容多忤參政固所深知顧乃以是處之似恐未得其適也數年以來私自揣度決無可用於世重以前歲冒受朝廷寵褒惠養之恩其義不容復捨退間起趨名宦非惟自處巳審至於友朋之論亦皆以謂必其若此庶或可以少輔前日冒受之非也敬以公狀申堂伏惟矜憐早為敷奏如其所請或令仍舊充備祠官則熹之受賜亡涯矣熹其勢終不可出萬一未蒙俞允必至再辭竊恐迫厄之甚言語粗率有以自取罪戾者參政必不欲其至此幸早圖之所以記憐擁護之恩宜無大此者焉伏惟留意千萬幸甚答陳祕監書熹憂患餘生屏處田野瞻仰重望蓋亦有年顯晦殊途無由徹聲于下執事兹乃伏辱不鄙而惠以書喻以恩除之意且速其來眷豫良厚顧惟衰賤無庸久絶榮望於此有不獲承命者巳具公狀哀懇廟堂所示告劄亦巳送本府寄納矣衰疾杜門瞻望無日鄉風引領不勝依依與傅漕書熹竟不免真有前日之命皇恐失措龔公以書付陳舍人遣人以來此意雖厚然熹出處之計巳定於前歲受官之日矣至此不容復有前却巳具狀申省及以告劄寄納軍帑乞賜台判送下幸甚宫觀恐合日下解罷俸給亦乞住勘為幸龔公亦有書至門下還書之際幸略及鄙意蓋終不可復出者異時復得舊物或奉香火於幔亭之祠以畢誅茅夕隂之願於熹足矣若迫之不巳必發其狂疾却恐倍費調護不若及此而藥之之為全也熹申省狀巳極詳備不復為第二狀之計矣用此進呈少假一言之助其勢可以一請而遂切乞力為言之盡此底藴千萬幸甚與吕伯恭書熹六月𥘉始得離婺源扶病觸熱幸免他虞到家未幾忽聞除命出於望外不知所為然向年所叨異恩巳是朝廷愍勞惠養之意况今又兩三年精力益衰豈復尚堪從官不免復以此意􅈤辭當以力請必得為期耳昨日得韓丈書遣時未有是説然見人説韓丈嘗於榻前復及姓名勢必緣此若然則是向來哀懇都無絲毫之效足見平生言行不相副無以取信於人如此使人皇恐無地自容向來冒受恩命巳是辭却一年後來見無收殺又思此既是朝廷美意又直許其退間於理疑若可受故不能終辭然朋友四面之責巳不勝其喋喋况昔已取彼今復受此則是真為壟斷無復廉耻雖有子貢之辨亦不復能自明矣在熹一身固無足道然區區自守略巳半生辛勤勞苦無所成就今日韓丈又豈忍必破壞之邪况世衰道微士大夫假真售偽託公濟私者方騖於世若又開此一塗使清官美職可以從容辭遜而得年除歲遷何所不至則是此弊由熹致之平生所以自任者雖不足言然又不至如此之輕實不忍以身啓此弊為後世嗤笑巳作韓丈書懇之幸因書更為一言使其察此衷誠力贊廟堂因其辭避早為寢罷不使蹤迹布露反取譴訶則拙者之幸也又况如老兄者未忘經世之心而又富有其具乃未收用而使此荒拙猥在其先此又豈所宜邪年來百念俱息唯覺親勝巳資警益之樂為無窮何時復奉從容豁此意耶又向來見人陷於異端者每以攻之為樂勝之為喜近來唯覺彼之迷昧為可憐而吾道不振之可憂誠實痛傷不能自巳耳此不知年老氣衰而然耶抑亦漸得情性之正也向見吾兄於儒釋之辨不甚痛説此固為深厚然不知者便謂高明有意隂主之此利害不小熹近日見得學者若於此處見得不分明便使忠誠孝友有大過人之行亦須有病痛處其為正道之害益深正當共推血誠力救此弊乃是吾黨之責耳與吕伯恭書區區出處之計極感誨喻異時難處亦深慮之但目下便有許多間阻使人難於進退平生多所愧耻於此自信未及打不過耳又更有一二事平生自知無用只欲修葺小文字以待後世庶小有輔於天地之間今若一出此事便做不成設使異時收拾得就將來亦無人信矣又今日諸公推挽之意人人知之若到彼之後所見一有不同便為背負知巳如陳了翁事亦是賢者之不幸非其所欲也若每事唯唯緘默隨衆則其為負益深又非鄙性所堪然則亦何為必出以犯此數患乎今日聞元履褒贈之命使人感傷渠亦正坐當時不量諸公相知之淺深趣向之同異故後來不免紛紛之論耳康節之慮前此固嘗講之所以受却前年恩命亦政為此然曾不足以止今日之所蒙者而或反以為梯此又豈計慮之所及乎猜阻之患亦深憂之但既出之後或有妄發不能自巳處則其為猜阻甫益深耳前日龔參自以書來當時煩撓中答之不盡此意旦夕或别以書言之今且望老兄以此兩書曲折盡逹韓丈今日别無醫治方法只有早聽其辭便自帖帖無事若更降指揮一下一上則干冒頻煩傳聞廣而譏議多必别致生事矣熹祠官向滿方患未敢再請只得再差一次為幸甚厚此外實不敢有一毫意想也前書勇往之説以今觀之又似舊病依然略未痊減一二分易言之責深以自懼耳答韓尚書書區區行役前月半間始得還家忽聞除命出於意望之外自視才能豈稱兹選愧懼窘迫不知所為然竊妄意此必尚書丈過恩推挽之力既而府中遞到六月十五日所賜書傳丈亦以所得别𥿄垂示乃知台意所以眷念不忘者果如此私感雖深然非本心平日所望於門下也熹狷介之性矯揉萬方而終不能回迂踈之學用力既深而自信愈篤以此自知決不能與時俯仰以就功名以故二十年來自甘退藏以求巳志所願欲者不過修身守道以終餘年因其暇日諷誦遺經參考舊聞以求聖賢立言本意之所在既以自樂間亦筆之於書以與學者共之且以待後世之君子而巳此外實無毫髮餘念也中間懇辭召命反誤寵褒𥘉亦不敢奉承既而思之是乃君相灼知無用之實而欲假以閔勞惠養之恩故少進其官益其祿而卒許以投間以若有可受者以故懇避踰年而終於拜受私竊以為是足以上承朝廷之美意而下得以自絶於名宦之途自是以往其將得以優遊卒歲就其所業而無蹙迫之慮矣而事乃有大繆不然者熹亦安得默然而亡言哉夫以熹之狷介迂踈不能俯仰世俗固巳聞風而疾之矣獨賴一時賢公名卿或有誤而知之然聽於下風考其行事議論之本末則於鄙意所不能無疑者尚多今若不辭而冒受則賔主之間異同之論必有所不能免者無益於治而適所以為羣小嘲笑之資且熹之私願所欲就者亦將汨沒而不得成其或收之桑榆而幸有所就人亦必以為巳試不驗之書而不之讀矣又况今日一出而前日所以斟酌辭受而不敢苟然之意亦且黯暗而不能以自明諸公誠知之深愛之厚則曷為不求所以伸其志全其守而必脅驅縱臾使至此極也耶且士大夫之辭受出處又非獨其身之事而巳其所處之得失乃關風俗之盛衰故尤不可以不審也若熹者向既以辭召命而得改官矣今又因其所改之官而有此授熹若受而不辭則是美官要職可以從容辭遜安坐而必致之也近世以來風頽俗靡士大夫倚託欺謾以取爵位者不可勝數獨未有此一流耳而熹適不幸諸公必欲強之使充其數熹雖不肖實不忍以身蒙此辱使天下後世持清議者得以唾罵而嗤鄙之也且熹之言此於門下有年苦言悲懇無所不至而執事者聽之藐然方且從容遊談大為引重而其要歸成效則不過使之內違素心外貽深誚而後巳此熹所不能識且復竊自計其平生言行必有大不相副者而使執事者不信其言以至此也深自悔責無所歸咎然亦不敢終默默於門下是以敢復言之伏惟憐而察焉熹前日所報大參書匆匆不及盡此曲折故今僣易有言非獨以伸鄙意於明公亦使因是以自逹於龔公也必若成命巳行不欲追寢則願因其請免復卑祠官之秩其於出令之體似未為失何必待其狂疾之既作然後藥之乎瞻望門墻無由趨侍情意迫切言語無倫伏惟高明垂賜矜察與龔參政書熹衰陋亡庸誤蒙引拔自知不稱嘗力懇辭未奉俞音秪增震懼今再有狀欲望哀憐早賜敷奏施行則熹之幸也抑又有以聞于下執事者熹自幼愚昧本無宦情既長稍知為學因得側聞先生君子之教於是幡然始復誤有濟時及物之心然亦竟以氣質偏滯狂簡妄發不能俯仰取容於世以故所向落落無所諧偶加以憂患心志凋零久巳無復當世之念矣而明公乃欲引而致之搢紳之列不識明公將何所使之也使之隨羣而入逐隊而趨耶則盛明之旦多士盈庭所少者非熹等輩也使之強顔茍祿以肥妻子耶則熹於飢寒習安巳久所病者又不在此也且必無巳而使之得以其所聞於古而驗於今者效其愚於百執事之後則熹之所懷將不敢隱於有道之朝竊料非獨一時權幸所不樂聞意者明公亦未必不以為狂而斥之也由前二者明公之計決不出此由後之説則懼熹之殺身無輔而反得罪於明公也意迫情切言不及究伏𥿄隕越與龔參政書熹竊伏田里仰依大造自頃拜勑奉祠以書陳謝之後無故不敢輒通箋敬以犯等威區區第切瞻仰兹者竊聞還政宰路歸榮故鄉行道之難不無私歎然意者必得參候車塵瞻望顔色以慰積年引領之懷而卧病田間偶失偵伺遂乖始願尤劇惘然獨念頃歲黃亭客舍拜違左右屈指於今十有五年其間事變反覆何所不有而其不如人意使人悒悒不能無遺恨者則巳多矣憂患之餘衰病零落雖巳無復當世之念然私所幸願猶冀天啓聖心日新厥德公道庶幾其復可行乎明公強食自愛應之於後以遂𥘉心則海內幸甚暑行良苦引首馳情答陳丞相書熹昨罹私釁仰勤吊恤拜啓還使未足究盡鄙懷方欲别伸問訊之禮忽聞拜章公車祈就間退聖主重違明公之意峻其班秩而後賜可竊自惟念雖與一道窮民同失膏雨之潤不無怊悵然想稅駕里門雍容就第超然事物之外其樂有不可涯者至於聖主不忘之意則又海內搢紳之所共慶而熹之愚昧竊獨深有感焉蓋今時論歸趣益異於前後來諸公未見卓然有可望以回天意者有識之士日夕寒心明公受國家大恩起布衣至將相位尊祿厚德流子孫今又為聖主所優尊士大夫所歸鄉如此誼豈以一身之樂而忘天下之憂哉伏惟高明深念此意亟於此時反躬探本逺佞親賢以新盛德廣賢業庶幾異時復起有以格君定國剗弊鉏姦慰斯人之望者千萬幸甚與陳公别𥿄前幅所稟親賢逺佞之意蓋已屢瀆鈞聽然似頗未蒙深察懷不能巳輒復陳之蓋在今日此事利害尤不難見惟試思平日所以願忠於國者云何而反求諸其身則其得失之數隱然心目之間矣有諸巳而後求諸人無諸巳而后非諸人况欲格君心以救一時之禍此豈細事而可不責之於吾身積之於平日而苟焉以一朝之智力圖之哉與陳丞相書竊聞鈞斾尚留上饒不審幾日遂東所以反覆啓告之方必巳有定論矣但熹竊料比來言者指陳闕失白發姦欺不為不盡而未有開悟之益正坐不正之於本而正之於末不求之於理而求之於事不言所以增崇聖德紀綱政體之意而惟羣小之過惡是攻此其所以用力多而見功少者與伏惟高明深察乎此而有以反之庶乎其有以慰天下之望也蓋不惟元老大臣所以告君之體當然顧其理勢攻之於彼不若導之於此之為易誦衆人之所巳言不若濟其言之所不及者之為切也鄙意如此而不能逹之於言不審相公以為如何數日道間竊窺日用之妙其忠誠博厚之意蓋盎然溢於容貌詞氣之間知數年以來所以進德者如此其深且逺也以此感物何往不通况吾君之聰明而又助之以海內忠臣義士之心乎願相公益勉旃不幸而不得其言則不可暫而立其位也熹前幅之尾所稟尤願垂意蓋不合而去則雖吾道不得施於時而猶在是異時猶可以有為也不合而苟焉以就之則吾道不惟不得行於今而亦無可望於後矣此其機會所繫不淺熹愚不肖又病且衰蓋巳決然無復當世之願顧其痛心疾首所不能忘者獨在於此前日雖嘗言之然自覺有所未盡故復喋喋於此忠憤所激至于隕涕伏惟相公念之答吕伯恭書遞中兩辱手教獲聞邇日秋清尊候萬福感慰之至但所𬒳恩命以熹之資歷分義精神筋力皆無可受之理雖感君相矜憐之意重以仁賢説誘之勤終未敢起拜而恭受也申省狀巳附遞回付奏邸副本録呈敘説雖詳然似無過當之語只是須如此説方盡底藴耳如以未安幸為却回仍别為作數語見教庶幾可以無忤若只熹自作終只有此等詞氣出來也觀此氣象豈是今日仕途物色當路者必欲強之大是違才易務矣區區之志狀中備見更有一事自數年來絶意名宦凡百世務人情禮節一切放倒今雖作數行書與人亦覺不入時樣唯在山林則可以如此恣意打乖人不怪責一日出來作郡承上接下豈容如此又巳慣却心性雖欲勉強亦恐旋學不成徒爾發其狂疾此是一事又數年來次輯數書近方略成頭緒若得一向無事數年不死則區區所懷可以無憾而於後學亦或不為無輔今若出輔郡吏日有簿書期會之勞送往迎來之擾將何暇以及此因循歲月或為終身之恨而其為政又未必有以及人是其一出乃不過為兒女飢寒之計而所失殊非細事此皆未易與外人道故狀中不敢及之只欲老兄知之更為宛轉緩頰使上不得罪於君相下不見疑於士大夫足矣扶接導養之功正應於此用力想不以為煩也揆路未敢作書煩為深逹此意只俟此事定疊再得宫觀如舊便自作書謝之也武夷今冬當滿今既未受命亦未敢便落舊銜但未敢請俸耳或恐得祠别有所加此亦決然難受亦可微詞風曉之免臨時復紛紛也千萬留念至懇至懇保全孤迹使不至踈脫深有望於高明也熹來日出紫溪迎哭劉樞之柩昨得其訣書猶以國耻未雪為恨亦可哀也臨行甚冗又急遣回遞中草草作此殊不盡意八月十七日上狀不宣熹頓首再拜子重不及拜狀昨日亦嘗以書附政和行者想未能即逹也此事亦告調護得免踈脫朋友之賜厚矣欽夫久不得書彼想時聞問也王程驅迫不得少休聞此尤使人怕出頭耳答鄭自明書副封曩恨未見今兹幸得竊讀感歎之餘斂袵敬服嘗竊論之以為非獨忠諒懇切有以過人於才辨智略亦非人所能及不知劉元城陳了翁輩如何爾上聖聰明開納如此一旦感寤去鼠輩如反覆手耳太平萬歲雖老且病尚庶幾及見之幸甚幸甚輔郡懷章雖鬱公議然得以此間暇進德修業益懋久大之規天意亦有非偶然者矣更願深自培養以厚其基篤志講學以濬其源使誠意充積而鋒頴潛藏義理著明而議論條暢則一日復進而立於朝其所以動寤啓發者決不但如今日之所就而止也蓋前日文字固為剴切但論事多而論理少數羣小之姦欺雖詳而於人主之所以端本清源修德立政之意有未備也此其所以然者失於逆料聽者謂之迂濶而不敢言亦自於此理講之未精不免於自以為迂濶而不足言也兼今日之病只此一病最大若藥之未效則其他小小證候不必泛投湯劑以緩藥勢而欲攻此病所用之藥亦須一君二臣三佐五使多少緩急次第分明乃易見效今既雜治他證而所用以攻病根者又未免互有得失亦巳嘗為令弟言之歸當一一稟白不審尊意以為如何衰陋不足以及此猥蒙不鄙見使與議其間亦私感時論之至此不覺傾倒而忘其愚耳此外則伯恭所告讀書取人之意亦所宜深留意者蓋吾人所立巳如此使天無意於右宋則巳若有此意異日之事豈得而辭其責哉然則今日吾人之進德修業乃是異時國家撥亂反正之所繫非但一身之得失榮辱也惟高明深念之然講學之方未得靣論猶頗以為恨也陳丈此行所繫不輕待於下流不勝日夕之拳拳也熹之出處不足為時重輕諸公或聽其辭固幸不爾則受命而復請祠又不得則當申審奏事以卜可否又不得則引疾丐間此於進退固自以為有餘𥙿者未審老兄以為如何若終身不出之計則自祿不逮養之時巳決於心懷矣今亦不敢固必且得隨事應之耳但申審狀中欲少露久違軒陛願得一望清光之意使知本無羞薄詔除之心不知可否幸為籌度留數字於曹晉叔處令尋的便附來見教為望或不必然即只依常格寫去也似之文字果佳甚慰人意老兄亦當勉其進修以俟時也向來一畨前輩少日粗有時望晚年出來往往不滿人意正坐講學不精不見聖門廣大規模少有所立即自以為事業止此更不求長進了荆公所謂末俗易高險塗難盡者亦可念也人材衰少風俗頽壞之時士有一善即當扶接導誘以就其器業此亦吾輩將來切身利害蓋士不素養臨事倉卒乃求非所以為國逺慮而能無失於委任之間也陳候官處更有胡明仲侍郎史論議論亦多切於事理不知嘗見之否若未可就借看發人意思也昨得都下知識書云伯恭説熹不必請對此其意蓋恐熹復以抵觸得罪沮壞士氣此意人少識之者只似熹偷得差遣做一般彼意固善然恐不可承用也如何閩縣儒學訓導何器校晦庵先生朱文公文集卷第二十五
