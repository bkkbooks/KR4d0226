  text: 晦庵先生朱文公文集卷第五十九書問答一夲作知舊門人問答
  hash: sha256:ade98169fd32bec9739f629ff6c075cdaf7cf5f040eeb2117a5051bcc7c69c5b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0226_SBCK_059-1a}
body:
  text: 答林正卿季通書來亦謂正卿甚進不知乃有異論如此此正是渠病處蓋不先其在巳而欲廣求於外所以向裏不甚得力又不察學者才識之髙下而槩欲其無所不知所以誤得他人亦多馳􅕽於外吾人當識其好處而略其所偏也聞渠謪居却能自適亦甚不易歸期正不須問旬呈亦不必求免如陳了翁曽作諫官及𬒳謫猶著白布衫繫麻鞋赴旬呈朝廷行遣罪人正欲以此困辱之若必求免是不受君命也不受君命不受天命也而可乎所論易大槩得之但時事人位等字説得太早今只可且作卦爻看看得通透了到推説處方説得平居無事處時應事之法是第二節事也如乾之𥘉九只是陽氣濳藏之象未可發用之占耳若便著箇不易乎世不成乎名隱而未見行而未成底人坐在裏靣便死殺了非所謂潔靜精微者若會得卦爻本意却不妨當此時居此位作此人也頃年嘗因人問易應之曰公曽看靈棋課否易之模樣便只是如此也後有人問豈以其不足告而云爾耶此錯認了話頭也試思之答林正卿觀變於隂陽而立卦發揮於剛柔而生爻分竒偶便是畫積畫便成卦卦中看畫便是爻若如所説只是引證作文不知四句之義又如何説諺所謂鶻侖吞棗者是也何由知其味耶伏羲畫卦以寫隂陽之變化文王周公作繇爻辭以斷天下之疑孔子作彖象以推明事物當然之理然爻畫既具而三者巳備乎其中前聖後聖互相發明耳此説近之然亦未盡所以名卦之例非一端有兼取二義二象者有專取二義者有專取二象者有兼取二象與人情者有專取人情者有兼取一象與隂陽之位者有取爻畫之多寡者有取爻畫兼二象者有取變卦者有取爻畫之形與二義者有不可曉者且逐卦玩索當見各有意味不須如此安排貪多涉淺勞心費力不濟得事家人卦乾剛也施於家則離兊説也施於家則亂坤靜也施於家則廢震動也施於家則擾坎艮非所取義惟明而順家之道也穿鑿得不好革與睽相類睽上火下澤則不相入此火在澤下有變革之理睽中女在前少女在後有相離之義而此以中女繼少女故曰革鑿豫四以震體之陽為隂主如大臣轉天下之危為安上無為而下佚樂故曰豫此等處孔子分明説順以動豫理甚分明安得舍之而自為説耶大病只是著力安排不曾虛心玩味耳中孚外剛中柔至誠惻怛之人也得無色厲內荏之姦耶大抵此一類都不是此特其小失耳以伏羲易觀之則看先天圖如寒暑往來隂陽代謝若有推排而又莫知其所以然者以文王周公易觀之則六十四卦之名乃十八變以後之私記三百八十四爻乃三變竒偶之私記潛龍牝馬等物如今之卦影勿用利有攸往等語如今斷卦之文以孔子易觀之則卦名者時也事也物也𥘉二三四五上者位也而𥘉上又或為始末之義九六者人之才也處某事居某時用某物其才位適其所當則吉不然則凶始末一夲作始終此説近之然乃知此而又不免為前假之支蔓穿鑿何耶然乃一夲作然既易有取兩卦象以為法者有取卦名之義而思所以處之者有取二義而思所以處之者亦不必如此籠罩易疏論連山歸藏一以為伏羲黃帝之書一以為夏啇之書未知孰是無所考當闕之論上下二經為文王所分果可信否亦不必論論六十四卦重於伏羲果否此不可考或耒耜市井巳取重卦之象則疑伏羲巳重卦或者又謂此十三卦皆云蓋取則亦疑詞未必因見此卦而制此物也今無所考只説得到此以上當且闕之但既有八卦則六十四卦巳在其中此則不可不知耳答林正卿所示易疑恐規模未是蓋讀書之法須是從頭至尾逐句玩味看上字時如不知有下字看上句時如不知有後句看得都通透了又却從頭看此一假令其首尾通貫然方其看此假時亦不知有後假也如此漸進庶幾心與理會自然浹洽非惟會得聖賢言語意脈不差且是自巳分上身心義理日見純熟若只如此匆匆檢閲一過便可隨意穿鑿排布硬説則不唯錯會了經意於巳分上亦有何干涉耶且如看此幅𥿄書都不行頭直下看至行尾便只作旁行橫讀將去成何文理可試以此思之其得失亦不難見也答林正卿季通云亡凡在同志無不痛傷然人生要必有死遲速逺近亦何足較聞其臨行却甚了了區處付屬皆有條理亦足強人意也所示中庸疑義略此條析奉報大率朋友看文字多有淺迫之病淺則於其文義多所不盡迫故於其文理亦或不暇周悉兼義理精微縱橫錯綜各有意脈今人多是見得一邊便欲就此執定盡廢他説此乃古人所謂執德不弘者非但讀書為然也要須識破此病隨事省察庶幾可以深造而自得也答曹元可示喻為學之意仰見造詣之深不勝歎仰然嘗聞之為學之實固在踐履苟徒知而不行誠與不學無異然欲行而未明於理則所踐履者又未知其果何事也故大學之道雖以誠意正心為本而必以格物致知為先所謂格物致知亦曰窮盡物理使吾之知識無不精切而至到耳夫天下之物莫不有理而其精藴則巳具於聖賢之書故必由是以求之然欲其簡而易知約而易守則莫若大學論語中庸孟子之篇也是以頃年嘗刻四古經於臨漳而復刻此四書以先後其説又略𫐠鄙意以附書後區區於此所以望於當世之友朋者蓋巳切矣歸來只有數本皆為知識持去不得納呈然彼間相去不逺自可致之不難也讀之有得復以見教千萬之望答李巽卿所喻進學處事之意省察警懼固當如此然頭緒太多却成紛擾但將聖賢之書小立程課熟讀深思反復玩味以此栽培澆灌自有長進處不必如此間計度也答程次卿示喻存心之説此固為學之本然來喻又有所謂有是事必有是理者不知又何從而察之耶若如所謂當應事然後思是事之理當接物然後思是物之理則恐思之不豫而無所及若豫講之則又陷於所謂出位而思念慮紛擾之病竊意用力之久必有説以處此矣幸明告我得以反復之答龔惟微聞進學不倦之意甚幸甚幸但春秋之説向日亦嘗有意而病於經文之大略諸説之太煩且其前後抵牾非一是以不敢妄為必通之計而姑少緩之然今老矣竟亦未敢再讀也來喻以為他處皆可執其一説以為據獨即位之説為難通愚恐其所執之説未必聖人之真意而非獨即位之説為無據也若只欲為場屋計則姑取其近似而不害理者用之若欲真實為學則不若即他書之易知者而求之庶明白而不差也答龔伯善示喻以門戶之故不免兩用其心於道全未有得此今日士子之通患但窮逹有命非可力求若其有之當不待求而自至如其無之求亦奚益惟道義在我人皆有之而求無不得今乃以彼而易此其於利害之算可謂舛矣碩以此而反思之庶乎其有決也答汪叔耕十月二十三日熹扣首啓叔耕茂林鄉友辱書并示詩文論説甚富三復不置足以見鄉道之勤衛道之切而所以用力於詞章者又若是其慱而篤也顧惟衰晚於道既無所聞不足以堪見豫之意而少日粗親筆研終不能窺作者藩籬且自覺其𥘉無輔於身世遂用絶意棄去不為今數十年矣又無以知所論之中失而上下其説也然私竊計之鄉道之勤衛道之切不若求其所謂道者而修之於巳之為本用力於文詞不若窮經觀史以求義理而措諸事業之為實也蓋人有是身則其秉彛之則𥘉不在外與其鄉往於人孰若反求諸巳與其以口舌馳説而欲其得行於世孰若得之於巳而一聽其用舍於天耶至於文詞一小伎耳以言乎邇則不足以治巳以言乎逺則無以治人是亦何所與於人心之存亡世道之隆替而校其利害勤懇反復至於連篇纍牘而不厭耶足下志尚髙逺才氣明決過人逺甚而所以學者未足以副其天資之美熹竊惜之又念其所以見豫之厚而不忍忘也不敢不盡其愚足下試一思之果能舍其舊而新是圖則其操存探討之方固自有次第矣請繼今以言人還姑此為報向寒千萬以時為親自愛不宣熹再拜答汪叔耕來書所論向來為學次第足以見立志之髙矣然雜然進之而不由其序譬如以枵然之腹入酒食之肆見其肥羔大胾餅餌膾脯雜然於前遂欲左拏右攫盡納於口快嚼而亟吞之豈不撑腸拄腹而果然一飽哉然未嘗一知其味則不知向之所食者果何物也今承來喻將欲損其逐末玩華之習而加反本務實之功則善矣然所論周程傳授次第恐亦有未易言者而以太極圖為有單傳密付之三昧則又近世學者背形逐影指妄為真之弊也夫道在目前𥘉無隱蔽而衆人沉溺膠擾不自知覺是以聖人因其所見道體之實發之言語文字之間以開悟天下與來世其言丁寧反復明白切至惟恐人之不解了也豈有故為不盡之言以愚學者之耳目必俟其單傳密付而後可以得之哉但患學者未嘗虛心靜慮優柔反覆以味其立言之意而妄以巳意輕為之説是以不知其味而妄意乎言外之别傳耳不欺論中所談儒佛同異得失似亦未得其要至論所以求乎儒者之學而以平其出入之息者參之又有忘心忘形非寐非窹虗白清鏡火珠靜月每現輒變之説則有大不可曉者不知儒者之學自六經孔孟以來何嘗有是説而吾子何所授受而服行之哉所以求之者如是之雜無怪乎愈求而愈不得也而反自謂將從主靜持敬應事接物以求之則有沒世而不能逹者是豈應事接物主靜持敬之罪哉如此不巳不唯求之不得而巳愚恐其必將有狂易喪心之患竊為吾子憂之不敢不以告也幸且置此而即聖賢之言平易明白之處虛心平氣熟玩而躬行之玩之深則理自明行之篤則力自進持之以久亹亹而上逹焉則道體精微之妙聖賢親切之傳不待覃傳密付而巳了然心目之間矣其他所論亦儘有合啇量處未暇悉陳然根本若正則此等枝葉亦不待辨而明矣史論却勝他書然姑少後之而先其夲則其所至又當不止此也大學章句一夲附往古人為學規模及今日用力次第盡在此矣幸試詳之勿以為老生常談而忽之也答李元翰元翰前日説得儘近似今看所示又説開了蓋前日所説尤非實見故把捉不定又會走作爾如前日云存得此心即便是仁此句甚好但下靣説合於心者行之不合於心者勿為又説從義上去了不干仁事矣今所寫來者乃先存得此心一句便只説合於心為之為之却是全説不著也今且只以孟子仁人心也義人路也兩句看來便見仁義之别蓋仁是此心之德才存得此心即無不仁如説克巳復禮亦只是要得私欲去後此心常存爾未説到行處也才説合於心者云云則便侵過義人路底界分矣然義之所以能行却是仁之用處故學者須是此心常存方能審度事理如其不然則方寸之間自無主宰亦不復能審度可否而行所當行矣此孔門之學所以必以求仁為先蓋此萬理之原萬事之夲且要先識認得先存飬得方有下手立腳處爾其他所論未穩者多但先看此一節久之自見得也答陳與叔夢良弟子職音韻此非大義所繫不暇深考夢良竊意弟子職一章自先生施教弟子是則以下似言學莫先於立教云云自志無虛邪以下又詳言其學之之功如此云云此説得之然亦本無奧義不必如此之詳也夢良竊意弟子職一章論教學之方其所以敬親事長從師受業與夫灑掃應對進退之要皆括乎是自二章至末十二章又分明條具其節目之詳由早至夜周旋從事蓋為纎悉其四章弟子饌饋注饋謂選具在食蓋饌乃訓具食饋訓進食恐饋者是進具在之食疑進字誤作選字未審如何又飯是為卒注既飯而食則卒義未能通五章三飲二斗注三飯必毁二斗及左執虛豆斗是何器毁義如何左執虛豆欲何用六章拚前枚祭枚字何訓用何物搜斂所祭置之何地八章葉適巳葉義如何葉是箕舌此句即曲禮所謂以箕自鄉者也章措揔之法注揔設燭之束類今時何物比假中小字先生批此數條多所未詳但二是周禮再二一二之二蓋必所食巳盡而增益之也故執虗挾巳視其不足者而二之但豆中有物而謂之虗此不可曉爾大學明明德新民皆欲止於至善而傳之一章結語止言自明而二章結語乃言無所不用其極二章兼明自新新民之事故通結之下章又自正解止於至善之意𥘉不相妨也胡子知言曰天下莫大於心患在不能推之爾莫久於性患在不能順之爾莫成於命患在不能信之爾不能推故人物內外不能一也不能順故死生晝夜不能通也不能信故富貴貧賤不能安也先生嘗以延平先生讀正蒙書語示夢良此後五峯胡子書竟未敢看然此假語巳嘗熟誦自見得説心著大字推字性著久字順字命著成字信字為有理恐大亦是與天地同體之意久只是常而不變之意成只是一定不易之意否此假好但點出兩處理會不得子在川上曰逝者如斯夫不舍晝夜程子曰自漢以來儒者皆不識此義此見聖人之心純亦不巳也純亦不巳乃天德也有天德便可語王道其要只在謹獨竊意其要在謹獨莫是工夫無間斷否川流不息天運也純亦不巳聖人之心也謹獨所以為不巳學者之事也夫仁者巳欲立而立人巳欲達而達人能近取譬可謂仁之方也巳集注以上一截説仁之體下一截説仁之術而程子於此二截乃合而言曰欲令如是觀仁可以得仁之體程子合而言之上下句似不相應不若分作兩截看然惟其仁者之心如此故求仁之術必如此也答陳與叔所示疑義各巳批鑿附回幸更思之且於義理上晉心制度名物少緩亦不妨也答方履之杜門讀書謝去場屋自計巳決夫復何言逖聞髙風第劇歎尚但所謂難者過之不復致疑此則泛泛悠悠恐不得力目前雖似無事向後無歸宿處茫然如未始學者則恐不免却有多事之纍也平生見朋舊間好資質而似此者多矣私心嘗竊深歎惜之故不碩賢者之為之也因便寓書并此奉曉幸試思之以為如何也答方若水壬龍巖之行若問得實使無罪者不以冤死而有罪者無所逃刑此非細事也靜退之説亦甚善但今亦未是教人求退只是要得依本分識廉耻不敢自衒自鬻以求知求進耳然亦須是讀書窮理使方寸之間洞見此理知得不求只是本分求著便是罪過不惟不可有求之之迹亦不可萌求之之心不惟不得説著求字亦不可説著不求字方是真能自守不求人知也答方子實芹之昨者經由幸獲一見别又數月豈勝馳情令叔來承書獲審比日秋冷德履佳勝為慰熹比幸粗遣無足言長泰令兄幸得同事相去不逺亦時相見也跋語殊犯不韙更勤刻畫為愧益深耳示喻主敬之説先賢之意蓋以學者不知持守身心散漫無緣見得義理分明故欲其先且習為端莊整肅不至放肆怠墮庶幾心定而理明耳程子無適之適訓之訓往而讀如字論語無適之適訓專訓主而讀如的其音義皆不同不當以此而明彼細考之可見程子之云只是持守得定不馳騖走作之意耳持守得定而不馳騖走作即是主一主一即是敬只是展轉相解非無適之外别有主一主一之外又别有敬也答何巨元進之杜門讀書固為可樂而入居學校又可推以及人想賢者於此亦不憚應接之煩也示喻人物之説未知康節之意果如何但如來諭以隂陽分之似亦有理大抵先天圖自復至乾為陽自逅至坤為隂隂陽所主既有淑慝之分則人物所稟亦不能無純駮之辨也手探足躡出於一時之謬説無足深論當時但以逅在上而復在下故以手足言之耳四端之説若以體用言之則體為首而用為末若自其發處而言則發之𥘉為首而發之終為末二説亦不相妨熟玩之可見也匆匆奉報幸更思之有所未安復以見喻幸甚答程成甫熹服膺二先生之教有年矣雖幸得誦其詩讀其書然猶以未得識其子孫為恨茲乃辱書欣感無量且承敘𫐠世次行治之詳使得聞之又嘆大賢之後中間留落不偶至於如此甚者遂至淪陷隔絶而無聞獨幸賢者於此乃能守其門户而不失其問學之傳猶足以自慰也今郡慱士又能屈致以為學校之重其所以望於賢者豈不欲其服先生之服誦先生之言行先生之行以警動其學者而勉勵之哉荷意之勤敢申其説以致區區之意惟左右者念之答竇文卿辱書知進學不倦之意甚善甚善但自以不能致疑便謂賢於辨論而不能行者似有臨深為高不求進益之病亦未免為自畫也彼以空言生辨我以實見致疑自不相妨固不當以似彼為嫌而倦於探討亦不當一槩視彼皆為空言而逆料其全無實見也顔子以能問不能以多問寡曷嘗敢是巳非人而自安於不進之地哉程先生説於不疑處有疑方是長進此不可不深念也知日誦四書時時省察此意甚善但不知何故都無所疑恐只是從頭讀過不曽逐假思索玩味所以不見疑處若果如此則不若且看一書逐假思索反復玩味俟其畢而别換一書之為愈也近思録説得近世學問規模病痛親切更能兼看亦佳也公謹未及附書相見煩致意渠從吕東萊讀左傳宜其於人情物態見得曲折今乃如此不解事何耶德章似亦不安其官頗有責上責下而中自恕之意皆是學問不得力處吾輩觀此真當痛自警省實下工夫也答竇文卿為學之要只在著實操存密切體認自巳身心上理會切忌輕自表襮引惹外人辨論枉費酬應分却向裏工夫答竇文卿示喻問學之難豈獨今日吾黨但當日加持守省察之功而不廢講誦討論之業專以古人之為巳者為師而深以今人之為人者為戒則庶乎其無負平生之志矣答竇文卿夫為妻喪未葬或巳葬而未除服當時祭否不當祭則巳若祭則宜何服恐不當祭熹家則廢四時正祭而猶存節祠只用深衣涼衫之屬亦以義起無正禮可考也節祠見韓魏公祭式未葬不當祭時或遇先忌又不知當祭否若祭則又何服忌者喪之餘祭似無嫌然正寢巳設兀筵即無祭處恐亦可暫停也凡題主男子婦人無官稱者宜何書伊川主式巳詳言之可考也夫在妻之神主宜何書何人奉祀若用夫則題嬪某氏神主旁注夫某祀否夫祭妻而云奉事莫太尊否事恐當作祀旁注施於所尊以下則不必書也古者父在子為母期夫為妻期其練祥禫之祭皆同今制夫為妻服與古同而子為母齊衰三年則夫為妻大祥之日乃子為母小祥之祭矣至於子為母大祥及禫夫已無服其祭當如何恐只是夫為祭主其辭曰夫某為子某薦其祥事如曾子問宗子為介子之禮不識可否今禮几筵必二年而除則小祥大祥之祭皆夫主之但小祥之後夫即釋服大祥之祭夫亦恐須素服如弔服可也以祭但改其祝詞亦不必言為子而祭也父在母沒父既除期之喪子尚為母服其見父之時當以何服此於禮無文但問喪有父在不杖之説可更檢疏議參訂之子之所生母死不知題主當何稱祭於何所祔於何所今法五服年月篇中母字下注云謂生巳者則但謂之母矣若避嫡母則止稱亡母而不稱妣以别之可也伊川先生云祭於私室禮記曰妾母不世祭於子祭於孫止又曰妾祔于妾祖姑既不世祭至後日子孫有妾母又安有妾祖姑之可祔耶不知合祭幾世而止此條未詳舊讀禮亦每疑之俟更詢考也妾母若世祭其孫異日祭妾祖母宜何稱自稱云何世祭與否未可知若祭則稱之為祖母而自稱孫無疑矣答李公晦所喻數條蘇氏逺慮之説只是譬喻未必專以地言謀道一章若取舊説則二語為復出矣兼又有以學求祿之嫌恐不若今文協而義精也知及仁守之説則是但此亦泛言如云知之非艱行之惟艱古之聖賢亦未嘗無此戒也恕之示義亦佳先儒訓詁直是不草草也正思所言覽之令人感歎偶其鄉人有在此者當轉致其家也至之一族𬒳擾非常極可念渠近日講論儘精細但前日忿不思難生此事端纍及無辜為可恨耳聞其敵近日遣人四出捕緝至有來此登門尋覔者惜不及知不得收縳送官耳近日章徐皇甫黃啇伯四章各出何人之手幸密批示答李公晦墓銘前巳為令叔言之矣若無此慮豈敢辭也子約之亡深可痛悼不知諸公能因此事惻然於中盡還諸遷客否如其不然舂陵之請適足為禍亦尚未見復之當即作書以力止其行耳近日蘇子曰日字疑任德翁文字當巳見之冝春之詬至今未知此近事之鑒也答李公晦所喻四説往歲在彼固皆聞之只是欠却明理説如東坡所謂不以火點終不明耳説詩近修得國風數卷舊本且未須出甚善答李處謙昨辱逺訪深以不獲一見為恨及得所留書而讀之益知賢者之有志慶閥之多才又重以為喜也大抵為學當以存主為先而致知力行亦不可以偏廢縱使巳有一長未可遽恃以輕彼而長其驕吝克伐之私况其有無之實又𥘉未可定乎凡日用間知此一病而欲去之則即此欲去之心便是能去之藥但當堅守常自警覺不必妄意推求必欲舍此拙法而必求妙解也答劉履之衰杇益甚思與朋友反復講論而外事紛擾不能如碩如履之者又相去之逺不得早晚相見為恨然此事全在當人自家著力雖日親師友亦須自做功夫不令間斷方有入處得箇入處却隨時遊心自不相妨雖應科舉亦自不為科舉所纍也答楊子順履正示喻具悉古人之學雖不傳於天下而道未嘗不在於人心但世之業儒者既大為利祿所決潰於其前而文詞組麗之習見聞掇拾之工又日夜有以滲泄之於其後使其心不復自知道之在是是以雖欲慕其名而勉為之然其所安終在彼而不在此也及其求之而茫然如捕風繫影之不可得則曰此亦口耳之習耳吾將求其躬行力踐之實而為之殊不知學雖以躬行力踐為極然未有不由講學窮理而後至今惡人言仁言恕言西銘言太極者之紛紛而吾乃不能一出其思慮以致察焉是惡人説河而井自渴死也豈不誤哉承許枉臨尚須靣論紛紛一本作紛紜答楊子順來書所論為學大意似巳得之但賢者本自會説説得相似却不為難只恐體之未實即此所説皆是空言不濟事耳又以後書孟子之説考之即前書所謂講明義理以為涵飬培殖之地者似若未精此處尚且未精則其本領工夫恐未免亦類此也孟子所云必有事焉乃承上文集義而言語脈通貫即無敬字意思來歷但反復讀之便自見得不假注釋矣明道之語却是借此四句移在敬字上説非解此章文義不若伊川先生之説為得本文之意然其解正字即是助長則亦未安記得一處説正之之甚遂至於助長此語却差近然猶有所未盡也若看得本文語脈分明而詳考集注以究其曲折子細識認見得孟子當時立意造語無一字無來歷不用穿鑿附會枉費心力而轉無交涉矣來書所云孟子不肯指認説欲學者體認此處喫緊工夫又云學者才要修身正心便是助長告子釋氏之學皆坐此爾又云但嫌於迂曲其文以從注釋此皆非是而第二條為尤甚請更詳之也答楊子順所喻數條皆善如克巳復禮工夫只是如此著實用力久之自然見效若只如此做間話説過則不濟事矣天下歸仁亦是略以其效言之非是便能使天下皆知吾之仁也但言若能如此則雖天下之大亦無異詞耳人稱不稱固非巳之所急但其效自必至此如食而飽飲而醉亦固然之理也云天下皆歸吾仁之中却是太作意説得張皇了仁義禮智是性之四德四端乃其發處乃所謂情也孟子論性而曰乃若其情則可以為善正指其發處以明其夲體之有是耳非直指四端為性也鍾磬有特懸者有扁懸者其特懸者器大而聲宏雜奏於八音之間則絲竹之聲皆為所掩而不可聽故但於起調畢曲之時擊其本律之懸以為作止之節其扁懸者則聲器皆小故可以雜奏於八音之間而不相凌也不知今世所謂大樂者其制如何但以理推之意古者當如此耳魂氣之説近之但便謂魂為知則又未可大抵氣中自有箇精靈底物即所謂魂耳正名一義乃可與權者之事今以常情論之決不能合不若且置勿論而於君臣父子大倫之正深致察焉則亦不待他求而其輕重取舍之暗當自知所處矣此亦食肉之馬肝不須深論也至於書中所説則狷忿之外加以猜防意思殊覺鄙陋此是氣質本不髙明寬廣又為學日淺未有得力處所以不免如此今且未論其他只夫子乘桴之歎獨許子路之能從而子路聞之果以為喜且看此等處聖賢氣象是如何世間許多紛紛擾擾如百千蚊蚋鼓發狂閙何嘗入得他胸次耶若此等處放不下更説甚克巳復禮直是無交涉也至之粗踈不如子順細密然此等處却似打得過正好相切磋也儀禮此間所編巳略定便遽未暇詳報亦恨賢者未能勇於自拔不能一來共加刋訂耳答楊子順謂一隂一陽之謂道巳涉形器五性為形而下者恐皆未然隂陽固是形而下者然所以一隂一陽者乃理也形而上者也五事固是形而下者然五常之性則理也形而上者也試更思之即可見矣答楊子順所示疑義若據易文即艮其背即止其所之義而伊川説作兩般恐非經之本指然其言止欲於無見乃非禮勿視勿聽之義於學者亦不為無用更思之答李寶之祭禮略看巳甚可觀但特牲第一條準前篇例合入祭義耳其他更俟詳考續奉報唯祭法及宗廟兩篇附諸篇後不見祭祀綱領恐須依向寫去者移在諸篇之前為祭禮之首但舊作兩篇太細碎今可只通作祭法一篇如此則王制一假周禮事鬼神示之曰及祭法夲文皆可全載不必拆開矣祭法禘郊祖宗更考國語去取又鄭注恐不可用次特牲次少牢次有司次諸侯釁廟次諸侯遷廟次祼獻易名甚當但前篇之例依儀禮本又皆自下而上故其序當如此次祭義內事此如來示合祭義祭統為之通言上下祭先之義故又加內事二字以别後篇次中霤次郊社次祭義外事此為中霤郊社兩篇之義其蠟祭等説亦附此此祭禮篇目也其他大傳外傳向巳附去者可并為之只此目中祭義內外二篇及中霤郊社二篇亦未編定幸并留念也禘郊祖宗之説公穀國語家語趙氏春秋纂例中説橫渠禮説皆當考也祭法祭義及遷廟附記三篇今附還可照前説重定為佳中霤郊社二篇可并編定其祭義內外事兩篇并處諸篇之後亦佳祭法內郊之祭也一章當入外事篇他皆放此答吳仲玭熹遲鈍之資總角聞道終躬求之未有得也賢者誤聽以為可與言者誨諭詳悉皆非熹所敢當也而令弟仲方判院之來又幸數得從容開警雖多然所未合者亦不少熹既以乍到疾病公私紛冗而匆匆遽歸之際仲方亦不甚佳遂不得竟其説至今以為恨也蓋道之體用雖極淵微而聖賢言之則甚明白學者誠能虗心靜慮而徐以求之日用躬行之實則其規模之廣大曲折之詳細固當有以得之燕間靜一之中其味雖淡而實膄其旨雖淺而實深矣然其所以求之者不難於求而難於養故程夫子之言曰學莫先於致知然未有能致知而不在敬者而邵康節之告章子厚曰以君之材於吾之學頃刻可盡但須相從林下一二十年使塵慮銷散胸中豁豁無一事乃可相授正為此也今觀來喻似於義理未有實見而強言之所以談經則多出於新竒立意則或流於偏宕而辭氣之間又覺其無溫厚和平斂退篤實之意是固未論其説之是非而此數端者巳可疑矣豈於先賢指示入道之方猶有所未講耶抑巳講之而用力有未至耶若熹之愚無以及此然荷不鄙不敢不盡其愚而又不敢摘一辭之未逹一義之未安以浼髙明之聽也區區拙直言不能文恕其僭率千萬之幸答吳斗南人傑竊伏山間久聞德義且知著述甚富每以未得亟見其人而盡讀其書為恨茲辱惠問并寄古易刋誤二書所以見屬之意甚勤且厚非熹淺陋之所能堪也比日春和敬惟撫字有相尊履萬福二書三復不能去手可謂極精慱矣鄙意尚有欲奉扣者迫此治行之冗未能盡布别𥿄略見一二幸復有以告之他書承許盡以見寄何幸如之但洪範詩樂二論尤欲早得之或其餘未能悉辦且先得此幸甚幸甚來書又謂方思所以收其放心而患於未有以自入此見髙明之志又將有意於古人為巳之學不但為言語誦説之計而巳區區不敏尤所敬歎蓋竊嘗謂今之人知求雞犬而不知求其放心固為大惑然苟知其放而欲求之則即此知求之處一念悚然是亦不待别求入處而此心體用之全巳在是矣由是而持敬以存其體窮理以致其用則其日增月益自將有欲罷而不能者矧以執事之明而加意焉則其見聞之慱參考之詳亦何適而非窮理之地哉如其不然則是直為玩物喪志而巳固知賢者不屑為此然熹之愚不得不為執事者慮之也感見與之勤不敢隱其固陋伏惟察焉旦夕南去相望益逺惟幾以時自愛亟膺召用時時書來慰此窮寂千萬之望别𥿄一夲作答吳斗南古易既畫全卦繫以彖辭又再畫本卦分六爻而繫以爻辭似涉重復且覆卦之法不知何所考據近歲林栗侍郎乃有此説然其法又與所論小異不知曾見其書否渠亦自以為先儒未發之祕則是古未嘗有是説也且如所論以用九為少陽用六為少隂如此則當為用七用八矣何九六之有乎此與啓蒙陋説正相南北不審今當定從何説因筆幸見喻也吕伯恭頃嘗因朝氏本更定古易十二篇考訂頗詳然據淳于俊之説便以今王弼易為鄭康成易嘗疑其未安今得所示分别鄭王二本乃看歸著甚善甚善然不知别有何證據也未有文字巳有此書謂有此理則可謂有此書則不可繫辭恐并彖辭亦是蓋彖繫於全卦之下而爻繇分繫於逐爻之下其經只是連書并在卦下不再畫卦如今所定之本也彖傳釋彖辭象傳釋爻辭繫辭傳則通釋卦爻之辭故統名之曰繫辭傳恐不可改繫辭傳為説卦蓋説卦之體乃分别八卦方位與其象類故得以説卦名之繫辭傳兩篇釋卦爻之義例辭意為多恐不得謂之説卦也大傳言繫辭者四今考其二上文皆兼卦爻而言恐不得專以為爻辭其一雖專指爻辭則爻辭固繫辭之一也其一為七八九六而言七八九六雖是逐爻之數然全卦七八則當占本卦辭三爻七八則當占兩卦辭全卦九六則當占之卦辭卦辭固不害其為繫辭也蔡墨謂乾之坤曰見群龍無首吉則覆卦之説有不可行者矣漢書刋誤固多熹所未講然其暗合者亦多但劉氏所斷句如項羽傳由是始為諸侯上將軍儒林傳出入不悖所聞者此類甚多皆與史記合恐當表而出之以見其非出臆斷唯為原廟渭北一條頃見一書廟渭之間有於字亦其明證但今不記此出處遍檢史記漢書之屬皆無之恐或記得幸批喻也劉氏所疑亦自有舛誤處如溝洫志第二條於楚字本文自屬下句下文有於齊於蜀字皆是句首而劉誤讀屬之上句乃不悟其非而反疑夲文之誤輔遺未之正也楚詞協韻一本納上其間尚多謬誤幸略為訂之復以見喻尚可修改也答吳斗南便中奉告感慰亡量比巳改歲竊惟履此泰亨倍膺多祉熹承攝於此忽巳踰年疾病侵凌無一日好况請祠不遂經界之役得請後時不可舉手少須三五月即復告歸矣世路艱棘不若歸卧田里以休餘年及人之事非復吾力之所及矣每誦先聖不夢周公之嘆未嘗不慨然也承受代改秩亦既有期甚以為慰不知諸公相知者為誰鼎之有實冝謹所之我仇有疾乃無尤耳前寄諸書竟未得細考然疑諸儒之説有不足信據者要當審擇而遴取之乃無誤耳今此所寄却得一觀恨讀書少未能有以上下其論然亦有一二疑處假開多事便人行速未暇一一奉扣姑録一二别𥿄奉呈幸一一批報頃見東漢討羌檄日辰與通監長歷不同又沈存中筆談所載朱浮傳引天作詩目今范書印本亦異不記前書曽奉問否今亦見𥿄尾幸併喻及也李彥平所見趙顔子不知何人莫是永嘉趙彥昭否其所論學大意甚佳然恐於窮理功夫有所未至則亦只冥行終不能升堂睹奧直入聖賢之域也裒集程門諸公行事頃年亦嘗為之而未就今邵武印本所謂淵源録者是也當時編集未成而為後生傳出致此流布心甚恨之不知曾見之否然此等功夫亦未須作比來深考程先生之言其門人恐未有承當得此衣鉢者此事儘須啇量未易以朝耕而暮穫也心不耐間亦是大病此乃平時記憶討論慣却心路古人所以深戒玩物喪志政為此也此後且當盡心一意根夲之學此意甚善今人陷於所長決不能發此聽信身心也佛學之與吾儒雖有略相似處然正所謂貌同心異似是而非者不可不審明道先生所謂句句同事事合然而不同者真是有味非是見得親切如何敢如此判斷耶聖門所謂聞道聞只是見聞玩索而自得之之謂道只是君臣父子日用常行當然之理非有玄妙竒特不可測知如釋氏所云豁然大悟通身汗出之説也如今更不可别求用力處只是持敬以窮理而已參前倚衡今人多錯説了故每流於釋氏之説先聖言此只是説言必忠信行必篤敬念念不忘到處常若見此兩事不離心目之間耳如言見堯於羹見堯於牆豈是以我之心還見我心别為一物而在身外耶無思無為是心體本然未感於物時事有此本領則感而遂通天下之故矣恐亦非如所論之云云也所云禪學悟入乃是心思路絶天理盡見此尤不然心思之正便是天理流行運用無非天理之發見豈待心思路絶而後天理乃見耶且所謂天理復是何物仁義禮智豈不是天理君臣父子兄弟夫婦朋友豈不是天理若使釋氏果見天理則亦何必如此悖亂殄滅一切昏迷其本心而不自知耶凡此皆近世淪陷邪説之大病不謂明者亦未能免俗而有此言也子合便人督書甚速草草布此手痛復作不能究所欲言何時靣談倒此胸臆正逺唯千萬自愛為禱答吳斗南所示廟議乃全用左氏臨于周廟一條為説然不知似此安排有何經據如髙祖以下通為禰廟巳非所安又皆以西為上乃後漢同堂異室之制無復左昭右穆之分非古法也若如江都集禮所載孫育之説却似可信而所示舊八廟圖近之不知是誰所定但其圖又以廟皆東向而以北為昭南為穆乃是室中祫祭之位而非廟制耳周有帝嚳廟禮書並無此文左傳亦無此説似難臆斷况僖祖只可比后稷又與帝嚳不相似如此牽合如熹之陋固不敢盡信况朝廷諸賢皆深於禮者恐亦未敢便依此改作也草木疏用力多矣然其説蘭蕙殊不分明蓋古人所説似澤蘭者非今之蘭澤蘭此中有之尖葉方莖紫節正如洪慶善説若蘭草似此則決非今之蘭矣自劉次莊以下所説乃今之蘭而非古之蘭也今並引之而無結斷却只辨得畦畹二字似欠子細又所謂蕙以蘭推之則古之蕙恐當如陳藏器説乃是若山谷説乃今之蕙而亦非古之蕙也此等處正當掊擊乃見功夫今皆如此放過似亦太草草矣荼恐是蓼屬見詩疏載芟篇故詩人與堇並稱堇乃烏頭非先苦而後井也又云荼毒蓋荼有毒今人用以藥溪取魚荼是其類則宜亦有毒而不得為苦苣矣如齊如飴乃詩人甚言周原之美舊室之悲如易之載鬼詩之童羖非荼實能井也熹讀書最少然見此類不能無疑者尚多則恐此書亦更少子細也若論為學則考證巳是末流況此又考證之末流恐自此不須更留意却且收拾身心向裏做些工夫以左右之明其必有所至矣若遂困於所長而不知所以自反則熹之愚竊為賢者惜之也因便奉報不覺傾倒勿過勿過南北相望未知見日千萬珍重以副碩言答輔漢卿廣示喻所疑足見探討不倦之意前時所報實有錯誤巳令直卿子細報去矣熹向於中庸章句中嘗著其説今并録去可見前説之誤也漢卿身在都城俗學聲利場中而能閉門自守味衆人之所不味雖向來金華同門之士亦鮮有見其比者區區之心實相愛重但恨前日相見不欵今又相去之逺無由面講以盡鄙意更幾勉力卒究大業答輔漢卿近況如何既失揚館之期後來别有相聚處否讀書既有味想見自住不得近看舊作諸書其間有説未透處見此略加刋削深覺義理之無窮也答輔漢卿所記鄙語亦有小小差誤處便中未暇詳報并所改書亦未暇寫寄不知近讀何書有疑示及此間今歲絶無人來只所招上饒某人早晚講論耳答輔漢卿知徙居寬曠不廢讀書足以為慰此間年來應接差簡然苦多病不能用力文字間又無朋友共講間有一二則其鈍者既難揍泊敏者又不耐煩有話無分付處甚思賢者相聚之樂也諸書無人整頓抄寄然改處亦不多但所録語儘有啇量恐非靣不能盡耳風力稍徑而此一等人多是立却不住千萬更加勉力以副所期餘祝自愛而巳柴中行聞報漕司考校之語其詞甚壯亦聞之否答輔漢卿年滿七十禮合休致又以罪戾不敢自上奏牘百端㦝禱僅得州郡申省狀一𥿄今託常寧遊宰附與邸吏投之巳子細寫與十弟更煩賢者同為分付此事或觸禍機不可知但巳斷置一切不計較矣恐有浮議相阻止者幸勿聽也比來看何文字做何工夫亦頗有進處否向所寄來册子方為看得一半其間亦有不足記者其小未備者巳頗為輔足矣後便方得寄去也精舍亦有朋友數人相聚李敬子胡伯量尚未去早晚頗有講説但每相與其恨賢者之不同此樂也只是禮書不能得成又以氣痞不可憑几恐此事又成不了底公案也省榜非久當出不知一畨朋友得失如何味道聞寓書館今尚留否耶其在彼者頗皆相見否當此時節立得腳定者亦甚難得人况更向上事耶答輔漢卿省闈不利亦是時節如此看此火色且得安坐喫飯巳是幸事豈可别有冀望耶承許秋涼相訪甚幸此箇道理功夫本不可有間斷時節目下雖無人講貫自巳分上思索體認持守省察自不可頃刻虛度如此積纍功夫則其間必有所大疑亦必有所大悟一旦相聚覿靣相呈如決江河更無凝滯矣今以謝致仕表附便去令十弟分付投下及更料理一二事渠相見必自説及恐有可疑合啇量處亦望與之剖決也昨承許借慱古圖甚欲見之但重滯如何得來可更試為籌度也答輔漢卿精舍有朋友十數人講學頗有趣仲秉甚不易逺來看得文字亦好但恨漢卿不同此會耳答陳思誠景思承喻為學之意與其所聞於師友而服膺弗失者甚慰甚幸然此乃近世所謂詭偽之學而斥去之者向來雖或好之今亦隱諱遁逃之不暇以賢者之門地聲迹蓋將進為於斯世者而乃有意於此何嗜好之異耶夫名實義利為巳為人之判正則之言是也但其所為者要當真實有用力處所不為者要當深自省察蚤戒而預逺之是乃所謂徴驗之實不然則提空名以鄉道而實無以自拔於流俗之所為則亦君子之不取也荷意之勤率易布此不識以為然否然勿以語人又千萬之懇也答陳衛道鞏疏示所見此固足以自樂賢於世之沉迷冒沒之流逺矣但猶有許多節次脈絡何耶然以釋氏所見較之吾儒彼不可謂無所見但却只是從外靣見得箇影子不曽見得裏許真實道理所以見處則儘髙明脫灑而用處七顛八倒無有是處儒者則要得見此心此理元不相離雖毫釐絲忽間不容略有差舛才是用處有差便是見得不實非如釋氏見處行處打成兩截也嘗見龜山先生引龐居士説神通妙用運水般柴話來證孟子徐行後長義竊意其語未免有病何也蓋如釋氏説則但能般柴運水即是神通妙用此即來喻所謂舉起處其中更無是非若儒者則須是徐行後長方是若疾行先長即便不是所以格物致知便是要就此等處微細辨别令日用間見得天理流行而其中是非黑白各有條理是者便是順得此理非者便是逆著此理胸中洞然無纎毫疑礙所以才能格物致知便能誠意正心而天下國家可得而理亦不是兩事也天生蒸民有物有則只生此民時便巳是命他以此性了性只是理以其在人所稟故謂之性非有塊然一物可命為性而不生不滅也蓋嘗譬之命字如朝廷差除性字如官守職業故伊川先生言天所賦為命物所受為性其理甚明故凡古聖賢説性命皆是就實事上説如言盡性便是盡得此君臣父子三綱五常之道而無餘言養性便是飬得此道而不害至微之理至著之事一以貫之略無餘欠非虛語也此話甚長非幅𥿄可盡然其梗槩於此可見不審明者以為如何因風示及有所未契尚容反復也答陳衛道示喻謹悉但今欲為儒者之學却在著實向低平處講究踐履日求其所未至所謂樂處却好且拈向一邊久逺到得真實樂處意又自别不似此動蕩攪䀨人也性命之理只在日用間零碎去處亦無不是不必著意思想但每事尋得一箇是處即是此理之實不比禪家見處只在儱侗恍惚之間也所云釋氏見處只是要得六用不行則本性自見只此便是差處六用豈不是性若待其不行然後性見則是性在六用之外别為一物矣譬如磨鏡垢盡明見但謂私欲盡而天理存耳非六用不行之謂也又云其接人處不妨顚倒作用而純熟之後却自不須如此前書所譏不謂如此正謂其行處顚錯耳只如絶滅三綱無父子君臣一節還可言接人時權且如此將來熟後却不須絶滅否此箇道理無一息間斷這裏霎時間壞了便無輔填去處也又云雖無三綱五常又自有師第子上下名分此是天理自然他雖欲滅之而必竟絶滅不得然其所存者乃是外靣假合得來而其真實者却巳絶滅故儒者之論每事須要真實是當不似異端便將儱侗底影象來此罩占真實地位也此等差互處舉起便是不勝其多寫不能窮説不能盡今左右既是於彼留心之久境界熟了雖説欲却歸此邊來終是脫離未得熹向來亦曽如此只是覺得大槩不是了且權時一齊放下了只將自家文字道理作小兒子𥘉上學時樣讀後來漸見得一二分意思便漸見得他一二分錯處迤邐看透了後直見得他無一星子是處不用著力排擯自然不入心來矣今云取其長處而會歸於正便是放不下看不破也今所謂應事接物時時提撕者亦只是提撕得那儱侗底影象與自家這下功夫未有干涉也鄙見如此幸試思之還説得病痛著否因來却見喻也中庸欲修改未得功夫然看文字亦不可如此一輥念過便只領略得儱侗影象不見裏靣間架詳密毫髮不可差處須是且看一書一日只看一兩假俟其通透浹洽然後可漸次而進也必竟之必恐當作畢答陳才卿前書所論方叔所説不同者只是渠以知覺為性此是大病後假所謂本然之性一而巳矣者亦只是認著此物而言耳本領既差自是不能得合今亦不能枉費言語但要學者見得性與知覺字義不同則於孟子許多説性善處方無窒礙而告子生之謂性所以為非者乃可見耳才卿所論中庸戒懼謹獨二事甚善但首章之説性或通人物或專以人而言此亦當隨語意看不當如此滯泥也蓋天命之性雖人物所同稟然聖賢之言本以修為為主故且得言人而修為之功在我為切故又有以吾為言者如言上帝降衷于民民受天地之衷以生不可謂物不與有孟子言我善養吾浩然之氣不可謂他人無此浩然之氣也又謂微細之物亦皆有性不可以仁義禮智而言微物之性固無以見其為仁義禮智然亦何緣見得不是仁義禮智此類亦是察之未精當更思之又謂所謂率性只就人物當體而言却欲刪去而言之三字此亦誤矣道只是性之流行分别處非是以人率性而為此道也謝氏天地不恕之論所説亦未當凡此之類有本不須致疑者但且虛心反復當自見得不必如此橫生辨難枉費詞説也答陳才卿子顔一室蕭然有以自樂令人敬歎看詩且如此亦佳大凡讀書須且虛心參驗久當自見切忌便作見解主張也玉山所説當巳見之若嫌離析即却教他揑做一團也所答守約書大槩得之更當虛心玩味當更純熟也離析下一本無即字答陳才卿秋試不逺計不免小忙然以義理觀之此亦當有處也來書所喻大率少寬𥙿之氣有徑急之心如此不巳恐轉入棒喝禪宗矣切宜省覺不可一向如此也子融看得文字痛快直截可喜想時相見正叔在此無日不講説終是葛藤不斷也答陳才卿方叔子融曽相見否方叔看得道理儘自穩實却是子融去歲在此講論多不合處中間蓋嘗苦口言之後來一向不得書不知能相信否似渠堅苦力量朋友間豈易得覺微有向外欲速意思便做出許多病痛學者於此豈可不痛加省察或因通書幸為致意答陳才卿詳來示知日用功夫精進如此尤以為喜若知此心此理端的在我則參前倚衡自有不容捨者亦不待求而得不待操而存矣格物致知亦是因其所巳知者推之以及其所未知只是一本元無兩樣工夫也答陳才卿新詩甚佳康節胸懷未易窺測須更於實地加功若只就之乎者也上學他恐無交涉也答陳才卿熹碌碌如昨但年老益衰已分上自未有得力處朋友功夫亦多間斷方以為憂而忽此紛紛遂皆不敢為久留計未知天意果何如也答陳才卿傳簿赴部何時可歸待次之間且勉其讀書為學亦非細事也熹今年足疾為害甚於常年氣全滿憑几不得緣此禮書不得整頓且看向後病勢又如何若有可奉煩者即奉寄也禮學是一大事不可不講然亦須看得義理分明有餘力時及之乃佳不然徒弊精神無輔於學問之實也答陳才卿知看儀禮有緒甚善此書雖難讀然却多是重復倫類若通則其先後彼此展轉參照足以互相發明久之自通貫也此間所編直卿及用之兄弟分去謄寫尚未送來熹以苦氣痞殊甚不能俯伏几案歲晚諸人或來即開正不免作數月功夫自聽對讀或可了也傳兄相聚看得甚文字想其家務不能專一不免小作課程而令其日有常度則積纍久之自見功效矣明年只在水北即亦相去不逺猶不廢切磋之益也子融日益孤髙深可歎羡一書却煩逹之答陳才卿精舍朋友往來不常早晚頗有講問之樂但病軀應接比之日前頗費力耳禮書得直卿劉用之在此漸可整頓然亦多費功夫甚恨相去之逺不得賢者之助也所示儀禮所疑此等處難卒説但看時隨手劄記向後因讀他處邂逅或有發明自不費力今徒守此一處反成擔閣虛度光隂不濟事也其他更讀何書子融相聚有何講論因筆及之所碩聞也答陳才卿熹衰病如昨加以患難今歲夏間復失一小孫秋來又有仲婦之戚悲傷之餘羸困益甚細讀來喻知亦有災患不知何故然亦深為怛然也示喻憂懼所奪工夫不進此亦别無他巧但得勉力向前爾答陳才卿正叔别後書來復有疑問巳詳報之託其轉寄才卿可便依此作日用功夫不須更生疑慮空費談説過却光隂也答陳才卿彼中相聚子弟幾人有可告語者否此亦時有朋友往來但難得身心純一功夫不間斷者耳答陳才卿所喻誠意之説只舊來所見為是昨來章句却是思索過當反失夲旨今巳改之矣正叔子融相聚纍日多得講論甚恨才卿獨不在此也諸書二兄處皆有本歸日必同觀有疑幸詳諭及康節文字二兄亦巳見之熹亦不能盡究其説只啓蒙所載為有發於易他則别成一家之學季通近編出梗槩欲刋行旦夕必見之然亦不必深究也答陳才卿熹衰晚甚幸復安外祠之祿深以自慶但使賢者為亂夢不無愧耳大學章句或問比復略修大旨不殊但稍加精約耳中庸亦更欲刪訂大抵舊書太冗也遇事固不當有所厭然謂欲放令此心疏豁無所執滯此却恐硬差排不得著意開放却成病痛但且守常程久之純熟自然疏豁乃佳耳子融説得樂意生香處甚痛怏但恐又轉入舊腔裏也答陳才卿正叔遽至於此令人痛傷人生虗浮朝不保夕深可警懼真當勇猛精進庶幾不虗作一世人也答余正叔示喻巳悉前日所論正為敬義工夫不可偏廢彼專務集義而不知主敬者固有虗驕急迫之病而所謂義者或非其義然專言主敬而不知就日用間念慮起處分别其公私義利之所在而決取舍之幾焉則恐亦未免於昏憒雜擾而所謂敬者有非其敬矣且所謂集義正是要得看破那邊物欲之私却來這下認得天理之正事事物物頭頭處處無不如此體察觸手便作兩片則天理日見分明所謂物欲之誘亦不待痛加遏絶而自然破矣若其本領則固當以敬為主但更得集義之功以祛利欲之蔽則於敬益有助蓋有不待著意安排而無昏憒雜擾之病上蔡所謂去却不合做底事則於用敬有功恐其意亦謂此也正叔本有遲疑支蔓之病今此所論依舊墮在此中恐亦是當時鄙論不甚分明致得如此故今復如此剖析將去使正叔知得鄙意不是舍敬談義去本逐末正欲兩處用功交相為助正如程子所謂敬義夾持直上達天德自此者耳今亦不須更生疑慮别作啇量但請依此實下功夫久逺純熟便自見得也前日三詩首篇計功程字是大病根而其下亦未見的實用功得力之處後二篇亦未見踐言之效只成虗説尢犯聖門大禁大槩皆是平日對塔説相輪慣了意思致得如此須是勇猛決烈實下功夫力救此病不可似前泛泛悠悠虛度時日也答余正叔示喻日用工夫甚副所望然前者所論未嘗欲專求息念但以為不可一向專靠書册故稍稍放教虛間務要親切自巳然其無事之時尤是本根所在不可昏惰雜擾故又欲就此便加持養立個主宰其實只是一個提撕警䇿通貫動靜但是無事時只是一直如此持飬有事處便有是非取舍所以有直內方外之别非以動靜真為判然二物也上蔡之説便是如此亦甚要切但如此警覺久逺須得力爾千萬且於日用間及論語中著力令有個會通處即他書亦不難讀爾答余正叔熹一出無輔幸巳還家又幸奉祠遂請且得杜門休息間讀舊書雖葵藿之心不敢弭忘然踈逺之分亦不敢不安何也别後讀書觀理復增勝否熹歸家只看得大學與易修改頗多義理無窮心力有限奈何奈何唯需畢力鑽研苑而後已耳答余方叔大猷所喻别𥿄奉報幸更思之有所未安復以見告講論不厭精審方見義理之真然亦須是虛心平氣方能精審若以一時粗淺之見便自主張即無由有進處也大猷竊謂仁義禮智信元是一本而仁為統體故天下之物有生氣則五者自然完具無生氣則五者一不存焉只是説及夲然之性先生以為枯稿之物亦皆有性有氣此又是以氣質之性廣而備之使之兼體洞照而無不遍耳天之生物有有血氣知覺者人獸是也有無血氣知覺而但有生氣者草木是也有生氣巳絶而但有形質臭味者枯稿是也是雖其分之殊而其理則未嘗不同但以其分之殊則其理之在是者不能不異故人為最靈而備有五常之性禽獸則昏而不能備草木枯稿則又并與其知覺者而亡焉但其所以為是物之理則未嘗不具耳若如所謂才無生氣便無此理則是天下乃有無性之物而理之在天下乃有空闕不滿之處也而可乎他説皆得之但謂敬只是防去此等以復於理語意未切須知敬即此心之自做主宰處更冝用力即自見得也答趙恭父師惠書得聞為學之志固巳甚幸又觀所論條日甚詳皆學者通患顧非親曽用力不能知耳大抵只是主敬功夫不至致得間斷但日用間常自提撕勿令昏惰則久久自長進矣答趙恭父所示諸説備見用意之精然看得皆過髙不平穩若一向如此説即非唯令人解經不得雖聖賢亦無開口處凡有言語皆為剩物矣又説日用間似見光景不覺喜悅此亦非好消息且宜就平實明白處看道理是非久之自然開明安穩無凝滯也儀禮文字却好致道一篇巳入注疏他時諸篇皆當放此或所附之文有難曉者亦當附以注疏也致道告歸甚令人作惡此間事渠能言之更不縷縷渠認得門路却不錯但恐未有勤懇積纍工夫凡百更相勸勉為佳耳答趙恭父謹終追逺遊氏曰終者人之所易忽也而謹之逺者人之所易忘也而追之厚之至也竊意遊氏意恐指凡事而言非專為喪祭而發夫顙泚非為人愴悽非謂其終之當謹逺之當追是皆天理人心不能自巳非若凡事玩於常情故終謹於始而及其終也往往易以忽為近及逺也往往易以忘非謂下元夲空一字其一本作蓋聖人之言為衆人發非專為賢者發也故其所言皆理之所當然而人多不能然者若皆如來喻則世間更無偝死忘先之人不待堯舜而比屋常可封矣曾子亦不須説此兩句程子亦不當兼説喪祭也富貴是人之所欲一章恐亦不可小看看此自非顔閔以上工夫至到者恐未易言看文字只虛心隨文平看豈有所説本小而須作大看之理此章之指更宜深玩方見實用力處原思為之宰疑亦以類相從而别為一章未詳此類亦多分得不同如仲弓子桑顔淵子路不曽分子賤子貢回也冉求却分了蓋一時失於點對然非大義所繫不能易也要之不若皆析為二乃佳賢哉回也章集注云今不敢妄為之説某竊疑下克巳復禮之云巳煞為學者説破却似剩著此語不曾説樂處如何所樂何事也用之則行舍之則藏章竊疑唯我與爾之與是訓同則誰與吾不與之與是訓許故竊以為恐難合作一章詳集注意夫子行三軍必與巳同意子路自謂若行三軍則舍我復誰同耶但覺得氣象太粗暴若作兩章而不害其相蒙則字義既明而氣象亦不覺至如此也分章巳見前説但與字恐難作兩般説子路問得粗暴是其氣象如此雖作兩章然粗暴亦只在也況彼之粗暴吾又安能追而抑之耶吾止吾往也竊意文義恐吾者聖人自吾也若如所解即句內字數不足聖人之言不如是之造作竒巧也君子不以紺緅飾注云君子謂孔子下文蘇氏曰此孔子遺書雜記曲禮非特孔子事比二義兼存以待學者之自擇未有一定之説集注解回也其庶乎屢空章言其近道又能安貧也竊疑又字似作兩截蓋樂道故能安貧而安貧所以樂道也世間亦有質美而能安貧者皆以為知道可乎更思之論篤是與章集注云云詳此文義恐只是説不可以言取人下文又言不可以貌取人何也色莊便是兼著貌字祭義深愛和氣一節承上文孝子之祭不詘不愈不欲等語而發非獨為敬齊之色一句也其下乃迤邐雜記孝事未必為祭發也所編者但取其相關者附之經下其全篇且與泛存祭統先於祭義亦無害也鄉飲酒義謹按此篇自鄉飲酒之義而下先儒以為記鄉大夫飲賔于庠序之禮自鄉飲酒之禮而下先儒以為記黨正飲酒于庠序以正齒序之位今詳考其文由前之説則有所謂古之學術道者將以得身也云云固足以見賔興之意由後之説則有所謂六十者坐五十者立侍以聽政役之類亦足以證序齒之事但某竊疑儀禮所載鄊飲只是鄉大夫興其賢能而以禮賔之不知説禮者何取於黨飲而記為是義據鄭注云漢郡國以十月行此飲酒蓋取黨正之説然則自鄊飲酒之禮而下豈自成一章之文乃世儒𫐠其所以有取於黨正之義而因以傳益之耶淺陋未得其説此無他義只是作記者并舉之耳燕義首載庶子官一節未詳據文勢恐當以諸侯燕禮之義為篇首而置庶子官一節於篇末乃成文耳當如此內則一篇文理密察法度精詳見古先聖王所以厚人倫美教化者無所不用其全某疑中間似有難看處如飯黍稷稻梁止大夫於閣三士於坫二一節與上下文似不相蒙豈特載此因以著夫貴賤品節之差耶又凡養生止玄衣而養老一節疑王制文重出不然亦豈先王之成法因子事父母而達之天下以及人之老哉又曾子曰孝子之養老也止至於犬馬盡然而況於人乎一節雖承上章養老之文而云然此篇既曰后王命冡宰降德于衆兆民則是古昔盛時朝廷所下教命恐不應引到曽子之言疑是他簡脫誤在此耳又凡養老五帝憲止皆有惇史一節疑錯簡恐或當在上文玄衣而養老之下又淳熬止以與稻米為酏一節亦疑錯簡恐或當屬上文冬冝鮮羽膳膏羶及雉兔皆有芼之下自此外數節上下井井有條獨此未易曉暢養老一節舊亦疑之似當削去曽子惇史兩節亦然但説飲食處未知如何更詳考之所削去者亦須别收勿使漏失某比在侍側見余正甫云奔喪投壼兩篇可輔儀禮之闕心甚喜之近見禮記釋文引鄭氏篇目注獨此二篇注云實曲禮之正篇也餘皆否某竊詳謂之正篇則非先儒雜記之文又按儀禮疏云儀禮亦名曲禮又禮器注云曲禮謂今禮也禮篇多亡本數未聞某謂鄭氏所謂今禮即指儀禮而言然則可輔儀禮之闕似無疑矣內則附昏禮後作傳文亦善少儀附相見禮則疑未安蓋其間數節見少儀巳編入本篇矣餘為雜記恐不足以相證而徒足以相亂耳未知是否禮經殘缺可疑者不能一二數凡此非敢泛然煩瀆師聽但據眼前編集文字因致愚慮於其間理既有疑問不容巳自餘不惟不敢肆其狂斐即亦未暇及悉告尊察少儀亦是無收附處且因篇首之言而附之耳若以為疑不知却合如何區處幸批報也答趙恭父所論數條皆善然當實用其力乃見意味徒為空言雖多無益也大學或問所改首尾兼該本末具備若只讀一半截便下注腳宜其不能不有偏倚之疑也鄙意却嫌全提直指四字近禪學語未暇改也又論亦有真知而自欺者此亦未然只此自欺便是知得不曽透轍此間昨晚有嘗鼠藥而中毒者幾致委頓只此便是不曽真知砒霜能殺人更何疑耶然又不是隨衆略知之外别有真知更須别作道理尋求但只就此略知得處著實體驗須有自然信得及處便是真知也所説退人一步低人一頭者此則甚善致道恐亦不可不聞此説可更相勉勵今巳是不得巳而從官唯有韜晦靜默勿太近前為可免於斯世耳一或不幸為人所知便不是好消息也答趙恭父所論大學則似不必如此致疑此等大槩諷詠略見經意以助知新之功耳如此拘滯却成支蔓而墮於異學之所訶矣要之淇澳言其明德而可以新民以見明德之極功烈文因言非獨一時民不能忘而後世之民亦不能忘以見新民之極功自是語勢當然況又無可疑耶親賢樂利上四字皆自後人而言下四字或指前王之身親賢或指前王之澤樂利又皆毫分縷析無可疑者可試考之當自見得也答趙恭父道心雖微然非人欲亂之則亦不至甚難見惟其人心日熾是以道心愈微也人之所以為人以其有是性耳若云性之所以為性則語意太重復矣君子之時中與索隱行怪兩章未是可更將章句反覆體認不須便如此立説也體群臣子庶民子字與吕説不異體字雖小不同然吕説大意自好不欲廢也勸者所以致吾親愛之心而慰悅其意也親親似多一字然非大義所繫不能深論也前知之説章句中説得巳自分明經綸大經立大本似亦是看得章句未熟知逺之近亦不必如此迫切却有不實之病知風之自一句尤無著落須看交寬平著實乃佳耳大學若從物格上看下去即不可不如此之意甚少更詳之答趙詠道熹求道不力衰晚無聞辱問之勤不知所以為報然少嘗聞之天下有正理唯慱學審問謹思明辨不先自主於一偏之説而虛心以察衆理之是非乃可以自得於一定之説而無疑若得一先入之言而媛媛姝姝自以為足便謂天下之美無易於此則不唯不足以得天下之正理亦歸於陋而巳矣胡子曰學欲慱不欲雜欲約不欲陋此天下之至言也願明者以是思之若曰佛老之説衆人亦知其非豈以彼之明智而肯取以為用此殆侏儒觀優之論今固未論有見於吾道者之如何但讀近歲所謂佛者之言則知其源委之所在矣此事可笑非靣見極談不能盡其底裏然為學之𥘉便欲窮其説之是非而去取之則又恐緑衣黃裏之轉而為裳也如涉大水渺無津涯要當常以聖賢之言為標準則不至於陷矣令弟致道在此相聚數月雖未能悉力鋭進亦似頗識為學之門戶經由必能具道此間曲折凡此所末及言者可問而知不暇盡布也答趙致道師夏所疑理氣之偏若論本原即有理然後有氣故理不可以偏全論若論稟賦則有是氣而後理隨以具故有是氣則有是理無是氣則無是理是氣多則是理多是氣少即是理少又豈不可以偏全論耶答趙致道周子曰誠無為幾善惡此明人心未發之體而指其巳發之端蓋欲學者致察於萌動之微知所決擇而去取之以不失乎本然之體而巳或疑之以謂有類於胡子同體而異用之云者遂妄以意揣量為圖如后此明此證惡幾周子誠幾善幾胡氏誠幾之意之説善幾善惡雖相對當分賔主天理人欲雖分派必省宗孽自誠之動而之善則如木之自本而幹自幹而末上下相達者則道心之發見天理之流行此心之本主而誠之正宗也其或旁榮側秀若寄生龐贅者此雖亦誠之動則人心之發見而私欲之流行所謂惡也非心之固有蓋客寓也非誠之正宗蓋庶孽也苟辨之不早擇之不精則客或乘主孽或代宗矣學者能於萌動幾微之間而察其所發之向背凡其直出者為天理旁出者為人欲直出者為善旁出者為惡直出者固有旁出者橫生直出者有本旁出者無源直出者順旁出者逆直出者正旁出者邪而吾於直出者利導之旁出者遏絶之功力既至則此心之發自然出於一途而保有天命矣於此可以見未發之前有善無惡而程子所謂不是性中元有此兩物相對而生又曰凡言善惡皆先善而後惡蓋謂此也若以善惡為東西相對彼此角立則是天理人欲同出一源未發之前巳具此兩端所謂天命之謂性亦甚汙雜矣此胡氏同體異用之意也此説得之而圖子有病巳略改定更詳之四子言志一條程子曰夫子與點蓋與聖人之意同便是堯舜氣象使子路若達為國以禮道理却便是這氣象也何也蓋為國不循理道則必任智力不任智力則循理道不能出此二途也曽點有見乎發育流行之體而天地萬物之理所謂自然而然者但吾不以私智擾之則天地順序而萬物各得其所此堯舜事業也子路則以才氣之勝自以為雖當顚沛敗壞不可支持之處而吾為之亦能使之有成子路誠足以任此矣然不免有任智力之意故志意激昻而氣象勇鋭不若曽點之間暇和平也然不曰理而曰禮者蓋言理則隱而無形言禮則實而有據禮者理之顯設而有節文者也言禮則理在其中矣故聖人之言體用兼該夲末一貫若曽點則見其體而不及用識其本而違其末所以行有不掩而失於狂歟得之上蔡云佛氏之言性如儒者之言心釋氏之言心如儒者之論情蓋釋氏以作用者為性而儒者以主宰為心所以相似也釋氏以緣景而生者為心儒者以感物而動者為情所以相似也大要釋氏不識理故其言遞低一級故雖欲歸於清淨寂滅而卒不能離乎形而下者也然雖遞低一級而僅相似即其僅相似者實大不同何也其於作用則不分真妄而皆以為真其於感物則不分真妄而皆以為妄儒者則於其中分真妄云耳此其大不同也大槩亦是荀子言性惡禮偽其失蓋出於一大要不知其所自來而二者亦互相資也其不識天命之懿而以人欲橫流者為性不知天秩之自然而以出於人為者為禮所謂不知所自來也至於以性為惡則凡禮文之美是聖人制此以返人之性而防遏之則禮之偽明矣以禮為偽則凡人之為禮皆反其性矯揉以就之則性之惡明矣此所謂互相資也告子祀柳之論則性惡之意也義外之論則禮偽之意也亦得之答趙致道人心道心一章其上三句只循中庸章句敘説看未有所疑所謂允執厥中之中不知指何者而言若言時中恐於提綱挈領處未遽及此若言未發之中則所謂人心道心正是因巳發而言兼未發之時亦難以言執今欲於人受天地之中上看未知可否程子曰惟精惟一所以至之允執厥中所以行之如此則所謂允執厥中正時中之中矣惟精惟一正是提綱潔領處此句乃言其效耳程子言仕宦奪人志或言為富貴所移也愚意以為不特言此但才仕宦則於窒礙處有隨宜區處之意浸浸遂入於隨時徇俗之域與𥘉間立心各别此所謂奪志也不知程子之意果出於此否又不知人未免仕宦而有此病又何以救之敢乞指誨所論奪志之説是也若欲救此但當隨事省察而審其輕重耳然幾微之間大須著精彩也晦庵先生朱文公文集卷第五十九終考異答汪叔耕來書上有熹扣首啓前此人還奉書草草深以未得面論為恨專人至此荐辱枉書獲聞新歲以來起居佳勝為慰少儀亦是無收附處一無收字福州府儒學訓導鄭璉校正
