body:
  text: 奏狀按唐仲友第四狀貼黃奏為續根究知台州唐仲友不法事件及藏匿偽造官會人蔣輝實迹乞付外照勘伏候聖旨仲友所印四子曽送一本與臣臣不合收受巳行估計價直還納本州軍資庫訖但其所印幾是一千來本不知將作何用伏乞聖察奏狀內第十四項係藏匿偽作官會人蔣輝詐妄行移首尾情節伏乞聖慈詳賜省覽此項係仲友舍匿死罪亡命姦人蔣輝詐妄行移首尾情節乞賜詳覽即知仲友所犯非獨贓私小過而巳伏乞聖照臣竊見仲友本貫婺州近為侍御史論薦又其交黨有是近臣親屬者致臣三奏跨涉兩旬未奉進止深慮本人狡猾别有計會兼恐所司觀望或致滅裂切乞聖明照察嚴賜戒勑施行具位臣朱熹臣因巡歷至台州見唐仲友委有不公不法事件巳於前月二十七日具録奏聞仍將一行干連人送紹興府根勘乞詔有司毋得觀望嚴賜根究依法施行以為郡守貪殘之戒臣連日又據人戶陳訴仲友不法事件略行審究有旋行供到情實數條及本州公庫簿曆雖為仲友收藏追索不出今據監庫官司理王之純旋尋撿到仲友拘收不盡草簿干照年月亦不接續遂令庫子葉志具出仲友有非法支用數目巳多及據宜人趙氏狀訴故夫鄭槐昨任江東提刑日曽按劾仲友罪狀後來寄居台州仲友到任懷恨不巳不支俸錢百端凌辱以致飮氣身死仍繳到當時劾章內事件亦是多遣軍兵逺出禁地以捉酒為名掠其所有財物抑勒人戶輸納十年虧欠和買役錢拘占民船抑載官綱至有子告母姦弟訴兄濫取受關節著意究治種種無狀事迹一切不異於今日之所為足以見其貪縱刻薄本於天資而長惡不悛日增月益以至於今遂肆然為無所忌憚之意上欺君下虐民而專以陛下所付千里刑賞之柄為立威收貨娛悅婦人之具臣前所奏雖巳略陳其大端今既得其實狀請托其一二冒死奏聞以質前言之非妄欲望聖慈略賜省覽降付所委推勘官司照應催促疾速勘結毋得少有觀望庶幾可以少攄千里神人鬱積之憤惟是言語媟瀆非所宜道於君父之前臣不勝大懼伏惟陛下哀憐裁赦須至奏聞者一據庫子葉志等供草簿內仲友於公庫支錢二萬八千六百一十六貫六百八十二文送惠與人內一千四百八十二貫二百六十三文送妻兄及與第二兒婦之父何知縣何教授何宣教兄弟係淳熙八年二月止淳熙九年四月簿內支破一據葉志等供草簿內仲友以官錢開荀楊文中子韓文四書即不見得盡饋送是何官員一據葉志等供草簿內仲友以公庫錢六百九十九貫五十二文買暗花羅等與弟子嚴蘃等製造衣服其嚴蘃等亦巳供招件數在案分明一人戶張見等狀訴仲友與弟子行首嚴蘃情涉交通關節及放令歸去今據通判申於黃巖縣鄭奭家追到嚴蘃據供每遇仲友筵會嚴蘃進入宅堂因此密熟出入無間上下合千人並無阻節今年二月二十六日宴會夜深仲友因與嚴蘃踰濫欲行落籍遣歸婺州永康縣親戚家説與嚴蘃如在彼處不好却來投奔我至五月十六日筵會仲友親戚高宣教撰曲一首名卜算子後一假云去又如何去住又如何住但得山花插滿頭休問奴歸處五月十七日仲友賀轉官燕會用弟子祗應仲友復與嚴蘃踰濫仲友令嚴蘃逐便且歸黃巖住下來投奔我遂得放令逐便嚴蘃緣與仲友密熟有兄周召充黃巖縣欄頭因𬒳監官何承節窘拾行打知得妹嚴蘃出入宅堂凡事喜美信據遂托嚴蘃寫信令人力計會傳逹仲友乞辭退攔頭等事仲友遂作訪聞追上何承節并周召等六名於七月二十一日赴州出頭押下當直司供責仲友作周召不供何承節事情為由當廳免斷差陳敦押下縣放罷其何承節等至今知在未曽結絶嚴蘃又供據臨海縣貼司徐新等因差在城外二路及在城總店賣酒不行並是陪錢送納見經本縣陳狀備申本州乞免賣酒許嚴蘃錢一百貫文省託囑仲友免賣徐新先將銀盞七隻付嚴蘃作當候得判免備錢收取嚴蘃將銀盞三隻就廟弄丁官人家典錢一十二貫足用過後仲友與免總店賣酒徐新令人力將錢三十貫文足係嚴蘃同母收受付還銀盞四隻却將三隻典貼與徐新自備本利錢取贖通計受過錢四十二貫二百四十文足嚴蘃及弟子朱妙入宅打囑仲友免斷楊凖藏伉弟子張百二事許錢一百貫文并受過青紗冷衫假水線魚鮝等供責是實一據弟子行首王靜供元係長行弟子每遇祗應筵會多在宅堂出入無間今年三月內因公筵勸酒遂與仲友男十八宣教踰濫自後往來不絶五月二十一日十八宣教借馬三匹與王靜嚴蘃沈玉乘騎仍將官會五道與王靜支散馬下人至二十三日行首嚴蘃落籍是主靜囑十八宣教稟覆仲友輔充行首仍是十八宣教將官會五十貫文與王靜支分使用并送毛假一丈四尺及曽將蓮花紗一匹扇子一柄曲二十册係學院子金璉送與王靜作人事至六月十八日王靜移過廟弄嚴蘃舊屋居住節次是十八宣教到家宿卧至四更回州因此外人得知多有犯事人託王靜關節説與十八宣教得錢使用供責是實一據道士李沖虛供本房道童丁希言兄丁全充院虞候仲友遣往寧海縣追散樂弟子王醜奴張百二入州祗應內張百二不到將丁全枷送州院根勘取受結案斷配先憑沖虛告覆十八宣教後再託弟子王靜關節據王靜供丁全憑鄧十二付官會三十貫文託王靜入宅打囑十八宣教除學院子金璉並韓百九抽退官會六貫文外王靜得官會二十四貫文還得從輕作杖一百勒罷科斷供責是實一婦人李六娘狀訴仲友非理追勘與道士王永昌有情涉弟子王靜同弟子鮑雙與李六娘入宅打囑仲友長男十八宣教今據王靜供寫批與十八宣教告仲友又蒙將李六娘封案王靜受過錢二十貫文省鮑雙受銀盞四隻錢十一貫文足推司蕭受銀盞二隻巳追索銀盞六隻寄收州庫訖六月內書表司丁志學院子金璉到王靜家言説有相知董承信妻李氏與應楊犯姦公事送司理院結絶今逐人在外和會欲得免斷許王靜錢一百貫文王靜寫批囑託十八宣教後蒙杖罪贖銅兵士謝榮欲差充學院子許王靜錢五貫文囑託十八宣教王五七囑託王靜稱姊夫左永因事送當直司結案許王靜官會一十貫文將金褁叉二隻作當王靜並與囑託十八宣教供責是實一人户潘牧狀繳到仲友長男十八宣教親書寫批子與弟子王靜打囑周士衡理分公事與錢五十貫收下質庫批當分明巳據王靜供係朱十九助教相託王靜委曽入宅計囑上件批子係仲友長男令金通引送與王靜供責是實一據弟子王靜供仲友姪三六宣教同十八宣教到王靜家飲酒及與弟子沈玉情涉據沈玉供三六宣教先與弟子林瑩散樂弟子劉醜踰濫今年五月內因宴會方與三六宣教踰濫自後往來不絶五月二十一日三六宣教借馬與乘騎得錢五貫文與直馬人支分緣此多有犯事人託打囑關節得錢使用五月內貼司王敦仁得會子一十道囑託仲友蒙給帖補充帳司人吏并鮑卜妻許錢二十貫文説與三六宣教囑託仲友刺軍并三六宣教令學院子姓董人送真紅紗一匹白蓮花紗一匹青扇一柄曲二十册與沈玉作人事供責是實一鐵匠作頭林明投白𥿄令當廳供係本州差在教場內打造軍器內仲友私打造衣甲二副湯瓶三十三隻鍮石頭盔二副並係官中鐵炭工力仲友收受入巳曽支食錢三貫文酒六瓶作送到犒設仲友男亦曽令私打竹節鐵鞭一條監造官林路分亦各私造鐵甲頭盔一副湯瓶十二隻雜物五十餘件箭三百隻并差待缺官邢判院同監造亦私自造刀斧箭交掎數目已多又怒林明不與依數打造凡九次斷決小杖路分曽遣兵士張顯入行衙計囑林明據林明張顯供責是實一仲友有婺州鄰人周四本名花康成會放煙火妻能下棊仲友招來每有宴會以煙火撮藥為名支給錢酒仍是仲友令男十八宣教令兵士劉德等與放單本索子於諸司公吏倉場庫務及臨海縣并縣官廳吏弓手牙人等率斂錢物及康成日逐出入阿劉入宅無間上下觀望從此有犯事人託打關節據花康成供仲友筵會凡三十二次使放煙火下棊共支官庫錢一百三貫文並酒二百一十七瓶計價錢四十三貫二百九十文足并率斂索子錢得錢三百貫文并曽為威果兵士祝信犯酒送當直司寄禁司理院抑勘行打管營結案該配將官會二十五道託虞候陳送與唐十八宣教得免罪名并吳信供母阿朱并弟吳益與鄰人李念一交爭投廂解州送當直司却追出在室兩妹吳六娘吳九娘枷禁勘姦承行人林木要錢一百貫打關節吳信將金叉一隻金褁叉三隻銀盞三隻作當方得將母并弟兩妹各勘杖八十內二妹封案吳信將錢三十貫七十陌付林木并曽先托花康成阿劉并花康成受人吏陸侃引領寧海縣朱秀理庫本錢事將銀子計錢一百貫并馬一匹連鞍直錢一百貫與仲友姪三六宣教收受入巳朱秀并將官會十五道與花康成又五十道與陸侃并松門寨兵士謝興不伏差使解州康成取錢三貫囑託十八宣教説與仲友將謝興止押下本寨交管花康成取受院虞候陶顯錢三貫文囑託十八宣教差往天台縣催稅花康成受弟子何蕙官會一十貫囑託令妹抵替回縣花康成受東陽縣陳客官會五貫文囑託仲友姪三六宣教令案吏出引監索人頭少欠紗錢花康成取受仙居縣公人王富官會一十貫計囑十八宣教説與仲友放令回縣免罷各供責是實一據城下天慶觀道士祝元善供與陳百一娘有姦事發送州院禁勘結録下法司檢斷決脊扙十三還俗託曹縣丞打囑仲友至今不曽科斷見令元善起建蓋竹洞屋宇曹縣丞受本人丹砂二百餘粒及黃士龍與承信郎黃復妻互行通姦送司理院根勘欲具情犯申尚書省係仲友親兄慈溪宰關節便行放出供責是實一據本州通判備應世榮家狀解到仲友親戚高宣教綿五籠并人力張四等二名遂送司理根問來歷據司理院申巳申州牒兵官追捉高宣教緣本人藏閃宅堂卒未出獲及備據夏稅場專揀張元亨等供七月十二日是本場專知陸侃家人陸允稱知州宅高宣教有綿四百屯作空鈔使印候親戚曹縣丞上場交稱緣提舉出巡到州未曽交納寄留應世榮家今稱計二十七貫八百四十文重並係下等不中粉藥綿每兩市價直錢一百文若納官將鈔出賣每兩得錢三百文共合得錢百三十五貫二百文張元亨看驗其綿不曽經官投稅其四百屯又合納勘合頭錢一百六貫七十文雖係孫澄於鈔靣使交錢印訖即未見齎錢入庫及根問高宣教買綿錢據公庫合干人陸斌等供五月二十三日仲友令於公庫支錢一千貫付什物庫手分陸侃收買接官絹更不曽收附什物庫曆徑付仲友親戚高宣教將去其高宣教止於七月初一日買到輕怯大絹一百十八匹高價估錢入庫計四百九十貫九百六十五文省盡將變染作從物使用其餘錢五百餘貫即未見買到物件又據李沖虛狀陳首高宣教寄下羅一十匹紗五匹及據百姓夏松狀首高宣教寄下羅一十匹紗一十匹又據開茶店百姓蔣三乙狀首高宣教寄下紗一十匹及弟子嚴蘃供高宜教與弟子行首張嬋曽在書院踰濫其高宣教見事發覺隱避宅堂不伏出官供責是實一據丁志供本州有開字匠蔣念七名輝係婺州人事人事疑當作人氏因偽造假會斷配台州蒙本州拘入書院同陳顯開文字續婺州差人緝捉蔣輝為偽造官會知州令蔣輝家屬具狀經州陳論婺州差來人打折蔣輝手骨將差來公人送下州院禁勘勒令招伏放令公人回歸婺州自後令蔣輝在宅軃閃宿食事臣遂索本州元行遣婺州追蔣輝公案見得婺州義烏縣差弓手劉興貼司劉儀帶親弟劉保及樓二齎縣牒并申狀前來台州及臨海縣與兵馬司投下勾追蔣輝照勘見禁黃念五等偽造官會公事劉興等恐蔣輝逃走先捉下蔣輝方敢投公文被蔣輝同伴周安先覆仲友令同蔣輝妄論被劉興等打損傷骨仍令醫人徐浩妄作驗狀稱肩并背脊脅腳手並皆打損及傷骨蹉跌仍令蔣輝男亞德具狀稱被打傷重人命難保仲友妄作差趙成忠抄劄口詞虛立一重案卷却差獄子朱先追義烏縣差來人劉興等枷項收禁逼作打損蔣輝傳鋪押回本縣仍將臨海縣同追弓手金信張臯斷罪勒罷妄作將蔣輝用藥醫治牢固知管却又作去年九月二十九日差兵士王張押蔣輝前去婺州義烏縣交管其蔣輝即不曽發遣又詐作王張逃走並係假作行遣及義烏縣申提刑司轉運司及婺州回牒到本州催追並不發遣止作根捉王張將帶家屬逃走不見回報臣昨令本州通判勾追乃就州治後門捉到蔣輝據供淳熙四年在廣德軍偽造會子四百五十道在臨安府事發斷配台州至淳熙七年十二月十四日同黃念五在婺州蘇溪樓大郎家開偽印六顆并寫官押及開會子出相人物造得成貫會子九百道與黃念五等分受於去年二月初回歸八月十二日婺州義烏縣弓手前來追捉嚲閃在府衙中藏隱是實臣照對蔣念七既偽造會子發覺乃是死罪亡命之人婺州義烏縣前來追捉仲友幣人奪回却妄作打損收留醫治仍假作兵士姓名管押發遣逃走藏匿州治不知仲友身為郡守乃敢蓄養此輩亡命造差姦人意欲何為其蔣輝臣巳押送紹興府司理院欲望聖慈特賜指揮嚴加鞫治必得其情一據婺州東陽周大雅並許與供於六月二十三日前來參謁仲友在王八家安歇周大雅送皺紗二匹許與送金條紗二匹與仲友作人事仲友差學院子李錫兵士葉旺當直時復出入州衙書院六月二十九日同仲友男十八宣教並姪三六宣教往王靜家飲酒因外人囑託關節七月內有獄子陳敦許錢二十貫文囑託十八宣教出引往黃巖縣追人及受外縣弟子許韻等五名錢一百貫文放歸本縣並李錫許錢二十貫文囑託親情俞安敗敗字疑當作販酒事李錫又許錢四十貫文託刺廂軍二名并馮顯因事被禁在獄馮顯母許錢一十貫文及將錢二百五十文慿手分馬澄就官庫打供筵酒一十瓶往弟子施韻家飲喫踰濫供責是實一據王定狀訴書表司丁志抄寫假會係蔣輝雕造及仙居縣張應龍狀論丁志取過見錢巳行下本州令將丁志送司理院禁勘緣蔣輝先巳發遣往紹興府取勘丁志隱諱未伏供招旋據承認去年十二月因張應龍載糯榖二十石過浮橋捉住係黃勉囑託丁志取受張應龍錢六十貫文九十六陌丁志告覆仲友遂得踈放丁志又曽同學院子葉薷等五人并擦浴兵士打囑十八宣教刺打甲軍兵一十名蒙送路分廳保明內吳信招到九名丁志招到徐明一名得刺軍關節二十貫文九十六陌衙前甘淵許丁志官會二十貫討差充軍資庫專知供責是實一據朱綽然供五月內同張將仕韓天與往弟子許韻家飮酒與石提轄交爭追送當直司招伏仲友勘罪朱綽然憑表兄方禮將官會三十貫文託僧義玗過送與十八宣教並將官會五十貫文託手分陸侃送與高宣教得免斷贖銅十八宣教又受道士李沖虛琴一靣供責是實一仲友非法科罰人戶追納贓賞錢致令小民監繫日久無可送納遂追到財賦司人吏郭起張諤鄧莊截日終具到有周念五等一百七十六戶未納酒麴賞錢一千五百八十二貫五百六十二文有王十二等一百三十六戶未納雜色贓錢四千五百四十七貫四百九十九文有諸軍等一百八十六户未納贖銅錢一百三十六貫二百三十文正此歉歲委是不應監納巳具單名并出榜市曹盡行除放如官吏輒敢仍舊催索别容按劾聞奏一仲友身為郡守當此歉歲不能存恤飢民乃促限催稅以寧海縣押録林僅拘催夏稅遲慢斷配本州牢城致得本縣人戶流移至今不絶臣巳於前奏具述又據本州通判趙善伋申據本州阿鄭狀訴夫邵文係院虞候今年正月抱患請假在家押番潘寅差院虞候林益往龍泉縣追會公事因販私鹽走閃本州更不受理取覆在假被開拆司人吏應褒什物庫陸侃執覆知府雷例配本州牢城不當檢照並無論訴委是羅織罪名本州巳給據付邵文改正訖又據婦人阿王狀男盧宗係崇節指揮兵士六月內因與兵士張立作閙妄經三務陳首到家捉酒決脊杖二十斷配嚴州不當阿王經提刑行衙畨理被本州將孫盧杲又作受過仙居縣典石端三十貫文決脊杖十五配本州牢城不當臣遂送本州兩通判根究據申追人吏蕭籕等供招委是元斷不當看詳盧宗盧杲據干連人供證委無過犯強勒供招遂致決配情實無辜本州巳改正出給公據付盧宗盧杲照證著役仍移文嚴州放還盧宗又據臨海縣長樂鄉人戶沈三四王細九張四八狀各住鄉下地名迹村江次取州五十來里即非禁地內人戶七月初九日驀有船三隻係酒務腳子楊榮等到家捉酒沈三四等為天旱雇覔人工車水雖有些少白酒喫用即不曽將出沽賣即被捉押及將各家衣物搬去拷打抑令供認罰錢三百八十貫緣無從出被酒務專匠林椿陳明等妄作沈三四等在州界內賣酒本州並從徒罪斷遣監納贓錢無可送納乞行根究臣遂送本州通判趙善伋根究施行據申喚到酒匠林椿腳子楊榮供本務以課利沽賣遲細本州日拘納錢三百二十貫文緣天氣亢旱禾稻失收細民闕食遂致發賣酒貨不行緣本州拘定額錢稍或違欠官吏得罪不免於在城造販私酒之家搜捉罰令納錢補趂課利本務探問有沈三四等家在禁界外逐人薄有家産當用工車戽田畒之時須有造下酒貨是林椿同專知陳明前去捉獲勒令逐人罰錢以助課利不納解州作徒罪科斷追犯酒賞錢本州通判趙善伋點對委是於州界外捉酒騷擾巳從徒罪斷遣目今尚行監繫追納賞錢當此荒旱百姓不得安業巳將陳明等從杖一百科斷內陳明勒罷又據臨海縣義城鄉柯煥狀因今年正月內爭分𬒳伯敦義計會開拆司人吏林木傳狀入宅堂簽押誣告煥令人力吳五七等行打女使及伯敦義被冒役推司蕭籕迎逄判府私意枷絣栲訊勒令供招改送司理院勘結將煥及母阿童各斷徒刑情實枉屈乞行根勘事臣遂送本州主管官根究依法施行未到今訪聞柯敦義與柯煥父壽祺係親兄弟巳曽分戶年深緣柯敦義自行廢蕩復誣賴弟壽祺物産本州取受關節不與理斷柯壽祺經省部及漕司陳訴仲友怒其畨理緣柯壽祺未歸故將其妻阿童并男柯煥非理煆煉並科斷徒罪闔郡之人莫不憐之按仲友在本州二年凡非理窘拾人户用刑輕重盡出私意並不遵守法令不法不公莫此為甚聞者莫不切齒一據本州通判趙善伋申七月二十八日據諸指揮衆軍等狀自淳熙八年十月二十四日二十五日至目今支散五指揮軍兵糙白米每名𬒳專斗就厫裏各減退八升以致軍人缺少口食無處告訴不知上件減退米歸著去處今來日下支散八月衆軍冬衣聞得街巷皆言本州盡將納到堪好夏稅綿絹擔前去婺州換到粗綿紕絹各家老小委是狼狽重念衆軍等如有些小情犯到州盡𬒳𣢾司將本身家糧全分開閣以致老小缺食難以存活乞備申施行臣巳牒兩通判根究嚴行止約不得作弊右謹録奏聞伏候勑旨按唐仲友第五狀具位臣朱熹臣猥以踈賤叨𬒳使令雖衰病之餘精力不逮而驅馳勞瘁不敢頃刻自安者誠以陛下知遇之深而思有以仰報萬分也今者不幸不得其職臣實有罪無所逃刑然有血誠敢勤天聽臣昨在紹興府道間聞得台州守臣唐仲友催稅刻急民多流移即於七月十九日具狀奏聞至二十三日入本州界又得其實再以狀奏至二十七日又得其貪汙淫虐蓄養亡命事狀數件復具條奏竊謂聖明威斷必不容貸雷霆震擊將不旋踵而側聽兩旬未奉處分仲友始者自知罪贓應死亦甚惶恐此數日來忽復舒肆追呼工匠言語譸張至以弟子嚴蘃繫獄之故中懷忿切公遣吏卒突入司理院門拖拽推司亂行捶打其狂悖無忌憚之氣悻然不衰及至本州結録引斷蘃等罪案仲友又遣客將張惠傳語通判趙善伋云巳得指揮差浙西提刑前來體究未可引斷竊詳上件事理元係本司奏劾若有指揮合是本司𬒳受本司既無𬒳受仲友何緣聞知便敢傳布意欲施行觀此氣象若非有人隂為主張擲語消息仲友罪人何敢遽然如此是則不惟臣竊惑之而此州闔境千里前日歡呼鼓舞之民莫不人懷疑懼凛乎如虎兕之將復出於柙也臣伏見仲友本貫婺州其亡弟之妻王氏見隨仲友同在郡舍仲友近日又為吏部尚書侍御史所薦而其支黨共為貪虐之人又皆臺省要官子弟親戚况仲友為人隂狡有素事窮勢迫干求請託何所不為竊慮以此之故黨援衆多曲為掩蔽使臣孤忠無路上逹有以仰纍日月之明兼衢婺明州災傷極重而處州士民近亦告急臣欲自此遍走諸州計度救荒事務而台州之人以仲友未罷恐其一旦復出為惡邀留臣車不容起發臣遂不免申尚書省且任本州恭俟奏報竊慮違程日久按行遲緩有失數州飢民之望仰貽陛下宵旰之憂靜言本末由臣愚暗見事遲晚既不能及早按劾致留天誅又不能阿徇權豪共為欺蔽有此二罪難以復居官次顧以本路飢民阽於溝壑未敢自劾謹復具此曲折昧死奏聞欲乞睿斷先將仲友早賜罷黜付之典獄根勘行遣以謝台州之民然後申詔攸司議臣之罪重置典憲以謝仲友之黨臣不勝幸甚干犯天威無任恐懼戰灼之至須至奏聞者右謹録奏聞伏候勑旨貼黃臣竊詳今來所奏事理若果如唐仲友所得消息巳降指揮委官體究恐亦止是文具蓋其所犯非得清強獄官嚴行根究無由見得情實其見禁人若行放出知在亦恐漏泄巳勘獄情事屬不便伏乞聖照别賜施行乞罷黜狀貼黃奏為恭稟聖訓疾速起發及論紀綱頽壞乞留聖慮等事伏候勑旨具位臣朱熹臣今月十四日凖尚書省劄子備奉聖旨據臣奏知台州唐仲友罪狀并仲友劄子訴臣不合搜捉轎簷驚怖弟婦王氏心疾甚危等事又據檢正左右司申擬欲從朝廷送浙西提刑司委清強官一員依條前去體究指實聞奏其台州守臣唐仲友既巳改除江西提刑欲乞劄下新知台州史彌正星夜疾速前去之任仍具起發月日申尚書省小貼子稱今來若從所擬欲乞劄下提舉朱熹照會外契勘浙東州郡旱傷去處稍多合委提舉官躬親巡歷相度若不先期措置竊慮失時欲乞劄下提舉朱熹疾速起發前去相視八月五日三省同奉聖旨依檢正左右司看詳到事理施行劄付臣者臣所按仲友罪狀實迹近於八月八日八月十日又巳兩次具奏伏想巳徹聖覽臣不敢重疊陳述仰勤聖聽今來仲友所訴事件乃是監司按發贓私作過官吏常程行遣臣即不敢過有凌逼其仲友弟婦王氏門族貴盛正仲友所恃以為姦者臣初不曽令人驚怖亦不曽聞有疾病呼醫問藥臣之所以久留台州只緣憂慮仲友逞憾報復殘虐吏民欲候新知本州史彌正到來交割即行今彌正巳到俟其一兩日間交割州印臣即便恭稟聖旨依檢正左右司看詳到事理日下起發不敢稽留外再念臣雖孤賤叨𬒳使令今者所按巨姦贓汙戾虐衆所共知而未蒙朝廷依凖常法略賜行下至於所擬委官體究一節竊意只是欲與拖延旬月等候赦恩且令奏薦子弟然後迤邐從輕收殺如此則是臣不唯無復顔靣可以號令諸州使之悉力推行荒政而自是以往郡縣之吏復有貪殘不法肆毒害民如仲友者未審在臣合與不合按劾朝廷合與不合行遣如臣愚暗實有疑焉然以臣之私計而言則唯有收迹朝市逺避權豪可以少遂初心克全素守而臣謹巳昧死上奏乞賜罷免必蒙開允以保餘齡顧獨惟念方今連歲旱災星文失度正是朝廷之上君臣相戒修明賞罰以敬天怒恤民隱之時而交黨蔽欺紀綱頽壤至於如此臣雖不肖誠竊痛之敢冒鈇鉞效其狂愚伏惟陛下深留聖慮無以此事為小而匆之則臣雖被戮無所復恨干冒天威臣不勝震懼惕息之至須至奏聞者右謹録奏聞伏候勑旨又乞罷黜狀貼黃奏為臣職業隳廢蹤迹孤危乞賜黜責伏候勑旨具位臣朱熹臣昨審究到知台州唐仲友罪狀實迹於八月八日具狀奏聞又以七月內節次所奏未蒙朝廷盡法施行續於八月十日十二日兩次具奏乞賜睿斷將臣罷黜伏想悉巳仰關聖聽今來臣巳於十八日恭稟聖訓依檢正左右司所申起離台州至二十二日入處州縉雲縣界訖纍日以來恭俟威命未有所聞竊伏自念職業既隳難叨寵祿孤危巳甚大懼中傷兼以久苦眵昏健忘腸澼之疾近日愈甚省閲文書區處事務乘馬坐轎皆有所妨委實不堪奔走往來幹當職事欲望聖慈哀其狂妄早賜黜責以安愚分臣不勝幸甚須至奏聞者右謹録奏聞伏候勑旨貼黃臣伏為今者按發唐仲友遂與宰相侍從臺諌皆有妨嫌巳覺州郡解體不復稟承約束竊恐將來難以自效有誤使令伏乞聖慈早賜處分申尚書省劄子具位朱熹熹緣按知台州唐仲友姦贓罪狀不蒙施行職業既隳難叨廪祿孤危巳甚大懼中傷兼以衰病支離不堪奔走巳具奏聞乞賜黜責伏望朝廷特賜敷奏重作行遣不勝幸甚須至供申右謹具申尚書省伏候指揮按唐仲友第六狀具位臣朱熹臣九月四日凖尚書省劄子據臣前奏知台州唐仲友催稅刻急及有不公不法等事奉聖旨唐仲友罷新任者臣昨來具奏仲友罪狀巳蒙朝廷委送别路官司體究方慮失實自取罪戻不謂乃蒙陛下奮發睿斷特賜施行不唯足以仰見大明之下邪正洞分而所以鎮撫台州千里之民紓其憤疾之氣者抑又甚厚臣於當日又取會到紹興府司理院勘到情節如臣纍奏頗有實狀若使將來體究官司依公閲實仲友之罪固無所逃但臣又側聞巳蒙聖恩改除臣别路差遣伏緣未有被受未敢具奏謝恩陳情懇祈罷免然實深慮將來臣既去官之後章奏無因得關聖覽體究官司不無觀望或至變亂白黑以惑天聽敢復掇其一二大者條奏以聞伏惟聖慈赦其僭瀆留神省覽臣不勝大幸須至奏聞者一據台州公使庫手分馬澄供唐仲友任內據客將陳庚周式夏公明并書表司楊楠每月寫單曆供送官員等特送折酒折茶等錢係楊楠徑就庫子葉志邉請取前去收買海味等支送親戚有付書簿可照及南果京果海味等物入宅有支送錢物具出帳狀唐仲友自淳熙八年三月初五日止淳熙九年六月初十日共支過錢一萬九千五百二貫三百二十三文送與陳宣教等如去年閏三月二十八日支錢一十貫文支送新鎮江府諸軍糧料院薑大夫辭赴任發路折酒錢係是著實支送並不曽具入前項帳內且澄所具出支送錢物帳狀委不知唐仲友曽不送與官員一據台州書表司楊楠供去年三月內唐仲友呌楠指揮我到任鄉里官員相知並無送惠口點官員士人六七員姓位今具單狀公庫支送折酒錢數內一員一十五貫或一十貫或五貫湊及五十貫具單判送本庫關取會子封角同書就書院供納自後或二日一次或三日一次或五日一次類及五十千取呈批判就庫關取會子封角并書係楠齎入書院交納今將付書簿逐一拖具除實送外內唐仲友虛作送與官員邵朝議等納入書院共九十項計官會四千六百四十五貫所有馬澄具出帳內其餘項目及恐有漏落名件供具未盡及唐仲友更有令客將夏公明陳庚林實周式張惠及本司李瑀各别有承受指揮寫單支送官員楠不知名件并唐仲友開雕荀楊韓王四子印板共印見成裝了六百六部節次徑納書院每部一十五册除數內二百五部自今年二月以後節次送與見任寄居官員及七部見在書院三部安頓書表司房并一十三部係本州史教授范知録石司户朱司法經州納𥿄兌換去外其餘三百七十五部內三十部係表印及三百四十五部係黃壇𥿄印到唐仲友逐旋盡行發歸婺州住宅內一百部於二月十三日令學院子董顯等與印匠陳先等打角用箬籠作七擔盛貯差軍貟任俊等管押歸宅及於六月初九日令表背匠余綬打角一百部亦作七擔用箬籠盛貯差承局阮崇押歸本宅及一百七十五部於七月十四日又令印匠陳先等打角同别項書籍亦用箬籠盛貯共作二十簷擔夯係差兵級余彥等管押歸宅分明一據台州公使什物庫專知陸侃供去年十二月間唐仲友關支軍資庫絹二百匹令染鋪夏松收買紫草就本州和清堂染紫造做宅堂帳幔應干牀幃設大卓衣及支散人從衣衫等物內除從人衣衫著用外有其他什物蒙唐仲友令三六宣教用黃巖竹籠六隻盛貯般入宅堂排辦念九宣教娶新婦用及去年十二月間娶新婦弟妓散樂並重造新衫係公庫馬澄徑支錢收買婺州羅回歸就和清堂令馮四等變染真紅係唐仲友令客將林實喚上弟妓嚴蘃等具名就書院親自看㨂俵散及今年六月初十日唐仲友親戚高一宣教就公庫馬澄邉支錢一千貫文前去收買新知府從物絹帛於七月初一日旋交納到絹一百一十八匹變染做造外有其餘錢即不見買到物帛亦不見回納公庫并去年十二月間三次共關錢三百貫文省支買宅堂什物及做造罣罳二把并打造竹簾新婦行嫁動用等祗備念九宣教娶宅眷及自去年止目下支錢收買竹籠一百五隻麻布四百匹做造布袋盛貯物色使用并支在官零絹做袋袋五色果盤圈大小九百箇及支錢收買竹木做造細竹衣籠二百隻并今年正月十五日元宵設醮係公庫徑支錢往婺州收買黃蠟做造蠟燭有剩下四兩三兩二兩蠟燭七百八十條係三六宣教令邵客用𥿄打角在西書院大橱內安頓不曽遞出燒點一據登仕郎應世榮供於七月內有唐仲友親戚高宣教將帶箬籠盛貯絹并綿前去報恩庫下安歇過幾日只見般箬籠五隻盛貯綿前來出賣其高宣教問世榮稱説要出賣綿世榮言説此回行市未好賣其高宣教言説不然將上件綿與縣丞説過送納了出賣見成抄與人戶開銷令世榮問城下攬子顧九祝十三毛三十沈二其衆人説但納得綿得見成抄將錢買開其時為納綿未得高宣教却問州中人討書往黃巖縣去又問見禁人楊楠不肯寫書與高宣教世榮七月二十六日得知高宣教却將公使庫官錢買到大絹并綿除大絹去什物庫交納外見有綿五籠安寄在家世榮巳於七月二十七日具狀作世榮名齎上件綿五籠隨狀經本州通判陳首蒙解送提舉行司訖一據蔣輝供元是明州百姓淳熙四年六月內因同巳斷配人方百二等偽造官會事發蒙臨安府府院將輝斷配台州牢城差在都酒務著役月糧雇本州住人周立代役每日開書籍供養去年三月內唐仲友呌上輝就公使庫開雕楊子荀子等印板輝共王定等一十八人在局雕開至八月十三日忽據婺州義烏縣弓手到來台州將輝捉下稱𬒳偽造會人黃念五等通取輝𬒳捉欲隨前去證對公事仲友便使承局學院子董顯等三人捉回仲友台旨你是弓手捉我處兵士你不來下牒捉人當時弓手押回奪輝在局生活至十月內再蒙提刑司有文字來追捉輝仲友使三六宣教令輝收拾作具入宅至後堂名清屬堂安歇宿食是金婆婆供送飲食得三日仲友入來説與輝稱我救得你在此我有些事問你肯依我不輝當時取覆仲友不知甚事言了是仲友稱説我要做些會子輝便言恐向後敗獲不好看仲友言你莫管我你若不依我説便送你入獄囚殺依是配軍不妨輝怕台嚴依從次日見金婆婆送飯入來輝便問金婆婆如何得𥿄來本人言你莫管仲友自交我兒金大去婺州鄉下撩使􅤮頭封來次日金婆婆將描模一貫文省會子樣入來人物是接履先生模樣輝便問金婆婆言是大營前住人賀選在裏書院描模其賀選能傳神寫字是仲友宣教耳目當時將梨木板一片與輝十日雕造了金婆婆用藤箱子乘貯入宅收藏又至兩日見金婆婆同三六宣教入來將梨木板一十片雙靣并後典麗賦樣第一卷二十𥿄其三六宣教稱恐你間了手且雕賦板俟造𥿄來其時三六宣教言説你若與仲友做造會子留心仲友任滿帶你歸婺州照顧你不難輝開賦板至一月至十二月中旬金婆婆將藤箱貯出會子𥿄二百道并雕下會子板及土朱靛青棕墨等物付與輝印下會子二百道了未使朱印再乘在箱子內付金婆婆將入宅中至次日金婆婆將出篆寫一貫文省并專典官押三字又青花上寫字號二字輝是實方使朱印三顆輝便問金婆婆三六宣教此一貫文篆文并官押是誰寫金婆婆稱是賀選寫至十二月末旬又印一百五十道今年正月內至六月末間約二十次共印二千六百餘道每次或印一百道及一百五十道并二百道直至七月內不曽印造至七月二十六日見金婆婆急來報説你且急出去提舉封了諸庫恐搜見你輝連忙用梯子布上後墻走至宅後亭子上𬒳趙監押兵士捉任押赴紹興府禁勘一台州人吏鄭榛共唐仲友節次支行公庫官錢送委婺州唐十二宣教收買銀子抵還糴本庫借支米本錢作糴本銀起發除買到銀子徑赴買銀場交稱係攢司章奎馬禮交收附簿及支發起綱亦係逐人并各案見得實數外尚有續次支去錢二千貫未曽買到銀子緣公庫收支簿曆干照於內多有不明盡係唐仲友收藏入宅今來馬澄齎到排日收支官會草簿細數見在乞勒本人詳細供具及有關買物帛泛費名件亦乞令馬澄同什物庫專知陸閈逐一銷破便見欺弊右謹録奏聞伏候勑旨貼黃臣伏覩近者劉焞宇文子震妄用官物聖斷赫然中外震悚今仲友所用官物不減二人而自盜入巳畜養亡命偽造官會之屬又二人所無有顧乃獨蒙寬貸臣竊有所未喻伏乞聖照臣契勘在法監司按發公事不得送置司處蓋防本官於所勘獄情輒有干預今紹興府雖係臣置司處臣自按發之後見在巡歷不曽回司所勘獄情無容得有干預伏乞聖照乞蠲減漳州上供經總制額等錢狀具位臣朱熹伏覩本州昨凖本路提刑司牒凖尚書省劄子臣僚劄子陛下龍飛正位施實德于民比因臣下有請諸州縣經總制及月樁版帳錢悉議裁減然朝廷雖行蠲減而州縣之巧取於民者自若欲乞行下諸路提刑司應州縣日前以經總制月樁版帳為名巧作色目科斂民錢以足額者嚴行禁止則朝廷所減為及民之實惠矣四月二十一日奉聖旨依及凖安撫諸司牒凖尚書省劄子臣僚上言蠲減之數郡實私之而縣之督責於民者如故乞令諸路監司與州郡公心商議缺乏縣道如崑山常熟之類寬融減放必不得巳則聞之朝廷量與蠲減各限一季聞奏監司則開具一路所當減之州守臣則開具一州所當減之縣仍各要見所減名色錢數若干庶幾灼然實惠及民四月二十四日奉聖旨依奏臣伏讀前件兩次所降指揮有以仰見皇帝陛下盛德至仁勤恤民隱至於偏州下邑亦無不欲其蒙𬒳堯舜之澤者甚大惠也然以臣所領一州四縣觀之則雖無月樁一項之輸而諸色上供及經總制無額等錢或全無窠名或收不及額其間亦有州郡巳為抱認代納而諸縣猶或不免違法科罰以足其數者就中漳浦一縣缺乏狼狽尤不可言竊意崑山常熟之類其窘未必至於此也今者本州雖蒙聖恩蠲免經總制額一千貫省然諸縣日前此色官錢除實收外所欠常數千緡以郡計之則又不啻二萬餘貫今者所減雖巳不為不多然逐縣所得在欠數中僅及二十餘分之一若以此故便欲禁其科罰猶恐尚為虛文况欲遽見其所減放名色之若干乎至於諸色上供全無指擬則前此又未嘗有以聞者州縣官吏以此二弊私憂竊歎以為不知何時可免斯苦今者乃幸遭遇仁聖憂勤憫惻至於如此而臣於此時適叨委寄得與一季開具聞奏之列若不能罄竭所聞以稱明詔則臣雖死且有餘罪臣竊計度本州財計以及諸縣所無者固無可言所有者名色亦多不正其為曲折固未易以一言盡今若得蒙聖慈且將州縣所認折茶錢罷科荔枝龍眼乾錢抱認豐國監鑄不足鉛本錢七千六十四貫及近年通判趙不敵所增經總制無額錢四千七百五十四貫特賜蠲減則諸縣事力庶幾稍可支持而日前科罰之弊亦可漸行禁戢但欲便見其所減之名色錢則恐朝廷所為蠲減之數實未為多未容責效如此之速臣謹具條畫前件所陳兩項利害如後須至奏聞者一臣契勘本州上供錢物一歲之數通及四萬餘貫除一萬七千餘貫買銀五千兩解發又有大禮年分銀一千兩該錢三千五百餘貫不在常年解發數內外一項折茶錢七千貫一項罷科龍眼荔枝乾錢四千貫係逐年尚書戶部隼崇寧太觀上供錢物格符下樁辦又一項名為抱認建寧府豐國監鑄不足鉛本錢其數亦一萬六千貫雖無省符行下然逐年登帶省司帳狀不可分文違欠三色總計二萬三千餘貫是皆無復根原來歷之可考亦無戶眼窠名之可催從前只是本州多方那兌一歲僅能趲得一萬二千貫錢起發而其餘一萬一千四十貫則以敷下諸縣措置解補向來州郡費出有經縣道亦有寬餘可以樁辦以故移東補西未覺敗缺近年以來州郡增添寄居待缺宗子孤遺養老歸正等官歲所支錢比之往時日有增廣以此州郡窘匱而縣道急迫日以益甚無復贏餘可以補趂雖於紹興乾道年中兩次蒙朝廷將上件三色上供錢盡數撥下本州應副左翼軍口食馬料及忠順官驛料支遣其錢雖不起發然皆是逐月掯定之數期限促迫尤不可緩而縣道所解住往愆期至乾道五年漳浦一縣趂辦不行州郡不免將其所認錢數減下三千九百七十六貫州郡自行抱認於是本州椿辦之數遂成一萬五千九百七十六貫而諸縣所敷猶各不減二千餘貫合三縣共為七千六十四貫縣道既無贏餘可積又無窠名可催官吏且欲避免一時州郡督責則不過因民之訴訟而科罰之甚則誘人以告訐而脅取之州郡聞知稍行禁約則諸縣便以籍口不肯留心趂辦州郡不免又將别色官錢那兌輔足為州郡者憚其如此則遂一切聽其所為不復何問不唯非理違法妄取民財之可罪而民之負冤苦而訴於官司者皆無自而得其平矣前後守臣不知其幾目擊此弊能不動心顧以數目浩大别無計策可以幹旋朝廷又無蠲減之意是以不敢遽然有請今幸議臣建白聖明開納許為蠲減而臣獨幸得遭此時其敢不以實聞而力請之乎然上供錢內所有二萬餘貫買銀之數臣固不敢輕議其三色錢內本州樁辦一萬五千九百七十六貫之數臣亦未敢自請故前所奏只乞聖慈明詔有司且將諸縣所敷七千六十四貫特賜除罷却於本州合發别項朝廷錢內照數截撥添揍應副前項左翼軍忠順官等支遣則庶幾州粗有以恤縣縣粗有以恤民而海隅蒼生惸獨鰥寡亦可以少𬒳聖主發政施仁之澤矣一臣契勘經總制錢不當立額不待知者而後知也蓋其出於倉庫出納田宅契劵之所收者雖可約計其大槩然財計有時而虧盈物價有時而高下則其數巳有不可得而凖者又况所謂無額錢者元無一定窠名可以摏辦其多少不可得而預知故其創立之初直以無額名之則其不當立額也雖至愚亦知之矣而比年以來悉皆立額比較蓋緣紹興十九年中推行經界人戶多有白契不堪照用爭出投印致得當年經總制錢所收增羡遂有無狀小人獻此殘賊之計一時朝廷既為所誤而其流毒至今未巳此本州經制之額所以至於二萬四千六百五十一貫者蓋以紹興二十三年之數為凖也總制之額所以至於五萬五千六百七貫者蓋以紹興二十八年之數為凖也然此其所以為凖者又非當年自然收到之實數皆是後來督責追補之虛額而一時朝廷決意施行官吏不敢爭執遂以至今逐年收趂不上常虧一二萬貫至於無額之額則立法以來只以遞年為額為錢不過五千三百一十二貫而巳隆興二年通判趙不敵者妄意希賞創立北溪稅場於數十里外逺收竹木之稅又於買納上供銀寶收回出剩價錢多方督迫趲得四千七百五十四貫以充其數於是無額之額遂增至一萬六十六貫遞年收趂不上所虧亦不下六七千貫州縣無計可為則亦兌那科罰如前項所以趂辦上供之術而巳而又重以守倅皆有磨勘之賞下吏相與希意迎合故其督責無藝冒昧不顧又非别色官錢之比使仁人君子坐視民之狼狽而不知所以為䇿亦有年矣今幸外廷之議偶及於此得與諸州例蒙蠲減而本州不幸獨以遞年發足之故所減不及百分之一此蓋任事者未知遞年所以不曽拖欠正以官吏無狀避罪希賞不能仰體聖朝愛民厚下之本意不顧郡計之盈虛民情之苦樂既巳增立虛額於前而又強為登足於後也且其所取之數若彼其多所減之數如此其少分之諸縣至有僅得五十千者是曽不足以當其平日所罰中人一家之數而論者遽欲責其盡除日前科罰之弊又望其便見蠲減名色若干之實其亦難矣故臣前所奏欲乞聖慈且將近年通判趙不敵所增四千七百五十四貫者特賜蠲減庶幾州縣稍稍有以相恤百姓不至大段受害至於此錢不當立額之本末則臣昨因賜對嘗獲靣陳伏蒙至尊壽皇聖帝深加獎納然臣於是時尋即去國以故不聞有所施行今亦未敢出位犯分輒有所陳但望聖慈博采群議更加詳酌拔本塞原以幸天下臣不勝大願右件如前謹録奏聞伏候敕旨貼黃臣到任之初刷具本州逐年起發經總制及無額錢數實收之數極多不過七萬五千貫而補發之數多至二萬五千餘貫其輔發者並是州司兌那發納以故昨來版曹比較歲額無欠而議者不知其然便為本州事力有餘不肯多與蠲減然考纍年以來實收之數日少而代納之數日多亦足以見州郡事力日就空竭加以數年恐亦無以為州而自為崑山常熟之不暇固不能有以恤其縣而縣之不恤其民將益甚於今日矣臣不敢以此繁碎凂瀆聖聰謹巳别具細數單狀申尚書省如蒙聖慈哀憐特賜宣索除依今來所乞減下無額錢數外更令有司於淳熙十六年十一月二十五日減無額數內將經總制兩項正錢比倣他州所欠分數再與蠲減不勝幸甚條奏經界狀具位臣朱熹凖尚書省劄子備奉聖旨指揮令臣相度漳州先行經界事聞奏者臣衰晚迂踈無所能似猥蒙聖恩卑以郡級靜惟僥冒常懼無以補報萬分今者乃幸遭逢聖朝不忘遐逺推行仁政首於二郡以臣適守是邦使得與討論之列其為慶幸何可勝言臣自早年即為縣吏實在漳泉兩郡之間中歲為農又得備諳田畒之事竊見經界一事最為民間莫大之利其紹興年中巳推行處至今圖籍有尚存者則其田稅猶可稽考貧富得實訴訟不繁公私之間兩得其利獨此泉漳汀州不曽推行細民業去産存其苦固不勝言而州縣坐失常賦日朘月削其勢亦將何所底止然而此法之行其利在於官府細民而豪家大姓猾吏姦民皆所不便故向來議臣屢請施行輒為浮言所沮甚者至以汀州盜賊藉口恐脅朝廷殊不知往歲汀州纍次賊盜正以不曽經界貧民失業更被追擾無所告訴是以輕於從亂其時初未嘗有經界之役也以此相持久無定論不唯汀州之民不能得其所欲而泉漳二州亦復并為所纍弊日益深民日益困論者惜之今者議臣之請且欲先行泉漳二州而次及於臨汀既免一州盜賊過計之憂又有以慰兩郡貧民延頸之望誠不可易之良䇿也臣雖多病精力早衰無以仰副使令然不敢先一身之勞佚而後一州之利病竊獨任其必可行也然今巳是仲秋向去十月農隙之時只有兩月之久若蒙聖慈特許施行則所有合行事件欲乞便令監司州郡一靣施行若候得旨方行奏請更俟報可竊恐遲緩不及於事須至條畫并此奏聞今具下項一椎行經界最急之務在於推擇官吏臣昨因本路諸司行下詢究嘗具巳見申陳欲乞朝廷先令監司一員專主其事使擇一郡守臣汰其昏繆疲軟力不任事如臣等者而使郡守察其屬縣令或不能則擇於其佐又不能則擇於它官一州不足則取於一路見任不足則取於得替待缺之中皆委守臣踏逐申差或權領縣事或只以措置經界為名使之審思熟慮於其始而委任責成於其終事畢之後量加旌賞果得其人則事克濟而民無擾矣伏乞聖照許賜施行一經界之法打量一事最費功力而紐折算計之法又人所難曉者本州自聞初降指揮即巳差人於鄰近州縣巳行經界去處取會到紹興年中施行事目及募本州舊來有曽經奉行諳曉算法之人選擇官吏將來可委者日逐講究聽候指揮但紹興年中戶部行下打量攢算格式印本多方尋訪未見全文竊恐諸州亦未必有欲乞聖慈特詔戶部根檢謄録點對行下一圖帳之法始於一保大則山川道路小則人户田宅必要東西相連南北相照以至頃畒之闊狹水土之高低亦須當衆共定各得其實其十保合為一都則其圖帳但取山水之連接與逐保之大界總數而巳不必更開人戶田宅之闊狹高下也其諸都合為一縣則其圖帳亦如保之於都而巳不必更為諸保之别也如此則其圖帳之費亦當少減然猶竊慮今日民力困弊又非紹興年中之比此費雖微亦恐難以陪備若蒙朝廷矜憐三郡之民不忍使之更有煩費則莫若令役戶只作草圖草帳而官為置𥿄雇工以造正圖正帳專委守體及所差官會計買𥿄雇工之費實用若干錢物具申漕憲兩司許就本州所管兩司上供錢內截撥應副如此則大利可成而民亦不至於甚病矣又據龍巖縣尉劉璧申經界之行惟里之正長其役最為煩重疆理畎畒分别土色均攤稅賦其在當時動經再歲彼出入阡陌妨廢家務固巳不勝其勞一有廣狹失度肥磽失宜輕重失當則詞訴並興而督責又隨至矣然有産則有役適當重難使出心力以應役使亦無可奈何然彼皆鄉民安知經界書算則必召募書人以代此役而書人能書算必嘗為胥史之傑黠者莫不乘時要求高價執役之人急於期限不免隨索則酬而又簿書圖帳所用𥿄札亦復不資執役之人安能勝此勞費竊謂經界之在今日不可不行行之亦不患無成若里正里長書人𥿄札之費有以處之則可舉行若坐視其殫力耗財如曩日恐非仁政之意也臣竊詳此意與臣所奏大指略同而所陳利害更為詳盡伏乞參照特許施行一紹興經界打量既畢隨畒均産而其産錢不許過鄉此蓋以算數太廣難以均敷而防其或有走弄失陷之弊也若使諸鄉産錢祖額素來均平則此法善矣若逐鄉産錢祖額本來巳有輕重即是使人戶徒然遭此一畨打量攢算之擾而未足以革其本來輕重不均之弊無乃徒為煩優而不免有害多利少之歎乎今來推行經界乃是非常之舉不可專守常法欲乞特許産錢過鄉通縣均紐庶幾百里之內輕重齊同實為利便伏乞聖照特許施行一本州民間田有産田有官田有職田有學田有常平租課田名色不一而其所納稅租輕重亦各不同政使坐落分明簿書齊整尚難稽考何况年來産田之稅既巳不均而諸色之田散漫參錯尤難檢計姦民猾吏並緣為姦實佃者或申逃閣無田者反遭俵寄至於職田俵寄不足則或撥别色官錢以充之如此之類其弊不可遍舉今來欲行經界若更存留此等名字則其有無高下仍舊不均而名色猥多不三數年又須生弊為今之計莫若將見在田土打量步畒一槩均産每田一畒隨九等髙下定計産錢幾文而總合一州諸色租稅錢米之數却以産錢為母别定等則一例均敷每産一文納米若干錢若干去州縣逺處遞減令輕米只一倉受納錢亦一庫交收却以到官之數照元分數分隸若干為省計若干為職田若干為學糧若干為常平逐旋撥入諸色倉庫除逐年二稅造簿之外每遇辰戍丑未之年逐縣更令諸鄉各造一簿今子午卯酉年應辦大禮寅申巳亥年解發舉人惟此四年州縣無事開具本鄉所管田數四至步畒等第各注某人管業有典賣則云元係某人管業某年典賣某人見今管業却於後項通結逐一開具某人田若干畒産錢若干使其首尾互相照應又造合縣都簿一扇類聚諸簿通結逐户田若干畒産錢若干文其有田業散在諸鄉者則併就煙㸑地分開排總結並隨秋料稅簿送州印押下縣知佐通行收掌人戶遇有交易即將契書及兩家砧基照鄉縣簿對行批鑿則版圖一定而民業有經矣但或者尚疑如此則本州産田納稅本輕而今當反重官田納租本重而今當反輕施行之後爭競必多須俟打量了畢灼見多寡實數方可定議其説似亦有理伏乞聖照并與行下俟一靣打量了畢别具利害申奏聞次一本州更有荒廢寺院田産頗多目今並無僧行住持田土為人侵占逐年失陷稅賦不少將來打量之時無人照對亦恐别生姦弊加以數年將遂不可稽考欲乞特降指揮許令本州出榜召人實封請買不唯一時田業有歸民益富實亦免向後官司稅賦因循失陷而又合於韓愈所謂人其人廬其居之遺意誠厚下足民攘斥異教不可失之機會也伏乞聖照特許施行右謹録奏聞伏候勑旨貼黃第四項臣契勘産錢不得過鄉此平世之常法也然此法之來亦甚未久向來未立此法之時産錢往往過鄉割上煙㸑去處故州城縣郭所在之鄉其産無不甚重與窮山僻壤至有相倍蓰者此逐鄉産錢祖額所以本來巳有輕重之所由也伏乞聖照第五項所謂俵寄者正田不知下落官司恐失租米即以其租分俵寄搭鄰近人户責令送納推此一端貧民受弊亦可見矣然它處不聞有此名字獨漳州見之伏乞聖照第六項臣伏見本州城壁素來頽壞髙者不及丈餘低者全是平地居民日夜往來不得禁制向來沈師之亂闔郡驚擾不知所為向非朝廷威靈尋即破滅則此邦之患何可勝言以往推來此亦事之不可不慮者今若許賣此田其錢欲乞且令本州樁管别行相度漸為修築之計務一兩得莫便於此并乞聖照又奏乞戒約州縣妄科經總制錢及除豁虛額錢數狀具位臣朱熹右臣去年到任之初即凖省符行下臣僚奏諸州縣以經總制錢為名巧作色目科斂民錢以足歲額者欲乞嚴行禁止又乞令諸路監司與州郡公心商議將缺乏縣道寬融減放奉聖旨依奏臣於是時即巳遵稟具奏以本州罷科茶及荔枝龍眼乾抱認建寧府豐國監鑄不足鉛本三色上供錢除本州自來以省計通融支遣一萬五千九百七十餘貫外尚欠七千六十四貫並無户眼源流可催又有隆興二年增起經總制無額錢四千七百餘貫逐年收趂不上並是敷下諸縣巧作名色科罰人户供輸發納違法害民事屬不便乞將上件錢除一萬五千餘貫本州依前通融支遣外其所敷下諸縣七千餘貫及隆興二年增起無額虛數四千七百餘貫特賜減免仍乞指揮别撥一項錢物應副截支左翼軍官兵口食等用巳蒙聖慈開允行下本路漕司相度今經日久未委本司巳未申奏以致未得早被蠲貸之恩臣今在任將及一考逐時稽考本州財計見得自去年四月以來節次行下諸縣不得妄行科罰而所有上供七千六十四貫只以省計通融支遣亦不至於大假欠缺自不須更令州縣收簇解發亦不當上煩朝廷别行應副臣輒巳行下諸縣自今並免解發及申嚴約束不得似前以此為名妄行科擾去訖但恐將來官吏不能遵守復致違戾欲望聖慈特賜睿旨嚴行戒敕如有依前科擾去處州縣當職官吏並與重行坐罪庶幾海裔窮民獲安田里咸知聖主憫仁元元不間幽逺之意至於經總無額錢內四千七百餘貫虛額之數即在州縣不容指畫却乞聖恩矜憐特詔有司直與除豁永絶科擾之原益廣涵濡之澤臣不勝大願臣冒犯天威不任恐懼俟命之至謹録奏聞伏候勑旨簽黃臣所奏不敷諸縣發納上供七千餘貫乞賜戒約縣道不得科罰即於上供元額並無虧減乞將此項先賜施行其經總制無額錢却乞付之有司立限聞奏取自聖裁特賜除豁乞褒録高登狀貼黃奏為本州故迪功郎高登嘗以直言干忤秦檜貶死容州乞賜昭洗褒録事伏候勑旨具位臣朱熹臣猥以塵賤備貟偏州仰體聖明收用獎拔之意思竭駑鈍仰報萬分故於聽訟決獄之際不敢不盡其愚今幸踰年目前人户些少曲直粗得其情獨有事在數十年之前而其枉直之分舉錯之重或非州郡之所得為者則在臣之職不敢不具以聞伏惟聖慈特垂聽察臣伏見本州漳浦人故迪功郎高登資稟忠義氣節孤高少遊太學值靖康之禍嘗與陳東詣闕上書力陳六賊之罪且言金人不可和狀至紹興間廷對力陳闕失無所顧避覆試官忌其直降為下州文學高宗皇帝嘉其忠而收之調靜江府古縣令是時秦檜當國帥臣胡舜陟以其父嘗宰是邑欲為立祠以恱其意而登獨持不可舜陟欲以危法中之召致獄官驗問訊掠訖無罪狀可書後為潮州試官又使諸生論直言不聞之可畏策閩浙水沴之所由檜聞益怒以為隂附趙鼎削官徒容州以死檜沒之後諸以口語為檜所陷者高宗皇帝深察其寃巨細存亡無不甄録而登以逺人下士獨無為言之者至乾道間近臣梁克家等始援紹興二十六年赦書以請而有司拘文廢格弗下近歲守臣傳伯壽又嘗具奏如前然今亦巳踰年未奉進止是使登以抱恨沒身垂五十年而姓名猶在罪籍未蒙昭洗雖其孤忠自信獨立不懼精爽凛然必不以此為悔而在聖朝伸寃雪枉勸善懲惡之意則議者猶竊恨焉臣幸得蒙恩假守其鄉目睹兹事若又緘默不能具以上聞則雖萬𬒳戮不足償罪是以敢冒言之伏惟皇帝陛下御極以來虛心克巳容納盡言比以隂陽失和申詔近臣樂聞至論草茅之士雖有狂直過甚之言始雖忤旨終薄其罪竊揆聖志如登之忠直宜在矜獎欲望特發德音復其官秩量加褒録以慰九原且使天下之欲為忠義者知所勸慕誠非小輔臣不量踈逺干犯威嚴無任震懼隕越之至謹録奏聞伏候勑旨貼黃臣竊詳傳伯壽奏底有加贈官秩施恩後嗣係於聖神之獨斷非小臣所敢請之語臣之踈逺尤不敢輒論及此然區區之情實亦有同焉者伏乞聖照按黃岌狀照對本州管下沿海寨巡檢一員土軍一百六人逐年截撥漳浦縣人户苗米三千一石五升近寨置倉專委縣官就彼交納應副支遣土軍月糧例是一月餘日方得交畢結局回縣去年係委縣官從事郎黃岌不知有何私幹到寨未及十日即便回縣既不恤人戶搬運且令仍舊搬米前來倉所等候其黃岌又不前去地頭續為交納遂至五月以後大軍缺食赴州陳訴本州纍行催促其黃岌頑然略不介意本州為見大軍節次奔走號訴殊可矜憐遂將别色官錢量行兌支仍截下人戶未納州未别行委官前去監督本縣催促支散至今日久未能按月支遣蓋緣黃岌怠慢不職專務營私不以國家養兵捕盜為念不為及時交納致得一寨土軍一百餘人飢餓狼狽實非細事委是難以存留在任本州遂於八月初七日將黃岌與龍巖縣主簿迪功郎陸槐對移及具狀申尚書省吏部并諸監司照會訖並皆未蒙果決回降指揮今來伏覩符下六月十八日樞密院劄子施行朝請郎王銖論奏乞行約束州軍弓手土軍雇錢衣糧須管按月支發母使侵擾細民奉聖旨依本州竊詳上項申請指揮正與本州按發黃岌事件一同仰見朝廷撫軍恤民丁寧深切之意所有黃岌罪狀不敢隱默欲望聖斷特將黃岌重賜施行以為官吏慢令廢職不恤軍民之戒伏候勑旨薦知龍溪縣翁德廣狀具位臣朱熹右臣叨𬒳誤恩假守偏郡自到官以來惟思所以仰稱使令之意以為布宣德意固為郡守之職然苟屬縣奉行不得其人則無自而及於百姓故嘗深察諸縣令佐之賢否其背公營私廢弛不職者巳嘗按劾具奏得旨施行其涖官公勤委有善狀者又豈敢默默而不以上聞乎臣伏見朝奉郎知龍溪縣翁德廣天資剛直才氣老成不為赫赫可喜之名而每有􅈤􅈤愛民之實臣嘗以縣事大要者三察其施為知其果有可稱者刑獄詞訟財賦是也縣所解徒流以上罪歲率數十臣取其案牘觀之見其親畫條目委曲難問必盡囚辭而後巳及州司理院再行審鞫而囚卒無異詞皆以縣之所鞫為得其情是能上體國家哀矜庶獄之意也漳之四邑龍溪為大理訴之牒日百餘𥿄巧偽詆讕姦詐百出德廣乃隨事處決終朝而畢人服其公未嘗有知責留禁之人是能使百姓無屈抑不伸之訟也縣所賦入最為浩繁合三縣之數不足以當龍溪十分之八郡之經費賴以取足德廣乃從容應辦民自樂輸吏無追督是能足用𥙿民而無抑配科斂之患也考其治行蓋庶幾乎古之循吏者竊謂若使凡為縣者皆能如此則國家德澤不患於壅隔而田里之間亦不復有歎息愁怨之聲矣臣與德廣為同郡人其孝友稱於宗族行義信於鄉閭臣素知之固巳甚審至此一年察其所以施於有政者又如此故今不復以鄉曲為嫌巳照薦舉格令舉充升陟員數又念方以災患乞奉香火朝夕得旨便當解罷而德廣去替亦巳不逺竊恐後來者知德廣之賢未能若臣之詳偶至脫略則在臣有見賢不能舉之罪臣愚欲望睿慈察臣所舉出於公論將德廣特與升擢差遣以為官吏勤事愛民之勸臣不勝大幸謹録奏聞伏候勑旨劾將官陸景任狀具位臣朱熹照對臣誤蒙聖恩委任閫寄於今月𥘉四日到潭州交割職事有本州駐劄東南第八將武功郎陸景任前來公參見得本官病患尫羸不能行立考其出身係因泛使入國用入流減年奏輔所歷差遣止是監當場務元不曽經兵官職事而今來所任係管潭州禁軍八指揮并有㨂中軍兵幾及千人全藉有精力不衰諳曉軍務兵官訓練教閲又本州管下有産茶地分及上江州軍各有溪洞亦賴兵官聲勢彈壓目今邵州見𬒳湖北猺賊侵犯巳調發本州駐劄東南第八副將黃俊部兵往山前把截其潭州將官豈是僥幸庸流尸祿養痾晏然端坐之也兼臣到任之初方欲督責兵官練習軍旅以為銷伏姦宄彈壓盜賊之計其陸景任實難倚仗欲望聖慈特降睿旨將陸景任與宫觀差遣别選材武曽歷管軍職事之人前來充職庶幾軍務不致廢弛須至奏聞者右謹録奏聞伏候勑旨同監司薦潘燾韓邈蔡咸方銓狀具位臣朱熹等臣等竊見比年以來臣僚申嚴薦舉之法以革獨員之弊蓋所以示公道而杜私情也然人之才固有不同而薦之者所見亦或不一往往獨員之薦常多而列銜之薦常少繇此故也臣等備員帥臣監司其於一路人才職當留意既不敢以巳見獨薦而參之以公論苟有可以備采擇者又安敢隱默竊見朝請大夫權知邵州潘燾以學問持身以儒雅飾吏不鄙夷其民首以教化為務崇尚學校修建先賢祠宇民有嚚訟諭之以理事至有司敏於決遣由是庭訟日簡郡圄屢空湖北猺冦侵犯邉境而燾處置得宜民用安堵至於移屯置寨為民防患者無所不用其至其他設施一切不苟臣熹昨與帥臣周必大巳嘗以其姓名薦聞矣朝請郎權知全州韓邈名臣之後材力有餘入仕以來凡三作邑皆有可紀民情利病纎悉洞究全之為郡久費枝梧而邈乃能檢柅吏姦稽考滲漏民間輸納不多取斛靣縻費商稅寬減苛細前政財賦不辦邈至未幾即不欠漕計且足郡用奉議郎權通判邵州蔡咸有高祖襄精明之風自初試吏即以能聞用獲盜賞改官又用收強賊應副錢糧賞循資又因水潦賑濟中書籍記姓名比者邵有猺人之擾咸詣山前督捕暴露經時多設方略鈎致蠻獠之情卒能使之恐懼納欵其他佐理郡政不競不隨經總制錢不待督責每歲溢額總所亦巳保奏委之賑濟措置有方民𬒳實惠奉議郎提刑司幹辦公事方銓器資宏𥙿識趣高明向宰懷安劇邑連事三帥皆稱其寬簡不擾急吏緩民所薦之詞如出一口懷安之民至今稱之今任湖南屬官其在幕中靖重寡言淡若無營至於酬應事機多所贊助前任提刑孫某嘗以其學識深濳持守正固薦充所知是四人者職雖不同然其才各適於用欲望聖慈特加旌擢以為趨事赴功者之勸如後不如所舉臣等甘坐謬舉之罰須至奏聞者右謹録奏聞伏候勑旨舉潘友恭自代狀具位臣朱熹凖令侍從官授告訖限三日內舉官一員自代右臣伏見從事郎新明州司理參軍潘友恭存心懇惻造理精深居家有孝友之稱持巳有廉靜之節其於世務亦所該通臣實不如舉以自代謹録奏聞伏候勑旨乞降付中書門下省乞潭州譙王等廟額狀貼黃奏為潭州創立晉譙王承及紹興死事之臣孟彥卿趙民彥劉玠趙聿之等廟乞賜勑額伏候勑旨事具位臣朱熹臣前任知潭州日伏凖紹熙五年七月七日大赦內一項節文歷代忠臣烈士祠廟損壞令本州支係省錢修葺竊見東晉王厚之亂湘州刺史譙閔王司馬承起兵討賊不克而死紹興初金賊犯順通判潭州事孟彥卿趙民彥督兵迎戰臨陳遇害城陷之日將軍劉玠兵官趙聿之巷戰罵賊不克而死此五人者皆以忠節沒於王事而從前未有廟貌無可修葺無以仰稱聖朝褒顯忠義之意遂牒本州於城隍廟內創立祠堂象五人者并考譙王本傳并象其參謀數人立侍左右各立位版記其官職姓名奉祀如法方行考究未及營表而臣忽𬒳誤恩赴闕奏事計其功力不至甚多本州除巳起造了畢欲望聖慈特詔有司賜之廟額仍下本州照應施行庶以慰答忠魂為天下萬世臣子之勸臣不勝大願謹録奏聞伏候勑旨乞降付尚書省晦庵先生朱文公文集卷第十九福州府儒學訓導舒鏊校
