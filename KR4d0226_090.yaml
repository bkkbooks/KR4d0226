body:
  text: 屏山先生劉公墓表屏山先生劉公既沒二十有一年一日其嗣子玶涕泣為其故學者朱熹言曰玶不幸蚤孤先人葬既不及銘而墓道亦至今未克表大懼不孝獲戾幽明亟欲建石琢辭以覺于後而惟先人不及用於世其事業無得而稱唯道德之懿不可以不白而知者又益鮮未有所屬筆獨吾子嘗學於先人盍以所見聞者為我書之熹竊伏原念所以得遊先生之門者具有顚末其於今日之誼固不敢辭而又有不敢不辭者蓋先人疾病時嘗顧語熹曰籍溪胡原仲白水劉致中屏山劉彥沖此三人者吾友也其學皆有淵源吾所敬畏吾即死汝往父事之而惟其言之聽則吾死不恨矣熹飲泣受言不敢忘既孤則奉以告于三君子而稟學焉時先生之兄侍郎公尤以收恤孤窮為巳任以故熹獨得朝夕于先生之側而先生亦不鄙其愚稚所以教示期許皆非常人之事今乃幸得屬辭比事以相兹役顧恨弗獲其何敢辭惟是駑劣老矣無聞蓋未有以副先生疇昔之意而慰吾父泉壤之思其何能有以究闡幽微信示久逺此又熹之所以不敢不辭者則起拜辭謝不敢當而玶重以大誼要責於是不得終辭而輒論次其事如左方謹按建之劉氏至忠顯公始大公以節死于靖康之難而歸葬其鄉崇安縣拱辰山之南今其墓西二十有五步少南有丘焉則先生之所藏也先生忠顯公之季子諱子翬而彥沖其字也世系本末具刻于忠顯之賜碑此不復著先生少負竒才未冠遊太學聲譽出等夷以父任輔承務郎辟真定幕府旋屬禍亂忠顯公薨京師先生痛憤家國非常之變執喪過禮哭墓三年服除通判興化軍事秩滿以最聞詔還蒞故官先生始以哀毀致羸疾至是自以不復堪吏責遂丐間局主管武夷山沖佑觀以歸世家屏山下潭溪之上有園林水石之勝於是俯仰其間盡棄人間事自號病翁獨居一室危坐或竟日夜嗒然無一言意有所得則筆之於書或詠歌焉以自適間數日輒一走拱辰墓下瞻望裴回涕泗嗚咽或纍日而後返事繼母吕夫人盡誠敬兄弟之間怡怡如也侍郎公之子珙幼開爽嗜學先生愛且竒之教以文行經業不少懈而必使務其逺者大者與胡劉二先生為道義交相見講學外無一雜言他所與遊亦皆海內知名士靡不歎服深逺自以為不及而先生之心未嘗少自足雖聞常人有片言之善無不從容咨叩必竭兩端而後巳至族黨後生來問學者則亦隨其器質告語成就終日無倦色如是者蓋十有七年四為崇道祠官纍階右承議郎享年四十有七以紹興十七年十有二月丙申卒始得疾甚微即入詣家廟泣别母夫人前遍以書告訣素所與往來者召珙付以家事指示葬處中外孤遺人人為計久逺昏官舍業之既巳則日與學者論説修身求道之要作訓戒數百言彈琴賦詩淡然如平日熹時以童子侍疾一日請問先生平昔入道次第先生欣然告之曰吾少未聞道官莆田時以疾病始接佛老子之徒聞其所謂清淨寂滅者而心恱之以為道在是矣比歸讀吾書而有契焉然後知吾道之大其體用之全乃如此抑吾於易得入德之門焉所謂不逺復者則吾之三字符也佩服周旋罔敢失墜於是嘗作復齋銘聖傳論以見吾志然吾忘吾言久矣今乃相為言之汝尚勉哉熹頓首受教居兩日而先生沒所著書詩合為文集二十卷娶陸氏封孺人先先生十七年卒無子葬忠顯公墓東三十有五步有先生所紀其家世德善刻焉蓋先生不再聘則以侍郎公之幼子玶為後今為右修職郎實立此表熹方為次其文而西府建安公亦以書來曰叔父之墓弗識珙則與有責焉熹讀之瞿然曰是乃吾之罪也乃亟起書石而系以銘銘曰神心惚恍經緯萬方孰握其機而挈其綱嗟惟先生立德之本既覺而存復則不逺亦曰于仕我止我行亦生而死我安且寧拱辰西南有銘斯碣嘉我後人仰止遺烈朝奉劉公墓表淳熙五年正月丙辰朝奉郎主管台州崇道觀劉公卒于豫章之私第四月癸酉嗣子孟容等奉其匶葬于臨江軍清江縣思賢鄉安陽里全塘之原明年孟容衰絰來見豫廬山下奉公族弟鄂州通守清之子澄之狀泣而以告曰孟容之先人不幸不及從先生遊而孟容顧得問學承教於左右惟是先人之墓當有碣而未有文以刻焉敢介叔父以其狀為請惟先生幸哀憐之豫與子澄故友善今孟容來又謹潔自好學問有方固知其故家遺業之傳為有自來讀其狀又知公德性履行之詳如此問之嘗識公者皆如狀言不誣則亦自恨其不幸而不及識公也既乃為序其事而銘之公諱龜年字且老其先從李氏朝京師始自袁州臨江徙其籍開封府祥符縣魏陵鄉吳兒村遂為聞家公之曽祖公非先生諱攽以文學致大名元祐中為中書舍人卒祖方雄州防禦推官贈右通奉大夫父襄右朝請大夫贈朝議大夫公以從祖奏為將仕郎又以大夫公奏為從事郎調峽州司户參軍遭喪不赴改臨安府錢塘縣主簿歷道州軍事判官改宣教郎知常德府武陵縣事通判沅州事主管台州崇道觀纍階朝奉郎賜服五品而卒其為人靜重純篤十三歲遭母吳夫人喪哀慕如成人從大夫公居番陽餘二十年日以讀書作文為事無故未嘗出齊扉鄰里或不識其靣大夫公性嚴與人多忤公左右承順唯謹退而接其鄉黨族􅊚又皆曲盡其情以故其不能無憾於大夫公者亦往往銷釋無復芥蒂皆曰公之能子也少時鋭意決科稍不遇即舍去居常晦默不自矜伐謹嚴拘畏無一毫自放繩墨之外所居一日必葺服器一物必整盛夏衣冠襪履不暫釋居間亦必雞鳴而起處暗室如對大賔待童僕小人亦盡誠慤所居之室必書謹獨正心字揭之座右錢塘今為赤縣公為主簿時秦檜方用事鄉黨􅊚舊或以文字見知登顯仕者謂公曰盍亦求之公不應退治簿書益謹至他職事亦多與貴要人接公益自閉匿以故得竟秦氏敗無所汚人以為難在道州太守季公南夀深知公既以政事文詞薦諸朝比去懷其餘章以授後守曰判官賢而不求人知恐君或失之也故留此以俟惟君留意後守許諾及其去又如之公以是改官在武陵遇民以寬吏有罪則立治之不少貸然亦不求其過也縣境田多荒冒耕者衆其健者與吏為一侵漁訴訟展轉不止公為推窮本始必見端緒而豫奪之訟為少息楚俗右鬼其淫祀有曰潘仙翁者歲時集會摐金鼓執戈矛迎而祭之公命尉杜師顔撤屋毀像收其兵刃罪其倡之者衆然後定縣十年不升降户等賦役不均咸以為病公始為改造帳籍民無異詞部使者相與以其治行聞于朝有旨記姓名中書然公秩滿則詣尚書銓注官以歸卒不一見丞相也沅並邉蠻人侵掠無寧歲公佐郡時群獠大動守懼求去公攝其事按邉防舊法訪問財處立為條約以授邉吏明諭威禁而以無事鎮之蠻果帖服公佐州常言長二失和多由下有勝心以駕其上故雖善意亦或不得伸惟盡吾所以事長官之禮而行吾所以佐長官之義則庶其見信矣晚見孟容從子澄學聽其誦説而恱之謂子澄曰君言之善吾亦且將從事於此顧恨晚矣一日召諸子告之曰觀星曆書吾殆止此汝曹勉旃毋為門户羞也因誡以誠實詳審謹禮擇交嚴分守察細微數事藹然皆長者之言居二年而病既病猶扶掖以奉家祭病革孟容泣而誦其平日正心之訓則微視而頷之蓋其為人始終之槩如此嗚呼是亦可謂善信人矣而其官不遂夀不長又如此其可悲夫公娶昌黎韓氏生兩男子孟容為長免喪舉進士中其科授迪功郎新袁州分宜縣主簿孟將以公遺澤輔將仕郎一女孟蓁未行豫觀孟容固賢而聞孟將亦好學然則公世之興蓋未艾也其又足以少慰也夫其銘曰吁嗟劉公篤世休道雖晚聞德蚤修長途方騁歲不晉志業有嗣無餘憂清江之曲全塘幽方趺圭首千千秋過者視此式其丘按會要臨江軍以筠州清江縣置新喻自袁州新淦自吉州來隸而歐陽公作主客集賢墓碑皆云吉州臨江人今狀又云袁州臨江人恐有差誤請更詳之韓溪翁程君墓表韓溪翁先君子韋齋先生之內弟程君也諱字復亨徽之婺源人少孤從先君子學於閩中因得講聞一時儒先長者之餘論而心恱之抄綴誦習晨夕不少懈先君子愛其勤敏於其歸書六言以贈之皆事親修身為學之要君拜受其言以歸益自樹立務記覽為詞章思所以大其門者然君為人坦夷跌宕不事修飾好讀左氏書為文輒效其體不能屈意用舉子尺度以故久不利於場屋家故貧至君益困中歲奉親徙居窮山中自號韓溪翁山田百畒環堵蕭然無以卒歲而君處之泊如也晚益不得志因自放於杯酒間酒酣諷左氏書雜以國風雅頌之篇坐者聳然傾聽其俯仰疾徐之間頓挫抑揚如有節族至於放臣孤子怨夫寡婦之辭又未嘗不三復感慨而出涕流漣也庸夫孺子從旁竊觀時或笑而侮之君謷然不以為意蓋其中所抱負有不得騁者故託此以自遣至它行事則其不合於理者固鮮矣乾道元年年五十九以疾卒後十年君夫人胡氏亦沒遂合葬于懷金鄉福林冷水之原蓋新安番陽信安諸程皆出梁鎮西將軍忠壯公靈洗其家婺源者又自歙之黃墩徙而來譜牒具在聞之先君子忠壯公葬黃墩其墓以石為封今尚在也君家自其大父某始與鄉薦父某亦以郡學上舍當貢京師皆不幸蚤卒至君學益勤而其師友淵源所漸者益逺顧亦不逢以沒其世而有子曰洵好學而敏於文君竒愛之曰是足以成吾志矣既又屢薦不第今乃以特恩授信州文學識者恨之然洵故嘗從熹論為學大要意其所以成君之志者在此而不在彼也熹祖母君之姑因謂君叔父幼從先君子在臨安時時見君來先君子或留與飲君必盡醉而論説衮衮不能自休既長歸鄉里又得拜君而君辱教誨之則君益以老矣然得酒輒歌呼談噱意氣猶不衰也今又三十餘年洵乃以書奉君學徒李君繒之狀請表君墓惟念始終顧二父於今皆不可見而熹與洵孤露之餘亦俱老大乃流涕而書之蓋以重歎君家之不遇又惟潦倒無以副君疇昔之意而自悲也嗚呼洵尚勉之哉淳熙八年八月乙卯表姪具位未熹述曹立之墓表淳熙乙未歲豫送吕伯恭至信之鵝湖而江西陸子夀及弟子靜與劉子澄諸人皆來相與講其所聞甚樂子夀昆弟於學者少所稱許間獨為豫道餘干曹立之之為人且曰立之多得君所為書甚欲一見君與張敬夫也後五年豫守南康立之果來目其貌耳其言知其嘗從事於為巳之學而信子壽昆弟之不豫欺也欲留與居而立之有宿諾不果及豫受代以去而所請白鹿洞書院賜額有旨施行如章郡守吳郡錢侯子言以豫之惓惓於是也亟以書來問孰可為師者豫因以立之告子言聞之欣然具書禮授使者走餘千踵立之之門以請而立之病不能行矣十年二月辛亥竟不起年方三十有七子靜以書來相弔具道立之將死其言炯然在道不少異於平日相與深歎惜之嗚呼吾道之衰久矣比年以來敬夫子壽伯恭皆以盛年相繼淪謝而後進之可兾以嗣事於方來者亦多夭沒今又失吾立之然則子靜與豫之相弔也豈徒以遊好之私情也哉立之名建其先自金陵來徙家至立之八世矣立之父諱天明始為儒立之幼頴悟日誦數千言少長知自刻厲學古今文皆可觀一日得河南程氏書讀之始知聖賢之學為有在也則慨然盡棄其所為者而大覃思於諸經歷訪當世儒先有能明其道者將就學焉聞張敬夫講道湖湘欲往見之不能致有告以沙隨程氏學古行髙者即往從之得其指歸既又聞陸氏兄弟獨以心之所得者為學其説有非文字言語之所及者則又往受其學久而若有得焉子壽蓋深許之而立之未敢以自足也則又寓書以講於張氏敬夫發書亦喜曰是真可與共學矣然敬夫尋沒立之竟不得見後至南康乃盡得其遺文以考其為學始終之致於是喟然歎曰吾平生於學無所聞而不究其歸者而今而後乃有定論而不疑矣自是窮理益精反躬益切而於朋友講習之際亦必以其所得者告之蓋其書有曰學必貴於知道而道非一聞可悟一超可入也循下學之則加窮理之工由淺而深由近而遠則庶乎其可矣今必先期於一悟而遂至於棄百事以趨之則吾恐未悟之間狼狽巳甚又况忽下趨髙未有幸而得之者耶此其晚歲用力之標的程度也今歲元日知病之不可為矣猶書其牖曰未死之前不可自棄遷善改過自是愈篤死之日起正衣冠危坐如平日語其弟廷曰吾雖甚病而學益進此心瑩潔無復纎翳如是而死庶其可以言命矣語訖就枕未安而沒嗚呼立之雖不幸蚤死不卒其志然所以自樹立者至此亦豈他人所及哉立之事親孝菽水之養歡如也愛其弟甚至與相切磋如嚴師友姊嫁而卒撫其孤以有成與人交敬而忠苟心所未安雖師説不曲從必反復以歸於是而後巳其於豫規正尤切也視人有急難周之必盡其力雖貧病不計榜其齋曰無妄杜門終日里巷有不識其面者日用間自省小有過差即書之册其討論經學有得亦悉記之及為他文甚衆病中欲舉而焚之廷弗忍既沒而視諸篋則已亡其半矣乃裒自論定以來所作得十餘卷其他猶多可傳者顧以立之遺意弗敢出也立之嘗娶婦不恱於姑教之不從而去故卒無子至是廷以母命立宗人之子願為後而葬立之萬春鄉栗田原先瑩之右且以立之遺文數篇及其友成忠郎趙君伯域之狀不遠數百里來請銘豫於立之相得雖晚而知之深望之厚哀其死而屢出涕焉其可以無從乎然立之巳葬不及識于壙中乃書其事使以表于墓上又系之曰胡子有言學欲博不欲雜欲約不欲陋信哉如立之者博而不雜約而不陋使天假之年以盡其力則斯道之傳其庶幾乎嗚呼今短命而死矣豈不可哀也哉是歲五月乙酉新安朱熹述西山先生李公墓表西山先生李公者龜山先生楊文靖公之門人也龜山既受學於河南程氏歸以其説教授東南一時學者翕然趨之而龜山每告之曰唐虞以前載籍未具而當是之時聖賢若彼其多也晚周以來下歷秦漢以迄于今文字之多至不可以數計然曠千百年欲求一人如顔曾者而不可得則是道之所以傳固不在於文字而古之聖賢所以為聖賢者其用心必有在矣及李公請見於餘杭則其告之亦曰學者當知古人之學何所用心學之將以何用若曰孔門之學仁而已則何為而謂之仁若曰仁人心也則何者而謂之人心耶李公受言退求其説以進愈投而愈不合於是獨取論語孟子之書而伏讀之蚤夜不懈十有八年然後渙然若有得也龜山蓋深許之而公之語學者亦曰學者於經讀之又讀而於其無味之處益致思焉至於羣疑並興寢食不置然後始當驟進耳龜山既沒後進多從之遊後舉遺逸召對卒官福建路安撫司主𬋩機宜文字而葬其鄉邵武軍光澤縣東黃嶺之原學者共追號為西山先生云公諱郁字光祖元祐黨人朝散郎深之子母安仁縣君陳氏贈諌議大夫陳忠肅公之女兄也公幼不好弄坐立必莊少長學於舅氏陳公器之踰冠乃見龜山而請業焉龜山一見竒之即妻以女既而以朝散公遺命出為叔父將仕郎庭之後中間遊大學𬒳鄉薦皆不第紹興𥘉天子慨然有志中興大業思得山林遺逸魁傑非常之材而用之會遣御史朱異行郡國詔俾搜訪以聞異聞公名使還以對召對便殿所陳皆當世大務上為改容傾聽請退而留者再詔以為右迪功郎尋除詳定一司勑令所刪定官未久以憂去用進書恩特改承務郎及免喪會秦丞相檜巳用事公自度不能俯仰祿仕遂築室邑之西山往來讀書其間家益窮空人有不堪其憂者公獨曠然不以為意然當世賢士大夫益髙仰之遷官者多引以自代久之起家佐閩帥幕府人謂非公所宜處而公不辭既至人謂公且不屑為而公治文書惟謹日訪民情戚休利病以告其長而罷行之一日帥用小人言欲毀民居數十為列肆酤酒以牟利公白其非便帥不樂頗見色詞公即移病告老帥悟慚謝公為強起二十年七月壬辰竟以疾卒年六十有五矣公天資粹美而涵養有方其事上恭而有禮其御下嚴而有恩平居未嘗有惰容誨人終日無倦色自奉甚約而事親極其厚於所後尤兢兢致孝服喪毀瘠如禮治喪必誠信至竭其資不吝兄階官杭州罵賊死公事寡嫂如母教孤姪遣遺女皆如巳子其於世務人情官政文法下至行陳農圃之事靡不究知然竟不及用於世以沒識者恨之所著書有易傳參同契論孟遺秉及平生遺文合數十卷藏于家夫人楊氏龜山先生第三女有賢行通經史大意平居誨飭子孫整齊內外皆中禮法後公十六年卒子揆成務郎陳公志於將仕之墓所謂延孫者也晚以德壽慶恩輔官而卒女適同郡上官墨卿孫男間闡閌闤女適某人間於是以迪功郎為全州州學教授始將伐石以銘其墓而來請文以識焉嗚呼聖賢遠矣然其所以立言垂訓開示後學其亦可謂至哉顧自秦漢以來道學不傳儒者不知反巳潛心而一以記覽誦説為事是以有道君子深以為憂然亦未嘗遂以束書不讀坐談空妙為可以徼幸於有聞也若龜山之所以教與西山之所以學其亦足以觀矣豫是以著之而并記其行事後之君子尚有考也淳熙十有二年秋八月巳卯具位朱熹述太孺人邵氏墓表金華時鎬既奉其母夫人邵氏之柩祔于循理鄊九里原先府君之墓使其子源以永嘉葉適所為行述及别記事實各一通來告曰先人之喪先師東萊夫子幸與之銘而吾子書之矣今又以不孝罹大禍間雖幸畢藏事惟是幽堂之刻所以垂永久者未有所屬敢介前惠重拜以請豫時病卧田間起受其書讀之曰夫人婺州金華縣人曽祖瓊祖恱父之才嫁其縣清江時君汝翼時君世昌樂而魁尨沉厚方臘之亂寇燔略空君一一自建置盡絶其前人夫人能左右以敏無荒事焉家既成時君遂用法度嚴內外文學訓子孫立信務與稱重郡閭夫人又能奉承以恪無逸志時氏族良家巨子孫競於文科舉上其名人皆尊愛時君以及夫人時君沒天人亦將老矣具呼家人與為條約親寫刻之屏使合居有禮綴食無專以不忘時君之法清江東南畦戶數百臨水而茇舍時潦出其上民往往棲木自救有浮去者夫人始命舟糗飯拯之歲以為常豫蓄棺告疫死者以斂人懷其惠晚遭太上皇帝皇后慶壽恩得封大孺人加賜冠帔淳熙十年七月庚寅卒年七十有一三子鎬錡錝二女適劉晏陳褒孫源淇演溱法潚潭澡湂孫女其二適陳之望汪叔貽餘尚幼曾孫矩桌日人人杲女莊葍蓋葉君所敘云爾其於夫人始終之際詳矣而别記手書條約之詞一曰子孫謹守家法毋得違悖二曰晨興鳴板長幼詣影堂早參次會中堂敘揖三曰男女出入財貨出納僕妾增減必稟家長四曰凡為子婦毋得蓄私財五曰女僕無故不許出中門蒼頭毋得輒升堂室入庖厨則豫於是有以知夫人之所以教者得齊家之要至其又謂夫人天性儉質不徇華靡服御有常未嘗追逐時好有所變易歲時奉祭甚謹嘗以冬享割肉手寒刀墜諸婦請代而弗許也毋何晚得末疾歸省輒惓惓不忍去比卒年幾六十矣猶𬞞食以終喪女兄孀居貧病護視周悉遇其子弟恩意有加時君篤於教子一時髦俊多客其門夫人日飭饌具必躬臨之雖勤劇無倦意則豫於是又有以見夫人之所以教者蓋以其身而不專在於言語之間也嗚呼是可尚巳既以病不果銘姑記其實如此以授源使歸刻石表墓上淳熙十有二年冬十月戊辰新安朱熹撰董君景房墓表番陽董君景房者諱為良世家德興之海口大父濬始仕至宗正少卿父元一秀州司法參軍君少有大志嘗學於江山徐公誠叟先生之門受其説而歸益務求友講而修焉不數年遂以文行聞於州鄉再試禮部不第退處于家讀書講學不復以聲利榮逹為事鄉人相與益高仰之而君之學蓋日進月益而未可量也淳熙十一月九月一旦得疾卒年甫五十有四士友聞者莫不哀之蓋君為人儻蕩無城府家故饒給兄弟始求分異君力止之不可則盡聽其所擇而獨取其所遺及故書數篋藏焉既而兄弟或破其産君極力資奉不計有亡死者葬之而撫其孤焉族姻鄉黨之貧無歸者衣食之罷不能者教誨之不幸而有急難者救護之皆極勤懇鬪訟之不決者為曉譬以義理往往心服失其所爭而去歲飢姦民肆掠物情大恐君為官畫䇿以便宜發廪振貸而密以兵掩其渠帥置于法人賴以安雅有當世之志於官政民俗弛張之際尤孜孜焉嘗記其見聞思慮所及者作活國書一編其言質慤詳盡不為華靡而所規畫常以厚下固本為先識者韙之恨其不得見於用也君娶周氏子男二人從起從治女六人其三巳適人進士齊節程矩齊牧其壻也君卒之明月葬其里之黃柏原沙隨先生程公可久雅知君實銘其壙而從起又以君友人太學生程端蒙之狀來請文以表墓上豫故家君旁縣頃歲還里中君以所論經子諸説來見别後又數以書來有所問辨時君猶有四方之志豫因以所聞古人為巳之説告之而君不以其言為非也然則其可無詞乃取程生狀托其可紀之大者書以授從起俾歸刻之嗚呼君則巳矣而豫言不沒則百世之下於此尚有考也淳熙丙午三月庚辰宣教郎直徽猷閣主管華州雲臺觀新安朱熹述令人羅氏墓表故左司郎中張公之配曰令人羅氏南劒州沙縣人世為縣望姓家法嚴整令人生二十有二年而歸張公事姑羅恭人以孝謹聞恭人愛之如巳女張公故貧𥘉仕將遣其女弟而無資令人悉出橐中􅑽以奉之無吝色事公二兄旦暮率諸幼稚以次問起居無一日闕禮子姪就學歸沐輒具湯餅會諸娣姒男女語次從容問所學業勞勉諸姪以勵其子油油如也羅恭人嘗苦末疾令人靜夜必露香致禱願損巳夀以延姑年如是者數月恭人疾頓平而後三年令人一旦暴卒恭人哭之慟至老念之不能忘與人言必稱其孝至於泣下且歎曰不意吾兒失此內助之賢也令人性儉約謙下好禮法有識度嫁時篋中有黲色絺衣忌日輒𬒳以奉祭稱慰如儀常所服禮衣橫帔如民間法或告以張公且通朝籍盍改用命服令人曰此非拜恩何敢服也卒以禮終生以政和戊戍卒以紹興癸酉葬劒浦縣吳張氏大墓之左若干步後三十八年嗣子士佺來訪豫於臨漳請銘左司公之墓一日復奉令人之事涕泣以請曰吾母之賢孝如此而不幸蚤終士佺兄弟生不及養巳負終天之痛矣今又不能述其德善以垂久逺其何以見於地下惟吾子哀之豫不忍辭也既受其書而讀之因竊惟念孝愛和謹婦道之常世猶有難之者而令人至委身以代姑死守禮以終其身是其賢於人也逺矣其可以無傳也哉因為敘此以表其墓令人生二男士佺今為朝奉郎通判融州事其弟士僴嘗為修職郎監藩葑酒庫以卒四女進士宗大同謝舒宣義郎陳善慶文林郎黃東其壻也紹熙二年二月日朱熹述程君正思墓表士患不知學知學矣而知所擇之為難能擇矣而勇足以行之內不顧於巳私外不牽於俗習此又難也嗚呼若番陽程君端蒙正思者其所謂知所擇而能行之者歟乃不及一試而又無年以死使人不得見其德業之所成就是可哀巳正思天資端慤自幼巳知自好稍長即能博求師友以自開益遂以詞藝名薦書既乃見豫於婺源聞諸老先生所以教人之大指退即慨然發憤以求道修身為巳任討論探索功力兼人雖其精微或未究極而其固守力行之功則巳過人逺矣始時名下之字同於周程至是亟請其父而更焉其居家事親能開義理於幾微之際多所感悟而不失其歡心喪母葬祭推本古經以正流俗之謬鄉人多以為法其在太學儕輩類趨時好不復知有聖賢之學正思擇其可告語者因事推誠誨誘不倦從而化者亦頗衆然其為人剛介不苟合聞人講學議政有所未安輒造門辨質或移書譬曉必極其是非可否之分而後巳會大臣有樂豪縱而賤名檢者見修士即以邪氣目之而又言於上曰是屬且能亡人之國於是學官承其風旨因課試發䇿直以王程蘇氏之學為問蓋將以其向背為取舍對者靡然無敢正言其失正思獨奮筆抗論無所依違而所以分别邪正之間輕重淺深又皆中理雖竟以是無所合而歸然其抑邪與正之助亦多矣既歸即以病不起紹熙二年十一月一日也享年四十有九聞者莫不哀之方疾革時手書來曰端蒙死不恨恨不克終養而卒業於門耳然巳無可言願先生自愛蚤就羣書以俟來哲世不我知天豈亦不我知也哉豫雅意正思任道勇而用志專必能卒究精微之藴以廣斯道之傳者遽讀其書不覺失聲流涕既而視其筆迹謹好如常日又知其間於死生之際如此為之痛惜久而不能平也明年正思之父將葬正思於其鄉之某處使其二弟端臨端本狀其事以來請所以表其墓者豫按其言正思曽祖宏祖汝能皆有鄉行父易今以修職郎致仕母俞氏妻王氏生一男師聖一女適同縣董濬而它則與豫所聞者皆不異又觀其言正思自少謹信異常兒大父將沒知其可託以一老婢諉焉正思時年十四五涕泣受命護視勤懇十有六年始終無少懈至是屬疾雖病尊親臨之必冠巾乃敢見將卒悉屏婦女户外戒治喪無用浮屠法所以告二弟朋友皆人倫大法所繫不雜它語是皆宜書因并前所論者書之使碣墓上後之君子庶有考焉淳熙三年秋九月乙亥新安朱熹述程君公才墓表紹熙二年冬番陽程君正思病且革以書抵豫告訣且書其先大父府君之行事而求識其墓豫既哀正思之力學任道而不幸蚤死又知其大父之賢如此而無所聞於後世矧其將死深悲之屬不在它人是固不可以無言也按正思言府君諱汝能字公才天資純篤不由學問而孝弟忠信自有以絶人者父性嚴府君事之順焉於其行事有未安者必以正諌諌而不入則退而謹伺之意解復諌卒聽從乃巳母得末疾三年衣不解帶居不入室時其起居飲食之節而躬致養焉雖矢溲之役不以纍它人也事兄謹甚兄好飲佚遊府君懼顯兄過以貽親憂委曲其間彌縫甚至卒以無間言親沒析其産兄欲善田宅恣所取無難色平生口無惡言妄語足迹不涉官府之門居鄉接物恂恂謹敕不怒而人敬畏之周人之急必盡其力雖或負之不計也鄉人有死而亡子者治其喪甚飭或欲沒入其資産為告官立後至今不絶處家慈愛而能嚴子弟不敢為纎芥非理事今沒三十年鄉人行旅言之猶有思慕出涕者嗚呼兹非夫子所謂十室之邑忠信如巳者乎是乃三代之遺民而非今世之士所能及也使其得聞聖賢之教而講學以明之其所至可量哉正思病亟作書其詳如此而字畫謹細如常時且謂它行之懿猶有不及書者今問其家得其世系則番陽之程皆祖梁忠壯公靈洗唐乾符間有名維者以金紫光祿大夫海州鹽鐵使將兵討巢賊不利始居饒州樂平之銀城後徙新建而地析為德興縣故今為德興人自鹽鐡十二世而生府君之父諱宏亦有鄉行娶齊氏生府君府君娶氏生二子曰晟曰易晟先卒易今以修職郎致其事而又有正思為之子意者程氏其將興乎今正思雖不幸而二弟亦知為學是固未可知也乃書此碑刻石墓左以俟墓在某某鄉某里某處晟之子曰端友曰伯雲易之子曰端誠曰端蒙曰端臨曰端本正思即端蒙也豫亦巳别識其墓云三年壬子秋九月丙子新安朱熹書安人王氏墓表國子博士成都范君文叔以書致其母夫人之事於熹曰仲黼不天蚤失先人之教先夫人撫育成就甚艱且勤以及于兹而葬不及銘無以發其潛懿吾心惄然不敢寧也敢拜以請熹讀其書既蹙然不敢當又讀其狀益惟文字之蕪淺而無以信夫人之德於後世顧文叔之賢未及識靣而心巳敬之且其所以屬我者又如此其重也乃不敢辭而按其狀則簽書東川節度判官廳事盧君蹈之所述也其言曰夫人成都華陽人姓王氏祖曰贈金紫光祿大夫諱廷妣文安郡夫人勾龍氏父曰左朝議大夫諱輔妣宜人何氏夫人自幼以專靜才明稱於其家年甫笄歸同郡范君諱漼蓋范氏自蜀郡忠文公中書榮國公徙居許洛至是始還故鄉文獻未逺子弟皆有典刑非清門淑質不易作對夫人一踐其庭禮容肅穆纎悉中度雖在房闥禮敬自將燕私之言無一不可道於外者范君始為仙井監録事參軍後以宣教郎知雅州盧山縣事夫人居家儉約不以出內細故纍其君子范君閲具獄晨夜寒暑不少懈夫人猶從旁從臾之曰毋憚淹晷之勞而使彼負沒世之冤也故范君為吏以清白著其治獄以平允稱夫人蓋有助焉范君既從官不復問生理身後家事益落落夫人慨然自力以濟其艱使二子得以盡力於學繼踐世科人以為榮而夫人不色喜顧語之曰吾悲汝父之不及見也雖然汝家世以清德直道為門閥汝曹問學宜知所本仕不患不逹患無以稱耳藜糗吾能甘之母遽以三釡為也二子以是益自厲於學而仲黼杜門幾十年不汲汲於進取蜀人高其行東遊吳楚張敬天吕伯恭一見皆歎賞具以其學告之今在朝列尊守所聞不徇世習而忠君愛國悃𣢾無巳識者皆倚重焉此又夫人之教有以成之也𥘉范君仲兄洪雅君蚤卒無子范君將以少子仲藝後之未及而終後六年仲藝奏名南省夫人大合族黨申范君之命以告于祖禰而卒使奉其祀焉聞者皆以為難洪雅之妻前巳更嫁至是乃卒人以其服為疑夫人曰禮不為嫁母服而律有心喪三年之文且是嘗為洪雅配得不為藝母乎即日命仲藝服喪如律聞者益以為難歲時典祀身親蠲潔待賔客接宗姻曲盡禮節而御下一以慈恕至其平居教詔子孫援前言質往行又皆有本有末蓋可書而誦也卒於淳熙八年六月甲辰葬於十三年八月丙申墓在雙流縣宜城鄉曹池山實從盧山君之兆始以夫封孺人後以子贈安人仲黼今以通直郎為國子博士兼皇姪許國公府教授仲藝嘗以從政郎為彭山令而先卒女五人一適王晞孟一適程師夔一未行餘皆夭嗚呼夫人之所以相其夫而成其子者盧君狀之詳矣然猶事之常也至其出少子以後仲父既又使之服其所後嫁母之喪則處變事而不失其權有當世士大夫之所甚難而深愧焉者嗚呼賢哉兹其所以為吾文叔之母也歟嗚呼賢哉紹熙三年玄黓困敦秋九月戊子具位朱熹述聘士劉公先生墓表先生姓劉氏建州崇安縣五夫里之白水人其曽大父諱滋起身農畒以進士高第仕至尚書職方郎中纍贈開府儀同三司吏部尚書大父諱照朝請郎再世皆有清德中歲即休官退處以大耄終父諱元振始不仕然亦以馴行稱先生諱勉之字致中自幼強學日誦數千言耳目所接一過不復忘其為文肆筆而成滂沛閎闊凌厲頓挫儕輩少能及之踰冠以鄉舉詣太學時蔡京用事方禁士母得挾元祐書制師生收司連坐法犯者罪至流徙名為一道德者而實以鉗天下之口先生心獨知其非是隂訪伊洛程氏之傳得其書藏去深夜同舍生皆熟寐乃始探篋解帙下帷然膏潛抄而默誦之聞涪陵譙公天授嘗從程夫子遊兼邃易學適以事至京師即往扣焉盡得其學之本末既而遂厭科舉之業一日棄録牒揖諸生而歸道南都見元城劉忠定公過毗陵見龜山楊文靖公皆請業焉而劉公尤竒其材留語數十日告以平生行巳立朝大節以至方外之學它人所不及聞者無不傾盡先生拜受其言精思力行朝夕不怠久而若有得焉則疇昔所聞一言之善融會貫通皆為巳用而其踐履日以莊篤與籍溪胡公原仲屏山劉公彥沖兩先生友善日以講論切磋為事其於當世之務若不屑焉而論説區處巨細顯微皆有條理亂後故山室廬荒頓乃即建陽近郊蕭屯别墅結草為堂讀書其中力耕稼以自給淡若無求於世而一時賢士大夫莫不注心高仰之中書舍人吕公居仁知之尤深嘗以小詩問訊有老大多材十年堅坐之句世傳以為實録是時國家南渡幾十年謀復中原以攄宿憤而未有一定之計方且寤寐俊傑與圖事功吕公乃與同列曾公天遊李公似之張公子猷三數人者共列其行誼志業以聞於朝特詔詣闕將行屏山先生為作招劒之文以祝之其卒之亂曰寶劒徠奉君王撫四夷定八荒時乎時毋深藏其所望於先生者蓋如此既至會秦丞相檜巳顓國枋為其事非巳出不能平時又方決屈巳和戎之䇿惡聞天下正論意山林之士不顧利害敢盡言觸忌諱尤不欲使見天子談當世事第令䇿試後省給札俾上其對先生知道不易行即日謝病歸杜門高卧十餘年造養益熟名聞益尊故相趙忠簡公出鎮南州道出里門紆轡入謁坐語移日彌加歎重然其去未幾即遭讒竄海外以沒同時知先生者亦皆廢錮不復用於是先生竟不及一試於用而卒于家享年五十有九有志之士莫不哀之紹興十九年二月十日也先生學本為巳而才周世用臨事財處不動聲氣平居嚴敬自持若不可犯而接物之際恂恂和恱色笑可親其臨財廉一介不妄取少時婦家富而無子謀盡以資産歸女氏既謝不納又擇其宗屬之賢者舉而卑之使奉其先祀其與人交誠信懇惻同里胡公明仲侍郎蚤出為季父後不自知其本親鄉人多竊議之而莫以告先生獨為移書具陳本末所以然者胡公感其言為數歸省恩禮略備議以少息熹之先君子蚤與先生遊相好將沒深以後事為寄且戒熹往學焉及棄諸孤先生慨然為經理其家事而教誨熹如子姪既又以其息女歸之親舊羇貧收恤扶助亦皆曲盡恩意學子造門隨其材品為説聖賢教學門户以及前言往行之懿終日娓娓無倦色自壯至老如一日也娶連氏無子以從兄之子思溫為後二女子其長歸于我次適朝奉郎范念德思溫亦無子又以從弟之子澧後之建州於今為建寧府先生墓在草堂涉溪西北七里所羣玉鄉三桂里之學士原其葬時不及銘逮今且五十年後生之及見先生者日加少熹懼其益久而遂將無所考也乃追記其世家學行之最而伐石以表焉慶元戊午正月已亥朔旦門人朝奉大夫致仕朱熹述晦庵先生朱文公文集卷第九十候官縣儒學訓導劉簮校
