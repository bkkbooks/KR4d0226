body:
  text: 書知舊門人問答答潘謙之柄所喻心性分别不知後來見得如何性只是理情是流出運用處心之知覺即所以具此理而行此情者也以智言之所以知是非之理則智也性也所以知是非而是非之者情也具此理而覺其爲是非者心也此處分别只在毫釐之間精以察之乃可見耳愛恭宜别喜怒哀樂皆情也以前說推之可以三隅及矣㸔論語只㸔集注涵泳自有味集義或問不必句句理㑹却㸔一經一史推廣此意尤佳答潘謙之所示問目如伊川亦有時教人静坐然孔孟以上却無此說要湏從上推尋見得静坐與觀理兩不相妨乃爲的當爾易說大槩得之但一隂生之卦本取一隂而遇五陽之義今如此說亦佳但更湏子細㸔不知能兼此兩意否萃卦三句是占詞非發明萃聚之意也此是諸儒說易之大病非聖人係辭焉而明吉㐫之意卜田之吉占特於巽之六四言之此等處有可解者有不可解者只得虚心玩味闕其所疑不可強穿鑿也成性成之者性成字義同而用異成性是已成之性如言成說成法成徳成事之類成之者性是成就之意如言成已成物之類神之所爲與祐神同與神徳行之神小異法象變通如此說亦得但不免㣲有牽合之病耳近日别㸔甚文字有疑幸語及也答潘謙之孟子首數篇與齊梁君語大抵皆爲國治民之事特患學者不能用之耳即義利之對而定所趨充易牛之心以廣其善端閨門之内妻子臣妾皆有以察其温飽均其勞佚而無尊賤之僻焉亦與民同樂之意又何徃而非切身之事哉所論孟子書首若能如此推類反求固不害爲切巳但𥘉學者便教如此㸔却又添了一重事不若且依本文㸔逐處各自見箇道理乆乆自然通貫不湏如此費力也樂天畏天不同以仁者而居小國固不免爲智者之事使智者而居大國則未必能爲仁者之舉何者智者分别曲直未必能容忍而不與之較如仁者之爲也得之禹稷顔子時不同而出處不同乃義之宜伯夷伊尹時同而出處異一是則一非一善則一惡孟子何以皆謂之聖人耶謂伯夷伊尹所爲爲非恐未安許行欲君民並耕則於人無貴賤之别欲市價不貳則於物無貴賤之差事雖異而意則同孟子因齊王易牛以發其不忍之心因夷之厚葬其親以箴其兼愛之失皆因其發見處以啓之得之伊川云飬志莫如敬以直内此是就未發上說孟子所謂自反而縮以直飬而無害集義所生皆指事而言就巳發上說孟子方辨告子故專救其偏孟子論飬氣只合就巳發處說程子說飬志自是當就未發處說各是一義自不妨内外之交飬不可說孟子爲救告子義外之失而姑爲此言也恐大人所以爲大人者不過不失其赤子之心而巳論赤子之心恐未然若大人只是守箇赤子之心則於窮理應事皆有所妨矣王子墊以人之爲士下旣不爲農工啇之事上又未有卿大夫之軄故疑其若無所事者孟子言士雖未得位以行道而其志之所尚則有仁義焉尚志之說甚善志字與父在觀其志之志同盖未見於所行而方見於所存也說大人則藐之盖主於說而言如曰見大人則藐之則失之矣得之於不可巳而巳一節以仁言於所厚者薄一節以義言夫不可已而巳當厚而薄則怠惰自私而無力行篤義之心而失之不及矣或有發憤勇進者則又失之助長迨夫意氣一衰則私心邪念潰出而不可遏此又失之大過也仁義之說未是進銳退速之說亦未精切盖其病正在意氣方盛之時巳有易衰之勢不待意氣巳衰之後然後見其失也盡心第一章㳺氏以知天爲造其理事天爲履其事固善矣然夭夀不貳一節又乃承上二節而言上乃知而行之此乃守而不變㳺氏之說恐未當夭夀不貳亦是知天之效但㳺氏說得下句太輕耳或問中以楊氏所譏王氏之失爲非是柄竊以髙明之與中庸雖非二物然細分之亦不爲無别中庸者理之所當然也髙明者理之所以然也聖人處巳應物固無二道然處巳而盡其理之當然也所以爲中庸也知處巳所以當然之理則髙明也應物而盡其理之當然者所以爲中庸也知應物所以當然之理則髙明也王氏判而爲二固非矣而楊氏又渾然無所區别則亦不察中庸髙明所以得名之實也其曰智不足以致知明不足以盡誠者其意盖以智爲髙明誠爲中庸但明字與誠字不類而反與上句所謂智者爲一律豈牽於自明而誠之語而誤乎若如其意竊欲易曰知不足以致知誠不足以力行惟不足以致知故以髙明爲淵深㣲妙而非局於一事爲之末而不知髙明所以爲中庸惟誠不足以力行故以中庸爲出於人力之所勉強而非天理之自然而不知中庸所以爲髙明此則王氏受病之處高明是說中心所存不爲物欲之所累處非指理而言也首章明道第四說云凡人說性只是說繼之者善也孟子言人性善是也似以孟子所言爲氣禀之性若以爲氣禀之性則固有善惡矣不得專謂之善也以下文水流之喻觀之則又似以氣禀本善發而後有善惡也使氣稟皆善則所發之惡何自來哉孟子所言不是氣禀之性但是性自不容說纔説性時便只説箇善字所謂天下之言性則故而已者正謂此也横渠冰水凝釋之喻似亦無害但以受光照納爲言則㡬於釋氏所謂一靈真性者矣其所謂未嘗無者豈以其之中實無一物之不具耶此則心之知覺而非性之實跡也旣如此說郎是有害矣舜察邇言所以無智者之過盖智者之過常在於􅕽髙遠而厭卑近也舜之智不過非獨爲此一事湏以全章體之舜隱惡而揚善聴言之道當如此盖不隱其惡則人將耻而不言矣後之當進賢退不肖之任者亦以隱惡揚善盗兼包并容之名是不知隱惡揚善之義也隠惡揚善不爲進賢退不肖言乃爲受言擇善者發也和而不流則非不恭之和中而不倚則非執一之中中和而不流不倚者擇之精有道而不變者守之固擇之精則不患乎道之難明守之固則不患乎道之不行能勉乎此則無賢智之過矣章句中謂四者各有次序不知如何豈不流尚易而不倚爲難如富而無驕易貧而無怨難乎和而不流中立而不倚湏就強字上㸔如此說無功夫矣武王周公之所以爲逹孝者柄竊以爲舜之大孝所遭之至不幸也文王之無憂所遭之至幸也至幸與至不幸皆不可以爲常惟武王周公之孝而天下通行之孝也恐無此意章句中以學知利行爲仁困知勉行爲勇竊恐未盡乎仁勇之徳也夫仁者安仁固不容以利行爲言知仁勇皆謂之達徳則勇固通上下而言也不可專以困知勉行者目之以柄觀之三知三行云者所以總言逹道逹徳之在人其氣質雖有不同而及其至之則一也三近云者言人未至乎逹徳而求至之者其用功當如是也似不必以三知三行分知仁勇如何此等處且虚心看到並行不悖處乃佳敬大臣則不眩章句中以爲信任專而小臣不得以間之故臨事則不眩也柄竊觀下文官盛任使之意似以爲不使之役役於細事乃所以敬之也惟其不役役於細事故其精神暇逸不至昏昡而迷於大體也不然二十七章旣言大哉聖人之道矣而復以優優大哉冠於禮儀之上者盖言道體之大散於禮儀之末者如此得之二十四章成巳仁也成物智也以柄觀之論語以學不厭爲智誨不倦爲仁又與此相反且學不厭與成巳雖皆在巳之事然一則學以明其理一則實體是理於吾身一知一仁猶可言也若夫成物乃仁之事何所與於知而歸之耶若非有智何以成物二十章生乎今之世反古之道如此者烖及其身夫子非使後人不得復古也但以爲生於春秋之世旣無得位之理徒欲以匹夫之㣲而復古之道則不可耳使得時得位何不可者反古道連上文愚賤說前輩多以夫子損益四代之制以告顔子而又曰吾從周其說似相扺牾者然以二十八章吾學周禮今用之吾從周之意觀之則夫子之從周特以當時所用而不得不從耳非以爲當盡從周若答爲邦之問乃其素志耳得之君子動而世爲天下道行而世爲天下法言而世爲天下則世猶言世上也法是法度則是凖則有可跂之實故言法言未見於行事故以其言爲凖而行之也得之答楊至之至所喻詩序旣不曽習詩何縁便理㑹得只今且㸔四子音後所題依其次序用心講究入得門戸立得根本然後熟讀一經子細理㑹有疑即思不通方問庶有進處若只如此泛泛掲過便容易生說雖說得是亦不濟事况全未有交渉乎所說易傳恐亦方是見得皮膚如何便說得易之大全無餘藴矣向嘗面說至之有膚淺之病不知曽究其所以然而加濬治之功否後之歸永春後曽復來否子順子能爲學復如何彼中朋友後之講論可師叔文持守可法諸友若能頻與切磋必有益也漳州朱飛卿近到此病作未得細講陳淳者書來甚進異日未可量也答楊至之率性之說大槩得之然亦有未精宻處修道之教當屬何處亦出乎天耳君子中庸章二又字不用亦可但恐讀者不覺故特下此字要得分明耳人皆曰予知一條說得是中庸不可能一條亦然然三者亦是就知仁勇上說來盖賢者過之之事只知就其所長處著力做去而不知擇乎中庸耳中立不倚之說當於或問中發之素隱行恠一章文義極分明如何㸔不破聖人之言固渾融然其中自有條理毫髪不可差非如今人鶻圇儱侗無分别也及其至也或問中巳如此說足以相發明侯氏之說如何是非全體中之不能者更請子細㸔未能一焉固是謙辭然亦可見聖人之心未有滿處各見一義自不相妨也况此兩章正相連如何見得不是一意不見不聞此正指隱處如前後章只舉費以明隱也達徳次第甚明不湏疑著柔遠人亦然物之終始或問說得極分明請更詳之不須便立異議也上焉者王天下者其上不容有人故只得以時言之上文極分明矣代明之說細碎無理答李守約閎祖讀書之法無他唯是篤志虗心反復詳玩爲有功耳近見學者多是率然穿鑿便爲定論或即信所傳聞不復稽考所以日誦聖賢之書而不識聖賢之意其所誦說只是據自家見識撰成耳如此豈復能有長進前輩盖有親見有道而其所論終不免背馳處者想亦正坐此耳所說持敬工夫恐不必如此徒自紛擾反成坐馳但只大綱收歛勿令放逸到窮理精後自然思慮不至妄動凢所營爲無非正理則亦何必兀然静坐然後爲持敬哉答李守約所示課程及日用功夫甚善但有疑雖當識以俟問然亦不可不時時提起閑㸔儻或相值殊勝問而後通也答李守約克巳復禮爲仁曽子言容貌顔色辭氣而其要在動正出之際大抵得之但曽子之語功夫更在三字之前此特語其効驗處耳自古皆有死集注云無信則雖生無以自立不若死之爲安恐語有未瑩安字極有味更冝玩之仲弓爲季氏宰問政程子曰便見聖人與仲弓用心之小大謂仲弓爲蔽於小則可若曰仲弓必欲舉賢之權皆出於巳有若要譽而市恩者則恐仲弓之賢未必至是程子之意固非謂仲弓有固權市恩之意而至於喪邦但一蔽於小則其害有時而至此亦不爲難矣故極言之以警學者用心之私也衛君待子而爲政胡氏所謂具其事之本末告諸天王請於方伯命公子郢而立之於名正矣然孔子之於衛重非世臣親非貴戚之卿則恐衛君之未能安巳以聽之也胡氏之言乃聖人大用之全體但其間曲折之㣲聖人須更有隨宜裁處處不患其不從也若但令出從蒯聵爲輙之私計則可其如衛國何哉程子論請討陳常處云所以勝齊者孔子之餘事此可見聖人之用矣衛公子荆善居室言居室則似是處家之意定公問一言可以興邦舊點言不可以若是爲句今以言不可以若是其㡬也作一句不識别有㣲意否如集注說恐二字亦自相應以若是絶句恐不詞也夫子不答南宮适适雖非問然其言可取則亦不應全然不荅疑其實有貶當世而尊夫子之意夫子不欲承當故不答耳管仲奪伯氏駢邑亦嘗疑蘇說少異然牽於愛而存之此但當用吴氏說引荀子以證之可也避地避世避色避言所遇不同固有未及徴於色而巳發於聲者矣閎祖比㑹江西一士人謂太極圗主静之說乃出於老氏之說江西士人大抵皆對塔說相輪之論未嘗以身體之故敢如此無忌憚而易其言耳敬齋箴云須臾有間毫釐有差須臾之間以時言毫釐之差以事言皆謂失其敬耳非兩事也十月未嘗無陽之說發明程子之所未盡至爲明白此理分明列莊之徒盖巳窺見之矣故有宻移之說答李守約三詩甚善然爲學當以修身窮理爲急不患不能此也師禮自度未有以大爲朋友之益故不敢當來喻似未悉鄙懐也答李守約示喻爲學之病此非他人所能與直湏痛自循省勇猛奮發方有下工夫處若只如此悠悠恐無入徳之期也答李守約所喻春秋難讀固然大抵今所可見者但程先生所謂大義數十炳如日星然亦時有所謂隱之於心而未能愜當者况其精㣲之意乎此須異時别啇量也集古後録甚荷留念但向見傳漕處本中有一䟦古鍾鼎帖銘載翟伯夀說或分一字作兩三字或合兩三字爲一字者甚有理後來見尤延之說常州有葛子平推此說以讀尚書甚有功以是常欲得之而悔當時不及傳録今此本乃無之不知何故試煩更爲尋訪恐有别本只爲檢此一叚來也答李守約熹目益盲而中庸未了數日來不免力疾整頓一過勢湏作三書章句或問粗定但集略覺得尚有未全備處今併附去煩子細爲㸔過記辯併徃冊頭有小例子可見去取之意但覺刪去太多恐有可更𥙷者可爲𥙷之或有大字合改作小字小字合改作大字者煩悉正之早遣一介示及爲佳章句或問中有可啇量處幸喻及答李守約中庸㸔得甚精章句大槩巳改定多如所論但致中和處舊來㸔得皆未盡要須兼表裏而言如致中則欲其無少偏倚而又能守之不失致和則欲其無少差繆而又能無適不然乃爲盡其意耳盖致中如射者之中紅心而極其中致和如射者之中角花而極其中又所發皆中無所間斷近來㸔得此意稍精舊說却不及此也答李守約熹向來所苦只是勞心所致尋以般移應接内外勞擾遂不藥而愈乃知君逸臣勞眞飬生之要訣也答李守約所喻庶母之名亦未正庶母自謂父妾生子者士服緦麻而大夫無服若母則儀禮有公子爲其母之文今令甲其下亦明有注字曰謂生巳者則是不問父妻父妾而皆得母名矣故注中則有嫡母之文又以明此生巳者之正爲母也至如封叙封贈亦但謂之所生母而不謂之庶母也通典之說未睱檢但以公子爲母練冠麻衣旣葬除之爲比則承宗廟社稷之重者恐不得爲父所生之祖者母持重矣更俟病間續攷奉報數日因人說琴謾爲考之頗有條理然不能琴不識其聲但以文字求之恐未必是亦須靣論答李守約所聞喪禮乆以病勢侵迫無復心情可以及此又見所說皆巳失其大體而區區於其小節若隨宜區處則恐亦自失其正而䧟於以禮許人之罪故一向因循不能奉報今又承專人以來不免以屬劉用之令其條析具如别𥿄又不知能行否也大率平日見得賢者郷學之意雖力而終不免多有世俗之心凢事必生宛轉回䕶遮前掩後之意常不快意今乃悉見於此盖其處巳處人無不然者不知亦嘗内省及此否耶答李守約王子合過此說失解曲折甚以爲恨此等事遲速自有時節若斷置得下則自與我不相干矣上蔡於此發明甚有力正好於實地上驗之也前書所問誠字之說大㮣巳得之禽獸於義禮上有見得處亦自氣禀中來如飢食渇飲趨利避害之類而已只爲昏愚故上之不能覺知而下亦不能作僞來喻上文盖巳言之不知如何又却更疑著也大中之說不記向來所論首尾此亦只是無事之時涵飬本原便是全體随事應接各得其所便是時中飬到極中而不失處便是致中推到時中而不差處便是致和不可說學者方能盡得一事一物之中直到聖人地位方能盡得大中之全體也仁包五常之說巳與令𥙿言之大抵如今朋友就文義上說如守約儘說得去只恐未曽反身真箇識得故無田地可以立脚只成閑話不濟事耳答李守約前日所喻舉世皆謂當然熹亦豈敢以爲不然但恐禍福之來亦有定分非智力所能免不欲枉作此怱怱耳若謂與時消息固並行而不悖也答李守約一本作答李時可所論克復工夫甚簡㓗知用心之精切也但依此用力更加講學之功則必有所至矣前所寄者今答于後史論大槩亦甚正也好仁惡不仁章某竊觀之人之資禀固有偏重如此如顔孟之事亦可見矣顔子嫉惡不仁之事罕見於經可謂好仁者於孟子則辨數不仁者之情狀無一毫少貸可謂惡不仁者此說得之斯仁至矣至若來至之意昔者亡之今忽在此如自外而至耳如易言來復實非自外而來也君子所貴乎道者三正之爲言猶有待乎用力之意非如動容貌出辭氣文意自然言君子所貴於道者在此三事而籩豆之事則其所賤也動出非是全不用力正亦非是大叚用力惟正之而非僞飾所以爲可貴耳更詳集注以解經文自見曲折驕吝章集註曰驕矜誇吝鄙吝某竊思之似謂誇其有於巳驕也不以其有與人吝也然又載程子之言曰驕氣盈吝氣歉夫自以爲有餘則氣盈自以爲不足則氣歉似於集註之說不同吝之所有乃驕之所恃也故驕而不吝無以保其驕吝而不驕無所用其吝此盈於虚者所以必歉於實而歉於實者所以必盈於虚也執御章集註謂然則吾當執御矣則以爲夫子真執御至於末後載尹氏之說曰吾將執御矣則以爲夫子之設詞某竊以後說於上下文意爲順黨人之稱孔子如此不知孔子當以嘗執賤事告人而辭其無所成名之大耶當故爲自屈之詞以顯其所稱之失耶二者氣象之大小必有能辨之者沽之哉哉之爲義以常例言之則爲疑辭集注直曰固當賣之而不以爲疑詞何也哉本歎辭其或爲疑辭者亦歎以疑之也此言沽之哉而繼以待價則不得爲疑辭矣巍巍乎舜禹之有天下也而不與焉伊川曰舜禹之有天下也而不與求焉集注不取何也有字與與字相應若爲不與求則有當作得矣恐不然也不忮不求不嫉人之有故無害人之心此之謂不忮不耻巳之無故無貪欲之心此之謂不求則是以一人而兼二病然末後載吕氏說曰貧與富交強者必忮弱者必求似非此意而於本文不明如何不嫉人之有不耻巳之無正是吕氏意不知更有何疑更詳言之不得其醬不食醬者當是鮓醢之物如魚膾不得芥醬麋腥不得醢醬則不食謂其不備或傷人也孟子口之於味章言人之性命有此二端自口之嗜味以至四體之嗜安逸形氣之性君子有弗性焉自仁之於父子以至聖人之於天道道義之性君子性之猶舜所謂人心道心之在人特要精别而力行之耳㸔得儘好答李時可中庸非自成巳而巳也章求之章句曰誠雖所以自成然在我者無僞則自然及物矣若仁皆性之徳故在内外無二道所以時措之而各得其冝也審如是說則是以仁知爲合内外二道而非以誠爲合内外之道恐於合字有疑礙唯誠爲能盡仁知之徳而合内外之道章句語有未瑩處耳中庸不見而章章求之章句則曰不見而章以配地言不動而變以配天言何也且觀上下文雖先言愽厚次言髙明先言配地後言配天然繼此而論天地山川則又以天爲稱者是盖錯綜而言之耳不必以地爲先也此等處不湏深求只是隨文賛嘆大畧㸔過可也中庸喜怒哀樂未發謂巳中正萬物育焉竊謂中也者言性之體也此屬天命之謂性和也者言道之用也此屬率性之謂道致中和者言教之推也此屬脩道之謂教伏讀章句或問則致中和專言自巳之事恐欠推以及人數句巳字疑之字誤正字疑止字誤旣曰天下之大本天下之達道則只是此箇中和便總攝了天地萬物不湏說推以及乎人也前章今承先生曲賜指教思之大槩有二說能推致中和之極而又得時得位以行之則道民以徳齊民以禮以吾之先知覺彼之後知以吾之先覺覺彼之後覺使中和之化浹于天下然後中道之所感格天地以位萬物以育此以事言者也雖不得位以行之而旣以全大中之極致即天地之所以定位者也旣巳全至和之極致即萬物之所以育者也此以理言之也所論中和兩叚大意皆是但前叚說得新民意思大多致和處猶可如此說若致中却如何得天下之人皆如吾之寂然不動而純亦不巳耶只是自家有些小本領方致得和然後推以及人使人觀感而化而動天地感鬼神耳自其巳成而論之則見天地之位本於致中萬物之育本於致和各有脉絡潜相灌輸而不可亂耳誠者物之終始章云云凡有一物則其成也必有所始其壊也必有所終而其所以始者實理之至而向於有也其所以終者實理之盡而向於無也若無是理則亦無是物矣此誠所以爲物之終始而人心不誠則雖有所爲皆如無有也盖始而未誠則事之始非始而誠至之後其事方始終而不誠則事之終非終而誠盡之時其事巳終若自始至終皆無誠心則徹頭徹尾皆爲虗僞又豈復有物之可言哉此即向來所說之意但章句或問說得都不分明故讀者不能曉今得時可反復問辨方說得到次第兩處皆湏更定此可并以示守約也答李時可所喻子文事大槩得之但專以愛言似未盡耳嘗聞延平先生說三仁事云當理而無私心則仁矣今以此語推之則子文合下便有未仁處不待語其愛之不廣然後知其未仁也三仁之心只欲紂改過而圖存比干之殺身盖非得巳箕子亦偶未見殺耳非有意於爲奴也事勢旣爾㣲子自是只得全身以存先王之祀皆理不得不然者使其先有殺身強諌之心則亦不得爲仁矣答李時可示喻執中之說程先生云惟精惟一所以至之允執厥中所以行之明此中字無過不及之中𥘉非未發之中也向於中庸章句序中曽發此義今謾録去答李時可所論大學之要甚善但定静只是知止之効不湏言飬之以定静又别做一項工夫也所引孟敬子章集注中語有餘云者恐是有素豈印本之誤耶然莊敬誠實􅉼飬亦非動容貌正顔色出詞氣之外别有一叚工夫只是就此持守著力至其積乆純熟乃能有此効而不費力耳魯秉周禮盖於是時地醜徳齊之中猶能守得舊日禮樂文章耳若三綱九法之亡則當時諸侯之國盖莫不然亦非獨魯之責也答李時可諸家說見今方尋檢元祐說命無逸講義及晁以道葛子平程泰之吴仁傑數書先附去可便參訂序次當以注䟽爲先䟽節其要者以後只以時世爲先後可也西山間有發明經㫖處固當附本文之下其統論即附篇末也記得其數條理㑹點句及正多方多士兩篇可併攷之答李時可所寄堯典以目視頗艱又有他冗未暇討究巳付諸朋友㸔俟其㸔了却啇量也書序不須引冠篇首但諸家所解却有相接續處恐當作注字附于篇目之下或低一字作傳寫而於首篇明著其繆亦可但恐諸家元無此說即且闕之以俟書成别加訂正也王氏書義序中明言是雱說然荆公奏議却云一一皆經臣手今但以序爲正可也餘未報者併俟後信答李時可所喻固知孝思之切於此不能自巳者然風色如此不論他人雖賢昆仲寕能保其不漏露於三族之間耶此湏他日面見子細啇量亦未爲晚但恐衰朽風燭不定則是天之命也亦無可柰何矣書說縁此間禮書未了日逐更無餘功可及他事只畧㸔得禹貢如冀州分爲三叚頗有條理易照管而諸州皆只作一叚則太闊逺而叢雜矣恐皆合依冀州例而逐句之下夾注某人曰某地在某州某縣其古今州縣名不同有復見者亦並存之以備參考叚後低一字大書右某州第㡬節以圈隔斷而先儒有辨論通說處即亦大字附於其下如逾于河過九江等處今所取程說只有辨而無解大是欠闕湏更子細𥙷足若今日自有所疑有所斷則更低一字冩之如治梁及岐恐晁說爲是其餘固草草程泰之最著力說然亦不通盖梁山在同州近河猶可言河流波及若岐山則在今鳯翔府自京兆府西去猶有六七百里觀地理圖可見其也勢之高且逺河水何由可及耶此類須載其本說而斷以非是則讀者曉然矣如無此兩項則各留一二行空𥿄以俟恐後有𥙷入者其導山處須以四列爲四叚導水則一水爲一叚叚後亦如前例云右導山第㡬節右導水第㡬節其通論疑斷亦如之如此則庶㡬易㸔矣所寄冊子今却封還請依此格目作一草卷便中寄及也答劉定夫所喻爲學之意甚善然說話亦巳太多鄙意且要得學者息却許多狂妄身心除却許多閑雜說話著實讀書𥘉時儘且尋行數墨乆之自有見處最怕人說學不在書不務佔畢不專口耳下稍說得張皇都無收拾只是一塲大脫空直是可惡細讀來書似尚有此意思非區區所欲聞也答劉定夫來書詞氣狂率又甚徃時且宜依本分讀書做人未須如此胡說爲佳答包顯道揚所諭致曲如此說於功夫無不可但盡性乃是自然盡得不可謂之直處用工耳致曲只是於惻隱處擴充其仁羞悪處擴充其義耳雖在一偏此却如何少得耶大率來喻依舊有忽略細㣲徑趨髙妙之意子淵書來云顯道於異說巳洗濯熹固疑之今以此驗之乃知果如所疑也答包顯道旣未免讀書則不曽大叚著力理㑹復是何說向見前舉程文從頭罵去如人醉酒發狂當街打人不可救勸心甚疑之今乃知其病之有在也答包詳道詳道資禀篤實誠所愛重前書云云非以苟相恱也但觀所與顯道講論竊恐却與去歲未相見時所見一般蓋熟處難忘所驟聞者未能遽入而復失之耳大學鄙說近㸔尚有未安處却是未甚平正方畧竄定恨未得奉呈然使賢者見之愈未必信大扺如熹所見愈退而愈平賢者所見愈進而愈險彼此不同終未易合且當置之各信其所信者即㸔乆逺如何耳顯道根本處亦且是從前所見但添得此中些說話如敏道令弟則立論又甚髙尤非熹之所敢知耳答包詳道示喻爲學之意自信不疑如此他人尚復何說然觀古人爲學只是升髙自下歩歩踏實漸次解剥人欲自去天理自明無似此一般作捺紐揑底功夫必要豁然頓悟然後漸次脩行也曽子功夫只是戰兢臨履是終身事中間一唯蓋不期而㑹偶然得之非是别有一節功夫做得到此而曽子本心蘄向必欲得此然後施下學之功也所論當論是非不當論平險者甚善然是則必平正縁不是故有險耳此說甚長非幅𥿄可旣也答包詳道示喻曲折足見進道之力然若謂氣質之偏只得如此用力則固不失爲近本而於獨善其身有得力處今却便謂聖門之學只是如此全然不須講學緃讀書窮理便爲障蔽則無是理矣顔子一問爲邦夫子便告以四代之禮樂若平時都不講學如何曉得禮記有曽子問一篇於禮文之變纎悉曲盡豈是塊然都不講學耶東坡作蓮華漏銘譏衛朴以巳之無目而欲廢天下之視來喻之去無乃亦類此乎答包敏道示喻已悉求放心固是第一義然如所謂軓則一定而浩然獨存使赤子之心全復於此而明義之本先立於此然後求聞其所未聞求見其所未見則亦可謂凌躐倒置而易其言矣聖賢示人模範具在近世乃有竊取禪學之近似者轉爲此說以誤後生後生喜其爲說之髙爲力之易便不肯下意讀書以求聖賢所示之門戸而口傳此説髙自標致亂道誤人莫此爲甚三復來喻恐未免此因便布聞未知明者以爲如何第深僣率之愧而巳答包敏道承喻麤心浮氣剥落向盡閑居意味殊不淺自許如此他人復何所道區區但覺欲寡其過而未能耳答包敏道所喻已悉但道旣不同不相爲謀不必更紛紛今後但以故人相處問訊徃來足矣九卦若如此說却似與前幅自相矛盾也一笑答符舜功叙嘗謂敬之一字乃聖學始終之要未知者非敬無以知已知者非敬無以守若曰先知大體而後敬以守之則夫不敬之人其心顛倒繆亂之不暇亦將何以察夫大體而知之耶答符復仲𥘉聞向道之意甚勤向所喻義利之間誠有難擇者但意所疑以爲近利者即便舎去可也向後見得親切却㸔舊事只有見未盡舎未盡者不解有過當也見陸丈回書其言明當且就此待守自見功効不湏多疑多問却轉迷惑也答符復仲且讀易傳甚佳但此書明白而精深易讀而難曉須兼論孟及詩書明白處讀之乃有味耳答符國瑞辱書具道爲學之志又見令叔爲言曲折甚善旣有此志則窮理飭躬處旦當勉力未可便肆虗談厭未來本恐或流於輕妄而反失之也所需墓額偶苦臂痛不能寫然仁人孝子所以顯其親者正亦不在此也答黄㡬先示喻巳悉但旣曰各勉其志以自立而有待於歳寒則何必爲此縷縷而煩執禮之恭哉衰病比劇舜功遣人行速布此不及詳然亦無以詳爲矣答陳超宗示喻向來鄙論有未盡者甚善甚善但爲學雖有階漸然合下立志亦須畧見義理大槩規模於自已方寸間若有箇惕然愧懼奮然勇決之志然後可以加之討論玩索之功存飬省察之力而期於有得夫子所謂志學所謂發憤政爲此也若但悠悠泛泛無箇發端下手處而便謂可以如此平做將去則恐所謂莊敬待飬必有事焉者亦且若存若亡徒勞把捉而無精明的確親切至到之効也但如彼中誠是偏頗向日之言正爲渠輩之病却是賢者之藥恐可資以爲益耳以今觀之政不必爾但將聖賢之言事理就已心上作一處㸔隨得隨守則乆之須自有開明處也答陳超宗示喻巳悉但如此安排布置都是病痛又如必欲繆札安立標榜尤是大病若是真實做工夫㡳人只此一念之間便著實從脚根下做將去何暇如此擬議粧點邪不須深議他人得失政恐未免反爲彼所笑也答陳超宗示喻自覺已與舊時逈别但未免間有小失果能至此甚慰所望但向來啇量及得近書所論似於著實下功處猶未親切不知如何便得到此恐可且更向裏用心將此等向外粧點安排底心一切掃去乆久或有長進耳若如此說今日用功明日見効則其不曽下功斷可知矣答顔子堅包顯道在此數稱吾子之賢毎恨未獲一見辱書備見雅志亦足以當晤言矣然所謂古人學問不在簡編必有所謂綂之宗㑹之元者則僕之愚於此有未諭也聖人教人博文約禮學問思辨而力行之自灑掃應對章句誦說以至於精義入神酬酢萬變其序不可誣也若曰學以躬行心得爲貴而不專於簡編則可若曰不在簡編而惟統宗㑹元之求則是妄意躐等以䧟于邪説坡行之流而非聖賢所傳之正矣抑觀來書詞氣之間輕揚傲誔殊無謹厚篤實之意意者吾于於下學之功有未嘗加之意者不知徃年見張陸二君子其所以相告者果何事也又聞不念身體髪膚之重天叙天秩之隆方將毁冠裂冕以從夷狄之教則又深爲惘然不意吾子知尊敬夫而所趨者若是豈亦所謂綂宗㑹元者之爲崇而使吾子至於此邪顯道不能諌止巳失朋友之軄節夫更有助縁尤非君子愛人之意也聞巳得桐曹䐑髠􅗴有期急作此附遞奉報㒹吾子於此更入思慮或意已決亦且更與子静謀之必無異論而後爲之似亦未晚如曰不然則道不同不相爲謀僕不知所以爲子計矣答熊夣兆天命謂性充體謂氣感觸謂情主宰謂心立趨向謂志有所思謂意有所遂謂欲此語或中或否皆出臆度要之未可遽論且􅉼泳玩索乆之當自有見或云學者天資庸常舊習未去便令他學中則怠墮廢弛循常習故去須是奮發有豪邁之氣出得舊習了然後求中所以孔子道不得中行而與之必也狂狷乎竊謂所學少差便只管偏去恐無先狂後中之理或人之說非惟用力處有病亦說壊了中字後說得之或云明道說居處恭執事敬與人忠了此便是徹上徹下語且道如何是徹下語居處恭執事敬與人忠此是形而下者然於此須察其所以恭所以敬所以忠其來由如何以至耳目鼻口視聴言動皆然了此便透頂上去便是天命天性純乎天理此是形而上者是徹上語是一體渾然㡳事元無兩般能了此則他禪宗許多詭恠說話皆見破若如此說是乃自䧟於異端而不自知又如何見得他破常學持敬讀書心在書爲事心在事如此頗覺有力只是瞑目静坐時支遣思慮不去或云只瞑目時已是坐妄想之端讀書心在書爲事心在事只是收聚得心未見敬之體静坐而不能遣思慮便是静坐時不曽敬敬則只是敬更尋甚敬之體似此支離病痛愈多更不曽得做功夫只了得安排杜撰也毎有喜好適意底事便覺有自私之心若欲見理莫當便與克下此等事見得道理分明自然消磨了似此迫切却生病痛上蔡對伊川也只是去箇矜字上蔡才髙所以病痛盡在此此説是父母之於子有無窮憐愛欲其聦明欲其成立此謂之誠心耶父母愛其子正也愛之無窮而必欲其如何則邪矣此天理人欲之間正當審决待人接物之道如何知所以處心持巳之道則所以接人待物自有凖則近專㸔論語精義不知讀之當有何法别無方法但虚心熟讀而審擇之耳安老懷少恐其間多有節目今只綂而言之恐學者流爲兼愛去此是大槩規模未説到節目處學者有志於仁雖其趨向巳正而心念未必純善豈得言無惡也志於仁則雖有過差不謂之惡惟其不志於仁是以至於有惡此志字不可草草㸔富貴貧賤不以道得不去處之説此是爲大賢巳下設若大賢以上則處富貴貧賤只如一更不消如此説聖賢之言多是爲學者發若是聖人分上固是不須説不但此章而巳也聖人不勉不思今書載傳授之㫖云允執厥中下一執字似亦大叚喫力如何聖人固不思不勉然使聖人自有不思不勉之意則罔念而作狂矣經言此類非一更細思之孔子言關雎樂而不淫哀而不傷是言樂不至於淫哀不至於傷今詩序將哀樂淫傷判作四事説似錯㑹論語意以此疑大序非孔子作此説得之大序未知果誰作也大雅小雅或謂言政事及道故謂之大雅止言政事故謂之小雅竊恐不可如此分别如此分别固非是然但謂不可分别則二雅之名又何以辨耶五伯秦穆未嘗生盟中夏乃與其數晉悼嘗爲盟主却楚服鄭何故不與此等無所考且依舊説又有昆吾豕韋大彭之説亦兼存之可也竊謂釋氏之失一是自私自利厭死生爲學大體巳非二是㓕絶人倫三是徑求上逹不務下學偏而不該其失固不止此然其大處無越是三者未須如此立論釋氏言輪回轉化之説所傳禪長老去何處託生其迹甚著是謂氣散而此性靈不㓕伊川聞之曰若謂旣斃之氣復爲方伸之氣與造化殊不相似似與性靈之説不相干如何此等處窮理精熟自當見得未可如此臆度論也答安仁呉生去歳辱書無便可報今又承專人枉問極感至意且知志尚之髙逺爲可喜也然三復來示盖巳自謂所得之深而自信不疑矣復何取於老拙之無聞而勤􅈤若是耶以爲見教則僕未嘗有請於吾子以爲求知於僕則易簡理得可乆可大之君子似不應若是其汲汲也且僕於吾子𥘉未相識問之來使則知吾子之齒甚少而家有嚴君之尊焉今書及詩序等乃皆嵬岸倨肆若老成人之爲者至於卒然以物饋其所不當饋之人而不稱其父兄之命則於愛親敬長之良知良能又若不相似也吾子自謂巳得是心而明是理僕不知吾子之所謂心者果何心所謂理者果何理也夫顔子之樂未嘗自道曽晳之志非夫子扣之再三而不置亦未嘗肯遽以告人也豈若是其高自譽道而惟恐人之不我知也哉相望之逺不知吾子師友淵源之所自恐其所以相告者未得聖賢窮理脩身之實而徒以空言相誤使吾子䧟於往妄恣睢之域而不自知其非也所惠𥿄簡硯墨受之無說不敢發封復以授來使矣吾子其於聖賢小學之教少加意焉則其進有序而終亦無所不至矣答趙然道師雍足下求官得官今所從䆠又去親庭不逺足以往來奉飬君親之義爲不薄矣今乃無故幡然自謂弃一官如弃涕唾何始慮之不審而乃爲此傲睨之詞耶此鄙拙之所未喻也荆門之訃聞之慘怛故舊凋落自爲可傷不計平日議論之同異也來喻又謂恨不及見其與熹論辨有所底止此尤可笑盖老拙之學雖極淺近然其求之甚艱而察之甚審視世之道聽塗説於佛老之餘而遽自謂有得者盖嘗笑其陋而譏其僭豈今垂老而肯以其千金易人之弊帚者哉又况賢者之燭理似未甚精其立心似未甚定竊意且當虚心擇善求至當之歸以自善其身自此之外盖不惟有所不暇而亦非所當預也向有安仁吴生書來狂僣無禮嘗以數字答之今謾錄去試一觀之或不爲無𥙷也所喻寫孟子字多不暇三大字適冗亦未及作然此亦何能有助於學而徒使老者勞於揮染耶答康戸曹仲頴一本無仲字熹衰懶杜門少與人接頃歳偶見足下省闈條對之文愛其詞氣議論之不凡毎恨無因縁相見數爲士友言之茲辱惠書乃知此意嘗得徹聞而又喜賢者之不予鄙也示喻縷縷足見所存之逺大矣然嘗以熹所聞聖賢之學則見其心之所有不離乎日用尋常之近小而其逺者大者自不待於他求𥘉不若是其荒忽放浪而無所歸宿也故曰下學而上逹又曰學問之道無他求其放心而巳矣比聖賢終身事業熹也少而嘗有志焉今老且死尚恨未能有以得其彷彿之萬分也足下不以愚言爲無取幸試思之異時肯來如約其從與否熹將望足下眉睫而有以得之也答邵叔義一本無叔義二字有機字逺辱惠書良荷厚意而長牋短幅表裏殫盡尤見雅志之髙逺也髙侯教士飬民之績巳悉書之如來喻之云矣但衰晚多病目瞽神昏序事之外無能有所發明此爲愧耳至於髙侯之所以教與足下之所以學亦恨未得其詳然竊意必欲實爲此學亦當有以自致其力於日用之間有心飬氣讀書窮理積其精誠循序漸進然後可得决非一旦慨然永歎而躐等坐馳之所能至也答邵叔義竊聞下車以來究心軄業設施注措類非俗吏之所能者甚善甚盛委喻祠記深認不鄙𥘉以衰病之餘心力衰耗兼前後欠人文字頗多不收率爾承當又念題目甚佳却欲附名其間使後人知賢大夫用心之所在但見有一二文字未竟度須更數日方得下筆九月間更令一介往山間取之爲幸絜矩之義乃少日間之先友范公名如至字伯逹其說如此義理切當援括分明先儒訓説皆未及也今得仁者表而出之豈惟學者之幸盖今百里之人與異時臨莅所及無不蒙𬒳其澤幸甚幸甚大學鄙説舊本紕陋不足觀近年廔加刋訂以頗得聖賢之遺意怱怱未暇抄錄求教答邵叔義所喻日用工夫如此數語誠是要切然亦須真踐其實乃爲有益不然徒爲墻屋標榜反招譏訕也答邵叔義子静書來殊無義理毎爲閉匿不收廣以示人不謂渠乃自暴揚如此然此事理甚明識者自當如之當時若更不答却不得也所與左右書渠亦錄來想甚得意大率渠有文字多即傳播四出唯恐人不知此其常態亦不足深恠吾人所學却且要自家識見分明持守正當深當以此等氣象舉止爲戒耳太極等書四種謾附呈恐有所疑却望䟽示徐丞處想時有便也吴大年極荷留念想且留番陽也答湯徳逺示喻爲學之意極高爲逺非愚慮所及然未知所論於聖賢之言以何爲據其用力次第果如何此必有親切慤實可以循序而進者乃爲吾儒之學如其不然恐未免䧟於佛老之邪説非熹之所敢知也答王徳修熹兒侍先君子宫中秘書是時和静先生實爲少監熹嘗於衆中望見其道徳之容又得其書而抄之然㓜穉愚蒙不能識其爲何等語也既長從先生長者游受論語之説遍讀河南門人之書然後知和静先生之言始有以粗得其味然旣不得親受音㫖而其髙第弟子如老丈者又未得見以信其所粗得者果先生之意否也正叔之來旣獲聞所以相予之意甚厚又得其所聞於左右者一二信乎河南夫子所謂終有守者其傳固如此也甚慰甚幸二説頃歳盖嘗見之其間尚有未盡曉處恨未得靣叩耳讀論語詩三復感歎今日學者不沒於利欲之塗即流於釋氏之徑往往視此爲迂闊卑近亦無恠其迷於入徳之方也答蘇晉叟溱示喻爲學之意比之前日加通暢矣牛山之木一章比類觀之甚善但論心與性字似分别得太重了有直以爲二物而各在一處之病要知仁義之心四字便具心性之理只此心之仁義即是性之所爲也梏之反覆非顚倒之謂盖有互換更迭之意如平旦之氣爲旦晝所爲所梏而亡之矣以其梏亡是以旦晝之所爲謬妄愈甚而所以梏亡其清明之氣者愈多此所以夜氣不足以存其仁義之良心也舊説夜氣不存非是唯程先生説夜氣之所存者良知也良能也此語最分明更詳之是豈人之情也哉此句解得亦太迂曲存亡出入一節乃是正説心之體用其妙不測如此非獨能安靖純一亦能周流變化學者須是著力照管豈専爲其巳放者而言耶今專指其安靖純一者爲良心則於其體用有不周矣書中所論性情者得之但亦須更以心綂性情一句參㸔便見此心醴用之全自寂然不動以至感而遂通天下之故無非此心之妙也儀象法要頃過三衢已得之矣今承寄示尤荷留念但其間亦誤一二字及有一二要切處却説得未相接不知此書家藏定本尚無恙否因書可禀知府丈丈再爲讎正庶㡬觀者無復疑惑亦幸之甚也西銘説極可笑渠今春寄來前日紛紛此亦其一端後來又嘗請對詆横渠尤力不答乃退向非天日清明此亦足爲學者之禍也答蘇晉叟示喻已悉但心綂性情一語更宜玩味令其同異分合之際判然不疑即於窮理脩身到處得力耳易圖昨亦有書粗論其意後來有少改更脩版未畢它日當寄去論孟解乃爲建陽衆人不相關白而輒刋行方此追毁然聞鬻書者巳持其本四出矣問之當可得然乃是静江本之未脩者亦不足觀也近爲此事所撓甚悔傳出之太早也答蘇晉叟所喻大槩皆近之但頗傷冗雜及論仁字未當更宜虚心玩味不必外求但將此見在所説者子細反復之自然見得簡約條暢也持敬格物功夫本不相離來喻亦太說開了更宜審之見得不相離處日用間方得力耳答蘇晉叟别紙所示一一報去程先生云性即理也此言雖約而甚親切有喚省人處可更就此思之大抵讀書且當随文然看俟其詞㫖曉析貫通然後自有發明未可遽捨本文别立議論從長虚見無益於實也溱竊謂性體純静無善惡之可名愚痴之可分而情與才者則實寓於此性夫人禀賦之𥘉自非聖人生知安行不俟矯揉其他氣質往往滯於一偏而才也者遂有髙下清濁之異人苟随其所偏而任其情則賢者僅止於賢而不賢者無復可反善惡之流自此分矣則是學之不可以已故賢者即其才之善而抑其偏則情之所發無非循性之自然乆乆不巳得性之全則與聖人一矣不賢者即其才之不善而矯其偏則情之所發始能裁制以求合乎天理之正進進不巳漸履其常常而乆之則亦純合乎此性固有之善而與聖人亦一矣故循性之情則情不離性情随質遷則性因習逺情不離性聖域攸歸性因習逺終焉下愚中庸曰及其知之一也又曰及其成功一也至一之地其純静明㓗大同之始乎致一之功其博學篤志不已之力乎溱擬欲以是爲性情與才之辨乞賜批誨性情與才之辨當熟考孟子及程先生諸説而反之於身即今何者是性何者是情何者是才湏令一一實有下落方有下功夫處如此之論非惟條理不明名言多誤而用力處亦不親切更幸思之溱竊謂易之體用天地人物安然自有至信至順底道理停停當當不以人而過不以人而不及此易之體也中也宜也時也犂然一契於至當之理此易之出也人何以晦是之體反是之用夫人汨之以情僞亂之以私欲回視其身不啻如虗舟飄瓦尚何覺知此體此用爲如何哉必也主敬以直其内立義以方其外損益盛衰之理随時裁制以就其宜自然出入起居之際易之全體不隔毫釐而易之大用無或偏蔽體用混融妙理純契一天地之闢闔會鬼神之動静至矣盡矣不可有加矣溱擬欲如是讀易乞賜批誨易本卜筮之書而其畫卦繫辭分别吉㐫皆有自然之理讀者湏熟考之不可只如此想象賛歎若可只如此綂說便了即夫子何用絶韋而編㓕溱簡耶學原於思不思則不得然而溱竊復以謂覬得之之心又學者之患不審先生以爲然否更乞誨教方其思時自是箸覬得之心不得但思則自當有得如食之必飽耳溱竊謂學者儘收歛儘安静去道儘近儘放逸儘流蕩去道儘逺不知先生以爲如何理固如此不須如此安排後章倣此程先生云知至至之始條理也知終終之終條理也其義何如乞賜批誨學者之𥘉湏是知得到方能行得末後湏是行得到方是究意故程先生又云知至至之主知知終終之主行此語亦可更考玩也答蘇晉叟示及自警詩甚善然頗覺有安排揍合之意要湏只就日用分明要切處操存省察而此意油然自生乃佳耳答蘇晉叟所示文字足見潜心之力但却湏更於分明平實處㸔乃見端的一向如此恐浸淫入禪學去矣答蘇晉叟先墓之文每以爲念前此病足之後脾胃衰弱不能飲食精力疲怠不能支吾近方小康而目盲愈甚其一巳不復見物矣加以應接紛紜日間見客寫書更無少暇以故乆未能下筆積欠頗多非獨賢者所屬爲然也今又重以僞學得罪明時姓名踪跡無日不掛議者之口又豈作爲文字治伐金石之時耶所示文字敬且收藏萬一未死之間幸䝉寛恩蕩條瑕垢乃當有以報耳在親迎黄岩未歸正以向來奏𥙷僥冐自疑未敢令赴試也
