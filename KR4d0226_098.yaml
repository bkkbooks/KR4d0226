body:
  text: 行狀朝奉大夫直袐閣主𬋩建寜府武夷山冲佑觀傅公行狀本貫孟州濟源縣曽祖君俞故任通直郎知京兆府奉天縣事贈正奉大夫曾祖妣張氏贈碩人祖𥙿之故任朝議大夫主𬋩南京鴻慶宫濟源縣𨳩國男食邑三百戸祖妣錢氏封恭人父察故任朝散郎尚書吏部員外郞贈徽猷閣待制累贈少師謚忠肅妣趙氏封清源郡太夫人贈秦國夫人公諱自得字安道其先鄲州人自曾伯祖獻簡公以清直仁勇事仁宗英宗神宗歷三朝皆以諫諍有聲在哲宗時遂聞國政盖始築草堂於濟源之上而家焉至忠肅公遭靖康之難實以忠義死國事其事皆具國史公㓜頴悟讀書不數過輒成誦有至性生十年而忠肅公薨哀號思慕若成人事太夫人愛敬飭備一舉動唯恐失其意遭亂離轉側兵間遇父友故叅知政事陳公與義扵嶺右陳公竒愛之坐之膝撫其頂曰長必以文名天下因自誦其詩之傑句以詔之公時雖㓜已悉領解年十四賦玉界尺詩語意警㧞故叅知政事李公邴大驚異之因許歸以女旣乃定居于泉州家貧甚夜燃薪自照與兄弟讀書或至逹旦遂博通六經諸史百家之言下筆爲文輒數千言初朝廷以忠肅公死事録其孤公得補承務郎三監潭州南嶽廟乃爲福建路提點刑獄司幹辦公事使者李公公懋性剛介好面折僚吏獨屈意待公欲試以事因悉以訟牒委焉間相見則摘其事以問公具條委折及其姓名爵里一無所遺李公喜甚自是一司之事無不取决扵公書奏出公手輒報可他人爲之則多寢不下李公行部至漳州㑹州兵擒漳浦賊華齊及其黨與以獻而安撫司以便宜指揮檄憲司悉斬之李公將從之公爭不可且曰便宜指揮安撫司受之朝廷本司無所預今廼承之扵安撫司可乎李公悟命悉械繋諸縣分鞫之獄成以法誅其首數人餘悉以卑軍中盖全活㡬百人巳而丐閑得主𬋩台州崇道觀秩滿通判漳州事太守劉公才邵始以公年少未甚相知及見其處事精明馭吏嚴整而文詞敏妙又非流輩所及乃大歎服郡事非公不决間則相與徜徉以文字相娯樂每語人曰自傅君至吾始知有爲郡之樂時山獠跳踉未巳而太守與統兵官陳敏不相䏻餉或不繼軍㡬變公調護其間甚力且爲移耆轉運判官得錢二萬緡以瞻其軍敏及軍士皆感泣思奮群盗竟平及公代去敏語其下曰傅公成就吾軍如此而未嘗以一事干吾軍政可謂眞清矣故聞公䘮偶欲遣其愛妾挾重貲來奉公公亦竟不受也漳浦尉士有申和者以事爲郡所逮縣忽告有盗入竟請兵爲援公笑曰是必非實特爲申和地耳巳而果然陳敏亦爲和請公弗從竟捕寘于法而後以卑軍中後十餘歳公自融徙潮行荒山大雨中忽有以巵酒獻者問其姓名則申和也公愕然詰其所以來之意則曰和日者罪當誅公用法固無所私然和獨抵辠而家獲全是以感恩而來耳公爲笑而飲之臨漳公帑歳時例外致饋守貳甚厚公獨不以一錢入門悉儲扵外以給賔客之費比去計所不取盖餘千緡通判泉州事公居泉乆及貳郡事洗手奉公無毫髪私且熟知民俗利病部使者多委以事轉運司嘗欲榷郡酒酤公格弗下吏白恐獲辜公曰泉人中産之家仰是以給者十室而五是决不可行若輩徒欲行文書因取賂扵酒家耳乃私以書條利害于使者事竟寢有賈胡建層樓扵郡庠之前士子以爲病言之郡賈貲鉅萬上下俱受賂莫肯誰何乃羣訴于部使者請以屬公使者爲下其書公曰是化外人法不當城居立戒兵官即日撤之而後以當撤報使者亦不說然以公理直不敢問也受代造朝民争遮道以送有金户齊氏探其懐出金十兩以獻公曰某爲金戸郡官買金無藝且多不償直獨公未嘗市分星爲賜厚矣此乃丹藥所化爲杯器食飲當益人故敢以夀公而非敢以爲獻也公笑郤之差知興化軍事興化素號難治前守聴訟或繼以燭事猶有不决者公剖决如流廷無滯訟發姦擿伏猾吏束手日未午棠隂無一迹矣扵是乃以暇日延禮邦人士大夫之賢者相與從容賦詩飲酒爲樂而郡以大治初秦丞相檜以公忠臣子年少䏻自力學問有文詞通吏事遇之甚厚然亦疑其剛果負氣終不爲巳用故雖使之連佐兩郡然皆銓格所當得召試愽學宏辭科又巳奏名而故黜之及泉代歸乃間語公曰故事三丞得通用䕃補人而丞宗正者例以玉牒奏篇得爲郎况公之文今從臣中名能文者所不及顧公太剛耳盍亦思少自貶乎公黙喻其意然以太夫人春秋髙且樂居閩中不肯逺適乃力請便郡歸養秦丞相以是始怒而其黨又或隂中公以爲有顧望持兩端意以故是時公資序巳應典州而僅得莆陽軍壘以歸然公亦旣朝辭而行有日矣會通判衢州汪召錫者告前知泉州趙令衿誹謗且有及丞相語臺諌徐嚞等交章論奏事下廷尉秦丞相因以上旨命公體究令衿在泉時納賄事公以嘗同官辭丞相不可是時丞相權震天下一忤其意家立碎公念前巳有小隙今又力辭必重得禍貽太夫人憂意不䏻不少回惑乃不得巳奉命以行至泉按事十得一二即不復窮竟然猶慮不免爲異時之累則見故樞宻黃公祖舜而問焉黃公曰事端幸不自我加之以恕可也尉然其計旣上其事又爲請得毋更置獄㑹廷尉獄成令衿巳坐譴奏上不過追納所受金而巳方事作時戸部曹泳刑部韓仲通實主之兩曹符檄日四五至督趣甚峻巳而秦丞相死泳𬒳逐仲通恐禍及巳乃以體究事劾公朝廷亦知非公首事姑下公置對而仲通章再上遂罷公郡事公在郡不半歳罷去之日父老邀遮涕泣其賢士大夫有追路越境持公慟哭而别者後兩年諫官挾舊怨復以前事爲言遂奪公官徙融州爲民公念前日本以愛親故不敢力辭體究事今乃反爲親憂痛自咎責聞命即卻酒肉屏媵御獨與一浮圖人偕行至融杜門讀書益犬覃思扵文章融人皆敬愛之而中州人士官其土者亦皆樂從公㳺以文字求指教盖居融四年如一日泊然無復有一豪軒冕意特一念親闈在逺不獲日夕左右則涕泣竟日會黃公給事東省知公前事首末力言扵故丞相魯國陳文恭公魯公亦素知公遂以上聞得内徙潮州未㡬聴自便主上登極復故官右通直郎時魯公猶當國欲寖用公乃先除主𬋩崇道觀以言者罷乾道初元始復得申前命未㡬故樞宻林公安宅又力薦於上且具白公前𬒳枉狀除知漳州又爲言者所持事竟中寢未數月今少傅福國陳公入爲吏部尚書雅知公之爲人則與侍從官數人露章薦公事親孝居官廉愽學䏻文興化之政庭無留訟而所坐初非其辜遂再除知興化軍而陳公章中語人以爲無一字不實也陛辭論尉利捕盗之賞妄執平民有至論死而不䏻自明者語未竟上遽曰今之儒者例以不殺爲仁然殺人者死公徐對曰臯陶稱大舜之徳曰與其殺不辜寧失不經殺人者固應死而不辜者豈可殺上意亦悟即連稱曰不辜則不可不辜則不可公退以語宰相時朝廷方議重強盗之法以公言而止公前治興化有惠愛去之十有四年而再至且復奉安輿以來闔郡之民垂髫戴白爭迎車下歡呼之聲滿道公治郡如前時郡有猾民素以挾持郡縣爲事者數輩前公未至盡挈其家以遯公條敎素信扵民不動聲色而郡復大治民李氏嘗寓白金扵其族兄巳而誣以盗獄更數政不决公明其誣且判曰銀當羽化旣慙長者之風金或誤持又愧同舎之誼聞者感歎悚服且傳誦其語以爲無愧扵唐人甲乙之判李氏感泣㑹太夫人有疾供佛燃燈以禱旣而太夫人竟不起郡縣賻金餘千緡公辭曰家雖貧幸足以葬豈可以此汚吾親皆却弗受而父老犇走闕下以公治狀白于朝者數十百人中書爲書于籍公性至孝以奉太夫人故仕宦未嘗出閩中太夫人小有疾則憂形于色在漳時官舎有池亭日奉太夫人飲焉忽有珍禽彩羽數十容與水上太夫人甚愛之一旦忽飛去太夫人不樂爲不飲者數日公懼與其室共禱于神明日乃復奉太夫人飲池上則禽亦皆復來集矣比公去廼巳竟不知其所自來亦莫有䏻名之者時以爲孝誠所感云至是服䘮毀瘠甚免䘮言及輒涕下初造朝知識見之無不驚愕再除知漳州奏事稱旨留爲吏部郎中天官素號劇繁侍右尤甚吏舞文爲姦爲郎者例不可否事公旣入即召令史而下語之曰吾乆諳州郡利病扵省曹事體初不熟今幸蒙恩得備郎選亦将以治州郡者治之耳吏懾伏不敢欺然公素以吏事自喜而銓曹守格法無所施爲遂請于朝願竭力外官上喜其意除直祕閣福建路轉運副使陛辭玉音襃諭且云素知卿有風力閩中多贓吏故命卿徃行召用卿矣公即奏治道去泰甚閩中去朝廷逺吏不知奉法然取其甚者一二人治之亦足以厲其餘上首肯之時閩部上四郡行鈔鹽法歲入悉輸大農漕計爲空而州縣窘匱尤甚吏兵之給弗供廪廪然有朝夕憂公奉命疾馳至部夙夜詢究利病所在而叅伍其說大抵皆以爲官不鬻鹽則無以爲歳計然縦州縣一切科之扵民則民必大病獨一二近鹽之鄉若非籍戸定數使民必鬻扵官則私販公行官鬻不售豪強得以倚法幸免而貧弱顧獨受弊扵是乃使縣各以地逺近利病所宜爲法而奏行之且寛其宿負貸以本錢蠲增鹽錢數十萬緡州縣之力以寛而公又爲之樽節用度一毫不妄取予漕計亦遂饒足泉州兩稅外復科宗子米歳歳增廣民不堪命郡太守若周公葵王公十朋皆嘗請罷之弗果行公力必爲言得旨戸部給度牒轉運司移他郡錢俾之和糴而禁其科擾泉民感公恩生祠之盖公爲治大率以愛民爲主而保全下吏非有民訟不獲巳亦未嘗輕有所按治其罷軟不勝任者多奏處以祠禄畧如公前奏語然其候視極精明風采可畏愛吏亦不敢犯也建寧闕守公以郡屢易将帑廪空乏且歲頗不登亟聞于上乞選䏻臣以治之上素知公即除知府事建寧當孔道部使者多寄治民健訟爲郡者日不暇給公談笑以治之事或累歳不决壹經公手無不立辨且後無䏻易者今戸部尚書王公佐爲轉運判官嘗語人曰吾與傅公厚乃因政事間相知耳歳小不登公發廪賑濟有嘯聚欲爲宼者僚屬請出兵以捕公特以文檄俾鄉官諭之皆帖伏不戮一人而定屬縣有殺人者方捕治而他縣獲逃卒卒扵獄中自首嘗殺某人縣以言府公疑有姦命鞠其實果吏敎殺人者重賂逃卒使僞首則殺人者可不死而卒􅓧亦止扵流因并論吏如法移知寧國府事寧國民淳事素簡公亦以淸静治或累日庭無公事酒官有爲專知所悖自言者公召詰之吏具言監官贓辠公曰是則然然上下之分不可亂也命杖之吏不伏公立命械治獲其流辠将論决袒其背則有涅文爲皇帝萬歳四大字公笑曰是固有法命呼執箴者雜刺涅使不成文乃論如法明日闔郡士大夫悉來賀曰此素横于鄉者前太守屢欲治而不能不謂公談笑間去此一害公曰法當然吾非有心者也春雨水溢将決圩田公力捍之而止上嘗以手札訪問公具以實奏秋大旱時公将去郡猶請于朝蠲租十餘萬斛旣去累年後守偶閱公帑之籍見某年齋閤迎新供帳獨無一不存者怪而問之則公所留也因大歎服毎以語人盖公平生涖官所至率常如此此特因事而顯耳復爲福建路轉運副使公所臨郡縣小有水旱必以聞至是泉州大旱而守利督租諱之公奏請募海舟廣糴以助民食由是米不翔貴臨安闕帥上命執政選有風力不阿權貴者爲之執政擬二人以進上獨指公以爲可亟命召之先是公嘗以事過三山副緫𬋩曽覿先來謁公曰聞公之名乆矣因自誦其詩數十篇且請公誦近作公辭以憂患廢忘時其亡而徃報之及爲郎復嘗遇扵客次覿詫數從官曰某人某人嘗辱來訪公獨見鄙何也公遜謝而已竟不徃及将使閩部閤門官子弟有使本道而召還者以職事來謁公徃報之延公便室則覿及從官數人皆在時方置酒公飲一巵辭腹疾而退扵是翰林承旨亦以入直辭諸人皆有赧色覿大不樂公退謂諸子曰仕宦當自結明天子其次當由宰相安能俯首此曹以求進邪以故權貴多嫉公而召命竟不行改除兩浙西路提點刑獄公事時公年巳六十餘矣性本剛介疾惡不能容人之過以故歷官任事多與物忤至是自度不䏻俯仰俗間上章丐閑不允得移浙東兩浙今號封畿多有力者部使者例不案事公入竟受訴牒日數千𥿄一一親爲剖决所至决遣囚徒臺無留事至扵紏剔愆違䋲治姦墨或望風解印綬去常山令爲民所訟公素不輕案吏先面戒之而執法殿中者親黨多在其邑令事之素謹亟馳書求援其人即論公前使閩時推行塩筴非是今又欲逐令而使其親黨代之以此公至治所未十日而賜罷過建寧父老捧薫鑪以迎者夾道數里而浙東人亦至今稱思之然公益自知果不爲世俗所容乃復求爲祠官得主𬋩武夷山冲佑觀秩滿復除知寧國府事朝命督行甚峻公不獲巳单車引道行未數程復以言者追論前體究事且嘗面折泉守爲辠則又以冲佑祠官罷歸公性髙簡不妄與人交居泉五十年杜門自守讀書奉親外無他爲中間乗貳車持使者節亦且十餘年訖未嘗以一事擾州縣太守之賢者如宋公之才王公十朋周公葵皆髙仰之待以異禮而公月不過一詣郡毎留語談說道誼而巳至是居間益無事唯讀書不輟客至觴酒論文道說古今唱酬詩什以相娛樂蒼顔白髮意氣偉然未嘗以留落不偶㡬㣲見言面也前居䘮哀毀得脾疾至是益侵然猶日誦書數卷旣病則屏卻藥餌獨飲水以待終一日忽召所善前昭武守黃君維之新新安守石君起宗置酒卧内與訣旣而劇談詼笑歌呼如常時翌日遂不起時淳熈十年秋八月也年六十有八積官朝奉大夫其配李氏有賢徳先公三十餘年卒今贈安人子男五人伯夀朝請郎權知道州軍州事伯成宣敎郎新知福州閩清縣事伯詳将仕郎卒伯瑞迪功郎新漳州龍溪縣尉伯拱業進士當以公致仕恩𥙷官女四人長適承奉郎知潮陽縣丞李讜次適進士李申之繼室以其季俱早卒次適進士黃知白孫男五人充業進士育良尚㓜餘未名孫女六人長及嫁餘尚㓜公扵書無不讀少治春秋有聲塲屋間中年讀詩至鴛鴦之二章因悟比興之體閒爲子弟論說多得詩人本意故太常丞呉公棫來官泉州公聞其博通古學著書甚富日從之逰相與傅約徃復不倦吳公恱之請公序其論語十說今行扵世謫居讀易數日一周手書程氏傳一通玩繹乆之𥿄爲之弊其扵子史百氏之書嘗過目者盖皆畧成誦也識慮髙逺機警絶人少時聞朝廷奪劉光世軍更遣儒臣代将歎曰是必且敗事矣亟移書所知刑部侍郎曽公𨳩請如唐罷馬燧郭子儀等故事擇其偏禆授以兵柄曽公然之将以白宰相未及而酈瓊等叛書巳聞矣叅知政事李安簡公亦忠肅公執友也罷政居㑹稽公徃見之李公𥘉以通家子弟待公問曰子以老夫今日之罷爲何如公曰得失相半公問其故公曰公𥘉附和議而終以弗合去豈非得失相半乎李公起握公手曰公晦爲不亡矣虜冦淮甸公以書抵樞宻黃公論備禦方畧因䇿虜有十敗且言其變必自中起書至不數日虜酋元顔亮果爲帳下所殺黃公以示諸公且報公曰何其䇿之明也曽覿自福州召還公移書丞相陳福公爲言覿入必留留必爲善人正論之害其後亦皆驗公少從外舅李公學爲文得其指授之㣲意既長益從當世先逹逰又日求其所未至刮磨灌漑以迄有成則其氣骨雄健而關鍵謹嚴波瀾浩溔而語意精切有非當世文士所及者李公每讀而歎曰吾文有傳矣故丞相魏國張忠獻公及尚書左丞葉公夣得翰林汪公藻中書舎人張公嵲尚書郎新安朱公得其文皆愛重之汪公尤歎賞每謂公曰今世綴文之士雖多而徃徃昧扵體製獨吾子爲得之不懈則古人可及也然再試禮部輙不利三應愽學宏詞科一旣入等而黜于中書遂不復應科舉而誨諸子甚力伯夀伯成皆及太夫人無恙時登進士第伯夀復中詞科而公晚歳始自次輯其文定爲三十有二卷藏于家今伯夀等将以明年七月丁酉葬公扵泉州南安縣唐興鄉田豐里之雲臺山以熹嘗以先人之舊辱公知顧甚厚見使狀公行事以請志銘圖永乆熹竊惟公孝反之行㓗廉之操精敏之識雅健之文皆足以髙一世而其吏事方畧亦復過人逺甚盖不厲威猛而人自畏服不爲一時小惠以干虚譽而其去思遺愛愈乆愈深獨以蚤年未䏻深自晦匿不幸見知權臣辟咎得㐫遂以中廢然當時識者固有以知其非公所欲其後誦言扵朝白公無辠者又多一時正人莊士且明天子亦旣起公而任使之矣而自比年來殊無他端乃復重以前事横遭口語乍起乍仆以沒其身旣不得盡志竭才以布宣仁聖之徳澤於逺邇而其夀命又不得究扵髙年是則豈不有命也夫故旣歴叙其世家行事之詳而復具論其本末大致如此伏惟當世立言之君子幸賜采擇以乗永世謹狀淳熈十年十二月日具位朱熹狀奉使直祕閣朱公行狀公諱弁字少章其先呉郡人中徙歙之黄墩唐末有諱古僚者爲陶雅偏将以兵戍婺原因家焉其後世有隠徳至奉直公始爲儒尤以沈默自将足迹未嘗至城市生五子公其次也㓜頴悟讀書日數千言十歳䏻文旣冠遂通六經百氏之書逰京師入太學𥙷内舎生客食諸王家㑹景迂眺公說之爲宫學教授一見其詩竒之與歸新鄭妻以兄女鄭介汴洛兩都之中一時故家遺俗盖彬彬焉公㳺其間聞見日廣文章日進益厭薄舉子事遂不復有仕進意靖康之難家碎賊手南歸及淮甸光堯太上皇帝巳承大統駐蹕揚州議遣使問兩宫安否而見大夫無敢行者公聞之慨然攘𬒮而起撫髀太息即日奮身自獻闕下宰相以聞詔𥙷修武郎借右武大夫吉州團練使充河東大金軍前通問副使且命之曰朕方俯同晉國用魏絳以和戎爾其逺效侯生御太公而歸漢公受命即日與使者王公倫張旜誓衆直犯兵鋒以行實建炎戊申正月也行遇虜相黏罕于白水濼邀說甚切黏罕不聴使就館雲中餽餉如禮而實以兵守之公復屢與書具言用兵講和利害甚悉紹興壬子之歳虜忽遣宇文虚中來言和議可成當擇使副一人詣元帥府受書歸報虚中欲二人探籌以决去留公正色曰此市道之所爲耳吾之來固自與以必死豈今日乃覬幸扵先歸者㢤願使長亟詣軍前受書歸報天子遂成兩國之好使吾君得以蚤申四海之養扵兩宫如前日臨遣詔書本指則吾雖暴骨方外猶生之年也扵是王公行有日公請焉曰古之使者有節以爲信今無節而有印則印亦信也公旣還朝無所事此願留見授使某不幸一有意外之辱得抱以死死不腐矣王公揮涕解以授公公受而懐之卧起未嘗不與俱也是時劉豫盗㩀京邑虜迫公仕豫且訹之曰此南歸之漸也公曰吾受命而北不受命而南且豫國賊吾常恨不食其肉又忍北面而臣之㢤吾有死耳不願歸之虜人怒絶其餼遺以困之公反從中固拒驛門忍饑待盡誓不爲屈扵是虜人亦知感動復慰安之致禮如故乆之復迫公換虜宫公曰自古兵交使在其間言可從從之不可從則囚之殺之何必換其官哉吾官受之本朝今日有死而巳誓不易以辱吾君也且移書虜用事人邪律紹文等曰上國之威命朝以至則使人夕以死夕以至則朝以死又以書告訣扵後使者洪忠宣公曰殺行人亦非細事吾曹不幸遭之亦命也命出於天其可逃㢤要當舎生以全義耳一日具酒食召雲中𬒳虜士夫常所與徃來者飲半酣語之曰吾巳得近郊某寺之地一旦畢命報國諸公幸瘞我其處且識其上曰有朱通問副使朱公之墓於我幸矣衆皆淚縁睫不䏻仰視公獨談笑自若曰此臣子之常分諸君何悲也虜知公終不可屈遂不復強然公以使事未報憂憤得目疾其㦉鬰愁歎無憀不平之氣一扵詩發之歳乆成集號曰聘㳺虜中名王貴人亦多遣其子弟就學公以此又得時因文字徃來說以和好之利而碑版篇詠流行北方者亦甚衆得之者相誇以爲榮焉王公還朝太上聞公守節不屈因其再使使賫金銀綾絹爲賜歳在丁巳虜諸酋相繼死㓕公隂使從者李發求得河陽人董考祥等宻䟽其事及虜中虚實使間行歸報曰此不可失之時也其後王公復歸又以公奉送徽考大行之文爲獻其詞有曰臣等猥以凡庸誤蒙選擇茂林豐草𬒳雨露扵當年絶黨殊鄰犯風霜扵将老節上之旄盡落口中之舌徒存歎馬角之未生䰟消雪窖攀龍髯而莫逮淚灑冰天太上讀之感涕詔官公親屬五人如故事别賜吳興田五頃顧丞相張忠獻公喻以宻指曰歸日當以禁林相處也明年虜使烏陵思謀石慶充至詔公子栐及司馬倬入館見之仍許附以家書且賜黃金三十兩以寄思謀等見栐稱公忠節嗟歎乆之至以手加額云紹興癸亥約和巳定公乃與洪忠宣公及歴陽張公邵皆得歸其事見洪公家書輶軒集今行扵世入境傳旨促行者數輩至國門太上命中使梁璋引入便殿延見勞苦嘉歎再三公頓首謝且言曰臣聞人之所難得者時也而時之運無巳事之不可失者㡬也而㡬之藏無形惟無巳也故來遲而難偶惟無形也故動㣲而難見陛下與金人講和上則返梓宫次則迎太母又其次則憐赤子之無辜肉白骨扵巳朽此皆知時知㡬之明驗也然時運而徃或難固執㡬動有變宜鑒未兆盟可守矣而詭詐之心宜黙以待之兵可息矣而銷戢之術宜詳以講之且夷狄君臣上不奉若天道下不求合民心人怨神怒不知修省以黷武爲至徳以苟安爲太平虐民而不恤民廣地而不廣徳此皆天助陛下中興之勢也若時與㡬陛下旣知之扵其始圖惟厥終願陛下益留神焉太上納其言賜金帛甚厚公又以虜中所得六朝御容及宣和御集書畫爲獻并上所著聘㳺集且述北方所見聞忠臣義士朱昭史抗張忠輔髙景平孫益孫谷五臺僧真寳丁氏晏氏女閻進朱勣等死節事狀及故官屬姓名以進請加襃録以勸來者太上髙其節壯其志異其文俾易文資且有進用意詔曰朱某奉使歳乆忠義守節理合優異特賜劵金千緡而宰相秦檜方以講和爲功惡公言虜情悟上意奏以初𥙷官換右宣教郎直祕閣主𬋩佑神觀有司校公考十有七年應遷數官檜又尼之僅轉奉議郎明年四月六日遂以疾卒扵臨安府白龜池之寓舎遺命歸葬故山不果則權厝西湖上智果院忠義之士莫不哀之公配眺氏與其子鄭老皆死于兵再娶王公倫之女弟與眺氏皆封孺人子栐仕至宣教郞知撫州崇仁縣以卒女適里人王仔以公恩補承信郎孫勲早卒照未仕公之文慕陸宣公之爲者其氣質雄渾援据精愽明白踈暢曲盡事理識者以爲深得其體扵詩酷嗜李義山而詞氣雍容格力閑暇不蹈其險恠竒澁之弊聘㳺集凡四十二卷别有奏議一卷尚書直解十卷曲洧舊聞三卷續骫骳說一卷雜書一卷風月堂詩話三卷新鄭舊詩一卷南歸詩文一卷皆藏扵家熹先大父扵公爲三從兄弟先子初登第時嘗徃拜公溱洧之上公送以詩意寄甚逺其後先子仕扵朝時公巳在北方比南歸則先子不幸是歳巳弃諸孤矣後六年熹始得拜公之殯而讀其遺文又三十有四年乃復得官浙中則公之殯猶在智果院也方将爲謀葬故而遽以辠逐今宻院檢詳尤公袤臨安帥守張公枃聞而悲之相與悉力經紀其事而太學録張君體仁又爲得吉卜扵縣積善峰之下書來曰将以某月某日葬公之柩而以王氏孺人祔焉熹竊惟國家承平百年所以遇士大夫者不爲不厚政宣以來公卿大臣荷國寵榮殊異優渥又有非前日比者一旦狂圖誤國招禍使君父蒙塵越在沙漠苦寒無人之地而一時遺臣賣國降虜之餘接迹扵朝靦然相視乃無一人肯奔問官守者公以草野諸生平日未嘗沾一命之禄顧獨奮然出捐軀命請冐鋒鏑斧質之威以嘗不測之虜而守死不屈至于十有六年之乆卒不汙虜僞官爵竟得復持漢節歸見天子其忠義大節終始凛然雖竹帛所書丹靑所畫無以過之和議之成雖若不在其身而風喻從臾盖亦與有力焉而公不肯自以爲功還朝所建皆逺謀至計不欲朝廷遂以目前所就爲安而必期有以致中興扵異日者此其忠慮之深又與一時貪天之功以爲巳力而遂宴安江沱以至扵忘讐而辱國者盖萬萬不侔矣上頼太上皇帝深照其衷前後褒嘉賜賚甚寵而不幸厄扵權臣使不獲申其志以死豈非天㢤今葬有日宜有銘刻以告于幽因訪其家得公外孫王炳所記行實一編叅以舊聞第録如右而敬以請扵尤公伏惟幸哀而終惠之以覆頼其後人且詔太史氏筆削以爲萬世臣子忠義之勸謹狀濂溪先生事實記先生世家道州營道縣濂溪之上姓周氏名惇實字茂叔後避英宗舊名改惇頥用舅氏龍圖閣學士鄭公向奏授洪州分寧縣主簿縣有獄乆不决先生至一訊立辨衆口交稱之部使者薦以爲南安軍司理叅軍移郴及桂陽令用薦者改大理寺丞知洪州南昌縣事簽書合州判官事通判䖍州事改永州權發遣邵州事熈寧初用趙清獻公吕正獻公薦爲廣南東路轉運判官改提點刑獄公事未㡬而病亦會水齧其先墓遂求南康軍以歸旣葬上其印綬分司南京時趙公再尹成都復奏起先生朝命及門而先生卒矣熈寧六年六月七日也年五十有七葬江州徳化縣清泉社先生愽學力行聞道甚蚤遇事剛果有古人風爲政精宻嚴恕務盡道理嘗作太極圖易說易通數十篇在南安時年少不爲守所知洛人程公珦攝通守事視其氣貌非常人與語知其爲學知道也因與爲友且使二子徃受學焉及爲郎故事當舉代毎一遷授輒以先生名聞在郴時郡守李公初平知其賢與之語而歎曰吾欲讀書何如先生曰公老無及矣某也請得爲公言之扵是初平日聴先生語二年果有得而程公二子即所謂河南二先生也南安獄有囚法不當死轉運使王逵欲深治之逵苛刻吏無敢相可否先生獨力争之不聴則置手板歸取告身委之而去曰如此尚可仕乎殺人以媚人吾不爲也逵亦感悟囚得不死在郴桂陽皆有治績來南昌縣人迎喜曰是䏻辨分寧獄者吾屬得所訴矣扵是更相告語莫違敎命盖不唯以抵辠爲憂實以汙善政爲耻也在合州事不經先生手吏不敢决苟下之民不肯從蜀之賢人君子皆喜稱之趙公時爲使者人或䜛先生趙公臨之甚威而先生處之超然然趙公疑終不釋及守䖍先生適佐州事趙公熟視其所爲乃寤執其手曰㡬失君矣今日乃知周茂叔也扵邵州新學校以敎其人及使嶺表不憚出入之勤瘴毒之侵雖荒崖絶㠀人跡所不至者必緩視徐按務以洗冤澤物爲巳任施設措置未及盡其所爲而病以歸矣自少信古好義以名節自砥礪奉巳甚約俸祿盡以周宗族奉賔友家或無百錢之儲李初平卒子㓜護其喪歸葬之又徃來經紀其家終始不懈及分司而歸妻子􅊡粥或不給而亦曠然不以爲意也襟懐飄灑雅有髙趣尤樂佳山水遇適意處或徜徉終日廬山之麓有溪焉發源於蓮華峯下潔清紺寒下合扵湓江先生濯纓而樂之因寓以濂溪之號而築書堂扵其上豫章黃太史庭堅詩而序之曰茂叔人品甚髙胷中灑落光風霽月知徳者亦深有取其言云淳熈六年六月乙巳後學朱熹謹記伊川先生年譜先生名頥字正叔明道先生之弟也明道生扵明道元年壬申伊川生扵明道二年癸酉㓜有高識非禮不動見語録年十四五與明道同受學扵舂陵周茂叔先生見哲宗徽宗實録皇祐二年年十八上書闕下勸仁宗以王道爲心生靈爲念黜世俗之論期非常之功且乞召對面陳所學不報間逰太學時海陵胡翼之先生方主教導嘗以顔子所好何學論試諸生得先生所試大驚即延見處以學職見文集吕希哲原明與先生鄰齋首以師禮事焉旣而四方之士從㳺者日益衆見吕氏童蒙訓舉進士嘉祐四年廷試報罷遂不復試太中公屢當得任子恩輙推與族人見涪陵記義録治平熈寧間近臣屢薦自以爲學不足不願仕也見文集又按吕申公家傳云公判太學命衆愽士即先生之居敦請爲太學正先生固辭公即命駕過之又雜記治平三年九月公知蔡州将行言曰伏見南省進士程頥年三十有四特立之操出群之姿嘉祐四年已與殿試自後絶意進取徃來太學諸生願得以爲師臣方領國千監親徃敦請卒不䏻屈臣嘗與之語洞明經術通古今治亂之要實有經世濟物之才非同迂士曲儒徒有偏長使在朝廷必爲國器伏望特以不次旌用明道行狀云神宗嘗使推擇人材先生擇人材薦數十人以父表弟張載曁弟頥爲稱首元豐八年哲宗嗣位門下侍郎司馬公光尚書左丞吕公公著及西京留守韓公絳上其行義扵朝見哲宗徽宗實録案温公集與吕申公同薦創子曰臣等竊見河南處士程頤力學好古家貧守節言必忠信動遵禮義年踰五十不求仕進真儒者之髙蹈聖世之逸民伏望特加召命擢以不次足以矜式士類禆益風化又按胡文定公文集云是時諫官朱光庭又言頥道徳純備學問淵愽材資勁正有中立不倚之風識慮明徹至知㡬其神之妙言行相顧而無擇仁義在躬而不矜若用斯人俾當勸講必䏻輔養聖徳啓道天聦一正君心爲天下福又謂頥究先王之藴逹當世之務乃天民之先覺聖代之真儒俾之日侍經筵足以發揚聖訓兼掌學教足以丕變斯文又祖宗時起陳摶种放髙風素節聞扵天下揆頥之賢摶放未必䏻過之頤之道則有摶放所不及知者觀其所學真得聖人之傳致思力行非一日之積有經夭緯地之才有制禮作樂之具乞訪問其至正論所以平治天下之道又謂頥以言乎道則貫徹三才而無一毫之爲間以言乎徳則并包衆美而無一善之或遺以言乎學則愽通古今而無一物之不知以言乎才則開物成務而無一理之不聦是以聖人之道至此而傳况當天子進學之初若俾真儒得專經席豈不盛㢤十一月丁巳授汝州團練推官西京國子監教授見實録先生再辭㝷召赴闕元祐元年三月至京師王巖叟奏云伏見程頥學極聖人之精㣲行全君子之純粹早與其兄顥俱以徳名顯扵時陛下復起頥而用之頥趨召以來待詔闕下四方俊乂莫不翹首鄉風以觀朝廷所以待之者如何處之者當否而将議焉則陛下此舉繋天下之心臣願陛下加所以待之之禮擇所以處之之方而使髙賢得爲陛下盡其用則所得不獨頥一人而巳四海濳光隱徳之士皆将祖招而爲朝廷出矣除宣徳郎祕書省校書郎先生辭曰祖宗時布衣𬒳召自有故事今臣未得入見未敢祗命王巖叟奏云臣伏聞聖恩特除程頥京官仍與校書郎足以見陛下優禮髙賢而使天下之人歸心扵盛徳也然臣區區之誠尚有以爲陛下言者願陛下一召見之試以一言問爲國之要陛下至明遂可自觀其人臣以頥抱道養徳之日乆而濳神積慮之功深静而閱天下之義理者多必有嘉言以新聖聴此臣所以區區而進頥然非爲頥也欲成陛下之美耳陛下一見而後命之以官則頥當之而無愧陛下與之而不悔授受之間兩得之矣扵是召對太皇太后面喻将以爲崇政殿說書先生辭不獲始受西監之命且上奏論經筵三事其一以上富扵春秋輔養爲急宜選賢徳以備講官因使陪侍宿直陳說道義所以涵養氣質薫陶徳性其二請上左右内侍之人皆選老成厚重之人不使侈靡之物淺俗之言接扵耳目仍置經筵祇應内臣十人使伺上在宫中動息以語講官其或小有違失得以随事規諌其三請令講官坐講以養人主尊儒重道之心寅畏祇懼之徳而曰若言可行敢不就職如不可用願聴其辭劄子三道見文集又按劉忠肅公文集有章䟽論先生辭卑居尊未𬒳命而先論事爲非是盖不知先生出處語黙之際其義固巳精矣旣而命下以通直郎充崇政殿說書見實録先生再辭而後受命四月例以暑熱罷講先生奏言輔導少主不宜踈畧如此乞今講官以六參日上殿問起居因得從容納誨以輔上徳見文集五月差同孫覺顧臨及國子監長貳看詳國子監條制見實録先生所定大㮣以爲學校禮義相先之地而月使之爭殊非教養之道請改試爲課有所未至則學官召而敎之更不考定髙下制尊賢堂以延天下道徳之士䥴解額以去利誘省繁文以專委任勵行檢以厚風敎及置待賔吏師齋立觀光法如是者亦數十條見文集舊實録云禮部尚書胡宗愈謂先帝聚士以學教人以經三舎科條固巳精宻宜一切仍舊因是深詆先生謂不宜使在朝廷六月上䟽太皇太后言今日至大至急爲宗社生靈長乆之計惟是輔養上徳而輔養之道非徒渉書史覽古今而巳要使跬歩不離正人乃可以涵養薫陶成就聖徳今間日一講解釋數行爲益旣少又自四月罷講直至中秋不接儒臣殆非古人旦夕承弼之意請俟𥘉秋即令講官輪日入侍陳說義理仍選臣僚家十一二歳子弟三人侍上習業且以邇英迫隘暑熱恐扵上體非宜而講日宰臣史官皆入使上不得舒泰恱懌請自今一月再講扵崇政殿然後宰臣史官入侍餘日講扵延和殿則後楹垂簾而太皇太后時一臨之不惟省察主上進業其於后徳未必無補且使講官欲有所言易以上逹所繫尤大又講讀官例兼他職請亦罷之使得積誠意以感上心皆不報八月差兼判登聞皷院先生引前說且言入談道徳出領訴訟非用人之體再辭不受見文集楊時曰仕道與禄仕不同常夷甫以布衣入朝神宗欲優其禄令兼數局如皷院染院之數夷甫一切受之及伊川先生爲講官朝廷亦欲使兼他職則固辭盖前日所以不仕者爲道也則今日之仕須其官足以行道乃可受不然是苟禄也然後世道學不明君子辭受取舎人鮮知之故常公之受人不以爲非而先生之辭人亦不以爲是也二年又上䟽論延和講讀垂簾事且乞時召講官至簾前問上進學次第又奏邇英暑熱乞就崇政延和殿或他寛凉處講讀給事中顧臨以殿上講讀爲不可有旨修展邇英閣先生復上䟽以爲修展邇英則臣所請遂矣然祖宗以來並是殿上坐講自仁宗始就邇英而講官立侍盖從一時之便耳非若臨之意也今臨之意不過以尊君爲說而不知尊君之道若以其言爲是則誤主上知見臣職當輔導不得不辨先生在經筵每當進講必宿齋豫戒潜思存誠冀以感動上意見文集而其爲說常扵文義之外反復推明歸之人主一日當講顔子不改其樂章門人或疑此章非有人君事也将何以爲說及講旣畢文義乃復言曰陋巷之士仁義在躬忘其貧賤人主崇髙奉養備極苟不知學安䏻不爲富貴所移且顔子王佐之才也而簞食瓢飲季氏魯國之蠹也而富扵周公魯君用舎如此非後世之監乎聞者歎服見胡氏論語詳說而哲宗亦嘗首肯之見文集不知者或誚其委曲巳甚先生曰不於此盡心竭力而扵何所乎上或服藥即日就醫官問起居見語録然入侍之際容貌極莊時文潞公以太師平章重事或侍立終日不懈上雖喻以少休不去也人或以問先生曰君之嚴視潞公之恭孰爲得失先生曰潞公四朝大臣事㓜主不得不恭吾以布衣職輔導亦不敢不自重也見邵氏見聞録嘗聞上在宫中起行漱水必避螻蟻因請之曰有是乎上曰然誠恐傷之爾先生曰願陛下推此心以及四海則天下幸甚見語録一日講罷未退上忽起憑檻戯折柳枝先生進曰方春發生不可無故摧折上不恱見馬永卿所編劉諌議語録且云温公聞之亦不悅或云恐無此事所講書有容字中人以黃覆之曰上藩邸嫌名也先生講罷進言曰人主之勢不患不尊患臣下尊之過甚而驕心生爾此皆近習輩養成之不可以不戒請自今舊名皆勿復避見語録時神宗之䘮未除而百官以冬至表賀先生言節序變遷時思方切請改賀爲慰及除䘮有司又将以𨳩樂置宴先生又奏請罷宴曰除䘮而用吉禮則因事用樂可矣今特設宴是喜之也見文集嘗聞後苑以金製水桶問之曰崇慶宫物也先生曰若上所御則吾不敢不諫在職累月不言禄吏亦弗致旣而諸公知之俾戸部特給焉又不爲妻求邑封或問之先生曰某起扵草萊三辭不獲而後受命今日乃爲妻求封乎見語録經筵承受張茂則嘗招諸講官啜茶觀畵先生曰吾平生不啜茶亦不識畵竟不徃見龜山語録或云恐無此事文潞公嘗與吕范諸公入侍經筵聞先生講說退相與歎曰真侍講也一時人士歸其門者甚盛而先生亦以天下自任論議褒貶無所顧避由是同朝之士有以文章名世者疾之如讐與其黨類巧爲謗詆見亀山語録王公繋年録呂申公家傳及先生之子端中所撰集序又按蘇軾奏状亦自云臣素疾程某之姦未嘗假以辭色又按侍御史吕肉言明堂降赦臣寮稱賀訖而兩省官欲徃奠司焉光是時程頥言曰子扵是日哭則不歌豈可賀赦才了却徃弔䘮坐客有難之曰子扵是日哭則不歌即不言歌則不哭今巳賀赦了却徃弔䘮扵禮無害蘇軾遂以鄙語戯程頥衆皆大笑結怨之端盖自此始又語録云國忌行香伊川令供素饌子瞻詰之曰正叔不好佛胡爲食素先生日禮居䘮不飲酒不食肉忌日䘮之餘也子瞻令具肉食曰爲劉氏者左袒扵是范醇夫輩食素素黃輩食肉又鮮于綽傳信録云舊例行香齋筵兩制以上及臺諌官破𬞞饌然以兼糲遂輪爲食㑹皆用肉食矣元祐初崇政殿說書程正叔以食肉爲非是議爲素食衆多不從一日門人范醇夫當排食遂具𬞞饌内翰蘇子瞻因以鄙語戲正叔正叔門人朱公掞輩衘之遂立敵矣是後𬞞饌亦不行又語録云時呂申公爲相凡事有疑必質于伊川進退人才二蘇疑伊川有力故極詆之又曰朝廷欲以㳺酢爲某官蘇右丞沮止毀及伊川宰相蘇子容曰公未可如此頌觀過其門者無不肅也又按劉諫議盡言集亦有異論劉非蘇黨盖不相知耳一日赴講㑹上瘡疹不坐巳累日先生退詣宰臣問上不御殿知否曰不知先生曰二聖臨朝上不御殿太皇不當獨坐且人主有疾而大臣不知可乎翌日宰臣以先生言奏請問疾由是大臣亦多不恱而諫議大夫孔文仲因奏先生汙下憸巧素無鄉行經筵陳說僣橫忘分遍謁貴臣歷造臺諫騰口間亂以償恩讐致市井目爲五鬼之魁請放還田里以示典刑八月差𬋩勾西京國子監見舊實録又文仲傳載吕申公之言曰文仲爲蘇軾所誘脅論事皆用軾意又吕申公家傳亦載其與吕大防劉摯王存同駁文仲所論朱光庭事語甚激切且云文仲夲以伉直稱然惷不曉事爲浮薄軰所使以害忠良晚乃自知爲小人所給憤鬱嘔血而死按舊録固多妄然此類不爲無㩀新録皆刪之失其實矣又范大史家傳云元祐九年奏曰臣伏見元祐之初陛下召程頥對便殿自布衣除崇政殿說書天下之士皆謂得人實爲稀闊之美事而纔及歳餘即以人言罷之頥之經術行誼天下共知司馬光吕公著皆與頥相知二十餘年然後舉之此二人者非爲欺罔以誤聖聦也頥在經筵切扵皇帝陛下進學故其講說語常繁多草茅之人一旦入朝與人相接不爲關防未習朝廷事體而言者謂頥大佞大邪貪黷請求奔走交結又謂頥欲以故舊傾大臣以意氣役臺諫其言皆誣罔非實也盖當時臺諌官王巖叟朱光庭賈易皆素推伏頥之經行故不知者指以爲頥黨陛下慎擇經筵之官如頥之賢乃是以輔導聖學至如臣軰叨備講職實非敢望頥也臣乆欲爲頥一言懐之累年猶豫不果使頥受誣罔之謗扵公正之朝臣每思之不無愧也今臣巳乞去職若復召頥勸講必有補聖明臣雖終老在外無所憾矣先生旣就職再上奏乞歸田里曰臣本布衣因說書得朝官今以辠罷則所授官不當得三年又請皆不報乃乞致仕至再又不報五年正月丁太中公憂去官七年服除除直祕閣判西京國子監王公繫年録云元祐七年三月四日延和奏事三省進呈程頥服除欲與舘職判檢院簾中以其不靖令只與西監遂除直祕閣判西京國子監初頥在經筵歸其門者甚盛而蘇軾在翰林亦多附之者遂有洛黨蜀黨之論二黨道不同互相非毀頥竟爲蜀黨所懠今又適軾弟轍執政財進禀便云但恐不肯靖簾中入其說故頥不復得召先生再辭極論儒者進退之道見文集而監察御史重燉逸奏以爲有怨望輕躁語五月改授𬋩勾崇福宫見舊録未拜以疾尋醫元祐九年哲宗𥘉親政申祕閣西監之命先生再辭不就見文集紹聖間以黨論放歸田里四年十一月送涪州編管見實録門人謝良佐曰是行也良佐知之乃族子公孫與邢恕之爲爾先生曰族子至愚不足責故人情厚不敢疑孟子旣知天焉用尢臧氏見語録元符二年正月易傳成而序之三年正月徽宗即位移峡州四月以赦復宣徳郎任便居住制見曲阜集還洛記善録云先生歸自涪州氣貌容色髭髪皆勝平昔十月復通直郎權西京國子監先生旣受命即謁告欲遷延爲㝷醫計旣而供職門人尹焞深疑之先生曰上𥘉即位首𬒳大恩不如是則何以仰承徳意然吾之不䏻仕盖巳决矣受一月之俸焉然後唯吾所欲爾見文集語録又劃忠肅公家私記云此除乃李邦直范彛叟之意建中靖國二年五月追所復官依舊致仕前此未嘗致仕而云依舊致仕疑西監供職不乆即嘗致仕也未詳崇寧二年四月言者論其本因姦黨論薦得官雖嘗明正辠罰而叙復過優巳追所復官又云叙復過優亦未詳今復著書非毀朝政扵是有旨追毀出身以來文字其所著書令監司覺察語録云范致虚言程某以邪說詖行惑亂衆聴而尹燉張繹爲之羽翼事下河南府體究盡逐學徒復隷黨籍先生扵是遷居龍門之南止四方學者曰尊所聞行所知可矣不必及吾門也見語録五年復宣義郎致仕見實録時易傳成書巳乆學者莫得傳授或以爲請先生曰自量精力未衰尚覬有少進耳其後寢疾始以授尹焞張繹尹燉曰先生踐履盡易其作傳只是因而冩成熟讀玩味即可見矣又云先生平生用意惟在易傳求先生之學者觀此足矣語録之類出扵學者所記所見有淺深故所記有工拙盖未䏻無失也見語録大觀元年九月庚午卒于家年七十有五見實録扵疾革門人進曰先生平日所學正今日要用先生力疾㣲視曰道著用便不是其人未出寢門而先生没見語録一作門人郭忠孝尹子云非也忠孝自黨事起不與先生徃來及卒亦不致奠𥘉明道先生嘗謂先生曰異日能使尊嚴師道者吾弟也若接引後學随人材而成就之則予不得譲焉見語録侯仲良曰朱公掞見明道于汝州踰月而歸語人曰光庭在春風中坐了一月㳺定夫楊中立來見伊川一日先生坐而瞑目二子立侍不敢去乆之先生乃顧曰二子猶在此乎日暮矣姑就舎二子者退則門外雪深尺餘矣其嚴厲如此晚年接學者乃更平易盖其學巳到至處但扵聖人氣象差少從容爾明道則已從容惜其蚤死不及用也使及用扵元祐間則不至有今日事矣先生旣没昔之門人髙第多已先亡無有䏻形容其徳美者然先生嘗謂張繹曰我昔狀明道先生之行我之道盖與明道同異時欲知我者求之扵此文可也見集序尹焞曰先生之學本扵至誠其於言動事爲之間處中有常疏通簡易不爲矯異不爲狷介寛猛合冝莊重有體或說匍匐以弔䘮誦孝經以追薦皆無此事衣雖紬瑋經亂而逸熹少時見外大父猶䏻頗誦其語至諸舅則皆巳不復記憶矣二翁諸子皆讀書外大父其第二子也諱確字永叔特淳厚孝謹少時聞父母将爲謀㛰逃避累日家人驚索得之猶涕泣不能巳問其故則曰審爾則将不得與父母昆弟蚤夜相親矣親䘮廬墓下手植名木以千數率誦佛書若干過乃植一本日有常課比終制而歸則所植巳鬰然成隂矣一兄一弟先後死熈河皆親徃致其䘮徃反徒歩不啻萬里所舎輙悲號上食如禮夜寢柩旁不忍跬歩離去路人皆爲歎息諸弟求析其産公爲涕泣曉譬不䏻奪時四妺猶未行而諸弟得財皆散去不復顧公獨罄巳貲以遣之其一歸同郡汪公勃汪公後登二府終身徳公不䏻忘人兩賢之歳大疫親舊有盡室病卧者人莫敢闖其門公每清旦輙攜粥藥造之徧飲食之而後反日以爲常其他濟人利物之事不勝計雖傾貲竭力無吝色鄉人髙其行學試又多占上列郡愽士請録其學事時三舍法行士子無不繇庠序以進公從容其間若無所爲而後生得所矜式咸敬服焉熹先君子扵時亦爲諸生年甚少未爲人所知公獨器重以女歸之後卒以文學致大名世乃以公爲知人方臘之亂郡城爲墟鄉人有媚事權貴者挾墨敕徙州治北門外以便其私而所徙窊下潦漲輙平地數尺衆皆不以爲便将列其事以訴諸朝者餘二千人而莫敢爲之首公奮然以身任之其人忿疾復取特旨坐公以違御筆之辠公爲變姓名崎嶇逃遁猶下諸路迹捕不置如是累年時事變更群小破散然後得免而州治亦還故處鄉人至今頼之而公之家貲事力不䏻復如徃時矣然終不以爲悔也比其晚歳生理益落而好施不少衰年八十三以終娶同郡喻氏亦有賢行生二男一女伯舅莘娶張氏其先以治獄有隂功王宣徽拱辰所傳張佛子者也次即先夫人徳性持似公其行事自見家傳叔舅嶠少敏悟有文長從先君子逰聞伊洛之風而恱之然求舉輙不利喻夫人及伯舅旣先卒叔舅後公十餘年亦即世今唯伯舅之子康國居建之崇安叔舅之孫回居劒之尤溪而康國二子已緫髪䏻誦書矣熹惟外大父之淳徳髙行先人後巳其誠心所格固宜有後而康國母家所積之逺又如是天之報施其将在扵此乎竊敢陶公作孟府君傳及近世眉山蘇公亦記程公遺事不勝凱風寒泉之思因書此以遺康國使藏于家時出而訓習之以厲其子孫又記嘗聞先夫人說第四外叔祖豪俠不覊蚤從黃太史逰黃公謫黔中因以客從黃公賢之爲更名林宗而字之曰有道與之諷詠書札甚多今皆不存獨所爲書柳如京皇考志世或傳其墨本姓字尚可見耳先夫人及叔舅少時猶及見其道說黃公言行甚詳酒酣悲歌感慨凄切絶不類世俗音調問其所以則曰黃公之遺聲也此事外家兄弟亦少聞者因附記于此云熹旣叙此事将書以遺濟之弟未果而濟之復以疾不起其二子丙癸相從扵建陽因書卑之俯仰今昔爲之流涕不能巳慶元戊午臘月旣望書劉子和傳劉子和者江南人名某五世祖式仕太宗朝爲某官國史有傳夫人陳氏有賢行逺識子孫多爲聞人海陵胡瑗先生所爲紀墨莊者也至子和之父某官稍不遂然亦好學脩飭䏻守其家娶長垣趙氏實呉興孫侔先生外孫女讀書䏻文生子和子和爲人廉静寡欲敦重少言而和易端粹不爲崖異之行其家居孝友尤篤也自少即以經學文行知名中進士第調吉州戸掾邵武尉皆䏻其官更調贛州教授還家待次益以諸經自課日求其所未至者盖自音讀訓詁先儒之說以及近世先生長者之論無不該貫及至官視其學故有趙清獻公祠後廢而生祠郡守部刺史至五六人子和曰趙公與濂溪先生法皆當得祠者今或廢扵巳舉或初未嘗立也彼紛紛者果何爲㢤命悉撤去而更爲二公之祠諸生請曰趙公則聞耳矣敢問濂溪何人也子和具告之故且出其書使之讀之諸生固巳風動扵是子和又益推本其說以發明六經論孟之遺意晨入寓直之舎諸生迭進問事子和諄諄辨告如教子弟至暮乃罷日以爲常其教大抵以讀書窮理爲先持敬脩身爲主曰此古人爲巳之學也至扵學官程課有不可廢者其命題發端必依扵是而出焉扵是學者益知所向其言行小不中理服飾小不中度必規正之課試之文以老佛論道以管商議政忘讐耻狥時俗者皆弃不録扵是學者又知所懲其扵有司之事所以謹出内窒鏬漏者亦皆精審嚴宻間斥其贏以市圖史至若干卷視諸生老者優禮之貧者周給之疾病者與之藥死䘮者加之賵所以恩勤之者甚備至扵進退取舎之間則必考行䏻視次第稽諸公論而未嘗有所私也以故諸生之事子和如事父兄服習其教而守行之俗爲一變其浮惰不事學者徃徃引去或亦悔前所爲而革心自新焉郡縣吏皆恠以謂學官弟子比無入官府辯訟請謁者父老皆喜以謂吾家子弟比無荒嬉惰㳺還家覔錢呌呼犯上者以至士大夫家亦争遣子弟来入學贛之人至咨嗟相與言曰吾邦自李先之教官迨今七八十年乃復得劉君耳今翰林承㫖周必大聞之爲記其說扵聴事之壁子和既去改宣教郎遭繼母䘮以卒故諸生哭之皆失聲益相與尊其言信其道守其法不變去而從其弟清之以卒業者亦數人子和平日閉戸讀書不甚與人接雖名士亦不強附而搢紳先生多慕與交國子祭酒蕭之敏嘗以經行氣節薦扵朝成都劉焞稱之曰國朝鉅人門戸一再世凋落者何可悉數惟劉氏自太宗時歷嘉祐元祐盛際莫不有人逮子和兄弟世數益逺而家法益峻忠厚雍睦之風不墜求之故家䏻如是者少矣及卒丹稜李燾書其墓曰孝敬劉君而廣漢張栻爲刻銘納壙中是數君子者盖或未嘗識子和也新安朱熹曰自周之衰司徒樂正之官廢爲士者未嘗知有學也士未嘗學而強使教焉則其所以教者可知巳予亦不及識子和而識其弟且得贛諸生所記讀之觀其所以脩扵身行扵家者而知其所以教扵學者有餘矣使得其年究其施則其所立豈可勝道㢤爲之掩卷太息因剟其大者著于篇晦庵先生朱文公文集卷第九十八候官縣儒學訓導劉簮校
