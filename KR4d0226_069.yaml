body:
  text: 雜著禘祫議王制天子七廟三昭三穆與太祖之廟而七諸侯大夫士降殺以兩而祭法又有適士二廟官師一廟之文大抵士無太祖而皆及其祖考也鄭氏曰夏五廟啇六廟周七廟今按啇書巳云七世之廟鄭說恐非顔師古曰父爲昭子爲穆孫復爲昭昭明也穆羙也後以晉室諱昭故學者改昭爲韶其制皆爲中門外之左外爲都宫内各有寢廟别有門垣太祖在北左昭右穆以次而南晋慱士孫毓議天子太祖百世不遷一昭一穆爲宗亦百世不遷宗亦曰世室亦曰祧鄭注周禮守祧曰宗亦曰祧亦曰世室周禮言守祧之官鄭氏曰遠廟爲祧周爲文武之廟遷主藏焉又曰遷主所藏曰祧先公之遷主藏于太祖后稷之廟先王之遷主藏於文武之廟群穆於文群昭於武明堂位有文世室武世室鄭氏曰世室者不毀之名也二昭二穆爲四親廟髙祖以上親盡則毀而遞遷昭常爲昭穆常爲穆昭之二廟親盡則毁而遷其主于昭之宗曾祖遷于昭之二新入廟者祔于昭之三而髙祖及祖在穆如故穆廟親盡放此新死者如當爲昭則祔於昭之近廟而自近廟遷其祖於昭之次廟而於主祭者爲曽祖自次廟遷其高祖于昭之世室盖於主祭者爲五世而親盡故也其穆之兩廟如故不動其次廟於主祭者爲髙祖其近廟於主祭者爲祖也主祭者没則祔于穆之近廟而逓遷其上放此凢毀廟遷主改塗易穆示有所變非盡毀也見榖梁傳及注諸侯則無二宗大夫則無二廟其遷毁之次則與天子同傳毁廟之主藏於太祖儀禮所謂以其班祔檀弓所謂祔于祖父者也曲禮云君子抱孫不抱子此言孫可以爲王父尸子不可以爲父尸鄭氏云以孫與祖昭穆同也周制自后稷爲太祖不窟爲昭鞠爲穆以下十二世至太王復爲穆十三世至王季復爲昭十四世至文王又爲穆十五世至武王復爲昭故書稱文王爲穆考詩稱武王爲昭考而左氏傳曰太伯虞仲太王之昭也虢仲號叔王季之穆也又曰管蔡魯衛文之昭也耶晉應韓武之穆也盖其次序一定百世不易雖文王在右武王在左嫌於倒置而諸廟别有門垣足以各全其尊𥘉不以左右爲尊卑也三代之制其詳雖不得聞然其大畧不過如此漢承秦敝不能深考古制諸帝之廟各在一處不容合爲都宫以序昭穆韋元成傳云宗廟異處昭穆不序但考周制先公廟在岐周文王在豐武王在鎬則都宫之制亦不得爲與漢亦無甚異末詳其說貢禹韋元成康衡之徒雖欲正之而終不能盡合古制旋亦廢罷後漢明帝又欲遵儉自抑遺詔無起寢廟但藏其主於光武廟中更衣别室其後章帝又復如之後世遂不敢加而公私之廟皆爲同堂異室之制見後漢明帝紀祭祀志志又云其後積多無别而顯宗但爲陵寢之號自是以來更歷魏晉下及隋唐其間非無奉先思孝之君据經守禮之臣而皆不能有所裁正其弊至使太祖之位下同孫子而更僻處於一隅旣無以見其爲七廟之尊群廟之神則又上厭祖考而不得自爲一廟之主以人情而論之則生居九重窮極壯麗而沒祭一室不過尋丈之間甚或無地以容鼎爼而隂損其數孝子順孫之心於此宜亦有所不安矣肆我神祖始獨慨然深詔儒臣討論舊典盖將以逺迹三代之隆一正千古之繆甚盛舉也不幸未及營表世莫得聞秉筆之士又復不能特書其事以詔萬世今獨其見於陸氏之文者爲可考耳然其所論昭穆之說亦未有定論圗說在後獨原廟之制外爲都宫而各爲寢廟門垣乃爲近古但其禮本不經儀亦非古故儒者得以議之如李清臣所謂畧于七廟之室而爲祠於佛老之側不爲木主而爲之象不爲禘祫烝嘗之祀而行一酌奠之禮楊時所謂舎二帝三王之正禮而從一繆妄之叔孫通者其言皆是也然不知其所以致此則由於宗廟不立而人心有所不安也不議復此而徒欲廢彼亦安得爲至當之王者始受命諸侯始封之君皆爲太祖以下五世而迭毀毀廟之主藏乎太祖五年而再毀祭言一禘一祫也祫祭者毀廟與未毀廟之主皆合食於太祖父爲昭子爲穆孫復爲昭古之正禮也韋元成劉歆廟數不同班固以歆說爲是今亦未能决其是非姑兩存之至於遷毁之序則昭常爲昭穆常爲穆假令新死者當祔昭廟則毀其高祖之廟而祔其主於左祧遷其祖之主于髙祖之故廟而祔新死者于祖之故廟即當祔於穆者其序亦然盖祔昭則群昭皆動而穆不移祔穆則群穆皆移而昭不動故虞之明日祔于祖父盖將代居其處故爲之祭以告新舊之神也今以周室世次爲圖如右所謂髙祖以上親盡當毁虞之明日祔于祖父者也元豐議禮何洵直張璪以此爲說而陸佃非之曰昭穆者父子之號昭以明下爲義穆以恭上爲義方其爲父則稱昭取其昭以明下也方其爲子則稱穆取其穆以恭上也豈可膠哉壇立於右墠立於左以周制言之則太王親盡去右壇而爲墠王季親盡去左祧而爲壇左右遷徙無嫌又曰顯考王考廟與左祧爲昭皇考考廟與右祧爲穆如曰成王之世武王爲昭文王爲穆則武不入考廟而入王考廟矣此皆爲說之誤殊不知昭穆本以廟之居東居西主之向南向北而得名𥘉不爲父子之號也必曰父子之號則穆之子又安可復爲昭哉壇墠之左右亦出先儒一時之說禮經非有明文也政使果然亦爲去廟之後主藏夾室而有禱之祭且壇墠又皆一而巳昭不可以越壇而徑墠穆不可以有壇而無墠故迭進而無嫌非若廟之有昭穆而可以各由其序而遞遷也又况昭穆之分自始封以下入廟之時便有定次後雖百世不復移易而其尊卑則不以是而可紊也故成王之世文王爲穆而不害其尊於武武王爲昭而不害其卑於文非謂之昭即爲王考謂之穆即爲考廟也且必如佃說新死者必入穆廟而自父以上穆遷於昭昭遷於穆祔一神而六廟皆爲之動則其祔也又何不直祔於父而必隔越一世以祔于其所未應入之廟乎佃又言曰假令甲於上世之次爲穆今合堂同食實屬父行乙於上世之次爲昭今合堂同食實屬子行則甲冝爲昭乙宜爲穆豈可逺引千歲以來世次覆令甲爲右穆乙爲左昭以紊父子之序乎此亦不曉前說之過也盖昭穆之次旣定則其子孫亦以爲序禮所謂昭與昭齒穆與穆齒傳所謂太王之昭王季之穆文之昭武之穆者是也如必以父爲昭而子爲穆則太伯虞仲乃太王之父而文王反爲管蔡魯衛之子矣而可乎哉且一昭穆也旣有上世之次又有今世之次則所以序其子孫者無乃更易不定而徒爲紛紛乎曰然則廟之遷次如圖可以見矣子孫之序如佃所駁得無真有難處者耶曰古人坐次或以西方爲上或以南方爲上未必以左爲尊也且又安知不如時祫之位乎時祫有圗在後昭穆之不爲尊卑說已前見其大祫則始封以下以次相承亦無差舛故張璪以爲四時常祀各於其廟不偶坐而相臨故武王進居王季之位而不嫌尊於文王及合食乎祖則王季文王更爲昭穆不可謂無尊卑之序者是也但四時之祫不兼毁廟之主則右無昭而穆獨爲尊之時若兩世室之主則文常爲穆而武常爲昭也故陸佃以爲毁廟之主有不皆祫之時難之而未見璪之所以對也予竊以爲以上世之次推之一昭一穆固有定次而其自相爲偶亦不可易但其散居本廟各自爲主而不相厭則武王進居王季之位而不嫌尊於文王及其合食于祖則王季雖遷而武王自當與成王爲偶未可以遽進而居王季之處也文王之爲穆亦虚其所向之位而巳則雖北向而何害其爲尊哉作此圗以見之漢同堂異室廟及原廟議五峯胡仁仲論漢文帝之短䘮其失不在文帝而景帝當任其責予於不起寢廟之詔則以爲明帝固不得爲無失然使章帝有魏顆之孝其群臣有宋仲㡬楚子囊之忠則於此必有處矣况以一時之亂命而壊千古之彛制其事體之輕重又非如三子之所正者而巳耶然古今諸儒未有斥其非者而徒知論惠帝叔孫通作原廟之罪夫原廟誠不當作要必復古宗廟之制然後可得而議爾或曰周公祀文王武王於洛邑非原廟耶曰此固禮之變也然設於别都而不設於京師及所幸郡國又不聞其以果獻之䙝禮施焉則亦與漢異矣别定廟議圗說圖巳見前紹熈甲寅某月詔以孝宗祔廟當議宗廟迭毀之次禮部侍郎許及之太常少卿曾三復等相與上議請遷僖祖宣祖而奉太祖居第一室祫享則正東郷之位有詔恭依且令復議二祖祧主奉安之所時熹始赴經筵供軄亦嘗預議屬以病不能赴遂以議狀申省大指以爲僖祖實爲帝者始祖百世不遷之廟不當祧毁合仍舊居太廟第一室四時常享則居東郷之位宣祖太祖太宗真宗仁宗英宗六室皆在三昭三穆之外親盡宜毁而太祖太宗仁宗功徳荗盛宜凖周之文武百世不遷號爲世室其宣祖真宗英宗則遷於西夾室以從順祖翼祖之後祫享則序昭穆於堂上而時享不及焉神宗哲宗徽宗欽宗髙宗孝宗六室爲親廟時享祫享如儀異時迭毀則三昭三穆以次而遷唯髙宗受命中興異時雖或親盡亦當如仁宗故事别爲世室百世不遷盖雖通爲十室而三世室自在三昭三穆外其始祖之廟與三昭三穆正合七世之文如劉歆說而兄弟相繼各爲一世先儒亦有定議并考古今畫成圖様其說甚備且謂他日恢復中原還反舊京則又當别考古制世爲一廟而革去東漢以來同堂異室之陋盖不獨爲今日議也而廟堂持之不上獨奏禮官及諸從臣所論請爲别廟以奉四祖又詔恭依遂即毀撤僖祖宣祖廟室熹見諸公爭之甚力而右相趙汝愚雅不以熈寧復祀僖祖爲然給舎樓鑰陳傳良又復牽合􅑽綴以附其說其語頗逹上聴某月某日忽有㫖宣召熹赴内殿奏事盖將問之以此也熹因節畧狀文及爲劄子畫圖貼說以進上覽之良以爲然且喻熹曰僖祖乃國家始祖髙宗時不曽遷孝宗時又不曽遷太上皇帝時又不曽遷今日豈敢輕議熹因奏曰此事義理甚明而聖意又巳見得如此其不當遷無可疑者前日集議雖巳施行而臣申省議狀獨未得經聖覽不曾降岀即今來劄子却乞降出再令臣寮集議必有定論退見臺諌謝深甫張叔椿亦皆以熹說爲然而謝獨甚悔前日合議之失其後不久熹即罷歸而所議遂不復有所施行後却聞臺諌後省亦嘗互入文字乞降出熹前所議而亦不知後來竟作如何收殺也然當日議狀奏劄出於匆匆不曾分别始祖世室親廟三者之異故其爲說易致混亂而嘗反疑前日之誤故今特故備著之而别定兩圖以見區區之本意云特故之故疑衍君臣服議淳熈丁未十月八日太上皇帝上仙遺誥至州縣有司莫識衣冠制度大率盡用令式斬衰之服哀臨旣畢及𬒳禮部所下符則止當用布四脚直領布襴衫麻絰而巳此符當與遺誥同日俱下乃遲數日有司不䖍惑悮四方巳如此而於布四脚之下注云係幞頭於直領布襴下注云上領不盤則雖間有舉哀稍緩之處官吏傳觀亦多不曉四脚幞頭之說予記温公書儀及後山談叢所記頗詳乃周武帝所製之常冠用布一方幅前兩角綴兩大帶後兩角綴兩小帶覆頂四垂因以前邉抹額而繋大帶於腦後復收後角而繋小帶於䯻前以代古冠亦名幞頭亦名折上巾其後乃以􅃮紗爲之而專謂之幞頭其實本一物也今禮官以幞頭解四脚是矣而又不肯詳言其制則未知其若馬陳之所謂周武之所製者耶抑將以𥿄爲胎使之剛強植立亦若今之􅃮紗所爲者耶至於直領布襴衫上領不盤之說則衆尤莫曉盖旣曰直領則非上領旣曰上領則不容不盤兩言之中自相牴牾至於如此雖予亦莫識其所以然也乃有強爲之說者曰雖爲上領而不聮綴斜帛湊成盤曲之勢以就正圓但以長布直縫使足以遶項而巳予謂禮官之意或是如此亦不可知但求之於古旣無所考則亦何敢信而從之耶疑此特生於古今之禮不同禮官不能分别去取而欲依違其間是以生此回惑耳盖直領者古禮也其制具於儀禮其像見於三禮圖上有衣而下有裳者是也上領有襴者今禮也今之公服上衣下襴相屬而弗殊者是也竊意國恤舊章之本文必有曰直領布衫者而又有曰布襴衫者其服直領布衫則兼服布裙而加冠於首其服布襴衫則首加四脚而巳盖其𥘉雖合古今之禮而猶各有所施則亦未爲失也今旣不察其異矣又但見公服之上領而有襴遂解直領爲上領不盤而增襴字於衫字之上文若遷今以就古而不自知其實之悮反至於廢古以狥今也又前此州縣誤用之禮皆著管屨而符乃無又承用之者遂屨韈以赴臨殊乖禮意獨無曰杖云者於禮爲粗合而亦有所未盡盖禮君之喪諸達官之長杖所謂達官謂專逹之官在今日則内之省曹寺監長官外之監司郡守凡一司之長若嘗任侍從以上得專奏事者是也故今不杖之制施於僚佐以下則得之矣至使其長官下而同之而雖故相領帥若家居者無異文豈不薄哉又後數日乃得邸吏所報朝廷冠服制度則云皇帝𥘉喪服白羅𫀆黑銀帶絲鞋白羅軟脚折上巾成服日服布斜巾四脚裙袴冠㡌竹杖腰絰首絰直領大䄂布襴衫白綾襯衫視事日去杖首絰小祥日改服布四脚直領布襴衫腰絰布袴大祥日服素紗軟脚折上巾淺黄衫黒銀帶群臣之服分爲三等上等布頭冠布斜巾布四脚大䄂襴衫裙袴首絰腰絰竹杖襯服中等布頭冠幞頭大䄂襴衫袴腰經其下等則布幞頭襴衫腰絰而巳詳此帝服有冠有裙而衫曰直領則是古之喪服當自爲一襲者又有四脚有襴衫則皆當世常服又當别爲一襲者而今乃一之則果如予之所料矣然至於小祥之服則衫直領而下不裙宰臣之服則下雖有裙而衫非直領此又不可曉者其餘亦多重複繆悮如斜巾四脚冠㡌乃四物不當一時並加於首四者皆首服獨冠爲古制斜巾乃民間𥘉喪未成服時所用旣成服則去之盖古者冕之遺制也今成服而與冠並用其失一也四脚之說巳見於前盖宇文氏廢古冠而爲之若兼存而互用猶不相妨今同時並加其失二也㡌古今皆爲燕服與正服之用亦各有所施今與古冠四脚並用三失也今天子之冠四衮冕通天幞頭㡌子雖皆御服如之何而可並用於一時乎直領上領古裙今襴亦四物不當一時並加於身說巳見前冠當服以終喪不當小祥而釋古禮小祥改服練冠但以熟布爲之其制不易也今小祥便只服布四脚不服練冠非是其去巾㡌亦不知有何據也四脚幞頭折上巾三名一物不當錯出而異其名說亦見前兼禮官亦云四脚係幞頭則知二者非異物而於朝臣之服上等曰四脚中下等曰幞頭不知何謂其曰銀帶絲鞋白綾襯衫者則尤非喪禮之所宜服亦不待辨而知其非矣大抵其失在於兼盡古今以爲天子備物之孝而不知考其得失而去取之正天子議禮制度考文之事也然此等條目之多欲一一而正之則有不勝正者必循其本而有以大正焉則曰斬衰三年爲父爲君如儀禮喪服之說而巳其服則布冠直領大䄂布衫加布衰辟領負版揜袵布襯衫布裙麻腰絰麻首絰麻帶管屨竹杖自天子至於庶人不以貴賤而有増損也但儀禮之冠三梁乃士禮今天子通天冠二十四梁當凖之而去其半以爲十二梁群臣則如其本品進賢冠之數以爲等大本旣立然後益考禮經以修殯葬饋奠之禮參度人情以爲居處飲食之節行之天下凡諸吉凶之禮有詭聖不經如上領胡服之類者一切革而去之則亦庶乎一王之制而無紛紛之惑矣而前此議者猶或慮其說之難行雖以元祐之盛時而不能行范祖禹之論盖不知自漢以來所以不能復行君父三年之喪者一則以人主自無孝愛之誠心而不能力行以率於上二則慮夫臣民之衆冠婚祠享㑹聚之有期而不欲以是奪之也國家自祖宗以來三年通喪實行於内則其所以立極導民者無所難矣獨所以下爲臣民之慮者未有折衷是以依違於此而未敢輕議此亦慮之過矣夫古之所謂方喪三年者盖曰比方於父母之喪云爾盖事親者親死而致喪三年情之至義之盡者也事師者師死而心喪三年謂其哀如父母而無服情之至而義有所不得盡者也事君者君死而方喪三年謂其服如父母而分有親踈此義之至而情或有不至於其盡者也然則所謂方喪者豈曰必使天下之人寢苫枕塊飲水食粥泣血三年真若居父母之喪哉今臣民之服如前所陳則巳有定說矣獨庶人軍吏之貧者則無責乎其全雖以白𥿄爲冠而但去紅紫華盛之飾其亦可也至如飲食起居之制則前所謂參度人情者正欲其斟酌古今之宜分别貴賤親䟽之等以爲降殺之節且以㛰姻一事言之則宜自一月之外許軍民三月之外許士吏復土之後許選人祔廟之後許承議郎以下小祥之後許朝請大夫以下大祥之後許中大夫以下各借吉三日其太中大夫以上則並須禫祭然後行吉禮焉官卑而差遣軄事髙者從髙遷官者從新貶官者從舊如此則亦不悖於古無害於今庶乎其可行矣或者又謂今之吉㓙服上領之制相承巳久而遽盡革去恐未爲允此不然也古今之制祭祀用冕服朝㑹用朝服皆用直領垂之而不加紳束則如今婦人之服交掩於前而束帶焉則如今男子之衣皆未嘗上領也今之上領公服乃夷狄之戎服自五胡之末流入中國至隋煬帝時廵逰無度乃令百官戎服從駕而以紫緋緑三色爲九品之别本非先王之法服亦非當時朝祭之正服也今雜用之亦以其便於事而不能改耳曷若凖朝服祭服之法參取唐公服之制以爲便服而去之哉唐公服見通典開元禮序例下篇民私䘮五服制度皆如此禮但以親踈分五等而衣服之制不殊温公書儀但斬衰齊衰用此制而大功以下從俗禮非是惟髙氏送終禮其說甚詳當更討論訂正别爲公私通行䘮服制度頒行民間令其遵守庶㡬先王之禮大小由之上下交修可以久而不廢且使大義素定於臣民之家免至臨事紛錯疑惑衆聴民臣禮議同安作禮不難行於上而欲其行於下者難也盖朝廷之上典章明具又自尚書省置禮部尚書侍郎以下至郎吏數十人太常寺置卿少以下至慱士掌故又數十人每一舉事則案故事施行之而此數十人者又相與聚而謀之於其器幣牢醴共之受之皆有常制其降登執事之人於其容節又皆習熟見聞無所違失一有不當則又有諌官御史援據古今而質正之此所謂不難行於上者也惟州縣之間士大夫庶民之家禮之不可巳而欲行之則其勢可謂難矣揔之得其所以不合者五必欲舉而正之則亦有五說焉盖今上下所共承用者政和五禮也其書雖嘗班布然與律令同藏於理官吏之從事於法禮之間者多一切俗吏不足以知其說長民者又不能以時布宣使通於下甚者至或并其書而亡之此禮之所以不合者一也書脫幸而存者亦以上下相承㳂習苟簡平時旣莫之習臨事則驟而學焉是以設張多所謬盭朝廷又無以督察䋲紏之此禮之所以不合者二也祭器嘗經政和改制盡取古器物之存於今者以爲法今郊廟所用則其制也而州縣專取聶氏三禮制度醜恠不經非復古制而政和所定未嘗頒降此禮之所以不合者三也州縣惟三獻官有祭服其分獻執事陪位者皆常服也古今雜揉雅俗不辨而縣邑直用常服不應禮典此禮之所以不合者四也又五禮之書當時修纂出於衆手其間亦有前後自相矛盾及踈畧不備處是以其事難盡從此禮之所以不合者五也禮之所以不合者五必將舉而正之則亦有五說焉曰禮之施於朝廷者州縣士民無以與知爲也而盡頒之則傳者苦其多習者患其慱而莫能窮也故莫若取自州縣官民所應用者參以近制别加纂録號曰紹興纂次政和民臣禮畧鋟板模印而頒行之州縣各爲三通一通於守令廰事一通於學一通於名山寺觀皆櫝藏之守視司察體如詔書而民庶所用則又使州縣自鋟之板正歳則摹而掲之市井村落使通知之則可以永久矣此一說也禮書旣班則又當使州縣擇士人之篤厚好禮者講誦其說習其頌禮州縣各爲若干人廪之於學名曰治禮毎將舉事則使教焉又詔監司如提學司者察其奉行不如法者舉䋲治之此二說也祭器不一郡縣所用至廣諸祭唯釋奠從祀所用器物爲多當約此數爲定一州一縣必具之難以悉從朝廷給也但毎事給一以爲凖式付之州郡櫝藏於太守廰事使以其制爲之以給州用以賦諸縣或恐州縣自造不能齊同即賦錢於州縣各爲若干詣行􅏅所屬製造其器物用者自爲一庫别置主典與所櫝藏者守令到罷舉以相付書之印𥿄以重其事禮書禮服並用此法此三說也祭服則當凖政和禮州縣三獻分獻執事賛祝陪位之服舉其所有者議其所無者𥙷之使皆爲古禮服釋奠分獻之屬皆用士人餘祭用人吏當殊其制製造頒降如祭器法此四說也禮書之不備者熹嘗考釋奠儀之失今别出之更加詳考而正之仍爲圖其班序陳設行事升降之所事爲一圖與書通班之守視如書法則見者曉然矣此五說也夫禮之所以不合者如此必將舉而正之其說又如此亦可謂明白而易知矣而世未有議之者則以茍簡之俗勝而莫致意焉故也是其所以每難也愚故曰禮不難行於上而欲其行於下者難也故述斯議以爲有能舉而行之則庶乎其有𥙷焉爾改官議一諸州教官以經明行修登第人充罷去試法如不足則令侍從兩省臺諌及諸路監司雜舉歳無定員有闕則降指揮令舉一近制新改官人並令作縣其舉狀内只言犯入巳贓丼與同罪即不言若本人改官之後任親民差遣日如有疲懦殘酷違法害民即與同罪是以舉者徇私妄舉多不擇人及至負敗又無譴責今欲乞於舉狀中添入此項如有違戾必罰無赦一今改官人雖有引見之法然未嘗親奉玉音詢考治行所以人得妄舉而昬繆不材之人或與其間欲乞今後引見之日每十人中特宣兩人升殿詢其前任職事及民間利害如有庸繆即行退黜仍將舉主降官放罷有職名者即令落職則舉者知畏而庸妄之徒不敢徼倖求進矣一改官之人設使所舉皆當然其才亦有大小之不同而今之縣道亦有難易之别今銓部之法未嘗爲官擇人而使人自擇官是以才髙者審於擇地多注優閑易辨之縣才短者昧於所向多注繁劇難辨之縣使人與官兩失其所所以縣多不治而人有遺才也欲乞將天下諸縣分其難易又以大小爲次委自尚書將合注知縣之人精加考究分作四等以可任繁難大縣者爲上繁難小縣者次之優閑大縣又次之小縣爲下其巳任繁難者後任便與注權通判其任優閑縣者後任湏管再入如縣一次不得别注差遣碩注縣丞者聴但亦以三年爲任一累任教官不曾實歴治民之人不許薦舉改官學校貢舉私議古者學校選舉之法始於郷黨而逹於國都教之以徳行道藝而興其賢者能者盖其所以居之者無異處所以官之者無異術所以取之者無異路是以士有定志而無外慕蚤夜孜孜唯懼徳業之不脩而不憂爵禄之未至夫子所謂言寡尤行寡悔禄在其中孟子所謂脩其天爵而人爵從之盖謂此也若夫三代之教藝爲最下然皆猶有實用而不可闕其爲法制之宻又足以爲治心養氣之助而進於道徳之歸此古之爲法所以能成人材而厚風俗濟世務而興太平也今之爲法不然雖有郷舉而其取人之額不均又設太學利誘之一塗監試漕試附試詐冐之捷徑以啓其奔趨流浪之意其所以教者旣不本於徳行之實而所謂藝者又皆無用之空言至於甚弊則其所謂空言者又皆恠妄無稽而適足以敗壊學者之心志是以人材日衰風俗日薄朝廷州縣每有一事之可疑則公卿大夫官人百吏愕眙相顧而不知所出是亦可驗其爲教之得失矣而議者不知其病源之所在反以程試文字之不工爲患而唱爲混𥙷之說以益其弊或者知其不可又欲斟酌舉行崇寕州縣三舎之法而使歲貢選士於太學其說雖若賢於混𥙷之云然果行此則士之求入乎州學者必衆而今州郡之學錢糧有限將廣其額則食不足將仍其舊則其勢之偏選之艱而塗之狹又將有甚於前日之解額少而無所容也正使有以處之然使㳺其間者校計得失於旦暮錙銖之間不得寧息是又不唯無益而損莫大焉亦非計之得也盖嘗思之必𣣔乗時改制以漸復先王之舊而善今日之俗則必如明道先生熈寕之議然後可以大正其本而盡革其末流之弊如曰未暇則莫若且均諸州之解額以定其志立徳行之科以厚其本罷去詞賦而分諸經子史時務之年以齊其業又使治經者必守家法命題者必依章句答義者必通貫經文條舉衆說而斷以巳意學校則遴選實有道徳之人使專教導以來實學之士裁减解額舎選謬濫之恩以塞利誘之塗至於制科詞科武舉之屬亦皆究其利病而頗更其制則有定志而無奔競之風有實行而無空言之弊有實學而無不可用之材矣此其大畧也其詳則繼此而遂陳之夫所以必均諸州之解額者今之士子不安於郷舉而爭趨大學試者以其本州解額窄而試者多大學則解額闊而試者少本州只有解試一路大學則兼有舎選之捷徑又可以智巧而經營也所以今日倡爲混𥙷之說者多是温福處婺之人而他州不與焉非此數州之人獨多躁競而他州之人無不廉退也乃其勢驅之有不得不然者耳然則今日欲捄其弊而不以大均解額爲先務雖有良法豈能有所𥙷哉故莫若先令禮部取見逐州三舉終埸人數太學終塲人數解試亦合分還諸州理爲人數通比舊額都數定以若干分爲率而取其若干以爲新額如以十分爲率而取其一則萬人終埸者以百人爲額更斟酌之又損大學解額舎選取人分數使與諸州不至大叚殊絶其見住學人分數懽許仍舊則士安其土而無奔趨流浪之意矣所以必立徳行之科者徳行之於人大矣然其實則皆人性所固有人道所當爲以其得之於心故謂之徳以其行之於身故謂之行非固有所作爲増益而欲爲觀聴之羙也士誠知用力於此則不唯可以脩身而推之可以治人又可以及夫天下國家故古之教者莫不以是爲先若舜之命司徒以敷五教命典樂以教胄子皆此意也至於成周而法始大備故其人材之盛風俗之羙後世莫能及之漢室之𥘉尚有遺法其選舉之目必以敬長上順郷里肅政教出入不悖所聞爲稱首魏晉以來雖不及古然其九品中正之法猶爲近之及至隋唐遂專以文詞取士而尚徳之舉不復見矣積至于今流弊巳極其勢不可以不變而欲變之又不可不以其漸故今莫若且以逐州新定解額之半而又折其半以爲徳行之科如解額百人則以二十五人爲徳行科盖法行之𥘉恐考察未精故且取其半而又减其半其餘五十人自依常法明立所舉徳行之目如八行之類專委逐縣令佐從實搜訪於省試後保明津遣赴州守倅審實保明申部於當年六月以前以禮津遣限本年内到部撥入太學於近上齋舎安排而優其廪給仍免課試長貳以時延請詢考至次年終以次差充大小軄事又次年終擇其尤異者特薦𥙷官餘令特赴明年省試比之餘人倍其取人分數如餘人二十取一則此科十而取一盖解額中巳减其半矣殿試各升一甲其不中人且令住學以俟後舉其行義有虧學術無取舉者亦當議罰則士知實行之可貴而不專事於空言矣所以必罷詩賦者空言本非所以教人不足以得士而詩賦又空言之尤者其無益於設教取士章章明矣然熈寕罷之而議者不以爲是者非罷詩賦之不善乃專主王氏經義之不善也故元祐𥘉議有改革而司馬温公吕申公皆不欲復其欲復之者唯劉摯爲最力然不過以考校之難而爲言耳是其識之卑而說之陋豈足與議先王教學官人之本意哉今當直罷無可疑者如以習之者衆未欲遽罷則限以三舉而遞損其取人之數俟其爲之者少而後罷之則亦不駭於俗而其弊可革矣所以必分諸經子史時務之年者古者大學之教以格物致知爲先而其考校之法又以九年知類通達強立不反爲大成盖天下之事皆學者所當知而其理之載於經者則各有所主而不能相通也况今樂經亡而禮經缺二戴之記巳非正經而又廢其一焉盖經之所以爲教者巳不能備而治之者類皆舎其所難而就其所易僅窺其一而不及其餘則於天下之事宜有不能盡通其理者矣若諸子之學同出於聖人各有所長而不能無所短其長者固不可以不學而其所短亦不可以不辨也至於諸史則該古今興亡治亂得失之變時務之大者如禮樂制度天文地理兵謀刑法之屬亦皆當世所須而不可闕皆不可以不之習也然欲其一旦而盡通則其勢將有所不能而卒至於不行若合所當讀之書而分之以年使天下之士各以三年而共通其三四之一則亦若無甚難者故今欲以易書詩爲一科而子年午年試之周禮儀禮及二戴之禮爲一科而卯年試之春秋及三傳爲一科而酉年試之年分皆以省試爲界義各二道諸經皆兼大學論語中庸孟子義各一道論則分諸子爲四科而分年以附焉諸子則如荀揚王韓老荘之屬及本朝諸家文字當别討論分定年數兼許於當年史傳中岀論二道䇿則諸史時務亦然諸史則左傳國語史記兩漢爲一科三國晉書南北史爲一科新舊唐書五代史爲一科通鑑爲一科時務則律暦地理爲一科通禮新儀爲一科兵法刑綂勑令爲一科通典爲一科以次分年如經子之法策各二道則士無不通之經無不習之史皆可爲當世之用矣其治經必專家法者天下之理固不外於人之一心然聖賢之言則有淵奥爾雅而不可以臆斷者其制度名物行事本末又非今日之見聞所能及也故冶經者必因先儒巳成之說而推之借曰未必盡是亦當究其所以得失之故而後可以反求諸心而正其繆此漢之諸儒所以專門名家各守師說而不敢輕有變焉者也但其守之太拘而不能精思明辨以求真是則爲病耳然以此之故當時風俗終是淳厚近年以來習俗苟偷學無宗主治經者不復讀其經之本文與夫先儒之傳注但取近時科舉中選之文諷誦摹倣擇取經中可爲題目之句以意杻揑妄作主張明知不是經意但取便於行文不暇恤也盖諸經皆然而春秋爲尤甚主司不惟不知其繆乃反以爲工而置之髙等習以成風轉相祖述慢侮聖言日以益甚名爲治經而實爲經學之賊號爲作文而實爲文字之妖不可坐視而不之正也今欲正之莫若討論諸經之說各立家法而皆以注䟽爲主如易則兼取胡瑗石介歐陽脩王安石邵雍程頥張載吕大臨楊時書則兼取劉敞王安石蘇軾程頥楊時晁說之葉夢得吴棫薛季宣吕祖謙詩則兼取歐陽脩蘇軾程頥張載王安石吕大臨楊時吕祖謙周禮則劉敞王安石楊時儀禮則劉敞二戴禮記則劉敞程頥張載吕大臨春秋則啖助趙正陸淳孫明復劉敞程頥胡安國大學論語中庸孟子則又皆有集解等書而蘇軾王雱吴棫胡寅等說亦可采以上諸家更加考訂増損如劉彛等說恐亦可取令應舉人各占兩家以上於家狀内及經義卷子第一行内一般聲說將來答義則以本說爲主而旁通他說以辨其是非則治經者不敢妄牽巳意而必有据依矣其命題所以必依章句者今日治經者旣無家法其穿鑿之弊巳不可勝言矣而主司命題又多爲新竒以求出於舉子之所不意於所當斷而反連之於所當連而反斷之大抵務欲無理可解無說可通以觀其倉卒之間趨附離合之巧其始盖出於省試上天之載無聲無臭儀刑文王之一題然而當時傳聞猶以爲恠及今數年則無題不然而人亦不之恠矣主司旣以此倡之舉子亦以此和之平居講習專務裁剪經文巧爲闘飣以求合乎主司之意其爲經學賊中之賊文字妖中之妖又不止於家法之不立而巳也今旣各立家法則此弊勢當自革然恐主司習熟見聞尚仍故態却使舉子愈有拘礙不容下筆願下諸路漕司戒勑所差考試官今後出題須依章句不得妄有附益裁剪如有故違許應舉人依經直答以駁其繆仍經本州及漕司陳訴將命題人重作行遣其諸州申到題目亦令禮部國子監長貳㸔詳紏舉譴罰則主司不敢妄出恠題而諸生得守家法無復敢肆妖言矣又按前賢文集䇿問皆指事設疑據實而問多不過百十字嘉祐治平以前尚存舊體而吕申公家傳記熈寕事乃云有司發䇿問必先稱頌時政對者因大爲䛕詞以應之然則此風盖未逺也今亦冝爲之禁使但條陳所問之疑畧如韓歐諸集之爲者則亦可以觀士子之實學而息其䛕侫之姦心矣其必使答義者通貫經文條陳衆說而斷以巳意者其說巳畧具于家法之條矣盖今日經學之難不在於治經而難於作義大抵不問題之小大長短而必𣣔分爲兩叚仍作兩句對偶破題又須借用他語以暗貼題中之字必極於工巧而後巳其後多者三二千言别無他意不過止是反復敷衍破題兩句之說而巳如此不唯不成經學亦復不成文字而使學者卒歳窮年枉費日力以從事於其間甚可惜也欲更其弊當更寫卷之式明著問目之文而䟽其上下文通約三十字以上次列所治之說而論其意又次旁列他說而以巳意反復辯析以求至當之歸但令直論聖賢本意與其施用之實不必如今日經義分叚破題對偶敷衍之體毎道止限五六百字以上則雖多増所治之經而答義不至枉費辭說日力亦有餘矣至於舊例經義禁引史傳乃王氏末流之弊而論子史者不復訂以經指又俗學卑近之失皆當有以正之使治經術者通古今議論者識原本則庶乎其學之至矣其學校必選實有道徳之人使爲學官以來實學之士裁减解額舎選謬濫之恩以塞利誘之塗者古之太學主於教人而因以取士故士之來者爲義而不爲利且以本朝之事言之如李廌所記元祐侍講吕希哲之言曰仁宗之時太學之法寛簡國子先生必求天下賢士真可爲人師者就其中又擇其尤賢者如胡翼之之徒使專教導規矩之事故當是時天下之士不逺萬里來就師之其㳺太學者端爲道藝稱弟子者中心說而誠服之盖猶有古法之遺意也熈寕以來此法浸壊所謂太學者但爲聲利之塲而掌其教事者不過取其善爲科舉之文而嘗得雋於塲屋者耳士之有志於義理者旣無所求於學其奔趨輻凑而來者不過爲解額之濫舎選之私而巳師生相視漠然如行路之人間相與言亦未嘗開之以徳行道藝之實而月書季考者又祗以促其嗜利苟得冐昧無耻之心殊非國家之所以立學教人之本意也欲革其弊莫若一遵仁皇之制擇士之有道徳可爲人師者以爲學官而久其任使之講明道義以教訓其學者而又痛减解額之濫以還諸州罷去舎選之法而使爲之師者考察諸州所解徳行之士與諸生之賢者而特命以官則太學之教不爲虚設而彼懐利干進之流自無所爲而至矣如此則待𥙷之法固可罷去而混𥙷者又必使與諸州科舉同日引試則彼有郷舉之可望者自不復來而不患其紛冗矣至於取人之數則又嚴爲之額而許其𥙷中之人從上㡬分特赴省試則其舎郷舉而來赴𥙷者亦不爲甚失軄矣其計㑹監試漕試附試之類亦當痛减分數嚴立告賞以絶其冐濫其諸州教官亦以徳行人充而責以教導之實則州縣之學亦稍知義理之教而不但爲科舉之學矣至於制舉名爲賢良方正而其實但得記誦文詞之士其所投進詞業亦皆無用之空言而程試論䇿則又僅同覆射兒戯𥘉無益於治道但爲仕䆠之捷徑而巳詞科則又習於謟䛕夸太之詞而競於駢儷刻雕之巧尤非所以爲教至於武舉則其弊又不異於儒學之陋也欲革其弊則制科當詔舉者不取其記誦文詞而取其行義器識罷去詞業六論而直使待對於廷訪以時務之要而不窮以隱僻難知之事詞科則當稍更其文字之體使以深厚簡嚴爲主而以能辨析利害敷陳法度爲工武舉則亦使學官放經義論䇿之制叅酌定議頒下武經緫要等書而更加討論𥙷其遺逸使之誦習而立其科焉則庶乎小大之材各得有所成就而不爲俗學之所病矣夫如是是以教明於上俗羙於下先王之道得以復明於世而其遺風餘韻又將有以及於方來與夫規規然固守末流之弊法而但欲小變一二於其間者利害相絶固有間矣草茅之慮偶及於此故敢私記其說以爲當路之君子其或將有取焉天子之禮如此者數叚先生𥘉欲以入禮書後又謂若如此却是自巳著書也遂除去不用今惟見此一叚豈禘祫議之類皆是歟天子之禮至尊無上其居處則内有六寢六宫外有三朝五門其嬪御侍衛飲食衣服貨賄之官皆領於冢宰其冕弁車旗宗祝巫史卜筮瞽侑之官皆領於宗伯有師以道之教訓有傳以傳其徳義有保以保其身體有師氏以㣲詔之㣲下本有訓字有保氏以諌其惡前有凝後有丞左有輔右有弼其侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧在輿有旅賁之規旅賁勇士掌執戈楯夾車而趨位宁有官師之典門屏之間謂之宁倚几有訓誦之諌工師所誦之諫書之於几也居寢有暬御之箴暬近也臨事有瞽史之道宴居有工師之誦史爲書太史君舉則書瞽爲詩工又誦箴諌大夫規誨士傳言庶人謗啇旅于市旅陳也陳貨物以示時所貴尚百工獻藝獻其技藝以喻政事動則左史書之言則右史書之其書春秋尚書有存者御瞽㡬聲之上下㡬猶察也察其存樂不幸而至於有過則又有爭臣七人靣列廷爭以正捄之盖所以養之之備至於如此是以㳟巳南靣中心無爲以守至正而貌之㳟足以作肅言之從足以作乂視之明足以作哲聴之聦足以作謀思之􅐶足以作聖然後能以八柄馭群臣八綂馭萬民而賞無不慶刑無不威逺無不至邇無不服傳說所謂奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民武王所謂亶聦明作元后元后作民父母所謂天降下民作之君作之師惟其克相上帝寵綏四方箕子所謂皇建其有極歛時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極董子所謂正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方者正謂此也何謂六寢六宫曰王大寢一小寢五大寢聴政故嚮明而治故在前小寢釋服燕息也故在後其小寢一寢在中四寢在於四角春居東北夏居東南秋居西南冬居西北土王之月居中后之六宫正宫在前五宫在後其制如王之五寢何謂三朝五門曰王宫之外門一曰皐門二曰雉門三曰庫門四曰應門五曰路門又曰虎門又曰卑門此鄭司農說也康成以雉門在庫門外而設兩觀其朝在雉門之外者曰外朝在路門之外者曰治朝路寢之廷曰内朝皐門之内外朝也朝士掌其法小司農掌其政列三槐與九棘設嘉石與肺石而朝諸侯聴詔詢大事在焉應門之内治朝也司士正其位宰夫掌其法大儀正王之位而日王視朝在焉路門之内燕朝也大儀正其位掌擯相族人朝焉玉藻曰朝服以視朝退適路寢聽政然則王日視朝於治朝而退聴政於燕朝矣雉門之外懸象治所以待民應門之外設宗廟社稷所以嚴神位路門之外則九室九郷朝焉路寢之内亦九室九殯居焉外朝之法朝士掌之左九棘孤卿大夫位焉群士在其後右九棘公侯伯子男位焉群吏在其後靣三槐三公位焉州長衆庶在其後左嘉石平罷民焉右肺石達窮民焉小宗伯職曰建國之神位右社稷左宗廟然則外朝在庫門之外皐門之内與今司徒府有天子以下大㑹殿亦古之外朝哉周天子諸侯皆有三朝一内朝二外朝之在路門之内者或謂之燕朝何謂貨賄曰有太府以受其貨賄之入關市之賦以待王之膳服邦中之賦以待賔客四郊之賦以待稍秣家稍之賦以待匪頒邦甸之賦以待工事邦縣之賦以待幣帛邦都之賦以待宗祀山澤之賦以待喪紀幣餘之賦以待賜予凡邦國之貢以待予用凡萬民之貢以充府庫凡式貢之餘財以供玩好之用而金玉玩好玉府掌之良兵良器内府掌之王后世子衣服之用則外府掌之滄洲精舎釋菜儀前期獻官以下皆盛服今用深衣涼衫掌儀設神座用席先聖南向配位西向從祀位東西向設祝版於先聖位之右設香爐香案香合於堂中設祭器於神坐前每位各左一籩今用􅃮盤實以脯果右一豆今用􅃮盤實以笋菜設犠尊一於堂上東南隅今以瓦尊代加勺羃設燭四於堂中二於東西從祀位之前設洗二於東階之東盥洗在東爵洗在西卓一於洗東卓上箱二巾東爵西設獻官位於堂下北靣分奠者二人次之諸生又次之皆北向西上及期獻官以下序立於東廊下掌儀帥執事者升堂實酒饌賛者一人引獻官升堂點閱降就堂下位分奠官及諸生各就位賛者一人離位少前再拜訖進立於主人之右西向曰再拜在位者皆再拜掌儀祝司尊者皆升掌儀立於東序西向祝立於阼階上西向司尊者立於尊南北向賛引獻官詣盥洗之南北向立盥手􅍤手升焚香再拜降再詣盥􅍤如𥘉詣爵洗南北向立洗爵以授賛升詣尊所西向立賛以爵授獻官司尊舉羃酌酒獻官以爵授賛俱詣先聖前獻官北向跪賛跪授爵獻官執爵三祭奠爵於籩之間俛伏興少立祝詣獻官之左東向跪讀祝訖興復位獻官再拜次詣盥洗爵如𥘉洗諸配位爵訖賛者以盤兼捧升酌詣配位如𥘉儀但不讀祝獻官復位當獻官詣配位酌獻時賛者二人各引分奠官分行東西從祀禮盥洗以下並如配位之儀東先西後分奠訖復位在位者皆再拜退獻者賛者分奠二人賛者二人祝掌儀者司尊趙壻親迎禮大略前期女氏使人張陳其婿之室及具饌設椅卓置於堂中東西相對各置柸匕著𬞞果於卓上酒壼在案席之後别置卓子於席南注子置其上壻盛服主人醮子之禮乗馬至女氏之門下馬俟于次女尊長父母醮子之禮出迎壻於門外揖遜而入至于􅈦事主人升自阼階立西向壻升自西階北靣再拜向内拜宅裏去主人不答拜姆奉女出中門至于􅈦事壻揖之至婦轎前舉簾以俟姆奉婦登車下簾壻揖主人主人不降送壻乗馬在前婦車在後皆以二燭前導以行壻先至􅈦事俟婦下車揖遂導以入婦從之賛者導壻揖婦而先婦從之適其室婦從者布席於閫内東方壻從者布席於西方壻立于東席婦立于西席婦拜壻答拜壻爲婦舉蒙頭訖揖婦坐壻東婦西從者斟酒壻揖婦同祭酒舉飲從者置殽壻揖婦同祭殽食畢又斟舉飲饌不祭三斟亦如之此參酌古人合牢之禮乃徹饌晦庵先生朱文公文集卷第六十九終福州府懦學訓導鄭璉校正
