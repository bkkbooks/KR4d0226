body:
  text: 答吕伯恭前日專人拜狀想逹偶至建陽竊聞新除不勝慰喜而區區私請亦遂從欲尤以欣幸諸公若早知出此則無如許紛紛矣老兄憂時之切惓惓不忘竊計裂裳褁足不俟屨而就途矣所碩慨然以身任道無所回隱因上心之開明及時進説以慰善類之望千萬幸甚往者固憂鄭自明之舉莫之或繼其為安危禍福之機有不容息者今得賢者進為少寬畎畝之憂矣熹亦未知差勑在甚處想諸公必巳發來或尚留彼告為早取附便也大兒方幸依託不知今當如何欲便遣人取之又以懇叔度催畢親事更俟其報若只此歲裏則未能便喚歸也然老婦之病日益進深以此事為憂得并為一言速之千萬幸甚因黃尉行附此草草自此不欲數以名姓入都音問不得數通矣千萬為道自愛答吕伯恭前月半間遣人拜書及建陽附黃尉二書想巳逹不審從人竟用何日入都比日𥘉寒伏惟尊候萬福任道濟時此中外所深望於明哲而區區尤所不能忘者計所處素定以時發之當不待它人之贊也熹祠請已遂尚未知敕命所在不知諸公發在甚處也前書所懇大兒姻事今楊元禮教授經由專託渠見叔度靣議若老兄未行亦望留意庶得便遣其歸也昨所寓李主管書今日方到恐間知之未即承教惟千萬為道自愛眷集伏惟均福承惠筆墨霜柿感領厚意便遽未有以為報也有委勿外熹拜問答吕伯恭昨附建陽黃尉兩書不審已達未得子約書聞已供職矣甚善甚善又得向來便中所惠書尤以慰幸比日冬寒伏惟尊候萬福熹私門禍故老婦竟不起疾悲悼不可為懷兒子逺歸已後其母又切傷痛也一體胖合情義不輕而自此門內細碎便有不得不關心者衰懶詎復堪此奈何奈何又聞叔度之病亦復不尋常深以懸念不知竟如何此公清介在朋友中最為可畏者且願其早平復也老兄到館而已旬月諸況如何近年一種議論專務宛轉回互欲以潛回主意隂轉事機此在古人固有以此而濟事者然皆居亂世事昏主不得已而然者竊謂今日主相樂聞忠言非不切至特蔽於隂邪不能決然信用而或者乃欲以彼術施之計慮益巧誠意益衰以上聰明亦豈不悟其為此此所以屢進而卒不效也不審髙明以為如何然當默之勿以語人也前附黃尉書或未到亦冝索之其間亦有一二語非它人所欲聞者不可浮湛也自此拜狀不能及此等矣熹祠命巳下偶值喪禍未及拜受上恩如此何以為報正惟修身守道以求無負奬寵之意而巳因便拜狀衮冗不暇它及千萬為德業自愛為禱答吕伯恭私家不幸室人隕喪悲悼酸楚不能自堪黃仲本來伏承惠書慰問哀感之深并辱歸賵尤以愧荷即日春寒伏惟尊候萬福史篇計巳奏御勾考計良勞然得是非黑白不至貿亂足以傳信久逺亦非細事也熹自遭禍故益覺衰憊內外瑣細自此便有不得不關心者加以目下一畨賔客書問之冗至今未定形神俱耗不復能堪矣偶婺源滕秀才珙在上庠其兄來為求書請見因得附此致謝滕生未相見聞資質頗佳亦知向學得與其進為幸未有承教之期臨風傾仰惟千萬為道自重慰此逺誠答吕伯恭昨黃仲本至并領回書弔問甚勤且辱賵禭尋以數字附婺源滕生致謝不知今已逹否即日春和伏惟尊候萬福熹杜門忽忽意緒殊不佳雨多卜葬至今未定更旬日間且出謝親知并看一兩處若可用即就近卜日也今日得叔度書知已向安甚慰近思巳寄來尚有誤字已校定寫寄之矣汝昭聞巳復官諸公必有以處之但不知後來竟自陳否耳徽録當巳進呈自此或少事矣小魏過門附此問訊它不敢及惟千萬為道自愛亟推所有以正君及物為幸不勝吾黨拳拳之望答吕伯恭前日魏應仲行拜狀想逹比日春暖伏惟尊候萬福熹所欲言者巳見前書適記一事嚴州遺書本子𥘉校未精而欽夫去郡今潘叔玠在彼可以改正并刻外書以輔其遺前附叔玠書因忘及此今此便遽又未暇作渠書告因便為逹此意并求一印本便中示及容為校定送彼蓋此中已無其本也切幸留意友人王欽之主簿赴調過此因得附訊欽之有意於學而病悠悠因見有以警之為幸正逺為道自愛答吕伯恭久不聞問積有馳情元善歸承書少慰其後曽丞經由亦道存問之意為感然久不致問訊雖聞遷進之寵曽不能一致賀顧此亦未足以甚慰所望云爾比日劇暑伏惟尊候萬福來書諸諭差強人意更碩益以其大者自任上有以正積弊之源下有以振久衰之俗則區區之望也今瞑眩之藥屢進未效其他小小溫平可口之劑固無望其有輔矣不勝畎畝私憂輒復及此惟髙明深念之也敬夫北歸私計甚便近收𥘉夏問書云其子病繼聞音耗殊惡果爾殊可念也棶仲到必已久子重時相見否叔度兄弟久不得書不知為況如何詩説所欲修改處是何等類因書告略及之比亦得間刋定大抵小序盡出後人臆度若不脫此窠臼終無緣得正當也去年略修舊説訂正為多向恨未能盡去得失相半不成完書耳綱目近亦重修及三之一條例整頓視前加密矣異時須求一為櫽括但恐不欲入此千古是非林中擔當一分然其大義例熹巳執其咎矣但恐微細事情有所漏落却失眼目所以須明者一為過目耳文海條例甚當今想已有次第但一種文勝而義理乖俯者恐不可取其只為虛文而不説義理者却不妨耳佛老文字恐須如歐陽公登真觀記曽子固仙都觀菜園記之屬乃可入其他贊邪害正者文詞雖工恐皆不可取也蓋此書一成便為永逺傳布司去取之權者其所擔當亦不減綱目非細事也況在今日將以為從容説議開發聰明之助尤不可雜置異端邪説於其間也欽夫寄得所刻近思録來却欲添入説舉業數假巳寫付之但不知渠巳去彼能了此書否耳近時學子有可收拾者否近兩得子夀兄弟書却自訟前日偏見之説不知果如何曽丞説劉醇叟者欲來相訪而久不至豈不成行邪近看論孟等書儘更有平髙就低處恨未得從容靣論耳子約昨聞欲過湖秀今已歸否孰等拜起居正逺千萬為道自重區區至禱答吕伯恭前日便中伏辱近告感慰亡量信後秋清伏惟尊候萬福熹比與純叟及廖子晦同登雲谷遂來武夷數日講論甚適今將歸矣偶浦城林叔文見訪亦纍日云嘗從徐誠叟學頗能道其緒言今𣣔至浙中謁知舊以葬其親意亦可憐或恐有求館客者其人老成篤實得垂記念幸甚臨行草草附此未暇他及惟千萬為道自重答吕伯恭前日所稟密菴事想蒙垂念近以久不得報淨升者益無禮至於聞官已令回申云熹遣人賫書往門下審其虛實矣切望早白知府令叔早發一信相報或别遣一僧來追收靜升文帖為佳不然此事無收殺必壞此菴可惜也千萬至懇至懇子重所遷何官未及上狀因見煩致區區答吕伯恭近因劉家便人一再上狀想逹人日遞中忽𬒳報聞之命丞相又以私書鐫喻懇切勢不容復辭已即拜受但敕劄尚留府中旦夕當請以歸也朝廷厚意如此豈敢不承但衰懶決不堪仕宦其勢須專人致書謝丞相而復申宫廟之請耳𥘉謂夤緣可得一對使君相親見其衰悴不堪之狀或可脫免今既有任滿奏事指揮則正自不如所料只得罄竭懇請庶免踈脫耳遞中具此幸預為一言庶得旦夕遣人到日便得遂請勿使至再不唯隂芘孤蹤不使至於狼狽亦使斗升微祿不至斷絶實為幸甚適獲忝覽册府𢋫歌從容風議之辭獨得之於髙明耳歎仰歎仰比日𥘉冬寒氣未應伏惟尊候萬福更幾以時深為吾道自重幸甚幸甚答吕伯恭月末人還承書具審比日冬寒尊候萬福感慰之劇進長著廷行膺獻納之選吾道為有望矣熹所請不遂諸公意則甚勤但私計為甚不便私義為甚不安加以近來疾病益衰前日欲略入城將就車而病作兩日不能起今方粗支然尚未敢出門戶也未論其他觀此氣象豈復更堪逺官今亦無可奈何且一靣呼迓兵為輿病獨往之計萬一臨行不堪勉強又當别致情懇且前後誨諭之意非不詳悉亦竊自念一向如此實於大義有所不安又思今日致身事主以扶三綱者世不乏人決不至以熹故遂使大倫至於廢闕故願乞其庸繆衰殘之身以偷安自逸盡此餘年且萬一不免復有祈請全仗老兄力為主張使不至大假狼狽也子約得書否亦甚為熹憂此行蓋此理灼然况今又甚於前日邪便中寓此不敢他及惟以時為道自愛答吕伯恭月𥘉遞中辱書并省劄良感眷念比日霜寒伏惟尊候萬福熹昨以祠請不遂欲俟迓兵到即行今忽以此故纍及他人心不自安不免復伸前請納去劄子三通其中但是説病不可支更上煩一為宛轉不欲作諸公書又非倉卒所能辦兼亦不敢家居俟命巳一靣前走饒信間俟指揮若得回降告只發來鉛山弋陽以來尋問也非欲故違丁寧之誨顧以私心實不自安亦以鹽司前日之舉似太輕率恐致人言故不免復為此請切幸見亮早為料理使得免於後日之患則所望也熹今雖行亦未敢越番陽而西且宿留安仁餘干界中俟命耳更有少懇劉樞之葬此問無曉飾棺制度者府中有狀申部得戒吏屬分明圖畫寫注行下為幸熹暫到城中留此付其所遣人連日人事紛冗已不能支不復他及答吕伯恭昨在城中附府司持申部狀人一書不知逹未比日霜寒伏惟尊候萬福熹還家兩日南康己略遣得數人來而今日復𬒳堂帖趣行勢不敢久居家但開正須略到近處墳墓省視及欲略走邵武問黃丈之疾歸來方得就道計在燈夕前後矣昨所懇三劄不知巳投否幸早為宛轉得及行之未逺而𬒳命以還為幸不然亦須早得一報蓋在道不容久宿留也千萬留念至懇至懇劉家葬禮得早為指揮圖畫注釋行下為幸或假未開亦告督趣行下蓋其家葬巳有期欲及時早辨也渠家昨受過建康買棺錢今欲還納聞周內翰深以為不可不識何謂試煩叩之子細批報為幸遞中拜狀不敢他及歲晚珍重以對大來之慶吾黨甚望甚望答吕伯恭歲前纍奉狀今想皆達但得伯崇書聞嘗苦末疾甚駭聞聽不知賢者清修寡欲何以忽有此疾當是耽書過甚或失飲食起居之節致外邪客氣得以乘虛投隙而入耳然計根本完固非久當遂平復尚恃此以不恐耳熹昨懇請祠不知曽為致力否恐不曽為料理再遣此人去託機仲宛轉求之或前日所懇巳有回降指揮即語機仲更不必投也蓋病軀日來雖無他苦但一味昏耗倦怠應對隨輒遺忘坐久即思瞌睡此豈堪作吏者諸公想亦能哀之也然亦不敢居家俟命旦夕略過分水一兩程以俟得請而還幸語機仲早為致力為幸急遣此人不暇他及惟千萬加意調飬以取全安為望答吕伯恭數日來聞體中不安懸情不可言建卒還得子約書知巳有退證甚慰以老兄平日存飬之厚根本深固必無他慮今當日勝一日矣熹二十五日已離家前至鉛山即止以俟前請之報但機仲不為投下文字此甚費力向使當時即投前劄今或巳免此行今若更不為投即不免遣還迓兵決為歸計矣深不欲至此但事勢使然不得已耳交歲以來十病九痛甚不堪此勞頓正使遂以罪罷不得祠祿亦所碩欲因見機仲幸更為督之若必欲熹赴官亦須更得朝旨乃可去蓋已報本軍官吏以嘗請祠今無故忽然撞到靣前亦可笑也老懶殊甚若得遂所請尤幸此但為不得巳之言耳子約不及别書意不殊此引疾丐間計巳屢上若度三兩月間未能就職不若力請為冝也遞中草此答吕伯恭自發鉛山後一向不聞動靜殊以為懷到此始得叔介書知巳出都門體候益輕快喜可知也比日清和伏惟尊候萬福休飬既久計日覺平復矣熹去月之晦巳交郡事違負夙心俯仰愧歎重以衰病精力昏耗驟從吏役尤覺不堪尚幸地狹人稀獄訟絶簡少然猶治事終日不得少休亦緣乍到不知事之首尾綱紀又皆廢墜諸邑無復稟畏極費料理民貧財匱不得不少勞心力更看一二日後如何若更如此則住不得便須告歸若能少定則或推遷至夏末也始至首下書訪陶桓公靖節劉凝之周先生諸公遺迹教授楊元範巳作劉祠因并立周象配以二程先生尚未成也四五日一到學中為諸生誦説只此一事猶覺未失故步其他不能盡報孰必能略道之或有未當幸口授子約細條畫見教為望千萬至懇廬阜勝絶粗慰鄙懷潄玉三峽皆巳一到簡寂亦深秀可喜也每至勝處輒念向來鵝湖之約為之悵然今殊未有並逰之日但碩早脫此羈縶亟往問訊庶獲欵教耳未間千萬珍重答吕伯恭弊下一本空一字前日兒子行拜狀矣即日天氣不定不審尊候復何似竊惟斯文有相益向平復熹到此𥘉不自料欲小立綱紀為民整頓一二久逺弊兩日來覺氣象殊不佳巳走介請祠矣却有小事拜懇學中元範教授立得濂溪祠堂并以二程先生配食又立得陶靖節劉凝之父子李公擇陳了翁祠通榜曰五賢蓋四公此間人而了翁亦嘗謫居於此也周祠在講堂西五賢在東周祠巳求記於欽夫矣五賢之記意非吾伯恭不可作本欲專人拜懇而小郡寒陋之甚不敢多遣人出入只令入都人附此於汝昭兄弟處書到切望便為落筆却懇韓丈借一介送來或恐熹巳行即徑送楊教授處可也陶公栗里只在歸宗之西三四里前日略到令人歎慕不能巳巳廬山記中載前賢題詠亦多獨顔魯公一篇獨不干事尤令人感慨今謾録呈想巳自見之也極知老兄體候未平不當有此請然恐巳清安不妨運思故敢以為請耳韓丈不暇拜書蓋此所避正韓丈向來所遭躪籍之流甚恨失計輕去山林踧踖于此如坐針氊之上也相見煩為説及此來不曽了得公家一事但做得此祠堂看得廬山耳然非暇日不敢出出又有所費𥘉亦不敢數數今覺日子無多不免每旬一出也罷書才到郡徑走谷廉轉山北拜濂溪書堂之下而歸亦足以少復鴈門之踦矣今日周先生之子來訪令人悵然明日亦約與俱遊山也亟遣人所欲言者尚多皆未暇及惟千萬加愛為禱不宣答吕伯恭自承病訊之後雖聞巳漸向安然殊不得手字今又月餘不聞動靜懸仰不可言也比日暑溽不審起居復何似計益輕健也熹到官四閲旬矣俯仰束縳良有不可堪者見為料理一二利害文字旦夕列上并申歸田之請也叔度昆仲子約諸兄友皆未及上狀兒子到彼必巳久矣乞嚴賜檢束為幸顧雖無海門之禍然亦不免了翁之憂也因便附此令郡吏轉達蓋恐巳歸婺女如或未行亦可早命駕也必以無醫藥為憂者惑也髙明必深矚此聊言之以助思慮之所不及云爾他惟為道珍重答吕伯恭近得子約書知巳還舊隱又見德化主簿經過云亦嘗得望顔色喜慰深矣比日想益輕健但數日暑氣異常不知宜如何耳又聞尊嫂亦嘗不快想亦無他也熹失計此來百事敗人意此月內當遣人丐祠祿得與不得復未可知然不以病去則必以罪去矣前請祠記近巳畢事奉安不審能為抒思否此不敢必但若得之不惟為此邦之幸亦使四方善類知老兄病中猶不廢此足以少自慰也廬阜竒處盡在山南玉淵三峽蓋巳屢到但此數日來不欲暑行勞人徒夢想水石間也三峽之西有懸瀑瀉石龕中雖不甚髙而勢甚壯舊名卧龍有小菴巳廢近至其處不免捐俸金結茅欲畫孔明像壁間俟得解郡事且入其間盤礴旬日而後去耳此來百事敗人意獨此差自慰耳孰不知巳到否此兒來自此徑去渠至中路又聞同中子歸家其不聽人言語皆類此到彼幸時呼來痛鐫責之渠於老兄教誨即不敢忽也千萬至懇聞少嘉為真曲折甚強人意此亦一大幾會惜渠輩伎倆止此不能乘勢立作也此間斗海殊不聞事不知近事復如何耳子約不及别狀意不殊前熹來此日間應接衮衮莫夜稍得間向書册則精神巳昏思就枕矣以此兩月間只看得兩篇論語亦是黃直卿先為看過參考同異了方為折中尚且如此渠昨日又聞兄喪歸去此事益難就緒矣近年百念灰冷只此一辜庶幾少慰平生之碩今又如此亦命矣夫因毛掾告有便附此未能究所懷惟千萬為道自重因便數頻寄聲為幸潘叔介書來云老兄能書大字書中得一二字幸甚幸甚不宣荆州久不聞問遣人去亦未回但傳其政甚偉不知果如何也答吕伯恭昨日方以書託毛掾附便未行今晨人還忽領手字把玩無斁喜可知也但聞尊嫂復不甚安何乃如是計今服藥調理亦當平復矣誨諭數事極感垂念學中向來略為説大學近巳終篇今却只是令教官挑覆所授論語諸生説未到處略為發明兼亦未嘗輒升講坐侵官瀆告如來教所慮也但只如文翁常衮之為區區志碩止於如此耳政事固欲簡靜但今時仕宦之人不務恤民多是故縱吏胥畏憚權豪凡有公事略加點檢無不坐此二病者勢不得已須差擇一二根治此外則絶不敢有毫髮之擾財賦滴諸縣皆不得人弛廢殊甚為丞佐所迫亦不免追人吏監禁斷遣然思為縣者亦豈不欲了辦財賦見知州郡何苦如此逋慢想亦是有做不行處每握筆欲判此等文字未嘗不慨然大息乃知真是腐儒不敢諱人指目也趙守規模具在但終是意思不如此自使不行然亦恐官私俱竭政使人存政舉亦未必能為可繼也此事可慮真是使人不忍所以急欲丐去非是苟求自佚亦是下不得如此毒手也見為星子縣討論經界添稅重定旦夕申乞蠲減得三五百匹和買未知朝廷肯相從否此為益殊不多然亦勝於不減耳所懇漕司者乃是上供餘米兩漕近皆相許但未得明文撥下耳蓋本軍年額秋苗四萬六千石而上供四萬石餘六千石漕司樁管在軍往往亦催不足其見催到者本軍既不敢支漕司又無所用但陳腐積壓消折見欠數而本軍官無支給並是額外加耗巧作名色取之故今欲從漕司乞此餘數科撥在軍應副軍糧然亦僅可供四五月之用其他依舊須自辦也平生讀書要作如何利益底事今到此此等事便做不得中夜以思實不遑安處每誦韋蘇州句云身多疾病思田里道有流亡愧俸錢此中百姓倐來忽往更無固志未嘗不低􅉰愧歎也寄居積俸只是𥘉到有以本身料錢為請者量與逐月帶支所費不多他如見任官貟使臣任滿當去而未支者亦量事制宜不敢一例放行亦不敢一切不恤也修造事學中二祠只是因舊設像别無地步可起造其他方作得劉凝之菴亭并門凡此等皆用𥘉到送代者折送香藥及逐月供給中不應得者樁𬋩為之不敢破使官錢至如前書所説卧龍菴又自用俸錢亦不敢破此錢矣園中蓬蒿沒人尚未能芟除何暇及他事耶求去之説如前所云又以衰病之餘精力耗損每對吏民省文案或至坐睡不惟有所不堪亦恐吏輩乘隙為姦胎患千里故欲急去且承喻之及故悉具報如此只得勤尊慮也有未當理處却幸垂教所深望也前書懇作五公祠記計今可以抒思矣因來千萬早寄示為幸蓋已具石恐熹或去此又不能得了耳承教未期千萬加意調衛以取十全之安至望答吕伯恭數日前毛掾人行附狀想逹比日庚伏暑盛竊計尊體日益清安矣熹昏眊短拙支吾不行巳遣人上減稅之奏并以奉祠請於諸公矣其鳴甚哀恐必可得不然亦須再請以得為期也熹向嘗拜書以五賢祠記為懇後來不及遣行而嘗因書申懇昨偶檢閲故書得此恐後書首尾不見今以納呈幸為出數語為賜也近得荆州書巳許為記三先生祠若得老兄之文與之並傳真此一方之幸也五賢欲作五君子如何更告誨諭然此文大槩當以教官為主蓋劉李之祠本楊元範所立今但增數公耳不欲掩其善且近以此著於薦書不可於此有異同也切幸留念去意巳決他無可言亦不及作叔度昆仲書因見煩致此意子約亦不殊此孰巳成昏未亦不及與之書告呼來喻之辨志録偶不帶來欲令孰寫一本并告語之也尊嫂所苦當巳向安矣暑氣未衰更冀加意珍重不宣六月十八日熹頓首再拜上狀伯恭參議直閣大著契兄坐下子約不及别書孰在叔度處只令就學書館亦幸可否更在尊意裁度也適又領四月三日所寄郡吏書不及作報也答吕伯恭便中屢拜狀當一一關徹矣比日清秋伏惟尊候萬福但久不聞動靜懸想不可言向來所苦今當洗然矣碩更加意飲食起居之節以夀斯文區區之禱非獨朋友之私情也熹在此不樂求去不遂無以為計近因輒用劄子奏蠲租事為廷議所折巳申省自劾矣祠祿不敢冀只得罷逐而歸亦為幸甚也郡事得同官相助近却稍不費力但所治無非米鹽箠撻之事殊使人厭苦得早去真如脫兔也汝玉竟不免彈射此亦仁鳥增逝之秋矣前書拜懇記文千萬勿拒便付此人以來為幸千萬至檮因遣人弔叔度草草附此答吕伯恭久不聞動靜不勝懸仰比日秋涼竊計尊候益輕健矣熹昨懇求盛文以記五賢祠事想巳蒙念得早示及為幸恐熹去不及刻矣又嘗附隆興書凂子約借精義輔足橫渠説定本欲與隆興刻板亦乞為子約言早付其人或徑封與彼中黃教授可也千萬留念至懇至懇今日釋奠處見楊教授説有便亟作此不暇他及亦不暇作叔度昆仲書幸為致意孰亦不及書只乞喚來以此示之餘惟為道自重為禱答吕伯恭熹昨拜書以五君子祠堂記文為請屢辱教字都未蒙喻及可否之意竊觀書札語意似巳不妨出此數語以慰一方學者之望況發明前賢出處之意又髙明平昔所以自任之重乎非專出於鄙意也濂溪祠記荆州巳寄來矣已屬子澄書而刻之旦夕刻成即寄但所請竊望便為留意及熹未去得之幸甚石謹具矣顒俟顒俟至懇至懇熹上覆孰子時乞呼來戒教之為幸熹又拜懇答吕伯恭久不聞問正此馳情忽奉手告竊審尊候日益輕安喜不可言子澄適亦在此相與慶抃也尊嫂所苦亦喜向平浙中醫藥計不難致也熹前日所請只乞減星子一縣偏重稅錢及減和買三二百匹耳此未足以慰益上下之望前日度力量恐不能有以加且爾粗塞責耳請祠巳并上甚恨聞教之晚然衰病踈拙實非所堪勢不得不為此也李嶧之事顔漕巳燭其妄昨亦宛轉附之但恐此人前路復有譸張不得不移書朝列一二故舊使之聞之非有咎顔漕意也通書𥘉實甚懶近因申請減稅巳例與之矣凡此隨俗漸乖宿心勢豈容久住只有力懇而去他皆不暇計也子約不及别狀意不殊此餘惟為道千萬自愛不宣答吕伯恭僣易拜問尊嫂宜人向來聞不安今想亦平復矣子約老友未及别書前便奉問逹否比讀何書所進想日超詣因來及之滌此塵坌幸甚熹此來不得讀書胸次覺苑塞至於平日疾惡之心施之政事亦不免有刻急之譏無復寬𥙿和平之氣甚可懼也不知所聞如何幸有以警之熹再拜上問熹汨沒吏事心力益衰前書記得有數事致懇今皆忘之幸檢看一一還報也答吕伯恭昨聞尊嫂宜人奄忽喪逝深為驚愕即欲遣人致慰問而未暇及便中乃辱手書訃告益愧不敏竊惟伉儷義重痛悼難堪然尊體未盡平復深宜節抑以尉友朋之望也熹黽俯於此恰巳半年永去不得深以為撓自秋中得報即欲再請而諸公皆以為雖大臣故老典藩亦必期年而後敢請意若以犯分僣越為咎者是以遲遲又以秋來若不甚大病作書懇請雖極諄諄覺得亦有難説處不免少忍踰冬以應期年之説庶幾得之今亦託人先達此意逼歲通賀正書時便并遣也前此或恐有不相樂者或相中害此亦無如之何任其彈射不能如此切切顧慮也郡事比亦甚簡靜秋間以兩縣破壞不免暫易其人即日詞訟便減什七八今或至當日而無訟者亦緣略鉏去一二亂政生訟者之故戒令勸率民間亦肯相信如中間舉行别籍異財之令父子復合者數家此緣子澄力勸下令𥘉恐其未必從令不謂其能爾也但財計全仰啇稅盈虛之數繫於風水非人力所及近以風故虧欠甚多亦殊可慮耳文字亦稍得功夫整頓隨分有應接但終不似在家專一耳亦為黃生歸去無人相助頗覺闕事也子約書致盛意欲得語解定本此亦有欲修改處今且納二册餘却續寄也但聞又欲修定向來所集告且斟酌不可太用精力也熹解中有未安處望口授子約一一録示千萬千萬或呼孰子來令受其説子細寫來亦幸此子在彼如何進見之際幸痛加教戒使知有所畏忌為幸叔度比日為况如何前巳遣人弔之尚未還也昨得其書自言於佛學有得未諭是否計亦當有以處此顧乃不堪何耶子壽得書云欲往見今巳到未耶向見所集詩解出車篇説戒嚴之日建而不施不知此有何證幸見教若果有證説文義殊省力也其間亦有數處可疑今不盡記大抵插入外來義理太多又要文勢連屬不免有強説處不知近日看得如何亦望垂喻也此有周彥誠之書甚富比借得一二而不睱細讀大抵多出臆見然恐其間有可取處也世有麻衣心易者亦出此間人所造嘗見之否九日嘗登紫霄峯頂昨日又到陶翁醉石處過簡寂開先而歸山水之勝信非他處所及尚恨拘繫不得恣逰又恨不得賢者之同也今遣此人附狀奉問并有賵禮具别狀幸視至餘惟以時自重因風時枉教督只口授諸生令子細寫來為幸答吕伯恭方子下一本空一字子夀相見其説如何子靜近得書其徒曹立之者來訪氣質儘隹亦似知其師説之誤持得子靜近答渠書與劉淳叟書却説人須是讀書講論然則自覺其前説之誤矣但不肯翻然説破今是昨非之意依舊遮前掩後巧為詞説只此氣象却似不佳耳立之寫得伊川先生少年與人書三四幅來規模氣象合下便如此大了決非人所能偽作巳託渠摹勒來此刻石矣云藏趙德莊壻方子家也今且録一本去見刻康節手筆數𥿄旦夕可先寄也尤延之巳寄五賢祠記來矣旦夕刻就寄去今日見劉生䇿卷後語令人心膽墮地奈何奈何熹再拜伯恭兄答吕伯恭昨專人拜狀奉慰當巳逹矣叔度人來領近書甚慰比日冬溫伏惟履茲陽復起居益輕安矣擊強之戒固知如此鄙性疾惡終不能無過當處毛掾之於建昌亦正坐此而有甚焉者雖巳遣官慰喻寬租期檢旱傷然終不能無愧於已病之民比復申省自劾矣去留未知竟如何然意緒益懶無復好况詩説前巳納上不知尊意以為如何聞所著巳有定本恨未得見亦可示及否鄙説之未當者并求訂正只呼孰子來靣授其説令録以呈白而後遣來可也桐鄉志文質實寬平無所為作文字利病不足言正足以見飬德之效甚幸甚幸顧深自病其年愈衰而氣愈厲未知可以進此否也近作兩記納呈可發一笑耳𥘉請諸賢祠記蒙見喻不欲勞心不敢固請今見此志乃恨其請之不力然叔度却報云有意為記卧龍山居此固甚幸然今事又有大於此者敢以為請别𥿄所具白鹿洞事迹是也幸賜之一言非獨以記其事且使此邦之學者與有聞焉以為入德之門則此惠深矣厚矣千萬勿辭仍碩亟以見寄恐劾章忽下不得竟其事也郭功父舊記納呈向怪前輩多靳侮之果不虛得也荆州近寄一詩來讀之令人感慨今亦録去渠以信陽事甚不自安叔度子約書云都下諸人頗不直果如何然世間人口無真是非未知果孰為是也叔度人回草此不能究所欲言千萬為吾道自重不宣十一月七日熹頓首再拜上啓伯恭沖祐直閣大著契兄侍史復有專人隨叔度人去令候得白鹿卧龍記文而歸幸一揮付之千萬建陽人來聞欲刋新文海此本巳傳出耶甚恨未見向機仲許寄其目亦未得也靖康間有處士陳安節召對授通直郎崇政殿説書者今史録中有其事否幸子細批喻其子弟見屬敘述以不知其本末不敢作也千萬留念熹又拜答吕伯恭人還領所報書得聞尊體日益輕安而來書字畫又足為驗幸不可言記文之賜尤荷垂念思致筆力蓋不減未病時也此又慰幸之甚者既以為賀又以為謝也但鄙意有少未安處别𥿄上呈幸更為詳酌示報此巳礱石只俟定本即託人寫刻也並山而東地勢略是如此但此處巳是山麓自郡城望之北多而東少不知别當如何下語或云東北入廬山下不知可否又率損其舊十三四今亦不見得舊來規模廣狹但據地基則亦略是如此恐此語説得亦太牢固不若為疑詞以記之如云度損其舊七八如何又此役乃星子令王仲傑董之亦欲特附名其間以傳久逺并望因筆及之也其人老成忠厚民甚愛之此不必言但欲知之耳洞主命官事記亦見之決非僻書但此無書可檢耳此類傳疑正不必深説也誨諭數條極荷愛念但前日未得回報間巳再申矣又因地震之變心自不安不免具奏乞降付三省密院此亦靣生或恐觸忤憎嫌因得遂請也未去以前郡事一日不敢廢但終是心意自懶覺得難勉強耳更看回報如何不得請即當如所教也治財太急用刑過嚴二事亦實有之蓋州郡用度猶可支吾最是上供綱運拖下兩年不起令人坐卧不安不得不緊急然比之他人已寬了稍可寬處無不放過若更寬著即倒却人州縣矣傳者之言似為建昌而發便是向來自劾事𥘉以此縣不辨令戶掾往代之此公性鋭質薄作事不無過當𥘉蓋亦慮之但以無人不免再三丁寧而遣之到彼果然過甚大失民和亟遣簽判親往慰喻然後粗定此則選擇不精戒喻不詳之罪今巳令且還矣但此縣便覺無分付處撓不可言來喻所謂未斟酌者可謂切中其病少俟訟竟事經憲司當以尊意開喻之也士人犯法者教唆把持其罪不一但後來坐法結斷贓罪為重耳然亦但送學夏楚編管江州其人經赦便計會彼州官吏違法放還今日到家明日便陪涉宗室教唆詞訟為人所訴復追來欲撻之而同官多不欲者只決却小杖數下再送他州亦不為過也弊政固多踈脫至此一事往來之人雖有苦口見規者問於道途無不以此事為當也判語之失誠如所喻前亦覺之但巳施行無及於改耳其所爭者乃是一人與妻有私而共殺其夫暑中繫獄病死而此宗室者乃認為巳僕而脅持官吏禁近十人在獄踰年不決勢不得已須與放却但一時不勝其忿故詞語不平至此耳詩説昨巳附小雅後二册去矣小序之説未容以一言定更俟來誨却得反復區區之意巳是不敢十分放手了前諭未極更須有説話也恐尊意見得不如此處却望子細一一垂喻更容考究為如何逐旋批示尤幸并得之却難看也近看吳才老説㣧征康誥梓材等篇辨證極好但巳看破小序之失而不敢勇決復為序文所牽亦殊覺費力耳所欲言者甚多亟遣此人未暇詳布正逺千萬為道自愛孰子更望時賜誨飾令不至怠惰放逸為幸千萬至懇欲趂此有人令其挈婦還家叔度書來又似留其就學二者之計未知所處不審尊意以為如何此人回幸報及韓丈何為忽有此命此未見報不知果為何事今想已行矣不知却歸何處後便當致書也正月四日上狀不宣熹頓首再拜上狀伯恭沖祐直閣大著契兄坐下卧龍菴記聞巳蒙落筆願并受賜也欽夫寄一詩來當并刻之耳信陽事誠如來誨然此言非獨欽夫當佩服也在於戇拙所警多矣叔昌書中有數語可發一笑子約書中所論却望喻其當否也熹又覆今日得蘄州寄來王信伯集并語録讀之駭人此洞記所為作也然以一噎而廢食又似過當故愚意欲明者更加意也恐後人觀之復如今之視昔也與東萊論白鹿書院記當是時士皆上質實實則入於申啇釋老而不自知祖宗盛時風俗之美固如所論然當時士之所以為學者不過章句文義之間亦有淺陋駁雜之弊故當時先覺之士往往病其未足以明先王之大道而議所以新之者至於程張諸先生論其所以教養作成之具則見於明道學制之書詳矣非獨王氏指以為俗學而欲改之也王氏變更之議榮公𥘉亦與聞王氏之學正以其學不足以知道而以老釋之所謂道者為道是以改之而其弊反甚於前日耳今病於末俗之好竒而力主文義章句之學意巳稍偏懲於熙豐崇宣之禍而以當時舊俗為極盛至當而不可易又似大過且所以論王氏者亦恐未為切中其病也明道程先生止卑忠信而小之也世固有忠信而不知道者如孔子所稱忠信而不好學者伊川所譏篤學力行而不知道者是也然則王氏此言亦未為失但不自知其不知道而反以知道者為不知道此則為大惑耳其以忠信目明道以為卑明道而小之則可以為卑忠信而小之則不可蓋以忠信對知道固當自有髙卑小大之辨也關洛緒言止盍思所以反之哉程氏之言學之本末始終無所不具非專為成德者言也今此語意似亦少偏兼於上文無所繫屬政使止於章句文義之間止三代之始終也三代之教自離經辨志以後節次有進步處是以始乎為士而終乎為聖人也今但如此言之則終於此而巳恐非三代教學之本意也自有此山以來止亦君子之意也所謂與日月參光者不知何所指更望批喻其曰區區濬之者又恐卑之巳甚有傷上文渾厚之氣如馬伏波之論杜季良也兼此役本為發明先朝勸學之意𥘉不專為濬之今但得多説此邉意思出來而略帶續其風聲之意則事理自明不必如此罵破也鄙意欲如第一假所論引明道劄子後即云不幸其説不試而王氏得政知俗學不知道之弊而不知其學未足以知道於是以老釋之似亂周孔之實雖新學制頒經義黜詩賦而學者之弊反有甚於前日建炎中興程氏之言復出學者又不考其始終本末之序而爭為妄意躐等之説以相髙是以學者雖多而風俗之美終亦不逮於嘉祐治平之前而况欲其有以發明於先王之道乎今書院之立蓋所以究宣祖宗興化勸學之遺澤其意亦深逺矣學於是者誠能考於當時之學以立其基而用力於程張之所議者以會其極則齊變而魯魯變而道矣此語草略不文而其大體規模似稍平正久逺無弊欲乞頗采此意文以偉辭不審尊意以為可否若只如此示却恐不免有抑揚之過將來别生弊病且將盡變秀才而為學究矣蓋此刻之金石傳之無窮不比一時之間為一兩人東説西話隨宜説法應病與藥也答吕伯恭人至辱手書得聞春來尊體益輕健放杖徐行又有問花隨栁之樂甚慰記文定本辭約義正三復歎仰巳送山間屬黃子厚隸書到即入石矣欽夫竟不起疾極可痛傷蓋緣𥘉得疾時誤服轉下之藥遂致虛損一向不可扶持從𥘉得疾又緣奏請數事例遭譴却而同寮無助之者種種不快而然雖云天數亦人事有以致之此尤可痛耳熹前月初遣人請祠至今未還仐又專人再懇勢必可得只俟命下便自此便道一過長沙哭之也詩傳巳領小雅何為未見此但記得曽遣去即不記所附何人或巳到幸早批喻也綱目此中正自難得人寫亦苦無專一子細工夫所修未必是當請更須後也雷頻失威之喻敬聞命矣諸喻皆一一切當謹當佩服但小序之説更有啇量此人亟欲遣請祠者不欲稽留之别得奉扣耳孰蒙收拾教誨感幸不可言望更賜程督文字之外因語及檢束身心大要幸甚幸甚子夀學生又有興國萬人傑字正純者亦佳見來此相聚云子靜却教人讀書講學亦得江西朋友書亦云然此亦皆濟事也匆匆作此未及詳唯為道珍重答吕伯恭久不拜書適潘復州來略聞動靜粗足為慰比日春晚清和伏惟尊候萬福熹祠請竟未聞命昨再遣人亦無消息不知何故如此此心巳去住此殊無好况百事皆懶雖強為一日必葺之計終是無十分功夫吏民知其不久亦不馴服倍費心力駕馭細思何苦造此惡業以此思歸益切不知所以為計也荆州之訃前書想巳奉聞兩月來每一念及之輒為之泫然朋舊書來無不相弔吾道之衰乃至於此為將奈向得江西書傳聞其柩巳徑歸魏公墳所祔葬矣昨遣人致奠亦未歸未知端的也江州皇甫帥之子歲前至彼見其未病時奏請多不遂且多為人所賣中語亦不與之團教義勇亦不與支例物錢放散之日人得五百金而去以此上下之情不甚和輯馴致疾病端亦由此益令人痛憤又以知今日仕宦之不可為也但其身後所上遺奏乃為人摹刻石本流傳四出極為非便或云是定叟意其不解事不應至此殊不可曉也遺奏想巳見之更不録去想聞此曲折亦深為慨然耳洞記專人託子厚隸書未到甚以為撓然雖去此同官必能為成其事也十八日巳入院開講以落其成矣講義只是中庸首章或問中語更不録呈也向來所喻詩序之説不知後來尊意看得如何雅鄭二字雅恐便是大小雅鄭恐便是鄭風不應槩以風為雅又於鄭風之外别求鄭聲也聖人刪録取其善者以為法存其惡者以為戒無非教者豈必滅其籍哉看此意思甚覺通逹無所滯礙氣象亦自公平正大無許多回互費力處不審髙明竟以為如何也得韓丈上饒書及尤延之書皆令勸老兄且屏人事捐書册專精神近醫藥區區之意亦深念此幸更於此少留意焉千萬之望學者之來略隨分量接之不可更似前日命題改課為此無益而有損也孰子在彼不能無望於此然不敢以私計妨此至情尤當蒙見亮耳因楊教授遣人草此為問子約老友不及别書前日書尾之戒甚有警發近日更不敢申請巳忍却一兩事但惜乎聞命之晚耳答吕伯恭元範人回承手字獲聞比日尊體益輕健為慰之劇又承誨諭數條尤荷愛念信後雨餘蒸鬱伏惟玩心有相起處享福熹自𬒳報聞之命不敢復有請但前日妄發本蘄密贊聖聰昨日乃聞降付後省不密失身從是始矣然業巳致身事主生死禍福惟其所制非巳所得專也此間只有三五簷行李及兒甥一兩人去住亦不費力但屏息以俟雷霆之威耳前日如自明諸人文字及近習者皆不降出此乃付外又不可曉區區愚忠猶不能無冀幸於萬一耳欽夫之逝忽忽半載每一念之未嘗不酸噎同志書來亦無不相弔者益使人慨歎蓋不惟吾道之衰於當世亦大有利害也自向來人還至今不得定叟書今日方再遣人往致􅌾奠臨風哽愴殆不自勝計海內獨尊兄為同此懷也援筆至此為之淚落痛哉痛哉祭文真實中有他人所形容不到處歎服今此人去亦有一篇謹録呈蓋欽夫向來嘗有書來云見熹説經説乃知間中得就此業殆天意也因此略述向來講學與所以相期之意而嘆吾道之孤且窮於欽夫則不能有所發明也盛文所敘從善受言使言者得自盡施於𥚹狹所警尤多平日亦知敬服渠此一節而不能學今老矣而舊病依然未知所以藥之也不唯如此近日覺得凡百應接每事須有些過當處不知如何整頓得此身心四亭八當無許多凹凸也耐煩忍垢之誨敬聞矣今大綱固未嘗敢放倒但不免時有偷心以為何為自苦如此故事有經心而旋即遺忘者亦有不敢甚勞心力而委之於人者亦有上説不從下教不入而意思闌珊因循廢弛者此兩月來既得不允指揮不敢作此念又為狂妄之舉凖備竄謫尤不敢為久計身寄郡舍而意只似燕之巢於幕上也言事本只欲依元降指揮條具民間利病亦坐意思過當遂殺不住不免索性説了從頭徹尾只是此一箇病根也獄訟極不敢草草然見人説亦多過處乃與孰子所論諸葛政刑相似然欲一切姑息保飬姦凶以擾良善而沽流俗一時之譽則平生素心深竊耻之亦未知其果如何而得其中也所論荆州從逰之士多不得力此固當深警然彼猶是他人不得力今自循省乃是自巳不曽得力此尤為可懼也不知老兄看得此病合作如何醫治幸以一言就緊切處見教千萬之望子夀兄弟得書子靜約秋涼來逰廬阜但恐此時巳換却主人耳渠兄弟今日豈易得但子靜似猶有些舊來意思聞其門人説子夀言其雖巳轉步而未曽移身然其勢久之亦必自轉回思鵝湖講論時是甚氣勢今何止什去七八耶元範立碑之説向曽見告嘗語之云熹固不足道但恐人笑老兄耳意其巳罷此議不謂乃復為之聞之令人汗下幸巳蒙喻止必且罷休矣平生性直不解微詞廣譬道人於善故見人有小失每忍而不欲言至於不得巳而有言則衝口而出必至於傷事而後巳此亦太陽之餘證也孰書説近建家廟立宗法此正所欲討論者便中得以見行條目子細見教為幸白鹿書院承為記述非惟使事之本末後有考焉而所以發明學問始終深淺之序尤為至切此邦之士蒙益既多而傳之四方私淑之幸又不少矣謹以十一本投納書几內一本􅑽褾與濂溪祠堂記為對又有雜刻數種并往伊川先生與尹和靖者可背作一卷此人亟行不暇也然伊川先生才説病便有藥和靖却似合下便作死馬醫此道之傳真未易以屬人也觀書實非飬病所冝若不能巳當有以程之日讀若干以下也因人往永嘉督新簽赴任附此其人姓薛名洪不是士龍之宗族否中間旱甚田幾不可耕今幸數得雨然鬱蒸未解亭午揮汗未能盡所欲言惟千萬為道自重不宣六月六日熹頓首再拜上啓伯恭武夷直閣大著契兄坐下令子想日佳茂周子充遂參大政不知嘗有以告之否至此若復喑默則更無可説不知其計安出也熹又拜此專遣人至叔度處令便歸告早批數字或口授子約見報蓋至彼問兒婦消息望其速還也答吕伯恭承局回承書得聞比日尊候萬福細觀筆札又比前日不同深以為慰熹前𬒳不允指揮今巳三月方始再上祠請適此旱災祈禱未能感格今早禾巳不可救若更數日不雨即晚禾亦不可保觀此事勢必致大假狼狽遂不敢言去只得竭盡駑力若自以曠敗抵罪則無可奈何耳竊觀事勢萬一不稔即軍食所須是第一義而後可及賑恤巳多方擘畫未知其濟否如何切幸因風有以見教於其思慮之所不及者幸甚幸甚囊封付出乃邸吏云爾方竊怪之當時誠亦輕發然今已不可悔矣積其誠意待時而發固所當然但恐如諺所謂今年自家雪裏凍殺不知明年甚人喫大碗不托耳言之痛心苦事苦事謹密之戒乃今聞之𥘉但不敢以草本示人及與人説其中所論不謂乃并此題目不得漏泄也數年前風俗尚不如此自今當深戒之耳既云有調護者即是嘗有譴怒之意亦幸密見告也近緣旱虐百事放寬又覺得雨露太勝雪霜然亦且得如此前日誠有過當處也二陸後來未再得信救荒方急未暇遣人問之子靜欲來遊山聞此中火色如此又未知能來否耳立廟等事甚善他時修定當得求教也康節刻成甚久何故不曽寄去耶今往五本他刻恐欲分人亦各并致一二也孰不知果能漸解事否人家後生只得自有意做好人便有可望此郎正坐無此根本使人憂心耳今令歸鄉應舉臨行更望丁寧之也試罷略令此來有可見教書不能盡者幸以語之但恐亦不是寄附處耳知看書不多甚善詩不知竟作如何看近來看得前日之説猶是泥裏洗土塊畢竟心下未安穩清脫便中求所定者節目處一二篇一觀恐或有所警發也尤延之見祭敬夫文以為意到而詞語不若平日之溫潤鄙意亦頗疑其如此渠令深勸且省思慮意甚拳拳也新參近通問否大承氣證却下四君子湯如何得相當然尚幸其不發病耳老兄與之分厚須痛針之吾輩與百萬生靈性命盡在此漏船上若喚得副手稍工不至沉醉緩急猶可恃也再去長沙人未回前日因便又作書與定叟略致盛意矣與説今日請祠便是奉行敬夫遺戒第一義時時勿忘此心而充擴之則甚善老兄因書更自勸勉之為佳耳承教未期臨風引領千萬為道自重答吕伯恭久不辱問向仰良深比日秋雨稍涼伏惟尊候萬福熹夏秋以來以旱暵祈禳奔走日日暴露不得少休既無所效又不得不為救荒之備郡小財匱無擘畫處日夕究心遂發心疾上炎下潦勢甚可畏巳急遣人呼二兒及約子澄恐有不測無人主宰既而飲藥僅得少定又苦腳跟痛不能履地此兩日方能移步然亦終未脫然郡中賑助檢放等事却巳稍有緒但軍糧無所指擬不免具奏祈哀并以衰病之實丐永罷免未知復如何但欲退縮省事以俟終更而事勢驅迫有不自由者今且信緣未知果安所稅駕也夏秋以來今日方得竟日之雨民間遂可種麥蒔𬞞庶幾有以係其心志而不至於流移此後公私多方接濟到得春來則麥可食而無所事矣但其間日月尚多又未知果能如人所料否耳其間隨事措置曲折甚多未暇一一求教所幸民間却稍相信鄉村士人有事便可來説上下之情稍通官吏不敢十分相罔凡事省力但一味無錢沒撰處耳今日見省符并致文字有相及者此固不足為重輕亦殊可笑也比來計益輕健詩説可見示一二大節目處否不似書説又𬒳人傳印也别有論著可見教者勿吝幸甚子約不及别書兒輩計今日方終場度後月十間可到此也所欲言者甚衆急遣此人不暇正逺惟千萬保重不宣八月十九日熹頓首再拜上啓長沙人至今未還亦不得明信令人懸心耳子夀兄弟久不得書子靜欲來想以旱故未必能動旦夕或遣人候之也自明之亡極可痛惜天亦為此曹復讎也耶不可曉答吕伯恭昨專人去拜狀想逹比日秋冷伏惟尊候萬福熹強勉於此精力日衰大抵罔罔如夢寐間度日耳救荒不得不經心然亦失前忘後不成倫理告歸巳三請未知可得否方以為憂近再得大農曽丈報云必可得幸甚不知今巳命下未也大兒來自里中懶慢如故令誦程文僅能記三兩句耳數日鄉間寂然必是又遭黜矣且令往挈婦孫歸家但恐自此逺去師席愈益怠惰奈何此中事渠亦略能言之偶作書多心忡目澀不能詳布昨日答胡伯逢書戲語之云元來禹稷如此不好做今日作此又思尊兄之病未必不為福也子約老友承書多感病倦不及别狀正逺千萬加意攝理以慰逺懷幸甚幸甚答吕伯恭久不奉問向來微恙計巳平復矣著庭議幕之命相繼而下殊不可曉不知果強起承上意否熹衰病日益昏耗恐不堪郡事目下民間雖未告飢然盜賊頗巳有端日夕憂窘不知所以為計惟望祠請之果遂耳昨曽丈報甚的既而復不然造物之意果難測也陸子夀復為古人可痛可傷不知今年是何氣數而吾黨不利如此也趙景昭官滿過此甚欵意思甚好今日如此等人亦難得也孰到復何如近得叔度書似未許其歸此畨破戒差人借請糜費公私不少若不成行不惟枉費向後恐亦無人可使轉見費力幸為一言及此令其早歸為望元範歸偶連日冗甚夜作此書未暇他及惟千萬為道自重答吕伯恭答一本作與熹近因孰行已拜狀今日求得西山地黃五斤恰毛掾有便謹以附內向見孰説藥褁所須也冗甚目昏不容他及十月九日熹再拜子約不及别書曽丈聞巳過京口欲遣人致問尚未暇也但所報祠請殊不效耳答吕伯恭答一本作與再祭敬夫之文語意輕脫尋亦覺之則已不及改矣誨諭之意微婉深切銘佩何敢忘也弘大平粹四字謹書坐隅以為終身之念稟賦之偏前日實是不曽用力消磨豈敢便論分數然自今不敢不勉更望時有以提撕警䇿之也專此布謝言不盡意熹再拜熹既不得去景望之事可以為法值此災傷恐有合理會事不得不通政府書然非甚不得巳亦不敢發也此間幸亦無大齟齬諸司頗亦相悉泉司近為奏請減得三縣人戶木炭錢二千緡殊非始望所及却是漕司不識好惡雖當豫者或反奪之前日作書已大罵之復思老兄之言且忍須臾只細與條析事理庶幾其或悟耳答吕伯恭答一本作與久不拜狀日以馳情比聞巳遂祠官之請良以為慰即日霜寒伏惟尊候萬福熹黽俯於此再見歲晚祠請未報然去替只百餘日今亦不復請矣幸再乞旱餘苗米巳盡得之所遣人猶未還而已𬒳堂帖之命計此周參之力為多也得此不唯軍士得食官吏免責民間亦免將來縣道預借之擾上恩此為厚也賑濟當自元旦舉行民間歲前有闕食處稍已賑濟之但聞頗苦乏錢此則無如之何然見修江隄役工買木亦足以散錢於民間但不多耳子夀云亡深可痛惜近遣人酹之吾道不振此天也奈何奈何欽夫遺文見令抄寫其間極有卓絶不可及處然亦有舊説不必傳者今便不令抄矣每一開卷令人慘然只俟解印徑往哭之小泄此哀也遣人迓子重草草附此此亦是小三昧矣未即承晤惟千萬為道自重不宣答吕伯恭答一本作與熹幸粗安已遣人迓子重至即合符而行矣賑恤之備粗有支吾奏請數事悉蒙朝廷應副衰拙之幸大抵今歲江東諸郡放旱分數稍寬緣此民間未至流徙此間諸縣鄉村四十里置一場糶官米及勸喻到冨民米穀元日𥘉糶殊未有來糴者以賞格募得三家米近二萬石賑濟當得官者四人而飢民受惠不少矣然今未敢散須俟深春也昨楊教授人還領至日批示具曉至意不復有他請矣子夀之亡極可痛惜誠如所喻近得子靜書云巳求銘於門下屬熹書之此不敢辭但渠作得行狀殊不滿人意恐須别為抒思始足有發明也毛仲益自江西來逼歲方領前此所惠書已久猶足慰意又得細詢昨來動靜如著書日有課程甚恨未得一窺草藁然朋友之論多以為病中未可勞心深不欲老兄之就此編也大事記想尤竒尤有益然尤費力此更望斟酌也二書告令人録一二卷多發明處見寄甚幸只送潘卿處令付郡吏以來汝昭過此小欵渠當時自合請祠此行極費力於義亦覺未安不審尊意以為如何因竒卿人還附此雪寒手凍未能詳悉惟益自愛以慰惓惓之望答吕伯恭答一本作與熹在此支撑甚費力子重不來巳遣人通吳守書速其來矣境內目今幸未至流殍未知將來復如何但碩早夫庶免踈脫耳即今覺闕雨若更數日如此即可慮也少懇向來劉樞之亡以其兒女為託今其女年漸長未有許婚之所來議者多往往未滿人意不敢輕諾與平父議恐今年新進士中有佳士老兄所素知者得為物色一人報劉氏與之定議平父欲自拜書專人致懇幸與留念推擇使其家得佳壻而熹不孤逝者之託千萬幸甚幸甚此書恐未遽逹不復他及正逺惟以時加衛幸甚幸甚子約不及書叔度亦然并煩為道意孰子望時賜檢責不至怠惰為望答吕伯恭便中伏奉近書筆迹輕利視前有異深以為喜比日春和伏想日益佳健熹疾病幸不至劇飢民亦幸未至流徙軍食想可支吾比連得雨雪麥秀土膏人情似有樂生之望矣子重不來可恨吳守度閠月𥘉可到到即合符而南矣去年之旱非常幸賴朝廷留意得早諸處奏請悉皆應副故得不至大假狼狽此於國計所損幾何而其利甚慱此間即是周參政調護之力為多也欽夫遺文俟抄出寄去子靜到此數日所作子夀埋銘巳見之敘述發明此極有功卒章微婉尤見用意深處歎服歎服子靜近日講論比舊亦不同但終有未盡合處幸其却好啇量亦彼此有益也詩説大事記便中切幸垂示子約不及别書意不殊前正逺切冀為道自重答吕伯恭自頃謀歸即無暇奉問而辱書至三四感慰不可言近書報及飲食衣服巳不須人尤以為喜吾道之衰日以益甚天意亦不應如此之恝然也比日庚暑伏惟尊候益輕健熹一出兩年無輔公私而精神困弊學業荒廢既往之悔有不可言者自去年秋冬災傷之後不能求去以及今春遂有江西之命又俟代者至閠月二十七日方得合符而歸𥘉欲乘此一走長沙自彼取道分寧往還甚徑尋以女弟之訃悲傷殊甚誼不可以他適遂罷前議替後只走山南山北旬日拜謁濂溪書堂而歸以四月十九日至家雖幸悉肩又苦人事紛冗老幼病患未能有好况然大槩巳是入清涼境界中矣道中看中庸覺得舊説有費力處略加修訂稍覺勝前計他書亦須如此義理無窮知識有限求之言語之間尚乃不能無差况體之身見諸事業哉稍定從頭整頓一過會須更略長進也子靜舊日規模終在其論為學之病多説如此即只是意見如此即只是議論如此即只是定本熹因與説既是思索即不容無意見既是講學即不容無議論統論為學規模亦豈容無定本但隨人材質病痛而救藥之即不可有定本耳渠却云正為多是邪意見間議論故為學者之病熹云如此即是自家呵叱亦過分了須著邪字間字方始分明不教人作禪會耳又教人恐須先立定本却就上靣整頓方始説得無定本底道理今如此一概揮斥其不為禪學者幾希矣渠雖唯唯然終亦未竟窮也來喻十分是當之説豈所敢當功夫未到則乃是全不曽下功夫不但未到而巳也子靜之病恐未必是看人不看理自是渠合下有些禪底意思又是主張太過須説我不是禪而諸生錯會了故其流至此如所喻陳正巳亦其所訶以為溺於禪者熹未識之不知其果然否也大抵兩頭三緒東出西沒無提撮處從上聖賢無此樣轍方擬湖南欲歸途過之再與子細啇訂偶復蹉跌未知久逺竟如何也然其好處自不可掩覆可敬服也他時或約與俱詣見相與劇論尤佳俟寄書扣之或是來春始可動也敬夫遺文不曽謄得俟旦夕略為整次寫出却并寄元本求是正也詹體仁寄得新刻欽夫論語來比舊本甚不干事若天假之年又應不止於此令人益傷悼也劉家事極感垂念渠家為間人來問者多頗費應酬又招怨怒亦欲早聞定論也孰子蒙招撝令寫網目大字渠懶甚向令寫一二年大事記及他文字一兩篇竟不寫來不知竟能為辦此否耳意緒本自不佳見此等事益令人歎惋奈何奈何子澄相聚月餘意思儘好直至湖口渡頭方分手也聞浙中水潦疾疫死者甚衆聞之令人酸鼻諸公直是放得下可歎服也未即承教引領馳情切冀厚自愛重以幸斯人答吕伯恭答一本作與夏中潘家人還奉問無便不能嗣音良以向仰比日新秋巳半天氣漸涼伏惟尊體益勝健熹衰病如昨非但人事縈絆不得一意讀書為恨比一至郡中鄭守時巳久病應接甚費力又放不下覺其精力凋耗而郡事不理諸司數有譴問勸其力請引去渠甚以為然未及用而巳不起矣如此人材用之違其所長中道夭喪甚可傷也熹一出兩年仙洲久不到前日方得一往會大雨竟日瀑水甚壯既而復霽遂得窮搜澗壑水石可觀處非止一二悉巳疏剃而聚土纍石為臺以臨之自此往逰觀賞益富不但如前日矣但恨不能致杖屨之一來論著當益有次第每書各得數假見教為幸比看文鑑目録無書者固不論其可檢者尚有不能無疑處恨不得靣扣其説當有深意也數時絶無學者講學便覺頺惰無提撕警䇿之助旦夕亦欲作一課程未必有益於人庶幾自有益耳但孰子歸家讀書殊無頭緒未有以處之因來幸有以教督之并令如何度此光隂也歸自山中倦甚草草布此子約未暇别書亦不能異此惟千萬自愛為禱晦庵先生朱文公文集卷第三十四朱文公文集卷第三十四後考異答吕伯恭近得子約書末一有六月七日熹頓首再拜上狀伯恭參議直閣大著契兄閩縣儒學訓導何器校
