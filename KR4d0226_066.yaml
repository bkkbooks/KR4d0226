body:
  text: 雜著孝經刋誤古今文有不同者别見考異仲尼間居曾子侍坐子曰參先王有至德要道以順天下民用和睦上下無怨汝知之乎曽子避席曰參不敏何足以知之子曰夫孝德之本也教之所由生復坐吾語汝身體髮膚受之父母不敢毁傷孝之始也立身行道揚名於後世以顯父母孝之終也夫孝始於事親中於事君終於立身大雅云母念爾祖聿修厥德子曰愛親者不敢惡於人敬親者不敢慢於人愛敬盡於事親而德教加於百姓刑于四海蓋天子之孝甫刑云一人有慶兆民賴之在上不驕髙而不危制節謹度蒲而不溢髙而不危所以長守貴滿而不溢所以長守冨冨貴不離其身然後能保其社稷而和其民人蓋諸侯之孝詩云戰戰兢兢如臨深淵如履薄冰非先生之法服不敢服非先王之法言不敢道非先王之德行不敢行是故非法不言非道不行口無擇言身無擇行言滿天下無口過行滿天下無怨惡三者備矣然後能守其宗廟蓋卿大夫之孝也詩云夙夜匪懈以事一人資於事父以事母而愛同資於事父以事君而敬同故母取其愛而君取其敬兼之者父也故以孝事君則忠以敬事長則順忠順不失以事其上然後能保其爵祿而守其祭祀蓋士之孝也詩云夙興夜寐母忝爾所生子曰用天之道因地之利謹身節用以養父母此庶人之孝也故自天子巳下至于庶人孝無終始而患不及者未之有也此一節夫子曾子問答之言而曾氏門人之所記也疑所謂孝經者其夲文止如此其下則或者雜引傳記以釋經文乃孝經之傳也竊嘗考之傳文固多傅會而經文亦不免有離析增加之失顧自漢以來諸儒傳誦莫覺其非至或以為孔子之所自著則又可笑之尤者蓋經之首統論孝之終始中乃敷陳天子諸侯卿大夫士庶人之孝而其末結之曰故自天子以下至於庶人孝無終始而患不及者未之有也其首尾相應次第相承文勢連屬脈絡通貫同是一時之言無可疑者而後人妄分以為六七章今文作六章古文作七章又增子曰及引詩書之文以雜乎其間使其文意分斷間隔而讀者不復得見聖言全體大義為害不細故今定此六七章者合為一章而刪去子曰者二引書者一引詩者四凡六十一字以復經文之舊其傳文之失又别論之如左右曽子曰甚哉孝之大也子曰夫孝天之經地之義民之行天地之經而民是則之則天之明因地之義以順天下是以其教不肅而成其政不嚴而治先王見教之可以化民也是故先之以博愛而民莫遺其親陳之以德義而民興行先之以敬讓而民不爭導之以禮樂而民和睦示之以好惡而民知禁詩云赫赫師尹民具爾瞻此以下皆傳文而此一節蓋釋以順天下之意當為傳之三章而今失其次矣但自其章首以至因地之義皆是春秋左氏傳所載子太叔為趙簡子道子産之言唯易禮字為孝字而文勢反不若彼之通貫條目反不若彼之完備明此襲彼非彼取此無疑也子産曰夫禮天之經地之義民之行也天地之經而民實則之則天之明因地之性其下便陳天明地性之目與其所以則之因之之實然後簡子贊之曰甚哉禮之大也首尾通貫節目詳備與此不同其曰先王見教之可以化民又與上文不相屬故溫公改教為孝乃得粗通而下文所謂德義敬讓禮樂好惡者却不相應疑亦裂取他書之成文而強加裝綴以為孔子曾子之問答但未見其所出耳然其前假文雖非是而理猶可通存之無害至於後假則文既可疑而謂聖人見孝可以化民而後以身先之於理又巳悖矣况先之以慱愛亦非立愛惟親之序若之何而能使民不遺其親耶其所引詩亦不親切今定先王見教以下凡六十九字並刪去子曰昔者明王之以孝治天下也不敢遺小國之臣而况於公侯伯子男乎故得萬國之歡心以事其先王治國者不敢侮於鰥寡而况於士民乎故得百姓之歡心以事其先君治家者不敢失於臣妾而况於妻子乎故得人之􅌚心以事其親夫然故生則親安之祭則鬼享之是以天下和平災害不生禍亂不作故明王之以孝治天下如此詩云有覺德行四國順之此一節釋民用和睦上下無怨之意為傳之四章其言雖善而亦非經文之正意蓋經以孝而和此以和而孝也引詩亦無甚失且其下文語巳更端無所隔礙故今且得仍舊耳後不言合刪改者放此曽子曰敢問聖人之德其無以加於孝乎子曰天地之性人為貴人之行莫大於孝孝莫大於嚴父嚴父莫大於配天則周公其人也昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之內各以其職來助祭夫聖人之德又何以加於孝乎故親生之膝下以飬父母日嚴聖人因嚴以教敬因親以教愛聖人之教不肅而成其政不嚴而治其所因者本也此一節釋孝德之本之意傳之五章也但嚴父配天本因論武王周公之事而贊美其孝之詞非謂凡為孝者皆欲如此也又况孝之所以為大者本自有親切處而非此之謂乎若必如此而後為孝則是使為人臣子者皆有矜將之心而反陷於大不孝矣作傳者但見其論孝之大即以附此而不知其非所以為天下之通訓讀者詳之不以文害意焉可也其曰故親生之膝下以下意却親切但與上文不屬而與下章相近故今文連下二章為一章但下章之首語巳更端意亦重復不當通為一章此語當依古文且附上章或自别為一章可也子曰父子之道天性君臣之義父母生之續莫大焉君親臨之厚莫重焉子曰不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮以順則逆民無則焉不在於善皆在於凶德雖得之君子所不貴君子則不然言斯可道行斯可樂德義可尊作事可法容止可觀進退可度以臨其民是以其民畏而愛之則而象之故能成其德教而行政令詩云淑人君子其儀不􅑯此一節釋教之所由生之意傳之六章也古文析不愛其親以下别為一章而各冠以子曰今文則合之而又通上章為一章無此二子曰字而於不愛其親之上加故字今詳此章之首語實更端當以古文為正不愛其親語意正與上文相續當以今文為正至君臣之義之下則又當有脫簡焉今不能知其為何字也悖禮以上皆格言但以順則逆以下則又雜取左傳所載季文子北宮文子之言與此上文既不相應而彼此得失又如前章所論子産之語今刪去凡九十字季文子曰以訓則昏民無則焉不度於善而皆在於凶德是以去之北宫文子曰君子在位可畏施舍可愛進退有度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下子曰孝子之事親居則致其敬養則致其樂病則致其憂喪則致其哀祭則致其嚴五者備矣然後能事親事親者居上不驕為下不亂在醜不爭居上而驕則亡為下而亂則刑在醜而爭則兵此三者不除雖日用三牲之養猶為不孝也此一節釋始於事親及不敢毁傷之意乃傳之七章亦格言也子曰五刑之屬三千而罪莫大於不孝要君者無上非聖人者無法非孝者無親此大亂之道也此一節因上文不孝之云而繫於此乃傳之八章亦格言也子曰教民親愛莫善於孝教民禮順莫善於弟移風易俗莫善於樂安上治民莫善於禮禮者敬而巳矣故敬其父則子悅敬其兄則弟悅敬其君則臣悅敬一人而千萬人悅所敬者寡而悅者衆此之謂要道此一節釋要道之意當為傳之二章但經所謂要道當自巳而推之與此亦不同也子曰君子之教以孝也非家至而日見之也教以孝所以敬天下之為人父者教以悌所以敬天下之為人兄者教以臣所以敬天下之為人君者詩云愷悌君子民之父母非至德其孰能順民如此其太者乎此一節釋至德以順天下之意當為傳之首章然所論至德語意亦踈如上章之失云子曰昔者明王事父孝故事天明事母孝故事地察長幼順故上下治天地明察神明彰矣故雖天子必有尊也言有父也必有先也言有兄也宗廟至敬不忘親也修身慎行恐辱先也宗廟致敬鬼神著矣孝悌之至通於神明光于四海無所不通詩云自西自東自南自北無思不服此一節釋天子之孝有格言焉當為傳之十章或云冝為十二章子曰君子之事親孝故忠可移於君事兄悌故順可移於長居家理故治可移於官是故行成於內而名立於後世矣此一節釋立身揚名及士之孝傳之十一章也或云冝為九章子曰閨門之內具禮矣乎嚴父嚴兄妻子臣妾猶百姓徒役也此一節因上章三可移而言傳之十二章也嚴父孝也嚴兄弟也妻子臣妾官也或云宜為十章曽子曰若夫慈愛恭敬安親揚名參聞命矣敢問從父之令可謂孝乎子曰是何言與是何言與昔者天子有爭臣七人雖無道不失其天下諸侯有爭臣五人雖無道不失其國大夫有爭臣三人雖無道不失其家士有爭友則身不離於令名父有爭子則身不陷於不義故當不義則子不可以弗爭於父臣不可以弗爭於君故當不義則爭之從父之令又焉得為孝乎此不解經而别發一義冝為傳之十三章子曰君子事上進思盡忠退思輔過將順其美匡救其惡故上下能相親詩曰心乎愛矣遐不謂矣中心藏之何日忘之此一節釋忠於事君之意當為傳之九章或云宜為十一章因上章爭臣而誤屬於此耳進思盡忠退思輔過亦左傳所載士貞子語然於文理無害引詩亦足以發明移孝事君之意今並存之子曰孝子之喪親哭不偯禮無容言不文服美不安聞樂不樂食旨不甘此哀戚之情三日而食教民無以死傷生毀不滅性此聖人之政喪不過三年示民有終為之棺槨衣衾而舉之陳其簠簋而哀戚之檘踊哭泣哀以送之卜其宅兆而安措之為之宗廟以鬼享之春秋祭祀以時思之生事愛敬死事哀戚生民之本盡矣死生之義備矣孝子之事親終矣傳之十四章亦不解經而别發一義其語尤精約也熹舊見衡山胡侍郎論語説疑孝經引詩非經本文𥘉甚駭焉徐而察之始悟胡公之言為信而孝經之可疑者不但此也因以書質之沙隨程可久文程答書曰頃見玉山汪端明亦以為此書多出後人傅會於是乃知前輩讀書精審其論固巳及此又竊自幸有所因述而得免於鑿空妄言之罪也因欲掇取他書之言可發此經之旨者别為外傳如冬溫夏清昏定晨省之類即附始於事親之傳顧未敢耳淳熙丙午八月十二日記孔叢子亦偽書而多用左氏語者但孝經相傳巳久蓋出於漢𥘉左氏未盛行之時不知何世何人為之也孔叢子敘事至東漢然其詞氣甚卑近亦非東漢人作所載孔臧兄弟往還書疏正類西京雜記中偽造漢人文章西京雜記之繆匡衡傳注中顔氏巳辨之可考皆甚可笑所言不肯為三公等事以前書考之亦無其實而通監皆誤信之其他此類不一欲作一書論之而未暇也姑記於此云讀管氏弟子職先生施教弟子是則溫恭自虛所受是極必虛其心然後能有所容極謂盡其本原也見善從之聞義則服溫柔孝弟母驕恃力服吐蒲北反驕而恃力則羝羊觸藩志母虛邪行必正直遊居有常必就有德行下孟反虛謂虛偽顔色整齊中心必式夙興夜寐衣帶必飾式法也朝益暮習小心翼翼一此不懈是謂學則右學則少者之事夜寐蚤作既拚盥漱執事有恪拚弗運反盥音管漱素茂反掃席前曰拚盥潔手漱滌口攝衣共盥先生乃作沃盥徹盥泛拚正席共音恭席叶祥􅕛反共盥謂共先生之盥器也徹盥謂既盥而徹盥器也泛拚謂廣拚內外不止席前也先生乃坐出入恭敬如見賔客危坐鄉師顔色母怍客叶音恪鄉音向怍謂變其容貌右蚤作受業之紀必由長始一周則然其餘則否長丁丈反否叶音鄙謂先從長者教之一周之外不必然始誦必作其次則已始誦而作以敬事端也至於次誦則不必然凡言與行思中以為紀古之將興者必由此始行下孟反中者無過不及之名以此為紀綱然後可興也後至就席狹坐則起狹坐之人見後至者則當起若有賔客弟子駿作對客無讓應且遂行趨進受命所求雖不得必以反命客見上讓叶平聲行叶音抗駿作迅起也對客無讓者供給使令不敢亢禮也受命為先生命求雖不得必以反白反坐復業若有所疑捧手問之師出皆起至於食時右受業對客先生將食弟子饌饋攝祍盥漱跪坐而饋置醬錯食陳膳毋悖錯七故反悖布內反饋謂選具其食凡置彼食鳥獸魚鱉必先菜羔羔叶音郎先菜後肉食之次也羔胾中别胾在醬前其設要方胾側反反别彼列反要一遙反胾謂肉而細者逺胾近醬食之便也其陳設食器要令成方也飯是為卒左酒右醬醬當作漿是謂胾也禮三飯乃食胾而辨殽皆畢又用酒以酳用漿以漱故言飯胾而食終乃言酒醬明在胾外也鄭注二禮兩引上文皆作漿字又此上文已云胾在醬前則此醬不應復在胾外矣今本誤也告具而退捧手而立二句用韻不叶未詳三飯二斗左執虛豆右執挾七周還而二唯嗛之視同嗛以齒周則有始柄尺不跪是謂二紀狹古協反還音旋嗛苦簟反三飯食必二毁斗也狹猶著也七所以載鼎實者二謂再益也食盡曰兼視有盡者則益之齒次序也如菜肉同盡則先益菜後益肉也豆有柄長尺則立進之此是再益之綱紀也先生已食弟子乃徹趨走進潄拚前斂祭漱祭未詳既食畢掃席前并搜斂所祭也右饌饋先生有命弟子乃食以齒相要坐必盡席要平聲所謂食坐盡前恐汚席也飯必捧攬羔不以手亦有據膝毋有隱肘既食乃飽循咡覆手攬音覽隱於靳反飽叶輔苟反咡音二不以手當以挾也隱肘則太伏也咡口也覆手而循之所以拭其不潔也振祍掃席巳食者作樞衣而降旋而鄉席各徹其餽如於賔客既徹并器乃還而立樞苦侯反鄉音向帝客還並見上立未詳振衽掃席謂振其底祍以拂席之汚賔客食畢亦自徹其餽并謂藏去也右乃食凡拚之道實水于盤攘𬒮及肘堂上則播灑室中握手執箕膺揲厥中有帚揲記注作擖又作葉並以涉反攘𬒮者恐濕其𬒮且不便於事也堂上寬故播而灑室中隘故握手為掬以邐揲舌也既有水將拚之故執箕以舌自當而置帚於箕中也入戶而立其儀不貸執帚下箕倚于左側貸他得反謂倚箕於戶側凡拚之道必由奧始西南隅也俯仰磬折拚毋有徹折之舌反散動也不得觸動他物也拚前而退聚於戶內從前掃而却退聚其所掃糞壤於戶內也坐板排之以葉適巳實帚于箕板檅時以手排之適巳向巳也先生若作乃興而辭以拚未畢故辭之令止也坐執而立遂出棄之既拚反立是協是稽協合也稽考也謂合考書義也右灑掃暮食復禮謂復朝食之禮昏將舉火執燭偶坐錯總之法橫于坐所櫛之逺近乃承厥火坐上聲錯見上所叶疏果反櫛莊乙反總束也古者束薪蒸以為燭故謂之總其未然者則撗于坐之所也櫛謂燭盡察其將盡之逺近乃更以燭承取火也居句如矩蒸間容蒸然者處下捧碗以為緒句古侯反下叶音戶句曲也舊燭既盡則更使人以新燭繼之一撗一直其兩端相接之處勢曲如矩則方正不邪也蒸細薪也言稍寬其束使其蒸間可以各容一蒸以通火氣又使巳然者居下未然者居上則火易然也緒燭燼也碗所以貯緒也右手執燭左手正櫛有墮代燭交坐無倍尊者乃取厥櫛遂出是去者叶音緒去上聲先執燭者既捧碗以貯櫛之餘緒遂以左手正櫛而投其緒於碗中至其櫛漸短有墜而不可執者則後執燭者代之而交坐於其處前執獨者乃取櫛而出棄之也右執燭先生將息弟子皆起敬奉枕席問所何趾俶祍則請有常則否奉芳勇反俶昌六反否見上俶始也謂變其祍席則當問其所趾若有常處則不請也右請祍先生既息各就其友相切相磋各長其儀周則復始是謂弟子之紀友叶音以叶上聲長丁丈反儀叶五何右退習記嵩山朝氏卦爻彖象説漢藝文志易經十二篇施孟梁丘三家顔師古曰上下經及十翼故十二篇是則彖象文言繫辭始附卦爻而傳於漢歟先儒謂費直專以彖象文言參解易爻以彖象文言雜入卦中者自費氏始其𥘉費氏不列學官惟行民間至漢末陳元鄭康成之徒學費氏古十二篇之易遂亡孔頴逹又謂輔嗣之意象木釋經冝相附近分爻之象辭各附當爻則費氏𥘉變亂古制時猶若今乾卦彖象繫卦之末歟古經始變於費氏而卒大亂於王弼惜哉熹按正義曰夫子所作象辭元在六爻經辭之後以自卑退不敢干亂先聖正經之辭及王轉嗣之意以為象者本釋經文冝相附近其義易了故分爻之象辭各附其當爻下言之此朝氏所引以證王弼分合經傳者然其言夫子作象辭元在六爻經辭之後則孔氏亦𥘉不見十二篇之易矣又在於彖及大象發之似亦有所未盡奈何後之儒生尤而效之杜預分左氏傳於經宋衷范望輩散太玄贊與測於八十一首之下是其明比也揆觀其𥘉乃如古文尚書司馬遷班固序傳楊雄法言序篇云爾今民間法言列序篇於其篇首與學官書不同槩可見也唐李鼎祚又取序卦冠之卦首則又效小王之過也劉牧云小象獨乾不係于爻辭尊君也石守道亦曰孔子作彖象於六爻之前小象係逐爻之下惟乾悉屬之於后者讓也鳴呼他人尚何責哉熹按詩疏云漢𥘉為傳訓者皆與經别行三傳之文不與經連故石經書公羊傳皆無經文而藝文志所載毛詩故訓傳亦與經别及馬融為周禮注乃云欲省學者兩讀故具載本文而就經為注據此則古之經傳夲皆自為一書故髙貴鄉公所謂彖象不連經文者十二卷之古經傳也所謂注連之者鄭氏之注具載夲經而附以彖象如馬融之周禮也朝氏於此固不如吕氏之有據然吕氏於乾卦經傳之次第所以與他卦不同者則無説焉愚恐朝氏所謂𥘉亂古制時猶若今之乾卦而卒大亂於一王弼者似亦未可盡廢也因竊記于此云云蓍卦考誤揲耆之法見於大傳雖不甚詳然熟讀而徐究之使其前後反復互相發明則亦無難曉者但疏家小失其指而辨之者又大失焉是以説愈多而法愈亂也因讀郭氏辨疑為考其誤云大衍之數五十其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸竒於扐以象閏五歲再閏故再扐而後挂正義曰推演天地之數唯用五十䇿就五十䇿中去其一餘所用者四十有九合同未分是象太一也分而為二以象兩者以四十九分而為二以象兩儀也此以上係節文挂一以象三者就兩儀之間於天數之中分挂其一而配兩儀以象三才也揲之以四以象四時者分揲其蓍皆以四四為數以象四時也歸竒於扐以象閏者竒謂四揲之餘歸此殘竒於所扐之䇿而成數以法象天道歸殘聚餘分而成閏也五歲再閏者凡前閏後閏相去略三十二月在五歲之中故五歲再閏再扐而後挂者既分天地天於左手地於右手乃四四揲天之數最末之餘歸之合於扐挂之一處是一揲也又以四四揲地之數最末之餘又合於前所歸之扐而總挂之是再扐而後挂也今考正義之説大槩不差但其文有闊略不備及顛倒失倫處致人難曉又解挂扐二字分别不明有以大起諍論而是一揲也之揲以傳文及下文考之當作扐字則恐傳寫之誤耳今頗正之其説如左云大衍之數五十其用四十有九者五十之內去其一但用四十有九䇿合同未分是象太一也分而為二者以四十九䇿分置左右兩手象兩者左手象天右手象地是象兩儀也挂一者挂猶懸也於右手之中取其一䇿懸於左手小指之間象三者所挂之䇿所以象人而配天地是象三才也揲之以四者揲數之也謂先置右手之䇿於一處而以右手四四而數左手之䇿又置左手之䇿而以左手四四而數右手之䇿也象四時者皆以四數是象四時也歸竒於扐者竒零也扐勒也謂既四數兩手之䇿則其四四之後必有零數或一或二或三或四左手者歸之於第四第三指之間右手者歸之於第三第二指之間而勒之也象閏者積餘分而成閏月也五歲再閏故再扐而後挂者凡前後閏相去大略三十二月在五歲之中此挂一揲四歸竒之法亦一變之間凡一挂兩揲兩扐為五歲之象其間凡兩扐以象閏是五歲之中凡有再閏然後置前挂扐之䇿復以見存之象分二挂一而為第二變也四營而成易十有八變而成卦正義曰四營而成易者營謂經營謂四度經營蓍䇿乃成易之一變也十有八變而成卦者每一爻有三變謂𥘉一揲不五則九是一變也第二揲不四則八是二變也第三揲亦不四則八是三變也若三者俱多為老隂謂𥘉得九第二第三俱得八也若三者俱少為老陽謂𥘉得五第二第三俱得四也若兩少一多為少隂謂𥘉與二三之間或有四或有五而有八也或有二箇四而有一箇九此為兩少一多也其兩多一少為少陽者謂三揲之間或有一箇九有一箇八而有一箇四或有二箇八而有一箇五此為兩多一少也如此三變既畢乃定一爻六爻則十有八變乃定一卦則十有八變乃其始成卦也正義又曰老陽數九老隂數六老陽老隂皆變周易以變者為占故陽爻稱九隂爻稱六所以老陽數九老隂數六者以揲蓍之數九過揲則得老陽六過揲則得老隂其少陽稱七少隂稱八義凖此見乾卦𥘉九下劉禹錫曰一變遇少與歸竒而為五再變遇少與歸竒而為四三變如之是老陽之數分措手指間者十有三䇿焉其餘三十有六四四而運得九是巳餘三象同又曰第一指餘一益三餘二益二餘三益一餘四益四第二指餘一益二餘二益一餘三益四餘四益三第三指與第二指同李泰伯曰聖人揲蓍虛一分二挂一揲四歸竒再扐確然有法象非苟作也故五十而用四十有九分於兩手挂其一則存者四十八以四揲之十二揲之數也左手滿四右手亦滿四矣乃扐其八而謂之多左手餘二右手亦餘二矣乃扐其四而謂之少則扐十二并挂而十三其存者三十六為老陽以四計之則九揲也故稱九三多則扐二十四并挂而二十五其存者二十四為老隂以四計之則六揲也故稱六一少兩多則扐二十并挂而二十一其存者二十八為少陽以四計之則七揲也故稱七一多兩少則扐十六并挂而十七其存者三十二為少隂以四計之則八揲也故稱八所謂七八九六者蓋取四象之數也今考三家之説正義大槩得之但不推多少所以為隂陽老少之數又以過揲之數巳見乾卦而遂不復言此為太略而易字之解三揲之分亦為小庇劉氏蓋合正義二説而言其法始備然其曰遇多遇少與歸竒為若干則是誤以兩扐為所遇而謂挂一為歸竒矣其曰餘三十有六䇿四四而運得九則是反以過揲為餘數而又必再運之矣此皆不如正義之名正而法簡其論第一指與第二指第三指之餘數不同則雖為三變皆挂之法然曰餘若干而益若干則為揲左不揲右而不免有以意增益之嫌其以三變挂扐之䇿分措于三指間則𥘉變之扐誤并於挂再變之挂誤并於扐亦為失之且一手所操多至二十五䇿亦繁重而不便於事矣李氏之説最為簡易而分别挂扐為明白但其法為多者一為少者三而不知二變多少之各二且曰扐十二并挂一為十三而不知扐千并挂三為十三餘三象同則是後三變不挂而不若劉説之為得也今皆正之如左方云四營而成易者營謂經營易即變也謂分二挂一揲四歸竒凡四度經營蓍䇿乃成一變也十有八變而成卦者謂既三變而成一爻復合四十九䇿如前經營以為一變積十八變則成六爻而為一卦也其法𥘉一變兩揲之餘為挂扐者不五則九第二變兩揲之餘為挂扐者不四則八第三變兩揲之餘為挂扐者亦不四則八五四為少九八為多若三變之間一五兩四則謂之三少一九兩八則謂之三多或一九一八而一四或一五而二八則謂之兩多一少或一九而二四或一五一四而一八則謂之兩少一多蓋四十九䇿去其𥘉挂之一而存者四十八以四揲之為十二揲之數四五為少者一揲之數也八九為多者兩揲之數也一揲為竒兩揲為偶竒者屬陽而象圎偶者屬隂而象方圎者一圍三而用全故一竒而含三方者一圍四而用半故一偶而含二也若四象之次則一曰太陽二曰少隂三曰少陽四曰太隂以十分之則居一者含九居二者含八居三者含七居四者含六其相為對待而具於洛書者亦可見也故三少為老陽者三變各得一揲之數而三三為九也其存者三十六而以四數之復得九揲之數也左數右䇿則左右皆九左右皆䇿則一而圍三也三多為老隂者三變各得兩揲之數而三二為六也其存者二十四而以四數之復得六揲之數也左數右䇿則左右皆六左右皆䇿則圍四用半也兩多一少為少陽者三變之中再得兩揲之數一得一揲之數而三二一三為七也其存者二十八而以四數之復得七揲之數也左數右䇿則左右皆七左右皆策則方二圎一也方二謂兩八圎二謂一十二兩少一多為少隂者三變之中再得一揲之數一得兩揲之數而二三一二為八也其存者三十二而以四數之復得八揲之數也左數右䇿則左右皆八左右皆䇿則圎二方一也圎二謂兩十二方一謂一八乾之䇿二百一十有六坤之䇿一百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也正義曰乾之䇿二百一十有六者以乾老陽一爻有三十六䇿六爻凡有二百一十六䇿也乾之少陽一爻有二十八䇿六爻則有一百六十八䇿此經據乾之老陽之䇿也坤之䇿百四十有四者坤之老隂一爻有二十四䇿六爻故一百四十有四䇿也若坤少隂一爻有三十二䇿六爻則有一百九十二此經據坤之老隂故百四十有四也凡三百有六十當期之日者舉合乾坤兩䇿有三百有六十當期之數三百六十日舉其大略不數五日四分日之一也二篇之䇿萬有一千五百二十當萬物之數者二篇之爻總有三百八十四爻隂陽各半陽爻一百九十二爻爻别三十六總有六千九百一十六也隂爻亦一百九十二爻爻别二十四總有四千六百八也隂陽總合萬有一千五百二十當萬物之數也今考凡言䇿者即謂蓍也禮曰龜為卜䇿為筮又曰倒䇿側龜皆以䇿對龜而言則可知矣儀禮亦言筮人執策尤為明驗故此凡言䇿數雖指挂扐之外過揲見存之蓍數而言然不以挂扐之內所餘之蓍不為䇿也疏義及其解説皆巳得之且其并以乾坤二少之爻為言則固不專以乾坤為老六子為少矣但乾坤皆少而其合亦為三百六十兩篇皆少而其合亦為萬一千五百二十則疏有未及而學者不可不知爾右揲蓍之法見於大傳者不過如此為之説者雖或互有得失然亦不過如此愚巳論之詳矣學者反復其言使各盡其曲折則後之為説者其是非當否不能出乎此矣康節先生曰歸竒合扐之數得五與四四則䇿數四九也餘放此郭氏曰歸竒合扐之數謂不用之餘數也策數所得之正策數也去此不用之餘數止語歸竒合扐之餘數故有三多三少之言至康節然後䇿數復見於書餘數不復相亂矣今按康節歸竒合扐四字本於正義所謂最末之餘歸之合於挂扐之一處蓋因其失而不暇正也然四九四六四七四八之數則正義於乾篇𥘉九文下巳明言之安得謂唐𥘉以來不論䇿數耶且康節又言得五與四則四亦未得為去此不用之餘數矣大抵為此辨者未知挂扐之中竒偶方圎參兩進退之妙是以必去挂扐之數而專用過揲之䇿其説愈多而其法愈偏也橫渠先生曰竒所挂之一也扐左右手之餘也郭氏曰自唐初以來以竒為扐故揲法多誤至橫渠而始分云再扐而後挂者每成一爻而後挂也謂第二第三揲不挂也郭氏曰凡一挂再扐為三變而成一爻橫渠之言正所以明正義之失也閏常不及三歲而至故曰五歲再閏此歸竒必俟再扐者象閏之中間再歲也今按此説大誤恐非橫渠之言挂也竒也扐也大傳之文固各有所主矣竒者殘零之謂方蓍象兩之時特挂其一不得便謂之竒此則自畢董劉氏而失之矣扐固左右兩揲之餘然扐之為義乃指間勒物之處故曰歸竒於扐言歸此餘數於指間也今直謂扐為餘則其曰歸竒於扐者乃為歸餘於餘而不成文理矣不察此誤而更以歸竒為挂一以避之則又生一誤而失愈逺矣郭氏承此為説而詆唐人不當以竒為扐夫以竒為扐亦猶以其扐為餘爾名雖失之而實猶未爽也若如其説以歸為挂以竒為一則為名實俱亂而大傳之文揲四之後不見餘蓍之所在歸竒之前不見有扐之所由亦不復成文理再扐者一變之中左右再揲而再扐也一變之中一挂再揲再扐而當五歲蓋一挂再揲當其不閏之年而再扐當其再歲之閏也而後挂者一變既成又合見存之蓍分二而挂一以起後變之端也今曰第一變挂而第二第三變不挂遂以當挂之變為挂而象閏以不挂之變為扐而象不閏之歲則與大傳之云挂一象三再扐象閏者全不相應矣且不數第一變之再扐而謂第二第三變為再扐又使第二第三變中止有三營而不足乎成易之數且於隂陽竒偶老少之數亦多有不合者今未暇悉論後當隨事發之爾伊川先生揲蓍法云先以右手指於左手之中取蓍一莖挂於左手小指之間此名竒也次以右手四揲左手之蓍四揲之餘數置案之東西隅此名右手之扐復以左手四揲右手之蓍四揲之餘亦置於案之東南隅此名左手之扐其兩手所握之蓍為所得之正䇿數又云再以左右手分而為二更不重挂竒又云三變訖乃歸先所挂之竒於第一扐之中次合正䇿數又四揲布之案上得四九為老陽郭氏曰此法先人親受於伊川先生雍復受於先人夲無文字歲月滋久慮或遺忘謹詳書之今按此説尤多可疑然郭氏既云本無文字則其傳受之際不無差舛冝矣其以挂一為竒而第二三變不挂愚巳辨於前矣其曰兩手餘數置之案隅而不置之指間則非歸竒於扐之義其以一變過揲之蓍便為正䇿則未合四九四六四七四八之數其曰三變訖乃歸先所挂之竒於第一扐之中則其挂之之久也無用其歸之之晚也無説而尤不合於大傳所言之次第又以四揲正䇿布之案上然後見所得之爻則其重復又甚焉凡此恐皆非伊川先生之本意也覽者詳之兼山郭氏曰蓍必用四十九者惟四十九即得三十六三十二二十八二十四之䇿也蓋四十九去其十三則得三十六去其十七則得三十二去其二十一則得二十八去其二十五則得二十四凡得者䇿數也去者所餘之扐也雍曰世俗皆以三多三少定挂象如此則不必四十九數凡三十三三十七四十一四十五五十三五十七六十一六十五六十九七十三七十七八十一八十五八十九九十三九十七皆可以得𥘉揲非五即九再揲三揲不四即八之數獨不可以得三十六三十二二十八二十四之策爾今按此書之中此説最為要切而其踈率亦無甚於此者蓋四十九者蓍之全數也以其全而揲之則其前為挂扐其後為過揲以四乘挂扐之數必得過揲之䇿以四除過揲之䇿必得挂扐之數其自然之妙如牝牡之相銜如符契之相合可以相勝而不可以相無且其前後相因固有次第而挂扐之數所以為七八九六又有非偶然者皆不可以不察也今於挂扐之數既不知其所自來而以為無所務於揲法徒守過揲之數以為正䇿而亦不知正䇿之所自來也其欲增損全數以明挂扐之可廢是又不知其不可相無之説其失益以甚矣聖人之道中正公平無向背取舍之私其見於象數之自然者蓋如此今乃欲以一偏之見議之其亦誤矣又曰四象之數必曰九八七六者三十六三十二二十八二十四之䇿再以四揲而得之也九六天地之數也乾坤之䇿也七八出於九六者也六子之䇿也乾坤相索而成者也今按四象之數乃天地之間自然之理其在河圖洛書各有定位故聖人畫卦自兩儀而生有畫以見其象有位以定其次有數以積其實其為四象者久矣至於揲蓍然後挂扐之竒耦方圓有以兆之於前過揲之三十六三十二二十八二十四有以乘之於後而九六七八之數隱然於其中九七天數也三十六二十八凡老陽少陽之䇿數也六八地數也三十二二十四凡老隂少隂之䇿數也今專以九六為天地之數乾坤之䇿謂七八非天地之數而為六子之䇿則巳誤矣又曰天之生數一三五合之為九地之生數二四合之為六故曰九六者天地之數也乾之䇿二百一十有六以六分之則為三十六又以四分之則為九坤之䇿百四十有四以六分之則為二十四又以四分之則為六故曰九六者乾坤之䇿數也隂陽止於九六而巳何七八之有故少陽震坎艮三卦皆乾畫一其䇿三十六坤畫二其䇿四十八合之為八十四復三分之而為二十八復四分之而為七少隂巽離兊三卦皆乾畫二其䇿七十二坤畫一其䇿二十四合之為九十六復三分之而為三十二復四分之而為八是七八出於九六而為六子之䇿也然九六有象而七八無象蓋以卦則六子之卦七八隱於其中而無象以爻則六子皆乾坤之畫而無六子之畫也故惟乾坤有用九用六之道諸卦之竒畫用乾之九也得偶畫者用坤之六也無用七八之道也今按一二三四五天地之生數也五中數故不用六七八九十天地之成數也十全數故不用而河圗洛書之四象亦無所當於五與十焉故四象之畫成而以一二三四紀其次九八七六積其實揲蓍之法具而挂扐之五與四以一其四而為竒九與八以兩其四而為偶竒以象圓而徑一者其圍三故凡竒者其數三偶以象方而徑一者其圍四而用半故凡偶者其數二所謂參天兩地者也及其揲之三變則凡三竒者三其三而為九三偶者參其兩而為六此九六之所以得數之實也至於兩竒一偶則亦參其兩竒以為六兩其一偶以為二而合之為八兩偶一竒則亦兩其兩偶以為四叄其一竒以為三而合之為七此七八所以得數之實也是其老少雖有不同然其成象之所自得數之所由則皆有從來而不可誣矣若專以一三五為九二四為六則雖合於積數之一端而於七八則有不可得而通者矣不自知其不通而反以七八為無象不亦誤乎又况自其四營三變而先得其七八九六之數而後得其一爻過揲之䇿以四乘其七八九六之數而後得其一卦過揲之䇿此於大傳之文蓋有序矣今乃以乾坤之䇿為母反再分之而後得九六焉且又不及乎七八而以為無象誤益甚矣抑七八九六之用於蓍正以流行經緯乎隂陽之間而别其老少以辨其爻之變與不變也九六豈乾坤之所得專而七八豈六子之所偏用哉若如其言則凡筮得乾坤者無定爻得六子者無定卦矣尚何筮之云哉其曰乾坤有用九用六之道六子無用七用八之道此又不考乎歐陽子明用之説其鑿甚矣又况方為四象之時未有八卦之名耶如蘇氏所引一行之言謂有其象而合其數則可爾今直以八卦分之不亦太早計哉釋疑序云繫詞不載九六七八隂陽老少之數聖人畫卦𥘉未必以隂陽老少為異然卜史之家取動爻之後卦故分别老少之象與聖人畫卦之道巳不同矣後世大失聖人之意者多主卜史之言而不知所謂䇿數也今按周禮太卜占人筮人之官槩舉其法不能甚詳然其不見於大傳者已多矣然皆周公法也安知七八九六之説不出於其中而夫子贊易之時見其巳著而遂不之及乎正如禮記冠義鄉飲酒義之屬亦以其禮自有明文故詳其義而略其數亦不可但見大傳之詞有所不及而遂謂聖人畫卦𥘉不以此為異也聖人作易本為卜筮若但有隂陽而無老少則又將何以觀變而玩其占乎且䇿數之云正出於七八九六者今深主䇿數而力排七八九六為非聖人之法進退無所據矣辨證曰凡卦爻所得之數獨謂之䇿自餘雖天地大衍亦皆但謂之數今按此説之誤巳辨於大傳䇿數之下矣大凡蓍之一籌謂之一䇿䇿中乘除之數則直謂之數矣又曰扐者數之餘也如禮言祭用數之扐是也或謂指間為扐非也揚子雲作艻亦謂蓍之餘數豈以草間為艻耶今按歸竒於扐謂歸此餘數於指間耳則此扐字乃歸餘數之處而非所歸餘數之名矣祭用數之扐者亦謂正數在握中而其竒零之數在指間指屬人身故從人從力而為扐也艻生於蓍而言此草在人指間也凡從力者皆勒之省文又曰如正義之説是六揲六扐而成一爻三十六揲三十六扐而成八卦與十八變而成卦之文異矣九故以九名之三變皆多則坤之象也坤所以為老隂而四數其餘得六故以六名之又曰七八九六者因餘數以名隂陽而隂陽之所以為老少者不在是而在乎三變之間八卦之象也如上所言則是直取三變多少卦象相類以畫爻而不復論其䇿數也今按四十九中聖人無不用之數巳見於前矣蘇氏之説既不知七八九六之巳具於挂扐而必求之過揲之間其與郭氏之説巳略相似矣但蘇氏以八卦之象為斷而郭氏以四象之䇿為言少不同耳然蘇氏亦云四數其餘得九則固亦兼取䇿數矣而郭氏峻文深詆遽至於此亦可畏哉又云凡揲蓍第一變必挂一者謂不挂一則無變所餘皆得五也惟挂一則所餘非五則九故能變第二第三變雖不挂亦有四八之變蓋不必挂也今按三變皆挂蓋本大傳所謂四營而成易者豫已論於前矣然其所以不可不挂者則又有兩説蓋三變之中前一變屬陽故其餘五九皆竒數後二變屬隂故其餘四八皆偶數屬陽者為陽三而為隂一圍三徑一之術也挂一而左一右三也卦一而左右皆二也卦一而左三右一也皆陽也卦一而左右皆四者隂也屬隂者為隂二而為陽二皆以圍四用半之術也挂一而左一右一也挂一而左二右一也陽也挂一而左三右四也挂一而左四右三也隂也是皆以三變皆挂之法得之後兩變不挂則不得也後兩變不挂則左一右三左二右二左三古一皆為陽惟左右皆四乃為隂三變之後其可為老陽者十二可為老隂者四可為少隂者二十八可為少陽者二十雖多寡之不同而皆有法象老隂陽數本皆八老者動而隂性本靜故損隂之四以歸於陽少隂陽本皆二十少者靜而陽性本動故損陽之四以歸於隂是亦以三變皆挂之法得之而後兩變不挂則不得也後兩變不挂則老陽少隂皆二十十少陽九老隂一郭氏僅見第二第三變可以不挂之一端爾而遂執以為説夫豈知其挂與不挂之為得失乃如此哉大抵郭氏他説偏滯雖多而其為法尚無甚戾獨此一義所差雖小而深有害於成卦變爻之私尤不可以不辨過揲三十六䇿圓圍三圓圍三圓圍三扐右挂揲左扐左揲右扐右丙乙丙閏丁戊閏巳庚辛閏壬癸閏甲乙丙閏丁戊閏舊説挂一以象三者也扐謂歸竒於扐以象閏者也五歲者一變之間一挂再揲再扐各當一歲之象也再閏者兩扐之歲為再閏之象也而後挂者又合餘蓍再分而挂以起後變之象也其文義象類既皆有條而不紊又通數之必五歲而再閏亦無不合郭氏説一變二變三變四變五變六變七變八變九變挂扐扐扐挂扐扐扐挂扐扐扐甲閏乙丙丁閏戊巳庚閏辛壬郭氏之説以挂為竒三變之中第一變挂扐第二第三變不挂而扐故以有挂有扐之變為挂無挂有扐之變為扐其有挂之扐又棄不數而曰歸竒必俟再扐者象閏之中閲再歲也然則挂象閏歲而不象三才扐反象不閏之歲而不象閏且必三扐而後復挂與大傳之文殊不相應又其閏必六歲而後再至亦不得為五歲而再閏矣易象九為老陽七為少八為少隂六為老舊説陽以進為老隂以退為老九六者乾坤之畫陽得兼隂隂不得兼陽此皆以意配之不然也九七八六之數陽順隂逆之理皆有所從來得之自然非意之所配也凡歸餘之數有多有少多為隂如爻之偶少為陽如爻之竒三少乾也故曰老陽九揲而得之故其數九其䇿三十六兩多一少則一少為之主震坎艮也故皆謂之少陽少在𥘉為震中為坎末為艮皆七揲而得之故其數七其䇿二十有八三多坤也故曰老隂六揲而得之故其數六其䇿二十有四兩少一多則一多為之主巽離兊也故皆謂之少隂多在𥘉為巽中為離末為兌皆八揲而得之故其數八其䇿三十有二盈則變純少陽盈純多隂盈盈為老故老動而少靜吉凶悔吝生乎動者也卦爻之辭皆九六者惟動則有占不動則無朕雖易亦不能占之國語謂正屯悔豫皆八遇泰之八是也今人以易筮者雖不動亦用爻辭斷之易中但有九六既不動則是七八安得用九六爻辭此流俗之過也諸家揲蓍説惟筆談此論簡而盡但謂不動則易不能占與引國語之説為誤爾琴律説太史公五聲數曰九九八十一以為宫散聲二分去一得五十四以為祉為九徽三分益一得七十二以為啇為十二徽三分去一得四十八以為羽為八徽三分益一得六十四以為角為十一徽十二律數曰黃鍾九寸為宫琴長九尺而折其半故為四尺五寸而下生林鍾林鍾六寸為祉為第九徽徽內三尺徽外一尺五寸上生太簇太蔟八寸為啇為第十三徽徽內四尺徽外五寸下生南吕南吕五寸一分為羽為第八徽徽內二尺七寸徽外一尺八寸上生姑洗姑洗七寸一分為角為第十一徽內三尺五寸徽外九寸下生應鍾應鍾四寸六分六釐位在八徽內二寸七分內二尺四寸外二尺一寸上生㽔賔㽔賔六寸二分八釐位在十徽九徽之間內三尺一寸五分外一尺三寸五分上生大吕大吕八寸三分七釐六毫在龍齦內二寸半內四尺二寸半外二寸半下生夷則夷則五寸五分五釐一毫在九徽八徽之間內二尺八寸半外一尺六寸半下生夾鍾夾鍾七寸四分三釐七毫三絲為第十二徽徽內三尺八寸徽外七寸下生無射無射四寸八分八釐八絲在八徽內徽內二尺五寸徽外二尺上生中吕中吕六寸五分八釐三毫四絲六忽為第十徽亦為角徽內三尺四寸徽外一尺一寸復生變黃鍾八寸七分八釐有竒今少宫以下即其半聲為四寸三分八釐有竒也以上十二律並用太史公九分寸法約定周禮鄭注以從簡便凡律律皆九分分皆九釐釐皆九絲絲皆九忽琴尺皆十寸寸皆十分分皆十釐釐以下不收按此以上為自龍齦之內至于七徽左方十二律之位而七徽以後之説亦附其後蓋琴之有徽所以分五聲之位而配以當位之律以待抑按而取聲而其布徽之法則當隨其聲數之多少律管之長短而三分損益上下相生以定其位如前之説焉今人殊不知此其布徽也但以四折取中為法蓋亦下俚立成之小數雖於聲律之應若簡切而易知但於自然之法象懵不知其所自來則恐不免有未盡耳或曰若子之言聲數也律分也徽寸也三者之相與皆迂回屈曲而難通無乃出於傳會牽合之私耶曰律之九分也數之八十一也琴之八尺一寸也三者之相與固未嘗有異焉今以琴之太長而不適於用也故十其九而為九尺又折其半而為四尺五寸則四尺五寸之琴與夫九寸之律八十一之數亦未始有異也蓋𥘉絃黃鍾之宫次絃太蔟之啇三絃中吕之角四絃林鍾之祉五絃南吕之羽六絃黃清之少宫七絃太清之少啇皆起於龍齦皆終於臨嶽其長皆四尺五寸是皆不待抑按而為本律自然之散聲者也而是七絃者一絃之中又各有五聲十二律者凡三焉且以𥘉絃五聲之𥘉言之則黃鍾之律固起於龍齦而為宮聲之𥘉矣數八十一律九寸琴長四尺五寸太蔟則應於十三徽之左而為啇數七十二律八寸徽內四尺姑洗則應於十一徽而為角數六十四律七寸一分徽內三尺五寸中吕應於十而為角律六寸五分八釐有竒徽內三尺五寸但姑洗唯三絃用之餘絃皆用中吕林鍾則應於九而為祉數五十四律六寸徽內三尺南宫則應於八而為羽數四十八律六寸徽內二尺七寸次絃則太蔟之律固起於龍齦而為啇之𥘉矣用宫數後倣此而其姑角應於十三之左用啇數後倣此林祉應於十南羽應於九黃清少宫應於八之右三絃則姑洗之律固起於龍齦而為角之𥘉矣而林祉應於十三南羽應於十一黃清少宫應於九太清少啇應於八四絃則林鍾之律固起於龍齦而為祉之𥘉矣而南羽應於十三黃清少宫應於十太清少啇應於九少角應於八五絃則南吕之律固起於龍齦而為羽之𥘉矣黃清少宫則應於十二少啇應於十少角應於八九之間六絃之黃清則固起於龍齦而為少宫之𥘉矣少啇則應於十三少角則應於十少祉則應於九少羽則應於八七絃之太清則固起於龍齦而為少啇之𥘉矣少角則應於十二少祉則應於十少羽則應於九少宫之少則應於七八之間故皆按其應處而鼓之然後其聲可得而見而聲數律分與其徽內之長無不合焉然此皆黃鍾一均之聲也若大吕夾鍾㽔賔夷則無射應鍾之為律則無所用於黃鍾故必因旋宫而後合於五聲之位其在於此則雖有定位而未當其用也大在黃太之間律八寸三分七釐有奇內四尺二寸半夾在太姑之間律七寸四分三釐有竒內三尺八寸𬎼在中林之間律六寸二分八釐內三尺一寸五分夷在林南之間律五寸五分五釐有奇內二尺八寸半無在南右律四寸八分八釐有竒內二尺五寸應在無右律四寸六分六釐內二尺四寸蔟宫見本章圖説若自七徽之後以至四徽之前則五聲十二律之應亦各於其𥘉之次而半之𥘉絃七徽承羽而為宫六七間為啇六右為角五為祉四五間為羽次絃七徽承宫而為啇六左為角六右為祉五為羽四五間為宫三絃七徽承啇而為角六為羽五為宫五右為啇四絃承角而為祉六左為羽六右為宫五為啇四五間為角五絃七徽承祉而為羽六左為宫六右為啇五右為角四五間為祉六絃承羽而為宫七右為啇五右為角五為祉四五間為羽七絃承宫而為啇六左為角六右為祉五為羽四五間為宫四徽之後以至一徽之後則其聲律之應次第又如其𥘉而又半之此一節聲難取而用處希不能盡載然其大槩次第亦與上兩節不異但加促密耳凡五絃起於龍齦𥘉絃五聲次絃四聲三絃三聲四絃二聲五絃一聲凡十九聲皆正聲初絃七徽次絃八徽三絃九聲四絃十徽五絃十二徽六絃龍齦以後為第二宫各五聲七絃龍齦以後四聲凡三十四聲皆少聲𥘉絃四徽以下至七絃八七間以後為第三宫各五聲凡三十五聲皆少少聲初絃一徽之後下至七絃四五之間𥘉絃一聲次絃二聲三絃三聲四絃四聲五絃五聲六絃五聲七絃四聲凡十九聲猶為少少入前三十五聲數內唯六絃一聲七絃二聲凡三聲為第四宫又别為少少少聲通為三十八聲合一琴而計之為百十有三聲但七徽之左為聲律之𥘉氣後身長聲和節緩故琴之取聲多在於此七徽則為正聲正律𥘉氣之餘承祉羽既盡之後而黃鍾之宫復有應於此者且其下六絃之為聲律亦皆承其巳應之次以復於𥘉而得其齊焉氣巳消而復息聲巳散而復圓是以雖不及始𥘉之全盛而君子猶有取焉過此則其氣愈散地愈迫聲愈髙節愈促而愈不可用矣此六徽以後所以為用之少雖四徽亦承以應之次以復於𥘉而得其齊而終有所不能反也此處但泛聲多取之自當别論而俗曲繁聲亦或有取則亦非君子所冝聽也大抵琴徽之分布聲律正與候氣同是一法而亦不能無少異候氣之法闕地為坎盈尺之下先施木案乃植十二管於其上而實土埋之上距地靣皆取一寸而止其管之底則各隨其律之短長以為淺深黃鍾最長故最深而最先應應鍾最短故最淺而最後應今移其法於琴而論之則所謂龍齦即木案之地也所謂臨嶽即地靣之平也聲應之處即其律寸之短長距案之逺近也故按此鼓之而其聲可見此其所同也但律之次第左起而右行者以氣應先後為之序自地中而言之也徽之次第右起而左行者以律管入地淺深為之序據人在地上目所見者而言之也此其似異而實同者也其甚異者則管虛而絃實管有長短而無大小圍皆九分徑皆三分絃有大小而無短長管上平而下不齊絃則下齊而同起於龍齦也是以候氣者異管而應不同時既應則其氣遂逹於上而無復升進之漸布徽者亦異絃而應於同時既應則各得其量之所受如以弦大小為五聲之序而循序以漸進至于三周而後巳此其甚不同者也然明者觀之以其所異乘除凖望而求其所同則是乃所以益見其同而無可疑者但自有琴以來通儒名師未有為此説者余乃獨以荒淺之學聾瞶之耳一旦臆度而誦言之冝子之駭於聽聞而莫之信也然吾豈以是而必信於當世之人哉姑以記余之所疑焉耳抑此七絃既有散絃所取五聲之位又有按徽所取五聲之位二者錯綜相為經緯其自上而下者皆自上絃遞降一等其自左而右者則終始循環或先或後每至上絃之宫而一齊焉蓋散聲陽也通體之全聲也無所受命而受命于天者也七徽隂也全律之半聲也受命於人而人之所貴者也但以全聲自然無形數之可見故今人不察反以中徽為重而不知散聲之為尊甚矣其惑也至其三宫之位則左陽而右隂陽大而隂小陽一而隂二故其取類左以象君右以象臣而二臣之分又有左右左者陽明故為君子而近君右者隂濁故為小人而在逺以一君而御二臣能親賢臣逺小人則順此理而國以興隆親小人逺賢臣則咈此理而世以衰亂是乃事理之當然而非人之所能為也又凡既立此律以為宫則凡律之當徽而有聲者皆本宫用事之律也其不當徽而無聲者皆本宫不用之律也唯第十二徽有徽無聲亦不當用未詳其説律旋而宫變則時異而事殊其遭時而遇俗者自當進據可為之會而發其鳴聲其背時而忤俗者自當退伏無人之境而箝其頰舌此亦理勢之當然而其詳則旋宫之圗説盡之矣定律沈氏筆談據唐人琵琶録以為調琴之法須先以管色合字定宫絃乃以宫絃下生祉祉上生啇上下相生終於少啇凡下生者隔二絃上生者隔一絃取之凡絲聲皆當如此但今人苟簡不復以管定聲故其髙下無法出於臨時按沈氏所言可救流俗苟簡之弊世之言琴者徒務布爪取聲之巧其韻勝者乃能以蕭散間逺為髙耳豈復知禮樂精微之際其為法之嚴密乃如此而不可苟哉然其曰以合聲定宫絃者亦黃鍾一均之法耳不知沈氏之意姑舉一隅以見其餘耶抑以琴聲之變為盡於此而遂巳也若曰姑舉一隅而當别用旋宫之法以盡其變則又當各以其字命之而不得定以合聲為宫也蓋今俗樂之譜某則合之為黃也􅦦則四下之為大也􅦦則四上之為大也二則一下之為夷也二則一上之為姑也􅦦則上之為中也某則勾之為㽔也某則尺之為林也則下之為夷也則上之為南也􅕶則凡下之為無也􅕶則凡上之為應也六則六之為黃清也丌則五下之為大清也丌則五上之為太清也則上之為夾清也此聲俗工皆能知之但或未識古律之名不能移彼以為此故附見其説云按今俗樂或謂髙於古雅樂三律則合字乃夾鍾也沈氏後章即言今教坊燕樂比律髙二均弱合字比太蔟徽下却以凡字當宫聲比宫之清宫徽髙外方樂又髙坊一均以來惟契丹樂聲比教坊樂下二坊疑唐之遺聲也若如沈説則方外合字真為夾鍾矣若便以此為黃鍾恐聲巳髙急更用旋宫至辰巳位即巳為林夷非唯不容彈亦不可得而上矣更詳之調絃調絃之法散聲隔四而得二聲宫與少宫啇與少啇中徽亦如之而得四聲按上散下得二聲按下散上得二聲其絃則同八徽隔三而得六聲宫與羽啇與少宫角與少啇按上得三聲按下得三聲九徽按上者隔二而得四聲宫與祉啇與羽角與少宫祉與少啇為四內角聲在九十間四之少濁按下者隔一而得五聲少啇與羽少宫與祉羽與角祉與啇角與宫為五內角聲在九八間四之一少清十徽按上者隔一而得五聲宫與角啇與祉角與羽祉與少宫羽與少啇為五內角聲在十一徽少濁按下者隔二而得四聲少啇與祉少宫與角羽與啇祉與宫為四內角聲在十一徽少濁十三徽之左比絃相應而得六聲宫與啇啇與角角與祉祉與羽羽與少宫少宮與少啇凡六右調絃之法大槩如此然惟九徽為得其相生之序十徽則雖律吕相得而其倫序倒置若有未諧故沈氏説以隔二者為下生隔一者為上生蓋九徽之宫隔二者生散祉而散祉隔一上生十徽之啇九徽之啇隔二下生散羽而散羽隔一上生十一徽之角九徽之角隔二下生散少宫而散少宫隔一上生十徽之祉九徽之祉隔二下生散少啇而散少啇隔一上生十徽之羽也如此則九徽之隔二者常以木聲命散聲十徽之隔一者常以散聲命木聲然後十徽之按上按下者亦皆得以協其相生之序此又不可不知也此外諸絃號為相應者則但以散聲木聲同於一律而自相酬酢至於相生之序則無取焉然散聲者全律之首七徽者散聲之二故其應聲渾厚寬平最為諧韻特以中三絃者孤孑特立無上下之交焉則其為用有所不周若八徽之三聲十三徽之六聲則為律雖同而絲木有異是以其聲雖應而不和如人心不同而強相然諾外雖和悅而中實乖離求其天屬自然真誠和協則惟九徽十徽與十一徽之三絃為然此調絃之法所以必於此而取之亦非人力之所能為也或者見其如此而不深求其故遂以巳意強為之説以為九徽者林鍾之位十徽者中吕之位林鍾為黃鍾之所生而中吕又為能反生黃鍾者所以得為調絃之地而非他徽之可及此其為説亦巧矣然使果有是理則曷為不直於黃鍾焉調之而必為此依傍假託之計耶若角聲二律之説則豫嘗竊怪古之為樂者通用三分損益隔八相生之法若以黃鍾為宫則姑洗之為角有不可以毫髮差者而今世琴家獨以中吕為黃鍾之角故於衆樂常必髙其一律然後和唯第三絃本是角聲乃得守其舊而不變流傳既久雖不知其所自來然聽以心耳亦知其非人力之所能為也昔人亦有為之説者皆無足取其曰五聲之象角實為民以民為貴故於此焉上之者其穿鑿而迂踈固巳甚矣又以為姑洗為正角中吕為慢角者則恐此等變調隨世而生又非獨此為然也近世惟長樂王氏之書所言禮樂最為近古然其説琴亦但以第三絃為律中中吕而不言其所以然者豫於是益以為疑乃為之深思而有得焉然後知古人所以破去三分損益隔八相生之明法而俯焉以就此位之僣差者乃為迫於聲律自然之變有不得巳而然也蓋建樂立均之法諸律相距間皆一律而獨宫羽祉角之間各間二律相距既逺則其聲勢隔闊而有不能相通之患然猶幸其隔八之序五聲既備即有二律介於宫與祉角之間於是作樂者因而取之謂之二變然後𬒳四聲者乃得連續無間而七均備焉唯琴則專用正聲不取二變故於二位之闕無以異乎衆樂之𥘉然又以其别有二少而少宫之分地位近於變宫故宫羽之間有以輔之而不至於大闕惟祉角之間既為闊逺𣣔以少啇輔之則其分寸地位相望甚逺而不可用是以巳午二位特為空闕而角聲之勢必將乘其間隙進而干之以求合於林祉然其本位若遂空虛而無主則姑夾兩位又成曠闊而啇角二聲將不能以相通幸而三絃姑洗之本聲與十一徽姑洗之本位自有相得而不能相離者乃獨固守其所而不肯去於是姑前中後皆得秪間一律而無空闕之患是亦律吕性情自然之變有如此者而非人力所能為也然非古之哲人機神明鑒有以盡其曲折之微則亦孰能發其精藴著為明法以幸後世之人哉深究其端殆未易以常理論也今好事者乃有見二律之兼用遂通五均數為六律而謂凡周禮孟子之單言六律者皆以是言而非六律六同之謂果如其言則是周禮孟子皆為專指琴之一器而言且使衆樂之七均皆廢而所謂七音七始亦皆虛語矣鳴乎異哉晦庵先生朱文公文集卷第六十六終福州府儒學訓導鄭璉校正
