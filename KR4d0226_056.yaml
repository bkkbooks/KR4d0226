body:
  text: 書知舊門人問答答趙子欽彥肅昨承寄及文字意謂一時思索偶有所未至故率易報去今承示喻乃平日所深體而實見者甚愧輕發然所謂深體而實見者乃止如此在賢者似尤不宜如此便休也刪遺書之未精探易傳之未至此在當日楊尹諸先達猶未敢輕言之今日安敢議此耶只如所示屯卦之説深所未曉若欲以此揍輔易傳匕分之心恐合不著也大率近日學者例有好高務廣之病將聖人言語不肯就當下著實處看須要説教玄妙深逺添得支離蔓衍未論於巳無益且是令人厭聽若道理只是如此前賢豈不會説何故却只如此平淡簡短都無一種似此大驚小怪底浮説蓋是看得分明思得爛熟只有此話别無可説耳其曰只説得匕分者亦言沈酣浸漬自信自得之功更在學者自著力耳豈是更要别添外科釀玄酒而和大羹也耶且如元亨利貞四字文王本意在乾坤者只與諸卦一般是大亨而利於正耳至孔子作彖傳文言始以乾坤為四德而諸卦自如其舊二聖人之意非有不同蓋各是發明一理耳今學者且當虗心玩味各隨本文之意而體會之其不同處自不相妨不可遽以巳意橫作主張必欲挽而同之以長私意增衍説終日馳􅕽於虗詞浮辨之間而於存飬省察日用之功反有所損而無所益也去歲承書之日適有江西傅子淵在坐蓋喜聞足下之説而以示之子淵不善也熹猶未以為然然自今觀之則拙者之見果為有愧於子淵矣碩賢者深思而有以反之勿使熹為終有愧也答趙子欽示喻訥言敏行之意甚善然前書鄙論亦非謂都不講究而專務力行也正為聖言微指本自精約不當如是支蔓以求之恐其愈多而愈逺耳答趙子欽示喻虛一之説甚善此本聖人所不言今著一句便成贅語來喻推説其理甚當但以四十九蓍握而未分為太極之象則恐亦未穩當蓋太極形而上者也兩三四五形而下者也若四十九蓍可合而命之曰太極之象則二三四五亦可合而命之曰太極之體矣蓋太極雖不外乎隂陽五行而其體亦有不離乎隂陽五行者熹於周子之圖書之首固巳發此意矣若必其所象毫髮之不差則形而上下終不容強於匹配若曰各隨所指而言則與其以握而未分者象太極反不若以一䇿不用者象之之為無病也明者試復思之如何答趙子欽自反研幾之喻極感至意不敢不勉但他論有未能無疑者如詩樂起調畢曲之法乃自古所傳如此音調方有歸宿不可紊亂溫公書儀誠有未盡合古制處然兼而存之自可考見得失今以其一詞之不合便欲削去似亦草率且彼以俗尚而雜古禮吾以臆見而改古樂安知後之視今不猶今之視昔耶堂室制度必巳得其詳實因便早幸示及方欲葺數椽之居或可取以為法耳子靜後來得書愈甚於前大抵其學於心地工夫不為無所見但便欲恃此陵跨古今更不下窮理細密功夫卒并與其所得者而失之人欲橫流不自知覺而高談大論以為天理盡在是也則其所謂心地工夫者又安在哉答趙子欽禮圖未暇詳考亦是素看此篇不熟猝乍看未得若更得冠婚禮二圖容并考之乃為幸耳室戶之牗並列於前不知以幾分為戶幾分為牗房在室東而無北壁不知其南戶有扉否房之戶當中耶近東角耶近西角耶兩階當直東西序之中而上耶近兩楹而上耶近兩壁而上耶須先定此地盤間架乃可議其升􅑙出入幸亦并作一圖子細見示也易説用意甚精然鄙見却有未安處似是為説太精取義太密或傷簡易之趣更俟詳玩别奉扣也答趙子欽熹數年來有更定舊書數種欲得面論而不可得大抵愚意常患近世學者道理太多不能虛心退步徐觀聖賢之言以求其意而直以巳意強置其中所以不免穿鑿破碎之弊使聖賢之言不得自在而常為吾説之所使以至劫持縳束而左右之甚或傷其形體而不恤也如此則自我作經可矣何必曲躬俯首而讀古人之書哉不識明者以為如何答趙子欽禮圖甚精但病軀尚爾支離正甫到此未久亦大病數十日今又迫歸遂不得子細商訂但昨來黃壻考得堂序制度頗與來示不同亦未暇參考折中正甫計必持歸幸為詳之因來喻及也易説用意固甚精密愚意亦素謂易學不可離却象數但象數之學亦須見得大槩揔領方可漸次尋探今但如此瑣細附合恐聖人之意本未必爾而虛費功力也大抵讀書須見得有曉不得處方是長進又更就此闕其所疑而反復其餘則庶幾得聖人之意識事理之真而其不可曉者不足為病矣正甫趨向持守甚不易得但看文字亦尚多強説處此學者之通患如前輩亦或未能免先聖所謂寬以居之子張所謂執德不弘正為救此病耳不識明者以為如何無由靣話書札不得究所欲言而衰晚疾病恐不久在世間或能早為命駕一來使區區懷抱得以傾倒而萬一辱有取焉亦非小因緣也此間雖有士友數輩然與之語往往不能盡人意一旦溘然此事便無所寄不得不為之慮耳大學語孟説各一通謾往此近日所修定然尚覺得有硬説費力處煩為一閲見日靣論須盡去此等病方見聖人本意也答詹子厚便中辱書良足為慰但所寄喻趙二書及復齋行實奠詞三復悲歎不能自巳鳴呼世豈有斯人耶銘墓誠碩效區區但時論如此兩三年來不敢為人作一字而猶不免今譴責方新豈敢干犯且當謹藏以俟雷霆之威有時或息而熹偶未死則終不敢食此言耳萬一溘先朝露則諸賢之言自足紀於後世亦不待熹而顯幸密以告汪喻默會此意勿以語人也答詹子厚罪戾之餘幸亦粗遣不足云云子欽之逝念不能忘前書所報刋行易説事不知尚及止否計其書多説象數似亦不妨但是有些這下氣息令人憎嫌耳可中安在書中説欲此來不知成行否因通書幸為致意并問汪正父所在也此間禮書漸可脫藁若得二公一來訂之尤佳然不可語人恐速煨燼之災也答曽泰之祕所喻鄊黨卒章疑義此等處且當闕之却於分明易曉切於日用治心修巳處反復玩味深自省察有不合處即痛加矯革如此方是為巳功夫不可只於文字語言上著力也彼中士子有來學者亦可以此告之熹論語集注未嘗皆引胡先生説所傳恐誤此書之作只是解説訓詁文義免得學者泛觀費力然所謂玩味省察功夫却在當人不在文字也答徐載叔賡知放船下都為排雲呌閽之舉此意甚壯示及藁草詞氣奔放而敘事詳密病中目昏略一披覽甚快鄙意所論亦切中今日之弊如經題破碎近日尤甚前日江東未得請時嘗欲到官後檢舉諸州所申入一文字劾其戲侮聖言之尤者一二人雖或未必聽從亦且令人傳笑少警昏俗既不成行此事又且巳今讀來示如癢得搔也但此事更有根本今徒然説得病痛不知如何下藥又此於治體僅為一事而文書浩漾已如此恐萬機之暇亦不能詳覽也更略簡節之并與施行之目一二陳之乃為佳所喻學者之害莫大於時文此亦救弊之言然論其極則古文之與時文其使學者棄本逐末為害等爾但此等物如淫聲美色不敢一識其趣便使人不能忘政當以為通人之蔽不當以是為當務而切切留意也放翁之詩讀之爽然近代唯見此人為有詩人風致如此篇者𥘉不見其著意用力處而語意超然自是不凡令人三嘆不能自已蓋愛之者無罪而害之者自為病耳近報又巳去國不知所坐何事恐只是不合做此好詩罰令不得做好官也答徐載叔專人示問尤荷厚意但觀所論枝葉太繁標榜太多似於古人為已之意有不相似者未知謝陸二公曽以此奉針否竊謂此非小病遂而不反尤悔之積將有不可勝言者辨説雖精無能輔也答葉正則適來書毫毛鈞石之喻是乃孟子所謂尋尺者此等議論近世蓋多有之不意明者亦出此也古人為巳之實無多言語今欲博考文字以求之而又質之於膠擾未定之胸次冝其愈求而愈不得也既未知其實之所在則所謂百餘年來之所講貫者果指何事以充之而遽以為未合於聖賢之中耶答葉正則向見人家抄録靖康事有耿黃門劄子論祖宗致治不如熙豐之盛者數條不當專以祖宗為法後有欽廟批語若曰昨降某事指揮失於思慮尚賴師傅大臣正救其失前命更不施行當時不曽録得後閲實録長編之屬皆無此事不知今尚有考處否耿之誤國固非一事然此一章乃定公孔子所謂一言者恐不可不著之史籍以為永監也答葉正則所喻二説之未安具悉雅意但熹則以為舊聞者中也獨得者過也賢者之所以未然者不及也其詳雖有未得盡聞者然大約當不出此於此看破則千里同風不待片言而群疑決矣答葉正則向來相見之日甚淺而荷相與之意甚深中間寓舍並坐移晷觀左右之意若欲有所言者而竟囁嚅不能出口前後書疏往來雖復少見鋒頴而亦未能彼此傾倒以求實是之歸但見士子傳誦所著書及答問書尺類多籠罩包藏之語不唯他人所不解意者左右亦自未能曉然於心而無所疑也世衰道微以學為諱上下相徇識見議論日益卑下彼既不足言矣而吾黨之為學者又皆草率荀簡未曽略識道理規模工夫次第便以巳見摶量湊合撰出一般説話髙自標置下視古人及考其實則全是含胡影響之言不敢分明道著實處竊料其心豈無所疑只是巳作如此聲勢不可復謂有所不知遂不免一向自瞞強作撑柱且要如此鶻突將去究竟成就得何事業未論後世只今日旁觀便須有人識破未論他人只自家方寸如何得安穩耶如來書所謂在荆州無事看得佛書乃知世外壞竒之説本不能與治道相亂所以參雜辨爭亦是讀者不深考爾此殊可駭不謂正則乃作如此語話也中間得君舉書亦深以講究辨切為不然此蓋無他只是自家不曽見得親切端的不容有毫釐之差處故作此見耳欲得會靣相與劇談庶幾彼此盡情吐露尋一箇是處大家講究到底大開眼看覷大開口説話分明去取直截剖判不須得如此遮前掩後似説不説做三日新婦子模樣不亦快哉孟子自許雖行霸王之事而不動其心究其根原乃只在識破詖淫邪遁四種病處今之學者不唯不能識此而其所做家計窠窟乃反在此四種病中便欲將此見識判斷古今議論聖賢豈不誤哉相望千里死亡無日因書聊復一言不審明者以為如何然勿示人恐又起閙無益而有損也若見得道理分明便無事殺決不暇讀佛書若偶讀之亦須便見得其亂道誤人處愈親切不至為此言矣試以此一端思之可見得失劉智夫此間相去不百里暑中未得欵會同志難得但恐自處巳太髙了不肯放下就實做工夫耳年來見得此事極分明乃知曽子實以魯得之而聰明辨博如子貢者終不得與聞於此道之傳真有以也答徐居厚元德大病新復正要將護不可少有激觸損動真氣讀書度未能罷且歇得數月亦佳將來看時亦且適意遮眼自有意味正不必大假著力記當損人心力使人氣血不舒易生疾病况古人之學自有正當用力處此等止是隨力隨分開廣規模若專恃此亦成何等學問耶前此屢欲言之而匆匆不睱今亦不特為養病發也今人但見孔子問禮問官無所不學便道學問只是如此却不知得他合下是甚次第大底本領方有功夫到此若只將自家此等小小見識而學養子而后嫁豈不誤哉至於平心和氣却是吾人學問根本亦不為病然後當著力也答趙履常崇憲示喻讀書遺忘此亦士友之通患無藥可醫只有少讀深思令其意味浹洽當稍見功耳讀易亦佳但經書難讀而此經為尤難蓋未開卷時巳有一重象數大槩功夫開卷之後經文本意又多𬒳先儒硬説殺了令人看得意思局促不見本來開物成務活法廷老所傳鄙説正為欲救此弊但當時草草抄出踈略未成文字耳然試略考之亦粗見門戶梗槩若有他説則非吾之所敢聞也答方賔王誼伏自先人實與先侍郎丈有逰從之好而熹蚤歲又得以州縣小吏趨走幕府之下辱慰薦焉衰悴無堪不能有以報效萬一每念知顧之重未嘗不愧且歎也屏居衰僻病懶相仍又不能一通問訊門下然知舊間亦未嘗不詢扣動靜而鄉往不忘也屬者入都不能半月而匆匆以去乃辱專人追路惠以手書意寄勤厚三復增歎且審即日極暑尊候萬福又以為慰示喻為學之意親切的當而不失其序近日所見朋友講習未有能及此者甚慰鄙意但以所謂三條觀之恐前日講貫之功猶有未究其極者而今日所謂操存􅉼養者又不免離却前日所講别作一假不言不語底功夫也大學之序自格物致知以至於誠意正心不是兩事但其內外淺深自有次第耳非以今日之誠意正心為是即悔前日之格物致知為非也不識明者以為如何如延平行狀中語乃是當時所聞其用功之次第今以聖賢之言進修之實驗之恐亦自是其一時入處未免更有商量也程子所論心指巳發後書明言此固未當則是一時言語不免小差須如後説乃為無病蓋性為體情為用而心則貫之必如橫渠先生所謂心統情性者其語為精密也忠信之説大槩甚善但理之是非事之當否恐當於是非羞惡之端論之忠信之得名未必為此設也道旁客舍草草布此言不盡意恐有未安更俟垂喻有書只託吕子和發書至婺女彼中時有便也未由靣講豈勝悵然唯冀以時珍衛用慰逺懷千萬之望答方賔王别𥿄所喻甚善向亦見浙中士友多立一偏之論故爾過憂然存養之功亦不當專在靜坐時須於日用動靜之間無處不下功夫乃無間斷耳心性情之説亦巳得之但性即理也今以為萬理之所自出又似别是一物康節先生云性者道之形體此語却似親切也又云靜而不知所存則性不得其中性之必中如水之必寒火之必熱但為人失其性而氣習昏之故有不中而非性之不得其中也鄙意如此未知是否答方賔王性者道之形體因記先生誨而思之姑以所見布稟知言云性立天下之有蓋萬物之所以有者以是而巳苟無是則氣化將斷絶生物有窮終矣故曰隂陽之根柢造化之樞紐而中也者天下之大本而道之體也然前賢之論性未嘗一及於此而必以人物稟受動靜而言者蓋性不能捨物而自立捨物而論性則性蓋不可得而名如乾坤毁則無以見易矣道也者言天之自然也性也者言天之賦豫萬物萬物稟而受之者也雖稟而受之於天然與天之所以為天者𥘉無餘欠然則性與天道非二體也語其分則當然耳道體無為也人心則有動焉而萬事萬物人倫物理感通變化之機莫不備具而仁義禮智所以立人極也譬之人有是身頭目手足各有攸職而不相亂而身之用乃全性即理也而繼之以康節之語妄意恐出於此未知是否義愈精則言愈難矧以淺陋恐不足以發其藴乞賜詳誨性者道之形體乃擊壤集序中語其意蓋曰性者人所稟受之實道者事物當然之理也事物之理固具於性但以道言則沖漠散殊而莫見其實惟求之於性然後見其所以為道之實𥘉不外乎此也中庸所謂率性之謂道亦以此而言耳來諭所云自是胡氏知言之意與此不相關也或者曰易傳曰雖無邪心苟不合正理皆妄也乃邪心也誼舊常疑此語以為離邪即歸於正所謂間邪存其誠非間邪之外别有誠可存也但間邪則誠自存矣後來方覺看得不精元不曽實體得只是將言誠尋求所以草草如此夫莊敬持飬此心既存亦可謂之無邪心矣然知有未至理有未窮則於應事接物之際不能處其當則未免於紛擾而敬亦不得行焉雖與流放而不知者異然苟不合正理則亦未免為妄與邪心也故致知所以為大學之首與其用力之次第則先生所作大學傳所引程子遊氏胡氏之言數條是也但莊敬持飬又其本耳近來學者多説萬理具於心苟識得心則於天下之事無不得其當而指致知之説為非其意大率謂求理於事物則是物外誼竊謂知者心之所覺吾之所固有蓋太極無所不該而天下未嘗有心外之物也惟其汨於物欲亂於氣習故其知乃始蔽而不明而敬以持之思以通之者亦曰開其蔽以復其本心之知耳程子曰凡一物有一理須是窮致其理者豈皆窮之於外哉在物為理處物為義所以處之者欲窮其當則固在我矣程子曰致思如掘井𥘉有渾水久後稍引動則清者出來人思慮始皆溷濁久自明快矣所謂渾水與明決非自外來蓋亦開其蔽而本心之明漸見耳此心分量之大而運用之無窮豈一事一物之所能該一事適其當他日或未然則亦不得為心正必也如程子所謂覺悟貫通於天下萬物之理無一毫之不盡則義精而用妙始可以言盡心知性矣不知或者識心之説豈一超直入者乎所論易傳無妄之説甚善但所謂雖無邪心而不合正理者實該動靜而言如燕居獨處之時物有來感理所當應而此心頑然固執不動則雖無邪心而只此不動處便非正理又如應事接物處理當如彼而吾所以應之者乃如此則雖未必出於有意之私然只此亦是不合正理既有不合正理則非邪妄而何恐不可專以莊敬持飬此心既存為無邪心而必以未免紛擾敬不得行然後為有妄之邪心也所論近世識心之弊則深中其失古人之學所貴於存心者蓋將推此以窮天下之理今之所謂識心者乃欲恃此而外天下之理是以古人知益崇而禮益卑今人則論益高而其狂妄恣睢也愈甚得失亦可見矣或者曰立人之道曰仁與義謂仁義二字包括人道無遺然而仁難言也嘗即聖賢言心處及程子講論及此者觀之亦隨有所見比因讀程子曰心譬如穀種生之性便是仁陽氣發處乃情也此語以身體之似有省處而後於聖賢之言與程子之説似可類推夫仁者天理之統體而存乎人者蓋心德之合而流動發生之端緒也心之具衆理猶穀種之包容生意而其流動發生之端即此謂生之性故曰惻隱之心仁之端而元者善之長也夫穀之生而苗長而秀成而實根條花葉形色臭味各有定體不可相錯然莫不根於種而具於生之性譬之萬事萬物之理父子之親君臣之義以至於屣履之微語默之暫亦皆有為當然不易之理莫不根於心而具於流動發生之端此義之名所以立而體用所以兼備也故曰理一而分殊蓋循其用則散殊雜擾變化無窮而大本一原𥘉不二也只此二者包括人道巳盡然人之有是身即有自私之蔽心既不宰而情為之主發不以正而人之生道息焉故斯須之間有不存則君子之不仁者有矣蓋須是於統體上看其發用一出於天理之公而無人欲之私以亂之事事物物莫不皆然始為盡人之道夫子未嘗許人以仁者如此所論仁字大槩近之而以發生流動之端緒為仁則是孟子所謂惻隱之心程子所謂陽氣發處皆指情而言之不得為仁之體矣又所謂事物之理皆具於流動之端然後見義之名所以立而體用所以兼備此語亦似微有義外之病大抵仁字專言之則混然而難名必以仁義禮智四者兼舉而並觀則其意味情狀互相形此乃為易見蓋人之性皆出於天而天之氣化必以五行為用故仁義禮智信之性即水火金木土之理也木仁金義火禮水智各有所主獨土無位而為四行之實故信亦無位而為四德之實也仁義禮智同具於性而其體渾然莫得而見至於感物而動然後見其惻隱羞惡辭遜是非之用而仁義禮智之端於此形焉乃所謂情而程子以謂陽氣發處者此也但此四者同在一處之中而仁乃生物之主故雖居四者之一而四者不能外焉此易傳所以有偏言則一事專言則包四者之説固非獨以仁為性之統體而謂三者必巳發而後見也大抵仁義禮智性也惻隱羞惡是非辭遜情也心則統乎性情者也以此觀之則區域分辨而不害其同脈絡貫通而不害其别庶乎其得之矣答方賔王前書所喻思索皆甚精密不敢草草奉報嘗遍以示諸來學者使各以意條析之近方略為刋訂欲因婺女便人轉以寄呈而臨行適病不能料理簡書令人檢尋不復可得方以為撓而後問適至欲追思録寄而心氣衰弱如墯渺茫不復可得今姑據所見略具别𥿄幸一觀之有所未安却望報及性者道之形體乃擊壤集序中語其意若曰但謂之道則散在事物而無緒之可尋若求之於心則其理之在是者皆有定體而不可易耳理之在心即所謂性故邵子下文又曰心者性之郛郭也以此考之所論之得失可見矣人之應事有不出於意欲之私而但以不見義理之當然遂陷於不正者多矣董子所謂以善為之而不知其義是以𬒳之空言而不敢辭者正為此耳恐不必專以此心之存為無邪心敬不得施然後為有邪心也心固不可不識然靜而有以存之動而有以察之則其體用亦昭然矣近世之言識心者則異於是蓋其靜也𥘉無持飬之功其動也又無體驗之實但於流行發見之處認得頃刻間正當底意思便以為本心之妙不過如是擎夯作弄做天來大事看不知此只是心之用耳此事一過此用便息豈有只據此頃刻間意思便能使天下事事物物無不各得其當之理耶所以為其學者於其功夫到處亦或小有效驗然亦不離此處而其輕肆狂妄不顧義理之弊巳有不可勝言者此真不可以不戒然亦切勿以此語人徒增競辨之端也仁義禮智性也體也惻隱羞惡辭遜是非情也用也統性情該體用者心也今曰流動發生之端即所謂生之性又曰萬事之理莫不具於流動發生之端此義之名所以立而體用所以兼備似未安也蓋孟子所謂四端即程子所謂陽氣發處不當以是為性而義之名則自其未發之時固巳立矣羞惡之心則其發見之端也所示諸説皆詳密足見用功之深其論天下無心外之物一條尤善鄙意所未安者只此數處爾諸人所辨雖不可見然其大槩具於此矣或有未安却望疏示答方賔王前書下詢數條類皆精當敬夫未發之云乃其𥘉年議論後覺其誤即巳改之但舊説巳傳學者又不之察便加模刻為害不細往時常别為編次正為此耳然誤本先行此本後出遂不復售甚可恨也赤子之心伊川先生最後一書言之甚詳蓋人心莫不有未發之時不但赤子為然而赤子之心亦莫不有巳發之時不得專指為未發也衛輒之事遺書中亦有兩句與胡傳相似劉質夫所録明道先生語胡蓋祖其意而不悟其失之毫釐之間也此事舊嘗疑之近日亦方與朋友説及得來示適契鄙懷知閲理之不苟也其他無可疑者恨未得靣講耳答方賔王前書所論大學論語大槩皆得之但大學次序亦謂學之本末終始無非巳事但須實進得一等方有立腳處做得後假功夫真有效驗爾非謂前假功夫未到即都不照管後假而聽其自爾也聞道方是理會得為人底道理從此實下功夫更有多少事豈可便謂都無餘事但到此地即所見不差真有廣居可居正位可立大道可行向上自然有進步處耳答方賔王熹前日看所寄易説不子細書中未敢察察言之遣書後歸故居道間看得兩册始見其底藴如言四象及先天次序皆非康節本指其他亦多杜撰如九轉圖引魏伯陽參同契張平叔悟真篇尤為無理亦自不曉參同契中所説道理可惜用許多功夫都不濟事大抵易之一書最不易讀而今人喜言之正所謂畫鬼神者殊不知只是瞞得不會底於自巳分上成得何事而世人自有曉得者亦不可得而欺也熹向來作啓蒙正為見人説得支離因竊以謂易中所説象數聖人所巳言者不過如此今學易者但曉得此數條則於易略通大體而象數亦皆有用此外紛紛皆不須理會矣聞巳見之嘗試推考自當見得其第二篇論太極兩儀四象之屬尤精誠得其説則知聖人畫卦不假纎毫思慮計度而所謂畫前有易者信非虛語也然此書所論彼書之失幸勿語人又生競辨區區但恐老兄或信其説而講求之則枉費功夫故專附此奉報爾答方賔王沈君易書詞太汗漫讀之多所未解不敢遽下語其間揲蓍右手餘五之説甚新而整似若有理但恐不可謂之歸竒尚有可疑耳易於六經最為難讀穿穴太深附會太巧恐轉失本指故頃嘗為之説欲以簡易通之然所未通處極多未有可下手處只得闕其所不知庶幾不至大差繆耳答方賔王所寄易説却以上內諸疑義所得甚多其未安者亦各附巳意於其下并此封內幸更詳之前書所論易説巳詳然匆匆尚多未盡大抵多是未得古人正意而好自立説此今世讀書者之通病也視其所以一章誼謂所以所為也天理人欲同行異情所為雖曰善矣抑不知其意之所發為利乎為義乎所為合於義所發亦以義則固善矣又當察其平日所存所守果一出於正乎至是則亦盡觀人之法矣范氏曰視其所以知其用心之邪正觀其所由考其所行之歸趣疑倒説了察其所安正是察其所由之安與不安若其為善如惡惡臭如好好色則居之安矣范氏之説誠未當也學而不思則罔一章誼竊意學謂視聖賢所言所行而效之也思謂研窮其理之所以然也徒學而不窮其理則罔罔謂昏而無得則其所學者亦粗迹爾徒思而無踐行之實則殆殆謂危而不安則其所思者亦虛見爾學而思則知益精思而學則守益固學所以致廣大思所以盡精微學不專於踐履如學以聚之正為聞見之益而言知之為知之一章誼謂學者之於義理於事物以不知為知用是欺人或可矣本心之靈庸可欺乎但知者以為巳知不知者以為不知則雖於義理事物之間有不知者而自知則甚明而無蔽矣故曰是知也以此真實之心學問思辨研究不舍則知至物格心正意誠之事可馴致也夫子以是誨子路真切要哉此意言之若易而於學者日用間關涉處甚多要當步步以是省察則切身之用蓋無窮也此説甚善德不孤一章按程子自有二説曰各以類聚曰與物同曰為善者以類應有朋自逺方來此一説也曰一德立而百善從之至德盛後自無窒礙左右逢其原此又一説也南軒云善言之集良朋之來與夫天下歸仁是亦不孤而巳則是兼用程子二説不知如何德不孤易中所説與論語不同德盛逢原者易之説也善以類應者論語之説也各指所之不可兼用􅃮雕開吾斯之未能信一章誼謂天理精微深妙無窮惟知至物格者然後能盡之苟有一毫未盡則心體未能周流而無滯也其於事物之間能自保其應之而必當乎信者理之全體實有諸巳而無不盡之謂􅃮雕開所見甚大而不肯安於小自察甚精而不容以自欺則其立志之宏而進道之勇何可量哉比夫子所以悅之此一章語意駁雜多病更加玩索為佳不念舊惡一章不知舊惡為何事怨是用希不知怨是人怨巳或巳怨人如蘇氏説則指意皆明又不知可以為據否程子不明説舊惡竟未知此章之所指歸也舊惡是他人前日之過如其冠不正之類前日雖巳望望然去之然今日正冠而來則取其改過而不念前日之過矣夫子為衛君一章誼謂本意只是衛君以父子爭國夷齊以兄弟讓位類而言之則輒之罪著矣楊氏辨論最為詳盡但輒之罪則在據國拒父無父子之義而叔齊雖有父命乃以天倫為重而逃去之則以叔齊當輒輒之罪何所容於天地間乎似不必引郢以為説冉有之問其不為郢發也明矣其後説為勝然所謂輒乃先君之命者按左氏靈公嘗欲立公子郢矣輒乃郢讓之夫人立之不知此言别有所據否如所謂蒯聵以父爭輒便合避位國人擇宗室之賢者立之斯為至當然猶疑輒之逃避當在靈公既薨而夫人欲立之時如此則庶乎叔齊之風焉不知是否此説甚善吾無隱乎爾一章誼謂聖人之作止語默無非教也唯聖人然後能之蓋聖人全體是此理無物不體無時不然也故以此語二三子亦道其實爾若如謝氏楊氏之説則是我與二三子共此理其仰觀俯察與夫百姓日用者莫非此理之流行則恐舉物而遺其則將有運水般柴揚眉瞬目之意矣不知如何亦善子路問事鬼神一章誼謂由聚散故有生死由幽明故有人鬼而所謂理則無有聚散幽明之異也學者求盡乎理可也盡乎事人之理則鬼神之理不外是知其所以生則死之理可見亦即其著見者而致其知實其行而巳不然將求諸恍惚茫昧之域終亦不知焉耳矣亦善然事人之道未易盡所以生者亦未易知也不踐迹一章程子謂循塗守轍不知塗轍為何也張子所謂成法不知何者為成法未有以見其所指之實也循塗守轍猶言循規蹈矩云爾仲弓問焉知賢才而舉之一章程子曰人各親其親然後不獨親其親又云便見仲弓聖人用心之大小推此義則一心可以興邦一心可以喪邦只在公私之間而巳反覆思之未得其説乞略示梗槩人各舉其所知則天下之事無不舉矣不患無以知天下之賢才也興邦喪邦蓋極言之然必自知而後舉之則遺才多矣未必不由此而喪邦也語子貢一貫之理誼謂五當百行人倫物理紛紜雜楺不可名狀是可謂有萬而不同者矣然一體該攝乎萬有而萬殊歸乎一原循其本而觀之則固一矣即其用而驗之則是其本行乎事物之間斯所謂一以貫之者也聖人生知固不待多學而識學者非由多學則固無以識其全也故必格物窮理以致其慱主敬力行以反諸約及夫積纍既久豁然貫通則向之多學而得之者始有以知其一本而無二矣子貢致知之功巳至其於事物之間灼然知天理之所在而不疑特未究夫一之為妙爾夫子當其可而問之發其疑而告之故能聞言而悟不逆於心觀夫子於曽子之外獨以告子貢則其不躐等而施者抑可見矣諸儒以多學為病者不知其意如何此説亦善答方賔王間中頗得講學之友否比來道術分裂人自為師真胡公所謂人人各説一般見解誑嚇衆生者勢方橫流力不能遏可歎答方賔王間中想不廢玩索因書時有以見警幸甚幸甚此亦有一二學者然極難得頴悟之質又肯耐煩用力者不絶如線甚可慮也年來目盲愈甚它病亦多殊憒憒無好况思復見賢者深講所聞而不可得奈何奈何比雖巳拜祠官之命然辭職未報尚此憂懼萬一未遂更須力請耳浙中聞頗有船粟可濟民食不知比來氣象復如何外廷諸人不易扶持得且如此如鄭輔之輩尚可望也向上一節則逺方不得而聞矣間退之人雖不敢復發口然畎畝之憂不能忘也答方賔王病中却於詭偽舊聞看得轉覺簡約精明非昔時比恨不得相與講之也周髙二君恨未之識近覺朋友未説見得如何且是做工夫未入腔窠所以茫茫然終日無進步處非但新學小生為然也楊丞文字纍年以病不暇今年又文字然念其事與今日議論無干涉欲留其人草成遣還而去年病亟時去失所寄行狀不免却令且回令别寫附來也知其練事勤職甚慰人意頃一再試郡更無人可使始知人才難得若不加意收拾緩急真無可恃也常平之積所在空虛無以為水旱之備此誠可慮然去年只緣和糴故樂土亦為凶歲此又未有可為之時也不知幕府之議何以處此耶答方賔王病軀雖幸小康然亦未能輕健老境益侵而德學不進朋友間亦未見卓然可望以為永久之託者甚可懼也答方賔王􅈤辭遂請深荷上恩第孤迹殊未可保且得私義少安俯仰無愧它則不暇計爾舊書讀之覺得平淡著實中意味愈長亦有一二朋友漸知路徑間中少足自慰也但時論咄咄逼人一身利害不足言政恐坑焚之禍遂及吾黨耳答方賔王德聞知有進處甚善此亦賢者切磋之力但不知時論既爾能不退轉否耳周南仲書來甚勤然覺得安排凖擬之意多而無驀直向前之氣若一向如此遲回擔閣恐難得入頭處也所喻􅉼飬本原之功誠易間斷然才覺得間斷便是相續處只要常自提撕分寸積纍將去久之自然接續打成一片耳講學功夫亦是如此莫論事之大小理之淺深但到目前即與理會到底久之自然浹治貫通也答陳師德熹愚不肖早嘗涉學歲月逝矣老大無聞靜循𥘉心每自愧歎過承下問其何以稱厚意之辱然嘗聞之程夫子之言曰􅉼養須是敬進學則在致知此二言者實學者立身進步之要而二者之功蓋未嘗不交相發也然夫子教人持敬不過以整衣冠齊容貌為先而所謂致知者又不過讀書史應事物之間求其理之所在而巳皆非如近世荒誕怪譎不近人情之説也左右玩意之久於此蓋必巳深有得矣更碩勉旃而無或怠焉則亦何事於他求哉抑讀書之法要當循序而有常致一而不懈從容乎句讀文義之間而體驗乎操存踐履之實然後心靜理明漸見意味不然則雖廣求慱取日誦五車亦奚益於學哉故程子又曰善學者求言必自近易於近者非知言者也此言殊有味惟困於逺求而無得者知之亦碩左右者之識之也答陳師德示喻格物持敬之方足見鄉道不忘之意甚善甚善持敬正當自此而入至於格物則伊川夫子所謂窮經應事尚論古人之屬無非用力之地若舍此平易顯明之功而必搜索窺伺於無形無迹之境竊恐陷於思而不學之病將必神疲力殆而非所以進於日新矣况聞左右體羸多病尤當完飬思慮毋令過苦成就德器以慰士友之望答吳申所喻從祀曲折乃向者令邸吏於監學畫到如此因問楊廣文元範渠住學久亦云實然遂依本畫之近到都下遍問知識亦皆云爾決不誤也答李周翰熹跧伏纍年不獲以時候問作止區區鄉往蓋不自勝今歲適滿六十而衰病支離無復四方之志恐不復得遂既見之碩矣茲辱惠書三復感歎來喻諄復益見謙光又愧向來妄論之率爾也然是非得失之間正當精察而明辨或者內實安於舊習而陽為是言則非熹之愚所望於髙明也無由靣論臨書浩歎答李周翰示喻縷縷備見本末但原説之辨歲月浸久不復記憶獨髣佛其間頗有陽尊孔子而隂主瞿𥅆之意耳今乃承有未全伏罪之言又恐當時看得不子細也所謂終焉位天地育萬物厚人倫者乃吾道之正亦未見其上文不知盛意之微果何所寄未容遽陳鄙見便中幸復有以教之則雖自顧無關可抽無鑰可啓然亦不敢不披露胸臆以求訂證也答朱飛卿某承先生誨以持敬某自求病痛是氣衰不能勝其怠惰如頭容欲直手容欲恭則時或不能即此便是持敬不純私意已行矣窮理不知其當然今遂欲一一如禮則力困實做不得不知但存之於心而四體則少寬之終可以有得而無害於敬否心無不敬則四體自然收斂不待著意安排而四體亦自舒適矣著意安排則難久而生病矣某比𣣔窮理而事物紛紜未能有灑落處近惟見得冨貴果不可求貧賤果不可逃耳此是就命上理會須更就義上看當求與不當求當避與不當避更看自家分上所以求之避之之心是欲如何且其得喪榮辱與自家義理之得失利害孰為輕重則當有以處此矣先生授以詩傳且教誨之曰須是熟讀某嘗熟讀一二篇未有感發竊謂古人教人兼以聲歌之漸漸引迪故最平易又疑鄭衛之諸詩皆淫聲小學之功未成而遽教以淫聲恐未能使之知戒而適以蕩其心志否抑其聲哀思怨怒自能令人畏惡故雖小子門人亦知戒乎某欲令弟姪輩學詩尚疑此未敢曉以文義詩且逐篇旋讀方能旋通訓詁豈有不讀而自能盡通訓詁之理乎讀之多玩之久方能漸有感發豈有讀一二遍而便有感發之理乎古之學詩者固有待於聲音之助然今巳亡之無可奈何只得熟讀而從容諷味之耳若疑鄭衛不可為法即且令學者不必深究而於正當説道理處子細消詳反復玩味應不枉費工夫也人常有清明昏濁之殊此固是氣稟然心不能不隨氣稟而少異夫口耳目心皆官也不知天賦之氣質不昏明清濁其口耳目而獨昏明清濁其心何也若曰心理本不異惟為氣質所拘而不能自明然夷惠伊尹非拘於氣質者處物之義乃不若夫子之時孟子論三子蓋謂其智不若夫子夫是非之心智也豈三子能充其惻隱羞惡辭遜之心而獨於其是非之心不能充之乎口耳目等亦有昏明清濁之異如易牙師矌離婁之徒是其最清者也心亦猶是而已夷惠之徒便是未免於氣質之拘者所以孟子以為不同道而不碩學也孟子盡其心者知其性也盡心之説當時見得如此故以為意誠之事後來思之似只是知至之事當更尋舊説考之下文且只平看不必以所以二字為關鍵也改踐形説人皆有是形便有是理故曰形色天性也性即理之謂也然衆人有是形而不能全其形之理故有形雖人而心實禽獸是不足以踐其形矣惟聖人能全其形之理故可以踐其形也伊川先生所謂充人之形充字極分明矣改誠意章説誠意一章來喻似未曉章句中意當云人意之發形於心者本合皆善惟見理不明故有不善雜之而不能實其為善之意今知巳至則無不善之雜而能實其為善之意則又無病矣又善惡之實於中者皆形於外但有為惡之實則其為善也不誠矣有為善之實則無為惡之雜而意必誠矣純一於善而無不實者即是此意未嘗異也答鄭子上可學前此所惠書歸來乃得之所論詳悉此間朋友難得如此會思索者今書所説易中庸亦甚子細今并答去具在别𥿄更熟玩之自見曲折也程氏易傳巳甚詳細今啓蒙所附益者只是向來卜筮一節耳若推廣旁通則離不得彼書也程先生説易得其理則象數在其中固是如此然泝流以觀却須先見象數的當下落方説得理不走作不然事無實證則虗理易差也不知歲暮或春暖能一來否此間難得人講論每深懷想耳答鄭子上所論大槩多得之偶以事出近村不曽帶得書來不及一一奉報其間亦有一二合商量處旦夕當别有便却附書也孟子求放心一條尋常亦草草看了以今觀之真是學問之要不可不留意也答鄭子上所喻人心道心之説比舊益精密矣但常如此虗心精察自然見得舊説是非漸次長進矣甚善甚善今説如云必有道心然後可以用於人心以下數語亦未瑩也所謂守得定方可以致知窮理此説甚當孟子云學問之道無他求其放心而巳豈是此事之外更無他事只是此本不立即無可下手處此本既立即自然尋得路徑進進不巳耳易中占辭其取象亦有來歷不是假説譬喻但今以説卦求之多所不通故不得巳而闕之或且從先儒之説耳論語説巳注在卷中幸更詳之有便復以見喻也二子同往金華或相見幸有以規切之答鄭子上道心之説甚善人心自是不容去除但要道心為主即人心自不能奪而亦莫非道心之所為矣然此處極難照管須臾間斷即人欲便行矣通書等何故不曽寄去今往一本所疑附録數條亦略要見脈絡相連處耳不足深致疑於其間也但第三十六章注中二字當作一字西銘卒章兩句所釋頗未安試更思之如何向來諸書近來整頓愈精密矣只是近處難得學者肯用心耳此道之傳不絶如線甚可憂歎唯冀益加勉厲以副所望答鄭子上此却有數士友相聚然極難得可共學者浙人為功利浸漬壞了腹心尤難説話甚可歎又可懼也答鄭子上所諭大學之疑甚善但覺前日之論頗涉倒置故讀者汨沒不知緊切用功子細看來經文只是就大體規模上推説將來耳非謂實經此漸次等級然後及於格物也故後來頗削舊語意以此耳輔亡不能盡用程子之言故略説破亦無深意也大抵看大學須先緊著精神領略取大體規模却便回來尋箇實下手處著緊用功不可只守著此箇行程節次便認作到頭處也賦題之説若論詩人本意則湛露云云只是興發下句之詞未有他意而説者推以取義則似有今日之論亦不害於義理但露以陽晞猶諸侯稟王命以從事非謂陽盛而露晞如王道盛而諸侯衰滅也治道去泰甚誠出於黃老之意然吾言亦頗有近似者但在用者如何若看得準則定當不可易處然後隨其深淺而不求備焉此則儒者之去泰甚也若一切漫漶十分放倒而曰吾姑去泰甚焉則是詖淫邪遁之詞而非所以為訓矣聖賢惡似而非正為此也尚安得捨吾不可易之權度而徇彼漢儒黃老之餘哉不知子上以為如何趙推書云談義理者多𬒳擯黜不知其間有能及此意者否然此勿以示人恐又生競辨譊譊可憎也别𥿄巳注其下卒章幸深留意也答鄭子上子晦書煩致之或相見間鄊里公共利害告之無嫌也君平之説鄙見正如此南蒯事國語中所記尤詳可檢看也答鄭子上來書所問鬼神二事古人誠實於此處直是見得幽明一致如在其上下左右非心知其不然而姑為是言以設教也後世説設教二字甚害事如溫公之學問雖一本於誠而其排釋氏亦曰吾欲扶教耳此只是看道理不透非獨欺人而并以自欺此大學之序所以必始於格物以致其知也平康正直則來喻得之矣但不知剛克柔克謂自克耶抑謂勝彼耶此上四句須看得有歸著乃無窒礙耳答鄭子上所示論語數條備見别來玩索功夫偶以病中意思昏憒未暇細觀不敢草草奉報此間亦有朋友數人往來講學但久病倦甚無力應酬無以副其逺來之意新舊諸書尚有合整頓處頭緒不一亦以病倦不復能如舊日趲得課程未知何時復得會靣所欲言者無窮臨書徒悵然也答鄭子上此心之靈即道心也道心苟存而此心虛則無所不知而豈特知此數者而止耶此心之靈其覺於理者道心也其覺於欲者人心也昨答季通書語却未瑩不足據以為説使學者於致知上循序而進則凡所謂道德齊禮之類皆舉之矣格物致知乃是就此等實事功夫上窮究非謂舍置即今職分之所當為而泛然以窮事物之理待其窮盡而後意自誠心自正身自修也意不誠則撓亂其心牽連引動無所不至能誠意則心自正意雖不誠心固不可欺此説甚善但不知既謂心不可欺何故却可撓動更請詳之善端無時而不呈露於外又云尚何待於發見哉又云只於居處恭執事敬上用力即天理常存何時而不發見既知善端無時而不呈露則當知無時不有下功夫處不可謂常時都不發見必待其有時發見而後可加功也若如所論只於恭敬上用功夫則又只是存飬之事若便以此為格物功夫則是程先生所謂若但敬而不知窮理却是都無事者矣須知遇事而知其當然即是發見就此推究以造其極即是格物但且如此用功則所謂妄有所指而流於空虛未有所見而苟且自止之病亦不必慮矣知至意誠一假來喻得之舊説有病近巳頗改定矣其他改處亦多恨未能録寄也論易傳易之為書本為卜筮而作然其義理精微廣大悉備不可以一法論蓋有此理即有此象有此象即有此數各隨問者意所感通如利涉大川或是渡江或是涉險不可預為定説但其本指只是渡江而推類旁通則各隨其事論中庸此書從前𬒳人説得髙了更不曽子細推考文意若細讀而深味之其條理脈絡曉然可見非是固欲如此剖析自是并合不聚也如道也者不可須臾離也至故君子謹其獨也若不分作兩假則是故君子云云故君子云云此兩處豈不重復況不可須臾離與莫見乎隱莫顯乎微戒謹恐懼於不睹不聞與謹其獨分明是兩事驗之日用之間理亦甚明只是今人用心粗淺下工不親切故不見其不同耳君子之道四丘未能一焉雖是聖人自責之詞然必其於責人之際反求諸巳而見其於道之全體曲折細微容有不能無不盡處如舜之號泣于旻天之類但當於此負罪引慝益加勉勵而不敢自恕焉耳以此見得古人文字關鍵深密直是不草草依乎中庸慱學審問兩假亦非強為分别如庖丁眼中自是不容有全牛也請更詳之答鄭子上此心之靈其覺於理者道心也其覺於欲者人心也可學蒙喻此語極有開發但先生又云向答季通書語未瑩不足據以為説可學竊尋中庸序云人心出於形氣道心本於性命而答季通書乃所以發明此意今如所説却是一本性命説而不及形氣可學竊疑向所聞此心之靈一假所見差謬先生欲覺其愚迷故直於本原處指示使不走作非謂形氣無預而皆出於心愚意以為覺於理則一本於性命而為道心覺於欲則涉於形氣而為人心如此所見如何中庸序後亦改定别𥿄録去來喻大槩亦巳得之矣告子問性云云解云蓋指血氣知識為性下又云近於後世佛家所謂作用是性之説又云告子謂人之甘食悅色性之自然蓋猶上章知覺運動之意也可學謂甘食悅色固非性而全其天則則食色固天理之自然此説亦是但告子却不知有所謂天則但見其能甘食恱色即謂之性耳告子先云義猶杯棬而下云以人性為仁義其意蓋謂仁義出於本性但下文又指仁為在內疑告子本皆以仁義為外既得孟子説略認責以為內而尚未知其所以愛故猶執義為外告子知所以愛之由乎仁則亦知義之不離乎仁矣仁內義外之説不知告子何以附於食色性也之下可學竊疑告子指食色為性以為由心出故亦略指愛以為在心𥘉意亦只如此看適細推之似亦不以仁為性之所有但比義差在內耳盡心知性云云可學每讀先生書解於文義之間最不草草如君子深造之以道夜氣不足以存他人便不認之以足以兩字先生拈出而一假之意皆全故可學因此每觀書於文義之間一字不敢放過蓋古人文字髙下曲折之間皆其意所寓故於此一假雖先生之説指意明白而竊有疑焉伏乞批示論其理則心為粗而性天為妙論其功夫則盡為重而知為輕故云所謂盡其心者即是知性而知天者也三者只是一時事但以表裏虗實反復相明非有功夫漸次也三者𥘉無分别故又曰存其心養其性所以事天亦言其本一物耳所謂深造夜氣看得甚子細此書近為建陽人販賣甚廣不知有幾人看得此意出來亦可歎耳答鄭子上有子言其為人也孝悌只是言尋常人如此則好犯上者鮮矣其言頗輕下文孝悌其為仁之本言即重蓋世間自有一等孝悌人而不知仁正是由而不知耳然則此一假當於務字立字上著工夫上兩句是説道有本末務本是工夫當於務字立字上著工夫志學一假伊川先生謂聖人未必然亦只是為學者立法先生注中亦取此説又云聖人生知安行非有進為之漸然其乾乾不巳之心未嘗自足則其極至之妙必有日新而又新者故其言如此愚鄙未曉且欲從伊川説如何恐識未至而強求之徒有揣摩料想之病而無確實自得之功聖賢之學非常情所能測依約如此須有與他人不同處耳子謂韶盡美一假先儒皆引征伐以説武王謂其樂聲自不能掩今注云其實有不同亦是指其聲耶或謂其聲雖皆美推原其義則自有不同也美者其功也善者功之所以立即揖遜征伐是也吾道一以貫之一章前注云此皆借學者而言在聖人則至誠無息而萬物各得其所是也忠恕二字本是學者分上事不曽刪去忠也恕也今注去上一句雖云至誠無息萬物各得其所而不明指其為忠也未適如何道醴無二而聖人今改作聖人之心渾然一理而此注是後來改本解釋極明白矣答鄭子上或謂伊川先生令尹子文之忠陳文子之清使聖人為之是仁否先生曰不然聖人為之亦只是清忠先生解云心德全體非事為一節可論但二子之清忠使聖人為之固只是清忠莫亦是仁中之清忠與二子異孔子謂二子之清忠而未仁可學謂二人既未仁則清忠亦未至似此反觀之如何此説得之回也三月不違仁尹氏曰三月言其久若聖人則渾然無間矣可學觀尹氏之意蓋以不違仁與安仁異必則聖人之安仁則無間斷若只如顔子之不違則雖欲無間斷不可非謂不違仁巳至極特有間斷耳又不知尹氏之意果是如此否此説亦得之天生德於豫一章上蔡云使其能害巳亦天也龜山亦然諸家多從之先生解云言必不能違天害巳可學謂衰亂之世氣運差謬福善禍淫容或有失若天理則卓然常在如許盛德必不應殺得故伊川云聖人極能斷致以理伊川説是夫子正意謝楊是推説餘意亦不可不知也泰伯及周之至德此兩假且寬著意思看事殷伐紂事雖不同然其隨時順天則一而巳答鄭子上太極圖曰無極而太極可學竊謂無者蓋無氣而有理然理無形故卓然而常存氣有象故闢闔斂散而不一圖又曰太極動而生陽動極而靜靜而生隂太極理也理如何動靜有形則有動靜太極無形恐不可以動靜言南軒云太極不能無動靜未逹其意理有動靜故氣有動靜若理無動靜則氣何自而有動靜乎且以目前論之仁便是動義便是靜此又何關於氣乎他説巳多得之但此處更須子細耳誠與仁之名所以異者誠自其渾然不動言之而仁則巳流出矣故在濂溪圖誠為太極而通書謂誠無為於圖陽動屬仁於易元屬仁程先生亦謂生之理便是仁推此可見自性言之仁字亦未流出但是其生動之理包得四者其實與誠字所指不同須更辨得分明始得在臨漳問仁公先生曰仁在內公在外可學謂仁然後能公程説則是公然後能仁不知未仁何以能公仁是本有之理公是克巳功夫極至處故惟公然後能仁理甚分明其曰公而以人體之則是克盡巳私之後只就自身上看便見得仁也大學云在止於至善程先生所謂理之精微不可得而名姑以至善目之也文言曰元者善之長也程先生云仁者善之本乃是自發出説與大學非有二善如孟子説性善自情觀之亦是因發以見其善而其本善者固昭然而不可掩也程先生所謂姑以至善目之者乃所以極形容其精微耳所謂精微之不為善而借此以名之也近世諸儒論性往往執此説謂性不可以善名而必欲置之於渾淪茫眛之地乃是粗見其外而不精見於內故其説差此説得之命者天之所以賦豫乎人物也性者人物之所以稟受乎天也然性命各有二自其理而言之則天以是理命乎人物謂之命而人物受是理於天謂之性自其氣而言之則天以是氣命乎人物亦謂之命而人物受是氣於天亦謂之性氣不可謂之性命但性命因此而立耳故論天地之性則專指理言論氣質之性則以理與氣雜而言之非以氣為性命也人生有夀夭氣也賢愚亦氣也夀夭出於氣故均受生而有顔子盜跖之不同賢愚出於氣故均性善而有堯桀之或異然竊疑天地間只是一氣所以為夀夭者此氣也所以為賢愚者亦此氣也今觀盜跖極愚而夀顔子極賢而夭如是則夀夭之氣與賢愚之氣容或有異矣明道志程邵公墓云以其間遇之難則其數或不能長亦冝矣吾兒其得氣之精一而數之局者歟詳味此説氣有清濁有短長其清者固所以為賢然雖清而短故於數亦短其濁者固所以為愚然雖濁而長故其數亦長不知果然否此説得之貴賤貧富亦是如此但三代以上氣數醇濃故氣之清者必厚必長而聖賢皆貴且夀且富以下反是儒釋之異儒釋之異正為吾以心與理為一而彼以心與理為二耳然近世一種學問雖説心與理一而不察乎氣稟物欲之私故其發亦不合理却與釋氏同病又不可不察和靖論敬以整齊嚴肅然專主於內上蔡專於事上作工夫故云敬是常惺惺法之類謝尹二説難分內外皆是自巳心地功夫事上豈可不整齊嚴肅靜處豈可不常惺惺乎君子親親而仁民仁民而愛物然謂之愛物則愛之惟均今觀天下之物有二等有有知之物禽獸之類是也有無知之物草木之類是也如數罟不入汙池不麛不卯不殺胎不夭夭聖人於有知之物其愛之如此斧斤以時入山林木不中伐不鬻於市聖人於無知之物亦愛之如此如佛之説謂衆生皆有佛性故專持不殺之戒似若愛矣然髙宫大室斬刈林木則怙不加恤愛安在哉竊謂理一而分殊故聖人各自其分推之曰親曰民曰物其分各異故親親仁民愛物亦異佛氏自謂理一而不知分殊佛氏未必知理一但借此言但指血氣言之故混人民物為一而其他不及察者反賊害之此但據其異言之若吾儒於物竊恐於有知無知亦不無小異蓋物雖與人異氣而有知之物乃是血氣所生與無知之物異恐聖人於此須亦有差等如齊王愛牛之事施於草木恐又不同此説得之天地之間有理有氣理常不移而氣不常定中庸曰大德必得其名必得其位必得其夀理固當如此然孔子無位顔子夭死蓬蓽之士固有老死而名不著者豈非氣使之然耶故君子道其常而不道其非常然竊疑理先而氣後今理既不足以勝氣則凡福善禍淫之説不驗常多何以為天地之常經意謂氣雖不同然亦隨世而異堯舜禹以聖人在上天下平治以和召和則氣亦醇正而隨於理如春秋戰國之時刑殺慘酷則氣亦隨之而變而理反不能勝此處亦當關於人事否此於前假論性命處巳言之矣雖是所感不同亦是元氣薄耳答鄭子上誠仁天下之理一而巳然誠體也仁義禮智皆在其中仁用也與禮義智皆為誠中之一理仁為生動之理包含義禮智則又合為一全理又只是誠之推耳理一也以其實有故謂之誠以其體言則有仁義禮智之實以其用言則有惻隱羞惡恭敬是非之實故曰五常百行非誠非也蓋無其實矣又安得有是名乎性命若生而知之者渾然盡善則氣自氣理自理兩不相關又必説氣質自生知而下雖是天理無虧然却繫於氣氣清而理明氣濁則理晦二者常合故指為氣質之性言此理視氣以為進退非以氣質亦為性命也生而知者氣極清而理無蔽也學知以下則氣之清濁有多寡而理之全缺繫焉耳儒釋前承所答云吾以心與理為一彼以心與理為二亦非固欲如此乃是其所見處不同彼見得心空而無理此見得心雖空而萬物咸備也雖説心與理一而不察乎氣稟物欲之私亦是見得不真故有此病此大學所以貴格物也敬得批教反覆思繹乃知只有動靜之異而無內外之别又云二人亦各就一處言之敬字工夫乃聖門第一義徹頭徹尾不可頃刻間斷子上於講論處儘詳密却恐此處功夫未到所以不甚精明於巳分無得力處須更於此子細著力以固根本為佳答鄭子上近修何業因來幸語及也此間夏間精舍有數朋友自熹避地入山遂皆散去今則其室久虗蓋火色如此想彼自不敢來此亦不敢碩其來也間中看得舊書一過有所未安隨筆更定恨相去逺不得相與討論也答鄭子上病中不敢勞心看經書間取楚詞遮眼亦便有無限合整理處但恐犯忌不敢形𥿄墨耳因思古人是費多少心思做下此文字只隔一手便無人理會得深可歎息也所編左氏文字如何若有人寫旋寫得數假來亦幸甚也病中不敢出門巳纍月精舍亦鞠為茂草塊坐無晤語偶便附此臨風依然晦庵先生朱文公文集卷第五十六終考異答前日看所寄易説云云先天次序序一作第答鄭子上既知善端無時而不呈露云云苟且自止苟且一作流於福州府儒學訓導鄭璉校正
