front:
  text: 晦庵先生朱文公文集卷第五詩
  hash: sha256:ed5dd3971af102740d44ab8a636a5dc3d3024b7eac301a22468be59d8168d295
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0226_SBCK_005-1a}
body:
  text: 拜張魏公墓下衡山何巍巍湘流亦湯湯我公獨何往劒履在此堂念昔中興𥘉孽豎倒冠裳公時首建義自此扶三綱精忠貫宸極孤憤摩穹蒼元戎二十萬一旦先啓行西征奠梁益南轅撫江湘士心旣䂊附國威亦張皇縞素哭新宫哀聲連萬方黠虜聞禠魄經營久徬徨玉帛驟往來士馬且伏藏公謀適不用拱手遷南荒白首復來歸髪短丹心長拳拳冀感格汲汲勤修攘天命竟難諶人事亦靡常悠然謝台鼎騎龍白雲郷坐令此空山名與日月彰千秋定軍壘岌嶪遥相望賤子來歳隂烈風振高岡下馬九頓首撫膺淚淋浪山頽今㡬年志士日慘傷中原尚腥羶人類㡬豺狼公還浩無期嗣德煒有光恭惟宋社稷永永垂無疆敬簡堂分韻得月字煌煌定方中農隙孟冬月君侯敞齋扉華榜新未掲我來適玆時亦有大夫茇清觴不留行晤語得超越更㸔雷雨勢翻動龍蛇窟襟懐頓能輸肝膽亦已竭老仙來何方湖海氣硉矹君侯歛𬒮起顚越承屨襪坐人驚創見引去殊卒卒伊余不忍逝頓首願有謁人生均秉彛天造豈停歇云何利害判所較無一髪兹焉辨不早大本將恐蹷吾言實自箴君聽未宜忽登嶽麓赫㬢臺聮句乾道丁亥冬九日泛舟長沙渚振䇿湘山岑晦翁煙雲眇變化宇宙窮高深懷古壯士志憂時君子心敬夫寄言塵中客莾蒼誰能尋晦翁登定王臺寂寞番君後光華帝子來千年餘故國萬事只空臺日月東西見湖山表裏開從知爽鳩樂莫作雍門哀次敬夫登定王臺韻今朝風日好抱病起登臺山色愁無盡江波去不回客懐元老草節物又踈梅且莫催歸騎憑欄更一杯七日發嶽麓道中㝷梅不獲至十日遇雪作此自此後係南嶽唱酬三日山行風繞林天寒歲暮客愁深心期巳悞梅花笑急雪無端更滿襟大雪馬上次敬夫韻仙人喬嶽頂散髪吹參差喚我二三友集此西南垂列筵命洛公侑坐迎江妃導之千羽旄投以萬璧璣􅌭紛一何麗晻靄難具知衆眞亦來翔恍覺叢霄低茫茫雲霧合一一瓊瑶姿回首謝世人千載空相思吾衰怯雄觀未敢探此竒短衣一匹馬幸甚得所隨天寒飲我酒酒罷賡君詩人生易南北復此知何時風雪未巳決䇿登山用敬夫春風樓韻披風蘭臺宫看雨百常觀安知此山雲對靣隔霄漢群隂匝寰區密雪渺天畔峩峩雪中山心眼悽欲㫁吾人愛竒賞遞發臨河嘆我知沍寒極見睍今當泮不須疑吾言第請視明旦蠟屐得鴈行籃輿或魚貫十三日晨起霜晴前言果驗再用敬夫定王臺韻賦詩北渚無新夢南山有舊臺端能成獨往未肯遽空回磴滑新經雪林深不見梅急須乘霽色何必散銀杯敬夫用熹定王臺韻賦詩因復次韻新詩通造化催出火輪來雲物低南極江山接漢臺心期千古逈懐抱一生開回首狂馳子紛紛政可哀馬上口占次敬夫韻㡬日城中歌酒昏今朝匹馬向烟村迎人况有南山色勝處何妨倒一尊馬上舉韓退之話口占昨日風煙接混茫今朝紫翠挿青蒼此心元自通天地可笑靈宫枉炷香雪消溪漲山色尤可喜口占頭上瓊岡出舊青馬邊流水漲寒汀若爲留得晶瑩住突兀長看素錦屏馬跡橋下馬驅車過野橋橋西一路上雲霄我來自有平生志不用移文逺見招登山有作次敬夫韻晚峯雲散碧千尋落日衝颷霜氣深霽色登臨寒夜月行藏只此驗天心方廣道中半嶺小憇次敬夫韻不用洪崖遠拍肩相將一笑俯寒烟向來活計蓬蒿底浪說江湖極目天道中景物甚勝吟賞不暇敬夫有詩因次其韻穿林踏雪覔鍾聲景物逢迎歩歩新隨䖏留情隨處樂未妨聊作苦吟人崖邊積雪取食甚清次敬夫韻落葉踈林射日光誰分殘雪許同嘗平生願學程夫子恍憶當年洗俗腸後洞山口晚賦日落千林外烟飛紫翠深寒泉添壑底積雪尚崖隂景要吾人共詩留永夜吟從教廣長舌莫盡此時心後洞雪壓竹枝横道石灘聮騎雪垂垂巳把南山入小詩後洞今朝逢折竹却思聮騎石灘時方廣奉懐定叟偶來石廪峯頭寺忽憶畫船齋裏人城市山林雖一致不知何處是真身方廣聖燈次敬夫韻神燈照夜惟聞說皓月當空不用㝷箇裏忘言眞所得便應從此正人心羅漢果次敬夫韻目勞足倦登喬嶽吻燥腸枯到上方從遣山僧煑羅漢未妨分我一盃湯壁間古畫精絶未聞有賞音者老木樛枝入太隂蒼崖寒水㫁追尋千年粉壁塵埃底誰識良工獨苦心方廣版屋秀木千章倒層甍萬瓦差悄無人似玉空詠小戎詩泉聲次林擇之韻空巖寒水自悲吟遥夜何人爲賞音此日團欒都聽得他時離索試追㝷霜月次擇之韻蓮花峯頂雪晴天虚閣霜清絶縷烟明發定知花䔩䔩如今且看竹娟娟枯木次擇之韻百年蟠木老聱牙偃蹇春風不肯花人道心情頑似汝不須持向我儂誇夜宿方廣聞長老守榮化去敬夫感而賦詩因次其韻拈椎竪拂事非眞用力端須日日新只麽虚空打筋斗思君辜負百年身蓮花峯次敬夫韻月暁風清墮白蓮世間無物敢争妍如何今夜峯頭雪撩得新詩續舊篇奉題張敬夫春風樓乾道丁亥冬至隆堂謹前䂓傑閣聳竒觀慿欄俯江山極目眇雲漢主人沂上翁顧肯吟澤畔俛仰一喟然冲融無間斷我來抑何幸屢此承晤歎平生滯吝胸􅒂若層氷泮繼今兩切切保合勤旦旦萬事儘紛綸吾道一以貫方廣睡覺次敬夫韻風簷雪屋澹無情巧作寒窓静夜聲倦枕覺來聽不㫁相看渾欲不勝清感尚子平事翩然逺嶽恣遊行慨想當年尚子平我亦近來知損益只將懲窒度餘生殘雪未消次擇之韻脚底悲風舞凍鴉此行眞是躡蒼霞仰頭若木敷瓊蘂不是人間玉樹花自方廣過高臺次敬夫韻素雪留清壁蒼霞對赤城我來隂壑晚人說夜燈明貝葉無新得蒲人有舊盟咄哉寜負汝安敢負吾生清疑當作青石廪峰次敬夫韻七十二峰都挿天一峰石廪舊名傳家家有廪高如許大好人間快活年行林間㡬三十里寒甚道傍有殘火温酒舉白方覺有暖意次敬夫韻千林一路雪毰堆吟㫁飢腸第幾回温酒正思𫾣石火偶逢寒燼得傾杯林間殘雪時落鏘然有聲青鞋布襪踏瓊瑶十里晴林未覺遥忽復空枝墮殘雪恍疑鳴璬落叢霄至上封用擇之韻疇昔朱陵洞如今白帝城天高雲共色夜永月同明萬象爭回巧千峰盡乞盟登臨須我軰更約羡門生福嚴寺回望嶽市昨夜相携看霜月今朝誰料起寒烟安知明日千峰頂不見人間萬里天福嚴讀張湖南舊詩樓上低回摻別袖山中磊落見英姿白雲未屬分符客巳有經行到處詩登祝融峰用擇之韻今年縁底事浪走太無端直以心期逺非貪眼界寛雲山於此盡風袂不勝寒孤鳥知人意茫茫去不還穹林閣讀張湖南七月十五夜詩詠歎乆之因次其韻南嶽天下鎮祝融最高峰仰干幾千仞俯入一萬重開闢知何年上有釋𣑽宫白日照雪屋清霄響霜鏞極知瓌特觀仙聖情所鍾雲根有隱訣讀罷凌長風晚霞日落西南第幾峰㫁霞千里抹殘紅上方傑閣凭欄處欲盡餘暉怯晚風過高臺携信老詩集夜讀上封方丈次敬夫韻十年聞說信無言草草相逢又黯然借得新詩連夜讀要從苦淡識清妍贈上封諸老夜宿上封寺翛然塵慮清月明殘雪裏泉溜隔窓聲楮衲今如許綈袍那復情爐紅虚室暖聊得話平生自上封登祝融峰絶頂次敬夫韻衡嶽千仞起祝融一峰高群山畏突兀犇走如曹逃我來雪月中歷覽快所遭捫天滑青壁俯壑崩銀濤所恨無十犗一掣了六鼇遄歸青蓮宫坐對白玉毫重閣一徙倚霜風利如刀平生山水心眞作貨食饕明朝更清澈再往豈憚勞中宵撫世故劇如千蝟毛嬉遊亦何益歲月今滔滔起望東北雲茫然首空搔十五日再登祝融用臺字韻江流圍玉帶天影抱瓊臺柱杖烟霄外中巖日月回箕山藏遁許呉市隱仙梅一笑今何在相期再舉杯胡丈廣仲與范伯崇自嶽市來同登絶頂舉酒極談得聞比日講論之樂我巳中峰住君從何處來莫留巖底寺徑上月邊臺濁酒團欒坐高談次第開前賢渺安在清酹寄餘哀醉下祝融峰作我來萬里駕長風絶壑層雲許盪胸濁酒三杯豪氣發朗吟飛下祝融峰十六日下山各賦一篇仍迭和韻絶頂來還晚寒窓睡逹明連床眇歸思三宿悵餘情雲合山無路風回雪有聲嶽祗珍重意只此是將迎和敬夫韻蠟屐風煙隨處别下山人事一畨新世間不但山中好今日方知此意眞和擇之韻仰止平生舊今年得得來舉頭天一握倚杖雪千堆講道心如渴哦詩思湧雷出山遺語在歸騎莫徘徊二詩奉酬敬夫贈言并以爲别我行二千里訪子南山隂不憂天風寒况憚湘水深辭家仲秋旦稅駕九月初問此爲何時嚴冬歲云徂勞君歩玉趾送我登南山南山高不極雪深路漫漫泥行復㡬程今夕宿櫧洲明當分背去惆悵不得留誦君贈我詩三歎增綢繆厚意不敢忘爲君商聲謳昔我抱氷炭從君識乾坤始知太極藴要眇難名論謂有寜有跡謂無復何存惟應酬酢處特逹見本根萬化自此流千聖同兹源曠然逺莫禦惕若𥘉不煩云何學力㣲未勝物欲昏涓涓始欲逹巳𬒳黄流吞豈知一寸膠救此千丈渾勉哉共無斁此語期相敦讀林擇之二詩有感自此後係東歸亂藳筍輿隨望入寒烟每誦君詩輒黯然今夜定知連榻夣一時飛墮錫山前竹輿傲兀聽嘔啞合眼歸心巳到家逰子上堂慈母笑豈知行李尚天涯馬上贈林擇之與君歸思渺悠哉馬上看山首共回認取山中竒絶處他年無事要重來梅溪陂下作野牛浮鼻過寒溪落木萷槮水下陂俗手定應摹不得無人說與范牛知寄題李東老淵乎齋東老幽棲地淵乎亦妙哉空山無客到流水有花開句律今誰敵詩仙舊所陪朱絃悄餘韻綺席澹浮埃竟日門多掩長沙歲一來端能負猿鶴歸計莫徘徊宿梅溪胡氏客舘觀壁間題詩自警二絶貪生莝豆不知羞􅌤靣重來躡俊遊莫向清流浣衣𬒮恐君衣𬒮涴清流十年湖海一身輕歸對黎渦却有情世路無如人欲險㡬人到此誤平生擇之所和生字韻語極警切次韻謝之兼呈伯崇不是譏訶語太輕題詩只要警流情煩君屬和増危惕虎尾春氷寄此生再答擇之兢惕如君不自輕世紛何處得關情也應妙敬無窮意雪未消時草巳生十一月二十六日宿萍鄕西三十餘里黃花渡口客舍稍明㓗有宋亨伯題詩亦頗不俗因録而和之鼎足爐邊坐陶然共一樽道心元自勝世味不湏論安穩三更睡清明一氣存雖無康樂句聊爾慰營魂二十七日過毛山鋪壁間題詩者皆言有毛女洞在山絶頂問之驛吏云狐魅所爲耳因作此詩人言毛女住青冥散髪吹簫夜夜聲却是郵童觧端的向儂說是野狐精次擇之韻聊紀秦事不知四海巳揚湯舞殿歌臺樂未央五帝威神等牛馬六王子女盡嬪嬙仙心乆巳攀姑射辨口從教泣華陽行客詎明千古意虚疑霞佩響琳琅雪梅二闋奉懷敬夫二闋合次樂府以有後詩仍舊編附此雲垂幕隂風慘淡天花落天花落千林瓊玖一空鸞鶴征車渺渺穿華薄路迷迷路増離索増離索剡溪山水碧湘樓閣梅花發寒梢掛著瑶臺月瑤臺月和羔心事履霜時節野橋流水聲嗚咽行人立馬空愁絶空愁絶爲誰凝佇爲誰攀折題二闋後自是不復作矣乆惡繁哇混太和云何今日自吟哦世間萬事皆如此兩葉行將用斧柯次韻檡之聽話語道深慙話一埸感君親切爲宣揚更將充獷隨鈎索意味從今積漸長次韻伯崇自警二首十載相期事業新云何猶歎未成身流光易失如翻水莫是因循誤得人誦君佳句極優柔未得明彊是所憂若悟本來非木石保君弘毅不能休奉答擇之四詩意到即書不及次韻爲閔人疲上馬行此時消息儘分明更憐跣足無衣苦充此直教天下平君看㶚橋風雪中南來北去莽何窮想應亦有還家客便爾譏訶恐未公東頭不見西頭是南畔唯嫌北畔非多謝聖門傳大學直將絜矩露天機安肆真同鴆毒科君言雖苦未傷和觧嘲却是生回互政恐紛紛事轉多答擇之長言三復儘温純妙䖏知君又日新我亦平生傷𥚹迫期君苦口却諄諄次韻擇之見路傍亂草有感世間無處不陽春道路何曽困得人若向此中生厭斁不知何處可安身到袁州二首馬蹄今日到袁州山木蕭槮四靣愁多謝晚來風力勁朔雲寒日共悠悠袁州刺史㡬何人韓李流芳獨未泯道䘮時危今日意九原遺恨一時新十二月旦袁州道中作今朝巳是臘嘉平我獨胡爲在逺行白髪倚閭應注想青山聮騎若爲情同林擇之范伯崇歸自湖南袁州道中多竒峯秀木恠石清泉請人賦一篇我行宜春野四顧多竒山攅巒不可數峭絶誰能攀上有青葱木下有清冷灣更憐灣頭石一一神所剜衆目共遺棄千秋保堅頑我獨抱孤賞喟然起長嘆賦歸雲洞人生信多患吾道初不窮云何感慨士伏死嵁巖中宜陽古道周竅石何嵌空窮幽歷肺腑履坦開房櫳頗疑有畸人往昔寄此宫歲月詎云幾井竈無遺蹤我來記清秋歸塗渺窮冬興懷重幽討永嘯回長風風回雲氣歸洞口春𪷟𪷟信美非人境出門吾欲東人言石乳洪羊之勝不及往遊作此人道歸雲未足誇洪羊石乳更谽谺連環入夣難紆軫回首西風又日斜分宜晚泊江亭望南山之勝絶江往遊將還而舟子不至擇之刺船徑渡呼之予與伯崇佇立以俟因得二絶寒水𥻘𥻘受晚風輕舠來往思無窮何妨也向溪南去徙倚空林暮藹中一棹翩然喚不回兩笻江畔乆徘徊早知君有如神技同下中流亦快哉新喻西境北嶺蒼茫雨欲來南山騰躑翠成堆穉杉繞麓千旗卷野水涵空一鑑開客路情懷元倥偬今晨遊眺却徘徊自然觸目成佳句雲錦無勞更剪裁道間厭苦泥淖思亟還家安坐講習用擇之韻呈二賢友客路泥塗正所憂可堪雲物更油油向來結友輕千里此去還家且一丘妙䖏自應從我得躬行肯使歎吾猶兩賢定許相提挈厚意何勝雜珮酬再和油字韻楚山黄落正離憂喜見寒杉卷碧油倦客今年眞白髪羽人何日定丹丘竒兵捷出吾當避狹路爭先子不猶箇裏竟能無一語應慙二鳥起相酬次韻擇之懷張敬夫往時聮騎向衡山同賦新詩各據鞍此夜相思一杯酒回頭猶記雪漫漫別韻賦一篇踏雪凌霜眼界新舉鞭遥指玉嶙峋回頭此日成千里横槊思君少一人宿新喻驛夜聞風鐸倦枕欹眠到五更却嫌風鐸乆悲鳴恍疑絺綌南鄰夜寒鐵丁東客夣驚題野人家茆簷竹落野人家只麽悠悠閱歲華田父把犂寒雨足牧兒吹笛晚風斜題萬安野館身似孤雲去復還投裝猶記此窓間只應烟雨蒼茫外即是當時萬疊山萬安遇長沙便欲附書不果長沙一别兩悠悠夣想清湘帶橘洲欲寄行人數行字行人不作置書郵不見梅再用來字韻舊歲將除新歲來梅花長是雪毰堆如何此日三州路不見寒葩一樹開野水風烟迷慘澹故園霜月想徘徊夜窓却恐勞幽夣速把新詩取次裁賦水僊花隆冬凋百卉江梅厲孤芳如何蓬艾底亦有春風香紛敷翠羽帔温靘白玉相黄冠表獨立淡然水僊􅏻弱植愧蘭蓀高操摧氷霜湘君謝遺楪漢水羞捐璫嗟彼世俗人欲火焚衷腸徒知慕佳冶詎識懷貞剛凄凉栢舟誓惻愴終風章卓哉有遺烈千載不可忘清江道中見梅今日清江路寒梅第一枝不愁風嫋嫋正奈雪垂垂煖熱惟須酒平章却要詩他年千里夣誰與寄相思臨江買舟征驂聊駐近江樓南市津頭問買舟共說明朝乗雪水長歌一日到洪州薌林東臯濺寒水西崦饒清隂南埭奎璧麗北垞静且深入門流緑波竹樹何箾槮積石象雲壑高堂杳沉沉左通雲水區右徑梅杏林沼沚共回薄觀臺鬱差參紛吾千里遊發􅮾南山岑過門得佳賞慰此夙昔心􅒺懷企䟽翁歲晚投冠簪婆娑此澗谷俯仰成古今嗣德世有人聞道我所欽相見無雜語晤言寫胸襟懷舊復惆悵命酒聊同斟飲罷我當去握手清江潯冠簮一作華簮過樟木鎭晚晴二首朝晴遣我看薌林頃刻浮雲萬里隂拂䄂凌風三十里依然寒日照長吟飛雲極目疑梅嶺落日回頭夣橘洲從此不愁東路永秪應西望轉悠悠赤岡頭望逺山作暁起清江弄小舟晚風吹過赤岡頭逺峰自作脩眉歛萬里那知客子愁次韻擇之發臨江千里烟波一葉舟三年巳是兩經由今宵又過豐城縣依舊長江直北流次韻擇之漫成落日晴江更逺山逺山猶在有無間不須極目傷懷抱且看漁船近往還船一本作舠竹節灘船下清江竹節灘長烟漠漠水漫漫人家㫁岸斜陽好客子中流薄暮寒舟中晚賦長風一萬里披豁暮雲空極浦三年夣扁舟二子同離離浮逺樹杳杳没孤鴻若問明朝事西山晻靄中次韻擇之將近豐城有作老矣身如萬斛舟長風破浪若爲收江山若有逢迎意到處何妨爲少留過豐城作渺渺豐城縣回頭憶舊遊晴江羅逺樹宿莾亂中洲寳劍今鱗甲神光尚斗牛他年還記得此夜一扁舟舟中見新月伯崇擇之二友皆巳醉卧以此戯之舟中見新月烟浪不勝寒與問醉眠客豈知行路難殘陽猶水靣孤鴈更雲端篷底今宵意天邊芳歲闌次韻擇之舟中有作二首一江烟水浩漫漫昨夜扁舟寄此間共向船頭望南北不知何處是家山一席三人抵項眠心知篷外水如天起來却恠天如水月落烏啼浦樹邊自東湖至列岫得二小詩孺子高風何處㝷東湖臺觀水雲深生芻一束人如玉此日凄涼萬古心昨日來時萬里隂長江雪後玉千岑蒼茫不盡登臨意重對晴天豁晚襟列岫望西山最正殆無毫髪遺恨滕王秋屏皆不及也因作此詩二首城中望西山拄頰空朝暮不到列岫亭詎知親切處東西水平分南北山中判妙處毫髪間商略無遺筭晚飮列岫危亭披豁對蒼霞䇿杖重來日未斜滿目江山一尊酒哦詩莫遣太雄誇觀上藍賢老所藏張魏公手帖次王嘉叟韻火風吹散旱天雲膚寸空餘翰墨新拭淚相看渺今古堂堂那復有斯人次韻伯崇登滕王閣感舊蓋聞徃時延閣公拜䟽於此云金闕銀臺夣想中樓前拜舞皁囊空十年殄瘁無窮恨歎息今人少古風觀西山懐嶽麓以爲莫能相上下也聊賦此云風月平生意江湖自在身年華供轉徙眼界得清新試問西山雨何如湘水春悠然一長嘯妙絶兩無倫進賢道中往辭湘水曲今過豫章城改歲無多日到家才幾程晝憐春意迫夜喜月華清此去無淹軌前塗似掌平野望登高立馬瞰晴川四靣平林接暝烟東望不堪頻極目歸心巳度鳥飛前次韻擇之進賢道中漫成五首白酒頻斟當啜茶何妨一醉野人家據鞍又向岡頭望落日天風鴈字斜笑指斜陽天外山無端長作翠眉攅豈知男子桑蓬志萬里東西不作難夜宿林岡月滿川歸期屈指正茫然也知地脉無贏縮只把隂晴更問天誰作窓間擁鼻聲更哦樂府短歌行從教永夜清無寐只恐晨雞不肯鳴日暮重岡上人勞馬亦飢不妨隨野雀容易宿寒枝次韻擇之夜宿進賢客舍白日照寒野􅒺然千里平馳暉一以没浩蕩驚飈生露彩林表見月華波上明同行魯狂士忽發商歌聲洗耳金石奏信知塵累輕次韻擇之潤陂有作我行欲安適莾莾窮山陂晨裝逺林表午憇通川湄曠望想慈親行役嗟吾兒喟然陟屺歎歸心浩無涯暁霜徒御寒暮雨朋儔悲前期諒非逺無爲苦愁思過潤陂日晴意可喜至暮復雨伯崇有詩因次其韻客裏歲云暮我心殊未平悠悠惜往日鬰鬰懷平生况復乆隂雨喜兹霜暁明那知不終日又作瀟瀟聲坐厭泥塗辱空嗟鴻鴈輕山行兩日至金歩復見平川行夷路計程七日可到家矣行穿側徑度荒山又踏深泥過野田路轉忽然開逺望眼明復此見平川江烟浦樹悲重疊楚水閩山喜接連稅駕有期心轉迫稜稜瘦馬不勝鞭次韻擇之金歩喜見大江有作江頭四望逺峰稠江水中間自在流並岸東行三百里水源窮處即吾州此江發源分水嶺故前詩有楚水閩山喜接連之句次韻擇之餘干道中寒盡春生草又青化工消息㡬曽停因君一詠陵陂麥恍憶儂家老圃亭亭下予家種麥處也安仁曉行夙駕安仁道行行得自娯荒山圍野闊逺樹出林孤景晦長煙合天寒碧草枯歸心懷往路極目向平蕪十七日早霜晴觀日出霧中喜而成詩斜月夜窓白肅霜朝氣清長塗披素錦寒霧湧金鉦巳作三冬雨何妨十日晴天公且相念莫遣暮雲生再用前韻乆隂冬竟暖欲霽氣先清田舍占煙火軍家候鼓鉦風霜千里肅天地一朝晴明日知何日陽春又發生次韻擇之過丫頭巖四靣晴岡紫石崖如何渾作白皚皚須知暖入隂泉溜不是寒封積雪堆章巖豁爾天開宇呀然夜不扄閑雲任棲宿密雨㫁飄零破屋僧常住高軒客屢經古今題寫處一半蘚文青次韻擇之章巖驅馬倦長道投鞭憇此巖來應六鼇戴跡是五丁􅥵泉脉流青潤林稍擁碧巉老禪深閉户客子且征衫鉛山立春六言二首雪擁山腰洞口春廻楚尾呉頭欲問閩天何處明朝嶺水南流行盡風林雪徑依然水館山村却是春風有脚今朝先到柴門次二友石井之作三首一竇隂風萬斛泉新秋曽此弄清漣人言湛碧深無底只恐濳通小有天聮騎君登泉上亭黄塵雙眼想增明籃輿獨向溪南路惆悵不成同隊行泉嵌側畔一川明水石縈廻更有情聞說近來䟽葺好想應仍是舊溪聲次韻擇之鉛山道中二首幾月高堂闕問安歸塗不管上天難誦君兩疊思親句也信從來取友端行盡江湘萬疊山家山猶在有無間明朝漸喜登閩嶺澗水分流響珮環次韻擇之發紫溪有作明日振衣千仭岡夜分起看月和霜乆知行路難如此不用悲歌淚滿裳次韻別林擇之暫時相別不須悲楚調凄凉政爾爲幾曲清溪足相送一天明月豈曽離上堂嘉慶多爲問縁道風光少賦詩更謝同𫀆二三子夜來幽夣滿春池次韻別范伯崇二首東歸亂藳止此平生罪我只春秋更作囂囂萬里遊賴有吾人肯相伴群譏衆詆不能憂累月追隨今别離人生離合豈無時願言更勵堅高志力索窮探慰所思有懷南軒老兄呈伯崇擇之二友二首憶昔秋風裏㝷盟湘水傍勝遊朝挽𬒮妙語夜連牀别去多遺恨歸來識大方惟應㣲密處猶欲細商量積雨芳菲暗新晴始豁然園林媚幽獨窓户愜清妍晤語心何逺謂日與擇之講論書題意未宣謂數收伯崇近書懸知今夜月同夣舞雩邊九日登天湖以菊花須挿滿頭歸分韻賦詩得歸字去歲瀟湘重九時滿城寒雨客思歸故山此日還佳節黄菊清罇更晚暉短髪無多休落帽長風不㫁且吹衣相看下視人寰小秪合從今老翠㣲歸報德再用前韻幾枝藤竹醉相携何處千峰頂上歸正好臨風眺平埜却須入谷避斜暉酒邊泉溜寒侵骨坐上嵐光翠染衣踏月過橋驚易晚林坰回首更依㣲雪中與林擇之祝弟登劉園之宴坐巖有懷南嶽舊遊賦此呈擇之屬和并寄敬夫兄風雪集歲晏掩關聊自休今辰展遐眺倚此寒巖幽同雲暗空室皓彩迷林丘崩奔小澗歇飛舞增綢繆仰看鸞鶴翔俯視江漢流乾坤有竒變澒洞驚兩眸三酌不自温倚杖空冥搜悲歌動華薄璀璨忽滿裘向來一杯酒浩蕩千里遊亦復有兹賞㣲言寄清酬觧携今幾許光景逝不留懷人眇山嶽省已紛愆尤對此竒絶境一懽生百憂茫然發孤詠逺思誰能收晦庵先生朱文公集卷第五考異拜張魏公墓下劍履一作劍几精忠一作精誠孤憤一作忠憤國威一作國勢敬簡堂分韻齋扉一作齋房大雪馬上次韻羽旄一作羽化馬上口占歌酒一作飲酒烟村一作前村馬跡橋生志一作生意高臺次韻留清一作流情石廪峰家家有廩高如許大好人間快活年一云教人鎮作豐年願樂聖何妨萬億年林間殘雪忽復空枝墮殘白一作忽聽氷條墮清響福巖讀張湖南舊詩白雲未屬分符客一作今朝暫豁平生意奉别敬夫要眇一作要妙豈知一作豈無淵乎齋澹浮一作湛浮雪梅野橋一作斷橋答林擇之四詩家客一作家樂再和油字韻羽人一作新詩日定一作日寄觀西山悠然一作悠悠進賢客舍同行一作同舟山行至金歩悲重疊一作傷緜邈稅駕有期心轉迫一作欲近慈闈心轉切福州府學訓導舒鏊校晦庵先生朱文公文别集卷第五書方耕道耒所示劄藁備見勤懇之意至誠感動理必可伸但未曉其名色不知所論爲巳明白與未耳㓂事亦不審其曲折若如前書所喻欲以不加桎梏之類爲感動之術則在我者誠亦有以取之矣大率天下事循理守法平心處之便是正當如盗賊入獄而加以桎梏箠楚乃是正理今欲廢此以誘其心欲其歸恩扵我便是挾私任術不行衆人公共道理况恩旣歸巳怨必歸扵他人彼亦安得無忿疾扵我耶此等事病根不淺頃它時靣見更扵源頭理㑹耳明道先生記彭中丞語云吾不爲它學但自㓜即學平心以待物耳此言可念也信筆及此深愧率易然以老兄樂扵聞過勇扵徙義必不以爲怪也桂林春來未得書不知爲况如何求歸不獲甚可念程簿得安其職幸甚許宰書巳領矣所喻不敢爲乆安計在邑一日且料理一日事甚善然所謂不爲乆計者亦湏决定去得如其不然即此言反爲害矣方耕道前書所布當蒙深察旣不欲宻之又不欲公言而發之盃酒之餘恐尤未安以愚意觀之旣爲辟客即非泛泛属官之比有所見聞正當宻言之耳但亦當斟酌是否量度時冝使有益於主人而無傷扵事體乃爲盡善若一言不契即欲忿然引去以爲高則吾不知其說矣千萬幸聽此言盖非獨老兄一身之得失實吾道興衰所繋切告詳思此言有深味不可草草看過也暇日讀何書易傳恐冝熟觀且虚心玩味未可便容易領略亦不湏更立新說且只看他聖賢處事詳緩申折處不要作書讀且只作事看也皇甫文仲甚不易得老兄所以箴之者甚善聞渠亦嘗相勸眞得朋友之道矣吾人之意豈是欲耕道爲容說媕阿之計只是要得是當耳寛猛之說前書巳具言之更告留念令弟書來甚佳大慰乆别之懐欲别上狀雪中手凍不能辦又急欲遣人候南軒安信只附此見區區凡百且勸賢兄寛以耐事逺方旣難得朋友兄弟便兼切偲之責凡事仔細啇量爲佳也方耕道昨承書知所苦増進不勝驚憂旣稍甦惺莫巳旋向安矣偶按事天台奏乆不報此必有掩蔽聦明黨護奸惡者以此留滯多日欲討少錢物奉助醫藥而不可得今逐急那得五十千遣去老兄且加意寛心將息不必過慮令兄伯華不及别書想且相照管恐耕道病倦遣去錢物幸爲檢入也方耕道昨日遣書匆匆不盡意比想體中益佳徤矣人參三兩恐客中或闕用今遣致之幸視至迫遽不及詳布鄭景明昭先以下景明之孫至家藏某老懶不堪比復大病今雖小愈猶未復常巳上投閑之請度歲交或可歸卧故山矣承以職業頗爲當路所知甚善甚善更在勉力講學使知益明而行益修則固不患人之不巳知矣鄭景明示喻讀書未能無疑固應如此然且漸就易曉處求一入頭下手功夫且讀且行則乆之自有見矣鄭景明大湖保伍施行有緒乃爲強豪所撓敗深可歎惜官府不足倚頼如此子厚之不能安居固宜然遷徙重事不可草草巳屢作書勸之矣小人凌上之風漸不可長能爲風曉邑大夫有以正之乃縣道政事所當然非獨爲子厚計也鄭景明往來頗談佳譽更冝勉力隨事及人亦逺大之基也破賊受賞果應功令亦復何嫌府公寛厚想不至有沮難但恐吏輩過有邀求爲可憎耳某懇詞除命候畢䘮葬巳不得請但臨漳經界報罷巳引愆俟罪勢必不成行也揚生道夫郷居托芘甚幸聞其懦弱頗爲人侵侮或有不得巳之懇幸稍左右之今時外縣例以無訟爲美政善良不無受弊此不可不知也朱魯叔以下莆陽方楷家藏薦書不知竟可得否彼中諸公都無書來固不容效力然亦知自信之篤想不以此切切也向所附去文字官事之餘一日豈不看得一兩叚未說要得十分通徹但時時得此澆灌心胷亦湏有得力處也南海樂章乃今廟中祭享時所用之樂或云其譜乃唐朝所頒與今世俗之樂不同故欲得之耳只問㝷常主行祭事吏人便可得之只録其譜與其篇章名號次第便中寄及幸也聞說曲名皆連也學古某忽𬒳鐫免之命想巳見報矣罪大責輕固無足言而累及知友殊使人愧恨蔡季通經由治下恐道間不免有所煩凂幸以某故少加照瞩渠於此事本無所預殊可念也士俊推官想以郷里之舊自能周旋更不致書然語次亦幸宻喻之也學古聞郡中此來紛紜殊甚繆政致此夫復何言但累及諸賢例爲羣小所辱令人不平耳新史君到事當自定但不知龍溪事竟如何耳少懇有𥿄萬張欲印經子及近思小學二儀然比板様爲經子則不足爲回書則有餘意欲先取印經子分數以其幅之太半印之而以其餘少半者印它書似亦差便但𥿄尚有四千未到今先發六千幅便煩一靣印造仍點對勿令脫版乃佳餘者亦不過三五日可遣也工墨之費有諸卒借請巳懇高丈送左右可就支給仍别借兩人送至此爲幸借請餘錢却還盡數爲買吉貝并附來然湏得一的當人乃佳不然又作周昇矣昨亦巳懇高丈爲根究此人不知如何庫中墨刻亦各煩支錢買𥿄打十歎本内獻夀儀及永城學記多得數本不妨獻夀儀要者更多也恐印不辦即續發來不妨但吉貝早得禦冬爲幸耳所印書但以萬幅之太半印經子其餘分印諸書平分看得幾本此無版數見不得多少也臨行時令庫中刻一書目如巳了幸寄來也方耕叟禾方之㤗家藏禾敬問改過行巳之方願先生賜之一二言使禾自此得朝夕從事於斯口誦心惟知所敬畏庻幾前姦之不復邇其亦古人􅐻銘書紳之義云禾拜禀夫子有言弟子入則孝出則弟謹而信泛愛衆而親仁行有餘力則以學文其言雖約然在耕叟今日改過脩巳之方莫切於此耕叟勉旃它未有以告也五月十四日某書皇甫文仲斌以下文仲之孫撝家藏因遣人至九江市省馬恐爲駔者所欺令一禀指揮幸與留意千萬之望又有一事軍中請給條例合支細色者每碩只支六斗不審軍府見作如何施行幸子細批喻皇甫文仲辟書巳下否行之遲速若有嚴君之命不必遷延賁之初九其義甚明此不足爲笑而適足以見高誼耳然行日千萬更遣一報欲附書也四九姪專去請見非有素約亦不敢令輙往幸早遣其歸也皇甫文仲鞠㑹向熱想未可來此中見治一教場甚闊亦未竟竟即可試馳射容續奉報也皇甫文仲示喻淮上新田偶有水患此天意更欲太尉且爲國家立功立事未許就此閑適耳大學或問今付來介看畢幸示及易傳䟦語未敢容易更容擬定續奉報也荆州之行果在何日未即承晤臨風依然皇甫文仲某昨來求去不獲近復有請其詳具南軒書中此不備言也左右到彼旣乆南軒必朝夕相見講論當有深趣所喻恢復規模誠不可易之論然今日亦惟南軒實做得此功夫某輩衰懶只思縮頭豈可夢想此事也龍山佳句可見一時賔主之勝恨不得爲坐上客也所喻易說實未成書非敢有所吝於賢者然其義理不能出程傳但節得差簡略耳大抵讀書且當盡心於一家之說不可如此貪慕疑惑况在今日老兄讀書便要道理受用又與章句儒生事體不同但子細反復看教程傳俠洽或更就上自節出緊要處看尤當得力也因見南軒試以此說扣之亦必以爲然耳皇甫文仲人至辱書知還侍安穩即爲荆渚之行甚慰所望大丈夫所爲正應如是耳張帥書煩致之暇日從容更可詳扣立身行道之曲折也但秋風巳高衝冐良勞千萬加愛爲禱弓弩甚荷留念巳别具數呈禀太尉但斗力太強非羸卒所能發湏少損之耳復之尤感深念但藥材之属又不免爲賢者之費甚以爲愧幸早遣還此姪子亦不湏乆慁館人也皇甫文仲朋友數人往遊山北因欲請見太尉公以觀軍容之盛諸君皆有志者而蔡君嘗欲講於刑名分數竒正之學幸爲通之使得聞其所未聞者因與俱來爲數日之欵千萬幸甚皇甫帥倜某頃者星江宻邇聲光不獲一見至今爲恨年來奔走疾病多故又不得以時致問起居尤切瞻郷之勤兹辱惠書且承喻及有以知賤迹之不敢爲江右之行足見高明相知之深相信之篤三復感慰不知所言又聞謀居筠陽極爲得䇿但太尉丈忠誠勇畧上所深知而公㢘之功見於今日者又如此竊計不日浮謗自消亦不容乆此間退矣某踈拙自信仇怨朝幸上聖明未忍誅斥今又叨竊祠禄安處田間戴此厚恩豈有涯量亦不復敢有當世之念矣無由㑹靣罄此心曲引領齋閤臨風拳拳林子方枅莆陽余師魯家藏伏奉賜教恭審即日春和吏部郎中節傳所臨神相台候起居萬福至感至慰但區區夲欲一走前路謁見少償夙昔之願巳托徐丞遣人見報日今未至而來使及門則云台斾巳從東路而上矣此亦有山路可至大湖但衰病之軀兩三日來飲食失節氣痞腹痛似是所服脚氣之藥多有凉性以致如此復此山雨隂寒薄人勢不容進引領旌纛徒切馳情失此一見之便台坐徑躋華要而賤跡跧伏窮山出處不齊何由復遂鄙願所冀益𢡟德業有以振起末俗衰懦之氣使吾黨之士與有光焉則亦不必同堂合席然後爲相見也頒惠茶藥極感厚意方意極佳服之有効别當致謝也林子方以下子方之孫友聞家藏伏見大禮赦書有薦士之文而郷人之議欲以布衣曹南升爲請如熊左史諸長者皆巳列名具狀而某亦巳書其後矣某與之遊爲最乆知其人爲最深盖其學問不爲空言舉動必循正理識慮精審才氣老成雖自中年即謝埸屋而安常務實不爲激發過中之行本實當世有用之才非但狷介一節之士也昨陳正獻公作帥之日嘗欲論薦㑹以移鎮不果論者至今惜之若蒙台慈參考衆言察其行實以時列上使得稍𬒳朝廷招􅝘之選足以見明使者爲國薦賢不遺草澤之意下使學士諸生有所矜式興於廉遜誠非小𥙷東臺王丈亦知其人語次扣之足以知鄙言之不妄也林子方比嘗顓使拜書伏承誨答所懇牓文亦蒙留念感幸不可言區區此來所苦萬狀僅了今春荒政即欲丐祠以歸而所部皆以旱告盖去歲之灾所不及處無不病者而衢婺荐凶公私匱竭尤未知所以爲計獨念貴境猶可告糴巳請於朝􅑙本收糴且散牓自廣以東諸州以招誘之矣恐番禺以西更有出米通販去處謹復具公移并以牓文三百道仰累頥指散下曉諭不勝幸甚此米到得四明尚湏般運方得至衢婺正自不易爲力䑕伎巳窮日夕憂懼髙明有可以見教者深所欲聞切望因風指示一二幸甚劉德脩光祖以下後溪之曽之曽元家藏東溪語說拜賜甚寵伏讀再三乃知師友淵源所自深逺如此士不知經果不足用信矣如韓子之言也地逺無從親扣餘論又以歎恨耳嘗患今世學者不見古經而詩書小序之害爲尤甚頃在臨漳刋定經子粗有𥙷於學者前此欲寄傳之及宋子淵家而便人不爲帶行今内一通幸爲過目還以一語訂其是非幸甚大學鄙說一通并往所懇不殊前也此書附制司幹官孫應時頃在淛東時所舉吏也後生好學志趣不凡經由必得進見儻辱延納而教誨之幸也趙天官所得書尚滯從班未厭人望中間進對陳說甚苦有識雖益歸心然似巳不爲上下所安矣消長之决諒巳非逺婺矛牙不恤緯之憂伏想同之也傳之爲况如何未及寓書并深馳仰耳劉德脩竊聞榮𬒳除書進參講席輔導得人善類同慶某幸得爲僚尤切忻幸姑此布聞餘容靣慶劉德脩昨承載酒訪别情誼繾綣豈勝感歎恨坐逺不得欵承餘論而遽爲數千里之别也今晚或來早即行無由詣違亦不及一見東溪先生重以悵惘又不敢拜簡以勤誨荅也小史汪致明頗謹欲事左右不審可容留否謹此遣前可否唯命它冀以時節宣訖致格君定國之効千萬幸望丁仲澄見臨漳語録來書深以其學侵畔爲憂自是而憂之則有不勝其憂者惟能於講學體驗處加工使吾胷中洞然無疑則彼自不能爲吾疾矣若不求衆理之明而徒恃片言之守則雖蚤夜憂虞僅能不爲所奪而吾之胷中終未免於憒憒則是亦何足道願老兄專以聖賢之言反求諸身一一曉然無疑積日旣乆自當有見但恐用意不精或貪多務廣或得少爲足則無由明耳某比來温習畧見日前所未到一二大節自頗覺省力但昏弱之資執之不固尤悔日積計有甚於吾友之所患者乃承訪以所疑使將何辭以對邪然以所聞質之則似不可不兩進也程子曰涵養湏是敬進學則在致知此二言者體用本末無不該備誠用一日之功當得其趣不然空抱疑悔不惟無益反有害矣夫涵養之功則非他人所得與在賢者加之意而巳若致知事則正湏友朋講習之助庻有發明不知今見讀何書作何究索與人論辨惟無欲速又無蓄疑先後疾徐適當其可則日進而不窮矣因書或有以見教勿憚辭費某亦不敢不盡愚也向見前輩有志於學而往猶豫者其内省甚深下問甚切然不肯沛然用力於日用間是以終身抱不决之疑此爲可戒而不可爲法也詹尚賔觀見南溪祠志孟子曰人有不爲也而後可以有爲又曰狷者有所不爲不爲之言則同不爲之意似有别矣切疑狷者之病全在於有所二字於所當爲者而不爲則非知所决擇之人矣狷者之所以不爲者病在何處苟自知其偏加篤學力行審思明辨之功便可至中耶抑氣質之偏自有定量終不足與有爲耶狷者但能不爲而不能有爲亦其氣質習尚之偏耳知其偏而反之豈有終不足與有爲之理孔子曰郷原徳之賊也所謂郷原者言不顧行行不顧言閹然媚世與夫同流合汙似忠信似㢘㓗所以爲德之賊也嘗究郷原之用心全在扵衆皆恱之之一句所以動他許多不正當底事出來若夫狷者之病只在扵獨善其身非若郷原之病扵用心處有不正矣使知學問亦可以變其氣習耶抑亦受病之深藥力之所不及耶不則夫子何以云過門不入室爲無憾其待斯人可知矣郷原患在求恱扵人與狂狷正相反故夫子深惡之然亦無不可變之理但恐其䧟溺巳深不肯變耳志南上人見寒山子詩集後使至特辱惠書獲審比日住山安穩爲慰天台之勝夙所願遊往歲僅得一過山下而以方有公事不能登覧每以爲恨今又聞故人挂錫其間想見行住坐卧不離泉聲山色之中尤以不得往同此樂爲念也新詩筆勢超精又非往時所見之比但稱說之過不敢當耳二刻亦佳作也但攙行奪市恐不免去故歩耳寒山子詩彼中有好本否如未有能爲讎校刋刻令字畫稍大便扵觀覧亦佳也寄惠黃精笋乾紫菜多品尤荷厚意偶得安樂茶分上廾缾并雜碑刻及唐詩三冊謾附回便幸視至出師表未暇冩俟冩得轉寄去未晚也寒山詩刻成幸早見寄西原崔嘉彦以下見南康集前日詣見重有喧聒媿不可言奉告獲審經宿道體佳勝爲慰某前日出山至上京陂頭遇雨巾屨沾濕狼狽可笑喜幸之深但恨巳差晚耳承問之及感感餘俟入城得靣布也昨承枉顧捿賢得欵餘論爲慰即刻伏惟動止佳勝昨日之兩城中不能歛塵高隱必多得之也米資少許别帋送上幸視至魏甥恪即向來病甥之兄到此病作自有手簡求藥幸審其證報之當爲修製服餌也昨日裴回三峽奉候乆之旣以日莫遂東走楞伽折桂失此一見張想也奉告欣審即日残暑道体佳勝庵屋媿仰勤神用方丈牎牖只扵两旁爲之大小隨意可也承誨示并竹萌良荷厚意知煩親􅓯尤珍感也臥龍亭子巳下手否向說栽竹木處恐亦可便令施工也人還布謝草草復未有一物爲報引領雲山第増媿仰承手示聞還自德安體用冲勝良慰昨夕聞山間兩頗沾足城中殊少未敢廢禱祠也所喻當爲立之庵中什器俟一靣措辦旦夕得雨後湏一出郊諸容靣道或因入城幸左顧也奉告承乍寒道體増勝爲慰臥龍新庵主入庵未得一往視之承其寄筍感感人還草草少間别奉問次林師魯以下先生之曽孫沂藏録槀某自㓜年侍立先君子之側則聞先芸齋公之名而知其相與遊之善矣不幸旣遭大禍來居深山窮谷中與世絶不相聞雖先君子之執友如芸齋公者亦無由一望其顔色而受教誨焉孤陋塊處徒有嚮往之誠而無以自致也比年鼎山蔣丈來尉兹邑因得從容請問以訪先君子之舊遊然後知芸齋公之沒亦旣乆矣私心方竊自悲旣又聞其有賢子者問學行義克世其家則又以自慰也去年林擇之不鄙過門以講學爲事怪其温厚警敏知所用心皆如老於學者因扣其師友淵源所自而得三人者焉曰程深父曰林熈之而其一人則向者所聞吾芸齋公之子也於是始恨向者所聞之未盡旣而擇之又出送行序引讀之盖所以見属之意甚厚雖竊自知其庸妄無以堪之而愛其文恱其義不覺其三復而不能巳也以是益知擇之之賢其來果若有自而願見賢者之心日以切切方其歸時適在城府不能爲書而徒属以問訊盖亦憑恃事契之重而不自外焉兹者乃承捐惠長牋副以劄目情義周渥足以見不忘舊故之厚而其禮與詞則惴惴然若後進之於先逹是豈所望於通家之舊哉不敢當不敢當自是以往行李往來幅𥿄之書有以警誨則爲賜大矣若復爲是使人不敢當之禮而又告之曰先知覺後知先覺覺後覺而巳則非某之所敢聞也大學集傳雖原於先賢之舊然去取之間决於私臆比復思省未當理者尚多暇日觀之必有以見其淺陋之失因來告語勿憚諄切豈勝幸甚擇之此來得日夕聚首啓其不逮實有望焉社中兩賢亦未獲見敢煩寄聲以爲異時承教之地爲幸林熈之去冬枉顧幸得數日數奉名理感慰之深所恨空踈無以少助潜思之妙耳奉告承别來春暖德履萬福爲慰爲慰第聞師魯遽不起疾深爲悲惋羙才髙志未克有成旣足深惜而朋從零落道學寡助此尤深可憂也想惟平日切磋義重有不易處者柰何柰何喻及仁說大槩得之但所謂三者皆心似便指作仁體此似不安又謂推而上之尤覺聞隔有病莫若只於敬字加功乆之自然當處見得不用如此臆度轉見汗漫支離不精切也詩之比興舊來以關雎之類爲興鶴鳴之類爲比嘗爲之說甚詳今此本偶爲人借去未及録呈大槩興詩不甚取義特以上句引起下句亦有取義者比詩則全以彼物譬喻此物有都不說破者有下文却結在所比之事上者其體盖不同也上蔡言學詩要先識六義而諷詠以得之此學詩之要若迂廻穿鑿則便不濟事矣不識高明以爲何如朱魯叔仙遊朱堂甫家藏去歲歸來計度不審妄意作一小屋至今方得遷居然所費百出假貸殆遍人尚未能結褁圓備甚悔始慮之不精也所喻今方具曉本末記之不難但年來多事精力益衰日間應接不得少休纔得頃刻無事即湏就寢俟其寧息然後可以復起應接更無暇看文字矣所欠人家誌銘之属積壓無數擺撥不行恐未暇爲吾弟記此也然亦未敢不爲俟定居後看如何或人事稍簡試即爲思之也齋記大字亦然余景思以下仙遊洪震夫家藏彼中學校如何亦頗有士人否聞南方風俗淳朴不汲汲於進取正當勸以讀書講學開發其聦明不當啓以趍時干禄之技也暇日亦當有觀書味道之樂但僻逺難得師友此正在自著晦庵先生朱文公文别集卷五候官縣儒學訓導劉簮校晦庵先生朱文公續集卷第五答吕東萊康節恐是打乖法門非辭免之正伊川再受西復元官還蒞舊職又可逡巡觧去即與今日事體全不相似皆未敢援以爲比欽夫書來亦云豈可逆料後患而先泪所守之義此語甚直截但渠却不曽爲思量如何避免得脫若只如此厮崖恐亦非臣子敢安也千萬便爲盡以此意逹之韓丈得早爲觧紛爲幸昨嘗奉懇一言於韓丈又專書禱之幸早爲贊成使得速如所志幸甚區區所以不得不力辭者實以無功受爵求退得進於心有所不安若一請不遂勢必再三以得請爲期而後巳然又不敢肆然直遂漠然不以爲意者則以君臣之義平昔講聞不爲不熟今此除授雖未必直由中岀而名爲君命在臣子之心亦何敢傲然以不受爲高哉此所以不免委曲懇祈宛轉調護計誠欲兩全公私不使交病而巳區區此心非特世俗所疑雖平生知友其不哂笑者幾希度惟忠厚惻怛如吾伯㳟者乃有以亮此心耳前日申狀及與韓沈書不能盡述此意幸請爲言之有以發明某所不能言者與王尚書佐始來不爲乆計不欲多挈孥累今只一十歲小兒一孤甥及學者一二人在此天寒嵗暮官舍蕭然兀然如一老頭陀時一自笑且自歎也廬阜山水之勝粗快野心然非休務不敢出出又不得留愈覺拘悶行亦力懇諸公以必去爲期耳某之族祖奉使直閣諱弁早從中州士大夫遊文學甚高建炎初衘命虜營見留十七年全節而歸又以忤時宰不及用而死藁殯西湖之智果院三十年矣其孫照者貧悴亡聊不能歸葬故里今欲只就左近卜地以葬竊意欲丐台㫖以重其事庶可必得仐悉令取禀倘䝉矜許却令踏遂别具申請也向乞通理夏稅側聞甚䝉尚書同右司文維持之力但廟堂旣無果决版曹又巧爲沮抑至仐未决甚可恨也竊聞檢放文字體式許以見示乆未及請今願得以爲法專此拜請幸即付去人此事自屬漕司更告因二漕語次及之及早行下州縣令受狀檢踏爲佳蓋早禾巳刈至八九月不復可辦豐凶官司但欲罔民多取而不知僥幸姦民反乗此以欺有司也區區按事噬腊遇毒極爲可笑然公正之朝不宜有此亦姑任之但若竟如此則荒政亦不復可料理亦即引去矣答趙都運善譽向來所呈啓䝉不審巳䝉過目否近覺得有說未透處頗加改定旦夕修成别寄上也理財之說尤切時病今之所謂理財者豈復有義正是豪奪耳聞蜀中亦苦賦重民貧不審何術以惠綏之與田侍郎子真引飲想良巳生果安能發渴却是渴後喜食生冷此湏究其根原深加保養不可歸咎求節諱疾忌醫也比來隂雨過多氣候不正元氣不固者多是立脚不住平地喫交此一種病尤當過意隄防莫教隨例倒却也求疑當作末吾軰今日事事做不得只有向裏存心窮理外人無交渉然亦不免違條礙貫看來無着力處只有更攅近裏靣安身立命耳不審比日何所用心因書及之深所欲聞也看前日報行章䟽便要回靣汙行首身投免亦不可得只得守吾大玄也所喻不平者何事此等大抵無足深恠所謂漸平者今乃激而愈偏大率天下只有一是一非是者湏還他是非者湏還他非方是自然之平若不分邪正不别是非而但欲其平决無可平之理此元祐之調亭元符之建中所以敗也時事至此拱手坐視無着力處病根豈有窮耶所得水石知在何許恨不敢去一觀耳閒中所讀何書天下事旣有所不得爲顧此一事尚屬自巳若又因循放棄日月真可惜也某一病兩月將行未果所上告老之章近聞亦巳見郤勢不免復小紛紜或恐遂抵譴訶不可知也隂邪表裏欺天罔人方此之時不能仰首一鳴以期開悟而徒爲蓄縮自全之計永負臣子之責矣柰何柰何今從黄守借人專致此書幸以數字見報凡鄕來見聞所及告悉及之亦懇黄守尋的便附來必不至浮沉也聞道學鉤黨巳有名籍而拙者辱在其間頗居前列不知何者爲之及所指餘人謂誰皆望一一條示也昨日季通說舊居山水甚勝棄之可惜新居近城以此間事體料之必不能免人事之擾只如使節經由不容不見便成一迎送行户應接言語之間乆逺豈無悔吝今年尤覺不便始悟東遷之失計賢者異時亦當信此言也片𥿄所喻非有疑於二君但聞是時坐間亦有它客恐致傳播不便耳時論日新于越章彭徐薛諸人必續有行遣未知輕重逺近如何耳薛竟不免枉道果何益乎某以議陵自劾恐亦觸諸新貴之怒然巳判斷不能關念也休致文字巳申本府尚未得保明申發萬一有遲疑即不免徑申省陳乞矣比來論議似稍寜息未知竟如何正却不削亦反耳衛公計時相見聞欲徙居盤澗若爾即尤相近也開正晴暖欲挈舟南下又憚經由冨沙不免見諸人一畨露頭靣可厭更俟計度若幸無疾病即當扶曵冐昧一行兼欲見石佛懸泉之勝也士子之賢如施林諸人巳相見皆如來喻但陳鄭未見旦夕訪問之當肯顧也五日一延見諸生力爲普說今頗覺有風動之意少假旬月亦當有以少變前日之陋也聞同官多得同志甚慰鄙懷其間亦有相識相聞者恨無由相㑹聚切磋耳近觀時論日就卑鄙而吾黨之士相繼而出似猶未艾天意儻遂悔禍則亦不爲無可用之人矣願相與勉􅏧荀卿子云皓天不復憂無疆也千秋必反古之常也弟子勉學天不忘也此正區區今日之意也某氣痞筋攣日以益甚休致文字州府巳爲施行但舉城知舊無一人肯爲作保不免逺求左右想無不可得與僉圓付去人仍借一得力可託人自持印𥿄隨之令俟批上却將以還免致失墜尤幸也來書前後不同東閣郎君之說蓋出老丈向得其書亦自言此意甚勤懇然事始巳行不可復收矣只得向前旁人指點一切不能管得楊子直黄商伯乞宫觀而遭繳豈有某却望復職致仕而求恩澤之理雖至愚者知其必不然矣况今不作奏不通廟堂書劄而陳乞狀内亦不敢叙歷任年月其意亦自可見也昨日又得黄仲本書云得親戚書議者方欲申嚴謝事條制渠是謝胡姻家語必非妄此亦似是有爲而發若但驅逐不容更在仕路猶是善意萬一或是以此速其必來而因以治之亦無可避之䇿只得依經據禮冐昧向前看他如何區處若幸得一章痛加排詆置之竄斥不容休致之地即在我者亦有辭矣不審明者以爲如何昨日作誠父書託其致意不知曽相見否或未見可借取一觀然其說亦大槩與此相表裏也欲作衛公書道此曲折數日又苦目昏不能謹書或因便問及亦告及之演山觀瀑之約夣寐不忘然湏病軀稍堪扶持及此一事結斷了絶始可出入以此反増煩懣耳渤海方繳陳益之宜春之命去冬所傳上饒亦恐是浪語耳中間議論稍平僕便疑不乆諸人豈坐受縛者勢必多方遊談脅持恐赫以必勝爲効自此當漸見之繳詞未報其間必有大開闔可想也與章侍郎荗獻頃幸同僚寔深慰喜雖趣尚之同彼此黙喻然未嘗得從容傾倒以圖事孌之所終極而遂匆匆去國至今以爲恨也昨聞忠言正論愠于群小遂以口語翩然西歸嘗附一書於上饒少致區區髙仰之意而車騎巳逺遂不可及但有懷想不能爲情近得張元徳書竊聞還家爲况甚適吾人私計固應隨處而安但國論大變日甚一日令人憂懼便覺無頓身處不知上天至仁何故生此等軰使能譸張幻惑以敗人之國家也昨在經筵不能上爲明主預陳此說吾軰亦不得爲無罪矣於今尚何言哉尚何言哉婺女旣罷江陵恐亦難安得其近書否念之不能忘也吕子約經由曽相見否諸賢盡去幾於空國矣樓孫獨未知所謂國是之論初甚駭聽徐觀其間意實微婉不知還是從之文字否果爾亦足以去也適聞乃是南牀語亦可見打不過處恐亦不爲同列所容矣良齋謝丈奄忽云亡後進失所尊仰欲附一書弔其子而未有以將之湏例後便恐或相見幸爲及之也誠齋乆不得信不知成行否九級浮圖八級巳了只欠此一級固當爲天下惜之也某自四月初大病至今中間危急巳爲納禄之請近報未允前此辭職亦未果决適間聞有䟽其名字牽連四十餘人以白于上者如此則非乆勢湏别有行遣然數日前嘗以周易筮之偶得遯尾之占見乎蓍龜者如此則亦非彼之所能爲矣將安避之哉觧袂之後亦知世路漸艱然不謂乃爾之遽也乆欲致一書以病不能引領鄕風徒切歎仰近得宜春袁推書具道存問之意亦知雅眷之不我忘也向來從游不𣢾至仐抱恨顧此衰朽疾病日侵恐不復有承晤之期矣世道反覆巳足流涕而握其事者怒猶未怠未知終安所至極耶然宗社有靈公論未泯異日必有任是責者非左右吾誰望耶子壽想時相聞近亦得書衡陽之襯當巳過彼乆矣𥘉意但恐不得乆於零陵不謂造物者亦復隨俗抵巇也需及廟議便欲寫呈以來使不能俟當㝷的便别寄也當時不知何故直爾匆匆更不暇慱盡同異而遽爲毁撤之計甚可驚惋豈於是時巳有撞壞之徴耶廟議固可恨然自有襯之乃有大於此者令人痛心子壽竟不免推遷至此乃是無人肯受惡名今遂决之其勇亦可尚也然自有襯之一句恐有誤字昨幸同朝列雖不得日夕從容然荷相予之意甚勤而襟期所屬以爲可同天下之憂者如門下亦不過三四人耳今不幾日而風流雲散恍然一夣婺矛牙不恤緯母深此懐而生死契闊未暇論也不審次舍即今巳次何許想徑歸清江舊第矣頃歲經由見其登臨有江山之勝交遊中有老成可敬有士友可親甚可樂想爲况亦不落莫恨不得往從杖屨之逰耳子壽當巳赴汪陵見袁機仲說彼中形勢事體亦甚可慮不知子壽何以處之聞北風殊惡計恐亦不可爲乆留計也徳脩得祠私計亦甚便但其去日逺尤使人不能忘懷𥙷之事勢恐亦難乆留若更去却真空國而無人矣昨晚得去相内口書今想巳到于越矣答尤尚書袤示喻程門諸人行事附見甚善龜山靖康間論事頗多今長編中全不載蓋縁汪丈當時編集之際楊家子弟以避禍爲說懇請刪去故雍傳即不見其章䟽後來延平重刋龜山集方始妆入他時或作楊傳不可不細考也尹和靖𬒳召時適有臣寮陳公輔論毁程學尹公在道懇辭甚可觀又嘗論講和甚力皆不可不載者也南軒集誤字有是元本脫誤者如召閑處則拙者蓋有罪焉然亦曽寫與定叟恐其欲有回互不妨報及今承䟽示當以示刋者有姓字處且令鑱㓕後人亦湏自暁得也奉三月四日手教一通三復慰喜不可具言又䝉封送差敕及所撰族祖銘文尤切感荷衰病之餘復叨祠禄巳爲優幸而雲臺改命又如私請便得仰止希夷之高躅以激衰懦則又執事者不言之教也幸甚誌銘之作雄健高古曲盡事情雖或節用行狀之詞而一經點化精神逈出正襟伏讀使人魄動神悚知君臣之義與生俱生果非從外得也竊謂此文實天下名教之指南寒鄉冷族何幸而獨得之然亦非可得專有之矣幸甚幸甚屬以一至城府歸憇武夷繚繞還家賔客書問疾病之擾無一日暇以故乆不得致謝意然此心未嘗一日忘也沙隨程丈忽見過留止旬日得款餘論啓發爲多如此等人老於州縣深爲可惜趙帥招之折衷奏議之編功夫亦殊浩渺也項平父白來紹興同官中極不易得來教所謂可用之才誠不易之論得書知欲此來未知能自㧞否耳蔡君律書巳成簡役精宻悉有據依乃知前人大是草率恨不令年兄見之其曆書則未就然大略規模亦與律書相似所謂無零分者非如來教所疑也役疑當作徑金陵之䘮中外有識同切傷痛而况於交舊之私乎逺承弔問凢所以爲之深謀逺慮者一皆切中事情無所回避感歎不巳某昨聞其還即走紫溪又聞以柩重難行恐平父道間少人商議遂至弋陽候之幸却不甚費力一慟之餘細間密折盡凡令尊兄之所慮者無不巳有其端今當密與平父恊力區處庶幾不至甚乖刺耳所幸延哥似却長進若得數年扶持教養當成令器顧恐疾病衰頽不得終任此責也彦叙遽止此可傷人生危脆如此又可歎也圭父爲况如何連得二書頗不安跡似亦不必如此人生各以時行耳豈必有挾然後可以仕哉聞尊兄亦嘗寛曉之甚善平父遭此禍故初恐其心疾發動却因此不暇及營造無益之事反覺安穩若常如此可無他慮幸因書力勸其清心省事以持門戸爲佳細間密折等語必有誤字某衰病杜門苟安祠禄方竊自幸上恩不棄忽復收用感激雖深然資淺材踈詎復堪此此外曲折又復多端巳力懇辭諸公哀憐當爲開陳使得請也承問之及感愧良深陳公必巳到闕不知去住如何此事自繫天意豈人力之所及哉江陵計今巳赴乆不得書不知爲况如何呉邕州求免逺使不知得出何䇿直以親老丐祠恐無不得之理但恐别求任使則難必耳羅倅兄弟恐未參識自江西來者多能道其賢也程侍郎禹貢文字曽傳得否若有本便中幸借及每讀此篇常恨讀書不多無以考見古今之同異計其所述必甚精愽所願見也呉監丞輪對文字亦願得之不知可以并垂示否尚書程公垂問曲折尤感其意因見幸爲致謝悃區區之意蓋不殊前也羅兄亦告致鄙懷皆未敢拜書也益㳟得祠甚善材業如此何患不逹政湏恬養以厚本根耳禹貢論得之開豁甚多歎服無巳但恨未見畫圖得爲求之便中寄示幸甚傳畢當并此論歸納也伯駿劄子亦幸垂示它有可見教不吝及之尤所望也某不孝禍深早歲孤露提携教育實賴母慈不幸迂愚不堪世用不能少伸烏烏之報而奄忽至此冤痛割裂不能自存幸以今春粗畢大事音容永隔痛苦終天伏承惠弔并以香茶果實逺致奠儀仰感勤眷之誠俯念疇昔之好拜領號絶不知所言襄陽之除必是見闕正此哀苦不敢奉慶惟是益逺誨晤而殘息奄奄不保朝夕引領西望徒切悵然鄕邦得人之盛魁選復出其中甚爲可喜但所陳取士之䇿於人物取舍之際不免祖襲蘇氏浮薄之餘論此議肆行非天下之福殊使人不滿意自此脫去埸屋想當别作䂓撫耳衰陋何足取置齒頰間耶汪樞之孫遂進而立於三人之列想老丈慰意也荆州之行寄任増重今當入境矣答郭察院邦瑞副封垂示尤荷不鄙使任事者於事之幾㣲每毎如此則尚何朝綱不振之足憂哉甚善甚善甚盛甚盛某衰晚多難懇辭恩除未遂私計之便今不敢復以前請爲說矣惟是前仕有妄乞施行經界一事今巳住罷自合抵罪而反冐褒擢實無靣目可將使指不免自劾以俟嚴譴忽聞抗䟽觸邪遂去言職此於賢業爲有光顧在治朝爲可恨耳偶在病中聞之増氣與士友言亦未嘗不俯而歎仰而賀也鄉黨交遊與有光寵其何幸如之録示諌草三復永歎知忠賢得志之難而吾道果未易行也然清名直節足爲里閭光寵而去一凶人亦足少折隂邪之氣於正論不爲無助此又皆可賀者答郭邦逸吾人之學要當以明理治身爲本世間得失正不足深計也某衰病屏居尚叨稍食不復有與世俗較曲直之心矣聞以前事頗累鄭君爲之踧踖尚賴寛恩不終抵罪也志父中秘之除此却未之聞泉州之命亦然山間真如井底也某昨遣人請祠今巳竟月杳無還耗方以爲慮承喻廟堂巳有領略之意若是監丞兄書中所報想必得其實兼林旣去亦湏兩下有施行乃見平平蕩蕩之意也奏凾必巳關乙覽殊未聞宣召之㫖何耶承當俯就臺選來嵗發䇿大廷始當披腹呈琅玕耳答羅叅議時得欽夫書聞其進徳之勇益使人歎息郴宼掩撃官軍反爲官軍所蹙勢巳小䘐但未知終當如何耳閩中人情却甚安帖時和歲豐天所賜也第州縣以催發上供餽虜之故頗行刻急裒歛之政此爲可慮耳建陽鄉人李秉義舊嘗從寳學劉丈入蜀今老且病往投舊識諸將因來求書得以附此渠不敢有所求但得一顧之寵亦足以爲重也元履來山間相訪適值此便亦有一書附之九月廿日至豫章及魏公之舟而哭之云亡之歎豈特吾人共之海内有識之所同也自豫章送之豐城舟中真欣天真欣天疑是與欽夫得三日之款其名質甚敏學問甚正若充養不置何可量也但云頃在富陽與尊兄辨論甚苦是時左右似未以外學爲不然却與前此相聚時所聞小異何耶汪丈日相聚所講論者何事當有可見語者某頃以書論數事似皆未以爲然者未敢苟巳復以此書扣之論語序一篇欲寫呈之書中巳言之而便速寫札不謹只納左右幸因語呈似幸甚幸甚先生埋銘頃欲只求汪丈寫不知見許不想甞懇之不待言也前書所欲更易數處欽夫又欲刪去一句乃行狀中本語不知汪丈以爲如何乗閒試爲扣之所寄彦豐處書未到今此便過餘干却令往取矣竊承幕府無事得以儉儉字疑游坐進此道而所以與謀贊畫者莫非便民聲勞聲勞恐有誤字之事甚休甚休示及汪丈書知巳爲縁况虚縁况虚等語恐有誤字志銘幸甚幸甚容附書端父兄弟借來一觀也端父兄弟巳祥祭先生徳容日逺益使人痛心耳記善録荷傳示甚慰所望亟作書遣人未及細觀然其大致可見於此始得聞和靖言行之詳蓋其見道極明白故其言之極平易似淺近而實深逺卓乎義不可及也祁居之相見其議論云何有可以見示者否龜山論語序本爲世學膠固學者類多以分文析字執辭泥迹爲務故有視其所視遺其所不視之說但所引用之事從莊列中說作太過遂致㣲失本意却似精粗本末真有二致所以中間竊以爲疑非疑其意特疑其語耳後見張欽夫呉晦叔乃知文定亦嘗疑之不審尊意以爲如何幸有以見教胡仁仲所著知言一冊内呈其語道極精切有實用處暇日試熟看有㑹心處却望垂喻某於汪丈書中巳說及恐欲見即爲呈似也欽夫甞收安問警益甚多大抵衡山之學只就日用處操存辨察本末一致尤易見功某近乃覺知如此非靣未易究也明仲兄不及别拜狀想旦夕從容有講道之樂中間說看易傳不知後來所得如何某亦欲讀此書如有可以見教者因來及之幸甚幸甚元履晉叔近皆相見亦甚瞻仰也前書懇求書藉碑刻等不知曽辱留意否先生諸書想熟觀之矣平日講論甚是如此竒論所未及者别後始書請之故其說止此然其大槩可知矣老兄旣知外學之非而欲留意於此恐於論孟中庸大學之書不可不熟讀而詳味章句之間雖若淺近不足用心然聖賢之言無不造極學之不博則約不可守今於六經未能遍考而止以論孟中庸大學爲務則巳未爲愽矣况又從而忽略之無乃太約乎某塊坐窮山絶無師友之助惟時得欽夫書問往來講究此道近方覺有脫然處濳味之乆益覺日前所聞於西林而未之契者皆不我欺矣幸幸甚甚恨未得質之高明也元來此事與禪學十分相似所爭毫末耳然此毫末却甚占地位今學者旣不知禪而禪者又不知學互相排擊都不劄著痛處亦可笑耳何叔京秋間相過少𣢾相與懷想高致者俱不自勝也知言後來必巳熟看其說如何汪丈曽說及否可否之間必有定論因來及之幸幸記善録細看却似馮公所見未透記得無精彩長者所見莫亦是如此否極感留意以耳目之玩煩長者愧愧向附還三書巳領矣書中忘記禀知也汪丈寄横渠三書來此爲校𥙷甚多勢湏刋作一本乃佳蓋𥙷綴不好看也大抵集中脫誤盡在第二至第五卷中只換却此四卷亦得也第七卷中有一論邉事狀却只於卷末添版便得恐汪丈事多告請岀爲點對付之工人幸甚幸甚此道旣寂寥而諸先賢之子孫亦復流落不振自幕府之西訪其書恤其人不遺餘力此亦一時節因縁耶校書極難共父刻程集於長沙欽夫爲校比送得來乃無板不錯字方盡冩寄之不知今改正未也張家事巳於共父書中言之不知其人巳來未也人家僮僕乃有如此者可尚可尚今士大夫食君之禄不爲不厚而臨事靣謾辭難就利無所不至亦有愧此僕也哉此書轉託欽夫尋便亦方索然無一物可伴書者可笑可笑與羅師孟師舜兄弟某昨承靣喻將以先公行實見委始者徒感知遇之深不自知其不可旣而思之先公平日交游皆海内老成賢雋之士其間相處之乆相知之深而文字言語足以發揚潜德者尚多有之某之不才豈宜進越輙任此責若昆仲以先公甞一顧之不欲鄙棄它時草定行事本末因使得預討論而致之諸公則某雖愚不敢不勉竭駑頓以承命萬望裁之又向䝉示教於軰行間自貶過甚亦不敢當自此枉書幸刋正之先公銘文巳爲題額并託上饒程丈書之字畫淳古可愛想便刻石也其間有少曲折巳爲四哥言之矣答羅縣尉南劍沙縣人讀書治病之說誠如所喻但古人之學以莊敬持守爲先而讀書窮理以發其趣至於讀書之法則又當循序專一反復玩味一日之課不可過三五條譬如良藥雖無劫病之功而積日累月自當漸覺四大輕安矣與林安撫名枅字子方竊聞開府以來蠲除逋負以大萬計號令所下至簡而嚴是以舉措不苛而人自不犯方地數千里吏畏民安近嵗所未有也區區仰德爲日固乆而究觀䂓摹歛衽心服則自今始乃䝉垂問見聞所及又有以見高明之度不自賢智乃如此尤以歎仰苟有所懐安敢不盡顧實未有以塞訪逮之勤耳又承詢及所知别𥿄具禀恨所識不多未足以副好賢樂善之意也晦庵先生朱文公續集卷第五福州府儒學訓導舒鏊校
