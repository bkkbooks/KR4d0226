body:
  text: 辭免辭免召命狀巳卯右熹九月二十六日凖尚書省劄子八月十三日三省同奉聖㫖召赴行在者伏念熹性資朽鈍學術迂踈絶無所長可以自見爲親干禄得備祠官斗升是營敢有他望今者伏遇公朝薦延多士濫塵收召之目雖知非稱豈敢有辭獨念素有心氣之疾近數發動應對思慮未復故常若使貪冐恩榮聞命奔走竊恐臨事顚錯自取罪戾無以上副招徠之意欲乞且依徐度吕廣問韓元吉例令熹候嶽廟滿日前赴行在庻幾得遂恬養猶或可以勉悉愚慮備使令於異日熹不勝幸甚謹具狀申尚書省伏望特賜敷奏施行謹狀辭免召命狀癸未右熹四月十二日凖尚書省劄子云云熹巳於當日望闕祗受訖伏念熹性資朴鄙學術空踈内自省循無以仰副朝廷招徠之選若不瀝情控告祈免誤恩即恐冐昧之嫌難逃物論伏望某官某官特賜敷奏追寢元降指揮使熹得以少安愚分謹具狀申尚書省謹狀回申催促供軄狀一巳卯右熹凖尚書省劄子勘㑹樞宻院編修官施元之因磨勘改官别行注授令熹疾速前來供職仍具巳起發月日申尚書省縁熹近感濕氣見患足疾未任起發前去供職謹具狀申尚書省伏乞照㑹謹狀乞嶽廟劄子熹昨監潭州南嶽廟未滿凖勑差充樞宻院編脩官近凖尚書省劄子令熹疾速前來供職竊縁熹近感濕氣見苦足疾未任就道而家貧親老急於禄養乆欲復備祠官顧未敢請今旣迫以官期深恐稽延自取罪戾欲望鈞慈特與陶鑄嶽廟差遣一次干冐威嚴不勝恐懼之至囬申催促供職狀二右熹昨凖尚書省劄子令熹疾速發來供職者照對熹昨於五月内兩次凖尚書省劄子催促前來供職巳具因依回申乞監嶽廟一次未蒙施行今來又凖前件指揮縁熹委是家貧親老迎侍不前不敢依應指揮前去供職欲望檢㑹前狀早賜陶鑄嶽廟差遣伏乞照㑹施行辭免召命狀一壬辰二月右熹正月十七日凖建寧府遞到乾道七年十二月二十六日尚書省劄子令熹遵依巳降指揮疾速起發赴行在續凖本府再送到元寄納軍資庫尚書省劄子二道内一道備坐乾道六年十二月二十六日三省同奉聖㫖召熹赴行在指揮熹巳於二月十日就本家望闕謝恩訖伏念熹才不逮人學無所就累蒙召擢訖無𥙷報近者䘮制未終復叨收召之命甫及除禫朝㫖又趣其行熹雖至愚仰戴恩遇豈不感激奮勵庻以圖報萬分實以凢庸自知甚審頃希㣲祿徒以爲親今則禍罰之餘荒蕪益甚誠不忍虗冐榮寵以増不洎之悲加以憂患侵凌心志凋弱近於髀裏復發癰腫雖幸破潰耗損愈多正使義無可辭筯力亦難勉強惟是跡渉違慢心不自安敢罄微誠仰干洪造伏望參政僕射平章相公洞鍳悃愊曲賜矜憐都俞之間特賜敷奏早與寢罷元降指揮庶使微賤小官獲安愚分免以稽留威命抵冐刑誅則熹不勝幸甚謹具狀申尚書省謹狀辤免召命狀二右熹五月三日凖建寜府逓到尚書省劄子一道四月十三日三省同奉聖旨林枅朱熹依巳降指揮疾速起發赴行在熹巳於當日望闕謝恩祗受訖伏念熹昨蒙聖㤙収召續𬒳朝㫖趣行自知愚陋𥘉乏寸長無以仰稱公朝薦延之意復念往者爲親妄意干禄然猶自審無能不敢過希榮進矧今孤露僅及免䘮遽於此時起趋名宦情既不忍義亦難安加以禍罰餘生氣血凋瘁疾病攻撓勉強不前即巳具狀懇辤乞賜敷奏寢罷去訖竊慮其狀在路迂回未徹朝聽是致今來再有前件聖㫖指揮恩厚命嚴跼踳無措然匹夫之志前巳具陳勢迫情哀必蒙鍳察更望參政丞相丞相特與檢㑹早賜開陳収回元降指揮以安愚賤之分則熹不勝幸甚辤免召命狀三右熹凖尚書省劄子檢㑹四月十三日三省同奉聖㫖林枅朱熹依已降指揮疾速起發赴行在劄付熹令疾速起發者伏念熹微賤無堪頻煩趣召拜恩踧踖震懼靡皇實以禄弗逮親不忍從宦加以疾病牽勉莫前巳於二月五日内兩次具狀陳乞敷奏寢罷去訖雖人㣲趣下詞義鄙拙不足以仰勤朝聴然披瀝肝膽事皆有㩀不敢一言之妄以取要君罔上之誅伏望參政丞相丞相更賜檢㑹少留聴覧特與敷奏寢罷施行則熹不勝幸甚謹具狀申尚書省謹狀辤免召命狀四右熹準尚書省劄子據熹狀乞敷奏寢罷趣召指揮劄付熹遵依巳降指揮疾速起發前來者伏念熹自蒙収召前後三狀陳述事理巳極詳明既未蒙敷奏施行今亦未敢别有祈請偶以近遭叔母之䘮别無得力子弟䘮葬之役湏當躬親營奉度至來春方得了辦欲望朝廷矜憐特賜寛假許熹候叔母葬事了日别聽指揮不勝幸甚謹具狀申尚書省伏乞照㑹謹狀辤免召命狀五右熹凖三月二十六日尚書省劄子令熹遵依巳降指揮疾速起發赴行在仍具巳起發月日申尚書省者伏念熹昨蒙聖㤙猥加收召自省庸愚無所可用兼以私義有所不安且復疾病支離不堪奔走巳嘗節次具狀瀝懇乞賜敷奏罷免去訖不謂愚誠未能上逹致煩朝㫖再三催促愈益嚴峻熹自揣㣲賤不勝恐懼遂不敢再有陳述只乞候叔母葬事畢日别聽指揮今來又凖上項朝㫖再念熹貧家獨力卜地營葬已及半年未有次第若遽舎之而出竊恐愈見狼狽重以多難早衰舊疾間作近因乆雨感濕傷冷復苦脚弱歩履艱難雖不俟屨而疾趨其勢亦有不可得而勉疆者竊恐久稽朝命負罪益深夙夜憂危不遑啓處謹復具狀申尚書省欲望參政丞相府賜敷奏収囬元降指揮以安愚分且便私計實爲厚幸或恐不欲以一介犬馬之私輕改朝廷巳行之命即乞别賜陶鑄差熹監嶽廟一次使得杜門養病萬一異時稍復疆徤尚或可備使令之末熹不勝幸甚辭免改官宫觀狀一癸巳右熹凖建寧府送到五月二十九日尚書省劄子一道五月二十八日奉聖㫖朱熹安貧守道廉退可嘉特與改合入官主管台州崇道觀任便居住者熹聞命震驚罔知所措伏念熹至愚不肖昨蒙聖恩收召至于再三属以憂患之餘疾病衰廢不能扶曵一造闕庭逋慢之誅方竊俯伏以俟不謂天地父母之恩至隆極厚旣赦其罪不即誅滅而又過於臨照誤有襃嘉一字之榮踰於華衮至於特改京官即卑祠禄又皆朝廷平日所以進賢賞功優老報勤之典乃使愚賤小臣終年安坐一日無故而驟得之熹雖至愚豈不知感激聖恩誓死圖報何敢復議辤受取舎於其間實以多病無能求退得進揆之私義旣有未安而賞不當功名不孚實竊慮以此或致上累聖朝綜核之政則熹之罪又將有不可勝誅者此熹之所以怔營前却千慮百思而終不得以不辤者也所有前件省劄不敢祗受謹巳寄納建寕府軍資庫訖敢復瀝懇披陳仰干洪造欲望參政丞相特賜敷奏收還元降指揮或許仍理舊資即乞别與嶽廟差遣以安愚分實爲幸甚謹具狀申尚書省謹狀辤免改官宫觀狀一右熹昨凖尚書省劄子奉聖㫖特與改合入官主管台州崇道觀熹以私義未安未敢祗受巳具狀申尚書省及將所凖省劄申建寧府寄納軍資庫訖今來又凖告命一軸仰戴異恩俯伏震懼然熹愚懇巳具前狀不敢再有陳述除巳將上件吿命并送建寕府寄納訖謹具狀申尚書省乞賜檢㑹前狀敷奏施行謹狀辤免改官宫觀狀三右熹凖十一月二十四日尚書省劄子據熹狀辤免改合入官主管台州崇道觀恩命乞許仍理舊資别與嶽廟差遣事檢㑹到乾道二年十二月十八日勑節文臣僚辭免恩命各有定制比來不合辤免亦具申陳委是妨廢職事令吏部申嚴行下劄熹依巳降指揮施行者伏念熹昨以憂哀摧毀疾病侵凌不獲恭趨嚴召所以累具辤免乃蒙聖慈寛赦不誅誤加褒異恩生望外事踰例表非常之寵風動四方况熹身𬒳隆私豈不知感實以衰惰廢弃志行不脩無徳可褒無功可錄無以仰稱聖主特逹之知有愧國家勸勵賢能之意以故冐昧復有懇辤不意愚誠不能感動乃蒙檢㑹前件指揮施行在熹豈敢固執迷方輕冐憲綱然竊詳考元降指揮上爲辤免推遷妨廢職事合行禁約若熹所𬒳恩除𥘉無職業即與前件立法之意事體不同敢復披誠再干洪造所冀愚悃得徹聖聦庶㡬㣲賤小臣幸終免扵逋慢之誅而區區匹夫之守獨得伸扵分列之外又况屏絕浮虚抑止貪競其扵聖朝厲精責實之政亦未必全無所𥙷熹之所請亦非止以自為而巳下情無任瞻望祈扣之切伏望參政丞相洞鑒精悃早賜開陳則熹不勝幸甚謹具申尚書省謹狀辤免改官宫觀狀四右熹凖建寕府送到三月十七日尚書省劄子據建寜府據熹狀申乞敷奏寢罷昨來特改宣教郎主管台州崇道觀恩命事并檢㑹乾道九年閏正月二日不許臣僚辤免恩命指揮三月十六日三省同奉聖㫖劄下朱熹照㑹者熹聞命震驚罔知所措竊念熹昨蒙聖恩誤有襃擢感戴激切不知所言徒以自知本非巖穴知名之士行能材術又不逮人貧病退藏自其常分實無毫髪可以仰稱聖朝褒勸之意所以屢觸科禁冐罄悃誠不謂聖慈尚閟俞音恐懼顚越愈不自安不免冐昧再有陳述狂妄昏愚罪在不赦伏望鈞慈委曲敷奏特加寛宥追寢誤恩或令仍守舊資别與嶽廟差遣則不惟小臣獲免昧利苟得之譏在聖朝亦無輕用名器之失熹不勝幸甚謹具狀申尚書省謹狀申建寕府狀一右熹伏蒙使府專委崇安縣丞王文林賫送到熹元寄納告命一道尚書省劄子一道印𥿄一軸到熹所居令熹祗受者照對熹近凖尚書省劄子一道據熹狀辤免上件恩命檢㑹近降不許辤免指揮付熹照㑹熹竊詳上項指揮本意盖慮内外職任臣僚妄爲辤免妨廢職事即與熹今來所乞事體不同巳將所凖省劄具狀申使府寄納軍資庫及申尚書省乞賜敷奏寢罷去訖所有今來使府送到告命文字委實難以祗受重念熹一介㣲賤本無寸長際遇聖明累叨獎㧞所以毎形遜避盖亦各有端由昨來申省狀中不敢縷細陳述是致愚悃未能自通今敢述其一二乞賜備申庶幾微誠或蒙矜察竊縁熹本以諸生應舉干禄於紹興十七年請到文解得試禮部叨預奏名濫綴末第後來參部銓試注授泉州同安縣主簿到任四年省罷歸郷偶以親老食貧不能待次遂乞嶽廟差遣再任未满誤蒙召對除武學愽士又以急於禄養復乞嶽廟一次又未滿間凖勑差充樞宻院編修官㝷以丁憂不及供職續蒙收召又以憂制末終不獲拜命比及免䘮再蒙檢舉催促則憂患之餘心志摧謝血氣耗傷疾病交攻不復堪從仕矣艱苦半生首末如此迂愚之分敢不自安今乃誤蒙襃嘉特改京秩卑以祠禄寵數過優内省庸虚實爲非據蓋語其勞最則入仕以來二十七年閑居之日十居七八語其志節則隨羣逐隊應舉覔官前後求閑皆縁急禄語其學行則躬行不力未能寡過俯仰愧怍内訟方深此皆非有高世之心絶俗之行豈眞能驕富貴而輕爵禄者而使之竊安貧守道之名冐養老優賢之禮以熹愚昧尚有以自知不稱况公論有在人謂斯何若復貪戀恩榮不知引避疆顔忍耻靦靣受之此必傳笑四方貽譏後世在熹雖不足道實懼玷辱聖朝此區區所以冐犯鈇鉞而不得不盡其辭者也所有告劄印𥿄熹既不敢祗受謹巳即時當靣納還崇安縣丞王文林仍具公文回報請爲申送使府依舊送庫寄納外今謹具述愚懇欲乞鈞慈矜念特與備申朝廷乞賜敷奏收回元降告劄印𥿄庶使小臣不致乆違朝命免獲罪戾或蒙還以丁憂巳前𥘉品舊階改差嶽廟一次俾安愚分以盡餘年尤爲厚幸熹不勝祈懇激切之至謹具狀申建寧府使衙伏乞照㑹備申施行謹狀申建寕府狀二右熹凖使府牒差建陽縣主簿送到尚書省劄子一道并熹元寄納告命一道省劄二道印𥿄一軸令熹祗受者竊縁熹昨來辤免實以私義未安不敢冐受朝廷襃寵之恩所以控竭愚誠仰干朝聴亦蒙使府備申去訖今來雖有上件回降指揮縁熹所陳未奉俞允義難茍止湏至再有陳述今有狀一封申尚書省欲乞使府發遞前去所有告命一道省劄三道印𥿄一軸其建陽主簿不肯交領前回今專遣家人賫詣使府乞依舊寄納軍資庫謹具狀申建寧府使衙謹狀謝改官宫觀奏狀右臣熹昨凖尚書省劄子奉聖㫖以臣安貧守道廉退可嘉特改左宣教郎主管台州崇道觀續凖降到告命一道授臣前件官臣聞命震驚罔知所措前後三次具狀申尚書省乞與敷奏寢罷㝷凖尚書省劄子檢㑹近降不許庶官辤免指揮奉聖㫖劄與臣照㑹者仰體徳意不敢固辤巳於六月二十三日望闕謝恩祗受訖伏念臣一介㣲賤無所能似昨蒙聖恩收召實以憂患侵凌血氣凋瘁不獲輿曵殘疾㒹越道塗以盡臣子之恭方竊屏伏以俟誅夷乃䝉聖慈誤形襃寵改官賦禄絶無近比及其皇恐辤避冐觸科禁則又申命丁寧不以即罪恭惟襃勸之意寛赦之恩皆非臣愚所能稱塞顧不敢再有辤遜以瀆天威祗命感恩心口相誓惟當躬佩訓詞益堅持守以求無負天地父母至隆極厚之恩舎此而言則雖湛身碎首九隕而不辤亦不足以論報矣臣無任瞻天望聖受恩感激之至謹具狀奏聞謹奏申省狀右熹昨凖尚書省劄子奉聖㫖以熹安貧守道廉退可嘉特改左宣教郎主管台州崇道觀續凖降到告命一道授熹前件官聞命震驚罔知所措前後三次具狀申尚書省乞賜敷奏寢罷㝷凖尚書省劄子檢㑹近降聖㫖再劄付熹照㑹者熹仰體德意不敢固辤巳於六月二十三日望闕祗受訖除巳具奏稱謝外謹具狀申省伏乞照㑹謹狀申建寧府狀右熹兹者祗受告命係出特恩今有奏狀稱謝合於使府附遞申發竊慮小臣㣲賤限於條制無由得徹冕旒之聴謹具狀申建寧府使衙欲乞照㑹繳奏施行辤免祕書郎狀一丙申七月八日右熹凖六月二十一日尚書省劄子并告命一道授熹秘書郎者熹聞命震驚罔知所措竊以聖主寤寐俊傑圗起事功片善寸長靡不收用巖穴幽隱亦弗棄遺遂使妄庸有此遭遇恩德隆重捧戴難勝豈敢飾詞遜避以孤奬拔之意然熹竊惟國家開建圗書之府所以儲蓄秀異之才選試有程未始輕授郎以奉守爲職雖異典校之官然自昔相承或用以處老成耆德之士如熹凡陋豈所克堪今若貪冐寵榮不自量度此必坐取嘲笑以累聖主知人之明又況頃年屢以多病不才懇辤召命巳蒙聖慈洞照肺腑盖旣憐其愛君憂國粗有畎畒夙夜之誠而又知其衰朽無庸重閔勞以官職之事故凡所以假借襃嘉惠養全活之意雖非愚賤之所當得然天地父母委曲生成之恩則有不可以終辤者此熹所以懇辤踰年而卒拜明命且復具以此意附奏陳謝其所以感恩自誓之誠盖有皦然而不可欺者今乃欲因聖主前日所以假借惠養之資而遂寅縁以冐進擢無涯之寵則是古人所謂登龍㫁而左右望以罔市利者不惟士夫清議有所不貸而熹之不肖亦竊羞之是以恐懼回皇不敢祗受伏惟鈞慈憐察特為敷奏早賜寢罷元降指揮使熹愚分稍安不勝幸甚熹除巳將省劄告命申建寜府送軍資庫寄納外謹具狀申尚書省伏候指揮謹狀辤免祕書郎狀二右熹凖八月三日尚書省劄子以熹辤免新授祕書省祕書郎恩命八月三日三省同奉聖㫖不許辤免者伏念熹草茅賤士章句腐儒昨𬒳詔除自知不稱輒形控避方俟譴訶豈意天慈曲垂恩旨聞命震恐即合奉承敢以固辤重勤淵聴伏況邇者聖徳日新容受讜言旌賞狂直雖在亡没亦不棄捐海内聞風感動興起以至更相觀勵咸願竭忠如熹之愚雖不及此亦豈不願依附末光效其尺寸何忍自棄明時老死巖谷泯泯没没徒與草木俱腐實以空踈頑鄙本非臺閣之姿不敢輒塵華貫進官頒禄巳冐閑退之寵難以復造朝班所以千慮百思徊徨瞻顧雖感恩惜日不勝畎畒之誠而仰愧俯怍卒不得不盡其詞也是敢重瀝肺肝再嬰斧鑕必冀上回沖鑒下遂夙心伏望參政特爲開陳早賜寢罷或仍舊與宫廟差遣一次則熹不勝大幸其降到省劄内有聖㫖指揮不敢拜受巳寄納建寧府軍資庫外謹具狀申尚書省乞賜敷奏施行謹狀辤免知南康軍狀戊戌今月十七日凖尚書省劄子奉聖㫖差知南康軍塡張杆闕又凖尚書省牒奉勑宜差權發遣南康軍事兼管内勸農事仍借緋者聞命震驚若無所措伏念熹踈繆之姿不堪從宦病卧林野日益支離昨蒙聖慈矜憐特與改官仍卑祠禄以遂閑退之願於熹愚分巳為過優今者忽有前件恩命又出意望之外足見天地之仁不遺一物寸長尺短皆欲使其有以自見在熹感激誠不自勝然竊惟念州郡之寄所係不輕苟非其人千里受弊所以朝廷不惟審擇以寄民命而又嚴立資格以叙人材盖不欲使庸妄輕淺之流得以因縁冐處爲民不利前後臣寮建請詔㫖丁寧亦可謂深切而著明矣如熹之愚素號庸劣又自𥘉官一任解罷今巳二十餘年杜門空山罕接人事民情吏職懵不通曉改官以來未滿四考雖名知縣資叙而備數祠官𥘉無職事可以自試黙黙寢卧習成媮惰一旦使之疆起田間攝承郡事不惟資淺望輕有礙累降指揮亦懼無以承流宣化仰稱聖天子綜核名實愛養元元之意此熹之所以恐懼踧踖而不得不辤者也或者以爲熹之賤㣲屏處窮僻而朝廷記憶恩指隆厚至於如此若復苟圗安佚固爲遜避則將無以自竭犬馬報效之勞而䧟於不恭之罪熹竊以爲不然蓋熹本以無能退處田里聖朝過聽誤加奨借寵以廉退之名勵以堅高之操訓詞在耳天鑒弗違熹雖至愚不能及此猶當刻心自誓終始不渝庶㡬可以仰報萬分下全素守今不務此而欲以奔走承命為恭則亦非義之所安矣又況蒲栁之質多病早衰年歲以來精力頓減政使方在仕塗亦湏量力引退顧乃甫於今日疆自修餙起趨名宦豈不大爲有識所笑重貽前詔之羞哉𥘉以官卑人㣲不敢輙具辤免且欲祗拜恩命續伸投閑之請竊縁所差南康軍係塡見闕度亦不過兩月即便復紊朝聴誠不若直情控訴冀蒙矜察庶免煩瀆之罪所有遞到劄子勑牒不敢祗受除巳申送建寧府軍資庫寄納外謹具狀申尚書省欲乞參政丞相少保特爲敷奏寢罷今來所降指揮令熹依舊宫觀差遣則熹不勝幸甚謹狀乞宫觀劄子熹昨蒙聖恩差權發遣南康軍事屬以私義未安不敢祗受即巳具狀辤免續奉聖㫖不許辤免令疾速前去之任候任滿日前來奏事熹聞命震慴巳於十月二十三日望闕謝恩祗受勑命訖仰惟天地之恩至隆極厚一介疵賤捧戴難勝矧以孤愚乆𬒳涵育雖縁踈拙自甘退藏至於策名委質之義學道愛人之心則實有所不能忘者豈不願及明時奉承寛詔悉心營職爲國養民實以今秋以來疾病益侵精神益耗勉從吏役懼速顛隮加以本軍闕人巳乆若以熹故更復遷延竊恐官曹解弛簿書縁絶别致誤事則熹違命不恭之罪益難幸免欲望鈞慈俯賜矜念特與陶鑄宫廟差遣一次則熹不勝幸甚乞宫觀狀右熹昨以疾病衰耗不堪吏役曽於正月二十日具狀申尚書省陳乞宫廟差遣然以𬒳命巳乆不敢寧居即於當月二十五日扶病起離前來二月四日至信州鉛山縣管下歇泊聴候指揮巳經旬日未奉䖏分而熹伏自到此以來衰病之軀愈覺羸悴雖無痛楚危急形證而精神氣力日見凋枯行坐無力語言少氣思慮應接失後忘前旁人雖未遽覺而熹之自知甚審若更勉疆扶曵前去不惟在路必至顛踣雖幸到官亦難於支吾欲望鈞慈俯憐衰朽檢㑹前狀并賜開陳特與改差宫廟差遣一次使螻螘微命得遂天年不至狼狽於道路則熹不勝幸甚熹見今且在鉛山縣聴候指揮謹具狀申尚書省乞賜敷奏施行與宰執劄子熹輙有危􅈤冐瀆鈞嚴熹昨以衰病支離不堪吏責累具申陳乞賜陶鑄宫廟差遣然以乆稽朝命義不遑安即巳扶病離家前來信州管下聴候䖏分今巳旬日未奉進止而熹衰病日益侵加精神昏耗氣力綿惙若復勉疆輿曵之官必取顛踣爲世嗤笑在熹賤微不足深恤竊恐或非聖朝所以眷憐收用之本意也今不獲巳復具公狀冐昧有請伏惟丞相幸垂察而加憐焉特賜開陳從其所欲俾之早得歸伏田里休息疲瘁訪問醫藥以終餘年則熹之感恩戴徳銘鏤肺肝何有窮巳敢忘進越輙具劄子申聞伏乞鈞察自劾不合用劄子奏事狀右熹伏覩都進奏院牒臣寮劄子奏臣竊見舊制章奏凡内外官登對者許用劄子其餘則前宰執兩省官以上許用劄子以下並用奏狀乞申嚴有司應帥漕郡守主兵官如事渉兵機許用劄子餘僣越犯分有不如式則令所屬退還等事三省同奉聖㫖依奏者伏念熹山野生踈不識事體近於今年六月二十二日因本軍陳乞蠲減税錢事曾具劄子奏聞雖在上項指揮之前實亦有違舊制聞命震恐不知所為即欲具奏自劾又恐復以狂妄重干典憲謹具狀申尚書省欲望敷奏亟行罷黜以爲踈逺小臣慢上不㳟之戒謹狀自劾不合致人戸逃移狀一右熹昨䝉聖恩卑以郡紱懇辤不獲冐昧而來到官未㡬不勝吏責疾病交作殆不自支即具劄子申乞改差宫觀差遣側聴累月未䝉敷奏施行熹誠愚昧夙夜靡寧亦欲勉悉疲駑以酬恩遇顧以山野不閑吏道重以凋郡財匱民貧去年上供綱運起發至今粗及其半官吏相承但知竭力催科以給公上庶逃罪責不意屬縣今秋有旱傷處不惟失於檢放加以程督過嚴遂致人戸流移怨謗蠭起雖巳遣官慰喻尚恐未能安帖熹竊自惟平生章句腐儒之學雖不適於世用然區區之志亦未嘗不以愛人利物爲功今乃以是上負使令下負所學積此慙懼疾病侵加誠無心顔可食俸禄欲望鈞慈特與敷奏早賜罷免以爲逺近牧守不勤撫字之戒而熹亦得以杜門省身益求其學之所未至庶幾後効以贖前愆不勝幸甚謹具狀申尚書省伏候鈞㫖自劾不合致人戸逃移狀二右熹昨縁本軍管内今秋有荒旱處不知及早檢放而催理舊欠過於嚴急遂致人戸愁怨相率逃移巳於十月内具狀自劾申尚書省乞賜罷黜以爲州縣之戒惕息俟命至今兩月未奉處分憂懼日積疾病有加職事之間益以荒廢謹具狀申尚書省乞賜檢㑹前狀早賜敷奏施行謹狀乞宫觀劄子庚子正月熹輙有誠懇上瀆鈞聽熹昨䝉聖恩差權發遣南康軍事巳於去年三月三十日到任累以疾病陳乞祠禄未䝉敷奏施行今來在任巳滿十月非乆當書一考實縁衰病愈侵心力凋耗加以脚氣痰飲發作無時難以勉強在職欲望朝廷特賜敷奏改授祠廟差遣一次使得杜門竊食休養殘廢庶幾不至即日顚殞不勝幸甚乞宫觀狀庚子三月右熹昨準勑差前件差遣累以病患辭免不䝉開允遂於去年三月三十日扶病到官交割職事今來在任巳是踰年疾病支離不堪吏責中間節次具狀陳乞宫觀差遣亦末準回降指揮近於三月六日視事之際風痰大作頭目旋暈幾至僵踣今巳累日精神愈見昏憒委是狼狽不可支持謹具狀申尚書省欲乞鈞慈檢㑹熹累乞宫觀文字早賜敷奏特依所請不勝幸甚伏候鈞㫖與政府劄子熹昨以衰病支離輙具劄目陳乞陶鑄宫觀差遣側聴踰月未䝉處分近於三月六日視事之際風痰大作頭目旋暈㡬欲僵仆今巳累日精神愈見昏慢委是狼狽不堪勉彊巳具狀申尚書省欲望鈞慈早賜敷奏特從所請使熹得遂休養以保餘齡不勝幸甚干冐威嚴俯伏俟罪乞宫觀劄子熹輙有危迫之懇干冐鈞聽熹舊有心氣之疾近因禱雨備災憂懼怵迫復爾發動怔忡炎燥甚於常時竊慮當此旱荒曠廢郡事其爲利害又非它時之比欲望鈞慈特賜敷奏與熹宫廟差遣令得少遂休養不勝幸甚所有本軍荒政昨巳措置略有欠第更望催促替人石􅗐疾速前來接續賑救則千里飢民不勝幸甚辤免直祕閣狀一右熹準七月十八日尚書省劄子七月十七日三省同奉聖㫖以熹昨任南康軍日修舉荒政民無流殍可除直祕閣者熹聞命震驚受恩感激有不知所以言者然竊伏念熹昨以非才誤䝉任使不能布宣徳意以惠逺民乃以刑政失中招致殃咎赤地千里民不聊生據罪論刑豈容幸免政使粗能措畫不致大叚狼狽亦是職守之常何足𥙷塞愆負而况蠲閣租稅撥賜錢米許借上供錢物糴米賑糶皆是聖主天地貺施非常之恩官吏於此豈有絲毫之力至於勸諭富民發廪糶濟亦是聖朝不愛官爵以救民命頒下賞格極於醲厚以故富民觀感視傚始肯竭其囷倉累嵗之積以應公上一旦之湏亦非官吏之力所能及也然其賑濟人戸𥘉無致旱之罪今又不取一錢而捐米四五千石方得一官自私家言之其數亦巳多矣此則在所當賞而不可緩者非一時官吏有罪無功之可比也今熹幸際隆寛曲加容貸更䝉除用巳極叨踰今者又𬒳聖恩復有上件除命而熹前所奏南康軍賑濟人戸張世亨等四名合依元降賞格𥙷授文武官資者有司顧以微文沮郤其事至今未見報行推賞指揮是乃聖主過恩旣賞於其所當罪而有司失信反吝於其所當賞熹雖至愚於此竊有所不安者所有降到省劄不敢祗受巳送建寜府寄納軍資庫謹具狀申尚書省欲望朝廷洞照誠悃特爲敷奏許賜收囬仍檢㑹今年閏三月内南康軍奏及熹獨衘奏狀詳酌所陳事理如是節次官司果是固爲邀阻至今不爲保明推賞即將張世亨等併為敷奏依熹所乞不候諸司保明特與先次依格等第推賞直降付身令本軍日下當官給賜是則不惟熹之私義得以自安亦庶幾自今以來州郡長吏奉法遵職務格和平不至幸民之災自圖身利不惟此四人者早䝉聖恩免有邀阻乞覔之擾父子兄弟感戴無窮而萬一不幸四方復有水旱饑饉之災亦使其他富民知所激勵易爲勸誘貧者有所恃頼不復流移其利非止一端而巳也狂妄僣率干冐朝聴祈恩俟罪無任懇切恐懼之至謹狀小帖子稅戸張世亨賑濟五千石依格乞𥙷承節郎税戸劉師輿賑濟四千石依格乞𥙷承信郎進士張邦獻賑濟五千石依格乞𥙷迪功郎待𥙷太學生黃澄賑濟五千石依格乞𥙷迪功郎右具如前伏念熹罷官還家舊任别無綰繫只此一事未了𥘉謂朝廷賞格必非虚文不謂今乃以此自䧟於罔民之罪每一思之如負芒刺顧以居閑不敢陳請今者幸因辤免恩命得效一言過此則分守有拘又將無以自逹切望鈞慈早賜垂念千萬幸甚如是四人近日皆巳得霑恩賞不曾報行即熹屏居深山探問不實之罪亦乞矜貸而其所乞辤免恩命與比事體自不相湏更望力賜開陳期於得請乃爲厚幸伏乞鈞照辭免直祕閣狀二右熹九月𥘉四日準八月十七日辰時尚書省逓到告命一道照對熹昨準尚書省劄子奉聖㫖以熹前任南康軍日修舉荒政民無流殍可除直祕閣熹竊伏惟念昨來在任政刑乖錯招致旱災有罪無功不敢祗受兼在任日遵奉淳熈七年九月二十三日勑㫖賞格勸諭到税戸張世亨劉師輿進士張邦獻待𥙷國學生黃澄四名岀米賑濟共計一萬九千石巳行支散即具奏聞及申諸司乞與保明推賞𥙷授文武官資今來巳是半年竊慮熹旣得替之後諸司未曾保明致得本人未䝉朝廷推賞巳具狀申尚書省乞賜敷奏收還誤恩仍將張世亨等四名不候諸司保明早依原降賞格特與推恩給降付身令本軍日下當官給付及具狀繳連所降省劄寄留建寜府軍資庫訖今來又凖上項告命熹爲有前項所申兩節事理未凖回降指揮不敢祗受巳并申建寜府寄留外謹再具狀申尚書省伏乞檢㑹前狀特與敷奏許熹辭免仍将張世亨劉師輿張邦獻黃澄四名早賜依格推賞則熹不勝幸甚謹狀辭免直祕閣狀三右熹凖九月五日尚書省劄子備坐熹前狀所乞寢罷新除直祕閣恩命事奉聖㫖不許辭免者熹仰戴聖恩不勝感激雖未敢即日祗受謹巳望闕稱謝訖但熹狀内所稱熹雖至愚於此有不能自安者正爲南康軍保明勸諭到稅户張世亨獻米五千石賑濟依格合𥙷承節郎進士張邦獻獻米五千石賑濟依格合𥙷迪功郎待𥙷國學生黄澄獻米五千石賑濟依䅂合𥙷迪功郎稅户劉師輿獻米四千石賑濟依格合𥙷承信郎一節未蒙户部依格放行恩賞乞賜敷奏施行今來所凖省劄内却刪去此項事理熹竊恐區區愚昧迫切之誠未得仰関天聽其合推賞人依舊未得霑𬒳聖恩則熹於義亦難祗受又况目今諸路水旱廣闊公家所積巳經發散所餘無幾全頼富民獻米賑恤若見朝廷施行如此誰肯應募助國救民兼熹見䝉改除提舉浙東常平公事當此凶歲專以救荒爲職若此所乞依格推賞不䝉施行不惟失信於南康舊治亦無靣目可見浙東之民將來必致悮事上貽仁聖宵旰之憂熹雖萬死不足塞責欲望朝廷詳酌特賜敷奏詳熹前狀所陳將南康軍所奏稅户張世亨劉師輿黄澄張邦獻各與照應元格早賜𥙷授文武官資則上件恩命不必加於熹身而聖朝綜核之政脩於上逺近觀聽有所激勸於下矣謹再具狀申尚書省伏候指揮除浙東提舉乞奏事狀右熹今月二十二日凖尚書省劄子奉聖㫖改除前件差遣熹以衰病之餘心力凋耗目昏耳重不堪繁劇擬具情懇干告廟堂乞與敷奏聴容辭免而聞之道路本路今年災傷至重民巳艱食若更遷延有失措置竊恐向後飢民愈見狼狽重貽聖主宵旰之憂謹巳於當日望闕謝恩祗受訖所有合赴行在奏事未奉指揮伏念熹自違陛㦸十有九年誠不勝臣子惓惓願得一瞻天日之光况今救荒合行奏禀事件非一又熹前任南康亦有合奏聞事謹具狀申尚書省欲望鈞慈特賜敷奏施行謹狀辭免進職奏狀一壬寅臣九月四日到處州遂昌縣凖尚書省劄子奉聖㫖淳熈八年旱傷去處監司守臣賑濟有勞令臣進職二等者聞命震驚不知所措謹巳即時望闕謝恩訖伏念臣昨以孤愚誤叨臨遣仰瞻玉色旣閔然有畏天恤民之誠而聖訓丁寧又無非惻怛焦勞之實退惟疵賤遭遇如此誠不敢愛其夙夜之勤冀以仰稱萬一而疾病之餘精力淺短徒費大農數十萬緡之積而無以全活一道饑饉流殍之民蓋嘗一再自劾㳟俟嚴科陛下赦而不誅巳爲寛典至於過恩假寵躐等䟽榮則懼非所以示勸懲惜名器而謹馭臣之柄也况臣昨以按劾知台州唐仲友反𬒳論訴見䝉送浙西提刑司差官體究近日雖䝉聖斷巳罷本人新任所有體究指揮尚未結絶臣方當囚服藉藁以俟斧誅豈宜遽竊恩榮以紊賞刑之典所有前件恩命臣實不敢祗受欲望聖慈特許辭免臣不勝幸甚辭免江西提刑奏狀右臣九月十二日凖尚書省劄子八月十八日三省同奉聖㫖除臣江南西路提點刑獄公事塡見闕去冬巳經奏事不候受告疾速前去之任者臣聞命感激巳於當日就衢州常山縣界首安泊處望闕謝恩解罷前任職事訖伏念臣天賦樸愚與世寡合爰自早歳即甘退藏雖䝉聖朝累加收用竟亦不敢冐昧就職杜門屏處玩思遺經頼天之靈偶窺管穴因竊妄意討論刪述冀成一家之言以待後之學者中間誤䝉聖恩特改京秩訓詞襃勵蓋亦以是期之其後更𬒳除書起𥙷郡吏而臣所守不固不能力辭二年之間中夜撫枕起坐太息未嘗不私自憐悼而悔其𥘉心也旣而復沗推擇備使近畿凡所奏陳多䝉開納賜錢蠲稅無請不從自惟孤愚遭遇如此則又幡然思竭駑頓以稱所䝉唯懼縱姦賊民弃命廢職異時無復靣顔以見陛下至於觸忤權貴掇取怨嫌則雖必知其然而有所不暇計也旣而果如所料沮撓萬端又獨䝉陛下聖明察其孤忠委曲覆護非唯不加誅殛又使得以進職遷官爲名而去臣竊不自知區區之迂愚疵賤何以得此於陛下顧念感激涕下交頥所有恩命誠不當更有辭避以孤睿獎然臣之愚實有所不獲巳者蓋以心目俱昏不堪吏責今夏巳嘗抗章俟罪未奉進止而旱蝗繼作㳟奉御筆戒喻丁寧仰惟聖心憂勞特甚是以惶懼屏息未敢復言今旣䝉恩許解賤職正是草野愚臣乞賜骸骨以遂夙心之時而所除官又係塡唐仲友闕蹊田奪牛之誚雖三尺童子亦皆知其不可况臣雖愚粗識義理何敢自安儻䝉聖慈特賜罷免或與嶽廟差遣使臣得以歸耕故壟畢志舊聞内休巳憊之精神外避當途之猜怨則臣不勝千萬幸甚所有前件省劄内除授恩命臣决不敢祗受巳送衢州常山縣寄收仍一靣出本路界還家俟命欲望聖慈早賜指揮謹錄奏聞伏候勑㫖辭免江東提刑奏狀一右臣十月九日凖尚書省劄子據臣辭免新除江西提刑恩命奉聖㫖令臣與江東提刑梁揔兩易其任臣巳即時望闕謝恩訖伏念臣區區誠懇巳具前奏旣䝉改命曲遂其私使得免於攘奪之嫌以全素守其在微臣固巳甚幸但臣前所奏陳願得䝉恩投置閑散以爲養病著書全身逺害之計則尚有未䝉聖察者於臣私計未便猶多敢昧萬死再有塵瀆欲望聖慈詳臣前奏曲賜哀憐追寢誤恩改卑祠禄使其得遂夙心免罹非禍則於微臣又爲莫大之幸所有省劄内聖㫖指揮臣不敢祗受巳送建寧府崇安縣寄收訖聖恩隆厚報效無階瞻望軒墀臣無任犬馬戀慕激切之至貼黃臣祖郷徽州婺源縣正隷江東見有墳墓宗族及些小田産合該回避又梁揔到官今方月餘一旦忽然無故改易不惟迎新送故煩擾吏民亦礙累降指揮有失朝廷舉措之重伏乞聖照申省狀右熹十月九日凖尚書省劄子據熹辭免新除江西提刑恩命奉聖㫖令熹與江東提刑梁揔兩易其任熹以前奏所乞未䝉開允不敢祗受巳再具奏辭免外謹具狀申尚書省欲乞敷奏寢罷或與嶽廟差遣不勝幸甚辭免江東提刑奏狀二右臣十一月七日準尚書省劄子據臣奏辭免江東提刑及回避田産事奉聖㫖不許辭免田産特免回避者臣草野賤微屢有煩瀆顧勞天語重賜丁寧感極涕零不知所措巳即時望闕遥謝訖重念臣昨𬒳使令妄意職業智識淺短條奏闊踈上誤公朝失於舉措自知罪大不敢自赦是以再䝉恩除不免瀝懇辭避凡所陳述皆出鄙誠非敢飾辭備禮以爲觀聴之美而巳唯是曲折之間猶有不敢盡其辭者然竊仰惟陛下天日之明無幽不燭固不待臣之喋喋然後有以悉其危懼怵迫之情也又况今來所除差遣仍是按察官司若復奉公守法則恐如前所爲或至重傷朝廷事體若但觀勢狥私又恐下負夙心上孤陛下眷知任使之意進退惟谷無地自處是敢忘其再三之瀆上干鈇鉞之威欲望矜憐早賜開允特與嶽廟差遣一次使臣得以休養精神卒其舊業退避仇怨保此餘生或者未塡溝壑間得見陛下重振綱維一新治化而逹聦明目未忘孤忠别有逺外重難驅使則臣雖衰拙尚庶幾效其尺寸将惟陛下所以命之不敢復有辭矣若爲今日之計則退藏之外無可爲者伏惟陛下哀憐財幸干冐宸嚴臣無任戰栗俟命之至申省狀右熹準尚書省劄子據熹辭免江東提刑恩命及回避祖郷田産事奉聖㫖不許辭免田産特免回避劄付熹者伏縁狂妄踈拙巳試罔功不敢復當刺舉之職巳再具奏狀辭免謹具狀申尚書省伏乞敷奏施行辭免進職奏狀二右臣十一月七日準降到告命一道授臣直徽猷閣者臣昨在任日𬒳省劄備坐前件恩命巳嘗具奏稱爲按劾台州唐仲友贓濫不法反𬒳論訴未䝉結絶不敢祇受今者伏覩巳降指揮仲友巳罷新任更不差官體究其紹興府見勘巳招僞造官㑹人蔣暉等亦聞巳得朝㫖盡行釋放訖詳此事理竊恐臣所按劾不公不實别有合得罪名未䝉朝廷行遣難以却因職事微勞遽與其他無罪之人例霑恩賞其所降到告命臣不敢祗受巳送建寧府崇安縣寄收訖欲望聖慈深察特賜追寢施行則臣不勝幸甚辭免江東提刑奏狀三右臣十一月十四日準尚書省劄子據臣辭免直徽猷閣及江東提刑恩命奉聖㫖並不許辭免令疾速起發前去之任者臣昨以怨仇當路蹤跡孤危屢貢封章乞回成命情迫意切忘其再三旣而深自省循始知震懼方且計日以俟誅夷不謂陛下天度含容聖恩溥慱雖未開允亦免譴訶臣聞命感激涕泗交順㳟惟聖詔丁寧不可數得雖知私義有所未安然不敢不抑鄙情以承睿奨即於當日遥望闕庭拜受直徽猷閣恩命訖所有江東提刑職事迫威命之巳行亦擬即日拜受畫時起發而臣至愚反復思慮復有所甚懼而不能巳者不免昧死瀝血再觸天威瞻顧徬徨不知所措伏念臣所劾贓吏黨與衆多棊布星羅並當要路自其事覺以來大者宰制斡旋於上小者馳騖經營於下其所以蔽日月之明而損雷霆之威者臣不敢論若其加害於臣不遺餘力則逺而至於師友淵源之所自亦復無故横肆觝排向非陛下聖明洞見底藴力賜主張則不惟不肖之身乆爲魚肉而其變亂白黒詿誤聖朝又有不可勝言者然陛下之憐臣愈厚則此軰之疾臣愈深是以爲臣今日之計惟有乞身就閑或可少紓患害若更貪戀恩榮冐當一道刺舉之責則其速怨召禍必有甚於前日者陛下雖欲始終保全亦恐有所不能及矣故臣於此深竊恐懼再三籌度以爲與其他日拘攣戚促而失身於仇人之手不若今日再三辭避而得罪於陛下之前又况陛下至仁至明且旣憐臣之厚而保全之如此固未必肯以此加臣之罪而必棄之也是敢決意仰首呼天而一罄其說如此所有前件差遣欲望聖慈深察危懇特賜改差嶽廟一次使臣得以卒𬒳前日生死肉骨之恩免遭異時睚眦中傷之禍臣不勝幸甚若臣前奏所謂著書者則臣自集諸經訓說之外於資治通鑑亦嘗妄有論次數年之前草藁略具一行作吏遂至因循每一念之常恐永爲千古之恨今若少寛原隰之勞更竊斗升之禄假以歳月卒成此書使於世務略有絲毫之𥙷則臣之所以仰報大恩者固不必在於簿書期㑹之間也臣狂妄進越死有餘罪伏惟陛下天地父母矜而赦之臣不勝幸甚謹録奏聞伏候勑㫖貼黃臣誤蒙聖恩俾將使指而臣方以按劾贓吏干忤相臣一身孤危不能自保其何以控制姦猾循撫柔良凢此哀鳴非特自愛實爲陛下一司事權一道民命之計切望聖慈深賜鍳察臣舊讀資治通鑑竊見其間周末諸侯僣稱王號而不正其名漢丞相亮出師討賊而反書入寇此類非一殊不可曉又凢事之首尾詳畧一用平文書寫雖有目録亦難檢㝷因竊妄意就其事實别爲一書表嵗以首年而因年以著綂大書以提要而小註以俻言至其是非得失之際則又輙用古史書法略示訓戒名曰資治通鑑綱目如蒙聖慈許就閑秩即當繕寫首篇草本先次進呈恭俟臨决申省狀右熹凖十二月十四日尚書省劄子據熹辭免直徽猷閣及江東提刑恩命事奉聖㫖並不許辤免令疾速起發前去之任熹仰惟恩㫖稠疊不敢固辤巳於當日拜受直徽猷閣恩命訖所有江東提刑差遣縁熹於廊廟大臣有合囬避事理巳别具狀奏聞如蒙降出乞賜敷奏早與施行熹不勝幸甚謹具狀申尚書省伏候鈞㫖謹狀乞宫觀劄子熹伏自頃歲罷官淛東聖恩卑以祠禄至今考滿家貧累重未能忘禄欲望特賜敷奏更與再任一次伏候指揮申建寧府改正幇勘俸給狀右熹昨於去年二月内凖尚書省牒差充上件差遣當申使府批書勘請俸給蒙糧料院依職司人例幇勘縁熹昨來雖蒙聖恩除授江西江東提刑當即辤免並不曽受告赴任難以依職司人例勘請添支巳即節次具狀申使府乞行改正未蒙施行在熹私義實難冐受今再具狀申建寧府使衙伏乞指揮依條施行謹狀辤免江西提刑狀一右熹見任主管南京鴻慶宫七月二十八日凖尚書省劄子三省同奉聖㫖朱熹除江西提點刑獄替馬大同成資闕者孤逺之迹誤蒙聖恩感激之深豈敢辤避實以連年災患乆病摧頽此去赴官之期又巳不過數月竊慮將来不堪繁劇終須别有祈懇已受復辤為罪愈大所有恩命委實不敢祗受其省劄巳送崇安縣寄收外欲望朝廷特爲敷奏追寢成命令熹依舊奉祠以安愚分辤免江西提刑劄子一右熹近凖尚書省劄子奉聖㫖令奏事訖之任者熹聞命震驚即欲依禀起發前去實以累年以來積負憂畏精神恍惚耳重目昏筋骨支離腰痛足弱其餘病苦發歇不常蓋有言所不能盡者所以昨来𬒳命之𥘉即以此誠控告未蒙俞允不敢遽有煩瀆今來又𬒳前件恩㫖熹竊惟念巳試無堪再蒙收用天地父母之恩巳極隆厚而又特降睿㫖使得奏事而行以爲使臣光華之寵自惟何者有此遭逢若使稍能自力一造闕庭不惟得以少慰八年犬馬慕戀之誠靣陳重疊受恩感激之意而拜起應對之間亦須便蒙聖主哀憐照察不至虚有詞費以干留令之誅顧實衰殘不堪扶曵仰孤隆㫖自棄明時望絶雲天涕下霑臆輙冐萬死復罄愚衷欲望朝廷特賜敷奏寢罷前降指揮令熹依舊奉祠以終餘息辤免江西提刑劄子二四月一日熹昨縁衰病嘗具劄目陳乞宫觀差遣續凖聖㫖令依巳降指揮疾速赴行在奏事訖之任熹聞命震驚不敢復有辤避巳於三月十八日起離前來縁路疾病發作不常所至濡滯今幸巳到信州深欲勉疆前進而病勢侵加腰脚疼痛俯仰拜跪極爲費力顧以趣召之嚴未敢輙爲歸計不免專具申禀迤邐前路聽候欲望矜憐特賜敷奏改差宫觀差遣令熹早得還家將理不至狼狽道路不勝幸甚辤免江西提刑劄子三照對熹昨蒙聖恩令赴行在奏事實縁衰病嘗具劄目陳乞宫觀差遣續凖尚書省劄子備奉聖㫖令依巳降指揮疾速赴行在奏事訖之任熹聞命震驚不敢復有辤避巳於三月十八日起離前來縁路疾病發作不常所至濡滯於當月三十日到信州深欲勉疆前進而病勢侵加腰脚疼痛俯仰拜跪殊覺艱難顧以趣召之嚴未敢輙爲歸計巳於四月𥘉一日再具劄子申禀迤邐前路聽候乞賜敷奏改差宫觀差遣令熹早得還家將理不至狼狽道路㝷即扶曵前來以𥘉四日到玉山縣等候今巳十有餘日未見前回竊慮所差去人在路病患致熹愚誠未徹稽違益乆罪戾愈深謹復專人别具申禀伏望鈞慈詳酌早賜敷奏施行不勝幸甚乞宫觀劄子熹衰遲之迹退閑旣乆茲蒙召對遂獲再瞻咫尺之威又蒙聖慈擢登郎省感戴恩寵何以論報伏縁熹舊有足疾沿路偶值隂雨感冐濕氣遂復發動比入都城疾勢稍間粗能扶持一登殿陛而勞曵遂増沉綿伏枕呼號兩脛如割是以𬒳受省劄累日未能赴部供職雖巳具申乞給朝假將理竊慮未有痊愈之日稽留成命義有未安欲望特賜敷奏改授一在外宫觀差遣辤免江西提刑狀二熹衰悴餘生養痾待盡聖上不忍棄捐復加收用且令奏事而去自惟孤遠何以上軫記憐感激恩遇未知報塞固當聞命即日引道實縁頻年憂患疾病多端不免具狀陳乞祠禄旣不得請即不敢家居固辤而力疾就道行次信州脚氣果作兩次遣人復申前請俯伏俟命凢歴四旬幸而調治稍安且有促行之命即遂扶曵前進然自入國門右足復痛中間幸得小愈始克進望清光靣陳愚悃悉荷開納於熹志願豈復有它而奏對之時左足巳痛繼以參謁勞動有加及至次日特蒙聖恩除熹兵部郎官則痛楚巳甚宛轉號呼不能履地矣熹以未能即日拜命供職即具申朝廷給假將理是晚忽有吏人抱印前來令熹交割熹以未曽供職不敢收領嘗具公狀劄子回申本部並無回報但令吏人指揮必要交印熹又具劄子陳懇亦不收受熹不得巳遂令吏人在安下處同共看守呻吟少暇即令呼喚嚴切照管擬俟病愈赴部供職凢此本末衆所共知守印吏人亦皆見聞未嘗敢有毫髪偃蹇邀求之意而次日傳聞長貳巳有劾章熹不敢自辯即時具状請祠囬避復蒙聖慈曲賜全護使得仍舊持節江西并與放行累年磨勘在熹愚分優幸巳深即合奔走赴上以圖報稱而繼聞論者謂熹姦妄過有邀求目爲亂人之首加以事君無禮之罪對衆宣言逺近傳播聞之駭懼益不自勝但以去國未遠嫌於紛競不敢遽然有請今迤邐西行浸迫所部竊自思念爲人臣子而有此名罪當誅戮豈可復任外臺耳目之寄政使聖恩寛貸在熹亦何靣目可見吏民兼熹所患足疾日困奔馳不得休息乍止乍休未能一向痊平而江西憲司乆闕正官若更遷延日月則是以熹衰病嫌疑之故乆廢一路之事稽留朝命爲罪愈深熹除巳一靣還家待罪欲望朝廷特賜敷奏詳熹罪狀實如論者之言即乞重行黜責使得杜門念咎畢此餘生熹不勝幸願祈懇之至伏候指揮小貼子或謂熹之此請跡渉違慢恐實論者之言反速大戾熹竊自念前日奏對劄子兩論刑獄利害一論經緫制錢不當立額一論江西諸州科罰之弊熹之區區豈是妄有邀求厭薄外使但以今者自致煩言不堪耳目之寄湏至陳懇天日在上必蒙監照欲乞併賜敷奏施行與宰執劄子熹輙有危悃冐干鈞聴熹一介孤逺乆荷聖知兹者曲被記憐擢自冗散付以一道祥刑之寄又使得以職事奏對靣賜襃諭留寘省曹在熹何人可以報稱實以素有足疾在道屢作自入國門右足先痛中間小愈僅能扶持入對行立稍乆即覺左足復痛不能支吾旣出宫門復行參謁即遂大痛比及𬒳受省劄則巳赤腫拘攣不能履地矣以此不得即日供職亦嘗申省請假即非有它而傳聞長貳遽有封章劾其姦妄指爲亂人之首加以事君無禮之罪雖聖朝廣大曲加掩覆使之得以私請復卑舊官從容而去然彈文喧播罪戾著聞竊自揣量若使果如所言則熹罪當誅戮豈可復叨外臺耳目之寄今有公狀申省待罪伏望鈞慈特賜敷奏重行黜責使得杜門屏跡深自循省不勝萬幸辤免江西提刑狀三右熹昨爲兵部侍郎林栗抗章劾數其要君拒命作僞無禮之罪幾數百言得之傳聞不勝駭懼遂不敢前赴新任而具狀申省伏候嚴譴今凖尚書省劄子六月二十六日奉聖㫖朱熹力疾入對奏劄皆論新任職事朕諒其誠復從所請可依巳降指揮疾速之任熹拜受伏讀感極涕零伏惟天日之明洞燭幽隱凡羣下之誠僞曲直蓋無所匿其情者以至皇慈廣覆不間微賤優容之至辨白之詳撫喻之温襃借之寵則又有非踈逺小臣所當得者誠宜祗承德意拜命即行而熹歸途踏熱度嶺足疾又頗發動委是不任起發前去又況林栗見今在職餘憤未平萬一事有統臨必至重遭按治孤逺之迹誠不自安欲望朝廷哀憐特賜敷奏寢罷元降指揮或恐聖慈閔其貧病即乞委曲開陳特與宫廟差遣一次使得杜門念咎畢此餘生千萬幸甚謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有私懇仰干公聽熹昨以疾病未愈誣詆未明不敢祗赴新任輒以公狀申省待罪及具劄子控瀝鄙懷近者伏奉省劄仰聆玉音乃知聖明巳垂深照辨理昭晰訓喻丁寜三復以還不勝感涕實以所苦足疾在路踏熱頗有増加而林侍郎列職中臺尚湏回避除巳别具申省文狀陳乞敷奏施行外敢復具此冐昧崇聽欲望鈞慈矜念早賜開陳俾寛彈射之虞獲醻香火之願熹不勝幸甚辤免磨勘轉官狀右熹今月二日凖尚書吏部降到告命一道磨勘轉朝奉郎者伏念熹昨以無能跧伏林野聖慈過聽特改京官在熹之愚巳出望外後來雖有考第合該磨勘縁熹改官之後一向奉祠即無勞效可考中間雖曽實歴知南康軍一任及提舉浙東常平數月又巳各蒙聖恩特除貼職所以不敢妄有陳乞自速貪冐之罪以負襃擢之恩今來不謂方𬒳重劾反蒙聖知仍舊差遣特詔有司給還磨勘以寵其行致有上件恩命仰戴天慈雖深感激俯循私分敢負夙心兼以近方具狀申省回避兵部侍郎林栗仍乞宫觀差遣所有恩命熹實不敢無故祗受除巳送建寜府寄収外謹具狀申尚書省伏乞敷奏収回所降告命以安愚分伏候鈞㫖與宰執劄子熹輙有愚悃仰干鈞聽熹昨以蹤跡孤危懇求祠禄未奉進止方竊凌兢忽蒙尚書吏部遞到磨勘轉官告命一道熹實以自昨改秩以来累任祠官無績可攷中間两𬒳任使又巳各蒙除授職名所以前後不敢陳乞磨勘即非固爲矯激又况今来方𬒳重劾曲荷寛恩揆之師言巳爲幸免豈敢無故冐當聖世陟明之典上累公朝責實之政除巳具狀申尚書省欲望鈞慈特賜敷奏追寢前命則熹不勝千萬大幸辤免直寳文閣狀熹昨以妄庸荐叨除用辟言引疾曲荷俯從省巳顧私不任感激所有宮觀差遣熹巳即時望闕謝恩祗受訖惟是進職恩命眷奬隆深自顧么㣲莫堪稱塞兼覩近制内閣清班非有勲庸不輕遷授而熹無狀行不掩言無以取信交遊以至自貽詬辱旣勤聖慮復紊朝綱罪則巳多功於何有靦顔冐受義實難安欲望朝廷特賜敷奏追寢成命令熹且以舊官竊食祠館不勝榮幸伏候指揮與宰執劄子熹輙有愚懇仰塵鈞聴熹昨者辟言引疾曲荷矜憐巳遂奉祠之請不勝幸甚但蒙聖恩横加職秩俯循愚分仰稽近制皆有所未安者謹巳具狀申省辤免欲望鈞慈深察誠悃早賜敷奏特與施行則熹尤不自勝千萬幸願之至辤免召命狀右熹凖九月二十六日尚書省劄子奉聖㫖朱熹召赴行在熹聞命震駭不知所爲伏念熹仐年六月巳蒙賜對狂妄無取𬒳劾而㱕雖蒙聖明始終臨照遷官進職曲賜寵光自揣妄庸莫勝負荷俯仰跼蹖慙懼巳深獨念凢此誤恩皆為許其閑退故竊冐受不以為嫌不謂皇慈未忍捐棄復加収召俾造闕庭區區臣子之心豈不深願乘此幸㑹再見君父庶以畢其前日未盡之餘忠顧以方竊難進易退之褒遽爾復爲弹冠結綬之計則其為世觀笑不但徃来屑屑之譏又况朝廷舉措之重亦有不宜數為天下有識所窺者熹誠恐懼不敢冐進乞賜敷奏収還前件指揮使得卒𬒳矜憐惠養之厚恩不至上誤訓辤褒勸之隆指伏候指揮與宰執劄子熹輙有愚悃敢冐公朝之聴熹昨丐祠禄休養衰殘曲荷矜從方此拜命忽爾并𬒳堂帖又蒙聖恩収召聞命震愓無所自容顧以今夏巳甞進對㝷𬒳彈劾惶懅而㱕半年之間屡叨榮寵若不自揆復此奔趋是使詔褒悉為虗語龍㫁之誚熹竊懼焉又况意廣才踈頭方命薄儻復更遭詆辱不惟愈傷士氣亦恐重為朝廷之羞巳具狀申省辤免欲乞鈞慈特賜敷奏得遂追寢實為厚幸辤免召命奏狀右臣輙有愚懇上瀆天威臣伏自今年六月蒙恩賜對繼叨除授寵數重疊卒卑祠禄以遂退藏感激方深慙懼亦劇曽未踰月又蒙収召臣以屡蒙褒嘉不敢復希榮進具狀申省乞賜寢罷而陛下過恩未即開允仍詔疾速趋赴行在臣聞命震恐不知所為顧念前狀所陳巳極詳盡未蒙聖照不敢頻煩竊自惟念昨者進對迫於疾作口陳之說有所未盡即甞靣奏乞具封事以聞至仐日乆未得投進恐或以此之故再煩趣召之嚴内省稽違不勝恐懼仐謹撰成奏䟽一通凖式實封隨狀投進伏望聖慈少賜觀覽則臣雖不獲身到闕庭亦與靣對指陳無異陛下幸試察焉如其可行則采其狂妄之言而全其進退之節臣之幸也如不可用亦乞聖明哀憐其愚曲加裁赦只與寢罷元降指揮亦臣之幸也草野賤微干犯斧鉞下情無任危懼戰栗之至謹録奏聞伏候勑㫖申省狀右熹昨甞具狀申乞敷奏寢罷召赴行在指揮今凖尚書省劄子奉聖㫖不許辤免疾速赴行在者熹聞命震恐不能自勝伏念臣之事君猶子事父東西南北唯命之從此古今不易之理也矧熹至愚遭遇明聖不忍終棄曲賜甄収私義未安不免辤避未蒙開允猶復有言揆以常情實乖臣子之禮然熹之愚悃前狀敷述巳極詳明今更不敢喋喋以煩公聴惟是仐年六月蒙恩賜對時以迫於疾作口陳之說不獲䆒盡即甞靣奏乞具封事以聞至今日乆未得投進恐或以此之故再煩収召之嚴内省稽違不勝恐懼謹巳繕寫凖式實封遣人齎擎詣闕通進若使狂妄之言得塵聖覽即熹雖不獲身到闕庭亦與靣對口陳無異必蒙聖慈許其辤免以全進退之節除巳具狀奏聞外謹具狀申尚書省伏乞更賜敷奏寢罷元降指揮伏候鈞㫖與宰執劄子熹昨具狀劄懇辤召命兹𬒳恩旨未賜允俞熹之微誠巳具前牘不敢重陳以煩公聴今謹撰到奏䟽一通凖式實封具狀繳進及别具狀略述鄙誠恭扣廟堂乞賜敷奏欲望鈞慈照察早垂矜念使得遂其所請不至乆稽宸命以乖臣子之恭則熹不勝幸甚干冐威尊伏増震悚申登聞檢院狀右熹昨於今年六月蒙恩賜對偶以足疾發作更有口陳事理未得殫盡甞即靣奏乞許續具封事以聞至今日乆未獲投進兹者又蒙聖恩輙敢撰到奏䟽一通凖式實封遣人齎擎詣闕投進并述愚誠懇辤恩命謹具狀申行在登聞檢院欲望依法施行謹狀辤免崇政殿說書奏狀右臣昨蒙収召懇辤未獲輙敢具奏再申愚悃自惟冗賤輕犯天威方此踧踖以俟嚴譴今月三十日忽凖省劄奉聖㫖差臣主管西太一宫兼崇政殿說書疾速前来供職臣聞命震恐無地自容伏念臣本以今歳以来屡叨恩奬不敢祗赴召命又慮稽違日乆有乖承命之恭以故不免籲天陳誠冀蒙開允至於輙干斧鉞冐進封章亦幸聖明察其淺妄庶㡬必遂退藏之願不謂聖恩隆厚天度并包雖閟俞音亦寛刑典其爲感激巳不勝言而又特降除書俾侍經幄竊惟此職屡得真儒實闡聖猷以開帝學職親地密任遇非輕顧臣何人敢與兹選又况方祈閑退反得超陞冐昧之嫌亦難自解在臣私義尤所未安伏望聖慈俯察誠欵特賜寢罷元降指揮令臣仍奉外祠以全素守不勝幸甚干冐宸嚴臣無任恐懼隕越之至謹録奏聞伏候敕㫖申省狀右熹昨以懇辤召命未蒙開允輒具奏聞及申尚書省乞賜敷奏今月三十日忽凖尚書省劄子奉聖㫖差熹主管西太一宫兼崇政殿說書疾速前来供職者熹方祈自屏反𬒳殊恩聞命震驚莫知所措巳再具狀奏聞乞賜寢罷外更乞朝廷特賜敷奏早降指揮以安愚分熹不勝幸甚謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有愚誠仰干朝聽熹昨以控辤召命未蒙開允僣率具奏深懼犯干乃蒙聖恩擢侍經幄自惟山野方願退藏反速襃陞益深悚仄巳具奏狀懇辤及申朝廷乞賜敷奏外𣣔望鈞慈察熹所陳即非備禮早賜将上令熹依舊得竊外祠之禄以畢餘年不勝大幸冐瀆威尊伏深戦栗辤免祕閣修撰狀一右熹昨具奏狀辤免主管西太一宫兼崇政殿說書恩命今月十一日凖尚書省劄子奉聖㫖依所乞可除祕閣修撰仍舊宫祠熹巳即時望闕謝恩復還舊任下情不勝感戴欣幸之至唯是進職指揮竊縁去秋方蒙聖恩直寳文閣懇辤不獲祗受無名自頃至今曽未五月每自循省慙懼日深今來只因辤免新除别無絲髮勞效復有前件優異之恩比之去年尤爲超躐恭惟聖主隆天厚地之施豈一介踈逺小臣所敢辤避實以公朝爵賞之重私心義理之安交有所妨决難冐受欲望朝廷深賜矜察特爲敷奏寢罷元降指揮庶㡬少安愚分謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有私懇仰干公聽熹近凖省劄恭𬒳聖恩以熹辤免内祠經幄之命俾以中祕論撰之職復歸故官熹謹巳拜恩還理舊任感幸之至不可勝言唯是進職無名頻繁超躐不唯分義之守有愧私心亦恐過誤之恩未厭公議巳具狀申尚書省乞賜敷奏寢罷又念所請實出至情即非㝷常備禮辤遜是以復此干冐威尊欲望矜憐早賜處分熹下情無任祈扣迫切之至辤免祕閣修撰狀二右熹四月二十二日準尚書省劄子以熹辤免祕閣修撰恩命奉聖㫖不許辤免仍凖吏部降到告命一道授熹前件職名者聞命感激不知所言伏念聖朝爵賞之重小臣分義之安前狀敷陳巳極詳備不敢重出以煩公聽獨觀近事蓋有曽任執政臣僚見帶職名起鎮藩服丐祠得請進職一階有命未行巳復報罷者况熹㣲賤非彼之倫而誤寵横加乃超三級則又非特如彼之序進而巳法義昭著比類明白不待有識而後知其不可此熹所以不避再三之瀆而敢復有辭者也又况熹本以賤貧應舉干禄豈敢輙忘君臣之義妄意山林之髙前後所以累辤恩命實縁自度卑鄙無以仰稱所蒙至如中間東浙救菑之役稍可勉效驅馳即便承命以行未嘗一辭丐免其後節次該遇霈恩合得恩例熹亦隨衆陳乞此亦足以見其非敢矯情飾詐而罔上以要名矣今者所陳實以决無可受之理所以不量螻蟻之賤屢觸雷霆之威儻未允從不容苟止伏惟朝廷深察此意力賜開陳特與追寢誤恩或令且帶舊職庶㡬仰全壽皇眷知惠養之意昭示聖主涵容覆露之恩免使戅愚自取夷滅則熹不勝千萬幸願之至所有告命不敢祗受巳送建寕府寄収訖謹具狀申尚書省伏候鈞㫖與宰執劄子熹有危迫之懇不避誅斥再犯威嚴伏望髙明少賜憐察伏念熹昨以蒙恩進職輙具辤免非敢矯情飾詐罔上盗名實以僥冐重疊奨㧞超踰稽之國常揆以私義决無可受之理故輒冐昧日冀允從不謂愚衷未能上逹不免復具公狀引例陳情切望鈞慈深照本末詳賜開陳得蒙聖恩俯從卑願則熹不勝千萬幸甚干瀆再三俯伏俟罪晦庵先生朱文公文集卷第二十二閩縣學訓導何器校
