body:
  text: 詩崇夀客舍夜聞子規得三絶句寫呈平父兄煩為轉寄彥集兄及兩縣間諸親友空山𥘉夜子規鳴靜對琴書百慮清喚得形神兩超越不知底是斷腸聲空山中夜子規啼病怯餘寒覔故衣不為明時堪眷戀久知岐路不如歸空山後夜子規號斗轉星移月尚高夢裏不知歸未得巳驅黃犢度寒臯寄雲谷瑞泉菴主憶昔誅茅日山房我自名風埃猶俗纍煙雨負巖耕多謝空門侣能同物外情肯來分半壑聊爾度平生少待清秋日間尋逺嶽盟不知誰是客一笑絶塵纓入南康界閲圖經感陶公李渤劉凝之事戲作長官定笑歸來晚中允應嫌去却回惟有山人莫相笑也曽還俗做官來屢遊廬阜欲賦一篇而不能就六月中休董役卧龍偶成此詩登車閩嶺徼息駕康山陽康山高不極連峰鬱蒼蒼金輪西嵯峨五老東昻藏想象仙聖集似聞笙鶴翔林谷下凄迷雲關杳相望千巖雖競秀二勝終莫量仰瞻銀河翻俯看交龍驤長吟謫仙句和以玉局章疇昔勞夢思兹今幸徜徉尚恨沗符竹未愜棲雲房巳尋兩峰間結屋依陽岡上有飛瀑駛下有清流長循名協心期弔古增悲涼壯齒乏竒節頽年矧昏荒誓將塵土蹤暫寄雲水鄉封章儻從欲歸哉澡滄浪讀李賔老玉澗詩偶成獨抱瑶琴過玉溪琅然清夜月明時秪今巳是無心久却怕山前荷簣知立秋日同子澄寺薄及僉判教授二同寮星子令尹約周君假君同遊三峽過山房登折桂分韻賊詩得萬字輒成十韻呈諸同遊抗塵幾何時猿鶴共悲怨豈知朱墨暇乃適山水願兹晨秋令𥘉休沐謹邦憲佳賔忽四來英僚亦三勸駕言北郭門謝此旟隼建散目山崔嵬縱轡路修蔓憑欄快倒峽躋壑困脫挽追攀林樾深歡喜腳力健登高眺逺浦衆景爭自獻何必仍丹丘徑欲凌九萬和子澄白鹿之句經旬不到鹿埸隂夢想飛馳不自禁幸有高軒同勝賞何妨折屐共幽尋徘徊未厭詩書樂感慨難忘忠孝心更對豐鐫哦伐木風泉雲壑助清吟暇日侍法曹叔父陪諸名勝為落星之遊分韻得往字率爾賦呈聊發一笑長江西委輸匯澤東滉漾中川屹孤嶼佛屋寄幽賞我來此何日秋氣欲蕭爽共載得高儔良晨豈孤往酒酣清嘯發浪湧𥘉月上疊鼓喚歸艎陳迹真俯仰九日奉陪高州史君莆陽別駕會稽丞公善化明府仲衡詩伯并屈子美元範二兄及郡中諸文武同登紫霄絶頂南望江湖北眺淮甸少快心目既歸又得仲衡佳篇句法清麗情致悽惋三復不勝起豫之歎謹次韻呈請皆賦之以紀一時之盛甚惠甚望此日登高處千巖錦樹稠無人嘲落帽有客賦悲秋忽忽塵中老匆匆物外遊江湖空極目不盡古今愁下元節假行視陂塘因與賔友挈兒甥出郭登山歸賦二詩示子直春卿及折桂雲谷并寫呈郡中諸寮友廬阜東北際岧嶤五峰尊中巖穹林繞青天白雲屯郡閣有佳眺徙倚空朝昏今晨幸休暇發軔北郭門牽蘿出林端躡屐躋雲根高尋却深宦小憩欣潺湲古殿宿寒靄新薨麗朝噋扶藜陟東岡夙昔規曽軒却倚千尋峭前窺百泉奔長風卷浮埃江湖渺相吞結架雖未諧雄瓌巳難論同來俱勝流晤語仍王孫巳踐支許諾不慙夙尚魂賦詩紀兹日歲晚期相敦卧龍之遊得秋字賦詩紀事呈同遊諸名勝聊發一笑躡石度急澗窮源得靈湫谽谺兩對立噴薄中怒投何年避人世結屋棲巖陬嘉名信有託故迹誰能求我來一經行凄其仰前修鄰翁識此意伐木南山幽為我立精舍開軒俯清流多岐諒匪安一壑真良謀解組云未遂驅車且來遊嘉賔頗蟬聮野䔩更獻酬飮罷不知晚欲去還淹留躋攀巳別峰窺臨忽滄洲下集西澗底沉吟樹相樛玉淵茗飮餘三峽空尊愁懷賢既伊鬱感事增綢繆前旌向城郭回首千峰秋卧龍之遊錢通守得江字不及賦詩巳解維矣熹用其韻紀事以贈并附卷末君行安所適衝風泝濤江傳聞閬州好未見心巳降邀君康山遊聽此巨壑淙班坐酌溪石幽尋憩雲窗勸君盡此杯錦帆巳稠杠明年儻來東鳴鐃建高幢訪我深澗底晤言絶紛嚨城南且細説慰我心悾悾分韻得眠意二字賦醉石簡寂各一篇呈同遊諸兄驅車何所適往至秋雲邊企彼澗中石舉觴酹飛泉懷哉千載人矯首辭世喧凄涼義熙後日醉向此眠仰視但青冥俯聽驚潺湲起坐三太息涕泗如奔川神馳北闕隂思屬東海壖丹衷竟莫展素節空復全低徊萬古情惻愴顔公篇為君結茅屋歲暮當來還醉石天秋山氣深日落林景翠亦知後騎迫且復一流憩環瞻峰列屏逈矚泉下濞永懷仙陸子久挹浮丘袂于今知幾載故宇日荒廢空餘醮壇石香火誰復繼更憐韋刺史五字有真意虎竹付歸人悲風起橫吹沉吟向絶迹浩蕩發幽寄來者知為誰念我儻三喟簡寂尋白鹿洞故址愛其幽邃議復興建感歎有作清泠寒澗水窈窕青山阿昔賢有幽尚眷言此婆娑事往今幾時高軒絶來過學館空廢址鳴絃息遺歌我來勸相餘杖䇿搴緑蘿謀野欣有獲披圖知匪訛永懷當年盛莘莘襟佩多博約感明恩涵濡熙泰和凄涼忽荒榛俯仰驚頽波發教逮綱紀喟然心靡它伐木循隂岡結屋依陽坡一朝謝塵濁歸哉碩人薖時巳疏上尚書乞洞主矣遊白鹿洞熹得謝字賦呈元範伯起之才三兄并示諸同遊者歲月有環周窮臘忽受謝眷眷山水心幸此朱墨暇招呼得良友邂逅成夙駕深尋故轍迹喜見新結架永懷拾遺公藏器此待價橫流詩書澤下及楊李霸炎神撫興運制作流大化石室萬卷藏綸言九天下規模未云逺荒茀良可詫自非賢邑宰誰復此精舍會當求敕賜畢願老耕稼更與盡心期臨流抗風榭元範尊兄示及十梅詩風格清新意寄深逺吟玩纍日欲和不能昨夕自白鹿玉澗歸偶得數語江梅大雪天地閉窮隂渺寒濵誰知江南信巳作明年春嶺梅梅花破蕚時瘴雨吹成雪驛使忽相逢無言似愁絶野梅野風吹孤芳逈立正愁絶皂蓋莫徘徊堪看不堪折早梅霜風殊未高杖䇿荒園裏仙子別經年相看共驚喜寒梅白玉堂前樹風清月影殘無情三弄笛遙夜不勝寒小梅且喜梅花開莫嗟梅花小花小風味深此意君巳了踈梅玉笛未黃昏冰灘巳清淺踈影不勝妍愁心為誰逺枯梅樛枝卧龍蛇泠蘂綴冰雪千里故人心今年為誰折豫家居時劉平甫折此枝為贈落梅花開巳凄涼花落更愁寂來歲煙雨時為君和鼎實賦梅君欲賦梅花梅花若為賦繞樹百千回句在無言處觀梅小集以齋禁不得奉陪因寄小詩梅花年後欲離披恰是先生變食時送與西樓一尊酒諸君莫負可憐枝元範别後寄惠佳篇清叟次韻見示格律俱高詠歎不置因亦用韻寫呈二兄聊發一笑故人别我去一月曠音驛今朝得新詩開卷意巳適知君到里門征騎聊一息行復敞天閽從容正朝幘自今九霄路不復兩塵隔容與日華東翺翔禁扉北回頭五峰下寂漠笑孤客不賦歸去來心形謾相役右呈元範五十行過二雙鬢颯秋草平生素心人誰與共兹抱今年廬山下得子恨不早歲月幸同庚詩書復同道惟應山南北雲母夜堪搗獨生有先期回崖詎難到丹經不我誑白髮須一掃看公鬚眉蒼杖鉞督征討右呈清叟次卜掌書落成白鹿佳句重營舊館喜初成要共群賢聽鹿鳴三爵何妨奠蘋藻一編詎敢議明誠深源定自間中得妙用元從樂處生莫問無窮菴外事此心聊與此山盟白鹿講會次卜丈韻宫墻蕪沒幾經年秪有寒煙鎖澗泉結屋幸容追舊觀題名未許續遺編請為洞主不報青雲白石聊同趣謂西澗劉公霽月光風更別傳謂濂溪夫子珍重箇中無限樂諸郎莫苦羡騰騫再用前韻示諸同遊幽卧寒巖不記年飽看山月聽風泉舒憂正得琴三疊玩意惟憑易一編誤落塵中乖夙尚却思洞裏付真傳封章倘幸天從欲便解銅符謝縶騫次韻四十叔父白鹿之作誅茅結屋想前賢千載遺蹤尚宛然故作軒窗挹蒼翠要將絃誦答潺湲諸郎有志須精學老子無能但欲眠多少箇中名教樂莫談空諦莫求仙送四十叔父吾家從昔號清門叔父于今道更尊客路艱難空自惜遺經終始向誰論獨尋雲嶠逢孤姪共愛春江接故園細説刈葵休放手此來真不為盤餐伏蒙祕閣張丈寵顧下邑并以長篇為貺降歎之餘牽勉繼韻仰求斤削僭率皇恐向來滅迹東山東閉門不問烏雌雄門前有路向塵土兩足未舉心先慵當時亦有車馬客此意欲説嗟誰同窮居聊復追仲蔚篤論何必須劉龔平生故人子張子相思安得長相從每勞書疏問生死坐想星宿羅心胸幾年持節漢水上木牛流馬旌旗紅君王輟饋思頗牧外庸且訖來朝宗因能過我紫霄下後乘載得珠簾櫳蒼顔白髮應笑我曷不飽卧陶窗風開樽鵝池水清激下馬醮石煙空濛須臾路轉山更好摩天巨刃排雙峰少看銀河忽倒挂直欲跳下清泠中南臨匯澤共指點縹眇貝闕浮珠宫公言平日愛登覽到此一洗群山空坐間為我出竒句不用逺寄南飛鴻上言雲泉足竒賞下歎契闊歡相逢紛吾失腳墮世網乃有此會寧天窮流光過眼驚昨夢舊約回首羞塵容明朝却上煙艇去滅沒萬頃追鳬翁和張彥輔初到南康之句十年不共賦陽春正有胸中萬斛塵失喜清詩還入手細看佳句轉驚人知公近覺青山好顧我頻嗟白髮新肯過寒齋共尊酒向來心事請深陳奉同都運直閣張丈哭敬夫張兄張丈有詩敢次元韻悲悼之極情見乎詞伏幸采覽二首秀翁威略憺華戎遺恨車書久未同喜有象賢堪嗣事故知鴻業自無窮蕃宣合奏三年最風采俄驚一旦空根本平生有深計遺書不但子囊忠不應世道即漂淪何事今年失此人禮樂端能懷益友琴笙忍遽樂嘉賔亦知遊好曽通譜却記登臨喚卜鄰兩首悲詩數行淚感傷那復鬪清新張丈垂顧適聞訃音為罷郡宴敬夫向嘗約熹徙居湖之上蓋相語於裴公臺上云祕閣張丈簡寂之篇韻高難繼別賦五字以謝來貺勞農會稽宅息駕丹元鄉丹元不可見翠壁空雲房是時中春月暄風發新陽白水注幽壑緑樹敷崇岡俯聽足怡悅仰觀共徜徉班坐得瑶草傾壺出瓊漿長吟遊仙詩亂以招隱章忽忽林景西躊躇申慨慷坐上江海客兀傲鬚眉蒼逸氣邁霄漢英詞吐琳琅思與泉石勝韻隨笙鶴翔追遊不敢及咏歎可能忘俗傳歸宗是王右軍故宅陸修靜封丹元真人和張彥輔落星寺之作嵌空竒石戰驚濤樓殿崢嶸勢自高四靣真成開玉鑑三山應是失金鰲題詩正爾難搜句舉酒何妨共作豪倚遍欄干更愁絶歸來白盡鬢邊毛和張彥輔白鹿洞之作邃谷新華館風煙再吐吞舊眠聞野鹿遺恨響驚猿李拾遺自此徙居少室乃𬒳徴故有此句共賞欣同趣分携愴別魂徘徊空日夕無䇿駐行軒次張彥輔西原之作無處堪投迹空山寄一椽懸門窺絶壁繚徑上層巔檻闊吞江浪窗虛響谷泉丹經間自讀不為學神仙次張彥輔卧龍之作瀑水源何處高疑雲漢通瀉時垂練直落處古潭空客寄詩能好龍蟠意自雄知君來峴首為我説隆中次張彥輔棲賢之作融冶何年事停杯莫問天秪今從痼疾疇昔似因緣傾耳真三峽投文沕九淵蘭亭那得此猶足致群賢和張彥輔雪後棲賢之作夜來春雪遍林丘却喜風威曉便收好上籃輿間縱目莫將衲𬒳苦蒙頭微官正愧逍遙社勝日猶堪汗漫遊欲出林關戀瑶草不妨尊酒更淹留謝張彥輔留别之作一别屢更歲思君無巳時知君亦念我相望平兩嗟咨我病卧田間君行護疆陲隱顯既殊迹會合安可期今年定何年有此一假竒我來五峰陽君歸九江湄聞君肯來辱歡喜不自持迎君紫霄峰舉觴白鵝池強健𥘉共欣艱棘旋相悲相顧出危涕薄言首東岐留連十日飲愴恨八哀詩散懷水石幽遂忘筯力疲雄篇既鼎來逸韻方窮追云胡遽告别牙纛風披披攬祛不得留酌酒前致辭願君酬此觴去上白玉墀國論罄忠益廟謨參設施一請正紀綱再請誅羌夷及時樹勳業慰我空山飢時聞張荆州訃張丈有詩哭之故有八哀之句奉答張彥輔戲贈之句巳驅送客車復著登山屐未論窺臨快且脫詩酒厄從今謹出入保此頥正吉不奈歲寒心於公有深憶王輔嗣注頥卦大象云禍從口出病從口入奉答張彥輔解嘲康俗遺居萬疊山高垂鐵鎖詎容攀青鞋布襪非公事古木寒泉要我間伏蒙某官寵示和陶見寄舊作伏讀歎仰又感知待期許之意蓋非一日率易次韻少見謝臆伏惟矜憐有以教之吾公抱經濟軒冕非所欣向來清禁闥本自山林人浩歌歸去來神交邈何因一朝脫冠去妙境聊同臻謂豫雖後來臭味亦有聞賡詞久見屬重以告語勤荒寒想高風令人思無鄰井棠矧在此躑躅晴湖濵贈于盛二生昔日豐城劒寒光射斗牛江山餘秀傑人物尚風流二妙今安匹孤帆各倦遊還家問師友折節慕前修秋日告病齋居奉懷黃子厚劉平父及山間諸兄友出山今幾時忽忽歲再秋江湖豈不永我興終悠悠况復逢旱魃農畒無餘收赤子亦何辜黃屋勞深憂而我沗朝寄政荒積愆尤懷痾卧空閣惻愴增綢繆東南望故山上有玄煙浮平生采芝侣寂寞今焉儔朝遊雲峰巔夕宿寒巖幽為我泛瑶瑟泠然發清謳裂箋寄晨風問我君何求洪濤捩君柁狹硤槯君輈君還若不早無乃非良謀再拜謝故人低徊更包羞桂華幸未歇去矣從君遊夜坐有感秋堂天氣清坐久寒露滳幽獨不自憐兹心竟誰識讀書久巳懶理郡更無術獨有憂世心寒燈共蕭瑟讀諸友遊山詩卷不容盡和和首尾兩篇去年尋得李家山考卜真成屋數間要與青襟時散帙間臨碧澗共觀瀾詩書本説人間事勳業休看鏡裏顔誰識寥寥千古意新詩題罷蘚䀶斑向來結友尋名山下窮絶壑髙危顚胡為一旦墮塵網五老在望心茫然青牛底處有行迹白鹿幾時同正員清遊帶雨想幽絶妙處只恐詩中傳戲贈勝私老友槐花黃盡不關渠老向功名意自踈乞得山田三百畒青燈徹夜課農書勝私先侍講嘗著農書三卷代勝私下一轉語碓下泉鳴溜決渠屋頭桑樹緑扶踈朱虛正自知田事馬服何妨讀父書和戴主簿韻平生本自好樓居况接高人永晝餘共喜江山入尊爼從教幕府省文書感君肯出新詩句恨我終思舊草廬擬借韋編訂龍馬免推納甲話蟾蜍戴嘗有麻衣易説自以為得之異人云次沈侍郎遊楞伽李氏山房韻喜陪後騎陟崔嵬竹裏泉鳴古寺開吟罷蘇仙頭白句天風更送好詩來天聰巳許一言悟年少懸知萬卷開珍重當時讀書處低回空有後人來奉同尤延之提舉廬山雜詠十四篇白鹿洞書院在郡城東北十五里事見記文昔人讀書地町疃白鹿埸世道有升降兹焉更表章矧今中興年治具一以張絃歌獨不嗣山水無輝光荒榛適剪除聖謨巳汪洋亦有皇華使肯來登此堂問俗良懇惻懷賢增慨慷雅歌有餘韻絶學何能忘折桂院黃雲觀在書院東北五里院後作亭取李白黃雲萬里動風色之句名之城中東北望五老何蒼蒼下有前朝寺一原頗深藏門前林澗幽屋後雲木荒間窗亦明潔著此瑞錦張僧房有瑞香花更能理枯笻步上林北岡仰視天宇闊俯瞰江流長即黃雲觀受書彼何人姓字不足詳竹帛有遺臭桂樹徒芬芳李逢吉嘗讀書此院去而登第以故得名楞伽院李氏山房在折桂西十里李公擇讀書處有東坡記文詩刻枯樹墨跋躡石循急澗穿林度重岡俯入幽谷邃仰見竒峰蒼李公英妙年讀書此雲房一去上臺閣致身何慨慷蘇公記藏書文字有耿光餘事亦騷雅戲墨仍風霜兩公不歸來歲月匆巳荒何用建遺烈寒泉薦孤芳棲賢院三峽橋在楞伽西五里兩岸蒼壁對直下成斗絶一水從中來湧潏知幾折石梁據其會迎望逺明滅倐至走長蛟捷來翻素雪聲雄萬霹靂勢倒千嵽嵲足掉不自持魂驚詎堪説老仙有妙句千古擅竒崛尚想化鶴來乘流弄明月西澗清淨退菴在棲賢西二里劉凝之舊隱作亭取黃太史詩語名之凌兢度三峽窈窕復一原絶壁擁蒼翠奔流逝潺湲聞昔避世人寄此茅三間壯節未云逺高風杳難攀深尋得遺墟縛屋臨清灣坐睨寒木杪飛泉閟雲關兹遊非昔遊纍解身復間保此清淨退當歌不能諼解印後與友生遊集徘徊久之卧龍菴武侯祠在西澗西三里空山龍卧處蒼峭神所鑿下有寒潭幽上有明河落我來愛佳名小築寄幽壑永念千載人丹心豈今昨英姿儼繪事凛若九原作寒藻薦芳馨飛泉奉明酌公來識此意顧步慘不樂抱膝一長吟神交付冥漠萬杉寺在卧龍西十里休沐聊命駕駕言何所之行尋慶雲寺想像昭陵時門前杉徑深屋後杉色竒空山歲年晚鬱鬱凌寒姿當年雨露恩千載有餘滋匠石不敢睨孤標儼相持寺前後杉萬本皆天聖中植有旨禁剪伐者更啓石室藏仰瞻天像垂願以清淨化永為太平基寺藏仁祖御飛白書有清淨字開先潄玉亭在萬杉西二里亭舊在橋上今廢竒哉康山陽雙劒屹對起上有橫飛雲下有瀑布水崩騰復璀璨佳麗更雄偉勢從三梁外影落明湖裏平生兩仙句詠嘆深仰止三年落星灣悵望眼空眯今朝隨杖屨得此弄清泚更誦玉虹篇塵襟諒昭洗簡寂觀在開先西五里陸修靜所居高士昔遺世築室蒼崖隂朝真石壇峻煉藥古井深結交五桞翁屢賞無絃琴相携白蓮渚一笑傾夙心晚歲更市朝故山鎖雲岑柴車竟不返鸞鶴空遺音修靜晚為宋明帝召至建康卒于崇虛館我來千載餘舊事不可尋四顧但絶壁苦竹寒蕭摻相傳竹是靜修手植其萌即所謂甜苫筍者歸宗寺在簡寂西十里金輪紫霄上寶界鸞溪邊往昔王內史願香有餘煙相傳寺是王右軍故宅千年今一歸景物還依然澗水既蕩潏山花亦清妍不辭原隰勞樂此賔從賢訪古共紆鬱勞農獨勤拳憐我乖勝踐裂箋寄真詮逃禪公勿遽且畢區中緣是日熹以事不得陪杖履陶公醉石歸去來館在歸宗西五里豫生千載後尚友千載前每尋高士傳獨嘆淵明賢及此逢醉石謂言公所眠况復巖壑古縹眇藏風煙仰看喬木隂俯聽橫飛泉景物自清絶優遊可忘年結廬倚蒼峭舉觴酹潺湲臨風一長嘯亂以歸來篇溫湯在醉石南二里連山西南來中斷還崛起干霄幾千仞據地三百里飛峰上靈秀衆壑下清美逮兹勢力窮猶能出竒偉誰燃丹黃焰㸑此玉池水客來爭解帶萬劫付一洗當年謝康樂絃絶今巳矣水碧復流溫相思五湖裏康樂湖中詩云水碧輟流溫豈未見此水也耶康王谷水簾谷口景德觀在溫湯西十五里入谷又十五里至簾下循山西北騖﨑嶇幾經丘前行荒蹊斷豁見清溪流一涉臺殿古再涉川原幽縈紆復屢渡乃得寒巖陬飛泉天上來一落散不收披崖日璀璨噴壑風颼飀追薪㸑絶品瀹茗澆窮愁敬酹古陸子何年復來遊陸鴻漸茶經第此水為天下第一落星寺在郡城南湖中浩浩長江水東逝無停波及此一回薄湖平煙浪多孤嶼屹中川層臺起周阿晨望愛明滅夕遊驚蕩磨極目青冥茫回瞻碧嵯峨不復車馬迹唯聞榜人歌我願辭世紛兹焉老漁簑會有滄浪子鳴舷夜相過閏月十一日月中坐彭蠡門喚船與諸人共載泛湖至隄首回棹入西灣還分韻賦詩約來晚復集詩不至者浮以太白簽判渺教授空知縣望吳學録柱掌儀明大彭兄蘭判官擊南公一小彭兄遡彥忠人直卿余公度漿敬直懷衛父天野流晦翁光泰兒美棹方解組無多日歸哉喜欲狂臨風成邂逅載月下滄浪酌酒傳清影鳴橈擊素光它年隔千里此夜莫相忘和林擇之黃雲之句兼簡同遊諸兄登覽日云晏歸車眇重岡天風振余旟夕露沾我裳數子情未厭春山杳茫茫還瞻長江白逈眺飛雲黃當念塵中友心期邈相望無為跨鴻鵠決起凌青蒼和彭蠡月夜泛舟落星湖長占煙波弄明月此心久矣從誰説只今一舸漾中流上下天光兩竒絶回頭忽見西郭門尚喜蘇仙有遺烈問豫何事却回船塵土涴君頭上雪首句全用蘇養直詩蘇舊居水西門外舟行望見其處熹罷官觀康王谷水簾夜飮山月軒分韻得主字奉別送行諸君嗟余老不才記憶謝明主卑兹山水郡北邇通玄府一官再溫涼十日九塵土逮兹解章􅌧絶境方快覩殷勤故人厚追送崖寺古把酒聽鳴泉相看淚如雨遊天池三年落星渚北望天池山臨風幾浩嘆欲往無飛翰今朝復何朝陟此青雲端高尋巳竒絶俯瞰何其寬西窮濂溪原東盡湓城關渺然滄波外淮山碧連環我意殊未極更思出塵寰何當駕輕鴻八表須臾間視此長江水滔滔儻西還觀野燈飛螢腐草尋常事作底兹山獨耀芒須信地靈資物化金膏隨處發明光山北紀行十二章章八句祗役廬山陽矯首廬山隂雲峰不可覿碧澗何由尋昨朝解印章結友同窺臨盡彼巖壑勝滿兹仁知心豫以閏月二十七日罷郡是夕出城宿羅漢二十八日宿白鹿二十九日登黃雲觀度三峽窺玉淵憩西澗飲西原宿卧龍四月一日過開先宿歸宗二日俗湯泉入康王谷觀水簾宿景德觀三日與清江劉倩之子澄永嘉張揚卿清叟潯陽王阮南卿周頤龜父長樂林用中擇之洛陽趙希漢南紀會稽陳祖永慶長武當祁真卿師忠溫陵吳兼善仲逹廬陵許子春景陽新安胡莘尹仲建安王朝春卿長樂余隅占之陳士直彥忠黃幹季直臨淮張彥先致逺會稽僧志南明老俱行窺臨事若何請從圓通説逶迤山門路悄蒨修篁列溪仍侯家名屋是孱王設何救黍離歌喟焉傷覆轍圓通寺地名侯溪本侯氏所居李後主取以為寺無它竒但門徑竹木深茂可觀耳行逢石門雨解驂寒澗東朝隮錦繡谷俯仰春冥𪷟懸泉忽淙琤雜樹紛青紅屢憩小亭古幽探思無窮石門澗正在天池山下有小菴三四是夕宿所謂廣福菴者來日登山道錦繡谷再過小橋橋皆有亭下又有亭基二小亭一竦身長林端䇿足層崖表仰瞻空界闊俯歎塵寰小天池西嶔崟佛手東窈窕杖屨往復來憑軒瞰歸鳥盡錦繡谷登山稍高無復林木坡陀而上至天池院在小峯絶頂乃有石池泉水不竭東過佛手巖石室嵌空中有井泉僧緣崖結架以居下臨錦繡谷又有石榻名逺公講經臺斯須暮雲合白日無餘暉金波從地湧寶𦦨穿林飛僧言自雄誇俗駭無因依安知本地靈發見隨天機天池院西數步有小佛閣下臨絶壑是遊人請燈處僧云燈非禱不見是日不禱而光景明滅頃刻異狀諸生或疑其妄豫謂僧言則妄而此光不可誣豈地氣之盛而然耶深尋兩林間清波貫華屋蓮社有遺蹤草堂非舊築修廊餘故刻好醜雜珉玉亦復記經行深慙後人讀五日下山至東西林兩寺相去不百步一溪清駛橫貫其間皆自方丈前廊廡下過他處所無有也白蓮池在東林法堂前白公草堂基在寺東久廢近歲復創數椽制殊狹陋然亦非其正處矣是日題名屬寺僧刻於咸通莊田記石行軒復東騖祠城當晚遊胡然冠蓋集不盡心期幽夜厭百谷喧旦失千峰稠出門有遺恨回首空綢繆晚至太平興國宫唐九天使者祠也江州教授翁名卿載酒肴與鄉人遊應和歐景文及其諸生二十餘人皆至山水誠乃竒云誰究終始曇逺亦何人神君豈其鬼東西妄采獲誣諂共恢詭百世踵謬訛彛倫日頽圯東林慧逺雜取孔老之言以附佛學嘗著沙門不敬王者論唐明皇自言親見使者降於殿庭因立此宫而羣臣造為妖妄以迎合者甚衆本朝仍賜宫額神號置提舉官云以兹遊覽富翻令懷抱傷誰哉可告語舉俗昏且狂乾坤有真心日月垂休光茫茫宇宙內此柄孰主張北度石塘橋西訪濂溪宅喬木無遺株虛堂唯四壁竦瞻德容睟跪薦寒流碧幸矣有斯人渾淪再開闢平生勞仰止今日登此堂願以圖象意質之巾几傍先生寂無言賤子涕泗滂神聽儻不遺惠我思無疆六日拜濂溪先生書堂遺像子澄請為諸生説太極圖義先生之曽孫正卿彥卿玄孫濤為設食于光風霽月之亭明晨江磯寺尊酒聊對設孰是十日遊遽成千里别英僚樹嘉政素友厲孤節努力莫相忘清宵共明月七日薛洪持志王仲傑之才携酒自南康來飲罷與張陳趙南還軍子澄許張歸廬陵南鄉龜父還家擇之之湖南豫與王余陳黃東度湖口而歸晦庵先生朱文公文集卷第七考異崇壽客舍月向一作月上歸未得一作身是客分韻賦簡寂逈矚一作俯矚誰復一作復誰嶺梅似愁一作但愁野梅風吹一作風破愁絶一作幽絶小梅莫嗟一作莫歎踈梅不勝一作不成送四十叔父獨尋一作獨遊逢孤一作尋孤祕閣張丈長篇饋思一作饋念和張彥輔失喜一作賸喜奉同張丈哭敬夫喚卜一作要卜和白鹿洞再吐一作自吐次棲賢韻融冶一作融結傾耳一作澒耳和陶次韻吾公一作吳公棲賢院三峽橋倐至一作倐起長蛟一作長虹溫湯據地一作環地山北紀行嶔崟一作嵯哦孰是一作云是福州府學訓導舒鏊校晦庵先生朱文公文别集卷第七詩與一維那以下見陳利用編大同集老親比苦重聽服上人藥遂良巳上人索詩久廢無次聊復此殊不佳也紹興癸酉九月晦日紫陽朱仲晦書當年事幽討結友窮名山曽逢許斧子去採玉芝還歸來坐空房神清骨毛寒起視塵中人一見了肺肝探囊出刀圭生死毫釐間相逢瘴海秋遺我黃金丹高堂得聽瑩班衣有餘歡謝師無言説古井生波瀾上廣文廣文何事創樓居收拾家藏理蠧餘尚有簡編充棟宇擬陳車馬大門閭移床客去邀明月送酒人來遞異書縱使清貧無長物猶勝四壁似相如考試感事戲作海邑三年吏勤勞不為身但令官事了從遣黠兒嗔題米倉壁度量無私本至公寸心貪得意何窮若教老子莊周見剖斗除衡付一空題安隱壁征車少憩林間寺試問南枝開未開日暮天寒無酒飲不須空喚莫愁來題𣑽天方丈壁輸盡王租生理微野僧行乞暮還歸山空日落無鐘鼓只有虗堂蝙蝠飛五月五日海上遇風雨作疾風吹雨滿征衫陸走川行兩不堪塵事縈人心事逺濯纓何必在江潭兩絶句送順之南歸門前三徑長蒿菜愧豫殷勤千里來校罷遺書却歸去此心元自不曽灰幾年江海事幽尋遍興雲僧話此心今日肯來論舊學歲寒猶恐雪霜侵寄陳講師以下見别編臨江集聞道山中客年來鬢欲皤靜便三徑小貧覺一身多且喜詩無病從教睡作魔故人今領衆猶足慰蹉跎别陳講師幾年勞夢想今日慰登臨况入芝蘭室又聞金玉音與君連夜語盡我一生心此外成華髮無因得重尋登閣早山疊疊層巒鎖閟宫我來舊地訪靈蹤葛仙去後無丹竈弟子今成白髮翁一派泠泠臺下水半空漠漠嶺頭雲祖師成道沖天去只有無窮受籙人送單應之往閣山杖頭挑月入煙籮城郭塵埃奈爾何若到名山高著眼洞天深處異人多回首名山我舊遊曾將風𬒮挹浮丘如今不及臺邉水長向山前山後流送李道士歸玉笥三首偶隨雲去伴雲歸笑指清都在翠微為我中間留一榻他年去著薜蘿衣玉笥山連都水坑拂雲樓殿對峥嶸君歸後夜無餘事卧聽寒泉落澗聲莫惜臨行酒一杯看君上馬古城隈相望兩地無多逺頻寄音書與鴈來題赤城觀落日空山秋氣清泠泠古木亂蟬鳴仙人一去鶴不返劒客重來丹巳成靜對竹爐煙縷直細看月窟桂華生此身舊有蓬瀛約玉簡歸來問姓名尤溪縣學觀大閣見尤川志及南溪祠堂志令尹絃歌不下堂叱嗟層觀麗扶桑朱甍碧瓦臨無地散帙投壼樂未央得意溪山供徙倚忘情魚鳥共徜徉應觀物我同根處剖破藩籬即大方十月上休日遊卧龍玉淵三峽用山谷驚鹿須要野學盟鷗本願秋江分韻得鷗字按大全集但有秋字韻不載此鷗字韻馮夲有之或云先生命門人所作而後不用或又云得兩韻而集軼之以下見南康集匡廬霜天後不見雲氣浮木葉紅巳踈山顔轉清幽向聞有絶壑乃在卧龍湫及此遂一往幸無煙景愁隮攀欲其深泉石固所求况有百尺崖噴雪飛寒流幽岑自回抱直下鳴青璆便可洗我耳枕石忘所憂精神共虗廓方物皆悠悠所恨非獨往不能恣夷猶仰歎雲間鶴俯羡谷中鷗先生先我來結屋陽岡頭虛名付忠武滅迹慕巢由是間頗足居不田亦平疇野人種椒橘崖蜜易歲收西源有老翁卷舌藏戈矛似學辟世士乃欲邀聖丘先生且無然但作一月留俟我有決計它時卜從遊次周師溫遊書堂韻兼簡坐上諸同志疇昔因來行水餘依依唯認昔人居新堂巳幸經重構舊事難追更特書所願絃歌聞十室休誇文字賦三都同來况有濓溪裔心印相傳儘未踈西源居士斸寄秋蘭小詩為謝知有幽芳近水開故攀危磴斸蒼苔却憐病客空齋冷帶雨和煙逺寄來記至樂齋記以下見大同集盤谷傳公客於泉州城東之佛寺間即其寓舍之西偏治一室逹其南北以為軒窗極爽塏左右圖史自六經而下百家諸子史氏之記籍與夫騷人墨客之文章外至浮屠老子之書荒虛譎詭詼諧小説種植方藥卜相博奕之數皆以列置無外求者公於是日俯仰盤礡於其間翻羣書而誦之蚤夜不厭人蓋莫窺其所用心而公自以為天下之樂無易此者故嘗取歐陽子之詩以名其室曰至樂之齋而顧謂某曰為我記之某辭謝不敏不􅈺於文字且不敢為庸人誦説而况敢為是耶既公命之不置某不得終辭乃承命而退推公意所以然者而書之曰人之所以神明其德應物而不窮者心而巳古之君子自其始學則盡力於灑掃應對進退之間而內事其心既久且熟矣則心平而氣和沖融暢適與物無際其觀於一世事物之變蓋無往而非吾樂也而况載籍所傳上超羲農下至于兹其間聖賢之行事問學之源奧是非得失理亂存亡廢興之故包括籠絡靡不畢具苟涉其辭義而心必契焉則其可樂而玩也豈不亦至矣哉惟世之學者或不足以知此而勞於記誦占畢之間以為事是以語之至者既扞格而不入於心惟其粗厲而不平者感而入焉則其間勃然而鬪而怒矣亦何樂之云哉某惟歐陽子之詩與公之所以取焉者蓋其指略如此因序次以為公齋記云紹興二十六年閏月癸卯新安朱某記恕齋記溫陵陳君養正讀書之堂同郡吕君少衛榜之曰恕齋而陳君有謁於豫曰願有記也豫故以是往而觀焉則其垣屋位置與夫几案圖書花藥之列無不合其宜得其所蓋飾不過侈而簡不至陋起居便適而視聽無邪真若幽人逸士之居者雖豫亦樂之將為之記而問其作興端原則曰此吾居第之東榮也凡兹棟宇皆亡所改於其舊惟鑿窗牖以候明晦焉而為是室也此亦何所可記顧吾之所以望於夫子者願聞恕之説而盡心焉耳豫聞之􅋏然曰子之志則善矣而非豫所敢當也豫不佞少從先生長者遊嘗竊聞夫恕之説以為不過推巳之心以及人而己勉而行之又以為無難也然克巳之功未加而蔽於有我之私勝則非此未嘗不病焉而何敢易言之以重得罪於聖人之門也用此辭謝不敢有者幾纍月陳君請之不置而吕君亦以為言豫不得以終辭也則歷誦前語而謂之曰以是為記足以不沒乎為齋之實而亦可見強恕之難矣惟吕君幸以為不悖於所以名之意則庶乎其施也二君皆曰善遂書置齋屋壁間以視陳君且自警也紹興二十七年十二月五日新安朱某記祝文鄉飲舍菜二先師祝文見大同集敢昭告于先師兖國公先師鄒國公朝廷舉遺興禮使郡縣三歲一行鄉飲酒之禮以迪其士子俾莫不精白以祗承明詔某為縣長吏敢不以時奉行即事之𥘉以禮舍菜于先聖至聖文宣王以公等配赦後祭祝文見南康集乃季秋辛未天子有事于合宫樂備禮成攽祭澤于宇內凡諸祀壇宇之有功於民者悉詔有司潔嚴報享惟王聖德神功賴及萬世至今天下生人有一日之安者皆王之德也邦有彞典敢或不虔仰惟明靈尚其昭鑒祭文祭藝谷文先生之曽孫沂藏録藁維乾道五年歲次巳丑三月丁巳朔十有四日庚午迪功郎差充樞密院編修官朱某敢以香茶酒果之奠託友人林用中致祭于亡友林君師魯之靈惟昔先君與藝齋先生遊而吾師魯又不鄙某愚嘗不逺數百里過我潭溪之上蓋將從容講學以共進於斯道也顧以姻喪欲留不可自是一别遂訣終天嗚呼痛哉志長命短如師魯之才之敏乃不克究其業而止於斯吾徒二三子失良友之助能不隕涕相吊而况高堂垂白又何以堪此愁苦耶某形疲道逺不能往哭香茗之奠以纍同志遵承先志收拾遺文并以囑之庶可無憾嗟嗟師魯尚克鑒此而享之耶嗚呼哀哉祭文先生之孫濬家藏維淳熙三年歲次丙申九月癸卯朔十六日戊午宣教郎朱某敢以酒肴之奠告于太夫人氏靈筵曰我昔貧病掩關自休有來自東而辱與遊既往既來十年頓久義篤情親謂我昆友我相其流以必其源曰是世德抑母之賢惟母之賢聘名族嫓德清門慈祥雍睦成其二子學古行修左右致孝色思其柔顧我者誰曰實其季適騫以翔遽以憂躓我聞其憂驚歎失聲孰勤斯誨弗俾其榮往吊不能且悲且愧千里緘辭相此一酹嗚呼哀哉題跋藝齋遺文跋先生之曽孫沂藏録藁先君子志尚高潔不妄與人交蓋嘗避地福之古田得藝齋先生林公而與之遊愛其學識行誼有以過人而惜其且將湮沒無聞於世也及仕於朝為之延譽甚力然竟不及試用識者恨之某自幼侍立先君子之側則巳聞先生為人之大略近乃得其臨終手筆數十百言戒其家治喪無用浮屠法者讀之然後知先生所學之純所養之固見於死生之際者又如此冝乎先君子之所甚厚而不忘也三復至言惟念先志追慕哽絶不知所言既而先生之子魯山不逺數百里過某於潭溪之上道語舊故泫然久之因謂某曰先人絶筆之書將刻諸石以傳學者子為我識之某惟先生於此特示人以變俗由禮之大端耳若夫反躬格物以明先王制作之本使其情文義數粲然大備盡祛千載習俗之陋而一反之於正豈不猶有望於後人哉師魯篤志好學其果能進此以成先生之志則豈惟某與一二友朋之願抑先君子實寵嘉之因敬書以附其後云乾道戊子四月丁酉新安朱某敬書書李巽伯所跋石鼓文後先生之曽孫濬家藏唐貞觀中吏部侍郎蘇朂著論歧陽獵鼓引歐陽虞禇並稱墨妙為據三君體法為世楷式賞好為物軒輊在當時巳爾今其故迹僅存隋珠和壁不足喻其珍也豫避地來南一日料檢行庋得歧鼓及孔廟醴泉化度孟師丹州諸碑流徙之餘偶無散落為之驚喜過望書其事以示子孫建炎巳酉夾鍾五日雒人李處權巽伯余年十八九時邂逅李卿於衢守張紫微坐上二公皆一時名勝揮塵論文意象超逸令人傾竦今觀此卷恍然若將復見其人而追數歲月忽巳四十寒暑矣不惟前輩零落殆盡而及見之者亦無幾人可為大息淳熙戊申五月既望朱某仲晦父書跋訛傳龜山列子解後先生之曽孫主簿家藏龜山之見二先生在元豐之初此書作於其前固不足怪跋語則出于其後而有非所宜言者矣豈其後人有惜是書而不忍棄者託為是語以重之歟噫是書則傳而其為龜山之纍也甚矣向見沈公雅説有此書初不敢信淳熙巳酉夏將樂鄧綯為寫寄來因得記其所疑於後且細讀跋語中用字下語多不中律令與龜山他文不類其偽妄不疑但不知何人所作耳七月三日某書跋郭忠恕説文字源仙逰洪震夫家藏楊文公蘇文忠公皆言郭恕先尸解而逝今觀此卷非斯人之仙而誰仙耶淳熙癸卯晦翁題折桂院行記以下見南康集始豫至折桂院之西軒愛其江山之勝道人雲公為豫言此未足觀少上當益竒因道豫行深竹中竹盡得大阜背負五老靣直江湖東西數百里雲山煙水渺莽縈帶勝絶不可名狀乃規作亭其處取李翰林廬山謡中語命以為黃雲觀會雲公去不果為今年春乃克為之未訖工而余代去閏月晦日與清江劉子澄長樂林擇之開封趙子明溫陵許景陽建安王春卿長樂余占之陳彥忠臨淮張致逺長樂黃直卿俱來因記其事雲公諸王孫棄官學浮圖法令客大洪山云淳熙八年辛丑歲朱某仲晦父題題星子縣尉𪠘射亭淳熙巳亥季秋草日新安朱某仲晦父奉同高川蘇史君莆陽詹别駕零陵陳推官會稽方丞公旴江史版掾永新潘丞公善化陳明府南康卜隱君邯鄲假議郎同寮楊子美元範王之才董恭父奠故屯田劉公墓退飮尉𪠘射亭盡醉書此以志題落星寺朱公永仲晦蔡季通汪清卿程正思鄧邦老陳彥忠萬正淳俞季清來朱氏子在侍淳熙庚子三月丁卯題落星寺張于湖題字後朱某奉處士叔父同王南卿俞子夀吳害卿李秉文陳勝私趙南紀及表姪俞潔巳甥魏愈季子在俱來觀故張紫薇安國題字為之太息淳熙庚子十月十三日也題尋真觀新安朱某仲晦永嘉薛洪持志永嘉張揚卿清叟縉雲王仲傑之才會稽陳祖永慶長臨江劉清之子澄長樂林用中擇之樂陽趙希漢南紀冝春彭樓子應冝春彭鳯子儀溫陵許子春景陽廬陵郭植廷植長樂余隅占之臨淮張彥先致逺淳熙辛丑後三月丙戊至此莆田傳公弼夢良長樂陳士直彥忠先歸題石乳寺淳熙庚子重五日晦翁與程正思陳彥忠俞季清來翁子在甥魏愈從題捿賢磨崖新安朱某奉陪高川蘇史君閬中錢别駕簽書楊子美博士楊元範星子王之才武寧楊子直邯鄲假仲衡濂溪周師溫因遊卧龍遂至玉淵三峽門人丁克王翰甥魏愈幼子在從淳熙巳亥四月上休日題疊石菴晦翁與程正思丁復之黃直卿俱來覽觀江山之勝樂忘歸時淳熙巳亥重午日翁子在甥魏愈侍行題折桂院晦翁通叟送張襄陽至此痛飲而别跋所刻和靖帖右和靖先生帖得之祈君之子真卿淳熙庚子夏五月丙戌刻之白鹿洞書院新安朱某記跋所刻包孝肅詩此包孝肅公布衣時語蔡廷彥得之吳唐卿以語晦翁翁敬書之俾刻于白鹿洞跋王太𥘉所題後十年朱仲晦甫賞識此詞後之人當勿毁也書武侯草廬語遺張以道張以道將之荆襄寫以送之慶元巳未十一月十九日晦翁題所書古柏行右社子美古柏行朱仲晦為王之才書晦庵先生朱文公文别集卷第七候官縣儒學訓導劉簮校晦庵先生朱文公續集卷第七答黃子厚銖罪戾之蹤不容掩覆竟蒙臺劾禠職罷祠昨日巳𬒳省劄而季通遂有舂陵之行巳入府聽命矣示喻縷縷極感勤念然此何足置意中耶季通只是編置無他刑名正緣有司欲祕其事却致傳聞張皇前日就道臨老逺謫殊可念耳告訐之門既啓世間羣小無非敵國便能因樹為屋自同傭人亦巳晚矣况不能耶死生禍福正當付之造物耳所説賑貸事想巳蒙留念矣今日復有數人來云是六十二都人戶不知與昨日狀子是同都否不免并煩契勘令社首保正等人結保具狀來請恐亦只有三百來石勢亦不能廣及也社首輩或自呼喚不得今一書至伯起託其喚集幸為付此輩自持去又恐去建陽逺俟見人數即報彼縣般載來黃亭東岸等候人來請貸也老兄間中無事不合相擾然想閔此疲民不憚少勞也答丘子服膺昨晚又承簡為慰謝字初不曉將謂有何異事豕亥之訛乃爾可笑也唐人詩云昨夜秋風還入戶登山臨水興如何間咏此句甚覺塊處之憒憒而力未能出奈何奈何詩譜巳得之未耶御書閣巳裝了龕子恐官司未暇及意欲自出薄少而率諸明舊共為之似亦不妨巳略説與通理所欲議定喻及仍令匠氏畫圖來看也老子荷留念載營魄之義説者皆失本意前日因此偶思揚子説月未望則載魄于西與此字義頗相似檢看諸家亦無一人説得是嘗草定數語以辨之未暇録去俟到此日可看也對禹問以私意窺聖人﨑嶇反仄不成説話而反譏孟子為求其説而不得者其言之失非獨如來喻所指也前晚聞舂陵信不佳昨日亟走後山渠家亦不得的信但所傳甚子細恐必不妄志業精深今豈復有此朋友為之悼歎不但為平生交好之情而巳也示喻有科舉之纍愚意非科舉之纍人人自纍耳所示論昨在寶幢曽聞此説渠巳嘗輒語其非試更思之得失有命似不必太徇時好也前書問責沈時正擾擾不及報不知平父曽寄去否此中無本沈是葉公之姓向來敬夫在桂林刻本跋語中解此字義舊有本亦巳盡矣周子通書近時到處有本此本頃自刋定比它本為完可試讀之此近世道學之源也而其言簡質若此與世之指天畫地喝風罵雨者氣象不侔矣更有二先生集本皆為人乞去俟他時别寄也與劉平父承示及行在諸書巳領今納胡丈書及陳賀二公祭狀葉樞與沈倉書共甫與黃守劄子去平父至彼可與伯修昆仲熟議居止處如有意東來即遣人持沈黃二緘授元履令見二公靣道曲折蓋共甫書中之説如此但前此某嘗妄發卜居之議未有定論既而聞居泰寧之意甚決且謂勸居建陽者皆挾黨徇私其説乖悖不知誰主倡此説真賊伯修昆仲者也夫范丈素志不欲居泰寧見於書札者非一况啓手足之際又有道學失傳之歎不屬意可知矣今纊息未定而異議紛然不顧義理之所安妄言同異雖其意謂范丈為不復有知其如義理有出於人心之所同然者不可幽明而殊觀也胡丈之旨不約而同幸持以示修崇老僕之言今可思未二公賻金尚在胡丈許某不曉求田事諸公巳屬元履矣當於建陽近墓買田則建陽不憂食不足斷然可居無疑况近三世之墳墓而范丈之門人子弟布滿左右伯修兄弟動息必聞小有過失必有交謁而更諌之者其於范氏門戶久長之計豈不優於入泰寧范丈所不欲居之地去墳墓背朋友而自肆其心乎然則伯修兄弟今日之計不患於食之不足而患乎身之不修為前人羞辱而巳平父至彼便冝論此某月末至麻沙或扶曵一至邵武不可知然此議之責今在平父向者某巳不復有意啓口偶因胡丈之言復發其狂琴志巳領看畢即納上亦方是五七十年來文字非古書也小報却納還言者聽者皆不易得但欠一行字耳草澤中却有此等人使人益深素餐之愧也二南説未編次可及今為之他日相聚裁之也論語向看四篇似未浹熟可兼新舊看為佳去歲所治大抵未熟者今悉溫尋之為善向數奉語可録出所作工夫次第作一𥿄時復省察了與末了分數此最善可便為之蓋雖相聚一年所進業殊少所當為而未為者殊多今又疾病如此羸頓勢未能出與兄相聚相聚亦思索講究未得恐負太碩人與共甫兄相責望之意特復奉白惟思之無事勿出入蓋共甫兄不在宅中别無子弟門戶深闊事有不可勝虞者不惟惰遊廢業為不可且賔客至者談説戲笑度無益於身事家事者少酬酢之則彼自不來矣切祝且溫習勿廢使有常業而此心不放則異日復相聚亦易收拾試思自去冬以來巳過之日多少其間用心處放蕩幾何存在幾何則亦可以自警矣病倦不勝思慮答王樞使便中忽拜手札之賜伏讀感慰不可具言蒙喻干越之故悼歎閔惻見於詞旨前此亦聞首為力伸歸葬之請固巳深歎服風詣之髙足厲頽俗矣及此重太息也浮議洶洶至今未息嘯儔命侣日以益衆不知更欲何所為者清源既不免而信安巳擯去近見所上纂述之書卒章頗有苦口之言亦不易也當今舊弼宿望中外所倚以開上心正國論者惟明公與益公而巳竊計所以處此當有定論也此間親舊有自干越會葬而歸者亦得其長子書聞其動息頗詳然亦無可言者但令人隕涕而巳如某賤迹固不足言而終歲力辭僅免近職初意自此可以少安而後咎餘責侵陵未巳亦未知終安所稅駕也舊有足疾歲須一發旬月以來正此為苦加以目肓日甚重聽有加終日憒憒如土偶人巳無復有生意矣彼何見疑之過耶湘西扁榜饒宰寄示得以仰觀非惟健筆縱橫勢若飛動而心畫之正結體之全足使觀者魄動神竦甚大惠也某前此妄意偶及於此而不敢容易以請輒因饒宰言之不謂便蒙開可遂得彈壓江山垂示永久湘中學者一何幸耶趙機冝得趍幕下書來極感知遇之意醴陵亦説甚荷容察以見門下愛惜人材隨能器使之妙固無一物之遺也字恐誤自邇以來衰病沈綿日就羸頓此凋隕澌盡之常無足為門下言者今因鄉人李正通朝散祗役部下復此附稟其人明敏有才緩急之際可備繁使之末聞亦嘗得出入門墻竊計不待區區之言久巳有以處之矣又蒙不鄙俯垂訪逮此見髙明之度不以爵位之崇名譽之顯才業之偉氣節之髙自謂絶人而謙虛下問至於如此甚盛甚盛顧某至愚本無知識加以疾病之餘思慮昏塞其何以辱嘉命然竊以謂知院參政平日尊主芘民之心其素所蓄積者固有定論蓋不特士大夫知之而兒童走卒亦皆知之矣今日得其位而施之其先後緩急固宜自有次第但能益以天下之重自任而勉焉以固其志則天下受賜巳不資矣至於主張公論扶植善人抉去隂邪不使得乘間隙則願髙明於此益加意焉實天下幸甚幸甚老生常談迂闊無取僣易塵瀆伏深愧懼與方伯謨間中不能無為而所讀書又不能隨衆備禮看過日間趕趂程限甚覺辛苦偶記楊敬仲答人書云恭惟某官讀聖人書既飽而嬉甚可笑然亦多著題也答俞夀翁興國盜鑄曲折不知如何近聞淮上以此頗洶洶朝廷深以為憂遂以其事屬之葉正則不知今果如何也所示周禮復古之書其間數處向亦深以為疑今得如此區别極為明白但素讀此書不熟未有以見其必然聞陳君舉講究頗詳不知曽與之啇量否欲破千古之疑正當不憚子細討論必使無復纎毫間隙乃為佳耳某衰晚不天長子夭折忽巳踰年念之痛割無復生意以卜地未定尚未克葬初𬒳湖南之命即以此辭未報之間忽聞臨漳所請經界議格不行不免自劾廟堂巳許復備祠官而不欲以此為名雖巳降旨促行却令别入文字月𥘉巳遣人行計此月中必可拜命六十老翁餘年無幾自此杜門當不復出矣示喻剛氣未能自克之病此正區區所深患方當相與同謹佩書之戒耳大抵最要平時講學持飬使此心常存義理常勝始有用力之地也此間銅儀見説只一平環一側環一望筒只用手轉想見當時草創未盡得元祐舊制也奉告且知條教巳孚物情風動士勸民安姦凶屏息此亦足以小試儒者之效矣更兾勉旃區區又將於其大者觀之也誠齋歸袖翩然令人慨想所寄石刻某偶在山間為大兒治葬兒輩留在家間未及快覩也武夷之會乃所深願而未可得者他時踐言何幸如之但恐功名迫逐不暇赴此寂寞之期耳因書誠齋多為致謝屬此悲冗未能占布也建陽新居粗有溪山之樂然心緒不佳又多俗冗苦未得舒放懷抱也周官復古正以此經不熟未得深考異時得靣扣其説庶幾了然無疑乃敢下語耳永嘉諸人説此甚有與先儒不同處然頗祕其説亦未得扣擊之也示及先丈所著周禮復古編極荷不鄙往時先丈固嘗以見寄矣某於此書素所不熟未敢容易下語然當是時猶意其可一見而決也不謂後來不遂此願至今遺恨况今方以偽學獲罪聖朝杜門齰舌猶懼不免又安敢作為文字以觸禍機乎答曽景建季通子約相逐而逝不謂天之無意於善人乃如此每一念之輒為悲愴不能為懷也昨聞吉甫之歸方竊疑之伯豐之子乃如此尤可歎息耳道夫久不得書為况如何因見致意便遽未及書也方遣人探子約之襯何日過上饒欲遣季子往哭之近得玉山書則巳過矣前日僅能扶病一撫季通之柩也廬陵子一書煩為附的便其人乃子約嘗寓其舍者也得不浮湛為幸答余景思朱趙相繼淪沒深為可念聞冝春人欲留學古卜葬於彼遂為留居之計不知果然否魯叔子弟幾人今皆年幾何莫亦能自卓立否欲作書慰之以病未能當俟後便也作縣固非易事然盡心力而為之必無不濟今人多是自放懶了所以一綱弛而衆目紊也承喻立蘇忠勇祠於故居甚善甚善但某自今夏一病至重今巳纍月尚未復常心力尤衰日前欠人文字且辭之未得盡脫豈敢更承當此事耶兼近日巳辭林子方家墓碑之請亦恐不能無嫌也間中益得觀書當有深趣日月易得願益勉旃若但如拙者既老而後有聞則享用巳不能久而無復可行之望矣直卿既歸想時得從容恐講論不能無異同正當力究有未決者因來諭及不敢不盡鄙懷也與陳同父某扣首再拜訴哀敘謝略具前幅而痛苦之懷終有不能以言語自見者三復來教及所示奠文則巳略盡之矣尚何言哉尚何言哉自聞意外之患既解而益急地逺無從詗知動息親舊書來亦不能言其詳第切憂嘆而巳數日前得沈應先書乃報云云自是必可伸雪今日忽見使人得所惠書乃知肓料亦誤中也急拆疾讀悲喜交懷又念常年此時常蒙惠問不謂今歲彼此况味乃如此又益以悼嘆也觀望既息黑白自分千萬更且寬以處之天日在上豈容有此冤枉事也亡子卜葬巳得地但隂陽家説須明年夏乃可窆今且殯在墳庵其婦子却且同在建陽寓舍小孫壯實粗厚近小小不安然觀其意氣橫逸却似可望賴有此少寬懷抱然每抱撫之悲緒觸心殆不可為懷也五夫所居眼界殊惡不敢復歸巳就此卜居矣然囊中才有數百千工役未十一二巳掃而空矣將來更須做債方可了辦甚悔始謀之率爾也但其處溪山却儘可觀亡子素亦愛之今乃不及見此營築念之又不勝痛也奠文説盡事情巳為宣白哀慟之餘哽咽不能自巳此兒素知尊慕兄之文此足以少慰之矣更有少懇將來葬處欲得數語識之此子自幼秀慧生一兩月見文書即喜笑咿嗚如誦讀狀小兒戲事見必學學必能然巳能輒棄去後來得親師友意甚望之既而雖稍懶廢然見其時道言語亦有可喜者但恐其騖於浮華不欲以此獎之去年到婺以書歸云異時還家決當盡捐他習刻意為巳之學私竊喜之日望其歸不意其至此也痛哉痛哉尚忍言之此語未嘗為他人道以老兄素有教誨獎就之意輒以不朽為託伏惟憐而許之千萬幸甚更一兩月當遣人就請也奠禮有狀拜謝但來人至江山遇盜頗有所失亡今賫到兩縑云是他人所償此不敢晉却封納却可送官給還本主也無以伴書白毛布一端往奉冬裘之須幸視至未有承教之期惟千萬自愛為禱某扣首再拜答李繼善孝述熹頓首便中辱書為慰信後𥘉寒侍奉佳慶所示疑義各以所見附于左方矣來喻甚精到但思之過苦恐心勞而生疾折之大繁恐氣薄而少味皆有害乎涵養踐行之功耳其餘曲折敬子元思必能言今日疾作執筆甚難不容盡布惟冀以時自重不宣熹再拜晦庵先生朱文公續集卷之七閩縣學訓導何器校
