body:
  text: 䟦朱給事奏劄伏讀給事中朱公奏劄共惟前輩學問醇明故所以告其君者知所先後如此而忠誠懇至溢於文辭筆札之間者又可以見其充養之厚云隆興元年正月旣望新安朱熹謹書後二十八年再得披玩因觀舊題歎前脩之益逺悼吾年之不留復記其後云䟦陳了翁與兄書章氏議却不成農師極惓惓亦不敢就自到官尤覺中饋不可無人而瑞奴等零丁益可憐不免議同年周户曹之妹鍔其家清貧其人年長貧則不驕長則諳事爲瑞奴等之慮尺欲如此書尾又云周氏雖貧然舉家好善故就之男女可無慮予嘗讀陳忠肅公之文觀其述巳之志稱人之善未嘗不推而决諸義利取舎之間於是知公之所以常胷中浩然前定不疚者其所自得蓋有在也孟子曰欲知舜與跖之分無他利與善之間耳又曰生亦我所欲義亦我所欲二者不可得兼舎生而取義也陳公之學蓋得諸此惟其察而精之也人毫芒是以擴而充之也塞宇宙善觀此帖者亦足以識其㡬矣帖藏邯鄲賈元放家元放文學議論有餘又通當世之務而砥礪廉隅不爲苟合其亦深有得於斯歟隆興甲申十月九日新安朱熹謹書䟦胡文定公詩手握乾坤殺活機縱横施設在臨時蒲堂兎馬非龍象大用堂堂總不知踏遍江南春寺苔野雲蹤跡去還來如今宴坐孤峯頂無法可傳心自灰祝融峯似在城天萬古江山在目前湏信死心元不死夜來明月又重圓明公從小便超群佳句流傳繼碧雩聞道别來諸念息定將何法退魔軍十年音信㫁鴻鱗夣想雲居頂上人香飯可能長自飽也應分濟百千身右胡文定公答僧五詩公子侍郎所書以授墳僧妙觀而妙觀之所摹刻也儒釋之間蓋有所謂毫釐之差者讀之者能辨之則庶乎知言矣乾道乙酉十一月庚午新安朱熹書䟦張敬夫所書城南書院詩乆聞敬夫城南景物之勝常恨未得往遊其間今讀此詩便覺風篁水月去人不逺然敬夫道學之懿爲世醇儒今乃欲以筆札之工追蹤前作豈其戯耶不然則敬夫之豪放奔逸與西䑓之温厚靚深其得失之筭必有能辨之者朱仲晦父云䟦胡五峯詩幽人偏愛青山好爲是青山青不老山中出雲兩太虚一洗塵埃山更好右衡山胡子詩也𥘉紹興庚辰熹卧病山間親友仕於朝者以書見招熹戯以兩詩代書報之曰先生去上芸香閣時籍溪先生除正字赴館供職閣老新峩豸角冠劉共父自秘書丞除察官留取幽人卧空谷一川風月要人㸔一章甕牖前頭列畫屏晚來相對靜儀刑浮雲一任閑舒卷萬古青山只麽青二章或傳以語胡子子謂其學者張欽夫曰吾未識此人然觀此詩知其庶㡬能有進矣特其言有體而無用故吾爲是詩以箴警之庶其聞之而有發也明年胡子卒又四年熹始見欽夫而後獲聞之恨不及見胡子而卒請其目也因叙其本末而書之于䇿以無忘胡子之意云䟦張魏公爲了賢書佛號世之學士大夫措身利害之塗馳騖而不反是以生死窮逹之際每有愧於山林之士觀丞相魏公所以慨然於賢老者則可見矣嗚呼服儒衣服學聖人之道誠能一以義理存心而無惑於利害之際則其所立當如何哉乾道丁亥冬十有二月九日新安朱熹書䟦方伯謨家藏胡文定公帖兒曹外甥輩比過治宇在寅爲同年宜盡切磋之義在宏宜提耳誨導之在范甥宜勉進其所未聞者而一一以重言題品褒借之豈所望也昔事定夫先生未嘗以言色相假後與民瞻叔夏遊苟有過在安國則二公必靣折之不令貳其過在二公即安國亦正色規之不但巳也數十年來俗習頽靡此風日以替矣安老器識過人當今之望津途軌則當以往哲自期庶㡬此風之復見也邸報十五卷并五月分者并以歸納乾菌承貺示珍感珍感安國再拜去夏所借報中有言吕舜徒章者或見之望更借示自五月以來新報能一一借及幸幸吕公諸子聞自衡陽過江西不知今何在或知信喻及鄊里得近信否所奏前章及第二義不以示他人恐知安國又上朋友之交責善所以盡吾誠取善所以益吾徳非以相爲賜也然各盡其道而無所苟焉則麗澤之益自有不䏻巳者方生士繇出示所藏胡文定公與其外大父尚書吕公手帖讀之使人凛然起敬若嚴師畏友之在其左右前後也嗚呼是數君子者其可謂盡朋友之道而無所苟矣其卓然有以自立於當年而遺風餘烈可傳於世者豈徒然哉三復歎息因敬書其後以致區區尊仰之意云乾道壬辰十二月二十四日新安朱熹書䟦劉平甫家藏胡文定公帖彦脩必巳奉太夫人赴温陵此郡樂國也便於養親同増歡慰臨川密邇鄊邦音問易逹彦冲退然自守深可嘉尚徳門積善乆矣如昆仲出則奮其才力建立事功居者進脩術業養成徳器乃邦國之光凡在鄊鄰亦預榮焉衰老覩此盛事不勝欽歎安國又啓安國再啓湖湘旱饑之後民間窘迫而供饋頻繁江西諒亦爾然教令旣孚吏民信服不晚必有除擢矣寅在桐江幸亦粗遣然歸養之意甚濃謾恐知之憲姪比蒙恩命皆昆仲平日獎提之所及也感佩之意言不能喻安國再啓伯逹孫今巳長成莫湏早晚令隨貢元伯伯習知禮義若一句不讀書恐不便也與族兄書其畧如此屏山劉玶平甫藏胡文定公帖一卷前兩𥿄胡公與乎甫伯父祕閣君蓋公之辭而其子祠部君筆也時祕閣守臨川兄侍郎公守温陵弟屏山先生稱疾不仕胡公之子侍郎守桐江兄子籍溪先生以布衣特起典教鄊郡書辭蓋徧及之後一𥿄胡公與其族兄書實公手筆平甫購得之所稱范甥者即平甫外舅太史公也胡公正大方嚴動有法教讀此者視其所襃可以知勸視其所戒可以知懼平甫能葆藏之其志亦可知矣乾道癸巳三月乙酉新安朱熹觀於劉氏山館之復齋因敬書其後云書屏山先生文集後屏山先生文集二十卷先生嗣子玶所編次巳定可繕冩先生啓手足時玶年甚㓜以故平生遺文多所散逸後十餘年始復訪求以𥙷家書之缺則皆傳冩失真同異參錯而不可讀矣於是反復讎訂又十餘年然後此二十卷者始克成書無大譌謬熹以門墻灑掃之舊幸獲與計論焉竊以爲先生文辭之偉固足以驚一世之耳目然其精微之學静退之風形於文墨有足以發蒙蔽而銷鄙吝之萌者尤覽者所宜盡心也因書其故以告後之君子云乾道癸巳七月庚戌門人朱熹謹書䟦張敬夫爲石子重作傳心閣銘熹旣爲尤溪大夫石子重記其脩學之事又爲作此五銘焉時子重方爲藏書之閣於講堂之東中寘周程三君子像旁列書史之櫃而使問名於熹請以傳心榜之而子重遂并以其銘見屬熹愚不敏不敢專也且惟子重之爲是閣蓋非學校經常之則非得知道而徤於文者不能有所發明也則轉以屬諸廣漢張君敬夫而私記其說如此云䟦古今家祭禮右古今家祭禮熹所纂次凡十有六篇蓋人之生無不本乎祖者故報本反始之心凡有血氣者之所不能無也古之聖王因其所不能無者制爲典禮所以致其精神篤其恩愛有義有數本末詳焉遭秦㓕學禮最先壞由漢以來諸儒繼出稍稍綴緝僅存一二以古今異便風俗不同雖有崇儒重道之君知經好學之士亦不得盡由古禮以復于三代之盛其因時述作隨事討論以爲一國一家之制者固未必皆得先王義起之意然其存于今者亦無㡬矣惜其散脱殘落將遂泯沒于無聞因竊蒐輯叙次合爲一篇以便觀覽庶其可傳於後然皆無雜本可參校往往闕誤不可曉知雖通典唐書慱士官舊藏版本亦不足據則他固可知巳諸家之書如荀氏徐暢孟馮翊周元陽孟詵徐潤孫日周等儀有録而未見者尚多有之有能采集附益并得善本通校而廣傳之庶㡬見聞有所興起相與損益折衷共成禮俗于以上助聖朝敦化導民之意顧不美哉淳熈元年五月戊戌新安朱熹謹識書近思錄後淳熈乙未之夏東萊吕伯恭來自東陽過予寒泉精舎留止旬日相與讀周子程子張子之書歎其廣大閎慱若無津涯而懼夫𥘉學者不知所入也因共掇取其關於大體而切於日用者以爲此編總六百一十二條分十四卷蓋凡學者所以求端用力處巳治人之要與夫辨異端觀聖賢之大畧皆粗見其梗槩以爲窮鄊晚進有志於學而無明師良友以先後之者誠得此而玩心焉亦足以得其門而入矣如此然後求諸四君子之全書沉潜反復優柔厭飫以致其慱而反諸約焉則其宗廟之美百官之富庶乎其有以盡得之若憚煩勞安簡便以爲取足於此而可則非今日所以纂集此書之意也五月五日朱熹謹識䟦通鑑紀事本末古史之體可見者書春秋而巳春秋編年通紀以見事之先後書則毎事别記以具事之首尾意者當時史官旣以編年紀事至於事之大者則又採合而别記之若二典所記上下百有餘年而武成金縢諸篇其所紀載或更數月或歷數年其間豈無異事蓋必巳具於編年之史而今不復見矣故左氏於春秋旣依經以作傳復爲國語二十餘篇國别事殊或越數十年而遂其事盖亦近書體以相錯綜云爾然自漢以來爲史者一用太史公紀傳之法此意固不復講至司馬温公受詔纂述資治通鑑然後千三百六十二年之事編年繋日如指諸掌雖託始於三晉之侯而追本其原起於智伯上系左氏之卒章實相受授偉哉書乎自漢以來未始有也然一事之首尾或散出於數十百年之間不相綴屬讀者病之今建安袁君機仲乃以睱日作爲此書以便學者其部居門目始終離合之間又皆曲有微意於以錯綜温公之書其亦國語之流矣或乃病其於古無𥘉而區别之外無發明者顧第弗深考耳機仲以摹本見寄熹始得而讀之爲之撫卷太息因記其後如此以曉觀者淳熈二年秋七月甲寅新安朱熹書于雲谷之晦菴云書和静先生遺墨後和静尹公先生遺墨一卷皆先生晩歲片𥿄手書聖賢所示治氣養心之要粘之屋壁以自警戒者其家緝而藏之今陽夏趙侯刻寘臨川郡齋摹本見寄熹竊惟念前賢進脩不倦死而後巳其心炯炯猶若可識而趙侯所以摹刻之意又非取其字畫之工以供好事者之傳玩而巳捧讀終篇恍然自失因敢識其後以自詔云淳熈丙申三月丁巳新安朱熹敬書䟦張公予竹溪詩婺源雖巖邑而故多文士竹溪丈人張公予其一也好爲歌詩精麗宏偉至其得意往往亦造於閑澹其大篇短韻又皆各得其體晩歲屏居山田水竹之間專用詩酒自娯以忘其老所與游多一時名勝類皆退讓推伏樂稱道之觀吕待郎諸公所題文編可見矣淳熈丙申予自建安歸故里公予之子珍卿持以見示因得三反咏嘆究觀製作之意信乎其如諸公所稱不誣也然予聞公予天資孝友絶人其篤於兄弟之愛至犯患難取禍辱而不悔有古篤行君子所難能者諸公乃徒盛稱其詩而曾不及此予不能識其說也因竊記編之後以示鄊人使知公予之所以自見於世者不但其詩而巳蓋於名教庶亦深有𥙷云五月旣望邑子朱熹書䟦劉元城言行録元祐諌議大夫元城劉公安世字器之受學於司馬文正公得不妄語之一言拳拳服􅈾終身不失故其進而議於朝者無隱情退而語於家者無愧詞今其存而見於文字若此數書者凛然其與秋霜夏日相髙也熹之外舅劉聘君少嘗見公睢陽間爲熹言其所見聞與是數書略同而時有少異惜當時不能盡記其說且其俯仰抑揚之際公之聲容猶恍若相接焉而今亦不可復得矣嗚呼歲月如流前輩旣不可見而其流風餘韻日逺日忘又巳如此可勝嘆哉記大學後者以明之也游氏曰以性情言之則曰中和以徳行言之則曰中庸其實一也至十二章又子思之言而其下八章復以先聖之言明之也十二章明道之體用下章庸言庸行夫婦所知所能也君子之道鬼神之徳大舜文武周公之事孔子之言則有聖人所不知不能者矣道之爲用其費如此然其體之微妙則非知道者孰能窺之此所以明費而隱之義也第二十章據家語本一時之言今諸家分爲五六者非是然家語之文語勢未終疑亦脫愽學之以下今通𥙷爲一章二十一章以下至于卒章則又皆子思之言反復推說互相發明以盡所傳之意者也二十一章承上章総言天道人道之别二十二章言天道二十三章言人道二十四章又言天道二十五章又言人道二十八二十九章承上章爲下居上而言亦人道三十章復言天道三十一三十二章承上章小徳大徳而言亦天道卒章反言下學之始以示入徳之方而遂極言其所至具性命道教費隱誠明之妙以終一篇之意自人而入于天也熹嘗伏讀其書而妄以巳意分其章句如此竊惟是書子程子以爲孔門傳授心法且謂善讀者得之終身用之有不能盡是豈可以章句求哉然又聞之學者之於經末有不得於辭而能通其意者是以敢私識之以待誦習而玩心焉新安朱熹謹書書張氏所刻潜虚圖後紹興巳巳洛人范仲彪炳文避章傑之禍自信安來客崇安予得從之遊炳文親唐鑑公諸孫嘗娶温國司馬氏及諌議大夫無恙時爲子壻逮聞文正公事爲多時爲賔客道語亹亹不厭且多藏文正公遺墨嘗示予以潜虚别本則其沂闕之文尚多問之云温公晚著此書未竟而薨故所傳止此蓋嘗以其手藁屬景迂晁公𥙷之而晁謝不敢也因從炳文借得冩本藏之其後三十餘年所見之本皆然欲訪完書不復可得毎以爲恨近得泉州季思侍郎所刻則首尾完具遂無一字之闕始復驚異以爲世果自有完書而疑炳文語或不可信讀至剛行遂釋然曰此贗本也人問何以知之予曰本書所有句皆恊韻如易彖文象玄首賛測其今有而昔無者行變尚恊而解獨不韻此蓋不知也字處末則止字爲韻之例爾此人好作僞書而尚不識其體製固爲可笑然亦幸其如此不然則㡬何而不遂至於偪眞也耶間又考炳文之書命圖之後䟦語之前别有凡例二十六字尤爲命圖之關紐而記占四十二字注六字又足以見占法之變焉今本顧亦無之故其所附論說徒知以凶吉臧否平爲所遇之占而不知其所占者之又有所待而然也因亟以書扣季思此本果家世之舊傳否耶則報曰得之某人耳於是益知炳文爲不妄嘗欲私記本末以訂其謬而未暇今復得鄊人張氏印本乃泉本之所自出於是始出舊書授學者使以相參凡非温公之舊者悉朱識以别之凡行之全者七𥙷者二十有六變百八十有八解二百一十有二又𥙷命圖九凡例記占之闕大小七十有四字而記其所聞於炳文者如此使覽者有以考焉是時又得温公易說於炳文盡隨卦六二之半而其後亦闕焉炳文自言其家使人就謄温公手摹適至而興亡之故所存止此後數年予乃復得其全書云好事者於北方互市得版本焉始亦喜其書之獲全今則不能無疑然無以考其果爲眞與僞也時又嘗問炳文或謂涑水記聞非温公書者信乎炳文曰是何言也温公曰錄月别爲卷靣記行事皆述見聞手筆細書今可覆視豈他人之所得爲哉特其間善惡雜書無所隱避使所書之家或諱之而不欲傳耳炳文又云金虜入洛時從温公家避地至某州遇群盗執以見其渠帥帥問何人應曰司馬太師家也群盗相顧失色且訊虚實因出畫像及敕誥之屬示之則皆以手加額旣而俯仰嘆息謂炳文曰向使朝廷能用汝家太師之言不使吾屬披倡至此矣凡吾所欲殺掠者蔡京王黼輩親舊黨與耳汝無憂懼爲也亟傳令軍中無得驚司馬太師家又掲牓以曉其後曹以故骨肉皆幸無他而圖書亦多得全凡此人亦聞之者因并書之淳熈丙申十一月丁卯朱熹謹書書麻衣心易後麻衣心易頃歲嘗略見之固巳疑其詞意凡近不類一二百年前文字今得黃君所傳細讀之益信所疑之不謬也如所謂雷自天下而發山自天上而墜之類皆無理之妄談所謂一陽生於子月而應在卯月之類乃術家之小數所謂由破體煉之乃成全體則爐火之末技所謂人間萬事悉是假合又佛者之幻語耳其他此比非一不容悉舉要必近年術數末流道聽塗說掇拾老佛醫卜諸說之陋者以成其書而其所以託名於此人者則以近世言象數者必宗邵氏而邵氏之學出於希夷於是又求希夷之所敬得所謂麻衣者而託之以爲若是則凡出於邵氏之流者莫敢議巳而不自知其說之陋不足以自附於陳邵之間也夫麻衣方外之士其學固不純於聖賢之意然其爲希夷所敬如此則其爲說亦必有竒絶過人者豈其若是之庸瑣哉且五代國𥘉時人文字言語質厚沈實與今不同此書所謂落處活法心地等語皆岀近年且復不成文理計其僞作不過四五十年間事耳然予前所見本有張敬夫題字猶摘其所謂當於羲皇心地上馳騁莫於周孔脚跡下盤旋者而與之辨是亦徒費於辭矣此直無理不足深議但當摘其謬妄之實而掊撃之耳淳熈丁酉冬十一月五日書再䟦麻衣易說後予旣爲此說後二年假守南康始至有前湘隂主簿戴師愈者來謁老且躄使其壻自掖而前坐語未乆即及麻衣易說其言暗澀殊無倫次問其師傳所自則曰得之隱者問隱者誰氏則曰彼不欲世人知其姓名不敢言也旣復問之邦人則皆曰書獨出戴氏莫有知其所自來者子省前語雖益疑之然亦不記前巳見其姓名也後至其家因復扣之則日學易而不知此則不明卦畫之妙而其用差矣予問所差謂何則曰坎兊皆水而卦畫不同若煑藥者不察而誤用之則失其性矣予了其妄因不復問而見其几間有所著雜書一編取而讀之則其詞語氣象宛然麻衣易也其間雜論細事亦多有不得其說而公爲附託以欺人者予以是始疑前時所料三五十年以來人者即是此老旣歸亟取觀之則最後䟦語固其所爲而一書四人之文體製規模乃出一手然後始益深信所疑之不妄然是時戴病巳昏不乆即死遂不復可窮詰獨得其易圖數卷閱之又皆鄙陋瑣碎穿穴無稽如小兒嬉戯之爲者欲以其事馳報敬夫則敬夫亦巳下世因以書語吕伯恭曰吾病廢有年乃復爲吏然不爲他郡而獨來此豈天固疾此書之妄而欲使我親究其實耶時當塗守李壽翁侍郎雅好此書伯恭因以予言吿之李亟以書來曰即如君言斯人而能爲此書亦吾所願見也幸爲津致使其一來予適以所見聞報之而李巳得謝西歸遂不復出不知竟以予言爲如何也淳熈丁未𥘉夏四日病中間閱舊書念壽翁敬夫伯恭皆不可復見因并記此曲折以附其後使覽者知予之論所以不同於二君子者非苟然也䟦李少􅈾脞說人有士君子之行乃先王教化徳澤薰陶所就非一比長之官所能致也關市譏而不征乃文王治岐時事周禮乃成周大備之法隨時制冝自有不能同者前輩蓋嘗論之不當以此而難彼也以言動行爲之重乃藍田吕氏說然以經文推之有所不通不若只從舊註之爲安求全之毁對不虞之譽而言則亦當從舊註三代正朔胡氏春秋傳巳有此論然鄭康成杜元凱說亦不可廢蓋三代雖不改時與月而春秋紀春無氷爲異則固以周正紀事也石林葉氏又考左傳所記祭足取麥榖鄧來朝三事以爲經傳所記有例差兩月者是經用周正而傳取國史直自用夏正者失于更改也詩中月數多用夏正者書金縢秋大熟亦是夏時此爲不改時月之驗甚明但孟子所謂七八月乃五六月所謂十一月十二月乃九月十月爲不可曉此亦宜當闕之耳天産地産之說熹所未曉而李君所論亦未通地上有水恐不若從程傳之說大抵今人讀書不廣索理未精乃不能致疑而先務立說此所以徒勞苦而少進益也因讀李君脞說書此䟦黃仲本朋友說人之大倫其别有五自昔聖賢皆以爲天之所叙而非人之所能爲也然以今考之則惟父子兄弟爲天屬而以人合者居其三焉是則若有可疑者然夫婦者天屬之所由以續者也君臣者天屬之所頼以全者也朋友者天屬之所頼以正者也是則所以紀綱人道建立人極不可一日而偏廢雖或以人而合其實皆天理之自然有不得不合者此其所以爲天之所叙而非人之所能爲者也然是三者之於人或能具其形矣而不能保其生或能保其生矣而不能存其理必欲君臣父子兄弟夫婦之間交盡其道而無悖焉非有朋友以責其善輔其仁其孰能使之然哉故朋友之於人倫其勢若輕而所繋爲甚重其分若踈而所關爲至親其名若小而所職爲甚大此古之聖人脩道立教所以必重乎此而不敢忽也然自世教不明君臣父子兄弟夫婦之間旣皆莫有盡其道者而朋友之倫廢闕爲尤甚世之君子雖或深病其然未必深知其所以然也予嘗思之父子也兄弟也天屬之親也非其乖離之極固不能輕以相棄而夫婦君臣之際又有雜出于情物事勢而不能自巳者以故雖或不盡其道猶得以相牽聮比合而不至於盡壞至於朋友則其親不足以相維其情不足以相固其勢不足以相攝而爲之者𥘉未嘗知其理之所從職之所任其重有如此也且其於君臣父子兄弟夫婦之間猶或未嘗求盡其道則固無所藉於責善輔仁之益此其所以恩䟽而義薄輕合而易離亦無恠其相視漠然如行路之人也夫人倫有五而其理則一朋友者又其所藉以維持是理而不使至於悖焉者也由夫四者之不求盡道而朋友以無用廢然則朋友之道盡廢而責善輔仁之職不舉彼夫四者又安得獨力而乆存哉嗚呼其亦可爲寒心也巳非夫彊學力行之君子則孰能深察而亟反之哉始予讀王深甫告友之篇感其言若有𥙷於世教者徐而考之則病其推之不及於天理之自然顧以夫婦君臣一出於情勢之偶合至於朋友則亦不求其端直以爲聖人彊而附于四者之間也誠如是也則其殘壞廢絶是乃理分之當然無足深嘆而其至是亦晚矣近得黃君仲本朋友說讀之其言天理人倫之意乃若有㑹於予心者然於朋友之道廢所以獨至於此則亦恐未究其所以然也因書其後如此庶乎其有發云䟦范文正公家書三郎官人昨得書知在官平善此中亦如常只是純佑未全安汝守官處小心不得欺事與同官和睦多禮有事只與同官議莫與公人啇量莫縱鄊親來部下興販自家且一向清心做官莫營私利汝㸔老叔自來如何還曽營私否自家好家門各爲好事以光祖宗頻寄書來言彼動静將息將息不具叔押報十五日新媍孩兒各安好十叔房下如何弟兄還漸識好悪否右范文正公與其兄子之書也其言近而易知凡今之仕者得其說而謹守之亦足以檢身而及物矣然所謂自未嘗營私者必若公之先天下之憂而憂後天下之樂而樂事上遇人一以自信不擇利害爲趨舎然後足以充其名而其所論親僚友以絶壅蔽之萌明禁防以杜姦私之漸者引而伸之亦非獨效一官者所當知也友人陳君明仲爲候官宰得公此帖刻置坐隅以自觀省而以其墨本見寄熹蓋三復焉而深賛其言之近指之遠敢書其說於左方庶㡬覽者有以發焉淳熈戊戍季夏閏月新安朱熹謹書書徽州婺源縣中庸集解板本後此書始刻於南劒之尤溪熹實爲之序其篇目今建陽長沙廣東西皆有刻本而婺源宰三山張侯又將刻之縣學以惠學者熹故縣人嘗病鄊里晚學見聞單淺不過溺心於科舉程試之習其秀異者又頗馳騖乎文字纂組之工而不克專其業於聖門也是以儒風雖盛而美俗未純父子兄弟之間其不能無愧於古者多矣今得賢大夫流傳此書以幸教之固熹之所欲聞而樂賛其成者也是書所記雖本於天道性命之微而其實不外乎逹道逹徳之粲然者學者誠能相與深究而力行之則先聖之所以傳與今侯之所以教者且將有以自得之而舊俗之未純者亦可以一變而至道矣書徽州婺源縣周子通書板本後熹舊記先生行實采用黃太史詩序中語若以濂之爲字爲出於先生所自製以名廬阜之溪者其後累年乃得何君所記然後知濂溪云者實先生故里之本號而非一時嫓合之强名也欲加是正則其傳巳乆懼反以異詞致惑故特附何君語於遺事中以著其實後又得張敬夫所刻先生墨帖後記先生家譜載濂溪隱居在營道縣榮樂鄊石塘橋西而㫪陵胡良輔爲敬夫言濂實溪之舊名父老相傳先生晚居廬阜因名其溪以示不忘其本之意近邵武鄒旉官春陵歸爲熹言嘗親訪先生之舊廬所見聞與何張之記皆合但云其地在州西南十五里許蓋溪之源委自爲上下保而先生居下保其地又别自號爲樓田至字之爲濂則疑其出於唐刺史元結七泉之遺俗也旉嘗有文辨說甚詳其論制字之所從則熹蓋嘗爲九江林使君黃中言之與旉說合方將并附其說於書後以證黃序之失而婺源宰三山張侯適將鋟板焉因書以遺之庶㡬有𥙷於諸本之闕若此書所以發明聖學之傳而學者不可以不讀之意則熹前論之巳詳矣因不復重出云淳熈巳亥正月朔旦縣人朱熹謹書䟦歐陽國瑞母氏錫誥淳熈巳亥春二月熹以卧病鈆山崇壽精舎邑士歐陽國瑞來見且出其母太孺人錫號訓辭及諸名勝䟦語俾熹亦題其後熹觀國瑞器識開爽陳義甚髙其必有進乎古人爲巳之學而使國人願稱焉日幸哉有子如此矣夫豈獨以其得乎外者爲親榮哉因竊不辭而敬書其後如此國瑞勉􅏧無忽其言之陋也䟦趙宰母夫人錫誥熹伏讀壽昌夫人始封訓辭因得遍觀諸賢䟦知趙侯之所以厚於其親者非今世常人之所及矣問於士友之間皆言趙侯與其昆弟平居奉飬所以恱其親者無所不用其至又知其非出於一時勉慕而爲之也嗚呼其亦可謂孝矣夫事親孝故忠可移於君吾知趙侯異時進而立於朝廷其必有以異乎今世士大夫之所爲者無疑也因亦輙書其後云淳熈巳亥四月辛丑新安朱熹書䟦趙侯彦遠行實名善應字直之父也孟子喜稱柳下惠之爲人以爲百世之下聞其風者鄙夫寛薄夫敦而世或疑之今得崇道趙侯行實之書而讀之足以信孟氏之不我欺矣著作君所以觀法其親而顯楊之者深密詳盡至於如此豈亦侯之身教有以發之也歟抑以是爲質而致知以精之則天性人心固有不可泯之義理以是爲始而力行以終之則由家及國又有不可窮之事業是則熹愚不肖於著作君蓋猶不能無惓惓之望也敢竊識編末而歸其書趙氏云淳熈已亥中夏丁卯新安朱熹書伊川先生易傳板本後易之爲書更歷三聖而制作不同若庖羲氏之象文王之辭皆依卜筮以爲教而其法則異至於孔子之贊則又一以義理爲教而不專於卜筮也是豈其故相反哉俗之淳漓旣異故其所以爲教爲法者不得不異而道則未嘗不同也然自秦漢以來考象辭者泥於術數而不得其弘通簡易之法談義理者淪於空寂而不適乎仁義中正之歸求其因時立教以承三聖不同於法而同於道者則惟伊川先生程氏之書而巳後之君子誠能日取其一卦若一爻者熟復而深玩之如巳有疑將决於筮而得之者虚心端意推之於事而反之於身以求其所以處此之實則於吉凶消長之理進退存亡之道將無所求而不得邇之事父逺之事君亦無處而不當矣華山皇甫斌嘗讀其書而深好之蓋嘗大書深刻摹以予人惟恐傳者之不廣而讀者之不多也顧猶來請其所以讀之之說熹不得讓輙書此以遺之淳熈六年秋八月丙戍朔新安朱熹謹書䟦蘇文定公直節堂記右南康軍治直節堂記欒城蘇文定公爲郡守徐君師回望聖作又手書而刻石焉自元豐乙丑距今淳熈巳亥凡九十有五年而新安朱熹來領郡事問堂所在則旣無有而杉亦不存求其記文則又非復故刻而委之他所矣於是歷訪郡之老人竟無有能言其處者蓋自元豐以至今其間世故亦多變矣然建炎羣盗於今纔五十年舊迹蕪㓕未應至此意者斯堂之毁其在紹聖黨論之時乎撫事興懷慨然求嘆顧郡方貧而民巳病正使堂之故基尚在勢亦不能有以復於其舊獨聽事之西有堂無額而庭中有老栢焉焚斮之餘生意殆盡而屹立不僵如志士仁人更歷變故而剛毅獨立凛然不衰者因取直節之號寓之此堂而輦記石䧟壁間且欲盡去庭之凡木而雜植杉栢以彷彿前賢之遺意則旣非時而熹亦以病告歸矣嗚呼後之君子其尚有以成予之志也夫是歲八月丁亥識書濂溪先生愛蓮說後右愛蓮說一篇濂溪先生之所作也先生嘗以愛蓮名其居之堂而爲是說以刻焉熹得竊聞而伏讀之有年矣屬來守南康郡實先生故治然㓂亂之餘訪其遺跡雖壁記文書一無在者熹竊懼焉旣與慱士弟子立祠於學又刻先生象太極圖於石通書遺文於版㑹先生曽孫直卿來自九江以此說之墨本爲贈乃復寓其名於後圃臨池之館而刻其說置壁間庶㡬先生之心之徳來者有以考焉淳熈巳亥秋八月甲午朱熹謹記䟦叙古千文右叙古千文故禮部侍郎胡公明仲所作其叙事立言昭示法戒實有春秋經世之志至於發明大統開示正塗則又於卒章深致意焉新學小童朝夕諷之而問其義亦足以養正於蒙矣清江劉孟容出其先朝奉君所書八分小卷莊謹齊一所以傳家之意甚備豈亦有取於斯乎因摹刻寘南康郡齋傳諸小學庶㡬其有補云淳熈巳亥八月戊戌新安朱熹書書濂溪先生拙賦後右濂溪先生所爲賦篇聞之其曽孫直卿云近歲耕者得之溪上之田間巳斷裂然尚可讀也熹惟此邦雖陋然往歲先生嘗辱臨之乃闢江東道院之東室牓以拙齋而刻置焉旣以自警且以告後之君子俾無蹈先生之所耻者以病其民云淳熈巳亥秋八月辛丑朱熹謹記䟦曽吕二公寄許吏部詩奉懷子禮吏部賢友本中再拜寒松厭庭院老馬倦維縶脩然出塵去粗朝夕急我友隔江湖尚作一日葺平生學道心擇善有固執豈不在行路自逺霜露濕百川灌河來砥柱乃中立何時一尊酒更與交舊集長句奉寄子禮提宫吏部㡬草堂竹塢閉門中吏部持身有古風老去一麾還作病歸來四壁又成空今朝札翰知亡急舊日詩書郤未窮拭目㸔君進明徳乃兄事業聽天公先君子之執友吏部許公熹不及見也然而竊聞其學蓋以脩巳治人爲一致要之事實而不爲空言者今頌二公之詩可見當日衆賢注心髙仰之意矣至於前輩交㳺之際所以觀考徳業相期於無窮者與夫中與一時人物之盛覽者亦當慨然有感於斯焉淳熈巳亥十一月辛巳新安朱熹謹書䟦王樞密贈祁居之詩王公素剛毅有大節方廷争和議時視秦檜無如也而能屈體下賢出於誠意如此是可尚巳祁公以布衣諸生抗彊相折悍吏卒全窮交非其所養之厚所守之堅河以及此三復此卷爲之太息而書其後云淳熈巳亥臘月壬辰新安朱熹謹書書康節誡子孫文康節先生邵公手書誡子孫語及天道物理二詩得之薌林向氏刻寘白鹿洞之書堂以示學者淳熈庚子開基節日新安朱熹謹書䟦陳居士傳熹少讀龜山先生文集固巳想見居士之爲人今得鄧生綯所携墨本觀之又見了翁道鄊游察院李丞相張侍郎諸前輩稱述之盛如此不勝慨歎夫居士之爲人蓋子夏所謂雖曰未學吾必謂之學者先生猶歎其莫有開導而輔成之者吾儕小人姿本薄惡其可不汲汲於學問以矯厲而切磋之邪因敬書其後旣以自警且以視諸同志云淳熈庚子季春壬申新安朱熹書於南康郡舎之拙齋䟦徐誠叟贈楊伯起詩熹年十八九時得拜徐公先生於清湖之上便蒙告以克巳歸仁知言養氣之說時蓋未逹其言乆而後知其爲不易之論也來南康得楊君伯起於衆人中意其淵源之有自也一日出此卷示熹三復恍然思復見先生而不可得掩卷太息乆之淳熈庚子四月辛亥新安朱熹書䟦伊川與方道輔帖右伊川先生與莆田方君元宷道輔帖後一帖乃嘉祐二年語時先生之年纔二十有五爾眞蹟今藏道輔曽孫次陵家後百二十四年後學朱熹得曹建模本刻石于白鹿洞書院題洛神賦圖此卷筆意淳古略似漢石刻中所見草樹人物亦可考見當時器用車服制度不但爲好事者無益之玩而巳朱熹識䟦歐陽文忠公帖歐陽公作字如其爲文外若優游中實剛勁惟觀其深者得之淳熈庚子中夏丁巳新安朱熹觀于南康郡圃之愛蓮堂因識其後䟦冰解圖熹觀此圖讀洪陸二公䟦語爲之隕涕淳熈庚子五月戊午䟦太室中峯詩畫觀此卷二室諸峯誦陶翁送羊長史詩爲之慨然掩卷太息至於畫筆精深山勢雄偉不暇論也淳熈庚子中夏七月朱熹仲晦父書書語孟要義序後熹頃年編次此書鋟版建陽學者傳之乆矣後細考之程張諸先生說尚或時有所遺脫旣加𥙷塞又得毗陵周氏說四篇有半於建陽陳焞明仲復以附于本章豫章郡文學南康黄某商伯見而恱之旣以刻于其學又慮夫讀者疑於詳略之不同也屬熹書于前序之左且更定其故號精義者曰要義云淳熈庚子冬十有一月巳丑朔旦江東道院拙齋記䟦免解張克明啓行藏勲業銷倚樓㸔鏡之懷窈窕﨑塸増㝷壑經丘之趣此老子心事也此公方欲求試南宫而輙以自與何哉然予亦濡滯於此而未得遂其所懷也三復其言爲之太息庚子至前一夕六老軒書䟦獨孤及答楊賁處士書獨孤及爲舒州刺史作口賦法䖏士楊賁以書譏之曰富者出萬今易以千貧者出百今乃數倍富倍優貧倍苦及答之曰據保簿數百姓并浮寄户三萬三千而應差科者唯三千五百其餘二萬九千五百户𧖟而衣耕而食不持一錢以助王賦每歲三十萬貫之稅悉鍾於三千五百人之家髙户歲出千貫其次九百八百貫其次七百六百貫九等最下兼本丁租庸猶輸四五十貫以此人日困蹙故今爲口賦法以三萬三千人之力分三千五百家之稅乃損有餘𥙷不足之道富人貧人悉令均减倍優倍苦何從而生右見獨孤常州文集及大曆中卒於常州此又在其前可見當時田制隳壞之實然不能精加考覈以復武徳貞觀之舊而遽爲一切之法以亂經制何耶所謂三十萬貫者蓋并租庸與雜徭言之而所謂口賦法者則巳有兩稅之漸矣䟦洪芻所作靖節祠記讀洪芻所撰靖節祠記其於君臣大義不可謂懵然無所知者而靖康之禍芻乃縱慾忘君所謂悖逆穢惡有不可言者送學榜示講堂一日使諸生知學之道非知之艱而行之艱也䟦白鹿洞所藏漢書熹旣爲劉子和作傳其子仁季致書以其先人所藏漢書四十四通爲謝時白鹿洞書院新成因送使藏之以備學者㸔讀子和五世祖磨勘府君式南唐時讀書此洞後仕本朝有名太祖時其孫敞攽皆爲聞人今子和弟子􅊹之家尚藏其手抄孟子管子書云是洞中日課也年月日朱熹仲晦父記䟦張巨山帖近世之爲詞章字畫者争出新竒以投世俗之耳目求其蕭散澹然絶塵如張公者殆絶無而僅有也劉兄親承指畫妙得其趣然公晚以事業著故其細者人無得而稱焉敬夫雅以道學自任而游戯翰墨乃能爲之題識如此豈亦有賞於斯乎䟦陳簡齋帖簡齋陳公手冩所爲詩一卷以遺寳文劉公劉公嗣子觀文公愛之屬廣漢張敬夫爲題其籖予嘗借得之欲摹而刻之江東道院竟以不能得善工而罷間獨展玩不得去手蓋嘆其詞翰之絶倫又嘆劉公父子與敬夫之不可復見也俯仰太息因書其末以歸之劉氏云䟦蘇聘君庠帖予來南康間蘇聘君嘗居郡西門外暇日訪其遺迹無復存者永懷髙風不勝慨嘆南上人出示此軸三復之餘益深遐想淳熈辛丑正月二十八日新安朱熹仲晦父題䟦南上人詩南上人以此卷求余舊詩夜坐爲冩此及逺遊秋夜等篇顧念山林俯仰疇昔爲之慨然南詩清麗有餘格力間暇絶無𬞞筍氣如云沾衣欲濕杏花雨吹靣不寒楊柳風余深愛之不知世人以爲如何也淳熈辛丑清明後一日晦翁書䟦金谿陸主簿白鹿洞書堂講義後淳熈辛丑春二月陸兄子静來自金陵其徒朱克家陸麟之周清叟熊鑑路謙亨胥訓實從十日丁亥熹率寮友諸生與俱至于白鹿書堂請得一言以警學者子静旣不鄙而惠許之至其所以發明敷暢則又懇到明白而皆有以切中學者隱㣲深錮之病蓋聽者莫不竦然動心焉熹猶懼其乆而或忘之也復請子静筆之于簡而受藏之凡我同志於此反身而深察之則庶乎其可以不迷於入徳之方矣新安朱熹識䟦顔魯公栗里詩右唐魯郡顔文忠公㮚里詩見陳令舉廬山記而不得其全篇雖然讀之者亦足以識二公之心而著於君臣之義矣㮚里在今南康軍治西北五十里谷中有巨石相傳是陶公醉眠處予嘗往遊而悲之爲作歸去來館於其側歲時勸相間一至焉俯仰林泉舉酒屬客蓋未嘗不賦是詩也地之主人零陵從事陳君正臣聞之若有慨然於中者請大書刻石上予旣去郡請益堅乃書遺之淳熈辛丑秋七月壬午新安朱熹仲晦父䟦張魏公與劉氏帖張忠獻公平生心事無一念不在君親而其學又以虚静誠一求之於天爲本故其與人言亦未嘗不依於此今觀其所與寳學劉公屏山先生共父樞密書帖詩文亦可見矣劉公從公川陜并心國事故公於其兄弟父子之間眷眷如此亦豈苟然者哉先生之子玶有味其言欲廣傳之以悟當世因屬熹書其後淳熈辛丑八月甲子新安朱熹敬書䟦鄭景元簡六經記載聖賢之行事備矣而於死生之際無述焉蓋以是爲常事也獨論語檀弓記曽子寢疾時事爲詳而其言不過保身謹禮與語學者以持守之方而巳於是足以見聖賢之學其所貴重乃在於此非若浮屠氏之不察於理而徒以坐亡立脫爲竒也然自學者言之則死生亦大矣非其平日見善明信道篤深潜厚養力行而無間夫亦孰能至此而不亂哉今觀鄭君景元所報其兄龍圖公事亦足以驗其所學之正而守之固矣所謂朝聞道夕死可矣者於公見之因竊書其後以自警又將傳之同志相與勉焉淳熈辛丑秋八月乙巳朔丹陽朱熹書䟦鄭景望書吕正獻公四事右申國吕正獻公四事見其家傳而故建寧太守鄭侯書之齋壁以自警者也侯書此時巳屬疾間不兩月而終啓手足時清明安定執禮不懈如常日是足以驗其平生學力果能踐斯言者非一時偶書屋壁而巳也夫吕公之行髙矣其可師者不止此鄭侯亦無不學顧豈舎其大而規規於其細如此哉誠以理無巨細精粗之間大者旣立則雖毫髪之間亦不欲其少有遺恨以病夫道體之全也侯之莫府趙君彦能將摸刻寘府學以視學者而屬熹書其本末熹不得辭也侯名伯熊字景望永嘉人其爲此邦號令條教必本於孝弟忠信學者傳之淳熈辛丑秋八月乙巳朔旦州民宣教郎新提舉江南西路常平茶鹽公事朱熹謹書書劉子澄所編曽子後右曽子書七篇其内篇一外篇雜篇各三吾友清江劉清之子澄所集録也昔孔子殁門人唯曽氏爲得其傳其後孔子之孫子思樂正子春公明儀之徒皆從之學而子思又得其傳以授孟軻故其言行雜見於論語孟氏書及他傳記者爲多然皆散出不成一家之言而世傳曽子書者乃獨取大戴禮之十篇以充之其言語氣象視論孟檀弓等篇所載相去遠甚子澄蓋病其然因輯此書以傳學者而於其精粗純駁之際尤致意焉於戯若子澄者其可謂嗜學也巳然熹嘗考之竊以謂曾子之爲人敦厚質實而其學專以躬行爲主故其眞積力乆而得以聞乎一以貫之之妙然其所以自守而終身者則固未嘗離乎孝敬信讓之規而其制行立身又專以輕富貴守貧賤不求人知爲大是以從之游者所聞雖或甚淺亦不失爲謹厚脩㓗之人所記雖或甚踈亦必有以切於日用躬行之實蓋雖或附而益之要亦必爲如是之言然後得以自託於其間也然則是七篇者等而别之雖有内外雜篇之殊而其大致皆爲有益於學者非他書所及也讀者誠能志其大而必謹其小歷其淺而徐望其深則庶乎其無躐等之病而有曰新之功矣淳熈八年九月丁丑新安朱熹謹記䟦陳微猷墓誌銘後秦丞相用陳公爲淮西帥蓋將付以邊事公以其意叵測力辭不就頃年公再罷番陽熹見公考亭私第公爲熹言此甚詳今不能盡記其曲折也淳熈辛丑中冬乙亥因觀汪公所撰誌銘書此以𥙷其闕時汪公薨巳七年而敬夫明仲亦巳下世令人悲慨之深新安朱熹書公孫坦藏周子通書後記逋書者濂溪夫子之所作也夫子姓周氏名惇順字茂叔自少即以學行有聞於世而莫或知其師傳之所自獨以河南兩程夫子嘗受學焉而得孔孟不傳之正統則其淵源因可槩見然所以指夫仲尼顔子之樂而發其吟風弄月之趣者亦不可得而悉聞矣所著之書又多放失獨此一篇本號易通與太極圖說並出程氏以傳於世而其爲說實相表裏大抵推一理二氣五行之分合以紀綱道體之精㣲决道義文辭禄利之取舎以振起俗學之卑陋至論所以入徳之方經世之具又皆親切簡要不爲空言顧其宏綱大用旣非秦漢以來諸儒所及而其條理之密意味之深又非今世學者所能驟而窺也是以程氏旣没而傳者鮮焉其知之者不過以爲用意髙逺而巳熹自蚤歲即幸得其遺編而伏讀之𥘉蓋茫然不知其所謂而甚或不能以句壯歲獲遊延平先生之門然後始得聞其說之一二比年以來潜玩旣乆乃若粗有得焉雖其宏綱大用所不敢知然於其章句文字之間則有以實見其條理之愈密意味之愈深而不我欺也顧自始讀以至于今歲月㡬何倐焉三紀慨前哲之益逺懼妙㫖之無傳竊不自量輙爲注釋雖知凡近不足以發夫子之精藴然創通大義以俟後之君子則萬一其庶㡬焉淳熈丁未九月甲辰後學朱熹謹記晦庵先生朱文公文集卷第八十一懷安縣儒學訓導葉暢校
