  text: 晦庵先生朱文公集卷第六詩
  hash: sha256:13298769a78cbc27d3b088f33b460f04733082c02a4025014f6b3234e59e7b10
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0226_SBCK_006-1a}
body:
  text: 和人遊西巖平生壯志浩無窮老寄寒泉亂石中間去披襟弄清泚靜來合眼聽玲瓏不知澗寺晴時雨何似溪亭落處風吟罷君詩自瀟灑此心端不限西東次知郡章丈遊山之韻前峰鸞鶴去無蹤邂逅荒尋得故宫但覺風煙隨意好便驚塵土轉頭空提壺命駕幽期逺授簡哦詩妙處同安得西山一丸藥共隨簫鼓向雲中題周氏溪園三首循澗闢芳園結亭對虛壁澄潭俯幽鑒空翠仰寒滴主人心事逺妙寄塵壤隔豈為功名期而忘此泉石溪亭危亭竹柏間悄蒨日幽絶朔風一以厲愛此枝上雪仰悲玄景駛俯歎群芳歇不用此時來那知歲寒節雪亭手種籬間樹枝繁不忍刪新亭最佳處勝日共歡顔景晏春紅淺雨餘寒翠􅏰光風回巧笑桃李任漫山嫣然亭寄林擇之故人千里寄書來三復塵襟頓豁開勸我從容深燕養莫將占畢苦沉埋杖藜此日應同趣揮麈何時得共陪珍重相期俱努力自慙殊未竭淵才送林擇之還鄉赴選三首青驪去路欲駸駸回首猶須話此心一别便成三數月有疑誰講過誰針門外槐花似欲黃高堂應望促歸裝箇中自有超然處肯學兒曹一例忙今朝握手送君歸馬上薰風拂靣吹不用丁寧防曲學寒窗久矣共心期題林擇之欣木亭危亭俯清川登覽自晨暮佳哉陽春節看此隔溪樹連林爭秀發生意各呈露大化本無言此心誰與晤真歡水菽外一笑和樂孺聊復共徜徉殊形乃同趣擇之誦所賦擬吕子進元宵詩因用元韻二首何處元宵好山房入定僧往來衣上月明暗佛前燈實際徒勞説空華詎可憑還教知此意妙用一時興何處元宵好寒龕獨寐人月窗同皎皎燈鏡自塵塵靜鑒通天地濳思妙鬼神却憐迷路子狂走閙城闉次韻擇之梧竹二首并呈季通竹塢深深處檀欒繞舍青暑風成慘淡寒月助清泠客去空塵榻詩來拓采櫺此君同一笑午夢頓能醒永日長梧下清隂小院幽自憐風嫋嫋客賦雨瀏瀏作别今千里相思欲九秋更憐同社友復此誤淹留擇之寄示深卿唱和烏石南湖佳句輒次元韻三首未識南湖景遙欣二子遊賞心并勝日妙語逼清秋賸欲携書卷相將買釣舟微吟歸去晚杜若滿汀洲平湖渺空闊積水暮生寒但見緑千頃不知深幾竿人間元迫隘世路足艱難若了滄洲趣無勞正眼看年來年去為誰忙三伏炎蒸忽變涼閲世謾勞心悁悁懷人空得鬢蒼蒼詩篇眼界何終極道學心期未遽央安得追尋二三子舞雩風月共徜徉小詩奉送擇之仁友赴漕臺之招後篇喜趙公之得士而不敢致私怨焉然別懷黯然不能成章亦足以見區區也二首之子論交久深衷兩自知提携方有賴離索遽成悲聖處應無數書來肯見私臨分莫惆悵努力共心期珍重東臺老英聲舊所聞能懷吐哺意豈但枉書勤得士看如許持心定不群願言推此志清濁見朋分擇之賢友歸途左顧示以四明酬唱煥爛盈編三復咏嘆想見聚遊之樂輒用黃山即事之韻賦呈擇之兼懷子重老兄順之賢友十年身卧白雲堆巳分黃塵斷往回不是幽人遺俗去肯尋流水渡關來三秋風月從頭説千里湖山覿靣開久欲過逢須一快豈知勞結倍難裁夜聞擇之誦師曽題畫絶句遐想高致偶成小詩一幅瀟湘不易求新詩誰遣送間愁遙知水逺天長外更有離騷極目秋次林擴之開善避暑韻二首炎官虐焰遍山村也到蕭蕭柳下門水玉秋菰那可得羡君行處午隂繁山齋幾日旱塵昏欲拂朱絃巳憚煩涼意感君持寄我雨聲花思滿胸存送林熙之詩五首君行往返一千里過我屏山山下村濁酒寒燈靜相對論心直欲到忘言仁體難明君所疑欲求直截轉支離聖言妙緼無窮意涵泳從容只自知天理生生本不窮要從知覺驗流通若知體用元無間始笑前來説異同十年燈火與君同誰道年來西復東不學世情雲雨手從教人事馬牛風古鏡重磨要古方眼明偏與日爭光明明直照吾家路莫指并州作故鄉春雪用韓昌黎韻同彭應之作既有陽春曲那無白雪謡連天飛不斷著地暖還銷未掩高人戶難齊衲子腰稍開銀世界漸長玉枝條興盡愁煙艇行迷認野橋酒腸渾欲凍吟筆為誰搖殘臘成三白餘寒又一朝香隨梅蘂落輕伴柳花飄神女羞捐佩鮫人敢獻綃東皇應好事避舍亦相饒次彭應之餐雪韻雪水瀹清茗自謂絶世清終然犯煙火况復勞煎烹豈如午霽餘探此竹外楹柘漿發井和寶碗凝寒晶心胸既清涼齒頰亦鏘鳴吞腥期永謝飮玉希長生次彭應之魚樂亭韻亭前活水破輕冰漸見遊鯈傍石稜老子自知魚樂處不須莊惠與同登與劉德明祝濟之胡子寬晚步偶成雨罷寒逾徑霜威正凛然不知荒徑濕行到野橋邊曠望情何極徘徊意莫傳清波涵衆影日落暗晴川劉德明彥集祝弟以夏雲多竒峰為韻賦詩戲成五絶出山幾何時歸來便長夏端居心不怡散䇿長林下為客厭城市還家辭世紛朝昏何所見但有四山雲閉門事幽討歲月忽巳多客來無可問與君共絃歌干時本巳懶胸次况亡竒若問中林趣婆娑秪自知炎蒸不可奈雲氣滿前峰向夕風吹盡微聞逺寺鍾仙洲新亭熹名以晝寒紫微張公為書其額判院劉丈乃出新句輒次高韻二首聞説藤蘿外神龍舊所蟠擘開千丈峽寫盡一襟寒賞寄三杯酒歸投六尺竿若無詩律好清絶不成歡悄蒨非人境寒蟬夏巳稠陽崖驚素雪午扇怯清秋共説新亭好真堪妙墨留賞心元不厭仙夢肯來遊時巳聞安國之訃次韻晝寒行穿危磴盡林表見孤亭澗瀉千尋白峰回四靣青塵襟元落落風腋自泠泠一醉今何許無心賦獨醒次判院丈晝寒亭韻有懷平父把酒懷人處幽尋記往時新亭勞指顧勝踐闕追隨為報層櫩出莫憂浮柱欹惟應舊飛雪想象合心知次判院丈清湍之什明滅青羅帶周遭碧玉環孤亭感陳迹茂樹喜重攀爽氣琴尊外泉聲枕簟間詩成無寫處絶壁蘚痕斑遊密菴分韻賦詩得還字我行得佳友勝日尋名山春山既妍秀清溪亦潺湲行行造禪扉小憩腰腳頑窮探意未巳理䇿重躋攀入谷翳蒙密俯澗隨泓灣誰將百尺綃挂此長林間雄聲殷地厚洪源㵼天慳偉哉竒特觀償此一日間所恨境過清悄愴暮當還顧步三嘆息人生何苦艱遊密菴分韻賦詩得絶字閩鄉饒竒山仙洲故稱傑巍然一峰高復與衆山絶傳聞極目處天水逺明滅萬里倐往還三光下羅列我來發孤興徑欲躋嵽嵲病骨竟支離何當攀去轍次韻宿密菴匆作經宵别胸竒莫與陳暮歸誇得句寒苦頓生春道義知無斁文章自有真它年應共説此日自由身遊密菴弱齡慕丘壑兹山屢遊盤朝隮青冥外暮陟浮雲端晴嵐染襟裾水石清肺肝俯仰未云巳歲月如飛翰中年塵霧牽引脰空長歎曠歲一登歷心期殊未闌矧此親友集笑談有餘歡結架迫彎崎徙倚臨奔湍共惜前古祕今為後來觀落景麗雲木回風馥秋蘭林昏景益佳悵然撫歸鞍諒哉故山好莫遣兹盟寒遊晝寒以茂林修竹清流激湍分韻賦詩得竹字仙洲幾千仞下有雲一谷道人何年來借地結茅屋想應厭塵網寄此媚幽獨架亭俯清湍開徑玩飛瀑交遊得名勝還往有篇牘杖屨或鼎來共此巖下宿夜燈照竒語曉䇿散遊目茗碗共甘寒蘭臯薦清馥至今壁間字來者必三讀再拜仰髙山􅋏然心神肅我生雖巳後久此寄齋粥孤興屢呻吟群遊幾追逐十年落塵土尚幸不逺復新涼有佳期幾日戒征軸宵興出門去急雨遍原陸入谷尚輕埃解􅋔巳銀竹虛空一瞻望逺思翻蹙恧袒跣亟躋攀冠巾如膏沐雲泉增舊觀怒響震寒木深尋得新賞一簣今再覆同來况才彥行酒屢更僕從容出妙句珠貝爛盈掬後生更亹亹俊語非碌碌吾纓不復洗巳失塵萬斛所恨老無竒千毫真浪秃聞季通德明諸友入山以詩迎之仍請先往觀瀑布勝友南窗底看書老歲華不因寒瀑響肯到野僧家古徑開能久新亭去豈賖躋攀那可緩寂寞有雄夸次觀瀑布韻快㵼蒼崖一道泉白龍飛下鬱籃天空山有此真竒觀倚杖來看思凛然和季通晝寒韻萬壑爭流處千年樹石幽危亭因我作勝日為君留酒笑紅裙醉詩慙雜珮酬尚嫌心境窄更約九垓遊次韻謁忠顯劉公墓下理亂由來今古同覆車那肯戒前蹤紛紛誤國人無數不昧丹心獨此公次季通晝寒亭韻二首不信高懷與世殊清遊試問與誰俱相將靜聽潺湲水洗滌塵襟肯自汚山行前後有光輝撲撲浮嵐翠染衣直到仙洲竒絶處晝寒亭下玉龍飛飲清湍亭石上小醉再登晝寒水邊今日共傳杯多謝殷勤數子來三伏炎蒸那有此百年懷抱頓能開雲山合匝還生霧雪澗崩騰怒吼雷却恨蒼屏遮逺日凌風直欲跨蓬萊次清湍亭韻二首上下青山今白頭穿雲入塢未能休因君去覔仙洲路却嘆周南獨滯留仄徑穿林欲造天未妨停䇿聽涓涓知君便有刀頭意莫忘仙洲澗底泉立春大雪邀劉圭甫諸兄遊天湖同雲被四野寒氣慘悲涼回風一以定密雪來飄揚時當冬候窮開歲五日強蓬巷無與適陟此瓊臺岡賔友既追隨兒童亦携將攀躋得冡頂徙倚聊倣徨俯視千里空仰看萬鶴翔逺迷亂峰翠近失平林蒼偃薄瑩神骨咀咽清肝腸朗詠招隱作悲吟黃竹章古人不可見來者誰能量且復記兹日他年亦難忘次圭父遊將軍巖韻二首極目危岑杳靄間誰將層棟壓巑岏瘦笻上上莫辭逺絶境行行得細觀眢井尚餘茅絰處考槃無復碩人寬倦來拂石支拳睡萬壑吟風午夢闌陳迹真成俯仰間回頭猶認碧巑岏更煩地主殷勤意得盡雲山表裏觀景晏共愁歸路逺年侵獨負酒杯寬明朝覔句酬珠玉剩喜詩情却未闌圭父約為金斗之遊次韻獻疑聊發一笑幾日春風未破寒逺峰晴露玉巑岏不成蠟屐携笻去且復鈎窗拄頰觀聞道追遊當作意故應期日尚能寬隂崖凍合無垂練却恐詩翁興易闌次彥集經營別墅之作回北成南指顧間要令華敞對巑岏家山信有千巖擁家山堂見武夷諸峯雲月何妨兩處觀傑閣巳資鄰築勝熹近蒙知府掇賜舊第樓居新基還見繚墻寬老仙鶴骨殊蕭爽歸興從今豈易闌彥集圭父擇之同飮白雲精舍以醉酒飽德為韻熹分得飽字醉中走筆奉呈奔趨名利埸禍福急相絞夜窗一反側膚垢紛兩瓜豈知親朋集晚食聊一飽心期共悠悠文字各稍稍華燭既屢更詩腸亦頻攪寒更儘渠深孤諷寧至卯次劉圭甫和人梅花韻意行欲遍江村路恰到詩人斷魂處梅花未肯笑春風蔓草何須怨零露歸來四壁無餘聲俯檻秪有寒塘青美人邂逅一笑粲倒影的皪踈枝橫寸心久矣遺紛雜不但老禪齋夏臘此時悢悢欲何言本根落落幾難合走遍諸君詩卷中西湖東閣病還同劃然長笑驚夢破碧雲散盡山叢叢平父有攀條嚼蘂繞千回日暮碧雲驚四合之向故云奉酬圭父末利之作玉蘂琅玕樹天香知見薰露寒清透骨風定逺含芬爽致銷繁暑高情謝曉雲遙憐河朔飮那得醉時聞奉酬圭父白蓮之作忽傳夔府句并送逺公蓮翠蓋臨風逈冰華浥露鮮舞衣清縞袂倒景爛珠躔想象芙蓉闕冥冥絶世緣次圭父觀魚韻平生三伏斷追遊誰喚來穿澗樹幽初訝網橫天影破忽驚人蹴浪花浮鳴榔不用齊吳榜鼓枻何須學楚謳便有金盤堆白雪却憐清泚向東流奉同黃子厚賦白芙蓉呈劉彥集平父湛湛曲池水曉含風露清田田緑羅蓋粲粲白玉英淡然絶世姿不與穠艷并俯鑒冰雪影詎懷兒女情山中徒淹留堂下空目成獨有忘機客相看兩無營觀洪遵雙陸譜有感呈劉平甫范仲宣二兄近從新譜識梟盧擬喚安陽舊博徒只恐分隂間過了更教人誚牧豬奴陶桓公嘗語人日大禹聖者乃惜寸隂至於衆人當惜分隂豈可逸遊荒醉生無益於時死無聞於後是自棄也諸參佐或以談戲廢事者乃命取其酒器蒲摶之具悉投之江吏將則加鞭朴日樗蒲者牧豬奴戲耳君子當正其衣冠攝其威儀何有蓬頭跣足自謂宏逹耶次劉彥集木犀韻三首衆芳搖落九秋期橫出天香第一枝莫似寒梅太孤絶更交遙夜笛中吹仙衣才試鬱金黃便覺秋風滿院芳定觀極知先透徹通心豈是故迎將秋到寒巖桂樹叢小山吟罷思悲翁不妨更作淹留計占取人間十里風寄謝劉彥集菖蒲之貺二首君家蘭杜久萋萋近養菖蒲緑未齊乞與幽人伴岑寂小窗風露日低迷泉清石瘦碧纎長秋露懸珠炯夜光箇裏無窮間造化别來誰與共平章公濟惠山蔬四種并以佳篇來貺因次其韻蔊靈草生何許風泉古澗傍褰裳勤采擷枝筯嚏芳香冷入玄根閟春歸翠頴長遙知拈起處全體露其常芹晚食寧論肉知君薄世榮瓊田何日種玉本一時生白鶴今休誤青泥舊得名收單還炙背北闕儻關情時公濟試禮部筍新笋因君寄康廬入夢中丹元餘故宅翠竹尚餘風日日來威鳯年年饌籜龍猶嫌有兼味不似一源功廬山簡寂觀道士陸修靜之所居從逺法師蓮社之遊賜號丹元先生觀有甜苦笋今者所惠乃甜笋也蕨西山採蕨人蓬首尚傾國懷哉逺莫致引脰氣巳塞頃筐忽墮前此意豈易得良遇不可遲枯笻有餘力題吳公濟風泉亭澗谷居永久高情未云酬兹焉發天祕始造寒巖幽上有茂樹隂下有清泉流結亭倚蒼峭鑿磴窮嵌丘翠壁自屏立青蘚亦環周朅來憩永夏凛若臨清秋仰空韻笙竽俯檻鏘琳璆幽聽一以會悠然與神謀遐哉超世心暇日聊娛憂笑問車馬客誰能淹此留再題吳公濟風泉亭華林翠澗響風泉竟日間來石上眠更結危亭俯幽聽未妨長作地行仙奉和公濟兄留周賔之句丙申九日端居感時序駕言誰適從聊携二三子杖屨此日同悠哉素心人宴坐空巖中真成三秋别夢想情何窮行行陟崇岡引脰希高風忽然兩相值俯仰迷西東鱣堂偶休間雞黍聊從容不辭腰腳勞共上西南峰佩茰笑長房把菊追陶公遐觀衆山逈一酌千慮融興罷復來歸杳靄秋堂空窺樽訖餘瀝倚閣聞踈鍾主人意未闌驪駒勿匆匆寄吳公濟兼簡李伯諫五首客子歸來春未深秪應寒雨罷登臨間窗竟日焚香坐一假孤明見此心三徑莓苔晝掩關君來問道却空還從今蠟屐應無恙有興何妨再入山盤翁别去久無書可復因循自作踈珍重寄聲煩問訊箇中消息定何如繁絃急管盛流傳清廟遺音久絶絃欲識寥寥千古意莫將新語勘塵編謂鹽官中庸憶昔殊方久滯淫年深歸路始駸駸傍人欲問蕇瓢樂理義誰知悅我心公濟和詩見閔耽書勉以教外之樂以詩請問二首至理無言絶淺深塵塵剎剎不相侵如云教外傳真的却是瞿曇有兩心未必瞿曇有兩心莫將此意攪儒林欲知陋巷憂時樂只向韋編絶處尋伯諌和詩云邪色哇聲方漫漫是中正氣愈駸駸豫謂此乃聖人從心之妙三歎成詩重以問彼二首任從耳畔妍聲過特地胸中順氣萌箇裏詎容思勉得羡君一躍了平生闕里當年語從心至今蹤迹尚難尋况君直至無心處肯向人前話淺深遊百丈山以徙倚弄雲泉分韻賦詩得雲字執熱倦煩局駕言起宵分隨川踏曉月度嶺披朝雲攀緣白石梯拂拭蒼蘚紋噴薄驚快覿琮琤喜先聞竒哉此精廬眇然隔塵氛諸公肯同來定非俗子群永日坐清樾短章䇿竒勳慨然念疇昔聮𥚑巳荒墳中路忘磬折寸心謾絲棼惟應泉石願三生有餘薰兹遊獲重尋十載心氤氲他年訪舊躅山靈莫移文百丈山六詠石磴層崖俯深幽微徑忽中斷努力一躋攀前行有竒觀小澗兩崖交翠隂一水自清瀉俯仰契幽情神襟頓飄灑山門置屋兩山間巧當竒絶處峽束百泉傾澗激回風度石臺出谷轉石稜俯身窺木末夕眺嵐翠分朝隮雲海濶西閣借此雲窗眠靜夜心獨苦安得枕下泉去作人間雨瀑布巔崖出飛泉百尺散風雨空質麗晴暉龍鸞共掀舞遊籚峰分韻得盡字蘆山一何高上上不可盡我行獨忘疲泉石有招引須臾出蒙密矯首眺無畛巳謂極峥嶸仰視猶隱嶙新齋小休憩餘力更勉黽東峰切霄漢首夏正凄緊杖䇿同攀躋極目散幽窘萬里俯連環千重瞰孤隼因知平生懷未與塵慮泯歸塗采薇蕨晚餉雜蔬筍笑謂同來人此願天所允獨往會淹留寒棲井菌蠢山阿子慕豫無憂勒回軫同丘子服遊蘆峰以嶺上多白雲分韻賦詩得白字登巖出囂塵入谷媚泉石悠然愜幽趣不覺幾朝夕高尋倦冡頂舊賞歎陳迹仰慙仙人杖俯愧謝公屐昨日吾弟來勇往意無斁今晨蓐食罷千仞一咫尺心期未究竟眼界巳開闢浮野衆麓青縈雲兩川白須臾互吞吐變化巳今昔曠若塵慮空悲哉人境窄平生有孤念萬里思矯翮感此復沖然胡為尚形役登蘆峰行到蘆峰最上頭幾回振䇿又還休因君好句撩孤興却恨雲煙未肯收將遊雲谷約同行者躋險擇幽棲搴蘿結茅屋疏泉下石濞種樹滿煙谷時登北原上一騁千里目雲物下逶迤岡巒逺重復暫辭忽曠歲再往恨牽俗因悲昨遊侣或巳在鬼録前年元履同遊暄風悟新陽一雨欣衆緑明發君莫遲幽期我當卜九月六日早發潭溪夜登雲谷翌旦賦此懷山不能寐中宵命行軒亭午息畏景薄暮登危巒峻極踰百磴縈紆欲千盤行行遂曛黑月落天風寒羽人候中塗良朋集林端問我何所迫而嘗兹險艱疲勞既云極飢渴不能言投􅋔卧中丘幸此一室寬怒號竟永夕客枕無時安旦起闢幽户竹樹青檀欒驚喜非昔覩披尋得新觀淹留十日期俯仰有餘歡寄語後來子勿辭行路難雲谷二十六詠雲谷寒雲無四時散漫此山谷幸乏霖雨姿何妨媚幽獨南澗危石下崢嶸高林上蒼翠中有橫飛泉崩奔雜竒麗瀑布峰回危徑轉垂練忽千尋不為登山倦躊躇秋澗隂雲關白雲去復還黃塵到難入只有澗水聲出關流更急蓮沼亭亭玉芙蓉逈立映澄碧只愁山月明照作寒露滴杉徑南起雲關口縈紆上草堂天風發清籟山月度寒光雲莊小丘橫翠几層嶂復嵯峨釋耒間來看巖姿此處多泉硤入關但平田復此得清響何必問真源神襟一蕭爽石池兩岸蒼峭石護此碧泓寒秋月來窺影驪珠吐玉盤山楹山楹一悵望恨此雲迷谷仙人不可期縹眇雙髻緑藥圃長鑱斸靈根蒔此泉下圃珍劑未須論丹荑巳堪煮井泉山高澤氣通石竇飛靈液默料谷中雲多應從此出西寮畬田種胡麻結草寄林樾珍重無心人寒棲弄明月晦菴憶昔屏山翁示我一言教自信久未能巖棲冀微效草廬青山繞蓬廬白雲障幽戶卒歲聊自娛時人莫留顧懷仙西望多竒峰北瞰獨仙府欲致武夷君石壇羅桂醑揮手山臺一揮手從此斷將迎不見塵中事惟聞打麥聲雲社自作山中人即與雲為友一嘯雨紛紛無勞三奠酒桃蹊澗裏春泉響種桃泉上頭爛紅紛委地未肯出山流竹塢悄蒨桃蹊北蕭槮竹塢深不堪秋夜永風雨助悲吟漆園舊聞南華仙作吏漆園裏應悟見割憂嗒然空隱几茶坂携籝北嶺西采擷供茗飮一啜夜窗寒跏趺謝衾枕絶頂當年赫曦臺移治在兹嶺寥廓無四鄰三光疑倒影北澗土斷川亦分北下成隂澗秀石得佳名服􅈾吾敢慢澗有仁義石中溪南下東嶺阿云是中溪道巖樹愛樛枝石田悲蔓草休菴别嶺有精廬林巒亦幽絶無事一往來茶瓜不須設雲谷雜詩十二首登山夕陽翳東峰微月下西嶺不辭青鞋穿陟此巖路永巖路永且躋中情何耿耿值風山下風吹衣山上風拔木茅茨何足保瀛海慮翻覆未念執鬯人無心還自恧見易傳震卦玩月風起雲氣昏風定天宇肅遙遙萬里暉炯炯穿我屋良友共徘徊山中詎幽獨謝客野人載酒來農談日西夕此意良巳勤感歎情何極歸去莫頻來林深山路黑勞農四體久不勤筋力坐駑緩何事兩山阿離離豆苗滿多謝植杖翁居然見長短講道高居逺塵雜崇論探杳冥亹亹玄運駛林林群動爭天道固如此吾生安得寧懷人吾黨二三子欲來從我遊塵機諒擾擾遐諾終悠悠空山日復晚佇立悵夷猶子厚伯崇有約不至倦遊故人千里別約我仍丹丘云何一解散書到令人愁此山豈不幽何必賦逺遊時得伯恭書報罷天台之遊修書紬書厭塵纍執簡投雲關靈鑰啓玄祕肅斧鋤幽姦書成莫示人留置此山間宴坐登山思無窮臨水心未厭沉痾何當平膏肓今自砭默坐秋堂空遐觀靡餘念下山行隨流水聲步出哀壑底緑樹枝相樛白澗石齒齒樹石無窮年流水日千里還家出去柴門掩歸來蕙草秋素荂林下吐清芬衣上浮欲寄山中友日暮悵離憂雲谷合記事目效俳體戲作三詩寄季通雲關須早築基趾要堅牢栽竹行教密穿池岸欲高乘春移菡蓞帶雪覔蕭槮謂杉徑也更向關門外疏泉斬亂蒿堂成今六載上雨復旁風逐急添茆蓋連忙畢土功謂柱下貼磚桂林何日秀蘭徑幾時通并築雙臺子東山接水筒莊舍宜先立山楹却漸營泉疏藥圃潤堰起石池清早印荒田契仍標別戶名想應頻檢校秪恐欠方兄雲谷懷魏元履歎息艮齋老當年共此來千峰竒絶處一望興悠哉病怯披雲卧詩勞擁鼻裁秪今何處所宿草閟餘哀送許順之南歸二首門前三徑長蒿萊愧子殷勤千里來校罷遺書却歸去此心元自不曽灰幾年江海事幽尋偏與雲僧話此心今日肯來論舊學歲寒猶恐雪霜侵宿雲際寺許順之將别以詩求教次韻薄暮投花縣聮車入翠微長林生缺月永夜照寒扉情話欣無斁離懷悵有違勉哉疆毅力千里要同歸挽汪端明三首聖主興炎運明公起妙年材推漢庭右學自北方傳出入丹心壯安危素髮鮮空餘題劍在光燭舊林泉曠宇元無際孤標自不群物情良有寄讒口詎堪聞未許時明政猶堪史闕文衣冠忽長夜餘子謾紛紛先友當年盛斯文元祐徒艱虞共流落存沒半嗚呼顧我真無賴逢公幸不孤秪今還一慟即此是窮塗彥集奉檄歸省示及佳篇次韻奉酬呈諸兄友遊子思親久聚糧不堪官裏簿書忙平生况少鷹鸇意此日尤慙時世粧臘雪未消歡奉檄春風初轉喜還鄉上堂佳慶從容問一嚼何妨纍十觴彥集兄再適臨汀惠顧蓬蓽賦詩留別眷豫良勤次韻祖行言不盡意賸喜君才老更成伊優叢裏見孤撑官身未免心徒壯親膝頻違淚欲橫簿領不嫌春筍束廉聲要比玉壺清枉車投翰殷勤甚安得仁言與贈行圭父為彥集置酒白蓮沼上彥集有詩因次其韻呈坐上諸友大阮歸來客滿堂更移芳席近回塘共憐的皪水花淨并倚離披風蓋涼銀筆看題青玉案佳人悵望碧雲鄉此時此景真愁絶病著無因為舉觴寄題宜春使君定叟張兄隱齋此詩恐當合作一首大專槃萬生異體實同氣云胡分彼巳直以私自蔽君家桂林伯德學妙一世閉戶不忘憂纓冠矧行義眷言介弟賢四益謹先卑千里各分符一心同盡瘁逺題齋戶册來表棲息地系述寫心胸俯仰資惕厲陽嘉既滌蕩隂慝失封閉介然彼苛癢嚇若我黥劓拊摩極哀恫征取敢常藝戰兢一日力洋溢四封𬒳君看物我間隱顯豈殊致願反振民功更懋根本計次韻題平父兄重建一枝堂畫戟朱門枕碧山貂蟬元自出儒冠更餘此日林間樂逺繼當年膝下歡命駕賔朋千里近放懷琴酒百憂寬遺編却好傳孫子莫遣因循學宴安日用自警示平父圓融無際大無餘即此身心是太虛不向用時勤猛省却於何處味真腴尋常應對尤須謹造次施為更莫踈一日洞然無别體方知不枉費功夫抄二南寄平父因題此詩闕里言詩得賜商子貢子夏千秋誰復與相望鄒汾孟子文中子斷簡光前載關洛張子程子新書襲舊芳析句分章功自少吟風弄月興何長從容咏嘆無今古此樂從兹樂未央題劉平甫定菴五詠定菴風生長林悲雲起空谷暝下有不死人一室常在定巢雲入山何所見雲樹春𪷟𪷟安知巢居子避世於其中山臺林居厭棲迷山頂幸清曠無事一登臨却愁心浩蕩井泉開山昔何人鑿此寒泉井獨夜潄瓊瑶泠然發深省夀穴百年不可期一壑當預卜自憐木偶人空羡王官谷劉平甫席上分韻得寫字歲暮風雨交流雲暗平野公子燕華姻招呼及同社高情寄壺觴晤語到風雅剪燭夜堂深幽懷共輸寫此詩恐當作一首劉平甫分惠水梔小詩為謝二首年來衰懶罷書淫偶向盆山寄此心何事涼隂老居士便分幽賞助清吟何處飛來簷蔔林老枝樛屈更蕭槮凄涼杜老江頭句坐對行吟得自針少陵江頭五詠於梔子詩云於身色有用與道氣傷和和喜雨二絶雨師誰遣送餘春珍重天公惠我民且看歡顔埀白叟莫愁頩頰踏青人黃昏一雨到天明夢裏豐年有頌聲起望平疇煙草緑只今投筆事農耕和章國華祈雨呈平父諸兄三首極目平疇半欲枯遙知精禱意無餘更憐不待豚蹄祝便得汙邪暗滿車九重清夜仰昭回旱魃知從何處來不是幽人祈得雨又煩丹詔走風雷晴窗揮汗苦驕陽雨檻披衣快晚涼多謝龍公餘事業為驅寒谷變炎方山館諸兄共賦驟雨鷺鷥二絶平疇焦渴不堪論簫鼓悲秋徹帝閽霹靂一聲雲自墨山前山後雨翻盆雨罷微塘凛欲秋飛來白鳥便夷猶從今認得橫塘路水逺天長百不憂唐石雪中春風欲動客辭家霖潦縱橫路轉賖行到溪山愁絶處千林一夜玉成花秋日同廖子晦劉淳叟方伯休劉彥集登天湖下飮泉石軒以山水含清暉分韻賦詩得清字間居寡儔侣掩關抱孤清良友倐來止曠然舒我情矧此涼秋𥘉暑退裳衣輕相與一携手東山眇遐征前穿林嶺幽俯瞰川原平降集崖寺古徘徊濁醪傾長吟伐木篇濳鱗亦相驚願結沮溺耦窮年此巖耕淳熙戊戌七月二十九日與子晦純叟伯休同發屏山西登雲谷越夕乃至而季通德功亦自山北來會賦詩記事以雲卧衣裳冷分韻賦詩得冷字端莢得幽貞考槃寄兹嶺未成長往計抱恨中耿耿秋風吹庭樹遙夜枕席冷感彼歲序移慨此心事永明晨發孤興趣駕向絶境躋攀力雖倦想象意逾騁雲山一以眺俯仰疑倒景檢校石田收眷戀茅屋靜淹留復未遂外物愧張邴珍重同來人妙語各清整擊節三嘆餘超然得深省宿黃沙以山如翠浪湧分韻賦詩得如字日中秣吾馬日暮膏吾車﨑區涉南嶺浩蕩凌八嶇夜雨薦峰前朝登碧琳瓀蒼茫永嘯罷翕忽清景徂去此二三子我行將焉如崔嵬正丘垤萬里思南圖雲谷次吳公濟韻昔營此幽棲邈與世相絶誓將百年身來守固窮節心期苦未遂歲月一何闊終然匹夫志肯遽井沒沒兹晨復登瞰目盡雲一抹激烈永嘯餘朗寥高韻發夫君內德備不學王駘兀觀心見參倚出世自英傑朅來肯顧我同去弄雲月微言得深扣大句亦孤拔多謝警踈慵未敢嘆瞻忽更問毫釐間是同端是别宿休菴用德功壁間韻贈陳道人暮入千峰裏寒棲一草菴室連丹竈暖厨引石泉井塵慮紛難到神光暖內含非君有道氣孤絶詎能堪挽劉樞密三首天卑經綸業家傳忠義心謀謨經國逺勳烈到人深廊廟風雲斷江湖歲月侵一朝成殄瘁九牧共沾襟談笑平蠻䇿焦勞振廩功復讐乖宿志忍死罄餘忠人嘆百身贖天悲一鑑空九原終莫起千載自英風久矣身無用前恩嘆莫償豈期今老大復此重悲傷淚向遺書盡心隨宿草荒諸君那不死慟絶鬢成霜武夷七詠天柱峰屹然天一柱雄鎮斡維東秪説乾坤大誰知立極功洞天絶壁上千尋隱約巖栖處笙鶴去不還人間自今古畫鶴誰寫青田質高超鴈鶩群長疑風月夜清唳九霄聞仰高堂靣勢來空翠哦詩獨好仁懷人今巳矣誰遣棟梁新此堂與迎緑亭皆劉建康所名禮記引高山仰止景行行止之詩而曰詩之好仁如此趨真亭危亭久巳傾秪有頽基在何事往來人不知容鬢改大小藏巖藏室岌相望塵編何莾鹵欲問伯陽翁風煙迷處所丹竈仙人推卦節煉火守金丹一上煙霄路千年亦不還壬子三月二十七日聞迅雷有感誰將神斧破頑隂地裂山開鬼失林我願君王法天造早施雄斷答群心晦庵先生朱文公文集卷第六考異和人遊西巖澗寺一作澗樹題周氏溪園三首一無後一首次韻梧竹檀欒一作團欒慘淡一作慘淡次開善避暑韻花思滿胸存一作花氣滿思存送林熙之妙緼一作妙蓄只自一作合自若知體用元無間一作若明體用真無間晚步偶成雨罷寒逾徑一作雨歇寒逾徑暗晴川一作倍澄鮮和晝寒韻爭流一作爭陳樹石一作謝石謁劉公墓誤國一作迷國此公一作我公次彥集別墅信有一作倍有次和人梅花韻本根一作本願蔊芳香一作芬香翠頴一作秀頴芹收單一作收功筍籜龍一作伏龍寄吳公濟客子一作投􅌧秪應一作秪因罷登一作倦登從今一作只今寄聲一作寄音年深一作年來欲問一作若問遊百丈山隨川一作隨風石臺出谷一作山谷同丘子服遊蘆峰兩川一作滿川杉徑南起一作晨起桃蹊裏春一作東春絶頂移治在兹嶺一作移來名此嶺休菴林巒一作林澗值風山上一作山中謝客酒來一作酒至頻來一作煩來修書雲關一作靈關定菴山臺林居一作林中雲谷次吳公濟韻觀心見參倚一作秉心極清淨世自一作世有更問一作且問福州府學訓導舒鏊校晦庵先生朱文公文别集卷第六書林擇之用中以下文公之曾遜濬家藏録藁某侍旁粗安早稻既登民飢亦少瘳矣然朝廷所遣使者方來所至揭榜施米十日市井遊手及近縣之人得之深山窮谷尚有飢民却不沾及然所謂十日亦只虛文只軺車過後便不施矣其實亦無許多米給得也世衰俗薄上下相蒙無一事真實可歎可歎長沙人來得南軒兄弟湘西朋友書有吾友書四封一角來人云自經由古田今并附此令自往相尋也書中所論疑義如論浩然之氣處極好蓋餒則便是缺了此正氣而氣之本體常浩浩然也但自家身上自間隔了耳不知賢者以為如何其他不能遍論以去人立索書不能子細也書來并為詳論之文定祠記知言序遺書二序并録呈和章想書中自有更不寫去祠記渠令為看未穩處讀之數過但見叢雜難整頓煩子細僉出及注合作如何改易附遞來漕司東廳令轉致此南軒甚欲速得之語張帥改定寫來芮漕處也三序并告參詳喻及幸更呈諸同志議之既欲行逺不厭詳熟也千萬并祠記發來林擇之巳經新歲學不加進而年歲日侵甚可懼也承昏期在歲裏想慰老人之意又聞葺居奉祀并講盛禮想營治不無少勞適此涸轍不能少奉助為愧耳文王之事考之詩書誠如所疑然此馬肝之論也不若姑闕之以俟來者不必身質之也問答方得草草一閲俟徐看有疑耶報去偶此歲首多事未暇也南軒一書比亦附致尤川不知逹否聞欲來延平别石丈能與擴之垂興一來相聚數日否及諸朋友在此得一講論亦快事也擴之不及别書承書并寄元禮耕老書信巳領所欲言者不過如前更不及别狀樓名既犯朋友尊長名則亦難用况稠乃木稠非雲稠也更可得一二見報當為擇其安者林擇之某憂苦如昨至節復不逺痛割不自堪幸朋友不鄙棄責以講習匆匆度日且復支持耳擴之來此相聚極有益其專志苦學非流輩所及但於展拓處終未甚滿人意耳昨欲往臨安以資用不饒又南軒蹤迹不定且令中輟今却欲且歸而歲暮復來再三留之以其歸省之意甚堅不免聽之此間事渠必能一一言之不復縷縷但元履適過此云得其子九月末書南軒求去不獲數日甚撓此極知其必然不知渠又何以處之尚幸擴之之輟行也來書所論數條有未合處别𥿄具之但覺大槩氣象有粗踈處不知何故如此似更冝警省也某近覺向來乖繆處不可縷數方惕然思所以自新者而日用之間悔吝潛積又巳甚多朝夕惴懼不知所以為計若擇之能一來輔此不逮幸甚然講學之功比舊却覺稍有寸進以此知𥘉學得些靜中功夫亦為助不小尚恨未免泛然應接不得專一於此耳林擇之經説依後書所定甚善但止謂之經説不同諸字尤好又春秋傳序四字不須别出但序文次行不須放低則自然可見論語説下不須注孟子附字又欲移禮記作第七卷而第一行下著二先生三字其後却題明道先生改正大學伊川先生改正大學其小序則仍舊附於第六卷尾論孟説後蓋此六卷乃其本書而後一卷今所附者使不相亂乃佳也更白鄭丈看如何向借劉子駒本改字多是胡家改定者非先生本書今不必用然恐有合參考者偶此本在家中今令此人去取納上更仔細啇量為佳外書既未備不欲遽出此事正不須忙今草草做了將來有不如意又不免更易傳者人人殊異無復可信天下後世非所以為久逺計也并白鄭丈看如何示及為幸孟子解此亦見從頭看起未容寄去更俟幾日也林擇之某竟不免為此來𥘉到事多殊不堪今漸定疊矣但野性危蹤皆非冝久於此者見為此邦料理減稅事旦夕剡奏列上即繼以奉祠之請矣得否未可期但若不去必無好出埸蓋巳有氣類不同望風相疾者此要為不足恤然亦何苦將身博彈射耶云云來此間非案牘即有賔客之擾比於退食則形神俱憊只得瞑目危坐收拾魂魄以待事之復來殊不得看一字平生論著用盡心力皆巳有緒今乃墮此紛擾中不得卒其業精力又巳衰耗如此大以為懼朋友中有知識者亦皆為某危之乃知伊川先生做得易傳却是得涪州一行氣力也擇之彼中相從者有可與進於此者乎此中一旬兩到學中然殊未有慰人意處未去之間亦且試撈摸看若幸指撥得一二人亦是一方久逺利害也林擇之某所請竟未報元履傳聞有添差台學之除此不待其自請而擊逐之當路聽言待士之意可見矣所示諸説皆甚精然鄙意有未安者别紙具之擴之亦有説當自封去因來幸反復之以歸至當計此所校亦不多但却是不容小差處望速垂報也見喻太著之病此不能無但與其浮泛無根不如腳踏實地為有進步處耳祭儀藁本納呈未可示人且煩仔細考究喻及日曆中事雖不多然可以輔事實之缺此書異時要須别刋乃佳耳知與諸賢遊從日有直諒多聞之益甚善甚善數詩皆佳率易和去不成言語勿示人也伯山家事如何晞之似亦曾相見來今不記仔細也伯山質實可愛敬但亦染禪學耳向與深卿書乃附劒浦劉親不謂留滯至今欲撿藁本再録去又思擇之所以告語之者必巳甚悉而不能回則此書雖逹亦未必有效耳今且煩致意但信得孔孟程子説話及時試將許多詖淫邪遁説話權行倚閣一兩年却就自家這下實做工夫看須有些巴鼻也今只𬋩狐惑不肯放捨又引明道少時出入釋老之事以飾其説何不將它平生説話仔細思惟看他所以出入釋老處與自家只今全身陷溺處是如何而直為此倀倀也又如前書所論馮道吕舜徒事此尤害理曾與之劇論否此等處不理會則朋友之職廢矣發明義理此亦有之向來何故不曾見渠家似此文字固自有好處尚多向見汪書甚珍祕之然便只向這死水裏淹殺則更無超脫處矣不知世間見有六經語孟程子文字既有志於學因甚不向裏靣做工夫而收拾此等以為竒特枉却身心可歎可恨也靜勝軒録却未見之如文字不多幸為録寄此近於蔡季通處見庭聞藁録一篇乃楊昭逺記龜山所舉二先生語殊無精神悶人看不得不知靜勝之説又如何耳前日劉子澄寄得榮陽公家傳即吕原明也中數假來一假説吕𥘉學於伊川後與明道橫渠李公擇孫莘老遊所見日益廣大然公亦未嘗專主一説晚更從高僧宗本修顒遊觀此則吕家學問更不須理會直是可以為戒亦不可不使深卿知若不信則無如之何也拙齋有何説數詩幸早示及籍溪行狀更為促深卿早寫寄來舜臣相見未向遞中亦附書矣項掾果如何若果有志當痛與説恐頽波之中救得一箇半箇亦非細事也前書説有一賢宗室從來復相從否福州有一同年趙彥德任丈之甥氣質亦甚好但一向習詞科頃嘗略勸之聞今年又往試可惜錯了路陌也近聞張安國消息極不佳果如所傳亦可惜耳南軒久不得書不知為况復何如所論異同處亦未報不知後來看得又如何也深卿詩市㕓差可隱未暇泛滄洲此兩句便是箇因循猶豫底意思冝其不能勇猛自奮於異學之中也擇之押此韻處正中其膏肓不知渠還覺否此亦是偏處然吾儕中人之質若無這箇意思定是埋沒了出頭不得也林擇之深父遂死客中深為悲歎其弟巳為了後事過此無以助之又此數時艱窘不可言向來府中之謉自正月以來辭之矣百事節省尚無以給旦暮欲致薄禮比亦出手不得巳與其弟説擇之處有文字錢可就彼兊錢一千官省并巳有狀及香茶在其弟處煩為於其靈前焚香點茶致此微意纍年相聞而不得一見甚可恨也林宰興學之意如何可尚可尚但聞其非久受代亦須得後人信得及乃佳不然恐徒費力而為主其事亦難為進退耳擇之巳辭尤川耶彼學中今復何人料理欽之寬中諸人能左右提挈否石宰久不得信不知其子病如何文字錢除前日發來者外更有幾何在彼擇之為帶得幾過古田千萬早示一數於建寧城下轉托晉叔寄來為幸或巳去手能為收拾專雇一穩當人送來尤便此中來手以俟此物之來然後可以接續印造不然便成間斷費力也千萬早留意為妙須知昨巳修定送伯諌處未取大率事體亦只如所示但條目差分明耳欽夫屢得書有少反復議論未及録去其大槩曲折亦非靣未易布也力行固不易而講論要得是當亦復如此之難可歎可懼渠所論如云論孟序中不當言漢儒得其言而不得其意蓋漢儒雖言亦不得也不知擇之以為如何某則絶不愛此等説話前輩議論氣象寬宏而其中自有截然不容透漏處豈若是之迫切耶近又得皇王大紀諸論其間大有合啇量處不但小小可疑而巳此間朋友亦無甚進益不知擇之比來功夫如何甚欲一見而相去益逺無由會靣此情鄉往殆不自勝也向來召命屢下既懇辭之又託人宛轉近得諸公消息似巳許其辭矣此事只得如此而貧病殊迫亦只得萬事減節看如何欽夫頗以刋書為不然却云别為小小生計却無害此殊不可曉别營生計顧恐益猥下耳林擇之歸自政和住家十餘日祭祀賔客書問之擾不得少暇固無暇讀一字書今又當出崇安見新守令石宰相招極欲往觀盛禮及與朋友相聚講論而日月匆卒如此無緣去得甚以為恨不知擇之能撥忙一行否昏期既在後月度尚可一行也擴之寄來文字皆巳領前便承寄海物尤愧感也中庸因論致曲而能有誠然自明能動人以下巳是誠之成功孟子所謂至誠而不動者未之有也亦可見矣蓋生知學知雖異然及其知之成功則一而巳通書正用此意然下文擬議便是致曲之事亦若無異處也無所不用其極之説甚巧然恐其本意未必果出於此必不可通闕之可也大學正經云云亦以意言耳傳中引曾子曰知曾式門人成之也南軒語解在尤川未到所論大槩甚當鄙意正如此又言行録流布甚廣其間多合啇量處中間以書告之然不勝毛舉近得報云欲改數處亦未妥帖要之此書自不必作既作而遽刻之此尤非便昨日得伯諌書亦深議此事也近與伯恭往返議論稍多此人却向進未巳今日臨行無暇録寄俟後便也林擇之聞學中巳成次第甚善但尤川學者不無恨於遽去耳更能到彼少留以慰其意否若能因遂過此小欵旬月尤所望也某此如常所欲言者前書巳具之矣遊成之來訪其人開爽有用之才也極可喜可喜然更能加沈潛義理工夫所就當益可觀耳渠到此之日擴之亦來得數日遊談少快幽鬱之懷但聞浙中學者議論多端亦殊使人憂悶耳以此深欲早就前書之志庶幾小輔於世不為天地間一蠹物者而理義未精日力不足為之奈何林擇之辱書如講學有緒深以為慰是日偶與元履及諸朋友在爐峰新庵共增懷想也縣學須知甚精密但寫得未有倫理方欲為略整頓會少冗未暇也所論仁恕之説恐不必如此立説只當以語解為正遺書所云或是一時之説不必如此牽合輔綴也午節在近想須歸省古田既未可必即不若且來尤溪耳精義印造未辦辦即如所喻也遊成之甚欲一見之恨相去稍逺耳彪德美赴省回過此相見得一夕欵只是舊時議論且云欽夫見大本未明所以𬒳人轉却亦聞擇之所在恨不一見也林擇之某此碌碌如昨無足言但獨學不長進而逺近朋友亦未見超然有所造詣者歲月如流良可憂懼耳擇之尤川留幾何時所論何事此亦久不得書矣因便仔細報來還家巳來為况又何如日下作何功夫亦可一一報及相去既逺難得相聚相聚往往又不能盡所懷别後令人常有耿耿不滿之意後會不知復在何時又不知便得相見果能彼此廓然無許多遮障隔礙否它人固難語此而於擇之猶不能無遺恨不知擇之又自以為如何也二余在此日久占之警敏彞孫淳靜皆可喜但亦未敢與説向上去恐别生病然又似太冷淡今其告歸云過邑中須為一兩日留可更與切磋也熙之不及别書相見煩致意擴之亦然得婺州報云薛士龍物故甚可傷而不及識之尤可恨也尤溪學記及克齋記近復改定及改去歲仁説答欽夫數書本欲寫去而二公行速不暇且寄欽夫語解去看畢寄還并論其説林擇之某哀苦之悰秋來增劇顧念日月易得而音容邈然發於夢寐尤痛切不能堪也此間諸人相聚自五月以後以季通大病無甚倫理近又以事歸旬日間復來便為入城計亦無復講論之暇矣南軒竟不免去國道之難行乃如此可歎可歎𥘉意其自上饒歸可以一見今却由浙中水路還湖外又聞少留吳興避暑不知果如何渠在榻前儘説得透𥘉謂可以轉得事機要是彼衆我寡難支撑耳林擇之聞縣庠始教閭里鄉風之盛足以為慰所示文字皆甚佳深父埋銘讀之使人惻然興於朋友之義答問後便多寄使得反復為佳恐有建寧便只寄晉叔處可也承許見訪因往尤川甚善但經營創始之勞如此未能數月而林宰解官擇之辭職畫一之規又將安所付授耶須及此物色得可相繼者庶幾不虛費賢宰許多心力啇量為佳近看中庸於章句文義間窺見聖賢述作傳授之意極有條理如繩貫棊局之不可亂因出巳意去取諸家定為一書與向來大字章句相似未有别本可寄只前日略抄出節目今謾寄去亦可見其梗槩矣論語未知焉得仁後來竟如何説因來幸詳及然此須與雍也仁而不佞孟武伯問三子原憲問克伐怨欲不行夫子不為衛君殷有三仁管仲如其仁數章相貫推説方見指意耳吾斯之未能信斯字何所指而言或云自指其心然否晝寢之義孰安凡皆望思之見報林擇之師魯深父皆有書來相屬勤甚吾友相聚之久視此凡陋寧堪諸賢許與之過耶師魯寄來論解數篇極佳未暇細讀巳覺儘有合啇量處旦夕因書相與評之又看如何擇之所造想日深纍日不聞益論塵土滿襟矣林擇之得欽夫書論太極之説竟主前論殊不可曉伯恭亦得書講論頗詳然尤鶻突問答曲折謾録去一觀遣人遽不能盡録其大槩是如此欽夫云巳得擇之前書亦殊不以為然也拙齋深卿近有何議論某向答深卿書渠以為如何前日方答此書了李伯間來訪劇論兩三日舊疑釋去遂肯盡棄所學而從事於此乃知此理卒不可得而殄滅彼迷溺而不返者亦可憐矣近何叔京過此少留未去伯間季通皆來集講論甚衆恨擇之不在此耳適因舉滿腔子是惻隱之心江民表云腔子外是甚底請諸公下語巳各有説更請擇之亦下一語便中早見喻也石子重得書云來年赴官欲約擇之相聚不知能赴其約否某意甚欲相挽一來而卒不可得為恨耳擴之得安信否比年氣體如何前欲此來今極暑未可動秋冬間能同一來慰此哀苦否墳所巳略就緒儘可相聚矣陸崇安相會否渠今冬必來赴官某表兄丘子野欲求一依託書館處不知渠請人否告為託朋友宛轉問之便中見報此兄近日為况益牢落欲此甚急幸千萬留意或託拙齋深卿問之尤佳林擇之得失既往不足言正惟立身行道是乃榮親之大耳比來少得通問而纍書無所講論不知進學功夫如何深以為念也此間朋友亦無與薦者但邵武饒克明赴省前日過此耳季通伯謨皆苦貧極無憀也某不敢受俸乃以無太府曆頭於法有礙非敢以為高而時俗巳不相察况其大者可歎可歎遊山開正即行承有偕行之意甚善但恐來巳不相及然某過衢信到婺女須少留能來彼相及亦佳耳欽夫書適有便巳發去渠得疾之由説者多端似亦非一朝一夕之故所由來逺矣近數得書云安健勝前此必病起過意將護之力也今日聞有靜江之除蓋近日羣小屢有敗露上意必是開寤思向日之言故龔實之入參時事似欲小變未知竟何如耳此間文字亦未有緒通鑑功夫浩博甚悔始謀之大鋭今甚費心力然業巳為之不容中輟須來年春夏間近入山僧寺謝絶人事作一兩月期畢力了之乃可蓋心力不強其間稍似間斷便覺條例不貫故須如此耳林擇之某杜門如昨無足言者但吾人罪戾蹤迹顯不可掩只得屏迹念咎切不可多與人往來至如時官及其子弟賔客之屬尤當逺避勿與交涉乃可自安此不惟擇之當深戒之如充之亦不可不知此意也林擇之某區區粗遣無足言者但齒髮日衰德不加進日負憂愧耳潘丈處人巳歸欲俟秋冬遣人相取想所報書自言其詳矣如此却得且從容家居區處庶務亦是一事但郡中之約恐又不得不應切須審處使久逺無悔吝乃佳耳必不得巳入學亦不妨只要自處得是當此更在子細也趙帥久不得書湖事想巳畢自此宜且安靜勿興功役為佳相見亦可力勸之也渠昨許草堂之資因話為扣之然不可破官錢恐又作鄭景望也林擇之福公為賦武夷詩押舞雩字更和不得遂至今未得報謝其書兩日前方和得成亦不免只躡故迹欲作書煩附逹之恐巳歸旦夕自别宅去也造屋事得帥且止之甚善昨關自思量許多紛紛都從十二詠首篇中一我字生出此字真是百病之根若斫不倒觸處作災怪也黃啇伯以下見南康集某俯仰塵俗日負初心率意妄行無所聞過自決其不可久於此但以向議陳請一二事計論未備牽留至今此數日來奏牘始具一二日遣行即并上請祠之章矣姚泉近方歸番陽木炭之請亦未果往亦三五日間中行也老兄下車巳久學中規範計當一新所以為教使之聞之諸生莫亦有可與進於此者否此中課程不敢懈然亦未大有益為可懼耳門不逺計常通問恐於鄙繆中政或有所聞人還禹批誨至懇至􅈤愚頓見事極遲非靣命提耳反復諄悉不能諭切幸不惜痛言之也某欲借盛府祭器祭服依倣製造有牒上幕府書􅈤府公更望一言之助使必得之為幸或恐有大不可携者得令人畫圖詳識其尺度之廣狹高下淺深以見授亦幸也祭器尤荷垂念但期日巳迫未及製造亦有事力所未及者且復專人納還幸付主者然亦疑其未便盡如古制度也木炭事申泉司果見却未知所以為計幸復思其説以見教也某再上伺請皆未報日夕思歸而兩縣破壞姦民亂政不得不有所更革鉏治似聞傳者以為不恕然亦只此數日間決遣事竟亦當少息矣蓋大慝既懲小者自當退聽耳但木炭事泉司不從又以蠲租未報未敢再列上前請若遂臨行須臾上此奏以償夙心也某衰病支離求去未得日惟得罪於士民是懼然近日兩邑得同官叶力詞訴却粗衰少但賦租之弊未能有以寬之殊不自安耳學中講説不敢廢近亦頗有能問者兩邑亦令整葺教養庶幾有嚮風者敝政恐有所聞切告垂諭至􅈤至􅈤示諭極感愛念之意此亦近方聞之惕然內懼即巳行下戒約及令住催下户它負之可寬者矣又得鐫諭益信所聞之不妄更當申警之自此有所聞更望子細批誨直截譬曉今者來教似巳未委曲矣切􅈤切􅈤前兩月配一作過寨兵於隆興中間忽為彼府押回公文中備坐判府安撫龍圖待制台判押回本寨殊不可曉巳回牒復押去矣煩間為詢之想是忘記是外路外州配來誤以為所部不則别有他意也彼中幕府僉書滿𥿄此等事不能覺其繆甚可笑也此幸無他但建昌之事聞之不早見告者又皆不得其真慬若為強豪遊説使人愈疑惑近不免煩僉判自往調護始得其真乃知此郎不長厚誤事如此然縣小無官未有可遣代之者甚以為撓耳山野之人不堪吏職此亦可見旦夕遣冬書更當力請庶不久為吏民患苦也某衰病如昨緣建昌事憂撓不可言雖巳遣官檢旱且以後期申省目劾勢須略減得分數但此縣官吏無一人能為百姓分别黑白自此之後凌弱暴寡將有不勝其弊者未知所以為計令人曉夕不皇都昌亦甚費力二十年無事之身心一旦至此深以自歎他無可言也警誨諄復敢不銘佩但區區每見凌弱暴寡之徒心誠疾之故其發每有過當今當承命而改之然恐終不能盡去也某昨嘗專以建昌事自劾求去昨日人歸諸公又不將上勢當復請耳勝私書來説此間受租米事𥘉疑其過徐究之果然雖巳究治然人生精力能有幾何若事事如此索關防則無復間泰之時矣其所論弊政非一巳封呈廟堂冀必得去萬一如欲此助為不小也所懷萬端無由靣論但日來愈覺歸思浩然不可遏耳某月𥘉巳專人丐祠後得臨安相識書速令來請云諸公巳有許意至今尚未歸必是適值四明訃至未敢將上度不過旬日必可得矣建昌納苗實有照管不到處然與抑強似不相干稅務依法收稅亦非州郡所得與况士大夫下爭啇賈之利無恥至此亦何足恤近日曽編管建昌一健訟假儒傳者必又喧沸此事自信甚篤絶無可疑是非毁譽付之衆口少忍旬日則吾巳在汶上矣強盜三人配隸嶺海乃向來驚恐都昌之人昨以其情重法輕稍加毒手經由隆興恐有司以為疑幸為白錢丈一言於帥座交管傳押為望此輩吾人所共疾想二公亦不以為過也喻及帥座下喻之意巳悉此是兩路三州利害如此理會甚善向來亦欲申請而未腵安得謂之侵官本軍今方欲援例有請也然謙德之盛不敢不承幸語及之此間白鹿洞巳畢功前日往釋菜開講矣延合肥吳君為職事但渠為書社所拘恐未必能往却有楊學録者與一二後生欲往也某請祠先遣人昨夕巳歸後輩尚未到周子充曾厚伯極為致力而竟不效且更看後信如何恐亦且悠悠也初來不為久計近復動却歸心在此殊不便今既如此便再請得之亦是一兩月事不免又且整頓此破落家計以俟譴逐耳昨緣收江溥親戚船稅幾為所論當時得此一章亦是草草出場也此間楊僉忽丁憂郡中事愈費力萬一不得去狼狽不可言也奈何木炭却巳得減免矣白鹿洞成未有藏書欲干兩漕求江西諸郡文字巳有劄子懇之及前此亦嘗求之陸倉矣度諸公必見許然見巳有數册恐致重復若以呈二丈托并報陸倉三司合力為之巳有者不别致則亦易為力也書辦乞以公牒發來當與收附或刻之金石以示久逺計二公必樂為之也旦夕遣人至金陵亦當遍干本路諸使者也某請祠不得比復狂妄輒有所陳計程三五日間當以罪去巳盡遣書册冗長還家此數日來翹足俟命但未知何所向耳此間諸縣狼狽稅務絶無南來舟揖勢亦不可復為矣比復苦旱近始得雨然亦未能沾足也日間雖無事然意思不佳絶不得近書册懶困即思睡耳白鹿洞記納去一本又一本寄梁文叔煩遣致之不及作書也五賢祠記楊廣文自納去矣某無狀居此一年有餘率意直前不能違道干譽得罪於士民多矣請祠雖巳報聞然旦夕自當以他罪行遣不至久為仁里之害也示喻曲折深荷愛念然必欲使某餧啖虎狼保養蛇蝪使姦猾肆行無所畏憚而得歌頌之聲洋溢逺近則亦平生素心所不為也姓高人事文叔在此備見首尾此而可恕則亦無以官吏為矣至如木炭錢事亦是州郡所當為而幸上司之見聽方恨不能推類盡蠲苛擾𥘉不以是而求歌頌於斯人也此錢都昌所減獨多乃是毛掾考究之力此人固有過當處然細詢田野之言而考之案牘以求其實則前日銷骨之毀亦云甚矣此舉枉錯直之間所以難明非有道以照之則自謂公心者未必非私意之尤也區區不喜自辨又於老兄不可有隱情故久不知所以為報今偶有便信筆及之非欲較此是非乃欲老兄深察於名私名實之間則真得其所謂本心之正耳此邦圖經不齊整而都昌為甚數日來欲略為條整而不得功夫又無人能為物色圖畫諸邑供來皆不可曉甚覺費力也楊僉之去甚失助新來兩掾似亦可使也少凂西山有徐騎省篆書遊帷觀大字及許真人并銘煩為致一二本便中示及五賢祠記納去一本更有一兩刻續致也都昌恐有合入圖經事望垂諭它委勿外某鄉辱誨諭奉報踈率既而思之殆無以答愛我之垕深以愧仄自此有聞不以虛實尚望不替前日之念乃幸之甚旱甚不雨禱祀未有以感格日夕憂懼隆興不至此否家貧願鄰富若亦似此間則更無可仰矣奈何奈何此間為旱災所撓都昌縣官稍解事又請得盛族黃省幹同措置必可無慮但建昌官貟皆不足倚仗又遍詢彼邑寄居士人無有能分此憂者意欲􅈤南卿為同邑官區處庶幾下情稍通吏不敢肆其姦罔不知渠肯俯聽否渠雖德安人而建昌亦有産業知彼民情故欲倚以為重耳敢煩語次試為叩之若許幸早見報當專致書禮請也歸見張帥更勸其通放米船濟此艱厄千萬千萬某比日懍凛丐祠得知舊報云恐可得果爾甚幸然救荒之備什巳七八成矣旱苗約須放及八分勸諭發廪得盛族倡率三縣共得榖十萬斛矣但前書所扣王南卿事不知曽為偵之否幸早報及也得子澄書云廬陵發䇿持論甚正甚慰甚慰小録求一本便中早寄幸甚此間中選者數人甚厭物論白鹿諸生文字老成其次曹生秀發可喜但尚欠琢磨小榜之首彭君尤佳惜不與薦書也巳約兩榜之士來白鹿相聚未知皆能來否爾此間事未去間不敢一日少弛恐得鄉間有所聞望一一見諭也某力疾救荒未見涯涘而傳聞遽云云聞之甚懼未知將何以副其實也南卿巳到此相處甚欵但渠欲入浙不敢邀留之度其歸程正是急時當賴其出一隻手又恐其到闕或為諸公所留耳告糴荷帥漕留念然縣下或更作難此乃軍糧所須若賑糶則巳有備矣軍糧尤不可闕者更得從容一言得二公喻意屬縣無為阻節幸甚張帥寄鹽鐵論來末卷前少却一板告為印寄更煩於太宗實録中檢白鹿洞一事在太平興國五年會要作六年更詳之六月以洞主明起為褒信主簿其下有少本未並告録示此巳有之但不知是實録語否耳恐此人等候回文告只付前日送崔子虛人回尤便千萬千萬更問看何人來速即付之也賑糶減半價乃得推賞乃朝廷之命方欲論其不可乞只減二分五釐而建昌乃有願賑濟者巳令邑官敦勸盛族若以穀二萬碩省賑濟可得兩名霑賞也因書更告及之亦美事也稅錢事荷留念都昌納米分數方兩日有定論巳減八分以上亦巳申奏乞截留上供若得之即只納占米無不可者只恐未必如人意耳石守以憂不來殊失所望亦巳遣人速後政吳守矣儻得如期解去幸甚比益昏倦不堪支吾矣某在此不久又子重不來後日之計未有所付須及此自了也其子弟能來亦佳但濡沫不能多須預令知此意耳得都昌諸人書巳復苦旱奈何奈何今年公私之積蕩然一空萬一復旱便無著手處矣某無似復叨除目恐愧不自勝尚幸逺次得以從容進退還家數月當申祠吏之請也前月之晦巳書二考代者度此月中旬可到今日復遣人速之矣老兄許來固願少欵但恐文法有拘亦非細事更冀審度之也示喻趙宗丞田極感留意巳撰得四百千省半是糶米剩錢半是某所得諸處饋送前日錢丈所惠亦在其中今即移文庫中令項樁管以俟其報告為發書扣之路運幹不是彥豐否若是即某巳識之并煩為致意早得一報為幸雖某去此後人亦當能成此勝緣也來書巳付案中為事祖矣辛帥之客舟販牛皮過此挂新江西安撫占牌以帟幕蒙蔽船窗甚密而守卒僅三數輩𥘉不肯令搜撿既得此物遂持帥引來云發赴淮東總所見其不成行徑巳令拘沒入官昨得辛書却云軍中收買勢不為巳甚當給還之然亦殊不便也因筆及之恐傳聞又有過當耳前書奉叩白鹿買田事如何幸早示報及某未去間有定論為佳此錢巳送庫寄收以俟矣千萬留念某代者巳到二十七日定交郡事即略轉山北迤邐東歸矣脫此樊籠欣快無量但念相見未有近期不能無愴恨耳白鹿田錢巳撥正牒教授候彼回文即可支付也禮器之失不但一爵今朝廷所用宣和禮制局樣雖未必皆合古然庶幾近之不知當時禮部印本何故只用舊制向來南康亦無力但以爵形太醜而句容有新鑄者故易之耳其實皆當遣人問於禮寺而盡易之乃為盡善但恐其費不資州郡之力不能辦耳福州余丞相家有當時所賜甚精然今亦莫能用也黃南康之政如何渠向在昭武甚佳為人所擠而罷今能不改其舊則三邑之幸也永卿主薄老兄尚留齋館否昨承惠書此便又遽未能别狀但所問先天圖曲折甚善細詳圖意若自乾一橫排至坤八此則全是自然故説卦云易逆數也皆自巳生以得未生之卦也若如圓圖則須如此方見隂陽消長次第震一陽離兊二陽乾三陽巽一隂坎艮二隂坤三隂雖似梢涉安排然亦莫非自然之理自冬至至夏至為順皆自未生而反得巳生之卦蓋與前逆數者相反自夏至至冬至為逆蓋與前逆數者同其曰左右與今天文家説左右不同蓋從中而分自北至東為左自南而西為右其𥘉若有左右之勢耳鄙見如此更冀詳之啓蒙改本未成後便寄去近望得伏羲象欲奉之武夷精舍恨賢者不能一來觀之耳此𥿄煩啇伯兄呈似更同為訂之也新泉之勝聞之爽然自失安得復理杖屨扶此病軀一至其下仰觀俯濯如昔年時或有善畫者得為使畫以來幸甚向見楊伯起有切韻書只三四十板而聲形略備亦嘗傳得而為人借失之今欲得一本敢煩為借抄録一本校令審諦便中見寄幸甚或語趙守刻得一板流行亦佳此非偽學想亦不至生事也五老新瀑曾往觀否夢寐不忘也某竟以無狀自致人言上纍師傅下及朋友愧負憂惕如何可言傳聞賢者亦有里巷侵侮之虞不知云何今日惟可凡事省縮豈復更與此輩爭是非較曲直也彼中諸書板本聞幾有焚滅之禍又云下官有持不可者遂巳不知果然否耶然計此恐終不免向來得本甚多皆為人取去今欲復得一兩本不知能及未為煨燼之間印以見寄否洪韻當巳抄畢幸早示乃此間付之書坊鏤板甚不費力况非偽學亦無嫌也新泉圖子和成既為定藁必巳能盡寫其佳處只就覔此草夲不必重摹俗工或能反敗人意也自聞此泉新出恨未能一遊其下以快心目濺雷噴雪發夢寐也瀑圖韻譜近方得之圖張屋壁坐起對之恨不身到其下也定叟終於落星何不就館城中耶鄭溥之黃伯耆相繼物故皆盛年也亦是一時氣數然張鄭尤可惜耳楊伯起新年幾歲精神筋力想未至衰憊如某也白鹿舊遊恍然夢寐但聞五老峯下新泉三疊頗為竒勝計此生無由得至其下嘗託黃啇伯陳和成摹畫以來摩莎素墨徒以慨歎也江德之甚好説易嘗與講論否且看程先生傳亦佳某謬説不足觀然欲觀之須破開肚腸洗却五辛查滓乃能信得及耳又印夲多錯誤恐難會了無由靣談聊發一笑將來官滿復歸廬阜耶劉壻得依餘芘幸甚時有以警誨之乃佳外孫聞尚附學想蒙憐撫某衰朽益甚巳上告老之章它蓋無足言者劉壻幸得托芘今將滿矣不知巳離彼未耶李敬子得襄陽教官見在此相聚或傳其闕巳到未知然否幸因便報及也讀易想亦有味此經自有規模格局若看得破則精粗巨細無處不可受用如其未然即且將其間旨意分明處反覆玩味亦自可樂不必深求幽逺枉費心力也某之謬説夲未成書往時為人竊出印賣更加錯誤殊不可讀不謂流傳巳到几間更自不足觀也劉壻相見未豁然亦差覺老成此皆教誨之力也某年來衰憊殊甚兩足拘攣不能移步猶是小故而心腹之疾猶為可慮服藥無效拱手俟命而巳葉永卿吳害卿周得之李深子某還家方幸休息得以輯理舊書忽𬒳恩除不勝憂懼𥘉欲力辭又聞彼道荐飢巳有流移户口恐辭或不免而失可為之時遂不免申奏對之請更旬日間必有進止之命若得罷遣且守東岡之陂即大幸也除職𥘉不敢辭但以賑濟四家未𬒳賞因此為伸理耳聞彼又苦飢想不至如去年之甚然在今日處置當倍費力也深甫所喻減稅事不知後來如何某若得對當且乞減徐守所增中上等稅錢此數不多當必可得其它恐亦難料理也白鹿田巳就緒甚善又聞今侯能枉駕臨之尤幸伯起廷彥為况如何聞永卿諸公亦嘗入山觀書遐想山林之勝它處真未易得令人悵然興懷也但聞或者乃欲畫某形象置之其間令人駭然不知誰實為此向欲作李賔客李九經及三先生祠於其間以未有大成殿遂不敢議今乃遽然如此於義殊不安而諸人所以相期者乃復如是之淺尤非區區之所望也幸以此示諸人亟為毁撤為佳不然須别作區處也舜弼所云白鹿之説當時亦謾及之豈有輒敢號令州郡之理渠自張皇亦不曉事之過也白鹿買田聞巳就緒吳丈又許買牛此尤永逺之利也諸事更賴衆賢左右維持之其必有濟矣朱守書來示及新編圖經乃知其郡政從容綽有餘力如此大凡區區向所欲為而不暇者今皆備矣又承喻及禁止白鹿葬地一節尤快人意但不知曾追毁其買契否不爾恐尚有後患也白鹿知亦嘗一到甚善甚善每念疇昔相與登臨遊從之樂未嘗不發於夢寐然亦恨當時所以相切磋者猶有所未盡也張廣文别後遽至此深可悲悼某或得至浙東亦遣人視其家也永卿所喻可欲之説恐不然但以詩所謂天生蒸民有物有則民之秉彞好是懿德者觀之則知欲惡之正固有不易之定理矣彼以所當惡者為所當欲豈其性情之本然者哉孟子集注近方修得一過未及再看更俟少定寫得别本即附去然大凡讀書且徐讀正文虛心涵泳切巳省察亦當自見大體意味其間曲折却續求之未晚也唐卿比來為况如何書來不及菖蒲平安之報何耶去歲災蹇異常病既日侵秋間又哭一女悲傷無聊屢至危殆忽蒙除用􅈤祠未獲近乃見次又巳有奏事之命不免遣人復申前請行一月矣至今未還不知事竟如何或不得巳即須到彼靣懇力辭庶幾可脫江西決是不成行也向承録示樂方極感留念今腳氣巳漸輕祕結却變成滑泄矣大率氣血漸衰自是如此也啓蒙近復修改一兩處未畢俟印得即奉寄易之象數初甚簡易今人不得其説遂至支離使人不曉反遂詆以為淫巫瞽史之學其亦誤矣馮儀之細讀來示備詳别後進學不倦之意世間萬事須臾變滅不足置胸中惟有致知力行修身俟死為究竟法耳余正父博學強志亦不易得禮書中間啇量多未合處近方見其成編比舊無甚改易所論獨志無助者誠然然渠亦豈容他人之助也此間所集諸家雜説未能如彼之冨然儀禮正經假落注疏却差明白但功力頗多而衰病耗昏朋友星散不能得了耳啇伯時時得書講論精密誠可嘉尚李敬子堅苦有志尤不易得近與諸人皆巳歸只有建昌二吕在此早晚講論粗有條理足慰岑寂也晦庵先生朱文公文别集卷第六候官縣儒學訓導劉簮校晦庵先生朱文公續集卷第六與趙昌甫罪戾之餘物色未巳不知何以見惡如此之深甚可笑也近讀經書不得却看些古文章識得古人用意處然亦覺轉喉觸諱不敢下筆注解但時發一笑耳來書所喻似皆未切事情巳細與長孺言之後有的便渠必一一奉報要之今日只可謹之又謹畏之又畏不可以目下少寬便自舒肆况所謂少寬者又巳激而更甚乎黃乃以力贊建中而去前巳去者將有復來之漸其繼之者與儲以待次者又不令人入若非上心慨然開悟發明善類未有少安之望也千萬與諸伯仲深察此意敬恭朝夕安以俟之區區不勝真切之望也昨日得王謙仲書亦如履常所料蓋逺方未見近報耳向讀學易集見其當紹聖元符之際愁居懾處之狀令人傷歎不意今日乃見此境界宛在目前試取一觀亦足以為法也少時見吕紫微與人書説交遊中時復抽了一兩人令人驚懼當時不理會得今乃親見此境界也斯逺聞其喪偶不知果然否經年不得渠書想亦畏偽學汚染也李白詩多説此事惜不能盡曉粗窺端緒亦不暇入靜行持但玩其言猶是漢末文字可愛其言存神內照者亦隨時隨處可下功夫未必無益於養病也巳草挂冠之牘開歲即上計較平生巳為優幸獨恨為學不力有愧𥘉心著書未成不無遺憾耳因便寓此少致問訊之意政逺千萬戒詩止酒以時自愛眷集均慶答江隱君每承諄切之誨若將挈而置諸聖賢之域顧愚昧未知所以仰稱期待教督之意而又未得親奉指畫於前其為向仰不勝此心之拳拳别𥿄所喻汪洋博大不可涯涘仰見所造之深所養之備縱橫貫穿上下馳騁無所窮竭底滯雖若某之蒙昧誠不足以語此亦巳昭然若發蒙矣幸甚幸甚然竊以平生所聞於師友者驗之其大致規模不能有異獨於其間語夫進修節序之緩急先後則或未同蓋某之所聞以為天下之物無一物不具天理所謂寂然不動感而遂通者舉目無不在焉是以聖門之學下學之序始於格物以致其知不離乎日用事物之間别其是非究其可否由是精義入神以致其用其間曲折纎悉容有次序而一理貫通無分假無時節無方所以為精也而不離乎粗以為末也而不離乎本必也優遊潛玩饜飫而自得之然後為至固不可自畫而緩亦不可以欲速而急譬如草木自萌芽生長以至於支葉生實不至其日至之時而揠焉以助之長豈不無益而反害之哉凡此與來教所謂傷時痛俗急於自反且欲會通其旨要以為駐足之地者其本末指意似若不同故前後反復之言率多違異而語其所詣之極則又不敢以為不同也姑論其大槩異同之端以為求教之目其他曲折不敢執普言語以取再三之瀆要之非得靣承不能究此心之所欲言也普疑當作著伏辱墜教所以訓督孜孜不倦有加於昔顧惟庸昧重勞提耳既感且愧不知所以為謝也始者獻疑亦非敢以所示大旨為不然但疑精義入神一句文義或不如此恐如所論則日用方外之一節似少功用耳及蒙垂喻再三每加精密讀之恍然自失於直截根源處更無纎芥可疑只是精義入神一句依前未免扭揑愚謂大體巳是正當即不須強以此句説合費多少心力言語於道體無所發明於文理反有所纍某竊終疑之願平心以觀聖人立言之意當信某非敢妄言而此句工夫自有所謂不但如來喻所指而巳拙於文詞又迫私冗來使不能久駐然此非難知以吾丈髙明尤不難見若無義以方外一節即儒者與異端又何異乎此似未易以內外隔截看也前書别𥿄變化機要二者之分亦非愚妄所曉竊意聖賢之言則一而見之淺深在學者所證本非有預如此分别也昔有人見龜山先生請教先生令讀論語其人復問論語中要切是何語先生云皆要切且熟讀可也此語甚有味乍看似平淡沒可説只平淡中有味所以其味無窮今人説得來驚天動地非無捷徑可喜只是味短與此殊不倫矣且看論語中一句一字孰有非要切之言者若學者體會履踐得皆是性分內緊切慤實事便從此反本還源心與理一去豈有剩法哉若如吾丈所謂變化者則聖賢之門無有是也其莊老笁學之緒餘乎反復以思未見其可大抵聖門立言制行自有規矩非意所造乃義理之本然也故日用之間內主於敬而行於義義不擇則不精不精則雖其大體不離於道而言行或流於詭妄則亦與道離而不自知矣故曰和順於道德而理於義而孟子飬浩然之氣亦必曰是集義所生者不識此為對仁之義乎為精微之義若來喻所云乎且對仁之義亦何以知其不精微也但大傳中精字之義不如此耳一去之去字疑前幅所陳謬妄不中理之言必多蓋未敢以為是而求正於左右切望指教區區之病正坐執滯於文字言語之間未能脫然有貫通處其於道體固患夫若存若亡而末有約卓之見耳但精義二字聞諸長者所謂義者冝而巳矣物之有宜有不宜事之有可有不可所謂義也精義者精諸此而巳矣所謂精云者猶曰察之云爾精之之至而入於神則於事物所宜毫釐委曲之間無所不悉有不可容言之妙矣此所以致用而用無不利也來教之云似於名言之間小有可疑雖非大指所係然亦學者發端下手處恐不可略故復陳之與鄭景實栗示喻曲折亦是時態之常頃聞仙遊故相葉公之為縣月計所須令民以漸輸送故縣帑無餘積而月解無餘欠人甚便之竊計郡計既寬正當法此稍寬縣道之輸亦公私之利也但恐縣道難託别生它患此在髙明必又有以制之耳儲宰既去為怨家所誣亦寓公者為之先後臺評所指遷學一事乃與賤迹相連士子有初不預謀者亦𬒳流竄其事甚可笑或傳不止流竄於爾又可痛也蓋舊學基不佳衆欲遷之久矣儲宰一日自與邑中士子定議而某亦預焉其人則𥘉不及知而其地亦不堪以葬也它時經由當自知之其可浩歎又不止如今所諭也與饒廷老此間虞士朋與王阮同赴東府飰會乃其鄰郡鄉人必不使人攻之也姑少徐之當見底裏歸宿也遊誠之或云參選不得巳歸臨海不知然否能碎千金之璧而眷眷於破釜何耶伯啓聞巳西去昨日得浙中書云子約之逝親戚有為旁郡守者遂不復相聞末俗益偷乃至如此亦可歎也所喻極當𥘉亦疑之後聞所得只是庶官恩例故不自慊今既不安不如且巳止於未形尤為深慮保狀巳納還仲本印𥿄今并附其人持歸幸檢入元不曽發封但别用𥿄護之也三衢巳差替人正則恐亦不成赴上矣丁生頃年代君舉於桂陽自刻其詩集而屬君舉序之是時蓋求入社而不可得今日乃為此言固小人之常態也示及報狀只坡疏未見此其關捩雖未易窺然其手勢規模亦不難見蓋巳排黃子由之説而退之不久必别有勝負也元善巳如霅川其子假日至此見養子之説愕然曰大人到彼又頭撞矣此語亦有味因見仲本可間及之世間所傳坡文亦未必皆出其手可更詳之也某病起方得旬日無事比又苦傷風證候雖淺然服藥發散出汗多倦乏不可言屋下濕潤坐不得閣上又熱無著身處頗以為苦耳誠之進退不決何乃至此渠年幾與老拙只爭十來歲前塗事亦可知若時運來時又自非人力所及也換闕竟如何人生凡百信緣禍福之來豈計較所能免見説賢者慮患過深幾至成疾何必爾耶伯起想巳赴班引矣中間道學二字摽榜不親切又不曽經官審驗多容偽濫近蒙易以偽號又責保任虛實於是真贋始判矣與張孟逺老益衰百病交作處世能復幾時而季通子約凶問沓來令人感愴不能為懷天之蒼蒼其果有所愛憎耶抑都無之而直聽其自爾耶曆説恨未得請餘誨康節之學固非止於為曆然亦不專為知來如後世讖緯之言也幸深考之復以見教幸甚歸來之後叨冒重疊巳深愧仄不意又蒙收召之恩顧念本末不應復有仕進之計而懇辭未獲比不得巳輒緣面奏封事之請妄陳瞽言政使至前所論不過如此計此愚誠當蒙矜允得遂退藏也然語默之間政爾難得中節此舉却是以語為默差之毫釐則是反速其禍未知竟何似耳子充當巳改秩亦久不得渠消息也季路之除甚慰物論供職當巳久矣衰病益侵自去冬來腳弱拘攣心腹痞痛日甚一日服藥略無效驗懸車年及巳言於郡丐上告老之章而有司疑之交舊亦多以為不可未知竟如何然此意巳決不復能顧利害得失也友人遊子蒙趨試南宫行期偶緩過衢欲買舟而無知識可託欲丐指麾幹事人相導之此公定夫先生從孫論議文學皆有餘在此為可與晤語者計當自識之也記得杲老𥘉謫衡陽有以詩送之者曰逢人深閉口無事學梳頭此語有味可發一笑然亦不得只作笑會也答劉德修似聞祠官秩滿不知亦為再請之計否耶東方之事想日聞之某竟不免吏議然巳晚矣正使苟安亦何足為輕重顧未知世道終何如耳餘干時有人往來履常兄弟且如此昨得其書具道所教戒令人感歎但觀時勢恐未有輔徒促禍耳機仲元善各巳為致盛意皆屬道謝子宜在宜春時得書其母年髙不肯來就養甚可念子直罷廬陵後去之章貢外邑寓居亦不甚安子夀間亦得書平父聞亦歸江陵却不得近書也季章必巳到閬中文叔寓居不知為况定何如亦巳託君亮附書問訊矣東溪志銘髙古峻潔法度深嚴而渾然不見刻雕之迹三復歎仰以得見為幸老先生學行之懿遂託此文以不朽矣春間當巳就窆恨不得陪素車之會也傳之計亦巳襄事其子弟幾人當能世其學也天雄鐡杖石刻之况荷意甚厚第顧衰懦有不能堪重以為愧耳今年腳氣幸未大作但耳聵目昏日以益甚舊書不復可讀而頃年整頓儀禮一書私居乏人抄寫學徒又多在逺不能脫藁深慮一旦無以下見古人又恨地逺不得就明者而正之也方念久不聞動靜忽閲邸報有房陵之行為之悵然寢食俱廢纍日不能自釋不審彼以何日就道自簡至房道里幾何取道何州閲幾日而後至風土氣候不至甚異否居處飲食能便安否官吏士民頗知相尊敬否吾道之窮一至於此然亦久知會有此事但不謂便在目前耳偶有鄂便託劉公度轉致此間如有的便亦望得一字之報使知動靜少慰逺懷千萬之幸馮李亦復不容季章得郡而名見乃弟疏中恐亦非久安者李良仲鴻飛冥冥使人深羡第恨不得扣其玄中之趣范文叔却幸未見物色想亦深自晦也某足弱氣痛巳半年矣杖䇿人扶僅能略移跬步而腹脅脹滿不能俯案觀書作字一切皆廢獨於長者未敢依例口占耳數日又加右臂作痛寫字不成衰憊至此無復久存之理承教無期尚兾以時深為世道自愛耳某隨例納祿幸巳得請中間蓋亦少有紛紛後雖粗定然猶不免為從之之纍亦可歎也盡室遊山大是一假竒事衰病窮蹙不復能出門戶矣引領髙風徒切歎仰李良仲恨未參識聞其養生頗有竒效恨不得一扣玄旨參同契絶無善本近校得一通令人刋行方就尚有紪謬處今納一册或因書煩為扣之渠必於此深有得恐其有錯誤得筆示幸甚也屈平以往者不及來者未聞而有長生度世之願亦是不堪時人之妄作而欲見其末稍作如何出場耳每讀至此未嘗不發一大笑也與方耕道問禮之意甚善顧淺陋何足以議此舊所遵守者溫公書儀程氏新禮耳兩書想皆見之擇其善者可也嘉禮有日本合遣人致區區適此期慘不得如願想能亮之承許改月來訪幸甚幸甚所喻南軒病證極令人憂念旦夕專人候之當并拜狀也幕客正要蚤晚從容密罄忠益來喻乃欲公廳搢笏納劄誦言殊不成舉措聞之駭歎如是乃是專欲引善歸巳明曲在人非主人所以千里相招之意也又况如此則必大激同官之怒亦使主人難處區區愚慮深為老兄憂之方念正論衰息吾黨甚孤正當凡百詳審委曲調護使人無可指議乃為盡善若以小故先自乖離外激衆怒內致羣議殊非䇿之得也况向來所辟兩人遊巳望風引却今老兄若更做去就豈不大損主人聲望至來喻所謂官吏縱弛此亦當以漸整頓豈容一旦遽行啇君之令乎居上以寬恐南軒自有規模若一向紏之以猛恐非吾輩平日所講之意更請裁之勿為過舉幸甚幸甚回劉知縣諱君房嘗念兒時侍立先君之側見其每得杼山侍郎公書未嘗不把玩歎息而善藏之是時雖幼無所識知然窺其詞意筆迹之妙亦意其超然非當世之士也其後僅三四年先君即棄諸孤蓋巳不及見更化之日矣是以一時去國諸賢次第收用侍郎公亦再登近班而某跧伏窮山不得一拜牀下以修子弟之恭至今以為恨也不意垂老得其賢孫而與之遊幸亦甚矣三復來誨俯仰今昔甲子殆將一周又自歎其老而無聞也與蔡權郡南康丐祠之請前月半間巳專人入郡度諸公見憐必巳俯從所欲矣昨慮便郡虛有勞費亦已預戒邸吏關白想徹台聽也近聞巳除石寺簿為代與之亦有雅故其人豈弟逹於從政真足以惠一方矣便郡恐當作使郡答盧提翰承問及為學之意足見志尚之逺甚慰甚慰蓋嘗聞之人之一身應事接物無非義理之所在人雖不能盡知然其大端宜亦無不聞者要在力行其所已知而勉求其所未至則自近及逺由粗至精循循有序而日有可見之效矣幸試思而勉之幸甚幸甚此有樂靜李公文集謾納一本其後序所云深可以為干名求進之戒幸試觀之區區奉寄意不在於文字也令兄寺簿詞翰兩絶把玩不能去手然豈敢輒以無能之詞妄取僣越之譏回書幸為遣行李集并往亦足以見區區也答儲行之所喻縷縷殊可駭歎此其意不在左右計必又須醖釀播揚成一大事亦不可知然區區之心有可以質於神明者以救民而獲罪亦所不敢辭也批書遲緩亦且得寬心忍耐為佳聞建安亦未得去崇安却巳得好消息矣縣中近日大槩幸巳無它但西路之窘日迫官司要巳再輪上戶至八月初然無人監督以明者行之尚且不免為虛文况今日耶適得蔡倉書尚有挽留之意若能領其悃欵幡然一來千萬幸甚昨日劉居之相訪具言麻沙事體云一種貧民至有餓而死者聞之惻然今日文卿相過亦説諸處輪糶巳足上戶便謂事畢雖有米者亦不復糶最是崇化一鄉可慮梁文叔亦言長平一帶小民般運崇安早榖日不下百人或恐彼中土人爭占攔截亦能生事此皆可深慮者竊意左右聞此亦不必待其劒戟如林流血成川然後為復來計矣且是目今便覺上下人情不通有話便難出口適因蔡倉見問巳告之云不若便關諸司再煩左右一來權領一職帶取印杖從間道直趨崇化麻沙往來監糶并措置救荒事目付之簿尉以俟事之略定而歸似亦無不可者不知雅意如何文卿亦説縣中士民盛傳舊尹復來其意似亦可憐不應便恝然棄之也適又與文卿説自今以往境內有一夫不得其死一夫身𬒳刀創則左右皆不得辭其責切幸察此苦言少回必去之志勿信庸人徇巳忘物之説以誤逺圖恐異日思之不能無追悔也向來此間行事得失當亦有可自警省者或謂却是欠些偽學其言雖可笑然恐有理不審於意云何也間中讀書奉親足以自樂外物之來聖賢所不能必况吾人手但新學一旦措手而委之庸髠數日前巳互遷象設令人憤歎不能巳而一縣下人若貴若賤若賢若愚無有以為意者惟曽堅伯相見新帥來以為士子當相率訴之范仲宣深以為然而漠然無有應者此亦見人之識見分量之不同也季通之行浩然無幾微不適意丘子服獨為之涕泣流漣而不能巳處事變恤窮交亦兩得其理也張鄭黃鄧相繼物故吕子約前月亦不起疾殊可傷悼亦是氣運使然豈可專咎章子厚耶元善到霅後一再得書殊恨失計初亦有所迫而然失之不能斷決耳季通在湖南耳根却靜然諸遷客聞髙安之報想亦不免打草蛇驚也人生由命非由他此言雖淺誠有味也偶有自江西來者得東坡與何人手簡墨刻適與意會今往一通可銘坐右也東坡帖附見示及數書皆有逺别惘然之意雖兄之愛我厚然僕本以鐡心石腸望公何乃爾耶吾儕雖老且窮而道理貫心肝忠義填骨髓直須談笑於死生之際若見僕困窮便相為邑邑則與不學道者不大相逺矣凡造道深至中必不爾出於相好之篤而巳然朋友之義專務規諌故輒以狂言廣兄意耳兄雖壈坎於時遇事有可尊主澤民者便忘軀為之禍福得喪付與造物非兄僕豈發此看訖便可火之不知者以為詬病也某皇恐則不字疑後道道字恐誤後愛愛字疑一互字上下必有誤吾人不合偶得一官遂以官為業一日投間便有食不足之歎彼此皆然然在此則身自當之無所怨悔亦知賢者以親飬之故不能不介念也來春之行不知都下報者云何若非以鈎黨之故則不雖重坐但經赦宥便是無事人只是一墮此城却恐未有出期雖然只是參選然亦須臺參出人而前恐又重遭指目須更審而後道告詞傳聞數聮不曽見全篇尋常此等只拂略説過今乃鋪敘如行遣禁從帥臣之體不知果是誰筆因便幸略批喻也某却至今不曽受告亦不見報行詞命喫俸半年未曽立案殊不可曉也避地蓋出於不得巳其他却無説但後愛兩司對移之命既行彼乃深怨以為自此發之不知二公經年不通問也時論率兩三月須有一畨引作近報集議赦條不知意果如何恐亦只為諸巳行遣人恐死灰之復然耳張帥到未此公遽去朝廷不省所謂議者蓋深惜之彼當巳得其説矣來使方今還自府中適此兩日所苦大作力疾草此不能究所欲言然前書計亦非晚當至矣獨樂園圖恐司馬守便之官未暇刻得與之議為辨一互刻之亦佳但其詩頗有誤字見山臺詩中陶通明乃陶隱居之别號今作淵明當改正耳前賢遺迹正爾何關人事而使人想象愛慕不能忘雖不得復至其處而猶欲見之圖畫之間使其流傳之廣且逺而未至於泯滅然則為士君子者其可不力於為善哉所喻批滿今始得之萬事遲速自有時節固非人力所能為也代人上書者不知得之何人此人固非佳士然恐亦未應遽至於此當更察之若其果然則誠為狗彘不食其餘矣彼挾怨妄言者固自不足責也前日亦料從人不欲復過此亟折簡呼文卿令其往見固欲寄聲昨日得報乃云冬收方冗未能自拔今承喻及有問道過門之意似亦未便幸更審之大抵欲面言者無它但欲每事詳審持重耳觀人之失亦坐自處未能深靜之故若處晦觀明處靜觀動則無不察矣前日廖子晦歸説新闕巳為人所受想巳聞之理勢自應爾也詞命巳行乃東山之筆有鹽課入巳之語渠自對人誦之不知巳𬒳受否聞某亦有之渠却云是同官作其勢不應如此但至今不下亦不見人傳誦必是醜詆以媚用事者而深藏以蓋其迹甚可笑也帥幕無事可以讀書而西山南浦號為天下勝處公餘徙倚亦有足樂然亦更須擇交勿忘前事之師乃所望耳小坡一著髙似一著此甚不易必是裏靣説得轉了方下得此手腳然此亦至危之機更須深自防衛一種細故得放過且放過勿令人疑事事皆出於巳乃為佳耳鄒公亦有安靜之説次第善類須少安也王巽伯未能去否向語渠尋獨樂園圖摹刻流布不知曽為之否不及作書因見幸為扣之也景初素守於此可驗世路升沉何足深計但得此心無愧所得多矣衛公近得書寄梅巖圖來初欲令作記俄聞溪城之報且罷休矣甚愧不得一逰其間并以文字結緣也至之且得如此亦是一事大抵吾黨例多困窮只得存活得過但是十分亨泰矣後之晚娶深入瘴地似不善便此邦之侯一再通問亦依樣畫胡盧答之不為難也晦庵先生朱文公續集卷第六閩縣學訓導何器校
