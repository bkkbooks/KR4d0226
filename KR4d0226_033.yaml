body:
  text: 書汪張呂劉問答答吕伯恭三山之别闊焉累年跧伏窮山不復得通左右之問而親友自北來者無人不能道盛徳足以慰瞻仰也比日冬寒伏惟侍奉吉慶尊候萬福熹不自知其學之未能自信冐昧此來宜爲有識者鄙棄而老兄不忘一日之雅念之過厚昨日韓丈出示家信見及枉誨甚勤不知所以得此顧無以堪之三復愧汗無所容措區區巳審察一兩日當得對恐未能無負所以見期之意而心欲一見靣論肺腑不知如何可得自度恐非能乆於此者故專裁此以謝盛意并致下懐餘惟進德自愛爲禱答吕伯恭前日因還人上狀不審逹否暑氣浸劇伏惟道養有相尊候萬福易傳六冊今作書託劉衢州逹左右此書今數處有本但皆不甚精此本讎正稍精矣須更得一言喻書肆令子細依此謄冩勘覆數四爲佳曲折數條别𥿄具之或老兄能自爲一讀尤善也前書所禀語録渠若欲之令來取尤幸近世道學衰息售僞假眞之說肆行而莫之禁比見婺中所刻無垢日新之書尤誕幻無根甚可恠也巳事未明無力可救但竊恐懼而巳不知老兄以爲如何因書幸語及前此附便所予書至今未拜領也未即承教萬望以時爲道加重答吕伯恭郎中丈伏惟安問日至熹近亦領賜書即巳附便拜答今有妻兄一書煩爲附的便有報章只託漕臺遞下建陽可也右司韓丈因見爲道區區幸幸昨承惠教便遽不及拜狀趙卿所刻尹論甚精鄙意却於跋語有疑不知趙守曽扣其說否蓋尹公本是告君之言今跤但以誨人爲說恐不類耳又云伊川出易說七十餘家不知伊川教人果如此周遮否語次試爲扣之爲幸謹嚴之誨敬聞命矣但以是心至者無拒而不受之理極知其間氣質不無偏駮然亦未嘗不痛箴警之庶㡬不負友朋之責却聞門下多得文士之有時名者其議論乖僻流聞四方大爲學者心術之害使人憂歎不自巳不知亦嘗擿其邪僞否乆欲奉聞復忘記今輙布之然其曲折非靣莫能究也答吕伯恭竊承進學之意甚篤深所望於左右至於見屬過勤則非區區淺陋所堪然不敢不竭所聞以塞厚意熹舊讀程子之書有年矣而不得其要比因講究中庸首章之指乃知所謂涵養須用敬進學則在致知者兩言雖約其實入德之門無踰於此方竊洗心以事斯語而未有得也不敢自外輙以爲獻以左右之明尊而行之不爲異端荒虚浮誕之談所遷惑不爲世俗卑近苟簡之論所拘牽加以歳月乆而不舎竊意其將髙明光大不可量矣承喻所疑爲賜甚厚所未安者别𥿄求教然其大槩則有可以一言舉者其病在乎略知道體之渾然無所不具而不知渾然無所不具之中精粗本末賔主内外蓋有不可以豪髮差者是以其言常喜合而惡離却不知雖文理宻察縷析豪分而𥘉不害乎其本體之渾然也徃年見汪丈舉張子韶語明道至誠無内外之句以爲至誠二字有病不若只下箇中字大抵近世一種似是而非之說皆是此箇意見惟恐說得不鶻突眞是謾人自謾誤人自誤士大夫無意於學則恬不知覺有志於學則必入於此此熹之所以深憂求嘆不量輕弱而極力以排之雖以得罪於當世而不敢辭也注中改字兩說皆有之蓋其初正是失於契勘凡例後來却因汪丈之說更欲正名以破其惑耳然謂之因激增怒則不可且如孟子平時論楊墨亦平平耳及公都子一爲好辯之問則遂極言之以至於禽獸蓋彼之惑旣愈深則此之辯當愈力其禽縱低昂自有凖則蓋亦不期然而然然禽獸之云乃其分内非因激而増之也來教又謂吾道無對不當與世俗較勝負此說羙則羙矣而亦非鄙意之所安也夫道固無對者也然其中却著不得許多異端邪說直須一一剔撥出後方曉然見得箇精明純粹底無對之道若和泥合水便只著箇無對包了竊恐此無對中却多藏得病痛也孟子言楊墨之道不熄孔子之道不著而大易於君子小人之際其較量勝負尤爲詳密豈其未知無對之道邪蓋無對之中有隂則有陽有善則有惡陽消則隂長君子進則小人退循環無窮而初不害其爲無對也況熹前說巳自云非欲較兩家巳徃之勝負乃欲審學者今日趣向之邪正此意尤分明也康節所著漁樵對問論天地自相依附形有涯而氣無涯極有條理當時想是如此說故伊川然之今欲分明即更注此段於其下如何科舉之教無益誠如所喻然謂欲以此致學者而告語之是乃釋氏所謂先以欲勾牽後令入佛智者無乃枉㝷直尺之甚尤非淺陋之所敢聞也伊川學制固不必一二以循其跡然郡學以私試分數較計餔啜尤爲猥屑似亦當罷之若新除巳下則上說下教使先生之說不遂終廢於時乃吾伯恭之責又不特施於一州而巳也答吕伯恭浮薄談字一本作軰示喻曲折深所望於左右顧其間有未契處不得不極論以求至當之歸至於立彼我較勝負之嫌則熹雖甚陋豈復以此疑於左右者哉持養歛藏之誨敢不服膺然有所不得巳者世衰道微邪詖交作其他紛紛者固所不論而賢如吾伯恭者亦尚安於習熟見聞之地見人之詭經誣聖肆爲異說而不甚以爲非則如熹者誠亦何心安於獨善而不爲極言覈論以曉一世之昬昬也使世有任其責者熹亦何苦而譊說若是耶設使顔子之時上無孔子則彼其所以明道而捄世者亦必有道决不退然安坐陋巷之中以獨善其身而巳故孟子言禹稷顔子易地則皆然惟孟子見此道理如楊子雲之徒蓋未免將顔子只做箇塊然自守底好人看若近世則又甚焉其所論顔子者幾於釋老之空寂矣熹竊謂學者固當學顔子者如克巳復禮不遷怒貳過不伐善施勞之類造次顛沛所不可忘但亦須審時措之宜使體用兼舉無所偏廢乃爲盡善若用有所不同則所謂體者乃是塊然死物而巳豈眞所謂體哉觀伊川先生十八歲時上書所論顔子武侯所以不同與上蔡論韶武異處便見聖賢之心無些私意只是畏天命循天理而巳此義與近世論内脩外攘之說者亦相貫夫吾之所以自治者雖或有所未足然豈可以是而遂廢其討賊之心哉示喻蘇氏於吾道不能爲楊墨乃唐景之流耳向見汪丈亦有此說熹竊以爲此最不察夫理者夫文與道果同耶異耶若道外有物則爲文者可以肆意妄言而無害於道惟夫道外無物則言而一有不合於道者則於道爲有害但其害有緩急深淺耳屈宋唐景之文熹舊亦嘗好之矣旣而思之其言雖侈然其實不過悲愁放曠二端而巳日誦此言與之俱化豈不大爲心害於是屏絶不敢復觀今因左右之言又竊意其一時作於荆楚之間亦未必聞於孟子之耳也若使流傳四方學者家傳而人誦之如今蘇氏之說則爲孟子者亦豈得而巳哉況今蘇氏之學上談性命下述政理其所言者非特屈宋唐景而巳學者始則以其文而恱之以苟一朝之利及其旣乆則漸涵入骨髓不復能自解免其壊人材敗風俗蓋不少矣伯恭尚欲左右之豈其未之思邪其貶而置之唐景之列殆欲陽擠而隂予之耳向見正獻公家傳語及蘇氏直以浮薄談目之而舎人丈所著童蒙訓則極論詩文必以蘇黄爲法嘗竊歎息以爲若正獻滎陽可謂能惡人者而獨恨於舎人丈之㣲㫖有所未喻也然則老兄今日之論未論其它至於家學亦可謂蔽於近而違於逺矣更願思之以求至當之歸不可自悞而復悞人也前書奉問謝公之說正疑其不能無病詳考從上聖賢以及程氏之說論下學處莫不以正衣冠肅容貌爲先蓋必如此然後心得所存而不流於邪僻易所謂閑邪存其誠程氏所謂制之於外所以養其中者此也但不可一向溺於儀章器數之末耳若言所以正所以謹者乃禮之本便只是釋氏所見徒然横却箇所以然者在胷中其實却無端的下功夫處儒者之學正不如此更惟詳之答吕伯恭學校之政名存實亡徒以䧟溺人心敗壊風俗不若無之爲愈聞嘗有所釐正而苟且放縱者多不恱其事亦可想而知矣然當留意於立教厲俗之本乃爲有𥙷若課試末流小小得失之間則亦不足深較也向見所與諸生論說左氏之書極爲詳博然遣詞命意亦頗傷巧矣恐後生傳習益以澆漓重爲心術之害願亟思所以反之則學者之幸也前書所引文理宻察𥘉看得不子細近詳考之似以密爲祕密之密察爲觀察之察若果如此則似非本指也蓋密乃細密之密察乃著察之察正謂豪釐之間一一有分别耳故曰文理宻察足以有别只是一事非相反以相成之說也若道理合有分别便自顯然不可掩覆何必潜形匿迹以求之然後爲得邪大抵聖賢之心正大光明洞然四逹故能春生秋殺過化存神而莫知爲之者學者須識得此氣象而求之庶無差失若如世俗常情支離巧曲瞻前顧後之不暇則又安能有此等氣象邪不審髙明以爲如何答吕伯㳟所論孟子論二子之勇處文意似未然蓋賢字只似勝字言此二人之勇未知其孰勝但孟施舎所守得其要耳蓋不論其勇之孰勝但論其守之孰約亦文勢之常非以爲二子各有所似而委曲回互也且二子之似曽子子夏亦豈以其德爲似之哉直以其守氣養勇之分量淺深爲有所似耳此亦非孟子之所避也大抵伯恭天資温厚故其論平恕委曲之意多而熹之質失之暴悍故凡所論皆有奮發直前之氣竊以天理揆之二者恐皆非中道但熹之發足以自撓而傷物尤爲可惡而伯恭似亦不可專以所偏爲至當也無以報箴誨之益敢效其愚不審然否因來及之幸甚幸甚欽夫書來具道近事曲折少釋憂懣想賛助之力爲多出入無疾朋來無咎大率致意此語尤切當然想巳有成規更願凡百毖重以圖萬全最是人材難全懲其所短則遺其所長取其所長則雜其所短此須大段子細著眼力乃可無悔吝耳答吕伯恭所喻閑先聖之道竊謂只當如閑邪之閑方與上下文意貫通若作閑習意思固佳然恐非孟子意也政使必如是說則閑習先聖之道者豈不辨析是非反復同異以爲致知格物之事若便以爲務爲攘斥無歛藏持養之功而不敢爲則恐其所閑習者終不免乎豪釐之差也若顔子則自不須如此所以都無此㾗迹耳此事本無可疑但人自以其氣質之偏縁情立義故見得許多窒礙若大其心以天下至公之理觀之自不須如此回互費力也所論智仁勇之意則甚精密然龜山之說亦不可廢蓋以其理言之則所至雖不同而皆不可闕如左右之說是也若以其所至之地言之則仁者安之知者利之勇者強焉又自各有所主如龜山之說矣然此兩說者要之皆不可廢經緯以觀其意始足如何動靜隂陽之說竟未了然何耶豈非向來奉答者未得其要有以致賢者之疑乎比再觀之方以爲病欲别爲說以奉報今以來喻所引者推明之似却更分明也夫謂人生而靜是也然其感於物者則亦豈能終不動乎今指其未發而謂之中指其全體而謂之仁則皆未離乎靜者而言之至於處物之宜謂之義處得其位謂之正則皆以感物而動之際爲言矣是則安得不有隂陽體用動靜賔主之分乎故程子曰仁體義用也知義之爲用而不外焉者可以語道矣世之論義者多外之不爾則混然而無别非知仁義之說者也此意極分明矣且體用之所以名政以其對待而不相離也今以靜爲中正仁義之體而又謂中正仁義非靜之用不亦矛盾杌棿之甚乎意者專以知覺名仁者似疑其不得爲靜恐當因此更加究察所謂仁者似不專爲知覺之義也答吕伯恭乆不聞問方切懐仰得元履書乃知賢閣安人奄忽喪逝驚愕良深伏惟伉儷義重傷悼難堪區區所願約情就禮爲君親徳業千萬自重幸甚欽夫去國聞之駭然想驟失講論之益無佳况也道逺不敢請其說然吾道之難行亦可知矣柰何柰何因便草此奉慰不敢别具狀䟽諒蒙識察不次國器云亡極可傷今日又聞賔之亦逝去善類凋殘甚可慮也知言疑義再冩欲奉呈又偶有長沙便且寄欽夫處屬渠轉寄若到千萬勿示人但痛爲指􅎥爲幸功夫易間斷義理難推㝷而歳月如流甚可憂懼柰何柰何答吕伯恭前日因便附書今旣逹否比日冬深氣候暄燠伏惟進德有相尊候萬福熹去喪不死痛慕亡窮它無可言者但塵務汨没舊學蕪廢思得從容少資警益而不可得欽夫又一向不得書懐想旣深憂懼亦甚柰何今以舅氏之葬當走尤溪魏應仲來墓次得以略聞動靜因其行附訊匆匆不及究所欲言者歳晩願言爲道學自重因便來時枉書有以警䇿疲懦者不憚煩深所頋望前書許寄條對之文亦幸早得之也答吕伯㳟近因元履之子附狀必逹比日冬温伏惟德業有相尊候萬福建人劉氏兄弟爚炳同預薦送乃翁亦以免舉試禮部皆欲見於門下熹新阡與其居密邇兩年相從甚熟知其嗜學可教因其行復附此爲先容幸與之進餘巳具前書此不縷縷幸察答吕伯恭便中辱書感慰信後巳經新歲伏惟君子履端多納福祐熹免䘮不死無足言者去冬以舅氏之䘮再走尤溪逼歲方歸而目前俗冗事狀殊迫猝無佳思舊學益荒蕪矣向所附呈諸說幸反覆痛箴藥之區區猶有望也立論相髙吾人固無此疑然只要得是當亦良不易耳論治固有序然體用亦非判然各爲一事無今日言此而明日言彼之理如孟子論愛牛制産本末雖殊然亦罄其說於立談之間大抵聖賢之言隨機應物𥘉無理事精粗之别其所以格君心者自其精神力量有感動人處非爲恐彼逆疑吾說之迂而姑論無事之理以嘗試之也若必如此則便是世俗較計利害之私何處更有聖賢氣象耶愚見如此更惟精思而可否之區區之論所以每不同於左右者前後雖多要其歸宿只此毫釐之間講而通之將必有日矣奏篇伏讀感發良多愚意尚恐其詞有未逹者此人立俟未暇詳叩臨書傾想無巳正逺惟益進徳業自愛重是所願望答吕伯恭慰問之誠謹具前幅比日中夏乆雨伏惟純孝感格體力支勝熹自泉福間得侍郎中丈教誨蒙以契舊之故愛予甚厚比年以來闊别雖乆而書䟽相繼獎厲警飭皆盛徳之言感激銘佩何日敢忘區區尚冀異時得奉几杖於寂寞之濵以畢餘誨豈謂不淑遽至於此聞訃悲咽不能爲懐而山居深僻無婺女之便以故至今不能致一書以道此懐且候左右哀疚以來興寢之狀徃來於心如食物之不下也不審能亮之否左右孝誠切至何以堪此然門戸之寄朋友之望實不爲輕千萬節抑以慰逺懐人物眇然伏𥿄増涕答吕伯恭襄奉卜吉定在何時只就婺女否熹貧窶之甚不能致一奠之禮又以地逺不得伏哭柩前楚愴之懐無以自見柰何此書因趙守轉示韓丈書始得宛轉附此却託韓丈致之不知逹在何時過此又復悠悠無通問處矣熹向以召命不置欲自載一至近縣庶㡬得以一見㝷念無益且亦貧甚無辦裹糧處遂復中輟巳瀝懇哀祈諸公儻得報聞何幸如之所欲言者無窮此書亦未敢旁及也答吕伯恭便中伏奉手䟽伏讀感愴不能巳且審反虞之父又恨不得從執紼者之後也即日霜寒伏惟哀慕有相孝履支福熹窮陋如昔比復遭叔母之喪憂悴之外無可言者舊學雖不敢廢然章句誦說之間亦未見一安穩處所欲相與講評反覆者非書札所能寄也示喻深知前此汗漫之非幸甚比來講究必已加詳密矣累得欽夫書亦深欲伯恭更於此用力也别𥿄數事求教幸一一批誨比日讀書此類甚多少冗不能詳録當俟後便耳祭禮略巳成書欲俟之一兩年徐於其間察所未至今又遭此朞喪勢須卒哭後乃可權宜行禮考其實而修之續奉寄求訂正也因便附此復因韓丈致之未由承晤千萬以時節哀爲遺體自愛幸甚幸甚答吕伯恭專使奉教承新春以來孝履支福感慰深矣教告諄複警䇿殊多離羣索居其害至此良可警懼蓋初心之善未始不明但失照管即隨事汨没不自覺耳來介市書未還偶有便人亦欲令持此書以徃因復附此未暇它及先此少謝厚意言行二書亦當時草草爲之其間自知尚多謬誤編次亦無法初不成文字因看得爲訂正示及爲幸餘俟盛价還日别得奉問便遽草草答吕伯恭伏奉近告竊審巳經祥祭追慕無窮尊體神相多福買茶人書尚未領當是已徑之府中矣謝遣學徒杜門自治深爲得䇿所造詣想日深矣恨未有承教之期爲悵恨耳但爲舉子軰抄録文字流傳太多稽其所敝似亦有可議者自此恐亦當少訒其出也如何如何禮運以五帝之世爲大道之行三代以下爲小康之世亦畧有些意思此必粗有來歴而傳者附益失其正意耳如程子論尭舜事業非聖人不能三王之事大賢可爲也恐亦㣲有此意但記中分裂太甚㡬以二帝三王爲有二道此則有病耳胡公援引太深誠似未察也鄙見如此髙明復以爲如何因便附問草草眷集伏惟均慶山中有委勿外熹拜問薛湖州昨日又得書其相與之意甚勤聞其學有用甚恨不得一見之然似亦有好髙之病至謂義理之學不必深窮如此則㡬何而不流於異端也耶其進爲甚驟亦所未曉因書幸見告以其所自熹又拜密菴主僧從穆近巳死其徒法舟見權管幹此菴元只作古丞莊屋如可且令看守即求一榜并帖付之恐或别有可令住者遣來尤佳但此菴所入亦薄非復謙老之時矣只令法舟守之亦便也古一本作右答吕伯㳟便中累辱手書伏審巳經練祭哀慕如新即日溽暑孝履支福感慰之至熹昨巳作書欲遣兒子詣席下㑹連雨未果行俟梅斷看如何也但此兒懶惰之甚在家讀書絶不成倫理到彼冀親警誨或肯向前萬一只如在家時即乞飛書一報當呼之使歸不令乆奉累也仁字之說欽夫得書云巳無疑矣所諭愛之理猶曰動之端生之道云爾者似頗未親蓋仁者愛之理此理字重動之端端字却輕試更以此意秤停之即無侵過用處之嫌矣如何劉博士墓誌不曽收得早録寄幸甚欲作淵源録一書盡載周程以來諸君子行實文字正苦未有此及永嘉諸人事跡首末因書士龍告爲託其搜訪見寄也士龍相欵所論大者幸喻及一二亦甚恨無因縁得相見渠更待闕耳其改命必有以也前時湖州買茶人囬曽附書不知收得否因書煩扣之并爲致千萬意也菴牓巳付之其僧有狀今附此便去擇之來此相聚甚樂有書納上元履春間不幸不起疾甚可傷近方爲卜得地旦夕徃與謀葬也承問及之因便拜狀草草餘巳具所遣兒子書矣答吕伯恭潘守附致所予書得聞近况感慰之深信後暑毒異常伏惟讀禮之餘孝履支福熹窮居碌碌無可言召命竟未能免近𬒳堂帖督趣逾峻勢須一行至衢婺間恭俟罷遣或得承晤何幸如之子澄過此兩三日諸况其能言之因其行附此不復縷縷餘惟以時保衛區區至懇眷集伏惟鈞安此間有骫勿外兒子寓食之計似終未穩豈可終歳擾人耶幸更爲處之使賔主之間可乆處而不厭乃佳耳與叔度書不欲深言此但老兄以意裁之則善矣叔度惠書觀其論說氣質良厚不易得也聞薛士龍物故可駭可歎且恨竟不識斯人也答吕伯恭昨以召㫖之嚴不免爲造朝計意經由必獲一見子澄之行草草附問巳嘗及其故矣旣而忽有改秩奉祠之命知獲遂退藏之願然襃寵過厚又有所不敢當者力爲懇辤未知諸公頗見亮否萬一再三不如所請其將何以爲計有以見教幸甚兒子乆欲遣去以此擾擾未得行謹令扣師席此兒絶懶惰旣不知學又不能隨分刻苦作舉子文今不逺千里以累髙明切望痛加鞭勒俾稍知自厲至於擇交㳺謹出入尤望垂意警察如其不可教亦幾早以見報或便遣還爲荷千萬勿以形迹爲嫌也賤迹如此又未有承晤之日臨風怳然惟以時節哀爲道自愛答吕伯㳟前書所諭仁愛之說甚善甚善但不知如何立言可使學者有所向望而施涵泳玩索之功又無容易領略之弊耶因來喻及幸甚幸甚劉博士誌文得之幸甚此類文字此間所已有者旦夕録呈切告據此以訪其所無異時成得一書亦學者之幸也近得毗陵周教授數篇論語令兒子帶去試一讀之以爲與程門諸君子孰髙孰下也以一言語及爲幸長沙此三兩月不得書邵武有孟子說不知所疑云何預以見告俟得本考之也然此等文字流傳太早爲害不細昨見人抄得節目一兩條巳頗有可疑處不知全書復如何若洙泗言仁則固多未合當時亦不當便令盡版行也吾人安得數月相携於深山無人之境共出其書一啇訂之以求至當之歸乎更有數條又具别𥿄幸早垂教也答吕伯恭方作書欲附便未行而兵子還辱書至感又得竊聞比日秋清孝履支福至慰至慰熹賤跡且爾辤免未報爲撓不爲巳甚之戒甚荷愛念此非所以爲髙但坐邀禮命有所未安今且得力辤冀蒙相捨若其不獲又别相度耳若𥘉意則直欲力辤雖使得罪亦無所避也欽夫得書觀其語意亦似不以爲可受也更望審思復以見教幸甚幸甚時位之戒敢不敬承欽夫移書見戒一二事亦類此顧恐偏蔽巳甚矯革爲難未知終能副朋友所期否耳今歳紛紛蓋爲初不爲備率然整頓故有此患近巳預爲嗣歳之備亦自不至此也周教授語解誠如所喻愚意其篤實似尹公謹嚴過之而純熟或不及也髙明以此語爲如何小兒無知仰累鞭䇿感愧深矣在家百計提督但無柰其懶何今得嚴師畏友先與撃去此病庶或可望其及人也又得叔度叔昌書兒子書中及回兵口說荷其照屬之意良厚益深愧怍偶欲入城臨行冗甚作此附便餘俟後便也匆匆答吕伯恭人還承答字感慰之深比日秋高伏惟孝履支福熹碌碌無足言者誨諭辤受之義此亦方以爲撓若如來教雖可逆避將來之患顧恐於今日義理未安耳幸更爲思之因書見告爲望懇懇兒子旣蒙容受感佩非常不知能應程課入規矩否凡百更望矜念愚懇痛賜鞭䇿爲幸之甚即不可教亦告早以垂喻即遣還尤幸也横渠集刋行甚善但不知用何處本若蜀中本即所少文字尚多俟寄來看或當𥙷即作别集也說文此亦無好本因便巳作書與劉子和言之矣欽夫近得書寄語解數叚亦頗有未合處然比之向來收歛慤實則巳多矣言仁諸說録呈渠别寄仁說來比亦答之并録去有未安處幸指誨也因便致問正逺節哀自重爲請答吕伯恭仁說近再改定比舊稍分明詳宻巳復録呈矣此說固太淺少含蓄然竊意此等名義古人之教自其小學之時巳有白直分明訓說而未有後世許多淺陋玄空上下走作之弊故其學者亦曉然知得如此名字但是如此道理不可不著實踐履所以聖門學者皆以求仁爲務蓋皆巳略曉其名義而求實造其地位也若似今人茫然理㑹不得則其所汲汲以求者乃其平生所不識之物復何所向望愛說而知所以用其力邪故今日之言比之古人誠爲淺露然有所不得巳者其實亦只是祖述伊川仁性愛情之說但剔得名義稍分界分脉絡有條理免得學者枉費心神胡亂揣摸喚東作西爾若不實下恭敬存養克巳復禮之功則此說雖精亦與彼有何干渉耶故却謂此說正所以爲學者向望之標準而𥘉未嘗侵過學者用功地歩明者試一思之以爲如何似不必深以爲疑也自巳功夫與語人之法固不同然如此說却似有王氏所論高明中庸之弊也須更究其曲折略與彼說破乃佳答吕伯㳟昨日作書欲附便行今日忽得守示獲聞比日冬寒孝履支福旣以感慰又得别紙誨諭之詳伏讀再三警發甚至其爲欣荷又不自勝但所謂飽經歷眞切磨者不敢當耳區區巳復詳具求教顒俟益論也辤免文字附沈尹專人自七八月間去此意其巳到近託人致懇廟堂求聽所請得報乃云文字未至良以爲疑得子澄書乃其人更過何處取書計今必巳至矣當時若知其迂回如此只發遞去自無浮沉也然部中行下建寧又云巳給批書此須作熹狀申部出給熹旣不受不知此文字是如何行遣都不可暁亦不知此物今在何處杜門無事乃有此撓聞是韓丈拈出前此亦未知今旣如此狼狽却須得韓丈出手大家收救莫令到無收拾處乃荷相念然又不欲作書彼亦未必以爲誠然不知可煩老兄因書一言所以不敢受之意非出矯僞得自廟堂上辤免文字特依所乞再授元官差監嶽廟便是一箇出場也前日作書忘記及此因問之及復此忉忉千萬垂念也康節恐是打乖法門非辤受之正伊川再受西監止是叙復元官還莅舊職又可逡巡解去即與今日事體全不相似皆未敢援以自比欽夫書來亦云豈可逆料後患而先汨所守之義此語亦甚直截然渠却不曽爲思量如何解免得脫若只如此厮啀恐非臣子所敢安也千萬便爲盡以此意逹之韓丈得早爲解紛幸甚幸甚夜作此書不能它及答呂伯㳟便中辱書教感慰之深信後怱怱巳迫長至伏惟感時追慕何以爲懐神相孝履起處萬福熹昨以叔母之葬走政和徃返月餘今適反舎泪没無好况它無足言者臨行寓書有所咨扣想巳聞徹得早報及爲幸兒子極感教誨不知近復如何正唯懶惰不肯勤謹檢飭此爲大患計必有以變化之爲文稍能入律否𥘉欲歳下令略歸今思之恐徒勞徃返不若且令留彼度歳旣蒙矜念如此當不異父兄之側矣但乆溷潘宅不自安耳子澄一書告爲附便陸子夀聞其名甚乆恨未識之子澄云其議論頗宗無垢不知今竟如何也學者用工不實之弊誠如來誨不但學問今凡一小事才實理㑹便自然見道理漸漸出來也近見建陽印一小冊名精騎云出於賢者之手不知是否此書流傳恐誤後生輩讀書愈不成片段也雖是學文恐亦當就全篇中考其節目關鍵又諸家之格轍不同左右采獲文勢反戻亦恐不能完粹耳因筆及之本不足深論也因便禀此草草答吕伯恭便中連辱手教感慰亡喻即此歳除伏惟感時追慕神相純孝起居支福熹碌碌如昨無所可言但懇辤旣不得請又𬒳堂帖檢坐近降行下然觀立法之意乃爲有官職之事者設與此避過恩辤逸禄者𥘉不相關巳復注釋此意别作狀回申矣亦得韓丈書敦勉甚至却爲合下見得此一邊義理稍重未能勇從萬一果掇疑怒亦無所避之也韓丈必巳開府前日臨安人回巳附書致謝此便遽又當除日百冗不暇再作也兒子蒙教督甚至舉家感激不可言但所作大義似未入律聞亦巳令專治此業甚善觀其氣質似亦只做得舉子學初尚恐其不成今旣蒙獎誘不知上靣更能進歩否此亦必待其自肯非他人所能彊也子澄去就從容甚可喜昨聞周子充辭郡得請今又睹此益知辭受由人而不在於時豈彼能之而我不能哉若來喻所云親切用工處誠亦更當致力想相見必熟講之矣范伯崇云歸途亦欲請見今皆巳到未耶淵源録許爲序引甚善兩處文字告更趣之祭禮巳冩納汪丈處託以轉寄不知何爲至今未到然其間有節次修改處俟旦夕别録呈求訂正也所論克巳之功切中學者空言遥度之病然向來所論且是大綱要識得仁之名義氣味令有下落耳𥘉不謂只用力於此便可廢置克巳之功然亦不可便將克巳功夫占過講習地位也中間有一書論古人小學巳有如此訓釋一段其詳幸更考之然克巳之誨則尤不敢不敬承也欽夫近得書别寄言仁録來修改得稍勝前本仁說亦用中間反覆之意改定矣聞其園池増闢盡得江山之勝書來相招屬此蹤跡未自由又郷里饑儉未敢輕諾之也王教授來值熹入城不得相見以老兄所稱許如此甚恨未及識之耳小本易傳尚多誤字巳令兒子具禀大本校讎不爲不精尚亦有闕誤掃塵之喻信然能喻使改之爲幸聞又刻春秋胡傳更喻使精校爲佳大抵須兩人互讎乃審耳兩人一誦一聽看如此一過又易置之横渠集巳畢未耶得本早以見寄幸甚如此間程集似亦可作小本流布盖版在官中終是不能廣也向議欲刋說文不知韓丈有意否試扣其說因賛成之爲佳偶便附此除日百冗不能旣所欲言惟千萬節哀自愛以振吾道爲祝怱怱不宣答吕伯恭歳律更新伏惟感時追慕何以堪之神相孝思體力攴勝熹此粗如昨歳前附一書於城中㝷便不知逹否𥿄尾所扣婺人番開精義事不知如何此近傳聞稍的云是義烏人說者以爲移書禁止亦有故事鄙意甚不欲爲之又以爲此費用稍廣出於衆力今粗流行而遽有此患非獨熹不便也試煩早爲問故以一言止之渠必相聽如其不然即有一狀煩封至沈丈處唯速爲佳蓋及其費用未多之時止之則彼此無所傷耳熹亦欲作沈丈書又以頃辭免未獲不欲數通都下書只煩書中爲道此意此舉殊覺可笑然爲貧謀食不免至此意亦可諒也正逺萬萬節哀自重餘巳具前書矣便遽草草答吕伯恭自經新歳未及上問竊惟孝思有相起處支福祥禫計亦不逺追慕想難爲懐也熹屏居如昨向來辭免堂中竟用檢㑹近降海行指揮行下不免再具狀懇辭矣梁公至此相見之後始知前此請之由衷亦爲言於諸公今兹之請其必遂矣此外無致力處姑復任之但惕息俟罪而巳去冬了叔母葬事又人事出入迫歳方小定開正復擾擾才得旬日休息又以梁公遭憂不免入城弔之計又須旬日徃返加以親舊間死喪弔送犇走不暇鄉民又巳嗸嗸告飢此皆不免勞心費力殊覺胷次塵埃學業固無由進益至於尤悔之積亦有不暇點檢者每一念之如此紛紛竟亦何益欲舎此以求講論規誨之助而不可得則亦悵然而巳欽夫得書相招爲湘中之遊以此未能行然它亦有使人不欲前者至於老兄相去不逺亦無從相見胷中所欲言者無窮偶有便行臨出不及拜書道中作此寄家中令付之匆匆不及究所懐之一二若免喪之後不免復爲禄仕能求一官南來否乎引領馳情尚冀節哀自愛不宣答吕伯㳟便還奉教感慰之深即日春和伏惟孝履支福巳經祥祭追慕何窮然俯就先王之制誠有望於賢者熹再辤未報惕息俟命未知所以爲計也承問感感衢温文字幸早留意寄及横渠文集此有一冩本比此増多數篇偶爲朋友借去俟取得寄呈可作别集以𥙷此書之闕也所喻講學克巳之功裒多益寡政得恰好此誠至論然此二事各是一件功夫學者於此須是無所不用其極然後足目俱到無偏倚之患若如來喻便有好仁不好學之蔽矣且中庸言學問思辯而後繼以力行程子於涵養進學亦兩言之皆未嘗以此包彼而有所偏廢也若曰講習漸明便當痛下克巳功夫以踐其實使有以眞知其意味之必然不可只如此說過則其言爲無病矣昨答敬夫言仁說中有一二段巳說破此病近看呉才老論語說論子夏吾必謂之學矣一章與子路何必讀書之云其弊皆至於廢學不若行有餘力則以學文就有道而正焉可謂好學之類乃爲聖人之言也頗覺其言之有味不審髙明以爲何如因便附此不盡所懐餘惟節抑餘哀千萬保重眷集伏惟均休子約巳别奉書矣兒子乆累教拊舉家愧荷不可勝言更願終賜使隨其資之髙下有所成就幸甚固不敢大望之也子澄伯崇到彼所講何事伯崇且還江西尚未到里中也叔度寄得薛士龍行狀讀之使人慨歎不巳不知所著諸書嘗見之否今有書吊其家煩爲致之欲求中庸大學論語說及隂符握竒揲蓍本政叙凡七書不審能爲致之否此委却望不外答吕伯恭前月末及此月𥘉兩附便拜狀不知逹否府中轉致近教獲聞比日春晩尊候萬福感慰深矣熹屏居如昨近出展墓遂豋廬山小菴在孤峯絶頂之側少留旬日舉目雲山盡數百里足以稍滌塵滯它無足言也懇辤未報若不將上則不若不報之爲愈今幸如此且爾偷安耳示喻專心致志之功警發昬惰爲幸甚矣但年來浸益多事雖書䇿功夫亦不能得相接續此爲可懼至於朋友亦正自難得人大抵氣習巳偏而志力不彊殊未有以慰人意者門墻之下渠亦有其人乎誘接之道雖各不同要是且令於平易明白處漸加功夫時加警䇿而俟其自得此爲正法耳弟子職女戒二書以温公家儀系之尤溪欲刻未及而漕司取去今巳成書納去各一本初欲遍寄朋舊今本巳盡所存只此矣如可付書肆摹刻以廣其傳亦深有𥙷於世教或更得數語題其後尤幸也外書淵源二書頗有緒否幸早留意兒子荷教誨舉家感刻昨深慮其經義踈闊今得略有條理甚幸甚幸新茶三十夸謾到左右因便附此草草不宣答吕伯㳟昨巳具前幅而便信差池便中又辱况書慰感亡量聞携書入山水勝處想講學之餘日有佳趣小兒亦得從行荷意愛厚矣感刻何敢忘也所論呉才老說經之意切中其病然在今日平心觀之却自是好語也學記深造自得之語初亦覺其過欲改之則巳刻石不及矣以此知人心至靈只自家不穩處便須有人點檢也李習之在唐人特然知中庸之爲至亦不可多得然其所論實本佛老之說故特於序文發之蓋不遺其善而抑揚之間亦不爲無意似不可謂不足而略之也哀公問政以下數章本同時答問之言而子思刪取其要以發明傳授之意鄙意正謂如此舊來未讀家語嘗疑數章文章相屬而未有以證之及讀家語乃知所疑不繆耳天斯昭昭之多以下四條譬諭似以天地爲積而至於大者文意頗覺有礙不知當如何說幸見教他所欲請者甚衆臨書怱怱忘之顧未有靣論之日兹爲恨恨耳答吕伯㳟子約惠書巳奉報矣不知何故如此猶豫前郤此不誠不敬之本於進道中正是莫大之病須痛加治療熹書中巳極言之想從容之際亦必有以警之也呉晦叔來犇其母之䘮今日方見之能道欽夫病狀亦得欽夫書今巳復常矣晦叔亦多病癯瘁也人各有偏非見徹克盡所不能免此誠至論佩服不敢忘也小兒無知荷教誨之意甚厚異時稍識去就不知何以爲報也但乆擾叔度兄弟甚不自安又聞浙東艱食恐向後道路難行今專此人去恐可遣歸即從韓丈借人送歸或尚可少留即亦唯長者之命歸來却無讀書處也熹書中巳詳禀韓丈矣其去住遲速却在裁度也大學中庸墨刻各二本子魚五十尾并以伴書幸留之它委勿外熹再拜上問答吕伯恭熹僭易拜問台眷伏惟上下均安子約賢友不及奉狀前書所講必有定論因來幸示及兒子乆累誨督春來不得書不知爲學復如何向令請問選録古文之意不知曽語之否此間與時文皆巳刋行於鄙意殊未安也近年文字姦巧之弊熟矣正當以渾厚朴素矯之不當崇長此等推波以助瀾也明者以爲如何尤川新學二刻令兒子持納求教幸爲一觀記文之謬千萬指示也答吕伯㳟便中連三辱書感慰無量即日庚伏酷暑伏惟禮制有終永慕何巳神相尊候動止萬福熹杜門如昨辤免不遂今日巳拜命矣屢煩惇勸愧荷之深前日得王漕書亦具道盛意也三釡之樂永負𥘉心方此感愴忽又聞一表兄之喪明日當復犇赴亟遣此人喚小兒還家草草布此未暇它及此兒乆荷教育舉家感德無窮今迫試期幸聽其歸異時復遣卒業終以累髙明也巳有書懇韓丈借人更告借以一言得早還家爲幸承從人嘗至三衢汪丈必甚欵所論何事因書及之熹辭免巳决秋冬間無事或可出入甚思承教但未敢預期耳正唯以時進德自重爲禱不宣熹頓首再拜上狀聞懐玉山水甚勝若㑹於彼道里均矣如何答吕伯㳟兒子歸承手書之貺感慰良深秋氣漸凉伏惟尊候萬福熹昨以事一至城中還家諸况如昨蓋無足言者懐玉之約遲以明年無所不可但兒子說車馬自㑹稽遂如天台鴈蕩不審亦可留此勝㮾以俟來春相與俱行否若爾則不必登懐玉只自此徑走婺女相就而行也兒子歸來不惟課業勝前至於情性作爲亦比徃時小異信乎親炙薫陶之效舉家感德不可名言但惜乎其氣質本凡又無意於大受不足以希升堂之列耳還日又蒙借人津遣尤以懼荷但歸來衮衮俗務汨没不得如臨行所戒次第場屋得失初非所期亦復任之耳損减收歛之喻真實切當謹銘坐右不敢忘也汪丈進德不倦後學幸甚但其所辨石林燕語頗留意於儀章器數之間此曽子所謂則有司存者豈其餘力之及此耶專意於此則亦非區區所敢知者矣長沙頻得書地逺難得相見此公踈快書中不敢盡言心之所憂亦㣲詞以見晦叔歸因託寄懐想其亦樂聞之但事有日生者須推類以通之則告者不費而聞者有深益耳中庸章句一本上納此是草本幸勿示人更有詳說一書字多未暇餘俟後便寄去有未安者一一條示爲幸大學章句并徃亦有詳說後便寄也此謂知之至也一句爲五章闕文之餘簡無疑更告詳之系於經文之下却無說也淵源外書皆如所喻但亦須目下不住㝷訪乃有成書之日耳别𥿄所論更俟參訂奉報叔度此人巳留數日不欲乆稽之且附此書遣還也未即承教馳想亡窮惟千萬爲道自愛答吕伯㳟昨自叔度人還之後一向不得奉問豈勝向仰比日冬温伏惟味道有相尊候萬福熹杜門如昔無足言者昨附去中庸大學等書如何未相見間便中得條示所未安者幸幸近稍得暇整頓得通鑑數卷頗可觀欲寄未有别本俟來春持去求是正也聞老兄亦爲此功夫不知規摹次第如何此間頗苦難得人啇量正唯條例體式亦自難得合宜也如温公舊例年號皆以後改者爲正此殊未安如漢建安二十五年之𥘉漢尚未亡今便作魏黄初元年奪漢太速與魏大遽大非春秋存陳之意恐不可以爲法此類尚一二條不知前賢之意果如何爾所欲言者甚衆此便又遽不及究一二春初即治温台之行承教且不逺矣向寒伏冀爲道自愛不宣十月十四日熹頓首再拜上狀熹僭易再拜上問眷集伏惟均慶子約賢友不及拜書兒輩附拜問禮大兒本即遣去席下又一動亦費力來春當自携行但恐又難去叔度處不知當置何許也前書所扣一二事因便告早及之欲爲之備貧家辦事爲難須及早料理也此書附建陽范澤民解元渠去赴省云欲便道請見其人老成孝友誠慤朋輩間所難得然苦貧此行甚費力或有可接手處得與垂念幸甚幸甚此委不外熹僭易拜問韓丈政成想多暇日相見便遽不敢草草爲書語次告略及之幸甚幸甚熹拜懇答吕伯㳟近以書附建陽范澤民秀才計巳次第問逹人至伏奉手誨竊審比日冬寒尊候萬福感慰之劇功衰之戚不易爲懐痁疾想一向平復乆矣杜門進學所造想日深所謂凝聚收歛是大題目此不易之論乃功夫根本至謂察助長之失乃其間節宣之宜耳此語却恐未盡蓋平論之則有事勿正勿忘勿助自是四事不應偏察其一若偏論之則助者已是用意太過之病若又以察隨之竊恐轉見紛優此須更審之恐或立辭之病耳中庸解固不能無謬誤更望細加考訂來春靣叩以盡鄙懐也叔度云欲傳録此非所愛者况在同志何所不可但恐未成之書若縁此流布不能不誤人耳巳書懇其且俟相見商榷之後度可傳則傳之亦未爲晩也聘禮謹如所戒來春到彼便可先畢此禮但叔度書云其令女方年十三歳此則與始者所聞不同此児長大鄙意欲早爲授室如温公之儀則來歳巳可爲婚此并候到彼靣議來日欲爲次子納婦入夜百冗草草修報目昏不成字承教不逺預以自幸未間更冀以時珎重答吕伯㳟自冬來五𬒳誨示出入多故復苦少便都不得奉報豈勝愧仰昨聞㓜弟之䘮復遭功衰之慘伏惟悲痛何以堪處而营治襄事亦不能不劳神觀區區尤劇馳情比日歲窮伏惟尊候萬福熹碌碌粗安無足言但叔京自冬𥘉與邵武朋友三兩人來寒泉相䖏旬日旣歸即病十一月末間手書來告訣得之驚駭即走省至則巳不起數日矣朋友間如此公者不易得極可傷痛然其病中極了了語不及私所以教子弟者語皆可記所與熹書并令致意諸朋友今録去一通度其意於當世之慮不無望於伯恭當亦爲愴然也然不必以示它人爲幸熹開正當復徃爲料理葬比來甚覺衰憊不堪犇走然不得不爲一行也兒子蒙收教極感矜念更望痛加鞭䇿千萬幸甚昨所獻疑本末倒置之病明者巳先悟其失不知近來所以開導之際其先後次第復如何因來見告爲幸機仲擴之來皆未相見擴之過此日熹往邵武未歸但留書云老兄有所見教一二事甚恨未得聞也其間略說遺書不須刪定與來書似不相照不知果如何然渠開正須復來此當細扣之便中亦望批喻也渠託於縣宰之館誠似未便聞老兄亦嘗警告之并俟其來細與啇榷令去請教也修定書說甚善得并程書詩外傳等節次見寄甚幸前書託求本政書續添圖子論事録等望留意近桂林寄本政書後更有一二種文字巳屬其别寄老兄處或可并𥙷足成一家之書也欽夫書來及其爲政之意甚羙令作脩舜庿碑文題目不小勉彊成之不及求教爲恨今亦未暇録呈它時當見之耳間更欲脩尭廟此其勢必當属筆於老兄也熹近讀易覺有味又欲脩吕氏郷約郷儀及約冠昬喪祭之儀削去書過行罰之類爲貧富可通行者苦多出入不能就又恨地逺無由質正然旦夕草定亦當寄呈俟可否然後改行也所懼自脩不力無以率人然果能行之彼此交警亦不爲無助耳季通昨欲出浙竟不能行今復欲謀之亦未定旦夕相見當致盛意應仲書亦未有報也今日歳除郷人有告行者草草附此未究所懐願言爲道自重以對大來之亨區區至望不宣熹頓首再拜答吕伯恭昨承枉過得兩月之欵警誨之深感發多矣别去怱怱兩月向仰不少忘便中奉告承巳稅駕欣慰之劇信後秋氣巳清伏惟尊候萬福熹還家數日始登廬山之頂清曠非復人境但過清難乆居耳至彼與季通方議丹丘之行忽得來教爲之惘然却悔前日不且挽留或更自鵝湖追逐入懐玉深山坐數日也損約收歛此正區區所當從事日前外事有不得已而應者自承警誨什損四五矣自此向裏漸漸整治庶㡬寡過但恐密切處不似外事易謝絶也綱目草藁略具俟冩校淨本畢即且休歇數月向後但小作功程即亦不至勞心也向來之病非書累人乃貪躁内發而然今當就此與作節度庶㡬小瘳耳汪丈文字巳冩寄之矣韓丈近得書問清議二字所出何書殊不省記但憶劉元城語耳因書告見教唐裝之說此亦多知其誤紊官制此欲救其小而不知其一於大者之過也專人奉問未究所懐惟千萬爲道自重不宣熹頓首再拜上狀别𥿄誨示開發良多太伯夷齊事鄙見偶亦如此也復有少反復更望垂誨巳作書又得府中寄來七月九日所惠書爲慰尤深但所謂前兩惠書者其一未到不知附何人可究問也数日來蟬聲益清每聴之未嘗不懐髙風也熹又覆答吕伯㳟昨專人反附府中一書想比日秋凉伏惟尊候萬福近思録近令抄作冊子亦自可觀但向時嫌其太髙去却数段如太極及明道論性之類者今看得似不可無如以顔子論爲首章却非專論道體自合入第二卷作第二段又事親居家事直在第九卷亦似太緩今欲别作一卷令在出處之前乃得其序卷中添却數叚草卷附呈不知於尊意如何第五倫事閫範中亦不載不記曽講及否不知去取之意如何因來告諭及也此書若欲行之湏更得老兄數字附於目録之後致丁寧之意爲佳千萬勿吝也遺書節本巳冩出愚意所刪去者亦湏用草𥿄抄出逐叚畧注刪去之意方見不草草處若只暗地刪却乆逺却惑人也記論語者只爲不曽如此留下家語至今作病痛也徃時啇量欲以程子格言爲名不如只作㣲言如何雖有時氏所編巳用此名然將來自作序說破不妨也更裁之又欲煩就汪丈處借吕和叔集檢㸔有西銘解否有望録示也此三事切望留念又向時所許録寄文字及前書所請者或去人巳遣歸所寄未盡望續附來爲幸更說有何人語孟說亦望見寄也叔度叔昌二兄未及拜狀因見煩致區區不宣熹頓首再拜八月十四日所云府中一書無之誤記也答吕伯恭便中承書良慰瞻仰比日冬温異常伏惟尊候萬福熹窮陋如昨諸公許不彊致其計甚便所喻諄複深見仁者憂世之心然𥘉辭甫上便有前却此似有制之者非人力所能計較也近得建業轉致定叟報甚詳此亦不可便謂無妄之疾要是自處有不至耳得韓丈書甚以老兄爲念然諸公不先其難者以開進賢之路而區區用力於末流適足以信其讒口於事竟何𥙷耶近事一二似亦可喜然勿貳勿疑古人之深戒適足爲寒心耳竊承讀詩終篇想多所發明恨未得從容以請熹所集解當時亦甚詳備後以意定所餘才此耳然爲舊說牽制不滿意處極多比欲修正又苦别無稽援此事終累人也不審所欲見教者何事亟欲聞之恐不能悉論姑得大者數條見示亦足以有警也論語說得暇亦望早爲裁訂示及㑹稽之行計亦不多日也近看周儀二禮頗有意思但心力短過眼即復惘然又似枉費工夫耳相人偶更有一二處但皆注中語不應禮記注中又自引此注文不知别有成文或當時人語如此耶近思刻板甚善曲折巳報叔度矣垂喻昬議此極不忘但熹未敢輕易已具以來誨諭諸徃來者有可問處别馳報也擴之不曽相見擇之欲來亦未見到不知何故季通有母之喪貧迫甚可念也董氏詩建陽有版本旦夕託人㝷訪納去其間考證極博但不見所出使人未敢安耳近讀大學疑人之其所親愛而辟焉只合讀爲僻字則與上章同體而於下文甚順幸試思之見報如何桂林近得書區處一路財計甚有條理但云州兵閱習巳成次第不知如何也亦甚覺向來講論過髙之弊矣近復一到武夷留近旬月窮探通歷乃知昔之未始逰也摩挲舊題俯仰陳迹而叔京遂爲古人重以傷嘆耳塾子乆累誨督感刻巳深又承許其稍進尤切銘篆苦淡之習欲其自知進歩恐無此日更得明示好惡而痛加撙節則爲幸又不可言矣相望千里未有承教之日臨風不勝黯然碩言爲道自重副此禱懇答吕伯㳟廟碑恐未刻間尚可解録呈一本幸指喻或因書徑報桂林令緩刻也叔京家属爲埋銘方草定如此亦以求教此全未成尤望斤削然亦不必示人也元善遭祖母之䘮遽投解官文字而歸州郡以法不許目今進退無據前日來問欲請祠或㝷醫勸其不若㝷醫盖渠以自㓜鞠於祖母故欲如此然亦太輕率矣渠前日冩得亂道詩數篇去囑其勿示人近聞乃嘗呈似子約云已冩得切告掩藏勿令四出爲幸答吕伯恭正𥘉以書附便人想巳逹自此過小溪旬日遂來富沙見韓丈略聞近况爲慰比日春雨應候伏惟尊候萬福汪丈遽至於此想同此傷嘆此始聞之猶未敢信到城中始知果然此公實爲今日善類之宗主一旦隕没何痛如之即欲犇徃哭之又不敢輙至近甸然旦夕歸婺源或當便道一過其家情義所在有不得而避者然亦不敢見人幸勿語人也因擴之行附此草草不暇它及塾獲依師席幸甚凡百望痛加鞭勒餘惟以道自重爲禱不宣正月晦日熹頓首再拜上狀眷集均慶子約不及别狀答吕伯㳟近因韓丈得附狀計不至浮湛人至奉告欣審即日春和尊候萬福承喻以期㑹之所甚幸但區區此行迫不得巳須一至衢正以不欲多歷郡縣故取道浦城以徃只擬夜入城寺遲明即出却自常山開化過婺源猶恐爲人所知招致悔咎今承誨諭欲爲野次之欵此固所深願但須得一深僻去處跧伏兩三日乃佳自金華不入衢徑趣常山道間尤妙石巖寺不知在何處若在衢婺間官道之旁即未爲穏便蓋去歳鵝湖之集在今思之巳非善地矣更熟籌度之又熹行期亦尚未定大約在後月半間經過宿留度月盡可到衢耳未敢預約候到浦城專遣一介馳報回日即告喻以定處爲幸亟遣此人草草修報它惟爲道自重不宣熹頓首再拜上狀前書所懇爲韓丈言者告留念前日自言之巳力似巳蒙領略然恐或忘之脫致紛紜不得不深防耳千萬答吕伯㳟近因韓丈遣人拜狀計先此逹矣比日春和伏惟尊候萬福行期想只數日間自此屈指以望車音幸疾其驅慰此傾跂也叔度兄昨小違和今巳安否不知諸朋友孰能同來因便信過門草草附問餘惟靣言答吕伯㳟便中兩辱誨示感慰之深即日雨寒伏惟尊候萬福熹正初復至邵武還走富沙上崇安四旬而後歸將爲婺源之行未及而韓丈召還道出邑中寄聲晉叔必欲相見不免又出山一巡疲曵不可支矣極欲一到三衢哭汪丈之喪而未敢前未知所以爲决旦夕上道却徐思其冝耳叔昌寄示所作奠文曲盡其爲人之梗槩讀之令人隕涕也何兄誌文語病誠如所喻前此固巳疑而改之矣它所更定尚多怱怱未暇録呈草本告收毁之也子澄巳對未所欲言者想巳子細商較大抵今日發口欲其盡巳而不失時義之中此爲難耳尊嫂葬事想巳畢自此無事以次整頓諸書以惠後學甚善然亦願早下手也熹所欲整理文字頭緒頗多而日力不足今又方有逺役念念未始一日去心也讀易之法竊疑卦爻之詞本爲卜筮者斷吉㓙而因以訓戒至彖象文言之作始因其吉凶訓戒之意而推說其義理以明之後人但見孔子所說義理而不復推本文王周公之本意因鄙卜筮爲不足言而其所以言易者遂逺於日用之實類皆牽合委曲偏主一事而言無復包含該貫曲暢旁通之妙若但如此則聖人當時自可别作一書明言義理以詔後世何用假託卦象爲此艱深隱晦之辭乎故今欲凡讀一卦一爻便如占筮所得虗心以求其詞義之所指以爲吉凶可否之决然後考其象之所巳然者求其理之所以然者然後推之於事使上自王公下至民庶所以脩身治國皆有可用私竊以爲如此求之似得三聖之遺意然方讀得上經其間方多有未曉處不敢彊通也其可通處極有本甚平易淺近而今傳註悞爲髙深㣲妙之說者如利用祭祀利用享祀只是卜祭則吉田獲三孤田獲三品只是卜田則吉公用享于天子只是卜朝覲則吉利建侯只是卜立君則吉利用爲依遷國只是卜遷國則吉利用侵伐只是卜侵伐則吉之類但推之於事或有如此說者耳凡此之類不一亦欲私識其說與朋友訂之而未能就也不審尊意以爲如何因來幸以一言可否之禮書亦苦多事未能就緒書成當不俟脫藁首以寄呈求是正也示喻令學者兼看經史甚善甚善此間來學者少亦欲放此接之但少通敏之姿只看得一經或論孟巳無餘力矣所抄切巳處便中得數叚見寄幸甚然恐亦當令多就經中留意爲佳蓋史書閙熱經書冷淡後生心志未定少有不偏向外去者此亦當預防也如何季通行計乆未能辦近復有同母兄之喪旦夕或同過婺源然後入淛擴之巳去今想到彼乆矣到邑中擾擾臨行作此書不盡懐子約兄不及别狀意盖不殊此塾蒙收教舉家知感恐其懶惰未能頓革更望痛加鞭䇿千萬幸甚餘惟爲道自重答吕伯㳟昨承逺訪幸數日欵誨論開警良多别忽五六日雖在道途不忘向仰乍晴漸熱伏惟尊候萬福熹十二日早逹婺源乍到一畨人事冗優所不能免更一兩日遍走山間墳墓歸亦下能乆留也道間與季通講論因悟向來涵養功夫全少而講說又多彊探必取㝷流逐末之弊推類以求衆病非一而其源皆在此恍然自失似有頓進之功若保此不懈庶有望於將來然非如近日諸賢所謂頓悟之機也向來所聞誨諭諸說之未契者今日細思脗合無疑大抵前日之病皆是氣質躁妄之偏不曽涵養克治任意直前之弊耳自今改之異時相見幸老兄驗其進否而警䇿之也近思録道中讀之尚多脫悞巳改正送叔度處横渠諸說告早𥙷定即刋爲佳此本旣徃無以應朋友之求假但日望印本之出耳千萬早留意幸甚精義可𥙷處亦望𥙷足見寄只寫所𥙷假字注云入某叚下精義或以属景望刋行如何熹書中巳言之矣昨所問趙公時曽有虜使到闕事想巳得之此人回幸批示前日過拜石門墓下甚使人悽愴也因便拜狀草草正逺惟爲道自重爲禱答吕伯恭奉八月六日手教開警良深信來踰月秋霖爲冷不審尊候復何如伏惟德業有相起處多福熹前月至昭武見端明黄丈旬日而歸幸粗遣日無足言者黄丈端莊渾厚老而不衰議論不爲詭激而指意懇切亦自難及見之使人不覺心服益自愧其淺之爲丈夫也伏承誨諭辭受之說甚詳盖一出於忠誠義理之心非世俗欣厭利害之私所能及三復玩味使人心平氣和恨其聞之晩也然中間亦嘗妄意出此及𬒳不許之命則臨事又覺有忸怩處遂復以狀懇辭而甚婉其說但昨以書謝韓丈及此并懇廟堂則巳頗盡其詞蓋來教所謂不當廣者悉巳陳之矣諸公悉其狂妄必相垂念萬一不然則熹亦不爲有隱於今日冐昧一行蓋非所惜但恐所處亦不能如來教之所謂者則反有所激以爲身世之害未可知耳昨日得伯崇書道其所聞於周子正者則行止又似别有所制非復諸公所能斟酌矣然月末再狀巳行度旬月間必有决語亦㳟以俟命而巳復何說哉儒釋之辨誠如所喻盖正所當極論明辨處若小有依違便是隂有黨助之意使人不能不致疑而不知者遂以迷於向背非小病也自今切望留意於此豈可退託以廢任道之實幸其衰熄而忽防㣲之戒哉近思數段巳𥙷入逐篇之末今以上呈恐有未安却望見教所欲移入第六卷者可否亦望早垂喻也䘮禮兩條承䟽示幸甚或更有所考按因便更望批報也偶有便人夜作此附之未及究所欲言臨風惘惘子約兄未及别狀近讀何書所進何如有可見語者願聞之叔度向欲刻近思板昨汝昭書來云復中輟何也此人行速亦未及作書此事試煩商訂恐未有益而無損也未承教中正惟以道自重爲禱晦庵先生朱文公文集卷第三十三閩縣學訓導何器校
