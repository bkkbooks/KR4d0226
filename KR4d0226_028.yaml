body:
  text: 書時事出處與周丞相書戊申八月十四日熹前日専人奏記伏想尋當登徹昨日先所遣人還拜領鈞翰之賜感慰之極不可具言至於進職疏恩奉祠得請又出陶鑄尤以䘖戢然而丞相方且欿然深以前日不能力辨是非為病此則仰見大君子責巳之周又不自勝其愧仰也崇福謹巳拜命矣嫌名之喻曲荷記存此於禮律無疑豈敢更煩公聽惟是進職之恩則有所未安者蓋方以避仇自列而彼黜巳升內揆於心尚覺未免上九鞶帶之嫌况於他人豈容戶曉且於近制此等遷除雖非德選亦必有所託以為號今此何名也哉又况溫陵之行情狀未白此必怏怏尚有餘言且其為人亦嘗頗有時譽今日之去逺近必有為之不平者異時得以藉口則非獨為熹之書竊恐丞相亦不得不以為慮也大抵近年習俗凡事不欲以大公至正之道顯然行之而每區區委曲於私恩小惠之際本欲人人而恱之而其末流之弊常反至於左右拘牽倍費財處而卒又無以慰天下之公論此則熹之所不敢言而丞相之明其自知之亦不待熹之言矣熹今有公狀申省并以劄子遍懇群公語悉由衷即非備禮切望矜察早賜開陳得遂鄙懷乃荷大賜昨辭遷秩想亦巳蒙鈞念若猶未上得並與將上不勝幸甚與曹晉叔書熹辭免文字修寫方畢更一二日始得遣人未知所請竟如何然亦作一奏疏極道所懷此儻可為行止之決耳山間殊不聞外事只前月得都下書聞以諸人薦士之故近列有橫議者不知後來竟如何蓋其間有一二病根若不能去除不惟善類立不得亦非廟社之福也不承教之久渴仰無量顧無可入城之理坐成阻闊奈何奈何答陳同父書熹所遣人度月半前後到都城不知歲前便得歸否但迂滯之見書中巳説盡自看一過亦覺難行次第八九分是且罷休矣萬一不如所料又須别相度今亦不可預定耳來教所云心亦慮之但鄙意到此轉覺懶怯況本夾只是間界學問更過五七日便是六十歲人近方措置種得幾畦𣏌菊若一腳出門便不能得此物喫不是小事奉告老兄且莫相攛掇留取間漢在山裏咬菜根與人無相干涉了却幾卷殘書與村秀才子尋行數墨亦是一事古往今來多少聖賢豪傑韞經綸事業不得做只恁麼死了底何限顧此腐儒又何足為輕重況今世孔孟管葛自不乏人也耶來喻恐為豪士所笑不知何處更有豪士笑得老兄勿過慮也答陳同父書熹懇辭召命不蒙開允反得除用超異非常內省無堪何以勝此巳上免奏今二十餘日矣尚未聞可報踧踖不自勝來書警誨殊荷愛念然使熹不自料度冒昧直前亦只是誦説章句以應文備數而巳如何便擔當許大事況只此僥冒亦未敢承當老兄之言無乃太早計乎然世間事思之非不爛熟只恐做時不似説時人心不似我心孔子豈不是至公至誠孟子豈不是粗拳大踼到底無著手處況今無此伎倆自家勾當一箇身心尚且奈何不下所以從前不敢容易出來蓋其自知甚審而世間一種不相識有公論底人亦莫不知之只是吾黨中有相知日久相愛過深者好而不知其惡誤相假借以為粗識廉恥而又年紀老大節次推排遂有無實之名以至上誤君父之聽有此叨竊每中夜以思悚懼慚怍無以少答上下之望未嘗不發汗沾衣也不意以老兄之材氣識略過絶流輩而亦下同流俗信此虛聲將欲強僬僥以千鈞之重而不憂其覆跌狼狽以誤知人之明也辭免人行巳久旦夕必有回報似聞後來廟論又有新畨從官巳有以言獲罪而去者未知事竟如何封事雖無髙論然恐無降出之理萬一果如所傳則孤蹤尤是不復可出自今以往牢關固拒尚恐不免於禍況敢望入帝王之門乎彼去都城不逺想巳見得近日爻象矣萬一再辭不得即不免束裝裹糧為生行死歸之計承許見訪於蘭溪甚幸但恐無説話處向來子約到彼相守三日竟亦不能一吐所懷或先得手筆數行略論大意使未相見間預得紬繹而靣請其曲折庶幾猶勝匆匆説話不盡只成間追逐也與周丞相書熹間者側聞光膺詔册進保帝躬體貌益隆中外交慶熹既不獲追隨班賀之末又不獲以時奏記少見下懷瞻望門墻徒增悚惕前此率易申懇伏蒙寵賜教答誨喻丅寧眷念有加尤深感激惟是所請未蒙施行憂懼之深莫知所措區區鄙志前巳具陳既未能有以上動朝聽則亦不敢復申其説今者具狀獨以范參政進職近例為請伏惟丞相試一覽焉則朝廷之豫奪與熹之辭受其當否得失皆曉然矣然朝廷於此本無愛憎之私但為偶失參照則亦未為大闕獨使熹竊非其據而幸討論之不及則其辱大矣熹雖無狀竊深恥之萬一此請不遂熹豈容但巳蓋與其閔默冒受寧以罪戾竄斥為有榮耀也然熹之本心亦豈樂為是亢激者狀中巳備言其曲折矣并乞深察而力陳之庶幾聖主有以洞照其愚而亟遂其請則不惟熹之幸而免使丞相分上又添此一段不了事則亦不為無輔也前書率爾之言無足采取過荷開納愧悚良深顧今自謀之拙進退失據亦不復能為門館計矣袁侍郎歸來道間一見語殊未𣢾比聞其病欲往視之而賤軀衰乏尤甚未能自力念之不能忘也承問之及因輒布之疾病餘生無從復望覆舄伏惟深為天下之重千萬自愛熹不勝至願與李誠父書巳酉五月二日久不拜狀兹聞榮𬒳親擢進居六察之聮深以為慰比日清和伏惟台候動止萬福先生抱道不試然其心未嘗忘當世也門人弟子既不足以少承厥志而家有賢子足繼其業學者之望蓋非常人之比况新天子繼照之𥘉慨然有志於治而外則夷虜憑陵國威不振內則隂邪朋結國論未定此亦賢人君子效忠宣力垂名竹帛之秋也尊兄平日立志持身固有定論然區區更願一意為國無徇常日往還厚善之私深察天下公議之所在精慮而決行之使隂消於上而陽長於下政事修理而國勢尊安不亦老先生平日之所望於後人者乎熹託契深厚不敢效常人進諛詞以贊除用之喜狂妄及此不審尊兄以為如何胡公論事皆合公論甚強人意但二小諌之去殊可惜乃不能遂其言何耶諸公排逐正人乃以尊兄塞責此相輕之甚謂兄必不能為薛許耳不可懷此小恩而忘大辱幸深念之與張元善書辭免文字極荷留念危疑之迹久為賢者之纍尤以慚悚今復遣此人乃漕司借來省狀公劄巳與錢令自投矣只煩因見扣之狀藁録呈區區卑意只是如此更無他説如云立節抗論却非事實而反以益其疑忌蓋平生辭官只是兩事一則分不當得二則私計不便而巳非有他也所云如有差妄却與此事體不同若是本等差遣力所能堪豈有不受之理但名位超躐或非力所辦則亦不得不辭耳清源之説尤非所敢聞者中固不見容外亦非所堪衰晚如此精力昏耗一事做不得只得一日安靜即是一日之福此外無所求也對班果在何日不知欲論何事來書所云非甚利害不暇謀人者何見事之遲耶觀二諌之去江夏之升此乃不犯手勢而斡旋運轉無不如其意者自古小人所以敗亂國家豈皆凶惡猛鷙有可畏之威而後能之但有患失之心便自無所不至先聖言之精且切矣南臺西掖乃為差強人意者然不清其原而窒其流恐徒費力而無輔也況南牀擊去新諌此巳明與之忤渠既不得志必須更尋一枚如此等比置之本處不知又將何以為計此事不逺計只在旦夕矣可因見痛針劄之此公雖未相識然見其文字知其純厚不會罵人須力從臾之以速為上稍遲一日即壞一日事矣二諌之去必須有曲折幸子細報及天下事只有箇做有箇不做無如此依違僥幸之理彼之隱忍回互蓋曰將以有為也而所就者亦止如此與奮發直前者相去亦復幾何向使奮發直前果去禍根却未必不做得事也境外之事則諉曰無後假不知如此拱手安坐幾時是有後段時此事苦痛更是無告訴處不知祖宗之靈何負於此輩而忍至此也誠父遷後相見否聞渠曽與之鄰居相與甚厚須有以警覺之縱不能回戈奮擊且得不為所使以害善良亦幸事也蕭果卿𥘉除御史虞丞相意也人或賀之蕭喟然曰彼見吾憒憒謂我不能言而以是處我也其輕我甚矣不數日首論其黨遂并攻之論者服其勇云經總制錢若只如此減得不多全不濟事熹去年有一劄子曽降出否諸公之意非不欲速行只是怕諸路條上乞減太多難可否耳若未定論且守前説為佳過了此番又無時可理會也紹興和買熹向有一説欲減總額零數十四萬中減其四萬而後以田畝餘財諸般物力貫頭均敷庶幾重者得輕而元無者所增亦不至重後來不曽上得鄭書赴鎮時曽寫與之不知渠後來如何區處也廣西鈔鹽只是州縣苦之必不至大為民害今復官賣却須有害民處以本路觀之可見矣詳觀所論大率見得人情事幾未甚分明此乃平日意思不甚沉靜故心地不虛不明而為事物所亂要當深察此病而亟反之古人所謂安而後能慮定而後能應正為此也若只如此泛泛度日即恐枉得道氣之名而不享其利徒有損而無益也千萬留念答李誠父書副本垂示極感不外之意三復以還伏念頃侍先生教誨所論無非此事感念疇昔不勝悲歎又喜家學有傳遂為世用有以慰九原之思也首章所論乃古今不易之常道而在今日尤為要切然自世俗觀之不以為迂闊之常談道學之邪氣者鮮矣尊兄既發其端此必巳為彼等所惡然吾所以告君之道無以易此則亦何顧於彼但當守此一言以為平生議論之本他日論事每每拈出此箇話頭不論甚事都從此話上推出去則百病之根無所藏匿而於人主所以反躬正事之幾亦約而易操矣若把此話别為一事而當世之弊又自各為一事則內外精粗不相聮屬而真不免乎迂闊之譏矣切望勿忘此言每見必須拈出常令接續無少間斷則久久自見效矣恢復一事以今事力固難妄動然此意則不可忘頃見先生亦常常説今日但當將不共戴天四字貼在額頭上不知有其他是第一義今觀老兄所論亦得此意但當因此便陳內修政事之意而稍指切今日宴安放倒之弊乃為有力耳至於分察職事計亦默有所處此則大要在於詳審勿徇偏詞為善而覆護善人掩其疵疾之意亦不可忘耳又其大本則欲正人者必先正巳況欲正君而可自有不正之纍耶此在髙明處之必巳素定既承下問不容不盡耳答王謙仲劄子云云不勝千萬幸甚又蒙不鄙俯垂訪逮此見髙明之度雖以爵位德業之隆而自視欿然不自賢智至於如此甚感甚感顧熹至愚本無知識加以疾病廢學意見愈益闊踈其將何以仰承嘉命惟是平生所聞明公之節槩風烈凛然其非今世之士其尊主庇民之略蓋素所蓄積也今日得其位而施之於海內有識仰首拭目以望膏澤之流亦有日矣熹獨竊意明公之優遊不迫蓋將有所待而為之也雖然時難得而昜失古之聖賢蓋有皇皇汲汲而坐以待旦者唯明公不忘疇音之志而果斷奮發以乘其不可失之機則宗社之休生靈之幸也與留丞相劄子熹昨具短劄懇辭恩命方懼進越自取罪戾不謂乃蒙鈞慈還賜手教拜領伏讀感悚益深又蒙鐫喻丁寧褒與隆厚仰認至意尤切凌兢誠宜即日拜命便道之官服勤職業深求所以仰稱吾君吾相知遇使令之意而疾病之餘昏耗巳甚竊自揆度決無以堪一道委寄之重不免復具公牘再干朝聽而别以此私于下執事伏惟丞相國公詳加省覽特賜矜憐曲為敷陳仍卑祠祿使得卒逃吏議以遂餘生則熹不勝幸甚幸甚或恐朝廷未知熹之實病誤謂尚堪使令不忍終身置之間散則謀議之官若蒙陶鑄或可自效然以禮秩太優不敢有請伏惟相公試詳度之但熹雖出終不能久近則半年逺則周歲決須再有祈懇復勞區處不若及今便與祠祿之為便耳抑嘗聽於道路側聞乃者相公蓋嘗白發左右之姦斥之逺外所以輔君德振朝綱者甚慰中外之望熹雖愚懦亦不勝其喜幸竊意相公必將乘此機會大有建明以為宗社永久無窮之計而伏聽纍月未有聞也夫陽長而不遂進隂消而不遂滅此最安危治亂之機而昔人所深畏以熹之愚猶竊為相公慮之不識髙明何以處此而善其後也逺迹田間無由伏謁黃閣之下仰首一言以贊大慮引領東望不勝惓惓伏惟上為國家俯為人望千萬自重熹不勝懇禱真切之至小貼子熹目力昏耗不能細書楷字墨色濃淡行道欹斜殊不成禮本不能親書以所𬒳教出於手墨勉強作此率略殊甚伏乞鈞慈矜恕幸幸甚甚熹皇恐上覆與留丞相劄子巳酉十月二十一日熹竊以仲冬嚴寒伏惟丞相國公鈞候起居萬福熹頃以衰疾再辭恩命方懼僣瀆自速罪戾乃蒙丞相矜憐曲為敷奏改卑符竹以便其私固巳甚幸至於那移闕次不一而止倍費生成之力仰纍公平之政此又熹之所大懼也若使稍堪勉強豈復更敢辭避以招尤取閙而自棄於明時實以所苦目疾浸以增加臨漳雖名事簡然一郡千里生齒萬數獄訟財計所繫不輕若以愛身之故漫不加省而委之他人豈得自安若欲一一親臨則竊自揆度決有所不能堪者前日所以力辭江東之行良以此故竊意為熹言者亦未究知其實而或雜以他説是以丞相雖巳憐之而猶未深信其必然也以熹今日精力之所堪惟有奉祠一官可竊升斗之祿又復惟念君相之恩隆厚至此而熹必求間退固執不回則或者之論必又有以為羞薄詔除而加以傲上無禮之罪者是以今者冒昧朝聽不敢專以祠祿為請蓋巳出怵迫無聊之計而陷於貪冒苟求之譏矣伏惟丞相試加察焉賜之一言明其實病而復與之祠官之祿使得休養神明避逺讒謗庶幾未死之間及見丞相格君定國之效使羣邪屏伏而衆賢彚進姦言熄滅而公論顯行國勢尊崇於上民心悅豫於下則熹雖在田野之中亦得以安心肆意明目開口為太平之民其與懷抱憂畏側肩屏息以寄其身於吏民之上者屈伸苦樂萬萬不侔矣若丞相亦以熹前所疑有不得不慮者則謀曹之請願垂意焉然此巳為甚不得巳之計萬一近地或無見次則又不必謄那增創以致人言但與祠官乃其舊物縱使得罪亦易辭也熹未嘗有一日灑掃之勞於門下而丞相知之之深念之之悉至於如此故熹不敢不盡其愚伏惟丞相擇而處之千萬幸甚未由趨拜門館伏乞上為兩宫倍保崇重永扶公道以福蒼生熹不勝至願與黃仁卿書熹行義不修無以取信交遊遂使中傷之禍上及先賢若非神聖鑒知則其流害將不止於不肖而巳負此悚惕無以自容熹竟不免臨漳之行示喻積弊此固當然其橫斂擾民為害有大於此者到官之後須次第討論更革之今未敢泄此意若過劒福得左右在彼面議為幸或出沙縣亦當先附報奉約一出相會也於州縣事體本自生踈又多時不出意思踈懶既承當了擔子便又苟簡不得甚欲子細啇量也請祠事亦似不必如此隨分仕宦不起患得失之心何處不是安地政不須如此若論為學則在官何嘗不可為學直患自不愛日用功耳買田舉子之説甚善此間周居晦劉晦伯皆有此議但愚意以為如此則只做得一事不如斂散既可舉子兼可救荒又將來田租亦為豪民坐欠催督費力此建陽巳見之弊須更子細商量大抵事無全利亦無全害但算其多者為之耳只恐一日飢荒却思此米無討處也答趙帥論舉子倉事庚戌次月𥘉十日請米不得折支價錢元立約束逐月三次支米使生子之家不過一旬便得接濟極為利便但支米官獨貟自支或不得人則徇私作過無所不有至有將私家所收輕禾泛榖重行估折者亦有將所支官米準還本家私債者似此之弊不一而足不但折支價錢而巳故中間甚不得巳而改為三月一支之法雖期日稍逺然却得關會諸都附籍鄉官同在一處不容大段作弊鄉人雖是得米稍遲却無邀阻乞覔之患亦頗安之今欲一月一支誠為中制然若不關集諸附籍官則獨支之弊復如前日若欲盡行關集則一月一來其稍逺者不無厭倦支米官又利其不來決不便行申舉因循視效必致無肯來者而獨支之弊又如故矣反復思之只有一説雖或未能盡革舊弊然亦勝於不行欲乞更於所示事目本文次月𥘉十日請米一石之下注云仍舊關集諸附籍鄉官各將本籍前來參驗方得支給注止此仍於後項立法支米以恤其私見第三項則或可以責其必來而免致復有獨支之弊如其不然雖欲多設關防曲行小惠徒為文具終有損而無益也佃戶人戶欠米未有約束舉子根本全仰諸莊佃戶送納租課諸都人戶回納息米今佃戶多是豪猾士人仕宦子弟力能把持公私往往拖延不納至有及來年夏秋而無敢催督之者請米人戶間有形勢之家詭名冒請一家至有百十石鄉官明知其然而牽於人情不能峻拒亦有慕其權勢而因以為納交求媚之計者亦有畏其把持嘲誚而姑為避禍苟免之計者及至冬月回納之時又皆公然拖欠鄉官無如之何縣官亦復畏憚不肯留意催促遂有經隔年歲終不送納者麻沙常平社倉曽𬒳一新登第人詭名借去一百餘石次年適值大赦遂計會倉司人吏直行蠲放緣此鄉俗視效全無忌憚視此官米便同巳物歲久月深其弊愈甚若不早加覺察將欠多人追赴使司勘斷監納佃戶即令召人剗佃則數年之後根本蹶拔鄉官徒守空倉舉子之家無復得米之望矣諸縣措置官下書手月支米五斗如此則措置官似亦當有月給兼第一項所陳利害欲乞并就此條立法若云諸縣措置官月支供給錢若干折米若干逐官下置書手一名月支米五斗支米附籍鄉官逐月每人支米若干以充茶湯飲食童僕往來之費此數未敢擬定更乞詳酌稍優為善與陳憲劄子熹輒有愚悃仰干台聽昨以漳浦黃尉不納軍糧營私廢職致寨兵飢餓狼狽事有可憂不免具狀申省部諸司例皆不蒙行下獨荷使臺留意差官前來推勘官吏聞風無不震悚今者忽𬒳使檄乃問本人有無情弊固巳愕然續得勘官關報又云巳奉台旨住行起發不惟熹竊疑之一郡士民無不驚怪以為使臺舉措不應如此熹雖巳具回申具言本人罪狀明白不待更有情弊然後可按故本州前此申狀𥘉不謂其别有他罪乞照巳行事理施行不審巳蒙台察與否如何也然兩日以來竊伏思之此事本非區區敢容私意正為州郡差使不行以至欠闕軍糧事勢危迫若不懲治深恐官吏習見州郡事體削弱不能使人向後迭相倣效無所稟畏萬一一旦稍有緩急事將有不可勝慮者所以勢不得巳須至按劾然猶以諸司在上不欲遽爾具奏既見使臺特加究治竊料台意必有所處而不意一旦自為縱弛以至於此也伏惟提刑郎中以清名直道有聞於時必不肯容請託之私以廢公法不知此何意也熹昨巳具狀申省部諸司乞避此尉又念台慈顧遇過厚不應遽爾妄發遂且引郤區區衰病雖巳求去然一郡之防則有不當以熹之將去而遂廢者是猶不能已而一言之伏惟髙明少賜矜察果於去惡而無為因循中輟之計以壞紀綱以損名譽則非熹之幸乃此邦之幸乃閣下之光也頃年嘗讀鄱陽去郡之章至有雖鼎鑊有所不辭之語嘗竊壯之以為此真今世之古人其剛大正直之氣不可屈撓乃如此而亦意其必能有以容夫度外逆耳之言也是以不敢不盡其愚伏惟幸察與留丞相劄子熹輒有誠懇仰瀆鈞聽熹衰病餘生不堪從宦兹蒙誤恩假守黽勉南來意謂若幸無他疾痛可以冒昧歲月然於職事亦不敢不盡其愚前此依凖通融蠲減指揮乞免上供罷科茶錢及減無額經總制錢之額以至恭奉聖旨相度經界利病皆是一郡永久利害而經界尤利害之大者所以不避僣率極意盡言不敢少有顧望前郤首鼠兩端之意退而講究巨細本末不敢不盡規摹措畫蓋巳什八九成矣鄙意無他蓋以本州田稅不均隱漏官物動以萬計公私田土皆為豪宗大姓詭名冒占而細民産去稅存或更受俵寄之租困苦狼狽無所從出州縣既失經常之入則遂多方擘畫取其所不應取之財以足歲計如諸縣之科罰州郡之賣鹽是也上下不法莫能相正窮民受害有使人不忍聞者熹自到官蓋嘗反復討論欲救其弊而隱實郡計入不支出乃知若不經界實無措手之地所以前此申奏欲得及此秋冬之交早賜行下竊聞廟堂有意施行版曹亦無異論亦蒙丞相賜書喻意謂必可行熹區區自喜竊謂漳民自此可脫塗炭之苦而熹區區疆顔扶病亦不虗為此來矣不幸心勞事拙賦政不平前九月中州境屢有地震之異未及自劾以聞而舊疾發動遍傳兩足連及右臂痛楚呻吟不可堪忍以至滿散錫宴之日皆不得少伸臣子歸美報上之誠今雖少能自力扶曵出廳執捉批判而病中服藥多是踈利發散之劑精神氣血衰竭殆盡無復筋力可以支吾又况所請罷科茶錢無額經總之屬皆久不蒙開允經界聞亦有陽為兩可而隂實力沮之者只今巳近冬至更五十日即是新春設使便蒙施行亦無日子可以辦集至於按劾弛慢不虔之吏諸司又不主張甚或巳行取勘而無故自引罷者如此使熹寧復更有顔面可臨吏民鄙性狷急不能俯仲前日所以杜門空山甘忍窮餓而不敢有意於仕宦正以此耳今年六十有一衰病侵凌行將就木乃欲變心從俗以為僥幸俸錢祿米之計不亦可羞之甚乎憤悶無聊不能自抑巳具奏牘干犯天威乞從罷黜而并以此私布腹心于下執事伏惟某官少賜矜憐曲加陶鑄或使復得奉祠歸死巖壑則又千萬之幸而非熹之所敢望也抵冒崇嚴俯伏俟命熹不任恐懼震栗之至與趙帥書辛亥二月雷雪之變誠可憂懼而寒雨連月隂盛陽微天雖不言意極彰著此亦可深慮者但求言之路未廣不知果有切至之論可以感寤聖心解謝天意者否侍郎身雖在外然以宗屬之親侍臣之重而平日愛君憂國之心與今之從政者不可同日而議適此幾會似亦不容默默以自同於衆人也不審囊封入告當復以何為先區區願竊聞之以寬婺矛牙緯之憂因來密喻千萬幸甚近聞有旨招填諸州禁軍寄募沿江戍卒兩事並行似難辦集且今日州郡禁軍緩急何足恃賴正當别作措置以漸消除而悉收江上諸軍子弟刺填本軍以時練習却令分下諸州就糧以省餽運防緩急歲時更代却還本軍則其事勢自然不敢退墮而州兵之未消者亦得以激厲增進乃為長久之計今不慮此反令州郡泛行招刺若守將不得其人則適足以資其賣鬻之姦而空耗衣糧重傷民力又未論也至於寄招之令則棄子弟素習之技而取浮浪無能之人尤為非計似聞軍中向來以不堪用嘗奏罷之數年之間州郡得以少息勞費不知今日有何急切而忽取此巳棄之繆䇿而復行也往在南康日見隆興所發之人全船遁去并與部轄掌事者皆不復還移文鄰郡搜捕甚急此等之人設使到得軍中亦豈復堪倚仗也竊謂此二事者在帥司亦合申請更以書曉諸公必不得巳且罷寄招而稍遞增禁軍本等及大等第斗力必使及挌方許收刺仍於逐年奏帳本名之下各注斗力不測點名抽喚令赴帥司按拍則猶庶幾其或可用也此間子弟投募者衆因限以必及次髙疆斗力乃收而來者亦不少此亦巳試之驗也與趙帥書辛亥三月二十三日熹竊見元降指揮將海船作三畨拘集聽候募發後來節次有旨許令當番船戶只在本州界內逐便漁業此見朝廷燭見幽逺務從寬恤之意然去年三月八日方降指揮本州四月八日方始𬒳受則船戶拘集巳久不無廢業官吏恬不省察恣行邀索直至命下尚且拘留適熹到官之𥘉究治姦弊方得放散以此之故船戶畏憚不肯如期到岸聽候點檢欲望使司特賜申明乞降指揮今後當畨船隻追集到岸日下差官點視即時逐旋放散令於本州界內漁業委自守臣專切挂意不得拘留向後年分並依此施行更不候别降指揮實為利便恐或未欲如此施行即且乞逐年𥘉冬便與預先行下使船戶知得到州點視便得放散自然樂於聽命不致誤事答陳漕書近因使還巳具經界乞候將來農隙施行利害申稟伏想巳塵台鑒未奉回降但增悚惕今準使牒便令差官熹前此準擬外州一二待闕官近聞朝論大以為不然此亦小事不欲固爭勢須别行踏逐外州一二官員相添乃可集事蓋此四縣龍溪縣官皆可委仗不須差人龍巖山多田少只一劉尉永嘉士人嘗從王亞夫遊頗知經界利病足當一縣或更助以一人亦得長泰縣小地狹或更須一人但漳浦地廣而荒尤費區處而宰丞簿或老或繆皆不堪使只有一尉曉事然亦是巡捕官巳擬用一龍巖簿貼之然更須得兩人或三人乃足用州官中亦未見能曉事有可差者容更踏逐别得具申但既未即施行即且小候詳細差撥庶得其人乃為有輔不審台意以為如何巳具公狀申述拱俟回降即當遵稟與留丞相劄子經界巳𬒳漕檄竊聞此事丞相極勞經畫乃得施行千里貧民無不知感但恨聞命之日巳是正𥘉農事方興不容措手巳申漕司乞候十月一日下手打量矣其合預行措置事件則目今不住施行講究令益精審以俟及期而行必不致有誤事但此事之行雖細民之所願欲而豪家右族倚勢并兼者惡其害巳莫不隂謀詭計思有以動搖未知此八九月之間事體又復如何更願丞相深察其情而以天下至公之理裁之有以終惠此邦之人而不墯於騰口間説之計則如熹等輩尚得以奔走塵坌泥塗之中上為國家均愛赤子而徼幸於有成如其不然則雖賤軀自可支吾亦當别以微罪自劾而歸不敢遊丞相陶鈞之內矣熹以本郡不曽𬒳受省劄不敢具申其回報漕司狀檢謹録一通冒浼鈞聽僣率皇恐蠲減錢物竊知巳下漕司亦當一靣條具申稟彼司聽候處分更望廟堂力賜主張使不奪於有司出納之吝則非熹之幸乃此邦之幸非此邦之幸乃此民之幸也國家愛惜斯人如護元氣不忍以毫髮擾之詔令所頒戒飭州縣未嘗不以嚴禁科罰為言而其所以取之州縣者乃如此是則陽為禁止而隂實縱之又從而驅之使必出於此聖主在御丞相秉鈞豈忍為是以欺某民哉熹前書晉越冒進所聞中間伏奉手教開納誨諭周至三復以還喜懼交集然逖聽纍月竟未聞公論之勝邪説之消如丞相之言者顧其當勝而反消當消而反勝者則有之矣州縣粗官不當議此惟丞相深圖之則天下幸甚天下幸甚熹瞻望台躔不勝依仰敢乞上為兩宫益加鼎食之衛千萬至懇與留丞相劄子熹誤蒙選擇備數海邦又𬒳詔旨特許本州推行經界以惠疲氓方幸得以罄竭駑頓仰副使令而不幸遽聞長男之訃悲痛不堪自度精神思慮將有不可得而黽勉者巳具公劄申稟乞賜陶鑄宫觀差遣使得蚤歸營辦喪葬收拾孤婺矛牙切望哀憐早賜敷奏千萬幸甚熹又有愚􅈤本州判官葉機假滿百日依條離任念其貧病巳許為伸嶽祠之懇未及而遽遭此禍然不欲食言并有劄子率易投納伏惟鈞慈不忍一物之失其所并賜垂念則不惟葉機之幸亦熹之幸也方寸迷亂言無倫次伏𥿄不勝皇恐俟罪之至與留丞相書四月二十四日熹竊以孟夏漸熱伏惟丞相國公鈞候起居萬福熹逺守偏城日荷臨庇昨以哭子悲傷私計不便干冒威嚴巳深震悚而前此人還蒙賜手教存撫甚至且有憐其久處瘴鄉之意伏讀反側不知所為熹去歲之病乃是宿疾發動即非染瘴不知趙帥何故乃爾具稟致煩軫念況此邦事簡俗淳今歲以來吏民亦粗相安又經界巳得指揮若非家有私故則熹非唯義不當去亦不願舍此僻逺之安而就繁會之危也幸今巳聞奉祠之請既有成命此蓋丞相察其哀懇而陶鎔及此千萬幸甚雖論撰華資所不當得然亦且得去此只俟受命一靣控辭而於前路聽從欲之報也計差去人不三數日會當至此但今郡中却有二事不免具狀申奏其一為昨來所乞蠲免罷科茶錢巳蒙行下漕司相度今計郡中自可樁辦只乞降旨約束官吏不得沿此為名似前科擾不敢更煩蠲免應副而所乞除減無額一項五千緍者即乞特詔有司便與施行庶為一郡久逺之利其一為漳浦髙知縣登忠言直節不幸貶死欲望聖恩特與昭雪褒録其家二事皆乞丞相留意開陳得從所請千萬幸甚雖當去此而惟君相所以遣之此來之意似非偶然欲圖以報萬分者是以於此有所不能忘懷其他瑣細亦有合因革者然其事在州郡而不在朝廷又不敢以煩鈞聽也其他至如經界一事若非丞相力賜主張則浮議動搖其罷久矣兹者又蒙垂諭諄悉尤切感歎此事貧民所欲而富者不願理勢甚明似不難曉而羣言胥動噂沓萬端則不唯愚者惑之而賢且智者亦或不免此可怪也然此邦之人富者尚少其力能沮議而得關説於前者亦不甚多熹之所憂獨恐溫陵富室既多其間豈無出入門墻之下承眄睞之恩者必將巧為詞説乘間伺隙以濟其私竊願髙明審加察焉使此邦之績不敗於將成則泉汀以次悉蒙其利而三州之境窮苦無告之民無不感戴生死肉骨之恩矣昨來陳憲委官來此啇度因令行視田野汀之行賈聞之驚喜相率拜其車下問此法何時可及吾州此可以見夫人之真情矣而必為説以敗之而圖自利其亦不仁也哉往時有閣門舍人林宗臣者亦丞相之邑子嘗因奏對論及此事其言憤激痛切蓋有所指今泉之貧民願士人人能誦道之公議良心不可泯沒彼沮之者設不出此子孫決不乞食獨何必過為之慮而蒙此詬於其身耶是可歎巳惟丞相深念有以反之此又自為門下之計而非獨為三州貧民計也熹又蒙垂諭深以士大夫之朋黨為患此古今之通病誠上之人所當疾也然熹嘗竊謂朋黨之禍止於縉紳而古之惡朋黨而欲去之者往往至於亡人之國蓋不察其賢否忠邪而惟黨之務去則彼小人之巧於自謀者必將有以自蓋其迹而君子恃其公心直道無所回互往往反為所擠而目以為黨漢唐紹聖之巳事今未逺也熹雖至愚伏讀丞相所賜之書知丞相愛君憂國之心無一言一字不出於至誠惻怛此天下之賢人君子所以相率而願附於下風也而未能不以朋黨為慮熹恐丞相或未深以天下之賢否忠邪為巳任是以上之所以告于君者未能使之判然不疑於君子小人之分下之所以行於進退豫奪者未能有以服天下之心慰天下之望而隂邪讒賊常若反有侵凌干犯之勢丞相又慮此身自陷於君子之黨而使彼之蓄憾久而為禍深也又稍故為迷亂昏錯之態以調柔之反使之氣豪意健旁若無人敢於干祿之章肆為誣善之語而朝廷亦不之問也夫杜門自守孤立無朋者此一介之行也延納賢能黜退姦險合天下之人以濟天下之事者宰相之職也奚必以無黨者為是而有黨者為非哉夫以丞相今日之所處無黨則無黨矣而使小人之道日長君子之道日消天下之慮將有不可勝言者則丞相安得辭其責哉熹不勝愚者之慮願丞相先以分别賢否忠邪為巳任其果賢且忠耶則顯然進之惟恐其黨之不衆而無與共圖天下之事也其果姦且邪耶則顯然黜之惟恐其去之不盡而有以害吾用賢之功也不惟不疾君子之為黨而不憚以身為之黨不惟不憚以身為之黨是又將引其君以為黨而不憚也如此則天下之事其庶幾乎前年逐二諌官去年逐一御史近聞又逐一諌官矣上下不交而天下將至於無邦丞相不此之慮而慮士大夫之為黨其亦誤矣熹雖荷知奬而未遂掃門之願顧蒙出語之勤似不為無可取者是以輒空胸臆少答恩顧不自知其狂且妄也干冒威尊俯伏震懼伏惟寬容有以裁之瞻望黃閣無由趨拜敢冀上為國家倍保崇重熹不勝下情千萬懇禱之至熹竊見紹興𥘉年趙忠簡公為相一時收用人材之盛後來莫及然細考其間亦豈無不滿人意者但其多寡之勢此強彼弱故雖少雜而不能害治當時有小元祐之號今者竊觀丞相之心即趙公之心然論一時人材賢佞之勢則此少而彼多此弱而彼疆此則區區所以不能不深憂而輒以分别賢否忠邪之説為獻於門下也伏乞鈞照熹皇恐又覆熹又蒙垂諭陳憲趙守曲折謹悉陳憲於此極留意熹前劄巳具稟矣昨見移節方竊憂之不謂鈞念巳及此也幸甚趙守舊識之有心力肯向前誠如尊命然更得一言勉之幸甚近因遣官下鄉分界且遍喻父老以所為方量之意并以算法授之人見其簡易易行無不悅喜今見熹去頗以為憂而不知丞相主張之力𥘉不為熹一介作輟也更乞加意垂念千萬至幸熹皇恐又覆與留丞相書七月十日熹竊以孟秋猶熱伏惟丞相國公鈞候起居萬福熹區區賤迹自四月二十六日解罷郡事越三日遂發臨漳五月二十四日遂抵建陽因遂寄寓以畢喪葬但悲惱之餘無復生意仰賴巨庇偶未即死耳七月四日始𬒳省劄并領手教之賜仰荷鈞慈垂念之厚但所請上還進職恩命未奉俞允上恩隆重威令巳行知友皆謂不當復有干冒而反覆以思竟未得其所以可受之説不免復從建寧借人持狀申省愚慮悃𣢾罄竭亡餘不敢重浼崇聽得賜省覽詳悉開陳上謹聖朝豫奪之公下全匹夫辭受之義則熹不勝千萬幸甚又蒙垂喻經界利病乃是溫陵士夫猶有公論始者但見漳人有仕於朝者奔走權門日肆搖沮而妄疑之耳數日前陳憲按部經由亦有所聞深不自安改送之請殆必為此然周漕始至相見首問及此云恐朝廷或從陳憲之請即欲略知曲折未知後來既聞浮議紛紜之後又復如何此非間人所敢干預第因下喻之及敢布所聞耳無額錢事曲蒙垂念尤深感戢版曹今當巳有定論但恐出內之吝有司常態須仰廟堂力賜主張始可不乖所望也髙古縣事不審巳作如何施行此事南方之人無不聞知况如丞相尤是目暏而梁文靖公向來亦嘗為之申雪固不待鄙言而後信但得榻前委曲敷陳特與昭灑則不唯直既往之冤申泉壤之恨而自今以往忠言日聞於丞相效美遜直之心亦不為無所助矣如聞比日朝士有以不願為忠臣之説當上心𬒳親擢者逺方傳聞不知信否如審有之則小人過計之憂恐其不得為興邦之言也又聞其人亦嘗出入門墻深辱知顧當是其時未有此論如又不然則知言知人之訓妄意丞相更當留意博求直諒之賢置之東閣與圖天下之事則大人格心之效不日可見而勳業之茂不但踰於前後數公矣諸葛武侯之教有曰諸有忠慮於國者但勤攻吾之闕則事可成賊可死功可翹足而待矣太祖皇帝嘗語侍臣唐太宗虗心求諌容受盡言固人主之難事然曷若自不為非使人無得而諌之為愈乎至哉言乎大哉言乎愚竊願以武侯之言為丞相獻又願丞相以太祖聖訓日啓迪於上前也至如朋黨之論則前記所陳有未究者致煩鐫喻至於勤縟三復愧悚不知所言章蔡之禍誠如尊命但忠賢奔播至於如此推本其原蓋自有在而九年之間黜幽涉明培固根本其效見於靖康建炎之際者民到于今賴之又自有不可誣者若其無此而元豐紹聖便相傳襲則後日之禍豈但若此而巳哉前輩有論嘉祐元豐兼收並用異趣之人故當時朋黨之禍不至於朝廷者世多以為名言熹嘗謂此乃不得巳之論以為與其偏用小人而盡棄君子不若如是之猶為愈耳非以為君子不可專任小人不可盡去而此舉真可為萬世法也若使當時盡用韓富之徒而并絀王蔡之屬則其所以卒就慶曆之宏規盡革熙寧之秕政者豈不盡美而盡善乎後之覽者得其言而不得其心知退守其所為不得巳之論而不知進求其盡美盡善之䇿是以國論日卑而天下之勢卒至於委靡而不振此可悲也至如元祐則其失在於徒知異巳者之非君子而不知同巳者之未必非小人是以患生於腹心之間卒以助成仇敵之勢亦非獨章蔡之能為巳禍也然則元祐之失乃在於分别之未精而丞相以為太甚熹竊有所未喻也是以知言知人聖有明誡區區巳效於前矣深願丞相之加之意也抑又聞之天下事勢有消長賔主之不同以易而言方其復而長也一陽為主於下而五隂莫之能遏及其遇而消也五龍夭矯於上而不足以當一隂羸豕蹢躅之孚甚可畏也丞相觀於今日之勢孰為主而方長乎孰為客而方消乎孰能制人而孰為制於人者乎於是焉而汲汲乎以求天下之賢以自助使之更進迭入日陳安危治亂之明戒以開上心排抑隂邪無使主勢小傾而陷入其黨尚恐後時而無及於事不精而未免有失亦何遽至預憂其分别太甚而為異日之患乎熹未獲趨拜而辱知至深且今分甘投老無復世念故不自嫌而冒昧及此伏惟赦其狂妄而取其愚忠千萬幸甚當暑目昏作字不謹并丐原恕自餘唯冀上體兩宫之眷俯慰四方之望加毖重茵列鼎之衛以究久大之業千萬幸甚與留丞相書十月四日竊以孟冬漸寒伏惟丞相國公鈞候起居萬福熹昨者人還伏奉省劄喻以聖恩褒借不許終辭之旨又蒙鈞慈加賜手教所以開曉尤極懇至伏讀再三仰體吾君吾相委曲眷憐之意如此其厚謹巳齋祓祗拜告命奉表稱謝矣恭惟丞相國公知遇之深固不以世俗常禮見望然亦有不敢廢者鄙語卒章少見所以圖報之實儻蒙照察千萬幸甚高古縣事特蒙主張得𬒳仁聖漏泉之澤九原忠憤一旦獲伸丞相所以褒顯忠直擯抑姦諛之意不但施之今日周行之間所勸多矣龍溪亦蒙收召之恩始望蓋不及此第切惶恐無額錢事近聞巳蒙施行邑中尚未見報未敢致謝此錢雖是州額從來拋下諸邑漳浦為多此縣比年殘廢巳甚熹向來措置州郡自為抱認罷科茶錢數千緡今若得更免此則此邑庶幾有可整葺之望萬一今來方是行下漕司指定即將來更望丞相力賜主張始終其惠使此邑疲民免於非理科罰之苦千萬之幸或巳俯從所乞盡賜蠲除則熹昨奏抱認罷科茶錢事雖無施行亦乞行下本州遵守不得再拋下縣仍切覺察勿令諸縣以此為名妄行科罰此又永久之利也此錢自係上供之數不敢求免本自不必具奏所以有前日之請良以此耳伏乞鈞察熹未嘗有一日灑掃之勞於門下而丞相所以知奬優異不在衆人之後顧今精神耗竭筋力疲憊無復可期以伸報效區區願丞相深觀大易隂陽消長否泰往來之變謹察君子小人之分而公進退之母為調停之説所誤使忠言日聞聖德日新而天下之人真享富壽康寧之福朝廷之上真見平平蕩蕩之風則衰病之軀老死丘壑無所憾矣如於忠邪之分察之有未明消長之戒信之有未篤而又以一身利害之私參錯乎其間則今所謂持平者是乃所以深助小人之勢以為君子之病將見彼黨日盛此勢日孤天下之事將有不可為者丞相雖欲奉身而退窮勝事而樂清時亦不得辭後世良史之責矣熹不勝感德之至輒復冒昧言之伏惟恕其狂妄而采其千慮之一得焉則又幸之大者瞻望門墻無由伏謁伏乞以時為國千萬自重熹至懇至禱死罪死罪與留丞相書十月十二日熹區區賤懇巳具前幅必蒙矜念俾遂退間不敢重出以煩公聽惟是昨因致謝輒罄鄙懷狂妄僣率不勝皇恐然自遣人之後即得朝士私書語及近事恭聞丞相忠誠感格天意為回重隂之底復有陽復之漸乃竊自幸其言之不效既又反覆以思則恐今日之事未足為喜而前日之論猶有可思者也蓋自古君子小人雜居並用非此勝彼即彼勝此無有兩相疑而終不決者此必然之理也故雖舉朝皆君子而但有一二小人雜於百執事之間投隙抵巇巳足為患況居侍從之列乎況居丞弼之任而濳禃私黨布滿要津乎蓋二三大臣者人主之所與分别賢否進退人材以圖天下之事自非同心一德協恭和衷彼此坦然一以國家為念而無一豪有巳之私間於其間無以克濟若以小人參之則我之所賢而欲進之者彼以為害己而欲退之我之所否而欲退之者彼以為助巳而欲親之且其可否異同不待勉爭力辨而後決但於相與進對之間小為俯仰前郤之態而巳足以敗吾事矣是豈可不先以為慮而輕為他計以發其害我之機哉此猶姑以鈞敵之常勢言之耳况今親踈新舊之情本自不侔忠邪遜逆之趣又各有在彼巳先據必勝之地而挾羣黨以塞要衝凡一舉手一搖足皆足以為吾之害下至近習纎人亦或為之挾持簡牘關通內外以助其勢而吾乃兀然孤居孑然特立絶無蚍蜉蟻子之援可與用力於根本之地以覺上心而清言路其可望以為公道之助者不能留之蹞步之間而欲求之千里之外彼方為主而我方為客彼方為刀而我方為肉此固天下之危機敗證而又時取彼所甚惡之人置之不能為助之處徒益其疑而無輔於事愚恐雖能遍起天下之賢人君子置之內外彼亦不必動其聲氣但隂拱而微伺其勢似能害巳則便一眴目而羣吠四起使來者或未及門至者或禾暖席而巳狼狽倉皇奔迸四出矣尚何國事之可圖哉今日之事丞相以為但去一人班列便無小人臺閣便無異論乎胡不觀於鄭尚書王著作孫司業之遂去而不留袁溫州之巳除而中寢此皆誰實為之也哉以愚觀之但見其操心益危慮患益深而為祟益甚耳語曰治水不自其原末流彌增其廣又曰射人先射馬禽賊當禽王蓋慮此也去年劉副端𥘉除抗論震動朝野善類相慶而熹獨深憂之今日之勢何以異此伏願丞相試熟計之而亟隂求學士大夫之有識慮氣節者相與謀之先使上心廓然洞見忠邪之所在而自腹心以至耳目喉舌之地皆不容有毫髮邪氣留於其間然後天下之賢可以次而用天下之事可以序而為也如其不然則自今以往丞相之憂乃有甚於前日是以熹竊危之而未敢以為喜也辱知之厚不敢不盡愚惟髙明察之抑天下之事固多以欲速而致敗然見幾不蚤猶豫留時亦智者所甚懼也今日在我之勢固為甚危然乘隙疾攻正在此時投機之會間不容息惟丞相深計而亟圖之則不唯善類之幸實宗社生靈之幸熹死罪死罪與留丞相劄子熹竊以孟冬冰寒伏惟某官鈞候起居萬福熹昨蒙聖恩超遷聀秩懇辭不獲更𬒳寵褒又得竊食祠官之祿以便私計而卒其舊業公朝誤恩於熹巳為厚矣故熹前日奏記蓋嘗略陳其説以伸謝悃意謂必蒙矝察不意今者又𬒳省劄乃復將有所使令聞命驚惶進退失據至以家門患難之私賤軀殘朽之故反復推較則又皆有所未安者巳具申狀稟劄一二條陳以干公朝之聽顧猶有未敢盡其言者而復以此私于下執事伏惟某官特賜矜憐少垂寬假使得躬視埋葬以塞老牛舐犢之悲休飬神明以駐衰頺就盡之景更以餘日討繹舊聞以副聖主華衮之褒而助明時風化之美則某官之恩之德又將𬒳于存沒而無窮矣干冒威尊不勝戰灼又以近方拜啓不敢復以纍幅仰勤聽覽并冀垂察唯是瞻望門墻無復趨拜之日下情尊仰不勝拳拳敢乞上為兩宫倍保崇重長輔聖主永康兆民熹區區無任祈懇激切之至與趙帥書熹適間道左拜違不勝惘惘移刻伏惟台候動止萬福所需文字適方檢得謹以內呈復有少稟乃適間所忘記者熹辭免文字度今巳到久矣台斾到闕日若巳得請則無他禱萬一未遂則望特為一言及此私計未便之實使早得從鄙願千萬之幸經界一事將來本欲説破以昨夕見教之勤且復隱忍但此事不可不使彼知之亦幸為詳言之則熹雖不言而義亦伸矣蓋此一事貧民以為利而并兼豪奪之徒以為不便其理甚明故當時臣僚建請而朝廷行下諸司諸司行下諸郡泉汀之言雖有異同而諸司察其無理幸以熹言為是反復論難蓋千百言以聞於朝則其慮之巳不為不審矣今雖有此一人之訴朝廷亦合審其虛實押下諸司再令審核則其教誘資給誣罔之罪必將可得如其不然諸司中必有觀望風旨自為前郤者此謗猶有所分不專在於朝廷也今所施行乃匆匆如此是朝廷不以臣僚之言為可信又不以熹之言為可信又不以諸司之言為可從而偏聽此人之説與其教誘資給者之説也丞相相知甚深薦引存問不為不厚熹雖知不足以堪此然平時狂妄所以傾倒不敢自他者亦不為不至故前日之辭免不敢決然為不出之計而於馬二卿書復露異時乞郡之請此意亦可見矣今以此事觀之乃知丞相所以見遇者乃在漳州進士吳禹圭及諸教誘資給者之下今雖無恥其敢冒此而進哉熹伉拙竒蹇一出而遭唐仲友再出而遭林黃中今又遭此吳禹圭矣豈非天哉天實為之豈敢尤人然復云云如此者猶感丞相相知之意而懼其以此待天下之士也幸侍郎一為誦之千萬至望與留丞相劄子熹竊以季冬極寒伏惟丞相國公鈞候起居萬福熹昨者妄以小夫竿牘干冒崇聽方懼僣瀆以取罪咎乃蒙賜教纍番加以真翰所以慰答其意者甚厚至於懇避恩除以便私計亦蒙矜憐委曲鐫喻而馬侍郎黃寺簿吕司令又皆以書具道鈞意甚悉區區下情不勝感激之至謹巳仰體盛旨不敢復以家事為言但經界妄議竟煩寢罷則熹之罪戾有不敢自赦者朝廷寬大雖不忍置之重辟亦豈宜更加寵擢以紊賞刑之典而熹雖無狀不識廉耻然亦豈宜適當此時復叨任使以乖去就之方哉省狀公劄别具浼聞伏惟鈞慈幸賜財察趙侍郎前日經此亦嘗託其靣稟今以𬒳受日久方借得人亟此申陳不暇他及瞻望門墻無從進謁敢乞上為國家千萬自重熹不任祈懇激切之至晦庵先生朱文公文集卷第二十八閩縣學訓導何器校
