body:
  text: 書時亊出䖏與周丞相書戊申八月十四日熹前日専人奏記伏想㝷當登徹昨日先所遣人還拜領鈞翰之賜感慰之極不可具言至於進職䟽恩奉祠得請又出陶鑄尤以䘖戢然而丞相方且欿然深以前日不能力辨是非爲病此則仰見大君子責巳之周又不自勝其愧仰也崇福謹巳拜命矣嫌名之喻曲荷記存此於禮律無疑豈敢更煩公聴惟是進職之恩則有所未安者盖方以避仇自列而彼黜巳升内揆於心尚覺未免上九鞶帶之嫌况於他人豈容戸曉且於近制此等遷除雖非德選亦必有所託以爲號今此何名也㢤又况温陵之行情狀未白此必怏怏尚有餘言且其爲人亦甞頗有時譽今日之去逺近必有爲之不平者異時得以藉口則非獨爲熹之書竊恐丞相亦不得不以爲慮也大抵近年習俗凡事不欲以大公至正之道顯然行之而毎區區委曲於私恩小惠之際本欲人人而恱之而其末流之弊常反至於左右拘牽倍費財䖏而卒又無以慰天下之公論此則熹之所不敢言而丞相之明其自知之亦不待熹之言矣熹今有公狀申省并以劄子遍懇群公語悉由衷即非備禮切望矜察早賜開陳得遂鄙懐乃荷大賜昨辤遷秩想亦巳蒙鈞念若猶未上得幷與將上不勝幸甚與曹晉叔書熹辤免文字修寫方畢更一二日始得遣人未知所請竟如何然亦作一奏䟽極道所懐此儻可爲行止之决耳山間殊不聞外事只前月得都下書聞以諸人薦士之故近列有横議者不知後來竟如何盖其間有一二病根若不能去除不惟善類立不得亦非廟社之福也不承教之乆渇仰無量顧無可入城之理坐成阻闊柰何柰何答陳同父書熹所遣人度月半前後到都城不知歲前便得歸否但迂滯之見書中巳說盡自看一過亦覺難行次第八九分是且罷休矣萬一不如所料又湏别相度今亦不可預定耳來教所云心亦慮之但鄙意到此轉覺懶怯況本夾只是間界學問更過五七日便是六十歲人近方措置種得㡬畦𣏌菊若一脚出門便不能得此物喫不是小事奉告老兄且莫相攛掇留取閑漢在山裏咬菜根與人無相干渉了却㡬卷残書與村秀才子尋行數墨亦是一事古往今來多少聖賢豪傑韞經綸事業不得做只恁麽死了底何限顧此腐儒又何足爲輕重況今世孔孟管葛自不乏人也耶來喻恐爲豪士所笑不知何處更有豪士笑得老兄勿過慮也答陳同父書熹懇辤召命不蒙開允反得除用超異非常内省無堪何以勝此巳上免奏今二十餘日矣尚未聞可報踧踖不自勝來書警誨殊荷愛念然使熹不自料度冐昧直前亦只是誦說章句以應文備數而巳如何便擔當許大事況只此僥冐亦未敢承當老兄之言無乃太早計乎然世間事思之非不爛熟只恐做時不似說時人心不似我心孔子豈不是至公至誠孟子豈不是麤拳大踼到底無著手處況今無此伎俩自家勾當一箇身心尚且柰何不下所以從前不敢容易出來盖其自知甚審而世間一種不相識有公論底人亦莫不知之只是吾黨中有相知日乆相愛過深者好而不知其惡誤相假借以爲粗識廉恥而又年紀老大節次推排遂有無實之名以至上誤君父之聽有此叨竊毎中夜以思悚懼慚怍無以少答上下之望未嘗不發汗沾衣也不意以老兄之材氣識略過絶流輩而亦下同流俗信此虚聲將欲彊僬僥以千鈞之重而不憂其覆跌狼狽以誤知人之明也辤免人行巳乆旦夕必有回報似聞後來廟論又有新畨從官巳有以言獲罪而去者未知事竟如何封事雖無髙論然恐無降出之理萬一果如所傳則孤蹤尤是不復可出自今以往牢關固拒尚恐不免於禍況敢望入帝王之門乎彼去都城不逺想巳見得近日爻象矣萬一再辤不得即不免束装裹糧爲生行死歸之計承許見訪於蘭溪甚幸但恐無說話處向來子約到彼相守三日竟亦不能一吐所懷或先得手筆數行略論大意使未相見間預得紬繹而靣請其曲折庶㡬猶勝怱怱說話不盡只成閑追逐也與周丞相書熹間者側聞光膺詔冊進保帝躬體貌益隆中外交慶熹旣不獲追隨班賀之末又不獲以時奏記少見下懐瞻望門墻徒増悚惕前此率易申懇伏蒙寵賜教答誨喻丅寜眷念有加尤深感激惟是所請未蒙施行憂懼之深莫知所措區區鄙志前巳具陳旣未能有以上動朝聽則亦不敢復申其說今者具狀獨以范參政進職近例爲請伏惟丞相試一覽焉則朝廷之予奪與熹之辭受其當否得失皆曉然矣然朝廷於此本無愛憎之私但爲偶失參照則亦未爲大闕獨使熹竊非其據而幸討論之不及則其辱大矣熹雖無狀竊深恥之萬一此請不遂熹豈容但巳蓋與其閔黙冐受寧以罪戾竄斥爲有榮耀也然熹之本心亦豈樂爲是亢激者狀中巳備言其曲折矣并乞深察而力陳之庶幾聖主有以洞照其愚而亟遂其請則不惟熹之幸而免使丞相分上又添此一段不了事則亦不爲無𥙷也前書率爾之言無足采取過荷開納愧悚良深顧今自謀之拙進退失據亦不復能爲門館計矣袁侍郎歸來道間一見語殊未𣢾比聞其病欲徃視之而賤軀衰乏尤甚未能自力念之不能忘也承問之及因輙布之疾病餘生無從復望覆舄伏惟深爲天下之重千萬自愛熹不勝至願與李誠父書巳酉五月二日乆不拜狀兹聞榮𬒳親擢進居六察之聮深以爲慰比日清和伏惟台候動止萬福先生抱道不試然其心未嘗忘當世也門人弟子旣不足以少承厥志而家有賢子足繼其業學者之望蓋非常人之比况新天子繼照之𥘉慨然有志於治而外則夷虜憑陵國威不振内則隂邪朋結國論未定此亦賢人君子效忠宣力垂名竹帛之秋也尊兄平日立志持身固有定論然區區更願一意爲國無徇常日往還厚善之私深察天下公議之所在精慮而決行之使隂消於上而陽長於下政事脩理而國勢尊安不亦老先生平日之所望於後人者乎熹託契深厚不敢效常人進䛕詞以賛除用之喜狂妄及此不審尊兄以爲如何胡公論亊皆合公論甚彊人意但二小諌之去殊可惜乃不能遂其言何耶諸公排逐正人乃以尊兄塞責此相輕之甚謂兄必不能爲薛許耳不可懷此小恩而忘大辱幸深念之與張元善書辤免文字極荷留念危疑之迹乆爲賢者之累尤以慚悚今復遣此人乃漕司借來省狀公劄巳與錢令自投矣只煩因見扣之狀藁録呈區區卑意只是如此更無他說如云立節抗論却非事實而反以益其疑忌蓋平生辤官只是兩事一則分不當得二則私計不便而巳非有他也所云如有差妄却與此事體不同若是本等差遣力所能堪豈有不受之理但名位超躐或非力所辦則亦不得不辤耳清源之說尤非所敢聞者中固不見容外亦非所堪衰晚如此精力昏耗一事做不得只得一日安静即是一日之福此外無所求也對班果在何日不知欲論何事來書所云非甚利害不暇謀人者何見事之遲耶觀二諌之去江夏之升此乃不犯手勢而斡旋運轉無不如其意者自古小人所以敗亂國家豈皆凶惡猛鷙有可畏之威而後能之但有患失之心便自無所不至先聖言之精且切矣南臺西掖乃爲差彊人意者然不清其原而窒其流恐徒費力而無𥙷也況南牀撃去新諌此巳明與之忤渠旣不得志必須更㝷一枚如此等比置之本處不知又將何以爲計此事不逺計只在旦夕矣可因見痛針劄之此公雖未相識然見其文字知其純厚不㑹罵人須力從臾之以速爲上稍遲一日即壞一日事矣二諌之去必湏有曲折幸子細報及天下事只有箇做有箇不做無如此依違僥倖之理彼之隠忍回互蓋曰將以有爲也而所就者亦止如此與奮發直前者相去亦復幾何向使奮發直前果去禍根却未必不做得事也境外之事則諉曰無後叚不知如此拱手安坐幾時是有後段時此事苦痛更是無告訴處不知祖宗之靈何負於此軰而忍至此也誠父遷後相見否聞渠曽與之鄰居相與甚厚須有以警覺之縱不能回戈奮擊且得不爲所使以害善良亦幸事也蕭果卿𥘉除御史虞丞相意也人或賀之蕭喟然曰彼見吾憒憒謂我不能言而以是處我也其輕我甚矣不数日首論其黨遂并攻之論者服其勇云經緫制錢若只如此減得不多全不濟事熹去年有一劄子曽降出否諸公之意非不欲速行只是怕諸路條上乞減太多難可否耳若未定論且守前說爲佳過了此番又無時可理㑹也紹興和買熹向有一說欲減緫額零數十四萬中减其四萬而後以田畆餘財諸般物力貫頭均敷庶㡬重者得輕而元無者所増亦不至重後來不曽上得鄭書赴鎭時曽冩與之不知渠後來如何區處也廣西鈔鹽只是州縣苦之必不至大爲民害今復官賣却須有害民處以本路觀之可見矣詳觀所論大率見得人情事幾未甚分明此乃平日意思不甚沉静故心地不虚不明而爲事物所亂要當深察此病而亟反之古人所謂安而後能慮定而後能應正爲此也若只如此泛泛度日即恐枉得道氣之名而不享其利徒有損而無益也千萬留念答李誠父書副本垂示極感不外之意三復以還伏念頃侍先生教誨所論無非此事感念疇昔不勝悲歎又喜家學有傳遂爲世用有以慰九原之思也首章所論乃古今不易之常道而在今日尤爲要切然自世俗觀之不以爲迂闊之常談道學之邪氣者鮮矣尊兄旣發其端此必巳爲彼等所惡然吾所以告君之道無以易此則亦何顧於彼但當守此一言以爲平生議論之本他日論事毎每拈出此箇話頭不論甚事都從此話上推出去則百病之根無所藏匿而於人主所以反躬正事之㡬亦約而易操矣若把此話别爲一事而當世之弊又自各爲一事則内外精粗不相聮屬而眞不免乎迂闊之譏矣切望勿忘此言每見必湏拈出常令接續無少間斷則乆乆自見效矣恢復一事以今事力固難妄動然此意則不可忘頃見先生亦常常說今日但當将不共戴天四字貼在額頭上不知有其他是第一義今觀老兄所論亦得此意但當因此便陳内脩政事之意而稍指切今日宴安放倒之弊乃爲有力耳至於分察職事計亦黙有所處此則大要在於詳審勿狥偏詞爲善而覆護善人掩其疵疾之意亦不可忘耳又其大本則欲正人者必先正巳況欲正君而可自有不正之累耶此在髙明處之必巳素定旣承下問不容不盡耳答王謙仲劄子云云不勝千萬幸甚又蒙不鄙俯垂訪逮此見髙明之度雖以爵位德業之隆而自視欿然不自賢智至於如此甚感甚感顧熹至愚本無知識加以疾病廢學意見愈益闊踈其將何以仰承嘉命惟是平生所聞明公之節槩風烈凛然其非今世之士其尊主庇民之略蓋素所蓄積也今日得其位而施之於海内有識仰首拭目以望膏澤之流亦有日矣熹獨竊意明公之優游不迫蓋將有所待而爲之也雖然時難得而昜失古之聖賢蓋有皇皇汲汲而坐以待旦者唯明公不忘疇音之志而果斷奮發以乗其不可失之機則宗社之休生靈之幸也與留丞相劄子熹昨具短劄懇辤恩命方懼進越自取罪戾不謂乃蒙鈞慈還賜手教拜領伏讀感悚益深又蒙鐫喻丁寧襃與隆厚仰認至意尤切凌兢誠宜即日拜命便道之官服勤職業深求所以仰稱吾君吾相知遇使令之意而疾病之餘昏耗巳甚竊自揆度决無以堪一道委寄之重不免復具公牘再干朝聽而别以此私于下執事伏惟丞相國公詳加省覽特賜矜憐曲爲敷陳仍卑祠禄使得卒逃吏議以遂餘生則熹不勝幸甚幸甚或恐朝廷未知熹之實病誤謂尚堪使令不忍終身置之閑散則謀議之官若蒙陶鑄或可自效然以禮秩太優不敢有請伏惟相公試詳度之但熹雖出終不能乆近則半年逺則周歲決湏再有祈懇復勞區處不若及今便與祠禄之爲便耳抑嘗聽於道路側聞乃者相公蓋嘗白發左右之姦斥之逺外所以輔君德振朝綱者甚慰中外之望熹雖愚懦亦不勝其喜幸竊意相公必將乘此機㑹大有建明以爲宗社永乆無窮之計而伏聽累月未有聞也夫陽長而不遂進隂消而不遂滅此最安危治亂之機而昔人所深畏以熹之愚猶竊爲相公慮之不識髙明何以處此而善其後也逺跡田間無由伏謁黃閤之下仰首一言以賛大慮引領東望不勝惓惓伏惟上爲國家俯爲人望千萬自重熹不勝懇禱眞切之至小貼子熹目力昏耗不能細書楷字墨色濃淡行道欹斜殊不成禮本不能親書以所𬒳敎出於手墨勉彊作此率略殊甚伏乞鈞慈矜恕幸幸甚甚熹皇恐上覆與留丞相劄子巳酉十月二十一日熹竊以仲冬嚴寒伏惟丞相國公鈞候起居萬福熹頃以衰疾再辤恩命方懼僣瀆自速罪戾乃蒙丞相矜憐曲爲敷奏改卑符竹以便其私固巳甚幸至於那移闕次不一而止倍費生成之力仰累公平之政此又熹之所大懼也若使稍堪勉彊豈復更敢辤避以招尤取閙而自棄於明時實以所苦目疾浸以増加臨漳雖名事簡然一郡千里生齒萬數獄訟財計所繋不輕若以愛身之故漫不加省而委之他人豈得自安若欲一一親臨則竊自揆度決有所不能堪者前日所以力辤江東之行良以此故竊意爲熹言者亦未究知其實而或雜以他說是以丞相雖巳憐之而猶未深信其必然也以熹今日精力之所堪惟有奉祠一官可竊升斗之禄又復惟念君相之恩隆厚至此而熹必求閑退固執不回則或者之論必又有以爲羞薄詔除而加以傲上無禮之罪者是以今者冐昧朝聽不敢專以祠禄爲請蓋巳出怵迫無聊之計而䧟於貪冐苟求之譏矣伏惟丞相試加察焉賜之一言明其實病而復與之祠官之禄使得休養神明避逺䜛謗庶幾未死之間及見丞相格君定國之效使羣邪屏伏而衆賢彚進姦言熄滅而公論顯行國勢尊崇於上民心悅豫於下則熹雖在田野之中亦得以安心肆意明目開口爲太平之民其與懷抱憂畏側肩屏息以寄其身於吏民之上者屈伸苦樂萬萬不侔矣若丞相亦以熹前所疑有不得不慮者則謀曹之請願垂意焉然此巳爲甚不得巳之計萬一近地或無見次則又不必謄那増創以致人言但與祠官乃其舊物縱使得罪亦易辤也熹未嘗有一日灑掃之勞於門下而丞相知之之深念之之悉至於如此故熹不敢不盡其愚伏惟丞相擇而處之千萬幸甚未由趨拜門館伏乞上爲兩宫倍保崇重永扶公道以福蒼生熹不勝至願與黄仁卿書熹行義不修無以取信交遊遂使中傷之禍上及先賢若非神聖鑒知則其流害將不止於不肖而巳負此悚惕無以自容熹竟不免臨漳之行示喻積弊此固當然其横歛擾民爲害有大於此者到官之後須次第討論更革之今未敢洩此意若過劒福得左右在彼面議爲幸或出沙縣亦當先附報奉約一出相㑹也於州縣事體本自生踈又多時不出意思踈懶旣承當了擔子便又苟簡不得甚欲子細啇量也請祠事亦似不必如此隨分仕宦不起患得失之心何處不是安地政不湏如此若論爲學則在官何嘗不可爲學直患自不愛日用功耳買田舉子之說甚善此間周居晦劉晦伯皆有此議但愚意以爲如此則只做得一事不如歛散旣可舉子兼可救荒又將來田租亦爲豪民坐欠催督費力此建陽巳見之弊須更子細商量大抵事無全利亦無全害但筭其多者爲之耳只恐一日饑荒却思此米無討處也答趙帥論舉子倉事庚戌次月𥘉十日請米不得折支價錢元立約束逐月三次支米使生子之家不過一旬便得接濟極爲利便但支米官獨貟自支或不得人則徇私作過無所不有至有將私家所收輕禾汎榖重行估折者亦有將所支官米準還本家私債者似此之弊不一而足不但折支價錢而巳故中間甚不得巳而改爲三月一支之法雖期日稍逺然却得關㑹諸都附籍郷官同在一處不容大段作弊郷人雖是得米稍遲却無邀阻乞覔之患亦頗安之今欲一月一支誠爲中制然若不關集諸附籍官則獨支之弊復如前日若欲盡行關集則一月一來其稍逺者不無厭倦支米官又利其不來決不便行申舉因循視傚必致無肯來者而獨支之弊又如故矣反復思之只有一說雖或未能盡革舊弊然亦勝於不行欲乞更於所示事目本文次月𥘉十日請米一石之下注云仍舊關集諸附籍鄉官各將本籍前來參驗方得支給注止此仍於後項立法支米以恤其私見第三項則或可以責其必來而免致復有獨支之弊如其不然雖欲多設關防曲行小惠徒爲文具終有損而無益也佃戸人戸欠米未有約束舉子根本全仰諸莊佃戸送納租課諸都人戸回納息米今佃戸多是豪猾士人仕宦子弟力能把持公私徃徃拖延不納至有及來年夏秋而無敢催督之者請米人戸間有形勢之家詭名冐請一家至有百十石鄉官明知其然而牽於人情不能峻拒亦有慕其權勢而因以爲納交求媚之計者亦有畏其把持嘲誚而姑爲避禍苟免之計者及至冬月回納之時又皆公然拖欠鄉官無如之何縣官亦復畏憚不肯留意催促遂有經隔年歳終不送納者麻沙常平社倉曽𬒳一新豋第人詭名借去一百餘石次年適值大赦遂計㑹倉司人吏直行蠲放縁此鄉俗視傚全無忌憚視此官米便同巳物歳乆月深其弊愈甚若不早加覺察將欠多人追赴使司勘斷監納佃戸即令召人剗佃則數年之後根本蹷拔鄉官徒守空倉舉子之家無復得米之望矣諸縣措置官下書手月支米五斗如此則措置官似亦當有月給兼第一項所陳利害欲乞并就此條立法若云諸縣措置官月支供給錢若干折米若干逐官下置書手一名月支米五斗支米附籍郷官逐月每人支米若干以充茶湯飲食童僕徃來之費此數未敢擬定更乞詳酌稍優爲善與陳憲劄子熹輙有愚悃仰干台聽昨以漳浦黃尉不納軍糧營私廢職致寨兵饑餓狼狽事有可憂不免具狀申省部諸司例皆不蒙行下獨荷使臺留意差官前來推勘官吏聞風無不震悚今者忽𬒳使檄乃問本人有無情弊固巳愕然續得勘官關報又云巳奉台㫖住行起發不惟熹竊疑之一郡士民無不驚恠以爲使臺舉措不應如此熹雖巳具回申具言本人罪狀明白不待更有情弊然後可按故本州前此申狀𥘉不謂其别有他罪乞照巳行事理施行不審巳蒙台察與否如何也然兩日以來竊伏思之此事本非區區敢容私意正爲州郡差使不行以至欠闕軍糧事勢危迫若不懲治深恐官吏習見州郡事體削弱不能使人向後迭相倣效無所禀畏萬一一旦稍有緩急事將有不可勝慮者所以勢不得巳須至按劾然猶以諸司在上不欲遽爾具奏旣見使臺特加究治竊料台意必有所處而不意一旦自爲縱弛以至於此也伏惟提刑郎中以清名直道有聞於時必不肯容請託之私以廢公法不知此何意也熹昨巳具狀申省部諸司乞避此尉又念台慈顧遇過厚不應遽爾妄發遂且引郤區區衰病雖巳求去然一郡之防則有不當以熹之將去而遂廢者是猶不能已而一言之伏惟髙明少賜矜察果於去惡而無爲因循中輟之計以壞紀綱以損名譽則非熹之幸乃此邦之幸乃閤下之光也頃年嘗讀鄱陽去郡之章至有雖鼎鑊有所不辤之語嘗竊壯之以爲此眞今世之古人其剛大正直之氣不可屈撓乃如此而亦意其必能有以容夫度外逆耳之言也是以不敢不盡其愚伏惟幸察與留丞相劄子熹輙有誠懇仰瀆鈞聽熹衰病餘生不堪從宦兹蒙誤恩假守黽勉南來意謂若幸無他疾痛可以冐昧歲月然於職事亦不敢不盡其愚前此依凖通融蠲減指揮乞免上供罷科茶錢及減無額經緫制錢之額以至恭奉聖㫖相度經界利病皆是一郡永乆利害而經界尤利害之大者所以不避僣率極意盡言不敢少有顧望前郤首䑕兩端之意退而講究巨細本末不敢不盡規摹措畫蓋巳什八九成矣鄙意無他蓋以本州田稅不均隠漏官物動以萬計公私田土皆爲豪宗大姓詭名冐占而細民産去稅存或更受俵寄之租困苦狼狽無所從出州縣旣失經常之入則遂多方擘畫取其所不應取之財以足歲計如諸縣之科罰州郡之賣鹽是也上下不法莫能相正窮民受害有使人不忍聞者熹自到官蓋嘗反復討論欲救其弊而隠實郡計入不支出乃知若不經界實無措手之地所以前此申奏欲得及此秋冬之交早賜行下竊聞廟堂有意施行版曹亦無異論亦蒙丞相賜書喻意謂必可行熹區區自喜竊謂漳民自此可脫塗炭之苦而熹區區疆顔扶病亦不虗爲此來矣不幸心勞事拙賦政不平前九月中州境屢有地震之異未及自劾以聞而舊疾發動遍傳兩足連及右臂痛楚呻吟不可堪忍以至滿散錫宴之日皆不得少伸臣子歸美報上之誠今雖少能自力扶曵出㕔執捉批判而病中服藥多是踈利發散之劑精神氣血衰竭殆盡無復筋力可以支吾又况所請罷科茶錢無額經緫之屬皆乆不蒙開允經界聞亦有陽爲兩可而隂實力沮之者只今巳近冬至更五十日即是新春設使便蒙施行亦無日子可以辦集至於按劾弛慢不䖍之吏諸司又不主張甚或巳行取勘而無故自引罷者如此使熹寧復更有顔面可臨吏民鄙性狷急不能俯仲前日所以杜門空山甘忍窮餓而不敢有意於仕宦正以此耳今年六十有一衰病侵凌行將就木乃欲變心從俗以爲僥倖俸錢禄米之計不亦可羞之甚乎憤懑無聊不能自抑巳具奏牘干犯天威乞從罷黜而并以此私布腹心于下執事伏惟某官少賜矜憐曲加陶鑄或使復得奉祠歸死巖壑則又千萬之幸而非熹之所敢望也抵冐崇嚴俯伏俟命熹不任恐懼震栗之至與趙帥書辛亥二月雷雪之變誠可憂懼而寒雨連月隂盛陽微天雖不言意極彰著此亦可深慮者但求言之路未廣不知果有切至之論可以感寤聖心解謝天意者否侍郎身雖在外然以宗屬之親侍臣之重而平日愛君憂國之心與今之從政者不可同日而議適此㡬㑹似亦不容黙黙以自同於衆人也不審囊封入告當復以何爲先區區願竊聞之以寛婺矛牙緯之憂因來宻喻千萬幸甚近聞有㫖招填諸州禁軍寄募沿江戍卒兩事並行似難辦集且今日州郡禁軍緩急何足恃頼正當别作措置以漸消除而悉收江上諸軍子弟刺塡本軍以時練習却令分下諸州就糧以省餽運防緩急歳時更代却還本軍則其事勢自然不敢退墮而州兵之未消者亦得以激厲増進乃爲長乆之計今不慮此反令州郡泛行招刺若守將不得其人則適足以資其賣鬻之姦而空耗衣糧重傷民力又未論也至於寄招之令則棄子弟素習之技而取浮浪無能之人尤爲非計似聞軍中向來以不堪用嘗奏罷之數年之間州郡得以少息勞費不知今日有何急切而忽取此巳棄之繆䇿而復行也往在南康日見隆興所發之人全船遁去并與部轄掌事者皆不復還移文鄰郡捜捕甚急此等之人設使到得軍中亦豈復堪倚仗也竊謂此二事者在帥司亦合申請更以書暁諸公必不得巳且罷寄招而稍遞增禁軍本等及大等第斗力必使及挌方許收刺仍於逐年奏帳本名之下各注斗力不測㸃名抽喚令赴帥司按拍則猶庶㡬其或可用也此間子弟投募者衆因限以必及次髙疆斗力乃收而來者亦不少此亦巳試之驗也與趙帥書辛亥三月二十三日熹竊見元降指揮將海船作三畨拘集聽候募發後來節次有㫖許令當番船戸只在本州界内逐便漁業此見朝廷燭見幽逺務從寛恤之意然去年三月八日方降指揮本州四月八日方始𬒳受則船戸拘集巳乆不無廢業官吏恬不省察恣行邀索直至命下尚且拘留適熹到官之𥘉究治姦弊方得放散以此之故船戸畏憚不肯如期到岸聴候點檢欲望使司特賜申明乞降指揮今後當畨船隻追集到岸日下差官點視即時逐旋放散令於本州界内漁業委自守臣專切掛意不得拘留向後年分並依此施行更不候别降指揮實爲利便恐或未欲如此施行即且乞逐年𥘉冬便與預先行下使船戸知得到州點視便得放散自然樂於聴命不致誤事答陳漕書近因使還巳具經界乞候將來農隙施行利害申禀伏想巳塵台鑒未奉回降但増悚惕今準使牒便令差官熹前此準擬外州一二待闕官近聞朝論大以爲不然此亦小事不欲固争勢湏别行踏逐外州一二官員相添乃可集事盖此四縣龍溪縣官皆可委仗不湏差人龍巖山多田少只一劉尉永嘉士人嘗從王亞夫游頗知經界利病足當一縣或更助以一人亦得長泰縣小地狹或更湏一人但漳浦地廣而荒尤費區處而宰丞簿或老或繆皆不堪使只有一尉暁事然亦是巡捕官巳擬用一龍巖簿貼之然更須得兩人或三人乃足用州官中亦未見能暁事有可差者容更踏逐别得具申但旣未即施行即且小候詳細差撥庶得其人乃爲有𥙷不審台意以爲如何巳具公狀申述拱俟回降即當遵禀與留丞相劄子經界巳𬒳漕檄竊聞此事丞相極勞經畫乃得施行千里貧民無不知感但恨聞命之日巳是正𥘉農事方興不容措手巳申漕司乞候十月一日下手打量矣其合預行措置事件則目今不住施行講究令益精審以俟及期而行必不致有誤事但此事之行雖細民之所願欲而豪家右族倚勢并兼者惡其害巳莫不隂謀詭計思有以動揺未知此八九月之間事體又復如何更願丞相深察其情而以天下至公之理裁之有以終惠此邦之人而不墯於騰口間說之計則如熹等輩尚得以奔走塵坌泥塗之中上爲國家均愛赤子而徼幸於有成如其不然則雖賤軀自可支吾亦當别以㣲罪自劾而歸不敢遊丞相陶鈞之内矣熹以本郡不曽𬒳受省劄不敢具申其回報漕司狀檢謹録一通冐浼鈞聽僣率皇恐蠲减錢物竊知巳下漕司亦當一靣條具申禀彼司聽候處分更望廟堂力賜主張使不奪於有司出納之吝則非熹之幸乃此邦之幸非此邦之幸乃此民之幸也國家愛惜斯人如護元氣不忍以毫髪擾之詔令所頒戒飭州縣未嘗不以嚴禁科罰爲言而其所以取之州縣者乃如此是則陽爲禁止而隂實縱之又從而驅之使必出於此聖主在御丞相秉鈞豈忍爲是以欺某民哉熹前書晉越冐進所聞中間伏奉手教開納誨諭周至三復以還喜懼交集然逖聽累月竟未聞公論之勝邪說之消如丞相之言者顧其當勝而反消當消而反勝者則有之矣州縣麤官不當議此惟丞相深圖之則天下幸甚天下幸甚熹瞻望台躔不勝依仰敢乞上爲兩宫益加鼎食之衛千萬至懇與留丞相劄子熹誤蒙選擇備數海邦又𬒳詔㫖特許本州推行經界以惠疲甿方幸得以罄竭駑頓仰副使令而不幸遽聞長男之訃悲痛不堪自度精神思慮將有不可得而黽勉者巳具公劄申禀乞賜陶鑄宫觀差遣使得蚤歸營辦喪葬收拾孤婺矛牙切望哀憐早賜敷奏千萬幸甚熹又有愚􅈤本州判官葉機假滿百日依條離任念其貧病巳許爲伸嶽祠之懇未及而遽遭此禍然不欲食言并有劄子率易投納伏惟鈞慈不忍一物之失其所并賜垂念則不惟葉機之幸亦熹之幸也方寸迷亂言無倫次伏𥿄不勝皇恐俟罪之至與留丞相書四月二十四日熹竊以孟夏漸熱伏惟丞相國公鈞候起居萬福熹逺守偏城日荷臨庇昨以哭子悲傷私計不便干冐威嚴巳深震悚而前此人還蒙賜手教存撫甚至且有憐其乆處瘴鄉之意伏讀反側不知所爲熹去歲之病乃是宿疾發動即非染瘴不知趙帥何故乃爾具禀致煩軫念況此邦事簡俗淳今歲以來吏民亦粗相安又經界巳得指揮若非家有私故則熹非唯義不當去亦不願舎此僻逺之安而就繁㑹之危也幸今巳聞奉祠之請旣有成命此蓋丞相察其哀懇而陶鎔及此千萬幸甚雖論譔華資所不當得然亦且得去此只俟受命一靣控辤而於前路聴從欲之報也計差去人不三數日㑹當至此但今郡中却有二事不免具狀申奏其一爲昨來所乞蠲免罷科茶錢巳蒙行下漕司相度今計郡中自可樁辦只乞降㫖約束官吏不得沿此爲名似前科擾不敢更煩蠲免應副而所乞除减無額一項五千緍者即乞特詔有司便與施行庶爲一郡乆逺之利其一爲漳浦髙知縣登忠言直節不幸貶死欲望聖恩特與昭雪襃録其家二事皆乞丞相留意開陳得從所請千萬幸甚雖當去此而惟君相所以遣之此來之意似非偶然欲圖以報萬分者是以於此有所不能忘懐其他瑣細亦有合因革者然其事在州郡而不在朝廷又不敢以煩鈞聽也其他至如經界一事若非丞相力賜主張則浮議動揺其罷乆矣兹者又蒙垂諭諄悉尤切感歎此事貧民所欲而富者不願理勢甚明似不難暁而羣言胥動噂沓萬端則不唯愚者惑之而賢且智者亦或不免此可恠也然此邦之人富者尚少其力能沮議而得關說於前者亦不甚多熹之所憂獨恐温陵富室旣多其間豈無出入門墻之下承眄睞之恩者必將巧爲詞說乗間伺隙以濟其私竊願髙明審加察焉使此邦之績不敗於將成則泉汀以次悉蒙其利而三州之境窮苦無告之民無不感戴生死肉骨之恩矣昨來陳憲委官來此啇度因令行視田野汀之行賈聞之驚喜相率拜其車下問此法何時可及吾州此可以見夫人之眞情矣而必爲說以敗之而圖自利其亦不仁也哉往時有閤門舎人林宗臣者亦丞相之邑子嘗因奏對論及此事其言憤激痛切蓋有所指今泉之貧民愿士人人能誦道之公議良心不可泯没彼沮之者設不出此子孫決不乞食獨何必過爲之慮而蒙此詬於其身耶是可歎巳惟丞相深念有以反之此又自爲門下之計而非獨爲三州貧民計也熹又蒙垂諭深以士大夫之朋黨爲患此古今之通病誠上之人所當疾也然熹嘗竊謂朋黨之禍止於縉紳而古之惡朋黨而欲去之者往往至於亡人之國蓋不察其賢否忠邪而惟黨之務去則彼小人之巧於自謀者必將有以自蓋其迹而君子恃其公心直道無所回互往往反爲所擠而目以爲黨漢唐紹聖之巳事今未逺也熹雖至愚伏讀丞相所賜之書知丞相愛君憂國之心無一言一字不出於至誠惻怛此天下之賢人君子所以相率而願附於下風也而未能不以朋黨爲慮熹恐丞相或未深以天下之賢否忠邪爲巳任是以上之所以告于君者未能使之判然不疑於君子小人之分下之所以行於進退予奪者未能有以服天下之心慰天下之望而隂邪䜛賊常若反有侵凌干犯之勢丞相又慮此身自䧟於君子之黨而使彼之蓄憾乆而爲禍深也又稍故爲迷亂昏錯之態以調柔之反使之氣豪意健旁若無人敢於干禄之章肆爲誣善之語而朝廷亦不之問也夫杜門自守孤立無朋者此一介之行也延納賢能黜退姦險合天下之人以濟天下之事者宰相之職也奚必以無黨者爲是而有黨者爲非哉夫以丞相今日之所處無黨則無黨矣而使小人之道日長君子之道日消天下之慮將有不可勝言者則丞相安得辤其責哉熹不勝愚者之慮願丞相先以分别賢否忠邪爲巳任其果賢且忠耶則顯然進之惟恐其黨之不衆而無與共圖天下之事也其果姦且邪耶則顯然黜之惟恐其去之不盡而有以害吾用賢之功也不惟不疾君子之爲黨而不憚以身爲之黨不惟不憚以身爲之黨是又將引其君以爲黨而不憚也如此則天下之事其庶㡬乎前年逐二諌官去年逐一御史近聞又逐一諌官矣上下不交而天下將至於無邦丞相不此之慮而慮士大夫之爲黨其亦誤矣熹雖荷知奨而未遂掃門之願顧蒙出語之勤似不爲無可取者是以輙空胷臆少答恩顧不自知其狂且妄也干冐威尊俯伏震懼伏惟寛容有以裁之瞻望黄閤無由趨拜敢冀上爲國家倍保崇重熹不勝下情千萬懇禱之至熹竊見紹興𥘉年趙忠簡公爲相一時收用人材之盛後來莫及然細考其間亦豈無不滿人意者但其多寡之勢此彊彼弱故雖少雜而不能害治當時有小元祐之號今者竊觀丞相之心即趙公之心然論一時人材賢佞之勢則此少而彼多此弱而彼疆此則區區所以不能不深憂而輙以分别賢否忠邪之說爲獻於門下也伏乞鈞照熹皇恐又覆熹又蒙垂諭陳憲趙守曲折謹悉陳憲於此極留意熹前劄巳具禀矣昨見移節方竊憂之不謂鈞念巳及此也幸甚趙守舊識之有心力肯向前誠如尊命然更得一言勉之幸甚近因遣官下郷分界且遍喻父老以所爲方量之意并以筭法授之人見其簡易易行無不悅喜今見熹去頗以爲憂而不知丞相主張之力𥘉不爲熹一介作輟也更乞加意垂念千萬至幸熹皇恐又覆與留丞相書七月十日熹竊以孟秋猶熱伏惟丞相國公鈞候起居萬福熹區區賤迹自四月二十六日解罷郡事越三日遂發臨漳五月二十四日遂抵建陽因遂寄寓以畢喪葬但悲惱之餘無復生意仰頼巨庇偶未即死耳七月四日始𬒳省劄并領手教之賜仰荷鈞慈垂念之厚但所請上還進職恩命未奉俞允上恩隆重威令巳行知友皆謂不當復有干冐而反覆以思竟未得其所以可受之說不免復從建寧借人持狀申省愚慮悃𣢾罄竭亡餘不敢重浼崇聽得賜省覽詳悉開陳上謹聖朝予奪之公下全匹夫辤受之義則熹不勝千萬幸甚又蒙垂喻經界利病乃是温陵士夫猶有公論始者但見漳人有仕於朝者奔走權門日肆揺沮而妄疑之耳數日前陳憲按部經由亦有所聞深不自安改送之請殆必爲此然周漕始至相見首問及此云恐朝廷或從陳憲之請即欲略知曲折未知後來旣聞浮議紛紜之後又復如何此非閑人所敢干預第因下喻之及敢布所聞耳無額錢事曲蒙垂念尤深感戢版曹今當巳有定論但恐出内之吝有司常態須仰廟堂力賜主張始可不乖所望也髙古縣事不審巳作如何施行此事南方之人無不聞知况如丞相尤是目暏而梁文靖公向來亦嘗爲之申雪固不待鄙言而後信但得榻前委曲敷陳特與昭洒則不唯直旣往之冤申泉壤之恨而自今以往忠言日聞於丞相效美遜直之心亦不爲無所助矣如聞比日朝士有以不願爲忠臣之說當上心𬒳親擢者逺方傳聞不知信否如審有之則小人過計之憂恐其不得爲興邦之言也又聞其人亦嘗出入門墻深辱知顧當是其時未有此論如又不然則知言知人之訓妄意丞相更當留意愽求直諒之賢置之東閤與圖天下之事則大人格心之效不日可見而勲業之茂不但踰於前後數公矣諸葛武侯之教有曰諸有忠慮於國者但勤攻吾之闕則事可成賊可死功可翹足而待矣太祖皇帝嘗語侍臣唐太宗虗心求諌容受盡言固人主之難事然曷若自不爲非使人無得而諌之爲愈乎至哉言乎大哉言乎愚竊願以武侯之言爲丞相獻又願丞相以太祖聖訓日啓迪於上前也至如朋黨之論則前記所陳有未究者致煩鐫喻至於勤縟三復愧悚不知所言章蔡之禍誠如尊命但忠賢奔播至於如此推本其原蓋自有在而九年之間黜幽渉明培固根本其效見於靖康建炎之際者民到于今頼之又自有不可誣者若其無此而元豐紹聖便相傳襲則後日之禍豈但若此而巳哉前輩有論嘉祐元豐兼收並用異趣之人故當時朋黨之禍不至於朝廷者世多以爲名言熹嘗謂此乃不得巳之論以爲與其偏用小人而盡棄君子不若如是之猶爲愈耳非以爲君子不可專任小人不可盡去而此舉眞可爲萬世法也若使當時盡用韓富之徒而并絀王蔡之屬則其所以卒就慶曆之宏規盡革熈寧之秕政者豈不盡羙而盡善乎後之覧者得其言而不得其心知退守其所爲不得巳之論而不知進求其盡羙盡善之䇿是以國論日卑而天下之勢卒至於委靡而不振此可悲也至如元祐則其失在於徒知異巳者之非君子而不知同巳者之未必非小人是以患生於腹心之間卒以助成仇敵之勢亦非獨章蔡之能爲巳禍也然則元祐之失乃在於分别之未精而丞相以爲太甚熹竊有所未喻也是以知言知人聖有明誡區區巳效於前矣深願丞相之加之意也抑又聞之天下事勢有消長賔主之不同以易而言方其復而長也一陽爲主於下而五隂莫之能遏及其遇而消也五龍夭矯於上而不足以當一隂羸豕蹢躅之孚甚可畏也丞相觀於今日之勢孰爲主而方長乎孰爲客而方消乎孰能制人而孰爲制於人者乎於是焉而汲汲乎以求天下之賢以自助使之更進迭入日陳安危治亂之明戒以開上心排抑隂邪無使主勢小傾而䧟入其黨尚恐後時而無及於事不精而未免有失亦何遽至預憂其分别太甚而爲異日之患乎熹未獲趨拜而辱知至深且今分甘投老無復世念故不自嫌而冐昧及此伏惟赦其狂妄而取其愚忠千萬幸甚當暑目昏作字不謹并丐原恕自餘唯冀上體兩宫之眷俯慰四方之望加毖重茵列鼎之衛以究乆大之業千萬幸甚與留丞相書十月四日竊以孟冬漸寒伏惟丞相國公鈞候起居萬福熹昨者人還伏奉省劄喻以聖恩襃借不許終辤之㫖又蒙鈞慈加賜手敎所以開暁尤極懇至伏讀再三仰體吾君吾相委曲眷憐之意如此其厚謹巳齋祓祗拜告命奉表稱謝矣恭惟丞相國公知遇之深固不以世俗常禮見望然亦有不敢廢者鄙語卒章少見所以圖報之實儻蒙照察千萬幸甚高古縣事特蒙主張得𬒳仁聖漏泉之澤九原忠憤一旦獲伸丞相所以襃顯忠直擯抑姦䛕之意不但施之今日周行之間所勸多矣龍溪亦蒙收召之恩始望蓋不及此第切惶恐無額錢事近聞巳蒙施行邑中尚未見報未敢致謝此錢雖是州額從來抛下諸邑漳浦爲多此縣比年殘廢巳甚熹向來措置州郡自爲抱認罷科茶錢數千緡今若得更免此則此邑庶幾有可整葺之望萬一今來方是行下漕司指定即將來更望丞相力賜主張始終其惠使此邑疲民免於非理科罰之苦千萬之幸或巳俯從所乞盡賜蠲除則熹昨奏抱認罷科茶錢事雖無施行亦乞行下本州遵守不得再抛下縣仍切覺察勿令諸縣以此爲名妄行科罰此又永乆之利也此錢自係上供之數不敢求免本自不必具奏所以有前日之請良以此耳伏乞鈞察熹未嘗有一日灑掃之勞於門下而丞相所以知奨優異不在衆人之後顧今精神耗竭筋力疲憊無復可期以伸報效區區願丞相深觀大易隂陽消長否㤗徃來之變謹察君子小人之分而公進退之母爲調停之說所誤使忠言日聞聖德日新而天下之人眞享富壽康寧之福朝廷之上眞見平平蕩蕩之風則衰病之軀老死丘壑無所憾矣如於忠邪之分察之有未明消長之戒信之有未篤而又以一身利害之私參錯乎其間則今所謂持平者是乃所以深助小人之勢以爲君子之病將見彼黨日盛此勢日孤天下之亊將有不可爲者丞相雖欲奉身而退窮勝事而樂清時亦不得辤後世良史之責矣熹不勝感德之至輙復冐昧言之伏惟恕其狂妄而采其千慮之一得焉則又幸之大者瞻望門墻無由伏謁伏乞以時爲國千萬自重熹至懇至禱死罪死罪與留丞相書十月十二日熹區區賤懇巳具前幅必蒙矜念俾遂退間不敢重出以煩公聽惟是昨因致謝輙罄鄙懷狂妄僣率不勝皇恐然自遣人之後即得朝士私書語及近事恭聞丞相忠誠感格天意爲回重隂之底復有陽復之漸乃竊自幸其言之不効旣又反覆以思則恐今日之事未足爲喜而前日之論猶有可思者也蓋自古君子小人雜居並用非此勝彼即彼勝此無有兩相疑而終不決者此必然之理也故雖舉朝皆君子而但有一二小人雜於百執事之間投隙抵巇巳足爲患況居侍從之列乎況居丞弼之任而濳禃私黨布滿要津乎蓋二三大臣者人主之所與分别賢否進退人材以圖天下之事自非同心一德恊恭和衷彼此坦然一以國家爲念而無一豪有巳之私間於其間無以克濟若以小人參之則我之所賢而欲進之者彼以爲害己而欲退之我之所否而欲退之者彼以爲助巳而欲親之且其可否異同不待勉爭力辨而後決但於相與進對之間小爲俯仰前郤之態而巳足以敗吾事矣是豈可不先以爲慮而輕爲他計以發其害我之機哉此猶姑以鈞敵之常勢言之耳况今親踈新舊之情本自不侔忠邪遜逆之趣又各有在彼巳先据必勝之地而挾羣黨以塞要衝凡一舉手一揺足皆足以爲吾之害下至近習纎人亦或爲之挾持簡牘關通内外以助其勢而吾乃兀然孤居孑然特立絶無蚍蜉蟻子之援可與用力於根本之地以覺上心而清言路其可望以爲公道之助者不能留之蹞歩之間而欲求之千里之外彼方爲主而我方爲客彼方爲刀而我方爲肉此固天下之危機敗證而又時取彼所甚惡之人置之不能爲助之處徒益其疑而無𥙷於事愚恐雖能遍起天下之賢人君子置之内外彼亦不必動其聲氣但隂拱而㣲伺其勢似能害巳則便一眴目而羣吠四起使來者或未及門至者或禾暖席而巳狼狽倉皇奔迸四出矣尚何國事之可圖哉今日之事丞相以爲但去一人班列便無小人臺閣便無異論乎胡不觀於鄭尚書王著作孫司業之遂去而不留袁温州之巳除而中寢此皆誰實爲之也哉以愚觀之但見其操心益危慮患益深而爲祟益甚耳語曰治水不自其原末流彌増其廣又曰射人先射馬禽賊當禽王蓋慮此也去年劉副端𥘉除抗論震動朝野善類相慶而熹獨深憂之今日之勢何以異此伏願丞相試熟計之而亟隂求學士大夫之有識慮氣節者相與謀之先使上心廓然洞見忠邪之所在而自腹心以至耳目喉舌之地皆不容有毫髪邪氣留於其間然後天下之賢可以次而用天下之事可以序而爲也如其不然則自今以往丞相之憂乃有甚於前日是以熹竊危之而未敢以爲喜也辱知之厚不敢不盡愚惟髙明察之抑天下之事固多以欲速而致敗然見㡬不蚤猶豫留時亦智者所甚懼也今日在我之勢固爲甚危然乗隙疾攻正在此時投機之㑹間不容息惟丞相深計而亟圖之則不唯善類之幸實宗社生靈之幸熹死罪死罪與留丞相劄子熹竊以孟冬冰寒伏惟某官鈞候起居萬福熹昨蒙聖恩超迁聀秩懇辤不獲更𬒳寵褒又得竊食祠官之禄以便私計而䘚其舊業公朝誤恩於熹巳爲厚矣故熹前日奏記盖甞畧陳其說以伸謝悃意謂必蒙矝察不意今者又𬒳省劄乃復將有所使令聞命驚惶進退失據至以家門患難之私賤軀殘朽之故反復推較則又皆有所未安者巳具申狀禀劄一二條陳以干公朝之聴顧猶有未敢盡其言者而復以此私于下執事伏惟某官特賜矜憐少垂寛假使得躬視埋葬以塞老牛䑛犢之悲休飬神明以駐衰頺就盡之景更以餘日討繹舊聞以副聖主華衮之褒而助明時風化之羙則某官之恩之德又將𬒳于存沒而無窮矣干冐威尊不勝戰灼又以近方拜啓不敢復以累幅仰勤聴覧并冀垂察唯是瞻望門墻無復趋拜之日下情尊仰不勝拳拳敢乞上爲兩宫倍保崇重長輔聖主永康兆民熹區區無任祈懇激切之至與趙帥書熹適間道左拜違不勝惘惘移刻伏惟台候動止萬福所需文字適方檢得謹以内呈復有少禀乃適間所忘記者熹辭免文字度今巳到乆矣台斾到闕日若巳得請則無他禱萬一未遂則望特爲一言及此私計未便之實使早得從鄙願千萬之幸經界一事將来本欲說破以昨夕見敎之勤且復隱忍但此事不可不使彼知之亦幸爲詳言之則熹雖不言而義亦伸矣蓋此一事貧民以爲利而并兼豪奪之徒以爲不便其理甚明故當時臣僚建請而朝廷行下諸司諸司行下諸郡泉汀之言雖有異同而諸司察其無理幸以熹言爲是反復論難盖千百言以聞於朝則其慮之巳不爲不審矣今雖有此一人之訴朝廷亦合審其虚實押下諸司再令審覈則其敎誘資給誣罔之罪必將可得如其不然諸司中必有觀望風㫖自爲前郤者此謗猶有所分不專在於朝廷也今所施行乃匆匆如此是朝廷不以臣僚之言爲可信又不以熹之言爲可信又不以諸司之言爲可從而偏聽此人之說與其教誘資給者之說也丞相相知甚深薦引存問不爲不厚熹雖知不足以堪此然平時狂妄所以傾倒不敢自他者亦不爲不至故前日之辤免不敢决然爲不出之計而於馬貳卿書復露異時乞郡之請此意亦可見矣今以此事觀之乃知丞相所以見遇者乃在漳州進士呉禹圭及諸教誘資給者之下今雖無恥其敢冐此而進哉熹伉拙竒蹇一出而遭唐仲友再出而遭林黃中今又遭此呉禹圭矣豈非天哉天實爲之豈敢尤人然復云云如此者猶感丞相相知之意而懼其以此待天下之士也幸侍郎一爲誦之千萬至望與留丞相劄子熹竊以季冬極寒伏惟丞相國公鈞候起居萬福熹昨者妄以小夫竿牘干冐崇聽方懼僣瀆以取罪咎乃蒙賜教累番加以真翰所以慰答其意者甚厚至於懇避恩除以便私計亦蒙矜憐委曲鐫喻而馬侍郎黄寺簿吕司令又皆以書具道鈞意甚悉區區下情不勝感激之至謹巳仰體盛㫖不敢復以家事爲言但經界妄議竟煩寢罷則熹之罪戾有不敢自赦者朝廷寛大雖不忍寘之重辟亦豈宜更加寵擢以紊賞刑之典而熹雖無狀不識㢘耻然亦豈宜適當此時復叨任使以乖去就之方哉省狀公劄别具浼聞伏惟鈞慈幸賜財察趙侍郎前日經此亦嘗託其靣禀今以𬒳受日乆方借得人亟此申陳不暇他及瞻望門墻無從進謁敢乞上爲國家千萬自重熹不任祈懇激切之至晦庵先生朱文公文集卷第二十八閩縣學訓導何器校
