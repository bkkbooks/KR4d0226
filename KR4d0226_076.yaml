body:
  text: 序傳伯拱字序盈天地之間所以為造化者隂陽二氣之終始盛衰而巳陽生於北長於東而盛於南隂始於南中於西而終於北故陽常居左而以生育長養為功其類則為剛為明為公為義而凡君子之道屬焉隂常居右而以夷傷慘殺為事其類則為柔為暗為私為利而凡小人之道屬焉聖人作易畫卦繫辭於其進退消長之際所以示人者深矣而又於其制禮之時所以依象取類而立教者亦莫不審諸此故凡吉禮則尚左其變則尚右自夫手之拱以拜也以及夫祝號詔相之所由也咸率是而分焉蓋不惟其理象之然有不可易者抑所以使夫天下之人平居暇日宗廟朝廷之上族黨庠序之中君臣父子師友賔主之間一拜一揖一進一退視其所尚而有以不忘乎君子之道焉此其所以立教之微指夫又豈不深切而著明哉今建寧傳公之季子伯拱以其名來請字豫惟拱之為禮略矣然奉手當膺端行正立則其心固巳肅然而主於一矣從而論其平居吉禮之所尚則夫所以尊陽抑隂而使之不忘乎君子之道者其精微之意又如此故請得奉字曰景陽而遂書其説以授之景陽風骨秀爽異於常兒而亦既從事乎日數方名遜讓之學矣盍亦識夫尊君所以命巳者而不忘乎恭敬之守異時少進則又因夫朋友所以字謂巳者而益求所以擇善固執之方焉必使陽明勝而德性用隂濁去而物欲消剛不屈而明不傷公足以滅私而義足以勝利則庶乎其不迷於入德之途而有以進夫君子之域也無疑矣淳熙改元孟夏甲子新安朱熹仲晦父序送郭拱辰序世之傳神寫照者能稍得其形似已得稱為良工今郭君拱辰叔瞻乃能并與其精神意趣而盡得之斯亦竒矣豫頃見友人林擇之遊誠之稱其為人而招之不至今歲惠然來自昭武里中士夫數人欲觀其能或一寫而肖或稍稍損益卒無不似而風神氣韻妙得其天致有可笑者為豫作大小二象宛然麋鹿之姿林野之性持以示人計雖相聞而不相識者亦有以知其為豫也然豫方將東遊鴈蕩窺龍湫登玉霄以望蓬萊西歷麻源經玉笥據祝融之絶頂以臨洞庭風濤之壯北出九江上廬阜入虎溪訪陶翁之遺迹然後歸而思自休焉彼當有隱君子者世人所不得見而豫幸將見之欲圖其形以歸而郭君以歲晚思親不能久從豫遊矣豫於是有遺恨焉因其告行書以為贈淳熙元年九月庚子晦翁書送夏醫序豫嘗病世之為論者皆以為天下之事宜於今者不必根於古諧於俗者不必本於經及觀夏君之醫而又有以知其決不然也蓋夏君之醫處方用藥竒怪絶出有若不近人情者而其卒多驗及問其所以然者則皆據經考古而未嘗無所自也豫於是竊有感焉因書遺之以信其術於當世又以風吾黨之不師古而自用者云淳熙元年秋九月庚子晦翁書詩集傳序或有問於余曰詩何謂而作也余應之曰人生而靜天之性也感於物而動性之欲也夫既有欲矣則不能無思既有思矣則不能無言既有言矣則言之所不能盡而發於咨嗟詠歎之餘者必有自然之音響節奏而不能巳焉此詩之所以作也曰然則其所以教者何也曰詩者人心之感物而形於言之餘也心之所感有邪正故言之所形有是非惟聖人在上則其所感者無不正而其言皆足以為教其或感之之雜而所發不能無可擇者則上之人必思所以自反而因有以勸懲之是亦所以為教也昔周盛時上自郊廟朝廷而下逹於鄊黨閭巷其言粹然無不出於正者聖人固巳協之聲律而用之鄊人用之邦國以化天下至於列國之詩則天子巡守亦必陳而觀之以行黜陟之典降自昭穆而後䆮以陵夷至于東遷而遂廢不講矣孔子生於其時既不得位無以行帝王勸懲黜陟之政於是特舉其籍而討論之去其重復正其紛亂而其善之不足以為法惡之不足以為戒者則亦刋而去之以從簡約示久逺使夫學者即是而有以考其得失善者師之而惡者改焉是以其政雖不足行於一時而其教實𬒳於萬世是則詩之所以為教者然也曰然則國風雅頌之體其不同若是何也曰吾聞之凡詩之所謂風者多出於里巷歌謡之作所謂男女相與詠歌各言其情者也惟周南召南親𬒳文王之化以成德而人皆有以得其性情之正故其發於言者樂而不過於淫哀而不及於傷是以二篇獨為風詩之正經自邶而下則其國之治亂不同人之賢否亦異其所感而發者有邪正是非之不齊而所謂先王之風者於此焉變矣若夫雅頌之篇則皆成周之世朝廷郊廟樂歌之詞其語和而莊其義寬而密其作者往往聖人之徒固所以為萬世法程而不可易者也至於雅之變者亦皆一時賢人君子閔時病俗之所為而聖人取之其忠厚惻怛之心陳善閉邪之意猶非後世能言之士所能及之此詩之為經所以人事浹於下天道備於上而無一理之不具也曰然則其學之也當奈何曰本之二南以求其端參之列國以盡其變正之於雅以大其規和之於頌以要其止此學詩之大旨也於是乎章句以綱之訓詁以紀之諷詠以昌之涵濡以體之察之情性隱微之間審之言行樞機之始則修身及家平均天下之道其亦不待他求而得之於此矣問者唯唯而退余時方輯詩傳因悉次是語以冠其篇云淳熙四年丁酉冬十月戊子新安朱熹書再定太極通書後序右周子太極圖并説一篇通書四十一章世傳舊本遺文九篇遺事十五條事狀一篇熹所集次皆巳校定可繕寫熹按先生之書近歲以來其傳既益廣矣然皆不能無謬誤唯長沙建安板本為庶幾焉而猶頗有所未盡也蓋先生之學之奧其可以象告者莫備於太極之一圖若通書之言蓋皆所以發明其藴而誠動靜理性命等章為尤著程氏之書亦皆祖述其意而李仲通銘程邵公志顔子好學論等篇乃或并其語而道之故清逸潘公志先生之墓而敘其所著之書特以作太極圖為首稱而後乃以易説易通繫之其知此矣按漢上朱震子發言陳摶以太極圖傳种放放傳穆修修傳先生衡山胡宏仁仲則以為种穆之傳特先生所學之一師而非其至者武當祁寬居之又謂圖象乃先生指畫以語二程而未嘗有所為書此蓋皆未見潘志而言若胡氏之説則又未考乎先生之學之奧始卒不外乎此圖也先生易説久巳不傳於世向見兩本皆非是其一卦説乃陳忠肅公所著其一繫詞説又皆佛老陳腐之談其甚陋而可笑者若曰易之冒天下之道也猶狙公之罔衆狙也觀此則其決非先生所為可知矣易通疑即通書蓋易説既依經以解義此則通論其大旨而不繫於經者也特不知其去易而為今名始於何時爾然諸本皆附於通書之後而讀者遂誤以為書之卒章使先生立象之微旨暗而不明驟而語夫通書者亦不知其綱領之在是也長沙本既未及有所是正而通書乃因胡氏所定章次先後輒頗有所移易又刋去章目而别以周子曰者加之皆非先生之舊若理性命章之類則一去其目而遂不可曉其所附見銘碣詩文視他本則詳矣然亦或不能有以發明於先生之道而徒為重復故建安本特據潘志置圖篇端而書之序次名章亦復其舊又即潘志及蒲左丞孔司封黃太史所記先生行事之實刪去重復參互考訂合為事狀一端其大者如蒲碣云屠姦剪弊如快刀健斧而潘志云精密嚴恕務盡道理蒲碣但云母未葬而潘公所為鄭夫人志乃為水齧其墓而改葬若此之類皆從潘志而蒲碣又云慨然欲有所施以見於世又云益思以竒自名又云朝廷躐等見用奮發感厲背非知先生者之言又載先生稱頌新政反覆數十言恐亦非實若此之類皆削去至於道學之微有諸君子所不及知者則又一以程氏及其門人之言為正以為先生之書之言之行於此亦略可見矣然後得臨汀楊方本以校而知其舛陋猶有未盡正者如柔如之當作柔亦如之師友一章當為二章之類又得何君營道詩序及諸嘗遊舂陵者之言而知事狀所敘濂溪命名之説有失其本意者何君既見遺事篇內又按濂溪廣漢張栻所跋先生手帖據先生家譜云濓溪隱居在營道縣榮樂鄊鍾貴里石塘橋西濂蓋溪之舊名先生寓之廬阜以示不忘其本之意而邵武鄒敷為熹言嘗至其處溪之源自為上下保先生故居在下保其地又别自號為樓田而濓之為字則疑其出於唐刺史元結七泉之遺俗也今按江州濓溪之西亦有石塘橋見於陳令舉廬山記疑亦先生所寓之名云覆校舊編而知筆削之際亦有當録而誤遺之者如蒲碣自言𥘉見先生于合州相語三日夜退而歎曰世乃有斯人耶而孔文仲亦有祭文序先生洪州時事曰公時甚少玉色金聲從容和毅一府盡傾之語蒲碣又稱其孤風逺操寓懷於塵埃之外常有髙棲遐遁之意亦足以證其前所謂以竒自見等語之謬又讀張忠定公語而知所論希夷种穆之傳亦有未盡其曲折者按張忠定公嘗從希夷學而其論公事之有隂陽頗與圖説意合竊疑是説之傳固有端緒至於先生然後得之於心而天地萬物之理巨細幽明髙下精粗無所不貫於是始為此圖以發其祕爾嘗欲别加是正以輔其闕而病未能也兹乃𬒳命假守南康遂獲嗣守先生之餘教於百有餘年之後顧德弗類慙懼巳深瞻仰髙山深切窹歎因取舊帙復加更定而附著其説如此鋟板學宫以與同志之士共焉淳熙巳亥夏五月戊午朔新安朱熹謹書吕氏家孰讀詩記後序詩自齊魯韓氏之説不得傳而天下之學者盡宗毛氏毛氏之學傳者亦衆而王述之類今皆不存則推衍説者又獨鄭氏之箋而已唐𥘉諸儒為作疏義因訛踵陋百千萬言而不能有以出乎二氏之區域至於本朝劉侍讀歐陽公王丞相蘇黃門河南程氏橫渠張氏始用巳意有所發明雖其淺深得失有不能同然自是之後三百五篇之微詞奧義乃可得而尋繹蓋不待講於齊魯韓氏之傳而學者巳知詩之不專於毛鄭矣及其既久求者益衆説者愈多同異紛紜爭立門戶無復推讓祖述之意則學者無所適從而或反以為病今觀吕氏家孰之書兼總衆説巨細不遺挈領提綱首尾該貫既足以息夫同異之爭而其述作之體則雖融會通徹渾然若出於一家之言而一字之訓一事之義亦未嘗不謹其説之所自及其斷以巳意雖或超然出於前人意慮之表而謙讓退託未嘗敢有輕議前人之心也嗚呼如伯恭父者真可謂有意乎溫柔敦厚之教矣學者以是讀之則於可羣可怨之旨其庶幾乎雖然此書所謂朱氏者實熹少時淺陋之説而伯恭父誤有取焉其後歷時既久自知其説有所未安如雅鄭邪正之云者或不免有所更定則伯恭父反不能不置疑於其間熹竊惑之方將相與反復其説以求真是之歸而伯恭父巳下世矣嗚呼伯恭父巳矣若熹之衰頽汩沒其勢又安能復有所進以獨決此論之是非乎伯恭父之弟子約既以是書授其兄之友丘侯宗卿而宗卿將為板本以傳永久且以書來屬熹序之熹不得辭也乃略為之説因并附其所疑者以與四方同志之士共之而又以識豫之悲恨云爾淳熙壬寅九月巳卯新安朱熹序劉甥瑾字序古之君子學以為已非求人之知也故從師親友以求先王之道心思口講而躬行之既自得於巳矣而謙虛晦默若無有焉今之人則反是是以譬之古之君子如抱美玉而深藏不市後之人則以石為玉而又衒之也劉氏甥瑾自其先大父大夫公而豫之名矣將冠以其父命來求字豫字之曰懷甫告之以古人之意瑾也勉旃毋以石為玉而又衒之也朱熹仲晦父書丞相李公奏議後序嗚呼天之愛人可謂甚矣惟其感於人事之變而迫於氣數屈信消息之不齊是以天下不能常治常安而或至於亂然於其亂也亦未嘗不為之預出能弭是亂之人以擬其後蓋將以使夫生民之類不至於糜爛泯滅靡有孑遺而為之君者猶有所恃賴慿依以保其國是則古今事變之所同然而天之所以為天者其心固如此也嗚呼若宣和靖康之變吾有以知其非天心之所欲而一時人物若故丞相隴西公者其所謂能弭是亂之人非耶蓋聞政宣之際國家之隆盛極矣而都城一日大水猝至舉朝相顧莫有敢以變異為言公獨知其必有夷狄兵戎之禍上疏極言冀有以消弭於未然者不幸謫官以去而間不七年虜騎遂薄都城公於此時又方以眇然一介放逐之餘出負天下山嶽萬鈞之重首陳至䇿而徽宗決內禪之計繼發大論而欽廟堅城守之心任公不疑遂却強虜然自重圍既解衆人之心無復逺慮而爭為割地講和之説以苟目前之安公獨以為不然而數陳出師邀擊之可以必勝與其得氣再入之不可以不憂則讒間蜂起逺謫遐荒而不數月間都城亦失守矣建炎再造首登廟堂慨然以修政事攘夷狄為巳任誅僣逆定經制寬民力變士風通下情改弊法招兵買馬經理財賦分布要害繕治城壁建遣張所撫河北傳亮收河東宗澤守京城西顧關陜南葺樊鄧且將益據形便以為必守中原必還二聖之計然在位才七十餘日而又遭讒以去其在紹興因事獻言亦皆畏天恤民自強自治之意而深以議和退避為非䇿懇扣反復以終其身蓋既薨而諸子集其平生奏草得凡八十卷其言正大明白而纎微曲折究極事情絶去雕飾而變化開闔卓犖竒偉前後二十餘年事變不同而所守一説如出於立談指顧之間今少傅丞相福國陳公序其篇端所以發揮引重固巳盡其美矣公之孫晉復使熹書其後以推明之熹謝不敢而其請愈力不得辭也顧嘗論之以為使公之言用於宣和之𥘉則都城必無圍迫之憂用於靖康則宗國必無顚覆之禍用於建炎則中原必不至於淪陷用於紹興則旋軫舊京汛掃陵廟以復祖宗之宇而卒報不共戴天之讎其巳久矣夫豈使王業偏安於江海之澨而尚貽吾君今日之憂哉顧乃使之數困於庸夫孺子之口而不得卒就其志豈天之愛人有時而不勝夫氣數之力抑亦人事之感或深或淺而其相推相蕩固有以迭為勝負之勢而至於然歟嗚呼痛哉昔蒯通每讀樂毅書未嘗不廢書而泣安知異時不有掩卷太息而埀涕於斯者耶雖然今天子方總羣䇿以圖恢復之功使是書也得備清間之燕而幸有以當上心者焉則有志之士將不恨其不用於前日而知天之所以生公者真非偶然矣因次其説以附于八十卷之末使覽者無疑於福公之言云淳熙十年十月丙午既望宣教郎直徽猷閣主管台州崇道觀朱熹謹書資治通鑑舉要曆後序清源郡舊刻溫國文正公之書有文集及資治通鑑舉要曆皆八十卷曆篇之首有紹興參知政事上蔡謝公克家所記於其刪述本指傳授次第以及宣取投進所以然者甚悉然其傳布未甚廣而朝命以其版付學省則下吏不謹乃航海而沒焉獨文集僅存而歷數十年未有能輔其亡者淳熙壬寅公之曽孫龍圖閣待制伋來領郡事始至而視諸故府則文集者亦巳漫滅而不可讀矣乃用家本讎正移之别板且將次及舉要之書而未遑也一日過客有以為言者龍圖公矍然曰吾固巳志之矣亟命出藏本刻焉踰年告成則又以書來語熹曰是書之成不惟區區得以嗣承先志而修此邦故事之闕抑亦吾子之所樂聞也其為我記其後熹竊聞之資治通鑑之始奏篇也神宗皇帝實親序之則既有慱而得要簡而周事之褒矣然公之意猶懼夫本書之所以提其要者有未切也於是乎有目録之作以備檢尋既又懼夫目之所以周於事者有未盡也於是乎有是書之作以見本未蓋公之所以愛君忠國稽古陳謨之意丁寧反復至于再三而不能巳者尤於此書見之顧以成之之晚既未及以聞于上而黨論繼作科禁日繁則又不得以布于下是以三十餘年之間學士大夫進而議於朝退而語於家皆不克以公書從事而背道反理之言盈天下其效至於讒諛得志上下相蒙馴致禍亂有不可忍言者然後公凡所陳符驗章灼而其出於煨燼之餘者乃得進登王府啓迪天衷既以助成皇家再造之業而其摹印誦習又得以埀法戒於無窮蓋公之志於此亦庶幾少伸焉不幸中間又更放失以迄于今乃有聞孫適守兹土然後復得大傳於世以永休烈熹誠樂聞其事而又竊有感焉因悉著其説以附書後後之君子盍亦視其書之顯晦而考其所以關於時運者為如何則公之所為反復再三而不能自巳之心當有可為太息而流涕者矣十有一年冬十有二月乙未日南至新安朱熹敬書張南軒文集序孟子沒而義利之説不明於天下中間董相仲舒諸葛武侯兩程先生屢發明之而世之學者莫之能信是以其所以自為者鮮不溺於人欲之私而其所以謀人之國家則亦曰功利焉而巳爾爰自國家南渡以來乃有丞相魏國張忠獻公唱明大義以斷國論侍讀南陽胡文定公誦説遺經以開聖學其託於空言見於行事雖若不同而於孟子之言董葛程氏之意則皆有所謂千載而一轍者若近故荆州牧張侯敬夫者則又忠獻公之嗣子而胡公季子五峯先生之門人也自其幼壯不出家庭而固巳得夫忠孝之傳既又講於五峯之門以會其歸則其所以默契於心者人有所不得而知也獨其見於論説則義利之間毫釐之辨蓋有出於前哲之所欲言而未及究者措諸事業則凡宏綱大用巨細顯微莫不洞然於胸次而無一毫功利之雜是以論道於家而四方學者爭鄊往之入侍經帷出臨藩屏則天子亦味其言嘉其績且將倚以大用而敬夫不幸死矣敬夫既沒其弟定叟衰其故藁得四巨編以授豫曰先兄不幸蚤世而其同志之友亦少存者今欲次其文以行於世非子之屬而誰可豫受書愀然開卷亟讀不能盡數篇為之廢書太息流涕而言曰世復有斯人也耶無是人而有是書猶或可以少見其志然吾友平生之言蓋不止此也因復益為求訪得諸四方學者所傳凡數十篇又發吾篋出其往還書疏讀之亦多有可傳者方將為之定著繕寫歸之張氏則或者巳用别本摹印而流傳廣矣遽取觀之蓋多嚮所講焉而未定之論而凡近歲以來談經論事發明道要之精語反不與焉豫因慨念敬夫天資甚髙聞道甚蚤其學之所就既足以名於一世然察其心蓋未嘗一日以是而自足也比年以來方且窮經會友日反諸心而驗諸行事之實蓋有所謂不知年數之不足者是以其學日新而無窮其見於言語文字之間始皆極於髙逺而卒反就於平實此其淺深踈密之際後之君子其必有以處之矣顧以序次之不時使其説之出於前而棄於後者猶得以雜乎篇帙之間而讀者或不能無疑信異同之惑是則豫之罪也巳夫於是乃復亟取前所搜輯參伍相校斷以敬夫晚歲之意定其書為四十四卷嗚呼使敬夫而不死則其學之所至言之所及又豈豫之所得而知哉敬夫所為諸經訓義唯論語説晚嘗更定今巳别行其他往往未脫藁時學者私所傳録敬夫蓋不善也以故皆不著其立朝論事及在州郡條奏民間利病則上意多鄊納之亦有頗施行者以故亦不著獨取其經筵口義一章附于表奏之後使敬夫所以堯舜吾君而不愧其父師之傳者讀者有以識其端云淳熙甲辰十有二月辛酉新安朱熹序向薌林文集後序張子房五世相韓韓亡不愛萬金之産弟死不葬為韓報讎雖博浪之謀不遂橫陽之命不延然卒藉漢滅秦誅項以攄其憤然後棄人間事導引辟榖託意寓言將與古之形解銷化者相期於八紘九垓之外使千載之下聞其風者想象歎息不知其心胸靣目為如何人其志可謂壯哉陶元亮自以晉世宰輔子孫耻復屈身後代自劉𥙿篡奪勢成遂不肯仕雖其功名事業不少槩見而其髙情逸想播於聲詩者後世能言之士皆自以為莫能及也蓋古之君子其於天命民彛君臣父子大倫大法之所在惓惓如此是以大者既立而後節槩之髙語言之妙乃有可得而言者如其不然則紀逡唐林之節非不苦王維儲光羲之詩非不修然清逺也然一失身於新莽祿山之朝則其平生之所辛勤而僅得以傳世者適足為後人嗤笑之資耳愚嘗以是觀於古而驗於今而於薌林居士向公之書竊有感也公之世家自丞相文簡公始以曠度絶識左右真宗而欽聖憲肅皇后遂以任姒之德母儀天下自是以來慶流宗支蟬聮赫奕不可稱數然逮公之仕則巳當靖康建炎之際而國家之變故艱危於是極矣觀其絶僣叛之音郵而縻其家族宣霸府之號令而暢其威靈以至擁羸卒守孤城以抗強虜百勝之鋒遏羣盜橫流之勢身皆危於九死而志不可奪及紹興𥘉大臣始決忘讎辱國之計則又慨然上疏再三指言其失無所回避至於疾病且死而猶勸上以深念創業之艱難不可遽以小康而遂忘大計也此其平生始終大節豈不凛乎其有子房元亮之心哉然二子當時皆不得位而為之於不可為之後是以大義雖明而不及有益於人之國若公乃幸猶得竭股肱之力以依日月之光宗社再安與有勞烈較其所就則於二子又有光焉是以中年乞身以自放於江湖之上而學士大夫靡然咸服其髙一觴一詠悠然若無意於工拙而其清夷間曠之姿魁竒跌宕之氣雖世之刻意於詩者不能有以過也嗚呼是豈徒以其絶俗離世之難發興吐詞之工而然哉蓋必有其本矣始公之薨而五峯先生胡公實狀其行後十餘年而端明學士汪公始銘諸幽其於公之志行本末則既詳矣又後二十餘年而公之季子大夫公乃以公之文集三十卷者屬熹使為之序自惟晚出輒序公文而又列名二公之次皆有非其分之所安者蓋嘗以是辭焉而弗獲也因竊敘其心之所感者如此以附書之左方後有君子得以考焉大夫名某少以公命受學南陽胡文定公之門今年七十有六謝事而老於家亦巳十八年矣淳熙十二年春二月甲子新安朱熹序謝監廟文集序故監西嶽廟謝君綽中者建之政和人也熹先君子太史公尉政和時以公事行鄊落間聞田舍中有誦書聲屬耳頗異亟下車入其舍則一少年書生方對案危坐吟諷自若先君子前揖問讀何書生起對曰儀禮也是時士方專治王氏學非三經字説日録老莊之書不讀而生之業乃如此先君子固巳竒之引坐與語酬應敏給使出其文詞氣亦不凡近問其姓名則曰謝姓譽名綽中字也先君子大喜即與俱歸日授以經史百家之言而勉其業之所未至未幾記誦益廣文字益工先君子益歎重之遂中紹興二年進士第調主邵武之泰寧簿歸領祠官年四十六以卒先君子蓋深惜之君性耿介與世俗多不合而居家極孝友既得官即盡以先疇奉其兄娶妻得田自隨一旦亦舉而歸之還自泰寧自以不能隨俗俯仰慨然願就間秩以便親養然君之所以自許與先君子所以期君者蓋未嘗不以經綸之業為言也則其志豈自以為止於此而巳哉君沒之年先君子亦棄諸孤後四十三年而君之子東卿乃以君之遺文一編過熹於武夷精舍熹讀其書得其志既歎君之不幸又念先君子之門人賔客如君者蓋無幾人今亦無復存者而熹與東卿又皆伉拙不偶不能有以成其先人之志相與太息流涕久之既而東卿請序其文遂書其本末如此君平生為文甚多東卿未能讀父書而孤故其所得止於此其間又多舛繆脫落不敢輒改懼失其真覽者詳焉可也淳熙乙巳四月既望新安朱熹序贈周道士序清江道士周君抱琴來訪屬余有功衰之戚不得聽其抑按然視其貌接其言知其所志有深於是者豈歐陽子所謂理身如理琴正聲不可干以邪者耶於其行書此贈之君還江西有問余者以此示之淳熙乙巳十月甲寅晦翁書金華潘公文集序天地之化包括無外運行無窮然其所以為實不越乎一隂一陽兩端而巳其動靜屈伸往來闔闢升降浮沉之性雖未嘗一日不相反然亦不可以一日而相無也聖人作易以通神明之德類萬物之情其所以為説者亦若是焉耳矣然及其推之人事而擬諸形容則常以陽為君子而引翼扶獎惟恐其不盛隂為小人而排擯抑黜惟恐其不衰何哉蓋陽之德剛隂之德柔剛者常公而柔者常私剛者常明而柔者常暗剛者未嘗不正而柔者未嘗不邪剛者未嘗不大而柔者未嘗不小公明正大之人用於世則天下蒙其福私暗邪僻之人得其志則天下受其禍此理之必然也且非獨於易之説為然蓋凡自古聖賢之言雜出於傳記者亦未有不好剛而惡柔者若夫子所謂剛毅近仁而又嘗深以未見剛者為歎及乎或人之對則又直以有欲病棖也之不得為剛蓋專以是為君子之德也嗚呼若故中書舍人金華潘公者其真孔子所謂未見者哉熹雖不幸而不及掃灑其門然讀其書而猶喜於有以得其所存之倣佛也蓋公自宣和𥘉為慱士則巳不肯託昏富貴之家而獨嘗論斥大臣蒙蔽之姦矣及為館職又不肯遊蔡京父子間使淮南又不肯與中官同燕席靖康召對因論時宰何栗唐恪不可用恐誤國事以是謫去曽不旋踵而言果驗建炎𥘉召為右司諌首論亂臣逆黨當用重典以正邦法壯國威且及當時用事者姦邪之狀大為汪黃所忌書奏三日而左遷以去其言雖不大傳然劉觀所草責詞直以揣摩詆訾為罪則其事固可知巳紹興入為都司又忤時相以歸復為左史一日直前奏曰先王之所以致治者以其合於大公至正之道比年之所以致亂者以其反此而巳陛下今日誠宜仰思祖宗創業之難二帝蒙塵之久俯念生靈塗炭之苦土地侵削之多夙寤晨興不敢少置每行一事必先念此然後發之務以合於所謂大公至正之道而勿以一毫私意曲徇人情則天下庶有休息之期矣服喪還朝又以廷叱奏事官而忤旨以去自是之後秦檜擅朝則公遂廢於家而不復起矣然公平生廉介自將自少至老出入三朝而前後在官不過八百六十餘日所居僅庇風雨郭外無尺寸之田經界法行獨以丘墓之寄輸帛數尺而巳其清苦貧約蓋有人所不堪者而處之超然未嘗少屈於檜其子熺暴起鼎貴勢傾內外亦未嘗與通問也常誦君子三戒之言而深以在得之規痛自警飭生於造次之間一言一行凡所以接朋友教子弟亦未嘗不以孝弟忠敬節儉正直防微謹獨之意為本其讀書磨鏡之喻切中學者之病當世蓋多傳之而所論汲長孺蓋寬饒之為人尤足以見其志之所存也嗚呼若公之清明直諒確然亡欲其真可謂剛毅而近仁矣夫以三代之時聖人之世而夫子巳嘆剛者之不可見况於百世之下幸有如公者焉而不得少伸其志以沒其條奏草藁有輔於時可為後法者又以公自焚削而不復存其平生之言頗可見者獨有賦詠筆禮之餘數十百篇而巳後之君子蓋將由此以論公之世其可使之沒沒無傳而遂巳乎公之兄子今廣州使君畤謂熹盍序其書而傳之熹不敢當而亦不得辭也於是三復其書而剟其梗槩附于書首以告觀者且將時出而伏讀之以自厲焉公諱某字義榮一字子賤自號默成居士集凡十有五卷廣州字德鄜少學於公植志行身甚有家法數為郡守部使者愛民戢姦不憚大吏所至皆有風績云淳熙丙午春三月巳卯朔旦具位新安朱熹謹序易學啓蒙序聖人觀象以畫卦揲蓍以命爻使天下後世之人皆有以決嫌疑定猶豫而不迷於吉凶悔吝之塗其功可謂盛矣然其為卦也自本而幹自幹而支其勢若有所迫而自不能巳其為蓍也分合進退縱橫順逆亦無往而不相值焉是豈聖人心思智慮之所得為也哉特氣數之自然形於法象見於圖書者有以啓於其心而假手焉耳近世學者類喜談易而不察乎此其專於文義者既支離散漫而無所根著其涉於象數者又皆牽合傅會而或以為出於聖人心思智慮之所為也若是者豫竊病焉因與同志頗輯舊聞為書四篇以示𥘉學使母疑於其説云淳熙丙午暮春既望雲臺真逸手記律吕新書序古樂之亡久矣然秦漢之間去周未逺其器與聲猶有存者故其道雖不行於當世而其為法猶未容有異論也逮于東漢之末以接西晉之𥘉則巳䆮多説矣歷魏周齊隋唐五季論者愈多而法愈不定爰及我朝功成治定理冝有作建隆皇祐元豐之間蓋亦三致意焉而和胡阮李范馬劉楊諸賢之議終不能以相一也而况於崇宣之季姦諛之會黥涅之餘而能有以語夫天地之和哉丁未南狩今六十年神人之憤猶有未攄是固不遑於稽古禮文之事然學士大夫因仍簡陋遂無復以鍾律為意者則巳甚矣吾友建陽蔡君元定季通當此之時乃獨心好其説而力求之旁搜逺取巨細不捐積之纍年乃若冥契著書兩卷凡若干言豫嘗得而讀之愛其明白而淵深縝密而通暢不為牽合傅會之談而橫斜曲直如珠之不出於盤其言雖多出於近世之所未講而實無一字不本於古人巳試之成法蓋若黃鍾圍徑之數則漢斛之積分可考寸以九分為法則淮南太史小司馬之説可推五聲二變之數變律半聲之例則杜氏之通典具焉變宫變徴之不得為調則孔氏之禮疏因亦可見至於先求聲氣之元而因律以生尺則尤所謂卓然者而亦班班雜見於兩漢之志蔡雍之説與夫國朝會要以及程子張子之言顧讀者不深考其間雖或有得於此者而又不能無失於彼是以晦蝕紛拏無復定論大抵不拘攣於習熟見聞之近即肆其胸臆妄為穿穴而無所據依季通乃能奮其獨見超然逺覽爬梳剔抉參互考尋用其平生之力以至於一旦豁然而融會貫通焉斯亦可謂勤矣及其著論則又能推原本根比次條理管括機要闡究精微不為浮詞濫説以汨亂於其間亦庶幾乎得書之體者豫謂國家行且平定中原以開中天之運必將審音協律以諧神人當此之時受詔典領之臣能得此書而奏之則東京郊廟之樂將不待公孫述之瞽師而後備而參摹四分之書亦無待乎後世之子雲而後知好之矣抑季通之為此書詞約理明𥘉非難讀而讀之者往往未及終篇輒巳欠伸思睡固無由了其歸趣獨以豫之頑鈍不敏乃能熟復數過而僅得指意之倣佛季通以是亦許豫為能知巳志者故屬豫以序引而豫不得辭焉季通更欲均調節奏𬒳之管絃别為樂書以究其業而又以其餘力發揮武侯六十四陳之圖緒正邵氏皇極經世之歷以大備乎一家之言其用意亦健矣豫雖老病儻及見之則亦豈非千古之一快也哉淳熙丁未正月朔旦新安朱熹序小學題辭元亨利貞天道之常仁義禮智人性之綱凡此厥𥘉無有不善藹然四端隨感而見愛親敬兄忠君弟長是曰秉彛有順無強惟聖性者浩浩其天不加毫末萬善足焉衆人嗤嗤物欲交蔽乃頽其綱安此暴棄惟聖斯則建學立師以培其根以逹其枝小學之方灑掃應對入孝出弟動罔或悖行有餘力誦詩讀書詠歌舞蹈思罔或逾窮理修身斯學之大明命赫然罔有內外德崇業廣乃復其𥘉昔非不足今豈有餘世逺人亡經殘教弛蒙養弗端長益浮靡鄊無善俗世乏良材利欲紛拏異言喧豗幸兹秉彛極天罔墜爰輯舊聞庶覺來裔嗟嗟小子敬受此書匪我言耄惟聖之謨題小學古者小學教人以灑掃應對進退之節愛親敬長隆師親友之道皆所以為修身齊家治國平天下之本而必使其講而習之於幼稚之時欲其習與知長化與心成而無扞挌不勝之患也今其全書雖不可見而雜出於傳記者亦多讀者往往直以古今異宜而莫之行殊不知其無古今之異者固未始不可行也今頗搜輯以為此書受之童蒙資其講習庶幾有輔於風化之萬一云爾大學章句序大學之書古之大學所以教人之法也蓋自天降生民則既莫不與之以仁義禮智之性矣然其氣質之稟或不能齊是以不能皆有以知其性之所有而全之也一有聰明睿智能盡其性者出於其間則天必命之以為億兆之君師使之治而教之以復其性此伏羲神農黃帝堯舜所以繼天立極而司徒之職典樂之官所由設也三代之隆其法浸備然後王宫國都以及閭巷莫不有學人生八歲則自王公以下至於庶人之子弟皆入小學而教之以灑掃應對進退之節禮樂射御書數之文及其十有五年則自天子之元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學而教之以窮理正心修巳治人之道此又學校之教大小之節所以分也夫以學校之設其廣如此教之之術具次第節目之詳又如此而其所以為教則又皆本之人君躬行心得之餘不待求之民生日用彛倫之外是以當世之人無不學其學焉者無不有以知其性分之所固有職分之所當為而各俯焉以盡其力此古昔盛時所以治隆於上俗美於下而非後世之所能及也及周之衰賢聖之君不作學校之政不修教化陵夷風俗頽敗時則有若孔子之聖而不得君師之位以行其政教於是獨取先王之法誦而傳之以詔後世若曲禮少儀內則弟子職諸篇固小學之支流餘裔而此篇者則因小學之成功以著大學之明法外有以極其規模之大而內有以盡其節目之詳者也三千之徒蓋莫不聞其説而曽氏之傳獨得其宗於是作為傳義以發其意及孟子沒而其傳泯焉則其書雖存而知者鮮矣自是以來俗儒記誦詞章之習其功倍於小學而無用異端虛無寂滅之教其髙過於大學而無實其他權謀術數一切以就功名之説與夫百家衆技之流所以惑世誣民充塞仁義者又紛然雜出乎其間使其君子不幸而不得聞大道之要其小人不幸而不得蒙至治之澤晦盲否塞反覆沈痼以及五季之衰而壞亂極矣天運循環無往不復宋德隆盛治教休明於是河南程氏兩夫子出而有以接乎孟氏之傳實始尊信此篇而表章之既又為之次其簡編發其歸趣然後古者大學教人之法聖經賢傳之指粲然復明於世雖以熹之不敏亦幸私淑而與有聞焉顧其為書猶頗放失是以忘其固陋采而輯之間亦竊附巳意輔其闕略以俟後之君子極知僣踰無所逃罪然於國家化民成俗之意學者修巳治人之方則未必無小輔云淳熙巳酉二月甲子新安朱熹序中庸章句序中庸何為而作也子思子憂道學之失其傳而作也蓋自上古聖神繼天立極而道統之傳有自來矣其見於經則允執厥中者堯之所以授舜也人心惟危道心惟微惟精惟一允執厥中者舜之所以授禹也堯之一言至矣盡矣而舜復益之以三言者則所以明夫堯之一言必如是而後可庶幾也蓋嘗論之心之虛靈知覺一而巳矣而以為有人心道心之異者則以其或生於形氣之私或原於性命之正而所以為知覺者不同是以或危殆而不安或微妙而難見耳然人莫不有是形故雖上智不能無人心亦莫不有是性故雖下愚不能無道心二者雜於方寸之間而不知所以治之則危者愈危微者愈微而天理之公卒無以勝夫人欲之私矣精則察夫二者之間而不雜也一則守其本心之正而不離也從事於斯無少間斷必使道心常為一身之主而人心每聽命焉則危者安微者著而動靜云為自無過不及之差矣夫堯舜禹天下之大聖也以天下相傳天下之大事也以天下之大聖行天下之大事而其授受之際丁寧告戒不過如此則天下之理豈有以加於此哉自是以來聖聖相承若成湯文武之為君臯陶伊傅周召之為臣既皆以此而接夫道統之傳若吾夫子則雖不得其位而所以繼往聖開來學其功反有賢於堯舜者然當是時見而知之者惟顔氏曽氏之傳得其宗及曽氏之再傳而復得夫子之孫子思則去聖逺而異端起矣子思懼夫愈久而愈失其真也於是推本堯舜以來相傳之意質以平日所聞父師之言更互演繹作為此書以詔後之學者蓋其憂之也深故其言之也切其慮之也逺故其説之也詳其曰天命率性則道心之謂也其曰擇善固執則精一之謂也其曰君子時中則執中之謂也世之相後千有餘年而其言之不異如合符節歷選前聖之書所以提挈綱維開示藴奧未有若是其明且盡者也自是而又再傳以得孟氏為能推明是書以承先聖之統及其沒而遂失其傳焉則吾道之所寄不越乎言語文字之間而異端之説日新月盛以至於老佛之徒出則彌近理而大亂真矣然而尚幸此書之不泯故程夫子兄弟者出得有所考以續夫千載不傳之緒得有所據以斥夫二家似是之非蓋子思之功於是為大而微程夫子則亦莫能因其説而得其心也惜乎其所以為説者不傳而凡石氏之所輯録僅出於其門人之所記是以大義雖明而微言未析至其門人所自為説則雖頗詳盡而多所發明然倍其師説而淫於老佛者亦有之矣熹自蚤歲即嘗受讀而竊疑之沉潛反復蓋亦有年一旦恍然似有以得其要領者然後乃敢會衆説而折其中既為定著章句一篇以俟後之君子而一二同志復取石氏書刪其繁亂名以輯略且記所嘗論辨取舍之意别為或問以附其後然後此書之旨支分節解脈絡貫通詳略相因巨細畢舉而凡諸説之同異得失亦得以曲暢旁通而各極其趣雖於道統之傳不敢妄議然𥘉學之士或有取焉則亦庶乎行逺升髙之一助云爾淳熙巳酉春三月戊申新安朱熹序李存誠更名序李君棐忱相見於政和余問其名上字之義則曰先儒之訓以為輔也余謂不然古字多假借棐蓋與匪通用顔監之釋班史有是言矣余嘗以是考之凡書之言棐者皆當為匪其義乃通李君曰然則以匪忱為名愚之所不安也請有以易之余曰去匪而存忱可巳李君曰諾乃書以遺之而字之曰存誠云紹熙元年二月十八日朱熹仲晦父書雲龕李公文集序士君子所以立於斯世者不難於文而難於實不難於小而難於大此愚所以每竊有感於參知政事隴西文敏李公之文而病世之所以知公者殊淺也蓋自我宋之興百有餘年纍聖相承專以文治而其盛極於崇觀政宣之間一時學士大夫執簡秉筆爭以文字相髙其所以歌詠泰平藻飾治具者雜然並出如金石互奏宫徴相宣未有能優劣之者而李公以傑出之材雍容其間發大詔令草大箋奏富贍雄特精能華妙愈出而愈無窮直將關衆俊之口而奪之氣斯巳竒矣然使公之所立獨恃此而無其實或徒規規然務為小廉曲謹以投世俗之耳目而其大者無稱焉則亦何足以名於一世而垂無窮哉而公扈蹕臨安適遭巳酉三月五日之變當是之時一旦猝然事出非意羣公愕眙不知所以為䇿公獨挺身赴難神采毅然逆折凶渠喻以大義退而隂贊宰府為所以離二逆黨尊復明辟之計者甚悉是以平賊之功雖由外濟而髙宗皇帝察公之忠首擢以為尚書左丞而又賜之手札至有萬衆動色具臣􅌤顔之語嗚呼天地之間理義之實孰有大於君臣之際者而公於是乃能竭其股肱之力以有成功是其所立豈獨以其文而巳哉然公功成不居退而老於江海之上杜門終日絶口不道前事雖所以告其子弟者亦常欿然退託如有不足之意是以世之君子鮮或知之其所可考而必信者獨賴聖謨神翰炳若日星是以天下之公論至於久而後定耳以是觀之則世之獨以文字知公者豈非淺哉頃年公孫故建康通守誼嘗以公之遺文屬熹為序熹以不文謹謝不敢今年通守之弟齊安史君諶又以為請且曰諶之請非有他獨願得一言以發明公之大節使後世之知公者不獨以其文而巳爾熹於是乃敢拜受其書而三復焉因竊論其所感者如此以附篇後蓋公嘗受學於其世父右史樂靜先生而樂靜之學又得之髙郵孫中丞眉山蘇承旨其丁寧付授之意今略見公所撰樂靜文集後語中有本者固如是也紹熙元年冬十有一月某日具位朱熹序豐清敏遺事後序仲尼亟稱於水曰水哉水哉其詞約而旨微矣而孟子論其所取之意乃直以原泉混混不舍晝夜盈科而後進放乎四海者言之非其深造默識有以得乎聖人之心孰能知其所説之如此而有志之士欲有為於此世者又豈可以不察乎此而先立其本哉然自聖賢既逺道學不明士大夫不知用心於內以立其本而徒恃其意氣才力之盛以能有為於世者蓋亦多矣彼其見聞之慱詞令之美論議之韙節槩之髙一時之間從其外而觀之豈不誠有以過人者然探其中而責其實要其久而待其歸求其充然有以慰滿於人心而無一瑕之可指者則什百之中未見其可以一二數也嗚呼若禮部尚書縉雲清敏公者其真所謂有本者歟觀其平居暇日所以治心養氣而修諸身者蓋天下之物無足以纍其志是以為子則孝為吏則廉進而立乎本朝則上自宗廟以及人主之身內自禁掖近幸之私而外及乎朝廷卿相之重知無不言言無不盡蓋有當時法家拂士所為低回遷就而詭詞以幸濟者公獨正色誦言無少顧避退未嘗以語乎家而其計慮之明諌説之切所以不諧於時而卒驗於後者乃反因深文巧詆之筆而後顯及其出而賦政乎外退處乎鄉以至流放轉徙於荒寒寂寞之濵而遂奄然以沒其世則其所以處乎巨細顯微之間者又皆清明純潔而無一毫之歉是非所謂原泉混混而放乎四海者耶孔子之歎孟氏之言於是而益見其不我欺矣熹愚不肖生長窮鄉聞公之名而鄉往之久矣獨恨未能盡得其行事之本末前年公之曽孫中散大夫某持節南來亟往請焉大夫公出是書而遂以其序見屬熹不得辭也因次是説以附于章貢李公跋語之後雖於公之懿德馴行剛毅大節無能有所發明然使讀公之書而仰髙山行景行者知循其本而用力焉則亦世道人材之一助而非獨為豐氏之私也大夫公清苦廉直勤事愛民屢為刺史二千石入居郎省皆有顯聞然多不得久於其官蓋有公之風烈云紹熙二年夏四月戊寅朔朝散郎直寶文閣權發遣漳州軍州事朱熹序孫稽仲文集序蘇臺孫侯稽仲示豫以其所為文曰谷橋愚藁者十巨編曰豫之用力於此深矣子其為我評之熹不能文不知所以贊也然嘗讀稽仲兵要之書矣觀其𫐠作之體不為文字之空言而必要於實用此其志豈獨求以文鳴於世而巳哉今得此編而讀之則其律令之嚴關鍵之密又若未能無意於文者然其不為空言而必求有以發於物色事情之實則猶兵要也意翻空而易竒文徴實而難工昔之用力於文者蓋巳病之是以谷橋之篇驟而讀之𥘉若艱深嚴苦而不諧於俚耳至其合處則又從容間睱流暢發越若律吕之相和雌雄之相應此其用力之淺深世當有能識之者不待豫言而後信也至於談經之趣足以見其文之所以為本論事之章足以見其學之所以為用又皆明白磊落間見層出於其間嗚呼是亦冨矣異時有志之士蓋必將有考焉又不當專以文章利病而言也紹熙癸丑七月既望新安朱熹書武夷圖序乙卯中秋武夷君之名著自漢世祀以乾魚不知果何神也今建寧府崇安縣南二十餘里有山名武夷相傳即神所宅峯巒嵓壑秀拔竒偉清溪九曲流出其間兩崖絶壁人迹所不到處往往有枯查插石鏬間以􅍥舟船棺柩之屬柩中遺骸外列陶器尚皆未壞頗疑前世道阻未通川壅未決時夷落所居而漢祀者即其君長蓋亦避世之士生為衆所臣服沒而傳以為仙也今山之羣峯最髙且正者猶以大王為號半頂有小丘焉豈即君之居耶然舊記相傳詭妄不經不足考信故有版圖迫迮漶漫亦難辨識今沖佑羽人髙君文舉始復更定此本於其鄊偕隱顯之間為能有以盡發其祕且屬隱屏精舍仁智堂主為題其首以祛舊傳之惑云韓文考異序南安韓文出莆田方氏近世號為佳本豫讀之信然然猶恨其不盡載諸本同異而多折衷於三本也原三本之見信杭蜀以舊閣以官其信之也則冝然如歐陽公之言韓文印本𥘉未必誤多為校讎者妄改亦謂如羅池碑改步為涉田氏廟改天明為王明之類耳觀其自言為兒童時得蜀本韓文於隨州李氏計其歲月當在天禧中年且其書巳故弊脫略則其摹印之日與祥符杭本蓋未知其孰先孰後而嘉祐蜀本又其子孫明矣然而猶曰三十年間聞人有善本者必求而改正之則固未嘗必以舊本為是而悉從之也至於祕閣官書則亦民間所獻掌故令史所抄而一時館職所校耳其所傳者豈真作者之手藁而是正之者豈盡劉向楊椎之倫哉讀者正當擇其文理意義之善者而從之不當但以地望形勢為重輕也抑韓子之為文雖以力去陳言為務而又必以文從字順各識其職為貴讀者或未得此權度則其文理意義正自有未易言者是以豫於此書姑考諸本之同異而兼存之以待覽者之自擇區區妄意雖或竊有所疑而不敢偏有所廢也書韓文考異前此集今世本多不同惟近歲南安軍所刋方氏校定本號為精善别有舉正十卷論其所以去取之意又他本之所無也然其去取以祥符杭本嘉祐蜀本及李謝所據館閣本為定而尤尊館閣本雖有謬誤往往曲從他本雖善亦棄不録至於舉正則又例多而辭寡覽者或頗不能曉知故今輒因其書更為校定悉考衆本之同異而一以文勢義理及他書之可驗者決之苟是矣則雖民間近出小本不敢違有所未安則雖官本古本石本不敢信又各詳著其所以然者以為考異十卷庶幾去取之未善者覽者得以參伍而筆削焉林貫之字序莆田林井伯之子小字轉翁間以謂余請有以易之余曰日月山川隱疾之外何適而非名唯毋曰翁者以去自尊之嫌斯可巳乃請井伯姑仍上字而字以貫之且告之曰車之所以轉者輪也輪之所以轉者牙之圜也牙之所以轉者輻之直而災於轂也轂之所以轉者內空以貫乎軸而外能使輻以指牙也然自轂之外雖能轉物而未免自轉於物唯軸則承軫載物以貫夫轂而未嘗有所動焉是以不轉於物而物之可轉者皆唯我之所轉而莫能違也嗚呼人之為學至於有以自立其心而不為物之所轉則其日用之間所以貫夫事物之中者豈富貴所能淫貧賤所能移威武所能屈哉井伯家傳奧學所以教其子者固冝熟於此矣貫之其必以余言為不謬云黃子厚詩序余年十五六時與子厚相遇於屏山劉氏之齋館俱事病翁先生子厚少余一歲讀書為文略相上下猶或有時從余切磋以進其所不及後三四年余猶故也而子厚一旦忽踴躍驟進若不可以尋尺計出語落筆輒驚坐人余固歎其超然不可追逐而流輩中亦鮮有能及之者自爾二十餘年子厚之詩文日益工琴書日益妙而余日益昏惰乃不能及常人亦且自念其所曠闕又有急於此者因遂絶意一以頑鄙自安固不暇復與子厚度長潔大於文字間矣既而子厚一再徙家崇安浦城會聚稍希闊然每得其詩文筆札必為之把玩賞歎移日不能去手蓋子厚之文學太史公其詩學屈宋曹劉而下及於韋應物視柳子厚猶以為雜用今體不好也其􅊢古尤得魏晉以前筆意大抵氣韻豪爽而趣味幽潔蕭然無一點世俗氣中年不得志於場屋遂發憤謝去杜門讀書清坐竟日間輒曳杖行吟田野間望山臨水以自適其於騷詞能以楚聲古韻為之節奏抑揚髙下俯仰疾徐之間凌厲頓挫幽眇回鬱聞者為之感激慨歎或至泣下由是其詩日以髙古遂與世亢至不復可以示人或者得之亦不省其為何等語也獨余猶以舊習未忘之故頗能識其用意深處蓋未嘗不三復而深悲之以為子厚豈真坐此以窮然亦不意其遂窮以死也衰莫疾痛餘日幾何而交舊零落無復可與語此者方將訪其遺藁櫝而藏之以為後世必有能好之者而一日三山許閎生來訪袖出子厚手書所為詩若干篇别抄又若干篇以示余其間蓋又有余所未見者然後益知子厚晚歲之詩其變化開闔恍惚微妙又不止余昔日之所知也為之執卷流涕而識其後如此子厚名銖姓黃氏世家建之甌寧中徙頴昌且再世母孫讀書能文昆弟皆有異材而子厚所立卓然尤足以自表見顧乃不遇而厄窮以死是可悲也許生嘗學詩於子厚得其戶牖收拾遺文其多乃至於此拳拳綴緝師死而不忍倍之是又可嘉也巳慶元巳未七月壬子雲谷老人書楚辭後語目録序右楚辭後語目録以􅏯氏所集録續變二書刋輔定著凡五十二篇􅏯氏之為此書固主於辭而亦不得不兼於義今因其舊則其考於辭也冝益精而擇於義也當益嚴矣此余之所以兢兢而不得不致其謹也蓋屈子者窮而呼天疾痛而呼父母之詞也故今所欲取而使繼之者必其出於幽憂窮蹙怨慕凄涼之意乃為得其餘韻而宏衍巨麗之觀歡愈快適之語冝不得而與焉至論其等則又必以無心而冥會者為貴其或有是則雖逺且賤猶將汲而進之一有意於求似則雖迫真如楊柳亦不得巳而取之耳若其義則首篇所著荀卿子之言指意深切詞調鏗鏘君人者誠能使人朝夕諷誦不離於其側如衛武公之抑戒則所以入耳而著心者豈但廣厦細旃明師勸誦之益而巳哉此固余之所為眷眷而不能忘者若髙唐神女李姬洛神之屬其詞若不可廢而皆棄不録則以義裁之而斷其為禮法之罪人也髙唐卒章雖有恩萬方憂國害開聖賢輔不逮之云亦屠兒之禮佛倡家之讀禮耳幾何其不為獻笑之資而何諷一之有哉其息夫躬柳宗元之不棄則􅏯氏巳言之矣至於楊雄則未有議其罪者而余獨以為是其失節亦蔡琰之儔耳然琰猶知愧而自訟若雄則反訕前哲以自文冝又不得與琰比矣今皆取之豈不以夫琰之母子無絶道而於雄則欲因反騷而著蘇氏洪氏之貶詞以明天下之大戒也陶翁之詞􅏯氏以為中和之發於此不類特以其為古賦之流而取之是也抑以其自謂晉臣耻事二姓而言則其意亦不為不悲矣序列於此又何疑焉至於終篇特著張夫子吕與叔之言蓋又以告夫遊藝之及此者使知學之有本而反求之則文章有不足為者矣其餘微文碎義又各附見於本篇此不暇悉著云楚詞集注序右楚詞集注八卷今所校定其第録如上蓋自屈原賦離騷而南國宗之名章繼作通號楚辭大抵皆祖原意而離騷深逺矣竊嘗論之原之為人其志行雖或過於中庸而不可以為法然皆出於忠君愛國之誠心原之為書其辭旨雖或流於跌宕怪神怨懟激發而不可以為訓然皆生於繾綣惻怛不能自巳之至意雖其不知學於北方以求周公仲尼之道而獨馳騁於變風變雅之末流以故醇儒莊士或羞稱之然使世之放臣屏子怨妻去婦抆淚謳吟於下而所天者幸而聽之則於彼此之間天性民彛之善豈不足以交有所發而增夫三綱五典之重此豫之所以每有味於其言而不敢直以詞人之賦視之也然自原著此詞至漢未久而説者巳失其趣如太史公蓋未能免而劉安班固賈逵之書世復不傳及隋唐間為訓解者尚五六家又有僧道騫者能為楚聲之讀今亦漫不復存無以驗其説之得失而獨東京王逸章句與近世洪興祖輔注並行於世其於訓詁名物之間則巳詳矣顧王書之所取舍與其題號離合之間多可議者而洪皆不能有所是正至其大義則又皆未嘗沉潛反復嗟歎詠歌以尋其文詞指意之所出而遽欲取喻立説旁引曲證以強附於其事之巳然是以或以迂滯而逺於性情或以迫切而害於義理使原之所為抑鬱而不得伸於當年者又晦昧而不見白於後世豫於是益有感焉疾病呻吟之暇聊據舊編粗加櫽括定為集注八卷庶幾讀者得以見古人於千載之上而死者可作又足以知千載之下有知我者而不恨於來者之不聞也嗚呼悕矣是豈易與俗人言哉贈畫者張黃二生鄊人新作聚星亭欲畫荀陳遺事於屏間而窮鄊僻陋無從得本友人周元興吳和中共稱張黃二生之能因俾為之果能考究車服制度想像人物風采觀者皆歎其工二生因請為記其事豫以為二生更能逺遊以廣其見聞精思以開其胸臆則其所就當不止此豫老矣尚能為生印之慶元庚申正月二十四日晦菴病叟書贈張彥恱黃某周深父更名序水之深者淵回澄淡人莫能測其源底之所極其或未然則必濬之而後深此理之必然也深父更名以避前聖其意則巳善矣而其所欲名者又即其字而得夫所以深之之道焉豈不又甚可嘉也哉自今以往因稱有警而日有以深乎其內使相與遊者但見其淵回澄淡有異于前而莫際其極是則深父之果能為深而不負乎此名也夫慶元庚申閠月𥘉吉晦菴病叟書贈筆工蔡藻豫性不善書尤不能用兔毫弱筆建安蔡藻以筆名家其用羊毫者尤徑健豫是以恱之藻若去此而遊於都市蓋將與曹忠輩爭先云淳熙元年八月五日朱仲晦父書三先生論事録序昔顧子敦嘗為人言欲就山間與程正叔讀通典十年世之以是病先生之學者蓋不獨今日也夫法度不正則人極不立人極不立則仁義無所措仁義無所措則聖人之用息矣先生之學固非求子敦之知者而為先生之徒者吾懼子敦之言遂得行於其間因取先生兄弟與橫渠相與講明法度者録之篇首而集其平居議論附之目曰三先生論事録夫豈以為有輔於先生之學顧其所自警者不得不然耳懷安縣儒學訓導葉暢校晦庵先生朱文公文集卷第七十六
