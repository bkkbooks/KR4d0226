  text: 晦庵先生朱文公文集卷第二詩
  hash: sha256:668cd86137f9fe4dac78731e7636a252b0296cf7f7efe0ed2c6c7af61a8656c2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0226_SBCK_002-1a}
body:
  text: 送王季山赴龍溪故人千石令便道此之官契闊三秋永逢迎一笑懽田園知不逺謡俗問非難巳想躬玄黙鳴絃亦罷彈之德化宿劇頭舗夜聞杜宇王事賢勞秪自嗤一官今是五年期如何獨宿荒山夜更擁寒衾聽子規次韻傅丈題吕少衛教授藏書閣西樓誰與共閑居茂樹婆娑清晝餘大隱秪今同一壑行吟非昔似三閭揣摩心事惟黃卷料理家傅亦素書更鑿寒泉供嗽石世紛不擬問焉如次旬父韻五字何人寄鏘鳴滿䄂金劇知多暇日誰與共幽尋簿領淹窮海鸎花遶故林功名終好在且莫負𥘉心次祝澤之表兄韻祼䄇相向但悠悠信道乾坤日夜浮此去安心知有法向來示病不難瘳優㳺静室閑䆫底放浪東阡南陌頭萬事何由到懷抱夕陽芳草自春秋次祝澤之表兄韻送劉子晉歸省之子眞吾友心期到古人慇懃來講學迢遞逺辭親黃卷工夫妙斑衣夢想頻今朝首歸路何處問知津送祝澤之表兄還郷首夏何來此清秋却復歸應縁心未快豈是世相違落日空書館凉風凈客衣功名湏努力别淚莫頻揮知郡傳丈載酒幞𬒳過熹於九日山夜泛小舟弄月劇飲二首扁舟轉空闊煙水浩將平月色中流滿秋聲兩岸生杯深同醉極嘯罷獨䰟驚歸去空山黒西南河漢傾誰知方外客亦愛酒中仙共踏空林月來尋野渡船醉醒非各趣心跡兩忘縁江海情何限秋生蓬鬂邉教思堂作示諸同志吏局了無事横舎終日閑庭樹秋風至凉氣滿窓間高閣富文史諸生時往還縦談忽忘倦時觀非云慳詠歸同與點坐忘庶希顔塵累日以銷何必棲空山再得古木青山一何深上下盡雲木中有千歲姿偃蹇卧寒谷明堂不徴材大匠肻囬目樵斧莫謾尋從渠媚幽獨示諸同忘夏木巳云暗時禽變新聲林園草𬒳徑端居有餘清端居亦何爲日夕掩柴荆静有絃誦樂而無塵慮并良朋肻顧予尚有夙心傾深慚未聞道折衷非所寧眷焉撫流光中夜歎以驚高山徒仰止逺道何由征示四弟十日一洗沐諸生各歸休虚齋息群響兀坐心悠悠雨乆苔徑荒林深鳥啼幽階前樹萱草與子俱忘憂還家即事獻嵗事行役徂春始還歸昔往草未芳今來翠成幃扶踈滿園隂時禽互翻飛叢萱亦巳秀丹葩耀晨輝即事誰與娱淹留自忘機日暮復出門悵然心事違古人不可見獨掩荒園扉小盈道中今朝行役是登臨極目郊原快賞心却笑從前嫌俗事一春牢落閉門深題囊山寺曉發漁溪驛夜宿囊山寺雲海近蒼茫層嵐擁深翠行役倦脩途投歸聊一憇不學塔中仙名塗定何事題九日山石佛院亂峯軒二首因依古佛居結屋寒林杪當户碧峯稠雲烟自昏曉巖中老釋子白髪對青山不作㸔山想秋雲時往還題可老所藏徐明叔畫卷二首羣峯相接連斷處秋雲起雲起山更深咫尺愁千里流雲繞空山絶壁上蒼翠應有采芝人相期烟雨外再至同安假民舎以居示諸生端居託窮巷廪食守微官事少心慮怡吏休庭宇寛晨興吟誦餘體物隨所安杜門不復出悠然得真歡良朋夙所敦精義時一殫壺餐雖牢落此亦非所難許生不葷肉六月十五日詣水公菴雨作雲起欲爲雨中川分晦明纔驚横嶺斷巳覺踈林鳴空際旱塵滅虚堂凉思生頽簷滴瀝餘忽作流泉傾况此高人居地偏園景清芳馨雜悄蒨俯仰同鮮榮我來偶兹適中懷澹無營歸路緑泱漭因之想巖耕末利曠然塵慮盡爲對夕花明宻葉低層幄冰㽔亂玉英不因秋露濕詎識此香清預恐芳菲盡微吟遶砌行謝人送蘭幽獨塵事屏晼晚秋蘭滋芳馨不自媚掩抑空相思晤對日方永披叢露未晞翛然發孤詠九畹陳悲詩又淹留閱嵗序契闊心懷憂獨卧寄僧閭一室空山秋徘徊起顧望俯仰誰爲儔伊人逺贈問孤根亦綢繆芳馨不我遺三載娯清幽愧無瓊琚報厚意竟莫酬瞻彼南陔詩使我心悠悠秋蘭巳悴以其根歸學古秋至百草晦寂寞寒露滋蘭臯一以悴蕪穢不能治端居念離索無以遺所思願言託孤根嵗晏以爲期去嵗䝉學古分惠蘭花清賞旣歇復以根叢歸之故畹而學古預有今歲之約近聞頗巳著花輙賦小詩以尋前約幸一笑秋蘭遞𥘉馥芳意滿冲襟想子空齋裏凄凉楚客心夕風生逺思晨露灑中林頗憶孤根在幽期得重尋秋夕二首西齋坐竟日曠然誰與儔感兹風露夕始知天宇秋庭樹且扶踈時物詎淹留心空累云逺嵗月真悠悠公門了無事吏散終日閑凉葉何蕭蕭悲吟庭樹間琴書冩塵慮菽水怡親顔憶在中林日秋來長掩關秋夜聽雨奉懷子厚悄悄窓戸暗青燈讀殘書忽聽踈雨落稍知凉氣𥘉披襟聊自適掩卷方躊躇亦念同懷人悵望心煩紆鳴琴愛靜夜樂道今閑居岑岑空山中此夕知焉如對月思故山夜景沉沉新秋夜凉月滿荆扉露泫凝餘彩川明澄素暉中林竹樹映踈星河漢稀此夕情無限故園何日歸同僚小集梵天寺坐間雨作已復開霽歩至東橋玩月賦詩二首傑閣翔林杪披襟此日閑層雲生薄晚凉雨遍空山地逈衣裳冷天高澄霽還出門迷所適月色滿林關空山㸔雨罷微歩喜新凉月出澄餘景川明發素光星河方耿耿雲樹轉蒼蒼晤語逢清夜兹懷殊未央梵天觀雨持身乏古節寸禄乆棲遲蹔寄靈山寺空吟招隱詩讀書清磬外㸔雨暮鍾時漸喜凉秋近滄洲去有期兼山閣雨中兩山相接雨冥冥四牖東西萬木清靣似凍梨頭似雪後生誰與屬遺經登閣横空敞新閣高處絶炎氛野逈長風入天秋凉氣分憑欄生逸想投迹逺人羣終憶茅簷外空山多白雲秋懷二首秋風吹庭戸客子懷故郷矧此卧愁疾徘徊守空房佇想澗谷居林深慘悲凉鵾鷄感蕭辰拊翼號風霜氛雜無留氣悄蒨有餘芳幸聞衛生要招隱夙所臧終期謝世慮矯翮兹山岡懷痾坐竟日晚色散幽樹寂歴候蟲悲沆瀁碧草露端居興方澹沉黙自成趣羽觴歡獨持瑶琴誰與晤空知玄思清未惜年華度美人殊不來嵗月恐遲暮中元雨中呈子晉徂暑尚繁鬰大火空西流兹辰喜佳節凉雨忽驚秋晼晚蘭徑滋蕭萷庭樹幽炎氣一以去恢台逝不留刀筆隨事屏塵囂與心休端居諷道言焚香味眞諏子亦玩文史及此同優㳺秋暑晨興納新凉亭午倦猶暑卧對北窓扉淡泊將誰侣踈樹含輕颸時禽轉幽語端居悟物情即事聊容與和李伯玉用東坡韻賦梅花北風日日霾江村歸夣正爾勞營魂忽聞梅蘂臘前破楚客不愛蘭佩昏尋幽舊識此堂古曵杖偶集僧家園嵐隂春物未全到邂逅只有南枝温冷光自照眼色界雲艶未怯扶桑暾遥知雲臺溪上路玉樹十里藏山門自憐塵覊不得去坐想佳處知難言但哦君詩慰岑寂巳似共倒花前罇與諸人用東坡韻共賦梅花適得元履書有懷其人因復賦此以寄意焉羅浮山下黃茅村蘇仙仙去餘詩䰟梅花自入三疊曲至今不受蠻煙昏佳名一旦異凡木絶艶千古高名園却憐氷質不自暖雖有歩障難爲温羞同桃李媚春色敢與葵藿争朝暾歸來只有脩竹伴寂歴自掩踈籬門亦知真意還有在未覺浩氣終難言一杯勸汝吾不淺要汝共保山林罇挽劉寳學二首天地誰翻覆人謀痛莫支公扶西極柱威動北征旗肉食謀何鄙家山志忽齎平生出師表今日重傷悲生死公何有飄零我自傷向非憐不造那得此深藏心折風霜裏衣沾子姪行哦詩當肅挽悲哽不成章寄題梅川溪堂滄波流不極上有一畆園幽人掩關卧脩竹何姢姢虚堂面群峯秀色摩青天静有山水樂而無車馬喧人言市門子往往蒼崖顚揮手謝世人日中翔紫煙遺迹尚可覿神交邈無縁慨然一永歎耀靈忽西遷褰裳下中沚濯足娱清川和劉抱一幾年牢落舊村墟此日翛然水竹居病起試尋春遥草客來聊煑雪畦𬞞開樽細說平生事信手同繙集古書適意何勞一千卷新詩閑出笑談餘再和乆矣投装返舊墟不將心事賦閑居荷鉏帶月朝治穢植杖臨風夕挽𬞞三逕猶尋陶令宅萬籖聊借鄴侯書木瓜更得瓊琚報吟咏從今樂有餘送苪國器二首拄節千山外勤勞飽所經一心無適莫萬口自丹青拂拭先賢傳光輝處士星活人功更逺試與問林坰紫陌同年舊青雲得路新論心端有契下榻豈辭頻話别驚如許相逢渺未因期公念經濟從此上星辰梅花開盡不及吟賞感嘆成詩聊貽同好二首憶昔身無事尋梅只怕遲沉吟窺老樹取次折横枝絶艶驚衰鬂餘芳入小詩今年何草草政爾負幽期棐几冰壺在梅稍雪蕊空不堪三弄咽誰與一尊同鼻觀殘香裏心期昨夣中那知北枝北猶有未關叢宋丈示及紅梅臘梅借韻兩詩輙復和呈以發一笑聞說寒梅盡尋芳去巳遲冷香無宿蕊穠艶有繁枝正復非同調何妨續舊詩廣平偏娬媚鐵石悮心期宋丈此篇乃用施朱粉事悮一作悟風雪催殘臘南枝一夜空誰知荒草裏却有暗香同質瑩輕黄外芳滕淺絳中不遭岑寂侶何以媚孤叢呈黄子厚茅齋塵事逺幽獨興無窮永晝呻吟内新凉愁思中朱顔非昨日緑鬂又秋風珍重墻東客遥憐此意同奉酬子厚詠雪之作遥夜不能寐披衣起彷徨仰視天正黒寒氣慘悲凉飛霰忽下零雪花亦飄揚飄揚未云已湏臾滿空翔前山失舊姿川谷流素光念昔少小時無事志四方五年江海上不見雪與霜飄颻今日情浩蕩誰能量凌晨飲一杯竟日守空堂竚立玩竒變永言獲新章躊躇欲何報玉樹生瓊岡送籍溪胡丈赴館供職二首祖餞衣冠滿道周此行誰與話端由心知不作功名計秪爲蒼生未敢休執我仇仇詎我知謾將行止驗天機猿悲鶴怨因何事只恐先生䄂手歸寄籍溪胡丈及劉㳟父二首先生去上芸香閣閣老新峩豸角冠留取幽人卧空谷一川風月要人㸔甕牖前頭翠作屏晚來相對静儀刑浮雲一任閑舒卷萬古青山只麽青挽范直閣二首獻納陪興運如公衆所期憂時最深切信道不磷緇落落歸來賦忽怱殄瘁詩莬裘當日計宰木後人悲先友多名士存亡幾許人惟公且彊健於我更情親出處論心晚音書枉誨頻素車今日㑹誰與共傷神頃以多言害道絶不作詩兩日讀大學誠意章有感至日之朝起書此以自箴蓋不得巳而有言云神心洞玄鑒好惡審薰蕕云何反自誑閔黙還包羞今辰仲冬節寤歎得隱憂心知一寸光呈彼重泉幽朋來自兹始羣隂邈難留行迷亦巳逺及此旋吾輈仁術在昔賢君子存心毎欲仁求端從有術及物豈無因惻隱來何自虚明覺處眞擴充從此念福澤遍斯民入井倉皇際牽牛觳觫辰向來㸔楚越今日備吾身聞善決江河大舜深山日靈襟保太和一言分善利萬里決江河可欲非由外惟聦不在它勇如爭赴壑進豈待盈科學海功難並防川患益多何人親祖述耳順肯同波仰思二首公德明光萬世師從容酬酢更何疑當年不合知何事清夜端居獨仰思聖賢事業理難同僣作新題欲自攻王事兼施吾豈敢儻容思勉議成功困學二首舊喜安心苦覔心捐書絶學費追尋困衡此日安無地始覺從前枉寸隂困學工夫豈易成斯名獨恐是虚稱傍人莫笑標題誤庸行庸言實未能復齋偶題出入無時是此心豈知鷄犬易追尋請㸔屏上𥘉爻旨便識名齋用意深示四弟務學脩身要及時競辰湏念隙駒馳清宵白日供遊蕩愁殺堂前老古錐克巳寳鑑當年照膽寒向來埋没太無端秪今垢盡明全見還得當年寳鑑㸔曽點春服𥘉成麗景遲歩隨流水玩晴漪微吟緩節歸來晚一任輕風拂靣吹伐木伐木相將入逺山共聽幽鳥語關關殷勤若解當時意此日那容不盡歡春日勝日尋芳泗水濵無邉光景一時新等閑識得東風靣萬紫千紅緫是春春日偶作聞道西園春色深急穿芒屩去登臨千葩萬蕊争紅紫誰識乾坤造化心觀書有感二首半畆方塘一鑑開天光雲影共徘徊問渠那得清如許爲有源頭活水來昨夜江邉春水生䝉衝巨艦一毛輕向來枉費推移力此日中流自在行題西林院壁二首觸目風光不易裁此間何似舞雩臺病軀若得長無事春服成時歲一來巾屨翛然一鉢囊何妨且住賛公房却嫌宴坐觀心處不奈簷花抵死香簷前有柚花題西林可師逹觀軒窈窕雲房深復深層軒俄此快登臨卷簾一目遥山碧底是高人逹觀心再題紹興庚辰冬予來謁隴西先生退而寓於西林院惟可師之舎以朝夕往來受教焉閱數月而後去可師始嘗爲一室於其居之左軒其東南以徙倚瞻眺而今鈆山尉李兄端父名之曰逹觀軒蓋取賈子所謂逹人大觀物無不可云者予嘗戯爲之詩以示可師旣去而遂忘之壬午春復拜先生於建安而從以來又舎于此者㡬月師不予厭也且欲予書其本末置壁間因取舊詩讀之則嵗月逝矣而予心之所至者未尺寸進焉爲之三歎自廢顧師請之勤勤不得辭於是手書授之而又叙其所以然者如此雖其辭鄙陋若無足稽然予之往來師門盖未愸也異時復至又將假館于此仰視屋壁因舊題以尋歲月而惕然乎其終未有聞也然則是詩之不沒亦予所以自勵者可師嘗遊諸方問佛法大意未倦而歸尚有以識予意也三月九日熹書古寺重來感慨深小軒仍是舊窺臨向來妙處今遺恨萬古長空一片心示西林可師二首身世年來欲兩忘一春隨意住僧房行逢舊隱低回乆緑樹鶯啼清晝長幽居四畔只空林啼鳥落花春意深獨宿塵龕無夢寐五更山月照寒衾感事書懷十六韻胡虜何年盛神州遂陸沉翠華棲浙右紫塞僅淮隂志士憂虞切朝家預備深一朝頒細札三捷便聞音授鉞無遺筭沈機識聖心東西兵合勢南北怨重尋小却竒還勝窮凶禍所臨旃裘方舞雪血刅巳披襟殘類隨煨燼遺黎脫斧碪戴商仍夙昔思漢劇謳吟共惜山河固同嗟嵗月侵泉蓍乆憔悴陵栢幸蕭槮正爾資群䇿何妨試盍簮折衝湏舊衮出牧仗南金衆志非難狥天休詎可諶故人司獻納早晚奉良箴次韻劉彦采觀雪之句朔風吹空林眇眇無因依但有西北雲冉冉東南飛湏臾層隂合慘淡周八維凍雨不流淵飛花舞妍姿翳空乍滅没散影還參差萬點隨飄零百嘉濳潤滋徘徊瞻詠乆黙識造化機上寒下必温欲積無根基漸㸔谷樹變稍覺叢篁低皓然遂同色宇宙乃爾竒繁華改新觀凛冽忘前悲摛章愧佳友佇立迎寒吹感此節物好嘆息今何時當念長江北鐵馬紛交馳次韻彦采病中口占一搨流年度篝燈遥夜䦨短衾閑自擁清鏡莫頻㸔竹宻𥘉驚雪梅踈却耐寒從今花木夣無復在雕欄感事聞說淮南路胡塵滿眼黄棄軀慚國士嘗膽念君王却敵非干櫓信威藉紀綱丹心危欲折竚立但彷徨聞二十八日之報喜而成詩七首胡馬無端莫四馳漢家元有中興期旃裘喋血淮山寺天命人心合自知天驕得意任驅馳太嵗乗蛇巳應期一夜旄頭光殞地飲江胡馬未全知雪擁貂裘一馬馳孤軍左袒事難期奏函夜入明光殿底事廬兒探得知所報乃御营宿衛官奏故有是句渡淮諸將巳爭馳兔脫鷹揚不㑹期殺盡殘胡方反斾里閭元未有人知漢節熒煌直北馳皇家卜世萬年期東京盛德符高祖說與中原父老知追鋒聞說日驅馳舊德登庸儻有期張魏公聖主聰明似堯禹忠邪如許詎難知㳟惟大號乆風馳清蹕傳呼却未期此日不湏勞玉趾寸心那得侍臣知次子有聞捷韻四首神州荆棘欲成林霜露凄凉感聖心故老幾人今好在壺漿爭聽鼓鼙音殺氣先歸江上林貔貅百萬想同心明朝滅盡夭驕子南北東西盡好音孤臣殘疾卧空林不奈憂時一寸心誰遣捷書來篳戸眞同百蟄聽雷音胡命湏臾兔走林驕豪無復向來心莫煩王旅追窮宼鶴唳風聲盡好音奉陪判院丈充父平父兄宿回向用知郡丈壁間舊題之韻暮雨停驂處僧廬古道邉千峯環傑閣一水下平田行役無期度經過幾嵗年明朝湏飽飯躡足上寒煙感事再用回向壁間舊韻二首江北傳烽火胡兒大入邉巳聞隳列障不但擾屯田借箸思人傑摧鋒屬少年偷安慙暇食萬竈起愁煙廊廟憂虞裏風塵慘淡邉早知煩汗馬悔不是留田迷國嗟誰子和戎誤往年腐儒空感慨無䇿静狼煙䝉判院丈示及再用元韻之作率易和呈以求指誨疇昔經行地溪山寂寞邉冰霜凝巨壑風雨暗中田古寺堪投晚塵龕閱紀年論文寒夜永清絶裊爐烟數日前與判院丈有宋村之約雪中有懐奉呈判院通判二丈雲垂天闊歲將闌一室翛然獨掩關擁褐不如風折木開軒惟見雪漫山玄空杳靄低迷外碧樹瓏璁掩映間吟罷左思招隱句扁舟無路過長灣次韻判院丈雪意之作端居歲復窮閉戸守冲澹風隂原野悲月黒庭除暗淅瀝静先知崩奔誰與探坐想青瑶林寒光生素艶熹伏䝉判院丈垂示用韻喜晴之句率爾奉酬伏乞笑覧客枕終難穩歸來鼾息深曉鷄回逺夣缺月掛空林氷谷晨加㡌晴窓晝解襟詩筒多妙語仍喜舊盟尋登梅嶺去路霜威勁歸程雪意深往還無幾日景物變千林曉磴𥘉移屐寒雲欲滿襟玉梅踈半落猶足慰幽尋雪意向晚浮雲四靣平北風號怒逹天明寒窓一夜清無睡擬聴杉篁葉上聲昨夕不知有雪而晨起四望逺峯皆巳變色再用元韻作兩絶句朔風吹盡暮雲平室暖爐紅睡逹明但恠朝來滿山白下知昨夜打窓聲千林無葉一川平萬壑瓊瑶照夜明未覺殘梅飄落盡只愁羗管不成聲奉陪彦集充父同㳺瑞巖謹次莆田使君留題之韻踏破千林黃葉堆林間臺殿欝崔嵬谷泉噴薄秋逾響山翠空𪷟晝不開一壑秪今藏勝槩三生疇昔記曽來觧衣正作留連計未許山靈便郤回仗讀趙清獻公瑞巖留題感歎之餘追次元韻趙公名迹此猶微巳薦行蔵第一機直自當年留翰墨至今窮谷尚光輝時清諫䟽空遺藁歳晚高齋自掩扉高齋公晚年所居每夕獨處一室使人扃其外云珍重九原如可作問渠何處是真歸伏讀二劉公瑞巖留題感事興懷至於隕涕追次元韻偶成二篇誰將健筆寫崖隂想見當年抱膝吟緩帶輕裘成昨夣遺風餘烈到如今西山爽氣㸔猶在北闕精誠直自深故壘近聞新破竹起公無路秪傷心右懷寳學公作近聞西兵進取關陜其帥即公舊部曲也投紱歸來卧赤城家山無處不經行寒巖解榻夣應好絶壁題詩語太清陳迹一朝成寂寞靈臺千古自虚明傳來舊業荒蕪盡慙愧秋原宿草生右懐病翁先生作翁領崇道祠官故有赤城之句入瑞巖道間得四絶句呈彦集充父二兄憶昔南逰桂樹隂歸來遺恨滿塵襟籃輿此日無窮思萬壑千岩秋氣深翩翩一馬兩肩輿路轉秋原十里餘共說前山深更好不辭迢遞欵禪居清溪流過碧山頭空水澄鮮一色秋隔㫁紅塵三十里白雲黄葉共悠悠風高木落晚秋時日暮千林黃葉稀秪有蒼蒼谷中樹歲寒心事不相違挽籍溪胡先生三首夫子生名世窮居幾歲年聖門雖力造美質自天全樂道𥘉辭幣憂時晚奏篇行藏今巳矣心迹故超然澹泊忘懷乆渾淪玩意深簟瓢無改樂山水自知音冊府遺編在公所定著論語會義副在秘閣丘原宰樹隂門人封馬鬛寒日共沾襟先友多淪謝唯公尚典刑向來深繾綣猶足慰飄零喬木摧霜幹長空没暁星傷心遽如許孤露轉竛竮次韻潮州詩六首濠上齋二首黃堂理事餘便坐永兹日語黙趣雖殊晦明心本一舊聞眞體露巳歎群疑失迨此復幾年定知乆純白道若大路然奈此人好徑即事昧本心離動覔眞静安知濠上翁妙入玄中境偶寄郡齋閑無欲民自正閑坐坐歗無餘事淡然塵慮希閑中自怡恱妙處絶幾微韓子成今古顚師果是非悠然發孤些千載儻來歸銷㓂年來掲陽郡牢落海隂墟雲嶠無幽子潢池有跖徒單車亦已稅蔓草不湏鉏比屋絃歌裏功高化鱷圖山丹昔逰嶺海間幾見蠻卉拆素英漙夕露朱蘤爛晴日歸來今幾年晤對秪寒碧因君賦山丹恱復見顔色山居即事用疊翠亭韻世情日以踈庭樹日以宻我心自悠悠兩忘喧與寂門開山疊翠雨罷雲絶迹天涯此興同萬里寄消息柬舎姪回頭别子時歲月劇風雨老大無所成慙嘆中夜舞長鑱足呻吟短褐極藍縷古人不可期炯炯心獨苦夏日齋居得潮州詩卷咏歎之餘用卒章之韻以紀其事孟夏氣淑清窓戸有佳色卧聞幽籜翻轉覺林景寂參差帙委素縹緲香横碧啜菽有餘懽纓冠非所職故人海邉郡妙語寄逺翼咏嘆不得聞超然見胷臆壽母生朝下六首附見於此秋風蕭爽天氣凉此日何日升斯堂堂中老人壽而康紅顔緑鬂雙瞳方家貧兒癡但深藏五年不出門庭荒竈陘十日九不煬豈辦甘脆陳壺觴低頭包羞汗如漿老人此心乆已忘一笑謂汝庸何傷人間榮耀豈可常惟有道義思無疆勉勵汝節彌堅剛熹前再拜謝阿娘自古作善天降祥但願年年似今日老萊母子俱徜徉又二首敬爲生朝舉一觴短歌歌罷意偏長願言壽考宜孫子緑鬢朱顔樂未央隂澹園林嵗欲霜恠來和氣滿中堂要知積善工夫巧變得人間作壽郷又三首昨夜秋風凉氣歸今朝喜色動簾幃細斟㶑灧新春酒戯舞斑斕舊綵衣願上龜蓮千嵗夀永令鳧藻一家肥也知厚徳天應報更說隂功世所希暑退秋容欲凛然北堂佳氣倍澄鮮舊痾巳向新凉失壽骨應隨爽籟堅塵外光隂那有盡尊前風月浩無邉癡兒六六今如許慚媿西河不老仙仙人昔住紫琳房一旦翩然下太荒乆悟客塵無自性故應福禄未渠央徙居邂逅成嘉遯捧檄因循愧漫郎願借寒潭千丈碧年年此日奉華觴又一首竹栢交柯庭院清西風不動翠簾旌高堂正喜新凉入樂事仍逢壽斚傾盡室丹衷歸善禱滿頭緑鬂定重生年年此日歡娱意更願時豐樂太平丁丑冬在温陵陪敦宗李丈與一二道人同和東坡惠州梅花詩皆一再往及昨日見梅追省前事忽忽五年舊詩不復可記憶再和一篇呈諸友兄一笑同賦江梅欲破江南村無人解與招芳魂朔雲爲㫁蜂蝶信凍雨一洗煙塵昏天憐絶艶世無匹故遣寂寞依山園自欣羗笛娱夜永未要鄒律回春温連姢窺水墮殘月的礫泣露晞晨暾海山清㳺記玉靣衰病此日空柴門相逢不敢話疇昔能賦豈必皆成言雕鐫肝賢竟何益况復制酒哦空樽歲晚燕集以梅花巳判隔年開分韻賦詩得巳字陽愆冬氣昏日暮悲風起晤言欲誰從斗酒㑹隣里盤餐乏珍脆肴核闕儲峙無以奉嘉賔缾罄亦可耻所頼數子賢深睠不余鄙夜䦨更促席燈火共歡喜酣歌氣激冽傑句韻清美衰懶愧英游歲晚情何巳卓國太生朝太下疑當有夫人二字鳯凰山下鳯凰城十載重來雙眼明賸喜故人頻獻納足知賢母外榮名生朝舉酒天香裏賤子當歌魯頌聲問訊豪眉今幾許年年此日照人清又一首玄冬周四運肅氣驅煩喧孕此貞秀質徳美難具論巍巍北堂高福履神所敦晨昏極榮養夙昔䝉天恩明年啓國封屈狄文魚軒斑衣結紫綬玉樹承金尊歡娱何所忘千載如飛奔惟應玄中趣眇眇自本根洗心河漢津入此無窮門超然謝衆甫永與天壤存社後一日作聖作重品節等殺古所詳里有秦社稷僣差遂無章王綱諒巳墮精意尚不亡尚論千載前簡編有遺芳侃侃陳孺子恂恂萬春郷敬㳟事耆老禱賽謹田桑悠悠我里居嵗事有故常向來諸老翁惇厖亦端莊交神庶或享與物同樂康今我胡不樂悵然下頽岡古人不可見今人自猖狂三月三日祀事畢因脩禊事于靈𣑽以高閣一長望分韻賦詩得一字逝川無停波嵗月一何疾居然雨露濡我意日蕭瑟共惟西山足宰樹乆䝉宻晤言起哀敬時事該禮律肴羞旣紛羅薦饋亦芳苾周旋極悽愴俛仰詎終畢更衣適精舎鄰曲㑹兹日簋黍畀煇胞從容罄膋膟嘉賔更盤礡環堵窺逸筆即事君獨哦非才我何述矧兹衰病餘苦畏煩慮怵賦罷掩寒棲存存常抱一夏日二首端居倦時暑竟日掩柴門窓風逺飊至竹樹清隂繁静有圖史樂寂無車馬喧兹焉愜所尚難與世人論季夏園木暗窓戸貯清隂長風一掩苒衆緑何蕭槮玩此消永晝冷然滌幽襟俯仰無所爲聊復得此心汲清泉漬竒石置熏爐其後香烟𬒳之江山雲物居然有萬里趣因作四小詩晴窓出寸碧倒影媚中川雲氣一吞吐湖江心渺然一水渺空闊羣山中接連寒隂白霧湧飛度碧峰前隱几對寒碧忘言心自閑豈知宜寂士滅跡青峯間杜詩滅跡君山湖上之青峯吟餘忽自笑老矣方好弄慨然思古人尺璧寸隂重偶題三首門外青山翠紫堆幅巾終日靣崔嵬只㸔雲㫁成飛雨不道雲從底處來擘開蒼峽吼奔雷萬斛飛泉湧出來㫁梗枯槎無泊處一川寒碧自縈回歩隨流水覔溪源行到源頭却惘然始悟眞源行不到倚笻隨處弄潺湲次張彦輔韻風霜歲云徂塵事眯雙目故人書鼎來照眼一連玉把玩不知疲日晏坐空腹卷藏什襲秘寒光夜穿櫝嗟予骯髒姿十駕不能速丘壑聊自娯簞瓢亦云足君侯湖海士逸氣謝追逐胡爲不予鄙乃肯顧林谷高軒緩前期清夣遶雙竹起將杜陵句寫寄玉川屋我窮詩未工最覺貂難續感君慇懃意吟苦屢更燭羣公饒藻思裂牋動盈束歴險正摧輈争先俄擊轂低回欲引避悵望曷歸宿出吻竟無竒彊顔終自恧北風催歲年兩鬢失新緑樊生念學稼曹子悲食粟死灰寜復然寡過良所欲耿耿自知明何勞詹尹卜次張彦輔賞梅韻朔風萬里開雲屏清霜夜墜朝景晴南枝浩蕩正春色凍蘂的皪含空明花邉偶對青銅鏡槁項不堪冰雪映擁爐獨坐只悲吟振䇿出逰舒逺興暗香何處時一飄行行復值最長條仰頭欲折渺誰贈滿意相思那得邀極知異縣淹行李心賞未甘輕付畀石雄賦罷不相聞秀野書來因舉似兩翁句法爭新竒畫出踈影沉寒漪幽探自出塵境外勝槩未許兒曹知秪今嚼蘂攀條處它日重來記前度風臺月觀悄無言玉笛冰灘索同賦嗟予衰懶倦將迎過眼紛紛無復情尚喜踈英窺水白更憐落片點苔青興來亂挿飛蓬首擬向君家醉君酒酒酣耳熱莫狂歌布鼓雷門須縮手借韻呈府判張丈旣以奉箴且求教藥一生江海逈無儔材大應容小未周景好身閑眞復樂酒酣耳熱却堪憂飛騰莫羡摩天鵠純熟須參露地牛我亦醒狂多忤物頗能還贈一言不家山堂晚照效輞川體作二首夕陽浮逺空西峯背殘照爽氣轉分明與君共晚眺山外夕嵐明山前空翠滴日暮無與期閑來岸輕幘即事有懐寄彦輔仲宗二兄二首一水方涵碧千林巳變紅農收争暖日老病怯高風徙倚非無計心期莫與同向來歡㑹處離合太匆匆聞說雙飛槳翩然下廣津江湖知子樂魚鳥諒情親淹速湏關命行藏不繫人三山雖好在惜取自由身次知府府判二丈韻三首兩公清廟瑟窈窕拂朱絲事紀一朝勝名從千古垂流傳當共賦惆悵不同時且要君頥解寧辭匡說詩憶昨中秋夕寒盟約重尋幔亭懽舉酒江閣快論心月墮俱忘起罍空始罷斟秪今千嶺隔悵望一何深武夷之遊張王二丈元履子厚及熹與焉江閣之集子衡移具知府丈亦賜臨屈此詩併簡同㑹諸公云志士懐韜畧竒兵吼鏌干關河那得往肝膽不勝寒壯節悲如許雄圖渺未䦨皇輿方反席陋巷敢求安得浙中知舊書云聖上留意武備諸郡練卒皆點名閱武賜賚有加戎士感奮巢居之集以中有學仙侣吹簫弄明月爲韻探䇿賦之而熹得中字遂誤爲諸君所推高俾專主約旣而賦詩者頗失期於是令最後者具主禮以當罰乃稍集獨敦夫圭甫違令後至衆白罰如約飲罷以蒼茫雲海路歲晚將無獲分韻熹得將字而子衡兄得蒼字實代熹出令一昨樓上飲所歡不可忘羣公各賦詩佩玉何鏘鏘二子朱絲絃掩抑獨叵量經營乆不作一奏聲滿堂巧遲未足多譴負先取償主盟謬夙推否徳愧莫當兹焉不舉法何以存令章劉子具盤食魏子輸壺漿悠然復一醉歸路相扶將昨承諸兄臨辱不揆以薄酒𬞞食延駐都騎明日視壁間所張墨刻有亡去者人以爲徳慶丈之廋也馳問遣索䝉需拙詩輙賦所懷徃奉一笑而尊犍刻可以歸於我矣歲暮霜霰集賔友從我游置酒臨髙齋觴酌屢獻酬雞黍罄中庖肴核供庶羞所恨乏珍肥懽意不得周何牾上客懷徙我夜壑舟平明但素壁篆刻不可求究索勞象罔高蹤希盗丘我亦慚仲子獨未忘輕裘昨以詩徴亡碑於四十一丈既䝉酬和而諸兄亦繼作焉聮爲巨編藏之巾笥雖所亡古刻不可復得而此之所獲則巳多矣顧其中猶有不能釋然者因念吾子厚隷法妙古人當爲我大書偉辭於壁庶以焜燿區區之望彼死鬼之陳迹其存亡盖不足爲重輕也次韻見意云端居感物化悵恨不出游賦詩往追亡顧得雜佩酬結綬光陸離緼𫀆非所羞終然抱耿耿尼父悲東周凄凉尊犍崖望想滄浪舟低徊不得去寂寞將焉求安知崔蔡徒考槃共斯丘爲我揮素壁報君當紫裘少陵詩紫裘隨劒几義取無虚嵗謂李邕受渭筆資再賦解嘲宇宙一瞬息人生等浮游云何百年内萬變紛相酬顚倒不自知旁觀乃堪羞拱揖尚虞夏干戈到商周豈悟曠士懷泛若不繫舟駟馬諒弗視名高非所求彼哉夸奪子逝矣崑崙丘褰裳絶㝠外天風舞雲裘熹受碑于共父以禮讓四十一丈取之於熹則有慙德矣故有商周之語題祝生畫呈裴丈二首近代丹青手心期良獨難夫君偏有思妙處却無端堂上三湘逺人間五月寒空嚢今有此不用一錢㸔斗酒淋漓後顚狂不作難千峯俄紙上萬景忽豪端石瘦岡巒古林深煙雨寒蒼茫無限意俗眼若爲㸔挽延平李先生三首河洛傳心後毫釐復易差淫辭方昡俗夫子獨名家本本𥘉無二存存自不邪誰知經濟業零落舊煙霞聞道無餘事窮居不計年簞瓢渾謾與風月自悠然灑落濂溪句從容洛社篇平生行樂地今日但新阡岐路方南北師門數仭高一言資善誘十載笑徒勞斬板今來此懷經痛所遭有疑無與析揮淚首頻搔用西林舊韻二首一自籃輿去不回故山空鎻舊池臺傷心觸目經行處幾度親陪杖屨來上䟽歸來空皂囊未妨隨意宿僧房舊題歲月那堪數慙愧平生一瓣香晦菴先生朱文公文集卷第二詣水公庵雨作雲起一作雲氣謝人送蘭厚意一作晤歎寄題梅川溪堂人言一作今古再和劉抱一猶尋一作獨尋復齋偶題豈知一作豈如示四弟清宵一作清隂遊蕩一作遨蕩堂前一作堂頭春日偶作色深一作巳深觀書有感一作雜詩一作絶句問渠那得清如許一作恠来澈底清無滓江邉一作江頭枉費一作幾費感事書懷間音一作同音共惜一作共措聞二十八日之報忠邪一作羣臣㳟惟一作㳟聞次子有聞捷不奈一作無奈感事江北傳烽火一作烽火傳江北推鋒一作堆鋒暇食一作飽食留田一作屯田登梅嶺玉梅一作野梅雪意浮雲一作愁雲逹天一作徹天讀二劉公瑞岩留題慙愧一作悵望瑞岩絶句風髙一作霜清黄葉一作紅葉柬舎姪一作柬令姪再和東坡惠州梅花詩記玉一作識玉卓國太生朝所忘一作所至社後一日作耆老一作耆年惇厖一作淳厖靈梵分韻蕭索一作蕭瑟夏日永晝一作永日汲清泉作湖江一作湖山偶題青山一作南山家山堂晩照與君共一作爲君共次知府府判韻約重一作得重福州府儒學訓導舒鏊校晦庵先生朱文公文别集卷第二書時事出處李端甫以下見蔡乆軒所刋慶元書帖聞小豸旣逐零陵即將次及亦欲置之叛逆之科不知如何又却中輟不免命也臧氏其如予何劉季章近日樓大防又巳行遣一時流輩芟夷略盡其勢必從頭别㝷題目整頓一畨聞郷日湖南所按吏有訴冤於朝者已下本路體量改正次第首見及矣黃直卿外間洶洶未巳樓大防亦不免聞林采訴冤於朝巳下本路究實先所委官見其案牘駭異不敢下笔巳改送他官如其所請北諸人撏剥巳盡或湏作話頭來相料理老朽寧復計此一聽諸天而巳祝汝玉某罪戾所積乆知不免不謂尚爾推遷以至今日孤豚之蹤𥘉亦何足言頋乃重貽有識之憂四方朋遊盖皆有謝絶生徒之誨然鄙性於此却有所不安姑復任之若禍害之来未遽止此計亦非闔門塞竇所能避也季通徒歩上道令人愧嘆昨日又聞有毁郷校以還僧坊之請事亦施行彼巍然當坐者豈亦不謝客而遭此耶可付一大笑也劉公度承書聞爲况之適足以爲尉患難如此乃是玉汝於成切冝強自振拔勿令頽墮爲佳向来長沙時巳覺意思不似南康時後来尤覺不長進今巳議親爲誰氏此尤不謹季通聲問殊不佳而其家未得油其季子沉字仲黙第三在侍旁不知何故不命之如所傳今巳兩月矣交㳺四十年於學無所不講所頼以祛蒙蔽者爲多不謂晚年乃以無狀之迹株連及禍遂至於此聞之痛怛不知涕泗之流落也蔡季通時論如此未見陽復之驗自劾之章又復不効然聞論者頗喧勢必不免然命已下又不容不盡所懐見此草奏旦夕發行即束裝俟譴矣黨錮傳何必讀行且親見之矣某聞以臺察文字巳有禠職罷祠之命祠禄恰滿餘未𬒳受亦未見章䟽云何儲行之書來說渠亦遭章說移學切恐亦不能不𬒳及賢者亦可笑也昨日歸来意緒不佳幾成大病向晚擁裘附火幸得少定方念未聞經夕動静忽辱手示忻慰律凖巳領圖志先納上諸書及藥容來晚上去靣納次此間書冊在書几者一哥必知次第恐或要用即就請幸預戒之也里中恐有留委幸見喻旣欲歸長沙想只取劉原路𥘉欲先走莒口奉别今只宿市中以俟發程矣彼中風土氣候果如何地主旣郷曲想必有以相處居止亦便安否乍到未甚定疊亦是常事少湏當自妥帖矣一哥前日到此云尊嫂曾以不安亦只是舊疾㝷亦向安矣居晦來日就道某季子挈婦来歸不免小冗漫附數字所欲扣者非逺書所能致所可言者亦不暇究悉也唯千萬自愛爲禱居晦適相别因語之云賤迹不可知若得在嶺右當得託餘芘此非戲語已十分作此凖擬矣景建詩甚佳頋鄙拙不足當耳書中甚知敬服後生亦不易得似此㑹得人說話者也向曾說區淳者否似只是全道間人可試物色收拾之也知舊相勸杜門謝客者多鄙性不耐如此又巳作如此斷置固不復能頋慮也居晦必有回便幸子細作報章欲詳知彼中動息也章茂獻頴先生之孫主薄家藏所需廟議以乏人使令兩日方冩得了適有長沙便兵却託虞推轉致幸視至但再讀之頗覺當時匆匆詞不足以逹意不能無遺恨耳某拜鐫罷之命罪大責輕唯知感戴尚復何說第恨詿誤㫄人及遭重貶耳劉智夫崇之先生之曽孫市轄濬家藏刋帖某方辭命召遽𬒳恩除控免踰月未聞賜報益重憂恐来書縷縷備悉至意區區本懐亦豈恝然於此世但恐隂盛陽㣲未容措手而巳墮機穽耳反復諄喻盖已慮之袁丈前日相見於大湖恨其發之太輕反爲群枉之助也以近事一二參較巳是什八九分不可復出但所遣人未還未知端的耳劉智夫某前月望日遣人入都至今未還必是值祥祭一畨禮数未得將上不知竟可得請否耳間邸報遟緩近亦殊無異聞但編類奏劄一事恐有深意不知出於何人或恐偶然妄發未必思慮到此亦不可知耳聞近到城中恐有所聞幸子細喻及也機仲相見必欵或云集賢曽於榻前及前日事如此恐湏得一州郡但不知所傳端的否耳周貴卿来相訪云當赴省無力可辦行計某不能如之何因其歸謾附此恐郷里或前路有可周旋處得與留念幸甚劉智夫新除未厭士友之望然以足以優游除爲請外之計但有江湖佳闕不可蹉過耳不然則自此一向直前捐身爲國亦無不可但恐未得當此地矣做得未甚有益則又不若𥘉計平平之爲善耳某懇辭未獲不敢固必但欲換得一小小軍壘或謀議官之属爲三徑資不知諸公能許之否聞長沙頗費力得免幸也劉智夫某兹聞時事曲折差慰人意最是北内康復尤爲莫大之慶宗社幸甚某再辭不獲無可柰何只得勉強一行但心力短耗目昏尤甚未知果能勝此重寄否耳劉智夫某扶病此来已交郡事破壊空乏不可支吾皆未暇言而婺矛牙不恤緯之憂有不勝言者柰何柰何版築之計直當罷休但陶甓之費巳六七萬散積曠野之中若不收拾結抺則此皆爲棄物矣正自未有處也劉智夫某涕泣再拜恭聞十至尊夀皇聖帝奄棄萬方痛纒普率况以孤賤蒙𬒳恩私悲痛崩摧豈勝號訴想在朝之乆尤當同此情也比来物情事勢復如何入還千萬悉以所聞見告濫叨藩守不能有以匡衛王室永負臣子之責爲萬世之罪人矣劉智夫某衰晚闊踈守藩亡狀巳不堪收召之恩矣忽於道間又𬒳除目超躐殊甚豈所敢當巳上免章却於上饒俟命若便得請即自彼而歸亦不難也劉智夫再詞未允勢湏一行巳入文字乞許且以舊官入對靣辭新命矣若得改授次等講官使得效其尺寸亦萬幸也但事體巳如此捧土以塞孟津恐未必能有益耳劉智夫某二十日巳到家疲憊雖劇然溪山之樂足以自慰精舎功夫漸見次第逺方朋友亦巳漸有来者江陵勢必難赴今遣人上奏懇辭計必得之或别有行遣亦且得免作帥也機仲竟不免不知何自而發卒章所論江陵暴政則將軍都郎属耳燕王何自知之耶近事大者都無所聞徙宫祧廟改服諸議後竟如何皆幸詳報長沙廟額巳得之否趙主事如何渠更旬月湏復往且得少湏勿令觸罷爲幸呉彭二文學到都呉巳年及只可得祠禄巳託平父語南強早發遣之并煩道及尤幸聞又湏關儀曹亦巳爲作季路書亦告爲督之士老而貧尤可念也劉智夫近報所見至臘月六日矣奉聞所喻之說但仲本書亦云然殊不可曉㤗亨之世庸瑣自當處外顧乃爲此則其爲慮亦過矣且使人如何可受邪小報沙世堅自請扵朝得僧牒以治邉防今具支遣之數申省如此則帥復安用此等事若整頓著便成㾗迹只得力辭耳鄭溥之遣人来亦有近事未有異於前日之歎豈惟不異正恐有不如矣劉智夫都下乆不得書但聞未御常朝臣子之心殊不自安耳蜀相之召想巳聞之不知何意也廷老歸塗必相見所慮大㮣不相逺也身在逺外無從效尺寸但知勉脩在我敬俟天命耳劉智夫得子約書聞已御延和非乆當出視外朝也又云揆亦乆以小事積累忤意近有隨龍姓名人守楚者差除遂致不安中間有投匿名扵省中專斥之復有客自王信州處来云聞巳出六和復入居僧坊不知此數日又如何也竟外傳聞亦不一識者憂之不知果如何耳得書却殊不及昨来除命中曲折也此旣不是爲時勢重輕而衰晚且得休息亦良幸爾劉智夫郭丈得上饒附来書昨日荅之略言泉相舉措雖不無可議然其向正之意亦多或當言路不可令以罪去不知渠以爲如何縱未必盡以爲然亦湏少减分數也渠却云因從官夜對及臺諌之去國者故特問之然不問孫劉而獨問此恐亦不能無說也劉智夫所喻行止之計誠爲難處且看所遣人還消息如何若勇猛直前便以頭目腦髓布施亦無不可也邑中之事不知所聞如何其人見事明快頗分曲直不樂者衆恐傳聞或過當然亦不能無少失要之善良自安強猾者不便耳劉智夫近報相君巳參告復給朝假馬會叔竟以林和叔文字除職守潤却召趙德老爲版曹而趙俊臣移温陵恐顔當改除或得祠也林擇之書云天官此一二宣對言語頗契合而得其書與其壻書乃皆有丐外之意不知何也前日以書勸其勿深論細事如舎法之類得報殊不謂然方欲再論甚力其不知務如此亦可怪耳劉智夫䟽近方見之昨日見張宰云大坡親戚過者能由婺女報復而然遂使前日之言不幸而偶中此紛紛又未知所底止也劉智夫時事後来復如何竟巳清明堅定否諸公似欲便以無事處之何慮之淺乗此正當力爲乆逺計耳諸公誰爲可告語者想巳不憚力言之也劉智夫外間諸傳聞虚實相半要是大勢巳定其間小小變動彼其斟酌分數盖不草草政未足爲吾道欣戚也劉智夫祠請庻未必遂見元善說建議之人雖有睥睨之意而集議者僉不謂然或者又謂劉公碩年於狀中塗去數字其人雖甚不樂而不能止今又徙官計且迤邐矣某中聞亦甚杌􅑾此數日却無所聞然後生可畏各欲奮其才力以赴事功麋鹿雖走山林其命固亦有所懸矣如復從之不能預以爲慮也陳彭楊項竟又不免子直數日前得書方引孔子㣲服事見教今乃懸鶉百結而不能自免亦可笑也里中今歲艱食一畨紛擾今猶未定想諸人自能報去矣所幸早稻極佳公私亦多方捄恤或可不至狼狽杜門待盡且碩如此它皆有所不暇問也劉智夫湖湘聞亦得中熟諸事想不至甚費力然今時勢如此亦豈吾人展布四體之秋耶官閑讀書益進德業所可勉者惟在此耳一路官吏向在任不乆不能遍知所知者略巳舉之矣但零陵丞彭銓者子夀之姪人多稱之深以不及爲恨耳潭幕支使王楘善化令張維寜郷簿劉正學皆有才可使今嘗薦之長沙丞管姓者忘其名亦可使善化尉吾姓浦城人者脩學斷事亦可觀未及薦也潘叔昌在全州老矣方用得關陞狀亦嘗薦之方謀率諸司列言之而未及近聞林和叔舉自代舉主無氣恐未必可頼今將滿矣甚可念也李衡陽亦甚佳近見諸司薦之不知巳滿未也其代者郎趙希漢却有才但當裁其過甚耳諸郡惟武岡是姨弟明敏有素政必可觀亦幸察之勿以厥弟爲累也廷老法應相避何以處之渠爲作湘西精舎巳成恐有合求助處幸留念也元善益之德夫相繼罷逐搜羅抉剔無遺力矣吾徒皆不可保道學文字鈎連隅落如武侯營壘非華宗浪戰之比也辭職告老再上未報今必巳有處分勢湏鐫職罷祠但恐向上更有行遣耳山谷說吳畫佛入㓕圖中大魔王舉措可發一笑劉智夫邑中數日争戰報復洶洶未定而罷書巳至絶不見邸報所喻文字得城中相識書云有之雖未見全文然意其必借此羙名以行私意也德夫之說以此所聞參之亦有此理然殊非所望於蕭傳亦可歎息耳南昌昨聞巳移汪宣城而沈維祖者代之今此副樞之傳又何謂耶然則三山果誰得之金陵聞尚前却未定計未必能力辭也叔通事竟不得所起或云即向来起事之人又云嘗入城遊說不效而歸不知果然否也劉智夫郷里一畨荒擾今方小定又苦雷風慮損秋稼嗣歲尚可慮想治下當不至此聞衢信亦自寛𥙿不知何獨困我里也劉智夫忽聞季通聲問殊惡令人傷怛不能爲懐聞彦中居晦正之諸人皆巳薄周之恐不能給歸塗之費不知能爲作江西湖南兩趙漕書否其它㳂路有可嘱者并丐垂念乃幸之甚劉智夫適報機仲諸人檢舉奉祠宋臣得竟陵而復繳罷張巖復入臺想皆巳見之不知其間一二曲折果何謂也除目未頒然想巳有定議旦晚當有聞也仲本得書否計自此未必遽敢越竟而東也劉智夫某前日走後山聞季通之柩巳過翠嵐遂過彼哭之悲不能自勝然人生㑹如此亦將不暇悲彼而自悲矣昨夕方歸疲憊殊甚外事未有所聞但歲儉可憂所至皆然崇安山間有絶收處細民不易可憐也嘗以書語機仲令逹此意於有位大蒙痛詆以爲所損未見分數公私莫以爲慮不當遽言又謂今夏縁官司勸喻樁米致上户發糶不得無以自存緩急之際官司自有常平義倉之積足以爲備不當求細民之譽歛上户之怨此皆其来語如上户無以自存者尤可怪也不謂賢者亦爲此言他尚何望耶劉智夫季通之傳浸宻而其家問竟不至不知何故如此必是遣人在道阻滯也諸書荷留念但歸期恐亦難料盖所属官司有檐負未必容其自便耳劉智夫近報荷垂示比得機仲書今録呈但邑中不逞又作詭名訴儲宰遷學於儀曹叔通亦爲所指邑宰乃不敢喚上詞人供對數日擾擾未知作何岀場大抵所訴無一詞之實詞人乃學長卓定等彼固非學長然亦未嘗出門也然官司諸生無一人敢正其妄者可歎可歎與長兒書吾昨日過遂昌今日方深追遠之痛忽得汝書知與婦子俱安稍寛吾意吾昨日方𬒳進職之命今日遣人下辭免文字江西指揮至今未到巳㩀部吏狀掲牓謝絶詞訴便作閑人調度矣但印記尚在身未得十分蕭散只候命下便發遣回去台越之事不足深怪吾平生爲學不得力只是先辦得此一着如今衆人扼腕時節吾心却是間暇君恩民病雖不敢忘然亦有時節固非伯寮臧倉之所能爲也陳了翁說人當自試以觀巳之力量今日真試一過矣叔昌得書却似未悉此意也吾巳約子約來玉山相聚不知渠能来否渠書中說汪潘康葉諸公相問訊欲相見答書時冗甚忘記謝之可寫報子約煩致意或能同来尤幸吾又欲一見潘丈及叔昌不敢坐邀汝可爲禀看能来即又大幸也高劉二君亦爲致意想便来相聚矣不及别書也汝想未能来且省出入彼人凶猾吾甚爲汝憂之切宜深自防也渠豈能改過不可錯凖擬只當益加戒心耳至祝至祝吾後七日可過衢州城外重九日次第可到界上住三日諸公若成来固幸若不成亦可早遣一介相報也林擇之用中文公之曽孫濬家藏録藁古田亦小荒窘今年到處如此可平父歸說信州恐有剽掠者建陽江墩邵武之境近一夕爲盗所焚氣象如此而浦城渠魁州府止從配隷又聞中道而逸矣姦民愈無忌憚未知所以爲善後之計也元履近日議論多如此如論人材尤要一種穩當不任事之人此不可曉要是本原不正更事之多愈見畏縮耳晦庵先生朱文公文别集卷第二候官縣儒學訓導劉簮校晦庵先生朱文公續集卷第二答蔡季通所喻巳悉但區區方持此戒不欲輒破之故不敢承命亦爲賢者慮之恐只中甚自愧便是病根不若從此痛自斬絶毋以此等爲愧而深求可愧之實不必更爲月攘之計以俟來年庶乎於遷善改過有日新之功而胷中之浩然者無所不慊而日充矣如其不然則平日講論徒爲虚語臨事之際依舊只是平日氣習世俗常情某實懼焉三復來書竊意方當落筆之時天下之義理皆小而此事獨大也不然何其與平日講論之言殊不相似也以左右之高明區區常竊愛慕深不欲其如此故竭底藴幸熟察而深思之則不惟某之幸實朋友之幸吾道之幸也昨日讀通鑑至班固論郭觧有温良泛愛絶異之資而不入於道徳以至於殺身亡宗處方爲之掩卷太息以爲天理人欲之間毫釐一差其爲禍福之不同乃至於此今日晨臥未起得昨日戍刻所貽書於此心復有戚戚焉姑遣來人草草奉報蓋所欲言猶有未及究者千萬察之公濟所舉似皆古人語蓋是其入處耳王通賛必是康節所爲向以爲明道之文悞矣若明道湏别有判斷不止如此也林氏見思之說昔所未見它日携來恐更有合入别錄者耳師說才字似作方字爲是此類尚多今亦未暇細考耳樂說甚分明前日因希聖書嘗附幅𥿄奉扣通典子聲之說不知如何不能布筭無以見五聲損益與此卄四律同異如何也陳圗亦未曉來喻湏靣論乃究耳薛說固未知其如何然觀古人布陳箕張翼舒等說不一似亦與今人不相逺但其分合出入竒正相生之變自在主將一時心術之妙計亦非圖書所能傳耳綱目竟無心力整頓得恐爲棄井矣韜仲相聚想互有滋益近日章句集註四書却㸔得一過其間多所是正深懼向來日用之䟽略也别後兩日稍得觀書多所欲論者幸會期不逺此只八九間下寒泉十一二間定望臨顧也易欲如此寫一本彼有後生曉文理者令寫過只六十四卦亦得覺得如此儘好㸔此亦綱目中生出也律管分數甚荷見示自疑不能皆全分也前日所㸔圖子如可傳頌録一通見寄雖無心力亦欲略知大槩也祭儀深衣納去録畢却示及也大學改處他日靣呈權量所未學豈敢輕議但以羃寸計之范說恐非是耳更告熟考之也律說幸早爲寄但以聲定律及均絃用聲之說非靣莫扣爲可恨不知幾時可相㑹寒泉精舍才到即賔客滿坐說話不成不如只夾山間却無此擾公濟亦每以此爲言也歷法恐亦只可略論大槩䂓模蓋欲其詳即湏仰觀俯察乃可驗今無其器殆亦難盡究也精舍數日紛紛無意思只得應接酒食說閑話而巳亦縁屋舍未就不成䂓矩它時湏共議條約乃可乆逺往來耳律書緩寫不妨歷法莫亦可草定一梗槩否若用先天分數不知日月五星之屬遲速進退皆可於此取齊否若得此二書成亦不爲無𥙷於世也某今歸山間懶未欲岀意欲後月末間一到雲谷度暑未知果能動否恐不能動即奉約一來家中相聚數日殊勝它處惹客生事也程集近復借得蜀本𥘉恐有所是正然㸔一兩處乃是長沙𥘉刋時印本流傳誤人如此可恨今謾納去試爲勘一過有不同處只以𥿄蘸糊帖出或恐有可取也蓋陳明仲云亦嘗校定耳近㸔遺書目錄序時有先後以下一節說道理不出欲更之云先生之學其大要則可知巳讀是書者誠能主敬以立其本窮理以進其知兩者交相爲用而不已焉則日用之間且將有以黙契乎先生之心而於疑信之傳可坐判矣伯諌相見懸知必論此事但向來攻之未嘗不屈喻之未嘗不稱善而終爲䧟溺不能自觧免恐所謂亦甚然之者亦未可保近覺與此一等朋友說話殊敗人意思不如緘口内脩之爲愈也前書所喻公濟論難反復之語不謂其所見乃如此𥘉欲歸塗過之今日巳迫矣恐未能但恐終亦難說話也金聲玉振之說皆未盡孟子觧㸔得兩篇改易數處頗有功但塗抹難㸔無人寫得一草本不知彼有後生醇謹曉文理快筆扎者否俟某復來此倩得一兩人來草寫出一本大家商量爲佳倉司程書巳了有一夲在此俟來日觀之也綱目有疑無問大小告便筆之但未知何日可㑹議耳律尺之喻不謂蜀公差誤乃爾成書幸早見示程丈三器圖中引宋景文說不知見於何書說李照黄鍾乃南吕倍聲即是倍平之法前軰巳用之不知與今所論者有相犯處否也五代會要納去㸔畢并前所携去文字示及爲幸昨日巳到芹溪今日略走寒泉晚即還此治淵源言行録等書意欲老兄一來相聚旬日伯諌之意亦然綱目草冊併告帶來有餘力便欲下手刋修也歐公疑周禮說荷錄示荆公必嘗親見其說但今集中無所見只有䇿問一二條亦略見不能無疑之意耳新史是紹聖所作荆公既有此語史官自是不敢不書也華詞固無益然專貴吏材而不及行義乃當時之深蔽也時論又大變旦夕必見及其兆巳見矣星經參同甚願早見之只恐竄謫不得共講評耳參同契尚多誤字可早作考異示及納甲之說屯䝉皆用上下卦𥘉爻何耶頴傳云其先明視佐禹治東方吐養萬物又云吾子孫當吐而生恐兎之得名以吐之故但吐養云云未知所出耳昨㸔周禮磬氏䟽中引案樂云磬前長三律二尺七寸後長二律尺八寸不知所謂樂者是何書亦吿批喻石磬聞平江不難得欲託人作小者數枚但不能得合新律幸爲思之合用幾枚其長短厚薄之度如何幸悉批喻也丹經甚煩讐正然亦尚有一二處可疑當俟靣請磬說更無可疑幸少黜先入之言而以公共之心度之則知鄙意之不繆如周髀經雖區區所未讀然試以前書所論勾股兩弦之說考之恐賢者未免錯觧古經也使還奉報草草已與諸友約開正同登西山矣猿鶴事更煩一哥兄弟子細爲檢所云雜書不知是何書又韓詩挈提陬維其義云何上文角根旣是辰卯則此當爲寅位孟陬東之維不知是否又恐是總言四維也兎者吐生光昨日閑思此語忽記毛頴傳有吐養萬物有功之句意此等語必先有出處故二書各用之耳或知其說幸以見教十二相屬起於何時首見何書亦望并及之也諸說荷垂示但本草亦止說吐生而不言其得名之自此也相屬之說若以卄八宿之象言之則唯龍與牛爲合而它皆不類至於虎當在西而反居寅鷄爲鳥屬而反居西則又舛之甚者今亦未敢論此只欲見得本來出處更望詳考見報也通典中說十二律子聲莫便是清聲否若如所言即是卄四律不用六十律矣莆田徐君來說曆如此理㑹不得今以納呈渠旦夕湏自去求見但某自曉不得却爲老兄所累被人上門反倒旦夕不免逐旋請教要略理㑹得一大槩䂓模免被人如此熱謾也平江磬材聞不難致此見有的便吿考定格式剪𥿄作様一兩日間示及當徃屬相識求之但觸其弦之說湏依公指定乃佳不可狥偏說也磬式謹領但求觸弦是兩節事必如來喻則旣以兩矩齊等求弦而又以矩之愽益一矩之長而觸其弦亦無害於所謂來歷者必若勾短而股長則其一矩爲股者今雖未長而終必長其曰股者蓋即今之短而以其終之長命之也又如兩端相望然後爲弦則來喻固兩端相望而某說亦未嘗不兩端相望也但季通欲裁股愽之下以觸弦而某則裁其上爲小異耳然亦未嘗不合也但如某說則簡而通如來喻則煩而窒多所遷就而後合耳樂書巳就否因便奉寄示近讀長編說魏漢津劉炳作大晟樂云依太史公黄鐘八寸七分之管作正聲之律依班固黄鐘九寸之管作中聲之律正聲於十二月初氣奏之中聲即於中聲奏之故有卄四氣鐘之說初㸔甚駭其說細㸔乃知是讀著錯字史記又破句讀了試檢律書一觀可發一笑也一代制作乃如此令人惋歎可早就此書亦不是小事也春秋無理㑹處不湏枉費心力吾人晚年只合愛養精神做有益身心工夫如此等事便可一筆勾斷不湏起念儘教它是魯史舊文聖人筆削又干我何事耶易說俟取得即納去然亦政自非急務也極星出地之度趙君云福州只卄四度不知何故自福州至此巳差四度而自此至岳臺却只差八度也子半之說尤可疑豈非天旋地轉閩浙却是天地之中也耶雅鄭二書皆欲得之律管并望携至不知何時得來郭公易書全無倫理若兵書曆書亦只如此即無可觀但恐偏有所長耳子直亦是闇中模索不知如何見得好處也史記律數源逺七分爲寸之說亦深疑之但自算不得不敢堅决去取今承來喻推析洞然無復疑論矣古人文字精密如此而後人讀之鹵莾如此甚可歎也然不能布算其精細尚未盡曉更容子細别奉扣也啓䝉所改是否又天一地二一節與天數五地數五相連此是程子改定當時不曽說破今恐亦當添程說乃明也林侍郎所論太極不知是對何人言之來喻似有闕文讀者皆莫曉也所喻蓍數少參多兩之說甚善然所積之數則少隂反多於少陽者八不知此意又是如何更湏契勘恐不堪駁雜也此近得林潭州易說甚可笑書多重滯不可寄去無事可一來觀之也律書本子却幸寄示樂書如何若能入山可一并帶草本及俗樂文字來得以靣究其說幸甚律管樂書巳領更容細㸔續奉扣也方分竟如何若果如此即空徑三分之說遂不可用矣以琴爲凖果可定否恐絲聲緩急亦隨律高下則不容其自相和耳前日因書亦略扣湯簿尚未得報只恐渠亦未必理㑹到此耳律吕書舊本莫只在否便中亦望示及開通錢小大自不等不知用何者爲正耶廟議亦不盡記若士大夫以下自有定制但今廟不成廟即且依程夫子說自高祖而下亦未爲僭也易中七八九六之數向來只從揲蓍處推起雖亦脗合然終覺曲折太多不甚簡易疑非所以得數之原近因㸔四象次第偶得其說極爲徑捷不審亦嘗如此推㝷否亦幸語及也儀象法要一冊納上但歸來方得細㸔其運轉之機全在河車而汀車湏入乃轉恐未盡古法試者之如何也者疑當作㸔監糶之擾誠如所喻今日事無不如此求學道愛人之君子殆未之見斯人之不幸可勝嘆哉某自寺溪入長澗由楊村以出所過不堪舉目有小詩云阡陌縱横不可㝷死傷狼籍正悲唫若知赤子元無罪合有人間父母心區區於此深有所不能自巳者然出位犯分之愧蓋不勝言矣某數日整頓得四書頗就緒皆爲集註其餘議論别爲或問一篇諸家說巳見精義者皆刪去但中庸更作集略一篇以其集觧太繁故耳初欲專人今但付三八節中多事更不别奉問也來歳之計如何若作書社亦宜早有定論小僧素䝉印可當遣前受業耳淵源録未成文字劉子澄又錄得數事來云汪書處似此文字甚多俟寄去足成乃可傳母枉費筆札也大學本敬付來人㸔畢早寄及論語方有六篇亦未成次第未可寄也叔京前夕方行嘗勸渠日用加待敬之功渠云能存其心是之謂敬而某以爲惟敬所以能存其心論此兩日竟未能合觀其主意又似老兄所論克巳之目一般以此見議論易差若不實下日用功夫動加防檢殆無以驗其是非也諸友相聚作何功夫一日之間湏着一兩時辰作科舉外功夫爲佳邑中水禍至此極可傷憫此中幸亦無它兩日後方聞之耳所喻截米適有便巳爲言之未知復如何但恐籍此以賑𬒳灾之民則不當奪之府中亦有米來可就撥也語錄巳領餘未暇㝷且此數編玩而繹之自有餘味貪多務得恐却非所宜也龜山所論諸疑皆中其病大槩亦只是此一格次第當時見得都不曽透徹耳然二先生語中亦間有如此處必是記者之失如明道論釋氏下學上逹處則無滲漏矣其下文說盡心知性語亦不完也道義固一事然體用之殊亦不可不辨但云義即是道恐未可也又性固無不善其所以有不善有過有不及却從氣禀中來只如所論亦未子細造次顛沛必於是乃知仁而用力焉之事若知之未明則所謂是者恐亦未端的此亦湏更察之日用之間卓然實見仁體可也觀過當以觀字爲重蓋觀處用力則天理人欲賔主分明而仁體在我者益昭著矣若但知之而巳則恐未必端的實見也聖賢指人求仁之方多是於下學處指示蓋用力於此而自得之則安然便爲已得非若今人縣揣暗料窺見彷彿便以爲得也愚見如此重䝉下問不敢隱其固陋敢率易言之以求反復如其未當更得痛爲鐫磨復以下喻誠孤陋莫大之幸不爾則自此不復敢致其愚矣聞又從平甫借語錄此殊非所宜汲汲况温陵巳下手刋刻不數月當成昨日巳寄得十餘扳様來矣冊不甚大便於齎挈真學者之幸也俟其寄來首當奉去然文字之外要當有用心處乃爲究竟耳觀過終無定論如所喻亦未安愚意却欲只用古說和靖推說伊川之意甚分明蓋諸說皆有病惟是此說獨不費力但義差緩耳聖人之言自有如此處更以上文苟至於仁矣無惡也及表記仁者之過易辭也者反復證之則其理亦甚精晦叔所說比欽夫差直截但終是迫切不類聖人語意耳伯諌相見所談何事其精進固可尚而賢者之自咎亦不爲過前此相聚兩日固疑近日多事心志不一浮躁之習又復發見此亦不可不速掃除也太極說近㸔儘有未精密處巳略刋正其大者如乾男坤女當爲氣化之人物不知曽有人如此說否其下化生萬物乃爲形化者耳又主義是指正與義而言蓋此是不易之定理大學所謂至善是也子直欲且留此爲踰月之計俟某後來今欲煩藏用月初下來就此寫却一兩卷孟子更得一朋友同來尤佳不煩俟某下只開月便可來諸事知巳子細此子直薪米之屬亦巳一一措置矣此兩日亦只因孟子理㑹得一兩條義理頗分明如盡心之說舊來不曽下語覺得諸說無綱領如知言所發明又别是人意思試檢會一觀即見也六君子盡心者也所以求盡其心也孔子從心所欲心不盡用試更求之便見喻爲幸東山一章全類詩之比興蓋言聖人之道人人字恐當作大而無窮進之當有漸耳熟味之可見可欲之善誠如所喻但行法俟命一章前日草草言之不能無失更爲叅酌見告幸幸文中子論聖人憂疑處又作一論題不知合如何立語只云聖人憂疑如何不知可否若可作即令諸生試爲之也伯崇之僕說到官之初儘爲人理會事至於興作水利種種躬親若此不倦真副朋友之望也廣之到彼有何議論叔京文字曽論著其得失否此人回可示及也觀過說依舊未妥蓋此二字與中庸致曲文一同致曲者非致夫曲乃因曲而加功觀過者非觀夫過乃因過而觀理耳前日之說㝷當改定却得寄去史記武夷集内上但史記舊點多悞不可憑耳大學想不輟㸔誠意兩叚竟尋舊藳不見别𥙷去如此可令兒軰剪去舊字别寫此入其間明道說人湏自知知自慊之道止有外之心不足以合天地之心恐或舊本不載今可檢寫入因𥙷此兩叚覺得舊說儘有合整頓處又是一畨功夫耳孟說更煩爲契勘辭意或小未安一字不遺乃所幸願自覺語意蹇拙終不快利也答擇之書并觀過說納去幸爲訂之始終條理居敬行簡之說則得之矣昨答書中亦有始終一叚今不復錄去也但所論小人共事之說則鄙意未能無疑蓋君子隨時捄世無必待學至聖人然後有爲之理又不可强其力之所不足挾私任智而僥倖於有成竊意惟循常守正爲可以無悔顧其間屈伸變化則自有斟酌不可至於巳甚耳易中論此等處當無所不盡更煩考之經傳令兒軰抄出它日共詳之爲佳得叔京書所論如此内去一觀或能爲反復之尤幸通書西銘各一夲上内又一角致兼善處數日爲渠思講究不精之弊恐是未能勇革世俗之學有以䧟溺其心而然不及别書幸爲致此意也不得於言如某之說則見其强勇迫切氣象正如釋氏所謂直取無上菩提一切是非莫管之意如季通所論則於不動心處取義殊緩兼文理亦自不通湏作不字乃說得行耳所謂一劍兩叚者改過之勇固當如此然改過貴勇而防患貴怯二者相湏然後真可以修慝辨惑而成徙義崇德之功矣不然則向來竊聆悔過之言非不切至而前日之書頓至於禮亦可驗也自今以徃設使真能一劍兩叚亦不可以此而自恃而平居無事常存祗畏警懼之心以防其源則庶乎其可耳易說三條昨亦思之此上下文夲自通貫前此求其說而不得故各自爲義而不能相通耳洗心齋戒特觀象玩辭觀變玩占之大者但方其退藏而與民同患之用巳具及其應變則又所以齋戒而神明其德此則非聖人不能與精義致用利用崇德亦頗相類此下所言闔闢徃來乃易之道易有太極則承上文而言所以徃來闔闢而無窮者以其有定理耳有是理則天地設位而易行乎其中矣兩而生四四而生八至於八則三變相因而三才可見故聖人因之畫爲八卦以形變易之妙而定吉凶至此然後可以言盡耳前所謂易有太極者恐未可以書言也綱目凡例脩立略定極有條理意義矣俟到此更商㩁之但脩書功緒尚廣若得數月全似此兩月無事則可以小成矣九章之目與周禮註不同盈朒恐是贏不足勾股恐是旁要幸更考之見喻也小學冊子向時携去今告早附來添註此數項便可上納付匠家也子澄寄得鄂州本來今往一本并唐鑑如喻遣上編懸文字亦幸早示及前日因㸔孟子說覺得金聲玉振一義舊說未安即巳改定其說於樂之節頗有發明未暇寫去也大抵八音金石爲衆音之綱領絲竹匏土包括於中而革木二音無當於五聲十二律故居最後而但爲衆樂之節不知古人巳作如此㸔否耶又前日說宫懸用十二律一懸用七律判懸以下無鏄鍾特磬之說不知與古法合否幸并考之也示喻創艾之意甚善但密切常存戒懼之意不必如此發作却未得歇滅舊病依然只在也詩傳不曽脩近㸔論語却儘有合改處候脩畢試整頓詩說㸔如何但精力短甚畏開卷也前書所云甚恨忠告之晚常時鄙笑莊周爲惡無近刑之說自今觀之亦自不易也月末專望枉顧餘得靣言所喻自省之意甚善然恐病不在此只合且於存心處事上痛自省察矯革也某求去未獲然賤迹終不能安度更不報即以罪譴逐矣此間詞訴近日却絶少漸可讀書但直卿旣歸復之又病數日羸甚無人商量文字都不得下筆此事未知終竟如何萬一不就恐爲千載之恨也季通可早來或未歸得共究此業或巳束裝亦得道間相伴遊山玩水也希聖要來甚善有朋友性靜向學能思索檢討者携一二人來尤佳其不能此者無益徒累人也樂說巳領尚未有深觧處湏靣扣乃悉耳雅樂說後便幸示及聞有安定鹿鳴譜亦望錄寄偶得新都八陳石刻本納呈㸔畢却告附還其說與薛士龍者同異如何并告喻及需通鑑方此修改未定舊本太略不成文字也近覺讀書損耗心目不如靜坐省察自巳爲有功幸試爲之當覺其効也古樂之說尤荷意勤及今見之殊勝蜀公之方響也但諸說中頗有未甚觧處及新書内論古錢處前後頗有相牴牾者又不見今是以聲定律爲與此尺合之意耳此皆俟相見靣論今日寒甚寫字不成也啓䝉之名本以爲謙而反近於不遜不知别有何字可改幸更爲思費隱之說若有所見湏子細寫出逐句逐字商量如何見得上下察是隱處湏著力說教分明方見歸著若只如此含糊約度說得不濟事不惟人曉不得自家亦曉不得也且若果如此子細當時便合引上天之載無聲無臭以明至隱之義不應却引鳶飛魚躍至顯之事而爲言却說翻了也請更思之前日巳甞疑此後來子細反復逐一寫出比較見得說不行此無可疑也只管如此疑無了時只費頃刻功夫寫出了到寫不行處便釋然矣昨日見報有因奏對極言太極之罪者累數百言大率皆攻鄙說其說甚獃可笑不知何人所發也竊恐流布諸書亦不甚便更思之如何二變之說甚荷見敎比因修禮編得鍾律一篇頗簡約可觀大抵盡用本原之書旦夕當奉呈也糴米事適間趙簿來問不知爲請此錢分付晦伯兄弟如何幸度其可否速見喻當以囑趙及元善作書也但吾軰時運不好不可自犯脚手然又不可不爲鄕里計也平江人欲遣行磬式幸裁定示及黄鍾一均六律各隨大小畫様以所定古尺爲凖各餘半寸以上以備磨錯乃佳仍告早示下也前日所說磨崖刻河洛先天諸圖適見丼君說閣皁山中新營精舍處有石如削似可鐫刻亦告以一本付之先天湏刻卦印印之乃佳但篆隷碑子字畫皆不滿人意未有可寫之人爲撓耳令伯謨篆如何三圖湏作篆乃有古意便當遣人送伯謨處也但磬式股鼓俱大似是誤筆今别考禮注畫黄鍾一枚去幸細考之若合如此即别爲作六枚併此付來也其厚亦有等差耶或但長短不同而慱厚如一也并告依此界一側靣使有定論老兄平時於此極精密不知何故今此殊草草也龜兆之說未曉所謂不知當近界弦處耶當逺之也又不知界弦是龜中直紋耶是四外邉界也幸更批喻磬式巳定但恐石璞不必太大四邉只各留半寸許可也愽厚之制前書誤謂諸律一等後來細讀始知其繆耳參同寫得一本稍分明俟皆了納去更煩一㸔便可刋刻矣籃家墻界未得消息築者停手以待幸早寄信去得遣一親信人來乃佳不然即且依界築矣切望留念省劄至今不到昨夕忽夣得餘干想今日必到也鈞孫在鋪下切煩三哥誨督之不可待以朋友之禮也切祝切祝南遊去住當巳有决計矣公濟山頭日用功夫之問見季通未有端的應答彼說雖偏然吾軰之所以自治者如此之鹵莾幾何其不爲不如稊稗之五榖耶兩日欲奉扣因循不暇亦苦疲憊無好意思遂不能及今請試加省察果以何地爲進德之基也歸來又得伯㳟書云學者湏是專心致志絶利一源凝聚停蓄方始收拾得上此言甚當不敢不以告也某衰晚强顔力不勝事今又有經界之役此實一郡利病所繋不淺義不當辭巳上奏懇請今更欲得晦伯一來相助不知渠肯來否巳有書與之更告爲勉其行并爲遊說老丈得不挽留之千萬之幸也向所懇者曽爲留意否今偶遣人送劉壻歸有一二十人昨承老兄有意見訪莫若就此同晦伯同途尤便過此則州郡遣人又費力矣春秋之說當俟靣請或未成行千萬便録大槩見示爲幸所喻希真事巳語劉戎矣偶欲出縣匆匆奉報别有一二事令埜專人奉扣幸垂喻中庸闕板并望早示及聞前日談天甚快恨不參聴其旁耳三日來發熱昏冐不識何證藥物雜進殊未見效良以爲撓所喻朝聞夕死之意不勝歎服然老人之學要當有要約處恐非儀禮之所及也費隱之說非不欲剖析言之但終覺費力强說不行不免且仍舊耳二書脩改處想巳了幸早寄及項平父劉公度同日遭章必是理會道學公事項罷新任劉𥙷外也聞到黄蘖想遍遊一帶名山多得勝槩然遂欲盡發天地之藏則廱痔果蓏之不能無憾於見傷因便寓此敬問還期諸書巳領劄子又略脩改說得稍平人亦多說恐有此嫌鄙意獨謂此乃實情無可疑者事定乃知其不誤也某杜門如昨無足言請祠人未歸若得如此占幸甚但恐消詳未盡耳三聖必不我欺也聞林又請對乞與論者廷辨且攻横渠甚急上皆不領慚沮而退未知竟如何某所遣請祠人竟未歸不審何說利往之亨竊恐未可必也又爲部中送磨勘告來今日又不免遣人辭之此又是别一頭項費分踈然亦無甚利害也别𥿄所示詞雖迂緩而意實詆忤却恐未便所與元善書則今早所遣人方行湏後便方得附去某書中只如𥘉議萬一不及救止則此亦無甚利害與某事體自不同不必過疑也儀象法要昨因子莊過此再㸔向來不相接處今巳得之元來文字只要熟㸔本義巳略具備覺取象之說不明不甚快人意耳今文之誤先儒舊說可證驗處甚多所欲改更皆非今日之臆說也俟月末携去㸔恐人多㸔不得耳因其人還附此不知便得逹否方才仲文字正㝷不見疑智夫借去乃在書府幸甚因便示及也渠深爲壽皇所知自今觀之不爲不遇猶復齟齬如此是可歎也味道歸來說曆書就篇伏惟驩慶恨未得窺藩籬也律圖想甚可觀然其聲湏細考之令有定論乃佳切在處心平氣不可有毫髪偏滯之私也病之復作次第亦是出謁太早所致前日固嘗奉告且勿出入不惟可養疾亦且避得招呼之煩今湏且切守此戒也此外只得寛以處之平日學問正要此等處得力也前書所扣一哥之行來喻如此是决不可行矣直卿只可往來相伴决不能終歲守諸㓜童謙之聞欲赴𥙷又未必可挽而行期巳迫思之只有鉛山徐子融老成有守常作小學巳往招之又未知其能逺適與否耳辭免文字甚遜然不至全然無骨甚荷憂念也元善書旦夕遣人即付去律歴乃千古事數日細思伊川上富公書此事亦使人不能忘但今日月巳迫元善之計亦未必行近日得其書云議禮正冗未暇言政恐雖言亦不効蓋覆按使還又附前議若果如元善前書之云令人痛心但不容効力無可柰何耳直卿前日有人來書中都不說及通書注答書亦忘督之若有便往可問之太極西銘前日忘記附去今付此人幸視至郭頥正編射法及馮侯者可并刋行恐力不足即因見夣傳爲言在渠爲之不難亦是適用文字殊勝時文也徐貢父兄弟又遣人來奉邀計湏歸來方得赴其約然自此亦當重然諾庶得安居爲著書養性之計只管如此衝寒冐熱東西游走似非老大所宜尤非所以學安樂祖師之所行也適見小報元善巳得浙西提舉計是見闕就彼便赴上矣暦事當且悠悠然及此成書以俟來者亦非細事也但疑其不可就者非特趙君一祛此惑亦快事耳它日過此略帶草本來及新製律管及書俱來爲佳俗樂文字亦欲就借鴻羽可用爲儀不知如何觧先儒所謂進退可法者不知本文有此意否耶若如鄙意所釋則不如曳尾於泥中也眩運之疾若得靜以養之自當安定今乃汩汩應接如此何由可已如某目疾亦是如此今乃終日冩書不得一舉首勢必雙瞽而後巳耳集注事前日巳失䆒治今當爲料理可便作一狀來送邑中行遣也來春欲一到精含或能俱行即同往觀尤佳然湏有所託以爲詞乃爲便也啓䝉中欲改數處今籖出奉呈幸更審之可改即改爲佳免令舊本流布太廣也但恐不好㸔亦無柰何耳費隱儘有說但日間稍得閑坐又貪温卷工夫不暇安排文義耳廟記巳領極荷指誨𥘉欲詳記其本末守禦計謀後覺字數太多稍稍此然巳覺繁冗矣却是台人得說節費却言語也其守城録台流傳今但如此提起有眼目者自應報狀岳麓圖巳附去矣前日所扣竟當如何幸早見教以觧煩惑幸甚幸甚諸事却未聞焚㓕之命中庸必巳了矣早得數本爲惠幸甚幸甚得履之書如此亟以奉呈恐欲預有所處也然不必匆匆但當有以待之耳葉正則遭論鐫兩秩罷去并毁其書板章中巳見及名次甚高與履之所云相表裏勢只旬月間湏有處分又聞前日寒泉㑹哭巳有告言路者周元興聞之城下呉生赴省歸者云然當非妄傳亦可略語韜仲也昨日亦嘗上狀不知何故未逹今早又以中庸集略附劉醫乃昨日遣書時所遺也今想皆巳到矣雨勢如此豈登山之時乎需藥遣去然恐不若安樂師翁所云病前自防也專門之誚正卞公所謂執鄙吝者非壼而誰然今日聞公試之日諸生簾前一語尤可絶倒它日當自聞之也近報十五日車駕巳與中宫同詣重華終日乃歸軍民相慶恐欲知也長沙之行幾日可歸益公相見亦何言耶閣記不敢辭但恐病中意思昏憒未必能及許教未替前了得耳向見薛象先盛稱其人今讀其書乃知講於陸氏之學者近年此說流行後生好資質者皆爲所擔閣壞了甚可歎也某病軀粗徤但自春夏來一向闕雨五月以前祈禱猶有應農功巳粗可觀而六月半後遂不復雨聞得數里間一兩刻沾洒殊不周足今早禾損及八九晚田亦未可知𥘉欲此月丐祠而事勢如此如何敢求去只得盡力捄荒耳楊簽又以憂去新官未到今只有星子老令相與同憂更無分毫好况也然諸司巳有不相容者旦夕或以劾去不可知但自不敢求耳二書并碑却告因便示及索詩當時做得數語後來多事今已忘之矣白鹿春卿必能言曲折田巳撥得些小然亦非乆計要之此等興廢有時若無人主張讀書即有田亦無益耳諸刻今附去一角雲谷大隱兩處如何得馬道士書云巳開堂基招得一道人在彼計湏量與口食告就雲谷支也細看啓䝉巳不必改只如前日所說改定一句足矣通書樂上章萬物咸若下添觧三綱名件想已有矣又欲於齊肅之意下添故希簡而寂寥耳刑章十二當作十一以象再閏欲添五嵗之象掛一一也揲左二也扐左三也揲右四也扐右五也只作注字亦得易圖甚精但發例中恐不能盡述當略提破而藉圖以傳耳陳法大略亦可見當如近日所說但未能洞曉其曲折耳樂圖煩更問子本此只有十二様而調名之多何耶琴說亦告㝷便示及千萬因山之日巳迫而未有定議有詔集議㝷復中輟昨日不免入狀議之未知如何也大學後來道中又改齊家治國章兩處不知曽爲刋否前日所論非欲求容正爲當靈者不靈恐造物者亦將無以爲造物耳然此事如此似已多時戰國只孟子是理㑹得底餘人如醉如夣也北方之傳果爾趙巳罷去蓋新用李兼濟爲諌官一章便行未知誰代其任此可深慮某辭免未允而趙巳見諸令復如此更當費力耳相知者且如此况新來者情意不通未必以爲事也某昨日冐雨登龍湖幸無它但路滑狼狽耳書堂高敞逺勝雲谷武夷亦多容得人他時儘可相聚也求放之說其妙無窮湏實用功乃見之耳養正來辱書乃聞閣中之疾未巳未能此來殊以悵惘某此無它但爲通鑑課程所迫無復優游濳玩之功甚思講論耳巳㸔到後漢章帝處只三四日當畢向後功夫却不多矣不免且那功夫了却易說未能審思不知能中理否南軒巳過上饒得書書中一𥿄上呈幸爲訂之并昨所說嘗論著者携以見示幸甚幸甚遺文上納二録已領昨伯崇借遺書三冊寄還乃不知分付何人至今根究未得極以爲撓蓋此本最精比老兄本後來又正了數字也伯諌書中說託料理孟子集觧今納去舊本兩冊更拾遺外書記善錄龜山上蔡錄游氏妙㫖庭聞藁録五臣觧取范吕二說各自抄出每段空一行未要寫經文且以細書起止寫之俟畢集却剪下粘聚也每章只作一段章内諸說只依次序列之不必重出經文矣兩匠在此略刋得數行矣字畫頗可觀未可印未得寄去也但此間獨力深恐校讐不精爲後日之累耳向來見它人刋書重於改𥙷今乃知其非所樂大抵非身處之則利害不及而心乃公耳前書所喻公濟論難反復之語不謂其所見乃如此初欲歸塗過之今日巳迫矣恐未能但恐終亦難話也金聲玉振之說皆未盡數日客冗撥忙次得數語如此今以上呈可否俟報某來晚定歸亦帶過呈伯諌也孟子觧㸔得兩篇改易數處頗有功但塗抹難㸔無人寫得一草本大家商量爲佳倉司程書巳了有本在此俟來日觀之也濟之同且在天然果如何耶律說幸寫寄但以聲定律及均絃用聲之說非靣莫扣爲可恨不知幾時可相會寒泉精舍才到即賀客滿坐說話不成不如只來山間却無此擾公濟亦每以此爲言也歷法恐亦只可略說大槩䂓模蓋欲其詳即湏仰觀俯察乃可驗今無其器殆亦難盡究也大學等巳令進之料理矣或入大源告爲致問公濟旣平心和氣以觀義理之所在則不患無鄰矣草絶交之書似於禪學亦未得力也觀過之說竟未安嘗思之矣禮記納去歸來未暇子細再㸔恐可抄出逐段空行剪開以類相從蓋所取之類不一故也四十九篇昨來分成七類曲禮冠義王制禮運大學經觧䘮大記試用推排喻及以參得失如何大學亦脩成一書適詳略之中細㸔舊本乃大有不滿意處又當脩改也欲買淳熈編類一本煩爲問不知直幾何便批報當遣人齎錢去取臨老旋學做官甚可笑也或有可取處得便令此人取帶歸却納錢去還之尤便耳鴻羽爲儀恐只是可爲旌旄之屬無進退以禮之意也如何若然則誠不如曵尾泥也矣中庸首章更欲改數處第二版恐湏換却第二版却只刋𥙷亦可然想亦只是此處如此後來未必皆然也且催令𥙷了此數版并詩傳示及也來日取得來教却别上狀中庸所改皆是切要處前日却慢㸔了所以切巳功夫多不得力甚恨其覺之晚也大學亦儘有整頓處亂道誤人可懼可懼啓䝉前日所改尚欠數字頗覺之否通書注頗佳當携徃觀也東行有日幸早見過爲兩夕之留也北風未聞想只是虚聲或其境内自擾擾耳所議可善處之母至過甚爲佳遽忘其怒而觀理之是非此前賢大公順應之要法也數日相聚頗覺兼善有怠緩駁雜之病而季通責善傷於急迫又雜以嘲玩似非以文會友之道臨行匆匆忘說願各矯所偏以副所望幸甚幸甚子仁留此數日稍欵巳勸令不如且讀書理會義理無爲苦用力於文字間也太極說脩定削去後語只作一綂論意似亦無不盡也西銘說在後煩爲細㸔携過見喻伯諌書所說功夫甚善但所以見推者過當使人慚怍不知所措耳時學波蕩至此雖細故亦可驚歎柰何柰何克巳贊所疑不知云何因便見示自覺浸有寛平氣象甚善甚善涵泳不巳意味當益深長耳二友講論不廢然未值大節目也盡心說録呈并呈兼善叅詳有未當處却以見喻且勿令齋中諸生傳寫也前日所寄諸說有便并望反復公濟伯諌得書否某歸塗過伯諌見收公濟書大段手忙脚亂也大學誠意之說以再觀之果如所論想它書似此處多湏一一整頓也通鑑節只名綱目取舉一綱衆目張之義條例亦巳定矣三國竟湏以蜀漢爲正綂方得心安耳適巳奉狀尋大學章句詳本不見不知在書府否如在告帶來參同契并携來㸔也有歸藏否有即借來校此間所藏者似恐只是僞書也前日匆匆忘記靣扣大予樂是後漢樂名本史志必有之王朴之云亦是以一爲正以一爲變但當時未知變律之說故以其半爲清耳要之終不是也來書且留篋中以俟靣質日邉人尚未還未知行止之决所示卦象恐當以復卦爲主則揚庭孚號更不着矣有攸往夙吉而仐不可以夙則有復而巳恐終當用此占也祠堂記及韜仲書付去人更一書與劉公度託渠寫彼中相去不逺也克巳課程只是語録中說常有簿子記言動之得失者是也惺惺語亦是其持敬法耳季通無事更能一來否游誠之得書方自武昌趨長沙矣分韻詩當時做不成今巳忘記若能再來當爲𥙷亡也法器都未見都昌一二士人好資質然亦無意於此蓋是蕭果卿親戚念得蘇文熟了壞了見識也可惜可惜都昌黄氏向來見喻减價糶米人甚賴之今出榖萬斛賑糶巳牒請與縣官同措置捄䘏矣旋運只是勞心之所致小試參同之萬一當如牛刀割雞也至之兩日在此察其意必不校此當更委曲曉之耳李將若得此人之力真是笑啼俱不敢矣可付一笑也暦議必有所付但今思之不得其說乆當自出也宿逋令埜具禀甚愧遲緩幸更少寛也建陽事竟如何緩急之間切冝善處爲佳耳某前月晦日巳交郡事以常情論之亦不至甚費料理但衰晚自不當出又閑散之乆不能堪此煩碎又不能似衆人漶漫不省事初到甚覺勞弊此兩日方少紓更㸔旬日又如何也大抵是不可乆住夏未湏力請而歸耳昨日至學中爲諸生說大學自此二七日即一到見謀作濂溪祠堂廬山有陶淵明劉凝之遺迹亦漸次表章之比罷歸日湏皆可畢事也但恐迂繆伉拙時論不見容即又未知如何耳山水之勝目所未覩埜歸必能略言之意欲老兄一來又不能辨人去取巳屬平父恐可借僕馬一來甚簡便也一出又半月臨出城值石宰與順之擇之更一二朋友來遂留北巖兩日同途至建陽而别匆匆急欲歸奉祀事故不及遣人相報然數日相聚亦苦人多不得子細講論未覺有深益也寒泉拜掃湏在後月五六後事畢即上廬山遣人相報幸爲一來前嘗有書與小僧說令奉白及此春雨種植少竹木亦道欲游之意胡爲乃不逹此意耶更有一小詩謾録呈山頭如有功役可及吾人在彼指撥了之爲佳小僧稍知向前否更望提耳痛教告之也作文之病時偶論及此耳欲稍加潤縟亦不難但亦使急性不得恐愈草率耳横渠集告付下婺州用川夲刋成欲寄此令𥙷所無也僧兒云伯㳟說所選之文取其備衆軆或䟽通或典重或寛或緊或反復曲折耳陳法雖精而旗鼓如此得無有誤三軍耳目耶甚可笑也或問寫本巳檢得令納上告令寫訖便附下恐又有差互要此作底也到三山見膚仲煩致意所囑文字昨在五夫巳爲具草歸來一向擾擾又縁卜葬未定心緒紛亂不暇整頓幸且體悉向後若得功夫即爲改定寄去不然不湏等候送終是大事此是浮文自古未聞有無銘而不葬者切不湏等候也見趙南紀亦煩致意所喻謹悉恨未得登山以觀㶑灔深碧之地它非所及也太極文字儲宰云巳録寄并某書及中庸或問下冊小簡皆往何爲今尚未到一哥所寄集略便令對讀旦夕納去不及别作答也封牌所喻得之但不見三書之意不知改之爲三如何留䟽僞學以上下文考之正謂永嘉耳中庸章句比略脩定不知可旋開否如欲之煩二哥帶寫白人來詩傳中欲改數行乃馬莊父來說當時㸔得不子細只見一字不同便爲此說今詳㸔乃知誤也幸付匠者正之便中印一𥿄來中庸必巳了矣後山米事若爲鄉里之計實爲利便但爲身謀則吾人今日是何等時節運氣而可爲此耶若必欲爲之亦湏先踏逐得能負荷得底人一以付之而吾無預焉乃爲庶幾不然則徒使呫呫者得動其喙區區相愛之深不敢以此奉贊也示喻筮法如此甚平正簡便不知何故本法却不如此恐别有意指也試更推之如何恐在老者陽多隂少則終爲陽者少在少者隂多陽少則定爲陽者亦少乃陽貴隂賤吉少凶多之意不知如何小學誤字再納去數𥿄封靣只作武夷精舍小學之書可也旋暈之疾正當靜養所需儀禮殊非急務且其本只兩卷餘是先人點其後乃某續點比更欲詳考則巳憚其字小而不敢讀矣恐亦不能無誤不足傳後也細民艱食焦熬柰何氣象不佳今今恐當作令人不知惜惜恐當作措身之所不謂事勢急迫至此也王朴不知變律之法而自中吕再生黄鍾則圓不得不爲黄鍾之半以爲情聲矣但今變半等律亦生於極其本則十三弦者皆黄鍾耳薛宣等事取其一切果斷爲賢於今之謬政耳豈以其爲可法哉情恐當作清某見治再祠之䟽未能得了更三五日方得遣人此請度必可遂憂世之心報主之願雖不敢忘然綿力薄材了得甚事不如且跧伏過此殘生也印書之舉不謂末流之弊一至於此但當速去無可疑者必不可轉則直捐之耳平生無所不捨而眷眷於此耶要之范六丈真聖人也章丈敦勸之意甚厚得伯㳟書亦云爾但冐恩重疊前後相妨如擔子輕重他人不覺惟擔不起者自知之耳若辭不得勢湏别作出場不可又似前年喑黙而冐受也晦庵先生朱文公續集卷之二福州府儒學訓導舒鏊校
