body:
  text: 雜著記和靜先生五事學者所以學為人也蓋尹和靜語徐丈見尹和靜問曰某有意於學而未知所以為問先生曰此語自好若果有此意歸而求之有餘師又嘗語人曰放教虛間自然見道先生在從班時朝士迎天竺觀音於郊外先生與往有問何以迎觀音也先生曰衆人皆迎某安敢違衆又問然則拜乎曰固將拜也問者曰不得巳而拜之與抑誠拜也曰彼亦賢者也見賢斯誠敬而拜之矣先生日誦金剛經一卷曰是其毋所訓不敢違也徐丈語及蘇氏使民戰栗義問曰如何先生艴然曰訓經而欲新竒無所不至矣右五事熹紹興二十一年五月謁徐丈於湖州徐丈以語熹因退而書徐丈名度字惇立和靜門人記孫覿事靖康之難欽宗幸虜營虜人欲得某文欽宗不得巳為詔從臣孫覿為之隂冀覿不奉詔得以為解而覿不復辭一揮立就過為貶損以媚虜人而詞甚精麗如宿成者虜人大喜至以大宗城鹵獲婦餉之覿亦不辭其後每語人曰人不勝天久矣古今禍亂莫非天之所為而一時之士欲以人力勝之是以多敗事而少成功而身以不免焉孟子所謂順天者存逆天者亡者蓋謂此也或戲之曰然則子之在虜營也順天為已甚矣其壽而康也宜哉覿慙無以應聞者快之乙巳八月二十三日與劉晦伯語録記此事因書以識云記林黃中辨易西銘六月一日林黃中來相訪問曰向時附去易解其間恐有未是處幸見諭豫應之曰大凡解經但令綱領是當即一句一義之間雖有小失亦無甚害侍郎所著却是大綱領處有可疑者林問如何是大綱領處可疑豫曰繫辭所謂易有太極是生兩儀兩儀生四象四象生八卦此是聖人作易綱領次第惟邵康節見得分明今侍郎乃以六畫之卦為太極中含二體為兩儀又取二互體通為四象又顚倒看二體及互體通為八卦若論太極則一畫亦未有何處便有六畫底卦來如此恐倒説了兼若如此即是太極包兩儀兩儀包四象四象包八卦與聖人所謂生者意思不同矣林曰惟其包之是以能生之包之與生實一義爾子曰包如人之懷子子在母中生如人之生子子在母外恐不同也林曰公言太極一畫亦無即是無極矣聖人明言易有太極而公言易無太極何耶子曰太極乃兩儀四象八卦之理不可謂無但未有形象之可言爾故自此而生一隂一陽乃為兩儀而四象八卦又是從此生皆有自然次第不由人力安排然自孔子以來亦無一人見得至邵康節然後明其説極有條理意趣可玩恐未可忽更詳之林云著此書正欲攻康節爾豫笑語之曰康節未易攻恃郎且更子細若此論不改恐終為有識者所笑也林艴然曰正要人笑又論西銘豫曰無可疑處却是侍郎未曉其文義所以不免致疑其餘未暇悉辨只大君者吾父母宗子一句全錯讀了尤為明白本文之意蓋曰人皆天地之子而大君乃其適長子所謂宗子有君道者也故曰大君者乃吾父母之宗子爾非如侍郎所説既為父母又降而為子也林曰宗子如何是適長子豫曰此正以繼禰之宗為喻爾繼禰之宗兄弟宗之非父母之適長子而何此事它人容或不曉侍郎以禮學名家豈不曉乎林乃俯首無説而去然意象殊不平黃中西銘説曰近世士人尊橫渠西銘過于六經豫讀而疑之試發難以質焉易曰乾健也坤順也乾為天為父坤為地為母是以順健之至性而有天地父母之大功其稱名也小其取類也大此之謂也今西銘云乾為父坤為母是以乾坤為天地之號名則非易之本義矣既曰乾為父坤為毋則所謂豫兹藐然乃混然中處者於伏羲八卦文王六十四卦為何等名稱象類乎方大撲之未散也老聃謂之混然成列莊子謂之混沌是混然無間不可得而名言者也既巳判為兩儀則輕清者上為天重濁者下為地人居其中與禽獸草木同然而生猶有别也安得與天父地母混然中處乎又曰天地之塞吾其體天地之帥吾其性此其語脈出于孟子孟子言浩然之氣養而勿害則塞乎天地之間又言志氣之帥也故志至焉氣次焉今舍氣而言躰則又非孟子之本義矣其意蓋竊取於浮屠所謂佛身充滿法界之説然彼言佛身謂道體也道之為體擴而充之雖滿於法界可也今言吾體則七尺之軀爾謂充塞乎天地不亦妄乎至言天地之帥吾其性尤無所依據孟子以志為帥者謂氣猶三軍聽命於志惟志所之爾今舍志而言性則人生而靜未嘗感物而動者焉得以議其所之乎其所統帥何如也况於父天毋地而以吾為之帥則惟子言而莫之違矣不亦妄乎又曰民吾同胞物吾與也大君者吾父母宗子也其大臣宗子之家相也若以其並生乎天地之間則民物皆吾同胞也今謂物吾與者其於同胞何所辨乎與之為名從何立也若言大君者吾父母宗子也其以大君為父母乎為宗子乎書曰惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母兹固西銘所本以立其説者也然一以為父母一以為宗子何其親踈厚薄尊卑之不倫也其亦不思甚矣父母可降而為宗子乎宗子可升而為父母乎是其易位亂倫名教之大賊也學者將何取焉又言其大臣宗子之家相也則宗子有相而父母無之非特無相亦無父母矣可不悲哉孟子曰楊氏為我是無君也墨氏兼愛是無父也無父無君是禽獸也若邪説誣民充塞仁義將有率獸食人之事豫于西銘亦云尊西銘者其不可以無辨豫還自臨安客有問此曲折者事之既往本無足言而恐學者疑於邵張之學也因命兒輩録此以示之客因有問者曰太極之論則聞之矣宗子之云殆即莊生所謂知天子與我皆天之所子者子不引之以為夫子之助何耶豫應之曰莊生知天子與我皆天之所子而不知其適庶少長之别知擎跽曲拳為人臣之禮而不知天理之所自來故常以其不可行於丗者為內直而與天為徒常以其不得巳而強為者為外曲而與人為徒若如其言則是臣之視其君隂固以為無異于吾之等夷而陽為是不情者以虛尊之也孟子所謂楊氏為我是無君也正謂此爾其與張子之言理一而分殊者豈可同年而語哉昔豫書宋君事後當發此意因復并記其説以俟同志考焉記濂溪傳戊申六月在玉山邂逅洪景盧內翰借得所修國史中有濂溪程張等傳盡載太極圖説蓋濂溪於是始得立傳作史者於此為有功矣然此説本語首句但云無極而太極今傳所載乃云自無極而為太極不知其何所據而增此自為二字也夫以本文之意親切渾全明白如此而淺見之士猶或妄有譏議若增此字其為前賢之纍啓後學之疑益以甚矣謂當請而改之而或者以為不可昔蘇子容特以為父辨謗之故請刪國史所記草頭木腳之語而神祖猶俯從之况此乃百世道術淵源之所繫耶正當援此為例則無不可改之理矣記旌儒廟碑隂語歐陽叔弼作集古録目云旌儒廟者秦所坑諸儒之廟也社佑以為儒者不居其位而是非當世以自取禍及引後漢錮黨之事以橫議激訐為戒刻于廟碑之隂豫以為佑之識趣如此此其所以役於伾文之黨而取隨人執下之譏也叔弼之為此書但記姓名事目年月州里而獨於此詳著其語豈亦有所病於其言歟抑以為是而存之也偶讀謾記吳執中傳在徽録八十八卷國史九十三卷與其家傳皆相應但家傳云公緣微病踰月不對巳有間之者一日面奏論列邊防利害及於一二大臣上不説翌日落職知滁州大觀三年十月二十五日告下又載十月二十二日奉聖旨吳執中𥘉除中憲議論剛正凡所陳述殊無顧忌頗有古直之操遂降詔褒之厥後僅兩月餘日並無建明一日進對奏陳論列殊無根柢惑於邪説頓失所守可落職知和州替蔡嶷仍放謝辭限日下出國門其蔡嶷别與差遣此必見省劄而傳云先是蔡京忌張康國引執中居言路執中論劉炳兄弟不葬親服宋喬年父子過惡相繼罷黜炳與喬年皆京黨也及上語執政嘉其不阿康國奏意在逐臣巳而言康國之章果上上怒執中懷讒出知滁州此事不知何據但語意向背不倫執中本是京引居言路使攻康國則不應先攻京黨而後及康國也又家傳云政和改元星文示孌公以為推尋厥咎之由實自蔡京始因列其命令不信刑罰失中公帑空虛民力困匱農桑失業貨財不通而窮荒無用之地追討興建無巳之罪請降京五官以太子少保退居于杭又載御筆云比以舊弼蔡京擅作威福傲睨弗悛屢致人言禠官斥外申嚴邦憲足示誡懲尚慮怨仇乘時騁忿據托舊事論列未休下石相擠彈擊不巳務快復讎之私忿不思體貌之前規致矯枉過中疾惡已甚宜俾寬宥曲示始終咨爾臺僚明聽朕命大觀四年而傳云彗星見上察京姦狀欲逐之言者交論京不巳執中上章謂進退大臣當存體貌於是為京降詔而京得不重貶此與家傳亦不同然執中後以不論張啇英貶黜則非蔡氏之黨矣未知本傳何據書此執中嘗舉遊酢自代又嘗差同開封尹一孝壽鞠陳正彚告變事執中平心以處得罪者自以為不冤嘗論花石綱詔即罷之後每有所須索必戒左右曰毋令吳某知翰林學士張閣等出守杭州陛辭日乞領花石綱事自是應奉愈熾不可救矣嘗論郭天信過惡而言者以為與商英皆天信所薦與吕惠卿為友壻惠卿遭時得君所薦無不拔用執中在選調未嘗附麗以圖進取並家傳御筆云卿前日上殿奏陳曽任學事見今放罷姓名可親書實封進入臣伏奉御封云云右臣昨靣奏係是提舉荆湖南學事胡安國謹具奏聞一孝之一字一本空執中子巖夫政和七年十一月除考功郎官出太師魯公京門余深嘗於彭世英家見其議蔡卞諡文正議魏徴以小戴禮綜彚不倫更作類禮二十篇數年而成太宗美其書録置內府今此書不復見甚可惜也王彥霖行蔡確詞乃邵武大乾高宇所為其家尚有遺藁方伯謨嘗見之乙卯十一月四日詹元善説去年見李兼濟説壽皇曽遣一小璫以中原事問平江何蓑衣蓑衣授以𥿄筆口誦數語令書以進曰賀新郎賀新郎胡孫拖白不終場不終場未便休雄豪分裂爭王侯爭王侯閙啾啾也須還我一百州壽皇以示兼濟之父秀叔參政後數年虜儲允恭死虜酋雍亦斃而孫璟襲位即所謂胡孫者也豈璟將不終而中原分裂河南北將復我也耶元善又見異書云火龍變化丹蛇騰青羊躑躅烏犍耕玄豨衝突蒼鼠平亦莫詳其為何等語也姑并記此三年而後出之釋氏有清草堂者有名叢林間其始學時若無所入有告之者曰子不見貓之捕鼠乎四足據地首尾一直目睛不瞬心無它念唯其不動動則鼠無所逃矣清用其言乃有所入彼之所學雖與吾異然其所以得之者則無彼此之殊學者宜以是而自警也閩中人李復字履中及識橫渠先生紹聖間為西邊使者博記能文今信州有潏水集者即其文也其間有論孟子養氣者動必由理故仰不愧於天俯不怍于地無憂無懼其氣豈不充乎故曰是集義所生者舍是則明有人非幽有鬼責自歉于中氣為之喪矣故曰無是餒也此語雖踈然却得其大旨近世諸儒之論多以過高而失之甚者流於老莊而不知不若此説之為得也惜其亂於詩文博雜之中學者或不之讀故表而出之蜀人馮當可之文號縉雲集集中有封事末云臣前所言望陛下移蹕建康選將練卒用張浚劉錡總統諸軍節用損巳以充軍費皆事也非事之本也惟陛下逺便侫踈近習清心寡欲以臨事變此興事造業之根本洪範所謂皇建其有極者也此紹興庚辰辛巳之間所上其謀畫議論皆竒偉的當而所論皇建有極又深明治本而略識經意古今論洪範者少能及也余嘗作皇極辨與之暗合因筆其語以證余説舊見汪端明嘗稱其人甚敬重之今果不謬云説文䏌振䏌也從肉入聲許訖反東坡疑從入無緣為䏌聲而謂舞必八人為列乃謂佾即䏌字從八從肉今按此乃説文之誤東坡疑之是也而其所以為説則非若以八字為今而從肉兮省聲則正得許訖切矣䏌又從人乃為䏌字蓋振則人之振䏌也然今説文不見佾字坡云有之未詳其説每詳䏌字即盻字故説文但有䏌字而别無盻字坡疑佾即䏌字亦非也班史武記謂云屑然如有聞亦盻鄉之義也東坡又云宋書樂志論房中樂非后妃事蓋周禮注誤極有理當考武庚即是祿父東坡以為兩人恐别有據已上並見泉州舶司所刻雪堂帖東坡手書煮豬肉法引孟子曰心勿忘勿助長知前輩讀此皆依古注勿正為句絶非獨程先生也作正心者其始於王氏乎然文勢亦或有之未可直以為非故豫於集注兩存之會稽官書版本有子華子者云是程本字子華者所作即孔子所與傾蓋而語者好竒之士多喜稱之以豫觀之其詞故為艱澀而理實淺近其體務為高古而氣實輕浮其理多取佛老醫卜之言其語多用左傳班史中字其粉飾塗澤俯仰態度但如近年後生巧於模擬變撰者所為不惟決非先秦古書亦非百十年前文字也原其所以祗因家語等書有孔子與程子傾蓋而語一事而不見其所語者為何説故好事者妄意此人既為先聖所豫必是當時賢者可以假託聲勢眩惑世人遂偽造此書以傳合之正如麻衣道者本無言語祗因小説有陳希夷問錢若水骨法一事遂為南康軍戴師愈者偽造正易心法之書以託之也麻衣易豫亦嘗辨之矣然戴生朴陋豫嘗識之其書鄙俚不足惑人此子華子者計必一能文之士所作其言精麗過麻衣易遠甚如論河圖之二與四抱九而上躋六與八蹈一而下沈五居其中據三持七巧亦甚矣唯其甚巧所以知其非古書也又以洛書為河圖亦仍劉牧之謬尤足以見其為近世之作或云王銍性之姚寬令威多作贋書二人皆居越中恐出其手然又恐非其所能及如子華子者今亦未暇詳論其言之得失但觀其書數篇與前後三序皆一手文字其前一篇託為劉向而殊不類向它書後二篇乃無名氏歲月而皆託為之號類若丗之匿名書者至其首篇風輪水樞之云正是並緣釋氏之説其卒章宗君三祥蒲璧等事皆剽剝它書傅會為説其自敘出處又與孔叢子載子順事略相似孔叢亦偽書也又言有大造于趙宗者即指程嬰而言以左傳考之趙朔既死其家內亂朔之諸弟或放或死而朔之妻乃晉君之女故武從其母畜於公宫安得所謂大夫屠岸賈者興兵以滅趙氏而嬰與杵臼以死衛之云哉且其曰有大造者又用吕相絶秦語其不足信明甚而近歲以來老成該洽之士亦或信之固巳可怪至引其説以自證其姓氏之所從出則又誣其祖矣大抵學不知本而眩於多愛又每務欲出於衆人之所不知者以為慱是以其弊必至於此可不戒哉或云程邑在雍州之東二十里王季所居又引蘇黃門詩説周之程邑漢扶風安陵縣也豫按雍州之境東自西河西距黑水延袤數千里不知所謂州東二十里者自何處計此里數若指豐鎬而言則經傳𥘉不明言其為雍州治所又按漢志安陵在長安北四十里不應言東又按皇矣之詩此詩乃是文王克密之後所作亦不得為王季所居也然意此語必有自來但州字當是衍文耳所謂雍者乃扶風之雍縣其地亦在長安之北計與安陵相去不逺故得引以相明唯王季之云恐别有所據然亦未知其與詩説孰為得失也當考上虞餘姚二邑皆以舜名而上虞村落又有號百官俗傳百官牛羊之處也或謂四旁多舜事迹疑其子孫所封理或有之然不可考矣大抵地名古迹亦多沿襲訛謬如子華子後序乃言鬼谷子所居在今信州貴溪縣蓋其圖經之説如此豈有此理哉以它書考之地名鬼谷者凡數處疑特俚俗相傳物魅之區爾未必儀秦之師所居也上虞旁邑嵊縣有戈過二姓即少康所滅羿浞之黨其子孫乃聚於一邑又近禹葬之地不知其何故也俚俗相傳疫疾能傳染人有病此者鄰里斷絶不通訊問甚者雖骨肉至親亦或委之而去傷俗害理莫此為甚或者惡其如此遂著書以曉之謂疫無傳染不須畏避其意善矣然其實不然是以聞者莫之信也豫嘗以為誣之以無染而不必避不若告之以雖有染而不當避也蓋曰無染而不須避者以利害言也曰雖染而不當避者以恩義言也告之以利害則彼之不避者信吾不染之無害而巳不知恩義之為重也一有染焉則吾説將不見信而彼之避也唯恐其不速矣告之以恩義則彼之不避者知恩義之為重而不忍避也知恩義之為重而不忍避則雖有染者亦知吾言之無所欺而信此理之不可違矣抑染與不染似亦係乎人心之邪正氣體之虛實不可一槩論也吾外大父祝公少時鄰里有全家病疫者人莫敢親公為煮粥藥日走其家遍飲病者而後歸劉賔之官永嘉時郡中大疫賔之日遍走視親為診脈候其寒溫人與藥餌訖事而去不復盥手人以為難後皆無恙云沙隨有活人書辨當求之嚴州王君儀能以易言禍福其術略如徐復林瑀之説以一卦直一年嘗言紹興壬戍太母當還其後果然人問其故則曰是年晉卦直事有受兹介福于其王毋之文也豫謂此亦小數之偶中耳若遂以君儀為知易則吾不知其説也沙隨春秋例説滕子來朝為自貶而用小國之禮如鄭人爭承之比最為精當但朝桓公者邾牟葛稱人榖鄧書名又有不可通者而諸儒之説亦莫之能明也孟子決汝漢排淮泗而注之江此但作文取其字數以足對偶而云耳若以水路之實論之便有不通而亦𥘉無所害於理也説者見其不通便欲強為之説然亦徒為穿鑿而卒不能使之通也如沈存中引李習之來南録云自淮沿流至于高郵乃泝于江因謂淮泗入江乃禹之舊迹故道宛然但今江淮巳深不能至高郵耳此説甚似其實非也按禹貢淮水出桐柏會泗沂以入于海故以小江而列於四瀆正以其能專逹于海耳若如此説則禹貢當云南入于江不應言東入于海而淮亦不得為瀆矣且習之沿泝二字似亦未當蓋古今往來淮南只行刋溝運河皆築埭置閘儲閉潮汐以通漕運非流水也若使當時自有禹迹故道可通舟楫則不須更開運河矣故自淮至高郵不得為沿自高郵以入江不得為泝而習之又有自淮順潮入新浦之言則是入運河時偶隨淮潮而入有似於沿意其過高郵後又迎江潮而出故復有似於泝而察之不審致此謬誤今人以是而説孟子是以誤而益誤也今按來南録中無此語未詳其故近世又有立説以為淮泗本不入江當洪水橫流之時排退淮泗然後能決汝漢以入江此説尤巧而尤不通蓋汝水入淮泗水亦入淮三水合而為一若排退淮泗則汝水亦見排退而愈不得入江矣漢水自嶓冡過襄陽南流至漢陽軍乃入于江淮自桐柏東流會汝水泗水以入于海淮漢之間自有大山自唐鄧光黃以下至於潛霍地勢隔驀雖使淮泗橫流亦與江漢不相干涉不待排退二水而後漢得入江也大抵孟子之言只是行文之失無害於義理不必曲為之説間費心力也春秋上辛雩季辛又雩公羊為昭公聚衆以攻季氏此説非是昭公失民巳久安能聚衆不過得遊手聚觀之人耳又安能逐季氏宋昭公季氏事見左氏傳極有首尾公羊子特傳聞想料之言爾何足為據或者乃信其説以解春秋既為謬誤又欲引之以解論語樊遲從遊舞雩之下一段問答以為為昭公逐季氏而發者則又誤之甚矣此弊蓋原於蘇氏問社之説而近世又增廣之也嘗見徐端立文説曽以蘇説問尹和靜和靜正色久之乃言曰解經而欲新竒何所不至聞之令人悚然汗下或説魚麗詩云罶笱也笱者寡婦之器也寡婦得魚而不為富疆所奪則是太平之象而可告功於神明也此因小序而失之固為無理然專以笱為寡婦之器似亦未然蓋聚石為梁必有笱以承其闕空乃可得魚凡取魚者皆然非但寡婦也但笱易成而易用雖寡婦亦能置之故以為寡婦之笱它人則取魚之器尚多不專用笱耳非謂它人不得用笱而唯寡婦得用亦非謂寡婦只得用笱而不得更以它物取魚也谷風小辨之詩皆曰無逝我梁無發我笱豈寡婦之作也哉打字今浙西呼如謫耿切之聲亦有用去聲處大抵方言多有自來亦有暗合古語者如浙人謂不為弗又或轉而為否呼若甫云閩人有謂口為若走為祖者皆合古韻此類尚多不能盡舉也附子今人未嘗不服但熟即巳疾生則殺人耳漢淳于衍毒殺許后蓋生用也果爾則雖平人亦不免况乳婦乎或者乃以今人有新産而以附子愈疾者遂疑漢史之誤過矣豫嘗中烏喙毒始時頭岑岑然久之加煩悶正如許后之證當時在深山中不能得藥須臾通身皆黑勢甚危惡意必死矣偶記漢質帝語得水尚可活亟令多汲新水連飲之遂大嘔泄而解此亦不可不知也或謂李華著論廢卜故終失節王涯首議榷茶後亦得禍至如近歲茶啇作賊殺人甚衆皆涯之罪也豫謂廢卜固其所見之謬然與失節事不相類榷茶固為有罪然甘露之變死者十餘族豈皆榷茶所致且今村民爭田爭水劫取榖粟以致殺傷者多矣又可追咎神農后稷耶大抵論事只當言其理之是非不當計其事之利害此等議論雖欲因事設為警戒然其勢將有所窮反使世人并與正理而疑之非小失也韋蘇州集載秦系詩自署東海釣客試祕書省校書郎而詩有久卧雲間巳息機青𫀆忽著狎鷗飛之句蓋系嘗隱泉州九日山故有東海之號青𫀆忽著自謂其新授校書郎爾故韋和詩云知掩山扉二十秋魚須翠碧弄床頭正答其意也或者乃謂青袍翠碧皆為韋發既失詩意又謂唐刺史不借服色則又誤矣牛叢對宣宗云臣今服緋是刺史所借而白樂天忠州𬒳召時詩言之極詳何考之不審耶韋蘇州事迹王厚叔序中考之巳詳近年姚令威又作後序於厚叔外又增輔二事然皆失之其一以韋贈人詩有少年遊太學之句遂謂韋嘗遊太學不知韋詩所云乃是謂所贈之人也其一以韋有分竹守南譙之句遂謂韋嘗守亳不知南譙乃滁州也其説之誤正與青袍者相似夸多之弊至於如此事雖不急亦可戒也或説説大人則藐之以藐為自小之意云説大人時當如子弟之對父兄恬然泰然説盡道理不作大事看非謂小視大人也此説甚怪下文更説不行如吾何畏彼哉一句不知却如何説人皆知其不可而或者信之蓋正理不明而先入為主故其惑如此亦非止此一條也或云舊見水懴言有行者盜常住食物而變為餓鬼者𥘉不之信近見夷堅志亦有此事乃信理可推者人理耳若鬼神仙佛事非理可究豫謂二事一律妄則皆妄真則皆真今乃疑其一於前而信其一於後何耶天下之事巨細幽明莫不有理未有無理之事無事之理不可以內外言也若有不可推者則豈理之謂哉或又云莊列釋氏皆有大過人者但為從别路去故不可與校是非豫謂既云别路則須自有正路只此正路别路之間便有是非可校何言不可耶或讀關雎問其訓詁名物皆不能言便説樂而不淫哀而不傷云云者余告之曰若如此讀詩則只消此八字更添思無邪三字成十一字後便無話可説三百五篇皆成查滓矣因記得頃年汪端明説沈元用問尹和靜伊川先生易傳何處是切要處尹云體用一源顯微無間此是最切要處後舉似李先生先生曰尹説固好然須是看得六十四卦三百八十四爻都有下落處方始説得此話若學者未曽子細理會便與他如此説豈不誤它余聞之悚然始知前日空言無實全不濟事自此讀書益加詳細云艮下坎上其卦為蹇蹇難也西南隂方平易之地東北陽方險阻之處當蹇之時利趨平易而不利走險阻又利見大人以濟蹇而守正則吉故筮得此卦其占如此以彖傳言之云易本義合如此禮書此書異時必有兩本其據周禮分經傳不多取國語雜書迂僻蔓衍之説吾書也其黜周禮使事無統紀合經傳使書無間别多取國語雜記之言使傳者疑而習者蔽非吾書也劉原父嘗病何休以不修春秋百二十國寶書三禮春秋而豫反病二書之不傳不得深探聖人筆削之意也異時此書别本必將出於信饒之間石橋之野故箱敗簏之間其亦足以為豫筆削之助乎十月十八夜因讀余正父修禮而書讀雜書偶記三事周公玉堂雜記記中朝舊典待詔宣召學士有茶酒接坐之禮今待詔廷參贊喝禮與院吏雖小不同而平時視之全與吏等無由待以茶酒豫謂唐用待詔如王伾王叔文輩雖姦邪小人然皆略知文義可兼太子侍讀能預公卿議論則其選與今固不同矣計祖宗時所用之人亦必稍加甄擇未至如今日之猥賤此其待遇之禮所以異也又自記其當制時有縣伯進封郡侯者院吏寫云某郡進封開國侯當為正之豫謂此正緣待詔不知文義故煩學士點檢爾豫嘗受詔獎諭其首云省奏詞免某官巳依所乞事具悉者其失正類此而當時學士不之省也又記親祠之禮至尊升輅則以學士為執綏官一節甚詳豫按曲禮少儀等書及先儒説綏安也升車者執之以為安也故執綏乃乘車者之事非僕御之職也蓋君車巳駕則僕者負良綏取二綏以先升良綏君所執以升者二綏亦曰散綏御者所執以升者也既升然後以良綏授君君正立執之以升立於左方僕執轡立於車中以御勇力之士升立於御之右以備非常周禮大馭諸右等官即其職也故開元開寶政和禮書親祠乘輅皆以太僕卿為御千牛將軍為右蓋放周禮而國史所記國𥘉時事猶云奚嶼攝太僕卿備顧問當時中御立乘之禮不知其如何然猶未有執綏之名也今乃條勑差執綏官而以綵繩維於箱柱不知自何時失之甚可笑也又至尊不立乘而設倚以坐不以千牛陪乘而同時降勑差帶甲內侍二人立於御坐之旁凡此既皆失禮而刑餘共載乃袁盎所為變色者尤為乖戾不知歷幾何時禮官皆不能正儒臣為執綏者亦莫覺其繆而方且夸以為榮何哉記尚書三義堯典卒章我其試哉女于時觀厥刑于二女皆堯言也釐降二女于媯汭嬪于虞乃史氏記堯下嫁二女于媯水之旁而為婦於虞氏耳帝曰欽哉者戒敕二女之言猶所謂往之女家必敬必戒者也今自孔傳及諸家皆失之殊不成文理也舜典肆覲東后五玉三帛二生一死贄便當屬此文下言其見東方諸侯而使各以其物為贄也其下乃云協時月正日同律度量衡修五禮如五器乃得事之序而文勢亦順如亦齊同之義卒乃復者言既訖事而旋反二句皆張子説也棐本木名而借為匪字顔師古注漢書云棐古匪字通用是也天畏匪忱猶曰天難謀爾孔傳訓作輔字殊無義理嘗疑今孔傳并序皆不類西京文字氣象未必真安國所作只與孔叢子同是一手偽書蓋其言多相表裏而訓詁亦多出小爾雅也此事先儒所未言而豫獨疑之未敢必其然也姑識其説以俟知者記潏水集二事同州韓城縣北有安國嶺東西四十餘里東臨大河瀕河有禹廟在山斷河出處禹鑿龍門起於唐張仁願所築東受降城之東自北而南至此山盡兩岸石壁峭立大河盤束於山硤間千數百里至此山開岸闊豁然奔放怒氣噴風聲如萬雷廟像豕首而冕服舊傳鯀入羽淵化為黃熊又云鯀為玄熊熊首類豕肖像以此而廟乃稱禹甚非也然鄉人不敢以豕肉薦必致神怒大風發屋拔木百里𬒳害舊説禹鑿龍門而不詳言其所以鑿誦説相傳但謂因舊修闢去其齟齬以決水勢而巳今詳此説則謂受降以東至於龍門皆是禹所新鑿若果如此則禹未鑿時河之故道不知却在何處而李氏此説又何所考也李氏之學極博所論禹像豕首當是鯀廟為黃熊之像而不考漢書説啓母石處注中言禹亦嘗變熊則俚俗相傳塑禹像為豕首自不足怪也邢恕奏乞下熙河路打造船五百隻於黃河順流放下至會州西小河內藏於熙河路漕使李復奏竊知邢恕欲用此船載兵順流而下取興州契勘會州之西小河醎水其闊不及一丈深止於一二尺豈能藏船黃河過會州入韋精山石硤險窄自上乘流直下高數十尺船豈可過至西安州之東大河分為六七道散流謂之南山逆流數十里方再合逆溜水淺灘不勝舟載此聲若出必為夏國侮笑事遂寢邢恕之䇿果如李復之言可謂妄矣然禹貢所言雍州貢賦之路亦曰浮于積石至于龍門西河會于渭汭則古來此處河道固通舟楫如恕䇿矣復之言乃如此何也復集中記事甚多特此二條與禹貢相關故録之以備參考云記山海經浙江出三天子都在其東按地理志浙江出新安黟縣南蠻中東入縣今錢塘浙江是也黟即歙也浙音折在閩西北入海餘暨南餘暨縣屬會稽為永興縣廬江出三天子都入江彭澤西彭澤今彭蠡也在尋陽彭澤縣一曰天子鄣右出山海經第十三卷按山海經唯此數卷所記頗得古今山川形勢之實而無荒誕譎怪之詞然諸經皆莫之考而其它卷謬悠之説則往往誦而傳之雖陶公不免也此數語者又為得今江浙形勢之實但經中浙字漢志注中作浙蓋字之誤石林巳嘗辨之更撿注中龜中字羅端良所著歙浦志乃作率山未知孰是廬江得名不知何義其入江處西有大山亦以廬名説者便謂即是三天子都此固非是然其名之相因則似不無説也都一作鄣亦未詳其孰是但廬江出丹陽郡陵陽縣而其旁縣有以鄣名者則疑作鄣為是也豫嘗讀山海諸篇記諸異物飛走之類多云東向或云東首皆為一定而不易之形疑本依圖畫而為之非實紀載此處有此物也古人有圖畫之學如九歌天問皆其類記三苗頃在湖南見説溪洞蠻猺略有四種曰獠曰犵曰狑而其最輕捷者曰貓近年數出剽掠為邊患者多此種也豈三苗氏之遺民乎古字少而多通用然則所謂三苗者亦當正作貓字耳詹元善説苗民之國三徙其都𥘉在今之筠州次在今之興國軍皆在深山中人不可入而巳亦難出最後在今之武昌縣則據江山之險可以四出為冦而人不得而近之矣未及問其所據聊併記于此云考韓文公與大顚書今按杭本不知何人所注疑袁自書也更以跋尾參之其記歐公之語不謬矣而東坡雜説乃云韓退之喜大顚如喜澄觀文暢意非信佛法也而或者妄撰退之與大顚書其詞凡鄙雖退之家奴僕亦無此語今一士人又於其末妄題云歐陽永叔謂此文非退之不能作又誣永叔矣蘇公此語蓋但見集注之出於或人而未見跋尾之為歐公親筆也二公皆號一代文宗而其去取不同如此覽者不能無惑然方氏盡載歐語而略不及蘇説其意可見至吕伯恭乃於文鑑特著蘇説以備乙覽則其同異之間又益後人之惑矣以余考之所傳三書最後一篇實有不成文理處但深味其間語意一二文勢抑揚則恐歐袁方意誠不為過但意或是舊本亡逸僧徒所記不真致有脫誤歐公特觀其大槩故但取其所可取而未暇及其所可疑蘇公乃覺其所可疑然亦不能察其為誤而直斥以為凡鄙所以其論雖各有以而皆未能無所未盡也若乃後之君子則又往往不能究其本根其附歐説者既未必深知其所以為可信其主蘇氏者亦未必果以其説為然也徒幸其言可為韓公解紛若有輔於世教故特表而出之耳皆非可與言事而求是者也至如方氏雖附歐説然亦未免曲為韓諱殊不知其言既曰久聞道德側承道高又曰所示廣大深逈非造次可諭又曰論甚宏博安得謂𥘉無崇信其説之意耶韓公之事余於答孟簡書巳論其詳矣故不復論特從方本載此三書於别集并録歐公二語而附蘇説方説於其後且為全載書文於此而考其同異訂其謬誤如左方以為讀者以此觀之則其決為韓公之文而非它人之所能作無疑矣愈啓孟夏漸熱惟道體和安愈弊劣無謂坐事貶官到此久聞道德竊思見顔緣昨來未獲參謁倘能暫垂見過實為至幸巳帖縣令具人船奉迎日久佇瞻不宣某白愈啓海上窮處無與話言側承道高思獲披接專輒有此咨屈倘惠能降諭惠字疑衍或下有然字而并在能字之下非所敢望也至此三日却歸高居亦無不可旦夕渴望不宣某白愈啓惠勻至辱答問珍悚無巳所示廣大深逈非造次可諭易大傳曰書不盡言言不盡意然則聖人之意其終不可得而見耶如此而論讀來一百遍一字疑衍蘇氏所謂凡鄙蓋指此等處耳不如親顔色隨問而對之易了此旬來晴明旦夕不甚熱儻能乘間一訪幸甚旦夕馳望愈聞道無凝滯行止繫縳苟非所戀著則山林間寂與城郭無易大顚師論甚宏博而必守山林義不至城郭自激修行獨立空曠無纍之地者非通道也勞於一水安於所識道固如是識疑當作適猶言便也雖適之安之語用字略同言一水雖勞而既來則當隨其所便無處不安也道固如是即所以結上文道無凝滯之意也不宣某頓首韓公之於大顚既聞其語而為禮益恭如此雖適之雖恐當作唯考歐陽文忠公事迹余讀廬陵歐文新本觀其附録所載行狀諡議二刻四傳皆以先後為次而此事迹者獨居其後豈以公諸子之所為而不敢以先於韓吳諸公及一二史臣之作耶此其用意巳精而為法亦嚴矣然綜其實則事迹云者正行狀之底本而碑志四傳所繇出也向使直指先後之次而以冠於附録之篇則彼數書者皆可見其因革損益之次第矣是亦豈不可耶間又從鄉人李氏得書一編凡十六條皆記公事大略與此篇相出入疑即其𥘉定之草藁顧其標題乃謂公所自記而凡公字皆以丹筆圍之此則雖未必然然於此本亦有可相發明者因略考其異同有無之互見者具列於左方經術李本云公嘗謂世之學者好以新意傳注諸經而常力詆先儒先儒於經不能無失而其所得者固多矣正其失可也力詆之不可也其語在詩譜後序又謂前儒注諸經唯其所得之多故能獨出諸家而行於後世而後之學者各持好勝之心務欲掩人而揚巳故不止正其所失雖其是者一切易以巳説欲盡廢前人而自成一家於是至於以是為非牽強為説多所乖繆則并其書不為人所取此學者之大患也故公作詩本義止百餘篇而巳其餘二百篇無所改易曰毛鄭之説是也復何云乎又其作易童子問正王弼之失者才數十事耳其極論繫辭非聖人之書然亦多使學者擇取其是而捨其非可也便以為聖人之作不敢取捨而盡信之則不可也其公心通論常如此此與定本大旨不異但書先後詳略有不同者繫辭之説則疑其諸子不敢力主而復自刪之也醉翁亭記李本未有此體下有醉翁亭在琅琊山寺側記成刻石逺近爭傳疲於模打山僧云寺庫有氊打碑用盡至取僧堂卧氊給用凡商賈來供施者亦多求其本僧問作何用皆云所過關征以贈監官可以免稅乃屬於公作集古録目序之上此條疑以其不急而刪去修五代史李本亂世之書也下有吾用春秋之法師其意不襲其文十三字又其事備下有議者以謂公不下司馬遷又謂筆力馳騁相上下而無駁雜之説至於本紀立法精密則又遷所不及也亦嘗自謂我作伶官傳豈下滑稽也議者以下疑以不欲凌跨古人而刪之平心無怨惡李本云公自言學道三十年所得者平心無怨惡爾𥘉以范希文事得罪于吕公坐黨人逺貶三峽流落纍年比吕公罷相公始𬒳進擢及後為范公作神道碑言西事時吕公擢用希文盛稱二公之賢能釋私憾而共力於國家希文子純仁大以為不然刻石時輒削去此一節云我父至死未嘗解仇公歎曰我亦得罪於吕丞相者惟其言公所以信於後世也吾嘗聞范公平生自言無怨惡於一人兼其與吕公解仇書見在贅集中豈有父自言無怨惡於一人而其子不使解仇於地下乎父子之性相逺如此信乎堯朱善惡異也公為頴州時吕公之子公著為通判為人有賢行而深自晦默時人未甚知公後還朝力薦之奏疏具集中由是漸見擢用陳恭公執中素不善公其知陳州時公自頴移南京過陳陳拒而不見公後還朝作學士陳為首相公遂不造其門巳而陳出知亳州尋還使相換觀文公當草制陳自謂必不得好詞及制出詞甚美至云杜門却掃善避權勢以逺嫌處事執心不為毁譽而更守陳大驚喜曰使與我相知深者不能道此此得我之實也手録一本寄其門下客李中師曰吾恨不早識此人此假疑避吕范二家子弟因并陳恭公事而去之竊謂於此尤可以見歐范之存心與吕陳之悔過恐皆不可遺也惟稱蘇梅李本自以為不及下有二人因此名重天下公惟嘗因醉戲親客曰廬山高它人作不得唯韓退之作得琵琶前引退之作不得唯杜子美作得後引子美作不得唯太白作得公詩播人口者甚多唯此三篇其尤自喜者也此假恐嫌於誇而去之修唐書李本此假不同者三一則首云公於修唐書最後至局專修紀志而巳列傳則宋尚書祁所修也朝廷以一書出於兩手體不能一遂詔公看詳列傳令刪修為一體二則列官最髙者一人下有姓名云某等奉勑撰而九字三則書宋名下有此例皆前所未有自公為始也十一字乃屬於宋相聞之之上此但差詳疑定本𣣔刪以從簡耳不從范公之辟李本大同小異今不復著議不廢麟州及許耕桑地李本大同而文差略今亦不著不誅保州脅從之兵李本首著為政仁恕之語大抵與定本别假旨意略同其末乃云其為河北轉運使時所活二千餘人先是保州屯兵閉城叛命田况李昭亮等討之不克卒招降之既開城况等推究反者殺二千餘人投於八井又其次二千餘人不殺者分􅊢河北州軍諸事巳定而冨相出為宣撫使懼其復為患謀欲密委諸州守將同日悉誅之計議巳定方作文書會公奉朝旨權知鎮府與富公相遇於內黃夜半屏人以其事告公公大以為不可曰禍莫大於殺巳降昨保州叛卒朝廷巳降勑榜許以不死而招之八井之戮巳不勝其怨况此二千人者本以脅從故得不死奈何一旦無辜就戮爭之不能止因曰今無朝旨而公以便冝處置若諸郡有不逹事機者以公擅殺不肯從命事既參差則必生事是𣣔除患於未萌而反趣其為亂也且某至鎮州必不從命富公不得已遂止是時小人譛言巳入富范勢已難安既而富公大閲河北之兵將卒多所升黜譛者獻言富某擅命專權自作威福已收却河北軍情北兵不復知有朝廷矣於是京師禁軍亟亦大閲多所升擢而富公歸至國門不得入遂罷樞密知鄆州向若遂擅殺二千人其禍何可測也然則公之一言不獨活二千人之命亦免富公於大禍也此比定本為詳足以盡見事之曲折又譛言巳入之下所係更重尤不可闕疑後以不欲形迹當時聽讒之失而刪去之也春帖子李本云內臣梁實嘗言在內中祗候見仁宗云云末云云是歐陽某必索文書自覽是它人當直則否也知開封府李本末後有韓子華謂公曰外議云餘材可以更知一箇開封府似亦嫌太誇而刪之連典大郡李本曰公嘗語人曰治民如治病彼富醫之至人家也僕馬鮮明進退有禮為人診脈按醫書𫐠病證口辨如傾聽之可愛然病兒服藥云無效則不如貧醫矣貧醫無僕馬舉止生踈為人診脈口訥不能應對病兒服藥云疾巳愈矣則便是良醫凡治人者不問吏材能否施設何如但民稱便即是良吏故公為數郡不見治迹不求聲譽以寬簡不擾為意故所至民便既去民思如揚州南京青州皆大郡公至三五日間事巳十減五六一兩月後官府閴然如僧舍或問公為政寬簡而事不廢弛者何也曰以縱為寬以略為簡則弛廢而民受其弊矣吾之所謂寬者不為苛急爾所謂簡者不為繁碎爾識者以為知言此比定本語意尤詳備濮議𥘉不出於公及臺諌有言公獨力辨於朝故議者指公為主議之人公未嘗自辨唯曰今人以濮議為非使我獨當其罪則韓曽二公宜有愧於我後丗以濮議為是而獨稱我善則我冝愧於二公公又撰濮議四卷悉記當時論議本末甚詳又於五代史記書晉出帝父敬儒周丗宗父柴守禮事及李彥詢傳發明人倫父子之道尤為詳悉李本有之而此本無疑公諸子後巳不敢力主其父之論而刪之也蔡州妖尼于惠普託佛言人禍福朝中士大夫多往問之所言時有驗於是翕然共稱為神尼公既自少力排釋氏故獨以為妖嘗有一名公於廣座中稱尼靈異云嘗有牽牛過尼前者指示人曰二牛前丗皆人也前者是一官人後者是一醫人官人嘗失入人死罪醫人藥悮殺人故皆罰為牛因各呼其前丗姓名二牛皆應一座聞之皆嘆其異公獨折之曰謂尼有靈能此有闕文萬物之最靈其尤者為聰明聖智皆不能自知其前丗而有罪𬒳罰之牛乃能自知乎於是座人皆屈服李本有之所謂名公者疑指富公此本無者蓋謂賢者諱也公嘗為杜祁公墓志云簿書出納為之條目甚密必使吏不得為姦及其施於民者則簡而易行公曰我之為政亦如此也李本在連典大郡之後此本無梅龍圖摯知杭州作有美堂最得登臨佳處公為之作記人謂公未嘗至杭而所記如目覽坐堂上者使之為記未必能如是之詳也李本在醉翁亭記之前此本無右凡十六條其十二條定本有之而詳略先後或不同其四條則定本所無而李本有之其平心保州妖尼三事尤非小輔蓋公平生學問根源出處大致言行本末皆巳略見於此而無遺矣平心保州唐書三事亦見於張邦基墨莊漫録云得之公孫建丗望之者則其出於公子叔弼之徒所記而學道以下堯朱以上必是著手書本語無疑矣但張誤於陳恭公以下别為一事耳獨晚年守青州時論執青苗一事尤足以見其剛毅大節始終一致不以既老而少衰而公之諸子乃有所避而不敢書吳丞相作行狀因亦不載至韓魏公作墓志乃始見其嘗有乞不收息及罷提舉官之奏與其辭太原有守拙循常之語元祐之為𥙿録者又不載志語於附傳至葉致逺朱本之書出乃反著其不俟報可擅止散錢而有特與放罪之詔又至近歲洪景盧作四朝史傳乃盡見其以是深為王安石所詆而遂決歸老之計蓋此一事凡更六人之手而三書闕焉幸其有肯書者然猶歷三手越百餘年而後首末得以粗備然則士之制行不苟合於當時而有待於後丗者豈不難哉抑公之言曰後丗苟不公至今無聖賢蓋俗情之愛惡雖有短長而公論之光明終不泯沒此古之君子所以未能以此而易彼也歟因并記其語以輔此篇之闕以為有志之士必將有感於斯焉晦庵先生朱文公文集卷第七十一懷安縣儒學訓導葉暢校
