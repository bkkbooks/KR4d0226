body:
  text: 奏狀乞蠲減星子縣稅錢第二狀第一狀闕臣誤蒙聖恩俟罪偏壘自度庸愚無以輔報到任以來夙夜憂勞惟思所以上布聖恩下求民瘼仰副使令之萬一者竊見本軍諸縣大抵荒涼田野榛蕪人煙稀少而星子一縣為尤甚因竊究其所以乃知日前兵亂流移民方復業而官吏節次增起稅額及和買折帛數目浩瀚人戶盡力供輸有所不給則復轉徙流亡無復顧戀鄉井之意其幸存者亦皆苟且偷安不為子孫長久之慮一旦小有水旱則復顧而之他觀其氣象如腐草浮苴無有根蒂愁歎亡聊深可憐憫是以去年六月曾以此縣稅錢利害條具聞奏乞賜蠲減伏蒙聖恩即日降出而戶部下之本路漕司漕司委官究實復以申部取旨施行百里疲羸日夕仰望聖澤之下流不啻飢渴而戶部乃以去歲議臣之請復下漕司責以對補吏民相顧悼心失圖臣愚惶惑亦不知所以為計然竊伏惟念陛下寬仁勤儉恭巳愛民四方逺近凡以病告無不惻然興念即賜復除臣不敢廣引前事且如近者汀州所貢白金歲數千兩一旦沛然出令舉以丐之了無難色此豈復責其有所取償而後豫之哉慘怛之愛發于誠心而不可巳也而往者議臣不足以窺測天地含容施生之大德輒為對輔之説以逆沮逺近祈恩望幸之心臣雖至愚有以知其決非陛下之本心也且州郡誠有餘財自當措置兊那以紓民力豈復敢以此等瑣末上勞天聽正為公私匱乏不能相救是以冒昧有此陳請今乃限以對輔之説不附其説則逺縣窮民永無蘇息之期必從其説則勢無從出不過剜肉輔瘡以欺天罔人不惟無益而或反以為害不惟仰失陛下愛民之本心而臣之愚亦有所不忍為也是以敢冒萬死復以奏聞欲望聖慈特降睿旨檢會前奏依汀州例直賜蠲放施行計其所捐除不礙上供數外不過紬絹一千五十餘匹錢二千九百餘貫比之汀州之數未為甚費而可以少寬斯人使得安其生業臣不任祈天瀝懇皇恐俟命之至奏南康軍旱傷狀照會本軍并𬋩屬星子都昌建昌縣自六月以來天色亢陽缺少雨澤田禾乾枯本軍恭依御筆處分嚴禁屠宰精意祈禳及行下逐縣精加祈禱去後今據星子都昌建昌縣申依應遍詣寺觀神祠及諸潭洞建壇祭祀請水精加祈禱雨澤並無感應今來諸鄉早禾多有乾損及備據稅戶陳德祥等狀披訴所布田禾緣雨水失時早禾多有乾稿不通收刈申乞委官檢視本軍今檢凖淳熙令諸官私田災傷秋田以七月聽經縣陳訴至月終止本軍除巳依條施行外須至奏聞乞放免租稅及撥錢米充軍糧賑濟狀臣伏覩本軍今為久缺雨澤早田旱損巳依凖令式具狀奏聞訖照對本軍地荒田瘠稅重民貧昨于乾道七年曽遭大旱伏蒙聖恩放免本年夏秋二稅錢米紬絹共八萬六千三百二十貫石匹及詔本路監司應副軍糧米四千石撥到糴軍糧米錢九千餘貫并撥本軍未起米一萬一千七百餘石本軍借兊過乳香度牒錢一萬餘貫湊糴軍糧攴遣官兵及撥到賑濟米五萬石又拖欠兩年上供折帛月椿等錢共九萬三千四百一十六貫石匹兩然後遺民復得存活以至今日今茲不幸復罹枯旱之災又蒙陛下親降御筆深詔守臣精加祈禱而臣奉職無狀無以感格幽明祈禱兩月殊無應效今則早田什損七八晚田亦未可知正得薄收其數亦不能當早田之一二訪聞耆老云乾道七年之旱雖不止于如此然當時承屢豐之後富家猶有蓄積人情未至驚憂又以朝廷散利薄征賑給之厚而人民猶不免于流移殍死閭井蕭條至今未復况今民間蓄積不及往時人情巳甚憂懼目下軍糧便闕攴遣計料見𬋩常平斛斗亦恐將來不足賑濟攴用若不瀝懇先事奏聞竊恐將來流殍之禍及他意外之憂又有甚于前日欲望聖慈早降睿旨許依分數放免稅租外更令轉運常平兩司多撥錢米應副軍糧凖備賑濟則一郡軍民庶幾不致大假狼狽冒犯天威臣無任恐懼待罪之至再奏南康軍旱傷狀照對本軍𬋩屬星子都昌建昌三縣𬋩下諸鄉自春夏以來雨澤少愆尋行祈禱于五月中旬巳獲感應稍稍霑足遂至髙下之田皆巳布種至六月上旬以來又闕雨澤及遍詣𬋩屬靈迹寺觀神祠諸處淵潭取水建置壇場依法册祭龍及修設醮筵禁止屠宰精加祈禱自後未獲感應其𬋩下民戶陂塘所積水利雖車戽注蔭禾稻緣乾亢日久兼又風色滲漏是致民田多有乾稿不通收刈見不住據人戶投陳旱傷不絶本軍恭依御筆處分嚴禁屠宰精意祈禳及行下逐縣精加祈禱去後據星子都昌建昌縣申依應遍詣寺觀神祠及諸潭洞建壇祭祀請水精加祈禱雨澤並無感應今來諸鄉早禾多有乾損及備據稅戶陳德祥等狀披訴所有田禾緣雨水失時早禾多有乾稿不通收刈申乞委官檢視本軍檢凖淳熙令諸官私田災傷秋田以七月聽經縣陳訴至月終止具録奏聞乞截留米綱充軍糧賑糶賑給狀臣熹昨以衰病無能退居田野陛下過聽不忍棄捐超資越序付以千里民社之寄德至渥也而臣亡狀不能悉心營職宣布寬恩馴致旱災害及民物雖巳嘗具奏聞及申省部諸司乞行賑救今來竊聞接濟飢民事常平司巳行措置惟有軍糧一節利害尤為不輕而未聞諸司有所措置竊慮一旦事出意外罪無所逃須至昧死再有陳奏伏望聖明俯乘臨照臣契勘南康軍受納人戶苗米計四萬六千五百一十九石遞年科撥並充上供起發而本軍官吏軍兵一歲糧廪計當用米二萬七千五百一十三石並無科名攴撥從來只于人戶輸納苗米多收加耗髙量斛面及侵攴漕司科撥未盡米斛應副攴遣昨于淳熙五年內奉聖旨令人戶自行把槩見青交量每斛巳減斛面二斗及臣到任訪聞民間猶以所納為重又行措置減去加耗一斗所入之數既巳不多然若無水旱災傷非泛支遣更以别色官錢多方糴輔亦可僅免曠闕今者不幸遭此旱傷差官檢放雖未見得分數多寡然以目所見參之傳聞其勢所收未必及三四分竊慮將來減放之後實納苗米頭數不多當此凶年所減加耗斛面又難以復行增起即本軍官兵所攴糧廪委是並無指擬夫民飢猶能流移逐食軍兵既係尺籍從來仰食于官豈容一日有所欠闕臣既淺短無術可為旬月以來晝度夜思以至成疾雖巳略控危衷陳乞罷免然念州郡事勢日就危迫又有萬倍于一身者若不力告朝廷早為之所而但偷為一身之計自求安便則其上負陛下拔擢任使之恩雖復萬死猶有餘罪故不自揆其踈賤輒敢復具情實冒昧奏聞欲望聖慈哀憐逺方軍民遭此旱虐凛然日有講壑之憂特降睿旨許留淳熙六年殘零未起米綱及七年合起米綱並充本軍軍糧及賑糶賑給支用其賑糶米錢候將來收到别隨綱運解發庶幾一郡生靈若軍若民皆得以保其螻蟻之微命共感天地造化無窮之恩更乞憐臣所患心疾不堪思慮又苦腳氣不任步履早賜罷免仍催巳差下人石􅗐不候般家接人疾速前來之任使臣得輿病還家待盡餘息則臣之私計亦為幸甚謹録奏聞伏候勑旨貼黃照對本軍淳熙六年米綱未起僅五千石今年苗米且約減放七分即所餘合納米不過一萬三千九百五十五石若蒙聖旨盡行撥賜亦不為多又况賑糶米錢將來續次發納即其實攴之數愈更不多此在朝廷至為微末而可以救活一郡軍民之命誠非細事伏乞聖照奏推廣御筆指揮二事狀具位臣朱熹伏覩本路安撫使司牒備奉御筆指揮頗聞雨澤愆期有妨農務仰本路帥守勤恤民隱決遣滯獄嚴禁屠宰精加祈禳若未感格即具奏聞當議降香前來期于必應俾雨澤霑足寬朕憂軫卿等各勉􅏧母怠臣伏讀聖訓有以仰見陛下畏天之誠愛民之切雖成湯桑林之禱宣王雲漢之章無以過此甚盛德也臣幸以愚賤獲奉詔旨謹以謄寫播告質之幽明仰慿威靈屢獲感應但其雨澤不至浹洽均勻目今正是早禾吐穗結實之時尚多闕水去處又聞湖南湖北淮西等路例皆枯旱將來不幸或至荒歉即雖移民移粟之小惠亦無所施臣是以夙夜憂惕不遑啓居竊以愚見推廣聖訓畫為二䇿具以奏聞如有可採乞賜施行庶幾有以導迎和氣銷去旱災仰寬陛下宵旰之憂惟是不量卑鄙屢犯天威無任震懼隕越之至臣之所陳謹具如后一臣伏讀聖詔有曰勤恤民隱臣謹巳遵稟施行訖然臣竊聞陸贄有言民者邦之本財者民之心其心傷則其本傷其本傷其攴幹凋瘁而根柢蹶拔矣推此言之則今日所以勤恤民隱莫若寬其稅賦弛其逋負然後可以慰恱其心而感召和氣也臣自去年到任之𥘉即以本軍星子縣稅賦偏重嘗具奏聞乞賜蠲減及續體訪到三縣夏料木炭錢科紐太重亦嘗具申省部及提點司其木炭錢近得提點司保明條奏巳蒙聖恩蠲減二千貫訖獨星子減稅一事雖蒙聖恩施行而戶部行下漕司漕司委官核實近日方得回申戶部此事若格以有司之法必是方多沮難未容便得蠲減所願聖慈深賜矜憐直降睿旨特依所乞則此縣之民庶幾復得樂生安土永為王民不勝幸甚臣又竊見州縣積欠官物巳凖去年明堂赦書自淳熙三年以前並行除放而近者上司行下依舊催督至如本軍雖小而所催除虛額逃閣外凡一十三項計三萬四千七百三十三貫石匹兩其他大郡抑又可知其間所欠雖復名色多端然而皆是赦恩巳放之物今日再行催理不唯仰虧帝王大信而其為害有不可勝言者蓋若勒令州縣填輔則州縣無所從出必至額外巧作名色取之于民若但責之欠人則其間多巳貧乏狼狽雖使賣妻鬻子不足填納而監繫在官無復解脫之期均之二者皆不足以足用豐財而適足以傷和致沴為害不輕臣愚欲望聖慈特推曠蕩之恩自淳熙三年以前但干欠負官物不問是何名色凡赦恩巳放若巳放而未盡者一切蠲除如有違詔輒行催理仰𬒳受官司繳連具奏委自三省看詳將施行官司重作行遣其𬒳苦人戶亦許徑赴登聞鼓院進狀陳理依此施行庶幾聖恩下逹民情上通可以感格和平銷去災沴惟聖明留意則天下幸甚一臣伏讀聖詔有曰決遣滯獄臣謹巳遵稟施行訖然臣竊聞之易曰君子明謹用刑而不留獄此聖人觀象立教萬世不易之法也今州縣之獄勘結圓備情法相當者並皆即隨時決遣惟其刑名疑慮情理可閔者法當具案聞奏下之刑寺審閲輕重取自聖裁而州縣不敢以意決也此深得古人明謹用刑之意矣然奏案一上動涉年歲且如本軍昨于淳熙四年十一月內申樞密院乞奏劫賊倪敏忠罪案其罪狀明白𥘉無可疑而凡經二年有半至今年三月內方凖勑斷行下其他似此亦且非一竊計他州繁劇去處此類尤多若使皆是行劫殺人之賊偶有疑慮使之久幽囹圄亦何足恤其間蓋有法重情輕之人本為有足憫憐冀得蒙𬒳恩貸而反淹延禁繫不得早遂解釋則恐非聖人所謂不留獄之意也臣愚欲望聖慈特詔大臣一員專督理官嚴立程限令將諸州奏案依先後資次排日結絶其合貸命從輕之人須當日便與行下其情理深重不該減降者即更寬與一限責令審核然後行下庶幾輕者早得決遣釋放重者不至倉卒枉濫是亦導和弭災之一術惟聖明留意則天下幸甚右謹件如前謹録奏聞伏候勑旨奏借兊上供官錢糴米并乞權行倚閣夏稅錢帛狀臣昨為本軍今年災傷至重奏乞截留兩年上供米斛內循狂妄伏俟誅夷不謂聖恩即垂開允臣與合郡千里軍民鼓舞相慶仰戴天地父母再生之恩雖復捐軀隕首誠不足以仰報萬分之一今來檢放旱傷秋苗通計不止七分除巳一面攢具奏聞外復有危迫之懇須至冒昧以聞竊見本軍今年所理夏稅緣自省限起催以來即苦旱乾人戶車水救田日不暇給憂勞愁歎實與常歲不同遂不敢嚴責諸縣依限催理只令勸諭人戶自行輸納至今截日方據納到絹九千四百匹錢一萬六千七百三十五貫二百五十九文省其絹一面攴裝起發所有見錢竊緣本軍别無儲積可備賑糶不免擅行兊借并未起淳熙六年折帛錢七千三百一十九貫二百九十六文省通前兩項共錢二萬四千五十二貫五百五十五文省趂此米價未起之間收糴米斛約計可得一萬一千五百七十石賑糶飢民却俟糶畢收簇元錢節次起發其餘人戶所欠錢絹數目尚多而民間自今以往飢餓寒凍之憂日甚一日漸次無力可以供輸臣誠不忍更行催督以速其流離轉死之禍敢冒萬死復以上聞欲望聖慈更賜哀憐許將本軍今年人戶永納夏稅錢帛權行倚閣令候來年𧖟麥成熟却隨新稅帶納庶幾飢餓餘民得保生業不勝萬幸所有臣輒將上供官錢借兊糴米之罪敢不俯伏恭俟朝典伏乞聖慈併賜施行臣無任瞻天望聖皇懼懇切之至乞撥賜檢放合納苗米充軍糧狀凖尚書省劄子宣教郎權發遣南康軍朱熹奏為今歲旱傷除接濟飢民一事常平司巳行措置惟有軍糧歲用二萬七千五百一十三石並無窠名攴撥乞將淳熙六年未起米五千石并今年苗米檢放外餘數乞盡行撥賜充軍糧及賑糶賑給攴用奉聖旨令本路提舉常平司將所部州軍應管常平義倉錢米通融寬數攴撥外更許本軍將淳熙六年未起米並皆盡數存留充軍糧及賑糶等攴用內糶到價錢令項樁管非奉朝廷指揮不得擅行攴使其淳熙七年分來候見得實旱傷分數别行申取朝廷指揮本軍除巳遵稟施行外今據星子都昌建昌縣申到檢放通計八分四毫四絲所有今秋苗米𬋩催四萬六千五百餘石除放八分四毫四絲計米三萬七千四百餘石外合納米九千九十餘石竊緣本軍一年攴遣米計二萬七千五百一十三石政使盡蒙撥賜上項米斛其于歲計尚闕攴遣若于數內更令發起即其狼狽又將有不可勝言者欲望聖慈矜憐孤逺特許盡數攴撥上件放外苗米與充軍糧則一郡軍民不勝幸甚伏候勑旨奏勸諭到賑濟人戶狀照對本軍今歲旱傷細民闕食巳行下𬋩屬星子都昌建昌縣勸諭到上戶張世亨等承認米穀賑糶接濟民間食用巳行下逐縣告示上戶依所認數目椿𬋩在家伺候差官審實監糶去後續凖行在尚書戶部符九月十九日辰時凖淳熙七年九月十三日勑中書門下省檢會昨凖乾道七年八月一日勑節文訪聞湖南江西間有旱傷州軍竊慮米價踴貴細民艱食理合委州縣守令勸諭有米斛富室上户如有賑濟飢民之人許從州縣審究指實保明申朝廷依今來立定格目給降付身輔授名目內無官人一千五百石輔進義校尉願輔不理選限將仕郎聽二千石輔進武校尉如係進士與免文解一次不係進士候到部與免短使一次四千石輔承信郎如係進士與補上州文學五千石輔承節郎如係進士補迪功郎符本軍疾速施行本軍遂恭稟行下星子都昌建昌縣勸諭承認賑糶米穀之人如願將來賑濟依今來所降指揮格法推賞去後今據都昌建昌縣狀申勸諭到元認賑糶米穀稅户張世亨張邦獻劉師輿黃澄四名各情願依格法將米穀賑濟飢民乞依今降指揮保奏推賞本軍巳行下逐縣告示張世亨等依數樁管米斛伺候本軍給曆付飢民及差官前去監轄賑濟飢民請領食用候見的實賑過米數别行保奏推賞外須至奏聞者繳納南康任滿合奏稟事件狀臣熹昨于淳熙五年凖勑差前件差遣續奉聖旨令臣任滿前來奏事臣巳于次年三月到任至今年三月巳係成資方欲等候替人前來交割職事即依元降指揮前去奏事忽于三月二十五日凖尚書省劄子奉聖旨除臣提舉江南西路常平茶鹽公事自顧踈頑巳試無狀荐蒙任使恩重命輕未敢遽有辭避巳于當日望闕謝恩祗受訖緣為替人未到凖法未得離任其元降奏事指揮又緣巳有前件恩命兼臣見患心氣精神不全思慮應對動有差錯不敢前詣國門聽候進止外伏念臣愚賤踈逺在任二年凡所奏陳多蒙開納甫及終更曽無績效又蒙聖恩有此升擢臣雖至愚然早服父師之訓其于君臣大義與夫古今治亂得失之故粗亦識其梗槩豈不願得一望天日之光少罄平日愚忠之萬一顧以衰頺不獲自盡退就田𤱔死有遺憾惟是今任職事尚有合具奏稟事件不免具事狀條畫以聞而總其目如左須至奏聞者一臣熹狀奏為本軍星子縣稅錢太重欲乞直降睿旨特賜蠲減事一臣熹狀繳連本軍狀奏為勸諭到稅戶張世亨張邦獻劉師輿黃澄共承認米一萬九千石賑濟飢民給賜了畢欲乞不候諸司保明早依元降賞格推恩事一臣熹狀奏為乞降指揮淳熙七年𬒳災之郡不得催理積欠及將倚閣夏稅特與蠲放其上三等户零欠夏稅亦與多作料次逐年帶納事一臣熹奏為乞賜白鹿洞書院勑額及乞頒降光堯夀聖憲天體道性仁誠德經武緯文太上皇帝御書石經及國子監九經注疏等事右謹具如前欲望聖慈特降睿旨逐一施行不勝幸甚臣瞻望闕庭無任慕戀祈懇之至謹録奏聞伏候勑旨一右臣誤蒙聖恩俟罪偏壘自度庸愚無以輔報到任以來夙夜憂勞惟思所以上布聖恩下求民瘼仰副使令之萬一者竊見本軍諸縣大抵荒涼田野榛蕪人煙稀少而星子一縣為尤甚因竊究其所以乃知日前兵亂流移民方復業而官吏節次增起稅額及和買折帛數目浩瀚人户盡力供輸有所不給則復轉徙流亡無復顧戀鄉井之意其幸存者亦皆苟且偷安不為子孫長久之慮一旦小有水旱則復顧而之他觀其氣象如腐草浮苴無有根蒂愁歎亡聊深可憐憫是以到任之初曽以此縣稅錢利害條具聞奏乞賜蠲減伏蒙聖恩即日降出而戶部下之本路漕司漕司委官究實復以申部取旨施行百里疲羸日夕仰望聖澤之下流不啻飢渴而戶部乃以往者議臣之請復下漕司責以對補吏民相顧悼心失圖臣愚惶惑亦不知所以為計者是以默息久之不敢復有奏陳今既終更不逺郡境又遭去年之旱其憔悴無憀之態又有甚于前所陳者是以不敢愛死復嬰鈇鉞而一言之夫以民之貧病至于如此州郡誠有餘財自當措置兊那以紓其力豈便敢以此等瑣末上勞天聽正為公私匱乏不能相敕是以冒昧有此陳請今乃限以對補之説使逺民之疾苦不得以上聞而陛下之德澤不得以下究此殆議者過計之憂臣雖至愚有以知其決非仁聖之本心也欲望聖慈特降睿旨將淳熙六年十月十九日對補指揮更不施行仍照有司檢會臣熹前奏本軍星子縣稅錢事直賜蠲放蓋其所捐除不礙上供數外不過紬絹一千五十餘匹錢二千九百餘貫此于大農之經費不足以當九牛之一毛而可以少寬百里之民使得安其生業臣不任祈天瀝懇惶恐俟命之至謹録奏聞伏候勑旨二貼黃奏為本軍勸諭都昌建昌縣稅戶張世亨劉師輿進士張邦獻待輔太學生黃澄賑濟飢民斗斛照會本軍去歲旱傷至重細民闕食雖有樁管及撥到常平米斛數目不多深恐不能周給遂行勸諭到𬋩屬上戶承認米數賑糶接濟民間食用續于去年十月十一日凖行在尚書戶部九月十六日辰時凖淳熙七年九月十三日勑中書門下省檢凖乾道七年八月一日勑節文訪聞湖南江西間有旱傷州軍竊慮米價踴貴細民艱食理合委州縣守令勸諭有米斛富室上戶如有賑濟飢民之人許從州縣審究指實保明申朝廷依今來立定格且給降付身補授名目內無官人一千五百石輔進義校尉願補不理選限將仕郎聽二千石補進武校尉如係進士與免文解一次不係進士候到部與免短使一次四千石補承信郎如係進士與輔上州文學五千石補承節郎如係進士與補迪功郎符本軍疾速施行本軍恭稟行下𬋩屬再行勸諭承認賑糶米數之人如願將來賑濟切待審究保明申朝廷依今來所降指揮格法推賞去後據都昌建昌縣申數內勸諭到元認糶米稅戶張世亨劉師輿進士張邦獻黃澄四名各情願承認米依格法賑濟內建昌縣稅戶張世亨五千石乞補承節郎進士張邦獻五千石乞輔迪功郎稅戶劉師輿四千石乞補承信郎并都昌縣待補太學生黃澄五千石乞補迪功郎各乞依今降指揮保奏施行本軍遂行下告示張世亨等依數樁米伺候給曆付飢民差官監轄賑濟巳于去年十二月二十八日先具奏聞及申本路諸監司照會去訖續據𬋩屬星子都昌建昌三縣共抄劄闕食飢民二萬九千五百七十八戶數內大人一十二萬七千六百七口小兒九萬二百七十六口本軍各印給曆頭牌面置簿曆發送逐縣當職官給散付人戶預于縣市及諸鄉均定去處共置三十五場分差見任寄居指使添差監押酒稅務監廟大小使臣共三十五員監轄賑糶賑濟及委縣官分場巡察嚴戢減尅乞覔之弊自淳熙八年正月初一日為始令抄劄到闕食人戶赴場賑糶其鰥寡孤獨之人即以常平米斛依法賑濟至正月內又緣雪寒行下屬縣將元係賑糶飢民用上件張世亨黃澄等米及常平義倉米一例賑濟兩日至三月內又慮飢民艱得錢收糴米斛再自十一日為頭行下諸縣將巳給曆賑糶飢民一例普行賑濟一十三日通作半月及照得都昌縣止有黃澄一名承認賑濟米五千石湊所𬋩義倉米會計賑濟不周本軍遂于建昌縣張世亨等賑濟米內撥米四千石本軍措置官錢和雇腳夫舟船裝載發送都昌縣交管分于置場去處責令監轄賑濟至閏三月十五日終節次據都昌縣建昌縣申到張世亨張邦獻劉師輿黃澄賑濟過米撮算共計一萬九千石星子縣元無勸諭到上戶賑濟米斛即以常平義倉米斛依例普行賑濟外本軍節次行下都昌建昌知縣逐旋審究的實賑濟過張世亨黃澄等米數保明申軍去後據迪功郎監城下酒稅權都昌縣事孫僑通直郎知建昌縣事林叔坦狀保明到張世亨張邦獻劉師輿黃澄賑濟過米一萬九千石委是節次賑濟飢民食用之數即無冒濫本軍一面差委從政郎本軍司法參軍陳祖永前去都昌建昌縣核實到張世亨張邦獻劉師輿黃澄賑濟米一萬九千石委是賑濟過的實之數本軍再行稽考别無冒濫保明是實本軍勘會得張世亨劉師輿各係稅戶張邦獻係應舉習詩賦終場士人并黃澄係于淳熙四年秋試應舉習詩賦取中待輔太學生第十五名是實其張世亨張邦獻劉師輿黃澄賑濟過米數各應得近降指揮賞格數內稅戶張世亨賑濟過米五千石合輔承節郎稅戶劉師輿賑濟過米四千石合輔承信郎進士張邦獻賑濟過米五千石合輔迪功郎待輔太學生黃澄賑濟過米五千石合輔迪功郎除已具申本路安撫司轉運司提舉司提刑司照會依條保奏推賞外欲望聖慈下所屬給降合得付身發下以慿給付張世亨張邦獻劉師輿黃澄祗受須至奏聞者貼黃臣契勘本軍𬋩下去秋種麥甚廣春𥘉亦極茂盛續次訪聞近緣雨水頗多大假傷損民間養蠶亦緣雨濕桑柘不至十分成熟伏乞聖照臣契勘除上項張世亨等四家米數巳行攴散了畢外續次訪聞都昌縣下尚有漏落人户未曽賑濟除巳帖本縣知佐審實用義倉米攴散去訖伏乞聖照貼黃奏為乞特詔有司不候諸司保明將本軍所奏黃澄等賑濟早賜依格推賞奏聞事右臣昨奉淳熙七年九月十三日聖旨勸諭到本軍人戶黃澄等出備米一萬九千石賑濟飢民巳曽纍具畫一奏聞去訖近緣春初風雪寒凍及三月以來農功將起巳帖諸縣將上件米普行賑濟𬋩內飢民兩次通計二萬九千五百七十八戶數內大人一十二萬七千六百七口小兒九萬二百七十六口大人一斗五升小兒七升五合足為半月之糧今巳了畢千里之民既免于飢餓流離殍死之憂無不歡呼鼓舞感戴聖恩臣亦多方體察詢究委無欺隱漏落誑妄不實之弊巳因近降指揮具事狀申本路監司乞行保奏外竊緣當來勸諭並是臣親書榜帖分遣官屬再三往復示以朝廷命令官賞之信其人乃肯欣然聽命今臣秩滿非久解罷若不力為奏陳早乞推賞萬一他日有司視同常事巧為沮郤則不惟使臣得罪于民亦恐朝廷異時命令無以取信于下本軍不免别具狀奏欲望聖慈特詔有司不候諸司保明將本軍所奏黃澄張世亨張邦獻劉師輿早賜處分依格推賞庶幾民間早獲為善之利日後或有災傷富民易以勸率貧民不至狼狽實為永久之利臣不勝大願其本軍奏狀繳連在前謹録奏聞伏候勑旨三右臣輒有愚見上瀆聖聰臣竊見本軍去年大旱田𤱔不收幸蒙聖恩減放秋苗倚閣夏稅而又申詔有司發廪勸分前後丁寧勤勤懇懇凡所以加惠于無告之窮民者至深至厚以故今歲開春以來及今巳是七十餘日而閭里細民幸不至于大假闕食又幸目今雨澤以時原野漸潤竊料不過四五十日則二麥可收又四五十日則早稻相繼決不至于復有流離捐瘠之禍以勤陛下宵旰之憂矣然臣竊以為救荒之政蠲除賑貸固當汲汲于其始而撫存休養尤在謹之于其終譬如傷寒大病之人方其病時湯劑砭灸固不可以少緩而其既愈之後飲食起居之間所以將護節宣小失其宜則勞復之證百死一生尤不可以不深畏也今者飢餓之民雖得蒙𬒳聖恩以幸免于死亡然亦類皆鳥形鵠面薾然無異于大病之新起若有司加意撫綏寬其財力則一二年間筋骸氣血庶幾可復其舊若遂以為既愈而不復致其調攝之功但見其尚能耕墾田疇撑拄門戶而遽欲責以纍年之逋負與夫去歲倚閣之官物則是人者其必無全理矣竊聞乾道七年之旱夏稅秋苗亦皆嘗蒙聖恩矣而流殍甚衆迄今不復者正以次年帶納前料稅物者迫之也然考其實所謂帶納者初未嘗大假有人納到以佐有司用度之闕而姦胥猾吏得以並緣搔擾則其害有不可勝言者其後淳熙元年九月四日乃以荐飢始蒙蠲放則三年之間所失巳多而無及于事矣今舊逋未除新稅將起斯人凛凛巳有狼顧之憂臣愚欲望陛下赦臣之罪察臣之言亟詔有司凡去年𬒳災之郡盡今年毋得催理積年舊欠及將去年倚閣夏稅悉與蠲放其上二等人戶當此凶年細民所從仰食其間亦有出粟減價賑糶而不及賞格者欲望聖慈普加恩施許將去年殘欠夏稅多作料數逐年帶納則覆載之間幅員之內當此災旱之餘無有一夫一婦不𬒳堯舜之澤矣臣愚賤踈逺不當妄有陳奏實以誤膺委寄職在牧民竊于詔令之間有以仰窺陛下子愛黎元之心有加無巳大懼無以仰稱萬分是以不敢不盡其愚冒瀆天威臣無任恐懼顛越之至謹録奏聞伏候勑旨四右臣竊嘗伏讀國朝會要恭覩太宗皇帝嘗因江州守臣周述之奏詔以國子監九經賜廬山白鹿洞書院既又以其洞主明起為蔡州褒信縣主簿以旌儒學每恨無由一至其處仰觀遺迹及蒙聖恩假守兹土到任之初考按圖經詢究境內民間利病乃知書院正在本軍星子縣界而陳舜俞廬山記又載真宗皇帝咸平五年嘗勑有司重加修繕間因行視陂塘始得經由其地見其山川環合草木秀潤真間燕講學之區而荒涼廢壞無復棟宇因竊惟念太宗皇帝真宗皇帝所以幸教多士垂𥙿萬世之意其盛如彼而下吏淺聞弗克原念以稱萬分之罪其大如此駭懼震懾不皇啓居既又按考此山老佛之祠蓋以百數兵亂之餘次第興葺鮮不復其舊者獨此儒館莾為荆榛雖本軍已有軍學足以養士然此洞之興逺自前代纍聖相傳眷顧光寵德意深逺理不可廢况境內觀寺鐘鼓相聞殄棄彛倫談説空幻未有厭其多者而先王禮義之宮所以化民成俗之本者乃反寂寥希闊合軍與縣僅有三所而已然則復修此洞蓋未足為煩于是始議即其故基度為小屋二十餘間教養生徒一二十人節縮經營今巳了畢但其勑額官書皆巳燒毀散失無復存者不敢擅行標榜收置輒昧萬死具奏以聞欲望聖明俯賜鑒察追述太宗皇帝真宗皇帝聖神遺意特降勑命仍舊以白鹿洞書院為額仍詔國子監仰摹光堯夀聖憲天體道性仁誠德繼武緯文太上皇帝御書石經及印版本九經疏論語孟子等書給賜本洞奉守看讀于以褒廣前烈光闡儒風非獨愚臣學子之幸實天下萬世之幸謹録奏聞伏候勑旨貼黃臣頃年親見潭州嶽麓書院尚存舊碑大書勑賜嶽麓書院六字伏乞睿照阿馬奏案內小貼子臣熹等契勘阿馬既與外人通情密謀殺夫自是不容旁有知證本不敢具案奏聞今凖提刑司牒須至具奏謹按本人所犯墮絶三綱情狀慘酷聞之猶可酸鼻竊慮有司因循常格擬從減等之坐有害風教事體不輕欲望聖明洞察特依常法以警昏愚以正邦法臣等不任大願奏紹興府都監賈祐之不抄劄飢民狀照對紹興府諸縣今歲災傷飢民流移闕食甚衆恭稟聖訓寅夕究心奉行緣本府山隂會稽縣人戶不住遮道告訴抄劄不盡漏落不實臣即巳措置專設一局見今呼集耆保鄉司專委本府當職官敦請鄉官重行隔别審實其在城五廂闕食細民及流移到府之人本府雖委逐廂官沿門抄劄訪聞多是止慿廂典合干人多有不實不盡亦行前來陳訴臣又巳送下廂官審實抄劄所有他處流移到府臣亦巳行下本府與縣令佐約束停房店舍不得多收賃資并津渡邀滯仍遍行收拾病患飢困及遺棄小兒就寬闊寺院安著攴撥常平官錢收買紫薪藁薦給衣襖之類修合藥餌醫治煮造三兩等稀稠粥次第救助仍委請慈悲僧道主𬋩看養所行非不告戒臣今月十九日據馬林等投狀稱是􅌘縣人事人事疑當作人氏移在本府第一廂居住闕食飢餓內有馬百四一名扶到臣治所巳是飢餓日久十分羸困才到不久即便倒死臣即令醫人用藥灌救移時方得蘇醒遂行呼到本廂官武翼郎紹興府兵馬都監賈祐之取問元不抄劄供報因依本官應對不行及先來承受本府牒委及承臣送下陳狀並無抄劄事因報應本官委是不職難以存留在任臣除巳先將賈祐之牒紹興府對移本府指使差遣外欲望聖慈特降睿旨重賜黜責以為官吏奉行賑濟不虔之戒乞借撥官會給降度牒及推賞獻助人狀未論止許之許疑當作計臣昨𬒳臨遣備使浙東又蒙聖慈賜以錢會三十萬貫以給一路賑糶賑濟自謂遭值聖恩隆厚至于如此其勢必可以救活此道之人伏自入境以來日據紹興府會稽山隂兩縣人戶投訴抄劄漏落遂將諸縣悉行根括先據兩縣申到比舊計增二十五萬六千一百九十二口其餘諸縣尚未申到計其縣分地里之大小戶口決當數倍於此蓋緣當來諸縣抄劄不甚子細而又涉日既久向之粗能自給者今皆闕食所以飢民之數日有增加因以此數考按本府昨來均定所得錢米撥下諸縣之數其為欠闕數目尚多遂將昨來所蒙給降會子等錢除五萬貫諸州申到巳無見在更留五萬凖備諸州取撥外即計逐縣大小及巳得錢米多寡等第均給計巳支費十八萬餘貫而會稽山隂兩縣自占九萬餘貫其餘凖擬諸縣申到再劄人數别行均給者共不過一萬餘貫計可得米三四千石而巳事勢危迫不免逐急于鹽司錢內借撥九萬餘貫牒紹興府措置運糴然亦僅可得米二萬餘石而巳以兩縣再劄所添計之則此二萬二三千石之米其勢豈足以均及諸縣之人然而兩縣所得一家不過日得一二升一口不過日得一二合而巳此皆僅足以苟延喘息而不足以救其死命竊料更加旬月未論不得食者必致殍死而此得食之人亦有羸困不能以自存者矣又况當來計料糶濟止到三月十五日便行住罷巳不能給而麥熟猶在四月麥之熟否姑置未論止許住罷至麥熟猶有半月餘日無以接濟夫以紹興一郡之飢自臣未到巳蒙撥賜米十四萬石錢九萬貫至臣有請又蒙聖恩如此其厚而臣智術淺短不能變通其所施為止于如此竊恐考之于今則徒有賑救之名而無賑救之實要之於後則既巳養之數月之久而不免棄之旬日之間徒費陛下軍國之儲數十大萬而不足以稱陛下救民水火之心固臣之無狀死不償責至于減米增賞雖巳得旨通行而去年獻助之人至今未蒙推賞度牒換米雖巳得旨給降而米數太多度牒一道計當錢千五百緡以此至今皆未聞有應募者則此竊恐陛下憂勞惻怛慱施濟衆廣大無窮之心或格于有司拘孿纎嗇之議而不得以下究也臣巳與帥臣王希吕同狀奏聞欲望聖慈更賜憐憫再行借撥會子三十萬貫及今糴米五六萬石通融接續措畫糶濟而復于此詳具其所以然者以聞其去年本路所奏合推賞人則乞特詔有司直與推賞給降告命付之本州令守臣喚上當􅈦秪受不須更令官司保明徒為文具其度牒亦乞裁減半價只作百五十石仍再給降三百本付紹興府令臣與王希吕同共掌𬋩交到米斛即與書填則人必樂從應募者衆凡此三者儻蒙施行庶幾此郡飢民逐家一日各添得米一二升逐口一日各添得米二三合而逐縣續有劄到漏落戶口及流移歸業之人亦得以漸次收拾不至飢死既有以卒究陛下憂勞惻怛博施濟衆廣大無窮之心而草野愚臣亦得以慿藉威靈不負飢民之命千萬幸甚如其不然則臣計巳窮終必仰孤任使伏自到任以來朝夕憂懼精神耗竭四肢緩弱時復麻痺竊恐一旦溘然無以見百萬餒鬼于地下欲望聖慈赦其罪戾許臣罷免使得脫此冤債歸骨故山亦千萬幸甚披心瀝血干冒宸嚴臣無任恐懼戰栗之至奏救荒事宜狀臣蒙恩將命浙東奉行救恤到官日夕考究求所以上副焦勞之意竊見浙東諸州例皆荒歉台明號為最熟亦不能無少損而紹興府之飢荒昔所未有臣以目所覩回思去歲南康之歉猶謂之樂歲可也賑救既在所急事體宜先奏聞今紹興八邑餘姚上虞號為稍熟然亦不及半收新昌山隂會稽所損皆七八分􅌘縣旱及九分蕭山諸暨水旱相仍幾全無收今除餘姚上虞稍似可緩外且論蕭山等六縣約其所收不過十一先次朝廷撥米一十四萬七千石錢九萬貫并本司前官申朝廷于衢婺州通融撥到義倉錢三萬八千七十五貫一百文明州義倉米五干石數目非不多州郡日夕惟賑濟是務官吏稍解事者皆奔走不暇雖寄居士大夫亦不敢寧處不可謂不留意然終未有能救飢莩之實民情嗷嗷日甚一日不獨下戶乏食而士子宦族第三等人戶有自陳願預乞丐之列者驗其形骸誠非得巳兼自秋來賣田拆屋斫伐桑柘鬻妻子貨耕牛無所不至不較價之甚賤而以得售為幸典質則庫戶無錢舉貸則上戶無力藝業者技無所用營運者貨無所售魚蝦螺蚌久巳竭澤野菜草根取掘又盡百萬生齒飢困攴離朝不謀夕其尤甚者衣不蓋形面無人色扶老攜幼號呼宛轉所在成群見之使人酸辛怵惕不忍正視其死亡者蓋亦不少臣深究其所以然正緣紹興扡狹人稠所産不足充用稔歲亦資鄰郡非若浙西米斛之多又以和買偏重無巨富之家連遭水旱兼失蠶麥些小積穀春首勸糶無有存者上戶先巳匱乏是以細民無所仰給狼狽急迫至于如此大抵荒歉自五分以下猶可措置蓋以五分之粟給十分之人稍行勸分便可苟活今以空虛之郡而荒及九分則一分之粟既不能給十倍之人而戶口甚多所闕浩瀚亦有非移民移粟所能輔助者臣所目見心思兼詢訪士夫父老者既如此復約墾田收租之數以證之除餘姚上虞外今將田畝計其歲入六縣為田度二百萬畝每畝出米二石計歲收四百餘萬又將今再抄劄山隂會稽兩縣口數以約六縣之數則山隂會稽丁口半于諸暨􅌘縣而比新昌蕭山相去不逺絶長輔短兩縣當六縣四分之一今抄劄山隂會稽四等五等貧乏之戶計三十四萬口四等之稍自給及上三等者不預焉則統計六縣之貧民約須一百三十萬口併上戶當不下百四十萬計稔歲所斂四百萬石米除上供及州用外養百四十萬之生齒日計猶不能及二升之數則所謂樂歲無餘者既信而有證矣又約六縣所蠲放分數以計今歲民間所收不過十分之一則所不收之米約計三百六十萬石而所收止四十萬石闕乏數目如此浩瀚則所謂輔助無策者又信而有證矣今將紹興府先所得錢一十二萬八千七十五貫一百文并臣所得三十萬貫除五萬貫諸州申到已無見在又掯留五萬貫均給諸州外不過共折米八萬二千餘石并前項米一十四萬石總而計之不及其田租所闕十分之一今來措置除蕭山僅能口給半月外其餘五縣以戶計之日之所得固巳不過一二升若以口計之則日之所得又不過一二合是僅足以使之皆知聖主憂勞憫恤不忍坐視之意而巳若謂如此而便足以救其必死之命則固難指凖然遂欲以百三十萬之貧民盡仰官司口以升計麥秋之前九十餘日當為粟百萬石則亦非朝廷今日事力之所及也然臣竊謂有司之力誠有限量而聖主天地父母覆載生育之心則無終窮以有限之力言之則救護之切撥賜之多誠若不可以有加于今日然以陛下無窮之心論之則豈不欲使此邦更得數十萬石之粟以必救數十萬人之命其忍直以無可奈何處之而熟視其飢餓顚仆于前乎故臣輒敢歷敘其所見聞考驗之實本末如此而别具施行事目以干聖聽惟陛下哀憐財幸意迫情切言無倫次臣無任皇恐俟罪之至奏紹興府指使密克勤偷盜官米狀照對紹興府諸縣去歲旱傷飢困及流移之民見今闕食昨蒙聖恩撥下米斛賑濟紹興府遂差指使保義郎密克勤往平江府請取米一萬三千石分下上虞新昌􅌘縣交缷賑濟今月𥘉七日臣巡歷到􅌘縣點撿據􅌘縣主簿迪功郎葉梓申承本縣差往三界鎮交量密克勤請到賑濟米一萬石依應躬親將本府通判承議郎吳津較量斛斗交量每斛比少米一升五合又令親隨斗子葉吉等徑自用斛行槩意在虧減升合兼其米盡用粳泥拌和却乃倚恃本府指使對衆抑捺意欲庇護船稍合干人作弊緣此未敢交量乞施行及據本縣土豪黃彥等列狀陳訴密克勤押到米蒙告示前去般擔並係濕惡夾雜粳泥及每斗不應本場斛斗去後折欠負纍不便臣尋取到米樣看視其米多係粳土拌和遂喚到斗子康勝對衆用斛量計每石少欠九升于內量出一斗篩簸內有泥土碎米一升二合并粳一升一合通約所押一萬三千石內折欠拌和之數計米四千一百六十石臣竊惟陛下聖慈天覆矜憫飢民給賜米斛德意至為深厚然以臣所見􅌘縣一帶飢餓之民羸困瘦瘠宛轉道路呼號之聲不可忍聞其不免于死亡者巳不勝計其密克勤乃敢輒將官米如此偷盜作踐使飢餓之民不得霑𬒳實惠情理重害不可容恕除巳牒本府通判承議郎吳津逐急用􅌘縣斛斗交量發下本縣賑濟仍拘𬋩密克勤聽候施行及牒紹興府送獄根勘取見著實依法施行外欲望聖慈先將本人重作施行仍令紹興府疾速根勘監追所盜米斛送納入官庶副賑濟奏巡歷合奏聞陳乞事件狀臣自正月四日起奏紹興府迤邐巡歷有合奏聞陳乞事件今具下項欲望聖慈檢會臣前兩狀所奏及今所陳事理再賜官會三十萬貫速行舊歲之賞痛減度牒之價庶幾儲備稍豐官吏更敢放手救活飢民其作捺湖埂亦係一縣新年農事利害之大者并乞特依所乞早賜給降不勝幸甚一臣𥘉六日到三界鎮見有餓損人口頗多其死亡者亦巳不少七日至􅌘縣八日至本縣清化孝節鄉所見尤多飢羸尤甚據其稱説皆自八九月來闕食至今其死亡者不可勝數道殣相望深可憐憫臣謹巳再于昨蒙給賜錢內取撥五千貫付紹興府通判吳津令收拾賑給􅌘縣新昌及三界鎮一帶病困之人庶幾稍獲安存未至一向死損但恐錢少不足攴用伏乞睿照早賜接濟一臣𥘉九日入諸暨界所有縣之東南一帶山鄉所見病損人數絶少問之鄉人云是去年稍得收成去處却見令佐鄉官稱説縣北湖鄉一帶接連蕭山病死人多不減􅌘縣臣亦再撥給賜錢五千貫付紹興府通判劉俁令收拾諸暨蕭山病困之人及根刷到勸諭上戶賑糶米未曽出糶之數尚有四千餘石巳牒通判劉俁及本縣催促赴場增添人戶每戶除單丁外更與一口收糴及有人戶陳訴乞借官錢及早修捺湖埂緣臣曽與帥臣王希吕連狀奏乞給降米斛未蒙應副今恐失時浸損二麥兼廢農工巳逐急于給賜錢內借撥三千貫應副所有三項錢米雖巳攴撥尚恐數少未足攴用伏乞睿照早賜拯濟一臣十三日入婺州界以後事體續具奏聞大抵婺州災傷比之紹興府分數頗輕州縣措置亦似稍有倫理伏乞睿照奏上戶朱熙績不伏賑糶狀臣巡歷到婺州界一路飢民頗少本州見將元撥賜米及勸諭到上戶米斛置場糶濟逐日煮粥以給城市鄉村艱食之人亦巳頗有倫緒臣自入境以來每過米場必親臨視閲其文曆校其升斗小有欺弊即行懲戒至十四日到金華縣孝順鄉第十二都地名十里牌有朱二十一米場本場即無人在彼糶米據貧乏人戶俞九等列狀哀訴本鄉田産盡賣與豪戶朱縣尉去年荒旱本縣給曆令就本都朱二十一米場糴朱縣尉米養濟且九等每日往來並不曽般米到來致一村人民飢餓其朱縣尉為見行司到來却于沿路散榜詐稱糶米施粥及據金二等陳訴朱縣尉雖在十四都糶米即與朱二十一場隔逺二十餘里本人令幹人許浩用使私升及濕潤粞碎糙米及將人戶官給曆頭擅自批鑿每七升減作五升五升減作四升又有收下曆頭不肯付還百端抑遏無處告訴又據人戶周楊朱子智等衆狀告訴朱縣尉典買産業纍年白收花利不肯批割物力皆係出産之家抱空代為送納臣尋令人暫喚朱縣尉取問本人倚恃豪強不伏前來遂委金華縣尉追發據縣尉迪功郎陸適申依應追喚朱縣尉係極等上戶居屋三百餘間倚恃豪勢藏隱在家不伏前來竊緣本人家僕叢衆全無忌憚臣又巳行下本州追發亦復不到臣照得朱縣尉係修職郎朱熙績元因進納補受官資田畝物力雄于一郡結託權貴凌蔑州縣豪橫縱恣靡所不為本縣昨為第十二都無上戶米斛可糶就近分撥本人在第十二都朱二十一家置場糶米其朱熙績輒敢欺凌縣道不伏發米前去洎至臣巡歷到彼又乃詐出文榜稱就十四都出糶致得一場糴米人戶無從得食其在家所糶又皆減尅升斗虛批曆頭姦弊非一所稱散粥亦是虛文日以一二斗米多用水漿煮成粥飲來就食者反為所誤狼狽而歸凡其所為無非姦狡切害之事及至官司呼喚又敢公然抵拒首尾三日不肯前來若使人皆如此荒政何由可辦欲望聖慈特降睿旨將朱熙績重賜黜責以為豪右姦猾不恤鄉鄰之戒奏巡歷婺衢救荒事件狀臣昨按視紹興府􅌘縣諸暨縣巳具事目奏聞訖續于正月十一日入婺州浦江縣界歷義烏金華武義縣由蘭溪縣界入衢州龍逰西安常山開化江山縣今有合奏聞事謹具下項一婺州諸邑蘭溪水旱相仍𬒳災最甚金華次之而境內馬海白沙一帶為尤甚其他又次之惟永康一縣為稍輕大槩通計比之紹興府諸邑事體殊不侔然諸縣措置不無乖謬以臣所見武義坊郭巳有飢民而訪聞蘭溪金華山谷之間流殍巳衆幸今守臣錢佃頗能究心料理專委通判一員往來檢察請到鄉官五員日夕商議計當不至大假闕敗臣尚恐其所有錢米不足支用巳于昨蒙聖恩所賜錢內取撥台州處州義倉米錢五萬貫應副本州糴米糶濟伏乞睿照一衢州常山開化水旱最甚江山次之西安龍遊又次之通計其實不減婺州但緣當時州郡吝于檢放常山開化係災傷極重去處而常山所放僅及一分六釐有竒開化又止一釐一毫而巳故文案之間但覺災傷輕可而兩邑之民隂受其害不可勝言聞得歲前死亡巳多今之所見羸餓之民亦有甚于婺州諸邑者西安雖輕于兩邑而聞芝溪一源向來俞七俞八作過去處人民巳極困悴加之守倅皆巳逼替吏民解弛無復條貫臣竊憂之巳輒行下本州所得朝廷許撥義倉米五萬石內將一萬石專充賑濟專委曹官兩員鄉官三員分縣措置收拾飢餓羸困之人貌驗支給伏乞睿照一婺州諸邑有災傷稍重而巡歷未到處回程當一一點檢别具奏聞伏乞睿照晦庵先生朱文公文集卷第十六福州府儒學訓導舒鏊校
