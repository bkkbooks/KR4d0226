body:
  text: 序泉州同安縣學故書目序同安學故有官書一匱無籍記文書官吏傳以相承不復訾省至熹始發視則皆故敝殘脫無復次第獨視其終篇皆有識焉者曰宣德郎守祕書丞知縣事林姓而名亡矣按縣治壁記及故廟學記林君名瀆字道源以治平四年為是縣明年熙寧𥘉元始新廟學聚圖書是歲戊申距今紹興二十五年乙亥才八十有八年不幸遭官師之解弛更水火盜竊之餘其磨滅而僅存者止是耳而使之與埃塵蟲鼠共敝於故箱敗篋之間以至於泯泯無餘而後巳其亦不仁也哉因為之料簡其可讀者得凡六種一百九十一卷又下書募民間得故所藏去者復二種三十六卷更為裝禠為若干卷著之籍記而善藏之如故加嚴焉復具刻著卷目次第闕其所失亡者揭之使此縣之人於林君之德尚有考也而熹所聚書因亦附見其後云禆正書序禆正書三卷唐陳昌晦撰凡四十九篇熹所校定可繕寫𥘉熹𬒳府檄訪境內先賢碑碣事傳悉上之府是後得此書及墓表於其家表文猥近不足觀然述其世次為詳書雜晚唐偶儷之體而時出竒澀殆難以句讀也相傳寖久又多訛謬無善本可相參校特以意私定其一二而其不可知者蓋闕焉觀其潔身江海之上不汚世俗之垢紛次輯舊聞以為此書雖非有險竒放絶之行瓌怪偉麗之文然其微詞感厲時有發明理義之致而切於名教者亦可謂守正循理不惑之士矣操行之難而姓名曽不少概見於世亦足悲夫詩之序曰亂世則思君子不改其度若昌晦者可謂近之故熹因校其書而為序其意如此後有君子得以覽焉家藏石刻序豫少好古金石文字家貧不能有其書獨時時取歐陽子所集録觀其序跋辨證之辭以為樂遇適意時恍然若手摩挲其金石而目了其文字也既又悵然自恨身貧賤居處屏逺弗能盡致所欲得如公之為者或寢食不怡竟日來泉南又得東武趙氏金石録觀之大略如歐陽子書然詮序益條理考證益精慱豫心亦益好之於是始胠其橐得故先君子時所藏與熹後所增益者凡數十種雖不多要皆竒古可玩悉加標飾因其刻石大小施橫軸懸之壁間坐對循行卧起恆不去目前不待披筐篋卷舒把玩而後為適也蓋漢魏以前刻石制度簡朴或出竒詭皆有可觀存之足以佐嗜古之癖良非小助其近世刻石本製小者或為橫卷若書秩亦以意所便也蓋歐陽子書一千卷趙氏書多倍之而豫欲以此數十種者追而與之並則誠若不可冀然安知積之久則不若是其富也耶姑首是書以俟紹興二十六年歲次丙子八月二十二日壬辰吳郡朱熹序許升字序易象有之曰地中生木升君子以順德積小以髙大蓋因記文定公問答皆他書所無有而提綱挈領指示學者用力處亦卓然非他書所及下篇四十七章與板本吳氏本略同然時有小異蓋損益曽氏所記而精約過之輒因其舊定著為二篇且著曽氏本語及吳氏之異同者於其下以備參考獨板本所增多猶百餘章然或失本指雜他書其尤者五十餘章至詆程氏以助佛學直以或者目程氏而以豫曰自起其辭皆荒浪無拫非先生所冝言亦不類答問記述之體意近世學佛者私竊為之以亢其術偶出於曽氏雜記異聞之書而傳者弗深考遂附之於先生傳之久逺疑誤後學使先生為得臯於程夫子而曽氏為得罪於先生者則必是書之為也故竊不自知其固陋輒放而絶之雖或𬒳之以僣妄之罪而不敢辭也其餘所謂失本指雜他書甚者亦頗刋去而得先生遺語三十餘章别為一篇然記録不精僅存倣佛非復前篇比矣凡所定著書三篇已校定可繕寫因論其所以然之意附見其後以俟知言有道君子考而擇焉紹興二十九年三月庚午新安朱熹謹書贈徐端叔命序世以人生年月日時所值支幹納音推知其人吉凶夀夭窮逹者其術雖若淺近然學之者亦往往不能造其精微蓋天地所以生物之機不越乎隂陽五行而巳其屈伸消息錯綜變化固巳不可勝窮而物之所賦賢愚貴賤之不同特昏明厚薄毫釐之差耳而可易知其説哉徐君嘗為儒則嘗知是説矣其用志之密微而言之多中也固冝世之君子儻一過而問焉豈惟足以信徐君之術而振業之亦足以知夫得於有生之𥘉者其賦與分量固巳如是富貴榮顯固非貪慕所得致而貧賤禍患固非巧力所可辭也直道而行致命遂志一變末俗以復古人忠厚廉耻之餘風則或徐君之助也雖然與人子言依於孝與人臣言依於忠夭夀固不二矣必修身以俟之乃可以立命徐君其亦謹其所以言者哉紹興壬午十月九日新安朱熹仲晦書論語纂訓序論語纂訓書無卷第合一篇凡古今論語訓義見録者十四家而大抵宗程氏蓋熹外兄丘子野所述子野亦以意附見其是非取舍之説熹讀之其不合於聖人者寡矣因為之序論曰士生乎聖人既沒數千百歲之下而欲明聖人之心於數千百歲之上推其立言埀訓之旨約其辭義於衆説殽亂之中以為一家之書而又欲其是非取舍不繆於聖人亦難矣蓋聖人之書其為意微其為辭約苟不明乎其宗而識乎其本多見其以私見臆説亂之也昔之大儒其猶有不免乎此者况後世之紛紛乎此其所以難也抑又有甚難者焉孔子曰文莫吾猶人也躬行君子則吾未之有得此其所以為甚難者也夫其所以難者如此所以為甚難者又如此則是書之作亦將以明乎其所難者求至乎其所甚難而巳其可巳乎故其求之能慱取之能審推是言之其寡過矣孟子曰慱學而詳説之將以反説約也此之謂巳如是則後聖人數千百歲而生而欲明其心於數千百歲之上無難矣夫學之所以盡其心如此又安有放其邪心以窮乎外物之患哉其行之也不逺矣則其所以為甚難者又得而庶幾焉熹是以樂道之而為之序所以明子野之為是書其難如此而亦以著其從事於聖人者不易焉紹興三十二年十月十八日序送黃子衡序熹生十五年當紹興之癸亥始得與子衡遊於潭溪之上是時子衡生亦十五年與余同師相好也豫生後子衡者五月以故兄事之自是幾二十年矣其遊日以久故其好日以篤所居又為東西鄰弦歌誦説之聲相聞其間闊不以朝夕見者非行役在外則或事之縈係而不得肆爾其餘則是聚而語六經百氏之奧立身行事之方與當世之得失無不講以求其至而及乎文章之趣字畫伎藝之工否者皆其餘也子衡若以余為可與語者豫亦賴子衡以自進故雖間而為一日之别未嘗不勤勤然相嚮慕以别為可惜也今子衡一旦自以為學未足以充其資去而之三山從師學焉曩余與子衡遊觀其頴利明逹沈酣乎載籍之文而從事乎道德之實固巳知其中有以大過人者矣然猶懼其以是而自足也蓋至乎今日然後知其中之果有以大過人也蓋學之患莫甚於自足莫害於無師幸得師而承之於是又患其未知所以學也今子衡之行不以千里為逺不以頴利明逹之資為賢於人其志豈止優於今之為士者哉顧知所以求師而亦素得之矣則豫之所道者亦豈復有他求哉亦願子衡自今息其所以能而求其所以未學者於師而巳誠能如是言者則雖暌離之歎有甚於一日之别而豫與子衡不可以介然于懷也則豫之所以與子衡者其亦可知矣夫子衡之所以責於我者其亦可以無負矣夫紹興三十二年十有二月從表弟新安朱熹序論語要義目録序魯論語二十篇古論語二十一篇分堯曰下章子張問别一篇魯共王毀孔子舊宅得之齊論語二十二篇有問王知道二篇魏何晏等集漢魏諸儒之説就魯論篇章考之齊古為之注本朝至道咸平間又命翰林學士邢昺等取皇甫侃疏約而修之以為正義其於章句訓詁名器事物之際詳矣熙寧中神祖埀意經術始置學官以幸學者而時相父子逞其私智盡廢先儒之説妄意穿鑿以利誘天下之人而塗其耳目一時文章豪傑之士蓋有知其非是而傲然不為之下者顧其所以為説又未能卓然不叛於道學者趨之是猶舍夷貉而適戎蠻也當此之時河南二程先生獨得孟子以來不傳之學於遺經其所以教人者亦必以是為務然其所以言之者則異乎人之言之矣熹年十三四時受其説於先君未通大義而先君棄諸孤中間歷訪師友以為未足於是遍求古今諸儒之説合而編之誦習既久益以迷眩晚親有道竊有所聞然後知其穿鑿支離者固無足取至於其餘或引據精密或解析通明非無一辭一句之可觀顧其於聖人之微意則非程氏之儔矣隆興改元屏居無事與同志一二人從事於此慨然發憤盡刪餘説及其門人朋友數家之説輔緝訂正以為一書目之曰論語要義蓋以為學者之讀是書其文義名物之詳當求之注疏有不可略者若其要義則於此其庶幾焉學者第熟讀而深思之優遊涵泳久而不捨必將有以自得於此本既立矣諸家之説有不可廢者徐取而觀之則其支離詭譎亂經害性之説與夫近世出入離遁似是而非之辨皆不能為吾病嗚呼聖人之意其可以言傳者具於是矣不可以言傳者亦豈外乎是哉深造而自得之特在夫學者加之意而已矣因取凡要義名氏大槩具列如左而序其意云論語訓蒙口義序豫既序次論語要義以備覽觀暇日又為兒輩讀之大抵諸老先生之為説本非為童子設也故其訓詁略而義理詳𥘉學者讀之經之文句未能自通又當遍誦諸説問其指意茫然迷眩殆非啓蒙之要因為刪録以成此編本之注疏以通其訓詁參之釋文以正其音讀然後會之於諸老先生之説以發其精微一句之義繫之本句之下一章之指列之本章之左又以平生所聞於師友而得於心思者間附見一二條焉本末精粗大小詳略無或敢偏廢也然本其所以作取便於童子之習而巳故名之曰訓蒙口義蓋將藏之家孰俾兒輩學焉非敢為他人發也嗚呼小子來前豫幼獲承父師之訓從事於此二十餘年材資不敏未能有得今乃妄意採掇先儒有所取捨度德量力夫豈所宜然施之汝曹取其易曉本非述作以是庶幾其可幸無罪焉爾夫其訓釋之詳且明也日講焉則無不通矣義理之精而約也日誦焉則無不識去聲下同矣通者巳知而時習識者未解而勿忘豫之始學亦若斯而巳矣嗚呼小子其懋敬之哉汲汲焉而毋欲速也循循焉而毋敢惰也毋牽於俗學而絶之以為迂且淡也毋惑於異端而躐之以為近且卑也聖人之言大中至正之極而萬世之標凖也古之學者其始即此以為學其卒非離此而為道窮理盡性修身齊家推而及人內外一致蓋取諸此而無所不備亦終吾身而巳矣舍是而他求夫豈無可觀者然致逺恐泥昔者吾幾陷焉今裁自脫故不願汝曹之為之也嗚呼小子其懋戒之哉送陳宗之序建陽陳君宗之一日過熹而言曰萬年之曽大父起諸生事仁宗皇帝得執法殿中當是時天子春秋髙儲兩未建二三大臣以為憂而議之未能得堅決也殿中君一旦沭浴抗疏極言未報而以暴卒聞於是古靈陳公為志其墓其後丞相溫國文正公又以言之於朝今以二公之言及其疏考之知其以死諌無疑也而朝廷每修嘉祐定䇿之功大者銘鼎彛小者登竹帛顧殿中君獨不與焉萬年不肖誠不勝其憤悶嘗具其事以聞於朝章幸巳下而任事者莫或哀之今將復進而有言且病其不能遂也子以是為如何哉熹謹對曰先祖有善而子孫弗能知是不明也然而弗能暴白以傳於後是不仁也然則子之為是汲汲亦其宜也雖然豫竊聞之古之君子思所以顯其親者惟立身楊名之為足恃是以不求諸人而求諸巳不務其外而務其內若殿中君之節誠髙矣然其所以傳世而埀後者豈獨以一朝慷慨死職為諒哉豫嘗得其平生之遺文伏而讀之其言之粹皆可講而思也其行之純皆可則而象也以吾子之才之志而用其力於此不以貴乎巳而聞於人者亂焉久之而弗渝也是亦殿中君而巳矣於以立身楊名而顯其親豈不有餘地乎不此之圖顧乃捐書廢業觸犯寒暑僕僕焉奔走塵埃之中而曰吾將以暴白吾祖之德善而求聞於後世為計無乃下乎雖然宗之行矣以殿中君之忠吾子之孝而任事者曽不以動其心則世之所可願者無復有以動其心矣方今朝廷清明耆俊在服子之所病殆其不然吾知子之行也其必有以藉手而歸以拜殿中君之墓矣抑吾前所道古之君子所以顯其親云者亦豈遽為無所用之空言哉或者宗之終有意焉則亦庶乎其猶可及也既以是對於其行又書以贈之詩曰維其有之是以似之豫於宗之蓋不能無望焉爾隆興二年夏六月壬午新安朱熹序困學恐聞編序孔子曰生而知之者上也學而知之者次也困而學之又其次也困而不學民斯為下矣夫生知者堯舜孔子也學知者禹稷顔回也困也者行有不得之謂也知其困而學焉以增益其所不能此困而學之之事也亦以卑矣然能從事於斯則其成猶不在善人君子之後不能從事於斯則靡然流於下民而不知反均之困耳而二者相去之間如是之逺學與不學之異耳可不懋哉可不懋哉豫嘗以困學名豫燕居之室而來吾室者亦未嘗不以此告之目其雜記之編曰困學恐聞蓋又取夫子路有聞未之能行惟恐有聞之意以為困而學者其用力宜如是也讀是書者以下民為憂而以未能行其所聞為恐則豫將取以輔吾仁焉戊午讜議序君臣父子之大倫天之經地之義而所謂民彛也故臣之於君子之於父生則敬養之沒則哀送之所以致其忠孝之誠者無所不用其極而非虛加之也以為不如是則無以盡乎吾心云爾然則其有君父不幸而罹於橫逆之故則夫為臣子者所以痛憤怨疾而求為之必報其讎者其志豈有窮哉故記禮者曰君父之讎不與共戴天寢苫枕干不與共天下也而為之説者曰復讎者可盡五世則又以明夫雖不當其臣子之身而苟未及五世之外則猶在乎必報之域也雖然此特庶民之事耳若夫有天下者承萬世無疆之統則亦有萬世必報之讎非若庶民五世則自髙祖以至玄孫親盡服窮而遂巳也國家靖康之禍二帝北狩而不還臣子之所痛憤怨疾雖萬世而必報其讎者蓋有在矣太上皇帝受命中興誓雪父兄之辱雖其間亦或為姦謀之所前郤而聖志益堅至于紹興之𥘉賢才並用綱紀復張諸將之兵屢以捷告恢復之勢蓋巳什八九成矣虜人於是始露和親之議以沮吾計而宰相秦檜歸自虜庭力主其事當此之時人倫尚明人心尚正天下之人無賢愚無貴賤交口合辭以為不可獨士大夫之頑鈍嗜利無耻者數輩起而和之清議不容詬詈唾斥欲食其肉而寢處其皮則其於檜可知矣而檜乃獨以梓宫長樂藉口攘却衆謀熒惑主聽然後所謂和議者翕然以定而不可破自是以來二十餘年國家忘仇敵之虜而懷宴安之樂檜亦因是藉外權以專寵利竊主柄以遂姦謀而向者冒犯清議希意迎合之人無不夤緣驟至通顯或乃踵檜用事而君臣父子之大倫天之經地之義所謂民彛者不復聞於縉紳之間矣士大夫狃於積衰之俗徒見當時國家無事而檜與其徒皆享成功無後患顧以亡讎忍辱為事理之當然主議者慕為檜遊談者慕其徒一雄唱之百雌和之癸未之議發言盈庭其曰虜世讎不可和者尚書張公闡左史胡公銓而止耳自餘蓋亦有謂不可和者而其所以為説不出乎利害之間又其餘則雖平時號賢士大夫慨然有六千里為讎人役之歎者一旦進而立乎廟堂之上顧乃惘然如醉如幻而忘其疇昔之言厥或告之則曰此處士之大言耳嗚呼秦檜之罪所以上通於天萬死而不足以贖者正以其始則唱邪謀以誤國中則挾虜勢以要君使人倫不明人心不正而末流之弊遺君後親至於如此之極也夫惟三綱不立是以衆志無所統繫而上之人亦無所慿藉以為安斯乃有識之士所為長慮却顧而凛然以寒心者而説者猶曰姑以衆論之從違而卜事理之可否則今日士大夫是和者之多蓋不下前日非和者之衆也獨安得以前日之不可而害今日之可哉嗚呼是未知前日人倫之明而今日之不明前日人心之正而今日之不正也且若必以人之衆寡為勝負則夫所謂士大夫是和之多者又孰若六軍萬姓之為多耶今六軍萬姓之言則是二公之言而巳蓋君臣父子之大倫天之經地之義而所謂民彛者其於世也有明晦其在人也無存亡是以雖當頽壞廢弛之餘邪議四起無復忌憚而亦不能斬伐銷鑠使之無也奈何不聽於此顧反決得失於前日所謂頑鈍嗜利無耻者之餘謀此巳墜之三綱所以未能復振巳隳之萬事所以未能復理而上之人終亦未能有所慿藉以成安強之勢也今南北再歡中外無事迂愚左見所謂萬世必報之讎者固巳無所復發其口矣竊伏田間不勝憤歎因讀魏元履所敘次戊午讜議為之慨然流涕蓋傷其禍殃自此始也懷不能巳姑論其始終梗槩如此以發明元履所為敘次之意并以致草野孤臣畢義願忠之誠謀國者儻有取焉則猶足以禆廟謀之萬一而非區區所敢望也乾道改元六月戊戍新安朱熹序贈李堯舉序日者李君以五行七政推知人生壽夭窮逹循其巳然而逆斷其將然雖數十年之逺無一辭之差顧於豫稱説云云則若有可疑者豈其言之空多所以不能無失耶不然是殆見吾厄窮之久意其所不堪而姑為是言以恱之耳嗟乎士之辱於草野泥塗之中不幸而類豫者何可勝數生雖愛之而不忍其窮然必欲人人揣其所欣厭以為避就則可以信吾術於當世矣志士不忘在溝壑勇士不忘喪其元彼為此者其殆必有以樂乎此生又安知其果以吾言動其心哉余為生計莫若直其辭而巳矣生一直其辭在我者既無枉道詘身之辱而天下無不服吾術之精且又使吾之所愛敬慕恱而不欲其久窮者益有以自信而忘其窮之為纍豈不真有助哉生將有所適因書以授之生行四方且久其更事寖多必將深有感豫言者矣乾道元年十一月朔旦丹陽朱仲晦父書魏甥恪字序商頌曰自古在昔先民有作溫恭朝夕執事有恪作之言為也恪之言敬也夫人飽食逸居而無所作為於世則蠢然天地之一蠧也故人不可以無作然作而不敬其所作也終無成矣魏氏甥茂孫善讀書能講説然余患其無所作為之志恪敬之心因其來請名字也名之曰恪而以元作字之恪也其敬聽余言毋怠毋忽乾道二年正月二十有一日朱熹仲晦父書林用中字序古田林子用中過豫于屏山之下以道學為問甚勤豫不能有以告也然與之言纍日知其志之髙力之久所聞之深而所至之不可量也一日語豫求所以易其名與字者豫曰名者子生三月而父命之非朋友所得變字雖可改然前輩有言名字者巳所假借以自稱道亦人所假借以稱道巳之辭爾奚以求勝為哉林子曰不然用中之名在中庸實舜之事非後學所宜假借以自名者故常病其大而不自安非敢小之而復求勝也且亦素請於家君矣願得一言若可用以自警者而稱焉則所望也豫嘉其禮與辭之善也則告之曰舜誠大聖人不可及也而古之人有顔子者其言曰舜何人也豫何人也有為者亦若是夫豈不知舜之不可以幾及而必云爾者蓋曰學所以求為聖人不以是為標的則無所望走而之焉耳子誠能志顔子之志而學其學則亦何歉於名之大而必曰易之邪且子不觀於子思之中庸耶中庸之書上言舜下言顔子用其中者舜也擇乎中庸得一善則拳拳服膺而弗失者顔子也夫顔子之學所以求為舜者亦在乎精擇而敬守之耳蓋擇之不精則中不可得守不以敬則雖欲其一日而有諸巳且將不能尚何用之可致哉今子必將道顔而之舜則亦自夫擇者始而敬以終之無他事矣故豫謂子之名則無庸改而請奉字曰擇之又曰敬仲二字惟所稱子以是為足以有警乎無也林子曰子之教敢不奉以周旋豫因稍次序其語書以贈之乾道二年三月癸亥送張仲隆序士大夫狃於宴安無事而不為經世有用之學者幾年于兹矣屬者天子慨然發憤以恢復土疆報雪讎耻為巳任思得天下卓然可用之實材而器使之夙寤晨興當食屢歎於是天下之士祗承德意始復相與刮摩淬厲務精其能以待選擇蓋自廟堂侍從之英下至韋布芻蕘之賤奮然並起求以治軍旅啇財利之術自獻者一時爭出頭角蓋人材之衆多且適於實用未有若今日之盛而國勢之重輕強弱視前日亦既有分矣然豫竊聞之古聖賢之言治必以仁義為先而不以功利為急夫豈固為是迂闊無用之談以欺世眩俗而井受實禍哉蓋天下萬事本於一心而仁者此心之存之謂也此心既存乃克有制而義者此心之制之謂也誠使是説著明於天下則自天子以至於庶人人人得其本心以制萬事無一不合宜者夫何難而不濟不知出此而曰事求可功求成吾以苟為一切之計而巳是申啇吳李之徒所以亡人之國而自滅其身國雖富其民必貧兵雖強其國必病利雖近其為害也必逺顧弗察而巳矣吾黨張侯仲隆材氣絶人志節甚偉方舉世晏然溺於無事之時其為有用之學固巳久矣及其閙然競於有事之際則反深自閉匿若無能者然其試於百里則善良懷其惠而姦盜懾其威退而間處則杜門讀書以斟酌世故而親仁尚友以培本根廓廓乎其未嘗有嘆老嗟卑之念也然則其於古聖賢仁義之説殆亦槩乎其有聞矣今天子聞其為人且欲召而見之豈徒然者哉行矣張侯強飯自愛平生之學從容為上一二言之明主且恨見公之晚惟無忘所謂仁義云者則庶乎有以慰友朋之望矣乾道四年春二月丙申新安朱熹序程氏遺書後序右程氏遺書二十五篇二先生門人記其所見聞答問之書也始諸公各自為書先生沒而其傳寖廣然散出並行無所統一傳者頗以巳意私竊竄易歷時既久殆無全編熹家有先人舊藏數篇皆著當時記録主名語意相承首尾通貫蓋未更後人之手故其書最為精善後益以類訪求得凡二十五篇因稍以所聞歲月先後第為此書篇目皆因其舊而又别為之録如此以見分别次序之所以然者然嘗竊聞之伊川先生無恙時門人尹焞得朱光庭所抄先生語奉而質諸先生先生曰某在何必讀此書若不得某之心所記者徒彼意耳尹公自是不敢復讀夫以二先生唱明道學於孔孟既沒千載不傳之後可謂盛矣而當時從遊之士蓋亦莫非天下之英材其於先生之嘉言善行又皆耳聞目見而手記之宜其親切不差可以行逺而先生之戒猶且丁寧若是豈不以學者未知心傳之要而滯於言語之間或者失之毫釐則其謬將有不可勝言者乎又况後此且數十年區區掇拾於殘編墜簡之餘傳誦道説玉石不分而謂真足以盡得其精微嚴密之旨其亦誤矣雖然先生之學其大要則可知巳讀是書者誠能主敬以立其本窮理以進其知使本立而知益明知精而本益固則日用之間且將有以得乎先生之心而於疑信之傳可坐判矣此外諸家所抄尚衆率皆割裂輔綴非復本篇異時得其所自來當復出之以附今録無則亦將去其重復别為外書以待後之君子云爾程氏遺書附録後序右附録一卷明道先生行狀之屬凡八篇伊川先生祭文一篇奏狀一篇皆其本文無可議者獨伊川行事本末當時無所論著熹嘗竊取實録所書文集內外書所載與凡他書之可證者次其後先以為年譜既不敢以意形容又不能保無謬誤故於每事之下各系其所從得者今亦輒取以著于篇合為一卷以附于二十五篇之後嗚呼學者察言以求其心考迹以觀其用而有以自得之則斯道之傳也其庶幾乎乾道四年歲在著雍困敦夏四月壬子新安朱熹謹記贈徐師表序南浦徐君師表論五行精極建安今年新進士數人大抵皆其所嘗稱許序引具存可覆視也一日見豫屏山之下因以所知十餘人者驗之壽夭窮逹之間中者八九以是知諸君之譽徐君也不為妄而徐君之得諸人也不為幸其挾諸人者不為誇矣將行求豫言以贈豫惟人之所賦薄厚淹速有不可易者如此而學士大夫猶欲以智力求之至於義理之所當為君子所不謂命則又未聞其有必為者何哉徐君之所從遊多吾黨之士坐語從容試以是説諗之庶乎其有益也乾道巳丑孟夏既望新安朱熹仲晦父書家禮序凡禮有本有文自其施於家者言之則名分之守愛敬之實其本也冠昏喪祭儀章度數者其文也其本者有家日用之常體固不可以一日而不修其文又皆所以紀綱人道之終始雖其行之有時施之有所然非講之素明習之素熟則其臨事之際亦無以合宜而應節是不可以一日而不講且習焉也三代之際禮經備矣然其存於今者宮廬器服之制出入起居之節皆巳不宜於世世之君子雖或酌以古今之變更為一時之法然亦或詳或略無所折衷至或遺其本而務其末緩於實而急於文自有志好禮之士猶或不能舉其要而困於貧窶者尤患其終不能有以及於禮也熹之愚蓋兩病焉是以嘗獨觀古今之籍因其大體之不可變者而少加損益於其間以為一家之書大抵謹名分崇愛敬以為之本至其施行之際則又略浮文敦本實以竊自附於孔子從先進之遺意誠願得與同志之士熟講而勉行之庶幾古人所以修身齊家之道謹終追逺之心猶可以復見而於國家所以敦化導民之意亦或有小輔云東歸亂藁序始豫與擇之陪敬夫為南山之遊窮幽選勝相與詠而賦之四五日間得凡百四十餘首既而自咎曰此亦足以為荒矣則又推數引義更相針戒者久之其事見於倡酬前後序篇亦巳詳矣自與敬夫别遂偕伯崇擇之東來道塗次舍輿馬杖屨之間專以講論問辨為事蓋巳不暇於為詩而間隙之時感事觸物又有不能無言者則亦未免以詩發之蓋自櫧州歷宜春泛清江泊豫章涉饒信之境繚繞數千百里首尾二十八日然後至於崇安始盡胠其橐掇拾亂藁才得二百餘篇取而讀之雖不能當義理中音節然視其間則交規自警之詞愈為多焉斯亦吾人所欲朝夕見而不忘者以故不復毀棄姑序而存之以見吾黨直諒多聞之益不以遊談燕樂而廢至其時或發於一偏不能一出於正者亦皆存而不削庶乎後日觀之有以惕然自省而思所以改焉是則此藁之存亦未可以為無益而略之也若夫江山景物之竒隂晴朝暮之變幽深傑異千狀萬態則雖所謂二百篇猶有所不能形容其髣佛此固不得而記云乾道丁亥冬十月二十有一日新安朱熹序周子太極通書後序右周子之書一編今舂陵零陵九江皆有本而互有同異長沙本最後出乃熹所編定視他本最詳密矣然猶有所未盡也蓋先生之學其妙具於太極一圖通書之言皆發此圖之藴而程先生兄弟語及性命之際亦未嘗不因其説觀通書之誠動靜理性命等章及程氏書之李仲通銘程邵公志顔子好學論等篇則可見矣故潘清逸志先生之墓敘所著書特以作太極圖為稱首然則此圖當為書首不疑也然先生既手以授二程本因附書後祁寬居之云傳者見其如此遂誤以圖為書之卒章不復釐正使先生立象盡意之微旨暗而不明而驟讀通書者亦復不知有所總攝此則諸本皆失之而長沙通書因胡氏所傳篇章非復本次又削去分章之目而别以周子曰者加之於書之大義雖若無所害然要非先生之舊亦有去其目而遂不可曉者如理性命章之類又諸本附載銘碣詩文事多重復亦或不能有所發明於先生之道以幸學者故今特據潘志置圖篇端以為先生之精意則可以通乎書之説矣至於書之分章定次亦皆復其舊貫而取公及蒲左丞孔司封黃太史所記先生行事之實刪去重復合為一篇以便觀者蓋世所傳先生之書言行具此矣潘公所謂易通疑即通書而易説獨不可見向見友人多蓄異書自謂有傳本亟取而觀焉則淺陋可笑皆舍法時舉子葺緒餘與圖説通書絶不相似不問可知其偽獨不知世復有能得其真者與否以圖書推之知其所發當極精要微言湮沒甚可惜也熹又嘗讀朱內翰震進易説表謂此圖之傳自陳摶种放穆修而來而五峯胡公仁仲作通書序又謂先生非止為种穆之學者此特其學之一師耳非其至者也夫以先生之學之妙不出此圖以為得之於人則決非种穆所及以為非其至者則先生之學又何以加於此圖哉是以嘗竊疑之及得志文考之然後知其果先生之所自作而非有所受於人者公蓋皆未見此志而云云耳然胡公所論通書之指曰人見其書之約而不知其道之大也見其文之質而不知其義之精也見其言之淡而不知其味之長也人有真能立伊尹之志修顔子之學則知此書之言包括至大而聖門之事業無窮矣此則不可易之至論讀是書者所宜知也因復掇取以系于後云乾道巳丑六月戊申新安朱熹謹書語孟集義序𥘉曰精義後改名集義論孟之書學者所以求道之至要古今為之説者蓋巳百有餘家然自秦漢以來儒者類皆不足以與聞斯道之傳其溺於卑近者既得其言而不得其意其騖於髙逺者則又支離踳駁或乃并其言而失之學者益以病焉宋興百年河洛之間有二程先生者出然後斯道之傳有繼其於孔子孟氏之心蓋異世而同符也故其所以發明二書之説言雖近而索之無窮指雖逺而操之有要使夫讀者非徒可以得其言而又可以得其意非徒可以得其意而又可以并其所以進於此者而得之其所以興起斯文開悟後學可謂至矣間嘗搜輯條流以附本章之次既又取夫學之有同於先生者若橫渠張公范氏二吕氏謝氏遊氏楊氏侯氏尹氏凡九家之説以附益之名曰論孟精義以備觀省而同志之士有欲從事於此者亦不隱焉抑嘗論之論語之言無所不包而其所以示人者莫非操存涵養之要七篇之指無所不究而其所以示人者類多體驗充擴之端夫聖賢之分其不同固如此然而體用一源也顯微無間也是則非夫先生之學之至其孰能知之嗚呼兹其所以奮乎百世絶學之後而獨得夫千載不傳之傳也歟若張公之於先生論其所至竊意其猶伯夷伊尹之於孔子而一時及門之士考其言行則又未知其孰可以為孔氏之顔曽也今録其言非敢以為無少異於先生而悉合乎聖賢之意亦曰大者既同則其淺深疏密毫釐之間正學者所宜盡心耳至於近歲以來學於先生之門人者又或出其書焉則意其源逺末分醇醨異味而不敢載矣或曰然則凡説之行於世而不列於此者皆無取巳乎曰不然也漢魏諸儒正音讀通訓詁考制度辨名物其功博矣學者苟不先涉其流則亦何以用力於此而近世二三名家與夫所謂學於先生之門人者其考證推説亦或時有輔於文義之間學者有得於此而後觀焉則亦何適而無得哉特所以求夫聖賢之意者則在此而不在彼爾若夫外自託於程氏而竊其近似之言以文異端之説者則誠不可以入於學者之心然以其荒幻浮夸足以欺世也而流俗頗巳鄊之矣其為害豈淺淺哉顧其語言氣象之間則實有不難辨者學者誠用力於此書而有得焉則於其言雖欲讀之亦且有所不睱矣然則是書之作其率爾之誚雖不敢辭至於明聖傳之統成衆説之長折俗流之謬則竊亦妄意其庶幾焉乾道壬辰月正元日新安朱熹謹書林允中字序始豫得古田林生用中愛其通晤修謹嗜學不倦因其請字字之曰擇之一日擇之又請曰用中之弟允中亦知有志於學而其才小不足願推所以見命之意字之曰擴之何如豫時未識允中而以擇之之言知其為人也則應曰諾明年擴之亦來視其志與其才信乎其如擇之之言也自是從豫遊今四五年矣徐深察之則其為人蓋晦外而明於內朴外而敏其中是以豫有取焉今年還自吳中過豫潭溪之上留語三日則聞見益廣而將有以充其才矣間請豫文以序其字顧豫言何足取然嘗聞之動靜相循如環無端而聖賢之學必主乎諍蓋火之宿者用之壯水之滀也決之長其理然也擴之誠自病其才之未充而欲卒大之耶則亦反其本務其實而巳矣擴之唯唯遂書以授之乾道壬辰九月丙午新安朱熹序資治通鑑綱目序先正溫國司馬文正公受詔編集資治通鑑既成又撮其精要之語别為目録三十卷并上之晚病本書太詳目録太簡更著舉要歷八十卷以適厥中而未成也至紹興𥘉故侍讀南陽胡文定公始復因公遺藁修成舉要輔遺若干卷則其文愈約而事愈備矣然往者得於其家而伏讀之猶竊自病記識之弗強不能有以領其要而及其詳也故嘗過不自料輒與同志因兩公四書别為義例增損櫽括以就此編蓋表歲以首年逐年之上行外書某甲子遇甲字子字則朱書以别之雖無事依舉要以備歲年而因年以著統凡正統之年歲下大書非正統者兩行分注大書以提要凡大書有正例有變例正例如始終興廢災祥沿革及號令征伐殺生除拜之大者變例如不在此例而善可為法惡可為戒者皆特書之也而分注以備言凡分注有追原其始者有遂言其終者有詳陳其事者有備載其言者有因始終而見者有因拜罷而見者有因事類而見者有因家世而見者有溫公所立之言所取之論有胡氏所收之説所著之評而兩公所遺與夫近世大儒先生折衷之語今亦頗采以附於其間云使夫歲年之久近國統之離合辭事之詳略議論之同異通貫曉析如指諸掌名曰資治通鑑綱目凡若干卷藏之巾笥姑以私便撿閲自備遺忘而巳若兩公述作之本意則有非區區所敢及者雖然歲周於上而天道明矣統正於下而人道定矣大綱槩舉而監戒昭矣衆目畢張而幾微著矣是則凡為致知格物之學者亦將慨然有感於斯而兩公之志或庶乎其可以默識矣因述其指意條例如此列於篇端以俟後之君子云乾道壬辰夏四月甲子新安朱熹謹書八朝名臣言行録序豫讀近代文集及記事之書觀其所載國朝名臣言行之迹多有輔於世教然以其散出而無統也既莫究見始終表裏之全而又汩於虛浮詭誕之説豫常病之於是掇取其要聚為此録以便記覽尚恨書籍不備多所遺闕嗣有所得當續書之中和舊説序余蚤從延平李先生學受中庸之書求喜怒哀樂未發之旨未逹而先生沒余竊自悼其不敏若窮人之無歸聞張欽夫得衡山胡氏學則往從而問焉欽夫告余以所聞余亦未之省也退而沉思殆忘寢食一日喟然嘆曰人自嬰兒以至老死雖語默動靜之不同然其大體莫非巳發特其未發者為未嘗發爾自此不復有疑以為中庸之旨果不外乎此矣後得胡氏書有與曽吉父論未發之旨者其論又適與余意合用是益自信雖程子之言有不合者亦直以為少作失傳而不之信也然間以語人則未見有能深領會者乾道巳丑之春為友人蔡季通言之問辨之際豫忽自疑斯理也雖吾之所默識然亦未有不可以告人者今析之如此其紛紏而難明也聽之如此其冥迷而難喻也意者乾坤易簡之理人心所同然者殆不如是而程子之言出其門人髙弟之手亦不應一切謬誤以至於此然則豫之所自信者其無乃反自誤乎則復取程氏書虛心平氣而徐讀之未及數行凍解氷釋然後知情性之本然聖賢之微旨其平正明白乃如此而前日讀之不詳妄生穿穴凡所辛苦而僅得之者適足以自誤而巳至於推類究極反求諸身則又見其為害之大蓋不但名言之失而巳也于是又竊自懼亟以書報欽夫及嘗同為此論者惟欽夫復書深以為然其餘則或信或疑或至于今纍年而未定也夫忽近求逺厭常棄新其弊乃至於此可不戒哉暇日料檢故書得當時往還書藁一編輒序其所以而題之曰中和舊説蓋所以深懲前日之病亦使有志於學者讀之因豫之可戒而知所戒也獨恨不得奉而質諸李氏之門然以先生之所巳言者推之知其所未言者其或不逺矣壬辰八月丁酉朔新安朱熹仲晦云記論性答藁後此篇雜出問答書中今以附此此篇出於論定之𥘉徒以一時之見驟正纍年之失其向背出入之際猶有未服習者又持孤論以當衆賢心亦不自安故自今讀之尚多遺恨如廣仲之言既以靜為天地之妙又論性不可以真妄動靜言是知言所謂歎美之善而不與惡對者云爾應之宜曰善惡也真妄也動靜也一先一後一彼一此皆以對待而得名者也不與惡對則不名為善不與動對則不名為靜矣既非妄又非真則亦無物之可指矣今不知性之善而未始有惡也真而未始有妄也主乎靜而涵乎動也顧曰善惡真妄動靜凡有對待皆不可以言性而對待之外别有無對之善與靜焉然後可以形容天性之妙不亦異乎當時酬對既不出此而他所自言亦多曠闕如論性無不該不可專以靜言此固是也然其説當云性之分雖屬乎靜而其藴則該動靜而不偏故樂記以靜言性則可如廣仲遂以靜字形容天性之妙則不可如此則語意圓矣如論程子真靜之説以真為本體靜為未感此亦是也然當云下文所謂未發即靜之謂也所謂五性即真之謂也然則仁義禮智信云者乃所謂未發之藴而性之真也歟如此則文義備矣答敬父書所謂復艮二卦亦本程子之意而釋之疑思慮未萌者是坤卦事不應以復當之豫謂此乃易傳所謂無間可容髮一作息處夫思慮未萌者固坤也而曰知覺不昧則復矣此雖未為有失而詞意有未具擇之之疑雖過然其察之亦密矣又所謂周子主靜之説則中正仁義之動靜有未當其位者當云以中對正則正為本以仁配義則義為質乃無病爾此藁中間亦屢有改定處今不能復易因題其後以正其失云壬辰仲秋日書尹和靜言行録序程夫子有言涵飬必以敬進學則在致知二言者夫子所以教人造道入德之大端而不可以偏廢焉者也若和靜尹公先生者其學於夫子而有得於敬之云乎何其説之約而居之安也其門人馮氏祁氏吕氏記其緒言各為一書熹嘗得而伏讀之所以收放心而伐邪氣者幾微之際所助深矣顧其記録之間尚多抵牾至於人名事迹亦或不同然則其於精微之意豈得無可疑者惜乎其不得親見先生而靣質之也書之篇首以告同志其亦熟玩而審取之哉乾道癸巳孟夏𥘉吉新安朱熹序送李伯諌序國家建立學校之官遍於郡國蓋所以幸教天下之士使之知所以修身齊家治國平天下之道而待朝廷之用也此其德意可謂厚矣然學不素明法不素備選用乎上者以科目詞藝為足以得人受任乎下者以規繩課試為足以盡職蓋在上者不知所以為人師之德而在下者不知所以為人師之道是以學校之官雖遍天下而遊其間者不過以追時好取世資為事至於所謂修身齊家治國平天下之道則寂乎其未有聞也是豈國家所為立學教人之本意哉吾友李君伯諌敦潔好修篤志問學其於古之大學所以修巳治人之道講之熟矣今也受命於朝而將掌教於蘄之學吾知其所以為盡職者其必有異於世俗之為矣然伯諌方且欿然自以不足乎人師之德為憂而辱顧於豫以為問惟豫言之淺陋固巳無足陳者抑自其與伯諌遊而講於斯也亦三年矣凡持守之要玩索之端巨細精粗蓋巳無所不論今使之言其又何以加此然有一焉主敬致知摧驕破吝謹之於細微雜亂之域而養之於虛間靜一之中是則雖屢言之而豈患乎其瀆哉感伯諌下問之勤不能默默因敘前説而并書之祖行之朝奉以為别伯諌行乎哉今而後聞蘄之士其有慨然興起於學而明乎所以修身齊家治國平天下之道者是則伯諌之德之修之驗也夫程氏外書後序右程氏外書十二篇熹所序次可繕寫始熹序次程氏遺書二十五篇皆諸門人當時記録之全書足以正俗本紛更之繆而於二先生之語則不能無所遺也於是取諸集録參伍相除得此十有二篇以為外書夫先生之言非有精粗之異而兩書皆非一手所記其淺深工拙又未可以一槩論其曰外書云者特以取之之雜或不能審其所自來其視前書學者尤當精擇而審取之耳乾道癸巳六月乙亥新安朱熹謹書中庸集解序中庸之書子思子之所作也昔者曽子學於孔子而得其傳矣孔子之孫子思又學於曽子而得其所傳於孔子者焉既而懼夫傳之久逺而或失其真也於是推本所傳之意質以所聞之言更相反覆作為此書孟子之徒實受其説孟子沒而不得其傳焉漢之諸儒雖或擎誦然既雜乎傳記之間而莫之貴又莫有能明其所傳之意者至唐李翶始知尊信其書為之論説然其所謂滅情以復性者又雜乎佛老而言之則亦異於曽子子思孟子之所傳矣至于本朝濂溪周夫子始得其所傳之要以著于篇河南二程夫子又得其遺旨而發揮之然後其學布于天下然明道不及為書今世所傳陳忠肅公之所序者乃藍田吕氏所著之别本也伊川雖嘗自言中庸今巳成書然亦不傳於學者或以問於和靖尹公則曰先生自以不滿其意而火之矣二夫子於此既皆無書故今所傳特出於門人記平居問答之辭而門人之説行於世者唯吕氏遊氏楊氏侯氏為有成書若橫渠先生若謝氏尹氏則亦或記其語之及此者耳又皆别自為編或頗雜出他記蓋學者欲觀其聚而不可得固不能有以考其異而會其同也熹之友會稽石君􅗐子重乃始集而次之合為一書以便觀覽名曰中庸集解復第其録如右而屬熹序之熹惟聖門傳授之微旨見于此篇者諸先生言之詳矣熹之淺陋蓋有行思坐誦沒世窮年而不得其所以言者尚何敢措一辭於其間然嘗竊謂秦漢以來聖學不傳儒者惟知章句訓詁之為事而不知復求聖人之意以明夫性命道德之歸至于近世先知先覺之士始發明之則學者既有以知夫前日之為陋矣然或乃徒誦其言以為髙而又𥘉不知深求其意甚者遂至於脫略章句陵籍訓詁坐談空妙展轉相迷而其為患反有甚於前日之為陋者嗚呼是豈古昔聖賢相傳之本意與夫近世先生君子之所以望於後人者哉熹誠不敏私竊懼焉故因子重之書特以此言題其篇首以告夫同志之讀此書者使之毋跋於髙毋駭於竒必沉潛乎句讀文義之間以會其歸必戒懼乎不睹不聞之中以踐其實庶乎優柔厭飫真積力久而於慱厚髙明悠久之域忽不自知其至焉則為有以真得其傳而無徒誦坐談之弊矣抑子重之為此書采掇無遺條理不紊分章雖因衆説然去取之間不失其當其謹密詳審蓋有得乎行逺自邇升髙自卑之意唯哀公問政以下六章據家語本一時問答之言今從諸家不能復合然不害於其脈理之貫通也又以簡帙重大分為兩卷亦無他義例云乾道癸巳九月辛亥新安朱熹謹書王梅溪文集序代劉共父作知人之難堯舜以為病而孔子亦有聽言觀行之戒然以豫觀之此特為小人設耳若皆君子則何難知之有哉蓋天地之間有自然之理凡陽必剛剛必明明則易知凡隂必柔柔必暗暗則難測故聖人作易遂以陽為君子隂為小人其所以通幽明之故類萬物之情者雖百世不能易也豫嘗竊推易説以觀天下之人凡其光明正大踈暢洞逹如青天白日如髙山大川如雷霆之為威而雨露之為澤如龍虎之為猛而麟鳯之為祥磊磊落落無纎芥可疑者必君子也而其依阿淟涊回互隱伏紏結如蛇蚓瑣細如蟣蝨如鬼蜮狐蠱如盜賊詛祝閃倐狡獪不可方物者必小人也君子小人之極既定於內則其形於外者雖言談舉止之微無不發見而况於事業文章之際尤所謂粲然者彼小人者雖曰難知而亦豈得而逃哉於是又嘗求之古人以驗其説則於漢得丞相諸葛忠武侯於唐得工部杜先生尚書顔文忠公侍郎韓文公於本朝得故參知政事范文正公此五君子其所遭不同所立亦異然求其心則皆所謂光明正大踈暢洞逹磊磊落落而不可掩者也其見於功業文章下至字畫之微蓋可以望之而得其為人求之今人則如太子詹事王公龜齡其亦庶幾乎此者矣公始以諸生對䇿庭中一日數萬言𬒳遇太上皇帝親擢以冠多士遂取其言施行之及佐諸侯入册府事今上皇帝於𥘉潛又皆以忠言直節有所禆輔上亦雅敬信之登極之𥘉即召以為侍御史納用其説公知上意以必復土疆必雪讎耻為巳任其所言者莫非修德行政任賢討軍之實而於分别邪正之際尤致意焉尋以邊兵失律廷議不咸上疏自劾除吏部侍郎不拜去為數郡布上恩恤民隱蚤夜孜孜如飢渴嗜欲之切於巳去之日民思之如父母其處閨門居鄊黨則又親親敬故隆信義務敦朴雖家人孺子亦皆藹然有忠厚廉遜之風平居無所嗜好顧喜為詩渾厚質直懇惻條暢如其為人不為浮靡之文論事取極巳意然其規模宏闊骨骼開張出入變化俊偉神速世之盡力於文字者往往反不能及其他片言半簡雖或出於脫口肆筆之餘亦無不以仁義忠孝為歸而皆出於肺腑之誠然非有所勉強慕效而為之也蓋其所稟於天者純乎陽德剛明之氣是以其心光明正大踈暢洞逹無有隱蔽而見於事業文章者一皆如此海內有志之士聞其名誦其言觀其行而得其心無不斂袵心服至於小人雖以一時趨向之殊或敢巧為謗詆然其極口不過以為迂闊近名不切時務至其大節之偉然者則不能有以毫髮點汙也然則公於五君子者迹雖未必皆同而心實似之故自其布衣時嘗和韓詩數十百篇守番及夔則又適在葛杜顔范之遺墟皆嘗新其祠宇以致歆慕之意蓋亦每自比焉嗚呼公之必為君子蓋不待孔孟堯舜而知之矣豫昔官中祕直西省皆得與公為寮辱公知顧甚厚及來守建康則公殁幾十年而其子聞詩適官府下相與道舊感慨歔欷一日出公遺文三十二卷屬余序之豫蓋三復焉而拊卷太息也公之行事今某官莫侯子齊既狀之而故端明殿學士汪公聖錫取以志其墓矣故余因不復著獨論其心如此列於篇端以告天下之士使有以識其所謂光明正大踈暢洞逹者言言凛凛𥘉未嘗隨死而亡也以是勝私起懦而相與師慕其萬一在朝廷則以犯顔納諌為忠仕州縣則以勤事愛民為職內外交修不遺餘力使君德日躋于上民生日遂于下國步安強隱然真有恢復之勢則公雖云亡而其精爽之可畏者為無憾於九原矣嗚呼其亦可悲也夫聞詩亦好學有立能守其家云晦庵先生朱文公文集卷第七十五懷安縣儒學訓導葉暢校
