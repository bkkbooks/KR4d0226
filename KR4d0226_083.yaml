body:
  text: 跋跋朱奉使奏狀右叔祖奉使直閣分還自虜中乞表朱昭等死節事狀也叔祖字少章少從景迂朝公先生學建炎𥘉以諸生應募奉使虜廷守節不屈𬒳留雲中積十六年紹興癸亥和約定乃得歸召對便殿公言虜情詭詐和不可恃宜有以待之又言虜勢雖強而無道義以固其國衰亂有萌幾不可失願益修德振兵以俟其變秦丞相巳不樂及上此奏檜益怒遂寢其事不報而公亦旋卒昭等忠義之節遂不復有言者熹每讀其書未嘗不為之歔欷流涕也今觀歷陽龔君所纂中興忠義録至纎悉矣然亦無昭等名乃録此狀以寄和州史君敷文張公請刻而附於其後庶幾此數人者得託以不朽又記頃見會稽有衛士唐某祠問其故曰虜陷會稽車駕倉猝東幸而某以病不及從帥守李鄴亟以城降一日虜酋與鄴並轡行城中某憤怒甚則懷磚石從道旁狙擊之不中因𬒳執將殺之罵不絶口而終越人義而祠之事聞詔賜廟額曰故給事中吳公芾嘗刻石以記其事今此録亦不見恐可并求其記而附刻之也紹熙辛亥十月辛巳新安朱熹書跋趙直閣忠節録直閣趙公忠義之節為詔所褒著在信史不可泯沒而考其平生所立始終巨細未嘗一念不在國家又足以見見危致命之誠非出於一時事勢之偶然也其孫彥橚力學有志又將有以大其門者間以書來視豫此録病中讀之蹶然起坐為之三嘆不能自巳因書其後以見區區慕仰之私云紹熙三年春二月壬辰新安朱熹書跋趙朝奉行實詩曰秉心塞淵騋牝三千此見人之所以成其富強之業者非必權譎計數之為務而在於誠實深厚之中也今觀此編則趙侯之行詩人之言豈不兩相發哉侯之子孫既能修文學以致爵位又能得當代名勝之文字以顯其親而垂無窮是亦可謂賢矣豫是以識之紹熙壬子春二月壬寅朱熹書跋王荆公進鄴侯遺事奏藁臣前日伏奉聖旨令進鄴侯遺事今繕寫巳具竊以宇文黑獺之中材遇傾側擾攘之時而輔之以區區之蘇綽乃能制法如此陛下天縱上智卓然之材有百年無事之中國欲追堯舜三代其勢不難豈宜每事尚或依違牽制流俗不能一有所立以為天下長計而令任䇿之臣更以蘇綽為愧也蓋創業垂統其施有漸伏惟成算巳在聖心臣雖甚愚誠願自竭庶慿末光不以投老餘年為竊位之臣而巳所有鄴侯遺事謹隨此上進取進止集本宇文黑獺之中材下云遇傾側窮困之時而輔以區區之蘇綽然其為法尚有可取伏惟陛下天縱上智卓然之材全有百年無事萬里之中國欲創業垂統追堯舜三代在明道制衆運之而巳如李泌所稱豈足道哉顧求多聞以考古今得失之數則此書亦或可備省覽熙寧奏對日録云熙寧二年閏十一月十九日上日侯叔獻有言義勇上畨文字必是見制置司商量來余曰此事似可為恐須待年歲間議之晹叔曰今募兵未消又養上畨義勇則調度尤不易余因為上言募兵之害終不可經久僉以為如此余曰今養兵雖多及用則患少以民與兵為兩故也又五代禍亂之虞終未能去以此等皆本無賴姦猾之人故也上因問府兵之制曰何處言府兵最備余曰李鄴侯傳言之詳備上日府兵與租庸調法相須否余日今上畨供役則以衣糧給之則無貧富皆可以入衛出戍雖未有租庸調法亦可為也但義勇不須刺手背刺手背何輔於制御之實今既以良民為之當以禮義奬養刺手背但使其不樂而實無輔也又擇其鄊閭豪傑為之將校量加奬拔則人自恱服今募兵為宿衛乃有積官至刺史防團者移此與彼固無不可况不至如此費官祿巳足使人樂為之陛下審擇近臣使皆有政事之材則他時可令分將此等軍今募兵出於無賴之人尚可為軍廂主則近臣以上豈不可及此輩此乃先王成法社稷之大計也上良以為然先君子少喜學荆公書每訪其迹晚得此藁以校集本小有不同意此為未定也熹常恨不曉寫進李鄴侯傳於宇文泰蘇綽事何所預而獨愛其𥿄尾三行語氣凌厲筆勢低昻尚有以見其跨越古今幹旋宇宙之意疑此非小故也後讀熙寧奏對日録乃得其説如此甚矣神宗之有志而公之得君也然其後募兵之費竟不能揖而保甲之擾遍天下則所謂定計數於前必事功於後者果何如哉因抄日録家傳本語以附于後覽者有考焉紹熙壬子春二月十九日新安朱熹跋方季申所校韓文余自少喜讀韓文常病世無善本每欲精校一通以廣流布而未暇也今觀方季申此本讎正精密辨訂詳慱其用力勤矣但舉正之篇所立四例頗有自相矛盾者又不盡著諸本同異為未盡善蓋此等書前人為之巳有成例若大書本文於上而用顔監漢書法悉注衆本之同異於其下因考其是非以見定從今本之意則讀者有以曉然知衆本之得失而益信吾書之取舍不誣矣萬一考訂或有未盡取舍不無小差亦得尚存他本别字不遂泯沒以待後之君子尤久遠之慮也又季申所謂謝本則紹興甲戍乙亥之間豫官溫陵謝公弟如晦之子景英為舶司屬官嘗於其几間見之蓋用天台印本剪裂粘綴依陳後山本别為次序而卷首欵以建炎奉使之印因讀其送陳秀才序一篇則何不信之有句內輒用丹筆圍去不字𥘉甚駭之再加尋繹乃知必去此字然後一篇首尾始復貫通蓋傳襲之誤久矣讀者雖亦微覺其硋而未暇深究也常竊識之以驗他本皆不其然此本雖精亦復不見豈季申讀時便文縱口尚不免小有遺脫將所見者非其真本先傳校者巳失此字也耶紹熙壬子孟夏病中偶記其後跋趙中丞行實元祐中丞趙公之元孫舉示豫此書一篇趙公之孝謹醇篤雖古人猶難之三復其書令人起敬不勝霜露風木之悲也嘗竊妄謂趙氏家法甚似漢萬石君而其講學制事移孝為忠之美則石氏不及逺矣因輒私記其語於其後尚恨所謂奏議二十九篇未得盡見而行實之記無始終屨歷歲月次第故於其他有不得而論也紹熙壬子秋九月八日新安朱熹題跋徐來叔歸師堂詩同安徐君來叔取孟子語曹交之言名其堂曰歸師某官戴君尹成既記之矣來叔復以示豫曰願得一言以發明之豫謂孟子之言正為不知反求諸身而專務求師於外者設耳夫道雖若大路然非上智生知之質亦豈能不藉師友而獨得之哉要當有以發其端倪然後有餘師者可得而求耳來叔其以豫言思之庶乎其不虛為此名也紹熙壬子十月會慶節日新安朱熹書跋尹和靜帖河南尹君來自臨川出示其大父和靜先生遺像及手書歐陽文忠公所作三志仰瞻伏讀不勝敬歎既模其像以藏于家尹君又俾記於志文之後熹惟尹氏世德之盛既得歐陽公之文以發揮之而和靜手書唯謹是亦足以傳世矣孤愚晚學何敢僣易輒贊一辭顧其請不巳乃别書幅𥿄以附卷尾云紹熙壬子十月二十五日新安朱熹記跋唐人暮雨牧牛圖豫老於農圃日親犂耙故雖不識畫而知此畫之為真牛也彼其前者却顧而徐行後者驤首而騰赴目光炯然真若相語以雨而相速以歸者覽者未必知也良工獨苦渠不信然延平余無競出示此卷卷中有劉忠定鄒忠公題字覽之并足使人起敬而龍山老人又先君所選士而余所嘗趨走焉者也俯仰存沒為之慨然因識其後而歸之紹熙壬子中冬壬辰新安朱熹跋楊深父家藏東坡帖楊深父頃嘗示豫以東坡公與其先世往來手書二𥿄豫巳識其後矣今又得盡覽其餘益知二公相與之歡始終不替而又足以見人心公論所在之不可以刑禍屈也因復識之以申前説使世之簡賢附勢者知所愧云紹熙壬子中冬壬辰新安朱熹書跋蔡神與絶筆友生蔡君季通一日奉書一卷以示熹而泣拜且言曰此先人絶筆之書也先人自幼警悟七歲即能為詩既長慱學強記髙簡廓落不能與世俗相俯仰因去逰四方聞見益廣遂於易象天文地理三式之説無所不通而皆能訂其得失中年乃歸買田築室於武夷之陽其間屢遭盜賊水火之變而浩然不以屑意杜門掃軌專以讀書教子為事元定生十年即教使讀西銘梢長則又示以程氏語録邵氏經世張氏正蒙等書而語之曰此孔孟之正脈也爾其勉􅏧晚歲屬疾手書此𥿄以付元定其他丁寧之語亦無不出於忠厚誠實而尤以沒溺於利欲為殺身之戒元定涕泣拜受于今四十年既不能拳拳服􅈾以無失墜而又不能有以表著而顯揚之誠竊懼其泯沒而無傳焉惟吾子幸哀而豫之一言則不朽之惠豈惟子孫賴之語訖又泣以拜熹亦拜受其書而伏讀之為之喟然太息曰死生之際人之所不容偽而誠之積者未有不顯于後者也蔡公平生所以教其子者不干利祿而開之以聖賢之學則其志識之髙逺固巳非世人所及矣及其委衾屬纊之餘而其所託猶不異於平日且其字畫壯偉意氣間暇又能無怛於始終之變如此是豈可以勉強而偽為哉夫如是是以生雖不遇而季通乃能承厥志於今日學行之餘尤邃律曆討論定著遂成一家之言使千古之誤曠然一新而遡其源流皆有明法是亦足以顯其親於無窮尚奚以豫言為哉顧其請之勤有不可虛者是以備論而竊識於其後蔡氏之先仕唐末為建陽令始家於麻沙世十傳而至公諱發字神與娶同縣詹氏而生季通以紹興壬申歲六月卒卒時年六十有四云紹熙壬子歲冬十有二月戊申大寒日新安朱熹謹書跋劉叔通詩卷壬子冬叔通之詩不為雕刻纂組之工而其平易從容不費力處乃有餘味頃豫所見佳句多矣而或不見於此卷豈豫所謂大好者乃叔通所謂大不得意者耶寒夜擁爐風雪大摯吟諷之餘戲書其後雲谷晦菴老人跋吕伯恭書説豫往年送伯恭父於鵝湖知其有此書而未及見也因問其間得無亦有闕文疑義者乎而伯恭父曰無有豫心固竊怪之後數年再會於衢州伯恭父始謂豫曰書之文誠有不可解者甚悔前日之不能闕所疑也豫乃歎伯恭父之學巳精而其進猶未巳然其後竟未及有所刋訂而遽不起疾則其微詞奧義無所更索而此書不可廢矣今伯恭父之內弟曽侯致虛鋟木南康而屬豫記其後豫惟伯恭父所以告豫者雖其徒或未必知因具論其本末如此使讀者知求伯恭父晚所欲闕者而闕之則庶幾乎得其所以書矣紹熙壬豫歲除日新安朱熹書跋魏侍郎集建炎紹興之間強虜慿陵兩宫隔絶天子不勝晨夕溫凊之念思得忠智敏辨之士往來兵間以通和好而見大夫偷媠畏縮無肯行者獨故侍郎建安魏公與熹之族祖袐閣公以諸生自薦慷慨請行擁蓋張旜略相先後卒冒白刃致命虜廷侍郎公尋以不受偽官握節以死而族祖亦以必死自誓偶得全璧而歸雖其所值有生死之不同然其捐軀狗國之本志素定於胸中者則未始不同也魏公之孫瑛見示此編俾書其後熹惟二公忠義大節固巳載在史册傳之萬世特兩家絶域風霜之舊不可使後之人無聞焉謹齋祓而竊識之紹熙癸丑七月𥘉吉具位朱熹謹書書橫渠康節帖後右橫渠先生帖康節先生詩楊文靖陳忠肅二公跋語故皆藏楊氏而屏山劉氏得之熹因借本摹刻以傳學者其曰餘杭東齋者楊氏記也紹熙癸丑八月丙午朱熹書先吏部手澤後內弟祝康國出示先君子與外大父書熹之不肖於是始生故書中及之今六十有四年矣捧玩手澤涕血交零敬書其後而歸之紹熙癸丑十二月七日孤朝散郎祕閣修撰主管南京鴻慶宫熹謹書跋余巖起集熹少時猶頗及見前輩而聞其餘論覩其立心處巳則以剛介質直為賢當官立事則以強毅果斷為得至其為文則又務為明白磊落指切事情而無含胡臠卷睢盱側媚之熊使讀之者不過一再即曉然知其為論某事出某䇿而彼此無疑也近年以來風俗一變上自朝廷搢紳下及閭巷韋布相與傳習一種議論制行立言專以醖藉襲藏圎熟軟美為尚使與之居者窮年而莫測其中之所懷聽其言者終日而不知其意之所鄊回視四五十年之前風聲氣俗蓋不啻寒暑晝夜之相反是熟使之然哉觀於龍山余公之文者亦可以慨然而有感矣余公諱良弼字巖起自為諸生即以文鳴於場屋以鄊舉類試外臺熹之先君子與故直祕閣吳公公路得其文而異之以為真有可用之實取而置之前列旋入幕府即以畫䇿平賊有功出入中外遂分帥閫皆有聲烈平生為文甚多亡逸之餘所存止此然皆無實應用之作不為空言沒後二十八年其季子大用尉建陽出以相視熹以先世之契又嘗獲以少吏事公於溫陵辱獎進而收教焉衰莫零落乃復得斯文而讀之其所感於今昔之變又當如何也哉孔豫曰吾猶及史之闕文也有馬者借人乘之今亡巳夫熹於余公之文亦云因太息而書其後大用廉介不苟遇事敢前蓋有公之風烈云紹熙癸丑十二月庚申朝散郎祕閣修撰主管南京鴻慶宫朱熹書書偽詔後熹聞之長老建炎南渡之𥘉車駕巳幸錢塘而留張忠獻公於平江以為後鎮時故兵部侍郎湯公實為守將一日聞有赦令當至心獨疑之亟走以白張公公曰姑遣吏屬知書解事者馳往發視有故則緩驛騎之行而先取以歸則事可議矣湯公然之則遣州學教授某官往視而歸乃明受偽詔也則又以告曰是則其可宣乎張公曰不然事巳至此胡可匿且卒徒觖於望賜吾屬先受禍矣又何忠之能輸哉湯公曰然則宜奈何張公曰今便發庫錢以示行賞之意乃屏偽赦而隂取故府所藏登極赦書置輿中迎登譙門讀而張之即捐其階禁無敢輒登者而散給金帛如常時郊賚故事則可矣湯公行之於是人情略定乃決大計熹常恨世徒知張公復辟之功為大而於湯公相與謀議曲折所助之深則少有能言之者今讀其家傳又得其焚偽詔事而以前所聞者參之亦足以見公之處此素定不可誣矣兹事尤偉而行狀墓志及其他記録皆略不書何哉柳宗元言司馬遷記荆軻徴夏無且記留侯徴畫工今太史氏方將纂輯髙宗中興盛烈以垂萬世得無亦有取於斯乎紹熙甲寅正月癸亥朔旦朝散郎祕閣修撰主管南京鴻慶宫朱熹謹書題趙清獻事實後國家自熙豐元祐以來人才政事分為兩塗是此者非彼鄊左者背右既不可得而同矣而於其同之中又有異焉則若元祐之朔黨洛黨川黨而熙豐之曽文肅趙清獻張丞相又與章蔡自不同也熹少時從趙公之孫惠州使君遊得觀趙公手記所與蔡京異論本末蓋嘗三復而歎公之不幸今復從惠州之子某得此書而讀之則又深惟其故而重歎國家之大不幸也夫以趙公之自言下不欲結怨於百姓則必不肯肆行煩苛爭奪之橫政中不欲得罪於士大夫則必不肯唱為禁錮忠賢之邪説外不欲失信於夷狄則必不肯妄起開拓燕薊之狂謀而考其平生質厚清約有過人者則又知其必不肯為蔡京之淫侈導諛以蠱上心而納之於有過之地也是則雖曰同出於熙豐而其邪正得失之間豈可同年而語哉且春秋明王法而不廢五伯之功元城劉忠定公傷政宣之亂而曰莫若且宗神考然則後之君子之於此書豈不猶有取焉嗚呼其亦可悲也哉其亦可悲也哉紹熙甲寅元日癸亥鴻慶外史朱熹書跋吕舍人與薛元亮帖薛公安貧守賤之節吕公好賢尚德之心覽此卷者可以得師矣紹熙甲寅孟夏既望新安朱熹書跋薛畏翁詩諸生或問敬當何訓余告之曰是不得而訓也惟畏庶幾近之今觀薛公之自名與所以訓其孫者知鄙之言不繆也紹熙甲寅孟夏既望新安朱熹仲晦父觀于臨川城南之客舍因書其後云跋曽裘父劉子澄帖紹熙甲寅𥘉夏豫以赴官長沙道過臨川汪君見過出此卷見示乃曽裘父劉子澄筆迹也既仰青溪先生之髙行又感二君所立皆凛凛乎其有前輩之遺風而今皆不可見矣為之掩卷太息汪君得名家之傳有良友之助所學必有以過人者恨以王事馳驅不及細扣之也朱熹仲晦父書跋吕舍人青溪類藁紹興紫微吕公名德之重一言一動皆有法戒固非後學可得而贊也其論汪謝諸賢髙志清節皆足以傳信後世孰敢改評獨饒節者一旦毁削膚髮殄絶天倫而諸公環視無一人能止而救之者或乃從更嗟嘆以是為不可及亦獨何哉因觀此卷竊有感焉輒太息而志其後紹熙甲寅夏四月既望朱熹仲晦父書跋曽裘父贈屈待舉詩昔李起居成季見其姪大參漢老之文曰汝於文吾不能有所與但勿求人知耳余嘗愛其言每為士友誦之今來江西見其士友多妙於語言而往往不能無求人知之意豈於李公之誨未之講耶將既曰為文則勢必不能無待於外也屈君以詩見知於艇齋矣而猶不能不借重於衆口辱以謂豫因為書此云新安朱熹仲晦父跋曽仲恭文前輩文字規模宏濶論議雄偉不為脂韋嫵媚之熊其風氣習俗蓋如此故宣和之後建紹繼起危亂雖極而士氣不衰觀曽公之文亦可以見其倣佛矣近歲以來能言之士例以容冶調笑為工無復丈夫之氣識者蓋深憂之而不能有以正也因讀此編輒私記於其後云跋鄭宣撫帖賢士大夫不容於邪枉以放於竄逐流離之禍雖其平生至親篤友亦或背而去之甚者安視其狼狽因辱而莫之恤也當此之時乃有常日未嘗一通聲問之人獨能奮然不顧一時權臣之威虐﨑嶇反側以致其擁護扶持之力而不少懈彼豈故為詭激之行以驚世取名哉特以秉彛好德之良心憤世疾邪之壯志獨有得於天分之多而又能不為私情邪念之所回奪是以於此自有不能巳耳嘗記頃年侍坐於端殿尚書汪公見其於當世之士有能此者每極稱歎以為難能𥘉蓋未能不以為疑逮此晚歲更事既多然後知其言之有味而識其有輔於世教之深也偶觀南豐魯衡父所藏宣撫鄭公與其先君教授公手帖竊獨重有感焉因書其後而歸之以為世之君子宜有讀之而泚其顙者云跋曽南豐帖熹未冠而讀南豐先生之文愛其詞嚴而理正居常誦習以為人之為言必當如此乃為非苟作者而於王子發舍人所謂自比劉向不知視韓愈如何者竊有感焉今乃得於先生之族孫濰見其親筆不勝歎息文昭公字頃嘗於長樂僧舍見之至於湘潭文肅之書則亦今始得觀也紹熙甲寅夏四月二十二日新安朱熹書于宜春昌山渡之客舍題吕舍人帖人之大倫有五而朋友居其一然世人鮮克知之獨吕公於此為拳拳焉觀於此帖可以見矣至於其間多以詩文為教則公晚歲蓋深悔之覽者又不可以不知也紹熙甲寅四月二十四日新安朱熹書書夀皇批答魏丞相奉使劄子臣熹以隆興𥘉元召對垂拱妄論講和非䇿適契上指其後乃聞諸公率定盟約竊意一時君臣之計必有甚不得巳者今得仰窺夀皇聖帝詔報丞相夀春公出疆請事於是信其不誣而夀春公志節之偉謀慮之精於此亦可見矣公子熊夢視臣此軸適當奉諱之後奉玩摧裂涕血交頥敢拜手稽首而書其下方跋辨志録伯恭父作此書余所見凡數本此又章貢李和卿所次序者其前後次第雖或不同然其所以使人警懼懲毖而謹於細微以就全德之意則未嘗不同也安成彭君又受而傳布之唯恐不廣此意亦可嘉巳紹熙甲寅七月中伏日新安朱熹書于長沙郡齋跋趙清獻公家問及文富帖跋語後趙清獻公晚知濂溪先生甚深而先生所以告公者亦甚悉見於章貢送行之篇者可考也而公於佛學蓋沒身焉何邪因覽此卷為之歎息云紹熙甲寅七月二十七日新安朱熹謹記元師在魏一方信嚮蓋所謂魏府老華嚴乃一僧耳讀師為帥而遂以為魏公誤矣此題李石跋語後富公帖中語乃逺方懸料未定之詞碑文所記其必有考矣東坡豈右介父而誣公者耶此題何萬跋語後跋三家禮範嗚呼禮廢久矣士大夫幼而未嘗習於身是以長而無以行於家長而無以行於家是以進而無以議於朝廷施於郡縣退而無以教於閭里傳之子孫而莫或知其職之不修也長沙郡慱士邵君囦得吾亡友敬夫所次三家禮範之書而刻之學宫蓋欲吾黨之士相與深考而力行之以厚彛倫而新陋俗其意美矣然程張之言猶頗未具獨司馬氏為成書而讀者見其節文度數之詳有若未易究者往往未見習行而巳有望風退怯之意又或見其堂室之廣給使之多儀物之盛而竊自病其力之不足是以其書雖布而傳者徒為篋笥之藏未有能舉而行之者也殊不知禮書之文雖多而身親試之或不過於頃刻其物雖慱而亦有所謂不若禮不足而敬有餘者今乃以安於驕佚而逆憚其難以小不備之故而反就於大不備豈不誤哉故熹嘗欲因司馬氏之書參考諸家之説裁訂增損舉綱張目以附其後使覽之者得提其要以及其詳而不憚其難行之者雖貧且賤亦得以具其大節略其繁文而不失其本意也顧以病衰不能及巳今感邵君之意輒復書以識焉嗚呼後之君子其尚有以成吾之志也夫紹熙甲寅八月巳丑朔新安朱熹書書邵康節誡子孫真迹後右薌林向氏所藏康節先生誡子孫之文也熹嘗從故友劉子澄得其摹本刻石廬山白鹿精舍今乃獲覩其真格言心畫模範一世伯虎得而葆之所以佑啓厥後者為亡窮矣借觀纍月玩不釋手巳復竊識其後而歸之紹熙甲寅八月日新安朱熹書于豐城傳舍跋謝艮齋與黃生詩黃生事人有始終之義不以生死二其心蓋有士大夫所難者其節固可嘉而詹公之取人至能使之如此謝公與一時諸名勝又從而表章之皆盛德事也紹熙甲寅秋社戊申晦翁覽而歎之為題其後云跋卨侯行實濠倅卨侯之事尚書謝公傳之巳詳而其孫鈞又欲豫記其後豫以為天下之事有其實足矣以為徒實而不文或不得以傳於後也故文以述之至文以述之而又出於一代醇儒碩德之手則其傳亦既逺而足恃矣而又使他人飾虛詞以贊之雖纍千百言亦何所加於其實哉既謝不為而鈞之請不置且以謝公之命命之豫不獲避也乃記其語於臨江道旁之客舍云紹熙甲寅八月十七日新安朱熹書跋曽裘父艇齋師友尺牘此編皆諸前輩所與艇齋曽公往來書疏也其子濰録以成書乃亦置豫言於其間非其倫矣紹熙甲寅經由臨川得而觀之深以愧歎嗚呼艇齋既不幸即世而卷中人亦往往逝去獨陸務觀與豫在耳此又重可悲也八月二十七日熹記書程子禘説後王者禘其祖之所自出以其祖配之而立四廟庶子生亦如之禘其祖之所自出始受姓者也其祖配之以始祖配也文武必以稷配後世必以文王配所出之祖無廟於太祖之廟禘之而巳萬物本乎天人本乎祖故以所出之祖配天也周之后稷生於薑嫄薑嫄巳上更推不去也文武之功起於后稷故配天者須以后稷嚴父莫大於配天宗祀文王於明堂以配上帝帝即天也聚天之神而言之則謂之上帝此武王祀文王推父以配上帝須以父也曰昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝不曰武王者以周之禮樂出於周公制作故以其作禮樂者言之猶言魯之郊禘非禮周公其衰是周公之法壞也若是成王祭上帝則須配以武王配天之祖則不易雖百世惟以后稷配上帝則必以父若宣王祭上帝則亦以厲王雖聖如堯舜不可以為父雖惡如幽厲不害其為所生也故祭法言有虞氏宗堯非也如此則須舜是堯之子苟非其子雖授舜以天下之重不可謂之父也如此則是堯養舜以為養男也禪讓之事蔑然矣以始祖配天須在冬至一陽始生萬物之始祭用圎丘器用陶匏藁秸服用大裘而祭宗祀九月萬物之成父者我之所自生帝者生物之祖故推以為配而祭於明堂也本朝以太祖配於圓丘以禰配於眀堂自介甫此議方正先此祭五帝又祭昊天上帝并配者六位自介甫議惟祭昊天上帝以禰配之太祖而上有僖順翼宣先嘗以僖祧之矣介甫議以為不當祧順以下祧可也何者本朝推僖祖為始巳上不可得而推也或難以僖祖無功業亦當祧以是言之則英雄以得天下自巳力為之並不得與祖德或謂靈乏無根醴泉無源物豈有無本而生者今日天下基本蓋出於此人安得為無功業故朝廷復立僖祖廟為得禮介甫所見終是髙於世俗之儒熹未見此論時諸生亦有發難以為僖祖無功德者熹答之曰誰教他會生得好孫子人皆以為戲談而或笑之今得楊子直所録伊川先生説所謂今天下基本皆出於此人安得為無功業乃與熹言默契至哉言乎天下百年不決之是非於此乎定矣紹熙甲寅閏十月七日臨安寓舍謹書跋魯直書踐祚篇紹熙甲寅閏十月十日餞范文叔於張功父南湖之上功父出此為贈云舊得其真迹藏之近以主上踐祚巳訓釋并上御府矣因省數曰前入侍講筵上語嘗及此也熹謹記跋趙清獻公遺帖趙清獻公清忠之節孝友之行冠映古今非贊歎之所可及今年自長沙趨朝屢得見其遺墨皆家問也此卷藏其族孫遵家尤見慈祥雍睦之意獨恨三亭蕪沒不得追尋晚步遺迹不勝髙山仰止之歎遵溫謹好學能業其家其必有以復之紹熙甲寅中冬八日新安朱熹題於祥符方丈云跋司馬忠潔公帖熹舊見張敬夫議司馬忠潔公諡狀每恨不得其事之本末今過玉山而公之孫為縣尹始獲此帖而觀之敬夫之議可謂信而有徴矣紹熙甲寅中冬十有二日新安朱熹識跋司馬文正公通鑑綱要真迹右司馬文正公手書楚漢間事一卷疑是通鑑目録草藁然又加以總目則今本所無且别有綱要之名不知又是何書也嗚呼公之願忠君父陳古納誨之心可謂切矣竊觀遺迹三復敬歎敢識其後云跋王樞密答司馬忠潔公帖司馬忠潔公仗節虜廷誓死不屈此其報王樞密手書而王公繳進之章也熹竊聞之族祖祕閣公在建炎𥘉實介王公首使不測之虜其後虜人先遣王公歸後往來議講和事而族祖獨留雲中十餘年髙宗皇帝嘉其守節嘗因間使賜以器物甚厚此帖所謝豈亦上賜而使不以君命將之歟不然王公不應持以進也族祖後與洪張二公五人者皆得生還而王馬二公相繼死北方皆全其節吁亦盛矣然觀此帖又足以見一時國步艱難主憂臣辱之意荒涼慘淡如在目中使人太息流涕不能巳巳因詳記其本末云跋司焉文正公薦賢帖熹伏讀此書竊惟文正公薦賢之公心畫之正皆其盛德之支流餘裔固不待贊説而人知其可師矣若乃一時諸賢所以受知於公而獲名薦書者則恐覽者未能深觀而內省發憤而思齊也如龎元英之居喪以禮蓋一事而屢書焉則公之意可見而此書之存其於世教豈小輔哉惜其元豐以後不及登載而彼為黨籍者亦足以輔此書之闕而集其大成矣熹於是又有感焉因竊記於其後以為後之君子必有同此歎者紹熙甲寅中冬庚子朱熹謹記再跋王荆公進鄴侯遺事奏藁熹家所藏荆公進鄴侯家傳奏草臨川石刻摹本丞相益公論之詳矣然所議上畨義勇當時竟不聞有所施行而保甲保馬之法人多不以為便蓋鄴侯所謂得時用勢舍勢用力利害相逺固如此也抑公此𥿄詞氣激烈筆勢低昻高視一時下陋千古而版本文集所載乃更為卑順容恱之意是必自疑其亢厲巳甚而抑損之其慮深矣然論其實似不若此𥿄之云發於邂逅感觸之𥘉尤足以見其胸懷本趣之為快也夫以荆公之得神祖可謂千載之一時矣顧乃低徊若此而猶未免有鬱鬱未盡之懷君臣之際功名之會嗚呼難哉紹熙甲寅臘月辛巳夜讀有感因書以識其後書釋奠申明指揮後歐陽公言古禮今皆廢失州縣幸有社稷釋奠風雨雷師之祭民猶得以識先王之禮而吏多不習至其臨事舉多不中而色不莊使民無所瞻仰見者怠焉熹始讀之每疑其言之過及仕州縣身親見之而後知公之不妄也淳熙巳亥𥘉守南康嘗一言之朝廷為取政和新儀鏤版頒下而其本書自多抵牾復以告焉則莫之省矣紹熙庚戌復自臨漳列上釋奠數事且移書禮官督趣乃得頗為討究則淳熙所鏤之版巳不復存百計索之然後得諸老吏之家又以議論不一越再歲乃能定議條奏得請施行而主其事者適徙他官因格不下及又再歲而熹守長沙則前慱士詹體仁還為少卿始復取往年所𬒳敕命下之本郡然吏文重復繁冗幾不可讀且曰屬有大典禮未遑遍下諸州也既而熹亦召還奏事行有日矣又適病目不能省文書顧念兹事得請之難而今所下書乃如此又度其必不能繼下諸州若不亟疏理而明布宣之是為巳得請於上而復重見格於下也且自我請之自我尼之不可於是力疾躬為鈎校刪剔猥釀定為數條以附州案俾移學官符屬縣且關帥司并下巡內諸州僅畢而行則聞詹卿輔外而奉常果不復下其書他州矣熹到闕亦不能兩月而歸明年長沙郡文學邵囦乃以書來曰以公之拳拳於此也謹巳鋟木而廣其傳矣熹嘉其志因為敘其本末以視後之君子使知夫禮之易廢事之難成類如此不止釋奠一端而巳也慶元元年歲在乙卯正月五日朝請郎朱熹謹書跋李侍郎武夷詩觀妙東楹李公侍郎遺墨語意清婉字畫端徑每至其下輒諷玩不能去然歲久剝裂又適當施供張處後十數年當不復可讀矣别為摹刻授道士使陷置壁間庶幾來者得以想見前輩風度李公諱彌遜時以力詆和議出守臨漳云慶元乙卯正月甲寅朱熹書跋東坡剛説蘇文忠公為孫君介夫作剛説其所以發明孫君之為人者至矣然剛之所以近仁為其不詘於欲而能有以全其本心之德不待見於活人然後可知也寧都主簿鄭載德得遺迹於君家將摹刻而置之學宫間以視豫因為識其左方以告觀者使勉夫剛而益求所以為仁之方云慶元乙卯二月癸未新安朱熹書跋李勉仲詩卷建陽李君從禮一字勉仲豫兒時嘗與同學舍然是時從禮既冠巳有俊聲矣後十餘年乃與豫俱試禮部從禮不偶而歸遂放意詩酒間得疾不起始從禮未死時豫居屏山歲不過一再至建陽與從禮遊不能欵但見其襟懷坦然意象軒豁論説縱橫雜以詼笑傲倪一世若都無意於事者及間見得其詩句乃極清新穩密時出巧思偉麗可喜然亦不多見也晚歲來居考亭往茶坂得江文卿而與之遊文卿從禮子壻也能誦從禮佳句尤多皆前所未聞者且言嘗次其遺稿得若干篇後為親友傳玩而失之獨留此卷乃與其先君子唱酬往來者屬豫書其事因為略識梗槩如此卷中字孝伯者即文卿先君子老而嗜學喜為詩寓詞託諷多憂國閔時語愛從禮之才與為忘年友云慶元乙卯三月晦日新安朱熹書跋郭長陽醫書紹熙甲寅夏豫赴長沙道過新喻謁見故煥章學士謝公昌國於其家公為留飲語及長陽沖晦郭公先生言行甚悉因出醫書曆書數帙曰此先生所著也豫於二家之學皆所未習不能有以測其説之淺深則請以歸將以暇日熟讀而精求之而公私倥偬水陸奔馳終歲不得休復未暇也明年夏大病幾死適會故人子王漢伯紀自金華來訪而親友方士繇伯謨亦自籍溪來同視豫疾數日間乃若粗有生意間及謝公所授長陽醫書二君亟請觀焉乃出以視之則皆警喜曰此竒書也蓋其説雖若一出古經而無所益損然古經之深逺浩慱難尋而此書之分别部居易見也安得廣其流布使世之學為方者家藏而人誦之以知古昔聖賢醫道之源委而不病其難耶豫念蔡忠惠公之守長樂疾巫覡主病蠱毒殺人之姦既禁絶之而又擇民之聰明者教以醫藥使治疾病此仁人之心也今閩帥詹卿元善實輔蔡公之處而政以慈惠為先試以語之儻有意耶亟以扣之而元善報曰敬諾乃屬二君讎正刋輔而書其本末如此以寄之抑豫嘗謂古人之於脈其察之固非一道然今世通行唯寸關尺之法為最要且其説具於難經之首篇則亦非下俚俗説也故郭公此書備載其語而并取丁德用密排三指之法以釋之夫難經則至矣至於德用之法則豫竊意診者之指有肥瘠病者之臂有長短以是相求或未得為定論也蓋嘗細考經之所以分寸尺者皆自關而前郤以距乎魚際尺澤是則所謂關者必有一定之處亦若魚際尺澤之可以外見而先識也然今諸書皆無的然之論唯千金以為寸口之處其骨自髙而關尺皆由是而却取焉則其言之先後位之進退若與經文不合獨俗間所傳脈訣五七言韻語者詞最鄙淺非叔和本書眀甚乃能直指髙骨為關而分其前後以為寸尺隂陽之位似得難經本指然世之髙醫以其贋也遂委棄而羞言之豫非精於道者不能有以正也姑附見其説於此以俟明者而折中焉慶元元年乙卯歲五月丙午鴻慶外史新安朱熹書題嗣子詩卷大兒自幼開爽不類常兒豫常恐其墮於浮靡之習不敢教以詩文既沒後許進之乃出其所與唱和詩卷示豫豫𥘉不知其能道此語也為之揮涕不能巳不忍復觀也為書其後而歸之以識豫哀云慶元乙卯六月既望晦翁書跋邵康節檢束二大字康節先生自言大筆快意而其書迹謹嚴如此豈所謂從心所欲而自不踰矩者耶慶元乙卯七月既望後學朱熹觀趙履常所藏撿束大字敬書跋蒼玉詩卷余頃歲數往來江西飽聞閣皂之勝每以不能一往遊焉為恨今觀蒼玉詩卷則亦不待身到腳歷而小院回廊風篁雪竹巳了了在眼中矣軒中主人讀書彈琴終日遊居寢卧其間而不知歲月之逝其樂詎可量耶况今桂山先生巳往遺墨益可貴重陳君其葆藏之慶元乙卯七月二十八日鴻慶外史朱熹書跋武侯像贊乾道丁亥歲豫遊長沙見張敬夫書室有武侯畫像甚古云是劉丈子駒家藏唐閻立本筆因謂敬夫盍為之贊敬夫欣然口占立就語簡意到聞者歎服以為非深知武侯心事者不能道也王兄齊賢因摹本而屬敬夫手題其上後二十九年齊賢諸子出以視豫俯仰疇昔如昨日事而三君子皆不可見矣為之太息記其下方慶元乙卯秋八月丁丑新安朱熹仲晦父跋魏元履墓表元履之葬熹實銘之而刻石納壙中矣其曰事有繫安危治亂之機者則曽覿召還之命也時覿勢方盛熹竊過憂恐貽異時丘隴之禍故不欲察察言之而敬夫復表其墓亦放此意故常私念使吾亡友盡言之忠不白於後世其咎乃繇於我每竊愧焉其後淳熙改元之三年孝宗皇帝因納鄭鑑之言而思元履前所進説顧語執政龔公茂良等歎其直諒將復召而用之則聞其死矣嗟悼久之即下詔曰朝廷不可無直諒之士掞之雖死其以宣教郎直祕閣告其第蓋是時上雖以舊恩遇覿厚然實未嘗及以政事元履自明皆深詆覿者上皆不怒而亟寵褒之無所間於存沒遠近傳聞感歎興起顧以敬夫尋亦下世遂不及損益舊文次傳兹事而亦至今未及刻也元履從弟誠之比得敬夫手書定本以視其兄之友延平使君黃仲本仲本慨然即為買石而刻焉且屬熹復記贈官事以明孝宗納諌思賢抑制近習之微意深可為後聖法熹亦幸因得追輔志銘之闕庶有以慰元履於地下而自贖其顧望回隱之咎云慶元元年九月庚寅新安朱熹識跋道士陳景元詩碧虛子道士陳景元也頗讀書能詩文一時名勝多與之遊豫嘗見其所注莊子及所書相鶴經書頗醇古可觀計於其輩流中亦當小異然元祐間王仲至嘗薦使校中祕道書范醇夫在瑣闈極論其不可且引王韶章厚開邊時以僧自隨因有經略察訪大師之誚今日豈可復使館閣有編校大師耶今觀此卷見其詩句字畫皆清婉可喜而荆公筆語尤髙勝偶憶范公語聊書卷尾以發觀者之一笑云慶元乙卯九月癸巳朱熹仲晦父書跋李參仲行狀鍾山先生李公參仲之子季扎奉其先君子行狀一通不逺數百里謁豫於建溪之上拜起垂泣而以銘墓為請豫之先世家婺源與公為同縣人而客於建也久矣紹興庚午歲豫年二十餘始得一歸故鄉拜其墳墓宗族姻黨於是乃獲識公而聽其餘論心固巳知其賢然是時年少新學未能有以扣也中年復歸而再見公然後從遊益親而公巳營鍾山所住為將老焉之計矣兩林之間渠清沼深竹樹蒙密時命豫與程弟允夫徜徉其間講論道義談説古今觴詠流行屢移晷刻間乃出其平生所為文詞使豫誦之則皆髙古竒崛而深厚嚴密如其為人豫以是心益敬公而自恨其不能久留以日相與追逐於東阡北陌之間也既别而歸書疏不絶其後數年聞公物故豫以憂患疾病之不寧不能一往哭公而公之諸子不以為罪更以不朽為託至受其狀而讀之則又允夫之文也三復之餘公之聲容恍若相接永念故國人物眇然如公之賢寧可復得顧雖不敏其何敢有愛於言乎乃以病衰心力凋耗把筆欲下而神巳不俱來矣遂無以塞季子之意而姑記其篇末如此以見允夫之狀果無愧辭豫雖有作亦不能有以加也滕珙所記足輔狀闕大抵數十年來鄉人子弟多自好而善於文詞亦其師友淵源之有自也慶元元年十一月癸巳冬至吳郡朱熹書于考亭所居清邃閣跋吕仁甫諸公帖靖康之亂中原塗炭衣冠人物萃於東南吕公廣問仁父來主婺源簿而奉其兄和問節夫以俱又有維揚羅公靖仲共竦叔共亦來客焉於是李氏父子得從之遊而滕户曹愷南夫亦受其學觀於此卷可見一時問學源流之盛矣然惟仁父晚歲官逹其他諸公多沒不顯滕尤以雋才蚤逝鄉人至今嗟惜之而李丈參仲獨以老壽終為後進所髙仰雖亦不得施其所有於當世而諸公者乃反賴之以傳其所著滕君傳簿廳記可考也末有建人魏元履與參仲之弟元質書魏時名挺之後改掞之以特起為官數直諌不得久居中既沒而天子思之詔褒恤焉元質亦有美才好學不幸亦不壽又可見李氏之多賢也慶元乙卯仲冬甲辰朱熹題書李參仲家藏二程先生語録後程氏書𥘉出時人以其難得而珍貴之然未必皆能講究而踐行之也近年以來傳者浸廣而後人知其如絲麻榖粟之不可一日無然真能好之而不舍者則亦鮮矣因觀吕滕李三君子傳授舊編及李丈跋語竊有感焉謹識于後慶元乙卯中冬甲辰朱熹記題嚴居厚與馬莊甫唱和詩軸嚴居厚攝事閩清不滿兩月而與其令尹馬莊甫更唱迭酬遂至盈軸爭新鬪巧時出古談篇篇皆有思致讀之不覺宦情羈思恍然在目諷詠不巳為書其後慶元乙卯臘月望日遁翁跋吳中丞家傳故御史中丞吳公剛直之操著於大觀政和之間事具國史略與此傳相表裏其有不合則傳聞之異詞爾至其論薦遊御史毛諌議胡文定公皆一世名士足以見公之知人其薦胡公而徽宗亟以手札審其名氏又足以見聖主急賢之美意則皆不見於史而獨此書為可考焉是不可以無傳也光祿公與胡公遊有朋友之誼見於胡公所與吕兵書手簡而熹先君子亦雅相敬重嘗贈以詩有問訊袖中醫國手不應長與一笻間之句今讀曾尚書所為銘識又如此嗚呼其亦可謂賢父子矣其族孫芾出此書以見示因書其後以示公之族黨尚思有以繼其遺烈云慶元丙辰正月二十四日家傳又記𬒳旨鞠陳正彚事即陳忠肅公所謂獄詞平允閲實於片言之中者史亦不書蓋闕文也張閣守杭乞兼領花石事亦不見他書當表而出之以著其惡云跋趙忠簡公帖趙公𥘉謫潮州時哭其季子而行既行又喪長子熹家有吕紫微與先君手書言之猶云不知此老力量能堪之否此帖云今年在貶所而渭亡適半歲則是猶在潮未過海也衢守章傑實紹聖故相諸孫雅怨趙公故藉此以發其私忿秦檜知其不專為巳而借力以逞憾也故不直之不惟翁尉事解傑亦遂廢不用蓋不為疑其巳甚也翁又胡侍郎妻兄胡亦草制罪狀章厚者其家持此事訴冤乃得移蘭溪豫與翁亦親舊知之尤詳因記於此以輔跋語之未盡云慶元丙辰二月十三日晦翁題再跋趙忠簡公帖趙公為相時髙宗因覽元符諌官任伯雨章疏論章厚蔡卞嘗乞追廢宣仁聖烈皇后事赫然震怒召直學士院胡寅草詔手書以付三省削奪厚卞官爵禁錮親戚子孫其詞有誰無母慈何忍至此之語天下快之趙公猶以行遣太重奏為申理乞免錮其親戚髙廟手詔褒其仁恕頗為未減今宸翰猶藏趙氏或為刻石以傳於世矣然章氏子孫不知也但見趙公力主元祐因謂此事皆出其意而深怨之世亦鮮知其曲折者因復并記於此云跋張魏公詩羣凶用事人心去大義重新天意回解使中原無左袵斯文千古未塵埃舉大義以清中原此張公平生心事也觀於此詩可見其寢食之不忘然竟不得遂其志可勝嘆哉書張魏公與謝參政帖浚再拜曩以急於祿養未及盡心于學兹緣罷退𥘉欲託庇三衢庶有承教之便比又恭領處分俾居福唐失此依賴殊用慊然差人種種悉荷留意尤所感激浚再拜熹伏讀丞相張忠獻公所與參政上蔡謝公手書是時張公巳建大功登右府矣而其執禮之恭如此且又欿然自以為未始學者而有受教之願焉甚盛德也謝公外孫甄述祖出以見示三復之餘歎仰不足謹録一通藏之巾篋而敬書其後以歸之慶元丙辰二月甲寅具位朱熹謹記又跋此張魏公所與謝參政書也凡三幅前幅稱判府參政文丈鈞座後又一書內一幅云某以未𬒳受告命不果具細階拜書伏幸照察其恭如此跋向伯元遺戒自佛教入中國上自朝廷下逹閭巷治喪禮者一用其法老子之徒厭苦岑寂輒亦效其所為鄙陋不經可怪可笑而習俗靡然恬不覺誤在唐唯姚文獻公在本朝則司馬文正公關洛程張諸君子以及近世張忠獻公始斥不用然亦未能盡障其橫流也近故朝議大夫向公伯元少受學於胡文定公晚年退處于家尊聞行知不以老而少懈及啓手足親書幅𥿄戒其子孫勿為世俗所謂道場者筆札端好詞意謹嚴與平日不少異諸孤士伯等奉承遺指不敢失墜既又謀刻諸石以詒久遠間以視熹熹竊以為此書之行可為世法觀者誠能因而推之盡祛末俗之陋以求先王之禮而審行之則斯言也不但為向氏一門之訓而巳因識其後以發之慶元二年二月辛未新安朱熹謹書書廖德明仁壽廬條約後匹夫單行而遇疾病無有妻孥之養親舊之託與夫室廬枕席之具醫藥食飲之須則其輿曵驅馳暴露飢渴而轉于溝壑也必矣先王之政道路廬舍委積之法至詳至密而不聞其及此豈有司者因失其傳邪國朝受命覆冒區宇涵育黎元百有餘年至於崇寧大觀之間功成治定惠澤洋溢隆盛極矣而上聖之心猶軫一夫之不獲始詔州縣立安濟坊居養院以收恤疾病癃老之人德至渥矣中以多虞不無廢缺近歲以來頗復修舉而莆之為郡縣者猶未暇也今其大夫廖君德明獨有感焉乃即縣南為舍一區榜曰仁壽之廬使凡道路往來疾病之民咸得以託宿而就哺又請於郡得廢寺之産歲入粟若干斛者以供懷安縣儒學訓導葉暢校晦庵先生朱文公文集卷第八十三
