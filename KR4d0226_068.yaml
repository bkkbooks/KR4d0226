body:
  text: 雜著跪坐拜説古人之坐者兩膝著地因反其跖而坐於其上正如今之胡跪者其為肅拜則又拱兩手而下之至地也其為頓首則又以頭頓于手上也其為稽首則又郤其手而以頭著地亦如今之禮拜者皆因跪而益致其恭也故儀禮曰坐取爵曰坐奠爵禮記曰坐而遷之曰一坐再至曰武坐致右軒左老子曰坐進此道之類凡言坐者皆謂跪也若漢文帝與賈生語不覺膝之前於席管寧坐不箕股榻當膝處皆穿皆其明驗老子云雖有拱璧以先駟馬不如坐進此道蓋坐即跪也進猶獻也言以重寶厚禮與人不如跪而告之以此道也今説者乃以為坐禪之意誤矣然記又云授立不跪授坐不立莊子亦云跪坐而進之則跪與坐又似有小異處疑跪有危義故兩膝著地伸腰及股而勢危者為跪兩膝著地以凥著跖而稍安者為坐也又詩云不遑啓居而其傳以啓為跪爾雅以妥為安而疏以為安定之坐夫以啓對居而訓啓為跪則居之為坐可見以妥為安定之坐則跪之為危坐亦可知蓋兩事相似但一危一安為小不同耳至於拜之為禮亦無所考但杜子春説太祝九拜處解竒拜云拜時先屈一膝今之雅拜也夫特以先屈一膝為雅拜則他拜皆當齊屈兩膝如今之禮拜明矣凡此三事書傳皆無明文亦不知其自何時而變而今人有不察也頃年屬錢子言作白鹿禮殿欲據開元禮不為塑像而臨祭設位子言不以為然而必以塑像為問豫既略為考禮如前之云又記少時聞之先人云嘗至鄭州謁列子祠見其塑像席地而坐則亦并以告之以為必不得巳而為塑像則當放此以免於蘇子俯伏匍匐之譏子言又不謂然會豫亦辭江東之節遂不能強然至今以為恨也東坡文集私試䇿問云古者坐於席故籩豆之長短簠簋之髙下適與人均今土木之像既巳巍然於上而列器皿於地使鬼神不享則不可知若其享之則是俯伏匍匐而就地其後乃聞成都府學有漢時禮殿諸像皆席地而跪坐文翁猶是當時琢石所為尤足據信不知蘇公蜀人何以不見而云爾也及楊方子直入蜀帥幕府因使訪焉則果如所聞者且為寫放文翁石象為小上偶以來而塑手不精或者猶意其或為加跌也去年又以屬蜀漕楊王休子美今乃并得先聖先師二像木刻精好視其坐後兩跖隱然見於帷裳之下然後審其所以坐者果為跪而亡疑也惜乎白鹿塑像之時不得此證以曉子言使東南學者未得復見古人之像以革千載之繆為之喟然太息姑記本末寫寄洞學諸生使書而揭之廟門之左以俟來者考焉周禮太祝九􅉔辨疏云此九拜之中四種是正拜五者逐事主名還依四種正拜而為之也又云稽首頓首空首此三者正拜也肅拜婦人之正拜也其餘五者附此四種振動吉拜凶拜褒拜附稽首竒拜附空首又云空首一拜其餘皆再拜肅拜或再故郤至三肅使者一曰稽首江曰拜頭至地也疏曰先以兩手拱至地及頭至手又引頭至地多時也稽首稽留之字也稽首拜中最重臣拜君之拜哀十七年公會齊侯盟於蒙孟武伯相齊侯稽首公則拜齊人怒武伯曰非天子寡君無所稽首襄三年公如晉孟獻子相公稽首知武子曰天子在君辱稽首寡君懼矣郊特牲曰大夫之臣不稽首非尊家臣以避君也是諸侯于天子大夫于諸侯皆當稽首二曰頓首注曰拜頭叩地也疏曰先以兩手拱至地乃頭至手而又引頭即舉也頭叩地謂若以首叩物然此平敵自相拜家臣於大夫及凡自敵者皆當從頓首之拜也記疏曰頭叩地不停留地也又曰諸侯相拜則然三曰空首注曰拜頭至手所謂拜手也疏曰先以兩手拱至地乃頭至手也以其頭不至地故各空首各疑名字之誤君答臣下拜也其有敬事亦稽首洛誥曰拜手稽首是也又曰稽首頓首空首此三者相因而為之空首而引頭頓地即舉故名頓首而引頭至地稽留多時故名稽首此三者之正拜也四曰振動注曰戰栗變動之拜書曰王動色變記疏曰謂有敬懼故為振動疏曰案中候膺云季秋七月甲子赤雀銜丹入鄷王再拜稽首受案今文太誓得火烏之瑞使以周公書報於王王動色變雖不見拜文與文王受赤雀之命為稽首拜也五曰吉撡六曰凶撡注曰吉拜拜而後稽顙謂齊衰不杖以下者言吉者此殷之凶拜周以其拜與頓首相近故謂之吉拜云凶拜稽顙而後拜謂三年服者疏曰拜而後稽顙謂先作頓首後作稽顙稽顙還是頓首但觸地無容則謂之稽顙記曰拜而後稽顙頺乎其順也稽顙而後拜頎乎其至也疏曰拜是為親痛深貌惻隱之至也記又曰晉獻公薨秦穆公使人弔公子重耳勸其反國重耳稽顙而不拜哭而起穆公曰稽顙而不拜則未為後也故不成拜哭而起則愛父也疏曰若為後則當拜謝其恩今不受其勸故不拜謝所以稽顙者自為父喪哀號也凡喪禮先稽顙而後拜乃成直稽顙而不拜故云不成拜也今既聞父死勸其反國之義哀慟而起若欲攀轅然故云則愛父也七曰竒撡八曰褒撡注曰杜子春云竒讀為竒偶之竒鄭大夫云竒拜謂一拜答臣下拜褒拜再拜神與尸杜子春書又曰竒拜先屈一膝今雅拜是疏云後鄭不從此説九曰肅撡注曰肅拜但俯下手今時撎是也介者不拜故曰為事故敢肅使者疏曰肅拜者拜中最輕唯軍中有此肅拜婦人亦以肅拜為正又曰儀禮賔撎入門推手曰揖引手曰撎記疏曰少儀妨人告事雖有君賜肅拜壼説今詳經文不言壼之圍徑而但言其髙之度容之量以為相求互見之功且經言其所容止於斗有五升而注乃以二斗釋之則經之所言者圓壼之實數而注之所言乃借以方體言之而算法所謂虛加之數也蓋壼為圓形斗五升為竒數皆繁曲而難計故算家之術必先借方形虛加整數以定其法然後四分去一以得圓形之實此鄭氏所以舍斗五升之經文而直以二斗為説也然其言知借而不知還知加而不知減乃於下文遂并方體之所虛加以為實數又皆必取全寸不計分釐定為圓壼腹徑九寸而圍二尺七寸則為失之疏家雖知其失而不知其所以失顧乃依違其間訖無定説是以讀者不能無疑今以算法求之凡此定二斗之量者計其積實當為三百二十四寸而以其髙五寸者分之則每髙一寸為廣六十四寸八分此六十四寸者自為正方又取其八分者割裂而加於正方之外則四靣各得二釐五毫之數乃復合此六十四寸八分者五為一方壼則其髙五寸其廣八寸五釐而外方三尺二寸二分中受二斗如注之𥘉説矣然此方形者算術所借以為虛加之數爾若欲得圓壼之實數則當就此方形規而圓之去其四角虛加之數四分之一使六十四寸八分者但為四十八寸六分三百二十四寸者但為二百四十三寸則壼腹之髙雖不減於五寸其廣雖不減於八寸五釐而其外圍則僅為二尺四寸一分五釐其中所受僅為斗有五升如經之云無不諧會矣深衣制度并圗裁用細白布度用指尺中指中節為寸衣二幅不裁其長過脅下屬於裳用布二幅中屈而下垂之如今之直領衫但不裁破掖下每幅之下屬裳三幅裳交解十二幅上屬於衣其長及踝用布六幅每幅裁為二幅一頭廣一頭狹狹頭當廣頭之半以狹頭向上而聮其縫以屬於衣每三幅屬衣一幅圓𬒮用布二幅各中屈之如衣之長屬於衣之左右而縫合其下以為𬒮其本之廣如衣之長而漸圓殺之以至𬒮口則其徑一尺二寸方領兩襟相掩祍在掖下則兩領之會自方曲𥚑用布一幅如裳之長交解裁之疊兩廣頭並令向上布邊不動但稍裁其內旁太半之下令漸如魚腹末如鳥喙內向而緝之相沓綴於裳上之右旁以掩裳際右幅在下左幅在上布邊在外裁處在內衣裳皆緣緣用黑繒具父母以青大父毋以繢領表裏各二寸裳下及邉表裏各一寸半皆就布緣𬒮口表裏亦寸一半布外接出大帶帶用白繒廣四寸夾縫之其長圍要而結於前再繚之為兩耳及垂其餘為紳下與裳齊以繒緣其紳之兩旁及下表裏各半寸如緣之色復以五綵絛廣二分約其相結處長與紳齊緇冠糊𥿄為之武髙寸許前後三寸左右四寸上為五梁辟積左縫廣四寸長八寸跨頂前後著於武外反屈其兩端各半寸內向黑􅃮之武之兩傍半寸之上竅以受笄笄用齒骨凡白物幅巾用黑繒六尺許刺一邊作巾額當中作㡇兩旁三寸許各綴一帶廣一寸許長二尺許循㡇中上反屈之當幅之中斜縫向後去其一角而復反之使巾頂正圓乃以額輒當頭前向後圍裹而繫其帶於緇後餘者垂之黑履白絇繶純綦殿屋廈屋説殿屋五間前皆為堂後為房室中間之前為兩楹間後為室東間之前為東楹之東又少東為阼階上少北為東序後為東房西間之前為西楹之西又少西為賔階上少北為西序後為西房序即墻也設位在東西序者負墻而立也其南為序端東序之東西序之西為夾亦謂之廂又説文云廂廊也廊東西序也此亦可見但疑序下脫一外字其前為東西堂其後為東西夾室夾外之廣為側階房後為北階此其地之盤也其棟則中三間為一棟橫指東西至兩序之上而盡遂自此處分為四棟邪指四隅上接橫棟下與霤齊此其上棟之制所謂四阿也其宇則橫棟前後即為南北兩下橫棟盡外即為東西兩下四棟之旁即各連所向而下四靣榱桷覆堂廉出階外者謂之廡説文云廡堂下周屋也其屋盡水下處謂之霤此其下字之制也厦屋則前五間後四間無西房堂中三間之後只分為兩間東房室西其餘並如殿屋之制但五間皆為橫棟棟之前後皆為兩下之宇橫棟盡外有版下垂謂之摶風摶風之下亦為兩廡接連南北以覆側階但其廡亦不出摶風之外耳儀禮疏云卿大夫為夏屋其室兩下而四周之殿屋四阿連下為廡四靣之簷其水皆多故其簷皆得以霤為名厦屋南北兩下之廡與殿屋同故其簷亦謂之霤東西兩廡則但為腰簷不連棟下又不出摶風之外雖或有水亦不能多故但謂之榮謂之翼而不得以霤名也榮翼乃接簷之名疏乃直指摶風誤矣明堂説論明堂之制者非一熹竊意當有九室如井田之制東之中為青陽太廟東之南為青陽右箇東之北為青陽左箇南之中為明堂太廟南之東即東之南為明堂左箇南之西即西之南為明堂右箇西之中為總章太廟西之南即南之西為總章左箇西之北即北之西為總章右箇北之中為玄堂太廟北之東即東之北為玄堂右箇北之西即西之北為玄堂左箇中是為太廟太室凡四方之太廟異方所其左箇右箇則青陽之右箇乃明堂之左箇明堂之右箇乃總章之左箇也總章之右箇乃玄堂之左箇玄堂之右箇乃青陽之左箇也但隨其時之方位開門耳太廟太室則每季十八日天子居焉古人制事多用井田遺意此恐是也儀禮釋宫宫室之名制不盡見於經其可考者宫必南鄉廟在寢東皆有堂有門其外有大門周禮建國之神位右社稷左宗廟宫南鄉而廟居左則廟在寢東也寢廟之大門一曰外門其北蓋直寢故士喪禮注以寢門為內門中門凡既入外門其向廟也皆曲而東行又曲而北案士冠禮賔立于外門之外主人迎賔入每曲揖至于廟門注曰入外門將東曲揖直廟將北曲又揖是也又按聘禮公迎賔于大門內每門每曲揖及廟門賈氏曰諸侯五廟太祖之廟居中二昭居東二穆居西每廟之前兩旁有隔墻墻皆有閣門諸侯受聘于太祖廟太祖廟以西隔墻有三大門東行至太祖廟凡經三閣門故曰每門也大夫三廟其墻與門亦然故賔問大夫迎賔入亦每門每曲揖乃及廟門其説當考大夫士之門惟外門內門而巳諸侯則三天子則五庠序則惟有一門鄉飲酒射禮主人迎賔于門外入門即三揖至階是也堂之屋南北五架中春之架曰棟次棟之架曰楣鄉射禮記曰序則物當棟堂則物當楣注曰是制五架之屋也正中曰棟次曰楣前曰庪賈氏曰中春為棟棟前一架為楣楣前接簷為􅔑今見於經者惟棟與楣而巳棟一名阿案士昏禮賔升當阿致命注曰阿棟也又曰入堂深示親親賈氏曰凡賔升皆當楣此深入當棟故云入堂深也又按聘禮賔升亦當楣賈氏曰凡堂皆五架則五架之屋通乎上下而其廣狹隆殺則異爾後楣以北為室與房後楣之下以南為堂以北為室與房室與房東西相連為之案少牢饋食禮主人室中獻祝祝拜于席上坐受注曰室中迫狹賈氏曰棟南兩架北亦兩架棟北楣下為室南壁而開戶以兩架之間為室故云迫狹也昏禮賔當阿致命鄭云入堂深明不入室是棟北乃有室也序之制則無室案鄉射禮記曰序則物當棟堂則物當楣注曰序無室可以深也又禮席賔南靣注曰不言于戶牗之間者此射于序賈氏曰無室則無户牗故也釋宫曰無室曰榭榭即序也人君左右房大夫士東房西室而巳聘禮記若君不見使大夫受聘升受負右房而立大射儀薦脯醢由左房是人君之房有左右也公食大夫禮記筵出自東房注曰天子諸侯左右房賈氏曰言左對右言東對西大夫士惟東房西室故直云房而巳然按聘禮賔館于大夫士君使卿還玉干館也賔亦退負右房則大夫亦有右房矣又鄉飲酒禮記薦出自左房少牢饋食禮主婦薦自東房亦有左房東房之稱當考室中西南隅謂之奧邢昺曰室戶不當中而近東西南隅最為深隱故謂之奧而祭祀及尊者常處焉東南隅謂之窔鳥吊反郭氏曰窔亦隱暗西北隅謂之屋漏詩所謂尚不愧于屋漏是也曽子問謂之當室之白孫炎曰當室日光所漏入也鄭謂當室之白西北隅得戶明者經止曰西北隅室南其戶戶東而牗西説文曰戶半門也牗穿壁以木為交窗也月令正義曰古者窟居開其上取明雨因霤之是以後人戶室為中霤開牗者象中霤之取明也牗一名鄉其扇在內案士虞禮祝闔牗戶如食間啓戶啓牗鄉注曰牗先闔後啓扇在內也鄉牗一名是也戶牗之間謂之依郭氏曰窗東戶西也覲禮斧扆亦以設之于此而得扆名士昏禮注曰户西者尊處以尊者及賔客位于此故又曰客位戶東曰房戶之間士冠禮注曰房西室户東也寢廟以室為主故室戶專得戶名凡言戶者皆室戶若房戶則兼言房以别之大夫士房户之間於堂為東西之中按詩正義曰鄉飲酒義云尊于房戶之間賔主共之由無西房故以房與室戶之間為中也又鄉飲酒禮席賔于戶牗間而義曰坐賔于西北則大夫士之戶牗間在西而房內間為正中明矣人君之制經無明證按釋宫曰兩階間謂之鄉郭氏曰人君南鄉當階間則人君之室正中其西為右房而戶牗間設戾處正中矣又按詩斯干曰築室百堵西南其戶箋曰天子之寢左右房異於一房者之室戶也正義曰大戶唯有一東房故室戶偏東與房相近天子諸侯既有右房則室當在其中其戶正中比一房之室戶為西當考房戶之西曰房外士昏禮記母南靣于房外女出于母左士冠禮尊于房戶之間若庶子則冠于房外南靣注曰謂尊東也是房戶之西得房外之名也房之戶於房南壁亦當近東案士昏禮注曰北堂在房中半以北南北直室東隅東西直房戶與隅間隅間者蓋房東西之中兩隅間也房中之東其南為夾洗直房戶而在房東西之中則房戶在房南壁之東偏可見矣房中半以北曰北堂有北階士昏禮記婦洗在北堂直室東隅注曰北堂房中半以北賈氏曰房與室相連為之房無北壁故得北堂之名按特牲饋食禮記尊兩壼於房中西墉下南上內賔立于其北東靣南上宗婦北堂北上內賔在宗婦之北乃云北堂又掃洗在北堂而直室東隅是房中半以北為北堂也婦洗在北堂而士虞禮主婦洗足爵於房中則北堂亦通名房中矣大射儀工人士與梓人升下自北階注曰位在北堂下則北階者北堂之階也堂之上東西有楹楹柱也古之築室者以垣墉為基而屋其上惟堂上有兩楹而巳楹之設蓋於前楣之下按鄉射禮曰射自楹間注曰謂射於庠也又曰序則物當棟堂則物當楣物畫地為物射時所立處也堂謂庠之堂也又曰豫則鉤楹內堂則由楹外當物北靣楫豫即序也鉤楹繞楹也物當棟而升射者必鉤楹內乃北靣就物則棟在楹之內矣物當楣而升射者由楹外北靣就物又鄭氏以為物在楹間則楹在楣之下也又按釋宫曰梁上楹謂之梲梲侏儒柱也梁楣也侏儒柱在梁之上則楹在楣之下又可知矣堂東西之中曰兩楹間公食大夫禮致豆實陳于㨕外簠簋陳於楹內兩楹間言楹內外矣又言兩楹間知凡言兩楹間者不必與楹相當堂東西之中爾南北之中曰中堂聘禮受玉於中堂與東楹之間注曰中堂南北之中也入堂深尊賔事也賈氏曰後楣以南為堂堂凡四架前楣與棟之間為南北堂之中公當楣拜訖更前北侵半架受玉故曰入堂深也案東楹之間侵近東楹非堂東西之中而曰中堂則中堂為南北之中明矣又按士喪禮注曰中以南謂之堂賈氏曰堂上行事非專一所若近戶即言戶東戶西近房則言房外房東近楹即言東楹西楹近序即言東序西序近階即言東階西階其堂半以南無所繼屬者即以堂言之祝浙米于堂是也堂之東西墻謂之序郭氏曰所以序别內外序之外謂之夾室公食大夫禮大夫立于東夾南注曰東於堂賈氏曰序以西為正堂序東有夾室今立于堂下當東夾是東於堂也又按公食禮宰東夾北西靣賈氏曰位在北堂之南與夾室相當特牲饋食禮豆籩鉶在東房注曰東房房中之東當夾北則東夾之北通為房中矣室中之西與右房之制無明文東夾之北為房中則西夾之北蓋通為室中其有兩房者則西夾之北通為右房也歟夾室之前曰箱亦曰東堂西堂覲禮記注曰東箱東夾之前相翔待事之處特牲饋食禮注曰西堂西夾之前近南爾賈氏曰即西箱也釋宫曰室有東西廂曰廟郭氏曰夾室前堂是東廂亦曰東堂西箱亦曰西堂也釋宫又曰無東西廂有室曰寢按書顧命疏寢有東夾西夾士喪禮死于適寢主人降襲絰于序東注曰序東東夾前則正寢亦有夾與箱矣釋宫所謂無東西箱者或者謂廟之寢也歟凡無夾室者則序以外通謂之東堂西堂按鄉射禮主人之弓矢在東序東大射儀君之弓矢適東堂大射之東堂即鄉射之東序東也此東西堂堂各有階案雜記夫人奔喪升自側階注曰側階旁階奔喪曰婦人奔喪升自東階注曰東階東靣階東靣階則東堂之階其西堂有西靣階也東堂下西堂下曰堂東堂西大射儀賔之弓矢止于西堂下其將射也賔降取弓矢于堂西堂四即西堂下也特牲饋食禮主婦視饎㸑于西堂下記曰饎㸑在西壁則自西壁以東皆謂之西堂下矣又按太射儀執冪者升自西階注曰羞膳者從而東由堂東升自北階立于房中則東堂下可以逹北堂也堂角有坫士冠禮注曰坫在堂角賈氏釋士喪禮曰堂隅有坫以土為之或謂堂隅為坫也堂之側邊曰廉堂鄉飲酒禮設席于堂廉注曰側邉曰廉喪大記正義曰堂廉堂基南畔廉稜之上也又按鄉射禮衆弓倚于堂西矢在其上注曰上堂西廉則堂之四周皆有廉也升堂兩階其東階曰阼階士冠禮注曰阼酢也東階所以答酢賔客也每階有東西兩廉聘禮饔鼎設于西階前當內廉此則西階之東廉以其近堂之中故曰內廉也士之階三等按士冠禮降三等受爵辨注曰下至也賈氏曰匠人云天子之堂九尺賈馬以為階九等諸侯堂宜七尺階七等大夫宜五尺階五等士宜三尺故階三等也兩階各在楹之外而近序按鄉射禮升階者升自西階繞楹而東燕禮勝爵者二人升自西階序進東楹之西酌散交于楹北注曰楹北西楹之北則西階在西楹之西矣士冠禮冠于東序之筵而記曰冠于阼喪禮攢置于西序而檀弓曰周人殯于西階之上故知階近序也堂下至門謂之庭三分庭一在此設碑聘禮注曰宫必有碑所以識日景知隂陽也賈氏釋士昏禮曰碑在堂下三分庭一在北按聘禮歸饔餼醯醢夾碑米設于中庭注曰庭實固當中庭言中庭者南北之中也列當醯醢南列米在醯醢南而當庭南北之中則三分庭一在北可見矣聘禮注又曰設碑近如堂深堂深謂從堂廉北至房室之壁三分庭一在北設碑而碑如堂深則庭蓋三堂之深也又按鄉射之侯去堂三十丈大射之侯去堂五十四丈則庭之深可知而其降殺之度從可推矣堂塗謂之陳郭氏曰堂下至門徑也其北屬階其南接門內霤接凡入門之後皆三揖至階昏禮注曰三揖者至內霤將曲揖既曲北靣揖當碑揖賈氏曰至內霤將曲者至門內霤主人將東賔將西賔主相背時也既曲北靣者賔主各至堂塗北行向堂時也至內霤而東西行趨堂塗則堂塗接于霤矣既至堂塗北靣至階而不復有曲則堂塗直階矣又按聘禮饔鼎設于西階前陪鼎當內廉注曰辟堂塗也則堂塗在階廉之內矣鄉飲酒禮注三揖曰將進揖當陳揖當碑揖陳即堂塗也中門屋為門門之中有闑士冠禮曰席于門中闑西閾外注曰闑撅也玉藻正義曰闑門之中央所竪短木也釋宫曰樴在地者謂之臬郭氏曰即門橛也熱則闑者門中所竪短木在地者也其東曰闑東其西曰闑西門限謂之閾釋宫曰秩謂之閾郭氏曰閾門限邢昺曰謂門下橫木為內外之限也其門之兩旁木則謂之棖棖闑之間則謂之中門見禮記闔謂之扉邢昺曰闔門扉也其東扉曰左扉門之廣狹案士昏禮曰納徴儷皮記曰執皮左首隨入注曰隨入為門中厄狹賈氏曰皮皆橫執之門中厄狹故隨入也匠人云廟門容大扄七箇大扄牛鼎之扄長三尺七箇二丈一尺彼天子廟門此士之廟門降殺甚小故云厄狹也推此則自士以上宫室之制雖同而其廣狹則異矣夾門之堂謂之孰釋宫曰門側之堂謂之孰郭氏曰夾門堂也門之內外其東西皆有孰一門而孰四其外孰南鄉按士虞禮陳鼎門外之右匕爼在西孰之西注曰孰有西者是室南鄉又按士冠禮擯者負東孰注曰東孰門內東堂負之北靣則內熟北向也凡門之內兩孰之間謂之寧按聘禮賔問卿大夫迎于外門外及廟門大夫揖入擯者請命賔入三揖並行注曰大夫揖入者省內事也既有俟于寧也凡至門內霤為三揖之始上言揖入下言三揖並行則俟于霤南門內兩孰間可知矣李巡曰寧正門內兩孰間義與鄭同謂之寧者以人君門外有正朝視朝則於此寧立故耳周人門與堂修廣之數不著於經案匠人云夏后氏世室堂修二七廣四修一堂修謂堂南北之深其廣則益以四分修之一也門堂三之二室三之一門堂通謂門與孰其廣與修取數於堂得其三之二室三之一者兩室與門各居一分也以夏后氏之制推之則周人之門殺於堂之數亦可得而知矣門之內外東方曰門東西方曰門西特牲饋食禮注曰凡鄉內以入為左右鄉外以出為左右士冠禮注又曰出以東為左入以東為右以入為左右則門西為左門東為右鄉飲酒禮賔入門左燕禮卿大夫皆入門右是也以出為左右則門東為左門西為右士冠禮主人迎賔出門左西靣士虞禮側享于廟門之右是也闑東曰臬右亦自入者言之也天子諸侯門外之制其見於經者天子有屏諸侯有朝案覲禮侯氏入門右告聽事出自屏南適門西注曰天子外屏釋宫曰屏謂之樹郭氏曰小墻當門中曲禮正義曰天子外屏屏在路門之外諸侯內屏屏在路門之內此侯氏出門而隱於屏則天子外屏明矣釋宫又曰門屏之間謂之寧謂寧在門之內屏之外此屏據諸侯內屏而言也諸侯路寢門外則有正朝大門外則有外朝按聘禮夕幣于寢門外宰入告具于君君朝服出門左南鄉注曰寢門外朝也入告入路門而告賈氏曰此路門外正朝之處也是正朝在寢門外也聘禮又曰賔死介復命柩止于門外若介死惟上介造于朝注曰門外大門外也必以柩造朝逹其中心又賔拜饔餼于朝注曰拜於大門外賈氏曰大門外諸侯之外朝也賔拜於朝無入門之交則諸侯外朝在大門外明矣是外朝在大門外也諸侯三朝其燕朝在寢燕禮是也正朝與外朝之制度不見於經蓋不可得而考矣寢之後有下室士喪禮記士處適寢又曰朔月若薦新則不饋于下室注曰下室如今之內堂正寢聽事賈氏曰下室燕寢也然則士之下室於天子諸侯則為小寢也春秋傳曰子大叔之廟在道南其寢在廟北其寢廟之寢也廟寢在廟之北則下室在適寢之後可知矣又按喪服傳曰有東宫有西宮有南宮有北宮異宮而同財內則曰由命士以上父子皆異宮賈氏釋士昏禮曰異宮者别有寢若不命之士父子雖大院同居其中亦隔别各有門户則下室之外又有異宮也自門以北皆周以墻聘禮釋幣于行注曰喪禮有毁宗躐行出于大門則行神之位在廟門外西方檀弓正義曰毁宗躐行毁廟門西邊墻以出柩也士喪禮為垼于西墻下注曰西墻中庭之西特牲饋食禮主婦視禧㸑于西堂下記曰饎㸑在西壁注曰西壁堂之西墻下案門之西有墻則墻屬於門矣西墻在中庭之西則墻周乎庭矣西壁在西墻下則墻周乎堂矣墻者墉壁之總名室中謂之墉昏禮尊于室中北墉下是也房與夾亦謂之墉冠禮陳服于房中西墉下聘禮西夾六豆設于西墉下是也堂上謂之序室房與夾謂之墉堂下謂之壁謂之墻其實一也隨所在而異其名爾堂下之壁闈門在焉案士喪禮冠者降適東壁見于母注曰適東壁者出闈門也時母在闈門之外婦人入廟由闈門士虞禮賔出主人送主婦亦拜賔注曰女賔也不言出不言送拜之於闈門之內闈門如今東西掖門釋宫曰宫中之門謂之闈郭氏曰謂相通小門也是正門之外又有闈門而在旁壁也人君之堂屋為四注大夫士則南北兩下而巳士冠禮設洗直于東榮注曰榮屋翼也周制自卿大夫以下其室為夏屋燕禮設洗當東霤注曰人君為殿屋也案考工記殿四阿重屋注曰四阿若今之四注屋殷人始為四注屋則夏后氏之屋南北兩下而已周制天子諸侯得為殿屋四注卿大夫以下但為夏屋兩下四注則南北東西皆有霤兩下則唯南北有霤而東西有榮是以燕禮言東霤而大夫士禮則言東榮也霤者説文曰屋水流也徐鍇曰屋簷滴處榮者説文曰屋捛之兩頭起者為榮又曰梠齊謂之簷楚謂之梠郭璞注上林賦曰南榮屋南簷也義與説文同然則簷之東西起者曰榮謂之榮者為屋之榮飾謂之屋翼者言其軒張如翬斯飛耳士喪禮升自前東榮喪大記降自西北榮是屋有四榮也門之屋雖人君亦兩下為之燕禮之門內霤則門屋之北霤也凡屋之簷亦謂之宇案士喪禮為銘置于宇西階上注曰宇梠也説文曰宇屋邊也釋宫曰簷謂之樀郭氏曰屋梠邢昺曰屋簷一名樀一名梠又名宇皆屋之四垂也宇西階上者西階之上上當宇也階之上當宇則堂廉與坫亦當宇矣特牲饋食禮主婦視饎㸑于西堂下注曰南齊于坫其記又注曰南北直屋梠是也階上當宇故階當霤鄉射禮記磬階間縮霤是也霤以東西為從故曰縮霤此霤謂堂之南霤也此其著於經而可考者也禮經雖亡闕然於覲見天子之禮於燕射聘食見諸侯之禮餘則見大夫士之禮宫室之名制不見其有異特其廣狹降殺不可考耳案書顧命成王崩於路寢其陳位也有設斧扆牗間南鄉則戶牅間也西序東嚮東序西嚮則東西序也西夾南嚮則夾室也東房西房則左右房也賔階靣阼階靣則兩階前也左孰之前右孰之前則門內之孰也畢門之內則路寢門也兩階戺則堂廉也東堂西堂則東西廂也東垂西垂則東西堂之宇階上也側階則北階也又云諸侯出廟門俟則與士喪禮殯宫曰廟合也然則鄭氏謂天子廟及路寢如明堂制者蓋未必然明堂位與考工記所記明堂之制度者非出於舊典亦未敢必信也又案書多士傳曰天子之堂廣九雉三分其廣以二為內五分內以一為髙東房西房北堂各三雉公侯七雉三分廣以二為內五分內以一為髙東房西房北堂各一雉伯子男五雉三分廣以二為內五分內以一為髙東房西房北堂各一雉士三雉三分廣以二為內五分內以一為髙有室無房堂注曰廣榮間相去也雉長三丈內堂東西序之內也髙穹髙也此傳説房堂及室與經亦不合然必有所據姑存之以備參考答社壇説所喻社壇别𥿄奉報此是見行禮制更可計會法司檢淳熙間所攽册子為佳此事在州郡為至重今人皆不以為意太守乃能及此深可為法又能擇賢者而屬之尤見其不苟也州縣社壇方二丈五尺髙三尺四出陛稷壝如社壇之制社以石為主其形如鍾長二尺五寸方一寸剡其上培其下半四門同一壝二十五步壇飾各隨方色上蓋以黃土瘞坎於壇之北壬地南出陛方深取足容物右出政和五禮新儀第二十一卷淳熙中曽有印本攽行州郡法司必有之可更檢看又以行事儀考之二壇東西相並坐南向北社壇石主在壇上之南方北門壝外空地須令稍寬可容獻官席位空地之北乃作齊􅈦以備風雨設獻官位獻官南向行事州縣社壇方二丈五尺四步令每步六分之一凡言方者皆徑也此言方二丈五尺者從東至西二丈五尺從南至北二丈五尺也後假壝內二十五步其説亦然髙三尺既言壇髙三尺又言壇分三級則是以一尺為一級也四出陛此陛之級即壇之級也但於四靣陛之兩傍各以石砌作慢道隔斷使其中為陛級外為壇級可也社主舊法惟社有主而稷無主不曉其意恐不可以已意增添其言壇上之南方非壇之中也蓋神位坐南向北而祭器設於神位之北故此石主當壇上南陛之上更宜詳考畫作圗子便可見若在壇中央即無設祭處矣四門同一壝二十五步壝方二十五步者亦是徑二十五步謂從東至西二十五步從南至北二十五步以丈計之六尺為步則為十五丈也四角築土為壝髙三尺許使壇上與齊􅈦相望得見壝上不用瓦蓋但以磚兩靣砌之使其走水尤為堅固四門當中開門古法不言闊狹恐須闊一丈餘庶幾行禮執事之人往來寬展不相妨礙兩旁各立一華表髙一丈許上以橫木貫之如門之狀華表於禮無文但見州縣有如此者或恐易得損壞不作亦得請更依此步數丈數界作方眼中間以𥿄剪作兩壇貼之便見四靣壇腳取壝丈數但壇靣二丈五尺乃最上一級之數下靣更兩級一級須展一尺即壇腳須徑二丈九尺壇飾古者社稷不屋有明文不用磚砌無所考然亦不言磚砌者中原土密雖城壁亦不用磚今南方土踈不砌恐易壞赤土飾之又恐僣於郊壇不可用也瘞坎於壇之北壬地南出陛方深取足容物瘞坎在壇之北壬地即是合在北壝門內兩壇邊各於中央下日隔取壬地各用磚石砌作一小天井深闊三四尺許其南作踏道上下間時以土實之臨祭即令人取去土掃令潔淨祭畢即使人持幣及祝版之屬從踏道下送入坎中然後下土築實依條差人守視燎壇古者祭天以燔燎祭地以瘞埋來喻所云燎壇為風師雨師雷師設者是也古今禮制社稷風雨雷神各有壇又各有方位社稷於西方風師於東北雨雷於東南大略如此不記子細今州縣亦皆别有壇但方位多不合古不謂建寧大邦乃無風雨雷神之壇而寓於社稷之壇也新儀所云在神壇之左而髙於神壇者不謂此社稷壇左設燎壇而髙於社稷壇也植木按周禮社各植之以土之所冝木今當以本府之所宜木植之尺壇壝等亦是禮制當用古尺不當用大尺井田類説漢文帝十三年六月除田租荀氏論曰古者什一而稅以為天下之中正也今漢民或百一而稅可謂鮮矣然豪強冨人占田逾侈此處疑有闕字輸其賦太半官收百一之稅民收太半之賦官家之惠優於三代豪強之暴酷於亡秦是上惠不通威福分於豪強也今不正其本而務除租稅適足以資富疆夫土地者天下之大本也春秋之義諸侯不得專封大夫不得專地今豪民占田或至數百千頃富過王侯是自專封也買賣由巳是自專其地也孝武時董仲舒嘗言冝限民占田至哀帝時乃限民占田不得過三十頃雖有其制卒不得施然三十頃有不乎矣且夫井田之制冝於民衆之時地廣民稀勿為可也然欲廢之於寡立之於衆土地既富列在豪強卒而規之並起怨心則生紛亂制度難行由是觀之若髙帝𥘉定天下及光武中興之後民人稀少立之易矣就未悉備井田之法冝以口數占田為立科限民得耕種不得買賣以贍貧弱以防兼并且為制度張本不亦冝乎雖古今異制損益隨時然綱紀大略其致一也本志曰古者建步立畒六尺為步步百為𤱔𤱔百為夫夫三為屋屋三為井井方一里是為九夫八家共之一夫一婦受私田百畝公田十畝是為八百八十𤱔餘二十畝以為廬舍出入相交佇班志作守望相接疾病相救民受田上田夫百畝中田夫二百畝下田夫三百畝歲更耕之換易其處何休曰司空謹别田之髙下善惡分為三品上田一歲一墾中田二歲一墾下田三歲一墾肥饒不得獨樂墝埆不得獨苦三年一换土易居其家衆男為餘夫亦以口受田如此比士工啇家受田五口乃當農夫一人有賦有稅賦謂計口發財六字係班志顔注稅謂公田什一及工啇衡虞之入也賦供車馬兵甲士徒之役充實府庫賜豫之費稅給郊宗廟百神之祀天子奉養百官祿食庶事之費充實以下並班志文民年二十受田六十歸田種穀必雜五種以備災害中弗得有樹以妨五穀力耕數耘收穫如寇盜之至環廬種桑菜茹有畦瓜瓠果蓏𦵔於強畔雞豚狗豕無失其時女修𧖟織五十則可以衣帛七十則可以食肉五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉鄉萬二千五百戶比長位下士自此以上稍登一級至鄉為大夫矣於是閭有序而鄉有庠序以明教庠以行禮而視化焉春令民畢出於野其詩云同我婦子饁彼南畝田畯至饎冬則畢入於邑其詩云同我婦子曰為改歲入此室處春則出民閭胥平旦坐於左孰比長坐於右孰畢出而後歸夕亦如之入者必薪樵輕重相分班白不提挈何休曰晏出後時者不得出暮不持樵者不得入冬則民既入婦人同巷夜績女工一月得四十五日功必相從者所以省費燭火同工拙而合習俗也男女有不得其所者因而相與歌詠以言其情是月餘子亦在序室未征役為餘子八歲入小學學六甲四方五行書計之事始知室家長幼之節始知以下班志文十五入大學學先王禮樂而知朝廷二字班志君臣之禮其有秀異者移於鄉學鄉學之秀移於國學學於小學諸侯歲貢小學之秀者於天子學於大學其有秀者命曰造士行同而能偶别之以射於鄉學以下以何休説增損修定然後爵命焉孟春之月群居將散行人振木鐸以徇於路以採詩獻之太師比其音律以聞於天子何休曰男年六十女年五十無子者官衣食之使之民間求詩鄉移於邑邑移於國國以間於天子三年耕則餘一年之畜故三年有成成此功也故王者三載考績九年耕餘三年之食進業曰登故三考黜陟再登曰平餘六年食三登曰泰平二十七歲餘九年食然後至德流洽禮樂成焉故曰如有王者必世而後仁繇此道也九年以下並以班志修定書曰天秩有禮天罰有罪故聖人因天秩而制五禮因天罰而制五刑建司馬之官設六軍之衆因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為衆衆班志並作終字十為同同方百里同十為封封十為畿畿方千里地四井為邑四邑為丘丘十六井有戎馬一匹牛三頭四丘為甸六十四井有戎馬四匹兵車一乘牛十二頭甲士三人步卒七十二人干戈備具是謂司馬之法一同百里提封萬井除山川坑塹城池邑居園囿街路三千六百井定出賦六千四百井戎馬四百匹兵車百乘此卿大夫采地之大者是謂百乘之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此諸侯之大者謂之千乘之國天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乘戎馬車徒干戈素具春振旅以搜夏拔舍以苗秋治兵以彌冬大閲以狩於農隙以講事焉五國為屬屬有長十國為連連有帥三十國有卒卒有正二百一十國為州州有牧牧有連帥比年簡車卒正三年簡徒群牧五年大簡輿徒此先王為國立武足兵之大略也連帥以下並依班志晦庵先生朱文公文集卷第六十八終福州府儒學訓導鄭璉校
