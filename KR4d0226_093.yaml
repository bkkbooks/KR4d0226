body:
  text: 墓志銘女巳埋銘朱氏女生癸巳因以名叔其字父晦翁毋劉氏生四年哌失恃十有五適笄珥趙聘入奄然逝哀汝生婉而慧雖未學得翁意臨絶言孝友悌從毋藏亦其志父汝銘毋汝視汝有知尚無畏宋淳熙歲丁未月終辜壬寅識江君清卿墓志銘淳熙十有四年春二月庚午鶴山江君清卿卒冬十有一月庚申葬于其里少東夏嶺之原前期其弟嗣以書致今臨江通守賈侯應之狀來請銘豫幸蚤得從清卿遊然家居相距百餘里不得旦暮相與切磋琢磨以究其學也然每一相見則心愈益敬愛之及聞其死以病未克赴弔至是乃輿疾而往哭之入其門望其几筵像設見其子甚幼纍然服喪撫其匶於西廂不自知其慟也歸乃發賈侯之狀又附以豫所知者而具論之君諱明清卿其字也世家建陽縣北樂里曽大父諱測以學行教鄉黨仕止將作監主簿而贈官至太中大夫大父諱立左朝奉郎以吏治循良受知於司馬文正公父諱琦左宣教郎永州州學教授覃思春秋之學龜山先生楊公見其書而稱之尤以文學行義知名當世娶同縣虞氏而生清卿焉清卿生有異稟書過目輒成誦作文操筆立成皆有思致見者驚歎以為江氏有子矣以童子見張魏公即開口論天下事儼然如成人公亦竒之年十七遭外憂執喪如禮既冠益從諸長老遊讀書問學探討不倦而不肯輕為論説待守踐行造次必以規矩而不務過為崖異斬絶之行其接物薰然以和然亦未嘗苟然有所阿徇鄉人無不悅而親之然其恬曠虛逺之懷安靖篤實之操誠於中而形於外者人亦望而敬之不敢有以加也始教授公無恙時嘗欲盡以先世遺業奉其兄未及而卒清卿卒成其志自處雖約不以為慮毋夫人有賢行自寡居即布衣疏食以終身及春秋髙遂抱羸疾清卿左右奉養無違既沒葬祭如法父同産有適人而老且貧者迎養周給以立其家始終不懈鄉人有死於逺官者為之紏合親故還其喪而窆之有以昆弟訟其先人之遺澤而纍歲不決者喻以恩義之重一言而解蓋其志行之所以信於人者非一日也嘗以進士試禮部不合而歸遂無復有進取之念而獨於修身進德益孳孳焉不以歲年之晚疾病之侵而少有自安之意也始亦嘗有意為浮圖學至是乃喟然曰徒亂人耳卒時年六十有二篋無完衣以斂而一子宗老才七歲鄉人無問親疏賢否哭之皆出涕退而相與咨嗟悼歎者無異詞也妻吳氏先卒二女適翁益李懷祖其遺文十餘卷藏於家嗚呼君家比三世以儒學起家從官而皆不大顯至君而學益明行益修人曰是必且為世用而有以大其門矣而又不位不年以沒于地於是人莫不以是疑於造物之理而為君惜之豫獨有以知君之志其所以為欣戚者有不在是也然則文卿之託銘於豫也豈不有以也哉銘曰不同乎今人者君之樂不及乎古人者君之憂蓋其所樂者人以為戚而其所憂者我以為休銘焉不慙子孫是收轉運判官黃公墓碣銘公諱洧字清臣姓黃氏建寧府人其先世相傳自光州固始入閩居建陽之水東後徙甌寧之演平曽祖執矩祖伯堅贈承議郎父鋭朝請郎提點江淮荆浙福建廣南坑冶公事公以遺廕輔官調筠州高安尉時江西群盜充斥王帥討捕相繼公以射士為大軍前行數與賊遇巳事例受薄賞不復以功自言論者多之郡獄治盜詞有白金若干藏某處檄公取之得金數倍從者請私其餘公不可悉以送官人服其廉秩滿授興化軍司理參軍問事既得其情即復告以法所當得之罪且問若此寧有冤乎必反復無異詞巳乃具獄上府以是凡公所鞠雖重辟皆合瓜扣顙自以不冤軍院官謂公曰兩獄一也即有移鞠幸勿為異吾亦不敢自異於公也公愀然曰事惟其是而巳况司獄人命所繫吾固不敢以徇公公亦安得以徇我乎自今理院所移有不當者幸公改之勿以為嫌也部使者私欲出一重囚公持不可乃因行部慮問釋之公白太守復致之獄而竟按其罪太守汪公待舉以是賢公待遇有加一郡之事必咨而後行公亦益為盡力境內稱治監紹興府錢清鹽埸改宣教郎知福州候官縣治以寬簡先教後刑訟者反復曉譬之或失所爭而去民爭先為里正曰官無賦斂里無盜賊吏不敢􅑧號村落間此時不可失也母夫人江氏故家福州族黨衆盛歲時往來親親之意甚厚而無一人敢以私事為請者簽書平海軍節度判宫廳公事郡守辛公次膺鄧公柞范公如圭皆當世賢大夫咸委重焉秩滿造朝給事中黃公祖舜薦公材堪治劇清可律貪欲留官中都公辭母老求通判福州以歸未上而太夫人物故執喪哀毀治葬勤劇家益窮空當路有欲周之者顧非其義不取陳正獻公時在從班應詔舉公可奉使典州喪畢除知南雄州郡小用度不饒舊常法外重贖以取資且榷酒酤增稅柵民告病矣而官用猶不足公至一切罷之人以便安而郡亦未嘗乏事也州故與建饒贑州代輸坑冶司歲貢白金各若干兩故事皆取於民以辦公請以郡大小為差詔悉蠲之郡人賴焉改廣南東路提舉市舶帥守市賈胡香不償直公舉法移州帥愧且懼亟召歸之更為轉運判官廣學租禮名士益勸諸生以學番禺令近在帥守諸司治所肆意為姦無按舉者公素聞之至是誨厲之不能改乃捕其吏屬劾之一夕而獄具奏上閲實抵罪以去其餘不循法度以病民者隨罪大小以次繩治於是一路肅然官吏始知有法守矣市人困於官估丐奪之擾公為移書一路罷官估除市籍百賈得職物價為平復上奏請均其法於諸路詔施行之丁籍久失開收口賦之逋均及鄰伍流亡日衆公選吏分行核其實而除之一路所蠲凡十有五萬口流冗浸復瀕海蛋戶數萬生理至微亦有役於州縣公悉免之按行所部雖煙瘴荒逺無所憚訪問疾苦伸理冤抑不可勝計革外銓匿闕徇私之弊人無怨言江浙歲飢有旨發二廣義倉米航海詣永嘉往時嘗有此役吏並緣以擾民而米不時逹公處之有方且并西道所發轉致之不越月而至永嘉者八萬斛永嘉之人焚香迎拜步下曰此廣東運使活我也史正志為發運使專以括取諸道羡錢為巳功諸道承風聽命不暇公曰嶺外貧薄安得視它路財豫緡錢千數正志怒欲陷公以罪有以公為人告者乃巳改使荆湖南路首論諸州以租米饋荆鄂襄陽諸軍地里之逺近不同則運載之費出於民者宜有多寡今諸州不能前知所當詣因悉以逺地為凖而取其費如潭州歲輸三十萬斛則稅外當歲輸錢十萬緡民力安得不重困謂宜詔總領所前期下諸州使知所當詣而隨其逺近以收運費庶以少蘇民力異時郡縣預借民田租稅及它非法取民如茶粗如甲札如户帖如乳香如茶引之屬者一禁絶之官吏或奏抵罪檄州縣勸民益廣陂塘貸以金榖不越月而所修復以萬計詔頒諸道以為法會有訴耒陽令程資忠貪殘不法事敗而逸者又有訴胥吏挾私枉法黥配士人者公以屬吏則其事乃連提舉常平官胡仰貨賂關通證驗明白公不得巳具以上聞仰黨援衆反得美遷而去公力不勝獄囚久不決尋以被旨按行諸郡入舂陵界聞郴桂飢民相聚剽劫即日還車披山通道不一二日而至郴州問賊所巢乘夜罙入群盜不意公來之速相顧駭愕一夕潰去公又召其酋豪譬以禍福而慰安其餘衆檄州運米躬視賑給遂以無事兩郡之民德公之為悉畫其象生祠之還臺未幾一日得疾遂卒積官朝散郎享年六十有二乾道元年五月十七日也久之臺臣乃有論胡仰姦狀者於是仰抵罪而公言始信公早孤事母孝持身廉介謹密輕財重義貧苦乏絶有人所不能堪者而處之泰然益以暇日誦書史從當世賢人君子遊孜孜焉問所以修巳治人之術一時先逹無不推重器許之為人內剛外和接物謙卑雖童隸無所忽人有片善稱之不容口至論天下事有不可其意者則未嘗有所假借也居官聽斷分别枉直詳審愜當雖纍歲不決之訟案牘如山一閲盡得其情平居未嘗少自暇逸雖疾病不謁告與家人言亦必依於孝弟忠信久官不遂益以廉直自將晚雖小試然亦未究其用而忽焉以沒死之日家無餘財還其鄉妻孥無所託宿士大夫之賢者莫不傷之葬所居慈善鄉豐樂里下原之陽娶李氏文定公孫朝散大夫知建寧府佩之女封安人豫男四人概今為文林郎監文思院門格鄉貢進士次棫次棿女七人長適同郡張伯愈次適朝請郎知贑州事趙善佐次尚幼而某與張趙氏女皆早卒孫男九人孫女一人概等以公之與豫善也狀其事來請銘豫自少從公遊察公始終表裏殆所謂俯仰無愧怍者又按公官第七品當立碣乃敘其事而系以詩使刻置公墓上以示公之子孫與凡鄉人之從宦者使知有所畏慕而興起云其詩曰嗟若黃公懷瑾握瑜半生下僚坦其舒舒晚使于南志則少攄乃其清剛之死弗渝威讋權豪澤流鰥孤而其永歸柩靡所廬故山北東有坎其墟我最其迹圭首方趺咨爾後人母迷厥𥘉過者考德亦式其車朝散黃公墓志銘始豫試吏泉之同安聞旁邑永春有賢令尹曰黃公公廉強介察見微隱吏不能欺而民不忍欺它縣民有冤訟率請諉公以決其條教科指操驗稽決人皆傳誦以為法間嘗以檄書案事涉其境道傍小民稱説令尹不容口其禁令要束大抵皆敦禮義厚風俗戢吏姦恤民隱之意其言明白簡切其逹之也逺近幽隱無不暨焉過門入謁則公方危坐堂上閲學官弟子程課廷中􅞔然無人聲問公所以為此者公不鄙告語甚悉恨所案事有程不得久留聽公語也泉之士大夫為豫言永春自故司課江公民表為令有善政民稱思之以為無能繼者今黃君節守始無愧江公而吏事精密有過之者豫既罷歸聞近臣有薦公者天子擢以為監察御史謂公得以行其志矣未幾聞其以病去竟不復起識者恨之後十餘年屏居里中有書生來請受學思苦業精久而益篤問其出則公之季子也一日出其兄東之書與其母之外弟今提舉廣東市舶江君文叔之狀泣而請曰先君子幸相與有一日之舊敢請銘以賁其幽豫不得辭也公諱瑀字德藻其先世居福州長樂縣青山下後乃徙家郡城之東為閩縣人六世矣曽祖徽祖時皆不仕父南仲七試禮部不偶以公故贈朝奉郎而妣陳氏亦封太安人公中紹興八年進士第初任為饒州司户參軍提點鑄錢官欲市冶工餘糧以規贏利強公高其估公不可則怒欲中以法而求其罪無所得乃更欲薦之公謝不受歲旱郡檄視屬縣民田當免租者公請免之什九而行它縣者以什一告太守洪忠宣公以為疑却公所上文書俾更之公曰官可罷此不可易且吾巳聞之諸使者矣既而洪公使視諸縣則公所行縣民獨無流徙乃復善公所為而薦之罷官貧甚與一力徒步以歸更調湖北轉運司主管帳司使者向公伯奮一日謂公曰人皆求薦君獨未嘗一言何也即袖中出奏牘上公可親民者且以心源淵靜夷險一操目之公於是改官而人亦以賢向公焉及來永春承冦亂蠱弊之餘田萊多荒民力凋瘁公至首蠲其宿負民有鬻業而稅籍不除者悉釐正之其文書或不具則履畒而均其稅於是豪民無得幸免而貧弱以蘇民輸賦或後期不使吏與其間獨揭其姓名於市為之期日而聞者相先以至間不一歲流庸盡復賦入再倍其初公又痛以廉儉自約飭凡例所當得公廨錢悉輸之官到罷挈家法當計傭受直亦不取至於燕遊饋送之費又皆一切屏絶而鈎考出內則必以身親之吏無所容其姦於是廪有餘粟庫有餘錢乃視民所病凡前日無名之賦可罷者如浮鹽錢之屬皆罷之不可者如上供銀亦為損其虛估之直宗子米則以它錢代輸一歲至數百萬左翼軍自漳徙屯郡下當治營屋郡分以屬縣它縣征調輸載民不勝擾公獨出庫錢僦工徒取竹木具陶瓦而分寓便舟以往為屋餘千間而邑人不之知也里正舊以誅求破屋前後相屬當役者畏避百方惟恐不得脫至是乃有投牒爭先為之者嘗有寡婦負租而逃公寬其期以召之來則使之傭織於人以漸償所負又嘗有請鬻牛以輸負租者公閔然曰奈何使汝失一歲之計今春姑以丐汝秋成而輸未晚也其人欣然聽命及期畢如約蓋其及民之大者既巳周浹而於其細者又皆曲盡如此獨豪宗大姓侵刻細民則捕劾窮治之無少貸他所聽斷發擲隱伏人以為神而卒亦歸於仁恕也大治學館闢其衢路斥去喧雜作亭其前而刻詞以厲學者語意甚偉延擇修士課試以時士子上謁者接之於學講學之外一豪之私不敢及也有儒冠而以博訟者為設席聽事之旁課以論孟通者罷歸否者呼其父兄懲以二物由是俗為一變始至欵謁羣祀以文告曰令有昏墨神其殛之視社禝祠壇墮敝甚即命改為而又植以名木至今人猶指以思公名之曰御史林遭旱出俸錢具牲酒躬走羣望窮極幽險不以勞為憚雨為立應愚民奉佛往往私立塔廟僧以是得雜處市里間亂倫敗俗為良民患公按律令盡撤之且禁僧無得復居外宿弊頓革丞有女病若有物慿之者巫曰故邏卒某也死而役於城隍之神實為祟公怒曰是安敢然杖其土偶而投之溪流女病即愈始時縣人頗神事之巫史因託以為妖至是乃息云以郡守諸司薦去為兩浙轉運司幹辦公事有獻鬻公田之䇿者檄公視之歷諸郡盡得其多寡輕重不均之弊還極言其非便且曰公田歲入若干而畜牧芻藁取具焉今一旦鬻之計其獲不過數歲之入自是以往能無橫斂於民乎貴將揚存中請地以廣其營實規為觀遊以奉權幸公又以檄往視還曰營卒若干人度地若干畒而足今所請地且數倍若從其請是壞民田廬冡墓不知其幾而獨為存中結歡於一幸臣也不可豫卒皆罷之㩲秀州華亭縣歲事惡民飢公白常平使者請發廪以賑焉使者以當俟奏報難之公曰民命在朝夕苟可以生之雖重得罪不悔退即發常平廪粟之在縣者全活萬計而使者亦不能有以罪也吏部侍郎汪公應辰侍御史汪公徹交章薦公材中御史除御史臺檢法官未幾擢監察御史而公巳病矣告滿請外除江南東路提點刑獄公事未行徙轉運副使視事旬日改知漳州旋丁內艱免喪請就間養疾得主管台州崇道觀乾道四年八月二日卒年六十官自左迪功郎七遷至朝散郎即其年十一月庚申葬懷安縣靈山鄉長箕山公娶葉氏中奉大夫大任之女封安人五男子杲亦以進士選官至宣教郎江南西路提點刑獄司檢法官後公十二年卒東從政郎南劒州沙縣丞查幹皆業進士栒亦蚤卒二女子長適承議郎江淮湖廣路總領司幹辦公事任文茂次適奉議郎知泉州同安縣余元一而幹即來學請銘者也公資剛介自少即刻苦自厲家貧鬻麯於市而挾書隨之苟非其義雖寒且飢不可得而衣食也閩俗多火葬公遭父喪親黨憐其貧喻使從俗公哀號不答盡鬻家人衣具卒葬以禮事母兢兢唯恐少傷其意即有譴責未嘗敢自辨數也自奉簡薄而於奉親極其厚至於兄弟族姻之間周貧振乏亦無所愛其力官番陽時有邑子為紏掾以職事不相中尋以憂去公極力調護之其人初不敢以此望公涕泣慚謝為舉子時書皆手寫成誦為文不追時好為吏一心營職其清苦之操非人所堪而聰明仁愛所以惠於民者亦非人之所能及也平生一以直道自任未嘗小降色辭以希薦寵為御史時嘗病甚臨安守趙公子潚亦以廉節著𬒳旨視公家事見其篋櫝蕭然衣無兼副俯仰歎息者久之卒之日家亡餘財凡此皆人之所甚難而公之所甚易人固多能言之顧其中猶有大於此者不幸未試而人亦莫之知也蓋公在臺時與殿中侍御史杜公莘老雅相好每以節義相觀勉一日杜以公疾來問訊連呼不應乃大呼曰吾今日擊去王繼先矣公矍然起坐曰君能任職吾不病矣探枕中片𥿄示之乃疏繼先罪狀甚悉繼先者以醫得幸罪惡盈溢公意蓋有待也居無何杜以論官者張去為不效求去公就與别喟然太息曰君厚自愛吾亦從此逝矣即日上疏請去以此視公之志豈但欲為其所巳為者而止哉是宜伐石刻辭以告後世之君子乃為之序其事而銘之銘曰我觀黃公古人之風其剛方而潔廉者義之操其慈愛而惠利者仁之功其仁雖僅得施於十室之聚其義則未及折乎百王之鋒遽抱其餘以息乎此尚有以啓厥後於無窮承事郎致仕潘公墓志銘維潘氏世居括蒼之竹溪巳號著姓後徙金華益為聞家君之曽大父諱某贈右朝議大夫大父諱某始以儒學起家仕至左朝奉大夫父某以右朝散郎致仕纍贈大中大夫君諱景憲字叔度幼頴悟日誦數萬言年九歲以童子貢京師通念十三書説六經大義作三體字詔許特試禮部且賜束帛後入太學益自刻厲一時學官如汪公應辰苪公燁王公十朋皆推重焉擢隆興元年進士第調荆門軍學教授不行請為南嶽祠官秩滿宰相知君之賢欲留以為中都官君獨力請太平州學教授逺次以歸宰相問其故君曰本無宦情以汲汲於一官政欲以慰親望耳今二親俱老得逺次尚可日從容於其側它非所望宰相歎息以為不可及君與東萊吕祖謙伯恭父同年而齒長聞其論説行身探道之意慨然感悟遂棄所學而學焉既而遭太中公之喪廬於墓者三年毀瘠骨立未嘗見齒寢興食飲皆以古禮為節服除遂不復仕日遊吕氏之門躬執弟子之禮誦詩讀書旁貫史氏下至于兹靡不該覽而尤於程氏之易為盡心焉至它書史考訂搜輯日有程課鉛黃朱墨未嘗去手為人峭直耿介與世俗少所合而事親從兄友愛諸弟怡愈肅穆人無間言家本富樂躬率儉素布衣𬞞食一室翛然其枯稿淡薄有人所不可堪者而君處之甚安以是中外化服不敢為纎芥浮靡事族黨皆慕尚之而君自視欿然常若不足也始嘗學浮屠説既而學於吕氏晚再悼亡因葬金華之葉山而虛其中以自處築室其旁取朝聞夕死之意命之曰可菴暇日往而遊焉復取舊書讀之悠然自得不知儒釋之有間也買田儲書以待四方之學者又嘗取建寧社倉法出私榖數百斛歲時斂散自葉山以至太中公故居大墓之下各為一社期歲廣之及九而止豫嘗為記其事然亦未及盡如其志也君既無當世之願士友知其心者如韓尚書元吉張左司栻曾卿逢鄭卿伯熊皆愛敬之而不敢有推挽意獨曾侍郎逮嘗引以自代頃年諸大夫薦天下士之賢者三十餘人於周丞相君姓名亦在數中而丞相不能用蓋諸公或未始識君而君亦漠然無所問人或扣之乃獨喟然以曽鄭兩卿為知巳人莫測其意也紹熙庚戌君之子自覺以進士試禮部中選君聞之曰此足以代我矣即目列於有司請致其事遂請得改京秩命甫下而君巳卒矣是歲六月巳亥也君先娶邢氏故龍泉主簿邦直之女繼室朱氏其父翌新仲紹興間為中書舍人子男二人長即自覺其次自晦女三人長適朱孰次適蘇虨次適邢文郁孫男二曰問學問禮蓋自覺嘗調蕭山主簿而虨今為臨海主簿君卒時年五十七病不伏枕比終猶斂襟端坐而沒語未嘗及其私也自覺將以十月丁酉葬君葉山之藏而以書來屬豫銘豫始因伯恭父以識君志同氣合遂結婚姻之好往年以江西使事入奏舟過蘭溪蘭溪距金華不百里金華親故往往來相勞問獨君以書來曰甚願一見以慰離索然子今日之行名為召客吾是以不果來也比以口語罷歸君又以詩來若曰子今幾過七里灘矣可以巳乎其未耶豫不能答而嘗以是愧其為人乃為之銘銘曰介剛之節為世玉雪退省其私敬順怡恱却掃耽書貶身訪道忘食與憂以遂于老昔本不出今復何歸異世同心子平孝威葉山之陽上盈下坎我銘不亡君則奚憾左司張公墓志銘公姓張氏諱維字振綱一字仲欽南劒州劒浦人世以長者好施豫聞於鄉曾祖某祖某父某皆不仕而父以公故贈朝議大夫母羅氏亦贈恭人公弱不喜弄自力於學朝議公知其有立常撫而誨之曰貴仕不足言要當以清白大吾家耳未冠而孤羅恭人躬服儉素而悉力以奉公學中紹興八年進士第調賀州司理參軍不行徙汀州軍事推官事有不可未嘗不力爭郡以故鮮敗事盜起屬邑附從萬衆抄掠三郡之境公護巡尉兵會大軍討平之身履巢窟撫其餘衆而歸第功當為第一而賞不及公不以為意也秩滿更為漳州龍溪丞改左宣教郎知福州閩縣首定差役條約資倍者半其停年民以為便然以公政不苛多欲及公時為之無爭承者巳而制下更定役法適與公所議合今遂定著令云官募丁匠舟楫於民無度而不均公與民約一歲丁匠之役不過三日舟别若干為甲甲直旬日滿則縱之唯所適縣賦故多取具於僧坊公為區畫使其徒自相督僧得無吏卒之擾而輸益辦今亦為例僧歲以荔豫餉州縣公一謝郤曰豈可以口腹易吾操耶積餐錢數十萬義不自取會淫潦敗官舍匠役或過前約悉取以僦之曰母使吾失信於民也民服其公而愛其廉號之曰張太清見御史家以訟奪僧田公當受代矣趣吏具案閲之以田豫僧而去御史怒思有以中傷之求其過纎芥無所得乃巳以便親自請得主管崇道觀以歸會陳正獻公知建康府辟公通判府事事無大小悉委又遣攝守當塗吏戢而民安之朝廷亦知其治行擢以為廣南西路提點刑獄公事自虜再通好公每謂符離之役失於輕舉而人心終不以為非四郡之棄急於休息而人心終不以為是先嘗告執事者冝將順正救使上意於起居食息不替坐薪嘗膽之誠修明政事使人心曉然知朝廷未忘中原及對遂以立志開上心且引益之所以戒舜者為言以謂今日正當汲汲以自治不可狃於小康便謂太平語甚切上曰朕何敢望舜公對曰有為者亦若是願陛下加之意而巳上嘉納之且俾察部內守令臧否以聞公到部按行周遍郡縣南薄瘴海陳船欲渡吏卒扣頭更諌公不顧半濟風作舟師震駭公又不為動所至邊氓歎噭以為百年未始見使者旌節官吏有望風解印綬去者還臺條上件臧否若干人即日施行且者為令未滿歲就除直祕閣知靜江府主管經略安撫司公事公為政平易近民拊循周洽間召長老從容與語授以教條使轉相告戒禁吏妄賦奏減經總之額滯訟或數歲不決者取故牘置便坐暇日躬閲視豫奪咸得其情民以便安而治軍甚嚴有暴橫若亡匿者立命誅斬亡所貸使者得盜百數檻致之府欲盡殺之公為區别誅其渠率數人餘悉遣去郡學􅋻下諸生議徙它處咸以故始安郡治為宜而久為浮屠氏之室矣至是遺火燔燒略盡公取其地以為學使者惑異教隂沮止之不得至箝以禍福公又不聽乃卒就功而益之田以繼廪食學者用勸禱祠不於釋老房祀始至按故典新社禝風雨雷師壇壝月遣官屬潔除為圖以著其兆域陳修登降之位甚飭水旱輒齊宿致禱無不立應南丹徭莫氏以賂結永樂王氏藉兵以逐其兄而自立既立而背其約王氏以兵攻之莫氏困急請輸並塞田及銀冶稅埸以乞師寮屬皆以為受之便公曰莫王連兵正坐貪此爾又將以啖我耶矧國家為夷夏宗主屬國不奉條約正當以義詰之顧反以利而動彼且有以窺我矣於是遣一小校持檄喻之二酋蝢顙受命即日釋兵去莫氏前此數為邊患至是帖服自請導羅殿馬以報國恩又遣子弟效名馬為公夀公受而歸之郡廄且厚遣之或告昭州故盜甘文誠者謀叛去郡紿而縳之欲致之死公察其非辜撫而遣之未幾象郡徭反使者欲調兵逐捕公曰以官兵入箐歷險與猿猱角勝負非計也遣禆校戍山口且文告之徭曰前年殺淩鐡往年殺王宣今年又殺甘文誠是非從若招者耶誰敢聽命公遣文誠示之則皆大喜亟遣子入謝罪江湖遊民並海趨漁鹽所過或掠為盜急之則黨益合朝廷以為憂至遣荆州軍屯守之公奏創效用軍五百人悉募儔輩為之隂銷盜本且賴其用悉上還荆州兵帥司舊以回易備邊法久浸弊公至始為經理均節初年錢不過四千萬季年乃以纍萬萬計其後數年再平劇賊皆以效用取勝而軍無乏興皆公力也朝廷知公可用屢擬除代而難其人乃進直徽猷閣留鎮五年上方謀北略移軍建康使者謀作屯營不如指士卒暴露乃召公為江南東路計度轉運副使趣入靣對獎公治績且屬以營屯事公更營高燥以違淫潦屋凡二萬三千間先為一間於治舍用是計徒庸慮材用令役賦功僂指而定前使者苟於就事幹植脆撓衣以織葦費二萬萬公易以瓦深廣堅緻於前而費半之府司分作它營以情屬軍中先以辦聞屬吏欲效之公曰一椽未集是亦欺君吾不能也會軍帥亦與公議不相中密白公稽緩遣近璫持詔詰責公以狀對上大喜曰朕固料張某必辦此遣再獎諭就加祕閣修撰以寵其勞江東歲和糴以備儲積先是嘗糴三十萬或以豫直太高而損其半公力爭不能止至是復以命公而詔問所以經畫狀且曰監前失母傷民公即條奏曰前事之失民以陛下為不知故獨歸其怨於有司今既知之乃曰姑以為鑒而不能償則天下將有以空言疑明詔者矣且江上糴貴於吳中而其直反下陛下一視同仁何愛十數萬緡而獨使江上之民觖望乎諸司餉遺一不受有不可却者别儲之積至三百餘萬會和糴有未償之直而失於上聞者即以丐之尋召入奏事因訪軍務得失時頻年調諸郡兵團教帥府公言南方兵宜安靜不當數調發以搖人心江東團教五閲月費緡錢且二千萬諸道計不減此宜擇將分兵戍諸州俾就閲習以息大費折姦萌使廟堂之議得專意以圖北方又言兵無竒不足以取勝今兵雖多未必人人皆勇宜詔諸將精擇驍鋭别籍而厚養之以備緩急之用上深然之留為尚書左司郎中遇事有未便輒詣都坐白或惎曰瑣瑣辨切非朝官體公曰都司助調鼎實幾微所關若視吏籖擬即涉筆書不置可否安用我輩邪居月餘丁內艱初對因及西南徼外夷落道里廣袤上令為圖以進至是圖成未上而去服除召見乃奏之序言周公戒成王立政勿以憸人惟吉士然後可以詰戎兵陟禹迹服海表言蓋有指意切而辭不迫識者知其忠藎明年除司晨少卿奏諸道糧綱歲凡百數用官舟者多負而雇啇船者不虧蓋啇人自愛其舟故不為姦棹卒率募遊手衣食於官無所顧藉歲率虧三萬斛細民勺聚撮纍以輸公上而一歲之間輒捐三萬斛以惠姦豈不甚可惜哉且運腳與租同輸官不僦運運腳之利州郡私之侵漏之失大農任之孰若惜運腳以僦啇船之為便乎復為左司郎中熙豐行義倉法獨不及南方公守桂嘗以為請不報至是歲適荐飢朝廷方講荒政公又以為言乃得請兼領贍軍酒管不盡其利而課入大增歲羡緡百餘萬會課當遷官公辭不獲命方請貤之其屬會執政有罷去者讒者意公其與也又知公屢與權幸忤因捃他事論去之先時公巳結廬延平溪南山水之間疏泉發石號曰盤澗至是徜徉其間縱觀古書以自娛尤玩意於春秋謂經有貶而無褒傳者未盡得聖人意方且緒正其説而未竟也既而有知公去國之所以然者為請祠官之祿得主管武夷山沖佑觀公不欲受逡巡數月乃拜命秩滿踰年不復請期以明年七十致仕未及而卒淳熙八年六月癸亥也始時桂人為公生立祠至是聞喪相與哭於其下後有賢牧守如李公浩張公栻多視公時行事以為法而刑獄使者鄭公丙閲其決事故牘歎曰此判不可移端如南山矣其為名流所推伏蓋如此云纍階朝請大夫娶羅氏再娶宗氏皆封恭人子士佺今為朝奉郎通判融州事次士僴嘗以修職郎監潘葑酒庫而卒又次士信修職郎常德府司户參軍士儼承信郎女適進士宗大同謝舒宣義郎陳善慶文林郎黃東所為文有􅐻澗集若干卷奏議若干卷士佺等葬公太平鄉天笁里大篔簹蟠龍山之原而以故右司郎中何侯萬之狀來請銘豫嘗一見公於閩縣後不復相值然公之行事則皆接於耳目知狀為不誣矣何侯又謂公姿稟端𥙿不見喜愠家無姬媵祿稍以班族里平居接物甚夷剞劂之節遇事乃見意謂當然怨怒不避也中不自快顯寵不願也敡歷中外聲績藹然為朝廷所嘉重獎寵者固以此然天子知之士論與之卒不能與世合不大見於設施者抑亦以此歟在江東時㗸命獎諭者皆寵昵信臣力足以進退人者公無所私媚再還朝也嬖近知上意向公遣所親道上所稱賞語且致願見之意或勸一見即近用公義不往計臣斡利以羡餘獻者往往見謂材𬒳進用執政數語公以酒羡課獻內帑公笑而不答退曰一錢盡公家物朝廷欲用當自取之吾寧以獻自媒邪天官虛席上閲班薄謂執政曰張某資歷高宣勞久且將用公公於內外既兩無所諧附竟莫有為助者遡公所守與世相違如是則夫難合而不盡用者公巳逆處懸斷於胸中久矣不足為公憾此又為知公之深者豫以是益恨前日之不獲蚤自附於交遊也而士佺從豫亡友張敬夫官學有聞驗其操執器能信其有似公者乃悉序次其語而銘之銘曰張公廉正蚤發聞聰明仁愛又敏文中歲仗鉞西南奔百蠻震讋民懷恩入椽宰府贊經綸因事納諷忠且勤一朝翩然謝垢氛演仙仙去孰與羣篔簹之臯水清淪佳城鬱鬱芘仍晜我銘不滅公長存運判宋公墓志銘公諱若水字子淵成都府雙流縣人其先唐相文貞公裔孫旦以給事中從僖宗入蜀遂家眉之彭山生五子散居成都卭蜀之間號五房宋氏雙流其一也公之曽大父右言大父傑父維皆不仕其父以公故纍贈奉議郎母蹇氏亦贈安人公自幼即知刻苦為學邑之賢令如任公淵李公燾皆愛其文行屈輩行與交及將就舉有欲移公試漕臺者公曰欺君誣祖吾不忍也卒從州舉試外省得奏名對䇿廷中切直無所避考官不説猶以冠乙科授左迪功郎嘉州龍遊縣主簿未上丁外艱更調龍州仁夀縣主簿監永康軍青城縣味江鎮稅兼合同埸先時茶禁甚急而私販益多啇算甚重而歲額反耗公至弛禁薄征而舊弊頓革課入大增或勸獻其贏以規賞公曰獨不為後人計耶歲旱民爭水衆之利羣聚相毆擊且欲為亂公單馬喻之皆釋伏聽命公又為禱於靈湫一夕不雨而水溢溝澮皆滿焦稿以蘇物情乃安明年荐飢民又相聚剽掠以求食有期以某日掠鎮民某氏者公召諸豪語曰飢民求食此易與耳私販之徒負勇玩法一與之合非小變也今能出力以致其黨使為一境之衛不唯足以銷其姦心飢民知吾有備亦憚不敢進此一舉而兩得也諸豪皆應曰諾悉出金幣椎牛釃酒召致其徒雜於居民保伍之間日以兵徇于市公亦帶劒躍馬其間衆皆畏服而飢民遂不敢犯且曰是嘗為我禱湫出泉者吾當謹避之耳鎮故無學公為作孔子廟考古制器率諸生行釋奠禮延師儒躬講説士子競勸制帥汪公暨諸使者聞其賢爭薦之移知神泉縣始至承廢弛之餘首罷追胥之擾但以幅𥿄書負租與民為期無敢後者不數日盡償前令宿逋為言州家使得善去邑産黃雀歲供諸司至以百萬計公請罷之民用不擾而物生亦遂至今為法諸司知其治行徙知嘉州犍為縣神泉民相率留之不能奪也公於二邑皆治其學校如味江所為民有訟者躬以義理恩意辨告諄悉皆大感恱無復犯者其尤無良不聽令敢以武斷病齊民者乃捕劾之上獄于州罪至流徙於是閭里正清善良皆得其所改宣教郎幹辨諸司糧料院擢太常寺主簿齊宿必虔濯溉必潔同列愧歎以為非所及新繁故有藝祖神御蜀帥請改築宫于成都事下太常公聞其且將大興土木窮極侈麗使民不得安為處駁議事乃得寢遷國子監丞再入太常為博士轉而為丞兼吏部考功郎官改兵部除祕書丞復兼吏部三館將以故事為暴書會而上方閔雨避殿降食公為官長言君父焦勞如此而臣子相與燕樂誠有不自安者官長是其言白罷之以旱故詔館職條上闕政公為書數萬言歷數當時刑賞之繆以為是所以干隂陽之和者宰相聞之怒出公提舉江東常平等事上稱公誠實俾移福建閩俗故多不舉子公與帥司合議按律令嚴保伍為所以禁防誨誘之具甚悉全活者衆汀州逺且多盜又名瘴鄉常時使者按行多避不往至是羣盜甫平死傷橫道疫癘大作又非常歲之比公獨慨然引車罙入煮藥自隨親問病者飲之民為盜所攻劫與能捍禦奮擊以助官軍有勞效者皆弛其租汀民大喜人人知戴公德建陽招賢里故常别貯常平米數千斛凶歲發以賑民本隱士魏君掞之所為而歲久陳腐出納不時反以病民有以版曹所下社倉法告者公喜立為移書更屬鄉人士君子歲斂散之一方尤賴其利除湖南提點刑獄公事建人老稚邀遮戀慕至竟日不得發湖南尤多盜皆晝伏豪民家抵夜輒出以故發不時得公至申明保伍之令使相收司盜無所容至有扣頭車下請得召保復歸農業者公皆撫而遣之又檄諸郡精閲禁旅按行所過察視激犒如法月調諸縣弓兵校其藝而誅賞之由是皆樂為用盜發輒得奏獄官母得兼攝它職又條七事以申警之於議法尤兢兢焉每論死刑必齊戒露香要質于天然後敢決決日輒罷燕設所以致其欽恤之意者無不盡也屬郡大札遣吏挾醫載藥馳以救之衡山浮户有與土人不相中者詣闕言衡山國之夀嶽祠城東故有溪並城南出後或鑿城北址導水使西不能無斷地脈請築山決水使復故道下公平奏公言水西出歲久故道皆為民居今欲東之則是數百家者不無蕩祈離居之苦且夀獄之云無所經見就如其言則國家中興慈皇夀考皆在西流之後尤不宜妄有改作事乃得巳衡州故有石鼓書院墟廢亦久前使者潘侯畤始復營之公成其終為增置弟子貟以永嘉戴溪為之師割田置書教養如法又知處士劉某之賢與郡守劉清之交章論薦詔特輔官於是學者乃知公好賢尚德之意不獨為科舉計也𬒳旨攝帥事飛虎軍素驕悍白晝掠人吏不敢問公一以軍律繩之賞信罰必士民以是得安其居而軍吏亦皆恱服會久不雨請禱過勤遂得疾改除江南西路轉運判官而江西是歲亦大旱下車首問荒政所宜發廪勸分蠲租乞米以次施行其奏請者亦多報可又行帥事事益叢委公自力不少休家人有諌止者皆麾而却之遂以大病然夙興猶視事如常時夜過中遂不起淳熙十五年二月甲子也年五十有八方病革時民相率為公禳禬無不至晨夕走府門偵起居狀及卒皆縞素吊哭行日號泣挽車哀送數十里不絶湖南吏民聞之有千里來赴義者蓋公資稟醇厚隆於孝友處內外族姻長少存沒之間不見其少有遺恨為學勤恪不懈既脫埸屋益玩意於聖賢義理之學近自周程張馬之言以逹于經吟諷辨説未嘗虛口推以及人一以仁愛惠利為心聞善即行如恐不及故所臨􅊩士民愛戴見於風謡非一時諛説空言也其在朝廷據經守正不為苟合雅為虞雍公所知其為之言不過用人材嚴守備以俟敵人之釁而巳嘗因輪對請戒羣下懷私立異迎合紛更之弊損宗戚歲時賜豫貴臣給使宣借百司吏祿之費及減畿甸房緡以惠貧弱上皆稱善公因極論恢復大計反覆數百言上益喜顧曰即當相與赴功名之會耳事下有司不得盡施行而房緡之惠遂及於天下他議貢舉銓汪之屬又皆廣恩優老革簿從厚之意而其應詔言事則直指宰相挾私罔上之失無所避雖以是不得久於朝廷不悔也夀皇知公深嘗語近臣斯人乃朕於奏對間得之其在湖南蓋嘗有召用意宰相以前忿尼之識者恨焉而為文汪洋融液務極事情晚歲乃更造約尤好讀易嘗夢有問易之一經孰為門户者應曰隂陽兩書非易門户也耶其精詣純熟蓋如此所著書有經解五卷書小傳十卷史論十卷古今詩百卷雜著三十卷奏議五卷前安人張氏蜀之故家漢御史綱之後歷千餘年而譜牒可考不紊安人性賢孝讀書史善筆札通古今識義理而不肯為詞章父岐嘗宰永康頗以嚴治安人每陳古誼以諌既歸公事舅謹敬奉祀莊肅和叔妹有禮遇族黨有恩舅喪悉力佐公辦治如法人以為難公居間久上官有欲使攝局者安人不懌曰吾之資尚足以支伏臘徇祿從人得無隳素志乎公善其言為謝不往其方直之操士夫或有愧焉不但為婦人之賢而巳先公十九年卒後安人宇文氏宣教郎隲之女子男三人之源之潤之汪皆嗜學而有文女一人適熊應早卒皆張出也之源等以十六年十二月某甲子葬公及張安人於成都縣楊侯鄉癸山先墓之次遣人來建安請銘踰年乃逹而豫適有臨漳之役使者以書還明年復來則值豫哭子悲甚言不能文顧與公相得晚而相知深其為社倉書院皆嘗為記述又重之源兄弟之請越數千里連歲再至而不倦也勉為之銘以致吾意銘曰資之厚兮學之博退循循兮進諤諤三方一節思無斁九原歸卧不可作我銘其居詔冥漠欲知斯人視斯石太孺人陳氏墓志銘太孺人陳氏建陽縣三桂里人父安世強學博聞嘗立義齋縣南從而學者甚衆娶何氏生太孺人年十有七歸同里周君周君為人寬和樂易不以家人生産為事太孺人佐以勤敏持家儉而有法訓督諸子甚嚴至待姻黨遇鄰曲則又咸有恩意少時喪其親哀慕不懈及嫁亦不逮舅姑而歲時蒸享執事必親訖事常嗚咽流涕晚好浮屠法得其大指遂不復問家事惡衣菲食逾二十年而憂人之憂賑其厄窮病苦雖極力不倦中子舉進士登王官再逢慶恩周君得以承奉郎致仕太孺人後以宗祀霈澤亦錫今號鄉人榮之而太孺人所以自處者不少異於平日也紹熙元年三月某日以疾卒于家卒時精爽不亂享年六十有八周君名誼字少賈前五年卒加贈至通直郎三男子明佐明仲明作明仲嘗以承議郎差知邵武軍光澤縣事讀書處事精敏絶人所至未可量也女五人其壻陳錞蕭思濟程必顯陳瀏而季未行孫男二人巽亨震亨女三人尚幼明年某月某日諸子葬太孺人縣西新嶺天湖之陽東望周君廣平山之墓才數百步明仲以銘來請豫雅知之不得辭也銘曰母之賢足以成其子子之賢足以顯其親西嶺之阡百世而新我其銘之以相後人宜人丁氏墓志銘濠州使君劉侯仲光以書來曰惟吾考妣皆有賢行而祿夀不配其德仲光既不幸蚤孤又不能勉進德業以求無負於明訓徒賴遺澤得階末第從宦積勞至叨郡寄祿賜豐厚足以飽妻孥飲童僕而慈顔永隔不及少伸區區鳥烏之養每一痛念不如無生獨幸纍年以來數逢國家大慶纍贈皇考至朝散大夫皇妣至冝人尚有以少慰人子罔極之思者而先冝人之銘久未克立自念老矣或遂泯沒而無聞則後生小子將不復知前人立家本末重此不孝且無以見先人於地下惟吾子幸哀而與之銘則仲光知免矣敢泣血再拜以請余讀其書不能終篇為涕下不自禁時方卧病田間氣息奄奄筆研廢棄久矣然感其意不忍辭也乃考其事狀而次第之冝人姓丁氏世為永嘉大姓以積善好施聞於鄉父諱瑜尤長者兄弟皆以進士官州縣練逹有能名宜人早歸同郡劉君諱某字元默而劉君之為人亦誠實無表襮樂善愛士起居有常雖甚暑不袒禓家無蒲慱之具喜賙人急遇下有恩然其居家嚴未明而起內外井井教子弟尤有法而冝人配之無遺德焉始入門時舅姑皆亡恙晨昏無違禮內睦娣姒謀嫁諸姑外接親戚輯鄰里恩義俱稱重輕有則於是翕然稱為賢婦久之舅病痱冝人侍養尤勤羔非手調不進舅亦非冝人所進不嘗也姑為比丘尼與冝人年相近病迎歸與共卧起扶掖飲食終歲忘勞姑每感涕謂曰病愈當終身事汝如母臨沒又謂曰即死當報汝地下幸復為人願為汝子孫以事汝姻舊間有過失輒為曉譬諄復甚或垂涕泣而道之聞者感悟遷革乃巳劉氏與同里胡氏有舊好宜人遇之恩意尤篤胡氏長老至今以為言里人有子好讀書欲為儒而父難之其母以告冝人既好喻之又資以金錢使與其子俱試大學以遂其志其人後常以語人且歎息曰今人不復有此風矣大夫公既嚴於教子冝人又能彌縫其間教諸女以身為法自未笄時巳令夙興備盥櫛奉藥餌夜嘗躬視扄鐍灑煬竈輒令持燭行前既笄則教之酒漿烹飪蓋藏之事祭祀賔客之奉且戒之曰爾曹母厭吾言異日當蒙其力耳以故諸子皆以文行稱而女適人者亦能持其家某年某月日以疾卒年四十有九葬于某縣某鄉某里子男三人長曰昭入太學被薦未第而卒次曰某亦早世其季即仲光今以朝散大夫權發遣濠州軍州事女五人嫁周氏葉氏潘氏餘未行而卒孫三人曰邇曰適曰遲曽孫七人曰仁實仁近仁守仁及仁任仁願仁履也濠州行篤厚早以文學吏治著美稱仕於朝且通顯一旦求逺郡去有挽而留之者弗顧也士大夫莫不高其廉靜而服其明識不知其母之賢所以資之者如此其逺也然則冝人之行其可以不銘銘曰順尊卑睦姻黨力豈多惠能廣勤夙宵謹微細男敏學女恭饋賁幽壤疊閔書季之賢慕有餘䘖深悲考潛德授我銘詔無斁冝人黃氏墓志銘冝人黃氏今宣義郎致仕陳君衡之配也世為福州候官人曽祖紹祖遷父仲文皆不仕冝人性淳質不解世俗機事數見欺不自悔既嫁事舅姑夙夜唯謹相其夫理家事甚飭躬勤儉以衣食撫教諸子甚恩故諸子皆得以自力於學而仲氏遂以進士中第輔婺州戶掾冝人見其閲貝獄必戒曰人命至重母使有冤聞當笞人必戒曰輕之母使重傷見其𬒳檄考貢士必戒曰詳之母忘汝為舉子時也初好佛書讀誦拜跪終日忘倦一旦忽屏不事曰不在是也無愧心足矣以慶夀恩三錫至今號紹熙二年七月乙卯卒年子男六人孔夙嘗貢于鄉孔碩文林郎處州州學教授孔易亦嘗預貢籍孔時先八年沒女五人長壻潘子修蚤世次適修職郎泉州司户參軍趙彥夔季尚幼而二男二女皆夭孫男四人女一人而女亦夭諸子以宣義君之命將以明年某月某日葬冝人某縣某鄉某里某處而孔夙孔碩皆嘗從豫遊狀其行事如此來請銘不得辭也其銘曰有婦之德為母之則無愧其心反此真宅迪功郎致仕董公墓志銘君諱琦字順之饒州德興人董為德興著姓世有登儒科者君之曽大父左朝奉郎太醫令大父林右從政郎處州縉雲縣令比兩世皆以才稱父陸始不仕而亦以氣節聞君生有英氣務為倜儻可喜事不肯踐繩約縉雲君憂其過名之曰執柔而字以順之曰以是為爾韋絃之戒君佩服唯謹及更今名而猶以舊字行示不敢忘也年二十五始從鄉先生韓溪程公受春秋學程公命設几案日與對誦春秋左氏及近世胡氏傳時時為説大義稍以禮法開之君自是寖若有省痛自刻厲雖益以風義自許而不復事少年豪習矣義役法行首出田粟倡之事以時定里人賴之嘗卜夀藏既得吉而所知有貧不克葬者舉以卑之無吝色少嘗從程君倜及其弟舟學二君沒久遇其子若孫恩意不少衰其好義多此類晚得諸公家祭禮讀之曰是固可勉自是歲時祀饗齋潔灌薦跪起如法比老不倦既絶意進取漸屏家務即所居旁雜藝花木𬞞果以自娛客至開尊命酌劇談終日間及世事而處其是非成敗則雖老於朝市者不逮也淳熙十二年天子奉觴德夀宫推恩耆老以子銖故授迪功郎致仕紹熙三年八月庚寅以疾終年七十有六蓋君為人精悍議論貴決白不為摸稜含胡態有所喜怒若茹物不下必吐出乃巳然巳過則夷然未嘗宿怨人或待以橫逆往往更結以恩意使自愧悔以是士之賢者愛之其不肖者傾事之及其卒也皆傷之少嘗讀馬援傳慨然慕之既涉世不偶又頗聞先生長者餘論乃更折節為儒生自力於善識之者謂其視疇昔猶兩人也嗟夫天下平治士無功名才否一區之死無聲昔人嘗恨之如君者使少有所遇合以其才頡頑一世可量哉娶周氏李氏皆前卒子男四人鎬銖錫鎡女三人嫁余梓程徹王中皆周出也而鎬鎡及程氏女亦前卒孫男三人女二人明年銖將葬君湖山之原以周氏祔且屬新吉州録事參軍程洵允夫狀君行如此來請銘豫不及識君而韓溪先生者先君子之內弟允夫即其子也銖又來學故聞君之行事為詳其可辭始君自恨知學晚教子甚力故諸子多材而鎬銖皆舉進士銖尤好學自立庶能成君志者銘曰才之良氣之剛有求必豫義之方能不試老其鄉嗚呼歸哉此其藏晦庵先生朱文公文集卷第九十三候官縣儒學訓導劉簮校
