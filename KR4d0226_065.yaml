body:
  text: 尚書漢孔安國曰古者伏羲氏之王天下也始畫八卦造書契以代結䋲之政由是文籍生焉陸徳明曰伏羲風姓以木徳王即大皥也書契刻木而書其側以約事也易繋辭云上古結䋲而治後世聖人易之以書契文文字籍書籍伏羲神農黄帝之書謂之三墳言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也至於夏啇周之書雖設教不倫雅誥奥義其歸一揆是故歴代寳之以爲大訓陸氏曰神農炎帝也姜姓以火徳王黄帝軒轅也姫姓以土徳王一號有熊氏墳大也少昊金天氏巳姓黄帝之子以金徳王顓頊髙陽氏姫姓黄帝之孫以水徳王髙辛帝嚳也黄帝之曽孫姫姓以木徳王唐帝堯也姓伊耆氏帝嚳之子𥘉爲唐侯後爲天子都陶故號陶唐氏以火徳王虞帝舜也姓姚氏國號有虞顓頊六世孫以土徳王夏禹有天下之號也以金徳王啇湯有天下之號也亦號殷以水徳王周文王武王有天下之號也以木徳王揆度也八卦之說謂之八索求其義也九州之志謂之九丘丘聚也言九州所有土地所生風氣所宜皆聚此書也春秋左氏傳曰楚左史倚相能讀三墳五典八索九丘即謂上世帝王遺書也陸氏曰索求也倚相楚靈王時史官也先君孔子生於周末覩史籍之煩文懼覽之者不一遂乃定禮樂明舊章刪詩爲三百篇約史記而修春秋讃易道以黜八索𫐠職方以除九丘討論墳典斷自唐虞以下訖於周芟夷煩亂剪截浮辭舉其宏綱撮其機要足以垂世立教典謨訓誥誓命之文凡百篇所以恢弘至道示人主以軌範也帝王之制坦然明白可舉而行三千之徒並受其義程氏曰所謂大道若性與天道之說聖人豈得而去之哉若言隂陽四時七政五行之道亦必至要之理非如後世之䌓衍末術也固亦常道聖人所以不去也或者所謂羲農之書乃後人稱𫐠當時之事失其義理如許行爲神農之言及隂陽權變醫方稱黄帝之說耳此聖人所以去之也五典旣皆常道又去其三盖上古雖已有文字而制立法度爲治有迹得以紀載有史官以識其事自堯始耳今按周禮外史掌三皇五帝之書周公所録必非僞妄知春秋時三墳五典八索九丘之書猶有存者若果全備孔子亦不應悉刪去之或其簡編脫落不可通曉或是孔子所見止自唐虞以下不可知耳今亦不必深究其說也及秦始皇㓕先代典籍焚書坑儒天下學士逃難解散我先人用藏其家書于屋壁秦國名始皇名政并六國爲天子自號始皇帝焚詩書在三十四年坑儒在三十五年顔師古曰家語云孔騰字子襄畏秦法峻急蔵尚書孝經論語於夫子舊堂壁中而漢記尹敏傳云孔鮒所藏二說不同未知孰是漢室龍興開設學校旁求儒雅以闡大猷濟南伏生年過九十失其本經口以傳授裁二十餘篇以其上古之書謂之尚書百篇之義世莫得聞漢藝文志云尚書經二十九篇注云伏生所授者儒林傳云伏生名勝故爲秦愽士以秦時焚書㐲生壁蔵之其後大兵起流亡漢定伏生求其書亡數十篇獨得二十九篇即以教于齊魯之間孝文時求能治尚書者天下無有聞㐲生治之欲召時伏生年九十餘老不能行於是詔太常使掌故晁錯徃受之顔師古曰衛宏定古文尚書序云伏生老不能正言言不可曉使其女傳言教錯齊人語多與頴川異錯所不知凡十二三畧以其意属讀而已陸氏曰二十餘篇即馬邠所注二十九篇是也孔頴逹曰秦誓本非㐲生所傳武帝之世始出而得行史因以入於伏生所傳之内故云二十九篇也今按此序言伏生失其本經口以傳授漢書乃言𥘉亦壁藏而後亡數十篇其說不同盖傳聞異辭爾至於篇數亦復不同者㐲生本但有堯典皐陶謨禹貢甘誓湯誓盤庚髙宗肜日西伯戡黎微子牧誓洪範金縢大誥康誥酒誥梓材召誥洛誥多方多士立政無逸君奭顧命吕刑文侯之命費誓凡二十八篇今加泰誓一篇故爲二十九篇耳其泰誓真僞之說詳見本篇此末暇論也至魯共王好治宫室壊孔子舊宅以廣其居於壁中得先人所藏古文虞夏殷周之書及傳論語孝經皆科斗文字王又升孔子堂聞金石絲竹之音乃不壊宅悉以書還孔氏科斗書廢巳乆時人無能知者以所聞伏生之書考論文義定其可知者爲隷古定更以竹簡寫之増多伏生二十五篇伏生又以舜典合於堯典益稷合於皐陶謨盤庚三篇合爲一康王之誥合於顧命復出此篇并序凢五十九篇爲四十六卷其餘錯亂磨㓕弗可復知悉上送官藏之書府以待能者陸氏曰共王漢景帝之子名餘傳謂春秋也一云周易十翼非經謂之傳科斗蟲名蝦蟇子書形似之爲隷古定謂用隷書以易古文二十五篇者謂大禹謨五子之歌㣧征仲虺之誥湯誥伊訓太甲三篇咸有一徳說命三篇武成旅􅋙㣲子之命蔡仲之命周官君陳畢命君牙冏命也復出者舜典益稷盤庚二篇康王之誥凡五篇其百篇之序文合爲一篇共爲五十九篇即今所行五十八篇而以序冠篇首者也爲四十六卷者孔䟽以為同序者同卷異序者異卷也同序者太甲盤庚說命㤗誓皆三篇共序减八卷又大禹皐陶謨益稷康誥酒誥梓材亦各三篇共序又减四卷通前减十二卷以五十八卷减十二卷故但爲四十六卷也其餘錯亂摩减者汨作九共九篇槀飫帝告釐沃湯征汝鳩汝方夏材疑至臣扈典寶明居肆命徂后沃丁咸乂四篇伊陟原命仲丁河亶甲祖乙髙宗之訓分器旅巢命歸禾嘉禾成王政将蒲姑賄肅慎之命毫姑凡四十二篇也今亡承詔爲五十九篇作傳於是遂研精覃思慱考經籍採摭群言以立訓傳約文申義敷暢厥㫖庶㡬有𥙷於將來書序序所以爲作者之意昭然義見宜相附近故引之各冠其篇首定五十八篇今按此百篇之序出孔氏壁中漢書藝文志以爲孔子纂書而爲之序言其作意然以今考之其於見存之篇雖頗依文立義而亦無所發明其間如康誥酒誥梓材之屬則與經文又有自相戻者其於巳亡之篇則伊阿簡畧尤無所𥙷其非孔子所作明甚然相承巳乆今亦未敢輕議且據安國此序復合爲一以附經後而其相戾之說見本篇云旣畢㑹國有巫蠱事經籍道息用不復以聞傳之子孫以貽後代若好古慱雅君子與我同志亦所不隱也陸氏曰漢武帝未征和中江充造蠱敗戾太子今按此序不類西漢文字疑或後人所託然無所據未敢必也以其所序本末頗詳故備載之讀者宜細考焉漢書藝文志云書者古之號令號令於衆其言不立具則聴受施行者弗曉古文讀應爾雅故解古今語而可知也括蒼葉夢得曰尚書文皆竒澁非作文者故欲如此盖當時語自爾也今按此說是也大抵書之詞語多竒澁而誓命多平易盖訓誥皆是記録當時號令扵衆之本語故其間多有方言及古語在當時則人所共曉而於今世反爲難知誓命則是當時史官所㦏􅕍括閏色粗有體製故在今日亦不難曉耳孔頴逹曰孔君作傳值巫蠱不行以終前漢諸儒知孔本五十八篇不見孔傳遂有張霸之徒僞作舜典汨作九共九篇大禹謨益稷五子之歌㣧征湯誥咸有一徳典寳伊訓肆命原命武成旅􅋙冏命二十四篇除九共九篇共爲十六卷盖亦畧見百篇之序故以伏生二十八篇者舜典益稷盤庚三篇康王之誥及㤗誓三篇共爲三十四篇并僞作二十四篇十六卷附以求合於孔氏之五十八篇四十六卷之數也劉向班固劉歆賈逵馬融鄭玄之徒皆不見真古文而誤以此爲古文之書服䖍杜預亦不之見至晋王肅始似竊見而晉書又云鄭冲以古文授蘇愉愉授梁柳柳之内兄皇甫謐又從柳得之而柳又以授臧曹曹始授梅賾賾乃於前晋奏上其書而施行焉今按漢書所引㤗誓云誣神者殃及三世又云立功立事惟以永年疑即武帝之世所得者律歴志所引伊訓畢命字晝有與古文畧同者疑即伏生口傳而晁錯所屬讀者其引武成則伏生無此篇書是張覇所僞作者矣今按漢儒以伏生之書爲今文而謂安國之書爲古文以今考之則今文多艱澁而古文反平易或者以爲今文自伏生女子口授晁錯時失之則先秦古書所引之文皆巳如此恐其未必然也或者以爲記録之實語難工而潤色之雅詞易好故訓誥誓命有難易之不同此爲近之然伏生倍文暗誦乃徧得其所難而安國考定於科斗古書錯亂磨滅之餘反專得其所易則又有不可曉者至於諸序之文或頗與經不合而安國之序又絶不類西京文字亦皆可疑獨諸序之本不先經則頼安國之序而可見故今别定此本壹以諸篇本文爲經而復合序篇於後使覽者得見聖經之舊而不亂乎諸儒之說又論其所以不可知者如此使學者姑務沈潜反復乎其所易而不必穿鑿傳㑹於其難者云虞書虞舜氏因以爲有天下之號也書凡五篇堯典雖紀唐堯之事然本虞史所作故曰虞書其舜典以下夏史所作當曰夏書春秋傳亦多引爲夏書此云虞書或以爲孔子所定也堯典堯唐帝名說文曰典從冊在几上尊閣之也此篇以簡冊載堯之事故名曰堯典後世以其所載之事可爲常法故又訓爲常也此篇古文今文皆有曰若稽古帝堯曰放勲欽明文思安安允恭克讓光𬒳四表格于上下曰粵越通曰若者發語辭古人文字中多用之周書所謂越若來三月亦此例也稽考也史臣將叙堯事故先言考古之帝堯者其德如下文所云曰者猶言其說如此也放至也孟子言放乎四海是也勲功也言堯之功大而無所不至也欽恭敬也明聦明也敬爲體而明爲用也文文章也思意思也文著見而思深遠也安安無所勉強之貌言其徳性之羙皆出於自然而非強勉所謂性之者也允信克能也常人徳非性有物欲害之故有強爲恭而不實欲爲譲而不能者惟堯性之是以信恭而能讓也光顯𬒳及表外格至上天下地也言其徳之盛如此故其所及之逺如此也盖放勲者緫言堯之徳業也欽明文思安安本其徳性而言也允恭克譲以其行寔而言也至於𬒳四表格上下則放其勲之所極也孔子曰惟天爲大惟堯則之故書帝王之徳莫盛於堯而其賛堯之徳莫備於此且又首以欽之一字爲言此書中開卷第一義也讀者深味而有得焉則一經之全體不外是矣其可忽哉克明俊徳以親九族九族旣睦平章百姓百姓昭明恊和萬邦黎民於變時雍明明之也俊大也堯之大徳上文所稱是也九族髙祖至玄孫之親舉近以該遠五服之外異姓之親亦在其中也睦親而和也平均章明百姓畿内庶民也昭明皆能自明其徳也萬邦天下諸侯之國也黎黒也民首皆黒故曰黎民於嘆羙辭變變惡爲善也時是雍和也於是無不和也此言堯推其徳自身及物由近及逺所謂放勲者也乃命羲和欽若昊天暦象日月星辰敬授人時此兼命二氏四子作爲暦象以授民欲其及時以趨事也若順也昊廣大之意也暦所以紀數之書也象所以觀天之器如後篇璣衡之屬是也日陽精一日而繞地一周月隂精一月而與日一㑹星二十八宿衆星爲經金木水火土五星爲緯皆是也長以日月所㑹分周天之度爲十二次也人時謂耕穫𧖟績之候凢民事早晚之所關也其說詳見下文分命羲仲宅嵎夷曰暘谷寅賔出日平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾此以下四節言暦旣成而分職以頒布且考驗之恐其推歩之或差也或曰上文所命盖羲伯和伯此乃分命其仲叔未詳是否宅居也嵎夷東表之地盖官在國都而綂治之方其極至此非徃居於彼也曰暘谷者以日之所出而名之也寅敬也賔禮接之如賔客也出日方出之日盖以春分之旦朝方出之日而識其𥘉出之晨也平均秩序作起也東作春月歲功方興所當作起之事也盖以暦之節氣早晚均次其先後之冝以授有司也日中者晝得其中也盖晝夜皆五十刻春主陽故以晝言也星鳥南方朱鳥七宿殷中也仲春者春分之氣盖以日晷中星驗春之中也析分散也先時冬寒民聚於隩至是則以民之散處而驗其氣之温也乳化曰孳交接曰尾以物之生育而驗其氣之和也申命羲叔宅南交平秩南訛敬致日永星大以正仲夏厥民因鳥獸希革申重也南交南方交趾之地劉氏曰當云宅南曰交趾陳氏曰交下當有曰明都三字訛化也謂夏月時物長盛所當變化之事也史記索隱作南爲謂所當爲之事也敬致周禮所謂春夏致日盖以夏至之日中祠日而識其㬌如周禮所謂日至之景尺有五寸謂之地中者也永長也日永晝六十刻也星大東方蒼龍七宿火謂大火夏至之中星也因析而又析也以氣愈熱而民愈散也希革毛希而革見也分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虚以殷仲秋厥民夷鳥獸毛毨两謂西極之地日昧谷以日所入而名之也餞禮送行者之名納日方納之日也盖以秋分之暮夕方納之日而識其景也西成秋月物成之時所當成就之事也宵夜也北時亦晝夜各五十刻秋至隂且避春之日中故舉宵以見日也星虚北方玄武七宿虚星秋分之中星也夷平也暑退而又氣平也毛毨毛落更生潤澤鮮好也申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸􅩝毛朔方北荒之地謂之朔者朔之爲言蘇也萬物至此死而復蘇猶月之晦而有朔也日行至是則淪於地中萬象幽暗故曰幽都在察也朔易冬月歲事巳畢除舊更新所當改易之事也日短晝四十刻也冬亦主隂然無所避故直言日也星昴西方白虎七宿昴星冬至之中星也隩室之内也氣寒而民聚於内也􅩝毛亦以寒而生細毛以自温也盖旣命羲和造暦制器而又分方與時使各驗其實以審夫推歩之差聖人之敬天勤民其謹如是是以術不違天而政不失時也今按中星或以象言或以次言或以星言者盖星適當昏中則以星言如星虚星昴是也星不當中而適當其次者則以次言如星火是也次不當中而適界於兩次之間者則以象言如星鳥是也聖人作暦推考參驗以識四時中星其立言之法詳宻如此又按堯冬至日在虚昏中昴今日在斗昏中壁而中星古今不同者盖天有三百六十五度四分度之一歲有三百六十五日四分日之一天度四分之一而有餘歲日四分之一而不足故天度常平運而舒日運常内轉而縮天漸差而西歳漸差而東此即歲差之由唐一行所謂歲差者日與黄道俱差者是也古暦簡易未立差法但随時占候修改以與天台至東晉虞喜始以天爲天以歲爲歲乃立差法以追其變約以五十年而退一度何承天以爲大過乃倍其年而又反不及至隋劉焯取二家中數爲七十五年盖爲近之而亦未爲精宻也帝曰咨汝羲曁和朞三百有六旬有六日以閏月定四時成歲允釐百工庶績咸熈咨嗟也嗟嘆而言之也曁及也朞猶周也歲周三百六十五日四分日之一而曰三百六旬有六日者舉成數也釐治工官庶衆績功熈廣也按天體至圓周圍三百六十五度四分度之一繞地左旋常一日一周而過一度日麗天而少遲一日繞地一周無餘而常不及天一度積三百六十五日九百四十分日之二百三十五而與𥘉躔㑹是一歲日行之數也月麗天而尤遲一日常不及天十三度十九分度之七積二十九日九百四十分日之四百九十九而與日㑹十二㑹得全日三百四十八餘分之積五千九百八十八如日法九百四十而一得六不盡三百四十八通計得日三百五十四九百四十分日之三百四十八是一歲月行之數也歲有十二月月有三十日三百六十者歲之常數也故日行而多五日九百四十分日之二百三十五者爲氣盈月行而少五日九百四十分日之五百九十二者爲朔虚合氣盈朔虚而閠生焉故一歲閏率則十日九百四十分日之八百二十七三歲一閏則三十二日九百四十分日之六百單一五歲再閏則五十四日九百四十分日之三百七十五十有九歲七閏則氣朔分齊是爲一章也故積之三年而不置閏則春之一月入于夏而時漸不定矣子之一月入于丑而歲漸不成矣積之之乆至於三失閏則春皆入夏而時全不定矣十二失閏則子皆入丑而歳全不成矣盖其名實乖戻寒暑反易旣爲可笑而農桑庶務皆失其時爲害尤甚故必以餘置閏而後四時不差而歲功得成以此信治百官而衆功皆廣也帝曰疇咨若時登庸放齊曰㣧子朱啓明帝曰吁嚚訟可乎此以下至鯀績弗成皆爲禪舜張本也疇誰咨嗟若順時是庸用也言堯誰何咨嗟而問有能順此理者將登而用之也放齊臣名㣧嗣也㣧子朱堯之嗣子丹朱啓開也言其性開明可登用也吁者歎其不然之辭嚚謂不道忠信之言訟争辨也朱盖以其開明之才用之於不善故爲嚚訟禹所謂傲虐是也此見堯之至公至明深知其子之惡而不以一人病天下也或曰㣧國子爵堯時諸㑦也盖書有㣧侯周書有㣧之舞衣今亦未見其必不然姑存於此云帝曰疇咨若予采驩兠曰都共工方鳩僝功帝曰吁静言庸違象恭滔天采事也驩兠臣名共工官名盖古之世官族也方且鳩聚僝見也言方且鳩聚而見其功也静言庸違静則能言而用之則違背其言也象恭貌恭而心不然也滔天二字未詳不可曉與下文不相似疑有舛誤帝曰咨四岳湯湯洪水方割蕩蕩懐山襄陵浩浩滔天下民其咨有能俾乂僉曰於鯀哉帝曰吁咈哉方命圯族岳曰异哉試可乃巳帝曰徃欽哉九載績用厥弗成四岳官名一人而總四岳諸侯之事也湯湯水盛貌洪大也孟子曰水逆行謂之洚水洚水者洪水也盖水涌出而未洩故泛濫而逆流也割害也蕩蕩廣貌懷包其四靣也襄駕出其上也大阜曰陵浩浩大貌滔漫也極言下民其咨其大勢若漫天也俾使乂治也僉衆共之辭鯀崇伯名歎其羙而薦之也咈者甚不然之之辭方逆也命上之令也言專任巳意不從上令也圯敗族類也言與衆不和傷人害物鯀之不可用者以此也楚辭言鯀倖直是其方命敗類之證也岳曰則四岳之獨言也异義未詳疑是巳廢而復強舉之意試可乃巳者盖廷臣未有賢於鯀者不若姑試用之取其可以治水而巳矣言無預他事不必求其備也堯於是遣之徃治水而戒以欽哉盖任大事不可以不敬聖人之戒辭約而意盡也帝曰咨四岳朕在位七十載汝能庸命巽朕位岳曰否徳忝帝位曰明明揚側陋師錫帝曰有鰥在下曰虞舜帝曰俞予聞如何岳曰瞽子父頑毋嚚象傲克諧以孝烝烝又不格姦帝曰我其試哉女于時觀厥刑于二女釐降二女于嬀汭嬪于虞帝曰欽哉朕古人自稱之通號巽順而入之也言汝四岳能用我之命而入居我之位乎盖丹朱旣不肖羣臣又多不稱故欲舉以授人而先之四岳也否不通忝辱也明明上明謂明顯之下明謂巳在顯位者掦舉也側陋㣲賤之人也言惟徳是舉不拘貴賤也師衆錫與也盖四岳與群臣諸侯同辭以對也鰥無妻之名虞氏舜名也俞應許之辭予聞者我嘗亦聞是人也如何者復問其徳之詳也岳曰又四岳獨對也􅮊無目之名言舜乃􅮊者之子也舜父號􅮊叟心不則徳義之經爲頑母舜後母也象舜異母弟名傲驕慢也諧和也烝進也言舜不幸遭此而能和以孝使之進進以善自治而不至於大爲姦惡也女以女與人也時是刑法也此堯言其將試舜之意也荘子所謂二女事之以觀其内是也盖夫婦之間隱㣲之際正始之道所繫尤重故觀人者於此爲尤切也釐理降下二女堯二女娥皇女英也嬀水名在今河中府河東縣出歴山入河汭水北一說亦水名一說小水入大水也盖山水皆自北來人可居處多在所交之北故舜所居在嬀之汭也嬪婦也虞舜氏也謂其家也言治裝而下嫁二女于嬀水之北使爲舜婦于虞氏之家也帝曰欽哉戒二女之辭即禮所謂徃之女家必敬必戒者况以天子之女嫁於匹夫尤不可以不深戒也舜典古文有今文合於堯典曰若稽古帝舜曰重華恊于帝濬哲文明温恭允塞玄徳升聞乃命以位華光華也恊合也帝謂堯也濬深也哲智也温和粹也塞實也玄幽潜也升上也言堯旣有光華而舜又有光華可合於堯因言其目則深沉而有智文理而光明和粹而恭敬信實而充塞有此四者幽潜之徳上聞于堯堯乃命之以官軄之位也今按孔䟽梅頤奏上古文尚書孔傳之時巳失舜典一篇又自此以上二十八字世所不傳故多用王范之注𥙷之而以下文慎徽五典以下爲舜典之𥘉至齊蕭鸞建武四年姚方興於大航頭而獻之議者以爲孔安國之所註也直方興有罪事亦随寢至隋開皇二年購募遺典乃得其篇焉盖伏生以舜典合於堯典故其所傳無此二十八字梅頥旣失孔傳故亦不知有此二十八字而慎徽五典以下則固具於伏生之書故傳者用王范之註以𥙷之至姚方興乃得古文本經而并及孔傳於是始知有此二十八字但未知其餘文字同異又如何耳或者由此乃謂古文舜典一篇皆盡亡失至是方全得之遂疑其僞盖過論也慎徽五典五典克從納于百揆百揆時叙賔于四門四門穆穆納于大麓烈風雷雨弗迷徽羙也五典五常也父子有親君臣有義夫婦有别長㓜有序朋友有信是也從順也左氏所謂無違教也此盖使爲司徒之官也揆度也百揆者揆度庶政之官唯唐虞有之猶周之冡宰也時叙以時而叙左氏所謂無廢事也四門四方之門古者以賔禮親邦國諸侯各以方至而使主焉故曰賔穆穆和之至也左氏所謂無㓙人也此盖又兼四岳之官也麓山足也烈迅迷錯也史記曰堯使舜入山林川澤暴風雷雨舜行不迷蘇氏曰洪水爲患堯使舜入山林相視原隰雷雨大至衆懼失常而舜不迷其度量有絶人者而天地鬼神亦或有以相之歟帝曰格汝舜詢事考言乃言底可績三載汝陟帝位舜讓于徳弗嗣格來詢謀乃汝底致陟升也堯言詢舜所行之事而考其言則見汝之言致可有功於今三年矣汝宜升帝位也讓于徳讓於有徳之人也或曰謙遜自以其徳不足爲嗣也正月上日受終于文祖上日朔日也葉氏曰上旬之日曽氏曰如上戊上丁之類未詳孰是受終者堯於是終帝位之事而舜受之也文祖者堯始祖之廟未嘗所指爲何人也在璿璣玉衡以齊七政在察也羙珠謂之璿璣機也以璿餙璣所以象天體之運轉也衡横也謂衡簫也以玉爲管横而設之所以窺璣而察七政之運行猶今之渾天儀也齊猶審也七政日月五星也七者運行於天有遲有速有順有逆猶人君之有政事也言舜𥘉攝位乃察璣衡以審七政之所在以起渾天儀晋天文志云言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜絶無師說不知其狀如何周􅙼之術以爲天似覆盆盖以斗極爲中中髙而四邊下日月旁行遶之日近而見之爲晝日逺而不見爲夜蔡邕以爲考驗天象多所違失渾天說曰天之形狀似鳥夘地居其中天包地外猶夘之裏黄圓如弹丸故曰渾天言其形體渾渾然也其術以爲天半覆地上半在地下其天居地上見有一百八十二度半強地下亦然北極去地上三十六度南極入地亦三十六度而嵩髙正當天之中極南五十五度當嵩髙之上又其南十二度爲夏至之曰道又其南二十四度爲春秋分之日道又其南二十四度爲冬至之日道南下去地三十一度而巳是夏至日北去極六十七度春秋分去極九十一度冬至去極一百一十五度此其大率也其南北極持其兩端其天與日月星宿科而廻轉此必古有其法遭秦而㓕至漢武帝時落下閎始經營之觧于妄人又量度之至宣帝時耿夀昌始鑄銅而爲之象衡長八尺孔徑一寸璣徑八尺圓周二文五尺強轉而望之以知日月星辰之所在即此璿璣玉衡之遺法蔡邕以爲近得天體之實者也洗括曰舊法規環一靣刻周天度一靣加銀丁盖以夜候之天晦不可目察則以手切之也古人以璿餙璣疑亦爲此今按此以漢法逆推古制然歴代以來其法漸宻本朝因之爲儀三重其在外者曰六合儀平置單環上刻十二辰八十四偶在地之位以凖地而靣定四方側立黒雙衆具刻去極度數以中分天脊直跨地平使其半出地上半入地下而結於其子午以爲天經斜倚赤單環具刻赤道度數以平分天腹横鐃天經亦使半岀地上半入地下而結於其卯酉以爲天緯二環表裏相結不動其天經之環則南北二極皆爲圓軸虚中而内向以挈三辰四遊之環以其上下四方於是可考故曰六合次其内日三辰儀側立黒雙環亦刻去極度數外貫天經之軸内挈黄赤二道其赤道則爲赤單環外依天緯亦刻宿度而結於黑雙環之夘酉其黄道則爲黄雙環亦刻宿度而又斜倚於赤道之腹以交結於卯酉而半入其内以爲春分後之日軌半出其外以爲秋分後之日軌又爲白單環以承其交使不傾垫下設機輪以水激之使其日夜随天東西運轉以爲象天行以其日月星辰於是可考故曰三辰其最在内者曰四逰儀亦爲黒雙環如三辰儀之制以貫天經之軸其環之内則兩靣當中各施直距外跬損兩軸而當其要中之内又爲小􅑆以受玉衡要中之小軸使衡旣得随環東而運轉又可随處南北低昴以待占候者之仰窺焉以其東西南北無不周徧故曰四逰此其法之大畧也暦家之說又以北斗魁四星爲機礿三星爲衡今詳經文簡質不應北斗二字乃用寓名恐未必然姑存其說以廣異聞肆類于上帝禋于六宗望于山川徧于羣神肆遂也類禋望皆祭名周禮肆師類造上帝生云郊祀者祭昊天之常祭非常祀而祭告于天其禮依郊祀爲之故曰類如泰誓武王伐啇王制言天子將出皆云類于上帝是也上帝天也禋精意以享之謂六宗宗尊也所尊祭者其祀有六祭法曰理少牢於㤗昭祭時也相近於坎壇祭寒暑也王宫祭日也夜明祭月也幽宗祭星也雩宗祭水旱也山川名山大川五嶽四瀆之屬望而祭之故曰望徧周徧也羣神謂丘陵墳衍古昔聖賢之類言受其秩次而就祭之也秩者其牲幣祝號之次第如五嶽視三公四瀆視諸侯其餘視伯子男者也東后東方之諸侯也時謂四時月謂月之大小日謂日之甲乙其法畧見上篇諸侯之國其有不同者則恊而合之也同審而一之也律謂十二律也六律爲陽黄鍾大簇姑洗𬎼賔夷則無射六吕爲隂大吕夾鍾仲吕林鍾南吕應鍾凡十二管皆徑三分有竒空圍九分而黄鍾之長九寸大吕以下律吕相間以次而短至應鍾而極焉以之制樂而節音聲則長者聲下短者聲髙下者則重濁而舒遲上者則輕清而剽疾以之審度長短則九十分黄鍾之長一爲一分而十分爲寸十寸爲尺十尺爲丈十丈爲引以之審量而量多少則黄鍾之管其容子糓秬黍中者一千二百以爲􅕛而十龠爲合十合爲升十升爲斗十斗爲斛以之平衡而權輕重則黄鍾之􅕛所容千二百黍其重十二銖兩􅕛則二十四銖而爲兩十六兩爲斤三十斤爲鈞四鈞爲石此黄鍾所以爲萬事根本諸侯之國所用有不同者則審而一之也時月之差由積日而成其法則先粗而後精度量衡受法於律其法則先本而後末故言正日在恊時月之後同律在度量衡之先立言之叙盖如此也五禮吉㓙軍賔嘉也脩之所以同天下之風俗也五玉五等諸侯所執者即五瑞也三帛諸侯世子執纁公之孤執玄附庸之君執黄二生卿執羔太夫執鴈一死士執雉五玉三帛二生一死所以爲贄而見者此九字當在肆覲東后之下恊時月正日之上誤脫在此言東后之覲皆執此贄也如五器劉侍講曰如同也五器郎五禮之器也周禮曰王之所以撫邦國諸侯者七歳屬象胥諭言語恊辭命九歲屬瞽史喻書名聴聲音十有一歲達瑞節同度量成牢禮同數器修法則十有二歲王廵守殷國大畧亦類此盖因虞夏之禮而損益之故其先後詳畧有不同耳卒乃復者舉祀禮覲諸侯一正朔同制度修五禮如五器數事皆畢則不復東行而遂西向且轉而南行也南嶽衡山西嶽華山北嶽恒山二月東五月南八月西十一月北各以其時也格至也至于其廟而祭告也藝祖疑即文祖或曰文祖藝祖之所自出不知何据今未有考也特特牲也謂一牛也古者君將出必告于祖禰歸又至其廟而告之孝子不忍死其親出告反靣之義也王制曰歸格于祖襧鄭注曰祖下及禰皆一牛程氏以爲但言藝祖者舉尊耳實皆告也但止就祖廟共同一牛不如時祭各設主於其廟也二說未知孰是今兩存之五載一廵守羣后四朝敷奏以言明試以功車服以庸五載之内天子廵守者一諸侯來朝者四盖廵守之明年則東方諸侯來朝于天子之國又明年則南方之諸侯來朝又明年則西方之諸侯來朝又明年則北方之諸侯來朝又明年則天子復廵守是則天子諸侯雖有尊卑而一徃一來禮無不笞是以上下交通而逺近治和也敷陳奏進也周禮日民功曰庸程氏曰敷奏以言者使各陳其爲治之說言之善則明考其功有功則賜車服以旌其功也其言不善則亦有以告飾之也林氏曰天子廵守則有恊時月以下等事諸侯來朝則有敷奏以言以下等事肇十有二州封十有二山濬川肇始也十二州冀兖青徐揚荆豫梁雍幽并营也古者中國之地但爲九州曰冀兖青徐揚荆豫梁雍禹治水作貢亦因其舊大河以内爲冀州而帝都在焉及舜即位以冀青地太廣始分冀東恒山之地爲并州又分東北醫無閭之地爲幽州又分青之東北遼東等處爲營州而冀州止有河内之地今河東一路是也封表也封十二山者每州封表一山以爲一州之鎮如職方氏言楊州其山鎮曰㑹稽之類濬川濬導十二州之川也然舜既分十有二州而至啇時又但言九圍九有周禮職方氏亦正辨九州之域有揚荆豫青兖雍幽冀并而無徐梁營則是爲十二州盖不甚乆不知其自何時復合爲九也象以典刑流宥五刑鞭作官刑扑作教刑金作贖刑青災肆赦怙終賊刑欽哉欽哉惟刑之恤哉象如天之垂象示人也典常也示人以常刑所謂墨劓剕宫大辟五刑之正也所以待夫元惡大懟殺人傷人穿踰滛邪凡罪之不可宥者也流流遣之使逺去如下文流放竄殛之類也宥寛也所以待夫罪之稍輕雖入於五刑而情可矝法可疑與夫親貴勲勞而不可加以刑者則以此而寛之也鞭木未垂革官刑官府之刑也朴夏楚也教刑學校之刑也皆以待夫罪之輕者也金罰其金也贖贖其罪也所以待夫罪之極輕雖入於鞭朴之刑而情法說者以窮竒爲共工渾敦爲驩兠饕餮爲三苗檮杌爲鯀不知其果然否也二十有八載帝乃殂落百姓如喪考妣三載四海遏宻八音殂落死也死者䰟氣歸于天故曰殂體魄歸于地故曰落喪爲之服也遏絶宻静也八音金石絲竹匏土革木也皆樂器也古者謂畿内之民與列國諸侯爲天子服斬衰三年海内之民則不爲服唯堯聖徳廣大恩澤隆厚又能譲舜爲天下得人故海内之民思慕之深至於如此也按堯十六即位在位七十載又試舜三載老不聴政二十八載乃崩在位通計一百單一年儀禮圻内之民爲天子齊衰三月圻外之民無服今應服三月者如䘮考妣應無服者遏宻八音月正元日舜格于文祖月正即正月也元日朔日也月正猶月朔謂之朔月月吉謂之吉月也孔氏曰舜服䘮三年畢將即政故復至文祖廟吿受終告攝此告即位也按春秋國君皆以遭䘮之明年正月即位於廟而改元此云䘮畢之明年不知何所據也詢于四岳闢四門明四目逹四聦詢謀闢開也舜既告廟即位乃謀政治于四岳之宫開四方之門以受天下之朝貢廣四方之見聴以决天下之壅蔽也咨十有二牧曰食哉惟時柔逺能邇惇徳允元而難任人蠻夷率服牧養民之官十二牧十二州之牧也王政以食爲首農事以時爲先舜言足食之道惟在於不違農時也柔者寛而撫之能者擾而習之逺近之勢如此先務其畧而後致其詳也惇厚允信也徳有徳之人也元仁厚之人也難拒絶也任古文作壬包藏凶惡之人也言當厚信有徳仁人而拒絶姦惡也凡此五者處之各得其冝則不特中國順治雖蠻夷之國亦當相率而服從矣舜曰咨四岳有能奮庸熈帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉禹拜稽首譲于稷契暨皐陶帝曰愈汝徃哉奮起熈廣載事亮明惠順疇類也一說亮相也舜言有能奮起事功以廣帝堯之事者使居百揆之位以時亮庻事而順成庶類者乎僉衆也四岳所領四方諸侯時有在朝者也禹崇伯鯀之子四岳及諸侯言伯禹見作司空可宅百揆也時是懋勉也平水七者司空之軄是則指此百揆之事而言也帝然其舉而咨禹使仍作司空而兼行百揆之事録其舊績而勉其新功也以司空兼百揆如周以六卿兼三公後世以他官平章事知政事之比稽首首至地暨及也稷契二臣皆帝嚳之子稷名弃姓姫氏封於邰契姓子氏封於啇皐陶亦臣名也俞者然其舉汝徃哉者不聴其譲也此時稱舜曰以見自此以上稱帝者皆堯也自此以下稱帝者乃舜也則堯老之時舜未嘗稱帝亦可見矣帝曰棄黎民阻飢汝后稷播時百糓阻厄也后君也謂有邰之君也如所謂三后后䕫皆有爵土之稱也稷田正官播布也糓非一種故曰百糓此因禹之譲而申命之使仍舊職以終其事也帝曰契百姓不親五品不遜汝作司徒敬敷五教在寛親相親睦也五品父子君臣夫婦長㓜朋友五者之名位等級也遜順也司徒掌教之官敷布也五教父子有親君臣有義夫婦有别長㓜有序朋友有信以五者當然之理而爲教令也敬敬其事也聖賢之於事無所不敬而此又事之大者故特以敬言之寬者寛裕以待之也盖五者之理出於人心之本然非有強而後能者自其拘於氣質之偏溺於物慾之蔽始有昩於其理而不相親愛不相遜順者於是因禹之譲又申命契仍爲司徒使之敬以敷教而又寛𥙿以待之欲其優柔浸漬以漸而入則其天性之真自然呈露不能自巳而無迫切虚僞免而無恥之患矣孟子所引堯言勞來匡直輔翼使自得之又從而振徳之亦此意也帝曰皐陶蠻夷猾夏㓂賊姦宄汝作士五刑有服五服三就五流有宅五宅三居惟明克允猾亂夏明而大也曽氏曰中國文明之地故曰華夏四時之夏疑亦取此義也刼人曰㓂殺人曰賊在外曰姦在内曰宄士理官也服服其罪也吕刑所謂上服下服是也三就孔氏以爲大罪於原野大夫於朝士於市不知何據竊恐惟大辟弃之於市宫辟則下𧖟室餘刑亦就屏處盖非死刑不欲使風中其瘡誤而至死聖人之仁也五流五等象刑之當宥者也五宅三居者流雖有五而宅之但爲三䓁之居如列爵惟五而分土惟三也孔氏以爲大罪居於四裔次則九州之外次則千里之外雖亦未見其所據然大槩當畧近之此亦因禹之讓而申命之又戒以必當致其明察乃能使刑當其罪而人無不服也帝曰疇若予工僉曰垂哉帝曰咨垂汝共工垂拜稽首讓于殳斨曁伯與帝曰俞徃哉汝諧若言順其理而治之也曲禮六工有士工金工石工木工獸工草工周禮有攻木之工攻金之工攻皮之工設色之工刮摩之工搏埴之工皆是也帝問誰能順治予百工之事者垂臣名有巧思莊子曰攦工垂之指即此也其工官名共供也言供其事也殳斨伯與二臣名也徃哉汝諧言汝能和其職不聴其讓也帝曰疇若予上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞益拜稽首譲于朱虎熊羆帝曰俞徃哉汝諧上下山林澤藪也虞掌山澤之官也周禮分爲虞衡屬於夏官益臣名也髙辛氏之子有曰仲虎仲熊太史公曰朱虎熊罷爲伯益之佐前殳斨伯與當亦爲垂之佐也殳以積竹爲兵建於兵車者斨方銎斧也古者多以其所能爲名二人豈能爲二器者與帝曰咨四岳有能典朕三禮僉曰伯夷帝曰咨伯汝作秩宗夙夜惟寅直哉惟清伯拜稽首讓于䕫龍帝曰俞徃欽哉典主也三禮祀天神享人鬼祭地祗之禮也伯夷臣名姜姓秩序也宗祖廟也秩宗盖序次百神之官而專以秩宗名之者盖以宗廟爲主也周禮亦謂之宗伯而都家皆有宗人之官以掌祭祀之事亦此意也夙早寅敬畏也直者心無私曲之謂人能敬以直内不使少有私曲則其心絜清而無物欲之汚可以交於神明矣䕫龍二臣名帝曰䕫命汝典樂教胄子直而温寛而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和夔曰於予撃石拊石百獸率舞胄長也自天子至卿大夫之適子也栗荘敬也凡人直者必不足於温故欲其温寛者必不足於栗故欲其栗皆所以因其徳性之善而輔翼之也剛者必至於虐故欲其無虐簡者必至於傲故欲其無傲皆所以防其氣禀之過而矯揉之也所以教冑子者欲其如此而所以教之之具則又專在於樂如周禮大司樂掌成均之法以教國子弟而孔子亦曰興於詩成於樂盖所以蕩滌邪穢斟酌飽滿動盪血脉流通精神養其中和之徳而救其氣質之偏者也心之所之謂之志心有所之必形於言故曰詩言志旣形於言則必有長短之節故曰歌永言旣有長短則必有髙下清濁之殊故曰聲依永聲者宫啇角徴羽也大抵歌聲長而濁者爲宫以漸而清且短則爲啇爲角爲徵爲羽所謂聲依永也旣有長短清濁則又必以十二律者和之乃能成文而不亂假令黄鍾爲宫則太簇爲啇姑洗爲角林鍾爲徴南吕爲羽盖以三分損益隔八相生而得之餘律皆然即禮運所謂五聲六律十二管還相爲宫所謂律和聲也人聲旣和乃以其聲𬒳之八音而爲樂則無不諧恊而不相侵亂失其倫次可以奏之朝廷薦之郊廟而神人以和矣聖人作樂以養情性育人材事神祗和上下其體用功效廣大深切如此今皆不復見矣可勝嘆哉䕫曰以下則蘇氏曰舜方命九宫濟濟相譲無縁夔於此獨言其功此益稷之文也簡編脫誤復見於此帝曰龍朕堲纔說殄行震驚朕師命汝作納言夙夜出納朕命惟允堲疾殄絶也殄行者謂傷絶善人之事也師衆也謂其言之不正而能變亂黒白以駭衆聴也納言官名命令政教必使審之旣允而後出則纔說不得行而矯僞無所託矣敷奏復逆必使審之旣允而後入則邪辟無自進而功緒有所稽矣周之内史漢之尚書魏晉以來所謂中書門下者皆此職也帝曰咨汝二十有二人欽哉惟時亮天功二十二人四岳九官十二牧也周官言内有百揆四岳外有州牧侯伯盖百揆者所以綂庶官而四岳者所以綂十二牧也旣分命之又緫吿之使之各敬其職以相天事也曽氏曰舜命九官新命者六人命伯禹命伯夷咨四岳而命之者也命垂命益泛咨而命者也命夔命龍因人之讓不咨而命者也夫知道而後可宅百揆知禮而後可典三禮知道知禮非人人之所能也故必咨於四岳若予工若上下草木鳥獸則非此之比故泛咨而巳禮樂命令其體雖不若百揆之大然其事理精㣲亦非百工庶物之可比伯夷旣以四岳之舉而當秩宗之任則其所讓之人必其中於典樂納言之選可知故不咨而命之也若稷契臯陶之不咨者申命其舊職而巳又按此平水土若百工各爲一官而周制同領於司空此以士官兼兵刑之事而周禮分爲夏秋兩官盖帝王之法随時制冝所謂損益可知者如此三載考績三考黜陟幽明庶績咸熈分北三苗考核實也三考九載也九載則人之賢否事之得失可見於是陟其明而黜其幽賞罰明信人人力於事功此所以庶績咸熈也北猶背也其善者留其不善者竄徙之使分背而去也此言舜命二十二人之後立此考績黜陟之法以時舉行而卒言其效如此也按三苗見於經者如典謨益稷禹貢吕刑詳矣盖其負固不服乍臣乍叛故治水之際三危巳宅而猶有不即工者及禹攝位之後帝命徂征而猶逆命及禹班師而後來格於是乃得考其善惡而分北之也吕刑之言遏絶則通其本末而言不可以先後論也舜生三十徴庸三十在位五十載陟方乃死徴召也陟方猶言升遐也韓子曰竹書紀年帝王之沒皆日陟陟昇也謂昇天也書曰殷禮陟配天言以道終其徳恊天也故書紀舜之沒云陟其下言方乃死者所以釋陟爲死也地之勢東南下如言舜巡守南方而死冝言下方不得言陟方也按此得之但不當以陟字爲句絶耳方猶云徂乎方之方陟方乃死猶言殂落而死也此言舜生而側㣲至三十年堯乃召而用之歴試三年居攝二十八年通三十一年乃即帝位又五十年而崩盖於篇末緫叙其始終也大禹謨林氏曰虞史旣述二典而其所載有未盡者於是又叙其君臣之間嘉言善政以爲大禹皐陶謨益稷三篇所以備二典之未備者古文有今文無曰若稽古大禹曰文命敷于四海祗承于帝謨謀也命教祗敬也帝謂舜也文命敷四海者即禹貢所謂東漸西𬒳朔南曁聲教訖于四海者是也史臣言禹旣巳布其文教於四海矣於是陳其謨以敬承于舜如下文所云也文命王氏以爲禹號蘇氏曰非也以文命爲禹號則敷于四海者爲何事耶吴氏曰此書不專爲大禹而作此十七字當是後世模放二典爲之皐陶謨篇首九字亦類此今按此篇稽古之下猶賛禹徳而後便記皐陶之言其體亦不相類吴氏之說恐或然也曰后克艱厥后臣克艱厥臣政乃乂黎民敏徳曰以下即禹祗承于帝之言也艱難也孔子曰爲君難爲臣不易即此意也乃者難辭也敏速也曰徳者言其徳化之深也禹言君而不敢易其爲君之道臣不敢易其爲臣之職夙夜祗懼各務盡其所常爲者則其政事乃能修治而無邪慝下民自然觀感速化於善而有不容巳者矣帝曰俞允若茲嘉言罔攸伏野無遺賢萬邦咸寕稽于衆舎巳從人不虐無告不廢困窮惟帝時克嘉善攸所也無告困窮也帝謂堯也舜然禹之言以爲信能如此則必有以廣延衆論悉致羣賢而天下之民皆𬒳其澤無不得其所矣然非忘私順理愛民好士之至無以及此而惟堯能之非常人所及也盖爲謙辭以對而不敢自謂其必能舜之克艱於此亦可見矣程氏曰舍巳從人最爲難事巳者我之所有雖痛舎之猶懼守巳者固而從人者輕也益曰都帝徳廣運乃聖乃神乃武乃文皇天眷命奄有四海爲天下君都嘆羙之辭也都者君子之居鄙者野人之居故古者謂野爲鄙謂都爲羙也廣者大而無外運者行之不息大而能運則變化不測故自其大而化之而言則謂之聖自其聖而不可知而言則謂之神自其威之可畏而言則謂之武自其英華發外而言則謂之文眷顧奄盡也堯之𥘉起不見於經傳稱其自唐侯特起爲帝觀益之言理或然也或曰舜之所謂帝者堯也羣臣之言帝者舜也如帝徳罔愆帝其念哉之類皆謂舜也盖益因舜尊堯而遂羙舜之徳以勸之言不特堯能如此帝亦當然也今按此說所引此類固爲有理但益之語接連上句惟帝時克之下未應遽舍堯而譽舜又徒極口以譽其羙而不見其勸勉規戒之辭恐唐虞之際未遽有此䛕侫之風也只依舊說賛堯爲是禹曰惠迪吉從逆㓙惟影響迪道也字本訓由故又以爲所當由之道也言天道無常随人所行之順逆而應之以禍福猶影響形聲以終上文之意見所以不可不艱者以此益曰吁戒哉儆戒無虞罔失法度罔逰于逸罔淫于樂任賢勿貳去邪勿疑疑謀勿成百志惟熈罔違道以于百姓之譽罔咈百姓以從巳之欲無怠無荒四夷來王先吁後戒欲使聽者精審敬與警同古文作敬開元改今文虞度也言當儆戒於無虞度之時謂戒於無形也罔勿也法度法則制度滛過也當四方無可虞度之時法度易至廢弛故戒其失墜逸樂易至縱恣故戒其逰淫言此三者所當敬畏也任賢以小人間之謂之貳去邪而不能果斷謂之疑謀圖爲也成成就也言有所圖爲揆之於理而未安者則不復成就之也百志猶易所謂百慮也咈逆也九州之外世一見曰王帝於是八者朝夕戒懼無怠於心無荒於事則治道益隆四夷之逺莫不歸徃中土之民服從可知今按益之言如此亦有次第盖人君能守法度不縱逸樂則心正身脩義理昭著而於人之賢否就爲可任孰爲可去事之是非孰爲可疑孰爲不可疑皆有以審其㡬㣲絶其蔽惑故方寸之間光輝明白而於天下之事孰爲道義之正而不可違孰爲民心之公而不可咈皆有以處之不失其理而毫髪私意不入於其間此其懲戒之深㫖所以推廣大禹克艱惠迪之謨也苟無其本而是非取舎失於一巳之私乃欲斷而行之無所疑惑則其爲害反有不可勝言者矣可不戒哉禹曰於帝念哉徳惟善政政在飬民水火金木土糓惟修正徳利用厚生惟和九功惟叙九叙惟歌戒之用休董之用威勸之以九歌卑勿壊於歎羙之辭也益言儆戒之道禹嘆而羙之因謂所以如是而修其徳者將欲以善其政也而爲政之道不在乎他特在乎飬民而巳水火金木土糓惟修者以水克火以火克金以金克木以木克土而生五穀或相制以洩其過或相助以𥙷其不足而六者無不修矣正徳者父慈子孝兄友弟恭夫義婦聴所以正民之徳也利用者工作作器啇通貨財之類所以利民之用也厚生者衣帛食肉不飢不寒之類所以厚民之生也六者旣脩則民生畧遂而不可以逸居而無教故爲之惇典敷教以正其徳通工易事以利其用制節謹度以厚其生使皆當其理而無所乖則無不和矣葛氏曰洪範五行水火木金土百糓本在木行之類以其爲民食之急故别而附之九功合六與三也惟叙者言九者各順其理而不汩陳以亂其常也九叙惟歌者則以九功之叙而詠之歌也言九者旣巳修和各由其理民享其利莫不歌詠而樂其生也然始勤終怠者人情之常恐安養旣乆怠心必生則巳成之功不能保其乆而不廢故當有以激勵之如下文所云也董督也威古文作畏其勤於是者則戒喻而休羙之其怠於是者則督責而懲戒之然又以事之出於勉強者不能乆故復即其前日歌詠之言恊之律吕播之聲音用之郷人用之邦國以勸相之使其歡欣鼓舞趨事赴功不能自巳而前日之成功得以乆存而不壊此周禮所謂九徳之歌九韶之舞而太史公所謂逸能思𥘉安能惟始沐浴膏澤而歌詠勤苦者也帝曰俞地平天成六府三事允治萬世永頼時乃功水土治曰平言水土旣平而萬物得以成遂也六府即水火金木土糓也六者財用之所自出故曰府三事正徳利用厚生也三者人事之所當爲故曰事舜因禹言飬民之政而推其功以羙之也帝曰格汝禹朕宅帝位三十有三載耄期倦于勤汝惟不怠緫朕師九十曰耄百年曰期舜至是年巳九十三矣緫率也舜自言旣老血氣巳衰故倦於勤勞之事而汝乃能不怠於其職故命之以攝帝位而率衆臣也堯命舜曰陟帝位舜命禹曰緫朕師者盖堯欲使舜真宅帝位舜讓弗嗣後惟居攝緫堯之衆爾未能遽宅帝位也故其命禹亦若是而巳禹曰朕徳罔克民不依皐陶邁種徳徳乃降黎民懐之帝念哉念茲在茲釋茲在茲名言茲在茲允岀茲在茲惟帝念功邁勇徃力行之意種布降下也禹自言其徳不能勝任民不依歸惟皐陶勇徃力行以布其徳其徳下及於民而民懐服之宜使攝位帝當思念之而不忘也茲指皐陶也禹遂言我念其可以率帝之衆者惟在於皐陶舎皐陶而求之亦無能及之者則是亦惟在於皐陶耳又言名言於口者以爲惟在於皐陶而允岀於心者亦以爲惟在於皐陶盖反覆思之而卒無有以易於皐陶者惟帝深念其功而使之攝位也舜命禹宅百揆而禹讓稷契皐陶此不及稷契者史記載稷契皆帝嚳之子與堯爲兄弟意其至是必巳不復存矣帝曰皐陶惟兹臣庶罔或干予正汝作士明于五刑以弼五教期于予治刑期于無刑民恊于中時乃功懋哉干犯正政弼輔也聖人之治以徳爲化民之本而刑特以輔其所不及者而巳期者先事而取必之謂舜言皐陶能明五刑以輔五品之教而期我以至於治故其始雖不免於用刑而實所以期至於無刑之地今乃臣庶罔干予正而民情又皆合於中道無有過不及之差焉則刑果無所施矣凡此皆汝之功盖不聴禹之譲而稱皐陶之羙以勸勉之也皐陶曰帝徳罔愆臨下以簡御衆以寛罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經好生之徳洽于民心茲用不犯于有司愆過也簡者不煩之謂上煩宻則下無所容御急促則衆擾亂嗣世皆謂子孫然嗣親而世䟽也延逺及也父子罪不相及而賞則逺延于後其善善長而悪惡短如此過者不識而誤犯也故者知之而故犯也過誤所犯雖大必宥不忌故犯雖小必刑即上篇所謂眚災肆赦怙終賊刑者也罪巳定矣而於法之中有疑其或輕或重者則從輕以治之功巳成矣而於法之中有疑其或輕或重者則從重以賞之辜罪經常也謂罪之輕重未明而可以殺可以無殺者欲殺之則恐其實無可殺之罪而䧟於無辜不殺之則恐其實有不常之罪而失於不殺二者皆非聖人至公至平之意而殺不辜者尤聖人之心所不忍也故與其殺之而害𬒳之生寧姑全之自受失刑之責此其仁愛忠厚之至皆所謂好生之徳也盖聖人之法有盡而心則無窮故其用刑行賞而有所疑則常屈法以申恩而不使執法之意有以勝其好生之徳此其本心所以無所壅遏而得以行於常法之外及其流衍洋溢漸􅉼浸漬有以入于民心則天下之人無不愛慕感悅興起於善而自不犯于有司也皐陶以舜羙其功故言此以歸功於其上盖不敢當其褒羙之意而自謂巳功也帝曰俾予從欲以治四方風動惟乃之休民不犯法而上不用刑者舜之所欲也汝能使我如其所願以至于治教化之行如風鼓動莫不靡然是乃汝之羙也舜又申言以重歎羙之帝曰來禹降水儆予成允成功惟汝賢克勤于邦克儉于家不自滿假惟汝賢汝惟不矜天下莫與汝争能汝惟不伐天下莫與汝爭功予懋乃徳嘉乃丕績天之歴數在汝躬汝終陟元后降水洪水也古文作洚孟子日水逆行謂之洚水盖山崩水渾下流淤塞故其逝者輙復反流而泛濫泱溢洚洞無涯也其災所起雖在堯時然旣舜攝位害猶未息故舜以爲天警懼於巳不敢以爲非巳之責而自寛也允信也言禹自許能任治水之責而果能治之是能成其信也成功謂水患旣平而九功皆叙也禹能如此則旣賢於人矣而又能勤於王事儉於私飬此又禹之賢也有此二羙而又能不矜其能不伐其功然其功能之實則自有不可揜者故舜於此復申命之必使攝位也懋宜作㮊盛大之意此作懋者乃訓勉爾盖古字亦通用也徳指其克勤儉不矜伐而言丕大績功也指其成允功而言懋乃徳者彼有是徳而我以爲盛大嘉乃績者彼有是功而我以爲嘉羙也歴數者帝王相繼之次第猶歳時氣節之先後也言汝有此盛徳大功故知曆數當歸於汝汝終當升此大君之位言其不可辭也是皆舜方命禹以居攝未即天位故以終陟言也人心惟危道心惟㣲惟精惟一允執厥中心者人之知覺主於身而應事物者也指其生於形氣之私者而言則謂之人心指其發於義理之公者而言則謂之道心人心易動而難反故危而不安義理難明而易昧故㣲而不顯惟能省察於二者公私之間以致其精而不使其有毫釐之雜持守於道心㣲妙之夲以致其一而不使其有頃刻之離則其日用之間思慮動作自無過不及之差而信能執其中矣堯之告舜但曰允執厥中而舜之命禹又推其本末而詳言之盖古之聖人將以天下與人未嘗不以其治之之法并而傳之其可見於經者不過如此後之人君其可不深畏而敬守之哉無稽之言勿聽弗詢之謀勿庸無稽者不考於古弗詢者不咨於衆言之無據謀之自專是皆一人之私心必非天下之正論皆妨政害治之大者也言謂泛言勿聴可矣謀謂謀事故又戒其勿用也上文旣言存心出治之本此又告之以聴言處事之方内外相資兩得其要而治道備矣可愛非君可畏非民衆非元后何戴后非衆罔與守邦欽哉慎乃有位敬修其可碩四海困窮天禄永終惟口出好興戎朕言不再此言可愛者君而可畏者民也君之所以可愛者以衆非君則無以奉戴而至於亂也民之所以可畏者以君非民則無與守邦而爲獨夫也故爲人君者當自警戒以謹守其所居之位修其所碩欲之事欲其有以常保其位永爲下民之所愛戴而不至於危亡也若不恤其民使其至於困窮則天命去之一絶而不復續矣豈人君之所碩欲也哉此又極言安危存亡之戒以深警之雖知其功徳之盛必不至此然猶欲其戰戰兢兢無敢逸豫而謹之於毫釐之間此其所以爲聖人之心也好和好也戎兵戎也盖言發於口則有二者之分故戒之命汝其慮巳審矣豈容復有他說乎禹曰枚卜功臣惟吉之從帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮恊從卜不習吉禹拜稽首固辭帝曰毋惟汝諧正月朔旦受命于神宗率百官若帝之𥘉枚卜謂歴卜之舜之所言人事巳盡禹不容復辭故請歴卜有功之臣而從其吉冀自有當之者而巳得遂其辭也官掌卜筮之官也蔽斷昆後也習吉重得吉卜也盖言卜筮之官占事之法先斷其志之所向然後合之於龜若我之志巳定而衆謀又恊則鬼神其必依據龜筮無不恊從矣况卜筮之法不待習吉今又何用更待枚卜再得吉兆乃爲可乎再辭曰固毋禁止之辭正月次年正月也神宗說者以爲舜祖顓頊而宗堯因以神宗爲堯廟未知是否如帝之𥘉即上篇所記齊七政修羣祀朝諸侯等事也金縢說金縢此篇之作在周公東征而歸之後以其記武王時事且備東征本末故叙之於此旣克商二年止王翼日乃瘳此叙周公請命之事武王旣喪此以下記周公成王時事管叔及其羣弟止不利於孺子此即大誥所謂三監及淮夷叛也意其稱兵舉事必以誅周公爲辭若王敦之於劉隗刀恊爾詩序所謂周公遭變陳后稷先公風化之所由而作七月之詩以陳王業風喻成王者盖此時也周公乃告二公曰止告我先王作大誥遂東征周公居東二年則罪人斯得殺武庚致辟管叔于商囚蔡叔于郭鄰降霍叔于庶人命㣲子啓伐殷後作㣲子之命皆此時事國於豳十世至大王避狄人之難於岐山之下文王遷于豐武王遷于鎬邰在漢右扶風斄縣豳在栒邑縣豳郷岐在羙陽縣岐山豐在鄠縣東豐水鎬在長安西南昆明池所謂鎬波也岐在邰西北無百里豳又在岐西北四百餘里豐在岐山東南二百餘里鎬在豐東二十五里王氏曰成王欲宅洛者以天事言之則日東景朝多陽日西景夕多隂日南景短多暑日北景長多寒洛天地之中風雨之所㑹隂陽之所和也以人事言則四方朝聘貢賦道里均焉非特如此而巳懲三監之難毖殷頑民遷以自近洛距妹邦爲近則易使之遷作王都焉則易以鎮服也雖然鎬京宗廟社稷官府宫室具在不可遷也故於洛時㑹諸侯而巳何以知其如此以詩考之宣王時㑹諸侯於東都而車攻謂之復古召誥惟二月旣望林曰漢志曰周公攝政七年二月乙亥朔庚寅望越六日乙未王朝步自周則至于豐傳曰於巳後六日乙未成王自鎬京至豐以遷都事告文王廟惟太保先周公相宅傳曰太保三公官名召公也越若來三月惟丙午朏傳曰朏明也月三日明生之名林曰漢志曰是年三月甲長朔三日丙午與上旣望同意劉諌議曰越與奥同奥若發語聲也來三月猶言明月也越三日戊申太保朝至于洛卜宅厥旣得卜則經營傳曰三月五日也葉曰周官太卜國大遷大師則貝龜傳曰經營規度其城郭郊廟朝市之位處王氏曰經其南北而四營之也越三日庚戌太保乃以庶殷攻位于洛汭越五日甲寅位成洛汭洛北之水䟽曰庚戌三月七日甲寅三月十一日也庶殷民也葉曰攻位者闢荆棘平髙下以定所經營之位也若翼日乙卯周公朝至于洛則逹觀于新邑營傳曰翼明也䟽曰十一日也蘇氏曰遍觀所營也按後篇是日再卜越三日丁巳用牲于郊牛二傳曰告立郊社位於天以后稷配故牛二耳䟽又曰十四日也越翼日戊午乃社于新邑牛一羊一豕一傳曰告立社稷之位用太牢也社稷共牢䟽曰十五日也禮成廟則釁之故其釁之禮歟廟有土木之工故郊社先成而釁之此間當有吿卜事越七日甲子周公乃朝用書命庶殷侯甸男邦伯䟽曰二十一日也書賦功屬役之書也侯服甸服男服之邦伯不及采衛者不以逺役衆也王氏曰周公以書命邦伯而邦伯以公命命諸侯也厥旣命殷庶庶殷丕作傳曰大作言勸事太保乃以庶邦冢君出取幣乃復入錫周公曰拜手稽首旅王若公傳以爲王與公俱至文不見王無事故諸侯公卿至覲於王以下篇告卜事觀之恐不然也又云公至洛皆書其日以謹之不應詳臣畧君如此惟陳氏以爲旅陳也成王在鎬而諸侯在洛以幣陳於王以及周公者周公攝王事故也此說最善葉曰禮諸侯朝于廟旣畢出復束帛加壁入享謂之幣旣致于王復奉束帛以請覿大夫之私相見也亦謂之幣君臣不同時今旅王及公非常禮也誥告庶殷越自乃御事告庶殷諸侯及其御事而陳戒于王者所謂公事公言之王者無私也王時在鎬豈亦如告卜旣告而後遣使奉幣具此辭以告之與鳴呼皇天上帝改厥元子兹大國殷之命惟王受命無彊惟休亦無彊惟恤鳴呼曷其柰何弗敬元子者天之元子陳曰元子不可改而天改之大國未易亡而天亡之天命之無常如此今王受天命誠無彊之福然亦無彊之憂也其可不敬乎此數句者一篇之大指也天旣遐終大邦殷之命兹殷多先哲王在天越厥後王後民兹服厥命厥終知藏瘝在夫知保抱携持厥婦子以哀籲天徂厥亡出執鳴呼天亦哀于四方民其眷命用懋王其疾敬徳遐逺也遐終者去而不返之辭􅘃病也籲呼也天旣絶殷命矣此殷之𥘉多先哲王謂湯至武丁賢聖之君六七作也雖死而其精神在天故能保佑及其後王後民使之服其命而不替其後至紂之時賢智之人退藏病民之人在位其民困於虐政痛而呼天徃而逃亡岀見拘執天哀下民故眷命於能勉敬者以代殷位而周家受之故王不可不疾敬徳恐無以承天眷命又復如紂也朱子發云人之死各返其根體魄隂也故降而在下䰟氣陽也故升而在上則無不之矣衆人物欲蔽之故魄散而氣不能升惟聖人清明在躬志氣如神故其死也精神在天與天爲一葉曰智藏瘝在言至紂而愚其智則藏而獨病民之心存也籲和也言祈和於天也此與舊說不同相古先民有夏天迪從子保靣稽天若今時旣墜厥命今相有殷天迪格保靣稽天若今時旣墜厥命此一節間有不可曉處舊說有夏敬徳故天道亦降格以保之靣向也稽考也若順也嚮天所順而考其意也皆未知是否然亦不害大意言旣監于殷又當逺觀有夏歷代廢興存亡之迹不過敬徳順天則天保佑之後王不敬故墜其命也今冲子嗣則無遺夀耇曰其稽我古人之徳矧曰其有能稽謀自天巳陳夏啇敬徳墜命之所由又戒王也王氏曰勿棄老成又考古人之徳則善矣況曰能考謀自天則又善也必資老成陳曰老成人多識前言徃行故考古人善徳稽謀自天言觀天之命所去就則知敬徳之不可緩矣鳴呼有王雖小元子哉其丕能諴于小民今休王不敢後用顧畏于民碞蘇氏曰王雖㓜國之元子也其大能以誠感民矣當及今休其徳不敢後者疾教其徳不敢遲也用顧畏于民碞者碞險也民猶水也水能載舟亦能覆舟物無險於民者矣或曰元子謂天之元子也王來紹上帝自服于土中言王今又居洛邑繼天爲治服事也土中洛邑爲天下中也林氏以此句王來爲王亦至洛邑之驗恐未必然但王命來此定邑耳旦曰其作大邑其自時配皇天毖祀于上下其自時中乂王厥有成命治民今休稱周公言常作大邑而自此以祀上帝以及慎祀上下神祇又自此居中以爲治則是王受天成命以治民矣盖召公述周公宅洛之意王先服殷御事比介于我有周御事節性惟日其邁王敬作所不可不敬徳林曰周王遷殷頑民于洛盖與洛之舊民雜居其善悪之習不同事非有以和一之不能相安以處故必有以服殷御事使之親比介助於周之御事然後可盖周御事習於教令無事於服之故以服殷御事爲先也然服殷御事在節其徃而巳盖人性無不善殷人特化紂之悪是以不義之習遂與性成而忘反耳上之人有以節之使之日進于善則與周人亦何異哉然欲節民之性又在王之所化故王又當敬爲其所不可不敬之徳以率之非政刑所及也王氏以爲明政刑以節之不知道之言也或曰服亦事也猶任也任殷人爲御事使之佐我周之御事也盖欲其共事相習以成善且使上下相通情易以行化然後有以節其性而日進於善王則惟作所不可不敬徳以率之而巳我不可不監于有夏亦不可不監于有殷我不敢知曰有夏服天命惟有歴年我不敢知曰不其延惟不敬厥徳乃早墜厥命我不敢知曰有殷受天命惟有歴年我不敢知曰不其延惟不敬厥徳乃早墜厥命今王嗣受厥命我亦惟茲二國命嗣若功王氏曰言夏殷所受天命歴年長短我皆不敢知也我所敢知者惟不敬厥徳乃早墜厥命也陳曰召公言我王嗣二代而受命我亦惟以此二國長短之命告於王而繼其功盖欲王之敬徳也王乃𥘉服鳴呼若生子罔不在厥𥘉生自貽哲命今天其命哲命吉㓙命歴年王之𥘉服不可不慎其習猶子之𥘉生不可不慎其所教盖習于上則智習于下則愚矣故今天命正在𥘉服之時敬徳則哲則吉則永年不敬則愚則凶則短祚也知今我𥘉服宅新邑肆惟王其疾敬徳王其徳之用祈天永命天無一物之不體巳知我𥘉服宅洛矣王其可不疾敬徳哉所以求天永命者只在徳而巳矣其惟王勿以小民淫用非彛亦敢殄戮用乂民若有功其惟王位在徳元小民乃惟刑用于天下越王顯蘇氏曰啇俗靡靡其過用非常也乆矣召公戒王勿以小民過用非常之故亦敢於法外殄戮以治之盖民之有過罪實在我及其有功則王亦有徳何也王之位民徳之先倡也如此則法行天下而王亦顯矣或曰下文有欲王以小民受天永命以字如以其師之以此戒王勿用此小民淫用非彛而復以殄戮治之也言當正身事下不務刑罰其下乃與蘇說同葉曰刑儀刑也上下勤恤其曰我受天命蘇氏曰君臣一心以勤恤民庶㡬王受命歴年如夏殷且以人心爲天命也陳曰小民之心歸則受天永命矣林曰王能敬徳于上而小民儀刑於下則天求命之矣所謂用小民以受天命也拜手稽首曰子小臣敢以王之讎民百君子越友民保受王威命明徳王末有成命王亦顯蘇氏曰庶殷雖巳丕作然召公憂其間尚有反側自疑者故因其大和㑹而恊雖周之讎民殷之頑民與三監叛者友民周民也百君子者殷周之賢士大夫也自今以徃殷人周人與百君子皆同保受王之威徳主當終受天之成命顯于後世林曰讐民百君子猶頑民而謂之多士也我非敢勤惟恭奉幣用供王能祈天永命蘇氏曰我非敢以此爲動勞也奉幣以賛王祈天永命而巳王氏曰奉幣以供王毖祀上下而祈永命洛誥王氏曰此誥有不可知者當闕之而擇其有可知者召公旣相宅周公徃營成周蘇氏曰周人謂洛爲成周謂鎬爲宗周使來告卜王在宗周遣使告之作洛誥葉曰此篇當與召誥參見周公旣定遷都之議使召公先相宅度其所宜爲王城者召公旣卜洛而告則以商庶民畧定其位於洛汭故周公復至而再卜也此篇非一時播告之辭史取周公得卜至遣使吿卜相與徃來告戒本末序次之以示後世也洛誥蘇曰此處有簡脫在康誥曰惟三月哉生魄至洪大誥治下屬周公拜手之文周公拜手稽首曰朕復子明辟王氏曰復如復逆之復成王命周公徃營成周周公得卜復命于王曰子者親之也曰明辟者尊之也程氏曰猶言告嗣子王矣葉曰復如孟子有復於王之復王如弗敢及天基命定命予乃㣧保大相東土其基作民明辟周公不欲言王㓜不能故言王若不敢及天之𥘉命則我不得不嗣攝政事保佑王躬而相此洛邑以爲王當於此𥘉作民主也予惟乙卯朝至于洛師我卜河朔黎水我乃卜澗水東瀍水西惟洛食我乃卜瀍水東亦惟洛食乙卯即前至洛之日蘇氏曰黎水今黎陽也周公營洛今以處殷餘民民懐土重遷故以都河朔爲近便卜不吉然後卜洛也葉曰卜者先墨龜爲非而令之灼而兆順其墨謂之食墨求吉不過乎三旣卜黎水又卜澗水東又卜瀍水西則三矣皆曰惟洛食者以召公之卜而復以三地求吉皆不食而食洛是以卒從召公之卜爲定也傳以澗東瀍西爲王城宫室宗廟所在瀍東爲成周遷殷頑民之所諸儒多用其說而陳氏姚氏之說尤詳今見别論伻來以圖及獻卜伻使也遣使以所卜地圖及卜兆來告成王王拜手稽首曰公不敢不敬天之休來相宅其作周匹休傳曰作周以配天之羙命王氏曰姚成曰天休震動使周有天下者天之休也故周公敬之而相宅以配天休也或曰作新邑與我周室同休又或謂作洛與宗周同休王不在洛言來者順公所在而言或曰王本與公同來又曰王得卜而來見公遂留祭未知孰是公旣定宅伻來來示予卜休恒吉我二人共貞貞猶當也葉曰凡卜有貞其吉凶者大卜言國大遷大師則貞龜二人皆知其吉斷而以示天下也公其以予萬億年敬天之休王氏曰言宅洛之事定矣公當以予永逺敬天之休以成此休常吉之卜也拜手稽首誨言拜受公言猶禹之拜昌言也周公曰自此以下漸不可曉盖不知是何時所言傳䟽以爲王與公俱在洛對問之言葉氏以爲王得卜而至洛旣祭復歸鎬因留周公居守而周公有此言皆不可考然葉氏說後數章貫穿今從之王肇稱殷禮祀于新邑咸秩無文傳曰始舉殷家之禮䟽曰雖有損益以其從殷而來猶前篇之庶殷也王氏曰殷盛也如五年再殷祭之殷周公旣制禮作樂而成王於新邑舉盛禮以祀凡典籍所無而於義當祀者咸次秩而祀之也疑即篇末十二月戊辰之祭史述其語於前而記其事於後也予齊百工伻從王于周予惟曰庶有事此夲其攝政時言也齊百工謂百官揔巳以聴也周謂宗周也言我所揔百官今使之從王于周而我則未敢歸周恐新邑之有事也今王即命曰記工宗以功作元祀今王乃命曰我嘗記人之功而尊之又以此功因新邑殷祀而告之神明矣王氏曰記功盖若紀于太常藏在盟府之類惟命曰汝受命篤弼丕視功載乃汝其悉自教工孺子其朋言成王又命我曰汝周公受先王之命而厚輔我大視功載則可見矣凡汝所自教之工乃我之朋猶言太史友内史友友邦冡君也功載記功之書也王似欲留百工於洛以聴周公之命成王與周公言未嘗汝之此周公述王言故變公稱汝也孺子其朋其徃無若火始𦦨𦦨厥攸灼叙弗其絶周公言旣如此則孺子徃矣但汝所明不可不慎𦦨火始然尚㣲而方進之貌灼焚也叙次第也厥若彛及撫事如予惟以在周工戒成王歸宗周其所順之常道及撫臨衆事當皆如我所行也在周百工皆我所總齊者習於事當惟用此人慎終之道當如此也徃新邑伻嚮即有僚明作有功惇大成𥙿汝永有辭言我今徃新邑所使嚮就其有僚矣明作有功之事務爲惇大之以成寛𥙿之政則汝亦長有歎𥙿之辭於後世矣言徃者如云來相宅順王所在而言趨事赴功常失之急薄故又言惇大成𥙿以救其失公曰巳汝惟冲子惟終汝其敬識百辟享亦識其有不享享多儀儀不及物惟曰不享惟不役志于享凡民惟曰不享惟事其爽侮乃惟孺子頒朕不暇周公言巳矣乎汝成王惟冲子當惟其終猶伊尹言慎厥終也百辟諸侯也享朝而以幣享王誠以奉上之辭物幣也幣有餘而禮不及者徃徃有輕上之心以爲可以幣交也曰吾幣足矣何以禮爲如是者猶不享也諸侯不役志于享上則天下之民皆無復有享上之心矣天下之事安得不爽亂而輕侮乎如是則是成王實啓此亂而遺周公以憂勤不暇也蘇氏曰小人賄以說人必簡於禮周公戒周王責諸侯以禮不以幣恐其役志乎物而不役志于禮則諸侯慢而王室輕矣此治亂之本故周公特言之春秋傳曰晋趙文子爲政薄諸侯之幣而重其禮晋穆叔曰自今以徃兵其少弭矣夫以列國之卿䡖幣重禮猶足以弭兵王而賄則招㓂也必矣唐之衰君相皆可以賄取方鎮爭貢羡餘行苞苴而天子始失其政以至於亡周公之戒至矣陳曰予嘗以此思之則知文帝却千里馬而漢鼎重於㤗山矣聴朕教汝于棐民彛汝乃是不蘉乃時惟不求哉棐輔也蘉勉也周公戒成王使聴我教汝以輔民常性之道若汝不勉則不能永保天命也然則所以輔民常性者惟在乎勉而巳一說乃惟孺子頒朕不暇連此叚言成王不聴我言是分我以不暇也篤叙乃正父罔不若予不敢廢乃命汝徃敬哉兹予其明農哉彼𥙿我民無逺用戾正父武王也厚叙汝武王之所行無不如予之所以厚叙者我不敢廢汝自教工之命汝徃歸宗周汝其敬叙武王之事而我留於此修后稷先公之業明農事以教民亦王業艱難之意也我民𥙿矣則彼殷民以教民爲𥙿亦無有逺而不至者戻至也王若曰公明保予冲子公稱丕顯徳以予小子揚文武烈奉答天命和恒四方民居師惇宗將禮稱秩元祀咸秩無文居師營洛邑定民居也蘇曰惇宗厚族也將禮秉禮也稱秩元祀舉大祀也言此數事皆頼公之功而成也惟公徳明光于上下勤施于四方旁作穆穆迓衡不迷文武勤教穆穆和敬之貌天子之容旁作謂周公輔成巳徳以迎迓太平之治而不迷於先王之教予冲子夙夜毖祀蘇曰祭則我冲子政則周公成王言我歸宗周毖祀而巳王曰公功棐迪篤罔不若時公之功輔導我厚矣無不若是以上所稱也王曰公予小子其退即辟于周命公後上文王曰兩叚周公無答辭疑有闕文成王言我當歸即政于宗周而命公留于洛猶唐節度留後之意四方迪亂未定于宗禮亦未克敉公功迪順也亂治也四方雖巳順治而猶未定于尊公之禮未有以撫治公之功葉曰宗者掌禮之官盖周公居洛七年乃制禮作樂故周公在㓕淮夷之後此時未制禮也此與先儒不同迪將其後監我士師工誕保文武受民亂爲四輔且使周公在後監我百官士也師也工也四輔猶四鄰也王曰公定予徃巳公功肅將祗歡公無困哉我惟無斁其康事公勿替刑四方其世享此正與公訣而歸之言也公定居洛予徃歸周巳公功敬公無困哉言公無以事自困猶漢所謂閔勞公以官職之事也我則當無厭倦於安國安民之事而公但勿廢其所以儀刑四方者則四方其世享矣周公拜手稽首曰此王歸後使人來勞周公公拜受之辭也召詔蘇淫用非彛論洛誥王復子明辟論䟽陳二家王城成周論惟七年葉說在復子明辟觧下康誥日月一叚林說與蘇說不同若曰史文其言而撮其要畧也陳非汝封刑人殺人則無或刑人殺人矣非汝封又曰劓刖人則無或劓刖人矣言其責之在巳也先儒作四句讀曰故不得其說而蘇氏破句讀之陳林宗之誤矣惟弔兹惟痛閔此得罪之人也不于我政人得罪閔痛之深恨不自我得罪也葉說好雖若此然不罪之則民彛泯亂矣元惡大憝詳文意當從王氏乃非徳用乂言汝若寛縱則小臣外正皆得爲威虐汝之爲此欲以徳乂民而實非徳也姑息而巳蘇陳等說懲王氏之弊一槩以寛爲說恐非聖人刑人正法之意也文王之敬忌忌惡也惟助成王徳顯句越尹人祗辟越及也顯民明明徳於民也恫􅟂常如疾痛之在身則無不覺矣惠不惠懋不懋順其所不當順勉其所不當勉亦通當順者不順當勉者不勉此說長不典式爾古註式訓勉蘇云爾是人自言法當如此皆迃王氏云云予謂此不可曉大槩是宥過刑故之意若有疾刑人如痛在巳又恫瘝之意蔽時忱陳說陋至誠爲小人所賣殄享世享皆謂享于天子武成月日譜一月以孔注推當是辛卯朔壬辰旁死魄孔注云二日越翼日癸巳王朝歩自周三日戊午師度孟津二十八日二月若前月小盡即是庚申朔大盡即是辛酉朔癸亥陳于商郊庚申朔即是四日辛酉朔即是三日甲子勝商殺紂或五日或四日漢志云旣死霸越五日甲子即是六日或七日日辰不相應閠月李校書說是歳閠二月盖以一月壬辰旁死魄推之若不置閠即下文四月無丁未庚戌矣其說是也若前兩月俱小則此月巳丑朔一大一小則庚寅朔俱大則辛卯朔三月若前三月俱小則戊午朔一大二小則巳未朔二大一小則庚申朔俱大則辛酉朔然閠月小大計必無辛酉也四月若前四月俱小則丁亥朔一大三小則戊子朔二大二小則巳丑朔一小三大則庚寅朔王來自商一日旣生魄諸侯受命于周十六日或壬寅或癸卯或甲辰或乙巳經文在庚戌後漢志在丁未前恐經誤丁未祀周廟或十九日或二十日或二十一日或二十二日庚戌柴望大告武成或二十二日或二十三日或二十四日或二十五日右以孔注漢志參考大抵多同但漢志二月旣死魄越五日甲子爲差速而四月旣生魄與丁未庚戌先後小不同耳盖以上文一月壬辰旁死魄推之則二月之死魄後五日且當爲辛酉或壬戌而未得爲甲子此漢志之誤也又以一月壬辰二月甲子并閏推之則漢志言四月旣生魄越六日庚戌當爲二十二日而經以生魄居丁未庚戌之後則恐經文倒也歴法雖無四月俱小之理然亦不過先後一二日耳不應所差如此之多也宗廟内事日用丁巳漢志乃無丁未而以庚戌燎于周廟則爲剛日非所當用而燎又非宗廟之禮且以翌日辛亥祀于天位而越五日乙卯又祀馘于周廟則六日之間三舉大祭禮數而煩近於不敬抑亦經文所無有不知劉歆何所据也顔注以爲今文尚書則伏生今文二十八篇中本無此篇程氏之云又未知其何所据也按張覇僞書有武城篇劉歆誤以爲古文說見書序䟽中考定武城次序惟一月壬辰旁死魂越翼日癸巳王朝歩自周于征伐商底啇之罪告于皇天后土所過名山大川曰惟有道曽孫周王發將有大正于啇今啇王受無道暴殄天物害虐蒸民爲天下逋逃主萃淵藪予小子旣獲仁人敢祗承承上帝以遏亂畧華夏蠻貊罔不率俾惟爾有神尚克相予以濟兆民無作神羞旣戊午師逾孟津癸亥陳于商郊俟天休命甲子昧爽受率其旅若林㑹于牧野罔有敵于我師前徒倒戈攻于後以北血流漂杵一戎衣天下大定乃反啇政由舊釋箕子囚封比干墓式啇容閭散鹿臺之財發鉅橋之粟大賚于四海而萬姓悅服厥四月哉生明王來自啇至于豐乃偃武修文歸馬于華山之陽放牛于桃林之野示天下弗服旣生魄庶邦冢君曁百工受命于周丁未祀于周廟邦甸侯衛駿奔走執豆籩越三日庚戌柴望大告武成王若曰鳴呼羣后惟先王建邦啓土公劉克篤前烈至于大王肇基王迹王季其勤王家我文考文王克成厥勲誕膺天命以撫方夏大邦畏其力小邦懐其徳惟九年大綂未集予小子其承厥志恭天成命肆予東征綏厥士女惟其士女篚厥玄黄昭我周王天休震動用附我大邑周此下當有闕文列爵惟五分土惟三建官惟賢位事惟能重民五教惟食喪祭惇信明義崇徳報功垂拱而天下治右此篇簡編錯亂劉侍讀王荆公程先生皆有改正次序今以參考定讀如此大畧皆集諸家之所長獨四月生魄丁未庚戌一節今以上文及漢志日辰推之其事當如此耳疑先儒以王若曰冝繫受命于周之下故定生魄在丁未庚戌後盖不知生魄之日諸侯百工雖來請命而武王以未告天地未祭祖宗未敢發命故且命以助祭乃以丁未庚戌祀于郊廟大告武功之成而後始告諸侯上下之交人神之序固如此也劉侍讀謂余小子其承厥志之下當有闕文以今考之固所冝有而程先生徙恭天成命以下三十四字屬于其下則巳得其一節而用附我大邑周之下劉氏所謂闕文猶當有十數語也此盖武王革命之𥘉撫有區夏冝有退託之詞以示不敢遽當天命而求助於諸侯且以致其交相警敕之意畧如湯誥之文不應但止自序其功而巳也列爵惟五之下又史官之詞非武王之語讀者詳之晦庵先生朱文公文集卷第六十五終福州府儒學訓導鄭璉校正
