front:
  text: 晦庵先生朱文公文集卷第四十六書知舊門人問答
  hash: sha256:30417716b3bb7d1395011c339c35d7ca95d7b10ac24912537f18be5f3e98410d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0226_SBCK_046-1a}
body:
  text: 答李濵老以熹愚陋無聞於世足下不鄙辱貺以書甚盛禮也熹少好讀程氏書年二十許時始得西山先生所著論孟諸説讀之又知龜山之學橫出此枝而恨不及見也既而得從何兄叔京遊乃知足下蓋得其家傳者是時家居西距高隱不能甚逺而以事牽不得一往質其所疑徒日往來於心不忘也不謂此來各去其家數百里之外乃承惠音許以臨辱奉讀驚喜不可言既又聞以微疾東轅為之悵然纍日也示喻向來為學之意有以知家庭授受之要感歎無巳蓋竊嘗病今世學者幸得諸老先生為之先唱指示要途以趣聖賢之域而不能自淺及深自近及逺循序以進或乃探測幽微馳騖於言意之表以是徒為談説之資而卒無所得於造理行事之實其幸不至於中道而廢者則必流於老佛之歸而不悟今足下之學之傳逺有端緒其必有以異於此者顧恨未得靣扣其詳耳通鑑之書頃嘗觀考病其於正閏之際名分之實有未安者因嘗竊取春秋條例稍加櫽括别為一書而未及就衰眊浸劇草藁如山大懼不能卒業以為終身之恨今聞足下亦嘗有所論著又恨其未得就正以資博約之誨也廬阜固為東南雄麗竒特之觀而又有陶靖節祖孫劉西澗父子之遺風濂溪暮年嘗守其地而西山舅氏陳忠肅公亦嘗謫居焉今老儒生猶有及見之者然前此未嘗有留意者區區此來適會學官楊君訪得西澗遺象與元祐李公擇尚書並祠於學因與復議并取靖節忠肅及西澗之子祕丞公合而祠之更立濂溪之祠於其右配以程氏二夫子焉陶公有醉石在郡西北數十里所謂栗里者也劉公之墓在西門外荒草中幾無復知其處者今皆作亭以表之以來教之語及之知足下之有意乎此也故并以告想聞之亦為一太息也叔京進德未巳遂為古人每一念之􅏰然出涕往時見其遺藁有與足下往來詩句竊計傷惜之懷不減於此不獨為姻戚之好也端明黃公盛德高年中間一病亦甚可駭今聞其巳能步履豈弟君子神明所扶固當如此抑亦見其平日持養之功矣凡此皆因來教之及所欲為足下言者蓋不止此也來使還自九江撥冗修復草草幸察不宣與汪伯虞正月十一日同郡朱熹頓首復書伯虞茂才鄉丈執事熹之外家於門下有姻㜕之好而執事丈人行也久客閩中未獲一見獨幸從親故間講聞聲譽之美差以自慰兹承不鄙逺致長書禮意既隆而所以稱道期許之者又過其實熹不敢當也示諭尚書金公名堂之意俾得贊一詞焉幸甚幸甚金公亦先友也熹頃歲嘗獲拜之臨安俯仰十有七年矣三復來誨若復得望見其衣冠而聞其謦咳者甚矣金公之厚於執事而所以相告者之切而當也雍州使君往見張荆州吕著作皆稱其才今讀記文又有以見其所存者益恨未得一聽議論之餘也顧二公之意所以望於執事者皆非他人所能與獨在明者精擇而力行之耳况如熹之淺陋其又將何以辱禮命之勤哉加以拙踈乍親吏事公私倥偬日不暇給尤覺荒澀不能一吐胸中所欲言者因風敬謝先辱旦夕儻得脫此羈馽歸卧田間呻吟之暇乃當有報執事耳惠墨甚富且珍未有以報此間石刻各往一通幸視至未有承晤之日正惟進德自重慰此願言不宣答汪太𥘉四月八日同郡朱熹䪼首復書汪君太𥘉茂材足下熹於足下雖得幸同士壤而自先世流落閩中以故少得從故里之賢人君子遊顧其心未嘗一日而忘父母之邦也屬隨宦牒來官廬阜同郡諸生間有肯相過者而足下乃以手書先之三復誨諭喜幸無窮又承示以文編益欽德學之盛而恨其未得少奉從容也然間嘗竊病近世學者不知聖門實學之根本次第而溺於老佛之説無致知之功無力行之實而常妄意天地萬物人倫日用之外别有一物空虛玄妙不可測度其心懸懸然惟徼幸於一見此物以為極致而視天地萬物本然之理人倫月用當然之事皆以為是非要妙特可以姑存而無害云爾蓋天下之士不志於學則泛然無所執持而徇於物欲幸而知志於學則未有不墮於此者也熹之病此久矣而未知所以反之蓋嘗深為康胡二君言之而復敢以為左右之獻不識高明以為然否抑嘗聞之學之雜者似博其約者似陋惟先博而後約然後能不流於雜而不掩於陋也故中庸明善居誠身之前而大學誠意在格物之後此聖賢之言可考者然也足下其試思之未即會晤惟進學自愛為禱匆匆不宣熹再拜答方耕道耒開喻詳悉足見進學不倦之意以左右明敏強毅之資厲志於此何患於不得然以愚見論之詞氣之間似猶未免迫急之病於所謂平心和氣寬以居之者恐未有得力處也願更於日用語默動靜之間日立規程深務涵養母急近效要以氣質變化為功若程夫子所謂敬者亦不過曰正衣冠一思慮莊整齊肅不慢不欺而巳但實下功夫時習不懈自見意味不必懸加揣料著語形容亦不可近捨顯然悔尤預憂微細差忒也其他尚多有可論處來書偶留墳菴不能盡記曲折然其大槩亦具此矣大抵學問之道不敢自是虛以受人乃能有益若一有所聞便著言語撑拄過去則終無實得矣答方耕道示問詳復具審比日進學不倦之志甚善甚善顧淺陋何足以及此然荷意之厚不敢虛也向者妄謂自立規程正謂正衣冠一思慮莊整齊肅不慢不欺之類耳此等雖是細微然人有是身內外動息不過是此數事其根於秉彛各有自然之則若不於此一一理會常切操持則雖理窮玄奧論極幽微於我亦有何干涉乎弘毅之云雖聖賢所示之要然恐其間更須細密方有實用功處不然則所謂只作一場話説務高而巳者不可以不戒也若必謂有所見然後有所主則程子所謂未有致知而不在敬者是為敬有待於見乎見有待於敬乎果以徒然之敬為不足事而必待其自然乎長沙有二先生文集朋友間亦必有遺書本子暇日更求此二書反覆熟讀不計近功則智當益明而有以審乎此矣前書所謂捨顯過憂小失正謂放飯流啜而問無齒決之類舍此憂彼則為失其序耳若日用功夫果能謹之於微不使至於形顯則善何以加但恐言太高而難踐則非所謂切問而近思耳答方耕道老兄以明敏果決之資挾凌高厲逺之志士友間所難得今茲需次暫得間日所宜潛心味道益進所學以副區區期望之意向來所探似亦太高所存似亦太簡又每有自喜巳材獨任巳見之意今當小立課程而守之以篤博窮物理而進之以漸常存百不能百不解之心而取諸人以為善則德之進也不可禦矣愛慕之深不覺縷縷幸恕僣易也答曽節夫撙所喻夷狄之云恐不當以此為比只此一語便是十數年洶洶之根願平心定氣徐以疇昔所聞於湖湘者考校此語所從來則於此其必有處矣不然平日之言却似與此心此事不相入恐非亡友所望於賢者也答吕士瞻竦道一逺來甚慰孤陋天資明敏極不易得到此數日適值小冗撥置與語令人不倦觀其意趣事事通曉但於為巳一著未有肯心此區區所深惜故其告歸再三留之今日乃言有信得及處此事體大日月長逺政使實得亦須接續功夫常不間斷方可保任况一時意思未知果如何須更於過庭之際入大爐鞴與之煆錬始可放行耳示喻艮背之説周程先生意是如此尋常亦只如此曉會於道理功夫無不是處但近讀易見得彖辭解云艮其止止其所也正説此句之意則所謂艮乃止也背乃當止之所也程先生於此句下亦作此説却不本上文卦辭之義蓋理自兩通但文王意則只當依孔子所解為是不須更引不見之説以雜之也不審尊意以為如何南軒辨吕與叔中庸其閽病多後本巳為刪去矣但程先生云涵養於未發之前則可求中於未發之前則不可此語切當不可移易李先生當日用功未知其於此兩句為如何後學未敢輕議但今當只以程先生之語為正則欽夫之説亦未為非但其意一切要於閙處承當更無程子涵養之意則又自為大病耳渠後來此意亦改晚年説話儘不干事也答吕道一三復來示詞義通暢為之爽然但其所論有於鄙意未安者大凡論學當先辨其所趨之邪正然後可察其所用之能否苟正矣雖其人或不能用然不害其道之為可用也如其不正則雖有管仲晏子之功亦何足以稱於聖賢之門哉且古之君子所以汲汲於學者不為其終有異於物而勤故亦不為其終無異於物而肆也不為其有名而勸故亦不為其無名而沮也不為其有利而為故亦不為其無利而止也是其設心蓋儻然一無有所為者獨以天理當然而吾不得不然耳若夫萬物散為太虛之説則雖若有以小異於輪回之陋然於天地之化育蓋未得為深知之者也此未易言今且當熟讀聖賢之書而以漸求之耳答吕道一示喻巳悉但為學之功且要行其所知行之既久覺有窒礙方好商量今未嘗舉足而坐談逺想非惟無益竊恐徒長浮薄之氣非所以變化舊習而趨於誠實也答簷兼善示喻儒釋之分益見潛心之力所謂釋氏一覺之外更無分别不復事事而吾儒事事無非天理此語是也然吾儒亦非覺外有此分别只此覺處便自天高地下萬物散殊毫髮不可移易所謂天敘天秩天命天討正在是耳所論孟子甚善其大槩不外此矣更於其間子細研窮見得曲折處方有意味願益勉旃以慰所望答曾致虛所論誠敬之説甚善但欽夫之意亦非直謂學者可以不誠蓋以為既曰持敬便合實有持敬之心不容更有不誠之敬必待别著誠字然後為誠也大抵誠字在道則為實有之理在人則為實然之心而其維持主宰全在敬字今但實然用力於敬則日用工夫自然有總會處而道體之中名實異同先後本末皆不相礙若不以敬為事而徒曰誠則所謂誠者不知其將何所錯且五常百行無非可願雜然心目之間又將何所擇而可乎鄙意如此不審高明以為如何願於日用間一驗其實因風語其可否焉答曾致虛乙卯二月一日南康從祀畫象乃取法監學巳詳報吳廣文矣白鹿當時與錢子言商量只作禮殿不為象設只依開元禮臨祭設席最為得禮之正不然則只用燕居之服以石為席而坐於地亦適古今之宜免有匍匐就食之誚子言皆不謂然但今巳成恐毁之又似非禮此更在尊意斟酌報之也蓋幼年間先君言嘗過鄭圃謁列子廟見其塑象地坐則此不為無據也答朱魯叔劉守請祠未報計須且留知早晚得親灸又與程弟講學甚善甚善風俗不好直道而行便有窒礙然在吾人分上只論得一箇是與不是此外利害得喪有所不足言也為學之要先須持巳然後分别義利兩字令趣向不差是大節目其它隨力所及為之務在精審而不貴於泛濫涉獵也答黃商伯灝心喪問大意甚善但云本生之服視其屬之親踈却似不然蓋不問其親踈而槩以齊衰不杖期服之也本生繼母蓋以名服如伯叔父之妻於巳有何撫育之恩但其夫屬乎父道則妻皆母道况本生之父所再娶之妻乎此兩節幸更考之恕説亦佳但大學潔矩常在格物之後蓋須理明心正則吾之所欲所不欲莫不皆得其正然後推以及物則其處物亦莫不皆得其正而無物我之間如其不然而以私巳自便之心為主又欲以是而及人則人道不立而驅一世以為姑息苟且之場矣此處亦幸更思之也熹嘗於大學治國平天下或問中極論此事此便遽未及奉寄旦夕别附致也答黃商伯熹請祠人未還計亦不出數日蓋其去巳餘兩旬計程當歸巳久必是巳如所請等候出敕留滯耳萬一未遂愚計所處正如來喻之云也年來衰病支離日甚今無他望但願殘年飽喫飯耳往年遊豫章每至東湖之上未嘗不慨然有懷陳仲舉徐孺子之高風出處之間禍福不同然亦各行其志未知此漂漂者竟如何耳示喻向來喪服制度私固疑之幞頭四腳所喻得之矣但後來報狀中有幞頭又有四腳各為一物與此注文又不同不知當日都下百官如何奉行固無一人來問以書扣禮官竟亦未報也至於直領襴衫上領不盤此間無人曉得遂有為之説者云但用布夾縫繞頸直過略作盤領之狀而不用斜帛接續盤繞州縣多用此制詳此只是杜撰但禮官之意却未必不是如此然想官人亦未必曉只是手分世界中化現出來耳竊疑直領者古禮也撿三禮圖可見襴衫者今禮也如公服之狀乃有橫襴必是故事中曽有兩説各用一説而今遂合為一既矛盾而不合於是為此杜撰之説以文之耳更以報中第一項證之既有斜巾又有帽又有四腳又有冠一日之中一元之上并加四服此亦并合古今之誤蓋斜巾本未成服之冠如古之免帽却與四䙆衫為稱四腳即與襴衫為稱冠即見三禮圖者當與直領衫裙為稱今則并加四者而下服有襴有裙亦是重復而真直領之衣遂廢只此一事便令人氣悶今幸有討論之命然亦未見訪尋士大夫之好古知禮者次第又只是茅纏𥿄裏不成頭緒近報作百日禮數此亦不經之甚且唐制本為王公以下豈國家所宜用邪禮器之失不但一爵今朝廷所用宣和禮制局樣度雖未必皆合古然庶幾近之不知當時禮部印本何故只用舊制向來南康亦無力但以爵形太醜而句容有新鑄者故易之耳其實皆當遣人問于禮寺而盡易之乃為盡善但恐其費不資州郡之力不能辦耳福州余丞相家有當時所賜甚精然今亦莫能用也濂溪之祠郡將乃能留意如此并及陶劉亦甚善此等事自世俗言之似無緊要然自今觀之于人心政體所繫亦不輕如今日荒政便與此事相表裏若如庚子年中守令見識彼安肯作此事邪答黃商伯方喪無禫見于通典云是鄭康成説而遍檢諸篇未見其文不敢輕為之説但今日不可謂之方喪則禮律甚明不可誣耳儀禮喪服傳為君之祖父母父母條下疏中趙商問答極詳分明是畫出今日事往時妄論亦未見此歸乃得之始知學之不可不博如此非細事也左杜所記多非先王禮法之正不可依慿要之三代之禮吉凶輕重之間須自有互相降厭處如顧命康王之誥之類自有此等權制禮畢却反喪服不可為此便謂一向釋服也心喪無禫亦見通典乃是六朝時太子為母服期巳除而以心喪終三年當時議者以為無禫亦非今日之比也此事本不欲言以自是講學一事故及之切勿為外人道也跪坐近得楊子美書引僧人禮懴道士宣科為比彼蓋未嘗以為難只是慣耳其説亦為得之皇祐祭式却未之見如有本幸因的便借及彼時所用只是開寶通禮此有其書欲一參校也開寶與開元大槩相􅊞開元只有先師二位無諸從祀或是開寶所增也位牌于法亦只卧之於地與獻官位版相似非此為神位也今獻官位版亦有植之以趺而立之者皆誤也塑象如開元禮則無之想當時初加夫子王號即內出衮冕以𬒳之則為有象不知何故抵牾如此豈所修禮書亦姑以存古而實未必行邪而韓退之劉禹錫諸廟學碑亦皆言有象本朝則固有之久矣可更試考之也答黃商伯大學知止能得或問云知止云者物格知至而于天下之事皆有以知其至善之所在又曰能知止則事事物物皆有定理至能慮則又曰隨事觀理極深研幾無不各得其所止之地而止之程子則曰格物非欲盡窮天下之物又曰今日格一件明日格一件積習多後脫然有貫通處妄謂一物既格則能知一物至善之所在而亦可得其所止然猶有定靜安慮之四節學者必知止而用其力然後求得所止也今或問以為必盡窮天下之理然後可以知至善所在而得所止與程子所言格物工夫似若不同得非或問所指是舉大學之全體極致而言之歟經文物格猶可以一事言知至則指吾心所可知處不容更有未盡矣程子一日一件者格物工夫次第也脫然貫通者知至效驗極致也不循其序而遽責其全則為自罔但求粗曉而不期貫通則為自畫故古經程子之言未見其有不同也中庸章句言人物之生各得其所賦之理以為健順五常之德所謂性也竊謂二五之精妙合而凝則賦健順五常之德理無可疑然自昔秪言五常而不及健順體之於心得非敏於為善者是其健循其自然者是其順乎然自昔秪言五常而不及健順何邪隂陽之為五行有分而言之者如木火陽而金水隂也有合而言之者如木之甲火之丙土之戍金之庚水之壬皆陽而乙丁已辛癸皆隂也以此推之健順五常之理可見中庸章句謂人物之生各得其所賦之理以為健順五常之德或問亦言人物雖有氣稟之異而理則未嘗不同孟子集注謂以氣言之則知覺運動人與物若不異以理言之則仁義禮智之稟豈物之所得而全哉二説似不同豈氣既不齊則所賦之理亦隨以異歟論萬物之一原則理同而氣異觀萬物之異體則氣猶相近而理絶不同也氣之異者粹駁之不齊理之異者偏全之或異幸更詳之自當無可疑也石氏集解引生之謂性性即氣氣即性一章竊謂此章先明理與氣不相離遂言氣質之性雖有善惡然性中元無此兩物相對而生其初只是善而巳由氣稟有昏濁又私欲汚染其善者遂變而為惡當為惡時非别有一善性也故有惡不可不謂之性濁不可不謂之水之説似指成之者性以後而言與孟子拔本窮源性善之論不同然惡或不萌則本體亦有時發見若能澄治則復其初矣至于水流而就下以為繼之者善則是以喜怒哀樂巳發之後皆指為繼竊謂須如易解之説在成之者性以前方是本旨以濁比惡亦是專指欲動靜流之後竊謂須如大學集解之説因氣稟之不齊而又私欲生其間分比兩節然後精盡也未審是否繼之者善易中本是就造化上説到下句成之者性方以人物而言程子所引乃借上一句便就人性上説而指其巳發動之所為也不容説處即性之本體如水則只是水别著一字不得至謂之善則性之發如水之下矣清濁之喻又是一節來喻巳得之矣大抵此一條説性字最多須分别得甚句是本來之性甚句是氣質之性即語脈自分明矣未發之前唯當敬以持養既發之後又當敬以察之未發之中不待推求而巳瞭然于心目一有求之之心則其未發者固巳不得而見矣剖析可謂明白吕氏欲求中于未發之前而執之誠無是理然既發之情是心之用審察于此未免以心觀心前章或問謂别以一心求此一心見此一心為甚誤論語或問觀過知仁章亦有此説豈非學者不能居敬以持養格物以致知專務反求于心迫急危殆無科級依據或流入于異端與始終持敬體用相涵意味接續者為不同也巳發之處以心之本體權度審其心之所發恐有輕重長短之差耳所謂物皆然心為甚是也若欲以所發之心别求心之本體則無此理矣此胡氏觀過知仁之説所以為不可行也中庸第二十章之問語誠始詳明善擇善所以為誠之基本者亦始于此章併言之舊嘗觀乾九三九四與坤六二覺聖人説乾之修為易而坤則工夫緊實似有聖賢之分大學初説致知格物中庸首章惟言戒懼謹獨工夫規模覺得似比大學為髙逺直至二十章始言明善擇善與大學所以教者同亦似二書隨學者器質為教也大學是通言學之初終中庸是直指本原極致處巨細相涵精粗相貫皆不可闕非有彼此之異也五行各一其性宜五行亦各一其德舊聞先生説義理分界至處須要截然要貫通處又自貫通竊謂仁發而為愛愛而得宜便是義有品節便是禮之類則體雖各立而亦相貫通竊恐五行亦如此嘗見人言五行之體質便是土如木之堅則亦有金金之從革亦有曲直之性也未審是否理有未明雖于事非急亦不可終于不知略乞賜教曲直稼穡各是兩事餘亦合凖此例潤下者潤而下也炎上者炎而上也從革者一從一革互相變而體不變也一曰水二曰火三曰木四曰金五曰土竊謂氣之𥘉溫而巳溫則蒸溽蒸溽則條逹條逹則堅凝堅凝則有形質五者雖一有俱有然推其先後之序理或如此向見吳斗南説五事庶證皆當依此為序其言似有理幸試推之鬼神之理未易測識然學者亦欲隨所見決其是非祀先之義向來因聖人不言有無之説竊謂氣散而非無苟誠以格之則有感通之理况子孫又其血氣之所傳則其感格尤速也未審是否三條皆善橫渠説五行數假甚精可并考之陳勝私嘗説雷霆震擊真有鬼物先生不答次日乃言學者當于正理上立得見識然後理之變者可次第而通若將理之變者先入于心立為定見則正理終不能曉矣竊嘗服膺妄謂夫子所言與答宰我之問程子張子之論無非正理但張子神與性乃氣所固有之語似主氣而言却恐學者疑性出于氣而不悟理先于氣語似未瑩未審然否上蔡之説或問以為善竊疑石氏所集其言有及于理之變者如自家要有便有要無便無始得又似以心起滅不問有無之正理上蔡之意必不如是某因致死不仁致生不智之訓思之恐宗廟祭祀不致死之也葬埋壇墠不致生之也理之有者聖人制禮使人誠意以感通其間曲折精微莫非仁智之盡若理所無者聖人不道也至于理之變者竊謂皆氣之所為而皆因于人雖復多端似可以次第而曉所謂天地之妙用豈非造化隂陽之理人心精神之聚上下感化之所自歟妄意如此殊未明徹乞指教此論甚善但張子語不記子細然論鬼神則氣為近未至遽有先于理之嫌也上蔡論語為政卒篇論鬼神甚詳大槩亦如來喻恐可參考也答黃商伯熹自少日幸蒙師友之訓得窺聖學門戶退與朋友講之聞而信者固多然能終始用力而不為中道之廢者甚少况年大官達則其忽然忘之者益以速矣區區以此每深憂之恐先師傳付之旨至此而遂絶也今得來問每以此事為念而其論説亦多與鄙意合乃知此道猶有望也幸甚幸甚如前時所論仁義禮智之説此是去年信州發來書今者所論讀易之説真無欲之説皆平正精切非一槩悠悠之論且年亦過中而更閲世故又巳多矣乃能切切用力于此愈于年少新學之為者是可尚巳更願勉旃有以卒副所望則又大幸之甚也熹再拜答詹元善體仁雅聞左右才雋行馴好學不倦私竊歎慕以為天之賦子如是其不苟然矣獨恨未獲從容未知所學者果何學耳世衰道喪俗學多𡵨天理不明人心頗僻未有甚于此時者熹竊不自知其淺陋方以其所聞于師友者夙夜勉焉而志力不強未知攸濟是以樂聞賢者之風而有望於切磨之助伏惟益厲𥘉心求知所至而用力焉有以慰此懷也僭易皇恐皇恐承喻請祠之意深所未曉然元履巳歸不知曽為辦此事否若熹之意則以為政煩民困正有官君子盡心竭力之時若人人內顧其私各為自逸之計則分義廢矣至于盜賊公行善良蒙害尉捕之職也何不忍之有若以為實有可哀矜者則當明言于上而求所以振業之使不至於為盜雖以獲戾所不辭也又何避此而求云之亟乎若夫祠官無事之祿本非義理所安前輩蓋非辭尊辭富則莫之肯為熹之不肖固不足言然居此官最久前後三請亦皆有故非以辭難就逸而為之也故區區之意願左右少俟終更而後求之未去之前盡心所職思其出于分義之所當為而無敢有厭斁之心焉則庶乎其可以自安矣慕用之深不覺覼縷伏惟有以亮之元履一出未能有為然士大夫始復知天下之有正論廉貪激懦所助多矣熹官期巳及坐此未敢遽出然亦不敢有忘當世之意賢者當有以識此心耳未由面論臨風耿耿答詹元善昨致書後宋臣見過能道比來賢者所誦書若將應科目之為者巳竊憂之又于元履處見所著書及孟子説然後慨然發歎不意賢者用心之差乃至于此便欲致書相曉而久不值便以至于今蓋未嘗一日不往來于懷也夫義利之間所差毫末而舜跖之歸異焉是以在昔君子之為學也莊敬涵養以立其本而講于義理以發明之則其口之所誦也有正業而心之所處也有常分矣至于希世取寵之事不惟有所愧而不敢實亦有所急而不暇焉今左右乃方讀水經而治詞業是何外慕之重而自待之輕邪竊謂此心不除決無入道之理至于談經之際則又專以人欲之私妄意聖賢其言險譎乖戾不近人理聞之使人耳聾心悸不謂斯言一旦而出于賢者之口也養氣之説雖不至是然掇拾老莊荒誕之餘以求入乎聖賢敬義之實亦非熹之所敢聞也前書所謂儒名而釋學潘張特其小小者可蘇氏兄弟乃以儀秦老佛合為一人其為學者心術之禍最為酷烈而世莫之知也前書微發其端蓋預憂左右之將陷焉而不知其深入之久巳如此矣感下問之勤不忍隱默不識能聽之否答詹元善歸宗之請計巳報可此於人情恩義之間有難處者而輕重本末事理甚明自見賢者之不安于此者有年矣今追贈之榮既及泉壤則于恩意巳為曲盡但異時所以益致其惓惓不忘之意如范公之于朱氏者此論想巳素定也但近至城中見羅養蒙之孫示及其祖事狀有此一條事與今日極相類今謹録去恐更合稽參禮律以盡情文之變乃為盡善此非小節不可草草耳近日大除拜一畨紛紜雖公議幸伸然自此中外之責愈重而其人之才智局度猶昔人也不知何以處此乎來書所賦蕩之卒章真可為流涕痛哭也進對之際言之不切不足以盡吾心而吾言雖切度亦未有轉移之勢不知明者又將何以處此也偶得黃子由奏疏謾録去其言至此不為不切蓋巳下到大承氣湯矣而略無動意奈何境外之事彼若為萬全之計固不輕發但恐萬一狂謀輕襲而我之邊障未有以當之此則慮外之慮而所繫亦不小也故都之事不成乃是天幸如其不然趙豹無故之疑梁武金甌之戒直可為寒心不知今日諸公何以處之大抵近年風俗浮淺士大夫之賢者不過守文墨按故事説得幾句好話而巳如狄梁公寇萊公杜范富韓諸公規模事業固未嘗有講之者下至王介甫做處亦模索不著其有讀得楚漢孫劉楊李間數十卷書者則又便有不作士大夫之意善人君子莫能抗也端居深念為之永慨未知天意竟如何耳季通一出飽觀江湖表裏形勢不為無輔甚恨匏繫不能與之俱行其律書法度甚精近世諸儒皆莫能及但吹律未諧歸來更須細尋訂耳此行所資亦足為晚年休息之計元善篤于友誼固自不薄而張帥之傾蓋勝流今之君子亦鮮能及也子靜旅櫬經由聞甚周旋之此殊可傷見其平日大伯頭胡呌喚豈謂遽至此哉然其説頗行於江湖間捐賢者之志而益愚者之過不知此禍又何時而巳耳許教似亦小中毒也如何如何答潘叔度邵子文記明道先立標凖之言深中近日朋友之病且孟子亦有襲而取之之戒尤當深念也答潘叔度所論標凖襲取之戒極為精密然所謂有為若是如舜而巳者必自有的實平穩下功夫處非是徒然晝思夜度以巳所為校舜所為而切切然惟恐不如舜也譬如病人正當循序服藥積漸將理使氣體浸充可及平人而後巳豈可責效于一丸一散一朝一夕之間而遽怪其不及平人哉默誦中庸一卷于寐覺之時此亦甚善然與其必誦一過不若虛心玩理之從容而有味也答潘叔度來喻縷縷備見立志之逺歎服良深但所謂敬之為言所以名持存之理者于鄙意似未安蓋人心至靈主宰萬變而非物所能宰故才有執持之意即是此心先自動了此程夫子所以每言坐忘即是坐馳又因默數倉柱發明其説而其指示學者操存之道則必曰敬以直內而又有以敬直內便不直矣之云也蓋惟整齊嚴肅則中有主而心自存非是别有以操存乎此而後以敬名其理也此類初若名言小失不足深辨然欲放過則恐于日用之功不能無害故輒言之子約書中有所反覆亦是此意幸參考而互評之則其辨益明而儒釋之殊亦可因以判矣橫渠集云云大凡作事匆匆不能博盡異同便有遺恨前輩所謂甚事不因忙後錯了者誠有味也答潘叔度所喻敬者存在之謂此語固好然乃指敬之成功而言若只論敬字下功夫處蓋所以持守此心而欲其存在之術耳只著一畏字形容亦自見得故和靖尹公只以收斂身心言之此理至約若如來喻却似太瀾翻也大抵諸所誨諭似皆傷于語言道理頭緒多云云愚意且欲賢者於此稍加屏置而虛心觀理于平易專一之地不審于意果如何也答潘叔度熹衰病今歲幸不至劇但精力益衰目力全短看文字不得瞑目間坐却得收拾放心覺得日前外面走作不少頗恨盲廢之不早也看書鮮識之喻誠然然嚴霜大凍之中豈無些小風和日暖意思要是多者勝耳江南之業恐自是慶曆元祐之功不當以此論也此語甚長非面莫既大抵鄙見與彼中議論不同處非一而此為其最是乃天理人欲之分直截剖判不相交雜處安得相與極論以會至當之歸乎忿疾之意發於羞惡之端固有不可已者然至於加一忿字便和自家這裏有病了此亦深欲面諭之尤緊切者恨未有其便耳醍醐毒藥之喻恐亦過當聖賢只得立言垂世從違真偽却在他人如何必得況吾輩所急在於自明正不當常以此念橫在胸中也陳膚仲近得書云欲旦夕過此此等人未欠講論却是欠收斂此又是别一箇話頭要之須面論乃究耳吾人無用於世只自己身心一假事又不曽講究得徹衆盲摸象各説異端不知却如何收殺可慮可慮奈何奈何答潘叔昌熹講聞雋譽為日蓋久每恨未及際晤以慰所懷兹承不鄙遠貽誨帖傾倒甚至自顧涼薄何以堪之反復再三有愧而巳即日冬寒伏惟進德日新尊履多福熹蚤獲執侍先生君子之側粗知以問學為事而躬行不力老大無聞顧省平生第有愧恨左右才髙識明所以自期蓋巳不淺乃不知其如此而辱垂問焉則巳誤矣況所謂日用之間不放不亂者又熹之所以早夜竭力而未能倣佛者其何以有助于髙明之萬一乎然先其所難而不計其獲聖賢所以示人為仁之方也熹雖不敏願與賢者共勉焉因風修報未究所懷繼此有可以開警者願日聞之幸甚幸甚答潘叔昌細讀來喻足見為巳之力但學者先須置身于法度規矩中使持於此者足以勝乎彼則自然有進步處如孔子之告顔淵以非禮勿視聽言動為克巳之目亦可見矣若自無措足之地而欲搜羅抉剔于思慮隱微之中以求所謂人欲之難克者而克之則亦代翕代張沒世窮年而不能有以立矣躬所未逮姑誦所聞巳深愧􅌤惟明者有以裁之答潘叔昌示喻讀史曲折鄙意以為看此等文字但欲通知古今之變又以觀其所處義理之得失耳初不必于玩味究索以求變化氣質之功也若慮其感動不平遂廢不讀則進退之間又恐皆失之太過而兩無所據也昨聞叔度兄頗為佛學因獻所疑大蒙峻却愧悚深矣今不敢復言而其未巳之意不兑因子約逹之恐其過江未還煩為略道鄙意大抵近世儒者于聖賢之言未嘗深求其義理之極致而惟以多求劇讀為功故往往遂以吾學為容易之空言而求所以進實功除實病者皆必求之于彼殊不知將適千里而迷于所向吾恐其進步之日逺而稅駕之日賖也今若未能決意自拔得且姑置其説而專意于吾學捐去雜博專讀一書虛心遊意以求夫義理之所在如此三年不得而後改圖則朋友之心無所復恨而于其所以進功除病之實亦未為晚也如何如何答潘叔昌承喻讀李陸孫氏之書慨然有感此見進學不倦之意然熹愚意學者當且就聖門文字中研究得箇入頭處却看此等其合者固所不遺而其不合者亦易看破自然不費功力也嘗竊私怪彼中朋友不肯于論語孟子中庸大學深下功夫而泛觀博取于一時議論之間所以頭緒多而服目少規模廣而意味不長試以孟子論子路管仲處觀之可見其得失矣不審明者以為如何沈叔晦章疏出于何人大抵世俗近年一種議論愈見卑狹令人擡頭不起轉身不得看此頭勢只有山林是安樂處别無可商量也答潘叔昌示喻天上無不識字底神仙此論甚中一偏之弊然亦恐只學得識字却不曽學得上天即不如且學上天耳上得天了却旋學上大人亦不妨也中年以後氣血精神能有幾何不是記故事時節熹以目昏不敢著力讀書間中靜坐收斂身心頗覺得力間起看書聊復遮眼遇有會心處時一喟然耳蜀學之弊誠如所喻唐論却未暇細看也六國表議論乃是衰世一種卑陋之説吾輩平日講誦聖賢何為却取此等議論以為標的殊不可曉建州有徐柟者常言秦始皇賢于湯武管仲賢于夫子朋友間每每傳以為笑不謂來説亦頗似之也此恐是日前于根本上不曽大假用功而便于討論世變處著力太深所以不兑此弊向答子約一書亦極言之正恐赤幟巳立未必以為然耳熹老矣不復有意于此世區區鄙懷猶欲勉率同志之士熟講勤行以趣聖賢之域不謂近年異論蜂起髙者溺于虛無下者淪于卑陋各執已見不合不公使人憂歎不知所以為計而今而後亦不復敢以此望于今世之人姑抱遺經以待後之學者而巳不審明者以為如何答潘叔昌示諭漢唐初事以兩家論優劣則然以三代之天吏言之則其本領恐不但如此若子房孔明之所黽勉亦正是渠欠闕處吾輩正當以聖賢為師取其是而監其非不當以彼為凖則也今人只為不見天理本原而有汲汲以就功名之心故其議論見識往往卑陋多方遷就下梢頭只是成就一箇私意更有甚好事若必以為然即程正叔寧可終身只作國子祭酒却讓他陳正已作宰相也可怪可怪答潘叔昌前書示及易傳二義隂陽交和恐非是指君子小人而言君子之于小人固不當過為忿疾然無交和之理韓富當時事力蓋不足以勝二姦非固欲與之和也元祐誠有過甚處然當時事勢恐不如此亦不免禍要當有以開悟人主之心乃絶後患耳東漢誅宦官事前輩多論之大略皆如來喻然嘗細考其事恐禍根不除終無可安之理後人據𥿄上語指點前人甚易為力不知事到手頭實要處斷毫髮之間便有成敗不是容易事若使陳竇只誅得首惡一二人後來未必不取王允五王之禍也答潘叔昌向來鄙論初無深旨來書誦及足見不遺一善之意然所謂有主于中者亦只是此持守之意耳遺書首篇答李端伯之問者正是此意不可離此持守別想像一物以主乎中也答潘叔昌書杜生二論後荀彧之死胡文定引宋景文説以為劉穆之宋齊丘之比最為得其情狀之實無復改評矣考其議論本末未見其有扶漢之心也其死亦何足悲又據本傳彧乃唐衡之壻則彧之失其本心久矣顔公之智誠有所不足非獨棄平原一事也但仁義禮智信列于五常聖人皆顯之以為教未嘗偏有所隱也今曰聖人獨顯仁義忠信以為教而神智以為幾不知何據而言若其果然則是仁義忠信乃無用之朴而智乃仁義忠信之賊矣學術不正使人心頗僻如此甚可憂懼不知老兄曽見此論否聞其託于賔館必嘗相與講學者幸有以警之毋使東萊宗旨轉而為權謀機變之學也答潘叔昌所示內外交養勿使偏枯聞斯行之不必猶豫此正今日應病良藥也薛氏書巳領觀其用功纎密良可歎服而昨得其論語及春秋却有難曉解處豈其用力于彼者深固所謂藝之至者不兩能邪學者于此要當知所檡耳仁傳正類南軒所為鄙意亦所未安伯恭昨補外書震澤語録問聖賢之言要切處思一假意思却極好也陳齊之文乃如此尤所不解亦嘗究其失否微言既絶大義益乖甚可悼懼不覺傾倒至此此𥿄不可以示人也只欲賢者知之不枉用心耳答劉叔文所謂理與氣此決是二物但在物上看則二物渾淪不可分開各在一處然不害二物之各為一物也若在理上看則雖未有物而巳有物之理然亦但有其理而巳未嘗實有是物也大凡看此等處須認得分明又兼始終方是不錯只看太極圖熹所解第一假便見意思矣若未會得且虛心平看未要硬便主張久之自有見處不費許多間説話也如此虛心理會不得時却守取舊來所見亦未為晚耳如或未然且放下此一説別看他處道理尚多或恐別因一事透著此理亦不可知不必守此膠漆之盆枉費心力也答劉叔文細詳來喻依舊辨別性氣兩字不出須知未有此氣巳有此性氣有不存性却常在雖其方在氣中然氣自氣性自性亦自不相夾雜至論其偏體于物無處不在則又不論氣之精粗而莫不有是理焉不當以氣之精者為性性之粗者為氣也來説雖多只以此意思之便見得失如云精而又精不可名狀所以不得巳而強名之曰太極又曰氣愈精而理存焉皆是指氣為性之誤又引通書解云云亦是不察隂陽二字是形而下者便指為誠不知此是誠之流行歸宿處不可便指為誠也又引無極之真以為真固是理然必有其氣是以可與二五妙合而凝此尤無理矣夫真者理也精者氣也理與氣合故能成形豈有理自有氣又與氣合之理乎其間瑣細不暇一一辨論但更看太極圖解第一假𥘉兩三行便見理之與氣各有去著不待如此紛紜矣答王子充老兄深靜篤實天資甚美平時于輩流中心所敬仰顧恨相從日淺未得深扣所存以自警䇿今讀來教乃有懶弱自安之語何邪大抵今日之弊務講學者多闕于踐履而專踐履者又遂以講學為無益殊不知因踐履之實以致講學之功使所知益明則所守日固與彼區區口耳之間者固不可同日而語矣不然所存雖正所發雖審竊恐終未免于私意之纍徒為拘滯而卒無所發明也愚意如此不審髙明以為如何答胡伯逢赤子之心固無巧偽但于理義未能知覺渾然赤子之心而巳大人則有知覺擴充之功而無巧偽安排之鑿故曰不失赤子之心著箇不失字便是不同處南軒所説固善然必謂從𥘉不失此恐太拘既失而反之却到此地位亦何害其為不失乎答胡伯逢男女居室人事之至近而道行乎其間此君子之道所以費而隱也然幽暗之中袵席之上人或褻而慢之則天命有所不行矣此君子之道所以造端乎夫婦之微密而語其極則察乎天地之髙深也然非知幾慎獨之君子其孰能體之易首于乾坤而中于咸恆禮謹大昏而詩以二南為正始之道其以此歟知言亦曰道存乎飲食男女之事而溺于流者不知其精又曰接而知有禮焉交而知有道焉惟敬者能守而不失耳亦此意也答胡伯逢昨承喻及知仁之説極荷開曉之詳然愚意終覺未安來諭大抵專以自知自治為説此誠是也然聖人之言有近有逺有緩有急論語一書言知人處亦豈少耶大抵讀書須是虛心平氣優遊玩味徐觀聖賢立言本意所向如何然後隨其逺近淺深輕重緩急而為之説如孟子所謂以意逆志者庶乎可以得之若便以吾先入之説橫于胸次而驅率聖賢之言以從巳意設使義理可通巳涉私意穿鑿而不兑于郢書燕説之誚况又義理窒礙亦有所不可行者乎竊觀來教所謂苟能自省其偏則善端已萌此聖人指示其方使人自得必有所覺知然後有地可以施功而為仁者亦可謂非聖賢之本意而義理亦有不通矣熹于晦叔廣仲書中論之巳詳者今不復論請因來教之言而有以明其必不然者昔明道先生嘗言凡人之情易發而難制者惟怒為甚能于怒時遽忘其怒而觀理之是非亦可以見外誘之不足惡而于道亦思過半矣若如來教之云則自不必忘其怒而觀理之是非第即夫怒而觀夫怒則吾之善端固巳萌焉而可以自得矣若使聖賢之門巳有此法則明道豈故欲捨夫徑捷之塗而使學者攴離迂緩以求之哉亦以其本無是理故爾且孟子所謂君子深造之以道欲其自得之者正謂精思力行從容涵泳之久而一日有以泮然于中此其地位亦巳髙矣今未加克復為仁之功但觀宿昔未改之過宜其方且悔懼愧赧之不暇不知若何而遽能有以自得之邪有所知覺然後有地以施其功者此則是矣然覺知二字所指自有淺深若淺言之則所謂覺知者亦曰覺夫天理人欲之分而巳夫有覺于天理人欲之分然後可以克巳復禮而施為仁之功此則是也今連上文讀之而求來意之所在則所謂覺知者乃自得于仁之謂矣如此則覺字之所指者巳深非用力于仁之久不足以得之不應無故而先能自覺却于既覺之後方始有地以施功也觀孔子所以告門弟子莫非用力于仁之實事而無一言如來諭所云指示其方使之自得者豈子貢子張樊遲之流皆巳自得于仁而既有地以施其功邪其亦必不然矣然熹前説其間亦不能無病如云為仁淺深之驗觀人觀巳之説皆有病以今觀之自不必更為之説但以伊川和靖之説明之則聖人之意坦然明白更無可疑處矣答胡伯逢知言之書用意深逺析理精微豈末學所敢輕議向輒疑之自知巳犯不韙之罪矣茲承誨喻尤切愧悚但鄙意終有未釋然者知行先後巳具所答晦叔書中其説詳矣乞試取觀可見得失也至于性無善惡之説則前後論辨不為不詳近又有一書與廣仲文論此尤詳于前因龜山中庸首章而發及引易傳大有卦及遺書第二十二卷者此外蓋巳無復可言者矣然既蒙垂諭反復思之似亦尚有一説今請言之蓋孟子所謂性善者以其本體言之仁義禮智之未發者是也程子曰止于至善不明乎善此言善者義理之精微無可得而名姑以至善目之是也又日人之生也其本真而靜其未發也五性具焉日仁義禮智信所謂可以為善者以其用處言之四端之情發而中節者是也程子日繼之者善此言善却言得輕但謂繼斯道者莫非善也不可謂惡是也蓋性之與情雖有未發巳發之不同然其所謂善者則血脈貫通初未嘗有不同也程子曰喜怒哀樂未發何嘗不善發而中節則無往而不善是也此孟子道性善之本意伊洛諸君子之所傳而未之有改者也知言固非以性為不善者竊原其意蓋欲極其髙逺以言性而不知名言之失反陷性于搖蕩恣睢駁雜不純之地也所謂極其髙逺以言性者以性為未發以善為巳發而惟恐夫巳發者之混夫未發者也所謂名言之失者不察乎至善之本然而槩謂善為巳發也所謂反陷性于搖蕩恣睢駁雜不純之地者既于未發之前除却善字即此性字便無著實道理只成一箇空虛底物隨善隨惡無所不為所以有發而中節然後為善發不中節然後為惡之説又有好惡性也君子好惡以道小人好惡以巳之説是皆公都子所問告子所言而孟子所闢者巳非所以言性矣又其甚者至謂天理人欲同體異用則是謂本性之中巳有此人欲也尤為害理不可不察竊意此等偶出于前輩一時之言非其終身所守不可易之定論今既未敢遽改則與其爭之而愈失聖賢之意違義理之實似不若存而不論之為愈也知仁之説亦巳纍辨之矣大抵如尊兄之説則所以知之者甚難而未必是而又以知仁為仁為兩事也所謂觀過知仁因過而觀因觀而知然後即夫知者而謂之仁其求之也崎嶇切促不勝其勞而其所謂仁者乃智之端也非仁之體也且雖如此而亦曠然未有可行之實又須别求為仁之方然後可以守之此所謂知之甚難而未必是又以知與為為兩事者也如熹之言則所以知之者雖淺而便可行而又以知仁為仁為一事也以名義言之仁特愛之未發者而巳程子所謂仁性也愛情也又謂仁性也孝弟用也此可見矣其所謂豈可專以愛為仁者特謂不可指情為性耳非謂仁之與愛了無交涉如天地冠屨之不相近也而或者因此求之太過便作無限玄妙竒特商量此所以求之愈工而失之愈逺如或以覺言仁是以知之端為仁也或以是言仁是以義之用為仁也夫與其外引智之端義之用而指以為仁之體則孰若以愛言仁猶不失為表裏之相須而可以類求也哉故愚謂欲求仁者先當大槩且識此名義氣象之倣佛與其為之之方然後就此慤實下功尊聞行知以踐其實則所知愈深而所存益熟矣此所謂知之甚淺而便可行又以知與為為一事者也不知今將從其難而二者乎將從其易而一者乎以此言之則兩家之得失可一言而決矣來教又謂方論知仁不當兼及不仁夫觀人之過而知其愛與厚者之不失為仁則知彼忍而薄者之決不仁如明暗黑白之相形一舉目而兩得之矣今乃以為節外生枝則夫告往知來舉一反三聞一知十者皆適所以重得罪于聖人矣竊謂此章只合依程子尹氏之説不須别求玄妙反失本指也直敘胸臆不覺言之太繁伏惟髙明財擇其中幸甚幸甚答黃仁卿東所示春秋大旨甚善此經固當以類例相通然亦先須隨事觀理反復涵泳令胸次開闊義理貫通方有意味若便一向如此排定説殺正使在彼分上斷得十分的當却于自巳分上都不見得箇從容活絡受用則亦何益于事邪大抵不論看書與日用功夫皆要放開心胸令其平易廣闊方可徐徐旋看道理浸灌培養切忌合下便立巳意把捉得太緊了即氣象急迫田地狹隘無處著功夫也此非獨是讀書法亦是仁卿分上變化氣質底道理也然看春秋外更誦論孟及看近思録等書以助其趣乃佳若只如此實恐枯燥難見功耳答黃仁卿示諭食貧之狀深為歎息向見擬此闕意官期必近不謂尚許久也然從官兩世清貧如此益見家法之有傳足使貪濁知所愧矣所恨自困涸轍不能少致濡沫之助但有歎恨可改葬之議既非人謀所及假卜筮以決之亦古人所不廢更詳思之如何熹自劾之章巳批上旨喻以事不相關則是巳經進呈矣遜詞避寵亦事之宜紛紛不巳又似過甚今巳幸得請矣只用省劄令還故官更不再出敕牒亦甚省事位髙言廢又是上一等人今人則位未髙時巳無及物之志矣可為深太息也此間親知有仕于汀者書來説彼民望行經界尤切韜仲歸説趙書亦請行之當軸頗難之彼于汀無利害只恐牽連并及泉漳耳之政且得如此亦善人固難得每事皆善也漳人亦淳但淳者太淳故其有勢力者得肆殘暴為可憐耳向來繆政撫其淳者甚至而治其豪猾不少貸亦有精力不及而誤縱舍者然或者至今以為嚴殊不可曉深自愧恨不得如仁卿者為寮友而規正之也答黃直卿幹别𥿄之喻如此處心甚善然亦似有先立標凖之病武侯所謂鞠躬盡力死而後巳成敗利鈍非能逆暏者非獨建立事功為然也如此則知處不期寬而自寬行處不期逺而自逺矣試更思之答黃直卿子春聞時相過甚善為學直是先要立本交義却可且與説出正意令其寬心玩味未可便令考校同異研究纎悉恐其意思促迫難得長進將來見得大意略舉一二節目漸次理會蓋未晚也此是向來差誤今幸得見却須勇革不可茍避譏笑却誤人也答黃直卿前書所論先天太極二圖久無好况不暇奉報先天乃伏羲本圖非康節所自作雖無言語而所該甚廣凡今易中一字一義無不自其中流出者太極却是濂溪自作發明易中大槩綱領意思而已故論其格局則太極不如先天之大而詳論其義理則先天不如太極之精而約蓋合下規模不同而太極終在先天範圍之內又不若彼之自然不假思慮安排也若以數言之則先天之數自一而二自二而四自四而八以為八卦太極之數亦自一而二剛柔自二而四剛善剛惡柔善柔惡遂加其一中以為五行而遂下及于萬物蓋物理本同而象數亦無二致但推得有大小詳略耳近日講論及修改文字頗多當候相見面言之答黃直卿示喻讀書次第甚善但所諭先天太極之義覺得大假局促日用之間只教此心常明而隨事觀理以培養之自當有進才覺如此狹隘拘迫却恐不能得展拓也子細巳别録去可更詳之答黃直卿所論太極散為萬物而萬物各具太極見得道不可須臾離之意而與一貫之指川上之歎萬物皆備之説相合學者當體此意造次顛沛不可間斷此説大槩得之但周子之意若只如此則當時只説此一句足矣何用更説許多隂陽五行中正仁義及通書一部種種諸説邪通書中所謂誠無為者太極也幾善惡者隂陽也德日仁義禮智信者五行也皆就圖上説出其餘如靜虛動直禮先樂後淡且和果而確之類亦是圖中隂陽動靜之意蓋既曰各具太極則此處便又有隂陽五行許多道理須要隨處一一盡得如先天之説亦是太極散為六十四卦三百八十四爻而一卦一爻莫不具一太極其各具一太極處又便有許多道理須要隨處盡得皆不但為塊然自守之計而巳也然此亦只是大槩法象若論日用功夫則所守須先有箇自家親切要約處不可必待見圖而後逐旋安排其隨處運用亦須虛心平氣徐觀事理不可只就圖上想像思惟也既先有箇立腳處又能由此推考證驗則其胸中萬理洞然通透活絡而其立處自不費力而愈堅牢閛闊矣若但寸寸誅銖比量湊合逐旋將來做工夫則亦何由有進步處邪答黃直卿前書所論大學兩條似未然如此則是明德新民其初且苟簡做一截到止于至善處又子細做一截也知至之至向來却是誤作切至之至只合依舊為極至之至然此至字雖與至善之善皆訓極字而用處不同至善是自然極至之至知至是功夫極至之至難作一例説也可試思之此義非獨熹不謂然以示季通諸人亦皆疑直卿不知何故作此見也病中看得孟子要略數章分明覺得從前多是衍説巳略修正寫去此書似有益于學者但不合顛倒却聖賢成書此為未安耳大學諸生看者多無入處不如看語孟者漸見次第不知病在甚處似是規模太廣令人心量包羅不得也答黃直卿喪服篇所説析出經傳破碎重復不相連屬不可行也此篇巳略修定似有條理且其間有見上條見本條之類尚涉重復然去之又似太踈略可更裁之或于本條下依重出例注之而逐條之下却皆削去亦自簡便後有通例一條甚好恐更有可入者當輔之喪服義此篇都未編可更考之恐當以三年問一篇為首蓋其言所以制服行喪出于人情之實最為明切又包三年期功以下皆盡其後乃取諸篇中論喪輕重意義者附之若此類不多即不若依舊只附前篇作傳記亦得士喪禮上下兩卷略定更詳之士虞禮當以士卒哭祥禫之禮附其後而于篇目下注云祔卒哭祥禫禮附喪大記上下自天子逹于庶人者居喪之禮也若其送死之節禮文制數則貴賤之等固不同矣今以天子諸侯大夫之禮附于士禮之篇殊不相入自合採集别為一篇但以世俗枸忌不敢别立篇名故欲只因喪大記篇包舉王侯士庶之禮而放士禮次第分其章假凡言禮之法而似經者則依經例雜法與此篇相表裏凡記事實有議論者則依記例似稍明白但恐其間尚有脫漏差舛可更詳之其虞禮以下尚闕如天子九月而卒哭及九虞七虞等語當别為下篇依士禮次第編集却于見編卒哭等禮篇內刪出三傳作主等説亦當附入其杜預邪説前輩巳有掊擊之者亦當載王侯大夫制度皆入此篇其書禮論語內説諒隂制度及左傳説天子諸侯喪事亦皆依記例隨事附于章目之後如諒隂及后世子皆為三年之類即附祥禫章後譏華元樂舉及仲幾對宋公楄柎藉幹語之屬即附棺椁窆葬等章楚恭王能知其過之類即入誄諡章如此類更推廣求之可附即附但顧命康王之誥恐尤不可遺然又不可分只于篇末附入如何奔喪道喪附此篇之目下依虞禮例並喪恐更有説此所取似踈略可更考之居喪記弔喪附此篇之目下依虞禮例喪義以檀弓哀戚之至一條為首此條甚長今注疏皆誤分斷了今當合之其餘有通説喪禮或沿喪事如孔子早作子張庶幾等語皆合附入别𥿄更有説又剪下碎假一束恐亦可附邾婁復以矢天生地藏子羔之襲喪不剝奠之類巳削去皆可入以上共十篇重出例不須如來喻但于𥘉見處注尾著圈而注其下曰後某章某章放此喪服篇説中亦有一例依此可并詳之士虞禮記既封至除之此一項不入例可更詳之上大夫之虞此條當入大記下篇周禮喪車更詳之若是上下通用即入喪服通例經中若是王禮即入大記初用車處凡巳剪下重復碎假恐有漏落或當載者可更詳之所寄數卷若前此旋次得之即可子細看今并寄來又值事冗目痛只看得一兩卷子細自既夕以後多不及詳可更加功修此數卷也卒哭篇附虞禮後以本記輔經始死三日而殯止遂卒哭注用剛日曰哀薦成事節泩將旦而附止辭一也注末云哀薦成事一句未知當附何處饗辭止之饗注右卒哭記云云明日以其班祔止尚饗右祔云云祔杖不上于堂期而小祥曰薦此常事右小祥記云云又期而大祥曰薦此祥事右大祥記云云中月而禫止未配右禫記云云注中云見某篇云云者更契勘今所定本恐巳刪去隨事改正所論士廟之制雖未能深考然所論堂上前為三間後為二間者似有證據但假設尺寸大小無以見其深廣之實須稍展樣以四五尺以上為一架方可分畫許多地頭安頓許多物色而中間更容升降坐立拜起之處淨掃一片空地以灰畫定而實周旋俯仰於其間庶幾見得通與不通有端的之驗耳若如此圖則堂基之上便分前假三間後假四間及兩邊夾室之位矣即不見得殿屋橫棟從甚處斷兩霤之分從甚處起又不見厦屋兩翼如何似今之門廡又不見兩夾堂外既無墉亦合有柱與否云有柱則于經無文云無柱則兩屋角懸空無寄託處又恐間架次第雖如所説其殿屋分四霤處亦合如前來寄去之説但移得洗更稍向東當簷滴水處耳夏屋亦須作次棟以覆兩夾但設搏風版于兩夾之外次棟盡頭而設洗于其南如此乃有門廡之狀先之説福州人所謂君臣門也蓋屋之前後皆為五間而中三間為直棟旁兩間為兩夾其上椽瓦或為東西霤之上流或為次棟而設搏風于其外也若不如此則殿屋直棟反短于夏屋之棟等殺不應爾也古者降殺以兩恐士廟深廣當自天子制度三降而得之又于其間細分間架乃見其實也適又思之恐只是作三大間旁兩間之中為墻以分房室兩夾之界略如趙子欽説但門廡二字未合耳可更考之晦庵先生朱文公文集卷第四十六朱文公文集四十六卷後考異黃商伯問大學知止能得云云然後求得所止也今或問云天下之事皆有以知其至善之所在其釋知止之本文全體可謂當矣然恐學者見其有天下字有皆字以為必盡窮天下之理然後可以知至善所在而得所止如程子所言格物工夫未足以知至善必待物盡格知盡至始為知至身修以至天下平皆得所止之效與所以繼綱目三語之後言之蓋舉大學之全體極致與乞賜指教閩縣儒學教諭王製校
