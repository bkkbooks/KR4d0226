body:
  text: 書時事出處與趙帥書子直竊見使司行下委兩鄰附籍事官司嘗巳施行但此事𥘉議只委鄉官勸諭人户自來附籍蓋不欲使吏與其間恐有煩擾雖有不願請米者亦不之強但欲請米者非巳附籍不給即其人利害切巳附與不附皆須自任其責行之既久人漸相信今忽有此指揮即自此之後生子得米之人可以安坐不問而歸其責於鄰人鄰人不得米者顧乃代之任責而又無罪賞以督其後又況一甲之內除懷孕家外尚有四家今却只取兩家為鄰若在街市人家齊整去處猶可責之兩畔切鄰不容推託若在鄉村人煙星散去處即或前或後或左或右或踈或密必是互相推託不肯為任此責其生子得米之人既不干預却使無利害之人任無罪賞之事而四家之中又無正定主名萬一無人及時申附直至生子之後其家或欲殺棄即通同蓋庇不復申舉或欲請米即須論訴鄰人以為不申附之罪鄉官既難受理根究其勢必煩有司追證搔擾其害不細不知及今尚可回否若得且令鄉官依舊勸諭人户自行附籍而委措置官者察附籍者之殿最取其尤怠慢者申縣改差而稍加沮辱以警其餘亦足以革舊弊廣恩意如其不然即須嚴立罪賞而使甲內四家同任其責如有懷孕五月之家即四鄰先取本家申乞附籍文狀仍説願與不願請米四鄰連名簽押狀內公共指定專委兩鄰某人某人傳送取附籍鄉官批回付本家收照候生子訖再取四鄰保明繳連元批赴收支鄉官請米其不願請米人亦須四鄰具狀繳連元批保明不曽殺棄關報注籍如此乃可關防推託遺滯詞訴搔擾之弊然既如此即事體規模頓異前日而將來亦恐終不免於煩擾更乞詳酌其宜計其利害之實而行之也大抵此事從𥘉商量非不知如此措置決是不能周遍然所恃者既無煩擾之弊而勸諭恩意有以感動之則賑給之惠雖不能周而隂受生活之賜者自將不勝其衆耳若以此為不廣而欲其速得周遍則決非勸諭之所可及勢須一切以文法禁令驅迫然後可成如此非不美觀然恐官司徒有文移而無事實民間徒𬒳搔擾而無恩惠非前日所為思慮措畫之本意也不審髙明以為如何熹上覆近日倉司所行全是文具委官散榜編排甲户置立粉壁處處紛然而實無一文一粒及於生子之家愚意此可以為戒而不可學也與趙帥書適聞崇安宰丞同到精舍云𬒳使檄有所營造不知果然否此是私家齋舍不當慁煩官司不唯在熹私義有所不安加以蹤迹孤危動輒得謗今更坐役官司起造屋宇此正是好題目彼等所日夜窺伺而不可得者侍郎見念之悉豈當以此禍餉之乎春間在彼亦有朋友數人欲為營葺已定要束矣尋聞去歲有人偽印圖榜列熹及劉平父名銜勸緣題疏有一後生親見印本因思如此乃是為實前謗遂報諸人罷其所謀況今乃煩官司豈得為穩便乎向嘗蒙喻蓋巳有此意其時亦嘗具稟委之官司恐不穩便但未嘗究其説耳官司為之於義既不可於事亦不便蓋其一則必有搔擾其二則不能如法萬一為之自此熹更不敢入精舍矣聞之憂恐急作此附遞拜懇乞且行下罷役若台意必欲不虛前諾徐别圖之亦未晚也與趙帥書與一本作答前書所稟懷有不能自巳者既而思之言語過當深以自咎然有以知髙明之必見容也賣鹽之事誠亦非便蓋下四州民間納産鹽錢州縣自合給鹽償之今既例不給鹽而帥司復行榷賣議者之言亦未為不當但相承巳久調度所資有不獲巳者向時汪丈入閩正值沈漕罷去王與道住賣之後亦深以此為疑後不得巳竟復榷之想亦是别無擘畫處也不知使司今欲作如何相度愚意此事今且如此暗行貨賣姑為不得巳之計則他日或有能弛之者若遂相度奏請明降指揮則是福州民間增此一項無名之賦自我而始況泉漳興化事體一同勢必援例公行則其為害又不但福州而巳此事更乞深思少遼緩之不須催促漕司相度或只作手劄密奏上意未必不以為然更以書曰廟堂諸公亦當曉然見此利害也不審台意以為如何祠請未遂不知再入文字否似聞論鹽事者頗及浚湖之役不知是否前日林子方因治建昌士人無禮教官事幾為要路所擠今日風俗大抵不甚賭是令人憤悶伏想髙壞於此必有處也與林擇之書彼中旱勢如何得雨莫巳沾足否稿苗尚可救否此中燥濕不均山間有頻得雨處有極枯稿處度其勢短長相輔亦足以相救所患者人心喜亂不待飢餓而巳生狂妄之意又患些小米穀為他處般販則亦無以為繼而實有飢餓之憂以速變亂耳巳纍書白帥冝亟糴廣米及台州米近聞永嘉亦有米可來此皆不可不早為之計如福州闕米則此間米不可仰近觀其所處置却只是禁上流欄米及遣人來收糴此二䇿者不過取之吾之境內譬如一家之中二子皆飢乃奪甲以哺乙耳亦巳極論其非是不知以為然否幸以纍年以來見聞之驗告之此非細事也唯壬午癸未陳應之守建時禁港甚嚴而汪丈任福州一無所問此最為得其後趙清卿任元受在福州則陳邦彥在建與之爭王瞻叔在福州則任希純在建與之爭二公雖悍然卒不能奪建人之守然後無事今上流諸州其小者不敢抗大府之命其大者又未必有意於民而亦不知其利害之若此也帥府又快於吾令之得行吾民之可以無飢而未及慮夫建劒之俗一有紛紜則將為吾之憂有大於此者而不及救也只如建寧向來屢飢亦不免用諸縣自給之説不得般米下船然後村落獲濟城中又泝流發米以助諸縣然亦不聞城中之飢今任事者曽不察此諸縣以舊事告皆不之信此必不能有説以告帥司全在帥司自為一路之計算其長者而為之耳聞延平積粟皆已匱竭此可深憂宜檄諸州照例禁港不得般販村米無致將來闕食生事大凡盜賊皆起於深山逺官府處不可不慮也此於帥府事體蓋所當然而一靣多方招邀運致外道米斛入界乃為上䇿廣中雖云不熟然亦當勝本路如溫台則粒米狼戾今正及時可招可糴不可失也如本路糴米則非計之得又非其時枉費多錢反得少米不若且看將來如他處米來多即不須糴若不得巳亦且俟十月以後間晚禾成熟後方可糴此理的然前日書中亦説不盡更煩子細為陳之不可有一字之遺也與林擇之書近因便兵附狀想逹秋涼遠惟德履隹勝不知到城中居甚處必巳不復入學矣前書所論曽言之否聞汀寇甚熾想幕府無暇及他事矣近例帥須親到地頭督戰此甚非䇿然既有此指揮恐不得不一出但未可遽深入且到延平徐議進退可也此賊巳敗官兵殺將吏決不可招只有盡力撲討然其所以致此必是官司前後非理侵擾有以致之却須詢究其由將元來官吏奏劾重作施行以謝其人仍計盜起縣分合起發支遣錢物並令一切倚閣以慰人心不令别致響應即支遣不可闕者令漕司撥錢應副此兩項是第一義若能行之即一靣多出印榜簡約其詞令人於地頭散帖曉諭其次即須非時接見賔客僚吏務通下情以資計䇿此事平日巳是欠闕仐尤不可循舊失也其次須有將有兵乃可責效若只用見今兵官統見今兵卒此則決然敗事無疑聞辛幼安只是得所募敢死之力見馮湛説亦招得賊中徒黨作鄉導方能入山破賊巢穴本路左翼軍向來便是此等人所以陳敏用之有功仐己無復舊人只與諸州禁軍土軍無異却恐歸正官及牢城中有可募者但得有心膽事藝者勿問其所從來可也向見帥喚得商榮者在彼後來看得如何沙世堅者本亦只是此流欽夫拔之徒隸之中使捕小賊輒有功至李接之亂遂收其用耳起發諸州禁軍決是無用然仐卒未有人其勢不可以不起但亦止可遙為聲勢切不可使入山與賊交鋒適所以長賊威而沮官軍之勢亦防賊人乘虛衝突旁近州郡或本處有嘯亂應賊之人須稍分留令足彈壓必不得巳寧可申朝廷撥廣東摧鋒軍與左翼相掎角亦是一事但正當此荒歉供億之費不資不知何以為計耳聞沙縣宰頗有才南劒推官趙師淵劒浦令丞皆曉事此是將來帥到南劒可備使令之人亦不可不知也此皆老生常談恐或可椑思慮之所不及相見煩為言之前日通放米船之説當此火色尤不宜力主偏見以搖人心更可細説得作訪聞行下建劒云恐上流州郡闕米本司日前行下通放米船約束更不施行仍委本州逐縣隨宜相度措置儲蓄以備賑恤如此即事體正當物情便安矣今日向前進討勝負之外更有衝突響應二事甚可慮西南慮衝突東北慮響應此間諸公只宋倉尚可告語然非捕盜職事不知新憲如何若亦未有長䇿即一路之命全在趙帥一身獨自擔當不是小事昨夕聞此令人展轉不寐偶有歐陽慶嗣便託渠先發此書此間事不暇及渠到必自相見也與趙帥書熹竊聞究心荒政以為來歲之備者甚至甚善甚善但上流糴米之數似亦太多蓋雖未即津發然收之官民間便闕此數又且處處置埸收糴冬間米價便須增長來春糴貴亡疑今業巳施行不敢便乞住罷若但得少損其數亦不為無輔也又聞浙米來者頗多市價頓減邦人甚喜而識逺者慮其將不復來此一道安危之大機也謂宜多方招致稍增市價官為收糴以勸來者比之溪船海道官自搬運縻費損失所爭決不至多此等事一是要早啇量二是要審計度三是斷置果決不可因循去冬見議開湖事熹謂須先計所廢田若干所溉田若干所用工料若干灼見利多害少然後為之後來但見匆匆興役至仐議者猶以費多利少為疑浮説萬端雖不足聽然恐亦𥘉計之未審也大抵集衆思者易為力專巳智者難為功此等事但呼官吏之可與謀者條畫而算計之其贏縮利害可以一日而決不必閉閣深念徒弊精神而又未必盡乎利病之實也庸暗踈闊智不謀身而過計多言喜與人事深自覺其可厭而未能遽巳不審髙明以為如何狂妄之罪亦惟并寬之也官自運米弊病百端頃時會稽有一斛而虧兩斗者不免奏劾坐押使臣而王仲衡力庇之反欲捃拾發舉官吏乃剡縣葉簿即黃丞之表弟問之可知也或謂當募出等啇賈使之抱認津致雖或優其傭費亦未敵官運折欠之多也此事前日陳教授歸嘗囑以稟聞似亦可采用也陳雖後生然甚曉事聞侍郎遇之頗厚凡百更垂下問當有所助然詢謀貴廣亦不專在一人嘗記先儒解孟子訑訑二字以為自足其智不嗜善言之貌此言甚有味也今時士大夫非無愛人憂國之心但雖賢者不免有此氣象所以雖其所知所與可以盡言而無間者亦未必得竭懷抱而况於踈逺卑賤之人乎此可為長太息也諸公奏議大體甚正其間一二篇如蔡承禧輩議論無甚可採不足列於諸老之間而獨斷數篇恐或飲藥以增病也溫公兩篇當為章惇而發雖其救時之切不暇遠謀然亦終不可以為後世法也使紹聖崇寧之間羣小得此蹤迹豈不為竒貨哉又聞明道王霸劄子中間雖遭擯黜今雖巳復收然恐其他更有似此若迂而實切若小而甚大者須别作一眼目看不可輕有遺棄恐後世有明眼人冷地看著有所遺恨竊笑於仐日也伯恭文鑒所載奏疏甚詳頃但見其目録亦不暇細考然恐其去取之間亦須有説鄙意以為凡其所載似不可遺其所不載乃當增益此亦條例中之一事也此事之説甚長恨去歲困於人事不得子細請教耳與趙帥書熹衰病之餘災患踵至殊不自堪伏蒙問恤良以為感又蒙軫其乏絶割清俸以周之仰認眷存尤切愧荷但窮巷書生𬞞食菜羔自其常分不知後生輩以為創見便爾傳説致誤台慈以為深憂亟加救接至於如此在熹之義豈當復有辭避實以近日偶復粗可支吾未敢虛辱厚意謹巳復授來使且以歸納萬一他日窘急有甚於今當别稟請以卒承嘉惠也人參附子則巳敬拜賜矣但少有鄙懷冒凂台聽不審高明以近日所處劉家典庫事為如何若熹鄙見則竊以為甚不類門下平日之舉措也鄉里自此旬月以來閭巷聚談有識竊歎下至三尺童子亦皆憤然有不平之氣熹恐門下於此偶末之思也行迷雖逺尚及改圖以全素節以息流議不審門下亦有意乎如其不然則天下之士將有以夷虜之道疑於門下而不入其鄉者矣此熹之所大恐蓋不特為劉氏遊説也久辱知遇不敢不盡所懷雖𬒳譴絶所不敢辭伏惟有以察之而巳他喻數條未暇報稟歲晚更乞順時之宜進德自重區區不勝祈望之切并幾台照答梁丞相書熹伏讀賜教盛德不居退託愚懦仰惟明公之心正大光明表裏洞徹無一豪有我自私之意而熹以妄庸受知之久又勤下問至於如此亦豈能恝然自閉一無所進以效其尺寸之愚哉但以正此退藏不當出位是以於政體之是非人材之邪正一豪不敢有所陳説而獨請以王通所謂願君侯正身以統天下者敬為明公誦之其言雖近其指則遠伏惟明公於此試留意焉廣引人材勤攻巳闕使凡政事之出於我者無一疪之可指則上以正君下以正人將無所求而不得如其不然則事之小不正者積之之多亦足以害吾之大正使吾至大至剛之氣日有所屈於中而德望威名日有所損於外是則且將見正於人之不暇尚何望其能有正君定國之功哉今天心未豫而民力巳殫國威未振而虜情叵測惟明公於此深念而亟圖之則熹也受賜多矣狂言犯分亦惟高明有以寬之與陳福公書北方消息傳聞不真春間有上封事者前言虜為西夏所逼故遷國以避之其後乃慮其設詐以謀我此巳是揣摸無一定之計最後又只泛言乞詔樞廷嚴為邊備而巳乃大中上意改秩除官其後乃聞廬帥王希吕奏虜為契丹遺種大石林牙所襲失亡甚夥老酋遁走不知所在三日而後得之朝廷頗信其言然去冬有親戚自淮上歸巳傳此言却云渤海所襲尋亦不聞的耗然則此報又未知其信否也若鄙意則以為此虜盛極而衰舉措顚錯就如所聞未必得實其勢不足深慮彼其修城浚汴持為虛聲以懼我耳然朝廷巳為之調發海舟一畨騷動此正高熲王朴之遺䇿而我巳落在計中至於天文變於上坤轂動於下正是君臣上下動色相戒飭躬正事以圖消弭之時顧乃視之恬然略無驚懼之意上之則九重不聞有側席求言之詔下之則諸府不聞有引愆避位之章舉朝媕阿相徇為日巳久士大夫稍有氣節敢議論者盡在逺外寂然不聞有一人能為明主忠言以指姦佞禆闕失固邦本逹民情者聞其語及天變則盡以歸之虜酋使應天道此巳為諂諛不忠之大至於地震東南數路無一不然又將使誰當之而不以為慮耶熹以為今日之事所當憂者莫大於此而境外之事不與焉明公果有乃心王室之意但當以此曲折極言於上勸以博詢芻蕘深求巳闕之意則明公雖不盡言天下之事而天下之言因我而逹此功固巳大矣又何必刺探隱謀密陳祕計然後為論事哉觀富韓公退居西都時巳嘗坐汝州青苗削奪之譴司馬公吕申公又皆新法異論得罪有嫌之人然因事抗章盡言無隱不少異於立朝之時彼豈不知迹方孤危重咈主意復忤貴權之為患誠以愛君憂國之誠切於中而不暇顧也又况明公乞身巳久於今日諸人本無睚眥之怨固無諸公之嫌而上心不忘便蕃寵錫又非若諸公之嘗在淪落擯棄之域也亦何惜而不為明主一言以安宗社於阽危之際救生靈於水火之中乎近年以來將相大臣始終全德無可指議如明公者指不可以再屈誠能及此更為此舉則功烈𬒳於當年聲稱垂於後世者又不止於前日矣不然不過今日苟全上下之交而後之忠臣義士考觀歲月計慮安危必將有大不滿於明公者夫以裴令之賢猶不免於晚節浮沉之譏可不念哉可不戒哉仰恃知照不覺縷縷伏惟高明有以亮之與陳丞相書竊聞侍祠之詔至于再三此蓋聖主思見故老有所咨詢非獨循常備禮之所為而得林擇之書側聞丞相亦有行意伏惟久去闕庭不勝忠戀且以向來嘗欲有言因循未果乃復有此幾會誠不可失計程今或巳在道矣虜中事不足言今日之憂正在精鋭銷耎慣習燕安廟堂無經逺之謀近列無盡規之義阿諛朋黨賢知伏藏軍政弄於刑臣邦憲屈於豪吏民窮兵怨久不自聊季孫之憂恐不在於顓臾也不審尊意以為如何井伯書云廉夫有學易之意甚善然此書難讀今之説者多是不得聖人本來作經立言之意而緣文生義硬説道理故雖説得行而揆以人情終無意味頃來蓋嘗極意研索亦僅得其一二而所未曉者尚多竊意莫若且讀詩書論孟之屬言近指逺而切於學者日用功夫也抑嘗聞之元城劉忠定公有言子弟寧可終歲不讀書而不可一日近小人此言極有味大抵諸郎為學正當以得師為急擇友為難耳與陳福公别𥿄熹冒昧有所干扣極犯不韙近得泉州黃寺丞書云陳休齋病中嘗為渠言曽令熹致懇丞相為其女求嫁資令其見語復以稟聞熹實不記曽有此説𥘉不敢為言既而思之此老之意止是欲令熹與黃寺丞共致此懇而無其端故設此言以發之意丞相聞其屬纊深悲之言必當惻然憐之也故敢因黃回便先附此劄其詳黃必具稟熹更不敢覼縷然巳不勝其恐懼矣與史太保書熹竊聞頃者几杖造朝禮際隆洽蓋自祖宗盛時所以褒崇故老報答元勳未有若斯之盛者也自是以來人無愚智莫不咨嗟歎息以為聖主尊師重道之意若此其厚而以明公平日自任之重卜之知其所以報此殊遇者必當有以度越前人決不肯為張禹孔光以及近世之以明良慶會自居者之遺臭於無窮也今者變異重仍虜情叵測當寧側席有識寒心熹愚竊謂元老大臣同國休戚告猷之會誠未有急於斯時者明公不能及此發口一言則永無報效之期終懷寵利之愧矣故願深察愚言亟召門下直諒多聞之士曲加訪問俾盡其説兼總條疏悉以上聞於以報塞恩遇慰答羣情追配前修一洗疑論計無便於此者不審明公亦有意乎至於狂瞽妄發罪當誅斥則惟明公有以寬之答史太保别𥿄熹昨者狂妄輒以瞽言仰瀆崇聽自循分守當得譴斥之罪不謂髙明博大無所不容誨答諄諄罄竭底藴三復自幸不惟私以免於罪戾為喜而又得側聞前此告猷之益天下巳有隂受其賜者尤竊增氣尚恨未得躬扣昌言之目以發蒙昧耳今者邉事益急變異荐臻人無智愚共以為懼然熹淺陋竊以為境外之傳未足憂而譴告之深為可畏也今朝廷於其不足慮者既巳過為之防而於其深可畏者反未有處熹甚惑焉夫以災異而求直言歷世相傳具有故實明公身為天下大老誠有憂國之心亦不當俯及細務願以此意為上一言使幽隱之情得以上通則天下之言皆明公之言而明目逹聰感召和氣皆明公之功矣感激容貸之恩懷不能巳敢復言之俯伏俟罪答詹帥書熹自頃拜狀之後涉秋以來百病交攻幸以餘庇未至委頓以故所委文字久未能寫及來使到伏奉賜書乃始下筆欲俟其還自三山而授之而屢寫輒不入意比其還也猶三四易𥿄收拾輔綴又五六日然後畢要是本不能書而又嘗略識古人書法不敢信手胡寫以孤見屬之意勉強為之終是不能成字今既無收殺只得封納可用與否更在髙明財之也輔貼處不入行道須得善工識字體者儧那取正其墨水􅎊漬不見元筆路處并令照應修減乃佳碑額元只欲題貼職今詳階官封爵皆髙於職名今并書之然亦只用幅𥿄碑石必可容也但本文一二處未穩别𥿄具呈望更詳酌恐可略修定庶可傳久逺耳侍郎丈入陪近班日有論思之益善類方以為喜今乃以區區一方鹽策之故輕去朝廷識者不能不以為恨謙仲詩雖佳然急於枝葉而緩其根本亦未得為至論也州縣賣鹽不能無弊閩中今亦尚有病此之處然頃來推行鈔法又奪州縣之入以歸朝廷緣此州縣束手雖軍兵衣糧亦有支不行處幾致生事今者廣西所行既經仁者之慮必無此患然鹽利盡歸商賈而州縣只得淨利錢巳是不及向來官賣之數又失夾帶耗剩之利將來必是不免須有費力去處此恐今日亦不得不為之過慮也昨來會稽見一書記李誠之廣西數事而鹽法為之首大抵古人立法非是苟為寬弛以劉晏造船之類正自有深意耳今謾録呈幸一過目又如半年不能千籮而五日乃十倍之此得無近於蔡尹之役法否王正之頃嘗一見雖不甚欵然意其老成更練所慮必深恐尚可咨訪以盡利病之實此固髙明所不憚也辱知之厚不敢默默僣易及此愧悚亡巳欽夫舊政固有賴於修明然在明牧必自有以深慰四方之望者頃在浙東見州郡催科奉行版曹文書不依省限既先期取了民固巳不堪命矣今見小報新坡有請州郡上供錢上下半年比校此其勢愈急刻矣當路之人略無忠言竒䇿以開廣德意而所以椓喪邦本者日甚一日為之奈何學術之章固知有謂然所以反身之實亦實有愧於其言者但知皇恐自修而巳此其為賜亦不可謂不厚也病中整頓得中庸孟子頗勝於前恨地逺不得擕以請教間中又無人抄寫拜呈深以為恨耳益逺聲光伏幾為斯道斯民千萬自重區區至禱答詹帥書熹向蒙下喻欲見諸經鄙説𥘉意淺陋不足薦聞但謂庶幾因此可以求教故即寫呈不敢自匿然亦自知其間必有乖繆以失聖賢本指誤學者眼目處故嘗布懇乞勿示人區區此意非但為一時謙遜之美而巳也不謂誠意不積不能動人今辱垂喻乃聞巳遂刋刻聞之惘然繼以驚懼向若預知遣人抄録之意巳出於此則其不敢承命固已久矣見事之晚雖悔莫追竊惟此事利害如前所陳所繫巳不細矣又況賤迹方以虛聲橫遭口語玷黜之禍上及前賢為熹之計政使深自晦匿尚恐未能免禍今侍郎丈乃以見愛之深衛道之切不暇以消息盈虛之理推之至為刻畫其書流布逺近若將以是與之較強弱爭勝負者熹恐其未能有輔於世教而適以重不敏之罪且於門下亦或未免分朋樹黨之譏蓋未論東京禁錮白馬清流之禍而近世程伯禹洪慶善之事亦可鑒矣豈可遽謂今之君子不能為前日之一德大臣耶況所説經固有嫌於恃事而不能避忌者如中庸九經之類指為訕上而加以刑誅亦何不可乎去歲建昌學官偶為刻舊作感興詩遂為諸生注釋以為謗讟而納之臺諌此教官者幾與林子方俱𬒳論列此尤近事之明鏡雖若無足畏避然亦何苦而直觸此姦慝之鋒耶欲布愚懇便乞寢罷其事又恐巳興工役用過官錢不可自巳熹今有公狀申使府欲望書押入案收索焚毁其巳用過工費仍乞示下實數熹雖貧破産還納所不辭也如其不然此輩決不但巳一身目前利害𥘉不足道正恐以是反為此道無窮之害耳切乞更入思慮不憚速改千萬幸甚德慶刋本重蒙序引之賜尤以悚仄此書比今本所爭不多但緊切處多不滿人意耳序中所用善學聖賢之語極有意味但今日紛紛本非為程氏發但承望風旨視其人之所在而攻之耳若此人尚談清虛則并攻老子幸修齋戒則兼詆釋迦曽讀三經字説則攻王氏曽讀權書衡論則斥三蘇怒室色市彼亦何嘗有定論而可與之較是非曲直哉但不察此而欲力與之爭則必反以激成其勢而益堅其説或遂真為道學之害亦不為難此尤不可不慮耳當時與王信伯辨者恐亦尚是近道理人故得以此言屈之若在今日彼豈有憚於此耶蒙喻欽夫説曽點處鄙意所疑近巳於中庸或問鳶魚章內説破蓋明道先生乃借孟子勿忘勿助之語發明巳意説不到處後人却作實語看了故不能不失其意耳經題之説尤見精密不肯容易放過大抵此理何所不在今人𥘉不理會只見事體小可便謂無害而以必整理者為過當非獨此事為然也頃嘗見楊子直説朝景迂嘗言先儒經解之題例不敢以巳之姓名加之經上如春秋左氏傳尚書孔氏傳周禮鄭氏注皆經題在上姓氏在下此為得體鄙意舊亦嘗謂如此故每題程先生易傳必曰周易程氏傳後來以告伯恭伯恭亦深以為然為換却婺學易傳籖子以此論之則今者所喻猶若有所未盡也如何如何近傳得一文字詆鹽䇿尤力不知巳見之否此事雖纍蒙誨諭然每詢之往來無一人以為便而仕於廣右者無一人不以州縣窘乏為言近又細詢只桂州諸邑之鈔巳是不免等第科賣凡此皆與尊喻不同不知果如何區區過計之憂尚欲髙明更加詢究算其利於民之多者而從之也其范守文字謹以元本封呈幸一過目或有所取則彼攻吾短者乃所以成吾之長固仁人之所不忍棄也僣易及此悚恐之深尚幸垂察答詹帥書伏蒙開喻印書利病敬悉雅意然愚意本為所著未成次第每經翻閲必有修改是於中心實未有自得處不可流傳以誤後學加以此道年來方為羣小反目竊味聖賢垂戒欲知進退存亡而不失其正之指只合杜門却掃隂與同志深究力行以俟道之將行不當如此用官錢刻私書故觸其所不欲聞者使其有所指以為病而其禍且上流於此學使天下鉗口結舌莫敢信鄉是則欲道之行而反以抳之此稷下甘陵所以基坑焚黨錮之禍也然今竊味白誨必以利害休戚置之度外為説則亦無可言者但兩年以來節次改定又巳不少其間極有大義所繫不可不改者亦有一兩文字若無利害而不改終覺有病者今不免就所示印本改定納呈欲乞暇日一賜省覽即見前日之繆本非可傳之書削而焚之上也鐫而藏之次也必不得已則改而正之其字多於舊處分作兩行注字亦可此則最為下䇿雖未必便能不誤學者亦且粗滿區區今日之心然後患之來可以立俟熹非自愛而憂之實懼其不知妄作未能有輔於斯道斯民而反為之禍也伏惟執事試深思之若能斷然用熹所陳之上䇿即案前此兩次公狀舉而焚之如反手耳或恐前狀未蒙書判付曹今再納一本切望深察也欽夫文集久刻未成俗人嗜利難與語然亦一面督之得即納去次孟子説渠巳不幸無復增修刻亦無害恐未能使其無遺憾於九原耳伯恭大事記甚精密古今蓋未有此書若能續而成之豈非美事但讀書本自不多加以衰老昏憊豈復能辦此事世間英俊如林要必有能為之者但恐其所謂經世之意者未離乎功利術數之間則非筆削之本意耳浙中近年怪論百出駭人聞聽壞人心術強者唱弱者和淫衍四出而頗亦自附於伯恭侍郎丈在逺未必聞之他日還朝當為深歎息也楊子直近為趙帥招致入蜀不知巳發臨川未尚未得書也此間官鹽利病參半而臨汀受弊為尤甚趙帥欲更之而諸司議多不協至有違言子直亦遭指目興事之難蓋如此録示鹽策條奏及别紙誨諭詳悉尤見所以因時救弊加惠一方之本但不知州縣果無闕乏否賣鈔果無科擾否將來不至復為招糴折苗之計否近見一相識來此云在廣東事但憲聞其論此事甚悉云家廣右數十年平日亦嘗深持鈔鹽之論今得家問乃知其有不易行者此必鄉閭之公論聞渠巳移廣西漕必相見面議也此人亦甚有志節必不苟為同異幸更與詳細反復殊勝逺方傳聞其人未必皆賢而言未必皆可信也熹於此事本無所預出位而言非若印書之利病猶有關於巳也但樂慕道德之深得之傳聞之衆其言亦或出於平生所謂忠信不妄者之口是以不能不深疑耳今既蒙喻懇切至到雖亦未有以見其灼然無可疑者且以長者之言必當可信而不敢不信耳然亦願深計逺慮屢省其成有所未便隨事變通使不失吾前日變法之本意而巳其迹固不必深徇而長守也不審台意以為如何只如諸州俸給後來增添之數舊來鹽息不入省計故可供此今既罷去雖得朝廷及漕司撥錢恐亦只可助公家支俸錢而供給之屬無所取辦若不徑行裁損明乞指揮過取一錢論如入巳贓法則只此一項終為久逺之害又不知他事如何恐亦合討論究索預為之防也閩中八郡上四州不産鹽故舊以客鈔官般並行下四州産鹽故舊來只令百姓隨二稅納産鹽錢而受鹽於官以食近歲上州客鈔廢而下州官不給鹽其官般者利病參半如前所云其納錢而不受鹽者或自買私鹽而食之人亦不以為病也不知今廣西瀕海諸州産鹽地分私鹽一斤為錢幾何鈔鹽一斤為錢幾何若私價甚低官價甚髙則宜實有不便如范君所言者恐亦不宜不加思也向見浙東七郡四郡瀕海而例食客鹽縣道急於辦課力於搜捕細民冒法陷刑不勝其衆嘗欲為討論申請參用福建下四州法而未果至今恨之此亦恐可以輔今法之不及也中庸大學舊本巳領二書所改尤多幸於未刻不敢復以新本拜呈幸且罷議他日却附去請教也中庸序中推本堯舜傳授來歷添入一段甚詳大學格物章中改定用功程度甚明刪去辨論冗説極多舊本真是見得未真若論語孟子二書皆蒙明眼似此看破則鄙拙幸無今日之憂久矣髙教授能留意學校甚善渠嘗從陸子靜學有意為巳必能開道其人也近日諸處教官亦有肯留意教導者然其所習不過科舉之業伎倆愈精心術愈壞蓋不如不教猶足以全其純愚之為愈也太極西銘二解近亦嘗有所更定今同附呈欲乞并賜詳酌而去留之幸甚白鹿堂揭示以時世輩行言之不當在髙君之前亦乞改正仍以髙氏修學門庭為目幸甚教官跋語所謂欣然無吝色以下數語似熹自以此書巳就而喜於流行者尤為非便區區此時若知幕府巳有流傳之意即不敢承命納呈矣今若毁棄此序固無所施如其不然即乞易去此言及下文數句幸甚幸甚與詹帥書熹前日拜書并巳校過文字臨欲發遣而略加點檢則諸生分校互有踈密不免親為看過其間又有合修改處甚多不免再留來使助其口食令更俟三五日昨日始得了畢但論語所改巳多不知尚堪修否恐不免重刋即不若依舊本作夾注於體尤宜向見子直道朝景迂之説云先儒解經只作此體是亦尊經之意若不再刋不必議也若但修改亦乞專委通曉詳細之人親自監臨儧那字數減處空闕不妨多處不免分作兩行如夾注狀不可便以此本直付匠者恐其憚於工力揭去紙帖致有合改處不曽改得久逺為害也然又細思此亦且是今日所見以為粗免踈脫更過數日再看決須更有改易若隨時修版印版有不勝修者且亦無時而巳將來又豈復常有留意於此者則是此書之行為學者之利殊少而為害多使熹介然常有不滿之意其害又不止於論列行遣而巳也懷不能巳再此具稟伏乞台照與張定叟書契勘汀州在閩郡最為窮僻從來監司巡歷多不曽到州縣官吏無所忌憚科敷刻剝民不聊生以致逃移拋荒田土其良田則為富家侵耕冒占其瘠土則官司攤配親鄰是致稅役不均小民愈見狼狽逃亡日衆盜賊日多每三四年一次發作殺傷性命破費財物不可勝計雖為王土實未嘗得少霑惠澤殆與化外羈縻州軍無異甚可痛也近因戶部王郎中申請乞行經界得旨施行千里細民鼓舞相慶其巳逃亡在漳潮梅州界內者亦皆相率而歸投狀復業然此一事豪家大姓不以為便縣吏鄉司不以為便官貟之無見識樂苟簡者不以為便往往皆能造為浮語扇惑上下獨有貧民下戶欲行此事有同飢渴而其冤苦之情無路上通是致前任監司妄有申述沮格成命使昔之鼓舞者今變而為咨嗟昔之投狀歸業者今復相與狼狽而去有識之士深痛惜之而在位者未之知也所幸元降指揮猶有秋成取旨之文今既及期而汀州歲實大稔且其守臣學道愛人有風力可以倚辦失今不為竊恐向後難得似此幾會欲望檢舉元降指揮詳陳前項利害申述取旨只委本路監司及本州守倅趂此農隙疾速推行庶幾永為一方久逺之利與王漕書齊賢熹伏辱賜教并審即日秋陽尚驕臺府清暇台候萬福不勝感感熹前日伏蒙垂問率爾具報既而思之其所論者乃經理州縣財賦源流之術若以今日救荒恤民之事言之則未為要切之務也慮之不精發之不當方以自愧亦意高明見其迂闊不過付之一笑而巳以故因循未暇以書自解不謂乃蒙專人再枉謙誨俾盡其説此事既非今日之急而其條目猥多亦有非熹之所能盡知者然其大要不過欲得使司於見行鹽法之中擇其不可行之甚處如政和尤溪汀州諸邑之類小變其法而損其歲入之數使官享其利而民不以為病州縣可以立腳而漕司不失歲輸之實而巳今一等破敗縣道竊料不過虛有欠數實無可得之錢然此事乃在使司審熟討論百全而後可發非一旦猝然之所可言也若夫今日救荒恤民之急則不過視部內𬒳災之郡使之實撿放福建惟下四州水旱時有撿放若上四州則民間全不知有此條法恩意但知田無所收則殺人放火耳今示之以此亦所以息其作亂之心捐逋租近日州縣無他事可以擾民唯有催理舊稅不問巳納未納一切禁繫決撻責令重納此為大害寬今年夏秋二稅省限各展一月具以條目言之於朝而其可直行者一靣行下然後謹察州縣奉行之勤惰得失而誅賞之使愁嘆亡聊之民猶復有所顧藉而不忍肆其猖狂悖亂之心以全其首領保其家族靖其鄉閭此則今日救荒恤民之急務也此外則視荒損尤甚之鄉使之禾米得入而不得出有餘之處則許其通融糴販稍勸富民平價出糶勸民廣種大小喬麥蔔芋𬞞菜之屬以相接續其貧甚者使更互相保而别召稅戶保之借以官本收成之後秪納元錢亦一助也此等為災傷甚處乃行之想亦不至甚多也又此事雖屬常平司然或彼司無錢而漕司有錢則借而為之亦不為侵官也鄙見如此未知當否姑以仰塞下問之勤伏望裁擇其可幸甚幸甚山間之旱日甚一日祈禱經月略不見效連日隨衆登山祈神周視一村太半焦赤居此四十餘年未嘗有今日之旱令人憂懼殆無措身之所奈何奈何使還具稟臂病猶未能多作字伏乞台察與周丞相書熹狂妄闊踈無用於世一昨丞相知其如此特加除用使得仰奉列聖真遊香火於受命之邦感慨之餘方竊自幸而未及半歲遽𬒳誤恩懇辭報聞未敢再告而袁吏部經由出示所𬒳賜教别𥿄所以存問之意甚厚然於愚分終不自安近者忽聞江西代者以人言報罷有旨趣熹躬聽臨遣聞命隕越不知所為既而方知正以丞相開陳之故是以有此熹竊恨丞相前日之賜不終而虛為此紛紛也熹之衰病首尾七年去冬一二隂邪危惡之證雖巳罷去然腹心之患甫益堅牢攻擊萬方略無動意若不自揆冒昧輕進竊恐不惟自取顚踣亦或反貽丞相軫念之憂故今輒有劄子復申前懇欲望丞相始終哀憐少假鈞陶之力使得復供鴻慶守祧之役則生託榮名死題墓道無復有遺恨熹舊讀崔德符觀魚作詩有丈夫五十年要須識行藏之句未嘗不反復詠歎而有動於懷不謂今日真踐斯境而益知其言之有味也瞻望黃閣無由趨拜下風以盡其所𣣔言伏惟上為國家益隆寶衛亟躋元宰以慰四海具瞻之望熹不勝祈懇願望之至謹奉手記伏祈鈞察與曹晉叔書纍辱惠問未能一一奉報春卿來又奉近教獲審比日雨涼尊候萬福感幸深矣熹行負幽明禍及幼稚第三女子前月末間巳似向安疾勢忽變至此十二日遂不可救痛苦之極殆無以堪加以衰病之餘氣血凋耗不勝悲惱日覺尫悴恐亦不復能久於世矣江右之除出自上意當路不悅者衆此恐未必為福而目下便失祠祿又須來春闕到方敢請祠巳自不勝其撓况未請之間駭機一發又未必敢更請祠衰老患難一至於此豈復更有榮望但神明不遺下燭幽隱力沮邪議褒許有加此恩無路可報徒切感慨而巳答尤延之書戊申四月熹留玉山巳半月日望回信冀得言歸今所遣人乃空手來而所賜教中見喻者又非熹之所病也區區之意正為禮節之間有不能強顔者耳如其所謂宛轉者去冬巳聞之此豈可信政使可信吾亦豈可為此而屈哉老大抗拙無復餘念於此世顧以君臣大義未能忘懷𥘉欲冒進一吐所懷知難而退憂則違之今亦巳矣唯願諸賢協贊明主進賢退姦大開公正之路使宗社尊安生靈有庇則熹之受賜厚矣亦何必誘之以其所不𣣔而強之以其所不堪也哉再遣此人文字在元善處更望垂念便得早歸千萬之幸餘不暇及與江東尤提舉劄子此間糴米者五輩其一巳還餘尚未有端倪然四近米價皆高恐不及元科之數而諸縣下戶口數萬建昌四鄊申到計一月巳當米四千石餘雖見催未到然以鄉計之尚當七倍於此則一月巳用三萬餘石今計常平之積及本軍所餘僅可給兩月勸諭上戶所得可給一月即開春便無以繼欲以糶到錢再糴則諸處米向後必愈難得又恐未可指準不知使司番陽之米將來可撥幾何若得五萬餘石即所欠尚有月餘多方那儧或可接得大麥都昌小戶尤多恐用米穀不止此若不及此數即尤狼狽矣欲乞早示一公牒撥定米數此當一面差人般運庶以慰安善良彈壓姦盜非細事也與周丞相劄子六月熹區區此來竊知皆出丞相推挽之力向之所以次且而不敢進者其故亦可知巳適有幸會遂得一見聖主呻吐所懷之一二妄意自比儻猶有以效其愚於左右而事乃有出於生平意料之所不及者卒煩君相委曲調護然後得以逡巡而去丞相又枉手教以存問之此意亦益厚矣﨑嶇暑行巳及衢州之境前望江西不越數舍深念此行若當前日奏對之時便蒙臨遣則受命引道無所復辭今既紛紜而所坐之罪有非臣子所能堪者冒昧而行實深憂懼謹以公狀申省因輒還家俟罪别有劄目遍詣公府而復以此私於下執事三者之中狀詞尤詳足見本末伏望鈞慈取以奏稟早賜譴黜而改命使臣則庶幾猶可以不重其前罪熹不勝幸甚幸甚抑以熹之無庸辱知不為不久而未嘗少效其尺寸於門下今遂投迹山林不容復出而所願於丞相又有非幅𥿄所能盡者伏惟深以天下之重自任而引天下之士以圖之使由中及外自近而瀕無一不出於正而亡有私意姦其間者則君正而國定矣若夫阿諛順指以為固位之術牢籠􅎱嫉以為植黨之計則固前人之所以自敗而丞相平日所非矣無所待於愚言然熹之惓惓猶願深以自警無至於復蹈其轍也干冒威尊并深恐懼與留參政劄子熹未嘗有一日奔走之勞於門下而參政所以知遇獎借不後於衆人越自頃年叨𬒳改秩之恩參政實掌書命褒與之詞巳浮其實而所以告戒之者又若憂其不能保夫晚節末路之難此其所以愛之之深可謂至矣熹雖至愚亦知佩服顧以君臣之義不可終廢自此以來雖在踈逺而聖主之知益深益厚遂不自量妄意陳力然每起輒仆狼狽不支今者之來一前一却雖獲扶病進望清光然獨未及一見參政而衰病復作遂以煩言逡巡引去切聞進呈之際參政猶欲少加意焉誠不自知其何以得此於大君子之門也區區南歸已迫所部竊伏惟念來章所指在臣子為不赦之罪𬒳此以出復何面目以見吏民今輒具狀申省待罪并具劄目稟聞伏惟機政之餘少賜垂念使熹便即得罪而江西不久闕官則所以寬其後咎餘責者莫大於此庶幾收之桑榆有以卒副前日丁寧眷豫之意幸甚熹當暑病目作字不成貢問之𥘉遽爾草率并望鈞慈特賜矜恕與周丞相書七月十二日熹負罪以來奉頭鼠竄修塗酷暑不可禁當連日行衢信建寧之境又聞猛虎白晝羣行道旁居民多為所食哭泣相聞無所赴訴自惟命薄尤竊憂懼却幸偶不相值得以善逹田舍人還恭𬒳省劄仰味聖語丁寧之意巳深感激而丞相賜書開喻勤至又增悚怍理合拜命即日戒塗而區區之私終有未能自安者竊計朝廷寬大愛惜事體量度重輕必未能别為處分則熹之孤蹤只合杜門屏迹以俟議論之定未容冒此疑似出備使令未論後患如何但只如此行止便巳非熹夙心且如向來退避七年及今乃能一出猶復宿留淹回四五十日然後敢進熹之意非專為畏彼也丞相於此其必有以察之矣今日之事亦何以異此耶又且久稽王命心不遑安竊恐聖上以謂前日訓詞巳極溫厚而熹冥頑不肯奉詔忽震雷霆之怒又聞江西前月亦已闕雨不知今復如何萬一職事曠廢或至生事則熹之罪皆不可逃非但前日口語之無根而巳也若論私計則熹自去歲八月已失祠祿今適期年貧病之態不言可知江西迓兵又巳遣去只此疾足乃是私雇使之往還勢亦不容至再矣切望丞相曲賜留念早如所請免致紛紜不勝幸甚且又别有一事尤係利害昨聞去歲朝堂之議欲使今袁少卿自處易贑而丞相以為贑卒悍而袁性剛不可不慮此見高明計事之審然則熹於南康嘗因莫守經由薄治贑卒之橫其釁有端又非袁之比矣弊性狷急自度亦似不在袁下萬一軍民之間事有曲直不容回枉則事將有不可知者前此所以不敢援此自言者政恐復如頃年避奪牛之嫌而自西徂東騷動兩路竟歲不寧也今不獲巳聊復陳之但欲丞相知江右之不可行耳熹已有公狀申省及具劄子遍扣諸公之門矣又有封事一通乃前日已蒙聖慈開允今恐投進不得亦於狀內貼説乞賜開陳然其間全不敢及前事曲直也前書狂易曲蒙謙受不勝反側區區亦尚𣣔有所言以亟遣人不暇然每私計天下之事則未嘗不為丞相惜此歲月幾會也熹輒有私懇率易干瀆昨過玉山見其邑宰鄭謨乃十二三歲時相與同學别後聞其陷虜隔絶及此再見恍然如世俗所謂前後身者為之太息流涕久之然其人溫謹有餘而材具不足此縣摧敗日久其勢必不能支曽有文字干投丞相乞以歸正恩例改差一釐務添倅或簽幕之屬仍屬熹為靣稟昨來匆匆不暇它及此亦嘗託張太丞稟知不審已蒙鈞念否熹後來不得其書想其事勢只有急迫儻蒙哀憐早賜陶鑄千萬之幸又邵武黃太監永存亦云向來蒙恩奉祠無自陳之文已嘗懇稟丞相不知鈞意如何屬熹乘間言之不敢不逹其意并乞垂照未能自脫乃欲為左右言良覺可笑伏惟宏度有以容之答劉漕書熹平生戅拙無以愈人揣分自安非有他望公朝過聽拔用過冝方起輒仆上纍聖神之知於此再矣尚賴皇明洞照幽隱所以慰藉撫循有非小臣所當得者極欲強扶衰朽起奉明詔而自度孤危尚須辟人以全末路而疾疢交攻有不容自力者以是仰煩開諭反復熟悉引義慷慨詞旨不凡三復竦然敢不斂祍然前請巳行度一二日當有進止之命儻遂退藏是為大幸區區此意諒亦蒙深照也答或人書熹不度時冝自取困辱比嘗自劾幸上照知申諭趣行有非小臣所當得者但顧罪垢未盡滌除未敢即引道耳祠請之上勢必可得也晦庵先生朱文公文集卷第二十七閩縣學訓導何器校
