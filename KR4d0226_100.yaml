body:
  text: 公移州縣官牒恭惟朝廷設官分職等級分明大小相維各有承屬蓋以一人之智不能遍周衆事所以建立司存使相揔攝然事有統紀雖繁而不亂今覩本州官屬雖具而從來分職未明文書散漫殊無條理財賦獄訟盡出吏手而參佐以下官受其成詳考舊案亦有不經通判書押處大綱一紊衆目立墮若不更張積成深弊今來須至别行措置如前所陳又仰諸案呈覆巳得判押並須以次經由通判職官簽押方得行遣文字並須先經職官次詣通判方得呈知州取押用印行下又凖淳熙令諸縣丞簿尉並日赴長官􅈦或都􅈦簽書當日文書謂應行出者竊詳立法之意蓋欲一縣之官同𬋩一縣之事庶得商量詳審與決公事不至留滯民無冤枉而比年以來此法不舉所謂過􅈦者不過茶湯相揖而退其于縣之財賦獄訟知縣既不謀之佐官佐官亦不請于知縣大率一出于知縣一人十數胥吏之手而巳設使知縣才術過人力能獨任亦非為治之體而况為知縣者有不得人或見事有不明處事有不公則賕賂囑託變亂是非淹延囚係違法害民其弊又有不可勝言者今請諸縣知佐詳照條法逐日聚􅈦議事應受接詞訴理斷公事催督財賦並要公共商量簽押圓備然後施行庶幾上合法意下慰民情稍革舊弊都吏具檢牒通判􅈦遍下簽廳及諸曹官自五月一日為始依此施行更有未盡事理委自逐官比類推究申請施行最後一項仍貼諸縣請各關牒佐司同共遵守先具各知稟狀申漳州曉諭詞訟榜權發遣軍州事契勘本州近凖提刑行司判下詞狀計二百四十三道其間官吏違法擾民事理彰著者即巳遵依送獄根治其有關繫一方百姓公共利害而非一旦所能遽革者亦巳廣行咨詢别行措置訖其餘詞狀亦有只是一時爭競些少錢米田宅以致互相誣賴結成仇讐遂失鄰里之歡且虧廉耻之節甚則忘骨肉之恩又甚則犯尊卑之分細民如此巳足傷嗟間有自稱進士學生宦族子弟而其所訴亦不免此此邦之俗舊稱醇厚一旦下衰至于如此長民者安得不任其責又何忍一切徒以柱後惠文為事而不深求所以感發其善心者哉又况所論或人數衆多或地里遙逺或事非干巳而出于把持告計之私或詞涉虛妄而肆為詭名匿迹之計前此未知情由便行追對及至得實善良𬒳擾巳不勝言慮之不深徒自悔咎今巳刷出所承判狀委官置籍先索案祖逐旋看詳然後逐人引問供對庶幾深審得見實情豫奪之間不至差誤若有姦偽先將詞人重行斷遣務以上奉公法下全私恩不擾良民不長姦惡此病守區區深憂吾民追懷舊俗之本志也將來斷訖各給斷由回申照會然後逐件勾銷元籍如未允當即仰人戶自從次第官司翻論今恐詞人等候日久未有施行妄有疑惑復生詞訴除巳具申提刑司外須至曉諭者右今榜州門張挂曉諭各令知悉更請深自思惟所訴事理或涉虛偽或無大假利害可以平和即仰早生悔悟降心相從兩下商量出官對定庶幾有以復此邦忠厚醇朴之俗革比年頑嚚偷薄之風少安病守閔惻慚懼之心仰副明使者循行荒逺宣布詔條之意如未聽信别聽指揮儻觸憲章決無輕恕故榜紹熙元年五月日曉諭居喪持服遵禮律事使州今月初九日有進士吕渭夫狀陳理差役公事狀有稱見居母喪而身著欄幞皂紗巾持即巳開陳禮法當廳告戒尚慮逺近未能遍知須至曉諭右當職竊聞先聖有言孝子之喪親服美不安聞樂不樂食旨不甘此哀戚之情也又曰子生三年然後免于父母之懷故三年之喪天下之通喪也豫也有三年之愛于其父母乎是以昔者先王制為喪禮因人之情而節文之其居處衣服飲食之間皆有定制降及中世乃有墨衰之文則巳不能無失于先王之意矣然準律文諸喪制未終釋服從吉若忘哀作樂自作遣人等徒三年雜戲徒一年即遇樂而聽及參預吉席者各杖一百則是世無古今俗無厚薄而有國家者所以防範品節之意尚未泯也又况頃年至尊夀皇聖帝躬服髙宗皇帝之喪素衣素冠皆用粗布當職嘗因奏事親得瞻仰恭惟天子之孝所以感神明而刑四海者如此其盛而此邦僻逺聲教未洽乃有居父母之喪而全釋衰裳盡用吉服者見之駭然良用悲歎自惟涼薄無以愈人然幸身際盛時目覩聖孝今又得蒙誤恩使以承流宣化為職敢不明布以喻士民自今以來有居父母之喪者雖或未能盡遵古制全不出入亦須服粗布黯衫粗布黲巾繫麻絰著布鞋不飲酒不食肉不入房室如是三年庶幾少報劬勞勉遵禮律仰承聖化如其不然國有常憲今榜曉諭各令知悉故榜紹熙元年六月日勸女道還俗榜使州契勘本州日前官司失于覺察民間多有違法私創庵舍又多是女道住持昨來當職到任之𥘉為見事有非便即巳坐條出榜禁止今後不得私創庵舍居住丁寧告戒非不嚴切近日因引詞狀見得尚有女道住庵又有𬒳人論訴與人姦通者顯是不遵當職約束故違國家條制誣上行私敗亂風俗須至再行勸諭者右今榜勸諭本州軍民男女等蓋聞人之大倫夫婦居一三綱之首理不可廢是以先王之世男各有分女各有歸有媒有娉以相配偶是以男正乎外女正乎內身修家齊風俗嚴整嗣續分明人心和平百物順治降及後世禮教不明佛法魔宗乘間竊發唱為邪説惑亂人心使人男大不婚女長不嫁謂之出家修道妄希來生福報若使舉世之人盡從其説則不過百年便無人種天地之間莾為禽獸之區而父子之親君臣之義有國家者所以維持綱紀之具皆無所施矣幸而從之者少彛倫得不殄滅其從之者又皆庸下之流雖惑其言而不能通其意雖恱其名而不能踐其實血氣既盛情竇日開中雖悔于出家外又慚于還俗于是不昏之男無不盜人之妻不嫁之女無不肆為淫行官司縱而不問則風俗日敗悉繩以法則犯者巳多是雖其人不能自謀輕信邪説以至于此亦其父母不能為其兒女計慮久逺之罪究觀本末情實可哀此當職前日之榜所以不憚于丁寧也然昨來告戒未行只緣區處未廣今復詳思與其使之存女道之名以歸父母兄弟之家亦是未為了當終久未免悔吝豈若使其年齒尚少容貌未衰者各歸本家聽從尊長之命公行媒娉從便昏嫁以復先王禮義之教以遵人道性情之常息魔佛之妖言革淫亂之汚俗豈不美哉如云昏嫁必有聘定賫送之費則修道亦有庵舍衣鉢之資為父母者隨家豐儉移此為彼亦何不可豈可私憂過計苟徇目前而使其男女孤單愁苦無所依託以陷邪僻之行鞭撻之刑哉凡我長幼悉聽此言反復深思無貽後悔故榜紹熙元年八月日揭示古靈先生勸諭文古靈先生陳公勸諭為吾民者父義能正其家兄友能養其弟弟敬能敬其兄子孝能事父母夫婦有恩貧窮相守為恩若棄妻不養夫喪改嫁皆是無恩也男女有别男有婦女有夫分别不亂子弟有學能知禮義廉耻鄉閭有禮歲時寒暄皆以恩意往耒燕飲序老少坐立拜起貧窮患難親戚相救借貸財穀昏姻死喪鄰保相助無墮農桑無作盜賊無學賭博無好爭訟無以惡凌善無以富吞貧行者遜路少避長賤避貴輕避重去避來耕者遜畔地有畔不相爭奪班白者不負戴於道路子弟負重執役不令老者擔擎則為禮義之俗矣以上同保之人今仰互相勸戒孝順父母恭敬長上和睦宗姻周恤鄰里各依本分修本業莫作姦盜莫縱飲博莫相鬪打莫相論訴莫相侵奪莫相瞞昧愛身忍事畏懼王法保內如有孝子順孫義夫節婦事迹顯著即仰具申當依條旌賞其不率教者亦仰申舉依法究治自餘禁約事件仍已别作施行各宜遵守毋至違犯勸諭榜今具節次施行勸諭事目如後一勸諭保伍互相勸戒事件仰同保人互相勸戒孝順父母恭敬長上和睦宗姻周恤鄰里各依本分各修本業莫作姦盜莫縱飲博莫相鬪打莫相論訴孝子順孫義夫節婦事迹顯著即仰具申當依條格旌賞其不率教者亦仰申舉依法究治一禁約保伍互相紏察事件常切停水防火常切覺察盜賊常切禁止鬪爭不得販賣私鹽不得宰殺耕牛不得賭博財物不得傳習魔教保內之人互相覺察知而不紏併行坐罪一勸諭士民當知此身本出于父母而兄弟同出于父母是以父母兄弟天性之恩至深至重而人之所以愛親敬長者皆生于本心之自然不是強為無有窮盡今乃有人不孝不弟于父母則輒違教命敢闕供承于兄弟則輕肆忿爭忍相拒絶逆天悖理良可歎傷宜亟自新母速大戾一勸諭士民當知夫婦婚姻人倫之首媒妁聘問禮律甚嚴而此邦之俗有所謂𬋩顧者則本非妻妾而公然同室有所謂逃叛者則不待媒娉而潛相奔誘犯禮違法莫甚于斯宜亟自新母陷刑辟一勸諭士民鄉黨族姻所宜親睦或有小忿宜各深思更且委曲調和未可容易論訴蓋得理亦須傷財廢業况無理不免坐罪遭刑終必有凶切當痛戒一勸諭官戶既稱仕宦之家即與凡民有異尤當安分循理務在克巳利人又况鄉鄰無非親舊豈可恃強凌弱以富吞貧盛衰循環所宜深念一勸諭遭喪之家及時安葬不得停喪在家及􅑼寄寺院其有日前停寄棺柩灰函並限一月安葬切不須齋僧供佛廣設威儀但只隨家豐儉早令亡人入土如違依條科杖一百官員不得注官士人不得應舉鄉里親知來相弔送但可協力資助不當責其供備飲食一勸諭男女不得以修道為名私創庵宇若有如此之人各仰及時婚嫁一約束寺院民間不得以禮佛傳徑為名聚集男女晝夜混雜一約束城市鄉村不得以禳災祈福為名斂掠錢物裝弄傀儡前件勸諭只願民間各識道理自做好人自知不犯有司刑憲無緣相及切須遵守用保平和如不聽從尚敢干犯國有明法吏不敢私宜各深思無貽後悔曉示經界差甲頭榜漳州契勘本縣日前經界未及均稅遽行住罷後來一向不復舉行是以豪家大姓有力之家包併民田而不受産則其産虛樁在無業之家冒占官地而紐租則其租俵寄于不佃之戶姦胥猾吏寅夜作弊走弄出入不可稽考貧民下戶枉𬒳追呼監繫箠楚無所告訴至于官司財計因此失陷則又巧為名色以取于民雖有慈惠之長明察之官欲革舊弊而一新之亦復無所措手如是者蓋巳有年矣乃者聖明灼知其弊深加憐憫特詔守臣相度經界利害蓋欲仰遵紹興巳行之故典加惠此邦重困之痍民務使田稅均平貧富得實免致貧民下戶困于兼并豪猾之手雖知應役之人不無少擾然欲革百年深錮之弊為斯民久逺之計勢有不得巳者本州謹巳仰體聖意條具奏聞去訖竊恐旦夕或蒙行下便當舉行而逺近士民傳聞不審過有疑慮合行曉諭及有預行撥置事件亦須先次遍行告報曉示下項一今來經界乃是紹興年中巳行之法當時諸路州縣並皆舉行始初傳聞人亦驚恐扇搖眩惑怨謗紛然及至打量田土攢造圖帳一都不過二十餘人逺者不過數月之久即便結局應役之戶雖不免有勞費然結局之後田土狹闊産錢重輕條理粲然各有歸著在民無業去産存之弊在官無逃亡倚閣之欠豪家大姓不容僥幸隱瞞貧民下戶不至偏受苦楚至今四五十年人無智愚皆知經界之為利而不以為害只是本州推行未畢遽行住罷所以民間但知其害而未及知其利之如此姦民猾吏又皆知其利於貧民而不利于已往往互相驚恐妄説事端欲使聖朝仁政實惠不得下流而千里之內貧弱之民依前受弊無有窮極實可憐悼今仰人戶詳此事理仰體聖朝寬恤之意莫聽浮言妄有驚擾一經界之法當依紹興年例别差大小正副甲頭專一打量每都大約不過二三十戶本州諸縣從來本都不曽分十大保無以得見都分闊狹合差小甲頭之數今且行下諸縣仰各告報見役保正副等先納逐都四至之內圍徑幾里東至西幾里南至北幾里約計田園大槩頃畝大槩約度未要的實絇數具狀申縣以慿分畫方界定差大小甲頭將來定差之後打量攢造並委甲頭𬋩幹其見役保正若非合充甲頭之人即依舊只𬋩煙火不預經界事務一打量紐算置立土封椿摽界至分方造帳畫魚鱗圖砧基簿及供報官司文字應干式樣見巳講究見得次第旦夕當行鏤版散下諸縣庶幾將來經界大小甲頭等人各通曉免至臨時雇募他人重有所費右今榜先次曉諭本州人戶各仰知悉如將來所奏事理得蒙聖恩即賜開允即當别行措置子細曉諭務要不擾而辦以副朝廷綏靖逺方蠲除民瘼之意如所措置有未穩便亦仰及早前來陳説切待别行講究改正施行紹熙元年八月日勸農文契勘生民之本足食為先是以國家務農重榖使凡州縣守倅皆以勸農為職每歲二月載酒出郊延見父老喻以課督子弟竭力耕田之意蓋欲吾民衣食足而知榮辱倉廪實而知禮節以共趍于富庶仁夀之域德至渥也當職幸此承攝敢墜彛章今有勸諭事件開具如後一今來春氣巳中土膏脈起正是耕農時節不可遲緩仰諸父老教訓子弟遞相勸率浸種下秧深耕淺種趨時早者所得亦早用力多者所收亦多無致因循自取飢餓一陂塘水利農事之本今仰同用水人叶力興修取令多蓄水泉凖備將來灌溉如事干衆即時聞官紏率人功借貸錢本日下修築不𬋩誤事一耘犂之功全藉牛力切須照𬋩及時餧飼不得輒行宰殺致妨農務如有違戾凖敕科決脊杖二十每頭追賞五十貫文錮身監納的無輕恕今仰人戶遞相告戒母致違犯一種田固是本業然粟豆麻麥菜𬞞茄芋之屬亦是可食之物若能種植青黃未交得以接濟不為無輔今仰人戶更以餘力廣行栽種一𧖟桑之務亦是本業而本州從來不宜桑柘蓋緣民間種不得法今仰人戶常于冬月多往外路買置桑栽相地之宜逐根相去一二丈間深開窠窟多用糞壤試行栽種待其稍長即與削去細碎拳曲枝條數年之後必見其利如未能然更加多種吉具麻苧亦可供備衣著免𬒳寒凍一鄉村小民其間多是無田之家須就田主討田耕作每至耕種耘田時節又就田主生借穀米及至終冬成熟方始一併填還佃戶既賴田主給佃生借以養活家口田主亦藉佃客耕田納租以供贍家計二者相須方能存立今仰人戶遞相告戒佃戶不可侵犯田主田主不可撓虐佃戶如當耕牛車水之時仰田主依常年例應副榖米秋冬收成之後仰佃戶各備所借本息填還其間若有負頑不還之人仰田主經官陳論當為監納以警頑慢一本州𬋩內荒田頗多蓋緣官司有俵寄之擾象獸有踏食之患是致人戶不敢開墾今來朝廷推行經界向去産錢官米各有歸著自無俵寄之擾本州又巳出榜勸諭人戶陷殺象獸約束官司不得追取牙齒蹄角今更别立賞錢三十貫如有人戶殺得象者前來請賞即時支給庶幾去除災害民樂耕耘有欲陳請荒田之人即仰前來陳狀切待勘會給付永為巳業仍依條制與免三年租稅一今來朝廷推行經界本為富家多置田業不受租産貧民業去産存枉𬒳追擾所以打量步畝從實均攤即無增添分文升合雖是應役人戶日下不免小勞然實為子孫永逺無窮之利其打量紐算之法亦甚簡易昨來巳印行曉示今日又躬親按試要使民戶人人習熟秋成之後依此打量不過一兩月間即便了畢想見貧民無不歡喜只恐豪富作弊之家見其不利于巳必須撰造語言妄有扇搖今仰深思彼此一等皆是王民豈可自家買田收榖却令他人空頭納稅非惟官法不容亦恐别招隂譴不須如此計較生事沮撓良法一本州節次行下諸縣不得差人下鄉乞覓搔擾科敷抑配強買物色及以補發經總制錢發納上供銀罷科茶等為名科罰人戶錢物所以上體朝廷寬恤之意欲使民得安居不廢農業今恐諸縣奉行違戾仰𬒳擾人指定實迹前來陳訴切待追究重作行遣一本州節次印給榜文勸諭人戶莫非孝弟忠信禮義廉耻之意今恐人戶未能遍知别具節略連粘在前請諸父老常為解説使後生子弟知所遵守去惡從善取是舍非愛惜體膚保守家業子孫或有美質即遣上學讀書學道修身興起門戶右今出榜散行曉諭外更請父老各以此意勸率鄉閭教戒子弟務令通曉毋致違犯紹熙三年二月日榜龍巖縣勸諭榜具官當職恭奉敕命來守此邦見本州四縣龍溪諸邑風俗醇厚少有公事干撓州府獨有龍巖一縣地僻山深無海鄉魚鹽之利其民生理貧薄作業辛苦州府既逺情意不通縣道公吏又不究心拊摩躬行教化往往多差公人下鄉搔擾及縱吏人因事乞覓不遵朝制不恤刑獄不能分別是非曲直致使其民不見禮義惟務凶狠強者欺弱壯者凌衰內則不知有親戚骨肉之恩外則不知有閭里往來之好習俗薄惡巳足歎傷至其甚者則又輕侮官司公肆咆哮把持告訐無所不至始則詭名下狀終則將身藏閃及至州縣察其欺詐追捕緊急則便閉門聚衆持杖鬪敵殊不思量既為王民便當遵守王法州縣之官皆是奉行朝廷政令今既不然抗拒州縣便是不遵王法不畏朝廷如此所為何異盜賊縱使一時抵敵得過不知終久作何收殺雖説本因官吏養成此惡然却終須自巳出頭受罪小者徒配決罰大者殺身破家赤子無知抵冒至此良可悲閔當職既忝父母之官豈忍坐視不思有以救其未然除巳行下龍巖縣約束官吏務宣教化恪守條法不得似前容縱搔擾外須至曉諭右今榜龍巖縣𬋩下遍行曉諭上戶豪民各仰知悉其有細民不識文字未能通曉即請鄉曲長上詳此曲折常切訓誨要使闔縣之人常切思念既為王民當守王法自今以後各修本業莫作姦盜莫恣飲博莫相鬪打莫相論訴莫相侵奪莫相瞞昧愛身忍事畏懼官司不可似前咆哮告訐抵拒追呼倚靠凶狼冒犯刑憲庶幾一變獷悍之俗復為禮義之鄉子子孫孫永陶聖化如更不改尚習前非州郡雖欲曲法相容亦不可得決當會合巡尉圍掩搜捉依條斷罪的無輕恕今榜曉諭各請詳思趂早革心無貽後悔潭州委教授措置嶽麓書院牒契勘夲州州學之外復置嶽麓書院本為有志之士不逺千里求師取友至於是邦者無所棲泊以為優遊肄業之地故前帥樞密忠肅劉公特因舊基復創新館延請故本司侍講張公先生往來其間使四方來學之士得以傳道授業解惑焉此意甚逺非世俗常見所到也而比年以來師道陵夷講論廢息士氣不振讓者惜之當職叨冒假守蒙𬒳訓詞深以講學教人之務為寄顧恨庸鄙弗克奉承到官兩月又困簿書未能一往謁殿升堂延見諸生詢考所合罷行事件庶革流弊以還舊規除巳請到醴陵黎君貢士充講書職事與學録鄭貢士同行措置外今議别置額外學生十貟以處四方遊學之士依州學則例日破米一升四合錢六十文更不輔試聽候當職考察搜訪徑行撥入者庶幾有以上廣聖朝教育人才之意凡使為學者知所當務不專在於區區課試之間實非小輔牒教授及帖書院照會施行仍請一靣指揮合干人排備齋舍几案床榻之屬并帖錢糧官於本州贍學料次錢及書院學糧內通融支給須至行遣約束榜一契勘諸縣民訟人户自合從條次第經陳其公事各有條限民户越訴亦有斷罪刑名往往縣道不能結絶遂至留滯引惹詞訴兼又有人不候本縣照限追會圓備豫決便即先行經州紊煩官府今立限約束自截日為始應諸縣有人户巳訴未獲盜賊限一月鬪歐折傷連保辜通五十日婚田之類限兩月須管結絶行下諸縣遵從外如尚有似此民訟亦照今來日限豫決若縣道違期不行結絶方許人戶赴州陳訴切待先追承行人勘斷再立限驅催其縣道又不了絶致人户再有詞訴定追押録科斷外今仰民户經由書鋪依式書狀仍於狀內分明聲説的於某年月日經縣陳訴巳經幾日本縣不結絶以慿行遣如不明注經縣月日或不候限滿妄稱已過所立日限陳述致追承行人到州見得元經月日未及其人戶連書鋪並行收坐仍毀劈書鋪名印若經本州一月未滿狀詞亦不許再行一官人進士僧道公人謂訴巳事無以次人聽自陳聽親書狀自餘民户並各就書鋪寫狀投陳如書鋪不寫本情或非理邀阻許當􅈦執覆一本云或非理飾説及當􅈦執覆不同所詞定行根究書鋪一狀詞並直述事情不得繁詞帶論二事仍言詞不得過二百字一名不得聽兩狀並大字依式真謹書寫如有干照契據并未盡因依聽録白連粘狀前一如告論不干巳事寫狀書鋪與民戶一等科罪一民户詞訴不應為狀首人自不當出名其應為狀首人並要正身如實有事故得用以次人仍聲説因依年月若干有無疾蔭婦人有無疾蔭娠孕於前從實開具或有罪應科決臨時妄行供説先契勘元寫狀書鋪一書鋪如敢違犯本州約束或與人戶寫狀不用印子便令經陳紊煩官司除科罪外並追毀所給印子一人戶陳狀本州給印子靣付茶食人開雕並經茶食人保識方聽下狀以備追呼若人戶理涉虛妄其犯人并書鋪茶食人一例科罪一契勘人戶多有不問事節緊慢不候行押詞狀日分輒行欄轎下狀或投白𥿄今立約束欄轎狀詞並不受接并所投白𥿄止是理訴婚田債負即非緊切利害事件亦非貧窶鰥寡孤獨無告之人顯無忌憚紊煩官府自今後除貧窶老病幼小寡婦或𬒳劫盜并鬪歐殺傷事干人命𥘉詞許於放詞狀日投白𥿄外自餘理訴婚田債負或一時互爭等事人戶須管經由書鋪依式書狀聽引狀日分陳理如有似此違約束之人定當重行斷罪一引押狀詞日分預批曆請台判輪委職官一貟或兩貟就大􅈦側畔用硃劃號數監用朱批事因一引押詞狀除𥘉經州狀外其有事祖狀並各令案吏貼擇出案祖用硃批出緊要情由元詞月日作如何施行某處巳未結絶事因請判一本州鼓角樓所有牌二靣內東畔一靣係軍州官下馬牌西靣係人戶詞訟牌蒙安撫到任移西畔詞訟牌於東自新開雕屈牌一靣安在詞訟牌之上差使臣一貟監當并置曆一道付監管官如有投牌之人抄上姓名押赴使府出頭取候台旨施行其牌黑􅃮雕字具説有實負屈緊急事件之人仰於此牌下跋立仰監牌使臣即時收領出頭切待施行如敢將間慢事件不候引狀日分妄作緊急坐牌定行勘斷一有日逐諸雜申并省符公牒文字並置簿子劃隔眼拘管遇夜銷逐旬委官點號一照得日逐所受入匣追索人案文字置外引開排時刻責鋪兵依限走傳如違限委官先追押録重斷一類狀名色官吏受財枉法將吏侵尅役使殺人行劫殺略姦盜聚衆鬪打或抵拒官司豪家大姓侵擾占奪細民田業姦汚婦女鬪打見血官貟士人公人軍人僧道執狀巳上當使廳引押訴婚田地訴分析訴債負鬪打不見血差役陂塘巳上都廳引押一引押詞狀元係雙日引押公事元係隻日蒙安撫到任以隻日引押詞狀雙日引押公事一狀式某縣某鄉某里姓名一年幾歲有無疾蔭合為狀首堪任杖責係第幾狀一所訴某事合經潭州一即不是代名虛妄無理越訴或隱匿前狀如違甘伏斷罪號令右某入事明注年月指涉某人某事盡實限二百字須至具狀披陳伏候判府安撫修撰特賜台旨一照對每月長沙等一十二縣合解有無定額月樁等錢從夲司印格目書填錢物監轄典吏樁辦限次日各分日限申解赴州交納近凖安撫殿撰侍講到任措置逐月輪委佐官坐押內長沙善化縣輪縣丞主薄縣尉并外十縣輪縣丞主薄監當官一貟監轄典押承行人各一名拘樁並限次月𥘉十日到州其錢須要所委官同典吏躬親坐押赴州如解足典押免行到州不足斷訖典吏就州監催或錢違限不到即追本縣樁錢典吏及拘押錢官下承行廳子併行勘斷施行一項照應州場日逐受納紹熙五年夏稅錢將入中限未據人户賫納竊恐有誤裝綱支用檢凖令節文諸稅租入中限聽追户頭或以次家人科較品官之家追幹人令曉示人户及早盡數赴州送納如違定當從條點追赴州科較監納施行一項照應湘潭衡山湘鄉瀏陽攸縣五縣拖欠紹熙四年秋稅遂將錢差官下縣受納近緣天時亢旱祈禱未應恐人户艱於送納巳自七月𥘉五日帖所委官回州取稟候小熟日却去開場受納去訖竊慮鄉民未能遍知仍前追擾合行曉諭今印小榜下縣鄉村曉諭人户各宜安心車水灌溉田畒凖備合納稅錢候得雨水熟日依舊差官到彼開埸即行送納各令知委一項照對稅務日逐收到牙客人合納河市稅錢並不盡數拘解竊慮夲務合干人作弊收錢隱瞞入巳合行約束使司今置板榜務門粘貼本務日逐申收到牙客人錢數曉示通知如本務收稅錢多申到數少不同隱瞞官錢入巳許牙客人具狀告首若客人稅物多供申少亦許同伴人陳首切待追人送獄根勘依條斷罪追賞錢五十貫文各令知委一訪聞諸司案及倉場庫務諸官廳下擅自存留曽經斷罷及私名之人在逐處抄寫文字合行約束今立賞錢一百貫文府衙門許人指實陳告切待追究將犯人重斷每名追賞錢一百貫文其本處存留人一例斷罪施行一照對諸縣弓手土軍係專一教閲以備彈壓捕盜本州巳節次督責巡尉依時教閲務要武藝精熟仍月具所教人數姓名升加武藝帳狀申州以慿逐月三分點一赴州按教行下諸縣併各縣巡尉各仰速便先行聲説弓手土軍姓名年甲所習武藝文籍供申仍於籍內便將弓兵分作三畨自今年七月十九日為始先要第一畨所發弓手齊集到州按教須是向後月十九日以前解發到州應期諸縣合教一契勘諸軍武藝最是弓弩可用近下諸縣點喚弓手上軍赴州按教據各處具到帳籍多是將不會武藝之人裝作鎗牌手名色解發委是有誤緩急使喚行下諸縣巡尉各日下盡將所𬋩弓手土軍並令專習弓弩務要捉親射射精絶聽候點喚赴州按教仍令兼習義鎗小牌諸般武藝不得私役弓兵妨廢教閲一據客人趙堅等狀竊見民間行使砂毛錢鐡錢朝廷纍降指揮明立法禁非不嚴切今牙鋪尸不遵約束依前夾雜砂錢行使致得客人墜敗財本乞降賞榜於管下瀏陽湘潭醴陵衡山并下攝諸州等處約束使司巳立賞錢五十貫文印給小榜發下長沙等一十二縣下張挂曉示外仍出榜都市并瀏陽湘潭醴陵衡山縣及下攝諸州等處張挂曉諭如有前項違犯之人許諸色人告捉赴官將犯人送獄從條勘斷追給上件賞錢施行一契勘諸廂收領公事多是在廂經日不行申解却令兩辭和對更不申官委是有違條法遂符行下諸廂兵官自今後應有公事即時具狀申解赴府出頭不得隔宿及妄作休和申州如違將當行人重斷廂官别有施行一契勘本州纍次出榜立賞錢三十貫文禁止百姓及軍人賭博仍拆毀匱坊并告報諸營寨廂官及遍牒在城諸官􅈦常切覺察鈐束非不嚴切今來尚有不畏公法之人依前開匱坊停止軍兵百姓公然賭博全無忌憚廂巡容縱兵官亦不鈐束深屬不便出榜都市曉示如有前項違犯之人諸色人告捉押赴使府出頭切待將犯人斷罪軍人次第問當各追上件賞錢與告人充賞若諸廂諸廳諸營寨合干人依前容縱定一例追斷施行一照應近來委送官貟看詳審覆公事文字其間多有引用繁文除看詳公案文狀巳有狀式曉諭外今再立委官審覆申到公事式樣請只就元狀內用小帖子節略事意看詳所斷指定當否今欲如何施行大抵直説事理不須繁文其狀內緊切事理别用小貼子摽説小貼子式節略狀內緊切事理云云某官云云某今竊詳云云某官所斷巳得允當或云未得允當巳開具出榜客位訖一訪聞街市逐時有不逞之徒與軍兵欺壓善良毀打百姓生事作閙出榜都市張挂曉示如有前項違犯之人斷罪監納先下拳錢五貫文每五日一限納錢三百文入官內軍兵押下所屬吹第問當一今後遍下諸縣諸官用符簽廳請判押檢職官連銜書押行下專下逐縣逐官用帖如常式仍先行下諸縣照會一詞狀當日職官分類呈押具式呈一詞狀帖牒下外諸縣者索案除程一日追人除程兩日五人以上去縣百里以上者除程三日案官鑿定日限案吏朱批某月某日限滿申展者都廳先次類聚呈押一日者不展兩日者許一展三日者許再展再展而不到者都廳指定帖某巡尉差人追呼呈押行下一在城差人監追公事各置印齪緊限不展次緊限許一展再展而不到者訊承差人長限日展並簽廳批鑿不再呈押內長限每三展一押長限如監醫之類一當限文字並午牌以前到午後即是違限不得收接如違申舉一符牌申狀到事有常式事如盜賊發露當催捕判回申當催申抄劄口詞檢驗尸首當差官及官貟陳乞批書之類並即時押訖送所屬案分行遣請判行下如無施行事類聚判照有祖及施行未到即簽廳擬呈一簽廳告報諸縣諸官廳大字書寫文狀須如中指靣大即擬貼述大槩却於狀內抹出緊要情節便見曲折不然又須書寫一過枉費工夫一三獄直日開折司先次呈押餘案抽牌押文字訖退不得再上如有未了文字都吏次早㨂牌入筒取覆抽押內户刑案事繁許次早呈押一都簽廳申四項奉台判後三項修入見行約束一照對日逐諸案銷生事號簿蒙約束遇九日銷對竊慮積壓今乞次日委官點對逐一批銷書絶乞候九日呈點一照對人户役白𥿄止為有緊切事干人命劫盜等今來受狀不問事理輕重有白𥿄三四十𥿄訪聞皆是書鋪邀求致令投陳紊煩官司今乞告示書鋪如是凖前邀阻人户致使府問得投白𥿄人曾經書鋪不為寫狀之人乞賜喚上斷治施行不應受理即行擇退一凖台判索案除程一節追人除程兩日五人以上在縣百里以上者除程三日不到帖巡尉追人一日者不展今欲乞再展一限兩日者許一展今欲再展一限通三限三日者許再展亦通三限一照應近據諸縣申到人户理訴婚田債負皆稱目今正是青黃不接之際告示候務開日施行使司契勘人户互訴婚田爭地多是有力上户之家占據他人物業或是遷延不肯交錢退贖或是抗拒不伏赴官理對只要拖延衮入務限使下户𬒳苦無能結絶檢凖律令諸婚田入務若先有文案交相侵奪者不在此例况今本州多是禺田只有早稻收成之後農家便自無事可以出入理對在田亦少施工未穫之利自可退業以還有理之家諸縣爭論田地詞訴可以承行理對不必須候十月使司巳於六月十八日符長沙等一十二縣遵守施行訖一照應本州近於七月十七日準登寶位赦書內一項應官司房廊白地賃錢並放至紹熙四年終巳出榜都市曉示去訖今訪聞得街市有賃屋居民都有妄稱合從赦書到日之後納起致有爭競州司契勘前項赦書即無放至紹熙五年正月以後房錢之文或有屋主自願饒潤即從其便若屋主不願饒潤即其賃屋人自合遵從大赦指揮印還不得妄有抵負扇惑生事使司巳於七月二十六日出榜都市曉示訖一契勘本州州學之外復置嶽麓書院云云並同前委教授牒一照對夲州所管上丁釋奠及祭祀社禝三獻官祭服緣製造年深各並不如法式今欲别行製造𥘉獻六旒冕亞獻四旒冕終獻無旒冕及夲等衣裳大帶中單綬佩蔽膝革帶履襪各一副竊恐只依印本製造未必盡合禮制申行在太常寺關借上祭服每事一件付進奏官楊思恭同夲州差去客司楊暹就臨安府製造回州行用一伏覩紹熙五年七月七日赦書內一項五嶽四瀆名山大川歷代帝王忠臣烈士載於祀典者委所在長吏精潔致祭近祀廟處並禁樵採如祠廟損壞今本州支係省錢修葺謹按晉書南中郎將湘州刺史譙國司馬王諱承當王厚作亂之際興兵唱義為國討賊功雖不就志莭可嘉今數百年未有廟貌又按長沙圖志故通判錢修葺州司契勘東晉王厚之亂湘州刺史譙閔王承起兵討賊不克而死及紹興𥘉年金賊犯順潭州通判孟彥卿趙民彥將官劉玠兵官趙津之皆以忠節沒於王事從前未有廟貌州司今來遵奉赦書指揮見行相度創立祠堂塑造神像除晉朝冠服别行討論外所有孟趙兩通判係贈直龍圖閣劉將官係贈武節大夫趙兵官係贈右監門衛將軍未委本品朝服合作是何法制申行在太常寺仍巳差人前去望塑小樣照詳典禮給降制度以慿製造施行一照應本州管內南嶽衡山係國家火德興隆之地崇奉之禮極於嚴肅合行封植以壯形勢近來官司失於守護致得諸色等人妄行斫伐林木摧殘土石破碎無以保國威靈停滀雲氣慰一方瞻仰歸依之望事屬不便契勘其地並屬寺觀所管即與民間無相干涉理冝措置今帖合同李修職躬親前去體究相度勒本縣巡尉責本寺觀主首摽識簽押除深山人所不見之處許令依舊開墾種植外其山靣瞻望所及即不得似前更行斫伐開墾向後逐年深冬即令寺觀各隨界分多取小木連本栽培以時澆灌務令青活庶幾數年之後山勢崇深永為福地并帖巡尉仰詳前項事理須管同合同李修職前去體究相度逐一凖此施行及出榜嶽山寺張挂約束諸色等人不得依前於山內瞻望所及之處斫伐林木穿毀土石如有前項違犯之人許諸色人於所屬陳告根究從條斷罪施行一契勘目今久闕兩澤竊慮陂澤湖塘池濼濼正副長專意放養魚鰱之類不肯泄水注蔭致田禾乾稿深屬未便今曉諭陂塘湖長等人如合承水之田闕水即仰日下量分數放水注蔭如占吝不放之人仰食水入户指實陳論追犯人重斷施行看定文案申狀式具位準使帖據某人狀或判狀即云使判某人狀訴事備録全文委某看定或云看詳之類並依夲文須至供申者一某年月日某人狀一某人執到某年月日契字或分開干照遇多項須似此開以年月先後為次序一檢準勑令格並同右某竊詳上件事云云合準某勑如何定斷謹具申某處伏乞照會詳酌施行年月日具位某狀報建陽縣審會船狀右熹承建陽縣公文取會本家有無占破船户姓名尋行契勘日前雖有顧到船隻日久不曽使用今來自合祗應官司差使私家即無執占之理謹具申建陽縣伏乞照會謹狀晦庵先生朱文公文集卷第一百右晦庵朱先生文集一百卷閩浙舊皆有刻本浙本洪武𥘉取置南雍不知輯於何人今閩藩所存本則先生季子在所編也其後又有續集若干卷别集若干卷二本亦併刻之歷歲既久刓缺寖多讀者病焉成化戊子仲昭自翰林謫官南都偶得閩本公暇因取浙本校之其間詳略微有不同如劾唐仲友數章閩本俱不載其所劾事狀世之鄙儒多以是疑先生異論紛起故悉增入使讀者知仲友蠹政害民之實而無所惑於異論也其他無大關繫者則仍其舊惟正其亥豕魯魚之訛而已歲丙申閩憲使山隂唐公質夫僉憲蘭溪章公德𢡟閔舊板磨滅日甚遂以仲昭所校本輔之未及訖工而二公相繼去任尋復殘缺僉憲天台林公一中至慨然以為己任久未暇及壬寅秋乃謀于先生九世孫都轉運伯承君復以仲昭所校本精加讎訂訛者正之腐者易之缺者輔之至是始無遺憾矣嗚呼先生不可復作而是編之存可以見其經國之謀焉可以見其濟民之政焉可以見其出處之義焉可以見其交際之道焉上而天道之妙下而物理之微明而禮樂之文幽而鬼神之理大而人倫之常小而人事之變無所不該誠作聖之階梯入道之門户也諸公拳拳相與圖其永久其嘉惠後學之意不既深乎工既告成仲昭謹識其顛末且以告于後之君子俾謹守而嗣修之以無替諸公之惠也成化十九年歲在癸卯二月之朔後學莆田黃仲昭謹識候官縣儒學訓導劉簮校
