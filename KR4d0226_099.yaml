body:
  text: 公移知南康榜文當職乆以疾病退伏里閭比蒙誤恩假守茲土懇辭不獲扶曵而來到任之初伏自惟念聖天子所以搜揚幽隠付卑民社之意固将使之宣明敎化寛恤民力非徒責以簿書期會之最而巳顧雖不䏻其敢不勉今有合行詢訪勸喻事件下項一本軍土瘠民稀役煩稅重前後長吏非不欲多方措置寛䘏民力實縁上供官物旣巳浩瀚軍用所資亦復不少只得逐急了辦目前更無餘力可以議此是致民力日困無復安土樂生之心深可哀憐安忍坐視今恐管下士人父老僧道軍民諸色等人有䏻知得利病根原次第合作如何措置可以寛䘏並請子細開具著實事狀不拘早晚赴軍披陳切待面加詢問審實相度多方措置庻㡬戸口歳増家給人足有以仰副聖天子愛養元元之意一本軍民俗號稱淳厚廷少諍訟獄少係囚及按圖經前代有太中大夫司馬暠司徒從事中郎司焉延義宜春縣令熊仁贍皆以孝行顯名及至國初又有義門洪氏亦以累世義居婺婦陳氏守節不嫁遂蒙太宗皇帝賜以宸翰寵以官資旌表門閭蠲除徭役此足見其風俗之美非他郡之所及又况天性人心不易之理在昔旣有今豈無之患在師帥不良不加敦勸是致頽靡日䧟偷薄今請管下士民鄉鄰父老歳時集會並加敎戒間或因事反復丁寧使後生子弟咸知修其孝弟忠信之行入以事其父兄出以事其長上敦厚親族和睦鄉鄰有無相通患難相恤庻㡬風俗之美不愧古人有以仰副聖天子敦厚風俗之意本軍背負羗廬前据彭蠡地勢雄秀甲扵東南禹跡所經太史所逰有聖賢之遺風下逮東晉陶氏則長沙靖節祖孫相望爰及聖朝劉氏則屯田祕丞父子相繼皆有徳業著在丹青宜其風聲氣俗猶有存者後来之秀接踵比肩而比年以来士風衰弊而學校養士不過三十人大比應書人數亦少雖講道修身之士或未必肯逰學校入塲屋然詢扵物論以求物外之英豪則亦未聞卓然有可稱良由長民之吏未嘗加意使里閭後生無所從學以至扵此今請鄉黨父兄各推擇其子弟之有志扵學者遣来入學陪厨待𥙷聴講供課本軍亦一面多方措置増置學糧當職公務之餘亦當時時詣學與學官同共講說經旨多方誘掖庻㡬長材秀民爲時而出有以仰副聖天子長育人材之意右出榜星子都昌建昌縣并市曹曉諭管下士民父老等請詳前項事理逐一遵禀仰副聖朝愛民敦化之美意并牒三縣照會及别給印榜每縣各一百道委廵尉分下鄉村張掛不得隠匿并牃軍學教授請從長相度合如何増添贍學錢糧修立課試規矩開具回報切待措置施行又牒頭同南康䧛文但改寛䘏民力爲敦厲風俗合行詢訪勸諭爲合行詢究一晉侍中太尉長沙陶威公興建義旗康復帝室勤勞忠順以沒其身今按圖經公始家鄱陽後徙尋陽見有遺跡在本軍都昌縣界及有廟貌在本軍城内及都昌縣水旱禱禳皆有感應未委上件事迹是與不是詣實一晉太傳廬陵謝文靖公始自隠淪巳推時望及登宰輔優有武功今按圖經公始封建昌即本軍之建昌縣未審本縣曽與不曽建立祠宇一晉靖節徴士陶公先生隱遯髙風可激貪懦忠義大節足厚彛倫今按圗經先生始自柴桑徙居栗里其地在本軍近治三十里内未委本處曽與不曽建立祠宇一按圖經建昌縣有陳太中大夫司馬暠司徒從事中郎司馬延義皆以孝行見扵陳書有墓在本縣界又有唐宜春縣令熊仁贍亦以孝行旌表門閭未委其墓及唐朝所表門閭有無損壊一按圖經白鹿洞學館雖起南唐至國初時猶存舊額後乃廢壊未委本處目今有無屋宇一按圗經建昌縣義門洪氏本以累世義居婺婦守節嘗蒙太宗皇帝賜以宸翰寵以官資旌表門閭蠲除徭役未委其家目今有無子孫依舊義居所藏御書見作如何崇奉所表門閭曽與不曽修葺一濂溪先生虞部周公心傳道統爲世先覺熈寧中曽知本軍未委軍學曽與不曽建立祠貌一西澗先生屯田劉公避世清朝髙蹈物表其子祕丞公亦以愽聞勁節見知扵故司馬文正公與修資治通鑑而所著十國紀年通鑑外紀又自别行扵世故黃門蘇文定公嘗以冰清玉剛比其父子而鄉人因以冰玉名其所居之堂今按圖經西澗舊有劉居士菴及訪聞城西䏻仁寺側有劉公墓及太史范公所撰祕丞墓碣獨冰玉堂無所登載未審其墓是與不是的實菴堂墓碣曽與不曾損壊一訪聞故贈諫議大夫陳忠肅公曽居本軍未委日前有何遺跡一竊恐本軍更有前代忠臣孝子義夫節婦圖經文字有失該載及目今見有似此之人或山林之間科舉之外别有懐材抱藝守道晦迹之士亦合廣行詢訪有無遺逸右牒教授揚迪功司戸毛迪功請詳逐項事理廣行詢究取見詣實逐一子細條具回申以慿稽考别行措置仍榜客位遍呈寄居過徃賢士大夫恐有知得本軍上件事迹詳細切幸特賜𨳩諭及榜示市曹仰居民知委如有知得上件事迹詳細之人仰子細具狀不拘早晚赴軍衙申說切待併行審實措置施行淳熈六年四月日牓白鹿洞牒契勘本軍廬山白鹿洞書院扵國朝會要本軍圖經記文石刻元係唐朝李賔客渤隱居舊有臺榭環以流水雜植花木爲一時之勝南唐昇元中因建學館買田以給諸生學者大集乃以國子監九經李善道爲洞主掌其敎授至本朝太平興國二年知江州周述言廬山白鹿洞學徒嘗數十百人望賜九經書使之肄習詔從其請俾國子監給以印本仍傳送之七年又以洞主明起爲蔡州襃信縣主簿七年始置南康軍遂屬郡境至祥符初直史館孫冕請以爲歸老之地及卒還葬其所其子比部郎中琛復置學館十間書白鹿洞之書堂六字掲扵楹間以敎子弟四方之士願就學者亦給其食當塗郭祥正實爲之記後經兵亂屋宇不存其記文石刻遂徙置軍城天慶觀昨來當職到任之初即嘗詢訪未見的實近因接視陂塘親到其處觀其四面山水清邃環合無市井之喧有泉石之勝真群居講學遯迹著書之所因復慨念廬山一帶老佛之居以百十計其廢壞無不興葺至扵儒生舊館只此一處旣是前朝名賢古迹又蒙太宗皇帝給賜經書所以教養一方之士徳意甚美而一廢累年不復振起吾道之衰旣可悼懼而太宗皇帝敦化育材之意亦不著扵此邦以傳扵後世尤長民之吏所不得不任其責者其廬山白鹿書院合行修立云云示俗孝經云用天之道因地之利謂依時及節耕種田土謹身節用謹身謂不作非違不犯刑憲節用謂省使儉用不妄耗貲以養父母人能行此三句之事則身安力足有以奉養其父母使其父母安穩快樂此庻人之孝也庻人謂百姓也能行此上四句之事方是孝順雖是父母不存亦須如此方䏻保守父母産業不至破壞乃爲孝順若父母生存不䏻奉養父母亡殁不䏻保守便是不孝之人天所不容地所不載幽爲鬼神所責明爲官法所誅不可不深戒也以上孝經庻人章正文五句係先聖至聖文宣王所說奉勸民間逐日持誦依此經解說早晚思惟常切遵守不湏更念佛號佛經無益扵身枉費力也曉諭兄弟争財産事照對禮經凡爲人子不蓄私財而律文亦有别籍異財之禁盖父母在上人子一身尚非自巳所䏻專有豈敢私蓄財貨擅据田園以爲巳物此乃天性人心自然之理先王制禮後王立法所以順之而不敢違也當職昨来到任之初詢訪民俗考按圖經曽以司馬大夫司馬中郎熊縣令洪義門孝行義居事跡勸諭士民務修孝弟忠信之行入事父兄出事長上敦厚親族和睦鄉鄰有無相通患難相恤庻㡬有以仰副聖天子敦厚風俗之意今巳累月而誠意不孚未有顯効比閱詞訴有建昌縣劉珫兄弟都昌縣陳由仁兄弟並係母親在堂擅将家産私下指撥分併互相推託不納賦稅爭論到官殊駭聞聴除巳行下建昌縣及索到陳由仁等指撥關約盡行毀抹當㕔說諭令劉珫陳由仁與其兄弟依舊同居共財上奉母親下率弟姪恊力家務公共出納輸送官物外竊慮管属更有似此棄違禮法傷害風敎之人而長吏不䏻以時敎訓紏禁上負承流宣化之責内自循省不勝恐懼今檢坐條法指揮下項湏至曉諭者凖律云云右除巳出榜市曹并星子縣門都昌建昌縣市張掛曉示人戸知委如有祖父母父母在堂子孫擅行違法分割田産析居别籍異財之人仰遵依前項條法指揮日下具狀将所立關約赴官陳首毀抹改正侍奉父母恊和兄弟同管家務公共出納輸送官物不得拖欠如不遵今来約束却致違犯到官之人必定送獄依法斷辠云云淳熈六年八月日牓勸農文當職乆處田間習知穡事兹沗郡寄職在勸農竊見本軍巳是地瘠稅重民間又不勤力耕種耘耨鹵莾㓕裂較之他處大叚不同所以土脉踈淺草盛苗稀雨澤稍愆便見荒歉皆縁長吏勸課不勤使之至此深懼無以下固邦本仰寛顧憂今有合行勸諭下項一大凡秋間收成之後須趂冬月以前便将戸下所有田叚一例犂翻凍令酥脆至正月以後更多著遍數節次犂杷然後布種自然田泥深熟土肉肥厚種禾易長盛水難乾耕田之後春間須是揀選肥好田叚多用糞壌拌和種子種出秧苗其造糞壌亦須秋冬無事之時預先剗取土面草根㬠曝燒灰旋用大糞拌和入種子在内然後撒種一秧苗旣長便須及時趂早栽挿莫令遲緩過却時節一禾苗旣長稈草亦生須是放乾田水子細辨認逐一㧞出踏在泥裏以培禾根其塍畔斜生茅草之屬亦須節次芟削取令净盡免得分耗土力侵害田苗将來榖實必湏繁盛堅好一山原陸地可種粟麥麻豆去處亦湏趂時竭力耕種務盡地力庻幾青黃未交之際有以接續飲食不至飢餓一陂塘之利農事之本尤當恊力興修如有怠惰不趂時工作之人仰衆列狀申縣乞行懲戒如有工力浩瀚去處私下難以紏集即仰經縣自陳官爲修築如縣司不爲措置即仰經軍投陳切待别作行遣一桑麻之利衣服所資切湏多種桑柘麻苧婦女勤力養𧖟織紡造成布帛其桑木每遇秋冬即将旁生拳曲小枝盡行斬削務令大枝氣脉全盛自然生葉厚大餧𧖟有力一大凡農桑之務不過前項數條然鄉土風俗亦自有不同去處尚恐體訪有所未盡更宜廣詢愽訪謹守力行只可過扵勤勞不可失之怠惰傳曰民生在勤勤則不匱經曰惰農自安不昬作勞不服田畒越其罔有黍稷此皆聖賢垂訓明白凡厥庻民切宜遵守右今印榜勸諭民間各請體悉前件事理父兄敎誨子弟子弟遵承教誨務敦本業耕耘收歛以養父母母或惰逰賭愽喫酒妨廢農桑庻幾衣食給足禮義興行感召和平共躋仁夀淳熈六年十二月日勸農文竊惟民生之本在食足食之本在農此自然之理也若夫農之爲務用力勤趨事速者所得多不用力不及時者所得少此亦自然之理也本軍田地磽埆土肉厚處不及三五寸設使人戸及時用力以治農事猶恐所收不及他處而土風習俗大率懶惰耕犂種蒔旣不及時耘耨培糞又不盡力陂塘灌漑之利廢而不修桑柘麻苧之功忽而不務此所以營生足食之計大抵踈略是以田疇愈見瘦瘠收拾轉見稀少加以官物重大别無資助之術一有水旱必至流移下失祖考傳付之業上虧國家經常之賦使民至此則長民之吏勸農之官亦安得不任其責㢤當職乆在田園習知農事到官日乆自覩斯弊恨以符印有守不得朝夕出入阡陌與諸父兄率其子弟從事扵耘鋤耒耜之間使其婦子含哺鼔腹無復飢凍流移之患庻㡬有以上副聖天子愛養元元夙夜焦勞惻怛之意昨去冬嘗印榜勸諭管内人戸其扵農畆桑𧖟之業孝弟忠信之方詳備悉至諒巳聞知然近以春初出按外郊道傍之田猶有未破土者是父兄子弟猶未體當職之意而不䏻勤力以趨時也念以教訓未明未忍遽行笞責今以中春舉行舊典奉宣聖天子徳意仍以舊牓并星子知縣王文林種桑等法再行印給凡我父兄及汝子弟其敬聴之㢤試以其說随事推行扵朝夕之間必有功効當職自今以徃更當時出郊野廵行察視有不如教罰亦必行先此勸諭各宜知悉勸諭築埂岸今曉示農民火急趂此未耕種之際遞相勸率各将今秋田畆𨳩濬陂塘修築埂岸毋至後時追悔毋及二月日榜勸諭救荒契勘本軍𬋩内乆闕雨澤祈禱未應田禾巳有乾損去處皆由長吏不明政刑乖錯致此災殃永念厥愆實深悼懼除巳具申朝省及諸監司乞行寛恤賑濟及檢計軍倉兩縣常平米見𬋩萬數不少又巳多方招邀米舡日近出糶仍兊借諸色錢徃外州循環收糴凖備賑濟况朝廷愛民如子聞此災傷非晚必有存恤指揮将来决然不至大叚狼狽今有預行勸諭将来事件下項一本軍日前災傷人戸多致流移一離郷土道路艱辛徃徃失所甚者横有死亡抛下墳墓田園屋宇便無人爲主一向狼藉至今遺迹尚有存者詢問来歴令人痛心况今淮南湖北等路亦不甚熟捨此徃彼等是飢餓有何所益今勸人戸各體州縣多方救恤之意仰俟朝廷非常寛大之恩各且安心著業更切祈禱神明車戽水漿救取見存些少禾榖依限陳訴所傷田叚頃畆聴候官司减放稅租賑濟米斛不可容易流移别致後悔一今勸上戸有力之家切湏存恤接濟本家地客務令足食兔致流移将来田土抛荒公私受弊一今勸上戸接濟佃火之外所有餘米即湏各發公平廣大仁愛之心莫増價例莫减升㪷日逐細民告糴即與應副則不惟貧民下戸獲免流移飢餓之患而上戸之所保全亦自不爲不多其糶米數多之人官司必當施行保明申奏推賞其餘措借出放亦許自依鄉例将来填還不足官司當爲根究如有故違不肯糶米之人即仰下戸經縣陳訴從官司究實一今勸貧民下戸既是平日仰給扵上戸今當此凶荒又湏頼其救接亦仰各依本分凡事循理遇闕食時只得上門告糴或乞賖借生榖舉米如妄行需索鼓衆作閙至奪錢米如有似此之人定當追捉根勘重行决配逺惡州軍其尤重者又當别作行遣一早禾巳多損旱無可奈何只得更将早田多種蕎麥及大小麥接濟食用曉諭逃移民戸檢會趙知軍任内訪聞本軍三縣民貧年榖稍不登熟徃徃捨墳墓離鄉井轉移之他者非其本心逃移未出境而豪右請佃之狀巳至縣司其弊多端或止押狀而無戸帖或桃請因而冐耕者或計㑹鄉司作逃移多年而兔科例者或有戸帖而官無簿者或免科例限滿而詭名冐請者或有強占而人不可誰何者所有都分之内遞相容蔽遂至租稅皆無稽考及其陳狀歸業鄉司邀阻及上戸強占百般沮難淹留歳月無以自明又復棄之而去深可矜䘏已散榜𬋩下縣分元給曉諭切慮文榜沉匿合行再給文榜曉諭右今印榜曉示逃移民戸具狀赴使軍陳訴切待追人根究施行各令知委減木炭錢曉諭近㩀人戸陳訴木炭折錢太重遂行申請乞行均减今凖提點鑄錢衙委官考究科敷輕重及水程近逺特行裁减自淳熈七年爲始數内建昌縣每料元科錢貳伯陸拾文省今裁减錢四十文省實納錢二百二十文省除巳出榜縣市曉示人戸知委外竊恐鄉村人戸未䏻通知湏至散榜曉示者右出榜建昌縣𬋩下鄉村曉示人戸知委据戸下合納木炭斤秤依今来减定實錢送納如本縣鄉司人吏輙敢過數催科即仰人戸徑赴本軍陳訴切待追人根勘㫁勒各令知委夏稅牌由契勘人戸逓年送納夏稅和買本色折帛錢多是無慿照應合納數目是致送納或多或少及有人戸在約束前巳納之數當来亦無照慿兼下戸不成端疋之數依巳降指揮每尺納錢一百文足巳行下星子都昌建昌縣每戸置立牌由分明𨳩說某啚某都人戸合納夏稅折帛和買紬絹各若干給付人戸收執湏𬋩扵省限内盡數具鈔同牌由赴塲照數送納如不賫牌由同鈔前来定不交受其有人戸在今来約束以前赴所属送納者亦仰給付牌由數内若有少欠仰人戸照牌由數目依數納足湏至曉諭受納秋苗曉諭檢會趙知軍任内契勘星子都昌建昌縣每年受納人戸秋苗所收水脚雇舡起綱頭子市例等錢數多是人戸輸納重有所費深屬不便使軍今将三縣人戸應合納秋苗每正米一石收雇舡水脚起綱頭子并專㪷市例緫减作六百七十文足其勘合促零錢係照鈔收納除外並不得多交民戸一文竊慮合干人依前例外非理巧作名目别行乞覓錢米巳散榜𬋩下縣分曉諭切慮元給文榜沉匿合行再給文榜曉諭者右除巳再牒受納官常切鈐束外今立賞錢三十貫文出榜縣𬋩下要閙處張掛曉示人戸知委自今後應輸納戸下米斛每正米一碩除前項立定雇舡起綱市例錢六百七十文足并随鈔收勘合促零錢外不許例外乞覓民戸一文如有合干人依前例外非理巧作名目别作乞錢米之人不拘多寡許人戸經官陳告将犯人根究依條㫁勘罪追賞施行的不虚示各令知委减秋苗照對本軍去年交納人戸秋苗每一石正米連省耗加耗共計一石七㪷六勝今年冬米許人戸從便赴軍倉交納今扵去年所納數上每一石更與减米一㪷合行曉示者曉示人戸送納秋苗契勘𬋩屬都昌建昌縣逓年所納人戸秋苗並係起發上供之數縁是上戸攬子等人把持縣道兠收在已與公吏通同作弊拖延不納窺伺縣道窘束全無措置即将下等秈米以應副預借爲名動欲减饒合數唯是循良細民各縣却復倍收加耗髙量斛面多端邀阻及勒令折錢将收到水脚錢等侵移使用縁此起發綱運大叚遲滯且又欠折不足事繋利害今照淳熈六年苗米起催在即若不預行措置定致上供轉見拖壓細民愈受重困今相度欲互差都昌建昌縣官前去各縣受納與减加耗縻費之類令人戸自行打盪斛面不得阻節如有諸郷人戸情願赴軍倉輸納苗米並聴從便重與優加裁减務使樂輸及行下約束都昌建昌縣不許預借官物如有不遵約束輙将米斛預借縣道本軍将来並不理爲納過之數本軍除巳具申諸監司照㑹外湏至曉示曉示科賣民戸麴引及抑勒打酒勘㑹民間吉凶㑹聚或修造之類若用酒依條聴随力沽買如不用亦從其便並不得抑勒今訪聞諸縣并佐官􅈦每遇人戸輙以承買麴引爲名科納人戸錢物以至坊場違法抑勒人戸打酒切恐良民𬒳害㛰葬造作失時湏至約束右今印榜曉示民戸知委今後如遇吉凶聚㑹或修造之類官司輒敢科買麴引或酒務坊場抑勒買酒並仰指定見證具狀徑赴使軍陳告切待拘收犯人根勘依條施行約束科差夫役訪聞𬋩下諸縣以和雇爲名科差夫力應副過徃官員修造舡扛諸般役使以至縣官出入公幹亦令保正長關喚夫力荷轎擔擎有妨農業甚者至令陪貼錢物爲害尤甚除巳行下約束外如更有似此去處仰𬒳擾人戸徑赴本軍投訴切待依法重作施行約束差公人及朱鈔事應今後本縣違法輒差公人下鄉追擾許人戸赴軍陳訴定追犯人重㫁應軍縣倉庫送納過人戸錢米經日不得朱鈔仰人戸赴軍陳訴定追犯人勘㫁當官給還應人戸二稅如巳送納獲鈔而本縣重疊追擾許人戸執鈔赴軍陳訴定追承行鄉司等人重㫁勒罷社倉事目勑命并跋語附宣教郎直祕閣新提舉兩浙東路常平茶塩公事朱熹今具社倉事目如後一逐年十二月分委諸部社首保正副将舊保簿重行編排其間有停藏逃軍及作過無行止之人隱匿在内仰社首隊長覺察申報尉司追捉解縣根究其引致之家亦乞一例㫁罪次年三月内将所排保簿赴鄉官交納鄉官點檢如有漏落及妄有増添一戸一口不實即許人告審實申縣乞行根治如無欺弊即将其簿紐筭人口指定米數大人若干小兒减半候支貸日将人戸請米狀拖對批填監官依狀支散一逐年五月下旬新陳未接之際預扵四月上旬申府乞依例給貸仍乞選差本縣清強官一員人吏一名㪷子一名前来與鄉官同共支貸一申府差官訖一面出榜排定日分分都支散先逺後近一日一都曉示人戸産錢六百文以上及自有營運衣食不闕不得請貸各依日限具狀狀内開說大人小兒口數結保每十人結爲一保逓相保委如保内逃亡之人同保均備取保十人以下不成保不支正身赴倉請米仍仰社首保正副隊長大保長並各赴倉識認面目照對保簿如無僞冐重疊即與簽押保明其社首保正等人不保而掌主保明者聴其日監官同鄉官入倉㩀狀依次支散其保明不實别有情弊者許人告首随事施行其餘即不得妄有邀阻如人戸不願請貸亦不得妄有抑勒一收支米用淳熈七年十二月本府給到新漆黒官桶及官㪷每桶受米五省半仰㪷子依公平量其監官鄉官人從逐􅈦只許兩人入中門其餘並在門外不得近前挨拶攙奪人戸所請米斛如違許𬒳擾人當㕔告覆重作施行一豐年如遇人戸請貸官米即開兩倉存留一倉若遇飢歉則開第三倉專賑貸深山窮谷耕田之民庻㡬豐荒賑貸有節一人戸所貸官米至冬納還不得過十一月下旬先扵十月上旬定日申府乞依例差官将帶吏㪷前来公共受納兩平交量舊例每石收耗米二㪷今更不收上件耗米又慮倉敖折閱無所從出每石量收三升凖備折閱及支吏㪷等人飯米其米正行附暦收支一申府差官訖即一面出榜排定日分分都交納先近後逺一日一都仰社首隊長吿報保頭保頭吿報人戸遞相紏率造一色乾硬糙米具狀同保共爲一狀未足不得交納如保内有人逃亡即同保均備納足赴倉交納監官鄉官吏㪷等人至日赴倉受納不得妄有阻節及過數多取其餘並依給米約束施行其收米人吏斗子要知首尾次年夏支貸日不可差換一收支米訖逐日轉上本縣所給印暦事畢日具緫數申府縣照㑹一每遇支散交納日本縣差到人吏一名㪷子一名社倉筭交司一名倉子兩名每名日支飯米一㪷約半月發遣褁足米二石共計米一十七石五斗又貼書一名貼斗一名各日支飯米一斗約半月發遣褁足米六斗共計四石二斗縣官人從七名鄕官人從共一十名每名日支飯米五升十日共計米八石五斗巳上共計米三十石二斗一年收支兩次共用米六十石四斗逐年盖墻并買藁薦修𥙷倉厫約米九石通計米六十九石四斗一排保式某里第某都社首某人今同本都大保長隊長編排到都内人口數下項甲戸大人若干口小兒若干口居住地名某處或産戸開說産錢若干或白煙耕田開店買賣土著外来係某年移来逐戸開餘開右某等今編排到都内人戸口數在前即無漏落及増添一戸一口不實如招人戸陳首丼伏解縣㫁罪謹狀年月日大保長姓名押狀隊長姓名保正副姓名社首姓名一請米狀式某都第某保隊長某人大保長某人下某處地名保頭某人等㡬人今遞相保委就社倉借米每大人若干小兒减半候冬收日備乾硬糙米每石量收耗米三升前来送納保内一名走失事故保内人情願均備取足不敢有違謹狀年月日保頭姓名甲戸開名大保長姓名隊長姓名保長姓名社首姓名一社倉支貸交收米斛合係社首保正副告報隊長保長隊長保長告報人戸如闕隊長許人戸就社倉陳說告報社首依公差𥙷如闕社首即申尉司定差一簿書鎻鑰鄉官公共分掌其大項收支湏監監官簽押其餘零碎出納即委鄉官公共掌𬋩務要均平不得徇私容情別生姦弊一如遇豐年人戸不願請貸至七八月而産戸願請者聴一倉内屋宇什物仰守倉人常切照𬋩不得毀損及借出他用如有損失鄉官點檢勒守倉人備償如些小損壊逐時修整大叚改造臨時具因依申府乞撥米斛具位朱熹奏節文一臣所居建寧府崇安縣開耀鄉有社倉一所其法可以推廣行之他處欲望聖慈行下諸路州軍曉諭人戸有願置立者州縣量支常平米斛責付本郷出等人戸主執歛散随宜立約實爲乆逺之利其建寧府社倉見行事目謹録一道進呈伏望聖慈詳察特賜施行十一月二十八日三省同奉聖旨令戸部看詳聞奏勑命行在尚書戸部凖淳熈八年十二月二十八日勑中書門下省尚書省送到戸部狀凖淳熈八年十一月二十八日尚書省送到宣教郎直祕閣新提舉兩浙東路常平茶塩公事朱熹劄子奏臣所居建寧府崇安縣開耀鄉有社倉一所係昨乾道四年郷民艱食本府給到常平米六百石委臣與本郷土居朝奉郎劉如愚同共賑貸至冬收到元米次年夏間本府復令依舊貸與人戸冬間納還臣等申府措置每石量收息米二斗自後逐年依此歛散或遇小歉即蠲其息之半大饑即盡蠲之至今十有四年量支息米造成倉厫三間收貯巳将元米六百石納還本府其見管三千一百石並是累年人戸納到息米巳申本府照㑹将来依前歛散更不收息每石只收耗米三升係臣與本郷土居官及士人數人同共掌𬋩遇歛散時即申府差縣官一員監視出納以此之故一郷四五十里之間雖遇凶年人不闕食竊謂其法可以推廣行之他處而法令無文人情難強妄意欲乞聖慈特依義役體例行下諸路州軍曉諭人戸有願依此置立杜倉者州縣量支常平米斛責與夲郷出等人戸主執歛散毎石收息二斗仍差本郷土居官員士人有行義者與本縣官同共出納收到息米十倍本米之數即送元米還官却将息米歛散每石只收耗米三升其有富家情願出米作本者亦從其便息米及數亦與撥還如有郷土風俗不同者更許随宜立約申官遵守實爲乆逺之利其不願置立去處官司不得抑勒則亦不至搔擾此皆今日之言雖無所濟扵目前之急然實公私儲蓄預備乆逺之計及今歉歳施行人必願從者衆伏望聖慈詳察特賜施行取進止三省同奉聖旨令戸部看詳聞奏本部今檢凖紹興重修常平免役令下項諸州常平錢榖及場務錢不足申提舉司通一路之數移用仍聽互相兊便支撥諸義倉附常平倉監專兼𬋩敖屋以轉運司倉充其積藏而應兊換者凖常平法無轉運司倉處撥充常平物諸義倉計夏秋正稅無正稅榖處物帛之類折爲榖者凖此毎一㪷別納五合應豐熟計一縣九分以上即納一升同正稅爲一鈔不收頭子脚乗錢及耗限一日先次交入本倉出剰通正税候盤量畢亦限一日據數紐撥即正稅不及一㪷并本戸放稅二分以上及孤貧不濟者免納諸義倉榖唯充賑給不得他用縣遇災傷當職官體量自第四等以下闕食戸給散若放稅七分以上通第三等給並預申提舉司審度行訖奏諸災傷計一縣放稅七分以上第四等以下戸乏種食者雖舊有欠閣不以月分聴結保貸借即榖不堪充種子者紐直以錢各成貫石給限一年随稅納仍免息州預以應支數保明申提舉司行訖申尚書戸部雖計一縣放稅不及七分而夲戸放稅及七分者凖此本部看詳欲行下諸路提舉司徧下本路諸州縣曉示任從民便如願依上件施行仰本鄉土居或寄居官員有行義者具狀赴本州縣自陳量扵義倉米内支撥其歛散之事與本鄉耆老公共措置洲縣並不湏干預抑勒仍仰提舉司類聚具申聴候朝廷指揮奏聞事十二月二十二日三省同奉聖旨依戸部看詳到事理施行奉敕如右牒到奉行前批十二月二十四日辰時付戸部施行仍關合屬去處湏至指揮兩浙東路提舉常平司主者仰一依今來勑命指揮疾速施行仍關合屬去處符到奉行淳熈八年十二月日下書令史郭令史頓圯主事全安仁將作少監兼權戸部郎中兼權押新除郎官未上郎中䟦語淳熈八年冬十有一月已亥臣熹以備使浙東奉行荒政蒙恩召入延和殿戒諭臨遣因得具以所居建寧府崇安縣𨳩耀鄉社倉本末推說條奏誤蒙𨳩納即詔頒其法扵四方而臣熹又以使事適獲奉承仰戴皇仁頓首幸甚因竊惟念里社有倉實陏唐遺法徃歳里中妄意此舉所以收恤隱民者盖偶合其㣲指顧以國家未定著令是以不䏻逺及且懼其弗克乆今乃得蒙上恩徧下郡國将遂得與闔宇之間含生之類均𬒳仁聖之澤扵無窮固已不勝大幸而荒陬下里斗升之積又得上爲明詔之所稱揚下爲四方之所取則抑又有榮耀焉故敢具刻尚書戸部所𬒳敕命下浙東提舉常平司者厝于故里本倉聴事而記其說如此俾千萬年含哺鼔腹之禱有以無忘帝力之所自云淳熈九年四月丙辰宣教郞直祕閣提舉兩浙東路常平茶塩公事借緋臣朱熹拜手稽首謹言勸立社倉榜當司恭奉聖旨建立社倉巳行印榜遍下𬋩内州縣勸諭尋㩀紹興府㑹稽縣鄉官新嘉興主簿諸葛修職名千䏻狀乞請官米置倉給貸而致政張承務名宗文新台州司戸王迪功名若水衢州龍㳺縣袁承節名起予等又乞各出本家米榖置倉給貸當司契勘前件官員心存惻怛惠及鄉閭出力輸財有足嘉尚除巳遵依所降指揮具由朝廷外湏至再行勸勉量出米榖恭禀聖旨建立社倉庻㡬益廣朝廷發政施仁之意有以養成閭里睦婣任䘏之風再此勸諭各請知委九年六月八日約束侵占田業牓本司簽㕔申照對本司見行下諸縣根刷沒官田産有下項事件申乞指揮湏至曉示一今來根刷諸司沒官戸絶等田産并新漲海塗溪漲淤成田地等多是豪勢等第并官戸公吏等人不曽經官請佃擅收侵占暗收花利不納官租其間雖有經官請佃止量立些少租課計囑主行人吏又且不曽催納入常平倉上下蒙庇官司無縁得知今出榜遍扵縣鎮鄉村張掛曉示限一月經官陳首與免罪從公紐立租課就行給佃更與免追日前冐占花利如犯人尚敢恃其豪勢仍前坐占限滿不首如官司覺察得知或因諸色人告首定當送所司根究從條㫁罪追日前花利入官仍盡給告人租佃一諸司沒官田産多是本縣公吏與有䕃人詭名請佃或與出名人分受花利上下蒙庇不曽納租如此積弊何縁覺察今來出牓曉示諸色人如有似此之人仰經官陳首當與将所首出田産不拘多寡盡給告人租契如詭名人并出名人䏻在一月内赴官首說當與免罪從公紐立租課就令租賃仍免追日前花利如限滿不首𬒳人陳告或官司覺察得知當送所司根勘依條施行約束不得搔擾保正等牓當職照對在法保正副𬋩幹鄉村盗賊闘毆煙火橋道公事大保長催納稅租及随租所納錢數一稅一替今來訪聞𬋩下諸縣縣官不䏻仰體成法妄有科擾致見一經役次家産遂空深屬利害今有約束事件下項一保正𬋩幹鄉村盗賊煙火橋道公事委是繁重今一縣之内有令有丞有簿有尉號爲四衙雜出文引别置木牌各立程限盡令趂赴申展繳押需索百出多剏名色立爲定例分文不可違少如押到則有到頭錢繳引則有繳䟦錢展限錢定限常限所用之錢復有多寡又有批朱縫印日齪之類一引狀之出乞取動是數項稍有稽違則枷錮箠楚無所不至且以保正一身豈䏻徧受諸衙督責一追催二稅非保正副之責今來縣道盡以文引勒令拘催其間有頑慢不肯輸納之人又有無著落稅賦徃徃迫以期限不堪杖責勒令填納無所赴愬豈有旣充重役復兼催科可謂重困一保正副最爲重役豈堪復有科擾今來縣道畧不加䘏應干敷買物件必巧作名目公然出引令保正副買辦如修造廨舎迎送官員整葺祠宇置造軍器似此之類其名不一竹木瓦磚油添麻苧等物例以和買爲名不曽支給分文又如役使工匠科差人夫勒出錢米陪備供輸椎剥肌髓至此爲甚一縣官或遇檢驗定奪打量體究等事下鄉多是過數将帶當直雖公吏軰亦用轎乗排備酒饌需索錢物動是取辦保正亦有本官喫食令保正供買及所經過都分雖無公事干渉例有過鄉錢過水錢其爲搔擾非止一端一訪聞縣道差募保正拘催二稅自承認之日便先期借絹借米硬令空作人戸姓名投納在官曽未旬月分限完較或三五日一次或五六日一次人吏鄉司皆有常例需索稍不如數雖所催分數已及却計較毫釐将多爲少未免箠楚一月之内盡是趂赴比較之日即不曽得在鄉催稅及至催納次第則又别出一簿謂之剗簿增添改易不可稽考有坍溪落江逃亡死絶有名無實之稅縣道不與勘會著實臨期動是勒令填納以至典賣屋業無可填備一次充應催稅至有三四年者雖所欠尺寸升合些少官物亦行綰繋無䏻得脫百姓受此抑勒破蕩之苦而縣道恬不加䘏委是無辜右鏤榜示所𬋩鄉分鄉村市鎮張掛其縣道扵前件約束事件如有違戾許保正副催科保長徑赴本司陳訴切待追究著實即行按奏公吏依法重行㫁治施行淳熈九年八月日牓减半賞格牓浙東提舉常平司二月二十五日凖尚書省劄子備提舉司奏今歳災傷條畫賑䘏事件數内一項去歳上戸别納糶濟之人近己蒙聖旨𥙷受官資無不感戴然去歳蒙降减半指揮止扵紹興一府施行今歳一路皆荒事醴不同今檢㑹當年耿延年所乞事理許扵浙東一路通行奉聖旨令吏部檢坐乾道七年八月一日賞格節次指揮行下浙東州縣勸諭富室上戸賑濟賑糶應格之人保明推賞如後來檢踏得災傷最重處許提舉司開具保明申尚書省取旨與依减半指揮施行劄付本司湏至曉諭右當司除巳恭依聖旨指揮行下諸州縣勸諭外今印榜曉示富室上戸仰體朝廷恤民之意廣出米糓以拊鄉閭有欲依募之家先赴本司自陳切待摽撥就比近災傷最重州縣入納即爲保明申奏朝廷乞𥙷官資應得上件减半指揮不致有胥吏阻抑故榜九月七日約束糶米及刼掠榜照對𬋩下州縣中夏以來乆不得雨髙低早禾多有旱損切慮人民不安理合存䘏曉諭一州縣目今米價髙貴止縁早禾旱傷其中晚之田自有得雨足可灌漑成熟去處兼當司巳蒙朝廷給降本錢及取撥别色官錢見今廣招廣南福建浙西等處客販般運米斛到來投糶凖備闕米州縣般運前去出糶切恐有米積蓄上戸與停塌之家未知前項事因以謂旱損少米意圖邀求厚利閉糴不糶此項除巳牒諸州府請速行遍下屬縣勸諭有米積蓄上戸停塌之家趂此米榖未登之際各依時價自行出糶應副細民食用如敢輒有違戾切待根究重行㫁遣如是向去民間大叚艱食切待别行申奏朝廷乞更多撥錢米前来濟糶一州縣火客佃戸耕作主家田土用力爲多全仰主家借貸應副今來旱損其田主自當優䘏賙給存養無令失所訪聞多有坐視火客佃戸狼狽失業恬不介意切恐因而失所却致無人布種荒廢田畆此頃除巳牒諸州府請遍行下諸縣勸諭應有田之家請以田客平日耕布勤勞爲念常加優䘏應副存養勿令失業云云一州縣旱傷去處慮有無知村民不務農業專事扇惑聚衆輙以借貸爲名扵村曈之間廣張聲勢亂行逼脅以至刼掠居民財物米糓此項當司檢凖律強盗不得財徒二年一疋徒三年二疋加一等十疋及傷人者絞殺人者斬其持杖者雖不得財流三千里五匹絞傷人者斬今来切慮愚民不曉條法悞犯刑名深可憐憫除巳牒諸州府請遍下諸縣曉諭民戸知委各自安業勿致扇惑輕犯典憲後悔無及右今鏤榜曉諭民戸知悉故榜再放苗米分數榜契勘本路今年旱傷檢放苗米多有不實去處曽具奏請今來當職詢訪不實最多未欲按劾施行今來到任巳是深冬難以檢勘湏至别行措置将諸州縣人戸災傷苗米等第更行蠲放除巳奏聞及申尚書省外湏至暁諭右今将本路州縣人戸苗米元檢放五分巳上鄉分全戸五斗巳下全放元檢放四分以上鄉分全戸四斗以下全放元檢放三分以上鄉分全戸三斗以下全放元檢放二分以上鄉分全戸二斗以下全放元檢放一分以上鄕分全戸一斗以下全放其紹興府人戸湏有丁之家方得蠲放其湖田米亦依例蠲放施行今印榜曉示人戸知委如州縣再行催理仰經本司陳訴切待追究按劾施行約束檢旱照對今歳適當旱歉州縣合差官徧徃鄉村檢視每見差出官員多是過數将帶人從反行湏索搔動村落以納圖冊爲名不論人戸髙低每畆科配頃畆頭性之類又不親行田畆從實檢校反将訴荒人戸非理監繋勒令服熟殊失救荒䘏民之意今來當職斟酌每官一員止得帶􅈦子一名吏貼一人當直八名仰從本州縣陳乞計日給錢米各自賫行並不許分毫搔擾保正副及大小保長湏親行田畆從實檢放如有違戾許人戸徑到本司陳訴切待追治施行浙東客次牓熹叨𬒳臨遣專以刺舉爲職自惟昧陋雖不足以盡知官吏之賢否然旣尸其任不敢不悉心詢究故自到任以來凡所論薦皆必稽諸公論考其事實然後剡奏不敢狥私容情以自䧟扵罔上之誅凡我同寮亦望究心職事律巳愛民以待考察不必投書獻啓自陳脚色挾持勢援宛轉請求徒失所以自重之道而反貽絀辱之羞也或恐實有賢哲之士潜晦不耀而熹之愚不足以知之則却望相與推揚具以見教熹敢不承命加察焉除秦檜祠移文竊見故相秦檜歸自虜庭久專國柄内忍事讐之恥外張震主之威以恣睢戮善良銷沮人心忠義剛直之氣以喜怒爲進退崇奨天下佞䛕偷惰之風究其設心何止誤國岳侯旣死扵棘寺魏公復竄扵嶺隅連逮趙汾之獄盖将掩衆正而盡誅徘徊漢鼎之旁已聞圖九錫而来獻天不誅檜誰其弱秦今中外之有識猶皆憤惋而不平而朝廷扵其家亦且擯絶而不用况永嘉號禮義之地學校實風化之源尚使有祠無乃未講雖捐田以示濡沬恐出市恩然設像以厠英賢何以爲訓晦庵先生朱文公文集卷第九十九候官縣儒學訓導劉簪校
