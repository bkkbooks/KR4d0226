body:
  text: 公移知南康榜文當職久以疾病退伏里閭比蒙誤恩假守茲土懇辭不獲扶曵而來到任之初伏自惟念聖天子所以搜揚幽隱付卑民社之意固將使之宣明教化寬恤民力非徒責以簿書期會之最而巳顧雖不能其敢不勉今有合行詢訪勸喻事件下項一本軍土瘠民稀役煩稅重前後長吏非不欲多方措置寬恤民力實緣上供官物既巳浩瀚軍用所資亦復不少只得逐急了辦目前更無餘力可以議此是致民力日困無復安土樂生之心深可哀憐安忍坐視今恐管下士人父老僧道軍民諸色等人有能知得利病根原次第合作如何措置可以寬恤並請子細開具著實事狀不拘早晚赴軍披陳切待面加詢問審實相度多方措置庶幾戶口歲增家給人足有以仰副聖天子愛養元元之意一本軍民俗號稱淳厚廷少諍訟獄少係囚及按圖經前代有太中大夫司馬皓司徒從事中郎司焉延義宜春縣令熊仁贍皆以孝行顯名及至國初又有義門洪氏亦以纍世義居婺婦陳氏守節不嫁遂蒙太宗皇帝賜以宸翰寵以官資旌表門閭蠲除徭役此足見其風俗之美非他郡之所及又况天性人心不易之理在昔既有今豈無之患在師帥不良不加敦勸是致頽靡日陷偷薄今請管下士民鄉鄰父老歲時集會並加教戒間或因事反復丁寧使後生子弟咸知修其孝弟忠信之行入以事其父兄出以事其長上敦厚親族和睦鄉鄰有無相通患難相恤庶幾風俗之美不愧古人有以仰副聖天子敦厚風俗之意本軍背負羌廬前據彭蠡地勢雄秀甲于東南禹迹所經太史所逰有聖賢之遺風下逮東晉陶氏則長沙靖節祖孫相望爰及聖朝劉氏則屯田祕丞父子相繼皆有德業著在丹青宜其風聲氣俗猶有存者後來之秀接踵比肩而比年以來士風衰弊而學校養士不過三十人大比應書人數亦少雖講道修身之士或未必肯逰學校入場屋然詢于物論以求物外之英豪則亦未聞卓然有可稱良由長民之吏未嘗加意使里閭後生無所從學以至于此今請鄉黨父兄各推擇其子弟之有志于學者遣來入學陪厨待輔聽講供課本軍亦一面多方措置增置學糧當職公務之餘亦當時時詣學與學官同共講説經旨多方誘掖庶幾長材秀民為時而出有以仰副聖天子長育人材之意右出榜星子都昌建昌縣并市曹曉諭管下士民父老等請詳前項事理逐一遵稟仰副聖朝愛民敦化之美意并牒三縣照會及别給印榜每縣各一百道委巡尉分下鄉村張挂不得隱匿并牃軍學教授請從長相度合如何增添贍學錢糧修立課試規矩開具回報切待措置施行又牒頭同南康䧛文但改寬恤民力為敦厲風俗合行詢訪勸諭為合行詢究一晉侍中太尉長沙陶威公興建義旗康復帝室勤勞忠順以沒其身今按圖經公始家鄱陽後徙尋陽見有遺迹在本軍都昌縣界及有廟貌在本軍城內及都昌縣水旱禱禳皆有感應未委上件事迹是與不是詣實一晉太傳廬陵謝文靖公始自隱淪巳推時望及登宰輔優有武功今按圖經公始封建昌即本軍之建昌縣未審本縣曽與不曽建立祠宇一晉靖節徴士陶公先生隱遁髙風可激貪懦忠義大節足厚彛倫今按圗經先生始自柴桑徙居栗里其地在本軍近治三十里內未委本處曽與不曽建立祠宇一按圖經建昌縣有陳太中大夫司馬皓司徒從事中郎司馬延義皆以孝行見于陳書有墓在本縣界又有唐宜春縣令熊仁贍亦以孝行旌表門閭未委其墓及唐朝所表門閭有無損壞一按圖經白鹿洞學館雖起南唐至國初時猶存舊額後乃廢壞未委本處目今有無屋宇一按圗經建昌縣義門洪氏本以纍世義居婺婦守節嘗蒙太宗皇帝賜以宸翰寵以官資旌表門閭蠲除徭役未委其家目今有無子孫依舊義居所藏御書見作如何崇奉所表門閭曽與不曽修葺一濂溪先生虞部周公心傳道統為世先覺熙寧中曽知本軍未委軍學曽與不曽建立祠貌一西澗先生屯田劉公避世清朝髙蹈物表其子祕丞公亦以博聞徑節見知于故司馬文正公與修資治通鑑而所著十國紀年通鑑外紀又自别行于世故黃門蘇文定公嘗以冰清玉剛比其父子而鄉人因以冰玉名其所居之堂今按圖經西澗舊有劉居士菴及訪聞城西能仁寺側有劉公墓及太史范公所撰祕丞墓碣獨冰玉堂無所登載未審其墓是與不是的實菴堂墓碣曽與不曾損壞一訪聞故贈諫議大夫陳忠肅公曽居本軍未委日前有何遺迹一竊恐本軍更有前代忠臣孝子義夫節婦圖經文字有失該載及目今見有似此之人或山林之間科舉之外别有懷材抱藝守道晦迹之士亦合廣行詢訪有無遺逸右牒教授揚迪功司戶毛迪功請詳逐項事理廣行詢究取見詣實逐一子細條具回申以慿稽考别行措置仍榜客位遍呈寄居過往賢士大夫恐有知得本軍上件事迹詳細切幸特賜開諭及榜示市曹仰居民知委如有知得上件事迹詳細之人仰子細具狀不拘早晚赴軍衙申説切待併行審實措置施行淳熙六年四月日榜白鹿洞牒契勘本軍廬山白鹿洞書院于國朝會要本軍圖經記文石刻元係唐朝李賔客渤隱居舊有臺榭環以流水雜植花木為一時之勝南唐升元中因建學館買田以給諸生學者大集乃以國子監九經李善道為洞主掌其教授至本朝太平興國二年知江州周述言廬山白鹿洞學徒嘗數十百人望賜九經書使之肄習詔從其請俾國子監給以印本仍傳送之七年又以洞主明起為蔡州褒信縣主簿七年始置南康軍遂屬郡境至祥符初直史館孫冕請以為歸老之地及卒還葬其所其子比部郎中琛復置學館十間書白鹿洞之書堂六字揭于楹間以教子弟四方之士願就學者亦給其食當塗郭祥正實為之記後經兵亂屋宇不存其記文石刻遂徙置軍城天慶觀昨來當職到任之初即嘗詢訪未見的實近因接視陂塘親到其處觀其四面山水清邃環合無市井之喧有泉石之勝真群居講學遁迹著書之所因復慨念廬山一帶老佛之居以百十計其廢壞無不興葺至于儒生舊館只此一處既是前朝名賢古迹又蒙太宗皇帝給賜經書所以教養一方之士德意甚美而一廢纍年不復振起吾道之衰既可悼懼而太宗皇帝敦化育材之意亦不著于此邦以傳于後世尤長民之吏所不得不任其責者其廬山白鹿書院合行修立云云示俗孝經云用天之道因地之利謂依時及節耕種田土謹身節用謹身謂不作非違不犯刑憲節用謂省使儉用不妄耗資以養父母人能行此三句之事則身安力足有以奉養其父母使其父母安穩快樂此庶人之孝也庶人謂百姓也能行此上四句之事方是孝順雖是父母不存亦須如此方能保守父母産業不至破壞乃為孝順若父母生存不能奉養父母亡殁不能保守便是不孝之人天所不容地所不載幽為鬼神所責明為官法所誅不可不深戒也以上孝經庶人章正文五句係先聖至聖文宣王所説奉勸民間逐日持誦依此經解説早晚思惟常切遵守不須更念佛號佛經無益于身枉費力也曉諭兄弟爭財産事照對禮經凡為人子不蓄私財而律文亦有别籍異財之禁蓋父母在上人子一身尚非自巳所能專有豈敢私蓄財貨擅據田園以為巳物此乃天性人心自然之理先王制禮後王立法所以順之而不敢違也當職昨來到任之初詢訪民俗考按圖經曽以司馬大夫司馬中郎熊縣令洪義門孝行義居事迹勸諭士民務修孝弟忠信之行入事父兄出事長上敦厚親族和睦鄉鄰有無相通患難相恤庶幾有以仰副聖天子敦厚風俗之意今巳纍月而誠意不孚未有顯效比閲詞訴有建昌縣劉珫兄弟都昌縣陳由仁兄弟並係母親在堂擅將家産私下指撥分併互相推託不納賦稅爭論到官殊駭聞聽除巳行下建昌縣及索到陳由仁等指撥關約盡行毀抹當廳説諭令劉珫陳由仁與其兄弟依舊同居共財上奉母親下率弟姪協力家務公共出納輸送官物外竊慮管屬更有似此棄違禮法傷害風教之人而長吏不能以時教訓紏禁上負承流宣化之責內自循省不勝恐懼今檢坐條法指揮下項須至曉諭者凖律云云右除巳出榜市曹并星子縣門都昌建昌縣市張挂曉示人戶知委如有祖父母父母在堂子孫擅行違法分割田産析居别籍異財之人仰遵依前項條法指揮日下具狀將所立關約赴官陳首毀抹改正侍奉父母協和兄弟同管家務公共出納輸送官物不得拖欠如不遵今來約束却致違犯到官之人必定送獄依法斷罪云云淳熙六年八月日榜勸農文當職久處田間習知穡事兹沗郡寄職在勸農竊見本軍巳是地瘠稅重民間又不勤力耕種耘耨鹵莾滅裂較之他處大假不同所以土脈踈淺草盛苗稀雨澤稍愆便見荒歉皆緣長吏勸課不勤使之至此深懼無以下固邦本仰寬顧憂今有合行勸諭下項一大凡秋間收成之後須趂冬月以前便將戶下所有田假一例犂翻凍令酥脆至正月以後更多著遍數節次犂杷然後布種自然田泥深熟土肉肥厚種禾易長盛水難乾耕田之後春間須是揀選肥好田假多用糞壤拌和種子種出秧苗其造糞壤亦須秋冬無事之時預先剗取土面草根晒曝燒灰旋用大糞拌和入種子在內然後撒種一秧苗既長便須及時趂早栽插莫令遲緩過却時節一禾苗既長稈草亦生須是放乾田水子細辨認逐一拔出踏在泥裏以培禾根其塍畔斜生茅草之屬亦須節次芟削取令淨盡免得分耗土力侵害田苗將來榖實必須繁盛堅好一山原陸地可種粟麥麻豆去處亦須趂時竭力耕種務盡地力庶幾青黃未交之際有以接續飲食不至飢餓一陂塘之利農事之本尤當協力興修如有怠惰不趂時工作之人仰衆列狀申縣乞行懲戒如有工力浩瀚去處私下難以紏集即仰經縣自陳官為修築如縣司不為措置即仰經軍投陳切待别作行遣一桑麻之利衣服所資切須多種桑柘麻苧婦女勤力養𧖟織紡造成布帛其桑木每遇秋冬即將旁生拳曲小枝盡行斬削務令大枝氣脈全盛自然生葉厚大餧𧖟有力一大凡農桑之務不過前項數條然鄉土風俗亦自有不同去處尚恐體訪有所未盡更宜廣詢博訪謹守力行只可過于勤勞不可失之怠惰傳曰民生在勤勤則不匱經曰惰農自安不昏作勞不服田畒越其罔有黍稷此皆聖賢垂訓明白凡厥庶民切宜遵守右今印榜勸諭民間各請體悉前件事理父兄教誨子弟子弟遵承教誨務敦本業耕耘收斂以養父母母或惰逰賭博喫酒妨廢農桑庶幾衣食給足禮義興行感召和平共躋仁夀淳熙六年十二月日勸農文竊惟民生之本在食足食之本在農此自然之理也若夫農之為務用力勤趨事速者所得多不用力不及時者所得少此亦自然之理也本軍田地磽埆土肉厚處不及三五寸設使人戶及時用力以治農事猶恐所收不及他處而土風習俗大率懶惰耕犂種蒔既不及時耘耨培糞又不盡力陂塘灌溉之利廢而不修桑柘麻苧之功忽而不務此所以營生足食之計大抵踈略是以田疇愈見瘦瘠收拾轉見稀少加以官物重大别無資助之術一有水旱必至流移下失祖考傳付之業上虧國家經常之賦使民至此則長民之吏勸農之官亦安得不任其責哉當職久在田園習知農事到官日久自覩斯弊恨以符印有守不得朝夕出入阡陌與諸父兄率其子弟從事于耘鋤耒耜之間使其婦子含哺鼓腹無復飢凍流移之患庶幾有以上副聖天子愛養元元夙夜焦勞惻怛之意昨去冬嘗印榜勸諭管內人戶其于農畝桑𧖟之業孝弟忠信之方詳備悉至諒巳聞知然近以春初出按外郊道傍之田猶有未破土者是父兄子弟猶未體當職之意而不能勤力以趨時也念以教訓未明未忍遽行笞責今以中春舉行舊典奉宣聖天子德意仍以舊榜并星子知縣王文林種桑等法再行印給凡我父兄及汝子弟其敬聽之哉試以其説隨事推行于朝夕之間必有功效當職自今以往更當時出郊野巡行察視有不如教罰亦必行先此勸諭各宜知悉勸諭築埂岸今曉示農民火急趂此未耕種之際遞相勸率各將今秋田畝開濬陂塘修築埂岸毋至後時追悔毋及二月日榜勸諭救荒契勘本軍𬋩內久闕雨澤祈禱未應田禾巳有乾損去處皆由長吏不明政刑乖錯致此災殃永念厥愆實深悼懼除巳具申朝省及諸監司乞行寬恤賑濟及檢計軍倉兩縣常平米見𬋩萬數不少又巳多方招邀米船日近出糶仍兊借諸色錢往外州循環收糴凖備賑濟况朝廷愛民如子聞此災傷非晚必有存恤指揮將來決然不至大假狼狽今有預行勸諭將來事件下項一本軍日前災傷人戶多致流移一離鄉土道路艱辛往往失所甚者橫有死亡拋下墳墓田園屋宇便無人為主一向狼藉至今遺迹尚有存者詢問來歷令人痛心况今淮南湖北等路亦不甚熟捨此往彼等是飢餓有何所益今勸人戶各體州縣多方救恤之意仰俟朝廷非常寬大之恩各且安心著業更切祈禱神明車戽水漿救取見存些少禾榖依限陳訴所傷田假頃畝聽候官司減放稅租賑濟米斛不可容易流移别致後悔一今勸上戶有力之家切須存恤接濟本家地客務令足食兔致流移將來田土拋荒公私受弊一今勸上戶接濟佃火之外所有餘米即須各發公平廣大仁愛之心莫增價例莫減升斗日逐細民告糴即與應副則不惟貧民下戶獲免流移飢餓之患而上戶之所保全亦自不為不多其糶米數多之人官司必當施行保明申奏推賞其餘措借出放亦許自依鄉例將來填還不足官司當為根究如有故違不肯糶米之人即仰下戶經縣陳訴從官司究實一今勸貧民下戶既是平日仰給于上戶今當此凶荒又須賴其救接亦仰各依本分凡事循理遇闕食時只得上門告糴或乞賖借生榖舉米如妄行需索鼓衆作閙至奪錢米如有似此之人定當追捉根勘重行決配逺惡州軍其尤重者又當别作行遣一早禾巳多損旱無可奈何只得更將早田多種蕎麥及大小麥接濟食用曉諭逃移民戶檢會趙知軍任內訪聞本軍三縣民貧年榖稍不登熟往往捨墳墓離鄉井轉移之他者非其本心逃移未出境而豪右請佃之狀巳至縣司其弊多端或止押狀而無戶帖或桃請因而冒耕者或計會鄉司作逃移多年而兔科例者或有戶帖而官無簿者或免科例限滿而詭名冒請者或有強占而人不可誰何者所有都分之內遞相容蔽遂至租稅皆無稽考及其陳狀歸業鄉司邀阻及上戶強占百般沮難淹留歲月無以自明又復棄之而去深可矜恤已散榜𬋩下縣分元給曉諭切慮文榜沉匿合行再給文榜曉諭右今印榜曉示逃移民戶具狀赴使軍陳訴切待追人根究施行各令知委減木炭錢曉諭近據人戶陳訴木炭折錢太重遂行申請乞行均減今凖提點鑄錢衙委官考究科敷輕重及水程近逺特行裁減自淳熙七年為始數內建昌縣每料元科錢二伯陸拾文省今裁減錢四十文省實納錢二百二十文省除巳出榜縣市曉示人戶知委外竊恐鄉村人戶未能通知須至散榜曉示者右出榜建昌縣𬋩下鄉村曉示人戶知委據戶下合納木炭斤稱依今來減定實錢送納如本縣鄉司人吏輒敢過數催科即仰人戶徑赴本軍陳訴切待追人根勘斷勒各令知委夏稅牌由契勘人戶遞年送納夏稅和買本色折帛錢多是無慿照應合納數目是致送納或多或少及有人戶在約束前巳納之數當來亦無照慿兼下戶不成端匹之數依巳降指揮每尺納錢一百文足巳行下星子都昌建昌縣每戶置立牌由分明開説某啚某都人戶合納夏稅折帛和買紬絹各若干給付人戶收執須𬋩于省限內盡數具鈔同牌由赴場照數送納如不賫牌由同鈔前來定不交受其有人戶在今來約束以前赴所屬送納者亦仰給付牌由數內若有少欠仰人戶照牌由數目依數納足須至曉諭受納秋苗曉諭檢會趙知軍任內契勘星子都昌建昌縣每年受納人戶秋苗所收水腳雇船起綱頭子市例等錢數多是人戶輸納重有所費深屬不便使軍今將三縣人戶應合納秋苗每正米一石收雇船水腳起綱頭子并專斗市例總減作六百七十文足其勘合促零錢係照鈔收納除外並不得多交民戶一文竊慮合干人依前例外非理巧作名目别行乞覓錢米巳散榜𬋩下縣分曉諭切慮元給文榜沉匿合行再給文榜曉諭者右除巳再牒受納官常切鈐束外今立賞錢三十貫文出榜縣𬋩下要閙處張挂曉示人戶知委自今後應輸納戶下米斛每正米一碩除前項立定雇船起綱市例錢六百七十文足并隨鈔收勘合促零錢外不許例外乞覓民戶一文如有合干人依前例外非理巧作名目别作乞錢米之人不拘多寡許人戶經官陳告將犯人根究依條斷勘罪追賞施行的不虛示各令知委減秋苗照對本軍去年交納人戶秋苗每一石正米連省耗加耗共計一石七斗六勝今年冬米許人戶從便赴軍倉交納今于去年所納數上每一石更與減米一斗合行曉示者曉示人戶送納秋苗契勘𬋩屬都昌建昌縣遞年所納人戶秋苗並係起發上供之數緣是上戶攬子等人把持縣道兜收在已與公吏通同作弊拖延不納窺伺縣道窘束全無措置即將下等秈米以應副預借為名動欲減饒合數唯是循良細民各縣却復倍收加耗髙量斛面多端邀阻及勒令折錢將收到水腳錢等侵移使用緣此起發綱運大假遲滯且又欠折不足事繫利害今照淳熙六年苗米起催在即若不預行措置定致上供轉見拖壓細民愈受重困今相度欲互差都昌建昌縣官前去各縣受納與減加耗縻費之類令人戶自行打蕩斛面不得阻節如有諸鄉人戶情願赴軍倉輸納苗米並聽從便重與優加裁減務使樂輸及行下約束都昌建昌縣不許預借官物如有不遵約束輒將米斛預借縣道本軍將來並不理為納過之數本軍除巳具申諸監司照會外須至曉示曉示科賣民戶麴引及抑勒打酒勘會民間吉凶會聚或修造之類若用酒依條聽隨力沽買如不用亦從其便並不得抑勒今訪聞諸縣并佐官􅈦每遇人戶輒以承買麴引為名科納人戶錢物以至坊場違法抑勒人戶打酒切恐良民𬒳害婚葬造作失時須至約束右今印榜曉示民戶知委今後如遇吉凶聚會或修造之類官司輒敢科買麴引或酒務坊場抑勒買酒並仰指定見證具狀徑赴使軍陳告切待拘收犯人根勘依條施行約束科差夫役訪聞𬋩下諸縣以和雇為名科差夫力應副過往官員修造船扛諸般役使以至縣官出入公幹亦令保正長關喚夫力荷轎擔擎有妨農業甚者至令陪貼錢物為害尤甚除巳行下約束外如更有似此去處仰𬒳擾人戶徑赴本軍投訴切待依法重作施行約束差公人及朱鈔事應今後本縣違法輒差公人下鄉追擾許人戶赴軍陳訴定追犯人重斷應軍縣倉庫送納過人戶錢米經日不得朱鈔仰人戶赴軍陳訴定追犯人勘斷當官給還應人戶二稅如巳送納獲鈔而本縣重疊追擾許人戶執鈔赴軍陳訴定追承行鄉司等人重斷勒罷社倉事目勑命并跋語附宣教郎直祕閣新提舉兩浙東路常平茶鹽公事朱熹今具社倉事目如後一逐年十二月分委諸部社首保正副將舊保簿重行編排其間有停藏逃軍及作過無行止之人隱匿在內仰社首隊長覺察申報尉司追捉解縣根究其引致之家亦乞一例斷罪次年三月內將所排保簿赴鄉官交納鄉官點檢如有漏落及妄有增添一戶一口不實即許人告審實申縣乞行根治如無欺弊即將其簿紐算人口指定米數大人若干小兒減半候支貸日將人戶請米狀拖對批填監官依狀支散一逐年五月下旬新陳未接之際預于四月上旬申府乞依例給貸仍乞選差本縣清強官一員人吏一名斗子一名前來與鄉官同共支貸一申府差官訖一面出榜排定日分分都支散先逺後近一日一都曉示人戶産錢六百文以上及自有營運衣食不闕不得請貸各依日限具狀狀內開説大人小兒口數結保每十人結為一保遞相保委如保內逃亡之人同保均備取保十人以下不成保不支正身赴倉請米仍仰社首保正副隊長大保長並各赴倉識認面目照對保簿如無偽冒重疊即與簽押保明其社首保正等人不保而掌主保明者聽其日監官同鄉官入倉據狀依次支散其保明不實别有情弊者許人告首隨事施行其餘即不得妄有邀阻如人戶不願請貸亦不得妄有抑勒一收支米用淳熙七年十二月本府給到新漆黑官桶及官斗每桶受米五省半仰斗子依公平量其監官鄉官人從逐􅈦只許兩人入中門其餘並在門外不得近前挨拶攙奪人戶所請米斛如違許𬒳擾人當廳告覆重作施行一豐年如遇人戶請貸官米即開兩倉存留一倉若遇飢歉則開第三倉專賑貸深山窮谷耕田之民庶幾豐荒賑貸有節一人戶所貸官米至冬納還不得過十一月下旬先于十月上旬定日申府乞依例差官將帶吏斗前來公共受納兩平交量舊例每石收耗米二斗今更不收上件耗米又慮倉敖折閲無所從出每石量收三升凖備折閲及支吏斗等人飯米其米正行附曆收支一申府差官訖即一面出榜排定日分分都交納先近後逺一日一都仰社首隊長告報保頭保頭告報人戶遞相紏率造一色乾硬糙米具狀同保共為一狀未足不得交納如保內有人逃亡即同保均備納足赴倉交納監官鄉官吏斗等人至日赴倉受納不得妄有阻節及過數多取其餘並依給米約束施行其收米人吏斗子要知首尾次年夏支貸日不可差換一收支米訖逐日轉上本縣所給印曆事畢日具總數申府縣照會一每遇支散交納日本縣差到人吏一名斗子一名社倉算交司一名倉子兩名每名日支飯米一斗約半月發遣褁足米二石共計米一十七石五斗又貼書一名貼斗一名各日支飯米一斗約半月發遣褁足米六斗共計四石二斗縣官人從七名鄉官人從共一十名每名日支飯米五升十日共計米八石五斗巳上共計米三十石二斗一年收支兩次共用米六十石四斗逐年蓋墻并買藁薦修輔倉厫約米九石通計米六十九石四斗一排保式某里第某都社首某人今同本都大保長隊長編排到都內人口數下項甲戶大人若干口小兒若干口居住地名某處或産戶開説産錢若干或白煙耕田開店買賣土著外來係某年移來逐戶開餘開右某等今編排到都內人戶口數在前即無漏落及增添一戶一口不實如招人戶陳首井伏解縣斷罪謹狀年月日大保長姓名押狀隊長姓名保正副姓名社首姓名一請米狀式某都第某保隊長某人大保長某人下某處地名保頭某人等幾人今遞相保委就社倉借米每大人若干小兒減半候冬收日備乾硬糙米每石量收耗米三升前來送納保內一名走失事故保內人情願均備取足不敢有違謹狀年月日保頭姓名甲戶開名大保長姓名隊長姓名保長姓名社首姓名一社倉支貸交收米斛合係社首保正副告報隊長保長隊長保長告報人戶如闕隊長許人戶就社倉陳説告報社首依公差輔如闕社首即申尉司定差一簿書鎖鑰鄉官公共分掌其大項收支須監監官簽押其餘零碎出納即委鄉官公共掌𬋩務要均平不得徇私容情別生姦弊一如遇豐年人戶不願請貸至七八月而産戶願請者聽一倉內屋宇什物仰守倉人常切照𬋩不得毀損及借出他用如有損失鄉官點檢勒守倉人備償如些小損壞逐時修整大假改造臨時具因依申府乞撥米斛具位朱熹奏節文一臣所居建寧府崇安縣開耀鄉有社倉一所其法可以推廣行之他處欲望聖慈行下諸路州軍曉諭人戶有願置立者州縣量支常平米斛責付本鄉出等人戶主執斂散隨宜立約實為久逺之利其建寧府社倉見行事目謹録一道進呈伏望聖慈詳察特賜施行十一月二十八日三省同奉聖旨令戶部看詳聞奏勑命行在尚書戶部凖淳熙八年十二月二十八日勑中書門下省尚書省送到戶部狀凖淳熙八年十一月二十八日尚書省送到宣教郎直祕閣新提舉兩浙東路常平茶鹽公事朱熹劄子奏臣所居建寧府崇安縣開耀鄉有社倉一所係昨乾道四年鄉民艱食本府給到常平米六百石委臣與本鄉土居朝奉郎劉如愚同共賑貸至冬收到元米次年夏間本府復令依舊貸與人戶冬間納還臣等申府措置每石量收息米二斗自後逐年依此斂散或遇小歉即蠲其息之半大飢即盡蠲之至今十有四年量支息米造成倉厫三間收貯巳將元米六百石納還本府其見管三千一百石並是纍年人戶納到息米巳申本府照會將來依前斂散更不收息每石只收耗米三升係臣與本鄉土居官及士人數人同共掌𬋩遇斂散時即申府差縣官一員監視出納以此之故一鄉四五十里之間雖遇凶年人不闕食竊謂其法可以推廣行之他處而法令無文人情難強妄意欲乞聖慈特依義役體例行下諸路州軍曉諭人戶有願依此置立杜倉者州縣量支常平米斛責與夲鄉出等人戶主執斂散每石收息二斗仍差本鄉土居官員士人有行義者與本縣官同共出納收到息米十倍本米之數即送元米還官却將息米斂散每石只收耗米三升其有富家情願出米作本者亦從其便息米及數亦與撥還如有鄉土風俗不同者更許隨宜立約申官遵守實為久逺之利其不願置立去處官司不得抑勒則亦不至搔擾此皆今日之言雖無所濟于目前之急然實公私儲蓄預備久逺之計及今歉歲施行人必願從者衆伏望聖慈詳察特賜施行取進止三省同奉聖旨令戶部看詳聞奏本部今檢凖紹興重修常平免役令下項諸州常平錢榖及場務錢不足申提舉司通一路之數移用仍聽互相兊便支撥諸義倉附常平倉監專兼𬋩敖屋以轉運司倉充其積藏而應兊換者凖常平法無轉運司倉處撥充常平物諸義倉計夏秋正稅無正稅榖處物帛之類折為榖者凖此每一斗別納五合應豐熟計一縣九分以上即納一升同正稅為一鈔不收頭子腳乘錢及耗限一日先次交入本倉出剩通正稅候盤量畢亦限一日據數紐撥即正稅不及一斗并本戶放稅二分以上及孤貧不濟者免納諸義倉榖唯充賑給不得他用縣遇災傷當職官體量自第四等以下闕食戶給散若放稅七分以上通第三等給並預申提舉司審度行訖奏諸災傷計一縣放稅七分以上第四等以下戶乏種食者雖舊有欠閣不以月分聽結保貸借即榖不堪充種子者紐直以錢各成貫石給限一年隨稅納仍免息州預以應支數保明申提舉司行訖申尚書戶部雖計一縣放稅不及七分而夲戶放稅及七分者凖此本部看詳欲行下諸路提舉司遍下本路諸州縣曉示任從民便如願依上件施行仰本鄉土居或寄居官員有行義者具狀赴本州縣自陳量于義倉米內支撥其斂散之事與本鄉耆老公共措置洲縣並不須干預抑勒仍仰提舉司類聚具申聽候朝廷指揮奏聞事十二月二十二日三省同奉聖旨依戶部看詳到事理施行奉敕如右牒到奉行前批十二月二十四日辰時付戶部施行仍關合屬去處須至指揮兩浙東路提舉常平司主者仰一依今來勑命指揮疾速施行仍關合屬去處符到奉行淳熙八年十二月日下書令史郭令史頓圯主事全安仁將作少監兼權戶部郎中兼權押新除郎官未上郎中跋語淳熙八年冬十有一月已亥臣熹以備使浙東奉行荒政蒙恩召入延和殿戒諭臨遣因得具以所居建寧府崇安縣開耀鄉社倉本末推説條奏誤蒙開納即詔頒其法于四方而臣熹又以使事適獲奉承仰戴皇仁頓首幸甚因竊惟念里社有倉實陏唐遺法往歲里中妄意此舉所以收恤隱民者蓋偶合其微指顧以國家未定著令是以不能逺及且懼其弗克久今乃得蒙上恩遍下郡國將遂得與闔宇之間含生之類均𬒳仁聖之澤于無窮固已不勝大幸而荒陬下里斗升之積又得上為明詔之所稱揚下為四方之所取則抑又有榮耀焉故敢具刻尚書戶部所𬒳敕命下浙東提舉常平司者厝于故里本倉聽事而記其説如此俾千萬年含哺鼓腹之禱有以無忘帝力之所自云淳熙九年四月丙辰宣教郎直祕閣提舉兩浙東路常平茶鹽公事借緋臣朱熹拜手稽首謹言勸立社倉榜當司恭奉聖旨建立社倉巳行印榜遍下𬋩內州縣勸諭尋據紹興府會稽縣鄉官新嘉興主簿諸葛修職名千能狀乞請官米置倉給貸而致政張承務名宗文新台州司戶王迪功名若水衢州龍遊縣袁承節名起豫等又乞各出本家米榖置倉給貸當司契勘前件官員心存惻怛惠及鄉閭出力輸財有足嘉尚除巳遵依所降指揮具由朝廷外須至再行勸勉量出米榖恭稟聖旨建立社倉庶幾益廣朝廷發政施仁之意有以養成閭里睦姻任恤之風再此勸諭各請知委九年六月八日約束侵占田業榜本司簽廳申照對本司見行下諸縣根刷沒官田産有下項事件申乞指揮須至曉示一今來根刷諸司沒官戶絶等田産并新漲海塗溪漲淤成田地等多是豪勢等第并官戶公吏等人不曽經官請佃擅收侵占暗收花利不納官租其間雖有經官請佃止量立些少租課計囑主行人吏又且不曽催納入常平倉上下蒙庇官司無緣得知今出榜遍于縣鎮鄉村張挂曉示限一月經官陳首與免罪從公紐立租課就行給佃更與免追日前冒占花利如犯人尚敢恃其豪勢仍前坐占限滿不首如官司覺察得知或因諸色人告首定當送所司根究從條斷罪追日前花利入官仍盡給告人租佃一諸司沒官田産多是本縣公吏與有蔭人詭名請佃或與出名人分受花利上下蒙庇不曽納租如此積弊何緣覺察今來出榜曉示諸色人如有似此之人仰經官陳首當與將所首出田産不拘多寡盡給告人租契如詭名人并出名人能在一月內赴官首説當與免罪從公紐立租課就令租賃仍免追日前花利如限滿不首𬒳人陳告或官司覺察得知當送所司根勘依條施行約束不得搔擾保正等榜當職照對在法保正副𬋩幹鄉村盜賊鬪毆煙火橋道公事大保長催納稅租及隨租所納錢數一稅一替今來訪聞𬋩下諸縣縣官不能仰體成法妄有科擾致見一經役次家産遂空深屬利害今有約束事件下項一保正𬋩幹鄉村盜賊煙火橋道公事委是繁重今一縣之內有令有丞有簿有尉號為四衙雜出文引别置木牌各立程限盡令趂赴申展繳押需索百出多創名色立為定例分文不可違少如押到則有到頭錢繳引則有繳跋錢展限錢定限常限所用之錢復有多寡又有批朱縫印日齪之類一引狀之出乞取動是數項稍有稽違則枷錮箠楚無所不至且以保正一身豈能遍受諸衙督責一追催二稅非保正副之責今來縣道盡以文引勒令拘催其間有頑慢不肯輸納之人又有無著落稅賦往往迫以期限不堪杖責勒令填納無所赴訴豈有既充重役復兼催科可謂重困一保正副最為重役豈堪復有科擾今來縣道略不加恤應干敷買物件必巧作名目公然出引令保正副買辦如修造廨舍迎送官員整葺祠宇置造軍器似此之類其名不一竹木瓦磚油添麻苧等物例以和買為名不曽支給分文又如役使工匠科差人夫勒出錢米陪備供輸椎剝肌髓至此為甚一縣官或遇檢驗定奪打量體究等事下鄉多是過數將帶當直雖公吏輩亦用轎乘排備酒饌需索錢物動是取辦保正亦有本官喫食令保正供買及所經過都分雖無公事干涉例有過鄉錢過水錢其為搔擾非止一端一訪聞縣道差募保正拘催二稅自承認之日便先期借絹借米硬令空作人戶姓名投納在官曽未旬月分限完較或三五日一次或五六日一次人吏鄉司皆有常例需索稍不如數雖所催分數已及却計較毫釐將多為少未免箠楚一月之內盡是趂赴比較之日即不曽得在鄉催稅及至催納次第則又别出一簿謂之剗簿增添改易不可稽考有坍溪落江逃亡死絶有名無實之稅縣道不與勘會著實臨期動是勒令填納以至典賣屋業無可填備一次充應催稅至有三四年者雖所欠尺寸升合些少官物亦行綰繫無能得脫百姓受此抑勒破蕩之苦而縣道恬不加恤委是無辜右鏤榜示所𬋩鄉分鄉村市鎮張挂其縣道于前件約束事件如有違戾許保正副催科保長徑赴本司陳訴切待追究著實即行按奏公吏依法重行斷治施行淳熙九年八月日榜減半賞格榜浙東提舉常平司二月二十五日凖尚書省劄子備提舉司奏今歲災傷條畫賑恤事件數內一項去歲上戶别納糶濟之人近己蒙聖旨輔受官資無不感戴然去歲蒙降減半指揮止于紹興一府施行今歲一路皆荒事醴不同今檢會當年耿延年所乞事理許于浙東一路通行奉聖旨令吏部檢坐乾道七年八月一日賞格節次指揮行下浙東州縣勸諭富室上戶賑濟賑糶應格之人保明推賞如後來檢踏得災傷最重處許提舉司開具保明申尚書省取旨與依減半指揮施行劄付本司須至曉諭右當司除巳恭依聖旨指揮行下諸州縣勸諭外今印榜曉示富室上戶仰體朝廷恤民之意廣出米穀以拊鄉閭有欲依募之家先赴本司自陳切待摽撥就比近災傷最重州縣入納即為保明申奏朝廷乞輔官資應得上件減半指揮不致有胥吏阻抑故榜九月七日約束糶米及劫掠榜照對𬋩下州縣中夏以來久不得雨髙低早禾多有旱損切慮人民不安理合存恤曉諭一州縣目今米價髙貴止緣早禾旱傷其中晚之田自有得雨足可灌溉成熟去處兼當司巳蒙朝廷給降本錢及取撥别色官錢見今廣招廣南福建浙西等處客販般運米斛到來投糶凖備闕米州縣般運前去出糶切恐有米積蓄上戶與停塌之家未知前項事因以謂旱損少米意圖邀求厚利閉糴不糶此項除巳牒諸州府請速行遍下屬縣勸諭有米積蓄上戶停塌之家趂此米榖未登之際各依時價自行出糶應副細民食用如敢輒有違戾切待根究重行斷遣如是向去民間大假艱食切待别行申奏朝廷乞更多撥錢米前來濟糶一州縣火客佃戶耕作主家田土用力為多全仰主家借貸應副今來旱損其田主自當優恤賙給存養無令失所訪聞多有坐視火客佃戶狼狽失業恬不介意切恐因而失所却致無人布種荒廢田畝此頃除巳牒諸州府請遍行下諸縣勸諭應有田之家請以田客平日耕布勤勞為念常加優恤應副存養勿令失業云云一州縣旱傷去處慮有無知村民不務農業專事扇惑聚衆輒以借貸為名于村曈之間廣張聲勢亂行逼脅以至劫掠居民財物米穀此項當司檢凖律強盜不得財徒二年一匹徒三年二匹加一等十匹及傷人者絞殺人者斬其持杖者雖不得財流三千里五匹絞傷人者斬今來切慮愚民不曉條法誤犯刑名深可憐憫除巳牒諸州府請遍下諸縣曉諭民戶知委各自安業勿致扇惑輕犯典憲後悔無及右今鏤榜曉諭民戶知悉故榜再放苗米分數榜契勘本路今年旱傷檢放苗米多有不實去處曽具奏請今來當職詢訪不實最多未欲按劾施行今來到任巳是深冬難以檢勘須至别行措置將諸州縣人戶災傷苗米等第更行蠲放除巳奏聞及申尚書省外須至曉諭右今將本路州縣人戶苗米元檢放五分巳上鄉分全戶五斗巳下全放元檢放四分以上鄉分全戶四斗以下全放元檢放三分以上鄉分全戶三斗以下全放元檢放二分以上鄉分全戶二斗以下全放元檢放一分以上鄉分全戶一斗以下全放其紹興府人戶須有丁之家方得蠲放其湖田米亦依例蠲放施行今印榜曉示人戶知委如州縣再行催理仰經本司陳訴切待追究按劾施行約束檢旱照對今歲適當旱歉州縣合差官遍往鄉村檢視每見差出官員多是過數將帶人從反行須索搔動村落以納圖册為名不論人戶髙低每畝科配頃畝頭性之類又不親行田畝從實檢校反將訴荒人戶非理監繫勒令服熟殊失救荒恤民之意今來當職斟酌每官一員止得帶􅈦子一名吏貼一人當直八名仰從本州縣陳乞計日給錢米各自賫行並不許分毫搔擾保正副及大小保長須親行田畝從實檢放如有違戾許人戶徑到本司陳訴切待追治施行浙東客次榜熹叨𬒳臨遣專以刺舉為職自惟昧陋雖不足以盡知官吏之賢否然既尸其任不敢不悉心詢究故自到任以來凡所論薦皆必稽諸公論考其事實然後剡奏不敢徇私容情以自陷于罔上之誅凡我同寮亦望究心職事律巳愛民以待考察不必投書獻啓自陳腳色挾持勢援宛轉請求徒失所以自重之道而反貽絀辱之羞也或恐實有賢哲之士潛晦不耀而熹之愚不足以知之則却望相與推揚具以見教熹敢不承命加察焉除秦檜祠移文竊見故相秦檜歸自虜庭久專國柄內忍事讐之恥外張震主之威以恣睢戮善良銷沮人心忠義剛直之氣以喜怒為進退崇奬天下佞諛偷惰之風究其設心何止誤國嶽侯既死于棘寺魏公復竄于嶺隅連逮趙汾之獄蓋將掩衆正而盡誅徘徊漢鼎之旁已聞圖九錫而來獻天不誅檜誰其弱秦今中外之有識猶皆憤惋而不平而朝廷于其家亦且擯絶而不用况永嘉號禮義之地學校實風化之源尚使有祠無乃未講雖捐田以示濡沫恐出市恩然設像以厠英賢何以為訓晦庵先生朱文公文集卷第九十九候官縣儒學訓導劉簪校
