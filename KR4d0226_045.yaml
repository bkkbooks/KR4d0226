body:
  text: 答虞士朋太中易有太極是生兩儀者一理之判始生一竒一偶而爲一畫者二也兩儀生四象者兩儀之上各生一竒一偶而爲二畫者四也四象生八卦者四象之上各生一竒一偶而爲三畫者八也爻之所以有竒有偶卦之所以三畫而成者以此而巳是皆自然流出不假安排聖人又巳分明說破亦不待更著言語别立議論而後明也此乃易學綱領開卷第一義然古今未見有識之者至康節先生始傳先天之學而得其說且以此爲伏羲氏之易也說卦天地定位一章先天圖乾一兊二離三震四巽五坎六艮七坤八之序皆本於此若自八卦之上又放此而生之至于六畫則八卦相重而成六十四卦矣六十四卦之上又放此而生之至十二畫則六十四卦相重而成四千九十六卦矣焦貢易林是也剛柔雖若各有所偏必相錯而後得中然在乾坤二卦之全體當剛而剛當柔而柔則不待相錯而不害其爲全矣其爻位之無過不及者如乾坤之二五亦不待相錯而不害其爲中矣隂陽變化而太極之妙無不在焉於此蓋可見也今謂乾剛坤柔便有所偏恐於二卦之彖及二五之爻詞有不通者其論四爻過不及之淺深則爲精宻非它說之所及矣用九用六當從歐陽公說爲揲蓍變卦之凡例蓋陽爻百九十二皆用九而不用七隂爻百九十二皆用六而不用八也特以乾坤二卦純陽純隂而居篇首故就此發之此歐陽公舊說也而愚又嘗因其說而推之竊以爲凡得乾而六爻純九得坤而六爻純六者皆當直就此例占其所繋之辭不必更㸔所變之卦左傳蔡墨所謂乾之坤曰見羣龍无首者可以見其一隅也蓋羣龍无首即坤之牝馬先迷也利永貞即乾之不言所利也學而首章甚善但學之一字實兼致知力行而言不可偏舉今所引顔子功夫乃專爲力行事耳二章所謂不失其愛敬之本心則仁不可勝用者甚善但有子亦據實理而正言之非曲爲當世而發也巧言令色求以恱人則失其本心之徳矣不待利巳害人然後爲不仁也三年無改乃謝氏之說其意美矣然恐過之不若游氏尹氏之爲實也無謟無驕一章文義東坡得之蓋無謟無驕隨事知戒足以自守矣然未見其於全體用功而有自得處也樂與好禮乃見其心之所存有非貧富之所能累者此子貢所以有切磋琢磨之譬也治骨角者旣切而復磋之治玉石者旣琢而復磨之皆先畧而後詳先粗而後精之意大學乃斷章取義不必引以爲說也如愚之說爲不知之說焉得知之說觀過之說皆恐失之過高後亦多類此者詳其意味似從張無垢議論中來其爲得失非但訓詁文義之間而巳此湏異日子細商量今未敢容易說也一以貫之乃聖門末後親傳宻㫖其所以提綱挈領統宗㑹元蓋有不可容言之妙當時曽子黙契其意故因門人之問便著忠恕二字形容岀來則其一本萬殊脉絡流通之實益可見矣然自秦漢以來儒者皆不能暁直至二程先生始發明之而其門人又獨謝氏侯氏爲得其說今不考焉而但以忘物我者爲言吾恐其失之逺也况夫子以此語告子貢乃因博學多識而發其與忘物我者又有何關渉耶答虞士朋昨承寄示趙倉易論語說足浣愁疾易說簡易精宻不惟鄙意多所未及警發之深而近世諸儒說不到處亦甚多甚不易其玩索至此深恨未得一見靣扣其詳也但象數乃作易根本卜筮乃其用處之實而諸儒求之不得其要以至苛細繳繞今人厭聽今乃一向屏棄闊畧不復留意却恐不見制作綱領語意來歴以亦未甚便也昨於乾坤二卦畧記所疑之一二今謾録呈幸爲詳之試因話次以盛意扣之㸔有何說却以見報熹與之未相識不欲遽相辯難千萬不必云熹所說也論語說有意古人爲巳之學意亦甚正但覺㸔得張無垢文字太熟用意太切立說太高反致失却聖人本指處多今亦未欲遽論二說謾往并煩扣之亦勿云熹所寄也答游誠之九言示喻讀書玩理次第甚慰所懐但嚴立功程寛著意思乆之自當有味不可求欲速之功也所論日用功夫尤見其爲已之意但心一而巳所謂覺者亦心也今以覺求心以覺用心紛拏迫切恐其爲病不但揠苗而巳不若日用之間以敬爲主而勿忘焉則自然本心不昧隨物感通不待致覺而無不覺矣故孔子只言克巳復禮而不言致覺用敬孟子只言操存舎亡而不言覺存昧亡謝先生雖喜以覺言仁然亦曰心有知覺而不言知覺此心也請推此以驗之所論得失自可見矣若以名義言之則仁自是愛之體覺自是知之用界分脉絡自不相關但仁統四徳故人仁則無不覺耳然謝子之言侯子非之曰謂不仁者無所知覺則可便以心有知覺爲仁則不可此言亦有味請試思之克齋記近復改定今别寫去後靣不欲深詆近世之失波動危迫等語皆巳削去但前所論性情脉絡功夫次第自亦可見底裏不待盡言而後喻也因見南軒試更以此意質之當有以相發明爾答游誠之仁覺之說前書巳詳報矣此書所喻惻隱似非出於覺者此語甚佳但所謂覺之一字未必不佳者鄙意亦非以覺爲不佳但謂功夫用力處在敬而不在覺耳土蔡云敬是常惺惺法此言得之但不免有便以惺惺爲仁之意此則未穩當耳所喻從前馳騖之過此非明者不能自知甚善然既自知之則亦自改之而巳它人不得而與也窮理涵養要當並進蓋非稍有所知無以致涵養之功非深有所存無以盡義理之奥正當交相爲用而各致其功耳答游誠之心體固本静然亦不能不動其用固本善然亦能流而入於不善夫其動而流於不善者固不可謂心體之本然然亦不可不謂之心也但其誘於物而然耳故先聖只說操則存存則静而其動也無不善矣舎則亡於是乎有動而流於不善者出入無時莫知其郷出者下也入者存也本無一定之時亦無一定之處特係於人之操舍如何耳只此四句說得心之體用始終眞妄邪正無所不備又見得此心不操即舎不出即入别無閑處可安頓之意若如所論出入有時者爲心之正然則孔子所謂出入無時者乃心之病矣不應却以惟心之謂與一句直指而總結之也所答石吕二書寫呈但子約書中語尚有病當時不暇子細剖析明者擇焉可也答吳伯起成都之諾乃爾輕發可恠然亦在我者有以致之但當自省不當責人也渠近辟韜仲不下次第愈縮手矣趙總卿頃得書甚相念不知所許竟如何然吾之所謂義者無窮而彼之具析體究對移者有盡但十二時中常切照管勿令有滲漏處則彼之來者不足問矣今人戚戚不能信命者固無足道然謂付之造物亦非極摰之語此處儘要見得分明便不動心不可只靠一言半句海上單方便以爲足恐事變之來抵當不去恐成好笑也答呉伯起且審聞善感發判然義利之間衰懦之餘警省多矣然一時意氣易得消歇正要朝夕講求義理以培植之不可專恃此便爲究竟也答歐陽慶似光祖頃在里中雖屢獲見而常苦匆匆不及盡所欲言然巳固知所志之不凡矣今辱惠問乃慨然有志於學甚善甚善抑嘗病今之學者不知古人爲巳之意不以讀書治巳爲先而急於聞道是以文勝其質言浮於行而終不知所底止方竊以是反而求之而未之有得也愧辱下問之勤無以稱塞敢私布之不識明者謂之然否答歐陽慶似所需序文迫歲冗甚不暇執筆然爲學治巳之方前此講之熟矣當官之務推此而逹之則奉法愛民不求聞逹皆吾分内事耳此固不待拙者之言又況其外之文乎吕氏童䝉訓下卷論守官之法亦頗明備暇日更試考之當有益也答嚴居厚士敦示喻進學加功處甚善觸事未能不爲事物所奪只是未遇事時存養未熟所以如此然又别無他岐不可欲速但常存此心勿令間斷講明義理以栽培之則乆當純熟明快矣科舉之習前賢所不免但循理安命不追時好則心地恬愉自無怵迫之累昨見所論三子具體而微似未免太狥時好然務爲竒險反使詞義俱不通暢乆欲奉告而未及也因此布陳僭易僭易别𥿄喻及養氣之說足見講學不倦之意但此章文義正自難明且當虚心平氣反復諷誦乆當有味今以迫切之心求之正猶治絲而棼之雖欲彊爲之說終非吾心所安穿鑿支離愈叛於道矣今且據來喻而畧言之縮字訓直禮書如此處多先儒之言似不可易壹字非訓一便只是一字乃專一之意耳記得程先生有說志專在淫僻豈不動氣氣專在喜怒豈不動志試以是思之知言則知義理之所在無毫釐之差故日用之間有以集義而生浩然之氣詖淫邪遁四字有次序而無彼此之分如楊墨釋老之言無不具此四者然今亦未易遽論也請且如前說反復玩味要之以乆自當釋然有解悟處不必廣求徒勞日力只二先生有說處抄出同㸔可也答丘子野示喻觀玩之别想巳有成說兹因下問之及嘗竊思之敢布左右蓋易有象八卦六爻然後有辭卦爻之辭筮有變老隂老陽然後有占變爻之辭象之變也在理而未形於事者也辭則各因象而指其吉凶占則又因吾之所值之辭而决焉其示人也益以詳矣故君子居而學易則旣觀象矣又玩辭以考其所處之當否動而諏筮則旣觀變矣又玩占以考其所值之吉凶善而吉者則行否而凶者則止是以動静之間舉無違理而自天祐之吉無不利也蓋觀者一見而决玩者反復而不舎之辭也筮短龜長之說惟見於左氏元凱之注理固有之但先王制卜筮之法至嚴至敬虚其心以聽於鬼神專一則應疑貳則差故禮曰卜筮不相襲盖爲此也晉獻之欲立麗姬以理觀之不待卜而不吉可知及其卜之不吉也則亦深切著明巳矣乃不勝其私意而復筮之是以私心爲主而取必於神明也豈有感通之理哉此所以筮之雖吉而卒不免於凶也今不推其所以聴於鬼神者之不專不一而遽欲即此以校龜筮之短長恐未免乎易其言之責也理則一而巳矣其形者則謂之器其不形者則謂之道然而道非器不形器非道不立蓋隂陽亦器也而所以隂陽者道也是以一隂一陽徃來不息而聖人指是以明道之全體也此一隂一陽之謂道之說也不審高明以爲然否答丘子服膺寵辱若驚貴大患若身貴猶重也言寵辱細故而得之猶若驚焉若世之大患則尤當貴重之而不可犯如愛其身也寵爲下者寵人者上於人者也寵於人者下於人者也是辱固不待言而寵亦未足尚今乃得之而猶若驚而况大患與身爲一而可以不貴乎若使人於大患皆若其將及於身而貴重之則必不敢輕以其身深預天下之事矣得如是之人而以天下托之則其於天下必能謹守如愛其身而豈有禍敗之及哉老子言道之眞以治身又言身與名孰親而其言外其身後其身者其實乃所以先而存之也其愛身也至矣此其學之傳所以流而爲楊氏之爲我也蘇子由乃以忘身爲言是乃佛家夣幻泡影之遺意而非老氏之本眞矣答丘子服兩日連得手示爲慰貴大患如此說固好但後一貴字别爲一義似未安耳出生入死章諸家說皆不愜人意恐未必得老子本指今只自夫何故以下㸔則語意自分明蓋言人所以自生而趨死者以其生生之厚耳聲色臭味居處奉養權勢利欲皆所以生之者惟於此太厚所以物得而害之善攝生者逺離此累則無死地矣此却只是目前日用事便可受持他既難明似亦不必深究也如何如何答李深卿泳昨擇之持示别𥿄教告甚悉時亦不暇奉報然因其行嘗口附區區不知高明以爲然否夫儒釋正邪之異未易以口舌爭但見得分明則觸事可辨今未暇逺引且以來教所舉中庸首章論之則吾之所謂一者彼以爲二吾之所謂實者彼以爲虚其邪正得失於此巳判然矣然世之學者於吾學𥘉未嘗端的用功而於彼說顧嘗著力研究是以於彼說日見其高妙而視吾學爲不足爲䧟溺益深則遂不復自知其爲䧟溺是雖以孟子之辨守而告之恐未易㧞而况今日才卑徳薄之人乎然有一於此疑若可捄蓋天理人心自有至當我順彼逆體勢不侔是以爲吾學者深拒力排未嘗求合於彼而爲彼學者支辭蔓說惟恐其見絶於我是於其心疑亦有所不安矣誠如是也則莫若試於吾學求其所以用力者如徃時之一意於彼而從事焉假以歲時不使間斷則庶乎其可以得本心之正而悟前日之非矣所論不當啓後學輕視前軰之弊此則至論敢不承教然觀聖賢議論雖未嘗不推尊前軰而其是是非非之際亦未嘗有毫髪假借之私若孟子之論伊尹夷惠抑揚其辭不一而足亦可見矣若吕氏之學在近世則亦近正矣然觀正獻對神祖空寂之問則以尭舜所知所急爲兩途觀原明述正獻學佛之事則見正獻所學所言爲二致諸若此類不可殫舉蓋猶未免於習俗之蔽而以前軰之故一例推尊禁不得復議其失是孔子不當論臧文仲之不仁不智且當直許子文文子以仁然後爲可也擇之講論精宻務求至當似未爲過但其間却實不免有輕視前軰之心此則不可去年因書蓋嘗箴之正如老兄之意但不敢謂縁此都不得别白是非也凡此二條皆近世學者深錮之弊是以因來喻之及而極論之願試以愚言思之一事正則其餘皆正矣蓋理無二致非如老兄所論中庸首章三句别爲兩事與吕氏所知所急所學所言有彼此之殊也鄙見如此或有未當因來却望見教勿憚反復不有益於彼則必有益於此矣千萬至懇至懇答胡寛夫示喻疑義數條足見别後進學之篤甚慰甚慰大槩知此㸔更湏從淺近平易處理㑹應用切身處體察漸次接續勿令間斷乆之自然意味浹洽倫類貫通切不可容易躁急厭常喜新專㨂一等難理㑹無形影底言語暗中想像杜撰穿鑿枉用心神空費日力更勿與人辨論釋氏長短自家未有所見判斷它不得况廢却自家合做底緊切工夫却與人争一場閑口舌有損無益尤當深戒也主一之功學者用力切要處承於此留意甚善但其它推說似太汗漫多病痛以熹觀之似不必如此只就如今做書㑹處理㑹便見漸次大抵自家所㸔文字及提督學生工夫皆湏立下一定格目格目之内常切存心格目之外不要妄想如㸔論語今日㸔到此叚即專心致意只㸔此叚後叚雖好且未要㸔直待此叚分暁說得反復不差仍且盡日玩味明日却㸔後叚日用凡事皆如此以類推之可見不然雖是好事亦名妄想此主一之漸也若不如此方寸之間頃刻之際千頭萬緒卒然便要主一如何按伏得下試更思之我不欲人之加諸我吾亦欲無加諸人與子思所謂施諸巳而不願亦勿施於人此言且只各就本句中體味踐履乆之純熟自見淺深今亦不須彊分别也大抵學者之患在於好談高妙而自巳脚根却不點地正所謂道在邇而求諸逺事在易而求諸難也大學解想亦㸔未到四哥又自有日課不欲妨它教人者湏常存此心郭子和中庸頃曾見之切不可㸔㸔著轉迷悶也其它所欲文字合用者前巳附去其他非所急者更不上内想自暁此意千萬息却此心且就日課中逐些理㑹慤實踐履方有意味千萬千萬後生軰誦書亦如吾人講學只是量力不要貪多仍湏反履熟讀時時温習是要法耳答吳徳夫獵承喻仁字之說足見用力之深熹意不欲如此坐談但直以孔子程子所示求仁之方擇其一二切於吾身者篤志而力行之於動静語黙間勿令間斷則乆乆自當知味矣去人欲存天理且據所見去之存之功夫旣深則所謂似天理而實人欲者次第可見今大體未正而便欲察及細微恐有放飯流啜而問無齒決之譏也如何如何易之爲義乃指流行變易之體而言此體生生元無間斷但其間一動一静相爲始終耳程子曰上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神正謂此也此體在人則心是巳其理則所謂性其用則所謂情其動静則所謂未發巳發之時也此其爲天人之分雖殊然静而此理巳具動而此用實行則其爲易一也若其所具之理所行之用合而言之則是易之有太極者昨來南軒嘗謂太極所以明動静之藴蓋得之矣來喻以不易變易爲未發巳發恐未安試以此說推之非惟見得易字意義分明而求仁用力要處亦可得矣答楊子直方承喻太極之說足見用力之勤深所歎仰然鄙意多所未安今且畧論其一二大者而其曲折則託季通言之蓋天地之間只有動静兩端循環不巳更無餘事此之謂易而其動其静則必有所以動静之理焉是則所謂太極者也聖人旣指其實而名之周子又爲之圖以象之其所以發明表著可謂無餘藴矣原極之所以得名蓋取樞極之義聖人謂之太極者所以指夫天地萬物之根也周子因之而又謂之無極者所以著夫無聲無臭之妙也然曰無極而太極太極本無極則非無極之後别生太極而太極之上先有無極也又曰五行隂陽隂陽太極則非太極之後别生二五而二五之上先有太極也以至於成男成女化生萬物而無極之妙蓋未始不在是焉此一圖之綱領大易之遺意與老子所謂物生於有有生於無而以造化爲眞有始終者正南北矣來喻乃欲一之所以於此圖之說多所乖礙而不得其理也熹向以太極爲體動静爲用其言固有病後巳改之曰太極者本然之妙也動静者所乗之機也此則庶幾近之來喻疑於體用之云甚當但所以疑之之說則與熹之所以改之之意又若不相似然蓋謂太極含動静則可以本體而言也謂太極有動静則可以流行而言也若謂太極便是動静則是形而上下者不可分而易有太極之言亦贅矣其它則季通論之巳極精詳且當就此虚心求之乆當自明不可别生疑慮徒自繳繞也持敬之說不必多言但熟味整齊嚴肅嚴威儼恪動容貌整思慮正衣冠尊瞻視此等數語而實加功焉則所謂直内所謂主一自然不費安排而身心肅然表裏如一矣豈陸棠之謂哉彼其挾詐欺人是乃敬之賊耳今反以敬之名歸之而謂敬之實眞有不足行者豈不誤甚矣哉大抵身心内外𥘉無間隔所謂心者固主乎内而凡視聽言動出處語黙之見於外者亦即此心之用而未嘗離也今於其空虚不用之處則操而存之於其流行運用之實則棄而不省此於心之全體雖得其半而失其半矣然其所得之半又必待有所安排布置然後能存故存則有揠苗助長之患否則有舎而不芸之失是則其所得之半又將不足以自存而失之孰若一主於敬而此心卓然内外動静之間無一毫之隙一息之停哉叔京來書尚執前說而來喻之云亦似未見内外無間之實故爲此說并以寄叔京而所以答叔京者亦并寫呈幸詳思之却以見告也答楊子直來書譙責不少置不記前書云何何所得罪一味皇恐而已但來書旣云鐫責諄切其後又謂不教而棄之殊不可暁如前書尚在望令小吏録以見寄當一一供答以聽裁處熹却自覺尚且耐煩不至如老兄激發怨懟之深也且如向來出川時所予書無非怨懟之語此非怨熹之詞想自記得故竊疑之以爲士君子去就離合之際不當如此因答書中頗致寛解之詞未有相貶外處如後來見教政事條目其間亦有一二心未安處故因筆自解即非相貶外不知今來所謂貶外是指何語恐實有之而熹不自覺者即望一二䟽示容其改過幸甚幸甚且如今書四子之說極荷見教然此書之目只是一時偶見大學太薄装不成冊難作標題故如此寫亦欲見得四書次第免𬒳後人移易顚倒只如大學據程先生說乃是孔氏遺書而謂其他莫如論孟則其尊之固在論語之右非熹之私說矣今必欲抑之而尊論語復何說乎竊恐此意未必爲大學壓論語發恐又只是景迂作祟意欲擯斥孟子耳萬一揣料失當所言非是亦告且爲平心息怒子細見教使得反復以究實是之歸幸甚幸甚平時與老兄講論常是不曾合殺只𬒳中間一句不合尊意便䝉見怒更不暇復論前語之是非而一向且争閑氣所以老兄見教之美意與區區獻疑之誠懇皆不見其有益而反積爲後日無窮之怨隙所謂忠告善道不可則止者豈若是乎世衰道䘮吾黨日孤見自無事不要似此㝷事厮炒使旁觀指目益爲道學之病乃是助彼自攻古人所謂將鬭而自㫁一手以求必勝者也願老兄自今或有異同之論且耐煩息怒而極論理之是非則理日益明氣日益和雖使十反極其紛拏亦自無忿懟之撓矣老兄見責不能受人盡言而前後怨忿之詞至於如此請出兩家之書付之識者使其審訂則誰爲不能受言者必有在矣王肅方於事上而好人佞巳此不絜矩之過也願更思之下交淺劣不勝至望答楊子直學者墮在語言心實無得固爲大病然於語言中罕見有究竟得徹頭徹尾者蓋資質巳是不及古人而工夫又草草所以終身於此若存若亡未有卓然可侍之實近因病後不敢極力讀書閑中却覺有進歩處大抵孟子所論求其放心是要訣爾答楊子直前日晦伯人還巳上狀矣但忘記一事欲煩爲作小楷四箴百十字今納界行去暇日得爲揮染甚幸此箴舊見只是平常說話近乃覺其㫖意之精宻真所謂一捧一條痕一摑一掌血者故欲掲之座隅使不失墜云耳時節不是當字學亦絶故又欲得妙札時以寓目以祛病思幸勿靳也答楊子直此庚申閏二月二十七日書去夣奠十二日熹病日覺沉重而醫者咸以爲可治但服藥殊不見効亦付之無可奈何安坐拱手以聴天命耳曽光祖在此備見當能道之也此間諸况曲折亦不暇詳布渠亦可問也前書所求妙札曽爲落筆否便中早得寄示爲幸近以書懇益公求作先人墓碑不知渠肯作否若肯作又并書即不敢奉凂不然又當有請也夏小正文巳編入禮書但所見數本率多舛誤所示未暇參考少俟功夫子細校畢即納還也四民月令亦見當時風俗及其治家齊整即以嚴致平之意推㝷也亦俟抄了并納還不知近日更得何異書便中望見告此却亦讀得舊書但鍜錬得愈純熟亦頗有實用不專是空言也此間新定參同契曽寄去否如未有可喻及當續致也此書理㑹他下手處不得但愛其文古雅因校此本買櫝還珠甚可笑也光祖家有泉石頗佳已屬令去求詩能爲出數語否王才臣寄示所得諸圖幽閒淡泊彼間風俗嗜好不同未必識此味也答吕季克承示及環叟之書粗釋所疑此公舊亦聞之平父伯崇皆與之相識然不聞其爲濂溪家子弟也其所著書乃如此若原說者則可謂青過於藍矣道學不明異端競起士雖有意於學而浮沉世故不能篤信聖言躬行黙體以至不疑之地鮮有不没溺者甚可歎也八桂乆不得書昨亦見其所與尊兄書論原說者大意甚正但似未究其巧譎之情耳答廖子晦徳明徳明舊嘗極力㝷究於日用事上若有所感而知吾身之具有者廣大虚静範圍天地根本萬物易所謂寂然不動中庸所謂喜怒之未發者是也徳明將以此爲大本漸加修治之功未知所見是否聖門之學下學而上逹至於窮神知化亦不過徳盛仁熟而自至耳若如釋氏理湏頓悟不假漸脩之云則是上逹而下學也其與聖學亦不同矣而近世學者毎欲因其近似而說合之是以爲說雖詳用心雖苦而卒不近也中庸所謂喜怒哀樂之未發謂之中發而皆中節謂之和只是說情之未發無所偏倚當此之時萬理畢具而天下萬物無不由是而出焉故學者於此涵養栽培而情之所發自然無不中節耳故又曰中者天下之大本和者天下之逹道此皆日用分明底事不必待極力㝷究忽然有感如來喻之云然後爲得也必若此云則是溺於佛氏之學而巳然爲彼學者自謂有見而於四端五典良知良能天理人心之實然而不可易者皆未嘗畧見彷彿甚者披根拔本顚倒錯繆無所不至則夫所謂見者殆亦用心大過意慮泯絶恍惚之間瞥見心性之影象耳與聖門眞實知見端的踐履徹上徹下一以貫之之學豈可同年而語哉程子以敬教人自言主一之謂敬不之東又不之西不之此又不之彼如此則何時而不存然欲到得此功夫湏如釋氏攝心坐禪始得徳明又慮至此成正與助長故近日又稍體究禮樂不可斯湏去身之說蓋禮則嚴謹樂則和樂兩者相須而後能故明道先生旣以敬教人又自謂於外事思慮儘悠悠又曰旣得後便湏放開不然却只是守故謝子因之爲展托之論徳明又恐𥘉學勢湏把持未敢便習展托於斯二者孰從孰違雖然是固操存舎亡之意而孔氏教人求仁爲先竊謂仁人心也克已之私而循天之理則本心之仁得矣夫復何事嘗試求之覺得難甚先難後獲寜不信然二先生所論敬字湏該貫動静㸔方得夫方其無事而存主不懈者固敬也及其應物而酬酢不亂者亦敬也故曰母不敬儼若思又曰事思敬執事敬豈必以攝心坐禪而謂之敬哉禮樂固必相須然所謂樂者亦不過謂胷中無事而自和樂耳非是著意放開一路而欲其和樂也然欲胷中無事非敬不能故程子曰敬則自然和樂而周子亦以爲禮先而樂後此可見也旣得後湏放開不然却只是守者此言旣自得之後則自然心與理㑹不爲禮法所拘而自中節也若未能如此則是未有所自得纔方是守禮法之人爾亦非謂旣自得之又却湏放教開也克巳復禮固非易事然顔子用力乃在於視聽言動禮與非禮之間未敢便道是得其本心而了無一事也此其所以先難而後獲歟今言之甚易而苦其行之之難亦不考諸此而巳矣明道先生云鳶飛戾天魚躍于淵言其上下察也與必有事焉而勿正心同徳明竊謂萬物在吾性分中如鑑中之影仰天而見鳶飛俯淵而見魚躍上下之見無非道體之所在也方其有事而勿正之時必有參乎其前而不可致詰者鳶飛魚躍皆其分内耳活潑潑地智者當自知之鳶飛魚躍道體無乎不在當勿忘勿助之間天理流行正如是爾若謂萬物在吾性分中如鑑之影則性是一物物是一物以此照彼以彼入此也横渠先生所謂若謂萬象爲太虚中所見則物與虚不相資形自形性自性者正譏此爾夫子告子路曰未能事人焉能事鬼未知生焉知死意若曰知人之理則知鬼之理知生之理則知死之理存乎我者無二物也故正䝉謂聚亦吾體散亦吾體知死而不亡者可與言性矣竊謂死生鬼神之理斯言盡之君子之學汲汲修治澄其濁而求清者蓋欲不失其本心凝然而常存不爲造化隂陽所累如此則死生鬼神之理將一於我而天下之能事畢矣彼釋氏輪囬之說安足以語此盡愛親敬長貴貴尊賢之道則事鬼之心不外乎此矣知乾坤變化萬物受命之理則生之有死可得而推矣夫子之言固所以深暁子路然學不躐等於此亦可見矣近世說者多借先聖之言以文釋氏之㫖失其本意逺矣徳明伏讀先生太極圖解義第二章曰動而生陽誠之通也繼之者善萬物之所資始也静而生隂誠之復也成之者性萬物各正其性命也徳明謂無極之眞誠也動而生陽静而生隂動静不息而萬物繼此以出與因此而成者皆誠之著固無有不善者亦無非性也似不可分隂陽而爲辭如以資始爲繫於陽以正性命爲繫於隂則若有獨陽而生獨隂而成者矣詳究先生之意必謂陽根於隂隂根於陽隂陽元不相離如此則非得於言表者不能喻此也繼善成性分屬隂陽乃通書首章之意但熟讀之自可見矣蓋天地變化不爲無隂然物之未形則屬乎陽物正其性不爲無陽然形器巳定則屬乎隂嘗讀張忠定公語云公事未著字以前屬陽著字以後屬隂似亦窺見此意答廖子晦徳明平日鄙見未免以我爲主蓋天地人物統體只是一性生有此性死豈遽亡之夫水有所激與所礙則成漚正如二機闔闢不巳妙合而成人物夫水固水也漚亦不得不謂之水特其形則漚滅則還復是本水也人物之生雖一形具一性及氣散而滅還復統體是一而巳豈復分别是人是物之性所未瑩者正惟祭享一事推之未行若以爲果饗耶神不歆非類大有界限與統體還一之說不相似若曰饗與不饗蓋不必問但報本之道不得不然而詩書却明言神嗜飲食祖考來格之類則又極似有饗之者竊謂人雖死無知覺知覺之原仍在此以誠感彼以類應若謂盡無知覺之原只是一片太虚寂則似斷滅無復實然之理亦恐未安君子曰終小人曰死則智愚於此亦各不同故人不同於鳥獸草木愚不同於聖雖以爲分共道理然人湏全而歸之然後足以安吾之死不然則人何用求至賢聖何用與天地相似倒行逆施均於一死而不害其爲人是直與鳥獸禽魚俱壞懵不知其所存也死生之論向來奉荅所諭知生事人之問巳發其端而近答嵩卿書論之尤詳意明者一讀當巳洞然無疑矣而來書之諭尚復如此雖其連類引義若無津涯然㝷其大指則皆不出前此兩書所論之中也豈未嘗深以鄙說思之而直以舊聞爲主乎旣承不鄙又不得不有以奉報幸試思之蓋賢者之見所以不能無失者正坐以我爲主以覺爲性爾夫性者理而巳矣乾坤變化萬物受命雖所禀之在我然其理則非有我之所得私也所謂反身而誠蓋謂盡其所得乎巳之理則知天下萬物之理𥘉不外此非謂盡得我此知覺則衆人之知覺皆是此物也性只是理不可以聚散言其聚而生散而死者氣而巳矣所謂精神魂魄有知有覺者皆氣之所爲也故聚則有散則無若理則𥘉不爲聚散而有無也但有是理則有是氣苟氣聚乎此則其理亦命乎此耳不得以水漚比也鬼神便是精神魂魄程子所謂天地之功用造化之迹張子所謂二氣之良能皆非性之謂也故祭祀之禮以類而感以類而應若性則又豈有類之可言耶然氣之巳散者旣化而無有矣其根於理而日生者則固浩然而無窮也故上蔡謂我之精神即祖考之精神蓋謂此也然聖人之制祭祀也設主立尸􅌊蕭灌鬯或求之隂或求之陽無所不用其極而猶止曰庶或享之而巳其至誠惻怛精微恍揔之意蓋有聖人所不欲言者非可以世俗麤淺知見執一而求也豈曰一受其成形則此性遂爲吾有雖死而猶不㓕截然自爲一物藏乎寂然一體之中以俟夫子孫之求而時出以饗之耶必如此說則其界限之廣狹安頓之處所必有可指言者且自開闢以來積至于今其重併積疊計巳無地之可容矣是又安有此理耶且乾坤造化如大洪爐人物生生無少休息是乃所謂實然之理不憂其斷㓕也今乃以一片大虚寂目之而反認人物巳死之知覺謂之實然之理豈不誤哉又聖賢所謂歸全安死者亦曰無失其所受乎天之理則可以無愧而死耳非以爲實有一物可奉持而歸之然後吾之不斷不㓕者得以晏然安處乎冥漠之中也夭夀不貳脩身以俟之是乃無所爲而然者與異端爲生死事大無常迅速然後學者正不可同日而語今乃混而言之以彼之見爲此之說所以爲說愈多而愈不合也凡此皆亦粗舉其端其曲折則有非筆舌所能盡者幸併前兩說參考而熟思之其必有得矣若未能遽通即且置之姑即夫理之切近而平易者實下窮格工夫使其積累而貫通焉則於此自當暁解不必别作一道理求也但恐固守舊說不肯如此下工則拙者雖復多言終亦無所𥙷耳答廖子晦徳明自得賜誨日夕不去手紬繹玩味未能盡究亦嘗隨所知而爲之說蓋天人無二理本末無二致盡人道即天道亦盡得於末則本亦未離雖謂之聖人亦曰人倫之至而巳佛氏離人而言天岐本末而有所擇四端五常之有於性者以爲理障父子君臣夫婦長㓜所不能無者以爲縁合甚則以天地隂陽人物爲幻化未嘗或過而問焉而直語太虚之性夫天下無二理豈有天人本末輙生取舎而可以爲道乎夫其所見如此則亦偏小而不全矣豈所謂徹上徹下一以貫之之學哉聖門下學而上逹由灑掃應對進退而徃雖飲食男女無所不用其敬蓋君子之道費而隱費即日用也隱即天理也即日用而有天理則於君臣父子夫婦長㓜之間應對酬酢食息視聴之頃無一而非理者亦無一之可紊一有所紊天理䘮矣故君子無所不用其敬由是而操之固習之熟則隱顯混融内外合一而道在我矣佛者烏足以語是哉佛氏之所謂悟亦瞥見端倪而巳天理人心實然而不可易者則未嘗見也其所謂修亦攝心寂坐而巳棄人倫滅天理未見其有得也此先生所以謂其卒不近也喜怒哀樂之未發即寂然不動者是也即此爲天地之心即此爲天地之本天下無二本故乾坤變化萬類紛揉無不由是而出而形形生生各有天性此本末之所以不可分也得其靈而爲人而於四者之際淵然而虚静若不可以名言者而子思以其無所偏倚而謂之中孟子以其純粹而謂之善夫子即謂生生之體而言之以仁名不同而體一亦未嘗離於日用之間此先生所以謂其分明不待㝷究者也某昔者讀紛然不一之書而不得其要領泛觀乎天地隂陽人物鬼神而不能一在邇求逺未免有極力㝷究之過亦嘗聞於龜山先生之說曰未言盡心先湏理㑹心是何物若體得了然分明然後可以言盡某前日之說正坐是也然道無湏臾可離日用昭昭奚俟於㝷究此先生所爲丁寧開諭某敢不敬承至於鑑影之惑非先生之教幾殆也某昔者閒居黙坐見夫所謂充周而洞逹者萬物在其中各各呈露遂以鑑影之譬爲近故推之而爲鳶魚之說竊以爲似之先生以太虚萬象而闢其失某讀之乆始大悟其非若爾則鳶魚吾性分爲二物矣詳究先生之意蓋鳶魚之生必有所以爲鳶魚者此道體之所在也其飛其躍豈鳶魚之私蓋天理發越而不可巳也勿忘勿助長之間天理流行無纎毫之私正類是此明道先生所以謂之同某鄙見如此未知合於先生之意否乎其它死生鬼神之說湏俟靣求教誨來喻一一皆契鄙懷足見精敏固知前此心期之不謬也其間尚一二未合亦非大故屬此客中冗冗未及一二條對更願益加辨學之功所見當漸眞實也答廖子晦所論詩說先儒本謂周公制作時所定者爲正風雅其後以類附見者爲變風雅耳固不謂變者皆非美詩也大序之文亦有可疑處而小雅篇次尤多不可暁者此未易考但聖人之意使人法其善戒其悪此則炳如日星耳今亦不湏問其篇章次序事實是非之如何但玩味得聖人垂示勸戒之意則詩之用在我矣鄭衛之詩篇篇如此乃見其風俗之甚不美若止載一兩篇則人以爲是適然耳大抵聖人之心寛大平夷與今人小小見識遮前掩後底意思不同此語亦卒乍與人說不得且徐思之俟它日靣講也答廖子晦乾之四徳以貞配冬無可疑人之四徳以智配冬猶未瑩豈以一歲之功萬物之成畢見於此如智之明辨者乎智主含藏分别有知覺而無運用冬之象也以五常之道配五典之倫則仁行於父子義行於君臣禮行於長㓜智行於夫婦智所以别信行於朋友皆不易之定理中庸或問首章不以禮主長㓜智主夫婦何也豈以禮與智通行無間不當指定分配也歟智字分配似稍費力正不必如此牽合也一隂一陽之謂道其在人者不越仁義兩端而巳陽爲仁隂爲義自此推之四端竊謂禮亦陽徳仁之屬也智亦隂徳義之屬也如火木皆陽水金皆隂之類不識然否此叚無可疑者徳明讀先生詩傳極有感發始知詩眞可以興也所疑正變風雅巳荷開暁又見教讀書之說且云聖人之心寛大平夷與今人小小見識遮前掩後底意不同夫温柔敦厚寛大平夷固詩之教求諸緑衣終風柏舟考槃尤暁然可見但所謂小小見識遮前掩後者不知所主何意於詩何與豈只以所載刺詩有淫䙝不可告語者聖人亦存而不刪也耶所疑未得伏乞批誨鄙意𥘉亦正謂如此但寛大平夷亦舉大體而言不專指此一類也答廖子晦熹頓首再拜使至奉告欣審比日秋清尊履佳福熹此諸況巳具平父書中矣輕犯世禍非欲如此顧恐邂逅蹉跌亦非所能避耳要之惟是不出可以無事一行作吏便如此計較不得才渉計較囬互便是私意也劉家大哥聞甚知好學皆教導之力感不可言此衰拙之任而老兄當之其效又如此爲幸甚矣行期想有定論渠家叔姪意甚拳拳也問及學舎次第此間事旣隔手又生徒希少殊不成次第無可言者然亦未嘗不告之以窮理脩身之事但無縁朝夕與之親接又其間知爲巳求益者絶少故亦無以用其力耳論語集注巳移文兩縣并作書囑之矣今人得書不讀只要賣錢是何見識苦惱殺人奈何奈何余隱之所刋聞之巳乆亦未之見此等文字不成器將來亦自消滅不能管得也鄭台州竒禍可駭天意殊不可暁令人憂懼人還草此未暇它及惟千萬自愛不宣熹再拜上問慈闈安問日至作肅家事處置甚善示及疑義各以鄙見條析但宗法從來理㑹不分明此間又無文字檢閱恐只依鄭氏舊說亦自穩當也答廖子晦所論易傳無妄之說甚善但所謂雖無邪心而不合正理者實該動静而言不專爲莊敬持養此心旣存設也蓋如燕居獨處之時物有來感理所當應而此心頑然固執不動則此不動處便非正理又如應事接物處理當如彼而吾所以應之者乃如此則雖未必出於血氣人欲之私然只似此亦是不合正理旣有不合正理則非邪妄而何恐不必言未免紛擾敬不得行然後爲有妄之邪心也所論近世識心之弊則深中其失古人之學所貴於存心者蓋將即此而窮天下之理今之所謂存心者乃欲恃此而外天下之理其得失之端於此亦可見矣故近日之弊無不流於狂妄恣肆而不自知其非也答廖子晦守官得上官相知可以行志然獲上有道自守亦不可失也獄事人命所繫尤當盡心近世流俗惑於隂徳之論多以縱出有罪爲能而不思善良之無告此最弊事不可不戒然哀矜勿喜之心則不可無也所示疑義甚善但一二處小未圓備别𥿄具去職事之餘更能玩意於此固佳然觀書亦須從頭循序而進不以淺深難易有所取舎自然意味詳宻至於浹洽貫通則無緊要處所下功夫亦不落空矣今人多是㨂難底好底㸔非惟聖賢之言不可如此間别且是只此心意便不定疊縦然用心探索得到亦與自家這裏不相千突兀聱牙無田地可安頓此病不可不知也子晦所論始終條理甚善然去歲見三山上游諸論皆不可暁何耶豈同官所見不同難力爭耶至中固不當以始終言然射之所以中者亦是其未用力時眼中見得親切故其發而能中耳發處方用得力也其它則所論皆善矣國材以仁喻心之說恐渠記之誤不應如此謬妄也理一分殊便是仁義之理不待行之而後爲義也以行之爲義乃是告子義外之說自韓子失之矣大抵仁義禮智皆心之理而仁在其中又無所不包故孟子以人心言之如四端皆心之用而惻隱之心無所不貫亦可見也信近於義言可復也未可便說言不必信蓋言欲其信然湏是近義然後言可復而能全其信此正言慮所終之意也竭力非不敢有其身之謂卒至於不敢慢語尤無序皆不必如此說四端一叚甚好此義理之綱領能如此推明甚慰所望也說大人之義熹嘗說孟子不是教人去藐大人但教人勿視其巍巍然者而巳今人不是畏大人只是畏其巍巍然者而已如蘇秦嫂所謂見季子位高金多正是此見識也若能勿視其巍巍然而不失夫畏大人之心則是乃眞能畏大人者矣萬物皆備於我下文反身強恕皆䝉此句爲義不可只說一截所謂反身而誠乃窮理力行功夫成就之效貫通純熟與理爲一處不可只以敬字盡之也答廖子晦巧言令色爲失其本心此語非不是但近時說者多因孟子之言遂以心字替却仁字此則不可當更於此思之得其說則凡言仁者皆可黙識不但此章之義而已且巧言亦不專爲譽人過實大凡辭色之間務爲華餙以恱人之觀聽者皆是匕蔡語録中說寫束請客之類皆是察私心所從起亦不記當時如何說然亦非謂平居無事而伺其所起但操存有功即念慮之萌無不知覺未能如此即此心應物之際不可不審其邪正公私而施克復之功也曾子易簀非記者之誤所論得之千乗之說未有端的證據司馬法說雖占地太廣然以周禮考之又不止此如云九夫爲井四井爲邑四邑爲丘四丘爲甸鄭氏讀甸爲乗云四丘之地出車一乗乃是十六井也所云未聞七家出一人之役後來宇文周制府衞法乃是七家共出一兵疑於古制亦有所考然今不可知矣此類恐當細考而兼存之以俟知者决焉不必自爲之說也答廖子晦所喻巳悉但事巳如此不若且静以聴之吾人所學正要此處呈驗若㸔些利害便不免開口告人却與不學之人何異向見李先生說若大叚排遣不去只思古人所遭患難有大不可堪者持以自比則亦可以少安矣始者甚卑其說以爲何至如此後來臨事却覺有得力處不可忽也若閤中不快亦無可奈何事巳至此巳展不縮巳進不退只得硬著脊梁與它厮崖㸔他如何自家决定不肯開口告他若到任滿便作對移批書離任則它許多威風都無使處矣豈不快哉東坡在湖州𬒳逮時靣無人色兩足俱軟幾不能行求入與家人訣而使者不聽雖伊川先生謫涪陵時亦欲入告叔母而不可得惟陳了翁𬒳逮聞命即行使人駭之請其入治行裝而翁反不聽竒哉竒哉願子晦勉旃母爲後人羞也此間有呉伯起者不曽講學後聞陸子静門人說話自謂有所解悟便能不顧利害及其作令纔𬒳對移它邑主簿却不肯行而百方求免熹嘗笑之以爲何至如此若對移作指使即逐日執杖子去知府㕔前唱喏若對移做押録即逐日抱文案去知縣案前呈覆更做耆長壯丁亦不妨與它去做况主簿乎呉不能用竟至憤鬰成疾而死當時若放得下却未必死今不免死而枉陪了許多下情所失愈多雖其臨機失於㫁决亦是平日欠了持論也志士不忘在溝壑勇士不忘䘮其元此夫子所以有取於虞人而孟子亦發明之李先生說不忘二字是活句湏向這裏參取愚謂若果識得此意辦得此心則無入而不自得而彼之權勢威力亦皆無所施矣前幅未盡鄙意故復布此試反復之當自有判决處答廖子晦唐臣問中爭傳曰中虚爲中孚之象中實亦爲孚義又曰中虚信之本中實信之質又曰中虚爲誠之象中實爲孚之象夫有本則有質有誠則有孚蓋即質生於本而孚出於誠也似有終始似有先後然不可得指而名之以爲終始先後也故分而言之則曰中實合而言之則曰中虚分謂二體兊與巽也合謂全體中孚是也二體以剛而得上下之中雖曰實矣及其成體則二柔在中而又生於虚焉蓋虚中未嘗無實而中實未嘗不虚也以虚爲實之體而實爲虚之用雖曰體曰用又不可𡵨而爲二也大抵虚根於實實出於虚及其虚也實之理未嘗不在焉於其實也虚之義未嘗不存焉但不可執其虚而忘其實忘其實則無質也無信也又不可泥其實而失其虚失其虚則無本也不誠也是猶隂根於陽陽根於隂静無而動有道並行而不相悖者也今夫天地之間一元之氣杳冥無迹豈非虚耶萬物生成各具形器豈非實耶然物雖成形豈能離於一元之氣豈能捨於物而自用哉在今學者體天地之化盡形色之則中不可不虚亦不可不實存養在我則中心廣大纎毫不留不失於信之本不忘於誠之象豈非虚耶應接於外則必矜細行克勤小物不失於信之質不忘於孚之象豈非實耶此亦伊川先生所謂由乎中以應乎外制於外所以養其中之義也如是則體用一源内外交養豈不美哉某讀易傳而有此疑義萬望詳教徳明答云中孚之義微奥豈徳明所能識嘗試考諸卦體二五皆陽而中實者中心純實而有信之義也内外皆實而中虚者中心虚明而能信之義也就所主而言則中實爲信之質就所感而言則中虚爲信之本又以澤風二象言之則水以虚而受風之入下以虚而受上之感皆所以爲信也其體其實其虚一歸於信此易之所以變易而無不各極其道而中孚之義著矣來說謂虚中未嘗無實實中未嘗無虚固善又謂虚根於實實根於虚又以一元之氣爲虚萬物生成爲實其言竊恐有病精義云冲漠無朕而萬象森然巳具其曰萬象巳具則雖冲漠無朕之際巳不爲虚矣况於一元之氣所旣有者得爲虚乎此幾於老氏有生於無之論見闢於正䝉之書者也又以存養於中應接於外爲兩截恐失程子由乎中以應乎外之本意不審高明以爲如何唐臣問吕與叔嘗言思慮多不能驅除曰此正如破屋中禦冦東靣人來未逐得西靣又一人至矣左右前後驅逐不暇蓋四靣空踈盗固易入無縁作得主定又如虚器入水水自然入若以一器實之以水置之水中水何能入來蓋中有主則實實則外患不能入自然無事學者先務固在心志然有謂欲屏去聞見知思則是絶聖棄智有欲屏去思慮患其紛亂則須坐禪入定如明鑑在此萬物畢照是鑑之常難爲使之不照人心不能不交感萬物難爲使之不思慮若欲免此唯是心有主如何爲主敬而巳矣有主則虚虚謂邪不能入無主則實實爲物來奪之大凢人心不可二用用於一事則它事更不能入者事爲之主也事爲之主尚無思慮紛擾之患若主於敬又焉有此患乎所謂敬者主一之謂敬所謂一者無適之謂一且欲涵泳主一之意不一則二三矣至於不敢欺不敢慢尚不媿於屋陋皆是敬之事也此二條一以實爲主一以虚爲主而皆收入近思録唐臣以愚意度之虚以敬言實以事言以敬爲之主則虚虚則邪不能入以事爲之主則實實則外患不能入故程先生於有主則實下云自然無事於無主則實下云實謂物來奪之詳此二條之意各有所在不可併作一意㸔未知是否徳明答云有主則實有主則虚虚實二說雖不同然意自相通皆謂以敬爲主也敬則其心操存而不亂虚静而能照操存不亂外患自不能入虚静而能照外物自不能干無有二事程子曰主一之謂敬又曰敬則自虚静又曰敬勝百邪意亦可見只縁吕氏患思慮多程子謂其中心無主所致如虚器入水破室致寇故言有主則實實則外患不能入後來學者又欲盡屏見聞知思程子以爲人心不能無感如鑑不能不照但涵養清明則自無紛擾不待屏除也故言有主則虚虚謂邪不能入各有攸當皆是以敬爲主若岐而爲二恐非程子本意又前言有主則實則是心有主也後言無主則實則是物來奪之中心昏塞也辭雖同而意則異所言虚者亦然李君二說亦佳但太支蔓作病耳有本則有質有誠則有孚蓋質生於本而孚出於誠此四句自好似有始終以下則贅矣分合則是論卦體非爲不可以先後指名而言也虚中未嘗無實以下亦是衍說與此義𥘉不相干所云實出於虚此尤無理至謂執虚忘實泥實失虚皆極有害大抵如今一念之間中無私主便謂之虚事皆不妄便謂之實不是兩件事也其說又以存養於中爲虚應接於外爲實亦誤矣子晦之言大抵近之但語有未親切處耳後叚虚實之說亦類此子晦之說甚善但敬則内欲不萌外誘不入自其内欲不萌而言則曰虚自其外誘不入而言故曰實只是一時事不可作兩截㸔也答廖子晦所喻禮文此等事平昔不曾講究一旦荒迷又不暇問所以例多苟簡不滿人意然䘮與其易也寧戚但存其大節使不失吾哀痛之誠心爲急此等雖小不備亦不得巳也禮服制度見於儀禮爲詳諸家皆祖之而有更變爾若必欲致詳可細考也據今所急卜葬爲先葬後三虞卒哭而祔祔畢主復于寢以俟三年而後撤几筵此禮經皆有明文不必用它說改易也答廖子晦廟議當時只用荆公之說蓋伊川先生之意也所謂不備九廟之制蓋議者欲并桃僖宣二祖而祔孝宗一室則自太祖而至孝宗纔八世耳兄弟共爲一世正使荆公之說未必當理宣祖亦未合在祧毀之限也此事不當私議然䝉見問故謾及之不必爲它人言也所問葬法大槩得之但後來講究木椁瀝青似亦無益但於穴底先鋪炭屑築之厚一寸許其上之中即鋪沙灰四傍即用炭屑側厚寸許下與先所鋪者相接築之旣平然後安石椁於其上四傍又下三物如前椁底及棺四傍上靣復用沙灰實之俟滿加蓋復布沙灰而加炭屑於其上然後以上築之盈坎而止蓋沙灰以隔螻蟻愈厚愈佳頃嘗見藉溪先生說嘗見用灰葬者後因遷葬則見灰巳化爲石矣炭屑則以隔木根之自外入者亦里人改葬者所親見故湏令嘗在沙灰之外四靣周宻都無縫罅然後可以爲固但法中不許用石椁故此不敢用全石只以數片合成庶幾不戾法意耳答廖子晦徳明向者侍坐嘗問䧏衷之性具有五典之彛旣已知之而行之或有未至只是爲私欲所撓耳其要在窒欲先生賜教云一分私欲便有一分見不盡時道中妄陳所見以及無極太極動静隂陽五氣五性與夫萬事善惡之出因言大端人倫似只如此不審如何著工夫方見得盡先生云據說亦只是如此無可思索此乃雖欲從之末由也已處只要時習常讀書令常在目前乆之自然見得某佩服至訓罔敢失墜兹者辱書又蒙誨以離羣索居之際自能提撕不廢講習體驗之功則與同堂合席朝夕講磨無以異矣某執書三復不勝感發生我者父也教我者夫子也俛焉孳孳斃而後已因念顔子鑚仰堅高恍惚前後喟然發嘆旣知道體之無窮又無所用其力將欲罷之而此理已躍如于中有不容已者而夫子循循善誘復示以用力之方博之以文約之以禮顔子窮格克復旣竭吾才日新不息於是實見此理卓然若有所立昭昭而不可欺且又非力行之所能至故曰雖欲從之末由也已如顔子者可謂眞知者哉夫慱文約禮先生所謂講習體驗之功也所立卓爾亦豈離降衷之性固有之彛哉而顔氏之眞知如彼後人之不能及又如此進寸退尺毎誦師言惕然警懼輙敢推廣先生之說復以求教詳賜開暁幸甚所論顔子之嘆大槩得之然亦覺有太煩雜處約而言之則高堅前後者顔子始時之所見也博文約禮者中間用力之方也欲罷不能以後者後來得力之效驗也中庸所謂得一善則拳拳服膺而不失者正謂此博文約禮工夫不可聞斷耳若能如此實用其力乆之自然見得此箇道理無處不在不是塊然徒守一物而硬定差排喚作心性也若不如此政使思索勞苦說得相似亦恐隨手消散不爲吾有况欲望其融㑹貫通而與已爲一耶舊見李先生常說少從師友幸有所聞中間無講習之助幾成廢墮然頼天之靈此箇道理時常只在心目間未嘗敢忘此可見其持守之功矣然則所見安得而不精所養安得而不熟邪近時朋友漫說爲學然讀書尚不能記得本文講說尚不能通得訓詁因循苟且一暴十寒日往月來漸次老大則遂漠然忘之更無頭緒可以接續至有不獲講學之利而徒取廢錮之禍者甚可嘆也來喻蓋巳得此大意然持之以乆全在日用工夫勿令間斷乆當自有眞實見處也班朝治軍蒞官行法非禮威嚴不行禱祠祭祀非禮不誠不莊先生謂古人以誠莊對威嚴蓋爲政以嚴爲本寛以濟嚴之太過也某向聞其語猶未深訂近讀䝉卦𥘉六曰發䝉利用刑人用脫桎梏而程氏傳曰聖王設刑罰以齊其衆明教化以善其俗刑罰立而後教化行治䝉之功若非威之以刑使之脫去昬䝉之桎梏則善教無由而入某反覆深思若威信不立誠不足以立政然猶有疑焉孔子曰居上不寛吾何以觀之哉竊謂居上以寛爲本寛則得衆嚴以濟寛之不及耳若一意任威是䝉爻所謂以往吝也其弊將有至於法令如牛毛者抑又聞之四徳之元猶五常之仁故元爲善之長仁包義禮智三者先之以仁裁之以義三代得天下以仁莫不有慘怛之愛忠利之教所以不免於刑者亦好仁惡不仁耳今之爲州縣者不念民生之艱刑罰失平征取無藝箠楚流血苟以逃上官之責而過於寛者又一切廢弛不立所在有之此固不足道然先王爲政之本寛嚴先後之異施者不敢不詳講伏乞賜誨爲政以寛爲本者謂其大體規模意思當如此耳古人察理精宻持身整肅無偷惰戯豫之時故其政不待作威而自嚴但其意則以愛人爲本耳及其施之於政事便須有綱紀文章關防禁約截然而不可犯然後吾之所謂寛者得以隨事及人而無頽弊不舉之處人之䝉惠於我者亦得以通逹明白實受其賜而無間隔欺蔽之患聖人說政以寛爲本而今反欲其嚴正如古樂以和爲主而周子反欲其淡蓋今之所謂寛者乃縱弛所謂和者乃哇淫非古之所謂寛與和者故必以是矯之乃得其平耳如其不然則雖有愛人之心而事無統紀緩急先後可否與奪之權皆不在巳於是姦豪得志而善良之民反不𬒳其澤矣此事利害只在目前不必引書傳考古今然後知也緩急可否是兩事無程限則緩急不在巳不親臨則可否不在巳今見争訟人到官常苦不得呈覆湏當計㑹案吏然後得之便可見其無政事不待可否失當然後知其繆矣又如縣道送兩稅簿上州磨審皆有日限有違失則紏正之無即簽押用印紿還今有數月不還者守倅漫不加省如此之類不可勝數以此爲寛不知孔子意裏道如何也但爲政必有規矩使姦民猾吏不得行其私然後刑罰可省賦歛可薄所謂以寛爲本體仁長人孰有大於此者乎河出圖洛出書而起八卦九疇之數聴鳴鳳而生六律六吕之聲因思黄帝造律一事與伏羲畫卦大禹錫疇同功况度量權衡皆起於律而衡運生規規生圎圎生矩繩直凖平至於定四時興六樂悉由是出故曰律者萬事之根本學者詎可廢而不講哉夫黄鍾之管九寸三分損一下生林鍾林鐘之管六寸三分益一上生太蔟周旋十二律復生黄鐘而還相爲宫之義又一宫各生五聲總十二律凡生十六聲如八卦重而爲六十四皆自然之理也然司馬遷律數與班固志不同者多未暁考其實亦無不同但司馬暦書微隱此等尤費思索耳如黃鐘長八寸七分或謂七字是誤蓋十分也是爲九寸此等不審然否十二律還相爲宫今考禮運䟽義黃鐘爲第一宫下生林鐘爲徴上生太蔟爲商下生南吕爲羽上生姑洗爲角林鐘爲第二宮終於中吕爲第十二宫各有上生下生所管之聲此數蓋本於司馬遷暦書然與黃鐘爲宫太蔟爲商姑洗爲羽林鐘爲徴南吕爲羽應鐘爲變宫㽔賔爲變徴者不同其次大吕太蔟終於無射應鐘凡十二律迭相爲宮其下各有商角羽徴變宫變徴之聲向見書堂七絃琴凖用此法以定清濁高下之聲但不知䟽義各爲一說孰是孰否其必各有所主也變宫變徴其聲清耶不知古律巳用之否或後來增加之也至於埋律候氣一事尤所未暁曹傳所載候氣之法置十二律於宻室實葭灰管埋之地中一氣至則一律飛灰或疑所置諸律方不踰數尺氣至獨本律應之何也此必有造化宻相感召之理或又按隋志之說曰律之長短不同各齊其上隨深淺入地中冬至陽氣距地靣九寸而止惟黃鐘之管九寸故逹此說似爲有理今因其說而推之十一月黄鐘管長九寸十二月大吕八寸四分正月太蔟管長八寸二月夾鐘長七寸推而下之其長者遞减至九月無射五寸十月應鐘四寸五分雖埋律之地方不踰數尺氣至無有不逹然候管長短不同管長者氣必先逹灰亦先動管短者氣逹在後亦如所謂南枝春先到北枝差遲耳不審然否律吕之說今有新書并辨證各一冊及向時所撰序一篇并往可細考之當得其說凡十二律各以本律爲宫而生四侓如黄鐘爲宫則太蔟爲商姑洗爲羽林鐘爲徴南吕爲角是黄鐘一均之聲也若林鐘爲宫則南吕爲商應鍾爲角太蔟爲徴姑洗爲羽是林鐘一均之聲也各就其宫以起四聲而後六十律之聲備非以黃鐘定爲宫太蔟定爲商姑洗定爲羽林鐘定爲徴南吕定爲角也但黃大太夾姑中蕤林夷南無應爲十二律長短之次宫商角徴羽爲五聲長短之次黄鐘一均上生下生長短皆順故得各用其全律之正聲十二律名今俗樂亦用之合字即是黄鐘但其律差高耳筆談言之甚詳可呼俗工問之自林鐘之宫而生太蔟之祉則林鐘六寸而太蔟八寸祉反長於宫而聲失其序矣故以十二律而言雖當爲林鐘上生太蔟而以五聲而言則當爲宫下生祉而得太蔟半律四寸之管其聲方順又自太蔟半律四寸之祉而生南吕五寸有竒之商則於律雖本爲下生而於聲反爲上生矣自南吕五寸有竒之商而生姑洗七寸有竒之羽則於律雖本爲上生而於聲則又當用其半而爲下生矣自姑洗半律三寸有竒之羽而生應鐘四寸有竒之角則於律雖爲下生而於聲反爲上生矣其餘十律皆然孔䟽蓋知此法但言之不詳耳半律杜佑通典謂之子聲者是也此是古法但後人失之而唯序黃鐘太吕太蔟夾鐘四律有四清聲即此半聲是也變宫變祉始見於國語注中及後漢樂志乃十二律之本聲自宫而下六變七變而得之者非清聲也如黃鐘爲宫則第六變得應鐘爲變宫第七變得蕤賔爲變祉如林鐘爲宫則第六變得蕤賔爲變宫第七變得大吕爲變祉是也凡十二律皆有二變一律之内通前五聲合爲七均祖孝孫王朴之樂皆同所以有八十四調者蓋毎律各添此二聲而得之也新書此說甚詳候氣之說其中亦巳論之蓋埋管雖相近而其管之長短入地深淺有不同故氣之應有先後耳非以方位而爲先後也但畫一圖朝夕㸔誦仍於指掌間輪之乆乆自熟乃見其妙此又可驗凡事皆然别無竒巧只是乆而習熟便是妙處也禮書有此一卷比新書差約偶在他處俟取到寄去㸔也天有黃赤二道沈存中云非天實有之特暦家設色以記日月之行耳夫日之所由謂之黃道史家又謂月有九行黒道二出黄道北赤道二出黄道南白道二出黄道西青道二出黃道東并黃道而九如此即日月之行其道各異况陽用事則日進而北晝進而長隂用事則日退而南晝退而短月行則春東從青道夏南從赤道秋西從白道冬北從黒道日月之行其不同道又如此然毎月合朔不知何以同度而㑹於所㑹之辰又有或蝕或不蝕悉未能暁向承指喻其行或高而出黃道之上或低而出黃道之下或相近而偪或差逺而不相值則皆不蝕是時不能反覆今望賜誨日月道之說所引皆是日之南北雖不同然皆隨黃道而行耳月道雖不同然亦常隨黃道而出其旁耳其合朔時日月同在一度其望日則日月極逺而相對其上下弦則日月近一而逺三如日在午則月或在卯或在酉之類是也故合朔之時日月之東西雖同在一度而月道之南北或差逺於日則不蝕或南北雖亦相近而日在内月在外則不蝕此正如一人秉燭一人執扇相交而過一人自内觀之其兩人相去差逺則雖扇在内燭在外而扇不能掩燭或秉燭者在内而執扇者在外則雖近而扇亦不能掩燭以此推之大畧可見此說在詩十月之交篇孔䟽說得甚詳李迂仲引證亦博可并檢㸔當得其說易啓䝉曰圓者河圖之數方者洛書之文夫河圖無四隅之位截然四正而方謂之圎何也又曰圎者星也歷紀之數其肇於此乎注云歴法合二始以定剛柔二中以定律歴二終以紀閏餘今考班固志天數始於一中於三終於二十五地數始於二中於六終於三十夫始中終蓋如此推之於剛柔律歴閏餘却有未深瑩者抑亦履端於始舉正於中歸餘於終之義乎然亦不合願求其說河圖旣無四隅則比之洛書固爲圓矣注中三句本唐書暦志一行之說二始者一二也一竒故爲剛二耦故爲柔二中者五六也五者十日六者十二辰也二終者十與九也閏餘之法以十九歲爲一章故其言如此然一章之數似亦附㑹當時姑借其說以明十數之爲河圖耳寗武子邦有道則智邦無道則愚其智可及也其愚不可及也此章一句𥘉理㑹不得今讀集注參考左氏傳乃知武子當衛成公無道失國之時周旋其間盡心竭力而不去及成公囚京師武子求掌橐饘賂醫薄酖免衛侯於死終以復國及元咺之訟武子又獨以忠而獲免其能保身以濟其君如此雖謂之智可也而夫子曰其愚不可及夫子嘗曰君子哉蘧伯玉邦有道則仕邦無道則可卷而懷之以伯玉之事責武子雖謂之愚不識時亦可也然武子惓惓忠君不避險艱能爲人所不能爲抑亦難矣故夫子曰其愚不可及蓋閔之也今觀論語一書於有道無道之世屢致意焉其稱南容曰邦有道則仕邦無道則免於刑戮武予之免者亦幸矣然武子仕衛兩世其君信任之義不可棄之而去其幾於東漢王允乎允又不免𬒳害嘗聞先生誦周子之言曰學顔子之學志伊尹之志夫伊尹以天下爲巳任者也治亦進亂亦進然使成湯不興聘幣不至雖五就桀其志曷施陳蕃漢代人豪驅馳險阨之中與刑人腐夫同朝争衡屢退而不去者以仁而爲巳任非人倫莫相恤也卒以謀踈見殺亦昧於夫子免刑戮之戒矣然陳蕃王允猶是當時朝廷倚任身居鼎軸義當與國存亡故程子曰亦有不當愚者比干是也若無言責官守則如東海逢萌當先漢之亂憤三綱之旣絶挂冠東都門浮海而去惟恐其或緩也君子之道或出或處或黙或語詎可不識時幾聊發狂言以驗中否所疑寗武子事大槩得之但爲蘧伯玉南容之愚則易而爲武子之愚則難所以聖人有不可及之歎也陳蕃王允固不得爲伯玉南容之愚然蕃事未成而謀巳泄允功未就而志巳驕則又不能爲寗武子之愚矣此其所以取禍也然爲逢萌則甚易爲二公則甚難又不可以彼而責此但當問其時義之如何與其所處之當否耳答廖子晦陳君全未有用心處相見殊未有益近時後生多只如此難可以向上事期望之只如老蘇但爲學做些小語言文字直將聖賢之言兀然端坐終日讀了七八年今人說要學道乃不曽畧拚得旬月工夫讀一卷書不曽成行記得如此而望有成吁亦難矣答廖子晦顔淵之歎一叚是顔子見處今無的慤證驗之可言但以義理推之且得如諸先生及集註之說庶幾少病如有所立卓爾只是見得比之舊時愈見親切不似郷來無捉摸處但亦未有道理便得入於其間據爲巳物耳今此謂在顔子心目之間則是先來所見者不在顔子心目之間又以爲方是實見則前此非是實見矣恐不然也大抵此等處吾軰旣未到彼地位臆度而言只可大槩實說却於其中反履涵泳認取它做工夫處做自巳分上工夫乆之自當心融神㑹黙與契合若只似此直以今日所見附㑹穿鑿只要說得成就正使全無一字之差亦未有益况以近觀逺以小觀大又自不能無所失乎心性一段大槩則然但中間方說心爲之主不知從前說太極二五四端之未發時此心却任甚處可更思之實見一叚大意極善然非熹之說也程先生遺書中自有一叚說得極分明章首云皆實理也人知而信者爲難云云即此意也大學誠意章說如惡惡臭如好好色亦是此意可并詳之曽點一叚集註中所引諸先生說巳極詳明蓋以其所見而言則自源徂流由本制末堯舜事業何難之有若以事實言之則旣曰行有不揜便是曽點實未做得又何疑哉聖人與之蓋取其所見之高所存之廣耳非謂學問之道只到此處便爲至極而無以加也上蔡所記伊川先生與之荅問天下何思何慮一叚語意亦正類此見於外書可并撿㸔然則學者觀此要當反之於身須是見得曽點之所見存得曽點之所存而日用克巳復禮之功却以顔子爲師庶幾足目俱到無所欠闕横渠先生所謂心要弘放文要宻察亦謂此也來喻大槩得之然其門言語亦多有病其分根原學問爲兩節者尤不可暁恐當更入思慮也禮書中青史氏之記見大戴禮經世紀年其論甚正然古人巳嘗言之如漢高后之年則唐人巳於武后中宗紀發之蜀漢之統則習鑿齒晉春秋巳有此論矣尭以甲辰年即位乃邵康節皇極經世說諸家之說亦有同者此則荒忽不可究知敬夫所說牴牾處必是謂武王克商之年泰誓序作十一年經作十三年而編年之書乃定從序說郷見柯國材說以洪範考之訪于箕子是十三年事必是當年𥘉克商時便釋其囚而問之不應十一年巳克商至兩年後乃問之也其說似有理亦嘗以告敬夫敬夫大以爲然其書巳嘗刋行至是遂止敬夫之服善如此亦難及也潮州王尚書舊嘗識之其人勁正忠實有餘在言路嘗論湯思退之姦而逐之但爲人頗踈率學問偏任巳見諸經極有恠說立朝議論亦有不到頭處然不害爲一代正人今所得奏議煩録一本見寄傳景𥘉是其壻恐必有本旦夕當寄書問之也樂記圖譜甚荷録示但尚未暁用律次第此間有人頗知俗樂方欲問之偶以事冗未暇此固未必盡合古制然未及百年而淪廢巳如此是可嘆也韓文考異袁子質鄭文振欲寫本就彼刻版恐其間頗有僞氣引惹生事然當一靣録付之但開版事湏更斟酌耳若欲開版湏依此本别刋一本韓文方得又恐枉複勞費工力耳禮書人䟽者此間巳校定得聘禮以前二十餘篇今録其目附去彼中所編早得爲佳此間者巳送福州令直卿與劉履之兄弟參校寫成定本尚未寄來若有可増益處自不妨添入也然因此得㸔禮䟽一畨亦非小𥙷不然此等如嚼木札定無功夫㸔得也答廖子晦來書疑著生死鬼神之說此無可說只縁有箇私字分了界至故放不下耳除了此字只㸔太極兩儀乾父坤母體性之本然還有此間隔否耶答廖子晦前此屢辱貽書有所講論毎竊恠其語之不倫而未能深暁其故只據一時鄙見所未安處草草奉答往往只是說得皮膚不能切中其病所以賢者亦未深悉而猶有今日之論也此雖微陋踈率之罪然因此却得左古明辨力扣敷述詳明然後乃能識得前後所說之本意而區區愚見亦因得以自竭非小𥙷也蓋詳來喻正謂日用之間别有一物光輝閃爍動蕩流轉是即所謂無極之眞所謂谷神不死二語皆來書所引所謂無位眞人此釋氏語正谷神之酋長也學者合下便要識得此物而後將心想象照管要得常在目前乃爲根本功夫至於學問踐履零碎凑合則自是下一截事與此粗細逈然不同雖以顔子之𥘉鑚高仰堅瞻前忽後亦是未見此物故不得爲實見耳此其意則善矣然若果是如此則聖人設教首先便合痛下言語直指此物教人著緊體察要令實見著緊把捉要常在目前以爲直截根原之計而却都無此說但只教人格物致知克巳復禮一向就枝葉上零碎處做工夫豈不誤人枉費日力耶論孟之言平易明白固無此等玄妙之談雖以子思周子喫緊爲人特著中庸太極之書以明道體之極致而其所說用功夫處只說擇善固執學問思辨而篤行之只說定之以中正仁義而主静君子修之吉而巳未嘗使人日用之間必求見此天命之性無極之眞而固守之也蓋原此理之所自來雖極微妙然其實只是人心之中許多合當做底道理而巳但推其本則見其出於人心而非人力之所能爲故曰天命雖萬事萬化皆自此中流出而實無形象之可指故曰無極耳若論功夫則只擇善固執中正仁義便是理㑹此事處非是别有一叚根原功夫又在講學應事之外也如說求其放心亦只是說日用之間收歛整齊不使心念向外走作庶幾其中許多合做底道理漸次分明可以體察亦非捉取此物藏在胷中然後别分一心出外以應事接物也來書又云事事物物皆有實理如仁義禮智之性視聽言動之則皆從天命中來湏如顔曾洞見全體即無一不善此說雖似無病然詳其語脉究其意指亦是以天命全體者爲一物之渾然而仁義禮智之性視聴言動之則皆是其中零碎查滓之物𥘉不異於前說也至論所以爲學則又不在乎事事物物之實理而特以洞見全體爲功凡此似亦只是舊病也且曰洞見全體而後事無不善則是未見以前未嘗一一窮格以待其貫通而直以意識想象之耳是與程子所訶對塔而說相輪者何以異哉來喻又疑考異中說韓公見道之用而未得其體以爲亦若自謂根原學問各有一種功夫者此亦不然前日鄙意正爲韓公只於治國平天下處用功而未嘗就其身心上講究持守耳非病其不曽捉得此物藏在懷䄂間也此是學問功夫徹上徹下細宻緊切處向使不因來喻之詳終亦未覺其病之在是今幸見得不是小事千萬詳㸔此說子細㝷繹更推其類盡將平生所認有相闗處一一勘驗當自見得如有未契更宜反覆不可容易放過也安卿之病正亦坐此向來至此說得旣不相合渠便藏了更不說著遂無由與之極論至今以爲恨或因與書幸亦以此暁之勿令乆自拘縶也大顚問答𥘉疑只是其徒僞作後細思之想亦有些彷彿計其爲人山野質朴雖不㑹說而於修行地位做得功夫著實故其言語有力感動得人又是韓公所未嘗聞而亦切中其病故公旣聞其語而不覺遂恱之也然亦只此便見得韓公本體功夫有欠闕處如其不然豈其自無主宰只𬒳朝廷一貶異教一言而便如此失其常度哉此等處極不可草草㸔過更宜深體之也其餘巳具見於考異外集卷中者今不復論然若不得此碑亦無由見得許多曲折也坡公海外意況深可歎息近見其晚年所作小詞有新恩雖可冀舊學終難改之句毎諷詠之亦足令人慨然也二詩亦未甚曉不敢又便率然奉答然恐亦只是舊來意思但請只就前說觀之恐亦可自見得矣蓋性命之理雖微然就博文約禮實事上㸔亦甚明白正不須向無形象處東撈西摸如捕風繫影用意愈深而去道愈逺也考異答嚴居厚乆當純熟明快快一作决答廖子晦故又曰中者天下之大本一無又字閩縣儒學教諭王製校晦庵先生朱文公文集卷第四十五
