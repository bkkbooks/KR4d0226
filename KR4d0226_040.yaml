body:
  text: 書知舊門人問答答劉平甫新年人事幾日而定定後進業恐不可廢昨日歲前有欲奉聞者以無間處不暇及亦嘗令四弟相告曾及之否大抵家務冗幹既多此不可已者若於其餘時又以不急雜務虛費光隂則是終無時讀書也愚意講學幹蠱之外挽弓鳴琴抄書讎校之類皆可且罷此等不惟廢讀書亦妨幹也平甫試思此等於吾身計果孰親且急哉又比來逰從稍雜與此曹交處最易親狎而驕慢之心日滋既非所以養成德器其於觀聽亦自不美所損多矣有國家者猶以近習傷德害政况吾徒乎然亦非必絶之但吾清心省事接之以時遇之以禮彼將自踈如僕輩固不足道然平甫亦嘗見衡門之下有雜賔乎以禮來者以禮接之亦嘗有留連酒炙把臂並逰對牀夜語者乎此不足為外人道但欲平甫自知而節之若徒暴露於外而無見聽之實但使衆怨見歸為僕作禍耳千萬幸察裴丈正歲出山來幸為道區區此公徑直凡所告戒千萬信受不可如聽熹言之悠悠恐不能堪耳答劉平甫前日奉聞可且自觀書恐衆説紛紜未能自決即且理舊書如何二南説未編次可及今為之它日相聚裁定也論語向者看四篇似未浹熟可兼新舊看為佳去歲所治大抵未熟者今悉溫尋之為善向數奉語可録出所作工夫次第作一𥿄時復省察了與未了分數此最善可便為之蓋雖相聚一年所進業殊少所當為而未為者殊多今又疾病如此羸頓勢未能出與兄相聚相聚亦思索講究未得恐負太碩人與共甫兄相責望之意特復奉白幸惟思之無事勿出入蓋共甫兄不在宅中别無子弟戶門深闊事有不可勝虞者不惟惰遊廢業為不可賔客至者談説戲笑度無益於身事家事者少酬酢之則彼自不來矣切祝且溫習勿廢使有常業而此心不放則異日復相聚亦易收拾試思自去冬以來巳過之日多少其間用心處放蕩幾何存在幾何則亦足以自警矣答劉平甫墓表須看令式合高多少若所有石不及格便可買石不必問字之多少也臨時分上一截寫額下一截刻文却看廣狹如何為字大小今難預定也舊文兩日多所更定漸覺詳備銘文亦巳得數語但不甚佳并歸日靣議也尊嫂聞向安殊可喜點視湯藥之睱可以理舊學矣日月易得毋因循失之乃所深望前以戲謔奉規能留意否先聖言君子不重則不威學則不固向曽講此至熟日用之間只此一句勿令違失則工夫巳過半千萬千萬熹以同召者例有任滿指揮不免援例陳請范丈亦以為兄至此渠冗甚不得欵語然却儘有合處不至如早賦之矛盾也歸日當靣言之惟益力進所學力行所知元履向至泰寧譽兄於諸人間不容口無使為過情之聞則甚善答劉平甫昨困聽兒輩誦詩偶得此義可以輔橫渠説之遺謾録去可於疑義簿上録之一章言后妃志於求賢審官又知臣下之勤勞故采卷耳備酒漿雖后妃之職然及其有懷也則不盈頃筐而棄置之於周行之道矣言其憂之切至也二章三章皆臣下勤勞之甚思欲酌酒以自解之辭凡言我者皆臣下自我也此則述其所憂又見不得不汲汲於采卷耳也四章甚言臣下之勤勞也又定之方中匪直也人云云言非特人化其德而有塞淵之美至於物𬒳其功亦至衆多之盛也答劉平甫關雎章句亦方疑之當作四章三章章四句一章章八句乃安但於舊説俱不合莫可兼存之否好逑如字乃安毛公自不作好字説更檢兔罝好仇處看音如何恐不須點破也蘇黃門併載馳詩中兩章四句作一章八句文意亦似關雎末後兩章琴瑟友之鐘鼓樂之作一章八句依故訓説亦得答劉平甫熹承詢及影堂按古禮廟無二主嘗原其意以為祖考之精神既散欲其萃聚於此故不可以二今有祠版又有影是有二主矣古人宗子承家主祭仕不出鄉故廟無虛主而祭必於廟惟宗子越在他國則不得祭而庶子居者代之祝曰孝子某宗子名使介子某庶子名執其常事然猶不敢入廟特望墓為壇以祭蓋其尊祖敬宗之嚴如此今人主祭者遊宦四方或貴仕於朝又非古人越在他國之比則以其田祿修其薦享尤不可闕不得以身去國而使支子代之也禮意終始全不相似泥古則闊於事情徇俗則無復品節必欲酌其中制適古今之宜則宗子所在奉二主以從之於事為宜蓋上不失萃聚祖考精神之義二主常相依則精神不分矣下使宗子得以田祿薦享祖宗冝亦歆之處禮之變而不失其中所謂禮雖先王未之有可以義起者蓋如此但支子所得自主之祭則當留以奉祀不得隨宗子而徙也所喻留影於家奉祠版而行恐精神分散非鬼神所安而支子私祭上及髙曽又非所以嚴大宗之正也明則有禮樂幽則有鬼神其禮一致推此思之則知所處矣學絶道喪此語世所罕聞聞之必以為笑然以吾友下問之勤不敢不以正對侍次試以稟知更與圭甫熟講斷然行之一新弊俗共甫博學多聞亦不應以此為怪也更詳思之答劉平甫夫子云不學詩無以言先儒以為心平氣和則能言易繫辭曰易其心然後語謂平易其心而後語也明道先生曰凡為人言者理勝則事明氣忿則招拂告子云不得於言勿求於心孟子以為不可此凡言與人交際之道記曰子事父母父母有過下氣怡色柔聲以諌此事親事長之道也適以此意奉聞大略然此等事更留意體察勤加鐫治為妙此别須有旬月之期懷不能巳聊復言之他日相見只此可驗進學工夫更不須問疑難也在彼凡事存此意善處為佳途中望寬懷自愛孟子之意以言有不順理不自得處即是心有不順理不自得處故不得於言須求之於心就心上理會也心氣和則言順理矣然亦須就言上做工夫始得伊川曰發禁躁妄內斯靜專是也內外表裏照管無少空闕始得相應試如此用工夫如何答劉平甫近收耕老書説一貫之旨甚善但忠恕即説成兩貫了兩貫之理全然透不過忠恕裏靣來如此即惡在其為一貫耶此事政須自得而渠堅守師説自作障礙無如之何但循循不差却無躐等之患亦可貴爾與平父書中雜説近得廟堂記一夲竒甚蓋百十年前物刻畫完好尚有界行恨未令平甫見也論語讀之想有味訓蒙草草不堪看只看要義自佳也沙縣羅家傳得先聖像甚佳并武侯成都本與閻本大異此像嚴毅沈正恐差近之也二先生邵張公四象今并欲煩為背之惟橫渠一象服章不類或有此闊絹并告為摹易之如二先生野服如何元履此劄曽寄呈樞兄否此題目難做非籲俊尊上帝之比而彼易為之亦不思矣又時宰何嘗知有此事率爾發之殊不中節比以書正之巳不及矣可笑可笑裘父詩勝他文近體又勝古風今乃見之幸甚曽詩有廬山圖者不知有此圖否若未得遊且得一圖想像勝處亦佳熹碌碌如𥘉貧病日侵而仕宦之意愈薄吾命有所制矣程氏遺書細看尚多誤字蓋元本如此今以它本參之乃覺其誤耳文定春秋并二書傳之甚善更問欽夫看如何渠似不甚愛通旨愚意則以為亦可傳也答吳耕老胡丈昔年答黃繼道問一貫義云一貫誠也忠恕思誠也誠者天之道思誠者人之道此語形容得甚妙中庸曰鳶飛戾天魚躍于淵言上下察也君子之道造端乎夫婦及其至也察乎天地此是子思在天舉一物在地舉一物在人舉夫婦鳶與魚其飛躍雖不同其實則一物為之耳夫婦之道亦不出乎此是皆子思發見一貫之道也孔子繫易辭有曰以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣亦發明斯道也如何如何來教引中庸易傳之言以證一貫之理甚善愚意所謂一貫者亦是如是但據熹所見而以諸先生之説證之則忠恕便巳在一貫之中如所謂鳶飛魚躍雖不同然其實則一物之意是也若耕老之説則是鳶魚飛躍內外精粗合為一貫矣而一貫之外零却忠恕二字恐非聖賢之意也胡丈以一貫為誠而以忠恕為思誠也若熹之意則曽子之言忠恕即誠也子思之言違道不逺孟子之言求仁莫近乃思誠也試推此思之如何答何叔京五月十八日新安朱熹謹再拜裁書復于知丞學士執事熹少而魯鈍百事不及人獨幸稍知有意於古人為巳之學而求之不得其要晚親有道粗得其緒餘之一二方幸有所向而為之焉則又未及卒業而遽有山頽梁壞之歎倀倀然如瞽之無目擲埴索途終日而莫知所適以是竊有意於朋友之助顧以鄙朴窮陋既不獲交天下之英俊以資其所長而天下之士其聰明博逹足以自立者又往往流於詞章記誦之習少復留意於此熹所以趑趄於世求輔仁之益所得不過一二人而巳間者竊聞執事家學淵源之正而才資敏鋭絶出等夷其深造默識固有超然非誦説見聞之所及也而其口講心潛躬行力踐巳非一日之積是以嘗欲一見執事而有謁焉聽於下風又聞執事蓋嘗過聽遊談之誤憐其願學之久而未始有聞且將引而置之交遊之末使得薰沐道誼之餘以自警飭以此尤欲及時早遂此願而貧病之故不能贏糧數舍求就正之益以慰夙心而承厚意自惟薄陋聲迹本踈又不敢率然奉咫尺之書以煩隸人而為異日承教之漸惟是瞻仰不能一日而忘而且愧且恨亦未嘗不一日往來于心也不謂執事不鄙其愚一日惠然辱貺以書意者髙明抱道獨立亦病夫世之末學外騖不可告語於是有取乎熹之鈍愚靜退以為臭味之或同而不盡責其餘耳至於詞旨奧博反復通貫三復竦然有以仰見所存之妙竊不自勝其振厲踴躍以為雖未獲瞻望於前而亦無以異於親承指誨也惟其稱道太過責望太深乃熹所欲請於左右者而怠緩不敏反為執事所先此則不能不以為愧然道之在天下天地古今而巳矣其是非可否之不齊決於公而巳矣然則熹之所望於執事而執事之所以責於熹者又豈有彼此先後之間哉繼自今以往執事有以見教而熹有以求教願悉屏去形迹之私商訂辨析務以求合乎至當之歸庶幾有以致廣大盡精微而不滯於一偏之見則熹之幸也執事之賜也其它未暇一二姑先以此為謝復屬伯崇轉致不審高明以為如何暑雨煩鬱伏惟承顔盡歡尊候神相萬福熹杜門奉親日益孤陋向風引領不任馳情承許秋涼見過何幸如之而非所敢望也未間更冀以時為道千萬自愛進為時用以張斯文慰山野之望幸甚答何叔京熹孤陋如昨近得伯崇過此講論踰月甚覺有益所恨者不得就正於高明耳它日伯崇相見或通書當能備言之或有差誤不吝指誨幸甚李先生教人大抵令於靜中體認大本未發時氣象分明即處事應物自然中節此乃龜山門下相傳指訣然當時親炙之時貪聽講論又方竊好章句訓詁之習不得盡心於此至今若存若亡無一的實見處辜負教育之意每一念此未嘗不愧汗沾衣也脫然之語乃先生稱道之過今日猶如挂鈎之魚當時寧有是耶然學者一時偶有所見其𥘉皆自恱懌以為真有所自得矣及其久也漸次昏暗淡泊又久則遂泯滅而頑然如𥘉無所睹此無他其所見者非卓然真見道體之全特因聞見揣度而知故耳竊意當時日聞至言觀懿行其心固必有不知所以然者洎失其所依歸而又加以歲月之久汩沒浸漬今則尤然為庸人矣此亦無足怪者因下問之及不覺悵然未知其終何所止泊也東平先生遺事猥蒙垂示得以究觀前賢出處之大致先廷問學之淵源與夫高明纂輯成書以傳世垂後之意幸幸甚甚更容熟復續得具稟也語録頃來收拾數家各有篇帙首尾記録姓名比之近世所行者差為完善故各仍其舊目而編之不敢輒有移易近有欲刻板於官司者方欲持以卑之前巳刋行當得其摹本以獻今無别本可以持內也孟子集解本欲自備遺忘抄録之際因遂不能無少去取及附巳意處近日讀之句句是病不堪拈出它時若稍有所進當悉訂定以求教今未敢也見所與伯崇講論敬仰之深然有少疑嘗與伯崇論之恐未中理更乞垂喻以警不逮幸幸甚甚答何叔京昨承不鄙惠然枉顧得以奉教纍日啓發蒙陋為幸多矣杜門奉親碌碌仍昔體驗操存雖不敢廢然竟無脫然自得處但比之舊日則亦有間矣所患絶無朋友之助終日兀然猛省提掇僅免憒憒而巳一小懈則復惘然此正天理人欲消長之幾不敢不著力不審别來高明所進復如何向來所疑定巳冰釋否若果見得分明則天性人心未發巳發渾然一致更無别物由是而克巳居敬以終其業則日用之間亦無適而非此事矣中庸之書要當以是為主而諸君子訓義於此解無遺恨比來讀之亦覺其有可疑者雖子程子之言其門人所記録亦不能無失蓋記者之誤不可不審所取也孟子集解當悉巳過目有差繆處切望痛加刋削警此昏憒幸甚幸甚伯崇云論語要義武陽學中巳寫本次第下手刋板矣若成此書甚便學者觀覽然向上儘索眼力若在本領處久不透徹則雖至言妙論日陳於前只是間言語也廣文更欲刋通書此亦甚善今人知趣向如此者亦自少得往往伯崇遊談之助為多也孟子看畢先送伯崇處近城都寄得橫渠書數種來其間多可附入者欲及注輔也淵源録亦欲早得邵氏且留不妨也本欲專人致書以謝臨辱又苦農收乏人只附此於伯崇處未知逹在何時臨書悵惘不自勝答何叔京專人賜教所以誨誘假借之者甚厚悉非所敢當然而此意不可忘也謹當奉以周旋益思其所未明益勉其所未至庶幾或能副期待之意耳杜門奉親幸粗遣日無足言者前此失於會計妄意增葺弊廬以奉賔祭工役一興財力俱耗又勢不容中止數日衮冗方劇幾無食息之暇也來春又當東走政和展墓南下尤川省親此行所過留滯非兩三月不足往返此獲寧居當復首夏矣光隂幾何而靡敝於事役塗路之間動涉時序雖隨事應物不敢弛其警省之功然客氣盛而天理微才涉紛擾即應接之間尤多舛逆如來教一言未終巳覺其有過言一事未終巳覺其有過行者在高明未必然而熹實當之矣以此常恐因循汩沒辜負平生師友之教尚賴尊兄未即遐棄猶時有以振德之也前此所論未能保其不無紕繆乃殊不蒙指告來諭勤勤若真以其言為不妄者何哉豈其以是進之欲其肆志極言而無毫髮之隱因有所擇取於其間哉不然則庸妄所聞必有偶合髙明之見者矣欣幸欣幸中庸集説如戒歸納愚意竊謂更當精擇未易一槩去取蓋先賢所擇一章之中文句意義自有得失精粗須一一究之令各有下落方愜人意然又有大者昔聞之師以為當於未發巳發之幾默識而心契焉然後文義事理觸類可通莫非此理之所出不待區區求之於章句訓詁之間也向雖聞此而莫測其所謂由今觀之始知其為切要至當之説而竟亦未能一蹴而至其域也僣易陳聞不識尊意以為如何孟子集解重蒙頒示以遺説一編見教伏讀喜幸開豁良多然方冗擾未暇精思姑具所疑之一二以求發藥俟旦夕稍定當擇其尤精者著之解中而復條其未安者盡以請益欽夫伯崇前此往還諸説皆欲用此例附之昔人有古今集驗方者此書亦可為古今集解矣既以自備遺忘又以傳諸同志友朋之益其利廣矣語録比因再閲尚有合整頓處巳略下手會冗中輟它時附呈未晚大抵劉質夫李端伯所記皆明道語餘則雜有至永嘉諸人及楊遵道唐彥思張思叔所記則又皆伊川語也向編次時有一目録近亦修改未定又忙不暇拜呈并俟它日淵源聞見二録巳領西山集委示得以披讀乃知李丈議論本末如此甚幸甚幸其間有合請教者亦俟詳觀乃敢以進也高文委示尤荷意愛之厚大抵必根於義理而詞氣高妙又足以發夫中之所欲言者非近世空言無用之文也易説序文敬拜大賜三復研味想見前賢造詣之深踐履之熟故詞無枝葉而藹然有篤厚慤誠之氣它時若得盡見遺編何幸如之遺録行狀并且歸內改定後更望别示一本幸幸孔明傳近為元履借去示喻孔明事以為天民之未粹者此論甚當然以為略數千戶而歸不肯徒還乃常人之態而孔明於此亦未能免俗者則熹竊疑之夫孔明之出祁山三郡嚮應既不能守而歸則魏人復取三郡必齮齕首事者墳墓矣拔衆而歸蓋所以全之非賊人諱空手之謂也近年南北交兵淮漢之間數有降附而吾力不能守虜騎復來則委而去之使忠義遺民為我死者肝腦塗地而莫之收省此則孔明之所不忍也故其言曰國家威力未舉使赤子困於豺狼之吻蓋傷此耳此見古人忠誠仁愛之心招徠懷附之略恐未必如明者之論也妄論如此如有未當因便有以見教幸甚雜學辨出於妄作乃蒙品題過當深懼上纍知言之明伏讀恐悚不自勝宗禮處亦未有便因書當如所戒也伯崇近過建陽相見得兩夕之欵所論益精密可喜其進未可量也大抵學者用志不分必有進益惟熹懶墮日甚不覺有分寸之進世間無有不進而不退者然則其却行者必矣自此豫書當痛加鞭䇿庶乎不為小人之歸舍是而唯唯焉殆非所望於直諒多聞之友也答何叔京伏蒙委撰味道堂記前者巳嘗懇辭今又辱貶喻尤切悚畏熹於文辭無所可取使為它文則或可以率意妄言無問嗤點今欲發揚先志昭示後來兹事體重豈宜輕以假人切望更加三思無輕其事則非獨小人免於不韙之譏亦不為賢者失人之纍幸甚幸甚戒殺子文近建陽印本納上數𥿄其間雖涉語怪然施之盲俗亦近而易知不為無助幸以授鄰里使張之通塗要津也吕公之説龜山嘗論之亦以為不過喻以利害其論尤粹而切向喻元履令附其説於後今不見恐是忘記别𥿄録呈若鄰里間有可説諭者令别刻一版附此吕説之後為佳不然則别得老兄數語跋之却於跋中載龜山之語一道發明庶幾曲終奏雅之意尤善如何若然則跋中更不須説機祥報應事矣答何叔京熹奉親屏居諸况仍昔所憂所懼大略不異來教之云而又有甚者焉耳躁妄之病在賢者豈有是哉顧熹則方患於此未能自克豈故以是相警切耶佩服之餘嘗竊思之所以有此病者殆居敬之功有所未至故心不能宰物氣有以動志而致然耳若使主一不二臨事接物之際真心現前卓然而不可亂則又安有此患哉或謂子程子曰心術最難執持如何而可子曰敬又嘗曰操約者敬而已矣惟其敬足以直內故其義有以方外義集而氣得所養則夫喜怒哀樂之發其不中節者寡矣孟子論養吾浩然之氣以為集義所生而繼之曰必有事焉而勿正心勿忘勿助長也蓋又以居敬為集義之夲也夫必有事焉者敬之謂也若曰其心儼然常若有所事云爾夫其心儼然肅然常若有所事則雖事物紛至而沓來豈足以亂吾之知思而宜不宜可不可之幾巳判然於胸中矣如此則此心晏然有以應萬物之變而何躁妄之有哉雖知其然而行之未力方竊自悼敢因來教之及而以質於左右不識其果然乎否也遺説所疑重蒙鐫喻開發為多然愚尚有未安者及後八篇之説并以求教有未中理伏惟不憚反復之勞有以振德之孔明失三郡非不欲盡徙其民意其倉卒之際力之所及止是而已若其心則豈有窮哉以其所謂困於豺狼之吻者觀之則亦安知前日魏人之暴其邊境之民不若今之胡虜哉孔明非急近功見小利詭衆而自欺者徙民而歸殆亦昭烈不肯棄民之意歟欽夫傳論并熹所疑數條請求指誨幸以一言決之味道堂記誠非淺陋所敢當故有前日之懇非敢飾辭以煩再三之辱既不蒙聽察而委喻益勤益重不敏之罪謹再拜承命不敢復辭矣然須少假歲月使得追繹先志之所存俟其略見倣佛而後下筆庶幾或能小有發明可以仰丐斤削耳下喻行巳臨官之道此在高明平日所學舉而措之則夫世俗所謂廉謹公勤有不足言矣區區乃方有愧於此其何以仰助萬分之一乎祠堂記推尊之意甚善而所謂人心天理不容亡滅學者於此百世以俟聖人而已者亦佳但亦有可議者如以字謂諸先生一也立不教坐不議無言心成乃莊周荒唐之説非聖賢授受本旨二也以穆尹歐陽文章末技比方聖學擬不以倫三也明道無恙時學者甚衆今曰未嘗為師四也吕正獻之未薨伊川巳去講席蓋其道有非當時諸賢所及知者是以難合非特以兩公之在亡為輕重今曰二公薨而伊川去五也又曰正叔自謂道巳大成可以無愧氣象淺狹恐非先生之志六也世傳了翁所序明道中庸乃吕與叔所著了翁蓋誤而今又因之七也托其語而論之其失如此蓋其大槩切切然以辨謗釋言為事亦淺乎其知先生矣嘗愛明道墓表有云學者於道知所向然後見斯人之為功知所至然後信斯名之稱情蓋此事在人隨其所至之淺深而自知之彼不知者豈可以口舌強爭彼知之矣則又何待較短長而後喻哉記中所稱兼山氏者名忠孝語録中載其問疾伊川之語然頃見其易書溺象數之説去程門逺甚而尹子門人所記則以為忠孝自黨論起絶迹師門先生沒不致奠而問疾之語亦非忠孝也然則其人其學亦可見矣愚見與所聞如此不審明者謂之何哉歲前報葉魏登庸蔣參預政陳應求同樞密知院事南北之使交贄往來元夕有旨州縣張燈山間所聞者不過如此羅李之除則未知也聞相麻以四事戒飭理財用省冗官汰冗兵其一則未聞蓋未嘗見麻但傳聞爾宰相帶知國用參政同知皆入銜并恐欲聞之金聲玉振之説改定舊説寫呈求教不知是否諸葛傳所疑瑣細不能盡録其大者帖於册內矣答何叔京昨承示及遺説後八篇議論甚精非淺陋所至或前儒所未發多巳附於解中其間尚有不能無疑者復以求教更望反復之幸甚巨室之説亦巳附入可以輔舊説之未備然廢舊説而專主此意則又似有牢籠駕御之心非聖賢用處也麥丘邑人之語亦陳天下之理以警其君耳如孟子聞誅一夫紂矣之語豈可謂脅其君哉引之欲證得罪二字出於人君之身有不正而非巨室怨望之私也莫亦無害於理否林少頴引裴晉公豈朝廷之力能制其死命哉直以處置得宜能服其心之語為證亦甚善當時不能盡載尋當添入其意乃備耳仁義二字未嘗相離今曰事親以仁守身以義恐涉支離隔截為病不細孝弟也者其為仁之本歟此言孝弟乃推行仁道之本仁字則流通該貫不專主於孝弟之一事也但推行之本自此始耳為字蓋推行之意今以對乃字立文恐未詳有子之意也程子曰論行仁則以孝弟為夲論性則以仁為孝弟之本此語甚盡手舞足蹈所論得之然李説亦有不可廢者今注於其下則理自明矣其間句意小有未安處欲更定躍如也為左右逢原神明其德為從容中道如何乘輿濟人之説與熹所聞於師者相表裏但不必言姦人聖賢所警正為仁人君子豪釐之差爾姦人則尚何説哉諸若此類稍加密察為佳辟除之辟乃趙氏本説與上下文意正相發明蓋與舍車濟人正相反也此假注釋近略稍改稍詳於舊略云惠謂私恩小利政則有公平正大之體綱紀法度之施焉惠而不知為政者亦有仁心仁聞而不能擴充以行先王之道云爾又云十月成梁蓋時將寒沍不可使民徒涉又農功既畢可以役民之時先王之政細大具舉而無事不合民心順天理故其公平正大之體綱紀法度之施雖纎悉之間亦無遺恨如此豈子産所及哉諸葛武侯之治蜀也官府次舍橋梁道路莫不繕理而民不告勞蓋其言曰治世以大德不以小惠其亦庶幾知為政矣又云君子能行先王之政使細大之務無不畢舉則惠之所及亦已廣矣是其出入之際雖辟除人使之避巳亦上下之分固所宜然何必曲意行私使人知巳出然後為惠又況人民之衆亦安得人人而濟之哉有故而去非大義所係不必深為之説臣之去國其故非一端如曰親戚連坐則先王之制父子兄弟罪不相及亦豈有此事哉但昔者諌行言聽而今也有故而去而君又加禮焉則不得不為之服矣樂毅之去燕近之非禮義之禮義所論善矣但以為其心皆在於異俗而邀名則不必皆然蓋有擇焉不精以為善而為之者知言所謂緣情立義自以為由正大之德而不知覺者也此句之失與論子産而指姦人相類孟子鄙王歡而不與言固是然朝廷之禮既然則當是之時雖不鄙之亦不得與之言矣鄙王歡事於出弔處已見之此章之意則以朝廷之禮為重時事不同理各有當聖賢之言無所苟也豈為愧衆人為已甚而始以是答之哉正所以明朝廷之禮而警衆人之失也象憂喜亦憂喜此義集解之説𥘉若不明及細玩之則詞不建意之罪也今略改定云言舜喜象之來非不知其將殺已但舜之心見其憂則亦憂見其喜則亦喜今見其喜而來故亦為之喜蓋雖明知彼之將殺巳而自我觀之則吾弟耳兄弟之愛終豈能忘也哉或曰云云愚聞之師曰兄弟之親天理人倫蓋有本然之愛矣雖有不令之人傲狠鬪鬩於其間而親愛之本心則有不可得而磨滅者惟聖人盡性故能全體此理雖遭橫逆之變幾殺其身而此心湛然不少搖動伊川先生所謂云云正謂此耳或者之云固善然恐非所以語聖人之心也如此言之莫稍盡否罔訓蒙蔽得之方訓術數恐未是罔以非其道者獨非術數耶蓋愛兄放魚欺以其方也市有虎曽參殺人罔以非其道也井有仁焉亦是君子不逆詐故可欺然燭理明故彼以無是道之語來則豈得而蒙蔽哉艾讀為乂説文云芟草也從丿乀左丿右乀芟草之狀故六書為指事之屬自艾淑艾皆有斬絶自新之意懲又創乂亦取諸此不得復引彼為釋也金聲玉振之説未安金聲博學之事玉振則反約矣反約者不見始終之異而始終之理具焉如射畢而觀破的之矢不見其巧力而巧力皆可見故下文又以射譬之若以金聲始隆終殺兼舉博約之事則玉振無所用矣愚意如此亦恐未盡俟更思之尚友章所謂口道先王語而行如市人者恐非孟子尚友之所取以論其世者正欲知其言行之曲折精微耳兼兩意説不得桐梓之説甚善但不必分身心為兩節又以木根為譬似太拘滯蓋言身則心具焉一是皆以修身為本是巳今但云以理義養其心則德尊而身安矣意亦自見狼疾之訓甚善然古字多通用不必言誤也如孟子中由猶二字常互用之天爵二説其一極善其一未安亦由集解之説自不明白有以致疑今改其答辭曰亦觀其心之所存者如何耳若假仁要利之心不去則夫不捨其天爵者亦將以固其所得之人爵而巳是或可以幸而不至於亡然根於鄙吝之私是豈可以入堯舜之道哉必也真知固有之可貴而寖忘其平日假仁要利之私則庶乎其可矣大抵假仁與利仁不同須曉析不差然後可耳易傳論聖人之公後王之私亦是此意見比卦彖辭注中鄉道志仁不可分為二事中庸曰修道以仁孟子言不志於仁所以釋上文不鄉道之實也又云務引其君以當道志於仁而巳亦言志仁之為當道爾舍生取義諸先生説巳盡之矣義重於生不假言也夜氣以為休息之時則可以為寂然未發之時則恐未安魂交而夢百感紛紜安得為未發而未發者又豈專在夢寐間耶赤子之心程子猶以為發而未逺乎中然則夜氣特可以言復而見天地心之氣象耳若夫未發之中則無在而無乎不在也耳目之官即心之官也恐未安耳目與心各有所主安得同為一官耶視聽淺滯有方而心之神明不測故見聞之際必以心御之然後不失其正若從耳目之欲而心不宰焉則不為物引者鮮矣觀上蔡所論顔曾下功處可見先立乎其大之意矣書之不役耳目百度惟貞亦此意也羿匠之説理則甚長但恐文意繁雜頭緒大多不如尹氏之説明白而周盡故云必如羿之彀率大匠之規矩然後為至則是羿與大匠自别有彀率規矩與孟子意正相戾矣若是所以教人之規矩彀率則只是衆所共由之法又非所以言至也歐陽公論世宗之事未為失但以孟子為為世立言之説則害於理矣夫聖賢之立言豈不度其事之可行與否而姑為是可喜之論以供世之傳誦道説而巳哉蓋必有是理然後有是心有是心而後有是事有是事然後有是言四者如形影之相須而未始須臾離也臯陶之執舜之逃天理人倫之至聖人之心所必行也夫豈立言之説哉聖人顧事有不能必得如其志者則輕重緩急之間於是乎有權矣故緣人之情以制法使人人得以企而八議之説生焉然其所謂權者是亦不離乎親親貴貴之大經而未始出於天理人心之外也今必以正理為空言而唯權之為徇不幸而有毫釐之差則不失於正者鮮矣此義龜山亦嘗論之見集第二十一卷躍如也正是形容懸解頓進之意意有所感觸而動却不親切感觸二字自佳但少頓進意耳引而不發則其恩也必深思之既深則有所感觸而動其進也必驟矣如此而言意似稍備如何好名之人如此説甚善但苟非其人一句不通而此章兩事亦無收拾結斷處子臧季札守節者也恐其不可謂役志於物反身而誠言能體而有之者如此欲作言能體其全者如此強恕而行言既失而反之者如此欲作言既失而所以反之者如此行之不著者所造未至也欲作不先致知也機變之巧所論甚當更欲增數語云乘時逐便以快其欲人所甚羞而已方且自以為得計蓋唯知有利而巳何所復用其愧耻之心哉如此乃盡其情如何人心亦皆有害趙氏謂人心為利欲所害此説甚善愚謂飢渴害其知味之性則飲食雖不井亦以為井利欲害其仁義之性則所為雖不可亦以為可來喻辭費而理煩恐非孟子長於譬喻之本旨也執中當知時苟失其時則亦失中矣此語恐未安蓋程子謂子莫執中比楊墨為近而中則不可執也當知子莫執中與舜禹湯之執中不同則知此説矣蓋聖人義精仁熟非有意於執中而自然無過不及故有執中之名而實未嘗有所執也以其無時不中故又曰時中若學未至理未明而徒欲求夫所謂中者而執之則所謂中者果何形狀而可執也殆愈執而愈失矣子莫是也既不識中乃慕夫時中者而欲隨時以為中吾恐其失之彌逺未必不流而為小人之無忌憚也中庸但言擇善而不言擇中其曰擇乎中庸亦必繼之曰得一善豈不知善端可求而中體難識乎夫惟明善則中可得而識矣仁義者道之全體此説善矣又云能居仁由義則由是而推焉無所往而非道則又似仁義之外猶有所謂道者矣是安得為全體哉親親而加以恩似有夷子施由親始之病夫親親之有恩非加之也欲親親而不篤於恩不知猶有病否大抵墨氏以儒者親親之分仁民而親親反有不厚釋氏以儒者仁民之分愛物而仁民反有未至山徑之蹊恐不必言為高子發人心皆然一息不存則放僻邪侈之心生矣不聞君子之大道者肆情妄作無所不至不但挾勢陵人而巳鄉原之論甚佳但孔子所稱具臣者猶能有所不從若馮道之徒則無所不從矣許以具臣巳過其分有以更之如何答何叔京熹碌碌講學親旁思索不敢廢但所見終未明了動靜語默之間疵吝山積思見君子圖所以灑濯之者而未可得今年却得一林同人在此名用中字擇之相與討論其人操履甚謹思索愈精大有所益不但勝巳而巳欽夫亦時時得書多所警發所論日精詣向以所示遺説數假寄之得報如此始亦疑其太過及細思之一一皆然有智無智豈止校三十里也今録去上呈其它答問反復及它記序等文尚多以伯修行速不能抄為恨熹前此書中所請教者於尊意云何竊意其説不過如此但持之不力恐言語間不容無病深望指誨得以自警而改之幸也向曽上稟迓夫到日借數人來為相聚數日之計今恐已熱難出入又意此人巳到不能久留而尊兄巳就道久矣或已到官亦未可知三四舍之逺阻隔不相聞如此可為深恨也武侯傳讀之如何更有可議處否問疑數條例小差以書問之欽夫皆以為然但熹欲傳末略載諸葛瞻及子尚死節事以見善善及子孫之義欽夫却不以為然以為瞻任兼將相而不能早去黃皓又不能奉身而去以冀其君之悟可謂不克肖矣此法甚嚴非慮所及也老兄以為如何但欽夫極論復見天地心不可以夜氣為比熹則以為夜氣正是復處固不可便謂天地心然於此可以見天地心矣易中之意亦𥘉不謂復為天地心也又老兄云人皆有是善根故好是懿德欽夫説見别𥿄熹則竊以為老兄此言未失但不知好者為可欲而以懿德為可欲此為失耳蓋好者善根之發也懿德者衆善之名也善根無對之善也衆善者有對之善也無對者以心言有對者以事言夫可欲之善乃善之端而以事言之其失逺矣此兩條更望思之却以見教幸甚幸甚西山集讀之疑信相半姑留此以俟的便近事一二傳聞可慶然大病新去尤要調攝將護不知左右一二公日夕啓沃用何説耳此又似可慮如何如何欽夫書令致願交之意恨未詹識它日有可見教者無相棄也恐願聞之答何叔京示喻溫習之益體驗之功有以見用力之深無少逸豫歎服之餘悚厲多矣録寄數條無非精微廣大之致顧鄙陋何足知之然貪於求教輒復以管見取正於左右却望指擲見告幸甚熹近來尤覺昏憒無進步處蓋緣日前偷墮茍簡無深探力行之志凡所論説皆出入口耳之餘以故全不得力今方覺悟欲勇革舊習而血氣巳衰心志亦不復強不知終能有所濟否今年有古田林君擇之者在此相與講學大有所益區區稍知復加激厲此公之力為多也遺説向來草草具稟其間極有淺陋踈脫處都不蒙一掊擊何耶前日伯修書有欽夫所論數條甚精試一思之當有發耳大率吾曹之病皆在淺急處於道理上才有一説似打得過便草草打過以故為説不難而造理日淺今方欲痛自懲革然思慮昏窒巳甚不知能復有所進否左提右挈之所助深不能無望於尊兄也所喻孔明於管樂取其得君以行志此説恐未盡欽夫論瞻權兼將相而不能極諌以去黃皓諌而不聽又不能奉身而退以冀主之一悟兵敗身死雖能不降僅勝於賣國者耳以其猶能如此故書子瞻嗣爵以微見善善之長以其智不足稱故不詳其事不足法也此論甚精愚所不及不知高明以為如何所借書悉如所戒但易傳無人抄得只納印本去此有别本遂留几間可也知言所傳巳借出却借得一本在此看本欲轉以上內然所借書巳多一目之力何能遽及無乃有妨精思坐進之功耶熹蓋宿有此病者今未能除然巳覺知是病矣西山集前便恐有浮沉不敢附今付來人其間大有可疑處未暇論也答何叔京承喻及味道堂記文惕然若驚比既敬諾安敢食言然須少假歲月庶幾賴天之靈或有少進始敢措辭耳金聲玉振不知當時寫去者云何近嘗思索更定其説始亦以為無疑矣比再閲之又覺有礙更望相與探討異時各出其説以相參驗亦進學之一方也道理無窮思索見聞有限聖人之言正在無窮處而吾以其有限者窺之關鎖重重未知何日透得盡耳自占之説甚不足較然舊説本之商賈似亦無害若農民則先王制民之産自有常度不待自占然後知其豐約矣所謂掊斗折衡者恐非先王之法以舜之盛德猶以同律度量衡為先孔子亦言謹權量審法度夫豈以掊折為可耶度量權衡天理至公之器但操之者有私心耳以其操之者私而疾夫天理之公是私意彼此展轉相生而卒歸於大不公也近事久不聞春間龍曽皆以副帥去國英斷赫然中外震懾而在廷無能將順此意者今其黨與布護星羅未有一人動姦竪在途亦復遲遲其行亦豈尚有反豫之望耶倚伏之機未知所決雖在畎畝竊不勝過計之憂不審高明以為如何答何叔京奉親遣日如昔但學不加進鄙吝日滋思見君子以求切磋之益而不可得日以憒憒未知所濟也向來妄論持敬之説亦不自記其云何但因其良心發見之微猛省提撕使心不昧則是做工夫底本領本領既立自然下學而上逹矣若不察於良心發見處即渺渺茫茫恐無下手處也中間一書論必有事焉之説却儘有病殊不蒙辨詰何耶所喻多識前言往行固君子之所急熹向來所見亦是如此近因反求未得箇安穩處却始知此未免支離如所謂因諸公以求程氏因程氏以求聖人是隔幾重公案曷若默會諸心以立其本而其言之得失自不能逃吾之鑒耶欽夫之學所以超脫自在見得分明不為言句所桎梏只為合下入處親切今日説話雖未能絶無滲漏終是本領是當非吾輩所及但詳觀所論自可見矣諸葛之論乃是以春秋責備賢者之法責之於瞻不薄矣春秋褒死節然亦有不書者甚多取舍之間必有微意思之未精考之未遍不敢輕為之説請俟它日也惟微者心也復者所以傳是心也若滔滔汩汩與物競馳而不反亦何自見此而施精一之功乎有對無對之説誠未盡善然當時正緣好是懿德而立文耳如易所謂元者善之長元豈與善而二哉但此善根之發逈然無對既發之後方有若其情不若其情而善惡遂分則此善也不得不以惡為對矣其本則實無二也凡此數端據愚見直書逺求質正又疑孟之説尚有未盡之意輒因來教引而伸之别𥿄具呈更有二假擇之前日為説甚精偶其還家未得寫內旦夕附便致之也今此所論且望不吝痛加反復幸甚近日狐鼠雖去主人未知窒其穴繼來者數倍於前巳去者未必容其復來但獨斷之權執之益固中書行文書邇臣具貟充位而巳其姦憸者觀望迎合至謂天下不患無財皆欣然納之此則可憂之大者其它未易以言既也北虜責歸降甚急豫之則失信生亂不豫又慮生釁隙未有以應之然廟堂之議斷然不豫但上近者損八十萬緡築揚州之城羣臣之諌不聽其附會贊成者遂得美遷觀此邊事亦不能久寧矣根本如此何以待之可慮可慮答何叔京所喻疑義大抵諸説一槩多病蓋於大本處未甚脫然見得所以臆度想象終亦有差如云持志則心自正心正則義自明又云能體認之則為天德又云心性仁義之道相去毫髮之間此語尤有病心者發而未動及論鬼神能誠則有感必通此數條皆句句有差不知何故如此豈偶思之未熟耶大學之序格物致知至於知至意誠然後心得其正今只持志便欲心正義明不亦太草草乎性天理也理之所具便是天德在人識而體之爾云能體認之便是天德體認乃是人力何以為天德乎性心只是體用體用豈有相去之理乎性即道心即仁語亦未瑩須更見曲折乃可心者體用周流無不貫徹乃云發而未動則動處不屬心矣恐亦未安也鬼神之體便只是箇誠以其實有是理故造化發育響應感通無非此理所以云體物而不可遺非為人心能誠則有感應也此等處尚多人事冗迫不容詳遣布此稟亦已草略且舉大綱而老兄思之可也仍恕僣易幸甚又聞嵩卿之賢好學得聞其餘論尤以為喜此道知好之者日衆孤陋真有望矣幸為道意未敢率然拜書也所欲細論者甚多不知何日得會靣也所欲文字偶在城中無緣取內然博觀草草徒費心目之力不若就一處精思之為有益也如仁字恐未能無疑且告録出孔孟程謝説處反復玩味須真見得則其它自可見恕性等説皆不待别立説也嵩卿是韓子之言固失之而老兄所論亦未盡得博愛之不得為仁正為不見親切處耳若見親切處則博愛固仁者之事也試以此意思之如何博施濟衆一假不知嵩卿如何看恐更須子細也答何叔京今年不謂飢歉至此夏𥘉所至洶洶遂為縣中委以賑糶之役中間又為鄰境羣盜竊發百方區處僅得無事今早稻巳熟雖有未浹洽處然想無它虞矣對接事變不敢廢體察以為庶幾或可寡過然悔尤之積打不過處甚多即以自懼耳自老兄南去日以為念讀來書知志不獲伸細詢來使乃盡知曲折此朋友之責也夫復何言謹巳移書漕臺且為兄求一差檄來建邵到即又徐圖所處因此且可暫為寧親之計亦急事也今日所向如此但臨汀深僻王靈不及當愈甚爾朝政比日前不侔矣近又去一二近習近臣之附麗者亦斥去之但直道終未可行王龜齡自夔府造朝不得留出知湖州又不容而去今汪帥來且看又如何上以薦者頗力又熟察其所為其眷佇少異於前矣然事係安危未知竟如何耳熹無似之蹤不足為輕重然亦俟此決之耳欽夫臨川之除薦者意不止此亦係時之消長非人力能為也近寄得一二篇文字來前日伯崇方借去巳寄語令轉録呈其間更有合商量處也前此僣易拜稟博觀之敝誠不自揆乃蒙見是何幸如此然觀來喻似有未能遽舍之意何耶此理甚明何疑之有若使道可以多聞博觀而得則世之知道者為不少矣熹近日因事方有少省發處如鳶飛魚躍明道以為與必有事焉勿正之意同者今乃曉然無疑日用之間觀此流行之體𥘉無間斷處有下功夫處乃知日前自誑誑人之罪蓋不可勝贖也此與守書册泥言語全無交涉幸於日用間察之知此則知仁矣所欲言甚衆不欲久稽來使草草略具報如此殊不盡懷向蒙垂示先大夫易集義得以伏讀竊窺觀象玩辭之意知前輩求道之勤蓋如此不勝歎仰顧恨不得執經門下躬扣所疑三復遺篇徒深感悵昨承見索以在府中不得即歸內今謹封識以授來人至幸檢納不勝幸甚上蔡語録上卷數假極親切暇日試涵泳之當自有味不必廣求愈令隨語生解不得脫灑耳答何叔京一出五旬而後反歸來隨分擾擾未得開卷歲月逝矣天理未明物欲方熾每得朋友論辨之書為之愧汗不能巳未知終何以自脫於小人之歸也幸閭里粗寧老幼平遣雖貧悴日甚且復推遷官期亦未及區區甚憚此行欲俟暫到復為請祠計若不獲命始當奉來教以周旋敬夫相為謀亦如此也竊承深以去親為念又歎從仕之害其所學浩然有歸與之志此固吾人之所同然仕州縣者遷就於法令之中猶或可以行所志之一二仕於朝者又不復有此但知其不可而冒進自處便不是了更無可説此所以徘徊之久而重於一行也承喻溫厲之説不記當時如何及之若直以厲為主誠可謂一偏之論矣或恐以氣質之偏而欲矯以趨中則有當如是者亦不為過矣然聖人之溫而厲乃是天理之極致不勉不思自然恰好毫髮無差處要須見此消息則用力矯揉隨其所當自有準則不至偏倚矣不然正恐如扶醉人也來教所謂聖人所以處中似非本旨更告詳之伯崇近得書講學不輟似亦稍進但為偷兒入室夜囊為之一空亦非貧者所宜遭也寄示答問六條得以見邇來用功處然鄙意多所未安輒敢條析以求訂正亦未敢自以為是也宗禮之亡可傷不知後來所學如何似未能脫去禪學也今朋友間資質如此人亦不易得惜其止於此耳答何叔京示喻所以居官之意甚善昔范巽之問政於橫渠橫渠告之曰尊所聞力所及願尊兄益充此心則力之所及𥘉亦無限量也來使云頗招得流亡復業及募得新民願受一㕓者此最厚下固本之良䇿然更有方便與寬得一兩項泛科亦久逺之利來者必益衆矣如何聞新倉使鄭景望甚賢或可告語耳熹奉親粗遣官期巳及再𬒳堂帖趣行然區區本志巳不欲往而近見交親入仕於朝無不失其故步學力未充深有此懼巳遣書丐祠矣萬一不遂或當一行但單行非所安迎養又不便只此一節便自難處其曲折又有非逺書所能致者答何叔京熹蒙喻堂記悚仄之深此固所不敢忘者但題目大未敢率爾措辭意欲少假歲時尚冀學有分寸之進而後為之庶有以窺測先志之一二而形容之不為虛作耳區區此心更望垂察幸甚幸甚知言一册納上語録程憲未寄來也所疑記善足見思索之深然得失亦相半别𥿄具稟其詳向者瞽説固不能無病來誨反復深啓蒙滯所未安處亦具别𥿄更望提耳幸甚幸甚和篇之喻非所敢當正此沉綿未有以為計何睱救人之疾乎尹氏解無終食違仁處蓋夲明道先生之言而失之明道云純亦不巳天德也造次必於是三月不違仁之氣象也又其次則日月至焉此是三等人人心私欲道心天理此亦程氏遺言中間疑之後乃得其所謂舊書中兩假録呈有未然者更告指喻答何叔京自此至知覺言仁共五假一云與王子合來教云天地之心不可測識惟於一陽來復乃見其生生不窮之意所以為仁也熹謂若果如此説則是一陽未復已前别有一截天地之心漠然無生物之意直到一陽之復見其生生不窮然後謂之仁也如此則體用乖離首尾衡決成何道理王弼之説便是如此所以見闢於程子也須知元亨利貞便是天地之心而元為之長故曰大哉乾元萬物資始便是有此乾元然後萬物資之以始非因萬物資始然後得元之名也仁者心之用心者仁之體此語大有病程子巳嘗闢之矣其下文乃有榖種之説正是發明闢此之意今引榖種為説而立論乃如此非惟不解程子所闢之意竊恐并榖種之意而不明也答何叔京熹所謂仁者天地生物之心而人物之所得以為心此雖出於一時之臆見然竊自謂正發明得天人無間斷處稍似精密若看得破則見仁字與心字渾然一體之中自有分别毫釐有辨之際却不破碎恐非如來教所疑也性情一物其所以分只為未發巳發之不同耳若不以未發巳發分之則何者為性何者為情耶仁無不統故惻隱無不通此正是體用不相離之妙若仁無不統而惻隱有不通則體大用小體圎用偏矣觀謝子為程子所難直得靣赤汗下是乃所謂羞惡之心者而程子指之曰只此便是惻隱之心則可見矣孟子此章之首但言不忍之心因引孺子入井之事以驗之而其後即云由是觀之無惻隱羞惡辭遜是非之心則非人也此亦可見矣知覺言仁程子已明言其非見二十四卷蓋以知覺言仁只説得仁之用而猶有所未盡不若愛字却説得仁之用平正周遍也答何叔京盡心知性知天言學者造道之事窮理盡性至命言聖人作易之事樂天知命天以理言命以付與言非二事也五十而知天命亦知此而巳矣知只是知得此道理𥘉無它説不知命無以為君子此知命字真與知天命不同程子嘗言之矣存心養性便是正心誠意之事然不可謂全在致知格物之後但必物格知至然後能盡其道耳體會非心不見橫渠本語未曉其説至誠之至乃極至之至如至道至德之比惟精惟一固是敬然如來諭之云却殊不端的精一二字亦有分别請并詳之九德之目蓋言取人不可求備官人當以其等耳豈德不可僣之謂耶洗心聖人玩辭觀象理與心會也齋戒聖人觀變玩占臨事而敬也明德統言在巳之德本無瑕垢處至善指言理之極致隨事而在處蓍以七為數是未成卦時所用未有定體故其德貟而神所以知來卦以八為數是因蓍之變而成巳有定體故其德方以知所以藏往卦惟三易有之皆筮法也若灼龜而卜則謂之兆見於周禮可考也安土者隨所遇而安也敦乎仁者不失其天地生物之心也安土而敦乎仁則無適而非仁矣所以能愛也仁者樂山之意於此可見無妄災也説者似巳得之不知所疑者何謂却望批誨耕災固必因時而作然對穫畬而言則為首造矣易中取象亦不可以文害辭辭害意若必字字拘泥則不耕而望穫不災而望畬亦豈有此理耶建牧立監與巡狩之義並行不悖祭天朝諸侯躬巡撫之意皆在其中矣先王之政體用兼舉夲末備具非若後世儒者一偏之説有體而無用得本而遺末也時習三省固未為聖人成德事然亦不專是𥘉學事也蓋通上下之言耳答何叔京公羊分陜之説可疑蓋陜東地廣陜西只是關中雍州之地耳恐不應分得如此不均周公在外而其詩為王者之風召公在內而其詩為諸侯之風似皆有礙陳少南以其有礙遂創為分岐東西之説不惟穿鑿無據而召公所分之地愈見促狹蓋僅得今隴西天水數郡之地耳恐亦無此理二南篇義但當以程子之説為正邶鄘衛之詩未詳其説然非詩之本義不足深究歐公此論得之罪人斯得前書巳具報矣不知看得如何此等處須著箇極廣大無物我底心胸看方得若有一毫私吝自愛惜避嫌疑之心即與聖人做處天地懸隔矣萬一成王終不悟周公更待罪幾年不知如何收殺胡氏家録有一假論此極有意思深思之如何倬彼雲漢則為章于天矣周王夀考則何不作人乎遐之為言何也此等語言自有箇血脈流通處但涵泳久之自然見得條暢浹洽不必多引外來道理言語却壅滯却詩人活底意思也周王既是夀考豈不作成人材此事巳自分明更著箇倬彼雲漢為章于天喚起來便愈見活潑潑地此六義所謂興也興乃興起之義凡言興者皆當以此例觀之易以言不盡意而立象以盡意蓋亦如此答何叔京後書所論持守之説有所未喻所較雖不多然此乃實下功夫田地不容小有差互嘗與季通論之季通以為尊兄天資粹美自無紛擾之患故不察夫用力之難而言之之易如此此語甚當然熹竊觀尊兄平日之容貌之間從容和易之意有餘而於莊整齊肅之功終若有所不足豈其所存不主於敬是以不免於若存若亡而不自覺其舍而失之乎二先生拈出敬之一字真聖學之綱領存養之要法一主乎此更無內外精粗之間固非謂但制之於外則無事於存也所謂既能勿忘勿助則安有不敬者乃似以敬為功效之名恐其失之益逺矣更請會集二先生言敬處子細尋繹自當見之答何叔京持敬之説前書亦未盡今見嵩卿具道尊意乃得其所以差者蓋此心操之則存而敬者所以操之之道也尊兄乃於覺而操之之際指其覺者便以為存而於操之之道不復致力此所以不惟立説之偏而於日用功夫亦有所間斷而不周也愚意竊謂正當就此覺處敬以操之使之常存而常覺是乃乾坤易簡交相為用之妙若便以覺為存而不加持敬之功則恐一日之間存者無幾何而不存者什八九矣願尊兄以是察之或有取於愚言耳所喻旁搜廣引頗費筋力者亦所未喻義理未明正須反復鑽研參互考證然後可以得正而無失古人所謂博學審問愼思明辨者正為是也奈何憚於一時之費力而草草自欺乎竊謂髙明之病或恐正在於此試反求之當自見矣答何叔京持敬之説前書巳詳稟矣如今所喻先存其心然後能視聽言動以禮則是存則操亡則舍而非操則存舍則亡之謂也由乎中而應乎外乃四針序中語然此一句但説理之自然下句制之於外所以養其中方是説下功夫處以針語考之可見矣若必曰先存其心則未知所以存者果若何而著力邪去冬嘗有一書請類集程子言敬處考之此最直截竊觀纍書之諭似未肯於此加功也豈憚於費力而不為邪答何叔京示喻根本之説敢不承命但根本枝葉本是一貫身心內外元無間隔今曰專存諸內而略夫外則是自為間隔而此心流行之全體常得其半而失其半也曷若動靜語默由中及外無一事之不敬使心之全體流行周浹而無一物之不遍無一息之不存哉觀二先生之論心術不曰存心而曰主敬其論主敬不曰虛靜淵默而必謹之於衣冠容貌之間其亦可謂言近而指逺矣今乃曰不教人從根本上做起而便語以敬往往一向外馳無可據守則不察乎此之過也夫天下豈有一向外馳無所據守之敬哉必如所論則所以存夫根本者不免著意安排揠苗助長之患否則雖曰存之亦且若存若亡莫知其鄉而不自覺矣愚見如此伏惟試反諸身而察焉有所未安却望垂教也太極中正仁義之説玩之甚熟此書條暢洞逹絶無可疑只以乾元亨利貞五字括之亦自可盡大抵只要識得上下主賔之辨耳答何叔京伏蒙示及心説甚善然恐或有所未盡蓋入而存者即是真心出而亡者亦此真心為物誘而然耳今以存亡出入皆為物誘所致則是所存之外别有真心而於孔子之言乃不及之何邪子重所論病亦如此而子約又欲并其出而亡者不分真妄皆為神明不測之妙二者蓋胥失之熹向答二公有所未盡後來答遊誠之一段方稍穩當今謹録呈幸乞指誨然心之體用始終雖有真妄邪正之分其實莫非神明不測之妙雖皆神明不測之妙而其真妄邪正又不可不分耳不審尊意以為如何潘君之論則異乎所聞矣其所誦説環溪之書雖未之見然以其言考之豈其父嘗見環溪而環溪者即濂溪之子元翁兄弟也歟元翁與蘇黃逰學佛談禪蓋失其家學之傳巳久其言固不足據且潘君者又豈非清逸家子弟耶清逸之子亦參禪雖或及識濂溪然其學則異矣今且據此書論之只文字語言便與太極通書等絶不相類蓋通書文雖髙簡而體實淵慤且其所論不出乎隂陽變化修巳治人之事未嘗劇談無物之先文字之外也而此書乃謂中為有物而必求其所在於未生之前則是禪家本來面目之緒餘耳殊不知中者特無偏倚過不及之名以狀性之體假而所謂性者三才五行萬物之理而巳矣非有一物先立乎未生之前而獨存乎既沒之後也其曰執曰用曰建亦體此理以修己治人而巳矣非有一物可以握持運用而建立之也通書論中但云中者和也中節也又曰中焉止矣周子之意尤為明白其後所謂立象示人以乾元為主者尤為誑誕無稽大槩本不足辨以來教未有定論故略言之因來誨諭幸甚幸甚答何叔京心説巳喻但所謂聖人之心如明鏡止水天理純全者即是存處但聖人則不操而常存耳衆人則操而存之方其存時亦是如此但不操則不存耳存者道心也亡者人心也心一也非是實有此二心各為一物不相交涉也但以存亡而異其名耳方其亡也固非心之本然亦不可謂别是一箇有存亡出入之心却待反本還原别求一箇無存亡出入之心來換却只是此心但不存便亡不亡便存中間無空隙處所以學者必汲汲於操存而雖舜禹之間亦以精一為戒也且如世之有安危治亂雖堯舜之聖亦只是有治安而無危亂耳豈可謂堯舜之世無安危治亂之可名邪如此則便是向來胡氏性無善惡之説請更思之却以見教答何叔京承示近文伏讀一再適此冗中未及子細研味但如云仁義者天理之施此語極未安如此則是天理之未施時未有仁義也而可乎心性仁愛之説所以未契正坐此等處未透耳竊意不若云仁義者天理之目而慈愛羞惡者天理之施於此看得分明則性情之分可見而前日所疑皆可迎刃而判矣答何叔京天理既渾然然既謂之理則便是箇有條理底名字故其中所謂仁義禮智四者合下便各有一箇道理不相混雜以其未發莫見端緒不可以一理名是以謂之渾然非是渾然裏面都無分别而仁義禮智却是後來旋次生出四件有形有狀之物也須知天理只是仁義禮智之總名仁義禮智便是天理之件數更以程子好學論首章求之即可見得果然見得即心性仁愛之説皆不辨而自明矣答何叔京未發之前太極之靜而隂也巳發之後太極之動而陽也其未發也敬為之主而義巳具其巳發也必主於義而敬行焉則何間斷之有哉主敬存養雖説必有事焉然未有思慮作為亦靜而巳所謂靜者固非稿木死灰之謂而所謂必有事者亦豈求中之謂哉真而靜是兩字純一無偽却只説得真字仁是用功親切之效心是本來完全之物人雖本有是心而功夫不到則無以見其本體之妙故熹向者妄謂人有是心而或不仁則無以著此心之妙以此故爾非謂旋安排也但著字差重耳然舍此又未有字可下只此似亦不妨若下句則似初無病仁是用功親切之效此句有病後别有説心主於身其所以為體者性也所以為用者情也是以貫乎動靜而無不在焉以此言之已似太粗露了何得更為無著莫乎孟子雖多言存養然不及其目至論養氣則只以義為主比之顔子便覺有踈闊處程子之言恐不專為所稟與氣象蓋所學繫於所稟氣象又繫於所學踈則皆踈密則皆密唯大而化之然後不論此耳雨木冰上溫故雨而不雪下冷故著木而冰答楊庚書論存心明理主敬窮理兩假意好然無總攝却似相反使人不知所先後要之須説二字交相養互相發而操存者為主乃分明耳答作肅書所謂性理之本此語未安夫本對末之名也今以性為理之本然則以理為性之末可乎所引元者善之長為比亦不類元在衆善之先故為衆善之長與此文意自不同也呂與叔云中者道之所由出程子以為若謂道出於中則道在中內别為一物正令日之異同也覺與動字固不同然覺字須貫動靜而無不在若睡覺之喻則是動靜分屬性情只留得中間些子欲動未動處屬心也與前所謂心無時不在者亦自相矛盾矣又云心情亦可通言而又云情即心也此皆未安又難作肅云性者理之會是性本無須待理會於此方以為性此亦非也所謂理之會者猶曰衆理之總會處爾又所引率性之謂道亦正是吕氏之説熹向説此三句語雖未瑩然却是程子意見東見録試參考之或有取爾又云所以言性理之本以其一源也此亦未安體用是兩物而不相離故可以言一源性理兩字即非兩物謂之一源却倒説開了餘巳見答作肅書出母有服所論得之記得儀禮却説為父後者則無服此尊祖敬宗家無二主之意先王制作精微不苟蓋如此子上若是子思嫡長子自合用此禮而子思却不如此説此則可疑竊意檀弓所記必有失其傳者云能不改樂仁便在此亦未安唯仁故能不改樂耳云敬久則誠誠者忠信之積此語恐未安光武雖名中興實同創業所立廟制以義起之似亦中節不審果何如更望參訂也餘論皆當向見胡明仲侍郎論李固事亦正如此也答何叔京人之本心無有不仁但既汩於物欲而失之便須用功親切方可復得其本心之仁故前書有仁是用功親切之效之説以今觀之只説得下一截心是本來完全之物又却只説得上一截然則兩語非有病但不圓耳若云心是通貫始終之物仁是心體本來之妙汩於物欲則雖有是心而失其本然之妙惟用功親切者為能復之如此則庶幾近之矣孟子之言固是渾然然人未嘗無是心而或至於不仁只是失其本心之妙而然耳然則仁字心字亦須略有分别始得記得李先生説孟子言仁人心也不是將心訓仁字此説最有味試思之顔孟氣象此亦難以空言指説正當熟讀其書而玩味之耳體用一源者自理而觀則理為體象為用而理中有象是一源也顯微無間者自象而觀則象為顯理為微而象中有理是無間也先生後答語意甚明子細消詳便見歸著且既曰有理而後有象則理象便非一物故伊川但言其一源與無間耳其實體用顯微之分則不能無也今曰理象一物不必分别恐陷於近日含胡之弊不可不察天命之謂性有是性便有許多道理總在裏許故曰性便是理之所會之地非謂先有無理之性而待其來會於此也但以伊川性即理也一句觀之亦自可見矣心妙性情之德妙字是主宰運用之意又所引孝德之本雖不可以夲末言然孝是德中之一事此孝德為本而彼衆德為末耳今曰性理之本則謂性是理中之一事可乎又云天下之理皆宗本於此則是天下之理從性生出而在性之外矣其為兩物不亦大乎記得前書所引程吕答問者似巳盡之更乞詳考光武之事始者特疑其可以義起耳非以為正法當然也所論立伯升之子以奉私廟此最得之但成哀以下即陵為廟似巳允當蓋彼皆致寇亡國之君又未嘗命光武以興復自不當更立廟於京師也如漢獻帝晉懷帝又不同蓋昭烈元帝嘗受二帝之命矣此等事乃禮之變節須精於義理乃能於毫釐之間處之不差若只守常執一便不相應如溫公伊川論濮園事之不同亦可見矣龜山人欲非性之語自好昨來胡氏深非之近因廣仲來問熹答之云云此與廣仲書隨其所問而答之故與今所諭者不相似不能盡録然觀來教謂不知自何而有此人欲此問甚緊切熹竊以謂人欲云者正天理之反耳謂因天理而有人欲則可謂人欲亦是天理則不可蓋天理中本無人欲惟其流之有差遂生出人欲來程子謂善惡皆天理此句若甚可駭謂之惡者本非惡此句便都轉了但過與不及便如此自何而有此人欲之問此句答了所引惡亦不可不謂之性意亦如此答何叔京示喻必先盡心知性識其本根然後致持養之功此意甚善然此心此性人皆有之所以不識者物欲昏之耳欲識此本根亦須合下且識得箇持養功夫次第而加功焉方始見得見得之後又不舍其持養之功方始守得蓋𥘉不從外來只持養得便自著見但要窮理功夫互相發耳來喻必欲先識本根而不言所以識之之道恐亦未免成兩截也主於減者以進為文主於盈者以反為文中間便自有箇恰好處所謂性情之正也此固不離於中和然只喚作中和便説殺了須更玩味進反之間見得一箇恰好處方是實識得中和也學仕是兩事然却有互相發處毋不敬是統言主宰處儼若思敬者之貌也安定辭敬者之言也安民哉敬者之效也此只言大綱本領而事無過舉自在其中若只以事無過舉可以安民為説則氣象淺迫無􅉼畜矣敬則心有主宰而無偏系惟勿忘勿助者知之體物而不可遺今人讀此句多脫却可字故説不行當知鬼神之妙始終萬物物莫得而遁焉所謂不可遺也窮盡物理然後好善如好色惡惡如惡臭故必知至而後意誠答何叔京雖曰未學吾必謂之學矣天下之理有大小本末皆天理之不可無者故學者之務有緩急先後而不可以偏廢但不可使末勝本緩先急耳觀聖人所謂行有餘力則以學文者其語意正如此若子夏之論則矯枉過其正矣故吳才老病其言蓋有見於此者來喻之云却似未領其意唯呂伯恭謂才老蓋以記誦為學者故其言雖若有理然其意之所主則偏矣此論為得之蓋意偏論正自不相妨也三年無改於父之道來喻云父或行有不善子不為則可矣何改之有熹謂不為便是改聖人之意正要於此處之得宜耳此章之指𥘉不為有國家者設也大意不忍改之心是根本處而其事之權衡則遊氏之説盡之試詳考之可見龜山之説施於此章誠非本文之意然其所謂不忍死其親者恐與之死致生之病不同幸詳之小大由之當依伊川説但人自少時即讀屬下句故今乍見其説突兀耳平心味之自見歸著省無限氣力也若屬下句即上句説不來又與知和而和意思重疊信近於義來喻云信必踐言則復言非信也此句熹所未曉蠟賔之問當時必有來歷恐傳者或失其真故其言不能無失耳伯恭夷齊之論大槩得之讓國之事若使柳下惠少連處之不知又當如何恐未遽飄然逺引也危論等語此或者道伯恭之言其間頗有可疑處故因書扣之而伯恭自辨如前所云耳隨時云者正謂或危或孫無不可隨之時耳若曰當視時之可隨與否則非聖人所謂隨時矣專心致志等語正是教人如此著力教者但務講明義理分别是非而學者泛然聽之若存若亡則亦何由入於胸次而有所醒悟邪仁愛之説纍書言之巳詳請更檢看更并仁義禮智四字分别區處令各有去著則自當見之不欲多言以取瀆告之咎也若如來喻則孟子惻隱之心仁之端也此語亦當有病當云公覺之心仁之端也乃為備耳如此立言有何干涉乎晦庵先生朱文公文集卷第四十閩縣儒學教諭王製校
