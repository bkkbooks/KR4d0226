body:
  text: 墓志銘嶽州史君郭公墓碣銘公姓郭氏諱份字仲質其先自吉水徙新淦曾祖亶祖麾皆不仕父彌約始仕有能稱至朝散郎以卒誄其行者皆當世逹官名士公幼沈敏能自力學問甫冠中進士第為辰州道州南雄州州學教授荆湖南路轉運司幹辦公事湖南自軍興治戰艦積材於埸久而腐敗相承募丁卒守視不已公白之臺毀材為薪歲省衣糧萬計官有羡緡數十萬議欲獻諸朝公曰此非可繼也使者為止醴陵有豪族取民田以治居室上流有古陂輒徙之田以蕪廢訟數十年不息公曰是不難辨以地比與圖視之一訊而決還陂於上流溉田如𥘉用轉運使黃鈞等薦得通判常德軍府事賜緋衣銀魚常德在湖北為望郡更二太守無善狀公至委曲扶持之靖獠干紀王師討之公主督運山行既艱而水道經若水寨遡流百餘里尤險惡漕幾不通公命輕裝淺舟水陸俱進軍用不乏師還第功遷秩擢守興國軍至郡承前守罪去之餘帑庾空乏北軍以廩假不時至或羣噪府下公奏留上供萬斛以寬郡計而申著令以戒有司凡給俸賜以下為先衆乃恱服未久以憂去免喪奏事闕下即日除知嶽州又積年勞轉朝散郎還至豐城暴得疾卒於館舍年五十有七公娶李氏再娶喬氏男曰蒙今為迪功郎新贑州瑞金縣東尉女二人長適彭浩前卒次未嫁公性純儉𬒳服如寒儒家人習慣不知為驕奢居官斂晦不為赫赫之名然所至為上官所推舉平時溫溫不妄喜怒及其遇事破姦發伏人亦不能回也公最樂義亦勇於有為有踈屬之女受鬻于人公聞之遽投牒遣幣贖而嫁之鄉人有旅死者公為棺斂歸其柩于家有舊同僚之官地逺貧不能行公為􅏻遣之雖靴𫀆巾幞之類畢具周人之急皆此類嘗因講治道以義役節目授其門人李伯賢令推行之自其鄉始今江西諸郡義役公實發之嘗謂門人曰九重有規恢之志而文武士不任其責寬恤令屢下而百姓無固結之心北軍就食東南布滿州縣無以善其後是三患也嘗因賜對建言常德當夷獠出沒之衝比年復有茶冦之警而屯兵財二百人不足用以彈壓湖北一道北𬒳邊南控溪洞多冦賊而城壁皆不治尤非所以備不虞者請以荆鄂千人戍常德而諸郡城惡者亟治之便又言獄者人命所繫故推吏賦祿厚而受賕輒以重法論至獄卒隂操木索笞箠輕重之權慘虐尤甚而今以無祿故為姦利者得從輕坐甚亡謂請詔有司議廪獄卒而重其法義倉歲賑矜寡孤獨甚厚然其惠偏於市井而不逮山谷請即鄉落寺觀分置居養院以活逺民之無告者蓋公雅有當世之志而於吏事尤不苟其所欲為固不止數事然即此而觀亦足以見其所存矣使究其用當如何哉天資樂善見當世德人莊士必慕與逰在長沙善故張侍講敬夫敬夫稱其靖端有守數為延譽諸公間居鄉厚今劉常州子澄子弟皆從之學有立志公沒而蒙愈自力於為善嘗以田二頃為義莊周貧族人以為猶用公平日之意也公卒以淳熙某年某月某日葬以九年正月乙酉墓在吉水縣同水鄉赤石潭之原蒙以子澄之狀來曰吾先君子甚高下風之義顧不幸不得卒其定交之願以死蒙又不孝無以慰其泉壤之思唯是表墓之碣未有以書敢介常州以請吾子惠而許之則為有賜於吾先矣豫聞其言而悲之讀其事狀又知公之為人如此亦恨前此之未始得從公遊也既次其事又作銘以系之銘曰端而靖足以有守敬而敏足以有為胡嗇於年不卒其施惟後有人克堂厥基我銘斯石以詔無期宜人王氏墓志銘右朝請大夫任公諱賢臣之妻宜人王氏明州慈溪縣人故朝奉大夫中書門下檢正諸房公事諱庭秀之女年十七歸任氏任氏世為眉山人後徙蔡州靖康之亂大夫公昆弟始奉其母魏國太夫人奔走南渡生理蕭然宜人嫁時􅏻甚厚盡捐以佐朝夕之用事太夫人盡愛敬甘旨無闕供無故未嘗輒去左右遇有疾衣不解帶粥藥嘗而後進與大夫公相敬如賔所以輔佐之者甚至大夫公嘗通守武昌久攝郡事前例攝事者受俸給與諸司問遺往來皆如真太守大夫公疑之以語宜人宜人曰異時貧甚宜不聊生亦且至今日矣今幸粗足何以是自汙為哉大夫公以為然皆謝不取大夫公歷守數郡晚歲奉祠以歸或以其精力未衰猶可以復仕而宜人深以止足為戒大夫公乃不行宜人治家嚴而有法歲時祭祀先旬月戒具至期齋肅每事必親雖疾亦強起中饋酒食之事蓋終身不以諉人教飭子孫甚嚴未嘗假以言色而視其飲食時其寒燠皆有條理遇下有恩意然敝衣袴亦不妄與既病猶治家事不廢中外肅然者十年以淳熙九年十一月三日卒享年子男三人璜宣教郎知江州德化縣事玠承務郎知臨江軍清江縣事皆先卒璋迪功郎袁州萬載縣丞女一人適通直郎通判容州程説之孫男七人希夷舉進士調迪功郎建寧府浦城縣主簿圖南迪功郎嚴州建德縣尉斗南應南鵬南摶南女三人璋希夷將以十年七月奉宜人之柩葬於邵武軍邵武縣長樂之原使其友方士繇𫐠宜人閥閲事狀來請銘豫先君子嘗與大夫公昆弟遊義不可辭而希夷士繇又皆嘗來學其言宜不妄乃刪取其大者而系以銘銘曰奉饋高堂恭敬止佐夫子治成厥美肅如嚴君秉周禮考終卜吉藏於此土平川紆山崛起長樂之樂詔孫子知南康軍石君墓志銘吾友石君子重諱某其先世為會稽新昌右族曽大父諱某不仕大父諱某避庚子之亂始居台州臨海縣後以遺逸召授右迪功郎以沒父諱某贈朝奉郎毋安人朱氏太宜人陳氏君幼端慤警悟不群年十二即自知刻意為學晝夜不怠年十八擢進士第丁外艱服除授左迪功郎郴州桂陽縣主簿會故參知政事李安簡公謫居郡下性嚴重不輕許可一見君深器重之授館其家日與論説前言往行勵以致逺之業常語人曰吾閲人多矣未有石君比者秩滿循從事郎調泉州同安縣丞天旱民飢縣白府請得蠲歲租如故事太守怒檄君杖主吏君移書太守曰杖一吏細事耳然其所繫則大民今皇皇無以為命縱不能救忍復箝其口乎守怒未巳遣幕府官按驗至則希守意以為不當蠲君爭益力部使者聞之因以其事諉君君既行視歸即揭榜喻民蠲之什九然後言府且亟召鄉吏閉廨中使鄉為一榜户列所蠲與其當輸之數既成立授里胥使走揭於其所於是上官不得變其説鄉吏無所逞其姦邑人便之改宣教郎知常州武進縣事民訟有數年不決者君一訊立辨雖姦民健猾者亦皆驚服愧謝而去它邑滯訟多請屬君以決郡守欲為寓客治第而屬役於縣其費且數十萬君不可曰吾為天子牧民豈為若人治第者耶且浚吾民之膏血以媚人吾不忍也守怒欲中以法掇拾亡所得會君有親嫌法當兩易君不顧求罷徑歸民數千人詣郡請留君不可則相與伺守出遮道號訴至有禠其襜帷者守不能禁君因更調南劒州尤溪縣待次家食三年雖貧不戚也至官吏以財匱請借民租君不答但日治稅籍凡民逃絶而田入見户者與鬻産而不能更其籍者皆正之又謹視其出內之際要為簡易以便民而吏不得以容其姦關市之征亦損其數於是官無苛擾農啇得職租入以時力役有序至有爭先為里正者縣故窮僻學校久廢士寡見聞不知所以為學君至即命其友古田林用中來掌教事而選邑子願學者充弟子貟始教之日親率佐史宿賔客往臨之因為陳説聖賢教學凡以為修已治人之資而非如今之所謂者聞者皆動心焉自是五日一往伐鼓升堂問諸生進業次第相與反復以求義理至當之歸貟外諸生數十或異邦之人皆裹糧來就學君視故學宫為不稱乃廣其規模新其棟宇市書萬卷買田數百畒以充入之既成為考古制舉鄉飲酒禮以落之於是士始知學而民俗亦變君又托其舊俗之不美者數事為文以訓飭之民皆傳寫誦習焉逺鄉有據險自豪不輸租賦數十年日與比鄉為仇敵者君為榜以喻之即斂手聽命輸賦解仇復與齊民齒民王某者有刑罪具獄上府吏以邀求不厭欲致之死君爭之不聽則請自對獄與吏辨代民死民乃得免歲大疫多治藥劑分遣醫者散之村落自為詩以勸之賴以活者甚衆及代去民或畫象祠之監察御史陳公舉善聞其賢薦之朝而君自從吏部選授福建路安撫司幹辨公事以去會丞相史公再入薦一時名士數人君復與焉有旨召對君辭不獲乃入見首陳人君之道與天同方天心至公故人君之心不可以有一毫之私因歷引時事以質之言甚剴切上皆然之差監登聞檢院未幾除將作監主簿尋改太常居頃之有所不樂因謁告歸省請得奉祠終養除知南康軍事將行而遭內艱未終制有詔舉材堪刺舉者吏部尚書鄭公丙以君對然君巳不及聞矣其卒以淳熙九年六月乙丑享年五十有五積官至朝散郎君為人外和內剛平居恂恂如不能言者而遇事立斷毅然有不可犯之色事繼母承順不違兄弟之間怡怡如也族黨有貧不能自活者買田捐金以振業之教其子與巳子等嫁孤女多得所歸道遇棄子募人母之月有給焉其為政一主於愛民而憂國之心又甚切於賢材之用舍政令之得失一有所聞憂喜之誠形於言色至或纍日不解然自處甚約自律甚嚴在州縣未嘗屈意上官在朝廷未嘗造請當路繇踈賤一旦見天子盡言竭忠未嘗少為迂回避就之計其為學自聘君朝奉時巳傳其業後更從舅氏太子詹事陳公良翰受書焉聞人之善必手記而心慕之其人可見雖少賤僻逺不憚其與豫遊相好尤篤也晚名其燕居之室曰克齋讀書其間沒身不懈後生執業就正者皆賴君知所鄉而君未嘗少自足也此其志豈可量哉豫前年守南康朝廷以君與豫善除以為代豫亦日夜望君至冀得用疲氓學子為寄而君不果來當年奉使浙東聞新剡飢民轉入台境甚衆亟以屬君君即慨然以為巳任其得免於飢凍捐瘠而歸者蓋數百人然其後豫以事至台則巳不及見君而哭其殯矣嗚呼悲夫君之配朱氏劉氏李氏皆贈安人薑氏封安人子男四人繼微繼喻繼善繼周女五人長適范籍次許嫁啇月卿餘尚幼君為文明白徑切似其為人然非有故未嘗作今有文集十卷藏於家所集周易大學中庸解又數十卷傳學者繼微等將以十二月庚申葬君龍谷山雲溪先瑩之側使來請銘時豫巳病歸卧故山念不得往而祖君之行也乃敘其事而銘之其詞曰豫悲斯人之病而莫與瘳也悼斯學之孤而莫與儔也又哀君之有志而久不酬也時若可俟而君不留也龍谷之城雲溪之宅詔彼茫茫不在斯刻榮國夫人管氏墓志銘故參知政事會稽李安簡公之配曰榮國夫人姓管氏其先齊大夫敬仲相桓公霸諸侯有功世祀於齊中徙秣陵後避五季之亂復徙處州龍泉縣久未有顯者及夫人之曽大父諱大忠以子師仁同知樞密院事贈太子少師始為郡著姓樞密之弟師醇贈承事郎生子時可以明經飭行為鄉里所宗逺近受業之士甚衆嘗有欲薦之朝者謝而不許竟不仕以卒鄉人皆以先生稱之後亦贈承事郎夫人其季女也生有淑德族姻稱其婉嫕李公聞而聘之時公方以侍御史言事謪官貧甚夫人入門泰然無纎芥不樂意後公復為時用入參侍從出殿藩維遂登廟堂位亞丞相祿賜豐矣而夫人處之以約食飲居處所以自奉者不少異於前日也從公守郡輒戒家人無得買官下一物在宣城時巨盜猝至攻圍甚急公方悉力拒守而夫人以免乳得疾危甚公以為憂夫人曰死生命也公冝一意捍賊無念我公壯其言厲氣循城賊為解去及公以忤秦檜謪嶺外遂浮海南居儋耳久不得還家留故里日復窮空夫人至斥賣簮珥以給用度身不肉食者十餘年而亦無甚戚戚也檜憾公不釋捕公子孟堅繫廷尉誣以私史遣吏索其家或以告曰夫人亦且逮矣闔門忷懼夫人獨夷然不為動曰禍福之來非可避就自是無愧斯巳矣巳而卒無它始夫人嫁不及舅姑以為恨歲時祠祀齋潔嚴敬凡滌濯烹飪之事必身親之比老愈篤諸子女多出元妃黃氏夫人獨生二男二女而撫愛均一人無間言公南遷時二男者皆方數歲夫人教之學既冠皆以文行稱公及見之喜曰吾自教之亦不過如是耳待諸婦如巳女遇左右寬而有節有所不及務掩覆之平居端莊靜一舉動有常度內外親黨皆法象其賢嘗從容語諸子曰凡人處心冝公待物冝恕吾雖不學然於此若有得焉行之終身不敢一日忘也蓋李公平生以剛直聞晚歲遭讒去國投荒蹈海九死不悔而夫人之德所以配之者如此亦可以無愧矣纍封縉雲郡夫人以淳熙二年二月某日薨享年七十有二十月丙申葬會稽縣太平鄉官漾之村後以子孟珍請貤所遷官以益封於是乎有榮國之贈子男五人孟博左宣教郎主管台州崇道觀孟堅右宣義郎提舉淮東常平茶鹽公事孟醇不仕皆先卒孟珍通直郎權發遣江隂軍事孟傳從事郎浙東提舉常平司幹辨公事女五人長適左朝散郎曹粹次適登仕郎陳汝楫次適進士陸權之次適承直郎沈程再適奉議郎章駒次適朝奉大夫潘時孫男八人知常從事郎早卒知微從事郎知言知易皆承務郎知退知孝知和皆未仕女十一人其四已適人曽孫男女各一人皆幼𥘉大理卿章貢曽公逢以女妻浙東從事深知夫人行事之實既為之狀將以請銘而未有所屬也曽公卒江隂使君乃以狀授熹熹既晚出又滯窮鄉不及升堂盡敬以觀夫人門內之治而曾公又先逹也𥘉不敢當顧先君子實嘗為安簡公所知則義又有不得辭者敬為之銘銘曰婦德之美維順以柔有以幹之其德乃修人曰夫人匪慈則孝我相其中不可屈撓貧安富節執禮勝私逢世之紛蹈險若夷維其堅剛以一其度俾易其艱以燕以譽惟公夫人合德殊施此內而安彼外以危要其所終兩絶慚悔匪篆匪辭曷詔冥昧朝請大夫李公墓碣銘右朝請大夫李公諱縝字伯玉濟州巨野人故駕部郎中贈太子少傅諱景山之曾孫朝請大夫贈少師諱瑑之孫而參知政事贈太師諱邴之嗣子也公之家自少傅之第四子樂靜先生諱昭玘者學於高郵孫公覺眉山蘇公軾之門文甚高而廉靜樂道不求人知仕元祐及建中靖國中為起居舍人至太師公遂以文字行中朝有重名於政宣之間及參建炎大政又以忠節為詔所褒退而老於江海之上餘二十年當世益高仰之公生有竒質警悟絶人年十二三時賦盆池詩有疑與月相吞之句故相何桌日人人一見嗟賞既長益自植立務記覽為詞章其言奧雅靚深有非一時文士所及者而深自閉匿惟恐人之或知也性至孝事大師公及毋和國夫人油油翼翼無故未嘗輒去左右雖近出數里必取期以還少以父任輔承務郎監南嶽廟差充福建路轉運司幹辨公事再除轉運司主管文字公以去親逺不欲行太師公強遣之至官竟不一歲兩易主管敦宗院以歸未幾丁內外艱服除連丐宗官舊秩及為崇道祠官退處于家不復有仕進意蓋方是時秦丞相檜當國猜暴叵測故家大族一罹飛語無不糜碎公雖棲遲冗散猶懼不得脫於是益務濳晦息絶交遊雖親戚少見其靣如是纍年人亦莫測其意也買園居第之東結廬種樹翛然其間自號萬如居士而為之傳其詞曰居士少知讀書通訓詁不能洽浹如當世儒者然亦無所不讀其於授受必以義接物必以誠徑情直行不屑毁譽雖仕宦連蹇不遂視一時儕輩官尊祿厚而不肯一動其心為敦宗凡三十年官不易而家益貧常誦其先訓曰與其有求於人曷若無欲於已與其使人可賤不若以賤自安以是當官及家居未嘗求人知而人之知之者常出於意外少慕阮思曠尚子平之為人既孤買宅東隙地僅五畒為屋數楹植花數十本竹百箇而置常所閲書數十卷朝夕徜徉於其間雖金石絲竹之音姬嬙環珥之飾車馬旌旗之列五鼎方丈之食不以易其樂性懶甚不喜為文酒酣興發時為詩以舒懷至其得意擊節慷慨自以為未後於古人性謹密而胸次蕭然無所適莫顧不喜與俗子語稠人廣坐或終日不交一談而藜杖幅巾率然乘興訪高人勝士於間暇時談世外法至或忘歸間問祖師西來意旨僅識其趣不能悟解也其胸懷本趣蓋如此然知公者猶以為文不足而實有餘也秦丞相死衆賢稍稍登用丞相陳魯公雅知公推挽甚力而不能致乃白以為通判福州事而公巳病矣連帥汪公應辰亦知公賢禮敬之且不欲煩以事公曰食焉而怠其事豈吾心哉力請得復奉祠以歸居二年而卒時年五十有六隆興二年十二月某日也公娶趙氏寶文閣待制思誠之女再娶馬氏中大夫安仁之女皆封宜人子男二人諌承務郎爽慧秀發年甫十三而讀書作文有兼人之功公竒愛之不幸蚤卒公哭之哀久而不能平也訥今為從事郎福州長樂縣主簿女四人其壻右通直郎徐樗文林郎劉珫進士周庭實承信郎陳時可孫男一人啓宗將仕郎始公葬太師公泉州南安縣石鼓山而指其北百餘步曰此吾之所歸也卒之明年三月某日訥奉公柩藏焉又集公所為文十卷梅百詠一編藏于家熹之先君子大史公嘗獲從太師公遊而辱知焉及熹試吏泉之屬邑又得拜公函丈每白事府下退輒詣公公必為置酒留連竟日論説古今商略文字皆極其趣下至吏道物情利病纎悉亦無不盡至於有所難言則其悼歎閔惻之情未嘗不鬱然見於眉睫之間熹以是知公非真無意於世者意公猶且進而有為也後三十年再至溫陵而拜公墓則其木拱矣俯仰今昔為之流涕蓋不唯荒煙野草之悲亦以重歎公之終不遇也於是訥狀公行來請銘熹不得辭乃為銘曰右史之德沖靖淵默太師之文泆為忠勳公承厥家克篤其慶惟德與文既積而盛胡不逢遇逹于事功浩其永歸閟此幽宫萬如之篇公實自贊銘以昭之不遐有歎夫人虞氏墓志銘建陽縣崇政鄉百樂里有君子居焉曰左宣教郎江君諱琦字全叔以學行有聞所與遊多當世巨人長者沒而徽猷閣直學士胡公寅實銘之其夫人虞氏亦有賢德後公四十有一年卒其嗣子明將以淳熙甲辰二月庚申朔旦葬于其居里普光之原而使介子嗣奉書及承議郎同里賈君應之狀來請銘豫家建陽崇安間距夫人之居不百里蚤得與夫人二子遊因得講聞夫人之行事而竊高仰之獨恨未及進拜堂下而夫人沒今乃幸得託名立石以詔後世其何敢辭夫人諱道永字無盡本劉氏女其父處士某同産有適虞君恫者自夫人之幼而愛之携以歸鞠虞氏因冒其姓少長聰明識義理不樂為世俗華靡事往來兩家愛敬曲盡恩義兩得兩家父母皆憐之擇其配以歸江公入門時舅姑年皆甚高禮法峻整諸婦少得當其意者獨夫人左右奉承禮無違者凡調胹烹飪之事既躬服其勞而薪火之節亦必謹候視務為敏給以稱微指既進饋則又退屏側立踧踖以聽唯恐小不中度至或隂儲它饌以備更索雖在亂離顚沛乏絶之中亦必多方營致不使有纎芥不滿之意皇舅朝奉公年九十餘每語人曰是善事我其居家事夫教子皆有法度閨門之內肅然以莊雍然以和江公性剛直居官遇事有可否必極力論辨人有過失至靣質責之夫人視其或過甚者輒從容諷解江公敬焉江公沒時諸子皆幼夫人年甫四十以禮法自將持守門户教督諸子親授經訓歲時薦享細大必親江公從官時先疇之入恣兄弟衣食無所問既沒夫人命諸子悉推與之且别其籍曰此前人之志也虞君老且失子夫人歸養益謹送其終哀戚甚蓋不沭浴不鹽酪者三年且為之選於宗人以奉祀而歸其資産江公女兄適人既老且貧夫人迎以歸厚其養給禮敬飭備十五六年不少懈既又為之室其子焉聞人之善如出諸巳見人疾病困窮閔惻調護唯恐不及性喜觀書讀易論語得其大意下至練養醫藥卜筮數術無不通曉平居處事詳練縝密與人言必依於孝弟忠信詞甚簡而理無不足族姻內外咸高其行服其言有疑必就咨焉事有難平者衆口方歡呶不解有告曰夫人之言如是則往往翕然以定晚學浮圖法一旦脫然若有會於心者即屏簪珥郤酒肉布衣𬞞食以終其身遭淳熙慶夀恩當得封諸子言於有司將上其事夫人聞之曰吾巳棄人間事何以此為且命而不謝是為欺君吾敢安乎竟留其狀不復上九年歲在壬寅夫人年八十矣一日語諸子曰我將行矣諸子驚遽呼醫進藥皆揮去曰母勞我蓋甘寢六日而沒三月十五日也子男四人曰渙曰明曰紹曰嗣渙紹早卒明嗣皆以文行知名嘗以選士貢京師孫男五人女四人賈君所狀夫人之行如此大抵豫所逮聞也蓋嘗竊謂夫人資稟高明器宇恢廓凛然有烈丈夫之操使其生於治古禮義隆治之時習聞姆師之誦以盡夫人倫物理之精微則其所以自立於世者詎止於此然今以其所就而論之則為子孝為婦順為妻正為毋慈嗇於奉而豐於施厚於義而薄於財於人之所以為人者亦幾可以無憾是則可不謂賢乎哉而世或以佛學稱之亦淺乎其為言矣為之銘曰士誦聖賢以沒其世孰不有聞鮮克身詣豈如夫人弗學而知知之所至其行亦隨俾究而窮曷內而外藉令不然亦寡其悔彼幽者禪此明者天有如不信訂此豐鐫篤行趙君彥逺墓碣銘淳熙四年冬十有二月戊寅崇道趙公善應卒于餘干私第之正寢明年葬縣東北華林岡後六年今少傳福國陳公乃大書其碣之首曰皇宋篤行趙君彥逺之墓於是趙公嗣子汝愚方以敷文閣待制知福州充福建路安撫使涕泣手疏使人奉其書及故荆州牧張侯栻鄂州守羅君願所序行實若狀兩通致之新安朱熹曰請得銘而刻于下方熹竊惟念平日所聞太宗皇帝之元子漢恭憲王實以至德高行為宋太伯後世雖屬籍疏逺爵秩䆮微然猶多法象其賢者蓋歷七世而得公則又以孝友仁厚𬒳服儒雅克篤于家而聞于邦卓然為宗室儀表雖士大夫之賢而有禮者皆自以為不及益教其子移孝為忠對䇿庭中無所諱避天子異之擢以為天下第一後歷館閣侍從奉使典州皆以風節惠愛有聞於時然天下不以賢其子而曰子直之能為此嗟乃其父之教也嗚呼其真可謂篤行君子者矣陳公之目之也豈虛也哉是法宜銘顧陳公書法之嚴巳足傳世而熹愚賤又所不當得為既禮辭不獲命則敬考其書而悉次第之蓋公之曽大父曰開府儀同三司建寧軍節度使建國公仲企者恭憲王之曽孫也實生東頭供奉官士慮供奉生成忠郎不求成忠娶濟陽朝氏生公公生於政和戊戌卒時年六十自建炎初輔承信郎八遷至修武郎歷監秀州崇德饒州餘干安仁縣景德鎮之酒稅潭州南嶽廟江南西路兵馬都監主管台州崇道觀卒後五年汝愚逢宗祀恩始更贈為通直郎公資純篤孝謹少時父病訪醫行禱暑不解帶遭喪不內勺飲既殯居廬啜粥既葬乃食菜果終喪比御猶弗入也事母益兢兢致養嘗以寒夜逺歸從者將扣門公遽止之曰無恐吾母為也露坐逹旦門啓而入以毋畏雷夜或聞雷必按衣走其所視門隙有光則扣而入否則屏立以待官薄食貧諸弟未製衣不敢製已製矣未服不敢服雖一瓜果必相待共嘗之諸妹逺嫁者極力致之相與娛侍親側內外諸孫合貴賤且百口菜羔疏食恩意均洽人無間言從姊妹之逺而貧者亦以令分俸給之遭母喪時年五十有五矣始侍疾時嘗刺血和藥以進至是哭泣嘔血毁瘠柴立終日俯首柩旁聞雷猶起側立垂涕凡食之可於口者不必酒肉衣之適於體者不必華采聲之悅於耳者不必音樂皆弗忍以身接雖其哭泣有時而哀痛之心無時忘也三年之外生朝必哭于廟有欲為禮者號泣向之其後纍年言每及親猶未嘗不揮涕晉陵尤袤延之見而歎曰古君子也父以肺疾終終身不忍以諸肺為羞母生歲直卯謂兔卯神亦終身不食也墓戶有不能事其母者觀公之為惕然悔悟遂以孝稱識度超曠不計有無平居自奉甚約而汲汲然惟以愛人及物為事故人許圭死家貧女無所歸公即聘以為次子婦嘗與台人蔣彝者同僚後至其鄉首問之則死久矣貧不克葬而子亦謀食于外即往哭之還其子豫資使葬它若是者不勝紀道見病者必收養躬為煮藥比愈或解衣遺之歲飢設器於庭每食先舍其半家人繼之則取以濟飢者其用心之微密至於夏不去草冬不破壤懼百蟲之遊且蟄者失其所也為人謙和坦易與人語惟恐失詞色至誼有不可則奮然無所顧雖以公族疏逺留落江湖而憂國之深如在廊廟聞當世進一善人行一善政則喜不自勝聞逺近或水旱則憂見顔色幸巳江淮之警為流涕不食者數日同僚有會飲者公獨悵然北望曰此豈諸君樂飲時耶衆為失色罷去好讀書所藏至三萬卷所著有唐書録遺三十卷幸庵見聞録三卷台州勸諭婚葬文一卷居家不設條約於子弟無所程督而躬行之實所漸漬而興起者甚衆居常稱曰欲學聖賢當消客氣灑掃應對是其入處也汝愚從屬籍冠多士國朝故事所未有人為公喜而公處之如平時及聞其入館適與莆田林光朝謙之同舍然後喜可知也於其守上饒而來迎也故不往一日呼二田夫肩輿濳入其境訪問民情閲信宿意無所忤因稍進至近郊人始知之其為人大略如此顧宗室之在右列者例不得為要官故其事業無以見於世至其濳德隱行與其志念之精微則人又有不得而言者嗚呼其真可謂篤行君子矣陳公之目之也豈虛也哉其配令人李氏丞相文正公七世孫家號西李司馬公所謂能守先法久而不衰者也方承平時宫宅婚姻皆勳侯貴戚公父子獨再世娶儒家令人明逹剛果居家以孝聞既嫁事姑如母嘗刲股以愈其疾公罷崇德歸時朝夫人尚無恙篋有餘金將出以獻而探之不獲蓋令人巳奉而致之姑矣服飾之具擇其新美以奉公諸妹而躬取其故敝者公既勤其家不吝一錢而令人安貧自力所以成公之志為多先公十二年卒葬縣西雕峰距公墓三十里所子男四人汝愚既為時名卿次汝拙承信郎汝魯保義郎汝思未仕亦皆斤斤謹質能守其家法女三人長適宣教郎逢維石次適將仕郎路希傅季未行也孫男十二人女七人而其長曰崇憲亦舉進士中其科云熹聞公之名蓋久而不及識居常以為恨今乃獲敘德美以贊誄事而附於陳公所書之石則既幸甚然每讀行實之書而於吕伯恭氏之言又未嘗不廢卷太息也因頗采其意銘以系焉銘曰漢邸之别去本而支心融迹泯世莫豫知建土分封再世弗振逮公而顯匪爵其仁孝不老衰惠不約弛忠不逺忘以卑厥子篤行之表華林之臯惟其不愧日逺彌高嗟爾後人益謹母怠出者難工德友所戒迪功郎致仕王君墓碣銘淳熙十有一年秋八月迪功郎致仕番陽王君彥暉卒冬十月葬其家山先塋之右既卒哭其子安墨衰絰走謁豫於建安潭溪之上拜泣且言曰安不天往歲失吾母東萊先生既不鄙辱而銘之今重不幸而失吾父則東萊亦既沒矣兄弟聚謀大懼不朽之託無所於歸敢使安也介東萊之文以為重而謀於下執事惟吾子之有以哀之也豫以病衰久廢筆硯四方知舊文字之屬所拒者無慮數十家既以例謝不能而視安之來布衣𬞞食重趼十舍踰越險阻蒙犯霜雪所以不死其親之意有非人所及者不忍使之徒手而歸也且吾伯恭父之病矣而亦既銘其母焉我其得辭之耶則應曰諾於是安乃出其友安逺節度掌書記章洙之狀以視豫曰王氏唐末避地始為饒州德興人中有名申甫者以能雅歌補郡博士弟子員晚歲教授縣東三十里所曰柘溪者樂其山水之勝郤諸生歲時脯修而易其地以居焉生四子其仲曰畿隱居自放里人髙之其後子孫益蕃昌遂盡有柘溪地人因以里名其家畿生之純之純生居立君居立之子也字子充少孤自植立以勤儉持家娶程氏生四男子曰賔曰安曰憲曰宗皆教之學斥家資為市書史聘師儒日釀黍為具博延四方名士使與之接雖殫貨詘力不計既而安業獨先就鄉里父兄賢之多遣子弟從之遊郡有司亦以其程試應書再送禮部未第會天子奉觴德夀宮勞賜耆老而君夫婦皆以安故相先後得官封君卒時年七十有二四子皆儼然服儒冠獨兩女前卒而孫男女巳十有四人矣君性修潔嚴重不苟所至必拂拭正席乃坐及將去猶徘徊周視乃行生平謹禮比老益虔鄉鄰慶弔必先雖幼賤必躬造族姻有喪戒門內毋食肉以屬親疏為日久近有差輕財好施樂成人之美人有未善苟知之必告雖以賈憎不自悔更為竊歎如巳憂其嫁薑氏二女事則伯恭父巳書之程氏之墓矣蓋君之志而其室有以相之也豫雖不及識王君然既嘉其子之能修身以幸於先生君子也又哀其能始終勤劇以覬顯其親於無窮也而既諾之矣今又觀於王君之行事如此蓋亦庶乎孔子所謂十室之忠信者是以三復其書而歎息焉因輯其事而詩之俾歸刻墓上既以表王君之德而又申伯恭父之遺意以厲其後之人其詩曰鹿鳴先生詩禮傳荒此柘溪祀邈綿逮君教子子能賢千里丐我銘君阡至哉我友授子言皇皇業業無窮年眇思所屬非華軒有能力此榮其先通判恭州江君墓志銘君諱介字邦直姓江氏曽大父時大父夢符父衍世居徽之婺源未有仕者至君始居饒之德興以鄉舉中第至通朝籍而贈其父宣教郎遂為德興人君少頴悟年十五六治舉子業鄉先生亟稱之君不自多一日讀程子書至水清性善之説喟然太息視平日所學不過為利祿有不足為者亟走謁衢州徐先生誠叟以書道其所志而請業焉徐讀書喜謂其徒曰此可與共學矣居數年而歸更以其説授學者多所興起初仕迪功郎興國軍司戶參軍先是受俸米者率倍其劵君獨不取其豫人也亦然郡將試以難事又皆從容以決遂以廉吏薦之升從事郎調隆興府進賢令將行會天旱民飢度比至官且不及事亟移文喻民廣殖牟麥民知君之愛巳也聞其且至爭相扶携拜迎馬首既至不暇燕饗倍道趨府極陳所以拯救之䇿甚備富民舒氏當出榖餘萬斛以糶而自請以緡錢輸府冀得免糶規賞君爭之力帥守龔公茂良不悅而君執議愈堅龔公始悟從君計而君不俟報巳先喻舒氏出其榖矣視飢民尤困憊者收養療洽賴以全活者甚衆既而旁邑官吏多以救飢受賞或喻君盍自言君曰民飢而令食之猶子飢而母乳之也敢幸賞乎會詔蠲民田半租君白部使者程公大昌曰常時輸租雖合勺之畸亦必使就盈數今若但減其半則全戶輸一升者名減五合而亦猶輸一升也若自全戶三升以下悉蠲之則貧民𬒳實惠矣程公以君語聞詔從之程公喜舉酒屬君曰君宰百里而惠加一路可謂仁人之言矣君始至官有旨新沿道廄置時民方飢瘁聞是令下欲相率逃去君喻以不得巳之故且為率溫户金伐道旁木徹廢佛屋以助其役民喜趨事而執牽者亦便安之未幾密院又頒新圖漕臺趣使改為甚亟君言前役未既後役復興民且不堪况廣西之馬歲不過三十綱綱不過五十匹新圖乃度為容二百四十匹者亦何為乎且馬之息耗在芻秣之盈虛今不察兵吏之盜其廪而必病民以豐其屋尤非分之所安也使者是其言縣得罷役而旁邑亦有賴以免者天子以連歲旱飢詔吏勑民修築陂塘以為之備吏惰不供而畏罪以希賞至有未嘗一施畚􅓩而以訖事告者君獨出入阡陌推上德意喻民以利害之實而身勸督之民感君誠意作治如法後雖惡歲猶得半稔君又深以獄事為巳憂籍逃田收其租為繫囚食飲醫藥之費言於憲臺而刻其事於石暇日延見學子教以孝弟忠信亹亹不倦且祠唐故隱者崔君於學以風勵之改宣教郎知興國軍永興縣事君舊為郡掾習知其俗到官移書諸臺為陳五事一曰稅重之弊二曰準衣之弊三曰續起上供之弊四曰纍年不放水旱之弊五曰魚池榷稅之弊其言明白懇切覽者動心然卒無有能行之者盜劫民尹惠政家殺其奴而逸尉恐負課脅惠政使自誣為殺奴者知君不可欺賂吏移鞠軍獄君條其可疑者九事毅然以去留爭之惠政乃得免永興田多水少君以水種豐凶不可期則兼課陸種立賞勸募父老傳誦至於感泣天申錫宴舊例百物皆取之民吏緣為姦費且數倍君白太守和市豫直民甚便之郡當通衢使客接踵而力役不均有一歲而數役者有終身不一行者君至始為籍以均之他所以便民者多此類也轉奉議郎四川總領司主管文字總領主餉大軍平時未嘗與民事至是東川大飢君言於其長太府卿李公昌圖請得庫之羡錢往賑之李公以為然得緡錢五十四萬以行漕米勸分極力拯救既又盡蠲𬒳災郡縣田租而以所賫官錢代輸水浮陸走衝冒暑暍至感疾以歸而果合昌普廣安數郡之民爭繪像立祠以報其德金州民千餘家以負茶租逮繫笞箠十餘年不得釋君一旦白除之無不鼓舞感泣而去遂寧守李公燾聞之以書遺君曰公兩邑之政可比古之循吏而見於文字者又皆如絲麻榖粟之有用於世今來佐饋軍而幕府施設有忠厚之稱蓋賢者之助多矣秩滿將歸而諸使者留之使從外銓調輔通判恭州事非其志也因以檄書至武昌巳事而歸舟次江陵則不幸而以疾卒矣卒時年五十八淳熙十年十二月二十一日也君為人誠慤敦重不妄言笑意所與合開心見誠即與異趣雖對之終日如未嘗有人少時貧窶䄈褐不完而處之怡然不妄以一毫取諸人也喪親毀瘠甚事兄敬愛有過人者自奉省約而周贍族姻甚厚徐先生之喪為位以哭遇諱日為却酒肉以報居官廉直不可屈撓孜孜焉以愛民為事興利除害如巳嗜欲至於身之利害則未嘗有毫髮顧藉意也於上官有所不合爭辨反復詞旨慷慨始雖小忤然以其發於誠心卒多聽納或遂為知巳如龔公尤相愛重還朝欲薦之迫銓法當試邑不果君於聽訟折獄察見底藴而風喻開誘卒多歸於仁恕所治兩邑獄空皆歲餘它日道出其竟民老稚相携持羅拜道周有屑涕扶與而不去者送之或越竟而後反君為文不務雕刻而辨説縱橫詞氣卓犖曲盡事理有玉汝堂集藏於家君之配孺人胡氏子男四人元恭仲恭叔恭懿恭女二人其壻舒竦汪升之也君卒之明年元恭等乃克以君柩還里中又明年二月壬戍遂反葬於婺源瀛山大田之原元恭以豫之與君善也使君門人程端蒙狀其行事來拜泣請銘其事皆子素所聞者且哀君之命止於此而不得盡其用以厚其澤於吾民也為之銘曰學以為巳仕以為人廉直不撓有志必伸惠滿一同溢于四鄰士飽餘功野殍懷仁才雄氣剛一言萬鈞退省其私嗛嗛恂恂宜登天朝正色垂紳嬰鱗折角卒惠我民云胡不弔隕于中身欲考其德訂此墓文從事郎監潭州南嶽廟劉君墓志銘淳熙十二年夏六月二十三日從事郎監潭州南嶽廟建安劉君平甫卒于家豫往哭之再三其兄子學雅與諸孤學古等遂以墓銘為請豫初嘗受學于平甫先君子之門因得與平甫相長大其後平甫諸兄遊宦四方平甫多家居不從以故豫於平甫又獨得久相與於今四十有餘年矣然豫長平甫八九歲又以勞悴早衰而平甫優遊強健雖少年有不及豈意今乃反哭平甫而遂銘其藏哉顧與平甫遊最久而知之深莫如豫者不忍辭也平甫名玶建之崇安縣人屏山先生諱子翬之子而贈太師文安忠顯公之孫也忠顯公以忠義死國著名靖康建炎之間國史有傳生三子長曰寶文閣直學士贈少傅諱子羽而屏山先生其季也少嘗一仕為莆陽郡丞秩滿即稱疾奉祠以歸樂道著書十有七年而卒其書皆傳世平甫以少傅公幼子為之後輔官餘三十年亦未嘗一日仕州縣雖其邂逅不遭事有適相似者抑其家法之傳亦有自也蓋平甫自始仕即為南嶽祠官嘗調諸路提點坑冶鑄錢司幹辦公事福建路安撫司凖備差遣皆未及赴而以省員罷最後從兄忠肅公強使出為注官得邵武軍司戶參軍則平甫山林之趣巳成不能俯首從吏役矣亦會忠肅公薨平甫遂決長往之計力請諸公復得為祠官超然自放以殁某身蓋其年少時氣甚豪自再直廢省即自知其不偶而先廬屏山之下前帶潭溪館宇靚深竹樹蒙密顧而樂之不忍去也因以暇日廣其觀遊種木疏泉上下澗谷竟日不厭自以為退隱于家兼農圃漁樵之役而隨緣閲世復善修身又庶幾古人日損日益之意則自名其室曰七者之寮而刻文壁間以志其目中葬其妻武夷東南十里許即預卜夀藏其旁因山田闢臺館以逹于溪上良辰勝日往來兩山之間弦琴觴酒屬客賦詩其樂雖與人同而其習聞先君子之遺風餘韻與夫當世之儒先長者之雅致泯然有以會於其心而適於其身至於不知爵祿之可懷勢利之可悅則人有所不能及也天資孝友事世母慶國夫人及忠肅公甚謹服其喪皆過禮嗣主家政聚族衆多而法度修整恩意均洽少有逸才而不肯事舉子業賦詩甚敏而工然亦未嘗深留意也為人簡易跌宕衣冠食飲取具無所擇而搜輯先世遺文軼事纎悉無遺聚書教子校讐課督皆有程品為州縣董社倉斂散為帥司賑貧民舉子者詢究利病鈎校簿書其夙夜之勤居官者有不及鄉人德之而論者於是乃知平甫非漠然無意於世者於其死也莫不哀之以為使得試用所立當何如也平甫娶同郡范氏直祕閣如圭之女無子而撫愛諸子如巳出事慶國夫人孝愛尤篤苟可以巳其疾雖體膚無所愛也先平甫十六年卒平甫有六男七女學古迪功郎泉州同安縣主簿學博將仕郎學圃尚幼而學正學箕學稼皆出為諸兄後其次女亦嫁而夭云平甫卒時年四十八葬以是歲十二月十二日墓在范夫人塋東十有八步其銘曰嗚呼平甫寧其材之不信而不忍其志之詘也寧其躬之不燕而不忘其鄉之恤也幔亭之南其川奫淪岡􅍶崒也生樂其遊死銘其丘彌百世而不殁也贑州趙使君墓碣銘淳熙十二年十一月某日知贑州軍州事朝請郎趙公某卒於官明年二月某日歸葬所居邵武軍城西南樵嵐山其友沅州吕使君勝巳實銘其行內壙中而其弟善傑以書來曰仲兄之志蓋常欲有以自見於當世今不幸蚤死未有以償其平日之願士友之相知者莫不痛之其所以告諸幽者既雖幸有沅州之文矣而所以表其墓上使百世之下過者讀之而想見其為人則未有託也仲氏蚤從張荆州遊而晚交於子子其哀之豫發書慨然曰吾交於佐卿固久而自其守贑知之始深今其弟以是為屬其何可辭蓋始佐卿赴鎮時嘗以書來問政所宜先豫以所聞告之佐卿至官未幾往來者稱其政不容口久之乃來告曰嚮所聞者至是訪之皆如言既一二罷行之矣顧所以病吾民者猶不止於是也如某事如某事吾代而歸將以告於上而革之則一方永久之利也豫聞之喜甚蓋不獨為佐卿喜又為贑人喜也然未久而聞佐卿之訃則又為之悲歎出涕而不能巳佐卿素強健至是暴得疾頃刻遂不可救州人聞之驚布啼號老稚相扶携走哭府下皆失聲退相與畫其象而祠之嗚呼是豈人力之可為者耶因考吕使君所記則曰公六世祖商恭靖王某我宋太宗皇帝之第子也曽祖仲開府儀同三司贈太師追封成王祖士訔舉進士中第未仕而卒父不衰武經郎福建兵馬鈐轄贈朝散郎母滿氏太碩人鈐轄公恬淡寡欲太碩人名家子有賢行閨門肅穆為士大夫所稱公天資闓爽好學遊庠序有聲名同業者皆自以為不及以宗室子試有司連中其科初輔承節郎改授左承務郎知南劍州將樂縣丞簽書武安軍判官廳公事差通判鎮江府未赴改知泰州徙知常德府以家難不行及是為贑州踰年年甫五十有二而遂以卒嗚呼是可哀巳其佐湖南軍時帥張公孝祥深知之沈公介亦竒其材遂與轉運副使黃公鈞合章薦之為郡奉法愛民以勤儉自約飭不妄費公家一錢干請無所應雖有挾而至者不為動也在贑遇旱禱祠賑貸必盡其力節遊宴罷士木勸民藝麥瀦水寬諸縣逋負損市人酒課人甚便之常時州郡别以使臣掌牙兵公罷之而歸其職於兵官責以嚴紀律謹訓練未幾營部肅然吏士皆可用鮮犯禁者舉吏必先寒畯權貴請屬皆置不問吏服其公於是州人相率以其治行數十言於使者之臺公聞亟喻止之曰太守德薄政荒不能布宣聖天子寬六之詔使旱至此父老不以為有罪則巳幸矣何善之可稱父老其亟歸教子弟孝於親弟於長忍小忿敦大信使太守之政為能善其俗者則父老之賜厚矣天暑道逺母苦父老為也聞者感歎益相告戒母違公令在長沙從張敬夫遊受其學以歸其後待次遭憂間居纍年尋繹舊聞講習不倦而尤究心於易築室所居之南朝夕讀書其間疏泉種樹有以自樂其於進退得失之際有未數數然者人亦不意其夀之不永而遂葬於此也初娶王氏福建安撫參議康功之女再娶黃氏湖南轉運判官洧之女皆先卒子男一人汝掖尚幼公沒三年太碩人故康寧而伯氏龍閣公數典巨藩亦以寬惠見紀蓋其家法傳有自云豫惟公之志雖未克大施於時而二邦之政所以及人者巳廣以其地逺且無門人故吏之記故不得書其與子書諭贑事者又逸不存而不得附見以俟後之君子則子於此不獨為公恨之又為贑人恨也為書其事使以刻於其碣且為之銘銘曰於皇上聖哀此下民吏壅其流澤吟以屯惟時若人有聞于古肆其所臨霂若膏雨章貢之間禾黍油油公胡遽歸樵嵐之丘我銘其阡用勸來者毋以惠文易此章甫郭德誼墓銘東陽郭君德誼之墓新安朱熹銘之其詞曰才百夫之特而身不階於一命志四方之逺而行不出乎一鄉然而子弟服師儒之訓州閭識孫弟之方霍然其變豪俠之窟煥乎其闢禮義之場是則其思百世而長勿替繩之有永彌昌夫人許氏墓碣銘夫人許氏其先太嶽之後在三代為薑姓國於陳鄭之間其後子孫居高陽者為望族中徙丹陽又徙永嘉至唐宋有令瓌者仕江左為集賢院學士貶山陽令謫居建州關隸鎮因家所謂梧桐村者關隸今為政和縣而梧桐之許特盛其散漫四出者無慮數百家猶以天祐保大譜牒相傳世次尚可考也夫人父名瓞娶同郡丘氏丘亦儒門令族故夫人生而靜淑治絲枲針縷皆過人生十九年嫁邑士黃君朝佐嫁八年而卒嘗生一女失之又生一男曰石才二歲而夫人屬疾自度且不起指以屬其姑曰新婦即死願以是兒為託然教之必嚴勿以其無母而厚於慈也使其幸而有立則新婦為不亡矣既而石長遊太學有聲稱遂擢進士甲科以歸中外長老始相與傳誦夫人臨絶之言而歎其識之逺也夫人始葬屋山之東遭亂不保再遷得某鄉某里延福僧舍之左右嘗教授某州學又教授敦宗院丞紹興之上虞年甫若干以末疾致其事自從政郎特遷通直郎賜緋衣銀魚以還故里豫一日過之見其病雖廢而神氣不衰出故鄂州教授吳君特所狀夫人世系行實一通泣語豫曰石生不幸不及識吾母無以解終身之憂猶冀行身不辱有以卒顯吾親於無窮也今病若此恐又不克其志且墓道之銘未立吾子其有以哀之語未既復感慨嗚咽泣數行下豫亦悲不能仰視亟許諾受書而出不忍無以慰其心也乃序而銘之銘曰夫人系家出高陽世祀有牒存餘唐睨化罔怛音琅琅教而弗愛後以昌賢乎孝哉逺弗忘我最其實崇斯岡潘氏婦墓志銘新海門尉金華潘友恭以書來曰友恭少受室于榖熟之王氏於今十有五年矣與之俱從家君以適南海而不幸疾病以沒二親哭之過時而哀友恭亦不自勝其悲也惟王氏婦自居家時事親孝親愛之年十有九而嫁移所以事親者事舅姑舅姑亦愛之處娣姒長幼之間肅穆無間言御下寬而有節為人簡靜莊重恭儉信實於婦功不少懈然不務為纂組華靡之習所以謹嫌微安貧約又有人所難者喜讀論語大學中庸孟子諸書略通大義每語人曰吾嘗自省終日之間承上接下幸無一失然後得以退休而少安此意日新而未巳也淳熙丙午某月某日卒年甫三十有三今將以其柩歸葬會稽上虞之徐山惟先生幸哀而與之銘則猶足以少慰也王氏曽祖甡光祿大夫祖令洙朝議大夫父琮奉議郎母孺人潘氏王氏歸友恭生子曰履孫用家君奏輔將仕郎年十有三矣豫昔從友恭尊君湖南公遊見其施於官者治友恭兄弟皆來學見其飭於身者嚴履孫七歲侍立王父之旁見其視聽專一而進趨有度今讀友恭之書而以是質之知其婦之賢不疑也為之最其語而銘之曰越江之潯徐山之阜孰藏斯丘恭叔之婦匪婦則然是實良友我銘卑之百世其久宣教郎方君墓志銘豫始仕為泉州同安主簿得莆田方君德明而代之一見傾倒如舊相識既去聲問往來無虛月間以其詩遺豫語亦清麗奧博非常人所及也豫後數以檄書往來莆中君必為豫置酒留連𣢾曲其後數年豫以病不能事奉祠里中而君來為建獄掾又得相見握手道舊如平生歡又二十年而豫復以事至莆則君塜上之木巳拱矣其子注來見且為豫泣出君州里世系官閥之狀一通請銘君墓豫固悲君之不遇而又歎交舊之零落蓋凡三十餘年之間而同安寮友所繼所同無一人在則不忍辭而受其書以歸顧以病未及作而注數使來請其詞益悲乃出其書而敘之蓋方氏之先有諱某者始家莆田六子官皆通顯遂為郡著姓君其第五子禮部郎中仁逹之八世孫也父諱母林氏君諱士端少苦學年十八以鄉薦試南省不利益務記覽不顓為舉子業以授室宗邸輔登仕郎試吏部復高選授右迪功郎調主同安簿攝尉得盜當受賞棄不顧遂為建寧府左司理參軍改宣教郎知福州福清縣事福清故號難治令多以罪去君始至慨然以公勤自勵曰是豈不可為哉然不一歲竟亦以公事免君不戚戚歸家日治具召賔友飲酒賦詩以相娛樂後雖以恩得還舊秩而君巳無復仕官意矣乾道六年閏月八日遂以疾卒年四十五夫人濮國趙氏武略大夫士㚍之女後君三年亦卒淳熙乙未乃得合葬於楓嶺三山之原子男三人注清汪皆業進士而清嘗以承節郎試禮部與汪皆蚤卒女四人其壻林瓘林叔子鄭鐸季未行也孫男女各四人皆幼嗚呼君之才不後人而仕竟不偶既退而休矣又不得永終夀考以遂其優遊間適之願是可悲夫為之銘曰猗君之才足以自奮仕而不遭樂亦無悶乘除有數奚又不年尚覆來者百世之延晦庵先生朱文公文集卷第九十二候官縣儒學訓導劉簪校
