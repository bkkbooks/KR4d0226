  text: 晦庵先生朱文公文集卷第六十一書問答一本作知舊門人問答
  hash: sha256:ae9c02f71f76f67fa0d4853a9ed27334665e50606f0184e313404e40a29d57af
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0226_SBCK_061-1a}
body:
  text: 答林德乆至示喻進學之意甚善甚善從事於此自當有味但畏間㫁不接續爾然續與不續其機亦在我而不在人也答林德乆收歛之喻足見信道之勇然須博約相資方有進歩處而讀書之法又只是要專一乆自見功難以歳月期速效也易說大槩多與啓蒙相出入但後數條旁通衆說亦有功俟更徐考奉報然旣知其無取自不必深究王輔嗣所謂縱或復值而義無所取此一言切中事理中間亦嘗有數語論之後便寫寄也向在玉山道間見徐彦章說離爲龜故卦中言龜處皆有離象如頥之靈龜損益十朋之龜以其卦雖無離而通體似離也頥六爻損自二至上益自𥘉至五此其求之巧矣然頥猶取龜義而無取於離損益則但言其得益之多而義亦不復繋於龜矣今乃不論其所以得益之故以爲求益之方而必窮其龜之所自來亦可謂枉費心力矣大學歸來不暇整理蓋此等多因朋友辨論間彼此切磨說得細宻今無事時自作文字却有搜索不到處因暇試爲追記前日所論便中示及或便可用也昨在王山學中與諸生說話司馬宰令人録來當時無人劇論說得不痛快歸來偶與一朋友說因其未喻反復曉譬却說得詳盡因并兩次所言録以報之試取一觀或有助於思索也答林德乆殿記正以病思昏塞不能有所發明爲愧斯逺書來疑一兩處巳報之矣恐更有未安且更商量未可便入石也彭書荷留意此公之去深爲可惜今外廷尚得諸人扶持未至甚有過事但本根之慮外間無由知其深淺令人憂歎耳所喻日用功夫甚慰所望但云一著力便覺多事此恐未然此心操舎存亡只在瞬息間本不須大叚著力然又不可不著力如此乆之自然見效若如此論竊恐非晚定須别求捷徑矣窮理亦無它法只日間讀書應事處毎事理㑹便是雖若無大頭段増益然亦只是積累乆後不覺自浹洽貫通正欲速不得也易象說似未條暢所論小過中孚先儒之說却似未爲過也熹所論别𥿄録去然其大意不過欲姑存而未論耳後書所疑不知後来看得曉然未耶熹嘗愛韓子說所以爲性者五而今之言性者皆雜佛老而言之所以不能不異在諸子中最爲近理蓋如吾儒之言則性之本體便只是仁義禮智之實如老佛之言則先有箇虚空底性後方旋生此四者岀來不然亦說性是一箇虚空底物裏靣包得四者今人却爲不曾曉得自家道理只見得它說得熟故如此不能無疑又纔見說四者爲性之體便疑實有此四塊之物磊塊其間皆是錯看了也須知性之爲體不離此四者而四者又非有形象方所可撮可摩也但於渾然一理之中識得箇意思情狀似有界限而實亦非有墻壁遮欄分别處也然此處極難言故孟子亦只於發處言之如言四端又言乃若其情則可以爲善之類是於發處教人識取不是本體中元來有此如何用處發得此物出來但本體無著莫處故只可於用處看便省力耳所引程子之言乃暢濳道本前輩疑其間或非先生語以今觀之誠是不精切也所論春不可以包夏秋冬亦未然若如所論則是元字是揔說下靣須更添一字與亨利貞别爲四徳矣豈理也耶禮智二字當時只是漫說𥘉無緊要然亦不可不理會得今但以四時觀之即自可見也中庸游楊說得不精切不必深求中庸對高明而言是就事物上說各要得中而平常正是三千三百底事安得不謂之小凡此類更熟味之自見意思也目盲作此數𥿄巳極費力未能盡鄙意如更有疑遞中附數字來子細反復此處正好劇論也答林德乆目盲益甚它疾亦浸劇辭免未報且爾杜門無足言也新齋巳略就而學子至者終少難得頴悟可告語篤信肯用力之人兀坐殊憒憒耳賢者斆學之功當日有緒見讀何書有可啇量者便中示及一二爲幸答林德乆新齋雖就而竹木未成隂學者居之多不安然今歳適有科舉之累來者亦無多人又病中無氣力不能與人劇論甚覺負其來意也疑義兩𥿄各巳奉報鬼神之說只且如此涵泳聖賢諸說乆自分明不必穿鑿疆作見解也持敬之云誠如所喻此是最緊切處大病之餘又苦目昏讀書不得兀坐終日於此甚有味也界限之說亦是要見得五者之在性中各有體叚要得分辨不雜不可說未感時都無分别感物後方有分别也觀程先生沖漠無朕一叚可見矣德脩王丈逝去甚可惜雖其所講未甚精到然朴厚誠實今亦難得此等人也答林德乆所示疑義各附鄙說於其後近覺向来所論於本原上甚欠工夫間爲福州學官作一說發此意欲寫奉寄以斯逺亟欲附家報未能辦俟後便也中庸章句巳刻成尚欲脩一兩處以或問未罷亦未欲出次第更一兩月可了大抵日困應接不得專一工夫今又目盲尤費力爾不知天意如何且留得一隻眼了些文字以遺後來亦是一事今左目巳不可治而又頗侵右目矣伊川曰性中只有箇仁義禮智而巳曷嘗有孝悌來事親從兄雖人之良能論性之體則仁義禮智所謂孝悌乃仁之發見者未知是否伊川所以謂仁主於愛愛莫大於愛親伊川先生固曰仁性也孝悌用也此可見矣夫子温良恭儉遜伊川以爲盛徳光輝接見於人者也學聖人者其德性當如何涵養恐是持敬爲先否持敬固是本原然亦須隨事省察去其不如此者因不失其親二程先生謂信恭因不失親近於義禮横渠先生謂不失親於可賤之人當從何說横渠得之但全章文意却微有病吾十有五而志于學一章伊川以爲且爲學者立下一法所以勉進後人横渠以爲行著習察則皆聖人進徳次序二說不同未知孰是今讀集註是其日用之間必有獨覺其進而人不及知者因其近似以自名所謂近似之說未能盡曉此三說未須理會只且就自巳分上點檢不思而得不勉而中中庸皆以爲誠之事𥘉無節次以耳順爲不思而得不踰矩爲不勉而中所謂不思不勉有十年工夫未知如何同上欲是聖人作用處否妄意聖人所謂從心所欲蓋自志學至此則純是義理心之所欲即道體流行自不踰乎天則莊老猖狂妄行蹈乎大方立脚處義理皆差彼所謂大方豈眞法度也未知是否欲字分明聖人作用處却難曉如此解經轉見迷昧矣猖狂妄行便是不依本分了上蔡曰聖人未嘗無思故有所欲未嘗放故不踰矩聖人之心澹如止水體用未嘗相離竊意無思收與放恐是學者分上事上蔡語無病四十而不惑伊川曰明善之徹又曰言不惑則自誠敢問不惑巳至誠之地位否若横渠言不惑則於功用上見二說如何二先生之言未嘗有異更宜玩索由誨汝知之乎竊意子路勇於進其於學問恐欠深濳密察之功故夫子誨之者如此上蔡謂死生之說鬼神之情狀爲學者當知千歳之遠六合之外爲學者所不必知死生鬼神之所以然非窮神知化者不足以與此夫子嘗告之以未知生未能事人正子路從事於功用之間豈強其所未易知者恐非誨其務實之意不必如此說上蔡之說且以文意論之巳自不是也巧言令色鮮矣仁諸儒皆以爲其心未必不仁志在於善而失其所習與若實之以君子之徳雖巧令未爲過竊意巧令者務恱於人失其本心甚矣若如諸說恐離心迹於二而容恱於外者曰吾心不如是也可乎諸說蓋爲鮮字所惑又爲詞欲巧令儀令色所牽皆以詞害意之失故伊川先生直截說破云謂非仁也知巧言令色之非仁則知仁矣此足以破千載之謬矣伊川曰心具天德心有不盡處便是天德處未能盡何縁知性知天觀諸先生議論皆謂盡心而後知性知天而先生盡心第一章以謂知性而後能盡心與諸先生議論不同如孟子教人皆從心上用功不知先自知性始當從何處實下工夫敢告指教以文勢觀之盡其心者知其性也言人之所以能盡其心者以其知其性故也蓋盡心與存心不同存心即操存求放之事是學者𥘉用力處盡心則窮理之至廓然貫通之謂所謂知性即窮理之事也須是窮理方能知性性之盡則能盡其心矣至大至剛以直養而無害若直字絶句則直仍論氣之體若剛字絶句則直是養氣矣二者未知孰是如楊遵道録伊川語與龜山語録嫌將一物養一物之說則直爲絶句至常思之人心平氣定不爲私慾所誘氣之本體覺廣大不可屈一爲私意所撓則便有歉所謂直養而無害者是全義理去私慾否以直養而無害即上文自反而縮之意人能集義則無不直而氣浩然矣配義與道伊川謂以義理養成此氣合義與道又云既生得此氣語其體則與道合語其用則莫不是理義配義與道自養氣者而言或自養而既成者也龜山謂氣無聲之可名故難言之也而以道義配之所以著名也一似氣道義各爲一物姑借此以明彼爾尹和靖謂其爲氣也至大至剛以直其體則名曰道其用則名曰義學者能識之然後能養之則三者皆一事而氣爲之主兩說未知如何集註謂合而有助之詞亦未能盡曉併告開發集註說得分明更冝深考當見不敢曲從楊尹之意必有事焉而勿正二程多主於敬一說須當集義是承上文是集義所生者而言所謂必有事則積集衆善工夫否孟子上下文無敬字只有義字程子是移將去敬字上說非孟子本意也集註亦可細玩有子以孝悌爲仁之本孟子分事親從兄爲仁義之實義主敬或主於事之宜也以宜爲主而敬在其中故者以利爲本故者謂其本如是也或是巳然之故也謂其本如是則自其禀受之𥘉者觀之若巳然之故則必待端緒著見而後可也伊川謂必求其故者只是欲順而不害之謂所謂順利者得非中庸率性之道而人爲不得叅於其間耶又曰凡性之𥘉未嘗不以順利爲主則是性本順利不待矯揉成就也此只就性之本而言也至觀順𣏌柳之性與夫水無有不下兩章則性本善凡所謂不善皆拂其本也伊川二說恐參合看而後全也如龜山以故爲氣質之性竊類莊子去智與故之言蘇黄門亦有此說不知如何故者巳然之迹也如性之有仁義禮智不可得而見而惻隱羞惡恭敬是非則有巳然之迹矣然四者之發非有所矯揉而後成也非以利爲本耶楊蘇之說皆非是蘇之失尤甚此類須痛與辨析方見工夫孟子論三聖獨伊尹不言聞其風者亦不言其流弊如夷惠者何也豈以其樂堯舜之道於畎畒之中必待湯往聘之乃幡然而起行止近於聖之時也此恐亦偶然耳如所論者恐或亦有之也智聖一章自集大成也者以下舊見郷人陳先生說孟子教學者集大成門户故分智聖始終之事以示人謂其知有偏全則行亦有偏全必自致知而入也竊觀此章前言聖人之時後方兼明智聖始終之義獨言孔子者恐爲智聖功用而言也三子者或不足於知或知有所偏也如横渠謂聖者不勉而中不思而至似不特智之事也豈所謂智亦生而知之者否孟子此言固專爲孔子而發然亦可見三子欠闕處及學者功夫次第不少說教學者以集大成門戸及聖人之功用而言也集大成乃聖賢地位極至處豈有門户之可言然其所謂知有偏全則行亦有偏全必自致知處而入則得之矣孟子曰人無有不善水無有不下程氏謂善亦性也惡亦不可不謂之性也若指上文氣禀而言則如子越椒之生丗偶有之不應禀氣賦形有善惡存焉若指下文水就下而言則若有可使爲不善之意然濁水沙石非水本然也惡亦不可不謂之性此語未曉所指此章性字說得最雜有是說本性者有是說氣禀者其言水之下與水之清亦是兩意須細分别耳生之謂性一章集註以知覺運動者言也仁義禮智性也嘗觀釋氏之說止以知覺運動者爲性今其徒之說亦有以是靈靈昭昭者爲非者前此常𬒳其惑今析性與氣而言性之大本雖巳分曉更有疑處人賦氣成形之後便有知覺所有知覺者自何而發端又死之後所謂知覺運動者隨當與形氣俱亡性之理則與天地古今周流而無間横渠所謂非有我之得私者而有形聚成物形潰反原之說如何釋氏以謂覺性常存不受沉墜如其說誠有一物在造化之外老氏亦謂死而不亡至於聖人之於喪祭求諸幽漠如此其至者果有物無物耶知覺正是氣之虚靈處與形噐查滓正作對也䰟㳺魄降則亦隨以亡矣横渠反原之說程子盖嘗非之今東見録中不可以旣反之氣復爲方伸之氣此類有數條皆爲此論發也䘮祭之禮是因其遺體之在此而致其愛敬以存之意思又别若夫爲不善非才之罪也孟子謂人之才無有不善伊川謂性出於天才出於氣氣清則才清氣濁則才濁才則有善不善性則無不善其說似與孟子相反或四端著見處是才或所以能充拓者爲才也性旣本善則才只可爲善爲氣有不善故才有不善耳然孟子不論氣之病集注言之詳矣請更詳之君子不謂性命一章上言不謂性也下言有性焉上下言性不同恐上是氣質之性下是天地之性否横渠所謂形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉正本此意否以口之於味之屬爲性非專指氣質盖以理之屬於血氣者而言如書之言人心也中庸章句序中巳詳之可考大而化之之謂聖横渠謂大而化不可爲也在熟之而巳矣此則與易之擬議以成其變化同或說大猶有迹化無迹謂充實光輝者使泯然無形迹之可見竊疑與釋氏銷礙入空之說相似不知如何孟子說化字與易之變化不同後說得之然非銷礙入空之謂更分别之自可見矣横渠曰由太虚有天之名由氣化有道之名合虚與氣有性之名合性與知覺有心之名横渠所謂性者恐兼天地之性氣質之性而言否所謂心者併人心道心言否非氣無形無形則性善無所賦故凡言性者皆因氣質而言但其中自有所賦之理爾人心道心亦非有两物也忠信所以進徳終日乾乾君子當終日對越在天也蓋上天之載無聲無臭其體則謂之易其用則謂之神其命于人則謂之性率性則謂之道脩道則謂之敎孟子去其中又發揮出浩然之氣可謂盡矣故說神如在其上如在其左右大小大事而只曰誠之不可掩如此夫徹上徹下不過如此形而上爲道形而下爲器須著如此說器亦道道亦器但得道在不係今與後巳與人至竊謂此叚論至理徹上徹下本自完具𥘉無天人㣲顯之間誠敬者所以體當是理者也一不誠敬則㡬扵無物矣其能貫通而無間此終始專在誠敬上著力是否此是因解乾字乾字即是天字遂推言許多名字只是一理而各有分别雖各有分别又却只是一箇實理誠者實理之謂也非論人當以誠敬體當是理也中者天下之大本天地之間亭亭當當直上直下之正理出則不是唯敬而無失最盡至竊謂此叚論中之體直上直下無所偏倚發而中節雖謂之和而中之體固存所論出則不是者出謂發而不中節者否敬而無失持養於未發之前否出則不是蓋謂發即便不可謂之中也且如喜而中節雖是中節便是倚於喜矣但在喜之中無過不及故謂之和耳答林徳乆别𥿄所論敬爲求仁之要此論甚善所謂心無私欲即是仁之全體亦是也但須識得此處便有本来生意融融洩洩氣象乃爲得之耳顔子不改其樂是它功夫到後自有樂處與貧富貴賤了不相關自是改它不得仁智夀樂亦是功夫到此自然有此効驗來喻雖亦無病然語意終未親切活絡更冝涵養玩索更於仁智實處下工夫則久當自見矣酉室所聞未見全書恐是陳長方所記此只有震澤記善録乃淮郡印本想巳有之其間議論亦多可疑也答林徳乆近地敎官闕次必逺旣非禄養之冝又不更治民亦使人怠惰苟簡非所以磨厲器業似不若参選擬一近闕丞佐之屬爲佳也熹屏居如昨朋舊多勸謝客省事者亦嘗試之似難勉強又揀别取舎却恐反生怨怒不若坦懷待之若合須過嶺此亦何可避也答林徳乆待次閑中足得爲學未爲失計要之仕宦只合從選部注擬是家常茶飯今人干堂慣了不覺其非故有志之士亦不免俯首其間爲人所前却此可爲後来之戒也無事静坐有事應酬隨時處無非自巳身心運用但常自提撕不與俱往便是功夫事物之来豈以漠然不應爲是耶疑義巳略用巳意說釋其後恐有未安更望反復大抵似用意未精齩嚼未破也漢卿甚不易得想亦難得相聚也齋中自去秋後空無一人亦幸省事今復頗有来者然亦不多目前未見卓然可望也唯江西呉必大伯豊者相從累年明敏過人儘䏻思索從事州縣隨事有以及民而自守勁正不爲時勢所屈甚不易得今乃不幸短命而死甚可傷悼耳答林德乆熹􅍚病益侵氣痞足弱不能屈伸屏居無事尚能讀書而以病故不能俯伏几案所幸猶有一二朋友早晚講論少足爲慰耳引年告老昨以鄉閭横議官吏過憂乆不得上至煩臺評播告後乃得之尸居餘氣何足爲世重輕而毎煩當路注意如此旣以自歎又自笑也二陸祠記甚佳此題目本不好做想亦只得且如此說過耳幕中無事儘可讀書不知比来作何功夫因書幸略及之也武成錯簡尋常如何讀韓退之與大㒹書歐蘇之論孰當因風幸及之答林徳乆盡心知性之說恐未然今亦未論義理如何只看文勢者也二字便可見近有朋友引得其民者得其心也以證之亦自有理若如所論私意脫落無有查滓爲盡心即不知却如何說存心两字兼旣未知性即是於理尚有未明如何便到得此田地耶此處一差便入釋氏見解矣此理甚明更冝思之况知者有漸之詞盡者無餘之義其意象規模自應有先後也太虚實理正是指形而上者而言旣曰形而上者則固自無形矣然謂之無理可乎以此思之亦自曉然也答歐陽希遜謙之所示疑義比舊甚進所未安各巳䟽出幸更思之因風喻及也所謂徒守𥿄上語擬規畫圎摸矩作方此𥘉學之通病然尚有不能守𥿄上之語雖擬規矩而不能成方圎者而未必自知其非也以愚計之但且謹守規矩朝夕模之不暫廢輟積乆純熟則不待模擬而自成方圎矣切不可輙萌妄念求之於言語文字之外也觀孔子言仁如告顔子以克巳復禮所以爲仁之機殆若發露而無餘藴至孟子論仁雖嘗指人心而言然其意使人自惻隱之心推之要其㫖歸多主於愛之一辭雖所以指示於人者豈不精切而確實然不似聖人之言仁廣大渾全而使人自得於精思力行之餘也意者孟子適當夫好戰嗜殺人之時爲救焚拯溺之計不可不自夫受病之所而藥之歟程子曰四德之元猶五常之仁偏言則一事專言則包四者惻隱之類偏言之也克巳之類專言之也然即此一事便包四者蓋亦非二物也故論語集注中云仁者心之德愛之理也此言極有味可更思之不可謂孟子之言不如孔子之周偏孟子亦有專言之者仁人心是也孔子亦有偏言之者愛人是也又謂孟子以世人好殺而言惻隱尤非也孔子雖不以義對仁然毎以智對仁更冝思之君子所貴乎道者三君子之所以重乎此者爲其發乎吾身而非有待於外也爲其得於不勉不思而非出於造作而然也豈若籩豆之事器數之末皆身外之物可以品節劑量安排布置而爲之者乎曽子之意只是說人之用力有此三處此大而彼小此急而彼緩爾亦未說到不勉不思處籩豆之事固是末節然亦非全然忽略而不以爲意但當付之有司使供其事而非吾之所當切切留意者耳所云身外之物以下云云者尤非本文之意也論語集註曰曽點氣象從容辭意灑落某竊想像其舎瑟之際玩味其詠歸之辭亦可以略識其大槩矣程子謂其便是堯舜氣象竊嘗以程子之意求之所謂堯舜氣象者得非若所謂不以位爲樂與夫有天下而不與之意乎集註又云是雖堯舜事業固優爲之不知所謂事業者就其得於已者而言就其得於事功者而言孟子之所謂狂者盖謂夷考其行而不掩焉者也所謂行不掩焉者若曰言不顧行行不顧言所行不能掩其所言也不知曽點行不掩焉者何處可見檀弓曰季康子死曾子倚其門而歌於此而作歌可以見其狂否曾點氣象固是從容灑落然須見得它因甚到得如此始得若見得此意自然見得它做得堯舜事業處不可以一事言也行有不掩亦非言行背馳之謂但行不到所見處耳倚門而歌亦略見其往處只此舎瑟言志處固是聖人所與然亦不害其爲狂也過此流入老莊去矣孟子曰我知言我善養吾浩然之氣集註云浩然盛大流行之貌氣即所謂體之充者本自浩然失養故餒某竊味氣體之充與下靣浩然之氣兩箇氣字大意似同而精微密察處略似有異前靣氣字若專主形於外者而言後靣氣字若專主發於内者而言氣無二義但浩然之氣乃指其本來體叚而言謂體之充者泛言之耳然亦非外此而别有浩然之氣也反身而誠者知至之功強恕而行者力行之事知之在前行之在後與篇首盡其心者知其性也知其性則知天矣存其心養其性所以事天也文勢略同未審是否反身而誠乃是反求諸身而實有是理如仁義忠孝應接事物之理皆眞有之而非出於勉強僞爲也此是見得透信得及處到此地位則推巳及物不待勉強而仁在我矣下言強恕而行者蓋言未至於此則當強恕以去已私之蔽而求得夫天理之公也孟子施於四體四體不言而喻集註云言四體雖不能言而其理自可曉也似若指在人而言集註此義近看得似未安恐只是說四體不待安排而自然中禮也舜不告而娶告則廢人之大倫則娶爲重而告爲輕不㡬於禮輕而色重賢者飢餓於土地賙之則受免死而巳則免死爲重㓗身爲輕不㡬於禮輕而食重禮固重於食色矣然禮亦有大體小節之殊而食色所係亦自有小大緩急之不同孟子言之詳矣無可疑也答歐陽希遜所示卷子巳悉䟽其後矣時亨處亦有三𥿄可互見也元徳爲况如何元瞻巳歸未也吾人爲學自爲巳事豈以時論而少變千萬勉力謙之前此請問曽點氣象從容辭意灑落堯舜事業亦優爲之先生批教云曾點氣象固是從容灑落然須見得它因甚得到如此始得若見得此意自然見得它做得堯舜事業處謙之因此熟玩集註之語若曰但味其言則見其日用之間無非天理流行之妙而用舎行藏了無所與於我見得曾點只是天資高所見處大所以日用之間無非天理流行之妙惟其識得這道理破便無所係累於胷中所謂雖堯舜事業亦優爲之自其所言以逆諸其日用之間而知其能爾也何者堯舜之聖只是一箇循天理而巳然曾點雖是見處如此却無精㣲縝宻工夫觀論語一書點自言志之外無一語問答焉則其無篤實工夫可見矣使曽點以此見識加之以鑚仰之功謹於歩趨之實則其至於堯舜地位也孰禦本朝康節先生大略與點相似伏乞指敎人有天資高自然見得此理眞實流行運用之妙者未必皆由學問之功如康節二程先生亦以爲學則𥘉無不知也來喻皆巳得之大抵學者當循下學上逹之序庶幾不錯若一向先求曽點見解未有不入於佛老也謙之前此請問語孟仁不同處先生批教曰集註中云仁者心之徳愛之理也此言極有味可更思之近来却覺看得論語中答諸弟子問仁處如吿之以主敬行恕告之以先難後獲之類徃徃不是先藥其人之病痛則是其人未到仁者地位未可以抽關啓鑰告之且爲它安下一箇爲仁底根脚根脚平正牢固然後却可語之以仁若答子貢之問直曰工欲善其事必先利其器此可以觀矣樊遲問仁告之以居處恭執事敬與人忠胡氏以爲樊遲問仁者三此最先先難次之愛人其最後乎似得聖人之意矣若是根脚不穩而語之以仁縦使能用力焉果能爲我有乎根脚旣正雖不告語之亦自然能尋求向上去也前此讀論語見聖人答問仁之語其說不一便將作聖人言仁廣大周徧底意思看了是以求其要領而不可得却把孟子言仁處看小了遂謂孟子之言不如孔子廣大周徧今此却看得孟子所言惻隱之心與夫人心等語乃是實指仁之端倪學者便可體認㝷求便有靠實下手處於此益見得所謂心之德者乃是仁之眞體蓋事事要得此心之安不使有一毫之不足處而愛者乃是仁之實不以吾身之外皆無與於我而一毫不䘏也程子以西銘爲仁之體其以此歟不知是否伏乞指敎此叚看得大有病告樊遲三語便與告顔淵仲弓都無異故程子曰此是徹上徹下語安得謂姑爲之安立根脚乎若此只是安立根脚即不知如何方是正下手爲仁處耶大率孔子只是說箇爲仁工夫至孟子方解仁字之義理如仁之端仁人心之類然仁字又兼两義非一言之可盡故孔子教人亦有兩路克巳即孟子仁人心之說愛人即孟子惻懚之說而程子易傳亦有專言偏言之說如熹訓釋又是孟子程子義䟽可更詳之謙之前此請問孟子程子論才處曽妄爲之說曰性無不善而氣有清濁人之有昏明強弱者氣使之然也才發於性固無有不善也氣禀之清而本性常用則才固無不明且強也氣禀之濁而本性障蔽則或有以梏其才之羙而使之昏且弱矣氣禀昏濁旣蔽其性之善則遂併與其才而失之何者性固才之根本也此孟子所謂不能盡其才而非才之罪也故夫氣之清則能盡其才氣之濁則不能盡其才然其才發於性自人氣之有清濁而後才始有盡不盡者焉則夫昏明強弱其本固不係於才而繋扵氣也巳上前時請問之語此時先生賜答不以爲不可然謙之近来玩味孟子本文與集註之說又覺前說殊未爲當孟子之言若曰惻隱羞惡恭敬是非之心人皆有之可見其性之善也夫人之受此性以生也則必具此形體也有此形體則其才能固具於此形體之中若是噐爲刃也必能刺物也是器爲舟也必能行水也是故有此惻隱羞惡辭遜是非之心能思而求之以充惻隱羞惡辭遜是非之心是所謂盡其所能也彼其不思不求不知所以充之者非無是能也不知所以盡其所能也其所以不盡其所能者則禀是氣之濁與夫䧟溺其心者也程子所謂學而知之即孟子求則得之之論也程子所謂自暴自棄即孟子不盡其才之論也二說雖異不害其爲同也不知是否伏乞指敎謙之又觀集註曰才固有昏明強弱之不同竊疑昏明是氣強弱是才不知於才字上下昏明字如何伏乞指敎氣禀之殊其類不一非但清濁二字而巳今人有聦明通逹事事曉了者其氣清矣而所爲或未必皆中於理則是其氣之不淳也人有謹厚忠信事事平穩者其氣醇矣而所知未必能逹於理則是其氣之不清也推此類以求之才自見矣程子曰生之謂性性即氣氣即性生之謂也又曰人生而静巳上不容說才說性時便巳不是性也謙之竊意明道所言生之謂性與吿子所言生之謂性不同明道之意若謂人生而後方始謂之性前此天命流行未有所寄寓只可謂之善不可謂之性然以無可得名又是性之本源只且謂之性若論其體叚則不可謂之性此人生而静以上不容說才說性時便巳不是性也性即氣氣即性蓋必禀是氣然後人之形體始立必命之以是性然後人之良知良能始具必有是性而後有是氣必有是氣而後有是性二者蓋不能以相離也人物未生之時天命之流行雖其未有底止不可謂之性而性之本眞實渾然而無所間雜人物巳生之後氣質之成形雖其理巳命于人始得謂之性而性之本體始與氣質交雜而有待於察識其端倪矣程子所謂性即氣氣即性非謂氣便是性性便是氣蓋言其不相離也此程子所謂論性不論氣不備論氣不論性不明二之則不是蓋以此也不知是否伏乞指敎此叚近之程子曰人生氣禀理有善惡然不是性中元有此兩物相對而生也有自㓜而善有自㓜而惡者是氣禀使然也善固性也然惡亦不可不謂之性也謙之竊考夫下文所引水流爲喻是所謂不是元有两物相對而生也然旣謂之流而復有濁則非自㓜而惡矣旣曰水之清則性善之謂也則不可謂之惡亦不可不謂之性矣既曰有流而至海終無所汚有流而未逺巳有所濁有出而甚逺方有所濁又曰清濁雖不同然不可謂濁者不爲水也謙之竊以謂旣是𥘉流出時無濁者則後来雖有濁者或是泥沙溷之外物汨之不是元𥘉水裏靣帶得濁來到此方見也此則孟子所謂䧟溺其心者也豈得以惡爲不可不謂之性㢤程子之言必有深意伏乞指敎此所謂泥沙外物正指氣禀而言程子曰凡人說性只是說繼之者善也孟子言性善是也近觀先生答嚴時亨所問云易大傳言繼之者善是指未生之前孟子言性善是指巳生之後與程子之說似若有異伏乞指教明道先生之言高逺宏闊不拘本文正意如此處多若執其方而論則所不可通者不但此句而巳須知性之原本善而其發亦無不善則大傳孟子之意𥘉無不同矣鄉黨非帷裳必殺之集註云朝祭之服用裳問時遺此一句正幅如帷要有襞積而旁無殺縫其餘如深衣要半下齊倍要則無襞積而有殺縫矣所謂有襞積恐是若今裙制近要有殺入聲是也要半下謂近要者狹半放下面齊也齊倍要謂向下者闊倍於上面要也不知旁無殺縫之制如何恐是深衣之制裳下面是裁布爲之近要者殺從其小以就半下之法所以旁有殺縫也伏乞指教此讀集註遺下首句故其下皆無文理昨乍看之亦自曉不得也今添此句讀之自合見得分明矣帷裳如今之裙是也襞積即是摺處耳其幅自全安得謂近要者有殺縫耶論語君子周而不比字舊音毗志反集註無音古註集註皆爲偏黨之義義之與比舊音毗志反集註音必二反孟子願比死者一洒之與且比化者無使土親膚其義與音又俱備無可疑者若御者且羞與射者比集註亦爲偏黨之義音必二反不知比字爲偏黨之義者皆當作必二反如何至將比今之諸侯而誅之集註曰比連也音去聲所謂去聲者想却是作毗志反否伏乞指教記得此字是用賈昌朝羣經音辨改定比今之諸侯一處改未盡耳更俟契勘然亦無甚緊要今目昏甚此等處恐不暇料理矣孟子曰我不貫與小人乗貫舊音慣註曰貫習也集註無音亦曰貫習也恐是不須音轉亦可此等不應以煩瀆尊聽鄊里後生或来質問不敢以私意揣量以告伏乞尊察貫若不音慣不知讀作何字如有别音即須𥙷之若依舊只是貫字則自不須音也此不暇檢可更詳之後便批來答歐陽希遜所論程先生鳶飛魚躍必有事焉之語元德亦以爲疑此乃爲或問中舊說所誤今詳味之方見程先生說鳶飛魚躍是子思喫緊爲人處以其於事物中指出此理令人隨處見得活潑潑地必有事焉是孟子喫緊爲人處以其敎人就巳分上略綽提撕便見此理活潑潑地也非以其文義相似而引以爲證也今看中庸且看子思之意見得分明即將程先生所說影貼出便見所引孟子之說只是一意不可以其文字言語比類牽合而使爲一說也凡若此類更冝深思所論鬼神一章全不子細援引太多愈覺支離不見本經正意可且虚心將經文熟看甚不能曉處然後参以章句說敎文義分明道理便有去著體物之義两處說得如此分明足可致思乃更泛然而問可見元不曽入思慮也祭統所說如有見聞論語所說祭神如在皆是主於祭者而言此章言使天下之人齊明盛服以承祭祀是主扵鬼神而言自有賔主如何却如此看體物使人两可更須深體又來喻言如其神之在焉非真有在者也此言尤害理若如此說則是僞而巳矣又豈所謂誠之不可掩乎昭明焄蒿悽愴䟽說非是昭明謂光景焄蒿謂氣象悽愴使人神思灑浙如漢書云風肅然者宰我答問一章所論鬼神正與中庸相表裏今且先看令中庸意思分明却看此章便見子細智仁勇一章雖非經文正意然文勢相聮讀者亦須識得去著方見義理大小精粗縦横貫穿無空闕處今觀所論全未致思至如所引論語仁者安仁智者利仁豈是不知有此两句所以如此筆之於書決須更有深意今乃如此草草看過率然發問殊非所望於朋友也答嚴時亨世文五行之生各一其性氣質是隂陽五行所爲性即太極之全體但論氣質之性則此全體墮在氣質之中耳非别有一性也明道言人生而靜以上不容說人生而静是未發時以上即是人物末生之時不可謂性才謂之性便是人生以後此理墮在形氣之中不全是性之本體矣然其本體又未嘗外此要人即此而見得其不雜於此者耳易大傳言繼善是指未生之前孟子言性善是指巳生之後雖曰巳生然其本體𥘉不相雜也程子以忠爲天道恕爲人道莫是謂忠者聖人之在巳與天同運而恕者所以待人之道否聖人處巳待人亦無二理天人之别但以體用之殊耳放於利而行多怨南軒獨以爲巳之怨人南軒說固有此理只是此章語意只合如古註及程子說不容一語可兼二意虚心平氣静以察之當自見得不可以其近裏而遷聖人之本意以就之也發巳自盡謂忠循物無違謂信所謂發巳莫是奮發自揚之意否循物無違未曉其義如何發巳自盡但謂凡出於巳者必自竭盡而不使其有苟簡不盡之意耳非奮發之謂也循物無違謂言語之發循其物之眞實而無所背戾如大則言大小則言小言循於物而無所違耳逃墨必歸於楊逃楊必歸於儒楊墨皆是邪說無大輕重但墨氏之說尤出於矯僞不近人情而難行故孟子之言如此非以楊氏爲可取也孔墨並稱乃退之之繆然亦未見得是與原道之作孰先孰後也簡易引吕東莱解禹貢一叚此說大槩得之然亦不必言先爲其難大抵只是許多道理須要理㑹得分明後方無窒礙不費力而自簡易耳如治亂繩若不解放得開豈能自成條理而不紛紏耶三重當從伊川之說伯者之事不得爲善此章正與上章相發明乃是相承爲文非隔章取義也六言六蔽說此亦但疑其文有不同耳先立題目又令復坐而後言之亦似太鄭重也答嚴時亨問目各巳批出請更詳之禮書近方略成綱目但䟽義雜書中功夫尚多不知餘年能了此事否當時若得時亨諸友在近相助當亦汗青有期也浙中朋友數人亦知首尾亦苦不得相聚未有見日千萬自愛更於義理切身處著實進得一歩則所以守此身者不待勉而固矣某昨来請問五行之生也各一其性傳云五行之生隨其氣質而所禀不同所謂各一其性也各一其性則渾然太極之全體無不各具於一物之中而性之無不在又可見矣各一其性周子之意固是指五行之氣質然水之潤下火之炎上木之曲直金之從革土之稼穡此但可以見其氣質之性所禀不同却如何便見得太極之全體無不各具於一物之中而性此性字是指其義理之性之無不在也莫是如上一節所謂五行異質而不能外乎隂陽隂陽異位而皆不能離乎太極即此可見得否覺得此處傳文似猶欠一二轉語每讀至此未能釋然先生答云氣質是隂陽五行所爲性即太極之全體但論氣質之性則此全體墮在氣質之中耳非别有一性也某反復思之誠非别有一性然觀聖賢說性有是指義理而言者有是指氣禀而言者却不容無分别敬讀誨語謂氣質是隂陽五行所爲性即太極之全體始悟周子所謂各一其性專是主理而言盖五行之氣質不同人所共知也而太極之理無乎不具人所未必知也此周子喫緊示人處今所在板行傳文皆云五行之生隨其氣質而所禀不同所謂各一其性也詳此文義這箇性字當指氣而言各一其性則渾然太極之中全體無不各具於一物之中而性之無不在又可見矣詳此文義這箇性字當是指理而言一叚之間上下文義頗相合恐讀者莫知所適從若但云五行之生雖其氣質所禀不同而渾然太極之全體無不各具於一物之中所謂各一其性如此則辭約而義明正是回敎所謂全體墮在氣質之中底意思伏乞指敎隂陽五行之爲性各是一氣所禀而性則一也故自隂陽五行而言之則不能無偏而人禀其全所以得其秀而最靈也某昨來請問明道先生云人生而靜以上不容說才說性時便巳不是性也凡人說性只是說繼之者善也孟子言性善是也夫人生而静是喜怒哀樂未發之前此巳上誠有不容說者然自孟子以來至於周程諸先生皆善言性者其大要指人物所得以生之理而言親切著明今謂其所說皆不是性可乎性理之說本自精㣲今謂才說性時便巳不是性無乃使人致思扵杳㝠不可致詰之境乎明道此叚文意首尾大要是推明人生氣禀理有善惡竊詳易係言繼之者善正謂大化流行賦與萬物無有不善孟子言性善止是言義理之性人所均禀𥘉無不善皆是極本窮源之論引此以明人生氣禀理有善惡似不相侔不知明道所見是如何先生答曰人生而静是未發時巳上即是人物未生之時不可謂性才謂之性便是人生以後此理墮在形氣之中不全是性之本體矣然其本體又亦未嘗外此要人即此而見得其不雜於此者耳易大傳言繼善即是指未生之前孟子言性善是指巳生之後雖曰巳生然其本體𥘉不相雜也以上是人物未生之時是某思慮所未到伏讀批誨指示親切却覺得先生之說甚明而明道之說益有可疑何者人物未生時乃是一隂一陽之謂道而天命之流行所謂繼之者善便是以上事何故言以上不容說方其人物未生固不可謂性及人物旣生須著謂之性雖則人生巳後此理墮在形氣中不全是性之本體然氣禀不能無善惡者性之流也義理之有善無惡者性之本體也然皆不可不謂之性要在學者隨所讀書自去體認取今謂才說性時便巳不是性深恐啓人致思於杳㝠不可致詰之境而大傳言繼善是指未生之前則命之道也未可謂之性孟子言性是指巳生之後乃易大傳所謂成之者性而非所謂繼之者善也明道却云凡人說性只是說得繼之者善也孟子言性善是也此尤不可曉近思録一書皆是刪取諸先生精要之語以示後學入德之門戸而首卷又是示人以道體所在編入此叚必不是閑慢處旣有所疑未容放下再此扣請乞恕再三之瀆此一段巳詳於希遜卷中矣明道先生如此處多若以本文論之則皆不可曉矣要當忘言㑹意别作一格看可也子路曽晢冉有公西華侍坐一章夫子旣語之以居則曰不吾知也如或知爾則何以㢤正是使之盡言一旦進用何以自見及三子自述其才之所能堪志之所欲爲夫子皆不許之而獨與曽點看来三子所言皆是實事曽點雖答言志之問實未嘗言其志之所欲爲有似逍遥物外不屑當世之務者而聖人與此而不與彼何也集註以爲味曾點之言則見其日用之間無非天理流行之妙而用舎行蔵了無與於我是雖堯舜之事業蓋所優爲其視三子規規於事爲之末不可同年而語矣某嘗因是而思之爲學與爲治本來只是一綂事它日之所用不外乎今日所存三子却分作兩截看了如治軍旅治財賦治禮樂與凡天下之事皆是學者所當理㑹無一件是少得底然須先理㑹要教自家身心自得無欲常常神清氣定涵養直到清明在躬志氣如神則天下無不可爲之事程子所謂不得以天下撓巳巳立後自能了當得天下事物者是矣夫子嘗因孟武伯之問而言由也千乘之國可使治其賦也求也千室之邑百乘之家可使爲之宰赤也束帶立於朝可使與賔客言聖人固巳深知其才所能辦而獨不許其仁夫仁者體無不具用無不該豈但止於一才一藝而已使三子不自安於其所巳能孜孜於求仁之是務而好之樂之則何暇規規於事爲之末縁它有這箇能觧横在肚皮裏常恐無以自見故必欲得國而治之一旦夫子之問有以觸其機即各述所能子路至於率爾而對更無推遜求赤但見子路爲夫子所哂故其辭謙退必竟是急於見其所長聖門平日所與講切自身受用處全然掉在一偪不知今日所存便是後日所用見得它不容將爲學爲治分作兩截看了所以氣象不宏事業不能造到至極如曾點浴沂風雩自得其樂却與夫子飯𬞞食飲水樂在其中顔子簞瓢陋巷不改其樂襟懷相似程子謂夫子非樂𬞞食飲水也雖𬞞食飲水不能改其樂也謂顔子非樂簞瓢陋巷也不以貧窶累其心而改其所樂也要知浴沂風雩人人可爲而未必能得其樂者正以窮逹利害得以累其心而不知其趣味耳夫舉體遺用㓗身亂倫聖門無如此事全不可以此議曽點蓋士之未用須知舉天下之物不足以易吾天理自然之安方是本分學者曾點言志乃是素其位而行不願乎其外無入而不自得者故程子以爲樂而得其所也譬如今時士子或有不知天分𥘉無不足游泳乎天理之中大小大快活反以窮居隱處爲未足以自樂切切然要做官建立事功方是得志豈可謂之樂而得其所也孟子謂廣土衆民君子欲之所樂不存焉中天下而立定四海之民君子樂之所性不存焉君子所性雖大行不加焉雖窮居不損焉分定故也孟子所謂君子所性即孔子顔子曽點之所樂如此如老者安之朋友信之少者懐之物各付物與天地同量惟顔子所樂如此故夫子以四代禮樂許之此浴沂風雩識者所以知堯舜事業曽㸃固優爲之也然知與不知在人用與不用在時聖賢於此乗流則行遇坎則止但未用時只知率性循理之爲樂正以此自是一統底事故也龜山謂堯舜所以爲萬世法亦只是率性而巳外邊用計用較假饒立功業只是人欲之私與聖賢作處天地懸隔如子路當蒯聵之難知食焉不避其難而不知衞輒之食不可食季氏富於周公而求也爲之聚歛而附益之後来所成就止於如此正爲它不知平日率性循理便是建功立事之本未到無入不自得處夫子之不與其有以知之矣所見如此不背馳否乞與訂正此一叚說得極有本末學者立志要當如此然其用力却有次第巳爲希遜言之矣答嚴時亨生之謂性一章論人與物性之異固由氣禀之不同但究其所以然者却是因其氣禀之不同而所賦之理固亦有異所以孟子分别犬之性牛之性人之性有不同者而未嘗言犬之氣牛之氣人之氣不同也人之所以異於禽獸一章亦是如此若如所論則孟子之言爲不當而告子白雪白羽白玉之白更無差别反爲至論矣程先生有一處有隙中日光之論最爲親切更須詳味於同中識其所異異中見其所同然後聖賢之言通貫反覆都不相礙若只據一偏各說道理則互相逃閃終身間隔無復會通之時矣𣏌柳之性固可以爲桮棬然須斫伐裁截矯揉而後可成故孟子言戕賊𣏌柳而後可以爲桮棬也若𣏌柳可以爲桮棬而稉楠不可以爲桮棬又是第二重道理與此元不相入不當引以說也此等處湏且虚心看它聖賢所說文義指意以求義理之所當乃爲善學若如所論徒爲紛擾不惟枉費思慮言語而反有害於窮理之實也多怨之說固有此理但恐如此包褁費力聖人之言簡易平直未必如此屈曲且依程先生說爲善五行太極便與生之謂性相似以爲同則同中有異以爲異則未嘗不同親親長長貴貴尊賢皆天下之大經固當各有所尚然亦不可以此而廢彼故鄊黨雖上齒而有爵者則俟賔主獻酬禮畢然後入又席于尊東使自爲一列不爲衆人所壓亦不壓却它人即所謂遵也遵亦作僎如此則長長貴貴各不相妨固不以齒先於爵亦不以爵加於齒也祭五祀說見扵月令註䟽甚詳可自考之越紼之說註雖簡䟽必詳此等可自檢看居䘮不祭伊川横渠各有說若論今日人家所行則不合禮處自多難以一槩論若用韓魏公法則有時祭有節祠時祭禮繁非居䘮者所能行節祠則其禮甚簡雖以墨縗行事亦無不可也喪禮自葬以前皆謂之奠其禮甚簡蓋哀不能文而於新死者亦未忍遽以鬼神之禮事之也自虞以後方謂之祭故禮家又謂奠爲䘮祭而虞爲吉祭蓋漸趣於吉也酹酒有两說一用鬰鬯灌地以降神則唯天子諸侯之禮有之今其書亡不可深考一是祭酒蓋古者飲食必祭人以鬼神自不能祭故代之祭也今人雖存其禮而失其義不可不知禮必本扵太一髙氏說恐不然贑州所刋語解乃是鄭舜舉侍郎者名汝諧中間略看亦有好處但如所引數條却似未安今且論其一二大者如三仁之事左傳史記所載互有不同但論語只言微子去之𥘉無面縳􅋦璧之說今乃捨孔子而從左氏史遷巳自難信又不得已而曲爲之說以爲微子之去乃去紂而適其封國則尤爲無所㨿矣此乃人道之大變聖賢所處事雖不同而心則未嘗不同故孔子歴舉而並稱之且皆許其仁焉更湏玩索未可輕論也絶四之說尤爲無理且更虚心看集註中所引諸先生說不必如此求竒失却路脉也答曽光祖興宗知别後爲學不倦甚慰然所謂念欲刻苦加勤又恐遂成助長之患而致知之功亦非旦夕可冀則似未得箇下手䖏也大綱且得以敬自守而就其間講論省察便是致知知得一分便有一分功夫節節進去自見欲罷不能不待刻苦加勵而後得也但目下持守講學却亦不得不刻苦加勵不湏遽以助長爲憂也答曽光祖所示問目甚慰所懐此是求其放心乃爲學根本田地旣能如此向上湏更做窮理功夫方見所存之心所具之理不是两事隨感即應自然中節方是儒者事業不然却亦與釋子㘴禪攝念無異矣所論内外賔主之辨意亦得之但語猶未瑩須知在内之日多即是爲主在内之日少即是爲客耳主式乃伊川先生所制𥘉非朝廷立法固無官品之限萬一繼世無官亦難遽易但繼此不當作耳有官人自作主不妨牌子亦無定制竊意亦湏似主之大小髙下但不爲判合䧟中可也凡此皆是後賢義起之制今復以意斟酌如此若古禮則未有考也大學或問之誤所疑甚當中間巳脩定矣今内去两本幸収之偶歸故居監視社倉交米草草作此不暇它及正遠千萬進學自愛只如前所論用功乆之自當有進盖巳得其要領不易如此切巳致思也答曽光祖熹行役巳渉建昌之境垂老復出非力所堪深以愧歎耳所示爲學之意甚善此事元無窮盡不可計功程但當鞠躬盡力看到甚地位耳答曾光祖所詢䘮祭之禮程張二先生所論自不同論正禮則當從横渠論人情則伊川之說亦權宜之不能巳者但家間頃年居䘮於四時正祭則不敢舉而俗節薦享則以墨衰行之盖正祭三獻受胙非居䘮所可行而俗節則唯普同一獻不讀祝不受胙也如此則於遠祖不必别議稱呼矣遷主禮經所說不一亦無端的儀制竊意恐當以大祥前一日祭當遷之主告而遷之然後次日撤几筵奉新主入廟似亦稍合人情幸更詳之此事尚逺可徐議之也答曽光祖横渠曰仲尼絶四意有思也夫子嘗言學而不思則罔又言君子有九思今横渠之言與此相反絶四是聖人事不思不勉者也學者則思不可無但不可有私意耳伊川易傳序曰至微者理也至著者象也體用一源顯㣲無間觀㑹通以行典禮則辭無所不俻其曰象曰辭固皆理之所寓然其曰體用一源未知三者以何爲體以何爲用又所謂典禮者無非天叙天秩之自然不知扵會通處如何而觀易中之辭何者備之上四句其說巳見於太極圖解後統論中矣觀㑹通是就事上看理之所聚與其所當行處辭謂卦爻之辭横渠云始學之要當知三月不違與日月至焉内外賔主之辨某謂實有諸巳乃能爲仁雖仁有乆近之不同然非有諸巳不能也其所以三月日月者特主義理客氣消長分數之多寡耳非三月日月有内外賔主也所謂實有諸巳乃能爲仁不知實有是有何物爲仁是爲何事知得此意方可理㑹内外實主之辨明道曰目畏尖物此事不得放過便與克下室中率置尖物湏以理勝它尖必不刺人也何畏之有興宗未曉其說人有目畏尖物者明道先生敎以室中率置尖物便見之熟而知尖之不刺人也則知畏者忘而不復畏矣便疑當作使觀之上九曰觀其生君子無咎象曰觀其生志未平也其生謂言行事爲之見扵外者旣有所省便是未得安然無事答曽景建辱書文詞通暢筆力快健蔚然有先世遺法三復令人亹亹不倦所論讀書求道之意亦爲不失其正所詆近世空無簡便之弊又皆中其要害亦非常人見識所能到也然文字之設要以逹吾之意而巳政使極其高妙而於理無得焉則亦何所益扵吾身而何所用扵斯世鄊來前輩蓋其天資超異偶自能之未必專以是爲務也故公家舎人公謂王荆公曰文字不必造語及摹擬前人孟韓文雖髙不必似之也况又聖賢道統正傳見於經傳者𥘉無一言之及此乎至扵讀書則固吾事之不可巳者然觀古今聖賢立言垂訓亦未始不以孝弟忠信収歛身心爲先務然後即吾日用之間參以往訓之指反覆推窮以求其理之所在使吾方寸之間虚明洞徹無毫髮之不盡然後意誠心正身脩而推以治人無往而不得其正者若但泛然慱觀而槩論以爲如是而無非學如是而無非道則吾恐其無所歸宿不得受用而反爲彼之指本心講端緒者所笑矣鄙見如此幸試思之有所未安復以見告甚幸甚幸録示先大父司直公所記龜山先生語前此所未見然以其它語推之知其誠出於龜山無疑也所示佳篇句法髙簡亦非世俗所及然憤世太過恐非遜言之道千萬謹之尤所願望答曽景建便中辱書備知向來徧參反求始末而又深以主一窮理得所歸宿爲喜也比日秋清計所履益佳勝從事扵斯亦當益有味矣然二事知之甚易而爲之實難爲之甚易而守之爲尤難主一之功固湏常切提撕不令間㫁窮理之事又在細心耐煩將聖賢遺書從頭循序就平實明白處玩味不湏貪多但要詳熟自然見得意緒若騖於高逺渉獵領解則又不免如向來之清話欲求休歇而反成躁亂也示及與柴君書甚善不知渠以爲如何今人亦未說到此異端之蔽自是巳分上差却入路欠却功夫其迷溺者固無足道其慨然以攘斤爲已任者又未免有外貪内虚之患亦徒爲譊譊而巳若之何而能喻諸人哉幸更思之若於已分上眞實下得切已功夫則於此等亦有所不暇矣答曾景建所示詩文疑問其間頗有曲折俟黃兄歸奉報熹以臺評蒙恩鐫免尚爲輕典感幸深矣而所連及反罹重坐令人愧惕今因其行草草附此恐其在塗有合料理事得爲垂念幸甚其人辨博多所該綜亦可欵扣也答曽景建前此辱書蔡季通行曽附數字奉報矣所論主一之功甚善但讀書湏更量力少看而熟復之只依文義㝷箇明白處去自然有味不在極力苦思轉求轉逺也先德所抄龜山語以它書考之不妄然却不及向來所記雜說數條必是又有李蕭逺所定也所問两條三省事鄙意正如此後段之云亦可謂恠論矣今旣知其繆便直置之不湏與辨且自理㑹已分功夫可也科舉之學在賢者爲餘事但公家自有文章大宗師何故不學而學它人不好處一向如此不惟議論不正當併與文章亦成澆薄無餘味矣爾雅未暇細看然此等亦未湏閑費日力也答曽景建季通逺役深荷煖熱之意今想已到地頭矣其所論律歴尤精詣恨與賢者相聚不乆未極其底藴也三篇甚勝卒章尤工而僕不足以當之也爾雅竟未暇細考但釋親篇恐非如所刋定也禮書已略定但惜無人録得亦有在黄直卿處者聞告父在彼必能傳其梗槩然此間後來又有續修處及更欲附以釋文正義卒未得便㫁手耳乾坤性情之說以三隅反之何疑之有性情本是一物特以動静而異其名耳答曾景建别𥿄七條第一論勿動勿思者動可以該思而思不可以該動故聖言如此非有先後淺深之序也但立語用功自是合如此耳第二論曽點言志以爲便欲進取揖遜泰和氣象殊非本意彼亦但自言其日間受用處而自它人觀之則見其或出或處無所不可雖堯舜事業亦優爲之非專指揖遜而言也第三論問答衞君一條以爲有所畏避亦非是此只是禮合如此耳此等處相似而不同只差毫釐便有公私之異不可不察也第四論吕氏恍愡之說未有大病不湏如此㢠避且認取正意可也上章亦然第五責原壌三語須作一句看若只老而不死則聖賢固有壽考者豈可以其竊天地之機而謂之賊耶第六射宿亦不必如此說第七按史記之言如此必有所据非馬遷自造之語也盖今關雎三章皆是關雎之亂其前必有散聲序引之類有聲無詞而此其卒章也若止第三章是亂則史之言不如此矣此七條者其首二義更冝思之第二條尤須體認不可草草其下五條則皆非所急又看得差了且須虚心認取聖賢立言教人用功之正意不可只如此容易立說也答曽景建參同舊本深荷録示巳令蔡伯静點對附刻新本之後矣但龍虎經却是取法參同亦有不曉其本語而妄爲模放處如論乾坤二用周流六虗處可見踈脫試考之可見也近来不知所觀何書或有所見因風筆示若得乗此春暖與吉殳相約俱来以踐前約豈勝幸甚征苗之說甚新但恐其它無此比数兼若如此則禹自當班師不待伯益贊之而後决矣此等無所考据不若姑置之而涵泳於義理之實之爲得也晦庵先生朱文公文集卷第六十一考異𥙷遺荅林德乆伊川曰心具天德條内與諸先生議論不同下一本有盡心知性此是大學第一皆從心上用功下一本有如操舎存亡求放心之類荅嚴時亨遷聖人之本意以就之也下有問云禮無大小未甞不重於食色不可謂食色有時而重於禮食色重處是亦禮之重荅云此章無他可疑熟讀本文自可見矣荅曽光祖仲尼絶四意有思也下一本有竊意福州府儒學訓導鄭璉校
