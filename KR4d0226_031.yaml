body:
  text: 書江張呂劉問答與張敬夫四月一日春秋正朔事比以書考之凡書月皆不著時疑古史記事例只如此至孔子作春秋然後以天時加王月以明上奉天時下正王朔之義而加春於建子之月則行夏時之意亦在其中觀伊川先生劉質夫之意似是如此但春秋兩字乃魯史之舊名又似有所未通幸更與晦叔訂之以見教也答張敬夫竊承政成事簡暇日復有講習之樂英材心化多士風靡此為吾道之幸豈特一郡之福哉奏罷丁錢此舉甚美𥘉謂遂獲蠲除不知僅免一歲雖亦不為無輔特非久逺利耳然熹竊謂有身則有庸此近古之法蓋食王土為王民亦無終歲安坐不輸一錢之理但不當取之太過使至於不能供耳今欲再奏不若請令白丁下户每歲人納一二百錢四等而上每等遞增一二百使至于極等則略如今日之數似亦不為厲民而上可以不失大農經費之入下可以為貧民久逺之利於朝廷今日事力亦易聽從而可以必濟不審尊意以為如何似聞浙中諸郡有全不輸算賦者有取之無藝至于不可堪者凡此不均皆為未便朝廷自合因此總會所入之大數斟酌裁損而均平之乃為盡善至如尊兄前奏有不容援例之語亦非愚心之所安也聚斂之臣誠可憎疾為國家者明道正義以端本於上而百官有司景從響附於下則此輩之材寸長尺短亦無所不可用但使之知吾節用𥙿民之意而謹其職守則自不至於病民矣今議者不正其本而唯末之齊斥彼之短而自無長䇿以濟月前之急此所以用力多而見功寡卒無輔於國事而虛為此紛紛也伯恭漸釋舊疑朋友之幸但得渠於此有用力處則歲月之間舊病不患不除矣此有李伯聞者名宗思舊嘗學佛自以為有所見論辨纍年不肯少屈近嘗來訪復理前語熹因問之天命之謂性公以此句為空無一法耶為萬理畢具耶若空則浮屠勝果實則儒者是此亦不待兩言而決矣渠雖以為實而猶戀著前見則請因前所謂空者而講學以實之熹又告之曰此實理也而以為空則前日之見誤矣今欲真窮實理亦何藉於前日巳誤之空見而為此二三耶渠遂脫然肯捐舊習而從事於此此人氣質甚美內行修飭守官亦不苟得其回頭吾道殊有賴也前此答福州一朋友書正論此事書才畢而伯聞至不一二日其言果驗亦可怪也今以上呈二人伯恭皆識之深卿者舊從伯恭逰聞其家學守之甚固但聞全不肯向此學用功正恐難猝拔也答張敬夫示喻黃公灑落之語舊見李先生稱之以為不易窺測到此今以為知言語誠太重但所改語又似太輕只云識者亦有取焉故備列之如何所謂灑落只是形容一箇不疑所行清明髙逺之意若有一豪私吝心則何處更有此等氣象邪只如此看有道者胸懷表裏亦自可見若更討落著則非言語所及在人自見得如何如曽點舍瑟之對亦何嘗説破落著在甚處邪通書跋語甚精然愚意猶恐其太侈更能斂退以就質約為佳太極解後來所改不多别𥿄上呈來當處更乞指教但所喻無極二五不可混説而無極之真合屬上句此則未能無疑蓋若如此則無極之真自為一物不與二五相合而二五之凝化生萬物又無與乎太極也如此豈不害理之甚兼無極之真屬之上句自不成文理請熟味之當見得也各具一太極來喻固善然一事一物上各自具足此理著箇一字方見得無欠剩處似亦不妨不審尊意以為如何擇之亦寄得此書草來大槩領略一過與鄙意同後不曽子細點檢不知其病如何或是病痛一般不自覺其病耳伯恭不鄙下問不敢不盡愚但恐未是更賴指摘近日覺得向來胡説多誤却朋友大以為懼自此講論大須子細一字不可容易放過庶得至當之歸也别𥿄所諭邵氏所記今只入外書不入行狀所疑小人不可共事固然然堯不誅四凶伊尹五就桀孔子行乎季孫惟聖人有此作用而明道或庶幾焉觀其所在為政而上下響應論新法而荆公不怒同列異意者亦稱其賢此等事類非常人所及所謂元豐大臣當與共事蓋實見其可而有是言非傳聞之誤也然力量未至此而欲學之則誤矣序目中語所更定者甚穩然本語熹向所謂先生之學大要則可知巳者正如春秋序所謂大義數十炳如日星乃易見也之比非薄春秋之詞也不改似亦無害若必欲改則新語亦未甚活落大抵割裂輔綴終非完物自是不能佳耳與張敬夫伯恭想時時相見欲作書不暇告為致意向得渠兩書似日前只向博雜處用功却於要約處不曽子細研究病痛頗多不知近日復如何大抵博雜極害事如閫範之作指意極佳然讀書只如此亦有何意味耶先逹所以深懲玩物喪志之弊者正為是耳范醇夫一生作此等功夫想見將聖賢之言都只忙中草草看過抄節一畨便是事了元不曽子細玩味所以從二先生許久見處全不精明是豈不可戒也耶渠又為留意科舉文字之久出入蘇氏父子波瀾新巧之外更求新巧壞了心路遂一向不以蘇學為非左遮右攔陽擠隂助此尤使人不滿意向雖以書極論之亦未知果以為然否近讀孟子至答公都子好辨一章三復之餘廢書太息只為見得天理􅑯晒分明便自然如此住不得若見不到此又如何強得也然聖賢奉行天討却自有箇不易之理故曰能言距楊墨者聖人之徒也此便與春秋討亂臣賊子之意一般舊來讀過亦不覺近乃識之耳不審老兄以為如何答張敬夫建陽一二士人歸自臨安云嘗獲奉教亦録得數十段答問來其間極有可疑處雖所録或失本意亦必有些來歷也又有泛然之問略不曽經思索答之未竟而遽巳更端者亦皆一一酬酢此非惟於彼無益而在我者亦不中語默之節矣又隨問遽答若與之爭先較捷者此其間豈無牽強草略處流傳謬誤為害不細就令皆是亦徒為口耳之資程子所謂轉使人薄者蓋慮此耳元履嘗疑學徒日衆非中都官守所宜熹却不慮此但恐來學者皆只是如此而為教者俯就太過略不審其所自則悔吝譏彈將有所不免矣況其流弊無窮不止為一時之害道之興喪實將繫焉願明者之熟慮之也答張敬夫類聚孔孟言仁處以求夫仁之説程子為人之意可謂深切然專一如此用功却恐不免長欲速好徑之心滋入耳出口之弊亦不可不察也大抵二先生之前學者全不知有仁字凡聖賢説仁處不過只作愛字看了自二先生以來學者始知理會仁字不敢只作愛説然其流復不免有弊者蓋專務説仁而於操存涵泳之功不免有所忽略故無復優柔厭飫之味克巳復禮之實不但其蔽也愚而巳而又一向離了愛字懸空揣摸既無真實見處故其為説恍惚驚怪弊病百端殆反不若全不知有仁字而只作愛字看却之為愈也熹竊嘗謂若實欲求仁固莫若力行之近但不學以明之則有擲埴冥行之患故其蔽愚若主敬致知交相為助則自無此蔽矣若且欲曉得仁之名義則又不若且將愛字推求若見得仁之所以愛而愛之所以不能盡仁則仁之名義意思暸然在目矣𥘉不必求之於恍愡有無之間也此雖比之今日髙妙之説稍為平易然論語中巳不肯如此迫切注解説破至孟子方間有説破處然亦多是以愛為言如惻隱之類殊不類近世學者驚怪恍愡窮髙極逺之言也今此録所以釋論語之言而首章曰仁其可知次章曰仁之義可得而求其後又多所以明仁之義云者愚竊恐其非聖賢發言之本意也又如首章雖列二先生之説而所解實用上蔡之意正伊川説中問者所謂由孝弟可以至仁而先生非之者恐當更詳究之也答張敬夫大抵觀過知仁之説欲只如尹説發明程子之意意味自覺深長如來喻者猶是要就此處強窺仁體又一句岐為二説似未甚安帖也又太極中正仁義之説若謂四者皆有動靜則周子於此更列四者之目為剩語矣但熟玩四字指意自有動靜其於道理極是分明蓋此四字便是元亨利貞四字仁元中亨義利正貞元亨利貞一通一復豈得為無動靜乎近日深玩此理覺得一語默一起居無非太極之妙正不須以分别為嫌也仁所以生之語固未瑩然語仁之用如此不語似亦無害不審髙明以為如何答張敬夫細看言仁序云雖欲竭力以為仁而善之不明其弊有不可勝言者此數句似未安為仁固是須當明善然仁字主意不如此所以孔子每以仁智對言之也近年説得仁字與智字都無分别故於令尹子文陳文子事説得差殊氣象淺迫全與聖人語意不相似觀此序文意思首尾恐亦未免此病更惟思之如何答張敬夫中字之説甚善而所論狀性形道之不同尤為精密開發多矣然愚意竊恐程子所云只一箇中字但用不同此語更可玩味夫所謂只一箇中字者中字之義未嘗不同亦曰不偏不倚無過不及而巳矣然用不同者則有所謂在中之義者有所謂中之道者是也蓋所謂在中之義者言喜怒哀樂之未發渾然在中亭亭當當未有箇偏倚過不及處其謂之中者蓋所以狀性之體段也有所謂中之道者乃即事即物自有箇恰好底道理不偏不倚無過不及其謂之中者則所以形道之實也只此亦便可見來教所謂狀性形道之不同者但又見得中字只是一般道理以此狀性之體假則為未發之中以此形道則為無過不及之中耳且所謂在中之義猶曰在裏靣底道理云爾非以在中之中字解未發之中字也愚見如此不審髙明以為如何忠恕之説竊意明道是就人分上分别淺深而言伊川是就理上該貫上下而言若就人分上説則違道不逺者賢人推之之事也一以貫之者聖人之不待推也若就理上平説則忠只是盡巳恕只是推巳但其所以盡所以推則聖賢之分不同如明道之説耳聖人雖不待推然由巳及物對忠而言是亦推之也大抵明道之言發明極致通透灑落善開發人伊川之言即事明理質慤精深尤耐咀嚼然明道之言一見便好久看愈好所以賢愚皆獲其益伊川之言乍見未好久看方好故非久於玩索者不能識其味此其自任所以有成人材尊師道之不同明道渾然天成不犯人力伊川功夫造極可奪天巧所引盡心知天恐是充擴得去之意不知是否秦漢諸儒解釋文義雖未盡當然所得亦多今且就分數多處論之則以為得其言而不得其意與奪之際似巳平允若更於此一向刻核過當却恐意思迫窄而議論偏頗反不足以服彼之心如向來所論知言不當言釋氏欲仁之病矣大率議論要得氣象寬宏而其中自有精密透漏不得處方有餘味如易傳序中説秦漢以來儒者之弊及令人看王弼胡安定王介甫易之類亦可見矣况此序下文反復致意不一而足不應猶有安於卑近之嫌也又所謂言雖近而索之無窮指雖逺而操之有要自謂此言頗有含蓄不審髙明以為如何以愛論仁猶升髙自下尚可因此附近推求庶其得之若如近日之説則道近求逺一向沒交涉矣此區區所以妄為前日之論而不自知其偏也至謂類聚言仁亦恐有病者正為近日學者厭煩就簡避迂求捷此風巳盛方且日趨於險薄若又更為此以導之恐益長其計獲欲速之心方寸愈見促迫紛擾而反陷於不仁耳然却不思所類諸説其中下學上逹之方蓋巳無所不具苟能深玩而力行之則又安有此弊今蒙來喻始悟前説之非敢不承命然猶恐不能人人皆肯如此慤實用功則亦未免尚有過計之憂不知可以更作一後序略采此意以警後之學者否不然或只盡載此諸往返議論以附其後亦庶乎其有益耳不審尊意以為如何答張敬夫壬辰冬答晦叔書鄙意正如此巳復推明其説以求教於晦叔矣但於來示所謂知底事者亦未能無疑巳并論之今録以上呈更乞垂教在中之義之説來諭説得性道未嘗相離此意極善但所謂此時蓋在乎中者文意簡略熹所未曉更乞詳諭又謂巳發之後中何嘗不在裏靣此恐亦非文意蓋既言未發時在中則是對巳發時在外矣但發而中節即此在中之理發形於外如所謂即事即物無不有箇恰好底道理是也一不中節則在中之理雖曰天命之秉彛而當此之時亦且漂蕩淪胥而不知其所存矣但能反之則又未嘗不在於此此程子所以謂以道言之則無時而不中以事言之則有時而中也所以又謂善觀者却於巳發之際觀之也若謂巳發之後中又只在裏面則又似向來所説以未發之中自為一物與巳發者不相涉入而巳發之際常挾此物以自隨也然此義又有更要子細處夫此心廓然𥘉豈有中外之限但以未發巳發分之則須如此亦若操舍存亡出入之云耳并乞詳之心譬之水是因知言有此言而發然性情既有動靜善惡既有順逆則此言乃自然之理非用意差排也人無有不善此一言固足以具性情之理然非所以論性情之名義也若論名義則如今來所説亦無害理不費力更推詳之太極圖立象盡意剖析幽微周子蓋不得巳而作也觀其手授之意蓋以為唯程子為能受之程子之祕而不示疑亦未有能受之者爾夫既未能默識於言意之表則道聽塗説其弊必有甚焉近年巳覺頗有此弊矣觀其答張閎中書云書雖未出學未嘗不傳第患無受之者及東見録中論橫渠清虛一大之説使人向别處走不若且只道敬則其微意亦可見矣若西銘則推人以知天即近以明逺於學者之用為尤切非若此書詳於天而略於人有不可以驟而語者也孔子雅言詩書執禮而於易則鮮及焉其意亦猶此耳韓子曰堯舜之利民也大禹之慮民也深其周子程子之謂乎熹向所謂微意者如此不識髙明以為如何答張敬夫所引家語只是證明中庸章句要見自哀公問政至擇善固執處只是一時之語耳於義理指歸𥘉無所害似不必如此力加排斥也大率觀書但當虛心平氣以徐觀義理之所在如其可取雖世俗庸人之言有所不廢如有可疑雖或傳以為聖賢之言亦須更加審擇自然意味平和道理明白腳踏實地動有據依無籠罩自欺之患若以此為卑近不足留意便欲以明道先生為法竊恐力量見識不到它地位其為泛濫殆有甚焉此亦不可不深慮也且不知此章既不以家語為證其章句之分當復如何為定耶家語固有駁雜處然其間亦豈無一言之得耶一槩如此立論深恐終啓學者好髙自大之弊願明者熟察之其他如首章及論費隱處後來略巳修改如來喻之意然若必謂兩字全然不可分説則又是向來伯恭之論體用一源矣如何如何答張敬夫語解語解云學者工夫固無間斷又當時時紬繹其端緒而涵泳之此語恐倒置若工夫巳無間斷則不必更言時習時習者乃所以為無間斷之漸也巧言令色一段自辭欲巧以下少曲折近與陳明仲論此説具别𥿄三省者曽子之為仁恐不必如此説蓋聖門學者莫非為仁不必專指此事而言意思却似淺狹了大抵學者為其所不得不為者至於人欲盡而天理全則仁在是矣若先有箇云我欲以此去為仁便是先獲也昨於知言疑義中嘗論此意矣傳不習乎疑只當為傳而不習之意則文理順亦是先孝弟而後學文之類道千乘之國道字意恐未安友不如巳恐只是不勝巳胡侍郎説得此意思好愼非獨不忽追非獨不忘恐不必如此説上蔡多好如此似有病也厚者德之所聚而惡之所由消靡此句亦未安父在觀其志一章似皆未安信近於義則言必可復矣恭近於禮則可逺恥辱矣因是二者而不失其所親則亦可尚也巳熹舊説此章只如此似於文意明順與上文孝弟謹信而親仁下文篤敏愼而就正意亦相類不審尊意以為如何樂與好禮視無諂無驕正猶美玉之與碔砆此句與後面必也無諂無驕然後樂與好禮可得而進焉者似相戾蓋玉石有定形而不可變唯王霸之異本殊歸者乃得以此為譬耳熹又嘗論此所引詩正謂孔子以無諂無驕為未足必至於樂與好禮而後巳有似乎治骨角者既切之而復磋之治玉石者既琢之而復磨之蓋不離是質而治之益精之意也如何如何患不知人恐未合説到明盡天理處正為取友用人而言耳大率此解雖比舊説巳為平援尚時有貪説髙逺恐怕低了之意更乞平心放下意味當更深長也首章便如此矣援字疑穩字之誤答張敬夫論中庸章句率夫性之自然此語誠似太快然上文説性巳詳下文又舉仁義禮智以為之目則此句似亦無害或必當改則改為所有字如何然恐不若不改之渾然也不睹不聞等字如此剖析誠似支離然不如此則經文所謂不睹不聞所謂隱微所謂獨三段都無分别却似重復冗長須似熹説方見得戒愼不睹恐懼不聞是大綱説結上文可離非道之意莫見乎隱莫顯乎微是就此不睹不聞之中提起善惡之幾而言故君子愼其獨蓋其文勢有表裏賔主之異須略分别意思方覺分明無重復處耳隨時為中為改作處如何道之不明不行來喻與鄙意大指不異但語有詳略逺近不同耳然熹所謂不必知不必行所當知所當行等句正是要形容中字意思所謂以為不足行以為不必知不知所以行不求所以知等句又是緊切關紐處恐不可闕但鄙論自覺有箇瑣碎促狹氣象不能如來教之髙明簡暢為可恨然私竊以謂不期於同而期於是而巳故又未能遽舍所安萬一將來就此或有尺寸之進此病當自去耳大抵近年所修諸書多類此以此未滿意欲為踈通簡易之説又恐散漫無收拾處不知所以裁之也答張敬夫中庸謹獨處誠覺未甚顯煥然著盡氣力只説得如此近𣣔只改末後一句云所謂獨者合二者而言之不睹之睹不聞之聞也比舊似巳稍勝然終亦未為分明也更乞以尊意為下數語如何以敬為主則內外肅然不忘不助而心自存不知以敬為主而欲存心則不免將一箇心把捉一箇心外面未有一事時裏靣已是三頭兩緒不勝其擾擾矣就使實能把捉得住只此巳是大病況未必真能把捉得住乎儒釋之異亦只於此便分了如云常見此心光爍爍地便是有兩箇主宰了不知光者是真心乎見者是真心乎來諭剖析雖極精微却似未及此意愚慮及此不審是否如何何有於我哉古注云人無是行於我獨我有之按此語是孔子自言此三事何人能有如我者哉孔子之意蓋欲勉人以學也伊川先生似亦是如此説默識而無厭倦何有於我哉勉人學當如是也所以發明夫子之意而尹和靖云孰能如孔子者哉是以勉學者云耳又所以發明伊川之意蓋此兩項七事乃人之當然而示之以近者故聖人以此自居而不以為嫌如云不如丘之好學之意語雖若少揚而意實巳深自抑矣吕氏之説句中添字太多恐非本意如吾有知乎哉無知也兩句文義亦自難説近看似此等處極多日前都草草懸空説過了也再答敬夫論中庸章句執其兩端熹説是推明程子之意未有過巧之病如來諭云云固先儒所未及然却似過巧兼此方論中未應遽及此又似隔驀説過了一位也強哉矯矯強貌古注云爾似巳得之吕楊之説却恐不平穩也素隱俟更思之造端乎夫婦如此説固好但恐句中欠字太多兼造端兩字是實下功夫之意不應如此泛濫也此類當兩存之人心之所安者即道也上文有率性之謂道云云故其下可以如此説若恐人錯會當更曉破耳遊子之言行相顧為有餘不足之事恐未安此數句各是一事不可混而為一也細意玩之自可見矣此亦當兩存之章句之失誠如尊喻此間朋友亦有疑其如此者但鄙意疑此書既是子思所著首尾次序又皆分明不應中間出此數章全無次序所以區區推考如此竊意其中必須略有此意正使不盡如此亦勝如信彩逐假各自立説不相管屬也更望細考若果未安當為疑詞以見之大率擺落章句談説玄妙慣了心性乍見如此瑣細區别自是不奈煩耳與張敬夫六月二十八日夷齊讓國而逃諫伐而餓此二事還相關否或謂先巳讓國則後來自是不合更食周粟若爾則當時自不必歸周亦不待見牧野之事又諌不從而後去也且若前日已曽如彼即今日更不得如此此與時中之義不知又如何凡此鄙意皆所未安幸乞垂教答張敬夫三月十四日熹昨承誨諭五王之事以為但復唐祚而不立中宗則武曌可誅後患亦絶此誠至論但中宗雖不肖而當時幽廢特以一言之失罪狀未著人望未絶觀一時忠賢之心與其募兵北討之事及後來諸公説李多祚之語則是亦未遽為獨夫也乃欲逆探未形之禍一旦舍之而更立宗室恐反為計校利害之私非所以順人心乘天理而事亦未必可成也愚慮如此然而此外又未見别有長䇿不知髙明以為如何若維州事則亦嘗思之矣唐與牛李蓋皆失之也夫不知春秋之義而輕與戎盟及其犯約攻圍魯州又不能聲罪致討絶其朝貢至此乃欲效其失信叛盟之罪而受其叛臣則其義有所不可矣然還其地可也縳送悉怛謀使肆其殘酷則亦過矣若論利害則僧孺固為人言以恐文宗如致堂之所論而吐蕃卒不能因維州以為唐患則德𥙿之計不行亦未足為深恨也計髙明於此必有定論幸并以見教牛論正而心則私李計譎而心則正何有於我哉後來思尹子説誠未安竊意只是不居之詞聖人之言此類甚多不以俯就為嫌也惡知其非有也頃時亦嘗為説正如晦叔之意後來又以為疑乃如尊兄所諭今細思之却不若從晦叔之説文意俱順法戒亦嚴不啓末流之弊也如何如何答張敬夫十二月熹窮居如昨無足言者但逺去師友之益兀兀度日讀書反巳固不無警省處終是旁無強輔因循汨沒尋復失之近日一種向外走作心悅之而不能自巳者皆凖止酒例戒而絶之似覺省事此前輩所謂下士晚聞道聊以拙自修者若充擴不巳輔復前非庶其有日舊讀中庸愼獨大學誠意母自欺處常苦求之太過措詞煩猥近日乃覺其非此正是最切近處最分明處乃舍之而談空於冥漠之間其亦誤矣方竊以此意痛自檢勒凛然度日惟恐有怠而失之也至於文字之間亦覺向來病痛不少蓋平日解經最為守章句者然亦多是推衍文義自做一片文字非惟屋下架屋説得意味淡薄且是使人看者將注與經作兩項功夫做了下稍看得支離至於本旨全不相照以此方知漢儒可謂善説經者不過只説訓詁使人以此訓詁玩索經文訓詁經文不相離異只做一道看了直是意味深長也中庸大學章句緣此略修一過再録上呈然覺其間更有合刪處論語亦如此草定一本未暇脫藁孟子則方欲為之而日力未及也近又讀易見一意思聖人作易本是使人卜筮以決所行之可否而因之以教人為善如嚴君平所謂與人子言依於孝與人臣言依於忠者故卦爻之辭只是因依象類虛設於此以待扣而決者使以所值之辭決所疑之事似若假之神明而亦必有是理而後有是辭但理無不正故其丁寧告戒之詞皆依於正天下之動所以正夫一而不繆於所之也以此意讀之似覺卦爻十翼指意通暢但文意字義猶時有窒礙蓋亦合純作義理説者所以強通而不覺其礙者也今亦録首篇二卦拜呈此説乍聞之必未以為然然且置之勿以示人時時虛心略賜省閲久之或信其不妄耳傷急不容耐之病固亦自知其然深以為苦而未能革若得伯恭朝夕相處當得減損但地逺不能數見為恨耳此間朋友絶少進益者擇之久不相見覺得病痛日深頃與伯恭相聚亦深歎今日學者可大受者殊少也奈何奈何子夀兄弟氣象甚好其病却是盡廢講學而專務踐覆却於踐履之中要人提撕省察悟得本心此為病之大者要其操持謹質表裏不二實有以過人者惜乎其自信太過規模窄狹不復取人之善將流於異學而不自知耳鄉約之書偶家有藏本且欲流行其實恐亦難行如所喻也然使讀者見之因前輩所以教人善俗者而知自修之日亦庶乎其小輔耳日疑目字之誤答張敬夫集大成説孔子之謂集大成集合也言合衆理而大備於身也或曰集謂合樂成謂樂之一變此即以樂譬之也集大成也者金聲而玉振之也金聲也者始條理也玉振之也者終條理也始條理者智之事也終條理者聖之事也此以樂明之也金聲之變無窮玉聲首尾如一振之者振而節之猶今樂之有拍也凡作樂者始以金奏而後以玉振之猶聖人之合衆理而備於身也條理衆理之脈絡也始窮其然而縷析毫分者智也終備於身而渾然一貫者聖也二者惟孔子全之三子則始不盡而終不備也漢兒寬論封禪亦云兼總條貫金聲而玉振之意亦如此疑此古樂家語也知譬則巧也聖譬則力也猶射於百步之外也其至爾力也其中非爾力也此復以射明之也射之所以中者巧也其所以至者力也中雖在至之後然其必中之巧則在未發之前也孔子巧力兼全至而且中三子力而不巧各至其至而不能中也若顔子則巧足以中特力未充而死耳承示及集大成説發明詳備此説大意不過如此今所欲論者正在言語氣象微細曲折之間然則來説似頗傷冗費腳手無餘味矣金玉二字正是譬喻親切有功處今却不曽説及只做始終字看了如此則孟子此一節譬喻全是剩語矣舊見學者所傳在臨安時説此一段却似簡當然亦不能盡記熹舊所解又偶為人借去不及參考得失然記得亦似太多今略説如前竊謂似此巳是不精約使人無可玩味了若更著外來意思言語即愈支離矣不審髙明以為如何答敬夫孟子説疑義告子篇論性數章按此解之體不為章解句釋氣象髙逺然全不略説文義便以己意立論又或别用外字體貼而無脈絡連綴使不曉者展轉迷惑粗曉者一向支離如此數章論性其病尤甚蓋本文不過數語而所解者文過數倍本文只謂之性而解中謂之太極凡此之類將使學者不暇求經而先坐困於吾説非先賢談經之體也且如易傳巳為太詳然必先釋字義次釋文義然後推本而索言之其淺深近逺詳密有序不如是之匆遽而繁雜也大抵解經但可略釋文義名物而使學者自求之乃為有益耳夜氣不足以存解云夜氣之所息能有幾安可得而存乎按此句之義非謂夜氣之不存也凡言存亡者皆指心而言耳觀上下文可見云仁義之心又云放其良心又云操則存舍則亡惟心之謂與正有存亡二字意尤明白蓋人皆有是良心而放之矣至於日夜之所息而平旦之好惡與人相近者則其夜氣所存之良心也及其旦晝之所為有梏亡之則此心又不可見若梏亡反覆而不巳則雖有日夜之所息者亦至微薄而不足以存其仁義之良心矣非謂夜氣有存亡也若以氣言則此章文意首尾衡決殊無血脈意味矣程子亦曰夜氣之所存者良知良能也意蓋如此然舊看孟子未曉此意亦只草草看過也大體小體此章之解意未明而説太漫蓋唯其意之未明是以其説不得而不漫也按本文耳目之官不思而蔽於物心之官則思此兩節方是分别小體之不可從而大體之當從之意解云從其大體心之官也從其小體耳目之官也只此便多却從其四字矣下文始結之云此二者皆天之所以與我者但當先立乎其大者則小者不能奪耳此章內先立乎其大者一句方是説用力處而此句內立字尤為要切據今所解全不曽提掇著立字而只以思為主心不立而徒思吾未見其可也於是又有君子徇理小人徇欲之説又有思非泛而無統之説又有事事物物皆有所以然之説雖有心得其宰之云然乃在於動而從理之後此由不明孟子之本意是以其説雖漫而愈支離也七八年前見徐吉卿説曽問焦某先生為學之要焦云先立乎其大者是時熹説此章正如此解之支離聞之惘然不解其語今而思之乃知焦公之學於躬行上有得力處反身而誠解云反身而至於誠則心與理一云云按此解語意極髙然只是贊詠之語施之於經則無發明之助施之於巳則無體驗之功竊恐當如張子之説以行無不慊於心解之乃有落著兼樂莫大焉便是仰不愧俯不怍之意尤慤實有味也若只懸空説過便與禪家無以異矣所過者化所存者神解中引程子張子之説合而為一按此程子張子之説自不同不可合為一説程子云所過者化是身所經歷處所存者神所存主處便神是言凡所經過處人皆化也而心所存主處便有鼓舞風動之意不待其居之久而後見其效也經歷及便字尤見其意又引緩來動和及易傳革卦所引用亦可見也今以孟子上下文意求之恐當從程子為是張子説雖精微然恐非本文之意也君子不謂命也此一章前一節文意分明然其指意似亦止為不得其欲者而發後一節古今説者未有定論今讀此解説智之於賢者聖人之於天道兩句極為有功但上三句却似未穩蓋但云出於自然則只似言性而非所以語命矣頃見陳傳良作此論意正如此方以為疑不知其出於此豈嘗以是告之耶熹竊謂此三句只合依程子説為稟有厚薄亦與下兩句相通蓋聖與賢則其稟之厚而君子所自以為稟之薄而不及者也然則此一節亦專為稟之薄者而發可欲之謂善有諸巳之謂信竊詳所解熹舊説亦然自今觀之恐過髙而非本意也蓋此六位為六等人爾今為是説則所謂善者乃指其理而非目其人之言矣與後五位文意不同又舊説信為自信之意今按此六位皆它人指而名之之辭然則亦不得為自信之信矣近看此兩句意思似稍穩當蓋善者人之所同欲惡者人之所同惡人之為人有可欲而無可惡則可謂之善人矣然此特天資之善耳不知善之為善則守之不固有時而失之惟知其所以為善而固守之然後能實有諸巳而不失乃可謂之信人也張子曰可欲之謂善志仁則無惡也誠善於心之謂信正是此意不審高明以為如何此説信字未是後别有説前書所示孟子數義皆善但條理字恐不必如此説蓋此兩字不能該得許多意思也始條理終條理猶曰智之事聖之事云爾條理字不須深説但金玉二字却須就始終字上説得有來歷乃佳耳易之説固知未合亦嘗拜稟姑置之以俟徐考矣大抵平日説得習熟乍聞此説自是信不及但虛心而微玩之久當釋然耳若稍作意主張求索便為舊説所蔽矣此書近亦未暇卒業却看得周禮儀禮一過注疏見成却覺不甚費力也亦嘗為人作得數篇記文隨事頗有發明卒未有人寫得俟送碑人回附呈求教也心氣未和每加鐫治竟不能悛中間嘗覺求理太多而涵泳之功少故日常匆迫而不暇於省察遂欲盡罷生面功夫且讀舊所習熟者而加涵養之力竟復汩沒又不能遂大抵氣質動擾處多難收斂也且如近讀二禮亦是無事生事也蘄州文字亦嘗見之𥘉意其説止是不喜人闢佛而惡人之溺於佛者既而考之其間大有包藏遂為出數百言以曉之只欲俟伯諌歸而示之未欲廣其書也近年士子稍稍知向學而怪妄之説亦復螽起其立志不髙見理不徹者皆為所引取甚可慮也間嘗與佛者語記其説亦成數篇後便并附呈次昨夕因看大學舊説見人之所親愛而辟焉處依古注讀作譬字恐於下文意思不屬據此辟字只合讀作僻字蓋此言常人於其好惡之私常有所偏而失其正故無以察乎好惡之公而施於家者又溺於情愛之間亦所以多失其道理而不能整齊也如此讀之文理極順又與上章文勢正相似且此篇惟有此五辟字卒章有辟則為天下僇辟字亦讀為僻足以相明但畏敬兩字𥘉尚疑之細看只為人所懾憚如見季子位髙金多之比云爾此説尤生不知尊意以為如何然此非索而獲之偶讀而意思及此耳近年靜中看得文義似此處極多但不敢一向尋求而於受用得力處則亦未有意思耳與張敬夫論癸巳論語説學而時習之程子曰時復紬繹本文作思繹今此所引改思為紬不知何説學者之於義理當時紬繹其端緒而涵泳之也學而時習之此是論語第一句句中五字雖有虛實輕重之不同然字字皆有意味無一字無下落讀者不可以不詳而説者尤不可以有所略也學之為言效也以巳有所未知而效夫知者以求其知以巳有所未能而效夫能者以求其能之謂也而者承上起下之辭也時者無時而不然也習者重復溫習也之者指其所知之理所能之事而言也言人既學矣而又時時溫習其所知之理所能之事也蓋人而不學則無以知其所當知之理無以能其所當為之事學而不習則雖知其理能其事然亦生澀危殆而不能以自安習而不時雖曰習之而其功夫間斷一暴十寒終不足以成其習之之功矣聖言雖約而其指意曲折深密而無窮蓋如此凡為解者雖不必如此瑣細剖析然亦須包含得許多意思方為完備今詳所解於學而兩字全然闊略而但言紬繹義理以解時習之意夫人不知學其將何以知義理之所在而紬繹之乎且必曰紬繹義理之端緒而涵泳之又似義理之中别有一物為之端緒若繭之有絲既紬繹出來又從而涵泳之也語意煩擾徒使學者胸中優優拈一放一將有揠苗助長之患非所以示人入德之方也説者油然內慊也程子但言浹洽於中則説雖不正解説字而説字之意巳分明既述程語而又增此句似涉重復則慊者行事合理而中心滿足之意施之於此似亦未安孝弟也者其為仁之本與自孝弟而始為仁之道生而不窮按有子之意程子之説王謂事親從兄愛人利物莫非為仁之道但事親從兄者本也愛人利物者末也本立然後末有所從出故孝弟立而為仁之道生也今此所解語意雖髙而不親切其愛雖有差等而其心無不溥矣此章仁字正指愛之理而言曰易傳所謂偏言則一事者是也故程子於此但言孝弟行於家而後仁愛及於物乃著實指事而言其言雖近而指則逺也今以心無不溥形容所包雖廣然恐非本旨殊覺意味之浮淺也曰字恐誤巧言令色若夫君子之修身謹於言語容貌之間乃所以體當在巳之實事是求仁之要也此意甚善但恐須先設疑問以發之此語方有所指今無所發端而遽言之則於經無所當而反亂其本意矣如易傳中發明經外之意亦必設為問答以起之蓋須如此方有節次來歷且不與上文解經正意相雜而其抑揚反覆之間尤見得義理分明耳為人謀而不忠處於巳者不盡也處字未安道千乘之國信於巳也巳字未安自使民以時之外此句無所當恐是羡字母友不如巳者不但取其如巳者又當友其勝巳者經但言母友不如巳者以見友必勝巳之意今乃以如巳勝己分為二等則失之矣而其立言造意又似欲髙出於聖言之上者解中此類甚多恐非小病也愼終追逺愼非獨不忘之謂誠信以終之也追非獨不忽之謂久而篤之也以愼為不忘追為不忽若舊有此説則當引其説而破之若𥘉無此説則此兩句亦無所當矣且下文兩句所解亦未的當凡事如是所以養德者厚矣愼終追遠自是天理之所當然人心之所不能巳者人能如此則其德自厚而民化之矣今下一養字則是所以為此者乃是欲以養德而其意不專於愼終追逺矣厚者德之聚而惡之所由以消靡也此語於經無當於理未安父在觀其志志欲為之而有不得行則孝子之所以致其深愛者可知此章舊有兩説一説以為為人子者父在則能觀其父之志而承順之父沒則能觀其父之行而繼述之此經所言亦為人之父不能皆賢不能皆不肖故通上下而言以中人為法耳今解又云三年無改者言其常也似亦非是若言其常則父之所行子當終身守之可也豈但以三年無改為孝哉信近於義恭謂貌恭又曰恭而過於實適所以招恥辱恭不近禮謂之無節而過卑則可謂之貌恭而過實則失之矣且貌恭而過實亦非所以取耻辱也言而不可復則不可行將至於失其信矣或欲守其不可復之言則􅊇於理而反害於信矣此結句似不分明恐未盡所欲言之曲折也竊原本意蓋曰欲其言之信於人而不度於義者復之則害於義不復則害於信進退之間蓋無適而可也故君子欲其言之信於人也必度其近於義而後出焉則凡其所言者後無不可復之患矣恐須如此説破方分明也就有道而正焉異世而求之書本文未有此意恐不須過説或必欲言之則别為一節而設問以起之可也貧而樂富而好禮進於善道有日新之功其意味蓋無窮矣此語不實詩三百其言皆出於惻怛之公心非有它也惻怛與公心字不相屬非有它也乃嫌於有它而解之之辭然亦泛矣詩發於人情似無有它之嫌若有所嫌亦須指言何事不可但以有它二字槩之也無違生事之以禮以敬養也死葬之以禮必誠必信也祭之以禮致敬而忠也專言敬則愛不足專言誠信則文不足忠字尤所未曉然致敬而忠恐亦未足以盡祭禮大率聖人此言至約而所包極廣條舉悉數猶恐不盡况欲率然以一言該之乎十世可知若夫自嬴秦氏廢先王之道而一出於私意之所為有王者作其於繼承之際非損益之可言直盡因革之宜而巳此一節立意甚偏而氣象褊迫無聖人公平正大隨事順理之意且如此説則是聖人之言不足以盡古今之變其所謂百世可知者未及再世而巳不驗矣嘗究此章之指惟古注馬氏得之何晏雖取其説而復亂以巳意以故後來諸家祖習其言展轉謬誤失之愈遠至近世吳才老胡致堂始得其説最為精當吳説有續解考異二書而考異中此章之説為尤詳願試一觀或有取焉大抵此二家説其它好處亦多不可以其後出而忽之也非其鬼而祭之諂也無其鬼神是徒為諂而巳聖人之意罪其祭非其鬼之為諂而不幾其祭無其鬼之徒為諂也諂自惡德豈論其有鬼無鬼徒與不徒也哉韶武聖人之心𥘉無二致揖遜征伐時焉而巳此理固然但此處解美善兩字而為此説似以舜武心皆盡美而武王之事有未盡善則美字反重而善字反輕為不倫耳蓋美者聲容之盛以其致治之功而言也善者致美之實以其德與事而言也然以德而言則性之反之雖有不同而成功𥘉無適莫而不知義故徇其私意以為可否而反為有適有莫既有適莫故遂不復求義之所在而卒陷於一偏之説也求為可知若曰使巳有可知之實則人將知之是亦患莫巳知而巳豈君子之心哉此説過當若曰所謂求為可知者亦曰為其所當為而巳非謂務皎皎之行以求聞於人也則可矣一以貫之道無不該也有隱顯內外本末之致焉若無隱顯內外本末之致則所謂一貫者亦何所施哉此意其善然其辭則似生於辨論反覆之餘者今發之無端則無所當而反為煩雜若曰聖人之心於天下事物之理無所不該雖有內外本末隱顯之殊而未嘗不一以貫之也則言順而理得矣欲訥於言言欲訥者畏天命行欲敏者恭天職言行自當如此不必為畏天命恭天職而然今若此言則是以言行為小而必稱天以大之也且言行之分屬未穩當行之欲敏獨非畏天命耶晝寢知抑精矣抑字恐誤臧文仲世方以小慧為知小慧似非所以言臧文仲季文子非誠其思此語未善顔淵季路侍為吾之所當為而巳則其於勞也奚施施勞舊説皆以施為勿施於人之施勞者勞辱之事今如此説語不分明子細推尋似亦以施為夸張之意勞為功勞之勞其意雖亦可通但不知勞字有如此用者否耳必如此説更須子細考證説令明白乃佳存乎公理此句亦未善質勝文則野失而為府史之史寧若為野人之野乎此用楊氏與其史也寧野之意然彼亦以為必不得巳而有所偏勝則寧若此耳今解乃先言此而又言矯揉就中之説則既曰寧為野人之野矣又何必更説修勉而進其文乎文理錯雜前後矛盾使讀者不知所以用力之方恐當移此於矯揉就中之後則庶乎言有序而不悖也人之生也直罔則昧其性是冥行而已矣此説似好然承上文直字相對而言則當為欺罔之罔中人以下不驟而語之以上是亦所以教之也孟子言不屑之教誨是亦教誨之蓋為不屑之教誨已是絶之而不復教誨然其所以警之者亦不為不至故曰是亦教誨之而巳矣所謂亦者非其正意之辭也若孔子所言中人以下未可語上而不驟語之以性與天道之極致但就其地位告之以切已著實之事乃是教之道正合如此非若不屑之教誨全不告語而但棄絶以警之也今日是亦教誨之也則似教人者不問其人品之髙下必盡告以性與天道之極致然後始可謂之教誨才不如此便與絶而不教者無異此極害理非聖門教人之法也且著此一句非惟有害上文之意覺得下文意思亦成躐等氣象不佳試思之若但改云不驟而語之以上是乃所以漸而進之使其切問近思而自得之也則上下文意接續貫通而氣象無病矣此所撰集注巳依此文寫入矣敬鬼神而逺之逺而不敬是誣而巳誣字未安知仁動靜知之體動而靜在其中仁之體靜而動在其中此義甚精蓋周子太極之遺意亦巳寫入集注諸説之後矣但在此處讀之覺得有急迫之病略加曲折别作一節意思發明乃佳大抵此解之病在於太急迫而少和緩耳子見南子過衛國必見寡小君孔子居衛最久不可但言過衛見小君者禮之當然非特衛國如此也夫子聽衛國之政必自衛君之身始此理固然然其間似少曲折只如此説則亦粗暴而可畏矣試更思之若何博施濟衆不當以此言仁也仁之道不當如此求也但言不當而不言其所以不當之故不足以發聖人之意先言仁者而後以仁之方結之立人逹人仁也能近取譬恕也自是兩事非本一事而先言後結也述而不作聖人所以自居者平昜如此平易二字説不著老彭孔子事同而情性功用則異孔子賢於堯舜非老彭之所及人皆知之自不須説但其謙退不居而反自比焉且其辭氣極於遜讓而又出於誠實如此此其所以為盛德之至也為之説者正當於此發其深微之意使學者反復潛玩識得聖人氣象而因以消其虛驕傲誕之習乃為有力今但以平易二字等間説過而於卒章忽為此論是乃聖人鞠躬遜避於前而吾黨為之攘𬒮扼腕於後也且無乃使夫學者疑夫聖人之不以誠居謙也乎哉大率此解多務發明言外之意而不知其反戻於本文之指為病亦不細也默而識之默識非言意之所可及蓋森然於不睹不聞之中也又云世之言默識者類皆想像億度驚怪恍惚不知聖門實學貴於踐履隱微之際無非真實默識只是不假論辨而曉此事理如侯子辨揔老之説是巳蓋此乃聖人之謙詞未遽説到如此深逺處也且此説雖自踐履言之然其詞氣則與所謂驚怪恍惚者亦無以相逺矣子之燕居聖人聲氣容色之所形如影之隨行聲氣容色不離於形同是一物影之於形雖曰相隨然却是二物以此况彼欲密而反疏矣且衆人聲氣容色之所形亦以有於中而見於外者豈獨聖人為然哉志於道藝者所以養吾德性而巳上四句解釋不甚親切而此句尤有病蓋藝雖未節然亦事理之當然莫不各有自然之則焉曰遊於藝者特欲其隨事應物各不悖於理而巳不悖於理則吾之德性固得其養然𥘉非期於為是以養之也此解之云亦原於不屑卑近之意故耻於遊藝而為此説以自廣耳又按張子曰藝者日為之分義也詳味此句便見得藝是合有之物非必為其可以飬德性而後遊之也自行束修以上辭氣容色之間何莫非誨也固不保其往爾誨字之意恐未説到辭氣容色之間亦未有不保其往之意也蓋吾無隱乎爾乃為二三子以為有隱而發不保其往乃為門人疑於互鄉童子而發皆非平日之常言不應於此無故而及之也若以禮來者不以一言告之而必俟其自得於辭氣容色之間又先萌不保其往之意則非聖人物來順應之心矣此一章之中而説過兩節意思尤覺氣迫而味短也憤悱憤則見於辭氣悱則見於顔色此兩字與先儒説正相反不知别有據否子謂顔淵其用也豈有意於行之其舍也豈有意於藏之聖人固無意必然亦謂無私意期必之心耳若其救時及物之意皇皇不舍豈可謂無意於行之哉至於舍之而藏則雖非其所欲謂舍之而猶無意於藏則亦過矣若果如此則是孔顔之心漠然無意於應物推而後行曵而後往如佛老之為也聖人與異端不同處正在於此不可不察也程子於此但言用舍無與於巳行藏安於所遇者也詳味其言中正微密不為矯激過髙之説而語意卓然自不可及其所由來者逺矣程子又云樂行憂違憂與樂皆道也非巳之私也與此相似亦可玩味子行三軍則誰與臨事而懼好謀而成古之人所以成天下之事而不失也豈獨可行三軍而巳哉臨事而懼好謀而成本為行三軍而發故就行三軍上觀之尤見精密蓋聖人之言雖曰無所不通而即事即物毫釐之間又自有不可易處若如此解之云是乃程子所謂終日乾乾節節推去之病矣子所雅言性與天道亦豈外是而它得哉固是如此然未須説子不語語亂則損志損志二字未安弋不射宿不忍乘危乘危二字未安奢則不孫聖人斯言非勉學者為儉而巳聖人深惡奢之為害而寧取夫儉之失焉則其所以勉學者之為儉其意切矣今為此説是又欲求髙於聖人而不知其言之過心之病也溫公謂楊子作玄本以明易非敢别作一書以與易競今讀此書雖名為説論語者然考其實則幾欲與論語競矣鄙意於此深所未安不識髙明以為如何曽子有疾召門弟子形體且不可傷則其天性可得而傷乎此亦過髙之説非曽子之本意也且當著明本文之意使學者深慮保其形體之不傷而盡心焉是則曽子所為丁寧之意也且天性亦豈有可傷之理乎孟敬子問之將死而言善人之性則然此語太略幾不可曉恐當加詳焉動容貌者動以禮也正顔色者正而不妄也出詞氣者言有物也動容貌則暴慢之事可逺正顔色則以實而近信出詞氣則鄙倍之意可逺此説蓋出於謝氏以文意求之既所未安而以義理觀之則尤有病蓋此文意但謂君子之所貴乎道者有此三事動容貌而必中禮也正顔色而非色莊也出詞氣而能合理也蓋必平日莊敬誠實涵養有素方能如此若其不然則動容貌而不能逺暴慢矣正顔色而不能近信矣出詞氣而不能逺鄙倍矣文勢如此極為順便又其用功在於平日積纍深厚而其效驗乃見於此意味尤覺深長明道尹氏説蓋如此惟謝氏之説以動正出為下功處而此解宗之夫經但云動則其以禮與否未可知但云正則其妄與不妄未可見但云出則其有物無物亦未有以驗也蓋夫子嘗言非禮勿動則動容固有非禮者矣今但曰動則暴慢如何而遽可逺乎又曰色取仁而行違則正色固有不實者矣今但曰正則信如何而遽可近乎又曰出其言不善則出言固有不善者矣今但曰出則鄙倍如何而遽可遠乎此以文義考之皆所未合且其用力至淺而責效過深正恐未免於浮躁淺迫之病非聖賢之本指也弘毅弘由充擴而成此句似説不著民可使由之使自得之此亦但謂使之由之耳非謂使之知也蕩蕩乎民無能名焉無所不該而其用則密只廣大便難名不必言其用之密也禹吾無間然矣皆所以成其性耳禹之所行皆理之所當然固是本出於性然禹亦為其所當為而巳非以其能成吾性而後為之也子絶四絶而不復萌此顔子不二過之事非所以語孔子蓋此絶字猶曰無耳然必言絶而不言無者見其無之甚也顔淵喟然歎曰約我以禮謂使之宅至理於隱微之際候氏曰博文致知格物也約禮克巳復禮也其説最善此解説得幽深却無意味也必曰如者言其始見之端的者然也此句亦不可曉未見好德衆人物其性此語未安蓋性非人所能物衆人但不能養其性而流於物耳性則未嘗物也語之而不惰不惰謂不惰其言也夫子之言昭然發見於顔子日用之中此之謂不惰惰字乃怠惰之義如所解乃墜墮之義字自作墮或有通作墮者不作惰也且其為説又取禪家語墮之意鄙意於此尤所未安也衣敝緼𫀆不忮不求之外必有事焉此語不可曉可與共學或者指權為反經合道驚世難能之事世俗所謂權者乃隨俗習非偷安苟得如公羊祭仲廢君之類耳正不謂驚世難能之事也唐棣之華唐棣之詩周公誅管蔡之事論語及詩召南作唐棣小雅作常棣無作棠者而小雅常字亦無唐音爾雅又云唐棣棣常棣移則唐棣常棣自是兩物而夫子所引非小雅之常棣矣且今小雅常棣之詩章句聮屬不應别有一章如此蓋逸詩爾論語此下别為一章不連上文范氏蘇氏巳如此説但以為思賢之詩則未必然耳或説此為孔子所刪小雅詩中之一章亦無所考且以文意參之今詩之中當為第幾章耶食饐而餲聖人所欲不存豈有一毫加於此哉此句不可曉出三日不食之矣或出三日則寧不食焉按經文此句乃解上文祭肉不出三日之意言所以三日之中食之必盡而不使有餘者蓋以若出三日則人將不食而厭棄之非所以敬神惠也不可則止有不合於正理則從而止之按經文意不可則止但謂不合則去耳前篇論朋友處不可則止文意正同今為此説穿鑿費力而不成文理竊所未安且兩句文同不應指意頓異如此也點爾何如曽子非有樂乎此也至故行有不掩焉也此論甚髙然反復玩之則夸張侈大之辭勝而慤實淵深之味少且其間文意首尾自相背戾處極多且如所謂曽子非有樂乎此也蓋以見夫無不得其樂之意耳只此一句便自有兩重病痛夫謂曽子非有樂乎此此本於明道先生簞瓢陋巷非有可樂之説也然顔曽之樂雖同而所從言之則異不可不察也蓋簞瓢陋巷實非可樂之事顔子不幸遭之而能不以人之所憂改其樂耳若其所樂則固在夫簞瓢陋巷之外也故學者欲求顔子之樂而即其事以求之則有沒世而不可得者此明道之説所以為有功也若夫曽晢言志乃其中心之所願而可樂之事也蓋其見道分明無所係纍從容和樂欲與萬物各得其所之意莫不靄然見於詞氣之間明道所謂與聖人之志同便是堯舜氣象者正指此而言之也學者欲求曽晢之胸懷氣象而舍此以求之則亦有沒世而不可得者矣夫二子之樂雖同而所從言則其異有如此者今乃以彼之意為此之説豈不誤哉且夫子之問欲知四子之所志也四子之對皆以其平日所志而言也今於曽晢之言獨謂其特以見夫無所不得其樂之意則是曽晢於夫子之問獨不言其平日之所志而臨時信口撰成數句無當之大言以夸其無所不樂之髙也如此則與禪家拈槌竪拂指東畫西者何以異哉其不得罪於聖人幸矣又何喟然見與之可望乎至於此下雖名為推説曽晢之意者然盡黜其言而直伸已見則愚恐其自信太重視聖賢太輕立説太髙而卒歸於無實也且所謂無不得其樂者固以人而言之矣而其下文乃以天理自然不可妄助不可過不及不可倚著者釋之則未知其以理而言耶抑以人言之耶以理而言則與上文得其所樂之云似不相應以人而言則曽晢之心艱危恐迫傾側動搖亦巳甚矣又何以得其所樂而為天理之自然耶其以為敘秩命討天則所存堯舜所以無為而治者則求諸曽晢之言殊未見此曲折且此既許之以聖人之事矣又以為聖門實學存養之地則是方以為學者之事也若曰姑以為學者之事而巳而又以為行有所不掩焉則是又并所謂有養者而奪之也凡此數節殊不相應皆熹之所不能曉者竊惟此章之旨惟明道先生發明的當若上蔡之説徒贊其無所系著之意而不明其對時育物之心至引列子御風之事為比則其雜於老莊之見而不近聖賢氣象尤顯然矣凡此説中諸可疑處恐皆原於此説竊謂髙明更當留意必如橫渠先生所謂濯去舊見以來新意者庶有以得聖賢之本心耳論語中大節目似此者不過數章不可草草如此説過也克巳復禮斯言自始學至成德皆當從事至無所見夫克矣此一節意思似亦因向來以克巳為後段事故有此反復之論今但如此發之無端恐亦須設問答以起之子帥以正其有不率者則明法勑罰以示之亦所以教也理固如此但此處未應遽如此説奪却本文正意耳易曰明罰勑法此倒其文不知别有意否直躬世之徇名而不究其實者至幾何其不若是哉此不知所指言者謂何等事文意殊不明也為命雖然至言外之意也恐聖人未有此意但作今自推説却不妨耳人也以其有人之道也古注云猶詩所謂伊人此説當矣莊子曰之人也物莫之傷亦與此同若曰有人之道極言之則太重管仲不能當淺言之則太輕又非所以語管仲也孟公綽趙魏老在當時號為家事治者此句不可曉恐傳本有誤字正譎程子曰云云此解恐當用致堂説向見伯恭説亦如此古之學者為巳所以成物特成巳之推而巳按此為人非成物之謂伊川以求知於人解之意可見矣若學而先以成物為心固失其序然猶非私於巳者恐亦非當時學者所及也吕與叔中庸序中亦如此錯解了不逆詐孔注文義為順按孔注文義極不順惟楊氏説得之抑者反語之詞如云求之與抑與之與硜硜然小人哉抑亦可以為次矣皆略反上文之意也微生畝包注訓固為陋此解是恐亦未安諒隂大君勑五典以治天下而廢三年之逹喪經文未有此意短喪自是後世之失若欲發明當别立論而推以及之不可只如此説無來歷也修巳以敬敬有淺深敬之道盡則修巳之道亦盡而安人安百姓皆在其中此意甚善但敬有淺深一句在此於上下文並無所當反使人疑修巳是敬之淺者安百姓是敬之深者今但削去此四字及下文一亦字則意義通暢自無病矣原壤幼而孫弟至見其弊之所自也恐聖人無此意今以為當如是推之則可耳豫一以貫之所謂約我以禮者歟此説巳見顔淵喟然章此亦子貢𥘉年事既曰當其可則子貢是時應巳默契夫子之意矣後來所言夫子之得邦家者安知不由此而得之何以知其為𥘉年事耶此等既無考據而論又未端的且𥘉非經之本意不言亦無害也子張問行人雖不見知而在巳者未嘗不行夫子之言言其常理此人雖不知别是一段事未應遽説以亂夫子之意向後别以巳意推言則可耳參前倚衡使之存乎忠信篤敬之理也此謂言必欲其忠信行必欲其篤敬念念不忘而有以形於必目之間耳若不責之於言行之實而徒曰存其理而不舍亦何益哉卷而懷之猶有卷而懷之之意未及潛龍之隱見恐不須如此説志士仁人仁者人之所以生也苟虧其所以生者則其生也亦何為哉志士仁人所以不求生以害仁者乃其心中自有打不過處不忍就彼以害此且非為恐虧其所以生者而後殺身以成仁也所謂成仁者亦但以遂其良心之所安而巳非欲全其所以生而後為之也此解中常有一種意思不以仁義忠孝為吾心之不能巳者而以為畏天命謹天職欲全其所以生者而後為之則是本心之外别有一念計及此等利害重輕而後為之也誠使真能舍生取義亦出於計較之私而無慤實自盡之意矣大率全所以生等説自它人旁觀者言之以為我能如此則可若挾是心以為善則巳不妥帖況自言之豈不益可笑乎吕覽所載直躬證父一事而載取名事正類此耳放鄭聲逺佞人非聖人必待戒乎此也於此設戒是乃聖人之道也此是聖人立法垂世之言似不必如此説然禹以丹朱戒舜舜以豫違汝弼責其臣便説聖人必戒乎此亦何害乎此蓋尊聖人之心太過故凡百費力主張不知氣象却似輕淺迫㣣無寬博渾厚意味也一言終身行之行恕則忠可得而存矣此句未安當云誠能行恕則忠固在其中矣誰毀誰譽毁者指其過譽者揚其美此説未盡愚謂毁者惡未至此而深詆之也譽者善未至此而驟稱之也非但語其已然之善惡而巳誰毁誰譽謂吾於人無毀譽之意也聖人之心仁恕公平實無毀譽非但無其意而巳有所譽必有所試因其有是實而稱之此亦未盡試猶驗也聖人或時有所譽者雖其人善未至此然必嘗有以驗之而知其將至是矣蓋聖人善善之速惡惡之緩而於其速也亦無所苟焉又曰可毁可譽在彼又曰不云有所毁聖人樂與人為善也必有所試而後譽則其於毀亦可知矣若如此説則是聖人固常有毁但於此著其有譽而匿其有毀以取忠厚之名也而可乎毁破壞也如器物之未敗而故破壞之聖人豈有是乎禮樂征伐自天子出天子亦豈敢以為巳所可專而加私意於其間哉亦曰奉天理而巳意見原壤夷俟子張問行章三愆言而當其可非養之有素不能也聖人此言只是戒人言語以時不可妄發未説到此地位也言及之而不言當言之理不發也此語甚怪蓋為飬之有素所牽而發耳然若如此則是自見不到有隱於人矣生而知之其至雖一而其氣象規模終有不同者此一節當刪去於解經之意亦未有所闕也子謂伯魚為者躬行其實也按諸先生多如此説意極親切但尋文義恐不然耳為只是誦讀講貫墻靣只是無所見書所謂不學墻靣亦未説到不躬行則行不得處也患得之所為患得者計利自便之心也此句解得文義不分明而語意亦不親切君子有惡以子貢之有問至抑可知矣夫子之問未見惡人之疑子貢之對亦未見檢身之意三仁皆稱為仁以其不失其性而巳此説仁字恐不親切荷篠植杖而藝亦不迫矣止子路宿則其為人蓋有餘𥙿又曰行以避焉隘可知也此語自相矛盾不施其親引尹氏説尹氏固佳然不知施字作如何解若如謝氏雖亦引無失其親為解然却訓施為施報之施則誤矣此等處須説破令明白也陸德明釋文本作弛字音詩𥿄反是唐𥘉本猶不作施字也吕與叔亦讀為弛而不引釋文未必其考於此蓋偶合耳今當從此音讀士見危致命楊氏曰云云似不必如此分別君子學以致其道致者極其致也恐當云致者極其所至也自未合者言之非用力以致之則不能有諸躬道固欲其有諸躬然此經意但謂極其所至耳不為有諸躬者發也若曰有諸躬則當訓致為致師之致如蘇氏之説矣然本文意不如此大德小德小德節目也此章説甚佳但以記所謂後其節目者觀之則此二字似未甚當子夏之門人小子君子之道孰為當先而可傳至循其序而用力耳詳本文之意正謂君子之道本末一致豈有以為先而傳之豈有以為後而倦教者但學者地位高下不同如草木之大小自有區别故其為教不得不殊耳𥘉無大小雖分而生意皆足本末雖殊而道無不存之意也焉可誣也蘇氏得之有始有卒尹氏得之此章文義如此而巳但近年以來為諸先生發明本末一致之理而不甚解其文義固失其指歸然考之程書明道嘗言先傳後倦君子教人有序先傳以近者小者而後教以逺者大者非是先傳以近小而後不教以逺大也此解最為得之然以其言緩而無竒故讀者忽之而不深考耳孟莊子孟莊子所以不改意其事雖未盡善而亦不至於悖理害事之甚與莊子乃獻子之子獻子賢大夫其臣必賢其政必善莊子之賢不及其父而能守之終身不改故夫子以為難蓋善之也此臨川鄧丈元亞説諸家所不及也仲尼焉學萬物盈於天地之間莫非文武之道𥘉無存亡增損近年説者多用此意𥘉若新竒可喜然既曰萬物盈於天地之間則其為道也非文武所能專矣既曰𥘉無存亡增損則未墜於地之云又無所當矣且若如此則天地之間可以目擊而心會又何待於賢者識其大不賢者識其小一一學之然後得耶竊譯文意所謂文武之道但謂周家之制度典章爾孔子之時猶有存者故云未墜也大抵近世學者喜聞佛老之言常遷吾説以就之故其弊至此讀者平心退步反復於句讀文義之間則有以知其失矣生榮死哀生榮死哀無不得其所者也所解不明似謂天下之人其生皆榮其死皆哀無不得其所者不知是否若如此説則不然矣子貢言夫子得邦家時其效如此范氏所謂生則天下歌誦死則如喪考妣者是也謹權量此亦帝王為治之要此篇多闕文當各考其本文所出而解之有不可通者闕之可也謹權量以下皆武王事當自周有大賚以下至公則悅為一章蓋興滅國繼絶世舉逸民當時皆有其事而所重民食喪祭即武成所謂重民五教惟食喪祭者也晦庵朱文公先生文集卷第三十一閩縣學訓導何器校
