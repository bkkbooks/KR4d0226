body:
  text: 奏劄癸未垂拱奏劄一臣聞大學之道自天子以至於庶人一是皆以修身為本而家之所以齊國之所以治天下之所以平莫不由是出焉然身不可以徒修也深探其本則在乎格物以致其知而巳夫格物者窮理之謂也蓋有是物必有是理然理無形而難知物有迹而易睹故因是物以求之使是理瞭然心目之間而無毫髮之差則應乎事者自無毫髮之繆是以意誠心正而身修至於家之齊國之治天下之平亦舉而措之耳此所謂大學之道雖古之大聖人生而知之亦未有不學乎此者堯舜相授所謂惟精惟一允執厥中者此也自是以來纍聖相傳以有天下至於孔子不得其位而筆之於書以示後世之為天下國家者其門人弟子又相與傳述而推明之其亦可謂詳矣而自秦漢以來此學絶講儒者以詞章記誦為功而事業日淪於卑近亦有意其不止於此則又不過轉而求之老子釋氏之門內外異觀本末殊歸道術隱晦悠悠千載雖明君良臣間或一值而卒無以復於三代之盛由不知此故也恭惟皇帝陛下聖德純茂爰自𥘉潛以至為帝仁孝恭儉之德信於天下紛華盛麗一無所入於其心此其身可謂修矣而臨御天下期年於此平治之效未有所聞臣竊疑之意者前日勸講之臣限於程式所以聞於陛下者不過詞章記誦之習而陛下求所以進乎此者又不過取之老子釋氏之書是以雖有生知之性髙世之行而未嘗隨事以觀理故天下之理多所未察未嘗即理以應事故天下之事多所未明是以舉措之間動涉疑二聽納之際未免蔽欺平治之效所以未著由不講乎大學之道而溺心於淺近虛無之過也臣戅愚抵冒罪當萬死然願陛下清間之燕博訪真儒知此道者講而明之考之於經驗之於史而會之於心以應當世無窮之變則今日之務所當為者不得不為所不當為者不得不止以至於臣下之忠邪計慮之得失不待燭照數計而可否黑白判然矣若是則意不得不誠心不得不正於以修身齊家平治天下亦豈有二道哉臣之所聞於師者如此自常人觀之疑若迂闊陳腐而不切於用然臣竊以為正其本萬事理差之毫釐繆以千里天下之事無急於此伏惟陛下擴天日之照俯賜開納則非獨微臣之幸實天下萬世之幸取進止垂拱奏劄二臣竊觀今日之論國計者大槩有三曰戰曰守曰和而巳然天下之事利必有害得必有失是以三者之中又各有兩端焉蓋戰誠進取之勢而亦有輕舉之失守固自治之術而亦有持久之難至於和之䇿則下矣而主其計者亦以為屈巳愛民蓄力觀釁疑敵緩師未為失計多事以來此三説六端者是非相攻可否相奪於冥冥之中談者各飾其私而聽者不勝其眩雖以陛下之明蓋未能斷然無惑志於其間也臣竊以為此其所以然者由不折衷於義理之根本而馳騖於利害之末流故也故臣嘗竊妄謂人主之學當以明理為先是理既明則凡所當為而必為所不當為而必止者莫非循天之理而非有意必固我之私也臣請復指其實而明之蓋臣聞之天髙地下人位乎中天之道不出乎隂陽地之道不出乎柔剛是則舍仁與義亦無以立人之道矣然而仁莫大於父子義莫大於君臣是謂三綱之要五常之本人倫天理之至無所逃於天地之間其曰君父之讎不與共戴天者乃天之所覆地之所載凡有君臣父子之性者發於至痛不能自巳之同情而非專出於一巳之私也恭惟國家之與北虜乃陵廟之深讎言之痛切有非臣子所忍聞者其不可與共戴天明矣太上皇帝念此讎之未報雖享天位不以為樂一旦舉而付之陛下者以陛下聰明智勇為必能成此志也然則今日所當為者非戰無以復讎非守無以制勝是皆天理之自然非人欲之私忿也陛下亦既有意於必為矣間者不知何人輒復唱為邪議以熒惑聖聽至遣朝臣持書以復虜帥而為講和之計臣竊恨陛下於所不當為者不能必止而重失此舉也且不知陛下不得巳於議者之言而姑為此邪抑真欲和議之成而為此邪以為姑為此也則既為其始必慮其終我既請之彼必報之不可以苟為也且苟而為此欲以何求也哉無輔於事徒害於理臣有以知陛下之不為也以為真欲和議之成也則議者所謂屈巳愛民蓄力觀釁疑敵緩師未為失計者臣請有以議之夫人以藐然之身位乎天地之間至微也而能與天地並立而為三者以其有仁義之性而與夫隂陽之氣剛柔之體同出乎萬物之一原而無間也古之聖人所以參天地而贊化育者豈有他哉亦順此理而無所逆焉耳今釋怨而講和非屈巳也乃逆理也巳可屈也理可逆乎逆理之禍將使三綱淪九法斁子焉而不知有父臣焉而不知有君人心僻違而天地閉塞夷狄愈盛而禽獸愈繁是乃舉南北之民而棄之豈愛之之謂哉且不曰愛其君父而曰兼愛南北之民其於輕重之倫緩急之序亦可謂舛矣夫子為政以正名為先蓋名不正則言不順事不成而民無所措其手足今乃欲舍復讎之名而以講好為觀釁緩師之計蓋不惟使上下離心中外解體緩急之間無以應敵而吾之君臣上下所為夙興夜寐以修自治之政者亦將因循隳弛而不復振矣正使虜人異日果有可乘而不可失之釁竊恐吾之可憂乃甚於所可喜而信誓之重名分之素彼皆得以歸曲于我蓋不待兩兵相加而吾氣巳索然矣且自宣和靖康以來講和之效亦可槩見虜之情偽吾之得失蓋不待明者而後知而小人所以好為是説者蓋惟君子然後知義理之所必當為與義理之必可恃利害得失既無所入於其心而其學又足以應事物之變是以氣勇謀明無所懾憚不幸蹉跌死生以之小人之心一切反是其所以專為講和之説者特以便其私耳而謀國者過而聽焉豈不誤哉今使者將還大議將決此亦救過輔敗之時也臣願陛下姑置利害交至之説而以窮理為先於仁義之道三綱之本少加意焉體驗擴充以建人極深詔任事之臣亟罷講和之議大明黜陟以示天下使知復讎雪恥之本意未嘗少衰雖使虜意效順無所邀索乃是深有包藏尤足疑畏正冝引義拒絶以伐其謀然後表裏江淮合戰守之計以為一使守固而有以戰戰勝而有以守竒正相生如環之無端持以歲月以必復中原必滅胡虜為期而後巳雖其成敗利鈍不可逆睹而吾於君臣父子之間既巳無憾則其賢於屈辱而苟存固已逺矣臣願陛下以此處心以此立志則仁義之道明於上而忠孝之俗成於下人道既得天地之和氣自當欣合無間而夷狄禽獸亦將不得久肆其毒則何事之不可成何功之不可立哉臣草茅微賤不識事宜獨以所學妄論大計惟陛下擇焉取進止垂拱奏劄三臣聞益之戒舜曰警戒無虞罔失法度罔遊于逸罔淫于樂任賢勿二去邪勿疑而終之曰無怠無荒四夷來王周之文武亦以天保以上治內采薇以下治外始於憂勤終於逸樂其後中微小雅盡廢四夷交侵中國衰削宣王承之側身修行任賢使能內修政事外攘夷狄而周道􅙾然復興臣嘗以是觀之然後知古先聖王所以制御夷狄之道其本不在乎威強而在乎德業其任不在乎邊境而在乎朝廷其具不在乎兵食而在乎紀綱蓋決然矣恭惟陛下躬履艱難之運而思所以成中興之功者既知當為與所當止之大端矣然而戎虜慿陵包藏不測中外之議咸謂國威未振邊備未飭倉廩未充士卒未練一旦緩急何以為計臣獨以為今日之憂非此之謂所可憂者乃大於此而恨議者未及之也臣竊觀今日諌諍之塗尚壅佞幸之勢方張爵賞易致而威罰不行民力巳殫而國用未節以是四者觀之則德業未可謂修朝廷未可謂正紀綱未可謂立凡古先聖王所以強本折衝威制夷狄之道皆未可謂備是則臣之所深憂也不識議者亦嘗以是聞於陛下之聽否乎臣願陛下三復詩書之言以監所行之得失而求所以修德業正朝廷立紀綱者必以開納諌諍黜遠邪佞杜塞幸門安固邦本四者為急先之務治其本而母治其末治其實而勿治其名庶幾人心厭服夷狄知畏則形勢自強而恢復可冀矣臣踈遠賤愚震懾天威未敢罄竭所聞以久稽聖聽而粗舉其端如此伏惟陛下留神財幸取進止辛丑延和奏劄一臣竊惟皇帝陛下臨御以來夙興夜寐畏天恤民誠敬寬仁格于上下冝其天心克享民物阜安而二十年之間水旱盜賊略無寧歲邇者垂象差忒識者寒心飢饉連年民多流殍陛下側席興嘆進賢退姦分命朝臣振廪出粟凡所以奉承天意慰恱人心者無所不至又冝若可以少回災沴召致和平矣而間者冬氣太溫雷電震激嗣歲之計尚有可憂臣誠愚昧有不識其所以然者嘗竊推迹前事以深求之意者德之崇者有未至於天歟業之廣者有未及於地歟政之大者有未舉而其小者無所繫歟刑之遠者或不當而其近者或幸免歟君子或有未用而小人或有未去歟大臣或失其職而賤者或竊其柄歟直諒之言罕聞而諂諛者衆歟德義之風未著而汙賤者騁歟貨賂或上流而恩澤不下究歟責人或巳詳而反躬有未至歟夫必有是數者然後足以召災而致異今以陛下之明聖則豈有是哉然而天心未豫邦本動搖宸慮雖深旱氣未究是則必有説矣臣竊不自量敢冒萬死伏願陛下聽斷之餘虛心靜慮試以前數條者反之於身驗之於事而深自省焉則淵默之中無微不照而凡此得失之端孰有孰無孰存孰改皆無所遁其情矣若猶以為未也則願濬發德音布告中外反躬引咎以圗自新內自臣工外及氓庶有能開寤聖心指陳闕政者無間踈賤使咸得以自通然後差擇近臣之通明正直者一二人使各引其所知有識敢言之士三數人寓直殿門凡四方之言有來上者悉令省閲舉其盡忠不隱者日以聞于聰聽則夫天人之際譴告所繇將有粲然畢陳於前者然後兼總條貫稱制臨決畫為科品以次施行使一日之間雲消霧散堯天舜日廓然清明則上帝鬼神收還威怒羣黎百姓無不蒙休矣臣以孤遠受恩過深圖報無階抵冒至此惟陛下寬其斧鑕留神財幸臣無任震懾俟罪之至貼黃臣逺稽前史近考聖朝以災異求言具有故事若以至誠行之而實采用其説以革前日之弊則於應天之實所輔不細今星文雖巳退舍然餓民目今流散冬靁憂在嗣歲伏乞斷自聖志早賜施行臣稟性踈拙字畫不精衰病目昏尤艱寫染今以所陳不宜宣泄不免親筆書寫不謹之罪伏乞財赦延和奏劄二臣聞人主所以制天下之事者本乎一心而心之所主又有天理人欲之異二者一分而公私邪正之塗判矣蓋天理者此心之本然循之則其心公而且正人欲者此心之疾疢循之則其心私而且邪公而正者繞而日休私而邪者勞而日拙其效至於治亂安危有大相絶者而其端特在夫一念之間而巳舜禹相傳所謂人心惟危道心惟微惟精惟一允執厥中者正謂此也臣嘗竊怪陛下以大有為之資膺受付託憂勤願治恭儉愛民二十年於此矣而間者臨軒慨然發歎乃或未免以治效之不進為憂因竊以是推之而得其説請昧萬死為陛下一二陳之夫天下之治固必出於一人而天下之事則有非一人所能獨任者是以人君既正其心誠其意於堂阼之上穾奧之中而必深求天下敦厚誠實剛明公正之賢以為輔相使之慱選士大夫之聰明逹理直諒敢言忠信廉節足以有為有守者隨其器能置之列位使之交修衆職以上輔君德下固邦本而左右私褻使令之賤無得以姦其間者有功則久其任不稱則更求賢者而易之蓋其人可退而其位不可以苟充其人可廢而其任不可以輕奪此天理之當然而不可易者也人君察於此理而不敢以一毫私意鑿於其間則其心廓然大公儼然至正泰然行其所無事而坐收百官衆職之成功一或反是則為人欲私意之病其偏黨反側黯暗猜嫌固日擾擾乎方寸之間而姦偽讒慝叢脞眩瞀又將有不可勝言者此亦理之必然也恭惟陛下即政之𥘉蓋嘗選建豪英任以政事矣不幸其間不能盡得其人或以庸陋嵬瑣不堪委寄或以朋比欺罔自速罪辜而陛下之心又本有前日權臣跋扈之疑是以不復廣求賢哲而姑取軟熟易制承順不違之人以充其位於是左右私褻使令之賤始得以奉清間備驅使而宰相之權日輕既而陛下亦慮其勢有所偏而因重以壅巳也則又時聽外庭之論雖甚狂訐無所違忤意者將以隂察此輩之負犯而操切之欲其有所忌憚而不敢肆於為惡陛下之用力則巳勞矣而其翕張禽縱之機周防畏備之計又可謂無遺巧矣然而天下之勢終不免於偏有所重而治亂安老之效又未能盡如聖志之所欲蓋既未能循天理公聖心以正朝廷之大體則固巳失其本矣而又欲兼聽士大夫之公言以為駕馭之術則士大夫之進見有時而近習之從容無間士大夫之禮貌既莊而難親其議論又苦而難入近習便僻側媚之態既足以蠱心志其胥史狡獪之術又足以眩聰明此其生熟甘苦既有所分則恐陛下未及施其駕馭之䇿而先巳墮其數中矣是以比來陛下雖欲微抑此輩而此輩之勢日重雖欲兼採公論而士大夫之勢日輕重者既挾其重以竊陛下之權其輕而姦者又借力於陛下之所重以為竊位固寵之計中外相應更濟其私至於姦窮惡稔蹤迹敗露然後其素輕者不免於譴何然猶委蛇盤礴不失其崇資峻秩而攫取陛下之厚賜優禮以去其素重者則陛下固未嘗一問其朋比援引之姦也日往月來浸淫耗蝕使陛下之德業日隳綱紀日壞邪佞充塞貨賂公行兵怨民愁盜賊間作災異數見飢饉荐臻蓋羣小相挻人人皆得滿其所欲唯有陛下了無所得而國家顧乃獨受其弊是則陛下之勞既不足以成天下之務而反以敗之其巧既不足以勝群小之姦而反以助成其勢若彼之所以蔽遮天理濁亂聖心則將益深錮而遂至於不可解蓋其失萌於一念之疑大臣而其為害展轉至此所謂差之毫釐謬以千里者臣恐陛下於此偶未察也是以往歲蒙恩賜對去年應詔言事皆以明理正心之説陳于陛下之前惓惓深衷實在於此而學淺辭拙不足以起發聖意恐懼至今乃幸復以職事得望清光敢畢其餘忠如此誠願陛下深察天理以公聖心廣求賢忠以修聖政則夫左右私褻使令之賤固巳無隙可投以誤恩顧則又痛斥而逺屏之以永除後日蔽遮濁亂深錮之害庶幾天下之事猶可復為而陛下之國家將不至於卒受羣小之弊臣至愚極陋學無所成獨有螻蟻愛君憂國之心不能自巳妄論至此悲憤填臆伏惟陛下赦其罪而納其忠深為宗廟社稷大計不俟終日斷然行之則不唯愚臣之幸實天下之幸貼黃臣去年所進封事恐元本不存今别繕寫成册用袋重封巳於閣門投納乞賜聖旨宣索此劄亦係臣親手書寫目昏筆縱前劄巳具貼黃奏陳并乞聖照延和奏劄三臣踈繆不材逺迹林野陛下過聽卑以郡符巳試罔功復叨使指誤恩橫𬒳又忝職名方具辭免之間忽於九月二十二日恭𬒳改除之命揣分量力尤所不堪本欲控陳懇避之誠庶安愚賤之迹而是時巳聞本路紹興府衢婺州水旱飢荒上軫宸慮竊恐遷延或致誤事遂已即日拜命具狀申省乞許奏對至十月二十八日方準省劄恭奉聖旨令臣疾速奏事前去之任臣聞命震惕不敢稽留即於今月二日朴𬒳上道至十一日始入本路衢州界問得本州災傷常山江山開化三縣為甚而西安龍遊次之其婺州紹興府則所傳又非衢州之比臣不勝恐懼遂自衢州乘舟取疾以來及節次於本司及𬒳災州縣會到巳行事件乃聞陛下間嘗親御翰墨戒飭帥臣詞旨深切聞者感涕而前後撥賜米斛又巳二十有餘萬矣仰見聖心懇惻急於救民而於軍國之儲無所愛惜至於如此甚大惠也臣猥蒙任使自惟踈拙大懼不能有以出斯人於溝壑仰副陛下焦勞之意今有管見合行申請須至畫一奏聞者一救荒之務檢放為先行之及早則民知有所恃賴未便逃移放之稍寬則民間留得禾米未便闕乏然而州郡多是吝惜財計不以愛民為念故所差官承望風指巳是不敢從實檢定分數及至申到帳狀州郡又加裁減不肯依數分明除放又早田收割日久檢踏後時致有無根查者乃是州郡差官遲緩之罪而檢官反謂人户違法不為檢定其有檢定申到者州郡亦不為蠲放就中下戶所放不多尤𬒳其害訪聞本路州縣亦有似此去處欲乞候臣將來到任廣行詢究更與從實蠲減一伏覩近降指揮旱傷州縣上戶賑糴止令觀諭毋得科抑仰見聖明深察物情恤貧安當兩得其所然竊恐官吏𬒳此指揮之後其間或有便文自營之人必將泛然不以勸諭為意而上戶亦有詞説難以勸諭官司米斛不多將來無以接續其害又有不可勝言者欲乞且令州縣將未勸諭者權以去年認數為約巳勸諭者權據見認之數為凖多方詢訪加意考核不得比同尋常報應空文須管究心體訪得其實數其實不能及數者更與量減實可更多出者則與量添其有鹵莽滅裂徒為煩擾去處將來本司覺察得知具名聞奏庶幾所認之數必得其平而無科抑之患矣一應募獻米合格推賞之人多𬒳官吏邀阻乞覔聞有至今未推賞者近雖巳蒙立法約束更乞明詔戶部先具見今奏到巳未推賞各件進呈將未推賞人日下推賞行下諸路州縣有未申奏者限一月內並到如違許𬒳抑人進狀陳訴重作行遣又上戶巳經去年獻助今年所蓄想巳不多若必依舊格方得推賞則恐無復及格之人可以獻助欲乞檢會淳熙元年三月二十四日勑戶部勘當到點檢台州措置賑濟官耿延年所申浙東路賑濟賑糶依湖南江西米數減半紐計推賞指揮謂如四千石合輔承信郎今減作二千石之類申明行下庶幾應募者衆得濟飢民仍勒所司立定保明狀式及令逐處官司承受應募理賞詞狀文帖並要當日行遣如將來依式奏到省部却稱文字不圎及諸處故違程限者官貟重加降責人吏並行決配庶幾富者樂輸貧者得食實為兩便一伏覩今歲紹興府巳蒙聖慈撥賜米斛十七萬石訪聞昨來本府抄劄飢民戶口若自十一月至來年三月約用米八十萬石方可足用其間固不能無冒濫虛數今來本府節次刪減未知將來定作多少戶口計度但今所有米數及糴米錢姑以元抄劄數計之不過得四分之一况又州府見闕軍儲竊慮不免却將撥賜米斛暗行借兊則所得糶濟米數愈見不多若州府只據見米掯定人口抄劄糶濟則所及不廣必致人戶流離餓殍上勞聖慮又臣經由衢州見得本州旱損雖云不及紹興府婺州兩州然其處水路淺澀冬月尤甚運載錢米極為艱難本州雖巳差官往淅西收糴然糴本至少所得不多而所費水腳巳不資矣臣今來欲望聖慈更撥賜豐儲倉米三十萬石應副紹興府三萬石應副衢州如無見管米斛即計目今米價支借內帑見錢令其趂此米價未至騰踴之間前去有米州郡收糴旋次般載回州其上件錢米並乞專責本司差委鄰州官吏出納州府不得干預庶免侵兊之弊其巳撥賜錢米亦乞令本司選委本州通判一員同共主管不得別作支用仍詔守臣疾速措置收糴軍糧不管誤事其婺州雖蒙撥賜米五萬石尚恐未足賑濟却候臣親到本州相度會計别具奏聞者貼黃臣竊聞陛下節儉憂勤規恢逺略內庫所積錢帛甚多今既天時未順未可興師而近甸飢荒至于如此伏願聖慈權其輕重特賜借撥據紹興府申到撥下諸縣米數總計二十一萬二千餘石除􅌘縣六萬八千餘石係排日糶濟外餘縣十四萬三千餘石係間日糶濟竊恐飢民一日止得半升之米不能存活今𣣔依􅌘縣例排日糶濟即合更用十四萬三千餘石又聞官吏抄劄不無漏落又慮流民却回復業兼數內所稱摺運乃是三摺之數將來米價日增及有往來腳費風波滯留不無欠折又本府民貧勸諭所得恐亦不多須更備米十五六萬石準備添貼所以約計乞米三十萬石如蒙撥賜今亦未敢盡數般取如是將來糶濟不盡却行回納伏乞睿照一諸郡荒歉人戶日有流移一切官物不堪催理其紹興府人戶夏稅巳蒙聖慈等第免閣住催唯衢婺州當來失於申奏致人戶未蒙依例推恩而戶部漕司催督州郡亦如平日州郡無所從出其勢必取於縣縣無所從出則人戶必有受其弊者甚失聖主惻怛哀憐之意然計戶部漕司所催必是掯定支遣之數有不得而巳者其勢又不容直行禁止欲乞朝廷取會戶部漕司合得諸州解發錢帛之數且於內庫支撥應副而詔戶部漕司𬒳災州縣所欠新舊官物並且住催直至明年𧖟麥熟後却將舊欠逐旋催理寬作料次撥還內庫決然不至敢有欠闕其人戶名下新舊上供官物亦乞明詔州縣未得催理其紹興府雖巳有前件住催指揮竊恐州縣奉行不虔及將今年檢放外殘零苗米催督嚴峻亦乞聖慈更賜戒約令其寬限人戶輸納貼黃臣續訪聞紹興府雖蒙指揮住催官物而春夏之間官吏多巳先期催足民戶實未盡霑聖恩今體問得本府人戶合納丁鹽錢丁身折帛絹折帛綿本色綃本色綿五項不以有無産業物力一丁並納九百餘錢來春即便起催飢餓之餘實難供納臣愚𣣔望聖慈將來年合納錢數預行蠲放庶幾官吏無以作弊下戶實𬒳聖恩有以慰安民心感召和氣伏候聖旨一今年旱地廣闊只有湖南二廣及浙西兩三郡豐熟而廣東海路至浙東為近臣昨受命之𥘉訪聞彼處米價大假低平即嘗印榜遣人散於福建廣東兩路沿海去處招邀米客許其約束稅務不得妄收力勝雜物稅錢到日只依市價出糶更不裁減如有不售者官為依價收糴自此向後必多有人興販前來但臣元榜約束本路州縣稅場不得妄有邀阻收稅及力勝一節更乞聖慈申嚴行下有違戾者官吏並比見行條法各加一等坐罪至來年六月却依舊法其收糴本錢乞許行下本路沿海州軍將今年糶過米錢及兊那諸色窠名支撥充應庶幾不失信於客人向後易為招誘如或更蒙朝廷量立賞格召人興販行下諸路曉示勸誘仍先降空名付身數十道付本司俟有上件販到米斛之人即與書填給付蓋緣客人糶貨了畢便欲歸回元處不能等候即與土居上戶不同伏乞聖察一救荒之政著於令申及近年節次指揮雖巳詳悉然而全在官吏遵奉推行然後民𬒳實惠况今年荐飢公私匱竭比之常歲事體不同欲乞聖慈特降指揮戒敕本路守令以下令其究心奉行悉意推廣其故有違慢不虔之人俾臣奏劾一二重作施行以警其餘其有老病昏愚不堪驅䇿者亦許具名聞奏别與差遣却選本路官吏惻怛愛民才力可仗者特許不拘文法時暫差權謂如治獄捕盜官不許差出之類仍依冨弼趙抃例選差得替待闕宫廟持服官貟時暫管幹事畢具名申奏量與推賞如減磨勸升名次之類庶幾官吏向前人蒙實利延和奏劄四臣比因講求荒政復有二事雖非今日拯救之急而實異時久逺之利不敢不言今謹别具進呈下項一臣昨任南康軍日適值旱傷深慮檢放搔擾下戶偶有士人陳説乞將五斗以下苗米人戶免檢全放當時即與施行人以為便本路提舉常平尤袤遂以其法行之諸郡其利甚博近日經由信州則聞王山一縣亦得檢官如此措置除上三等戶隨分減放外下二等戶盡行蠲免通計一縣所放亦不過共成五分問之道旁居民莫不稱其平允此最為法之善者而律令未有明文又今年檢踏巳畢行之不及欲乞聖慈詳酌特詔有司定著為令自今水旱約及三分以上第五等戶並免檢踏具帳先與全戶蠲放如及五分以上即并第四等戶依此施行其州縣差官後時致得旱損田苗不存根查亦乞立法坐罪其所損田即與相度地形高低水源近逺比並鄰至分數檢故庶幾貧民永逺利便一臣所居建寧府崇安縣開耀鄉有杜倉一所係昨乾道四年鄉民艱食本府給到常平米六百石委臣與本鄉土居朝奉郎劉如愚同共賑貸至冬收到元米次年夏間本府復令依舊貸與人戶冬間納還臣等申府措置每石量收息米二斗自後逐年依此斂散或遇小歉即蠲其息之半大飢即盡蠲之至今十有四年其支息米造成倉敖三間收貯巳將元米陸百石納還本府其見管三千一百石並是纍年人戶納到息米已申本府照會將來依前斂散更不收息每石只收耗米三升係臣與本鄉土居官及士人數人同共掌管遇斂散時即申府差縣官一員監視出納以此之故一鄉四五十里之間雖遇凶年人不闕食竊謂其法可以推廣行之他處而法令無文人情難強妄意欲乞聖慈特依義役體例行下諸路州軍曉諭人戶有願依此置立社倉者州縣量支常平米斛貴與本鄉出等人戶主執斂散每石收息二斗仍差本鄉土居或寄居官員士人有行義者與本縣官同共出納收到息米十倍本米之數即送原米還官却將息米斂散每石只收耗米三非其有冨家情願出米作本者亦從其便息米及數亦當撥還如有鄉土風俗不同者更許隨冝立約申官遵守實為久逺之利其不願置立去處官司不得抑勤則亦不至搔擾此在今日言之雖無所濟於目前之急然實公私儲蓄豫備久逺之計及今歉歲施行人必願從者衆其建寧府社倉見行事目謹録一通進呈伏望聖慈詳察特賜施行右謹具如前取進止延和奏劄五臣竊見浙東路和買絹萬數浩瀚而紹興府獨當其半舊例自物力三十八貫五百以上人戶均敷人戶苦於輸納多立詭戶隱寄物力以避均敷是致見納人戶所敷愈重其間又有不該敷納田地之數官司不為除豁其弊非一前後臣僚申請並蒙聖慈施行而一時有司不能奉承德意牽於衆説未有定論臣以得之傳聞未知其間微細曲折不敢輒有陳請然聞一郡之人無不以此為病猥蒙任使不敢坐視欲望聖慈特降指揮許臣到官與本路帥臣監司同共相度限來年二月內要見定論申奏取旨從來年夏料為始革去舊弊庶幾飢饉餘民得安生業世世子孫沐浴仁聖之膏澤不勝幸甚取進止延和奏劄六臣昨蒙聖恩待罪南康小壘自惟短拙無以輔報萬分到任之𥘉即以本軍星子縣稅錢偏重民不聊生條具奏聞乞賜蠲減總計不過納絹一千五十餘匹錢二千九百餘貫伏蒙聖慈開納即賜施行而有司不能仰體德意輒引議臣對輔之説以拒其請臣於今年得替之前又嘗具奏冀卒蒙恩而逮今纍月未奉進止竊意有司尚守前説然臣之愚亦有不能自巳者謹以前奏之內最明白者二條復為陛下陳之按本縣所管廬山一帶多是高巖峭壁穹石荗林其間雖有些小田假類皆磽瘠寒冷所入不多而經界官吏起紐稅錢數目浩瀚難以輸納以故紹興年中守臣徐端輔者因寺院之請減去一百四十餘貫減之誠是也然初不請命于朝而輒私減之既又慮夫經稅之或虧也則妄引經界以前不明文帳將人戶下田升作中等中田升作上等亦有徑自下等而升上等者按籍履畒而橫加其稅計錢一百四十餘貫以隂輔所免廬山稅錢之數中間常有漕臣按臨人戶陳訴漕司為之張榜約束改正而本軍不復奉行其後又有人戶曽經戶部陳訴而亦不能正也臣竊惟國家子愛黎元憂勤懇惻常賦之外一毫不忍有所多取而下土小臣率情妄作乃敢以一百四十餘貫之稅無故而妄加于人雖其除之于山粗若得冝而增之於田則悖謬甚矣故臣前奏欲乞將端輔所減山稅明降指揮特與蠲減而其所增田稅却與改正依舊等色㘬稅其為事理曉然無可疑者而所蠲之數亦不甚多不謂有司不顧大體而惜小費乃𣣔限以對輔之説則是使臣又為端輔之所為而後巳爾未興一利而先起一害臣雖至愚有所不忍為也今雖巳去官守然於此縣疲瘵之民有未能忘者故敢不避斧鉞之誅復以上聞欲望聖慈矜閔明詔有司將此兩條先次減免改正其餘項目臣亦未敢便乞施行悉祈蠲免且乞專委本路監司一貟子細相度俟其奏報别賜指揮至於淳熙六年十月十九日議臣對輔之説其言吝細鄙狹不逹大體無以將順陛下克巳愛民聽言革弊之美意而程奏顯言頒布海內非所以宣德竟而廣仁聲於天下也欲望聖明并賜追寢自今以來四方內外或有以蠲除為請者究其虛實而一以法義裁之則彼固不得以肆其僥幸苟免之計亦何必逆為之限以傷逺近祈恩望幸之心哉抑古人亦有言曰百姓足君孰與不足百姓不足君孰與足此乾坤廣大之心聖賢親切之訓臣願陛下於此深留聖意則彼妄庸淺俗之言自將深藏逺屏不敢以陳於陛下之前矣臣進越妄言犯非其分不勝恐懼戰栗之至取進止延和奏劄七臣昨任南康軍日嘗具狀奏乞賜白鹿洞書院敕額及乞以太上皇帝御書石經并版本九經注疏給賜本洞今亦未蒙施行而朝野喧傳相與譏笑以為怪事臣誠恐懼不敢不盡其説謹按本洞書院實唐隱士李渤所居當時學者多從之逰遂立黌舍至五代時李氏為建官師給田贍養徒衆甚盛逮至國𥘉猶數十百人太平興國中常蒙詔賜九經而官其洞主見於會要而咸平五年有敕重修仍塑宣聖及弟子像又見於陳舜愈所記簡牘具存可覆視也夫以此洞之興原其所自雖若淺鮮無足言者而太宗皇帝真宗皇帝眷顧褒崇至於如此則聖意所存至深至逺必有非下吏淺聞所能窺測者今乃廢而不舉使其有屋廬而無敕額有生徒而無賜書流俗所輕廢壞無日此臣所以大懼而不能安也然竊意有司所以不能無疑於臣之謂固未必皆如譏笑者之言殆必以為州縣巳有學校不必更為煩費耳如其果然則臣請有以質之夫先王禮義之官與異端鬼教之居孰正孰邪三綱五常之教與無君無父之説孰利孰害今老佛之宫遍滿天下大郡至踰千計小邑亦或不下數十而公私增益其勢未已至於學校則一郡一縣僅一置焉而附郭之縣或不復有其盛衰多寡之相絶至於如此則於邪正利害之際亦已明矣今有司非徒不能有所正於彼而反疑臣之請於此臣不能識其何説也今幸蒙恩賜對故敢復以為請伏望聖慈下臣此章特從其請既以紹承先志啓迪群心又以丕闡大猷昭示抑邪與正之漸實天下萬世之幸取進止晦庵先生朱文公文集卷第十三福州府儒學訓導舒鏊校
