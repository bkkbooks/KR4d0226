  text: 晦庵先生朱文公文集卷第二十申請
  hash: sha256:6f5a3cc50231435e5b8c6e4da223ae3a5979587b37fa92b0700f1381fea6fa0d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0226_SBCK_020-1a}
body:
  text: 請徐王二生充學賔申縣劄子契勘縣學教集生徒漸成次第但職事員數旣少又皆頗有分職以此不得專意教導竊見本縣進士徐應中留意講學議論純正進士王賔天資朴茂操履堅慤求之軰流未見其比乞從縣司行下本學具禮差人敦請赴學特給厨饌待以賔客之禮不惟使生徒覩其言行得以矜式亦庶幾士民向風有所興勸云云代同安縣學職事乞立蘇丞相祠堂狀右某等伏覩故觀文殿大學士太子太保致仕贈司空趙郡蘇公道徳博聞號稱賢相立朝一節終始不虧自其高曽世居此縣比因遊宦始寓丹陽今忠義滎陽二坊故宅基地宛然尚在而後生晚學不復講聞前賢風節學問源流是致士風日就彫弊某等今欲乞改滎義坊爲丞相坊仍於縣學空閑地架造祠堂一所不惟増修故事永前烈之風聲庶以激厲將來俾後生之竦飭謹具狀申主簿學士伏乞備申縣衙照㑹施行申嚴昏禮狀竊惟禮律之文昏姻爲重所以别男女經夫婦正風俗而防禍亂之原也訪聞本縣自舊相承無昏姻之禮里巷之民貧不能聘或至奔誘則謂之引伴爲妻習以成風其流及於士子富室亦或爲之無復忌憚其弊非特乖違禮典瀆亂國章而巳至於妬􅎱相形稔成禍釁則或以此殺身而不悔習俗昏愚深可悲憫欲乞檢坐見行條法曉諭禁止仍乞備申使州檢㑹政和五禮士庶婚娶儀式行下以慿遵守約束施行舉柯翰狀照對縣學見缺直學一員竊見進士柯翰守道恬退不隨流俗專以講究經㫖爲務行年五十亹亹不倦置之學校必能率勵生徒興於義理之學少變奔競薄惡之風欲乞備申使府差𥙷施行與曽左司事目劄子熹巳具前劄復有愚懇并以凂聞事目如後一本軍㳟奉聖㫖打造歩人弓箭手鐵甲一年以三百日爲期兩日一副昨巳打造到一百五十副了畢申乞起發繼凖樞密院劄子檢坐元降指揮只令如法樁收竊縁上件鐵甲計用皮鐵匠一萬八千工錢五千二百餘貫匠人多係逺鄕農民追呼搔擾離家失業不無愁歎錢除給降到見錢乳香數外尚欠七百餘貫乳香變賣不行不敢科抑又兌支過一千一百八十餘貫𥘉謂朝廷别有急切用處今乃但令本處椿收徒使州縣勞民費財以供不急之用巳爲非策又况椿收日乆皮線爛斷札片鏽澁不堪使用亦有深可惜者設若遂爲嵗例則其爲害無有窮巳尤爲不便欲望一言密贊廟堂特賜開陳將巳造者各令發赴比近屯駐軍馬去處披帶教閱日夕使用免致朽損仍降指揮向後年分更不打造則州縣民間不勝幸甚或慮缺於武備即乞行下諸軍取㑹累年以來中外製造鐵甲數目不少旣是乆無征戰不應無故損失湏管契勘見收管數目若干便見虚實如有不足亦可令諸州有作院處多募役兵漸次打作庶無闕事一本軍昨來奉行増種二麥指揮逐年所申漸次増廣至淳熈五年三縣共種一千四百餘頃内星子縣最爲窄㣣巳占三百餘頃近㨿知縣王仲傑申本縣今年所種巳是増多然實計之所種不過六千餘畒未敢循習舊例供申虚數熹昨在田里素聞此事皆是官司立定數目行下鄕村妄亂供申公行欺罔遂判其狀行下依實供申及行下兩縣亦不得循習舊弊欺罔朝廷去訖將來申到比之舊數必是大叚虧少若朝廷以此加罪固無可言萬一縁此别行根究竊恐其他州軍官吏有任其咎者在熹私義亦所未安欲乞一言密贊廟堂别作開陳恐日前所申有未實處立限許令陳首改正違限不首然後坐以誣上之罪使知其罪者得以自新實爲幸甚然所有増種指揮實無𥙷於足食之功徒有損於責實之政而州縣奉行鄕村應對畫圖供帳亦或不能無擾或降指揮直行寢罷尤爲簡靜申南康旱傷乞放租稅及應副軍糧狀伏覩本軍今爲乆闕雨澤早田旱損巳依凖令式具狀奏聞訖照對本軍地荒田瘠稅重民貧昨於乾道七年曽遭大旱伏䝉聖恩放免本年夏秋二稅錢米紬絹共八萬六千三百二十貫石匹及詔本路監司應副軍糧米四千石撥到糴軍糧米錢九千餘貫并撥本軍未起米一萬一千七百餘石本軍借兌過乳香度牒錢一萬餘貫凑糴軍糧支遣官兵及撥到賑糶米五萬石又拖欠兩年上供折帛月樁等錢共九萬三千四日一十六貫石匹兩然後遺民復得存活以至今日今兹不幸復罹枯旱之災又蒙御筆深詔守臣精加祈禱而喜奉職無狀無以感格幽明祈禱兩月殊無應效今則早田十損七八晚田亦未可知正使幸得薄收其數亦不能當早田之一二訪問耆老皆云乾道七年之旱雖不止於如此然當時承屢豐之後富家猶有蓄積人情未至驚憂又以朝廷散利薄征賑給之後而人民猶不免於流移殍死閭井蕭條至今未復况今民間蓄積不及往時人情巳甚憂懼目下軍糧便缺支遣計料見管常平米斛斗亦恐將來不足賑濟支用若不瀝懇先事奏聞竊恐將來流殍之禍及它意外之憂又有甚於前日除巳具録奏聞許依分數放免租稅更令轉運常平兩司多撥錢米應副軍糧凖備賑濟外云云申南康旱傷乞倚閣夏稅狀熹昨爲本軍今年災傷至重奏截留兩年上供米斛巳䝉支撥淳熈六年未起米五千石充軍糧及賑糶等支用本軍除巳㳟禀施行訖今來檢放旱傷秋苗通計不止七分除巳一靣攢具奏聞外竊見本軍今年所理夏稅縁自省限起催以求即苦旱乾人戸車水救田日不暇給憂勞愁歎實與常歲不同遂不敢嚴督諸縣依限催理只令勸論人戸自行輸納至今截日方據納到絹九千四百匹錢一萬六千七百三十五貫二百五十九文省其絹一靣支裝起發所有見錢竊縁本軍别無儲積可備賑糶不免擅行兌借并未起淳熈六年折帛錢七千三百一十九貫二百九十六文省通前两項共錢二萬四千五十二貫五百五十文省趂此米價未起之間收糶米斛約計可得一萬一千五百七十餘石賑糶飢民却俟糶畢收簇元錢節次起發其餘人戸所欠錢絹數目尚多而民間自今以徃飢餓寒凍之憂日甚一日漸次無力可以供輸熹誠不忍更行催督以速其流離轉死之禍除巳具録奏聞乞賜許將本軍今年人戸未納夏稅錢帛權行倚閣令候來年𧖟麥成熟却隨新稅帶納庶幾飢饉餘民得保生業不勝萬幸所有熹輒將上供官錢兊借糴米之罪亦巳具奏㳟俟朝典併乞施行乞住招軍買軍器罷新寨狀具位熹照對本軍見凖上司備凖朝省指揮招填缺額禁軍及抛買軍器物料并向來申請乞行省罷管下都昌縣剙置新寨逐項利害除巳具公狀申聞外合行供禀者一凖安撫司備凖樞密院劄子立定本軍軍額招填禁軍共五百人今照本軍舊管禁軍額數至多蓋縁承平之際戸口䌓多投募者衆州郡又未有諸色上供及㨂汰歸正使臣軍員倉庫充溢足以支遣近年以來稅重民貧戸口逃散巳是無人應募州郡上供之額旣重冗食之數又多並無留州得用錢米可以養贍所以招收常不及額猶尚支遣不足䝉朝廷察見上件事理於淳熈七年内巳降指揮權以二百人爲額今來又凖上項指揮照應見管二百人外尚缺三百人雖巳遵依分委兵官招妆縁本軍僻陋小郡戸口不多目今雖是荒年尚乃無人應募設若有人應募其添招禁軍三百人毎年合用糧米五千四百石料錢八百六十四貫文省春冬衣絹一千三百五十匹紬一百五十匹綿四千五百兩衣錢七百六十五貫委是數目浩瀚即無合撥窠名可以支遣况當荒歉之後稅苗蠲放殆盡見在人數尚且支給不行若不申陳竊慮虚負稽緩之責欲望鈞慈特賜敷奏乞依元降指揮且以二百人爲額如以州郡武備不脩必欲招足元數亦乞限一年添招十人庶幾數十年間漸還舊貫而州郡得以漸次措畫不致違悞一凖轉運司備凖樞密院行下抛買第十一料至十五料甲葉牛皮數竊縁郡境民貧不堪搔擾十一至十五料節次具申未敢行下收買獨十四料幸䝉漕司申奏蠲免而又巳有抛買第十五料指揮竊縁本軍三縣去歲大旱民間貧困異於常時官司夏秋二稅檢放倚閣無可催理逐月官兵請俸尚且積壓無可支遣今來雖是漸次起催新稅然旱荒之後民氣未蘇尤當存恤撫摩庻幾不至流散若更分抛下縣催督買發官司初無合破官錢不過科擾取辦上件軍器旣未有急切用處徒爾驅逐飢民使之逃亡失業因致死亡有負朝廷救荒䘏民之意事屬不便欲望鈞慈軫念特賜敷奏權與蠲免候二三年後年榖豐熟却令漸次收買起發施行一照對本軍淳熈五年内䝉提刑司奏請於管下都昌縣剙置營寨招刺軍兵彈壓盗賊巳行依應旋招到軍兵二十名及於管下巡檢司各差撥兵士十名并於本軍添差兵官内差委一員專一在寨統轄教閱今照都昌爲邑百餘里見有棠隂四望松門楮溪大孤山五寨土軍額管四五百人縣郭又有弓手八十人足可彈壓盗賊當時止縁盗徒倪四等乗船經過縣岸提刑高公泗一時申請添置此寨見在縣郭當五寨之中而與尉司相去僅百餘歩委是虚設徒費帑廪昨來備述利害及以本軍匱乏無以贍給累具申陳乞行省罷此寨欲將招到軍兵併歸四望山寨塡𥙷闕額之數未䝉行下欲望鈞慈特賜敷奏依所乞施行乞除豁經總制錢及月樁錢狀熹照對本軍去歲旱傷至重檢放秋苗八分以上及䝉朝省行下將第三等以下人户夏稅畸零倚閣是致經總制錢收趂不及合行除豁及月樁錢無從樁辦不能如額巳嘗具申總領轉運提刑司照㑹乞行除豁無收經總制錢及乞據實椿到月樁錢數起發除别具狀供申尚書省乞賜敷奏外今具事節合行申禀者一經總制錢年額係於夏秋二稅内收趂縁本軍去年分檢放過苗米三萬七千四百五十石一斗二升三合一勺紐計無收經總制勘合頭子錢六千三百七十二貫一百一十七文省及依凖淳熈七年十月二十六日聖㫖指揮倚閣本年第三等以下人户未納畸零夏稅折帛錢二萬三千三百一十五貫四百六十五文本色絹三千八百一十六匹九尺六寸紐計無收經總制勘合頭子錢二千九百二十五貫八百四十七文二項共合除放經總制錢九千二百九十七貫九百六十四文其苗米上所收經總制頭子勘合等錢遵從淳熈四年戸部韓尚書申明巳得指揮並合随苗除放其夏稅畸零錢帛旣巳倚閣亦無合收經總制勘合頭子錢數目合依例除豁方欲具申乞下總所并憲司照㑹今㑹得池州近以旱傷申請巳奉聖㫖除豁檢放苗米上無收經總制錢况本軍旱傷尤甚旣檢放秋苗外又䝉倚閣第三等以下畸零夏稅所有上項經總制錢委實無所從出欲望鈞慈矜察特賜敷奏於本軍淳熈七年分合發經總制錢内除豁前項放免無收錢九千二百九十七貫九百六十四文仍乞行下憲司總所及本軍照㑹一本軍月樁錢係於夏秋二稅并場務出納錢物收到頭子經總制無額錢及酒稅課利分隷樁辦縁去歲旱傷之故苗米放及八分三等夏稅亦復倚閣自九月十二月終月額共合樁辦一萬四千五百三十三貫九百一十二文除巳據實收樁到錢將新𥙷舊遞互儧那共計一萬三千九百一十三貫五百四十七文節次起發外尚有六百二十貫三百六十五文及今年正月以後合發錢數目今空竭無可樁辦欲望鈞慈特賜敷奏將淳熈七年九月至十二月終收趂不足月摏錢六百二十貫三百六十五文特賜蠲免外所是淳熈八年正月以後合發月樁錢數亦乞行下淮東總領所照㑹據本軍每月實樁到錢數起發候向去年嵗豐熟民力稍蘇即依舊數發納申修白鹿洞書院狀具位契勘廬山白鹿洞舊屬江州今隷本軍去城十有餘里元係唐朝李渤隱居之所南唐之世因建書院買田以給生徒立師以掌教導號爲國學四方之士多來受業其後出爲世用名跡章顯者甚衆至國𥘉時學徒猶數十百人太宗皇帝聞之賜以監書又以其洞主明起爲蔡州褒信縣主簿以旌勸之其後旣有軍學而洞之書院遂廢累年於今基地埋没近因搜訪乃復得之竊惟廬山山水之勝甲於東南老佛之居以百十數中間雖有廢壊今日鮮不興葺獨此一洞乃前賢舊隱儒學精舍又䝉聖朝恩賜褒顯所以惠養一方之士德意甚厚顧乃廢壞不修至於如此長民之吏不得不任其責除巳一靣計置量行修立外竊縁上件書院功役雖小然其名額具載國典則其事體似亦非輕若不申明乞賜行下竊慮歲乆復至埋没湏至申聞者右謹具申尚書省及尚書禮部伏乞鈞㫖檢㑹太平興國年中節次指揮行下照㑹庶幾官吏有所遵守乆逺不至堙没謹狀小貼子契勘本軍巳有軍學可以養士其白鹿洞所立書院不過小屋三五間姑以表識舊跡使不至於荒廢堙没而巳不敢妄有破費官錢傷耗民力伏乞鈞照乞支錢米修築石隄劄子照對本軍邉臨大江舊有石砌隄寨堰住西灣水汊藏泊舟船每歲江西諸州錢糧綱運并商榷舟船浮江上下並於寨内抛泊或值風濤大作亦免沉溺之患公私兩便自紹興以來不暇開修逐年風浪衝擊砌石損動往往多𬒳回運空綱偷般壓船前去以致寨内水汊沙土填塞積嵗之乆不復開浚重載舟船不免於石寨外江心排泊沿岸石磊不堪繫纜毎有大風震作漂溺人船不容拯救前後抛失官私錢物不可勝計本軍慮其所用工料錢米無所從出又恐土石一興有妨農作縁此坐視不敢申請今縁本軍旱傷至重細民闕食撿凖紹興重修常平免役令諸災傷監司隨所分州縣有興工役而可以募人者雖非農田水利謂如城隍道路隄岸土工及種林木之類各預行檢計工料錢榖之數具利害奏聞本軍巳委星子知縣王文林司戸毛迪功躬親詣地頭逐一從實檢計到開修石寨去處合用工料等錢五千三百七貫一百二文米四百五十六石四斗五升本軍巳行具申轉運使衙取撥窠名錢米雇募人工修葺去後近凖使司回牒止撥到移用錢一千貫文米五百石今照先委星子知縣王文林司戸毛迪功檢計工料錢米並是實用之數本軍今不敢全乞取撥望止乞更行増撥錢米付本軍支散自餘少缺之數本軍自行計置貼助使司撥到錢米趂此天氣和暖雇募人工開修不唯官私舟船得免風濤之患且使飢民就役不致缺食湏至申禀者乞催修石隄劄子熹照對本軍臨江石砌隄岸自紹興以來𬒳風浪衝撃損壞及港汊堙塞稍自江水退落不堪住泊舟船巳嘗具利害申禀乞行計料開修巳䝉委官相度開具合用工食錢米供申去訖未蒙行下縁目今水涸正是併工開修之際若是蹉時向後寒凍工匠艱辛除别具公狀申呈欲望台慈早賜申奏仍乞行下逐旋取撥窠名錢米一靣趂時用工開修施行實爲公私乆逺利濟之惠論都昌創寨劄子熹竊見自古建立州縣與安頓營寨去處不同州縣湏得山水環聚地土寛平可容官府民居去處而未必要害營寨即湏相度地勢果是盜賊來往所必經由之地可以卓望邀截不容走透方爲要害然後建立此事理之必然也故古人於此二者經度安置各有所處未嘗差互其州縣去處雖非要害然旣有官府民居倉庫刑獄則亦不可無備故逐縣皆有尉司弓級大者百餘人小者不下數十人與營寨土軍表裏防護其用意亦備詳而深逺矣若以州縣去處瀕江帶河恐有姦人不測侵犯便爲要害則凢州縣少不近水設使果是要害去處其縣道亦有弓手足得防護不必更於弓手之外立寨招兵然後可以守也本軍都昌縣者地實瀕江然上有棠隂木門四望下有楮溪大孤山大小五寨近者四五十里逺者亦不過百餘里逐處可以卓望把截是爲要害其縣郭去處正在五寨之間又有尉司弓級額管七十五人四至八到在隆興饒江三州星子建昌兩縣之間即與淮南州郡並無連接去處百十年來除李成大盜横流之後不聞曽有盜賊直犯縣邑只於淳熈四年因有散亡窮㓂三人匿跡舟中經由縣歩初未嘗敢上岸作過却𬒳尉司弓級緝捉驚趕即時竄逸是時偶有饒州職官沿撽到縣中路得於傳聞意謂本縣巳𬒳焚劫遂張皇其事妄申憲司一時憑信便將官吏對移奏稱都昌縣接連淮南而南康管内都無一兵乞創此寨以天子使者持斧逐捕之威而爲窮寇三人驚駭擾亂至於如此固巳可笑又况初不計筭増兵百人一嵗所費爲米一千八百石錢五百餘貫絹五百匹綿一千五百兩使州縣何所從出亦不審慮兵官一貟禁軍百人出在外縣使聽何人節制於民有無搔擾致誤朝廷降此指揮自今觀之利害得失昭然可見人無愚智莫不知之故本軍昨來輒具申陳乞行廢罷今幸朝廷行下使司相度竊計必䝉洞照底裏力賜主張使邑屋無侵擾之虞州郡免供億之費遂除一方永乆之害然熹愚慮尚恐州縣官員觧事者少而便文自營之私勝觀望畏怯之習深既不明形制要害之緩急又不察公私事力之有無但恐廢罷之後萬一復有衝突或能累巳又見元係憲司陳請不無觀望之意雖到地頭相度往往不能盡公竭慮而偷爲一切首䑕之計或稱實係要害去處見有招到軍兵造到寨屋難以廢罷上誤鈞聽則熹請有以折之夫地勢要害衣糧耗費種種利害熹前巳詳言之矣請更以一事論之今所置寨正在本縣尉司之南數十歩間若以弓手爲不足恃則廢弓手而專募寨兵可也今置寨以來弓手之廵警未嘗敢廢近又㑹合外縣捉獲但淳莊賊而所招新兵者飽食安坐未嘗少立功効及至本軍行下督責巡尉之際其軍兵反教寨官申稱當來置寨只爲防護縣郭不合下郷巡捕其無用如此但能在縣生事擾民詞訴不絶州郡相去既逺縣官莫敢誰何若不早行廢罷向後郡縣民間之害將有不可勝言者若䝉察此利害數端之實許行廢罷其見招軍兵數目不多自可撥隷諸寨填𥙷闕額見造之屋其數亦少自可就近撥充弓手營房他無所用也豈可明知其傷財害民有損無益而但爲此羸卒數人破屋數間之故留此巨害之根以貽患於無窮乎夫論事不論其利害之實而欲因陋就簡偷合取容以狥目前一切之計此乃世俗淺陋之常談宜不足以惑高明之聽然熹之愚亦有不能無過計之憂者故敢復盡其言以煩執事伏惟幸垂察焉其或議者尚慮復有前日舟中三人之盗而不可以無備則望鈞慈更垂體察只勒本縣立限招足闕額弓手而更於額外増置二十五人湊足一百人亦足以増重形勢防衛不虞而弓手係屬本縣縣尉知縣等級相承名分素定易爲拘轄比之立寨招軍利害蓋萬萬不侔矣其都昌縣與諸寨相去逺近里數形勢今并彩畫成圖連粘在前乞賜鈞覧干冐威尊皇恐死罪申免移軍治狀凖安撫轉運使衙牒備凖尚書省劄子新差知袁州曹大夫奏乞將南康軍移治湖口縣撥隷彭澤縣及都昌縣依舊成三邑却將星子建昌縣撥隷江州事除巳移牒諸司從長相度經乆可行利便修寫同銜檢狀連書施行外牒軍詳此從長相度有無利害具狀供申所凖前項使牒指揮本軍檢㑹昨淳熈三年内凖安撫提刑轉運提舉使衙牒準二月二十六日尚書省劄子戸部申凖都省批下白劄子乞將南康軍建昌縣隷江州而復以江州湖口縣隷南康軍或建昌縣若還隷隆興府事牒本軍契勘建昌縣湖口縣坐落去處并各縣抵接本軍水陸界分地里逺近相度經乆可行利便具狀供申本軍巳行取㑹逐縣具利害回報及塌畫地圖送簽㕔集衆官㑹議合依建昌縣士民比建昌水陸地界至江州皆逺至南康皆近陳乞仍舊隷屬本軍爲便事理保明具申安撫提刑轉運提舉使衙照㑹施行去訖今又凖上項指揮本軍今相度開具下項湏至申聞者一本軍自太平興國七年始建軍治至建炎間李成賊馬殘破其元建軍額案牘不存㝷照圖經及簽判㕔舊題名記并詢訪士民檢到皇宋咸平本軍判官兼通判余致堯撰新剙利民橋記見得自太平興國六年相國張齊賢轉漕江表以其地在廬山之陽彭蠡匯澤直注于是每春江水漲洲沈島没䖍吉撫筠洪諸城軍實萬艘浮江而下或天鼓噫氣怒濤沃空篙工棹郎摧檣是慮指斯邑也爲拯溺之地公於是度其便則沂流之要衝相其宜則上游之樞㑹非鳴鼓角樹牧帥以守兹土則觀風之政幾致闕如由是紀事實以入奏請改其邑爲軍太宗皇帝嘉其言曰俞南方之俗其在康哉可賜名南康軍自是之後幾二百年至紹興以來復建軍治及諸倉庫郡官𪠘舍兩獄諸軍營房洎至成就所費不貲若一旦棄而不用徙置它所必湏剙建軍治城壁及諸帑廪郡官𪠘舍兩獄諸軍營房不知所費從何取撥而湖口縣治地勢窄狹前近大江後逼高山亦無建立軍壘去處今欲剙建軍壘必湏占奪民間田地搔擾不細以此論之移治之說彼此公私有害無利灼然可見一星子縣係本軍見今治所地瘠民貧昨因經界之後二稅愈重倍於它邑自辛卯大旱之後民力未甦幸而輸納水陸皆便朝至暮歸無諸抂費然而民間未免猶有愁歎若隷江州則陸路一百二十里而水路順流一百二十里至湖口縣入沂流四十里至江州沂流一里折二里通二百里輸送期㑹轉見遥逺以此論之則割隷江州於民有害於官無利灼然可見一建昌縣元申據進士熊望之等并父老及稅戸傅政等連狀本縣陸路至江州二百八十里至南康一百三十里水路至本縣三百里去江州則又一百二十里到湖口縣湖口縣又泝流而上八十里方到江州又必經由南康軍湖口縣兩處口岸不無阻節見今江州係駐劄去處一有所科近縣則便逺處則不便且如德安縣乃江州屬邑之逺者尚不過一百二十里本縣去在德安縣之南又六十里且以馬料㣲事言之隨稅高下均科本縣水行五百餘里方至江州如陸程則南去鄕分到本縣又百餘里往返有六百里之逺動經旬日若中等之家科藁二百束毎人止負兩束以人數較之動費百夫上等人户則又不止百夫若令人戸就縣交納亦有般擔縻費官司觧發亦不過取辦於民本縣旣逺於德安縣况連丁大旱之後人民流移未盡全復若更以隷江州豈特流移之家不歸而見在人戸亦必逃移竊以普天之下莫非王土江之東西亦皆王民萬一必欲撥隷民間豈敢固違然望之等伏見朝廷清明四方無虞東西兩路之民各安其業與其有所改易不若仍舊貫爲安陳乞備申朝省詳酌利害施行以便民情本軍今來相度建昌縣昨來所申事理委得允當以此論之則割隷江州於民有害於官無利灼然可見一本軍逐年起發上供經總制月樁等錢及支遣官兵衣糧百色支費全仰三邑樁辦而建昌星子應辦不啻過半今來若將撥隷它州則所餘都昌地瘠人貧歲多旱歉催科稍急則有逃徙之患財計實無所出雖以湖口彭澤兩縣改隷本軍名爲依舊三縣而湖口彭澤所入亦少不足禆補且以苗米論之星子湖口各止六千僅可相當而建昌秋苗二萬彭澤所入約計不及其半今欲以二縣二州夏秋二稅及諸色歲計之目依各縣元數令逐州承認惟上供之數或可随縣改割至於養贍在軍官吏軍兵支用之數不知何從而出以此論之以建昌星子隷江州以湖口彭澤隷本軍於官有害於民無利灼然可見右本軍相度利害於前又詳建議之人首尾陳述略無義理其言江南分東西路實以江西爲界者今契勘江西一路自隆興府撫州建昌軍皆在江西之東若如議者之言則此一府一州一軍盡合移治江西之西而其諸縣亦合改隷江南東路矣又江州南康疆境交互奔走期㑹民頗難之又有風濤之險監司廵歷民戸輸送徃來毎以爲艱今契勘星子建昌兩縣民戸輸送地里逺近如前所陳若以議者之言便行改割則是使之捨近就逺去易就難與其所陳事理利害正相違背兼本軍所管都昌一縣雖是隔江然人戸輸納不過苗米一項最爲麤重自來乆例又只在本縣交納裝網起發人戸即無徃來之阻至於移動一軍城壁官舍倉庫營寨所費浩瀚度湏用數萬緡而起遣一縣民居屋舍及占奪其地使之蕩析流離不得安其生業尤非細事而議者率爾言之僅同兒戲不知今日民力凋弊州縣空竭之際如何計置得上件錢物給此支用而勞民動衆爲此有害無利之舉其說竊恐難以施行徒然煩費文移動揺物議使一境軍民日夕憂惶不遑寜處極爲非便謹具申監司衙欲望詳酌早賜奏聞寢罷前件指揮以安一郡軍民之心不勝幸甚伏候台㫖小貼子契勘本軍建昌縣陸路至本軍經渉江州德安縣界而小路直至本軍不隔外州其隔江州界分去處初亦無甚利害只是德安縣遞鋪兵士以非本軍所轄㝷常不肯傳送本軍及建昌縣文字有此一節小小利害然亦湏别有措置豈有爲此之故而輕移一軍遽割四縣之理今若將德安一縣遞角文字特令兩州巡轄使臣通行點檢則郵傳亦自不至阻滯併乞台照熹上覆論馬辛獄情劄子熹契勘本軍軍院昨凖使帖押下承局馬辛根勘凌犯階級情罪依條施行巳據本院勘到招伏情節依條合徒二年配鄰州熹竊詳本人所犯却因發覺方彦故違使司元降約束私買板木遂致爭閙若便依條斷罪竊恐情輕法重或非台慈之本意未敢便行决遣亦不敢輒具公狀申陳敢以此私於下執事欲望矜察行下稍從寛典不勝幸甚熹以亟遣遞筒未暇别𥿄布謝悃併乞台炤論南康移治利害劄子熹輒有愚懇仰瀆台聽近凖安撫衙牒備承使司公文差委池州余推官前來相度曹大夫者所陳移治湖口改割兩縣事本軍巳遵依行下兩縣相度去訖然其事理實有不難知者本軍建立二百餘年兵火之餘掃地赤立今又五十餘年官府民居方稍就緒然猶頗有未圓備處若更遷徙必致狠狽兼今來民力巳極困弊官司尤覺煎熬移治所費少亦不下數萬緡不知何所從出又聞湖口地歩窄狹目今爲縣尚且費力若欲改建軍壘城壁官府倉庫牢獄所占地歩計湏十倍於前未知何處可以安頓設使可以安頓亦必起遣居民毀拆其屋占奪其地乃可營建不知今日幸無迫切利害何必爲此以動摇人心爲國取怨此移治不便之說也至於改割兩縣則兩縣距今南康治所道里近而去江州治所道里逺南康財賦取辦於建昌星子者過半而湖口彭澤二縣所入不足以𥙷其數雖上供歲額或可隨縣改割而本軍官兵吏貟廪禄不知何所從出此割縣不便之說也竊意此事終乆决難施行而徒煩費文移動摇衆聽使兩處軍民之情疑慮惶惑不安厥居極爲非便熹衰病之餘扶曵來此旦夕即爲引去之計視此不啻如傳舍豈有毫髮顧戀之心特以旣荷聖恩彊卑民社旣未能有以使其人安於田里而無愁嘆之聲誠不忍更使復爲庸人淺議所擾故敢直以巳意干昧申呈其詳見於公狀欲乞台覧早賜奏陳寢罷其說以安兩處軍民之心不勝幸甚論阿梁獄情劄子使可之可疑當作使司熹照對本軍阿梁之獄節次畨詞互有同異湏至依條再行推鞫然以愚見本人畨詞雖非實情然且只據其所通情理亦不可恕不必再行推鞫盡如前後累勘所招然後可殺也蓋阿梁與葉勝私通致葉勝因其夫病而手殺之雖使阿梁全然不知殺害之情究其所因巳絶人理况巳明知殺意當時自合出門聲呌或密投鄰里以求救援今乃抱兒立於門外半時之乆以俟其夫之死及見其夫之出聞其夫之聲知其事之不成然後隨聲呌呼以求救只此一節其情蓋巳灼然可見不必同謀其殺然後可寘極典也夫人道莫大於三綱而夫婦爲之首今阿梁所犯窮凶極惡人理之所不容據其番詞自合誅死無足憐者本軍雖巳具申乞行推鞫然熹愚意欲望使可詳此情節别具奏聞乞降睿㫖只依元降指揮處斬施行不惟得以蚤正典刑使姦凶之人不得以遷延幸免亦以聳動群聽使衆著於人倫之義於以弼成聖教實非小𥙷熹以人㣲職賤不敢頻有奏陳敢以此私於執事伏惟鈞照論木炭錢利害劄子一熹輒有愚懇仰瀆台聽伏見管下都昌縣人戸夏稅錢内一項科折木炭自來只用本色備船裝載赴監送納自紹興二十四年提點韓寳文任内因納炭稽遲追典押取問偶一時懼罪自行供認乞每秤折納價錢二百六十文省觧發赴監自行置埸買炭考之縣吏每稅錢二十文折木炭一秤以稅錢則例言之夏稅見錢一貫五十文合折絹一匹官交價錢六貫文省若折木炭合管炭五十二秤半每炭一秤官交正錢二百六十文省共錢一十三貫六百五十文巳上以兩項價錢比並則木炭錢多於折絹價錢七貫六百五十文係爭一倍以上數目巳極懸絶况都昌民戸逐年長養園林採柴燒炭每斤直錢五文至六文止若比倣折納價錢又幾三倍所以民力重困多掛欠籍追逮督迫幾不聊生今來人户乞依祖來舊例備本色自雇船裝載赴監送納獲鈔銷注誠爲便利民戸所陳大略如此所有曲折具于公牘敢乞台慈詳酌俯從所請庶幾疲瘵之民得以少蘇實出使臺之惠不勝幸甚冐昧台嚴不勝悚仄小貼子上件所陳乞納本色木炭事或以爲不若比附納絹量减價錢却從使司置場收買尤爲利便更乞台慈詢究詳酌施行論木炭錢利害劄子二照對本軍管下都昌縣人戸舊例送納本色木炭赴使司交納紹興十五年間使司行下毎秤折納價錢一百五十文足續又毎秤至二百六十文省契勘其炭係以絹稅紐折今來所納價錢比之折絹計多一倍以上委是太重民力不堪昨據人戸陳訴巳曽具申使司乞納本色未䝉行下不免具申朝廷今凖省劄巳送使司指定竊念本軍地狹民貧稅額偏重而折納炭錢比於納絹計増一倍以上比於本色計増三倍以上農桑之家有木無錢送納累年委實困弊欲望台慈仰體聖朝勤恤民隱之意特賜詳酌許依所乞送納本色不勝幸甚干冐合嚴俯伏俟罪論木炭錢利害劄子三熹昨日伏䝉靣諭許賜行下究實都昌木炭價錢利害特與蠲减仰見仁人君子所以愛民之實不爲茍悅於一時而所以爲之計慮深逺如此感幸歎息無以爲喻適凖使帖謹巳遵禀施行續當條上然熹竊伏思之復有一說上可以推廣台慈矜恤之惠而下不至於多失有司經常之入敢預言之以俟采擇謹按木炭本以稅絹紐計納本色比之納絹所費巳増一倍之數折納價錢比之納絹所費又増三倍之數反覆紐折至於數倍上違法意下損民力本軍三縣皆受其弊然二縣距使臺爲逺津般本色其費不貲故雖價錢稍重而不敢深以爲苦都昌則距使臺甚近而津般不難故獨願納本色而深以價錢之重爲病要之以錢比絹而論之則三縣之事體𥘉不異也熹前者妄論未能及此向若使司直從所請令納本色則熹不及有所議矣今乃幸䝉矜念更令究實却與蠲减是以熹得以復有所言欲望台慈更賜詳酌三縣第三等戸一槩重行蠲减其上兩等人戸却令且依舊送納庶幾一郡細民均𬒳大賜而上兩等戸事力稍重猶可不至大叚狼狽兼亦不至多失使司財計免致别有經畫實爲利便湏至申禀者乞聽從民便送納錢絹劄子熹近者兩具劄目陳乞宫廟差遣㳟想巳徹鈞聽外服下僚不敢數以寒暄浮禮仰塵威重兹乃復有愚悃輒冐布之熹束髪讀書不親世務加以疾病益復懶廢兹䝉誤恩起家試郡觸事昏塞不知所爲近因奉行近降指揮令上三等戸稅絹畸零丈尺凑鈔送納本色外下戸不成端匹稅絹每尺並以一百文足折價從便獨鈔送納節次據本軍下戸陳訴乞依舊凑納本色熹初不知利害曲折只見朝廷指揮之意本爲優恤下戸但行喻遣催促送納自後點檢得見納到數目大段稀少遂行詢問乃知本軍絹價每匹不過三貫文足今令上三等戸得納本色而下戸却令一尺折錢一百文足即納一匹計成四貫文足委是折錢太多所輸反重於上户所以下戸不願折納而熹昏愚不能加意詢訪及時申明致此違慢巳從本軍具狀申尚書省欲乞許從民便送納錢絹敢乞鈞慈早賜敷奏行下以憑遵守催督免致拖欠爲公私乆逺之害所有熹申明後時上誤國計亦乞明賜黜責以爲守臣慢令廢職之戒干冐鈞聽伏深恐懼小貼子熹所申事理縁今夏稅末限將滿欲乞鈞慈詳酌徑自朝廷施行庶幾猶可及事若送戸部行遣往還動淹旬月州縣之吏無所禀承則懦者不敢督趣必至於闕供强者不恤有無必至於病民矣切乞垂念熹又竊詳今者所降指揮它州未聞有以爲病而申陳者或是本處絹價高貴今得例從低估民間實以爲便故熹所申亦不敢乞减所定錢數只乞許從民便則價貴處人自納錢價賤處人自納絹兩不相妨各得其便伏乞均照乞禁保甲擅關集劄子契勘保甲之法什伍其民使之守護里閭覺察姦盗誠古今不易之良法也然旣許其蓄藏兵仗備置金鼓則其節制階級似亦不可不嚴竊見目今見行條法累降指揮但有團結教習之文初無戒令紏禁之法鄕里豪右平居挾財恃力巳不可制一旦藉此尺寸之權妄以關集教閲爲名聚衆弄兵凌弱暴寡拒捍官司何所不至如本軍都昌縣劉邦逵等只縁劉彦才爭競聞得官司追呼遂於盛夏輒行關集鳴鑼持仗過都越保欲以報復怨仇抗禦捕吏向非託於保甲之名安敢公然如此熹除巳將劉邦逵等依相毆報冤爲名結集徒黨立社法等第决配編管外仍具利害申使司欲望台慈詳酌特賜行下約束施行區區之懐别有愚見更望使司特賜敷奏明降指揮今後應保甲首領等人輒以關集教習爲名聚衆弄兵欲以恐脅官私報怨拒捕者比凢人之法特加一等收罪庶幾豪强知畏不致寅縁敗壞良法委實利便湏至申禀者乞保明减星子縣稅劄子熹昨日方遣人具劄目申禀想徹台聽適所遣陳乞减星子稅人回齎到省劄一道謹復專人申納乞賜台念保明回申不勝幸甚其間上供對補之說竊謂若本不虧上供元額即初無可申請若有别色可以對𥙷即亦不湏申請今有司之吝至乃以此爲問則蠲减之恩似巳無復可望然邑人縁此陳乞往來計㑹亦巳薄有所費其心不能無僥倖於萬一而熹元奏固巳有謂如䝉施行不唯今日見存人戸得保生業而巳逃未復願耕無田之人必將有扶老携㓜而至者不數十年生齒日繁墾田日廣向來樁閣之數亦可漸次起理以復承平之舊者似巳預爲今日觧紛之地欲望台慈頗采其意特爲申述使得不爲刀筆所沮而早得䝉𬒳堯舜之澤熹與邑人千萬幸甚干冐威尊無任戰悚小貼子上件文字欲乞不别委官看詳徑從使司保明回申幸甚報經總制錢數目劄子坊場敗闕下一本有體字熹照對近凖使司公牒依凖總領使所牒催發本軍去歳未發錢四千六百餘貫并今年未發錢三萬九千五百四十餘貫謹按去年錢内合除豁坊場敗闕减下錢一千四百四十貫三百餘文僧道免丁比額不敷錢一百六十四貫六百餘文截使招軍造甲經總制錢一千八百九十五貫文及巳申及乞理折曹秉義等稅錢九百九貫餘文共計登四千四百九貫三百四十五文省外實催到茶租錢二百八貫巳差衙前蕭彦押發别無未起之數節次具申總領所照㑹去訖所是今來錢除巳起發春季外未發錢數内亦有合除豁坊場敗闕體减下錢僧道免丁比額不敷錢共登一千九百一十三貫七百九十文自餘合催錢數縁本軍今年夏初以來田禾便遭枯旱今則秋苗巳放八分巳上民間目下巳自闕食兼淳熈七年第三等以下未納畸零夏稅巳䝉上司備奉聖㫖行下權行倚閣今來正稅旣無所入其經總制等錢亦别無合收窠名官錢可以樁辦所有秋季經總制等錢係據實收到錢七千四百六十三貫二十四文省差衙前王溥管押外有冬季錢數當在來年正月起發本軍亦縁旱傷人户艱於輸納兼凖近降指揮住閣夏稅官物竊恐將來施下合發錢數虚負罪戾巳節次具申朝廷并上司乞賜敷奏將合趂經總制錢容本軍據所屬實收到錢數批曆入帳拘收起發免以遞年季分比虧去訖除巳别具公狀供申外今䝉使司所追都吏以下欲望台慈存留催發官物干冐威嚴不勝惶恐之至乞减移用錢額劄子熹契勘本軍財賦匱乏官兵支遣常是不足逐時全仰酒稅課利分隷相助近自乾道九年内䝉使司於經常分隷錢數之外創立名色毎月抛移用額錢一千二百餘貫均於城下及两縣酒稅務趂辦自此之後酒稅所收課利除樁移用錢外諸司所得分隷錢數不多致本軍財計轉見闕乏支持不行兼近年以來沿流州軍收稅太重商旅稀踈又爲諸軍差出軍兵販賣物色齎到戸部總所曆頭不許州縣收稅場務愈見虧欠州縣愈見窘闕只如本軍見今拖欠使司移用錢四箇月無以起觧今有公狀具申欲望台慈矜憐特賜於元抛移用額錢上重賜裁减行下樁辦非獨場務可以補觧逋欠亦於本軍不無少有𥙷助干冐威嚴不任悚慄小貼子照對州縣財計取辦於稅務稅務課額仰給於客旅然則客旅雖非農民之比亦官司財用取資不宜重困使其望風畏避而不敢出於其塗也今者本軍得䝉使司蠲减苗米水脚錢毎石至一百三十九文農民固巳幸甚獨徃來商旅州郡場務以課額浩大不容優恤若䝉台慈詳察將上件移用無名之額痛賜裁减使州郡得以約束務官輕减商稅招邀客旅令得通行是亦使司乆逺大利之源不必竭取於一時然後爲快也乞行遣攔米官吏劄子熹巳具申禀未行之間復有危懇重免鈞聽熹昨嘗妄以鄰路遏糴利害申聞巳䝉聖㫖特賜指揮近得彼路諸司文移始許通放而屬縣下吏乃敢蔑視朝廷號令帶領吏卒公肆拘攔至於越境釘斷陂口以絶往來之路正復戰國相傾之世不至於此雖巳移書彼郡及諸監司請照條令按劾尚恐未以爲意不免具狀申省乞賜約束欲望鈞慈矜憐早賜行遣不勝幸甚熹干冐非一罪無所逃伏𥿄不勝戰栗俟罪之至乞申明閉糴指揮劄子熹輒有迫切之懇仰干鈞聽本軍地瘠民貧米榖不多遞年雖是豐熟亦仰上流州軍客船販米糶糴食用今年遭此大旱檢放七分以上而上流儘有得熟去處顧乃循習舊弊公然遏糴以致米船不通細民闕食本軍竊慮無以賑糶支遣遂逐急那兌諸色官錢差人前去收糴米斛今㩀差去人申巳糴到米而諸處官司出牓禁約不許放行竊慮客販不通官糴又阻境内飢民日就狼狽除巳移文諸處官司請照累降指揮疾速放行及不許阻節客旅外更欲具奏及申尚書省又慮遽失鄰援之驩向後别致邀阻反爲深害謹密具此申禀欲望鈞慈特賜矜察早爲敷奏特降睿㫖檢舉舊法遍下諸路嚴行約束但使公私米榖逺近通行則沿流荒旱州軍自當不至闕食非獨此邦之幸而巳干冐威尊伏増震悚小貼子照對本軍勸諭上戸賑糶近十萬石其間多有有錢無米之人亦湏上流收糴若𬒳沿路阻節米船不通即此勸諭之數盡失指凖民命所繋爲害非輕伏乞鈞慈深賜留念乞撥兩年苗稅劄子熹昨曽具奏及申尚書省約計本軍今秋放旱外三分苗米一萬三千九百五十五石及去年零欠綱運米五千餘石乞賜截撥下本軍充軍粮支遣今續據管内三縣申到檢放實數多是全戸乾死所傷不啻八九分若依元數必取三分苗米即恐人户無從輸納必致逃移其去年殘欠初意亦候今冬催理填納今旣災傷如此亦非并督舊逋之時以此計之即熹前奏所乞兩項米數正使便䝉聖恩許賜截撥然皆巳難作十分指凖未䝉哀憐則其狼狽又將有不可勝言者蓋嘗竊謂有軍則糧决不可以不足旣旱則稅决不可以不放此二者皆必然之理也但在今日欲取足軍糧則民巳無食更責其稅必有逃移死亡之憂欲盡放民稅則有軍而無糧民亦將有不能保其安者二者之爲利害其交相代又如此然就其一端而論之則闕軍食之禍淺而易見不放稅之禍深而難知故今州縣之吏不過且救目前爲應文逃責之計掩蔽災傷阻遏披訴務以餉軍不闕爲先務至於民不堪命而流殍死亡皆不暇恤殊不知民旣死徙閭井蕭條田園蕪没或數十年而戸口賦稅無以復於其舊積其所失比之全放一年之稅何止倍蓰且如本軍乾道七年歲嘗大侵流殍滿道至今十年而流庸尚有未安集者田土尚有未開墾者今者不幸復遭此旱計其分數乃或甚於彼時民尚無以爲食若復責以輸納租稅將來之患必當有甚於前不知更費幾年功夫可得復似今日此尤不可不深慮者也然非朝廷察此利害之幾有以給其軍食使之得以盡實檢放而無乏供之患則難知之深害未弭而目前立至之禍巳不可免此熹之所以不敢避僭瀆之罪復論前奏之未審者仰冀鈞慈深加憐察特賜敷奏且依所乞截留兩項米斛外更令帥漕兩司同共相度别行應副則闔郡軍民死生而骨肉矣如䝉留念更望早賜行下以安其心熹無任惶恐俟命之至小貼子熹所申禀只爲乞撥六年殘欠及七年放外兩項米斛又恐朝廷恠其檢放分數之多故其妄言遂至覼縷誠不能無草野倨侮之嫌然其區區之心實欲深爲國家生聚教訓恢復乆逺之計若熹之私則去替不逺疾病侵陵罪戾孤蹤日俟譴斥决非乆於此者亦何必曲沽民譽過爲身謀以罔朝聽而陷於不測之誅伏惟鈞慈深賜洞察與執政劄子熹瞻望台躔乆不申起居之問下情第切宗仰比以災旱告急于朝竊計巳䝉鈞念惟是踈拙素不更事重此困迫不無煩擾今復有劄子二通申禀放稅乞米及鄰境閉糴事而熹疾病之餘不堪扶曵輙有私懇仰瀆威尊敢望鈞慈并爲敷奏乞從所請千萬之幸熹頻有干慁不敢累幅以勞侍史并乞鈞照乞以泗水侯從祀先聖狀照對本軍昨因修葺軍學照得從祀神位名號差舛曽具狀申尚書禮部續凖本部符降到見行從祀神位名號本軍謹巳遵依彩畫題寫奉安訖熹㳟覩崇寜元年二月二十五日詔追封孔鯉爲泗水侯孔伋爲沂水侯今按本部降到神位名號其泗水侯獨未得在從祀之列蓋嘗考之論語伯魚過庭親承詩禮之訓先聖又嘗使爲周南召南之學其才雖曰不及顔淵然亦不應盡出七十子之下竊意當來禮官一時討論偶失編載非固有所取舍升黜於其間也熹愚欲望朝廷特賜詳酌將泗水侯列於從祀位在七十子之後沂水侯之前庶幾孔門之賢悉登祀典有以仰稱崇寜聖詔襃崇之意湏至申聞者右謹具申尚書省伏乞照㑹施行謹狀乞頒降禮書狀照㑹政和五禮新儀州郡元有給降印本兵火以來往往散失目今州縣春秋釋奠祈報社稷及祀風雨雷師壇壝器服之度升降跪起之節無所據依循習苟簡而臣民之家冠昏䘮祭亦無頒降禮文可以遵守無以仰稱國家欽崇祀典防範民彞之意湏至申聞者右謹具申行在尚書禮部欲乞特賜申明檢㑹政和五禮新儀内州縣臣民合行禮制鏤板行下諸路州軍其壇壝器服制度亦乞彩畫圖本詳著大小高低廣狹淺深尺寸行下以慿遵守小貼子契勘王公以下冠昏䘮祭之禮鄂州見有印本但恐其間或有謬誤只乞行下取索精加校勘印造給降不湏别行鏤版其州縣祭禮及壇壝器服制度即乞檢㑹抄寫圖畫别爲一本鏤版行下乞増修禮書狀伏見本軍昨凖尚書禮部符下政和五禮祭祀儀式竊嘗參攷其間頗有未詳備處方欲具狀申審今覩進奏官報近者判部侍講侍郎奏請編類州縣臣民禮儀鏤版頒降巳奉聖旨依奏此誠化民善俗之本天下幸甚然熹竊慮其間未詳備處將來奉行或致牴牾今具如後湏至申聞者一所凖行下釋奠禮儀熹按其神位除正配三位外有殿上两廊從祀未見位號名數不委新儀全書有無具載欲乞討論并賜行下然按祀令二月八月上下釋奠文宣王以兖國公鄒國公配牲共用羊一豕一白幣三而巳今其所祀乃近一百餘位一羊一豕無縁可以徧及又州縣廟學窄狹祭器獻官多不及數往往不能一一分獻其爲欺慢莫甚於斯竊欲更乞相度申明許令州學免祭兩廊諸位縣學并免殿上十位庶幾事力相稱儀物周備可以盡其誠敬熹又按行下釋奠行事儀引三獻官詣舒王神位前一節係政和間所定後來靖康年中巳有指揮追貶王安石爵秩停罷配享訖今來上件儀注尚仍舊文竊慮州縣奉行反致疑惑亦合申明改正并乞台照一所凖行下釋奠陳設儀云設著尊四犧尊四爲二重在殿之東南隅北向西上配位即於正位酌尊之東著尊在前皆有坫加勺羃爲酌尊著尊一實明水爲上尊餘實泛齊初獻酌之犧尊一實明水爲上尊餘實醴齊亜終獻酌之熹按後章行事儀云初獻酌犧尊之泛齊亜終獻酌象尊之醴齊與此不恊竊疑兩處必有一誤㝷考祭社稷祀風雨雷師陳設儀皆設犧尊象尊爲酌尊乃知正是此章之誤其著字當作犧字犧字當作象字又旣云北向則是犧尊在北象尊在南所云在前亦是重複倒置欲乞申明改正行下一所凖行下釋奠祭祀陳設章皆云又設太尊二山尊二在神位前太尊一實泛齊山尊一實醴齊各以一尊實明水著尊二犧尊二象尊二壷尊六著尊一實盎齊犧尊一實醍齊象尊一實沈齊各以一尊實明水壷尊三實元酒三實三酒明水元酒皆在上五齊三酒皆以本處酒充在殿下皆北向西上内祭社稷儀云南向東上加羃五齊三酒皆設而不酌熹按此太尊山尊乃是都共設於殿之前楹壇之南靣其北更容獻官拜跪酌獻非是逐位之前各設四尊所謂北向者恐是太尊二爲一行其南山尊二爲一行又次南階下著尊二爲一行又次南犧尊二爲一行又次南象尊二爲一行又次南壼尊六爲三行其南向者反此所謂西上者謂西實元酒東實五齊三酒其東上者反此未委是否各乞討論并賜行下一所凖行下州縣社稷風雨雷師壇壝制度熹按其文有制度而無方位㝷考周禮左祖右社則社稷壇合在城西而唐開元禮祀風師於城東祀雨師於城南未委新儀全書有無同異欲乞討論并賜行下一凖禮諸侯祭名山大川之在其境内者又曰山川之神水旱疫癘之災於是乎禜之蓋以其崇高深廣能出雲氣爲風雨以滋養潤澤乎一方也今州郡封域不减古之諸侯而封内名山大川未有望祭之禮其有祠廟亦是民間所立淫誣鄙野非復古制顧乃舎其崇高深廣能出雲雨之實而傴僂拜伏於土木偶人之前以求其所謂滋養潤澤者於義旣無所當又其牲牢器服一切循用流俗䙝味燕器於禮又無所稽至於有山川而無祠廟者其歲時祈禱遂不復禜於山川而反求諸異教淫祠之鬼此則尤無義理而習俗相承莫知其謬欲乞撿照五禮新儀如巳有祭山川禮即與編類行下如有遺闕亦乞討論依放祭社禮儀立定時日壇埸方位制度并賜行下一伏覩累降赦書歷代聖帝明王忠臣烈士有功及民者並令致祭謹按唐開元禮享先代聖王並用禮器法服今即未委新儀全書有無歲時祠祭儀式欲乞檢照討論并賜行下右謹具申尚書禮部如有可採乞賜台㫖施行庶編類成書之後免致疑惑復有更改謹狀淳熈七年三月日乞加封陶威公狀據都昌縣稅戸董翌等狀伏覩本軍牓示詢訪先賢事跡數中一項晉侍中太尉長沙陶威公興建義旗康復帝室勤勞忠順以没其身謹按圖經公始家鄱陽後徙潯陽見有遺跡在本軍都昌縣界及有廟貌在本軍城内及都昌縣水旱禱禳皆有感應未委上件事跡是與不是指實且翌等係都昌縣居民縣境之南北的有陶威公廟二所其神聰明正直隂有所助廟貌建立年代深逺逐時居民商旅祈禱無不感應及本縣管下并鄰近州縣等處遇春夏闕雨鄕民詣廟祈求立有感應兼本廟邉臨匯澤大江水勢湍急綱運舟船徃來祈禱風濤自然恬靜前後廟記聲述分明今來翌等不敢没其實陳乞詳酌具録陶威公靈應事跡保明奏聞乞加封號本軍所据前項狀述㝷行下都昌縣勘㑹得董翌等所陳委是著實保明申軍及繳到江南劉羲仲所撰公贊曰晉太尉陶威公侃有大功於晉讀其書凛乎若見其唱義於武昌破石頭斬蘇峻何其壯也東坡蘇公嘗爲予言威公忠義之節横秋霜而貫白日晉史書折翼事豈有是乎且就其說考之威公夣生八翼登天門九重登其八閽者以杖撃之墜地折左翼及握彊兵居上流濳有窺覦之志輒思折翼之祥自抑而止心之所寓者爲志神之所寓者爲夣何自而知其然哉至其書梅陶稱機神明鍳似魏武忠順勤勞似孔明豈不信哉魏武起徒歩唱義兵非若威公威名之著也以漢德之深磐石之固可折箠驅之以息天下之禍非若成帝削弱之資也董卓之亂未必大於蘇峻魏武之功未必過於威公保兖州以爲固挾天子以爲資其意安在則其託興復以爲名是乃窺漢之計也名莫大乎忠孝分莫大乎君臣若魏武無忠臣之節其所謂機神明鍳者姦雄耳威公豈其比乎始蘇峻之禍賊將害其子者馮鐵也馮鐵奔石勒爲戍將石勒畏威公之彊殺馮鐵石勒自以爲一時豪傑標置二劉之間俯視曹孟德司馬仲逹而氣出其右顧畏威公如此威公没距今幾千年所在廟祀之都昌縣南北廟爲尤盛廟屢廢而屢興由其有功德於斯民者厚也又繳到近世撫州布衣呉澥所著辯論曰卓哉陶士行之獨立也方魏晉之際浮虚之俗揺蕩朝野一時聞人逹士名卿才大夫莫不䧟於末流罔知攸濟唯士行深疾時弊慨然有作蓄其剛毅沉厚之氣秉其忠慤正固之節以與流俗爭衡雖動而見尤所向白眼一入仕途荆棘萬狀而方寸耿耿者未始少渝終日運百甓於竹頭木屑間纎悉經營雖一束之穟劬勞不怠當時名士觀之宜若老農俗吏無足比數而士行確然爲之不屑也卒能恢廓才猷立功立事以大庇斯民當晉室横流之中屹爲底柱自非明智獨立安能臻此哉然覽庾亮之傳應詹之書則疑侃有跋扈之心觀温嶠之舉毛寳之謀則見侃有顧望之跡比至洒血成文登天折翼動可疑恠豈有是事也哉此蓋行高於人衆必非之加以蘇峻之誅庾亮恥爲之屈旣士行溘先朝露後嗣零落而庾氏世總朝權其志一逞遂從而誣謗之耳秉史筆者旣有所畏何所求而不得哉是其旁見曲出乃所以證成其罪也然觀士行義旗旣建一麾東下子䘮不臨直趨蔡洲一時勤王之師蔑有先者曁元勲克集實主斯盟而退然不有旋師歸藩旣坐擁八州据上流巳重泰山晉輕鴻毛移其宗社曽不反掌而臣節益脩未始擅作威福以自封殖朝廷憚其勲名每加疑備而士行泰然曽不少芥胷次及末年卧疾封府庫而登舟舉愆期而自代視去方伯之重不啻脫屣其臣節終始夷險無一可訾窮晉二百年間卓然獨出不忠之迹果安在哉今捨其灼然之實而信其似是之虚豈可謂善觀史也哉嗟乎自古欲誣人而不得者必汙以閨房之事以其難明故也今晉史欲誣士行而乃以夣寐之祥是其難明殆又甚於閨房哉然不知士行而實懷異志則如此夣寐之祥正合自知耳人安得而知之晉史以此待士行其智果不得與小兒等其說固不待攻而自破云本軍今檢凖乾道重脩令諸道釋神祠祈禱靈應宜加官爵封號廟額者州具實事狀申轉運司本司驗實保明及詳本縣繳到文字所以發明公之心迹尤爲明白有𥙷名教理宜褒顯而公位登三事爵冠五等當時所以品節尊名者亦巳稱其行事之實今据士民陳請在前欲乞朝廷詳酌採其行事特賜廟額以表忠義更不别賜爵號湏至申聞者右謹具申轉運使衙伏乞照㑹詳酌前項所申事理依條施行仗候台㫖考異脩白鹿洞書院基地一作基址脩築石隄種林木種下一有植字禁保甲豪右一作豪民晦庵先生朱文公文集卷第二十福州府儒學訓導舒鍪校
