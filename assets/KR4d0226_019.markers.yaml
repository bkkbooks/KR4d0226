  - {type: variant, offset: 20772, length: 0, content: '', WYG: 檢會政和五禮士庶婚娶儀式行下以慿遵守約束施行舉柯翰狀照對縣學見缺直學一員竊見進士柯翰守道恬退不隨流俗専以講究經㫖為務行年五十亹亹不倦置之學校必能率勵生徒興於義理之學少變奔競薄惡之風欲乞備申使}
  - {type: page-break, offset: 20772, content: '', id: KR4d0226_WYG_020-3a, image: WYG1143/WYG1143-0392c.png}
  - {type: variant, offset: 20773, length: 7, content: 儒學訓導舒鏊校, WYG: 差補施行與曾左司事目劄子熹已具前劄復有愚懇并以凂聞事目如後一本軍恭奉聖㫖打造步人弓箭手鐵甲一年以三百日為期兩日一副昨已打造到一百五十副了畢申乞起發繼凖樞密院劄子檢坐元降指揮只令如法樁收竊緣上件鐵甲計用皮鐵匠一萬八千工錢五千二百餘貫匠人多係遠鄉農民追呼搔擾離家失業不無愁歎錢除給降到見錢乳香數外尚欠七百餘貫乳香變賣不行不敢科抑又兑支過闕千一百八十餘貫初謂朝廷别有急切用處今乃但令本處樁收徒使州縣勞民費財以供不急之用已為非䇿又况樁收日久皮線爛斷札片鏽澁不堪使用亦有深可惜者設若遂為歲例則其為害無有窮已尤為不便欲望一言密贊廟堂特賜開陳將已造者各令發赴比近屯駐軍馬去處披帶教閲日夕使用免致朽損仍降指揮向後年分更不打造則州縣民間不勝幸甚或慮缺於武備即乞行下諸軍取㑹累年以來中外製造鐵甲數目不少既是久無征戰不應無故損失須管契勘見收管數目若干便見虚實如有不足亦可令諸州有作院處多募役兵漸次打作庶無闕事一本軍昨來奉行增種二麥指揮逐年所申漸次增廣至淳熈五年三縣共種一千四百餘頃内星子縣最為窄狹已占三百餘頃近據知縣王仲傑申本縣今年所種已是增多然實計之所種不過六千餘畝未敢循習舊例供申虚數熹昨在田里素聞此事皆是官司立定數目行下鄉村妄亂供申公行欺罔遂判其狀行下依實供申及行下兩縣亦不得循習舊弊欺罔朝廷去訖將來申到比之舊數必是大叚虧少若朝廷以此加罪固無可言萬一緣此别行根究竊恐其他州軍官吏有任其咎者在熹私義亦所未安欲乞一言密贊廟堂别作開陳恐日前所申有未實處立限許令陳首改正違限不首然後坐以誣上之罪使知其罪者得以自新實為幸甚然所有增種指揮實無補於足食之功徒有損於責實之政而州縣奉行鄉村應對畫圖供帳亦或不能無擾或降指揮直行寢罷尤為簡靜申南康旱傷乞放租稅及應副軍糧狀伏覩本軍今為久闕雨澤早田旱損已依凖令式具狀奏聞訖照對本軍地荒田瘠税重民貧昨於乾道七年曾遭大旱伏䝉聖恩放免本年夏秋二税錢米紬絹共八萬六千三百二十貫石匹及詔本路監司應副軍糧米四千石撥到糴軍糧米錢九千餘貫并撥本軍未起米一萬一千七百餘石本軍借兑}
