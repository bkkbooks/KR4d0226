  - {type: variant, offset: 20770, length: 1, content: 福, WYG: 欽定四庫全書晦庵集卷二十宋朱子撰申請請徐王二生充學賔申縣劄子契勘縣學教集生徒漸成次第但職事員數既少又皆頗有分職以此不得專意教導竊見本縣進士徐應中留意講學議論純正進士王賔天資朴茂操履堅慤求之輩流未見其比乞從縣司行下本學具禮差人敦請赴學特給厨饌待以賔客之禮不惟使生徒覩其言行得以矜式亦庶幾士民向風有所興勸代同安縣學職事乞立蘓丞相祠堂狀右某等伏覩故觀文殿大學士太子太保致仕贈司空趙郡蘓公道德博聞號稱賢相立朝一節終始不虧自其髙曾世居此縣比因遊宦始寓丹陽今忠義滎陽二坊故宅基地宛然尚在而後生晚學不復講聞前賢風節學問源流是致士風日就彫弊某等今欲乞改滎義坊為丞相坊仍於縣學空閑地架造祠堂一所不惟增修故事永前烈之風聲庶以激厲將來俾後生之竦飭謹具狀申主簿學士伏乞備申縣衙照㑹施行申嚴昏禮狀竊惟禮律之文昏姻為重所以别男女經夫婦正風俗而防禍亂之原也訪聞本縣自舊相承無昏姻之禮里巷之民貧不能聘或至奔誘則謂之引伴為妻習以成風其流及於士子富室亦或為之無復忌憚其弊非特乖違禮典瀆亂國章而已至於妬娼相形稔成禍釁則或以此殺身而不悔習俗昏愚深可悲憫欲乞檢坐見行條法曉諭禁止仍乞備申使}
