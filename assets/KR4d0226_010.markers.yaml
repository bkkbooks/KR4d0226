  - {type: variant, offset: 0, length: 183, content: 晦庵先生朱文公文集卷第十詩樂府謁表伯余宋祐江上雪意滿風吹竹林平先生但堅坐稚子開柴荆趂韻千山木脫但空林天外哀鴻亦呌音認取溪亭今日意四更山月湧波心次晦叔寄弟韻二首聞道君歸湘水東經行長在白雲中詩成天柱峰頭月酒醒朱陵洞裏風舊學難酬香一瓣流年誰管鬢雙蓬書來爲指誵訛處不渉言詮不落空試上閩山望楚天鴈飛欲斷勢還連憑將䄂裏數行字與問雲間雙髻仙我訪舊遊終有日君歸故里定何年秪今千里同心, WYG: ''}
