使司巳關防措置約束事件置埸給暦下縣付人户差官監轄自今年正月爲頭每五日一次賑糶切慮其間尚有人户不能措辦五日錢一頓収糴合續添賑糶暦一本立式行下三縣關報逐場如有人户願日赴場收糴米斛者即仰賫元立暦頭赴廵察官粘連印押付人户逐日収糴其有人户願依前五日一次赴埸収糴者即仰依巳行事件施行仍五日一次開具糶過米穀文帳供申正月八日行下普作賑濟兩日契勘本軍𬋩属旱傷尤甚細民闕食巳行下三縣抄劄到闕食户口人數申軍及勸諭到上户張世亨等四名依格承認賑濟米共一萬九千石及依條取撥常平義倉米自淳熈八年正月以後縁管属寒雪本軍行下属縣将賑糶人户一例賑濟兩日正月八日帖都建昌縣再諭上户借貸米榖事契勘本軍𬋩属去歲旱傷巳行下星子等三縣勸諭上户以所収米穀賑糶除認數外有餘剩米榖并不係勸諭賑糶米穀人家逓年多是春間将米榖等生放下户秋冬隨例収息今来上户以旱傷之故慮恐下户將来負欠不還官司不爲受理仍以官司勸諭爲詞不肯生放使下户用乏失業不便使司今凖淳熈四年十二月𥘉三日指揮節文諸人户賖糶米令欠户還米本外每斗収息五升其生放約秋成計本息還錢亦合一體施行如有施欠不還官爲理索所貴兩無虧損合行下三縣散榜勸諭約束施行正月十九日再委官体訪場所合干人减尅等事契勘本軍𬋩下去歳旱傷巳行下三縣勸諭到上户賑糶米穀使司遂措置差官下縣分場監轄賑糶濟及帖縣官分定地頭廵察去訖切慮各縣逐場監糶濟官容縱合干等人减尅升㪷及容上户将砂土碎截濕惡空殻米穀赴場中糶濟及廵察官不即前去廵察事属不便就委官前去体訪如有似此違戾去處即具狀供申正月廿二日申監司為賑糶場利害事件契勘本軍并𬋩属諸縣去歳旱傷至甚細民闕食切慮人户逃移失業遂多方勸諭上户賑糶米榖并将見管常平米數行下分定置場去處官吏監轄糶濟應接細民食用今有下項利害事件合申諸監司正月廿九日除本軍勸諭上户樁𬋩米數并於外州和糴及常平米糶濟應接𬋩内細民食用外近来續據人户陳訴當来抄劄漏落姓名及隣路州軍流民前来逐食又不免行下𬋩属多方存䘏相度賑濟所費米斛比之元来計度數目大改増添而向去小熟日子尚遠切慮所樁米穀不能周給無可接續糶濟却致民間缺食事属不便乞即撥米二三萬石應副接續糶濟如蒙允許即乞早賜行下取撥去處以慿差撥人舡前去搬取本軍昨凖淳熈七年九月十三日勑中書門下省檢㑹昨凖乾道七年八月一日指揮立定勸諭上户賑糶濟格目給降付身𥙷授名目内無官人一千五百石𥙷進義校尉願𥙷不理選限将仕郎者聽二千石𥙷進武校尉如係進士免文觧一次不係進士候到部與免短使一次四千石𥙷承信郎如係進士與𥙷上州文學五千石𥙷承節郎如係進士補迪功郎如是賑糶依此减半推賞又凖淳熈七年十月八日指揮節文賑糶米於市價减半錢數即照巳降指揮推賞本軍即巳備坐行下𬋩属勸諭只據上户張世亨張邦獻劉師與黄澄四名承認依格賑濟本軍巳行具奏及申諸監司照㑹賑糶一項至今尚未有申到承認應格之人盖縁本軍地瘠民貧除上項四家賑濟之外未有出得上件米榖减半出糶之人是到所認米穀數目不多有闕賑糶欲乞詳酌所申特賜敷奏乞将上户承認賑糶米價止令量减四分之一便與依格推賞却於所得官資比折錢數量展磨勘之類早賜行下勸諭增認庻使上户樂於就賞細民不致闕食今照𬋩属近来不住有外州縣飢民流移入界夲軍巳行下諸縣存䘏及委自當職官勸諭上户収充佃客借與空閑屋宇許令請佃係官田土給與種粮趂春開耕如向去豐熟外州縣稅户前來識認官司不得受理如今来所招佃客将来衷私搬走回郷即許元贍養稅户經所属陳理官爲差人前去追取押回斷罪交還及散榜郷村遍行曉示外欲乞詳酌更申朝省明􅑙指揮行下庶幾州縣有所遵守不惟安集流民免致失所亦使開闢曠土供納稅賦實爲利便二月一日申提舉司借米付人户築陂塘照對𬋩属星子等三縣去歲旱傷尤甚縁田叚多是高仰見𬋩陂塘多是穿漏是致旱死不住據𬋩属星子都昌建昌人户經官陳乞借口粮脩築陂塘本軍行下逐縣委自知縣躬親前去𬋩下逐一驗視所𬋩陂塘如有穿漏及開掘即仰一面計度合用工數供報提舉司乞支撥米斛巳蒙提舉衙回牒指揮支撥保借常平司六百五十四石正月廿九日施行闕食未盡抄劄人等事照對本軍𬋩下三縣諸郷保正當来受情不行依公抄劄闕食人户多将得過隱實之人抄作闕食其實是闕食人户却不抄劄未欲便行追究合行約束仰隅官保正照應本縣廵察官所行事理湏𬋩從實隨門再行審實抄劄闕食人户若保正依前㓕裂不即同隅官抄劄及将元冐濫人盖庇或在郷乞覔人户分文錢物仰隅官具狀陳訴切待追究重作施行有當来不應抄劄隱實有營運物業之家及上户自能贍給地客見執使軍暦頭之人仰隅官保正追收繳納若顔情盖庇不即追納别致人户陳訴或覺察得知必定重作行遣有委是闕食人户隅官保正不爲抄劄或保正等乞覔搔擾仰被擾人户不拘早晚赴本軍陳告切待重作行遣有得過人户妄稱闕食陳乞給暦紊煩官司之人定當追妆赴軍重斷有合追収元給文暦人户輙敢倚恃猾徤訟把持不伏追収仰隅官保正具狀陳訴切待重作行遣仰属縣逐郷隅官保正從實再行審實抄劄到闕食人户切待委官躬親下郷隨門審實如再有不實仍前泛濫去處必定追收犯人赴軍定送獄根勘情弊施行以上二月十八日審實糶濟約束照對巳行帖逐縣審實糶濟事件切慮各郷隅官保正不依所行約束别致引惹詞訴事属不便合帖属縣再行約束開具供申各郷有營運店業興盛之家其元給暦頭合行追取若雖有些小店業買賣㣲細不能贍給巳請暦頭不合追回如有似此未係抄劄之人亦請今隅官保正從實根括施行毋至泛濫各郷上户地客如主家自能贍給其元給暦頭合行追収如主家見自闕食不能贍給雖是地客亦合給暦如有似此之人即請隅官保正從實根括毋致泛濫各郷人户如将户名及第行重賫請去暦頭合行追回如是只用第行雖不用户名實非重疊其巳請暦不合追取人户巳請暦頭如有虚増口數今来覈實合行减退即請於暦頭并緫簿内分明改正縣市一上等有店業日逐買賣營運興盛及自有稅産贍給不合請給暦頭人户若干開具坊巷逐户姓名大小口數一中等得過之家并公人等合赴縣倉糴米人若干開具坊巷逐户姓名大小口數一下等貧乏小經紀人及雖有些小店業買賣不多并極貧秀才合請暦頭人户若干開具坊巷逐户姓名大小口數以上二月十八日施行權免和糴令客米從便往来本軍旱傷遂支撥官錢委官在軍置場和糴客人米斛循環糶糴應接民間食用及本軍勸諭到上户承認糶米斛并差公吏前去収糴到米斛樁𬋩賑糶濟不闕所有元置和糴賑糶場合權行住糴客人米斛及出榜曉示從便上下出糶免糶客米三分照對本軍去歲旱傷細民闕食遂行措置場和糴客旅米斛三分應接食用今来賑糶濟米數不闕巳行住糴合行散榜上流州軍客旅通知旅行許令人户借貸官司米榖充種子佈種照對𬋩下三縣去歲旱傷至重本軍巳行措置賑糶賑濟近来節次據人户經軍陳狀因旱傷目今佈種是時闕少種粮乞行借貸常平米斛佈田軍司巳行下各縣相度依條施行去訖未據申到今檢凖常平免役令諸災傷計一縣板稅七分以上第四等以下户乏種食者雖舊有欠閣不以月分聽結保貸借米榖不堪充種子紐直以錢各二貫石給限半年隨稅納仍免息利豫以應支數保明申提舉司行訖申尚書户部雖計一縣放稅不及七分而本户稅及七分者凖此今来除星子知縣一靣究實相度依條借貸外所有都建昌縣合委官同各縣知佐相度究見𬋩下第四等以下户委實闕乏種食之人各令結保依條施行二月卄七日刋不係賑濟人一例賑濟契勘去歲旱傷細民闕食使軍巳行勸諭到上户承認糶濟米糓及有上户自能贍給佃地客户口外使軍巳印牌暦付闕食人赴場賑糶濟除将見有牌暦合糶濟人户普行賑濟外其上户贍給地佃等日前除豁不係賑糶之人亦行抄劄一例賑濟一十三日自三月十一日爲頭将張世亨等所認米及取撥常平米普行賑濟務要實惠二月三日行下各縣抄劄户口并立支米榖正數契勘所支賑糶米縁三縣各郷間有數户抄劄口數太多恐未盡實合委官與縣官評議豫将所支米穀立定正數賑濟施行二十口以上毎户支榖止於五石二十口以下十五口以上每户支穀止於四石二十五口以下計口計日支給如𬋩榖四石以上所支亦止於四石三月十六日都昌縣搬張劉二家米等事照對都昌縣止勸諭到黃澄一名承認賑濟米五千石凑所𬋩義倉米會計賑濟不周夲軍遂行下建昌縣於張世亨劉師輿賑濟米内取撥四千石付都昌縣賑濟其合用顧舟水脚錢毎石支錢三十五文省并毎石支搬脚錢四十十文足今張劉二家差人搬檐就官請領顧錢並經都昌縣所𬋩常平米錢内支破三月十七日諸縣得米人户依時佈種等事使軍近行下諸縣但係元給牌暦賑糶賑濟民户並以勸諭到張世亨黃澄劉将仕米及義倉米並行賑濟半月仰得米人户併力及時耕種田土如合干人减尅不行盡實給數即仰人户徑赴使軍陳訴切侍根究重作施行二月二十三日行下各場普濟半月外照約束接續照對使軍近将勸諭到上户黃澄張世亨等賑濟米斛自今年三月一日爲頭普行賑濟通作一十五日今来相次了畢所有元勸諭到上户承認賑糴米斛合行依使軍先来約束接續賑糶應接細民食用閏三月三日委官覈實四户賑濟米數縣官保明事照對去歲旱傷細民闕食勸諭到都昌建昌縣上户張世亨等四名共賑濟米一萬九千石本軍遂行措置相度地里逺近分作三十五場委官監轄賑濟及委官廵察近凖尚書省劄子檢㑹淳熈八年正月二十三日敕中書門下省勘㑹兩浙江東西湖北淮西州軍去年間有旱傷去處檢坐乾道七年内立定勸諭富室上户賑濟賑糴米斛賞格巳降指揮行下逐路施行近来逐路州軍雖有開具巳勸諭到賑濟賑糴數目縁無逐司保明是致推賞未得切慮因而滯留未稱勸賞之意正月二十三日三省同奉聖㫖令逐路安撫轉運提學司各行下所部州縣将願出穀賑濟賑糴之家如有見得數目應格合行推賞即日下縣結罪保明申州州結罪保明申逐司仍仰逐司疾速連䘖保明申尚書省不得少有稽滯今有張世亨等所認賑濟米斛巳行普濟𬋩下闕食人户相次了畢未見逐縣知縣結罪保明申軍施行今帖委司法前去建昌都昌縣覈實的確賑濟米穀數目結罪保明供申切待再行稽考施行閏三月三日移文江西通放客米及本軍糴米舡事契勘本軍𬋩属去歲旱傷細民闕食及無軍粮支遣本軍節次借撥官錢五萬三百四十四貫三百七十九文差撥公吏前去江西得熟州軍收糴到米共二萬三千五百二石二斗四升五合回軍賑糴及支遣軍粮并檢凖淳熈令諸米榖遇災傷官司不得禁止搬販及近降指揮州縣不許閉糴如有遏糴州軍許隣州越訴又凖今年八月十九日聖㫖指揮節文江東安撫使陳少保奏今歳災傷先合措置通放米斛州縣遏糴去處許人户經本司越訴遂移文江西轉運司安撫司并奉新縣等通放米舡回軍賑糴支遣軍粮施行節次差公吏収糴并撥錢下賑糴場軍資庫錢共二萬一千三百六十二貫八百九十六文四千貫文省差劉京手分盧文彬𬋩押於去年七月十六日前去隆興府𬋩下常池市収糴到米二千三百一十六石九斗六升於八月二十一日到建昌縣交缷賑糶四千貫文省差衙前楊發手分朱綬於去年七月十八日前去隆興府𬋩下進賢縣収糴到米一千九百二十一石八斗一升并榖一百五十八石五斗至十月𥘉九日回軍城下省倉交量米七百九十石都昌縣交量米八百二十一石三斗一升星子縣交量米二百一十石五斗榖一百五十八石五斗一百七十一貫二百文省揍依折帛錢共四千貫差衙前吕祺手分熊瑜𬋩押於去年七月二十九日𬋩押前去収糴二千貫省差衙前吕祺徃隆興府𬋩下奉新縣収糴到米七百四十九石六斗於三月十一日回軍九千八十二貫一百一十九文省於去年八月二十五日巳後節次支付在賑糴場收糴米係在後項聲說正支錢二千七百一十二貫文轉支収到公吏糴米剩到錢共六千二百七十貫一百一十九文四百八十貫七十七文省係轉支糴米回納錢付楊發収糴其米在後項聲說一千貫文省支付朱彦俊糴米其米在後項聲說一千六百二十九貫五百文省揍折帛錢共四千貫付衙前謝安道職級高宗選𬋩押於去年七月二十九日徃下項去䖏収糴安一千八百二十六石一升五合於十一月𥘉八日回軍隆興府奉新縣糴到米一千一百六十九石五斗六升五合淮南蘄州糴到米六百五十六石四斗五升折帛錢共二萬八千九貫二百一十文省係淳熈五年六年錢一千三百七十貫五百文省係六年分支付謝安道髙宗選収糴米其共糴到米巳在前項聲說三千八百二十八貫八百文省係六年分錢付吕祺熊瑜收糴米其米巳在前項聲說四千八百八十九貫九百一十文省付在軍賑糴場收糴米係在後項聲說五千貫係七年分錢差衙前孫燾職級江彦和𬋩押於十一月二十五日徃隆興府拏湖收糴到米二千二百九十七石一斗六升於今年正月二十三日回軍五千貫文省差職級朱彦俊𬋩柙揍前項共六千貫文省於十一月二十三日徃江西吉州收糴共二千八百五十石於今年三月二十九日回軍差機乳香度牒糯米夲錢共八千八百九十二貫二百七三文省四千貫差衙前王邦翰手分蔣安禮𬋩押於八月十五日徃隆興府𬋩下常湖收糴米一千九百三十二石八斗九升至十一月二十四日回軍四千四百二十九貫二百七十三文省揍作前項錢共四千九百九貫三百五十文省𬋩押於十二月𥘉一日徃隆興府奉新縣収糴二千三百賑濟孤老殘疾不能自存大人二百三十五口小兒一十奏乞推賞賑濟上户照㑹本軍去歲旱傷至重細民闕食及撥到常平米斛數目不多深恐行勸諭到𬋩属上户承認米數賑食用續於去年十月十一日凖行符九月十六日辰時凖淳熈七年敕中書門下省檢凖乾道七年文訪聞湖南以下同十二月廿八日約束止符本軍恭禀行下𬋩属再行勸諭之人如願将来賑濟切待審究今来所降指揮格法推賞去後申數内勸諭到元認賑糴米稅户張世亨劉師輿進士張邦獻黃澄四名各情法賑濟内建昌縣稅户張世亨五千石乞𥙷承節郎進士張邦獻五千石乞𥙷迪功郎稅户劉師輿四千石乞𥙷承信郎并都昌縣待𥙷太學生黃澄五千石乞𥙷迪功郎奏施行本軍遂行下告示張伺候給暦付飢民及差官監轄賑濟巳於去年十二月二十八日先具奏聞及申夲路諸監司照㑹去訖續據𬋩属星子都昌建昌三縣共抄劄闕食飢民二萬九千五百七十八户數内大人一十三萬七千六百七口小兒九萬二百七十六口夲軍各仰給暦頭牌靣置簿暦發送逐縣當職官給散付人户預於縣市及諸郷均定去處共置三十五場分見見任寄居指使添差監押酒稅監廟等大小使臣共三十五員監轄賑糶賑濟及委縣官分場巡察年戢减尅乞覔之弊自淳熈八年正月𥘉一日爲始今抄劄到闕食人户赴場賑糶其鰥寡孤獨之人即以常平米斛依法賑濟至正月内又縁雪寒行下属縣将元係賑糶飢民用上伴張世亨黃澄等及常平義倉米一例賑濟兩日至三月内又慮飢民難得錢収糴米斛再自十一日爲頭行下諸縣将巳給暦賑糶飢民一例普行賑濟一十三日通作半月又照約都昌縣止有黃澄一名承認賑濟五千石湊所𬋩義倉米㑹計賑濟不周本軍遂於建昌縣張世亨等賑濟米内撥未四千石本軍措置官錢和雇夫脚舟舡裝發送都昌縣交𬋩分於置場去處責令監轄賑濟至閏三月十五日終節次據都昌縣建昌縣申到張世亨張邦獻劉師輿黃澄賑濟過米撮等共計一萬九千石星子縣元無勸諭到上户賑濟米斛即以常平義倉米斛依例普行賑濟外本軍節次行下都昌建昌知縣逐旋審究的實賑濟過張世亨黃澄等米數保明申軍去後據迪功郎監城下酒稅權都昌縣事孫僑通直郎知建昌縣事林叔坦状保明到張世亨張邦獻劉師輿黄澄賑濟過米一萬九千石委是節次賑濟飢民食用之数即無冐濫本軍一靣委差從政郎本軍司法參軍陳祖永前去都建昌縣覈實得張世亨張邦獻劉師輿黃澄賑濟米一萬九千石委是賑濟過的實之數本軍再行稽考别無冐濫保明是實本軍勘㑹得張世亨劉師輿各係稅户張邦獻係應舉習詩賦終場士人并黃澄係於淳熈四年秋試應舉習詩賦取中待𥙷太學生第十五名是實其張世亨張邦獻劉師輿黃澄賑濟過米數各應得近降指揮賞格數内稅户張世亨賑濟過米五千石合𥙷承節郎稅户劉師輿賑濟過米四千石合𥙷承信郎進士張邦獻賑濟過米五千石合𥙷迪功郎待𥙷太學生黄澄賑濟過米五千石合𥙷迪功郎除巳具申本路安撫司轉運司提舉司提刑司照會依條保奏推賞外欲望聖慈下所属給降合得付身發下以慿給付張世亨等祗受謹録奏聞晦庵先生朱文公文别集卷之十終候官縣儒學訓導劉簮校晦庵先生朱文公續集卷第十荅李孝述繼善問目燔之姪孝述嘗求夫心之爲物竊見大學或問中論心處每毎言虚言靈或言虚明或言神明孟子盡心注云心人之神明竊以爲此等專指心之本體而言又見孟子舉心之存亡岀入集注以爲心之神明不測竊以爲此兼言心之體用而盡其始終反覆變態之全夫其本體之通靈如此而其變態之神妙又如此則所以爲是物者必不囿於形體而非粗淺血氣之爲竊疑是人之一身神氣所聚所以謂之神舎人而無此則身與偶人相似必有此而後有精神知覺做得箇活物恐心又是身上精靈底物事不知可以如此看否孝述又甞求所以存是心者竊見伊川言人心作主不定如破屋中禦冦又云如一箇翻車每每教學者做箇主或云立箇心又云人心湏要定使他思時方思乃是明道亦云人有四百四病皆不由自家則是心湏教由自家以此似見得心雖是活物神明不測然是自家身上物事所主在我收住後放去放去後又復收囬自家可以自作主宰但患不自做主若自家主張着便在不主張着便走去及才尋求着又在故學者湏自爲之主使此心常有管攝方得又甞求所以爲主之實竊見伊川論如何爲主敬而巳矣又似見得要自做主宰湏是敬蓋敬便收束得來謹宻正是着力做主處不敬便掉放踈散不復做主了孝述於存心功夫又粗見如此不知是否先生批云理固如此然湏用其力不可只做好話說過又當有以培飬之然後積漸純熟向上有進歩處孝述按大學章句云明徳者人之所得乎天而虚靈不昧以具衆理而應萬事者也竊疑人得正且通之氣故心體中虚虚則靈如水之清火之明鑑之光皆是體虚所以透明心亦然濂溪云靜虚則明明則通似亦可見近驗之於心則日用間覺得一事累心便有滯礙更不通快是以竊恐虚故靈心惟虚靈所以方寸之内體無不包用無不通能具衆理而應萬事但以氣禀物欲之私有以昬之而不得全其虚靈之本體故理之在是者遂有所蔽而應事接物亦皆雜以私欲不盡出於義理之正是無以具衆理而應萬事矣學者之學恐只是求去其氣禀物欲之昏以復其虚靈之全體盖心旣虚靈則寂然不動感而遂通於所謂具衆理而應萬事者得矣是以大學之教以明明徳爲主章句或問之言明德必以虚靈爲質其言明德功夫又不過欲全其虚靈之體言存飬則曰聖人設教使人嘿識此心之靈而存之於端莊静一之中言格物致知則曰人心之靈莫不有知而欲其表裏洞然無所不盡言誠意則曰人之本心至虚至靈衆理畢具而欲其應物皆由此心以發而無所雜言正心則曰心之本體湛然虚明而欲其順應事物而無所動言脩身則曰隨事省察之以審其當然之則似亦主虚靈者爲說徹頭徹尾許多功夫皆欲全此心之虚靈以融㑹衆理酬酢萬事而巳以此觀之恐虚靈不昧乃心之所以爲心而聖學之基本也不知是否先生批云同上孝述覺得間甞心存時神氣清爽是時視必明聽必聦言則有倫動則有序有思慮則必專一若身無所事則一身之内如鼻息出入之麄細緩急血脉流行間或凝滯者而有纎微疾癢之處無不分明覺得當時别是一般精神如醉醒寐覺不知可以言心存否先生批云理固如此然亦不可如此屑屑計功效也孝述自覺心放時精神出外更不自知如夣然才知得放時即是心便不放了如知得夣時即是夣覺孔子言我欲仁便是仁至似亦此意故日用間覺得直湏謹操持勤檢點盖操持容有懈時若不測地猛省起來則其懈時之放自不得逺去且不得乆去如此維繫之乆恐此心只得住裏面如欲睡底人湏自家打起精神不可放倒間或精神倦時不覺坐睡又自家擺灑起來不容睡著毎每如此自是睡不得愚見如此不知是否先生批云是是但說太多了孝述謂徤有爲順無爲二者隂陽動静之分仁禮之爲徤義智之爲順竊疑仁之發即有怵惕惻隱之意動於中頑然不動即爲不仁禮之行即有㳟敬辤遜之容著於外故仁恐爲動之始動静恐皆以漸致猶春之生物萌芽甲拆方動而㣲禮恐爲動之極猶夏之長物而長短小大莫不盡見義則所以制仁禮之宜蓋即其中而爲之裁制使隆殺厚薄各適其分似有裁節又収歛之意雖略有所爲其亦嚴且約矣智但分别是非當否略無作爲又所以爲動之本而仁禮之所由發也故義恐爲静之始猶秋之収而去華就實智恐爲静之極猶冬之藏而歸根復命妄意推測如此不知是否先生批云此元亨利貞所以如循環之無端也横渠先生曰虚静者仁之本亦此意孝述又見先生答黄寺丞徤順仁義禮智之問云有分而言之者有合而言之者孝述於分而言者巳隨愚見陳於上矣復以合而言者求之竊意仁義禮智若以用言則有有爲者有無爲者故仁禮爲徤義智爲順若論其所以爲是四者之實則仁是人之不忍之心似有柔順之意禮之品節一定而不可易似有隂静之意二者恐是徤中有順義之裁制方嚴似有剛斷之意智之周流不滯似有陽動之意二者恐是順中有徤於此可見隂陽本不相離之意不知是否先生批云當時之意恐謂分則爲四合則爲二耳然如所說又自是一意即所謂水隂根陽火陽根隂者孝述又謂木火之爲陽動金之爲隂静皆可言若水當爲隂静之極然水流而不息未見所以爲至静處不知當於何處觀之先生批云水寒火熱水下火上其爲動静之分者明矣孝述妄謂五常是五行之徳五行之氣其行於天者固未易見若質之在地者竊疑與徳之在人者無徃而不相配今隨愚陋所見言之五常之未發則本體中存恐如木之在山火之在燧金之在礦水之在地土之未動及其旣發而有惻隱羞惡恭敬是非誠實之情恐如火之出而炎上水之流而潤下及由其情充積成行如仁之爲孝爲弟爲睦爲婣之類恐如木之爲棟梁欀桷火之爲燈燭炬燎金之爲刀斧盤盞水之爲池沼江海土之爲塼瓦墻壁故五常之未發只可謂之五常而不可以萬行名及其發而成行隨在不同則各隨其所成之行名之而不得復以五常名矣恐如五行之未動只可謂之五行而不可以它物名及其動而爲物有萬不同則各隨其所成之物名之而不得復以五行名矣但十其爲五常之性也而萬行之理巳無不包及其爲萬殊之行也而五常之體亦未甞不存恐如五行之方具而萬用之質巳無不全及其爲萬殊之用而五行之體亦未甞不立極而言之則人道周乎四海無非五常之爲如物充乎地上而無非五行之爲凡此雖未知是否似皆說得去但木之曲直金之從革土之稼穡皆待人爲而仁之惻隱義之羞惡信之誠實皆發於性之自然相配不得又土之稼穡與孝述所謂爲瓦塼之類又說不上不知五行之與五常本不可如此牽合耶爲復可以配說而未得其說耶仁之行固有可言若義禮智信之行皆未見其實然可指之目得非四者之行無徃不在而不可一一强名耶區區求之而未得其說先生批云萬物雖不可以五行名然其分各有所屬則亦未離其類也萬行之於五常亦然從革曲直稼穡是其本性之發非人之所能爲也若曰人爲則胡不能使木從革而金曲直乎孝述妄謂仁義禮智之施恐皆自吾身始次親次民次物仁恐始於愛身禮恐始於敬身義恐始於制此身之冝智恐始於明此身之理盖不愛其身則是自絶故必不愛親而亦無以愛親不敬其身則是自賤故必不敬親而亦無以敬親至於義智皆然妄意如此不知是否先生批云身者仁義禮智之主不可書書字疑當作言施由此始以有子孟子之言爲仁之本仁義之實者觀之其當自親始可見矣孝述妄謂仁義禮智合而成行其發也竊疑先智次仁次禮次義且就身言之恐必知此身受形所自而四肢百骸血氣皆相貫属吾所當愛然後有自愛之心知愛之而不忍傷則必敬之而不敢忽愛敬旣生方可裁制其宜以全愛敬之道若獨指心而言亦恐必先知此心至靈至貴爲一身之主然後自愛旣愛之而不肯甘心放棄則必嚴敬自持而惟恐以慢易失之既愛旣敬然後有可得而裁制者盖愛而失宜則或至枯守不用而爲虚無寂㓕或只知飬護而不能痛自克治反非所以爲愛敬而失宜則恐持之太甚而有把捉不定之患反不得其所以爲敬此愛敬各有其冝而必有斷制之者然未愛未敬則恐無所施其裁制之道自暴自棄則又爲復莊敬自重之心不知身心之當愛則恐雖可之而頑然不省豈復有自愛之意區區之愚所以疑是四者之發必有次第而不可棄也若未發之前則四者之體渾然在中不可謂先有此而後有彼但方發之際勢必必相示無雜然並發之理然知識一開則餘三者踵乎其後自有不容巳者是以旣發之後則即其一行之中而四者之實無一不在以其本一理故也若以四時言之則恐智爲冬藏仁爲春生禮爲夏長義爲秋成㱕藏者發生之本發生者長飬之漸而生長又所以爲收成之體也夫四時者五氣之布五氣之生定於其初恐非至此而序生但氣之流布則其序必如是而後可然冬令旣行則三時之斷起亦有不容遏者是以造化旣成之後則即其一物之㣲而五氣之功無一不在以其本一氣故也以此觀之則仁義禮智合而成行其發之先後亦有可言者妄意如此不知是否先生批云此即前循環之說然說得太破碎又不好且静以飬之可也大學或問云以理而言之則萬物一原固無人物貴賤之殊以其氣而言之云云是則所謂明德者也孝述竊疑人物之性有偏全之異者不知是受得本同但做處不同爲復是受得本不同乎按伊川云天所賦爲命物所受爲性恐是受得巳不同盖理之在天本只是一箇渾然全體但人物隨形而受故受得來别人得形氣之正故承當得盡物得形氣之偏故承當不盡偏底物事難爲有全底道理孟子集註論生之謂性處云以理言之則仁義禮智之禀豈物之所得而全似亦此意人之形體受盡得這道理所以亦做得這道理盡物之形體受不盡這道理所以亦只隨其所受做得更就其做處言之人得形氣之正故心虚而體全心之知覺便周流貫徹在處通得去形之運動便千變萬化是般做得去是以於其理之精㣲知亦知得盡做亦做得盡人之所以可爲尭舜可參天地皆爲有此體質儘做得但患不爲或爲之而有不充却無不能之理孟子謂王之不王非不能是不爲與所謂有是四端而自謂不能吾身不能居仁由義恐皆是安於不爲者物得形氣之偏故心塞而體拘心之知覺便拘礙而不能通形之運動便短狹而不能周是以於此理之本體知亦知得淺狹做亦做得淺狹𬒳形氣局定更開不來所以求爲人之所爲不得如慈烏父子螻蟻君臣之類若論父子君臣之道豈止如慈烏螻蟻之爲但此二物所知只止此所能亦止此更去不得了就其所得之分言之如此恐又是人與物做得别處然又有可疑者盖物雖受此理不盡若隨其所受而發則仁義禮智湏皆做得出來然所舉二物又毎物只做得一般道理出不能相兼以通其全如此者恐是物所得之理旣不能盡其全體又爲氣昏隔在裏面發處復不能充其所得之分劑是則容有得爲而未爲者此二物又是昏塞中各有一點明處所以各發得一般道理特特著見於其他道理便全㣲了至其餘物又或不能爾此可見物之氣禀又自有不齊處此等性命之說固不當妄意揣量然湏略識其梗槩方得隨所見寫呈乞賜開示大端使知所向而求之庻乎其略識矣先生批云既是不曽受得自是不能做得更不湏說然横渠先生亦說人有近物之性物有近人之性者又是一理如猫相乳之類温公集中亦說有一猫如此而加異焉此其賦性之近人而或過之但爲形所拘耳亦可悲也又云然於其正且通之中又或不無清濁善惡之異故其所賦之質又有智愚賢不肖之殊孝述竊謂隂陽五行揔其大全而言之則恐同出一本而人物均禀焉所謂人物之生必得是氣然後有以爲百骸九竅五藏之身是也若别其體則恐一氣之中有偏正兩等而爲人物貴賤之分所謂得其正且通者爲人得其偏且塞者爲物是也至極其變則恐偏正之中又自萬殊而爲人品物品之分所謂於其正且通之中又不無清濁羙惡之異故其所賦之質又有智愚賢不肖之殊者是言人品之異也盖體之旣分則固一定而不可易矣然恐是氣之運一息不留所以俄頃之間變爲萬狀彼人物之生各隨其所值以爲體是固不能齊也但用變而體不變故人之所禀雖或至濁至惡而所謂正且通者未嘗不在而其爲濁惡又自是一般與餘氣之濁惡不同以其是正且通之濁惡故其濁惡澄之爲清其惡可易之爲羙旣清旣羙則所謂正且通者即得其本然之正矣鳥獸草木各以類分而每類中又有等色不同然其形聲臭味各不能變其本體則亦與人相似但人能自化物不能自化耳妄意推測如此不知是否先生批云此大槩然矣亦冝并以上章之意推之孝𫐠謂羙惡恐即通書所謂剛柔善惡竊疑清濁以氣言剛柔羙惡以氣之爲質言清濁恐屬天剛柔羙惡恐屬地清濁屬知羙惡屬才清濁分智愚羙惡分賢不肖上智則清之純而無不羙大賢則羙之全而無不清上智恐以清言大賢恐以羙言其實未甞有偏若中庸稱舜知回賢是也下此則所謂智者是得清之多而或不足於羙所謂贒者是得剛柔一偏之善而或不足於清於是始有賢智之偏故其智不得爲上智其賢不得爲大賢雖愚不肖恐亦自有等差盖清濁羙惡似爲氣質中隂陽之分陽清隂濁陽善隂惡故其氣錯揉變而大要不過此四者但分數參互不齊遂有萬殊不知是否先生批云陳了翁云天氣而地質前軰巳有此說矣孝述又疑氣之始有清無濁有羙無惡濁者清之變惡者羙之變以其本清本羙故可易之以反其本然則所謂變化氣質者似亦所以復其初也不知是否先生批云氣之始固無不善然騰倒到今日則其雜也久矣但其運行交錯則其羙惡却各自有㑹處此上智下愚之所以分也又云然而本明之體得之於天終有不可得而昧者云云所以使之即其所飬之中因其所發而啓其明之之端也孝述竊謂覺是人之本心不容泯没故乗間發見之時直是昭著不與物雜於此而自識則本心之體即得其眞矣上蔡謂人湏是識其真心竊恐謂此然此恐亦隨在而有盖此心或昭著於燕間静一之時如孟子言平旦之氣或發見於事物感動之際如孟子言人乍見孺子将入井皆有惊惕惻隱之心或求之文字而怡然有得如伊川先生所謂有讀論了後其中得一兩句喜者或索之講論而恍然有悟如夷子聞孟子極論一本之說遂憮然爲間而受命凡此恐皆是覺處若素未有覺之前但以爲巳有是心而求以存之恐昏隔在此不知實爲何物必至覺時方始識其所以爲心者旣嘗識之則恐不肯甘心以其虚明不昧之體迷溺於卑汙苟賤之中此所以汲汲求明益不能巳而其心路巳開亦自有可進歩處與夫茫然未識趣者大不侔矣故孝述竊疑覺爲小學大學相承之機不知是否先生批云所論甚精但覺似少渾厚之意知止而后有定定而后能静静而后能安安而后能慮慮而后能得孝述謹按章句以物格知至爲知止意誠以下爲得所止又或問以定静安爲知之所以得之故孝述竊疑定静安在物格知至之後意誠以下六事未然之前慮則在意誠以下六事將然之際如此言之則定静安慮在知止得止之間似皆有可實之處不知可否先生批云解中似巳有此意矣孝述又按或問云不有以知其所當止之地則不能有以得其所當止者而止之又云知是知其至善之所在得是得其所止之地而止之孝述竊疑知是知之在彼得是得之在我得則心理俱融理爲我有得恐亦只是知不可便指爲巳止其處但恐知虚而得實才得之則身亦隨之矣妄意如此不知是否先生批云知與得兩事經文可見孝述竊疑旣知之後復有所謂慮而後得者恐知是知之至慮是審之詳夫物格知至則萬理貫通固無不知其至善之所在然恐身有未接則其義理精㣲容有毫釐之未察或所接之際事復異宜故必於此精加審慮然後始無纎㣲滲漏之處此知後必慮然後爲審不知是否先生批云定静安是未有事時􅎍次洒然慮是正與事接處對同勘合也致知在格物孝述竊謂人之本心至虚至靈無所不照但以氣禀物欲有以蔽之是以其明不能不昏欲開其明湏藉事物之實以運其知思然後其明有可通之理蓋心旣有蔽無從下手以開之所以窮究物理者恐是因窮究其所未知而將此心戞刮擦磨治其麄鄙而反覆徃來求出其明是以研窮之深其明必將穿漏而出而物之理亦無所遁矣此其所以能格也伊川先生曰思曰睿思慮乆後睿自然生又曰致思如掘井初有渾水乆後稍引動得清者出來乆自明快其說似皆以爲人心之明旣有所蔽湏即事致思然後其明自出孝述恐所謂致知在格物者亦有此意蓋窮至事物之理即所以推極吾之知識也不知是否先生批云理有未明則見物而不見理理無不盡則見理而不見物不見理故心爲物蔽而知有不極不見物故知無所蔽而心得其全孝述竊疑心具衆理心雖昏蔽而所具之理未甞不在但當其蔽隔之時心自爲心理自爲理不相贅屬如二物未格便覺此一物之理與二不恨入似爲心外之理而吾心邀然無之及旣格之便覺彼物之理爲吾心素有之物夫理在吾心不以未知而無不以旣知而有然則所以若内若外者豈其見之異耶抑亦本無此事而孝述所見之謬耶先生批云極是或問云或考之事爲之著或察之念慮之㣲孝述竊謂事爲是身之所履善行之著處念慮是心之所發善端之萌處於此考察則心亦不遺可以得理之真實然當事爲念慮之時又欲着心考察則是一心二用互有妨礙似難於着力然或問又云人之明德全體大用無時不發見於日用之間人惟不察乎此是以汩於人欲而不知所以自明孟子集註云衆人雖有不忍人之心然物欲害之存焉者寡故不能察識而推之政事之間則又似必着意體察然後有見孝述恐所謂考察是此心常常反求不教外馳心存而不外馳則精神知覺常只照管自家歩歩不離所以事爲之形念慮之起自然黙有所見若此心尋常逐外不自管顧則雖間或真心見前亦不知其所發非是臨時以此心爲之而又以此心察之也若齊王愛牛孟子屢發之使反求其所以然却在旣發之後儘可着力追求意不相妨恐又與當事體察不同以此觀之則此所謂考察旣以當事言則似不可重看孝述愚見如此不知是否先生批云不必如此說只是隨處理會是與不是以爲取舎向背之决耳又云昔聞延平先生之教云云雖其規模之大條理之宻若不逮於程子孝述竊謂規模之大條理之宻恐如序所論經文外有以極其規模之大而内有以盡其節目之詳者規模之大恐自積習旣多然後脫然有貫通處以下四段即是蓋舉其始終全體而言條理之宻恐自物必有理皆所當窮以下六叚與前所謂讀書論人應事數端即是蓋備夫功夫項目而言之先生謂其爲說逺近虚實大小精粗無不兼盡而復分先後緩急恐亦言其條理之宻不知是否先生批云只是如此誠意孝述妄謂人之本心得之於天初無不善所以有不善者恐是人爲逆之也誠以動静驗之静者天動者人是以静則無不善動則常有不善使其如伊川所謂動以天焉則恐仍只是善柰何其不全以天而必雜以人遂流於不善今求其實而言之人心未發無爲思則其本然之體渾然在此人更不曽動着似即南軒所謂天心者是時安得有不善來中庸所謂喜怒哀樂未發謂之中樂記所謂人生而静天之性伊川所謂其本真而静五性具焉又云喜怒哀樂未發何甞不善又云心本善恐皆指此心而言也及其旣發有思有爲即屬之人旣屬之人即是氣質爲之若質純粹則惟其所發無徃不與理俱故本然之性得以順逹而無害若有偏駁則其偏駁之發即與理相違至其知思嗜好感物而生者又多求快血氣之私而不由義理之節故夲具焉又每毎爲所拂害不得沛然順發曩時之善至是遂流於惡矣甚則窮人欲㓕天理曩時之善盡反而純於惡中庸所謂發而皆中節謂之和樂記所謂感物而動性之欲以及夫好惡無節而天理㓕孟子所謂人性之善猶水之就下其可使爲不善猶水可使過顙在山濂溪所謂五性感動而善惡分明道所謂性善猶水之清其繼猶水之流有流至海而終不濁其次有逺近有多少清濁雖不同然非善與惡在性中爲兩物相對各自出來伊川所謂其中動而七情岀情蕩而性鑿又云發而中節則無徃而不善又云發於思慮則有善有不善先生所謂心體本静然亦不能不動其用固本無不善然亦能流而入不善見印行文集恐皆指心之動處言也夫静則善動則有不善是心本善而人每拂之爲不善聖人之所以有教衆人之所以有學恐只爲此濂溪云聖人立教俾人自易其惡自至其中而止伊川云學問之道無他唯知其不善則速改以從善而巳横渠云領惡而全好必由學又云爲學大益在自求變化氣質則所謂教所謂學只是去其惡以全其善耳若其緊切着力處只在此心發動之初盖私欲之根旣埋伏在内不動則巳才動便牽引起來勢之所必然者真心之發其間當有私欲夾雜不能得純一此處雜了前靣便流行不去是以必於此處清本正源使人欲净盡查滓不留則自此以徃天理流行更無梗拂而於其本然者得矣學必以誠意爲要竊恐謂此妄以或問之意如此推測是否先生批云說得太多然却未見誠字之意孝述按孟子言上世有見親暴露者其顙有泚而非爲人泚中心逹於面目又云人乍見孺子將入井皆有怵惕惻隱之心非爲内交要譽惡其聲而然竊以爲此等是惻隱之心發得實處楊震莫夜遺之金而不受上蔡自負記問聞明道玩物䘮志之譏遂汗流浹背面發赤竊以爲此等是羞惡之心發得實處張湛居幽室必整遇妻子若嚴君竊以爲此是恭敬之心發得實處孔子誨子路知之爲知之不知爲不知范氏云是曰是非曰非爲直竊以爲此是是非之心發得實處人心之發毎每如此而無所雜方是意誠若見賢而不能舉舉而不能先見不善而不能退退而不能逺與第五倫兄子嘗病一夜十徃退而安寢子有疾雖不視而竟夕不眠竊以爲此等是意未誠處不知是否先生批云未親切孝述妄謂顔子之樂恐在克復之後巳過此關克盡巳私故日用間是這道理在胷中平鋪地順流將去無分毫私欲爲之梗拂故不待勉强作爲自無徃而不與此理相周旋所以觸處皆樂雖行乎窮途逆境亦只如此曽不改吾樂焉曽晳之志恐是其胷中脫洒略無繫累遐想其動静語黙之節了覆其所陳之志似把這道理做家常茶飯相似日用間只如此平平地順行將去似將使萬事萬物各止其所而吾心蕭然略不用意作爲於其間亦見夫此理所在天然自有觸目皆然自可坦然順適不假作爲故也如孝述自覺是𥘉學不曽窺見一分半分道理便妄自驚喜把來擡劵行時本不自在間只是分付着意似要於道理上加添些做與這氣象天淵不侔若曽晳可謂真知其爲天理但伊川則謂其雖知之而未必實能爲耳􅃮雕開之未能自信恐是正在此處着力過関未得竊疑其雖未盡見是理自然流行之妙而於本然實體固巳識之但恐識認未至真的又自度此心了他未下然亦可見其直要於打闘處下死功夫勝過去不但及此而遂巳也孝述妄意揣料如此不知是否先生批云􅃮雕開恐不止如此孝述近來自覺此心分明如有物蒙蔽在内若以存飬言當其放時固是紛紛擾擾全無是處其知把捉時覺得此心在此不曽從他處去但依舊蕩漾湖塗蒙蒙然要光不能得光及至忽然清明時方是襟懐開爽耳目聦明氣象逈别若以窮格言當其求而不得時固是茫然無入處昏懵之極至反覆尋求以揣約得大意又依舊覺得隔了一重更發不破又至暫時看得發時方識認稍明心地方開若以誠意言則日用間身雖物接而此心頑然不動時是全然昏隔了有隨接便動時亦有徐徐略省而後動時動如在親前有愛心在長上之側有敬心但其愛敬意就間發得些又只據見在休了雖欲勉進自是做得來無意味是時心依舊昬有時忽地感悟動得别時其愛直是真切其敬直是嚴畏非有所强而自不能巳是時心方大明故存飬而至於心地明爽窮理而至於識認分明誠意而至於眞心發見如此者極是少三者之中意誠時尤少每日省來覺得白日在夣明道先生所謂醉生夣死伊川先生所謂未知道者如醉人恐可說此雖知得是夣要教省只是不能得省如此者豈非質昏之甚而難開汚染之深而難滌耶仰惟先覺憐而教之無使終䧟則不勝願幸先生批云但且着實持守不湏如此想象計較作弄恐思慮過當别生病痛孝述又自覺質弱心極易動日用間才有小小得失便過喜過懼此心全體動了雖欲自家做主更做不在以至在喧雜繁擾之地多處置不下甚至於亂大槩覺是氣怯而志復無以帥之不知治此病痛孰爲要切先生批云只此便是病根前說正慮其如此耳孝述曩以先兄在嫡未及有子而没疑於所主蒙賜教云若巳立後則無此疑但復有曲折先兄嘗收一襁褓之子爲嗣旣没孝述以其未勝䘮又别無同居長上遂自主䘮才兩月而此子卒曩時之問正此子巳卒之後孝述遂不曽言及先兄將葬孝述復求從兄之子爲之後亦在襁褓孝述仍前自主祠板之題只從弟稱及領尊教始悟其非猶有不能勝喪之疑聞之伯量亦云甞以此問先生先生答云有攝主又按喪大記云子㓜則以衰抱之人爲之拜是當以所立之子主喪而孝述爲之攝自是即欲俟練祭換栗板時易題所稱復有他慮先兄之後固爲宗子之子今旣收立不知亦謂之嫡孫否若可爲嫡孫則廟祭當使之主又未知襁褓之子即可主祭爲復待其成人或稍長方可若即可主祭則今日祠板之變固合異日遷廟之稱矣如或未可則今日易從子稱異日復易從弟稱有瀆慢之嫌又按喪服小記云婦之喪虞卒哭其夫若子主之祔則舅主之所主不同而各有所冝旣不嫌數更則異日再易祠板所稱恐亦無害又衆議以爲必從㓜子主之理勢方順孝述於換栗板日巳更稱矣不知是否先生批云攝主但主其事名則宗子主之不可易也細考曽子問諸說可見孝述又疑㓜子若即可嗣主宗祀則異時納主恐即據主祀之子祧逺祖矣若未可主祀且從孝述主之則異時所納之主即爲旁親不知旁親當别設位而有祧爲復只祔于祖而無祧先生批云納主旁親之說未曉所謂可更詳之孝述議親十年展轉牽制尚未成畢老母欲令今冬畢親但先兄几筵未徹老母乃齊衰三年之服復有妨礙然主婚却是叔父欲姑從鄕俗就親不知可否若就畢挈歸凡百從殺衣服皆從素淡不知可否先生批云若叔父主婚即可娶婦無嫌禮律皆可考也但母在而叔父主婚恐亦未安可更詳考也孝述謹按禮婿將親迎父醮而命之今孝述父兄俱没上惟母在旁尊有叔父不知徃迎之時當受母命耶爲復受叔父之命耶先生批云當受命於母然母旣有服又似難行記得春秋隱二年公羊傳有母命其諸父兄而諸父兄以命使者之說恐可檢看爲叔父稱母之命以命之否更詳之更以上條并考之孝述又按禮婦盥饋舅姑若舅巳没不知可以叔父受盥饋禮否先生批云叔父無盥饋之文蓋與姑受禮禮相妨也母若有服則亦難行此禮要是本領未正百事俱礙耳晦庵先生朱文公續集卷之十閩縣學訓導何器校, WYG: ''}
