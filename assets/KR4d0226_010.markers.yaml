  - {type: variant, offset: 172, length: 23381, content: 静對簞瓢獨喟然次范碩夫題景福僧開䆫韻昨日土墻當靣立今朝竹牗向陽開此心若道無通塞明暗何縁有去來題謝安石東山圖家山花柳春侍女髻鬟緑出處亦何心晴雲在空谷江月圖江空秋月明夜乆寒露滴扁舟何處歸吟嘯永佳夕呉山高行盡呉山過越山白雲猶是幾重關若㝷汗漫相期處更在孤鴻㓕没間題蕃騎圖傳聞姑欲南侵愁破雄邊老將心却是燕姬能捍虜不教行到殺胡林題尤溪宗室所藏二妃圖瀟湘木落時玉佩秋風起日暮悵何之寂寞寒江水湘夫人夫君行不歸日夕空凝佇目斷九疑岑回頭淚如雨湘君夜獨宿山房夜氣清一䆫凉月共虚明鄰雞未作人聲絶時聽高梧滴露鳴醉作三首七月二十六日夜淅淅西風起嗷嗷寒鴈多稻粱隨處有珍重采薇歌淅淅西風起候蟲寒夜分千山杳沉寂竟夕斷知聞淅淅西風起濺濺石瀨鳴有情從是妄箇裏定無情苦雨用俳諧體仰訴天公雨太多纔方欲住又滂沱九關虎豹還知否爛盡田中白死禾楚詞招䰟云虎豹九關啄害下人些杉木長澗四首我行杉木道弛轡長澗東傷哉半菽子復此巨浸攻沙石半川原阡陌無遺蹤室廬或僅存釡甑乆巳空壓溺餘鰥孤悲號走哀恫􅉠恤豈不勤喪養何能供我非肉食徒自閉一畒宫簞瓢正可樂禹稷安能同朅來一經行歔欷涕無從所慙越尊爼豈憚勞吾躬攀躋倦冡頂永歗回凄風眷焉撫四海失志嗟何窮朝發長澗頭夕宿長澗尾傷哉長澗人禍變乃如此縣官發廪存鰥孤民氣未覺回昭蘇老農向我更揮涕陂壞渠絶田苗枯阡陌縱横不可㝷死傷狼籍正悲吟若知赤子元無罪合有人間父母心題中峰杉徑盤回山腹轉脩蛇横入中峰小隱家好把穉杉縁徑挿待迎凉月看清華山寺逢僧談命此地相逢亦偶然漫將牛斗話生縁時行時止非人力莫問流年秪問天贈書工平生乆要毛錐子歲晚相看兩秃翁却笑孟嘗門下士秪能彈鋏傲西風蘭謾種秋籣四五莖踈簾底事太關情可能不作凉風計護得幽香到晚清讀十二辰詩卷掇其餘作此聊奉一笑夜聞空簞齧飢䑕曉駕羸牛耕廢圃時才虎圏聽豪夸舊業兎園嗟莾鹵君看蟄龍卧三冬頭角不與蛇爭雄毀車殺馬罷馳逐烹羊酤酒聊從容手種猴桃垂架緑養得鵾雞鳴角角客來犬吠催煑茶不用東家買猪肉伏承示及毛公平仲墓銘且索挽詩熹不及識毛公而愛重其文舊矣義不可辭顧巳不及其虞殯姑以數句題於墓銘後幸辱裁訂或轉而致之其家幸甚毛公神仙骨誤落世網中髫齔出竒語砉然驚乃翁弱齡翰墨埸不言巳收功亭亭絶世姿皎皎氷雪容顧歩一長嘯笙鶴翔秋空調高聽者稀老去竟不逢一朝謝塵濁泠然跨剛風回頭呌安期舉手邀韓終千秋有遺想一往無留蹤平生故人心灑涕銘幽宫斯人不可見斯文鬼神通挽鹿伯可郎中二首造辟謀謨逺勤民志慮專中身謝軒冕畢志友林泉出祖傾群彦歸來足二賢誰令行樂地容易鎖寒烟疇昔東州路音書僅一通承顔終未遂仰德竟何窮野哭悲能遽巖居計莫同關心九原路無樹不高風挽陳檢正庸二首厚德高賢躅清名起懦襟承宣幾年最明恕一生心勢屈飛騰晚忠存獻納深忽騎箕尾去陵栢爲誰隂憶昔都門道光華辱宰卿丁寜話鹽筴纎悉見民情一别驚時論三年想頌聲秪今空老淚難使濁河清哭劉嶽卿曽說幽棲地君家近接連要携邀月酒同棹釣溪船遽爾悲聞笛眞成嘆絶絃林猿催老淚爲爾一澘然詩餞陳兄朝章居士永歸本宅授諸挽者蚤歲醇儒業中年居士身功名虚竹帛德義滿鄉鄰一笑藏舟失千秋宰樹新傷心耆舊傳那復有斯人宿石岊舘二首春江日東注我行遡其波揚㠶指西澨兩岸青山多青山自逶迤飛石空嵯峨緑樹生其間幽鳥鳴相和搴篷騁遐眺擊楫成幽歌獨語無與晤兹懐竟如何停驂石岊館觧䌫清江濵中流櫂歌發天風水生鱗名都固多才我來友其仁茲焉同舟濟詎止胡越親舞雩諒非逺春服亦巳成相期豈今夕歲晚無緇磷水口行舟二首昨夜扁舟雨一簑滿江風浪夜如何今朝試捲孤篷看依舊青山緑樹多鬱鬱層巒夾岸青春山緑水去無聲煙波一棹知何許鶗鴂兩山相對鳴詠巖桂二首亭亭巖下桂歲晚獨芬芳葉密千層綠花開萬點黄天香生淨想雲影護仙粧誰識王孫意空吟招隱章露浥黄金蘂風生碧玉枝千林向揺落此樹獨華滋木末難同調籬邊不並時攀援香滿袖歎息共心期次韻芮察院送寳文赴浙漕二首逺俗何勞問威名舊巳孚百城方仰澤一節遽還都聖主勤脩政今年决破胡期公寧餽輓注想在謀謨考卜川清曠端居柰樂何風雲一以便歲月不勝多節傳無淹駕林園得屢過功名從迫逐志業豈蹉跎挽梁文靖公二首擢第初龍首登庸再鳯池心期詎温飽身任必安危幾歲調娯政今年殄瘁詩㳟惟衮斂意不盡鑒亡悲䟽寵無前比騰章又夙心極知求士切端爲愛君深鹵簿寒笳逺塵埃斷藁侵空令殺公掾衰涕滿寒襟挽周侍郎二首德量推容物才猷足濟時隂功覃逺徼餘筭飽雄師行李淹星歲還鄉感羽儀一朝成殄瘁九牧共傷悲憶昔趨丹闕看公上玉除民飢深獻納主聖極欷歔觧手寒江闊驚心夜壑虚朅來空老淚無地别輀車頃年熹以浙東荒政入奏適公還自荆鄂先一日引對具奏沿道所見飢民狼狽之狀上感其言賑恤加厚然熹渡江不旬日即聞公訃今者㑹葬又以傎伺失期追送不及故云挽董安人二首雅望推前輩承家賴女師閨門傳懿範湯沭盛恩私萬里驂鸞去千秋宰樹悲自應銘婦德誰與篆豐碑令尹古循吏郡君今勝流平生餘事業晚歲極熏脩繐帳眞成夣靈辰竟不留遺風𬒳簫挽未覺九泉幽題霜傑集先生人物魏晋間題詩便欲傾天慳向來無地識眉宇今日天遣窺波瀾平生尚友陶彭澤未肯輕爲折腰客胸中合處不作難霜下風姿自竒特小儒閱閥金匱書不滯周南滯海隅枌榆連隂一見晚何當挽袖凌空虚謝呉公濟菖蒲翠羽紛披一尺長帶煙和雨過書堂知君别有臞仙種容易難教出洞房易二首立卦生爻事有因兩儀四象巳前陳須知三絶韋編者不是尋行數墨人潜心雖出重爻後著眼何妨未畫前識得兩儀根太極此時方好絶韋編客來二首客來何處覔紅雲唯見風前萬點春心賞未妨隨處好緑楊隂裏換綸巾悵望君家嶺上雲便携佳友去尋春論詩劇飮無他意未管殘紅落佩巾題沈公雅卜居圖往者仲長子高情世無儔一朝謝塵躅卜築娯清幽茆屋八九間下有良田疇後簷果垂實前庭樹相樛勝日賔友來琴觴共舒憂言論覈幽妙理亂窮端由至今一卷書凛然昭千秋沈侯經濟業夙尚本林丘談笑出幻境寤言躡斯遊仰睇白石崗俯濯青瑶流曠然宇宙外邈矣將焉求武林春風不放桃花笑隂雨能生客子愁只我無心可愁得西湖風月弄扁舟桐廬舟中見山寺一山雲水擁禪居萬里江樓遶屋除行色怱怱吾正爾春風處處子何如江湖此去隨漚鳥粥飯何時共木魚孤塔向人如有意他年來借一􅕋蒢伏讀尤羙軒詩卷謹賦一篇寄呈伯時季路二兄我聞洞巖幽結友事臨眺浮言妨勝踐悵望空永嘯歸來眩竒語更欲窮􅌄窱却㝷兩翁意宴坐得觀照鳴泉俯淙爭穹石仰蒼峭共與前創古三歎遺墨妙神遊恍不隔仁宅忻有要回首鹿門期寒雲生逺嶠熹自林泉紹德寒巖之行而同行有不欲者遂巳詩卷之首即東萊舍人吕公上饒尚書汪公軒蓋玉水工部喻公所書熹次延之年兄韻敬題紹德菴眞如軒寫呈伯時季路二兄先生可是愛吾廬來往鄰菴幾閏餘栢下竟開千歲室竹間猶挿萬籖書悲凉共識臨風處遊戲誰知落筆𥘉寄語山靈勤守護莫將題柱比相如益公道人相見信安道温陵舊遊出示近詩因次其韻別來幾度見歸鴻歲月悠悠一夣中莫道相望湖海闊爭知千里不同風一身千里伴征鴻北去南來羈旅中珍重故人相認得新詩重舉舊家風次益老韻乾坤極處無今古道術多岐自短長儻有新思還告我不應無鴈到衡陽秋日一雨生凉杜若洲月波㣲漾緑溪流茅簷歸去無塵土淡薄閑花遶舎秋放船二首浩蕩清江水依㣲緑樹風觧維春雨外弭櫂夕陽中江草生新徑巖花點舊叢詩翁不愁思逸興莾何窮疇昔清溪峽船頭戲彩翰十年空往事一夣記前灘陡絶垂蒼壁澄虚列翠巒今宵詩卷裏重得縱遐觀往年泛舟此峽有水鳥數十翔集舟前舟至輙起若相導十餘里乃散水調歌頭富貴有餘樂貧賤不堪憂誰知天路幽險倚伏互相酬請看東門黄犬更聽華亭清唳千古恨難收何似鴟夷子散髪弄扁舟鴟夷子成覇業有餘謀収身千乗卿相歸把釣魚鈎春晝五湖烟浪秋夜一天雲月此外儘悠悠永棄人間事吾道付滄洲次袁機仲韻長記與君別丹鳯九重城歸來故里愁思帳望渺難平今夕不知何夕得共寒潭烟艇一笑俯空明有酒徑須醉無事莫關情尋梅去踈竹外一枝横與君吟弄風月端不負平生何處車塵不到有箇江天如許爭肯換浮名只恐買山隱却要煉丹成滿江紅劉知郡生朝秀野詩翁念故山十年乖隔聊命駕朱門舊隱緑槐新陌好雨初晴仍半暖金缸玉斚開瑶席更流傳麗藻借江天留春色過里社將兒姪談往事悲陳迹喜尊前見在鏡中如昔两鬢全欺煙樹緑方瞳好暎寒潭碧但一年一度一歸來歡何極回文晚紅飛盡春寒淺淺寒春盡飛紅晚尊酒緑隂繁繁隂緑酒尊老仙詩句好好句詩仙老長恨送年芳芳年送恨長次圭父回文韻暮江寒碧縈長路路長縈碧寒江暮花塢夕陽斜斜陽夕塢花客愁無勝集集勝無愁客醒似醉多情情多醉似醒用傅安道和朱希眞梅詞韻臨風一笑問羣芳誰是眞香純白獨立無朋筭只有姑射山頭仙客絶艶誰憐眞心自保邈與塵緣隔天然殊勝不關風露冰雪應笑俗李麤桃無言翻引得狂蜂輕蝶爭似黄昏閑弄影清淺一溪霜月畫角吹殘瑶臺夣斷直下成休歇緑隂青子莫教容易披折和西江月睡處林風瑟瑟覺來山月團團身心無累乆輕安况有清凉池館句穩翻嫌白俗情高却笑郊寒蘭膏元自少陵殘好處金章不換又堂下水浮新緑門前樹長交枝晚凉快寫一篇詩不說人間憂喜身老心閑益壯形臞道勝還肥軟輪加璧未應遲莫道前非今是江檻詞暮雨朝雲不自憐放教春漲緑浮天秪今畫閣臨無地宿昔新詩滿繫船青鳥外白鷗前幾生香火舊因縁酒䦨山月移雕檻歌罷江風拂玳筵又巳分江湖寄此生長蓑短笠任隂晴鳴橈細雨滄洲逺繫舸斜陽畫閣明竒絶處未忘情幾時還得去尋盟江妃定許捐雙佩漁父何勞笑獨醒浣溪沙次秀野酴醾韻壓架年來雪作堆珍藂也是近移栽肯令容易放春回却恐隂晴無定度從教紅白一時開多情蜂蝶早飛來好事近春色欲來時先散滿天風雪坐使七閩松竹變珠幢玉節中原佳氣鬱葱葱河山壯宫闕丞相功成千載映黄流清澈櫽括杜牧之齊山詩作水調歌頭江水浸雲影鴻鴈欲南飛携壺結客何處空翠眇烟霏塵世難逢一笑况有紫茰黄菊堪挿滿頭歸風景今朝是身世昔人非酬佳節須酩酊莫相違人生如寄何事辛苦怨斜暉無盡今來古往多少春花秋月那更有危機與問牛山客何必獨沾衣南歌子次張安國韻落日照樓船穩過澄江一片天珍重使君留客意依然風月從今别一川離緒悄危絃永夜清霜透幕氊明日回頭江樹逺懐賢目斷晴空鴈字連叔懷嘗夣飛仙爲之賦此歸日以呈茂獻侍郎當發一笑脫却儒冠著羽衣青山緑水浩然歸看成鼎内眞龍虎管甚人間閑是非生羽翼上烟霏回頭秪見冡纍纍未尋跨鳯吹簫侣且伴孤雲獨鶴飛水調歌頭聮句問訊羅漢雪月两相映水石