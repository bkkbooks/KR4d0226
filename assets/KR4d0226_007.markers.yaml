  - {type: variant, offset: 9196, length: 3516, content: 集但有秋字韻不載此鷗字韻馮夲有之或云先生命門人所作而後不用或又云得兩韻而集軼之以下見南康集匡廬霜天後不見雲氣浮木葉紅巳踈山顔轉清幽向聞有絶壑乃在卧龍湫及此遂一徃幸無煙景愁隮攀欲其深泉石固所求况有百尺崖噴雪飛寒流幽岑自回抱直下鳴青璆便可洗我耳枕石忘所憂精神共虗廓方物皆悠悠所恨非獨徃不能恣夷猶仰歎雲間鶴俯羡谷中鷗先生先我來結屋陽岡頭虚名付忠武㓕迹慕巢由是間頗足居不田亦平疇野人種椒橘崖蜜易歲收西源有老翁卷舌藏戈矛似學辟世士乃欲邀聖丘先生且無然但作一月留俟我有决計它時卜從游次周師温遊書堂韻兼簡坐上諸同志疇昔因來行水餘依依唯認昔人居新堂巳幸經重構舊事難追更特書所願絃歌聞十室休誇文字賦三都同來况有濓溪裔心印相傳儘未踈西源居士斸寄秋蘭小詩爲謝知有幽芳近水開故攀危磴斸蒼苔却憐病客空齋冷帶雨和煙逺寄來記至樂齋記以下見大同集盤谷傳公客於泉州城東之佛寺間即其寓舎之西偏治一室逹其南北以爲軒䆫極爽塏左右圖史自六經而下百家諸子史氏之記籍與夫騷人墨客之文章外至浮屠老子之書荒虚譎詭詼諧小說種植方藥卜相博弈之數皆以列置無外求者公於是日俯仰盤礡於其間繙羣書而誦之蚤夜不厭人盖莫窺其所用心而公自以爲天下之樂無易此者故嘗取歐陽子之詩以名其室曰至樂之齋而顧謂某曰爲我記之某辭謝不敏不􅈺於文字且不敢爲庸人誦說而况敢爲是耶旣公命之不置某不得終辭乃承命而退推公意所以然者而書之曰人之所以神明其德應物而不窮者心而巳古之君子自其始學則盡力於洒掃應對進退之間而内事其心旣乆且熟矣則心平而氣和冲融暢適與物無際其觀於一世事物之變盖無往而非吾樂也而况載籍所傳上超羲農下至于兹其間聖賢之行事問學之源奥是非得失理亂存亡廢興之故包括籠絡靡不畢具苟渉其辭義而心必契焉則其可樂而玩也豈不亦至矣哉惟世之學者或不足以知此而勞於記誦佔畢之間以爲事是以語之至者旣扞格而不入於心惟其粗厲而不平者感而入焉則其間勃然而闘而怒矣亦何樂之云哉某惟歐陽子之詩與公之所以取焉者盖其指畧如此因序次以爲公齋記云紹興二十六年閏月癸卯新安朱某記恕齋記温陵陳君養正讀書之堂同郡吕君少衛榜之曰恕齋而陳君有謁於予曰願有記也予故以是往而觀焉則其垣屋位置與夫几案圖書花藥之列無不合其宜得其所盖飾不過侈而簡不至陋起居便適而視聽無邪真若幽人逸士之居者雖予亦樂之将爲之記而問其作興端原則曰此吾居第之東榮也凡兹棟宇皆亡所改於其舊惟鑿牎牖以候明晦焉而爲是室也此亦何所可記顧吾之所以望於夫子者願聞恕之說而盡心焉耳予聞之􅋏然曰子之志則善矣而非予所敢當也予不佞少從先生長者㳺嘗竊聞夫恕之說以爲不過推巳之心以及人而己勉而行之又以爲無難也然克巳之功未加而蔽於有我之私勝則非此未嘗不病焉而何敢易言之以重得罪於聖人之門也用此辭謝不敢有者幾累月陳君請之不置而吕君亦以爲言予不得以終辭也則歴誦前語而謂之曰以是爲記足以不沒乎爲齋之實而亦可見強恕之難矣惟吕君幸以爲不悖於所以名之意則庻乎其施也二君皆曰善遂書寘齋屋壁間以視陳君且自警也紹興二十七年十二月五日新安朱某記祝文郷飲舎菜二先師祝文見大同集敢昭告于先師兖國公先師鄒國公朝廷舉遺興禮使郡縣三歲一行郷飲酒之禮以迪其士子俾莫不精白以祗承明詔某爲縣長吏敢不以時奉行即事之𥘉以禮舍菜于先聖至聖文宣王以公等配赦後祭祝文見南康集乃季秋辛未天子有事于合宫樂備禮成攽祭澤于宇内凡諸祀壇宇之有功於民者悉詔有司㓗嚴報享惟王聖德神功頼及萬世至今天下生人有一日之安者皆王之德也邦有彞典敢或不䖍仰惟明靈尚其昭鑒祭文祭芸谷文先生之曽孫沂藏録藁維乾道五年歲次巳丑三月丁巳朔十有四日庚午迪功郎差充樞宻院編修官朱某敢以香茶酒果之奠託友人林用中致祭于亡友林君師魯之靈惟昔先君與芸齋先生遊而吾師魯又不鄙某愚嘗不逺數百里過我潭溪之上盖将從容講學以共進於斯道也顧以姻䘮欲留不可自是一别遂訣終天嗚呼痛哉志長命短如師魯之才之敏乃不克究其業而止於斯吾徒二三子失良友之助能不隕涕相吊而况高堂垂白又何以堪此愁苦耶某形疲道逺不能往哭香茗之奠以累同志遵承先志收拾遺文并以嘱之庻可無憾嗟嗟師魯尚克鑒此而享之耶嗚呼哀哉祭文先生之孫濬家藏維淳熈三年歲次丙申九月癸卯朔十六日戊午宣教郎朱某敢以酒肴之奠告于太夫人氏靈筵曰我昔貧病掩關自休有來自東而辱與遊旣往旣来十年頓乆義篤情親謂我昆友我相其流以必其源曰是世德抑母之賢惟母之賢聘名族嫓德清門慈祥雍睦成其二子學古行脩左右致孝色思其柔顧我者誰曰寔其季適騫以翔遽以憂躓我聞其憂驚歎失聲孰勤斯誨弗俾其榮往吊不能且悲且愧千里緘辭相此一酹嗚呼哀哉題䟦芸齋遺文䟦先生之曽孫沂藏録藁先君子志尚高㓗不妄與人交盖嘗避地福之古田得芸齋先生林公而與之遊愛其學識行誼有以過人而惜其且将湮沒無聞於世也及仕於朝爲之延譽甚力然竟不及試用識者恨之某自㓜侍立先君子之側則巳聞先生爲人之大畧近乃得其臨終手笔數十百言戒其家治䘮無用浮屠法者讀之然後知先生所學之純所養之固見於死生之際者又如此冝乎先君子之所甚厚而不忘也三復至言惟念先志追慕哽絶不知所言旣而先生之子魯山不逺數百里過某於潭溪之上道語舊故泫然乆之因謂某曰先人絶笔之書将刻諸石以傳學者子爲我識之某惟先生於此特示人以變俗由禮之大端耳若夫反躬格物以明先王制作之本使其情文義數粲然大備盡祛千載習俗之陋而壹反之於正豈不猶有望於後人哉師魯篤志好學其果能進此以成先生之志則豈惟某與一二友朋之願抑先君子實寵嘉之因敬書以附其後云乾道戊子四月丁酉新安朱某敬書書李巽伯所䟦石鼓文後先生之曽孫濬家藏唐貞觀中吏部侍郎蘇朂著論歧陽獵鼓引歐陽虞禇並稱墨妙爲據三君體法爲世楷式賞好爲物軒輊在當時巳爾今其故蹟僅存隋珠和壁不足喻其珍也予避地來南一日料檢行庋得歧鼓及孔廟醴泉化度孟師丹州諸碑流徙之餘偶無散落爲之驚喜過望書其事以示子孫建炎巳酉夾鍾五日雒人李處權巽伯余年十八九時邂逅李卿於衢守張紫㣲坐上二公皆一時名勝揮塵論文意象超逸令人傾竦今觀此卷恍然若将復見其人而追數歲月忽巳四十寒暑矣不惟前輩零落殆盡而及見之者亦無幾人可爲大息淳熈戊申五月旣望朱某仲晦父書䟦訛傳龜山列子解後先生之曽孫主簿家藏龜山之見二先生在元豐之初此書作於其前固不足怪䟦語則出扵其後而有非所宜言者矣豈其後人有惜是書而不忍棄者託爲是語以重之歟噫是書則傳而其爲龜山之累也甚矣向見沈公雅說有此書初不敢信淳熈巳酉夏将樂鄧綯爲寫寄來因得記其所疑於後且細讀䟦語中用字下語多不中律令與龜山他文不類其僞妄不疑但不知何人所作耳七月三日某書䟦郭忠恕說文字源仙逰洪震夫家藏楊文公蘇文忠公皆言郭恕先尸解而逝今觀此卷非斯人之仙而誰仙耶淳熈癸卯晦翁題折桂院行記以下見南康集始予至折桂院之西軒愛其江山之勝道人雲公爲予言此未足觀少上當益竒因道予行深竹中竹盡得大阜背負五老靣直江湖東西數百里雲山煙水渺莽縈帶勝絶不可名狀乃規作亭其處取李翰林廬山謡中語命以爲黄雲觀㑹雲公去不果爲今年春乃克爲之未訖工而余代去閏月晦日與清江劉子澄長樂林擇之開封趙子明温陵許景陽建安王春卿長樂余占之陳彦忠臨淮張致逺長樂黄直卿俱來因記其事雲公諸王孫棄官學浮圖法令客大洪山云淳熈八年辛丑歲朱某仲晦父題題星子縣尉𪠘射亭淳熈巳亥季秋廿日新安朱某仲晦父奉同高川蘇史君莆陽詹别駕零陵陳推官㑹稽方丞公旴江史版掾永新潘丞公善化陳明府南康卜隱君邯鄲叚議郎同寮楊子羙元範王之才董恭父奠故屯田劉公墓退飮尉𪠘射亭盡醉書此以志題落星寺朱公永仲晦蔡季通汪清卿程正思鄧邦老陳彦忠萬正淳俞季清來朱氏子在侍淳熈庚子三月丁卯題落星寺張于湖題字後朱某奉處士叔父同王南卿俞子夀呉害卿李秉文陳勝私趙南紀及表姪俞㓗巳甥魏愉季子在俱來觀故張紫薇安國題字爲之太息淳熈庚子十月十三日也題㝷真觀新安朱某仲晦永嘉薛洪持志永嘉張揚卿清叟縉雲王仲傑之才㑹稽陳祖永慶長臨江劉清之子澄長樂林用中擇之樂陽趙希漢南紀冝春彭樓子應冝春彭鳯子儀温陵許子春景陽廬陵郭植廷植長樂余隅占之臨淮張彦先致逺淳熈辛丑後三月丙戊至此莆田傳公弼夣良長樂陳士直彦忠先歸題石乳寺淳熈庚子重五日晦翁與程正思陳彦忠俞季清來翁子在甥魏愉從題捿賢磨崖新安朱某奉陪高川蘇史君閬中錢别駕簽書楊子羙博士楊元範星子王之才武寧楊子直邯鄲叚仲衡濂溪周師温因遊卧龍遂至玉淵三峽門人丁克王翰甥魏愉㓜子在從淳熈巳亥四月上休日題疊石菴晦翁與程正思丁復之黄直卿俱來覽觀江山之勝樂忘歸時淳熈巳亥重午日翁子在甥魏愉侍行題折桂院晦翁通叟送張襄陽至此痛飲而别䟦所刻和靖帖右和靖先生帖得之祈君之子真卿淳熈庚子夏五月丙戌刻之白鹿洞書院新安朱某記䟦所刻包孝肅詩此包孝肅公布衣時語蔡廷彦得之呉唐卿以語晦翁翁敬書之俾刻于白鹿洞䟦王太𥘉所題後十年朱仲晦甫賞識此詞後之人當勿毁也書武侯草廬語遺張以道張以道将之荆襄冩以送之慶元巳未十一月十九日晦翁題所書古栢行右社子羙古栢行朱仲晦爲王之才, WYG: ''}
