  - {type: variant, offset: 12751, length: 4184, content: 厚銖罪戾之蹤不容掩覆竟䝉臺劾禠職罷祠昨日巳𬒳省劄而季通遂有舂陵之行巳入府聽命矣示喻縷縷極感勤念然此何足置意中耶季通只是編置無他刑名正縁有司欲秘其事却致傳聞張皇前日就道臨老逺謫殊可念耳告訐之門旣啓世間羣小無非敵國便能因樹爲屋自同傭人亦巳晚矣况不能耶死生禍福正當付之造物耳所說賑貸事想巳䝉留念矣今日復有數人來云是六十二都人戸不知與昨日狀子是同都否不免并煩契勘令社首保正等人結保具狀來請恐亦只有三百來石勢亦不能廣及也社首軰或自呼喚不得今一書至伯起託其喚集幸爲付此軰自持去又恐去建陽逺俟見人数即報彼縣般載來黄亭東岸等候人來請貸也老兄閑中無事不合相擾然想閔此疲民不憚少勞也答丘子服膺昨晚又承簡爲慰謝字初不曉將謂有何異事豕亥之訛乃爾可笑也唐人詩云昨夜秋風還入戸豋山臨水興如何閑咏此句甚覺塊處之憒憒而力未能出奈何奈何詩譜巳得之未耶御書閣巳裝了龕子恐官司未暇及意欲自岀薄少而率諸明舊共爲之似亦不妨巳畧說與通理所欲議定喻及仍令匠氏畫圖來看也老子荷留念載營魄之義說者皆失本意前日因此偶思揚子說月未望則載魄于西與此字義頗相似檢看諸家亦無一人說得是甞草定數語以辯之未暇録去俟到此日可看也對禹問以私意窺聖人﨑嶇反仄不成說話而反譏孟子爲求其說而不得者其言之失非獨如來喻所指也前晚聞舂陵信不佳昨日亟走後山渠家亦不得的信但所傳甚子細恐必不妄志業精深今豈復有此朋友爲之悼歎不但爲平生交好之情而巳也示喻有科舉之累愚意非科舉之累人人自累耳所示論昨在寳幢曽聞此說渠巳甞輙語其非試更思之得失有命似不必太徇時好也前書問責沈時正擾擾不及報不知平父曽寄去否此中無本沈是葉公之姓向來敬夫在桂林刻本跋語中解此字義舊有本亦巳盡矣周子通書近時到處有本此本頃自刋定比它本爲完可試讀之此近世道學之源也而其言簡質若此與世之指天畫地喝風罵雨者氣象不侔矣更有二先生集本皆爲人乞去俟他時别寄也與劉平父承示及行在諸書巳領今納胡丈書及陳賀二公祭狀葉樞與沈倉書共甫與黄守劄子去平父至彼可與伯脩昆仲熟議居止處如有意東來即遣人持沈黃二緘授元履令見二公靣道曲折蓋共甫書中之說如此但前此某甞妄發卜居之議未有定論旣而聞居㤗寧之意甚决且謂勸居建陽者皆挾黨徇私其說乖悖不知誰主倡此說真賊伯脩昆仲者也夫范丈素志不欲居㤗寧見於書札者非一况啓手足之際又有道學失傳之歎不屬意可知矣今纊息未定而異議紛然不顧義理之所安妄言同異雖其意謂范丈爲不復有知其如義理有出於人心之所同然者不可幽明而殊觀也胡丈之㫖不約而同幸持以示脩崇老僕之言今可思未二公賻金尚在胡丈許某不曉求田事諸公巳屬元履矣當於建陽近墓買田則建陽不憂食不足斷然可居無疑况近三世之墳墓而范丈之門人子弟布滿左右伯脩兄弟動息必聞小有過失必有交謁而更諌之者其於范氏門戸乆長之計豈不優於入泰寧范丈所不欲居之地去墳墓背朋友而自肆其心乎然則伯脩兄弟今日之計不患於食之不足而患乎身之不脩爲前人羞辱而巳平父至彼便冝論此某月末至麻沙或扶曵一至邵武不可知然此議之責今在平父向者某巳不復有意啓口偶因胡丈之言復發其狂琴志巳領看畢即納上亦方是五七十年來文字非古書也小報却納還言者聽者皆不易得但欠一行字耳草澤中却有此等人使人益深素餐之愧也二南說未編次可及今爲之他日相聚裁之也論語向看四篇似未浹熟可兼新舊看爲佳去歳所治大抵未熟者今悉温㝷之爲善向數奉語可録出所作工夫次第作一𥿄時復省詧了與末了分數此最善可便爲之蓋雖相聚一年所進業殊少所當爲而未爲者殊多今又疾病如此羸頓勢未能出與兄相聚相聚亦思索講究未得恐負太碩人與共甫兄相責望之意特復奉白惟思之無事勿出入蓋共甫兄不在宅中别無子弟門戸深闊事有不可勝虞者不惟惰遊廢業爲不可且賔客至者談說戯笑度無益於身事家事者少酬酢之則彼自不來矣切祝且温習勿廢使有常業而此心不放則異日復相聚亦易收拾試思自去冬以來巳過之日多少其間用心處放蕩㡬何存在㡬何則亦可以自警矣病倦不勝思慮答王樞使便中忽拜手札之賜伏讀感慰不可具言蒙喻干越之故悼歎閔惻見於詞㫖前此亦聞首爲力伸歸葬之請固巳深歎服風詣之髙足厲頽俗矣及此重太息也浮議汹汹至今未息嘯儔命侣日以益衆不知更欲何所爲者清源旣不免而信安巳擯去近見所上纂述之書卒章頗有苦口之言亦不易也當今舊弼宿望中外所倚以開上心正國論者惟明公與益公而巳竊計所以處此當有定論也此間親舊有自干越會葬而歸者亦得其長子書聞其動息頗詳然亦無可言者但令人隕涕而巳如某賤迹固不足言而終歳力辭僅免近職初意自此可以少安而後咎餘責侵陵未巳亦未知終安所稅駕也舊有足疾歳湏一發旬月以來正此爲苦加以目肓日甚重聽有加終日憒憒如土偶人巳無復有生意矣彼何見疑之過耶湘西扁牓饒宰寄示得以仰觀非惟徤筆縱横勢若飛動而心畫之正結體之全足使觀者魄動神竦甚大惠也某前此妄意偶及於此而不敢容易以請輙因饒宰言之不謂便蒙開可遂得彈壓江山垂示永乆湘中學者一何幸耶趙機冝得趍幕下書來極感知遇之意醴陵亦說甚荷容詧以見門下愛惜人材隨能器使之妙固無一物之遺也字恐誤自邇以來衰病沈綿日就羸頓此凋隕澌盡之常無足爲門下言者今因鄕人李正通朝散祗役部下復此附禀其人明敏有才緩急之際可備繁使之末聞亦甞得出入門墻竊計不待區區之言乆巳有以處之矣又蒙不鄙俯垂訪逮此見髙明之度不以爵位之崇名譽之顯才業之偉氣節之髙自謂絶人而謙虚下問至於如此甚盛甚盛顧某至愚本無知識加以疾病之餘思慮昏塞其何以辱嘉命然竊以謂知院參政平日尊主芘民之心其素所蓄積者固有定論蓋不特士大夫知之而兒童走卒亦皆知之矣今日得其位而施之其先後緩急固宜自有次第但能益以天下之重自任而勉焉以固其志則天下受賜巳不貲矣至於主張公論扶植善人抉去隂邪不使得乗間隙則願髙明於此益加意焉實天下幸甚幸甚老生常談迂闊無取僣易塵瀆伏深愧懼與方伯謨閑中不能無爲而所讀書又不能隨衆備禮看過日間趕趂程限甚覺辛苦偶記楊敬仲答人書云㳟惟某官讀聖人書旣飽而嬉甚可笑然亦多着題也答俞夀翁興國盗鑄曲折不知如何近聞淮上以此頗洶洶朝廷深以爲憂遂以其事屬之葉正則不知今果如何也所示周禮復古之書其間數處向亦深以爲疑今得如此區别極爲明白但素讀此書不熟未有以見其必然聞陳君舉講究頗詳不知曽與之啇量否欲破千古之疑正當不憚子細討論必使無復纎毫間隙乃爲佳耳某衰晚不天長子夭折忽巳踰年念之痛割無復生意以卜地未定尚未克葬初𬒳湖南之命即以此辭未報之間忽聞臨漳所請經界議格不行不免自劾廟堂巳許復備祠官而不欲以此爲名雖巳降㫖促行却令别入文字月𥘉巳遣人行計此月中必可拜命六十老翁餘年無㡬自此杜門當不復出矣示喻剛氣未能自克之病此正區區所深患方當相與同謹佩書之戒耳大抵最要平時講學持飬使此心常存義理常勝始有用力之地也此間銅儀見說只一平環一側環一望筒只用手轉想見當時草創未盡得元祐舊制也奉告且知條教巳孚物情風動士勸民安姦凶屏息此亦足以小試儒者之効矣更兾勉旃區區又將於其大者觀之也誠齋歸䄂翩然令人慨想所寄石刻某偶在山間爲大兒治葬兒軰留在家間未及快覩也武夷之㑹乃所深願而未可得者他時踐言何幸如之但恐功名迫逐不暇赴此寂寞之期耳因書誠齋多爲致謝屬此悲冗未能占布也建陽新居粗有溪山之樂然心緒不佳又多俗冗苦未得舒放懐抱也周官復古正以此經不熟未得深考異時得靣扣其說庶㡬了然無疑乃敢下語耳永嘉諸人說此甚有與先儒不同處然頗祕其說亦未得扣撃之也示及先丈所著周禮復古編極荷不鄙徃時先丈固甞以見寄矣某於此書素所不熟未敢容易下語然當是時猶意其可一見而决也不謂後來不遂此願至今遺恨况今方以僞學獲罪聖朝杜門齰舌猶懼不免又安敢作爲文字以觸禍機乎答曽景建季通子約相逐而逝不謂天之無意於善人乃如此每一念之輙爲悲愴不能爲懐也昨聞吉甫之歸方竊疑之伯豐之子乃如此尤可歎息耳道夫乆不得書爲况如何因見致意便遽未及書也方遣人探子約之襯何日過上饒欲遣季子徃哭之近得玉山書則巳過矣前日僅能扶病一撫季通之柩也廬陵子一書煩爲附的便其人乃子約甞寓其舎者也得不浮湛爲幸答余景思朱趙相繼淪没深爲可念聞冝春人欲留學古卜葬於彼遂爲留居之計不知果然否魯叔子弟㡬人今皆年㡬何莫亦能自卓立否欲作書慰之以病未能當俟後便也作縣固非易事然盡心力而爲之必無不濟今人多是自放懶了所以一綱㢮而衆目紊也承喻立蘇忠勇祠於故居甚善甚善但某自今夏一病至重今巳累月尚未復常心力尤衰日前欠人文字且辭之未得盡脫豈敢更承當此事耶兼近日巳辭林子方家墓碑之請亦恐不能無嫌也間中益得觀書當有深趣日月易得願益勉旃若但如拙者旣老而後有聞則享用巳不能乆而無復可行之望矣直卿旣歸想時得從容恐講論不能無異同正當力究有未决者因來諭及不敢不盡鄙懐也與陳同父某扣首再拜訴哀叙謝略具前幅而痛苦之懐終有不能以言語自見者三復來教及所示奠文則巳略盡之矣尚何言哉尚何言哉自聞意外之患旣解而益急地逺無從詗知動息親舊書來亦不能言其詳第切憂嘆而巳数日前得沈應先書乃報云云自是必可伸雪今日忽見使人得所惠書乃知肓料亦誤中也急拆疾讀悲喜交懐又念常年此時常蒙惠問不謂今歳彼此况味乃如此又益以悼嘆也觀望旣息黒白自分千萬更且寛以處之天日在上豈容有此冤枉事也亡子卜葬巳得地但隂陽家說湏明年夏乃可窆今且殯在墳庵其婦子却且同在建陽寓舎小孫壯實麄厚近小小不安然觀其意氣横逸却似可望頼有此少寛懐抱然每抱撫之悲緒觸心殆不可爲懐也五夫所居眼界殊惡不敢復歸巳就此卜居矣然嚢中纔有數百千工役未十一二巳掃而空矣將來更湏做債方可了辦甚悔始謀之率爾也但其處溪山却儘可觀亡子素亦愛之今乃不及見此營築念之又不勝痛也奠文說盡事情巳爲宣白哀慟之餘哽咽不能自巳此兒素知尊慕兄之文此足以少慰之矣更有少懇將來葬處欲得數語識之此子自㓜秀慧生一兩月見文書即喜笑咿嗚如誦讀狀小兒戯事見必學學必能然巳能輙弃去後來得親師友意甚望之旣而雖稍懶廢然見其時道言語亦有可喜者但恐其騖於浮華不欲以此獎之去年到婺以書歸云異時還家决當盡捐他習刻意爲巳之學私竊喜之日望其歸不意其至此也痛哉痛哉尚忍言之此語未甞爲他人道以老兄素有教誨獎就之意輙以不朽爲託伏惟憐而許之千萬幸甚更一兩月當遣人就請也奠禮有狀拜謝但來人至江山遇盗頗有所失亡今賫到兩縑云是他人所償此不敢晋却封納却可送官給還本主也無以伴書白毛布一端徃奉冬裘之湏幸視至未有承教之期惟千萬自愛爲禱某扣首再拜答李繼善孝述熹頓首便中辱書爲慰信後𥘉寒侍奉佳慶所示疑義各以所見附于左方矣來喻甚精到但思之過苦恐心勞而生疾折之大繁恐氣薄而少味皆有害乎涵養踐行之功耳其餘曲折敬子元思必能言今日疾作執筆甚難不容盡布惟冀以時自重不宣熹再拜晦庵先生朱文公續集卷之七閩縣學訓導何器校, WYG: 撰}
