  - {type: variant, offset: 8486, length: 709, content: 壁似相如考試感事戲作海邑三年吏勤勞不爲身但令官事了從遣黠兒嗔題米倉壁度量無私本至公寸心貪得意何竆若教老子莊周見剖斗除衡付一空題安隱壁征車少憇林間寺試問南枝開未開日暮天寒無酒飲不湏空喚莫愁來題𣑽天方丈壁輸盡王租生理微野僧行乞暮還歸山空日落無鐘鼓只有虗堂蝙蝠飛五月五日海上遇風雨作疾風吹雨滿征衫陸走川行兩不堪塵事縈人心事逺濯纓何必在江潭兩絶句送順之南歸門前三徑長蒿菜愧予慇懃千里來校罷遺書却歸去此心元自不曽灰幾年江海事幽㝷徧興雲僧話此心今日肯來論舊學歳寒猶恐雪霜侵寄陳講師以下見别編臨江集聞道山中客年來鬢欲皤静便三徑小貧覺一身多且喜詩無病從教睡作魔故人今領衆猶足慰蹉跎别陳講師幾年勞夣想今日慰登臨况入芝蘭室又聞金玉音與君連夜語盡我一生心此外成華髪無因得重尋登閤早山疊疊層巒鎻閟宫我來舊地訪靈蹤葛仙去後無丹竈弟子今成白髪翁一派泠泠臺下水半空漠漠嶺頭雲祖師成道冲天去只有無窮受籙人送單應之徃閤山杖頭挑月入煙籮城郭塵埃柰爾何若到名山高着眼洞天深處異人多回首名山我舊遊曾将風𬒮挹浮丘如今不及臺邉水長向山前山後流送李道士歸玉笥三首偶隨雲去伴雲歸笑指清都在翠㣲爲我中間留一榻他年去著薜蘿衣玉笥山連都水坑拂雲樓殿對峥嶸君歸後夜無餘事卧聽寒泉落磵聲莫惜臨行酒一杯㸔君上馬古城隈相望兩地無多逺頻寄音書與鴈來題赤城觀落日空山秋氣清泠泠古木亂蟬鳴僊人一去鶴不返劒客重來丹巳成静對竹爐煙縷直細㸔月窟桂華生此身舊有蓬瀛約玉簡歸來問姓名尤溪縣學觀大閣見尤川志及南溪祠堂志令尹絃歌不下堂叱嗟層觀麗扶桑朱甍碧瓦臨無地散帙投壼樂未央得意溪山供徙倚忘情魚鳥共徜徉應觀物我同根處剖破藩籬即大方十月上休日遊卧龍玉淵三峽用山谷驚鹿湏要野學盟鷗本願秋江分韻得鷗字按大, WYG: 庫}
