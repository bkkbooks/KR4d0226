  - {type: variant, offset: 16008, length: 0, content: '', WYG: 定可繕寫初熹被府檄訪境内先賢碑碣事傳悉上之府是後得此書及墓表於其家表文猥近不足觀然述其世次爲詳書雜晚唐偶儷之體而時出竒澁殆難以句讀也相傳䆮久又多僞謬無善本可相參校特以意私定其一二而其不可知者葢闕焉觀其潔身江海之上不汙世俗之垢紛次輯舊聞以爲此書雖非有險竒放絶之行瓌怪偉麗之文然其微詞感厲時有發明理義之致而切於名教者亦可謂守正循理不惑之士矣操行之難而姓名曽不少槩見於世亦足悲夫詩之序曰亂世則思君子不改其度若昌晦者可謂近之故熹因校其書而爲序其意如此後有君子得以覽焉家藏石刻序予少好古金石文字家貧不能有其書獨時時取歐陽子所集錄觀其序跋辨證之辭以爲樂遇適意時恍然若手摩挲其金石而目了其文字也既又悵然自恨身貧賤苦處屏逺弗能盡致所欲得如公之爲者或寢食不怡竟日來泉南又得東武趙氏金石錄觀之大畧如歐陽子書然銓序益條理考證益精愽予心亦益好之於是始胠其橐得故先君子時所藏與熹後所増益者凡數十種雖不多要皆竒古可玩悉加標飾因其刻石大小施横軸懸之壁間坐對循行臥起恒不去目前不待披筐篋卷書把玩而後爲適也葢漢魏以前刻石制度簡朴或出竒詭皆有可觀存之足以佐嗜古之癖良非小助其近世刻石本製小者或爲横卷若書帙亦以意所便也葢歐陽子書一千卷趙氏書多倍之而予欲以此數十種者追而與之並則誠若不可冀然安知積之久則不若是其富也耶姑首是書以竢紹興二十六年嵗次丙子八月二十二日壬辰吳郡朱熹序許升字序易象有之曰地中生木升君子以順德積小以髙大葢因其固然之理而無容私焉者順之謂也由是而之則其進德也孰禦許生名升與予學予察其得於内者葢如是故因其名之義而敬字曰順之云紹興戊寅十一月十二日新安朱熹仲晦父書謝上蔡語錄後序右上蔡先生語錄三篇先生姓謝氏名良佐字顯道學於程夫子昆弟之門篤志力行於從游諸公間所見最爲超越有論語説行於世而此書傳者葢鮮焉熹初得友人括蒼吳任寫本一篇題曰上蔡先生語錄後得吳中板本一篇題曰逍遙先生語錄陳留江讀之作序云得之先生兄孫少卿伋及夫隱之子希元者二家之書皆温陵曽恬天隱所記最後得胡文定公家寫本二篇於公從子籍溪先生題曰謝子雅言凡書四篇以相參校胡氏上篇五十五章}
