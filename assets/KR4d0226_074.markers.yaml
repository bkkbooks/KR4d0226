  - {type: variant, offset: 16001, length: 1, content: 儒, WYG: ''}
  - {type: variant, offset: 16003, length: 4, content: 訓導葉暢, WYG: 故書目序同安學故有官書一匱無籍記文書官吏轉以相承不復訾省至熹始發視則皆故敝殘脱無復次第獨視其終篇皆有識焉者曰宣德郎守秘書丞知縣事林姓而名亡矣按縣治壁記及故廟學記林君名瀆字道源以治平四年爲是縣明年熙寧初元始新廟學聚圖書是嵗戊申距今紹興二十五年乙亥纔八十有八年不幸遭官師之懈弛更水火盜竊之餘其磨滅而僅存者止是耳而使之與埃塵蟲鼠共敝於故箱敗篋之間以至於泯泯無餘而後己其亦不仁也哉因爲之料簡其可讀者得凡六種一百九十一卷又下書募民間得故所藏去者復二種三十六卷更爲裝禠爲若干卷著之籍記而善藏之如故加嚴焉復具刻著卷目次第闕其所失亡者揭之使此縣之人於林君之德尚有考也而熹所聚書因亦附見其後云禆正書序禆正書三卷唐陳昌晦撰凡四十九篇熹所}
