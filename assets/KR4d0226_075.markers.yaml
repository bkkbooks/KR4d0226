  - {type: variant, offset: 0, length: 923, content: 晦庵先生朱文公文集卷第七十五序泉州同安縣學故書目序同安學故有官書一匱無籍記文書官吏傳以相承不復訾省至熹始發視則皆故敝殘脫無復次第獨視其終篇皆有識焉者曰宣徳郎守祕書丞知縣事林姓而名亡矣按縣治壁記及故廟學記林君名瀆字道源以治平四年爲是縣明年熈寜𥘉元始新廟學聚圖書是歲戊申距今紹興二十五年乙亥纔八十有八年不幸遭官師之解弛更水火盗竊之餘其磨滅而僅存者止是耳而使之與埃塵蟲䑕共敝於故箱敗篋之間以至於泯泯無餘而後巳其亦不仁也哉因爲之料簡其可讀者得凡六種一百九十一卷又下書募民間得故所藏去者復二種三十六卷更爲裝禠爲若干卷著之籍記而善藏之如故加嚴焉復具刻著卷目次第闕其所失亡者掲之使此縣之人於林君之徳尚有考也而熹所聚書因亦附見其後云禆正書序禆正書三卷唐陳昌晦撰凡四十九篇熹所校定可繕冩𥘉熹𬒳府檄訪境内先賢碑碣事傳悉上之府是後得此書及墓表於其家表文猥近不足觀然述其世次爲詳書雜晚唐偶儷之體而時出竒澁殆難以句讀也相傳寖乆又多譌謬無善本可相參校特以意私定其一二而其不可知者蓋闕焉觀其㓗身江海之上不汚世俗之垢紛次輯舊聞以爲此書雖非有險竒放絶之行瓌恠偉麗之文然其㣲詞感厲時有發明理義之致而切於名教者亦可謂守正循理不惑之士矣操行之難而姓名曽不少㮣見於世亦足悲夫詩之序曰亂世則思君子不改其度若昌晦者可謂近之故熹因校其書而爲序其意如此後有君子得以覽焉家藏石刻序予少好古金石文字家貧不能有其書獨時時取歐陽子所集録觀其序跋辨證之辭以爲樂遇適意時恍然若手摩挲其金石而目了其文字也旣又悵然自恨身貧賤居處屏逺弗能盡致所欲得如公之爲者或寢食不怡竟日來泉南又得東武趙氏金石録觀之大略如歐陽子書然詮序益條理考證益精慱予心亦益好之於是始胠其橐得故先君子時所藏與熹後所増益者凡數十種雖不多要皆竒古可玩悉加標飾因其刻石大小施橫軸懸之壁間坐對循行卧起恒不去目前不待披筐篋卷舒把玩而後爲適也蓋漢魏以前刻石制度簡朴或出竒詭皆有可觀存之足以佐嗜古之癖良非小助其近世刻石本製小者或爲橫卷若書秩亦以意所便也蓋歐陽子書一千卷趙氏書多倍之而予欲以此數十種者追而與之並則誠若不可冀然安知積之乆則不若是其富也耶姑首是書以竢紹興二十六年歳次丙子八月二十二日壬辰呉郡朱熹序許升字序易象有之曰地中生木升君子以順徳積小以髙大蓋因, WYG: ''}
