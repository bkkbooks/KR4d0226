  - {type: variant, offset: 12243, length: 0, content: '', WYG: 欽定四庫全書晦庵集卷六十九宋朱子撰雜著禘祫議王制天子七廟三昭三穆與太祖之廟而七諸侯大夫士降殺以兩而祭法又有適士二廟官師一廟之文大抵士無太祖而皆及其祖考也鄭氏曰夏五廟商六廟周七廟今按商書已云七世之廟鄭志恐非顔師古曰父為昭子為穆孫復為昭昭明也穆羙也後以晉室諱昭故學者改昭為韶其制皆為中門外之左外為都宫内各有寢廟别有門垣太祖在北左昭右穆以次而南晉博士孫毓議天子太祖百世不遷一昭一穆為宗亦百世不遷宗亦曰世室亦曰祧鄭注周禮守祧曰宗亦曰祧亦曰世室周禮言守祧之宫鄭氏曰逺廟為祧周為文武之廟遷主藏焉又曰遷主所藏曰祧先公之遷主藏于太祖后稷之廟先王之遷主藏於文武之廟羣穆於文羣昭於武明堂位有文世室武世室鄭氏曰世室者不毁之名也二昭二穆為四親廟高祖以上親盡則毁而遞遷昭常為昭穆常為穆昭之二廟親盡則毁而遷其主于昭之宗魯祖遷于昭之二新入廟者祔于昭之三而高祖及祖在穆如故穆廟親盡放此新死者如當為昭則祔於昭之近廟而自近廟遷其祖於昭之次廟而於主祭者為曾祖自次廟遷其高祖于昭之世室蓋於主祭者為五世而親盡故也其穆之兩廟如故不動其次廟於主祭者為高祖其近廟於主祭者為祖也主祭者沒則祔于穆之近廟而逓遷其上故此凡毁廟遷主改塗易彩示有所變非盡毁也見榖梁傳及注諸侯則無二宗大夫則無二廟其遷毁之次則與天子同傳毁廟之主藏於太祖儀禮所謂以其班祔檀弓所謂祔于祖父者也曲禮云君子抱孫不抱子此言孫可以為王父尸子不可以為父尸鄭氏云以孫與祖昭穆同也周制自后稷為太祖不窋為昭鞠為穆以下十二世至太王復為穆十三世至王季復為昭十四世至文王又為穆十五世至武王復為昭故書稱文王為穆考詩稱武王為昭考而左氏傳曰太伯虞仲太王之昭也虢仲虢叔王季之穆也又曰管蔡魯衛文之昭也邘晉應韓武之穆也葢其次序一定百世不易雖文王在右武王在左嫌於倒置而諸廟别有門垣足以各全其尊初不以左右為尊卑也三代之制其詳雖不得聞然其大畧不過如此漢承秦敝不能深考古制諸帝之廟各在一處不容合為都宫以序昭穆韋元成傳云宗廟異處昭穆不序但考周制先公廟在岐周文王在豐武王在鎬則都宫之制亦不得為與漢亦無甚異未詳其説貢禹韋元成匡衡之徒雖欲正之而}
