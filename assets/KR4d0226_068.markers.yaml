  - {type: variant, offset: 12248, length: 6, content: 學訓導鄭璉校, WYG: 臣討論舊典葢捋以遠迹三代之隆一正千古之謬甚盛舉也不幸未及營表世莫得聞秉筆之士又復不能特書其事以詔萬世今獨其見於陸氏之文者為可考耳然其所論昭穆之説亦未有定論圖説在後獨原廟之制外為都宫而各為寢廟門垣乃為近古但其禮本不經儀亦非古故儒者得以議之如李清臣所謂畧于七廟之室而為祠於佛老之側不為木主而為之象不為禘祫烝甞之祀而行一酌奠之禮楊時所謂舍二帝三王之正禮而從一繆妄之叔孫通者其言皆是也然不知其所以致此則由於宗廟不立而人心有所不安也不議復此而徒欲廢彼亦安得為至當之論哉王者始受命諸侯始封之君皆為太祖以下五世而迭毁毁廟之主藏乎太祖五年而再毁祭言一禘一祫也祫祭者毁廟與未毁廟之主皆合食於太祖父為昭子為穆孫復為昭古之正禮也周之所以七廟者以后稷始封文王武王受命而王是三廟不毁與親廟四而七七者其正法數可常數者宗不在此數中宗變也茍有功徳則宗之不可預為設數故於殷有三宗周公舉之以勸成王由是言之宗無數也劉歆周七廟圖稷高圉以上藏主公叔王季亞圍古公文王時稷亞圉以上藏主公叔王季大王文王武王時稷公叔以上藏主王季武王太王文王成王時稷太王以上藏主王季武王文王成王康王時稷王季以上藏主武康文成昭王時稷文世室武康成昭穆王時稷武世室文世室康穆成昭共王時稷武世室文成康穆昭共懿王時稷武康文成穆懿昭共孝王時稷武康昭文成穆懿共孝夷王時稷武康穆文成昭懿夷共孝厲王時稷武康穆共文成昭懿夷孝厲宣王時稷武康穆懿文成昭共夷宣孝厲幽王時劉歆周九廟圖稷稷公非以上藏主高公叔王季亞圍太王文王武王時稷高圉以上藏主公叔王季武王亞圉太王文王成王時稷亞圉以上藏主公叔王季武王太王文王成王康王時稷公叔以上藏主王季武王康主太王文王成王昭王時稷太王以上藏主王季武康文王成昭穆王時稷王季以上藏主武康穆文成昭共王時稷文世室武康穆成昭共懿王時稷武世室文世室康穆㦤成昭共孝王時稷武成文康穆懿昭共孝夷王時稷武康文成穆懿夷昭共孝厲王時稷武康昭文成穆懿夷共孝厲宣王時稷武康穆文成昭懿夷宣共孝厲幽王時}
