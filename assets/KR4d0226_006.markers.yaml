  - {type: variant, offset: 21310, length: 1499, content: 文公續集卷第六與趙昌甫罪戾之餘物色未巳不知何以見惡如此之深甚可笑也近讀經書不得却看些古文章識得古人用意䖏然亦覺轉喉觸諱不敢下筆注解但時發一笑耳來書所喻似皆未切事情巳細與長孺言之後有的便渠必一一奉報要之今日只可謹之又謹畏之又畏不可以目下少寛便自舒肆况所謂少寛者又巳激而更甚乎黄乃以力賛建中而去前巳去者將有復來之漸其繼之者與儲以待次者又不令人入若非上心慨然開悟發明善類未有少安之望也千萬與諸伯仲深詧此意敬㳟朝夕安以俟之區區不勝眞切之望也昨日得王謙仲書亦如履常所料蓋逺方未見近報耳向讀學易集見其當紹聖元符之際愁居懾處之狀令人傷歎不意今日乃見此境界宛在目前試取一觀亦足以爲法也少時見吕紫㣲與人書說交遊中時復抽了一兩人令人驚懼當時不理㑹得今乃親見此境界也斯逺聞其䘮偶不知果然否經年不得渠書想亦畏僞學汚染也李白詩多說此事惜不能盡暁粗窺端緒亦不暇入静行持但玩其言猶是漢末文字可愛其言存神内照者亦隨時隨處可下功夫未必無益於養病也巳草挂冠之牘開歲即上計較平生巳爲優幸獨恨爲學不力有愧𥘉心著書未成不無遺憾耳因便寓此少致問訊之意政逺千萬戒詩止酒以時自愛眷集均慶答江隱君每承諄切之誨若將挈而寘諸聖賢之域顧愚昧未知所以仰稱期待教督之意而又未得親奉指畫於前其爲向仰不勝此心之拳拳别𥿄所喻汪洋愽大不可涯涘仰見所造之深所養之備縱横貫穿上下馳騁無所窮竭底滯雖若某之蒙昧誠不足以語此亦巳昭然若發蒙矣幸甚幸甚然竊以平生所聞於師友者驗之其大致規模不能有異獨於其間語夫進脩節序之緩急先後則或未同蓋某之所聞以爲天下之物無一物不具天理所謂寂然不動感而遂通者舉目無不在焉是以聖門之學下學之序始於格物以致其知不離乎日用事物之間别其是非究其可否由是精義入神以致其用其間曲折纎悉容有次序而一理貫通無分叚無時節無方所以爲精也而不離乎粗以爲末也而不離乎本必也優游潜玩饜飫而自得之然後爲至固不可自畫而緩亦不可以欲速而急譬如草木自萌芽生長以至於支葉生實不至其日至之時而揠焉以助之長豈不無益而反害之哉凡此與來教所謂傷時痛俗急於自反且欲㑹通其㫖要以爲駐足之地者其本末指意似若不同故前後反復之言率多違異而語其所詣之極則又不敢以爲不同也姑論其大槩異同之端以爲求教之目其他曲折不敢執普言語以取再三之瀆要之非得靣承不能究此心之所欲言也普疑當作着伏辱墜教所以訓督孜孜不倦有加於昔顧惟庸昧重勞提耳旣感且愧不知所以爲謝也始者獻疑亦非敢以所示大㫖爲不然但疑精義入神一句文義或不如此恐如所論則日用方外之一節似少功用耳及蒙垂喻再三每加精宻讀之恍然自失於直截根源處更無纎芥可疑只是精義入神一句依前未免扭揑愚謂大體巳是正當即不湏强以此句說合費多少心力言語於道體無所發明於文理反有所累某竊終疑之願平心以觀聖人立言之意當信某非敢妄言而此句工夫自有所謂不但如來喻所指而巳拙於文詞又迫私冗來使不能乆駐然此非難知以吾丈髙明尤不難見若無義以方外一節即儒者與異端又何異乎此似未易以内外隔截看也前書别𥿄變化機要二者之分亦非愚妄所曉竊意聖賢之言則一而見之淺深在學者所證本非有預如此分别也昔有人見龜山先生請教先生令讀論語其人復問論語中要切是何語先生云皆要切且熟讀可也此語甚有味乍看似平淡没可說只平淡中有味所以其味無窮今人說得來驚天動地非無捷徑可喜只是味短與此殊不倫矣且看論語中一句一字孰有非要切之言者若學者體㑹履踐得皆是性分内緊切慤實事便從此反本還源心與理一去豈有剰法哉若如吾丈所謂變化者則聖賢之門無有是也其莊老笁學之緒餘乎反復以思未見其可大抵聖門立言制行自有規矩非意所造乃義理之本然也故日用之間内主於敬而行於義義不擇則不精不精則雖其大體不離於道而言行或流於詭妄則亦與道離而不自知矣故曰和順於道德而理於義而孟, WYG: ''}
