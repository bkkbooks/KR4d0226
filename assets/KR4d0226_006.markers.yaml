  - {type: variant, offset: 18611, length: 2680, content: 巳書二考代者度此月中旬可到今日復遣人速之矣老兄許來固願少欵但恐文法有拘亦非細事更冀審度之也示喻趙宗丞田極感留意巳撰得四百千省半是糶米剰錢半是某所得諸䖏饋送前日錢丈所惠亦在其中今即移文庫中令項樁管以俟其報告爲發書扣之路運幹不是彦豐否若是即某巳識之并煩爲致意早得一報爲幸雖某去此後人亦當能成此勝縁也來書巳付案中爲事祖矣辛帥之客舟販牛皮過此掛新江西安撫占牌以帟幙蒙蔽舡窓甚宻而守卒僅三數輩𥘉不肯令搜撿旣得此物遂持帥引來云發赴淮東緫所見其不成行徑巳令拘沒入官昨得辛書却云軍中收買勢不爲巳甚當給還之然亦殊不便也因筆及之恐傳聞又有過當耳前書奉叩白鹿買田事如何幸早示報及某未去間有定論爲佳此錢巳送庫寄收以俟矣千萬留念某代者巳到二十七日定交郡事即略轉山北迤邐東歸矣脫此樊籠欣快無量但念相見未有近期不能無愴恨耳白鹿田錢巳撥正牒教授候彼回文即可支付也禮器之失不但一爵今朝廷所用宣和禮制局様雖未必皆合古然庻幾近之不知當時禮部印本何故只用舊制向來南康亦無力但以爵形太醜而句容有新鑄者故易之耳其實皆當遣人問於禮寺而盡易之乃爲盡善但恐其費不貲州郡之力不能辦耳福州余丞相家有當時所賜甚精然今亦莫能用也黃南康之政如何渠向在昭武甚佳爲人所擠而罷今能不改其舊則三邑之幸也永卿主薄老兄尚留齋館否昨承惠書此便又遽未能别狀但所問先天圖曲折甚善細詳圖意若自乾一橫排至坤八此則全是自然故說卦云易逆數也皆自巳生以得未生之卦也若如圓圖則湏如此方見隂陽消長次第震一陽離兊二陽乾三陽巽一隂坎艮二隂坤三隂雖似梢渉安排然亦莫非自然之理自冬至至夏至爲順皆自未生而反得巳生之卦盖與前逆數者相反自夏至至冬至爲逆盖與前逆數者同其曰左右與今天文家說左右不同盖從中而分自北至東爲左自南而西爲右其𥘉若有左右之勢耳鄙見如此更冀詳之啓蒙改本未成後便寄去近望得伏羲象欲奉之武夷精舎恨賢者不能一來觀之耳此𥿄煩啇伯兄呈似更同爲訂之也新泉之勝聞之爽然自失安得復理杖屨扶此病軀一至其下仰觀俯濯如昔年時或有善畫者得爲使畫以來幸甚向見楊伯起有切韻書只三四十板而聲形畧備亦嘗傳得而爲人借失之今欲得一本敢煩爲借抄録一本校令審諦便中見寄幸甚或語趙守刻得一板流行亦佳此非僞學想亦不至生事也五老新瀑曾往觀否夢寐不忘也某竟以無狀自致人言上累師傅下及朋友愧負憂惕如何可言傳聞賢者亦有里巷侵侮之虞不知云何今日惟可凡事省縮豈復更與此輩争是非較曲直也彼中諸書板本聞幾有焚㓕之禍又云下官有持不可者遂巳不知果然否耶然計此恐終不免向來得本甚多皆爲人取去今欲復得一兩本不知能及未爲煨燼之間印以見寄否洪韻當巳抄畢幸早示乃此間付之書坊鏤板甚不費力况非僞學亦無嫌也新泉圖子和成旣爲定藁必巳能盡冩其佳䖏只就覔此草夲不必重摹俗工或能反敗人意也自聞此泉新岀恨未能一遊其下以快心目濺雷噴雪發夢寐也瀑圖韻譜近方得之圖張屋壁坐起對之恨不身到其下也定叟終於落星何不就館城中耶鄭溥之黄伯耆相繼物故皆盛年也亦是一時氣數然張鄭尤可惜耳楊伯起新年幾歲精神筋力想未至衰憊如某也白鹿舊遊恍然夣寐但聞五老峯下新泉三疊頗爲竒勝計此生無由得至其下嘗託黄啇伯陳和成摹畫以來摩莎素墨徒以慨歎也江德之甚好說易嘗與講論否且看程先生傳亦佳某謬說不足觀然欲觀之湏破開肚腸洗却五辛查滓乃能信得及耳又印夲多錯誤恐難㑹了無由靣談聊發一笑将來官滿復歸廬阜耶劉婿得依餘芘幸甚時有以警誨之乃佳外孫聞尚附學想蒙憐撫某衰朽益甚巳上告老之章它盖無足言者劉婿幸得托芘今将滿矣不知巳離彼未耶李敬子得襄陽教官見在此相聚或傳其闕巳到未知然否幸因便報及也讀易想亦有味此經自有規模格局若看得破則精粗巨細無䖏不可受用如其未然即且将其間㫖意分明䖏反覆玩味亦自可樂不必深求幽逺枉費心力也某之謬說夲未成書往時爲人竊出印賣更加錯誤殊不可讀不謂流傳巳到几間更自不足觀也劉婿相見未豁然亦差覺老成此皆教誨之力也某年來衰憊殊甚兩足拘攣不能移歩猶是小故而心腹之疾猶爲可慮服藥無效拱手俟命而巳葉永卿呉害卿周得之李深子某還家方幸休息得以輯理舊書忽𬒳恩除不勝憂懼𥘉欲力辭又聞彼道荐饑巳有流移户口恐辭或不免而失可爲之時遂不免申奏對之請更旬日間必有進止之命若得罷遣且守東岡之陂即大幸也除職𥘉不敢辭但以賑濟四家未𬒳賞因此爲伸理耳聞彼又苦饑想不至如去年之甚然在今日處置當倍費力也深甫所喻减稅事不知後來如何某若得對當且乞减徐守所増中上等稅錢此數不多當必可得其它恐亦難料理也白鹿田巳就緒甚善又聞今侯能枉駕臨之尤幸伯起廷彦爲况如何聞永卿諸公亦嘗入山觀書遐想山林之勝它䖏真未易得令人悵然興懐也但聞或者乃欲畫某形象置之其間令人駭然不知誰實爲此向欲作李賔客李九經及三先生祠於其間以未有大成殿遂不敢議今乃遽然如此於義殊不安而諸人所以相期者乃復如是之淺尤非區區之所望也幸以此示諸人亟爲毁撤爲佳不然湏别作區䖏也舜㢸所云白鹿之說當時亦謾及之豈有輙敢號令州郡之理渠自張皇亦不曉事之過也白鹿買田聞巳就緒呉丈又許買牛此尤永逺之利也諸事更頼衆賢左右維持之其必有濟矣朱守書來示及新編圖經乃知其郡政從容綽有餘力如此大凡區區向所欲爲而不暇者今皆備矣又承喻及禁止白鹿葬地一節尤快人意但不知曾追毁其買契否不爾恐尚有後患也白鹿知亦嘗一到甚善甚善每念疇昔相與登臨遊從之樂未嘗不發於夣寐然亦恨當時所以相切磋者猶有所未盡也張廣文别後遽至此深可悲悼某或得至浙東亦遣人視其家也永卿所喻可欲之說恐不然但以詩所謂天生蒸民有物有則民之秉彞好是懿德者觀之則知欲惡之正固有不易之定理矣彼以所當惡者爲所當欲豈其性情之本然者哉孟子集注近方修得一過未及再看更俟少定冩得别本即附去然大凡讀書且徐讀正文虚心涵泳切巳省察亦當自見大體意味其間曲折却續求之未晚也唐卿比來爲况如何書來不及菖蒲平安之報何耶去歳災蹇異常病旣日侵秋間又哭一女悲傷無聊屢至危殆忽蒙除用􅈤祠未獲近乃見次又巳有奏事之命不免遣人復申前請行一月矣至今未還不知事竟如何或不得巳即湏到彼靣懇力辭庻幾可脫江西决是不成行也向承録示樂方極感留念今脚氣巳漸輕祕結却變成滑洩矣大率氣血漸衰自是如此也啓蒙近復修改一兩䖏未畢俟印得即奉寄易之象數初甚簡易今人不得其說遂至支離使人不曉反遂詆以爲滛巫瞽史之學其亦誤矣馮儀之細讀來示備詳别後進學不倦之意世間萬事湏臾變㓕不足置胷中惟有致知力行脩身俟死爲究竟法耳余正父愽學強志亦不易得禮書中間啇量多未合䖏近方見其成編比舊無甚改易所論獨志無助者誠然然渠亦豈容他人之助也此間所集諸家雜說未能如彼之冨然儀禮正經叚落注䟽却差明白但功力頗多而衰病耗昏朋友星散不能得了耳啇伯時時得書講論精宻誠可嘉尚李敬子堅苦有志尤不易得近與諸人皆巳歸只有建昌二吕在此早晚講論粗有條理足慰岑寂也晦庵先生朱文公文别, WYG: 菴}
