  - {type: variant, offset: 22810, length: 5126, content: 飬浩然之氣亦必曰是集義所生者不識此爲對仁之義乎爲精㣲之義若來喻所云乎且對仁之義亦何以知其不精㣲也但大傳中精字之義不如此耳一去之去字疑前幅所陳謬妄不中理之言必多盖未敢以爲是而求正於左右切望指教區區之病正坐執滯於文字言語之間未能脫然有貫通處其於道體固患夫若存若亡而末有約卓之見耳但精義二字聞諸長者所謂義者冝而巳矣物之有宜有不宜事之有可有不可所謂義也精義者精諸此而巳矣所謂精云者猶曰察之云爾精之之至而入於神則於事物所宜毫釐委曲之間無所不悉有不可容言之妙矣此所以致用而用無不利也來教之云似於名言之間小有可疑雖非大指所係然亦學者發端下手處恐不可略故復陳之與鄭景實栗示喻曲折亦是時態之常頃聞仙遊故相葉公之爲縣月計所湏令民以漸輸送故縣帑無餘積而月解無餘欠人甚便之竊計郡計旣寛正當法此稍寛縣道之輸亦公私之利也但恐縣道難託别生它患此在髙明必又有以制之耳儲宰旣去爲怨家所誣亦寓公者爲之先後臺評所指遷學一事乃與賤跡相連士子有初不預謀者亦𬒳流竄其事甚可笑或傳不止流竄於爾又可痛也蓋舊學基不佳衆欲遷之乆矣儲宰一日自與邑中士子定議而某亦預焉其人則𥘉不及知而其地亦不堪以葬也它時經由當自知之其可浩歎又不止如今所諭也與饒廷老此間虞士朋與王阮同赴東府飰會乃其鄰郡鄉人必不使人攻之也姑少徐之當見底裏歸宿也游誠之或云參選不得巳歸臨海不知然否能碎千金之璧而眷眷於破釜何耶伯啓聞巳西去昨日得浙中書云子約之逝親戚有爲旁郡守者遂不復相聞末俗益偷乃至如此亦可歎也所喻極當𥘉亦疑之後聞所得只是庶官恩例故不自慊今旣不安不如且巳止於未形尤爲深慮保狀巳納還仲本印𥿄今并附其人持歸幸檢入元不曽發封但别用𥿄護之也三衢巳差替人正則恐亦不成赴上矣丁生頃年代君舉於桂陽自刻其詩集而屬君舉序之是時蓋求入社而不可得今日乃爲此言固小人之常態也示及報狀只坡䟽未見此其関捩雖未易窺然其手勢規模亦不難見蓋巳排黃子由之說而退之不乆必别有勝負也元善巳如霅川其子假日至此見養子之說愕然曰大人到彼又頭撞矣此語亦有味因見仲本可閑及之世間所傳坡文亦未必皆出其手可更詳之也某病起方得旬日無事比又苦傷風證候雖淺然服藥發散出汗多倦乏不可言屋下濕潤坐不得閣上又熱無着身處頗以爲苦耳誠之進退不决何乃至此渠年㡬與老拙只争十來歳前塗事亦可知若時運來時又自非人力所及也換闕竟如何人生凡百信縁禍福之來豈計較所能免見說賢者慮患過深㡬至成疾何必爾耶伯起想巳赴班引矣中間道學二字摽榜不親切又不曽經官審驗多容僞濫近蒙易以僞號又責保任虚實於是真贗始判矣與張孟逺老益衰百病交作處世能復㡬時而季通子約凶問沓來令人感愴不能爲懐天之蒼蒼其果有所愛憎耶抑都無之而直聴其自爾耶暦說恨未得請餘誨康節之學固非止於爲暦然亦不專爲知來如後世䜟緯之言也幸深考之復以見教幸甚歸來之後叨冐重疊巳深愧仄不意又蒙収召之恩顧念本末不應復有仕進之計而懇辭未獲比不得巳輙縁面奏封事之請妄陳瞽言政使至前所論不過如此計此愚誠當蒙矜允得遂退藏也然語默之間政爾難得中節此舉却是以語爲黙差之毫釐則是反速其禍未知竟何似耳子充當巳改秩亦乆不得渠消息也季路之除甚慰物論供職當巳乆矣衰病益侵自去冬來脚弱拘攣心腹痞痛日甚一日服藥略無効驗懸車年及巳言於郡丐上告老之章而有司疑之交舊亦多以爲不可未知竟如何然此意巳决不復能顧利害得失也友人㳺子蒙趨試南宫行期偶緩過衢欲買舟而無知識可託欲丐指麾幹事人相導之此公定夫先生從孫論議文學皆有餘在此爲可與晤語者計當自識之也記得杲老𥘉謫衡陽有以詩送之者曰逢人深閉口無事學梳頭此語有味可發一笑然亦不得只作笑會也答劉德脩似聞祠官秩滿不知亦爲再請之計否耶東方之事想日聞之某竟不免吏議然巳晚矣正使苟安亦何足爲輕重顧未知世道終何如耳餘干時有人徃來履常兄弟且如此昨得其書具道所教戒令人感歎但觀時勢恐未有𥙷徒促禍耳機仲元善各巳爲致盛意皆屬道謝子宜在宜春時得書其母年髙不肯來就養甚可念子直罷廬陵後去之章貢外邑寓居亦不甚安子夀間亦得書平父聞亦歸江陵却不得近書也季章必巳到閬中文叔寓居不知爲况定何如亦巳託君亮附書問訊矣東溪志銘髙古峻潔法度深嚴而渾然不見刻琱之迹三復歎仰以得見爲幸老先生學行之懿遂託此文以不朽矣春間當巳就窆恨不得陪素車之㑹也傳之計亦巳襄事其子弟㡬人當能世其學也天雄鐡杖石刻之况荷意甚厚第顧衰懦有不能堪重以爲愧耳今年脚氣幸未大作但耳聵目昏日以益甚舊書不復可讀而頃年整頓儀禮一書私居乏人抄冩學徒又多在逺不能脫藁深慮一旦無以下見古人又恨地逺不得就明者而正之也方念乆不聞動靜忽閱邸報有房陵之行爲之悵然寢食俱廢累日不能自釋不審彼以何日就道自簡至房道里㡬何取道何州閱㡬日而後至風土氣候不至甚異否居處飲食能便安否官吏士民頗知相尊敬否吾道之窮一至於此然亦乆知㑹有此事但不謂便在目前耳偶有鄂便託劉公度轉致此間如有的便亦望得一字之報使知動靜少慰逺懐千萬之幸馮李亦復不容季章得郡而名見乃弟䟽中恐亦非乆安者李良仲鴻飛冥冥使人深羡第恨不得扣其玄中之趣范文叔却幸未見物色想亦深自晦也某足弱氣痛巳半年矣杖䇿人扶僅能略移跬歩而腹脇脹滿不能俯案觀書作字一切皆廢獨於長者未敢依例口占耳數日又加右臂作痛冩字不成衰憊至此無復乆存之理承教無期尚兾以時深爲世道自愛耳某隨例納禄幸巳得請中間蓋亦少有紛紛後雖粗定然猶不免爲從之之累亦可歎也盡室游山大是一叚竒事衰病窮蹙不復能出門戸矣引領髙風徒切歎仰李良仲恨未參識聞其養生頗有竒効恨不得一扣玄㫖參同契絶無善本近校得一通令人刋行方就尚有紪謬處今納一冊或因書煩爲扣之渠必於此深有得恐其有錯誤得筆示幸甚也屈平以徃者不及來者未聞而有長生度世之願亦是不堪時人之妄作而欲見其末稍作如何出場耳每讀至此未嘗不發一大笑也與方耕道問禮之意甚善顧淺陋何足以議此舊所遵守者温公書儀程氏新禮耳兩書想皆見之擇其善者可也嘉禮有日本合遣人致區區適此朞慘不得如願想能亮之承許改月來訪幸甚幸甚所喻南軒病證極令人憂念旦夕專人候之當并拜狀也幕客正要蚤晚從容宻罄忠益來喻乃欲公㕔搢笏納劄誦言殊不成舉措聞之駭歎如是乃是專欲引善歸巳明曲在人非主人所以千里相招之意也又况如此則必大激同官之怒亦使主人難處區區愚慮深爲老兄憂之方念正論衰息吾黨甚孤正當凡百詳審委曲調護使人無可指議乃爲盡善若以小故先自乖離外激衆怒内致羣議殊非䇿之得也况向來所辟兩人游巳望風引却今老兄若更做去就豈不大損主人聲望至來喻所謂官吏縱弛此亦當以漸整頓豈容一旦遽行啇君之令乎居上以寛恐南軒自有規模若一向紏之以猛恐非吾軰平日所講之意更請裁之勿爲過舉幸甚幸甚回劉知縣諱君房甞念兒時侍立先君之側見其毎得杼山侍郎公書未甞不把玩歎息而善藏之是時雖㓜無所識知然窺其詞意筆蹟之妙亦意其超然非當世之士也其後僅三四年先君即弃諸孤蓋巳不及見更化之日矣是以一時去國諸賢次第収用侍郎公亦再登近班而某跧伏窮山不得一拜牀下以脩子弟之㳟至今以爲恨也不意垂老得其賢孫而與之㳺幸亦甚矣三復來誨俯仰今昔甲子殆將一周又自歎其老而無聞也與蔡權郡南康丐祠之請前月半間巳專人入郡度諸公見憐必巳俯從所欲矣昨慮便郡虚有勞費亦已預戒邸吏関白想徹台聽也近聞巳除石寺簿爲代與之亦有雅故其人豈弟逹於從政真足以惠一方矣便郡恐當作使郡答盧提翰承問及爲學之意足見志尚之逺甚慰甚慰蓋甞聞之人之一身應事接物無非義理之所在人雖不能盡知然其大端宜亦無不聞者要在力行其所已知而勉求其所未至則自近及逺由粗至精循循有序而日有可見之効矣幸試思而勉之幸甚幸甚此有樂靜李公文集謾納一本其後序所云深可以爲干名求進之戒幸試觀之區區奉寄意不在於文字也令兄寺簿詞翰兩絶把玩不能去手然豈敢輙以無能之詞妄取僣越之譏囬書幸爲遣行李集并徃亦足以見區區也答儲行之所喻縷縷殊可駭歎此其意不在左右計必又湏醖醸播揚成一大事亦不可知然區區之心有可以質於神明者以救民而獲罪亦所不敢辤也批書遲緩亦且得寛心忍耐爲佳聞建安亦未得去崇安却巳得好消息矣縣中近日大槩幸巳無它但西路之窘日迫官司要巳再輪上戸至八月初然無人監督以明者行之尚且不免爲虚文况今日耶適得蔡倉書尚有挽留之意若能領其悃欵幡然一來千萬幸甚昨日劉居之相訪具言麻沙事體云一種貧民至有餓而死者聞之惻然今日文卿相過亦說諸處輪糶巳足上戸便謂事畢雖有米者亦不復糶最是崇化一郷可慮梁文叔亦言長平一帶小民般運崇安早榖日不下百人或恐彼中土人争占攔截亦能生事此皆可深慮者竊意左右聞此亦不必待其劒㦸如林流血成川然後爲復來計矣且是目今便覺上下人情不通有話便難出口適因蔡倉見問巳告之云不若便關諸司再煩左右一來權領一職帶取印杖從間道直趨崇化麻沙徃來監糶并措置救荒事目付之簿尉以俟事之略定而歸似亦無不可者不知雅意如何文卿亦說縣中士民盛傳舊尹復來其意似亦可憐不應便恝然弃之也適又與文卿說自今以徃境内有一夫不得其死一夫身𬒳刀創則左右皆不得辤其責切幸察此苦言少回必去之志勿信庸人徇巳忘物之說以誤逺圖恐異日思之不能無追悔也向來此間行事得失當亦有可自警省者或謂却是欠些僞學其言雖可笑然恐有理不審於意云何也閑中讀書奉親足以自樂外物之來聖賢所不能必况吾人手但新學一旦措手而委之庸髠數日前巳互遷象設令人憤歎不能巳而一縣下人若貴若賤若賢若愚無有以爲意者惟曽堅伯相見新帥來以爲士子當相率訴之范仲宣深以爲然而漠然無有應者此亦見人之識見分量之不同也季通之行浩然無㡬㣲不適意丘子服獨爲之涕泣流漣而不能巳處事變恤窮交亦兩得其理也張鄭黄鄧相繼物故吕子約前月亦不起疾殊可傷悼亦是氣運使然豈可專咎章子厚耶元善到霅後一再得書殊恨失計初亦有所迫而然失之不能斷决耳季通在湖南耳根却静然諸遷客聞髙安之報想亦不免打草蛇驚也人生由命非由他此言雖淺誠有味也偶有自江西來者得東坡與何人手簡墨刻適與意會今徃一通可銘坐右也東坡帖附見示及数書皆有逺别惘然之意雖兄之愛我厚然僕本以鐡心石腸望公何乃爾耶吾儕雖老且窮而道理貫心肝忠義填骨髓直湏談笑於死生之際若見僕困窮便相爲邑邑則與不學道者不大相逺矣凡造道深至中必不爾出於相好之篤而巳然朋友之義專務規諌故輙以狂言廣兄意耳兄雖壈坎於時遇事有可尊主澤民者便忘軀爲之禍福得䘮付與造物非兄僕豈發此看訖便可火之不知者以爲詬病也某皇恐則不字疑後道道字恐誤後愛愛字疑一互字上下必有誤吾人不合偶得一官遂以官爲業一日投閑便有食不足之歎彼此皆然然在此則身自當之無所怨悔亦知賢者以親飬之故不能不介念也來春之行不知都下報者云何若非以鈎黨之故則不雖重坐但經赦宥便是無事人只是一堕此城却恐未有出期雖然只是参選然亦湏䑓参出人而前恐又重遭指目湏更審而後道告詞傳聞数聮不曽見全篇㝷常此等只拂略說過今乃鋪叙如行遣禁從帥臣之體不知果是誰筆因便幸略批喻也某却至今不曽受告亦不見報行詞命喫俸半年未曽立案殊不可曉也避地盖出於不得巳其他却無說但後愛兩司對移之命既行彼乃深怨以爲自此發之不知二公經年不通問也時論率兩三月湏有一畨引作近報集議赦條不知意果如何恐亦只爲諸巳行遣人恐死灰之復然耳張帥到未此公遽去朝廷不省所謂議者盖深惜之彼當巳得其說矣來使方今還自府中適此兩日所苦大作力疾草此不能究所欲言然前書計亦非晚當至矣獨樂園圖恐司馬守便之官未暇刻得與之議爲辨一互刻之亦佳但其詩頗有誤字見山䑓詩中陶通明乃陶隱居之别號今作淵明當改正耳前賢遺迹正爾何関人事而使人想象愛慕不能忘雖不得復至其䖏而猶欲見之圖畫之間使其流傳之廣且逺而未至於泯㓕然則爲士君子者其可不力於爲善哉所喻批滿今始得之萬事遲速自有時節固非人力所能爲也代人上書者不知得之何人此人固非佳士然恐亦未應遽至於此當更察之若其果然則誠爲狗彘不食其餘矣彼挾怨妄言者固自不足責也前日亦料從人不欲復過此亟折簡呼文卿令其徃見固欲寄聲昨日得報乃云冬收方冗未能自㧞今承喻及有問道過門之意似亦未便幸更審之大抵欲面言者無它但欲每事詳審持重耳觀人之失亦坐自處未能深静之故若處晦觀明處静觀動則無不察矣前日廖子晦歸說新闕巳爲人所受想巳聞之理勢自應爾也詞命巳行乃東山之筆有塩課入巳之語渠自對人誦之不知巳𬒳受否聞某亦有之渠却云是同官作其勢不應如此但至今不下亦不見人傳誦必是醜詆以媚用事者而深藏以蓋其迹甚可笑也帥幕無事可以讀書而西山南浦號爲天下勝處公餘徙倚亦有足樂然亦更湏擇交勿忘前事之師乃所望耳小坡一著髙似一著此甚不易必是裏靣說得轉了方下得此手脚然此亦至危之機更湏深自防衞一種細故得放過且放過勿令人疑事事皆出於巳乃爲佳耳鄒公亦有安靜之說次第善類湏少安也王巽伯未能去否向語渠㝷獨樂園圖摹刻流布不知曽爲之否不及作書因見幸爲扣之也景初素守於此可驗世路升沉何足深計但得此心無愧所得多矣衞公近得書寄梅巖圖來初欲令作記俄聞溪城之報且罷休矣甚愧不得一逰其間并以文字結縁也至之且得如此亦是一事大抵吾黨例多困窮只得存活得過但是十分亨泰矣後之晚娶深入瘴地似不善便此邦之侯一再通問亦依様畫胡盧荅之不爲難也晦庵先生朱文公續集卷第六閩縣學訓導何器校, WYG: 撰}
