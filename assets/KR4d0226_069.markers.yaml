  front:
  - {type: 'kr:newline', offset: 0, content: '

      ', id: KR4d0226_krp_069-bkkkrnewl1}
  - {type: line-break, offset: 0, content: '', id: KR4d0226_SBCK_069-1a01}
  - {type: variant, offset: 0, length: 1396, content: 晦庵先生朱文公文集卷第六十九雜著禘祫議王制天子七廟三昭三穆與太祖之廟而七諸侯大夫士降殺以兩而祭法又有適士二廟官師一廟之文大抵士無太祖而皆及其祖考也鄭氏曰夏五廟啇六廟周七廟今按啇書巳云七世之廟鄭說恐非顔師古曰父爲昭子爲穆孫復爲昭昭明也穆羙也後以晉室諱昭故學者改昭爲韶其制皆爲中門外之左外爲都宫内各有寢廟别有門垣太祖在北左昭右穆以次而南晋慱士孫毓議天子太祖百世不遷一昭一穆爲宗亦百世不遷宗亦曰世室亦曰祧鄭注周禮守祧曰宗亦曰祧亦曰世室周禮言守祧之官鄭氏曰遠廟爲祧周爲文武之廟遷主藏焉又曰遷主所藏曰祧先公之遷主藏于太祖后稷之廟先王之遷主藏於文武之廟群穆於文群昭於武明堂位有文世室武世室鄭氏曰世室者不毀之名也二昭二穆爲四親廟髙祖以上親盡則毀而遞遷昭常爲昭穆常爲穆昭之二廟親盡則毁而遷其主于昭之宗曾祖遷于昭之二新入廟者祔于昭之三而髙祖及祖在穆如故穆廟親盡放此新死者如當爲昭則祔於昭之近廟而自近廟遷其祖於昭之次廟而於主祭者爲曽祖自次廟遷其高祖于昭之世室盖於主祭者爲五世而親盡故也其穆之兩廟如故不動其次廟於主祭者爲髙祖其近廟於主祭者爲祖也主祭者没則祔于穆之近廟而逓遷其上放此凢毀廟遷主改塗易穆示有所變非盡毀也見榖梁傳及注諸侯則無二宗大夫則無二廟其遷毁之次則與天子同傳毁廟之主藏於太祖儀禮所謂以其班祔檀弓所謂祔于祖父者也曲禮云君子抱孫不抱子此言孫可以爲王父尸子不可以爲父尸鄭氏云以孫與祖昭穆同也周制自后稷爲太祖不窟爲昭鞠爲穆以下十二世至太王復爲穆十三世至王季復爲昭十四世至文王又爲穆十五世至武王復爲昭故書稱文王爲穆考詩稱武王爲昭考而左氏傳曰太伯虞仲太王之昭也虢仲號叔王季之穆也又曰管蔡魯衛文之昭也耶晉應韓武之穆也盖其次序一定百世不易雖文王在右武王在左嫌於倒置而諸廟别有門垣足以各全其尊𥘉不以左右爲尊卑也三代之制其詳雖不得聞然其大畧不過如此漢承秦敝不能深考古制諸帝之廟各在一處不容合爲都宫以序昭穆韋元成傳云宗廟異處昭穆不序但考周制先公廟在岐周文王在豐武王在鎬則都宫之制亦不得爲與漢亦無甚異末詳其說貢禹韋元成康衡之徒雖欲正之而終不能盡合古制旋亦廢罷後漢明帝又欲遵儉自抑遺詔無起寢廟但藏其主於光武廟中更衣别室其後章帝又復如之後世遂不敢加而公私之廟皆爲同堂異室之制見後漢明帝紀祭祀志志又云其後積多無别而顯宗但爲陵寢之號自是以來更歷魏晉下及隋唐其間非無奉先思孝之君据經守禮之臣而皆不能有所裁正其弊至使太祖之位下同孫子而更僻處於一隅旣無以見其爲七廟之尊群廟之神則又上厭祖考而不得自爲一廟之主以人情而論之則生居九重窮極壯麗而沒祭一室不過尋丈之間甚或無地以容鼎爼而隂損其數孝子順孫之心於此宜亦有所不安矣肆我神祖始獨慨然深詔儒臣討論舊典盖將以逺迹三代之隆一正千古之繆甚盛舉也不幸未及營表世莫得聞秉筆之士又復不能特書其事以詔萬世今獨其見於陸氏之文者爲可考耳然其所論昭穆之說亦未有定論圗說在後獨原廟之制外爲都宫而各爲寢廟門垣乃爲近古但其禮本不經儀亦非古故儒者得以議之如李清臣所謂畧于七廟之室而爲祠於佛老之側不爲木主而爲之象不爲禘祫烝嘗之祀而行一酌奠之禮楊時所謂舎二帝三王之正禮而從一繆妄之叔孫通者其言皆是也然不知其所以致此則由於宗廟不立而人心有所不安也不議復此而徒欲廢彼亦安得爲至當之王者始受命諸侯始封之君皆爲太祖以下五世而迭毀毀廟之主藏乎太祖五年而再毀祭言一禘一祫也祫祭者毀廟與未毀廟之主皆合食於太祖父爲昭子爲穆孫復爲昭古之正禮也, WYG: ''}
