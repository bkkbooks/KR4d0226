  - {type: variant, offset: 20099, length: 862, content: 體此心也若夫游於藝則又所以防閑於外而涵養於中耳子曰天生徳於予云云竊謂一有聖人素其位而行無入而不自得也豈若常人隕獲於患難畔天之命哉夫子之身云云子曰三年學不至於榖云云施工之㫁續而然耳有此章之意竊恐聖人欲使人知夫善非作輟之可成必積而後至蓋不惟可以懲學者玩善之病而又足以啓學者進善之心也此章意恐未然云云澤及於後世矣一有顔淵喟然嘆曰至末由也巳某竊謂自仰之彌高至忽焉在後此顔子賛歎道體之大也道無方也非力之所能中故雖仰之鑚之而益高堅也道無形也非見之所能及故雖瞻之而在前在後也蓋至理中著一物不得只仰之鑚之瞻之忽之之處便巳非中矣恐湏物格知至以上始能及此而非學者知力之所能到也然在學者却當用力從事於致知主敬之功所以求止乎中也乃若知至格物則聴夫工夫之自至而非旦暮之可期也所以夫子循循善誘使學者循序以求而不使之躐等以進博文約禮乃實下手處張先生所謂集衆義於聞見之間宅至理於隱微之際是也欲罷不能顔子無一息間㫁而自不能巳也既竭吾才工夫深而力到也如有所立卓爾誠之形而行之著也雖欲從之末由也巳雖見是而未能遂止乎是非顔子未止於中蓋未能從容中道由中而行耳故曰末由也巳未逹一間者其在兹歟抹處皆有病約禮當從侯先生說主敬二字亦該未盡子張問行云云不能揜於省察之際矣一有夫然後可行也參前倚衡云者理之形非實有物也今以日用言之以存主爲本至事物之來知之所覺心之所慊乃力行之庶㡬此意循循而有進焉若如楊氏其者云云其字正指忠信篤敬耳云云在目前也子曰不曰如之何如之何者吾末如之何也巳矣某竊謂如之何猶言無可奈何也天下無不可爲之事聖人不曰如之何也學未至而歸咎於質事不成而歸咎於命國不治而歸咎於時皆付之無可奈何者付之無可奈何則巳矣雖聖人亦無如之何矣此章數說皆通未如何者的爲正意且存之可也子曰惟女子小人爲難養也近之則不遜逺之則怨某竊謂此所謂小人乃服役之人僮僕之類若泛言小人則不應謂之養耳女子小人近之則傷褻逺之則寡恩不遜與怨皆感之之道有未至耳其惟嚴於治巳恕以待人則不遜與怨庶免乎此章鄙意亦如此答程正思所論放心之說云云存養省察不是兩事也一有彦忠不能塟其親逺承􅉠恤足見朋友之義渠甚感激同舎亦無不動心也, WYG: 書}
