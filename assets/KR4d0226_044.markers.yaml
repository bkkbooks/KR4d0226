  - {type: variant, offset: 24698, length: 0, content: '', WYG: 欽定四庫全書晦庵集卷四十五宋朱子撰書知舊門人問答答虞士朋太中易有太極是生兩儀者一理之判始生一竒一偶而為一畫者二也兩儀生四象者兩儀之上各生一竒一偶而為二畫者四也四象生八卦者四象之上各生一竒一偶而為三畫者八也爻之所以有竒有偶卦之所以三畫而成者以此而已是皆自然流出不假安排聖人又已分明説破亦不待更著言語别立議論而後明也此乃易學綱領開卷第一義然古今未見有識之者至康節先生始傳先天之學而得其説且以此為伏羲氏之易也説卦天地定位一章先天圖乾一兊二離三震四巽五坎六艮七坤八之序皆本於此若自八卦之上又放此而生之至於六畫則八卦相重而成六十四卦矣六十四卦之上又放此而生之至十二畫則六十四卦相重而成四千九十六卦矣焦貢易林是也剛柔雖若各有所偏必相錯而後得中然在乾坤二卦之全體當剛而剛當柔而柔則不待相錯而不害其為全矣其爻位之無過不及者如乾坤之二五亦不待相錯而不害其為中矣隂陽變化而太極之妙無不在焉於此蓋可見也今謂乾剛坤柔便有所偏恐於二卦之彖及二五之爻詞有不通者其論四爻過不及之淺深則為精宻非他説之所及矣用九用六當從歐陽公說為揲蓍變卦之凡例蓋陽爻百九十二皆用九而不用七隂爻百九十二皆用六而不用八也特以乾坤二卦純陽純隂而居篇首故就此發之此歐陽公舊説也而愚又嘗因其說而推之竊以為凡得乾而六爻純九得坤而六爻純六者皆當直就此例占其所繫之辭不必更㸔所變之卦左傳蔡墨所謂乾之坤曰見羣龍无首者可以見其一隅也蓋羣龍无首卽坤之牝馬先迷也利永貞卽乾之不言所利也學而首章甚善但學之一字實兼致知力行而言不可偏舉今所引顔子工夫乃専為力行事耳二章所謂不失其愛敬之本心則仁不可勝用者甚善但有子亦據實理而正言之非曲為當世而發也巧言令色求以悅人則失其本心之德矣不待利己害人然後為不仁也三年無改乃謝氏之説其意美矣然恐過之不若游氏尹氏之為實也無諂無驕一章文義東坡得之蓋無諂無驕隨事知戒足以自守矣然未見其於全體用功而有自得處也樂與好禮乃見其心之所存有非貧富之所能累者此子貢所以有切磋琢磨之譬也治骨角者旣切而復磋之治玉石者旣琢而復磨之皆先略而後詳先粗而後精之意大學乃㫁章取義不必引以為説也如愚之説為不知之説焉得知之説觀過之説皆恐失之過高後亦多類此者詳其意味似從張無垢議論中來其為得失非但訓詁文義之間而已此須異日子細商量今未敢容易說也一以貫之乃聖門末後親傳密旨其所以提綱挈領統宗會元蓋有不可容言之妙當時曾子黙契其意故因門人之問便著忠恕二字形容出來則其一本萬殊脉絡流通之實益可見矣然自秦漢以來儒者皆不能曉直至二程先生始發明之而其門人又獨謝氏侯氏為得其説今不考焉而但以忘物我者為言吾恐其失之逺也況夫子以此語告子貢乃因博學多識而發其與忘物我者又有何關涉耶答虞士朋昨承寄示趙倉易論語説足浣愁疾易説簡易精密不惟鄙意多所未及警發之深而近世諸儒説不到處亦甚多甚不易其玩索至此深恨未得一見靣扣其詳也但象數乃作易根本卜筮乃其用處之實而諸儒求之不得其要以至苛細繳繞令人厭聽闕一向屏棄闊略不復留意却恐不見制作綱領語意來歴似亦未甚便也昨於乾坤二卦略記所疑之一二今謾錄呈幸為詳之試因話次以盛意扣之看有何説却以見報熹與之未相識不欲遽相辯難千萬不必云熹所説也論語説有意古人為己之學意亦甚正但覺看得張無垢文字太熟用意太切立説太高反致失却聖人本指處多今亦未欲遽論二説謾徃并煩扣之亦勿云熹所寄也答游誠之九言示喻讀書玩理次第甚慰所懷但嚴立功程寛著意思久之自當有味不可求欲速之功也所論日用功夫尤見其為己之意但心一而已所謂覺者亦心也今以覺求心以覺用心紛挐廹切恐其為病不但揠苖而已不若日用之間以敬為主而勿忘焉則自然本心不昧隨物感通不待致覺而無不覺矣故孔子只言克己復禮而不言致覺用敬孟子只言操存舍亡而不言覺存昧亡謝先生雖喜以覺言仁然亦曰心有知覺而不言知覺此心也請推此以騐之所論得失自可見矣若以名義言之則仁自是愛之體覺自是知之用界分脉絡自不相關但仁統四德故人仁則無不覺耳然謝子之言侯子非之曰謂不仁者無所知覺則可便以心有知覺為仁則不可此言亦有味請試思之克齋記近復改定今别寫去後面不欲深詆近世之失波動危廹等語皆已削去但前所論性情脉絡功夫次第自亦可見底裏不待盡言而後喻也因見南軒試更以此意質之當有以相發明爾答游誠之仁覺之説前書已詳報矣此書所喻惻隱似非出於覺者此語甚佳但所謂覺之一字未必不佳者鄙意亦非以覺為不佳但謂功夫用力處在敬而不在覺耳上蔡云敬是常惺惺法此言得之但不免有便以惺惺為仁之意此則未穏當耳所喻從前馳騖之過此非明者不能自知甚善然旣自知之則亦自改之而已它人不得而與也窮理涵養要當並進葢非稍有所知無以致涵養之功非深有所存無以盡義理之奥正當交相為用而各致其功耳答游誠之心體固本静然亦不能不動其用固本善然亦能流而入於不善夫其動而流於不善者固不可謂心體之本然然亦不可不謂之心也但其誘於物而然耳故先聖只説操則存存則靜而其動也無不善矣舍則亡於是乎有動而流於不善者出入無時莫知其鄉出者亡也入者存也本無一定之時亦無一定之處特係於人之操舍如何耳只此一句説得心之體用始終眞妄邪正無所不備又見得此心不操卽舍不出卽入别無閒處可安頓之意若如所論出入有時者為心之正然則孔子所謂出入無時者乃心之病矣不應却以惟心之謂與一句直指而總結之也所答石吕二書寫呈但子約書中語尚有病當時不暇子細剖析明者擇焉可也答吳伯起成都之諾乃爾輕發可怪然亦在我者有以致之但當自省不當責人也渠近辟韜仲不下次第愈縮手矣趙總卿頃得書甚相念不知所許竟如何然吾之所謂義者無窮而彼之具析體究對移者有盡但十二時中常切照管勿令有滲漏處則彼之來者不足問矣今人戚戚不能信命者固無足道然謂付之造物亦非極摯之語此處儘要見得分明便不動心不可只靠一言半句海上單方便以為足恐事變之來抵當不去恐成好笑也答吳伯起且審聞善感發判然義利之間衰懦之餘警省多矣然一時意氣易得消歇正要朝夕講求義理以培植之不可專恃此便為究竟也答歐陽慶似光祖頃在里中雖屢獲見而常苦匆匆不及盡所欲言然已固知所志之不凡矣今辱惠問乃慨然有志於學甚善甚善抑嘗病今之學者不知古人為己之意不以讀書治己為先而急於聞道是以文勝其質言浮於行而終不知所底止方竊以是反而求之而未之有得也愧辱下問之勤無以稱塞敢私布之不識明者謂之然否答歐陽慶似所需序文迫歲冗甚不暇執筆然為學治己之方前此講之熟矣當官之務推此而達之則奉法愛民不求聞達皆吾分内事耳此固不待拙者之言又况其外之文乎吕氏童蒙訓下巻論守官之法亦頗明備暇日更試攷之當有益也答嚴居厚士敦示喻進學加功處甚善觸事未能不為事物所奪只是未遇事時存養未熟所以如此然又别無它岐不可欲速但常存此心勿令間㫁講明義理以栽培之則久當純熟明快矣科舉之習前賢所不免但循理安命不追時好則心地恬愉自無怵廹之累昨見所論三子具體而微似未免太徇時好然務為竒險反使詞義俱不通暢久欲奉告而未及也因此布陳僭易僭易别紙喻及養氣之説足見講學不倦之意但此章文義正自難明且當虛心平氣反復諷誦久當有味今以廹切之心求之正猶治絲而棼之雖欲彊為之説終非吾心所安穿鑿支離愈叛於道矣今且據來喻而畧言之縮字訓直禮書如此處多先儒之言似不可易壹字非訓一便只是一字乃專一之意耳記得程先生有説志專在淫僻豈不動氣氣專在喜怒豈不動志試以是思之知言則知義理之所在無毫釐之差故日用之間有以集義而生浩然之氣詖淫邪遁四字有次序而無彼此之分如楊墨釋老之言無不具此四者然今亦未易遽論也請且如前説反復玩味要之以久自當釋然有解悟處不必廣求徒勞日力只二先生有説處抄出同看可也答丘子野示喻觀玩之别想已有成説兹因下問之及嘗竊思之敢布左右盖易有象八卦六爻然後有辭卦爻之辭筮有變老陽老陰然後有占變爻之辭象之變也在理而未形於事者也辭則各因象而指其吉凶占則又因吾之所値之辭而决焉其示人也益以詳矣故君子居而學易則旣觀象矣又玩辭以攷其所處之當否動而諏筮則旣觀變矣又玩占以攷其所値之吉凶善而吉者則行否而凶者則止是以動靜之間舉無違理而自天祐之吉無不利也盖觀者一見而决玩者反復而不舍之辭也筮短龜長之説惟見於左氏元凱之注理固有之但先王制卜筮之法至嚴至敬虚其心以聽於鬼神專一則應疑貳則差故禮曰卜筮不相襲盖為此也晉獻之欲立驪姫以理觀之不待卜而不吉可知及其卜之不吉也則亦深切著明已矣乃不勝其私意而復筮之是以私心為主而取必於神明也豈有感通之理哉此所以筮之雖吉而卒不免於凶也今不推其所以聽於鬼神者之不專不一而遽欲卽此以較龜筮之短長恐未免乎易其言之責也理則一而已矣其形者則謂之器其不形者則謂之道然而道非器不形器非道不立盖陰陽亦器也而所以陰陽者道也是以一陰一陽徃來不息而聖人指是以明道之全體也此一陰一陽之謂道之説也不審高明以為然否答丘子服膺寵辱若驚貴大患若身貴猶重也言寵辱細故而得之猶若驚焉若世之大患則尤當貴重之而不可犯如愛其身也寵為下者寵人者上於人者也寵於人者下於人者也是辱固不待言而寵亦未足尚今乃得之而猶若驚而况大患與身為一而可以不貴乎若使人於大患皆若其將及於身而貴重之則必不敢輕以其身深預天下之事矣得如是之人而以天下託之則其於天下必能謹守如愛其身而豈有禍敗之及哉老子言道之眞以治身又言身與名孰親而其言外其身後其身者其實乃所以先而存之也其愛身也至矣此其學之傳所以流而為楊氏之為我也蘇子由乃以忘身為言是乃佛家夢幻泡影之遺意而非老氏之本眞矣答丘子服兩日連得手示為慰貴大患如此説固好但後一貴字别為一義似未安耳出生入死章諸家説皆不愜人意恐未必得老子本指今只自夫何故以下看則語意自分明盖言人所以自生而趨死者以其生生之厚耳聲色臭味居處奉養權勢利欲皆所以生之者惟於此太厚所以物得而害之善攝生者遠離此累則無死地矣此却只是目前日用事便可受持他旣難明似亦不必深究也如何如何答李深卿泳昨擇之特示别紙教告甚悉時亦不暇奉報然因其行嘗口附區區不知高明以為然否夫儒釋正邪之異未易以口舌爭但見得分明則觸事可辨今未暇逺引且以來教所舉中庸首章論之則吾之所謂一者彼以謂二吾之所謂實者彼以為虚其邪正得失於此已判然矣然世之學者於吾學初未嘗端的用功而於彼説顧嘗著力研究是以於彼説日見其高妙而視吾學為不足為陷溺益深則遂不復自知其為陷溺是雖以孟子之辨守而告之恐未易㧞而况今日才卑德薄之人乎然有一於此疑若可捄盖天理人心自有至當我順彼逆體勢不侔是以為吾學者深拒力排未嘗求合於彼而為彼學者支辭蔓説惟恐其見絕於我是於其心疑亦有所不安矣誠如是也則莫若試於吾學求其所以用力者如徃時之一意於彼而從事焉假以歲時不使間㫁則庶乎其可以得本心之正而悟前日之非矣所論不當啓後學輕視前輩之弊此則至論敢不承教然觀聖賢議論雖未嘗不推尊前輩而其是是非非之際亦未甞有毫髪假借之私若孟子之論伊尹夷惠抑揚其辭不一而足亦可見矣若吕氏之學在近世則亦近正矣然觀正獻對神祖空寂之問則以堯舜所知所急為兩途觀原明述正獻學佛之事則見正獻所學所言為二致諸若此類不可殫舉盖猶未免於習俗之蔽也以前輩之故一例推尊禁不得復議其失是孔子不當論臧文仲之不仁不智且當直許子文文子以仁然後為可也擇之講論精宻務求至當似未為過但其間却實不免有輕視前輩之心此則不可去年因書盖甞箴之正如老兄之意但不敢謂縁此都不得别白是非也凡此二條皆近世學者深錮之弊是以因來喻之及而極論之願試以愚言思之一事正則其餘皆正矣盖理無二致非如老兄所論中庸首章三句别為兩事與吕氏所知所急所學所言有彼此之殊也鄙見如此或有未當因來却望見教勿憚反復不有益於彼則必有益於此矣千萬至懇至懇答胡寛夫示喻疑義數條足見别後進學之篤甚慰甚慰大概如此看更須從淺近平易處理會應用切身處體察漸次接續勿令間㫁久之自然意味浹洽倫類貫通切不可容易躁急厭常喜新專揀一等難理會無形影底言語暗中想像杜撰穿鑿枉用心神空費日力更勿與人辨論釋氏長短自家未有所見判㫁它不得况廢却自家合做底𦂳切工夫却與人爭一場閒口舌有損無益尤當深戒也主一之功學者用力切要處承於此留意甚善但其它推説似太汗漫多病痛以熹觀之似不必如此只就如今做書會處理會便見漸次大抵自家所看文字及提督學生工夫皆須立下一定格目格目之内常切存心格目之外不要妄想如看論語今日看到此段卽專心致意只看此段後段雖好且未要看直待此段分曉説得反復不差仍且盡日玩味明日却看後段日用凡事皆如此以類推之可見不然雖是好事亦名妄想此主一之漸也若不如此方寸之間頃刻之際千頭萬緒卒然便要主一如何按伏得下試更思之我不欲人之加諸我吾亦欲無加諸人與子思所謂施諸已而不願亦勿施於人此言且只各就本句中體味踐履久之純熟自見淺深今亦不須彊分别也大抵學者之患在於好談高妙而自己脚根却不㸃地正所謂道在邇而求諸遠事在易而求諸難也大學解想亦㸔未到四哥又自有日課不欲妨它教人者須常存此心郭子和中庸頃曾見之切不可看看著轉迷閟也其它所欲文字合用者前已附去其他非所急者更不上内想自曉此意千萬息却此心且就日課中逐些理㑹慤實踐履方有意味千萬千萬後生輩誦書亦如吾人講學只是量力不要貪多仍須反覆熟讀時時温習是要法耳答吳德夫獵承喻仁字之説足見用力之深熹意不欲如此坐談但直以孔子程子所示求仁之方擇其一二切於吾身者篤志而力行之於動靜語黙間勿令間㫁則久久自當知味矣去人欲存天理且據所見去之存之功夫旣深則所謂似天理而實人欲者次第可見今大體未正而便欲察及細微恐有放飯流歠而問無齒决之譏也如何如何易之為義乃指流行變易之體而言此體生生元無間㫁但其間一動一靜相為始終耳程子曰上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神正謂此也此體在人則心是已其理則所謂性其用則所謂情其動靜則所謂未發已發之時也此其為天人之分雖殊然靜而此理已具動而此用實行則其為易一也若其所具之理所行之用合而言之則是易之有太極者昨來南軒嘗謂太極所以明動靜之藴盖得之矣來喻以不易變易為未發已發恐未安試以此説推之非惟見得易字意義分明而求仁用力要處亦可得矣答楊子直方承喻太極之説足見用力之勤深所歎仰然鄙意多所未安今且畧論其一二大者而其曲折則托季通言之盖天地之間只有動靜兩端循環不已更無餘事此之謂易而其動其靜則必有所以動靜之理焉是則所謂太極者也聖人既指其實而名之周子又為之圖以象之其所以發明表著可謂無餘藴矣原極之所以得名盖取樞極之義聖人謂之太極者所以指夫天地萬物之根也周子因之而又謂之無極者所以著夫無聲無臭之妙也然曰無極而太極太極本無極則非無極之後别生太極而太極之上先有無極也又曰五行陰陽陰陽太極則非太極之後别生二五而二五之上先有太極也以至於成男成女化生萬物而無極之妙盖未始不在是焉此一圖之綱領大易之遺意與老子所謂物生於有有生於無而以造化為眞有始終者正南北矣來喻乃欲一之所以於此圖之説多所乖礙而不得其理也熹向以太極為體動靜為用其言固有病後已改之曰太極者本然之妙也動靜者所乘之機也此則庶幾近之來喻疑於體用之云甚當但所以疑之之説則與熹之所以改之之意又若不相似然盖謂太極含動靜則可以本體而言也謂太極有動靜則可以流行而言也若謂太極便是動靜則是形而上下者不可分而易有太極之言亦贅矣其它則季通論之已極精詳且當就此虛心求之久當自明不可别生疑慮徒自攪繞也持敬之説不必多言但熟味整齊嚴肅嚴威儼恪動容貎整思慮正衣冠尊瞻視此等數語而實加功焉則所謂直内所謂主一自然不費安排而身心肅然表裏如一矣豈陸棠之謂哉彼其挾詐欺人是乃敬之賊耳今反以敬之名歸之而謂敬之實眞有不足行者豈不誤甚矣哉大抵身心内外初無間隔所謂心者固主乎内而凡視聽言動出處語黙之見於外者亦卽此心之用而未嘗離也今於其空虚不用之處則操而存之於其流行運用之實則棄而不省此於心之全體雖得其半而失其半矣然其所得之半又必待有所安排布置然後能存故存則有揠苖助長之患否則有舍而不芸之失是則其所得之半又將不足以自存而失之孰若一主於敬而此心卓然内外動靜之間無一毫之隙一息之停哉叔京來書尚執前説而來喻之云亦似未見内外無間之實故為此説并以寄叔京而所以答叔京者亦并寫呈幸詳思之却以見告也答楊子直來書譙責不少置不記前書云何何所得罪一味皇恐而已但來書旣云鐫責諄切其後又謂不教而棄之殊不可曉如前書尚在望令小吏録以見寄當一一供答以聽裁處熹却自覺尚且耐煩不至如老兄激發怨懟之深也且如向來出川時所予書無非怨懟之語此非怨熹之詞想自記得故竊疑之以為士君子去就離合之際不當如此因答書中頗致寛解之詞未有相貶外處如後來見教政事條目其間亦有一二心未安處故因筆自解初非相貶外不知今來所謂貶外是指何語恐實有之而熹不自覺者卽望一二疏示容其改過幸甚幸甚且如今書四子之説極荷見教然此書之目只是一時偶見大學太薄裝不成册難作標題故如此寫亦欲見得四書次第免被後人移易顚倒只如大學據程先生説乃是孔氏遺書而謂其他莫如論孟則其尊之固在論語之右非熹之私説矣今必欲抑之而尊論語復何説乎竊恐此意未必為大學壓論語發恐又只是景迂作祟意欲擯斥孟子耳萬一揣料失當所言非是亦告且為平心息怒子細見教使得反復以究實是之歸幸甚幸甚平時與老兄講論常是不曾合殺只被中間一句不合尊意便蒙見怒更不暇復論前語之是非而一向且爭閒氣所以老兄見教之美意與區區獻疑之誠懇皆不見其有益而反積為後日無窮之怨隙所謂忠告善道不可則止者豈若是乎世衰道䘮吾黨日孤見自無事不要似此尋事厮炒使旁觀指目益為道學之病乃是助彼自攻古人所謂將鬭而自㫁一手以求必勝者也願老兄自今或有異同之論且耐煩息怒而極論理之是非則理日益明氣日益和雖使十反極其紛挐亦自無忿懟之撓矣老兄見責不能受人盡言而前後怨忿之詞至於如此請出兩家之書付之識者使其審訂則誰為不能受言者必有在矣王肅方於事上而好人佞已此不絜矩之過也願更思之下交淺劣不勝至望答楊子直學者墮在語言心實無得固為大病然於語言中罕見有究竟得徹頭徹尾者盖資質已是不及古人而工夫又草草所以終身於此若存若亡未有卓然可恃之實近因病後不敢極力讀書閒中却覺有進步處大抵孟子所論求其放心是要訣爾答楊子直前日晦伯人還已上狀矣但忘記一事欲煩為作小楷四箴百十字今納界行去暇日得為揮染甚幸此箴舊見只是平常説話近乃覺其旨意之精宻眞所謂一棒一條痕一摑一掌血者故欲揭之座隅使不失墜云耳時節不是當字學亦絕故又欲得妙札時以寓目以祛病思幸勿靳也答楊子直此庚申閏二月二十七日書去夢奠十二日熹病日覺沉重而醫者咸以為可治但服藥殊不見効亦付之無可奈何安坐拱手以聽天命耳曾光祖在此備見當能道之也此間諸况曲折亦不暇詳布渠亦可問也前書所求妙札曾為落筆否便中早得寄示為幸近以書懇益公求作先人墓碑不知渠肯作否若肯作又并書卽不敢奉凂不然又當有請也夏小正文已編入禮書但所見數本率多舛誤所示未暇參考少俟功夫子細校畢卽納還也四民月令中亦見當時風俗及其治家齊整卽以嚴致平之意推尋也亦俟抄了并納還不知近日更得何異書便中望見告此却亦讀得舊書但鍜鍊得愈純熟亦頗有實用不專是空言也此間新定參同契曾寄去否如未有可喻及當續致也此書理㑹他下手處不得但愛其文古雅因校此本買櫝還珠甚可笑也光祖家有泉石頗佳已屬令去求詩能為出數語否王才臣寄示所得諸圖幽閒淡泊彼間風俗嗜好不同未必識此味也答吕季克承示及環叟之書粗釋所疑此公舊亦聞之平父伯崇皆與之相識然不聞其為濓溪家子弟也其所著書乃如此若原説者則可謂青過於藍矣道學不明異端競起士雖有意於學而浮沉世故不能篤信聖言躬行黙體以至不疑之地鮮有不没溺者甚可歎也八桂久不得書昨亦見其所與尊兄書論原説者大意甚正但似未究其巧譎之情耳答廖子晦德明德明舊嘗極力尋究於日用事上若有所感而知吾身之具有者廣大虛靜範圍天地根本萬物易所謂寂然不動中庸所謂喜怒之未發者是也德明將以此為大本漸加修治之功未知所見是否聖門之學下學而上達至於窮神知化亦不過德盛仁熟而自至耳若如釋氏理須頓悟不假漸修之云則是上達而下學也其與聖學亦不同矣而近世學者每欲因其近似而説合之是以為説雖詳用心雖苦而卒不近也中庸所謂喜怒哀樂之未發謂之中發而皆中節謂之和只是説情之未發無所偏倚當此之時萬理畢具而天下萬物無不由是而出焉故學者於此涵養栽培而情之所發自然無不中節耳故又曰中者天下之大本和者天下之達道此皆日用分明底事不必待極力尋究忽然有感如來喻之云然後為得也必若此云則是溺於佛氏之學而已然為彼學者自謂有見而於四端五典良知良能天理人心之實然而不可易者皆未甞畧見彷彿甚者披根㧞本顚倒錯繆無所不至則夫所謂見者殆亦用心太過意慮冺絕恍惚之間瞥見心性之影象耳與聖門眞實知見端的踐履徹上徹下一以貫之之學豈可同年而語哉程子以敬教人自言主一之謂敬不之東又不之西不之此又不之彼如此則何時而不存然欲到得此功夫須如釋氏攝心坐禪始得德明又慮至此成正與助長故近日又稍體究禮樂不可斯須去身之説盖禮則嚴謹樂則和樂兩者相須而後能故明道先生旣以敬教人又自謂於外事思慮儘悠悠又曰旣得後便須放開不然却只是守故謝子因之為展托之論德明又恐初學勢須把持未敢便習展托於斯二者孰從孰違雖然是固操存舍亡之意而孔氏教人求仁為先竊謂仁人心也克己之私而循天之理則本心之仁得矣夫復何事嘗試求之覺得難甚先難後獲寧不信然二先生所論敬字須該貫動靜看方得夫方其無事而存主不懈者固敬也及其應物而酬酢不亂者亦敬也故曰毋不敬儼若思又曰事思敬執事敬豈必以攝心坐禪而謂之敬哉禮樂固必相須然所謂樂者亦不過謂胸中無事而自和樂耳非是著意放開一路而欲其和樂也然欲胸中無事非敬不能故程子曰敬則自然和樂而周子亦以為禮先而樂後此可見也旣得後須放開不然却只是守者此言旣自得之後則自然心與理㑹不為禮法所拘而自中節也若未能如此則是未有所自得纔方是守成法之人爾亦非謂旣自得之又却須放教開也克己復禮固非易事然顔子用力乃在於視聽言動禮與非禮之間未敢便道是得其本心而了無一事也此其所以先難而後獲歟今言之甚易而苦其行之之難亦不考諸此而已矣明道先生云鳶飛戾天魚躍于淵言其上下察也與必有事焉而勿正心同德明竊謂萬物在吾性分中如鑑中之影仰天而見鳶飛俯淵而見魚躍上下之見無非道體之所在也方其有事而勿正之時必有參乎其前而不可致詰者鳶飛魚躍皆其分内耳活潑潑地智者當自知之鳶飛魚躍道體無乎不在當勿忘勿助之間天理流行正如是爾若}
