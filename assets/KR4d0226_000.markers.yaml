能於是書句句字字深思而熟翫之庻有以知其無非精義宻理之所存毋使摹刻旣多束書不觀乃貽或者之誚云咸淳元年六月朔迪功郎建寧府建安書院山長黄鏞謹書晦庵先生朱文公别集序候官縣儒學訓導劉簮校文公續集序遂生世不早不及檐簦躡屩於先生之門聞道又晚不克築室反場以從先生于没旣脫場屋讀四經而心樂焉顧義理精深莫造其詣而先生長者駸駸没矣歲在癸卯遂假守建安從門人弟子之存者而求其議論之極則王濳齋巳刻之方冊間從侍郎之子請亦無所獲惟蔡西山之孫覺軒早從之遊抄録成秩劉文昌家亦因而抄掇悉以付友人劉叔忠刋落其煩而考訂其實繼是而有得焉固無所遺棄也抑是書之作多出於晚年非嘗與西山講明易曆則時異事左與世枘鑿今聖道昭明士生其時者惟恐讀其書之晚安知後之造道者不在於茲乎此君子所當自力也觀者尚勉之淳祐五年正月日後學王遂序晦庵先生朱文公續集目錄第一卷答黄直卿第二卷答蔡季通第三卷答蔡季通答蔡伯靜答蔡仲黙第四卷上下答劉晦伯答劉韜仲第五卷答吕東萊與王尚書佐答趙都運善譽與田侍郎子真與章侍郎茂獻答尤尚書袤答郭察院邦瑞答郭邦逸答羅叅議與羅師孟師舜兄弟答羅縣尉與林安撫第六卷與趙昌甫答江隱君與鄭景實粟與饒廷老與張孟逺答劉德修與方耕道回劉知縣君房與蔡權郡南康答盧提幹答儲行之第七卷答黄子厚銖答丘子服􅈾與劉平父答王樞使與方伯謨答俞壽翁答曽景建答俞景思與陳同父答李繼善孝述第八卷答折憲知常與黄知府答江清卿答滕誠夫與葉彦忠答李伯諌答趙景昭答毛朋壽答馮竒之柯與王撫州阮與長子受之跋韋齋與祝公書跋韋齋書昆陽賦跋陸務觀詩跋魏丞相使虜帖第九卷答劉韜仲間目第十卷答李繼善間目第十一卷答劉德華晦庵先生朱文公續集目録終, WYG: ''}
