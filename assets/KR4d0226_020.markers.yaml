  - {type: line-break, offset: 0, content: '', id: KR4d0226_SBCK_020-1a01}
  - {type: variant, offset: 0, length: 1404, content: 晦庵先生朱文公文集卷第二十申請請徐王二生充學賔申縣劄子契勘縣學教集生徒漸成次第但職事員數旣少又皆頗有分職以此不得專意教導竊見本縣進士徐應中留意講學議論純正進士王賔天資朴茂操履堅慤求之軰流未見其比乞從縣司行下本學具禮差人敦請赴學特給厨饌待以賔客之禮不惟使生徒覩其言行得以矜式亦庶幾士民向風有所興勸云云代同安縣學職事乞立蘇丞相祠堂狀右某等伏覩故觀文殿大學士太子太保致仕贈司空趙郡蘇公道徳博聞號稱賢相立朝一節終始不虧自其高曽世居此縣比因遊宦始寓丹陽今忠義滎陽二坊故宅基地宛然尚在而後生晚學不復講聞前賢風節學問源流是致士風日就彫弊某等今欲乞改滎義坊爲丞相坊仍於縣學空閑地架造祠堂一所不惟増修故事永前烈之風聲庶以激厲將來俾後生之竦飭謹具狀申主簿學士伏乞備申縣衙照㑹施行申嚴昏禮狀竊惟禮律之文昏姻爲重所以别男女經夫婦正風俗而防禍亂之原也訪聞本縣自舊相承無昏姻之禮里巷之民貧不能聘或至奔誘則謂之引伴爲妻習以成風其流及於士子富室亦或爲之無復忌憚其弊非特乖違禮典瀆亂國章而巳至於妬􅎱相形稔成禍釁則或以此殺身而不悔習俗昏愚深可悲憫欲乞檢坐見行條法曉諭禁止仍乞備申使州檢㑹政和五禮士庶婚娶儀式行下以慿遵守約束施行舉柯翰狀照對縣學見缺直學一員竊見進士柯翰守道恬退不隨流俗專以講究經㫖爲務行年五十亹亹不倦置之學校必能率勵生徒興於義理之學少變奔競薄惡之風欲乞備申使府差𥙷施行與曽左司事目劄子熹巳具前劄復有愚懇并以凂聞事目如後一本軍㳟奉聖㫖打造歩人弓箭手鐵甲一年以三百日爲期兩日一副昨巳打造到一百五十副了畢申乞起發繼凖樞密院劄子檢坐元降指揮只令如法樁收竊縁上件鐵甲計用皮鐵匠一萬八千工錢五千二百餘貫匠人多係逺鄕農民追呼搔擾離家失業不無愁歎錢除給降到見錢乳香數外尚欠七百餘貫乳香變賣不行不敢科抑又兌支過一千一百八十餘貫𥘉謂朝廷别有急切用處今乃但令本處椿收徒使州縣勞民費財以供不急之用巳爲非策又况椿收日乆皮線爛斷札片鏽澁不堪使用亦有深可惜者設若遂爲嵗例則其爲害無有窮巳尤爲不便欲望一言密贊廟堂特賜開陳將巳造者各令發赴比近屯駐軍馬去處披帶教閱日夕使用免致朽損仍降指揮向後年分更不打造則州縣民間不勝幸甚或慮缺於武備即乞行下諸軍取㑹累年以來中外製造鐵甲數目不少旣是乆無征戰不應無故損失湏管契勘見收管數目若干便見虚實如有不足亦可令諸州有作院處多募役兵漸次打作庶無闕事一本軍昨來奉行増種二麥指揮逐年所申漸次増廣至淳熈五年三縣共種一千四百餘頃内星子縣最爲窄㣣巳占三百餘頃近㨿知縣王仲傑申本縣今年所種巳是増多然實計之所種不過六千餘畒未敢循習舊例供申虚數熹昨在田里素聞此事皆是官司立定數目行下鄕村妄亂供申公行欺罔遂判其狀行下依實供申及行下兩縣亦不得循習舊弊欺罔朝廷去訖將來申到比之舊數必是大叚虧少若朝廷以此加罪固無可言萬一縁此别行根究竊恐其他州軍官吏有任其咎者在熹私義亦所未安欲乞一言密贊廟堂别作開陳恐日前所申有未實處立限許令陳首改正違限不首然後坐以誣上之罪使知其罪者得以自新實爲幸甚然所有増種指揮實無𥙷於足食之功徒有損於責實之政而州縣奉行鄕村應對畫圖供帳亦或不能無擾或降指揮直行寢罷尤爲簡靜申南康旱傷乞放租稅及應副軍糧狀伏覩本軍今爲乆闕雨澤早田旱損巳依凖令式具狀奏聞訖照對本軍地荒田瘠稅重民貧昨於乾道七年曽遭大旱伏䝉聖恩放免本年夏秋二稅錢米紬絹共八萬六千三百二十貫石匹及詔本路監司應副軍糧米四千石撥到糴軍糧米錢九千餘貫并撥本軍未起米一萬一千七百餘石本軍借兌, WYG: ''}
