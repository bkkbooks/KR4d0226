  - {type: variant, offset: 12172, length: 0, content: '', WYG: 去上芸香閣時籍溪先生除正字赴館供職閣老新峩豸角冠劉共父自秘書丞除察官留取幽人卧空谷一川風月要人看一章甕牖前頭列畫屏晚来相對静儀刑浮雲一任閒舒卷萬古青山只麽青二章或傳以語胡子子謂其學者張欽夫曰吾未識此人然觀此詩知其庶㡬能有進矣特其言有體而無用故吾為是詩以箴警之庶其聞之而有發也明年胡子卒又四年熹始見欽夫而後獲聞之恨不及見胡子而卒請其目也因叙其本末而書之于䇿以無忘胡子之意云跋張魏公為了賢書佛號世之學士大夫措身利害之塗馳騖而不反是以生死窮達之際每有愧於山林之士觀丞相魏公所以慨然於賢老者則可見矣嗚呼服儒衣服學聖人之道誠能一以義理存心而無惑於利害之際則其所立當如何哉乾道丁亥冬十有二月九日新安}
