  - {type: page-break, offset: 12177, content: '', id: KR4d0226_WYG_081-8a, image: WYG1145/WYG1145-0676a.png}
  - {type: variant, offset: 12178, length: 0, content: '', WYG: 先生嗣子玶所編次已定可繕寫先生啓手足時玶年甚幼以故平生遺文多所散逸後十餘年始復訪求以補家書之缺則皆傳寫失真同異參錯而不可讀矣於是反復讎訂又十餘年然後此二十卷者始克成書無大譌謬熹以門牆洒掃之舊幸獲與討論焉竊以為先生文辭之偉固足以驚一世之耳目然其精微之學静退之風形於文墨有足以發蒙蔽而銷鄙吝之萌者尤覽者所宜盡心也因書其故以告後之君子云乾道癸巳七月庚戌門人朱熹謹書跋張敬夫為石子重作傳心閣銘熹既為尤溪大夫石子重記其修學之事又為作此五銘焉時子重方為藏書之閣於講堂之東中寘周程三君子像旁列書史之櫃而使問名於熹請以傳心榜之而子重遂并以其銘見属熹愚不敏不敢専也且惟子重之為是閣盖非學校􅀴常之則非得知道而健於文者不能有所發明也則轉以属諸廣漢張君敬夫而私記其説如此云跋古今家祭禮右古今家祭禮熹所纂次凡十有六篇盖人之生無不本乎祖者故報本反始之心凡有血氣者之所不能無也古之聖王因其所不能無者制為典禮所以制其精神篤其恩愛有義有數本末詳焉遭秦滅學禮最先壊由漢以来諸儒繼出稍稍綴緝僅存一二以古今異便風俗不同雖有崇儒重道之君知經好學之士亦不得盡由古禮以復於三代之盛其因時述作隨事討論以為一國一家之制者固未必皆得先王義起之意然其存于今者亦無㡬矣惜其散脱殘落將遂泯沒于無聞因竊蒐輯敘次合為一篇以便觀覽庶其可傳於後然皆無雜本可參校往往闕誤不可曉知雖通典唐書博士官舊藏版本亦不足據則他固可知已諸家之書如荀氏徐暢孟馮翊周元陽孟詵徐潤孫日周等儀有録而未見者尚多有之有能采集附益并得善本通校而廣傳之庶㡬見聞有所興起相與損益折衷共成禮俗于以上助聖朝敦化導民之意顧不美哉淳熙元年五月戊戌新安朱熹謹識書近思錄後淳熈乙未之夏東莱吕伯恭来自東陽過予寒泉精舍留止旬日相與讀周子程子張子之書歎其廣大閎博若無津涯而懼夫初學者不知所入也因共掇取其闗於大體而切於日用者以為此編總六百一十二條分十四卷盖凡學者所以求端用力處已治人之要與夫辨異端觀聖賢之大畧皆粗見其梗槩以為窮鄉晚進有志於學而無明師良友以先後之者誠得此而玩心焉亦足以得其門而入矣如此然後求諸四君子之全書沈􅅗反復優柔厭飫以致其博而反諸約焉則其宗廟之美百官之富庶乎其有以盡得之若憚煩勞安簡便以為取足於此而可則非今日所以纂集此書之意也五月五日朱熹謹識跋通鑑紀事本末古史之體可見者書春秋而已春秋編年通紀以見事之先後書則每事别記以具事之首尾意者當時史官既以編年紀事至於事之大者則又採合而别記之若二典所記上下百有餘年而武成金縢諸篇其所紀載或更數月或厯數年其間豈無異事盖必已具於編年之史而今不復見矣故左氏於春秋既依經以作傳復為國語二十餘篇國别事殊或越數十年而遂其事盖亦近書體以相錯綜云爾然自漢以来為史者一用太史公紀傳之法此意固不復講至司馬温公受詔纂述資治通鑑然後千三百六十二年之事編年繫日如指諸掌雖托始於三晉之侯而追本其原起於智伯上系左氏之卒章實相受授偉哉書乎自漢以来未始有也然一事之首尾或散出於數十百年之間不相綴属讀者病之今建安袁君機仲乃以暇日作為此書以便學者其部居門目始終離合之間又皆曲有微意於以錯綜温公之書其亦國語之流矣或乃病其於古無初而區别之外無發明者顧}
