  - {type: variant, offset: 12179, length: 0, content: '', WYG: 弗深考耳機仲以摹本見寄熹始得而讀之為之撫卷太息因記其後如此以曉觀者淳熈二年秋七月甲寅新安朱熹書于雲谷之晦庵云書和静先生遺墨後和静尹公先生遺墨一卷皆先生晚嵗片紙手書聖賢所示治氣養心之要粘之屋壁以自警戒者其家緝而藏之今陽夏趙侯刻寘臨川郡齋摹本見寄熹竊惟念前賢進修不倦死而後已其心炯炯猶若可識而趙侯所以摹刻之意又非取其字畫之工以供好事者之傳玩而已捧讀終篇恍然自失因敢識其後以自詔云淳熈丙申三月丁巳新安朱熹敬書跋張公予竹溪詩婺源雖巖邑而故多文士竹溪丈人張公予其一也好為歌詩精麗宏偉至其得意往往亦造於閒澹其大篇短韻又皆各得其體晚嵗屏居山田水竹之間専用詩酒自娱以忘其老所與游多一時名勝類皆退讓推伏樂稱道之觀吕侍郎諸公所題文編可見矣淳熈丙申予自建安歸故里公予之子珍卿持以見示因得三反咏嘆究觀製作之意信乎其如諸公所稱不誣也然予聞公予天資孝友絶人其篤於兄弟之愛至犯患難取禍辱而不悔有古篤行君子所難能者諸公乃徒盛稱其詩而曽不及此予不能識其説也因竊記編之後以示鄉人使知公予之所以自見於世者不但其詩而已盖於名教庶亦深有補云五月既朢邑子朱熹書跋劉元城言行錄元祐諫議大夫元城劉公安世字器之受學於司馬文正公得不妄語之一言拳拳服膺終身不失故其進而議於朝者無隠情退而語於家者無愧詞今其存而見於文字若此數書者凜然其與秋霜夏日相髙也熹之外舅劉聘君少嘗見公睢陽間為熹言其所見聞與是數書畧同而時有少異惜當時不能盡記其説且其俯仰仰揚之際公之聲容猶恍若相接焉而今亦不可復得矣嗚呼嵗月如流前輩既不可見而其流風餘韻日逺日忘又已如此可勝嘆哉記大學後右大學一篇經二百有五字傳十章今見於戴氏禮書而簡編散脱傳文頗失其次子程子盖嘗正之熹不自揆竊因其説復定此本盖傳之一章釋明明徳二章釋新民三章釋止于至善以上並従程本而増詩云瞻彼淇澳以下四章釋本末五章釋致知並今定六章釋誠意従程本七章釋正心修身}
