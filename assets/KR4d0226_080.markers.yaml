  - {type: variant, offset: 12175, length: 0, content: '', WYG: 帖兒曹外甥輩比過治宇在寅為同年宜盡切磋之義在宏宜提耳誨導之在范甥宜勉進其所未聞者而一一以重言題品褒借之豈所望也昔事定夫先生未嘗以言色相假後與民瞻叔夏逰茍有過在安國則二公必面折之不令貳其過在二公即安國亦正色規之不但已也數十年来俗習頽靡此風日以替矣安老器識過人當今之望津途軌則當以往哲自期庶㡬此風之復見也邸報十五巻并五月分者并以歸納乾菌承貺示珍感珍感安國再拜去夏所借報中有言吕舜徒章者或見之望更借示自五月以来新報能一一借及幸幸吕公諸子聞自衡陽過江西不知今何在或知信喻及鄉里得近信否所奏前章及第二義不以示他人恐知安國又上朋友之交責善所以盡吾誠取善所以益吾徳非以相為賜也然各盡其道而無所茍焉則麗澤之益自有不能已者方生士繇出示所藏胡文定公與其外大父尚書吕公手帖讀之使人凜然起敬若嚴師畏友之在其左右前後也嗚呼是數君子者其可謂盡朋友之道而無所茍矣其卓然有以自立於當年而遺風餘烈可傳於世者豈徒然哉三復歎息因敬書其後以致區區尊仰之意云乾道壬辰十二月二十四日新安朱熹書跋劉平甫家藏胡文定公帖彥修必已奉太夫人赴温陵此郡樂國也便於養親同増歡慰臨川密邇鄉邦音問易達彥沖退然自守深可嘉尚徳門積善久矣如昆仲出則奮其才力建立事功居者進修術業養成徳器乃邦國之光凡在鄉鄰亦預榮焉衰老覩此盛事不勝欽歎安國又啓安國再啓湖湘旱饑之後民間窘迫而供饋頻繁江西諒亦爾然教令既孚吏民信服不晚必有除擢矣寅在桐江幸亦粗遣然歸養之意甚濃謾恐知之憲姪比蒙恩命皆昆仲平日奬提之所及也感佩之意言不能喻安國再啟伯達孫今已長成莫須早晚令隨貢元伯伯習知禮義若一向不讀書恐不便也與族兄書其略如此屏山劉玶平甫藏胡文定公帖一卷前兩紙胡公與平甫伯父秘閣君盖公之辭而其子祠部君筆也時秘閣守臨川兄侍郎公守温陵弟屏山先生稱疾不仕胡公之子侍郎守桐江兄子籍溪先生以布衣特起典教鄉郡書辭盖徧及之後一紙胡公與其族兄書實公手筆平甫購得之所稱范甥者即平甫外舅太史公也胡公正大方嚴動有法教讀此者視其所褒可以知勸視其所戒可以知懼平甫能葆藏之其志亦可知矣乾道癸巳三月乙酉新安朱熹觀於劉氏山館之復齋因敬書其後云書屏山先生}
