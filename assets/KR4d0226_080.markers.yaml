  - {type: variant, offset: 12170, length: 0, content: '', WYG: 集卷八十欽定四庫全書晦庵集卷八十一宋朱子撰跋跋朱給事奏劄伏讀給事中朱公奏劄共惟前輩學問醇明故所以告其君者知所先後如此而忠誠懇至溢於文辭筆札之間者又可以見其充養之厚云隆興元年正月既朢新安朱熹謹書後二十八年再得披玩因觀舊題歎前修之益逺悼吾年之不留復記其後云跋陳了翁與兄書章氏議却不成農師極惓惓亦不敢就自到官尤覺中饋不可無人而瑞奴等零丁益可憐不免議同年周戸曹之妹鍔其家清貧其人年長貧則不驕長則諳事為瑞奴等之慮只欲如此書尾又云周氏雖貧然舉家好善故就之男女可無慮予嘗讀陳忠肅公之文觀其述已之志稱人之善未嘗不推而決諸義利取舍之間於是知公之所以常胸中浩然前定不疚者其所自得盖有在也孟子曰欲知舜與蹠之分無他利與善之間耳又曰生亦我所欲義亦我所欲二者不可得兼舍生而取義也陳公之學盖得諸此惟其察而精之也入毫芒是以擴而充之也塞宇宙善觀此帖者亦足以識其㡬矣帖藏邯鄲賈元放家元放文學議論有餘又通當世之務而砥礪㢘隅不為茍合其亦深有得於斯歟隆興甲申十月九日新安朱熹謹書跋胡文定公詩手握乾坤殺活機縦横施設在臨時滿堂兔馬非龍象大用堂堂總不知踏遍江南春寺苔野雲蹤跡去還来如今宴坐孤峯頂無法可傳心自灰祝融峰似在城天萬古江山在目前須信死心元不死夜来明月又重圓明公從小便超羣佳句流傳繼碧雲聞道别来諸念息定將何法退魔軍十年音信㫁鴻鱗夣想雲居頂上人香飯可能長自飽也應分濟百千身右胡文定公答僧五詩公子侍郎所書以授墳僧妙觀而妙觀之所摹刻也儒釋之間盖有所謂毫釐之差者讀之者能辨之則庶乎知言矣乾道乙酉十一月庚午新安朱熹書跋張敬夫所書城南書院詩久聞敬夫城南景物之勝常恨未得往逰其間今讀此詩便覺風篁水月去人不逺然敬夫道學之懿為世醇儒今乃欲以筆札之工追蹤前作豈其戲耶不然則敬夫之豪放奔逸與西臺之温厚靚深其得失之筭必有能辨之者朱仲晦父云跋胡五峰詩幽人偏愛青山好為是青山青不老山中出雲雨太虚一洗塵埃山更好右衡山胡子詩也初紹興庚辰熹卧病山間親友仕於朝者以書見招熹戲以兩詩代書報之曰}
