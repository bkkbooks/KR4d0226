  - {type: variant, offset: 0, length: 517, content: 晦庵先生朱文公文集卷第三詩奉同張敬夫城南二十詠納湖詩筒連畫卷坐㸔復行吟想像南湖水秋來幾許深東渚小山幽桂叢歲暮靄佳色花落洞庭波秋風渺何極詠歸橋緑漲平湖水朱欄跨小橋舞雩千載事歴歴在今朝船齋考槃雖在陸滉瀁水雲深正爾滄洲趣難忘魏闕心麗澤堂堂後林隂宻堂前湖水深感君懷我意千里夣相尋蘭澗光風浮碧澗蘭杜日猗猗竟歳無人采含薰秪自知書樓君家一編書不自圯上得石室寄林端時來玩幽賾山齋藏書樓上頭讀書樓下屋懷哉千載心俯仰數椽足䝉軒先生湖海姿䝉養今自閟銘坐仰先賢點畫存彖繫石瀬䟽此竹下渠漱彼澗中石暮館繞寒聲秋生動澄碧卷雲亭西山雲氣深徙倚一舒歗浩蕩忽搴開爲君展遐眺柳堤渚華𥘉出水堤樹亦成行吟罷天津句薫風拂靣凉月榭月色三秋白湖光四靣平與君凌倒景上下極空明濯清渉江采芙蓉十反心無斁不遇無極翁深衷竟誰識西嶼朝吟東渚風夕弄西嶼月人境諒非遥湖山自幽絶淙琤谷湖光湛不流嵌竇亦潜注倚杖忽淙琤竹深無覔處聽雨舫綵舟停畫槳容與得欹眠夣破蓬窓雨寒聲動一川梅堤仙人冰雪姿貞秀絶倫擬驛使詎知聞尋香問煙水采菱舟湖平秋水碧桂棹木蘭舟一曲菱歌晚驚飛欲下鷗南阜高丘復層觀何日去登臨一目長空盡寒江列暮岑次韻傳丈武夷道中五絶句地乆天長歲不留坐來念念失藏舟囬㸔萬法皆兒戯還直先生一笑不分符擁節㡬經年聞道, WYG: ''}
