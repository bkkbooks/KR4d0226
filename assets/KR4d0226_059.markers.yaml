  - {type: variant, offset: 21691, length: 1, content: 府, WYG: 有潏水集印本乃長安人李復之文記董氊非嘉勒斯賚之子乃盗斯賚之妻而竊其國不知曾見之否事冗不暇細看更考之也答王南卿陣法細看尚有誤處如上卷第五板陣法内左邊兩隊各欠馬軍紅㸃二十五人第四板陣法凡馬軍後並無押隊照隊中卷第一版四十萬人而增之至三十萬其四字當作由字幸更詳考恐更有此等當改正也答汪易直示喻尊名之意極荷不鄙但今朋友必已有所稱往時忘記奉扣後便幸批示或已得先端明本㫖即不必改也疑義數條意皆甚正但首章管仲事程子所推聖人本意恐已得之葢其不死子糾而從桓公乃是先迷後得如今叛逆而遭赦宥自無可死之理然此事夫子當時不曾明言但今以其言專取其功而畧無譏貶之詞可以推見之耳若果有罪則聖人必有微詞以見功過不相掩之意不特如此説矣故疑程子此意講之甚精而鄙意所疑則其曰若當死而不死則後雖有功亦不復取此則未安耳功自功過自過若過可以掩功則功亦得以掩其過矣康節先生論學春秋者當先定五伯之功罪而以五伯為功之首罪之魁此語最為切當然非獨論古事為然也見諸行事則操賞罰之權持黜陟之柄者亦當以是為心乃能盡用一世之材以濟天下之務而不失其正耳仁之一字以其德而言則必心無私而事當理乃能當之若其功則惟利澤及人有恩有惠便可稱之初不計其德之如何也偶來城中人事冗擾且畧為論此條試更思之餘俟還家奉答别附便也夫子説可與立未可與權程子説春秋大義易見而時措從宜者為難知此等處更宜致思思而得之則所示數條皆可類推矣然此不可以强通却須反求諸心向性分上講究存養始當有以自得耳末由面論臨風馳想切幾力學自愛答汪易直示喻自訟之篇足見立志為已之切尤以為慰此正大學所謂誠其意者然意不能以自誠故推其次第則欲誠其意者又必以格物致知為先葢仁義之心人皆有之但人有此身便不能無物欲之蔽故不能以自知若能隨事講明令其透徹精粗巨細無不通貫則自然見得義理之悦心猶芻豢之悦口而無待於自欺如其不然而但欲禁制抑遏使之不敢自欺便謂所以誠其意者不過如此則恐徒然為是迫切而隠微之間終不免為自欺也舊説大學此章葢欲發明此意而近日讀之殊覺未透因畧更定數句今謾録去試深察之以為何如也近思小本失於契勘致有差誤此執事不敬之罪也後來此間書坊别刋得一本卷尾所增已附入卷中仍削去重出數字矣偶未有别本旦夕求得續當附去也答彭子壽龜年齊銘之屬豈所敢承况此病餘昏憊將何以發明聖賢之㫖為日用功夫之助乎然竊聞之大學於此雖若使人戒夫自欺而推其本則必其有以用力於格物致知之地然後理明心一而所發自然莫非真實如其不然則雖欲防微謹獨無敢自欺而正念方萌私欲隨起亦非力之所能制矣竊意髙明於此非有所未察特因來喻僭復言之以為誠能於此益致其功則亦無待於􅉏御之箴而學日益進德日益修矣答彭子壽以日不足或作不足日以垂喻中庸疑義别紙甚詳乃知賢者於此方且以講求經㫖究極精微以日不足為事世間利害固未易以入其胸次也修道之教修之者固専出於人事而所修之道則天地萬物之理莫不具焉是乃天人之合亦何害其為同耶又論事豫之説張游不同葢此章首尾以誠為本而推其所以誠者乃出於明善故釋其文義且得以誠為言如大學之序始於格物而其後乃云壹是皆以修身為本亦此類也隠微聞見之分當時偶見如此而謾序之若疑未安置之無害此非大義所繫不足深論也智仁勇經文本不曾分若以為疑亦不足論但諸家所分却未稳當必欲分之則須從今説乃為盡善若如來喻則仁字不合列於三德之中而又位於其次葢聖人之言其名理隨處輕重所指不同讀者須隨其輕重而讀之乃見其意不可一槩死殺排定也鄙見如此不審明者以為如何如復未安更望報及也答折子明伏蒙鐫喻先正墓文使人三返而勤懇益至熹雖至愚心非木石豈不惻然有動於中亦何忍為此牢辭固拒以逆盛意實以衰悴心目俱疲不堪思慮檢閱而兩年以來名在罪籍每讀邸報觀其怒目切齒之態未知將以此身終作如何處置然後快於其心未嘗不惕然汗出浹背沾衣也是以年來絶不敢為人作一字近所祈懇百拜而辭者已數家矣若以尊喻之嚴遽弛此禁則四面之責紛然而至從之則召禍不從則取怨反復思之未見其可兼餘年無幾疾病侵凌神思昏然豈有精力可以給此切告矜亮貸此殘生不勝千萬哀懇之至答劉君房元城之孫先正忠定公有德有言没而不朽百世之下聞者興起而熹之外舅聘士劉公嘗得親見而師承之熹少時猶及竊聞其餘論於忠定公之言行志節詳矣是以雖不得及其門牆而想望其聲容猶若相接不止於今世紙上所傳而已也今辱惠書乃知其後人所以繼業承家之意如此而所以見顧者又甚厚非淺陋之所敢承也但來喻頗以未有世其禄者為憂此則賢者慮之過矣先德遺風具在方冊有能誦其言行其行不替其志節則所以世其家者孰大於是彼區區之外物何足道哉又承類次遺文已就篇帙見使為之序引以傳來世此則又豈晚生妄意所敢幾及但願亟遂鋟木傳之其人使熹與有聞於大體之純全則為幸甚矣答劉君房所喻讀易甚善此書本為卜筮而作其言皆依象數以斷吉凶今其法已不傳諸}
