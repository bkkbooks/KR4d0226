  - {type: variant, offset: 21689, length: 0, content: '', WYG: 晦庵集卷五十九欽定四庫全書晦庵集卷六十宋朱子撰書知舊門人問答答朱朋孫長書垂示尤荷不鄙所論為學之意又足以見雅志之所存也夫學非讀書之謂然不讀書又無以知為學之方故讀之者貴專而不貴博葢惟專為能知其意而得其用徒博則反苦於雜亂淺畧而無所得也今一旦而讀八書則其茫然而不得其要也豈足怪哉願且致精一書優柔厭飫以求聖學功夫次第之實俟其心通意解書冊之外别有實下功夫處然後更易而少進焉則得尺得寸雖少而皆為吾有矣欲為沙隨程丈立祠甚善但衰病不堪思慮曲折已報余正父矣幸察之答周純仁彼中既有故舊可以相依氣候亦須差勝嶺外又在鄉里逺亦時得親闈安問於理似亦可少安年來時論似亦漸平昨日又聞廟堂一畨除拜固不足為吾道之重輕然於故舊或畧能垂意但在自己分上只合閉門堅坐聽其所為切不可因此便起妄念徒爾紛紜有損無益也所欲買書偶小兒赴銓未歸己為託相識置到付之來人數在别紙可自檢㸃付來楮券殊少不足於用已為兌數券買去然尚有不能盡買者及所補印漢書不知是要何等紙板様大小如何其人未敢為印有便子細報及當續為印也閒中無事固宜謹出然想亦不能一併讀得許多似此專人往來勞費亦是未能省事隨寓而安之病又如多服闕熱藥亦使人血氣偏勝不得和平不但非所以衛生亦非所以養心竊恐更須深自思省收拾身心漸令向裏令寧静閒退之意勝而飛揚躁擾之氣消則治心養氣處世接物自然安稳一時長進無復前日内外之患矣答周純仁神也者妙萬物而為言者也止既成萬物也本義云云某竊謂上言六子用文王八卦之位者以六子之主時成用而言故以四時為序而用文王後天之序下言六子用伏羲八卦之位者推六子之所以主時成用而言故以隂陽交合為義而用伏羲八卦之序葢隂陽各以其偶合而六子之用行所以能變化盡成萬物也伏羲八卦則兌震以長男而合少女艮巽以長女而合少男皆非其偶然故自動萬物者莫疾乎雷至終萬物始萬物者莫盛乎艮皆别言六子之用故以四時之次言之則用文王八卦之序下則推其所以成用於隂陽各得闕故用伏羲八卦之序若上用伏羲卦次則四時失其序下用文王八卦則兌震艮巽皆非其偶矣伏羲卦序與今卦序不同不知是孔子創為之而作序卦耶抑自文王周公繫辭之後已更伏羲之序如此而孔子特以序卦明其義耶伏羲自是伏羲卦序文王周公自是文王周公卦序答周南仲南往嵗湖寺雖嘗獲一面而病冗不能款扣餘論後乃得見廷對之文切中時病深以歎服益恨相去之逺不得㑹聚以講所聞也兹辱惠書又見季通具道遊從切磋之益深以為慰比日雪寒德履佳}
