  - {type: variant, offset: 21690, length: 0, content: '', WYG: 熹頑鈍之學晚方自信每病當世道術分裂上者入於佛老下者流於管商學者既各以其所近便先入者為主而又驅之以其好髙欲速之心是以前者既以自誤而遂以自欺後者既為所欺而復以欺人文字愈工辨説愈巧而其為害愈甚不有明者孰能舍其舊而新是謀哉來喻許以所疑下詢幸甚大抵聖賢之言已是明白真實説盡道理讀者但能虚心一意循序致詳使其句内無一字之不通則其道理無一毫之不察矣切不可為人大言相誑如九方臯相馬之説者而妄意馳逐於言語之外也方賔王每書來説得道理儘有歸著知與遊從可謂得友恐今已歸嘉禾也周叔謹行草草附此不能究所言政逺切祈珍重答周南仲承喻教學相長之意尤副所望但為學之序必先成已然後可以成物反復來示似於自己分上未免猶有所闕恐不若且更向裏用工也此心此理元無間斷虧欠聖賢遺訓具在方冊若果有意何用遲疑等待何用凖擬安排只從今日為始隨處提撕隨處收拾隨時體究隨事討論但使一日之間整頓得三五次理㑹得三五事則日積月累自然純熟自然光明矣若只如此立得箇題目頓在面前又却低徊前却不肯果決向前真實下手則悠悠嵗月豈肯待人恐不免但為自欺自誣之流而終無得力可恃之地也何程二君能招致之甚善甚善來書已報之矣闕書中問及三事雖未要切然已是能著實講究若闕未可量也後來之秀未見有能勇往直前探討負荷以續傳道之脈兹為可歎耳答周南仲誠其意者自修之首也毋者禁止之辭自欺云者知為善以去惡而心之所發有未實也慊快也足也獨者人所不知而已所獨知之地也言欲自修者知為善以去其惡則當實用其力而禁止其自欺使其惡惡則如惡惡臭好善則如好好色皆務決去而求必得之以自快足於已不可徒茍且以狥外而為人也然其實與不實葢有他人所不及知而已獨知之者故必謹之於此以審其幾焉答周南仲此言小人隂為不善而陽欲掩之則是非不知善之當為與惡之當去但不能實用其力以至此耳然欲掩其惡而卒不可掩欲詐為善而卒不可詐則亦何益之有哉此君子所以重以為戒而必謹其獨也答孟良夫猷示喻為學之意甚善但伊洛垂訓以持敬為先此要切之語若不於此處立得根本即讀書應事思惟計度徒成紛擾卒無歸宿之所也若能於此用力則動静之間無適而不為學矣有書數冊託茂實送學中與諸生共之能往一觀當有益也聞當路有奉薦者足見公論之不泯甚慰然更深其本以須時用乃所望耳答許生中應去嵗陸闕先過此極道左右賢德令聞之美甚恨跧伏無因縁相見今者乃承惠書一通反復讀之益見所以求道鄉學之意深以為幸至於稱引前輩比擬非倫則有所不敢當也左右以應舉覔官美名好事之學為不足學而欲講乎義理以求修已治人之方固已不繆於所趨矣夫道之體用盈於天地之間古先聖人既深得之而慮後世之不能以達此於是立言垂教自本至末所以提撕誨飭於後人者無所不備學者正當熟讀其書精求其義考之吾心以求其實參之事物以驗其歸則日用之間諷誦思存應務接物無一事之不切於已矣來喻乃謂讀書逐於文義玩索墮於意見而非所以為切已之實則愚有所不知其説也世衰道微異論蠭起近年以來乃有假佛釋之似以亂孔孟之實者其法首以讀書窮理為大禁常欲學者注其心於茫昧不可知之地以僥倖一旦恍然獨見然後為得葢亦有自謂得之者矣而察其容貌辭氣之間修已治人之際乃與聖賢之學有大不相似者左右於此無乃亦惑其説而未能忘耶夫讀書不求文義玩索都無意見此正近年釋氏所謂看話頭者世俗書有所謂大慧語録者其説甚詳試取一觀則其來厯見矣若曰儒釋之妙本自一同則凡彼之所以賊恩害義傷風壊教聖賢之所大不安者彼既悟道之後乃益信其為幻妄而處之愈安則亦不待他求而邪正是非已判然於此矣又如所謂寧有人皆得見之過無或有不睹不聞之欺夫中庸之言正謂道體流行初無間斷是以無所不致其戒懼非謂獨戒懼乎隱微而忽畧其顯著也若如來喻則人所共見之處間斷多矣而曰循是存養不疾不徐吾恐其未免為好髙欲速之尤者也至如孟子所謂非義襲而取之文義本自分明而今學者未嘗細考但據口耳相承以至施安失所者葢十人而二五也既勤下問不敢不盡其愚然亦未暇詳究其曲折幸深察之當否俟報也近至富沙見陳安舍人説及建閣藏書事欲以記文見委而未得其詳今收張卿元善蔡兄季通書備見首末偶數日脚氣發作不能飲食而右臂亦痛至不能親執筆憊卧支離口占布此知代期不逺他日病起草得記成當因薛卿轉達代者或同官中必有能竟其事者但恐文詞鄙俚議論不同未必可用耳答章季思康辱書具悉雅志大抵聖賢之教不過博文約禮四字博文則須多求博取熟講而精擇之乃可以浹洽而通貫約禮則只敬之一字已是多了日用之間只以此兩端立定程課不令間斷則久之自有進歩處矣答顔伯竒昆仲椅柖聖門設教具有科條持守講習要當各致其功無所偏廢而不使有頃刻之間斷焉則當有以自得其趣矣答杜叔髙游往嵗辱訪於湖寺且以佳篇為贈讀之知所志之不凡然恨去國怱怱未得從容罄所懐也兹辱枉書并寄兩論詞意竒偉則所以知足下者益以深矣顧念頃與仁里諸賢屢講此事尚多未契足下必已聞之若以愚言為是則固無今日之辨若以為非則又何以見語為哉聖逺道湮人心頗僻險詞怪説雜然並起不憚於誣天罔聖詭經破義而務以適其利欲之私自非剛健明哲之才確然以勝私復理為己任者鮮不惑焉率獸食人人將相食其兆已見於此甚可懼也足下試以愚言思之反諸其身而驗以聖賢之明訓必有以得其本心之正然後可以燭理揆事而無不合毋徒苦心勞力為此附㑹穿鑿而卒以陷溺其良心也答杜叔髙示喻克已之説甚慰所望道理分明本如大路聖賢又如此指示提撕不為不切今人都不理㑹却别去千生萬受杜撰百般胡説亂道於自已分上了無分毫利益只可誑嚇他人然亦只誑嚇得不識底人若被識道理人旁邊冷看成甚模様此區區所以於前日面論之際不能不失笑於賢者之言也今承來喻乃知後來思之有得力處此又見賢者資質本自過人但從前本欲誑人却反為人所誑今日一聞逆耳便能發悟於心不易得也然克已固學者之急務亦須見得一切道理了了分明方見日用之間一言一動何者是正何者是邪便於此處立定脚根凡是已私不是天理者便克將去不但輕躁二字也辛丈相㑹想極款曲今日如此人物豈易可得向使早向裏來有用心處則其事業俊偉光明豈但如今所就而已耶彼中見聞豈不有小未安者想亦具以告之渠既不以老拙之言為嫌亦必不以賢者之言為忤也答程生珙示喻正名之説胡氏所論固有未盡然其大義謹嚴而聖人之妙用變通又自有不可測者不可以私情常識議其方也如以為疑則食肉不食馬肝未為不知味姑置此而議其切於吾身者焉可也答王南卿熹方幸閒中得與一二學徒整理舊書而忽蒙恩收用雖實衰老不敢以逺為辭但恐迂疎議論多與時背一辭不獲比已再上傳聞諸公亦無相彊之意計必得之矣萬一未遂則又未知所以為計也示及隊圖雖不知兵然頃讀曹公杜牧孫子見其所論車乗人數諸儒皆所未言唯友人蔡季通每論此事以考周禮軍制皆合今得此書乃知前輩已嘗用之而有效矣是其可傳無疑也跋尾所論皆精當卒章辨荆公事則恐未然家有荆公與襄敏公手帖數紙見當時事若非荆公力主於内則羣議動摇決難成功但是後來襄敏見其他政事多出於聚斂掊克之意故不免有異論耳若論熈河之事則二公實同心膂無異説也幸試思之恐須畧轉換過乃可取信其帖今録以上呈荆公政事固多失然此一事却是看得破也答王南卿長沙除命深感上恩但老病衰懶昏塞廢忘恐不能堪一道之寄而再辭不獲上語丁寧伏讀皇恐遽欲起拜而鄙意尚有少疑又苦足疾未容拜受遂且宿留更須旬日可決去就萬一可往不知老兄能一乗興相過否所欲扣者千條萬端非面不能究但恐不成行即此㑹又未可知承所改後語甚佳但恐金人立嘉勒氏後一節恐不足深辨耳彼於我為外臣而反連夏㓂以為邊患則我之討伐自為義舉彼於金人非相吞之國則金人立之以樹黨在彼不失為逺交近攻之計而外假存亡繼絶之名又足以使之怨我而德彼亦其狡計之過人也豈足為義舉哉且嘉勒斯賚既有罪則當時討其所立之子自不為過正不必以討其叛孫自解雖或金人能立斯賚所立之後亦未足以愧我而為賢也又謂因進陣法而或以咎荆公亦不記是誰説然此事只合論其取之是非而其瑣細皆不足較若果是矣則雖進陣法亦何不可之有耶又云今為荆公之累恐此句亦未甚稳不知盛意是謂我累彼耶彼累我耶若我累彼則此語可用而非所為立説之意不然則恐當改之為安或云今以荆公為累語意似覺深厚也妄論如此目昏不見字潦草勿怪而并詳之幸甚幸甚陣法印本有便求數冊信}
