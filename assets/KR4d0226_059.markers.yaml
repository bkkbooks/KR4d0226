  - {type: variant, offset: 21700, length: 0, content: '', WYG: 當實用得些子氣力乃可以不負降衷秉彞之重此外瑣瑣一知半解正不足為重輕也不審明者亦有意乎答曾無疑示喻為學之方固得其要然若只如此便了則論語只須存此兩條其餘皆可以削去矣聖人教人博學審問慎思明辨而篤行之葢於理之巨細精粗無所不講然後胸次光輝明徹無所不通踐履服行無非真實似不當如此先立界限預設嫌疑以自障礙也答曾無疑承喻令兄喪期於禮聞訃便合成服當時自是成服太晚以已失之於前然在今日祥練之禮却當計成服之日至今月日實數為節但其間忌日却須别設祭奠始盡人情耳謂聖人以喜怒動其志固為不可若謂都無所動則是聖人心如木石而喜怒之見於外者特為偽耳豈有是理哉此等處須是存養體驗自做得些工夫當自見之難以淺識懸斷也學習之習與傳習之習非有不同傳即謂所學也大抵博學審問學之事也慎思明辨而篤行之習之事也集注中所載諸先生説甚備可細考之來喻忠恕二説皆近之熹鄉來所論正謂如此近復細觀乃有未盡已於論語集注中更定其説矣試詳考之當見曲折所謂竊恐狂騖髙逺者視之云云却不當如此顧慮終身行之自是學者事於聖人何所預哉蓍數之説其義亦精但不知所謂老隂老陽其數則一少隂少陽其數乃三是如何葢四象之變極於六十有四老陽十二老隂四少陽二十少隂二十八乃自然之數不審增減揲者隨其所得而言之又何慮其不可觀變耶揲法初爻成則便止有三十二卦二爻成則便止有十六卦三爻成則便止有八卦四爻成則便止有四卦五爻成則便止有二卦亦是自然次序節次可見今所疑者亦何嫌哉揲蓍之法周禮領於太卜之官計其法度必甚詳宻今皆不可見矣獨賴大傳有此數句可以畧見彷彿而以今推之亦無不可通處學者既不得見當時舊法則亦且當守此不當妄以私意横起計度也蒿固非蓍然亦猶是其類若以木棊竹筭金錢當之則其去蓍亦逺矣又如所言交重之論亦所未曉交者拆之聚故為老隂重者單之積故為老陽亦何疑之有乎然此六爻既成而畫地以記之象耳於揲法初無所預也答曾無疑所論為學之意甚荷不鄙但若果有所得出言吐氣便自不同纔見如此分疏解説欲以自見其能而唯恐人之不信便是實無所得自明眼人觀之固不待其詞之畢而有以識之矣孝悌忠恕若淺言之則方是人之常行若不由此即日用之間更無立脚處故聖人之教未嘗不以為先如所謂入則孝出則悌忠恕違道不逺是也若極言之則所謂通於神明光於四海無所不通而曾子所以形容聖人一貫之妙者亦不過如此又非如前者言之可易而及也故大學之道必以格物致知為先而於天下之理天下之書無不博學審問慎思明辨以求造其義理之極然後因吾日用之間常行之道省察踐履篤志力行而所謂孝悌之至通於神明忠恕之一以貫之者乃可言耳葢其所謂孝悌忠恕雖只是此一事然須見得天下義理表裏通透則此孝悌忠恕方是活物如其不然便只是箇死底孝悌忠恕雖能持守終身不致失墜亦不免但為鄉曲之常人婦女之檢押而已何足道哉今且以所舉有子曾子之言觀之似於文義之間全未考究雖近世先覺如程夫子之言所以發明其妙者恐皆未嘗過目而經心而况於其他義理精微千差萬别豈能一一㑹其㫖歸也哉故熹竊以為今日與其自辨以求合枉費言語枉費心力不若一切放下便依此説且將大學論語反復熟讀而因程子之言與其門人數公之説以求聖賢之㫖意所在句句而講字字而思使無毫髪不通透處則自不須如此妄自拘束强作主張也無疑試更思之恐或可信則一兩月間天氣差暖或能乗興一來面罄其説庶幾彼此殫盡免至如此擔閣虚費光隂也晷景製作甚精三衢有王伯照侍郎所定官厯刻漏圖一編亦與此同厯象之學自是一家若欲窮理亦不可以不講然亦須大者先立然後及之則亦不至難曉而無不通矣北宫􅉳似孟施舍孟子本文無此語不知尋常如何曉㑹此句未敢輕論其得失也答曾無疑子約書來必盛稱無疑之為人但不知中間相聚所與切磨誦説者果為何事計於𦂳要親切處亦未必能盡所懐而日月逝矣嵗不我與丈夫有志者豈當為此悠悠泛泛徘徊猶豫以老其身乎答曾擇之祖道禮即理也但謂之理則疑若未有形迹之可言制而為禮則有品節文章之可見矣人事如五者固皆可見其大槩之所宜然到禮上方見其威儀法則之詳也節文儀則是曰事宜細考之忠恕二字其本義只是學者衆人之事曾子所言乃借此以形容聖人一貫之妙程子之言又借天地造化之體用以明聖人之事須作三節看見得各有下落則一章之指自通貫矣更徐玩之非欲速所能達也此説未然但漆雕語意深宻難尋而曾㸃之言可以玩索而見其意若見得曾㸃意則漆雕之意亦可得矣且看程子説大意兩字是何意二子見得是向甚處如何見得答曾擇之仁者心之德愛之理也仁者心之德猶言潤者水之德燥者火之德愛之理猶言木之根水之原試以此意思之盡已之謂忠祖道初以為盡吾心之所至而無一毫自隠先生以為語未瑩祖道再思之恐止是竭盡吾心而無一毫不足之義後語轉疎前語只自隠二字不切須知不必自隠然後為不忠但有不盡處便是病也主一無適之謂敬此等語須力行之方見得真實意味禮者天理之節文人事之儀則更就天人上看義者事之宜也更以孟子説義處推之忠恕曾子忠恕二字便是一以貫之底注脚可更以二程先生及上蔡説反復體認仍以集注之説參之便見聖賢之意直是細宻不是泛然儱侗説話以約失之者鮮矣約有收歛近裏著實之意非徒簡而已上蔡説得好德不孤此德不孤與易中説德不孤不同此但言有德者聲氣相求自不孤立故必有鄰易中却是説敬義既立則内外兼備則其德盛而不孤也漆雕開曾㸃二子是信箇甚底又是如何地信曾㸃語可更以集注為主子細體驗仍看上蔡之説發明得亦親切三年之喪而復有期喪者當服期喪之服以臨其喪卒事則反初服或者以為方服重不當改衣輕服不知如何或者之説非是卒哭百日卒哭承開元禮以今人葬或不能如期故為此權制王公以下皆以百日為斷殊失禮意古者士踰月而葬葬而虞虞而卒哭自有日數何疑之有但今人家諸事不辦自不能及此期耳若過期未葬自不當卒哭未滿一月則又自不當葬也答曾擇之前書所説欲於一字中推尋曲折不知後來看得如何恐亦不必如此但從頭看到要𦂳處更加功夫子細辨别而不𦂳要處亦不可草草則久之自然浹洽貫通精粗一致矣季章説致曲處不知如何今亦不記當時所説大抵彼中朋友看得文字疎畧不肯依傍先儒成説反覆體驗而便輕以己意著字下語正使得其大意中間亦不免有空闕處相接不著欲革此弊莫若凡百放低且將先儒所説正文本句反覆涵泳庶幾久久自見意味也答曾擇之所論曾㸃大意則然但謂漆雕開有經綸天下之志則未必然正是已分上極親切處自覺有未盡耳雖其見處不及曾㸃之開濶得處未至如曾㸃之從容然其功夫精宻則恐㸃有所不逮也以此見二人之規模格局大槩不相上下然今日只欲想象聖賢胸襟灑落處却未有益須就自家下學致知力行處做功夫覺得極辛苦不快活便漸見好意思也天下歸仁之説程先生是説實事吕與叔恐不免墮於虚見其得失自可見也季宏之來只是要求跋尾全然不曾講學却須曾理㑹作文大率彼間士人多是如此鄉外走作不曾鄉裏思量論其淵源葢有不得不任其責者矣甚可歎也因其告歸附此為報熹衰病沈痼闕心之患已成尚思更與朋友講論此事少革流弊以闕賢者無事更能見過相聚旬月是所望也答王才臣來喻縷縷備見雅志然於讀書窮理所得所疑未有以見教者而較短量長非人是已之意實多若果有得於義理之歸恐不應更有此病也明者思之以為如何茍有取焉則願置此而姑相與實講所疑乃千萬之幸也無疑書來其大指與左右亦相似已詳報之或因過目併以一言論其得失可也六詠之需非敢忘之實以年來纂次禮家文字頭項頗多衰病之餘精力向盡無暇可及亦覺未是急務故不敢以奉凂爾格齊大字此却好箇題目顧未知所以充之者如何寫字亦非所難適此兩日寒甚衰病拘攣不可輕動向後晴暖當試為之以奉寄也承有枉顧之意尤荷不鄙若得㑹面彼此傾倒以判所疑何幸如之未間千萬及時專力使有箇端的用心處庶幾合并之日有可討論也子直詩甚佳南容之篇尤有餘味已輙為題其後因書幸以報之也答度周卿正比來為况如何讀書探道亦頗有新功否耶嵗月易得義理難明但於日用之間隨時隨處提撕此心勿令放逸而於其中隨事觀理講求思索沈潛反復庶於聖賢之教漸有黙相契處則自然見得天理性命真不外乎此身而吾之所謂學者舍是無有别用力處矣因書信筆不覺縷縷切勿為外人道也答李誠之說特承寄示新刻二先生祠記并枉長書一通記文鄙淺而書意勤厚非區區所敢當也然先生之道即伏羲堯舜禹湯文武周公孔孟所傳之道先生之書即所以發明六經孔孟之書初非别有𤣥妙竒特自為一家之説而與古之聖賢異軌殊轍也世之君子固未必嘗讀其書而驟讀其書亦未能遽曉是葢不唯不知程氏之學實乃并與古昔聖賢之學而不知之也舉世昏㝠恬不覺悟而其聰明辨博能為文字語言名有氣槩才力者則其惡之為尤甚今以門下之才之美宜已無愧此數者而其用心獨不然葢不惟立祠伐石以著其尊慕之意而來書之喻又將不鄙迂陋而辱問津焉此其志豈獨賢於今世之士也哉竊感下問之勤故粗論其梗槩如此近所刋定大學章句一通今致几下所欲言者不能外此幸一讀而三思之其必將有以得之而異時所以見於文章事業者愈有光矣僭率皇恐答李誠之昨蒙不鄙俾撰先正文集後序自知不文不足以副厚意顧以先契之重鄉往之深且欲託此以少見尊奬節義别嫌明微之意以是不敢力辭而輒草定其説以求商訂區區之心葢未敢自以為是也所欲更定尊復明辟四字刋去繁冗著語精切前輩所謂自有稳字正此謂也玩味歎服不能自己但平賊之功雖由外濟之語乃是區區鄙意分功紀實以息争論之微指朱丞相所記當時之事非不詳明正以欲專其功而反詆吕張為敗事又其後深詆李趙諸公誣謗已甚故讀者往往心非而鼻笑之并與其可信者而不信之也願熟思之恐不可改如何答徐崇文僑日用功夫且得如此照管莫令間斷久之浹洽自有見處亦不須别立標的便計工程也敖惰之説如所引孟子隠几而卧而以為當然則已得之矣何必疑其非本有耶不但孟子如孔子取瑟而歌亦是此類但大學之意却是恐人於此一向偏却更不照管今當看此重處識取正意受用省察不必向閒慢處枉費思索也子顔時時往來甚佳才卿得託門館甚善其人有立作看得道理亦子細儘好從容講論也答林叔恭為學只要致誠耐久無有不得不須别生計較思前算後也答潘子善時舉辱書􅊀知學問之志甚善甚幸杜門獨學與周旋師友之間學之難易固不同矣然其用力實在於我非他人所能代也况彼中朋友以書來者已自數人切切偲偲相觀而善似亦不可謂之全然無助者更在勉力而已答潘子善便中兩承惠書深以為慰比日秋涼所履佳勝熹衰病涉秋似有向安之漸但辭職告老皆未報可日深悚惕之懐耳恭父留此甚久儘得從容因其行草草附此其他恭父必能言之未間唯冀以時自愛眷集一一佳慶諸疑問各疏其下矣恭父當能道其詳答潘子善問易傳近思録大畜彖曰能止健大正也傳曰能止乎健者非大正則安能據大畜天在山中之象則是能止其健於下也今曰止乎健者不知是止於健還是止其健耶伏乞批誨能止健言以艮之止止乾之健也傳意亦是如此但其文勢似倒他亦多此類也習坎八卦中獨坎加習字説者多矣未知義果如何此等不必深求其説習坎卦義傳云一始於中有生之最先者也故為水夫陽氣之生必始於下復卦之象是也今曰始於中其義如何氣自下而上為始程説别是一義各有所主不相妨然亦不可相雜咸上六咸其輔頰舌竊意此爻宜有悔吝而不言悔吝何也吉凶悔吝係乎邪正此但見其不足以感人之意耳未見有失故不得以悔吝言也遯九三畜臣妾吉傳曰係吝之私恩懐小人女子之道也故以畜養臣妾則得其心為吉也小人女子近之則不孫逺之則怨若專以私恩懐之未必不有悔吝而此爻以為吉何耶此爻不可大事但可畜臣妾耳御下而有以懐之未為失正但恐所以懐之者失其正耳大壯上六羝羊觸藩不能退不能遂無攸利艱則吉傳以艱字為遇艱困則失其壯而得柔弱之分故吉竊意不能退遂而無所利則是已艱困矣而又曰遇艱何也恐此艱字只作艱難其事而不敢求進不已則吉如大畜九三利艱貞之艱説如何當如大畜之例晉序卦物不可以終壯故受之以晉傳曰物無壯而終止之理既壯盛則必進竊意物進而後至於壯盛既壯盛則衰退繼之矣今曰壯盛則必進此義如何物固有壯而後進者亦有進而後壯者各隨其事而言難以一説拘也且以十二月卦論大壯之為夬夬之為乾豈非壯而後進乎至乾乃極而衰耳晉傳曰晉之盛}
