  - {type: variant, offset: 21693, length: 0, content: '', WYG: 之言象數者例皆穿鑿言義理者又太汗漫故其書為難讀此本義啟蒙所以作也然本義未能成書而為人竊出再行模印有誤觀覽啟蒙本欲}
  - {type: variant, offset: 21694, length: 0, content: '', WYG: 者且就大傳所言卦畫蓍數推尋不須過為浮説而自今觀之如論河圖洛書亦未免有剰語要之此書真是難讀不若詩書論孟之明白而易曉也此是偽學見識不審明者以為如何答曾無擇闕已報去但覺得多是在外邊看未有箇入門處須更虚心静慮將聖賢言語從裏面親切處看出來庶幾見得意味不為空言不然似此泛濫含糊無益於事終久不得力也答曾無疑三時承枉書奉報草草方以為愧忽辱再告益荷眷勤且審比日涼秋起處佳福足以為慰詩卷寵示尤認不鄙之意三復以還既歎其精麗警拔之不可及又重歎其不為大言險語以投世俗之耳目也然承喻及為學之意則似所志又有不止於此者此尤區區所樂聞但未知雅意姑欲粗一闖其藩籬而為彼善於此之計耶抑將勇革舊習而真欲一蹴以至道也如前之説則非區區所敢知如後之説則如來喻之云固非不善然欲自是以求道則恐亦未免為空言也大率人之為學當知其何所為而為學又知其何所事而可以為學然後循其次第勉勉而用力焉必使此心之外更無異念而舊習之能否世俗之毁譽身計之通塞自無一毫入於其心然後乃可幾耳此固未易以毫楮既而承見語亦將有枉顧之期矣儻得面論庶竭鄙懐顧此迂濶干觸科禁恐非賢者進取之利更冀審處於未動之前毋使貽後日之悔焉乃所願也答曾無疑辱書良以為慰而反復來喻已得雅志之所存則區區所疑亦不敢隠也葢嘗聞之孟子之言有曰人之所以異於禽獸者幾希庶民去之君子存之此君子所為而學也然欲存此則必有以識此之為何物而後有以存之能識之則所以存之者又必勉勉孜孜而不少懈焉然後乃可幾也此君子之所以為學者而終身勉焉唯恐一毫之不盡而不敢少貳其心者也今足下自謂學無本原心常駁雜豈亦自覺其未嘗用力於此而然耶此其自知亦明矣然又欲因其固有而循習之則亦可以殊塗而同歸則未知足下所謂固有者為何物又如何而循習之與何者為殊塗又同歸於何許也又謂雖舊習之未忘而未嘗為學之累則又未知今之新者為何學而昔之舊者若何而能不為之累也凡此所云竊恐非獨熹之愚有所不解意者足下之心亦未必能别其孰為同異而孰為是非也足下幸試思之其然乎其不然乎如其果然則願姑以前者所引孟子之言為主而博考古昔聖賢之遺}
