  - {type: variant, offset: 21695, length: 4, content: 導鄭璉校, WYG: 以參驗之則夫人之所為而學與其所以學者不待外求而得之於我向之所謂固有所謂同歸者始為有以識之而知昔之舊者真不足為而果有累乎今日之新矣人之為學必其有以先識乎此而知取舍之所定然後其功夫利病可得而言如其不然徒為論説皆是空言無下落處無所補於事也景陽季章於此皆嘗有聞雖未知其後來所進如何然茍善取之亦當有以為助矣吾人既不見用於世只有自己分上一段功夫若見得門户分明端緒}
