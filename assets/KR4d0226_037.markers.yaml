  - {type: variant, offset: 21551, length: 2, content: иЁ“е°Һ, WYG: д№ҹеҚҰжҲҗд№ӢеҫҢеҗ„еӣ дёҖзҫ©жҺЁиӘӘйӮөеӯҗжүҖи¬ӮеҫҢеӨ©д№Ӣеӯёд№ҹд»ҠдҫҶе–»жүҖеј•з№ӢиҫӯиӘӘеҚҰдёүжүҚе…ӯдҪҚд№ӢиӘӘеҚіжүҖи¬ӮеҫҢеӨ©иҖ…д№ҹе…ҲеӨ©еҫҢеӨ©ж—ўеҗ„иҮӘзӮәдёҖзҫ©иҖҢеҫҢеӨ©иӘӘдёӯеҸ–зҫ©еҸҲеӨҡдёҚеҗҢеҪјжӯӨиҮӘдёҚзӣёеҰЁдёҚеҸҜеҹ·дёҖиҖҢе»ўзҷҫд№ҹиӢҘеҹ·жӯӨиӘӘеҝ…и¬ӮиҒ–дәәеҲқз•«еҚҰжҷӮеҸӘиҰӢдёҖз®ҮдёүжүҚдҫҝжӣҙдёҚе•ҸдәӢз”ұдёҖйҖЈдҫҝжҺғеҮәдёүз•«д»Ҙж“¬е…¶иұЎз•«жҲҗд№ӢеҫҢеӯҗзҙ°зңӢдҫҶиҰӢдҪҝдёҚеҫ—еҸҲж—ӢеҠғж“ҳж·»еҮәеҫҢдёҖеҚҠжҲӘжӯӨеүҮе…ЁжҳҜз§Ғж„Ҹжқңж’°иЈңжҺҘиұҲеҫ©жӣҙжңүжҳ“иҖ¶дҫҶе–»жўқзӣ®е°ҡеӨҡз„¶е…¶еӨ§зҜҖзӣ®дёҚйҒҺеҰӮжӯӨд»ҠдҪҶж–јжӯӨзңӢз ҙеүҮе…¶йӨҳе°Ҹе°ҸжңӘеҗҲиҷ•иҮӘз•¶иҝҺеҲғиҖҢи§§зҹЈж•…д»ҠдёҚеҫ©жӮүиҫЁд»ҘеҮӮй«ҷжҳҺдјҸе№ёиІЎеҜҹзӯ”иўҒж©ҹд»ІдҫҶж•ҷз–‘жІіең–жҙӣжӣёжҳҜеҫҢдәәеҒҪдҪңзҶ№з«Ҡи¬Ӯз”ҹж–јд»Ҡдё–иҖҢи®ҖеҸӨдәәд№ӢжӣёжүҖд»ҘиғҪеҲ«е…¶зңҹеҒҪиҖ…дёҖеүҮд»Ҙе…¶зҫ©зҗҶд№ӢжүҖз•¶еҗҰиҖҢзҹҘд№ӢдәҢеүҮд»Ҙе…¶е·Ұй©—д№Ӣз•°еҗҢиҖҢиіӘд№ӢжңӘжңүиҲҚжӯӨе…©еЎ—иҖҢиғҪзӣҙд»ҘиҮҶеәҰжҮёж–·д№ӢиҖ…д№ҹзҶ№ж–јдё–еӮіжІіең–жҙӣжӣёд№ӢиҲҠжүҖд»ҘдёҚж•ўдёҚдҝЎиҖ…жӯЈд»Ҙе…¶зҫ©зҗҶдёҚжӮ–иҖҢиӯүй©—дёҚе·®зҲҫдҫҶж•ҷеҝ…д»ҘзӮәеҒҪеүҮжңӘиҰӢжңүд»ҘжҢҮе…¶зҫ©зҗҶд№Ӣи¬¬иӯүй©—д№Ӣе·®д№ҹиҖҢзӣҙж¬Ід»ҘиҮҶеәҰжҮёж–·д№ӢжӯӨзҶ№д№ӢжүҖд»ҘжңӘж•ўжӣІеҫһиҖҢдёҚеҫ—дёҚиҫЁд№ҹеҶөд»Ҡж—Ҙд№Ӣи«–дё”ж¬Іеӣ иұЎж•ёд№ӢдҪҚзҪ®еҫғдҫҶд»ҘиҰӢеӨ©ең°йҡӮйҷҪд№ӢйҖ еҢ–еҗүеҮ¶ж¶Ҳй•·д№Ӣжң¬еҺҹиҢҚж–јжӯӨжңӘжҳҺеүҮеӣәжңӘжҡҮеҲ«е°Ӣиӯүж“ҡд»Ҡд№ғе…ЁдёҚе°Ӣе…¶зҫ©зҗҶдәҰжңӘиҮіжҳҺжңүиӯүж“ҡиҖҢеҫ’з„¶зӮәжӯӨз„ЎзӣҠд№ӢиҫЁжҳҜдёҚиӯ°ж–је®ӨиҖҢиӯҹж–јй–ҖдёҚе‘іе…¶и…ҙиҖҢйҪ©е…¶йӘЁд№ҹж”ҝдҪҝиҫЁеҫ—дәҢең–зңҹеҒҪз«Ҝзҡ„дёҚе·®дәҰз„ЎжүҖз”ЁеҸҲеҶөжңӘеҝ…жҳҜд№ҺйЎҳдё”зҪ®жӯӨиҖҢж–јзҶ№жүҖжҺЁдәҢең–д№ӢиӘӘе°‘еҠ ж„Ҹз„үеүҮйӣ–жңӘеҝ…дҫҝжҳҜзңҹең–з„¶ж–јиұЎж•ёжң¬еҺҹдәҰз•¶з•ҘиҰӢж„Ҹе‘іжңүжӯЎе–ңиҷ•иҖҢең–д№ӢзңҹеҒҪе°ҶдёҚиҫЁиҖҢиҮӘжҳҺзҹЈдҫҶж•ҷз–‘е…ҲеӨ©еҫҢеӨ©д№ӢиӘӘж“ҡйӮөж°ҸиӘӘе…ҲеӨ©иҖ…дјҸзҫІжүҖз•«д№Ӣжҳ“д№ҹеҫҢеӨ©иҖ…ж–ҮзҺӢжүҖжј”д№Ӣжҳ“д№ҹдјҸзҫІд№Ӣжҳ“еҲқз„Ўж–Үеӯ—еҸӘжңүдёҖең–д»ҘеҜ“е…¶иұЎж•ёиҖҢеӨ©ең°иҗ¬зү©д№ӢзҗҶйҡӮйҷҪе§ӢзөӮд№Ӣи®Ҡе…·з„үж–ҮзҺӢд№Ӣжҳ“еҚід»Ҡд№Ӣе‘Ёжҳ“иҖҢеӯ”еӯҗжүҖзӮәдҪңеӮіиҖ…жҳҜд№ҹеӯ”еӯҗж—ўеӣ ж–ҮзҺӢд№Ӣжҳ“д»ҘдҪңеӮіеүҮе…¶жүҖи«–еӣәз•¶е°Ҳд»Ҙж–ҮзҺӢд№Ӣжҳ“зӮәдё»з„¶дёҚжҺЁжң¬дјҸзҫІдҪңжҳ“з•«еҚҰд№ӢжүҖз”ұеүҮеӯёиҖ…еҝ…е°ҶиӘӨиӘҚж–ҮзҺӢжүҖжј”д№Ӣжҳ“дҫҝзӮәдјҸзҫІе§Ӣз•«д№Ӣжҳ“еҸӘеҫһдёӯеҚҠиӘӘиө·дёҚиӯҳеҗ‘дёҠж №еҺҹзҹЈж•…еҚҒзҝјд№ӢдёӯеҰӮе…«еҚҰжҲҗеҲ—еӣ иҖҢйҮҚд№ӢеӨӘжҘөе…©е„ҖеӣӣиұЎе…«еҚҰиҖҢеӨ©ең°еұұжҫӨйӣ·йўЁж°ҙзҒ«д№ӢйЎһзҡҶжң¬дјҸзҫІз•«еҚҰд№Ӣж„ҸиҖҢд»Ҡж–°жӣёеҺҹеҚҰз•«дёҖзҜҮдәҰеҲҶе…©е„ҖдјҸзҫІеңЁеүҚж–ҮзҺӢеңЁеҫҢеҝ…ж¬ІзҹҘиҒ–дәәдҪңжҳ“д№Ӣжң¬еүҮз•¶иҖғдјҸзҫІд№Ӣз•«иӢҘеҸӘж¬ІзҹҘд»Ҡжҳ“жӣёж–Үзҫ©еүҮдҪҶжұӮд№Ӣж–ҮзҺӢд№Ӣз¶“еӯ”еӯҗд№ӢеӮіи¶ізҹЈе…©иҖ…еҲқдёҚзӣёеҰЁиҖҢдәҰдёҚеҸҜд»ҘзӣёйӣңдҫҶж•ҷд№ғи¬Ӯе°ҲзӮәйӮөж°Ҹи§§йҮӢиҖҢж–јжҳ“з¶“з„ЎжүҖжҠҳиЎ·еүҮжҒҗиҖғд№ӢжңүжңӘи©ід№ҹдҫҶж•ҷи¬Ӯдёғе…«д№қе…ӯдёҚеҸҜзӮәеӣӣиұЎеӣӣиұЎд№ӢеҗҚжүҖеҢ…з”ҡе»ЈеӨ§жҠөй Ҳд»Ҙе…©з•«зӣёйҮҚеӣӣдҪҚжҲҗеҲ—иҖ…зӮәжӯЈиҖҢдёҖдәҢдёүеӣӣиҖ…е…¶дҪҚд№Ӣж¬Ўд№ҹдёғе…«д№қе…ӯиҖ…е…¶ж•ёд№ӢеҜҰд№ҹе…¶д»ҘйҡӮйҷҪеүӣжҹ”еҲҶд№ӢиҖ…еҗҲеӨ©ең°иҖҢиЁҖд№ҹе…¶д»ҘйҡӮйҷҪиҖҒе°‘еҲҶд№ӢиҖ…е°Ҳд»ҘеӨ©йҒ“иҖҢиЁҖд№ҹиӢҘе°Ҳд»Ҙең°йҒ“иЁҖд№ӢеүҮеүӣжҹ”еҸҲиҮӘжңүеӨӘе°‘зҹЈжҺЁиҖҢе»Јд№ӢзёұжЁӘйҢҜз¶ңеҮЎжҳҜдёҖзү©з„ЎдёҚеҗ„жңүеӣӣиҖ…д№ӢиұЎдёҚдҪҶжӯӨж•ёиҖ…иҖҢе·ІзҹЈжӯӨд№ғеӨ©ең°д№Ӣй–“иҮӘз„¶йҒ“зҗҶжңӘз•«д№ӢеүҚе…ҲжңүжӯӨиұЎжӯӨж•ёз„¶еҫҢиҒ–дәәз•«еҚҰжҷӮдҫқж§ҳз•«еҮәжҸІи“ҚиҖ…еҸҲйҡЁе…¶жүҖеҫ—жҺӣжүҗйҒҺжҸІд№Ӣж•ёд»ҘеҗҲз„үйқһжҳҜе…ғз„ЎеҜҰй«”иҖҢз•«еҚҰжҸІи“Қд№Ӣйҡӣж—Ӣж¬Ўе®үжҺ’еҮәдҫҶд№ҹдҫҶе–»ж–јжӯӨиҰӢеҫ—жңӘжҳҺеҫ’еӢһиҫЁиӘӘз«ҠжҒҗдё”з•¶е…Ҳеҗ‘жңӘз•«еүҚиӯҳеҫ—е…ғжңүз®ҮеӨӘжҘөе…©е„ҖеӣӣиұЎе…«еҚҰеә•йӘЁеӯҗж–№жңүе•ҶйҮҸд»ҠжңӘй ҲйҒҪз«Ӣи«–д№ҹз”Ёд№қз”Ёе…ӯд№Ӣж–ҮеӣәеңЁеҚҰжҲҗд№ӢеҫҢиҖҢз”Ёд№қз”Ёе…ӯд№ӢзҗҶд№ғеңЁеҚҰжҲҗд№ӢеүҚдәҰжҳҜжӯӨзҗҶдҪҶиҰӢеҫ—еҜҰй«”еҲҶжҳҺеүҮиҮӘз„¶и§ёиҷ•йҖҡйҖҸдёҚеӢһиҫЁиӘӘзҹЈиҮіи¬ӮдёҖе…«д№қе…ӯд№ғжҸІи“ҚиҖ…жүҖзӮәиҖҢйқһиҒ–дәәд№Ӣжі•жӯӨиӘӨе°ӨдёҚйӣЈжӣүд»Ҡдё”иӘӘжҸІи“Қд№Ӣжі•еҮәж–јиҒ–дәәиҖ¶еҮәж–јеҫҢдё–иҖ¶иӢҘж“ҡеӨ§еӮіеүҮжҳҜеҮәж–јиҒ–дәәз„Ўз–‘иҖҢз•¶жҳҜд№ӢжҷӮиӢҘз„Ўдёғе…«д№қе…ӯеүҮдәҰз„ЎжүҖеҸ–еҶід»ҘиҰӢе…¶зҲ»д№ӢйҡӮйҷҪеӢ•йқҷзҹЈдәҰ}
