  - {type: variant, offset: 21551, length: 2, content: 訓導, WYG: 也卦成之後各因一義推說邵子所謂後天之學也今來喻所引繋辭說卦三才六位之說即所謂後天者也先天後天既各自為一義而後天說中取義又多不同彼此自不相妨不可執一而廢百也若執此說必謂聖人初畫卦時只見一箇三才便更不問事由一連便掃出三畫以擬其象畫成之後子細看來見使不得又旋劃擘添出後一半截此則全是私意杜撰補接豈復更有易耶來喻條目尚多然其大節目不過如此今但於此看破則其餘小小未合處自當迎刃而觧矣故今不復悉辨以凂髙明伏幸財察答袁機仲來教疑河圖洛書是後人偽作熹竊謂生於今世而讀古人之書所以能别其真偽者一則以其義理之所當否而知之二則以其左驗之異同而質之未有舍此兩塗而能直以臆度懸斷之者也熹於世傳河圖洛書之舊所以不敢不信者正以其義理不悖而證驗不差爾來教必以為偽則未見有以指其義理之謬證驗之差也而直欲以臆度懸斷之此熹之所以未敢曲從而不得不辨也况今日之論且欲因象數之位置徃來以見天地隂陽之造化吉凶消長之本原茍於此未明則固未暇别尋證據今乃全不尋其義理亦未至明有證據而徒然為此無益之辨是不議於室而譟於門不味其腴而齩其骨也政使辨得二圖真偽端的不差亦無所用又况未必是乎願且置此而於熹所推二圖之說少加意焉則雖未必便是真圖然於象數本原亦當略見意味有歡喜處而圖之真偽将不辨而自明矣來教疑先天後天之說據邵氏說先天者伏羲所畫之易也後天者文王所演之易也伏羲之易初無文字只有一圖以寓其象數而天地萬物之理隂陽始終之變具焉文王之易即今之周易而孔子所為作傳者是也孔子既因文王之易以作傳則其所論固當專以文王之易為主然不推本伏羲作易畫卦之所由則學者必将誤認文王所演之易便為伏羲始畫之易只從中半說起不識向上根原矣故十翼之中如八卦成列因而重之太極兩儀四象八卦而天地山澤雷風水火之類皆本伏羲畫卦之意而今新書原卦畫一篇亦分兩儀伏羲在前文王在後必欲知聖人作易之本則當考伏羲之畫若只欲知今易書文義則但求之文王之經孔子之傳足矣兩者初不相妨而亦不可以相雜來教乃謂專為邵氏觧釋而於易經無所折衷則恐考之有未詳也來教謂七八九六不可為四象四象之名所包甚廣大抵須以兩畫相重四位成列者為正而一二三四者其位之次也七八九六者其數之實也其以隂陽剛柔分之者合天地而言也其以隂陽老少分之者專以天道而言也若專以地道言之則剛柔又自有太少矣推而廣之縱横錯綜凡是一物無不各有四者之象不但此數者而已矣此乃天地之間自然道理未畫之前先有此象此數然後聖人畫卦時依様畫出揲蓍者又隨其所得掛扐過揲之數以合焉非是元無實體而畫卦揲蓍之際旋次安排出來也來喻於此見得未明徒勞辨說竊恐且當先向未畫前識得元有箇太極兩儀四象八卦底骨子方有商量今未須遽立論也用九用六之文固在卦成之後而用九用六之理乃在卦成之前亦是此理但見得實體分明則自然觸處通透不勞辨說矣至謂一八九六乃揲蓍者所為而非聖人之法此誤尤不難曉今且說揲蓍之法出於聖人耶出於後世耶若據大傳則是出於聖人無疑而當是之時若無七八九六則亦無所取决以見其爻之隂陽動静矣亦}
