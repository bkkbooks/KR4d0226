  - {type: variant, offset: 21548, length: 2, content: 閩縣, WYG: 欽定四庫全書晦庵集卷三十八宋朱子撰書問答答袁機仲樞熹數日病中方得紬繹所示圖書卦畫二說初若茫然不知所謂因復以妄作啓蒙考之則見其論之之詳而明者偶未深考是以致此紛紛多説而愈致疑耳夫以河圖洛書為不足信自歐陽公以來已有此說然終無奈顧命繋辭論語皆有是言而諸儒所傳二圖之數雖有交互而無乖戾順數逆推縱横曲直皆有明法不可得而破除也至如河圖與易之天一至地十者合而載天地五十有五之數則固易之所自出也洛書與洪範之初一至次九者合而具九疇之數則固洪範之所自出也繋辭雖不言伏羲受河圖以作易然所謂仰觀俯察近取逺取安知河圖非其中之一事耶大抵聖人制作所由初無一端然其法象之規模必有最親切處如鴻荒之世天地之間隂陽之氣雖各有象然初未嘗有數也至於河圖之出然後五十有五之數奇耦生成粲然可見此其所以深發聖人之獨智又非汎然氣象之所可得而擬也是以仰觀俯察逺求近取至此而後兩儀四象八卦之隂陽奇耦可得而言雖繋辭所論聖人作易之由者非一而不害其得此而後决也來喻又謂熹不當以大衍之數參乎河圖洛書之數此亦有說矣數之為數雖各主於一義然其參伍錯綜無所不通則有非人之所能為者其所不合固不容以強合其所必合則縱横反覆如合符契亦非人之能強離也若於此見得自然契合不假安排底道理方知造化功夫神妙巧密直是好笑說不得也若論易文則自大衍之數五十至再扐而後掛便接乾之䇿二百一十有六至可與祐神矣為一節是論大衍之數自天一至地十却連天數五至而行鬼神也為一節是論河圖五十五之數今其文間斷差錯不相連接舛誤甚明伊川先生已嘗釐正啓蒙雖依此寫而不曽推論其所以然者故覽者不之察耳至於卦畫之論反復來喻於熹之說亦多未究其底藴且如所論兩儀有曰乾之畫奇坤之畫偶只此乾坤二字便未穩當盖儀匹也兩儀如今俗語所謂一雙一對云爾自此再變至生第三畫八卦已成方有乾坤之名當為一畫之時方有一奇一耦只可謂之隂陽未得謂之乾坤也來喻又曰以二畫増至四畫為二奇二耦又於四畫之上各增一奇一耦而為八畫此亦是於熹圖中所說發生次第有所未明而有此語盖四象第一畫本只是前兩儀圖之一奇一耦縁此一奇一耦之上各生一竒一耦是以分而為四而初畫之一竒一偶亦隨之而分為四叚耳非是以二畫增成四畫又以四畫増成八畫也此一節正是前所謂自然契合不假安排之妙孔子而後千載不傳至康節先生始得其說然猶不肯大叚説破盖易之心髓全在此處不敢容易輕說其意非偶然也來喻又曰不知隂陽二物果可分老少而為四象乎此恐亦考之未熟之過夫老少於經固無明文然揲蓍之法三變之中掛扐四以奇偶分之然後爻之隂陽可得而辨又於其中各以老少分之然後爻之變與不變可得而分經所謂用九用六者正謂此也若其無此則終日揲蓍不知合得何卦正使得卦不知當用何爻安得以為後世之臆說而棄之乎又詳所論直以天地為兩儀而天生神物以下四者為四象此尤非是大抵曰儀曰象曰卦皆是指畫而言故曰易有太極而生兩儀四象八卦又曰易有四象而示人以卦爻吉凶若如所論則是先有太極兩儀四象然後聖人以畫八卦而兩儀四象八卦三物各是一種面貎全然相接不著矣此乃易之綱領如法律之有名例不可以毫釐差熹之所見判然甚明更無疑惑不審髙明以為如何如其未然幸復有以見教也答袁機仲邵子曰太極既分兩儀立矣此下四節通論伏羲六十四卦圓圗此一節以第一爻而言左一奇為陽右一偶為隂所謂兩儀者也今此一竒為左三十二卦之初爻一偶為右三十二卦之初爻乃以累變而分非本即有此六十四叚也後倣此陽上交於隂隂下交於陽而四象生矣此一節以第一爻生第二爻而言也陽下之半上交於隂上之半則生隂中第二爻之一奇一偶而為少陽太隂矣隂上之半下交於陽下之半則生陽中第二爻之一竒一偶而為太陽少隂矣所謂兩儀生四象者也太陽一奇今分為左上十六卦之第二爻少隂一偶今分為右下十六卦之第二爻少陽太隂其分放此而初爻之二亦分為四矣陽交於隂隂交於陽而生天之四象剛交於柔柔交於剛而生地之四象此一節以第二爻生第三爻言也陽謂太陽隂謂太隂剛謂少陽柔謂少隂太陽之下半交於太隂之下半則生太隂中第三爻之一奇一偶而為艮與坤矣太隂之上半交於太陽之下半則生太陽中第三爻之一奇一偶而為乾與兑矣少陽之上半交於少隂之下半則生少隂中第三爻之一奇一偶而為離與震矣少隂之下半交於少陽之上半則生少陽中第三爻之一竒一偶而為巽與坎矣此所謂四象生八卦也乾一奇今分為八卦之第三爻坤一偶今分為八卦之第三爻餘皆倣此而初爻二爻之四今又分而為八矣乾兌艮坤生於二太故為天之四象離震巽坎生於二少故為地之四象八卦相錯而後萬物生焉一卦之上各加八卦以相間錯則六十四卦成矣然第三爻之相交則生第四爻之一奇一偶於是一奇一偶各為四卦之第四爻而下三爻亦分為十六矣第四爻又相交則生第五爻之一奇一偶於是一奇一偶各為二卦之第五爻而下四爻亦分而為三十二矣第五爻又相交則生第六爻之一竒一偶則一竒一偶各為一卦之第六爻而下五爻亦分為六十四矣盖八卦相乗為六十四而自三畫以上三加一倍以至六畫則三畫者亦加二倍而卦體横分亦為六十四矣其數殊塗不約而㑹如合符節不差毫釐正是易之妙處此來教所引邵氏先生說也今子細辨析奉呈幸詳考之方可見其曲折未遽可輕議也然此已是就六十四卦已成之後言之故其先後多寡有難著語處乍看極費分疏猝然曉㑹不得若要見得聖人作易根原直截分明却不如且看卷首横圖自始初只有兩畫時漸次看起以至生滿六畫之後其先後多寡既有次第而位置分明不費詞說於此看得方見六十四卦全是天理自然挨排出來聖人只是見得分明便作依本畫出元不曽用一毫智力添助盖本不煩智力之助亦不容智力得以助於其間也及至卦成之後逆順縱横都成義理千般萬種其妙無窮却在人看得如何而各因所見為說雖若各不相資而實未嘗相悖也盖自初未有畫時說到六畫滿處者邵子所謂先天之}
