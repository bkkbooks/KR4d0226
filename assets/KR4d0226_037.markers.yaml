  - {type: variant, offset: 21554, length: 2, content: 器校, WYG: 以揲蓍為哉此事前書辨之已詳非熹之創見新說更請熟玩當自見之今不復縷縷也來喻又云繋辭本只是四象生八卦今又倍之兩其四象而生八卦之一此數字不可曉然想不足深辨請且於前所謂實體者驗之庻乎其有得也來教疑四爻五爻者無所主名一畫為儀二畫為象三畫為卦則八卦備矣此上若旋次各加隂陽一畫則積至三重再成八卦者八方有六十四卦之名若徑以八卦徧就加乎一卦之上則亦如其位而得名焉方其四畫五畫之時未成外卦故不得而名之耳内卦為貞外卦為悔亦是畫卦之時已有此名至揲蓍求之則九變而得貞又九變而得悔又是後一段事亦如前所論七八九六云爾非謂必揲蓍然後始有貞悔之名也大抵新書所論卦位與繋辭說卦容有異同至論揲蓍則只本繋辭何由别有他說如此等處至為淺近而今為說乃如此竊恐考之殊未詳也來教引伊川先生說重卦之由重卦之由不但伊川先生之說如此盖大傳亦云八卦成列因而重之矣但八卦所以成列乃是從太極兩儀四象漸次生出以至於此畫成之後方見其有三才之象非聖人因見三才遂以己意思惟而連畫三爻以象之也因而重之亦是因八卦之已成各就上面節次生出若旋生逐爻則更加三變方成六十四卦若併生全卦則只用一變便成六十四卦雖有遲速之不同然皆自然漸次生出各有行列次第畫成之後然後見其可盡天下之變不是聖人見下三爻不足以盡天下之變然後别生計較又并畫上三爻以盡之也此等皆是作易妙處方其畫時雖是聖人亦不自知裏面有許多巧妙奇特直是要人細心體認不可草草立說也以上五條鄙意傾倒無復餘藴矣然此非熹之說乃康節之說非康節之說乃希夷之說非希夷之説乃孔子之說但當日諸儒既失其傳而方外之流隂相付受以為丹竈之術至於希夷康節乃反之於易而後其說始得復明於世然與見今周易次第行列多不同者故聞者創見多不能曉而不之信只據目今見行周易縁文生義穿鑿破碎有不勝其杜撰者此啓䝉之書所為作也若其習聞易曉人人皆能領畧則又何必更著此書以為屋下之屋牀上之牀哉更願髙明毋以為熹之說而忽之姑且虚心遜志以求其通曉未可好髙立異而輕索其瑕疵也玩之久熟浹洽於心則天地變化之神隂陽消長之妙自将瞭於心目之間而其可驚可喜可笑可樂必有不自知其所以然而然者矣言之不盡偶得小詩以寄鄙懷曰忽然半夜一聲雷萬戸千門次第開若識無心涵有象許君親見伏羲來説得太郎當了只少箇拄杖卓一下便是一囘普說矣狂妄僣率幸勿鄙誚也答袁機仲伏承别紙誨諭諄悉及示新論尤荷不鄙但區區之說前此已悉陳之而前後累䝉排擯揮斥亦已不遺餘力矣今復下喻使罄其說顧亦何以異於前日耶然既辱開之使言則又不敢嘿嘿然其大者未易遽論姑即來教一二淺者質之夫謂溫厚之氣盛於東南嚴凝之氣盛於西北者禮家之說也謂陽生於子於卦為復隂生於午於卦為垢者厯家之說也謂巽位東南乾位西北者說卦之說也此三家者各為一說而禮家厯家之言猶可相通至於說卦則其卦位自為一說而與彼二者不相謀矣今來教乃欲合而一之而其間又有一說之中自相乖戾者此熹所以不能無疑也夫謂東南以一隂已生而為隂柔之位西北以一陽已生而為陽剛之位則是陽之盛於春夏者不得為陽隂之盛於秋冬者不得為隂而反以其始生之㣲者為主也謂一隂生於東南一陽生於西北則是隂不生於正南午位之遇而滛於東陽不生於正北子位之復而旅於西也謂巽以一隂之生而位乎東南則乾者豈一陽之生而位於西北乎况說卦之本文於巽則但取其潔齊於乾則但取其戰而已而未嘗有一隂一陽始生之說也凡此崎嶇反復終不可通不若直以陽剛為仁隂柔為義之明白而簡易也盖如此則發生為仁肅殺為義三家之說皆無所牾肅殺雖似乎剛然實天地收斂退藏之氣自不妨其為隂柔也來教又論黑白之位尤不可曉然其圖亦非古法但今欲易曉且為此以寓之耳乾則三位皆白三陽之象也兌則下二白而上一黑下二陽而上一隂也離則上下二白而中一黑上下二陽而中一陰也震則下一白而上二黑下一陽而上二陰也巽之下一黑而上二白坎之上下二黑而中一白艮之下二黑而上一白坤之三黑皆其三爻隂陽之象也蓋乾兌離震之初爻皆白巽坎艮坤之初爻皆黑四卦相間兩儀之象也乾兌巽坎之中爻皆白離震艮坤之中爻皆黑兩卦相間四象之象也乾離巽艮之上爻皆白兌震坎坤之上爻皆黑一卦相間八卦之象也豈有震坎皆黑而如坤巽離皆白而如乾之理乎此恐畫圖之誤不然則明者察之有未審也凡此乃易中至淺至近而易見者契丈猶未之盡而況其體大而義深者又安可容易輕忽而遽加詆誚乎此熹所以不敢索言蓋恐其不足以解左右者之惑而益其過也幸試詳之若熹所言略有可信則願繼此以進不敢吝又讀來書以為不可以仁義禮智分四時此亦似太草草矣夫五行五常五方四時之相配其為理甚明而為說甚久非熹獨於今日創為此論也凡此之類竊恐髙明考之未詳思之未審而卒然立論輕肆詆訶是以前此區區所懷不欲盡吐於老丈之前者尚多此其為訑訑之聲音顔色大矣若欲實求義理之歸恐當去此而虛以受人庶幾乎其有得也僣易皇恐熹又禀答袁機仲别幅乾於文王八卦之位在西北於十二卦之位在東南坤於文王八卦之位在西南於十二卦之位在西北故今圖子列文王八卦於内而布十二卦於外以見彼此位置逈然不同雖有善辨者不能合而一之也然十二卦之説可曉而八卦之説難明可曉者當推難明者當闕按圖以觀則可見矣論十二卦則陽始於子而終於己隂始於午而終於亥論四時之氣則陽始於寅而終於未隂始於申而終於丑此一説者雖若小差而所爭不過二位蓋子位一陽雖生而未出乎地至寅位泰卦則三陽之生方出地上而温厚之氣自此始焉己位乾卦六陽雖極而温厚之氣未終故午位一陰雖生而未害於陽必至未位遯卦而後温厚之氣始盡也其午位隂已生而嚴凝之氣及申方始亥位六陰雖極而嚴凝之氣至丑方盡義亦倣此盖地中之氣難見而地上之氣易識故周人以建子為正雖得天統而孔子之論為邦乃以夏時為正盖取其隂陽始終之著明也按圖以推其説可見來喻謂坤之上六陽氣已生其位在亥乾之上九隂氣已生其位在巳以剥上九碩果不食十月為陽月之義推之則剝卦上九之陽方盡而變為純坤之時坤卦下爻已有陽氣生於其中矣但一日之内一畫之中方長得三十分之一必積之一月然後始滿一畫而為復方是一陽之生耳夬之一陰為乾為遇義亦同此來喻雖有是説而未詳宻故為推之如此盖論其始生之微固己可名於隂陽然便以此為隂陽之限則其方盛者未替而所占不啻卦内六分之五方生者甚微而所占未及卦内六分之一所以未可截自此處而分陰陽也此乃十二卦中之一義與復遇之説理本不殊但數變之後方説得到此不可攙先輥説亂了正意耳來諭又謂冬春為陽夏秋為陰以文王八卦論之則自西北之乾以至東方之震皆父與三男之位也自東南之巽以至西方之兑皆母與三女之位也故坤蹇解卦之彖辭皆以東北為陽方西南為陰方然則謂冬春為陽夏秋為陰亦是一説但說卦又以乾為西北則隂有不盡乎西以巽為東南則陽有不盡乎東又與三卦彖辭小不同此亦以來書之説推之而説卦之文適與彖辭相為表裏亦可以見此圖之出於文王也但此自是一説與他説如十二卦之類各不相通耳來喻以東南之温厚為仁西北之嚴凝為義此鄉飲酒義之言也然本其言雖分仁義而無陰陽柔剛之别但於其後復有陽氣發於東方之說則固以仁為屬乎陽而義之當屬乎陰從可推矣來喻乃不察此而必欲以仁為柔以義為剛此既失之而又病夫柔之不可屬乎陽剛之不可屬乎陰也於是彊以温厚為柔嚴凝為剛又移北之隂以就南而使主乎仁之柔移南之陽以就北而使主乎義之剛其於方位氣候悉反易之而其所以為説者率皆參差乖迕而不可合又使東北之為陽西南之為陰亦皆得其半而失其半愚於圖子已具見其失矣蓋嘗論之陽主進而陰主退陽主息而陰主消進而息者其氣彊退而消者其氣弱此隂陽之所以為柔剛也陽剛温厚居東南主春夏而以作長為事陰柔嚴凝居西北主秋冬而以歛藏為事作長為生歛藏為殺此剛柔之所以為仁義也以此觀之則隂陽剛柔仁義之位豈不曉然而彼楊子雲之所謂於仁也柔於義也剛者乃自其用處之末流言之盖亦所謂陽中之陰隂中之陽固不妨自為一義但不可以雜乎此而論之爾向日妙湛盖嘗靣禀易中卦位義理層數甚多自有次第逐層各是一箇體靣不可牽彊合為一説學者須是旋次理㑹理㑹上層之時未要攪動下層直待理㑹得上層都透徹了又却輕輕掲起下層理㑹將去當時雖似遲鈍不快人意然積累之久層層都了却自見得許多條理千差萬别各有歸著豈不快哉若不問淺深不分前後輥成一塊合成一說則彼此相妨令人分䟽不下徒自紛紛成鹵莽矣此是平生讀書已試之效不但讀易為然也前書所論仁義禮智分屬五行四時此是先儒舊説未可輕詆今者來書雖不及之然此大義也或恐前書有所未盡不可不究其説蓋天地之間一氣而已分陰分陽便是兩物故陽為仁而隂為義然陰陽又各分而為二故陽之初為木為春為仁陽之盛為火為夏為禮隂之初為金為秋為義隂之極為水為冬為智蓋仁之惻隱方自中出而禮之恭敬則已盡發於外義之羞惡方自外入而智之是非則已全伏於中故其象類如此非是假合附㑹若能黙㑹於心便自可見元亨利貞其理亦然文言取類尤為明白非區區今日之臆説也五行之中四者既各有所屬而土居中宫為四行之地四時之主在人則為信為真實之義而為四德之地衆善之主也五聲五色五味五臭五藏五䖝其分放此盖天人一物内外一理流通貫徹初無間隔若不見得則雖生於天地間而不知所以為天地之理雖有人之形貌而亦不知所以為人之理矣故此一義切於吾身比前數段尤為要𦂳非但小節目而已也答袁機仲垂諭易説又見講學不倦下問不能之盛美尤竊欽仰已悉鄙意别紙具呈矣此但易中卦畫隂陽之分位耳未是吾人切身之事萬一愚見未合盛意可且置之而更别向裏尋求恐合自有𦂳切用功處也答袁機仲再辱垂諭具悉尊㫖然細觀本末初無所爭只因武陵舊圖仁義兩字偶失照管致有交互其失甚微後來既覺仁字去西北方不得義字去東南方不得即當就此分明改正便無一事顧乃䕶其所短而欲多方作計移換隂陽剛柔四字以盡其失所以競辨紛紜以至於今而不能定也蓋始者先以文王八卦為說而謂一隂生於巽一陽生於乾則既非説卦本意矣其以二陽純乾之方為一陽始生之地則又為乖剌之甚者及既知之而又以十二卦為説則謂一陽生於乾之上九一隂生於坤之上六遂移北方之隂柔以就南使之帶囘仁字於西南而不失其為隂柔移南方之陽剛以歸北使之帶囘義字於東北而不失其陽剛則亦巧矣然其所移動者凡二方而六辰六卦例皆失其舊主又更改却古來陰陽界限蓋不勝其煩擾而其所欲遷就之意乃不過僅得其半而失其半蓋北方雖曰嚴凝而東方已為温厚南方雖曰温厚而西方已為嚴凝也是則非惟不足以救舊圖一時之失而其耻過作非故為穿鑿之咎反有甚於前日者竊恐髙明於此急於求勝未及深致思也欲究其説以開盛意又念空言繳繞難曉易差不免畫成一圖先列定位而後别以舊圖之失及今者兩次所論之意隨事貼説有不盡者則又詳言别為數條以附於後切望虛心平氣細考而徐思之若能於此翻然悔悟先取舊圖分明改正仁義二字却將今所移易陰陽剛柔等字一切發囘元來去處如熹新圖之本位則易簡圓成不費詞説而三才五行天理人事已各得其所矣至於文王八卦則熹嘗以卦畫求之縱横反覆竟不能得其所以安排之意是以畏懼不敢妄為之説非以為文王後天之學而忽之也夫文王性與天合乃生知之大聖而後天之學方根求其説而不得熹雖至愚亦安敢有忽之之心耶但如來書所論則不過是因其已定之位已成之説而應和贊歎之爾若使文王之意止於如此則熹固己識之不待深思而猶病其未得矣故嘗竊謂髙明之於此圖尊之雖至信之雖篤而所以知之則恐有不如熹之深者此又未易以言語道也至於邵氏以此圖為文王之學雖無所考然説卦以此列於天地定位雷以動之兩節之後而其布置之法逈然不同則邵氏分之以屬於伏羲文王恐亦不為無理但未曉其根源則姑闕之以俟知者亦無甚害不必卓然肆意立論而輕排之也又謂一竒一耦不能生四象而二竒二耦不能生八卦則此一圖極為易曉又不知老丈平時作如何㸔而今日猶有此疑也盖其初生之一竒一耦則兩儀也一竒之上又生一竒一耦則為二畫者二而謂之太陽少陰矣此耦之上亦生一竒一耦則亦為二畫者二而謂之少陽太隂矣此所謂四象者也四象成則兩儀亦分為四太陽竒畫之上又生一竒一耦則為上爻者三而謂之乾兌矣餘六條準此此則所謂八卦者也八卦成則兩儀四象皆分為八是皆自然而生瀵湧而出不假智力不犯手勢而天地之文萬事之理莫不畢具乃不謂之畫前之易謂之何哉僕之前書固己自謂非是古有此圖只是今日以意為之寫出竒耦相生次第令人易曉矣其曰畫前之易乃謂未畫之前已有此理而特假手於聰明神武之人以發其秘非謂畫前已有此圖畫後方有八卦也此是易中第一義若不識此而欲言易何異舉無綱之網挈無領之裘直是無著力處此可為知者道也目疾殊甚不能親書切幸深照第四畫者以八卦為太極而復生之兩儀也第五畫者八卦之四象也第六畫者八卦之八卦也再㸔來書有此一項此書未答故復及之熹又禀答袁機仲易説不知尊意看得如何前書所云二方六卦六辰皆失其所與得半失半之說後來思之亦有未盡盖徙陽扵北使陽失其位而奪隂之位徙隂於南使隂失其位而奪陽之位二方固己病矣東方雖得仍舊為陽然其温厚之仁不得南與同類相合而使彊附於北方嚴凝之義不則却須改仁為義以去隂而就陽方得寧貼然又恐無此理是東方三卦三辰亦失其所也西方雖得仍舊為隂然其離北附南與夫改義為仁其勢亦有所不便是西方三卦三辰亦失其所也盖移此二方而四方八面十二辰十二卦一時鬼亂無一物得安其性命之情也前書所禀殊未及此之明白詳盡也答袁機仲易説已悉若只如此則熹固己深曉不待諄諄之告矣所以致疑正恐髙明之見有所未盡而費力穿鑿使隂陽不得據其方盛之地仁義不得保其一德之全徒爾紛紜有損無益爾今既未䝉省察執之愈堅則區區之愚尚復何說竊意兩家之論各自為家公之不能使我為公猶我之不能使公為我也不若自此閉口不談各守其說以俟羲文之出而質正焉然以髙明之見自信之篤竊恐羲文復出亦未肯信其說也魏鄭公之言以為望獻陵也若昭陵則臣固己見之矣佛者之言曰諸人知處良遂摠知良遂知處諸人不知正此之謂矣世間事吾入身在閑處言之無益此正好從容講論以慰窮愁而枘鑿之不合又如此是亦深可歎者而信乎其道之窮矣答袁機仲易說垂示極荷不鄙然淺陋之見前已屢陳至煩訶斥久矣今復何敢有言但詳序說諸篇唯是依經說理而不惑於諸儒臆說之鑿此為一書要切之㫖今以篇中之說考之則如繋辭說卦觧兩引禮記以春作夏長為仁秋斂冬藏為義說卦觧又獨引温厚之氣始於東北盛於東南嚴凝之氣始於西南盛於東北以為仁義之分此於經既有据又合於理之自然真可謂不惑於諸儒臆說之鑿矣但其所以為說則又必以為聖人恐乾止有陽剛而無仁坤止有隂柔而無義故必兼三才以為六畫然後能使乾居東北而為冬春之陽坤居西南而為夏秋之隂又必横截隂陽各為兩叚以分仁義之界然後能使春居東而為乾之仁夏居南而為坤之仁秋居西而為坤之義冬居北而為乾之義此非本書之詞但以鄙意注觧如此庻覽者之易曉耳則其割裂補綴破碎參差未知於經何所据依而何以異於諸儒臆説之鑿也又按文王孔子皆以乾為西北之卦艮為東北之卦顧雖未能洞曉其所以然然經有明文不可移易則已審矣今乃云乾位東北則是貶乾之尊使居艮位未知使艮却居何處此又未知於經何所据依而何以異於諸儒臆說之鑿也又按孔子明言易有太極是生兩儀是則固以太極為一兩儀為二而凡有心有目者皆能識之不待推厯布算而後可知也今太極論乃曰乾坤者易之太極則是以兩儀為太極而又使之自生兩儀矣未知此於經何所据依而又何以異於諸儒臆說之鑿也至繋辭觧又謂太極者一之所由起則是又以為太極之妙一不足以名之而其序則當且生所起之一而後再變乃生兩儀矣此則又未暇論其於經有無据依是與不是諸儒臆說之鑿而但以前論參之已有大相矛盾者不審髙明之意果何如也凡此四條熹皆不敢輙以為非以觸尊怒但所未曉不敢不求教耳答袁機仲誨諭參同邵氏不知易之說辨博髙深非淺陋所能窺測但參同之書本不為明易乃姑借此納甲之法以寓其行持進退之候異時每欲學之而不得其傳無下手處不敢輕議然其所言納甲之法則今所傳京房占法見於火珠林者是其遺說沈存中筆談解釋甚詳亦自有理參同所云甲乙丙丁庚辛者乃以月之昏旦出沒言之非以分六卦之方也此雖非為明易而設然易中無所不有茍其言自成一說可推而通則亦無害於易恐不必輕肆詆排也至扵邵氏先天之說則有推本伏羲畫卦次第生生之妙乃是易之宗祖尤不當率爾妄議或未深曉且當置而不論以謹闕疑若必以為不知易則如熹輩尚何足與言易而每煩提耳之勤也既荷不鄙不敢不盡其愚其他如六五坤承向亦疑有誤字見於考異而所示十二卦圖以垢為子以復為午亦所未喻所引坎離無爻位亦有脱字此或只是筆誤皆未暇論也答趙提舉善譽慕用之久徃歳雖辱寵臨而倥偬卒廹不能少欵每以為恨近乃竊窺所著易論語書又歎其得之之晚而不獲親扣名理也間因虞君轉請所疑初未敢以姓名自通而髙明不鄙逺辱貽書所以傾倒之意甚厚三復以還感慰無量不敢無以報也盖道體之大無窮而於其間文理密察有不可以毫釐差者此聖賢之語道所以既言發育萬物峻極于天以形容其至大而又必曰禮儀三百威儀三千以該悉其至微而其指示學者脩德凝道之功所以既曰致其廣大而又必曰盡其精㣲也近世之言道者則不然其論大抵樂渾全而忌剖析喜髙妙而略細微其於所謂廣大者則似之而於精微有不察則其所謂廣大者亦未易以識其全體之真也今且以經言論之其所發明固不外乎一理然其所指則不能無異同之别而就其所同之中盖亦不無賔主親踈逺近之差焉如卦之所以八者以奇耦之三加而成也而爻之所以三則取諸三才之象而非奇耦所能與此理之一而所指之不同者也四象之說本為畫卦則當以康節之說為主而七八九六東西南北水火金木之類為客得其主則客之親疎逺近皆即此而可定不得其主而曰是皆一說則我欲同而彼自異終有不可得而同者矣此所指之同而不能無賔主之分者也是皆樂渾全而忌剖析之過也至於乾坤之純而不雜者聖人所以形容天地之德而為六十四卦之綱也乾之純於剛健而不雜又聖人所以形容天理自然之全體而為坤之綱也所以贊其剛健柔順之全德以明聖人體道之妙學者入德之方者亦云備矣未嘗以其偏而少貶之也至於諸爻雖或不免於有戒然乾九三之危以其失中也其得無咎以其健而行也坤六五之元吉以其居尊而能下也上六之龍戰以其太盛而亢陽也是豈惡乾之剛而欲其柔惡坤之柔而欲其剛哉今未察乎其精微之藴而遽指其偏以為當戒意若有所未足於乾坤而陿小之者是不亦喜髙妙而略細微之過乎至於用九用六乃為戒其剛柔之偏者然亦因其隂變為陽陽變為隂之象而有此戒如歐陽子之云者非聖人創意立説而強為之也大抵易之書本為卜筮而作故其詞必根於象數而非聖人已意之所為其所勸戒亦以施諸筮得此卦此爻之人而非反以戒夫卦爻者近世言易者殊不知此所以其說雖有義理而無情意雖大儒先生有所不免比因玩索偶幸及此私竊自慶以為天啓其衷而以語人人亦未見有深曉者不知髙明以為如何舊亦草筆其說今漫録二卦上呈其他文義未瑩者多未能卒業姑以俟後世之子雲耳近又嘗編一小書畧論象數梗槩并以為獻妄竊自謂學易而有意扵象數之說者於此不可不知外此則不必知也心之精㣲言不能盡臨風引領馳想增劇答趙提舉易學未蒙指教乃有簡易之褒令人踧踖其書草略何足以當此然此二字在易數中真不可易之妙近世說易者愈多而此理愈晦非見之明孰能以一言盡之哉歎服亡已近嘗略修數處尋别寄呈但圖書錯綜縱横無不脗合終有不可得而盡者信乎天地之文非人之私智所能及也與周益公熹竊以孟夏清和伏惟判府安撫少保大觀文丞相國公鈞候動止萬福熹近嘗拜書并胡先生墓文請教今者至城中乃知未遣已白史君趣其行諒亦非久當徹鈞聽也熹有少懇率易拜禀熹先君子少喜學荆公書收其墨蹟為多其一紙乃進鄴侯家傳奏草味其詞㫖玩其筆勢直有跨越古今開闔宇宙之氣然與今版本文集不同疑集中者乃刪潤定本而此紙乃其胸懐本趣也嘗欲抄目録李傳本語附其後而并刻之使後之君子得以考焉而未暇也今江西使者汪兄季路乃欲取而刻之臨川妄意欲求相公一言以重其事庻幾覽者有以知此幅紙數行之間而其所闗渉乃有不可勝言之感非獨為筆札玩好設也伏惟相公亦當慨然於此而終惠之早賜揮染附季路為幸甚厚其他尚有與王觀文論邉事數紙異時并當附呈以求審定也專此具禀不敢它及伏乞鈞照答周益公昨蒙寵喻范歐議論鄙意有所不能無疑欲以請教而亦未暇今遇此便似不可失而病軀兩日覺得沉重愈甚於前勢不容詳細禀白但竊以為范歐二公之心明白洞逹無纖芥可疑吕公前過後功瑕瑜自不相掩若如尊喻却恐未為得其情者故願相公更熟思之也向見范公與吕公書引汾陽臨淮事者語意尤明白而集中却不見之恐亦為}
