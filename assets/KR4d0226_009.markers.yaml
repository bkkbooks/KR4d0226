  - {type: variant, offset: 0, length: 6521, content: 晦庵先生朱文公文集卷第九詩石馬斜川之集分韻賦詩得燈字改歲風日好出門欣得朋復招里中彦及此雲間僧行行渉清波斯亭一來登徙倚緑樹䕃摩娑蒼石稜遥瞻原野春仰視天宇澄一水旣紆鬱群山正崚嶒時禽悅新陽濳魚躍輕氷却念去年日俯仰愁予􅈾長呤斜川詩日落寒烟凝瞑色變晴景清尊照華燈頽顔感川徂稚齒歡年増酒盡不能起朱欄各深凭游石馬以駕言出遊分韻賦詩得出字抱病守窮廬閉户常罕出坐見春氣深清隂晝䝉密今朝積雨過淑景回煦律不有塵外蹤何由散愁寂行行整巾屨散漫委書帙野逕自縈紆前峰但崷崒婆娑茂樹下左右寒流汨亂石翳蒼根於焉憇腰膝追遊固才彦逢遇亦竒逸招邀愧深情晤言永兹日君有尊中物我進沂上瑟日夕不得留餘歡未云畢三月晦日與諸兄爲眞率之約徘徊石馬晚集保福偶成短句奉呈聊發一笑春服明朝換晴川漲緑隂追隨皆勝侣邂逅即初心社蹟莓苔古禪扉竹樹深移尊眞惜日畢景共披襟儉德遵賢範哇詞愧雅音清和應更好逸想寄雲岑是日約後㑹爲仙洲之游比與鄰曲諸賢修舉歲事携壺石馬追𥙷斜川之遊而公濟適至飲罷首出和陶之句以紀其勝輙亦用韻酬答兼呈諸同遊者請共賦之皇天分四序代謝無時休昔人抱孤念感此成清遊逈眺曽城臯朗詠斜川流歲月今幾許長波没輕鷗眷言撫佳辰荒㝷靡遺丘且復置往事及兹命高儔縱䇿聊並歡飛觥起相酬未知千載下亦記此日不商歌有遺音林樂無餘憂但得長如此吾生復何求行視武夷精舍作神山九折溪㳂泝此中半水深波浪闊浮緑春渙渙武夷溪凢九曲多急流亂石北第五曲水特深闊平緩緑漪可愛上有蒼石屏百仭聳雄觀嶄巖露垠堮突兀倚霄漢此峯夷上削下㧞地峭立如方屋㡌按舊圖名大隱屏淺麓下縈迴深林乆叢灌胡然閟千載逮此開一旦峯下小山重複中有平地數十丈喬木長藤茂林脩竹交相蔽隱舊無人迹乾道巳丑予舟過而樂之及今始能卜築以醻曩志我乗新村船輟棹青草岸榛莽喜誅鉏靣勢窮考按居然一環堵妙處豈輪奐左右矗竒峯躊躇極佳玩方經始時予以病不能來至是送别山西始自新村買舟以來視所縛屋三間制度殊草草然背負大隱屏靣直溪南大山左有魏王上昇峯右有鍾模三教等石極爲雄勝是時芳節䦨紅緑紛有爛好鳥時一鳴王孫逺相喚山多獮猴暫遊意巳愜獨往身猶絆珍重舍瑟人重來足幽伴巳約𥘉夏與同志皆往遊集武夷精舍雜詠并序武夷之溪東流凡九曲而第五曲爲最深蓋其山自北而南者至此而盡聳全石爲一峯㧞地千尺上小平處㣲戴土生林木極蒼翠可玩而四隤稍下則反削而入如方屋帽者舊經所謂大隱屏也屏下兩麓坡坨旁引還復相抱抱中地平廣數畒抱外溪水隨山勢從西北來四屈折始過其南乃復繞山東北流亦四屈折而出溪流兩旁丹崖翠壁林立環擁神剜鬼刻不可名狀舟行上下者方左右顧瞻錯愕之不暇而忽得平岡長阜蒼藤茂木按衍迤靡膠葛䝉翳使人心目曠然以舒窈然以深若不可極者即精舍之所在也直屏下兩麓相抱之中西南向爲屋三間者仁智堂也堂左右兩室左曰隱求以待棲息右曰止宿以延賔友左麓之外復前引而右抱中又自爲一塢因累石以門之而命曰石門之塢別爲屋其中以俟學者之群居而取學記相觀而善之義命之曰觀善之齋石門之西少南又爲屋以居道流取道書眞誥中語命之曰寒棲之館直觀善前山之顚爲亭回望大隱屏最正且盡取杜子美詩語名以晚對其東出山背臨溪水因故基爲亭取胡公語名以鐵笛說具本詩注中寒栖之外乃植楥列樊以斷兩麓之口掩以柴扉而以武夷精舍之扁掲焉經始於淳熈癸卯之春其夏四月旣望堂成而始來居之四方士友來者亦甚衆莫不歎其佳勝而恨它屋之未具不可以乆留也釣磯茶竈皆在大隱屏西磯石上平在溪北岸竈在溪中流巨石屹然可環坐八九人四靣皆深水當中科臼自然如竈可㸑以㵸茗凢溪水九曲左右皆石壁無側足之徑唯南山之南有蹊焉而精舍乃在溪北以故凢出入乎此者非魚艇不濟總之爲賦小詩十有二篇以紀其實若夫晦明昏旦之異候風烟草木之殊態以至於人物之相羊猿鳥之吟嘯則有一日之間恍惚萬變而不可窮者同好之士其尚有以發於予所欲言而不及者乎哉精舍琴書四十年㡬作山中客一日茅棟成居然我泉石仁智堂我慙仁知心偶自愛山水蒼崖無古今碧澗日千里隠求齋晨䆫林影開夜枕山泉響隱去復何求無言道心長止宿寮故人肯相尋共寄一茅宇山水爲留行無勞具雞黍石門塢朝開雲氣擁暮掩薜蘿深自笑晨門者那知孔氏心觀善齋負笈何方來今朝此同席日用無餘功相看俱努力寒栖館竹間彼何人抱甕靡遺力遥夜更不眠焚香坐看壁晚對亭倚笻南山巔郤立有晚對蒼峭矗寒空落日明影翠鐵笛亭山前舊有奪秀亭故侍郎胡公明仲嘗與山之隱者劉君兼道遊渉而賦詩焉劉少豪勇游俠使氣晚更晦迹自放山水之間善吹鐵笛有穿雲裂石之聲胡公詩有更煩横鐵笛吹與衆仙聴之句亭今廢乆一日與客及道士數人尋其故址適有笛聲發於林外悲壯回欝巖石皆震追感舊事因復作亭以識其處仍改今名何人轟鐵笛噴薄兩崖開千載留餘響猶疑笙鶴來釣磯削成蒼石稜倒影寒潭碧求日靜垂竿兹心竟誰識茶竈仙翁遺石竈宛在水中央飲罷方舟去茶煙裊細香漁艇出載長煙重歸􅋔片月輕千巖猿鶴友愁絶棹歌聲次公濟精舍韻一室空山裏纎塵逈莫侵若非同臭味誰肯逺過臨健䇿凌丹壑清詩動玉琴溪邊一回首平地足﨑嶔奉同公濟諸兄自精舍來集冲佑之歲寒軒因邀諸羽客同飲公濟有詩贈守元章師因次其韻蓬萊清淺今幾年武夷突兀還蒼然但忻丹籍有期運不悟翠壁無寅緣鼎中龍虎應浪語紙上爻彖非眞傳明朝猿呌三峽路一葉徑上滄浪船出山道中口占川原紅綠一時新暮雨朝晴更可人書冊埋頭無了日不如抛却去㝷春淳熈甲辰中春精舎間居戲作武夷櫂歌十首呈諸同遊相與一笑武夷山上有仙靈山下寒流曲曲清欲識箇中竒絶䖏櫂歌閑聽兩三聲一曲溪邊上釣船幔亭峯影蘸晴川虹橋一斷無消息萬壑千巖鎻翠煙二曲亭亭玉女峰挿花臨水爲誰容道人不復陽臺夣興入前山翠幾重三曲君看架壑船不知停櫂幾何年桑田海水今如許泡沫風燈敢自憐四曲東西兩石巖巖花垂露碧􅧑毶金雞呌罷無人見月滿空山水滿潭五曲山高雲氣深長時烟雨暗平林林間有客無人識欵乃聲中萬古心六曲蒼屏遶碧灣茅茨終日掩柴關客來倚櫂巖花落猿鳥不驚春意閑七曲移船上碧灘隱屏仙掌更回看人言此處無佳景只有石堂空翠寒此詩後二句一本作却憐昨夜峯頭雨添得飛泉幾道寒八曲風烟勢欲開鼓樓巖下水縈洄莫言此處無佳景自是逰人不上來九曲將窮眼豁然桑麻雨露見平川漁郎更覔桃源路除是人間别有天伏䝉致政少傅相公寵賜寄題武夷精舍詩一首拜受捧讀不勝仰歎無以自見區區感幸之誠輙繼高韻繕寫拜呈冒瀆威尊下情恐悚之至望斷鈞天白玉都石田茅屋詎應無况䝉一字榮褒衮便覺千峰勝畫圖舊弼詩情高綠野狂奴心事只風雩蒲輪幾日符嘉夣恰有流霞酒一壺舊弼公所居坊名取答詔語也熹近嘗夣公趣召枉臨止飲留宿翌日登車手取几間活人書一帙以行意者公當再施醫國之手以活斯人乎李義山武夷詩有流霞酒一杯之句劉子澄逺寄羊裘且有懐仁輔義之語戲成两絶爲謝以發千里一笑短棹長簔九曲灘晚來閑弄釣魚竿幾回欲過前灣去却怕斜風特地寒誰把羊裘與醉披故人心事不相違狂奴今夜知何處月冷風凄未肯歸過蓋竹作二首二月春風特地寒江樓獨自倚欄干箇中詎有行藏意且把前峰細數看浩蕩鷗盟乆未寒征驂聊此駐江干何時買得魚船就乞與人間畫裏看送建陽陳丞伯厚還鄕栝蒼雲壑入秋夣閩嶺風霜侵鬢絲歲晚未收稽古力徑荒曽擬賦歸辭一官坎壈嗟丞負百歲歡榮慶母慈去歩逶迱無愠色此心惟有古人知拜鴻慶宫有感舊京原廟乆煙塵白髪祠官感慨新北望千門空引籍不知何日去朝眞答袁機仲論啓䝉忽然半夜一聲雷萬戸千門次第開若識無心含有象許君親見伏羲來半夜一本作平地觀林長仁書卷戲題問答猿去山空鶴亦飛柴門空掩釣魚磯門前樹葉都黄了何事幽人乆不歸爲愛雲泉百尺飛故將茅屋傍苔磯幾年清夣黄塵裏此日秋風一棹歸題嚴居厚溪莊圖平日生涯一短篷只今回首畫圖中平章箇裏無窮事要見三山老放翁謂陸務觀時嚴居厚之官剡中擬縣𥙷以蟲鳴秋詩天籟誰爲主乗時各自鳴如分百蟲響來助九秋清未歇吟風調先催泣露聲乾坤闢氛氣草木斂華英易斷愁人夣難安懶婦驚唯應廣成子萬感不關情古語云絡緯鳴懶婦驚見詩䟽挽蔡太博疇昔相逢地知君意矯强旋聞將使指勁節動朝行方爲人材喜相期事業長如何遽不淑未及鬢毛蒼乙卯八月晦日浮翠亭次叔通韻弱植有孤念獨住窮名山那知歲月逝白首塵埃間今朝定何朝憑高睨清灣羣賢亦戾止共此一日閑晤言不知疲林昏鳥飛還勝踐可無紀重來諒非艱留語巖上石母使門常關用丘子服弟韻呈儲行之明府伯玉卓丈及坐上諸友我是溪山舊主人歸來魚鳥便相親一盃與爾同生死萬事從渠更故新謹次縣大夫見屬之韻撫摩凋瘵爲心切摹寫風煙著語親只願從今更無倦清詩美政逐年新承事卓丈置酒白雲山居飮餞致政儲丈叔通因出佳句諸公皆和熹輙亦繼韻聊發坐中一笑此題一本作白雲寺送儲柯伯升老去讀書秋樹根山林兒女定誰尊偶縁送客來僧寺却似披雲卧石門物外祗今成跌蕩人間何處不啾喧一杯且爲陽關盡雙目從教别淚昏東坡賦徐德占舊居有一爲兒女涴始覺山林尊之句丙辰正月三日贈彭世昌歸山象山聞說是君開雲木參天瀑響雷好去山頭且堅坐等閑莫要下山來和人都試之韻儲胥聞道落𥘉成共喜兒郞意氣生初恨雨聲迷疊皷忽驚晴色動高旌盤牟入詠詩情壯破的傳觴酒令明縱使腐儒東鄉坐不妨堂上有竒兵聚星落成致政陳丈舉酒屬客出示新詩而仲卿朝瑞及劉范二兄相與繼作熹幸以卜鄰得陪勝集率爾次韻聊發一笑適親德範仰循循遽喜名章肆筆成賸說臺高今勝昔極知星聚暗還明當家翰藻爭春麗上客詞源徹底清更共鄰翁閑指點千峰環合水無聲謹次陳昭逺丈龍洲鄉社高韻并呈諸兄友幾年社酒醉班荆此日祠壇喜落成誤許俗書輕染汙急傳佳語頌登平年豐巳荷天垂慶人傑還欣地炳靈不信鄰村是塵境請看緑水鎻紅亭懷潭溪舊居憶住潭溪四十年好峰無數列䆫前雖非水抱山環地却是冬温夏冷天遶舎扶踈千箇竹傍崖寒冽一泓泉誰教失計東遷繆憊卧西䆫日滿川丼澤應祈一蘇焦槁皆昭逺致政宣義丈及仲卿諸友晝夜精䖍不出道埸之力而昭逺丈惠詩反以見屬非所敢當輒依高韻和呈以見鄙懷并簡同社諸兄友精禱由來未浹辰如何嘉澍便遄臻誠通幽隱知無間喜動龍天信有因適歎惔焚千畒盡忽驚滂潤一時均誰云化育流行妙只屬乾坤不屬人奉題李彦中所藏俞侯墨戲不是胸中飽丘壑誰能筆下吐雲煙故應秪有王摩詰觧寫離騷極目天題劉志夫嚴居厚瀟湘詩卷後瀟湘門外水如天說著令人意慘然試問登高能賦客箇中何似汨羅淵余南遊不能過衡山但見人說衡州門外泊船處風物令人愁未知信否因覧此卷書以訊之聞蛙兩樞盛怒鬪春池羣吠同聲徹暁帷等是一埸狼籍事更無人與問官私延平水南天慶觀夜作石樓雲卧對江城城角吟霜永夜清料得南枝正愁絶不堪聞此斷腸聲墨梅夣裏清江醉墨香蘂寒枝瘦凜氷霜如今白黒渾休問且作人間時世􅋔秋華四首木芙蓉紅芳暁露濃綠樹秋風冷共喜巧回春不妨閑弄影蕙古所謂蕙乃今之零陵香今之蕙不知起於何時也今花得古名旖旎香更好適意欲忘言塵編詎能考木犀喬木生夏凉芳㽔散秋馥未覺歲時寒扶踈方遶屋菊青蕋冐珍叢幽姿含暁露政爾破荒寒詎免傷遲暮晦翁足疾得程道人鍼之而愈戲贈此詩十載扶行恃短笻一鍼相値有竒功出門放歩人爭看不是前來勃窣翁戲答楊庭秀問訊離騷之句二首昔誦離騷夜扣舷江湖滿地水浮天只今擁鼻寒䆫底爛却沙頭月一船春到寒汀百草生馬蹄香動楚江聲不甘强借三峰靣且爲靈均作杜蘅佛法不怕爛却禪家語也杜蘅一名馬蹄香本草辨僞藥云細辛則杜蘅水浸令直三峯謂華隂也孝宗皇帝挽歌詞阜陵發引詔許近臣進挽歌辭熹㳟惟盛德大業不易形容方將攄竭鄙思以效萬一冥搜連日纔得四語而忽𬒳閔勞之詔罷遣東歸遂不敢成章以進杜門累年每竊私恨戊午之春大病瀕死黙念平生仰孤恩遇無路𥙷報感激涕泗不能自巳謹因舊篇續成十有六韻略叙本末以見孤臣亡狀死不忘君之意云仗便之便一本作更精一傳心妙文明撫運昌乾坤歸獨御日月要重光不値亡胡歲何由復漢疆遽移丹極仗便上白雲鄕九有哀同切孤臣淚特滂詎因逢舜日曽得厠周行但憶彤墀引頻趨黼坐旁衮華叨假寵縞素識通䘮似有鹽梅契還嗟貝錦傷戴盆驚委照増秩待行香手䟽攄丹悃衡程發皂囊神心應斗轉巽令亟風揚未答隆儒厚俄聞脫蹝忙此生知永巳没世恨空長内難開新主遄歸立右廂因山方慘澹去國又愴惶疾病今如許形骸可自量報恩寜複日忍死續殘章詩送碧崖丼叔懷游廬阜兼簡白鹿山長呉兄唐卿及諸耆舊三首羗廬不見幾經年一話清遊一悵然此日送君憑問訊千峰影裏舊潺湲知君掛席下清江未見香爐意巳降直上新泉得雄觀便將傑句寫長杠遺君蹤跡莽荆榛曽把詩書爲作新今日總輸呉季子枕流漱石自由身諸人巳致書者此不復及此外更有陳勝私在九疊屏下田舍彭師范在隔江都昌縣界中皆勝士也趙南紀病卧城中不知今能出入否叔懷皆可爲一訪致鄙意不敢輙以僞跡相汙染也山間勝䖏皆有前賢題詠可尋獨新泉近出最名殊勝非三峽漱石所及而余未之見故詩中特言之黄石巖絶高而潄玉之原眼界特曠逺余嘗一詣而不能及近聞故吏張生棄家居之其勇猛精進老守蓋有愧焉叔懷儻至其䖏試爲物色頗存問之爲佳丘子服來訪道間得古梅折以爲贈劉叔通江文卿俱來各有佳句因各次韻爲答三首老枝横出數花新誰寄寒齋雪夜春江路猶應有幽伴秪愁難得賞心人用子服韻獨樹臨孤岸横枝放淺花不須煩驛使正耐雪斜斜用叔通韻西湖居士㝷詩處今墮軟紅車馬塵半樹横枝空好在只應無地覔髙人用文卿韻用子服韻謝水僊花水中僊子來何處翠䄂黄冠白玉英報道幽人𬒳渠惱著詩送與老難兄引年得請伏蒙致政學士契丈特垂慶問寵以佳篇捧玩之餘感愧亡量輒借高韻少見謝誠伏幸笑㩜一氣無私物自槃放臣偏荷主恩寛方慙妄竊老夫號詎敢重簮博士冠身退未妨閑養病年豐何幸且偷安新篇似許參同社願刺仙舟上釣灘賈生鵩賦大鈞播物史記作大專槃物索隱云專讀作鈞槃猶轉也義與播同蒙恩許遂休致陳昭逺丈以詩見賀巳和答之復賦一首䦨干苜蓿乆空槃未覺清羸帶眼寛老去光華姦黨籍向來羞辱侍臣冠極知此道無終否且喜閑身得暫安漢祚中天那可料明年太歲又涒湯昆反灘建隆庚申距今巳未二百四十年矣嘗記年十歲時先君慨然顧語熹日太祖受命至今百八十年矣歎息乆之銘佩先訓於今甲子又復一周而衰病零落終無以少塞臣子之責因和此詩并記其語以示兒軰爲之盡然感涕云巳未九日子服老弟及仲宣諸友載酒見過坐間居厚廟令出示佳句歎伏之餘次韻爲謝并呈同社諸名勝籬菊斑斑半吐黄沜中又報紫茰香輞川有茱茰沜字與泮同􅋔成令節秋還晚撩得高情老更狂載酒極知乖勝踐沾衣却免嘆斜陽是日本約會於周圍屬予有故不果出因集予舍餘年只恐逢辰少吟罷君詩引興長奉和子服老弟黄楊游巖二詩聞道黄楊山上頭千峰環抱百泉幽羡君柱杖年年去飽看人間萬頃秋游洲巖下水泠泠枕石何妨夣裏聽要與他年成故事謾㝷幽處著新亭和劉叔通懐游子蒙之韻扣角聽君悲復悲壯心未巳欲何之交游半落丘山外離別偏傷老大時尚喜淵濳容賈誼不須日飲教袁絲病餘我更無憀賴勉爲同懐一賦詩余素不能作唐律和韻尤非所長年來追逐殊覺牽疆子服乃令更爲手寫此三詩者不知欲以何用晨起書罷欲記歲月方覺是庚申開基節日此亦難逢之㑹感歎乆之叔通老友探梅得句不鄙垂示且有領客携壺之約次韻爲謝聊發一笑迎霜破雪是寒梅何事今年獨晚開應爲花神無意管故煩我輩著詩催繁英未怕隨清角踈影誰憐蘸緑盃珍重南鄰諸酒伴又㝷江路覔香來病中承子服老弟同居厚叔通居中居晦諸兄友載酒見過子服有詩牽勉奉和并呈在席幸發一笑心期萬壑與千巖屢向君詩得指南乆恨泠然孤宿諾偶逢兀者便同參儻䝉大藥分金匕豈羡竒方出玉函誰識留連今夕意沉痾未散莫回驂子服數有詩言黄楊之勝未及往而得足疾故有几者之句是夕坐客皆以霜寒欲亟歸因又有末後句云寄江文卿劉叔通文卿句律如師律通叔詩情絶世情政使暮年窮到骨不教吟出斷腸聲詩人從古例多窮林下如今又两翁應笑湖南老賔友两年吹落市塵中此戲子䝉恐落窮籍不便可發一笑也我窮初不爲能詩笑殺吹竽濫得癡莫向人前浪分雪世間眞僞有誰知僕不能詩往歲爲澹菴胡公以此論薦平生僥倖多類此云梅姑射仙人氷雪容塵心巳共彩雲空年年一笑相逢處長在愁煙苦霧中香茶供養黄蘖長老悟公故人之塔并以小詩見意二首擺手臨行一寄聲故應離合未忘情炷香瀹茗知何處十二峰前海月明一别人間萬事空他年何處却相逢不須更話三生石紫翠參天十二峰庚申立春前一日雪花寒送蠟梅蕚㬉生春歲晚江村路雲迷景更新南城呉氏社倉書樓爲余寫眞如此因題其上慶元庚申二月八日滄洲病叟朱熹仲晦父蒼顔巳是十年前把鏡回看一悵然履薄臨深諒無幾且將餘日付殘編晦庵先生朱文公文集卷第九考異石馬用公濟和陶韻飛觥一作飛觴武夷精舍雜詠序而出一作而去丹崖一作丹壑林立一作森立相羊一作相忘白雲送儲柯僧舍一作僧寺秪今成一作情懐常無處不一作唇觜任雙目從教別淚昏一作两眼那因小馬昏和叔通懷子䝉韻聽君一作劉郎半數一作半落不須日一作未湏痛病餘我更無憀賴一作我今乆矣摧頽甚叔通探梅繁英一作落英珍重南鄰諸酒伴一作聞道南鄰多酒伴又尋一作肯尋病中承子服同諸兄友見過宿諾一作獨往便同一作遂同儻蒙一作儻逢方出一作方扣誰識留連今夕意一作且幸親朋相煖熱黄蘖悟公塔擺手一作撒手故應一作故知福州府學訓導舒鏊校晦庵先生朱文公文别集卷第九, WYG: ''}
