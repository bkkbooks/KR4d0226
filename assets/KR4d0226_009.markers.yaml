  - {type: variant, offset: 17135, length: 77, content: 第九答劉韜仲問目無求生以害仁有殺身以成仁炳以爲理當死而求生是悖理以偷生失其心之徳也故曰害仁理當死而不顧其身是舎生而取義全其心之徳也故足以成仁若比干諌而死夫, WYG: 七宋朱}
