  - {type: line-break, offset: 17209, content: '', id: KR4d0226_SBCK_009-1a06}
  - {type: variant, offset: 17213, length: 2239, content: 稱其仁所謂殺身以成仁也雖死不顧只是成就一个是而巳使比干當諌不諌而苟免於難則求生以害仁矣未知是否此說得之然更要見得失其心之徳全其心之徳各是如何氣象方見端的君子義以爲質禮以行之孫以出之信以成之何故不及仁更思之有一言可以終身行之者其恕乎巳所不欲勿施於人今之人多以姑息爲恕且自居官者言之爲州縣則不敢擊豪彊爲監司則不敢按贓吏爲臺諌則不敢排姦慝爲宰相則不敢退小人皆自以爲恕而不知恕者如心之謂也所惡於上毋以使下所惡於下毋以事上豈姑息之謂乎夫仁者謂之能好人可也而孔子兼能惡人言之炳謂恕字亦當如此體認未知是否此說固善然𬒳排撃遭按退决非巳心之所欲今乃欲施於人又何以爲如心乎請更推之莊以涖之動之不以禮莊敬者禮之容也兩句意疑相重炳謂端莊不慢者敬心之發躬行之事也所謂禮者化民成俗之具若爲之冠昏䘮祭之品節以教民孝弟者是也未知是否動猶動民以行不以言之動禮只是在巳者民之於仁也甚於水火水火吾見蹈而死者矣未見蹈仁而死者也集注之說曲折雖多然詞意精宻發明聖人勉人爲仁之意最爲緊切有功或問節取范氏之說詞雖平而意則緩且未見蹈仁而死一句與上文不相應如范氏仁不傷人之說則與上句不合如程子殺身成仁之說與上句合矣而地位不侔炳謂不如集注之說未知是否殺身成仁蹈仁而死同異如何更思之陽貨之惡如此聖人恐無不終絶之意時其亡而徃者亦非欲其稱蓋終不欲見之耳遇諸塗者乃不期而會不可得而避非得巳也未知是否恐未然伊川先生云性即是理炳謂所謂理者仁義禮智是也未知是否四者固性之綱維然其中無所不包更詳味之子曰性相近也又曰惟上智與下愚不移夫人之氣質雖有偏正昏明純駮厚薄之不齊然禀生之初未甚相逺也故謂之相近至於上智之所以爲智下愚之所以爲愚亦皆其氣質使然旣謂之相近矣何故又有上智下愚如是之懸絶也氣象雖相近然亦有如是懸絶者蓋旣曰氣矣便有此不同不足恠也吾豈匏瓜也哉焉能繋而不食集注云匏瓜繫於一處而不食物古注云言匏瓜得繫一處者不食故也吾自食物當東西南北不得如不食之物繋滯一處然匏瓜未甞不可食而謂之不食物何也不食謂不求食非謂不可食也今俗猶言無口匏亦此類公山佛肹之召諸家之說善矣愚必以楊氏解佛肹章爲得其要蓋公山之召而子路不恱夫子雖以東周之意諭之而子路之意似有所未安也故於佛肹之召又舉其所聞以爲問其自信不苟如此學者未至聖人地位且當以子路爲法庶乎不失其親不可以聖人體道之權藉口恐有學歩邯鄲之患也未知是否得之人而不爲周南召南横渠先生之說所以與諸家不同者何故若曰告之教之則是爲之也說得爲字太重經意恐不然也永知是否爲猶學也今之愚者詐而巳矣智則能詐愚者本無智巧也何故能詐如狂不直侗不愿之類予欲無言蓋夫子以子貢專求之於言語之間告之此以發之子貢未能無疑故夫子曰天何言哉四時行焉百物生焉蓋欲其察之於踐履事爲之實也程子所論孔子之道如日星一叚雖引無言之文然其大意却似說無隱之義至其言猶患門人未能盡曉故曰予欲無言夫恐其不能盡曉當更告之而曰予欲無言何也或曰予欲無言一章實兼無隱乎爾之義蓋四時行百物生所謂無隱也程子之說蓋推明夫子啓發子貢之意欲其求之於踐履事爲之實者未知是否恐人不能盡曉而反欲無言疑得甚好更熟玩之當自見得分明也四時行百物生兩句自爲體用蓋隂陽之理運行不息故百物各遂其生聖人之心純亦不巳故動容周旋自然中禮未知是否有此意宰我遊聖人之門而有短䘮之問不類學者氣象諸家之說或謂至親以期斷而宰我欲質其所知有疑而不敢隱所以爲宰我蓋欲聞其過也炳以爲宰我在聖門雖列於言語之科然哀公問社而有使民戰栗之對方晝而寢夫子有朽木糞土之譏觀其地位如此則冝有短䘮之問也未知是否短䘮固是不仁然其不隱不害爲忠信此一事而兼有得失又有重輕年四十而見惡焉其終也巳聖人立言之意固是勉人及時進德然郷人之善者好之其不善者惡之苟有特立獨行之士不徇流俗衆必羣嘲共罵何爲而不見惡學者亦不可不知也未知是否見惡亦謂有可惡之實而得罪於能惡人者非不善者惡之之謂也柳下惠三黜而不去其言若曰苟以直道事人雖適他國終未免三黜若肯枉道事人自不至三黜又何必去父母之邦觀其意蓋自信其直道而行不以三黜爲辱也此其所以爲和而介歟若徒知其不去之爲和而不知其所以三黜者之爲有守未足以議柳下惠也未知是否得之接輿歌而過孔子蓋欲以諷切孔子孔子欲與言之則趍而避之孔子使子路問津於長沮桀溺固將有以發之而二人不荅所問傲然有非笑孔子之意至於荷篠丈人知子路之賢則止子路宿殺鷄爲黍而食之見其二子焉其親之厚之如此孔子使子路反見之則先去而不願見矣數子者若謂其無德而隱則徉狂耕耘以避亂世澹然不以富貴利逹動其心而確然自信不移若有所得者若謂其無故而隱則危邦濁世道旣不行亦未見其必可以仕也特其道止於歸㓗其身而不知聖人所謂仕止乆速者知所謂可無者矣而未知所謂無不可者也故其規模氣象不若聖人之正大若以素隱行恠視之愚意未知是否無道而隱如蘧伯玉柳下惠可也𬒳髪佯狂則行恠矣沮溺荷篠亦非中行之士也柳下惠爲士師三黜而不去所謂降志如不去之類所謂辱身如三黜之類然聖人列之於逸民者不知於何處見得柳下惠遺逸處見上君子不施其親謝氏曰對報之謂施如親黨特無失其爲親而巳豈有施報徃來之意也謝氏之意不明竊意其說若曰君子所以厚於親黨者特欲不失其親親之義而巳豈有施報來徃之意猶吉其豈望施報來徃也具說與經文不通炳所録或問解此叚内有兩句云人之所以害其親親之恩者其失在於望報而不在於施炳謂施字上漏却不字未知是否猶吉之吉疑言字之誤謝說不通故或問中辨之文意分明不脫字也明道先生云人生而静以上不容說才說性時便巳不是性人生而静以上何故不容說才說性時何故巳不是性未明其㫖不容說者未有性之可言不是性者巳不能無氣質之雜矣晦庵先生朱文公續集卷第九閩縣學訓導何器校, WYG: 撰}
