  - {type: variant, offset: 12017, length: 0, content: '', WYG: 官同措置捄䘏矣旋暈只是勞心之所致小試參同之萬一當如牛刀割雞也至之兩日在此察其意必不校此當更委曲曉之耳李將若得此人之力真是笑啼俱不敢矣可付一笑也厯議必有所付但今思之不得其説久當自出也宿逋令埜具稟甚愧遲緩幸更少寛也建陽事竟如何緩急之間切宜善處為佳耳某前月晦日已交郡事以常情論之亦不至甚費料理但衰晚自不當出又閑散之久不能堪此煩碎又不能似衆人漶漫不省事初到甚覺勞弊此兩日方少紓更看旬日又如何也大抵是不可久住夏末湏力請而歸耳昨日至學中為諸生説大學自此二七日即一到見某作濂溪祠堂廬山有陶淵眀劉凝之遺迹亦漸次表章之比罷歸日須皆可畢事也但恐迂繆伉拙時論不見容即又未知如何耳山水之勝目所未覩埜歸必能畧言之意欲老兄一來又不能辦人去取已屬平闕恐可借僕馬一來甚簡便也一出又半月臨出城值石宰與順之擇之更一二朋友来遂留北巖兩日同途至建陽而别匆匆急欲歸奉祀事故不及遣人相報然數日相聚亦苦人多不得子細講論未覺有深益也寒泉拜掃湏在後月五六後事畢即上廬山遣人相報幸為一來前嘗有書與小僧説令奉白及此春雨種植少竹木亦道欲遊之意胡為乃不達此意耶更有一小詩謾録呈山頭如有功役可及吾人在彼指撥了之為佳小僧稍知向前否更望提耳痛教告之也作文之病時偶論及此耳欲稍加潤縟亦不難但亦使急性不得恐愈草率耳横渠集告付下婺州用川本刋成欲寄此令補所無也僧兒云伯恭説所選之文取其備衆軆或疏通或典重或寛或𦂳或反復曲折耳陳法雖精而旗鼓如此得無有誤三軍耳目耶甚可笑也或問寫本已檢得今納上告令寫訖便附下恐又有差互要此作底也到三山見膚仲煩致意所囑文字昨在五夫已為具草歸来一向擾擾又縁卜葬未定心緒紛亂不暇整􅉐幸且體悉向後若得工夫即為改定寄去不然不湏等候送終是大事此是浮文自古未聞有無銘而不葬者切不須等候也見趙南紀亦煩致意所喻謹悉恨未得登山以觀㶑灔深碧之地它非所及也太極文字儲宰云已録寄并某書及中庸或問下册小簡皆往何為今尚未到一哥所寄集畧便令對讀旦夕納去不及别作答也封牌所喻得之但不見三書之意不知改之為三如何留疏偽學以上下文考之正謂永嘉耳中庸章句比畧修定不知可旋刻否如欲之煩二哥帶寫白人来詩傳中欲改數行乃馬荘父来説當時㸔得不子細只見一字不同便為此説今詳㸔乃知誤也幸付匠者正之便中印一紙来中庸必已了矣後山米事若為鄉里之計實為利便但為身謀則吾人今日是何等時節運氣而可為此耶若必欲為之亦湏先踏逐得能負荷得底人一以付之而吾無預焉乃為庶㡬不然則徒使呫呫者得動其喙區區相愛之深不敢以此奉贊也示喻筮法如此甚平正簡便不知何故本法却不如此恐别有意指也試更推之如何恐在老者陽多隂少則終為陽者少在少者隂多陽少則定為陽者亦少乃陽貴隂賤吉少凶多之意不知如何小學誤字再納去數紙封面只作武夷精舎小學之書可也旋暈之疾正當静養所需儀禮殊非急務且其本只兩卷餘是先人㸃其後乃某續㸃比更欲詳考則已憚其字小而不敢讀矣恐亦不能無誤不足傳後也細民艱食焦熬奈何氣象不佳令人不知措身之所不謂事勢急迫至此也王朴不知變律之法而自中吕再生黄鍾則固不得不為黄鍾之半以為清聲矣但今變半等律亦生扵極其本則十三弦者皆黄鍾耳薛宣等事取其一切果㫁為賢扵今之謬政耳豈以其為可法哉某見治再祠之疏未能得了更三五日方得遣人此請度必可遂憂世之心報主之願雖不敢忘然綿力薄材了得甚事不如且跧伏過此殘生也印書之舉不謂末流之弊一至扵此但當速去無可疑者必不可轉則直捐之耳平生無所不捨而眷眷扵此耶要之范六丈真聖人也章丈敦勸之意甚厚得伯恭書亦云爾但冒恩重疊前後相妨如擔子輕重他人不覺惟擔不起者自知之耳若辭不得勢須别作出場不可又似前年喑黙而冒受也昨日之别令人黯然然觀賢者處之裕如又足强人意也不審晚間便發程否前途千萬加意調節言語諸事更宜謹密飲酒戲笑皆冝切戒歸来便覺有相窺伺者次第恐亦不免久當自知之一書至直卿亦煩為託周幹附去或􅉍去前日亦忘此可見昏罔也昨日二尺短者是周尺長者是何尺耶是景表尺否皆望批喻自奉别後惘惘至今不能忘扵懐計行已過杉嶺不審道間為况如何武陽曾少留否既不登車只得緩行無傷吾足乃佳耳一路皆有知舊必不落寞但恐却有應接之煩耳某幸無它諸生既来遣之不去亦姑任之若有禍害亦非此可免也但極難得人講究文字義理深處便無人可告語殊憒憒益懐仰耳至舂陵煩為問學中濂溪祠堂無恙否某向有一祝版亦不知在與不在因風語及也别後只得到豐城及宜春書知途中諸况足以為慰但至今尚未聞到舂陵信深以為念每至讀書講學無可咨扣無可告語尤覺仰徳之深也三哥子陵一一安佳某足疾前日㡬作今又小定未知竟如何但精神日耗血氣日衰舊學荒蕪有退無進恐遂没没無聞而死耳樂書非敢忘之但方此齰舌豈敢更妄作耶此書決然泯没不得近㸔他人所説更無堪入耳者不知老兄平日與元善相處曾説到子細處否但恐子期不曾聽得便只似不曾説也近因諸人論琴就一哥借得所畫圖子適合鄙意乃知朝瑞只説得黄鍾一均内最上一弦而遽欲以論琴之全體宜乎膠固偏執而無所合也學不欲陋豈不信哉昨州兵之歸得書知已到彼足以為慰僦居寛廣物價廉平足以度日此外想無他撓高懐所處亦無適而不安也趙守得書甚留意寺居雖有約束然逺郡荒僻舎此則無以待賔旅往往亦不能一一遵守頃在南康此寺常為客館若自逺嫌不欲居之則亦無害更託人宛轉白之使知曲折可也翁丞便是德功丈之孫否耶渠向來坐事乃尊來見囑力不能及之想未必不見訝也禮書附疏未到已與一哥説不若俟㫁手後抄之今只冩得一截無疏尤不濟事也三哥為况如何想不廢讀書作文比之家居更省應接當日有新功也此間塊處有疑無所講殊覺憒憒昨因見人説琴無歸著謾疏所疑得數千字欲寫奉寄而昨晚一哥方報今日便有人行遂不暇及當俟後便也或有鄭尚眀琴史十餘卷𦂳要處都不曾説著只是閑話耳其書亦是集古今人所説乃止如此是凡事不曾有人理會到底也以法言之亦當用旋宫法但恐以諸短律為宫則弦不惟不可彈亦不可上矣故或説琴只用黄鍾一均似有此理然又只成隋文帝何妥之樂可笑耳可預考之俟寄所草去求正也頃奉記後辱惠書具聞動息足以為慰居夷當已成趣但能素位而行亦何入而不自得也但聞三哥不快甚以為念計今當已向安矣覺得渠書中語意似放未下更當有以開曉之也琴説納呈幸為訂其繆子細見喻更有一圖無人畫得大率與候氣淺深同是一法第一弦尤可見其下諸弦乃􅉍儧向上取聲耳精舎已空眼前朋友亦不長進只前日永嘉一二人來稍可告語今已去矣參同契更無縫罅亦無心力思量得他但望它日為劉安之雞犬耳到此見人説趙守家人歸云自始至投館光考而寺僧自言扵官云此人長大恐不能制遂移它處此必戲語可發一笑也素患難行乎患難吾人平日講之熟矣今日正要得力想為日既久處之愈安不以彼此遲速貳其心也趙守易地後來者不相識元善必已報去矣賤迹復挂彈文繼此須更有行遣只得静以俟之若得在湖嶺之間庶得聲問易通亦一幸也律書序客中不暇檢尋須俟還家即為整葺後便奉寄也三哥所苦痁疾想已向平復千萬寛心將䕶着頭緒讀書涵泳義理久之有味自不見世間利害榮辱之有異也閒中些小疾疢所不能無但在我者已㸔得破把得定則外物之来終不能為吾患矣所喻雖知已放得下然亦不必大段安排也趙守長厚乃遽它適新侯聞是黄門之後但無人識之不知又如何若得其有家法思舊事必能善視遷客也所需律序乍歸未暇檢尋舊本旦夕得之即冩本寄去鄙意但能説得有所據依而非蹈襲之意它不能有所發明也禮書未附疏本未可寫以見喻再三恐亟欲見其梗槩已取家禮四卷并已附疏者一卷納一哥矣其後更須年嵗間方了直卿又以憂歸前日到順昌弔之渠云歸安葬畢却可與履之兄弟大家整頓也琴説向寄去者尚有説不透處今别改定一條録呈比舊似差眀白近至政和見陳廷臣朝老崇寜間以布衣上書論事謫居舂陵作詩甚多亦有佳句陳乃政和人議論鯁􅋀不易得也不知彼中尚有其踪跡否昨附去琴説有一圖説逐弦五聲者此却失了元本煩三哥為檢録来只依元本濶狭界行填注不湏更寫前後説也精舎閴然時有一二亦不能久法器固不敢望其能依人口説着實讀書者亦自殊少甚可嘆也間亦自思此理人人有分不應今日獨如此難啟發恐亦是自家未有為人手段無以副其逺来之意甚自愧懼耳吳伯豐在後生中最為警敏肻着實用功近年説得儘有條理乃不幸而蚤死死後聞其立志守節不為利害移奪尤使人痛惜也汝玉彦中乃能相念如此甚不易得得楊子直書亦奉問但似云不敢相聞前日答之不曾入題只云小時見趙忠簡李參政諸公在海上門人親舊嵗時問訊不絶如胡澹菴猶日與知識唱和往来無所不道秦檜亦不能掩捕而盡殺之葢自有天也以此知人之度量相越其不啻九牛毛既可嘆惜又可深為平生眼不識人之愧也周純臣頃有一書託直卿寄之而不能達却持以歸今再作數字并附去奉凂能為轉寄幸甚然湏有的便乃可遣也陳廷臣在營道不久故人少識之然見其詩亦頗跌宕想亦以此不為人所敬耳别幅所示郡中諸賢聞之不勝悚歎趙守篤老静退子弟皆賢誠不易得其名謂何幸批喻也歐陽君回書幸達之楊安諸公恨亦未之識幸各為致意也張舶似亦畧曾相識王參政早嵗休官泊然無求扵世而晚為秦檜所用傷害忠賢助成凶虐以此得罪扵清議朱衣道士諄諄之誨豈無意耶此語宻之隂君丹訣見濂溪有詩及之當是此書彼之行此而夀考乃喫豬肉而飽者吾人所知葢不止此乃不免扵衰病豈坐談龍肉而實未得甞之比耶魏書一哥已刻就前日寄来此必寄去矣校得頗精字義音韵皆頗有據依逺勝世俗傳本只欠教外别傳一句耳前書亦甞奉扣弦望之説不知然否近因再㸔又覺主驗眀白因来更望詳以見告也若来喻所謂非入静不能見者此實至要之訣但人為擾擾不能一意向裏涵泳三琴圖此亦失却舊所畫本旦夕得暇當令在子更依候氣説畫出續寄去也禮書前卷已有次第但收拾未聚後卷則儘欠工夫未知能守等得見此定本全編否耶楊簿竟如何江西士人不患不慷慨但扵本領上多欠工夫耳湯宰所編黨人遺事若曾傳得幸畧見示前日丘仲髙行後尋得律書序草今畧修定又適有彦中處便人過門因附以行度必先丘子到也年来精力衰退文字重滯無氣燄此又是三五年前者今日亦做不得矣它所欲言畧具前書其不能盡者亦非此所能盡也序中恐有未是處更告詳細㸃檢一一見喻不敢憚改也自餘千萬自愛為禱客中得一二同志早晚講論想亦不覺度日也近報令臺諌侍從集議赦條前此未甞有此豈欲大施沛宥盡釋纍囚也耶但在我者只得為久駐之基耳諸朋友所讀何書其所講論亦有可示及者否比自城歸後學館一空亦自省事閒中却自㸔得少文字但昏忘日甚過眼輒不復記覺得不是讀書時節只好閉目静坐耳琴説前已寄去後又寄改定數字不知已到未律書序亦附草本去因有回便幸喻及可否也周南仲竟不免近日方見報行章疏甚可笑也蘓守已屬計臺矣三哥不及别書想閒暇儘得讀書作文也參同契一哥已下手刻版矣轉㸔轉曉不得霈恩曠蕩未聞施行而留趙四公存没之恩皆格不下未知賢者去住復何如計高懐必有以處顧舊山朋遊未得遽承晤徒為恨耳諸喻已悉偶連日脚氣上攻今方少下而右拇緩弱不能握筆又亟欲上五夫力疾撥冗附此數字似聞有類聚討論之㫖仍有期限然則不過中春亦湏見得果決若便歸得何其快也似聞從㳺之士日衆其間當有可與晤語者則為况亦當不至落寞旬呈免與不免本非所較康節先生所謂打乖正謂此也一哥兄弟亦自識道理曉事勢凡百忍耐不至有他此間如封贈奏薦皆不敢陳乞元善遣使請祠已至都下聞劉趙徐呂之報亦復縮手平生謾説隨時之義只是傳聞想象今日始是身親厯過與口説不同想亦深得此味也晦庵續集卷二欽定四庫全書晦庵續集卷三宋朱子撰書答蔡伯静啟䝉已為㸔畢錯誤數處已正之又欲添兩句想亦不難但注中尊丈兩句不甚分眀不免且印出俟其歸却商量今不能久俟也筮儀内前日補去者更錯兩字今亦并注可正之亟遣人還草此但㸔不甚子細可更自㸔一兩過為佳也事了能見過為數日款幸甚或扵啟䝉上卷之末添數句云卷内蔡氏説為竒者三為偶者二盖凡初揲左手餘一餘二餘三皆竒餘四為偶至再揲三揲則餘三者亦為偶故曰竒三偶二也如何天經之説今日所論乃中其病然亦未盡彼論之失正坐以天形為可低昻反覆耳不知天形一定其間隨人所望固有少不同處而其南北髙下自有定位政使人能入扵彈圓之下以望之南極雖高而北極之在北方只有更高扵南極決不至反入地下而移過南方也但入彈圓下者自不㸔見耳葢圖雖古所創然終不似天軆孰若一大圓象鑽穴為星而虛其當隠之規以為甕口乃設短軸扵北極之外以綴而運之又設短柱扵南極之北以承甕口遂自甕口設四柱小梯以入其中而扵梯末架空北入以為地平使可仰窺而不失渾體耶古人未有此法杜撰可笑試一思之恐或為即著其説以示後人亦不為無補也天經已領其論撰詳悉亦甚不易但回互葢天頗費力只是舊年一般見識不欲惡着古今一個人耳其心則固深知渾葢之是非也然則孰若據實而論之省詞説乎又况二極交互一説理似不然别紙附去可為詳之不知是如此否尊丈許録示參同火候向見已寫得多了今必已竟幸即檢示前日尊丈書中已云與一哥説更煩留念也歩天歌聞亦有定本今并就借校畢即納還也參同定本納去可便寫白并元本寄来更㸔一過然後刻本乃佳簽貼處改補矣一兩處無利害又灼然是錯誤即不湏改也𤣥溝害氣恐未是説人身内事方是設譬之詞緩讀可見也肝肺腎是三物脾是戊已無可疑者定本亦已添入矣渾象之説古人已慮及此但不説如何運轉今當作一小者粗見其形製但難得車匠耳參同契考異方寫得了亦未暇再㸔過今附夀朋納去并此中寫本一册袁本一册濟本二册煩逐一對過有合改處並貼出子細批注寄来容再㸔修定方可寫白刋行丘本不甚佳然豈相類篇首却得刪了四字遂可讀改得一字遂叶韵亦不為無助可試檢㸔以此知讀書不可不博考也參同考異今以附納其間合改定處各已標注其上矣鼎器歌中七聚聚一作竅恐合改竅為正而以聚為一作不知如何可更審之若改即正文此句亦合改也自尊丈行後惘惘至今不能平適得晦伯報云得近書又不言已到何處殊增悵想也尊堂不審處之何如不能不以為念然當有以寛譬之此亦無它害只是如前年逺出一番耳輿地志納還皇極經世及樂府集却望檢付去人臨川曾景憲書云尊丈已過彼有以驢為贈者可免徒歩之勞也昨㸔史記厯書大餘之數第二年即差小餘之數第三年即差以後皆筭不合不知是如何尊丈必曾説来幸批喻尊丈得近書否此久不聞信息必是已過莆中矣啟䝉上册三十六版注中圍一圍當作徑下册第二版前十卦占貞後十卦占悔兩古字並當作主可便改却此三字更子細㸔過為佳營道有歸信否數日與人講論有得無可告有疑無可質始覺尊丈之逺為可恨也奉告乃知所苦脾疾乃爾赤土之約固宜少緩别俟一信也公晦之説極可笑其曲折湏面論尊丈千里逺書戒賢者兄弟勿為人所誤正為此耳尊丈要琴絃今欲寄去不知何時有便湏得有信掩或籠箱之屬置之其中乃免壓摺損折之患亦俟一報也伯謨説尊丈有素問運氣節畧欲借一觀比畧編得些小其間不曉處多問伯謨渠亦茫然未甞措意以此知尊丈事事不容易放過不可及也書白字畫不方正努胸垤肚甚刺人眼然已寫了無如之何不知鄉里如何似此一向不識好字豈不見浙中書册只如時文省㮄雖極草草然其字體亦不至如此得人憎也復卦處空缺不好㸔移在臨卦上亦何以異其勢湏着儧帖盡此以後二十餘版葢雖只争一字而篇末一行只有一字又湏儧動後篇直到册尾也考異俟更子細㸔且令刻正經此更一两日納去未晚也浙中字様宅上書籍中湏多有之如古本廣韵寫得最好相傳是唐時仙女吳彩鸞日寫十本者雖未必然要可法也仲撫相見否聞留衛公得㫖自便而謝給事繳之以為恐徐誼之徒援例有請遂止得量移南劍儲宰復官亦是為謝所駁乃在銓曹時也向若用李公晦之䇿又湏頭撞然今尚何言哉數日探問未有近信方以為慮得書知今日可到麻沙不勝傷痛想感事興哀何可堪也前日八哥来訪辱書具悉此事不竢見屬但適此瘖黙不容發口已嘗託八哥奉報矣本欲今日往助墓下之役因得面言而累日洩瀉氣痛攻刺畏寒愈甚遂不敢出其事它日言之未晚人至承書知所苦向平深以為慰不知見服何藥切宜更加將䕶也蔬食久亦不便若不欲食肉醫家多以藥和肉為丸啖之亦助胃氣既無滋味自無所妨况在禮經自有權制耶昨聞留趙徐吕之報已令劉二哥奉聞矣事勢如此不知尊丈歸期竟如何當此嵗莫令人慨念不能平也律書證辨中論周徑處自十一其長之分至二釐八毫者是也此一節未曉恐有誤字或重複處幸更考之算學文字素所不曉惟賢者之聽耳然須得差簡約為佳更望留意也三哥用藥見効甚慰先訓尚未得下筆日困賔客一事做不得甚可厭也答蔡仲黙周純臣書荷留念景建書已領却欲附數字報之今納去若舂陵人未行猶可及也冠義曾尋得否幸因便寄及洪範傳已領俟更詳看然不敢率易改動如餘子書一面寫後日早來取昨日有臨川便已畧報仲撫頗詳此無益而有害何苦委身以犯其鋒也謝誠之書説六卷陳器之書説二卷今謾附去想未暇看且煩為收起鄉後商量也漳州陳安卿在此其學甚進星室之説俟更詳看但云天繞地左旋一日一周此句下恐欠一兩字説地處却似亦説得有病盖天繞地一周了更過一度日之繞地比天雖退然却一日只一周而無餘也岐梁恐須兼存衆説而以退然為㫁但梁山證據不甚眀白耳禹貢有程尚書説册大難送俟到此可見稍暇能早下来為佳年来病勢交攻困悴日甚要是根本已衰不復能與病為敵㸔此氣象豈是久扵人世者諸書且隨分如此整頓一番禮書大段未了最是書説未有分付處因思向日喻及尚書文義通貫猶是第二義直湏見得二帝三王之心而通其所可通毋强通其所難通即此數語便已參到七八分千萬便撥置此来議定綱領早與下手為佳諸説此間亦有之但蘇氏傷扵簡林氏傷扵繁王氏傷扵鑿吕氏傷扵巧然其間儘有好處如制度之屬祗以疏文為本若其間有未穏處更與挑剔令分眀耳示喻書説數條皆是但康誥外事與肆汝小子封等處自不可曉只合闕疑某嘗謂尚書有不必觧者有湏着意觧者有畧湏觧者有不可觧者其不可觧者正謂此等處耳弗辟之説只從鄭氏為是向董叔重得書亦辨此條一時信筆答之謂當從古註説後来思之不然是時三叔方流言扵國周公處兄弟骨肉之間豈應以片言半語便遽然興師以誅之聖人氣象大不如此又成王方疑周公周公固不應不請而自誅之若請之扵王王亦未必見従則當時事勢亦未必然雖曰聖人之心公平正大區區嫌疑自不必避但舜避堯之子扵南河之南禹避舜之子扵陽城自是合如此若居堯之宫逼堯之子即為簒矣或又謂成王疑周公故周公居東不幸成王終不悟不知周公又如何處愚謂周公亦惟盡其忠誠而已矣胡氏家録有一叚論此極有意味答劉晦伯示喻文字非有所愛顧恐晦伯方欲讀書則其序不應始扵此耳如何如何韜仲向語及欲来春與居厚同為此来不知果否更早得一報則兒輩不復别為招客之計不爾却湏早有定論也到此半年百術俱試而不足以出餓殍扵溝中不敢罪嵗徒自咎耳蠶麥既收船米輻凑民食幸少寛而疫氣大作死者紛然見此醫救埋瘞又慮夏末尚湏闕米亦一面措置若幸過此一厄則亦且告歸矣精力凋耗又非昔時之比兼離家日久百事不便此間俯仰費人心力易得言語不容久居也浙東學者修潔可喜者多楊敬仲孫季和皆已薦之諸葛誠之兄弟亦時來相處但心地不虛我見太重恐亦為學道之障也彼中亦有朋友過從如此間否渠論度量權衡之制甚精若相見煩為求其様製造古升古尺古秤各一枚便中示及為幸仕宦遲速要有時命正唯盡心職業安以俟之庶㡬不失所守張憲到未向在浙東同官甚好士某所薦楊敬仲孫季和項平公渠皆薦之公疑當作父度量素不曾講究今有書扣之然此是千古未結底公案恐終未易以一言定也書煩遣去并趙憲程正思曹挺之書為一一致之為幸程在沙隨寓居處不逺可并遣也知趙憲已相薦甚善此等物合得終是得正不湏汲汲也某以按發贓吏之故諸公相害不遺餘力獨賴聖主保全未至斥逐耳其勢豈可復出到官之後或更有一唐仲友又作如何處置耶只得力辭得罪亦無如之何但兩脚不可過分水嶺一歩耳武夷精舎已成近與諸生往留旬日甚適但屋宇未備耳立之墓文已為作矣而為陸學者以為病已頗不能平鄙意則初無適莫但據實直書耳余君書来詞義甚可觀今有書報之可就取觀也經界事日荷留念打量法中間劉子禮寫來正如此以其無竒煩費而忽之近日較量此法雖拙而易曉亦一面雕印下諸邑矣但今孟冬已盡而指揮未下恐有隂沮之者某又見病旦夕不免上奏為歸田計矣讀韜仲書為之慨然此雖作郡反不若彼得行其志也此間因不經界失陷省計以大萬數故為不法擾民之計以補之若不經界真無下手處也只漳浦一項官米錢貳萬二千餘緡今實催五千餘緡而已凡事如此令人太息昨聞交代有日適詢劍浦人乃云来春方歸不知何故尚爾遲遲也韜仲書報經界復行不知却作如何措置第恐復為諸司所敗耳鹽筴欲行扵一州尚不能勝衆説之排沮况欲通行四郡其間豈無見行之法自不為害之處而何必為此紛紛乎若必為此恐其説尤易沮而難行也應倉自江浙間乍來固不諳此利病然當時若一到汀州親訪民言更廣詢有識以審其是然後回奏亦未為晚不知何故怱怱如此便欲入城見之以此行葢難開口説話也來書所喻固皆一方永久之至計然度今之君子決不能用徒自譊譊耳趙帥在此所為不無未滿人意處然自今觀之又豈易得也學中教養人數頗多甚不易既難得人可招致只可撥忙自到彼中與之講説就他卑陋處錐劄喚省庶㡬猶不為無益也林帥政事近年已甚難得聞其雖嚴而簡此自為得體如鄭溥之却似傷煩碎然亦不易得也此間竟未得雨田之有水者亦有螟之灾嵗事甚可慮且是熱氣可畏日甚一日未知終如何也小兒極荷留念不知作文竟能入律否㸔得只合小做規模庶㡬浄潔𦂳巧易照管渠却汎濫胡説不勒字數令人㸔得心煩切望痛與鐫切塗抺令其自改立限再呈勿令懶惰推託放過乃幸耳謝公之去傳者不一昨日得元善書乃云以不言罪之此葢只為不恊力攻周揆耳誠甫之傳妄也輪對文字亦正當但不甚切然亦不問那下次第亦為所疾葢首論正心近似道學也然重華却照知諸姦朋結之状時有聖語云周有甚黨却是王黨盛耳此語儘鎮壓了怪事也聞扵中外且得如此亦是幸事尤丈本無向背似與婺尤厚今亦不免尚未見章疏不知何事也某衰病之餘支吾郡事甚覺費力諸邑惟漳浦最狼狽諸事如鬻鹽子斗折豆皆非法子斗者廢寺之田租也坐視半年未有可下手處近方因有㫖條具輒以一二事為請若䝉施行則科罰之類可以盡禁經界若行則子斗之弊亦可革去折豆見與同官商量雖或未能盡去亦可去其太甚但鬻鹽一事最為非法而未敢遽議盖郡計所行萬數不少一旦失之便恐狼狽也經界已得㫖相度奏檢謾録呈此亦已一面訪問區處以俟命下即便施行意欲及此農隙并力打量田産攅造文字夏料便行新税未知力能辦否同官中亦有一二人可仗但四縣須得六七人分頭勾當郡中須得一兩人總統大綱乃可集事意欲奉煩賢者一來只就郡中檢校或以時循行諸縣指教督趣元禮亦許來旦夕到矣不知能為一來否可禀知判官丈如許相助此有數卒送劉壻歸得便就之以行為幸更欲并邀季通伯崇一處可得六七人也韜仲近得書否養士訓兵想已有條理此間兩事都做不得深以愧耳盖作郡之勢不如作縣之親也經界之議此間同官商量正如來喻但漕司便欲施行其意甚羙故或初欲先量城市及山坂無田去處又深計之亦有未便不免回申乞且先分保界立土封以俟秋成而後併手行之今鉏草子去一觀若得前期一到此間與一二同官預定規模尤幸不必俟臨時也漕使書又云開正即欲到此恐未有益不若賢者先來議定却請漕使親臨以察其當否之為便也要是秋中乃來方有益耳經界為鄰邦隂沮久已絶望今日忽得一信却恐且令此州先行此是何等處置廟堂無人乃使一統之中國有異政甚可笑也然今已向春田功方起如何更可下手萬一行下亦須回申且俟農隙也復業之牓不妨早出值此間田荒已是三十餘年目下却無逃移更俟詢訪也諸論皆切當紙札之費諸司或不肻認此亦可自備見有一項閒錢若不因此用却亦須别作一有利益事不然徒為後人妄費竊取之資也萬一求去未遂來年秋冬間當舉此役是時恐晦伯已赴官不知更有何人相助幸為籌之便中報及趙帥之來留意愈切但所下約束全無檢察姦欺督趣逋負之意因其來問已力言之仍為之言若更如此數年鄉官將守空倉舉子之家無復得米之望矣不知渠能信否大率其政尚寛未免有要人道好之意此亦通人之一蔽也仲宣自連城遣盛僕來此云提宫丈俸錢尚未得已為作書懇趙守未知能應副否也季通欲來不知已起離未恐其已行更不作書或未行且煩致意也應城書信已領手痛未及作答渠要學記堂額當俟後便也所論經界利害極為眀白向見何叔京每持此論趙若海陛辭日亦嘗以為請但説者多以為不可行私固疑之而楊子直近日過此亦以為河州民力大困如人大病虛羸未堪汗下當且厚加調飬然後可以節次調治其説亦似有理所與諸司劄子事理甚眀但諸公何嘗以此等事經意想亦只是虛發耳未敢望其思量到子直所憂處也韜仲相度鈔鹽利害如何兩司之議不恊恐亦終無益也世間萬事類皆如此令人慨嘆但吾力所可及者不可不勉庶㡬隨事有補救得兩三分也向承寄及沙隨古鐡尺置之几上忽然失之不知彼中見有此様否如有之幸為别造一枚較令精審勿令一頭長短乃佳仍不必鑿荀朂名字可惡只云温公周漢尺可也經界中間更有無限不好意思不得不力辭今決此計一以眀田賦之不可不均一以使秉權者知士大夫之不可以羙官好語牢籠然此意難以語人以來喻者黙契故輙及之耳人來往者傳聞政聲甚美足以慰所懐正惟不倦以終之耳林帥入境具知吏治羙惡嚴毅有體甚彊人意想必能相知也韜仲亦得書説彼中事甚有條理讀之快人也如來書簡約不惹閑事又自是一種好意思也饒廷老歸聞諸公相許已有成説而辛卿適至以某嘗扣其廣右事宜疑其可以彊起乃復宿留然近又有書懇尤延之計必從初議矣萬一不允不敢憚逺畏瘴但恐伉拙無補扵事而徒失家居講學接引後來之益嵗月愈無多愈可惜耳薛漕之來方議所以寛民力者未得要領而遽有他除雖諸公意不茍然失之此為可恨耳直卿罷舉不復可勸殊不可曉書信及諸處書悉煩達之向令渠奉煩根究笛材乃欲以驗季通之律者不知曾根究得否幸更留念也林帥遽至此可駭可惜昨夕趙丞至方得其書人生浮脆如此而某又與之同庚得病尤覺可懼可懼章掾事已為言之但今年縁與憲車相欵大得罪扵鄉人其實不曾開口説一字渠問亦不深應不謂乃得此謗今此事雖不同然此亦不可廣也林帥固賢然近聞其與憲司不協亦大有行不得處豈其神眀将去而不思至此耶抑為州者固得以捍制使而使者果不可以察縣耶大抵范忠宣所謂恕已則昏者甚不可不戒使渠自作監司能堪此耶長坂䑕輩之擾兩日未平縣中得黄德威申状云已過羅溪范坑屬吉陽界縣宰昨日親行募以重賞計必得之不爾亦不過深入山林四散奔逸或無所得食縊死而已無能為也但蔡一哥間來乃云後山傳聞賊入石溪市中驚疑此決是虛傳此間亦虛傳賊到大田即是此一路也但市中羣小却不可不防鎮官無權不足恃此事晦伯當為鄉里任責且静以撫之為一生使别無變動為佳若論長坂之賊只有七人尉司申來已獲兩人矣決不能來不湏為備也昨日得報君舉以謝章奉祠而去未見文字不曉其由亦可駭也少意欲招一同人教諸孫而未有便近可招者不知知識間有此人否須得兼通經義聲律嚴毅通曉奈煩善誨諭人者乃佳必不得已只能作義亦得其餘則不可闕也所喻南安韓文久已得之舛訛殊甚葢方李申尊信閣本及舊本反將後來諸家所校定者妄行改易世俗傳訛兢稱善本誤人多矣昨為考異一書專為此本發也近日潮州取去隠其名以鏤板異時自當見之今不必寄來但細讀數篇便見紕繆矣年及告老乃禮之常而異議郷評横為沮抑若非臺章催促㡬不得遂今幸得之而一二要津亦肻放過亦是一事結抹如來喻所謂結五十年之公案者然閲邸報猶未免有㫄及之詞只恐諸賢更欲子細㸔詳未肻放過來哲手中也所喻泉司事體乃爾亦是地理太逺事權太輕其勢不得不然比見王南郷在番易本司時以涔水不辦親自到彼料理數月其課遂登渠清敏過人其事距今未逺想尚可訪問稽考也孫薛二守一章繳罷孫又長往尤可傷惜大抵時論洶洶殊未定也答劉韜仲某還家粗遣但心耗目昏老相頓見雖㸔書亦不能復如舊日矣得子澄書盛稱韜仲居官不茍前日晦伯一再相聚亦甚進益得後來朋友向前如此老朽無復恨矣子澄樂扵訓誘知數相見甚善甚善伯恭竟不起令人痛恨非但朋舊之私情而已示喻數條皆切中其病然廹當去恐不及改耳拂衣之舉尤所未能比遣人持書入都兩月未還計此遲緩是必將從其請矣若得脱此且當恣意逰山不能聽得世間許多是非毁譽也尤川之行初甚駭聽亟以書報趙帥趙帥報書云已奏俟鈔法定行差韜仲添充漕司屬官專一奉行諸人必未敢動當已聞之矣尤川今竟差何人只此一事已足見鹽法之弊漕司何乃全不覺悟耶所論鹽法皆善曾與應倉説否若未即及早詳告之恐其為漕司所惑悞申却文字也上四州誠不必盡改但建寜以東兩邑利害亦與尤劍無異此等縣道湏别立一法乃佳若其他有利無害處一例改却又却害事反為汀州及諸邑之累耳如何如何山記乃煩重刻愧甚不知所費㡬何今却勝前本矣龜山别録刋行甚善䟦語今往幸附之又得尊丈書知莆田未行已被尤川之檄朋友深以為慮昨日得居晦書云沙隨已為宛轉想必無他不知竟如何但鄙意終是不能無疑耳今雖不攝邑事而往督賦正是索千金扵乞丐之夫亦自無下脚手處若椎敲不恤則得罪扵民若事不辦則又得罪扵上官兩者之間亦湏勇決㫁置此恐無好出場也鹽筴已悉聞之帥説王漕亦頗有意相招奉扣不知定如何此君累歴州縣理事亦甚詳細向來正縁兩下情意不通所以擔閣至今若果相問詳為言之得其幡然一方之幸也鹽法利害曉然無可疑者王漕不知曾去相招否此是趙帥從初不與漕司通情之患若早以規模大槩語之當不至此齟齬也林守事某既不成入府閑人又不欲以書懇之但見趙帥説嘗為言之彼雖領畧然未知其果誠實否與其坐待汰斥不若先事請祠且以此意懇二漕少緩其事渠亦當相聽也某答林守書不欲盡言因見煩為宛轉亦所以答其不見鄙外之惓惓也讀書既有課程想日有趣季通思索甚精但恐有太過處耳諸書恐有所疑疏示一二大者為幸社倉條目適平父携以見過已商量一一奉報矣大體最是闗防隨行人減尅乞覔之弊此為最急向来某在倉中專治此一事其他亦無甚事也社倉交足甚善此足以破浮説之紛紛矣建陽措置官居晦無以易收支官恐不免煩居厚不知渠屑就否兩倉闕米只得且那融然亦湏申請使知支遣不足之故葢此消息不可㫁絶也示喻社倉已畢甚善所差官吏事且循春間例可也五六月附籍牓不知平父如何處置恐可㑹崇安已如何施行若未行即且俟帥司報應亦未晚也闕支一節却湏早申免至臨時費力建陽火灾異常今時官吏例是如此不容深責但可歎喟而已道之屈伸自闗時運區區人謀豈能為力但其所論紹聖之事却錯認了對頭甚可笑耳右揆求去復留殊未知所以或云只縁何疏有及赦文差互處係同擬定或云何别有疏攻之或云何已補外皆未審也葛顔之報亦未聞元善求滁已諾縁范有疏禁朝士之求去者乃且宿留廟堂亦留此闕俟之月初輪對或云已除檢詳恐未應如此之峻皆不得端的也二記當作但時論正如此豈是作文字刻金石之時近王子合陳膚仲來求記皆卻之矣不復得偏為韜仲作也千萬諒之李簿所説甚善但此事近亦多弊今建議者意亦闌珊未知將作如何收殺也答吕東萊康節恐是打乖法門非辭受之正伊川再受西監正是叙復元官還蒞舊職又可逡廵觧去即與今日事體全不相似皆未敢援以為比欽夫書來亦云豈可逆料後患而先汨所守之義此語甚直截但渠却不曾為思量如何避免得脱若只如此厮崖恐亦非臣子敢安也千萬便為盡以此意達之韓丈得早為觧紛為幸昨甞奉懇一言扵韓丈又專書禱之幸早為贊成使得速如所志幸甚區區所以不得不力辭者實以無功受爵求退得進扵心有所不安若一請不遂勢必再三以得請為期而後已然又不敢肆然直遂漠然不以為意者則以君臣之義平昔講聞不為不熟今此除授雖未必直由中出而名為君命在臣子之心亦何敢傲然以不受為高哉此所以不免委曲懇祈宛轉調䕶計誠欲兩全公私不使交病而已區區此心非特世俗所疑雖平生知友其不哂笑者㡬希度惟忠厚惻怛如吾伯恭者乃有以亮此心耳前日申狀及與韓沈書不能盡述此意幸請為言之有以發眀某所不能言者與王尚書佐始來不為久計不欲多挈孥累今只一十嵗小兒一孤甥及學者一二人在此天寒嵗暮官舎蕭然兀然如一老頭陀時一自笑且自歎也廬阜山水之勝粗快野心然非休務不敢出出又不得留愈覺拘悶行亦力懇諸公以必去為期耳某之族祖奉使直閣諱弁早從中州士大夫逰文學甚髙建炎初衘命金營見留十七年全節而歸又以忤時宰不及用而死藁殯西湖之智果院三十年矣其孫照者貧悴亡聊不能歸葬故里今欲只就左近卜地以葬竊意欲丐台㫖以重其事庶可必得今悉令取稟倘䝉矜許却令踏逐别具申請也向乞通理夏税側聞甚䝉尚書同右司丈維持之力但廟堂既無果決版曹又巧為沮抑至今未決甚可恨也竊聞檢放文字體式許以見示久未及請今願得以為法専此拜請幸即付去人此事自屬漕司更告因二漕語次及之及早行下州縣令受狀檢踏為佳葢早禾已刈至八九月不復可辨豐凶官司但欲罔民多取而不知僥倖姦民反乘此以欺有司也區區按事噬腊遇毒極為可笑然公正之朝不宜有此亦姑任之但若竟如此則荒政亦不復可料理亦即引去矣答趙都運善覺向來所呈啟䝉不審已䝉過目否近覺得有説未透處頗加改定旦夕修成别寄上也理財之説尤切時病今之所謂理財者豈復有義止是豪奪耳聞蜀中亦苦賦重民貧不審何術以惠緩之與田侍郎子貞引飲想良已生果安能發渴却是渴後喜食生冷此湏究其根原深加保養不可歸咎末節諱疾忌醫也比來隂雨過多氣候不正元氣不固者多是立脚不住平地喫交此一種病尤當過意隄防莫教隨例倒却也吾輩今日事事做不得只有向裏存心窮理與外人無交渉然亦不免違條礙貫㸔來無着力處只有更攅近裏面安身立命耳不審比日何所用心因書及之深所欲聞也㸔前日報行章疏便要回面汙行首身投免亦不可得只得守吾太𤣥也所喻不平者何事此等大抵無足深恠所謂漸平者今乃激而愈偏大率天下只有一是一非是者湏還他是非者須還他非方是自然之平若不分邪正不别是非而但欲其平決無可平之理此元祐之調停元符之建中所以敗也時事至此拱手坐視無着力處病根豈有窮耶所得水石知在何許恨不敢去一觀耳間中所讀何書天下事既有所不得為顧此一事尚屬自已若又因循放棄日月真可惜也某一病兩月将行未果所上告老之章近聞亦已見卻勢不免復小紛紜或恐遂抵譴訶不可知也隂邪表裏欺天罔人方此之時不能仰首一鳴以期開悟而徒為蓄縮自全之計永負臣子之責矣奈何奈何今從黄守借人專致此書幸以數字見報凡郷來見聞所及告悉及之亦懇黄守尋的便附來必不至浮沉也聞道學鉤黨已有名籍而拙者辱在其間頗居前列不知何者為之及所指餘人謂誰皆望一一條示也昨日季通説舊居山水甚勝棄之可惜新居近城以此間事體料之必不能免人事之擾只如使節經由不容不見便成一迎送行户應接言語之間久逺豈無悔吝今年尤覺不便始悟東遷之失計賢者異時亦當信此言也片紙所喻非有疑扵二君但聞是時坐間亦有它客恐致傳播不便耳時論日新于越章彭徐薛諸人必續有行遣未知輕重逺近如何耳薛竟不免枉道果何益乎某以議陵自劾恐亦觸諸新貴之怒然已判㫁不能闗念也休致文字已申本府尚未得保眀申發萬一有遲疑即不免徑申省陳乞矣比來論議似稍寜息未知竟如何正恐不削亦反耳衛公計時相見聞欲徙居盤澗若爾即尤相近也開正晴暖欲挈舟南下又憚經由富沙不免見諸人一番露頭面可厭更俟計度若幸無疾病即當扶曳冒昧一行兼欲見石佛懸泉之勝也士子之賢如施林諸人已相見皆如來喻但陳鄭未見旦夕訪問之當肻顧也五日一延見諸生力為普説今頗覺有風動之意少假旬月亦當有以少變前日之陋也聞同官多得同志甚慰鄙懐其間亦有相識相聞者恨無由相㑹聚切磋耳近觀時論日就卑鄙而吾黨之士相繼而出似猶未艾天意儻遂悔禍則亦不為無可用之人矣願相與勉旃荀卿子云皓天不復憂無疆也千秋必反古之常也弟子勉學天不忘也此正區區今日之意也某氣痞筋攣日以益甚休致文字州府已為施行但舉城知舊無一人肻為作保不免逺求左右想無不可得與僉圓付去人仍借一得力可託人自持印紙隨之令俟批上却將以還免致失墜尤幸也來書前後不同東閤郎君之説葢出老丈向得其書亦自言此意甚勤懇然事始已行不可復收矣只得向前㫄人指㸃一切不能管得楊子直黄商伯乞宫觀而遭繳豈有某却望復職致仕而求恩澤之理雖至愚者知其必不然矣况今不作奏不通廟堂書劄而陳乞狀内亦不敢叙歴任年月其意亦自可見也昨日又得黄仲本書云得親戚書議者方欲申嚴謝事條制渠是謝胡姻家語必非妄此亦似是有為而發若但驅逐不容更在仕路猶是善意萬一或是以此速其必來而因以治之亦無可避之䇿只得依經據禮冒昧向前㸔他如何區處若幸得一章痛加排詆置之竄斥不容休致之地即在我者亦有辭矣不審眀者以為如何昨日作誠父書託其致意不知曾相見否或未見可借取一觀然其説亦大槩與此相表裏也欲作衛公書道此曲折數日又苦目昏不能謹書或因便問及亦告及之演山觀瀑之約夢寐不忘然湏病軀稍堪扶持及此一事結㫁了絶始可出入以此反增煩懣耳渤海方繳陳益之宜春之命去冬所傳上饒亦恐是浪語耳中間議論稍平僕便疑不久諸人豈坐受縛者勢必多方逰談脅持恐嚇以必勝為効自此當漸見之繳詞未報其間必有大開闔可想也與章侍郎茂獻頃幸同僚實深慰喜雖趣尚之同彼此黙喻然未甞得從容傾倒以圖事變之所終極而遂匆匆去國至今以為恨也昨聞忠言正論愠扵羣小遂以口語翩然西歸嘗附一言扵上饒少致區區髙仰之意而車騎已逺遂不可及但有懐想不能為情近得張元德書竊聞還家為况甚適吾人私計固應隨處而安但國論大變日甚一日令人憂懼便覺無頓身處不知上天至仁何故生此等輩使能譸張幻惑以敗人之國家也昨在經筵不能上為眀主預陳此説吾輩亦不得為無罪矣扵今尚何言哉尚何言哉婺女既罷江陵恐亦難安得其近書否念之不能忘也吕子約經由曾相見否諸賢盡去㡬扵空國矣樓孫獨未知所謂國是之論初甚駭聽徐觀其間意實微婉不知還是從之文字否果爾亦足以去也適聞乃是南牀語亦可見打不過處恐亦不為同列所容矣良齋謝丈奄忽云亡後進失所尊仰欲附一書弔其子而未有以將之湏例後便恐或相見幸為及之也誠齋久不得信不知成行否九級浮圖八級已了只欠此一級固當為天下惜之也某自四月初大病至今中間危急已為納禄之請近報未允前此辭職亦未果決適間聞有疏其名字牽連四十餘人以白于上者如此則非久勢湏别有行遣然數日前甞以周易筮之偶得遯尾之占見乎蓍龜者如此則亦非彼之所能為矣将安避之哉觧袂之後亦知世路漸艱然不謂乃爾之遽也久欲致一書以病不能引領鄉風徒切歎仰近得宜春袁推書具道有問之意亦知雅眷之不我忘也向來從㳺不款至今抱恨顧此衰朽疾病日侵恐不復有承晤之期矣世道反覆已足流涕而握其事者怒猶未息未知終安所至極耶然宗社有靈公論未泯異日必有任是責者非左右吾誰望耶子夀想時相聞近亦得書衡陽之櫬當已過彼久矣初意但恐不得久扵零陵不謂造物者亦復隨俗抵巇也需及廟議便欲寫呈以來使不能俟當尋的便别寄也當時不知何故直爾匆匆更不暇博盡同異而遽為毁撤之計甚可驚惋豈扵是時已有撞壊之徴耶廟議固可恨然自有襯之乃有大扵此者令人痛心子夀竟不免推遷至此乃是無人肻受惡名今遂決之其勇亦可尚也然自有襯之一句恐有誤字昨幸同朝列雖不得日夕從容然荷相予之意甚勤而襟期所屬以為可同天下之憂者如門下亦不過三四人耳今不㡬日而風流雲㪚恍然一夢􅄔不恤緯每深此懐而生死契濶未暇論也不審次舎即今已次何許想徑歸清江舊第矣頃嵗經由見其登臨有江山之勝交逰中有老成可敬有士友可親甚可樂想為况亦不落莫恨不得往從杖屨之逰耳子夀當已赴江陵見袁機仲説彼中形勢事體亦甚可慮不知子夀何以處之聞北風殊惡計恐不可為久留計也德修得祠私計亦甚便但其去日逺尤使人不能忘懐補之事勢恐亦難久留若更去却真空國而無人矣昨晚得去相内口書今想已到于越矣答尤尚書袤示喻程門諸人行事附見甚善龜山靖康間論事頗多今長編中全不載葢縁汪丈當時編集之際楊家子弟以避禍為説懇請刪去故雍傳即不見其章疏後來延平重刋龜山集方始收入他時或作楊傳不可不細考也尹和靖被召時適有臣寮陳公輔論毁程學尹公在道懇辭甚可觀又嘗論講和甚力皆不可不載者也南軒集誤字有是元本脱誤者如召閒處則拙者葢有罪焉然亦曾寫與定叟恐其欲有囘互不妨報及今承疏示當以示刋者有姓字處且令鑱滅後人亦須自曉得也奉三月四日手教一通三復慰喜不可具言又䝉封送差敕及所撰族祖銘文尤切感荷衰病之餘復叨祠禄已為優幸而雲臺改命又如私請便得仰止希夷之高躅以激衰懦則又報事者不言之教也幸甚誌銘之作雄健高古曲盡事情雖或節用行狀之詞而一經㸃化精神逈出正襟伏讀使人魄動神悚知君臣之義與生俱生果非從外得也竊謂此文實天下名教之指南寒郷冷族何幸而獨得之然亦非可得專有之矣幸甚幸甚屬以一至城府歸憇武夷繚繞還家賔客書問疾病之擾無一日暇以故久不得致謝意然此心未嘗一日忘也沙隨程丈忽見過留止旬日得款餘論啟發為多如此等人老扵州縣深為可惜趙帥招之折􅇆奏議之編工夫亦殊浩渺也項平父向來紹興同官中極不易得來教所謂可用之才誠不易之論得書知欲此來未知能自㧞否耳蔡君律書已成簡徑精宻悉有據依乃知前人大是草率恨不令年兄見之其歴書則未就然大畧規模亦與律書相似所謂無零分者非如來教所疑也金陵之䘮中外有識同切傷痛而况扵交舊之私乎逺承弔問凡所以為之深謀逺慮者一皆切中事情無所回避感歎不已某昨聞其還即走紫溪又聞以柩重難行恐平父道間少人商議遂至弋陽候之幸却不甚費力一慟之餘細問宻折盡凡令尊兄之所慮者無不已有其端今當宻與平父協力區處庶㡬不至甚乖剌耳所幸延哥似却長進若得數年扶持教養當成令器顧恐疾病衰頽不得終任此責也彦叙遽止此可傷人生危脆如此又可歎也圭父為况如何連得二書頗不安跡似亦不必如此人生各以時行耳豈必有挾然後可以仕哉聞尊兄亦嘗寛曉之甚善平父遭此禍故初恐其心疾發動却因此不暇及營造無益之事反覺安穏若常如此可無他慮幸因書力勸其清心省事以持門户為佳細間宻折等語必有誤字某衰病杜門茍安祠禄方竊自幸上恩不棄忽復收用感激雖深然資淺材疏詎復堪此此外曲折又復多端已力懇辭諸公哀憐當為開陳使得請也承問之及感愧良深陳公必已到闕不知去住如何此事自繫天意豈人力之所及哉江陵計今已赴久不得書不知為况如何呉邕州求免逺使不知得出何䇿直以親老丐祠恐無不得之理但恐别求任使則難必耳羅倅兄弟恐未參識自江西來者多能道其賢也程侍郎禹貢文字曾傳得否若有本便中幸借及每讀此篇常恨讀書不多無以考見古今之同異計其所述必甚精博所願見也呉監丞輪對文字亦願得之不知可以并垂示否尚書程公垂問曲折尤感其意因見幸為致謝悃區區之意葢不殊前也羅兄亦告致鄙懐皆未敢拜書也益恭得祠甚善材業如此何患不達政湏恬養以厚本根耳禹貢論得之開豁甚多歎服無已但恨未見畫圖得為求之便中寄示幸甚傳畢當并此論歸納也伯駿劄子亦幸垂示它有可見教不吝及之尤所望也某不孝禍深早嵗孤露提携教育實賴母慈不幸迂愚不堪世用不能少伸烏鳥之報而奄忽至此寃痛割裂不能自存幸以今春粗畢大事音容永隔痛苦終天伏承惠弔并以香茶果實逺致奠儀仰感勤眷之誠俯念疇昔之好拜領號絶不知所言襄陽之除必是見闕正此哀苦不敢奉慶惟是益逺誨晤而殘息奄奄不保朝夕引領西望徒切悵然鄉邦得人之盛魁選復出其中甚為可喜但所陳取士之䇿扵人物取舎之際不免祖襲蘇氏浮薄之餘論此議肆行非天下之福殊使人不滿意自此脱去場屋想當别作規橅耳衰陋何足取置齒頰間耶汪樞之孫遂進而立扵三人之列想老丈慰意也荆州之行寄任增重今當入境矣答郭察院邦瑞副封垂示尤荷不鄙使任事者扵事之㡬微每每如此則尚何朝綱不振之足憂哉甚善甚善甚盛甚盛某衰晚多難懇辭恩除未遂私計之便今不敢復以前請為説矣惟是前仕有妄乞施行經界一事今已住罷自合抵罪而反冒褒擢實無面目可將使指不免自劾以俟嚴譴忽聞抗疏觸邪遂去言職此扵賢業為有光顧在治朝為可恨耳偶在病中聞之增氣與士友言亦未甞不俯而歎仰而賀也鄉黨交㳺與有光寵其何幸如之録示諫草三復永歎知忠賢得志之難而吾道果未易行也然清名直節足為閭里光寵而去一凶人亦足少折隂邪之氣扵正論不為無助此又皆可賀者答郭邦逸吾人之學要當以眀理治身為本世間得失正不足深計也某衰病屏居尚叨稍食不復有與世俗較曲直之心矣聞以前事頗累鄭君為之踧踖尚賴寛恩不終抵罪也志父中秘之除此却未之聞泉州之命亦然山間真如井底也某昨遣人請祠今已竟月杳無還耗方以為慮承喻廟堂已有領畧之意若是監丞兄書所報想必得其實兼林既去亦湏兩下有施行乃見平平蕩蕩之意也奏函必已闗乙覽殊未聞宣召之㫖何耶承當俯就臺選來嵗發䇿大廷始當披腹呈琅玕耳答羅叅議時得欽夫書聞其進德之勇益使人歎息郴寇掩擊官軍反為官軍所蹙勢已小䘐但未知終當如何耳閩中人情却甚安帖時和嵗豐天所賜也第州縣以催發上供之故頗行刻急裒斂之政此為可慮耳建陽鄉人李秉義舊甞從寳學劉丈入蜀今老且病往投舊識諸將因來求書得以附此渠不敢有所求但得一顧之寵亦足以為重也元履來山間相訪適值此便亦有一書附之九月廿日至豫章及魏公之舟而哭之云亡之歎豈特吾人共之海内有識之所同也自豫章送之豐城舟中與欽夫得三日之款其天質甚敏學問甚正若充養不置何可量也但云頃在富陽與尊兄辨論甚苦是時左右似未以外學為不然却與前此相聚時所聞小異何耶汪丈日相聚所講論者何事當有可見語者某頃以書論數事似皆未以為然者未敢茍已復以此書扣之論語序一篇欲冩呈之書中已言之而便速冩札不謹只納左右幸因語呈似幸甚幸甚先生埋銘頃欲只求汪丈寫不知見許不想甞懇之不待言也前書所欲更易數處欽夫又欲刪去一句乃行狀中本語不知汪丈以為如何乘間試為扣之所寄彦豐處書未到今此便過餘干却令往取矣竊承幕府無事得以儉儉字疑㳺坐進此道而所以與謀贊畫者莫非便民聲勞聲勞恐有誤字之事甚休甚休示及汪丈書知已為縁况虚縁况虚等語恐有誤字志銘幸甚幸甚容附書端父兄弟借來一觀也端父兄弟已祥祭先生德容日逺益使人痛心耳記善録荷傳示甚慰所望亟作書遣人未及細觀然其大致可見扵此始得聞和靖言行之詳葢其見道極眀白故其言之極平易似淺近而實深逺卓乎義不可及也祁居之相見其議論云何有可以見示者否龜山論語序本為世學膠固學者類多以分文析字執辭泥迹為務故有視其所視遺其所不視之説但所引用之事從莊列中説作太過遂致微失本意却似精粗本末真有二致所以中間竊以為疑非疑其意特疑其語耳後見張欽夫吳晦叔乃知文定亦甞疑之不審尊意以為如何幸有以見教胡仁仲所著知言一冊内呈其語道極精切有實用處暇日試熟㸔有㑹心處却望垂喻某扵汪丈書中已説及恐欲見即為呈似也欽夫嘗收安問警益甚多大抵衡山之學只就日用處操存辨察本末一致尤易見功某近乃覺知如此非面未易究也眀仲兄不及拜别狀想旦夕從容有講道之樂中間説㸔易傳不知後來所得如何某亦欲讀此書如有可以見教者因來及之幸甚幸甚元履晉叔近皆相見亦甚瞻仰也前書懇求書籍碑刻等不知曾辱留意否先生諸書想熟觀之矣平日講論甚是如此竒論所未及者别後始作書請之故其説止此然其大槩可知矣老兄既知外學之非而欲留意扵此恐扵論孟中庸大學之書不可不熟讀而詳味章句之間雖若淺近不足用心然聖賢之言無不造極學之不博則約不可守今扵六經未能遍考而止以論孟中庸大學為務則己未為博矣况又從而忽略之無乃太約乎某塊坐窮山絶無師友之助惟時得欽夫書問往來講究此道近方覺有脱然處潛味之久益覺日前所聞扵西林而未之契者皆不我欺矣幸甚幸甚恨未得質之髙眀也元來此事與禪學十分相似所争毫末耳然此毫末却甚占地位今學者既不知禪而禪者又不知學互相排擊絶不劄著痛處亦可笑耳何叔京秋間相過少款相與懐想髙致者俱不自勝也知言後來必已熟㸔其説如何汪丈曾説及否可否之間必有定論因來及之幸幸記善録細㸔却似馮公所見未透記得無精彩長者所見莫亦是如此否極感留意以耳目之玩煩長者愧愧向附還三書已領矣書中忘記稟知也汪丈寄横渠三書來此為校補甚多勢須刋作一本乃佳葢補綴不好㸔也大抵集中脱誤盡在第二至第五卷中只換却此四卷亦得也第七卷中有一論邉事狀却只扵卷末添版便得恐汪丈事多告請出為㸃對付之工人幸甚幸甚此道既寂寥而諸先賢之子孫亦復流落不振自幕府之西訪其書恤其人不遺餘力此亦一時節因縁耶校書極難共父刻程集扵長沙欽夫為校比送得來乃無板不錯字方盡寫寄之不知今改正未也張家事已扵共父書中言之不知其人已來未也人家僮僕乃有如此者可尚可尚今士大夫食君之禄不為不厚而臨事面謾辭難就利無所不至亦有愧此僕也哉此書轉託欽夫尋便亦方索然無一物可伴書者可笑可笑與羅師孟師舜兄弟某昨承面喻將以先公行實見委始者徒感知遇之深不自知其不可既而思之先公平日交㳺皆海内老成賢雋之士其間相處之久相知之深而文字言語足以發揚潛德者尚多有之某之不才豈宜進越輙任此責若昆仲以先公嘗一顧之不欲鄙棄它時草定行事本末因使得預討論而致之諸公則某雖愚不敢不勉竭駑鈍以承命萬望裁之又向䝉示教扵輩行間自貶過甚亦不敢當自此枉書率刋正之先公銘文已為題額并託上饒程文書之字畫淳古可愛想便刻石也其間有少曲折已為四哥言之矣答羅縣尉南劍沙縣人讀書治病之説誠如所喻但古人之學以莊敬持守為先而讀書窮理以發其趣至扵讀書之法則又當循序専一反復玩味一日之課不可過三五條譬如良藥雖無劫病之功而積日累月自當漸覺四大經安矣與林安撫名枅字子方竊聞開府以來蠲除逋負以大萬計號令所下至簡而嚴是以舉措不苛而人自不犯方地數千里吏畏民安近嵗所未有也區區仰德為日固久而究觀規摹斂衽心服則自今始乃䝉垂問見聞所及又有以見髙眀之度不自賢智乃如此尤以歎仰茍有所懐安敢不盡顧實未有以塞訪逮之勤耳又承詢及所知别紙具稟恨所識不多未足以副好賢樂善之意也晦庵續集卷三欽定四庫全書晦庵續集卷四宋朱子撰書與趙昌甫罪戻之餘物色未已不知何以見惡如此之深甚可笑也近讀經書不得却㸔些古文章識得古人用意處然亦覺轉喉觸諱不敢下筆注觧但時發一笑耳來書所喻似皆未切事情已細與長孺言之後有的便渠必一一奉報要之今日只可謹之又謹畏之又畏不可以目下少寛便自舒肆況所謂少寛者又已激而更甚乎黄乃以力賛建中而去前已去者將有復來之漸其繼之者與儲以待次者又不定不入若非上心慨然開悟發眀善類未有少安之望也千萬與諸伯仲深詧此意敬恭朝夕安以俟之區區不勝真切之望也昨日得王謙仲書亦如履常所料葢逺方未見近報耳向讀學易集見其當紹聖元符之際愁居懾處之状令人傷歎不意今日乃見此境界宛在目前試取一觀亦足以為法也少時見吕紫㣲與人書説交逰中時復抽了一兩人令人驚懼當時不理㑹得今乃親見此境界也斯逺聞其䘮偶不知果然否經年不得渠書想亦畏偽學汚染也李白詩多説此事惜不能盡曉粗窺端緒亦不暇入静行持但玩其言猶是漢末文字可愛其言存神内照者亦隨時隨處可下工夫未必無益扵養病也已草挂冠之牘開嵗即上計較平生已為優幸獨恨為學不力有愧初心著書未成不無遺憾耳因便寓此少致問訊之意政逺千萬戒詩止酒以時自愛眷集均慶答江隠君每承諄切之誨若將挈而寘諸聖賢之域顧愚昧未知所以仰稱期待教督之意而又未得親奉指畫扵前其為向仰不勝此心之拳拳别紙所喻汪洋博大不可涯涘仰見所造之深所養之備縱横貫穿上下馳騁無所窮竭底滯雖若某之䝉昧誠不足以語此亦已昭然若發䝉矣幸甚幸甚然竊以平生所聞扵師友者驗之其大致規模不能有異獨扵其間語夫進修節序之緩急先後則或未同葢某之所聞以為天下之物無一物不具天理所謂寂然不動感而遂通者舉目無不在焉是以聖門之學下學之序始扵格物以致其知不離乎日用事物之間别其是非究其可否由是精義入神以致其用其間曲折纎悉容有次序而一理貫通無分叚無時節無方所以為精也而不離乎粗以為末也而不離乎本必也優㳺潜玩饜飫而自得之然後為至固不可自畫而緩亦不可以欲速而急譬如草木自萌芽生長以至扵支葉生實不至其日至之時而揠焉以助之長豈不無益而反害之哉凡此與來教所謂傷時痛俗急扵自反且欲㑹通其㫖要以為駐足之地者其本末指意似若不同故前後反復之言率多違異而語其所詣之極則又不敢以為不同也姑論其大槩異同之端以為求教之目其他曲折不敢執着言語以取再三之瀆要之非得面承不能究此心之所欲言也伏辱墜教所以訓督孜孜不倦有加扵昔顧惟庸昧重勞提耳既感且愧不知所以為謝也始者獻疑亦非敢以所示大㫖為不然但疑精義入神一句文義或不如此恐如所論則義以方外之一節似少功用耳及䝉垂喻再三每加精宻讀之恍然自失扵直截根源處更無纎芥可疑只是精義入神一句依前未免扭揑愚謂大體已是正當即不須强以此句説合費多少心力言語扵道體無所發眀扵文理反有所累某竊終疑之願平心以觀聖人立言之意當信某非敢妄言而此句工夫自有所謂不但如來喻所指而已拙扵文詞又迫私冗來使不能久駐然此非難知以吾丈髙眀尤不難見若無義以方外一節即}
