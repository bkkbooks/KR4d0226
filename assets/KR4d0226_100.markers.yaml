  - {type: variant, offset: 12015, length: 0, content: '', WYG: 修畢試整頓詩説㸔如何但精力短甚畏開卷也前書所云甚恨忠告之晚常時鄙笑荘周為惡無近刑之説自今觀之亦自不易也月末專望枉顧餘得面言所喻自省之意甚善然恐病不在此只合且扵存心處事上痛自省察矯革也某求去未獲然賤迹終不能安度更不報即以罪譴逐矣此間詞訴近日却絶少漸可讀書但直卿既歸復之又病數日羸甚無人商量文字都不得下筆此事未知終竟如何萬一不就恐為千載之恨也季通可早来或未歸得共究此業或已束装亦得道間相伴遊山玩水也希聖要来甚善有朋友性静向學能思索檢討者携一二人来尤佳其不能此者無益徒累人也樂説已領尚未有深觧處湏面扣乃悉耳雅樂説後便幸示及聞有安定鹿鳴譜亦望録寄偶得新都八陳石刻本納呈㸔畢却告附還其説與薛士龍者同異如何并告喻及需通鑑方比修改未定舊本大畧不成文字也近覺讀書損耗心目不如静坐省察自已為有功幸試為之當覺其效也古樂之説尤荷意勤及今見之殊勝蜀公之方響也但諸説中頗有未甚觧處及新書内論古錢處前後頗有相牴牾者又不見今是以聲定律為與此尺合之意耳此皆俟相見面論今日寒甚寫字不成也啓䝉之名本以為謙而反近扵不遜不知别有何字可改幸更為思費隠之説若有所見湏子細寫出逐句逐字商量如何見得上下察是隠處湏著力説教分眀方見歸著若只如此含糊約度説得不濟事不惟人曉不得自家亦曉不得也且若果如此子細當時便合引上天之載無聲無臭以眀至隠之義不應却引鳶飛魚躍至顯之事而為言却説翻了也請更思之前日已嘗疑此後來子細反復逐一寫出比較見得説不行此無可疑也只管如此疑無了時只費頃刻功夫寫出了到寫不行處便釋然矣昨日見報有因奏對極言太極之罪者累數百言大率皆攻鄙説其説甚獃可笑不知何人所發也竊恐流布諸書亦不甚便更思之如何三變之説甚荷見教比因修禮編得鍾律一篇頗簡約可觀大抵盡用本原之書旦夕當奉呈也糴米事適間趙簿來問不知為請此錢分付晦伯兄弟如何幸度其可否速見喻當以囑趙及元善作書也但吾輩時運不好不可自犯脚手然又不可不為鄊里計也平江人欲遣行磬式幸裁定示及黄鍾一均六律各隨大小畫様以所定古尺為凖各餘半寸以上以備磨錯乃佳仍告早示下也前日所説磨崖刻河洛先天諸圖適見甘君説閣皁山中新營精舎處有石如削似可鐫刻亦告以一本付之先天湏刻卦印印之乃佳但篆𨽻碑子字畫皆不滿人意未有可寫之人為撓耳令伯謨篆如何三圖須作篆乃有古意便當遣人送伯謨處也但磬式股鼓俱大似是誤筆今别考禮注畫黄鍾一枚去幸細考之若合如此即别為作六枚并此付來也其厚亦有等差耶或但長短不同而博厚如一也并告依此界一側面使有定論老兄平時扵此極精密不知何故今此殊草草也龜兆之説未曉所謂不知當近界弦處耶當逺之也又不知界弦是龜中直紋耶是四外邊界也幸更批喻磬式已定但恐石璞不必太大四邊只各留半寸許可也博厚之制前書誤謂諸律一等後來細讀始知其繆耳參同寫得一本稍分眀俟皆了納去更煩一㸔便可刋刻矣藍家墻界未得消息築者停手以待幸早寄信去得遣一親信人来乃佳不然即且依界築矣切望留念省劄至今不到昨夕忽夢得餘干想今日必到也鈞孫在鋪下切煩三哥誨督之不可待以朋友之禮也切祝切祝南遊去住當已有决計矣公濟山頭日用工夫之問見季通未有端的應答彼説雖偏然吾輩之所以自治者如此之鹵莽㡬何其不為不如稊稗之五榖耶兩日欲奉扣因循不暇亦苦疲憊無好意思遂不能及今試請加省察果以何地為進徳之基也歸来又得伯恭書云學者須是専心致志絶利一源凝聚停蓄方始收拾得上此言甚當不敢不以告也某衰晚强顔力不勝事今又有經界之役此實一郡利病所繫不淺義不當辭已上奏懇請今更欲得晦伯一来相助不知渠肯来否已有書與之更告為勉其行并為遊説老丈得不挽留之千萬之幸也向所懇者曾為留意否今偶遣人送劉壻歸有一二十人昨承老兄有意見訪莫若就此同晦伯同途尤便過此則州郡遣人又費力矣春秋之説當俟面請或未成行千萬便録大槩見示為幸所喻希真事已語劉戎矣偶欲出縣匆匆奉報别有一二事令埜専人奉扣幸垂喻中庸闕板并望早示及聞前日談天甚快恨不參聽其㫄耳三日来發熱昏冒不識何證藥物雜進殊未見效良以為撓所喻朝聞夕死之意不勝歎服然老人之學要當有要約處恐非儀禮之所及也費隠之説非不欲剖析言之但終覺費力强説不行不免且仍舊耳二書修改處想已了幸早寄及聞到黄蘖想遍遊一帶名山多得勝槩然遂欲盡發天地之藏則癰痔果蓏之不能無憾扵見傷因便寓此敬問還期諸書已領劄子又畧修改説得稍平人亦多説恐有此嫌鄙意獨謂此乃實情無可疑者事定乃知其不誤也某杜門如昨無足言請祠人未歸若得如此占幸甚但恐消詳未盡耳三聖必不我欺也聞林又請對乞與論者廷辨且攻横渠甚急上皆不領慚沮而退未知竟如何某所遣請祠人竟未歸不審何説利往之亨竊恐未可必也又為部中送磨勘告來今日又不免遣人辭之此又是别一頭項費分疏然亦無甚利害也别紙所示詞雖迂緩而意實詆忤却恐未便所與元善書則今早所遣人方行湏後便方得附去某書中只如初議萬一不及救止則此亦無甚利害與某事體自不同不必過疑也儀象法要昨因子荘過此再㸔向来不相接處今已得之元来文字只要熟㸔本義已畧具備覺取象之説不眀不甚快人意耳今文之誤先儒舊説可證驗處甚多所欲改更皆非今日之臆説也俟月末携去㸔恐人多㸔不得耳因其人還附此不知便得達否方才仲文字正尋不見疑智夫借去乃在書府幸甚因便示及也渠深為夀皇所知自今觀之不為不遇猶復齟齬如此是可歎也昨味道歸来説厯書就篇伏惟驩慶恨未得窺藩籬也律圖想甚可觀然其聲湏細考之令有定論乃佳切在虚心平氣不可有毫髪偏滯之私也病之復作次第亦是出謁太早所致前日固甞奉告且勿出入不惟可養疾亦且避得招呼之煩今湏且切守此戒也此外只得寛以處之平日學問正要此等處得力也前書所扣一哥之行来喻如此是決不可行矣直卿只可往来相伴決不能終歳守諸㓜童謙之聞欲赴補又未必可挽而行期已迫思之只有鉛山徐子融老成有守常作小學已往招之又未知其能逺適與否耳辭免文字甚遜然不至全然無骨甚荷憂念也元善書旦夕遣人即付去律厯乃千古事數日細思伊川上冨公書此事亦使人不能忘但今日月已迫元善之計亦未必行近日得其書云議禮正冗未暇言政恐雖言亦不效葢覆按使還又附前議若果如元善前書之云令人痛心但不容効力無可奈何耳直卿前日有人来書中都不説及通書注答書亦忘督之若有便往可問之太極西銘前日忘記付去今付此人幸視至郭頤正編射法及馮侯者可并刋行恐力不足即因見夢傳為言在渠為之不難亦是適用文字殊勝時文也徐貢父兄弟又遣人来奉邀計湏歸来方得赴其約然自此亦當重然諾庶得安居為著書養性之計只管如此衝寒冒熱東西逰走似非老大所宜尤非所以學安樂祖師之所行也適見小報元善已得浙西提舉計是見闕就彼便赴上矣厯事當且悠悠然及此成書以俟来者亦非細事也但疑其不可就者非特趙君一袪此惑亦快事耳它日過此畧帶草本来及新製律管及書俱来為佳俗樂文字亦欲就借鴻羽可用為儀不知如何觧先儒所謂進退可法者不知本文有此意否耶恐此亦只是可為旄之屬無進退以禮之義也若如鄙意所釋則不如曳尾扵泥中也矣眩暈之疾若得静以養之自當安定今乃汨汨應接如此何由可已如某目疾亦是如此今乃終日寫書不得一舉首勢必雙瞽而後已耳集注事前日已失究治今當為料理可便作一状来送邑中行遣也来春欲一到精舎或能俱行即同往觀尤佳然須有所託以為詞乃為便也啓䝉中欲改數處今籖出奉呈幸更審之可改即改為佳免令舊本流布太廣也但恐不好㸔亦無奈何耳費隠儘有説但日間稍得閑坐又貪温養工夫不暇安排文義耳前日所扣竟當如何幸早見教以觧煩惑幸甚幸甚諸事却未聞焚滅之命中庸必已了矣早得數本為惠幸甚幸甚得履之書如此亟以奉呈恐欲預有所處也然不必匆匆但當有以待之耳葉正則遭論鐫兩秩罷去并毁其書板章中已見及名次甚高與履之所云相表裏勢只旬月間湏有處分又聞前日寒泉會哭已有告言路者周元興聞之城下吳生赴省歸者云然當非妄傳亦可畧語韜仲也昨日亦甞上状不知何故未達今早又以中庸集畧附劉醫乃昨日遣書時所遺也今想皆已到矣雨勢如此豈登山之時乎需藥遣去然恐不如安樂師翁所云病前自防也専門之誚正卞公所謂執鄙吝者非壼而誰然今日聞公試之日諸生簾前一語尤可絶倒它日當自聞之也近報十五日車駕已與中宫同詣重華終日乃歸軍民相慶恐欲知也長沙之行㡬日可歸益公相見亦何言耶閣記不敢辭但恐病中意思昏憒未必能及許教未替前了得耳向見薛象先盛稱其人今讀其書乃知講扵陸氏之學者近年此説流行後生好資質者皆為所擔閣壊了甚可歎也某病軀粗健但自春夏來一向闕雨五月以前祈禱猶有應農功已粗可觀而六月半後遂不復雨聞得數里間一兩刻沾洒殊不周足今早禾損及八九晚田亦未可知初欲此月丐祠而事勢如此如何敢求去只得盡力捄荒耳楊僉又以憂去新}
