  - {type: variant, offset: 12012, length: 0, content: '', WYG: 識晦菴集後序右晦菴文公文集百卷又續集五卷别集七卷嵗久版昏察使胡仲申岳副使張用載大輪先後白廵御史虞惟明守愚蘓宗玉信蒋伯宣詔縮費重雕蔵諸閩臬潢故習朱氏易詩四書想見其為人比渉是編始得公所為融㑹折衷深造大成者審在沉􅇓反覆積累有年之後而師友淵源經綸本末始終條理燦然詳明尤足以發揮本義集註語録曲折上探聖賢之藴雖公於文所好不存潢以世傳大學序白鹿洞賦草暨答吕伯恭論洞記等徴之當時思繹之熟改定之精凡未可以言語文字求之也獨慨公老慶元間學禁方厲片詞隻字所在毁棄每讀詹師罷鋟梓書未嘗不掩卷太息惡小人之罔極淳祐以來區區掇拾已非復公季子在初類次本而王㑹之祀伯和虞伯生家藏與陸王帖梅花賦諸篇往往尚逸弗録集中記載牴牾可疑亦復不鮮則吾儕於此茍非誠致力於公居敬窮理反躬實踐之功政恐其幸傳者未易遽知况望能并其不可傳者不言而自得之哉潢聞往者濂洛三先生書歴時未逺微言大義鬱而不彰公既以孔孟道統所繋亟為之緒正表章猶慮人滯於見聞謂必能真立伊尹之志修顔子之學使本立而知益明知精而本益固日用之間将有以得乎先生之心而疑信可判繼往開來惓惓如是矧後公數百年其間志堅思苦}
