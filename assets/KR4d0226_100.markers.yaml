  - {type: variant, offset: 12022, length: 1, content: 簮, WYG: 坊大寧余于之旱為尤慘雖或一二分熟者然大概顆粒不収然則熟田實不能當旱田二十分之一誠恐官司它日以所供熟田多少而定通放秋苗分數則些少熟處適所以累及旱傷之家有大不均之病聞之鄉老皆以為今嵗之旱酷於辛卯盖彼時人家尚有嵗備自夫一旱之後加以連年暗折入間例無盖藏自前月來鄉曲上户小民流離已覺相踵且今此正収刈之際人家尚有一二分早禾可恃而已如此者雖亦糊口迫之誠以催科之窘且深為後日慮而畫此至無賴計耳比年以來都昌上戸多為小人誣賴故闕乏之際有力之家至不敢與交易由是貧乏下户愈覺坐困而無告今鄉曲猶未雨油麻粟豆並烏有赤地未耕二麥且有失時之慮嗣嵗之計彼將何措此蠲租之惠尤鄉民之所深望也昔唐制旱七分租庸調皆免被三分之収非不知取捐之盖有深望也本軍遂作訪聞行帖三縣檢視官約束委官置場循環収糴米斛照得本軍管界乆闕雨澤旱死田禾目今在市闕米出糶切慮細民闕食合行借撥官錢委官就軍置場措置循環収糴米斛出糶應偹細民食用約束遊手不許脅持良民契勘今嵗旱傷委官下鄉檢踏成熟田段外有旱田人户一面犁翻種麥量畱根查聴候别有官前來檢収切慮逰手脅持之人見人户旱田已經犁翻耕種妄作鄉村虛聲首熟欺詐乞覓使善良人户不敢犁翻以至種麥失時不能安業今仰人户知悉若實有旱田即依條量畱根查以備檢放一面犁翻種麥免致失時如有似此脅持妄稱陳訴欺詐之人仰被擾人户經官陳理切待追取送獄根勘斷罪施行援例乞撥錢米照對本軍今嵗旱傷細民闕食已行下星子都昌建昌縣委官抄劄合賑糶賑濟户口人數申軍及照得乾道七年旱傷係蒙提舉常平使司支撥到池州太平州蕪湖繁昌等縣常平米五萬碩差官管押前來本軍分撥下三縣賑糶賑濟遂具申常平提舉使司乞支撥米斛差官管押前來本軍賑糶賑濟續蒙提舉使司支撥信州貴溪縣常平米五千碩差人前去搬取及支撥池州常平錢五千貫省付軍収糴米斛賑糶再諭人户種二麥使軍累行勸諭人戸耕種二麥盖為今年荒旱不比常年須是併力加工救濟性命今訪聞多有未施工處顯是頑慢已帖檢旱官并行催趣將頑慢惰農之人量行决罰先此曉諭各仰知悉行下三縣抄劄賑糶人戸照對近委官抄劄三縣管下賑糶人戸姓名大小口數申軍尋將己申到帳拖照得合賑糶人戸並不見聲説見住地名去處恐有漏落増添情弊難以稽考合行下逐縣將逐都塌畫地圖畫出山川水陸路徑人戸住止去處數内不合賑糶人户用紅筆圈欄合賑糶人户用青筆圈欄合賑濟人户黄筆圈欄逐一仔細填寫姓名大小口數令本都保正長等叅考指實繳申切待差官㸃摘管實行下三縣置場照對見委官抄劄三縣賑糶賑濟人戸大小口數畫圖結申務要實惠及民無致妄冒所有置場去處委官酌量地里逺近分定置場去處各縣水陸地里若干其勸諭到上户賑糶米斛亦合撥隸近便赴場去處以慿施行續據三縣申置場共三十五處星子縣置場七處都昌縣置場十一處建昌縣置場一十七處約束許下户就上户借貸契勘今嵗旱傷非常得熟處少本軍已節次行下三縣散榜曉諭人户趂此土脉未乾并力耕墾廣種二麥接濟將來食用如有惰農耕種失時之人即請照已行榜示行遣其貧乏無種粮之家請諭上戸借貸如要官司文歴即印給令上戸収執遇有下户借貸麥種粮食即令就歴批領將來還足對行勾銷如有不還官為理索再諭上户䘏下户借貸契勘今年荒旱非常得熟處少本軍多方救䘏務使人户不至飢餓流移及行勸諭人户多種二麥接濟喫用非不叮嚀當職近因出郊相視陂塘見得麥田多有未施工處盖緣人户打糓未了亦是官司勸諭未至其得熟處不闕種粮可以佈種然其人既無飢餓之憂便乃懶惰其荒旱處合更勤苦又以難得粮種遂致因循今仰人户速將所収禾穀日下打持趂此土脉未乾并力耕墾其髙田堪種麥處即仰一面種麥其水田不堪種麥處亦仰趂早耕翻多着遍數務要均熟庶得乆逺耐旱宜禾其得熟人户當念幸得収成常生慚愧不可便致惰怠趂此餘力多種二麥將來可以博得他處物貨其遭旱人户當念既遭此難尤當勤力多種食物方可養贍老小不致飢餓流移其下户無種粮者上户當興憫惻之心廣加借貸目今施惠既可以結鄰里之驩將來収成亦自不失収息之利庶㡬過此荒年各保安業今恐前來勸諭未眀再此榜示仰人户知悉革住米船隠瞒情弊契勘賑糶場収糴米斛如遇米船到岸内過税船隻収糴三分住糶米船止糴一分其住糶米船法格並與免収税錢外訪聞客旅多生奸猾動是數隻到岸於内却將一兩隻作住糶結計在市米牙人令其虚解牙錢稱就市糶訖却將在船住糶米斛夤夜搬往過税船内隠瞞官司合行出榜約束行下場所革住米船隠瞞照得賑糶場近緣住糶米船客人結計牙人虚解牙錢夤夜搬傳米斛往過税米船之内隠瞞官司有此欺弊遂出榜河岸約束今來尚慮住糶客人雖依曉示在市出糶切慮闗防不盡合行下本場自今後遇有住糶米船即令城下税務看驗具數闗報賑糶場本場權住出糶令客人搬米赴場從本場差人監用本場升斗自行出糶接濟細民日報糶過米數糶足為給闗子放行庶㡬杜絶隠瞞官司之弊申提舉司將常平米出糶契勘本軍今嵗旱傷細民闕食遂行下三縣抄劄到合賑糶賑濟户口人數已行措置賑糶賑濟所有本軍城下常平倉見樁管在倉米八千八百九十三碩二㪷六升五合二勺除今年八月内盤量欠折米一千六十碩三㪷二升四合外實管見在米七千八百三十二碩九㪷四升四合八勺係是乾道八年以後逐年収糴到數目價錢不一其米今年在厫内有結冒陳損兼照今年七月内管属建昌縣闕少米斛出糶所支撥義倉米估價應接民間食用每升計價錢一十文足已具収報提舉使衙照㑹去訖所是見管和糴米本軍今追到牙人沈先等供具其米經年陳損與受納到人户義倉米陳損色様一同依市價每一升估計價錢一十文足本軍照得上件米係是當來委官和糴到數目切慮虧損元價未敢擅便出糶具狀申提舉使衙照㑹依目今所估價直賑糶應接民間食用庶㡬飢民不致流移行下置場不許畱滯客旅契勘本軍今嵗旱傷細民闕食雖移文江西州縣通放到客米舟船又慮牙鋪解落及市民日糴數少阻滯客旅不便遂行委官置場支撥官錢依市價兩平交量収糴客米以備賑糶應接細民食用今訪聞得本場每遇客米到場中糶更不即時交量及至交量又不即時支還價錢切慮合干人因而作弊畱滯乞覓錢物合行約束限當日交量即時當官支結價錢如違將犯人勘斷行下兩縣委官捉人户糶米減尅契勘管下今嵗旱傷細民闕食使軍遂措置支撥官錢差人前往外州縣収糴到米分撥兩縣出糶訪聞合干人將人户所糴米並不依實支量公然作弊減尅今委逐縣知縣縣尉每日不測捉人户所糴米三兩户當官覆量如有少數即根究解人赴軍申諸司乞行下江西不許遏糴契勘本軍并管屬諸縣今嵗旱傷最甚細民闕食及無米支遣軍粮遂多方借兊官錢差撥公吏前去江西得熟處州縣収糴米數回軍賑糶支遣及檢凖淳熙令災傷官司不得禁止搬販及近降指揮州縣不許閉糴如有遏糴州軍許鄰州越訴及凖今年八月十九日聖旨節文江東安撫使陳少保奏今嵗災傷先合措置通放米斛州縣有遏糴去處許行越訴本軍遂節次備坐移文隆興府照會収糴去後已承回報行下諸縣許令本軍所差人収糴米穀放行今却據差去公吏吕棋狀申在本軍建昌縣管下二陂山田等處四散収糴靖安新建縣鄉人米斛欲装上船覩奉新縣尉司弓手五十餘人各持鎗棒沿江巡綽不容装發米斛又被奉新縣差人越界釘斷建昌縣管下三陂潭徳爻口陂水把截不放船隻上下往來巳申建昌縣差保正隅官防䕶所糴米船今於十月二十四日被奉新縣差弓級徐成等部領弓手保正等於要路把截不容鄉人搬糴米穀申乞施行本軍今照差去公吏吕棋係在本軍建昌縣界収糴靖安新建縣管下米穀其奉新縣官吏公然違戾見行條法及不遵今年八月十九日專降聖旨指揮輙差弓手持鎗棒㳂河巡綽不容収糴又差人越界前來建昌縣管下三陂把截釘斷水口不惟本軍所糴米穀百端攔遏不行通放有悞賑糶支遣至於客販米穀舟船亦不得往來公私利害至重移文隆興府并江西轉運司照詳前項條法指揮請將奉新官吏按劾仍通放米船并申諸司行下隆興府通放本軍所糴米船并申御史臺乞依近降指揮彈奏施行晦庵别集卷六欽定四庫全書晦庵别集卷七宋朱子撰公移申倉部及運司檢放三縣苗米數本軍照對管屬星子都昌建昌三縣自六月以來天色亢陽闕少雨澤田禾乾枯本軍恭依御筆處分嚴禁屠宰精意祈禳及行下諸縣精加祈禳去後續據星子都建昌三縣申依應遍詣寺觀神祠及諸潭洞建壇祭祀請水精加祈禱雨澤並無感應今來諸鄉早禾多有乾損及備據税户陳徳祥等披訴所布田禾緣雨水失時早禾多有乾槁不通収刈申乞委官檢視除放苗米本軍除已依條行下諸縣令人戸供投土段文帳差官檢視及於七月十六日具錄奏聞并申朝省及諸監司照㑹施行遂選差委迪功郎司户參軍毛大年前去星子縣及委迪功郎星子縣主簿李如晦前去都昌縣及委從政郎司法參軍陳祖永前去建昌縣同逐縣知縣躬親詣旱傷田段地頭逐一對帳檢視續據所委官具到已檢放過人户災傷田段共放過米三萬七千四百五十碩一㪷二升三合一勺申軍本軍今照星子都昌建昌三縣淳熙七年分管催人戸苗米四萬六千五百一十九碩六㪷五升四合五勺四抄七撮數内除豁所委官檢放過米共三萬七千四百五十碩一㪷二升三合一勺統均計放八分以上外實催米九千六十九碩五㪷三升一合四勺四抄七撮本軍已具奏聞乞存畱上件米支遣官兵外今開具諸縣檢放實催米數下項合具狀供申行在尚書倉部及申轉運司使衙照㑹星子縣管催米六千五百三十石七斗三升二合六勺已委司户毛迪功同知縣王文林下鄉檢視檢放米五千三百六十八石七斗二合一勺檢放計八分一釐二毫先放五斗以下四百石三升二合七勺所委官檢踏放四千九百六十八石六斗九合四勺實催米一千一百六十二石六斗六升五勺都昌縣管催米一萬九千七百七十五石五升一合四勺八抄七撮已委星子縣主簿李迪功同權縣孫迪功下鄉檢視檢放米一萬六千八十四石二斗七升一合放八分一釐三毫四系先放五斗以下一千八百六十四石八斗七升七合所委官檢踏放一萬四千二百一十九石三斗九升四合實催米三千六百九十石七斗八升四勺八抄七撮建昌縣管催米二萬二百一十三石八斗七升四勺六抄已委司法陳從政同知縣林宣教下鄉檢視檢放米一萬五千九百九十七石七斗八升放七分九釐一毫五系先放五斗以下米五百四十一石六斗七升所委官檢踏放一萬五千四百五十六石一斗一升實催米四千二百一十六石九升四勺四抄糶場印式入門訖監押交錢訖監押支米訖監押不到監押係糴米人不到於簿歴上用此印交錢若干訖監押依數支米訖監押號式用青絹印某場監官隨行人吏某人斗子某人入門使押夾截糶場交錢