處户口多寡分撥付逐場出糶務要均平切慮其間上户抵拒官司不即依從分撥即仰具姓名申軍行下米場人户不到者於總簿用印照對今嵗本軍管属旱傷已行闗防約束行下三縣自來年正月為頭賑糶賑濟去訖所有賑糶米日分人戸赴場糴米不及仰監糴官即時用不到印子於總簿姓名下印訖為照合行仍闗報逐塲行下米場具糶過米式照對本軍管属今嵗旱傷已據星子都建昌縣勸諭到上户承認賑糶米穀數目申軍使司亦已措置闗防置場差官下縣監轄自今年正月為頭賑糶賑濟去訖所有各縣合五日一次遇糶米日分具糶過米數文帳二本申縣本縣繳連一本申軍今立式下項某處賑糶場今具某月某日糶過米數下項一本場本日合糴人户計若干共糴米若干大人若干合糴若干小兒若干合糴若干一本日實到糴米人戸若干共糴過上户某人米若干如是糶官米即説官米大人若干糴過米若干小兒若干糴過米若干一比合糴米數不到人户若干少糴米若干大人若干合糴米若干小兒若干合糴米若干右謹具申聞淳熙八年正月初二日施行場所未盡抄劄户照對本軍管屬星子都昌建昌縣旱傷已行下各縣委官抄劄到闕食户口人數自今年正月為頭賑糶賑濟近據人户前來投陳係漏落抄劄不盡本軍未見着實難便施行今出榜賑糶濟場曉示如有不濟户當來漏落未曽抄劄即仰具狀經本場巡察官陳理從本官見着實如委係闕食即仰一面賑糶具姓名保眀申軍其間或有税産得過人戸以乞賑濟為名意在避免賦役輙敢妄冒煩紊官司罪當追治措置行下各場闗防上户用濕惡糙米照對本軍旱傷已行下三縣勸諭管下上户承認米穀賑糶軍司已行措置闗防約束置場差官下縣監轄賑糶外切慮其間有上户却將濕惡麄糙米穀赴場出糶有悞民間食用合行下三縣如有上户津般到濕惡麄糙穀米即仰退回令上戸津般堪好米穀出糶不得容令作弊并印榜曉示續置歴下場五日一次開具糶過米照對本軍管属旱傷細民闕食已行下三縣勸諭到上户承認賑糶米穀數目申軍使司已闗防措置約束事件置場給歴下縣付人户差官監轄自今年正月為頭每五日一次賑糶切慮其間尚有人户不能措辦五日錢一頓収糴合續添賑糶歴一本立式行下三縣闗報逐場如有人户願日赴場収糴米斛者即仰賫元立歴頭赴巡察官粘連印押付人戸逐日収糴其有人户願依前五日一次赴場収糴者即仰依已行事件施行仍五日一次開具糶過米穀文帳供申行下普作賑濟兩日契勘本軍管属旱傷尤甚細民闕食已行下三縣抄劄到闕食户口人數申軍及勸諭到上户張世亨等四名依格承認賑濟米共一萬九千石及依條取撥常平義倉米自淳熙八年正月以後縁管属寒雪本軍行下属縣將賑糶人户一例賑濟兩日正月八日帖都建昌縣再諭上户借貸米穀事契勘本軍管属去嵗旱傷已行下星子等三縣勸諭上户以所収米榖賑糶除認數外有餘剰米穀并不係勸諭賑糶米穀人家遞年多是春間將米穀等先放下户秋冬隨例収息今來上户以旱傷之故慮恐下戸將來負欠不還官司不為受理仍以官司勸諭為詞不肯放使下户用乏失業不便使司今凖淳熙四年十二月初三日指揮節文諸人戸賖糶米令欠户還米本外每斗収息五升其先放約秋成計本息還錢亦合一體施行如有拖欠不還官為理索所貴兩無虧損合行下三縣散榜勸諭約束施行再委官體訪場所合干人減尅等事契勘本軍管下去嵗旱傷已行下三縣勸諭到上户賑糶米穀使司遂措置委官下縣分場監轄賑糶濟及帖縣官分定地頭巡察去訖切慮各縣逐場監糶濟官容縱合干等人減尅升㪷及容上户將砂土碎截濕惡空殻米穀赴場中糶濟及巡察官不即前去巡察事属不便就委官前去體訪如有似此違戾去處即具狀供申申監司為賑糶場利害事件契勘本軍并管属諸縣去嵗旱傷至甚細民闕食切慮人户逃移失業遂多方勸諭上户賑糶米穀并將見管常平米數行下分定置場去處官吏監轄糶濟應接細民食用今有下項利害事件合申諸監司除本軍勸諭上户樁管米數并於外州和糴及常平米糶濟應接管内細民食用外近來續據人户陳訴當來抄劄漏落姓名及隣路州軍流民前來逐食又不免行下管属多方存䘏相度賑濟所費米斛比之元來計度數目大改増添而向去小熟日子尚逺切慮所樁米穀不能周給無可接續糶濟却致民間缺食事属不便乞即撥米二三萬石應副接續糶濟如蒙允許即乞早賜行下取撥去處以慿差撥人船前去搬取本軍昨凖淳熙七年九月十三日敕中書門下省檢㑹昨凖乾道七年八月一日指揮立定勸諭上戸賑糶濟格目給降付身補授名目内無官人一千五百石補進義}
