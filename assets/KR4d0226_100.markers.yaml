  - {type: variant, offset: 12024, length: 0, content: '', WYG: 尉願補不理選限將仕郎者聴二千石補進武校尉如係進士免文解一次不係進士候到部與免短使一次四千石補承信郎如係進士與補上州文學五千石補承節郎如係進士補迪功郎如是賑糶依此減半推賞又凖淳熙七年十月八日指揮節文賑糶米於市價減半錢數即照已降指揮推賞本軍即已備坐行下管属勸諭只據上户張世亨張邦獻劉師輿黄澄四名承認依格賑濟本軍已行具奏及申諸監司照㑹賑糶一事至今尚未有申到承認應格之人盖緣本軍地瘠民貧除上項四家賑濟之外未有出得上件米穀減半出糶之人是到所認米穀數目不多有闕賑糶欲乞詳酌所申特賜敷奏乞將上户承認賑糶米價止令量減四分之一便與依格推賞却於所得官資比折錢數量展磨勘之類早賜行下勸諭増認庶使上户樂於就賞細民不致闕食今照管屬近來不住有外州縣飢民流移入界本軍已行下諸縣存䘏及委自當職官勸諭上户収充佃客借與空閒屋宇許令請佃係官田土給與種糧趂春開耕如向去豐熟外州縣税户前來識認官司不得受理如今來所招佃客將來􅇆私搬走囘鄉即許元贍養税户經所属陳理官為差人前去追取押囘斷罪交還及散榜鄉村遍行曉示外欲乞詳酌更申朝省眀降指揮行下庶㡬州縣有所遵守不惟安集流民免致失所亦使開闢曠土供納税賦實為利便申提舉司借米付人户築陂塘照對管屬星子等三縣去嵗旱傷尤甚緣田段多是髙仰見管陂塘多是穿漏是致旱死不住據管属星子都昌建昌人戸經官陳乞借口粮修築陂塘本軍行下逐縣委自知縣躬親前去管下逐一驗視所管陂塘如有穿漏及開掘即仰一面計度合用工數供報提舉司乞支撥米斛已蒙提舉衙囘牒指揮支撥保借常平司六百五十四石施行闕食未盡抄劄人等事照對本軍管下三縣諸鄉保正當來受情不行依公抄劄闕食人户多將得過隠實之人抄作闕食其實是闕食人戸却不抄劄未欲便行追究合行約束仰隅官保正照應本縣巡察官所行事理須管從實隨門冄行審實抄劄闕食人户若保正依前減裂不即同隅官抄劄及將元冒濫人盖庇或在鄉乞覓人户分文錢物仰隅官具狀陳訴切待追究重作施行有當來不應抄劄隠實有營運物業之家及上户自能贍給地客見執使軍歴頭之人仰隅官保正追収繳納若顔情盖庇不即追納别致人户陳訴或覺察得知必定重作行遣有委是闕食人户隅官保正不為抄劄或保正等乞覓搔擾仰被擾人戸不拘早晚赴本軍陳告切待重作行遣有得過人户妄稱闕食陳乞給歴紊煩官司之人定當追収赴軍重斷有合追収元給文歴人户輙敢倚恃猾健訟把持不伏追収仰隅官保正具狀陳訴切待重作行遣仰属縣逐鄉隅官保正從實再行審實抄劄到闕食人户切待委官躬親下鄉隨門審實如再有不實仍前泛濫去處必定追収犯人赴軍定送獄根勘情弊施行審實糶濟約束照對已行帖逐縣審實糶濟事件切慮各鄉隅官保正不依所行約束别致引惹詞訴事屬不便合帖屬縣再行約束開具供申各鄉有營運店業興盛之家其元給歴頭合行追取若雖有些小店業買賣微細不能贍給巳請歴頭不合追囘如有似此未係抄劄之人亦請令隅官保正從實根括施行毋致泛濫各鄉上户地客如主家自能贍給其元給歴頭合行追収如主家見自闕食不能贍給雖是地客亦合給歴如有似此之人即請隅官保正從實根括毋致泛濫各鄉人户如將戸名及第行重賫請去歴頭合行追回如是只用第行雖不用户名實非重疊其已請歴不合追取人户已請歴頭如有虚増口數今來覈實合行減退即請於歴頭并總簿内分眀改正縣市一上等有店業日逐買賣營運興盛及自有税産贍給不合請給歴頭人户若干開具坊巷逐户姓名大小口數一中等得過之家并公人等合赴縣倉糴米人若干開具坊巷逐户姓名大小口數一下等貧乏小經紀人及雖有些小店業買賣不多并極貧秀才合請歴頭人户若干開具坊巷逐戸姓名大小口數施行權免和糴令客米從便往來本軍旱傷遂支撥官錢委官在軍置場和糴客人米斛循環糶糴應接民間食用及本軍勸諭到上户承認糶米斛并差公吏前去収糴到米斛樁管賑糶濟不闕所有元置和糴賑糶場合權行住糴客人米斛及出榜曉示從便上下出糶免糶客米三分照對本軍去嵗旱傷細民闕食遂行措置場和糴客旅米斛三分應接食用今來賑糶濟米數不闕已行住糴合行散榜上流州軍客旅通知旅行許令人户借貸官司米穀充種子佈種照對管下三縣去嵗旱傷至重本軍已行措置賑糶賑濟近來節次據人户經軍陳狀因旱傷目今佈種是時闕少種粮乞行借貸常平米斛佈田軍司已行下各縣相度依條施行去訖未據申到今檢凖常平免役令諸災傷計一縣板税七分以上第四等以下户乏種食者雖舊有欠閣不以月分聴結保貸借米穀不堪充種子紐直以錢各二貫石給限半年隨税納仍免息利豫以應支數保眀申提舉司行訖申尚書户部雖計一縣放税不及七分而本户税及七分者凖此今來除星子知縣一面究實相度依條借貸外所有都建昌縣合委官同各縣知佐相度究見管下第四等以下户委實闕乏之人各令結保依條施行不係賑濟人一例賑濟契勘去嵗旱傷細民闕食使軍已行勸諭到上户承認糶濟米穀及有上户自能贍給佃地客户口外使軍已印牌厯付闕食人赴場賑糶濟除將見有牌歴合糶濟人户普行賑濟外其上户贍給地佃等日前除豁不係賑糶之人亦行抄劄一例賑濟一十三日自三月十一日為頭將張世亨等所認米及取撥常平米普行賑濟務要實惠行下各縣抄劄户口并立支米穀正數契勘所支賑糶米縁三縣各鄉間有數户抄劄口數太多恐未盡實合委官與縣官評議豫將所支米穀立定正數賑濟施行二十口以上每户支穀止於五石二十口以下十五口以上每户支穀止於四石二十五口以下計口計日支給如管穀四石以上所支亦止於四石都昌縣搬張劉二家米等事照對都昌縣止勸諭到黄澄一名承認賑濟米五千石凑所管義倉米會計賑濟不周本軍遂行下建昌縣於張世亨劉師輿賑濟米内取撥四千石付都昌縣賑濟其合用僱舟水脚錢每石支錢三十五文省并每石支搬脚錢四十文足今張劉二家差人搬擔就官請領僱錢並經都昌縣所管常平米錢内支破諸縣得米人户依時佈種等事使軍近行下諸縣但係元給牌歴賑糶賑濟民戸並以勸諭到張世亨黄澄劉將仕米及義倉米並行賑濟半月仰得米人户併力及時耕種田土如合干人減尅不行盡實給數即仰人户徑赴使軍陳訴切待根究重作施行行下各場普濟半月外照約束接續照對本軍近將勸諭到上户黄澄張世亨等賑濟米斛自今年三月一日為頭普行賑濟通作一十五日今來相次了畢所有元勸諭到上户承認賑糶米斛合行依使軍先來約束接續賑糶應接細民食用委官覈實四户賑濟米數縣官保眀事照對去嵗旱傷細民闕食勸諭到都昌建昌縣上户張世亨等四名共賑濟米一萬九千石本軍遂行措置相度地里逺近分作三十五場委官監轄賑濟及委官巡察近凖尚書省劄子檢㑹淳熈八年正月二十三日勅中書門下省勘㑹兩浙江東西湖北淮西州軍去年間有旱傷去處檢坐乾道七年内立定勸諭富室上户賑濟賑糶米斛賞格已降指揮行下逐路施行近來逐路州軍雖有開具已勸諭到賑濟賑糶數目緣無逐司保眀是致推賞未得切慮因而滯畱未稱勸賞之意正月二十三日三省同奉聖旨令逐路安撫轉運提舉司各行下所部州縣將願出穀賑濟賑糶之家如有見得數目應格合行推賞即日下縣結罪保眀申州州結罪保眀申逐司仍仰逐司疾速連銜保眀申尚書省不得少有稽滯今有張世亨等所認賑濟米斛已行普濟管下闕食人戸相次了畢未見逐縣知縣結罪保眀申軍施行今帖委司法前去建昌都昌縣覈實的確賑濟米穀數目結罪保眀供申切待再行稽考施行移文江西通放客米及本軍糴米船事契堪本軍管属去嵗旱傷細民闕食及無軍粮支遣本軍節次借撥官錢五萬三百四十四貫三百七十九文差撥公吏前去江西得熟州軍収糴到米共二萬三千五百二石二斗四升五合回軍賑糴及支遣軍粮并檢凖淳熙令諸米穀遇災傷官司不得禁止搬取及近降指揮州縣不許閉糴如有遏糴州軍許隣州越訴又凖今年八月十九日聖旨指揮節文江東安撫使陳少保奏今嵗災傷先合措置通放米斛州縣遏糴去處許人户經本司越訴遂移文江西轉運司安撫司并奉新縣等通放米船回軍賑糴支遣軍粮施行節次差公吏収糴并撥錢下賑糴場軍資庫錢共二萬一千三百六十二貫八百九十六文四千貫文省差劉京手分盧文彬管押於去年七月十六日前去隆興府管下常池市収糴到米二千三百一十六石九斗六升於八月二十一日到建昌縣交卸賑糶四千貫文省差衙前楊發手分朱涭於去年七月十八日前去隆興府管下進賢縣収糴到米一千九百二十一石八斗一升并穀一百五十八石五斗至十月初九日回軍城下省倉交量米七百九十石都昌縣交量米八百二十一石三斗一升星子縣交量米三百一十石五斗穀一百五十八石五斗一百七十一貫二百文省揍依折帛錢共四千貫差衙前吕祺手分熊瑜管押於去年七月二十九日管押前去収糴二千貫省差衙前吕棋往隆興府管下奉新縣収糴到米七百四十九石六斗於三月十一日回軍九千八十二貫一百一十九文省於去年八月二十五日已後節次支付在賑糴場収糴米係在後項聲説正支錢二千七百一十二貫文轉支収到公吏糴米剰到錢共六千二百七十貫一百一十九文四百八十貫七十七文省係轉支糴米回納錢付楊發収糴其米在後項聲説一千貫文省支付米彦俊糴米其米在後項聲説一千六百二十九貫五百文省揍折帛錢共四千貫付衙前謝安道職級髙宗選管押於去年七月二十九日往下項去處収糴共一千八百二十六石一升五合於十一月初八日回軍隆興府奉新縣糴到米一千一百六十九石五斗六升五合淮南蘄州糴到米六百五十六石四斗五升折帛錢共二萬八千九貫二百一十文省係淳熙五年六年錢一千三百七十貫五百文省係六年分支付謝安道髙宗選収糴米其共糴到米已在前項聲説二千八百二十八貫八百文省係六年分錢付吕祺熊瑜収糴米其米已在前項聲説四千八百八十九貫九百一十文省付在軍賑糴場収糴米係在後項聲説五千貫係七年分錢差衙前孫燾職級江彦和管押於十一月二十五日往隆興府拏湖収糴到米二千二百九十七石一斗六升於今年正月二十三日回軍五千貫文省差職級朱彦俊管押揍前項共六千貫文省於十一月二十三日往江西吉州収糴共二千八百五十石於今年三月二十九日回軍差撥乳香度牒糯米本錢共八千八百九十二貫二百七十三文省闕四千貫差衙前王邦翰手分蔣安禮管押於八月十五日往隆興府管下常湖収糴米一千九百三十二石八斗九升至十一月二十四日回軍四千四百二十九貫二百七十三文省揍作前項錢共四千九百九貫三百五十文省管押於十二月初一日往隆興府奉新縣収糴二千三百闕奏乞推賞賑濟上户照㑹本軍去嵗旱傷至重細民闕食撥到常平米斛數目不多隨行勸諭到管属上户承認米數本軍恭稟行下管属再行勸諭如願將米賑濟切依所降指揮格法推賞去後今勸諭到元認賑糴米税户張世亨劉師輿進士張邦獻黄澄四名遵法賑濟内建昌縣税户張世亨五千石乞補承節郎進士張邦獻五千石乞補迪功郎税户劉師輿四千石乞補承信郎并都昌縣待補太學生黄澄五千石乞補迪功郎及差官監轄賑濟已於去年十二月二十八日先具奏聞及申本路諸監司照㑹去訖續據管屬星子都昌建昌三縣共抄劄闕食饑民二萬九千五百七十八户數内大人一十三萬七千六百七口小兒九萬二百七十六口本軍各仰給歴頭牌面置簿歴發送逐縣當職官給散付人戸預於縣市及諸鄉均定去處共置三十五場分見見任寄居指使添差監押酒税監廟等大小使臣共三十五員監轄賑糶賑濟及委縣官分場巡察嚴戢減尅乞覓之弊自淳熙八年正月初一日為始今抄劄到闕食人戸赴場賑糶其鰥寡孤獨之人即以常平米斛依法賑濟至正月内又緣雪寒行下屬縣將元係賑糶饑民用上件張世亨黄澄等及常平義倉米一例賑濟兩日至三月内又慮饑民難得錢収糴米斛再自十一日為頭行下諸縣將已給歴賑糶饑民一例普行賑濟一十三日通作半月又照約都昌縣止有黄澄一名承認賑濟五千石凑所管義倉米㑹計賑濟不周本軍遂於建昌縣張世亨等賑濟米内撥米四千石本軍措置官錢和雇夫脚舟船裝發送都昌縣交管分於場置去處責令監轄賑濟至閏三月十五日終節次據都昌縣建昌縣申到張世亨張邦獻劉師輿黄澄賑濟過米撮等共計一萬九千石星子縣元無勸諭到上户賑濟米斛即以常平義倉米斛依例普行賑濟外本軍節次行下都昌建昌知縣逐旋審究的實賑濟過張世亨黄澄等米數保眀申軍去後據迪功郎監城下酒税權都昌縣事孫僑通直郎知建昌縣事林叔坦狀保眀到張世亨張邦獻劉師輿黄澄賑濟過米一萬九千石委是節次賑濟饑民食用之數並無冒濫本軍一面委差從政郎本軍司法叅軍陳祖永前去都建昌縣覈實得張世亨張邦獻劉師輿黄澄賑濟米一萬九千石委是賑濟過的實之數本軍再行稽考别無冒濫保眀是實本軍勘㑹得張世亨劉師輿各係税户張邦獻係應舉習詩賦終場士人并黄澄係於淳熙四年秋試應舉習詩賦取中待補太學生第十五名是實其張世亨張邦獻劉師輿黄澄賑濟過米數各應得近降指揮賞格數内税户張世亨賑濟過米五千石合補承節郎税户劉師輿賑濟過米四千石合補承信郎進士張邦獻賑濟過米五千石合補迪功郎待補太學生黄澄賑濟過米五千石合補迪功郎除巳具申本路安撫司轉運司提舉司提刑司照㑹依條保奏推賞外欲望聖慈下所屬給降合得付身發下以慿給付張世亨等祗受謹錄奏聞晦庵别集卷七}
