  - {type: variant, offset: 12016, length: 0, content: '', WYG: 未到今只有星子老令相與同憂更無分毫好况也然諸司已有不相容者旦夕或以劾去不可知但自不敢求耳二書并碑却告因便示及索詩當時做得數語後來多事今已忘之矣白鹿春卿必能言曲折田已撥得些小然亦非久計要之此等興廢有時若無人主張讀書即有田亦無益耳諸刻今附去一角雲谷大隠兩處如何得馬道士書云已開堂基招得一道人在彼計須量與口食告就雲谷支也細㸔啓䝉已不必改只如前日所説改定一句足矣通書樂上章萬物咸若下添觧三綱名件想已有矣又欲扵齊肅之意下添故希簡而寂寥耳刑章十二當作十一以象再閏欲添五歳之象掛一一也揲左二也扐左三也揲右四也扐右五也只作注字亦得易圖甚精但發例中恐不能盡述當畧提破而藉圖以傳耳陳法大畧亦可見當如近日所説但未能洞曉其曲折耳樂圖煩更問子本此只有十二様而調名之多何耶琴説亦告尋便示及千萬因山之日已迫而未有定議有詔集議尋復中輟昨日不免入状議之未知如何也大學後来道中又改齊家治國章兩處不知曾為刋否前日所論非欲求容正為當靈者不靈恐造物者亦将無以為造物耳然此事如此似已多時戰國只孟子是理㑹得底餘人如醉如夢也北方之傳果爾趙已罷去葢新用李兼濟為諫官一章便行未知誰代其任此可深慮某辭免未允而趙已見諸令復如此更當費力耳相知者且如此况新来者情意不通未必以為事也某昨日冒雨登龍湖幸無它但路滑狼狽耳書堂高敞逺勝雲谷武夷亦多容得人他時儘可相聚也求放之説其妙無窮湏實用功乃見之耳養正来辱書乃聞閣中之疾未已未能此来殊以悵惘某此無它但為通鑑課程所迫無復優游濳玩之功甚思講論耳已㸔到後漢章帝處只三四日當畢向後工夫却不多矣不免且那工夫了却易説未能審思不知能中理否南軒已過上饒得書書中一紙上呈幸為訂之并昨所説甞論著者携以見示幸甚幸甚遺文上納二録已領昨伯崇借遺書三册寄還乃不知分付何人至今根究未得極以為撓葢此本最精比老兄本後来又正了數字也伯諌書中説託料理孟子集觧今納去舊本兩册更拾遺外書記善録龜山上蔡録游氏妙㫖庭聞藁録五臣觧取范吕二説各自抄出每空一行未要寫經文且以細書起止寫之俟畢集却剪下粘聚也每章只作一段章内諸説只依次序列之不必重出經文矣兩匠在此畧刋得數行矣字畫頗可觀未可印未得寄去也但此間獨力深恐校讐不精為後日之累耳向来見它人刋書重扵改補今乃知其非所樂大抵非身處之則利害不及而心乃公耳前書所喻公濟論難反復之語不謂其所見乃如此初欲歸塗過之今日已迫矣恐未能但恐終亦難話也金聲玉振之説皆未盡數日客冗撥忙次得數語如此今以上呈可否俟報某来晚定歸亦帶過呈伯諌也孟子觧㸔得兩篇改易數處頗有功但塗抹難㸔無人寫得一草本大家商量為佳倉司程書已了有本在此俟来日觀之也濟之同且在天然果如何耶禮記納去歸来未暇子細再㸔恐可抄出逐段空行剪開以類相從葢所取之類不一故也四十九篇昨来分成七類曲禮冠義王制禮運大學經觧䘮大記試用推排喻及以參得失如何大學亦修成一書適詳畧之中細㸔舊本乃大有不滿意處又當修改也欲買淳熙編類一本煩為問不知直㡬何便批報當遣人齎錢去取臨老旋學做官甚可笑也或有可取處得便令此人取帶歸却納錢去還之尤便耳中庸首章更欲改數處第二版恐須換却第二版却只刋補亦可然想亦只是此處如此後来未必皆然也且催令補了此數版并詩傳示及也来日取得来教却别上狀中庸所改皆是切要處前日却慢㸔了所以切已工夫多不得力甚恨其覺之晚也大學亦儘有整頓處亂道誤人可懼可懼東行有日幸早見過為两夕之留也北風未聞想只是虛聲或是其境内自擾擾耳所議可善處之毋至過甚為佳遽忘其怒而觀理之是非此前賢大公順應之要法也數日相聚頗覺兼善有怠緩駁雜之病而季通責善傷扵急迫又雜以嘲玩似非以文會友之道臨行匆匆忘説願各矯所偏以副所望幸甚幸甚子仁留此數日稍欵已勸令不如且讀書理會義理無為苦用力扵文字間也太極説修定削去後語只作一統論意似亦無不盡也西銘説在後煩為細㸔携過見喻伯諌書所説工夫甚善但所以見推者過當使人慚怍不知所措耳時學波蕩至此雖細故亦可驚嘆奈何奈何克已贊所疑不知云何因便見示自覺浸有寛平氣象甚善甚善涵泳不已意味當益深長耳二友講論不廢然未值大節目也盡心説録呈并呈兼善叅詳有未當處却以見喻且勿令齋中諸生傳寫也前日所寄諸説有便并望反復公濟伯諌得書否某歸塗過伯諌見收公濟書大段手忙脚亂也大學誠意之説以再觀之果如所論想它書似此處多須一一整頓也通鑑節只名綱目取舉一綱衆目張之義條例亦已定矣三國竟須以蜀漢為正統方得心安耳適已奉狀尋大學章句詳本不見不知在書府否如在告帶来參同契并携来㸔也有歸蔵否有即借来校此間所蔵者似恐只是偽書也前日匆匆忘記面扣大子樂是後漢樂名本史志必有之王朴之云亦是以一為正以一為變但當時未知變律之説故以其半為清耳要之終不是也来書且留箧中以俟面質日邊人尚未還未知行止之決所示卦象恐當以復卦為主則楊庭孚號更不着矣有攸往夙吉而今不可以夙則有復而已恐終當用此占也祠堂記及韜仲書付去人更一書與劉公度託渠寫彼中相去不逺也克已課程只是語録中説常有簿子記言動之得失者是也惺惺語亦是其特敬法耳季通無事更能一来否㳺誠之得書方自武昌趨長沙矣分韻詩當時做不成今已忘記若能再來當為補亡也法噐都未見都昌一二士人好資質然亦無意於此盖是蕭果卿親戚念得蘇文熟了壊了見識也可惜可惜都昌黄氏向來見喻减價糶米人甚賴之今出榖萬斛賑糶已牒請與}
