  - {type: variant, offset: 10725, length: 0, content: '', WYG: 州軍事贈直龍圖閣孟公諱彦卿通判州事贈直龍圖閣趙公諱民彦將官贈武節大夫劉公諱玠兵官贈右監門衛將軍趙公諱津之皆以紹興初年金人侵犯或提兵出戰或率衆守城狥國捐軀忠節顯著本州從來只於南嶽行宫設位祭享祠象不立無以慰答忠䰟表勸節義今凖前項赦書合於城隍廟别置一堂塑像奉安永逺崇奉其譙王長史虞理司馬虞望參軍韓階主簿周﨑鄧騫並是當時協謀起義之人亦各合行塑像配神從食牒州委官討論計度塑造一凖紹熈五年七月七日赦書一項五岳四瀆名山大川歴代帝王忠臣烈士載於祀典者委所在長吏精潔致祭近祠廟處並禁樵牧如祠廟損壊令本州支係省}
