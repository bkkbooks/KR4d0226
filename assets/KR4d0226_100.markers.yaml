  - {type: variant, offset: 12018, length: 0, content: '', WYG: 者與異端又何異乎此似未易以内外隔截㸔也前書别紙變化機要二者之分亦非愚妄所曉竊意聖賢之言則一而見之淺深在}
  - {type: page-break, offset: 12018, content: '', id: KR4d0226_WYG_106-5a}
  - {type: variant, offset: 12019, length: 0, content: '', WYG: 者所證本非有預如此分别也昔有人見龜山先生請教先生令讀論語其人復問論語中要切是何語先生云皆要切且熟讀可也此語甚有味乍㸔似平淡没可説只平淡中有味所以其味無窮今人説得來驚天動地非無捷徑可喜只是味短與此殊不倫矣且㸔論語中一句一字孰有非要切之言者若學者體㑹履踐得皆是性分内𦂳切慤實事便從此反本還源心與理一夫豈有剰法哉若如吾丈所謂變化者則聖賢之門無有是也其莊老竺學之緒餘乎反復以思未見其可大抵聖門立言制行自有規矩非意所造乃義理之本然也故日用之間内主扵敬而行扵義義不擇則不精不精則雖其大體不離扵道而言行或流扵詭妄則亦與道離而不自知矣故曰和順扵道徳而理扵義而孟子養浩然之氣亦必曰是集義所生者不識此為對仁之義乎為精㣲之義若來喻所云乎且對仁之義亦何以知其不精㣲也但大傳中精字之義不如此耳前幅所陳謬妄不中理之言必多葢未敢以為是而求正扵左右切望指教區區之病正坐執滯扵文字言語之間未能脱然有貫通處其扵道體固患夫若存若亡而未有約卓之見耳但精義二字聞諸長者所謂義者宜而已矣物之有宜有不宜事之有可有不可所謂義也精義者精諸此而已矣所謂精云者猶曰察之云爾精之之至而入扵神則扵事物所宜毫釐委曲之間無所不悉有不可容言之妙矣此所以致用而用無不利也來教之云似扵名言之間小有可疑雖非大指所係然亦學者發端下手處恐不可畧故復陳之與鄭景實栗示喻曲折亦是時態之常頃聞仙㳺故相葉公之為縣月計所湏令民以漸輪送故縣帑無餘積而月觧無餘欠人甚便之竊計郡計既寛正當法此稍寛縣道之輸亦公私之利也但恐縣道難託别生它患此在髙眀必又有以制之耳儲宰既去為怨家所誣亦寓公者為之先後䑓評所指遷學一事乃與賤跡相連士子有初不預謀者亦被流竄其事甚可笑或傳不止流竄果爾又可痛也葢舊學基不佳衆欲遷之久矣儲宰一日自與邑中士子定議而某亦預焉其人則初不及知而其地亦不堪以葬也它時經由當自知之其可浩歎又不止如今所諭也與饒廷老此間虞士朋與王阮同赴東府飰㑹乃其隣郡鄉人必不使人攻之也姑少徐之當見底裏歸宿也㳺誠之或云參選不得已歸臨海不知然否能碎千金之璧而眷眷扵破釜何耶伯啟聞已西去昨日得浙中書云子約之逝親戚有為旁郡守者遂不復相聞末俗益偷乃至如此亦可歎也所喻極當初亦疑之後聞所得只是庶官恩例故不自慊今既不安不如且已止扵未形尤為深慮保状已納還仲本印紙今并附其人持歸幸檢入元不曾發封但别用紙䕶之也三衢已差替人正則恐亦不成赴上矣丁生頃年代君舉扵桂陽自刻其詩集而屬君舉序之是時葢求入社而不可得今日乃為此言固小人之常態也示及報状只坡疏未見此其闗捩雖未易窺然其手勢規模亦不難見葢已排黄子由之説而退之不久必别有勝負也元善已如霅川其子假日至此見養子之説愕然曰大人到彼又頭撞矣此語亦有味因見仲本可閑及之世間所傳坡文亦未必皆出其手可更詳之也某病起方得旬日無事比又傷苦風證候雖淺然服藥發㪚出汗多倦乏不可言屋下濕潤坐不得閣上又熱無着身處頗以為苦耳誠之進退不決何乃至此渠年㡬與老拙只争十來嵗前塗事亦可知若時運來時又自非人力所及也換闕竟如何人生凡百信縁禍福之來豈計較所能免見説賢者慮患過深㡬至成疾何必爾耶伯起想已赴班引矣中間道學二字標榜不親切又不曾經官審驗多容偽濫近䝉易以偽號又責保任虚實扵是真贗始判矣與張孟逺老益衰百病交作處世能復㡬時而季通子約凶問沓來令人感愴不能為懐天之蒼蒼其果有所愛憎耶抑都無之而直聽其自爾耶厯説恨未得請餘誨康節之學固非止扵為厯然亦不專為知來如後世䜟緯之言也幸深考之復以見教幸甚歸來之後叨冒重叠已深愧仄不意又䝉收召之恩顧念本末不應復有仕進之計而懇辭未獲比不得已輙縁面奏封事之請妄陳瞽言政使至前所論不過如此計此愚誠當䝉矜允得遂退蔵也然語黙之間政爾難得中節此舉却是以語為黙差之毫釐則是反速其禍未知竟何似耳子充當已改秩亦久不得渠消息也季路之除甚慰物論供職當已久矣衰病益侵自去冬來脚弱拘攣心腹痞痛日甚一日服藥畧無効驗懸車年及已言扵郡丐上告老之章而有司疑之交舊亦多以為不可未知竟如何然此意已決不復能顧利害得失也友人㳺子䝉趨試南宫行期偶緩過衢欲買舟而無知識可託欲丐指麾幹事人相導之此公定夫先生從孫論議文學皆有餘在此為可與晤語者計當自識之也記得杲老初謫衡陽有以詩送之者曰逄人深閉口無事學梳頭此語有味可發一笑然亦不得只作笑㑹也答劉德修似聞祠官秩滿不知亦為再請之計否耶東方之事想日聞之某竟不免吏議然已晚矣正使茍安亦何足為輕重顧未知世道終何如耳餘干時有人往來履常兄弟且如此昨得其書具道所教戒令人感歎但觀時勢恐未有補徒促禍耳機仲元善各已為致盛意皆屬道謝子宜在宜春時得書其母年高不肯來就養甚可念子直罷廬陵後去之章貢外邑寓居亦不甚安子夀間亦得書平父聞亦歸江陵却不得近書也季章必已到閬中文叔寓居不知為況定何如亦已託君亮附書問訊矣東溪志銘高古峻潔法度深嚴而渾然不見刻琱之迹三復歎仰以得見為幸老先生學行之懿遂託此文以不朽矣春間當已就窆恨不得陪素車之㑹也傳之計亦已襄事其子弟㡬人當能世其學也天雄鐡杖石刻之況荷意甚厚第顧衰懦有不能堪重以為愧耳今年脚氣幸未大作但耳聵目昏日以益甚舊書不復可讀而頃年整頓儀禮一書私居乏人抄寫學徒又多在逺不能脱藁深慮一旦無以下見古人又恨地逺不得就眀者而正之也方念久不聞動静忽閲邸報有房陵之行為之悵然寢食俱廢累日不能自釋不審彼以何日就道自簡至房道里㡬何取道何州閲㡬日而後至風土氣候不至甚異否居處飲食能便安否官吏士民皆知相尊敬否吾道之窮一至扵此然亦久知㑹有此事但不謂便在目前耳偶有鄂便託劉公度轉致此間如有的便亦望得一字之報使知動静少慰逺懐千萬之幸馮李亦復不容李章得郡而名見乃弟䟽中恐亦非久安者李良仲鴻飛冥冥使人深羡第恨不得扣其𤣥中之趣范文叔却幸未見物色想亦深自晦也某足弱氣痛已半年矣杖䇿人扶僅能畧移跬歩而腹脇脹滿不能俯案觀書作字一切皆廢獨扵長者未敢依例口占耳數日又加右臂作痛寫字不成衰憊至此無復久存之理承教無期尚兾以時深為世道自愛耳某隨例納禄幸已得請中間葢亦少有紛紛後雖粗定然猶不免為從之之累亦可歎也盡室㳺山大是一段竒事衰病窮蹙不復能出門户矣引領高風徒切歎仰李良仲恨未參識聞其養生頗有奇効恨不得一扣𤣥指參同契絶無善本近校得一通令人刋行方就自有紕謬處今納一册或因書煩為扣之渠必扵此深有得恐其有錯誤得筆示幸甚也屈平以往者不及來者未聞而有長生度世之願亦是不堪時人之妄作而欲見其末稍作如何出場耳每讀至此未嘗不發一大笑也與方耕道問禮之意甚善顧淺陋何足以議此舊所遵守者温公書儀程氏新禮耳兩書想皆見之擇其善者可也嘉禮有日本合遣人致區區適此朞慘不得如願想能亮之承許改月來訪幸甚幸甚所喻南軒病證極令人憂念旦夕専人候之當并拜状也幕客正要蚤晚從容宻罄忠益來喻乃欲公㕔搢笏納劄誦言殊不成舉措聞之駭歎如是乃是専欲引善歸已眀曲在人非主人所以千里相招之意也又況如此則必大激同官之怒亦使主人難處區區愚慮深為老兄憂之方念正論衰息吾黨甚孤正當凡百詳審委曲調䕶使人無可指議乃為盡善若以小故先自乖離外激衆怒内致羣議殊非䇿之得也況向來所辟兩人㳺已望風引却今老兄若更做去就豈不大損主人聲望至來喻所謂官吏縱弛此亦當以漸整頓豈容一旦遽行商君之令乎居上以寛恐南軒自有規模若一向糾之以猛恐非吾輩平日所講之意更請裁之勿為過舉幸甚幸甚回劉知縣諱君房嘗念兒時侍立先君之側見其每得杼山侍郎公書未嘗不把玩歎息而善藏之是時雖㓜無所識知然窺其詞意筆蹟之妙亦意其超然非當世之士也其後僅三四年先君即弃諸孤葢已不及見更化之日矣是以一時去國諸賢次第收用侍郎公亦再登近班而某跧伏窮山不得一拜牀下以修子弟之恭至今以為恨也不意垂老得其賢孫而與之㳺幸亦甚矣三復來誨俯仰今昔甲子殆将一周又自歎其老而無聞也與蔡權郡南康丐祠之請前月半間已専人入郡度諸公見憐必已俯從所欲矣昨慮使郡虚有勞費亦已預戒邸吏闗白想徹台聽也近聞已除石寺簿為代與之亦有雅故其人豈弟達扵從政真足以惠一方矣答盧提翰承問及為學之意足見志尚之逺甚慰甚慰盖甞聞之人之一身應事接物無非義理之所在人雖不能盡知然其大端宜亦無不聞者要在力行其所已知而勉求其所未至則自近及逺由粗至精循循有序而日有可見之効矣幸試思而勉之幸甚幸甚此有樂静李公文集謾納一本其後序所云深可以為干名求進之戒幸試觀之區區奉寄意不在扵文字也令兄寺簿詞翰兩絶把玩不能去手然豈敢輙以無能之詞妄取僣越之譏回書幸為遣行李集并往亦足以見區區也答儲行之所喻縷縷殊可駭歎此其意不在左右計必又湏醖釀播揚成一大事亦不可知然區區之心有可以質扵神眀者以救民而獲罪亦所不敢辭也批書遲緩亦且得寛心忍耐為佳聞建安亦未得去崇安却已得好消息矣縣中近日大槩幸已無它但西路之窘日迫官司要已再輪上户至八月初然無人監督以眀者行之尚且不免為虚文况今日耶適得蔡倉書尚有挽留之意若能領其悃欵幡然一來千萬幸甚昨日劉居之相訪具言麻沙事體云一種貧民至有餓而死者聞之惻然今日文卿相過亦説諸處輪糶已足上户便謂事畢雖有米者亦不復糶最是崇化一郷可慮梁文叔亦言長平一帶小民般運崇安早榖日不下百人或恐彼中土人争占攔截亦能生事此皆可深慮者竊意左右聞此亦不必待其劔㦸如林流血成川然後為復來計矣且是目今便覺上下人情不通有話便難出口適因蔡倉見問已告之云不若便闗諸司再煩左右一來權領一職帶取印杖從間道直趨崇化麻沙往來監糶并措置救荒事目付之簿尉以俟事之畧定而歸似亦無不可者不知雅意如何文卿亦説縣中士民盛傳舊尹復來其意似亦可憐不應便恝然弃之也適又與文卿説自今以往境内有一夫不得其死一夫身被刀創則左右皆不得辭其責切幸察此苦言少回必去之志勿信庸人狥已忘物之説以誤逺圖恐異日思之不能無追悔也向來此間行事得失當亦有可自警省者或謂却是欠些偽學其言雖可笑然恐有理不審扵意云何也閒中讀書奉親足以自樂外物之來聖賢所不能必況吾人乎但新學一旦措手而委之庸髠數日前已互遷象設令人憤歎不能已而一縣下人若貴若賤若賢若愚無有以為意者惟曾堅伯相見新帥來以為士子當相率訴之范仲宣深以為然而漠然無有應者此亦見人之識見分量之不同也季通之行浩然無㡬㣲不適意丘子服獨為之涕泣流漣而不能已處事變恤窮交亦兩得其理也張鄭黄鄧相繼物故吕子約前月亦不起疾殊可傷悼亦是氣運使然豈可專咎章子厚耶元善到霅後一再得書殊恨失計初亦有所迫而然失之不能㫁決耳季通在湖南耳根却静然諸遷客聞高安之報想亦不免打草蛇驚也人生由命非由他此言雖淺誠有味也偶有自江西來者得東坡與何人手簡墨刻適與意㑹今往一通可銘坐右也東坡帖附見示及數書皆有逺别惘然之意雖兄之愛我厚然僕本以鐡心石腸望公何乃爾耶吾儕雖老且窮而道理貫心肝忠義填骨髓直須談笑扵生死之際若見僕困窮便相為邑邑則與不學道者不大相逺矣凡造道深至中必不爾出扵相好之篤而已然朋友之義專務規諫故輒以狂言廣兄意耳兄雖􅇄坎扵時遇事有可尊主澤民者便忘軀為之禍福得喪付與造物非兄僕豈發此看訖便可火之不知者以為垢病也某皇恐吾人不合偶得一官遂以官為業一日投閒便有食不足之歎彼此皆然然在此則身自當之無所怨悔亦知賢者以親養之故不能不介念也來春之行不知都下報者云何若非以鈎黨之故則疑雖重坐但經赦宥便是無事人只是一墮此城却恐未有出期雖然只是參選然亦須臺參出人而前恐又重遭指目須更審而後道告詞傳聞數聨不曾見全篇尋常此等只拂畧説過今乃鋪叙如行遣禁從帥臣之體不知果是誰筆因便幸畧批喻也某却至今不曾受告亦不見報行詞命喫俸半年未曾立案殊不可曉也避地盖出扵不得已其他却無説但後受兩司對移之命既行彼乃深怨以為自此發之不知二公經年不通問也時論率兩三月須有一番引作近報集議赦條不知意果如何恐亦只為諸已行遣人恐死灰之復然耳張帥到未此公遽去朝廷不省所謂議者盖深惜之彼當已得其説矣來使方今還自府中適此兩日所苦大作力疾草此不能究所欲言然前書計亦非晚當至矣獨樂園圖恐司馬守便之官未暇刻得與之議為辨一互刻之亦佳但其詩頗有誤字見山䑓詩中陶通眀乃陶隠居之别號今作淵眀當改正耳前賢遺迹正爾何闗人事而使人想象愛慕不能忘雖不得復至其處而猶欲見之圖畵之間使其流傳之廣且逺而未至扵泯滅然則為士君子者其可不力扵為善哉所喻批滿今始得之萬事遲速自有時節固非人力所能為也代人尚書者不知得之何人此人固非佳士然恐亦未應遽至扵此當更察之若其果然則誠為狗彘不食其餘矣彼挾怨妄言者固自不足責也前日亦料從人不欲復過此亟折簡呼文卿令其往見固欲寄聲昨日得報乃云冬收方冗未能自㧞今承喻及有問道過問之意似亦未便幸更審之大抵欲面言者無它但欲每事詳審持重耳觀人之失亦坐自處未能深静之故若處晦觀眀處静觀動則無不察矣前日廖子晦歸説新闕已為人所受想已聞之理勢自應爾也詞命已行乃東山之筆有鹽課入已之語渠自對人誦之不知已被受否聞某亦有之渠却云是同官作其勢不應如此但至今不下亦不見人傳誦必是醜詆以媚用事者而深蔵以蓋其迹甚可笑也帥幕無事可以讀書而西山南浦號為天下勝處公餘徙倚亦有足樂然亦更須擇交勿忘前事之師乃所望耳小坡一著高似一著此甚不易必是裏面説得轉了方下得此手脚然此亦至危之機更須深自防衛一種細故得放過且放過勿令人疑事事皆出扵已乃為佳耳鄒公亦有安静之説次第善類須少安也王巽伯未能去否向語渠尋獨樂園圖摹刻流布不知曾為之否不及作書因見幸為扣之也景初素守扵此可驗世路升沈何足深計但得此心無愧所得多矣衛公近得書寄梅巖圖來初欲令作記俄聞溪城之報且罷休矣甚愧不得一逰其間并以文字結縁也至之且得如此亦是一事大抵吾黨例多困窮只得存活得過俱是十分亨泰矣後之晚娶深入瘴地似不善便此邦之侯一再通問亦依様畵葫蘆合之不為難也答黄子厚銖罪戾之蹤不容掩覆竟䝉䑓劾褫職罷祠昨日已被省劄而季通遂有舂陵之行已入府聽命矣示喻縷縷極感勤念然此何足置意中耶季通只是編置無他刑名正縁有司欲秘其事却致傳聞張皇前日就道臨老逺謫殊可念耳告訐之門既啟世間羣小無非敵國便能因樹為屋目同傭人亦已晚矣況不能耶死生禍福正當付之造物耳所説賑貸事想已䝉留念矣今日復有數人來云是六十二都人户不知與昨日状子是同都否不免并煩契勘令社首保正等人結保具状來請恐亦只有三百來石勢亦不能廣及也社首輩或自呼喚不得今一書至伯起託其喚集幸為付此輩自持去又恐去建陽逺俟見人數即報彼縣般載來黄亭東岸等候人來請貸也老兄閑中無事不合相擾然想閔此疲民不憚少勞也答丘子服膺昨晚又承簡為慰謝字初不曉将謂有何異事豕亥之訛乃爾可笑也唐人詩云昨夜秋風還入户登山臨水興如何閒咏此句甚覺塊處之憒憒而力未能出奈何奈何詩譜已得之未耶御書閣已装了龕子恐官司未暇及意欲自出薄少而率諸朋舊共為之似亦不妨已畧説與通理所欲議定喻及仍令匠氏畵圖來看也老子荷留念載營魄之義説者皆失本意前日因此偶思楊子説月未望則載魄於西與此字義頗相似檢看諸家亦無一人説得是嘗草定數語以辯之未暇録去俟到此日可看也對禹問以私意窺聖人﨑嶇反仄不成説話而反譏孟子為求其説而不得者其言之失非獨如來喻所指也前晚聞舂陵信不佳昨日亟走後山渠家亦不得的信但所傳甚子細恐必不妄志業精深今豈復有此朋友為之悼歎不但為平生交好之情而已也示喻有科舉之累愚意非科舉之累人人自累耳所示論昨在寶幢曾聞此説渠已嘗輒語其非試更思之得失有命似不必太狥時好也前書問責沈時正擾擾不及報不知平父曾寄去否此中無本沈是葉公之姓向來敬夫在桂林刻本䟦語中解此字義舊有本亦已盡矣周子通書近時到處有本此本頃自刋定比它本為完可試讀之此近世道學之源也而其言簡質若此與世之指天畵地喝風罵雨者氣象不侔矣更有二先生集本皆為人乞去俟他時别寄也與劉平父承示及行在諸書已領今納胡丈書及陳賀二公祭狀葉樞與沈倉書共甫與黄守劄子去平父至彼可與伯修昆仲熟議居止處如有意東來即遣人持沈黄二緘授元履令見二公而道曲折盖共甫書中之説如此但前此某嘗妄發卜居之議未有定論既而聞居泰寜之意甚決且謂勸居建陽者皆挾黨狥私其説乖悖不知誰主倡此説真賊伯修昆仲者也范丈素志不欲居泰寜見扵書札者非一況啟手足之際又有道學失傳之歎不屬意可知矣今纊息未定而異議紛然不顧義理之所安妄言同異雖其意謂范丈為不復有知其如義理有出扵人心之所同然者不可幽眀而殊觀也胡丈之㫖不約而同幸持以示修崇老僕之言今可思未二公賻金尚在胡丈許某不曉求田事諸公已屬元履矣當扵建陽近墓買田則建陽不憂食不足㫁然可居無疑況近三世之墳墓而范丈之門人子弟布滿左右伯修兄弟動息必聞小有過失必有交謁而更諫之者其扵范氏門户久長之計豈不優扵入泰寜范丈所不欲居之地去墳墓背朋友而自肆其心乎然則伯修兄弟今日之計不患扵食之不足而患乎身之不修為前人羞辱而已平父至彼便宜論此某月末至麻沙或扶曵一至邵武不可知然此議之責今在平父向者某已不復有意啟口偶因胡丈之言復發其狂琴志已領㸔畢即納上亦方是五七十年來文字非古書也小報却納還言者聽者皆不易得但欠一行字耳草澤中却有此等人使人益深素餐之愧也二南説未編次可及今為之他日相聚裁之也論語向㸔四篇似未浹熟可兼新舊㸔為佳去嵗所治大抵未熟者今悉温尋之為善向數奉語可錄出所作工夫次第作一紙時復省詧了與未了分數此最善可便為之盖雖相聚一年所進業殊少所當為而未為者殊多今又疾病如此羸頓勢未能出與兄相聚相聚亦思索講究未得恐負太碩人與共甫兄相責望之意特復奉白惟思之無事勿出入盖共甫兄不在宅中别無子弟門户深濶事有不可勝虞者不惟惰逰廢業為不可且賔客至者談説戯笑度無益扵身事家事者少酬酢之則彼自不來矣切祝且温習勿廢使有常業而此心不放則異日復相聚亦易收拾試思自去冬以來已過之日多少其間用心處放蕩㡬何存在㡬何則亦可以自警矣病倦不勝思慮答王樞使便中忽拜手札之賜伏讀感慰不可具言䝉喻千越之故悼歎閔惻見扵詞㫖前此亦聞首為力伸歸葬之請固已深歎服風詣之高足厲頽俗矣及此重太息也浮議汹汹至今未息嘯儔命侣日以益衆不知更欲何所為者清源既不免而信安已擯去近見所上纂述之書卒章頗有苦口之言亦不易也當今舊弼宿望中外所倚以開上心正國論者惟眀公與益公而已竊計所以處此當有定論也此間親舊有自千越㑹塟而歸者亦得其長子書聞其動息頗詳然亦無可言者但令人隕涕而已如某賤迹固不足言而終嵗力辭僅免近職初意自此可以少安而後咎餘責侵陵未已亦未知終安所税駕也舊有足疾嵗湏一發旬月以來正此為苦加以目盲日甚重聽有加終日憒憒如土偶人已無復有生意矣彼何見疑之過耶湘西匾牓饒宰寄示得以仰觀非惟健筆縱横勢若飛動而心畫之正結體之全足使觀者魄動神竦甚大惠也某前此妄意偶及扵此而不敢容易以請輙因饒宰言之不謂便䝉開可遂得彈壓江山垂示永久湘中學者一何幸耶趙機宜得趨幕下書來極感知遇之意醴陵亦説甚荷容詧以見門下愛惜人材隨能器使之妙固無一物之遺也自邇以來衰病沈綿日就羸頓此凋隕澌盡之常無足為門下言者今因鄉人李正通朝㪚祗役部下復此附稟其人眀敏有才緩急之際可備繁使之末聞亦嘗得出入門墻竊計不待區區之言久已有以處之矣又䝉不鄙俯垂訪逮此見高眀之度不以爵位之崇名譽之顯才業之偉氣節之高自謂絶人而謙虚下問至扵如此甚盛甚盛顧某至愚本無知識加以疾病之餘思慮昏塞其何以辱嘉命然竊以謂知院參政平日尊主芘民之心其素所蓄積者固有定論盖不特士大夫知之而兒童走卒亦皆知之矣今日得其位而施之其先後緩急固宜自有次第但能益以天下之重自任而勉焉以固其志則天下受賜已不貲矣至扵主張公論扶植善人抉去隂邪不使得乘間隙則願高眀扵此益加意焉實天下幸甚幸甚老生常談迂濶無取僣易塵凟伏深愧懼與方伯謨閒中不能無為而所讀書又不能隨衆備禮㸔過日間趕趂程限甚覺辛苦偶記楊敬仲答人書云恭惟某官讀聖人書既飽而嬉甚可笑然亦多着題也答俞夀翁興國盗鑄曲折不知如何近聞淮上以此頗洶洶朝廷深以為憂遂以其事屬之葉正則不知今果如何也所示周禮復古之書其間數處向亦深以為疑今得如此區别極為眀白但素讀此書不熟未有以見其必然聞陳君舉講究頗詳不知曾與之商量否欲破千古之疑正當不憚子細討論必使無復纎毫間隙乃為佳耳某衰晚不天長子夭折忽已踰年念之痛割無復生意以卜地未定尚未克塟初被湖南之命即以此辭未報之間忽聞臨漳所請經界議格不行不免自劾廟堂已許復備祠官而不欲以此為名雖已降㫖促行却令别入文字月初已遣人行計此月中必可拜命六十老翁餘年無㡬自此杜門當不復出矣示喻剛氣未能自克之病此正區區所深患方當相與同謹佩書之戒耳大抵最要平時講學持養使此心常存義理常勝始有用力之地也此間銅儀見説只一平環一側環一望筒只用手轉想見當時草創未盡得元祐舊制也奉告且知條教已孚物情風動士勸民安姦凶屏息此亦足以小試儒者之効矣更兾勉旃區區又将扵其大者觀之也誠齋歸袖翻然令人慨想所寄石刻某偶在山間為大兒治塟兒輩留在家間未及快覩也武夷之會乃所深願而未可得者他時踐言何幸如之但恐功名迫逐不暇赴此寂寞之期耳因書誠齋多為致謝屬此悲冗未能占布也建陽新居粗有溪山之樂然心緒不佳又多俗冗苦未得舒放懐抱也周官復古正以此經不熟未得深考異時得靣扣其説庶㡬了然無疑乃敢下語耳永嘉諸人説此甚有與先儒不同處然頗秘其説亦未得扣擊之也示及先丈所著周禮復古編極荷不鄙往時先丈固嘗以見寄矣某扵此書素所不熟未敢容易下語然當是時猶意其可一見而決也不謂後來不遂此願至今遺恨況今方以偽學獲罪聖朝杜門齰舌猶懼不免又安敢作為文字以觸禍機乎答曾景建季通子約相逐而逝不謂天之無意扵善人乃如此每一念之輒為悲愴不能為懐也昨聞吉甫之歸方竊疑之伯豐之子乃如此尤可歎息耳道夫久不得書為況如何因見致意便遽未及書也方遣人探子約之櫬何日過上饒欲遣季子往哭之近得玉山書則已過矣前日僅能扶病一撫季通之柩也廬陵子一書煩為附的便其人乃子約嘗寓其舎者也得不浮湛為幸答余景思朱趙相繼淪没深為可念聞宜春人欲留學古卜塟扵彼遂為留居之計不知果然否魯叔子弟㡬人今皆年㡬何莫亦能自卓立否欲作書慰之以病未能當俟後便也作縣固非易事然盡心力而為之必無不濟今人多是自放懶了所以一綱弛而衆目紊也承喻立蘇忠勇祠扵故居甚善甚善但某自今夏一病至重今已累月尚未復常心力尤衰日前欠人文字且辭之未得盡脱豈敢更承當此事耶兼近日已辭林子方家墓碑之請亦恐不能無嫌也閒中益得觀書當有深趣日月易得願益勉旃若但如拙者既老而後有聞則享用已不能久而無復可力之望矣直卿既歸想時得從容恐講論不能無異同正當力究有未決者因來諭及不敢不盡鄙懐也與陳同父某叩首再拜訴哀叙謝畧具前幅而苦痛之懐終有不能以言語自見者三復來教及所示奠文則已畧盡之矣尚何言哉尚何言哉自聞意外之患既觧而益急地逺無從知動息親舊書來亦不能言其詳第切憂歎而已數日前得沈應先書乃報云云自是必可伸雪今日忽見使人得所惠書乃知盲料亦誤中也急拆疾讀悲喜交懐又念常年此時常䝉惠問不謂今嵗彼此況味乃如此又益以悼歎也觀望既息黑白自分千萬更且寛以處之天日在上豈容有此寃枉事也亡子卜塟已得地但隂陽家説湏眀年夏乃可窆今且殯在墳庵其婦子却且同在建陽寓舎小孫壮實麄厚近小小不安然觀其意氣横逸却亦可望賴有此少寛懐抱然每抱撫之悲緒觸心殆不可為懐也五夫所居眼界殊惡不敢復歸已就此卜居矣然囊中纔有數百千工役未十一二已掃而空矣将來更須做債方可了辦甚悔始謀之率爾也但其處溪山却儘可觀亡子素亦愛之今乃不及見此營築念之又不勝痛也奠文説盡事情已為宣白哀慟之餘哽咽不能自己此兒素知尊慕兄之文此足以少慰之矣更有少懇将來塟處欲得數語識之此子自㓜秀慧生一兩月見文書即喜笑咿嗚如誦讀状小兒戯事見必學學必能然已能輙弃去後來得親師友意甚望之既而雖稍懶廢然見其時道言語亦有可喜者但恐其騖扵浮華不欲以此奨之去年到婺以書歸云異時還家決當盡捐他習刻意為已之學私竊喜之日望其歸不意其至此也痛哉痛哉尚忍言之此語未嘗為他人道以老兄素有教誨奨就之意輙以不朽為託伏惟憐而許之千萬幸甚更一兩月當遣人就請也奠禮有状拜謝但來人至江山遇盗頗有所失亡今賫到兩縑云是他人所償此不敢留却封納却可送官給還本主也無以伴書白毛布一端往奉冬裘之湏幸視至未有承教之期惟千萬自愛為禱答李繼善孝述便中辱書為慰信後初寒侍奉佳慶所示疑義各以所見附扵左方矣來喻甚精到但思之過苦恐心勞而生疾析之太繁恐氣薄而少味皆有害乎㴠養踐行之功耳其餘曲折敬子元思必能言今日疾作執筆甚難不容盡布惟冀以時自重不宣與劉德華允廸某聞風甚久屏跡丘樊無由瞻奉兹焉假守宻邇治封政化流聞益勤傾跂謹因致問布此腹心諒辱深照某衰病餘生不堪吏事兹䝉聖恩强畀民社扶曵至此不敢為久居計顧念未有以仰報使人之意者訪聞管下諸縣有與貴邑地勢交錯税籍猥并之處所以賦重民貧凋殘特甚向來貴邑得賢守令力為申請已䝉蠲減之恩而此間獨仍其舊念欲以此哀告朝廷仰祈寸澤輙擬就借貴邑當來申請一宗文字以為楷式諒仁人之心無間彼此得檢示去人令就抄録以歸實為厚幸某久不奉問鄉往馳情比以郡境枯旱異常夙夜憂勞不知所以為計意者君子所臨當不至是也備災之具經營似頗有緒但檢放一事未有長䇿盖太詳則民有勞費太畧則又恐有不均之歎竊恐貴邑施行規模次第必有可見教者專人咨請切幸毋吝法曹經由曾請見否已囑其歸塗靣叩詳細矣引領以俟至懇至懇建昌利病恐有所聞幸以見警千萬至禱某承示及公文已行下通放矣聞貴邑所勸未甚多恐不可不早為之所諸司未必可指凖此間多是兑那合起官錢遣人收糴将來糶畢還錢盖未晚也奉新臨川聞頗有米市井販鬻之家亦可勸諭使往糴也但陳法還自建昌聞元檢放分數過多今又不可失信王星子與毛掾遍行其境還亦言僅可得一分耳民窮固可哀而官司之計将如之何積憂熏心百病交作求去不得未知所以為計也某數日為江西船粟不下憂窘不可言今聞始得少通然財賦有經而饑民猥衆雖竭所有以糴不能為旬月之備今再遣陳掾走建昌更令請教陳謹實勤懇同官中不多得建昌諸人既難深託百里之命正在此人耳切告推誠毋隠使鄰道之人均被惠澤而守官者賴以不得罪扵其民固仁人所樂為者是以忘其再三之瀆而敬以為請當辱垂念也昨見三牓懇惻之心形扵文墨讀之令人感歎不能自已貴境放及㡬分别作如何措畫皆望見教中間小報言者有謂州官檢放但憂郡計之不足不恤民力之已困者可謂平論聞聖心極焦勞但無如有司出内之吝耳某又聞檢放得實州家悉已施行此見懇惻之誠孚扵上下尤深喜慰某示喻仰見憂民之切不勝感慨但此雖號鄰邦然情意素不相通豈敢輙爾干預恐或徒為紛紛而無益也向來嘗為錢漕僣道賢德今一書禱之幸試達之然湏更得民户自言乃相應耳吾人相求而不相值彼亦果何心哉可歎可歎某衰病多故久不得附致問訊然采聽道塗竊知捄荒之政究心悉力不勝歎仰恨有封壌之拘不得少佐下風也某昨移建昌之粟扵都昌此兩日給㪚方畢遂可上奏與之丐賞庶不失信扵此人幸甚幸甚孫僉適到此首談長者捄荒之意相與歎息錢漕前日通書已道區區然政不湏此也敝郡兩邑月觧千緍自去夏之供至今不得一文郡中獨力支吾幸不至大段曠闕前日猶恐将來為縣道之累已悉與削其籍矣今日為縣誠難若郡不恤縣則亦何以責縣之不恤其民乎顧上供給餉種種有不可闕者未知朝廷終何以惠綏之耳某孤拙亡庸不自揆度妄意一出竟速顛隮尚賴聖眀照知本末假寵從欲所以矜憐慰藉之者甚厚顧無涓塵可以復伸報效感之多不若愧之甚也某伏䝉垂喻義學記文極荷不鄙謹已畧述數語具道雅意但卒章之意不欲但以勢榮禄利為言故不復叙植桂之名将來入石只用今所寫去八字書額足矣文字荒淺指意濶踈不審尊意以為如何不知當屬何人書之更告詳酌也某昨䝉不鄙委撰義學記文不敢固違草具求教兹辱垂示乃知已便刋石未加指摘遽爾流播愧懼多矣記中第十行周字下元有澹字今似脱去恐寫去時脱了問兒子乃云寫時亦嘗疑之曾來請問乃知是古贍字不應遺忘恐或刻時失之耳此扵大義無妨但細讀之覺比上句少一字想無害也其文雖鄙然所叙契丈二事皆可以為世法更欲多得數十本㪚施知舊庶有能勉慕其萬分者答折憲名知常示及先正樞宻端眀少師家傳一通拜受伏讀得以仰窺精忠壮烈始終大致少慰生平尊慕鄉往之心甚大幸也顧又重勤台喻必使次輯以記埏道之碑則區區所以不敢僣易以承嘉命者已悉具前書矣今雖鐫戒益勤孝思愈切然在某私計利害之實則不能有加扵前也伏惟矜憐反復前説而改圖之使得免扵不韙之罪衆多之怨則某不勝千萬之幸與黄知府輙有不獲已之懇事渉鄉閭利病勢甚迫切敢忘分守已具公劄干冒公聽幸賜采覽斟酌行下千萬幸甚前日迎候之初便䝉誨諭仰見仁人之心視斯人之不獲真不啻若痒疴疾痛之切其身竊意樂聞斯言不以為罪是以敢布其愚撥米曲折固知仁民之切無所吝扵此況又使府自認脚費此尤出扵望外下邑饑民荷更生之賜感戴宜如何耶儲宰行已數日縣郭近封可保無虞但崇化麻沙以西一帶素少早田唐石乃全無之只此數十里間尚爾嗸嗸私居杜門亦不知其詳細為如何聞有臺劾亦既施行而未有被受亦未見章疏遣書著銜頗有所礙幸辱情照或章疏已報行得賜指撝錄示為幸昨䝉垂示報状極荷眷念區區尋亦已拜恩命矣罪戾彰徹固不可逃然縣宰批罷一事至乃上玷清重尤切愧恐而不敢自眀竊計高眀固已洞照其實矣至扵友生連坐亦䝉矜念委曲周至益見仁人之用心為不可及感歎亡已但既鐫罷名書罪籍不知寄禄餘俸合與不合幇勘已戒幹人計㑹所司更乞台㫖稽考法令然後施行恐不應得免貽後日之紛紛也答江清卿䝉喻湖北書極荷不外但年來藏拙不敢復與外事又伯升書言周憲扵麟之自有薦論之意而麟之不欲為自􅃷鬻者此意皆甚羙竊謂寜少忍之以遂麟之之高不當共為喣濡之態以虧其一簣之功也先夫人高識懿行宜得當世大賢紀述以詔後世而尊兄過聽誤以見屬自顧淺陋何以稱此然以委重之勤慕仰之素勉竭其愚以承尊命謹繕寫納呈幸賜裁訂而取舎之乃所願望即不可用不必過存形迹以累先德之羙也向來所苦何疾今想已脱然矣細觀妙書知目疾之向平為可喜也然中年氣血非前日之比服藥亦難見効惟有虚心調氣静以養之庶或少可補助耳答滕誠夫部綱之役不辭而行甚善甚善親闈慈念固當眷戀然亦可更以王事靡盬之義反復寛譬乃為兩全也與葉彦忠易傳且留是正不妨易自伏羲始畫八卦三畫文王重為六十四六畫作繫卦彖辭周公作繫爻辭孔子作彖乃釋文王之彖通謂之彖象文言繫辭説卦序卦雜卦而彖象繫辭各分上下是為十翼舊説如此承問及之示喻為學有緒尤以為慰且只如此用功旦夕相見却得面論也大學近修得稍平正前本亦不能無所偏耳詩傳兩本煩為以新本校舊本其不同者依新本改正有紙卅副在内恐要帖換也校時湏兩人對㸔一聽一讀乃佳着旬日工夫當可畢也答李伯諫某碌碌如昨無可言者兩月來修得數書亦有一二論説文字甚思與老兄評之而相望邈然又無人抄得徒此鬰鬰想聞之亦不無歎恨也比來觀書進學誘掖後進次第如何深所欲聞因書詳及之為幸通鑑綱目三國以後草藁之屬臨行忘記説及今想隨行有的便旋付及幸甚唐事已了但欲東漢之末接三國修之庶㡬有緒易為力耳然伯起者亦尚悠悠近㳺誠之伯鈞之子相過開爽可喜渠南北事甚熟或取過伯起者託渠料理也某碌碌之況已具前書通鑑文字近方得暇修得數卷南北朝者伯起不承當已託元善矣度渠必能成之但見修者已殊費工夫盖舊㸔正史不熟倉卒無討頭處計今秋可了見到者餘者望早付及此間杜門山中尚不能免賔客書問之擾想官下少暇也壁記已在前書中但齋記未成耳惡札不堪用不若别託善書者書之也周翰書詞傾倒相與甚至恨未識面耳子禮兄金渠已認還七月以後息錢矣但書肆狼狽日甚深用負愧要之此等自非吾曹所當為宜其至此但恨收拾得又不好愈使人意不滿耳楊州書已别付逓去彼此各是破戒甚覺難措辭也此事長沙必能為辨吾人徒自擾擾未必有益苐好笑耳因書亦當督之也通鑑諸書全不得下功前此却修得晉事粗定條例因事參考亦頗詳宻但晉事最末兩三卷未到故前書奉速今承喻已寄少輿處必是少輿遺下不曾送來也此亦不難俟卒成之耳宋以後事分屬張元善已修得大字數卷來尚未得㸃勘若得年嵗間無出入有人抄寫此甚不難了但恐不得如人意耳六象似亦送少輿不知何故未到俟别摹去近得曲江濂溪象比舊傳南安本殊丰厚精彩亦當改正也讀易想有味有可論者便中語及為幸欽夫此數時常得書論述甚多言仁及江西所刋太極觧盖屢勸其收起印板似未甚以為然不能深論也大抵近日議論語孟觧已見一二篇雖無鄉時過高之失而寛縱草率絶難㸃檢不知何故如此無由相見殊使人憂之長沙書來説又分門編本朝事及作論篤一書雖盜跖之言有可取者亦載其中不知作此等文字是何意思使人都理㑹不下因書盖畧諷之不知又以為然否也書肆之敗始謀不臧理必至此無可言者既敗之後紛紛口語互相排擊更不可理㑹幸已自脱去不能復問晦伯必自報去某扵此却似放得下但馬謖未易根究耳一笑所示近文甚佳但似太高不着題大凡立言要湏因人變化而無包含不盡處乃為善言耳向見欽夫文字病痛正是如此也近有文字數篇及與伯恭問答數條偶當入城未能寄往少懇欲煩為尋訪龎安常難經説及聞别有論醫文字頗多得并為訪問傳得一本示及為幸答趙景昭減税文字不知已遣行未今再遣此人去漕司取申省状恐未遣可就付也今日風色甚佳而情思益憒憒臨風永歎不知所言答毛朋夀向見季通説甚俊敏更能勉力操修以世家學為佳耳大學文字季通考尚未為定本旦夕當取來更為改正乃可傳也場屋之文固知賢者未能免俗然先有以立乎其大者然後出而應之則得失榮枯不能為吾累矣不識高眀以為如何就補逺行為榮親計此意甚羙然古人亦有所謂不以得扵外者為親榮者亦不可不知也答馬竒之椅某衰晚疾病待盡朝夕無足言者細讀來示備詳别後進學不倦之意世間萬事湏臾變滅不足置胸中惟有致知力行修身俟死為究竟法耳余正父博學强志亦不易得禮書中間商量多未合處近方見其成編比舊無甚改易所謂獨立無助者誠然然渠亦豈容它人之助也此間所集諸家雜説未能如彼之好然儀禮正經段落注䟽却差眀白但功力頗多而衰病耗昏朋友星㪚不能得了耳商伯時時得書講論精宻誠可嘉尚李敬子堅苦有志尤不易得近與諸人皆已歸只有建昌二吕在此蚤晚講論粗有條理足慰岑寂也與王撫州阮字南卿南北形象雖在逺方無由究悉然大槩亦可意料目前固為危機交急之時其為長慮卻顧亦豈一無可施設者竊計方規素定其所區畫必有次第幸䝉見告乃荷不鄙也某今年公私之年皆七十矣疾病益衰氣痞滿腹足弱筋攣不能轉動跬歩之間亦須人扶乃能自致閑廢之餘固無職事可効但尚沗階官義當納禄又不敢自通牋奏懇求州郡累月僅得一申省状方此發去而聞臺評已及此事其間詞語不無深意矣未知所請竟復如何然幸己少伸己志即此外一切不復計也老兄氣體從來清健今尚只如舊時否宣布之餘何以為樂想見彎弓盤馬横槊賦詩正自不減當年湖海之氣也此人趙雯相隨頗久今因其省親江淮間附此問訊其人恐有可驅使處得𨽻戯下幸甚與長子受之早晚授業請益隨衆例不得怠慢日間思索有疑用册子隨手劄記候見質問不得放過所聞誨語歸安下處思省要切之言逐日劄記歸日要㸔見好文字錄取歸來不得自擅出入與人往還初到問先生有合見者見之不令見則不必往人來相見亦啓稟然後往報之此外不得出入一歩居處須是居敬不得倨肆惰慢言語湏要諦當不得戯笑喧譁凡事謙恭不得尚氣凌人自取耻辱不得飲酒荒思廢業亦恐言語差錯失已忤人尤當深戒不可言人過惡及説人家長短是非有來告者亦勿酬答扵先生之前尤不可説同學之短交逰之間尤當審擇雖是同學亦不可無親䟽之辨此皆當請扵先生聽其所教大凡敦厚忠信能攻吾過者益友也其謟諛輕薄傲慢䙝狎導人為惡者損友也推此求之亦自合見得五七分更問以審之百無所失矣但恐志趣卑凡不能克已從善則益者不期䟽而日逺損者不期近而日親此湏痛加檢㸃而矯革之不可荏苒漸習自趍小人之域如此則雖有賢師長亦無救㧞自家處矣見人嘉言善行則敬慕而紀錄之見人好文字勝己者則借來熟㸔或傳錄之而咨問之思與之齊而後已不拘長少惟善是取以上數條切冝謹守其所未及亦可據此推廣大抵只是勤謹二字循之而上有無限好事吾雖未敢言而竊為汝願之反之而下有無限不好事吾雖不欲言而未免為汝憂之也盖汝若好學在家足可讀書作文講眀義理不待逺離膝下千里從師汝既不能如此即是自不好學已無可望之理然今遣汝者恐汝在家泊扵俗務不得専意又父子之間不欲晝夜督責及無朋友聞見故令汝一行汝若到彼能奮然勇為力改故習一味勤謹則吾猶有望不然則徒勞費只與在家一般他日歸來又只是舊時伎倆人物不知汝将何面目歸見父母親戚鄉黨故舊耶念之念之夙興夜寐無忝爾所生在此一行千萬努力到婺州先討店權歇泊定即盥櫛具刺去見呂正字初見便稟某以大人之命逺來親依先生講席之下禮合展拜儻䝉收留伏乞端受便拜兩拜如未受即再致懇云未䝉納拜不勝皇恐更望先生尊慈特賜容納況某扵門下自先祖父以來事契深重切望垂允又再拜起問寒暄畢又進言某晚學小生久聞先生德義道學之盛今日幸得瞻拜不勝慰幸坐定茶畢再起叙晚學無知大人遣來從學之意竊聞先生至誠樂育願賜開允使某得早晚親炙不勝幸甚又云來時大人拜意有書投納即出書投之又進説大人再令拜禀限以地逺不得瞻拜郎中公几筵今有香一炷令某拜獻今參拜之初未敢遽請容來日再請門下令弟宣教大人亦有書并俟來日請見面納揖退畧就坐又揖而起如問它事即隨事應答如将來宿食即云大人書中已具禀更聽尊㫖次日将香再去仍具刺并以刺謁其弟問㸔同居有㡬子弟皆見之只問門下人可知也見其兄弟皆拜茶罷便起禀某昨日禀知乞詣靈筵瞻拜更俟尊命如引入即詣靈前再拜焚香又再拜訖拜其兄弟兩拜進説大人致問昨聞郎中丈丈奄弃明時限以地逺不獲奔慰不勝慘愴之私令某拜禀切望以時節哀為道自愛又再拜趍出如問就學宿食去處即説昨䝉喻潘丈教授許借安泊大人之意不敢以某久累其家恐兩不穏便已自有書與之只欲就其家借一空閒房舎或近宅屋宇安下不知尊意如何㸔説如何如令相見即借人出去併問其兄弟㡬人并見之如不問即且去俟午間再去見問此事見潘丈亦如此説大抵禮數務要㳟謹詳緩不要張皇顛錯何丈托問婺州寄居前輩有姜子方者是李中書之甥在婺州住建炎間曾從馬殿院伸辟為撫喻司屬官今其家有何子弟間見先生説吾問宗留守家子弟聞多有在婺州者其家記錄留守公事頗詳不知可託借傳一本否墓誌亦是曾侍中作呂家必有本也韋齋與祝公書䟦松奉孃子幸安小五娘九月十五日午時免娠生男子幸皆安樂自去年十二月初在建州權職官聞有敵騎自江西入邵武者遂棄所攝携家止政和寓壟寺五月初間龔儀叛兵燒處州入龍泉買舟倉皇携家下南劍入尤溪而某自以单車下福唐見程帥在福唐聞賊兵破松溪隘駸駸東下已入建州攻南劍甚急又匆匆自間道還尤溪六月十四日早到縣而賊兵已在十數里外矣幸二舎弟已搬家深遯是日即刻與縣官同走至家間所遯處賊在延平為官軍所破倉皇自山路欲遯下漳泉至此非其本心也過縣更不駐不甚害人亦不縱火家中上下幸皆無恙而隨行及留寓舎中衣服文字之類皆無所損失比他人為尤幸也七月間方還家而甌寜土㓂范汝為者出没建劍之間其衆數千官軍遇之輙潰諸司不免請官招安已還状受犒設将㪚其衆無何大兵自會稽來必欲進討昨日方報大兵冒昧入賊巢喪失數千人賊勢又震大畧自今夏以來未嘗有一枕之安此懐如何得程夀隆近書云鄉里頗擾擾不詳言其故度切近江淛其可憂當不啻此惟聚糧深遯勿以一毫珍幣自隨乃為上䇿此中雖城居但日夕為遯入深山之計生意草草凡事茍且不知百年未滿之間如此者更㡬時而後定邪來書謂某懶扵從仕非也中世士大夫以官為家如農夫之扵田其敢惰邪但未能赴行在間閩中所有不過權局逺不過三五月道里有逺近便不便携家即厚費獨行又非便是以且此跧藏意亦欲俟來春無事一走會稽别當奉報晉道帥福辟得一員屬官湏京朝官大年又未曾參部一切差遣皆礙是以皆參差也裘四久此頗忠戇可任既忤逢年當擾攘中遂不告而去情理不復可耐今此復來察其意色不復可制蓄每日來就食而夜宿客舎然地逺難得人力來往彼此資以通耗且覉縻不絶猶冀尚可鞭䇿耳方賊至六月間在村中裘四亦在彼數使人呼之不至却妄云某在福唐未還又云賊破福州皆妄言也婺源先廬所在興寐未嘗忘也來書相勸以歸當俟國家克復中州南北大定歸未晚也内弟祝康國出示先君子與外大父書熹之不肖扵是始生故書中及之今六十有四年捧玩手澤涕血交零敬書其後而歸之紹熈癸丑十二月七日孤朝㪚郎秘閣修撰主管南京鴻慶宫熹謹書䟦韋齋書昆陽賦為兒甥讀光武紀至昆陽之戰熹問何以能若是為道梗槩欣然領觧故書蘇子瞻昆陽賦畀之子瞻作此賦時方二十一二嵗耳筆力豪壮不減司馬相如也韋齋紹興庚申熹年十一嵗先君罷官闕行朝來寓建陽登高丘氏之居暇日手書此賦以授熹為説古今成敗興亡大致慨然久之扵今忽忽五十有九年病中因覧蘇集追念疇昔如昨日事而孤露之餘霜露永感為之泫然流涕不能自已復書此以示兒輩云慶元戊午四月朔旦䟦陸務觀淡淡炊烟村逺近鼕鼕儺鼓埭西東三乂古路殘蕪裏一曲清江淡靄中外物已忘如敝屣此身無伴等覊鴻天寒寂寞籬門晚又見浮生一嵗窮季札聞歌小雅而識其思而不貳怨而不言者近世東坡公讀柳子厚南澗中題乃得其憂中有樂樂中有憂者而深悲之放翁之詩如此後之君子其必有以處之矣慶元己未七月二十日雲谷老人觀陳希真所藏為記其後䟦魏丞相使金帖内修政事外攘夷狄復文武之境土會諸侯于東都此夀皇帝當日之本心也屈已和戎豈其獲已然非丞相書春公之深謀壮節猶㡬不足以成之豈興事造功之果為不易耶公之子熊夢出此宸翰以示臣熹適當奉諱之後捧玩摧裂涕泗交零謹拜手稽首而識其下方云晦庵續集卷四欽定四庫全書晦庵續集卷五宋朱子撰書答劉韜仲問目無求生以害仁有殺身以成仁炳以為理當死而求生是悖理以偷生失其心之德也故曰害仁理當死而不顧其身是舎生而取義全其心之德也故足以成仁若比干諌而死夫子稱其仁所謂殺身以成仁也雖死不顧只是成就一个是而已使比干當諫不諫而茍免扵難則求生以害仁矣未知是否此説得之然更要見得失其心之德全其心之德各是如何氣象方見端的君子義以為質禮以行之孫以出之信以成之何故不及仁更思之有一言可以終身行之者其恕乎己所不欲勿施扵人今之人多以姑息為恕且自居官者言之為州縣則不敢擊豪彊為監司則不敢按贓吏為臺諌則不敢排姦慝為宰相則不敢退小人皆自以為恕而不知恕者如心之謂也所惡扵上毋以使下所惡扵下毋以事上豈姑息之謂乎夫仁者謂之能好人可也而孔子兼能惡人言之炳謂恕字亦當如此體認未知是否此説固善然被排擊遭按退決非己心之所欲今乃欲施扵人又何以為如心乎請更推之莊以涖之動之不以禮莊敬者禮之容也兩句意疑相重炳謂端莊不慢者敬心之發躬行之事也所謂禮者化民成俗之具若為之冠昏䘮祭之品節以教民孝弟者是也未知是否動猶動民以行不以言之動禮只是在己者民之扵仁也甚扵水火水火吾見蹈而死者矣未見蹈仁而死者也集注之説曲折雖多然詞意精宻發眀聖人勉人為仁之意最為𦂳切有功或問節取范氏之説詞雖平而意則緩且未見蹈仁而死一句與上文不相應如范氏仁不傷人之説則與上句不合如程子殺身成仁之説與上句合矣而地位不侔炳謂不如集注之説未知是否殺身成仁蹈仁而死同異如何更思之陽貨之惡如此聖人恐無不終絶之意時其亡而往者亦非欲其稱盖終不欲見之耳遇諸塗者乃不期而㑹不可得而避非得已也未知是否恐未然伊川先生云性即是理炳謂所謂理者仁義禮智是也未知是否四者固性之綱維然其中無所不包更詳味之子曰性相近也又曰惟上智與下愚不移夫人之氣質雖有偏正昏眀純駁厚薄之不齊然禀生之初未甚相逺也故謂之相近至扵上智之所以為智下愚之所以為愚亦皆其氣質使然既謂之相近矣何故又有上智下愚如是之懸絶也氣象雖相近然亦有如是懸絶者盖既曰氣矣便有此不同不足恠也吾豈匏瓜也哉焉能繫而不食集注云匏瓜繫扵一處而不食物古注云言匏瓜得繫一處者不食故也吾自食物當東西南北不得如不食之物繫滯一處然匏瓜未嘗不可食而謂之不食物何也不食謂不求食非謂不可食也今俗猶言無口匏亦此類公山佛肸之召諸家之説善矣愚必以楊氏觧佛肸章為得其要盖公山之召而子路不悦夫子雖以東周之意諭之而子路之意似有所未安也故扵佛肸之召又舉其所聞以為問其自信不茍如此學者未至聖人地位且當以子路為法庶乎不失其親不可以聖人體道之權藉口恐有學歩邯鄲之患也未知是否得之人而不為周南召南横渠先生之説所以與諸家不同者何故若曰告之教之則是為之也説得為字太重經意恐不然也未知是否為猶學也今之愚者詐而已矣智則能詐愚者本無智巧也何故能詐如狂不直侗不愿之類予欲無言盖夫子以子貢專求之扵言語之間告之此以發之子貢未能無疑故夫子曰天何言哉四時行焉百物生焉盖欲其察之扵踐履事為之實也程子所論孔子之道如日星一段雖引無言之文然其大意却似説無隠之義至其言猶患門人未能盡曉故曰予欲無言夫恐其不能盡曉當更告之而曰予欲無言何也或曰予欲無言一章實兼無隠乎爾之義盖四時行百物生所謂無隠也程子之説盖推眀夫子啟發子貢之意欲其求之扵踐履事為之實者未知是否恐人不能盡曉而反欲無言疑得甚好更熟玩之當自見得分眀也四時行百物生兩句自為體用盖隂陽之理運行不息故百物各遂其生聖人之心純亦不已故動容周旋自然中禮未知是否有此意宰我逰聖人之門而有短䘮之問不類學者氣象諸家之説或謂至親以期㫁而宰我欲質其所知有疑而不敢隠所以為宰我盖欲聞其過也炳以為宰我在聖門雖列扵言語之科然哀公問社而有使民戰栗之對方晝而寝夫子有朽木糞土之譏觀其地位如此則宜有短喪之問也未知是否短䘮固是不仁然其不隠不害為忠信此一事而兼有得失得失又有重輕年四十而見惡焉其終也已聖人立言之意固是勉人及時進德然鄉人之善者好之其不善者惡之茍有特立獨行之士不狥流俗衆必羣嘲共罵何為而不見惡學者亦不可不知也未知是否見惡亦謂有可惡之實而得罪扵能惡人者非不善者惡之之謂也柳下惠三黜而不去其言若曰茍以直道事人雖適他國終未免三黜若肯枉道事人自不至三黜又何必去父母之邦觀其意盖自信其直道而行不以三黜為辱也此其所以為和而介與若徒知其不去之為和而不知其所以三黜者之為有守未足以議柳下惠也未知是否得之接輿歌而過孔子盖欲以諷切孔子孔子欲與之言則趨而避之孔子使子路問津扵長沮桀溺固将有以發之而二人不答所問傲然有非笑孔子之意至扵荷篠文人知子路之賢則止子路宿殺雞為黍而食之見其二子焉其親之厚之如此孔子使子路反見之則先去而不願見矣數子者若謂其無德而隠則徉狂耕耘以避亂世澹然不以富貴利達動其心而確然自信不移若有所得者若謂其無故而隠則危邦濁世道既不行亦未見其必可以仕也特其道止扵歸潔其身而不知聖人所謂仕止久速者知所謂無可者矣而未知所謂無不可者也故其規模氣象不若聖人之正大若以素隠行恠視之愚意未知是否無道而隠如蘧伯玉柳下惠可也被髪佯狂則行恠矣沮溺荷篠亦非中行之士也柳下惠為士師三黜而不去所謂降志如不去之類所謂辱身如三黜之類然聖人列之扵逸民者不知扵何處見得桞下惠遺逸處見上君子不施其親謝氏曰對報之謂施如親黨特無失其為親而已豈有施報往來之意也謝氏之意不眀竊意其説若曰君子所以厚扵親黨者特欲不失其親親之義而已豈有施報來往之意猶言豈望施報來往也其説與經文不通炳所録或問觧此段内有兩句云人之所以害其親親之恩者其失在扵望報而不在扵施炳謂施字上漏却不字未知是否謝説不通故或問中辨之文意分眀不脱字也眀道先生云人生而静以上不容説才説性時便已不是性人生而静以上何故不容説才説性時何故已不是性未眀其㫖不容説者未有性之可言不是性者已不能無氣質之雜矣一答李孝述繼善問目孝述甞求夫心之為物竊見大學或問中論心處每每言虚言靈或言虚眀或言神眀孟子盡心注云心人之神眀竊以為此等專指心之本體而言又見孟子舉心之存亡出入集注以為心之神眀不測竊以為此兼言心之體用而盡其始終反覆變態之神夫其本體之通靈如此而其變態之神妙又如此則所以為是物者必不囿扵形體而非粗淺血氣之為竊疑是人之一身神氣所聚所以謂之神舎人而無此則身與偶人相似必有此而後有精神知覺做得箇活物恐心又是身上精靈底物事不知可以如此看否孝述又嘗求所以存是心者竊見伊川言人心作主不定如破屋中禦宼又云如一箇翻車每每教學者做箇主或云立箇心又云人心須要定使他思時方思乃是眀道亦云人有四百四病皆不由自家則是心須教由自家以此似見得心雖是活物神眀不測然是自家身上物事所主在我收住後放去放去後又復收回自家可以自作主宰但患不自做主若自家主張着便在不主張着便走去及才尋求着又在故學者須自為之主使此心常有管攝方得又常求所以為主之實竊見伊川論如何為主敬而已矣又似見得要自做主宰須是敬盖敬便收束得來謹宻正是着力做主處不敬便掉放疎散不復做主了孝述扵存心工夫又粗見如此不知是否理固如此然須用其力不可只做好話説過又當有以培養之然後積漸純熟向上有進步處孝述按大學章句云眀德者人之所得乎天而虚靈不昧以具衆理而應萬事者也竊疑人得正且通之氣故心體中虚虚則靈如水之清火之眀鑑之光皆是體虛所以透眀心亦然濂溪云静虚則眀眀則通似亦可見近驗之扵心則日用間覺得一事累心便有滯礙更不通快是以竊恐虚故靈心惟虚靈所以方寸之内體無不包用無不通能具衆理而應萬事但以氣禀物欲之私有以昬之而不得全其虚靈之本體故理之在是者遂有所蔽而應事接物亦皆雜以私欲不盡出扵義理之正是無以具衆理而應萬事矣學者之學恐只是求去其氣禀物欲之昏以復其虚靈之全體盖心既虚靈則寂然不動感而遂通扵所謂具衆理而應萬事者得矣是以大學之教以眀眀德為主章句或問之言眀德必以虚靈為質其言眀德工夫又不過欲全其虚靈之體言存養則曰聖人設教使人嘿識此心之靈而存之扵端荘静一之中言格物致知則曰人心之靈莫不有知而欲其表裏洞然無所不盡言誠意則曰人之本心至虚至靈衆理畢具而欲其應物皆由此心以發而無所雜言正心則曰心之本體湛然虚眀而欲其順應事物而無所動言修身則曰隨事省察之以審其當然之則似亦主虛靈者為説徹頭徹尾許多工夫皆欲全此心之虛靈以融㑹衆理酬酢萬事而已以此觀之恐虚靈不昧乃心之所以為心而聖學之基本也不知是否同上孝述覺得間嘗心存時神氣清爽是時視必眀聽必聰言則有倫動則有序有思慮則必専一若身無所事則一身之内如鼻息出入之麄細緩急血脉流行間或凝滯者而有纎㣲疾癢之處無不分眀覺得當時别是一般精神如醉醒寐覺不知可以言存心否理固如此然亦不可如此屑屑計功效也孝述自覺心放時精神出外更不自知如夢然才知得放時即是心便不放了如知得夢時即是夢覺孔子言我欲仁便是仁至似亦此意故日用間覺得直湏謹操持勤檢㸃盖操持容有懈時若不測地猛省起来則其懈時之放自不得逺去且不得久去如此維繫之久恐此心只得住裏面如欲睡底人湏自家打起精神不可放倒間或精神倦時不覺坐睡又自家擺灑起來不容睡著每每如此自是睡不得愚見如此不知是否是是但説太多了孝述謂健有為順無為二者隂陽動静之分仁禮之為健義智之為順竊疑仁之發即有怵惕惻隠之意動扵中頑然不動即為不仁禮之仁即有恭敬辭遜之容著扵外故仁恐為動之始動静恐皆以漸致猶春之生物萌芽甲拆方動而㣲禮恐為動之極猶夏之長物而長短小大莫不盡見義則所以制仁禮之宜盖即其中而為之裁制使隆殺厚薄各適其分似有裁節又收歛之意雖畧有所為其亦嚴且約矣智但分别是非當否畧無作為又所以為動之本而仁禮之所由發也故義恐為静之始猶秋之收而去華就實智恐為静之極猶冬之藏而歸根復命妄意推測如此不知是否此元亨利貞所以循環之無端也横渠先生曰虛静者仁之本亦此意孝述又見先生答黄寺丞健順仁義禮智之問云有分而言之者有合而言之者孝述扵分而言者已隨愚見陳扵上矣復以合而言者求之竊意仁義禮智若以用言則有有為者有無為者故仁禮為健義智為順若論其所以為是四者之實則仁是人之不忍之心似有柔順之意禮之品節一定而不可易似有隂静之意二者恐是健中有順義之裁制方嚴似有剛㫁之意智之周流不滯似有陽動之意二者恐是順中有健扵此可見隂陽本不相離之意不知是否當時之意恐謂分則為四合則為二耳然如所説又自是一意即所謂水隂根陽火陽根隂者孝述又謂木火之為陽動金之為隂静皆可言若水當為隂静之極然水流而不息未見所以為至静處不知當扵何處觀之水寒火熱水下火上其為動静之分者眀矣孝述妄謂五常是五行之德五行之氣其行扵天者固未易見若質之在地者竊疑與德之在人者無往而不相配今隨愚陋所見言之五常之未發則本體中存恐如木之在山火之在燧金之在礦水之在地土之未動及其既發而有惻隠羞惡恭敬是非誠實之情恐如火之出而炎上水之流而潤下及由其情充積成行如仁之為孝為弟為睦為婣之類恐如木之為棟梁榱桷火之為燈燭炬燎金之為刀斧盤盞水之為池沼江海土之為塼瓦墻壁故五常之未發只可謂之五常而不可以萬行名及其發而成行隨在不同則各隨其所成之行名之而不得復以五常名矣恐如五行之未動只可謂之五行而不可以它物名及其動而為物有萬不同則各隨其所成之物名之而不得復以五行名矣但方其為五常之性也而萬行之理已無不包及其為萬殊之行也而五常之體亦未嘗不存恐如五行之方具而萬用之質已無不全及其為萬殊之用而五行之體亦未嘗不立極而言之則人道周乎四海無非五常之為如物充乎地上而無非五行之為凡此雖未知是否似皆説得去但木之曲直金之從革土之稼穡皆待人為而仁之惻隠義之羞惡信之誠實皆發扵性之自然相配不得又土之稼穡與孝述所謂為塼瓦之類又説不上不知五行之與五常本不可如此牽合耶為復可以配説而未得其説耶仁之行固有可言若義禮智信之行皆未見其實然可指之目得非四者之行無往不在而不可一一强名耶區區求之而未得其説萬物雖不可以五行名然其分各有所屬則亦未離其類也萬行之扵五常亦然從革曲直稼穡是亦本性之發非人之所能為也若曰人為則胡不能使木從革而金曲直乎孝述妄謂仁義禮智之施恐皆自吾身始次親次民次物仁恐始扵愛身禮恐始扵敬身義恐始扵制此身之宜智恐始扵眀此身之禮盖不愛其身則是自絶故必不愛親而亦無以愛親不敬其身則是自賤故必不敬親而亦無以敬親至扵義智皆然妄意如此不知是否身者仁義禮智之主不可書書字疑當作言施由此始以有子孟子之言為仁之本仁義之實者觀之其當自親始可見矣孝述妄謂仁義禮智合而成行其發也竊疑先智次仁次禮次義且就身言之恐必知此身受形所自而四肢百骸血氣皆相貫属吾所當愛然後有自愛之心知愛之而不忍傷則必敬之而不敢忽愛敬既生方可裁制其宜以全愛敬之道若獨指心而言亦恐必先知此心至靈至貴為一身之主然後自愛既愛之而不肯甘心放棄則必嚴敬自持而惟恐以慢易失之既愛既敬然後有可得而裁制者盖愛而失宜則或至枯守不用而為虚無寂滅或只知養䕶而不能痛自克治反非所以為愛敬而失宜則恐持之太甚而有把捉不定之患反不得其所以為敬此愛敬各有其宜而必有㫁制之者然未愛未敬則恐無所施其裁制之道自暴自棄則又無復荘敬自重之心不知身心之當愛則恐雖傷之而頑然不省豈復有自愛之意區區之愚所以疑是四者之發必有次第而不可紊也若未發之前則四者之體渾然在中不可謂先有此而後有彼但方發之際勢必有序無雜然並發之理然知識一開則餘三者踵乎其後自有不容己者是以既發之後則即其一行之中而四者之實無一不在以其本一理故也若以四時言之則恐智為冬藏仁為春生禮為夏長義為秋成歸藏者發生之本發生者長養之漸而生長又所以為收成之體也夫四時者五氣之布五氣之生定扵其初恐非至此而序生但氣之流布則其序必如是而後可然冬令既行則三時之㫁起亦有不容遏者是以造化既成之後則即其一物之㣲而五氣之功無一不在以其本一氣故也以此觀之則仁義禮智合而成行其發之先後亦有可言者妄意如此不知是否此即前循環之說然説得太破碎又不好且静以養之可也大學或問云以理而言之則萬物一原固無人物貴賤之殊以其氣而言之云云是則所謂眀德者也孝述竊疑人物之性有偏全之異者不知是受得本同但做處不同為復是受得本不同乎按伊川云天所賦為命物所受為性恐是受得已不同盖理之在天本只是一箇渾然全體但人物隨形而受故受得來别人得形氣之正故承當得盡物得形氣之偏故承當不盡偏底物事難為有全底道理孟子集注論生之謂性處云以理言之則仁義禮智之禀豈物之所得而全似亦此意人之形體受盡得這道理所以亦做得這道理盡物之形體受不盡這道理所以亦只隨其所受做得更就其做處言之人得形氣之正故心虚而體全心之知覺便周流貫徹在處通得去形之運動便千變萬化是般做得去是以扵其理之精㣲知亦知得盡做亦做得盡人之所以可為堯舜可參天地皆為有此體質儘做得但患不為或為之而有不充却無不能之理孟子謂王之不王非不能是不為與所謂有是四端而自謂不能吾身不能居仁由義恐皆是安扵不為者物得形氣之偏故心塞而體拘心之知覺便拘礙而不能通形之運動便短狹而不能周是以扵此理之本體知亦知得淺狹做亦做得淺狹被形氣局定更開不來所以求為人之所為不得如慈烏父子螻蟻君臣之類若論父子君臣之道豈止如慈烏螻蟻之為但此二物所知只止此所能亦止此更去不得了就其所得之分言之如此恐又是人與物做得别處然又有可疑者盖物雖受此理不盡若隨其所受而發則仁義禮智須皆做得出來然所舉二物又每物只做得一般道理出不能相兼以通其全如此者恐是物所得之理既不能盡其全體又為氣昏隔在裏面發處復不能充其所得之分劑是則容有得為而未為者此二物又是昏塞中各有一㸃眀處所以各發得一般道理特特著見扵其他道理便全微了至其餘物又或不能爾此可見物之氣禀又自有不齊處此等性命之説固不當妄意揣量然湏畧識其梗槩方隨所見寫呈乞賜開示大端使知所向而求之庶乎其畧識矣既是不曾受得自是不能做得更不湏説然横渠先生亦説人有近物之性物有近人之性者又是一理如猫相乳之類温公集中亦説有一猫如此而加異焉此其賦性之近人而或過之但為形所拘耳亦可悲也又云然扵其正且通之中又或不無清濁善惡之異故其所賦之質又有智愚賢不肖之殊孝述竊謂隂陽五行搃其大全而言之則恐同出一本而人物均禀焉所謂人物之生必得是氣然後有以為百骸九竅五臓之身是也若别其體則恐一氣之中有偏正兩等而為人物貴賤之分所謂得其正且通者為人得其偏且塞者為物是也至極其變則恐偏正之中又自萬殊而為人品物品之分所謂扵其正且通之中又不無清濁羙惡之異故其所賦之質又有智愚賢不肖之殊者是言人品之異也盖體之既分則固一定而不可易矣然恐是氣之運一息不留所以俄頃之間變為萬状彼人物之生各隨其所值以為體是固不能齊也但用變而體不變故人之所禀雖或至濁至惡而所謂正且通者未嘗不在而其為濁惡又自是一般與餘氣之濁惡不同以其是正且通之濁惡故其濁可澄之為清其惡可易之為羙既清既美則所謂正且通者即得其本然之正矣鳥獸草木各以類分而每類中又有等色不同然其形聲臭味各不能變其本體則亦與人相似但人能自化物不能自化耳妄意推測如此不知是否此大槩然矣亦宜并以上章之意推之孝述謂美惡恐即通書所謂剛柔善惡竊疑清濁以氣言剛柔羙惡以氣之為質言清濁恐屬天剛柔美惡恐屬地清濁屬知美惡屬才清濁分智愚美惡分賢不肖上智則清之純而無不美大賢則美之全而無不清上智恐以清言大賢恐以美言其實未嘗有偏若中庸稱舜知回賢是也下此則所謂智者是得清之多而或不足扵美所謂賢者是得剛柔一偏之善而或不足扵清扵是始有賢智之偏故其智不得為上智其賢不得為大賢雖愚不肖恐亦自有等差盖清濁美惡似為氣質中隂陽之分陽清隂濁陽善隂惡故其氣錯揉萬變而大要不過此四者但分數參互不齊遂有萬殊不知是否陳了翁云天氣而地質前輩已有此説矣孝述又疑氣之始有清無濁有美無惡濁者清之變惡者美之變以其本清本美故可易之以反其本然則所謂變化氣質者似亦所以復其初也不知是否氣之始固無不善然騰倒到今日則其雜也久矣但其運行交錯則其美惡却各自有㑹處此上智下愚之所以分也又云然而本眀之體得之扵天終有不可得而昧者云云所以使之即其所養之中因其所發而啓其眀之之端也孝述竊謂覺是人之本心不容泯没故乘間發見之時直是昭著不與物雜扵此而自識則本心之體即得其真矣上蔡謂人湏是識其真心竊恐謂此然此恐亦隨在而有盖此心或昭著扵燕閒静一之時如孟子言平旦之氣或發見扵事物感動之際如孟子言人乍見孺子将入井皆有怵惕惻隠之心或求之文字而怡然有得如伊川先生所謂有讀論了後其中得一兩句喜者或索之論講而恍然有悟如夷子聞孟子極論一本之説遂憮然為間而受命凡此恐皆是覺處若素未有覺之前但以為已有是心而求以存之恐昏隔在此不知實為何物必至覺時方始識其所以為心者既嘗識之則恐不肯甘心以其虛眀不昧之體迷溺扵卑汚茍賤之中此所以汲汲求眀益不能已而其心路已開亦自有可進歩處與夫茫然未識指趣者大不侔矣故孝述竊疑覺為小學大學相承之機不知是否所論甚精但覺似少渾厚之意知止而后有定定而后能静静而后能安安而后能慮慮而后能得孝述謹按章句以物格知至為知止意誠以下為得所止又或問以定静安為知之所以得之故孝述竊疑定静安在物格知至之後意誠以下六事未然之前慮則在意誠以下六事将然之際如此言之則定静安慮在知止得止之間似皆有可實之處不知是否觧中似已有此意矣孝述又按或問云不有以知其所當止之地則不能有以得其所當止者而止之又云知是知其至善之所在得是得其所止之地而止之孝述竊疑知是知之在彼得是得之在我得則心理俱融理為我有得恐亦只是知不可便指為已止其處但恐知虚而得實才得之則身亦隨之矣妄意如此不知是否知與得兩事經文可見孝述竊疑既知之後復有所謂慮而後得者恐知是知之至慮是審之詳夫物格知至則萬理貫通固無不知其至善之所在然恐身有未接則其義理精微容有毫釐之未察或所接之際事復異宜故必扵此精加審慮然後始無纎微滲漏之處此知後必慮然後為審不知是否定静安是未有事時胷次洒然慮是正與事接處對同勘合也致知在格物孝述竊謂人之本心至虚至靈無所不照但以氣禀物欲有以蔽之是以其眀不能不昏欲開其眀湏藉事物之實以運其知思然後其眀有可通之理盖心既有蔽無從下手以開之所以窮究物理者恐是因窮究其所未知而将此心戞刮擦磨治其麄鄙而反覆往來求出其眀是以研窮之深其眀必将穿漏而出而物之理亦無所遁矣此其所以能格也伊川先生曰思曰睿思慮久後睿自然生又曰致思如掘井初有渾水久後稍引動得清者出來久自眀快其説似皆以為人心之眀既有所蔽湏即事致思然後其眀自出孝述恐所謂致知在格物者亦有此意盖窮至事物之理即所以推極吾之知識也不知是否理有未眀則見物而不見理理無不盡則見理而不見物不見理故心為物蔽而知有不極不見物故知無所蔽而心得其全孝述竊疑心具衆理心雖昏蔽而所具之理未甞不在但當其蔽隔之時心自為心理自為理不相贅屬如一物未格便覺此一物之理與心不相入似為心外之理而吾心邈然無之及既格之便覺彼物之理為吾心素有之物夫理在吾心不以未知而無不以既知而有然則所以若内若外者豈其見之異耶抑亦本無此事而孝述所見之謬耶極是或問云或考之事為之著或察之念慮之㣲孝述竊謂事為是身之所履善行之著處念慮是心之所發善端之萌處扵此考察則心亦不遺可以得理之真實然當事為念慮之時又欲着心考察則是一心二用互有妨礙似難扵着力然或問又云人之眀德全體大用無時不發見扵日用之間人惟不察乎此是以汨扵人欲而不知所以自眀孟子集註云衆人雖有不忍人之心然物欲害之存焉者寡故不能察識而推之政事之間則又似必着意體察然後有見孝述恐所謂考察是此心常常反求不教外馳心存而不外馳則精神知覺常只照管自家歩歩不離所以事為之形念慮之起自然黙有所見若此心尋常逐外不自管顧則雖間或真心見前亦不知其所發非是臨時以此心為之而又以此心察之也若齊王愛牛孟子屢發之使反求其所以然却在既發之後儘可着力追求意不相妨恐又與當事體察不同以此觀之則此所謂考察既以當事言則似不可重㸔孝述愚見如此不知是否不必如此説只是隨處理㑹是與不是以為取舎向背之決耳又云昔聞延平先生之教云云雖其規模之大條理之密若不逮扵程子孝述竊謂規模之大條理之密恐如序所論經文外有以極其規模之大而内有以盡其節目之詳者規模之大恐自積習既多然後脱然有貫通處以下四段即是盖舉其始終全體而言條理之密恐是物必有理皆所當窮以下六段與前所謂讀書論人應事數端即是盖備夫工夫項目而言之先生謂其為説逺近虚實大小精粗無不兼盡而復分先後緩急恐亦言其條理之密不知是否只是如此誠意孝述妄謂人之本心得之扵天初無不善所以有不善者恐是人為逆之也試以動静驗之静者天動者人是以静則無不善動則常有不善使其如伊川所謂動以天焉則恐仍只是善奈何其不全以天而必雜以人遂流扵不善今求其實而言之人心未發無為思則其本然之體渾然在此人更不曾動着似即南軒所謂天心者是時安得有不善來中庸所謂喜怒哀樂未發謂之中樂記所謂人生而静天之性伊川所謂其本真而静五性具焉又云喜怒哀樂未發何嘗不善又云心本善恐皆指此心而言也及其既發有思有為即屬之人既屬之人即是氣質為之若質純粹則惟其所發無往不與理俱故本然之性得以順達而無害若有偏駁則其偏駁之發即與理相違至其知思嗜好感物而生者又多求快血氣之私而不由義理之節故本具焉又每每為所拂害不得沛然順發曩時之善至是遂流扵惡矣甚則窮人欲滅天理曩時之善盡反而純扵惡中庸所謂發而皆中節謂之和樂記所謂感物而動性之欲以及夫好惡無節而天理滅孟子所謂人性之善猶水之就下其可使為不善猶水可使過顙在山濂溪所謂五性感動而善惡分眀道所謂性善猶水之清其繼猶水之流有流至海而終不濁其次有逺近有多少清濁雖不同然非善與惡在性中為兩物相對各自出來伊川所謂其中動而七情出情蕩而性鑿又云發而中節則無往而不善又云發扵思慮則有善有不善先生所謂心體本静然亦不能不動其用固本無不善然亦能流而入不善見印行文集恐皆指心之動處言也夫静則善動則有不善是心本善而人每拂之為不善聖人之所以有教衆人之所以有學恐只為此濂溪云聖人立教俾人自易其惡自至其中而止伊川云學問之道無他唯知其不善則速改以從善而已横渠云領惡而全好必由學又云為學大益在自求變化氣質則所謂教所謂學只是去其惡以全其善耳若其𦂳切着力處只在此心發動之初盖私欲之根既埋伏在内不動則已才動便牽引起來勢之所必然者真心之發其間常有私欲夾雜不能得純一此處雜了前面便流行不去是以必扵此處清本正源使人欲浄盡查滓不留則自此以往天理流行更無梗拂而扵其本然者得矣學必以誠意為要竊恐謂此妄以或問之意如此推測是否説得太多然却未見誠字之意孝述按孟子言上世有見親暴露者其顙有泚而非為人泚中心達扵面目又云人乍見孺子将入井皆有怵惕惻隠之心非為内交要譽惡其聲而然竊以為此等是惻隠之心發得實處楊震莫夜遺之金而不受上蔡自負記問聞眀道玩物䘮志之譏遂汗流浹背面發赤竊以為此等是羞惡之心發得實處張湛居幽室必整遇妻子若嚴君竊以為此是恭敬之心發得實處孔子誨子路知之為知之不知為不知范氏云是曰是非曰非為直竊以為此是是非之心發得實處人心之發每每如此而無所雜方是誠意若見賢而不能舉舉而不能先見不善而不能退退而不能逺與第五倫兄子嘗病一夜十往退而安寝子有病雖不視而竟夕不眠竊以為此等是意未誠處不知是否未親切孝述妄謂顔子之樂恐在克復之後已過此闗克盡己私故日用間是這道理在胷中平鋪地順流将去無分毫私欲為之梗拂故不待勉强作為自無往而不與理相周旋所以觸處皆樂雖行乎窮途逆境亦只如此曾不改吾樂焉曾晳之志恐是其胷中脱洒畧無繫累遐想其動静語黙之節反覆其所陳之志似把這道理做家常茶飯相似日用間只如此平平地順行将去似将使萬事萬物各止其所而吾心蕭然畧不用意作為扵其間亦見夫此理所以天然自有觸目皆然自可坦然順適不假作為故也如孝述自覺是初學不曾窺見一分半分道理便妄自警喜把來􅎑劵行時本不自在間只是分付着意似要扵道理上加添些做與這氣象天淵不侔若曾晳可謂真知其為天理但伊川則謂其雖知之而未必實能為耳漆雕開之未能自信恐是正在此處着力過闗未得竊疑其雖未盡見是理自然流行之妙而扵本然實體固已識之但恐識認未至真的又自度此心了他未下然亦可見其直要扵打鬬處下死工夫勝過去不但及此而遂已也孝述妄意揣料如此不知是否漆雕開恐不止如此孝述近來自覺此心分眀如有物䝉蔽在内若以存養言當其放時固是紛紛擾擾全無是處其知把捉時覺得此心在此不曾從他處去但依舊蕩漾糊塗䝉䝉然要光不能得光及至忽然清眀時方是襟懐開爽耳目聰眀氣象逈别若以窮格言當其求而不得時固是茫然無入處昏懵之極至反覆尋求以揣約得大意又依舊覺得隔了一重更發不破又至暫時㸔得發時方識認稍眀心地方開若以誠意言則日用間身雖物接而此心頑然不動時是全然昏隔了有隨接便動時亦有徐徐畧省而後動時動如在親前有愛心在長上之側有敬心但其愛敬意就間發得些又只據見在休了雖欲勉進自是做得來無意味是時心依舊昬有時忽地感悟動得别時其愛直是真切其敬直是嚴畏非有所强而自不能已是時心方大眀故存養而至扵心地眀爽窮理而至扵識認分眀誠意而至扵真心發見如此者極是少三者之中意誠時尤少每日省来覺得白日在夢明道先生所謂醉生夢死伊川先生所謂未知道者如醉人恐可説此雖知得是夢要教醒只是不能得醒如此者豈非質昏之甚而難開汚染之深而難滌耶仰惟先覺憐而教之無使終陷則不勝願幸但且着實持守不須如此想象計較作弄恐思慮過當别生病痛孝述又自覺質弱心極易動日用間才有小小得失便過喜過懼此心全體動了雖欲自家做主更做不在以至在喧雜繁擾之地多處置不下甚至扵亂大槩覺是氣怯而志復無以帥之不知治此病痛孰為要切只此便是病根前説正慮其如此耳孝述曩以先兄在嫡未及有子而没疑扵所主䝉賜教云若已立後則無此疑但復有曲折先兄嘗收一襁褓之子為嗣既没孝述以其未勝䘮又别無同居長上遂自主䘮才兩月而此子卒曩時之問正此子巳卒之後孝述遂不曾言及先兄将葬孝述復求從兄之子為之後亦在襁褓孝述仍前自主祠板之題只從弟稱及領尊教始悟其非猶有不能勝䘮之疑聞之伯量亦云嘗以此問先生先生答云有攝主又按䘮大記云子㓜則以衰抱之人為之拜是當以所立之子主䘮而孝述為之攝自是即欲俟練祭換栗板時易題所稱復有他慮先兄之後固為宗子之子今既收立不知亦謂之嫡孫否若可謂嫡孫則廟祭當使之主又未知襁褓之子即可主祭為復待其成人或少長方可若即可主祭則今日祠板之變固合異日遷廟之稱矣如或未可則今日易從子稱異日復易從弟稱有瀆慢之嫌又按䘮服小記云婦之䘮虞卒哭其夫若子主之袝則舅主之所主不同而各有所宜既不嫌數更則異日再易祠板所稱恐亦無害又衆議以為必從㓜子主之理勢方順孝述扵換栗板日已更稱矣不知是否攝主但主其事名則宗子主之不可易也細考曾子問諸説可見孝述又疑㓜子若即可嗣主宗祀則異時納主恐即據主祀之子祧逺祖矣若未可主祀且從孝述主之則異時所納之主即為旁親不知旁親當别設位而有祧為復只祔扵祖而無祧納主旁親之説未曉所謂可更詳之孝述議親十年展轉牽制尚未成畢老母欲令今冬畢親但先兄几筵未徹老母乃齊衰三年之服復有妨礙然主婚却是叔父欲姑從鄉俗就親不知可否若就畢挈歸凡百從殺衣服皆從素淡不知可否若叔父主婚即可娶婦無嫌禮律皆可考也但母在而叔父主婚恐亦未安可更詳考也孝述謹按禮婿将親迎父醮而命之今孝述父兄俱没上惟母在旁尊有叔父不知往迎之時當受母命耶為復受叔父之命耶當受命扵母然母既有服又似難行記得春秋隠二年公羊傳有母命其諸父兄而諸父兄以命使者之説恐可檢看為叔父稱母之命以命之否更詳之更以上條并考之孝述又按禮婦盥饋舅姑若舅已没不知可以叔父受盥饋禮否叔父無盥饋之文盖與姑受醴禮相妨也母若有服則亦難行此禮要是本領未正百事俱礙耳晦庵續集卷五晦菴别集原序昔我文公㑹粹程氏門人所録之語以為遺書且謂其於二先生之語不能無所遺復取諸家集録参伍相除得十有一篇以為外書誠不忍儒先片言隻字湮沒無傳而天下之理有所欠闕也文公先生之文正集續集潛齋實齋二公已鏤板書院蓋家有而人誦之矣建通守余君師魯好古博雅一翁二季自為師友搜訪先生遺文又得十卷以為别集其標目則一倣乎前而每篇之下必書其所從得且無外書不能審所自来之恨真斯文之大幸也鏞於君之長子謙一為同舍郎亦嘗預聞蒐輯之意兹來冒居長席而余君適将美解始川兩卷餘以見囑於是節縮浮費以供兹役盖又二年而始克有成後之學者能於是書句句字字深思而熟翫之庶有以知其無非精義宻理之所存毋使摹刻既多束書不觀乃貽或者之誚云咸淳元年六月朔廸功郎建寜府建安書院山長黄鏞謹書欽定四庫全書晦庵别集卷一宋朱子撰書時事出處劉共甫珙以下建陽胡徳方家藏伏奉教帖甚慰乆不聞問瞻仰之意然此書之後傳聞動静千條萬端皆非村落所得詳此兩日忽聞有全蜀之命意其是乎未得其真未敢遽奉慶也行期定何如若果西去能畧歸鄉曲否此却未須遽行但亦當求對向來聖錫正如此也若所傳非的當奉行前詔則交印後似却不必迂路來歸只令平父來臨川上下迎侍以歸足矣二姦雖去氣象全未迴盖上心猶以向來所為為是未有敢乘此痛言其非者昨告邦彦以所當論者惟獨斷二字頗以為然又未知果能發之否間讀陸宣公奏議一一切中今日之病試取一讀從容前席為上一一談之當有助耳若果造朝以亟行為上早得一日是一日事然今已似太遲若更過此則又無可説矣惟近臣愛君體國之義想又非畎畆縷縷之比固不當以私計之安便為先而後圖之也聞欽夫亦勸行果爾又無疑矣程集及諸書拜領厚意但誤字處更不吝修改為善畧讀所改數處似少吝矣如何如何李先生碑額試煩問子駒不知可為别寫數字示及否比及宗禮歸到又須數月其家早欲成就已先刻銘文只俟此字耳騃病之說不記前書拜稟云何誨諭之及乃知僣率之為咎然所自比乃爾豈故人之望耶劉共甫竊承延登廟堂參貳樞筦君子之仕至此亦可謂得時得位可以不負其所學矣逖聞眀命贊喜亡涯某去月六日始得離長沙與敬夫同行謁魏公墓下遂登祝融絶頂已乃東歸至儲州始分手盖講論之樂向未曽有别去殊憫然也至醴陵始微聞兄有此拜至清江始得其真然伏讀十一月五日詔書奴詬大臣豕視庶位甚矣其間而不然也不知出兄筆否當時何不畧開諫耶自見此詔連三日寢食不安其曲折未易以一言盡大抵自此人主心益肆勢益孤賢人君子日益消縮不願立於其朝而讒謟面諛持祿保位之士益聚而肆然其無所不為矣反復念此惻然寒心中夜以興不覺歎咤此殆聖主思之未熟而奉令承教之臣與有責也不知比來訏謨之際頗亦及此語否失之於前尚可捄之於後願益思所以矯正之術而亟諫之某嘗譬之人子事親之道不至其於父母之顔色不和為子者當左右承順以祈悅適耶當詬詈妻孥毆擊僮隸以快已之忿耶此閭巷之人知之不待曽參孝已而後悉也至於人主事天之道何獨不然今日之為其亦異乎吾所聞矣比至豫章見蔣參政文字慨然有出身任事之意所以告吾君者粗亦可觀但不知渠本領如何若只是如此説得亦不濟事况本領若不甚正則所謂是者非所謂賢者否又如何其可恃耶聞奏請令卿監郎曹舉士限五日奏又不得發照牒此是何措置只此一事可見風采奈何奈何陳公少進有何處畫觀今日氣象雖非有危機交急之慮然大根大本處被羣小壊得八九分以上了日往月來不是小事苦痛苦痛兄與陳公素有物望非它人比今日雖未為宰相然實斷國論若只似常人遷延嵗月保持禄位以俟人主厭棄而擊逐之則非惟大失人望隤隕家聲亦豈吾平日讀書問學之意耶亦豈吾平日致身事國之意耶在常沙時未覩近詔但已不勝憂慮日與欽夫語此㡬至隕涕不知當其任者視以為何如耳願亟與陳公謀之某至豫章宿上籃寺偶復感此通夕不眠夜漏未盡呼燭作此不能既所懐之萬一欲作陳公書不暇然作亦不過如此只老兄語次達此懐足矣何以書為哉然今日之事政須為其大者論薦人材亦有次第今日逺則益州近則吳興皆第一義諦而敬夫尤不可後如某輩草野之臣則雖有憂歎之心然以義分觀之似未當出兄果相念當且徐之不須抑迫恐一旦大發狂疾彼此為不利俟兩公有成則彈冠羣彦之後殊未為晚某許多年過了豈計此年嵗間事耶此是實情相告某豈不欲及今一見眀主極陳胷中之憤懣但思之言語必有太甚處恐却悞兩公協贊彌縫之意所以斷然自誓决未敢出不獨為身亦以為親為二公為國計也千萬幸詧彭子夀龜年止堂之孫沚家藏請違後一兩日即被斥遣之命出闗恰一月始能達里門奉祠幸已得請而詞職未盡允勢須更加控免耳區區鳬鴈不足為重輕忽聞門下亦以論事去國而徳修徳夫相繼亦去為之駭然此其間必有曲折恨未得聞不審從人今何所鄉若遂赴鎮亦須暫還江西經由上饒偶便託其教官林君致此丐以數字見報比來議論本末與諸人繼逐之由林君佳士時有人往來不至浮沈也程允夫洵洪正學刋允夫家藏詞職幸已如願而忌之者以為僣瀆睥睨愈甚近日葉總章中已有姓名旦夕必有行遣矣改正恩數實無此例前此但以衆論紛紛故於奏狀中言之後來得請而復不說分眀致此事故又申省陳乞近又只得省劄檢㑹申眀已降指揮行下葢諸公不敢將上而羣小因此又益紛紛細思此舉實有未安今且未令泰兒赴銓其它姑置勿問看數月間如何又别相度也餘干寃痛莫能為申理者區區於此尤不能無愧也魏元履掞之以下胡徳方家藏㓂日深矣為之奈何諸報想自聞之此聞事甚遲方傳古藤之命未知果否誤國至此某之肉其足食乎小譴何益龜齡既起不知復作何計今日正懼狐鼠之妖蠧蝕君心此為本根之禍不去此物國勢無自而張邊備無自而立賢才無由而見任直言無由而上聞矣老兄以為如何成都全不聞近報不知到何許胡邦衡痛哭之書見之否說病證甚危急而無甚治法但顯言西帥䟦扈欲誅沈介取其首其機事不宻乃爾可怪久不聞問念念不忘適有均亭便晨起手凍作字不成㡬不可讀亦所以效顰耳一笑逐湯相陳豈非賞魏無知之功乎可笑可笑魏元履早稻既登捄恤之勞計亦少緩矣但州郡以使節將臨大為文具所至騷然而無毫髪之補此為可慮耳今嵗之事偶然無大敗闕真出天幸若只賴有位措置則今無鄉井乆矣此非面未易道也近日逐去洪邁稍快公論得劉澂父書云邂逅汪養源丈聞益州已出峽非晚到玉山矣上以其畱行討賊始甚知之不知到闕相見又如何也此事繫消長非人力所及無咎得此邦初聞甚以為喜聞邦人亦深自幸既而聞之乃不疾而速之人其殆禍吾州乎又非徐老之比也芮漕通書否不相怪否此諸公只好閒處說葛藤緩急實難仗也此三五日來始無閒擾稍可近書册矣老兄比復作何功夫可見教否今嵗不為場屋計乎諸公薦賢之舉不知如何比扣芮語頗悠悠不知今已發奏未也魏元履邊報如所示乃可慮此傳聞復不然云已破虹縣靈壁兩城禽其魁帥得其積穀十餘萬斛不知孰是前日得先生書云鈆山見報亦如此所聞也史去而辛洪皆遷國論未知所定非草茅所得憂但願天意悔禍有以發悟聖心耳諫垣南榻素有直聲未聞有以大慰人望者何哉有所聞續以見示幸甚令子為學督之不敢怠但良亦費檢束耳因書更切教戒令稍尊重為佳魏元履共甫書與子飛云李顯忠聞殿帥之除知為奪兵罷黜之漸有尹機者說之曰今魏公銳志恢復而諸將莫敢前者姑以是自薦公必喜而見畱然計其才力未能舉事是我以空言而獲實利也顯忠悅言於公如機指意公果然之而不復計其力之未能大舉也上疏出師廷議莫以為可而上意向之不可奪詔報公即行顯忠與邵宏淵合兵入宿州宏淵欲散府庫以賚將士而全軍以歸李不可遣宏淵出城措置而盡有其金帛以馬載還其家已而置酒髙㑹官妓人予白金一兩士卒人予錢三百軍士大怒㑹敵騎至城下衆莫肯戰揚言敵盛不可當且欲圖之顯忠惶遽遂走失亡七八千人七萬人出寨還者六萬餘而軍資器械盡没幸是日大霧敵人不知我師之遁故無他不然㡬殆然敵人冒火暑奔馳赴捄人馬踣於道者相望也入宿州後事寛甫書所報也書亦云上意猶向魏公但不知相湯公遣楊存中罷王龜齡又何意耳平甫云家書中言初聞宿州之潰不得其由朝廷震駭疑二將降北徳夀以二將皆楊舊部曲遣往招之故有此命後省初欲論駁而亦不知所以為他計者遂止不知果然否邵宏淵劉寳分䕶淮東西不知復如何守險之說未為不然但不知所以為自治之計如何耳但守與和二字相似不知為是說者於此能别異之否愚謂今日之憂不在邊境正惟廟堂議論弛張黜陟乃折衝制勝根本魏公績用不成正坐此耳吕許公謂范文正公言欲經畧西事不如且在朝廷此言深有味老兄以為如何魏元履徐嚞已罷共甫復改命三衢而朱新仲來為泉守殊不可曉也二小使已還魏公復出江上廿八日已行矣查元章䕫漕馮方以太守少卿參議從魏請也任元受以秘閣參議亦必魏薦耳無咎除户部郎張安國以掖垣兼直詞禁王慶長閩憲想次第聞之矣但文云王瞻叔已回此又何耶陳君此間過時無尋問處渠欲陸尉書已作數字授之不知有効否觀其失業狼狽殊可憐恨不能有以處之耳孟子說向嘗編集雖已終篇但苦無人商量間因人或來問檢視之輙有不滿意處未欲傳出以誤後生也或彼中有人看此書講說有疑處令逐條抄出疑問之意便中寄示容檢鄙論為荅有不當處却告駁難即彼此有益若全部寫得未必講習却無所用耳吕子約祖儉某向來杜門本無一事而恭兄誤使此來以為到郡引疾便可得去今乃不然不意徳人亦時出此蘇張之計也近復冒昧以書懇左司曽丈意其有以察此而力言之因通家問幸啓㳟兄同為一言以助其請幸甚累書求㳟兄為記五賢祠堂未蒙見報亦告侍次語及但得數語畧記事實為幸仍須及早得之乘某未去刻石尤佳也豫章欲刻精義大字版意欲令并刻老兄所増横渠諸說此間傳録未及數篇專作此數字今後遣人就借得以付之為幸彼有教授黄君者此邦人甚向學令寫了即送來此轉寄還不妨也向伯元以下伯元之孫公永家藏衰病之餘勉强試吏遭此旱歉四顧茫然不免控告朝廷幸亦畧蒙應副目今雖似可以支吾未知來春事體又如何比及終更亦當麥熟遺此凋瘵之民以付後人耳過蒙稱許何以當之秖益慙懼然縁此一事心𠞰形瘵精力全衰百病交攻求去未得殊無好懐也子卿一見傾倒留欵三日而行識趣議論今亦少得也聞臨江沈守畱意荒政甚悉恨未得其條目而師法之今遣此人告糴其境或恐吏民有持閉遏之計者願得一言以解其紛是亦仁人之惠也向伯元到官踰年初亦粗健自秋冬來足疾發動不免廢事經界初不敢請適㑹議者及之被㫖相度不敢不盡其愚而事乆不決浮議紛然遂力求去又竟不得今雖得㫖而農事已起不可復為正當少俟秋成又未知賤跡能復㡬時於此也世路如此唯得早去乃為幸耳劉薦論事不阿近所未有亦恨太疎果墮語穽耳周南之䇿亦粗聞之然不能如來喻之詳邪説肆行而士氣不衰此乃為可賀者然前輩清議在下之説又為可慮奈何向伯元到官半嵗前月忽苦脚氣手足俱痛至今未平郡計不足循例措畫無非殃民害物之事初謂經界若行欺隠自露則可以供嵗費而能去諸色無名之賦今乃聞有隂沮之者至今未有成命次第且中輟矣在此既無所為衰病復爾交攻欝欝度日殊無聊賴已上歸田之奏矣未知進止如何萬一未遂須再請也向伯元某之賤體自四月初感風濕之氣足疾發動一卧兩月屢至危殆亟上告休之請近聞未得可報今雖未死然衰頺日甚自度不能復有補於縣官勢須再請耳辭職亦竟未允當并力懇庶必遂也時論一變非復意慮所及忠賢奔播㡬於空國而無君子矣吕子約經由曽進謁否江陵近収書否章茂獻聞欲徙居城中必時相見子卿想歸乆矣楊丈書已領不知其已趨召否今日之事凡曽在趙子直處吃一呷湯水者都開口不得只有此老尚可極言以冀主之一悟不知其有意否已作書力勸之萬一肯出經由更望一言此宗社生靈之計非小故也林井伯成季言以下井伯之外孫方之泰家藏刊帖餘干乆不得書日月愈逺令人傷歎山谷語云歸來兮逍遙西江波浪何時平真可以泣鬼神也林井伯某向來一出畧無補報罷逐而歸祇以自愧還家初亦粗遣至此夏初痼疾復動遂大狼狽意必不全亟遣告老人行已五六十日尚未有處分然病軀却幸少蘇未知竟何如也餘干屢得書處之甚安亦殊不易擇之昨日自彼歸過此尤能道其曲折始者風波甚可駭愕今却少定不知事且止於此耶或更未已也相看狼狽不能仰首一鳴深負憂愧子約一舉却甚竒特令人歎服也林井伯衡陽之報令人悲痛所幸便蒙歸骨之恩今當次第在道矣前日走寒泉與韜仲父子聚哭之極不能為懐也既無廷試從者歸期想亦不逺莫須更為過餘干否子欽後來相見否㡬道亦當赴部今或已到必相見也某詞職得請私義粗安若命懸庖厨則非人力所能避矣鄉樞相見有何言句耶因遣人上謝表附此草草方耕道耒某來此已八閱月自覺得不成行止亦不成政事徒然坐食俸禄使人慚愧然累求去不獲近又再請未知如何來喻云云極感忠愛然此意已決雖欲自强而不能又安能承命而改轍耶其曲折之詳已具南軒書中此不能多及想燕談之際當必及之耳皇甫路分意趣極不易得想同僚必相好也陳子真莆陽方楷家藏休致文字已申本郡尚未得保眀申發萬一更有遲疑即不免徑申省陳乞矣比來論議似稍寜息未知竟如何正恐不削者以耳衛公計時相見聞欲徙居盤澗若不得去相近也開正晴暖欲拏舟南下又憚經由富沙不免見諸人一畨露頭面可厭更俟計度若幸無疾病即當扶曳冒昧一行思欲見石佛懸泉之勝也劉徳脩光祖以下後溪之曽孫曽元家藏欽聞徳義有年於此中間入都雖嘗蒙枉顧然稠人中不暇交一語至今為恨如未始得見顔色也前年竊聞進登言路有識相慶繼讀邸狀又得所上章疏分别邪正眀白剴切三復􅋏然為之汗下盖乆矣莫有以此謦欬吾君之側者矣然於是時竊已深為執事者憂之顧前此未嘗得通聲問無從效其區區且又意其駭機之發近在旦暮雖欲言之亦已無及然猶懐不能已竊竊私為同志一二君子道之盖不唯欲以少效慕用之誠亦冀轉以聞於左右而求所以善其後也曽未㡬時果聞去國時在臨漳無可與話此心者燕居深念撫几浩歎而已嗚呼此豈吾人一身之休戚而造物者之意乃不可測知如此哉兹承不鄙逺貽教墨所以撫存之意甚厚自視卑薄何以克堪因便布謝適有土木之擾言不盡意伏紙増䟦劉徳脩今春既辭桂林之役幸復續食祠廩而自夏初一病迄今未愈中間㡬致委頓者數矣幸而獲免然今餘息奄奄未能復常呻吟少間謾讀舊書姑以繫思遺老耳不足為左右道也昨聞諸公於門下數有裡言而羣賢亦有彚進之勢作鎮䕫門是為東來之兆而問者所聞乃若小異雖賢者所居而安無適不樂然當典戎榦方之任以蕃衛王室為心亦豈能恝然於今日之事乎相望數千里無由一見傾倒此心引領鄉風浩歎而已某所為大學論孟說近有為刻板南康者後頗復有所刋正今内一通暇日一觀為訂其謬并以質於東溪翁因風見教千萬幸也劉徳脩相望數千里既無㑹面之期而聲問亦不得數往來每懐道義馳想亡已不審比來為况果何如統内軍民計自寧謐但前此時事傳聞多端想不能不深根本之慮今雖小定然諸公書來似已便謂無事否耳所幸仁賢萃集未至空虛朋來彚征猶有可望如門下者恐終不得辭此責也某多難餘生近日復有季婦之戚長沙除目未之敢承其間盖有小小曲折非敢決然忘此世也因風寓音不究懐抱伏紙恨恨鄉人江泰分教大府得親誨範甚以自幸其人眀敏有志於善嘗為邑宰以平易惻怛甚得民和不幸遭讒遂至罷免竊意髙眀當自有以察之収拾教誨亦或可以備使令也劉徳脩某衰晚廢學守藩亡狀忽蒙収召已不知所以然旋被除書尤非所據力辭未獲冒昧以來則承門下到闕已乆且拜螭坳之命矣正人得路羣議交慶此不待説而悉也區區只一兩日便當入門對罷方得修敬諸容面叙以罄鄙懐劉徳脩生平慕用昨幸為僚荷相與傾倒之深盖同世道之憂而非爾汝之私情也别去恰一月矣每懐徳義鄉往不忘某扶曳驅馳幸已稅駕道間忽拜江陵之命罪疾如此豈堪復出不免上奏力辭計必可得自此杜門當日有趣但恨虛辱招延無所裨補猶不能忘懐於吾君進學之淺深也因人往記目盲愈甚不能多及正逺唯冀以時珍衛勿忘致君行道之本懐緝熙光眀以扶廟社區區至懇老先生必且宿畱後便拜狀子夀千里茂獻想時相㑹前幅所云僕於二三公亦不能無厚望幸宻為言之勿以語他人也逺近人材必更有可與共賛王業者不知為誰亦望并見告也文叔行後時得書否北闗之集風流雲散甚可歎也劉徳脩忽聞去國深為悵然盖有識之士無不同此歎息而昨日機仲經由相與仰徳尤不能忘懐也今日之勢政使羣賢悉力交輔猶懼不濟顧乃為是以速之耶不審能便歸蜀耶或且宿畱江湖間耶即今已到何許也某前日始拜祠命不免復辭近職小贖前日失職之罪耳因便寓此托季章致之目昏不能多作字要亦無可言者但祝眠食之間千萬自愛耳天若祚宋彼將如我何哉東溪先生乆欲寓書今復未暇附此致瞻仰意文叔郎中前途必相見亦告為道鄙懐也集賢益孤勢難復乆然亦有以自取也劉徳脩兩辱惠書承且暫寓京口諸况便安足以為慰但比來時事大變殊駭聽聞流竄斥逐下及韋布近年以來所未有也國事至此是豈細故而身逺病衰不能一言以悟主聴愧恨悲痛不知所言伏惟執事愛君憂國當同此懐也比日不審台候何似神相正直起居當益輕健也某前月之初曽約機仲會於一山寺中為兩日之欵時未有近日事也然已不勝憂歎懐抱抑欝又感風濕歸來舊疾發動證候輕於往時而氣體積衰遂不能當藥未有効而傳聞愈甚病勢遂進不可支吾今雖未死然必無復全理已上告老之章只從本州保眀别無陳乞文字次第諸公見之意其已死必遂其請也因定叟有人在此得附此書臂痛不能作字口占亦覺氣乏不得盡所欲言自度此生決無再見之期千萬為天下國家厚自愛重乃所深望東溪先生體候何如得季章書聞亦不快深以為念文叔已别附書欲作傳之數字而建康人畱此已乆不能復俟異時相見幸為深道此意也劉徳脩昨大病中奉狀告訣今未成行且復宿畱亦可笑也然病亦氣衰終難扶持未知復有後會之期否耳單守人還奉告之辱乃聞賢兄東溪先生遽啟手足而令女亦不起疾為之怛然此在徳門固為不淑然前輩淪没使一方學者失所依歸所繫尤不細也區區鄉慕之乆去冬尚幸一見雖不及欵承教約然亦足以粗慰平生矣遡峽定在何日相望益逺非獨吾黨無以慰離索之懐未知世事終何所底止耳病中痊發狂疾欲舒憤懣一訴穹蒼既復自疑因以易筮之得遯之家人為遯尾好遯之占遂亟焚稿齰舌然胷中猶勃勃不能已也餘干數日前得書處之甚適亦甚不易只去嵗忙亂中得其書字畫言語皆晏然如平日固已服其有定力矣時相恩禮一新季章超遷甚美論功第賞固自有次序耶正則請祠竟如何相見煩為致鄙意此兩日來右臂方能屈伸未暇奉記也向見焦山瘞鶴銘側有謫丹楊工曹掾王瓉題詩詩詞甚佳字亦絶類鶴銘疑出一手瓉字已闕但据題徳夫金石錄云爾而文選詩中亦有此人名姓不知便是一人否近年乃絶不見不知今尚存否暇日試為訪之属正則摹數本寄及為幸某挂冠之請人尚未還而小報已不允勢須再請但得冷撰舊秩亦可以已矣不敢必其悉從也定叟人來因得寓此殘暑未衰萬萬以時自重不浸近而愈疏臨風惘惘王瓉詩首句云江外水不凍今年寒復遲者是也或正則已得請即以屬陳安行可也劉徳脩昨聞當有房陵之役盖甞因便拜狀不審得逹几下否但一向不聞聲問馳仰不自勝耳不審比日台候何似竊惟以道自勝無適不安神相忠賢起居萬福某衰晚疾病去秋以來足弱氣痞遂為廢人然而罪戾至深㡬亦不能自脱兹幸告休得請人謂庶㡬少安自料則亦未敢保也東方事宜計悉聞之子夀近亦通書自云頗安然士友見之多云亦覺衰瘁也從之遂為古人尤足傷歎於越得書寄示涪刻亦能道示衆語不審比來閒中何以閲日老來始覺讀書有味所恨來日無多光隂真可惜也建昌陳剛正已舊見吕伯恭稱之實竒士也不知曽相識否因其便人寓以此書所欲言者非幅紙可既聞房州山水自佳向見張巨山集說有微王峽乃微盧之微不知有傳記可考否因風幸筆示聊為廣異聞耳文叔季章想時通聞問馮校書極佳士遽爾殂殞深可惜也劉徳脩某自去冬得氣痛足病之疾涉春以來益以筋攣不能轉動懸車年及不敢自草奏又懶作羣公書只從州府申乞騰上乃無人肯為作保官者近方得黄仲本投名入社亦不知州郡意如何萬一未遂即不免徑自申省矣機穽㝠茫不容顧避姑亦聴之而已去嵗數月之間朋舊凋落類足闗於時運氣脉之盛衰下至布衣之士亦不能免令人愴恨無復生意然此豈人力之所能為也哉劉徳脩某屏處如昨近以鄉邑不静挈家入城擾擾踰月今且歸矣間讀邸報幸復聨名而賤迹區區乃先衆賢為不稱耳側聴乆之未有行遣勢不能免姑静以俟之耳度君周卿來訪志趣不凡知甞出入門牆固應如此雖已不敢隠其固陋然磨礱浸潤之功尚不能無望於終教之也劉徳脩張子真轉致去冬十一月十一日所惠書乃聞涂中患難曲折為之太息吾人運數如此向來乃欲妄意以扶顛持危為己任豈不誤哉比日伏想税駕里門休息神觀乆矣某辭職終年幸蒙聴許而諸人睥睨其勢愈急前日正則之疏已行旦夕必當次及矣餘干竟以柩還卜以此十日葬矣寃哉痛哉聞有為之賦詩摹印揭之都市而匿其名者不知亦傳到蜀中否得其子壻書云道間渴甚誤服凉劑遂不能食又感風寒遂至大故臨行亦甚了了然向更不死今必已度嶺矣前日聞訃因就其壻家哭之聞要路已有切齒者亦且得行止分眀也傳之云亡深可傷歎文叔竟成之郡否平父比亦得書去住無䇿甚可念也季章得書每以丐外為言而未有聞恐是求之不力如王興之雷孝友亦何甞有人苦畱之耶李端甫以下見蔡乆軒所刋慶元書帖聞小豸既逐零陵即將次及亦欲置之叛逆之科不知如何又却中輟不免命也臧氏其如予何劉季章近日樓大防又已行遣一時流輩芟夷畧盡其勢必從頭别尋題目整頓一番聞鄉日湖南所按吏有訴寃於朝者已下本路體量改正次第首見及矣黄直卿外間洶洶未已樓大防亦不免聞林采訴寃於朝已下本路究實先所委官見其案牘駭異不敢下筆已改送他官如其所請比諸人撏剥已盡或須作話頭來相料理老朽寧復計此一聴諸天而已祝汝玉某罪戾所積乆知不免不謂尚爾推遷以至今日孤豚之蹤初亦何足言顧乃重貽有識之憂四方朋逰盖皆有謝絶生徒之誨然鄙性於此却有所不安姑復任之若禍害之來未遽止此計亦非闔門塞竇所能避也季通徒步上道令人愧嘆昨日又聞有毁鄉校以還僧坊之請事亦施行彼巍然當坐者豈亦不謝客而遭此耶劉公度承書聞為况之適足以為慰患難如此乃是玉汝於成切宜强自振㧞勿令頽墮為佳向來長沙時已覺意思不似南康時後來尤覺不長進今已議親為誰氏此尤不可不謹季通聲問殊不佳而其家未得的耗其季子沈字仲黙第三在侍旁不知何故不以命之如所傳今已兩月矣交㳺四十年於學無所不講所賴以祛蒙蔽者為多不謂晚年乃以無狀之迹株連及禍遂至於此聞之痛怛不知涕泗之流落也蔡季通時論如此未見陽復之驗自劾之章又復不効然聞論者頗喧勢必不免然命已下又不容不盡所懐見此草奏旦夕發行即束裝俟譴矣黨錮傳何必讀行且親見之矣某聞以臺察文字已有褫職罷祠之命祠禄恰滿餘未被受亦未見章疏云何儲行之書來說渠亦遭章説移學切恐亦不能不波及賢者亦可笑也昨日歸來意緒不佳㡬成大病向晚擁裘附火幸得少定方念未聞經夕動静忽辱手示忻慰律凖已領圖志先納上諸書及藥容來晚上去面納次此間書冊在書几者一哥必知次第恐或要用即就請幸預戒之也里中恐有畱委幸見喻既欲歸黄沙想只取劉原路初欲先走莒口奉别今只宿市中以俟發程矣彼中風土氣候果如何地主既鄉曲想必有以相處居止亦便安否乍到未甚定疊亦是常事少頃當自妥帖矣一哥前日到此云尊嫂曽少不安亦只是舊疾尋亦向安矣居晦來日就道某季子挈婦來歸不免小冗漫附數字所欲扣者非逺書所能致所可言者亦不暇究悉也唯千萬自愛為禱居晦適相别因語之云賤迹不可知若得在嶺右當得託餘芘此非戲語已十分作此凖擬矣景建詩甚佳顧鄙拙不足當耳書中甚知敬服後生亦不易得似此會得人説話者也向曽説區淳者否似只是全道間人可試物色収拾之也知舊相勸杜門謝客者多鄙性不耐如此又已作如此斷置固不復能顧慮也居晦必有囘便幸子細作報章欲詳知彼中動息也章茂獻潁先生之孫主簿某家藏所需廟議以乏人使令兩日方寫得了適有長沙便兵却託虞推轉致幸視至但再讀之頗覺當時匆匆詞不足以達意不能無遺恨耳某拜鐫罷之命罪大責輕唯知感戴尚復何説第恨詿誤旁人及遭重貶耳劉智夫崇之先生之曽孫市轄濬家藏刋帖某方辭命召遽被恩除控免踰月未聞賜報益重憂恐來書縷縷備悉至意區區本懐亦豈恝然於此世但恐隂盛陽微未容措手而已墮機穽耳反復諄喻盖已慮之袁丈前日相見於太湖恨其發之太輕反為羣枉之助也以近事一二參較已是什八九分不可復出但所遣人未還未知端的耳劉智夫某前月望日遣人入都至今未還必是值祥祭一番禮數未得將上未知竟可得請否耳日間邸報遲緩近亦殊無異聞但編類奏劄一事恐有深意不知出於何人或恐偶然妄發未必思慮到此亦不可知耳聞近到城中恐有所聞幸子細喻及也機仲相見必欵或云集賢曽於榻前及前日事如此恐須得一州郡但不知所傳端的否耳周貴卿來相訪云當赴省無力可辦行計某不能如之何因其歸謾附此恐鄉里或前路有可周旋處得與畱念幸甚劉智夫新除未厭士友之望然以足以優㳺除為請外之計但有江湖佳闕不可蹉過耳不然則自此一向直前捐身為國亦無不可但恐未得當此地矣做得未甚有益則又不若初計平平之為善耳某懇辭未獲不敢固必但欲換得一小小軍壘或謀議官之屬為三徑資不知諸公能許之否聞長沙頗費力得免幸也劉智夫某兹聞時事曲折差慰人意最是北内康復尤為莫大之慶宗社幸甚某再辭不獲無可奈何只得勉強一行但心力短耗目昏尤甚未知果能勝此重寄否耳劉智夫某扶病此來已交郡事破壊空乏不可支吾皆未暇言而嫠不恤緯之憂有不勝言者奈何奈何版築之計直當罷休但陶甓之費已六七萬散積曠野之中若不収拾結抺則此皆為棄物矣正自未有處也劉智夫某涕泣再拜恭聞至尊夀皇聖帝奄棄萬方痛纏普率况以孤賤蒙被恩私悲痛崩摧豈勝號訴想在朝之乆尤當同此情也比來物情事勢復如何人還千萬悉以所聞見告濫叨藩守不能有以匡衛王室永負臣子之責為萬世之罪人矣劉智夫某衰晚闊疏守藩亡狀已不堪収召之恩矣忽於道間又被除目超躐殊甚豈所敢當已上免章却於上饒俟命若便得請即自彼而歸亦不難也劉智夫再辭未允勢須一行已入文字乞許且以舊官入對面辭新命矣若得改授次等講官使得效其尺寸亦萬幸也但事體已如此捧土以塞孟津恐未必能有益耳劉智夫某二十日已到家疲憊雖劇然溪山之樂足以自慰精舍功夫漸見次第逺方朋友亦已漸有來者江陵勢必難赴今遣人上奏懇辭計必得之或别有行遣亦且得免作帥也機仲竟不免不知何自而發卒章所論江陵暴政則將軍都郎屬耳燕王何自知之耶近事大者都無所聞徙宫祧廟改服諸議後竟如何皆幸詳報長沙廟額已得之否趙主事如何渠更旬月須復往且得少須勿令觸罷為幸吳彭二文學到都吳已年及只可得祠禄已託平父語南强早發遣之并煩道及尤幸聞又須闗儀曹亦已為作季路書亦告為督之士老而貧尤可念也劉智夫近報所見至臘月六日矣未聞所喻之説但仲本書亦云然殊不可曉泰亨之世庸瑣自當處外顧乃為此則其為慮亦過矣且使人如何可受邪小報沙世堅自請於朝得僧牒以治邊防今具支遣之數申省如此則帥復安用此等事若整頓著便成痕迹只得力辭耳鄭溥之遣人來亦有近事未有異於前日之歎豈惟不異正恐有不如矣劉智夫都下乆不得書但聞未御常朝臣子之心殊不自安耳蜀相之召想已聞之不知何意也廷老歸塗必相見所慮大概不相逺也身在逺外無從效尺寸但知勉脩在已敬俟天命耳劉智夫得子約書聞已御延和非乆當出視外朝也又云揆亦乆以小事積累忤意近有隨龍闕姓名人守楚者差除遂致不安中間有投匿名於省中專斥之復有客自王信州處來云聞已出六和復入居僧坊不知此數日又如何也境外傳聞亦不一識者憂之不知果如何耳得書却殊不及昨來除命中曲折也此既不是為時勢重輕而衰晚且得休息亦良幸爾劉智夫郭丈得上饒附來書昨日答之畧言泉相舉措雖不無可議然其向正之意亦多或當言路不可令以罪去不知渠以為如何縱未必盡以為然亦須少減分數也渠却云因從官夜對及臺諫之去國者故特問之然不問孫劉而獨問此恐亦不能無説也劉智夫所喻行止之計誠為難處且看所遣人還消息如何若勇猛直前便以頭目腦髓布施亦無不可也邑中之事不知所聞如何其人見事眀快頗分曲直不樂者衆恐傳聞或過當然亦不能無少失要之善良自安强猾者不便耳劉智夫近報相君已參告復給朝假馬會叔竟以林和叔文字除職守潤却召趙徳老為版曹而趙俊臣移溫陵恐顔當改除或得祠也林擇之書云天官此一二宣對言語頗契合而得其書與其壻書乃皆有丐外之意不知何也前日以書勸其勿深論細事如舍法之類得報殊不謂然方欲冄論甚力其不知務如此亦可怪耳劉智夫疏近方見之昨日見張宰云大坡親戚過者能闕由婺女報復而然遂使前日之言不幸而偶中闕此紛紛又未知所底止也劉智夫時事後來復如何竟已清眀堅定否諸公似欲便以無事處之何慮之淺乘此正當力為乆逺計耳諸公誰為可告語者想已不憚力言之也劉智夫外間諸傳聞虚實相半要是大勢已定其間小小變動彼其斟酌分數盖不草草政未足為吾道欣戚也劉智夫祠請度未必遂見元善説建議之人雖有睥睨之意而集議者僉不謂然或者又謂劉公碩年於狀中塗去數字其人雖甚不樂而不能止今又徙官計且迤邐矣某中聞亦甚杌􅑾此數日却無所聞然後生可畏各欲奮其才力以赴事功麋鹿雖走山林其命固亦有所懸矣如復從之不能預以為慮也陳彭楊項竟又不免子直數日前得書方引孔子微服事見教今乃懸鶉百結而不能自免亦可笑也里中今嵗艱食一番紛擾今猶未定想諸人自能報去矣所幸早稻極佳公私亦多方捄恤或可不至狼狽杜門待盡且願如此它皆有所不暇問也劉智夫湖湘聞亦得中熟諸事想不至甚費力然今時勢如此亦豈吾人展布四體之秋耶官閑讀書益進徳業所可勉者惟在此耳一路官吏向在任不乆不能遍知所知者畧已舉之矣但零陵丞彭銓者子夀之侄人多稱之深以不及為恨耳潭幕支使王楘善化令張維寧鄉簿劉正學皆有才可使今嘗薦之長沙丞管姓者忘其名亦可使善化尉吾姓浦城人者修學斷事亦可觀未及薦也潘叔昌在全州老矣方用得闗陞狀亦嘗薦之方謀率諸司列言之而未及近聞林和叔舉自代舉主無氣恐未必可賴今將滿矣甚可念也李衡陽亦甚佳近見諸司薦之不知已滿未也其代者即趙希漢却有才但當裁其過甚耳諸郡惟武岡是姨弟眀敏有素政必可觀亦幸詧之勿以厥弟為累也廷老法應相避何以處之渠為作湘西精舍已成恐有合求助處幸畱念也元善益之徳夫相繼罷逐搜羅抉剔無遺力矣吾徒皆不可保道學文字鈎連隅落如武侯營壘非華宗浪戰之比也辭職告老再上未報今必已有處分勢須鐫職罷祠但恐向上更有行遣耳山谷説呉畫佛入滅圖中大魔王舉措可發一笑劉智夫邑中數日争戰報復洶洶未定而罷書已至絶不見邸報所喻文字得城中相識書云有之雖未見全文然意其必借此美名以行私意也徳夫之說以此所聞參之亦有此理然殊非所望於蕭傅亦可歎息耳南昌昨聞已移汪宣城而沈維祖者代之今此副樞之傳又何謂耶然則三山果誰得之金陵聞尚前却未定計未必能力辭也叔通事竟不得所起或云即向來起事之人又云嘗入城逰説不效而歸不知果然否也劉智夫鄉里一番荒擾今方小定又苦雷風慮損秋稼嗣嵗尚可慮想治下當不至此聞衢信亦自寛裕不知何獨困我里也劉智夫忽聞季通聲問殊惡令人傷怛不能為懐聞彦中居晦正之諸人皆已薄周之恐不能給歸塗之費不知能為作江西湖南兩趙漕書否其它㳂路有可嘱者并丏垂念乃幸之甚劉智夫適報機仲諸人檢舉奉祠宋臣得竟陵而復繳罷張巖復入臺想皆已見之不知其間一二曲折果何謂也除目未頒然想已有定議旦晚當有聞也仲本得書否計自此未必遽敢越竟而東也劉智夫某前日走後山聞季通之柩已過翠嵐遂過彼哭之悲不能自勝然人生㑹如此亦將不暇悲彼而自悲矣昨夕方歸疲憊殊甚外事未有所聞但嵗儉可憂所至皆然崇安山間有絶収處細民不易可憐也嘗以書語機仲令達此意於有位大蒙痛詆以為所損未見分數公私莫以為慮不當遽言又謂今夏縁官司勸喻樁米致上户發糶不得無以自存緩急之際官司自有常平義倉之積足以為備不當求細民之譽斂上户之怨此皆其來語如上户無以自存者尤可怪也不謂賢者亦為此言他尚何望耶劉智夫季通之傳浸宻而其家問竟不至不知何故如此必是遣人在道阻滯也諸書荷畱念但歸期恐亦難料盖所屬官司有擔荷未必容其自便耳劉智夫近報荷垂示比得機仲書今録呈但邑中不逞又以詭名訴儲宰遷學於儀曹叔通亦為所指邑宰乃不敢喚上詞人供對數日擾擾未知作何出場大抵所訴無一詞之實詞人乃學長卓定等彼固非學長然亦未嘗出門也然官司諸生無一人敢正其妄者可歎可歎與長兒書吾昨日過遂昌今日方深追逺之痛忽得汝書知與婦子俱安稍寛吾意吾昨日方被進職之命今日遣人下辭免文字江西指揮至今未到已據部吏狀揭牓謝絶詞訴便作閒人調度矣但印記尚在身未得十分蕭散只候命下便發遣回去台越之事不足深怪吾平生為學不得力只是先辦得此一着如今衆人扼腕時節吾心却是閒暇君恩民病雖不敢忘然亦有時節固非伯寮臧倉之所能為也陳了翁說人當自試以觀己之力量今日真試一過耳叔昌得書却似未悉此意也吾已約子約來玉山相聚不知渠能來否渠書中説汪潘康葉諸公相問訊欲相見答書時冗甚忘記謝之可寫報子約煩致意或能同來尤幸吾又欲一見潘丈及叔昌不敢坐邀汝可為禀看能來即又大幸也髙劉二君亦為致意想便來相聚矣不及别書也汝想未能來且省出入彼人凶猾吾甚為汝憂之切宜深自防也渠豈能改過不可錯凖擬只當益加戒心耳至祝至祝吾後七日可過衢州城外重九日次第可到界上住三日諸公若成來固幸若不成可早遣一介相報也林擇之用中文公之曽孫濬家藏錄稿古田亦小荒窘今年到處如此平父歸說信州恐有剽掠者建陽江墩邵武之境近一夕為盗所焚氣象如此而浦城渠魁州府止從配𨽻又聞中道而逸矣姦民愈無忌憚未知所以為善後之計也元履近日議論多如此如論人材尤要一種穏當不任事之人此不可曉要是本原不闕之多愈見畏縮耳晦庵别集卷一欽定四庫全書晦庵别集卷二宋朱子撰書胡籍溪先生以下胡徳芳家藏昨日節畧禮儀尚有二節可疑敢以求教書儀中云壻揖婦䧏自西階至婦轎所立舉簾以俟前日見先生云古人用車不可升階乃就階下置車故有䧏自西階之禮今既用轎子不知只就㕔上否如此則婦先入轎然後䧏自西階以出矣又婦既入壻之家壻導婦以入不見有舉蒙首之禮未知今如何乞批以見教文叔婦既用轎子則只就㕔上壻却須就㕔前上馬舉蒙首之禮溫公不説少間檢伊川集續報去也舉蒙首之禮適檢伊川集有之乃未就坐飲食時行之今想已不及矣程沙隨可乆逈以下沙隨之孫仲熊家藏示及古韵通式簡約通貫警發為多四聲互用無可疑者但切響二字不審義例如何幸望詳賜指喻又其間如積劭植囿淺昧晣七字恐合入四聲互用例中不知何故却入此門亦乞見教麒之為極十之為諶似亦是四聲例也近因推考見吳才老工夫儘多但亦有未盡處汎考古書及今方言此類盖不勝舉也詩説見此抄寫未畢畢即拜呈求教矣聞人丈頃年見之三山扣以詩中數事甚蒙知奬但恨不得欵盡其説耳豳詩之説則恐未然盖破斧以後諸詩未必是周大夫刺朝廷之詩此自小序之誤耳它日繆説得徹尊聴當為印證其可而掊擊其不然乃所願也所喻詩論十篇便中幸早見教為望汀鹽之弊已極手直之䇿未為不然横為諸司所排使不得伸一方之民可謂重不幸矣晦伯書來所欲更張者尤廣觀此事勢如何行得近聞諸司於舊法中減落一二小小縻費便謂可革宿弊以一杯水捄一車薪之火無以異於小兒之戯論甚可笑也孝經妄意所疑不謂汪丈亦有此説近亦條具數處并俟後便拜呈也四營成易正為易字即是變字故其下文便以十有八變承之再扐後掛即所謂再揲三揲者是又一四營也凡為四營者三乃成一爻為四營者十八乃為一卦此以積數文義求之皆無所礙不審尊意以為如何也月樁條對亦乞頥指錄以見教此事從來只是得於耳學竟未知其端的也廣西鹽法近得詹丈書極以為便亦錄得中間解折范容州劄子畫一來而自彼來者無不以州郡窘乏為言不知的是如何地逺難遥度傳聞亦難盡信大抵近世作事利民者常苦於掣肘而不得行其為民害者則因循茍且上下尊守以為不可易設使便有姚元崇真有濟世之術亦未必得如其意此可歎也又蒙别帋垂喻俞廣文立二公祠之意使為記文尤荷不鄙但此事今日老丈在彼晚學小生豈當僣取而妄為之此决不敢承命若廣文有請於門下它日文成區區得以題額附名左方亦云幸矣幸逹此意於廣文敬泚筆以俟命也前浦城主簿任希夷經由請見幸與其進而教誨之其人有志於學守官不茍王漕亦令去請教也程可乆附子為近世通用常藥它人服之未見其熱老丈乃獨覺其偏有所助致生它疾此見平時所養之厚而所謂無妄之藥者真不可試之騐也二賢祠記前書已拜稟矣豈有大師在是而晚生小子敢肆妄言於其側者乎况陳公平生只得一見若汪公則老丈㳺從之乆投分之深又非小生之比恐不得而辭也因便寓此偶數日禱雨倦甚又積書問頗多未暇罄所欲言向蒙喻及詩論前書拜請幸早寄示謬說已寫就然尚有誤字旦夕校畢拜呈以求教誨也易中七八九六之數何自而起説者雖衆終未甚安不審尊意以為如何州縣祈水旱政和新禮所不載而通典開元禮尚有可依放者唯鄉村所禱全無所据茍且從俗於心有未安者亦幸有以教之也鄭尚書惠叔僑見莆陽所刋稽古錄後匆匆去國深荷眷存既行之後又知榻前開陳之力固知髙眀非私於某者然不能不以為媿也區區舟行冒寒阻風昨夕始到三衢更一二日始遂南去病軀幸可支吾皆餘芘之及也鄉在長沙嘗得溫公稽古錄正本别為刋刻殊勝今越中本欲俟成書奏御未竟而來又欲面奏行下取索則又未及而去每念此書溫公所以願忠君父之志更歴三朝然後成就其論人君之徳有三而材有五者尤為懇切不可不使聖主聞之不知可以一言及之行下本州取索投進否然不必及某姓名恐罪累之跡延及先賢反致忠言不得聞達也聞中司已兼讀官幸更與議之同君舉子夀諸公共白之也程允夫洵以下洪正學刋允夫家藏帖先集無人寫得亦多是應用文字非吾弟今日問學所急故不送前書已詳言何不見悉耶墓刻不敢忘幸且少寛之譙傳非病翁所作乃原仲致中二丈見之其説亦有病非學問正脉也遺書中李端伯劉質夫所錄極精可熟味之便見學問正當用力處矣程允夫某重念先世南來八人度嶺今無一人在者而老人暮年窮約以不肖子與世不諧之故憂窘萬狀無一日舒泰遂以至此尤重不孝之罪每一念至此心肝如抽裂也某家中自先人以來不用浮屠法今謹用但卜地未能免俗然亦只求一平穏處尚未有定論計不出今冬也所喻立户事無不可但先人已立户某又自立一户恐於理未安更詳度示喻程允夫示喻為學之意此正克已功夫所當用力然猶是至粗淺處若不痛加懲窒非惟無以仰窺聖賢閫域恐亦無以自立於州里之間矣此甚可懼不可視為常事而緩於檢制也上蔡之言警切至到真當朝夕提撕然論其細微則區區所愧亦已多矣尚何以為賢者觀省之助乎今當彼此各致其功庶異時相見無所愧於今日之言耳觀書或有所疑因便疏示閑時寫得便可旋寄徳和處此中時有便人往還也所諭向來解紛之意固是如此然亦平日持已不嚴故擇交不審而責善之道又有所不至故其末流之弊至於如此此當深自悔責而速改之詳味來辭似未有此意恐更當反復鄙言毋以前説自恕也所要文字正冗未暇致思齋銘亦已忘記又無草本要不必爾但得識之於心而見諸行事則為有以發於愚言矣祠閣二記皆不成文字但欲畧見此義理故不得而辭來喻之云非所望於親友間也近思已成尚未寄到到即附去中庸無人寫得只有一本不敢逺寄且亦未定不欲廣傳也定性書解在别紙亦勿示人為佳雲谷記已寫寄李文矣程欽國後更字允夫夫以下新安汪逢龍刋允家藏帖往年誤欲作文近年頗覺非力所及遂已罷去不能畱情其間頗覺省事講學近見延平李先生始畧窺門户而疾病乘之未知終得從事於斯否耳大概此事以涵養本原為先講論經㫖特以輔此而已向來泛濫出入無所適從名為學問而實何有亦可笑耳示喻蘇程之學愚意二家之説不可同日而語黄門議論所守僅賢其兄以為顔子以來一人而已恐未然頃因讀孟子見其所説到𦂳要處便差了養氣一章尤無倫理觀此想淵源來歴不甚深也正蒙建陽舊有本近來乆不曽見俟病少間當為尋問也然此書精深難窺測要其本原則不出六經語孟且熟讀語孟以程門諸公之説求之涵泳其間當自有得然後此等文字可循次而及方見好處如今不須雜博却不濟事無収拾也若果如此有味則世間一種無𦂳要文字皆為妄言綺語自無工夫看得矣近集諸公孟子説為一書已就藳又為詩集傳方了國風小雅二書皆頗可觀或有益於初學恨不令吾弟見之又恨相去稍逺不能得吾弟來相助成之也程允夫表叔墓刻不敢忘重煩督趣愧恐然此尚有少曲折異時得面論而後下手乃為穏當先集亦難於出之正亦有所疑耳吾弟近所為詩文有可寄示者否某向到湘中所語甚多然皆草率不足觀謾令大兒寫拜魏公墓一篇去此等閑言語正使絶出亦何所用况又不能佳乎然姑以寄意焉可耳程允夫觀志觀行此章上蔡謝先生言之最詳盡大抵聖人本意只論孝子之心耳至於事有不得不改者又出於不得已非其心本然也此義亦通上下而言不必專指人君也天命之謂性則通天下一性耳何相近之有言相近者是指氣質之性而言孟子所謂犬牛人性之殊者亦指此而言也自聖人言之忠恕即道也曽子之言是也自學者言之則由忠恕可以至道也子思之言是也二先生及上蔡論此詳矣宜深體味之不可只恁麽説過浩然之氣大剛直當從伊川之説更宜深思必有事焉而勿正心勿忘勿助長此固是下工夫處然於此須識得箇本體始得眀道舉鳶飛魚躍活潑潑地以為與此意同須要識得方有下功夫處不然才着意便是正才不着意便是忘無有是處聖人之於天道詳來問似看此章大意未分眀摘句理會宜其不通心往一段語皆有病心固未嘗亡但人舍之則有時而不自見耳所謂道心惟微者此也程允夫聞以職事忤上官暫移他局不知所争何事若所當争乃見所守此外榮辱不足道也昨誤聞劉智夫得江西倉臺即以書道吾弟及一二知友姓名得其書乃云雖出妄傳然已為轉語王南强矣計必能相知但未知新憲為誰耳此辭職告老皆未允而向來阜陵異議之人趙詹皆已行遣此獨漏網有所未安已上自劾之章矣上意必無他但勢必不免於何劉之口亦已判然於心不復為求全計矣程允夫某病脚恰一月矣尚未能履地而時論又攻之於外因知語黙之有時然語已在前矣今欲黙之能有所及乎學徒不欲一旦盡遣恐或反致張皇然已不多自此來者勿受可也帋尾之喻已悉然臯陶宥之而尭曰殺之毋乃兩失其職耶彭子夀龜年以下止堂之孫沚家藏中間傳有召節固疑其非美意已乃不然方以為喜及承惠書又知開府以來經理次第尤以為慰然以時勢料之亦决知其不能乆既而果聞已有奉祠之命矣却不見有文字想又從中而下也此在髙眀無所輕重但鳴吠狺狺日甚一日其勢必須大有處分其禍不止於搢紳而已也想以此故亦未能釋然奈何奈何某今夏一病㡬死亟上挂冠之請并辭近職蒙上厚恩未即聴許將欲受之而去嵗曽議菆陵者例皆獲罪自惟狂妄不應獨免遂以自劾章上計今已有行遣顧地逺未即聞耳閒中讀書却有味但目已偏盲其未盲者亦日益昏披閲頗艱耳緣此閒坐却有恬養功夫始知前此文字上用力太多亦是一病盖欲應事先須窮理而欲窮理又須養得心地本原虚静眀澈方能察見㡬微剖析煩亂而無所差錯若只如此終日馳騖何緣見得事理分眀程夫子所謂學莫先於致知又未有致知而不在敬者正為此也濓溪諸書亦多是發此意下問之意但以此説推之則其受病之原與夫用藥之方皆可見矣雄附逺寄良荷扶衰之意茶五十餅漫附回使以供粗用背時可笑大率如此也薌林逝去在渠髙年固無恨但後輩失此典刑亦自可恨也舟御不經于越否亦聞之否度不免一南轅得免踰嶠幸也茂獻必相會賤迹既不自保又深為諸賢憂之夏中之病由此増劇中間幸小定今又復作人謀不可及矣奈何奈何彭子夀得張元徳書竊聞大斾已次豫章今當税駕里門矣乍歸想一番應接有不能免者然自此杜門少休神觀益得玩心卒究大業安知天意不以是玉汝於成乎願益勉旃以慰期望零陵經由頗得從容否復有一書幸為遣致得不浮沈乃幸孫季和應時以下季和之子祖開家藏某到此緣所請未報邦人恐虎兕復出於柙邀畱不得去已申省且畱此矣黄岩糶濟得伯和諸公在此商量雖未有定論然亦當不至疎脱但水利一事諸公以為非得一見任官主持不可下手某已撥萬緡今使與食利人户興役矣諸人欲得賢者復來見欲差出縣丞却煩吾友攝其事主此工役不知可來否專令此人奉問幸子細籌度見報若不穏當則當别為申奏專差措置水利亦無不可但在賢者之來與否耳如不可來幸為計度見任官中有何人可委謝户如何欲煩詢之不知渠肻來否此事非小若得黄巖無水旱則鄰邑俱無饑饉之憂向後乞得錢更増益之耳度本路水利未有大於此者餘姚之旱與上虞分數如何幸博詢見諭孫季和燭溪蕭寺頃嵗盖嘗一至其間今聞挾書過彼亦有學子相從不勝遐想也精舍諸題悉煩着語屬意皆不淺三復歎想恨不即同晤言也此來觀書日用必有程度及所得所疑有可見告者因來及一二以發講論之端為幸孫季和來喻諄悉備詳為學次第甚慰所懐大抵學者專務持守者見理多不眀專務講學者又無地以為之本能如賢者兼集衆善不倚於一偏者或寡矣更望虚心玩理寛以居之卒究逺大之業幸甚武夷佳句足見雅懐更求小詩數篇暇日見寄孫季和先志不敢忘但以家居困賔客無緣得就今既之官却恐應接稍希可以具藁便并送崇禮處令轉致也但書石須更屬人盖目昏殊甚不堪此役一破例之後求者繼至無詞可以却之朋友間如楊子直書儘有法如不識之當為轉求也孫季和示及易説意甚精宻但近世言易者直棄卜筮而虚談義理致文義牽强無歸宿此弊乆矣要須先以卜筮占决之意求經文本意而復以傳釋之則其命詞之意與其所自來之故皆可漸次而見矣舊讀此書嘗有私記未定而為人傳出摹印近雖収毁而傳布已多不知曽見之否其説雖未定然大概可見循此求之庶不為鑿空强説也如元亨利貞只是以卜得此卦者大亨而利於正耳乾卦彖傳文言乃孔子推説非文王本意也又嘗作啟蒙一書亦已板行不知曽見之否今往一通試看如何書小序不可考但如康誥等篇决是武王時書却因周公初基以下錯出數簡遂誤以為成王時書然其詞以康叔為弟而自稱寡兄追誦文王而不及武王其非周公成王時語的甚吳才老胡眀仲皆嘗言之至於梓材半篇全是臣下告君之詞而亦誤以為周公誥康叔而不之正也其可疑處類此非一太史公雖用其體而不全取其文如商紀中所載湯誥全非今孔氏書也雖其詞龎亂不若今書之懿然亦見遷書之體或未必全是師法書序也按漢書遷嘗從孔安國受書大抵古書多此體如易序卦亦是此類若便斷為孔子之筆恐無是理也先墓志文不敢忘但為歸來悲冗中未暇落筆今當少暇旦夕得成當并寄叔度轉達也記序諸篇大意皆正當而詞指清婉可喜此雖餘事然亦見游藝之不苟也入蜀不過荆門否近得劉徳修一書今有報章并書冊一匣寄之煩為帶行達之此公未識面而書來極勤懇前日之舉全類東漢諸賢計雖甚疎而其意則甚誠切矣亦可敬也恐帥君以婣家之故不能無嫌須調䕶之此非為劉乃為某計也可嘆可嘆孫季和某衰老多病益甚於前今兩足拘重不復能動已兩三月矣度氣血已衰無復完健之理只得未死且爾引日已為幸矣然世道如此臭味凋落日見稀少亦何用乆生為也乆欲告老今方及格不敢自請而外郡不為保奏只得一申省狀亦且發去或者恐觸禍機然不暇顧也向承喻及祠記碣文以例不敢為人作文字遂不復曽致思所示行實諸書亦已卷藏不在目前自此或有便别為寫一通來暇日試為整齊看如何然必三年然後出之時運固叵量但恐夀非金石不能俟耳祠記亦然但子游之封在唐為吳侯在政和為丹陽公而淳熙所頒祀禮乃為吳公盖十子皆因唐之舊自侯而公然不知何時所加頃年曽為申請禮寺行下亦無的文今納長沙所刻一通去可試考之也帋尾無可講説之云可為慨歎此固無復可以及人但不知年來自己分上工夫又如何似聞頗畱意於詩文此亦恐虚度光隂也有如衰朽至於今日乃始追恨向來之懶惰今欲加功而日子鋪排已不遍矣此當以為戒而不可學也孫季和昨需祠記本不敢作以題目稍新不能自己畧為草定數語漫錄去度未可刻以速涪城之禍幸且深藏之也孫季和史公入覲不知復何所處禮畢亟歸亦佳事也某去秋以病請祠不遂此間亦可少安而忽有長子之䘮悲痛慘怛無復生意請祠諸公已相諾而未被命計旦夕即去此矣乆欲遣人至越中而未暇及今始能作書而迫行匆匆又不暇詳悉所委文字亦未能遂就然不敢忘異時未死終當如志也新刻數書各往一本崇禮兄弟欲各寄一本而偶盡遂不能及亦不暇作書只煩為道意也寧海僧竟如何秉彛好徳豈容泯滅於此可驗試寄語招呼之若其意堅可率朋友合力助之以成其志亦非細事也劉子澄清之刋以下廬陵胡翼龍静春家藏帖昨承有召命深以為喜然亦不知行止之計偶到城中黄子來相尋具言近况為慰但求教竟不之領又以為恨比日伏惟于役有相今或已至任所矣奏對得以伸吐所學甚慰士友之望正學以言而不失淺深緩急之宜在賢者必已講之熟矣黄子又説頗欲多所論白此恐徒取草野倨侮之譏而匆匆晷刻之間勢必不容詳細反復則是無故徧觸衆事之機紛冗錯雜而終無感寤之理不若畧舉大體切於上心者專指而極言之幸而開納固為莫大之幸萬一未即聴從亦足以為之兆異日猶可尋繹其端緒而終其説也它則非閒人逺書可以一二指陳者在眀者熟慮而徐應之毋為匆匆以致後日之悔也黄子又説見問人材之意此等事度非吾輩事力所及正不須太遽也劉子澄某幸如昨但伯恭逝去令人悲痛不可言昨嘗以子約訃告作書宛轉托子静送去相報近聞渠已入浙此書恐未即達然訃報中必已見之傷悼之懐相與同之也去年方哭敬夫今伯恭又如許吾道之衰一至於此不知天意如何吾人不可不自勉未死已前協力支撑也某在家應接隨分擾擾偷閒修得中庸及孟子下冊孟子得公度卷子甚濟事也今且修此經書通鑑看將來如何恐心目俱昬未必了得終遺恨於身後耳西山長句及還家四言意象蕭散吟玩不能去心欲作數語奉答自覺意思局迫恐不能佳此是膏肓之病不知如何醫治得寛平閒暇些子庶晚年身心稍安樂也沅倅令兄墓表草定納呈不知可用否公度何為至今未歸報中亦未見所擬官何耶曽子䟦語并往歸來方得細看雖雜篇所収不如前意思終是好本子見錄未得附還更有一二處當畧修耳近思續錄俟旦夕看畢奉報第三錄亦佳但如此編錄得無勞心否因看書所得隨手抄錄不妨若作意収拾搜尋布置即費心力亦須且省節為佳也盖中年精力非少日可比不可不愛惜耳諸葛學須静也全文告因便錄示千萬荆州論語甚改得好比舊本大不相似若不死更長進深可痛惜伯恭詳審穏當有餘却不及此公俊偉眀快也韜仲不茍如此不易其兄晦伯亦甚好它日皆未可量也子玉不聞問旦夕有尤川便當寄書與之擇之何為至今不見歸直卿近遣人來納幣甥女不成却是某女子也渠來春同為金華之行今既聞伯恭訃决當如約某當一與俱往哭伯恭亦不欲爽前約也鄭景望亦殊可傷前書當報去矣陳正已今在甚處公度當已歸來春之約不知竟如何也某忽隨例沾誤恩念有罪無功不敢受又昨奏與獻米人推賞諸公不為施行前日不免於詞免狀中極論其事遞中得周參書亦於報書中懇之未知竟如何聞江湖間水旱螟蟊民已薦饑不知州縣有無措置然今年比之去年事體尤不易也廬陵當不至此此間却差稔但剽掠公行甚於常嵗州縣坐視不復介意此亦殊可慮耳眷集中外俱安諸郎一一佳茂愛女夭折可傷平父次女與泰兒同嵗向許議昏近亦不育其女幼而解事甚可惜今此兒未有親不能不掛懐抱耳向丈得書却來説及薌林集要序甚恨未得見也序文豈敢僣易然此却好題目但恨晚輩不當作又苦心力衰畏作文字耳景陽眀年且在致逺家否向見其説話意趣儘好恨不得欵曲講論今既相逺又無由得相聚耳向得書朱君岑何字偶不記憶更告批喻彼中交逰學生并為一一品題以來尤幸史老所薦皆淛東知名士亦不易但陸子静亦入此保社不知果已行未耳惠况紙墨筆帖良以愧感無物可寄祭禮及二小書漫往幸収之昨得延之處祭禮三家方屬鄭丈補入而渠已物故旦夕更屬新將也弟子職女戒本各為冊而皆以雜儀附之令人家小兒女各収一本讀誦為便也今此冊為印者所并又缺雜儀一本不容復改然此無多字致逺更能鋟版流行亦教化善俗之一事也但女戒向見伯恭説欲刪修一兩處忘記問之不知向來曽説及否吕氏二書似亦可刻并廣之也劉子澄某還自莆中道間大病㡬不能支卧家月餘幸未即死然神氣衰憊比之春中又什四五矣雲臺將滿方欲俟批書畢遣人宛轉致懇復求舊秩忽尤延之送勑來乃蒙朝廷檢舉直差雖似小小行遣聞新揆却甚以為恩意亦為一番勞擾但去冬案後収坐未曽决遣不知此又折得過否耳只恐反露綫索觸着駭機亦復任之不能深以為憂也王漕送示二月十一日手書三復喜慰不自勝但趙南紀云長沙中冬已見報而老兄正初始得知之何其晚耶今自劾之章復乆未報不知何以處之要當極力再請以得為期得朝士書皆云爾其相鄊慕而未相識如張元善者尤拳拳也先聖象荷寄示然此乃湖學所藏昭陵賜安定本向見陳眀仲有之因託定叟傳得其溫良恭遜之容比此又精善恨未得令兄見之也所謂顔子者相傳是伯魚薛士龍亦云恐湖學當有所傳也偶有便人草率附此不知書到時朱轓皂盖已在甚處所欲言甚衆例不敢出自覺近日意思頗似向來所甚惡者喻玉泉之論矣年力頺侵志不勝氣至於如此可懼可懼愛直記文甚佳昨日拜鴻慶勑偶得一絶云舊京原廟乆烟塵白髮祠官感慨新北望千門空引籍不知何日去朝真年衰易感不覺涕泗之横集也劉子澄吳大年附到春間所予書足以為慰比想經暑涉秋尊體益佳健但不知求去不遂之後諸事又當如何想亦不以此而改其度也細讀來書似於此未能忘懐獨蒙記憶之語又似戲謔病根依然故在也克已工夫不是易事願益加意而勉焉則區區之幸也王子合遇子合之侄孫鎔家藏前書所喻祭禮之位昨因嘗以為疑但不如此又難區處若只祭三世猶可以曽祖考妣居中而祖東考西然東位考妣之坐已自難設祖考東而妣西則妣坐迫近曽祖不便考西妣東又與今人坐次相反若祭四世則一位居中二位居東一位居西殊不齊整兩兩對設又似敵禮不分尊卑况左昭右穆亦是異廟而廟皆南向即與今人相向設位不同又相向設位則舅婦之坐東西相見亦甚不便似不若只以南向西上為定之為愈也劉共甫以下胡徳方家藏自領鄂渚所賜書後一向不聞問或云體候嘗小不快不知所苦何恙淺深如何逺方無由得的信徒有懸情耳比日秋凉伏惟忠勤有相鈞候萬福向來微恙失去乆矣宰路虚席國論一新㡬微之間安危所係衆謂眀公宜還鈞軸尚此遲遲不無觖望然上流之重當此之際寄任亦不為輕更願進徳愛身審於舉措毋使中外窺覘有所竊議此為増崇望實鎮服夷夏之本甚恨相望之逺不獲以時宻罄所懐雖在荒迷不忘憂歎耳區區過計以為萬一氣體小或未復故常則塞垣髙秋不宜乆處伏惟深以家國大慮為心勿為目前華靡細娛牽制囘奪則於此不難處矣孔眀擇婦正得醜女奉身調度人所不堪彼其正大之氣經綸之藴固已得於天資然竊意其智慮之所以日益精眀威望之所以日益隆重者則寡欲養心之助與為多焉某自罹禍罰號慕之餘無復事事稍得溫習舊學苦淡寂寥之中時有絲髮之見乃知前日所學問者極為草草而欲以此仰希聖賢下脱塵俗亦以難矣方作書為欽夫言之想其未免於此也然此事自古聖賢近代先覺言之已詳病在學者自立意見别作一般主張耳其詳非面莫能究顧所謂寡欲養心者其大端也不識髙眀亦有意乎荆州聞極荒凉無賢士大夫可奉談燕人心至危恐乆流放難復収拾願日取古聖賢書熟讀深思以袪物慾之蔽幸甚欽夫造朝後至今未得書不知所論如何想彼却時得書也劉共甫嵗前嘗以書附族叔司理除夕得書云開正方得行今不審已達未也此叔年已礙選格今該慶恩恐可叅部得少垂念幸甚渠亦非敢有過望也舊甌寧宰劉元升者不知曽識之否其人㓗㢘曉事再為甌寧事辦而民安之前後莫能及近宰新喻無故為程泰之按罷客於臨江貧甚㡬不能自食江西人士皆稱而憐之如此人者茍未有所歸亦可召而使也前書所稟孫教授者果何如近復細讀其文必自重而不茍合者似此一等人恐又當降意求之若俟其僕僕以求已則終不可以得之矣此有邵武守楊獬浦城宰呉燠政皆可觀近以事涉其境見其士民交口稱頌浦城之政細民尤安樂之兩人皆有文學非俗吏它時恐亦可備使令幸畧記之也安道此來未及相見浦城為守侯所窘渠來始安跡建陽科斂煩擾首劾治之此兩事甚佳也欽夫嵗前得書為政之意甚美但所請與諸司均節一路財賦者不知者必以為侵官不知終能協濟否所論鹽法利害頗與閩中相似渠但深排鈔法而以官般為善不知官般果能無弊否其求訪人才之意孜孜不倦不自以其才為可恃而畱意於此此尤可敬者使當世王公大人一皆以此為心不俟人之求已而汲汲於求人則天下豈有遺才廢事乎甚可歎也劉共甫私門不幸老婦自去夏得疾荏苒踰年療治無瘳此至後一日遂至不起痛悼悽切不能自堪加以幼累滿前將來百緒便有不能不闗心者尤非衰懶所宜未知所以為計也昨聞尊體微不安深以憂念及此奉告乃始釋然請祠未遂又聞繼有勞賜之寵此盖事功較著聖眀深知雖有讒邪無間可入或者不復乆勞於外矣然想亦未免再請也某祠敕已下適此衰麄尚未及拜受聞昨來諸公將上辭免文字上復有除職之命幸諸公白其不可遂止不爾則愈見顛沛然聖恩深厚何以論報唯有修身守道以求無負寵嘉之意而已欽夫得書云長沙傳聞某病消息殊惡此雖非實然亦竟遭凶禍可怪也又具道其經理財賦之詳此足以惠一方矣但趙漕去時意象甚不平不知今相見後復如何也昨蒙喻及徽絹文字不知曽為剡奏否更得畱念幸甚盖雖已有為之者更得一言之助則尤有力也近時鄭鑑對䇿事想悉聞之明主可為忠言自是士大夫顧望蓄縮委曲避就養成今日之勢今又自彼上言之後寂然無復繼者消長之㡬正在此毫釐頃刻之間益可寒心計髙眀雖在外服未忘根本之憂亦當拳拳於此况望實益隆眷禮益厚則圖所以収拾人才紀綱政體者其本末先後必有一定不易之論區區於此更望勉旃千萬幸甚祠祀責沈二刻拜賜甚厚但記中黙契於中者矣悞作也字不知尚可改否繆文本不足以發揮崇徳尚賢之意讀之既乆愈覺紕漏益増愧耳責沈之義昨已報平父正為子髙沈姓耳承許續致只得未背者尤便也别紙垂喻永隆葬事具悉尊旨但彦集於此正自憂勞唯恐不足以集事但素不更事凡百過於憂惴急迫而已不審髙明所慮何自得之自此竊恐聴言之際更當每加審諦使忠賢日親讒慝日逺則乆大之業粹然無疵不獨施於州里親族之間者其愛憎賢否各得其當而已僣易皇恐余隠之事前日已嘗具稟二孫之禾恐止可撥四百秤盖宋家所収自不多若可少増恐亦不可過百秤也唯是隠之父子不解事來此干預宋家産業出言不遜其子尤甚恐將引惹方氏復來生事已令陳吳二婦作狀經府告示之矣此非得已不審尊意以為如何劉共甫過崇安日首詣三里視彦集所開地岡巒形勢目前無大虧缺而水泉湧溢殊不可曉問之邑人亦無一人能言其所以為病者但謂開壙太深使然今若移穴近髙而淺其壙則無患矣此語使人不敢信因語彦集莫若更呼術人别卜它處此數日亦未聞有定議政恐不易得耳然畱彼三日三往諦觀亦覺形勢有可疑處所以致水盖非偶然顧髙眀未必信故不復白直論日前所處曲折耳想聞此亦深軫念也劉共甫杜門如昨無足道者但傳聞淮北音問不一心竊憂之及問平父云屢得近書初不及此則彼為妄傳矣然事之可憂者正亦不在是也近一二士大夫斥言近習無所隠避上亦嘉納但崇信如初畧無變改之効不知又是何人陳此秘計欲以柔道不戰而屈天下忠義之兵彼自為謀則巧矣而為國患日深奈何昨承委撰王公集序已嘗具稟恐不能事以病髙眀前日偶與平父諸人小飲醉卧中夜少甦因不復能寐感慨俯仰之間若有開其意者忽得數十百言蹶然起坐取火書之竊意以是為王公集序若可無愧但未知尊意如何耳聞莫子齊所作行狀甚詳故序文中及之得求一本見寄為幸今屬平父附便拜呈恐不中用却乞示下當畧改入題處别作䟦語為某之自言者授其子以見區區或粗可用而有當改處亦告垂喻曲折當如所戒也平父昨令與伯謨説招致之意近聞復當少緩亦已報之矣渠既未成詣門下欲邀來此相聚而鄉人子弟不可率貧家又不能有以資之度其邵武亦未必有相聚處貧悴日侵殊可念耳元履之弟誠之者中間得所予賻金數年貿易稍有資聚今秋因索債毆人邂逅致死遂盡索所賫又舉貸以繼之然後得脱今一房四五口立見狼狽殊可憐然無術以捄之往時元履病中亦以此弟見屬今無如之何親舊向來干擾殆徧又不容復有請不審樞宻或有不費之惠得賜哀憐千萬之幸然渠初不敢有此望更在裁處也何叔京鎬持敬之説甚善但如所喻則須是天資儘髙底人不甚假修為之力方能如此若顔曽以下尤須就視聴言動容貌辭氣上做工夫盖人心無形出入不定須就規矩繩墨上守定便自内外帖然豈曰放僻邪侈於内而姑正容謹節於外乎且放僻邪侈正與莊整齊肅相反誠能莊整齊肅則放僻邪侈决知其無所容矣既無放僻邪侈然後到得自然莊整齊肅地位豈容易可及哉此日用工夫至要約處亦不能多談但請尊兄以一事驗之儼然端莊執事恭恪時此心如何怠惰頺靡渙然不収時此心如何試於此審之則知内外未始相離而所謂莊整齊肅者正所以存其心也廖子晦徳眀槎溪刻於紹州州學去冬嘗苦臂痛累月不能詘伸今幸少安又以武夷精舍初成不免與諸友朋來集甚恨賢者之不在是其溪山之勝言有不能喻也祠記見屬所不敢辭但此間擾擾俟還家草定尋便寄去只恐子晦官滿不及刻耳朱舍人進用正當秦范之時畫䇿事却未聞説者必有來歴可考也向見濓溪家本畫象服紫當是提憲所借眀道廟象服緋但伊川不知所服向來南康只用野服葢伊川晚年已休致可不用朝服也二先生朝服當時未有履只合用鞾了鄉飲酒禮石刻本所未見也所寄文字碑刻畱家間未見而來書不及其名件不知果何書也近思錄字大甚便老眼有便幸寄一二本魏誠之元履弟胡徳方家藏志文所改大者如此其它悉如來喻填補矣愛君憂國已云有志於當世足以見之此等事太切切言之又似出位也奉親人之常行若一一紀載則日用百事皆當悉書矣興利除害賙人之急如所載請移粟恤親舊之事便是更不必重出矣隆興乾道時政議不知是何書頃所未見大抵此等皆非草茅所當言者表而出之恐益生病不如為汎辭以包之也俚俗謂坂為富如此間大富藉富皆坂字也向見荆南田官説營田處地名長富即劉先主為曹操追及處史所謂當陽長坂也然則以坂為富南北通語要之見於文字當作坂字也汪時法大度婺州有刋帖别後不能一奉問但聞裂裳褁足逺送遷客為數千里之行意氣偉然不勝歎服未及致書忽辱手示獲聞此日劇暑客裏殊甚尤以為喜子約此行無愧臣人之義而學士大夫粗知㢘恥如僕等輩有愧於彼者多矣聞廬陵寓舍有園亭江山之勝又得賢者俱行相與講貫亦足以忘其遷謫之懐也向伯元浯以下伯元之孫公永家藏承乏半年了無善狀求去不獲又未敢遽復有請凜凜然日惟得罪於民是懼它無可言也至此刻得周子象圖書説賦凡五種并叙古千文重立直節堂記䟦尾等率易各納一本敬夫為記濓溪祠堂子澄所書亦并納呈更立陶靖節劉凝之道原李公擇陳了翁堂方求記於尤延之尚未到也得子澄書云書府有康節先生墨蹟甚竒輙欲就請摹刻以垂學者只一兩月可了即專人還納也向伯元春老夏初伏想林居幽勝有足樂者承喻玩意論孟之書尤覺有味恨不得從容侍教於前也某不量疎拙輕出從事無以補報縣官而乖忤貴臣㡬蹈不測賴上聖眀保全至此且幸未至顛隮然殊未敢自保也去冬病臂近方小愈然猶未至脱體呻吟之暇繙閲舊書亦有一二學者相與討論足以自樂獨念逺去長者之側不得講去所疑消釋鄙吝為恨耳向見子澄説書府有康節書陶公詩地逺不敢借觀但時時想象此題目已覺清氣逼人也向伯元紙尾批誨飲食必祭之説旨意深厚不勝歎服盖所開警為已多矣君祭先飯先儒舊説盖本如此近世乃有以為君祭必先黍稷者若然則其音讀亦自不同盖如先儒之説則飯音上聲而為食之之義如近世之説則飯為去聲而指所食之物二説雖若皆通然細推之則恐先儒之説為長盖為賔主之禮則主人先客祭然後客祭主人食而後客食今既侍食於君則不敢當此禮而子之於父臣之於君飲食必先品嘗之而後敢進亦禮之所當然也故謂侍食者於君之祭也而已先食之其義各得若如近世之説則君祭之先後有非已之所得與者且祭之先後自有常禮上下同之不必專言君祭乃先飯也鄙見如此不審尊意以為如何昨承喻及嘗見大學鄙説近有修定本張君抄得幸試取觀有以見教千萬幸甚向伯元某頃叨除用出於意外懇辭幸免猶然復忝郡寄上恩厚矣但年來目疾殊甚恐不復堪吏事免章再上諒必得之也子澄去秋以書來告别方此憂念繼得公度書乃知遣書之後不六七日遂至大故發書一慟痛不可言然至今未能遣人奠之日以愧恨也交逰凋落如晨星矣復失此人吾道亦殊失助也向伯元三數年來無日不病而今年為尤甚神思疲憊筋骸縱弛飲食不至大減而肌膚消削日就枯槁蒲栁之姿望秋先殞每聞老友聰眀輕健過絶於人未嘗不歎衛生之有經而愧謹疾之無術也祠祿將滿未敢再請而朝廷記憶遂有鴻慶之命杜門竊食雖若可以終身然舊京原廟隔在異域每視新銜不勝悲憤之填膺也臨江張洽秀才迂道相訪後生有志不甚易得因其行附以此書并令請見幸予其進而教誨之向伯元蒙寄示先正遺文斂袵警誦不覺終篇竊惟忠義之操髙尚之風生平之所想象鄉往而不得見者今乃得窺其一二大者於翰墨文字之餘何其幸耶蒙需䟦語晚生豈敢僣越然不敢不有以見區區慕用之私也胡公汪公皆人物標凖名論一定誰得改評時事傳聞有足憂者每念扶持三綱之語益令人感慨也蒙誨諭格物之説不勝悚仄前輩立言豈敢輕議但以河南夫子所謂物我一理才眀彼即曉此者觀之即宛轉歸已者似稍費力耳兼窮理功夫亦是且要識得事物當然之理積乆貫通之後自然所行不疑而實理在我隠微之間亦無私念河南所論條目甚眀恐亦不必事事比擬然後為得也又反身而誠乃躬行之至無一理不實有於吾身非為一時見處發也鄙見如此不審髙眀以為如何無由面請因風不吝垂教千萬之幸然張君所傳大學本子近日又多所更定稍覺平實恨未有人寫得拜呈也向伯元山間少得過從目昏不敢讀書舊學寖隳深以自歎然閒静從容却覺意味亦深長也昨得子澄書具道昨寄武夷佳句深有教督之意再加紬繹乃悟微指不勝感佩之至近聞汀劍之境有嘯亂者官軍挫衂勢甚可憂貧病支離彷徨瞻顧未知税駕之所奈何奈何御書古文孝經有墨本否欲求一通此書無善本欲得此讐正也向伯元某祠官秩滿比已再請聞諸公已相許旦夕必得之又且藏拙休息病軀何幸如之尚恨貧窶未能即挂衣冠景行髙風耳昨蒙委撰先集後語不揆荒拙率爾草成今附便拜呈恐有未當幸却垂喻容改定也晚學不當僣易迫於嘉命不敢辭耳向伯元昨以所撰先公文集序藁本拜呈未蒙鐫改方此悚仄今奉教帖反得褒賞之詞此豈所望也子澄相愛又素多可其言恐亦未為不易之論更望詳之有未安處却幸指示乃可傳逺耳子澄新除知識多以為疑聞吾丈亦有着甚來由之語此至論也然尚幸闕期未到得且從容耳子卿官期必不逺未及為書極懐想也景陽得時親几杖甚幸真足以銷鄙吝之萌矣向伯元周公去相尚畱義興豈過婦家少駐耶近方寄得一書問訊之勸其速歸不知今已出江上未經由必相見當能道所以然者某不恨其不早去恨其不勇為也天下豈有兼行正道邪術雜用君子小人而可以有為者去嵗入都時已知其必有今日之禍無疑矣令子知丞歸來文字竟足未耶今時諸司文字多為有力者所取至或同僚數人同署一紙而脅取之者此與法令所謂恐喝取財者何異火色如此平進者何自得之正當量分自安想賢郎熟聞㢘靖之教其必有以處此矣向伯元某向來妄意作一二小書初不敢以示人近年自覺昏憒不復更有長進有欲傳者因以付之今納四書五册仰塵燕几恐有悖理幸望指教尚及鐫改也向伯元子澄竟以薦賢遭論與某去冬波及之章正相先後但渠在郡與閒居不同昨聞俟罪丏祠未許此恐當力請而歸乃佳不審尊意以為如何近得其書甚恨不能早追長者之後塵也景陽何故却歸廬陵乆不相見不知後來學業如何也向伯元某衰病之餘去秋復有哭女之悲支離凋耗益已甚矣昨叨除命一辭不獲方欲春深闕近力申前請而代者忽以章罷便有奏事指揮聞命彷徨不知所以為計已專人致懇不過旬日當有决語萬一未遂即不免一行祈哀君父庶遂本懐耳江右之形勢必難勉强也子澄去替不逺醜正之人又以憂去意其可以善罷從容而歸今乃竟不得免又且便着道學兩字結正罪名世路如此豈復更容着脚不如且杜門讀書只作殘年飽飯之計庶無後悔耳所恨相去之逺不得時扣函丈日奉誨言以滌塵襟銷滯吝此為恨恨耳黄壻已歸三山赴馬帥之招爲今秋漕試計也後生輩未忘進取為此計較亦復可笑耳前所納諸書有不當理處切幸指教易數比之諸家已極簡易要非侍坐從容不能究其説也寵惠銕鏡川墨拜領銕鏡謹置之對坐常以自照如長者儼然臨之不敢不起敬也林井伯成季以下井伯外孫方之泰家藏某碌碌如昔近旬日來訟牒頓希可以藏拙但經界指揮未下不知竟如何昨夕地再震不知彼中如此否趙帥有來期未此但聞帥司已發牌印去它則無所聞也經界若行欲挽退翁仲則一來但其地皆煙瘴之鄉不知二君肻一來否煩為微扣之别有有精神耐勞苦􅈕任事而能戢吏愛民者不妨更為尋訪喻及此或亦專人去約此不厭人多分頭勾當庶事易集也林井伯示喻福公令孫好學之意甚慰鄙懐昨擇之書來亦嘗及此遺書中間編得草本未曽寫净兼亦止是記得諸公行事大畧若欲究其學問根源則不如讀其所著之書為有益也伊川先生多令學者先看大學此誠學者入徳門户某向有集解兩冊納呈福公其間多是集諸先生説不若且看此書其間亦有少未安處後來多改動旦夕别寫得當寄去換舊本也陳公令孫之字謂何幸批報近思錄亦好看煩并為説達之也林井伯承喻諸賢肻來之意尤以愧荷但指揮至今未下聞有陽操兩可而隂實力沮之者此雖兩郡貧民之不幸然使區區之願不讐則亦拙者無窮之恨也蔡周諸君雖未識之然既為賢者所稱已筆之於簡矣惠安文字此正以臬事之故不敢數與之通問無由可致力也某前月脚氣大作兩旬然後愈又苦臂痛中間小愈今復大作作字如此它况可知它不可意者甚多已專人求去矣林井伯某衰病發歇不常醫者以為風氣非脚氣似亦有理此數日來却幸小定然亦未敢自保也經界之命雖下然已後時恐妨農功未敢下手又不免費分疏尚恐有避事飾詞之責然亦無可奈何也學古之薦昨得帥書嘗語及此公論所在人無異詞也簡卿文字極荷不外但某平生畏人來討文字亦自守不敢求知之戒不敢以其所賤者施之於人故未嘗敢作此等書如學古亦只是自首薦之未嘗為轉求也千萬見亮為幸林井伯某去秋今春兩次大病今夏第三女子得疾療治驚憂凡百餘日竟不可救老懐傷痛不可堪忍病軀緣此愈見衰弱奄奄度日無復生意江西之除雖感聖恩然形神如此豈復更堪仕宦已申省懇辭矣萬一未遂臨期須力請以得為期也通老所言極荷畱念成都事已報過未知果如何若真有此可謂疎脱幕府諸人亦不得為無過矣擇之去住不知如何正恐子直亦不自安也林井伯錄示氣訣極荷畱念不知曽試如此行持否効驗果如其説否然尚有一二處未盡曉異時須面扣也福公書來亦説不成為三山之行可見審重之意又䝉寄惠武夷長句平易宏深真有徳者之言也欲作書和韻附此便致謝以雩字韻險揑合未成且俟後便恐因見次問及幸為道此意也趙帥進職因任可喜但聞開湖事都下亦頗紛紛人之多言亦可畏也林井伯某憂苦杜門卜葬未定忽叨収用之恩顧此私計實有未便已力懇辭勢必得之此間築室之舉作未及一已覺費支吾甚悔始謀之不審也臨漳紛紛後來又不止此薄徳繆政累及僚友深以自愧師中必已歸到前日便人尚未回也彼中諸朋友喜各安佳便遽事冗未及上狀各煩致意趙卿文字未得下筆前日被潘恭叔來守乃翁志銘畧為草得一兩紙便覺便旋白濁夢寐不寜此豈治筆硯之時哉永嘉林復以墨來見觀其所製頗似可用求書南逰因附以此朋舊間恐有可為可譽處幸畧道意已深喻之不敢有望於賢者矣郡侯好事或使知之亦佳林井伯閒中何以閲日想不廢探討之功伏臘之計不至入思慮否來春當復為一出計否風波渺然未知所止泊也某去年不甚病今春乃大作㡬不能起廖子晦到此見之經由相見必當語及也今幸且能喫飯讀書然眀年便七十矣來日能復㡬何不知不覺輥到此窮極處亦可笑也餘干乆不得書今年為黄子由徐子宜觸動機闗又復飜騰一上未知何時得平静也仁里諸賢想各安佳草堂想論著不輟今年病中看性理文字不得僅繙得一二小小文書有未識來歴處欲質所疑而不可得殊鄉往也師是兄弟為况如何師中想非乆赴官矣履之亦相聚否别後所進何業也林井伯某今年頓覺衰憊異於常時百病交攻支吾不暇服藥更不見效只得一兩日静坐不讀書則便覺差勝但魔障未除不容如此兩日偶看長編至燕雲事便覺胷次擾擾如在當時廟堂邊境之人甚可笑也閩中一嵗而䘮三雋皆未老而遽化近又聞子約之䘮貶死異鄉尤足傷悼想聞之亦為悵然也鄭公得請奉祠歸享甲第之盛想不復以當世為念矣自其開府之初得一通問後恐蹤跡累人不敢再遣今却不可不致書輙有一緘外題只納左右處幸擕見面納之免思憂慮渠向書來亦只封與詹元善盖恐人之知之也趙子欽彦肅友人林井伯文軒之從子也今往赴省因過餘干勞苦故人之在難者其義甚髙到都下不欲參學以避時論欲得一僧舍安泊數月不審能與致力否渠知識自多但難於見人故欲且得僻處潛伏耳方若水壬承喻深悉賢者才業如此及此未為世用之時加意講學勉力職事以修其在我者至如士民薦舉之類亦當有以禁之勿令復出不知它人如何如某乆居閒處見此等無非迎合以是心常惡之當官處遇有此等或察其情有姦弊即繫治之不少貸也别帋所喻三先生祠記多事不暇作兼長泰設此似亦無謂也縣學文字適此擾擾未暇詳閱要之此等粗合有司程度足矣學者須令此外識得一用心處乃有益耳舊課新詩及啓皆善但四六須更看前輩歐王曽蘇所為乃佳然亦不足深畱意也大學近改兩處及未印間改之為善其它民間利害當就州府理㑹龍溪事亦不足深計渠固未嘗喻及也程帖已領白杜本後䟦有記眀道一二事并附入亦佳大率諸義皆傷淺短鋪陳畧盡便無可説不見反復論辨節次發眀工夫讀之未終已無餘味矣此學不講之過也大率鬭揍已字太多反失正意据題意則治已字輕以仲尼字重輕處只消拂掠説過不必如此装得太重也晦庵别集卷二欽定四庫全書晦庵别集卷三宋朱子撰書方耕道耒所示劄藁備見勤懇之意至誠感動理必可伸但未曉其名色不知所論為己眀白與未耳㓂事亦不審其曲折若如前書所喻欲以不加桎梏之類為感動之術則在我者誠亦有以取之矣大率天下事循理守法平心處之便是正當如盗賊入獄而加以桎梏箠楚乃是正理今欲廢此以誘其心欲其歸恩於我便是挾私任術不行衆人公共道理况恩既歸我怨必歸於他人彼亦安得無忿疾於我耶此等事病根不淺頃它時面見更於源頭理㑹耳眀道先生記彭中丞語云吾不為它學但自幼即學平心以待物耳此言可念也信筆及此深愧率易然以老兄樂於聞過勇於徙義必不以為怪也桂林春來未得書不知為况如何求歸不獲甚可念程簿得安其職幸甚許宰書已領矣所喻不敢為乆安計在邑一日且料理一日事甚善至所謂不為乆計者亦須决定去得如其不然即此言反為害矣方耕道前書所布當蒙深察既不欲宻之又不欲公言而發之盃酒之餘恐尤未安以愚意觀之既為辟客即非泛泛属官之比有所見聞正當宻言之耳但亦當斟酌是否量度時宜使有益於主人而無傷於事體乃為盡善若一言不契即欲忿然引去以為髙則吾不知其説矣千萬幸聴此言盖非獨老兄一身之得失實吾道興衰所繫切告詳思此言有深味不可草草看過也暇日讀何書易傳恐宜熟觀且虚心玩味未可便容易領畧亦不須更立新説且只看他聖賢處事詳緩曲折處不要作書讀且只作事看也皇甫文仲甚不易得老兄所以箴之者甚善聞渠亦甞相勸真得朋友之道矣吾人之意豈是欲耕道為容説媕阿之計只是要得是當耳寛猛之説前書已具言之更告畱念令弟書來甚佳大慰乆别之懐欲别上狀雪中手凍不能辦又急欲遣人候南軒安信只附此見區區凡百且勸賢兄寛以耐事逺方既難得朋友兄弟便兼切偲之責凡事仔細商量為佳也方耕道昨承書知所苦増進不勝驚憂既稍甦惺莫已旋向安矣偶按事天台奏乆不報此必有掩蔽聪眀黨䕶奸惡者以此畱滯多日欲討少錢物奉助醫藥而不可得今逐急那得五十千遣去老兄且加意寛心將息不必過慮令兄伯華不及别書想且相照管恐耕道病倦遣去錢物幸為檢入也方耕道昨日遣書匆匆不盡意比想體中益佳健矣人參三兩恐客中或闕用今遣致之幸視至迫遽不及詳布鄭景眀昭先以下景眀之孫至家藏某老懶不堪比復大病今雖小愈猶未復常已上投閒之請度嵗交或可歸卧故山矣承以職業頗為當路所知甚善甚善更在勉力講學使知益眀而行益修則固不患人之不已知矣鄭景眀示喻讀書未能無疑固應如此然且漸就易曉處求一入頭下手功夫且讀且行則乆之自有見矣鄭景眀太湖保伍施行有緒乃為强豪所撓敗深可歎惜官府不足倚賴如此子厚之不能安居固宜然遷徙重事不可草草已屢作書勸之矣小人凌上之風漸不可長能為風曉邑大夫有以正之乃縣道政事所當然非獨為子厚計也鄭景眀往來頗談佳譽更宜勉力隨事及人亦逺大之基也破賊受賞果應功令亦復何嫌府公寛厚想不至有沮難但恐吏輩過有邀求為可憎耳某懇辭除命候畢䘮𦵏已不得請但臨漳經界報罷已引愆俟罪勢必不成行也楊生道夫鄉居托芘甚幸聞其懦弱頗為人侵侮或有不得已之懇幸稍左右之今時外縣例以無訟為美政善良不無受弊此不可不知也朱魯叔以下莆陽方楷家藏薦書不知竟可得否彼中諸公都無書來固不容效力然亦知自信之篤想不以此忉忉也向所附去文字官事之餘一日豈不看得一兩段未説要得十分通徹但時時得此澆灌心胸亦須有得力處也南海樂章乃今廟中祭享時所用之樂或云其譜乃唐朝所頒與今世俗之樂不同故欲得之耳只問尋常主行祭事吏人便可得之只録其篇章名號次第便中寄及幸也聞説曲名皆連環也學古某忽被鐫免之命想已見報矣罪大責輕固無足言而累及知友殊使人愧恨蔡季通經由治下恐道間不免有所煩凂幸以某故少加照瞩渠於此事本無所預殊可念也士俊推官想以鄉里之舊自能周旋更不致書然語次亦幸宻喻之也學古聞郡中此來紛紜殊甚繆政致此夫復何言但累及諸賢例為羣小所辱令人不平耳新史君到事當自定但不知龍溪事竟如何耳少懇有紙萬張欲印經子及近思小學二儀然比板様為經子則不足為四書則有餘意欲先取印經子分數以其幅之太半印之而以其餘少半者印它書似亦差便但紙尚有四千未到今先發六千幅便煩一面印造仍㸃對勿令脱版乃佳餘者亦不過三五日可遣也工墨之費有諸卒借請已懇髙丈送左右可就支給仍别借兩人送至此為幸借請餘錢却還盡數為買吉貝并附來然須得一的當人乃佳不然又作周昇矣昨亦已懇髙丈為根究此人不知如何庫中墨刻亦各煩支錢買紙打十數本内獻夀儀及永城學記多得數本不妨獻夀儀要者更多也恐印不辦即續發來不妨但吉貝早得禦冬為幸耳所印書但以萬幅之太半印經子其餘分印諸書平分看得㡬本此無版數見不得多少也臨行時令庫中刻一書目如已了幸寄來也方耕叟耒方之泰家藏耒敬問改過行已之方願先生賜之一二言使耒自此得朝夕從事於斯口誦心維知所敬畏庶㡬前姦之不復邇其亦古人盤銘書紳之義云耒拜稟夫子有言弟子入則孝出則弟謹而信泛愛衆而親仁行有餘力則以學文其言雖約然在耕叟今日改過修已之方莫切於此耕叟勉旃它未有以告也五月十四日某書皇甫文仲斌以下文仲之孫撝家藏因遣人至九江市省馬恐為駔者所欺令一稟指揮幸與畱意千萬之望又有一事軍中請給條例合支細色者每碩只支六斗不審軍府見作如何施行幸子細批喻皇甫文仲辟書已下否行之遲速若有嚴君之命不必遷延賁之初九其義甚眀此不足為笑而適足以見髙誼耳然行日千萬更遣一報欲附書也四九侄專去請見非有素約亦不敢令輙往幸早遣其歸也皇甫文仲鞠㑹向熱想未可來此中見治一教場甚闊亦未竟竟即可試馳射容續奉報也皇甫文仲示喻淮上新田偶有水患此天意更欲太尉且為國家立功立事未許就此閒適耳大學或問今付來介看畢幸示及易傳䟦語未敢容易更容擬定續奉報也荆州之行果在何日未即承晤臨風依然皇甫文仲某昨來求去不獲近復有請其詳具南軒書中此不備言也左右到彼既乆南軒必朝夕相見講論當有深趣所喻恢復規模誠不可易之論然今日亦惟南軒實做得此工夫某輩衰懶只思縮頭豈可夢想此事也龍山佳句可見一時賔主之勝恨不得為坐上客也所喻易説實未成書非敢有所吝於賢者然其義理不能出程傳但節得差簡畧耳大抵讀書且當盡心於一家之説不可如此貪慕疑惑况在今日老兄讀書便要道理受用又與章句儒生事體不同但子細反復看教程傳浹洽或更就上自節出𦂳要處看尤當得力也因見南軒試以此説扣之亦必以為然耳皇甫文仲人至辱書知還侍安穏即為荆渚之行甚慰所望大丈夫所為正應如是耳張帥書煩致之暇日從容更可詳扣立身行道之曲折也但秋風已髙衝冒良勞千萬加愛為禱弓弩甚荷畱念已别具數呈稟太尉但斗力太强非羸卒所能發須少損之耳復之尤感深念但藥材之屬又不免為賢者之費甚以為愧幸早遣還此侄子亦不須乆慁館人也皇甫文仲朋友數人往逰山北因欲請見太尉公以觀軍容之盛諸君皆有志者而蔡君甞欲講於刑名分數竒正之學幸為通之使得聞其所未聞者因與俱來為數日之欵千萬幸甚皇甫帥倜某頃者星江宻邇聲光不獲一見至今為恨年來奔走疾病多故又不得以時致問起居尤切瞻鄉之勤兹辱惠書且承喻及有以知賤迹之不敢為江右之行足見髙眀相知之深相信之篤三復感慰不知所言又聞謀居筠陽極為得䇿但太尉丈忠誠勇畧上所深知而公㢘之功見於今日者又如此竊計不日浮謗自消亦不容乆此閒退矣某疎拙自信仇怨滿朝幸上聖眀未忍誅斥今又叨竊祠祿安處田間戴此厚恩豈有涯量亦不復敢有當世之念矣無由㑹面罄此心曲引領齋閤臨風拳拳林子方枅莆陽余師魯家藏伏奉賜教恭審即日春和吏部郎中節傳所臨神相台候起居萬福至感至慰但區區本欲一走前路謁見少償夙昔之願已托徐丞遣人見報日今未至而來使及門則云台斾已從東路而上矣此亦有山路可至太湖但衰病之軀兩三日來飲食失節氣痞腹痛似是所服脚氣之藥多有凉性以致如此復此山雨隂寒薄人勢不容進引領旌纛徒切馳情失此一見之便台坐徑躋華要而賤跡跧伏窮山出處不齊何由復遂鄙願所冀益懋徳業有以振起末俗衰懦之氣使吾黨之士與有光焉則亦不必同堂合席然後為相見也頒惠茶藥極感厚意方意極佳服之有效别當致謝也林子方以下子方之孫友聞家藏伏見大禮赦書有薦士之文而鄉人之議欲以布衣曹南升為請如熊左史諸長者皆已列名具狀而某亦已書其後矣某與之逰為最乆知其人為最深盖其學問不為空言舉動必循正理識慮精審才氣老成雖自中年即謝場屋而安常務實不為激發過中之行本實當世有用之才非但狷介一節之士也昨陳正獻公作帥之日嘗欲論薦㑹以移鎮不果論者至今惜之若蒙台慈參考衆言察其行實以時列上使得稍被朝廷招徠之選足以見眀使者為國薦賢不遺草澤之意下使學士諸生有所矜式興於㢘遜誠非小補東臺王丈亦知其人語次扣之足以知鄙言之不妄也林子方比嘗顓使拜書伏承誨答所懇牓文亦蒙畱念感幸不可言區區此來所苦萬狀僅了今春荒政即欲丏祠以歸而所部皆以旱告盖去嵗之灾所不及處無不病者而衢婺荐凶公私匱竭尤未知所以為計獨念貴境猶可告糴已請於朝降本収糴且散牓自廣以東諸州以招誘之矣恐番禺以西更有出米通販去處謹復具公移并以牓文三百道仰累頤指散下曉諭不勝幸甚此米到得四眀尚須般運方得至衢婺正自不易為力鼠伎已窮日夕憂懼髙眀有可以見教者深所欲聞切望因風指示一二幸甚劉徳修光祖以下後溪之曽孫曽元家藏東溪語説拜賜甚寵伏讀再三乃知師友淵源所自深逺如此士不知經果不足用信矣如韓子之言也地逺無從親扣餘論又以歎恨耳嘗患今世學者不見古經而詩書小序之害為尤甚頃在臨漳刋定經子粗有補於學者前此欲寄傳之及宋子淵家而便人不為帶行今内一通幸為過目還以一語訂其是非幸甚大學鄙説一通并往所懇不殊前也此書附制司幹官孫應時頃在淛東時所舉吏也後生好學志趣不凡經由必得進見倘辱延納而教誨之幸也趙天官所得書尚滯從班未厭人望中間進對陳説甚苦有識雖益歸心然似已不為上下所安矣消長之决諒已非遠嫠不恤緯之憂伏想同之也傳之為况如何未及寓書并深馳仰耳劉徳修竊聞榮被除書進參講席輔導得人善類同慶某幸得為僚尤切忻幸姑此布聞餘容面慶劉徳修昨承載酒訪别情誼繾綣豈勝感歎恨坐逺不得欵承餘論而遽為數千里之别也今晚或來早即行無由詣違亦不及一見東溪先生重以悵惘又不敢拜簡以勤誨荅也小史汪致眀頗謹欲事左右不審可容畱否謹此遣前可否唯命它冀以時節宣訖致格君定國之効千萬幸望丁仲澄見臨漳語録來書深以其學侵畔為憂自是而憂之則有不勝其憂者惟能於講學體驗處加工使吾胸中洞然無疑則彼自不能為吾疾矣若不求衆理之眀而徒恃片言之守則雖蚤夜憂虞僅能不為所奪而吾之胸中終未免於憒憒則是亦何足道願老兄專以聖賢之言反求諸身一一曉然無疑積日既乆自當有見但恐用意不精或貪多務廣或得少為足則無由眀耳某比來溫習畧見日前所未到一二大節自頗覺省力但昏弱之資執之不固尤悔日積計有甚於吾友之所患者乃承訪以所疑使將何辭以對耶然以所聞質之則似不可不兩進也程子曰涵養須是敬進學則在致知此二言者體用本末無不該備誠用一日之功當得其趣不然空抱疑悔不惟無益反有害矣夫涵養之功則非他人所得與在賢者加之意而已若致知事則正須友朋講習之助庶有發眀不知今見讀何書作何究索與人論辨惟無欲速又無蓄疑先後疾徐適當其可則日進而不窮矣因書或有以見教勿憚辭費某亦不敢不盡愚也向見前輩有志於學而性猶豫者其内省甚深下問甚切然不肻沛然用力於日用間是以終身抱不决之疑此為可戒而不可為法也詹尚賔觀見南溪祠志孟子曰人有不為也而後可以有為又曰狷者有所不為不為之言則同不為之意似有别矣切疑狷者之病全在於有所二字於所當為者而不為則非知所决擇之人矣狷者之所以不為者病在何處茍自知其偏加篤學力行審思眀辨之功便可至中耶抑氣質之偏自有定量終不足與有為耶狷者但能不為而不能有為亦其氣質習尚之偏耳知其偏而反之豈有終不足與有為之理孔子曰鄉原徳之賊也所謂鄉原者言不顧行行不顧言閹然媚世與夫同流合汙似忠信似㢘潔所以為徳之賊也嘗究鄉原之用心全在於衆皆悦之之一句所以動他許多不正當底事出來若夫狷者之病只在於獨善其身非若鄉原之病於用心處有不正矣使知學問亦可以變其氣習耶抑亦受病之深藥力之所不及耶不則夫子何以云過門不入室為無憾其待斯人可知矣鄉原患在求悦於人與狂狷正相反故夫子深惡之然亦無不可變之理但恐其䧟溺之深不肻變耳志南上人見寒山子詩集後使至特辱惠書獲審比日住山安穏為慰天台之勝夙所願逰往嵗僅得一過山下而以方有公事不能登覧每以為恨今又聞故人挂錫其間想見行住坐卧不離泉聲山色之中尤以不得往同此樂為念新詩筆勢超精又非往時所見之比但稱説之過不敢當耳二刻亦佳作也但攙行奪市恐不免去故步耳寒山子詩彼中有好本否如未有能為讎校刋刻令字畫稍大便於觀覽亦佳也寄惠黄精笋乾紫菜多品尤荷厚意偶得安樂茶分上廿缾并雜碑刻及唐詩三冊漫附回便幸視至要出師表未暇寫俟寫得轉寄去未晚也寒山詩刻成幸早見寄西原崔嘉彦以下見南康集前日詣見重有喧聒媿不可言奉告獲審經宿道體佳勝為慰某前日出山至上京陂頭遇雨巾屨沾濕狼狽可笑喜幸之深但恨已差晚耳承問之及感感餘俟入城得面布也昨承枉顧棲賢得欵餘論為慰即刻伏惟動止佳勝昨日之雨城中不能斂塵髙隠必多得之也米資少許别帋送上幸視至魏甥恪即向來病甥之兄到此病作自有手簡求藥幸審其證報之當為修製服餌也昨日裴回三峽奉候乆之既以日莫遂東走楞伽折桂失此一見殊悵想也奉告欣審即日殘暑道體佳勝庵屋仰勤神用方丈牕牗只於兩旁為之大小隨意可也承誨示并寄竹萌良荷厚意知煩親斸尤珍感也卧龍亭子已下手否向説栽竹木處恐亦可便令施工也人還布謝草草復未有一物為報引領雲山第増媿仰承手示聞還自徳安體用冲勝良慰昨夕聞山間雨頗沾足城中殊少未敢廢禱祠也所喻當為立之庵中什器俟一面措辦旦夕得雨後須一出郊諸容面道或因入城幸左顧也奉告承乍寒道體増勝為慰卧龍新庵主入庵未得一往視之承其寄筍感感人還草草少間别奉問次林師魯以下先生之曽孫沂藏錄槀某自幼年侍立先君子之側則聞先芸齋公之名而知其相與逰之善矣不幸既遭大禍來居深山窮谷中與世絶不相聞雖先君子之執友如芸齋公者亦無由一望其顔色而受教誨焉孤陋塊處徒有嚮往之誠而無以自致也比年鼎山蔣丈來尉兹邑因得從容請間以訪先君子之舊逰然後知芸齋公之沒亦既乆矣私心方竊自悲既又聞其有賢子者問學行義克世其家則又以自慰也去年林擇之不鄙過門以講學為事怪其溫厚警敏知所用心皆如老於學者因扣其師友淵源所自而得三人者焉曰程深父曰林熙之而其一人則向者所聞吾芸齋公之子也於是始恨向者所聞之未盡既而擇之又出送行序引讀之盖所以見属之意甚厚雖竊自知其庸妄無以堪之而愛其文悦其義不覺其三復而不能已也以是益知擇之之賢其來果若有自而願見賢者之心日以切切方其歸時適在城府不能為書而徒属以問訊盖亦慿恃事契之重而不自外焉兹者乃承捐惠長牋副以劄目情義周渥足以見不忘舊故之厚而其禮與詞則惴惴然若後進之於先達是豈所望於通家之舊哉不敢當不敢當自是以徃行李往來幅紙之書有以警誨則為賜大矣若復為是使人不敢當之禮而又告之曰先知覺後知先覺覺後覺而已則非某之所敢聞也大學集傳雖原於先賢之舊然去取之間决於私臆比復思省未當理者尚多暇日觀之必有以見其淺陋之失因來告語勿憚諄切豈勝幸甚擇之此來得日夕聚首啟其不逮實有望焉社中兩賢亦未獲見敢煩寄聲以為異時承教之地為幸林熙之去冬枉顧幸得數日數奉名理感慰之深所恨空疎無以少助潜思之妙耳奉告承别來春暖徳履萬福為慰為慰第聞師魯遽不起疾深為悲惋美才髙志未克有成既足深惜而朋從零落道學寡助此尤深可憂也想惟平日切磋義重有不易處者奈何奈何喻及仁説大概得之但所謂三者皆心似便指作仁體此似不安又謂推而上之尤覺閡隔有病莫若只於敬字加工乆之自然當處見得不用如此臆度轉見汗漫支離不精切也詩之比興舊來以闗雎之類為興鶴鳴之類為比嘗為之説甚詳今此本偶為人借去未及錄呈大概興詩不甚取義特以上句引起下句亦有取義者比詩則全以彼物譬喻此物有多不説破者有下文却結在所比之事上者其體盖不同也上蔡言學詩要先識六義而諷詠以得之此學詩之要若迂迴穿鑿則便不濟事矣不識髙眀以為何如朱魯叔仙逰朱堂甫家藏去嵗歸來計度不審妄意作一小屋至今方得遷居然所費百出假貸殆遍今尚未能結裹圓備甚悔始慮之不精也所喻今方具曉本末記之不難但年來多事精力益衰日間應接不得少休纔得頃刻無事即須就寢俟其寧息然後可以復起應接更無暇看文字矣所欠人家誌銘之属積壓無數擺撥不行恐未暇為吾弟記此也然亦未敢不為俟定居後看如何或人事稍簡試即為思之也齋記大字亦然余景思以下仙逰洪震夫家藏彼中學校如何亦頗有士人否聞南方風俗淳朴不汲汲於進取正當勸以讀書講學開發其聪眀不當啟以趨時干禄之技也暇日亦當有觀書味道之樂但僻逺難得師友此正在自著林擇之用中以下文公之曽孫濬家藏錄藁某侍旁粗安早稻既登民饑亦少瘳矣然朝廷所遣使者方來所至揭榜施米十日市井逰手及近縣之人得之深山窮谷尚有饑民却不沾及然所謂十日亦只虚文只軺車過後便不施矣其實亦無許多米給得也世衰俗薄上下相蒙無一事真實可歎可歎長沙人來得南軒兄弟湘西朋友書有吾友書四封一角來人云自經由古田今并附此令自往相尋也書中所論疑義如論浩然之氣處極好盖餒則便是缺了此正氣而氣之本體常浩浩然也但自家身上自間隔了耳不知賢者以為如何其他不能遍論以去人立索書不能子細也書來并為詳論之文定祠記知言序遺書二序并錄呈和章想書中自有更不寫去祠記渠令為看未穏處讀之數過但見叢雜難整頓煩子細僉出及注合作如何改易附遞來漕司東㕔令轉致此南軒甚欲速得之語張帥改定寫來芮漕處也三序并告參詳喻及幸更呈諸同志議之既欲行逺不厭詳熟也千萬并祠記發來林擇之已經新嵗學不加進而年嵗日侵甚可懼也承昏期在嵗裏想慰老人之意又聞葺居奉祀并講盛禮想營治不無少勞適此涸轍不能少奉助為愧耳文王之事考之詩書誠如所疑然此馬肝之論也不若姑闕之以俟來者不必身質之也問答方得草草一閲俟徐看有疑即報去偶此嵗首多事未暇也南軒一書比亦附致尤川不知達否聞欲來延平别石丈能與擴之乗興一來相聚數日否及諸朋友在此得一講論亦快事也擴之不及别書承書并寄元禮耕老書信已領所欲言者不過如前更不及别狀樓名既犯朋友尊長名則亦難用况稠乃木稠非雲稠也更可擬得一二見報當為擇其安者林擇之某憂苦如昨至節復不逺痛割不自堪幸朋友不鄙棄責以講習怱怱度日且復支持耳擴之來此相聚極有益其專志苦學非流輩所及但於展拓處終未甚滿人意耳昨欲往臨安以資用不饒又南軒蹤跡不定且令中輟今却欲且歸而嵗暮復來再三畱之以其歸省之意甚堅不免聴之此間事渠必能一一言之不復縷縷但元履適過此云得其子九月末書南軒求去不獲數日甚撓此極知其必然不知渠又何以處之尚幸擴之之輟行也來書所論數條有未合處别紙具之但覺大概氣象有粗疎處不知何故如此似更宜警省也某近覺向來乖繆處不可縷數方惕然思所以自新者而日用之間悔吝潜積又已甚多朝夕惴懼不知所以為計若擇之能一來輔此不逮幸甚然講學之功比舊却覺稍有寸進以此知初學得些静中工夫亦為助不小尚恨未免泛然應接不得專一於此耳林擇之經説依後書所定甚善但止謂之經説不同諸字尤好又春秋傳序四字不須别出但序文次行不須放低則自然可見論語説下不須注孟子附字又欲移禮記作第七卷而第一行下著二先生三字其後却題眀道先生改正大學伊川先生改正大學其小序則仍舊附於第六卷尾論孟説後盖此六巻乃其本書而後一卷今所附者使不相亂乃佳也更白鄭丈看如何向借劉子駒本改字多是胡家改定者非先生本書今不必用然恐有合參考者偶此本在家中今令此人去取納上更仔細商量為佳外書既未備不欲遽出此事正不須忙今草草做了將來有不如意又不免更易傳者人人殊異無復可信天下後世非所以為乆逺計也并白鄭丈看如何示及為幸孟子解此亦見從頭看起未容寄去更俟㡬日也林擇之某竟不免為此來初到事多殊不堪今漸定疊矣但野性危蹤皆非宜乆於此者見為此邦料理減税事旦夕剡奏列上即繼以奉祠之請矣得否未可期但若不去必無好出場盖已有氣類不同望風相疾者此要為不足恤然亦何苦將身博彈射耶云云來此間非案牘即有賔客之擾比於退食則形神俱憊只得瞑目危坐収拾魂魄以待事之復來殊不得看一字平生論著用盡心力皆已有緒今乃墮此紛擾中不得卒其業精力又已衰耗如此大以為懼朋友中有知識者亦皆為某危之乃知伊川先生做得易傳却是得涪州一行氣力也擇之彼中相從者有可與進於此者乎此中一旬兩到學中然殊未有慰人意處未去之間亦且試撈摸看若幸指撥得一二人亦是一方乆逺利害也林擇之某所請竟未報元履傳聞有添差台學之除此不待其自請而擊逐之當路聴言待士之意可見矣所示諸説皆甚精然鄙意有未安者别帋具之擴之亦有説當自封去因來幸反復之以歸至當計此所校亦不多但却是不容小差處望速垂報也見喻太着之病此不能無但與其浮泛無根不如脚踏實地為有進歩處耳祭儀藁本納呈未可示人且煩仔細考究喻及日歴中事雖不多然可以補事實之缺此書異時要須别刋乃佳耳知與諸賢逰從日有直諒多聞之益甚善甚善數詩皆佳率易和去不成語言勿示人也伯山家事如何晞之似亦曽相見來今不記仔細也伯山質實可愛敬但亦染禪學耳向與深卿書乃附劍浦劉親不謂畱滯至今欲撿藁本再錄去又思擇之所以告語之者必已甚悉而不能迴則此書雖達亦未必有效耳今且煩致意但信得孔孟程子説話及時試將許多詖滛邪遁説話權行倚閣一兩年却就自家這下實做工夫看須有些巴鼻也今只管狐疑不肻放捨又引眀道少時出入釋老之事以飾其説何不將它平生説話仔細思惟看他所以出入釋老處與自家只今全身䧟溺處是如何而直為此倀倀也又如前書所論馮道吕舜徒事此尤害理曽與之劇論否此等處不理㑹則朋友之職廢矣發眀義理此亦有之向來何故不曽見渠家似此文字固自有好處尚多向見汪書甚珍秘之然便只向這死水裏渰殺則更無超脱處矣不知世間見有六經語孟程子文字既有志於學因甚不向裏面做工夫而収拾此等以為竒特枉却身心可歎可恨也静勝軒錄却未見之如文字不多幸為錄寄此近於蔡季通處見庭聞藁錄一篇乃楊昭逺記龜山所舉二先生語殊無精神悶人看不得不知静勝之説又如何耳前日劉子澄寄得滎陽公家傳即吕原眀也中數段來一段説吕初學於伊川後與眀道横渠李公擇孫莘老逰所見日益廣大然公亦未甞專主一説晚更從髙僧宗本修顒逰觀此則吕家學問更不須理㑹直是可以為戒亦不可不使深卿知若不信則無如之何也拙齋有何説數詩幸早示及籍溪行狀更為促深卿早寫寄來舜臣相見未向遞中亦附書矣項掾果如何若果有志當痛與説恐頽波之中救得一箇半箇亦非細事也前書説有一賢宗室後來復相從否福州有一同年趙彦徳任丈之甥氣質亦甚好但一向習詞科頃嘗畧勸之聞今年又往試可惜錯了路陌也近聞張安國消息極不佳果如所傳亦可惜耳南軒乆不得書不知為况復何如所論異同處亦未報不知後來看得又如何也深卿詩市廛差可隠未暇泛滄洲此兩句便是箇因循猶豫底意思宜其不能勇猛自奮於異學之中也擇之押此韻處正中其膏肓不知渠還覺否此亦是偏處然吾儕中人之質若無這箇意思定是埋沒了出頭不得也林擇之深父遂死客中深為悲歎其弟已為了後事過此無以助之又此數時艱窘不可言向來府中之餽自正月以來辭之矣百事節省尚無以給旦暮欲致薄禮比亦出手不得已與其弟説擇之處有文字錢可就彼兑錢一千官省并已有狀及香茶在其弟處煩為於其靈前焚香㸃茶致此微意累年相聞而不得一見甚可恨也林宰興學之意如何可尚可尚但聞其非乆受代亦須得後人信得及乃佳不然恐徒費力而為主其事亦難為進退耳擇之已辭尤川耶彼學中今復何人料理欽之寛中諸人能左右提挈否石宰乆不得信不知其子病如何文字錢除前日發來者外更有㡬何在彼擇之為帯得㡬千過古田千萬早示一數於建寧城下轉托晉叔寄來為幸或已去手能為収拾專雇一穏當人送來尤便此中束手以俟此物之來然後可以接續印造不然便成間斷費力也千萬早畱意為妙須知昨已修定送伯諫處未取大率事體亦只如所示但條目差分眀耳欽夫屢得書有少反復議論未及錄去其大概曲折亦非面未易布也力行固不易而講論要得是當亦復如此之難可歎可懼渠所論如云論孟序中不當言漢儒得其言而不得其意盖漢儒雖言亦不得也不知擇之以為如何某則絶不愛此等説話前輩議論氣象寛宏而其中自有截然不容透漏處豈若是之迫切耶近又得皇王大紀諸論其間大有合商量處不但小小可疑而已此間朋友亦無甚進益不知擇之此來工夫如何甚欲一見而相去益逺無由㑹面此情鄉往殆不自勝也向來召命屢下既懇辭之又託人宛轉近得諸公消息似已許其辭矣此事只得如此而貧病殊迫亦只得萬事減節看如何欽夫頗以刋書為不然却云别為小小生計却無害此殊不可曉别營生計顧恐益猥下耳林擇之歸自政和住家十餘日祭祀賔客書問之擾不得少暇固無暇讀一字書今又當出崇安見新守令石宰相招極欲往觀盛禮及與朋友相聚講論而日月匆猝如此無緣去得甚以為恨不知擇之能撥忙一行否昏期既在後月度尚可一行也擴之寄來文字皆已領前便承寄海物尤愧感也中庸因論致曲而能有誠然自眀能動人以下已是誠之成功孟子所謂至誠而不動者未之有也亦可見矣盖生知學知雖異然及其知之成功則一而已通書正用此意然下文擬議便是致曲之事亦若無異處也無所不用其極之説甚巧然恐其本意未必果出於此必不可通闕之可也大學正經云云亦以意言耳傳中引曽子曰知曽氏門人成之也南軒語解在尤川未到所論大概甚當鄙意正如此又言行錄流布甚廣其間多合商量處中間以書告之然不勝毛舉近得報云欲改數處亦未妥帖要之此書自不必作既作而遽刻之此尤非便昨日得伯諫書亦深議此事也近與伯恭往返議論稍多此人却向進未已今日臨行無暇錄寄俟後便也林擇之聞學中已成次第甚善但尤川學者不無恨於遽去耳更能到彼少畱以慰其意否若能因遂過此小欵旬月尤所望也某此如常所欲言者前書已具之矣㳺成之來訪其人開爽有用之才也極可喜可喜然更能加沈潜義理工夫所就當益可觀耳渠到此之日擴之亦來得數日逰談少快幽鬱之懐但聞浙中學者議論多端亦殊使人憂悶耳以此深欲早就前書之志庶㡬小補於世不為天地間一蠧物者而理義未精日力不足為之奈何林擇之辱書知講學有緒深以為慰是日偶與元履及諸朋友在鑪峯新庵共増懐想也縣學須知甚精宻但寫得未有倫理方欲為畧整頓㑹少冗未暇也所論仁恕之説恐不必如此立説只當以語解為正遺書所云或是一時之説不必如此牽合補綴也午節在近想須歸省古田既未可必即不若且來尤溪耳精義印造未辦辦即如所喻也㳺成之甚欲一見之恨相去稍逺耳彪徳美赴省囘過此相見得一夕欵只是舊時議論且云欽夫見大本未眀所以被人轉却亦聞擇之所在恨不一見也林擇之某此碌碌如昨無足言但獨學不長進而逺近朋友亦未見超然有所造詣者嵗月如流良可憂懼耳擇之尤川畱㡬何時所論何事此亦乆不得書矣因便仔細報來還家已來為况又何如日下作何工夫亦可一一報及相去既逺難得相聚相聚往往又不能盡所懐别後令人常有耿耿不滿之意後㑹不知復在何時又不知便得相見果能彼此廓然無許多遮障隔礙否它人固難語此而於擇之猶不能無遺恨不知擇之又自以為如何也二余在此日乆占之警敏彛孫淳静皆可喜但亦未敢與説向上去恐别生病然又似太冷淡今其告歸云過邑中須為一兩日畱可更與切磋也熙之不及别書相見煩致意擴之亦然得婺州報云薛士龍物故甚可傷而不及識之尤可恨也尤溪學記及克齋記近復改定及改去嵗仁説答欽夫數書本欲寫去而二公行速不暇且寄欽夫語解去看畢寄還并論其説林擇之某哀苦之悰秋來増劇顧念日月易得而音容邈然發於夢寐尤痛切不能堪也此間諸人相聚自五月以後以季通大病無甚倫理近又以事歸旬日間復來便為入城計亦無復講論之暇矣南軒竟不免去國道之難行乃如此可歎可歎初意其自上饒歸可以一見今却由浙中水路還湖外又聞少畱吳興避暑不知果如何渠在榻前儘説得透初謂可以轉得事機要是彼衆我寡難支撑耳林擇之聞縣庠始教閭里鄉風之盛足以為慰所示文字皆甚佳深父埋銘讀之使人惻然興於朋友之義答問後便多寄使得反復為佳恐有建寧便只寄晉叔處可也承許見訪因往尤川甚善但經營創始之勞如此未能數月而休宰解官擇之辭職畫一之規又將安所付授耶須及此物色得可相繼者庶㡬不虚費賢宰許多心力商量為佳近看中庸於章句文義間窺見聖賢述作傳授之意極有條理如繩貫棋局之不可亂因出己意去取諸家定為一書與向來大字章句相似未有别本可寄只前日畧抄出節目今漫寄去亦可見其梗概矣論語未知焉得仁後來竟如何説因來幸詳及然此須與雍也仁而不佞孟武伯問三子原憲問克伐怨欲不行夫子不為衛君殷有三仁管仲如其仁數章相貫推説方見指意耳吾斯之未能信斯字何所指而言或云自指其心然否晝寢之義孰安凡皆望思之見報林擇之師魯深父皆有書來相属勤甚吾友相聚之夕視此凡陋寧堪諸賢許與之過耶師魯寄來論解數篇極佳未暇細讀已覺儘有合商量處旦夕因書相與評之又看如何擇之所造想日深累日不聞益論塵土滿襟矣林擇之得欽夫書論太極之説竟主前論殊不可曉伯恭亦得書講論頗詳然尤鶻突問答曲折漫錄去一觀遣人遽不能盡錄其大概是如此欽夫云已得擇之前書亦殊不以為然也拙齋深卿近有何議論某向答深卿書渠以為如何前日方答此書了李伯間來訪劇論三兩日舊疑釋去遂肻盡棄所學而從事於此乃知此理卒不可得而殄滅彼迷溺而不返者亦可憐矣近何叔京過此少畱未去伯問季通皆來集講論甚衆恨擇之不在此耳適因舉滿腔子是惻隠之心江民表云腔子外是甚底請諸公下語已各有説更請擇之亦下一語便中早見喻也石子重得書云來年赴官欲約擇之相聚不知能赴其約否某意甚欲相挽一來而卒不可得為恨耳擴之得安信否比來氣體如何前欲此來今極暑未可動秋冬間能同一來慰此哀苦否墳所已畧就緒儘可相聚矣陸崇安相㑹否渠今冬必來赴官某表兄丘子野欲求一依託書館處不知渠請人否告為託朋友宛轉問之便中見報此兄近日為况益牢落欲此甚急幸千萬畱意或託拙齋深卿問之尤佳林擇之得失既往不足言正惟立身行道是乃榮親之大耳比來少得通問而累書無所講論不知進學工夫如何深以為念也此間朋友亦無與薦者但邵武饒克眀赴省前日過此耳季通伯謨皆苦貧極無憀也某不敢受俸乃以無太府歴頭於法有礙非敢以為高而時俗已不相察况其大者可歎可歎逰山開正即行承有偕行之意甚善但恐來已不相及然某過衢信到婺女須少畱能來彼相及亦佳耳欽夫書適有便已發去渠得疾之由説者多端似亦非一朝一夕之故所由來逺矣近數得書云安徤勝前此必病起過意將䕶之力也今日聞有静江之除盖近日羣小屢有敗露上意必是開寤思向日之言故龔實之入參時事似欲小變未知竟何如耳此間文字亦未有緒通鑑工夫浩博甚悔始謀之大鋭今甚費心力然業已為之不容中輟須來年春夏間近入山僧寺謝絶人事作一兩月期畢力了之乃可盖心力不强其間稍似間斷便覺條例不貫故須如此耳林擇之某杜門如昨無足言者但吾人罪戾蹤跡顯不可揜只得屏跡念咎切不可多與人往來至如時官及其子弟賔客之属尤當逺避勿與交涉乃可自安此不惟擇之當深戒之如克之亦不可不知此意也林擇之某區區粗遣無足言者但齒髮日衰徳不加進日負憂愧耳潘文處人已歸欲俟秋冬遣人相取想所報書自言其詳矣如此却得且從容家居區處庶務亦是一事但郡中之約恐又不得不應切須審處使乆逺無悔吝乃佳耳必不得已入學亦不妨只要自處得是當此更在子細也趙帥乆不得書湖事想已畢自此宜且安静勿興功役為佳相見亦可力勸之也渠昨許草堂之貲因話為扣之然不可破官錢恐又作鄭景望也林擇之福公為賦武夷詩押舞雩字更和不得遂至今未得報謝其書兩日前方和得成亦不免只躡故迹欲作書煩附達之恐已歸旦夕自别宅去也造屋事得帥且止之甚善昨闗目思量許多紛紛都從十二詠首篇中一我字生出來此字真是百病之根若斫不倒觸處作災怪也黄商伯以下見南康集某俯仰塵俗日負初心率意妄行無所聞過自决其不可乆於此但以向議陳請一二事計論未備牽畱至今此數日來奏牘始具一二日遣行即并上請祠之章矣姚泉近方歸番陽木炭之請亦未果往亦三五日間中行也老兄下車已乆學中規範計當一新所以為教使之聞之諸生莫亦有可與進於此者否此中課程不敢懈然亦未大有益為可懼耳門不逺計常通問恐於鄙繆之政或有所聞人還幸賜批誨至懇至懇愚頓見事極遲非面命提耳反復諄悉不能諭切幸不惜痛言之也某欲借盛府祭器祭服依倣製造有牒上幙府書懇府公更望一言之助使必得之為幸或恐有大不可携者得令人畫圖詳識其尺度之廣狹高下淺深以見授亦幸也祭器尤荷垂念但期日已迫未及製造亦有事力所未及者且復專人納還幸付主者然亦疑其未便盡如古制度也木炭事申泉司果見却未知所以為計幸復思其説以見教也某再上祠請皆未報日夕思歸而兩縣破壊姦民亂政不得不有所更革鉏治似聞傳者以為不恕然亦只此數日間决遣事竟亦當少息矣盖大慝既懲小者自當退聴耳但木炭事泉司不從又以蠲租未報未敢再列上前請若遂臨行須更上此奏以償夙心也某衰病支離求去未得日惟得罪於士民是懼然近日兩邑得同官協力詞訴却粗衰少但賦租之弊未能有以寛之殊不自安耳學中講説不敢廢近亦頗有能問者兩邑亦令整葺教養庶㡬有嚮風者敝政恐有所聞切告垂諭至懇至懇示諭極感愛念之意此亦近方聞之惕然内懼即已行下戒約及令住催下户它負之可寛者矣又得鐫論益信所聞之不妄更當申儆之自此有所聞更望子細批誨直截譬曉今者來教似已未委曲矣切懇切懇前兩月配一作過寨兵於隆興中間忽為彼府押囘公文中備坐判府安撫龍圖待制台判押囘本寨殊不可曉已囘牒復押去矣煩閑為詢之想是忘記是外路外州配來誤以為所部不則别有他意也彼中幙府僉書滿紙此等事不能覺其繆甚可笑也此幸無他但建昌之事聞之不早見告者又皆不得其真僅若為强豪遊説使人愈疑惑近不免煩僉判自往調䕶始得其真乃知此郎不長厚誤事如此然縣小無官未有可遣代之者甚以為撓耳山野之人不堪吏職此亦可見旦夕遣冬書更當力請庶不乆為吏民患苦也某衰病如昨緣建昌事憂撓不可言雖已遣官檢旱且以後期申省自劾勢須畧減得分數但此縣官吏無一人能為百姓分别黒白自此之後凌弱暴寡將有不勝其敝者未知所以為計令人曉夕不遑都昌亦甚費力二十年無事之身心一旦至此深以自歎他無可言也警誨諄復敢不銘佩但區區每見凌弱暴寡之徒心誠疾之故其發每有過當今當承命而改之然恐終不能盡去也某昨甞專以建昌事自劾求去昨日人歸諸公又不將上勢當復請耳勝私書來説此間受租米事初疑其過徐究之果然雖已究治然人生精力能有㡬何若事事如此索闗防則無復閑泰之時矣其所論弊政非一已封呈廟堂冀必得去萬一如欲此助為不小也所懐萬端無由面論但日來愈覺歸思浩然不可遏耳某月初已專人丏祠後得臨安相識書速令來請云諸公已有許意至今尚未歸必是適值四眀計至未敢將上度不過旬日必可得矣建昌納苗實有照管不到處然與抑强似不相干税務依法収税亦非州郡所得與况士大夫下争商賈之利無恥至此亦何足䘏近日曽編管建昌一健訟假儒傳者必又喧沸此事自信甚篤絶無可疑是非毁譽付之衆口少忍旬日則吾已在汶上矣强盜三人配隸嶺海乃向來驚恐都昌之人昨以其情重法輕稍加毒手經由隆興恐有司以為疑幸為白錢丈一言於帥座交管傳押為望此輩吾人所共疾想二公不以為過也喻及帥座下喻之意已悉此是兩路三州利害如此理㑹甚善向來亦欲申請而未暇安得謂之侵官本軍今方欲援例有請也然謙徳之盛不敢不承幸語及之此間白鹿洞已畢功前日往釋菜開講矣延合肥吳君為職事但渠為書社所拘恐未必能往却有楊學錄者與一二後生欲往也某請祠先遣人昨夕已歸後輩尚未到周子充曽厚伯極為致力而竟不效且更看後信如何恐亦且悠悠也初來不為乆計近復動却歸心在此殊不便今既如此便冄請得之亦是一兩月事不免又且整頓此破落家計以俟譴逐耳昨緣収江溥親戚船税㡬為所論當時得此一章亦是草草出場也此間楊僉忽丁憂郡中事愈費力萬一不得去狼狽不可言也奈何木炭却已得減免矣白鹿洞成未有藏書欲干兩漕求江西諸郡文字已有劄子懇之及前此亦甞求之陸倉矣度諸公必見許然見已有數冊恐致重複若以呈二丈托并報陸倉三司合力為之已有者不别致則亦易為力也書辦乞以公牒發來當與収附或刻之金石以示乆逺計二公必樂為之也旦夕遣人至金陵亦當徧干本路諸使者也某請祠不得比復狂妄輙有所陳計程三五日間當以罪去已盡遣書冊冗長還家此數日來翹足俟命但未知何所向耳此間諸縣狼狽税務絶無南來舟楫勢亦不可復為矣比復苦旱近始得雨然亦未能沾足也日間雖無事然意思不佳絶不得近書冊懶困即思睡耳白鹿洞記納去一本又一本寄梁文叔煩遣致之不及作書也五賢祠記楊廣文自納去矣某無狀居此一年有餘率意直前不能違道干譽得罪於士民多矣請祠雖已報聞然旦夕自當以他罪行遣不至乆為仁里之害也示喻曲折深荷愛念然必欲使某餧㗖虎狼保養蛇蜴使姦猾肆行無所畏憚而得歌頌之聲洋溢逺近則亦平生素心所不為也姓髙人事文叔在此備見首尾此而可恕則亦無以官吏為矣至如木炭錢事亦是州郡所當為而幸上司之見聴方恨不能推類盡蠲苛擾初不以是而求歌頌於斯人也此錢都昌所減獨多乃是毛掾攷究之力此人固有過當處然細詢田野之言而攷之案牘以求其實則前日銷骨之毁亦云甚矣此舉枉錯直之間所以難眀非有道以照之則自謂公心者未必非私意之尤也區區不喜自辨又於老兄不可有隠情故乆不知所以為報今偶有便信筆及之非欲較此是非乃欲老兄深察於公私名實之間則真得其所謂本心之正耳此邦圖經不齊整而都昌為甚數日來欲畧為修整而不得工夫又無人能為物色圖畫諸邑供來皆不可曉甚覺費力也楊僉之去甚失助新來兩掾似亦可使也少凂西山有徐騎省篆書游帷觀大字及許真人井銘煩為致一二本便中示及五賢祠記納去一本更有一兩刻續致也都昌恐有合入圖經事望垂諭它委勿外某鄉辱誨諭奉報疎率既而思之殆無以答愛我之垕深以愧仄自此有聞不以虚實尚望不替前日之念乃幸之甚旱甚不雨禱祠未有以感格日夕憂懼隆興不至此否家貧願隣富若亦似此間則更無可仰矣奈何奈何此間為旱災所撓都昌縣官稍解事又請得盛族黄省幹同措置必可無慮但建昌官員皆不足倚仗又遍詢彼邑寄居士人無有能分此憂者意欲懇南卿為同邑官區處庶㡬下情稍通吏不敢肆其姦罔不知渠肻俯聴否渠雖徳安人而建昌亦有産業知彼民情故欲倚以為重耳敢煩語次試為叩之若許幸早見報當專致書禮請也歸見張帥更勸其通放米船濟此艱阨千萬千萬某比日懍懔丏祠得知舊報云恐可得果爾甚幸然救荒之備什已七八成矣旱苗約須放及八分勸諭發廩得盛族倡率三縣共得穀十萬斛矣但前書所扣王南卿事不知曽為偵之否幸早報及也得子澄書云廬陵發䇿持論甚正甚慰甚慰小錄求一本便中早寄幸甚此間中選者數人甚厭物論白鹿諸生文字老成其次曹生秀發可喜但尚欠琢磨小榜之首彭君尤佳惜不與薦書也已約兩榜之士來白鹿相聚未知皆能來否爾此間事未去間不敢一日少㢮恐得鄉間有所聞望一一見諭也某力疾救荒未見涯涘而傳聞遽云云聞之甚懼未知將何以副其實也南卿已到此相處甚欵但渠欲入浙不敢邀畱之度其歸程正是急時當賴其出一隻手又恐其到闕或為諸公所畱耳告糴荷帥漕畱念然縣下或更作難此乃軍粮所須若賑糶則已有備矣軍粮尤不可闕者更得從容一言得二公喻意属縣無為阻節幸甚張帥寄鹽鐡論來末卷前少却一板告為印寄更煩於太宗實錄中檢白鹿洞一事在太平興國五年㑹要作六年更詳之六月以洞主眀起為褒信主簿其下有少本未並告錄示此已有之但不知是實錄語否耳恐此人等候囘文告只付前日送崔子虛人囘尤便千萬千萬更問看何人來速即付之也賑糶減半價乃得推賞乃朝廷之命方欲論其不可乞只減二分五釐而建昌乃有願賑濟者已令邑官敦勸盛族若以穀二萬碩省賑濟可得兩名霑賞也因書更告及之亦美事也税錢事荷畱念都昌納米分數方兩日有定論已減八分以上亦巳申奏乞截畱上供若得之即只納占米無不可者只恐未必如人意耳石守以憂不來殊失所望亦已遣人速後政吳守矣儻得如期解去幸甚比益昏倦不堪支吾矣某在此不乆又子重不來後日之計未有所付須及此自了也其子弟能來亦佳但濡沬不能多須預令知此意耳得都昌諸人書已復苦旱奈何奈何今年公私之積蕩然一空萬一復旱便無着手處矣某無似復叨除目恐懼不自勝尚幸逺次得以從容進退還家數月當申祠吏之請也前月之晦已書二考代者度此月中旬可到今日復遣人速之矣老兄許來固願少欵但恐文法有拘亦非細事更冀審度之也示喻趙宗丞田極感畱意已撰得四百千半是糶米剰錢半是某所得諸處饋送前日錢丈所惠亦在其中今即移文庫中令項樁管以俟其報告為發書扣之路運幹不是彦豐否若是即某已識之并煩為致意早得一報為幸雖某去此後人亦當能成此勝縁也來書已付案中為事祖矣辛帥之客舟販牛皮過此掛新江西安撫占牌以帟慔蒙蔽船窗甚宻而守卒僅三數輩初不肻令搜撿既得此物遂持帥引來云發赴淮東總所見其不成行徑已令拘沒入官昨得辛書却云軍中収買勢不為已甚當給還之然亦殊不便也因筆及之恐傳聞又有過當耳前書奉叩白鹿買田事如何幸早示報及某未去間有定論為佳此錢已送庫寄収以俟矣千萬畱念某代者已到二十七日定交郡事即畧轉山北迤邐東歸矣脱此樊籠欣快無量但念相見未有近期不能無愴恨耳白鹿田錢已撥正牒教授候彼回文即可支付也禮器之失不但一爵今朝廷所用宣和禮制局様雖未必皆合古然庶㡬近之不知當時禮部印本何故只用舊制向來南康亦無力但以爵形太醜而句容有新鑄者故易之耳其實皆當遣人問於禮寺而盡易之乃為盡善但恐其費不貲州郡之力不能辦耳福州余丞相家有當時所賜甚精然今亦莫能用也黄南康之政如何渠向在昭武甚佳為人所擠而罷今能不改其舊則三邑之幸也永卿主簿老兄尚畱齋館否昨承惠書此便又遽未能别狀但所問先天圖曲折甚善細詳圖意若自乾一横排至坤八此則全是自然故説卦云易逆數也皆自已生以得未生之卦也若如圓圖則須如此方見隂陽消長次第震一陽離兑二陽乾三陽巽一隂坎艮二隂坤三隂雖似稍涉安排然亦莫非自然之理自冬至至夏至為順皆自未生而反得已生之卦盖與前逆數者相反自夏至至冬至為逆盖與前逆數者同其曰左右與今天文家説左右不同盖從中而分自北而東為左自南而西為右其初若有左右之勢耳鄙見如此更冀詳之啟蒙改本未成後便寄去近塑得伏羲像欲奉之武夷精舍恨賢者不能一來觀之耳此紙煩商伯兄呈似更同為訂之也新泉之勝聞之爽然自失安得復理杖屨扶此病軀一至其下仰觀俯濯如昔年時或有善畫者得為使畫以來幸甚向見楊伯起有切韻書只三四十板而聲形畧備亦嘗傳得而為人借失之今欲得一本敢煩為借抄録一本校令審諦便中見寄幸甚或語趙守刻得一板流行亦佳此非偽學想亦不至生事也五老新瀑曽往觀否夢寐不忘也某竟以無狀自致人言上累師傅下及朋友愧負憂惕如何可言傳聞賢者亦有里巷侵侮之虞不知云何今日惟可凡事省縮豈復更與此輩争是非較曲直也彼中諸書板本聞㡬有焚滅之禍又云下官有持不可者遂已不知果然否耶然計此恐終不免向來得本甚多皆為人取去今欲復得一兩本不知能及未為煨燼之間印以見寄否洪韻當已抄畢幸早示乃此間付之書坊鏤板甚不費力况非偽學亦無嫌也新泉圖子和成既為定藁必已能盡寫其佳處只就覓此草本不必重摹俗工或能反敗人意也自聞此泉新出恨未能一逰其下以快心目濺雷噴雪發夢寐也瀑圓韻譜近方得之圖張屋壁坐起對之恨不身到其下也定叟終於落星何不就館城中耶鄭溥之黄伯耆相繼物故皆盛年也亦是一時氣數然張鄭尤可惜耳楊伯起新年㡬嵗精神筋力想未至衰憊如某也白鹿舊遊恍然夢寐但聞五老峰下新泉三疊頗為竒勝計此生無由得至其下甞託黄商伯陳和成摹畫以來摩挲素墨徒以慨歎也江徳之甚好説易甞與講論否且看程先生傳亦佳某謬説不足觀然欲觀之須破開肚腸洗却五辛查滓乃能信得及耳又印本多錯誤恐難㑹了無由面談聊發一笑將來官滿復歸廬阜耶劉壻得依餘芘幸甚時有以警誨之乃佳外孫聞尚附學想蒙憐撫某衰朽益甚已上告老之章它盖無足言者劉壻幸得托芘今將滿矣不知已離彼未耶李敬子得襄陽教官見在此相聚或傳其闕已到未知然否幸因便報及也讀易想亦有味此經自有規模格局若看得破則精粗巨細無處不可受用如其未然即且將其間旨意分眀處反復玩味亦自可樂不必深求幽逺枉費心力也某之謬説本未成書往時為人竊出印賣更加錯誤殊不可讀不謂流傳已到几間更自不足觀也劉壻相見未豁然亦差覺老成此皆教誨之力也某年來衰憊殊甚兩足拘攣不能移步猶是小故而心腹之疾猶為可慮服藥無效拱手俟命而已葉永卿吳唐卿周徳之李深子某還家方幸休息得以輯理舊書忽被恩除不勝憂懼初欲力辭又聞彼道荐饑已有流移户口恐辭或不免而失可為之時遂不免申奏對之請更旬日間必有進止之命若得罷遣且守東岡之陂即大幸也除職初不敢辭但以賑濟四家未被賞因此為伸理耳聞彼又苦饑想不至如去年之甚然在今日處置當倍費力也深甫所喻減税事不知後來如何某若得對當且乞減徐守所増中上等税錢此數不多當必可得其它恐亦難料理也白鹿田已就緒甚善又聞今侯能枉駕臨之尤幸伯起廷彦為况如何聞永卿諸公亦嘗入山觀書遐想山林之勝它處真未易得令人悵然興懐也但聞或者乃欲畫某形象置之其間令人駭然不知誰實為此向欲作李賔客李九經及三先生祠於其間以未有大成殿遂不敢議今乃遽然如此於義殊不安而諸人所以相期者乃復如是之淺尤非區區之所望也幸以此示諸人亟為毁撤為佳不然須别作區處也舜㢸所云白鹿之説當時亦漫及之豈有輒敢號令州郡之理渠自張皇亦不曉事之過也白鹿買田聞已就緒吳丈又許買牛此尤永逺之利也諸事更賴衆賢左右維持之其必有濟矣朱守書來示及新編圖經乃知其郡政從容綽有餘力如此大凡區區向所欲為而不暇者今皆備矣又承喻及禁止白鹿葬地一節尤快人意但不知曽追毁其買契否不爾恐尚有後患也白鹿知亦嘗一到甚善甚善每念疇昔相與登臨逰從之樂未嘗不發於夢寐然亦恨當時所以相切磋者猶有所未盡也張廣文别後遽至此深可悲悼某或得至浙東亦遣人視其家也永卿所喻可欲之説恐不然但以詩所謂天生蒸民有物有則民之秉彛好是懿徳者觀之則知欲惡之正固有不易之定理矣彼以所當惡者為所當欲豈其性情之本然者哉孟子集注近方修得一過未及再看更俟少定寫得别本即附去然大凡讀書且徐讀正文虚心涵泳切已省察亦當自見大體意味其間曲折却續求之未晚也唐卿比來為况如何書來不及菖蒲平安之報何耶去嵗災蹇異常病既日侵秋間又哭一女悲傷無聊屢至危殆忽蒙除用懇祠未獲近乃見次又已有奏事之命不免遣人復申前請行一月矣至今未還不知事竟如何或不得已即須到彼面懇力辭庻㡬可脱江西决是不成行也向承錄示藥方極感畱念今脚氣已漸輕祕結却變成滑洩矣大率氣血漸衰自是如此也啓蒙近復修改一兩處未畢俟印得即奉寄易之象數初甚簡易今人不得其説遂至支離使人不曉反遂詆以為滛巫瞽史之學其亦誤矣馮儀之細讀來示備詳别後進學不倦之意世間萬事須㬰變滅不足置胸中惟有致知力行修身俟死為究竟法耳余正父博學强識亦不易得禮書中間商量多未合處近方見其成編比舊無甚改易所論獨志無助者誠然然渠亦豈容他人之助也此間所集諸家雜説未能如彼之富然儀禮正經段落注疏却差眀白但功力頗多而衰病耗昏朋友星散不能得了耳商伯時時得書講論精宻誠可嘉尚李敬子堅苦有志尤不易得近與諸人皆已歸只有建昌二吕在此早晚講論粗有條理足慰岑寂也晦庵别集卷三欽定四庫全書晦庵别集卷四宋朱子撰與一維那以下見陳利用編大同集老親比苦重聴服上人藥遂良已上人索詩乆廢無次􅂓復此殊不佳也紹興癸酉九月晦日紫陽朱仲晦書當年事幽討結友窮名山曽逢許斧子去採玉芝還歸來坐空房神清骨毛寒起視塵中人一見了肺肝探囊出刀圭生死毫釐間相逢瘴海秋遺我黄金丹髙堂得聴瑩斑衣有餘歡謝師無言説舌井生波瀾上廣文廣文何事創樓居収拾家藏理蠧餘尚有簡編充棟宇擬陳車馬次門閭移床客去邀眀月送酒人來異遞書縱使清貧無長物猶勝四壁似相如考試感事戲作海邑三年吏勤勞不為身但令官事了從遣黠兒嗔題米倉壁度量無私本至公寸心貪得意何窮若教老子莊周見剖斗除衡付一空題安隠壁征車少憇林間寺試問南枝開未開日暮天寒無酒飲不須空喚莫愁來題梵天方丈壁輸盡王租生理微野僧行乞暮還歸山空日落無鐘鼓只有襌堂蝙蝠飛五月五日海上遇風雨作秋風秋雨滿征衫陸走川行兩不堪塵事牽人心事逺濯纓何必在江潭兩絶句送順之南歸門前三徑長蒿萊愧子慇懃千里來校罷遺書却歸去此心元是不曽灰㡬年江海事幽尋偏與雲僧話此心今日肯來論舊學嵗寒猶恐雪霜侵寄陳講師以下見别編臨江集聞道山中客年來鬢欲皤静便三徑小貧覺一身多且喜詩無病從教睡作魔故人今領衆猶覺慰蹉跎别陳講師㡬年勞夢想今日慰登臨况入珠蘭室又聞金玉音與君連夜語盡我一生心此外成華髪無因得重尋登閤皁山疊疊層巒鎖閟宫我來舊地訪靈踪葛仙去後無丹竈弟子今成白髮翁一𣲖泠泠臺下水半空漠漠嶺頭雲祖師成道冲天去只有無窮受籙人送單應之往閤山杖頭挑月入煙蘿城郭塵埃奈爾何若到名山髙著眼洞天深處異人多回首名山我舊逰曽將風袂拍浮丘如何不及臺邊水長向山前山後流送李道士歸玉笥三首偶隨雲去伴雲歸笑指清都在翠微為我中間畱一榻他年去著薜蘿衣玉笥山連都水坑拂雲樓殿對峥嶸君歸後夜無餘事卧聴寒泉落澗聲莫惜臨行酒一杯看君上馬古城隈相望兩地無多逺頻寄音書與鴈來題赤城觀落日空山秋氣清泠泠古木亂蝉鳴仙人一去鶴不返劍客重來丹已成静對竹爐烟縷直細看月窟桂華生此身舊有蓬瀛約玉簡歸來問姓名尤溪縣學觀大閣見尤川志及南溪祠堂志令尹絃歌不下堂叱嗟層觀麗扶桑朱甍碧瓦臨無地散帙投壺樂未央得意溪山供徙倚忘情魚鳥共徜徉應觀物我同根處剖破藩籬即大方十月上休日逰卧龍玉淵三峽用山谷驚鹿要須野學盟鷗本願秋江分韻得鷗字按大全集但有秋字韻不載此鷗字韻馮本有之或云先生命門人所作而後不用或又云得兩韻而集軼之南以下見康集匡廬霜天後不見雲氣浮木葉紅已疎山顔轉清幽向聞有絶壑乃在卧龍湫及此遂一往幸無烟景愁隮攀欲其深泉石固所求况有百尺崖噴雪飛寒流幽琴自回抱直下鳴清璆便可洗我耳枕石忘所憂精神共虚廓方物皆悠悠所恨非獨往不能恣夷猶仰慚雲間鶴俯羡谷中鷗先生先我來結屋陽岡頭虚名代忠武滅迹慕巢由是間頗足居不田亦平疇野人種椒橘崖蜜易嵗収西源有老翁卷舌藏戈矛似學辟世士乃欲邀聖丘先生且憮然但作一月畱俟我有决計它時卜從逰次周師溫游書堂韻兼簡坐上諸同志疇昔因來行水餘依依唯認昔人居新堂已幸經重搆舊事難追更特書所願絃歌聞十室休誇文字賦三都同來况有濓溪裔心印相傳儘未疎西源居士斸寄秋蘭小詩為謝知有幽芳近水開故攀危磴斸蒼苔却憐病客空齋冷帶雨和烟逺寄來至樂齋記以下見大同集盤谷傅公客於泉州城東之佛寺間即其寓舍之西偏治一室達其南北以為軒忩極爽塏左右圖史自六經而下百家諸子史氏之記籍與夫騷人墨客之文章外至浮屠老子之書荒虚譎詭詼諧之説種植方藥卜相博奕之數皆以列置無外求者公於是日俯仰盤礴於其間繙羣書而誦之蚤夜不厭人盖莫窺其所用心而公自以為天下之樂無易此者故嘗取歐陽子之詩以名其室曰至樂之齋而顧謂某曰為我記之某辭謝不敏不嫺於文字且不敢為庸人誦説而况敢為是耶既公命之不置某不得終辭乃承命而退推公意所以然者而書之曰人之所以神眀其徳應物而不窮者心而已古之君子自其始學則盡力於洒掃應對進退之間而内事其心既乆且熟矣則心平而氣和冲融暢適與物無際其觀於一世事物之變盖無往而非吾樂也而况載籍所傳上超羲農下至于兹其間聖賢之行事學問之源奥是非得失理亂存亡廢興之故包括籠絡靡不畢具茍涉其辭義而心必契焉則其可樂而玩也豈不亦至矣哉惟世之學者或不足以知此而勞於記誦佔畢之間以為事是以語之至者既扞格而不入於心惟其粗厲而不平者感而入焉則其間勃然而鬭而怒矣亦何樂之云哉某惟歐陽子之詩與公之所以取焉者盖其指畧如此因序次以為公齋記云紹興二十八年閏月癸卯新安朱某記恕齋記溫陵陳君養正讀書之堂同郡吕君少衛榜之曰恕齋而陳君有謁於予曰願有記也予故以是往而觀焉則其垣屋位置與夫几案圖書花藥之列無不合其宜得其所盖飾不過侈而簡不至陋起居便適而視聴無邪真若幽人逸士之居者雖予亦樂之將為之記而問其作興端原則曰此吾居第之東榮也凡兹棟宇皆亡所改於其舊惟鑿牕牖以候眀晦焉而為是室也此亦何所可記顧吾之所以望於夫子者願聞恕之説而盡心焉耳予聞之􅋏然曰子之志則善矣而非予所敢當也予不佞少從先生長者遊嘗竊聞夫恕之説以為不過推己之心以及人而已勉而行之又以為無難也然克已之功未加而蔽於有我之私勝則於此未嘗不病焉而何敢易言之以重得罪於聖人之門也用此辭謝不敢為者㡬累月陳君請之不置而吕君亦以為言予不得以終辭也則歴誦前語而謂之曰以是為記足以不没乎為齋之實而亦可見强恕之難矣惟吕君幸以為不悖於所以名之意則庶乎其施也二君皆曰善遂書寘齋屋壁間以視陳君且自警也紹興二十七年十二月五日新安朱某記鄉飲舍菜二先師祝文見大同集敢昭吿于先師兖國公先師鄒國公朝廷舉遺興禮使郡縣三嵗一行鄉飲酒之禮以迪其士子俾莫不精白以祇承眀詔某為縣長吏敢不以時奉行即事之初以禮舍菜于先聖至聖文宣王以公等配赦後祭闕祝文見南康集乃季秋辛未天子有事于合宫樂備禮成攽祭澤于宇内凡諸祀壇宇之有功於民者悉詔有司潔嚴報享惟王聖徳神功賴及萬世至今天下生人有一日之安者皆王之徳也邦有彛典敢或不䖍仰惟眀靈尚其昭鑒祭芸谷文先生之曽孫沂藏錄藁維乾道五年嵗次己丑三月丁巳朔十有四日庚午迪功郎差充樞宻院編修官朱某敢以香茶酒果之奠託友人林用中致祭于亡友林君師魯之靈惟昔先君與芸齋先生逰而吾師魯又不鄙某愚甞不逺數百里過我潭溪之上盖將從容講學以共進于斯道也顧以姻䘮欲畱不可自是一别遂訣終天嗚呼痛哉志長命短如師魯之才之敏乃不克究其業而止於斯吾徒二三子失良友之助能不隕涕相弔而况髙堂垂白又何以堪此愁苦耶某形疲道逺不能往哭香茗之奠以累同志遵承先志収拾遺文并以囑之庶可無憾嗟嗟師魯尚克鑒此而享之耶嗚呼哀哉祭闕文先生之孫濬家藏維淳熙三年嵗次丙申九月癸卯朔十六日戊午宣教郎朱某敢以酒肴之奠告於某太夫人某氏靈筵曰我昔貧病掩闗自休有來自東而辱與逰既往既來十年頓乆義篤情親謂我昆友我相其流以必其源曰是世徳抑母之賢惟母之賢聘于名族嫓徳清門慈祥雍睦成其二子學古行修左右致孝色思其柔顧我者誰曰實其季適騫以翔遽以憂躓我聞其憂驚歎失聲孰勤斯誨弗俾其榮往弔不能且悲且愧千里緘辭相此一酹嗚呼哀哉芸齋遺文䟦先生之曽孫沂家錄藁先君子志尚髙深不妄與人交盖嘗避地福之古田得芸齋先生林公而與之逰愛其學識行誼有以過人而惜其且將湮没無聞於世也及仕於朝為之延譽甚力然竟不及試用識者恨之某自幼侍立先君子之側則已聞先生為人之大畧近乃得其臨終手筆數十百言戒其家治䘮無用浮屠法者讀之然後知先生所學之純所養之固見於死生之際者又如此宜乎先君子之所甚厚而不忘也三復至言惟念先志追慕哽絶不知所言既而先生之子魯山不逺數百里過某於潭溪之上道語舊故泫然乆之因謂某曰先人絶筆之書將刻諸石以傳學者子為我識之某惟先生於此特示人以變俗由禮之大端耳若夫反躬格物以眀先王制作之本使其情文義數粲然大備盡祛千載習俗之陋而壹反之於正豈不猶有望於後人哉師魯篤志好學其果能進此以成先生之志則豈惟某與一二友朋之願抑先君子實寵嘉之因敬書以附其後云乾道戊子四月丁酉新安朱熹敬書書李巽伯所䟦石鼓文後先生之曽孫濬家藏唐貞觀中吏部侍郎蘇朂著論歧陽獵鼔引歐陽虞褚並稱墨妙為據三君體法為世楷式賞好為物軒輊在當時已爾今其故蹟僅存隋珠和璧不足喻其珍也予避地南來一日料檢行庋得歧鼔及孔廟醴泉化度孟師丹州諸碑流徙之餘偶無落為之驚喜過望書其事以示子孫建炎己酉夾鍾五日雒人李處權巽伯余年十八九時邂逅李卿於衢守張紫微坐上二公皆一時名勝揮麈論文意象超逸令人傾竦今觀此卷恍然若將復見其人而追數嵗月忽已四十寒暑矣不惟前輩零落殆盡而及見之者亦無㡬人可為太息淳熙戊申五月既望朱熹仲晦父書䟦訛傳龜山列子解後先生之曽孫主簿闕家藏龜山之見二先生在元豐之初此書作於其前固不足怪䟦語則出於其後而有非所宜言者矣豈其後人有惜是書而不忍棄者託為是語以重之歟噫是書即傳而其為龜山之累也甚矣向見沈公雅説有此書初不敢信淳熙己酉夏將樂鄧綯為寫寄來因得記其所疑于後且細讀䟦語中用字下語多不中律令與龜山他文不類其偽妄不疑但不知何人所作耳七月三日熹書䟦郭忠恕説文字源仙㳺洪震夫家藏楊文公蘇文忠公皆言郭忠恕先尸解而逝今觀此卷非斯人之仙而誰仙耶淳熙癸卯晦翁題折桂院行記以下見南康集始予至折桂院之西軒愛其江山之勝道人雲公為予言此未足觀少上當益竒因道予行深竹中竹盡得大阜背負五老面直江湖東西數百里雲山煙水渺莽縈帶勝絶不可名狀乃規作亭其處取李翰林廬山謠中語命以為黄雲觀㑹雲公去不果為今年春乃克為之未訖工而予代去閏月晦日與清江劉子澄長樂林擇之開封趙子眀溫陵許景陽建安王春卿長樂余占之陳彦忠臨淮張致逺長樂黄直卿俱來因記其事雲公諸王孫棄官學浮圖法今客大洪山云淳熙八年辛丑嵗朱熹仲晦父題題星子縣尉廨射亭淳熙己亥季秋念日新安朱某仲晦父奉同髙川蘇史君莆陽詹别駕零陵陳推官㑹稽方丞公旴江史版掾永新潘丞公善化陳眀府南康卜隠君邯鄲段議郎同寮楊子羙元範王之才董恭父奠故屯田劉公墓退飲尉廨射亭盡醉書此以志題落星寺朱公永仲晦蔡季通汪清卿程正思鄧邦老陳彦忠萬正淳俞季清來朱氏子在侍淳熙庚子三月丁卯題落星寺張于湖題字後朱某奉處士叔父同王南卿俞子夀吳唐卿李秉文陳勝私趙南紀及表侄俞潔已甥魏愉季子在俱來觀故張紫微安國題字為之太息淳熙庚子十月十三日也題尋真觀新安朱某仲晦永嘉薛洪持志永嘉張揚卿清叟縉雲王仲傑之才㑹稽陳祖永慶長臨江劉清之子澄長樂林用中擇之樂陽趙希漢南紀宜春彭樓子應宜春彭鳳子儀溫陵許子春景陽廬陵郭植廷植長樂余隅占之臨淮張彦先致逺淳熙辛丑後三月丙戌至此莆田傅公弼夢良長樂陳士直彦忠先歸題石乳寺淳熙庚子重五日晦翁與程正思陳彦忠俞季清來翁子在甥魏愉從題棲賢磨崖新安朱某奉陪髙川蘇史君閬中錢别駕簽書楊子美博士楊元範星子王之才武寧楊子直邯鄲段仲衡濓溪周師溫因逰卧龍遂至玉淵三峽門人丁克王翰甥魏愉幼子在從淳熙己亥四月上休日題疊石菴晦翁與程正思丁復之黄直卿俱來覽觀江山之勝樂志歸時淳熙己亥重午日翁子在甥魏愉侍行題折桂院晦翁通叟送張襄陽至此痛飲而别䟦所刻和靖帖右和靖先生帖得之祈君之子真卿淳熙庚子夏五月丙戌刻之白鹿洞書院新安朱某記䟦所刻包孝肅詩此包孝肅公布衣時語蔡廷彦得之吳唐卿以語晦翁翁敬書之俾刻于白鹿洞䟦王太初所題後十年朱仲晦甫賞識此詞後之人當勿毁也書武侯草廬語遺張以道張以道將之荆襄寫以送之慶元己未十一月十九日晦翁題所書古栢行右杜子美古栢行朱仲晦為王之才書晦庵别集卷四欽定四庫全書晦庵别集卷五宋朱子撰雜著釋氏論上建安吾應梄家藏易東潤䟦或問孟子言盡心知性存心養性而釋氏之學亦以識心見性為本其道豈不亦有偶同者耶朱子曰儒佛之所以不同正以是一言耳曰何也曰性也者天之所以命乎人而具乎心者也情也者性之所以應乎物而出乎心者也心也者人之所以主乎身而以統性情者也故仁義禮智者性也而心之所以為體也惻隠羞惡恭敬辭讓者情也而心之所以為用也盖所謂降􅇆於民有物有則者儒闕也故其所以盡心知性者以其窮理而極乎心之所闕之所有者無不識也所謂闕養性闕已而不失其本闕則性闕如是則情之所發亦無不闕正而可以應物於無餘矣闕性不見其分闕别闕給之闕與闕其闕指闕者實在精神魂魄之聚而吾儒所謂形而下者耳至其所以識心者則必别立一心以識此心而其所謂見性者又未甞睹夫民之􅇆物之則也既不睹夫性之本然則物之所感情之所發皆不得其道理於是概以為已累而盡絶之雖至於反易天常殄滅人理而不顧也然則儒術之所以異其本豈不在此一言之間乎曰釋氏之不得為見性則聞命矣至於心則吾曰盡之存之而彼曰識之何以不同而又何以見其别立一心耶曰心也者人之所以主於身而統性情者也一而不二者也為主而不為客者也命物而不命於物者也惟其理有未窮而物或蔽之故其眀有所不照私有未克而物或累之故其體有所不存是以聖人之教使人窮理以極其量之所包勝私以去其體之所害是其所以盡心而存心者雖其用力有所不同然皆因其一者以應夫萬因其主者以待夫客因其命物者以命夫物而未甞曰反而識乎此心存乎此心也若釋氏之云識心則必収視反聴以求識其體於恍惚之中如人以目視目以口齕口雖無可得之理具勢必不能不相汝爾於其間也此非别立一心而何哉夫别立一心則一者二而主者客闕分矣而又塊然自守滅情廢事以自棄君臣父子之間則心之用亦息矣夫闕所指以為心性與其所以從事焉者乃如此然則不謂之異端邪説而何哉曰然則其徒盖有實能恍然若有所暏而樂之不厭至於遺外形骸而死生之變不足動之者此又何邪曰是其心之用既不交於外矣而其體之分於内者乃自相同而不舍焉其志專而切其機危而迫是以精神之極而一旦惘然若有失也近世所謂看心之法又其所以至此之捷徑盖皆原於莊周承蜩削鐻之論而又加巧宻焉爾然昧於天理而特為是以自私焉則亦何足稱於君子之門哉釋氏論下或問子之言釋氏之術原於莊子承蜩削鐻之論其有稽乎朱子曰何獨此哉凡彼言之精者皆竊取莊列之説以為之宋景文公於唐書李蔚等傳既言之矣盖佛之所生去中國絶逺其書來者文字音讀皆累數譯而後通而其所謂禪者則又出於口耳之傳而無文字之可據以故人人得竄其説以附益之而不復有所考驗今其所以或可見者獨賴其割裂裝綴之迹猶有隠然於文字之間而不可揜者耳盖凡佛之書其始來者如四十二章遺教法華金剛光眀之類其所言者不過清虚緣業之論神通變見之術而已及其中間為其學者如惠逺僧肇之流乃始稍竊莊列之言以相之然尚未敢正以為出於佛之口也及其乆而耻於假借則遂顯然簒取其意而文以浮屠之言如楞嚴所謂自聞即荘子之意而圓覺所謂四大各離今者妄身當在何處即列子所謂精神入其門骨骸反其根我尚何存者也凡若此類不可勝舉然其説皆萃於書首其𤣥妙無以繼之然後佛之本真乃見如結壇誦呪二十五輪之類以至於大力金剛吉盤茶鬼之屬則甚麄鄙俗惡之狀校之首章重𤣥極妙之指葢水火之不相入矣至於禪者之言則其始也盖亦出於晉宋清談議論之餘習而稍務反求静養以黙證之或能頗出神怪以衒流俗而已如一葉五花之讖隻履西歸之説雖未必實有是事然亦可見當時所尚者止於如此也其後傳之既乆聪眀才智之士或頗出於其間而自覺其陋於是更出己意益求前人之所不及者以隂佐之而盡諱其怪幻鄙俚之談於是其説一旦超然真若出乎道徳性命之上而惑之者遂以為果非尭舜周孔之所能及矣然其虚夸詭譎之情滛巧儇浮之態展轉相髙日以益盛則又反不若其初清閒静黙之説猶為彼善於此也以是觀之則凡釋氏之本末真偽可知而其所竊豈獨承蜩削鐻之一言而已哉且又有一説焉夫佛書本皆梵字譯而通之則或以數字為中國之一字或以一字而為中國之數字而今其所謂偈咒句齊字偶了無餘欠至於所謂二十八祖傳法之所謂書則又頗協中國音韻或用唐詩聲律自其唐之稍黠如闕洪輩者則已能知其謬而强為説以文之顧服衣冠通今古號為士大夫如楊大年蘇子由者反不悟而筆之於書也嗚呼以是推之則亦不必問其理之是非而其増加詭偽迹狀眀白益無所逃矣宋公之論信而有證世之惑者於此其亦可以少息也哉釋奠申禮部檢狀見臨漳語錄伏覩淳熙六年尚書禮部頒降淳熙編類祭祀儀式内有合行申請事件須至申聞一神位某近得禮部侍郎王普所著釋奠儀式考其位次爵號皆與此本不同大低此圖自東而西兩兩相對而王氏本自東序一至五次西序一至五又次東廊一至卅六又次西廊一至卅五次西廊泗水侯孔鯉次東廊沂水侯孔伋遂連中都伯左丘眀以下至賈逵又次西廊杜子春以下至王安石詳此次序固不如今圖之善但此圖十哲次序亦有小誤盖以論語考之當以閔損為第一在東序冉耕為第二在西序冉雍為第三在東序宰予為第四在西序端木賜為第五在東序仲由為第六在西序冉求為第七在東序言偃為第八在西序卜商為第九在東序曽參為第十在西序今迺以冉雍為第一閔損為第三冉求為第六仲由為第七則亦誤矣又其爵號王氏本費公為琅琊公鄭公為東平公薛公為下邳公齊公為臨淄公黎公為黎陽公徐公為彭城公衛公為河内公吳公為丹陽公魏公為河東公成侯為武成侯未知孰是又按國朝會要政和間沂水侯與泗水侯俱封仍同從祀則王氏本為得之而此圖獨闕泗水委是脱誤其左丘眀以下當從此圖兩兩相對但左丘眀當在西廊對孔汲而荀况以下當在東廊公羊髙以下當在西廊兩兩相對與此相反乃為得之耳伏乞更賜詳考改正行下一祭器並依聶崇義之禮圖様式某伏見政和年中議禮局鑄造祭器皆考三代器物遺法制度精宻氣象淳古足見一時文物之盛可以為後世法故紹興十五年曽有聖旨以其様制開説印造頒付州縣遵用今州縣既無此本而所頒降儀式印本尚仍聶氏舊圖之陋恐未為得欲乞行下所屬别行圖畫鏤板頒行令州縣依凖製造其用銅者許以鈆錫雜鑄収還舊本悉行毁棄更不行用一釋奠時日注云仲春上丁仲秋下丁某檢凖紹興乾道淳熙令並云二月八月上丁釋奠文宣王即無下丁之文又甞竊見五禮申眀冊内有當時州郡申請禮局已改下丁為上丁訖其後又見故敷文閣待制薛弼任杭州教授時所申今到本州檢尋頒降舊本却無此條恐是前後節次頒降致有漏落將來如蒙别行鏤板即乞先於儀内改下丁作上丁字仍檢申眀册内備錄此條全文附載篇末以證元本之失仍下州郡有舊本處並行批鑿改正庶使州縣奉行有所依據一元本陳設條内著尊四犧尊四著當作犧犧當作象今來頒降新本已行改正而政和年中頒降舊本尚仍其舊州縣奉行不無疑惑將來如蒙别行鏤板即具附載後來改正因依於篇後或只將某此狀全文附載仍下州郡合將舊本批鑿庶㡬眀白不至疑誤一釋奠儀舊本鄒國公下並有舒王字今已刪去而不著其所以然者亦與舊本牴牾將來如蒙别行鏤板即乞檢會靖康年中罷王安石配享先聖章疏指揮並行附載仍下州郡並將舊批鑿回余衡州啟秀實衡州之孫師魯家藏賦祿真祠方遂燕居之適承流巨屏莫回成命之頒顧修問之未遑辱移書之先及恭惟某官受材宏偉涵徳粹温學問有原盡得傳家之奥要文詞甚蔚坐觀作者之典刑盍升臺閣之聨猶屈江湖之守方慕先賢之治益觀美化之成鈴閣少畱姑慰逺民之意璽書亟下遂還近侍之班某乆仰英猷未諧良覿同寅有望儻分南服之憂歸賦可期即返東臯之樂回王正臣啟見大同集伏念行能無取藝業不修學不足以見古人之用心徒極鑚研之力仕不足以行平日之所志第勞刀筆之間至於典禮義文學之官首誦説講論之事聖言髙逺雖莫究其指歸絶業光眀庶有聞於來者過勤厚意貺以華牋仰褒飾之過宜顧省循而何有謹奉啟上謝回衆解元啟以下見南康集竊審待問澤宫登名天府方幸究宣於眀詔敢期誤枉於華牋披味以還感藏難喻解元先輩學推庠序行著州閭出膺續食之求足為勸駕之重顧念朝家設科以取士本務得賢然而學者挾䇿以讀書但期干祿伊欲一新於敝俗不能無望於羣公輙誦淺聞少酬盛禮惟窮理修身之要當有志於古人則尊主庇民之功庶無慚於當世回待補生啟竊審待問澤宫登名槐市方幸究宣於眀詔敢期誤枉於華牋披味以還感藏難喻然朝家建學養士之意正為育材而諸生辭家射䇿之心但期干祿伊欲一新於敝俗不能無望於群公輙誦淺聞少酬盛禮惟古人為已之志當有餘師則大學新民之功庶無違教晦庵别集卷五欽定四庫全書晦庵别集卷六宋朱子撰公移漳州延郡士入學牒見臨漳語錄契勘州縣兩學講説課程近日以來漸有倫緒但以州郡尊賢尚徳之心有所未至致使諸生無所薰陶涵養以發其向道入徳之趣不敏之咎何以自文今覩新江州知錄黄從事器資渾厚操履端方杜門讀書不交權利鄉閭有識莫不推髙若以禮請屈居州學正錄之任兼同主管縣學教遵必能使諸生觀感而化有所興起前州學施學正允夀石學正洪慶皆以耆艾之年進學不倦强毅方正衆所嚴憚林貢士易簡李進士唐次或究索精微或持循雅􅅚察其志行乆益可觀貢士陳淳太學生楊士}
