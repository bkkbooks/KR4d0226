  - {type: variant, offset: 12013, length: 0, content: '', WYG: 守精翫如勉齋北山儒者僅有乎爾寜不重感於斯文嘉靖壬辰秋七月甲戌後學婺源潘潢拜書欽定四庫全書晦庵續集卷一宋朱子撰書答黄直卿南軒去冬得疾亟遣人候之春中人回得正月半後書猶未有他不數日聞訃則以二月二日逝去矣聞之痛悼不可為懐聞其臨終猶手書遺劄數千言不數刻而終劄中大槩説親君子逺小人甚切當世之弊此尤可傷痛也此若得脱即便道往哭之而後歸耳南軒云亡吾道益孤朋友亦難得十分可指擬者所望扵賢者不輕千萬勉旃此中文字彦忠皆寫得已屬令一一呈似矣鄭台州相見否更勸其子細講學為佳書來所説殊未端的可惜只如此便更不求進步也昨收書報及鄭台州之訃執書驚愕失聲何天無意扵斯世而偏禍吾黨如此之酷痛哉痛哉自此每一念未嘗不酸鼻也此間今年枯旱可畏有彌望十數里而無一穗之可收者政惡所招無可言者然不敢不究心措置但勢亦有不得行者未知終能不得罪扵斯人否耳力請丐歸計亦未必可得但恐自以罪戾罷逐耳世態不佳老病益厭俯仰但思歸卧林間與如直卿者一二人相與講論以終素業耳諸經舊説皆得一過其間亦有改定處自慊却須用舊説方見得自家有力𦂳要是從本原上説來比前日尤親切所諭羞惡未亡者此乃真是當得偽學二字朋友中只此一番拍拭揀汰偽冐大段得力但此道之傳不絶如綫深使人憂懼也來嵗聚徒勢所不免但此間屋宇空虚多時不知如何處置也本領分眀義利眀白閑時都如此説及至臨小利害便靠不得此則尤可慮也禮書想已有次第吳伯豐已寄得祭禮来渠以職事無暇及此只是李實之編集又不能盡依此中冩去條例其甚者如祭法祭義等篇已送還令其重修特牲等篇亦有未入例處旦夕更取家郷禮參校令歸一却附去煩看過王朝禮已送與子約令附音䟽但恐渠亦難得人寫不能得耳近報誤舉偽學人許令首正觀此頭勢恐子合受得王漕文字亦不穏當人生仕宦聊爾隨縁亦何必須改官而包羞忍恥處此危疑之地乎伯豐書云其所厚者以其無所私禱寄聲欲䋲治之子約亦甚稱其所守之固但世路如此所可憂者不但道學而己任尉甚不易得然不欲深與之交恐復累渠入偽黨也季通家為鄉人陵擾百端㡬不可存立因書囑其隂䕶之為佳時事大槩此亦聞之但諸人狼狽殊非所望耳子約終是好不知已行遣未此事未開口斷置已定多少快活可為致意未及奉慶也黄商伯事殊不聞首末子約書亦言其舉措有未善處不知救荒何所闗扵近習而惡之若是耶駭機飛語殊可憂畏䟽逺遁藏然猶不敢不跼蹐也揆路曽相見否其説果何如邸報中見外間事賴諸賢維持且爾無大踈失但定省一節都不見人說著此甚可懼非小故也彼中親所見聞有何節目因便煩子細報来彼中且如来喻亦善世道如此吾人幸得竊聞聖賢遺教安可不推所聞以拯斯人之溺政使不得行扵當年亦湏有補扵後也常教整頓學校亦甚不易可與晦伯説渠家有兩世奏議煩晦伯為借録得一本見寄為幸辛卿鬻鹽得便且罷却為佳中庸不暇看但所改物之終始處殊未安可更思之近却改得論語中兩三段如葉公子路曾晳之志如知我其天之類頗勝舊本旦夕録去子約除官可喜今固未有大叚擔負且㸔嵗寒如何耳此間數日来整􅉐綱目事却甚簡乃知日前覺得繁只是局生要之天下事一一身親歴過更就其中屢省而深察之方是真實窮理自然不費心力也趙帥所云前官事不湏理㑹亦是一說未可便以為非然只此便見合得顯榮通達處如今世路未論邪正只剛强底便是八九分不得便宜了也大學向所寫者自謂已是定本近因與諸人講論覺得絜矩一章尚有未細密處文字元来直是難看彼才得一說終身不移者若非上智即是下愚也此番出来更歴鍜鍊儘覺有長進處向来未免有疑處今皆不疑矣中庸三紙已細㸔但原本不在此記得不子細然大槩看得恐是或問簡徑而章句反成繁冗如鳶魚下添觧説之類又集觧逐段下駁諸先生說亦恐太廹不穏便試更思之或只如舊而添集觧或問以載注中之説如何為學直是先要立本文義却可且與說出正意令其寛心玩味未可便令考校同異研究纎密恐其意思促迫難得長進将来見得大意略舉一二節目漸次理㑹盖未晚也此是向来定本之誤今幸見得却煩勇革不可茍避譏笑却誤人也陳君舉門人曹噐逺來此不免極力為言其學之非又生一秦矣所謂艱窘之状令人惻然不知何故前此都不說著今乃一旦驟至此也自困涸轍無力相賙深負愧歎也然扵此患難之際正當有以自處不至大段為彼所動乃見學力不然即與世俗戚戚扵貧賤者何以異耶辭免文字至今未得遣去盖封事字數頗多昨日方冩得了更湏装三兩日方得發也所欲言者不論大小淺深皆已說盡眀主可為忠言想不至有行遣但能寝罷召命即為幸耳萬一不遂不免一行更不能做得文字只是面奏乞歸也大學中庸集註中及大學或問改字處附去可子細㸔過依此改定令冩但中庸或問改未得了為悵耳今年早晚禾皆損州縣官員不足恃賴未知眀年復如何此外可深慮者不止一端亦非獨為一身一家慮也時論未平不謂閒廢無能之人每煩君大夫旰食之憂如此比讀邸報不勝恐懼今章中所及如泉相者已行遣湖守䟽中亦及彭子夀田子真以蠱毒事又下漕司究治其勢駸駸恐未容飽食而安坐也禮書縁遷徙擾擾又城中人事終日汨没不得工夫㸃對所編甚詳想多費心力但以王侯之禮雜扵士禮之中不相干渉此為大病又所分篇目頗多亦是一病今已拆去大夫以上别為䘮大記一篇其間有未及填寫處可一面令人補足更照别紙條目整頓諸篇務令簡潔而無漏落乃為佳耳修定之後可旋寄来㸔過仍一面附入音䟽速扵嵗前了却亦是一事盖衰老疾病旦暮不可保而罪戾之蹤又未知所税駕兼亦弄了多時人人知有此書若被此曹切害胡寫兩句取去燒了則前功俱廢終為千載之恨矣眀州書来亦說前數卷已一面附䟽王朝禮初欲自整頓今無心力㸔得已送子約託其校定仍令一面附䟽彼中更有祭禮工夫想亦不多若伯豐寳之能便下手亦只須數月可也但儀禮只有士大夫祭法不可更以王侯之禮雜扵其中湏如前来所定門目别作廟制九獻及郊社諸篇乃為盡善已再條具寄之矣幸亦時為促之并得嵗前了當為佳榮霤之說别紙奉報可更詳考便中報及也近日眼病全看文字不得但因講論見得此理愈見分眀門路愈見徑直前日答吉州王峴書中有數句頗甚簡當今漫録去可以示甘吉父也峴乃鄉来子約所館之家因子約来通問也子約又入王南强章䟽只此數人東湧西没到處出見甚可笑也周樸甚可念一書并信煩因便寄與勿令浮沉為佳趙恭父竟坐其事部中行下取索不知意欲坐以何罪州郡知其無辜欲為回申而恭父不願也已發去矣此却差强人意也孫之李和卿甚不易因書或相見煩各為致區區當暑目昏不及拜書也楊子直甚入時但不知亦只避得可避底枉了做許模様也偽學之章首辨張非偽學盖前此劉元秀力薦王炎作察官而韓以受知張門為疑故此章着意如此分别非獨欺天亦欺韓也故其後復申炎所陳薦舉之說乃是首尾專為王地冷眼旁觀手足俱露甚可笑也且㸔此人終必得志盖此事中間已似稍緩却縁近日一繳其徒得以藉口復肆沸騰已行遣人勢必從頭再有行遣張乃孟逺之弟本依韓劉今此以官滿欲差遣之故上書外為直言而中實刪去又以未刪之本示劉而劉以示沈故及扵禍此乃以邪攻邪自貽伊戚然遂死扵道路亦可傷也又可懼也今冬上饒括蒼興國學者近十餘人到此新書院已可居矣逐日幸有講論足以自警其間亦頗有可說話者所恨直卿不在此不得與之琢磨也初七日方遣得辭免近四十紙奏劄所欲言者略已盡之但猶有記不起者無奈何耳今必已到彼多日不知聖意如何若得遂退蔵千萬之幸如其不然到彼亦别無話可說只是乞歸耳直卿来嵗之計果何所定此人回幸見報若在後山此間諸生亦有能往者老拙亦時可一到也近日朋友來者頗多萬正淳與王子耕吳伯豐皆在此諸人皆見陸子静來甚有議論此間近亦有與之答問論太極書未及寫去大率其論與林眀州不相逺也儀禮義疏已附得冠義一篇今附去看家郷邦國四類已付眀州諸人依此編入其喪祭禮可便依此抄節寫入只覲禮一篇在此須自理會祭禮亦草編得數紙不知所編如何今并附去可更斟酌如已别有規模則亦不須用此也可早為之趂今年秋冬前了却從頭㸃對并冩得十數本分朋友藏在名山即此身便是無事人不妨閉門静坐作粥飯僧過此殘年也今日吾輩只有此事是着𦂳處若打不過即上蔡所謂能言空如鸚鵡者為不虚矣伯豐劉五哥説已得諸司文字以彼之才固有以取之但正用此時得之亦不能使人無疑耳目前朋友思索眀快未有其比心甚惜之然扵事有難言者因與之語要當有以警之救得此人亦非細事若此處打不過了更說甚操存㴠養耶輔漢卿萬正淳皆留此兩月而後去其他朋友數人亦将去矣諸人皆為外間浮論攻擊不敢自安而去其實欲見害者亦何必實有事迹與之相違但引筆行墨數十行便可使過嶺矣此亦何地可避耶世人見處淺狭例如此令人慨歎又来學者亦未見卓然可恃以屬此道之傳者今更有此間隔益難収拾不謂吾道之否一至此也思慮及此又使人深惜伯豐之不能自立曷嘗見有顔子而為桓司馬家臣耶子約却是着實但又有一種不通透處激惱人鰣魚多骨金橘太酸天下事極難得如人意也禮書如何此已了得王朝禮通前㡬三十卷矣但欲将冠禮一篇附䟽以為諸篇之式分與四眀永嘉并子約與劉用之諸人依式附之庶㡬易了適已報與子約或就令編此一篇或直卿自為編定此一篇并以見寄當擇其精者用之此本已定即伯豐寳之輩皆可分委也病軀脚氣未動但目益昏恐更數月遂不復見物以此急欲了此書及未盲間讀得一過粗償平生心願也得曾致虚書云江東漕司行下南康毁語孟板劉四哥却云被學官回申不可遂已此其勢決難久存只此禮書傳者未廣若被索去燒了便成枉費許多工夫亦不可多向人前說着也謝表漫錄去㸔勿以示人初時更有數語後為元善所刪然亦無甚𦂳要若謂取禍則只此亦足以發其機也子約頗愛㤗兒亦已囑令隨諸生程課督察之矣但婺州近日一種議論愈可惡大抵名宗吕氏而實主同父潘家所招舘客往往皆此類深可憂歎亦是伯恭有以啓之令人不無可恨耳近日郡事浸簡歳事亦可望但經界指揮不下恐復為浮議所搖前此留葛報書皆謂可行獨王不報書疑此間受漳浦之㕓者或與當路厚善必實為此謀耳若果如此乃漳人之不幸而老守之幸嵗裏即可丐歸矣寄来算法已收只此一事其說數端信知義理之難窮也知與劉潘諸人相聚甚樂恨不在近資講論之益但春秋難看尤非病後所宜且讀他經論孟之屬如不食馬肝亦未為不知味也所以答子約者甚佳但恐亦不必如此今所慮者獨恐物不格知不至耳知至則自見得義利公私之下毫髪不放過也伯豐絶交之事渠必不能辦只韜藏避謗逡廵引却似亦不為甚難如㳺誠之但以誤受舉削之故至今不為改秩計已近十年彼其人固多可議而為學又非伯豐比且其親年已髙而身亦五十餘嵗矣乃能㫁置如此則其長處亦不可誣也若與之交淺言深但㣲與説及此意勸之以晦迹避謗當無不可也好朋友難得近日數為人所誤令人意緒不佳深恐又失此人故不能不闗念耳大學或問齊家治國章今善好惡改作今反其好中庸章句索隠下添隠謂卑陋也在本來也之下本無可稱改作本來卑陋得江西書吳伯豐果以去冬得疾不起見其思索通曉氣象開濶朋友中少能及之又子約元德書來皆言其自樹立之意尤不可及法門衰敗之秋又適䘮如此等人尤可痛悼也子約累書來辨中庸首章戒謹恐懼與謹其獨不是兩事又須説心有指未發而言者方説得心字未説得性字又須説是耳無聞目無見心無知覺時方是未發之中其説愈多愈見紛拏又争配義與道是将道義來配此氣如何有人讀許多書胷中乃如此黒暗彭子夀初亦疑中庸首章近得書却云已釋然矣方知章句之説為有功也張元德説得頗勝子約而其兄元瞻看得尤好若得伯豐且在與之切磨可使江西一帶路徑不差今既不如所望而子約輩沈滯膠固不可救拔每得其書輒為之數日作惡也病中看得孟子要畧章章分眀覺得從前多是衍説已略修正異日寫去此書似有益扵學者但不合顛倒却聖賢成書此為未安耳大學諸生看者多無入處不知病在甚處似是規模太廣令人心量包羅不得也不如看語孟者漸見次第季通比已得其到道州書地主頗寛假之計渠亦能自處不知赦後還可得量移否周純夫甚可念欲寄一書問勞之亦復不暇亦恐彼中難得便耳謝表為衆人改壊了彼猶有語是直令人不得出氣也此輩略不自思自家是何等物類乃敢如此殊可憫笑也書院中只古田林子武及婺州傅君定在此讀書頗有緒傅尤刻苦前此亦多讀書但未有端的用心處近方令其專一漸次讀書覺得却有立作将来或可望也孫丈書已收書中甚稱仁卿政事之羙恨不得聞其詳也親舊皆勸謝絶賔客㪚遣學徒然其既來即無可絶之理姑復任之若合過嶺亦是前定非闗門閉户所能避也晦伯人来得近問知山中讀書之樂甚慰但不應舉之說終所未曉朋友之賢者亦莫不深以為疑可更思之固知試未必得然以未必得之心隨例一試亦未為害也痰嗽已向安否亦不可不早治也牒試中間辛憲湯倅過此皆欲為問既而皆自有客不復可開口其偽冒者固不容復動念知却劉倅之請甚善宗官衡陽之嫌固亦所當避也吾人所處着個道理二字便自是隨衆不得此是不可易之理但㸔處之安與否前書所論鬼神之說後来㸔得如何程書中說此話處數條東見録中尤多可類聚㸔湏自見諦當處也遷居擾擾中亦有一二學者在此雖不得子細討論然大抵未有擔荷得者此甚可慮陳正已来自建昌實亦眀爽但全别是一般說話所謂伯恭之學一傳到此甚可懼耳近有臨江軍張洽秀才来資質甚好可喜可喜書院方盖屋未得成就度須更兩月方可居耳此女得歸德門事賢者固為甚幸但早年失母闕扵禮教而貧家資遣不能豐備深用愧恨想太夫人慈念必能濶略然婦禮不可缺者亦更賴直卿早晚詳細與說使不至曠敗乃善輅孫骨相精神長當有立輔亦漸覺長進可好㸔之所喻先天之說後来㸔得如何若如所論即天人各是一般義理不相綂攝矣恐更當子細玩索也近見朋友殊少長進深可憂慮任伯起到此昨夕方與痛説覺得上面更無去處了未知渠能領畧否耳廣西寄得語孟説來細看亦多合改以毉藥之擾未得専心方畧改得數段甚恨相去之逺不得子細商量也伯起説去年見陸子静説㳺夏之徒自是一家學問不能盡棄其説以從夫子之教唯有琴張曾晳牧皮乃是真有得扵夫子者其言恠僻乃至扵此更如何與商量討是處也可歎可歎浙中旱甚當宁憂勞聞之令人恐懼奈何奈何江西除命縁上封事云云上感其言故有是命諸公初只欲與郡上命與此更有少商折甚可疑恠大抵此畨盡出聖命或者以為不當力辭其説亦是但衰悴如此孤危如此勢豈可出初欲且受而臨期請祠又思不可不先做張本已申省辭免矣得請甚幸不然却用前説以必得為期耳子澄得書問直卿動静南紀在長沙與同官不恊求去未知如何愛直堂記一本謾往子澄此文勝它篇也近㸔外書有一段伊川答王信伯之問曰勿信某言但信取理不知曾見此話否前書所論伊川先生語甚善聖賢之教固不一端然専執僻見不信人言又豈信理之謂乎此處似更有商量要非面見不能盡也子澄乃令副端章䟽言其以道學自負不曉民事與監司不和而不言所争之曲直又言其修造勞民而已聞之趙倉已嘗按之而復中輟必是畏此惡名而隂往臺諫處納之耳韜仲事甚可笑今之君子無以大相過者大率如此直是使人煩惱也彼中新宰已交印否觀其舉措又似了不得然今日若無變通便是管葛之才亦了不得况扵常人近嘗因書說與兩漕而林漕才到延平便以威勢迫脅小官使之為縣是全然不曉㑹人說話矣可恠可恠楊元禮亦為漕司不取願状迫換長汀渠乞来禀議又不許却欲以倉檄来辨其事不知又如何今時做官不論大小直是全然睹是不得子澄冬至書云已遣家歸廬陵只與一姪子在彼俟命則是此消息來得已多時矣若道一例如是他人又却無是只是吾黨便有許多觸磕亦可笑豈亦大家行着一個不好底運氣耶抑亦老子命薄帶累諸朋友也被㫖一行不免一出但上恩如此不得不竭其愚聖德寛洪必不深罪言者然亦不能不以為慮若便得罷逐還家乃為厚幸所喻學業大槩甚善此間之約諸人不見説着次第不成頭緒但季通韜仲説欲相約來後山若得在彼亦易相見衰老之幸也輅孫不知記得外翁否渠愛壁間獅子今畫一本與之可褙起與看勿令揉壊却也此是陸探㣲畫東坡集中有賛願他似此獅子奮迅哮吼令百獸腦裂也居廬讀禮學者自來甚善甚善但亦不易彼中後生乃能如此前此常患來學之徒真偽難辨今却得朝廷如此開大爐􅟈煅煉一番一等混殽夹雜之流不須大段比磨勘辨而自無所遁其情矣日暮途逺心力疲耗不復更堪討論矣日者多言今年運氣不好不知得見此書之成否萬一不遂千萬與諸同志更相勉勵究此大業也此間朋友間有一個半個然不甚濟事但不意其敢來亦可憐耳彼中朋友真肯用力者名姓謂何因書報及仍畧品目之慰此窮寂之望也學古魯叔相繼逝者可傷吳伯豐尤可惜朋友間似渠曉得人説話者極少始者猶疑其守之未固後來得子約張元德劉季章書又知其所立如此不幸蚤死亦是吾道之衰念之未嘗不慘然也季章書語錄去切勿示人足令同時輩流負愧入地也吳元士曾相}
