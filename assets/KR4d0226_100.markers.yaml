  - {type: variant, offset: 12014, length: 0, content: '', WYG: 否昨看王伯照雜説中間有一段理會不得或云渠嘗學扵王公恐能知其説試為宛轉託人扣之却見報也齋中諸友甚不易相信得及年來此道為世排斥其勢愈甚而後生鄉之者曾不少衰自非天意何以及此老拙以此衰病之極而不敢少懈但精力不逮日月無多無以副其逺来之意深愧懼耳前日鄭齊卿去彼如此聞後来亦有一二如此者初甚慮之近亦漸漸開眀甚悔當昨不且留之也所說論致仕文字其大槩止為一二人如减年乃指沈正卿而言初亦疑此語迂回無下落以宗師之語推之意其為沈而近得元善書乃云果爾則此自無可疑而城中諸人苦相沮抑不令剡奏為可罪也然此文字三月半間已得之後来節次有便而㳺宰以為渠有専人又便有回信不若令帶去為便遂以付之渠乃遷延至此不知今文字在何處留滯若今尚未到則便遭論列亦是本分恠他不得矣然此如破甑若不打破做兩片亦湏打做兩截不復能顧慮也詔㫖正為戒敕偽黨不得自比元祐想已見之噐數命題却已寝罷然此等事亦有士人合理㑹者前日之弊乃為汎濫細碎徒擾擾而無益今遽罷之又不究其弊之所自来大抵此輩用心豈復更有是處自不湏論也林正卿歸自湖外少留兩夕亦頗長進但恐将来流成釋老耳其弟學履安卿中間到此近寄得疑問来亦㸔得好甚不易一書報之可分付入試朋友俟其到城日付之也題壁掲榜者正不足恠但不意諸生能自安扵是賢扵子合矣初見渠時聞其說曾子寝大夫之簀以為不欲咈季孫之意便疑其意趣之不高後来講磨尚庶㡬其有改不謂止是舊来見識也想聞子約之亡重為吾道傷歎也近事似稍寜息而求進者納忠不已復有蘓轍任伯雨之奏想已見之大率是徐葉耳然似此紛紛何時是了兩日無事閑讀長編崇觀以来率是如此甚可懼也子約之亡傷痛未定而季通八月九日又已物故朋友間豈復有此人尤足為痛哭也但其家至今未得的信只魏才仲自桂林寫来前日李彦中歸道長沙見子䝉及趙漕說得分眀矣今年不知是何厄㑹死了許多好人老拙尤覺衰憊非昔時比臓府不秘即滑脚弱殊甚杖而後能行恐亦非復久扵此世也季通之柩已歸陳坂上對面一寺中盖先買得一小地在其前只今冬便葬也萬事盡矣尚何言哉一慟之餘行自病也向留丞相来討詩傳今年印得寄之近得書来云日讀數板秋来方畢甚稱其間好處枚舉甚詳不意渠信得及肯如此子細讀如趙子直却未必肯如此渠前此見中庸說極稱序中危㣲精一之論以為至到亦是曾入思量以此見其資質之羙惜乎前此無以此理謦欬扵其側者而今日聞之之晚也所論曾晳事甚佳但云道體虚静而無累恐鈍滯了道體耳呉元士說六十律為京房之謬亦是但前此所扣乃是只以十二律旋相為宫而生六十調非為六十律也二孫隨衆讀書供課早晚教誨之為幸鄭齊卿亦要去相從渠此㡬日却稍得然以病倦不能聽其講觧念其志趣堅苦亦不易得可因其資而善道之度却不枉費人心力也致仕文字為衆楚所咻費了無限口頰今方得州府判押但求保官更無人肯作只有伯崇一員或者以為俞山甫必肯近以書扣之乃漠然不應今不免専人去問田子真想不至有他詞也禮書便可下手抄寫此中却得用之相助亦頗有益南康李敬子與一胡君同来見在書院敬子甚卓立然未細密胡君堅苦讀喪禮甚子細亦不易得永嘉林補字退思者亦暫来其人甚敏然都不曾讀聖賢書只一味胡走作甚可惜也彼中學者今年有㡬人可更精切自做工夫勤扵接引為佳收近問知齋舘既開慕從者衆尤以為喜規䋲既定更且耐煩勉力使後生輩稍知以讀書修已為務少變前日淺陋儇浮之習非細事也益公每得一書必問昆仲動静且云嘗附書不知已達否此便回能以數字報之亦佳仁卿不殊此也致仕文字州府只為申省不肯保奏此亦但得粗伸已志不暇求十全矣旦夕當附人去成敗得失一切任之不能以為念也通老来未志仁能與俱否病倦不暇作書煩為致意春暖一過此為幸公度必已至亦未及書謙之數字可付之此間朋友不多亦未見大有進者然早晚略得舉揚一番亦不為無補也試後江浙間必更有故舊来恨直卿不在此不得與之商量耳此理要處無多說話不知如何人自不曉以此追念伯豐愈深傷惜如子約輩亦不謂其所造只到此處便死却也李公晦禹貢集觧編得稍詳今附去試㸔如可用可令人抄下一本别發此册回来為佳二孫切煩嚴教督之聞外邊搜羅鼎沸如今便得觧亦不敢赴省况扵其他只可着力學做好人是自家本分事平時所望扵兒孫者不過如此初不曾說要入太學取科第也致仕文字近方發得去度今尚未到聞已有臺章指目矣此却是城中諸賢牽挽之力他人不足責曹晉叔老大隐約號為有思慮者前日聞有此章尚以不及見止為恨不知此是何等見識處事不問義理只顧利害已為卑鄙况今利害又已曉然猶作是論真是不可曉也彭子夀行遣想已聞之此事是放了徐子宜又要個人填窠子圖得舊畫加色一番光鮮不知如此有何了期也渠前日有一書今附去似亦是去年秋間附来近方到不知有何語也書社甚盛以善及人而信從者衆亦非細事可且勉力講論令其反已着實用功為佳然此外亦湏防俗眼讒口横生浮議也禮書附䟽湏節略為佳但勿太畧彭子夀劉德修二事想已聞之楊惲之說何言歟吁可畏也借得黄先之數册陸農師說初意全是穿鑿細㸔亦有以訂鄭注之失者信開卷之有益俟用之行附去㸔也所喻惺惺之説甚善但見說講授亦稍勞似當節省并合令其簡約庶可久也二孫在彼如何書社諸事既有條理想自不容其違犯更望痛加鞭䇿少寛暮年却顧之憂千萬千萬小四郎與劉五哥莫湏常来咨問否雖不在齋中宿食亦望有以遙制之也致仕文字雖已得之但諸賢切齒怒目之意殊不能平不知更欲如何摶噬姑亦任之耳用之去時所附書想已達所帶去文字想皆見之今則此等工夫全做不得矣精舎相聚不甚成條理盖縁来有先後人有少長鄉有南北才有利鈍㸔文字者不㸔大意正脉而却泥着零碎錯亂纒繞病中每與之酬酢輒添了三四分病以此每念呉伯豐未嘗不愴然也履之兄弟却差勝若更加功或恐可望耳伯崇已赴官番陽留其季子在李敬子處資質亦淳謹但未有奮迅拔出之意耳人家禍患重復如此可畏此又豈章子厚之所能為耶古之禪宿有慮其學之無傳而至扵感泣流涕者不謂今日乃親見此境界也前書所說常惺惺此是最切要處諸朋友行持亦頗見功効否向来學者得此一番試過虚實遂可辨殊非小補王子合前日過此觀其俯仰亦可憐也普之却能如此甚不易得禮書病起亦怕㸔却只㸔得少閑文字元来世間文字被人錯注觧者只前人做下才隔一手便㸔得别而况此道之廣大精㣲也耶諸生相從者亦頗能有志否近報時學小變舉子輩往往相賀然此豈足為重輕耶致仕且是已分一事粗了然外面攻擊之意殊未已不知更待如何可付一笑但前日得劉季章書云孫從之得郡非其自請乃復被繳適病牙癰已逝去矣㸔此亦是吾黨同一氣運不得不然非但虎食其外也季章又云彭子夀相見亦甚衰悴題目不小想見憂懼然亦正自不必如此也所說大規模細工夫者甚善諸朋友中必有向進者恨未得從容其間耳精舎諸友講論頗有緒通老果如所論甚慰人意得渠如此所助非細非他人比也但渠到此適以病倦又以諸㓜疾患為撓不得甚與之款曲以此知人之學所以不進只縁從初無入處不見其有可嗜之味而所以無入處又只是不肯虚心遜志耐煩理㑹更無他病也所論鞏仲至兩句切中其病前日與語正恠其如此渠苦心欲作詩而所謂詩者又只如此大抵人若不透得上頭一闗則萬事皆低此話卒乍說不得也二孫久煩教誨固不敢以向上望之但得其漸次貼律做得依本分舉業秀才不至大段狼狽猖獗足矣伯謨自去秋病不能食中間一再到此甚悴前月晦日竟不能起以其胷懐趨操不謂乃止扵此深可傷悼而母老家貧未有可以為後日之計又深可慮想聞之亦為一愴然也伯崇之子見留精舎隨敬子作舉業亦淳謹朴實可喜也仙逰不成舉措然與今之受不係偽學舉狀者分數亦不多争前日得致道書云鄭眀州臨行欲薦潘恭叔恭叔對以必扵章中刋去此說然後敢受鄭亦従之此亦差强人意而在鄭尤不易聞楊敬仲乃大不以為然不知今竟作如何出場也外間汹汹未已樓大防亦不免聞林采訴寃扵朝已下本路究實先所委官見其案牘駭異不敢下筆已改送他官如其所請此諸人撏剥已盡或湏作語頭来相料理老朽寜復計此一聽諸天而已伯謨不幸前書報去未去時亦安静眀了但可惜後来一向廢學身後但有詩數篇耳然亦足逺過今日詩流也通老到彼住得㡬日講論莫湏更有進否已勸渠莫便以所得者為是且更鄉前更進一歩不知後来意思如何也渠說冬間更欲來訪但恐迫扵赴官不能款曲耳諸生仍舊相聚否此間朋友只南康節次有人来甚不易得肯向此来如廬陵處即全未有轉動意思也知彼中誨誘稍有次第甚慰所望諸人誰是最精進者因来喻及為佳齋中朋友終年相聚當有極精進者此間諸人来去不常然氣習偏蔽各任己私亦難盡責一人不是大率江鄉人太的確而失之固執此間人太平易而流扵茍簡此古人所以有矯性齊羙之戒也今敬子已歸臨行又與安卿不足只恐向後精舎規䋲又曠濶耳安卿将来却湏移出舊齋自不與精舎諸人相干也禮書湏直卿與二劉到此并手料理方有汗青之日老拙衰病日甚扵前目前外事悉已棄置只此事未了為念向使只如余正父所為則已絶筆久矣不知至後果便能踐言否予日望之也病日益衰甚望賢者之來了却禮書前書所說且從閩宰借人先送定本及諸書来如可用之嵗前能上否渠送得冠禮来因得再㸔一過其間有合修處尚多已畧改定如前書入名噐篇者却移不得及重編得冠義一篇頗穏當然病衰精力少又日短窮日之力只㸔得三五段如此若非儧促工夫未来了絶也以此急欲直卿與用之上来庶可并力此外無他說也鉅鈞到彼煩直卿鈐束之勿令私自出入及請謁知舊有合去處亦湏令隨行不可令自去早晚在齋隨衆讀書供課之外更煩時與提撕痛加鐫戒勿令怠惰放逸乃幸之甚子澄遂以憂歸聞之驚駭渠素體羸能堪此苦否今有一縑煩為貨之置少酒果食物往致奠禮鄙文一通并煩令人讀之也直卿向留東陽之久做得何工夫詩及論語㸔到甚處因便喻及所示論語疑義足見别後進學之勤甚慰所懐已各奉報矣喻及讀書次第意思甚善甚善且更勉力以俟後會但未知㡬時能復来此間少人講論殊憒憒也道間㸔得格物意思稍覺通透日前原未曾說着𦂳要處也講學不可不熟如此可懼可懼目疾不觀書縁此㸔得道理亦漸省約不成不讀書後便都無道理也所論氣稟之病固然然亦大段着力乃能去之近日為朋友說滕文公首章有些意思他日相見面論之也膚仲寄此来云陳是陸學王是吕學以今觀之王是矮子渠乃疑為直卿之文不知前日所試果如何歳晚矣何時定可来前日因書亦以直卿昆仲告鄭帥此公厚德能一見之否来時恐亦湏人便中報及當為作諸公書去也書會此中無有已囑子約但殊未可必旦夕更囑祝汝玉若得在衢尤便也此中已為圖得一小屋基但未有錢物造得耳示喻讀書次第甚善但所論先天太極之義覺得大叚局促日用之間只教此心常眀而隨事觀理以培養之自當有進才覺如此狭隘拘迫却恐不能得展拓也聞有奏事之命前月念五日方被省劄見已冩書只一兩日湏可遣人得請固幸萬一不得即不免再入文字而往前路衢信以来聽命又㸔如何似聞上意頗相念而士大夫亦多有以為言者此亦似一機會但覺得事有難得盡如人意者脚甚澁懶向前道之興廢只此一念間亦可卜得八九分不必勞蓍龜也所遣去辭免人病久未還昨日便中方被告劄但又忽有召命云是謝坡所薦旦夕申省辭免萬一未允即欲再辭而以封事并進前日者太草草已别草定甚詳到彼亦不過是許多説話況口説未必得如此之詳又免再出頭面一番若其可取徐出未晚不然則魏主奚少扵一夫耶省状藁錄去只呈二公勿示他人試為思之并與仁卿景思商量度亦無以易此也聞欲遷居此來甚慰不知定在何日也但授徒之計復何如此中甚欲直卿來相聚然恐此一事未便不知曾入計度否耶覺得嵗月晚病痛深恐不了此一事夢寐為之不寜也近又得正父書目亦有好處其長處是詞語嚴簡近古其短處是粗率不精緻無分别也辭免人度今已到不知所請如何頭勢如此又非前日之比只得力辭鄙意更欲乘此亦有所言亦為餵鷹飼虎之計又度得無益扵事亦未必中扵語黙之冝且更籌之若其不可但只力辭亦無害扵義也若已得請便不湏說只恐未允故有此念盖猶是從官不應黙黙也泰兒挈其婦歸粗慰老懐衰遲至此無復他念但更得數年整頓了却諸書此兒粗知向學它時稍堪直卿諸人提挈足矣此間番陽近有一二朋友来頗佳恨直卿不在此無人與商量文字耳湖南初且以私計不便未可往今縁經界住罷遂不可往矣已草自劾之章旦夕遣人若且得祠禄亦已幸矣生計逼迫非常但義命如此只得堅忍耳聞欲相訪千萬速来所欲言者非一知彼中學徒甚盛學業外亦湏說令知有端的合用心處及工夫次第乃佳徐葉至此已久終是脫去舊習未得近日㸔得後生且是教他依本子認得訓詁文義分眀為急自此反復不厭日久月深自然心與理熟有得力處今人多是躐等妄作誑誤後生輾轉相欺其實都曉不得也此風永嘉為甚書来知甚長進可喜近得漳州陳淳書亦甚進也今老病無它念只得朋友多見得此道理即異時必湏有立得住者萬一其庶㡬耳聞今歳便欲不應科舉何其勇也然親闈責望此事恐未得自專更入思慮如何通老過此留三日已過去矣誠實可敬但業未甚修耳亦非細事晦庵續集卷一欽定四庫全書晦庵續集卷二宋朱子撰書答蔡季通所喻已悉但區區方持此戒不欲輙破之故不敢承命亦為賢者慮之恐只中甚自愧便是病根不若從此痛自斬絶毋以此等為愧而深求可愧之實不必更為月攘之計以俟來年庶乎扵遷善改過有日新之功而胸中之浩然者無所不慊而日充矣如其不然則平日講論徒為虚語臨事之際依舊只是平日氣習世俗常情某實懼焉三復來書竊意方當落筆之時天下之義理皆小而此事獨大也不然何其與平日講論之言殊不相似也以左右之髙眀區區常竊愛慕深不欲其如此故竭底藴幸熟察而深思之則不惟某之幸實朋友之幸吾道之幸也昨日讀通鑑至班固論郭觧有温良泛愛絶異之資而不入扵道德以至扵殺身亡宗處方為之掩卷太息以為天理人欲之間毫釐一差其為禍福之不同乃至扵此今日晨卧未起得昨日戌刻所貽書扵此心復有戚戚焉姑遣來人草草奉報盖所欲言猶有未及究者千萬察之公濟所舉似皆古人語盖是其入處耳王通賛必是康節所為向以為眀道之文悞矣若眀道湏别有判㫁不止如此也林氏見思之説昔所未見它日携來恐更有合入别錄者耳師説才字似作方字為是此類尚多今亦未暇細考耳樂説甚分眀前日因希聖書甞附幅紙奉扣通典子聲之説不知如何不能布筭無以見五聲損益與此廿四律同異如何也陳圖亦未曉來喻湏面論乃究耳薛説固未知其如何然觀古人布陳箕張翼舒等説不一似亦與今人不相逺但其分合出入竒正相生之變自在主将一時心術之妙計亦非圖書所能傳耳綱目竟無心力整頓得恐為棄井矣韜仲相聚想互有滋益近日章句集注四書却㸔得一過其間多所是正深懼向來日用之疏畧也别後兩日稍得觀書多所欲論者幸會期不逺此只八九間下寒泉十一二間定望臨顧也易欲如此寫一本彼有後生曉文理者令寫過只六十四卦亦得覺得如此儘好㸔亦綱目中生出也律管分數甚荷見示自疑不能皆全分也前日所㸔圖子如可傳煩錄一通見寄雖無心力亦欲畧知大槩也祭儀深衣納去錄畢却示及也大學改處他日面呈權量所未學豈敢輕議但以羃寸計之范説恐非是耳更告熟考之也律説幸早寫寄但以聲定律及均絃用聲之説非面莫扣為可恨不知㡬時可相會寒泉精舎才到即賔客滿坐説話不成不如只來山間却無此擾公濟亦每以此為言也歴法恐亦只可畧論大槩規模盖欲其詳即湏仰觀俯察乃可驗今無其噐殆亦難盡究也精舎數日紛紛無意思只得應接酒食説閑話而已亦縁屋舎未就不成規矩它時湏共議條約乃可久逺往來耳律書緩寫不妨厯法莫亦可草定一梗槩否若用先天分數不知日月五星之屬遲速進退皆可扵此取齊否若得此二書成亦不為無補扵世也某今歸山間懶未欲出意欲從月末間一到雲谷度暑未知果能動否恐不能動即奉約一來家中相聚數日殊勝它處惹客生事也程集近復借得蜀本初恐有所是正然看一兩處乃是長沙初刋時印本流傳誤人如此可恨今漫納去試為勘一過有不同處只以紙蘸糊帖出或恐有可取也盖陳眀仲云亦嘗校定耳近看遺書目錄序時有先後以下一節説道理不出欲更之云先生之學其大要則可知己讀是書者誠能主敬以立其本窮理以進其知兩者交相為用而不已焉則日用之間且将有以黙契乎先生之心而扵疑信之傳可坐判矣伯諫相見懸知必論此事但向來攻之未嘗不屈喻之未嘗不稱善而終為陷溺不能自解免恐所謂亦甚然之者亦未可保近覺與此一等朋友說話殊敗人意思不如緘口内修之為愈也前書所喻公濟論難反復之語不謂其所見乃如此初欲歸塗過之今日已迫矣恐未能但恐終亦難說話也金聲玉振之說皆未盡孟子觧㸔得兩篇改易數處頗有功但塗抹難㸔無人寫得一草本不知彼有後生醇謹曉文理快筆札者否俟某復来此倩得一兩人来草寫出一本大家商量為佳倉司程書已了有一本在此俟来日觀之也綱目有疑無問大小告便筆之但未知何日可會議耳律尺之喻不謂蜀公差誤乃爾成書幸早見示程文三器圖中引宋景文說不知見扵何書說李昭黄鍾乃南吕倍聲即是倍平之法前輩已用之不知與今所論者有相犯處否也五代㑹要納去㸔畢并前所携去文字示及為幸昨日已到芹溪今日畧走寒泉晚即還此治淵源言行録等書意欲老兄一来相聚旬日伯諫之意亦然綱目草册併告帶来有餘力便欲下手刋修也歐公疑周禮說荷録示荆公必甞親見其說但今集中無所見只有䇿問一二條亦畧見不能無疑之意耳新史是紹聖所作荆公既有此語史官自是不敢不書也華詞固無益然專貴吏材而不及行義乃當時之深蔽也時論又大變旦夕必見及其兆已見矣星經參同甚願早見之只恐竄謫不得共講評耳參同契尚多誤字可早作考異示及納甲之說屯䝉皆用上下卦初爻何耶毛穎傳云其先眀視佐禹治東方吐養萬物又云吾子孫當吐而生恐兎之得名以吐之故但吐養云云未知所出耳昨㸔周禮磬氏疏中引案樂云磬前長三律二尺七寸後長二律尺八寸不知所謂樂者是何書亦告批喻石磬聞平江不難得欲託人作小者數枚但不能得合新律幸為思之合用㡬枚其長短厚薄之度如何幸悉批喻也丹經甚煩讐正然亦尚有一二處可疑當俟面請磬說更無可疑幸少黜先入之言而以公共之心度之則知鄙意之不繆如周髀經雖區區所未讀然試以前書所論勾股两絃之說考之恐賢者未免錯觧古經也使還奉報草草已與諸友約開正同登西山矣猿鶴事更煩一哥兄弟子細為檢所云雜書不知是何書又韓詩挈提陬維其義云何上文角根既是辰卯則此當為寅位孟陬東之維不知是否又恐是總言四維也兎者吐生光昨日閑思此語忽記毛頴傳有吐養萬物有功之句意此等語必先有出處故二書各用之耳或知其說幸以見教十二相屬起扵何時首見何書亦望并及之也諸說荷垂示但本草亦止說吐生而不言其得名之自此也相屬之說若以廿八宿之象言之則唯龍與牛為合而它皆不類至扵虎當在西而反居寅鷄為鳥屬而反居西則又舛之甚者今亦未敢論此只欲見得本來出處更望詳考見報也通典中說十二律子聲莫便是清聲否若如所言即是廿四律不用六十律矣莆田徐君来說厯如此理會不得今以納呈渠旦夕湏自去求見但某自曉不得却為老兄所累被人上門反倒旦夕不免逐旋請教要畧理會得一大槩規模免被人如此熱謾也平江磬材聞不難致此見有的便告考定格式剪紙作様一兩日間示及當往屬相識求之但觸其弦之說湏依公指定乃佳不可狥偏說也磬式謹領但求觸弦是兩節事必如来喻則既以兩矩齊等求弦而又以矩之博益一矩之長而觸其弦亦無害扵所謂来厯者必若勾短而股長則其一矩為股者今雖未長而終必長其曰股者葢即今之短而以其終之長命之也又如兩端相望然後為弦則来喻固兩端相望而某說亦未甞不兩端相望也但季通欲裁股博之下以觸弦而某則裁其上為小異耳然亦未嘗不合也但如某説則簡而通如來喻則煩而窒多所遷就而後合耳樂書已就否因便奉寄示近讀長編説魏漢津劉炳作大晟樂云依太史公黄鍾八寸七分之管作正聲之律依班固黄鍾九寸之管作中聲之律正聲扵十二月初氣奏之中聲即扵中氣奏之故有廿四氣鍾之説初㸔甚駭其説細㸔乃知是讀著錯字史記又破句讀了試檢律書一觀可發一笑也一代制作乃如此令人惋歎可早就此事亦不是小事也春秋無理㑹處不湏枉費心力吾人晚年只合愛養精神做有益身心工夫如此等事便可一筆勾㫁不湏起念儘教它是魯史舊文聖人筆削又干我何事耶易説俟取得即納去然亦政自非急務也極星出地之度趙君云福州只廿四度不知何故自福州至此已差四度而自此至岳臺却只差八度也子半之説尤可疑豈非天旋地轉閩浙却是天地之中也耶雅鄭二書皆欲得之律管并望擕至不知何時得來郭公易書全無倫理若兵書歴書亦只如此即無可觀但恐偏有所長耳子直亦是闇中摸索不知如何見得好處也史記律數源逺七分為寸之説亦深疑之但自算不得不敢堅決去取今承來喻推析洞然無復疑論矣古人文字精密如此而後人讀之鹵莽如此甚可歎也然不能布算其精細尚未盡曉更容子細别奉扣也啟䝉所改是否又天一地二一節與天數五地數五相連此是程子改定當時不曾説破今恐亦當添程説乃眀也林侍郎所論太極不知是對何人言之來喻似有闕文讀者皆莫曉也所喻蓍數少參多兩之説甚善然所積之數則少隂反多扵少陽者八不知此意又是如何更須契勘恐不堪駁雜也比近得林潭州易説甚可笑書多重滯不可寄去無事可一來觀之也律書本子却幸寄示樂書如何若能入山可一并帶草本及俗樂文字來得以面究其説幸甚律管樂書已領更容細看續奉扣也方分竟如何若果如此即空徑三分之説遂不可用矣以琴為凖果可定否恐􅁝聲緩急亦隨律高下則不容其自相和耳前日因書亦畧扣湯簿尚未得報只恐渠亦未必理會到此耳律吕書舊本莫只在否便中亦望示及開通錢小大自不等不知用何者為正耶廟議亦不盡記若士大夫以下自有定制但今廟不成廟即且依程夫子説自髙祖而下亦未為僣也易中七八九六之數向來只從揲蓍處推起雖亦脗合然終覺曲折太多不甚簡易疑非所以得數之原近因看四象次第偶得其説極為徑㨗不審亦嘗如此推尋否亦幸語及也儀象法要一册納上但歸來方得細看其運轉之機全在河車而河車須入乃轉恐未盡古法試看之如何也監糶之擾誠如所喻今日事無不如此求學道愛人之君子殆未之見斯人之不幸可勝嘆哉某自寺溪入長澗由楊村以出所過不堪舉目有小詩云阡陌縱横不可尋死傷狼籍正悲吟若知赤子元無罪合有人間父母心區區扵此深有所不能自已者然出位犯分之愧盖不勝言矣某數日整頓得四書頗就緒皆為集註其餘議論别為或問一篇諸家説已見精義者皆刪去但中庸更作集畧一篇以其集觧太煩故耳初欲專人今但付三大節中多事更不别奉問也来嵗之計如何若作書社亦冝早有定論小孫素䝉印可當遣前受業耳淵源録未成文字劉子成又録得數事来云汪書處似此文字甚多俟寄去足成乃可傳毋枉費筆札也大學本敬付来人㸔畢早寄及論語方有六篇亦未成次第未可寄也叔京前夕方行甞勸渠日用加持敬之功渠云能存其心是之謂敬而某以為惟敬所以能存其心論此兩日竟未能合觀其主意又似老兄所論克己之目一般以此見議論易差若不實下日用工夫動加防檢殆無以驗其是非也諸友相聚作何工夫一日之間湏著一兩時辰作科舉外工夫為佳邑中水禍至此極可傷憫此中幸亦無它兩日後方聞之耳所喻截米適有便已為言之未知復如何但恐藉此以賑被灾之民則不當奪之府中亦有米来可就撥也語録已領餘未暇尋且此數編玩而繹之自有餘味貪多務得恐却非所冝也餘山所論諸疑皆中其病大槩亦只是此一格次第當時見得都不曾透徹耳然二先生語中亦間有如此處必是記者之失如眀道論釋氏下學上達處則無滲漏矣其下文説盡心知性語亦不完也道義固一事然體用之殊亦不可不辨但云義即是道恐未可也又性固無不善其所以有不善有過有不及却従氣禀中来只如所論亦未子細造次顛沛必扵是乃知仁而用力焉之事若知之未眀則所謂是者恐亦未端的此亦湏更察之日用之間卓然實見仁體可也觀過當以觀字為重盖觀處用力則天理人欲賔主分眀而仁體在我者益昭著矣若但知之而已則恐未必端的實見也聖賢指人求仁之方多是扵下學處指示盖用力扵此而自得之則安然便為已得非若令人縣揣暗料窺見彷彿便以為得也愚見如此重䝉下問不敢隠其固陋敢率易言之以求反復如其未當更得痛為鐫磨復以下喻誠孤陋莫大之幸不爾則自此不復敢致其愚矣聞又從平甫借語錄此殊非所宜汲汲况温陵已下手刋刻不數月當成昨日已寄得十餘板様來矣册不甚大便扵齎挈真學者之幸也俟其寄來首當奉去然文字之外要當有用心處乃為究竟耳觀過終無定論如所喻亦未安愚意却欲只用古説和靖推説伊川之意甚分眀盖諸説皆有病惟是此説獨不費力但義差緩耳聖人之言自有如此處更以上文茍至扵仁矣無惡也及表記仁者之過易辭也者反復證之則其理亦甚精晦叔所説比欽夫差直截但終是迫切不類聖人語意耳伯諫相見所談何事其精進固可尚而賢者之自咎亦不為過前此相聚兩日固疑近日多事心志不一浮躁之習又復發見此亦不可不速掃除也太極説近㸔儘有未精密處已畧刋正其大者如乾男坤女當為氣化之人物不知曾有人如此説否其下化生萬物乃為形化者耳又主義是指正與義而言葢此是不易之定理大學所謂至善是也子直欲且留此為踰月之計俟某復来今欲煩藏用月初下来就此寫却一兩卷孟子更得一朋友同来尤佳不煩俟某下只開月便可来諸事知已子細即子直薪米之屬亦已一一措置矣此兩日亦只因孟子理會得一兩條義理頗分眀如盡心之説舊来不曾下語覺得諸説無綱領如知言所發眀又别是人意思試檢會一觀即見也六君子盡心者也所以求盡其心也孔子從心所欲心不盡用試更求之便中見喻為幸東山一章全類詩之比興盖言聖人之道大而無窮進之當有漸耳熟味之可見可欲之善誠如所喻但行法俟命一章前日草草言之不能無失更為叅酌見告幸幸文中子論聖人憂疑處又作一論題不知合如何立語只云聖人憂疑如何不知可否若可作即令諸生試為之也伯崇之僕説到官之初儘為人理㑹事至扵興作水利種種躬親若此不倦真副朋友之望也廣之到彼有何議論叔京文字曾論著其得失否此人回可示及也觀過説依舊未安盖此二字與中庸致曲文一同致曲者非致夫曲乃因曲而加功觀過者非觀夫過乃因過而觀理耳前日之説尋當改定却得寄去史記武夷集内上但史記舊㸃多悞不可慿耳大學想不輟㸔誠意兩叚竟尋舊藁不見别補去如此可令兒輩剪去舊字别冩此入其間眀道説人湏自知知自慊之道至有外之心不足以合天地之心恐或舊本不載今可檢冩入因補此兩段覺得舊説儘有合整頓處又是一畨功夫耳孟説更煩為契勘辭意或小未安一字不遺乃所幸願自覺語意蹇拙終不快利也答擇之書并觀過説納去幸為訂之始終條理居敬行簡之説則得之矣昨答書中亦有始終一段今不復錄去也但所論小人共事之説則鄙意未能無疑盖君子隨時捄世無必待學至聖人然後有為之理又不可强其力之所不足挾私任智而僥倖扵有成竊意惟循常守正為可以無悔顧其間屈伸變化則自有斟酌不可至扵已甚耳易中論此等處當無所不盡更煩考之經傳令兒輩抄出它日共詳之為佳得叔京書所論如此内去一觀或能為反復之尤幸通書西銘各一本上内又一角致兼善處數日為渠思講究不精之弊恐是未能勇革世俗之學有以䧟溺其心而然不及别書幸為致此意也不得扵言如某之説則見其强勇迫切氣象正如釋氏所謂直取無上菩提一切是非莫管之意如季通所論則扵不動心處取義殊緩兼文理亦自不通湏作不字乃説得行耳所謂一劍兩斷者改過之勇固當如此然改過貴勇而防患貴怯二者相湏然後真可以修慝辨惑而成徙義崇德之功矣不然則向來竊聆悔過之言非不切至而前日之書頓至扵禮亦可驗也自今以往設使真能一劍兩叚亦不可以此而自恃而平居無事常存祗畏警懼之心以防其源則庶乎其可耳易説三條昨亦思之此上下文本自通貫前此求其説而不得故各自為義而不能相通耳洗心齋戒特觀象玩辭觀變玩占之大者但方其退蔵而與民同患之用已具及其應變則又所以齋戒而神眀其德此則非聖人不能與精義致用利用崇德亦頗相類此下所言闔闢往來乃易之道易有太極則承上文而言所以往來闔闢而無窮者以其有定理耳有是理則天地設位而易行乎其中矣兩而生四四而生八至扵八則三變相因而三才可見故聖人因之畫為八卦以形變易之妙而定吉凶至此然後可以言盡耳前所謂易有太極者恐未可以書言也綱目凡例修立畧定極有條理意義矣俟到此更商㩁之但修書功緒尚廣若得數月全似此兩月無事則可以小成矣九章之目與周禮註不同盈朒恐是贏不足勾股恐是㫄要幸更考之見喻也小學册子向時携去今告早附來添註此數項便可上納付匠家也子澄寄得鄂州本來今往一本并唐鑑如喻遣上編懸文字亦幸早示及前日因㸔孟子説覺得金聲玉振一義舊説未安即已改定其説扵樂之節頗有發眀未暇冩去也大抵八音金石為衆音之綱領􅁝竹匏土包括扵中而革木二音無當扵五聲十二律故居最後而但為衆樂之節不知古人已作如此㸔否耶又前日説宫懸用十二律一懸用七律判懸以下無鎛鐘特磬之説不知與古法合否幸并考之也示喻創艾之意甚善但密切常存戒懼之意不必如此發作却未得歇滅舊病依然只在也詩傳不曾修近㸔論語却儘有合改處}
