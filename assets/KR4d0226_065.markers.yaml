  - {type: variant, offset: 18210, length: 0, content: '', WYG: 于後公乃為詩止誚公公既滅武庚管蔡而成王之疑未釋故公不欲遽歸留居東方而周大夫為作破斧伐柯九罭狼䟦之詩秋大熟止弗敢言金縢所藏代武王之説史之祝辭惟爾元孫某遘厲虐疾至能念于一人是也既克商二年至乃告太王王季文王及公歸王翼日乃瘳皆史與百執事之言叙後事以始終祝册之辭也王執書止歲則大熟歸禾嘉禾之書皆此後作周公自是歸大夫羙之而作東山之詩也召誥序成王在豐欲宅洛邑使召公先相宅作召誥傳曰武王克商遷九鼎於洛邑欲以為都故成王居焉林曰周自后稷始封於邰夏后政衰稷之子不窋出奔於戎狄之間至孫公劉始立}
