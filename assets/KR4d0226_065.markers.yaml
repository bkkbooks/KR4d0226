  - {type: variant, offset: 8702, length: 0, content: '', WYG: 終觀象之後即祭祀上下神祗以攝位告也輯五瑞既月乃日覲四嶽羣牧班瑞于羣后輯歛瑞信也公執桓圭侯執信圭伯執躬圭子執糓璧男執蒲璧五等諸侯執之以合符於天子而驗其信否也周禮天子執冐以朝諸侯鄭氏注云名玉以冐以徳覆冐天下也諸侯始受命天子錫以圭圭頭斜銳其冐下斜刻小大長短廣狹如之諸侯來朝天子以刻處冐其圭頭有不同者即辨其偽也既盡覲見四嶽四嶽之諸侯羣牧九州之牧伯也程氏曰輯五瑞徴五等諸侯也此以上皆正月事至盡此月則四方諸侯有至者矣逺近不同來有先後故日月見之不如他朝會之同期於一日也盖欲以少接之則得盡其詢察禮意也班頒同羣后即侯牧也既見之後審知非偽則又頒還其瑞以與天下正始也歳二月東廵守至于岱宗柴望絶句秩于山川肆覲東后恊時月正日同律度量衡修五禮五玉三帛二生一死䞇如五器卒乃復五月南廵守至于南嶽如岱禮八月西廵守至于西嶽如初十有一月朔廵守至于北嶽如西禮歸格于藝祖用特孟子曰天子適諸侯曰廵守廵守廵所守也歳二月當廵守之年二月也岱宗泰山也柴望燔柴以祀天而遂望祭東方之山川又各以}
