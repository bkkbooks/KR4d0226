  - {type: variant, offset: 10215, length: 1, content: 說, WYG: 猶有可議者則罰其金以贖罪也此五句者寛猛輕重各有條理法之正也𤯝謂過誤災謂不幸若人有如此而入於刑則又不待流宥金贖而直赦之也怙謂再犯若人有如此而入於刑則雖當宥當贖亦不許其宥不聼其贖而必刑之也此二句者或由重而即輕或由輕而即重猶今之律有名例又用法之權衡所謂法外意也聖人立法制刑之本末此七言者大畧盡之矣刑有輕重取舍陽舒隂慘之不同然欽哉欽哉惟刑之恤之意則未始不行乎其間也盖其輕重毫釐之間各有攸當者乃天罰不易之定理而欽恤之意行乎其間則可以見聖人好生之本心也據此經文五刑有流宥而無金贖周禮秋官亦無其文至呂刑乃有五等之罰疑穆王始制之非法之正也盖當刑而贖則失之輕疑赦而贖則失之重且使富者幸免而貧者受刑既非所以為平而又有利之之心焉聖人之法必不然矣流共工于幽州放驩兠于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服流遣之逺去如水之流也放置之於此不得他適也竄則驅逐禁錮之殛則拘囚困苦之隨其罪之輕重而異其法也共工驩兠鯀事見上篇三苗國名在大江之南彭蠡之西洞庭之東恃險作亂者也幽州北裔水中可居曰洲崇山南裔之山或云在今澧州三危西裔之地即雍州之所謂三危既宅者羽山東裔之山即徐之䝉羽其藝者服者天下皆服其用刑之當罪也春秋傳所記四㓙之名與此不同説}
