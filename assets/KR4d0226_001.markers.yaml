  - {type: line-break, offset: 0, content: '', id: KR4d0226_SBCK_001-1a01}
  - {type: variant, offset: 0, length: 2095, content: 晦庵先生朱文公文集卷第一詞虞帝廟迎送神樂歌詞桂林郡虞帝廟迎送神樂歌者新安朱熹之所作也熹既爲太守張侯栻紀其新宫之績又作此歌以遺桂人使聲于廟庭侑牲璧焉其詞曰皇胡爲兮山之幽翳長薄兮俯清流渺冀州兮何有眷玆土兮淹留皇之仁兮如在子我民兮不窮以愛沛皇澤兮横流暢威靈兮無外㓗尊兮肥爼九歌兮招舞嗟莫報兮皇之祐皇欲下兮儼相羊烈風雷兮暮雨右迎神三章二章四句一章五句虞之陽兮灕之滸皇降集兮巫屢舞桂酒湛兮瑶觴皇之歸兮何許龍駕兮天門羽旄兮􅌭紛俯故宫兮一嘅越宇宙兮無隣無隣兮奈何七政恊兮羣生嘉信玄功兮不宰猶彷彿兮山阿右送神三章章四句賦白鹿洞賦白鹿洞賦者洞主晦翁之所作也翁旣復作書院洞中又賦其事以示學者其詞曰承后皇之嘉惠宅廬阜之南畺閔原田之告病惕農扈之非良粤冬孟之旣望夙余駕乎山之塘徑北原以東騖陟李氏之崇岡地名李家山揆厥號之所繇得頽址於榛荒曰昔山人之隱處至今永乆而流芳陳舜俞廬山記云唐李渤字濬之與兄渉偕隱白鹿洞後爲江州刺史乃即洞創臺榭環以流水雜植花木為一時之勝自昇元之有土始變塾而爲庠儼衣冠與弦誦紛濟濟而洋洋廬山記又云南唐昇元中因洞建學館置田以給諸生學者大集乃以國子監九經李善道爲洞主掌其教授江南野史亦云當時謂之白鹿國庠在叔季而且然矧休明之景運皇穆穆以當天一軌文而來混念敦篤於化原乃搜剔乎遺遯朌黃卷以置郵廣青衿之疑問樂菁莪之長育拔雋髦而登進謹按國朝㑹要太平興國二年知江州周述乞以九經賜白鹿洞詔從其請仍驛送之六年以洞主明起為蔡州襃信主簿旌儒學荣郷校也迨繼照於咸平又増修而罔倦廬山記又云咸平五年敕重脩又塑宣聖十哲之象旋錫冕以華其歸琛亦肯堂而詒孫郭祥正書院記云祥符𥘉直史館孫冕以疾辭于朝願得白鹿洞以歸老詔從之冕未及歸而卒皇祐五年其子比部郎中琛即學之故阯爲屋榜曰書堂俾子弟居而學焉四方之土來者亦給其食悵茂草於熈寧尚玆今其奚論廬山記熈寧中作巳云鞠為荗草矣夫旣啓余以堂壇友又訂余以冊書尋訪之𥘉得樵者指告其處客楊方子直遂賛興作之謀既而劉清之子澄亦褒集故實來寄謂此前脩之逸迹復關我聖之宏橅亦旣震于余衷乃謀度而咨諏尹悉心以綱紀吏竭蹷而奔趨士釋經而敦事工殫巧而獻圖曽日月之㡬何屹厦屋之渠渠事具吕祖謙伯㳟所作書院記山葱瓏而逺舎水汨㶁而循除諒昔人之樂此羗異世而同符偉章甫之峩峩抱遺經而來集豈顓眺聴之爲娱實覬宫墻之可入愧余脩之不敏何子望之能給矧道體之亡窮又豈一言而可緝請姑誦其昔聞庶有開於時習曰明誠其兩進抑敬義其偕立允莘摯之所懷謹巷顔之攸執彼青紫之勢榮亦何心乎俛拾亂曰澗水觸石鏘鳴璆兮山木苯䔿枝相樛兮彼藏以脩息且游兮徳隆業茂聖澤流兮往者弗及余心憂兮來者有繼我將焉求兮感春賦觸世塗之幽險兮攬余轡其安之慨埋輪而縶馬兮指故山以爲期仰皇鑒之昭明兮眷余衷其猶未替抑重巽於旣申兮徇耕野之𥘉志自余之旣還歸兮畢藏英而發春潜林廬以静處兮閴蓬戸其無人披塵編以三復兮悟往哲之明訓㗳掩卷以忘言兮納遐情於方寸朝吾屣履而歌商兮夕又賡之以清琴夫何千載之遥遥兮乃獨有㑹於余心忽嚶鳴其恱豫兮仰庭柯之葱蒨悼芳月之旣徂兮思美人而不見彼美人之脩嫭兮超獨處乎明光結丹霞以爲綬兮佩明月而為璫悵佳辰之不可再兮懷徳音之不可忘樂吾之樂兮誠不可以終極憂子之憂兮孰知吾心之永傷士衡相繼有作雖極清麗顧乃自爲隱遁之辭遂與本題不合故王康琚作詩以反之雖正左陸之誤而所述乃老氏之言又非小山本意也十月十六夜許進之挾琴過予書堂夜久月明風露凄冷揮絃度曲聲甚悲壯旣乃更爲招隱之操而曰榖城老人嘗欲爲予依永作辭而未就也予感其言因爲推本小山遺意戲作一闋又爲一闋以反之口授進之併請榖城七者及諸名勝相與共賦之以備山中異時故事云七者疑當作老人南山之幽桂樹之稠枝相樛高拂千崖素秋下臨深谷之寒流王孫何處攀援乆淹留聞說山中虎豹晝嘷聞說山中熊羆夜咆叢薄深林鹿呦􅊯獼猴與君居山鬼伴君逰君獨胡爲自聊歲云莫矣將焉求思君不見我心徒離憂右招隱南山之中桂樹秋風雲㝠𪷟下有寒栖老翁木食澗飲迷春冬此間此樂優㳺渺何窮我愛陽林春葩晝紅我愛隂崖寒泉夜淙竹栢含煙悄青葱徐行發清商安坐撫枯桐不問簞瓢屢空但抱明月甘長終人間雖樂此心與誰同右反招隱詩逺㳺篇舉坐且停酒聽我歌逺㳺逺㳺何所至咫尺視九州九州何茫茫環海以爲畺上有孤鳳翔下有神駒􅋮孰能不憚逺爲我游其方爲子奉尊酒擊鋏歌慨慷送子臨大路寒日爲無光悲風來逺壑執手空徊徨問子何所之行矣戒關梁世路百險艱出門始憂傷東征憂晹谷西遊畏羊腸南轅犯癘毒北駕風裂裳願子馳堅車躐險摧其剛峩峩旣不支瑣瑣誰能當朝登南極道暮宿臨太行睥睨即萬里超忽凌八荒無爲蹩躠者終日守空堂擬古八首離離原上樹戢戢澗中蒲姢姢東家子鬰鬰方幽居濯濯明月姿靡靡朝華敷昔爲春蘭芳今爲秋蘼蕪寸心未銷歇託體思同車綺閣百餘尺朝霞冠其端飛櫩麗逺漢曲楹何盤桓清謡發徽音一唱再三歎借問誰爲此佳人本邯鄲微響激流風浮雲慘將寒爲言何所悲遊子在河關不恨乆離闊但憂芳歲䦨願爲清宵夣燕昵窮餘歡上山採薇蕨側徑多幽蘭采之不盈握欲寄道里艱沈憂念故人長夜何漫漫芳馨坐銷歇徘徊以悲嘆佳人朗秋夜蟋蟀鳴空堂大火西北流河漢未渠央野草不復滋白露結爲霜梁燕起高飛雲鴈亦南翔念我同心子音形阻一方不念執手歡隔我如參商寓龍不爲澤畫餅難充腸金石徒自堅虚名真可傷鬰鬰澗底樹揚英秋草前與君結歡愛自比金石堅金石終不渝懽愛終不踈一夕逺離, WYG: ''}
