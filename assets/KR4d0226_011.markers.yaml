  - {type: variant, offset: 16223, length: 0, content: '', WYG: 堯舜之治既舉元覬必放共兜此又易象所為遏惡揚善順天休命者也盖善者天理之本然惡者人欲之邪妄是以天之為道既福善而禍淫又以賞罰之權寄之司牧使之有以補助其禍福之所不及然則為人君者可不謹執其柄而務有以奉承之哉伏惟陛下深留聖意從班之中賢否尤雜至有終嵗緘黙不聞一言以禆聖聽者故亦隨羣逐隊排連儧補其桀黠者乃敢造飛語立横議如臣前所陳者而宰相畏其凶熖反撓公議而從之臺諫亦不敢以聞於陛下而請其罪臣聞古先聖王敷求哲人俾輔後嗣然則今日正是博求賢能置之列位之時而此人趣操不謹懼為身害乃敢隂為讒慝公肆劫持遂其姦謀不為國計欲望聖慈宻賜宣問陛下視此綱紀為如何可不反求諸身而亟有以振肅之耶綱紀不振於上是以風俗頽弊於下盖其為患之日久矣而浙中為尤甚大率習為軟美之態依阿之言而以不分是非不辨曲直為得計下之事上固不敢少忤其意上之御下亦不敢稍咈其情}
