  - {type: variant, offset: 22205, length: 1459, content: 兹蒙聖恩强卑民社扶曵至此不敢爲乆居計顧念未有以仰報使人之意者訪聞管下諸縣有與貴邑地勢交錯稅籍猥并之處所以賦重民貧凋殘特甚向來貴邑得賢守令力爲申請巳蒙蠲减之恩而此間獨仍其舊念欲以此哀告朝廷仰祈寸澤輙擬就借貴邑當來申請一宗文字以爲楷式諒仁人之心無間彼此得檢示去人令就抄録以歸實爲厚幸某乆不奉問鄕徃馳情比以郡境枯旱異常夙夜憂勞不知所以爲計意者君子所臨當不至是也備災之具經營似頗有緒但檢放一事未有長䇿盖太詳則民有勞費太略則又恐有不均之歎竊恐貴邑施行規模次第必有可見教者專人咨請切幸毋吝法曹經由曽請見否巳囑其歸塗靣扣詳細矣引領以俟至懇至懇建昌利病恐有所聞幸以見警千萬至禱某承示及公文巳行下通放矣聞貴邑所勸未甚多恐不可不早爲之所諸司未必可指凖此間多是兊那合起官錢遣人收糴將來糶畢還錢盖未晚也奉新臨川聞頗有米市井販鬻之家亦可勸諭使徃糴也但陳法還自建昌聞元檢放分數過多今又不可失信王星子與毛掾遍行其境還亦言僅可得一分耳民窮固可哀而官司之計將如之何積憂熏心百病交作求去不得未知所以爲計也某數日爲江西舡粟不下憂窘不可言今聞始得少通然財賦有經而饑民猥衆雖竭所有以糴不能爲旬月之備今再遣陳掾走建昌更令請教陳謹實勤懇同官中不多得建昌諸人旣難深託百里之命正在此人耳切告推誠毋隱使鄰道之人均𬒳惠澤而守官者頼以不得罪於其民固仁人所樂爲者是以忘其再三之瀆而敬以爲請當辱垂念也昨見三牓懇惻之心形於文墨讀之令人感歎不能自巳貴境放及㡬分别作如何措畫皆望見教中間小報言者有謂州官檢放但憂郡計之不足不恤民力之巳困者可謂平論聞聖心極焦勞但無如有司出内之吝耳某又聞檢放得實州家悉巳施行此見懇惻之誠孚于上下尤深喜慰某示喻仰見憂民之切不勝感慨但此雖號鄰邦然情意素不相通豈敢輙爾干預恐或徒爲紛紛而無益也向來甞爲錢漕僣道賢德今一書禱之幸試逹之然湏更得民户自言乃相應耳吾人相求而不相值彼亦果何心哉可歎可歎某衰病多故乆不得附致問訊然采聽道塗竊知捄荒之政究心悉力不勝歎仰恨有封壤之拘不得少佐下風也某昨移建昌之粟於都昌此兩日給散方畢遂可上奏與之丐賞庶不失信於此人幸甚幸甚孫僉適到此首談長者捄荒之意相與歎息錢漕前日通書巳道區區然政不湏此也敝郡兩邑月解千緍自去夏之供至今不得一文郡中獨力支吾幸不至大叚曠闕前日猶恐將來爲縣道之累巳悉與削其籍矣今日爲縣誠難若郡不恤縣則亦何以責縣之不恤其民乎頋上供給餉種種有不可闕者未知朝廷終何以惠綏之耳某孤拙亡庸不自揆度妄意一出竟速顛隮尚頼聖明照知本末假寵從欲所以矜憐慰藉之者甚厚顧無㳙塵可以伏伸報效感之多不若愧之甚也某復蒙垂喻義學記文極荷不鄙謹巳略述數語具道雅意但卒章之意不欲但以勢榮禄利爲言故不復叙植桂之名將來入石只用今所寫去八字書額足矣文字荒淺指意闊踈不審尊意以爲如何不知當屬何人書之更告詳酌也某昨蒙不鄙委撰義學記文不敢固違草具求教兹辱垂示乃知巳便刋石未加指摘遽爾流播愧懼多矣記中第十行周字下元有澹字今似脫去恐寫去時脫了問兒子乃云寫時亦甞疑之曽來請問乃知是古贍字不應遺忘恐或刻時失之耳此於大義無妨但細讀之覺比上句少一字想無害也其文雖鄙然所叙契丈二事皆可以爲世法更欲多得數十本散施知舊庶有能勉慕其萬分者右得之劉侯之孫觀光今爲浦城尉尉始來過書院祠謁甚敬言乃祖叅議公甞受知文公先生出所蔵帖數十皆集所不載㡬敬讀之其間格言至論真有𥙷世道遂刻以附于集因嘆文公之筆流落世間不傳者凢㡬又嘆前軰流風遺韻日逺日亡其存者㡬能嗣守家訓不替祖風如尉者又寧有㡬賢矣哉劉侯玉山人文公嘗爲之記義學云淳祐庚戌二月甲子後學徐㡬謹識義學記載前集其間誤字觀此可證抑重有感於聖人古史闕文之嘆云, WYG: 己}
