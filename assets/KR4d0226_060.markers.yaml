  - {type: variant, offset: 0, length: 99, content: 晦庵先生朱文公文集卷第六十書知舊門人問答答朱朋孫長書垂示尤荷不鄙所論爲學之意又足以見雅志之所存也夫學非讀書之謂然不讀書又無以知爲學之方故讀之者貴專而不貴慱盖惟專爲能知其意而得其用徒慱則反苦於雜亂淺畧, WYG: ''}
