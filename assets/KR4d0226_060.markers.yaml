  - {type: variant, offset: 88, length: 11325, content: 所得也今一旦而讀八書則其茫然而不得其要也豈足恠哉碩且致精一書優柔厭飫以求聖學功夫次第之實俟其心通意解書冊之外别有實下功夫處然後更易而少進焉則得尺得寸雖少而皆爲吾有矣欲爲沙随程丈立祠甚善但衰病不堪思慮曲折巳報余正父矣幸察之答周純仁彼中旣有故舊可以相依氣候亦須差勝嶺外又在郷里逺亦時得親闈安問於理似亦可少安年來時論似亦漸平昨日又聞廟堂一畨除拜固不足爲吾道之重輕然於故舊或畧能垂意但在自巳分上只合閉門堅坐聴其所爲切不可因此便起妄念徒爾紛紜有損無益也所欲買書偶小兒赴銓未歸巳爲託相識置到付之來人數在别𥿄可自檢點付來楮劵殊少不足於用巳爲兊數劵買去然尚有不能盡買者及所𥙷印漢書不知是要何等紙板様大小如何其人未敢爲印有便子細報及當續爲印也閑中無事固宜謹出然想亦不能一併讀得許多似此專人來徃勞費亦是未能省事随寓而安之病又如多服燥熱藥亦使人血氣偏勝不得和平不但非所以衛生亦非所以養心竊恐更須深自思省收拾身心漸令向裏令寕靜閑退之意勝而飛揚躁擾之氣消則治心養氣處世接物自然安穩一時長進無復前日内外之患矣答周純仁神也者妙萬物而爲言者也止旣成萬物也本義云云某竊謂止言六子用文王八卦之位者以六子之主時成用而言故以四時爲序而用文王後天之序下言六子用伏羲八卦之位者推六子之所以主時成用而言故以隂陽交合爲義而用伏羲八卦之序盖隂陽各以其偶合而六子之用行所以能變化盡成萬物也伏羲八卦則兊震以長男而合少女艮巽以長女而合少男皆非其偶然故自動萬物者莫疾乎雷至終萬物始萬物者莫盛乎艮皆别言六子之用故以四時之次言之而用文王八卦之序下則推其所以成用於隂陽各得其偶故用伏羲八卦之序若上用伏羲卦次則四時失其序下用文王八卦則兌震艮巽皆非其偶矣伏羲卦序與今卦序不同不知是孔子創爲之而作序卦耶抑自文王周公繋辭之後巳更伏羲之序如此而孔子特以序卦明其義耶伏羲自是伏羲卦序文王周公自是文王周公卦序答周南仲南徃歲湖寺雖嘗獲一靣而病冗不能欵扣餘論後乃得見廷對之文切中時病深以歎服益恨相去之逺不得㑹聚以講所聞也茲辱惠書又見季通具道遊從切磋之益深以爲慰比日雪寒徳履佳福熹頑鈍之學晚方自信每病當世道術分裂上者入於佛老下者流於管啇學者旣各以其所近便先入者爲主而又驅之以其好髙欲速之心是以前者旣以自誤而遂以自欺後者旣爲所欺而復以欺人文字愈工辨說愈巧而其爲害愈甚不有明者孰能舎其舊而新是謀哉來喻許以所疑下詢幸甚大抵聖賢之言巳是明白真實說盡道理讀者但能虚心一意循序致詳使其句内無一字之不通則其道理無一毫之不察矣切不可爲人大言相誑如九方皐相馬之說者而妄意馳逐於言語之外也方賔王每書來說得道理儘有歸著知與逰從可謂得友恐今巳歸嘉禾也周叔謹行草草附此不能究所言政逺切祈珍重答周南仲承喻教學相長之意尤副所望但爲學之序必先成巳然後可以成物反復來示似於自巳分上未免猶有所闕恐不若且更向裏用工也此心此理元無間斷虧欠聖賢遺訓具在方冊若果有意何用遲疑等待何用凖擬安排只從今日爲始随處提撕随處收拾随時體究随事討論但使一日之間整頓得三五次理會得三五事則日積月累自然純熟自然光明矣若只如此立得箇題目頓在靣前又却低徊前郤不肯果決向前真實下手則悠悠歳月豈肯待人恐不免但爲自欺自誣之流而終無得力可恃之地也何程二君能招致之甚善甚善來書巳報之矣何兄書中問及三事雖未要切然巳是能著實講究若更精進未可量也後來之秀未見有能勇徃直前探討負荷以續傳道之脉茲爲可歎耳答周南仲誠其意者自脩之首也母者禁止之辭自欺云者知爲善以去惡而心之所發有未實也慊快也足也獨者人所不知而巳所獨知之地也言自脩者知爲善以去其惡則當實用其力而禁止其自欺使其悪悪則如悪悪臭好善則如好好色皆務決去而求必得之以自快足於巳不可徒苟且以徇外而爲人也然其實與不實盖有他人所不及知而巳獨知之者故必謹之於此以審其㡬焉答周南仲此言小人隂爲不善而陽欲揜之則是非不知善之當爲與惡之當去但不能實用其力以至此耳然欲揜其惡而卒不可揜欲詐爲善而卒不可詐則亦何益之有哉此君子所以重以爲戒而必謹其獨也答孟良夫猷示喻爲學之意甚善但伊洛埀訓以持敬爲先此要切之語若不於此處立得根本即讀書應事思惟計度徒成紛擾卒無歸宿之地若能於此用力則動静之間無適而不爲學矣有書數冊託茂實送學中與諸生共之能徃一觀當有益也聞當路有奉薦者足見公論之不泯甚慰然更深其本以湏時用乃所望耳答許生中應去歳薛象先過此極道左右賢徳令聞之羙甚恨跧伏無因縁相見今者乃承惠書一通反復讀之益見所以求道郷學之意深以爲幸至於稱引前輩比擬非倫則有所不敢當也左右以應舉覔官羙名好事之學爲不足學而欲講乎義理以求脩巳治人之方固巳不繆於所趨矣夫道之體用盈於天地之間古先聖人旣深得之而慮後世之不能以逹此於是立言垂教自本至末所以提撕誨飾於後人者無所不備學者正當熟讀其書精求其義考之吾心以求其實參之事物以驗其歸則日用之間諷誦思存應務接物無一事之不切於巳矣來喻乃謂讀書逐於文義玩索堕於意見而非所以爲切巳之實則愚有所不知其說也世衰道㣲異論蠭起近年以來乃有假佛釋之似以亂孔孟之實者其法首以讀書窮理爲大禁常欲學者注其心於茫昧不可知之地以僥倖一旦恍然獨見然後爲得盖亦有自謂得之者矣而察其容貌辭氣之間脩巳洽人之際乃與聖賢之學有大不相似者左右於此無乃亦惑其說而未能忘耶夫讀書不求文義玩索都無意見此正近年釋氏所謂㸔話頭者世俗書有所謂大慧語録者其說甚詳試取一觀則其來歴見矣若曰儒釋之妙本自一同則凢彼之所以賊恩害義傷風壊教聖賢之所大不安者彼旣悟道之後乃益信其爲幻妄而處之愈安則亦不待他求而邪正是非巳判然於此矣又如所謂寕有人皆得見之過無或有不睹不聞之欺夫中庸之言正謂道體流行𥘉無間斷是以無所不致其戒懼非謂獨戒懼乎隠㣲而忽畧其顯著也若如來喻則人所共見之處間斷多矣而曰循是存養不疾不徐吾恐其未免爲好髙欲速之尤者也至如孟子所謂非義襲而取之文義本自分明而今學者未嘗細考但據口耳相承以至施安失所者盖十人而二五也旣勤下問不敢不盡其愚然亦未暇詳究其曲折幸深察之當否俟報也近至富沙見陳守舎人說及建閣藏書事欲以記文見委而未得其詳今收張卿元善蔡兄季通書備見首末偶數日脚氣發作不能飲食而右臂亦痛至不能親執筆憊卧支離口占布此知代期不逺他日病起草得記成當因薛卿轉逹代者或同官中必有能竟其事者但恐文詞鄙俚議論不同未必可用耳答章季思康辱書具悉雅志大抵聖賢之教不過慱文約禮四字慱文則須多求慱取熟講而精擇之乃可以浹洽而通貫約禮則只敬之一字已是多了日用之間只以此兩端立定程課不令間斷則乆之自有進歩處矣答顔伯竒昆仲椅柖聖門設教具有科條持守講習要當各致其功無所偏廢而不使有頃刻之間㫁焉則當有以自得其趣矣答杜叔髙游徃歳辱訪於湖寺且以佳篇爲贈讀之知所志之不凡然恨去國怱怱未得從容罄所懐也兹辱枉書并寄兩論詞意竒偉則所以知足下者益以深矣顧念頃與仁里諸賢屢講此事尚多未契足下必巳聞之若以愚言爲是則固無今日之辨若以爲非則又何以見語爲哉聖逺道晦人心頗僻險詞怪說雜然並起不憚於誣天罔聖詭經破義而務以適其利欲之私自非剛徤明哲之才確然以勝私復理爲巳任者鮮不惑焉率獸食人人將相食其兆巳見於此甚可懼也足下試以愚言思之反諸其身而驗以聖賢之明訓必有以得其本心之正然後可以燭理揆事而無不合母徒苦心勞力爲此附會穿鑿而卒以䧟溺其良心也答杜叔髙示喻克巳之說甚慰所望道理分明本如大路聖賢又如此指示提撕不爲不切今人都不理會却别去千生萬受杜撰百般胡說亂道於自已分上了無分毫利益只可誑嚇他人然亦只誑嚇得不識底人若𬒳識道理人旁邊冷㸔成甚模様此區區所以於前日靣論之際不能不失笑於賢者之言也今承來喻乃知後來思之有得力處此又見賢者資質本自過人但從前本欲誑人却反爲人所誑今日一聞逆耳便能發晤於心不易得也然克巳固學者之急務亦須見得一切道理了了分明方見日用之間一言一動何者是正何者是邪便於此處立定脚根凡是巳私不是天理者便克將去不但輕躁二字也辛文相會想極欵曲今日如此人物豈易可得向使早向裏來有用心處則其事業俊偉光明豈但如今所就而巳耶彼中見聞豈不有小未安者想亦具以告之渠旣不以老拙之言爲嫌亦必不以賢者之言爲忤也答程珙示喻正名之說胡氏所論固有未盡然其大義謹嚴而聖人之妙用變通又自有不可測者不可以私情常識議其方也如以爲疑則食肉不食馬肝未爲不知味姑置此而議其切於吾身者焉可也答王南卿熹方幸閑中得與一二學徒整理舊書而忽蒙恩收用雖實衰老不敢以逺爲辭但恐迂踈議論多與時背一辭不獲比巳再上傳聞諸公亦無相彊之意計必得之矣萬一未遂則又未知所以爲計也示及隊圖雖不知兵然頃讀曹公杜牧孫子見其所論車乗人數諸儒皆所未言唯友人蔡季通每論此事以考周禮軍制皆合今得此書乃知前輩巳嘗用之而有効矣是其可傳無疑也跋尾所論皆精當卒章辨荆公事則恐未然家有荆公與襄敏公手帖數𥿄見當時事若非荆公力主於内則群議動揺决難成功但是後來襄敏見其他政事多出於聚歛掊克之意故不免有異論耳若論熈河之事則二公實同心膂無異說也幸試思之恐須畧轉換過乃可取信其帖今録以上呈荆公政事固多失然此一事却是㸔得破也答王南卿長沙除命深感上恩但老病衰懶昏塞廢忘恐不能堪一道之寄而再辭不獲上語丁寕伏讀皇恐遽欲起拜而鄙意尚有少疑又苦足疾未容拜受遂旦宿留更須旬日可決去就萬一可徃不知老兄能一乗興相過否所欲扣者千條萬端非靣不能究但恐不成行即此㑹又未可知耳所改後語甚佳但恐金人立唃氏後一節恐不足深辨耳彼於我爲外臣而反連夏虜以爲邊患則我之討伐自爲義舉彼於金虜非相吞之國則金人立之以樹黨在彼不失爲逺交近攻之計而外假存亡繼絶之名又足以使之怨我而徳彼亦其狡計之過人也豈足爲義舉哉且唃厮囉旣有罪則當時討其所立之子自不爲過正不必以討其叛孫自解雖或金虜能立厮囉所立之後亦未足以愧我而爲賢也又謂因進陣法而或以咎荆公亦不記是誰說然此事只合論其取之是非而其瑣細皆不足較若果是矣則雖進陣法亦何不可之有耶又云今爲荆公之累恐此句亦未甚穩不知盛意是謂我累彼耶彼累我耶若我累彼則此語可用而非所爲立說之意不然則恐當改之爲安或云今以荆公爲累語意似覺深厚也妄論如此目昬不見字老草勿恠而并詳之幸幸甚甚陣法印本有便求數冊信州有潏水集印本乃長安人李復之文記董氊非唃厮囉之子乃盗厮囉之妻而竊其國不知曽見之否事冗不暇細㸔更考之也答王南卿陣法細㸔尚有誤處如上卷第五板陣法内右邊兩隊各欠馬軍紅點二十五人第四版陣法凡馬軍後並無押隊照隊中卷第一版四十萬人而増之至三十萬其四字當作由字幸更詳考恐更有此等當改正也答汪易直示喻尊名之意極荷不鄙但今朋友必巳有所稱徃時忘記奉扣後便幸批示或巳得先端明本㫖即不必改也疑義數條意皆甚正但首章管仲事程子所推聖人本意恐巳得之盖其不死子紏而從桓公乃是先迷後得如今叛逆而遭赦宥自無可死之理然此事夫子當時不曽明言但今以其言專取其功而畧無譏貶之詞可以推見之耳若果有罪則聖人必有㣲詞以見功過不相掩之意不特如此說矣故疑程子此義講之甚精而鄙意所疑則其曰若當死而不死則後雖有功亦不復取此則未安耳功自功過自過若過可以掩功則功亦得以掩其過矣康節先生論學春秋者當先定五伯之功罪而以五伯爲功之首罪之魁此語最爲切當然非獨論古事爲然也見諸行事則操賞罰之權持黜陟之柄者亦當以是爲心乃能盡用一世之材以濟天下之務而不失其正耳仁之一字以其徳而言則必心無私而事當理乃能當之若其功則惟利澤及人有恩有惠便可稱之𥘉不計其徳之如何也偶來城中人事冗擾且畧爲論此條試更思之餘俟還家奉答别附便也夫子說可與立未可與權程子說春秋大義易見而時措從宜者爲難知此等處更宜致思思而得之則所示數條皆可類推矣然此不可以強通却湏反求諸心向性分上講究存養始當有以自得耳未由靣論臨風馳想切㡬力學自愛答汪易直示喻自訟之篇足見立志爲巳之切尤以爲慰此正大學所謂誠其意者然意不能以自誠故推其次第則欲誠其意者又必以格物致知爲先盖仁義之心人皆有之但人有此身便不能無物欲之蔽故不能以自知若能随事講明令其透徹精粗巨細無不貫通則自然見得義理之恱心猶芻豢之恱口而無待於自欺如其不然而但欲禁制抑遏使之不敢自欺便謂所以誠其意者不過如此則恐徒然爲是迫切而隱㣲之間終不免爲自欺也舊說大學此章盖欲發明此意而近日讀之殊覺未透因畧更定數句今謾録去試深察之以爲何如也近思小本失於契勘致有差誤此執事不敬之罪也後來此間書坊别刋得一本卷尾所增巳附入卷中仍削去重出數字矣偶未有别本旦夕求得續當附去也答彭子夀龜年齋銘之屬豈所敢承况此病餘昏憊將何以發明聖賢之㫖爲日用功夫之助乎然竊聞之大學於此雖若使人戒夫自欺而推其本則必其有以用力於格物致知之地然後理明心一而所發自然莫非真實如其不然則雖𣣔防㣲謹獨無敢自欺而正念方萌私欲随起亦非力之所能制矣竊意髙明於此非有所未察特因來喻僣復言之以爲誠能於此益致其功則亦無待於暬御之箴而學日益進徳日益修矣答彭子夀以日不足一作不足日以垂喻中庸疑義别𥿄甚詳乃知賢者於此方且以講求經㫖究極精㣲以日不足爲事世間利害固未易以入其胷次也修道之教修之者固專出於人事而所脩之道則天地萬物之理莫不具焉是乃天人之合亦何害其爲同耶又論事豫之說張㳺不同盖此章首尾以誠爲本而推其所以誠者乃出於明善故釋其文義且得以誠爲言如大學之序始於格物而其後乃云壹是以脩身爲本亦此類也隱㣲聞見之分當時偶見如此而謾序之若疑未安置之無害此非大義所繋不足深論也智仁勇經文本不曽分若以爲疑亦不足論但諸家所分却未穏當必欲分之則須從今說乃爲盡善若如來喻則仁字不合列於三徳之中而又位於其次盖聖人之言其名理随處輕重所指不同讀者須随其輕重而讀之乃見其意不可一槩死殺排定也鄙見如此不審明者以爲如何如復未安更望報及也答折子明伏蒙鐫喻先正墓文使人三返而勤懇益至熹雖至愚心非木石豈不惻然有動於中亦何忍爲此牢辭固拒以逆盛意實以衰悴心目俱疲不堪思慮檢閱而兩年以來名在罪籍毎讀邸報觀其怒目切齒之態未知將以此身終作如何處置然後快於其心未嘗不惕然汗出浹背沾衣也是以年來絶不敢爲人作一字近所祈懇百拜而辭者巳數家矣若以尊喻之嚴遽弛此禁則四面之責紛然而至從之則召禍不從則取怨反復思之未見其可兼餘年無㡬疾病侵凌神思昏然豈有精力可以給此切告矜亮貸此殘生不勝千萬哀懇之至答劉君房元城之孫先正忠定公有徳有言沒而不朽百世之下聞者興起而熹之外舅聘士劉公嘗得親見而師承之熹少時猶及竊聞其餘論於忠定公之言行志節詳矣是以雖不得及其門墻而想望其聲容猶若相接不止於今世𥿄上所傳而巳也今辱惠書乃知其後人所以繼業承家之意如此而所以見顧者又甚厚非淺陋之所敢承也但來喻頗以未有世其禄者爲憂此則賢者慮之過矣先徳遺風具在方冊有能誦其言行其行不替其志節則所以世其家者孰大於是彼區區之外物何足道哉又承類次遺文巳就篇帙見使爲之序引以傳來世此則又豈晚生妄意所敢㡬及但碩亟遂鋟木傳之其人使熹與有聞於大體之純全則爲幸甚矣答劉君房所喻讀易甚善此書本爲卜筮而作其言皆依象數以斷吉㐫今其法巳不傳諸儒之言象數者例皆穿鑿言義理者又太汗漫故其書爲難讀此本義啓蒙所以作也然本義未能成書而爲人竊出再行模印有誤觀覽啓蒙本欲學者且就大傳所言卦畫耆數推㝷不須過爲浮說而自今觀之如論河圖洛書亦未免有剰語要之此書真是難讀不若詩書論孟之明白而易曉也此是僞學見識不審明者以爲如何答曾無擇所示疑義悉巳報去但覺得多是在外邊㸔未有箇入頭處須更虚心靜慮將聖賢言語從裏靣親切處㸔出來庶幾見得意味不爲空言不然似此泛濫含胡無益於事終乆不得力也答曽無疑三昨承枉書奉報草草方以爲愧忽辱再告益荷眷勤且審比日涼秋起處佳福足以爲慰詩卷寵示尤認不鄙之意三復以還旣歎其精麗警㧞之不可及又重歎其不爲大言險語以投世俗之耳目也然承諭及爲學之意則似所志又有不止於此者此尤區區所樂聞但未知雅意姑欲粗一闖其藩籬而爲彼善於此之計耶抑將勇革舊習而真欲一蹴以至道也如前之說則非區區所敢知如後之說則如來喻之云固非不善然欲自是以求道則恐亦未免爲空言也大率人之爲學當知其何所爲而爲學又知其何所事而可以爲學然後循其次第勉勉而用力焉必使此心之外更無異念而舊習之能否世俗之毁譽身計之通塞自無一毫入於其心然後乃可㡬耳此固未易以毫楮旣而承見語亦將有枉顧之期矣儻得靣論庶竭鄙懐顧此迂闊干觸科禁恐非賢者進取之利更冀審處於未動之前毋使貽後日之悔焉乃所碩也答曽無疑辱書良以爲慰而反復來喻巳得雅志之所存則區區所疑亦不敢隱也盖嘗聞之孟子之言有曰人之所以異於禽獸者㡬希庶民去之君子存之此君子所爲而學也然欲存此則必有以識此之爲何物而後有以存之旣識之則所以存之者又必勉勉孜孜而不少懈焉然後乃可㡬也此君子之所以爲學者而終身勉焉唯恐一毫之不盡而不敢少貳其心者也今足下自謂學無本原心常駁雜豈亦自覺其未嘗用力於此而然耶此其自知亦明矣然又欲因其固有而循習之則亦可以殊塗而同歸則未知足下所謂固有者爲何物又如何而循習之與何者爲殊塗又同歸於何許也又謂雖舊習之未忘而未嘗爲學之累則又未知今之新者爲何學而昔之舊者若何而能不爲之累也凢此所云竊恐非獨熹之愚有所不解意者足下之心亦未必能别其孰爲同異而孰爲是非也足下幸試思之其然乎其不然乎如其果然則碩姑以前者所引孟子之言爲主而慱考古昔聖賢之遺訓以參驗之則夫人之所爲而學與其所以學者不待外求而得之於我向之所謂固有所謂同歸者始爲有以識之而知昔之舊者真不足而果有累乎今日之新矣人之爲學必其有以先識乎此而知取舎之所定然後其功夫利病可得而言如其不然徒爲論說皆是空言無下落處無所𥙷於事也景陽季章於此皆嘗有聞雖未知其後來所進如何然苟善取之亦當有以爲助矣吾人旣不見用於世只有自巳分上一叚功夫若見得門戸分明端緒正當實用得些子氣力乃可以不負降衷秉彛之重此外瑣瑣一知半解正不足爲重輕也不審明者亦有意乎答曽無疑示喻爲學之方固得其要然若只如此便了則論語只須存此兩條其餘皆可以削去矣聖人教人慱學審問謹思明辨而篤行之盖於理之巨細精粗無所不講然後胷次光輝明徹無所不通踐履服行無非真實似不當如此先立界限預設嫌疑以自障礙也答曽無疑承喻令兄䘮期於禮聞訃便合成服當時自是成服太晚固巳失之於前然在今日祥練之禮却當計成服之日至今月日實數爲節但其間忌日却須别設祭奠始盡人情耳謂聖人以喜怒動其志固爲不可若謂都無所動則是聖人心如木石而喜怒之見於外者特爲僞耳豈有是理哉此等處須是存養體驗自做得些工夫當自見之難以淺識懸斷也學習之習與傳習之習非有不同傳即謂所學也大抵慱學審問學之事也謹思明辨而力行之習之事也集注中所載諸先生說甚備可細考之來喻忠恕二說皆近之熹郷來所論正謂如此近復細觀乃有未盡已於論語集注中更定其說矣試詳考之當見曲折所謂竊恐狂騖髙逺者視之云云却不當如此顧慮終身行之自是學者事於聖人何所預哉蓍數之說其義亦精但不知所謂老隂老陽其數則一少隂少陽其數乃三是如何盖四象之變極於六十有四老陽十二老隂四少陽二十少隂二十八乃自然之數不容増减揲者随其所得而言之又何慮其不可觀變耶揲法𥘉爻成則便止有三十二卦二爻成則便止有十六卦三爻成則便止有八卦四爻成則便止有四卦五爻成則便止有二卦亦是自然次序節次可見今所疑者亦何嫌哉揲蓍之法周禮領於太卜之官計其法度必甚詳密今皆不可見矣獨頼大傳有此數句可以略見彷彿而以今推之亦無不可通處學者旣不得見當時舊法則亦且當守此不當妄以私意横起計度也蒿固非蓍然亦猶是其類若以木棊竹筭金錢當之則其去蓍益逺矣又如所言交重之論亦所未曉交者拆之聚故爲老隂重者單之積故爲老陽亦何疑之有乎然此六爻旣成而畫地以記之象耳於揲法𥘉無所預也答曽無疑所論爲學之意甚荷不鄙但若果有所得出言吐氣便自不同纔見如此分踈解說欲以自見其能而唯恐人之不信便是實無所得自明眼人觀之固不待其詞之畢而有以識之矣孝悌忠恕若淺言之則方是人之常行若不由此即日用之間更無立脚處故聖人之教未嘗不以爲先如所謂入則孝出則悌忠恕違道不逺是也若極言之則所謂通于神明光于四海無所不通而曽子所以形容聖人一貫之妙者亦不過如此又非如前者言之可易而及也故大學之道必以格物致知爲先而於天下之理天下之書無不慱學審問謹思明辨以求造其義理之極然後因吾日用之間常行之道省察踐履篤志力行而所謂孝悌之至通于神明忠恕之一以貫之者乃可言耳盖其所謂孝悌忠恕雖只是此一事然須見得天下義理表裏通透則此孝悌忠恕方是活物如其不然便只是箇死底孝悌忠恕雖能持守終身不致失墜亦不免但爲郷曲之常人婦女之檢押而巳何足道哉今且以所舉有子曽子之言觀之似於文義之間全未考究雖近世先覺如程夫子之言所以發明其妙者恐皆未嘗過目而經心而況於其他義理精㣲千差萬别豈能一一㑹其㫖歸也哉故熹竊以爲今日與其自辨以求合枉費言語枉費心力不若一切放下便依此說且將大學論語反復熟讀而因程子之言與其門人數公之說以求聖賢之指意所在句句而講字字而思使無毫髪不通透處則自不須如此妄自拘束強作主張也無疑試更思之恐或可信則一兩月間天氣差暖或能乗興一來靣罄其說庻㡬彼此殫盡免至如此擔閣虚費光隂也晷景製作甚精三衢有王伯照侍郎所定官曆刻漏圖一編亦與此同曆象之學自是一家若欲窮理亦不可以不講然亦須大者先立然後及之則亦不至難曉而無不通矣北宫黝似孟施舎孟子本文無此語不知㝷常如何曉會此句未敢輕論其得失也答曽無疑子約書來必盛稱無疑之爲人但不知中間相聚所與切磨誦說者果爲何事計於緊要親切處亦未必能盡所懐爾日月逝矣歲不我與丈夫有志者豈當爲此悠悠泛泛徘徊猶豫以老其身乎答曽擇之祖道禮即理也但謂之理則疑若未有形迹之可言制而爲禮則有品節文章之可見矣人事如五者固皆可見其大槩之所宜然到禮上方見其威儀法則之詳也節文儀則是曰事宜細考之忠恕二字其本義只是學者衆人之事曽子所言乃借此以形容聖人一貫之妙程子之言又借天地造化之體用以明聖人之事須作三節㸔見得各有下落則一章之指自通貫矣更徐玩之非欲速所能逹也此說未然但􅃮雕語意深密難㝷而曽點之言可以玩索而見其意若見得曽點意則􅃮雕之意亦可得矣且㸔程子說大意兩字是何意二子見得是向甚處如何見得答曽擇之仁者心之徳愛之理也仁者心之徳猶言潤者水之徳燥者火之徳愛之理猶言木之根水之原試以此意思之盡巳之謂忠祖道𥘉以爲盡吾心之所至而無一毫自隱先生以爲語未瑩祖道再思之恐止是竭盡吾心而無一毫不足之義後語轉踈前語只自隱二字不切須知不必自隱然後爲不忠但有不盡處便是病也主一無適之謂敬此等語須力行之方見得真實意味禮者天理之節文人事之儀則更就天人上㸔義者事之宜也更以孟子說義處推之忠恕曽子忠恕二字便是一以貫之底注脚可更以二程先生及上蔡說反復體認仍以集注之說參之便見聖賢之意直是細宻不是泛然儱侗說話以約失之者鮮矣約有收歛近裏著實之意非徒簡而巳止蔡說得好徳不孤此徳不孤與易中說徳不孤不同此但言有徳者聲氣相求自不孤立故必有鄰易中却是說敬義旣立則内外兼備則其徳盛而不孤也􅃮雕開曽點二子是信箇甚底又是如何地信曽點語可更以集注爲主子細體驗仍㸔上蔡之說發明得亦親切三年之䘮而復有期䘮者當服期䘮之服以臨其䘮卒事則反𥘉服或者以爲方服重不當改衣輕服不知如何或者之說非是卒哭百日卒哭乃開元禮以今人葬或不能如期故爲此權制王公以下皆以百日爲斷殊失禮意古者士踰月而葬葬而虞虞而卒哭自有日數何疑之有但今人家諸事不辨自不能及此期耳若過期未葬自不當卒哭未滿一月則又自不當葬也答曾擇之前書所說欲於一字中推㝷曲折不知後來㸔得如何恐亦不必如此但從頭㸔到要緊處更加功夫子細辨别而不緊要處亦不可草草則乆之自然浹洽貫通精粗一致矣季章說致曲處不知如何今亦不記當時所說大抵彼中朋友㸔得文字踈畧不肯依傍先儒成說反覆體驗而便輕以巳意著字下語正使得其大意中間亦不免有空闕處相接不著欲革此弊莫若凢百放低且將先儒所說正文本句反覆􅉼泳庶㡬乆乆自見意味也答曽擇之所論曽點大意則然但謂􅃮雕開有經綸天下之志則未必然正是巳分上極親切處自覺有未盡耳雖其見處不及曾點之開闊得處未至如曽點之從容然其功夫精宻則恐點有所不逮也以此見二人之規模格局大槩不相上下然今日只欲想象聖賢胷襟灑落處却未有益須就自家下學致知力行處做功夫覺得極辛苦不快活便漸見好意思也天下歸仁之說程先生是說實事吕與叔恐不免堕於虚見其得失自可見也季宏之來只是要求跋尾全然不曾講學却須曽理會作文大率彼間士人多是如此郷外走作不曽郷裏思量論其淵源盖有不得不任其責者矣甚可嘆也因其告歸附此爲報熹衰病沈痼腹心之患已成尚思更與朋友講論此事少革流弊以垂永乆賢者無事更能見過相聚旬月是所望也答王才臣來喻縷縷備見雅志然於讀書窮理所得所疑未有以見教者而較短量長非人是已之意實多若果有得於義理之歸恐不應更有此病也明者思之以爲如何苟有取焉則願置此而姑相與實講所疑乃千萬之幸也無疑書來其大指與左右亦相似巳詳報之或因過目併以一言論其得失可也六詠之需非敢忘之實以年來纂次禮家文字頭項頗多衰病之餘精力向盡無暇可及亦覺未是急務故不敢以奉凂爾格齋大字此却好箇題目顧未知所以充之者如何寫字亦非所難適此兩日寒甚衰病拘攣不可轉動向後睛暖當試爲之以奉寄也承有枉顧之意尤荷不鄙若得㑹靣彼此傾倒以判所疑何幸如之未間千萬及時專力使有箇端的用心處庶㡬合并之日有可討論也子直詩甚佳南容之篇尤有餘味巳輙爲題其後因書幸以報也答度周卿正比來爲況如何讀書探道亦頗有新功否耶歲月易得義理難明但於日用之間随時随處提撕此心勿令放逸而於其中随事觀理講求思索沈潜反復庶於聖賢之教漸有黙相契處則自然見得天道性命真不外乎此身而吾之所謂學者舎是無有别用力處矣因書信筆不覺縷縷切勿爲外人道也答李誠之說特承寄示新刻二先生祠記并枉長書一通記文鄙淺而書意勤厚非區區所敢當也然先生之道即伏羲堯舜禹湯文武周公孔孟所傳之道先生之書即所以發明六經孔孟之書𥘉非别有玄妙竒特自爲一家之說而與古之聖賢異軌殊轍也世之君子固未必嘗讀其書而驟讀其書亦未能遽曉是盖不唯不知程氏之學實乃并與古昔聖賢之學而不之知也舉世昏冥恬不覺悟而其聦明辯慱能爲文字語言名有氣槩才力者則其惡之爲尤甚今以門下之才之羙宜巳無愧此數者而其用心獨不然盖不惟立祠伐石以著其尊慕之意而來書之喻又將不鄙迂陋而辱問津焉此其志豈獨賢於今世之士也哉竊感下問之勤故粗論其梗槩如此近所刋定大學章句一通今致几下所欲言者不能外此幸一讀而三思之其必將有以得之而異時所以見於文章事業者愈有光矣僣率皇恐答李誠之昨蒙不鄙俾撰先正文集後序自知不文不足以副厚意顧以先契之重郷徃之深且欲託此以少見尊奬節義别嫌明㣲之意以是不敢力辭而輙草定其說以求啇訂區區之心盖未敢自以爲是也所欲更定尊復明辟四字刋去繁冗著語精切前輩所謂自有穩字正此謂也玩味歎服不能自巳但平賊之功雖由外濟之語乃是區區鄙意分功紀實以息爭論之㣲指朱丞相所記當時之事非不詳明正以欲專其功而反詆吕張爲敗事又其後深詆李趙諸公誣謗巳甚故讀者徃徃心非而鼻笑之并與其可信者而不信之也碩熟思之恐不可改如何答徐崇父僑日用功夫且得如此照管莫令間斷乆之浹洽自有見處亦不須别立標的便計工程也敖惰之說如此引孟子隱几而卧而以爲當然則巳得之矣何必疑其非本有耶不但孟子如孔子取瑟而歌亦是此類但大學之意却是恐人於此一向偏却更不照管今當㸔此重處識取正意受用省察不必向閑慢處枉費思索也子顔時時徃來甚佳才卿得託門舘甚善其人有立作㸔得道理亦子細儘好從容講論也答林叔恭爲學只要致誠耐乆無有不得不須别生計較思前筭後也答潘子善時舉辱書備知學問之志甚善甚幸杜門獨學與周旋師友之間學之難易固不同矣然其用力實在於我非他人所能代也况彼中朋友以書來者巳自數人切切偲偲相觀而善似亦不可謂之全然無助者更在勉力而巳答潘子善便中兩承惠書深以爲慰比日秋凉所履佳勝熹衰病渉秋似有向安之漸但辭職告老皆未報可日深悚惕之懐耳恭父留此甚乆儘得從容因其行草草附此其他恭父必能言之未間唯冀以時自愛眷集一一佳慶諸疑問各䟽其下矣恭父當能道其詳答潘子善問易傳近思録大畜彖曰能止徤大正也傳曰能止乎徤者非大正則安能據大畜天在山中之象則是能止其徤於下也今曰止乎徤者不知是止於徤還是止其徤耶伏乞批誨能止徤言以艮之止止乾之徤也傳意亦是如此但其文勢似倒他亦多此類也習坎八卦中獨坎加習字說者多矣未知義果如何此等不必深求其說習坎卦義傳云一始於中有生之最先者也故爲水夫陽氣之生必始於下復卦之象是也今曰始於中其義如何氣自下而上爲始程說别是一義各有所主不相妨然亦不可相雜咸上六咸其輔頰舌竊意此爻冝有悔吝而不言悔吝何也吉㐫悔吝係乎邪正此但見其不足以感人之意耳未見有失故不得以悔吝言也遯九三畜臣妾吉傳曰係吝之私恩懐小人女子之道也故以畜養臣妾則得其心爲吉也小人女子近之則不孫逺之則怨若專以私恩懐之未必不有悔吝而此爻以爲吉何耶此爻不可大事但可畜臣妾耳御下而有以懐之未爲失正但恐所以懐之者失其正耳晉傳曰晉之盛而無徳, WYG: 德}
