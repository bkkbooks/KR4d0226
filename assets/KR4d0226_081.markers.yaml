  - {type: variant, offset: 318, length: 3572, content: 人毫芒是以擴而充之也塞宇宙善觀此帖者亦足以識其㡬矣帖藏邯鄲賈元放家元放文學議論有餘又通當世之務而砥礪廉隅不爲苟合其亦深有得於斯歟隆興甲申十月九日新安朱熹謹書䟦胡文定公詩手握乾坤殺活機縱横施設在臨時蒲堂兎馬非龍象大用堂堂總不知踏遍江南春寺苔野雲蹤跡去還來如今宴坐孤峯頂無法可傳心自灰祝融峯似在城天萬古江山在目前湏信死心元不死夜來明月又重圓明公從小便超群佳句流傳繼碧雩聞道别來諸念息定將何法退魔軍十年音信㫁鴻鱗夣想雲居頂上人香飯可能長自飽也應分濟百千身右胡文定公答僧五詩公子侍郎所書以授墳僧妙觀而妙觀之所摹刻也儒釋之間蓋有所謂毫釐之差者讀之者能辨之則庶乎知言矣乾道乙酉十一月庚午新安朱熹書䟦張敬夫所書城南書院詩乆聞敬夫城南景物之勝常恨未得往遊其間今讀此詩便覺風篁水月去人不逺然敬夫道學之懿爲世醇儒今乃欲以筆札之工追蹤前作豈其戯耶不然則敬夫之豪放奔逸與西䑓之温厚靚深其得失之筭必有能辨之者朱仲晦父云䟦胡五峯詩幽人偏愛青山好爲是青山青不老山中出雲兩太虚一洗塵埃山更好右衡山胡子詩也𥘉紹興庚辰熹卧病山間親友仕於朝者以書見招熹戯以兩詩代書報之曰先生去上芸香閣時籍溪先生除正字赴館供職閣老新峩豸角冠劉共父自秘書丞除察官留取幽人卧空谷一川風月要人㸔一章甕牖前頭列畫屏晚來相對靜儀刑浮雲一任閑舒卷萬古青山只麽青二章或傳以語胡子子謂其學者張欽夫曰吾未識此人然觀此詩知其庶㡬能有進矣特其言有體而無用故吾爲是詩以箴警之庶其聞之而有發也明年胡子卒又四年熹始見欽夫而後獲聞之恨不及見胡子而卒請其目也因叙其本末而書之于䇿以無忘胡子之意云䟦張魏公爲了賢書佛號世之學士大夫措身利害之塗馳騖而不反是以生死窮逹之際每有愧於山林之士觀丞相魏公所以慨然於賢老者則可見矣嗚呼服儒衣服學聖人之道誠能一以義理存心而無惑於利害之際則其所立當如何哉乾道丁亥冬十有二月九日新安朱熹書䟦方伯謨家藏胡文定公帖兒曹外甥輩比過治宇在寅爲同年宜盡切磋之義在宏宜提耳誨導之在范甥宜勉進其所未聞者而一一以重言題品褒借之豈所望也昔事定夫先生未嘗以言色相假後與民瞻叔夏遊苟有過在安國則二公必靣折之不令貳其過在二公即安國亦正色規之不但巳也數十年來俗習頽靡此風日以替矣安老器識過人當今之望津途軌則當以往哲自期庶㡬此風之復見也邸報十五卷并五月分者并以歸納乾菌承貺示珍感珍感安國再拜去夏所借報中有言吕舜徒章者或見之望更借示自五月以來新報能一一借及幸幸吕公諸子聞自衡陽過江西不知今何在或知信喻及鄊里得近信否所奏前章及第二義不以示他人恐知安國又上朋友之交責善所以盡吾誠取善所以益吾徳非以相爲賜也然各盡其道而無所苟焉則麗澤之益自有不䏻巳者方生士繇出示所藏胡文定公與其外大父尚書吕公手帖讀之使人凛然起敬若嚴師畏友之在其左右前後也嗚呼是數君子者其可謂盡朋友之道而無所苟矣其卓然有以自立於當年而遺風餘烈可傳於世者豈徒然哉三復歎息因敬書其後以致區區尊仰之意云乾道壬辰十二月二十四日新安朱熹書䟦劉平甫家藏胡文定公帖彦脩必巳奉太夫人赴温陵此郡樂國也便於養親同増歡慰臨川密邇鄊邦音問易逹彦冲退然自守深可嘉尚徳門積善乆矣如昆仲出則奮其才力建立事功居者進脩術業養成徳器乃邦國之光凡在鄊鄰亦預榮焉衰老覩此盛事不勝欽歎安國又啓安國再啓湖湘旱饑之後民間窘迫而供饋頻繁江西諒亦爾然教令旣孚吏民信服不晚必有除擢矣寅在桐江幸亦粗遣然歸養之意甚濃謾恐知之憲姪比蒙恩命皆昆仲平日獎提之所及也感佩之意言不能喻安國再啓伯逹孫今巳長成莫湏早晚令隨貢元伯伯習知禮義若一句不讀書恐不便也與族兄書其畧如此屏山劉玶平甫藏胡文定公帖一卷前兩𥿄胡公與乎甫伯父祕閣君蓋公之辭而其子祠部君筆也時祕閣守臨川兄侍郎公守温陵弟屏山先生稱疾不仕胡公之子侍郎守桐江兄子籍溪先生以布衣特起典教鄊郡書辭蓋徧及之後一𥿄胡公與其族兄書實公手筆平甫購得之所稱范甥者即平甫外舅太史公也胡公正大方嚴動有法教讀此者視其所襃可以知勸視其所戒可以知懼平甫能葆藏之其志亦可知矣乾道癸巳三月乙酉新安朱熹觀於劉氏山館之復齋因敬書其後云書屏山先生文集後屏山先生文集二十卷先生嗣子玶所編次巳定可繕冩先生啓手足時玶年甚㓜以故平生遺文多所散逸後十餘年始復訪求以𥙷家書之缺則皆傳冩失真同異參錯而不可讀矣於是反復讎訂又十餘年然後此二十卷者始克成書無大譌謬熹以門墻灑掃之舊幸獲與計論焉竊以爲先生文辭之偉固足以驚一世之耳目然其精微之學静退之風形於文墨有足以發蒙蔽而銷鄙吝之萌者尤覽者所宜盡心也因書其故以告後之君子云乾道癸巳七月庚戌門人朱熹謹書䟦張敬夫爲石子重作傳心閣銘熹旣爲尤溪大夫石子重記其脩學之事又爲作此五銘焉時子重方爲藏書之閣於講堂之東中寘周程三君子像旁列書史之櫃而使問名於熹請以傳心榜之而子重遂并以其銘見屬熹愚不敏不敢專也且惟子重之爲是閣蓋非學校經常之則非得知道而徤於文者不能有所發明也則轉以屬諸廣漢張君敬夫而私記其說如此云䟦古今家祭禮右古今家祭禮熹所纂次凡十有六篇蓋人之生無不本乎祖者故報本反始之心凡有血氣者之所不能無也古之聖王因其所不能無者制爲典禮所以致其精神篤其恩愛有義有數本末詳焉遭秦㓕學禮最先壞由漢以來諸儒繼出稍稍綴緝僅存一二以古今異便風俗不同雖有崇儒重道之君知經好學之士亦不得盡由古禮以復于三代之盛其因時述作隨事討論以爲一國一家之制者固未必皆得先王義起之意然其存于今者亦無㡬矣惜其散脱殘落將遂泯沒于無聞因竊蒐輯叙次合爲一篇以便觀覽庶其可傳於後然皆無雜本可參校往往闕誤不可曉知雖通典唐書慱士官舊藏版本亦不足據則他固可知巳諸家之書如荀氏徐暢孟馮翊周元陽孟詵徐潤孫日周等儀有録而未見者尚多有之有能采集附益并得善本通校而廣傳之庶㡬見聞有所興起相與損益折衷共成禮俗于以上助聖朝敦化導民之意顧不美哉淳熈元年五月戊戌新安朱熹謹識書近思錄後淳熈乙未之夏東萊吕伯恭來自東陽過予寒泉精舎留止旬日相與讀周子程子張子之書歎其廣大閎慱若無津涯而懼夫𥘉學者不知所入也因共掇取其關於大體而切於日用者以爲此編總六百一十二條分十四卷蓋凡學者所以求端用力處巳治人之要與夫辨異端觀聖賢之大畧皆粗見其梗槩以爲窮鄊晚進有志於學而無明師良友以先後之者誠得此而玩心焉亦足以得其門而入矣如此然後求諸四君子之全書沉潜反復優柔厭飫以致其慱而反諸約焉則其宗廟之美百官之富庶乎其有以盡得之若憚煩勞安簡便以爲取足於此而可則非今日所以纂集此書之意也五月五日朱熹謹識䟦通鑑紀事本末古史之體可見者書春秋而巳春秋編年通紀以見事之先後書則毎事别記以具事之首尾意者當時史官旣以編年紀事至於事之大者則又採合而别記之若二典所記上下百有餘年而武成金縢諸篇其所紀載或更數月或歷數年其間豈無異事蓋必巳具於編年之史而今不復見矣故左氏於春秋旣依經以作傳復爲國語二十餘篇國别事殊或越數十年而遂其事盖亦近書體以相錯綜云爾然自漢以來爲史者一用太史公紀傳之法此意固不復講至司馬温公受詔纂述資治通鑑然後千三百六十二年之事編年繋日如指諸掌雖託始於三晉之侯而追本其原起於智伯上系左氏之卒章實相受授偉哉書乎自漢以來未始有也然一事之首尾或散出於數十百年之間不相綴屬讀者病之今建安袁君機仲乃以睱日作爲此書以便學者其部居門目始終離合之間又皆曲有微意於以錯綜温公之書其亦國語之流矣或乃病其於古無𥘉而區别之外無發明者顧第弗深考耳機仲以摹本見寄熹始得而讀之爲之撫卷太息因記其後如此以曉觀者淳熈二年秋七月甲寅新安朱熹書于雲谷之晦菴云書和静先生遺墨後和静尹公先生遺墨一卷皆先生晩歲片𥿄手書聖賢所示治氣養心之要粘之屋壁以自警戒者其家緝而藏之今陽夏趙侯刻寘臨川郡齋摹本見寄熹竊惟念前賢進脩不倦死而後巳其心炯炯猶若可識而趙侯所以摹刻之意又非取其字畫之工以供好事者之傳玩而巳捧讀終篇恍然自失因敢識其後以自詔云淳熈丙申三月丁巳新安朱熹敬書䟦張公予竹溪詩婺源雖巖邑而故多文士竹溪丈人張公予其一也好爲歌詩精麗宏偉至其得意往往亦造於閑澹其大篇短韻又皆各得其體晩歲屏居山田水竹之間專用詩酒自娯以忘其老所與游多一時名勝類皆退讓推伏樂稱道之觀吕待郎諸公所題文編可見矣淳熈丙申予自建安歸故里公予之子珍卿持以見示因得三反咏嘆究觀製作之意信乎其如諸公所稱不誣也然予聞公予天資孝友絶人其篤於兄弟之愛至犯患難取禍辱而不悔有古篤行君子所難能者諸公乃徒盛稱其詩而曾不及此予不能識其說也因竊記編之後以示鄊人使知公予之所以自見於世者不但其詩而巳蓋於名教庶亦深有𥙷云五月旣望邑子朱熹書䟦劉元城言行録元祐諌議大夫元城劉公安世字器之受學於司馬文正公得不妄語之一言拳拳服􅈾終身不失故其進而議於朝者無隱情退而語於家者無愧詞今其存而見於文字若此數書者凛然其與秋霜夏日相髙也熹之外舅劉聘君少嘗見公睢陽間爲熹言其所見聞與是數書略同而時有少異惜當時不能盡記其說且其俯仰抑揚之際公之聲容猶恍若相接焉而今亦不可復得矣嗚呼歲月如流前輩旣不可見而其流風餘韻日逺日忘又巳如此可勝嘆哉記大學後者以明之也游, WYG: 㳺}
