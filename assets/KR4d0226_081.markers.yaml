  - {type: variant, offset: 0, length: 331, content: 晦庵先生朱文公文集卷第八十一䟦䟦朱給事奏劄伏讀給事中朱公奏劄共惟前輩學問醇明故所以告其君者知所先後如此而忠誠懇至溢於文辭筆札之間者又可以見其充養之厚云隆興元年正月旣望新安朱熹謹書後二十八年再得披玩因觀舊題歎前脩之益逺悼吾年之不留復記其後云䟦陳了翁與兄書章氏議却不成農師極惓惓亦不敢就自到官尤覺中饋不可無人而瑞奴等零丁益可憐不免議同年周户曹之妹鍔其家清貧其人年長貧則不驕長則諳事爲瑞奴等之慮尺欲如此書尾又云周氏雖貧然舉家好善故就之男女可無慮予嘗讀陳忠肅公之文觀其述巳之志稱人之善未嘗不推而决諸義利取舎之間於是知公之所以常胷中浩然前定不疚者其所自得蓋有在也孟子曰欲知舜與跖之分無他利與善之間耳又曰生亦我所欲義亦我所欲二者不可得兼舎生而取義也陳公之學蓋得諸此惟其察而精, WYG: ''}
