  - {type: line-break, offset: 26507, content: '', id: KR4d0226_SBCK_051-59a04}
  - {type: indent, offset: 26507, content: 　　, id: KR4d0226_krp_051-bkkind837}
  - {type: variant, offset: 26507, length: 653, content: 孟子曰反身而誠樂莫大焉恐有巳欲立而立人巳欲逹而逹人之意強恕而行求仁莫近恐有能近取譬可謂仁之方也巳之意蓋反求諸身而實有此理如仁義忠孝應事接物之理皆實有之非出於勉強僞爲到此地位則是以巳及物不待推矣未至於此則須強恕以去巳私求得天理之公所謂推巳及物也未知是否此說非是第八書至仁與義則又合氣與形而理具焉然一有亦而巳矣蓋隂陽者陽中之隂陽也柔剛者隂中之隂陽也仁義者隂陽合氣剛柔成質而是理始爲人道之極也然仁爲陽剛義爲隂柔云云所謂動而止其所也一有蓋艮之義止而巳當止而止止也當行而行亦止也此所謂止其所也静而止其所者云云乃能不見其人一有未有顧巳身之利害禍福而能不畏侮於人之彊弱貴賤也故曰動静各止其所云云是又就做工夫上言猶所謂奸聲亂色不留聦明淫樂慝禮不接心術之意此蓋發明所以能止之義故其彖傳有曰背故不獲其身不見其人是以能止也此恐言外之意未必易之本義不知如此㸔得否此書末一本更有一問一荅或問孟子言仁必對義孔子言仁必配智其不同也銖妄意謂孟子之言指偏言一事之仁也孔子之言指專言包四者之仁也然雖偏言各專一事而不仁亦無以爲義雖專言以包四者而不智亦無以爲仁其歸亦一而巳矣然孟子亦有專言之者如仁人心是也孔子亦有偏言之者如愛人是也故羞惡辭遜是非者惻隱之心隨感而應者也是非之分素明則惻隱羞惡辭遜之發始各得其當而不悖也故元亨利貞而不貞亦無以爲元也未知是否此條大槩近似而語意不宻且㸔他見得道理分明觸處通貫處是甚底可也荅黄子耕却無欠闕耳欠一作少别𥿄一作荅黄子耕別𥿄其實無甚異一本無下無甚字李仲水水一作求答萬正淳今將以寡君見晉此下一有君字閩縣儒學教諭王製校, WYG: 吳}
