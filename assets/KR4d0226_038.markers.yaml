  - {type: variant, offset: 0, length: 10978, content: 晦庵先生朱文公文集卷第三十八書問答答袁機仲樞熹數日病中方得紬繹所示圖書卦畫二說𥘉若茫然不知所謂因復以妄作啓蒙考之則見其論之之詳而明者偶未深考是以致此紛紛多說而愈致疑耳夫以河圖洛書爲不足信自歐陽公以來巳有此說然終無奈顧命繋辭論語皆有是言而諸儒所傳二圖之數雖有交互而無乖戾順數逆推縱横曲直皆有明法不可得而破除也至如河圖與易之天一至地十者合而載天地五十有五之數則固易之所自出也洛書與洪範之初一至次九者合而具九疇之數則固洪範之所自出也繋辭雖不言伏羲受河圖以作易然所謂仰觀俯察近取逺取安知河圖非其中之一事耶大抵聖人制作所由初非一端然其法象之規模必有最親切處如鴻荒之世天地之間隂陽之氣雖各有象然初未嘗有數也至扵河圖之出然後五十有五之數竒偶生成粲然可見此其所以深發聖人之獨智又非汎然氣象之所可得而擬也是以仰觀俯察逺求近取至此而後兩儀四象八卦之隂陽竒偶可得而言雖繋辭所論聖人作易之由者非一而不害其得此而後决也來喻又謂熹不當以大衍之數參乎河圖洛書之數此亦有說矣數之爲數雖各主於一義然其參伍錯綜無所不通則有非人之所能爲者其所不合固不容以强合其所必合則縱横反覆如合符契亦非人所能強離也若扵此見得自然契合不假安排底道理方知造化功夫神妙巧宻直是好笑說不得也若論易文則自大衍之數五十至再扐而後掛便接乾之䇿二百一十有六至可與祐神矣爲一節是論大衍之數自天一至地十却連天數五至而行鬼神也爲一節是論河圖五十五之數今其文間斷差錯不相連接舛誤甚明伊川先生巳嘗釐正啓蒙雖依此冩而不曽推論其所以然者故覽者不之察耳至於卦畫之論反復來喻於熹之說亦多未究其底藴且如所論兩儀有曰乾之畫竒坤之畫偶只此乾坤二字便未穩當蓋儀匹也兩儀如今俗語所謂一䨇一對云爾自此再變至生第三畫八卦巳成方有乾坤之名當爲一畫之時方有一竒一偶只可謂之隂陽未得謂之乾坤也來喻又曰以二畫増至四畫爲二竒二偶又於四畫之上各増一竒一偶而爲八畫此亦是於熹圖中所說發生次第有所未明而有此語盖四象第一畫本只是前兩儀圖之一竒一偶縁此一竒一偶之上各生一竒一偶是以分而爲四而初畫之一竒一偶亦隨之而分爲四叚耳非是以二畫増成四畫又以四畫増成八畫也此一節正是前所謂自然契合不假安排之妙孔子而後千載不傳至康節先生始得其說然猶不肯大叚說破盖易之心髓全在此處不敢容易輕說其意非偶然也來喻又曰不知隂陽二物果可分老少而爲四象乎此恐亦考之未熟之過夬老少扵經固無明文然揲蓍之法三變之中掛扐四以竒偶分之然後爻之隂陽可得而辨又扵其中各以老少分之然後爻之變與不變可得而分經所謂用九用六者正謂此也若其無此則終日揲蓍不知合得何卦正使得卦不知當用何爻安得以爲後世之臆說而棄之乎又詳所論直以天地爲兩儀而天生神物以下四者爲四象此尤非是大抵曰儀曰象曰卦皆是指畫而言故曰易有太極而生兩儀四象八卦又曰易有四象而示人以卦爻吉凶若如所論則是先有太極兩儀四象然後聖人以畫八卦而兩儀四象八卦三物各是一種面貌全然相接不著矣此乃易之綱領如法律之有名例不可以豪釐差熹之所見判然甚明更無疑惑不審髙明以爲如何如其未然幸復有以見教也答袁機仲邵子曰太極旣分兩儀立矣此下四節通論伏羲六十四卦圎圖此一節以第一爻而言左一竒爲陽右一偶爲隂所謂兩儀者也今此一竒為左三十二卦之𥘉爻一偶為右三十二卦之𥘉爻乃以累変而分非夲即有此六十四叚也後放此陽上交於隂隂下交於陽而四象生矣此一節以第一爻生第二爻而言也陽下之半上交於隂上之半則生隂中第二爻之一竒一偶而為少陽太隂矣隂上之半下交於陽下之半則生陽中第二爻之一竒一偶而為太陽少隂矣所謂两儀生四象者也太陽一竒今分為左上十六卦之第二爻太隂一偶今分為右下十六卦之第二爻少陽太隂其分放比而𥘉爻之二亦分為四矣陽交於隂隂交於陽而生天之四象剛交於柔柔交扵剛而生地之四象此一節以第二爻生第三爻言也陽謂太陽隂謂太隂剛謂少陽柔謂少隂太陽之下半交於太隂之下半則生太隂中第三爻之一竒一偶而爲艮爲坤矣太隂之上半交於太陽之下半則生太陽中第三爻之一竒一偶而爲乾爲兊矣少陽之上半交於少隂之下半則生少隂中第三爻之一竒一偶而爲離爲震矣少隂之下半交於少陽之上半則生少陽中第三爻之一竒一偶而爲巽爲坎矣此所謂四象生八卦也乾一竒今分爲八卦之第三爻坤一偶今分爲八卦之第三爻餘皆放此而𥘉爻二爻之四今又分而爲八矣乾兊艮坤生於二太故爲天之四象離震巽坎生於二少故爲地之四象八卦相錯而後萬物生焉一卦之上各加八卦以相間錯則六十四卦成矣然第三爻之相交則生第四爻之一竒一偶於是一竒一偶各爲四卦之第四爻而下三爻亦分爲十六矣第四爻又相交則生第五爻之一竒一偶於是一竒一偶各爲二卦之第五爻而下四爻亦分而爲三十二矣第五爻又相交則生第六爻之一竒一偶則一竒一偶各爲一卦之第六爻而下五爻亦分而爲六十四矣盖八卦相乗爲六十四而自三畫以上三加一倍以至六畫則三畫者亦加二倍而卦體横分亦爲六十四矣其数殊塗不約而㑹如合符節不差毫釐正是易之妙處此來教所引邵先生說也今子細辨析奉呈幸詳考之方可見其曲折未遽可䡖議也然此巳是就六十四卦巳成之後言之故其先後多寡有難著語處乍㸔極費分踈猝然曉㑹不得若要見得聖人作易根原直截分明却不如且㸔卷首横圖自始𥘉只有兩畫時漸次㸔起以至生滿六畫之後其先後多寡既有次第而位置分明不費詞說於此㸔得方見六十四卦全是天理自然挨排出來聖人只是見得分明便只依本畫出元不曽用一毫智力添助盖本不煩智力之助亦不容智力得以助於其間也及至卦成之後逆順縦横都成義理千般萬種其妙無窮却在人㸔得如何而各因所見爲說雖若各不相資而實未嘗相悖也盖自𥘉未有畫時說到六畫滿處者邵子所謂先天之斈也卦成之後各因一義推說邵子所謂後天之斈也今來喻所引繋辭說卦三才六位之說即所謂後天者也先天後天旣各自爲一義而後天說中取義又多不同彼此自不相妨不可執一而廢百也若執此說必謂聖人𥘉畫卦時只見一箇三才便更不問事由一連便掃出三畫以擬其象畫成之後子細㸔來見使不得又旋劃擘添出後一半截此則全是私意杜撰𥙷接豈復更有易耶來喻條目尚多然其大節目不過如此今但於此看破則其餘小小未合處自當迎刃而觧矣故今不復悉辨以浼高明伏幸財察答袁機仲來教疑河圖洛書是後人僞作熹竊謂生於今世而讀古人之書所以能别其眞僞者一則以其義理之所當否而知之二則以其左驗之異同而質之未有舎此两塗而能直以臆度懸断之者也熹於世傳河圖洛書之舊所以不敢不信者正以其義理不悖而證驗不差爾來教必以爲僞則未見有以指其義理之繆證驗之差也而直欲以臆度懸㫁之此熹之所以未敢曲從而不得不辨也况今日之論且欲因象數之位置徃來以見天地隂陽之造化吉㐫消長之夲原苟於此未明則固未暇别㝷證㩀今乃全不㝷其義理亦未至明有證㩀而徒然爲此無益之辨是不議扵室而譟於門不味其腴而齩其骨也政使辨得二圖真僞端的不差亦無所用又况未必是乎碩且置此而於熹所推二圖之說少加意焉則雖未必便是眞圖然於象數本原亦當略見意味有歡喜處而圖之眞僞将不辨而自明矣來教疑先天後天之說據邵氏說先天者伏羲所畫之易也後天者文王所演之易也伏羲之易𥘉無文字只有一圖以寓其象數而天地萬物之理隂陽始終之變具焉文王之易即今之周易而孔子所爲作傳者是也孔子旣因文王之易以作傳則其所論固當專以文王之易爲主然不推本伏羲作易畫卦之所由則學者必将誤認文王所演之易便爲伏羲始畫之易只從中半說起不識向上根原矣故十翼之中如八卦成列因而重之太極两儀四象八卦而天地山澤雷風水火之類皆本伏羲畫卦之意而今新書原卦畫一篇亦分两儀伏羲在前文王在後必𣣔知聖人作易之本則當考伏羲之畫若只𣣔知今易書文義則但求之文王之經孔子之傳足矣两者𥘉不相妨而亦不可以相雜來教乃謂專爲邵氏觧釋而於易經無所折哀則恐考之有未詳也來教謂七八九六不可爲四象四象之名所包甚廣大抵須以两畫相重四位成列者爲正而一二三四者其位之次也七八九六者其數之實也其以隂陽剛柔分之者合天地而言也其以隂陽太少分之者專以天道而言也若專以地道言之則剛柔又自有太少矣推而廣之縦横錯綜凡是一物無不各有四者之象不但此數者而巳矣此乃天地之間自然道理未畫之前先有此象此數然後聖人畫卦時依様畫出揲蓍者又隨其所得掛扐過揲之數以合焉非是元無實體而畫卦揲蓍之際旋次安排出來也來喻於此見得未明徒勞辨說竊恐且當先向未畫前識得元有箇太極兩儀四象八卦底骨子方有啇量今未須遽立論也用九用六之文固在卦成之後而用九用六之理乃在卦成之前亦是此理但見得實體分明則自然觸處通透不勞辨說矣至謂七八九六乃揲蓍者所爲而非聖人之法此誤尤不難曉今且說揲蓍之法出於聖人耶出扵後世耶若據大傳則是出扵聖人無疑而當是之時若無七八九六則亦無所取决以見其爻之隂陽動静矣亦何以揲蓍爲哉此事前書辨之巳詳非熹之創見新說更請熟玩當自見之今不復縷縷也來喻又云繋辭本只是四象生八卦今又倍之兩其四象而生八卦之一此數字不可暁然想不足深辨請且於前所謂實體者驗之庶乎其有得也來教疑四爻五爻者無所主名一畫爲儀二畫爲象三畫爲卦則八卦備矣此上若旋次各加隂陽一畫則積至三重再成八卦者八方有六十四卦之名若徑以八卦徧就加乎一卦之上則亦如其位而得名焉方其四畫五畫之時未成外卦故不得而名之耳内卦爲貞外卦爲悔亦是畫卦之時巳有此名至揲蓍求之則九變而得貞又九變而得悔又是後一段事亦如前所論七八九六云爾非謂必揲蓍然後始有貞悔之名也大抵新書所論卦位與繋辭說卦容有異同至論揲蓍則只本繋辭何由别有他說如此等處至爲淺近而今爲說乃如此竊恐考之殊未詳也來教引伊川先生說重卦之由重卦之由不但伊川先生之說如此盖大傳亦云八卦成列因而重之矣但八卦所以成列乃是從太極兩儀四象漸次生出以至扵此畫成之後方見其有三才之象非聖人因見三才遂以巳意思惟而連畫三爻以象之也因而重之亦是因八卦之巳成各就上靣節次生出若旋生逐爻則更加三變方成六十四卦若併生全卦則只用一變便成六十四卦雖有遲速之不同然皆自然漸次生出各有行列次第畫成之後然後見其可盡天下之變不是聖人見下三爻不足以盡天下之變然後别生計較又并畫上三爻以盡之也此等皆是作易妙處方其畫時雖是聖人亦不自知裏靣有許多巧妙竒特直是要人細心體認不可草草立說也以上五條鄙意傾倒無復餘藴矣然此非熹之說乃康節之說非康節之說乃希夷之說非希夷之說乃孔子之說但當日諸儒旣失其傳而方外之流隂相付受以爲丹竈之術至於希夷康節乃反之於易而後其說始得復明扵世然與見今周易次第行列多不同者故聞者創見多不能暁而不之信只據目今見行周易縁文生義穿鑿破碎有不勝其杜撰者此啓蒙之書所爲作也若其習聞易曉人人皆能領略則又何必更著此書以爲屋下之屋牀上之牀哉更願髙明毋以爲熹之說而忽之姑且虚心遜志以求其通曉未可好髙立異而輕索其瑕疪也玩之乆熟浹洽扵心則天地變化之神隂陽消長之妙自將瞭扵心目之間而其可驚可喜可笑可樂必有不自知其所以然而然者矣言之不盡偶得小詩以寄鄙懐曰忽然半夜一聲雷萬戸千門次第開若識無心涵有象許君親見伏羲來說得太郎當了只少箇柱杖卓一下便是一回普說矣狂妄僣率幸勿鄙誚也答袁機仲伏承别紙誨諭諄悉及示新論尤荷不鄙但區區之說前此巳悉陳之而前後累蒙排擯揮斥亦巳不遺餘力矣今復下喻使罄其說顧亦何以異扵前口耶然旣辱開之使言則又不敢嘿嘿然其大者未易遽論姑郎來教一二淺者質之夫謂温厚之氣盛扵東南嚴凝之氣盛於西北者禮家之說也謂陽生於子於卦爲復隂生扵午扵卦爲姤者曆家之說也謂巽位東南乾位西北者說卦之說也此三家者各爲一說而禮家曆家之言猶可相通至於說卦則其卦位自爲一說而與彼二者不相謀矣今來教乃欲合而一之而其間又有一說之中自相乖戾者此熹所以不能無疑也夫謂東南以一隂巳生而爲隂柔之位西北以一陽巳生而爲陽剛之位則是陽之盛於春夏者不得爲陽隂之盛於秋冬者不得爲隂而反以其始生之㣲者爲主也謂一隂生於東南一陽生於西北則是隂不生於正南午位之遇而淫於東陽不生於正北子位之復而旅於西也謂巽以一隂之生而位乎東南則乾者豈一陽之生而位於西北乎况說卦之本文扵巽則但取其㓗齊扵乾則但取其戰而巳而未嘗有一隂一陽始生之說也凢此﨑嶇反復終不可通不若直以陽剛爲仁隂柔爲義之明白而簡易也盖如此則發生爲仁肅殺爲義三家之說皆無所牾肅殺雖似乎剛然實天地収歛退藏之氣自不妨其爲隂柔也來教又論黒白之位尤不可曉然其圖亦非古法但今欲易暁且爲此以寓之耳乾則三位皆白三陽之象也兊則下二白而上一黒下二陽而上一隂也離則上下二白而中一黒上下二陽而中一隂也震則下一白而上二黒下一陽而上二隂也巽之下一黒而上二白坎之上下二黒而中一白艮之下二黒而上一白坤之三黒皆其三爻隂陽之象也蓋乾兊離震之初爻皆白巽坎艮坤之初爻皆黒四卦相間兩儀之象也乾兊巽坎之中爻皆白離震艮坤之中爻皆黒兩卦相間四象之象也乾離巽艮之上爻皆白兊震坎坤之上爻皆黒一卦相間八卦之象也豈有震坎皆黒而如坤巽離皆白而如乾之理乎此恐畫圖之誤不然則明者察之有未審也凡此乃易中至淺至近而易見者契丈猶未之盡而況其體大而義深者又安可容易輕忽而遽加詆誚乎此熹所以不敢索言蓋恐其不足以解左右者之惑而益其過也幸試詳之若熹所言略有可信則願繼此以進不敢吝也又讀來書以爲不可以仁義禮智分四時此亦似太草草矣夫五行五常五方四時之相配其爲理甚明而爲說甚乆非熹獨於今日創爲此論也凡此之類竊恐髙明考之未詳思之未審而卒然立論輕肆詆訶是以前此區區所懐不欲盡吐於老丈之前者尚多此其爲訑訑之聲音顔色大矣若欲實求義理之歸恐當去此而虚以受人庶㡬乎其有得也僣易皇恐熹又禀答袁機仲别幅乾於文王八卦之位在西北於十二卦之位在東南坤於文王八卦之位在西南於十二卦之位在西北故今圖子列文王八卦於内而布十二卦於外以見彼此位置逈然不同雖有善辯者不能合而一之也然十二卦之說可曉而八卦之說難明可曉者當推難明者當闕按圖以觀則可見矣論十二卦則陽始於子而終於巳隂始於午而終於亥論四時之氣則陽始於寅而終於未隂始於申而終於丑此二說者雖若小差而所争不過二位盖子位一陽雖生而未出乎地至寅位㤗卦則三陽之生方出地上而温厚之氣從此始焉巳位乾卦六陽雖極而温厚之氣未終故午位一隂雖生而未害於陽必至未位遯卦而後温厚之氣始盡也其午位隂已生而嚴凝之氣及申方始亥位六隂雖極而嚴凝之氣至丑方盡義亦放此盖地中之氣難見而地上之氣易識故周人以建子爲正雖得天綂而孔子之論爲邦乃以夏時爲正盖取其隂陽始終之著明也按圖以推其說可見來喻謂坤之上六陽氣巳生其位在亥乾之上九隂氣巳生其位在巳以剥上九碩果不食十月爲陽月之義推之則剥卦上九之陽方盡而變爲純坤之時坤卦下爻巳有陽氣生於其中矣但一日之内一畫之中方長得三十分之一必積之一月然後始滿一畫而爲復方是一陽之生耳夬之一隂爲乾爲遇義亦同此來俞雖有是說而未詳宻故爲推之如此盖論其始生之㣲固巳可名於隂陽然便以此爲隂陽之限則其方盛者未替而所占不啻卦内六分之五方生者甚㣲而所占未及卦内六分之一所以未可截自此處而分隂陽也此乃十二卦中之一義與復遇之說理本不殊但數變之後方說得到此不可攙先輥說亂了正意耳來諭又謂冬春爲陽夏秋爲隂以文王八卦論之則自西北之乾以至東方之震皆父與三男之位也自東南之巽以至西方之兊皆母與三女之位也故坤蹇解卦之彖辭皆以東北爲陽方西南爲隂方然則謂冬春爲陽夏秋爲隂亦是一說但說卦又以乾爲西北則隂有不盡乎西以巽爲東南則陽有不盡乎東又與三卦彖辭小不同此亦以來書之說惟之而說卦之文適與彖辭相爲表裏亦可以見此圖之出於文王也但此自是一說與他說如十二卦之類各不相通爾來喻以東南之温厚爲仁西北之嚴凝爲義此鄕飲酒義之言也然本其言雖分仁義而無隂陽柔剛之别但於其後復有陽氣發於東方之說則固以仁爲屬乎陽而義之當屬乎隂從可推矣來諭乃不察此而必𣣔以仁爲柔以義爲剛此既失之而又病夫柔之不可屬乎陽剛之不可屬乎隂也於是彊以温厚爲柔嚴凝爲剛又移北之隂以就南而使主乎仁之柔移南之陽以就北而使主乎義之剛其於方位氣候悉反易之而其所以爲說者率皆参差乖迕而不可合又使東北之爲陽西南之爲隂亦皆得其半而失其半愚於圖子巳具見其失矣盖嘗論之陽主進而隂主退陽主息而隂主消進而息者其氣彊退而消者其氣弱此隂陽之所以爲柔剛也陽剛温厚居東南主春夏而以作長爲事隂柔嚴凝居西北主秋冬而以歛藏爲事作長爲生歛藏爲殺此剛柔之所以爲仁義也以此觀之則隂陽剛柔仁義之位豈不曉然而彼楊子雲之所謂於仁也柔於義也剛者乃自其用處之末流言之蓋亦所謂陽中之隂隂中之陽固不妨自爲一義但不可以雜乎此而論之爾向日妙湛蓋嘗靣禀易中卦位義理層數甚多自有次第逐層各是一箇體靣不可牽彊合爲一說學者湏是旋次理㑹理㑹上層之時未要攪動下層直待理㑹得上層都透徹了又却輕輕掲起下層理㑹將去當時雖似遲鈍不快人意然積累之乆層層都了却自見得許多條理千差萬别各有歸著豈不快哉若不問淺深不分前後輥成一塊合成一說則彼此相妨令人分踈不下徒自紛紛成鹵芥矣此是平生讀書巳試之效不但讀易爲然也前書所論仁義禮智分屬五行四時此是先儒舊說未可輕詆今者來書雖不及之然此大義也或恐前書有所未盡不可不究其說盖天地之間一氣而巳分隂分陽便是两物故陽為仁而隂為義然隂陽又各分而為二故陽之𥘉爲木爲春爲仁陽之盛爲火爲夏爲禮隂之𥘉爲金爲秋爲義隂之極爲水爲冬爲智盖仁之惻隱方自中出而禮之恭敬則巳盡發於外義之羞悪方自外入而智之是非則巳全伏於中故其象類如此非是假合附㑹若能黙㑹於心便自可見元亨利貞其理亦然文言取類尤爲明白非區區今日之臆說也五行之中四者既各有所属而土居中宫爲四行之地四時之主在人則爲信為真實之義而爲四德之地衆善之主也五聲五色五臭五味五藏五䖝其分放此盖天人一物内外一理流通貫徹𥘉無間隔若不見得則雖生於天地間而不知所以爲天地之理雖有人之形貌而亦不知所以爲人之理矣故此一義切於吾身比前数叚尤爲要緊非但小小節目而巳也答袁機仲埀諭易說又見講學不倦下問不能之盛羙尤竊欽仰已悉鄙意别𥿄具呈矣此但易中卦畫隂陽之分位耳未是吾人切身之事萬一愚見未合盛意可且置之而更别向裏㝷求恐合自有緊切用功處也答袁機仲再辱垂喻具悉尊㫖然細觀夲末𥘉無所争只因武陵舊圖仁義两字偶失照𬋩致有交互其失甚㣲後來既覺仁字去西北方不得義字去東南方不得即當就此分明改正便無一事顧乃護其所短而𣣔多方作計移換隂陽剛柔四字以盖其失所以競辨紛紜以至于今而不能定也盖始者先以文王八卦爲說而謂一隂生於巽一陽生於乾則既非說卦夲意矣其以二陽純乾之方爲一陽始生之地則又爲乖刺之甚者及既知而又以十二卦爲說而謂一隂生於乾之上九一隂生於坤之上六遂移北方之隂柔以就南使之帶回仁字於西南而不失其爲隂柔移南方之陽剛以帰北使之帶囬義字於東北而不失其陽剛則亦巧矣然其所移動者凡二方而六辰六卦例皆失其舊主又更改却古來隂陽界限盖不勝其煩優而其所𣣔遷就之意乃不過僅得其半而失其半盖北方雖曰嚴凝而東方巳爲温厚南方雖曰温厚而西方巳爲嚴凝也是則非惟不足以救舊圖一時之失而其恥過作非故為穿鑿之咎反有甚於前日者竊恐高明於此急於求勝未及深致思也𣣔䆒其說以開盛意又念空言繳繞難曉易差不免畫成一圖先列定位而後别以舊圖之失及今者两次所論之意隨事貼說有不盡者則又詳言别爲數條以附於後切望虚心平氣細考而徐思之若能於此翻然悔悟先取舊圖分明改正仁義二字却將今所移易隂陽剛柔等字一切發回元來去處如熹新圖之本位則易簡圓成不費詞說而三才五行天理人事巳各得其所矣至於文王八卦則熹嘗以卦畫求之縱横反覆竟不能得其所以安排之意是以畏懼不敢妄爲之說非以爲文王後天之學而忽之也夫文王性與天合乃生知之大聖而後天之學方恨求其說而不得熹雖至愚亦安敢有忽之之心耶但如來書所論則不過是因其巳定之位巳成之說而應和賛歎之爾若使文王之意止於如此則熹固巳識之不待深思而猶病其未得矣故嘗竊謂髙明之於此圖尊之雖至信之雖篤而所以知之則恐有不如熹之深者此又未易以言語道也至如邵氏以此圖爲文王之學雖無所考然說卦以此列於天地定位雷以動之兩節之後而其布置之法逈然不同則邵氏分之以屬於伏羲文王恐亦不爲無理但未暁其根源則姑闕之以俟知者亦無甚害不必卓然肆意立論而輕排之也又謂一竒一偶不能生四象而二竒二偶不能生八卦則此一圖極爲易暁又不知老丈平時作如何㸔而今日猶有此疑也盖其𥘉生之一竒一偶則两儀也一竒之上又生一竒一偶則爲二畫者二而謂之太陽少隂矣一耦之上亦生一竒一耦則亦爲二畫者二而謂之少陽太隂矣此所謂四象者也四象成則两儀亦分爲四太陽竒畫之上又生一竒一偶則爲上爻者三而謂之乾兊矣餘六條凖此此則所謂八卦者也八卦成則两儀四象皆分爲八是皆自然而生瀵湧而岀不假智力不犯手勢而天地之文萬事之理莫不畢具乃不謂之畫前之易謂之何哉僕之前書固巳自謂非是古有此圖只是今目以意爲之冩出竒偶相生次第令人易曉矣其曰畫前之易乃謂未畫之前巳有此理而特假手於聦明神武之人以發其祕非謂畫前巳有此圖畫後方有八卦也此是易中第一義也若不識此而𣣔言易何異舉無綱之網挈無領之裘直是無著力處此可爲知者道也目疾殊甚不能親書切幸深照第四畫者以八卦爲太極而復生之两儀也第五畫者八卦之四象也第六畫者八卦之八卦也再㸔來書有此一項此書未答故復及之熹又禀答袁機仲易說不知尊意看得如何前書所云二方六卦六辰皆失其所與得半失半之說後來思之亦有未盡蓋徙陽於北使陽失其位而奪隂之位徙隂於南使隂失其位而奪陽之位二方固巳病矣東方雖得仍舊爲陽然其温厚之仁不得南與同類相合而使疆附於北方嚴凝之義不則却湏改仁爲義以去隂而就陽方得寧貼然又恐無此理是東方三卦三辰亦失其所也西方雖得仍舊爲隂然其離北附南與夫改義爲仁其勢亦有所不便是西方三卦三辰亦失其所也蓋移此二方而四方八靣十二辰十二卦一時鬼亂無一物得安其性命之情也前書所禀殊未及此之明白詳盡也答袁機仲易說巳悉若只如此則熹固巳深曉不待諄諄之告矣所以致疑正恐髙明之見有所未盡而費力穿鑿使隂陽不得據其方盛之地仁義不得保其一徳之全徒爾紛紜有損無益爾今旣未蒙省察執之愈堅則區區之愚尚復何說竊意兩家之論各自爲家公之不能使我爲公猶我之不能使公爲我也不若自此閉口不談各守其說以俟羲文之出而質正焉然以髙明之見自信之篤竊恐羲文復出亦未肯信其說也魏鄭公之言以爲望獻陵也若昭陵則臣固已見之矣佛者之言曰諸人知處良遂㧾知良遂知處諸人不知正此之謂矣世間事吾人身在閑處言之無益此正好從容講論以慰窮愁而枘鑿之不合又如此是亦深可歎者而信乎其道之窮矣答袁機仲易說垂示極荷不鄙然淺陋之見前已屢陳至煩訶斥乆矣今復何敢有言但詳序說諸篇唯是依經說理而不惑於諸儒臆說之鑿此爲一書要切之㫖今以篇中之說考之則如繋辭說卦解兩引禮記以春作夏長爲仁秋歛冬藏爲義說卦觧又獨引温厚之氣始於東北盛於東南嚴凝之氣始於西南盛於東北以爲仁義之分此於經旣有据又合於理之自然眞可謂不惑於諸儒臆說之鑿矣但其所以爲說則又必以爲聖人恐乾止有陽剛而無仁坤止有隂柔而無義故必兼三才以爲六畫然後能使乾居東北而爲冬春之陽坤居西南而爲夏秋之隂又必横截隂陽各爲兩叚以分仁義之界然後能使春居東而爲乾之仁夏居南而爲坤之仁秋居西而爲坤之義冬居北而爲乾之義此非本書之詞但以鄙意注觧如此庻覧者之易暁耳則其割裂𥙷綴破碎參差未知於經何所据依而何以異於諸儒臆說之鑿也又按文王孔子皆以乾爲西北之卦艮爲東北之卦顧雖未能洞曉其所以然然經有明文不可移易則巳審矣今乃云乾位東北則是貶乾之尊使居艮位未知使艮却居何處此又未知於經何所据依而何以異於諸儒臆說之鑿也又按孔子明言易有太極是生兩儀是則固以太極爲一兩儀爲二而凡有心有目者皆能識之不待推暦布筭而後可知也今太極論乃曰乾坤者易之太極則以是兩儀爲太極而又使之自生兩儀矣未知此於經何所据依而又何以異於諸儒臆說之鑿也至繋辭解又謂太極者一之所由起則是又以爲太極之妙一不足以名之而其序則當且生所起之一而後再變乃生兩儀矣此則又未暇論其於經有無据依是與不是諸儒臆說之鑿而但以前論參之巳有大相矛盾者不審髙明之意果何如也凡此四條熹皆不敢輙以爲非以觸尊怒但所未曉不敢不求教耳答袁機仲誨諭參同邵氏不知易之說辨博髙深非淺陋所能窺測但參同之書本不爲明易乃姑借此納甲之法以寓其行持進退之候異時每欲學之而不得其傳無下手處不敢輕議然其所言納甲之法則今所傳京房占法見於火珠林者是其遺說沈存中筆談解釋甚詳亦自有理參同所云甲乙丙丁庚辛者乃以月之昏旦出没言之非以分六卦之方也此雖非爲明易而設然易中無所不有苟其言自成一說可推而通則亦無害扵易恐不必䡖肆詆排也至於邵氏先天之說則有推本伏羲畫卦次第生生之妙乃是易之宗柤尤不當率爾妄議或未深曉且當置而不論以謹闕疑若必以爲不知易則如熹輩尚何足與言易而每煩提耳之勤也旣荷不鄙不敢不盡其愚其他如六五坤承向亦疑有誤字見扵考異而所示十二卦圗以姤爲子以復爲午亦所未喻所引坎離無爻位亦有脫字此或只是筆誤皆未暇論也答趙提舉善譽慕用之乆徃歳雖辱寵臨而倥偬卒迫不能少欵每以爲恨近乃竊窺所著易論語書又歎其得之之晩而不獲親扣名理也間因虞君轉請所疑初未敢以姓名自通而髙明不鄙逺辱貽書所以傾倒之意甚厚三復以還感慰亡量不敢無以報也蓋道體之大無窮而於其間文理密察有不可以毫釐差者此聖賢之語道所以旣言發育萬物峻極于天以形容其至大而又必曰禮儀三百威儀三千以該悉其至㣲而其指示學者脩徳凝道之功所以既曰致其廣大而又必曰盡其精㣲也近世之言道者則不然其論大抵樂渾全而忌剖析喜高妙而略細㣲其於所謂廣大者則似之而於精㣲有不察則其所謂廣大者亦未易以議其全體之眞也今且以經言論之其所發明固不外乎一理然其所指則不能無異同之别而就其所同之中蓋亦不無賔主親踈逺近之差焉如卦之所以八者以竒偶之三加而成也而爻之所以三則取諸三才之象而非竒偶所能與此理之一而所指之不同者也四象之說本爲畫卦則當以康節之說爲主而七八九六東西南北水火金木之類爲客得其主則客之親踈逺近皆即此而可定不得其主而曰是皆一說則我欲同而彼自異終有不可得而同者矣此所指之同而不能無賔主之分者也是皆樂渾全而忌剖析之過也至於乾坤之純而不雜者聖人所以形容天地之徳而爲六十四卦之綱也乾之純於剛健而不雜又聖人所以形容天理自然之全體而爲坤之綱也所以賛其剛健柔順之全徳以明聖人體道之妙學者入徳之方者亦云備矣未嘗以其偏而少貶之也至於諸爻雖或不免於有戒然乾九三之危以其失中也其得無咎以其徤而徤也坤六五之元吉以其居尊而能下也上六之龍戰以其太盛而亢陽也是豈惡乾之剛而𣣔其柔惡坤之柔而𣣔其剛哉今未察乎其精㣲之藴而遽指其偏以爲當戒意若有所未足於乾坤而陿小之者是不亦喜髙妙而略細㣲之過乎至於用九用六乃爲戒其剛柔之偏者然亦因其隂變爲陽陽變爲隂之象而有此戒如歐陽子之云者非聖人創意立說而強爲之也大抵易之書本爲卜筮而作故其詞必根於象數而非聖人巳意之所爲其所勸戒亦以施諸筮得此卦此爻之人而非反以戒夫卦爻者近世言易者殊不知此所以其說雖有義理而無情意雖大儒先生有所不免比因玩索偶幸及此私竊自慶以爲天啓其衷而以語人人亦未見有深暁者不知髙明以爲如何舊亦草筆其說今謾録二卦上呈其他文義未瑩者多未能卒業姑以俟後世之子雲耳近又嘗編一小書略論象數梗槩并以爲獻妄竊自謂學易而有意於象數之說者於此不可不知外此則不必知也心之精㣲言不能盡臨風引領馳想増劇答趙提舉易學未蒙指教乃有簡易之襃令人踧踖其書草略何足以當此然此二字在易數中眞不可易之妙近世說易者愈多而此理愈晦非見之明孰能以一言盡之哉歎伏亡巳近嘗略修數處㝷别寄呈但圖書錯綜縱横無不脗合終有不可得而盡者信乎天地之文非人之私智所能及也與周益公熹竊以孟夏清和伏惟判府安撫少保大觀文丞相國公鈞候動止萬福熹近嘗拜書并胡先生墓文請教今者至城中乃知未遣巳白史君趣其行諒亦非乆當徹鈞聴也熹有少懇率易拜禀熹先君子少喜學荆公書收其墨蹟爲多其一𥿄乃進鄴侯家傳奏草味其詞㫖玩其筆勢直有跨越古今開闔宇宙之氣然與今版本文集不同疑集中者乃刪潤定本而此𥿄乃其胷懐本趣也嘗欲抄目録李傳本語附其後而并刻之使後之君子得以考焉而未暇也今江西使者汪兄季路乃欲取而刻之臨川妄意欲亦爲, WYG: ''}
