body:
  text: 記卧龍菴記卧龍菴在廬山之陽五乳峯下豫自少讀龜山先生楊公詩見其記卧龍劉君隱居辟穀木食澗飲蓋巳度百歲而神清眼碧客至輒先知之則固巳知有是菴矣去歲蒙恩來此又得陳舜俞令舉廬山記者讀之其言曰凡廬山之所以著於天下蓋有開先之瀑布見於徐凝李白之詩康王之水簾見於陸羽之茶經至於幽深險絶皆有水石之美也此菴之西蒼崖四立怒瀑中㵼大壑淵深凛然可畏有黃石數丈隱映連屬在激浪中視者眩轉若欲蜿蜒飛舞故名卧龍此山水之特勝處也於是又知其泉石之勝乃如此間以行田始得至焉則菴既無有而劉君亦不可復見獨其泉石之勝不可得改然其壯偉竒特之勢則有非陳記所能倣佛者余既惜其出於荒堙廢壞之餘而又幸其深阻敻絶非車塵馬迹之所能到儻可得擅而有也時巳上章乞解郡紱乃捐俸錢十萬屬西原隱者崔君嘉彥因其舊址縳屋數祿以俟命下而徙居焉既又緣名潭之義畫漢丞相諸葛公之象置之堂中而故友張敬夫嘗為賦詩以紀其事然菴距潭猶數百步步亂石間三涉澗水乃至至又無所託足以寓瞻眺或乃顚沛而反因相其東崖鑿石為磴而攀緣以度稍下乃得巨石橫出澗中仰翳喬木俯瞰清流前對飛瀑最為谷中勝處遂復作亭於其上既以為吏民禱賽之地而凡來遊者亦得以倣徨徙倚而縱目快心焉於是歲適大侵因榜之曰起亭以為龍之淵卧者可以起而天行矣然豫前日之請迄今蓋巳屢上而竟未有得也歲月飄忽念之慨然乃敘其作興本末而書之屋壁來者讀之尚有以識豫之意也淳熙庚子冬干有一月丙辰新安朱熹記西原菴記豫少好佳山水異甚而自中年以來即以病衰不克逞其志于四方獨聞廬阜之竒秀甲天下而畸人逸士往往徜佯於其間意常欲一往遊焉而未暇也前年蒙恩試郡適在此山之陽乃間以公家職事得至其中其巖壑幽深水石竒怪固平生所創見而於巖壑水石之間又得成紀崔君焉乃信前所聞者之不誣也君名嘉彥字子虛少慷慨有竒志壯歲避地巴東三峽之間修神農老子術東下吳越以耕戰之䇿干故相趙忠簡公趙公是之會去相不果行君自是絶迹此山按陳令舉所述圖記得西原巷故址于卧龍瀑水之東築室居焉耕田種藥僅足以自給而四方往來之士皆取食焉其疾病老孤無所與歸之人至者亦收養之蓋年逾七十矣而神明筋力不少衰豫往造之而君不豫避也一旦為豫道説平生相與太息會豫結屋卧龍以祠諸葛丞相世蓋少識其意者君獨嘆曰此竒事也相為經紀其事以迄有成兩年之間相見者不知其幾而君未嘗一言及外事豫以是益嘉君之為人而重歎其既老無所復用於世也淳熙辛丑閏月之晦豫既罷郡來宿卧龍君曰卧龍之役夫子既書之矣顧西原獨未有記復能為我書之乎豫曰諾哉於是悉次其説俾刻焉新安朱熹記徽州㜈源縣學三先生祠記淳熙八年春三月㜈源大夫周侯始作周程三先生祠堂於其縣之學而使人以書來謂熹曰子故吾邑之人也蓋嘗有聞於先生之學而既祠之南康矣且濂溪故宅豫章宜春之祠又吾子之所記也其亦為我言之熹惟三先生之道則高矣美矣然此㜈源者非其鄉也非其寓也非其所嘗遊宦之邦也且國之祀典未有秩焉而祀之於禮何依而於義何所當乎則具以告且謝不敢後數月周侯又與邑之處士李君繒及其學官弟子數十人皆以書來曰惟濂溪夫子之學性諸天誠諸巳而合乎前聖授受之統又得河南二程先生以傳之而其流遂及於天下非有爵賞之勸刑辟之威而天下學士靡然鄉之十數年來雖非其鄉非其寓非其遊宦之國又非有秩祀之文而所在學官爭為祠室以致其尊奉之意蓋非敢以是間乎命祀也亦曰肖其道德之容使學者日夕瞻望而興起焉耳且吾邑之人所以得聞三先生之言者子之先君子與有力焉今祠亦既成矣子安得而不為之言乎抑先生之學其始終本末之趣願吾子之悉陳之庶乎其有發也熹發書愀然曰明府之教諸君之言其命熹以記者熹不敢復辭矣乃先生之學則熹之愚懼不足以言之也雖然諸君獨不觀諸濂溪之圗與其書乎雖其簡古淵深未易究測然其大指則不過語諸學者講學致思以窮天地萬物之理而勝其私以復焉其施則善始於家而逹之天下其具則復古禮變今樂政以養民而刑以肅之也是乃所謂伊尹之志顔子之學而程氏傳之以覺斯人者而亦豈有以外乎諸君日用之間哉顧獨未之察耳今幸以賢大夫之力既得以日見先生之貌象而瞻仰之則曷若遂讀其書求其指以反諸身而力行之乎巳而遂書其事與其辭如此以為記以為學者由是而用力焉則庶幾乎三先生之心不墜於地而於吾先子之志賢大夫之意亦可以無負矣諸君其亦勉之哉祠在講堂北壁下濂溪先生南鄉坐明道先生伊川先生東西鄉以侑焉周侯名師清玉山人好學有文而嘗仕於朝矣其為此邦寬以撫民禮以俟士而所以教誨之者又如此非今之為吏者所能及也秋八月癸丑縣人朱熹記瓊州學記昔者聖王作民君師設官分職以長以治而其教民之目則曰父子有親君臣有義夫婦有别長幼有序朋友有信五者而巳蓋民有是身則必有是五者而不能以一日離有是心則必有是五者之理而不可以一日離也是以聖王之教因其固有還以道之使不忘乎其𥘉然又慮其由而不知無以久而不壞也則為之擇其民之秀者羣之以學校而聮之以師儒開之以詩書而成之以禮樂凡所以使之明是理而守之不失傳是教而施之無窮者蓋亦莫非因其固有而發明之而未始有所務於外也夫如是是以其教易明其學易成而其施之之博至於無逺之不暨而無微之不化此先王教化之澤所以為盛而非後世所能及也淳熙九年瓊管帥守長樂韓侯璧既新其州之學而使以圖來請記曰吾州在中國西南萬里炎天漲海之外其民之能為士者既少幸而有之其記誦文詞之習又不能有以先於北方之學者故其功名事業遂無以自白於當世㒒竊悲之今其公堂序室則既修矣然尚懼其未能知所興起也是以願有謁焉吾子其有以振德之熹竊惟國家斆學之意不為不廣斯人蒙化之日不為不深然猶有如侯之所慮者豈前日之所以教者未嘗導之以其身心之所固有而徒強之以其外是以若彼其難與因為之書其所聞於古者以告之使瓊之士知夫所以為學者不外於身心之所固有而用其一日之力焉則其德成行修而無所疑於天下之理將無難者而凡所謂功名事業云者其本巳在是矣若彼記誦文詞之末則本非吾事之所急而又何足為重輕乎嗚呼瓊士勉􅏧天生蒸民有物有則民之秉彛好是懿德是豈有古今之間逺近之殊哉侯於是邦政多可紀巳具刻於池亭之石因不復書而是役之面執功程又非侯所以屬筆之意也亦略不論著云是年歲在玄默攝提格冬十月庚申宣教郎直祕閣朱熹記瓊州知樂亭記瓊管在中州西南萬里鯨波浩漾之外其長吏常以領護﨩中四郡填撫民夷為職委寄甚重然以其險且遠也朝廷往往不暇擇人冒而往者意或私有所利固不復知所謂承流宣化為何等事是以其地今為王土數百年而舊俗未盡革論者因鄙夷之以為是果不足以與中國之聲教其人蓋深恥之而未有以雪也淳熙八年今帥守韓侯始以經略使察廉表行州事而天子許之至則為之正田畝之籍薄鹽米之征教之以耕耨灌溉之法而絀其官吏之無狀者民業既有經矣然後日為陳説禮義廉恥之意以開曉之既又表其從化之民以厲其不率教者出入阡陌勞來不怠行之期年民吏浹和俗以一變化外黎人聞風感慕至有願得供田稅比省民者於是侯亦自喜其政之成而幸其民之不我違也乃取莊生濠上之語作知樂之亭於放生池上北望觀闕於雲天縹眇之間以為歲時瞻佇祝延之地且曰其使邦人士女嘉辰勝日有所詠歌鼓舞以自樂其得𬒳聖化而不愧於王民也間而以書屬豫記之豫惟韓侯之於此邦其勤至矣不但一亭之作為可書也然其為政本末之序則於此亦有可觀者因為書之以告後人使凡居侯之位而遊於是者必以侯之心為心又觀於其政而取法焉則庶乎民生日厚民德日新而王化之純無遠邇矣世豈有終不可教之民哉侯名璧字廷玉長樂人世以清德顯云九年冬十月庚申新安朱熹記漳州龍巖縣學記漳州龍巖縣學年置其後遷徙不常遂以廢壞蓋三十有餘年而丞某君某始復營建迫代去不克就溫陵曽君祕來嗣其職乃因其緒而成之凡為屋若干楹殿堂門廡師生之舍無一不具淳熙九年某月某日既率其諸生以奠菜于先聖先師而以書來求記且曰願有教也豫聞龍巖為縣斗辟介於兩越之間俗故窮陋其為士者雖或負聰明朴茂之姿而莫有開之以聖賢之學是以自其為縣以來今數百年未聞有以道義功烈顯於時者豈其材之不足哉殆為吏者未有以興起之也今二君相繼二令於此乃能深以興學化民為巳任其志既美矣而曽君又嘗從吾友石許諸君遊是必能誦其所聞以先後之者此邑之士其庶幾乎乃為之書其本末而因以告其諸生曰夫所謂聖賢之學者非有難知難能之事也孝弟忠信禮義廉恥以修其身而求師取友頌詩讀書以窮事物之理而巳是二端者豈二三子之所不知不能哉特怵迫於俯仰衣食之資而不暇顧誘奪於場屋雕篆之習而不及為爾夫徇區區目前近小之利而忘其所貴於巳者固巳悖矣况其所徇又未必果可求也二三子循巳事而觀之則曷若慨然反是心以求之而一用其力於吾之所謂者乎使吾孝弟忠信禮義廉恥之行日篤而身無不修也求師取友頌詩讀書之趣日深而理無不得也則自身而家自家而國以逹於天下將無所處而不當固不必求道義功烈之顯於時而根深末茂實大聲閎將有自然不可掩者矣嗚呼是説也曽君蓋亦嘗為二三子言之乎二三子其益以吾言相與勉焉而書所謂斆學半者又曽君所宜深念也其亦由是而勉􅏧哉十年二月甲寅新安朱熹記江西運司養濟院記江南南路轉運司養濟院在隆興府城東崇和門內轉運副使吳郡錢公某之所為而判官嘉禾丘公毗陵尤公袤之所徙也豫章為江西一都會地大物衆而四方賔旅之有事於其土者又不絶於道路平時通功易事足以相生養獨不幸一旦有疾疢則惸然無所歸求藥與食或無得焉則轉死於溝壑者歲不知幾何人而有司者莫之知也乾道九年轉運副使吳興芮公燁始有聞而閔焉去之日留私錢百萬以諉後人稱貸貿易收其贏以市藥物給病者淳熙五年判官開封趙公某復以私錢百四十萬買田東關羅舍病者又得以食七年錢公實來而芮公巳為吏部侍郎是年春趙公亦以吏部侍郎召趙公知公雅意亦有樂乎此也因亟以書來諗公則移書芮公請所留錢益以巳資百三十萬買田長定而又創為此院延慶崇和兩門之外使病者有以居焉自經始至落成若干日而就凡為門五間堂三間挾以便旁中為丈室東庖西圊左右廡各五間廡深三尋修七尋有半中設巨榻十有八冬加障蔽以禦風寒暑則撤之以泄煩鬱疹治有工藥石有劑其不可療者亦豫槥櫝以葬職掌之人皆賦以祿俾供厥事又專屬僚吏以時行視而課督之蓋三公所捐皆四方之聘弊不以入于家者合之為錢三百七十萬所買三墅為田千有一百十一𤱔歲入租為穀九百八十三斛有竒其詳則書之牘藏之有司而院之戒令紏禁亦書而揭之堂上既錢公又列其事以聞詔下施行如章而錢公去矣二公踵至周視錢公之所為者而屢歎之然猶以院在門關之外懼夫病者之有所不便於醫藥也乃相門內得故歸德佛舍之廢址而遷焉凡增屋十有八間并得故僧田六頃又市鍾陵灌城兩墅之田七十𤱔歲收榖三百餘斛錢五萬有竒以充入之蓋自是以來病而無歸者多賴以全活不幸死者亦瞑目而無所憾焉於是臺之羣屬與郡吏之奔走焉者私相與謀因文學掾黃君某述其事來請文以記豫時方罷浙東常平事三復其書而竊有愧焉蓋崇寧之制凡安濟坊漏澤園之政皆領屬常平使者其有曠闕非將漕主計者之憂也今職其事者或不能及而五君子者乃能汲汲乎其職之所不必為至出義錢以輯成之雖其先後來去之不齊而其閔惻之深計慮之逺泯然若出於一人之心而手自為之其制愈修而愈密其惠益增而益厚於以推廣聖朝昭天漏泉之澤於湖山數千百里之外其意既甚美矣而其學道愛人之效又足以警夫職其事而不能然者以興起之其利豈不又甚慱哉因不復辭而為書其本末如此既以著夫五君子之成績而自訟以曉當世又以告後之人使知五君子者相為始終十年之間所以成此者之不易而不敢壞也錢公又嘗奏免贛吉麻租二千四百五十九斛為錢千有一百九十七萬九十有竒兩州之人尤歌舞之今以祕閣修撰知婺州事其救飢之政亦為諸郡最云淳熙十年三月甲戌宣教郎直徽猷閣主管台州崇道觀朱熹記慈教菴記金華清江時鎬及其弟某嘗以書來曰吾先人之葬東萊先生既幸哀而銘之以告于幽矣惟是祠堂之奉既作而未名將無以著先德于外者敢請於子何如豫不及識時君獨觀伯恭父之銘稱其治家嚴整而所以教子孫者甚篤且嘗以書為豫言之伯恭又非輕與人者豫是以知時君之為人乃取晏平仲之言名其所作曰慈教之菴而君之鄊大夫潘公德鄜聞之以為然則為之大書以揭焉鎬等既刻之石而又以請曰名菴而有以發乎先人之志子則有賜於我矣然無詞以著其實其於久逺懼泯沒而不章也願吾子之遂志之將與潘公之書并刻焉以配吾師之言而信吾父於後世子之賜不愈大乎豫不得辭則又書本末如此以遺之嗚呼君之子孫既多且材歲時相與來拜墓下其有以惕然不忘乎父師之訓而益勉乎其逺者大者則斯名之稱其實又豈待豫言之而後傳於逺哉淳熙癸卯四月韶州州學濂溪先生祠記秦漢以來道不明於天下而士不知所以為學言天者遺人而無用語人者不及天而無本專下學者不知上逹而滯於形器必上逹者不務下學而溺於空虛優於治巳者或不足以及人而隨世以就功名者又未必自其本而推之也夫如是是以天理不明而人欲熾道學不傳而異端起人挾其私智以馳騖於一世者不至於老死則不止而終亦莫悟其非也宋興九疑之下舂陵之墟有濂溪先生者作然後天理明而道學之傳復續蓋有以闡夫太極隂陽五行之奧而天下之為中正仁義者得以知其所自來言聖學之有要而下學者知勝私復禮之可以馴致於上逹明天下之有本而言治者知誠心端身之可以舉而措之於天下其所以上接洙泗千歲之統下啓河洛百世之傳者脈絡分明而規摹宏逺矣是以人欲自是有所制而不得肆異端自是有所避而不得騁蓋自孟氏既沒而歷選諸儒受授之次以論其興復開創汛掃平一之功信未有髙焉者也先生熙寧中嘗為廣南東路提點刑獄公事而治於韶洗冤澤物其兆足以行矣而以病去乾道庚寅知州事周侯舜元仰止遺烈慨然永懷始作祠堂於州學講堂之東序而以河南二程先生配焉後十有三年教授廖君德明至視故祠頗巳摧剝而香火之奉亦惰弗供乃謀增廣而作新之明年即其故處為屋三楹像設儼然列坐有序月旦望率諸生拜謁歲春秋釋奠之明日則以三獻之禮禮焉而猶以為未也則又日取三先生之書以授諸生曰熟讀精思而力行之則其進而登此堂也不異乎親炙之矣又明年以書來告曰韶故名郡士多願慤少浮華可與進于善者蓋有張文獻余襄公之遺風焉然前賢既逺而未有先生君子之教以啓迪於其後雖有名世大賢來官其地亦未聞有能摳衣請業而得其學之傳者此周侯之所為惓惓焉者而德明所以奉承於後而不敢怠也今既訖事而德明亦將終更以去矣夫子幸而豫之一言庶幾乎有以卒成周侯之志是亦德明之願而諸生之幸也廖君嘗以其學講于熹者因不獲辭而輒為論著先生唱明道學之功以視韶人使因是而知所以用力之方又記其作興本末如此使來者有考焉淳熙十年癸卯歲五月丁卯新安朱熹記鄂州社稷壇記淳熙十年春朝奉郎知鄂州事新安羅侯願以書來曰吾州羣祀之壇始在中軍寨去年秋通守清江劉君清之至而往謁焉視其地𥚹迫汙下燎瘞無所不稱藩國欽崇命祀之意且念比年郡多水旱札瘥之變意其咎或在是則言於州請得度地更置如律令巳而劉君行州事遂以屬録事參軍周明仲行視得城東黃鶴山下廢營地一區東西十丈南北倍差按政和五禮畫為四壇而屬其役事於兵馬監押趙伯烜作治未半而願適承乏又屬都監王椿董之以速其成焉某月壇成東社西稷居前東風伯雨師雷師居後少郤壇皆三成有壝壝四門前二壇趾皆方二丈五尺崇尺二寸後二壇趾皆方一丈六尺五寸崇八寸其再成方靣皆殺尺崇四分而去一三成方殺如之而崇不復殺前二壝皆方四丈二尺門六尺間丈五尺後三壝皆方二丈八尺門五尺間四丈九尺其崇皆四尺社有主崇二尺五寸方尺剡其上倍其下半石也南五丈為門三間北二丈有竒為齋廬五間繚以重垣甃以堅甓而植以三代之所宜木亦既練時日屬寮吏修祝號以告于神而妥之矣則又與劉君謀以吾子之嘗學於禮也是以願請文以記之俾後人之勿壞也熹按社實山林川澤丘陵墳衍原隰五土之祇而后土勾龍氏其配也稷則專為原隰之祗能生五榖者而后稷周棄氏其配也風師箕也雨師畢也是皆著於周禮領於大宗伯之官唯社稷自天子之都至於國里通得祭而風雨之神則自唐以來諸郡始得祀焉至於雷神則又唐制所與雨師同壇共牲而祀者也國朝禮文大抵多襲唐故故今郡國祀典自先聖先師之外唯是五者蓋以為二氣之良能天地之功用流行於覆載之間以育萬物而民生賴焉者其德惟此為尤盛是以於其壇壝時日之制牲幣器服之品降登饋奠之節莫不參訂討論著之禮象頒下郡國藏於禮官有司歲舉行之而部刺史又當以時循行察其不如法者蓋有國家者所以昭事明神祈以降祥錫福于下其勤如此顧今之為吏者所知不過簿書期會之間否則觴豆舞歌相與放焉而不知反其所敬畏崇飾而神事之者非老子釋氏之祠則妖妄淫昏之鬼而巳其於先王之制國家之典所以治人事神者曷嘗有槩於其心哉嗚呼人心之不正風俗之不厚年榖之不登民生之不遂其不亦以此歟今羅侯之與劉君乃能相與汲汲乎此非其學古愛民之志卓然有見乎流俗見聞之表其孰能之顧雖不文不足以記事實埀久逺然二君子過以為嘗從爼豆之事不逺千里而屬筆焉其得辭之乎因為書之使以刻于麗牲之石後有君子得以覽焉羅侯方與劉君相率勸學劭農甚力劉君又嘗請於前守李侯棫禁境內無得奉大洪山淫祠者其於教民善俗之事力所可為無有不盡其心也十一年春正月甲辰具位新安朱熹記建寧府崇安縣學田記崇安縣故有學而無田遭大夫之賢而有意於教事者乃能縮取他費之贏以供養士之費其或有故而不能繼則諸生無所仰食而往往散去以是殿堂傾圯齋館蕪廢率常更十數年乃一聞弦誦之聲然又不一二歲輒復罷去淳熙七年今知縣事趙侯始至而有志焉既葺其宫廬之廢壞而一新之則又圖所以為飲食久逺之計者而未知所出也一日視境內浮屠之籍其絶不繼者凡五曰中山曰白雲曰鳯林曰聖曆曰暨曆而其田不耕者以𤱔計凡若干乃喟然而嘆曰吾知所以處之矣於是悉取而歸之於學蓋歲入租米二百二十斛而士之肄業焉者得以優遊卒歲而無乏絶之慮既而學之羣士十餘人相與走豫所居之山間請文以記其事曰不則懼夫後之君子莫知其所始而或至於廢壞也豫惟三代盛時自家以逹於天子諸侯之國莫不有學而自天子之元子以至於士庶人之子莫不入焉則其士之廪於學官者宜數十倍於今日而考之禮典未有言其費出之所自者豈當時為士者其家各巳受田而其入學也有時故得以自食其食而不仰給於縣官也歟至漢元成間乃謂孔子布衣養徒三千而增學官弟子至不復限以貟數其後遂以用度不足無以給之而至於罷夫謂三千人者聚而食於孔子之家則巳妄矣然養士之需至以天下之力奉之而不足則亦豈可不謂難哉蓋自周衰田不井授人無常産而為士者尤厄於貧反不得與為農工啇者齒上之人乃欲聚而教之則彼又安能終歲裹飯而學於我是以其費雖多而或取之經常之外勢固有所不得巳也况今浮屠氏之説亂君臣之禮絶父子之親淫誣鄙詐以驅誘一世之人而納之於禽獸之域固先王之法之所必誅而不以聽者也顧乃肆然蔓衍於中國豐屋連甍良疇接畛以安且飽而莫之或禁是雖盡逐其人奪其所據而悉歸之學使吾徒之學為忠孝者得以無營於外而益進其業猶恐未足以勝其邪説况其荒墜蕪絶偶自至此又欲封植而永久之乎趙侯取之可謂務一而兩得矣故特為之記其本末與其指意所出者如此以示後之君子且以警夫學之諸生使益用力乎豫之所謂忠且孝者職其事者又當謹其出內於簿書之外而無籥合之私焉則庶其無負乎趙侯之教矣趙侯名某材甚髙聽訟理財皆辦其課又有餘力以及此諸使者方上其治行於朝云十一年春正月庚戌具位朱熹記衢州江山縣學景行堂記江山縣學故有三賢堂以祀正介先生周君頴贈宣教郎徐君揆逸平先生徐君存而今知縣事金華邵侯浩又益以故諌議大夫毛公注贈朝請郎毛公􅙫且更其扁曰景行之堂而狀其事且為書來告曰願有記也熹考其狀既知五君子之學行氣節真足以風厲當世而興起後來讀其書又歎邵侯所以教其人者之備而待其人者之逺也蓋正介之行信於鄊而聞於朝其立言埀訓褒善貶惡又皆足以為後世法雖其事業不得見於當年然其所立巳不但為一鄊之善士而巳也諌議遭時遇主奮不顧身排擊巨姦奪其政柄當是時天下庶幾望至治焉不幸不究其用而廢絶以死有志之士至今恨之然不特為公恨也至於叔縝罵賊不屈以明官守之義宅卿捐軀虜營以紓君父之急其事尤難其節尤偉而逸平受業程氏之門人得諸心成諸行又能推其説以教人儀刑音旨之傳於今尤未逺也夫以區區百里之間而其先賢之學行氣節可以風厲當世而興起後來者如此可謂盛矣昔人之祠之也其意豈不美哉然得其三而遺其二又限其目而不使後人復有勊慕企及之思也是則識者猶或病之邵侯於此乃能增益而葺新之且易其名以致其俯焉孳孳之意而撤其限以視若有待於來者是不亦教其人之備而待其人之逺乎嗚呼是亦可書也巳抑熹又嘗竊有説焉蓋士有學有德而後其言行有可觀有行有言而後其節義有可貴此士君子立身行道次第始卒之常而不可易者也然人之所稟不同而其所遭亦異故得於身者或無以驗其事成於終者或無以考其𥘉此論世尚友者所以每恨全德之難而欲擇其所從者又不免有多岐之惑也然則登是堂而有志夫五君子之事者又可不知其所務之先後而循序以求之哉邵侯讀大學之書而有感於潔矩之一言其平居論天下事而有所不平未嘗不慨然發憤而抵掌太息也然則其於五君子者固巳非苟知之而亦庶幾得其所以求之之序矣其為此舉夫豈偶然而巳哉因為之識其本末而并記此意以視其學者云淳熙十有二年秋八月乙丑新安朱熹記婺州金華縣社倉記淳熙二年東萊吕伯恭父自婺州來訪余於屏山之下觀於社倉發斂之政喟然嘆曰此周官委積之法隋唐義廪之制也然子之榖取之有司而諸公之賢不易遭也吾將歸而屬諸鄊人士友相與紏合而經營之使閭里有賑恤之儲而公家無􅕛合之費不又愈乎然伯恭父既歸即登朝廷輿病還家又不三年而卒遂不果為其卒之年浙東果大飢豫因得備數推擇奉行荒政按行至婺則婺之人狼狽轉死者巳籍籍矣豫因竊嘆以為向使伯恭父之志得行必無今日之患既而尚書下豫所奏社倉事於諸道募民有欲為者聽之民蓋多慕從者而未幾豫亦罷歸又不果有所為也是時伯恭父之門人潘君叔度感其事而深有意焉且念其家自先大夫時巳務賑恤樂施豫歲捐金帛不勝計矣而獨不及聞於此也於是慨然白其大人出家榖五百斛者為之於金華縣婺女鄊安期里之四十有一都斂散以時規畫詳備一都之人賴之而其積之厚而施之廣蓋未巳也一日以書來曰此吾父師之志母兄之惠而吾子之所建雖豫幸克成之然世俗不能不以為疑也子其可不為我一言以解之乎豫帷有生之類莫非同體惟君子為無有我之私以害之故其愛人利物之心為無窮特窮而在下則禹稷之事有非其分之所得為者然茍其家之有餘而推之以豫鄰里鄊黨則固吾聖人之所許而末有害於不出其位之戒也况叔度之為此特因其墳廬之所在而近及乎十保之間以承先志以恱親心以順師指且前乎此者又巳嘗有天子之命于四方矣而何不可之有哉抑凡世俗之所以病乎此者不過以王氏之青苗為説耳以豫觀於前賢之論而以今日之事驗之則青苗者其立法之本意固未為不善也但其給之也以金而不以榖其處之也以縣而不以鄊其職之也以官吏而不以鄊人士君子其行之也以聚斂亟疾之意而不以慘怛忠利之心是以王氏能以行於一邑而不能以行於天下子程子嘗極論之而卒不免於悔其巳甚而有激也豫既不得辭於叔度之請是以詳著其本末而又附以此意婺人蓋多叔度同門之士必有能觀於叔度所為之善而無疑於青苗之説者焉則庶幾乎其有以廣夫君師之澤而使環地千里永無捐瘠之民矣豈不又甚美哉叔度名景憲與伯恭父同年進士年又長而屈首受學無難色師殁守其説不懈益虔於書無不讀蓋深有志於當世然以資峭直自度不能隨世俯仰故自中年不復求仕而獨於此為拳拳也十二年歲乙巳冬十月庚戌朔建寧府建陽縣長灘社倉記建陽之南里曰招賢者三地接順昌甌寧之境其狹多阻而俗尤徑悍往歲兵亂之餘莨莠不盡去小遇飢饉輒復相挺群起肆暴率不數歲一發雖尋即夷滅無噍類然願民良族晷刻之間巳不勝其驚擾矣紹興某年歲適大侵姦民處處群聚飲慱嘯呼若將以踵前事者里中大怖里之名士魏君元履為言於常平使者袁侯復一得米若干斛以貸於是物情大安姦計自折及秋將斂元履又為請得築倉長灘廄置之旁以便輸者且為後日凶荒之備母數以煩有司自是歲小不登即以告而發之如是數年三里之人始得飽食安居以免於震擾夷滅之禍而公私逺近無不隂受其賜蓋元履少好學有大志自為布衣而其所以及人者巳如此蒙其惠者雖知其然而未必知其所以然也其後元履既沒官吏之職其事者不能勤勞恭恪如元履之為於是粟腐於倉而民飢於室或將發之則上下請賕為費巳不資矣官吏來往又不以時而出內之際隂欺顯奪無弊不有大抵人之所得粃粳居半而償以精鑿計其候伺亡失諸費往往有過倍者是以貸者病焉而良民凛凛於凶歲猶前日也淳熙十一年使者宋侯若水聞其事且知邑人宣教郎周君明仲之賢即以元履之事移書屬之且下本臺所𬒳某年某月某日制書使得奉以從事蓋歲以夏貸而冬斂之且收其息什之二焉行之三年而三里之間人情復安如元履亡恙時什二之收歲以益廣周君既以增葺其棟宇又將稍振其餘以漸及於傍近蓋其惠之所及且將日增月衍而未知其所極也周君以豫嘗有力於此者來請文以為記豫與元履早同師門遊好甚篤既追感其陳迹又嘉周君之能繼其事而終有成也乃不辭而為之説如此則又念昔元履既為是役而豫亦為之於崇安其規模大略放元履獨歲貸收息為小異元履常病豫不當祖荆舒聚斂之餘謀而豫亦每憂元履之粟久儲速腐惠既狹而將不久也講論餘日杯酒從容時以相訾謷而訖不能以相詘聽者從旁抵掌觀笑而亦不能決其孰為是非也及是宋侯周君乃卒用豫所請事以成元履之志而其效果如此於是論者遂以豫言為得然不知元履之言雖疏而其忠厚懇惻之意藹然有三代王政之餘風豈豫一時苟以便事之説所能及哉當時之爭蓋豫之所以為戲而後日之請所以必曰息有年數以免者則猶以不忘吾友之遺教也因并書之以視後人使於元履當日之心有以得之則於宋侯周君今日之法有以守而不壞矣元履名掞之嘗以布衣召見天子恱其對即日除太學録尋以數論事不得久居中既而天子思復召用之則元履既卒矣上為帳然久之詔有司特贈直祕閣云十三年七月辛卯新安朱熹記建寧府建陽縣大闡社倉記招賢里大闡羅漢院之社倉新候官大夫周君某之所為而長灘之别貯也始祕閣魏君之築倉於長灘非擇其地而處之也因其船粟之委於是而藏焉耳故倉之所在極里之東北而距西南之境逺或若干里貸者多不便之而是時率常數歲乃一往來則猶未甚以為苦也淳熙甲辰周君始以常平使者宋公之檄司其發斂之政而以歲貸收息之令從事既為之更定要束搜剔蠧弊而以時頒焉民巳恱於受賜矣周君因益問以因革之宜而有以道里不均之説告者且曰自今以往一歲而往來者再則其勞佚之相絶又非前日比矣周君於是曰之宋公而更為此倉以適逺近之中且令西南境之受粟者即而輸焉來歲遂以遠近分土使各集于其所以待命民既歲得飽食而又無獨逺甚勞之患於是咸德周君而相率來請文以記其成昔豫讀周禮旅師遺人之官觀其頒斂之疏數委積之逺邇所以為之制數者甚詳且密未嘗不嘆古之聖人既竭心思而繼之以不忍人之政其不可及乃如此及今而以是倉之役觀之則彼其詳且密者亦安知其不有待於歷時之久得人之多而後乃至於此耶因為之記其本末以為後之君子或將有考於斯焉周君字居晦好讀書有志當世之務吏事亦精敏絶人不但此為可書也倉凡二間髙若干尺廣若干尺深若干尺始作以某年某月某日越某月某日成用工若干錢若干佐之者里之人某也十三年丙午歲七月甲午新安朱熹記邵武軍學丞相隴西李公祠記建炎丞相隴西李公邵武人也少有大志自為小官即切切然以天下事為巳憂宣和𥘉一日大水猝至幾冒都城人莫能究其所自來相與震懼而無有敢以為言者公時適為左史以為此夷狄兵戎之象也不可以不戒亟上疏言之遂以謫去數歲乃得召還則虜騎巳入塞而長驅向闕矣公復慨然圖上內禪之䇿誠意感通言未及發而大計巳決虜圍既迫群小方謀挾至尊犯不測為幸免計公又獨扣殿陛力陳大義得復城守以退虜兵然自是以來割地講和之議遂起公又再謫而大事去矣光堯太上皇帝受命中興疇咨人望首召公為宰相公亦痛念國家非常之變日夜圖回所以修政事攘夷狄者本末甚備蓋方誅僣逆以正人心而建遣張所撫河北傅亮收河東宗澤守京城遂將益據形便大明紀律以示必守中原必還兩宫之勢而小人有害公者遂三謫以去而不復還矣淳熙丙午距公去相適六十年而永嘉徐君元德命教此邦謂公之忠義籌略海內有志之士莫不誦而傳之顧其鄊人子弟乃無有能道其萬一而興起焉者於是闢講堂之東肖公之象而立祠焉四月吉日合郡吏率諸生進拜跪奠妥侑如法巳事而以書來屬熹記之熹惟天下之義莫大於君臣其所以纏綿固結而不可解者是皆生於人心之本然而非有所待於外也然而世衰俗薄學廢不講則雖其中心之所以固有亦且淪胥陷溺而為全軀保妻子之計以後其君者往往接迹於當世有能奮然拔起於其間如李公之為人知有君父而不知有其身知天下之有安危而不知其身之有禍福雖以讒間竄斥屢瀕九死以其愛君憂國之志終有不可得而奪者是亦可謂一世之偉人矣徐君之祠之也非其志之所好學之所講有在於是則亦孰能及之哉故熹喜聞其事而樂推其説以告郡之學者雖病且衰而不自知其感慨發憤猶復誤有平日之壯心也十二月癸巳宣教郎直徽猷閣主管華州雲臺觀朱熹記衡州石鼓書院記衡州石鼓山據蒸湘之會江流環帶最為一郡佳處故有書院起唐元和間州人李寬之所為至國𥘉時嘗賜勑額其後乃復稍徙而東以為州學則書院之迹於此遂廢而不復修矣淳熙十二年部使者東陽潘侯畤德鄜始因舊址列屋數間榜以故額將以俟四方之士有志於學而不屑於課試之業者居之未竟而去今使者成都宋侯若水子淵又因其故而益廣之别建重屋以奉先聖先師之象且摹國子監及本道諸州印書若干種若干卷而俾郡縣擇遣修士以充入之蓋連帥林侯栗諸使者蘇侯詡管侯鑑衡守薛侯伯宣皆奉金齎割公田以佐其役踰年而後落其成焉於是宋侯以書來曰願記其實以詔後人且有以幸教其學者則所望也豫惟前代庠序之教不修士病無所於學往往相與擇勝地立精舍以為群居講習之所而為政者乃或就而褒表之若此山若嶽麓若白鹿洞之類是也逮至本朝慶曆熙寧之盛學校之官遂遍天下而前日處士之廬無所用則其舊迹之蕪廢亦其勢然也不有好古圖舊之賢孰能謹而存之哉抑今郡縣之學官置博士弟子貟皆未嘗考其德行道藝之素其所受授又皆世俗之書進取之業使人見利而不見義士之有志於為巳者蓋羞言之是以常欲别求燕間清曠之地以共講其所聞而不可得此二公所以慨然發憤於斯役而不敢憚其煩蓋非獨不忍其舊迹之蕪廢而巳也故特為之記其本末以告來者使知二公之志所以然者而毋以今日學校科舉之意亂焉又以風曉在位使知今日學校科舉之教其害將有不可勝言者不可以是為適然而莫之救也若諸生之所以學而非若今人之所謂則昔者吾友張子敬夫所以記夫嶽麓者語之詳矣顧於下學之功有所未究是以誦其言者不知所以從事之方而無以蹈其實然今亦何以他求為哉亦曰養其全於未發之前察其幾於將發之際善則擴而充之惡則克而去之其如此而巳矣又何俟於豫言哉十四年丁未歲夏四月朔新安朱熹記漳州州學東溪先生髙公祠記孟子曰聖人百世之師也伯夷柳下惠是也故聞伯夷之風者頑夫廉懦夫有立志聞柳下惠之風者鄙夫寬薄夫敦奮乎百世之上百世之下聞者莫不興起也夫孟子之於二子其論之詳矣雖或以為聖之清或以為聖之和然又嘗病其隘與不恭且以其道不同於孔子而不願學也及其一旦慨然發為此論乃以百世之師歸之而孔子反不與焉何哉孔子道大德中而無迹故學之者沒身鑽仰而不足二子志潔行髙而迹著故慕之者一日感慨而有餘也然則二子之功誠不為小而孟子之意其亦可知也巳臨漳有東溪先生髙公者名登字彥先靖康間遊太學與陳公少陽伏闕拜疏以誅六賊留种李為請用事者欲兵之不為動也紹興𥘉召至政事堂又與宰相秦檜論不合去為靜江府古縣令有異政帥守希檜意捃其過以屬吏會帥亦以讒死獄中乃得釋𬒳檄試進士潮州使諸生論直言不聞之可畏䇿閩浙水沴之所繇而遂投檄以歸檜聞大怒奪官徙容州公學慱行髙議論慷慨口講指畫終日滚滚無非忠臣孝子之言捨生取義之意聞者凛然魄動神竦其在古縣學者巳爭歸之至是其徒又益盛屬疾自作埋銘召所與遊及諸生訣别正坐拱手奮髯張目而逝嗚呼是亦可謂一世之人豪矣雖其所學所行未盡合於孔子然其志行之卓然亦足以為賢者之清而使百世之下聞其風者有廉頑立懦之操則其有功於世教豈可與夫隱忍回互以濟其私而自託於孔子之中行者同日而語哉公沒之後二十餘年延平田君淡為郡慱士乃始求其遺文刻之方版又肖公像而奉祠之以風厲其學者間因郡人王君遇來求文以為記屬豫病未及為而田君去今太守永嘉林侯元仲至則又與王君更以書來督趣不置豫惟髙公孤髙之節既如彼而諸賢崇立之志又如此則豫文之陋誠不宜久以疾病為解強起書之辭不逮意林侯試為刻之陷置祠壁漳之學子與凡四方之士往來而有事於此者讀之果能有所感慨而興起乎哉淳熙丁未秋九月甲寅新安朱熹記晦庵先生朱文公文集卷之七十九懷安縣儒學訓導葉暢校
