body:
  text: 重刋晦菴先生文集序彌穹壤道也凝之則存乎人人參三才繇斯道爾聖同天賢修而擬之進乎聖矣六經道之輿也群聖精藴在焉而孔子會其全宋大儒續孟氏之絶而朱子會其全自羲農承傳以來廣大精微闡抉無遺蓋濂溪洛關詞猶渾淪朱子則説之詳下學上逹階森牖豁學者能熟復篤行之復性明倫而得所以為人體用該人巳成入賢望聖駸駸不自覺大造萬世功高往哲允矣不然求捷而迷得體而遺用違道逺哉顧朱子之學于時輒禁晦百餘年聖朝表章士所服習一宗之無異學道乃大明日中天矣其釋諸經四書外所著文若詩彚之總百有二十卷亦無一語不出於道而為文且有體風行水上天地至文視汗漫荒忽神施鬼設者懸絶志在覺人故辭繁不殺布帛菽粟有餘溫與味焉蓋其平日居敬窮理反躬踐實內外交養者無斯須間而心與天遊肆其發如此學士大夫不欲為賢聖君子而狃於詞人則取彼置此可也欲為賢聖君子而華實兼者舍是奚讀哉是集舊刻閩臬歲久刓闕且簡帙重大人囏於蓄比張憲副大輪白諸前巡按虞侍御守愚蔣侍御詔重刻之省約版𥿄者什四方鳩工沐梨而胡憲使嶽至躬總校讐之任董學潘憲副潢佐之羅憲副英陸憲副銓薑僉憲儀劉僉憲案咸與有勞信涖亟促其成訖工僉謂信宜序所以刻之意於乎朱子固言之道未嘗亡而人實晦之明之是書廣布將天下入道之塗益光詭道異説不得作雖為文者亦知輪轅徒飾之可愧思傅于道而勿局以藝庶幾國家化成參贊之治不無少輔乃弗固辭嘉靖壬辰九月既望後學饒平蘇信書于閩之行臺晦庵先生朱文公文集目録上第一卷詞賦琴操詩虞帝廟迎送神樂歌詞白鹿洞賦感春賦空同賦招隱操逺遊篇擬古八首題謝少卿藥園二首邵武道中黃子衡欲之上庠以詩留行酬丘子野丘子野郊園五詠古意送劉旬甫晨起對雨二首殘臘客舍聽雨宿武夷觀妙堂二首社日諸人集西岡久雨齋居誦經新竹雨中示魏惇夫兼懷黃子厚二首夜聞子規杜門宿山寺聞蟬作晨登雲際閣池上示同遊者過黃塘嶺宿白芒畬濯足澗水二首自溪口買舟至順昌示同行者宿篔簹鋪倒水坑作夏日二首對雨齋居聞磬聞琴讀道書六首秋雨秋夕懷子厚二首病中呈諸友川上見月歸示同行者月夜述懷冬雨不止贈仰上人即事偶賦擬步虛辭寄題咸清精舍清暉堂冬日二首春日即事誦經春日言懷晚步懷友山館觀海棠二首題畫過武夷作同安官舍夜二首寄山中舊知十首述懷釋奠齋居試院雜詩五首巖桂秋懷喜晴夜賦曉步書事八月十七夜月憶齋中二首秋夕夢山中故人懷子厚南安道中垂澗藤臨流石懸崖水穿林徑九日督役城樓再至晚望苧溪道中十月朔旦懷先隴步虛詞二首民安道中西郊縱步寄黃子衡濯足萬里流孤鶴思太清與諸同寮謁奠北山懷山田二首夜雨二首將理西齋寄題金元鼎靣山亭冬至隂雨安溪道中留安溪安溪書事梅花兩絶句柚花病告齋居作感事有嘆夏日聞蟬秋夜歎茅舍獨飲宿傳舍見月寄諸同寮登羅漢峰登靣山亭雙髻峰涉澗水作試院即事王嘉叟所藏畫二首雜記草木九首觀黃德美兩圖二首祠事齋居聽雨呈劉子晉卷第二詩送王季山赴龍溪宿劇頭鋪夜聞杜宇次韻傅丈題吕少衛藏書閣次旬父韻次祝澤之韻次祝澤之韻送劉子晉歸省送祝澤之還鄉九日山夜泛舟弄月二首教思堂作示諸同志再得古木示諸同志示四弟還家即事小盈道中題囊山寺題九日山石佛院亂峰軒二首題可老所藏徐明叔畫卷二首再至同安示諸生詣水公庵雨作茉利謝人送蘭又秋蘭巳悴以其根歸學古尋蘭花前約秋夕二首秋夜聽雨懷子厚對月思故山夜景步東橋玩月二首𣑽天聽雨兼山閣雨中登閣秋懷二首中元雨中呈子晉秋暑秋李伯玉用東坡韻賦梅花賦梅花有懷元履挽劉寶學二首寄題梅川溪堂和劉抱一再和送芮國器二首梅花開盡不及吟賞二首紅梅臘梅呈黃子厚酬子厚詠雪送藉溪胡丈赴館供職二首寄籍溪胡丈及劉恭父二首挽范直閣二首讀大學誠意章有感仁術聞善決江河仰思二首困學二首復齋偶題示四弟克巳曽點伐木春日春日偶作觀書有感二首題西林院壁二首題西林可師逹觀軒再題示西林可師二首感事書懷十六韻次劉彥采觀雪韻次彥采病片口占韻感事聞報七首次子有聞捷四首宿回向用壁間舊題感事再用舊韻二首再用元韻宋村雪中有懷次判院丈雪意韻酬判院丈喜晴之句登梅嶺雪意再用元韻作兩絶句陪彥集充父遊瑞巖讀趙清獻公瑞巖留題追次元韻讀二劉公瑞巖留題追次元韻二篇入瑞巖道間四絶挽藉溪胡先生三首次韻潮州詩六首濠上齋二首間坐銷寇山丹山居即事柬二姪夏日齋居紀事夀母生朝又二首又二首又一首再和東坡惠州梅花詩歲晚分韻得巳字卓國太夫人生朝又一首社後一日作三月三日祀畢修禊分韻得一字夏日二首泉石爐煙四詩偶題三首次張彥輔韻次張彥輔賞梅韻借韻呈府判張丈家山堂晚照效輞川體二首即事有懷寄彥輔仲宗二兄次知府府判二丈韻三首巢居分韻得將字壁間墨刻亡去輒賦所懷再用韻再賦解嘲題祝生畫二首挽延平李先生三首用西林舊韻二首卷第三詩奉同張敬夫城南二十詠納湖東渚詠歸橋船齊麗澤堂蘭澗書樓山齋蒙軒石瀨卷雲亭柳堤月榭濯清西嶼淙琤谷聽雨舫梅堤采菱舟南阜次韻傳丈武夷道中五絶句題畫卷小山吳畫卵研鬼佛范寬題祝生畫次秀野韻次劉秀野𬞞食十三詩韻乳餅新筍紫菌子薑茭筍南芥菜木耳蘿蔔芋魁筍脯豆腐白菌次秀野間居十五詠秀野積芳圃家山堂拙政堂香界春谷舫齋藥圃山人方丈龜峰樓月波臺挽𬞞園秋香徑曲池軒前村次秀野寄示南