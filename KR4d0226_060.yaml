body:
  text: 書知舊門人問答答朱朋孫長書垂示尤荷不鄙所論為學之意又足以見雅志之所存也夫學非讀書之謂然不讀書又無以知為學之方故讀之者貴專而不貴慱蓋惟專為能知其意而得其用徒慱則反苦於雜亂淺略而無所得也今一旦而讀八書則其茫然而不得其要也豈足怪哉碩且致精一書優柔厭飫以求聖學功夫次第之實俟其心通意解書册之外别有實下功夫處然後更易而少進焉則得尺得寸雖少而皆為吾有矣欲為沙隨程丈立祠甚善但衰病不堪思慮曲折巳報余正父矣幸察之答周純仁彼中既有故舊可以相依氣候亦須差勝嶺外又在鄉里逺亦時得親闈安問於理似亦可少安年來時論似亦漸平昨日又聞廟堂一畨除拜固不足為吾道之重輕然於故舊或略能垂意但在自巳分上只合閉門堅坐聽其所為切不可因此便起妄念徒爾紛紜有損無益也所欲買書偶小兒赴銓未歸巳為託相識置到付之來人數在别𥿄可自檢點付來楮劵殊少不足於用巳為兊數劵買去然尚有不能盡買者及所輔印漢書不知是要何等紙板樣大小如何其人未敢為印有便子細報及當續為印也間中無事固宜謹出然想亦不能一併讀得許多似此專人來往勞費亦是未能省事隨寓而安之病又如多服燥熱藥亦使人血氣偏勝不得和平不但非所以衛生亦非所以養心竊恐更須深自思省收拾身心漸令向裏令寧靜間退之意勝而飛揚躁擾之氣消則治心養氣處世接物自然安穩一時長進無復前日內外之患矣答周純仁神也者妙萬物而為言者也止既成萬物也本義云云某竊謂止言六子用文王八卦之位者以六子之主時成用而言故以四時為序而用文王後天之序下言六子用伏羲八卦之位者推六子之所以主時成用而言故以隂陽交合為義而用伏羲八卦之序蓋隂陽各以其偶合而六子之用行所以能變化盡成萬物也伏羲八卦則兊震以長男而合少女艮巽以長女而合少男皆非其偶然故自動萬物者莫疾乎雷至終萬物始萬物者莫盛乎艮皆别言六子之用故以四時之次言之而用文王八卦之序下則推其所以成用於隂陽各得其偶故用伏羲八卦之序若上用伏羲卦次則四時失其序下用文王八卦則兌震艮巽皆非其偶矣伏羲卦序與今卦序不同不知是孔子創為之而作序卦耶抑自文王周公繫辭之後巳更伏羲之序如此而孔子特以序卦明其義耶伏羲自是伏羲卦序文王周公自是文王周公卦序答周南仲南往歲湖寺雖嘗獲一靣而病冗不能欵扣餘論後乃得見廷對之文切中時病深以歎服益恨相去之逺不得會聚以講所聞也茲辱惠書又見季通具道遊從切磋之益深以為慰比日雪寒德履佳福熹頑鈍之學晚方自信每病當世道術分裂上者入於佛老下者流於管啇學者既各以其所近便先入者為主而又驅之以其好髙欲速之心是以前者既以自誤而遂以自欺後者既為所欺而復以欺人文字愈工辨説愈巧而其為害愈甚不有明者孰能舍其舊而新是謀哉來喻許以所疑下詢幸甚大抵聖賢之言巳是明白真實説盡道理讀者但能虛心一意循序致詳使其句內無一字之不通則其道理無一毫之不察矣切不可為人大言相誑如九方皋相馬之説者而妄意馳逐於言語之外也方賔王每書來説得道理儘有歸著知與逰從可謂得友恐今巳歸嘉禾也周叔謹行草草附此不能究所言政逺切祈珍重答周南仲承喻教學相長之意尤副所望但為學之序必先成巳然後可以成物反復來示似於自巳分上未免猶有所闕恐不若且更向裏用工也此心此理元無間斷虧欠聖賢遺訓具在方册若果有意何用遲疑等待何用凖擬安排只從今日為始隨處提撕隨處收拾隨時體究隨事討論但使一日之間整頓得三五次理會得三五事則日積月纍自然純熟自然光明矣若只如此立得箇題目頓在靣前又却低徊前郤不肯果決向前真實下手則悠悠歲月豈肯待人恐不免但為自欺自誣之流而終無得力可恃之地也何程二君能招致之甚善甚善來書巳報之矣何兄書中問及三事雖未要切然巳是能著實講究若更精進未可量也後來之秀未見有能勇往直前探討負荷以續傳道之脈茲為可歎耳答周南仲誠其意者自修之首也母者禁止之辭自欺云者知為善以去惡而心之所發有未實也慊快也足也獨者人所不知而巳所獨知之地也言自修者知為善以去其惡則當實用其力而禁止其自欺使其惡惡則如惡惡臭好善則如好好色皆務決去而求必得之以自快足於巳不可徒苟且以徇外而為人也然其實與不實蓋有他人所不及知而巳獨知之者故必謹之於此以審其幾焉答周南仲此言小人隂為不善而陽欲掩之則是非不知善之當為與惡之當去但不能實用其力以至此耳然欲掩其惡而卒不可掩欲詐為善而卒不可詐則亦何益之有哉此君子所以重以為戒而必謹其獨也答孟良夫猷示喻為學之意甚善但伊洛埀訓以持敬為先此要切之語若不於此處立得根本即讀書應事思惟計度徒成紛擾卒無歸宿之地若能於此用力則動靜之間無適而不為學矣有書數册託茂實送學中與諸生共之能往一觀當有益也聞當路有奉薦者足見公論之不泯甚慰然更深其本以須時用乃所望耳答許生中應去歲薛象先過此極道左右賢德令聞之美甚恨跧伏無因緣相見今者乃承惠書一通反復讀之益見所以求道鄉學之意深以為幸至於稱引前輩比擬非倫則有所不敢當也左右以應舉覔官美名好事之學為不足學而欲講乎義理以求修巳治人之方固巳不繆於所趨矣夫道之體用盈於天地之間古先聖人既深得之而慮後世之不能以逹此於是立言垂教自本至末所以提撕誨飾於後人者無所不備學者正當熟讀其書精求其義考之吾心以求其實參之事物以驗其歸則日用之間諷誦思存應務接物無一事之不切於巳矣來喻乃謂讀書逐於文義玩索墮於意見而非所以為切巳之實則愚有所不知其説也世衰道微異論蜂起近年以來乃有假佛釋之似以亂孔孟之實者其法首以讀書窮理為大禁常欲學者注其心於茫昧不可知之地以僥幸一旦恍然獨見然後為得蓋亦有自謂得之者矣而察其容貌辭氣之間修巳洽人之際乃與聖賢之學有大不相似者左右於此無乃亦惑其説而未能忘耶夫讀書不求文義玩索都無意見此正近年釋氏所謂看話頭者世俗書有所謂大慧語録者其説甚詳試取一觀則其來歷見矣若曰儒釋之妙本自一同則凡彼之所以賊恩害義傷風壞教聖賢之所大不安者彼既悟道之後乃益信其為幻妄而處之愈安則亦不待他求而邪正是非巳判然於此矣又如所謂寧有人皆得見之過無或有不睹不聞之欺夫中庸之言正謂道體流行𥘉無間斷是以無所不致其戒懼非謂獨戒懼乎隱微而忽略其顯著也若如來喻則人所共見之處間斷多矣而曰循是存養不疾不徐吾恐其未免為好髙欲速之尤者也至如孟子所謂非義襲而取之文義本自分明而今學者未嘗細考但據口耳相承以至施安失所者蓋十人而二五也既勤下問不敢不盡其愚然亦未暇詳究其曲折幸深察之當否俟報也近至富沙見陳守舍人説及建閣藏書事欲以記文見委而未得其詳今收張卿元善蔡兄季通書備見首末偶數日腳氣發作不能飲食而右臂亦痛至不能親執筆憊卧支離口占布此知代期不逺他日病起草得記成當因薛卿轉逹代者或同官中必有能竟其事者但恐文詞鄙俚議論不同未必可用耳答章季思康辱書具悉雅志大抵聖賢之教不過慱文約禮四字慱文則須多求慱取熟講而精擇之乃可以浹洽而通貫約禮則只敬之一字已是多了日用之間只以此兩端立定程課不令間斷則久之自有進步處矣答顔伯竒昆仲椅柖聖門設教具有科條持守講習要當各致其功無所偏廢而不使有頃刻之間斷焉則當有以自得其趣矣答杜叔髙遊往歲辱訪於湖寺且以佳篇為贈讀之知所志之不凡然恨去國匆匆未得從容罄所懷也兹辱枉書并寄兩論詞意竒偉則所以知足下者益以深矣顧念頃與仁里諸賢屢講此事尚多未契足下必巳聞之若以愚言為是則固無今日之辨若以為非則又何以見語為哉聖逺道晦人心頗僻險詞怪説雜然並起不憚於誣天罔聖詭經破義而務以適其利欲之私自非剛健明哲之才確然以勝私復理為巳任者鮮不惑焉率獸食人人將相食其兆巳見於此甚可懼也足下試以愚言思之反諸其身而驗以聖賢之明訓必有以得其本心之正然後可以燭理揆事而無不合母徒苦心勞力為此附會穿鑿而卒以陷溺其良心也答杜叔髙示喻克巳之説甚慰所望道理分明本如大路聖賢又如此指示提撕不為不切今人都不理會却别去千生萬受杜撰百般胡説亂道於自已分上了無分毫利益只可誑嚇他人然亦只誑嚇得不識底人若𬒳識道理人旁邊冷看成甚模樣此區區所以於前日靣論之際不能不失笑於賢者之言也今承來喻乃知後來思之有得力處此又見賢者資質本自過人但從前本欲誑人却反為人所誑今日一聞逆耳便能發晤於心不易得也然克巳固學者之急務亦須見得一切道理了了分明方見日用之間一言一動何者是正何者是邪便於此處立定腳根凡是巳私不是天理者便克將去不但輕躁二字也辛文相會想極欵曲今日如此人物豈易可得向使早向裏來有用心處則其事業俊偉光明豈但如今所就而巳耶彼中見聞豈不有小未安者想亦具以告之渠既不以老拙之言為嫌亦必不以賢者之言為忤也答程珙示喻正名之説胡氏所論固有未盡然其大義謹嚴而聖人之妙用變通又自有不可測者不可以私情常識議其方也如以為疑則食肉不食馬肝未為不知味姑置此而議其切於吾身者焉可也答王南卿熹方幸間中得與一二學徒整理舊書而忽蒙恩收用雖實衰老不敢以逺為辭但恐迂踈議論多與時背一辭不獲比巳再上傳聞諸公亦無相強之意計必得之矣萬一未遂則又未知所以為計也示及隊圖雖不知兵然頃讀曹公杜牧孫子見其所論車乘人數諸儒皆所未言唯友人蔡季通每論此事以考周禮軍制皆合今得此書乃知前輩巳嘗用之而有效矣是其可傳無疑也跋尾所論皆精當卒章辨荆公事則恐未然家有荆公與襄敏公手帖數𥿄見當時事若非荆公力主於內則群議動搖決難成功但是後來襄敏見其他政事多出於聚斂掊克之意故不免有異論耳若論熙河之事則二公實同心膂無異説也幸試思之恐須略轉換過乃可取信其帖今録以上呈荆公政事固多失然此一事却是看得破也答王南卿長沙除命深感上恩但老病衰懶昏塞廢忘恐不能堪一道之寄而再辭不獲上語丁寧伏讀皇恐遽欲起拜而鄙意尚有少疑又苦足疾未容拜受遂旦宿留更須旬日可決去就萬一可往不知老兄能一乘興相過否所欲扣者千條萬端非靣不能究但恐不成行即此會又未可知耳所改後語甚佳但恐金人立唃氏後一節恐不足深辨耳彼於我為外臣而反連夏虜以為邊患則我之討伐自為義舉彼於金虜非相吞之國則金人立之以樹黨在彼不失為逺交近攻之計而外假存亡繼絶之名又足以使之怨我而德彼亦其狡計之過人也豈足為義舉哉且唃厮囉既有罪則當時討其所立之子自不為過正不必以討其叛孫自解雖或金虜能立厮囉所立之後亦未足以愧我而為賢也又謂因進陳法而或以咎荆公亦不記是誰説然此事只合論其取之是非而其瑣細皆不足較若果是矣則雖進陳法亦何不可之有耶又云今為荆公之纍恐此句亦未甚穩不知盛意是謂我纍彼耶彼纍我耶若我纍彼則此語可用而非所為立説之意不然則恐當改之為安或云今以荆公為纍語意似覺深厚也妄論如此目昏不見字老草勿怪而并詳之幸幸甚甚陳法印本有便求數册信州有潏水集印本乃長安人李復之文記董氊非唃厮囉之子乃盜厮囉之妻而竊其國不知曽見之否事冗不暇細看更考之也答王南卿陳法細看尚有誤處如上卷第五板陳法內右邊兩隊各欠馬軍紅點二十五人第四版陳法凡馬軍後並無押隊照隊中卷第一版四十萬人而增之至三十萬其四字當作由字幸更詳考恐更有此等當改正也答汪易直示喻尊名之意極荷不鄙但今朋友必巳有所稱往時忘記奉扣後便幸批示或巳得先端明本旨即不必改也疑義數條意皆甚正但首章管仲事程子所推聖人本意恐巳得之蓋其不死子紏而從桓公乃是先迷後得如今叛逆而遭赦宥自無可死之理然此事夫子當時不曽明言但今以其言專取其功而略無譏貶之詞可以推見之耳若果有罪則聖人必有微詞以見功過不相掩之意不特如此説矣故疑程子此義講之甚精而鄙意所疑則其曰若當死而不死則後雖有功亦不復取此則未安耳功自功過自過若過可以掩功則功亦得以掩其過矣康節先生論學春秋者當先定五伯之功罪而以五伯為功之首罪之魁此語最為切當然非獨論古事為然也見諸行事則操賞罰之權持黜陟之柄者亦當以是為心乃能盡用一世之材以濟天下之務而不失其正耳仁之一字以其德而言則必心無私而事當理乃能當之若其功則惟利澤及人有恩有惠便可稱之𥘉不計其德之如何也偶來城中人事冗擾且略為論此條試更思之餘俟還家奉答别附便也夫子説可與立未可與權程子説春秋大義易見而時措從宜者為難知此等處更宜致思思而得之則所示數條皆可類推矣然此不可以強通却須反求諸心向性分上講究存養始當有以自得耳未由靣論臨風馳想切幾力學自愛答汪易直示喻自訟之篇足見立志為巳之切尤以為慰此正大學所謂誠其意者然意不能以自誠故推其次第則欲誠其意者又必以格物致知為先蓋仁義之心人皆有之但人有此身便不能無物欲之蔽故不能以自知若能隨事講明令其透徹精粗巨細無不貫通則自然見得義理之恱心猶芻豢之恱口而無待於自欺如其不然而但欲禁制抑遏使之不敢自欺便謂所以誠其意者不過如此則恐徒然為是迫切而隱微之間終不免為自欺也舊説大學此章蓋欲發明此意而近日讀之殊覺未透因略更定數句今謾録去試深察之以為何如也近思小本失於契勘致有差誤此執事不敬之罪也後來此間書坊别刋得一本卷尾所增巳附入卷中仍削去重出數字矣偶未有别本旦夕求得續當附去也答彭子夀龜年齋銘之屬豈所敢承况此病餘昏憊將何以發明聖賢之旨為日用功夫之助乎然竊聞之大學於此雖若使人戒夫自欺而推其本則必其有以用力於格物致知之地然後理明心一而所發自然莫非真實如其不然則雖𣣔防微謹獨無敢自欺而正念方萌私欲隨起亦非力之所能制矣竊意髙明於此非有所未察特因來喻僣復言之以為誠能於此益致其功則亦無待於暬御之針而學日益進德日益修矣答彭子夀以日不足一作不足日以垂喻中庸疑義别𥿄甚詳乃知賢者於此方且以講求經旨究極精微以日不足為事世間利害固未易以入其胸次也修道之教修之者固專出於人事而所修之道則天地萬物之理莫不具焉是乃天人之合亦何害其為同耶又論事豫之説張遊不同蓋此章首尾以誠為本而推其所以誠者乃出於明善故釋其文義且得以誠為言如大學之序始於格物而其後乃云一是以修身為本亦此類也隱微聞見之分當時偶見如此而謾序之若疑未安置之無害此非大義所繫不足深論也智仁勇經文本不曽分若以為疑亦不足論但諸家所分却未穩當必欲分之則須從今説乃為盡善若如來喻則仁字不合列於三德之中而又位於其次蓋聖人之言其名理隨處輕重所指不同讀者須隨其輕重而讀之乃見其意不可一槩死殺排定也鄙見如此不審明者以為如何如復未安更望報及也答折子明伏蒙鐫喻先正墓文使人三返而勤懇益至熹雖至愚心非木石豈不惻然有動於中亦何忍為此牢辭固拒以逆盛意實以衰悴心目俱疲不堪思慮檢閲而兩年以來名在罪籍每讀邸報觀其怒目切齒之態未知將以此身終作如何處置然後快於其心未嘗不惕然汗出浹背沾衣也是以年來絶不敢為人作一字近所祈懇百拜而辭者巳數家矣若以尊喻之嚴遽弛此禁則四面之責紛然而至從之則召禍不從則取怨反復思之未見其可兼餘年無幾疾病侵凌神思昏然豈有精力可以給此切告矜亮貸此殘生不勝千萬哀懇之至答劉君房元城之孫先正忠定公有德有言沒而不朽百世之下聞者興起而熹之外舅聘士劉公嘗得親見而師承之熹少時猶及竊聞其餘論於忠定公之言行志節詳矣是以雖不得及其門墻而想望其聲容猶若相接不止於今世𥿄上所傳而巳也今辱惠書乃知其後人所以繼業承家之意如此而所以見顧者又甚厚非淺陋之所敢承也但來喻頗以未有世其祿者為憂此則賢者慮之過矣先德遺風具在方册有能誦其言行其行不替其志節則所以世其家者孰大於是彼區區之外物何足道哉又承類次遺文巳就篇帙見使為之序引以傳來世此則又豈晚生妄意所敢幾及但碩亟遂鋟木傳之其人使熹與有聞於大體之純全則為幸甚矣答劉君房所喻讀易甚善此書本為卜筮而作其言皆依象數以斷吉凶今其法巳不傳諸儒之言象數者例皆穿鑿言義理者又太汗漫故其書為難讀此本義啓蒙所以作也然本義未能成書而為人竊出再行模印有誤觀覽啓蒙本欲學者且就大傳所言卦畫耆數推尋不須過為浮説而自今觀之如論河圖洛書亦未免有剩語要之此書真是難讀不若詩書論孟之明白而易曉也此是偽學見識不審明者以為如何答曾無擇所示疑義悉巳報去但覺得多是在外邊看未有箇入頭處須更虛心靜慮將聖賢言語從裏靣親切處看出來庶幾見得意味不為空言不然似此泛濫含胡無益於事終久不得力也答曽無疑三昨承枉書奉報草草方以為愧忽辱再告益荷眷勤且審比日涼秋起處佳福足以為慰詩卷寵示尤認不鄙之意三復以還既歎其精麗警拔之不可及又重歎其不為大言險語以投世俗之耳目也然承諭及為學之意則似所志又有不止於此者此尤區區所樂聞但未知雅意姑欲粗一闖其藩籬而為彼善於此之計耶抑將勇革舊習而真欲一蹴以至道也如前之説則非區區所敢知如後之説則如來喻之云固非不善然欲自是以求道則恐亦未免為空言也大率人之為學當知其何所為而為學又知其何所事而可以為學然後循其次第勉勉而用力焉必使此心之外更無異念而舊習之能否世俗之毁譽身計之通塞自無一毫入於其心然後乃可幾耳此固未易以毫楮既而承見語亦將有枉顧之期矣儻得靣論庶竭鄙懷顧此迂闊干觸科禁恐非賢者進取之利更冀審處於未動之前毋使貽後日之悔焉乃所碩也答曽無疑辱書良以為慰而反復來喻巳得雅志之所存則區區所疑亦不敢隱也蓋嘗聞之孟子之言有曰人之所以異於禽獸者幾希庶民去之君子存之此君子所為而學也然欲存此則必有以識此之為何物而後有以存之既識之則所以存之者又必勉勉孜孜而不少懈焉然後乃可幾也此君子之所以為學者而終身勉焉唯恐一毫之不盡而不敢少二其心者也今足下自謂學無本原心常駁雜豈亦自覺其未嘗用力於此而然耶此其自知亦明矣然又欲因其固有而循習之則亦可以殊塗而同歸則未知足下所謂固有者為何物又如何而循習之與何者為殊塗又同歸於何許也又謂雖舊習之未忘而未嘗為學之纍則又未知今之新者為何學而昔之舊者若何而能不為之纍也凡此所云竊恐非獨熹之愚有所不解意者足下之心亦未必能别其孰為同異而孰為是非也足下幸試思之其然乎其不然乎如其果然則碩姑以前者所引孟子之言為主而慱考古昔聖賢之遺訓以參驗之則夫人之所為而學與其所以學者不待外求而得之於我向之所謂固有所謂同歸者始為有以識之而知昔之舊者真不足而果有纍乎今日之新矣人之為學必其有以先識乎此而知取舍之所定然後其功夫利病可得而言如其不然徒為論説皆是空言無下落處無所輔於事也景陽季章於此皆嘗有聞雖未知其後來所進如何然苟善取之亦當有以為助矣吾人既不見用於世只有自巳分上一假功夫若見得門戶分明端緒正當實用得些子氣力乃可以不負降衷秉彛之重此外瑣瑣一知半解正不足為重輕也不審明者亦有意乎答曽無疑示喻為學之方固得其要然若只如此便了則論語只須存此兩條其餘皆可以削去矣聖人教人慱學審問謹思明辨而篤行之蓋於理之巨細精粗無所不講然後胸次光輝明徹無所不通踐履服行無非真實似不當如此先立界限預設嫌疑以自障礙也答曽無疑承喻令兄喪期於禮聞訃便合成服當時自是成服太晚固巳失之於前然在今日祥練之禮却當計成服之日至今月日實數為節但其間忌日却須别設祭奠始盡人情耳謂聖人以喜怒動其志固為不可若謂都無所動則是聖人心如木石而喜怒之見於外者特為偽耳豈有是理哉此等處須是存養體驗自做得些工夫當自見之難以淺識懸斷也學習之習與傳習之習非有不同傳即謂所學也大抵慱學審問學之事也謹思明辨而力行之習之事也集注中所載諸先生説甚備可細考之來喻忠恕二説皆近之熹鄉來所論正謂如此近復細觀乃有未盡已於論語集注中更定其説矣試詳考之當見曲折所謂竊恐狂騖髙逺者視之云云却不當如此顧慮終身行之自是學者事於聖人何所預哉蓍數之説其義亦精但不知所謂老隂老陽其數則一少隂少陽其數乃三是如何蓋四象之變極於六十有四老陽十二老隂四少陽二十少隂二十八乃自然之數不容增減揲者隨其所得而言之又何慮其不可觀變耶揲法𥘉爻成則便止有三十二卦二爻成則便止有十六卦三爻成則便止有八卦四爻成則便止有四卦五爻成則便止有二卦亦是自然次序節次可見今所疑者亦何嫌哉揲蓍之法周禮領於太卜之官計其法度必甚詳密今皆不可見矣獨賴大傳有此數句可以略見倣佛而以今推之亦無不可通處學者既不得見當時舊法則亦且當守此不當妄以私意橫起計度也蒿固非蓍然亦猶是其類若以木棊竹算金錢當之則其去蓍益逺矣又如所言交重之論亦所未曉交者拆之聚故為老隂重者單之積故為老陽亦何疑之有乎然此六爻既成而畫地以記之象耳於揲法𥘉無所預也答曽無疑所論為學之意甚荷不鄙但若果有所得出言吐氣便自不同才見如此分踈解説欲以自見其能而唯恐人之不信便是實無所得自明眼人觀之固不待其詞之畢而有以識之矣孝悌忠恕若淺言之則方是人之常行若不由此即日用之間更無立腳處故聖人之教未嘗不以為先如所謂入則孝出則悌忠恕違道不逺是也若極言之則所謂通于神明光于四海無所不通而曽子所以形容聖人一貫之妙者亦不過如此又非如前者言之可易而及也故大學之道必以格物致知為先而於天下之理天下之書無不慱學審問謹思明辨以求造其義理之極然後因吾日用之間常行之道省察踐履篤志力行而所謂孝悌之至通于神明忠恕之一以貫之者乃可言耳蓋其所謂孝悌忠恕雖只是此一事然須見得天下義理表裏通透則此孝悌忠恕方是活物如其不然便只是箇死底孝悌忠恕雖能持守終身不致失墜亦不免但為鄉曲之常人婦女之檢押而巳何足道哉今且以所舉有子曽子之言觀之似於文義之間全未考究雖近世先覺如程夫子之言所以發明其妙者恐皆未嘗過目而經心而況於其他義理精微千差萬别豈能一一會其旨歸也哉故熹竊以為今日與其自辨以求合枉費言語枉費心力不若一切放下便依此説且將大學論語反復熟讀而因程子之言與其門人數公之説以求聖賢之指意所在句句而講字字而思使無毫髮不通透處則自不須如此妄自拘束強作主張也無疑試更思之恐或可信則一兩月間天氣差暖或能乘興一來靣罄其説庶幾彼此殫盡免至如此擔閣虛費光隂也晷景製作甚精三衢有王伯照侍郎所定官曆刻漏圖一編亦與此同曆象之學自是一家若欲窮理亦不可以不講然亦須大者先立然後及之則亦不至難曉而無不通矣北宫黝似孟施舍孟子本文無此語不知尋常如何曉會此句未敢輕論其得失也答曽無疑子約書來必盛稱無疑之為人但不知中間相聚所與切磨誦説者果為何事計於緊要親切處亦未必能盡所懷爾日月逝矣歲不我與丈夫有志者豈當為此悠悠泛泛徘徊猶豫以老其身乎答曽擇之祖道禮即理也但謂之理則疑若未有形迹之可言制而為禮則有品節文章之可見矣人事如五者固皆可見其大槩之所宜然到禮上方見其威儀法則之詳也節文儀則是曰事宜細考之忠恕二字其本義只是學者衆人之事曽子所言乃借此以形容聖人一貫之妙程子之言又借天地造化之體用以明聖人之事須作三節看見得各有下落則一章之指自通貫矣更徐玩之非欲速所能逹也此説未然但􅃮雕語意深密難尋而曽點之言可以玩索而見其意若見得曽點意則􅃮雕之意亦可得矣且看程子説大意兩字是何意二子見得是向甚處如何見得答曽擇之仁者心之德愛之理也仁者心之德猶言潤者水之德燥者火之德愛之理猶言木之根水之原試以此意思之盡巳之謂忠祖道𥘉以為盡吾心之所至而無一毫自隱先生以為語未瑩祖道再思之恐止是竭盡吾心而無一毫不足之義後語轉踈前語只自隱二字不切須知不必自隱然後為不忠但有不盡處便是病也主一無適之謂敬此等語須力行之方見得真實意味禮者天理之節文人事之儀則更就天人上看義者事之宜也更以孟子説義處推之忠恕曽子忠恕二字便是一以貫之底注腳可更以二程先生及上蔡説反復體認仍以集注之説參之便見聖賢之意直是細密不是泛然儱侗説話以約失之者鮮矣約有收斂近裏著實之意非徒簡而巳止蔡説得好德不孤此德不孤與易中説德不孤不同此但言有德者聲氣相求自不孤立故必有鄰易中却是説敬義既立則內外兼備則其德盛而不孤也􅃮雕開曽點二子是信箇甚底又是如何地信曽點語可更以集注為主子細體驗仍看上蔡之説發明得亦親切三年之喪而復有期喪者當服期喪之服以臨其喪卒事則反𥘉服或者以為方服重不當改衣輕服不知如何或者之説非是卒哭百日卒哭乃開元禮以今人葬或不能如期故為此權制王公以下皆以百日為斷殊失禮意古者士踰月而葬葬而虞虞而卒哭自有日數何疑之有但今人家諸事不辨自不能及此期耳若過期未葬自不當卒哭未滿一月則又自不當葬也答曾擇之前書所説欲於一字中推尋曲折不知後來看得如何恐亦不必如此但從頭看到要緊處更加功夫子細辨别而不緊要處亦不可草草則久之自然浹洽貫通精粗一致矣季章説致曲處不知如何今亦不記當時所説大抵彼中朋友看得文字踈略不肯依傍先儒成説反覆體驗而便輕以巳意著字下語正使得其大意中間亦不免有空闕處相接不著欲革此弊莫若凡百放低且將先儒所説正文本句反覆􅉼泳庶幾久久自見意味也答曽擇之所論曽點大意則然但謂􅃮雕開有經綸天下之志則未必然正是巳分上極親切處自覺有未盡耳雖其見處不及曾點之開闊得處未至如曽點之從容然其功夫精密則恐點有所不逮也以此見二人之規模格局大槩不相上下然今日只欲想象聖賢胸襟灑落處却未有益須就自家下學致知力行處做功夫覺得極辛苦不快活便漸見好意思也天下歸仁之説程先生是説實事吕與叔恐不免墮於虛見其得失自可見也季宏之來只是要求跋尾全然不曾講學却須曽理會作文大率彼間士人多是如此鄉外走作不曽鄉裏思量論其淵源蓋有不得不任其責者矣甚可嘆也因其告歸附此為報熹衰病沈痼腹心之患已成尚思更與朋友講論此事少革流弊以垂永久賢者無事更能見過相聚旬月是所望也答王才臣來喻縷縷備見雅志然於讀書窮理所得所疑未有以見教者而較短量長非人是已之意實多若果有得於義理之歸恐不應更有此病也明者思之以為如何苟有取焉則願置此而姑相與實講所疑乃千萬之幸也無疑書來其大指與左右亦相似巳詳報之或因過目併以一言論其得失可也六詠之需非敢忘之實以年來纂次禮家文字頭項頗多衰病之餘精力向盡無暇可及亦覺未是急務故不敢以奉凂爾格齋大字此却好箇題目顧未知所以充之者如何寫字亦非所難適此兩日寒甚衰病拘攣不可轉動向後睛暖當試為之以奉寄也承有枉顧之意尤荷不鄙若得會靣彼此傾倒以判所疑何幸如之未間千萬及時專力使有箇端的用心處庶幾合并之日有可討論也子直詩甚佳南容之篇尤有餘味巳輒為題其後因書幸以報也答度周卿正比來為況如何讀書探道亦頗有新功否耶歲月易得義理難明但於日用之間隨時隨處提撕此心勿令放逸而於其中隨事觀理講求思索沈潛反復庶於聖賢之教漸有默相契處則自然見得天道性命真不外乎此身而吾之所謂學者舍是無有别用力處矣因書信筆不覺縷縷切勿為外人道也答李誠之説特承寄示新刻二先生祠記并枉長書一通記文鄙淺而書意勤厚非區區所敢當也然先生之道即伏羲堯舜禹湯文武周公孔孟所傳之道先生之書即所以發明六經孔孟之書𥘉非别有玄妙竒特自為一家之説而與古之聖賢異軌殊轍也世之君子固未必嘗讀其書而驟讀其書亦未能遽曉是蓋不唯不知程氏之學實乃并與古昔聖賢之學而不之知也舉世昏冥恬不覺悟而其聰明辨慱能為文字語言名有氣槩才力者則其惡之為尤甚今以門下之才之美宜巳無愧此數者而其用心獨不然蓋不惟立祠伐石以著其尊慕之意而來書之喻又將不鄙迂陋而辱問津焉此其志豈獨賢於今世之士也哉竊感下問之勤故粗論其梗槩如此近所刋定大學章句一通今致几下所欲言者不能外此幸一讀而三思之其必將有以得之而異時所以見於文章事業者愈有光矣僣率皇恐答李誠之昨蒙不鄙俾撰先正文集後序自知不文不足以副厚意顧以先契之重鄉往之深且欲託此以少見尊奬節義别嫌明微之意以是不敢力辭而輒草定其説以求啇訂區區之心蓋未敢自以為是也所欲更定尊復明辟四字刋去繁冗著語精切前輩所謂自有穩字正此謂也玩味歎服不能自巳但平賊之功雖由外濟之語乃是區區鄙意分功紀實以息爭論之微指朱丞相所記當時之事非不詳明正以欲專其功而反詆吕張為敗事又其後深詆李趙諸公誣謗巳甚故讀者往往心非而鼻笑之并與其可信者而不信之也碩熟思之恐不可改如何答徐崇父僑日用功夫且得如此照管莫令間斷久之浹洽自有見處亦不須别立標的便計工程也敖惰之説如此引孟子隱几而卧而以為當然則巳得之矣何必疑其非本有耶不但孟子如孔子取瑟而歌亦是此類但大學之意却是恐人於此一向偏却更不照管今當看此重處識取正意受用省察不必向間慢處枉費思索也子顔時時往來甚佳才卿得託門館甚善其人有立作看得道理亦子細儘好從容講論也答林叔恭為學只要致誠耐久無有不得不須别生計較思前算後也答潘子善時舉辱書備知學問之志甚善甚幸杜門獨學與周旋師友之間學之難易固不同矣然其用力實在於我非他人所能代也况彼中朋友以書來者巳自數人切切偲偲相觀而善似亦不可謂之全然無助者更在勉力而巳答潘子善便中兩承惠書深以為慰比日秋涼所履佳勝熹衰病涉秋似有向安之漸但辭職告老皆未報可日深悚惕之懷耳恭父留此甚久儘得從容因其行草草附此其他恭父必能言之未間唯冀以時自愛眷集一一佳慶諸疑問各疏其下矣恭父當能道其詳答潘子善問易傳近思録大畜彖曰能止健大正也傳曰能止乎健者非大正則安能據大畜天在山中之象則是能止其健於下也今曰止乎健者不知是止於健還是止其健耶伏乞批誨能止健言以艮之止止乾之健也傳意亦是如此但其文勢似倒他亦多此類也習坎八卦中獨坎加習字説者多矣未知義果如何此等不必深求其説習坎卦義傳云一始於中有生之最先者也故為水夫陽氣之生必始於下復卦之象是也今曰始於中其義如何氣自下而上為始程説别是一義各有所主不相妨然亦不可相雜咸上六咸其輔頰舌竊意此爻冝有悔吝而不言悔吝何也吉凶悔吝係乎邪正此但見其不足以感人之意耳未見有失故不得以悔吝言也遁九三畜臣妾吉傳曰係吝之私恩懷小人女子之道也故以畜養臣妾則得其心為吉也小人女子近之則不孫逺之則怨若專以私恩懷之未必不有悔吝而此爻以為吉何耶此爻不可大事但可畜臣妾耳御下而有以懷之未為失正但恐所以懷之者失其正耳晉傳曰晉之盛而無德者無用有也然大有可謂盛矣而卦有卦德不知如何元亨利貞本非四德但為大亨而利於正之占耳乾卦之彖傳文言乃借為四德在他卦尤不當以德論也晉六三衆允悔亡傳曰或曰不由中正而與衆同得為善乎曰衆所允者必至當也竊謂世固有不義而得衆如齊之陳氏魯之季氏者矣顧可以為善乎易是虛設之辭不可以實迹論若以卦象言之則順而麗乎大明自不應有不善也家人有嚴君焉傳曰家人之道必有所尊嚴而君長者謂父母也如此則嚴君作兩字説然自舊諸家只作一字説未知如何所尊嚴之君長也蹇𥘉九大蹇朋來傳以其無剛陽之臣不足以濟蹇竊謂自古患君之不剛明耳未有有其君而無其臣者也傳又以李固王允周顗王導為言竊意當時正以無剛明之君故耳設使有之數子未必能有為也更乞指教讀易當看卦畫時節不可以此論夬象曰居德則忌傳曰則約也忌防也謂約立防禁則無潰散某於此義不能無疑更乞批報未詳艮行其庭不見其人傳曰庭除之間至近也在背則雖至近不見謂不交於物也外物不接內欲不萌如是而止乃得止之道夫人豈能不交於物而孑然自立於世哉意此所謂不交者謂非巳之所當應則雖在至近而猶不見也若非所當應亦感之而動則非所以為止矣未知是否熟讀彖傳之詞可見文義艮其背乃止其所之意程傳恐非本文之旨啓蒙𫐠旨篇云仰觀俯察始畫竒偶教之卜筮以斷可否不知伏羲之後文王周公之前未有卦及辭何以定吉凶敢乞批示此無可考但周禮三易經卦皆八别皆六十有四則疑巳有辭矣義訓宜禮訓别智訓知仁當何訓竊意仁只是人心一箇生理不知以生字訓得否不必須用一字訓但要曉得大意通透耳明道先生曰學只要鞭辟近裏著巳而巳故切問而近思則仁在其中矣言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其參於前也在輿則見其倚於衡也夫然後行只此是學質美者明得盡查滓便渾化却與天地同體其次惟莊敬以持養之及其至則一也竊謂切問近思是主於致知忠信篤敬是主於力行知與行不可偏廢而此條之意謂隨人資質各用其力而其至則一如是則亦有行不假於知者未知如何伏乞指教切問忠信只是泛引切巳底意思非以為致知力行之分也質美者固是知行俱到其次亦豈有全不知而能行者但因持飬而所知愈明耳恕則仁之施愛則仁之用施與用不知如何分恕之所施施其愛耳不恕則雖有愛而不能及人也人之為學忌先立標凖若循循不巳自有所至矣竊意若以聖人為標凖何不可之有若無所指擬茫然而去將何所歸宿哉伏乞指教忌先立標凖如孟子所謂勿正者學者固當以聖人為摽凖然豈可日日比並而較量之乎觀顔子喟然之嘆不於堅髙瞻忽處用功却就慱文約禮上進步則可見矣德不勝氣性命於氣德勝其氣性命於德窮理盡性則性天德命天理氣之不可變者獨死生修夭而巳竊謂知所攝養者則多夀考肆其嗜欲者則多夭喪是死生修夭亦可變也故程子以火為喻與此説不合如何正蒙之言恐不能無偏橫渠云心要洪放又曰心大則百物皆通心小則百物皆病孫思邈云膽欲大而心欲小竊謂橫渠之説是言心之體思邈之説是言心之用未知是否心自有合要大處有合要小處若只著題目斷了則便無可思量矣且見得路徑後各自立得箇門庭歸而求之可矣竊謂門庭豈容各立耶有所未解伏乞指教此是説讀六經只要從師講問且識得如何下工夫便是立得門庭却歸去依此實下工夫便是歸而求之答潘子善比奉從容纍月别去不勝悵惘比日秋冷計還舍之久諸況安適家務酬酢之餘當亦不廢學也此間朋友去多來少早晚亦且講論如常但精力愈衰愧無警切之功耳答潘子善所論為學之意善矣然欲專務靜坐又恐墮落那一邊去只是虗著此心隨動隨靜無時無處不致其戒謹恐懼之力則自然主宰分明義理昭著矣然著箇戒謹恐懼四字已是壓得重了要之只是略綽提撕令自省覺便是工夫也所示數條今各奉答可更詳之所論孟子大學説正心處不知敬仲如何説如何是二説相似處如何是有此四者心便不正可更扣之須盡彼説方可判斷未可便以巳意障斷他人話頭也純仁可念此間方為季通逺謫作惡忽又聞此其禍乃更甚於季通使人不能忘懷然此中近日改移新學復為僧坊塑象摧毁要膂斷折令人痛心彼聖賢者尤不免遭此厄會况如吾輩何足道哉精舍春間有朋友數人近多散去僅存一二未有精進可望者亦緣無長上在彼唱率功夫殊無次第諸友頗思董叔重也或疑清廟詩是祀文王之樂歌然𥘉不顯頌文王之德止言助祭諸侯既敬且和與夫與祭執事之人能執行文王之德者何也某曰文王之德不可名言凡一時在位之人所以能敬且和與執行文王之德者即文王盛德之所在也必於其不可容言之中而見其不可掩之實則詩人之意得矣讀此詩想當時聞其歌者真若洋洋乎如在其上如在其左右又何待多著言語委曲形容而後足之哉妄意如此不知是否此説是谷風詩四章就其深矣方之舟之就其淺矣泳之遊之集傳以為興體某疑是比體未知如何乞指教若無下靣四句即是比既有下四句則只是興矣凡此類皆然非獨此章也事君數斯辱矣胡氏曰事君諫不行則當去導友善不納則當止至於煩瀆則言者輕聽者厭矣是以求榮而反辱求親而反疏也某竊以為事君而納忠交友而責善職所當然而心之不能巳者本非有求榮求親之心恐胡氏之説不能無過未知如何胡氏説盡人情未有不是處桞下惠進不隱賢集注謂不隱賢不枉道也某竊疑與下文必以其道意莫重疊否尚乞指教兩句相承只作一意讀文勢然也乃孔子則欲以微罪行微罪不知是指魯言是孔子自謂也耶乞指教自謂知性則知天矣不知知性便能知天亦有淺深耶乞指教窮理到知天處自然見得飢者井食渴者井飢某竊謂此章是借飢渴之害以言人心之害所謂人心之害恐不止為貧賤而已凡一切欲有求之不得而遂不暇擇焉皆是也所謂人能無以飢渴之害為心害者謂人能無以飢渴害口腹之類為其心害則不憂其不及人矣未知如此説得否此章從來有兩説以意則此説勝蓋不欲人以利欲害其心如飢渴之害口腹也以語則不以飢渴之害動其心者為切於文義未知果孰是但後説差不費力耳溫公稽古録秦論謂知及之仁不能守之雖得之必失之秦之謂矣又引賈生之論曰仁義不施而攻守之勢異也某竊謂秦以虎狼并天下設使守之以道且不可保况又非其道耶論者不當徒咎其守之非道而不論其攻之巳不善也更乞指教賈生溫公之論若究其極固為有病然彼其立論非為攻取者謀以為可以如是取之而無害也乃為既得之後而謀以為如是則或可以守耳今且試以身處胡亥子嬰之地而自謀所以處之之冝則彼前日取之之逆者既不可及矣吾乃可以拱手安坐以待其亡耶魏論溫公謂魏太祖取天下於盜手而非取之于漢室某於此有所未喻蓋盡忠以事君興衰而撥亂此人臣之職也安可因其危亂自多其功遂掩取之耶今有巨室一夕寇至據其室廬而攘其資財有強奴悍僕却其群盜而復其室廬不歸之於主而遂以為巳有謂吾取之於盜手而非取之於主人其可乎溫公之論殆將啓天下姦雄之心故不能無疑併乞教誨溫公此論殊不可曉知其非是足矣不須深論前賢之失也答潘子善所論為學工夫亦甚穩密尤以為喜更切勉力乃所望也楊敬仲其人簡淡誠慤自可愛敬而其論議見識自是一般又自信巳篤不可復與辨論正不必徒為嘵嘵也答潘子善欽明文思某謂恐當從去聲讀若只作思慮之思未見其發揮於事業處作去聲讀為是克明俊德止黎民於變時雍俊德或以為已之明德或以為俊德之士百姓或以為民或以為百官未知二説如何若以大學之序觀之則俊德為巳之明德百姓為民似無可疑者俊德當依大學説百姓程先生以為畿內之民是也平秩南訛敬致林氏謂如周禮致日之致此乃致南方之中星耳未知是否致日乃考日中之景如周禮土圭之法非考中星也戒之用休董之用威勸之以九歌林氏謂自戒自董自勸未知此説如何九歌今亡其詞不可稽考以理觀之恐是君臣相戒如𢋫歌之類皋陶矢厥謨禹成厥功帝舜申之未知申字如何看此是三篇之敘第一句説皋陶謨第二句説大禹謨第三句説益稷所謂申之即所謂汝亦昌言者也此書伏生本只是二篇皋陶謨益稷之間語勢亦相連孔壁中析為三篇故其序如此亦不足據而説者又多失之甚可笑也念兹在兹釋兹在兹允出兹在兹諸説皆以禹欲舜念皋陶而林氏以為禹自言其念之如此未知二説如何林説是允迪厥德謨明弼諧疑是稱皋陶未知是否若以為稱皋陶則下句禹曰俞者為何所俞耶恐此八字是皋陶之言禹善之而問其詳故皋陶復説下句解此八字之義或云此八字是言皋陶之德諧字下别有皋陶之言今脫去未知是否姑存之可也亦行有九德或以為人之性行或以為君之行未知二説當何從亦行有九德泛言人之行有此九德故言其人之有德則當以此而論之載采采古語不可曉當闕之夙夜浚明有家止亮采有邦古注以為可以為卿大夫及諸侯林氏以為卿大夫諸侯用此三德六德之人未知孰是林説恐得之猶孝經説爭臣之類蓋曰如是足矣非必以是為限也天聰明自我民聰明天明畏自我民明威不知明畏是兩字還是一字林氏以為聰明言視聽明畏言好惡未知如何林氏似是明畏言天之所明所畏所明如明明揚側陋之明上明字所畏如董之用威威用六極之意以出內五言林氏以為宫啇角祉羽之言古注以為仁義禮智信之言未知當孰從未詳當闕自侯以明之以下皆然關石和鈞竊謂此只是鈞石之名如周禮嘉量之類耳未知是否恐是鬼神其依龜筮協從不知是巳卜還是未卜恐是𥘉未嘗卜先時者殺無赦不及時者殺無赦林氏謂是誓衆之辭非言昏迷天象之人以上文考之林説非是然此篇自可疑當闕之矧豫之德言足聽聞據古注云道德善言某竊意言足聽聞自當作一句言吾之德言之足使人聽聞彼安得不忌之未知是否是賁若草木兆民允殖諸家説多不同未知當如何看連上句言天命不僣明白易見故人得遂其生也自周有終古注及諸家皆以周訓忠信竊謂以忠信自周則可以忠信訓周恐未安未知如何自周二字本不可曉王惟庸罔念聞諸家皆於庸字絶句竊謂只作一句讀以庸訓用如説命中王庸作書以告之庸未知是否六字一句若虞機張諸家皆訓虞為度竊謂只作虞人説如何作虞人為是臣為上為德為下為民諸説不同不知此四為字當如何音四為字並去聲為上者輔其德而不阿其意之所欲為下者利於民而不徇巳之所安武成一篇諸家多以為錯簡然反覆讀之竊以為自王若曰以後皆是史官歷敘以前之事雖作武王告群后之辭而實史官敘𫐠之文故其間如有道曽孫周王發及昭我周王之語皆是史官之言非武王當時自稱如此也亦如五誥中王若曰以下多是周公之語若如此看則似不必改移亦自可讀又既生魄恐是晦日既者言其魄之既足也以歷推之當為四月晦未知此篇先生尋常如何看王若曰以下固是告群后之辭兼敘其致禱之辭亦與湯誥相類但此詞却無結殺處只自敘其功烈政事之美又書戊午癸亥甲子日辰亦非誥命之體恐須是有錯簡然自王氏程氏劉原父以下所定亦各不同舊嘗考之劉以為王語之末有闕文似得之彼有七經小傳否可檢看又漢書曆志謂是歲有閠亦是也洪範之書林氏以為洛出書之説不可深信謂帝乃震怒不卑洪範九疇彛倫攸斁猶言天奪之鑒也天乃錫禹洪範九疇彜倫攸敘猶言所謂天誘其衷也又云洪範之書大抵發明彛倫之敘本非由數而起又曰天乃錫禹洪範九疇猶言天乃錫王勇智耳不必求之太深也某竊謂河出圖洛出書易中明有此説豈得而不之信耶未知林氏之説如何望折衷便使如今天錫洛書若非天啓其心亦無人理會得兩説似不可偏廢也八庶徴曰時林氏取蔡氏説謂是歲月日之時自五者來備而下所以申言曰雨曰暘曰燠曰寒曰風之義自王省惟歲而下所以申言曰時之義某竊謂此時字當如孔氏五者各以其時之説為長林氏徒見時字與雨暘燠寒風五者並列而為六則遂以此時字為贅不知古人之言如此類者多矣且仁義禮智是為四端加一信字則為五常非仁義禮智之外别有所謂信也故某以為時之在庶徴猶信之在五常不知是否林氏之説只與古説無異但謂有以歲而論其時與不時者有以月而論其時與不時者有以日而論其時與不時者可更推之某讀書至盤庚及五誥諸篇其疑不可數舉若以諸家之説勉強解去亦説得行但恐當時指意未必如此耳如此等處只得姑存之如何漳州所刻四經書序有此説需卦六四出自穴上六入于穴程傳謂穴物之所安也本義謂穴者險陷之所某以為謂之險陷之所正得坎體之象未知是否坎即穴也訟六三或從王事無成本義謂必無成功似與象辭從上吉也之意不協又與坤六三文言亦不協竊意本義是直作占辭解如此未知是否易中經傳不同如此處多且兼存之然經意是本傳辭是第二節話也小畜九五富以其鄰本義謂巽體三爻同力畜乾鄰之象也據程傳則曰以一隂畜五陽某竊謂以統體言之固是以一隂畜五陽然就九五而言則下與四比上與下連為鄰之象謂巽三爻同力畜乾自見得自上畜下之意分明未知是如此否更以泰卦不富以其鄰對之即可見其文意大過上六爻本義謂是殺身成仁之事莫是如晉荀息之類否荀息所處未得為成仁者遁小利貞本義謂小人也按易中小字未有以為小人者如小利有攸往與小貞吉之類皆大小之小耳未知此義如何經文固無此例然以彖傳推之則是指小人而言今當且依經而存傳耳豐天地盈虗與時消息而况於人乎况於鬼神乎程子曰鬼神者造化之迹然天地盈虗即是造化之迹矣而復言鬼神何耶天地舉全體而言鬼神指其功用之迹似有人所為者以謙卦彖辭推之尤明白聖人有以見天下之賾本義云賾雜亂也訓詁皆云深也未知如何先儒有此訓今忘記檢不得字書無頥字口同義只作嘖云大呼也左傳曰嘖有煩言非謂深也若是深義即與隱深逺三字一義矣且又何以云不可惡乎本義云變化云為故象事可以知器吉事有祥故占事可以知來不知變化云為主於人而言否變化者隂陽之所為云為者人事之所作幽贊於神明而生蓍本義謂蓍生滿百莖某謂恐只與立卦生爻同義猶言立蓍而用之耳卦爻是人所畫蓍是天地所生不可作一例説兼以立蓍而用之為生蓍亦不成文理勞乎坎某恐勞字當作去聲讀恐或如此然此一節多難曉處辟雍天子之學不知從來是天子之學名還是文王始為之後遂以為定制亦如皋門應門始立於太王而後遂以為天子之門也見不得召旻第六章集傳作賦體竊疑是比體作比為是仁者不憂集注云理足以勝私故不憂某嘗推之恐只是此心常存不暇間思慮惹起間煩惱耳未知是否未是春秋翬帥師某謂春秋為聖人褒貶之書其説舊矣然聖人豈損其實而加吾一字之功哉亦即其事之固然者而書之耳如翬帥師之類是也蓋不待君命而固請以行則書之如是宜也或以為若是則一代之事自有一代之史春秋何待聖人而後作哉曰春秋即魯史之舊名非孔子之創為此經也使史筆之傳舉不失其實聖人亦何必以是為巳任惟官失其守而䇿書記注多違舊章故聖人即史法之舊例以直書其事而使之不失其實耳𥘉未嘗有意於褒之貶之也以是而觀春秋庶足以見聖人光明正大之意而非持夫一字之功以私榮辱之權也惟夫不失其實則為善者安得而不勸為惡者安得而不懼孟子曰孔子作春秋而亂臣賊子懼冝哉不知書翬帥師如何見得其不待君命而行之罪又如何見得舊例合如此書此須更有啇量未逹則闕之可也答潘子善漢志引武成篇曰惟一月壬辰旁死霸若翌日癸巳武王乃朝步自周于征伐紂此與古文合但一二字差又曰粵若來三月既死霸粵五日甲子咸劉啇王紂顔氏曰今文尚書之辭又曰惟四月既旁生霸粵六日庚戌武王燎于周廟翌日辛亥祀于天位粵五日乙卯乃以庶國祀馘于周廟顔氏曰亦今文尚書也又畢命豐刑曰惟十有二年六月庚午朏王命作䇿豐刑孟康曰逸書篇名今按伏生今文尚書無武成獨孔氏古文尚書乃有此篇今顔氏注劉歆所引兩節見其與古文不同遂皆以為今文尚書不知何所考也諸家推曆以為此年二月有閠四月丁未為十九日庚戌為二十二日若無閏即四月無丁未庚戌然二日皆在生魄之後則古文為倒而此志所引者為順但其言燎于周廟似無理耳况古文此篇文皆錯繆安知既生魄庶邦冡君暨百工受命于周十四字非本在示天下弗服之下丁未祀于周廟之上而王若曰以下乃大告武成之文耶以湯誥考之此説為是畢命古文有此篇其年月日與此同而王命作册乃序文唯豐刑為無據然年月之下亦有至于豐字豈又若伊訓之方明耶但古文之序册下更有畢字孔傳以為命為册書以命畢公如此則全不成文理本文似亦有闕語疑作册二字乃衍文而闕一公字也以此可見劉歆所見古文巳非其正而今本亦有闕誤難盡信也孟康便以豐刑為逸書篇名則亦不復本上文自有畢命矣此又誤之甚也此恐是劉氏七經小傳之説當考答潘子善所喻主一功夫甚善千萬更加勉力為佳書説今再報去去歲卷子八月間已寄往黃巖矣不知何故未到然大抵看得似皆踈淺更冝玩索其間曲折意味方有得力處也學禮之意甚善然此事頭緒頗多恐精力短包羅不得今可且讀詩俟他日所編書成讀之未晚書雖讀了亦更冝溫習如大學語孟中庸則須循環不住溫習令其爛熟為佳春秋一經從前不敢容易令學者看今恐亦可漸讀正經及三傳且當看史功夫未要便穿鑿説褒貶道理久之却别啇量亦是一事也公食禮至今未寄來巳報恭叔致道趣之矣子約之亡深可傷痛此間蔡季通亦死貶所尤可惜目前便覺無人説得話也答潘子善洪範中休徴咎徴諸家多以義推説竊以為五者不出隂陽二端雨寒隂也暘燠風陽也肅謀深沉而屬靜隂類也故時雨時寒應之乂哲聖發見而屬動陽類也故時暘時燠時風應之狂反於肅急失於謀故恆雨應之未知如此看得否大槩如此然舊以雨屬木暘屬金燠屬火寒屬水而或者又欲以雨屬水暘屬火燠屬木寒屬金其説孰是可試思之旅熬人不易物諸家皆讀易如字某竊意當讀作輕易之易恐不然時庸展親諸家多訓展作信是否展審視也不當訓信召誥文只説召公先至洛而周公繼至不説成王亦來也然召公出取幣入錫周公乃曰旅王若公其辭又多是戒成王未知如何此蓋因周公以告于王耳但洛誥之文則有不可曉者其後乃言王在新邑而其前巳屢有問答之詞矣可試考之立政兹乃三宅無義民據此三宅即上文宅事宅牧宅凖之宅今孔氏蘇氏以為居無義之民猶舜典五宅三居之意吕氏以三宅無義民一句桀德惟乃弗作往任謂當桀之時三宅者曾無義民未知二説孰長吕説是司徒司馬司空亞旅不知何故敘於太史尹伯庶常吉士之下吕氏以為諸侯之官未知是否謂三官之副與其屬耳亞謂小司徒之屬旅則下土也見周禮序官奠麗陳教則肄麗字據孔氏音力馳反施也諸家多作附麗之麗謂土著也奠麗謂養之陳教則教之未知其説如何某竊謂從孔氏説亦自平直奠麗者謂定其所施之號令也陳教則陳其所以教之之道也肄或訓勞習愚意謂從習為長未敢自決尚幸批誨前篇有以麗訓刑者肄當訓習爾無以釗冒貢於非幾幾者事之微也康王釋喪服而𬒳衮冕且受黃朱圭幣之獻諸家皆以為禮之變獨蘇氏以為禮之失天子諸侯之禮與士庶人不同故孟子有吾未之學之語蓋謂此類耳如伊訓元祀十二月朔亦是新喪伊尹已本嗣王祗見厥祖固不可用凶服矣漢唐新主即位皆行册禮君臣亦皆吉服追述先帝之命以告嗣君韓文外集順宗實録中有此事可考蓋易世傳授國之大事當嚴其禮而王侯以國為家雖先君之喪猶以為已私服也五代以來此禮不講則始終之際殊草草矣程先生文集中主式與古今家祭禮長短不同所謂古尺當今五寸五分弱不知當用今何尺古今家祭禮中有古尺樣較之今尺又不止五寸五分注云省尺省尺莫是今淮尺否主式適檢二書髙低雖有少不同然本只要見式樣其髙廣之度自有尺寸𥘉不取此為凖也省尺乃是京尺溫公有圖子所謂三司布帛尺者是也會稽司馬侍郎家必有此本可轉求之其圖并有古尺數等此舊有之今久不見矣答潘子善六月二十七日熹頓首久不聞問便中辱書具審比日所履佳勝又知巳遂親迎良以為慰熹衰病益侵本無足言最是氣痞不可伏几觀書殊以為撓耳近日作何工夫前此問目已嘗奉報矣此間朋友亦有十餘人頗有講論之益然亦皆不能久留也不知秋冬間能率諸同志一來為旬月之集以盡所欲言者否因便口占布此草草餘唯以時自愛答余彛孫範有憂有懼者志不勝氣氣反動其心若志立則氣定矣故曰內省不疚夫何憂何懼有憂有懼者內有所慊也自省其內而無所病則心廣體胖而何憂何懼之有夫子之語固巳明白完備今以志立氣定為言則是未嘗熟復本文而别生枝節也文中子曰仁義教之本先王以是繼道德此先道德而後仁義之説也此説得之大學知止以至能得孟子自得以至逢原或以二章次第相似範以為不然大學知止而下乃孟子欲其自得之事至於能得乃自得處居之安則資之深資之深則取之左右逢其原此乃自得後所進愈不止也此亦得之但聖賢之言各有所指其次序深淺隨事而言不可如此牽合此説猶為粗可通耳不耕穫不災畬程子易傳爻辭恐未明白範竊謂無不耕而穫不災而畬之理只是不於耕而計穫之利如程子所解象辭移之以解爻辭則可易傳爻象之辭雖若相反而意實相近特辭有未足耳爻辭言當循理象辭言不計利循理則不計利計利非循理也但考之經文則傳與來説於文義之間皆若有可疑者若曰不耕而穫則多却而字若曰不於耕而求穫之利則又須增數字方通嘗謂此爻乃自始至終都不營為而偶然有得之意耕穫災畬舉事之始終而言也當無妄之世事蓋有如此者若以義言則聖人之無為而治學者之不要人爵而人爵從之皆是也大抵此爻所謂無妄之福而六三則所謂無妄之禍也艮六三不拯其隨程子謂二不得以拯三之不中則勉而隨之不拯而惟隨也恐惟字未的當若不拯而惟隨則如樂正子之於子敖冉求之於季氏也當只言不拯其所隨故其心不快如孔孟之於時君諌不行言不聽則去而巳勉而隨之恐非時止之義得之大司樂祀天地四望皆文之以五聲至於祀天神地祇人鬼獨用宫角徴羽而不及啇或曰祭尚柔又何以統言五聲耶一變致羽物六變致象物有感則無不通但不可以次序先後言然下管鼗鼓而鳥獸蹌簫韶九成而鳯凰儀又若有次序先後豈所感有淺深故其應如之耶但一本作似五聲蓋揔言之其用則不及啇也沈存中筆談亦有説然此等今無所考未須深究感有淺深古注之説巳詳然今亦未暏其實也司服卿大夫加以大功小功則自卿大夫而上皆無此者何也此義周禮疏中其説巳備中庸所謂期之喪達乎大夫是也乃古人貴貴之義吕氏之説詳矣精義君子反經處亦有説然亦是周公制禮而後方如此故擅弓又云古者不降上下各以其親大凡禮樂制度若欲理會須從頭做功夫不可只如此章草略説一二但恐日力未遽及此不若且專意於其近者為佳耳章字疑草字之誤晦庵先生朱文公文集卷第六十終考異溫公稽古録攻守之勢異也下一作某竊以為守固不當如此守攻亦豈可如此攻耶秦之兼并天下不啻如禦人於國門之外者設使守之有道且不可况又非其道耶然則論秦之亡者豈可徒咎其守之非道而不論其攻之巳不善哉更乞指教答潘子善欽明文思一作某竊謂思猶意思之思若只作思慮之思未見發於事業處惟從去聲讀則見其發於事業者莫不切中情否煥然可觀倣佛如論語中倫中慮之類未知是否伏乞批誨鬼神其依龜筮協從下一作不知巳是曽卜一畨了還是未曾卜按文義恐是巳曽卜了禹更請枚卜故舜言其不必再卜之意鬼神其依者以鬼神不可得而知但人謀既協則鬼神亦必依之亦是言向者卜時巳是無可疑者今不必更卜也未知是否伏乞批誨武成一篇言其魄之既足也下一有先生批云此句非是豐天地盈虛豐下一有彖曰造化之迹下一作今既言天地而復言鬼神未知如何分幽贊於神明而生蓍下一作本義引龜美傳蓍生滿百莖為證某竊謂生字似只當與下靣對立卦立字生爻生字同例看所謂生蓍者猶言立蓍而用之耳未知是否勞乎坎下一作據下文云萬物之所歸也故曰勞乎坎竊意勞字當作去聲讀未知是否辟雍天子之學云云一作於倫鼓鍾於樂辟雍注云辟雍天子之學也不知辟雍從來是天子之學否還是文王始為之及周有天下遂以為天子之學亦如臯門應門始立於太王而後遂以為天子之門耶又有一問云小序麟趾詩雖衰世之公子皆信厚如麟趾之時也此句似無義理江有汜詩是媵自作非美媵也此二處下皆未曾注未知如何答云當輔某謂春秋為聖人褒貶書上一作某讀春秋至翬帥師會宋公陳侯蔡人衛人伐鄭處略窺見聖人所以作春秋之意僣易録呈伏乞指教洪範中云云竊以為下一作此猶易中取象相似但可以倣佛看而不可以十分親切求也庶徴雖有五者大抵不出於隂陽二端而巳雨寒隂也云云旅熬人不易物下一作惟德其物諸家皆讀易如字某竊意當作去聲讀蓋此二句接上文無替厥服與時庸展親之意謂人不敢輕易其物惟知德其物也德其物者謂以所賜之物為德也至下文德盛不狎悔却自是别生意不與惟德其物相接諸家往往以惟德其物之德接下文德盛不狎侮之德而不以接上展親之意故以易作如字讀未知是否時庸展親諸家多訓展作信謂信其親親之意某竊意只作展省之展自是平直未知是否爾無以釗冒貢於非幾一作思夫人自亂於威儀爾無以釗冒貢於非幾幾字多訓危某竊謂幾即事也猶萬幾之幾冒貢于非幾謂冒進于非所當為之事未知是否康王釋喪服而𬒳衮冕受虎賁之逆于南門之外且受黃朱圭幣之獻諸家皆以為禮之變獨蘇氏以為失禮使周公在必不為此未知當此際合如何區處所謂古尺上一作程先生文集中主式與古今家祭禮中主式長短濶狹不同不知此二書開時皆曽經先生校過否易傳爻象云云六三下一無則字福州府儒學訓導鄭璉校
