body:
  text: 答張元德洽細讀來書知進學之意不倦甚慰讀書切忌貪多唯少則易以精熟而學問得力處正在於此苟為不熟不如稊稗非虛語也大學等書近多改定處未暇録寄亦有未及整頓者如論孟兩書甚恨其出之早也此間事雖不多然亦終日擾擾少得暇看文字甚覺歲月之可惜也通書太極之旨更宜虛心熟玩乃見鄙説一字不可易處政使濂溪復生亦必莞爾而笑也若如所論則所謂靜者别在四者之外而不相管矣而可乎顔子所以發聖人之藴恐不可以一事言蓋聖人全體大用無不一一於顔子身上發見也孰不可忍亦不必如此説此等處有兩説當時存之皆不偶然更宜詳玩也武成文字不曾帶來不能盡記春秋之説尤所未究此類又是一種功夫未曉即且闕之可也易數之説近有一書謾往讀之來問所疑巳悉具其中矣七經向見其𥘉成之本後未得也計此亦是劉公少時作不然則亦以其多而不能精故耶其間詩説尤草草也答張元德示喻欲來未能之意此固無可如何但日月侵尋縱不得親師友亦須自作工程潛思默究令胸中明徹見得道理都無疑礙方是於踐履功夫有進步處若只如此悠悠間過了誠可惜耳所示諸説似未尋著縫罅雖巳各注其後然只如此講學恐未有深益也名齋之意甚善然著實用功不須如此安立標榜處雖亦未有大害然亦便見用心淺處若實做得功夫是當自無暇及此等不急之務也大學近巳刋行今附去一本雖未是定本然亦稍勝于舊也臨漳四子四經各往一本其後各有跋語可見讀之之法請詳之所問易數雖非講學所急然亦見用意未精且更推尋為佳若如此自見得一門戶決須自信得及正不必問伊川橫渠説如何也若前人説巳分明則此書不作矣正為説者太支離不説者又太簡略所以不得巳而作孔氏雜説寫了多時今附還其間多是抄出江鄰幾嘉祐雜志也答張元德示喻為學之意似覺未甚果決專一更宜勉力科場不逺想不免分了功夫然此等得失真實有命若信未及放不下亦須且將此字頓在面前政使未全得力亦可減得些小分數不為無助夫子所謂不知命無以為君子正謂此也井君處見送行語含兄意亦甚佳兄弟自為慱約想有味也但井君詞筆頗工而趣向未正數日苦口告之未知能勇決否耳所喻易數大槩近之但此等自然法象深玩索之自見端的𥘉見似人安排而實非人所能安排也以一為三以一為二所謂一者謂一揲所得之竒偶未是一爻也一竒為三故三竒為九方得老陽之爻一偶為二故三偶為六方得老隂之爻兩偶一竒乃為少陽之七兩竒一偶乃為少隂之八此數甚明但看得不子細耳井君歸可更切磋之人材難得可惜只如此汨沒了一生也答張元德衡陽之訃想已聞之深足傷歎然當路攻擊意殊未巳今雖如此亦恐更有追削禁錮之類而一時善類次第皆不可保吾輩間中講學固為美事然亦恐有不可測者此方深以為懼而賢者乃以勸彭丈何也熹幸巳得祠差可自安近與學者講論尤覺橫渠成誦之説最為徑捷蓋未論看得義理如何且是收得此心有歸著處不至走作然亦須是專一精研使一書通透爛熟都無記不起處方可别換一書乃為有益若但輪流通念而核之不精則亦未免枉費工夫也須是都通透後又却如此溫習乃為佳耳所説易傳極有難記當處蓋經之文意本自寬平今傳却太詳密便非本意所以只舉經文則傳之所言提挈不起貫穿不來須是於易之外别作一意思讀之方得其極尋常每欲將緊要處逐項抄出别為一書而未暇大抵讀書求義寧略毋詳寧踈毋密始有餘地也詳故碎密故拘歐嚴談君近來看得又如何更望以此相勉但於所讀之書經文注腳記得首尾通貫浹洽方有可玩繹處如其不然泛觀雜論徒費日月決無所益也所論新法大槩亦是如此然介甫所謂勝流俗者亦非先立此意以壓諸賢只是見理不明用心不廣故至於此若得明道先生與一時諸賢向源頭與之啇量令其胸中見得義理分明許多人欲客氣自無處著亦不患其不改矣若便以不可與有為待之而不察其所欲勝之流俗亦真有未盡善處則亦非所以為天下之公而自陷於一偏之説矣頃見趙丞相所編諸公奏議論新法者自有數卷其言雖不為不多然真能識其病根而中其要害者殊少無惑乎彼之以為流俗之浮言而不足恤也至如祧廟一事當時發言盈庭多者纍數千字而無一言可以的當與介父爭是非者但今人只見介父所言便以為非排介父者便以為是所以徒為競辨而不能使天下之論卒定於一也此説甚長非面論未易究答張元德來書所論通復二字甚密然亦有未切處繼之者善云者造化流行萬物方資以始而未實也成之者性云者物生巳實造化與物各藏其用而無所為也在人則感物而動者通也寂然不動者復也以此推之圖象隱然不待多言而自可默喻矣四德則隂陽各二而誠無不貫安得不謂五行之性乎凡此更反復之當自見也太伯之事正也太王王季文武之事權也權而不失其正則並行而不相悖矣此義聖人蓋難言之若看未透且姑置之不必深致疑亦不必多為説也廟議看得似亦未精子孫之於祖考恩雖無窮而義則有止不可過不可不及亦並行而不悖且以周而言之欲使之黜后稷而祖文武固丗俗淺薄之論若遂欲使之越后稷而祖帝嚳以至於無窮又賢者過之之失也答張元德配義與道之説殊不可曉大抵讀書須且虛心靜慮依傍文義推尋句脈看定此句指意是説何事略用今人言語襯帖替換一兩字説得古人意思出來先教自家心裏分明歷落如與古人對靣説話彼此對答無一言一字不相肯可此外都無間雜説話方是得箇入處怕見如此棄却本文肆為浮説説得郎當都忘了從𥘉因甚話頭説得到此此最學者之大病也故程先生有説書非古意轉使人薄漢儒下帷講誦未必是説書又説作論語解已是剩了又以毛公説詩為有儒者氣象觀此等處其意蓋可見今説配義與道却不就孟子上理會如何是義如何是道如何是氣如何地配便一鄉掉開了只單説箇道字巳是無捉摸處又將道字訓作行字尤無交涉説得愈多去理愈逺矣今合且先理會如何是義却就義字上推如何是道道之與義同異如何如何又要氣來配他配字又是何意適檢集注説得儘分明了不知曾子細看否只此數字分明即孟子意思分明可見而程子所謂沖漠氣象亦在其中𥘉非有二説也子約所説亦未免向别處去如此支離轉無交涉却恐不免真為擎拳竪拂者所笑矣其它所論時習率性鳶魚等説今皆未暇論論得亦未有益可且理會此配義與道令分明便中早報及也答張元德人心雖未有喜怒哀樂而物欲之根存焉則固巳偏於此矣故於其所偏者得之則喜且樂失之則怒而哀無復顧義理也此段説得是但物欲之根存焉之説恐未然人固有偏好一物者然此一物未上心時安得不謂之未發之中乎欲下功夫正當於此看取子約心性之説甚可駭來俞所引孟子甚當張云孟子論性而以惻隱羞惡恭敬是非之心為説亦可謂失心性之辨乎性難知而心可盡所謂盡其心者如程子所謂當處便認取此句不干事與今日格一物明日格一物知性也積習既久脫然貫通之謂也盡心也又如論語集注所云隨事精察知性也而未知其體之一盡心也真積力久而將有所得此即盡心知性之案此假內注字係先生批心性一物知則皆知但盡之為難耳又性可逐事言心則舉其全體也禹惡旨酒一章此等處只逐句看不必如此牽合天王狩于河陽春秋熹所未學不敢強為之説然以人情度之天王狩于河陽恐是當時史䇿巳如此書蓋當時周室雖微名分尚在晉文公召王固是不順然史䇿所書想必不敢明言晉侯召王也李傕郭汜朱全忠盜賊狂恣唯力是視亦未必曾讀春秋見有此事而效之也習靜坐以立其本而於思慮應事專一以致其用以此為主一之法如何明道教人靜坐蓋為是時諸人相從只在學中無甚外事故教之如此今若無事固是只得靜坐若特地將靜坐做一件功夫則却是釋子坐禪矣但只著一敬字通貫動靜則於二者之間自無間斷處不須如此分别也語孟或問乃丁酉本不知後來改定如何論孟集注後來改定處多遂與或問不甚相應又無功夫修得或問故不曽傳出今莫若且就正經上玩味有未通處參考集注更自思索為佳不可恃此未定之書便以為是也答張元德嘗讀歐陽公論許丗子止之事未免疑之及讀胡文定公傳未足以破其疑洽繼而考之左氏公羊之傳自明但後人因穀梁不嘗藥之説遂執此一句以為止之罪如此而巳殊不考左氏曰許悼公瘧飲丗子止之藥卒公羊曰止進藥而藥殺也此可以見悼公之死於藥矣當時之事雖未有明文而洽嘗觀近丗治瘧者以砒霜煆而餌之多愈然不得法不愈而反殺人者亦多矣悼公之死必此類也不然當時所進非必死之藥止偶不嘗而巳則公羊何以謂之藥殺丗子何為遽棄國而出奔孟子曰殺人以挺與刃有以異乎以刃與政有以異乎進藥而藥殺可不謂之弒哉其所以異於啇臣蔡般者過與故之不同耳心雖不同而春秋之文一施之者以臣子之於君父不可過也如此觀之似足以正近世經傳之失而破歐公之疑不識先生以為如何胡文定通旨中引曽吉父説如律中合御藥誤不如本方造御舟誤不牢固之類巳有此意矣但考之於經不見許止棄國出奔之事不知果何謂也答張元德舊與朋友説話每怪其不解人意而不知其所以然者近方覺得學者讀了書聽了話元不曽著心記當紬繹玩味至有兩年看一部易傳都不記得緊要處者雖其根鈍使然亦是不肯用力乃知橫渠教人讀書必欲成誦真是學者第一義須是如此巳上方有著力處也歐嚴二君後來曽相見否此中甚難得人深可憂懼也所望以永斯文之傳者如二三君蓋無幾人也答井吉甫此間為况幸亦如常但朋友自不敢住多巳引去亦隨時之義也所示之説今却附還大抵看得未甚浹洽言多窒礙且宜少讀而益加潛心反復玩味之功也中庸言健順仁義禮智之性妄意以為健順用也仁義禮智之性體也健順二字在上者先言用而後言體又以配上文先言隂陽而後言五行未知是否健順之體即性也合而言之則健順分而言之則曰仁義禮智仁禮健而義智順也先生前歲論伊尹樂堯舜之道一段云樂堯舜之道須是見得是獨自底非是衆家常住底今歲先生又言衆家常住底何者非堯舜之道又言若堯舜之道便是衆家常住底則不消更説堯舜後説近是但所記語有差今亦不記當時因何説此也蔡丈云天根是好人之情狀月窟是小人之情狀三十六宫是八卦隂陽之爻某疑人物二字恐未可便以善惡斷之又言三十六宫都是春即月窟亦為春也陽善隂惡聖賢如此説處極多蓋自正理而言二者固不可相無以對待而言則又各自有所主康節所詠恐是指生物之源而言則正氣為人偏氣為物為隂陽之辨季通所論却是推説然意亦通也答井吉甫集注中説曽點處有樂此終身一句不知如何觀舜居深山之中伊尹耕於有莘之野豈不是樂此以終身後來事業亦偶然耳若先有一毫安排等待之心便成病痛矣注中若無此句即此一轉語全無收拾答它聖人問頭不著只如禪家擎拳竪拂之意矣君子所以異於人以其存心昨蒙賜教謂存心者處心也集注又曰以仁存心言以是存於心而不忘也而直卿説是以其心之所存處看它念念在何處某以為若如先生之誨則是以仁禮存在心中若直卿之言則是以心存在仁禮上二説孰是直卿説得亦是但要夲文意義順似注説又須知不是將心去存在仁禮上亦不是將仁禮存在心裏也蔡丈言天根為好人之情狀月窟為小人之情狀又云隂陽都將做好説也得以隂為惡陽為善亦得伏蒙賜教以為陽善隂惡聖賢如此説處極多蓋自正理而言二者固不可相無以對待而言則又各有所主某疑康節先言天根月窟是合偏正而言後言以為都是春者是專以正者言之不知是否看遺書中善惡皆天理及惡亦不可不謂之性不可以濁者不謂之水等語及易傳陽無可盡之理一節即此義可推矣更以事實考之只如鴟梟蝮蝎惡草毒藥還可道不是天地隂陽之氣所生否答林退思輔知讀書有漸甚善甚善但亦須且讀一書先其近而易知者字字考驗句句推詳上句了然後及下句前段了然後及後段乃能真實該遍無所不通使自家意思便與古聖賢意思泯然無間不見古今彼此之隔乃為真讀書耳答林退思某區區之見亦惟以儒者職分實不易盡今之學者皆有小器易盈之患於所當知或聞而不講或講而不精是以見道不全而應用有闕用是憤悱不遑自安懼所見之有偏則所至之不逺反復聖賢之典泛參百氏之書師事名儒以證所疑以質所見庶幾識斯道之全體明入德之大方事有大變則有以處之時有大幾則足以應之顧瞻海內之君子自治嚴密規摹廣大而進修不巳體用兼該本末具舉惟先生一人今屈於貧困寸步不能自致不獲以酬其所欲身雖在此而心則在函丈也某在天地間甚不足道亦知不肯為小人儒慨念往古道學素明到春秋時賢士大夫議論與夫經理其國尚有標置正學既晦人物便不耐檢點資稟粹溫者間有暗合古人仁心處尚足以維持國體使意脈未絶資稟竒偉者間有暗合古人仁政處尚足以把持事務使丗變未極更要進前擔負自應是去不得此某所以欲汲汲講究成巳之仁成物之知庶幾識古人所謂大學者今以乏財不得進拜函丈誰其成就之律曆兵法要識端涯莫指其蹤古今損益大變職分所當急朝夕看諸儒之論以巳見揣摩迄不知其旨鄉間諸賢無有收而教之者只得將六經涵泳耳某聞明學問之全體而後可以底夫大成蓋知至其所至而不能終其所終者有矣未有不知至其所至而能終其所終者也孔門之髙弟若子夏子遊子張止於有聖人一體則造夫全體者寧有幾人然全體之不知則有同門異户之患雖欲有其一體不可得矣古之君子所以終日孜孜惟恐學不足以知性命之正才不足以成天下之務識不足以周萬物之情者以為不如是則有所偏倚而無以立乎其大者也大者之不立猶不登泰山無以見天下之小不遊大海無以見衆流之同歸一源所存既卑安藜藿之井難語太牢之味固有以聰明為障思慮為賊自以為見性成佛終不明寂然不動之體也以智力之所操持謀略之所駕馭自許以致功立業終不明行所無事之知也涉獵先民之論泛觀古今之書自許以博學多聞終不知皮之不存毛將焉傳也夫是之謂無以立乎其大者也若知從事於其本而以道之全體為準的則學足以知性命之正必通乎死生之説而異端不能惑矣才足以成天下之務則坦然見王道之易行不至於不以堯之所以治民者治民矣識足以周萬物之情則所識前言往行無非畜德不至泛濫無統迄無立身之地矣君子反經而巳經正則由天下之正路而業可大也德可新也血氣有盛衰而與生俱生者未嘗變也所遇有窮逹在我未嘗有加損也智及乎此則可與造全體矣某雖昏蒙尚知自勉追懷古人夫豈無志今丗英才誰肯自卑今欲考百氏之同異收斂其偏以求其全鄉居僻陋書册無所取欲廣交四方之名人合其所長用以自反貧窶無資寸步不能自致深慮日月易流有負𥘉志結茅為庵以退為名奉親之暇涵泳六經退省乎日用之間自求日新之功庶乎有得焉耳敢望先生發揮其義來示備悉學者之志固不可不以逺大自期然觀孔門之教則其所從言之者至為卑近不過孝弟忠信持守誦習之間而於所謂學問之全體𥘉不察察言之也若其髙弟弟子多亦僅得其一體夫以夫子之聖諸子之賢其於道之全體豈不能一言盡之以相授納而顧為是拘拘者以狹道之傳畫人之志何哉蓋所謂道之全體雖高且大而其實未嘗不貫乎日用細微切近之間苟恱其高而忽於近慕於大而略於細則無漸次經由之實而徒有懸想跂望之勞亦終不能以自逹矣故聖人之教循循有序不過使人反而求之至近至小之中慱之以文以開其講學之端約之以禮以嚴其踐履之實使之得寸則守其寸得尺則守其尺如是久之日滋月益然後道之全體乃有所鄉望而漸可識有所循習而漸可能自是而往俯焉孳孳斃而後已而其所造之淺深所就之廣狹亦非可以必詣而預期也故夫子嘗以先難後獲為仁又以先事後得為崇德蓋於此小差則心失其正雖有鑽堅仰髙之志而反為謀利計功之私矣仁何自而得德何自而崇哉聊誦所聞以答下問之意至於庵記大字之需則非學之急亦老懶之所不暇也舒大夫向嘗相見於會稽所論未合今想其學益有成矣聞其政亦甚佳有本者固如是也不及為書因見幸略道意答王晉輔峴為學大槩且以收拾身心為夲更將聖賢之言從頭熟讀逐字訓釋逐句消詳逐㱼反復虛心量力且要曉得句下文意未可便肆巳見妄起浮論也答王晉輔示喻卒哭之禮近丗以百日為期蓋自開元失之今從周制葬後三虞而後卒哭得之矣若祔則孔子雖有善殷之語然論語中庸皆有從周之説則無其位而不敢作禮樂計亦未敢遽然舍周而從殷也況祔于祖父方是告祖父以將遷它廟告新死者以將入祖廟之意巳祭則主復于寢非有二主之嫌也主復于寢見儀禮鄭氏注至三年之喪畢則又祫祭而遷祖父之主以入它廟奉新死者之主以入祖廟此見周禮鄭注及橫渠先生説則祔與遷自是兩事亦不必如殷之練而祔矣禮法重事不容草草卒哭而祔不若且從溫公之説庶幾寡過耳答王晉輔自去秋冬及此開正三辱枉書皆無便可報無疑人來又承惠問尤以為慰訊後巳復改歲逺惟感時追慕孝履支勝熹病益深無可言者前書所論告子之説此等議論不須置意中亦不須容易與之辨論且只自家理會聖賢之所巳言而求其旨意之所在久之精熟自然見得是非不著問人矣大學巳領便中却欲更求十數本可以分及同志也太極西銘切不須廣蓋丗問巳自有本為此冗長無益於事或徒能相纍耳徐侍郎所欲鏤版之書恨未之見然此等亦不必看徒亂人耳且著實向裏就切近明白實處理會便不誤人也此間諸書南康板本成後亦無甚人修改處不知有黑點子者是何本也只看其間有大同小異處子細咨問季章參考得失便自見得若有所疑切冀見諭當為契勘奉報也南軒之書多未斷手而不幸即丗而或者不察一例流傳使人不能無遺恨所以前此為之刋削别為定本蓋推本其遺意非敢以私見輒有去取也如大愚之説兼看亦佳但其規模亦太闊逺不若且就本經文義上爛熟咀嚼之為愈也無疑人到多日偶以雪寒不能作書而其人不能久候口占布此殊不盡意正逺千萬節哀自愛答王晉輔荐承委喻極荷不鄙實以多病畏事不敢作文字以故前此不敢聞命今不獲巳輒以數字附于行狀之末少見鄙意然巳覺太露筋骨切告勿以示人恐彼此不穩便非獨罪戾之蹤為有害也向來子約每言鄉學之意甚美然於愚意竊恐務實之意未若好名之多學道之志未若為文之力此亦鄉黨習尚流風之弊其所從來也逺宜賢者之未免也自今以往更願反躬自省以擇乎二者之間察其孰緩孰急以為先後姑屏舊習而取凡聖賢之言若大學若論孟若中庸者朝夕讀之精思力行以序而廣使道義之實有以悅於心而充諸巳則自將無慕於外而所以顯親揚名者必有以異乎前日之為矣若以名位之為尊言語之為麗聞譽之為誇而汲汲乎伐石攻木以為事則是非獨老拙羞之抑子約平生所望於賢者亦將大不滿於泉下矣所喻鄙文何乃為此曲折巳託劉季章言之此豈止載禍相餉而巳耶答王晉輔所喻跋語今再寫去臨川者亦纍問不得報此書度巳浮湛不可得矣今亦不須問也疑義足見向學之意墓祭不可考先儒説恐是祭土神但今俗行拜掃之禮其來巳久似不可廢又墳墓非如古人之族葬若只一處合為一分而遙祭之亦似未便此等不若隨俗各祭之為便也其他闕文數處或是或否皆非講學之急務况集注中又巳有説甚明自可觀考不必問也畏縮之説蘇黃門亦云然非本文之意兼集注中亦巳有定論禮書縮訓直者非一它日當見之乃先儒之舊不可易也范碑曲折嘗以鄙意請於益公未蒙剖決然此公揚歷之久更事為多必有見處後生况亦未須遽論此事豈可因此便議前輩之失非所以致敬於逹尊也程紏所編年譜是終身看得此事不透深可憐憫渠元不曾寄來却是身後為人在廣州鏤版方得見之甚恨不得及早止之做此話欛沒了期也然世間識者亦少但恐後丗有明眼人指點出來耳吾友今亦未須理會此等且理會自家著緊切身要用底道理久之見識漸明履踐漸實自不𬒳人瞞亦不須與人辨論紛爭也季章耿介於人有責善之益重九後若未來可力致之逸居獨學無師友之益不知不覺過失日滋功夫無由長進不可忽也景陽悼亡可念才臣書未到巽伯亦未有人來書寄婺女迂回難通今後只託人寄臨川劉教授處可也不知渠書中有何説每念仁里諸賢相與甚至而未得與之痛相切磨悠悠歲月日益晚暮良以為恨如無疑亦然也因見各煩為致此意答杜仁仲良仲自頃聞昆仲之名而願得一見久矣中間僅得識良仲之面而於仁仲尚復差池至今為恨兹者乃承不鄙致問許以來辱此意厚矣然理義不外於吾身但能反躬力索毋使因循有所間斷則無不得之理孟子所謂歸而求之有餘師者此也願益勉旃以副此望異時有以自得之則雖相望之逺亦不異於合堂同席而居矣答杜仁仲示喻為學之意甚善操存舍亡此外無著力處但常切提撕勿計功效久當自得力耳理固不可以偏正通塞言然氣稟既殊則氣之偏者便只得理之偏氣之塞者便自與理相隔是理之在人亦不能無偏塞也橫渠論受光有大小昏明而照納不二其説甚備可試考之人心道心不能無異亦是如此然亦不須致疑但惟精惟一是著力要切處耳魂魄之説極詳密矣文叔書中亦論此巳答之可取一觀來喻得失亦巳具其中也答杜仁仲得文叔書具道才質之美恨未一見兹辱惠書喜聞比日所履佳勝示喻為學之意甚善若果見得端緒常切提撕不少自恕則氣質昏弱非所病矣千萬勉旃少副所望答杜仁仲良仲示喻敬字工夫甚善凡聖賢之言皆貫動靜如云求其放心亦不是閉眉合眼死守此心不令放出也只是要得識此心之正如惻隱羞惡之類於動靜間都無走失耳所論氣稟有偏而理之統體未嘗有異亦得之明道又謂不可以濁者不為水亦是此意也但謂神即是理却恐未然更宜思之仁仲所論朝聞夕死則愚意見得二先生之説𥘉不甚異蓋道即事物當然不易之理若見得破即隨生隨死皆有所處生固所欲死亦無害也答杜仁仲良仲前書所論數條皆善但更勉力研究玩味久之自然見處明白踐履從容不費安排仁仲蓋有意於切問近思之學者然亦便如此不得更須博之以文始有進步處耳答杜仁仲良仲所示疑義巳附已意於其後試詳考之更加虛心遊意反復玩味久當自釋然也仁仲反躬克巳之意甚切雖未知所病者何事然既知其病即內自訟而亟改之耳何暇呫呫誦言以咎既往之失而求改過之名哉今不亟改而徒言之又自表其未有改之之實也則是病中生病名外取名不但無益而已五行之神神是理之發用而乘氣以出入者故易曰神也者如萬物而為言者也來喻大槩得之但恐却將神字全作氣看則又誤耳明道云生之謂性一條明道此章內性字有指其墮在氣質中者而言有指其本原至善者而言須且分别此一字令分明不差方可子細逐項消詳今來喻大槩蓋巳得之只其間有未細密處且更虛心玩味久當益精耳繼之者善易中本指道化流行之妙而言此却是就人身上指其發用之端而言如孟子論性善只以情可為善為説蓋此發用處便見本原之至善不待别求若可别求則是人生而靜以上却容説也孟子所論天下之言性者則故而巳矣亦是此意更詳之所云水之方分派者未曉來意恐非明道之本旨也答杜貫道讀書課程甚善但思慮亦不可過苦但虛心遊意時時玩索久之當自見縫罅意味持守亦不必著意安排但亦只且如此從容才覺散漫即便提撕即自常在此矣答杜貫道節次示及諸説皆善但不巳其功久之見處漸分明矣其間雖有小禾通處今亦不暇一一條析奉報也致道歸草草附此作書多不能詳細仁里諸賢多得相處但賢者與良仲仁仲未得一見耳或能相與一來大幸靣見指説殊勝書問往還也答池從周前此辱書未報今又承惠問尤以愧感詢及所疑足見嗜學之意但讀論語大學亦是𥘉學門户且得如此向前更有多少功夫豈可便慮其雜但此二書亦須反復熟讀著力研究乃可見其意耳所問論語首章但將所學反復思繹常切遵行便是時習習之之久自有説處此只是為學實事别無深逺旨趣也泛愛雖非初學之切務然既與物接若都恝然與之相忘亦非義理自是須泛愛也觀賢者之意似只欲以兀然自守為是故所論每每如此願少恢廓之不然只終不免於昏陋狹隘而無所發明也答胡文叔璟承書喻及先世交遊之好不勝感愴三復書詞乃知有志傳家之學又以為慰今世徇俗為人之學固不足道其稍知用心於內者往往又以􅕽於髙逺而失之是可歎也來喻之云似巳察於此者但常專心致志思繹踐行有疑則與同志講而明之則庶乎其有得矣答潘坦翁履孫集注解多聞擇其善者而從謂所從不可不擇多見而識謂善惡皆當存之以備參考某恐經文止曰識之未有皆存善惡以備參考之意本文之義只如此不容别為之説蓋擇字生於從字識則未有便從之意故不言擇善也子與人歌而善程子曰歌必全章也與割不正不食席不正不坐同某未曉其義反之猶言從頭再起也若只就中間接續便和則不成全章矣故必使其歌巳畢從頭再起然後和之則得全章程子意蓋如此然某意亦恐未盡也師摯之始關雎之亂某謂亂者指其成言之爾蓋樂章至亂而始成不要其成無以見其美盛爾非專指亂而言也此等處今不得聞古人之樂難以深論且如集注大槩説過可也不踐迹一章集注曰善人質美而未學者也某謂質美故不為惡未學故不能知古人所以行者而踐之惟其不踐迹故亦無自而入於室也集注用程張二先生説其理甚精恐非如來喻之云也更詳之答奚仲淵示喻所聞足見志道躬行之實慰幸歎仰蓋不勝言但孟子論浩然之氣是集義所生非謂集義於此以養彼浩然之氣也又謂不必於應用處斟酌是否亦恐未免離內外判心迹之病聖賢所謂義者正欲於應用處斟酌耳但日用功夫自有先後緩急不可先其細者而緩於大體恐仲淵意是如此若其不然恐更合商量也義理之間誠當明辨然非有格物致知與敬以直內之功則亦難明而易失來喻所謂熟處難忘者恐坐此也然亦學者之通患如熹正苦此而未能自脫耳伯起舊遊每病其不以此事為急今乃能勇猛精進如此人固未易量也計左提右挈長者之力為多異時歸老田間復得此一益友為幸甚矣趙德廣在此日相見殊愧不能有以發其志意者昨見所與渠書當知所以自勉也答黎季忱示及兩卷各巳批注封還幸細考之語孟更須寬心細意看令通徹易則恐未易讀如此穿鑿似枉費心力也蓋易本卜筮之書故先王設官掌於太卜而不列於學校學校所教詩書禮樂而巳至孔子乃於其中推出所以設卦觀象繫詞之旨而因以識夫吉凶進退存亡之道蓋聖人當時巳曉卜筮之法與其詞意所在如説田狩即實是田狩説祭祀即實是祭祀征伐昏媾之類皆無非譬喻也故就其間推出此理耳若在今日則巳不得其法又不曉其詞而暗中摸索妄起私意竊恐便有聖賢復生亦未易通與其虛費心力於此不若且看詩書禮樂之為明白而易知也然大學論孟中庸又在四者之先須都理會得透徹方可略看易之大指亦未為睌今所論論語尚爾未通豈宜遽及此耶答傅敬子昨承逺訪别來又巳纍月辱書欣審比日所履佳勝講學須且著實自家理會寬著意思涵泳思索方能有得如今來所喻亦須且自看有疑處方好商量若只如此泛問不濟事又所記心性之語亦似語脈中不無差誤今不省記當時如何説也所欲大字及二卦説尤是兒戲若真實做功夫何用此等裝飾耶答傅誠子兹承惠書足見好學之篤巳足為慰矣比想冬溫所履佳勝所示疑問皆有急迫之意此最為學之害須且放下只平平地讀書玩味其意理會未得處且記著時時拈起看恐久之須有得力處若只如此枉費心力不濟事也幾微之間善者便是天理惡者便是人欲才覺如此便存其善去其惡可也何難剖析之有第二條亦不須得如此理會且討箇書讀換却許多勞攘久之須放得下第三條既知得大有妨害便掃除了何問之有如此紛紜自作纒繞無了期也答高國楹所喻不能處事乃學者之通病然欲别求方法力與之競轉成紛擾而卒無可勝之理不若虛心讀書觀理收拾念慮使之專一長久則自然精明而此病可除矣但讀書亦有次第且取其切於身心者讀之若經理丗務啇略古今竊恐今日力量未易遽及且少緩之亦未為失也答常鄭卿聞學中諸事漸有條理尤以為喜學校規矩雖不可無亦不可專恃須多得好朋友在其間表率勸導使之有鄉慕之意則教者不勞而學者有益今得擇之復來則可因之以招致其餘矣鄙意又恐更須招致得依本分識道理能作舉業者三數輩參錯其間使之誘進此一等後生亦是一事但此須緩緩子細圖之恐其間有趨向不同反能為害則不濟事也頃年又見黃叔張在此作教官時教小學生誦書旬日一試如答墨義然立定分數考察去留似亦有益小學教諭見無職事可掌使任其責似亦兩便試推此類多為之塗以收拾教養之則人情感恱當無扞格之患矣答李晦叔輝所説工夫亦且如此做去看久逺如何有疑却喻及吳掾亦聞其人相處有何議論邪隆興江法曹有書寄渠處必時有便也其人清苦力學但溺佛好穿鑿耳令弟今在何處前得其書未能别答所論顔子凖的甚善但難如此泛論須子細説出日用工夫次第曲折方見得是非耳幸以此意語之也答李晦叔所論持敬讀書表裏用力切須實下功夫不可徒為虛説然表裏亦非二事但不可取此而舍彼耳其實互相為用只是一事才説性字便是以人所受而言此理便與氣合了但直指其性則於氣中又須見得别是一物始得不可混并説也江掾所言物性本惡安有是理來諭巳得之矣更切涵養為佳耳答李晦叔持敬讀書只是一事而表裏各用力耳若有所偏便疑都不曾做工夫今且逐日著實做將去未須比量難易計較得失徒然紛優不濟事反害事要令日用之間只見本心義理都不見有它物方有得力處耳所問祭禮各以所見報去可更詳之聞户曹多學禮説唐人議論可試扣之可檢看也江法掾清苦力學不可多得人之所見要亦未能盡同但偏執不通輕於述作此為大不便耳程氏祭儀謂凡配止以正妻一人或奉祠之人是再娶所生即以所生毋配輝竊謂凡配止用正妻一人是也若再娶者無子或祔祭别位亦可也若奉祀者是再娶之子乃許用所生配而正妻無子遂不得配享可乎程先生此説恐誤唐會要中有論凡是嫡母無先後皆當並祔合祭與古者諸侯之禮不同古今家祭禮中亦有此假但恐彼無本耳夫主不可以二者也四明髙氏之説云耳輝詳此意謂有宗子之家主祭故庶子止以其牲祭于宗子之家可也是不可以有二主也今人若兄弟異居相去遼逺欲各祭其父祖亦謂不可以二主乎兄弟異居廟𥘉不異只合兄祭而弟與執事或以物助之為宜向見説前輩有如此而相去逺者則兄家設主弟不立主只於祭時旋設位以𥿄榜標記逐位祭畢焚之如此似亦得禮之變也更詳之魏公贈諡只告于廟疑為得禮但今世皆告墓恐未免隨俗耳更冀裁之大抵讀書當擇先儒舊説之當於理者反覆玩味朝夕涵泳使與本經之言之意通貫浹洽於胸中然後有益不必段段立説徒為觀美而實未有得於心也答李晦叔所問數條大槩相類只是所從言之不同其實則無異義但虛心遊意兼存而並觀之久當自見其實固並行而不悖也程子不得於言之説恐記者之誤不必深疑吕后稱制武氏革命事體不同自分明光武追廢自其私意不得為中理也答李晦叔范氏曰聖人同於人者血氣也異於人者志氣也血氣有時而衰志氣則無時而衰也先生於集注中去却上句血字及下句氣字然今南康所刋本又却仍舊從范説不知如何氣一也主於心者則為志氣主於形體者即為血氣范氏本説蓋如此向來誤去其本文兩字後來覺得未穩故改從舊説集注解不知命無以為君子謂知有命而信之人不知命則避害趨利何以為君子而解公伯寮訴子路章乃云聖人於利害之際則不待決於命而後安二説似相反某謂公伯寮章指聖人言所以不決之於命而此章乃為欲為君子者而設不知如何來説是也上蔡説得此意思好語録中有之肌膚之會筋骸之束乃是持敬用力之久便覺得身心如此東萊謂操存則血氣循軌而不亂收斂則精神內守而不浮恐是此意某尋常試之誠覺得如此然於閙處又却不然東萊此説是也然不當作兩句看此處只是放去收來頃刻間事只一操字巳是多了不須如此著意安排也先生頃者次對實以侍講之故除此與伊川除説書而授朝官者何異伊川罷説書而辭朝官先生罷侍講而辭待制事體實同伊川素不曽陳乞封敘先生既用次對奏薦又却力辭職名學者多未喻陳和父以為伊川出處與先生不同居其位則受其恩數乃理之常至他日不合而去但當辭其職耳不當并辭恩數也不知如何此事不敢自分踈後世須自有公論也子事父母劉元承所編二先生語録謂婦拜於堂下子不當拜於堂下蓋父子主恩婦乃義合子婦一例恐不當有分别溫公祭畢獻壽雖言敘立如祭所之位而不言升降恐亦皆在堂上也為長子三年及為伯叔兄弟皆期服而不解官為士者許赴舉不知當官與赴舉時還吉服耶衰服耶若須吉服則又與五服所載年月有戾矣此等事只得遵朝廷法令若心自不安不欲赴舉則勿行可也當官則無法可解罷伊川先生看詳學制亦云不禁冒衰守常此可見矣但雖不得不暫釋衰亦未可遽純吉也答李晦叔大學或問中隂陽五行之説先生答黃寺丞云隂陽之為五行有分而言之有合而言之輝嘗推之云云分合之説固如此然就原頭定體上説則未分五行時只謂之隂陽未分五性時只謂之健順及分而言之則陽為木火隂為金水健為仁禮順為智義或問曰然於其正且通之中又或不無清濁美惡之異故其所賦之質又有智愚賢不肖之殊輝竊嘗謂命可言所賦性可言所受而智愚賢不肖是其所稟之氣有清濁美惡之不同也先生却以智愚賢不肖不歸於所稟而歸於所賦何耶賦猶俗語云分俵均敷之意書傳之説或以性言或以形言當隨處看或問曰然而本明之體得之於天終有不可得而昧者是以雖其昏蔽之極而恍惚之間一有覺焉則即此介然之頃而其本體巳洞然矣輝竊詳數句只是發明本明之體終有不可得而昧之意若就學者用工夫上説則恍惚之間斷無自覺之理須是格物致知誠意正心修身功夫次第曲折然後本明之體可得而明若是冥然都無覺處則此能致知者是何人耶此是最親切處所宜深察答李晦叔輝曩者因舉肌膚之會筋骸之束兩句竊意謂與東萊所謂操存則氣血循軌而不亂收斂則精神內守而不浮正是此意先生批誨云此説是也然不必作兩句看輝因思之未見有重疊處此等處只是間説不須著力更下注腳枉費心力先生又批誨云此處只是放去收來頃刻間事只一操字巳是多了不須如此著意安排也輝竊謂心之存亡出入特繫於人之操舍如何耳但聖人則不操而常存衆人則操之而後存也先生云只一操字巳是多了輝久而未喻近者看龜山解七十而從心所欲之義謂聖人從容中道無事乎操然後始悟先生批誨之意正是為巳存者設若心不能無放則固不可不操但太著意安排是助長也未審先生以為如何此是至親切處龜山之説亦不謂此須反之於心只就放去收來時體看只此操時當處便存只要功夫接續不令間斷耳輝竊嘗謂學者却須當常存此心於莊端靜一之中母使一毫私意雜乎其間則方寸之間自有主宰不致散漫走作而虛靈洞徹之本體庶乎可以默識矣然欲真實識其虛靈洞徹之本體則又須是日與義理相親克去巳私然後心之本體可得而識罷却許多間安排除却許多間言語只看操則存一句是如何亦不可重疊更下注腳輝竊嘗謂自昔明明德於天下者亦須由格物致知功夫次第曲折然後始能自明其明德也今使天下之人皆有以明其明德便能各誠其意各正其心各修其身各親其親各長其長而格物致知之功略不煩於用力焉豈不墮於不擇其本而直圖其末之弊若欲正心誠意須是格物致知然若説道各格其物各致其知則似不成言語只得如此説過如云一是皆以修身為本豈是刪了上四事耶或問曰但其氣質有清濁偏正之殊物欲有淺深厚薄之異是以聖之於愚人之與物相與懸絶而不能同耳輝竊詳此假所説氣質物欲分聖愚人物處似覺可疑若以清濁分聖愚偏正分人物則物欲厚薄淺深一句復將何指若謂指聖愚則聖人無物欲之私若謂説人物則物又不可以淺深厚薄論未曉清濁偏正等説乃本正蒙中語而吕慱士中庸詳説又推明之然亦是將人物賢智愚不肖相對而分言之即須如此若大槩而論則人清而物濁人正而物偏又細别之則智乃清之清賢乃正之正愚乃清之濁不肖乃正之偏而橫渠所謂物有近人之性者又濁之清偏之正也物欲淺深厚薄乃通為衆人而言若作有無則此一等人甚少難入羣隊故只得且如此下語若以為疑則不若改聖字作賢字亦省得分解而聖人自不妨超然出於其外也橫渠先生曰祔葬祔祭極至理而論只合祔一人夫婦之道當其𥘉婚未嘗約再配是夫只合一娶婦只合一嫁今婦人夫死而不可再嫁如天地之大義然夫豈得而再娶然以重者計之養親承家祭祀繼續不可無也故有再娶之理然其葬其祔雖為同穴同几筵然譬之人情一室中豈容二妻以義斷之須祔以首娶繼室别為一所可也輝頃看程氏祭儀謂凡配用正妻一人或奉祀之人是再娶所生即以所生配輝嘗疑之謂凡配止用正妻一人是也若再娶者無子或祔祭别位亦可也若奉祀者是再娶之子乃許用所生配而正妻無子遂不得配享可乎先生答云程先生此説恐誤唐會要中有論凡是嫡毋無先後皆當並祔合祭與古者諸侯之禮不同輝竊疑橫渠乃是及至理而論不得不然若欲處之近人情只合從先生所答夫婦之義如乾大坤至自有等差故方其生存夫得有妻有妾而妻之所天不容有二况於死而配祔又非生存之比橫渠之説似亦推之有大過也只合從唐人所議為允况又有前妻無子後妻有子之礙其勢將有甚杌隉而不安者唯葬則今人夫婦未必皆合葬繼室别營兆域宜亦可耳問缺理固如此然須實用其力不可只做好語説過人當有以培養之然後積漸純熟向上有進步處答余國秀宋傑所謂貼裏者但謂不可向外理會不干巳事及求知於人之類耳若學問之功則無內外身心之間無粗細隱顯之分𥘉時且要大綱持守勿令放逸而常切提撕漸加嚴密更讀聖賢之書逐句逐字一一理會從頭至尾不要㨂擇如此久之自當見得分明守得純熟矣今看此册大抵不曾著實持守而遽責純熟之功不曾循序講究而務極精微之藴正使説得相似只與做舉業一般於巳分上全無干涉此正不貼裏之病也以下數假皆是此病不能一一論辨也宋傑嘗謂聖人之道簡易明白而學者所以處巳接物大抵以和為貴故每覺有順從苟且因循之失然才著意舉一二事又覺有矯枉過正之病既知如此便速改之何問之有凡事亦自有恰好道理更精察之則無過直之弊矣宋傑竊惟古人多處貧困而泰然不以纍其心不知何道今值窮困若一切不問則理勢不容巳若欲辨集則未免有屈志􅌤顔之事窮須是忍忍到熟處自無戚戚之念矣韓退之盛山詩序説玩而忘之以文辭也云云文辭淺事苟能玩而樂之尚可以忘仕進之窮通況吾日誦聖賢之言探索髙逺如此而臨事全不得力此亦足以見其玩之未深矣答余國秀始嘗推測人之身所以與天地隂陽交際處而不得其説既讀太極圖説其中有云人物之始以氣化而生者也氣聚成形則形交氣感遂以形化竊謂交際處於此可見然形化既定雖不復氣化而大化之流行接續如川流之不息凡飲食呼吸皆是流通處此身雖由父母生而莫非天地隂陽之化此其所以有天地具情性而可以參天地贊化育也歟其大槩來歷固是如此然須理會得其性情之德體用分别各是何面目始得須逐一體認玩味令日用間發見處的當分明也又嘗因推測人之身而并及於物以至動植之殊各極其本原而察之竊謂隂陽五行之氣化生萬物其清濁偏正之不同亦從𥘉有定而其後大化流行亦不能變易如人之必為萬物之靈麟鳯龜龍之靈知猩猩鸚武之能言之類皆是從𥘉如此後來亦如此以身而言則所以為耳目鼻口四肢百體者皆有當然之理以至為衆人為百物皆然不可不一一辨别得非是只要如此推説也竊嘗因求放心而謂視聽思慮由巳時是心存不由巳時是心放李敬子以為合理時是心存且謂某有認氣為心之病孟子説存其心養其性只是要人常常操守此心不令放逸則自能去講學以明義理而動靜之間皆有以順其性之當然也竊謂人性本具衆理本明萬善由氣質物欲之雜所以昏蔽上智之資無此雜故一明盡明無有查滓中人以降必有此雜但多少厚薄之不同耳故必逐一求明明得一分則去得一分之雜直待所見盡明所雜盡去本性方復學者體此以致復性之功不知如何此説是但須是實識得其裏面義理之體用乃為有以明之不可只如此鶻突説過也舜聞一善言見一善行若決江河恐只是無氣稟物欲之纍故吾心之理與聞見吻然相契其決如此顔子不違如愚亦是如此若子路有聞云云則其立志雖勇然用力亦似覺難恐亦未免為氣稟物欲所纍也同上氣稟物欲均為害性然物欲之害易見氣稟之害難知然氣稟有二若昏而不明則隨所學可以漸進於明若偏而不中則強者只見得聖賢剛處弱者又只見聖賢寬和處不知如何所學漸明則所偏亦當漸覺矣體察情之動處為學功夫固當有先後然亦不是截然今日為此明日為彼也且如所謂先明性之本體而敬以守之固是如此然從𥘉若都不敬亦何由得有見耶先生序此四者為格物之先竊謂學者欲從事於學必先明乎此而後進學之功有實地之可據苟為不然則終覺散漫無統而所學終無所歸宿矣或問中此段只是説從自已身心上推去到事物上都有許多道理但要逐節逐件識得不是只要如此包説也答李敬子燔余國秀宋傑一本無余國秀燔氣質躁迫每於先生強探力取之戒積漸㴠泳之訓玩味用功但臨事時終覺為害今只靠定視聽言動常於此四事上著力又以義理融液之頗覺得力然後是病根常在不須如此做伎倆但才覺時便克將去莫更計較功效遲速也後假放此燔竊謂顔子四勿今人非不𣣔如此只為不知其孰為禮孰為非禮顔子所以才聞克復之語便知請問其目才聞四勿之語便承當去雖是資質絶人亦必是素於慱文約禮上用功今之學者且先以博約為先而四勿之戒隨其所知施之應酬漸漸望其貼近庶有實效既知如此何不用力然博文約禮亦非二事而異時之深純亦不外乎今日之勉強也燔竊妄謂性之者多由內以逹諸外而自不廢夫在外之功反之者多資外以養乎內而始有契夫內之理如顔子之四勿曾子之三省與夫博文約禮動容正顔之事皆資外養內之事也今之學者唯當悉意於此勿之省之亦由內要之內外不是判然兩件事也燔竊謂先生教人只是欲人持敬致知克巳以復其性其間條目却自多端自做功夫看即自見得不須如此泛問也燔謂敬齋針後面似少從容意思欲先生更著數語使學者遵守庶幾無持之太甚轉不安樂之弊前巳言之矣燔祖妣捐棄朋友以劉輝嫡孫承重事見告遂申州以請于朝續凖報許後見范蜀公亦嘗論及乃知輝非苟然者而舜弼始終以為此事只當從衆今事巳無及但朋友間不幸而值此不知當如何若父是祖之嫡長子巳是父之嫡長子即合承重無疑如其不然則前日之舉為過於厚亦不必以為悔也朋友之問則但當以禮律告之不可使人從巳之誤也當言循理守法不當言從衆燔嘗疑伊川平日斷不肯與人作墓志不知其意何在至太中及明道又却用之而其叔父姪女之類亦復自作何也伊川先生𥘉無斷不作志之説疑以不能甚工於文又或未必得其事實故少作耳集中亦有叔父墓志者施之於家可無前二者之慮也燔家中舊有祖産今欲稟家叔諸房各以人口多少備辦經用儲之堂前以為久逺團欒之計然衆志難諧未有所處諸位各辦歲計其力不能辨者如之何此須熟慮博訪其宜不可草草也燔免喪之後親戚朋友勸以赴部以病不能行或以為教官可以請祠燔欲姑守前志且為養病讀書計未知不仕之意有何義理只可自以大義裁之不須問人亦非它人所能決也若無正定義理則為貧而仕古人有之不須如此前郤也燔嘗謂欲君德之美當重保傅之選欲士風之美當正教取之法欲吏道之良當久其任欲民俗厚當興禮樂欲強甲兵當倣寓兵之意欲足財用當急農桑之務大槩是如此然須更讀書窮理博觀古今聖賢所處之方始有實用不為空言也燔謂後世人才不振士風不美在於科舉之法然使便用明道賔興之論伊川看詳之制則今之任學校者皆由科舉而出亦豈能遽變而至道哉明道所言始終本末次序甚明伊川立法姑以為之兆耳然欲變今而從古亦不過從此規模以漸為之其𥘉不能不費力矯揉久之成熟則自然丕變矣燔謂釋老之學所以舛謬只緣未能致知但據偏見直情徑行所以與吾道背馳使其能求通於聖人則其所至豈小小哉又嘗求二氏之學所以盛衰之故釋氏主於心緣其就根本上用力故久而愈熾老氏主於身緣其所執亦淺狹故久而微削且熟觀義理久之自然精密未須如此樁定死法也燔外家司姓外祖早丗外曾祖復子一戴姓者戴死無子只一女舅氏為之服三年喪且合葬祖塋祠之家廟屢稟之舅氏遷戴氏葬之它所改外祖合葬外不是祖母之側除戴氏之享使其女主之量分産業使之備禮事今雖未行而朋舊多以為然續又思之云云𥘉説甚善然亦有一句未是以河廣之義推之可見又思以下則又過矣不共戴天謂父母見殺而其人不死者耳移之於此似非其倫若果如此則禮經何為而制服邪夫死而嫁固為失節然亦有不得已者聖人不能禁也則為之制禮以處其子而母不得與其祭焉其貶之亦明矣燔見朋友間多有增親年以希恩霈者且悔之又恐兄弟間有堅欲陳乞者燔以為不若作一狀子刺破乞備申省部照會方為堅決兄弟若𣣔陳乞但委曲為陳不可誣親以欺其君之意足矣何必作此痕迹邪燔因與朋友論及冒貫赴試事以為豈可不攻獨國秀以為不須攻幸一言以定衆志不知要如何攻若只經官陳狀乞泛行約束即不妨若指名告示聚衆毆擊則非所宜矣燔竊謂明德新民不是自巳一切事都做了後方去新民隨所及所值而為之耳兩語有病至善乃萬理盡明各造其極然後為至至善是自然底道理如此説不得為善如堯舜文王之為聖湯武之為征伐周公之為臣孔子之為師伊尹之為志顔子之為學又謂至善在巳則為天命之性在事則為率性之道推之天下則為修道之教此聖人之事也若學者則就教上尋求向上去到得極處皆只一般元無加損説得未是亦不須如此間説知止能得燔嘗謂洞然無蔽之謂知確然有實之謂得明則誠矣近之但語未瑩知善之明也得身之誠也近之慮謂知之尤精而心思所值無不周悉是燔謂知止則志不惑亂而有定嚮志定則此心無擾而靜心靜則此身無適而不安心靜身安則用自利事物之來不特能即事見埋又能先事為防如後甲三日後庚三日之云其於事之終始先後已至未然皆無遺鑒皆無失舉矣如是而後為得其所止則可以謂之誠有是善而誠極是矣此假得之燔謂知則知其所當然慮則并極其未然知是間時知得慮是到手後須要處置得是燔謂知止有明而未誠處得止則一一皆誠矣到得至誠田地上靣更有變化不測在未須如此間思想看文字且理會當處義理漸覺意味深長乃佳如此支離不濟事也燔謂大學之意當持敬以養其所知之本格物以廣其所知之端使吾心虛明洞徹舉無不燭則是非當否各以呈露而至善所在自不容有所蔽矣周舜弼以謂知止者非萬理併皆昭徹然後謂之知止一事便有一理即其所知而求得其所止所謂能得者非是動容周旋各當其則一事得其所止如仁敬孝慈之類皆為至善若必以動容周旋當則言之則將使學者沒世窮年無復可以知止而得其所止矣經之所言是學之等級然知有淺深得有大小存乎其人難以一槩論也物有本末本末燔謂先後之中更有輕重本末之先後重始終之先後輕不須如此分别枉費心思道理又不如此無益而有害也燔謂注文於明明德於天下者之下似少自巳推之之意經文次序巳自詳悉何用更説或問于明明德於天下處只言誠意正心修身而不及致知又益以親親長長而不及齊家治國平天下願聞其指致知所以明之親親長長即齊家之大者平天下之事蓋新民之極功則用益廣而法宜益詳今考傳文則皆感發維持之意而不及乎它似未免乎略平天下章以潔矩推之而詳言同貨利公好惡之事其法可謂詳矣何謂略耶大學傳九章其家不可教竊疑可字當為能字彼之不可教即我之不能教也可之與能彼此之詞也若作家不能教則不詞矣傳之九章大率皆躬行之事而未及乎為政八章亦然成教於國則政事之施在其中矣但須以躬行為本故特詳之本末輕重固自不同也宋傑嘗於親愛而辟上用功如兄之子常欲愛之如巳子每以第五倫為鑒但愛巳子之心終重於愛兄之子常欲二字即十起之心也須見得天理發見之本然則所處厚薄雖有差等而不害其理之一矣燔近於家間區處一二事便覺上下睽隔情意寖薄欲遂置而不問則諸事不整不知且只於身上自理會莫屑屑問它如何威如之吉反身之謂也宋傑嘗觀傳文論修身在正其心嘗每用力自克亦頗得力而敬子不以為然以謂若論是當須還是喜怒中節乃可然宋傑今日之所謂得力者仍是隨意之所便者以致力而實未深察夫不能自巳者也正心之功若自知至意誠中來則不須如此安排而自無不正矣未到此地則亦隨力隨分省察持守可也不須如此計較且向格物處用功乃為知所先後耳燔謂喜怒憂懼之氣心實帥之帥稍動搖氣不聽命則必有是四者之纍學者固當逐件上用功然非先正其帥亦未見其為全功也如此則與此傳文意全然背戾矣試更推之如何誠意謹其發正心存其體又曰誠意者實所發於我而我命之心正則不問寂感而本體常在兩條説意誠皆未安宋傑嘗觀傳之六章注文釋自欺謹獨處皆以物欲為言或問則兼氣稟言之似為全備此等處不須疑語意自合有詳略處也宋傑竊謂動於物欲而假善以自欺易識而易治雜於氣稟而為善之不切難識而難治欲得精察氣稟之為害而克治之當以何道考之經文可也燔居常好善惡惡覺得直是分明然或至自傷其和而施之於人亦多強猛固必而無容養之意夫好惡真切如此而病復隨之者何哉此等處自覺是病便自治之不須問人亦非人所能預也康叔臨淵以為一物格則一知至燔謂所謂物格者乃衆理俱窮相發互通以至透徹無復餘藴然後為格若謂一物明一知進則可一物格一知至則不可伊川先生曰今日格一件明日格一件叔臨又謂或問所謂內外昭融內謂理之在巳者外謂理之在物者內謂理之隱微處外謂理之周遍處燔謂釋氏不務格物而但欲自知故一意澄定而所見不周盡吾儒靜以養其所知之本動以廣其所知之端兩者互進精密無遺故所見周盡而有以全其天然自有之中大槩近之然亦未盡或問所謂詣其極而無餘隨所詣無不盡燔謂詣其極猶渠成隨所詣猶水隨渠至譬喻未精然亦不須如此模寫程先生説學者之知道必如知虎者燔謂不待勢法迫驅而自不能巳無所為而樂於為之者真知者也然知而習習而熟又精思而後浸得其真非一知即能洞徹也此亦以中人言之前巳略論之宋傑讀書遇曉不得處即掉下再三讀之竟不曉即置不復問不知其病何在其病在是論古今人物而别其是非宋傑人之過惡豈可輕論但默觀之而反諸巳或有未明則密以資於師友而勿暴於外可也論天地之所以高深燔天之外無窮而其中央空處有限天左旋而星拱極仰觀可見四遊之説則未可知然曆家之説乃以算數得之非鑿空而言也若果有之亦與左旋拱北之説不相妨如虛空中一圓毬自內而觀之其坐向不動而常左旋自外而觀之則又一靣四遊以薄四表而止也康節天地自相依附之説燔以為此説與周子太極圖程子動靜無端隂陽無始之義一致非曆家所能窺測康節之言大體固如是矣然曆家之説亦須考之方見其細密處如禮記月令疏及晉天文志皆不可不讀也近見一書名天經只是近世人所作然類集古今言天者極為該備不知曽見之否鬼神之所以幽顯上蔡云動而不已其神乎滯而有迹其鬼乎燔謂鬼雖為屈久而必散似無滯留於迹之理云云神顯而鬼幽上蔡滯而有迹之語誠如所論其它大槩亦是如此然夫子所以答季路之問者又所當思也小學注子事父母孫事祖父母同燔謂諸父諸母親同服同而不及之者何哉諸父異宫非可以遍詣而定省之且若如此則將不得專乎事父母矣此愛敬之等差也程先生齊不容有思之説燔嘗以為齊其不齊求與鬼神接一意所祭之親乃所以致齊也祭義之言似未為失不知其意果如何祭義之言大槩然爾伊川先生之言乃極至之論須就事上驗之乃見其實程先生云致知之要當知至善之所在如父止於慈子止於孝之類燔謂物之大旨各有精要若泛求之殆亦徒為紛紛無所底止伊川先生所論格物功夫數條須通作一義看方見互相發明處如此一條須與求其所以奉養溫清之法者通看也晦庵先生朱文公文集卷第六十二福州府學訓導鄭璉校六十二卷考異輔遺答張元德來書所論通復云云而誠無不貫下一本作故以為五行之性亦無可疑更請詳之太伯之事正也文武之事權而不失其正也此義並行𥘉不相悖若看未透且闕之亦無害若見得義理表裏洞然則自見得有下落矣荆公廟議亦須看得禮家文字熟後方見得無可疑者今人正欲廢稷不祀賢者乃并嚳以上而遂之無窮此觀過於黨之論也答李晦叔橫渠先主曰附葬附祭云云不得配享可乎下一本有輝舊曽如此請問先生下無答字有後來拜領批誨云云諸侯之禮不同下有伏詳先生批誨巳自極合人情然橫渠所説又如此尋常舍弟亦疑祔祭之義為未安適與橫渠所論暗合輝竊疑橫渠云云只合從先生下無所答有説萬一從橫渠説則前妻無子而祀奉者却是再娶之子又將何以處之
