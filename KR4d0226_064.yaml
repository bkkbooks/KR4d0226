body:
  text: 書知舊門人問答答鞏仲至豐聞名碩見為日久矣茲辱枉顧乃遂夙心慰幸可量别後又承惠問并示武夷佳句獲聞于役之暇不廢山水之娛賦詠從容曲盡佳致尤以為喜比想巳還官次久矣霜寒之後繼以暄暖諒惟幕府有相起處多福熹衰病益甚最苦拘攣不能信詘起居動作皆有所妨樞帥經由以此不得敬謁然聞其寬和盡下想於賢佐必知所敬禮也昌父入城未歸計必還此度歲矣偶便寓此病軀憚於慿几口占不謹幸深原照答鞏仲至掌丞轉致近問獲聞比日春序浸暄幕府優遊起處佳福足以為慰熹衰病拘攣日甚一日死生長短本所不計但未死之前轉動不得亦令人無况耳告老之章州郡未肯騰奏雖荷其見憐不欲使觸禍機然鄙意巳決無所復顧為此宿留令人腹煩耳樞帥經由不及一見荷其答書之意甚勤繼此未敢為問往來多能道其政事之美而來書之所發明尤足起人意也子約子弟近得書云歲前明招大火其柩幾不免幸而獲全却不知其厚葬之説但得汪時發書似頗有所不快意不知曲折如何也叔昌老不長進亦是前日向外意多腳根不牢實耳輕棄簞瓢之句令人深省顧未知真樂所在則雖欲不棄而不可得此須别有箇著力處乃足恃耳武夷續詩讀之無非向來經行所歷景物宛然益歎摹寫之妙詩序縱橫放肆多出前人未發之祕但詆江西而進宛陵不能不駭俗聽耳少時嘗讀梅詩亦知愛之而於一時諸公所稱道如河豚等篇有所未喻用此頗疑張徐之論亦未為過至於寂寥短章間暇蕭散猶有魏晉以前髙風餘韻而不極力於當世之軌轍者則恐論者有未盡察也不審賢者雅意謂何所録警䇿二卷者亦可使得一見耶此人還日幸望録寄千萬之望貴眷郎娘一一佳𥙿貌輩蒙問感感昌父昨日得書巳到家矣寄詩甚冨孤瘦亦益甚矣憲臺王幹前日過此嘗託致區區今有一書與之煩為轉達書中囑渠一二事幸為扣其可否以語直卿也答鞏仲至稍不聞問巳劇馳情昨日遞中奉告之辱獲審比日春和幕府多餘體履佳適良以為慰録寄舊詩得以快讀雄麗精切歎服深矣簞瓢之句得其全篇又深感慨也但梅詩之評未能盡解當俟得所集録始敢扣也張巨山乃學魏晉六朝之作非宗江西者其詩間淡髙逺恐亦未可謂不深於詩者也坡公病李杜而推韋栁蓋亦自悔其平時之作而未能自拔者其言似亦有味不審明者視之以為如何也無由靣論臨風快想因來更望切磋究之老病久已無復此夢亦聊以暇日銷憂耳告老之章已上但已差晚為可恨故舊諸賢不得不任其責也留徐方脫囚拘彭曽幾墮輔處世途艱險吁可畏哉然亦何可避也答鞏仲至遞中兩辱惠書并有詩筒之况荷意勤矣又知小姪劉親皆以垂念之故得以竊食益深感愧信後清和恭惟幕府有相起處佳福所需惡語尤荷不鄙此於吾人豈有所愛但近年此等一切廢置向巳許為放翁作老學齋銘後亦不復敢著語髙明應巳默解不待縷縷自辨數也抑又聞之古之聖賢所以教人不過使之講明天下之義理以開發其心之知識然後力行固守以終其身而凡其見之言論措之事業者莫不由是以出𥘉非此外别有岐路可施功力以致文字之華靡事業之恢宏也故易之文言於乾九三實明學之始終而其所謂忠信所以進德者欲吾之心實明是理而真好惡之若其好好色而惡惡臭也所謂修辭立誠以居業者欲吾之謹夫所發以致其實而尤先於言語之易放而難收也其曰修辭豈作文之謂哉今或者以修辭名左右之齋吾固未知其所謂然設若盡如文言之本指則猶恐此事當在忠信進德之後而未可以遽及若如或者賦詩之所詠歎則恐其於乾乾夕惕之意又益逺而不相似也鄙意於此深有所不能無疑者今雖不敢承命以為記然念此事於人所關不細有不可以不之講者故敢私以為請幸試思之而還以一言判其是非焉至於佳篇之貺則意益厚矣顧惟頓拙於此豈敢有所與三復以還但知贊歎而巳然因此偶記頃年學道未能專一之時亦嘗間考詩之原委因知古今之詩凡有三變蓋自書傳所記虞夏以來下及魏晉自為一等自晉宋間顔謝以後下及唐𥘉自為一等自沈宋以後定著律詩下及今日又為一等然自唐初以前其為詩者固有高下而法猶未變至律詩出而後詩之與法始皆大變以至今日益巧益密而無復古人之風矣故嘗妄欲抄取經史諸書所載韻語下及文選漢魏古詞以盡乎郭景純陶淵明之所作自為一編而附于三百篇楚辭之後以為詩之根本準則又於其下二等之中擇其近於古者各為一編以為之羽翼輿衛且以李杜言之則如李之古風五十首杜之秦蜀紀行遣興出塞潼關石濠夏日夏夜諸篇律詩則如王維韋應物輩亦自有蕭散之趣未至如今日之細碎卑冗無餘味也其不合者則悉去之不使其接於吾之耳目而入於吾之胸次要使方寸之中無一字世俗言語意思則其為詩不期於髙逺而自髙逺矣然顧為學之務有急於此者亦復自知材力短弱決不能追古人而與之並遂悉棄去不能復為况今老病百念休歇寧尚復語此乎然感左右見顧之重若以為可語此者故聊復言之恐或可以少助百尺竿頭更進一步之勢也來喻所云潄六藝之芳潤以求真淡此誠極至之論然恐亦須先識得古今體製雅俗鄊背仍更洗滌得盡腸胃間夙生葷血脂膏然後此語方有所措如其未然竊恐穢濁為主芳潤入不得也近世詩人正緣不曽透得此關而規規於近局故其所就皆不滿人意無足深論然既就其中而論之則又互有短長不可一槩抑此伸彼况權度未審其所去取又或未能盡合天下之公也此説甚長非書可究他時或得靣論庶幾可盡但恐彼時且要結絶修辭公案無暇可及此耳記文甚健説盡事理但恐亦當更考歐曾遺法料簡刮摩使其清明峻潔之中自有雍容俯仰之態則其傳當愈逺而使人愈無遺憾矣僣易併及愧悚之深不審明者於意云何亦幸有以反覆之也長溪王君之詩竟如何此有一黃子厚者其詩自楚漢諸作中來絶不類世人語人亦少能知之近以社倉出內譏察不謹狼狽憂鬱以至於死甚可傷也放翁詩書録寄幸甚此亦得其近書筆力愈精健頃嘗憂其迹太近能太髙或為有力者所牽挽不得全此晚節計今決可免矣此亦非細事也仙逰之政無人肯為推出此理勢之常無足怪者况在渠家法又自不當計此耶偶得浙漕去秋䇿問謾録去不知曽見之否清議固知不可泯滅然能出此亦不易也熹病益甚跬步不能自致而神昏氣痞支體酸痛殆非久作人間客者矣休致之請前月𥘉間附便以行至今寂然未聞可報恐所附人遲滯不達設更淹留當自有臺劾施行不待催督矣答鞏仲至久不聞問良以鄉往前日便中特承惠書具聞近况足以為慰訊後劇暑恭惟幕府有相尊履佳福熹衰病沈痼日甚一日告老之章且幸得請將謂世巳相忘然猶未脫誰何之域尸居餘氣何足加念彼亦正自過慮也逺承垂問深感愛念箋敬固非所敢當者然亦恨異時不得託名文集中耳修辭齋名本意乃如此然易之本旨自有先後前書固巳言之矣栗字再見虞書皆莊敬謹嚴之意以是名齋非徒有取於木也扁榜便欲為書隅數日臂痛不能運筆且當少須也説詩之繆甚愧率爾然後來細讀前後所示諸篇始能深味雋永之趣蓋巳自成一家之言矣豈當復有所措説於其間哉但來書所論平淡二字誤盡天下詩人恐非至當之言而明者亦復不以為非是則熹所深不識也夫古人之詩本豈有意於平淡哉但對今之狂怪雕鎪神頭鬼靣則見其平對今之肥膩腥臊酸鹹苦澀則見其淡耳自有詩之𥘉以及魏晉作者非一而其高處無不出此左右固自以為亦嘗從頭看得一過而諳其升降沿革矣則豈不察於此者但恐如李漢所謂謂易以下為古文因以為無所用於今世不若近體之可以恱人之觀聽以是不免有是今非古之意遂不復有意於古人之髙風逺韻耳又謂有意於平淡者即非純古然則有意於今之不平淡者得為純古乎又謂水落石出自歸此路則吾未見終身習於鄭衛之哇淫而能卒自歸於英莖韶頀之雅正者也鄙見如此幸試思之以為如何也荆公唐選本非其用意處乃就宋次道家所有而因為點定耳觀其序引有費日力於此良可惜也之嘆則可以見此老之用心矣夫豈以區區掇拾唐人一言半句為𫐠作而必欲其無所遺哉且自今觀之其所集録亦只前數卷為可觀若使老僕任此筆削恐當更去其半乃厭人意耳不知此説明者又以為如何也放翁近報亦巳挂冠蓋自不得不爾近有人自日邊來云今春議者欲起洪景盧與此老付以史筆置局湖山以就間曠巳而當路有忌之者其事遂寢今日此等好事亦做不得然在此翁却且免得一畨拖出來亦非細事前書蓋巳慮此乃知人之所見有略同者或云張伯子實唱其説此亦甚不易也得江西書云孫從之亦巳物故人物眇然令人短氣此亦非人力所能為也留衛公一書恐有的便煩為遣去似聞樞帥巳有奉祠之命不知然否果爾必送來因得過留為數日之欵幸甚答鞏仲至遞中辱書獲聞比日盛暑幕府優遊起居超勝良以為慰新詩見寄尤荷不鄙讀之便覺烏石靈源去人不逺當此炎燠灑然如羾寒門而濯清風也記文更定莊重詳實足以傳逺悟老真不朽矣放翁筆力愈健但恨無故𬒳天津橋上胡孫擾亂却為大耳三藏覷見柳州南澗等詩最是放不下者但其氣格髙逺旨趣幽深故讀之者苦不甚覺此亦古今文字言語得失利病之所由可不審哉景迂志文謾令録示亦幸渠文要自不可曉也氣候不佳故舊中時復塌了一兩人令人鬱鬱仲止不謂乃能自立如此深可愛敬尤喜南澗之有後足強人意也黃巖老中間過此亦嘗相訪惠詩一篇甚佳亦見其刋行小集冠以誠齋之詩稱其似蕭東夫且謂東夫似陳後山而平生未見東夫詩也此事至為淺末然看却魏晉以前諸作便覺無開口處甚可笑耳焦山瘞鶴銘下有冬日泛舟詩一篇句法既髙字體亦勝與銘文意象大略相似必是一手作者自題王姓而名逸近世好事者亦少稱之獨趙德夫金石録題識頗詳而以作者為王瓉必是當時所傳本其名尚完也今選詩中有此名字而此詩體製只似唐人恐又或非一人不知亦曾見之否中間託陳安行子弟問之云從來無問及者獨張機仲臨鎮時嘗遣人摹之因得數本今往一通幸試考之以為如何也熹病日益侵無足言者承欲冬間謁告還浙千萬迃轡為數日之留當得欵晤以盡所欲言者答鞏仲至熹以氣痞益甚不能親布前幅來書在遞角中而詩卷乃似有拆動處不知何故以此知逺書亦難多談也向説簡齋詩有合改定處如能為之料理幸為印一本來只用粗𥿄庶得就册塗改附回改正易為力吕書奏議近方得見印本因得詳考當日規模機會深可嘆息但其間亦不免有漏落此間人有寫本與此互有詳略其間擊人者恐其子弟避讐刪去如密奏條畫誅范瓊計䇿後卒施行其語亦是一大公案不知何故亦不載也前書方報黃子厚之死今有方伯謨者亦死矣其詩比子厚更溫潤可觀方進未巳乃年甫五十而逝尤足傷惜也此間有劉叔通者亦能詩今日得其兩篇謾以寄呈不識髙明以為如何也熹又上答鞏仲至比日秋冷恭惟幕府燕間起處佳福此間數日前一水非常今幸無他聞下流頗有所損不知果如何但雨意未巳早稻十分成熟而不得以時收割此為可慮耳近日得昌父斯逺書附到書一角今附往中有大卷意必是詩纍年不見斯逺一字欲發封觀之又不欲破戒或看畢幸轉以見示也但斯逺省闈不偶家無內助嗣續之計亦復茫然急欲為謀婚之計而未有其處不知親舊間亦有可為物色處否想二公書中亦須説及此事渠來見囑此間無處可致力只得并奉凂也答鞏仲至前蔡君歸辱書及此專人又奉手告欣審比日秋暑尊候萬福一水逺近多罹其害此間亦然所不及門者三五尺耳簡齋詩巳領但得閩本就校即刋修覆校尤易為力旦夕稍暇或取此間所有者塗改寄呈也吕公奏議恨未見鄭武子所校本鄭乃其客必無舛繆也王瓉詩誠如所喻劉詩得經題品甚幸旦夕當令録數篇奉寄也所論自刋詩文此風極可笑又可歎也樓記姊銘筆力甚徑歎仰亡巳尹少稷文近世誠不易得晚節狼狽殊可惜也朝銘不可曉亦不但此篇不知當時何以得重名於世也日鑄之惠感領厚意來使立俟未有以為報也答鞏仲至前日人還草草附報殊不盡意比秋益涼恭惟起處多勝陳詩誤字今别用𥿄録去須逐字分付修了看過就此勾消了方再付一字乃可無誤此雖細事然亦須經歷方見自然成法也樓記不知巳入石未細看尚有兩三處可疑具之别𥿄幸更詳之也匆匆附遞不暇他及未由承晤千萬自愛答鞏仲至武夷非建山之全體不待辨而知且於此上下文無所屬似成剩語若欲破蘇公茶圃之説則語又太略兼亦本不相關也漕司所領茶事止為土貢玉食之一端耳非如他路與鹽法並行而領於一司也今云鹽為大而茶次之似非事實又車運之䇿此殊不聞不知其説果如何也夫為政者材可以勝乎事事不可以勝乎材此兩句頗類舉子文然亦謂欲其材之勝乎事不欲事之勝乎材則可今此語勢似未妥帖試深味之可見可以二字正富公碑中趙濟能搖之類也熹上呈答鞏仲至置中奉告欣審比日秋清尊履佳福兩詩三記併領嘉惠尤增慰懌但鄭君之為人不復記憶有如來示誠不易得也宗司刻石簡嚴得體書亦清婉可愛安濟則似太詳雖云合有許多説話然亦當有所取舍觀前輩所作可見也率易及此如何如何帥官稱蓋欲以見廟堂之舊然不知於古亦有𥘉否似不若只書職名之為正也昌父得書欲來相訪而病復大作但能口占一𥿄及寄未病時手寫詩一編清苦寒瘦如其為人其間亦有斯逺仲止數詩皆有思致足以慰離索但未知訊後病巳差未耳直卿久不得書聞有徙家之興此固所欲但於渠聚徒之計則恐失之便無以為生亦須細啇量耳論作官則誠不若聚徒之為安也偶與應辰過門云欲請見亟附此𥿄不能究懹抱衰病中間嘗小愈今復大作拘攣痞滿有甚於前矣放翁得近書甚健謾知之蓍卦考誤無别本當於番易求之但恐題跋者恐其纍巳巳遭投削耳答鞏仲至稍不聞問積有馳情比日冬溫恭惟幕府多暇動履有休眷集郎娘一一佳慶熹老病衰朽有加無瘳置之不足道也但書課未畢而不能俯躬伏几以究其業此為悵恨耳適聞帥司行下發諸舉子倉租米變糶買銀赴司送納不省何謂前政辛勤規畫為此活人之計其心甚仁其惠甚逺何忍一旦遽破壤之耶今之從政者固不可以此望之特賢者適從事於其間則似不冝有此耳不審文書所下亦嘗關由參署而後行抑吏輩徑下之而𥘉不以白也州縣得之直便行下無復啇量所幸今非糶變之時且得宿留故為奉扣幸更審之若無急切之用不知亦可且與行下仍舊收支否况此一縣所有不多不過八百餘斛糶之得千緍耳帥司不待此而後冨而徒使自是以往生子之家失救接之助且將復起故時殺棄之風則作俑之過將於誰責而可耶設若必有急切須至移用則向時後山千緍之米似却可以抽回蓋彼處巳有社倉市戶村民一例請貸𥘉無間隔不必為此偏惠以厚遊手而又𥘉無收貯之地又無專掌之人以今夏私糶之事驗之亦可見其無用而有害矣若不收回將來不過又只如此或更别生大害負纍後人不若及今行下令其收拾樁管俟來春以後得價之時發糶解赴使司之為便也兼此事今年行得非常乖繆追呼驚擾數月不定及至胥吏乞覔飽足之後有罪者不坐而無辜者枉費從旁觀之令人扼腕但以未決之時嫌於請囑不欲言之今事巳過乃敢説耳若欲收回便可行下徑自指定專委一二人為首及早收拾蔡姓者極富且畏事似可託也即鄉時去相見名六瑞者之族衰退之人不當與此若非幕府有吾人在則亦不復能啓口矣然其可否當自以盛意財之勿使外間人知拙者嘗有言以重其咎也亟作此托任尉附便或發遞以行匆匆不暇他及直卿一書幸指揮送達向見説冬間欲謁告暫歸浙中計必取道於此儻得左顧庶幾少欵答鞏仲至前日方以尺書附遞不審巳達未也便中獲書得聞比日冬溫幕府從容起處佳福足以為慰水西之逰甚恨不得陪杖屨然細讀詩文巳如身歷而目見之矣舊聞此處頗佳亦未嘗得到也昌父後來不得書只得彼中知識報來云病未能出戶不知後來復如何良可念也世本舊聞先人説家間亦嘗有之以兵火失去然則世間亦須尚有本但今見於諸經注疏者恐亦或出附會假託未必可慿據正亦不必苦求耳謝鳯之文不知果何如近日廬陵人來説紹興間有大府丞長樂陳剛中彥柔者坐以啓賀胡淡庵謫安逺宰而死周益公尚議其人因為檢長樂志則但云終於江隂簽判都不及所歷官及謫死事方此為扣其鄉人使尋訪之此其不幸又有甚於謝鳯者尤可歎也前書所論廩粟事不知巳為料理否切勿令外間知僕嘗有言也福州舊有楚詞白本不知印板今尚在否字書板樣頗佳歲久計或漫滅然讎校亦不至精不知能為區處因其舊本再校重刻以貽好事否如能作此即幸報及待為略看過結緣也近讀伯恭所集文鑑極有可啇量處前輩要亦多浪得名者不知後世公論竟如何爾答鞏仲至熹近以兩書附遞知皆逹否李教授過門甚遽欲作書而不暇蓍卦説今日方得之因以附納幸視至江西諸郡如元城語録之類雖免雜燒然皆束之髙閣此獨幸免豈非種樹醫藥之儔皆所不禁也耶可發一笑答鞏仲至昨日吳應辰來辱書今日又得遞中答字獲審比日冬寒尊履佳福深用慰感火後佳句曲盡事情引而伸之有足為長太息者豈止此而巳哉示喻米事巳悉其人前日亦録得縣中所𬒳倅􅈦公文看云奉帥司之命本欲封呈猝尋不見也度今自不能巳須别得一文字説破前日之誤乃可止耳須早行下為佳不可更待報矣後山之人不待别儲而飽收還乃為上䇿幸更審之此却須俟見報萬一必以前人巳行不欲廢罷即俟丞歸當如所諭也但富家深懲往事亦自畏其纍巳未必敢承當耳答鞏仲至昨日遞中辱書且審比日幕府優遊所履佳福良以為慰痔疾想巳平復此疾人多有之僕亦嘗為所苦然見人用刀仗毒藥攻之者或至反為大害因只服黃連枳殼等藥及用馬藍菜煎湯薰似覺有效不審曾用之否熹足弱氣痞遇寒益甚此兩日來雖用兩人扶掖亦行不得長至前後因感冒伏枕幾不能起衰老自應如此亦不足深怪也楚詞板既漫滅雖修得亦不濟事然欲重刋又不可整理使其可以就加讐校若修得了可就彼中先校一畨却以一淨本見示當為參訂改定啇量若别刋得一本亦佳事也近得古田一士人所著輔音一卷亦甚有功異時當併以奉寄也陳寺丞事巖老之兄尚未報來年歲未逺亦須尚可詢問但當時作地志之人亦太草草耳文鑑誠如所論李文叔前此亦但見其論文數篇頗有可觀今亦不能記憶但如戰國䇿序則恐文健意弱太作為傷正氣耳要之文章正統在唐及本朝各不過兩三人其餘大率多不滿人意止可為知者道耳直卿尚未到此初意其來可以久逺相聚不謂又為諸生所留亦其食貧不得不為此耳三詩皆佳作但首篇用韻多所未曉前此所示諸篇亦多有類此者屢欲奉扣而輒忘之古韻雖有此例如大明詩林與興叶之類然在今日却恐不無訛謬之嫌耳然林與興叶亦是秦語以興為韻乃其方言終非音韻之正今蜀人語猶如此蓋多用鼻音也名畫想多有之性甚愛此而無由多見他時經由得盡携以見顧使獲與寓目焉千萬幸也彼中亦有畫手能以意作古人事迹否此間門前衆人作一小亭舊名聚星今欲於照壁上畫陳太丘見荀朗陵事而無可屬筆者甚以為撓今録其事之本文去幸試為尋訪能畫者令作一草卷寄及為幸但以兩幅𥿄為之此間却自可添展也又有一事鄉見聖泉寺有李雍碑龜趺螭首鐫刻甚精六螭紏結既異今製而龜狀逼真雖稍破析然猶有生意也幸為尋一木工巧於雕鏤者以木寫之用寸折尺不過髙尺餘便中寄示為望放翁老筆尤健在今當推為第一流近聞復有載筆之招不知果否方欲往求一文字或恐以此疑賤迹之為纍未必肯作耳悟老化去甚可傷血疾渠舊有之未必服藥之悮也意公恨未之識見劉叔通説向在三山見一老僧自云客石林家甚又頗能道其餘論不知便是此人否如其不然亦可因令尋訪計其年事亦當是七十以上矣雖無老成人尚有典刑此語深可念也前懷安尉楊嶽從事乃龜山先生之孫鄉來在官不幸肓廢稼軒憐之為之呼醫治療竟不能視後來鄭樞特為請祠今在彼城中寓居因其便還匆匆附此渠必不能出謁以其賢者之後時遣人存問之少有乏無力可周恤計亦所不憚也病中迫不得巳不免作一文字精力不逮殊覺辛苦此間窮陋無人啇量甚恨相去之逺不得就求訂正也答鞏仲至春寒多病不能奉一字以為新歲之慶遞中忽辱惠問獲聞比日幕中多暇起處寧適足慰馳情熹病益衰無足云者示喻所苦亦巳向安甚善此疾最忌飲酒若能痛節當不藥而愈也楚詞修未旋了旋寄數板節次發來為幸古田輔音此間無人寫得今寄一書與蘇君幸轉託縣官差人賫去鄉下尋之就其傳録尤便亦聞渠寫本頗經刪節巳囑令為全録去矣然此嘗編得音考一卷音謂集古今正音協韻通而為一考謂考諸本同異并附其間只欲别為一卷附之書後不必攙入正文之下礙人眼目妨人吟諷但亦未甚詳密正文有異同但擇一穩者為定可也又可附此古田全書俟旦夕稍暇一靣修寫寄呈彼中不知巳曽下手未亦望隨得巳了者節次寄來也若巳詳善即此中本更不須寄去矣劉侍讀書氣平文緩乃自經術中來比之蘇公誠有髙古之趣但亦覺詞多理寡苦無甚發明耳大抵古人文字要當隨其所長取之難以一時所見遽定品目也李文叔論文諸説向見林擇之有之不曽寫得巳書報令録去或可并移書古田就取也畫笥許觀甚幸儻得附名尤所碩也聚星閣此亦巳令草草為之市工俗筆殊不能起人意亦嘗輒為之贊今謾録去幸勿示人也余君之作竟能否便中并望早寄及也石林胡僧頃亦見之蓋葉公自有鑒賞其所使臨摹者必當時之善工也要之年來事事漸低此等人物亦自日少一日為可歎耳龜跌恐須作全者向見所隕之元故亦在側也吳生玄武信為竒筆但龜背之文正脊之甲五應五行次甲八應八卦又次甲草四應節氣亦自然之理此却不足亦欠子細然九方皋之相馬又不當以此論耳社記頃未之見世間此等遺落不遇知者可勝數哉放翁久不得書欲往從覔一文字所繫頗重又恐賤迹纍其升騰未敢啓口也楊君荷枉顧此其不易得又有甚於前二公矣榮陽始亦甚趦趄令汪季路百計脅之乃肯聽耳此君殊可念有可垂手處幸曲為拯拔也長樂劉君一書煩為轉逹直卿云渠有知識在城中巳令批在書背幸令人問之恐未有便却告專介為送至縣中託縣官遣人逹之蓋所編禮書在渠處欲亟取來趂此疾病少間之際并力了之故不可緩切幸垂念也欲言甚衆書不能盡唯冀以時自愛千萬之禱悟老聞欲為志其塔果爾亦甚幸也答鞏仲至陳太丘詣荀朗陵貧儉無僕役陳實傳曰實字仲弓頴川陳昌人為聞喜令太丘長風化宣流先賢行狀曰荀淑字季和潁川頴隂人也所拔韋褐芻牧之中執案刀筆之吏皆為英彥舉方正輔朗陵侯相所在流化乃使元方將軍先賢行狀曰陳紀字元方實長子也至德絶俗與實髙名並著而弟諶又配之每宰府辟召羔鴈成羣世號三君百城皆圖畫季方持杖從後長文尚小載著車中既至荀使叔慈應門慈明行酒餘六龍下食張璠漢紀曰淑有八子儉緄靖燾汪爽肅敷淑居西豪里縣令苑康曰昔髙陽氏有才子八人遂署其里曰髙陽里時人號曰八龍文若亦小坐著膝前于時太史奏真人東行檀道鸞續晉陽秋曰陳仲弓從諸子姪造荀父子于時德星聚太史奏五百里賢人聚所畫陳荀聚星事若作兩假即前假當畫太丘乘牛車在塗而元方等侍行後假當畫叔慈應門朗陵對客七龍侍食又當重畫太丘與朗陵相對而二子一孫侍立又叔慈本在門外迎客客既入燕則又不當久立門外亦須畫其侍立於朗陵之側此皆似涉重復兩假之間又須更作山石林麓分隔前後皆費注解若只畫作一假則但為太丘乘車到門之象而叔慈在門外迎客七龍扶侍朗陵出至庭中而文若在其後即免重復亦有遺意但却不見對飲行食及坐文若於膝前事有不備耳凡此未能自決不知盛意如何更望相度及與畫者啇量取令穩當乃佳耳更考後漢處士冠服教之答鞏仲至兩承惠書良慰馳想比日春深寒暖尚未定恭惟幕府有相所履佳福葉帥昨日已過此聞張書當來不久計賢者必護印至境上若得早來使可宿留為一兩日𣢾深所望也楚詞當俟靣議元本字亦不小可便以小竹𥿄草印一本携以見示此間匠者工於剪貼若只就此訂正將來便可上板不須再寫又生一重脫誤亦省事也蘇君處所寫輔音如巳到幸亦携來此間所有本子不全恐將來闕略却不滿人意也聚星圖此間巳先令人畫今詳所寄大槩不甚相逺但此間者車中堂上有兩太丘心頗疑之今得所示却差穩當此必嘗經明者較量也但閩中人不好事畫筆幾絶為可歎耳禮書半藁略可寫淨旦夕寄直卿處仍就使廳借筆吏數人抄過一本王元石亦要抄一本仍更為寫一本當俟彼中寫了却寄莆中也時論少寬但置籍事豫奪不同而同出一手要路諸人有忽從外輔者亦非意料所及不知彼中所聞果如何也放翁且喜結局不是小事尚未得以書賀之熹衰病益甚苦楚之態亦非言語所能形容者不能復縷縷也會靣有期預以為喜答易簡盡得孝弟便是仁云云立説太冗而意不精切大抵後多類此言語輕躁動輒有忤知和緩可療而臨事復然小學之書先在於一切世味淡薄自然見富貴不歆羡見貧賤不厭惡臨患難無求免一向優人抑巳損躬𥙿物之事皆可優為之先生編集是書此意尤多如顔氏家訓六事豈貪名徇俗羡慕者能之推此則貽教之始以至五品之遜各盡其道皆由此充按伏罪過全在不能去一矜心所以諸病皆由於此看文字且逐條看各是一事不須如此牽合小學之書自明倫五假明父子章全在一親字上明君臣章全在一義字上明夫婦章全在一别字上明長幼章全在一序字上明朋友章全在一交字上始讀昏禮萬世之始至男女有别然後父子親漢武帝溺於聲色遊燕後宫父子不親遂致戾太子之變此亦夫婦無别而父子不親之一證語在戾太子傳可檢看然亦非獨此也問敬敬不是萬慮休置之謂只要隨事專一謹畏不放逸耳不須許多間説話也小學賔客之禮見於朋友之章莫以一時之交亦有切偲之意相觀而善之理否不須如此理會賔主自是朋友之類如鄉鄰還往及師弟子之屬於五逹道亦朋友之類也不入此門則無管攝處矣讀書求意義雖知爛熟之為美而氣習已慣惟恐不多之念未能頓忘既知其非便當改之不須更如此支蔓小學載內則三十有室遜友視志男女之教溫公巳有説其餘亦大槩立一節限耳不必如此細碎馬援以譏議戒諸子而不免於譏議馬援之言自可為法不須如此支蔓如此則須削去此假後生又如何得聞此一假説話而以為戒乎理之根原推演孝義不記此話頭因何而起若與安卿所問同是一時所聞則渠説巳得之矣敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶敬義自有輕重然所説太冗孟子養氣説此條差勝然却只是依放集注别無新説看文字且要如此理會教本文説精熟久之自隨淺深有見處正不必支蔓生説穿鑿援引也答何倅前蒙誨及經書中所説欲字以鄙意所見人之生不能不感物而動曰感物而動性之欲也言亦性所有也而其要係乎心君宰與不宰耳心宰則情得正率乎性之常而不可以欲言矣心不宰則情流而陷溺其性專為人欲矣若夫所謂可欲之謂善蓋指言體元者善之長之意心之所為宰者也要當默識之而不可以言語誨也不知是否更望見教尺書莫盡此悰答江彥謀所論正蒙大旨則恐失之太容易爾夫道之極致物我固為一矣然豈獨物我之間驗之蓋天地鬼神幽明隱顯本末精粗無不通貫而為一也正蒙之旨誠不外是然聖賢言之則已多矣正蒙之作復何為乎恐須反復研究其説求其所以一者而合之於其所謂一者必銖銖而較之至於鈞而必合寸寸而度之至於丈而不差然後為得也孟子曰博學而詳説之將以反説約也正為是爾今學之未慱説之未詳而遽欲一言探其極致則是銖兩未分而臆料鈞石分寸不辨而自計􅎣引不惟精粗二致大小殊觀非所謂一以貫之者愚恐小差積而大繆生所謂鈞石丈引者亦不得其真矣此躐等妄意之蔽世之有志於為巳之學而未知其方者其病每如此也明道先生行狀云先生教人自致知至於知止意誠至於平天下灑掃應對至於窮理盡性循循有序病世之學者舍近而趨逺處下而窺髙所以輕自大而卒無得也此言至矣彥謀以為如何答趙宰伏承誨諭良荷不鄙但屏居杜門不敢干與外事向來雖聞貴縣令保正副出錢雇募耆長人甚苦之亦不敢遽有稟白但嘗因下問之辱欲乞慱詢民情之所利病而罷行之正為此耳𥘉不知其為倉司指揮亦不聞他縣之有此也今聞巳行罷去自此境內應役之家得保生業則其受賜已厚而上司當亦能察其無他矣恐不必更假拙者之言以為輕重也自餘曲折更託劉監廟稟知并幾情照答吳尉聞以職事見知憲臺甚尉然聲聞過情君子恥之𥘉官僻縣遽為上官獎拔如此可以為懼而未可遽以為喜且當痛自檢飾黽勉王事謹終如始不可便為恣肆及萌躁進之心也答吳尉嶽倉書曲折前書巳報矣只此便是學問底道理平日所與講論者不過此耳幸思之仕官只是廉勤自守進退遲速自有時節切不可起妄念也官期不逺不審何日定行到官凡百以廉勤愛民為心乃佳答吳尉大抵守官只要律巳公廉執事勤謹晝夜孜孜如臨淵谷便自無他患害才是有所依倚便使人怠惰放縱不知不覺錯做了事也官所不比鄉居凡百動有利害諸事切冝畏謹也答趙郎中熹伏蒙垂喻先正忠簡公行狀不勝恐悚此事𥘉以令兄提舉郎中見屬之勤不合容易承當既而精力日衰失前忘後記事作文比之昔日倍覺費力况此事體之大不唯先丞相一身之德業難遽形容而事關國論將來史官所據以垂萬世者將在於此自度恐終不足以辨此今陳丈君舉郎中精敏該洽詞筆髙妙皆熹所不能望其萬一者若舉而屬之公論無不以為宜者而熹託契門下既久且厚固無形迹之嫌也專此布􅈤伏幸深察答趙尉壆九月八日熹扣首復書剡尉趙君奉議熹未得識靣而逺辱貽書副以手劄已荷厚意而示以先正中丞行實使之論𫐠以附其後則意又甚厚而非熹區區所得當也顧於先德慕用之深又不敢辭輒具數語如别𥿄若當代諸賢巳有跋語幸以附其後而奏議之書尚欲寅緣請得一觀儻辱開許只託石滁州附上虞潘幹處或寄臨安趙節推彼應時有便來也適此俗冗留來使數日乃得布此病倦草草仍不復作劄併幾情亮向寒千萬以時為門戶自愛講學之意尚俟他日得以靣論不宣熹再拜答卓周佐示喻巳悉鄙意嘗謂朝廷設官求賢故在上者不當以請託而薦人士人當有禮義廉耻故在下者不當自衒鬻而求薦平生守此愚見故為小官時不敢求薦後來叨冒刺舉亦不敢以舉削應副人情官吏亦不敢挾書求薦其在間居非無親舊在官亦未嘗敢為人作書求薦唯老成淹滯實有才德之人衆謂當與致力者乃以公論告之此事首末衆所共知向者亦屢嘗奉告矣今乃復見喻如此何貪躁不思之甚耶前日巳稟尊丈教子如此似非所謂義方熹若在官有人合薦者見其如此亦不復薦之矣况使作書宛轉求薦耶試思此言反巳為學異時才德有聞自不患於不逹今不須如此汲汲反取人鄙薄也答任行甫治甲銷鈔足見州郡相知之意職事固不可不盡心然凡百亦冝韜晦勿太向前為佳答任行甫塵中汨沒墜墮了人須是忙裏早晚提撕時以書册灌溉勿令斷絶為庶幾爾潘書亦非所急不知林本竟如何當時是韓范二公所編須稍詳備有條理若有筆吏妙取一本亦佳也答任行甫前書所喻賣鹽事既是州府相委無如之何只得竭力但不可因此多有更張以形迹前人廣陳利害以取衆怨如私會之類乃為佳爾况賣鹽一事是州府財計本根尋常是幕官職事今以監當處之巳不穩當萬一須犯此二戒尤為不便即不若託以病或别作緣故以力辭之之為愈也况今巳書一考在任之日不多自可漸為去計豈可更當此委任取人忌嫉正使無前所説二事衆人亦必側目若不早自引退必有後悔無疑更審思之久欲奉報此事因循至今深以為慮偶有此便謾附此𥿄不睱他及也答任行甫承有來期尤以為喜但不知新官到後便得脫否所謂不敢不自警者更冝深念居今之世惟有一味退後勿求人知為上䇿耳官卑祿薄雖不快意然比之一介寒士區區斆學仰食於人者則巳為泰矣若以為不足妄有覬覦恐所得無幾而後日之悔將有不可追者千萬深思餘俟靣見乃可決爾答許進之人生諸事大抵且得隨緣順處勉力讀書省節浮費令稍有贏餘以俟不時之須乃佳耳前書所論孟子偶以病中不暇細看今尋不見讀書且熟讀細看自當漸見意味不可支離穿鑿以求見解也答程傳之熹與足下為同郡人然彼此未相識靣而足下以書先之此意厚矣夫佛老之言不得以道名足下之説是也至於吾之所謂道與其所以求之之方則足下之言有略而未究其藴者無從靣講臨風悵然異時因來有以見語千萬甚望過此則有非衰拙之所敢知者不知所以報也答吕紹先示喻所以持守門戶不妄取豫之意甚慰所望更冀勉旃以承先訓地逺無以致區區此意不敢不盡也答吕紹先承喻亦苦食貧此吾輩之常唯當益堅所守庶不墜先訓為佳耳答江端伯示喻為學之方足見留意事物未見不可逆料誠如所論唯有因聖賢之所巳言者而求之為庶幾耳故為學不可以不讀書而讀書之法又當熟讀沈思反覆涵泳銖積寸纍久自見功不惟理明心亦自定若欲徒為涉獵而求此理之明又欲别求方便以望此心之定其亦難矣答潘立之所論西銘大槩亦只是如此看不知近日更讀何書有啇量處便中可示及也所問祭禮古人雖有始祖亦只是祭於大宗之家若小宗則祭上高祖而下然又有三廟二廟一廟祭寢之差其尊卑之殺極為詳悉非謂家家皆可祭始祖也今法制不立家自為俗此等事若未能遽變則且從俗可也支子之祭亦是如此竊謂只於宗子之家立主而祭其支子則只用牌子其形如木主而不判前後不為陷中及兩竅不為櫝以從降殺之義不知如何可更啇量也答趙民表古人之學以致知為先而致知之方在乎格物所謂格物云者河南夫子所謂或讀書講明義理或尚論古人别其是非或應接事物而處其當否皆格物之事也格物知至則行無不力而遇事不患其無立矣然欲從事於此要須屏逺外好使力專而不分則庶乎其進之易耳答謝與權伏蒙致政知縣學士寵賜手書喻以先契伏讀悲感不可具言且審即日春和燕居清暇夀體康寧又竊欣慰熹學晚無似徒以少日習聞父兄師友之訓稍知用力於句讀文義之間區區自守欲寡其過而未能固不敢坐談玄奧驚世駭俗以負所聞也老丈過聽以為可教辱先以書語以淵源所自來者顧熹何人可以與此屬此跧伏未有趨侍之期引領向風但切傾仰程書固不能無誤亦恨未得靣承質其是非姑因便風寓此致謝伏惟以時節宣益綏夀祉是所深望答陳謨辱書甚厚但所謂先知先覺則今世自有慨然任其責者而熹非其人也所論為學之意亦甚善顧此乃終身事業非可索於咄嗟指顧之間者但當循序講明著實持守不令日用之間少有間斷如是久久當自得之不當較計功程如世之出舉錢啇子本者之營營也答劉朝弼承示以文編感相與之意甚厚讀之三日未得其所以然故敢布之左右熹聞之君子之於學非特與今之學者並而爭一旦之功也固將求至乎古人之所至者而後巳然後可與語學矣夫將求至乎古人之所至者而後巳則非規撫綴緝之所能就其必有以度越世俗庸常之見而直以古人之事自期然後可得而至也夫古人之學何為哉致知以明之立志以守之造之以精深充之以光大雖至乎聖人可也不出乎此而營營馳聘於末流竭精憊思惟懼夫蓄藏之不冨誦説之不工雖曰能之非吾之所謂學也蓋循乎古人之事上之可以至聖賢之域下之可以安性命而固貧窮得時而行亦何所不利哉由今之所為極其效足以與今之為士者並而爭一旦之功其得與失又未可知也非棄學與故足下之患患知之不明志之不果造之未至乎剛大而已蓄藏之不富誦説之不工則君子不患矣僕之所聞如此故於足下之文詞義之間不知所以裁惟足下有以亮之答陳頥剛衰孏杜門罕接人事未嘗得見顔色而足下不鄙以書先之長箋短幅為禮以厚而先集髙文并以見貺則此意又益勤矣然區區頑鈍自少為學知守章句謹行止冀以獨善其身無為先人羞辱而巳有如足下志尚之髙規模之廣則非平生夢寐之所敢及也無以為報愧恨亡巳先公胸中之竒凛有生氣適有逺役未及細觀然竊窺一二亦足以見藴蓄之不凡矣序引見屬豈所敢當况又不暇固當蒙見察也盛製兩編言多適用不為苟作三復嘆仰所論治郡條目尤切事情宦學得此不必以吏為師矣答姚􅝘一云答盧粹中承問及為學之意足見志尚之逺甚慰甚慰蓋嘗聞之人之一身應事接物無非義理之所在人雖不能盡知然其大端冝亦無不聞者要在力行其所巳知而勉求其所未至則自近及逺由粗至精循循有序而日有可見之功矣幸試思而勉之幸甚幸甚答林質疑問兩條至誠之説固難躐等遽論熹巳於四子後序中巳略言之矣不謂性命集注甚明恐未詳考之過冝且平心寬意反復玩味必當自見或與朋友講之亦必得其説也答李好古向來見陸刪定所聞如何若以為然當用其言專心致志庶幾可以有得不當復引他説以分其志若有所疑亦當且就此處啇量不當遽舍所受而逺求也東問西聽以致惶惑徒資口耳空長枝葉而無益於學問之實不碩賢者為之是以有問而未敢對也答范叔應潔矩章專言財用繼言用人蓋人主不能潔矩者皆由利心之起故徇巳欲而不知有人此所以專言財用也人才用舍最係人心向背若能以公滅私好惡從衆則用舍當於人心矣此所以繼言用人也答徐景光寵示復性一篇伏讀再三開警甚至如所謂聖人不待覺而復賢者能求復其性者深合乎孟子堯舜性之湯武反之之説又所論顔子克巳復禮一節意亦甚正歎服亡巳但所云聖人之性虗寂而靜者非所以語性所云心齋坐忘者亦非所以論顔氏克巳復禮之實也至於卒章所論心性之别以為心能惑性則又可疑之大者熹嘗謂有是形則有是心而心之所得乎天之理則謂之性仁義禮智是也性之所感於物而動則謂之情惻隱羞惡是非辭遜是也是三者人皆有之不以聖凡為有無也但聖人則氣清而心正故性全而情不亂耳學者則當存心以飬性而節其情也今以聖人為無心而遂以為心不可以須臾有事然則天之所以與我者何為而獨有此贅物乎答吳深父示喻日用之間或有所疑而未必不善者此固見善不明之過當汲汲於窮理然所可懼者則恐實有可疑而不知以為疑耳此則尤當講究體察也答朱岑昨辱枉書為報不謹方以自愧茲𬒳再告良荷不忘之意前書下問之目皆所當疑但當自其近者以次詢究通其一而後及其二則疑之釋也有漸矣若衆難羣疑輻輳於胸中僕懼其徒為此擾擾而卒無開悟之日也不識足下以為如何也如有取焉碩舉其疑之近者一二條以告熹請得以所聞為足下言之而明者擇焉答孫吉甫德粹之來逺辱惠書雖未識靣然足以知賢者之志矣所喻氣質過剛未能自克而欲求其所以轉移變化之道夫知其所偏而欲勝之在吾日用之間屢省而痛懲之耳故周子有自易其惡自至其中之説是豈他人所得而與於其間哉然此亦或有説焉不明於理而徒𣣔救其偏亦恐矯枉之過而反失夫中也故右人之學雖莫急於自修而讀書講學之功有所不廢蓋不如是無以見夫道體之全而審其是非邪正之端也未由相見幸且勉力答汪會之所寄大學愧煩刋刻跋語尤見留意千聖相傳門戶路徑不過如此前世儒者未嘗熟讀而深求其意故所以為學者不知出此而墮於記誦文詞之末其好髙者又轉而入於老子釋氏之門此道之所以不明不行而人才少風俗衰也但今雖幸略窺大旨然循其序而實用力焉亦恨未能到得古人地位所以每欲推之以語同志而求其輔仁之助於今乃得吾會之於中表間豈不幸甚更碩益深考之而實從事焉使其次第功程日有可見之驗則其進步自不能巳矣與湖南諸公論中和第一書中庸未發巳發之義前此認得此心流行之體又因程子凡言心者皆指巳發而言遂日心為巳發性為未發然觀程子之書多所不合因復思之乃知前日之説非惟心性之名命之不當而日用功夫全無本領蓋所失者不但文義之間而巳按文集遺書諸説似皆以思慮未萌事物未至之時為喜怒哀樂之未發當此之時即是此心寂然不動之體而天命之性當體具焉以其無過不及不偏不倚故謂之中及其感而遂通天下之故則喜怒衰樂之性發焉而心之用可見以其無不中節無所乖戾故謂之和此則人心之正而情性之德然也然未發之前不可尋覔巳覺之後不容安排但平日莊敬􅉼飬之功至而無人欲之私以亂之則其未發也鏡明水止而其發也無不中節矣此是日用本領工夫至於隨事省察即物推明亦必以是為本而於已發之際觀之則其具於未發之前者固可默識故程子之答蘇季明反復論辨極於詳密而卒之不過以敬為言又曰敬而無失即所以中又曰人道莫如敬未有致知而不在敬者又曰涵飬須是敬進學則在致知蓋為此也向來講論思索直以心為巳發而日用工夫亦止以察識端倪為最𥘉下手處以故闕却平日􅉼飬一假工夫使人胸中擾擾無深潛純一之味而其發之言語事為之間亦常急迫浮露無復雍容深厚之風蓋所見一差其害乃至於此不可以不審也程子所謂凡言心者皆指巳發而言此乃指赤子之心而言而謂凡言心者則其為説之誤故又自以為未當而復正之固不可以執其巳改之言而盡疑諸説之誤又不可遂以為未當而不究其所指之殊也不審諸君子以為如何答或人為學兩途誠如所喻然循其序而進之亦一而巳矣心有不存物何可格然所謂存心者非拘執係縳而加桎梏焉也蓋嘗於紛擾外馳之際一念之間一有覺焉則即此而在矣勿忘勿助長不加一毫智力於其間則是心也其庶幾乎答或人仁者人也合而言之道也此章解釋仁字道字之所以名君子引而不發躍如也引而不發謂漸啓其端而不竟其説躍如謂義理昭著如有物躍然於心目之間答或人一云與余正甫二先生所論敬字須該貫動靜看方其無事而存主不懈者固敬也及其酬酢不亂者亦敬也故曰毋不敬儼若思又曰事思敬執事敬豈必以攝心坐禪而謂之敬哉禮樂固必相須然所謂樂者亦不過謂胸中無事而自和樂耳非是著意放開一路而欲其和樂也然欲胸中無事非敬不能故程子曰敬則自然和樂而周子亦以為禮先而樂後此可見也則自得後須放開不然却只是守此言既自得之則自然心與理會不為禮法所拘而自中節若未能如此則是未有所得才方是守法之人爾亦非謂既自得之又却須放開也克己復禮固非易事然顔子用力乃在於視聽言動禮與非禮之間未敢便道得其本心而了無一事也此其所以先難而後獲歟今言之甚易而苦其行之之難亦不考諸此而巳矣答或人自此巳下共十書元題答或人一云其間是答劉公度昨來所示疑義久無便可奉報今并納還鄙説或恐未安不惜痛加辨析也大學等書近復刋訂體製比舊亦巳不同恨未有人可録寄耳尚書頃嘗讀之苦其難而不能竟也注疏程張之外蘇氏説亦有可觀但終是不純粹林少頴説召誥巳前亦詳備聞新安有吳林老禆傳頗有發明却未曽見試并考之諸家雖或淺近要亦不無小輔但在詳擇之耳不可以篇帙浩汗而遽憚其煩也大抵讀書先且虛心考其文詞指意所歸然後可以要其義理之所在近見學者多是先立巳見不問經文向背之勢而橫以義理加之其説雖不悖理然非經文本意也如此則但據巳見自為一書亦可何必讀古聖賢之書哉所以讀書政恐吾之所見未必是而求正於彼耳惟其闕文斷簡名器物色有不可考者則無可奈何其他在藏理中可推而得者切須字字句句反復消詳不可草草説過也答或人前書妄論想荷不鄙然亦未知果中理否但所聞於師友者如此驗之聖賢之言又如此竊獨安之不敢自棄以徇流俗耳執事議論文章多出於忠厚之意反身自求冝有以自樂者乃獨以無名為患不得試為憂而欲思其次者何耶題跋用意尤㦝側推此足以善一世之俗矣歎服之深不容復措詞也答或人大學中庸無異道而所自立者有淺深但循序以進其義自見今未須懸料也孟子盡心之説熹於大學或問中嘗略言之其序可見大抵讀書且求句中大意令逐處各自分明即彼此深淺自然可見今未及各求本處文義便於彼此參考所以費力多而未易合也見得分明反復􅉼泳此是要切功夫淺深之辨本非學之急務也答或人謝遊楊尹侯郭張皆門人也程門髙第不止此數人如劉質夫李端伯吕與叔諸公所造尤深所得尤粹四端五典者窮理之本恐當云明四端察五典者窮理之要大凡盡此而可以推及其餘者本也一事而有首尾之名也了此而可以次及其餘者要也衆事而有緩急之名也以此推之則三十條者之得失略可見矣或以仁訓覺訓公者此二訓程子巳嘗明其不然恐不必更著於此藍田吕侍講吕終於正字未嘗作講官張無垢此書深闢佛氏而所引之言以此為號終不穩當請更詳之又諸公稱號合立一條例差等如泰山海陵徂徠濂溪明道伊川橫渠康節稱先生如云泰山孫先生公卿稱諡如云王文正公當云然世本豈得而出哉格物以窮之多識前言往行以擇之就有道以正之歸諸心以居之多識而擇之乃所以格物不當分格物多識為二事而反以格物為先多識為後也格物就正固皆心之所為不待更歸諸心而後可居也且歸諸心者亦想象之而巳矣未見其踐履之實亦若之何而能居乎竊恐此語不能無病若論為學之序則中庸所謂慱學審問謹思明辨篤行者盡之故程子以為五者廢其一則非學而藍田吕氏解釋甚詳其語皆慤實而有味也察於天行止樂循理也窮理者欲知事物之所以然與其所當然者而巳知其所以然故志不惑知其所當然故行不謬非謂取彼之理而歸諸此也程子所謂物我一理才明彼即曉此不必言觀物而反諸身者蓋巳説破此病况又加所謂宛轉者焉則其支離間隔之病益巳甚矣吕氏謂誠者理之實然誠之為言實也然經傳用之各有所指不可一槩論也如吕氏此説即周子所謂誠者聖人之本蓋指實理而言之者也如周子所謂聖誠而巳矣即中庸所謂天下至誠者指人之實有此理者而言也溫公所謂誠即大學所謂誠其意者指人之實其心而不自欺者言也此條誠字援引不一使學者不能曉當稍分别之吕侍講論寡欲此乃吕原明侍講安人安百姓則又擴而大之也修巳以安人以安百姓蓋其積愈盛而其效益廣爾廣非有擴而大之之意也致用者窮經之本程子曰窮經將以致用也則其本末先後固有在矣今以致用為窮經之本恐未安也若曰求實用者窮經之本其庶幾乎推巳及人者治道之本恕者待人之本推巳及人即所謂恕此兩條不惟重復而别出恕字恐有流於姑息之病程明道立門庭以慎獨兩字前賢據實理以教人𥘉無立門庭之意慎獨固操存之要然明道教人本末具備亦非獨此二字而巳審勢者平天下之本此語未安下文亦多此類唯澄源節用立志守正四語為最穩耳順人情人情不能皆正故古人治世以大德不以小惠然則固有不必皆順之人情者若曰順人心則氣象差正當耳井田肉刑二事儘有曲折恐亦未可遽以為非知良心者去惡之本此假意思未安封建之説與井田肉刑相類皆未易輕論也賞罰者行師之本又曰師之道又貴乎以正耳此二語似倒置弘毅者任重之本據曽子説弘主任重毅主致逺伊川論守令云云康節論新法此二事恐不類上下文意原思為宰衡麓之説其文義恐未安知止詳下文所引云云至物我俱敗矣是量力之事伊川元城及易三節是防微慮遠之事陳希夷以下乃為知止之事今槩以知止目之恐未盡也和靖論語録云云此語恐非通論孔門之教未嘗專恃春秋而直廢論語也道之大本程子論未發之中與無過不及之中不同恐更當詳考吕氏楊氏中字之説此二説恐有未安處東學溫公語常不及變此語甚佳然終恐難持不若不論之為愈學者於巳發處用工此却不枉費心力程子言存飬於未發之前則可求中於未發之前則不可然則未發之前固有平日存飬之功矣不必須待巳發然後用工也答或人前賢之説雖或煩冗反晦經旨然其源深流逺氣象從容實與聖賢微意泯然默契今雖務為簡潔然細觀之覺得却有淺迫氣象而玩索未精􅉼飬不熟言句之間粗率而礙理處却多有之尹和靖嘗言經雖以誦説而傳亦以講解而陋此言深有味也近方見此意思若更得數年間放未死當更於間靜中陶汰之庶幾內外俱進不負平日師友之訓但恐無復此日耳龜山立言却似有意於含蓄而不盡遂多假借寄託之語殊不快人意聖賢之言則本是欲人易曉而其中自然有含蓄耳答或人前書所論仁義禮智不記别有何語然其大槩今且是要識此四字之名件訓詁而巳如所示説似太髙逺反不的當也更檢遺書論孝弟為仁之本及仁性也孝弟用也處及慱愛之謂仁又答心如穀種之説但看此三假更以前聖賢之言參之則自見無所疑惻隱不能貫三者向見何兄亦深以為疑竟不能決此不難曉更熟看孟子不忍人之心一章及外書中明道説謝子玩物喪志之説則亦自分明矣夜氣一章所示尤未安去年曾答順之此可就取看有疑處却喻及大抵所論多未著實不周匝又時為險句竒語軒輊於其間尤覺不穩當似是看文字少又忽略了平易處而專㨂艱難髙逺底看故其用力愈勞而為説愈雜可試更思之復以見示幸幸所示多所未安别𥿄具報幸更平心詳緩紬繹令意味浹洽自然安頓穩帖不如此踸踔竒險也答或人知得如此是病即便不如此是藥若更問何由得如此則是騎驢覔驢只成一場間説話矣誠敬固非窮理不能然一向如此牽連説過前頭却恐蹉過腳下工夫也慱文約禮學者之𥘉須作兩般理會而各盡其力則久之見得功效却能交相為助而打成一片若合下便要兩相倚靠互相推託則彼此擔閣都不成次第矣然所謂慱非泛然廣覽雜記掇拾異聞以讀多取勝之謂此又不可不知惟后非賢不乂言人君必任賢而後可以致治也惟賢非后不食言人君當任飬賢之責也髙宗本意如此問者疑其成病固察之不詳而答者亦無一人説破此意何耶近思録本為學者不能遍觀諸先生之書故掇其要切者使有入道之漸若巳看得浹洽通曉自當推類旁通以致其慱若看得未熟只此數卷之書尚不能曉會何暇盡求頭邊所載之書而悉觀之乎又云少輟功夫取而詳味不知是輟何功夫此語尤不可曉義利之大分武侯知之有非他人所及者亦其天資有過人處若其細微之間則不能無未察處豈其學有未足故耶觀其讀書之時他人務為精熟而巳則獨觀大旨此其大者固非人所及而不務精熟亦豈得無欠闕耶若極言之則以孟子顔子亦未免有如此處故橫渠先生云孟子之於聖人猶是粗者以聖為志而忌立標凖者必有事焉而勿正也循循不巳而自有所至者心勿忘勿助長也先難後獲意亦類此學者講論思索以求事物義理聖賢指意則當極其慱若論操存舍亡之間則只此毫釐之間便是天理人欲死生存亡之分至簡至約無許多比並較量思前算後也今問頭自有病痛答者又不能一剪剪斷直下剖判言愈多而道愈逺矣問者所謂思慮邊義理上者亦曰思所以處事之冝耳但其語不莊故正叔疑其誤而直卿亦似未得其語意也程子曰動靜者隂陽之本况五氣交運則益參差不齊矣賦形之類冝其雜揉者衆而精一者間或值焉以此觀之則陽一隂二之云恐亦未可以為非也蓋理則純粹至善而氣則雜揉不齊內君子外小人凡所以抑隂而扶陽者乃順乎理以裁成輔相而濟夫氣數之不及者也又何病乎鄉原是一種小廉曲謹阿世徇俗之人今曰云云非其義也又云胸懷明爽一日千里者此為實曽用人之人與他説雖善而未必實有功夫者不同然其迫切之病驕吝之私亦非他人所及也又有謂墮於習俗之見釋氏之善者杜門獨善則可此亦非是更思之見善明是平日功夫用心剛是臨事決斷二者皆不可闕而當以平日功夫為先不然則其所謂剛者未必不為狂妄激發過中之行矣答劉公度來書深以不得卒業於湖湘為恨此見志道之篤然往者以衒鬻之嫌而緩於請益亦太不勇矣彼自干名我自講學彼亦安能浼我耶三千之徒豈皆確然為道而來若以自附為嫌則顔曾之流亦且不屑於孔氏之門矣豈不誤哉所論主敬之説固學者之切務然此亦要得講學窮理之功見得世間道理歷歷分明方肯如此著力若於聖賢之言有所忽略不曽逐句逐字子細理會見得道理都未分明却如何捺生硬做得成如所謂齊心致敬於平旦之頃以求理之所在者亦恐徒勞而無輔也古人之學欲其造次顛沛之不離今乃獨求之平旦之頃則其他時節是勾當甚事耶所論濂溪見處亦恐未然濂溪所見正為與異端不同故立言垂教句句著實如此若如此論即是所見一般但此公而彼私此大而彼小耳且既有公私大小之不同則其所同者又何事耶凡此皆恐未易遽論要當降心遜志且就讀書講學上子細用功久之自有見處也義理細密直是使粗心看不得乍看極似繁碎久之純熟貫通則綱舉目張有自然省力處向見論事文字綱領不甚分明今乃知其病之在此也僣易及之千萬照亮胡文定春秋曽熟看否未論義理且看其文字亦便見此老胸中間架規撫不草草也直卿志堅思苦與之處甚有益此道不是小事須喫些辛苦方可望也答或人示喻為學次第甚慰所望果能充此聖賢門戶真可䇿而進矣近世學者多是向外走作不知此心之妙是為萬事根本其知之者又只是撑眉努眼喝罵將去便謂只此便是良心本性無有不善却不知道若不操存踐履講究體驗則只此撑眉努眼便是私意人欲自信愈篤則其狂妄愈甚此不可不深察而逺避之也答或人仁者與天為一智者聽天所命與天為一者嘉人之善矜人之惡無所擇於利害故能以大事小聽天所命者循理而行順時而動不敢用其私心故能以小事大然此亦各因一事而言惟仁者能如此智者能如此耳非專以事大事小為仁智之分樂天畏天之别也仁者固能事小然豈不能事大智者固能事大然豈不能事小但其事之情則有樂天畏天之異耳保天下保一國以其德之厚薄量之大小而言亦無一定之拘畏天之威于時保之此智者畏天而保天下之事也所云忘私克巳乃畏天之事樂天則無私之可忘無巳之可克矣度勢量力乃計利害之私智者知天理之當然而敬以循之所以為畏天也晦庵先生朱文公文集卷第六十四終福州府儒學訓導鄭璉校正
