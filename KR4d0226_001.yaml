body:
  text: 詞虞帝廟迎送神樂歌詞桂林郡虞帝廟迎送神樂歌者新安朱熹之所作也熹既爲太守張侯栻紀其新宫之績又作此歌以遺桂人使聲于廟庭侑牲璧焉其詞曰皇胡爲兮山之幽翳長薄兮俯清流渺冀州兮何有眷玆土兮淹留皇之仁兮如在子我民兮不窮以愛沛皇澤兮横流暢威靈兮無外㓗尊兮肥爼九歌兮招舞嗟莫報兮皇之祐皇欲下兮儼相羊烈風雷兮暮雨右迎神三章二章四句一章五句虞之陽兮灕之滸皇降集兮巫屢舞桂酒湛兮瑶觴皇之歸兮何許龍駕兮天門羽旄兮􅌭紛俯故宫兮一嘅越宇宙兮無隣無隣兮奈何七政恊兮羣生嘉信玄功兮不宰猶彷彿兮山阿右送神三章章四句賦白鹿洞賦白鹿洞賦者洞主晦翁之所作也翁旣復作書院洞中又賦其事以示學者其詞曰承后皇之嘉惠宅廬阜之南畺閔原田之告病惕農扈之非良粤冬孟之旣望夙余駕乎山之塘徑北原以東騖陟李氏之崇岡地名李家山揆厥號之所繇得頽址於榛荒曰昔山人之隱處至今永乆而流芳陳舜俞廬山記云唐李渤字濬之與兄渉偕隱白鹿洞後爲江州刺史乃即洞創臺榭環以流水雜植花木為一時之勝自昇元之有土始變塾而爲庠儼衣冠與弦誦紛濟濟而洋洋廬山記又云南唐昇元中因洞建學館置田以給諸生學者大集乃以國子監九經李善道爲洞主掌其教授江南野史亦云當時謂之白鹿國庠在叔季而且然矧休明之景運皇穆穆以當天一軌文而來混念敦篤於化原乃搜剔乎遺遯朌黃卷以置郵廣青衿之疑問樂菁莪之長育拔雋髦而登進謹按國朝㑹要太平興國二年知江州周述乞以九經賜白鹿洞詔從其請仍驛送之六年以洞主明起為蔡州襃信主簿旌儒學荣郷校也迨繼照於咸平又増修而罔倦廬山記又云咸平五年敕重脩又塑宣聖十哲之象旋錫冕以華其歸琛亦肯堂而詒孫郭祥正書院記云祥符𥘉直史館孫冕以疾辭于朝願得白鹿洞以歸老詔從之冕未及歸而卒皇祐五年其子比部郎中琛即學之故阯爲屋榜曰書堂俾子弟居而學焉四方之土來者亦給其食悵茂草於熈寧尚玆今其奚論廬山記熈寧中作巳云鞠為荗草矣夫旣啓余以堂壇友又訂余以冊書尋訪之𥘉得樵者指告其處客楊方子直遂賛興作之謀既而劉清之子澄亦褒集故實來寄謂此前脩之逸迹復關我聖之宏橅亦旣震于余衷乃謀度而咨諏尹悉心以綱紀吏竭蹷而奔趨士釋經而敦事工殫巧而獻圖曽日月之㡬何屹厦屋之渠渠事具吕祖謙伯㳟所作書院記山葱瓏而逺舎水汨㶁而循除諒昔人之樂此羗異世而同符偉章甫之峩峩抱遺經而來集豈顓眺聴之爲娱實覬宫墻之可入愧余脩之不敏何子望之能給矧道體之亡窮又豈一言而可緝請姑誦其昔聞庶有開於時習曰明誠其兩進抑敬義其偕立允莘摯之所懷謹巷顔之攸執彼青紫之勢榮亦何心乎俛拾亂曰澗水觸石鏘鳴璆兮山木苯䔿枝相樛兮彼藏以脩息且游兮徳隆業茂聖澤流兮往者弗及余心憂兮來者有繼我將焉求兮感春賦觸世塗之幽險兮攬余轡其安之慨埋輪而縶馬兮指故山以爲期仰皇鑒之昭明兮眷余衷其猶未替抑重巽於旣申兮徇耕野之𥘉志自余之旣還歸兮畢藏英而發春潜林廬以静處兮閴蓬戸其無人披塵編以三復兮悟往哲之明訓㗳掩卷以忘言兮納遐情於方寸朝吾屣履而歌商兮夕又賡之以清琴夫何千載之遥遥兮乃獨有㑹於余心忽嚶鳴其恱豫兮仰庭柯之葱蒨悼芳月之旣徂兮思美人而不見彼美人之脩嫭兮超獨處乎明光結丹霞以爲綬兮佩明月而為璫悵佳辰之不可再兮懷徳音之不可忘樂吾之樂兮誠不可以終極憂子之憂兮孰知吾心之永傷士衡相繼有作雖極清麗顧乃自爲隱遁之辭遂與本題不合故王康琚作詩以反之雖正左陸之誤而所述乃老氏之言又非小山本意也十月十六夜許進之挾琴過予書堂夜久月明風露凄冷揮絃度曲聲甚悲壯旣乃更爲招隱之操而曰榖城老人嘗欲爲予依永作辭而未就也予感其言因爲推本小山遺意戲作一闋又爲一闋以反之口授進之併請榖城七者及諸名勝相與共賦之以備山中異時故事云七者疑當作老人南山之幽桂樹之稠枝相樛高拂千崖素秋下臨深谷之寒流王孫何處攀援乆淹留聞說山中虎豹晝嘷聞說山中熊羆夜咆叢薄深林鹿呦􅊯獼猴與君居山鬼伴君逰君獨胡爲自聊歲云莫矣將焉求思君不見我心徒離憂右招隱南山之中桂樹秋風雲㝠𪷟下有寒栖老翁木食澗飲迷春冬此間此樂優㳺渺何窮我愛陽林春葩晝紅我愛隂崖寒泉夜淙竹栢含煙悄青葱徐行發清商安坐撫枯桐不問簞瓢屢空但抱明月甘長終人間雖樂此心與誰同右反招隱詩逺㳺篇舉坐且停酒聽我歌逺㳺逺㳺何所至咫尺視九州九州何茫茫環海以爲畺上有孤鳳翔下有神駒􅋮孰能不憚逺爲我游其方爲子奉尊酒擊鋏歌慨慷送子臨大路寒日爲無光悲風來逺壑執手空徊徨問子何所之行矣戒關梁世路百險艱出門始憂傷東征憂晹谷西遊畏羊腸南轅犯癘毒北駕風裂裳願子馳堅車躐險摧其剛峩峩旣不支瑣瑣誰能當朝登南極道暮宿臨太行睥睨即萬里超忽凌八荒無爲蹩躠者終日守空堂擬古八首離離原上樹戢戢澗中蒲姢姢東家子鬰鬰方幽居濯濯明月姿靡靡朝華敷昔爲春蘭芳今爲秋蘼蕪寸心未銷歇託體思同車綺閣百餘尺朝霞冠其端飛櫩麗逺漢曲楹何盤桓清謡發徽音一唱再三歎借問誰爲此佳人本邯鄲微響激流風浮雲慘將寒爲言何所悲遊子在河關不恨乆離闊但憂芳歲䦨願爲清宵夣燕昵窮餘歡上山採薇蕨側徑多幽蘭采之不盈握欲寄道里艱沈憂念故人長夜何漫漫芳馨坐銷歇徘徊以悲嘆佳人朗秋夜蟋蟀鳴空堂大火西北流河漢未渠央野草不復滋白露結爲霜梁燕起高飛雲鴈亦南翔念我同心子音形阻一方不念執手歡隔我如參商寓龍不爲澤畫餅難充腸金石徒自堅虚名真可傷鬰鬰澗底樹揚英秋草前與君結歡愛自比金石堅金石終不渝懽愛終不踈一夕逺離别悠悠在中途相思未云變音容定何如傷彼三春蕖灼灼層華敷盛時不可留恐逐嚴霜枯夫君來何晚賤妾長離居高樓一何高俯瞰窮山河秋風一夕至憔悴巳復多寒暑遞推遷歲月如頽波離騷感遲暮惜誓閔蹉跎放意極驩虞咄此可奈何邯鄲多名姬素豔凌朝華妖歌掩齊右緩舞傾陽阿徘徊起梁塵繂縩紛衣羅麗服秉竒芬顧我長咨嗟願生喬木隂寅縁若絲蘿夫君滄海至贈我一篋珠誰言君行近南北萬里餘結作同心花綴在紅羅𥜗雙垂合歡帶麗服眷微軀爲君一起舞君情定何知衆星何歴歴嚴霄麗中天殷憂在之子起歩荒庭前出門今㡬時書札何由宣沉吟不能釋愁結當誰憐臨風一長嘆淚落如奔泉題謝少卿藥園二首自此詩至卷終先生手編謂之牧齋净藁謝公種藥地窈窕青山阿青山固不群花藥亦婆娑一掇召冲氣三掇散沈疴先生澹無事端居味天和老木百年姿對立方嵯峨持此供日夕不樂復如何小儒忝師訓迷謬失其方一爲彺瘖病望道空茫茫頗聞東山園芝术縁高岡瘖矓百不治效在一探囊再拜藥園翁何以起膏肓瘖一本作醒邵武道中同前詩起辛未風色戒寒候嵗事巳逶遲勞生尚行役逰子能不悲林壑無餘秀野草不復滋禾黍經秋成收歛已空畦田翁喜嵗豐婦子亦嘻嘻而我獨何成悠悠長路岐凌霧即曉􅏻落日命晚炊不惜容鬢凋鎮日長空飢征鴻在雲天浮萍在青池微蹤政如此三嘆復何爲友人黃子衡欲之上庠以詩留行若士有竒操久厭山林卑奮衣千里道巳與親友辭子行何悠悠世路方如兹歸來亦何日車馬光陸離幽蘭生前林擢置白玉墀不以芳意逺結根終不移願子崇明德潜躍貴因時悲風静夜聴喬木嵗寒姿何以廻軒駕千載相與期奉酬丘子野表兄飲酒之句微褐不充體寒夜懐重衾古來窮廬士歲暮多苦心苦心亦何爲世路多﨑􅋂不藉盃中物離憂坐自侵舉杯當勿辭何爲復沉吟醺酣遺所拘神慮契遐襟荒湎思前戒歡謡發清音雅唱一何髙仰酬非所任申章聊叙報洪量亦余欽丘子野表兄郊園五詠欲識淵明家離離踈柳下中有白雲人良非遯世者柳結楥遂芳植覆墻擁深翠還當具春酒與客花下醉荼蘼移自溪上園種此墻隂路墻隂少人行來歲障幽戸竹芭蕉植秋檻勿云憔悴姿與君障夏日羽扇寧復持芭蕉花柳遶宅茂先生在郊居下帷良已苦時作帶經耡𬞞圃古意兔絲附樸樕佳木生高岡弱蔓失所依佳木徒蒼蒼兩美不同根高下永相望相望無窮期相思諒徒爲同車在夣想忽覺淚沾衣不恨歲月遒但惜芳華姿嚴霜萎百草坐恐及兹時盛年無再至巳矣不復疑送劉旬甫之池陽省覲六十四丈遂如行在所上計雨雪成嵗暮之子逺徂征酌酒起相送慨我别離情池陽實大藩佐車屈時英子行一請覲上計趨呉京良玉懐貞操芳蘭含逺馨臨岐一珍重即此萬里程晨起對雨二首凄列歲云晏雨雪集晨朝高眠適方起四望但蕭條逺氛白漫漫風至林靄消流潦冐荒塗清川亦迢迢遐瞻思莫窮端居心自超覽物思無託即事且逍遥晨起候前障白煙眇林端雨意方未巳后土何時乾倚竹聴蕭瑟俯澗聞驚湍景物豈不佳所嗟嵗巳闌守道無物役安時且盤桓翳然陶玆理貧悴非所歎殘臈殘臈生春序愁霖逼歲昏小紅敷艶蕚衆緑被陳根隂壑泉方注原田水欲渾農家向東作百事集柴門客舍聴雨壬申沈沈蒼山郭暮景含餘清春靄起林際滿空寒雨生投􅑽即虚館簷響通夕鳴遥想山齋夜蕭蕭木葉聲宿武夷觀妙堂二首隂靄除巳盡山深夜還冷獨卧一齋空不眠思耿耿閑來生道心妄遣慕眞境稽首仰高靈塵縁誓當屏清晨叩高殿緩歩遶虚廊齋心啔眞祕焚香散十方出門戀仙境仰首雲峰蒼躊躇野水際須將塵慮忘社日諸人集西岡郊原曖芳物細雨青春時前岡遐敞地登覽情無遺農畆懐歲功壷漿祝神釐我慚里居氓十載勞驅馳今朝幸休閑追逐聊嘻嘻笑語歡成舊盡醉靡歸期乆雨齋居誦經端居獨無事聊披釋氏書蹔釋塵累牽超然與道俱門掩竹林幽禽鳴山雨餘了此無爲法身心同晏如新竹春雷殷巖際幽草齊發生我種南窓竹戢戢巳抽萌坐獲幽林賞端居無俗情雨中示魏惇夫兼懐黄子厚二首讀書春日晏雨至滿郊園一灑幽叢竹藹藹清隂繁齋居無還往鎭日空掩門欲將冲静趣與子俱忘言暄風變春餘卉木日葱蒨林間一雨來滿庭寒草徧寂寞謝朋儔晤語懐雋彦良無一水遥阻闊何由見夜聞子規幽林欲雨氣含凄春晚端居園徑迷獨向高齋展衾卧南山夜夜子規啼社門杜門守貞操養素安冲漠寂寂閟林園心空境無作細雨𬒳新筠微風動幽籜聊成五字句吟罷山花落浩然與誰期放情遺所託宿山寺聞蟬作林葉經夏暗蟬聲今夕聞巳驚為客意更值夕陽曛晨登雲際閣晨起踏僧閣徙倚望平郊攅巒夏雲暁蒼茫林影交暫釋川途念憇此煙雲巢聊欲托僧宇嵗晏結蓬茅池上示同逰者藕葉蓋波面池花猶未紅聊承暁露餘散歩詠凉風香氣巳飄忽客懐誰與同唯應同遊子芳意更匆匆過黃塘嶺屈曲危塍轉沉隂山氣昬蟬聲高樹暗石瀬淺流喧巳過黃塘嶺欲覔桃花源無爲此留滞驅馬踰山樊宿白芒畬早發招賢里夜宿白芒畬川暝前山雨風驚澗樹花途陸綿異縣曛黒泊田家逢人聊問路猶恨去程賖濯足澗水二首濯足澗邉石山空水流喧行旅非吾事寄此一忘言澗邉濯足時脩途倦煩燠振䇿欲尋源山空無往躅自溪口買舟至順昌示同行者時燠倦長途買舟至西郭烟波方渺然坐此溪上閣子留且歡宴我去成蕭索同行不同調此意誰與託宿篔簹舗庭隂雙樹合􅖠夕孤蟬吟盤礡解煩鬱超揺生道心倒水坑作窮幽鮮外慕殖志在丘園即此竟無得空恨嵗時遷川陸緜半載煩燠當歸縁憇此蒼山曲洗心聞澗泉夏日二首夏景巳逾半林隂方澹然鳴蟬咽餘響池荷競華鮮抱痾守窮廬釋志趣幽禪即此窮日夕寧爲外務牽雲臻川谷暝雨來林景清齋舎無餘事凉氣散煩纓望山懷釋侣盥手閱仙經誰懷出塵意來此俱無營對雨虚堂一逰矚驟雨滿空至的皪散方塘㝠𪷟結雲氣勢逐風威亂望窮山景翳烟靄集林端蒼茫欲無際凉氣襲輕𥚑炎氛起秋思對此景凄凄還増冲澹意齋居聞磬幽林滴露稀華月流空爽獨士守寒栖高齋絶群想此時隣磬發聲合前山響起對玉書文誰知道機長又聞琴作瑶琴清露後寥亮發􅖠間韻逐囬風逺情隨玄夜䦨端居獨無寐林扉空掩關起望星河落哀絃方罷彈讀道書作六首巖居秉貞操所慕在玄虚清夜眠齋宇終朝觀道書形忘氣自冲性逹理不餘於道雖未庶已超名跡拘至樂在襟懷山水非所娯寄語狂馳子營營竟焉如失志墮塵網浩思屬滄洲靈芝不可得歳月逐江流碧草晚未凋悲風颯巳秋仰首鸞鶴期白雲但悠悠白露墜秋節碧隂生夕凉起歩廣庭内仰見天蒼蒼東華緑髮翁授我不死方願言勤脩學接景三玄郷四山起秋雲白日照長道西風何蕭索極目但烟草不學飛仙術日日成醜老空瞻王子喬吹笙碧天杪鬰羅聳空上青冥風露凄聊乗白玉鸞上與九霄期激烈玉簫聲天矯餐霞姿一囬流星盻千載空相思王喬吹笙去列子御風還至人絶華念出入有無間千載但聞名不見冰玉顔長嘯空宇碧何許蓬萊山秋雨一雨散林表清隂生廣庭喜兹新秋夜起向高齋行煩歊獲暫祛凉氛集華纓沉沉逺林氣愜此端居情節物坐如此撫世襟方盈歸當息華念超遥悟無生秋夕懷子厚二首雨歇林氣爽月華湛遥暉齋居翫物變廓落滄洲期焚香散碧虚撫節陳清詩抗志屬雲端非君諒誰知凉氣沉齋宇夕隂未渠央寒栖屬遥夜長簟卷單床浮雲蔽中天愁霖隔秋牎思君一晤對耿耿何能忘病中呈諸友窮居值秋晦抱疾獨齋居行稀草生徑一雨復旬餘交親各所營曠若音塵踈始悟端居樂復理北􅖠書讀誦興已闌起坐方躊躇緑樹滿空庭䇿䇿凉飊𥘉良時不復停煩吝未云祛還思對君子日夕佇軒車川上見月歸示同行者川上偶携手皓月起林端一舒臨流望玄露巳先漙歸掩荒園扉更怯裳衣單清夜可晤言獨處誰爲歡月夜述懐皓月出林表照此秋牀單幽人起晤歎桂香發窓間高梧滴露鳴散髪天風寒抗志絶塵氛何不棲空山冬雨不止忽忽時序改白日藏光輝重隂潤九野小雨紛微微蒼山寒氣深高林霜葉稀田家秋成意落落乖所期曠望獨興懷戚戚愁寒飢事至當復遣且掩荒園扉贈仰上人澗谷秋雲暁飄颻無定姿氛氲升逺樹凌亂起寒颸雨罷成孤鶴天高逐散絲上人歸别嶺心迹但如斯即事偶賦白煙竟日起雨晦蒼山深老菊不復妍丹楓滿高林抱病寢齋房窓戸結愁隂起望一舒情遐眺豁煩襟人生亦巳勞世路方﨑􅋂且詠招隱作無爲名跡侵作室爲焚修之所擬歩虚辭歸命仰璇極寥陽太帝居翛翛列羽幢八景騰飛與願傾無極光回駕俯塵區受我焚香禮同彼浮黎都寄題咸清精舎清暉堂山川佳麗地結宇娱朝昏朝昏有竒變超忽難具論千嵐蔽夕隂百嶂明晨暾穹林擢遥景回澗盪秋氛覽極慚未周窮深遂忘喧欲將身世遺况託玄虚門境空乘化往理妙觸目存珎重忘言子高唱絶塵紛冬日二首蕭索時序晚已復度髙秋回澗白波起通川絳樹稠晨風散清霜嘉稻卷平疇獨懷志士感歲事幸將休清霜染澗樹蕭索向嚴冬宻雨有時集寒雲無定容波明橫瀬出風急逺林空一極窓間眺高旻矗亂峰春日即事癸酉郊園卉木麗林塘煙水清閑棲衆累逺覽物共關情憇樹鳥啼幽縁原草舒荣悟恱心自遣誰云非逹生誦經坐厭塵累積脫躧味幽玄静披笈中素流味東華篇朝昏一俯仰嵗月如奔川世紛未云遣仗此息諸縁春日言懷春至草木變郊園猶掩扉兹晨與心㑹覽物徧芳菲桃蕚破淺紅時禽恱朝暉泉谷暖方融原田水𥘉肥東作興庶甿歲功始在兹端居適自慰世事復有期終然心所向農畆當還歸晚歩東原鬰巳秀嘉樹藹𥘉緑衆卉發春陽前山可遐矚端居日康倦涉澗歩墟曲景幽恣所尋悟恱何由足鳥鳴華薄深泉響亂流續握手一同忻吾生詎幽獨倦疑當作揵懷友山夕烟景亂林空鳥啼幽懷人隔春江夣想積離憂覽物懷悄悄臨觴但悠悠徘徊東西歩悟歎復何求山館觀海棠作二首景暄林氣深雨罷寒塘渌置酒此佳辰尋幽慕前躅芳樹麗煙華紫緜散清馥當由懷别恨寂寞向空谷春草池塘緑忽驚花嶼紅亂英深淺色芳氣有無中置酒賔朋集披襟賞咏同若非摹寫得應逐綵雲空題畫青鸞凌風翔飛仙窈窕姿高挹謝塵境妙顔粲瓊㽔登霞抗玉音結霧吹參差神鈞儛空洞玄露湛霄暉山中玉斧家胡不一來嬉眞凡路一分冥運千年期過武夷作弄舟縁碧澗棲集靈峯阿夏木紛巳成流泉注驚波雲闕啓蒼茫高城鬱嵯峨眷言羽衣子俛仰日婆娑不學飛仙術纍纍丘冡多同安官舎夜作二首官署夜方寂幽林生月𥘉閑居秋意逺花香寒露濡故國異時節欲歸懐簡書聊從西軒卧塵思一蕭踈窓戸納凉氣吏休散朱墨無事一翛然形神罷拘役暫愒豈非閑無論心與跡寄山中舊知七首結茅雲壑外石澗流清泉澗底采菖蒲顔色永芳鮮超世慕肥遯錬形學飛僊未諧物外期巳絶區中縁客子歸來晚江湖欲授衣路岐終寂寞老大足傷悲慷慨平生志㝠茫造物機清秋鵰鶚上萬里㸔横飛晨興香火罷入室披仙經玄黙豈非尚素餐空自驚起與塵事俱是非忽我營此道難坐進要湏悟無生故園今夜半林影澹逾清曵杖南溪路君應獨自行潺湲流水思蕭索早秋聲盡向琴中寫焉知離恨情采藥侵晨入亂峯宿雲無處認行蹤歸來應念塵中客寄與玄芝手自封凄凉梧葉變芬馥桂花秋日夕湖臯勝哦詩憶舊遊秋至池閣静天高林薄踈西園有佳處那得與君俱述懐夙尚本林壑灌園無寸資始懐經濟䇿復愧軒裳姿效官刀筆間朱墨手所持謂言殫蹇劣詎敢論居卑任小才亦短抱念一無施幸䝉大夫賢加惠寛箠笞撫巳實巳優於道豈所期終當反𥘉服髙揖與世辭釋奠齋居理事未逾月簿書終日親簡編不及顧几閣積埃塵今辰屬齋居煩跼一舒伸瞻眺庭宇肅仰首但秋旻茂樹禽轉幽忽如西澗濵聊參物外趣豈與俗子羣試院雜詩五首齋宇夜沉寂凄凉群物秋卧聽簷㵼盡心屬故園幽了事知何日分曹喜勝流笑談眞暫爾不敢恨淹留寒燈耿欲滅照此一窓幽坐聴秋簷響淋浪殊未休窮秋一雨至暫止復蕭蕭曲沼寒流滿空庭凉葉飄聞鍾懐故宇覽物屬今朝一詠歸來賦頓將形跡超長廊一逰歩愛此方塘凈急雨散遥空圓文滿幽鏡堦空緑苔長院僻寒颷勁長歗不逢人超揺得眞性藝苑門禁肅長廊似僧居偶來一散歩暫與塵網踈文字謝時軰銓衡頼羣儒伊予獨何者偪仄心煩紆巖桂山中緑玉樹蕭灑向秋深小閣芬微度書帷氣欲侵披懐清露曉遇賞夕嵐隂珎重王孫意天涯淚滿襟秋懐并梧巳飄黃澗樹猶含碧煙水但逶迤空齋坐蕭瑟端居生逺興散漫委書帙愛此北窓閑時來岸輕幘微鍾忽迢遞禽語破幽寂賞罷一悁然淡泊忘所適喜晴衝颷動高柳渌水澹微波日照秋空凈雨餘寒草多放懷遺簿領發興託煙蘿忽念故園日東阡時一過夜賦暗窓螢影亂秋幃露氣深羣籟喧巳寂青天但沉沈惻愴懷高侣幽黙抱冲襟遥憶忘言子一寫山水音暁歩𥘉日麗高閣廣歩愛脩廊重門掩秋氣高柳廕方塘閩海冬尚温晏隂天未霜坐悲景物殊亦念歳時荒故園屬佳辰登覽遍陵岡賔逰盡才彦蕭散屏壺觴别來時巳失懷思寜蹔忘宦逰何所娱要使心懷傷書事重門掩盡静寂無人境喧嚴程事云巳端居秋向殘超揺捐外慮幽黙與誰言即此自爲樂何用脫籠樊八月十七夜月忽忽秋逾半清輝萬里同遥知竹林夜共賞碧雲空寂寞盈尊酒凄凉滿院風寒塘空自緑不似小園東憶齋中二首高齋一逺聎西南見秋山景翳夕隂起竹宻幽禽還賞愜慮方融理㑹心自閑誰料今爲客寥落一窓間蟋蟀亂秋草故園風露深何因不歸去坐使百憂侵秋夕秋風桂花發夕露寒螿吟歲月坐悠逺江湖亦阻深紛思寜復整離憂信難任終遣誰爲侣獨此澹冲襟夣山中故人風雨蕭蕭巳送愁不堪懷抱更離憂故人只在千巖裏桂樹無端一夜秋把䄂追歡勞夢寐舉杯相屬暫綢繆覺來却是天涯客簷響潺潺㵼未休懷子厚中夏辤故里渉秋未停車賔友坐離闊田園想榛蕪感兹風露朝起望一煩紆眷彼忘言子鬰鬰西齋居俯飲蒼澗流仰咏古人書名應里閭薦心豈榮利俱琅然撫枯桐幽韻泉谷虚褰裳欲往聴乖隔靡所如南安道中暁澗淙流急秋山寒氣深高蟬多逺韻茂樹有餘隂煙火居民少荒蹊草露侵悠悠秋稼晚寥落歲寒心垂澗藤寒泉下碧澗古木垂蒼藤䕃此萬里流閑花自層層何人賞幽致白髪岩中僧臨流石偃蹇西澗濵枵然似枯木下有幽泉鳴上有蒼荅緑來往定何人山空此遺躅懸崖水秋天林薄踈翠壁呈清暁迢遞㵼寒泉下有深潭悄時飄桂葉來尋源路殊杳穿林徑屈曲上雲端似向崖隂斷行聞山鳥鳴下與泉聲亂去去不知疲幽林自成玩九日故國音書阻一方天涯此日思芒茫風煙歲晚添離恨湖海尊前即大荒薄宦驅人向愁悴舊逰惟我最顚狂細思萬石亭前事辜負黃花滿帽香督役城樓天高無遊氣林景澹餘暉感此霜露節但傷風土非季秋時序温百卉不復腓祗役郊原上暄風一吹衣仕身諒無𥙷課督慚飢羸還憶故園日䇿杖田中歸再至作荒城一騁望落景麗譙門隱隱鍾猶度依依嵐欲昬風霜非故里禾黍但秋原極目歸來晚兹懷誰與論晚望禾黍彌平野凄凉故國秋清霜凝碧樹落日翳層丘覽物知時變爲農覺歲遒不堪從吏役憔悴欲歸休苧溪道中秋山有紅樹忽憶野田中禾黍收將盡氛埃晚欲空登原悲落景倚杖怯高風更有寒塘水應將此處同十月朔旦懷先隴作十月氣候變獨懷霜露悽僧廬寄楸檟饋奠失兹時竹栢翳隂岡華林敞神扉汛掃託群隷瞻護煩名緇封塋諒久安千里一歔欷持身慕前烈衘訓倘在斯歩虚詞二首扉景廓天津空同無貟方丹晨儛七氣朶秀東渟房飡吐碧琳華仰噏飛霞漿竦轡絶冥外眄目撫大荒䇿我緑軒軿上際於浪滄神鈞亦寥朗䁆靄晨風翔養翮塵波裏縦神非有亡一樂無終永千春詎能當褰裳八度外竦轡霄上逰軒觀隨雲起偃駕東渟丘丹荑耀瓊岡三素粲曾幽躡景遺塵波偶想即虚柔盻目娯真際不喜亦不憂宴罷三椿期顛徊翳滄流千載何足道太空自然疇民安道中祗役東原路長風海氣隂蒼茫生逺思憭慄起寒襟午泊僧寮静昏投縣郭深拙勤終不𥙷誰使漫勞心西郊縱歩西郊一逰歩極目是秋山積水羣峰碧清霜楓樹丹故園心不展投䇿詎能閑且適平生意無令雙鬂斑寄黃子衡逺宦去郷井終日無一歡援琴不能操臨觴起長歎我友客京都肅肅雲天翰别去今㡬時各在天一端有酒不同斟中情誰與宣裁詩一問訊重使心思傳濯足萬里流褰裳縁碧澗濯足憇清幽却拂千巖石聊乗萬里流氛埃隨脫屣歩武欲横秋極目滄江晚煙波殊未休孤鶴思太清孤鶴悲秋晚凌風絶太清一爲棲苑客空有呌群聲夭矯千年質飄颻萬里情九臯無枉路從遣碧雲生與諸同寮謁奠北山過白巖小憇聮車渉修坂覽物窮山川踈林汎朝景翠嶺含雲煙祠殿何沈邃古木鬰蒼然明靈自安宅牲酒告恭虔肹蠁理潜通神蚪亦蜿蜒旣欣歲事舉重喜景物妍解帶憇精廬尊酌且留連縱談遺名跡煩慮絶拘牽迅晷諒難留歸軫忽巳騫蒼蒼暮色起反斾東城阡懷山田作二首郊園多所樂况此歲云暮寒色澹遥空清霜變紅樹欲舒林表望詎識塵中趣向晚寂無人氤氲欲成霧冬日冰溪流巳咽隂嶺寒方結忽值早梅春未恐芳心歇的皪終自妍殷勤爲誰折千里寄相思相思政愁絶梅花夜雨二首擁衾獨宿聽寒雨聲在荒庭竹樹間萬里故園今夜永遥知風雪滿前山故山風雪深寒夜只有梅花獨自香此日無人問消息不應憔悴損年芳將理西齋欲理西齋居厭兹塵境擾發地得幽芳斸石依寒篠閑暇一題詩懷沖獨觀眇偶此愜高情公門何日了寄題金元鼎同年長泰靣山亭抗心塵境外結宇臨秋山乗高一騁望表裏窮遐觀衆㟧互攅列連岡莾縈環陽崖煙景舒隂壑悲風寒碧草晚未凋林薄巳復丹仙人吳門子嵗晚當來還冬至隂雨愆陽值歲晏忽復層隂結一雨散霏微千林共騷屑端居遺簿領逺意懷幽㓗曠慮守微痾殊方感新節豈伊田廬念丘壠心摧折還登東嶺岡瞻竚何由歇安溪道中泉石竒甚絶類建劔間山水佳處也驅車陟連岡振轡出林莾霧露暁方除日照川如掌行行遵曲岸水石窮幽賞地偏寒篠多澗激淙流響祗役未忘倦心神暫蕭爽感兹懷故山何日稅征鞅留安溪三日按事未竟縣郭四依山清流下如駛居民煙火少市列無行次嵐隂常至午陽景猶氛翳向夕悲風多逰子不遑寐我來亦何事吏桀古所記奉檄正淹留何當語歸計安溪書事清溪流不極夕霧起嵐隂虚邑帶寒水悲風號逺林涵山日欲晦窺閣景方沉極目無遺眺空令愁寸心梅花兩絶句溪上寒梅應已開故人不寄一枝來天涯豈是無芳物爲爾無心向酒杯幽壑潺湲小水通茅茨煙雨竹籬空梅花亂發籬邉樹似倚寒枝恨朔風柚花甲戌春融百卉茂素榮敷緑枝淑郁麗芳逺悠颺風日遲南國富嘉樹騷人留恨詞空齋對日夕愁絶鬂成絲病告齋居作層隂靄巳布小雨時漂洒獨卧一窓間有懷無與寫高居生逺興春物彌平野慮曠景方融事逺情無捨聊寄兹日閑塵勞等虚假感事有嘆榮華難久恃代謝安可量宿昔堂上飲今歸荒草郷高臺一以傾繐帳施空房繁絃旣闕奏緩舞亦輟行桃李自妍華春風自飄揚戀幄靡遺思更衣有餘芳身徂名亦滅事往恨空長寄語繁華子古今同一傷夏日凉氣集幽樹清隂生廣庭偶兹憇煩燠怱憶郊園行婉娩碧草滋迢遞玄蟬鳴官曹且休暇自適幽居情聞蟬悄悄山郭暗故園應掩扉蟬聲深樹起林外夕陽稀秋夜歎秋風淅瀝鳴清商秋草未死啼寒螿幽人幽人起晤歎仰視河漢天中央河漢西流去不息人生辛苦何終極蒼山萬疊雲氣深去錬形䰟生羽翼茅舎獨飲出身從吏役驅車渉窮山日落隂景晦天高風氣寒豈無斗酒資獨酌誰爲歡一盃且復醉百念中闌干宿傳舎見月空堂寒夜月華清獨宿凄凉夢不成欲向堦前舞凌亂手持杯酒爲誰傾寄諸同寮把酒江頭煙雨時遥知江樹巳芳菲應憐倦客荒茅裏落盡梅花未得歸登羅漢峯休暇曹事簡登高恣窺臨徜徉偶此地曠望披塵襟落日瞰逺郊暮色生寒隂歡餘未去巳更欲窮幽尋行披茂樹盡豁見滄溟深恨無雙飛翼往詣蓬山岑餘疑當作娱去疑當作云登靣山亭是日氛霧四塞獨見雙䯻峯新亭夙所聞登眺遂兹日極目但蒼茫前瞻如有失煙鬟稍呈露衆嶺方含鬰長歗天風來雲散空宇碧雙䯻峰絶壑藤蘿貯翠煙水聲幽咽亂峯前行人但説青山好腸斷雲間雙䯻仙渉澗水作幽谷濺濺小水通細穿危石認行蹤回頭自愛晴嵐好却立灘頭數亂峰試院即事乙亥端居惜春晚庭樹緑巳深重門掩晝静高館正隂沈披衣歩前除悟物懷貞心澹泊方自適好鳥鳴高林借王嘉叟所藏趙祖文畫孫興公天台賦凝思幽巖朗詠長川一幅有契于心因作此詩三首翩然乗孤鶴往至蒼崖巔上有桂樹林下有清冷淵洗心詠太素汎景窺靈詮棲身託歲暮畢此巖中縁山空四無人澗樹生凉秋杖䇿忘所適水木娯清幽散髪塵外飊濯足清瑶流静歗長林内舉翮仍丹丘雜記草木九首高蘿引蔓長挿楥垂碧絲西窓夜來雨無人領幽姿天門冬弱植不自持芳根爲誰好雖微九秋榦丹心中自保紅蕉根節含露辛苕頴扶楥緑蠻中靈草多夏永清隂足扶留種竹官墻隂經年但憔悴故園新緑多宿榦轉蒼翠竹窈窕安榴花乃是西隣樹墜蕚可憐人風吹落幽戸榴花春條擁深翠夏花明夕隂北堂罕悴物獨爾澹冲襟萱草一西窓萱草藂昔是何人種移向北堂前諸孫時遶弄萱草二端居春向殘夏氣巳清穆睡起悄無人風驚滿窓緑獨覺晨起獨行園花藥發竒頴猶嫌墜露稀更汲寒泉井澆花觀黃德美延平春望兩圖爲賦二首川流匯南奔山豁類天闢層甍麗西崖朝旦群峯碧劍閣望南山方舟越大江凌風下飛閣仙子去不還蒼屏倚寥廓冷風望演山祠事齋居聽雨呈劉子晉刀筆常時篋笥盈齋祠今喜骨毛清與君此日俱無事共愛寒階滴雨聲晦庵先生朱文公文集卷第一考異虞帝廟詞沛皇一作仰皇虞之一作韶之灕之一作武之一嘅一作一慨玄功一作元功感春賦悵佳一作恨佳吾心一作無心空同賦壁帶一作璧帶招隱操清商一作商歌逺逰篇問子何所之行矣戒關梁世路百險艱出門始憂傷東征憂暘谷西逰畏羊腸南轅犯癘毒北駕風裂裳一作願子審所之行矣戒関梁南轅犯癘毒北駕風裂裳東征憂晹谷西逰畏羊腸世路百險艱出門始悲傷春日即事縁原一作縁源古意一作俲古所依一作所託月遒一作月流春日言懷一作春日書懐過武夷作啓蒼一作起蒼八月十七夜月竹林一作故園九日湖海一作江海督役城樓感此一作感兹寄黃子衡重使一作却使懷山田作色澹一作色靄安溪道中忘倦一作忘疲征鞅一作歸鞅安溪書事一作晚望虚邑一作井邑涵山日欲一作山深日巳窺閣一作地逈極目一作一目借王嘉叟所藏趙祖文畫孫興公天台長川一幅一作借王嘉叟天台横卷洗心一作疑神澗樹一作桂樹長林一作兹林觀春望兩圖朝旦一作朝夕晦庵先生朱文公文集卷第一福州府儒學訓導舒鏊校晦庵先生朱文公文别集卷第一書時事出處劉共甫珙以下建陽胡德方家藏伏奉教帖甚慰乆不聞問瞻仰之意然此書之後傳聞動静千條萬端皆非村落所得詳此兩日忽聞有全蜀之命意其是乎未得其眞未敢遽奉慶也行期定何如若果西去能畧歸郷曲否此却未湏遽行但亦當永對向來聖錫正如此也若所傳非的當奉行前詔則交印後似却不必迃路來歸只令平父來臨川上下迎侍以歸足矣二姦雖去氣象全未廻盖上心猶以向來所爲爲是未有敢乗此痛言其非者昨告邦彦以所當論者惟獨斷二字頗以爲然又未知果能發之否間讀陸宣公奏議一一切中今日之病試取一讀從容前席爲上一一談之當有助耳若果造朝以亟行爲上早得一日是一日事然今巳似太遲若更過此則又無可說矣惟近臣愛君體國之義想又非畎畒縷縷之比固不當以私計之安便爲先而後圖之也聞欽夫亦勸行果爾又無疑矣程集及諸書拜領厚意但誤字處更不吝脩改爲善畧讀所改數䖏似少吝矣如何如何李先生碑額試煩問子駒不知可爲别冩數字示及否比及宗禮歸到又湏數月其家早欲成就巳先刻銘文只俟此字耳騃病之說不記前書拜禀云何誨諭之及乃知僣率之爲咎然所自比乃爾豈故人之望耶劉共甫竊承延登廟堂參貳樞筦君子之仕至此亦可謂得時得位可以不負其所學矣逖聞明命賛喜亡涯某去月六日始得離長沙與敬夫同行謁魏公墓下遂登祝融絶頂巳乃東歸至儲洲始分手盖講論之樂尚未曾有别去殊憫然也至醴陵始㣲聞兄有此拜至清江始得其真然伏讀十一月五日詔書奴詬大臣豕視庻位甚矣其間而不然也不知出兄筆否當時何不畧開諌耶自見此詔連三日寢食不安其曲折未易以一言盡大抵自此人主心益肆勢益孤賢人君子日益消縮不願立於其朝而讒謟靣䛕持禄保位之士益聚而肆然其無所不爲矣反復念此惻然寒心中夜以興不覺歎咤此殆聖主思之未熟而奉令承教之臣與有責也不知比來訏謨之際頗亦及此語否失之於前尚可捄之於後願益思所以矯正之術而亟諌之某嘗譬之人子事親之道不至於父母之顔色不和爲子者當左右承順以祈恱適耶當詬詈妻孥毆撃僮隷以快巳之忿耶此閭巷之人知之不待曾參孝巳而後委也至於人主事天之道何獨不然今日之爲其亦異乎吾所聞矣比至豫章見蔣參政文字慨然有出身任事之意所以告吾君者粗亦可觀但不知渠本領如何若只是如此說得亦不濟事况本領若不甚正則所謂是者非所謂賢者否又如何其可恃耶聞奏請令卿監郎曹舉士限五日奏又不得發照牒此是何措置只此一事可見風采柰何奈何陳公少進有何處畫觀今日氣象雖非有危機交急之慮然大根大本處𬒳羣小壊得八九分以上了日徃月來不是小事苦痛苦痛兄與陳公素有物望非它人比今日雖未爲宰相然實斷國論若只似常人遷延歲月保持禄位以俟人主厭棄而撃逐之則非惟大失人望隤隕家聲亦豈吾平日讀書問學之意邪亦豈吾平日致身事國之意耶在長沙時未覩近詔但巳不勝憂慮日與欽夫語此幾至隕涕不知當其任者視以爲何如耳願亟與陳公謀之某至豫章宿上籃寺偶復感此通夕不眠夜漏未盡呼燭作此不能旣所懐之萬一欲作陳公書不暇然作亦不過如此只老兄語次逹此懐足矣何以書爲哉然今日之事政湏爲其大者論薦人材亦有次第今日逺則益州近則呉興皆第一義諦而敬夫尤不可後如某輩草野之臣則雖有憂歎之心然以義分觀之似未當出兄果相念當且徐之不湏抑迫恐一旦大發狂疾彼此爲不利俟兩公有成則彈冠群彦之後殊未爲晚某許多年過了豈計此年歲間事耶此是實情相告某豈不欲及今一見明主極陳胷中之憤懣但思之言語必有太甚處恐却悮兩公恊賛彌縫之意所以斷然自誓决未敢出不獨爲身亦以爲親爲二公爲國計也千萬幸察彭子夀龜年止堂之孫沚家藏請違後一兩日即𬒳斥遣之􅒛出關恰一月始能逹里門奉祠幸巳得請而詞職未盡允勢湏更加控免耳區區鳬鴈不足爲重輕忽聞門下亦此論事去國而德修德夫相繼亦去爲之駭然此其間必有曲折恨未得聞不審從人今何所郷若遂赴鎮亦湏暫還江西經由上饒偶便託其教官林君致此丐以数字見報比來議論本末與諸人繼逐之由林君佳士時有人徍來不至浮沉也程允夫洵洪正學刋允夫家藏職幸巳如願而忌之者以爲僣瀆睥睨愈甚近日葉緫章中巳有姓名旦夕必有行遣矣改正恩數實無此例前此但以衆論紛紛故於奏狀中言之後來得請而復不說分明致此事故又申省陳乞近又只得省劄檢會申明巳降指揮行下盖諸公不敢将上而羣小因此又益紛紛細思此舉實有未安今且未令㤗兒赴銓其它姑置勿問看數月間如何又别相度也餘干冤痛莫能爲申理者區區於此尤不能無愧也魏元履掞之以下胡德方家藏宼日深矣爲之柰何諸報想自聞之此聞事甚遅方傳古藤之命未知果否誤國至此之肉其足食乎小譴何益龜齡旣起不知復作何計今日正懼狐䑕之妖蠹蝕君心此爲本根之禍不去此物國勢無自而張邉備無自而立賢才無由而見任直言無由而上聞矣老兄以爲如何成都全不聞近報不知到何許胡邦衡痛哭之書見之否說病證甚危急而無甚治法但顯言西帥䟦扈欲誅沈介取其首其機事不宻乃爾可怪乆不聞問念念不忘適有均亭便晨起手凍作字不成幾不可讀亦所以効顰耳一笑逐湯相陳豈非賞魏無知之功乎可笑可笑魏元履早稻旣登捄恤之勞計亦少緩矣但州郡以使節將臨大爲文具所至騷然而無毫髪之𥙷此爲可慮耳今歲之事偶然無大敗闕眞出天幸若只頼有位措置則今無郷井乆矣此非靣未易道也近日逐去洪邁稍快公論得劉􅊹父書云邂逅汪養源丈聞益州巳岀峽非晚到玉山矣上以其留行討賊始甚知之不知到闕相見又如何也此事繋消長非人力所及無咎得此邦𥘉聞甚以爲喜聞邦人亦深自幸旣而聞之乃不疾而速之人其殆禍吾州乎又非徐老之比也芮漕通書否不相怪否此諸公只好閑處說葛藤緩急實難仗也此三五日來始無閑擾稍可近書冊矣老兄比復作何功夫可見教否今歲不爲場屋計乎諸公薦賢之舉不知如何比扣芮語頗悠悠不知今巳發奏未也魏元履邉報如所示乃可慮此傳聞復不然云巳破虹縣靈壁兩城禽其魁帥得其積穀十餘萬斛不知孰是前日得先生書云鈆山見報亦如此所聞也史去而辛洪皆遷國論未知所定非草芧所得憂但願天意悔禍有以發悟聖心耳諌垣南榻素有直聲未聞有以大慰人望者何哉有所聞續以見示幸甚令子爲學督之不敢怠但良亦費檢束耳因書更切教戒令稍尊重爲佳魏元履共甫書與子飛云李顯忠聞殿帥之除知爲奪兵罷黜之漸有尹機者說之曰今魏公銳志恢復而諸將莫敢前者姑以是自薦公必喜而見留然計其財力未能舉事是我以空言而獲實利也顯忠恱言於公如機指意公果然之而不復計其力之未能大舉也上䟽出師廷議莫以爲可而上意向之不可奪詔報公即行顯忠與邵宏淵合兵入宿州宏淵欲散府庫以賚將士而全軍以歸李不可遣宏淵出城措置而盡有其金帛以馬載還其家巳而置酒高㑹官妓人子白金一兩士卒人子錢三百軍士大怒㑹虜騎至城下衆莫肯戰揚言虜盛不可當且欲圖之顯忠惶遽遂走失亡七八千人七萬人出寨還者六萬餘而軍資器械盡没幸是日大霧虜人不知我師之遁故無他不然幾殆然虜人冐火暑奔馳赴捄人馬踣於道者相望也入宿州後事寛甫書所報也書亦云上意猶向魏公但不知相湯公遣楊存中罷王龜齡又何意耳平甫云家書中言𥘉聞宿州之潰不得其由朝廷震駭疑二將降北德夀以二將皆楊舊部曲遣往招之故有此命後省𥘉欲論駁而亦不知所以爲他計者遂止不知果然否邵宏淵劉寳分護淮東西不知復如何守險之說未爲不然但不知所以爲自治之計如何耳但守與和二字相似不知爲是說者於此能别異之否愚謂今日之憂不在邉境正惟廟堂議論㢮張黜陟乃折衝制勝根本魏公績用不成正坐此耳吕許公謂范文正公言欲經畧西事不如且在朝廷此言深有味老兄以爲如何魏元履徐嚞巳罷共甫復改命三衢而朱新仲來爲泉守殊不可曉也二小使巳還魏公復出江上廿八日巳行矣查元章䕫漕馮方以太府少卿參議從魏請也任元受以祕閣參議亦必魏薦耳無咎除户部郎張安國以掖垣兼直詞禁王慶長閩憲想次第聞之矣但文云王瞻叔巳回此又何耶陳君此間過時無尋問處渠欲陸尉書巳作數字授之不知有効否觀其失業狼狽殊可憐恨不能有以處之耳孟子說向嘗編集雖巳終篇但苦無人啇量間因人或來問檢視之輙有不滿意處未欲傳出以誤後生也或彼中有人看此書講說有疑處令逐條抄出疑問之意便中寄示容撿鄙論爲荅有不當處却告駁難即彼此有益若全部冩得未必講習却無所用耳吕子約祖儉某向來杜門本無一事而恭兄誤使此來以爲到郡引疾便可得去今乃不然不意德人亦時出此蘇張之計也近復冐昧以書懇左司曽丈意其有以察此而力言之因通家問幸啓恭兄同爲一言以助其請幸甚累書求恭兄爲記五賢祠堂未蒙見報亦告侍次語及但得數語略記事實爲幸仍湏及早得之乗某未去刻石尤佳也豫章欲刻精義大字版意欲令并刻老兄所増橫渠諸說此間傳録未及數篇專作此數字今後遣人就借得以付之爲幸彼有教授黃君者此邦人甚向學令冩了即送來此轉寄還不妨也向伯元以下伯元之孫公永家藏衰病之餘勉強試吏遭此旱歉四顧茫然不免控告朝廷幸亦略蒙應副目今雖似可以支吾未知來春事體又如何比及終更亦當麥熟遺此凋瘵之民以付後人耳過䝉稱許何以當之秪益慙懼然縁此一事心勦形瘵精力全衰百病交攻求去未得殊無好懐也子卿一見傾倒留欵三日而行識趣議論今亦少得也聞臨江沈守留意荒政甚悉恨未得其條目而師法之今遣此人告糴其境或恐吏民有持閉遏之計者願得一言以觧其紛是亦仁人之惠也向伯元到官踰年𥘉亦粗徤自秋冬來足疾發動不免廢事經界𥘉不敢請適會議者及之𬒳㫖相度不敢不盡其愚而事乆不决浮議紛然遂力求去又竟不得今雖得㫖而農事已起不可復爲正當少俟秋成又未知賤跡能復幾時於此也世路如此唯得早去乃爲幸耳劉薦論事不阿近所未有亦恨太踈果墮語穽耳周南之䇿亦粗聞之然不能如來喻之詳邪說肆行而士氣不衰此乃爲可賀者然前輩清議在下之說又爲可慮柰何向伯元到官半歲前月忽苦脚氣手足俱痛至今未平郡計不足循例措畫無非殃民害物之事𥘉謂經界若行欺隱自露則可以供歲費而罷去諸色無名之賦今乃聞有隂沮之者至今未有成命次第且中輟矣在此旣無所爲衰病復爾交攻欎欎度日殊無聊頼巳上歸田之奏矣未知進止如何萬一未遂湏再請也向伯元某之賤體自四月𥘉感風濕之氣足疾發動一臥两月屢至危殆亟上告休之請近聞未得可報今雖未死然衰頽日甚自度不能復有補於縣官勢湏再請耳辭職亦竟未允當并力懇庻必遂也時論一變非復意慮所及忠賢奔播幾於空國而無君子矣吕子約經由曾進謁否江陵近收書否章茂獻聞欲徙居城中必時相見子卿想歸乆矣揚丈書巳領不知其巳趨召否今日之事凡曾在趙子直處喫一呷湯水者都開口不得只有此老尚可極言以冀主之一悟不知其有意否巳作書力勸之萬一肯出經由更望一言此宗社生靈之計非小故也林井伯成季言以下井伯之外孫方之㤗家藏刋帖餘干乆不得書日月愈逺令人傷歎山谷語云歸來兮逍遥西江波浪何時平眞可以泣鬼神也林井伯某向來一出略無補報罷逐而歸抵以自愧還家𥘉亦粗遣至此夏𥘉痼疾復動遂大狼狽意必不全亟遣告老人行巳五六十日尚未有處分然病軀却幸少蘇未知竟何如也餘干屢得書處之甚安亦殊不易擇之昨日自彼歸過此尤能道其曲折始者風波甚可駭愕今却少定不知事且止於此耶或更未巳也相看狼狽不能仰首一鳴深負憂愧子約一舉却甚竒特令人歎服也林井伯衡陽之報令人悲痛所幸便蒙歸骨之恩今當次第在道矣前日走寒泉與韜仲父子聚哭之極不能爲懐也旣無廷試從者歸期想亦不逺莫湏更爲過餘干否子欽後来相見否幾道亦當赴部今或巳到必相見也某詞職得請私義粗安若命懸庖厨則非人力所能避矣郷樞相見有何言句耶因遣人上謝表附此草草方耕道耒某來此巳八閱月自覺得不成行止亦不成政事徒然坐食俸禄使人慚愧然累求去不獲近又再請未知如何來喻云云極感忠愛然此意巳决雖欲自強而不能又安能承命而改轍耶其曲折之詳巳具南軒書中此不能多及想燕談之際當必及之耳皇甫路分意趣極不易得想同僚必相好也陳子眞莆陽方楷家藏休致文字巳申本郡尚未得保明申發萬一更有遟疑即不免徑申省陳乞矣比來論議似稍寧息未知竟如何正恐不削者以耳衛公計時相見聞欲徙居盤澗若不得去相近也開正晴暖欲拏舟南下又憚經由富沙不免見諸人一畨露頭靣可厭更俟計度若幸無疾病即當扶曳冒昧一行思欲見石佛懸泉之勝也劉德脩光祖以下後溪之曽孫曾元家藏欽聞德義有年於此中間入都雖嘗蒙枉顧然稠人中不暇交一語至今爲恨如未始得見顔色也前年竊聞進登言路有識相慶繼讀邸狀又得所上章䟽分别邪正明白剴切三復􅋏然爲之汗下盖乆矣莫有以此謦欬吾君之側者矣然於是時竊已深爲執事者憂之顧前此未嘗得通聲問無從效其區區且又意其駭機之發近在旦暮雖欲言之亦巳無及然猶懐不能巳竊竊私爲同志一二君子道之盖不唯欲以少效慕用之誠亦冀轉以聞於左右而求所以善其後也曾未幾時果聞去國時在臨漳無可與話此心者燕居深念撫几浩歎而巳嗚呼此豈吾人一身之休戚而造物者之意乃不可測知如此哉兹承不鄙逺貽教墨所以撫存之意甚厚自視卑簿何以克堪因便布謝適有土木之擾言不盡意伏𥿄増䟦劉德脩今春旣辭桂林之役幸復續食祠廪而自夏𥘉一病迄今未愈中間幾致委頓者數矣幸而獲免然今餘息奄奄未能復常呻吟少間謾讀舊書姑以思遺老耳不足爲左右道也昨聞諸公於門下数有裏言而群賢亦有彚進之勢作鎮䕫門是爲東來之兆而問者所聞乃若小異雖賢者所居而安無適不樂然當典戎幹方之任以蕃衛王室爲心亦豈能恝然於今日之事乎相望數千里無由一見傾倒此心引領郷風浩歎而巳某所爲大學論孟說近有爲刻板南康者後頗復有所刋正今内一通暇日一觀爲訂其謬并以質於東溪翁因風見教千萬幸也劉德脩相望數千里旣無會靣之期而聲問亦不得數往來每懐道義馳想亡巳不審比來爲况果何如統内軍民計自寧謐但前此時事傳聞多端想不能不深根本之慮今雖小定然諸公書來似巳便謂無事未知果便無事否耳所幸仁賢萃集未至空虗朋來彚征猶有可望如門下者恐終不得辭此責也某多難餘生近日復有季婦之戚長沙除目未之敢承其間盖有小小曲折非敢决然忘此世也因風寓音不究懐抱㐲𥿄恨恨郷人江㤗分教大府得親誨範甚以自幸其人明敏有志於善嘗爲邑宰以平易惻怛甚得民和不幸遭讒遂至罷免竊意高明當自有以察之收拾教誨亦或可以備使令也劉德脩某衰晚廢學守藩亡狀忽蒙收召巳不知所以然旋𬒳除書尤非所據力辭未獲冐昧以來則承門下到闕巳乆且拜螭拗之命矣正人得路羣議交慶此不待說而委也區區只一兩日便當入門對罷方得修敬諸容靣叙以罄鄙懐劉德脩生平慕用昨幸爲僚荷相與傾倒之深盖同世道之憂而非爾汝之私情也别去恰一月矣每懐德義郷往不忘某扶曵驅馳幸巳稅駕道間忽拜江陵之命罪疾如此豈堪復出不免上奏力辭計必可得自此杜門當日有趣但恨虚辱招延無所禆𥙷猶不能忘懐於吾君進學之淺深也因人往記目肓愈甚不能多及正逺唯冀以時珍衛勿忘致若行道之本懐緝熈光明以扶廟社區區至懇老先生必且宿晋後便拜狀子夀千里茂獻想時相會前幅之云僕於二三公亦不能無后望幸宻爲言之勿以語他人也逺近人材必更有可與共賛王業者不知爲誰亦望并見告也文叔行後時得書否北關之集風流雲散甚可歎也劉德脩忽聞去國深爲悵然盖有識之士無不同此歎息而昨日機仲經由相與仰德尤不能忘懐也今日之勢政使群賢悉力交輔猶懼不濟顧乃爲是以速之耶不審能便歸蜀耶或且宿留江湖間耶即今巳到何許也某前日始拜祠命不免復辭近職小贖前日失職之罪耳因便寓此托季章致之目昏不能多作字要亦無可言者但祝眠食之間千萬自愛耳天若祚宋彼將如我何哉東溪先生乆欲寓書今復未暇附此致瞻仰意文叔郎中前途必相見亦告爲道鄙懐也集賢益孤勢難復乆然亦有以自取也劉德脩兩辱惠書承且暫寓京口諸况便安足以爲慰但比來時大變殊駭聽聞流竄斥逐下及韋布近年以來所未有也國事至此是豈細故而身逺病衰不能一言以悟主聽愧恨悲痛不知所言伏惟執事愛君憂國當同此懐也比日不審台候似神相正直起居當益輕健也某前月之𥘉約機仲㑹於一山寺中爲兩日之欵時未有近日事也然巳不勝憂歎懐抱抑欎又感風濕歸来舊疾發動證候輕於往時而氣體積衰遂不能當藥未有効而傳聞愈甚病勢遂進不可支吾今雖未死然必無復全理巳上告老之章只從本州保明别無陳乞文字次第諸公見之意其巳死必遂其請也因定叟有人在此得附此書臂痛不能作字口占亦覺氣乏不得盡所欲言自度此生决無再見之期千萬爲天下國家厚自愛重乃所深望東溪先生體候何如得季章書聞亦不快深以爲念文叔巳别附書欲作傳之数字而建康人留此巳乆不能復俟異時相見幸爲深道此意也劉德脩昨大病中奉狀告訣今未成行且復宿留亦可笑也然病亦氣衰終難扶持未知復有後㑹之期否耳單守人還奉告之辱乃聞賢兄東溪先生遽啓手足而令女亦不起疾爲之怛然此在德門固爲不淑然前輩淪沒使一方學者失所依歸所繋尤不細也區區郷慕之乆去冬尚幸一見雖不及欵承教約然亦足以粗慰平生矣遡峽定在何日相望益逺非獨吾黨無以慰離索之懐未知世事終何所底止耳病中痊發狂疾欲舒憤懣一訴穹蒼旣復自疑因以易筮之得遯之家人爲遯尾好遯之占遂亟焚槀齰舌然胷中猶勃勃不能巳也餘干数日前得書處之甚適亦甚不易只去歲忙亂中得其書字畫言語皆晏然如平日固巳服其有定力矣相恩禮一新季章超遷甚羙論功第賞固自有次序耶正則請祠竟如何相見煩爲致鄙意此兩日來右臂方能屈伸未暇奉記也向見焦山瘞鶴銘側有謫丹楊工曹掾王瓉題詩詩詞甚佳字亦絶類鶴銘疑出一手瓉字巳闕但据趙德夫金石録云爾而文選詩中亦有此人名姓不知便是一人否然詩疑耳近年乃絶不見不知今尚存否暇日試爲訪之属正則摹数本寄及爲幸某挂冠之請人尚未還而小報巳不允勢湏再請但得冷撰舊秩亦可以巳矣不敢必其悉從也定叟人來因得寓此殘暑未衰萬萬以時自重不浸近而愈䟽臨風惘惘王瓉詩首句云江外水不凍今年寒復遲者是也或正則巳得請即以屬陳安行可也劉德脩昨聞當有房陵之役盖嘗因便拜狀不審得逹几下否但一向不聞聲問馳仰不自勝耳不審比日台候何似竊惟以道自勝無適不安神相忠賢起居萬福某衰晚疾病去秋以來足弱氣痞遂爲廢人然而罪戾至深幾亦不能自脫兹幸告休得請人謂庻幾少安自料則亦未敢保也東方事宜計悉聞之子夀近亦通書自云頗安然士友見之多云亦覺衰瘁也從之遂爲古人尤足傷歎于越得書寄示涪刻亦能道示衆語不審比来閑中何以可日老來始覺讀書有味所恨來日無多光隂真可惜也建昌陳剛正巳舊見吕伯恭稱之實竒士也不知曽相識否因其便人寓以此書所欲言者非幅𥿄可旣聞房州山水自佳向見張巨山集說有徴王峽乃㣲盧之㣲不知有傳記可考否因風幸筆示聊爲廣異聞耳文叔季章想時通問聞馮挍書極佳士遽爾殂殞深可惜也劉德脩某自去冬得氣痛足弱之疾渉春以來益以筋攣不能轉動懸車年及不敢自草奏又懶作群公書只從州府申乞騰上乃無人肯爲作保官者近方得黃仲本投名入社亦不知州郡意如何萬一未遂即不免徑自申省矣機穽冥茫不容顧避姑亦聽之而巳去歲数月之間朋舊凋落類足關於時運氣脉之盛衰下至布衣之士亦不能免令人愴恨無復生意然此豈人力之所能爲也哉劉德脩某屏處如昨近以郷邑不静挈家入城擾擾踰月今且歸矣間讀邸報幸復聮名而賤迹區區乃先衆賢爲不稱耳側聽乆之未有行遣勢不能免姑静以俟之耳度君周卿來訪志趣不凡知嘗出入門墻固應如此雖巳不敢隱其固陋然磨礱浸潤之功尚不能無望於終教之也劉德脩張子眞轉致去冬十一月十一日所惠書乃聞涂中患難曲折爲之太息吾人運數如此向来乃欲妄意以扶顛持危爲巳任豈不誤哉比日伏想稅駕里門休息神觀乆矣某辭職終年幸蒙聽許而諸人睥睨其勢愈急前日正則之䟽巳行旦夕必當次及矣餘干竟以柩還卜以此十日葬矣冤哉痛哉聞有爲之賦詩摹印掲之都市而匿其名者不知亦傳到蜀中否得其子壻書云道間渇甚誤服凉劑遂不能食又感風寒遂至大故臨行亦甚了了然向更不死今必巳度嶺矣前日聞訃因就其壻家哭之聞要路巳有切齒者亦且得行止分明也傳之云亡深可傷歎文叔竟成之郡否平父比亦得書去住無䇿甚可念也季章得書每以丐外爲言而未有聞恐是求之不力如王興之雷孝友亦何嘗有人苦留之耶晦庵先生朱文公文别集卷第一候官縣儒學訓導劉簮校晦庵先生朱文公文别集目録卷第一書以下時事出處帖劉共甫彭子夀程允夫魏元履吕子約向伯元林井伯方耕道陳子眞劉德脩卷第二書李端甫劉季章黄直卿祝汝玉劉公度蔡季通章茂獻劉智夫與長兒林擇之卷第三書以下講學及雜往來帖胡籍溪先生文叔程沙隨可乆鄭尚書惠叔程允文彭子夀孫季和劉子澄王子合卷第四書劉共甫何叔京廖子晦魏元履弟汪時法向伯元林井伯趙子欽方若水卷第五書方畊道鄭景明朱魯叔學古方畊叟皇甫文仲皇甫帥林子方劉德脩丁仲澄詹尚賓志南上人西原崔嘉彦林師魯林熈之朱魯叔余景思方伯謨劉平父子服弟卷第六書林釋之黄啇伯楊伯起葉永卿吳唐卿周得之李深子馮儀之卷第七詩與一維那上廣文考試感事戯作題米倉壁題安隱壁題𣑽天方丈壁五月五日海上遇風雨作兩絶句送順之南歸寄陳講師别陳講師登閤皁山送單應之徃閤送李道士歸玉笥三首題赤城觀尤溪縣學觀大閣十月上休日遊卧龍玉淵三峽用山谷驚鹿要湏野學盟鷗本願秋江分韻得鷗字次周師温遊書堂韻兼簡坐上諸同志西原居士􅓯寄秋蘭小詩爲謝記至樂齋記恕齋記祝文赦後舎菜先師祝文赦後祭祝文祭文祭林芸谷文祭文題䟦䟦芸齋遺文書李巽伯所䟦石鼓文後䟦訛傳龜山列子解後䟦郭忠恕說文字源題折桂院行記題星子縣尉廨射亭題落星寺題落星寺張于湖題字後題㝷真觀題五乳寺題捿賢磨崖題壘石庵題折桂院䟦所刻和靖帖䟦所刻包孝肅詩䟦王大𥘉所題書武侯草廬語遺張以道題所書古栢行題𣑽天法堂門題陳廷佐亭卷第八雜著釋氏論上釋氏論下陳請釋奠申禮部檢狀啓回余衡州回王正臣回衆解元回待𥙷生卷第九公移漳州延郡士入學牒洞學榜申諭耕桑榜辛丑勸農文招學者入郡學榜招舉人入白鹿咨目勸諭趂時請地種麥榜放官私房廊白地錢約束措置賑䘏糶糴事件措置兩縣到岸米船事招誘客販米斛免收力勝雜物稅曉諭再勸修築陂塘措置客米到岸民户收糴不盡曉諭曉示郷民物貨减饒市稅約束不許偷禾榖約束諸縣泛催官物各給慿由免流移民船力勝禁旅店不許逓傳單獨取㑹𬋩下都分冨家及闕食之家施行旱傷委官驗視施行旱傷住催官物一月諭上户承認賑糶米數目約束鋪兵檢坐乾道指揮檢視旱傷施行下諸縣躬親徧詣田叚相視禁戢人從不許乞覔放免官私房廊白地施行人户訴狀乞覔施行專欄牙人不許妄收力勝等錢禁豪户不許盡行收糴管下縣相視約束及開三項田叚乞行下江西從便客旅興販米穀約束米牙不許兠攬船米入市等事約束質庫不許關閉等事戒約上户躰認本軍寛䘏小民施行張廷諌訴旱傷事施行邵艮陳訴踏旱利害委官置塲循環收糴米斛約束遊手不許脅持良民援例乞撥錢米再諭人户種二麥行下三縣抄劄賑糶人户行下三縣置場約束許下户就上户借貸再諭上户䘏下户借貸革住米船隱瞞情弊行下場所革住米舡隱瞞申提舉司将常平米出糶行下置場不許晋滯客旅行下兩縣委官促人户糶米减尅申諸司乞行下江西不許遏糴卷第十公移申倉部及運司檢放三縣苗米數糶場印式號式用青絹印夾截糶場交錢量米緫簿式牌靣印𥿄式牌背題字式賑糶暦頭様措置賑糶場合行事件糶支外令施行下項施行置場賑糶濟所約束事委官徃各場究見元認米數樁管實數再措置場所賑濟孤老人等約束取會諸縣知縣下郷勸諭佈種如何施行事再行下三縣勸諭到上户賑糶不許抵拒事行下米場人户不到者於緫暦用印行下米場具糶過米式施行場所未盡抄劄户措置行下各場關防上户用濕惡糙米續置暦下場五日一次開具糶過米行下普作賑濟兩日再諭上户借貸米榖事再委官躰訪場所合干人减尅等事申監司爲賑糶場利害事件申提舉司借米付人户築陂塘施行闕食未盡抄劄人等事實審糶濟約束施行權免和糶令客米從便往来免糶客米三分榜文施行許令人户借貸官司米穀充種子佈種不係賑濟人一例賑濟行下各縣抄劄户口并立支米榖正數都昌縣搬張劉二家米等事諸縣得米人户依時佈種等事行下各場普濟半月外照約束接續委官覈實四户賑濟米數縣官保明事移文江西通放客米及本軍糴米舡事節次差公吏收糴并撥錢下賑糶場賑濟户口數奏乞推賞賑濟下户晦庵先生朱文公文别集目録晦庵先生朱文公續集卷第一答黄直卿南軒去冬得疾亟遣人候之春中人回得正月半後書猶未有他不數日聞訃則以二月二日逝去矣聞之痛悼不可爲懐聞其臨終猶手書遺劄數千言不數刻而終劄中大槩說親君子逺小人甚切當世之弊此尤可傷痛也此若得脫即便道往哭之而後歸耳庚子南軒云亡吾道益孤朋友亦難得十分可指擬者所望於賢者不輕千萬勉􅏧此中文字彦忠皆寫得巳屬令一一呈似矣鄭台州相見否更勸其子細講學爲佳書來所說殊未端的可惜只如此便更不求進歩也昨收書報及鄭台州之訃執書驚愕失聲何天無意於斯世而偏禍吾黨如此之酷痛哉痛哉自此每一念未嘗不酸鼻也此間今年枯旱可畏有彌望十數里而無一穗之可收者政惡所招無可言者然不敢不究心措置但勢亦有不得行者未知終能不得罪於斯人否耳力請丐歸計亦未必可得但恐自以罪戾罷逐耳世態不佳老病益厭俯仰但思歸卧林間與如直卿者一二人相與講論以終素業耳諸經舊說皆看得一過其間亦有改定處自慊却湏用舊說方見得自家有力緊要是從本原上說來比前日尤親切所諭羞惡未亡者此乃真是當得僞學二字朋友中只此一畨拍試㨂汰僞冐大叚得力但此道之傳不絶如綫深使人憂懼也來嵗聚徒勢所不免但此間屋子空虚多時不知如何處置也本領分明義利明白閑時都如此說及至臨小利害便靠不得此則尤可慮也禮書想巳有次第呉伯豐巳寄得祭禮來渠以職事無暇及此只是李寳之編集又不能盡依此中寫去條例其甚者如祭法祭義等篇巳送還令其重修特牲等篇亦有未入例處旦夕更取家鄕禮參校令歸一却附去煩㸔過王朝禮巳送與子約令附音䟽但恐渠亦難得人寫不能得耳近報誤舉僞學人許令首正觀此頭勢恐子合受得王漕文字亦不穩當人生仕宦聊爾隨縁亦何必湏改官而包羞忍恥處此危疑之地乎伯豐書云其所厚者以其無所私禱寄聲欲䋲治之子約亦甚稱其所守之固但世路如此所可憂者不但道學而巳任尉甚不易得然不欲深與之交恐復累渠入僞黨也季通家爲鄕人陵擾百端幾不可存立因書囑其隂護之爲佳時事大槩此亦聞之但諸人狼狽殊非所望耳子約終是好不知巳行遣未此事未開口斷置已定多少快活可爲致意未及奉慶也黄商伯事殊不聞首末子約書亦言其舉措有未善處不知救荒何所關於近習而惡之若是耶駭機飛語殊可憂畏䟽逺遁藏然猶不敢不跼踳也揆路曽相見否其說果何如邸報中見外間事賴諸賢維持且爾無大踈失但定省一節都不見人說著此甚可懼非小故也彼中親所見聞有何節目因便煩子細報來彼中且如來喻亦善世道如此吾人幸得竊聞聖賢遺教安可不推所聞以拯斯人之溺政使不得行於當年亦湏有𥙷於後也常教整頓學校亦甚不易可與晦伯說渠家有兩世奏議煩晦伯爲借錄得一本見寄爲幸辛卿鬻鹽得便且罷却爲佳中庸不暇看但所改物之終始處殊未安可更思之近却改得論語中兩三段如葉公子路曽晢之志如知我其天之類頗勝舊本旦夕錄去子約除官可喜今固未有大段擔負且看歲寒如何耳此間數日來整頓綱目事却甚簡乃知日前覺得繁只是局生要之天下事一一身親歷過更就其中屢省而深察之方是真實窮理自然不費心力也趙帥所云前官事不湏理㑹亦是一說未可便以爲非然只此便見合得顯榮通逹處如今世路未論邪正只剛强底便是八九分不得便宜了也大學向所寫者自謂巳是定本近因與諸人講論覺得絜矩一章尚有未細密處文字元來直是難看彼才得一說終身不移者若非上智即是下愚也此畨出來更歷鍜煉儘覺有長進處向來未免有疑處今皆不疑矣中庸三𥿄巳細看但元本不在此記得不子細然大槩看得恐是或問簡徑而章句反成䌓冗如鳶魚下添觧說之類又集觧逐叚下駁諸先生說亦恐大迫不穩便試更思之或只如舊而添集觧或問以載注中之說如何爲學直是先要立本文義却可且與說出正意令其寛心玩味未可便令考校同異研究纎密恐其意思促迫難得長進將來見得大意略舉一二節目漸次理會蓋未晚也此是向來定本之誤今幸見得却煩勇革不可苟避譏笑却誤人也陳君舉門人曹器逺來此不免極力爲言其學之非又生一秦矣所謂艱窘之狀令人惻然不知何故前此都不說着今乃一旦驟至此也自困涸轍無力相賙深負愧歎也然於此患難之際正當有以自處不至大段爲彼所動乃見學力不然即與世俗戚戚於貧賤者何以異耶辭免文字至今未得遣去蓋封事字數頗多昨日方寫得了更湏裝三兩日方得發也所欲言者不論大小淺深皆巳說盡明主可爲忠言想不至有行遣但能寢罷召命即爲幸耳萬一不遂不免一行更不能做得文字只是靣奏乞歸也或更要略說道學大學中庸集註中及大學或問改字處附去可子細㸔過依此改定令寫但中庸或問改未得了爲撓耳今年早晚禾皆損州縣官員不足恃賴未知明年復如何此外可深慮者不止一端亦非獨爲一身一家慮也時論未平不謂閑廢無能之人每煩君大夫旰食之憂如此比讀邸報不勝恐懼今章中所及如泉相者巳行遣湖守䟽中亦及彭子壽田子真以蠱毒事又下漕司究治其勢駸駸恐未容飽食而安坐也禮書縁遷徙擾擾又城中人事終日汩没不得功夫點對所編甚詳想多費心力但以王侯之禮雜於士禮之中不相干渉此爲大病又所分篇目頗多亦是一病今巳拆去大夫以上别爲䘮大記一篇其間有未及填寫處可一靣令人𥙷足更照别𥿄條目整頓諸篇務令簡㓗而無漏落乃爲佳耳修定之後可旋寄來㸔過仍一靣附入音䟽速於歲前了却亦是一事蓋衰老疾病旦暮不可保而罪戾之蹤又未知所稅駕兼亦弄了多時人人知有此書若𬒳此曹切害胡冩兩句取去燒了則前功俱廢終爲千載之恨矣明州書來亦說前數卷巳一靣附䟽王朝禮初欲自整頓今無心力㸔得巳送子約託其定仍令一靣附䟽彼中更有祭禮工夫想亦不多若伯豐寳之能便下手亦只湏數月可也但儀禮只有士大夫祭法不可更以王侯之禮雜於其中湏如前來所定門目别作廟制九獻及郊社諸篇乃爲盡善巳再條具寄之矣幸亦時爲促之并得歲前了當爲佳榮霤之說别𥿄奉報可更詳考便中報及也近日眼病全㸔文字不得但因講論見得此理愈見分明門路愈見徑直前日答吉州王峴書中有數句頗甚簡當今謾録去可以示丼吉父也峴乃鄕來子約所舘之家因子約來通問也子約又入王南强章䟽只此數人東湧西没到處岀見甚可笑也周樸甚可念一書并信煩因便寄與勿令浮湛爲佳趙㳟父竟坐其事部中行下取索不知意欲坐以何罪州郡知其無辜欲爲回申而㳟父不願也巳發去矣此却差强人意也孫之李和卿甚不易因書或相見湏各爲致區區當暑目昏不及拜書也楊子直甚入時宜不知亦只避得可避底枉了做許模様也僞學之章首辨張非僞學蓋前此劉元秀力薦王炎作察官而韓以受知張門爲疑故此章着意如此分别非獨欺天亦欺韓也故其後復申炎所陳薦舉之說乃是首尾專爲王地冷眼旁觀手足俱露甚可笑也且看此人終必得志蓋此事中間巳似稍緩却縁近日一繳其徒得以藉口復肆沸騰巳行遣人勢必從頭再有行遣張乃孟逺之弟本依韓劉今此以官滿欲差遣之故上書外爲直言而中實刪去又以未刪之本示劉而劉以示沈故及於禍此乃以邪攻邪自貽伊戚然遂死於道路亦可傷也又可懼也今冬上饒括蒼興國學者近十餘人到此新書院巳可居矣逐日幸有講論足以自警其間亦頗有可說話者所恨直卿不在此不得與之琢磨也初七日方遣得辭免近四十𥿄奏劄所欲言者略巳盡之但猶有記不起者不柰何耳今必巳到彼多日不知聖意如何若得遂退藏千萬之幸如其不然到彼亦别無話可說只是乞歸耳直卿來歲之計果何所定此人回幸見報若在後山此間諸生亦有能往者老拙亦時可一到也近日朋友來者頗多萬正淳與黄子耕呉伯豐皆在此諸人皆見陸子靜來甚有議論此間近亦有與之答問論太極書未及寫去大率其論與林明州不相逺也儀禮䟽義巳附得冠義一篇今附去㸔家鄕邦國四類巳付明州諸人依此編入其䘮祭禮可便依此抄節寫入只覲禮一篇在此湏自理㑹祭禮亦草編得數𥿄不知所編如何今并附去可更斟酌如巳别有䂓摹則亦不湏用此也可早爲之趂今年秋冬前了却從頭點對并冩得十數本分朋友藏在名山即此身便是無事人不妨閉門静坐作粥飯僧過此殘年也今日吾軰只有此事是着緊處若打不過即上蔡所謂能言空如鸚鵡者爲不虚矣伯豐劉五哥說巳得諸司文字以彼之才固有以取之但正用此時得之亦不能使人無疑耳目前朋友思索明快未有其比心甚惜之然於事有難言者因與之語要當有以警之救得此人亦非細事若此處打不過了更說甚操存涵養耶輔漢卿萬正淳皆留此兩月而後去其他朋友數人亦將去矣諸人皆爲外間浮論攻撃不敢自安而去其實欲見害者亦何必實有事迹與之相違但引筆行墨數十行便可使過嶺矣此亦何地可避耶世人見處淺狹例如此令人慨歎又來學者亦未見卓然可恃以屬此道之傳者今更有此間隔益難收拾不謂吾道之否一至此也思慮及此又使人深惜伯豐之不能自立曷嘗見有顔子而爲桓司馬家臣耶子約却是着實但又有一種不通透處激惱人時魚多骨金橘太酸天下事極難得如人意也禮書如何此巳了得王朝禮通前幾三十卷矣但欲將冠禮一篇附䟽以爲諸篇之式分與四明永嘉并子約與劉用之諸人依式附之庶幾易了適巳報與子約或就令編此一篇或直卿自爲編定此一篇并以見寄當擇其精者用之此本巳定即伯豐寳之軰皆可分委也病軀脚氣未動但目益昏恐更數月遂不復見物以此急欲了此書及未盲間讀得一過粗償平生心願也得曽致虚書云江東漕司行下南康毁語孟板劉四哥却云𬒳學官回申不可遂巳此其勢决難乆存只此禮書傳者未廣若𬒳索去燒了便成枉費許多工夫亦不可多向人前說着也謝表謾録去㸔勿以示人𥘉時更有數語後爲元善所刪然亦無甚緊要若謂取禍則只此亦足以發其機也子約頗愛泰兒亦巳囑令隨諸生程課督察之矣但婺州近日一種議論愈可惡大抵名宗吕氏而實主同父潘家所招館客往往皆此類深可憂歎亦是伯㳟有以啓之令人不無可恨耳近日郡事浸簡歲事亦可望但經界指揮不下恐復爲浮議所揺前此留葛報書皆謂可行獨王不報書疑此間受漳浦之㕓者或與當路厚善必實爲此謀耳若果如此乃漳人之不幸而老守之幸歲裏即可丐歸矣寄來算法巳收只此一事其說數端信知義理之難窮也知與劉潘諸人相聚甚樂恨不在近資講論之益但春秋難㸔尤非病後所宜且讀他經論孟之屬如不食馬肝亦未爲不知味也所以答手約者甚佳但恐亦不必如此今所慮者獨恐物不格知不至耳知至則自見得義利公私之下毫髪不放過也伯豐絶交之事渠必不能辦只韜藏避謗逡巡引却似亦不爲甚難如游誠之但以誤受舉削之故至今不爲改秩計巳近十年彼其人固多可議而爲學又非伯豐比且其親年已高而身亦五十餘嵗矣乃能斷置如此則其長處亦不可誣也若與之交淺言深但㣲與說及此意勸之以晦迹避謗當無不可也好朋友難得近日數爲人所誤令人意緒不佳深恐又失此人故不能不關念耳大學或問齊家治國章今善好惡改作今反其好中庸章句素隱下添隱謂卑陋也在本來也之下本無可稱改作本來卑陋得江西書呉伯豐果以去冬得疾不起見其思索通曉氣象開闊朋友中少能及之又子約元德書來皆言其自樹立之意尤不可及法門衰敗之秋又適䘮如此等人尤可痛悼也子約累書來辨中庸首章戒謹恐懼與謹其獨不是兩事又湏說心有指未發而言者方說得心字未說得性字又湏說是耳無聞目無見心無知覺時方是未發之中其說愈多愈見紛拏又爭配義與道是將道義來配此氣如何有人讀許多書胷中乃如此黒暗彭子壽𥘉亦疑中庸首章近得書却云巳釋然矣方知章句之說爲有功也張元德說得頗勝子約而其兄元瞻㸔得尤好若得伯豐且在與之切磨可使江西一帶路徑不差今旣不如所望而子約軰湛滯膠固不可救拔每得其書輒爲之數日作惡也病中㸔得孟子要略章章分明覺得從前多是衍說巳略修正異日寫去此書似有益於學者但不合顛倒却聖賢成書此爲未安耳大學諸生㸔者多無入處不知病在甚處似是䂓摹太廣令人心量包羅不得也不如㸔語孟者漸見次第季通比巳得其到道州書地主頗寛假之計渠亦能自處不知赦後還可得量移否周純夫甚可念欲寄一書問勞之亦復不暇亦恐彼中難得便耳謝表爲衆人改壞了彼猶有語是直令人不得出氣也此軰略不自思自家是何等物類乃敢如此殊可憫笑也書院中只古田林子武及婺州傅君定在此讀書頗有緒傅尤刻苦前此亦多讀書但未有端的用心處近方令其專一漸次讀書覺得却有立作將來或可望也孫丈書巳收書中盛稱仁卿政事之羙恨不得聞其詳也親舊皆勸謝絶賔客散遣學徒然其旣來即無可絶之理姑復任之若合過嶺亦是前定非關門閉戸所能避也晦伯人來得近問知山中讀書之樂甚慰但不應舉之說終所未曉朋友之賢者亦莫不深以爲疑可更思之固知試未必得然以未必得之心隨例一試亦未爲害也痰嗽巳向安否亦不可不早治也牒試中間辛憲湯倅過此皆欲爲問旣而皆自有客不復可開口其僞冐者固不容復動念知却劉倅之請甚善宗官衡陽之嫌固亦所當避也吾人所處着个道理二字便自是隨衆不得此是不可易之理但㸔處之安與否前書所論鬼神之說後來㸔得如何程書中說此話處數條東見録中尤多可類聚㸔湏自見諦當處也遷居擾擾中亦有一二學者在此雖不得子細討論然大抵未有擔荷得者此甚可慮陳正巳來自建昌實亦明爽但全别是一般說話所謂伯㳟之學一傳到此甚可懼耳近有臨江軍張洽秀才來資質甚好可喜可喜書院方蓋屋未得成就度湏更兩月方可居耳此女得歸德門事賢者固爲甚幸但早年失母闕於禮教而貧家資遣不能豐備深用愧恨想太夫人慈念必能闊略然婦禮不可缺者亦更賴直卿早晚詳細與說使不至曠敗乃善輅孫骨相精神長當有立輔亦漸覺長進可好㸔之所喻先天之說後來㸔得如何若如所論即天人各是一般義理不相綂攝矣恐更當子細玩索也近見朋友殊少長進深可憂慮任伯起到此昨夕方與痛說覺得上靣更無去處了未知渠能領略否耳廣西寄得語孟說來細㸔亦多合改以毉藥之擾未得專心方略改得數叚甚恨相去之逺不得子細商量也伯起說去年見陸子靜說游夏之徒自是一家學問不能盡棄其說以從夫子之教唯有琴張曽晳牧皮乃是真有得於夫子者其言恠僻乃至於此更如何與商量討是處也可歎可歎浙中旱甚當宁憂勞聞之令人恐懼柰何柰何江西除命縁上封事云云上感其言故有是命諸公𥘉只欲與郡上命與此更有少曲折甚可疑恠大抵此者盡出聖命或者以爲不當力辭其說亦是但衰悴如此孤危如此勢豈可出𥘉欲且受而臨期請祠明年四月缺又思不可不先做張本巳申省辭免矣得請甚幸不然却用前說以必得爲期耳子澄得書問直卿動靜南紀在長沙與同官不恊求去未知如何愛直堂記一本謾往子澄此文勝它篇也近㸔外書有一叚伊川答王信伯之問曰勿信某言但信取理不知曽見此話否前書所論伊川先生語甚善聖賢之教固不一端然專執僻見不信人言又豈信理之謂乎此處似更有商量要非靣見不能盡也子澄乃令副端章䟽言其以道學自負不曉民事與監司不和而不言所争之曲直又言其修造勞民而巳聞之趙倉巳嘗按之而復中輟必是畏此惡名而隂往臺諌處納之耳韜仲事甚可笑今之君子無以大相過者大率如此直是使人煩惱也彼中新宰巳交印否觀其舉措又似了不得然今日若無變通便是管葛之才亦了不得况於常人近嘗因書說與兩漕而林漕才到延平便以威勢迫脅小官使之爲縣是全然不曉㑹人說話矣可恠可恠楊元禮亦爲漕司不取願狀迫換長汀渠乞來禀議又不許却欲以倉檄來辨其事不知又如何今時做官不論大小直是全然睹是不得子澄冬至書云巳遣家歸廬陵只與一姪子在彼俟命則是此消息來得巳多時矣若道一例如是他人又却無是只是吾黨便有許多築磕亦可笑豈亦大家行着一个不好底運氣耶抑亦老子命薄帶累諸朋友也𬒳㫖一行不免一出但上恩如此不得不竭其愚聖德寛洪必不深罪言者然亦不能不以爲慮若便得罷逐還家乃爲厚幸所喻學業大槩甚善此間之約諸人不見說着次第不成頭緒但季通韜仲說欲相約來後山若得在彼亦易相見衰老之幸也輅孫不知記得外翁否渠愛壁間獅子今畫一本與之可背起與㸔勿令揉壞却也此是陸探㣲畫東坡集中有賛願他似此獅子奮迅哮吼令百獸腦裂也居廬讀禮學者自來甚善甚善但亦不易彼中後生乃能如此前此嘗患來學之徒真僞難辨今却得朝廷如此開大爐鞲煆煉一畨一等渾殽夾雑之流不湏大叚比磨勘辨而自無所遁其情矣日暮塗逺心力疲耗不復更堪討論矣日者多言今年運氣不好不知得見此書之成否萬一不遂千萬與諸同志更相勉勵究此大業也此間朋友間有一个半个然不甚濟事但不易其敢來亦可憐耳𬒳中朋友真肯用力者名姓謂何因書報及仍略品目之慰此窮寂之望也學古魯叔相繼逝者可傷呉伯豐尤可惜朋友間似渠曉得人說話者極少始者猶疑其守之未固後來得子約張元德劉季章書又知其所立如此不幸蚤死亦是吾道之衰念之未嘗不慘然也季章書語録去切勿示人足令同時軰流負愧入地也呉元士曽相識否作㸔王伯照雜說中間有一段理㑹不得或云渠嘗學於王公恐能知其說試爲宛轉託人扣之却見報也齋中諸友甚不易相信得及年來此道爲世排斥其勢愈甚而後生鄕之者曽不少衰自非天意何以及此老拙以此衰病之極而不敢少懈但精力不逮日月無多無以副其逺來之意深愧懼耳前日鄭齊卿去彼如此聞後來亦有一二如此者初甚慮之近亦漸漸開明甚悔當昨不且留之也所說論致仕文字其大槩止爲一二人如减年乃指沈正卿而言初亦疑此語迂回無下落以宗師之語推之意其爲沈而近得元善書乃云果爾則此自無可疑而城中諸人苦相沮抑不令剡奏爲可罪也然此文字三月半間已得之後來節次有便而游宰以爲渠有專人又便有回信不若令帶去爲便遂以付之渠乃遷延至此不知今文字在何處留滯若今尚未到則便遭論列亦是本分恠他不得矣然此如破甑若不打破做兩片亦湏打做兩截不復能顧慮也詔㫖正爲戒敕僞黨不得自比元祐想巳見之器數命題却巳寢罷然此等事亦有士人合理㑹者前日之弊乃爲汎濫細碎徒擾擾而無益今遽罷之又不究其弊之所自來大低此軰用心豈復更有是處自不湏論也林正卿歸自湖外少留兩夕亦頗長進但恐將來流成釋老耳其弟學履安卿中間到此近寄得疑問來亦㸔得好甚不易一書報之可分付入試朋友俟其到城日付之也題壁揭牓者正不足恠但不易諸生能自安於是賢於子合矣初見渠時聞其說曽子寢大夫之簀以爲不欲咈季孫之意便疑其意趣之不高後來講磨尚庶幾其有改不謂止是舊來見識也想聞子約之亡重爲吾道傷歎也近事似稍寧息而求進者納忠不巳復有蘇轍任伯雨之奏想巳見之大率是徐葉耳然似此紛紛何時是了兩日無事閑讀長編崇觀以來率是如此甚可懼也子約之亡傷痛未定而季通八月九日又巳物故朋友間豈復有此人尤足爲痛哭也但其家至今未得的信只魏才仲自桂林寫來前日李彦中歸道長沙見子䝉及趙漕說得分明矣今年不知是何厄會死了許多好人老拙尤覺衰憊非昔時比藏府不秘即滑脚弱殊甚杖而後能行恐亦非復乆於此世也季通之柩巳歸陳坂上對靣一寺中蓋先買得一小地在其前只今冬便葬也萬事盡矣尚何言哉一慟之餘行自病也向留丞相來討詩傳今年印得寄之近得書來云日讀數板秋來方畢甚稱其間好處枚舉甚詳不易渠信得及肯如此子細讀如趙子直却未必肯如此渠前此見中庸說極稱序中危㣲精一之論以爲至到亦是曽入思量以此見其資質之表惜乎前此無以此理謦欬於其側者而今日聞之之晚也所論曽晳事甚佳但云道體虚靜而無累恐鈍滯了道體耳呉元士說六十律爲京房之謬亦是但前此所扣乃是只以十二律旋相爲宫而生六十調非爲六十律也二孫隨衆讀書供課早晚教誨之爲幸鄭齊卿亦要去相從渠此幾日却稍得然以病倦不能聽其講觧念其志趣堅苦亦不易得可因其資而善道之度却不枉費人心力也致仕文字爲衆楚所咻費了無限口頰今方得州府判押但求保官更無人肯作只有伯崇一員或者以爲俞山甫必肯近以書扣之乃漠然不應今不免專人去問田子真想不至有他詞也禮書便可下手抄寫此中却得用之相助亦頗有益南康李敬子與一胡君同來見在書院敬子甚卓立然未細密胡君堅苦讀䘮禮甚子細亦不易得永嘉林𥙷字退思者亦暫來其人甚敏然都不曽讀聖賢書只一味胡走作甚可惜也彼中學者今年有幾人可更精切自做功夫勤於接引爲佳收近問知齋館旣開慕從者衆尤以爲喜䂓䋲旣定更且耐煩勉力使後生軰稍知以讀書脩巳爲務少變前日淺陋儇浮之習非細事也益公每得一書必問昆仲動靜且云嘗附書不知巳逹否此便回能以數字報之亦佳仁卿不殊此也致仕文字州府只爲申省不肯保奏此亦但得粗伸巳志不暇求十全矣旦夕當附人去成敗得失一切任之不能以爲念也通老來未志仁能與俱否病倦不暇作書煩爲致意春暖一過此爲幸公度必巳至亦未及書謙之數字可付之此間朋友不多亦未見大有進者然早晚略得舉揚一畨亦不爲無𥙷也試後江浙間必更有故舊來恨直卿不在此不得與之商量耳此理要處無多說話不知如何人自不曉以此追念伯豐愈深傷惜如子約軰亦不謂其所只到此處便死却也李公晦禹貢集觧編得稍詳今附去試㸔如可用可令人抄下一夲别發此冊回來爲佳二孫切煩嚴教督之聞外邉搜羅鼎沸如今便得觧亦不敢赴省况於其他只可着力學做好人是自家本分事平時所望於兒孫者不過如此初不曽說要入太學取科第也致仕文字近方發得去度今尚未到聞已有臺章指目矣此却是城中諸賢牽挽之力他人不足責曹晉叔老大隱約號爲有思慮者前日聞有此章尚以不及見止爲恨不知此是何等見識處事不問義理只顧利害巳爲卑鄙况今利害又巳曉然猶作是論真是不可曉也彭子壽行遣想巳聞之此事是放了徐子宜又要个人填窠子圖得舊話加色一畨光鮮不知如此有何了期也渠前日有一書今附去似亦是去年秋間附來近方到不知有何語也書社甚盛以善及人而信從者衆亦非細事可且勉力講論令其反巳着實用功爲佳然此外亦湏防俗眼讒口横生浮議也禮書附䟽湏節略爲佳但勿大略話疑當作畫彭子壽劉德脩二事想巳聞之楊惲之說何言歟吁可畏也借得黄先之數冊陸農師說初意全是穿鑿細㸔亦有以計鄭注之失者信開卷之有益俟用之行附去㸔也所喻惺惺之說甚善但見說講授亦稍勞似當節省并合令其簡約庶可乆也二孫在彼如何書社諸事旣有條理想自不容其違犯更望痛加鞭䇿少寛暮年却顧之憂千萬千萬小四郎與劉五哥莫湏常來咨問否雖不在齋中宿食亦望有以遥制之也致仕文字雖巳得之但諸賢切齒怒目之意殊不能平不知更欲如何搏噬姑亦任之耳用之去時所附書想巳逹所帶去文字想皆見之今則此等功夫全做不得矣精舍相聚不甚成條理蓋縁來有先後人有少長鄕有南北才有利鈍㸔文字者不㸔大意正脉而却泥着零碎錯亂纏繞病中毎與之酬酢輒添了三四分病以此每念呉伯豐未嘗不愴然也履之兄弟却差勝若更加功或恐可望耳伯崇巳赴官番陽留其季子在李敬子處姿質亦淳謹但未有奮迅拔出之意耳人家禍患重復如此可畏此又豈章子厚之所能爲耶古之禪宿有慮其學之無傳而至於感泣流涕者不謂今日乃親見此境界也前書所說常惺惺此是最切要處諸朋友行持亦頗見功効否向來學者得此一畨試過虚實遂可辨殊非小𥙷王子合前日過此觀其俯仰亦可憐也普之却能如此甚不易得禮書病起亦怕㸔却只㸔得少閑文字元來世間文字𬒳人錯注觧者只前人做下才隔一手便㸔得别而况此道之廣大精㣲也耶諸生相從者亦頗能有志否近報時學小變舉子軰往往相賀然此豈足爲重輕耶致仕且是巳分一事粗了然外靣攻撃之意殊未巳不知更待如何可付一笑但前日得劉季章書云孫從之得郡非其自請乃復被繳適病牙癰已逝去矣㸔此亦是吾黨同一氣運不得不然非但虎食其外也季章又云彭子壽相見亦甚衰悴題目不小想見憂懼然亦正自不必如此也所說大䂓摹細功夫者甚善諸朋友中必有向進者恨未得從容其間耳精舍諸友講論頗有緒通老果如所論甚慰人意得渠如此所助非細非他人比也但渠到此適以病倦又以諸㓜疾患爲撓不得甚與之𣢾曲以此知人之學所以不進只縁從初無入處不見其有可嗜之味而所以無入處又只是不肯虚心遜志耐煩理會更無他病也所論鞏仲至兩句切中其病前日與語正恠其如此渠苦心欲作詩而所謂詩者又只如此大抵人若不透得上頭一關則萬事皆低此話卒乍說不得也二孫乆煩教誨固不敢以向上望之但得其漸次貼律做得依本分舉業秀才不至大叚狼狽猖獗足矣伯謨自去秋病不能食中間一再到此甚悴前月晦日竟不能起以其胷懷趨操不謂乃止於此深可傷悼而毋老家貧未有可以爲後日之計又深可慮想聞之亦爲一愴然也伯崇之子見留精舍隨敬子作舉業亦淳謹朴實可喜也仙遊不成舉措然與今之受不係僞學舉狀者分數亦不多爭前日得致道書云鄭明州臨行欲薦潘㳟叔㳟叔對以必於章中刋去此說然後敢受鄭亦從之此亦差强人意而在鄭尤不易聞楊敬仲乃大不以爲然不知今竟作如何出場也外間汹汹未巳樓大防亦不免聞林采訴冤於朝巳下本路究實先所委官見其案牘駭異不敢下筆巳改送他官如其所請此諸人撏剥巳盡或湏作語頭來相料理老朽寜復計此一聽諸天而巳伯謨不幸前書報去未去時亦安靜明了但可惜後來一向廢學身後但有詩數篇耳然亦足逺過今日詩流也通老到彼住得幾日講論莫湏更有進否巳勸渠莫便以所得者爲是且更鄕前更進一歩不知後來意思如何也渠說冬間更欲來訪但恐迫於赴官不能款曲耳諸生仍舊相聚否此間朋友只南康節次有人來甚不易得肯向此來如廬陵處即全未有轉動意思也知彼中誨誘稍有次弟甚慰所望諸人誰是最精進者因來喻及爲佳齋中朋友終年相聚當有極精進者此間諸人來去不常然氣習偏蔽各任巳私亦難盡責一人不是大率江鄕人太的確而失之固執此間人大平易而流於苟簡此古人所以有矯性齊羙之戒也今敬子巳歸臨行又與安卿不足只恐向後精舍䂓䋲又曠闊耳安卿將來却湏移出舊齋自不與精舍諸人相干也禮書湏直卿與二劉到此并手料理方有汗青之日老拙衰病日甚於前目前外事悉巳棄置只此事未了爲念向使只如余正父所爲則巳絶筆乆矣不知至後果便能踐言否予日望之也病日益衰甚望賢者之來了却禮書前書所說且從閩宰借人先送定本及諸書來如可用之嵗前能上否渠送得冠禮來因得再㸔一過其間有合脩處尚多巳略改定如前書入各器篇者却移不得及重編得冠義一篇頗穩當然病衰精力少又日短窮日之力只㸔得三五段如此若非儧促功夫未來了絶也以此急欲直卿與用之上來庶可并以此外無他說也鉅鈞到彼煩直卿鈐束之勿令私自出入及請謁知舊有合去處亦湏令隨行不可令自去早晚在齋隨衆讀書供課之外更煩時與提撕痛加鐫戒勿令怠惰放逸乃幸之甚子澄遂以憂歸聞之驚駭渠素體羸能堪此苦否今有一縑煩爲貨之置少酒果食物往致奠禮鄙文一通并煩令人讀之也直卿向留東陽之乆做得何功夫詩及論語㸔到甚處因便喻及所示論語疑義足見别後進學之勤甚慰所懷巳各奉報矣喻及讀書次第意思甚善甚善且更勉力以俟後㑹但未知幾時能復來此間少人講論殊憒憒也見謀於屋後園中作精舍䂓摹甚廣他時歸來便可請直卿挂牌秉拂也作此之後并爲直卿作小屋亦不難矣道間㸔得格物意思稍覺通透日前元未曽說着緊要處也講學不可不熟如此可懼可懼目疾不觀書縁此㸔得道理亦漸省約不成不讀書後便都無道理也所論氣禀之病固然然亦大叚着力乃能去之近日爲朋友說滕文公首章有些意思他日相見靣論之也膚仲寄此來云陳是陸學王是吕學以今觀之王是矮子渠乃疑爲直卿之文不知前日所試果如何歳晚矣何時定可來前日因書亦以直卿昆仲告鄭帥此公厚德能一見之否來時恐亦湏人便中報及當爲作諸公書去也書會此中無有巳囑子約但殊未可必旦夕更囑祝汝玉若得在衢尤便也此中巳爲圖得一小屋基但未有錢物造得耳示喻讀書次第甚善但所論先天太極之義覺得大叚局促日用之間只教此心常明而隨事觀理以培養之自當有進才覺如此狹隘拘迫却恐不能得展拓也聞有奏事之命前月卄五日方被省劄見巳寫書只一兩日湏可遣人得請固幸萬一不得即不免再入文字而往前路衢信以來聽命又㸔如何似聞上意頗相念而士大夫亦多有以爲言者此亦似一幾會但覺得事有難得盡如人意者脚甚澁懶向前道之興廢只此一念間亦可卜得八九分不必勞蓍龜也所遣去辭免人病乆未還昨日便中方被告劄但又忽有召命云是謝坡所薦旦夕申省辭免萬一未允即欲再辭而以封事并進前日者太草草巳别草定甚詳到彼亦不過是許多說話况口說未必得如此之詳又免再出頭靣一畨若其可取徐出未晚不然則魏主奚少於一夫耶省状藳録云只呈二公勿示他人試爲思之并與仁卿景思商量度亦無以易此也聞欲遷居此來甚慰不知定在何日也但授徒之計復何如此中甚欲直卿來相聚然恐此一事未便不知曽入計度否耶覺得歲月晚病痛深恐不了此一事夣寐爲之不寜也近又得正父書目亦有好處其長處是詞語嚴簡近古其短處是粗率不精緻無分别也辭免人度今巳到不知所請如何頭勢如此又非前日之比只得力辭鄙意更欲乗此一有所言亦爲餵鷹飼虎之計又度得無益於事亦未必中於語黙之宜且更籌之若其不可但只力辭亦無害於義也若巳得請便不湏說只恐未允故有此念蓋猶是從官不應黙黙也泰兒挈其婦歸粗慰老懷衰遲至此無復他念但更得數年整頓了却諸書此兒粗知向學它時稍堪直卿諸人提挈足矣此間番陽近有一二朋友來頗佳恨直卿不在此無人與商量文字耳湖南𥘉且以私計不便未可往今縁經界住罷遂不可往矣巳草自劾之章旦夕遣人若且得祠禄亦已幸矣生計逼迫非常但義命如此只得堅忍耳聞欲相訪千萬速來所欲言者非一知彼中學徒甚盛學業外亦湏說令知有端的合用心處及功夫次第乃佳徐葉至此巳乆終是脫去舊習未得近日㸔得後生且是教他依本子認得訓詁文義分明爲急自此反復不厭日乆月深自然心與理熟有得力處今人多是躐等妄作誑誤後生輾轉相欺其實都曉不得也此風永嘉爲甚書來知甚長進可喜近得漳州陳淳書亦甚進也今老病無它念只得朋友多見得此道理即異時必湏有立得住者萬一其庶幾耳聞今嵗便欲不應科舉何其勇也然親闈責望此事恐未得自專更入思慮如何通老過此留三日巳過去矣誠實可敬但業未甚修耳亦非細事晦庵先生朱文公續集卷之一福州府儒學訓導舒鏊校
