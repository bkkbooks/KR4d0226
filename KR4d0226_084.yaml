body:
  text: 跋跋趙鈐轄墓志先王封建子弟蕃屏王室所以厚人倫而寧天下非獨私其為力於巳而己下及漢晉莫不由之雖其治亂得失有不齊者然要為宗社久長之計也唐自明皇疑忌諸王不令出閣後遂相踵以為家法是以享有天下餘二百年而其子孫絶無聞於今者然則神祖之出宗支以仕州縣其所以法前聖而鑒後王者聖謨遠矣以故靖康之禍近屬雖頗北遷而疏逺在外者往往能建勳績其抗羣盜拒仇虜而死其官守者亦不乏人若江東鈐轄趙公是巳其孫崇遵出此軸以見示因得反復諸公所記并感前事為太息而書其後獨恨東萊吕舍人所撰碑銘今不復存當為求之其家以附益之又記頃年守潭考其祀典有紹興𥘉年死難之士四人其一兵官趙侯聿之亦宗室子城陷巷戰罵賊而死寇退事聞詔贈右監門衛將軍然皆未有廟貌而寓祭他所因竊仰歎而深悲之即教綱紀并晉故刺史譙閔王等立象奉祠而為請於朝不旬日間即蒙報可賜其號曰忠節之廟德意所加神人歆動非獨諸君之靈為有歸也今聞鈐轄諸孫且將自列求所以易其名者以熹所為請額之事推之竊計厚骨肉之恩崇節義之勸聖朝於此正有所不宜吝也譙王亦晉宗室事具本傳云慶元丙辰七月庚子具位朱熹謹書跋劉雜端奏議及司馬文正公帖士大夫出身事主上則欲致其君為堯舜之君下則欲使其民為堯舜之民至於諌不行言不聽而潔身以去豈其心之所樂哉是以雖聖賢之處此不免遲遲其行而不忍為苟去甚或眷戀徘徊三宿而後出境其於君臣大倫恩義之際篤矣固不以苟得一時之虛譽為喜而輕去之也今觀熙寧雜端劉公之奏議知其致君澤民之願勤懇切至不啻其身之疾痛觀司馬文正公之遺帖見其忠君愛國而相勉以正之意又不勝其拳拳也嗚呼盛哉然而道勝名立之言或者猶竊病之以熹而慮彼蓋有激而云爾不然夫豈不知既有其實則名自隨之在我固有不得辭者而當時風俗之厚習尚誠慤亦不以是為嫌也又况忠賢去國一時之心固不能無慨然者同志之士憂之過甚恐其以是而不能􅓹􅓹以久也則姑為是説以寬譬之是乃忠君愛國之尤者而猶深有望於他時也豈以近名為纍而故為回隱以避之哉劉公之事紹興大參晉陵張公記之巳詳一時衆賢又從而推明之亦皆足以見其鄉慕之意矣公之世孫君房又出以示熹使得託姓名焉自惟晚出何敢復贊一詞於其間特因或者所疑而妄論之以附于後云慶元丙辰八月戊申朔朱熹跋張忠確公家問熹嘗銘張忠文公之廟因得讀其遺書而歎慕其風烈今又得觀公子忠確公汾州家問尤深敬仰竊惟國家承平百年德隆澤茂世臣喬木不為無人而一旦危難之際忠義之節乃獨萃於張氏之一門其亦盛矣公之大節如青天白日固不待贊述而后明而熹獨於其筆札之精謹見其神氣之安間於其家人父子之間見其誓死之外唯以收恤遺孤為寄而無一毫內顧下流之私也嗚呼非其胸中有以大過人者何以及此先覺有言慷慨殺身者易從容就義者難若公之死其真所謂從容就義者邪公孫行儉因友人余克忠以此軸見視三復以還為之感涕因敬識其後云慶元丙辰十月巳巳跋東陽郭德輔行狀東陽郭君德輔將葬其子淇不遠數百里過豫於建溪之上狀其行事一通以請銘而今四明帥守林公和叔前大府丞吕君子約又皆以書來言君之為人如狀不誣可銘無愧也豫雖不及識德輔然以二君子之言而讀其狀見其好學樂善之誠忠厚廉退之實心固樂為之書顧念比以多病心目俱衰凡銘之請所諾而未及償者前後以十數所辭而不敢諾者又不止此今復安敢越次開端以來怨詈因謝不能而淇請益堅豫悲其意乃為書其行狀之後如此而歸之抑林吕二君子皆非輕許人者其言固足以信後世矣又何俟於豫銘哉慶元二年九月丁丑朔旦新安朱熹書跋許侍郎詩卷侍郎許公經事綜物之才見於巳試其為文章蓋直吐出胸中之藴未嘗屑屑焉為如是之言也其孫建陽丞公視熹以公手書詩卷觀其長篇大句固自雄健豪逸磊落驚人而新宅書懷近體諸作又皆律切精穩不留縫鏬亦足以驗其才力之有餘無所施而不可矣熹與公俱江東人所居徽饒之間相望不百里獨恨生長閩嶠不及識公顧今於此乃獲窺其筆迹而因以得其為人豈非幸耶慶元丙辰十月丙午朔旦婺源朱熹書書河圗洛書後世傳一至九數者為河圖一至十數者為洛書考之於古正是反而置之豫於啓蒙辨之詳矣讀大戴禮書又得一證其明堂篇有二九四七五三六一八之語而鄭氏注云法龜文也然則漢人固以此九數者為洛書矣閣皂甘君叔懷欲刻二圖山中覽者未必深考又當大啓爭端聊書以諗之慶元丁巳上元節日遁翁書書萬君行事後自鄉舉里選之法廢取士者先文藝後材實於是野多遺賢朝多曠位而治具民俗每不能無愧於前世讀正父所論著其舅氏萬君之行事而以視於當世之人材其亦足以觀矣正父好古多學深有志於治道而其筆力從橫詞氣雅健又如此亦所謂似其家姓者耶跋吕范二公帖後山談叢記蘇端明當國恤時與人書疏疑於當慰與否而罷乃載前輩往還慰狀以正之今觀吕正獻公帖乃知當時此禮固巳通行亦臣子之心不能巳者不審蘇公何所疑也仁宗皇帝慈儉之德冠冕百王而因山之奉煩費若此豈其心哉宜乎老蘇先生有華元樂舉之譏而忠獻韓公不敢辭其責也然此帖所云置司裁損仍是韓公當國時事亦足以驗其悔悟之實矣此其所以為韓公者耶吕公幅𥿄之間愛君及民拳拳不舍其於劉公心期所會必有不約而同者覽之令人感歎不能已范忠宣公平淡忠恕雅不欲以智名勇功目見故熙豐間授鉞臨邊數𬒳譙讓觀第二帖可槩見矣然迹其平生排濮議爭新法干忤君相無少顧避最後論救元祐諸賢卒與同貶蓋終身無所屈則又豈非所謂仁者之勇哉其於劉氏姻好綢繆蓋亦聲氣之同非苟然者子夷得其家學之傳不卑小官直道自信東萊吕舍人亟稱之覽者其亦考焉慶元丁巳中元節前二日朱熹敬書跋度正家藏伊川先生帖後頥謹詣行館拜謝長官祕書十月日河南程頥狀正為遂寧户椽友人王君世垕數數為正言城西傅君光家藏先正韓范諸公手迹甚富乃祖大夫公嘉祐𥘉實見濂溪周先生于合陽求教先生手書家人艮遇等説贈之其後程太中公知漢州大夫公時為邑西川又得交伊川兄弟間手筆相問往往皆在正每見王君必悉意咨懇屬以訪求周程諸先生手迹慶元二年正月四日王君忽自山中來謁講禮巳袖出伊川先生手狀一幅徐加考訂殆先生入蜀時筆也大夫公集以為日記册此版起六月終七月十六日內載王氏父子吕氏兄弟遷擢蓋熙寧間日報作細字背靣皆滿先生字處闕之獨得不謾又問濂溪書曰亡矣正且悲且喜謂王君曰正不敏讀諸先生遺書學其學求其道今十年餘矣每見當時一事一物如南國之棠曲阜之履旁皇不忍去之也今此𥿄幸脫於敗爛之中然諸先生所以開示後世者世方以為竒貨安知叔孫武叔輩見之不遂投之水火耶為我謝傳君正奉藏之俾勿壞其年秋傅君來言曰先生之書謹如命大夫公諱耆字伯壽名在元符黨籍光字用之世垕字叔載後學樂活度正謹書傅君周旋周程師弟子間知所主友而伊川先生手刺謁謝為禮亦恭則其人之賢不問可知度君求訪之勤意欲甚美濂溪先生往還遺迹計其族姻閭里之間猶有存者度君其廣詢之當可得也嘗讀眀道先生顔樂亭詩其卒章曰井不忍廢囿不忍荒嗚呼正學其何可忘然則熹之所望於度君者又不專在於此也度君其益勉之哉慶元丁巳七月二十二日朱熹書跋張敬夫與馮公帖此張敬夫與縉雲馮當可書也味其詞意知其一時家庭之間定省從容未嘗食息不在中原之復令人感慨不巳馮公獨不及識然嘗見故端殿汪公甚推重之近得其文集讀之論議偉然而所論人主正心親賢為所謂建極者明禹箕之傳破諸儒之陋乃適與鄙意合尤恨不得一見其靣目而聽其話言也慶元丁巳七月二十五日新安朱熹書于建安坤峽之野店跋孔君家藏唐誥闕里裔孫孔仲良以鄉貢明經仕唐正元大和間至莆田令卒官因家焉子孫散居民伍無復顯人紹興中熹之友括蒼吳任授室其門間以其家所藏告身家牒世譜相視皆唐世舊物牒又其應舉時所通具列三世官諱獨曽祖文整名見譜中乃襲文宣王齊卿之别子而齊卿實先聖第三十有七世孫也考之元豐版本襲封家譜皆合推而下之得莆田令君則為第四十有一世矣牒頗殘缺無州里而以洪州之印疑其縫視其告則以為泗州連水縣臨淮鄊進賢里人豈其寓於洪耶告身凡七通其二為令君之父丞公所歷南頓溧水二縣尉其五為令君明經冬集全椒尉青陽丞及莆田考課皆尚全好獨莆田令為謄本而其家自令君至此又巳傳九世矣熹得其書審訂不謬乃以告於莆守傅侯自得令丘君鐸請得更其版籍為至聖文宣王第四十九世孫孔宜户二公欣然許諾即施行之時紹興二十五年乙亥歲也後二十有六年宜之子幼夏乃以鄉舉試禮部又數年知縣事廖德明為摹刻其告於縣齋然其跋語以令君為三十八世則為小差幼夏以其墨本來因記舊事輒為書之且使摹其家譜世譜及南頓溧水二告并刻于家而附以令君以來世次之屬使後有考云慶元丁巳中秋日朝奉大夫朱熹書跋孔毅夫談苑孔毅夫談苑清江張元德藏其手藁然多是抄取江鄰幾嘉祐雜志中語此本方是一傳以失校巳多脫誤又世傳孔書有珩璜新論者多是類集古今事實之近似者而一本附記近世見聞數十事自趙獻公以下無不遭其詆毁嘗細考之筆勢不甚相似或好事者附益之惑亂後生甚可惡也因閲此帙筆其後以曉之慶元丁巳八月晦翁跋十七帖官本法帖號為佳玩然其真偽巳混殽矣如劉次莊有能書名其所刻本亦有中分一字半居前行之底半處後行之顚者極為可笑唯此十七帖相傳真的當時雖巳入官帖卷中而元本故在人間得不殽亂此本馬莊甫所摹刻也玩其筆意從容衍𥙿而氣象超然不與法縳不求法脫真所謂一一從自巳胸襟流出者竊意書家者流雖知其美而未必知其所以美也書詞問訊蜀道山川人物屋宇圖畫至纎至悉蓋深有意於遊覽而竟不遂豈所謂不朽之盛事信難偶耶因念頃年廬阜終更諸公議遣使蜀而孝廟記憐不欲使之逺去議乃中寢然東留訖無輔報而徒失西遊之便每以為恨今觀此帖重以慨然又念仙遊之日遠無復有意於人世也熹記跋杜工部同谷七歌杜陵此歌豪宕竒崛詩流少及之者顧其卒章嘆老嗟卑則志亦陋矣人可以不聞道哉跋李伯時馬觀龍眠飛騎圖及讀延之廷秀大防三君子佳句因思法雲秀公語尤物移人甚可畏也慶元三年孟冬八日朱熹仲晦父跋東坡書李杜諸公詩東坡此卷考其印章乃紹興御府所藏不知何故流落人間捧玩再三不勝敬嘆但其所寫李白行路難闕其中間八句道子胥屈原陸機李斯事者此老不應有所遺忘意其刪去必當有説老翁并詩在老蘇送蜀僧去塵之前必非他人之作然不見於嘉祐集亦不省其何説也彼欲井中老翁改顔易服不使人知而後篇遽有嫌瘦廢彈之嘆何耶然其言怨而不怒獨百世以俟後賢而不惑則其用意亦遠矣哉慶元丁巳十月丁丑新安朱熹觀玉山汪季路所藏而識其後如此云跋杜祁公與歐陽文忠公帖杜公以草書名家而其楷法清徑亦自可愛諦玩心畫如見其人慶元丁巳十月丁五新安朱熹觀跋東方朔畫贊平生所見東方生畫贊未有如此本之精神者筆意大槩與賀捷表曹娥碑相似不知何人所刻石在何處是可寶也朱熹仲晦父跋蔡端明寫老杜前出塞詩蔡公大字蓋多見之其行筆結體往往不同豈以年歲有蚤晚功力有淺深故耶巖壑老人多見法書筆法髙妙獨稱此為徑健竒作當非虛語慶元三年十月戊寅朱熹巖壑再題勢若飛動可見字隨年長也跋吳道子畫頃年見張敬夫家藏吳畫昊天觀壁草卷與此絶相類但人物差大耳此卷用𥿄而不設色又有輔畫頭靣手足處應亦是草本也張氏所藏本出長安安氏後有張藝叟題記云其兄弟析産分而為二此特其半耳頃經臨安之火今不知其在亡而此卷斷裂之餘所謂天龍八部者亦不免為焦頭爛額之客豈三災厄會仙聖所不能逃耶是可笑也吳筆之妙冠絶古今蓋所謂不思不勉而從容中道者兹其所以為畫聖與季路所藏法書名畫甚富計無出其右者既以得觀為幸因記歲月於其後時慶元丁巳十月十日巳卯也朱熹仲晦父襄陽張舍人筆法出其家存誠子先君子甚愛之而世莫之貴也因覽遺墨不勝悲歎熹謹書跋歐陽文忠公與劉侍讀帖歐陽公與劉侍讀尺牘一卷汪季路持以見示因得竊觀前輩之笑談風味於此猶可想見其倣佛然當是時朝廷清明風俗醇厚國家致冶之美莫此為盛而公猶有薄惡之歎蓋其所不可及者獨有嫉善之言不勝公論此為治亂之分耳三復之餘掩卷太息而記其後季路其謹藏之慶元三年十月巳卯書跋舊石本樂毅論沈存中筆談云皇祐中嘗於髙紳之子錢塘主簿安世家見此石後十餘年安世在蘇州石巳破為數片以鐵束之後安世死石不知所在或云蘇州一富家得之亦不復見存中所記與歐陽公不同如此延之所謂錫山徐氏者豈又得之蘇州富家耶延之又謂損泐模糊則石雖幸存亦無復如此本之清徑矣續閣帖中所刻全文又不知所自來頃年曽於折子明家見其所藏舊本筆意絶類徐季海要皆非此本之比也慶元丁已十月已卯朱熹跋東坡祭范蜀公文汪季路所藏蘇文忠公祭范忠文公文藁慶元丁巳十月已卯朱熹觀于考亭溪居跋富文忠公與洛尹帖富文忠公與洛尹帖以史考之尹者李中師也熙寧元年公自河陽𬒳召入京以病請汝而歸過洛少留連遭三喪赴汝後又一遭喪劄子云喪骨肉大小四口是時李以天章閣待制知河南府營奉應天會聖兩神御殿故此一帖自言附庸悲惱而贊李二役畢工者為第一公既至汝神廟遣中貴人馮宗道挾大醫陳易簡來治足疾故此一帖言中璫大醫者為第二移囚不知何事馮來恐亦即宗道也故此帖為第三明年𬒳召人相故此一帖云詔使到郡即交州事辦行而東者為第四三年李自權三司使進龍直再尹洛故此帖致賀始稱龍圖給事者為第五四年公在亳州坐不散青苗罷歸洛未至改判汝州故此一帖言近赴小邑勝於窮坐里閭且感君相厚恩而恨不得時奉談笑者為第六公至汝不久即請歸洛故此一帖言擇日就第者為第七既而告老遂以司空使相致仕故此一帖答其封示單報者為第八凡十三帖其歲月先後可考者如此其餘似亦皆是在洛時往還者蓋李之事公不為不謹而公之遇李亦不為不厚矣而其後李因奉行免役之令乃籍公户使出泉同於編氓以媚用事者小人觀時徇勢反覆異態何世無之覽此卷者可為發一大笑也慶元丁巳十月庚辰朱熹跋韓魏公與歐陽文忠公帖張敬夫嘗言平生所見王荆公書皆如大忙中寫不知公安得有如許忙事此雖戲言然實切中其病今觀此卷因省平日得見韓公書迹雖與親戚卑幼亦皆端嚴謹重略與此同未嘗一筆作行草勢蓋其胸中安靜詳密雍容和豫故無頃刻忙時亦無纎芥忙意與荆公之躁擾急迫正相反也書札細事而於人之德性其相關有如此者熹於是竊有警焉因識其語於左方慶元丁巳十月庚辰朱熹跋朱希真所書道德經巖壑老人小楷道德經二篇精妙醇古近世楷法如陳碧虛之相鶴黃長睿之黃庭皆所不及唯湍石喻公之典引諸書為可方駕耳季路得之逺以相視恨目巳昏肓不得盡見其妙處把玩不足因記其後而歸之季路能攻石傳刻以與好事者共之即大幸蓋此書難得善本讀此數章似少訛謬又為可傳也慶元丁巳十月庚辰雲臺子私記如儼若客語意最精今本多誤作容殊失本指此本為不誤也跋趙清獻公家書趙清獻公之為人公忠孝慈表裏洞徹固所謂無間然者然其晚歲學浮屠法自謂有得故於兄弟族􅊚之間無不以是勉之前後見其家間手帖多矣如此卷稱其弟心巳眀瑩見性復元教其姪以不失正念要使純一不雜又教以公私謹畏踐履不失便是𥘉心佛事且引古人二業清淨即佛出世之語以為此亦直截為人處則與今之學佛者大言滔天而身心顚倒不堪著眼者蓋有間矣嗚呼聖學不傳其失而求諸野者若此尚為有可觀也豫是以表而出之慶元丁巳十月十一日庚辰朱熹記跋湯叔雅墨梅墨梅詩自陳簡齋以來類以白黑相形逮其末流幾若禪家五位正偏圖頌矣故湯君始出新意為倒暈素質以反之而伯謨因有氷雪生靣之句也然白黑未分時一句畢竟未曽道著詩社髙人試各為下一轉語看湯君自云得其舅氏楊輔之遺法其小異處則又有所受也觀其醖藉敷腴誠有青於藍者特未知其豪爽超拔之韻視牢之為何如爾病眼眵昏不能核論故願與諸君評之戊午三月病起戲書跋王信臣行實慶元紀號之𥘉余友吕子約謫居廬陵間遣詢其動息子約報書具言罪大責輕念咎之餘復何所道獨所寓居得王氏别館有臺榭花木之勝而江山雲物晨夕萬變足以遊目騁懷尤過望不落寞耳因極道王君之為人以為好賢樂善所交盡其鄊之名公卿才大夫又能同其憂樂不隨世俗為俯仰既又以書來稱王君之子峴為方有意於學謂余當有以告語之者峴亦以書來贄甚勤余讀之信子約之言不誣也無幾時子約內徙髙安以卒而峴亦以王君之沒來赴且述其事狀一通而以銘墓為請余病疾久廢筆研既弔且謝不能而峴請益堅乃記其後而歸之以見余意又以見峴之狀君詞有不盡而無所溢也四年戊午中冬丙申朔旦雲谷老人朱熹仲晦父書跋程沙隨帖離騷九章云乘鄂渚而反顧兮欵秋冬之緒風説文欵譍也亞改切又焉開切史記范增撞破玉斗曰唉説文唉􅈾也烏開切二字音義並同如歎與嘆咳與咳實一字耳其聲則皆楚語也故元次山有欵乃曲而柳詩亦用此二字皆湘楚間作柳文舊本作靄襖音上字正協亞改之聲集韻亦於皆韻收唉字海韻收欵唉二字為一其説蓋與説文不異但乃字之讀如襖者未有考耳近世乃有倒讀之者又或寫欵為𣢾則其誤益甚矣欵乃歌唐肅宗中興之業上比漢東京固有愧而下方晉元帝則有餘矣故許右丞之言如此蓋亦有激而云者然元次山之詞歌功而不頌德則豈可謂無意也哉至山谷之詩推見至隱以明君臣父子之訓是乃萬世不可易之大防與一時謀利計功之言益不可同年而語矣近歲復有諂子妄為刻畫以謗傷之其説之陋又許公所不道直可付一笑云語溪詩顔公剛毅忠烈得之天資與其學之不純而諂道侫佛自不相掩有志於道者師其所當師而戒其所可戒可也淺聞卑論易以溺人不足為法覽者詳之麻姑山詩余少嘗學書而病於腕弱不能立筆遂絶去不復為今觀沙隨程丈此卷饒娥一𥿄蓋有意於黃絹之碑者亦可愛也饒娥故居小廟在樂平縣東二十餘里余嘗特往沃茗酹之䨥闕巳不復存矣因語州縣宜增葺之且為請敕額列祀典而莫有應者甚可歎也辨饒熾余嘗為沙隨言孝經獨篇首六七章為本經其後乃傳文然皆齊魯間陋儒篡取左氏諸書之語為之至有全然不成文理處傳者又頗失其次第殊非大學中庸二傳之儔也程文報書云吾嘗聞之玉山汪公亦若吾子之言是也今覽其手書遺論因記其語於後云孝經論慶元戊午十一月二十六日劉用之為劉伯醇携此卷來求跋為書以歸之書釣臺壁間何人所題後此詞實亦先生所作不見嚴夫子寂寞富春山空留千丈危石髙出暮雲端想象羊裘披了一笑兩忘身世來插釣魚竿肯似林間翮飛倦始知還中興主功業就鬢毛斑驅馳一世人物相與濟時艱獨委狂奴心事未羡癡兒鼎足放去任踈頑爽氣動星斗終古照林巒頃年屢過七里灘見壁間有胡明仲丈題字刻石拈出嚴公懷仁輔義之語以厲往來士大夫未嘗不為之摩娑太息也然亦不能盡記其語後數十年再過因覔其石則巳不復存意或者惡聞而毁滅之也獨一老僧年八十餘能誦其詞甚習為豫道之俾書之册比豫未久而還則亦為好事者裂去矣因覽兩峯趙叟醉筆釣臺樂府偶記向所嘗見一詞正與同調并感胡公舊語聊為書此慶元巳未人日雲谷老人云釣臺故有范公記文詞義甚偉後人不容復措手矣中間有江子我一記獨書作新歲月最為得體而粗述其以羊裘題軒客星命閣之意名義亦為髙雅今屢經火不知此石尚存否也近年乃有作記力辨嚴公非詭激素隱者昔邵康節作安樂窩中好打乖詩明道程先生和之曰時止時行皆有命先生不是打乖人而康節又復之乃有安知不是打乖人之句此言有味也使嚴公而可作當為此發一大笑云跋吕氏歲時雜記右吕公歲時雜記熹得而伏讀之既於周退傳陸放翁之所嘆竊亦深有感焉又意公之為此亦前賢集録方書之遺意也然則後之君子又將有感於余言也夫慶元巳未二月辛巳新安朱熹書跋張安國帖安國天資敏妙文章政事皆過人遠甚其作字多得古人用筆意使其老壽更加學力當益竒偉建陽張大夫珍藏此𥿄間以視豫展玩恍然如接談笑書其後而歸之慶元巳未三月八日跋山谷宜州帖山谷宜州書最為老筆自不當以工拙論但追想一時忠賢流落為可歎耳雲谷老人因覽竊識慶元巳未三月八日跋米元章下蜀江山圖米老下蜀江山嘗見數本大略相似當是此老胸中丘壑最殊勝處時一吐出以寄真賞耳蘇丈粹中鑒賞既精筆語尤勝頃歲嘗獲從遊今觀遺墨為之永歎慶元巳未三月八日新安朱熹仲晦父跋蔡端眀帖蔡公書備衆體此卷評書一𥿄獨有歐虞筆意甚可愛也慶元巳未三月八日雲谷老人觀縣大夫張侯所藏為識其後跋歐陽文忠公帖歐陽文忠公與蔡忠惠公手帖前輩交情篤厚語意真實於此可見慶元巳未三月八日新安朱熹仲晦父書跋東坡帖東坡筆力雄健不能居人後故其臨帖物色牝牡不復可以形似校量而其英風逸韻髙視古人未知其孰為後先也成都講堂畫象一帖蓋屢見之故是右軍得意之筆豈公亦適有會於心歟慶元巳未三月八日朱熹仲晦父觀永福張氏所藏墨迹歎賞不足因記其左方跋曾南豐帖余年二十許時便喜讀南豐先生之文而竊慕效之竟以才力淺短不能遂其所願今五十年乃得見其遺墨簡嚴靜重蓋亦如其為文也慶元巳未三月八日跋彭監丞集余頃使浙東時諸郡民以保伍之役不便相與自言者衆獨台之臨海為無有問其故則曰前此縣令彭君視其聚落之貧富而稍正定其疆理使貧里得免頻役之苦以故皆樂趨事無所為訴余念聚落貧富之不均最為役法大害間者雖設歇役年歲倍半之差而猶有所不通今彭君所行雖律令所無有然亦非有禁也真可謂得法外意矣間頗推其法於他郡縣人果皆以為便後以按事至台留甚久聞臨海士民稱彭君之政不容口曰吾邑數年之前唯顔侍郎度為有去思而近歲乃得彭君其惠愛惻怛酷相似而綜理詳密殆過之既又得其所為戶口財賦之書讀之益知彭君之志不但為百里規模而巳也然余自是罷歸不復出者纍年亦聞彭君登朝出守持使者節而竟不及試以卒每深以為恨也慶元巳未君之中表林生輔持此集及葉卿所撰墓銘過余三復感歎因書疇昔所聞以附焉以為有志於民者尚有取也三月丁丑既望新安朱熹書跋劉司理行實長樂劉砥及其弟礪相與來學纍年于兹更歷變故志尚愈堅察其居家孝友交朋友信實臨事謹畏不敢畔繩墨知其教習之有素也一日出友人趙君昌父所狀其先府君行事一通因以銘墓為請余讀其文考其事有以信余所知之不繆矣然余久以疾病憂畏不能文比年以來所辭且十數家以故雖知劉君之賢而不能有以少答二生之意獨識其後而歸之後有君子尚有以識此心也雖然二生勉􅏧尊聞行知而有以卒就其德業則所以顯揚其親者於是為大銘之有無𥘉不足為重輕也慶元巳未四月乙酉新安朱熹書跋家藏劉病翁遺帖病翁先生壯歲棄官端居味道一室蕭然無異禪衲視世之聲色權利人所競逐者漠然若亡見也熹蚤以童子獲侍左右先生始亦但以舉子見期而熹竊窺觀見其自為與所以教人者若不相似暇日僣有請焉先生欣然嘉其有志始為開示為學門户朝夕誨誘亹亹不倦其後先生屬疾熹適行役在外亟歸省問先生喜甚顧而語曰病中無可與語幸吾子之來歸也自是日奉湯藥先生所以教詔益詳期許益重至為具道平生問學次第傾倒亡餘一日從容因出詩一篇見授先生性不喜書常時詩文率多口占使諸生執筆獨此與贈劉致明丈長句皆手書之其意可見也贈劉詩有小几清香慰臨别極知了了萬緣輕之句子姪或惡其語之不祥者先生笑曰此何足諱然亦為汝更之因别定為愁絶字既又發故篋得碎𥿄數十皆平日省躬自厲之言稍以先後次為一篇命熹與同舍生黃銖筆之復取閲視手自更定數十字間不一日遂啓手足諸子姪乃共發其先所緘封遺書數幅皆熹未歸時所留處畫庶事遍及遺孤復有片𥿄屬熹為作張公書末有勉力大業之語熹始得泣受而寶藏之以至于今不敢失墜然而躬行不力老大無成不能有以仰副當日付授之意抱此愧恨每念將無以見先生於地下今病巳力何所復云姑取遺墨聮為一編而序其本末以示子孫且以示諸同志使於前修景行之懿知所跂慕而又視熹之慵惰亡聞以為前車之戒也熹字元晦亦先生所命其祝詞具在以非臨終手筆别附他卷先生沒以紹興十七年丁卯後五十三年慶元巳未五月丙申門人朱熹謹書跋病翁先生詩月髙夜鳴箏聲從綺窗來隨風更迢遞縈雲暫徘徊餘音若可玩繁弦互相催不見理筝人遙知心所懷寧悲舊寵棄豈念新期乖含情􅓹不發寄曲宣餘哀一彈飛霜零再撫流光頽每恨聽者稀銀甲生浮埃幽幽孤鳯吟衆鳥聲難諧盛年嗟不偶况乃容華衰道同符片諾志異勞事媒栖栖墻東客亦抱凌雲才此病翁先生少時所作聞箏詩也規模意熊全是學文選樂府諸篇不雜近世俗體故其氣韻髙古而音節華暢一時輩流少能及之逮其晚歲筆力老健出入衆作自成一家則巳稍變此體矣然余嘗以為天下萬事皆有一定之法學之者須循序而漸進如學詩則且當以此等為法庶幾不失古人本分體製向後若能成就變化固未易量然變亦大是難事果然變而不失其正則縱橫妙用何所不可不幸一失其正却似反不若守古本舊法以終其身之為穩也李杜韓柳𥘉亦皆學選詩者然杜韓變多而柳李變少變不可學而不變可學故自其變者而學之不若自其不變者而學之乃魯男子學柳下惠之意也鳴呼學者其母惑於不煩繩削之説而輕為放肆以自欺也哉巳未五月二十二日書先吏部韋齋記銘并劉范二公帖後右劒浦羅先生仲素為先君子作韋齋記而沙陽曹丈令德又為之銘家藏遺迹數十年矣恭惟先君子名齋之意不唯自警乃其所以垂𥙿後人者蓋亦至深至厚而無以加而熹踐修不謹陷身危辱今病且死大懼無以奉慈顔於地下故敢收輯遺文藏之家廟以示子孫使永永奉承不至失墜庶幾得以少伸省愆念咎之萬一其橫渠西銘實外舅草堂劉先生所授首尾有先生手筆二十字造字視辭病翁劉先生所作及祕閣范公手帖今皆以附于後三公皆先君子執友其所以教熹者今皆不能有以副也慶元巳未五月丙申孤熹敬書書先吏部與淨悟書後某啓比獲從容良慰北巖重勤逺出伏暑中時得雨法體多福安下處未欲遽以干人須決成入城即自有書信去城中數日人事紛紜歸來靜坐纍日意緒始復舊雲監寺不别書空石斗一枚付去人謝諫去若借得兩人即分付兩籠令共舁來不然即且取古田丙字𥿄五軸付謝諫來及珙首座並煩致意未相見加愛閏月三日某啓上尊勝長老淨悟見世美兄弟致意城中滚滚不欵未及為書先君子少日喜與物外髙人往還而於淨悟師為尤厚後嘗為記尊勝佛殿今刻石具在可考也淨悟建陽後山人晚自尊勝退居南山雲際院一室修然禪定之餘禮佛以百萬計年過八十目光炯然非常僧也常為余道富文忠趙清獻學佛事其言收斂崔實無近世衲僧大言欺世之病以是知先君子之厚之非苟然也古田林生蒙正持此卷來捧玩手澤不勝悲感因為略記其本末云慶元巳未大月既望雲谷朱熹謹書跋德本所藏南軒主一針敬之一字學者若能實用其力則雖程子兩言之訓猶為剩語如其不然則言愈多心愈雜而所以病乎敬者益深矣誦敬夫之針者要當以識此意云慶元巳未𥘉伏雲谷老人書題吳和中感秋賦後和中感秋作賦既發深省乃欲逃之麴蘗之間叔通以碩果不食者厲之可謂得朋友之職矣顧豫姦偽排擯之餘何足知此二君子其相與切磋之時有以見警焉則區區之望也慶元巳未八月既望雲谷老人書跋張以道家藏東坡枯木怪石蘇公此𥿄出於一時滑稽詼笑之餘𥘉不經意而其傲風霆閲古今之氣猶足以想見其人也以道東西南北未嘗寧居而能挾此以俱寶玩無斁此其意巳不凡矣且不以視王公貴人而獨以誇於畸人逐客則又有不可曉者雲谷老人因覽為識時慶元巳未仲秋既望愚叟之墓巳有宿草矣撫玩遺墨相視感慨泫然久之若歸羌廬以視西坡當同此嘆也愚叟謂吕子約晚謫髙安寓大愚寺自號大愚老叟西坡謂黃啇伯跋劉子勉行狀余自為童子時得見大夫公於病翁先生之側聞其自誦所為程試之文意氣偉然音節華暢巳知敬愛其人後因葬親於公之鄊始得從公遊好欵密見公居家居鄉言行之詳及聞其所以施於官政者表裏殫盡莫非忠厚信實慈惠恭儉之意於是始益心服其為人及公之沒其諸子示以此書蓋將使志其墓會余方有幽憂之疾不遑序次然三復其文而參以平生所聞見蓋無一詞之非實也顧念歲月逾邁後生之及見前輩者日加少而俗愈偷也為之太息而識其後云新安朱熹書跋吉水周君家藏訴牒吉水鄉貢周君訴牒七通其家寶藏閲八世餘二百年矣覽者不暇尋其端原一旦丞相益國公表而出之為之稽考歲年推校事實上及正朔名諱至纎至悉於是周君之事得以備見其本末其後之人可以益嚴奉守而無所事於他求矣而其孫洽乃遍以屬其鄉黨知名之士悉使贊述而揄掦之是則巳病於贅而意猶未巳又復不逺千里夤緣紹介以諉於余此其為贅豈不又甚矣余欲謝而却之又念無以答其纍舍重趼之勤乃書此以諗焉生其持歸杜門讀書求其所未學者以繼乃祖之業母庸復爾奔走請謁而求無所用之跋語以老歲月為也噫若余之言固亦無所用者然使生因是而有發焉則猶足為有用也夫慶元巳未三月甲子新安朱熹跋山谷草書千文李端叔崇寧三年八月一日題云紹聖中詔元祐史官甚急皆拘之畿縣以報所問例悚息失據獨魯直隨問為報弗隱弗懼一時栗然知其非儒生文士而巳也紹聖史禍諸公置對之辭今皆不見於文集獨嘗於蘇魏公家得陸左丞畫一數條皆詆元祐語也其間記黃太史欲書王荆公勿令上知之帖而巳力沮止之黃公爭辨甚苦至曰審如公意則此為佞史矣是時陸為官長以是其事竟不得書而黃公猶不免於後咎然而後此又數十年乃復賴彼之言而事之本末因得盡傳於世是亦有天意矣惜乎秉史筆者不能表而出之以信來世而顧獨稱其詞筆以為盛美因觀此卷李端叔跋語為之感慨太息輒記其後若其書法則世之有鑒賞者自能言之故不復及云慶元巳未十一月既望雲谷老人朱熹記跋陳光澤家藏東坡竹石東坡老人英秀後凋之操堅確不移之姿竹君石友庶幾似之百世之下觀此畫者尚可想見也跋陳大夫詩常人之情小有一善則自視哆然若有餘而其責報也欿然常若有所不足所以善日消而惡日長卒以陷溺於利欲之橫流而不自知也大夫陳公廉靖自守不肯屈意權門寧俯首於下寮終身而不悔比其晚歲僅以年勞得官其世而所以省身知足之意見於短章者乃如此其志念之所存與庸者逺矣嗚呼子孫之賢其亦深念而敬守之也哉慶元巳未十一月既望新安朱熹識跋進賢傅君行實從政進賢傳君既沒將葬其子修抱其行實一通不逺千里辱以顧豫流涕言曰先人蚤歲有志功名之會中間不幸遭罹國難蓋嘗解儒服以事戎行實從宣撫嶽公轉戰許洛之間屢以捷告上功未報而南北通和嶽公遂罹讒口失兵柄得竒禍先人為之感慨憤激棄其官勳以歸故里復治家人生産作業教子讀書酌酒賦詩以自排適倐然不知其身之老也晚值慶恩三蒙錫命之寵遂易文階老壽康寧閭里嗟歎今者不幸至於大故不肖之孤銜哀忍死以奉窀穸之事既有期矣顧恨未得當世之大人君子發其潛德之幽光傳之久遠以覆露其後嗣是以匍匐而來再拜以請于執事惟公幸哀而與之銘則死者有知亦無恨於泉下矣豫視其冠屨應禮而戚容與之稱言詞懇慤情旨酸辛為惻然動心焉知其平日習於賢父兄之教訓也以是雖不及識傅君而於此得其為人顧念罪戾之餘言語不足以取重當世而疾病摧頽意緒荒忽亦無復心力可以治筆研作文詞矣特以其逺來泣請之哀不可以不答也因為書此于行狀之後使并以視來者云慶元巳未十一月辛丑新安朱熹書跋大父承事府君行狀右先大父𤾥承事郎府君行狀先君太史吏部贈通議大夫君所撰也當時既以請銘於政和主簿盧君點未及礱石而群盜蜂起文書散逸於今僅存半藁不可復刻矣熹竊惟念吾家自歙入閩而府君始葬於此不可使後之子孫不知其時世歲月與其所以積德垂慶開祐後人之深意敬立石表刻狀下方立于墓左先世墳廬在婺源者及祖妣孺人以下别葬所在亦具刻于碑隂使來者有考焉盧君字師豫老儒慱學清謹有馴行定宅者弋陽金生字確然亦廉節士頗通方外之學姓字皆見先集云慶元五年十有二月甲豫孝孫具位熹謹記跋楊子直所賦王才臣絶句王摩詰輞川􅃮園詩云古人非傲吏自闕經世務偶寄一微官婆娑數株樹余深愛之而以語人輒無解余意者今讀子直此詩而於南谷之篇竊有感焉因識其後復以寄才臣果以為何如也慶元庚申正月二十八日晦翁書楊詩曰南山髙且明其下有深谷文豹識顯藏終朝霧如沐跋黃壷隱所藏師説旴江黃逹材以其先君子壷隱居士手抄此册見示乃熹昔年所受師説手書居前記録在後伏讀愀然如復得侍坐右右而聞其緒言也顧恨慵惰不能拳拳服􅈾以報萬一而荒淺昧陋趣録之際又不能無失其深微之意三復以還不勝悚愧然觀壷隱好學自強樂善不倦乃至於此熹雖不及識面而於此亦足以窺其所存矣因竊記其後而歸之逹材昆弟其亦寶藏敬守精究而勉學焉以無忘前人之訓慶元庚申二月八日新安朱熹謹書跋袁州萍鄉縣社倉記萍鄉胡君安之來學於余一日致其鄉人士君子之意欲余為之記其社倉之役及扣其詳則出是書一卷曰此邑士鐘君詠之所為也是倉之成鍾君及彭君公修實有力焉故所登載詳悉如此余固嘉其敏於事而又能述以文也因念紹熙甲寅之歲赴鎮長沙道出兹邑邑之士子導余以觀於其學而請記之及行堂序間則既有亡友劉君清之之刻在焉余拱而讀顧而歎曰美哉乎子澄之言也諸君日誦而時省之則亦無以余言為矣即謝去不敢為而諸生至今猶有望於余也矧曰是倉之成既出鍾君之手而此文又出其筆則亦何以異於學之有記而復何待於余言哉又况天下之事是非得失固有定在而其盛衰興廢亦有繫於時勢而不可常者顧余之衰謝淪落徒足以為是倉之纍而不足以增其重諸君亦何所賴而求之若是其勤耶為諸君計莫若具刻鍾君之記以示後人使讀之者有以知其成之之不易如此而不忍壞焉斯亦足矣胡君告歸因跋其尾以授之且以寄謝庠序諸君使母忘子澄之教也慶元庚申二月辛巳春分晦菴病叟朱熹書跋周司令所藏東坡帖蘇公翰墨為世寶藏故流俗多偽作者余家有其與德叟先輩書兩𥿄詞意超然筆勢飛動觀者尚或疑之余亦不能辨也今觀作肅所藏源流有自而二公賞識又如此其亦可以無疑矣五月朔日朱熹云跋章國華所集注杜詩章國華過豫山間出所集注杜詩示豫其用力勤矣然其所引東坡事實者非蘇公作聞之長老乃閩中鄭昂尚明偽為之所引事皆無根據反用杜詩見句增減為文而傳其前人名字託為其語至有時世先後顛倒失次者舊嘗考之知其決非蘇公書也况杜詩隹處有在用事造語之外者唯其虛心諷詠乃能見之國華更以豫言求之雖以讀三百篇可也朱熹仲晦書題林汝器論語集説後友人范百崇嘗為豫言語孟聖賢之言本自平易又有諸先生相為發明義理昭著如日星然學者體味於心念念不巳自然血脈通貫無所底滯然後可言有益於吾身不然涉獵強記無沉浸釀郁之功則其所資亦淺淺焉耳豫愛其言因書於林汝器所編論語説後汝器以此説驗之則其所編之是非得失當自見矣題李太白詩世道日交喪澆風變淳原不求桂樹枝反棲惡木根所以桃李樹吐華竟不言大運有興沒羣動若飛奔歸來廣成子去入無窮門林光之携陳光澤所藏廣成子畫像來看偶記太白此詩因寫以示之今人捨命作詩開口便説李杜以此觀之何曾夢見他腳板耶書周易參同契考異後右周易參同契魏伯陽所作魏君後漢人篇題蓋放緯書之目詞韻皆古奧雅難通讀者淺聞妄輒更改故此他書尤多舛誤今合諸本更相讎正其間尚多疑晦未能盡祛姑據所知寫成定本其諸同異因悉存之以備參訂云空同道士鄒欣題不飬出母議後禮不著嫁母之服而律令有之或者疑其不同以豫考之禮於嫁母雖不言親而獨言繼又著出母之服焉皆舉輕以明重而見親母之嫁者尤不可以無服與律令之意𥘉不殊也又於為父後者但言出母之無服而不及嫁母是亦舉輕以别重而見嫁母之猶應有服也余觀余正父之所辨貢十之妾母雖非父卒子幼而更嫁然無七出之罪而其去也有故則其實乃嫁母而非出也樂平令尹所論之失正坐以嫁母為出母謂有服為無服而正父之辨之也亦唯此二者之為急耳今乃獨有是嫁母也之一言而不論其所以不為出而猶有服者顧反題其篇端曰不養出母又但論其與古之出母者不同而不可從於不喪之文則亦自相矛盾而反以證成令尹之誤説矣豫懼夫覽者之不能無疑故書此以質焉正父雖不能深明其不為出母然亦不敢正以出母目之但篇末一處有不飬出母字而自改出字為生字亦可見其大指之所在矣但少著力分明説破耳抑正父之欲使夫人飬是母也將使如何而飬之耶豫聞之母嫁而子從者繼父為之築廟於家門之外使其子祀之而妻不敢與焉説者以為恩雖至親族巳絶矣夫不可二故也此則是嫁母者生不可以入于廟死不可以祔于廟而亦不可以飬於家矣為之子者率其婦子就母之家或舍其側而飬之則於禮也其節矣乎或曰此為母之有家者言之則可矣不幸而無以為家則如之何築室于外可也書張伯和詩詞後右紫微舍人張伯和父所書其父子詩詞以見屬者讀之使人奮然有擒滅讎虜掃清中原之意淳熙庚子刻置南康軍之武觀以示文武吏士跋徐騎省所篆項王亭賦後騎省自言晚乃得請匾法今觀此卷縱橫放逸無毫髮姿媚意態其為老筆亡疑淳熙辛丑仲冬乙酉新安朱熹觀汪伯時所藏於西安浮石舟中跋蘭亭敘觀王順伯袁起巖論蘭亭序如尤延之著語猶未免有疑論余乃安敢復措説於其間但味務觀之言亦復慨然有楚囚之歎耳朱熹跋汪季路所藏其外祖湍石喻公所書文中子言行卷後王泉喻公手書王文中子言行以授其外孫其可謂不言之教矣後學朱熹敬觀淳熙壬寅十二月庚申跋泰山秦篆譜乾道丁亥豫訪張敬夫於長沙一日相與謁劉子駒文閲其先世所藏法書古刻及近世諸公往來書帖竟日不能遍因出泰山秦篆譜曰此雖墨本然舊藏僅存此𥿄頃歲有欲取以入石者顧手澤所在不忍壞遂巳獨學易養性二篇乃重刻本因取以見遺豫受藏之後纍年乃得篆譜新本於汪季路不知其何從得本以刻也因合二書通為一卷追省前事如宿昔也劉丈多聞強記清貧苦節少仕州縣遇熙豐故家子孫輒引避饘粥不繼或憊卧終日而處之泰然相見時巳老尚能談説往事滚滚不休氣貌醇古自然有前輩風度今不復有斯人矣去歲守潭俯仰昔遊幾閲一世劉丈與敬夫逝去皆巳久而劉氏子姪無欲無咎獨能閉門忍窮謹守家法又足令人感慨太息云明年慶元改號歲在乙卯五月丁未病中讀飬性語因記其後跋蔡藻筆蔡藻造筆能書者識之此故沅州吕使君語也因試其所製棗心樣喜其老而益精并深山陽鄰笛之感慶元丙辰冬至前五日晦翁書題袁機仲所校參同契後豫頃年經行順昌憩篔簹鋪見有題煌煌靈芝一年三秀豫獨何為有志不就之語於壁間者三復其詞而悲之不知題者何人適與豫意會也慶元丁巳八月七日再過其處舊題固不復見而屈指歲月忽忽餘四十年此志真不就矣道間偶讀此書并感前事戲題絶句鼎鼎百年能幾時靈芝三秀欲何為金丹歲晚無消息重歎篔簹壁上詩晦翁跋周益公楊誠齋送甘叔懷詩文卷後退傅精勤小物無有入於無間老監縱橫妙用諸相即是非相且道二公用處是同是别叔懷於此卷中直下薦得不妨竒特如或未然待汝一口吸盡西江水即向汝道慶元巳未四月甲申朱熹跋陳剛中帖陳剛中詩諸公跋語巳具見其顚末周君季宏持以示余使題於後顧熹復何能有所發明但計紹興庚申距今巳未六甲五子適一周矣胡陳雖死尚有生氣而彼紛紛者果安在哉嗟歎不足姑竊識其左方十月甲子雲谷老人朱熹書記遊南康廬山晦翁與程正思丁復之黃直卿俱來覽觀江山之勝樂之忘歸時淳熙巳亥重午日翁子在甥魏恪侍行書濂溪光風霽月亭淳熙八年歲在辛丑夏四月六日後學朱熹張掦卿王沅周頥林用中陳祖永許子春王翰余隅陳士直張彥先黃幹敬再拜于濂溪先生書堂下惟先生承天卑系道統所以建端垂緒啓佑于我後之人者厥初罔不在斯堂用咸歎慕低回弗忍去熹乃復出所誦説先生太極圖贊其義以曉衆咸曰休哉退先生之曽孫正卿彥卿玄孫濤設饌光風霽月亭祁真卿吳兼善僧志南與熹敬書以志遊密菴記淳熙辛丑秋七月癸未朱仲晦父劉彥集敬父平父黃德逺方伯休陳彥忠來遊密菴仲晦父之子孰在彥集之子瑾平父子姪學雅學文學古學慱學裘侍向夕冒大雨涉重澗登晝寒亭觀瀑布壯甚明日仲晦父復與彥集平父步自野鶴亭下尋澗底得水石隹處三四規築亭以臨之而陳力就深父繼至見之欣然許相其役遂復登晝寒會雨小霽日光璀璨尤覺雄麗歸飲清湍以崇山峻嶺茂林修竹清流激湍映帶左右分韻賦詩明日復循澗疏理泉石飲罷而還道人宗慧宗歸有約不至晦庵先生朱文公文集卷第八十四懷安縣儒學訓導葉暢校
