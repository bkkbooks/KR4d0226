body:
  text: 答胡廣仲欽夫未發之論誠若分别太深然其所謂無者非謂本無此理但謂物欲交引無復澄靜之時耳熹意竊恐此亦隨人稟賦不同性靜者須或有此時節但不知敬以主之則昏憒駁雜不自覺知終亦必亡而已矣故程子曰敬而無失乃所以中此語至約是真實下功夫處願於日用語默動靜之間試加意焉當知其不妄矣近來覺得敬之一字真聖學始終之要向來之論謂必先致其知然後有以用力於此疑若未安蓋古人由小學而進於大學其於灑掃應對進退之間持守堅定涵養純熟固巳久矣是以大學之序特因小學巳成之功而以格物致知為始今人未嘗一日從事於小學而曰必先致其知然後敬有所施則未知其以何為主而格物以致其知也故程子曰入道莫如敬未有能致知而不在敬者又論敬云但存此久之則天理自明推而上之凡古昔聖賢之言亦莫不如此者試考其言而以身驗之則彼此之得失見矣答胡廣仲大極圖舊本極荷垂示然其意義終未能曉如隂靜在上而陽動在下黑中有白而白中無黑及五行相生先後次序皆所未明而來諭以為太極之妙不可移易是必知其説矣更望子細指陳所以為太極之妙而不可移易處以見教幸甚幸甚解釋文義使各有指歸正欲以語道耳不然則解釋文義將何為邪今來諭有云解釋文義則當如此而不可以語道不知如何立言而後可以語道也仁義之説頃答晦叔兄巳詳今必以為仁不可對義而言則説卦孟子之言皆何謂乎來諭又云仁乃聖人極妙之機此等語亦有病但看聖賢言仁處還曽有一句此等説話否來諭又謂動靜之外别有不與動對之靜不與靜對之動此則尤所未諭動靜二字相為對待不能相無乃天理之自然非人力之所能為也若不與動對則不名為靜不與靜對則亦不名為動矣但衆人之動則流於動而無靜衆人之靜則淪於靜而無動此周子所謂物則不通者也惟聖人無人欲之私而全乎天理是以其動也靜之理未嘗亡其靜也動之機未嘗息此周子所謂神妙萬物者也然而必曰主靜云者蓋以其相資之勢言之則動有資於靜而靜無資於動如乾不專一則不能直遂坤不翕聚則不能發散龍蛇不蟄則無以奮尺蠖不屈則無以伸亦天理之必然也來諭又有動則離性之説此尤所未諭蓋人生而靜雖天之性感物而動亦性之欲若發而中節欲其可欲則豈嘗離夫性哉惟夫衆人之動動而無靜則或失其性耳故文定春秋傳曰聖人之心感物而動知言亦云靜與天同德動與天同道皆未嘗有聖人無動之説也却是後來分别感物而通感物而動語意迫切生出許多枝節而後人守之太過費盡氣力百種安排幾能令臧三耳矣然甚難而實非恐不可不察也知言性之所以一𥘉見一本無不字後見别本有之尚疑其誤繼而遍考此書前後説頗有不一之意如子思子曰一章是也故恐實謂性有差别遂依别本添入不字今既遺藁無之則當改正但其它説性不一處愈使人不能無疑耳昨來知言疑義中巳論之不識高明以為然否上蔡雖説明道先使學者有所知識却從敬入然其記二先生語却謂未有致知而不在敬者又自云諸君不須别求見處但敬與窮理則可以入德矣二先生亦言根本須先培擁然後可立趨向又言莊整齊肅久之則自然天理明五峯雖言知不先至則敬不得施然又云格物之道必先居敬以持其志此言皆何謂邪熹竊謂明道所謂先有知識者只為知邪正識趨向耳未便遽及知至之事也上蔡五峯既推之太過而來喻又謂知之一字便是聖門授受之機則是因二公之過而又過之試以聖賢之言考之似皆未有此等語意却是近世禪家説話多如此若必如此則是未知巳前可以怠慢放肆無所不為而必若曾子一唯之後然後可以用力於敬也此説之行於學者日用工夫大有所害恐將有談玄説妙以終其身而不及用力於敬者非但言語之小疵也上蔡又論橫渠以禮教人之失故其學至於無傳據二先生所論却不如此蓋曰子厚以禮教學者最善使人先有所據守但譏其説清虛一大使人向别處走不如且道敬耳此等處上蔡説皆有病如云正容謹節外靣威儀非禮之本尤未穩當子文文子知言疑議亦巳論之矣僣冒不韙深以愧懼但講學之際務求的當不敢含糊不得不盡言耳答胡廣仲知仁之説前日答晦叔書巳具論之今細觀來教謂釋氏𥘉無觀過功夫不可同日而語則前書未及報也夫彼固無觀過之功矣然今所論亦但欲借此觀過而知觀者之為仁耳則是雖云觀過而其指意却𥘉不為遷善改過求合天理設也然則與彼亦何異邪嘗聞釋氏之師有問其徒者曰汝何處人對曰幽州曰汝思彼否曰常思曰何思曰思其山川城邑人物車馬之盛耳其師曰汝試反思思底還有許多事否今所論因觀過而識觀者其切要處正與此同若果如此則聖人當時自不必專以觀過為言蓋凡觸目遇事無不可觀而巳有所觀亦無不可因以識觀者而知夫仁矣以此譏彼是何異同浴而譏祼裎也耶人欲非性之語此亦正合理會熹竊謂天理固無對然既有人欲即天理便不得不與人欲為消長善亦本無對然既有惡即善便不得不與惡為盛衰譬如普天之下莫非王土率土之濵莫非王臣此本豈有對哉至於晉有五胡唐有三鎮則華夷逆順不得不相與為對矣但其𥘉則有善而無惡有天命而無人欲耳龜山之意正欲於此毫釐之間剖判分析使人於克巳復禮之功便有下手處如孟子道性善只如此説亦甚明白慤實不費心力而易傳大有卦遺書第二十二篇棣問孔孟言性章論此又極分明是皆天下之公理非一家所得而私者願虛心平氣勿以好高為意毋以先入為主而熟察其事理之實於日用之間則其得失從違不難見矣蓋謂天命為不囿於物可也以為不囿於善則不知天之所以為天矣謂惡不可以言性可也以為善不足以言性則不知善之所自來矣知言中此等議論與其他好處自相矛盾者極多却與告子楊子釋氏蘇氏之言幾無以異昨來所以不免致疑者正為如此惜乎不及供灑掃於五峯之門而靣質之故不得不與同志者講之耳亦聞以此或頗得罪於人然區區之意只欲道理分明上不負聖賢中不誤自巳下不迷後學而巳它固有所不得而避也答胡廣仲伊川先生曰天地儲精得五行之秀者為人其本也真而靜其未發也五性具焉曰仁義禮智信形既生矣外物觸其形而動於中矣其中動而七情出焉曰喜怒哀樂愛惡欲情既熾而益蕩其性鑿矣熹詳味此數語與樂記之説指意不殊所謂靜者亦指未感時言爾當此之時心之所存渾是天理未有人欲之偽故曰天之性及其感物而動則是非真妄自此分矣然非性則亦無自而發故曰性之欲動字與中庸發字無異而其是非真妄特決於有節與無節中節與不中節之間耳來教所謂正要此處識得真妄是也然須是平日有涵養之功臨事方能識得若茫然都無主宰事至然後安排則巳緩而不及於事矣至謂靜字所以形容天性之妙不可以動靜真妄言則熹却有疑焉蓋性無不該動靜之理具焉若專以靜字形容則反偏却性字矣記以靜為天性只謂未感物之前私欲未萌渾是天理耳不必以靜字為性之妙也真妄又與動靜不同性之為性天下莫不具焉但無妄耳今乃欲并與其真而無之此韓公道無真假之言所以見譏於明道也伊川所謂其本真而靜者真靜兩字亦自不同蓋真則指本體而言靜則但言其𥘉未感物耳明道先生云人生而靜之上不容説才説性時便巳不是性矣蓋人生而靜只是情之未發但於此可見天性之全非真以靜狀性也愚意如此未知中否答胡廣仲熹承諭向來為學之病足見高明所進日新之盛一方後學蒙惠厚矣然以熹觀之則恐猶有所未盡也蓋不務涵養而專於致知此固前日受病之原而所知不精害於涵養此又今日切身之病也若但欲守今日之所知而加涵養之功以輔其所不足竊恐終未免夫有病而非所以合內外之道必也盡棄今日之所巳知而兩進夫涵養格物之功焉則庶乎其可耳蓋來書所論皆前日致知之所得也而其病有如左方所陳者伏惟幸垂聽而圖之夫太極之旨周子立象於前為説於後互相發明平正洞逹絶無毫髮可疑而舊傳圖説皆有繆誤幸其失於此者猶或有存於彼是以向來得以參互考證改而正之凡所更改皆有據依非出於巳意之私也舊本圖子既差而説中靜而生隂靜下多一極字亦以圖及上下文意考正而削之矣若如所論必以舊圖為據而曲為之説意則巧矣然既以第一圈為隂靜第二圈為陽動則夫所謂太極者果安在耶又謂先有無陽之隂後有兼隂之陽則周子本説𥘉無此意而天地之化似亦不然且程子所謂無截然為隂為陽之理即周子所謂互為其根也程子所謂升降生殺之大分不可無者即周子所謂分隂分陽也兩句相須其義始備故二夫子皆兩言之未嘗偏有所廢也今偏舉其一而所施又不當其所且所論先有專一之隂後有兼體之陽是乃截然之甚者此熹之所疑者一也人生而靜天之性者言人生之𥘉未有感時便是渾然天理也感物而動性之欲者言及其有感便是此理之發也程子於顔子好學論中論此極詳但平心易氣熟玩而徐思之自當見得義理明白穩當處不必如此強説枉費心力也程子所謂常理不易者亦是説未感時理之定體如此耳非如來諭之云也此熹之所疑者二也知言疑義所謂情亦天下之逹道此句誠少曲折然其本意却自分明今但改云情亦所以為天下之逹道也則語意曲折備矣蓋非喜怒哀樂之發則無以見其中節與否非其發而中節則又何以謂之和哉心主性情理亦曉然今不暇别引證據但以吾心觀之未發而知覺不昧者豈非心之主乎性者乎巳發而品節不差者豈非心之主乎情者乎心字貫幽明通上下無所不在不可以方體論也今曰以情為逹道則不必言心矣如此則是專以心為已發如向來之説也然則謂未發時無心可乎此義程子答吕博士最後一書説巳分明今不察焉而必守舊説之誤此熹之所疑者三也性善之善不與惡對此本龜山所聞於浮屠常揔者宛轉説來似亦無病然謂性之為善未有惡之可對則可謂終無對則不可蓋性一而巳既曰無有不善則此性之中無復有惡與善為對亦不待言而可知矣若乃善之所以得名是乃對惡而言其曰性善是乃所以别天理於人欲也天理人欲雖非同時並有之物然自其先後公私邪正之反而言之亦不得不為對也今必謂别有無對之善此又熹之所疑者四也中庸鄙説誠有未當然其説之病正在分曉太過無復餘味以待學者涵泳咀嚼之功而來諭及謂未曾分曉説出不知更欲如何乃為分曉説出耶天命之性不可形容不須贊嘆只得將它骨子實頭處説出來乃於言性為有功故熹只以仁義禮智四字言之最為端的率性之道便是率此之性無非是道亦離此四字不得如程子所謂仁性也孝悌是用也性中只有仁義禮智而巳曷嘗有孝弟來此語亦可見矣蓋父子之親兄弟之愛固性之所有然在性中只謂之仁而不謂之父子兄弟之道也君臣之分朋友之交亦性之所有然在性中只謂之義而不謂之君臣朋友之道也推此言之曰禮曰智無不然者蓋天地萬物之理無不出於此四者今以此為倒説而反謂仁義因父子君臣而得名此熹之所疑者五也中和體用之語亦只是句中少曲折耳蓋中者所以狀性之德而形道之體和者所以語情之正而顯道之用熹前説之失便以中和為體用則是猶便以方圓為天地也近巳用此意改定舊語如來諭所疑却恐未然又云中自過不及而得名此亦恐説未發之中不著此熹之所疑者六也至於仁之為説昨兩得欽夫書詰難甚密皆巳報之近得報云却巳皆無疑矣今觀所諭大槩不出其中者更不復論但所引孟子知覺二字却恐與上蔡意旨不同蓋孟子之言知覺謂知此事覺此理乃學之至而知之盡也上蔡之言知覺謂識痛癢能酬酢者乃心之用而知之端也二者亦不同矣然其大體皆智之事也今以言仁所以多矛盾而少契合也憤驕險薄豈敢輒指上蔡而言但謂學者不識仁之名義又不知所以存養而張眉努眼説知説覺者必至此耳如上蔡詞氣之間亦微覺少些小溫粹恐亦未必不坐此也夫以愛名仁固不可然愛之理則所謂仁之體也天地萬物與吾一體固所以無不愛然愛之理則不為是而有也須知仁義禮智四字一般皆性之德乃天然本有之理無所為而然者但仁乃愛之理生之道故即此而又可以包夫四者所以為學之要耳細觀來諭似皆未察乎此此熹之所疑者七也晦叔書中論此大略與吾丈意同更不及别答只乞轉以此假呈之大抵理會仁字須并義禮智三字通看方見界分分明血脈通貫近世學者貪説仁字而忽略三者所以無所據依卒并與仁字而不識也夫來教之為此數説者皆超然異於簡册見聞之舊此其致知之功亦足以為精矣然以熹之所疑考之則恐求精之過而反失之於鑿也大抵天下事物之理亭當均平無無對者唯道為無對然以形而上下論之則亦未嘗不有對也蓋所謂對者或以左右或以上下或以前後或以多寡或以類而對或以反而對反復推之天地之間真無一物兀然無對而孤立者此程子所以中夜以思不覺手舞而足蹈也究觀來教條目固多而其意常主於别有一物之無對故凡以左右而對者則扶起其一邊以前後而對者則截去其一假既強加其所主者以無對之貴名而於其所賤而列於有對者又不免别立一位以配之於是左右偏枯首尾斷絶位置重疊條理交併凡天下之理勢一切畸零贅剩側峻尖斜更無齊整平正之處凡此所論隂陽動靜善惡仁義等説皆此一模中脫出也常安排此箇意思規模橫在胸中竊恐終不能到得中正和樂廣大公平底地位此熹所以有所知不精害於涵養之説也若必欲守此而但少加涵養之功别為一事以輔之於外以是為足以合內外之道則非熹之所敢知矣要須脫然頓舍舊習而虛心平氣以徐觀義理之所安則庶乎其可也仰恃知照不鄙其愚引與商論以求至當之歸敢不整竭所懷以求博約蓋天下公理非一家之私儻不有益於執事之高明則必有警乎熹之淺陋矣答胡廣仲久不聞問向仰良深即日秋涼伏惟燕居味道神相尊候萬福熹哀苦不死忽見秋序觸緒傷割不能自堪時來墳山幸有一二朋友溫繹舊聞且爾遣日實則不若無生之愈也欽夫召用甚慰人望但自造朝至今未收書傳聞晦叔且歸亦久未至使人懸情耳吾丈比來觀何書作何功夫想所造日益高明恨無從質問向嘗附便寄呈與欽夫擇之兩書不審於尊意云何有未中理幸賜指誨此書附新清逺主簿楊子直方因其入廣西取道嶽前屬使求見渠在此留幾兩月講會稍詳此間動靜可問而知其人篤志於學朋友間亦不易得也恐其或欲寓書告為尋便遣來幸甚幸甚今日當還家臨行草草布此不能它及邈無承教之期惟兾以時珍衛千萬幸甚熹再拜上問閣政孺人伏惟懿候萬福郎娘均慶伯逢兄不及拜狀昨鄭司法行巳嘗寓書矣不知逹否子直亦欲求見幸遣人導之并及此意此委勿外熹再拜上問昨承季立兄慰問欲具疏上謝又恐子直之行繚繞反致稽緩旦夕還家作書附子飛處未必不先逹也熹又覆與吳晦叔文叔出示近與諸公更定祭儀其間少有疑輒以請教幸與諸公評之廟必東向此一句便可疑古人廟堂南向室在其北東户西牖皆南向室西南隅為奧尊者居之故神主在焉詩所謂宗室牖下者是也主既在西壁下即須東向故行事之際主人入戶西向致敬試取儀禮特牲少宰饋食等篇讀之即可見矣今通典開元禮釋奠儀猶於堂上西壁下設先聖東向之位故三獻官皆西向倣佛古制今神位南向而獻官猶西向失之矣凡廟皆南向而主皆東向惟祫祭之時群廟之主皆升合食于太祖之時則太祖之主仍舊東向而群昭南向群穆北向列於太祖之前此前代禮官所謂太祖正東向之位者為祫祭時言也非祫時則群廟之主在其廟中無不東向矣廟則𥘉不東向也至朱公掞録二先生語始有廟必東向之説恐考之未詳或記録之誤也且禮左宗廟則廟巳在所居之東南禮家謂當直巳丙上若又東向則正背却中庭門道於人情亦不順矣故疑語録恐是錯東字然其後又言太祖東向則廟當南向而列主如祫祭之位唐禮閣新儀祭圖設位曽祖在西璧下東向祖北璧下南向父阼階上北向又恐於今人情或不相稱抵牾如此似難盡從又考其説與後來伊川所定祭儀主式亦不相合伊川以四仲月祭而此録秋用重陽非仲月伊川作主粉塗書屬稱而此云刻牌子疑亦當時草創未定之論此皆語録之誤也又今儀冬至祭始祖并及祧廟之主夫冬至祭始祖立春祭先祖季秋祭禰廟此伊川之所義起也蓋取諸天時參以物象其義精矣今不能行則巳如其行之而又不盡更以巳意竄易舊文失先賢義起精微之意愚意以為殆不若不行之為愈也此則新儀之誤矣其餘小小節文未備處未暇一一整頓只此兩大節目似不可不正試與諸公議之如何如何答吳晦叔别紙所詢三事皆非淺陋之所及然近者竊讀舊書每恨向來講説常有過髙之弊如文武之道未墜於地此但謂周之先王所以制作傳世者當孔子時未盡亡耳夫子焉不學而亦何常師之有此亦是子貢真實語如孔子雖是生知然何嘗不學亦何所不師但其為學與他人不同如舜之聞一善言見一善行便若決江河莫之能禦耳然則能無不學無不師者是乃聖人之所以為生知也若向來則定須謂道體無時而亡故聖人目見耳聞無適而非學雖不害有此理終非當日答問之夲意矣其他亦多類此不暇一一辨析也鬼神者造化之迹屈伸往來二氣之良能也天地之升降日月之盈縮萬物之消息變化無一非鬼神之所為者是以鬼神雖無形聲而遍體乎萬物之中物莫能遺觀其能使天下之人齊明盛服以承祭祀便洋洋乎如在其上如在其左右便見不可遺處著見章灼不可得而掩矣前輩引用此句或有脫了可字者乃似鬼神有不遺物之意非物自不可得而遺也來喻亦脫此字豈或筆誤而然耶春秋書正據伊川説則只是周正建子之月但非春而書春則夫子有行夏時之意而假天時以立義耳文定引商書十有二月漢史冬十月為證以明周不改月此固然矣然以孟子考之則七八月乃建午建未之月暑雨苗長之時而十一月十二月乃建戍建亥之月將寒成梁之候國語引夏令曰十月成梁又似併改月號此又何耶或是當時二者並行惟人所用但春秋既是國史則必用時王之正其比商書不同者蓋後世之彌文而秦漢直稱十月者則其制度之闊略耳注家謂十月乃後人追改當更考之愚意如此未知是否因便復以求教幸還以一言可否之此區區所深望也尊兄近日所觀何書如何用力想必有成規恨未得靣扣敬夫小試巳不負所學使人增氣但從容講貫之際隂助為不少矣答吳晦叔隂陽太極之間本自難下語然却且要得大槩如此分明其間精微處恐儘有病在且得存之異時或稍長進自然見得諦當改易不難今切切如此較計一兩字迫切追尋恐無長進少氣味也伊川答橫渠書只云願更完養思慮涵泳義理久之自當條暢此可見前賢之用心矣如何如何仁右道左一段先生説得極有曲折無可疑者蓋仁是這裏親切處道是衆所共由故有左右隂陽之别古人言道慤實平穩一一有下落處不若今人之漫無統約也答吳晦叔夫易變易也兼指一動一靜巳發未發而言之也太極者性情之妙也乃一動一靜未發巳發之理也故曰易有太極言即其動靜闔闢而皆有是理也若以易字專指巳發為言是又以心為巳發之説也此固未當程先生言之明矣不審尊意以為如何答吳晦叔前書所諭周正之説終未穩當孟子所謂七八月乃今之五六月所謂十一月十二月乃今之九月十月是周人固巳改月矣但天時則不可改故書云秋大熟未穫此即止是今時之秋蓋非酉戌之月則未有以見夫歲之大熟而未穫也以此考之今春秋月數乃魯史之舊文而四時之序則孔子之微意伊川所謂假天時以立義者正謂此也若謂周人𥘉不改月則未有明據故文定只以商秦二事為證以彼之博洽精勤所取猶止於此則無它可考必矣今乃欲以十月隕霜之異證之恐未足以為不改月之驗也蓋隕霜在今之十月則不足怪在周之十月則為異矣又何必史書八月然後為異哉况魯史不傳無以必知其然不若只以孟子尚書為據之明且審也若尚有疑則不若且闕之之為愈不必強為之説矣詩中月數又似不曽改如四月維夏六月徂暑之類故熹向者疑其並行也答吳晦叔觀過一義思之甚審如來喻及伯逢兄説必謂聖人教人以自治為急如此言乃有親切體驗之功此固是也然聖人言知人處亦不為少自治固急亦豈有偏自治而不務知人之理耶又謂人之過不止於厚薄愛忍四者而疑伊川之説為未盡伊川止是舉一隅耳若君子過於廉小人過於貪君子過於介小人過於通之類皆是亦不止於此四者而巳也但就此等處看則人之仁不仁可見而仁之氣象亦自可識故聖人但言斯知仁矣此乃先儒舊説為説甚短而意味甚長但熟玩之自然可見若如所論固若親切矣然乃所以為迫切淺露而去聖人氣象愈逺也且心既有此過矣又不舍此過而别以一心觀之既觀之矣而又别以一心知此觀者之為仁若以為有此三物遞相看覷則紛紜雜擾不成道理若謂止是一心則頃刻之間有此三用不亦忽遽急迫之甚乎凡此尤所未安姑且先以求教答吳晦叔臣下不匡之刑蓋施於邦君大夫之喪國亡家者君臣一體不得不然如漢廢昌邑王賀則誅其羣臣而夲朝太祖下嶺南亦誅其亂臣龔澄樞李托之類是也澄樞等實亡劉氏乃飛廉惡來之比誅之自不為冤若昌邑群臣與賀同惡者固不得不誅其餘正可當古者墨刑之坐耳乃不分等級例行誅殺是則霍光之私意也又如文定論楚子納孔儀處事雖不同意亦類此試參考之則知成湯之制官刑正是奉行天討毫髮不差處何疑之有哉孟子知覺二字程子云知是知此事覺是覺此理此言盡之自不必别立説也事親當孝事兄當悌者事也所以當孝所以當悌者理也兩魏之分東則髙歡西則宇文巳非復有魏室矣當是之時見微之士固巳不立乎其位不幸而立乎其位其賤者乎則亦去之可也其貴者乎則左右近臣從君於西社稷大臣守國於東而皆必思所以為安國靖難興復長久之計不濟則以死繼之而巳此外復何䇿哉前書所論觀過之説時彪丈行速匆遽草率不能盡所懷然其大者亦可見不知當否如何其未盡者今又見於廣仲伯逢書中可取一觀未中理處更得反復詰難乃所深望然前所示教引巧言令色剛毅木訥兩條以為聖人所以開示為仁之方使人自得者熹猶竊有疑焉而前書亦未及論也蓋此兩語正是聖人教人實下功夫防患立心之一術果能戒巧令務敦朴則心不恣縱而於仁為近矣非徒使之由是而知仁也大抵向來之説皆是苦心極力要識仁字故其説愈巧而氣象愈薄近日究觀聖門埀教之意却是要人躬行實踐直內勝私使輕浮刻薄貴我賤物之態潛消於冥冥之中而吾之本心渾厚慈良公平正大之體常存而不失便是仁處其用功著力隨人淺深各有次第要之須是力行久熟實到此地方能知此意味蓋非可以想象臆度而知亦不待想象臆度而知也近因南軒寄示言仁録亦嘗再以書論所疑大槩如此而後書所論仁智兩字尤為明白想皆巳見矣并為參詳可否復以見教幸甚幸甚答吳晦叔五刑一假近得大紀諸論考之其説詳矣然有所未曉復以求教蓋此經文本有七句今於其間雜然取此五句以為五刑之目而又去流取贖輕重不倫一也先贖後賊則非以重及輕先鞭後贖又非從輕至重先後無序二也又謂象以典刑施於士大夫而以不顯其過隨宜改敘為近於流宥之法即不知正象刑是作如何行遣三也又臯陶作士本以治夫蠻夷寇賊之為亂者若如此説則書所稱臯陶方施象刑惟明乃獨以其施於士大夫者言之不惟非命官之本意亦與本篇上文不相應四也又鞭朴自是輕刑得宥反遭流徙去輕即重不足為恩五也金贖流宥本是一例而就其間贖又輕於流者今贖乃列於一刑之目而當贖得宥者反從流徙之坐尤為乖戾六也移鄉謂之流猶為近之改敘他官及坐嘉石入圜土則與流字意義不同矣七也凡此七條皆所未曉更望參訂下諭幸甚幸甚答吳晦叔熹伏承示及先知後行之説反復詳明引據精密警發多矣所未能無疑者方欲求教又得南軒寄來書藁讀之則凡熹之所欲言者蓋皆巳先得之矣特其曲折之間小有未備請得而細論之夫泛論知行之理而就一事之中以觀之則知之為先行之為後無可疑者如孟子所謂知皆擴而充之程子所謂譬如行路須得光照及易文言所謂知至至之知終終之之類是也然合夫知之淺深行之大小而言則非有以先成乎其小亦將何以馴致乎其大者哉如子夏教人以灑掃應對進退為先程子謂未有致知而不在敬者及易文言所言知至知終皆在忠信修辭之後之類是也蓋古人之教自其孩幼而教之以孝悌誠敬之實及其少長而博之以詩書禮樂之文皆所以使之即夫一事一物之間各有以知其義理之所在而致涵養踐履之功也此小學之事知之淺而行之小者也及其十五成童學於大學則其灑掃應對之間禮樂射御之際所以涵養踐履之者略巳小成矣於是不離乎此而教之以格物以致其知焉致知云者因其所已知者推而致之以及其所未知者而極其至也是必至於舉天地萬物之理而一以貫之然後為知之至而所謂誠意正心修身齊家治國平天下者至是而無所不盡其道焉此大學之道知之深而行之大者也今就其一事之中而論之則先知後行固各有其序矣誠欲因夫小學之成以進乎大學之始則非涵養履踐之有素亦豈能居然以夫雜亂紛紏之心而格物以致其知哉且易之所謂忠信修辭者聖學之實事貫始終而言者也以其淺而小者言之則自其常視母誑男唯女俞之時固巳知而能之矣知至至之則由行此而又知其所至也此知之深者也知終終之則由知至而又進以終之也此行之大者也故大學之書雖以格物致知為用力之始然非謂𥘉不涵養履踐而直從事於此也又非謂物未格知未至則意可以不誠心可以不正身可以不修家可以不齊也但以為必知之至然後所以治巳治人者始有以盡其道耳若曰必俟知至而後可行則夫事親從兄承上接下乃人生之所不能一日廢者豈可謂吾知未至而暫輟以俟其至而後行哉按五峯作復齋記有立志居敬身親格之之説蓋深得乎此者但知言所論於知之淺深不甚區别而一以知先行後槩之則有所未安耳抑聖賢所謂知者雖有淺深然不過如前所論二端而巳但至於廓然貫通則內外精粗自無二致非如來教及前後所論觀過知仁者乃於方寸之間設為機械欲因觀彼而反識乎此也侯子所聞總老默而識之是識甚底之言正是説破此意如南軒所謂知底事者恐亦未免此病也又來諭所謂端謹以致知所謂克巳私集衆理者又似有以行為先之意而所謂在乎兼進者又若致知力行𥘉無先後之分也凡此皆鄙意所深疑而南軒之論所未備者故敢復以求教幸深察而詳諭之答吳晦叔復非天地心復則見天地心此語與所沿隂陽者道之意不同但以易傳觀之則可見矣蓋天地以生物為心而此卦之下一陽爻即天地所以生物之心也至於復之得名則以此陽之復生而巳猶言臨泰大壯夬也豈得遂指此名以為天地之心乎但於其復而見此一陽之萌於下則是因其復而見天地之心耳天地以生物為心此句自無病昨與南軒論之近得報云亦巳無疑矣大抵近年學者不肯以愛言仁故見先生君子以一陽生物論天地之心則必欿然不滿於其意復於言外生説推之使高而不知天地之所以為心者實不外此外此而言則必溺於虛淪於靜而體用本末不相管矣聖人無復故未嘗見其心者蓋天地之氣所以有陽之復者以其有隂故也衆人之心所以有善之復者以其有惡故也若聖人之心則天理渾然𥘉無間斷人孰得以窺其心之起滅耶若靜而復動則亦有之但不可以善惡而為言耳愚意如此恐或未然更乞詳諭踐形之説來諭得之但説得文義未分明耳熹謂踐形如踐言之踐程子所謂充人之名是也蓋人之形色莫非天性如視則有明聽則有聰動則有節是則所謂天性者𥘉不外乎形色之間也但常人失其性故視有不明聽有不聰動有不中是則雖有是形而無以踐之惟聖人盡性故視明聽聰而動無不中是以既有是形而又可以踐其形也可以踐形則無愧於形矣如此推説似稍分明不知是否絶四有兩説一説為孔子自無此四者毋即無字古書通用耳史記孔子世家正作無字也一説為孔子禁絶學者毋得有此四者今來諭者乃此意也兩説皆有意思然以文意考之似不若只用前説之為明白平易也又來諭毋意一句似亦未安意只是私意計較之謂不必以溢美溢惡證之恐太逺却文意也餘三句則所論得之無可議者矣大抵意是我之發我是意之根必在事前固在事後嘗在二者之間生於意而成於我此又四者之序也所示下學上逹先難後獲之説不貴空言務求實得立意甚美顧其間不能無可疑者請試論之蓋仁者性之德而愛之理也愛者情之發而仁之用也公者仁之所以為仁之道也元者天之所以為仁之德也仁者人之所固有而私或蔽之以陷於不仁故為仁者必先克巳克巳則公公則仁仁則愛矣不先克巳則公豈可得而徒存未至於仁則愛胡可以先體哉至於元則仁之在天者而巳非一人之心既有是元而後有以成夫仁也若夫知覺則智之用而仁者之所兼也元者四德之長故兼亨利貞仁者五常之長故兼義禮智信此仁者所以必有知覺而不可便以知覺名仁也大凡理會義理須先剖析得名義界分各有歸著然後於中自然有貫通處雖曰貫通而渾然之中所謂粲然者𥘉未嘗亂也今詳來示似於名字界分未嘗剖析而遽欲以一理包之故其所論既有巴攬牽合之勢又有雜亂重復支離渙散之病而其所謂先難下學實用功處又皆倒置錯陳不可承用今更不睱一一疏舉但詳以此説考之亦自可見矣答吳晦叔人心私欲之説如來教所改字極善本語之失亦是所謂夲源未明了之病非一句一義上見不到也但愚意猶疑向來妄論引必有事焉之語亦多未的當蓋舜禹授受之際所謂人心私欲者非若衆人所謂私欲也但微有一毫把捉底意思則雖云本是道心之發然終未離人心之境也所謂動以人則有妄顔子之有不善正在此間者是也既有妄則非私欲而何須是都無此意思自然從容中道才方純是道心必有事焉却是見得此理而存養下功處與所謂純是道心者蓋有間矣然既察見本源則自此可加精一之功而進夫純爾中間儘有次第也惟精惟一亦未離夫人心特須如此乃可以克盡私欲全復天理儻不如此則終無可至之理耳前書云即人心而識道心此本無害再作此書時忘記本語故復辨之耳答吳晦叔孟子操舍一章正為警悟學者使之體察常操而存之吕子約云因操舍以明其難存而易放固也而又指此為心體之流行則非矣今石子重方伯謨取以評之者大意良是但伯謨以為此乃人心惟危又似未然人心私欲耳豈孟子所欲操存哉又不可不辨也答吳晦叔未發之旨既蒙許可足以無疑矣又蒙教以勿恃簡䇿須是自加思索超然自見無疑方能自信此又區區平日之病敢不奉承然此一義向非得之簡䇿則傳聞襲見終身錯認聖賢旨意必矣又况簡䇿之言皆古先聖賢所以加惠後學垂教無窮所謂先得我心之同然者將於是乎在雖不可一向尋行數墨然亦不可遽舍此而他求也程子曰善學者求言必自近易於近者非知言也愚意却願尊兄深味此意毋遽忽易凡吾心之所得必以考之聖賢之書脫有一字之不同則更精思明辨以益求至當之歸母憚一時究索之勞使小惑苟解而大礙愈張也答石子重􅗐熹竊謂人之所以為學者以吾之心未若聖人之心故也心未能若聖人之心是以燭理未明無所準則隨其所好高者過卑者不及而不自知其為過且不及也若吾之心即與天地聖人之心無異矣則尚何學之為哉故學者必因先逹之言以求聖人之意因聖人之意以逹天地之理求之自淺以及深至之自近以及逺循循有序而不可以欲速迫切之心求也夫如是是以浸漸經歷審熟詳明而無躐等空言之弊馴致其極然後吾心得正天地聖人之心不外是焉非固欲畫於淺近而忘深逺舍吾心以求聖人之心棄吾説以徇先儒之説也答石子重所論仁之體用甚當甚當以此意推之古今聖賢之意歷歷可見無一不合者但其用力則不過克巳之私而私之難克亦巳甚矣區區不敏竊願與長者各盡力於斯焉猶恐墮廢不克自強尚賴時有以警䇿之幸甚幸甚答石子重按孔子言操則存舍則亡出入無時莫知其鄉四句而以惟心之謂與一句結之正是直指心之體用而言其周流變化神明不測之妙也若謂以其舍之而亡致得如此走作則是孔子所以言心體者乃只説得心之病矣聖人立言命物之意恐不如此兼出入兩字有善有惡不可皆謂舍之而亡之所致也又如所謂心之本體不可以存亡言此亦未安蓋若所操而存者𥘉非夲體則不知所存者果為何物而又何必以其存為哉但子約謂當其存時未及察識而巳遷動此則存之未熟而遽欲察識之過昨報其書嘗極論之今録求教其餘則彼得之巳多不必别下語矣因此偶復記憶胡文定公所謂不起不滅心之體方起方滅心之用能常操而存則雖一日之間百起百滅而心固自若者自是好語但讀者當知所謂不起不滅者非是塊然不動無所知覺也又非百起百滅之中别有一物不起不滅也但此心瑩然全無私意是則寂然不動之本體其順理而起順理而滅斯乃所以感而遂通天下之故者云爾向來於此未明反疑其言之太過自今觀之却是自家看得有病非立言者之失也不審高明以為如何因風却望示教答石子重心説甚善但恐更須收斂造約為佳耳以心使心所疑亦善蓋程子之意亦謂自作主宰不使其散漫走作耳如孟子云操則存云求放心皆是此類豈以此使彼之謂邪但今人著箇察識字便有箇尋求捕捉之意與聖賢所云操存主宰之味不同此毫釐間須看得破不爾則流於釋氏之説矣如胡氏之書未免此弊也昨日得叔京書論此殊未快答之如此别𥿄求教如此言之莫無病否窮理盡性等説不記話頭是如何然此亦非大節所存俟徐講之未晚也答石子重熹自去秋之中走長沙閲月而後至留兩月而後歸在道繚繞又五十餘日還家幸老人康健諸况粗適他無足言欽夫見處卓然不可及從遊之久反復開益為多但其天姿明敏從𥘉不歷階級而得之故今日語人亦多失之太高湘中學子從之遊者遂一例學為虛談其流弊亦將有害比來頗覺此病矣别後當有以救之然從遊之士亦自絶難得朴實頭理會者可見此道之難明也胡氏子弟及它門人亦有語此者然皆無實得拈捶竪拂幾如説禪矣與文定合下門庭大假相反更無商量處惟欽夫見得表裏通徹舊來習見微有所偏今此相見盡覺釋去儘好商量也伯崇精進之意反不逮前而擇之見趣操持愈見精密敬字之説深契鄙懷只如大學次序亦須如此看始得非格物致知全不用誠意正心及其誠意正心却都不用致知格物但下學處須是密察見得後便泰然行將去此有始終之異耳其實始終是箇敬字但敬中須有體察功夫方能行著習察不然兀然持敬又無進步處也觀夫子答門人為仁之問不同然大要以敬為入門處正要就日用純熟處識得便無走作非如今之學者前後自為兩假行解各不相資也近方見此意思亦患未得打成一片耳大化之中自有安宅此立語固有病然當時之意却是要見自家主宰處所謂大化須就此識得然後鳶飛魚躍觸處洞然若但泛然指天指地説箇大化便是安宅安宅便是大化却恐顢頇儱侗非聖門求仁之學也不審高明以為如何克齋恐非熹所敢記者必欲得之少假歲年使得更少加功或所見稍復有進始敢承命耳欽夫為人作一克齋銘録呈它文數篇并往有可評處幸與聞之欽夫聞老兄之風亦甚傾企令熹致願交之意也順之此來不及一見所養想更純熟留書見警甚至但終有桑門伊蒲塞氣味到家後又寄書來與此間親戚問湘中議論而曰謗釋氏者不須寄來觀此意見恐於吾儒門中全未有見又云不如且棲心淡泊於世少求時玩聖賢之言可以資吾神養吾真者一一勘過似此説話皆是大病不知向來相聚亦嘗警之否此道寂寥近來又為邪説汨亂使人駭懼聞洪適在會稽盡取張子韶經解板行此禍甚酷不在洪水夷狄猛獸之下令人寒心人微學淺又未有以遏之惟益思自勉更求朋友之助庶有以追蹤聖徒稍為後人指出邪徑俾不至全然陷溺亦一事耳順之聞之必反以為謗子韶也和篇拜賜甚寵足見比來胸中灑落如光風霽月氣象但見屬之意甚過而稱謂屢請不蒙改更深不自安自此萬望垂聽乃荷愛豫不然恐與來教再拜而辭之則不得復資勝己之益矣千萬誠告伏惟裁之熹忽有編摩之命出於意外即不敢當復聞闕期尚逺足以逡巡引避遂且拜受然亦不敢久冒空名旦夕便為計矣但順之又未必以為是耳答石子重所諭縣庠事前書巳具稟矣若如今者所諭則事體尤重須有傳道授業解惑之實乃能當之不然則以縣道事力遽為此事典憲譏訶恐有所不能免耕老雖故舊食貧心極念之然不敢贊兄為此也必欲相見招其一來為旬日之欵則不妨一書納上書中之説只云老兄欲相見它不敢及也大抵講學難得是當而應事接物尤難中節向來見理自不分明不得入德門戶而汲汲為人妄有談説其失巳誤人非一事矣今每思之不覺心悸故近日議論率多畏怯無復向來之勇鋭惟欲修治此身庶幾寡過自非深信得及下得朴實功夫者未嘗敢輒告語以此取怒於人蓋多然與其以妄言妄作得罪於聖人不若以此得罪於流俗之為愈私心甚欲一見長者靣論而未可得不知尊兄近日觀書立論比向日如何因書得示一二便是平日受用處矣答石子重國材苦學最可念所恨駁雜滯泥自無受用處深欲一見之或到能津遣一來為幸明道集中所論學制最為有本曾經意否每讀其書觀其論講學處未嘗不慨然發歎恨此生之不生於彼時也伊川元祐所修條制立尊道堂之類亦是此意然時措從宜處亦有曲折幸併取觀之當有所契答石子重南軒語解首章其失在於不曾分别學習二字又謂學者工夫巳無間斷却要時習只此二事可疑耳擇之雖欲分别學習二字而不曾見得分明却遂便差排硬説尤覺紛拏不成條理大抵學習二字却是龜山將顔子事形容得分明上蔡所謂傳者得之於人習者得之於巳其説亦是然統而言之則只謂之學故伊川有博學審問愼思明辨篤行五者廢其一非學也之語分而言之則學是未知而求知底功夫習是未能而求能底功夫須以博學審問為學愼思明辨篤行為習故伊川只以思字解習字蓋舉其要也學者既學而知之又當習以能之及其時習而不忘然後無間斷者始可得而馴致矣若巳無間斷則又何必更時習乎習字南軒之説正顚倒了擇之所論又不分明而詞氣不和意象輕肆尤非小病所宜深警省也行有餘力此章所辨詞意殊不分明大率行有餘力止是言行此數事之外有餘剩底工夫方可將此工夫去學文藝耳非謂行到從容地位為有餘力必如此然後可學文也伊川言孝子居喪志存守父在之道與張解志哀而不蝦它問之語不同遊氏説在所當改而可以未改與張解可以改可以未改之語亦異擇之辨説雖多却不及此何也答石子重從事於斯是著力否若是著力却是知自巳能自巳多須要去問不能與寡者自知巳有巳實須要若無若虛不幾於詐乎若説不著力却是聖人地位曰顔子只見在巳不足在人有餘何嘗以巳為能為多為有為實曽子却見得顔子以能問不能以多問寡有若無實若虛故贊歎其所為如此非謂其著力也到得聖人則如天地不必言能不能多寡有無虛實矣此只是顔子地位熹按此謂顔子只見在巳不足在人有餘者得之矣然只問不能問寡若無若虛便是更有用力處在但不是著力作此四事耳若聖人則固如天地然亦未嘗自以為有餘也篤信猶曰深信伊川謂只是無愛心其實只是未知味知味而愛所謂信之篤者也若不篤信安能好學守死謂死得有落著善道謂善其道猶工欲善其事善於其職之善守死所以善道篤有厚意深字説不盡守死只是以死自守不必謂死得有落著蓋篤信乃能好學而守死乃能善道也又能篤信好學然後能守死善道又篤信所以能守死好學所以能善道又篤信不可以不好學守死須要善得道此所謂死得有落著也又篤信好學須要守死善道數義錯綜其意始備且如自巳為學官為館職遇朝廷有利害得失或是宰執臺諌所當理會者它不理會自巳要緘默又不忍國家受禍要出來説又有出位謀政之嫌如之何則可曰若任他事却不可若以其理告君何故不可若是大事繫國家安危生靈休戚豈容緘默館職又與學官不同神宗固嘗許其論事矣但事之小者則亦不必每事數言也子欲居九夷與乘桴浮海同意當時傷道之不行中國之陋實起欲居九夷之念巳而不去亦是順理都無私意君子居之何陋之有言君子所居則化何陋之有或問九夷尚可化何故不化中國曰此是道巳不行中國巳不化所以起欲居九夷之意化與不化在彼聖人豈得必所居則化理如此耳中國之不化亦怎奈何當時中國未嘗不𬒳聖人之化但時君不用不得行其道耳未見其止止是聖人極致處所謂中是也顔子見得中分明只是未到到便是聖人故夫子歎之問吾止也與未見其止同異曰止則一般但用處别未見其止是止於其所止吾止也是於其所不當止而止以上下文考之恐與吾止之止同知以明之仁以守之勇以行之其要在致知知之明非仁以守之則不可以仁守之非勇而行之亦不可三者不可闕一而知為先此説甚善正吾人所當自力也知者不惑仁者不憂勇者不懼擇之云此是進德事仁者不憂智者不惑勇者不懼此是成德事先知後仁從外做入由用以至體自明而誠誠之者人之道也先仁後智從裏做出由體以及用自誠而明誠者天之道也三句雖同只仁智先後不同便有成德進德之間不可不辨也程先生自分别此兩條今如此推説亦詳盡也夫子之道忠恕動以天者也由仁義行也誠者天之道也不思而得不勉而中也譬如做梁柱聖人便是尺度了不用尺度才做便揍著它人須用尺度比量大小闊狹方圓後方始揍著此説亦善顔淵死孔子若有財還與之椁否順之曰不與喪稱家之有無顔淵家本無則其無椁乃為得宜孔子若與之椁便是使顔淵失宜孔子必不肯蓋椁者可有可無者也若無棺則必與之矣孔子若有財必與顔淵為椁蓋朋友有通財之義况孔子之於顔淵視之如子耶所謂喪具稱家之有無者但不可以非義它求耳鼓瑟希䌑爾舍瑟而作對曰異乎三子者之撰天機自動不知其所以然門人詳記曾晢舍瑟之事但欲見其從容不迫灑落自在之意耳若如此言則流於莊列之説矣且人之舉動孰非天機之自動耶然亦只此便見曽晳狂處蓋所見高而涵養未至也伊川云灑掃應對便是形而上者理無大小故也故君子只在謹獨灑掃應對是事所以灑掃應對是理事即理理即事道散在萬事那箇不是若事上有毫髮蹉過則理上便有間斷欠闕故君子直是不放過只在愼獨此意甚好但不知無事時當如何耳愼獨須貫動靜做功夫始得伊川云克巳最難故曰中庸不可能也此有必有事焉而勿正之意過猶不及只要恰好克盡巳私渾無意必方見得中庸恰好處若未能克巳則中庸不可得而道矣此子思明道之意也必有事焉而勿正是言養氣之法與此不同言動猶可以禮視聽如何以禮且如見惡色聞惡聲若不視不聽何以知得是惡色惡聲知得是惡色惡聲便是巳聽巳視了曰此之視聽是以心受之若從耳目過如何免得但心不受便是不視不聽視聽與見聞不同聲色接於耳目見聞也視聽則耳目從乎聲色矣不論心受與不受也在邦無怨在家無怨猶言無可憾者若它人之怨不怨則不敢必天地之大人猶有所憾以文意觀之恐是他人之怨出門如見大賔使民如承大祭就體上説巳所不欲勿施於人就用上説在邦無怨在家無怨就效處説此説甚好擇之疑出門使民巳是用處然亦不妨蓋此兩事只是自家敬其心耳未有施為措置也其言也訒有默而存之不言而信存乎德行天何言哉四時行焉百物生焉之意或曰説得深了只是針司馬牛多言之失仁者其言也訒此仁者與仁者不憂仁者安仁之仁者不同正與仁者人也義者宜也之仁者一般前説誠太深仁者其言也訒蓋心存理著自是不胡説耳後説亦恐未然能言距楊墨者聖人之徒也楊氏為我近乎義墨氏兼愛近乎仁當時人皆以為真仁義也靡然從之未有言距之者若不是見得聖人這邊道理明白如何識得楊墨之非仁義故曰能言距楊墨者亦聖人之徒也出邪則入正出正則入邪兩者之間蓋不容髮也雖未知道而能言距楊墨者巳是心術向正之人所以以聖人之徒許之與春秋討賊之意同好名之人能讓千乘之國苟非其人簟食豆羮見於色順之云此言過不及也好名之人能讓千乘之國過也苟不是這樣人簟食豆羮必見於色此不及也二者俱非也擇之云好名之人能讓千乘之國若非有德之人雖以慕名而能讓然於簟食豆羹有時却見於顔色其心本不如是故也正所謂人能碎千金之璧不能無失聲於破釡者也兩説皆通舊來只如後説然亦嘗疑其費力但前説又無甚意味耳請更商確之身不行道不行於妻子使人不以道不能行於妻子言身若不行道則妻子無所取法全無畏憚了然猶可使也若使人不以道則妻子亦不可使矣擇之如此説順之云不行於妻子百事不行不可使亦在其中不能行於妻子却只指使人一事言之順之説是事親仁之實從兄義之實蓋人之生也莫不知愛其親及其長也莫不知敬其兄此乃最𥘉一著其它皆從此充去故孟子曰無它逹之天下也有子曰君子務本本立而道生孝弟也者其為仁之本歟孟子又謂徐行後長者謂之弟疾行先長者謂之不弟堯舜之道孝弟而巳矣豈非事親仁之實從兄義之實乎仁義只是理事親從兄乃其事之實也在天為命在人為性無人言命不得無天言性亦不得但言命則主於天言性則主於人耳誠者合內外之道兼性命而為言者也誠者以下語似有病心該誠神備體用故能寂而感感而寂其寂然不動者誠也體也感而遂通者神也用也體用一源顯微無間惟心之謂歟此説甚善動而不正不可謂道用而不和不可謂德此兩句緊要在正字和字上在中之義義者理也只是這箇理在中者中也在外者和也中者性之體假和者情之體假也義字説得太重伊川本意亦似只説體假云爾和者情之體假語意未備止於至善至善乃極則擴之曰不然至善者本也萬善皆於此乎出至善乃極則思是發用之機君子為善小人為惡那事不從這上出但君子約入裏靣來小人拖出外靣去故曰思者聖功之本而吉凶之機也正當於此謹之君子所以貴愼獨也聖人定之以中正仁義而主靜所以主靜者以其本靜靜極而動動極復靜靜也者物之終始也萬物始乎靜終乎靜故聖人主靜伊川先生曰動靜無端隂陽無始若如此則倚於一偏矣動靜理均但靜字勢重耳此處更宜深玩之動靜有終始賔主方其動也動為主靜為賔及其靜也靜却為主動却為賔動極而靜則動却終靜却始靜極復動則動却始靜却終雖然方其動也靜之理未嘗不存也及其靜也動之理亦未嘗不存也擇之云此假甚好但更欠説主靜之意蒙學者之事始之之事也艮成德之事終之之事也周子之意當是如此然於此亦可見主靜之意誠敬如何分順之曰誠字體靣大敬字却用力曰伊川曰居處恭執事敬與人忠是徹上徹下語如此敬亦是聖人事曰固是畢竟將敬做誠不得到得誠則恭敬忠皆其藴也誠是實理聖人之事非專之謂也推此意則與敬字不同自分明矣聖人固未嘗不敬如堯欽明舜恭巳湯聖敬日躋是也但自是聖人之敬與賢人以下不同耳一隂一陽之謂道隂陽氣也所以隂陽道也道也者隂陽之理也此説得之致中和致極也與盡字同致中和便是盡性此説亦是然致字是功夫處有推而極之之意充之書中亦講此假然其意亦雜幸并以此示之渠又論愼獨意亦未盡大抵獨字只是耳目見聞之所不及而心獨知之之地耳若謂指心而言而不謂之心蓋恐指殺似不然也故君子愼其心是何言耶答石子重口之於味等事其當然者天理也若槩謂之理則便只成釋氏運水般柴之説不可離恐未有不可得而離之意以下文觀之可見此一節當分作兩事戒謹不暏恐懼不聞如言聽於無聲視於無形也是防於未然以全其體謹獨是察之於將然以審其幾不知高明以為如何此道無時無之然體之則合背之則離也一有離之則當此之時失此之道矣故曰不可須臾離君子所以戒謹不睹恐懼不聞則不敢以須臾離也所謂以下文觀之者如此小人間居為不善惡惡不如惡惡臭也必見君子然後著其善好善不如好好色也皆所以自欺而巳德無常師主善為師善無常主協于克一此言於天下之德無一定之師惟善是從則凡有善者皆可師也於天下之善無一定之主惟一其心則其所取者無不善矣協猶齊也如所謂協時月答石子重孝弟也者其為仁之本歟是為仁自孝弟始也仁道之大而自孝弟始者以其即愛親從兄之心習而察則仁矣然而不敢説必無犯上作亂故曰鮮其或有之以其習而不察故有子之言以人人有是心是以為仁患在不察故爾表記曰事君處其位不履其事則亂也謂違君命為亂此所謂犯上者犯顔作亂者違命也孝弟順德犯上作亂逆德論孝弟却説犯上作亂底事只為是它喚做孝弟恰似小人之中庸也小人而無忌憚也一般君子則不然先理會箇根本根本既立道自此生曷惟其巳許順之云其為人也孝弟猶是泛而論之如君子之道夫婦之愚不肖可與知可能行非不孝弟也惟知務之不如君子也然孝弟順德終是不善之心鮮矣此二説大抵求之過矣鮮只是少聖賢之言大槩寬𥙿不似今人蹙迫便説殺了此章且看伊川説深有意味我不欲人之加諸我吾亦欲無加諸人伊川解曰我不欲人之加諸我也吾亦欲無加諸人仁也施諸巳而不願亦勿施諸人恕也又語録曰施諸巳而不願亦勿施諸人正解此兩句又曰我不欲人之加諸我吾亦欲無加諸人恕也近於仁矣然未至於仁也以有欲字耳前以為仁後以為恕而未仁二義不同若以有欲字便以為未仁則我欲仁斯仁至矣亦有欲字不知如何二先生説經如此不同處亦多或是時有先後或是差斘當以義理隱度而取捨之如此説則當以解為正蓋其義理最長而亦先生晚年所自著尤可信也欲仁之欲與欲無加諸我之欲文意不同不可以相比更推詳之君子所貴乎道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣明道曰動容貌周旋中禮暴慢斯逺正顔色則不妄斯近信矣出辭氣正由中出斯逺鄙倍此動容貌正顔色出辭氣皆不著力是成德之事斯逺暴慢斯近信逺鄙倍猶云便逺暴慢便近信便逺鄙倍自然如此也伊川曰辭氣之出不使至於鄙倍却是就逺字上用工上蔡云動也正也出也君子自牧處又曰緊要在上三字説不同如何熹詳此意當以明道之説為正上蔡之説尤有病克齋記説天下歸仁處先本云天下之人亦將無不以仁歸之後本云視天下無一物不在吾生物氣象之中先後意甚異畢竟天下歸仁當如何説𥘉意伊川説後覺未穩改之如此乃吕博士説恐當以後説為正蓋所謂伊川説亦止見於外書雜説中容或未必然也克齋記不取知覺言仁之説似以愛之説為主近子細玩味似若知覺亦不可去蓋不知覺則亦必不愛惟知覺故能愛知覺與愛並行而不相悖恐亦無害於言仁但不可專以知覺為仁耳醫者以四支頑痺為不仁頑痺則不知痛癢又安能愛更乞開發此義近與湖南諸公論之甚詳今略録一二上呈亦可見大意矣一答胡廣仲書仁之説一答張敬夫書答石子重所疑荷批誨今皆巳釋然蓋仁者心有知覺謂知覺為仁則不可知覺却屬智也理一而分殊愛有差等殊與差等品節之却屬禮施之無不得宜却屬義義也禮也智也皆仁也惟仁可以包夫三者然所以得名各有界分須索分别不然混雜為一孰為仁孰為義孰為智仁字之説甚善要之須將仁義禮智作一處看交相參照方見疆界分明而疆界分明之中却自有貫通總攝處是乃所謂仁包四者之實也近年學者專説仁字而於三者不復致思所以含胡溟澲動以仁包四者為言而實不識其所以包四者之果何物也今得尊兄精思明辨如此學者益有賴矣幸甚閩縣儒學教諭王製校晦庵先生朱文公文集卷第四十二
