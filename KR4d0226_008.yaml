body:
  text: 詩買船至演平拜建康劉公墓下遂入城假館梅山堂感涕有作維舟新曆口步上秣陵阡高丘忽嵯峨宿草迷荒煙拜起淚再滴哀哉不能言驅車旦復東借此虛堂眠念昔堂中人經營幾何年一旦舍之去千秋不言還露井益清泄風林更修鮮思公獨不見涕下如奔川感慨西州門愴悢山陽篇晤嘆日隱樹悲歌月當軒堂堂忠孝心終古諒弗諼尚與吳門子歸來故山巔晚雨涼甚偶得小詩請問遊山之日并請劉平父作主人二首幾年不踏仙洲路夢入青藤古木間好趂新秋一畨雨晝寒亭下弄潺湲廬阜歸來秪短笻解包茶茗粗能供若須載酒邀賔客付與屏山七老翁宿密菴分韻賦詩得衣字不到仙洲歲月移携壺特地欵巖扉巳驚素雪清人骨更喜蒼煙染客衣新賞不妨頻徙倚舊題何事獨噓嚱明朝驛騎黃塵裏莫待迷塗始賦歸讀子厚步月詩時方聞吕伯恭訃後數日賦此晚步曲池上西風吹我裳仰觀天宇闊愛此明月光念我素心人眇焉天一方沒者永乖隔存者為參商飄零百歲期寂寞幽鬢霜還坐三太息高林鬱蒼蒼次子厚秋懷韻秋風何方來為我滌殘暑庭梧亦何與索索終夜雨冥思感物變念此離索苦浩蕩信莫量幽紛那得覩丁年舍我去憔悴故其所廓落濟時心頽然復安取永懷平生友夢想見眉宇今晨枉秀句爛若朝霞舉去去同采芝高軒坐凝佇黎嶺西南水石佳處不減廬阜戲呈子厚谷深石瘦水潺潺便是楞伽折桂間珍重下邳圯上客一年幾度到廬山讀子厚詩卷用其卒章晨起之韻作詩寄之晝永倦殘暑宵分喜新涼天雞一振翼爛爛曉月光病榻感虛徐中庭起翶翔懷哉榖城子物外久不忙掩抑琴調希激烈歌聲長契闊恨清賞佳期未渠央緘詞託歸鳥側佇何能忘登廬峰二首循澗躋危磴披雲得勝遊蓬茅增舊葺竹樹喜新稠夢想三秋别徘徊十日留餘年端可料此地欲長休佳友紛來集欣然會宿心風泉陪徙倚雲月共窺臨雅唱情俱勝微言思獨深兹遊非逸豫邂逅得良針蘆峰次韻澗水流千仞巖姿起萬般扶藜雖有興駐屐諒難安好客能同趣羣峰肯縱觀蒼茫却無際誰與話愁端次瑞泉詩韻興懷來賞趣對景却忘言偶與同遊客行逢幽澗原淺泓排積腐暗竇溢流渾終待寒泉食無憂水鏡昏五禽言和王仲衡尚書提胡蘆沽美酒春風浩蕩吹花柳不用沙頭雙玉瓶鳥歌蝶舞為君壽祗今醉是君恩昨日之愁愁殺人不如歸去孤城越絶三春暮故山只在白雲間望極雲深不知處不如歸去不如歸千仭岡頭一振衣泥滑滑泥滑滑秦望雲荒鏡湖闊緑秧刺水水拍堤牙旗畫舸凌風發使君行樂三江頭泥滑水深君莫憂脫袴脫袴桑葉隂隂墻下路回頭忽憶舍中妻去年巳逐它人去舊袴脫了却不辭新袴知教阿誰做麥熟吟去年種麥有德音秪今種熟誰快活種者已卧官墻隂仁公有政惠存殁肯使催租更隳突酬黃子厚見訪歸途惠詩韻櫪驥倦千里籠鶴思九臯念昔田舍日不知山林高一朝逢世紛故丘得濳逃平生棲遁志兹焉始堅牢故人榖城翁高情北窗陶亦復喜我歸巾車𣢾林巢申旦更離闊中情重忉忉遊密菴分韻賦詩得清字誤落塵中歲序驚歸來猶幸此身輕便將舊友尋山去更喜新詩取意成暖翠乍看渾欲滴寒流重聽不勝清箇中有趣無人會琴罷尊空月四更遊密菴得空字欲覔仙洲路須乘萬里風飮泉雲出岫卧嶺月流空永夜渾無寐悲歌莫與同起來殘樹影清絶小樓東昨為許進之書胎仙字因以名其室或疑欠舞字者故作此以解之寒山寒月冷颼颼隻影孤桐萬里遊帝樂夢回三疊逺胎仙舞罷一簾秋未愁悄寂無人會只恐蹁躚不自休却笑蕊珠何處所兩忘蝴蝶與莊周正月五日欲用斜川故事結客載酒過伯休新居風雨不果二月五日始克踐約坐間以陶公卒章二十字分韻熹得中字賦呈諸同遊者玄景雕暮節青陽變暄風忽尋斜川句感此勝日逢駕言當出遊一寫浩蕩胸雲物疑異候凄迷久連空今朝復何朝頓覺芳景融疇曩庶復踐鄰曲歡來同伊雅一籃輿連翩數枝笻緑野生逺思清川照衰容遙瞻西山足突兀彌畒宫庭宇豁清曠林園鬱青蔥於焉一逍遙芳樽間鳴桐既爵日樹隱班荆汀草豐纎鱗動微波新荑冠幽叢惆悵景易晏徘徊思無窮願書今日懷逺寄柴桑翁仰止固窮節愧兹百年中次吕季克東堂九詠野塘小隱傳得希夷九卦圖歸來不復夢榮途野塘竟日無人到讀盡床頭種樹書敬義堂高臺巨榜意何如住此知非小丈夫浩氣擴充無內外肯誇心月夜同孤方拙寮一室歸來萬事新窗間橫竹挂朝紳九流未讓圜機士四海寧慙巧宦人吟哦室蒲團竹几睡瞢騰客問君今幾折肱身世兩忘無可答起尋詩句繞階行愛蓮聞道移根玉井旁開花十丈是尋常月明露冷無人見獨為先生引興長月臺臺上無人伴苦吟歸鴉過盡日西沉須臾玉匣開塵鏡却有孤光共此心菜畦雨餘菜甲翠光勻𣏌菊成畦亦自春骨相定知非食肉可能長伴箇中人海裳屏蜀樹成行翠作圍花開時節更芳菲主人夢亦尋春去栩栩深穿錦障飛橘堤君家池上幾時栽千樹玲瓏亦富哉荷盡菊殘秋欲老一年佳處眼中來挽吳給事三首臺省傾群望江湖去一麾語聞三諫切政有百年思不盡雲龍會還尋霧豹期誰知七休詠翻入八哀詩粵自辭神武超然絶世紛前身疏太傅今日范忠文圃樹寒留月湖波冷浸雲懸知千載下此地想遺芬憶昔觀風寄登堂識老成忘年見交態把酒話詩情别去如三歲書來忽九京却思憑檻語忍遽勒公銘伏讀雲臺壁間祕閣郎中盤谷傅丈題詩齒及賤名追懷曩昔不勝感涕輒次元韻呈諸同遊計亦同此歎也提携當日沗忘年曽向瑕丘獨請前喜看玄雲生素壁恍疑後學厠先賢公遊汗漫今何許我病摧頽久自憐只有空山無歲月倚天寒木但蒼然是日景仁景𥘉二兄行視卜宅亦宿山間謹并録呈尤劇悲愴耳次韻寄題萬頃寒光奉呈休齋先生間將歲月老煙汀更遣詩情到杳冥遊子故應悲舊國壯懷那肯泣新亭一官避世今頭白萬卷收功久汗青但見潮生與潮落不知沉醉又還醒熹伏蒙休齋先生惠詩見留謹次高韻二首忽驚蕭颯鬢毛秋起向泉山覔舊遊盤谷門前淚沾臆雲臺溪上雪蒙頭歸歟吾黨又千里老矣心期但一丘珍重休齋書滿屋可無三宿為君留望望西山日幾回更憐一雨洗浮埃逺遊莫説雲門寺往事聊尋單父臺雞犬蕭踈迷洞口交親零落半巖隈尊前見在君須鬪速上籃輿相逐來用林擇之韻别陳休齋别離不覺歲時侵兩地相望共此心今日還成一尊酒它年應記百篇吟傷情後會無期定握手交情有舊深多謝晚風知此意不催寒日下踈林奉酬九日東峰道人溥公見贈之作幾年回首夢雲關此日重來兩鬢斑點檢梁間新歲月招呼臺上舊溪山三生漫説終無據萬法由來本自間一笑支郎又相惱新詩不落語言間和林擇之鳯凰山韻木落髻鬟擁湖平粧鏡空荒亡餘舊事慘淡只悲風興發千山裏詩成一笑中諸君莫惆悵吾道固當窮次林擇之涼峰韻解轡林間寺歸鴉晚欲盤望中嵐翠合愁外夕陽殘尊酒何妨盡羇心且自寬無端滿窗月遙夜不勝寒熹去溫陵二十七年而復來顯菴益老見候七里亭又以佳句見招而休齋陳丈寺丞黃丈皆屬和焉因次韻奉酬併呈二丈不因辭吏役那得解天刑故國重來逺寒山依舊青興懷感陳迹舉目愴新亭尚喜灣頭老禪房許扣扄答黃叔張日君趨玉陛抗疏肅邦刑便有榮褒衮無勞涕伏青衆流爭靡靡一柱獨亭亭只恐追鋒急那容晝掩扄次韻陳休齋蓮華峰之作八石天開勢絶攀算來未似此心頑巳吞繚白縈青外依舊箇中雲夢寬次黃叔張宿涼峰韻菡蓞含跗天外秀婆娑散影月中孤惜無畫手追前輩寫就涼峰憩寂圖至鳯凰山再作門前寒水青銅闕林外晴峰紫帽孤記得南垞通桞浪依稀全是輞川圖見梅用攀字韻年來羞把玉梅攀萬樹爭春我獨頑只有顛狂無告訴詩腸欲斷酒腸寬次韻陳休齋懷古堂平昔塵編裏心期本自幽那堪舊泉石更作此追遊好句看猶在遺忠愴巳休亦知今日意不逐大江流寄題九日山廓然亭昨遊九日山散髮巖上石仰看天宇近俯歎塵境窄歸來今幾時夢想挂蒼壁聞公結茅地恍復記疇昔年隨流水逝事與浮雲失了知廓然處初不從外得遙憐植杖翁鶴骨雙眼碧永嘯月明中秋風桂花白用林擇之韻呈陳福公昔公秉鈞衡金玉我王度中年幾湖海偃息安國步巋然九鼎重翩若孤雲去俯仰天地間誰哉此同趣用前韻答方直甫小儒談大方任意略權度未行要疾走踉蹡不成步唯應過量人不作與麼去請君敞書帷為我説歸趣用前韻答林史君十年劇傾馳此日際風度胡然龔黃最未接夔龍步詩成肯遽休客醉那得去却恐驛書來湖山適成趣題君子亭清晨坐武觀涼風動高旌挾弓一笑起屈此四座英破的亦巳屢穿楊詎云精軍吏不敢賀高鳥時相驚解韛脫決遂緩帶飄華纓俯仰新亭幽曠然塵慮清內正外自直三揖奚所爭端居得深玩君子非虛名伏承侍郎使君垂示所與少傅國公唱酬西湖佳句謹次高韻聊發一笑二首百年地闢有竒功創見猶驚鶴髮翁共喜安車迎國老更傳佳句走郵童間來且看潮頭入樂事寧憂酒􅊦空會見台星與卿月交光齊照廣寒宮越王城下水融融此樂從今與衆同滿眼芰荷方永日轉頭禾黍便西風湖光盡處天容闊潮信來時海氣通酬唱不誇風物好一心憂國願年豐伏承子直都督侍郎臨餞逺郊仍邀嚴州郎中及諸名勝相與燕集分韻賦詩熹得時字輒成鄙句芳歲倐云晏故山風雪時胡為在中路復此行遲遲為有賢主人愛客情依依昨夕西門道終宴不能辭今朝復何朝祖帳遙相追賔從俱俊賢車馬有光輝敞扉得華觀俯檻臨清池南州淑氣多蕩節佳景隨雪樹雖改色青山正含姿朱氏園外谷中有梅近百株是日花落巳盡開樽酌春醪授簡哦新詩但覺四坐歡不知寸晷移流雲暗寒空蒼煙染人衣相看暮色至我去公當歸别袖不忍分扣扣陳苦詞願公崇令德慰我渴與飢臘月九日晚發懷安公父教授夀翁知丞載酒為別而元禮景嵩子木擇之廷老考叔舜民諸賢相與同舟乘便風頃刻數十里江空月明飲酒樂甚因以星垂平野闊月湧大江流分韻熹得星字醉中别去乃得數語略紀一時之勝云挂帆望煙渚整棹別津亭風水巳云便我行安得停離樽枉羣賢濁醪愧先傾二公厨船未至先飮舟中餘尊談笑不知逺但覺江流清江水上流接建劍溪潮所不及水益清駛獵獵井蔗洲茫茫白沙汀斯須復回首秪有遙山青井蔗白沙兩地名相去十許里頃刻而過野色一以暝川光皛孤明中流漾華月極浦涵踈星酒酣客散歸茫然獨宵征起視天宇闊此身一浮萍難追五湖遊未願三閭醒且詠招隱作孤舟轉竛竮伏蒙制置閣學侍郎示及致政少傅相公送行長句并得竊窺酬和佳篇伏讀之餘不勝慰幸謹次高韻少見愚悃以餞車塵伏惟采矚二首公子威名動海濵四年相與愧情親忽聞黃鉞分全蜀更祝彤庭列九賔公以上章請對執手便驚成契闊贈言還喜和陽春政成但祝歸來早别恨無端莫重陳地兼梁益盛中權自昔疇咨出萬全定喜封章來活國故煩伏軾去籌邊公去嵗嘗有密疏上賜手札褒諭軍民傳詔歡聲溢婦女迎門巧笑妍要答君恩與人望可無清教逮初筵諸葛武侯初領益州牧發教與羣下曰夫參署者集衆思廣忠益也若逺小嫌難相違覆曠闕損矣違覆而得中猶棄敝蹻而獲珠玉然人心若不能盡惟徐元直處兹不惑又董幼宰參署七年事有不至至于十反來相啓告苟能慕元直之十一幼宰之勤渠有忠於國則亮可以少過矣又曰昔初交州平屢聞得失後交元直勤見啓告前參事於幼宰每言必盡後從事於偉度數有諫止雖資性鄙暗不能盡納然與四子終始好合亦足以明其不疑於直言矣伏讀致政少傅相公送趙成都佳句兩篇不勝慰幸巳次高韻并餞其行而再賦此章以見區區瞻仰之意繕録拜呈伏乞采覽二首歸來寂莫卧漳濵夢想威容阻再親緑野遙聞花欲語赤書還喜鴈來賔間中有句人爭誦妙處無心物自春行馬不因吾輩設胸竒猶得話陳陳一旦高辭將相權身名從此慶雙全人誇迹巳風塵外誰道心遊日月邊未許前賢專晚節更將餘事發春妍君王若要詢黃髮便好臨雍促肆筵送彥集之官瀏陽急景雕暮節高風振空林病夫掩關卧長謡擁孤衾聞君千里行四牡方駸駸重此别離感青天欲愁隂君行豈不勞民瘼亦巳深催科處處急椎鑿年年侵君行寬彼氓足以慰我心薦書會滿篋社酒還同斟所念家同産與君如瑟琴兹焉不並駕宰木寒蕭槮尚喜吾諸甥男恭女知欽明朝復相憶悵望楚山岑次劉正之芙蓉韻三首淺緑深紅出短籬望中都是可憐枝要看亂颭寒塘水更待金風滿意吹凌波直欲渡橫塘却愛無人獨自芳且倚新漪間照影更憑女伴一扶將微吟澤畔幾扶笻自笑摧頽一秃翁羞見芙蓉好顔色且憑詩律傲西風晦庵先生朱文公文集卷第八考異晚雨涼甚賔客一作賔去付與一作分付吟哦室兩忘一作相忘休齊惠詩次韻忽驚蕭颯一作還家不覺老矣一作老去珍重一作見説三宿一作三日望望一作悵望逺遊一作勝遊蕭踈迷一作荒涼悲見在一作有酒速上一作好上逐來一作趂來至鳯凰山再作銅闕一作銅闊次韻懷古堂巳休一作未休竒題廓然亭俯歎一作俯視周擇之韻呈福公誰哉一作懷哉次韻芙蓉扶笻一作枝笻福州府學訓導舒鏊校晦菴先生朱文公文别集卷第八雜著釋氏論上建安吳應槱家藏湯東潤跋或問孟子言盡心知性存心養性而釋氏之學亦以識心見性為本其道豈不亦有偶同者耶朱子曰儒佛之所以不同正以是一言耳曰何也曰性也者天之所以命乎人而具乎心者也情也者性之所以應乎物而出乎心者也心也者人之所以主乎身而以統性情者也故仁義禮智者性也而心之所以為體也惻隱羞惡恭敬辭讓者情也而心之所以為用也蓋所謂􅑙衷于民有物有則者儒也故其所以盡心知性者以其窮理而極乎心之所之所有者無不識也所謂養性巳而不失其夲則性是則情之所發亦無不正而可以應物餘矣性不見其分别給之與其指者實在精神魂魄之聚而吾儒所謂形而下者耳至其所以識心者則必别立一心以識此心而其所謂見性者又未嘗睹夫民之衷物之則也既不睹夫性之本然則物之所感情之所發皆不得其道理於是槩以為巳纍而盡絶之雖至於反易天常殄滅人理而不顧也然則儒術之所以異其本豈不在此一言之間乎曰釋氏之不得為見性則聞命矣至於心則吾曰盡之存之而彼曰識之何以不同而又何以見其别立一心耶曰心也者人之所以主於身而統性情者也一而不二者也為主而不為客者也命物而不命於物者也惟其理有未窮而物或蔽之故其明有所不照私有未克而物或纍之故其體有所不存是以聖人之教使人窮理以極其量之所包勝私以去其體之所害是其所以盡心而存心者雖其用力有所不同然皆因其一者以應夫萬因其主者以待夫客因其命物者以命夫物而未嘗曰反而識乎此心存乎此心也若釋氏之云識心則必收視反聽以求識其體於恍惚之中如人以目視目以口齕口雖無可得之理其勢必不能不相汝爾於其間也此非别立一心而何哉夫别立一心則一者二而主者客分矣而又塊然自守滅情廢事以自棄君臣父子之間則心之用亦息矣夫所指以為心性與其所以從事焉者乃如此然則不謂之異端耶説而何哉曰然則其徒蓋有實能恍然若有所睹而樂之不厭至於遺外形骸而死生之變不足動之者此又何邪曰是其心之用既不交於外矣而其體之分於內者乃自相同而不舍焉其志專而切其機危而迫是以精神之極而一旦惘然若有失也近世所謂看心之法又其所以至此之捷徑蓋皆原於莊周承蜩削鐻之論而又加巧密焉爾然昧於天理而特為是以自私焉則亦何足稱於君子之門哉釋氏論下或問子之言釋氏之術原於莊子承蜩削鐻之論其有稽乎朱子曰何獨此哉凡彼言之精者皆竊取莊列之説以為之宋景文公於唐書李蔚等傳既言之矣蓋佛之所生去中國絶逺其書來者文字音讀皆纍數譯而後通而其所謂禪者則又出於口耳之傳而無文字之可據以故人人得竄其説以附益之而不復有所考驗今其所以或可見者獨賴其割裂裝綴之迹猶有隱然於文字之間而不可掩者耳蓋凡佛之書其始來者如四十二章遺教法華金剛光明之類其所言者不過清虛緣業之論神通變見之術而巳及其中間為其學者如惠逺僧肇之流乃始稍竊莊列之言以相之然尚未敢正以為出於佛之口也及其久而恥於假借則遂顯然篡取其意而文以浮屠之言如楞嚴所謂自聞即莊子之意而貟覺所謂四大各離今者妄身當在何處即列子所謂精神入其門骨骸反其根我尚何存者也凡若此類不可勝舉然其説皆萃於書首其無以繼之然後佛之本真乃如結壇誦呪二十五輪之類以至於大力金剛吉盤茶鬼之屬則其粗鄙俗惡之狀校之首章重玄極妙之指蓋水火之不相入矣至於禪者之言則其始也蓋亦出於晉宋清談論議之餘習而稍務反求靜養以默證之或能頗出神怪以衒流俗而巳如一葉五花之讖隻履西歸之説雖未必實有是事然亦可見當時所尚者止於如此也其後傳之既久聰明才智之士或頗出於其間而自覺其陋於是更出巳意益求前人之所不及者以隂佐之而盡諱其怪幻鄙俚之談於是其説一旦超然真若出乎道德性命之上而惑之者遂以為果非堯舜周孔之所能及矣然其虛夸詭譎之情險巧儇浮之態展轉相高日以益甚則又反不若其𥘉清虛靜默之説猶為彼善於此也以是觀之則凡釋氏之夲末真偽可知而其所竊豈獨承蜩削鐻之一言而巳哉且又有一説焉夫佛書本皆胡語譯而通之則或以數字為中國之一字或以一字而為中國之數字而今其所謂偈者句齊字偶了無餘欠至於所謂二十八祖傳法之所為者則又頗協中國音韻或用唐詩聲律自其唐之稍黠如惠洪輩者則巳能知其謬而強為説以文之顧服衣冠通今古號為士大夫如楊大年蘇子由者反不悟而筆之於書也嗚呼以是推之則亦不必問其理之是非而其增加之偽迹狀明白益無所逃矣宋公之論信而有證世之惑者於此其亦可以少悟也哉陳請釋奠申禮部檢狀見臨漳語録伏覩淳熙六年尚書禮部頒降淳熙編類祭祀儀式內有合行申請事件須至申聞一神位某近得禮部侍郎王普所著釋奠儀式考其位次爵號皆與此本不同大抵此圖自東而西兩兩相對而王氏本自東序一至五次西序一至五又次東廊一至卅六又次西廊一至卅五次西廊泗水侯孔鯉次東廊沂水侯孔伋遂連中都伯左丘明以下至賈逵又次西廊杜子春以下至王安石詳此次序固不如今圖之善但此圖十哲次序亦有小誤蓋以論語考之當以閔損為第一在東序冉耕為第二在西序冉雍為第三在東序宰豫為第四在西序端木賜為第五在東序仲由為第六在西序冉求為第七在東序言偃為第八在西序卜啇為第九在東序曾參為第十在西序今乃以冉雍為第一閔損為第三冉求為第六仲由為第七則亦誤矣又其爵號王氏本費公為琅琊公鄭公為東平公薛公為下邳公齊公為臨淄公黎公為黎陽公徐公為彭城公衛公為河內公吳公為丹陽公魏公為河東公成侯為武成侯未知孰是又按國朝會要政和間沂水侯與泗水侯俱封仍同從祀則王氏本為得之而此圖獨闕泗水委是脫誤其左丘明以下當從此圖兩兩相對但左丘明當在西廊對孔伋而荀况以下當在東廊公羊髙以下當左西廊兩兩相對與此相反乃為得之耳伏乞更賜詳考改正行下一祭器並依聶崇義之禮圖樣式某伏見政和年中議禮局鑄造祭器皆考三代器物遺法制度精密氣象淳古足見一時文物之盛可以為後世法故紹興十五年曾有聖旨以其樣制開説印造頒付州縣遵用今州縣既無此本而所頒􅑙儀式印本尚仍聶氏舊圖之陋恐未為得欲乞行下所屬别行圖畫鏤板頒行令州縣依凖製造其用銅者許以鉛錫雜鑄收還舊本悉行毁棄更不行用一釋奠時日注云仲春上丁仲秋下丁某檢凖紹興乾道淳熙令並云二月八月上丁釋奠文宣王即無下丁之文又嘗竊見五禮申明册內有當時州郡申請禮局巳改下丁為上丁訖其後又見故敷文閣待制薛弼任杭州教授日所申今到本州檢尋頒􅑙舊本却無此條恐是前後節次頒􅑙致有漏落將來如蒙别行鏤板即乞先於儀內改下丁作上丁字仍檢申明册內備録此條全文附載篇末以證元夲之失仍下州郡有舊本處並行批鑿改正庶使州縣奉行有所依據一元本陳設條內著尊四犧尊四著當作犧當作象今來頒降新本巳行改正而政和年中頒􅑙舊本尚仍其舊州縣奉行不無疑惑將來如蒙别行鏤板即乞附載後來改正因依於篇後或只將某此狀全文附載仍下州郡合將舊本批鑿庶幾明白不至疑誤一釋莫儀舊本鄒國公下並有舒王字今巳刪去而不著其所以然者亦與舊本抵牾將來如蒙别行鏤板即乞檢會靖康年中罷王安石配享先聖章疏指揮並行附載仍下州郡並將舊本批鑿啓回余衡州秀實衡州之孫師魯家藏賦祿真祠方遂燕居之適承流巨屏莫回成命之頒顧修問之未遑辱移書之先及恭惟某官受材宏偉涵德粹溫問學有原盡得傳家之奧要文詞甚蔚坐觀作者之典刑盍升臺閣之聮猶屈江湖之守方慕先賢之治益觀美化之成鈴閣少留姑慰逺民之意璽書亟下遂還近侍之班某久仰英猷未諧良覿同寅有望儻分南服之憂歸賦可期即返東臯之樂回王正臣見大同集伏念行能無取藝業不修學不足以見古人之用心徒極鑽研之力仕不足以行平日之所志第勞刀筆之間至於典禮義文學之官首誦説講論之事聖言高逺雖莫究於指歸絶業光明庶有開於來者過勤厚意貺以華箋仰褒飾之過冝顧省循而何有謹奉啓上謝回衆解元以下見南康集竊審待問澤宫登名天府方幸究宣於明詔敢期誤枉於華箋披味以還感藏難喻解元先輩學推庠序行著州閭出膺續食之求足為勸駕之重顧念朝家設科以取士本務得賢然而學者挾䇿以讀書但期干祿伊欲一新於敝俗不能無望於群公輒誦淺聞少酬盛禮惟窮理修身之要當有志於古人則尊主庇民之功庶無慚於當世回待輔生竊審待問澤宫登名槐市方幸究宣於明詔敢期誤枉於華箋披味以還感藏難喻然朝家建學養士之意正為育材而諸生辭家射䇿之心但期干祿伊欲一新於敝俗不能無望於群公輒誦淺聞少酬盛禮惟古人為巳之志當有餘師則大學新民之功庶無違教晦庵先生朱文公文别集卷第八候官縣儒學訓導劉簮校晦庵先生朱文公續集卷第八答折憲名知常示及先正樞密端明少師家傳一通拜受伏讀得以仰窺精忠壯烈始終大致少慰生平尊慕鄉往之心甚大幸也顧又重勤台喻必使次輯以記埏道之碑則區區所以不敢僣易以承嘉命者巳悉具前書矣今雖鐫戒益勤孝思愈切然在某私計利害之實則不能有加於前也伏惟矜憐反復前説而改圖之使得免於不韙之罪衆多之怨則某不勝千萬之幸與黃知府輒有不獲巳之懇事涉鄉閭利病勢甚迫切敢忘分守巳具公劄干冒公聽幸賜采覽斟酌行下千萬幸甚前日迎候之初便蒙誨諭仰見仁人之心視斯人之不獲真不啻若癢疴疾痛之切其身竊意樂聞斯言不以為罪是以敢布其愚撥米曲折固知仁民之切無所吝於此况又使府自認腳費此尤出於望外下邑飢民荷更生之賜感戴宜如何耶儲宰行巳數日縣郭近封可保無虞但崇化麻沙以西一帶素少早田唐石乃全無之只此數十里間尚爾嗸嗸私居杜門亦不知其詳細為如何聞有臺劾亦既施行而未有𬒳受亦未見章疏遣書著銜頗有所礙幸辱情照或章疏巳報行得賜指撝録示為幸昨蒙垂示報狀極荷眷念區區尋亦巳拜恩命矣罪戾彰徹固不可逃然縣宰批罷一事至乃上玷清重尤切愧恐而不敢自明竊計髙明固巳洞照其實矣至於友生連坐亦蒙矜念委曲周至益見仁人之用心為不可及感歎亡巳但既鐫罷名書罪籍不知寄祿餘俸合與不合幫勘巳戒幹人計會所司更乞台旨稽考法令然後施行恐不應得免貽後日之紛紛也答江清卿蒙喻湖北書極荷不外但年來藏拙不敢復與外事又伯升書言周憲於麟之自有薦論之意而麟之不欲為自衒鬻者此意皆甚美竊謂寧少忍之以遂麟之之髙不當共為喣濡之態以虧其一簣之功也先夫人髙識懿行冝得當世大賢紀述以詔後世而尊兄過聽誤以見屬自顧淺陋何以稱此然以委重之勤慕仰之素勉竭其愚以承尊命謹繕寫納呈幸賜裁訂而取舍之乃所願望即不可用不必過存形迹以纍先德之美也向來所苦何疾今想巳脫然矣細觀妙畫知目疾之向平為可喜也然中年氣血非前日之比服藥亦難見效惟有虗心調氣靜以飬之庶或少可輔助耳答滕誠夫部綱之役不辭而行甚善甚善親闈慈念固當眷戀然亦可更以王事靡盬之義反復寬譬乃為兩全也與葉彥忠易傳且留是正不妨易自伏羲始畫八卦三畫文王重為六十四六畫作繫卦彖辭周公作繫爻辭孔子作彖乃釋文王之彖通謂之彖象文言繫辭説卦序卦雜卦而彖象繫辭各分上下是為十翼舊説如此承問及之示喻為學有緒尤以為慰且只如此用功旦夕相見却得靣論也大學近修得稍平正前本亦不能無所偏耳詩傳兩本煩為以新本校舊本其不同者依新本改正有𥿄卅副在內恐要帖換也校時須兩人對看一聽一讀乃佳著旬日功夫當可畢也答李伯諌某陸陸如昨無可言者兩月來修得數書亦有一二論説文字甚思與老兄評之而相望邈然又無人抄得徒此欎欎想聞之亦不無歎恨也比來觀書進學誘掖後進次第如何深所欲聞因書詳及之為幸通鑑綱目三國以後草藁之屬臨行忘記説及今想隨行有的便旋付及幸甚唐事巳了但欲東漢之末接三國修之庶幾有緒易為力耳然伯起者亦尚悠悠近遊誠之伯鈞之子相過開爽可喜渠南北事甚熟或取過伯起者託渠料理也某碌碌之况巳具前書通鑑文字近方得暇修得數卷南北朝者伯起不承當巳託元善矣度渠必能成之但見修者巳殊費功夫蓋舊看正史不熟倉卒無討頭處計今秋可了見到者餘者望早付及此間杜門山中尚不能免賔客書問之擾想官下少暇也壁記巳在前書中但齋記未成耳惡扎不堪用不若别託善書者書之也周翰書詞傾倒相與甚至恨未識靣耳子禮兄金渠巳認還七月以後息錢矣但書肆狼狽日甚深用負愧要之此等自非吾曹所當為冝其至此但恨收拾得又不好愈使人意不滿耳楊州書巳别付遞去彼此各是破戒甚覺難措辭也此事長沙必能為辨吾人徒自擾擾未必有益第好笑耳因書亦當督之也通鑑諸書全不得下功前此却修得晉事粗定條例因事參考亦頗詳密但晉事最末兩三卷未到故前書奉速今承喻巳寄少輿處必是少輿遺下不曽送來也此亦不難俟卒成之耳宋以後事分屬張元善巳修得大字數卷來尚未得點勘若得年歲間無出入有人抄寫此甚不難了但恐不得如人意耳六象似亦送少輿不知何故未到俟别摹去近得曲江濂溪象比舊傳南安本殊丰厚精彩亦當改正也讀易想有味有可論者便中語及為幸欽夫此數時常得書論述甚多言仁及江西所刋太極解蓋屢勸其收起印板似未甚以為然不能深論也大抵近日議論語孟解巳見一二篇雖無鄉時過髙之失而寬縱草率絶難點檢不知何故如此無由相見殊使人憂之長沙書來説又分門編本朝事及作論篤一書雖盜跖之言有可取者亦載其中不知作此等文字是何意思使人都理會不下因書蓋略諷之不知又以為然否也書肆之敗始謀不臧理必至此無可言者既敗之後紛紛口語互相排擊更不可理會幸巳自脫去不能復問晦伯必自報去某於此却似放得下但焉謖未易根究耳一笑所示近文甚佳但似太髙不著題大凡立言要須因人變化而無包含不盡處乃為善言耳向見欽夫文字病痛正是如此也近有文字數篇及與伯恭問答數條偶當入城未能寄往少懇欲煩為尋訪龎安常難經説及聞别有論醫文字頗多得并為訪問傳得一本示及為幸答趙景昭減稅文字不知巳遣行未今再遣此人去漕司取申省狀恐未遣可就付也今日風色甚佳而情思益憒憒臨風永歎不知所言答毛朋夀向見季通説甚俊敏更能勉力操修以世家學為佳耳大學文字季通者尚未為定本旦夕當取來更為改正乃可傳也場屋之文固知賢者未能免俗然先有以立乎其大者然後出而應之則得失榮枯不能為吾纍矣不識髙明以為如何就輔逺行為榮親計此意甚美然古人亦有所謂不以得於外者為親榮者亦不可不知也答馬竒之椅獨至至字疑某衰晚疾病待盡朝夕無足言者細讀來示備詳别後進學不倦之意世間萬事須臾變滅不足置􅎍中惟有致知力行修身俟死為究竟法耳余正父博學強志亦不易得禮書中間啇量多未合處近方見其成編比舊無甚改易所謂獨至無助者誠然然渠亦豈容它人之助也此間所集諸家雜説未能如彼之好然儀禮正經假落注疏却差明白但功力頗多而衰病耗昏朋友星散不能得了耳啇伯時時得書講論精密誠可嘉尚李敬子堅苦有志尤不易得近與諸人皆巳歸只有建昌二吕在此蚤晚講論粗有條理足慰岑寂也與王撫州阮字南卿南北形象雖在逺方無由究悉然大槩亦可意料目前固非危機交急之時其為長慮郤顧亦豈一無可施設者竊計方規素定其所區畫必有次第幸蒙見告乃荷不鄙也某今年公私之年皆七十矣疾病益衰氣痞滿腹足弱筋攣不能轉動跬步之間亦須人扶乃能自致間廢之餘固無職事可效但尚忝階官義當納祿又不敢自通箋奏懇求州郡纍月僅得一申省狀方此發去而聞臺評巳及此事其間詞語不無深意矣未知所請竟復如何然幸巳少伸巳志即此外一切不復計也老兄氣體從來清健今尚只如舊時否宣布之餘何以為樂想見彎弓盤馬橫槊賦詩正自不減當年湖海之氣也此人趙雯相隨頗久今因其省親江淮間附此問訊其人恐有可驅使處得隸戲下幸甚與長子受之早晚授業請益隨衆例不得怠慢日間思索有疑用册子隨手劄記候見質問不得放過所聞誨語歸安下處思省要切之言逐日劄記歸日要看見好文字亦録取歸來不得自擅出入與人往還初到問先生有合見者見之不令見則不必往人來相見亦啓稟然後往報之此外不得出入一步居處須是居敬不得倨肆惰慢言語須要諦當不得戲笑喧譁凡事謙恭不得尚氣凌人自取恥辱不得飲酒荒思廢業亦恐言語差錯失巳忤人尤當深戒不可言人過惡及説人家長短是非有來告者亦勿酬答於先生之前尤不可説同學之短交遊之間尤當審擇雖是同學亦不可無親疏之辨此皆當請於先生聽其所教大凡敦厚忠信能攻吾過者益友也其諂諛輕薄傲慢褻狎導人為惡者損友也推此求之亦自合見得五七分更問以審之百無所失矣但恐志趣卑凡不能克巳從善則益者不期疏而日逺損者不期近而日親此須痛加檢點而矯革之不可荏苒漸習自趍小人之域如此則雖有賢師長亦無救拔自家處矣見人嘉言善行則敬慕而紀録之見人好文字勝巳者則借來熟看或傳録之而咨問之思與之齊而後巳不拘長少惟善是取以上數條切冝謹守其所未及亦可據此推廣大抵只是勤謹二字循之而上有無限好事吾雖未敢言而竊為汝願之反之而下有無限不好事吾雖不欲言而未免為汝憂之也蓋汝若好學在家足可讀書作文講明義理不待逺離膝下千里從師汝既不能如此即是自不好學巳無可望之理然今遣汝者恐汝在家汨於俗務不得專意又父子之間不欲晝夜督責及無朋友聞見故令汝一行汝若到彼能奮然勇為力改故習一味勤謹則吾猶有望不然則徒勞費只與在家一般他日歸來又只是舊時伎倆人物不知汝將何靣目歸見父母親戚鄉黨故舊耶念之念之夙興夜寐無忝爾所生在此一行千萬弩力到婺州先討店權歇泊定即盥櫛具刺去見吕正字初見便稟某以大人之命逺來親依先生講席之下禮合展拜儻蒙收留伏乞端受便拜兩拜如未受即再致懇云未蒙納拜不勝皇恐更望先生尊慈特賜容納况某於門下自先祖父以來事契深厚切望垂允又再拜起問寒暄畢又進言某晚學小生久聞先生德義道學之盛今日幸得瞻拜不勝慰幸坐定茶畢再起敘晚學無知大人遣來從學之意竊聞先生至誠樂育願賜開允使某得早晚親炙不勝幸甚又云來時大人拜意有書投納即出書投之又進説大人再令拜稟限以地逺不得瞻拜郎中公几筵今有香一炷令某拜獻今參拜之初未敢遽請容來日再詣門下令弟宣教大人亦有書并俟來日請見靣納揖退略就坐又揖而起如問它事即隨事應答如將來宿食即云大人書中巳具稟更聽尊旨次日將香再去仍具刺并以刺謁其弟問看同居有幾子弟皆見之只問門下人可知也見其兄弟皆拜茶罷便起稟某昨日稟知乞詣靈筵瞻拜更俟尊命如引入即詣靈前再拜焚香又再拜訖拜其兄弟兩拜進説大人致問昨聞郎中丈丈奄棄明時限以地逺不獲奔慰不勝慘愴之私令某拜稟切望以時節哀為道自愛又再拜趍出如問就學宿食去處即説昨蒙喻潘丈教授許借安泊大人之意不敢以某久纍其家恐兩不穩便巳自有書與之只欲就其家借一空闊房舍或近宅屋宇安下不知尊意如何看説如何如今相見即借人出去併問其兄弟幾人并見之如不問即且去俟午間再去見問此事見潘丈亦如此説大抵禮數務要恭謹詳緩不要張皇顛錯何丈托問婺州寄居前輩有薑子方者是李中書之甥在婺州住建炎間曽從馬殿院伸辟為撫喻司屬官今其家有何子弟間見先生説吾問宗留守家子弟聞多有在婺州者其家記録留守公事頗詳不知可託借傳一本否墓志亦是曽侍中作吕家必有本也韋齋與祝公書跋松奉娘子幸安小五娘九月十五日午時免娠生男子幸皆安樂自去年十二月初在建州權職官聞有虜騎自江西入邵武者遂棄所攝携家上政和寓壟寺五月初間龔儀叛兵燒處州入龍泉買舟倉皇携家下南劒入尤溪而某自以單車下福唐見程帥在福唐聞賊兵破松溪隘駸駸東下巳入建州攻南劒甚急又匆匆自間道還尤溪六月十四日早到縣而賊兵巳在十數里外矣幸二舍弟巳般家深遁是日即刻與縣官同走至家間所遁處賊在延平為官軍所破倉皇自山路欲遁下漳泉至此非其本心也過縣更不駐不甚害人亦不縱火家中上下幸皆無恙而隨行及留寓舍中衣服文字之類皆無所損失比他人為尤幸也七月間方還縣而甌寧土冦范汝為者出沒建劒之間其衆數千官軍遇之輒潰諸司不免請官招安巳還狀受犒設將散其衆無何大兵自會稽來必欲進計昨日方報大兵冒昧入賊巢喪失數千人賊勢又震大略自今夏以來未嘗有一枕之安此懷如何得程夀隆近書云鄉里頗擾擾不詳言其故度切近江浙其可憂當不啻此惟聚糧深遁勿以一豪珍幣自隨乃為上䇿此中雖城居但日夕為遁入深山之計生意草草凡事苟且不知百年未滿之間如此者更幾時而後定邪來書謂某懶於從仕非也中世士大夫以官為家如農夫之於田其敢惰邪但未能赴行在間閩中所有不過權局逺不過三五月道里有逺近便不便携家即厚費獨行又非便是以且此跧藏意亦欲俟來春無事一走會稽别當奉報晉道帥福辟得一貟屬官須京朝官大年又未曽參部一切差遣皆礙是以皆參差也裘四久此頗忠戇可任既忤逢年當擾攘中遂不告而去情理不復可耐今此復來察其意色不復可制蓄每日來就食而夜宿客舍然地逺難得人力來往彼此資以通耗且羇縻不絶猶冀尚可鞭䇿耳方賊至六月間在村中裘四亦在彼數使人呼之不至却妄云某在福唐未還又云賊破福州皆妄言也婺源先廬所在興寐未嘗忘也來書相勸以歸當俟國家克復中州南北大定歸未晚也內弟祝康國出示先君子與外大父書熹之不肖於是始生故書中及之今六十有四年捧玩手澤涕血交零敬書其後而歸之紹熙癸丑十二月七日孤朝散郎祕閣修撰主管南京鴻慶宫熹謹書跋韋齋書昆陽賦為兒甥讀光武紀至昆陽之戰熹問何以能若是為道梗槩欣然領解故書蘇子瞻昆陽賦卑之子瞻作此賦時方二十一二歲耳筆力豪壯不減司焉相如也韋齋紹興庚申熹年十一歲先君罷官行朝來寓建陽登髙丘氏之居暇日手書此賦以授熹為説古今成敗興亡大致慨然久之於今忽忽五十有九年矣病中因覽蘇集追念疇昔如昨日事而孤露之餘霜露永感為之泫然流涕不能自巳復書此以示兒輩云慶元戊午四月朔旦跋陸務觀詩漠漠炊煙村逺近鼕鼕儺鼓埭西東三乂古路殘蕪裏一曲清江淡靄中外物巳忘如敝屣此身無伴等羈鴻天寒寂寞籬門晚又見浮生一嵗窮季扎聞歌小雅而識其思而不二怒而不傷者近世東坡公讀桞子厚南澗中題乃得其憂中有樂樂中有憂者而深悲之放翁之詩如此後之君子其必有以處之矣慶元巳未七月二十日雲谷老人觀陳希真所藏為記其後跋魏丞相使虜帖內修政事外攘夷狄復文武之境土會諸侯于東都此夀皇帝當日之本心也屈巳和戎豈其獲巳然非丞相夀春公之深謀壯節猶幾不足以成之豈興事造功之果為不易耶公之子熊夢出此宸翰以示臣熹適當奉諱之後捧玩摧裂涕泗交零謹拜手稽首而識其下方云晦庵朱先生文公續集卷八閩縣學訓導何器校
