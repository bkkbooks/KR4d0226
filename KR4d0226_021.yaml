front:
  text: 晦庵先生朱文公文集卷第二十一申請
  hash: sha256:b0104efcca419ac9dfc3c0450952ae29ca62cea0515cf7a6f1d0ad9eb1e6c6e7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0226_SBCK_021-1a}
body:
  text: 與宰執劄子熹昨具劄子奏聞乞撥米三十萬石添貼紹興府糶濟未蒙指揮支撥竊緣熹所乞上件米數內十四萬三千餘石係取到本府見行掯約間日糶濟數目别作逐日糶濟會計合用之數其餘亦係慮恐日後更有增添約度大數若不得此則不唯使熹今日空手渡江無以布宣聖主憂勞憫惻之意實恐將來飢民日食半升之米不足充虛接力不能作業營生必致殍死流離上貽當寧宵旰之憂或恐豐儲見在米數不多難以盡行支撥即乞且撥十四萬三千石先付熹前去將紹興府諸縣一例作逐日糶濟外所乞餘數却乞紐計價錢付熹前去與知明州謝直閣同共措置雇募海船收糴廣米接續糶濟仍須管除賑濟外所有賑糶到錢令項樁管申取朝廷指揮實為利便伏望鈞慈早賜敷奏應副施行乞禁止遏糴狀契勘紹興府婺衢州諸縣皆有災傷見行賑濟合用米斛巳承降聖旨指揮給降到本錢三十萬貫接續濟糶緣本路兩年荐遭水旱無處收糴熹今體訪得浙西州軍極有豐稔去處與本路水路相通最為近便巳行差官雇船前去收糴及印榜遣人散於浙西福建廣東沿海去處招邀客販竊慮逐州縣不體鄰路飢荒之急故行遏糴及客人應募船販亦恐逐州縣稅務循習邀阻妄作名色輒收雜稅力勝買醋錢之類使本路飢民日就狼狽虛𬒳聖主撥賜賑恤之恩事屬不便今檢凖淳熙令諸榖遇災傷官司不得禁止般販及今年八月三日聖旨勘會淳熙七年九月二十四日勑兩浙江東湖北旱傷全藉鄰路豐熟去處通放客米訪聞得熟州郡輒將客販米斛邀阻禁遏奉聖旨劄付諸路帥漕各檢坐指揮條法遍下州軍不得遏糴如敢違戾仰逐司覺察按劾及今年十一月二十九日本路獲降指揮本路州縣稅場邀阻妄收稅錢力勝之類將官吏並於見行條法各加一等坐罪至來年六月却依舊法欲望朝廷特賜敷奏早降指揮將見行遏糴條法劄下兩浙轉運司令行下浙西得熟州縣約束其沿路稅務邀阻收錢亦乞依本路巳獲降前件指揮加等坐罪施行庶幾公私般運免致艱阻一路飢民得霑實惠乞賑糶賑濟合行五事狀照對自到任以來奉行賑糶賑濟有合行五事巳具申朝廷未蒙回降開具下項一件熹體訪得浙西州軍極有豐稔去處與本路水路相通最為近便巳差官雇船前去收糴及印榜招邀客販竊慮逐州縣故行遏糴亦恐州縣稅務邀阻妄作名色輒收雜稅力勝買醋錢之類乞敷奏將見行遏糴條法劄下兩浙轉運司行下浙西得熟州縣約束其沿路稅務邀阻亦乞依本路巳獲降指揮加等坐罪施行一件熹照得本路今歲災傷唯紹興府最甚雖蒙朝廷給降錢米濟糶猶恐不能周給其勸諭上户獻助至今未有勸到數目臣僚奏請特依淳熙元年耿延年獲降指揮減半推賞熹詢訪得紹興府田土瘠薄連年災傷上戶縱有儲蓄所出之米及格者必少乞敷奏如諸路州縣人户願出米榖自行般運前來紹興府賑糶賑濟亦乞與依上項指揮減半米數推賞一件熹契勘人戶身丁每年合納本色折帛丁鹽絹綿丁錢等係隨夏料送納依凖省限合至五月十五日方行起催熹訪聞紹興府諸縣日前年分多是正月初間便行催督巳是違法况仐旱荒人民飢餓不容官吏更有侵擾熹除巳行下紹興府及屬縣照應條法不得促限追擾外乞指揮更賜劄下紹興府鈐束諸縣遵守條法不得前期追擾施行一件熹照對本司去年勸諭到上戶陳之竒等出助米榖賑濟賑糶合行該賞本司先巳保明具申尚書省未蒙朝廷推恩以致人戶無以激勸巳具録奏聞及申尚書省乞速賜推恩施行一件照對昨凖省劄熹所奏檢放不實之弊奉聖旨令熹詢訪不實最多處按劾施行及續凖省劄紹興府山隂會稽等縣人戶余宗榮等狀訴檢放秋苗不盡不實劄下檢實熹詢訪見得本府諸縣檢放委有不實去處但今田土多是巳種二麥及為飢民採取鳬茈鋤掘殆遍無復禾稻根查可見荒熟分數乞且將下戶等第住催上戶寬限勸諭其新林一帶亦許熹差官檢定潮泥不堪耕種之處等第蠲閣租稅其衢婺州及本路應有訴旱去處亦乞依此委官約度分數住催官物乞敷奏特降指揮施行右竊緣紹興府今年飢荒極重官司雖巳不住措置糶濟竊緣錢米不多終是不能均濟惟有蠲除稅租禁止苛擾激勸上戶最為急務譬如救焚拯溺不可遲緩於淳熙八年十二月十七日具申尚書省乞照前狀速賜指揮施行其檢計户口分撥錢米見巳一靣施行候見欠闕定數别具供申聽候指揮申審住催官物指揮狀淳熙八年十二月二十八日近凖尚書省劄子勘會巳降指揮行下江浙兩淮旱傷州縣將第四第五等户今年以前應干殘欠苗稅丁錢並特住催及將官私債負權免理還其流移人拖欠官物亦與除豁不得令保正長代納并支撥米斛通行賑濟十二月四日三省同奉聖旨令江浙兩淮帥漕提舉司各行下所部州縣將流移到人户遵依巳降指揮多方存恤母致失所來春如願歸業趂時耕種即量支錢米給據津遣與免夏料催科仍仰所在州軍出榜曉諭劄付本司巳即時恭稟遍行下諸縣施行今據紹興府新昌縣申照對今年以前未委是淳熙七年官物或是淳熙八年二稅若是淳熙七年二稅並無合催之數淳熙八年夏稅丁錢今年八月二十二日巳承本府帖行下備降指揮住催訖所有今年秋苗人户為見前項指揮旱傷州縣將第四第五等下户今年應干殘欠苗稅丁錢並特住催因此不肯送納有此疑惑申乞行下右所據前項申述本司照對所降指揮所謂今年以前應干殘欠苗稅丁錢並特住催即未審今年以前是淳熙七年終唯復淳熙八年見催之數具申尚書省及戶部伏乞明降指揮行下以慿遵守施行乞將衢州義倉米糶濟狀照對衢州管下屬縣去歲旱傷細民闕食本州申朝廷乞從條於有管常平義倉米取撥五萬石出糶去年十二月十六日劄下本司照條施行今據本州申淳熙七年旱傷檢放苗米四千餘石遂取撥義倉米及勸諭上戶出助并措置和糴計五十餘萬石賑濟賑糶幸無流徙後為去年秋旱放苗米九千餘石比之七年一倍以上兼以鄰郡嚴婺徽饒類皆旱歉本州地居其中大略相似以此愈見艱得米榖細民闕食雖巳勸諭及申尚書省乞先撥義倉米五萬石仍一靣開場每升量減作二十文足賑糶去後但緣連遭荒旱民情嗷嗷艱得錢物深山窮谷僻逺小民委是無錢糴米乞行下於所申取撥義倉米五萬石內支撥二萬石應副賑濟免有流移餓殍之患熹尋躬親巡歷到衢州點檢見得本州逐縣委是災傷多有飢民餓損羸困闕食合行救助賑濟及檢凖條令義倉米專充賑給不得它用自合撥充賑濟熹除巳逐急一靣下本州於申請取撥出糶常平義倉米五萬石數內取撥一萬石委官措置收拾賑濟其餘四萬石仍舊出糶外欲望朝廷特賜劄下衢州施行巳具申尚書省乞指揮施行救荒事宜畫一狀今有職事巳具狀奏聞外再申尚書省如熹所奏得蒙降出欲乞敷奏早賜施行一為紹興府救荒之備不盡三月竊恐麥熟之前麥盡之後尚須接濟欲乞盡推去年賞典痛減度牒米數再撥官會三十萬貫庶幾賑給之餘更可作將來儲備又乞照應見行移用條法支撥諸州常平義倉米斛應副紹興府麥前急闕一為伏覩近降指揮將臨安餘杭兩縣四等五等人户淳熙八年秋苗夏稅依徽饒州例並與住催欲乞出自聖意特降指揮將紹興府山隂會稽􅌘縣諸暨蕭山五縣四等五等戶夏稅秋苗丁錢並與住催其餘諸州縣逐都檢放旱傷及五分以上者五等户亦與住催七分以上者并四等戶並與住催候秋成日併行帶納論督責稅賦狀九年三月三日承尚書省劄子勘會江浙兩淮州郡去歲委實旱傷去處其合納苗稅巳降指揮檢放倚閣近來州郡以寬恤為名將不係檢放倚閣之數故作稽滯不行起發劄下本司將管下州郡年額合起綱運除檢放倚閣數外嚴行督責須管日下起發如仍前違慢仰開具守倅令佐及當職官職位姓名申尚書省所凖前項省劄熹恭惟國家張官置吏本以為民所以平時但聞朝廷戒敕州郡奉行寬恤惟恐有所不至至於督責二字考之前史則韓非李斯慘刻無恩詿誤人主之術非仁人之所忍言也今來旱傷檢放倚閣民間固巳蒙𬒳寬恩然其不係放閣之數亦止合且令勸諭寬限拘催難以嚴行督責所有前項朝旨若便推行竊慮有傷治體熹雖愚陋委實不敢奉行論臧否所部守臣狀三月三日承尚書省劄子勘會巳降指揮令諸路帥臣監司歲終各具所部守臣臧否聞奏所有淳熙八年分未見奏到正月十三日三省同奉聖旨令遵依巳降指揮日下聞奏劄付本司所凖省劄令本司具淳熙八年分所部守臣臧否奏聞事照對熹去年十二月六日到任即不見得本路諸州守臣去歲臧否兼近因按劾衢州守臣李嶧不蒙朝廷施行熹委是材輕德薄不足取信豈復更敢臧否人物伏乞照會免行考察乞給借稻種狀五月五日本司凖淳熙九年正月二十日尚書省劄子勘會春耕是時深慮江浙兩淮州縣去歲旱傷之後貧民下戶并流移歸業之人艱得稻種却致妨廢農務理宜措置正月十九日三省同奉聖旨令逐路轉運提舉司疾速行下去歲旱傷州縣多方措置稻種斟量給借務令及時布種候豐熟却行拘還具巳借支數目聞奏仍多出文榜曉諭本司照對紹興府去歲旱傷為甚衢婺州為次遂那撥錢發下紹興府及下衢婺兩州諸縣恭稟聖旨指揮措置給借并鏤版曉諭人戶通知先據婺州申本州鄉俗體例並是田主之家給借今措置欲依鄉俗體例各請田主每一石地借與租户種榖三升應副及時布種候收成日帶還不得因而收息如有少欠官司專與催理不同尋常債負巳下諸縣從此施行及紹興府申支撥官錢委官同與縣官措置給借五縣共給借過第五等下戶并流移歸業人五萬七千八百户計錢一萬七十四貫五十四文省并衢州申管下屬縣那借官錢五百貫文及勸諭上戶將收到稻種共二萬一千六百二十二石四斗二升二合斟量分借鄉民布種去訖發蝗蟲赴尚書省狀七月本司近訪聞得紹興府纍有飛蝗入境即於今月初五日差人前去探問據兵士孫勝報今到會稽縣白塔寺相對東山下有蝗蟲數多收拾得大者一籃小者一袋其地頭村人皆稱蝗蟲遇夜食稻熹即今前去看視一靣監督官吏打撲焚瘞尋别具奏聞須至申聞者右其蝗蟲大小兩色各用紫袋盛貯隨狀見到謹具申尚書省伏乞敷奏施行乞支降錢物狀熹今起發前去諸州便要錢物分俵逐州守臣責令運糴以備糶濟所有前狀所乞錢物欲乞鈞慈早賜敷奏盡數支降庶熹所到便得揭榜曉諭宣布德意安慰飢民寬其流離餓殍之憂息其無聊妄作之念實繫利害如是將來見得會計實數所乞錢少更當别具申奏亦望廟堂力賜主張疾速應副千萬幸甚乞許令佐自陳嶽廟狀契勘今來諸州連歲災傷將來艱食又非去年之比全藉知縣佐官協力措置以救民命竊慮其間或有老病庸懦不能任事之人欲加按劾則無顯過欲置不問則為民害欲望朝廷敷奏特降指揮如有似此之人許令自陳嶽廟差遣一次仍嚴責巳差下人除程半月疾速赴上不得少有違滯其未到間即乞不以縣之大小委自本司差人權攝許於得替待闕不應差出人內選差俟荒政結局即行住罷庶幾數月之間逐縣得人不至誤事須至供申者右謹具申尚書省伏候指揮申知江山縣王執中不職狀熹今月初七日承進奏官傳到報狀云云浙東久闕雨澤近自衢州江山來者本縣被旱最甚苗巳就稿民尤乏食鄰邑有米可糴禁遏不令出境江山之民為飢所迫巳有奪糧之意似聞衢信間更有如此等處若不預行措置竊恐小民無知易致生事乞令有司檢舉閉糴指揮申嚴行下巳奉聖旨依熹照對昨巡歷至江山縣見得知縣宣教郎王執中庸謬山野不堪治劇及據士民詞訴稱其多將不應禁人非法收禁人數極多盡是公吏畫策務要科罰錢物後來疫氣大作入者輒病反以此勢嚇脅平民科罰取錢等事熹以所論不係本司職事兼本官只是庸謬别無顯然贓私罪犯遂只行下本縣禁約去外熹近又聞衢州諸縣新榖未登街市全無客販及上户閉糴絶少米斛出糶數內江山一縣尤甚遂即行下本縣將去年巳撥下官米及上户未糶米斛接續出糶如有貧病無錢收糴之人即行賑濟及煮粥存養其知縣王執中一向坐視並無一字報應却據衢州繳到諸縣所申米價每升皆四十文上下其江山縣狀內獨稱大禾米每省升止糶一十八文小禾米一十七文足比之諸縣米價大假遼逺與所訪聞事體不同方於六月二十九日行下追本州縣人吏赴司根究今者伏覩前件臣僚所奏本縣飢民奪糧事理上勤聖慮特降指揮而熹備使一路曽不聞知其本州縣全無申報在熹無所逃罪其知縣王執中委是弛慢不職之甚難以容令在任除巳行下衢州先將本官對移間慢職事外須至供申右謹具申尚書省伏乞敷奏將王執中特賜罷黜所有本司失察之罪亦乞併賜責罰施行并牒衢州請詳此先將本官對移間慢職事聽候朝廷指揮申再有措置災傷事件狀熹今再有措置本路災傷事件巳具奏聞乞賜施行外欲望朝廷速賜行下庶幾一路飢民早𬒳聖恩不致狼狽須至供申今開具下項一奏乞特降睿旨支撥一百七十萬貫湊前所給通作二百萬貫令熹及早分給諸州廣行運糴俟見糶給户口實數却行計度支用不盡之數先次拘收回納仍乞於內紐計米數量給空名告身五七十道并度牒官會湊成二百萬貫付熹收掌如有獻助及格之人令熹與安撫使書填給付一奏乞特降睿旨於今來所降減半指揮內刪去將來檢踏見得災傷最重處方得保明取旨之文只依乾道七年耿延年所請巳得指揮施行一奏乞特降睿旨將本路災傷縣分人戶夏稅權行住催却俟檢放秋米分數定日却將夏稅亦依分數蠲減一併住催一奏乞特降睿旨許熹前項所請百七十萬貫而令於內量撥什三候諸州通判申到合興修水利去處即與審實應副其合糶給人有應募者即令繳納糶給由曆就雇入役俟畢工日糶給如舊一奏乞特降睿旨許令𬒳災州縣人戶苗米五斗以下不候檢踏先次蠲放令轉運司疾速施行一奏乞特降睿旨申嚴舊請仍詔有司諸𬒳災傷州縣人戶欲興販物貨往外州府收糴米榖就闕米處出糶者各經所在或縣或州或監司自陳所帶貨物判執前去其糶米訖所買回貨亦各經所在自陳判執回歸往回所過並不得輒收分文稅錢違者並依稅米榖法必行無赦徑下轉運司約束施行右謹具申尚書省伏候指揮論差役利害狀竊見差役一事利害非輕本司日逐受理詞訟多是人戶陳訴上項事理雖不敢不為究心理斷然其間尚有於法有礙難以施行者若不申明乞賜指揮必是久困良民難革舊弊今輒開具下項須至申聞者一舊制都副保正大小保長皆選有心力材勇之人所以聮比居民出長入治實古者黨正族師閭胥比長之任亦不輕矣至於管幹鄉村盜賊鬬毆煙火橋道公事則耆長主之催納稅租則戶長主之皆是募人充應各有雇錢而保正有願兼代耆長者大保長有願兼戶長者則聽之其不願者不得輒差此皆祖宗成法至今為不刋之典然而州縣奉行往往違戾至如江浙等處則遂直以保正承引保長催稅於是承引者有雇募奔走之勞催稅者有比訊陪備之苦破家蕩産幾不聊生朝廷蓋亦深知其弊故所以為之關防措置無所不備然而不得其本民亦終不𬒳其澤熹嘗原其所以蓋緣朝廷曽有指揮罷支耆户長雇錢以充經總制窠名起發遂致州縣無錢可雇耆長戶長而此等重役遂一切歸於保正保長無祿之人至其猶存二長舊額去處又皆無賴遊手之徒既無雇錢不復可繩以法度遂致乞覔搔擾反為民害熹竊以為莫若將罷支耆户長雇錢一項並免起發撥還州縣依舊募稅戶充耆長户長罷支耆戶長錢紹興府共管若干貫以此計之諸路所入錢數不多不足顧惜則凡此衆弊不革自去所以關防措置之術皆不必講而户無大小家無貧富咸得以安居樂業為太平之民伏乞朝廷詳酌施行一上項復雇耆户長最為良法若以吝惜小費未能遽行而欲少寬中下等户充大保長催科陪備之苦則亦有一説焉蓋論物力之等第則通選二十五家內物力高者一人為大保長一年一替通選二百五十家內物力最高者二人為都副保正二年一替此見行法也論力後之輕重則為保正者既皆上户而承受引判追呼公事陪費實輕大保長既是中下之户而一年之內輪當催稅者四人比訊陪備其費不資充應之家無不破産其都內上户是年之內偶不當充保長者固皆拱手端坐以視此曹之狼狽而當此役者其間狡猾姦巧百端避先趨後舍重取輕顛倒錯亂神出鬼沒所以重為貧民之害者不可勝究州縣間有知其弊者則遂隂破此法以便其民或以物力最高合充保正之户通入保長役腳或不專取見役十大保長輪差催稅而别通差上中之户為催頭此皆足以粗救一時一方之急而頑民得以援引條法把持論訴監司難以移文行下衝改成法大率歸於豪猾得志貧弱受弊而巳今若朝廷不惜小費將罷支耆户長錢撥還州縣依舊雇人則更不待措置關防而此數十年深錮牢結之弊一旦豁然氷銷凍釋如其不然則莫若將大保長於物力最高人內通差而剛去大保長願兼户長一條今人户畏避催稅如畏陷穽豈有願兼户長之理人户既不願兼而官司又不可無人催稅則只是抑勒輒差雖有徒二年斷罪之法何嘗施用只令十大保長各催本保人户官物則充役者物力既高而所催官物又少自然易得足辦其狹都十大保長內有物力低小之家即令諸縣每年夏稅起催前一月逐都一併輪差物力最高人户四名充户長內尤高者催夏料次高者催秋料即不問巳未見充都副保正大保長及歇役久近亦不理為保正保長役次則庶幾諸弊稍息而中下之户得以少安矣伏乞朝廷詳酌施行一伏覩淳熙七年六月十七日聖旨指揮臣僚劄子奏夫差役以都而不以鄉此前人成法也何法行既久人偽滋起於是有徙都之弊謂如一鄉有三都其第一第二都富者多而貧者少則所差之役常及富者而貧者得以安業若第三都貧者多富者少則富者慮役及巳巧生計較預圖遷徙於鄰都以避謂富者頗多迭相循環而充役之時少也是以富少貧多之都每遇點差殊乏其人才及數千之産亦使之充役逮夫箸役之後力薄費重非唯生計蕩盡至於鬻妻賣子殊可憐憫乞將差役之法不限以都舉一鄉而通差之庶幾役常在上户而不及於貧民劄本司從長相度具本處可行利便申熹竊詳通鄉差募則鄉分闊處私雇家丁隔都應役亦於富民有所不便今欲適中裁處莫若立法諸物力産錢合充保正保長之户無故不得移居出都保界其有須至出界者經官自陳户役並於元處收排方聽遷徙違者杖八十勒還本都居住若自富鄉役次踈處移入狹都役次密處者即聽并移户役入所居都分如此則亦足以稍均力役少革姦弊其或都狹民貧役次頻數選差不行者即許相度或全都附入鄰都或將一都分作數分附入鄰都其及五大保者依法别置都保正一人通於都內選差則窮鄉細民亦可粗免差役頻併之苦伏乞朝廷詳酌施行右謹具申尚書省伏乞鈞慈特賜詳覽或與立限委官看詳如有可采即乞敷奏修立逐項條貫頒降遵守施行經界申諸司狀具位伏覩本州凖轉運衙及凖提刑提舉衙牒備凖省劄臣僚劄子奏聞經界之政公私俱利閩廣接壤廣中巳行經界而閩中未行頃者朝廷俾閩路漕臣措置汀州經界續恐有擾而權行住罷夫經界雖難遽行然因其鄉俗而行之以漸則無勞擾之患蓋閩郡多山田素無畒角可計鄉例率計種子或斗或升每一斗種大率繫産錢十餘文若使民户自以本户産錢均配其田自為二簿一輸之官一為户簿如江浙之例每段畫圖而旁寫四至配以産錢若干其簿之首總計本户産錢以合官簿之數其隱瞞不載者甘沒于官許人告首請佃間有郡例元産一錢約抵它郡數文者使每一錢以十分為率而折之則山田小段並可均配行之二三年畒産漸實然後使保正長自畫圖為甲乙壬癸等字號而總計之則民心自安不差官吏不置司局而民亦無擾矣二月十九日三省同奉聖旨令福建路監司相度條具聞奏牒請契勘本州曽未舉行經界如或巳行即未委先來係作如何施行目今見行遵守有無所行未盡若未行經界亦合作何措置逐一條具經久利便因依狀申者本州除巳一靣詢訪到龍溪知縣翁承議條具事狀備録供申外熹竊自念久處田間嘗試縣吏其於此事尤所習知正以本州向來不曽推行經界田稅不均貧弱受弊方欲少俟數月之間條上五事首以為請今覩上項指揮適與鄙意所欲言者不約而合以此更加詢訪見得經界行否之利害一經界詳略之利害一又得其所必可行之術三又得其將不得行之慮一不敢隱默謹具如後一版籍不正田稅不均雖若小事然其實最為公私莫大之害蓋貧者無業而有稅則私家有輸納欠負追呼監繫之苦富者有業而無稅則公家有隱瞞失陷歲計不足之患及其久也訴理紛紜追對留滯官吏困於稽考人户疲於應對而姦欺百出率不可均則公私貧富俱受其弊歲引月長有增無減且以熹身之所歷者言之熹紹興二十三四年間備員泉州同安主薄是時巳見本州不曽經界縣道催理稅物不登鄉司例以逃絶為詞官司便謂不可推究徐考其實則人户雖巳逃亡而其田土只在本處但或為富家巨室先巳并吞或為鄰至宗親後來占據隂結鄉吏隱而不言耳固嘗畫䇿以請於縣一時均割雖亦頗多然本原未正弊隨日生終不能有以為久逺之利况自彼時至今又巳三四十年兹者南來每見縣道官員諳曉民事者無不以此為病至於田里之民則其苦此而欲得經界又不待言而可見此經界行否之利害然也然則今日議臣之請亦可謂深知所以救時弊之急矣但其所言閩廣之事或非親見容有未實蓋紹興年中福建一路實但泉漳汀州不曽經界然亦非全然不行也是其打量攢造蓋巳什八九成而提刑孫汝翼以為山賊未平民散田荒慮有不實亟奏罷之本非此三州者偏有不可經界之勢也且其至今嵗月益久流亡復業田土開墾又巳非復昔時矣使昔時真不可行豈至今日終不可行而遂巳乎伏乞台察一經界利害如前所陳則其不可不行審矣然行之詳略又有利害者蓋版籍之所以不正田稅之所以不均政緣教化未明風俗薄惡人懷私意不能自克是以因循積弊以至於此雖有教化亦未可以卒然變也况今吏治何暇及此而遽欲版圖之正田稅之均是豈不差官不置局不打量步畒不攢造圖帳之所能辦乎所以紹興年中雖以秦太師之權力李侍郎之心計然猶不憚甚勞大費以至淹歷歲時之久而後能有成也若如議者之言即是熙寧手手疑當作首去聲實之法其初雖若簡易其終必將大起告訐之風徒傷淳厚之俗而卒不足以得人戶田産有無多寡之實又反不如偷安度日都不作為之為愈也抑紹興經界立法甚嚴人所創見莫不震悚然而姦猾之民猶有故犯之者况於今日以此苟簡之法施之玩習之民而欲妄意簿正而稅平豈可得哉此經界詳略之利害者然也伏乞台察一經界之行否詳略其利害已悉具於前矣今欲行之則紹興巳行之法誠不可易但當時所行亦有一二未盡善者如不擇諸道監司以委之而至於專遣使命不擇州縣官吏而泛委令佐至其中半又差官覆實以紛更之此則今日之所不可不革者也蓋當是時秦氏用事諸路監司皆其親黨固未嘗擇至於州縣官吏又以逐州逐縣無不奉行用人至多而不暇擇所以其勢不得不至於此今幸朝廷清明而本路諸司皆一時之選欲行經界之地又不過三州十有七縣其用官吏一縣兩人則亦不過三十四人而巳若蒙朝廷先令監司一員專主其事使之擇三郡守汰其昏謬疲軟力不任事如熹等者而於一路之中求此三四十人應亦不至絶不可得蓋縣令不能則擇於其佐佐又不能則擇於它官一州不足則取於一路見任不足則取於得替待闕之中皆委守臣踏逐申差權領縣事要以得其人而後巳既得其人則使之審思熟慮於其始而委任責成於其終事畢之後量加旌賞以報其勤其權領者則又稍優其賞而歸之故官則大事克濟而於其不能者亦無大害此則差官置局必可行之説也至於打量一事則其勢不得不少勞民力但一縣之地大者分為數百千保小者分為數十百保使之分頭散出各自打量則亦不至多費時月而紹興遺法亦必有能識之者此打量步畒必可行之説也至於圖帳之法始於一保大則山川道路小則人户田宅必要東西相連南北相照以至頃畒之闊狹水土之高低亦須當衆共定各得其實其十保合為一都則其圖帳但取山水之連接與逐保之大界總數而巳不必更開人户田宅之闊狹高下也其諸都合為一縣則其圖帳亦如保之於都而巳不必更為諸保之别也如此則其圖帳之費亦當少減然猶竊慮今日民力困弊又非紹興年中之比此費雖微亦恐難以陪備若蒙朝廷矜憐三郡之民不忍使之更有煩費則莫若令役户只作草圖草帳而官為買𥿄雇工以造正圖正帳專委守倅及所差官會計買𥿄雇工之費實用若干錢物具申漕憲兩司許就本州所管兩司上供錢內截撥應副如此則大利可成而民亦不至於甚病此則攢造圖帳必可行之説也抑此皆其法也若夫法外之意又在官吏用心如何熹頃在同安嘗見惠安縣丞鄭昭叔自言知仙遊縣日適值朝廷推行經界初得户部行下事目讀之茫然不曉所謂而寮佐吏史亟請施行因竊自念巳猶未曉何以使人乃閉閣謝事覃思旬日然俊通曉心口反復更相詰難胸中洞然無復疑滯然後集諸同官而告語之使其有疑即以相問如是數日而同官亦無不曉者同官既曉然後定差保正保長闔縣通差不以煙㸑逺近為拘不以歇役新舊為限但取從上丁産高人分為二等大者以備都副保正小者以備大保長各以𥿄籖書其姓名分置兩貼又於二貼各分四類或物力高強或人丁衆盛或才智足任謀畫或筋力可備奔走各以其類置於一貼凡選一都一保則必兼取此四色人使之同事令其各出所長以相協濟於是人皆悅從相率就事差役既定然後以户部事目印本給之又為説其大意使之退而講究期以一日悉集縣廷凡有所疑恣其請問悉以巳意詳為解説力疲氣乏則請同官更畨應之如是五六日凡為保正長者亦無不悉曉其法然後散遣打量不過兩月它邑差役未定而仙遊打量見次第矣熹嘗竊記其言以為若使𬒳差之官人人如鄭君之用心則雖歲歲方田年年經界亦無害於民者今者幸遇朝廷復有推行此法之意敢録其説并以陳獻如蒙采擇上之朝省下之屬部不獨使被差官吏有所取法亦庶幾鄭君之心因以暴白於後世鄭福州寧德人其後致仕家居老壽康寧九十六歲而終亦其誠心愛民之報也并乞台察一經界行否詳略之利害與其必可行之術熹之言亦詳矣而復有所謂不得行之慮者何也蓋此法之行貧民下户雖所深喜而豪民猾吏皆所不樂喜之者多單弱困苦無能之人故雖有誠懇而不能以言自逹不樂者皆財力辦智有餘之人故其所懷雖實私意而善為説詞以惑群聽甚者至以盜賊為詞恐脅上下務以必濟其私而賢士大夫之喜安靜厭紛擾者又或不能深察其情而望風沮怯例為不可行之説以助其勢殊不知泉漳之民本自良善不能為冦唯汀州及漳之龍巖素號多盜然前後數起如沈師薑大老官黃三之徒皆非為經界而起也乃以不曽經界有稅無業之民狼狽失所者衆而輕於從亂耳若其富家巨室業多稅少之人則雖有不樂受産之心而豈肯以此之故棄其子孫久逺之業以為族滅無餘之計也哉其不足慮亦明矣但此等事情曲折微細亦須身履目見乃有以信其必然今朝廷之尊臺府之重其去田里有稅無業之民蓋巳逺矣而又有此浮偽姦險之説以蕩搖乎其間則亦何由信此利害之實而必行之哉此熹所以雖獨知之而不能不以或不得行為慮也伏乞台察右謹件如前熹之愚意又竊以謂此事今在諸司詳為開陳朝廷力賜主張首以定計為先次以擇人為急然後博采衆論取其所長則雖事之至難者亦將無所不濟如其不然而使復為懷姦挾詐因循苟簡之論所勝則是使三州之民日就窮因永無蘇息之望矣可不痛哉熹衰朽之餘誤叨郡寄不勝喜懼交戰之極謹具狀申安撫轉運提刑提舉常平使司伏候台旨小貼子此狀所陳乃熹平日所聞不經界之通患今到任稍久續行體訪又見本州稅籍不正田畒荒蕪官司失陷王稅數目浩瀚無以供解嵗計遂至巧作名色科敷責罰以救目前官既不法吏又為姦是以貧弱之民受害愈甚州郡非不深知其弊然勢之所驅有不容巳雖有賢者不過包羞忍恥拱手竊歎而巳若不推行經界決是無由革去此病之根此於通行利害之中又是一郡要切利害并乞台照再申諸司狀具位伏見本州逐日承凖使牒備坐省劄內聖旨指揮詢究經界利害契勘熹到官之初即被上件指揮巳具巳見畫一供申本州又巳取到知龍溪翁朝奉等官議狀備申去訖近凖泉州關報亦巳條具申聞竊意事之利病雖未易以一言盡然其可否之決當亦可見於此矣而至今纍月未有定論使司排日移文尚且更令詢究此雖高明謙遜博盡下情謹之重之不為輕舉然此一事自初降旨今幾半嵗若欲決意舉行則須及此七八月間畫降指揮檢照紹興年間户部所行事目雕印行下令逐州縣前期講究隨冝損益舉辟官吏取撥錢物差下保正副長要使秋成之後即便打量東作之前次第了畢庶幾乘此農隙可以集事今來巳是夏末秋初而都未見有此消息文字往來泛然而巳正使幸而不至寢罷亦須明年秋冬方得下手是則不惟虛費時月使三州疲悴之民更受一年之苦而上下官吏必將妄疑諸司無意主張不肯著力詢究兼是事未施行利害曲折亦非常情所能預料雖欲詢究其道無由徒爾紛紜不惟無益而適所以漏泄幾事動搖衆心使營私避事之人得以隂笑竊議於其後非計之得也且以紹興之役觀之當時舉東南數百州之地同日施行只是李侍郎一人建白於下秦太師一人主張於上斷然行之未嘗如此遲疑顧慮而中外響應無有一夫以為厲巳而敢萌叛亂之意及其訖事則版圖稍正稅役稍均民到于今賴之不可誣也故熹竊謂此事雖或不免勞人動衆然其勢不得不行而其理亦決然可行其為利害不在乎它但在斷與不斷行與不行之間爾若蒙諸司力為申明朝廷早賜行下使官吏曉然知是斷然必行之令巳終不得不任其責則其利病之曲折自當有能次第推尋接續申請者今皆不必預以為憂使謀空多而事不集以失三州窮民之望也又况本州今年早稻稍熟民力稍寬可為之時似不可失須至申聞者右謹具再申安撫轉運提刑提舉常平使衙伏乞台旨施行回申轉運司乞候冬季打量狀具位本州今月初九日凖轉運衙牒録白到尚書省十二月二日劄子福建轉運提刑提舉司奏相度到漳泉汀州經界十一月二十六日降指揮令福建轉運司照相度到事理先將漳州措置施行仍每縣各於所部內選差有材力能幹官一員同知縣公共措置務要盡得其實母致引惹詞訴及委陳某專一提督候打量開具已行事件及打量圖本申尚書省先具知稟狀申須至申聞者右凖指揮熹照對本州自去年二月凖使司牒條具經界利便於六月恭奉聖旨令熹相度聞奏當巳節次具狀申奏去訖仍纍行下屬縣曉諭士民各據陳述利便紐算方法仍會到福州興化軍諸縣紹興十八年舉行經界案祖逐項斟酌取其簡便易行將來不至煩擾者分明曉諭并將田形算法鏤版行下四縣先令人吏習學指教民户務要人人通曉其它節目亦皆稍有倫緒只是差保正副長分畫都界置立土封之類以未得旨不敢預先行下今來伏凖使牒備坐省劄恭奉聖旨指揮先將本州措置施行熹聞命驚喜即欲奉行既而思之方量之役全在田野其所使令保正副長喚集照應書押人户又是産稅耕農之家所以紹興十八年間舉行此法必在十月以後正以不欲奪其農時務欲公私兩便而熹自去年纍次申請亦欲秋成之後即便打量東作之前次第了畢其後又因具奏待罪明言年歲向晚播榖有期若便施行亦恐不免有緩不及事之責蓋區區之愚慮亦未嘗不在於此也目今雖然方是正月中旬然閩南地暖管下田土才及冬春之交民間巳是耕犂若於此時施行不惟有妨農務而春月雨水常多原野泥濘恐亦難得應期了畢曠日持久勞費倍多將使無知之民不見朝廷之良法美意而反以為厲巳豪家大姓隱瞞租稅之人本所不悅又得以此藉口肆為扇惑動搖之計凡此曲折實有未便以是反有遲疑未敢遽然下手然又竊惟念此事之行雖非熹所建白然而節次條陳利害則熹實任其可行致蒙諸司特賜保明朝廷俯從所請至於異議紛紜久而不決又蒙聖明果斷特許行之一州德意所加至深至厚豈可不亟奉行更有前郤則又且欲及此農務尚寬之際先次差下保正副長便令打量城市山坂至春深而權罷俟秋晚而復行既又深念如此施行不惟未有深益且是既行復止中間半歲機緘泄露人情玩習其弊且將無所不有是以不敢復顧避事之嫌而極論其未可遽行之説如此欲望使司詳酌其宜特賜敷奏略倣紹興十八年事體許俟七月一日方行差役十月一日然後打量其它分畫都界置立土封之類即容本州日下一靣措置以至秋成之後打量之時規畫當益詳盡吏民當益諳熟既免妨農之實害又銷不逞之浮言蓋雖遲之數月而纍嵗依違不決之議一方因襲難革之弊百年久逺一定之規可以優遊而責成不至趣迫而害事豈勝幸甚謹具申轉運使衙伏乞台旨備奏施行乞撥飛虎軍隸湖南安撫司劄子熹竊見荆湖南路安撫司飛虎軍元係帥臣辛棄疾創置所費財力以巨萬計選募既精器械亦備經營葺理用力至多數年以來盜賊不起蠻猺帖息一路賴之以安而自棄疾去鎮之後便有指揮撥隸步軍司既而又有指揮撥隸荆鄂副都統自此之後只許緩急聽本司節制而升差事權並在襄陽竊詳當日創置此軍本為彈壓湖南盜賊專隸本路帥司本路别無頭假軍馬唯賴此軍以壯聲勢而以帥司制御此軍近在目前行移快疾察探精審事權専一種種利便今乃遙隸襄陽襄陽乃為控制北邉大敵自有大軍萬數何藉此軍為重而又相去一千二百餘里其將吏之勤惰士卒之勇怯紀律之踈密器械之利鈍豈能盡知而使制其升黜之柄徒使湖南失此事權不過禮數羈縻略相賔服而巳於其軍政平日無由覺察及有調發然後從而節制之彼此不相諳委有誤事必矣欲望朝廷考究元來創置此軍一宗本末照辛棄疾當時所請特賜敷奏别降指揮仍舊以湖南飛虎軍為額其升差節制一切事務並委帥臣專制只令荆鄂副都統司每歲十月關湖廣總領所同共差官按拍事藝覺察有無闕額虛劵雜役之類庶幾互相防檢緩急可恃祧廟申省狀右熹初十日蒙恩宣引靣奏祧廟事狀蒙聖慈宣諭若曰僖祖自不當祧高宗即位時不曽祧壽皇即位時亦不曽祧太上即位時又不曽祧今日豈可容易竊見聖明已有定議今巳多日未委因何不蒙朝廷審奏取旨施行謹具狀申尚書省乞賜檢會將上早降指揮伏候鈞旨再申省狀右熹昨具狀申尚書省議不當祧遷僖祖廟室及具劄子奏聞乞行詳議靣奉聖訓僖祖自不合祧高宗時未嘗祧壽皇時未嘗祧太上時亦未嘗祧今豈可祧續蒙降出所奏劄子今來日久未見施行熹不勝惶恐所有妄議宗廟之罪欲望朝廷付之理官依法施行謹具狀申尚書省伏候鈞旨小貼子熹所請依法坐罪或恐朝廷未欲如此施行即乞鈞旨請與議衆官同赴都堂並給筆札與熹廷辨如熹委是妄言甘伏朝典史館擬上政府劄子熹等竊聞高宗皇帝駐蹕紹興時有小官婁寅亮上書以皇嗣未生乞選宗室子入侍禁中是時高宗年未三十一聞其言欣然開納即以寅亮為監察御史其後宰相趙鼎張浚等遂建大議至尊壽皇聖帝由此入資善堂封建國公然猶未正皇嗣之名仍有配嫡之慮議者憂之又後數年乃有張燾之疏見於其家所述行狀最後因范如圭進其所集昭陵儲議且請高宗斷以公道母二母疑其言尤切一日高宗遂詔宰相陳康伯定䇿以壽皇為皇子進封建王遂自儲宮正位宸極其事見於日曆本末詳備熹等竊惟堯父舜子傳受之美逺邁前世冠絶古今雖由天命非出人謀然而一二忠賢抗言悟主其功亦不可以不録又聞故將嶽飛亦嘗有請故殿中侍御史張戒私記其事而它臣僚亦有嘗獻言者但無文字可以稽考欲望朝廷特賜開陳廣行搜訪稍加褒顯以見聖朝崇德報功之意婁寅亮張燾趙鼎文字抄録見到其范如圭有子念德見知平江府長洲縣張戒家在建昌軍居住欲乞行下兩處取索其張戒亦係紹興名臣有奏議文集雜記等書凡數十卷并乞指揮建昌軍抄録申送付下實録院參照修纂晦庵先生朱文公文集卷第二十一福州府儒學訓導舒鏊校
