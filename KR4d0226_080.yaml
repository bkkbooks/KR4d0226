body:
  text: 記徽州休寧縣廳新安道院記休寧大夫信安祝侯汝玉以書來曰休寧之為邑雖有難治之名而吾之為之巳再歲矣始也不能不以人言為慮中乃意其不然而今則遂有以信其果不然也蓋其封域實鄣山之左麓而淅江出焉山峭厲而水清激故稟其氣食其土以有生者其情性習尚不能不過剛而喜鬬然而君子則務以其剛為髙行竒節而尤以不義為羞故其俗難以力服而易以理勝苟吾之所為者出於公論之所是則雖或拂於其私而卒不敢以為非也以是吾之始至蓋不能無不恱者而今則歡然無與為異吾嘗困於事之不勝其繁而今則廓然無事之可為也吾將更葺廳事之東參採賔佐屬詠之什而榜之以新安道院子能為我記之則後之君子益知所以為治而無吾始者之慮矣豫惟汝玉之為此可以見其政之成民之服而官曹之無事矣然道之得名正以人所共由之路而非無事之謂也夫以汝玉之始至坐于堂皇之上則左簿書右法律日夜苦心勞力而不得休其或少暇則又不免衝寒風冒烈日以出入乎阡陌之中而不敢怠凡所以勸民之善而懲其惡興民之利而除其害者非有道以行之則何以致今日之無事哉顧其名此乃若專取乎今日之無事而反序前日之厪事為非道其無乃出於老子浮屠之謂而汝玉未之思耶抑嘗計之天下之事雖有動靜勞逸之殊而所謂道者則無彼此精粗之間汝玉之學固有以知此矣彼其所以喜於政成之無事而不避異學之淫名豈非朝夕之間猶欲從容於此以深思前日之巳行而益求其所末至而卒以究夫無彼此精粗之間者而大發於功名事業之間乎豫故邦人且汝玉豫舊也樂其意為書本末以示來者使於此邦之俗賢宰之志尚有考云淳熙戊申八月甲申朱熹記玉山劉氏義學記始豫守南康鄰境德安有宰焉為政一本儒術甚以惠愛得其民歲飢為請蠲租而州家不可顧民狼顧相驚有逃去者則亟使人追止之曰所不為若等力請於州必蠲十七者令寧委印緩去終不忍使若等為異鄊鬼也民聞是令下為之感泣復相與携持而歸衆乃具以情白州若部刺史竟得如約乃巳豫聞而竊心善之而問其邑里姓名則曰王山劉侯也南康屬邑有越德安而縣屬者每遣掾史循行則必戒使謁劉侯觀其荒政所施以為法於是劉侯之惠不止行其封內而又波及南康之境竟食新民得無流亡殍死者及豫將終更乃得納謁劉侯之館而拜賜焉則望其貌聽其言而有以信其為君子人也後數歲豫以事過玉山則劉侯以待次家居復得相見如平生歡一日慨然語豫曰吾家本單貧而入仕又甚晚顧無以仁其三族者間嘗割田立屋聘知名之士以教族子弟而鄊人之願學者亦許造焉兄弟之間有樂以其資來助者而吾猶懼其或不繼也則又出新安餘俸為之發舉居積以佐其費而凡所以完葺丘壟周恤族􅊚者亦取具焉既巳言於吾州而邦君吳侯樂聞之為之出教刻符以詔吾之子孫使母違吾志吾子雅知我其為我記之以告其斆且學於此者使知有以勉焉豫聞而歎曰今士大夫或徒步至三公然一日得志則髙臺深池撞鍾舞女所以自樂其身者唯恐日之不足雖廪有餘粟府有餘錢能母為州里災害則足矣固未暇以及人也如劉侯者身雖寵而官未登六品家雖溫而産未能千金顧其所以用心者乃如此是則可謂賢逺於人而亦可以見其前日德安之政不為無本而豈徒以聲音笑貌為之矣乃追本其事而記之如此雖然古人之所謂學者豈讀書為文以干祿利而求溫飽之云哉亦曰明理以修身使其推之可以及夫天下國家而巳矣羣居于此者試以此意求諸六經孔孟之言而深思力行之庶其有以不負劉侯之教也劉侯名允迪字德華今以朝奉郎參議沿海制置使軍事云淳熙十有五年秋九月巳未新安朱喜記漳州守臣題名記漳以下州領軍事唐垂拱二年用左玉鈐衛翊府左郎將陳元光奏置領漳浦懷恩二縣而治漳浦開元四年徙治李澳川在舊治南八十里二十九年廢懷恩入漳浦而割泉州龍溪縣來屬天寶元年改漳浦郡乾元二年復為州大曆十二年又割汀州龍巖來屬正元元年乃更徙治龍溪唐末五季之亂常為泉州支郡而偽刺史董思安者至以私諱輒改號為南州我宋乾德四年泉州陳洪進以二州版圖歸王府始詔復故號太平興國三年五月一日洪進入朝請吏遂以衛尉寺丞劉援來知州事而五年又割泉之長泰縣以屬焉蓋凡漳之所以為州其本末之可考者如此其守將則陳公沒而為神今以王封廟食後乃或見或否以至于劉侯而後始有紀焉蓋其聽壁之記本嘉祐中鄭侯偕之所立逮淳熙中火而復刻則又趙侯公綢之為也紹熙元年假守朱熹至而觀焉則其木理往往龜裂且其所書又太煩悉而將無地之可書也乃為買石延平礱置聽事更為擘窠省文之法以寫舊記而虛其左方以俟來者云德安府應城縣上蔡謝先生祠記應城縣學上蔡謝公先生之祠今縣令建安劉炳之所為也先生名良佐字顯道學於河南程夫子兄弟之門𥘉頗以該洽自多講貫之間旁引傳記至或終篇成誦夫子笑曰子可謂玩物喪志矣先生聞之爽然自失靣熱汗下若無所容乃盡棄其所學而學焉然其為人英果明決強力不倦克巳復禮日有程課夫子蓋嘗許其有切問近思之功所著論語説及門人所記遺語皆行於世如以生意論仁以實理論誠以常惺論敬以求是論窮理其命理皆精當而直指窮理居敬為入德之門則於夫子教人之法又最為得其綱領建中靖國中詔對不合得官書局後復轉徙州縣沈淪卑冗以沒其身而處之浩然未嘗少挫中間嘗宰是邑南陽胡文定公以典學使者行部過之不敢問以職事顧因紹介請以弟子禮見入門見吏卒植立庭中如土木偶人肅然起敬遂稟學焉其同時及門之士亦皆稱其言論閎肆善啓發人今讀其書尚可想見也然先生之沒遊公定夫先生實識其墓而喪亂之餘兩家文字皆不可見應城寇暴尤劇莽為丘墟其條教設施固無復有傳者劉君之來訪其遺迹僅得題詠留刻數十字而巳為之慨然永歎以為先生之遺烈不建於此邦後之君子不得不任其責於是既新其學乃即講堂之東偏設位而祠焉千里致書求文以記熹自少時妄意為學即賴先生之言以發其趣而平生所聞先生行事又皆髙邁卓絶使人興起衰病零落廪然常懼其一旦泯滅而無傳也劉君之請乃適有會於豫心者於是不辭而記之如此以示其學者云紹熙辛亥冬十月丙子朔旦新安朱熹記壯節亭記淳熙巳亥歲豫假守南康始至訪求先賢遺迹得故尚書屯田外郎劉公凝之之墓於城西門外草棘中豫惟劉公清名髙節著於當時而聞於後世暫而挹其餘風者猶足以激懦而律貪顧今不幸饋奠無主而其丘墓之寄於此邦者又如此是亦長民者之責也乃為作小亭於其前立門牆謹扄鑰以限樵牧歲以中春率群吏諸生而祠焉郡之詩人史驌請用歐陽公語名其亭以壯節適有會於豫意因屬友人黃銖大書以揭焉自是以來東西行而過者莫不顧瞻起敬而豫亦自以為兹丘之固且安可以久而不壞矣紹熙二年歲在辛亥豫去郡甫十年而今太守章貢曽侯實來按圖以索其故則門墻亭榜皆巳無復存者為之喟然太息即日更作門墻築亭其間益為高厚宏闊以支永久又礲巨石以培其封植名木以廣其籟求得舊榜復置亭上歲時奉祀一如舊章且割公田十𤱔以畀旁近能仁僧舍使專奉守為增葺費而又以豫為嘗經始於此也以書來曰願得一言以記之使後之人知吾二人者所為拳拳之意而不懈其尊賢尚德之心也斯不亦有輔於世教之萬分乎豫曰諾哉曽侯名集字致虛學有家法故其為政知所先後如此云三年夏五月癸未新安朱熹記氷玉堂記南康使君曽侯致虛既葺屯田劉公之墓明年乃訪得其故居遺址於郡治之東暇日屏騶馭披荆棘而往觀焉問其北隱然以髙者則劉公所賦之東臺也顧其南窊然以下者則詩序所指之蓮池也蓋自兵亂以來蕪廢日久唯是僅存而其他則皆漫滅不可復識矣曽侯為之躊蹰四顧喟然而嘆曰凝之之為父道原之為子其高懷徑節有如歐馬蘇黃諸公之所道是亦可謂一世之人豪矣想其平日之居此林塘館宇之邃詩書圖史之盛既有以自適其適而一時遊且官於此邦者亦得以扣門避席而考德問業焉何其盛也顧今百年之外臺傾沼平鞠為灌莽而使樵兒牧子皆得以嘯歌躑躅於其上又何其可悲也雖然此吾事也不可以不勉乃出少府羡錢贖之民間垣而溝之以合於郡圃纍石以崇其臺引流以深其池遂作氷玉之堂於臺之西北而繪劉公父子之象於其上且聞陳忠肅公之嘗館於是也則又繪其象以侑焉既而所謂是是堂漫浪閣者亦以次舉而皆復其舊既成使人以圖及書來屬豫記豫惟異時承乏此邦亦嘗有意於斯而不克就今披圖考驗尚能憶其倣佛固喜曽侯之敏於事而能有成矣抑豫又有感焉近歲以來人心不正行身者以同流合汙為至行任事者以便私適巳為長䇿其聞劉氏父子之風不唾而罵之者幾希矣欲其能如曽侯一以表賢善俗為心而不奪於世習豈可得哉於是既書其事而適有以陳令舉騎牛詩畫為寄者因并以遺曽侯請刻堂上以輔一時故事之缺云紹熙三年秋九月庚午朔旦新安朱熹記黃州州學二程先生祠記齊安在江淮間最為窮僻而國朝以來名卿賢大夫多辱居之如王翰林韓忠獻公蘇文忠公邦人至今樂稱而於蘇氏尤致詳焉至於河南兩程夫子則亦生於此邦而未有能道之者何哉蓋王公之文章韓公之勳業皆以震耀於一時而其議論氣節卓犖竒偉尤足以驚動世俗之耳目則又皆莫若蘇公之為盛也若程夫子則其事業湮鬱既不得以表於當年文詞平淡又不足以夸於後世獨其道學之妙有不可誣者而又非知德者莫能知之此其遺迹所以不能無顯晦之殊亦其理勢之冝然也蓋天聖中洛人太中大夫程公珦𥘉任為黃陂尉秩滿不能去而遂家焉實以眀道元年壬申生子曰皓字伯淳又以明年癸酉生子曰頥字正叔其後十有餘年當慶曆丙戌丁亥之間攝二南安乃得獄掾舂陵周公惇頥而與之遊於是二子因受學焉而慨然始有求道之志既乃得夫孔孟以來不傳之緒於遺經遂以其學為諸儒倡則今所謂明道先生伊川先生是也先生之學以大學論語中庸孟子為標指而逹于六經使人讀書窮理以誠其意正其心修其身而自家而國以及於天下其道坦而明其説簡而通其行端而實是蓋將有以振百代之沉迷而納之聖賢之域其視一時之事業詞章論議氣節所繫孰為輕重所施孰為短長當有能辨之者而世非徒不之好也甚者乃或目以道學之邪氣而必譾蔑之於斯時也苟無遭其伐木而削迹焉斯巳幸矣尚何望於其餘哉今太守李府君侯乃能原念本始追誦遺烈立二夫子之祀於學宫於以風厲其人而作興之非其自信之篤而不以世俗之趨舍動其心其孰能與於此李侯名諶字誠之其為此邦勤事愛民固多可紀特於此舉尤足以見其趣操之不凡而非衆人所能及是以因其請記而具論之以告來者使有考焉紹熙三年秋九月戊子後學新安朱熹記邵武軍光澤縣社倉記光澤縣社倉者縣大夫毗陵張侯欣之所為也光澤於邵武諸邑最小而僻自張侯之始至則巳病夫市里之間民無蓋藏每及春夏之交則常糴貴而食艱也又病夫中下之家當産子者力不能舉而至或棄殺之也又病夫行旅之涉吾境者一有疾病則無所於歸而或死於道路也方以其事就邑之隱君子李君吕而謀焉適會連帥趙公亦下崇安建陽社倉之法於屬縣於是張侯乃與李君議略放其意作為此倉而節縮徑營得他用之餘則市米千二百斛以充入之夏則損價而糶以平市估冬則增價而糴以備來歲又買民田若干畒籍僧田民田當沒入者若干畒歲收米合三百斛并入于倉以助民之舉子者如帥司法既又附倉列屋四楹以待道塗之疾病者使皆有以棲託食飲而無暴露迫逐之苦蓋其創立規模提挈綱領皆張侯之功而其條畫精眀綜理纎密者則李君之力也邑人既蒙其利而歌舞之部使者亦聞其事而加勸獎焉於是張侯樂其志之有成而思有以告來者使勿壞則以書來請記豫讀古人之書觀古人之政其所以施於鰥寡孤獨困窮無告之人者至詳悉矣去古既逺法令徒設而莫與行之則為吏者賦斂誅求之外亦飽食而嬉耳何暇此之問哉若張侯者自其先君子而學於安定先生之門則巳悼古道之不行而抱遺經以痛哭矣及其聞孫遂傳素業以施有政宜其志慮之及此而能委心求助以底于有成也李君於子蓋有講學之舊子每竊歎其負經事綜物之才以老而無所遇也今乃特因張侯之舉而得以粗見其毫末是不亦有感夫故豫既書張侯之事而又附以豫之所感於李君者來者尚有考云紹熙四年春二月丁巳新安朱熹記鄂州州學稽古閣記人之有是身也則必有是心有是心也則必有是理若仁義禮智之為體惻懚羞惡恭敬是非之為用是則人皆有之而非由外鑠我也然聖人之所以教不使學者收視反聽一以反求諸心為事而必曰興於詩立於禮成於樂又曰慱學審問謹思明辨而力行之何哉蓋理雖在我而或蔽於氣稟物欲之私則不能以自見學雖在外然皆所以講乎此理之實及其浹洽貫通而自得之則又𥘉無內外精粗之間也世變俗衰士不知學挾册讀書者既不過於誇多鬬靡以為利祿之計其有意於巳者又直以為可以取足於心而無事於外求也是以墮於佛老空虛之邪見而於義理之正法度之詳有不察焉其幸而或知理之在我與夫學之不可以不講者則又不知循序致詳虛心一意從容以會乎在我之本然是以急遽淺迫終巳不能浹洽而貫通也嗚呼是豈學之果不可為書之果不可讀而古先聖賢所以垂世立教者果無益於後來也哉道之不明其可嘆巳鄂州州學教授許君中應既新其學之大門而因建閣於其上櫝藏紹興石經兩朝宸翰以為寶鎮又取板本九經諸史百氏之書列置其旁不足則使人以幣請於京師之學官使其學者討論誦説得以饜飫而開發焉其役始於紹熙辛亥之冬而訖於明年之夏其費亡慮三百萬而取諸廪士之贏者蓋三之一其餘則太守煥章閣待制陳公居仁轉運判官薛侯叔似實資之而總卿詹侯體仁戎帥張侯詔亦揮金以相焉既成因豫之友蔡君元定以來請曰願有記也豫雅聞許君之學蓋有志於為巳而意其所以學者亦曰取足於心而巳矣今以是舉觀之則見其所以誨人者甚平且實然後知其所以自為者不以泯心思滅聞見為極致之歸也因為之記其本末而并推近世所以為學讀書之病請具刻焉以告登此閣而讀此書者使姑無溺於俗學之下流無迷於異端之捷徑則於理之在我者庶乎有以深求而自得之矣道之不明豈足患哉四年癸丑九月甲子朔旦新安朱熹記信州貴溪縣上清橋記貴溪之水其原東出鉛山之分水北出玉山之鎮頭者合為大溪自弋陽西流徑縣治南少西乃折而北大溪之南有小港焉出縣東南境上西北流至縣治西南乃入于溪居民行客之往來者故以舟楫為三渡自縣治西南絶大溪者曰中溪當其西流北折之處者曰鑿石小港水落時廣不過百餘尺褰裳可涉霖潦暴至則其深廣往往自倍而亦為一渡中溪之舟每以是時過港常為橫波所蕩擊人力不得施鑿石則水觸西崖鬬怒騰蹙其險為尤甚故二渡者歲率一再覆溺邑人病之欲為浮梁以濟久矣而役大費廣無敢唱者今縣大夫建安李君正通至則隂計而默圖之久之乃得縣之餘財八十萬將以屬工而邑之大姓聞之有以鐵為連環巨絙千五百尺以獻者有捐其林竹十餘里以獻者州家又以米百斛者佐之於是李君乃相大溪二渡之間水平不湍者以為唯是為可久遂以紹熙三年六月始事民歡趨之不百日而告成兩崖礲石為磴道髙者五百尺卑者亦居其五之四橋之修九百尺比舟七十艘且視水之上下而時損益焉又維十舟以梁小港作雙艦以航巨浸於是東西行者春夏免漂沒之虞秋冬無病涉之歎其功甚大而費則省蓋其規模籌畫一出李君主吏工師拱手受成不能有所預也既又留錢五十萬於明覺浮屠氏使自為質貸而歲輸其贏五一以奉增葺之費明年李君將去乃以書來道邑人之意請豫文以記之豫惟李君此橋之功百里之人與四方之往來者固巳頌而歌之宜不待記而顯且其才之果藝明逹用無不宜又非獨此為可書也姑為記其本末以告後之君子使知其成之不易者如此相與謹視而時修之是則李君與其邑人之志也云爾四年九月戊寅既望新安朱熹記邵州州學濂溪先生祠記邵陽太守東陽潘侯燾以書來曰郡學故有濂溪先生周公之祠蓋治平四年先生以零陵通守來攝郡事而遷其學且屬其友孔公延之記而刻焉其後遷易不常乾道八年乃還故處而始奉先生之祀於其間既又以故府張公九成之學為出於先生也則亦祠以侑焉於今蓋有年矣燾之始至首稽祀典竊獨惟念先生之學實得孔孟不傳之緒以授河南二程先生而道以大明然自再傳之後則或僅得其倣佛或遂失其本真而不可以若是其班矣乃更闢堂東一室特祀先生以致區區尊嚴道統之意今歲中春釋奠于先聖先師遂命分獻而祝以告焉以吾子之嘗講於其學也敢謁一詞以記之使來者有考而無疑也熹發函三復為之喟然而歎曰甚矣道之難明而易晦也自堯舜以至于孔孟上下二千餘年之間蓋亦屢明而屢晦自孟氏以至于周程則其晦者千五百年而其明者不能以百歲也程氏既沒誦説滿門而傳之不能無失其不流而為老子釋氏者幾希矣然世亦莫之悟也今潘侯於此乃獨深察而致謹焉道之明也儻庶幾乎雖然先生之精立圖以示先生之藴因圖以發而其所謂無極而太極云者又一圖之綱領所以明夫道之未始有物而實為萬物之根柢也夫豈以為太極之上復有所謂無極者哉近世讀者不足以識此而或妄議之既以為先生病史氏之傳先生者乃增其語曰自無極而為太極則又無所依據而重以病夫先生故熹嘗欲援故相蘇公請刋國史草頭木腳之比以正其失而恨其力有所不逮也乃今於潘侯之舉而重有感焉是以既敘其事而并附此説以俟後之君子抑潘侯學識之長既足以及此矣則又安知其不遂有以成吾之志也耶紹熙癸丑冬十月庚申後學朱熹記浦城縣永利倉記浦城縣遷陽鎮永利倉者故提舉常平公事黃侯某之所為也聞之故老某年中黃侯以鄊人奉使本道奏立是倉其里中歲時斂散以賑貧乏且使鎮官兼董其事行之纍年近村之民頗賴其利後以兵亂廢熄無餘歲或不收民輒告病於今若干餘年而吏部之調鎮官猶襲故號也中間知縣丞王君鉛視邑之仁風諸里社倉頗有成效欲取其法以復此倉之舊而議不克合今知縣事括蒼鮑君恭叔之來乃復有請而使者吳興李侯沭深然之於是鮑君得致其役營度故壤築倉若干楹不日告成略如舊制遂移縣庾之粟若干斛以貯焉夏發以貸冬斂以藏一以淳熙某年社倉制勑從事蓋凡貸之所及者某里某都之人固皆有以望於其後而無復凶年之慮矣其所未及則亦欣然相告曰是倉息滋而藏羡其肯卒遺我哉鮑君聞之以書來告曰邑人之情如此不忍以無記也豫觀黃侯當日之權足以制一道而其後為此乃僅足以恤其鄊鄰蓋未嘗不歎其心之仁而病其不廣以今推之則未必其勢之有不能也是安得以今日社倉之法告之哉若李侯鮑君之是役則既足以使黃侯之心愈久而不泯而又能承天子之詔以廣其惠於無窮是皆可書也巳獨後之人能推所餘以遍乎其所未及則有未可必者故特為之書其本末而并以告焉庶乎有所考而不忘也詔熙五年夏四月巳酉朝散郎祕閣修撰新權發遣潭州主管荆湖南路安撫司公事朱熹記信州州學大成殿記詔熙五年秋九月熹自長沙蒙恩召還道過上饒其州學教授嘉興林君某來見請問所以為學之意甚勤與之語知其平日所用力者皆古人為巳之學而進則未巳也既乃起而言曰此邦學政其弊久矣士子習熟見聞因仍淺陋知有科舉而不知有學問且其屋不時修亦多頽圯而禮殿之壞為尤甚至於象設衣冠位次又皆不如法式某不自料既為之講以所聞幸頗有知鄊方者又將撤其故殿而一新之儻遂有成願得一言以記之且有以進其學者於將來則幸甚熹謝不敏退而問諸邦人則皆曰林君所以教其諸生者有常業而皆本於所謂古人為巳之意其於學之庶務則又巨細必親無所漏失故能當此儉歲既廣其弟子之員且什五六而猶有餘力以及此蓋屬役之𥘉首出餐錢以給諸費而漕臺州家亦有助焉諸生之有職秩者又相與捐俸入以相其事瓦木工徒之直一毫無所取於民也熹心善之比歸而往觀焉則其軒楹宏敞堂室靚深先聖鄊明先師西靣左右衆賢以次列坐一如今歲奉常所下新制而其冠冕服韍應圖合禮取諸監學靡有僣差蓋雖近輔名藩鮮有能及之者熹於是焉喟然太息益信林君之學有以充其志而力又有以行其學也歲晚還家甫爾休息而林君復以書來曰殿既訖功將以來歲正月丁亥朔旦謁守二合群吏率諸生而釋菜以落之前日之請願卒有以賜之也熹惟國家稽古命祀而禮先聖先師於學宫蓋將以明夫道之有統使天下之學者皆知有所鄊往而幾及之非徒修其墻屋設其貌象盛其器服升降俯仰之容以為觀美而巳也而今之為吏者於是數者猶有不及求其能如林君之所為者則既難矣而况欲其仰體國家之意以身為率使其學者皆知古人之所以為學者而心庶幾焉豈不又難矣哉於是為記其事使刻諸石以厲其徒且使後之君子有以考焉而母忘林君之志也十二月辛巳朝請郎新安朱熹記常州冝興縣學記紹熙五年十二月冝興縣新修學成明年知縣事承議郎括蒼髙君啇老以書來請記而其學之師生迪功郎孫庭詢貢士邵機等數十人又疏其事以來告曰吾邑之學久廢不治自今明府之來即有意焉而縣貧不能遽給其費乃稍葺其所甚敝亟輔其所甚缺且籍間田五千𤱔以豐其廪斥長橋僦金歲入七十餘萬以附益之為置師弟子員課試如法而又日往遊焉躬為講論開之以道德性命之指慱之以詩書禮樂之文使其知士之所以學蓋有卓然科舉文字之外者於是縣人學子知所鄊慕至於里居士大夫之賢者亦携子弟來聽席下無不更相告語更相勉勵而自恨其聞之之晚也退而相與出捐金齎以佐其役合公私之力得錢幾七百萬而學之內外煥然一新堂塗門廡靡不嚴備象設禮器皆應圖法蓋髙君之於是學非獨其經理興築之緒為可書而其所以教者則非今世之為吏者所能及而邑之人材風俗實有賴焉幸夫子之悉書之以告來者於無窮則諸生之望也豫頃得髙君於會稽而知其賢今乃聞其政教之施於人者又有成效如此故巳樂為之書矣而况其邑之父兄子弟能率髙君之教而有所興起皆知從事於古人為巳之學而不汲汲乎誇多鬪麋之習以追時好而取世資則又豫之所深歎而尤樂取以告人者也乃為悉記其語使後之君子有考焉抑髙君之於此邑嘗新其社稷之位而并作風雨雷師於其側以嚴祀事穿故瀆疏積水以防旱潦作社倉儲羡粟以備凶荒其所以事神治民者類能行其所學而皆出於至誠懇惻之意是以言出其人信從之蓋不待至於誦説之間然後以言教也嗚呼賢哉慶元元年春三月庚申朝請郎提舉南京鴻慶宫新安朱熹記常州宜興縣社倉記始豫居建之崇安嘗以民飢請於郡守徐公嚞得米六百斛以貸而因以為社倉今幾三十年矣其積至五千斛而歲斂散之里中遂無凶年中間蒙恩召對輒以上聞詔施行之而諸道莫有應者獨閩帥趙公汝愚使者宋公若水為能廣其法於數縣然亦不能遠也紹熙五年春常州宜興大夫髙君啇老實始為之於其縣善拳開寶諸鄊凡為倉者十一合之為米二千五百有餘斛擇邑人之賢者承議郎趙君善石周君林承直郎周君世德以下二十有餘人以典司之而以書來屬豫記豫心許之而未及為也會是歲浙西水旱常州民飢尤劇流殍滿道顧宜興獨得下熟而貸之所及者尤有賴焉然豫猶慮夫貸者之不能償而髙君之惠將有所窮也明年春髙君將受代以去乃復與趙周諸君皆以書來趣豫文且言去歲之冬民負米以輸者繦屬爭先視貸籍無􅕛合之不入豫於是益喜髙君之惠將得以久於其民又喜其民之信愛其上而不忍欺也則為之記其所以然者抑又慮其久而不能無敝於其間也則又因而告之日有治人無治法此雖老生之常談然其實不可易之至論也夫先王之世使民三年耕者必有一年之蓄故積之三十年則有十年之畜而民不病於凶飢此可謂萬世之良法矣其次則漢之所謂常平者今固行之其法亦未嘗不善也然考之於古則三登泰平之世蓋不常有而驗之於今則常平者獨其法令簿書管鑰之僅存耳是何也蓋無人以守之則法為徒法而不能以自行也而况於所謂社倉者聚可食之物於鄊井荒間之處而主之不以任職之吏馭之不以流徒之刑苟非常得聰明仁愛之令如髙君又得忠信明察之士如今日之數公者相與并心一力以謹其出納而杜其姦欺則其法之難守不待巳日而見之矣此又豫之所身試者故并書之以告後之君子云慶元元年三月庚午既望具位朱熹記寧菴記侍講王公病革顧謂其子瀚等曰生之有死如旦之有暮蓋理之必然也吾幸晚得歸息故廬今又以正終牖下是張子所謂存吾順事沒吾寧者復何憾哉汝曹亦無過哀但兄弟友恭敬奉而母力學自立扶植門庭母為吾羞足矣語絶而逝諸子泣奉其教不敢違未幾而公夫人亦不起疾諸子既奉兩柩合葬白沙石荀之原乃築祠堂寮舍以奉蒸嘗居守者而取公遺語命之曰寧菴買田百餘畒以給菴費輸王租而斂其遺餘以為歲時增葺之備間以告豫而請記其所以名之意豫感王公之言足以見其所守之正死而後巳又嘉伯海昆弟之能遵先志而不忍忘也因為書其本末如此云慶元乙卯六月巳未新安朱熹記建昌軍進士題名記建昌之為郡據江西一道東南上遊其地山髙而水清其民氣剛而材武其士多以經術論議文章致大名如直講李公中書翰林曽公兄弟尤所謂傑然者也其他能以詞藝致身取髙科而登顯仕者亦不絶於當世前此乃未有以著其名氏而傳於後世者比年以來鄊之先逹始病其闕乃率其徒考自國𥘉以至今日得若干人且將礱石刻之置諸郡學講堂之上以俟來者之嗣書焉而利君元吉鄧君約禮以書來曰今日教人取士之法誠有異於古者然其所以取之之意則亦固有在也顧士之由此而幸得之者乃或不能刮磨奮勵以自見於斯世則亦不必諭其教法之是非而吾之所以負其見取之意者巳不勝言矣故今吾徒相率為此非敢以為夸乃欲以為鑒邦人士子咸願得子之一言冠其顛以發之庶乎嗣而書者相與讀之而知所警也豫三復其書而為之喟然曰二君子之言誠美矣然不論夫教法之是非則無以識其取士之本意不反身以自求而得其有貴於巳者則又未足以議其教法之是非也夫古之人教民以德行道藝而興其賢者能者其法備而意深矣今之為法不然其教之之詳取之之審反復澄汰至于再三而其具不越乎無用之空言而巳深求其意雖或亦將有賴於其用然彼知但為無用之空言而便足以要吾之爵祿則又何暇復思吾之所以取彼者其意為如何哉二君子蓋嘗有所受學而得其所貴於巳者矣盍亦推明其説以告夫鄊之後進使之因是感發以求古人之所以教者而盡心乎誠盡其心而有得乎此然後知今日教人之法雖不由此而吾之於此自當有不能巳者今日取士之意雖或不皆出此而吾之所以副其意者自當無日而不在乎此也是則不惟無愧於今人而亦且無愧乎古不唯無愧於一官而視彼文字聲名之盛者猶將有所不屑况乎不義而富且貴者其又何足道哉顧豫不足以當其屬筆之意姑記是説以復于二君子幸與父兄子弟評之以為如何也慶元元年秋八月丙寅新安朱熹記魏國録贈告後記臣熹伏讀故參知政事龔茂良等所記孝宗皇帝褒贈故太學録魏掞之事三復以還至於感涕竊惟掞之本以白衣召見天子恱之擢為學官在職未幾數上書論政事以至力遏近幸之不當進者遂不自安而告歸以卒上則𥘉末始厭其言也至是越五年矣而眷念不忘咨嗟閔悼錫命追榮至於如此嗚呼偉哉甚盛德也其所以感人心而厲臣節為如何耶後二十年掞之從弟誠之始議摹刻制書立石冡上而臣頃嘗待罪史氏偶得茂良等所記因書卑之請并刻焉以丕揚先帝之光訓俾彌億萬年不墜于地是則不惟聖子神孫永有觀法而任事之臣有志之士亦得以稱誦道説更相勉勵而益勸於忠讜云慶元元年九月九日庚寅朝奉大夫提舉南京鴻慶宫婺源縣開國男食邑三百户賜紫金魚袋臣朱熹謹記福州州學經史閣記福州之學在東南為最盛弟子員常數百人比年以來教養無法師生相視漠然如路人以故風俗日衰士氣不作長老憂之而不能有以救也紹熙四年今教授臨卭常君濬孫始至既曰進諸生而告之以古昔聖賢斆學之意又為之飭厨饌葺齋館以寧其居然後謹其出入之防嚴其課試之法朝夕其間訓誘不倦於是學者競勸始知常君之為吾師而常君之視諸生亦閔閔焉唯恐其不能自勉以進於學也故嘗慮其無書可讀而業將病於不廣則又為之益置書史合舊為若干卷度故御書閣之後更為重屋以藏之而以書來請記其事且致其諸生之意曰願有以教之也豫惟古之學者無他明德新民求各止於至善而巳夫其所明之德所止之善豈有待於外求哉識其在我而敬以存之其亦可矣其所以必曰讀書云者則以天地隂陽事物之理修身事親齊家及國以至於平治天下之道與凡聖賢之言行古今之得失禮樂之名數下而至於食貨之源流兵刑之法制是亦莫非吾之度內有不可得而精粗者若非考諸載籍之文沉潛參伍以求其故則亦無以明夫明德體用之全而止其至善精微之極也然自聖學不傳世之為士者不知學之有本而唯書之讀則其所以求於書不越乎記誦訓詁文詞之間以釣聲名干祿利而巳是以天下之書愈多而理愈昧學者之事愈勤而心愈放詞章愈麗論議愈髙而其德業事功之實愈無以逮乎古人然非書之罪也讀者不知學之有本而無以為之地也今觀常君之為教既開之以古人斆學之意而後為之儲書以慱其問辨之趣建閣以致其奉守之嚴則亦庶乎本末之有序矣豫雖有言又何以加於此哉然無巳而有一焉則亦曰姑使二三子者知夫為學之本有無待於外求者而因以致其操存持守之力使吾方寸之間清眀純一真有以為讀書之地而後宏其規密其度循其先後本末之序以大玩乎閣中之藏則夫天下之理其必有以盡其纖悉而一以貫之異時所以措諸事業者亦將有本而無窮矣因序其事而并書以遺之二三子其勉之哉凡閣之役始於慶元𥘉元五月辛丑而成於七月之戊戍材甓傭食之費為錢四百萬有竒則常君既率其屬輸俸入以首事而帥守詹侯體仁使者趙侯像之許侯知新咸有以資之至於旁郡之守趙侯伯璝十二邑之長陳君羾等亦以其力來助而董其役者學之選士楊誠中張安仁蕭孔昭也是歲九月丁亥朝奉大夫提舉南京鴻慶宫新安朱熹記建昌軍南城縣吳氏社倉記乾道四年建人大飢熹請於官始作社倉於崇安縣之開耀鄊使貧民歲以中夏受粟於倉冬則加息什二以償歲小不收則弛其息之半大侵則盡弛之期以數年子什其母則惠足以廣而息可遂捐以豫民矣行之纍年人以為便淳熙辛丑熹以使事入奏因得條上其説而孝宗皇帝幸不以為不可即頒其法於四方且詔民有慕從者聽而官府母或與焉德意甚厚而吏惰不恭不能奉承以布于下是以至今幾二十年而江浙近郡田野之民猶有不與知者其能慕而從者僅可以一二數也是時南城貢士包揚方客里中適得尚書所下報可之符以歸而其學徒同縣吳伸與其弟倫見之獨有感焉經度久之乃克有就遂以紹熙甲寅之歲發其私榖四千斛者以應詔旨而大為屋以儲之涖事有堂燕息有齋前引兩廊對列六庾外為重門以嚴出內其為條約蓋因崇安之舊而加詳密焉即以其年散斂如法鄊之隱民有所仰食無復死徙變亂之虞咸以德於吳氏而伸與倫不敢當也則謹謝曰是倉之立君師之教祖考之澤而鄊鄰之助也吾何力之有哉且今雖幸及於有成而吾子孫之賢否不可知異時脫有不能如今日之志以失信於鄊人者則願一二父兄為我教之教之一再而不能從則巳非復吾子孫矣盍亦相與言之有司請正其罪庶其懼而有改其亦可也於是衆益咨嗟嘆息其賢以為不可及而包君以書來道其語且遣倫及伸之子振來請記熹病力不能文然嘉其意不忍拒也乃為之書其本末既以警夫吳氏之子孫使其數世之後猶有以知其前人之意如此而不忍壞抑使世之力能為而不肯為者有所羞愧勉慕而興起焉則亦所以廣先帝之盛德於無窮而又以少致孤臣泣血號穹之慕也慶元丙辰正月巳酉朱熹記平江府常熟縣學吳公祠記平江府常熟縣學吳公祠者孔門髙第弟子言偃子遊之祀也按太史公記孔門諸子多東州之士獨公為吳人而此縣有巷名子遊有橋名文學相傳至今圖經又言公之故宅在縣西北而舊井存焉則今雖不復可見而公為此縣之人蓋不誣矣然自孔子之沒以至于今千有六百餘年郡縣之學通祀先聖公雖以列得從腏食而其鄊邑乃未有能表其事而出之者慶元三年七月知縣事通直郎會稽孫應時乃始即其學官講堂之東偏作為此堂以奉祠事是歲中冬長日之至躬率邑之學士大夫及其子弟奠爵釋菜以妥其靈而以書來曰願有記也熹惟三代之前帝王之興率在中土以故德行道藝之教其行於近者著而人之觀感服習以入焉者深若夫句吳之墟則在虞夏五服是為要荒之外爰自太伯采藥荆蠻始得其民而端委以臨之然亦僅沒其身而虞仲之後相傳纍世乃能有以自通於上國其俗蓋亦朴鄙而不文矣公生其間乃獨能恱周公仲尼之道而北學於中國身通受業遂因文學以得聖人之一體豈不可謂豪傑之士哉今以論語考其話言類皆簡易踈通髙暢宏逹其曰本之則無者雖若見詘於子夏然要為知有本也則其所謂文學固皆有以異乎今世之文學矣既又考其行事則武城之政不小其邑而必以詩書禮樂為先務其視有勇足民之效蓋有不足為者至使聖師為之莞爾而笑則其與之之意豈淺淺哉及其取人則又以二事之細而得滅明之賢亦其意氣之感默有以相契者以故近世論者意其為人必當敏於聞道而不滯於形器豈所謂南方之學得其精華者乃自古而巳然也耶矧今全吳通為畿輔文物之盛絶異曩時孫君於此又能舉千載之闕遺稽古崇德以勵其學者則武城弦歌之意於是乎在故熹喜聞其事而樂為之書至於孔門設科之法與公之言所謂本所謂道及其所以取人者則願諸生相與勉焉以進其實使此邑之人百世之下復有如公者出而又有以一灑夫偷懦憚事無廉耻而耆飲食之譏焉是則孫君之志而亦熹之願也公之追爵自唐開元始封吳侯我朝政和禮書巳號丹陽公而紹興御贊猶有唐封至淳熙間所朌位次又改稱吳公云五年六月甲申具官封賜朱熹記晦庵先生朱文公文集卷第八十懷安縣儒學訓導葉暢校
