body:
  text: 書問答答袁機仲樞熹數日病中方得紬繹所示圖書卦畫二說𥘉若茫然不知所謂因復以妄作啓蒙考之則見其論之之詳而明者偶未深考是以致此紛紛多說而愈致疑耳夫以河圖洛書爲不足信自歐陽公以來巳有此說然終無奈顧命繋辭論語皆有是言而諸儒所傳二圖之數雖有交互而無乖戾順數逆推縱横曲直皆有明法不可得而破除也至如河圖與易之天一至地十者合而載天地五十有五之數則固易之所自出也洛書與洪範之初一至次九者合而具九疇之數則固洪範之所自出也繋辭雖不言伏羲受河圖以作易然所謂仰觀俯察近取逺取安知河圖非其中之一事耶大抵聖人制作所由初非一端然其法象之規模必有最親切處如鴻荒之世天地之間隂陽之氣雖各有象然初未嘗有數也至扵河圖之出然後五十有五之數竒偶生成粲然可見此其所以深發聖人之獨智又非汎然氣象之所可得而擬也是以仰觀俯察逺求近取至此而後兩儀四象八卦之隂陽竒偶可得而言雖繋辭所論聖人作易之由者非一而不害其得此而後决也來喻又謂熹不當以大衍之數參乎河圖洛書之數此亦有說矣數之爲數雖各主於一義然其參伍錯綜無所不通則有非人之所能爲者其所不合固不容以强合其所必合則縱横反覆如合符契亦非人所能強離也若扵此見得自然契合不假安排底道理方知造化功夫神妙巧宻直是好笑說不得也若論易文則自大衍之數五十至再扐而後掛便接乾之䇿二百一十有六至可與祐神矣爲一節是論大衍之數自天一至地十却連天數五至而行鬼神也爲一節是論河圖五十五之數今其文間斷差錯不相連接舛誤甚明伊川先生巳嘗釐正啓蒙雖依此冩而不曽推論其所以然者故覽者不之察耳至於卦畫之論反復來喻於熹之說亦多未究其底藴且如所論兩儀有曰乾之畫竒坤之畫偶只此乾坤二字便未穩當蓋儀匹也兩儀如今俗語所謂一䨇一對云爾自此再變至生第三畫八卦巳成方有乾坤之名當爲一畫之時方有一竒一偶只可謂之隂陽未得謂之乾坤也來喻又曰以二畫増至四畫爲二竒二偶又於四畫之上各増一竒一偶而爲八畫此亦是於熹圖中所說發生次第有所未明而有此語盖四象第一畫本只是前兩儀圖之一竒一偶縁此一竒一偶之上各生一竒一偶是以分而爲四而初畫之一竒一偶亦隨之而分爲四叚耳非是以二畫増成四畫又以四畫増成八畫也此一節正是前所謂自然契合不假安排之妙孔子而後千載不傳至康節先生始得其說然猶不肯大叚說破盖易之心髓全在此處不敢容易輕說其意非偶然也來喻又曰不知隂陽二物果可分老少而爲四象乎此恐亦考之未熟之過夬老少扵經固無明文然揲蓍之法三變之中掛扐四以竒偶分之然後爻之隂陽可得而辨又扵其中各以老少分之然後爻之變與不變可得而分經所謂用九用六者正謂此也若其無此則終日揲蓍不知合得何卦正使得卦不知當用何爻安得以爲後世之臆說而棄之乎又詳所論直以天地爲兩儀而天生神物以下四者爲四象此尤非是大抵曰儀曰象曰卦皆是指畫而言故曰易有太極而生兩儀四象八卦又曰易有四象而示人以卦爻吉凶若如所論則是先有太極兩儀四象然後聖人以畫八卦而兩儀四象八卦三物各是一種面貌全然相接不著矣此乃易之綱領如法律之有名例不可以豪釐差熹之所見判然甚明更無疑惑不審髙明以爲如何如其未然幸復有以見教也答袁機仲邵子曰太極旣分兩儀立矣此下四節通論伏羲六十四卦圎圖此一節以第一爻而言左一竒爲陽右一偶爲隂所謂兩儀者也今此一竒為左三十二卦之𥘉爻一偶為右三十二卦之𥘉爻乃以累変而分非夲即有此六十四叚也後放此陽上交於隂隂下交於陽而四象生矣此一節以第一爻生第二爻而言也陽下之半上交於隂上之半則生隂中第二爻之一竒一偶而為少陽太隂矣隂上之半下交於陽下之半則生陽中第二爻之一竒一偶而為太陽少隂矣所謂两儀生四象者也太陽一竒今分為左上十六卦之第二爻太隂一偶今分為右下十六卦之第二爻少陽太隂其分放比而𥘉爻之二亦分為四矣陽交於隂隂交於陽而生天之四象剛交於柔柔交扵剛而生地之四象此一節以第二爻生第三爻言也陽謂太陽隂謂太隂剛謂少陽柔謂少隂太陽之下半交於太隂之下半則生太隂中第三爻之一竒一偶而爲艮爲坤矣太隂之上半交於太陽之下半則生太陽中第三爻之一竒一偶而爲乾爲兊矣少陽之上半交於少隂之下半則生少隂中第三爻之一竒一偶而爲離爲震矣少隂之下半交於少陽之上半則生少陽中第三爻之一竒一偶而爲巽爲坎矣此所謂四象生八卦也乾一竒今分爲八卦之第三爻坤一偶今分爲八卦之第三爻餘皆放此而𥘉爻二爻之四今又分而爲八矣乾兊艮坤生於二太故爲天之四象離震巽坎生於二少故爲地之四象八卦相錯而後萬物生焉一卦之上各加八卦以相間錯則六十四卦成矣然第三爻之相交則生第四爻之一竒一偶於是一竒一偶各爲四卦之第四爻而下三爻亦分爲十六矣第四爻又相交則生第五爻之一竒一偶於是一竒一偶各爲二卦之第五爻而下四爻亦分而爲三十二矣第五爻又相交則生第六爻之一竒一偶則一竒一偶各爲一卦之第六爻而下五爻亦分而爲六十四矣盖八卦相乗爲六十四而自三畫以上三加一倍以至六畫則三畫者亦加二倍而卦體横分亦爲六十四矣其数殊塗不約而㑹如合符節不差毫釐正是易之妙處此來教所引邵先生說也今子細辨析奉呈幸詳考之方可見其曲折未遽可䡖議也然此巳是就六十四卦巳成之後言之故其先後多寡有難著語處乍㸔極費分踈猝然曉㑹不得若要見得聖人作易根原直截分明却不如且㸔卷首横圖自始𥘉只有兩畫時漸次㸔起以至生滿六畫之後其先後多寡既有次第而位置分明不費詞說於此㸔得方見六十四卦全是天理自然挨排出來聖人只是見得分明便只依本畫出元不曽用一毫智力添助盖本不煩智力之助亦不容智力得以助於其間也及至卦成之後逆順縦横都成義理千般萬種其妙無窮却在人㸔得如何而各因所見爲說雖若各不相資而實未嘗相悖也盖自𥘉未有畫時說到六畫滿處者邵子所謂先天之斈也卦成之後各因一義推說邵子所謂後天之斈也今來喻所引繋辭說卦三才六位之說即所謂後天者也先天後天旣各自爲一義而後天說中取義又多不同彼此自不相妨不可執一而廢百也若執此說必謂聖人𥘉畫卦時只見一箇三才便更不問事由一連便掃出三畫以擬其象畫成之後子細㸔來見使不得又旋劃擘添出後一半截此則全是私意杜撰𥙷接豈復更有易耶來喻條目尚多然其大節目不過如此今但於此看破則其餘小小未合處自當迎刃而觧矣故今不復悉辨以浼高明伏幸財察答袁機仲來教疑河圖洛書是後人僞作熹竊謂生於今世而讀古人之書所以能别其眞僞者一則以其義理之所當否而知之二則以其左驗之異同而質之未有舎此两塗而能直以臆度懸断之者也熹於世傳河圖洛書之舊所以不敢不信者正以其義理不悖而證驗不差爾來教必以爲僞則未見有以指其義理之繆證驗之差也而直欲以臆度懸㫁之此熹之所以未敢曲從而不得不辨也况今日之論且欲因象數之位置徃來以見天地隂陽之造化吉㐫消長之夲原苟於此未明則固未暇别㝷證㩀今乃全不㝷其義理亦未至明有證㩀而徒然爲此無益之辨是不議扵室而譟於門不味其腴而齩其骨也政使辨得二圖真僞端的不差亦無所用又况未必是乎碩且置此而於熹所推二圖之說少加意焉則雖未必便是眞圖然於象數本原亦當略見意味有歡喜處而圖之眞僞将不辨而自明矣來教疑先天後天之說據邵氏說先天者伏羲所畫之易也後天者文王所演之易也伏羲之易𥘉無文字只有一圖以寓其象數而天地萬物之理隂陽始終之變具焉文王之易即今之周易而孔子所爲作傳者是也孔子旣因文王之易以作傳則其所論固當專以文王之易爲主然不推本伏羲作易畫卦之所由則學者必将誤認文王所演之易便爲伏羲始畫之易只從中半說起不識向上根原矣故十翼之中如八卦成列因而重之太極两儀四象八卦而天地山澤雷風水火之類皆本伏羲畫卦之意而今新書原卦畫一篇亦分两儀伏羲在前文王在後必𣣔知聖人作易之本則當考伏羲之畫若只𣣔知今易書文義則但求之文王之經孔子之傳足矣两者𥘉不相妨而亦不可以相雜來教乃謂專爲邵氏觧釋而於易經無所折哀則恐考之有未詳也來教謂七八九六不可爲四象四象之名所包甚廣大抵須以两畫相重四位成列者爲正而一二三四者其位之次也七八九六者其數之實也其以隂陽剛柔分之者合天地而言也其以隂陽太少分之者專以天道而言也若專以地道言之則剛柔又自有太少矣推而廣之縦横錯綜凡是一物無不各有四者之象不但此數者而巳矣此乃天地之間自然道理未畫之前先有此象此數然後聖人畫卦時依様畫出揲蓍者又隨其所得掛扐過揲之數以合焉非是元無實體而畫卦揲蓍之際旋次安排出來也來喻於此見得未明徒勞辨說竊恐且當先向未畫前識得元有箇太極兩儀四象八卦底骨子方有啇量今未須遽立論也用九用六之文固在卦成之後而用九用六之理乃在卦成之前亦是此理但見得實體分明則自然觸處通透不勞辨說矣至謂七八九六乃揲蓍者所爲而非聖人之法此誤尤不難曉今且說揲蓍之法出於聖人耶出扵後世耶若據大傳則是出扵聖人無疑而當是之時若無七八九六則亦無所取决以見其爻之隂陽動静矣亦何以揲蓍爲哉此事前書辨之巳詳非熹之創見新說更請熟玩當自見之今不復縷縷也來喻又云繋辭本只是四象生八卦今又倍之兩其四象而生八卦之一此數字不可暁然想不足深辨請且於前所謂實體者驗之庶乎其有得也來教疑四爻五爻者無所主名一畫爲儀二畫爲象三畫爲卦則八卦備矣此上若旋次各加隂陽一畫則積至三重再成八卦者八方有六十四卦之名若徑以八卦徧就加乎一卦之上則亦如其位而得名焉方其四畫五畫之時未成外卦故不得而名之耳内卦爲貞外卦爲悔亦是畫卦之時巳有此名至揲蓍求之則九變而得貞又九變而得悔又是後一段事亦如前所論七八九六云爾非謂必揲蓍然後始有貞悔之名也大抵新書所論卦位與繋辭說卦容有異同至論揲蓍則只本繋辭何由别有他說如此等處至爲淺近而今爲說乃如此竊恐考之殊未詳也來教引伊川先生說重卦之由重卦之由不但伊川先生之說如此盖大傳亦云八卦成列因而重之矣但八卦所以成列乃是從太極兩儀四象漸次生出以至扵此畫成之後方見其有三才之象非聖人因見三才遂以巳意思惟而連畫三爻以象之也因而重之亦是因八卦之巳成各就上靣節次生出若旋生逐爻則更加三變方成六十四卦若併生全卦則只用一變便成六十四卦雖有遲速之不同然皆自然漸次生出各有行列次第畫成之後然後見其可盡天下之變不是聖人見下三爻不足以盡天下之變然後别生計較又并畫上三爻以盡之也此等皆是作易妙處方其畫時雖是聖人亦不自知裏靣有許多巧妙竒特直是要人細心體認不可草草立說也以上五條鄙意傾倒無復餘藴矣然此非熹之說乃康節之說非康節之說乃希夷之說非希夷之說乃孔子之說但當日諸儒旣失其傳而方外之流隂相付受以爲丹竈之術至於希夷康節乃反之於易而後其說始得復明扵世然與見今周易次第行列多不同者故聞者創見多不能暁而不之信只據目今見行周易縁文生義穿鑿破碎有不勝其杜撰者此啓蒙之書所爲作也若其習聞易曉人人皆能領略則又何必更著此書以爲屋下之屋牀上之牀哉更願髙明毋以爲熹之說而忽之姑且虚心遜志以求其通曉未可好髙立異而輕索其瑕疪也玩之乆熟浹洽扵心則天地變化之神隂陽消長之妙自將瞭扵心目之間而其可驚可喜可笑可樂必有不自知其所以然而然者矣言之不盡偶得小詩以寄鄙懐曰忽然半夜一聲雷萬戸千門次第開若識無心涵有象許君親見伏羲來說得太郎當了只少箇柱杖卓一下便是一回普說矣狂妄僣率幸勿鄙誚也答袁機仲伏承别紙誨諭諄悉及示新論尤荷不鄙但區區之說前此巳悉陳之而前後累蒙排擯揮斥亦巳不遺餘力矣今復下喻使罄其說顧亦何以異扵前口耶然旣辱開之使言則又不敢嘿嘿然其大者未易遽論姑郎來教一二淺者質之夫謂温厚之氣盛扵東南嚴凝之氣盛於西北者禮家之說也謂陽生於子於卦爲復隂生扵午扵卦爲姤者曆家之說也謂巽位東南乾位西北者說卦之說也此三家者各爲一說而禮家曆家之言猶可相通至於說卦則其卦位自爲一說而與彼二者不相謀矣今來教乃欲合而一之而其間又有一說之中自相乖戾者此熹所以不能無疑也夫謂東南以一隂巳生而爲隂柔之位西北以一陽巳生而爲陽剛之位則是陽之盛於春夏者不得爲陽隂之盛於秋冬者不得爲隂而反以其始生之㣲者爲主也謂一隂生於東南一陽生於西北則是隂不生於正南午位之遇而淫於東陽不生於正北子位之復而旅於西也謂巽以一隂之生而位乎東南則乾者豈一陽之生而位於西北乎况說卦之本文扵巽則但取其㓗齊扵乾則但取其戰而巳而未嘗有一隂一陽始生之說也凢此﨑嶇反復終不可通不若直以陽剛爲仁隂柔爲義之明白而簡易也盖如此則發生爲仁肅殺爲義三家之說皆無所牾肅殺雖似乎剛然實天地収歛退藏之氣自不妨其爲隂柔也來教又論黒白之位尤不可曉然其圖亦非古法但今欲易暁且爲此以寓之耳乾則三位皆白三陽之象也兊則下二白而上一黒下二陽而上一隂也離則上下二白而中一黒上下二陽而中一隂也震則下一白而上二黒下一陽而上二隂也巽之下一黒而上二白坎之上下二黒而中一白艮之下二黒而上一白坤之三黒皆其三爻隂陽之象也蓋乾兊離震之初爻皆白巽坎艮坤之初爻皆黒四卦相間兩儀之象也乾兊巽坎之中爻皆白離震艮坤之中爻皆黒兩卦相間四象之象也乾離巽艮之上爻皆白兊震坎坤之上爻皆黒一卦相間八卦之象也豈有震坎皆黒而如坤巽離皆白而如乾之理乎此恐畫圖之誤不然則明者察之有未審也凡此乃易中至淺至近而易見者契丈猶未之盡而況其體大而義深者又安可容易輕忽而遽加詆誚乎此熹所以不敢索言蓋恐其不足以解左右者之惑而益其過也幸試詳之若熹所言略有可信則願繼此以進不敢吝也又讀來書以爲不可以仁義禮智分四時此亦似太草草矣夫五行五常五方四時之相配其爲理甚明而爲說甚乆非熹獨於今日創爲此論也凡此之類竊恐髙明考之未詳思之未審而卒然立論輕肆詆訶是以前此區區所懐不欲盡吐於老丈之前者尚多此其爲訑訑之聲音顔色大矣若欲實求義理之歸恐當去此而虚以受人庶㡬乎其有得也僣易皇恐熹又禀答袁機仲别幅乾於文王八卦之位在西北於十二卦之位在東南坤於文王八卦之位在西南於十二卦之位在西北故今圖子列文王八卦於内而布十二卦於外以見彼此位置逈然不同雖有善辯者不能合而一之也然十二卦之說可曉而八卦之說難明可曉者當推難明者當闕按圖以觀則可見矣論十二卦則陽始於子而終於巳隂始於午而終於亥論四時之氣則陽始於寅而終於未隂始於申而終於丑此二說者雖若小差而所争不過二位盖子位一陽雖生而未出乎地至寅位㤗卦則三陽之生方出地上而温厚之氣從此始焉巳位乾卦六陽雖極而温厚之氣未終故午位一隂雖生而未害於陽必至未位遯卦而後温厚之氣始盡也其午位隂已生而嚴凝之氣及申方始亥位六隂雖極而嚴凝之氣至丑方盡義亦放此盖地中之氣難見而地上之氣易識故周人以建子爲正雖得天綂而孔子之論爲邦乃以夏時爲正盖取其隂陽始終之著明也按圖以推其說可見來喻謂坤之上六陽氣巳生其位在亥乾之上九隂氣巳生其位在巳以剥上九碩果不食十月爲陽月之義推之則剥卦上九之陽方盡而變爲純坤之時坤卦下爻巳有陽氣生於其中矣但一日之内一畫之中方長得三十分之一必積之一月然後始滿一畫而爲復方是一陽之生耳夬之一隂爲乾爲遇義亦同此來俞雖有是說而未詳宻故爲推之如此盖論其始生之㣲固巳可名於隂陽然便以此爲隂陽之限則其方盛者未替而所占不啻卦内六分之五方生者甚㣲而所占未及卦内六分之一所以未可截自此處而分隂陽也此乃十二卦中之一義與復遇之說理本不殊但數變之後方說得到此不可攙先輥說亂了正意耳來諭又謂冬春爲陽夏秋爲隂以文王八卦論之則自西北之乾以至東方之震皆父與三男之位也自東南之巽以至西方之兊皆母與三女之位也故坤蹇解卦之彖辭皆以東北爲陽方西南爲隂方然則謂冬春爲陽夏秋爲隂亦是一說但說卦又以乾爲西北則隂有不盡乎西以巽爲東南則陽有不盡乎東又與三卦彖辭小不同此亦以來書之說惟之而說卦之文適與彖辭相爲表裏亦可以見此圖之出於文王也但此自是一說與他說如十二卦之類各不相通爾來喻以東南之温厚爲仁西北之嚴凝爲義此鄕飲酒義之言也然本其言雖分仁義而無隂陽柔剛之别但於其後復有陽氣發於東方之說則固以仁爲屬乎陽而義之當屬乎隂從可推矣來諭乃不察此而必𣣔以仁爲柔以義爲剛此既失之而又病夫柔之不可屬乎陽剛之不可屬乎隂也於是彊以温厚爲柔嚴凝爲剛又移北之隂以就南而使主乎仁之柔移南之陽以就北而使主乎義之剛其於方位氣候悉反易之而其所以爲說者率皆参差乖迕而不可合又使東北之爲陽西南之爲隂亦皆得其半而失其半愚於圖子巳具見其失矣盖嘗論之陽主進而隂主退陽主息而隂主消進而息者其氣彊退而消者其氣弱此隂陽之所以爲柔剛也陽剛温厚居東南主春夏而以作長爲事隂柔嚴凝居西北主秋冬而以歛藏爲事作長爲生歛藏爲殺此剛柔之所以爲仁義也以此觀之則隂陽剛柔仁義之位豈不曉然而彼楊子雲之所謂於仁也柔於義也剛者乃自其用處之末流言之蓋亦所謂陽中之隂隂中之陽固不妨自爲一義但不可以雜乎此而論之爾向日妙湛蓋嘗靣禀易中卦位義理層數甚多自有次第逐層各是一箇體靣不可牽彊合爲一說學者湏是旋次理㑹理㑹上層之時未要攪動下層直待理㑹得上層都透徹了又却輕輕掲起下層理㑹將去當時雖似遲鈍不快人意然積累之乆層層都了却自見得許多條理千差萬别各有歸著豈不快哉若不問淺深不分前後輥成一塊合成一說則彼此相妨令人分踈不下徒自紛紛成鹵芥矣此是平生讀書巳試之效不但讀易爲然也前書所論仁義禮智分屬五行四時此是先儒舊說未可輕詆今者來書雖不及之然此大義也或恐前書有所未盡不可不究其說盖天地之間一氣而巳分隂分陽便是两物故陽為仁而隂為義然隂陽又各分而為二故陽之𥘉爲木爲春爲仁陽之盛爲火爲夏爲禮隂之𥘉爲金爲秋爲義隂之極爲水爲冬爲智盖仁之惻隱方自中出而禮之恭敬則巳盡發於外義之羞悪方自外入而智之是非則巳全伏於中故其象類如此非是假合附㑹若能黙㑹於心便自可見元亨利貞其理亦然文言取類尤爲明白非區區今日之臆說也五行之中四者既各有所属而土居中宫爲四行之地四時之主在人則爲信為真實之義而爲四德之地衆善之主也五聲五色五臭五味五藏五䖝其分放此盖天人一物内外一理流通貫徹𥘉無間隔若不見得則雖生於天地間而不知所以爲天地之理雖有人之形貌而亦不知所以爲人之理矣故此一義切於吾身比前数叚尤爲要緊非但小小節目而巳也答袁機仲埀諭易說又見講學不倦下問不能之盛羙尤竊欽仰已悉鄙意别𥿄具呈矣此但易中卦畫隂陽之分位耳未是吾人切身之事萬一愚見未合盛意可且置之而更别向裏㝷求恐合自有緊切用功處也答袁機仲再辱垂喻具悉尊㫖然細觀夲末𥘉無所争只因武陵舊圖仁義两字偶失照𬋩致有交互其失甚㣲後來既覺仁字去西北方不得義字去東南方不得即當就此分明改正便無一事顧乃護其所短而𣣔多方作計移換隂陽剛柔四字以盖其失所以競辨紛紜以至于今而不能定也盖始者先以文王八卦爲說而謂一隂生於巽一陽生於乾則既非說卦夲意矣其以二陽純乾之方爲一陽始生之地則又爲乖刺之甚者及既知而又以十二卦爲說而謂一隂生於乾之上九一隂生於坤之上六遂移北方之隂柔以就南使之帶回仁字於西南而不失其爲隂柔移南方之陽剛以帰北使之帶囬義字於東北而不失其陽剛則亦巧矣然其所移動者凡二方而六辰六卦例皆失其舊主又更改却古來隂陽界限盖不勝其煩優而其所𣣔遷就之意乃不過僅得其半而失其半盖北方雖曰嚴凝而東方巳爲温厚南方雖曰温厚而西方巳爲嚴凝也是則非惟不足以救舊圖一時之失而其恥過作非故為穿鑿之咎反有甚於前日者竊恐高明於此急於求勝未及深致思也𣣔䆒其說以開盛意又念空言繳繞難曉易差不免畫成一圖先列定位而後别以舊圖之失及今者两次所論之意隨事貼說有不盡者則又詳言别爲數條以附於後切望虚心平氣細考而徐思之若能於此翻然悔悟先取舊圖分明改正仁義二字却將今所移易隂陽剛柔等字一切發回元來去處如熹新圖之本位則易簡圓成不費詞說而三才五行天理人事巳各得其所矣至於文王八卦則熹嘗以卦畫求之縱横反覆竟不能得其所以安排之意是以畏懼不敢妄爲之說非以爲文王後天之學而忽之也夫文王性與天合乃生知之大聖而後天之學方恨求其說而不得熹雖至愚亦安敢有忽之之心耶但如來書所論則不過是因其巳定之位巳成之說而應和賛歎之爾若使文王之意止於如此則熹固巳識之不待深思而猶病其未得矣故嘗竊謂髙明之於此圖尊之雖至信之雖篤而所以知之則恐有不如熹之深者此又未易以言語道也至如邵氏以此圖爲文王之學雖無所考然說卦以此列於天地定位雷以動之兩節之後而其布置之法逈然不同則邵氏分之以屬於伏羲文王恐亦不爲無理但未暁其根源則姑闕之以俟知者亦無甚害不必卓然肆意立論而輕排之也又謂一竒一偶不能生四象而二竒二偶不能生八卦則此一圖極爲易暁又不知老丈平時作如何㸔而今日猶有此疑也盖其𥘉生之一竒一偶則两儀也一竒之上又生一竒一偶則爲二畫者二而謂之太陽少隂矣一耦之上亦生一竒一耦則亦爲二畫者二而謂之少陽太隂矣此所謂四象者也四象成則两儀亦分爲四太陽竒畫之上又生一竒一偶則爲上爻者三而謂之乾兊矣餘六條凖此此則所謂八卦者也八卦成則两儀四象皆分爲八是皆自然而生瀵湧而岀不假智力不犯手勢而天地之文萬事之理莫不畢具乃不謂之畫前之易謂之何哉僕之前書固巳自謂非是古有此圖只是今目以意爲之冩出竒偶相生次第令人易曉矣其曰畫前之易乃謂未畫之前巳有此理而特假手於聦明神武之人以發其祕非謂畫前巳有此圖畫後方有八卦也此是易中第一義也若不識此而𣣔言易何異舉無綱之網挈無領之裘直是無著力處此可爲知者道也目疾殊甚不能親書切幸深照第四畫者以八卦爲太極而復生之两儀也第五畫者八卦之四象也第六畫者八卦之八卦也再㸔來書有此一項此書未答故復及之熹又禀答袁機仲易說不知尊意看得如何前書所云二方六卦六辰皆失其所與得半失半之說後來思之亦有未盡蓋徙陽於北使陽失其位而奪隂之位徙隂於南使隂失其位而奪陽之位二方固巳病矣東方雖得仍舊爲陽然其温厚之仁不得南與同類相合而使疆附於北方嚴凝之義不則却湏改仁爲義以去隂而就陽方得寧貼然又恐無此理是東方三卦三辰亦失其所也西方雖得仍舊爲隂然其離北附南與夫改義爲仁其勢亦有所不便是西方三卦三辰亦失其所也蓋移此二方而四方八靣十二辰十二卦一時鬼亂無一物得安其性命之情也前書所禀殊未及此之明白詳盡也答袁機仲易說巳悉若只如此則熹固巳深曉不待諄諄之告矣所以致疑正恐髙明之見有所未盡而費力穿鑿使隂陽不得據其方盛之地仁義不得保其一徳之全徒爾紛紜有損無益爾今旣未蒙省察執之愈堅則區區之愚尚復何說竊意兩家之論各自爲家公之不能使我爲公猶我之不能使公爲我也不若自此閉口不談各守其說以俟羲文之出而質正焉然以髙明之見自信之篤竊恐羲文復出亦未肯信其說也魏鄭公之言以爲望獻陵也若昭陵則臣固已見之矣佛者之言曰諸人知處良遂㧾知良遂知處諸人不知正此之謂矣世間事吾人身在閑處言之無益此正好從容講論以慰窮愁而枘鑿之不合又如此是亦深可歎者而信乎其道之窮矣答袁機仲易說垂示極荷不鄙然淺陋之見前已屢陳至煩訶斥乆矣今復何敢有言但詳序說諸篇唯是依經說理而不惑於諸儒臆說之鑿此爲一書要切之㫖今以篇中之說考之則如繋辭說卦解兩引禮記以春作夏長爲仁秋歛冬藏爲義說卦觧又獨引温厚之氣始於東北盛於東南嚴凝之氣始於西南盛於東北以爲仁義之分此於經旣有据又合於理之自然眞可謂不惑於諸儒臆說之鑿矣但其所以爲說則又必以爲聖人恐乾止有陽剛而無仁坤止有隂柔而無義故必兼三才以爲六畫然後能使乾居東北而爲冬春之陽坤居西南而爲夏秋之隂又必横截隂陽各爲兩叚以分仁義之界然後能使春居東而爲乾之仁夏居南而爲坤之仁秋居西而爲坤之義冬居北而爲乾之義此非本書之詞但以鄙意注觧如此庻覧者之易暁耳則其割裂𥙷綴破碎參差未知於經何所据依而何以異於諸儒臆說之鑿也又按文王孔子皆以乾爲西北之卦艮爲東北之卦顧雖未能洞曉其所以然然經有明文不可移易則巳審矣今乃云乾位東北則是貶乾之尊使居艮位未知使艮却居何處此又未知於經何所据依而何以異於諸儒臆說之鑿也又按孔子明言易有太極是生兩儀是則固以太極爲一兩儀爲二而凡有心有目者皆能識之不待推暦布筭而後可知也今太極論乃曰乾坤者易之太極則以是兩儀爲太極而又使之自生兩儀矣未知此於經何所据依而又何以異於諸儒臆說之鑿也至繋辭解又謂太極者一之所由起則是又以爲太極之妙一不足以名之而其序則當且生所起之一而後再變乃生兩儀矣此則又未暇論其於經有無据依是與不是諸儒臆說之鑿而但以前論參之巳有大相矛盾者不審髙明之意果何如也凡此四條熹皆不敢輙以爲非以觸尊怒但所未曉不敢不求教耳答袁機仲誨諭參同邵氏不知易之說辨博髙深非淺陋所能窺測但參同之書本不爲明易乃姑借此納甲之法以寓其行持進退之候異時每欲學之而不得其傳無下手處不敢輕議然其所言納甲之法則今所傳京房占法見於火珠林者是其遺說沈存中筆談解釋甚詳亦自有理參同所云甲乙丙丁庚辛者乃以月之昏旦出没言之非以分六卦之方也此雖非爲明易而設然易中無所不有苟其言自成一說可推而通則亦無害扵易恐不必䡖肆詆排也至於邵氏先天之說則有推本伏羲畫卦次第生生之妙乃是易之宗柤尤不當率爾妄議或未深曉且當置而不論以謹闕疑若必以爲不知易則如熹輩尚何足與言易而每煩提耳之勤也旣荷不鄙不敢不盡其愚其他如六五坤承向亦疑有誤字見扵考異而所示十二卦圗以姤爲子以復爲午亦所未喻所引坎離無爻位亦有脫字此或只是筆誤皆未暇論也答趙提舉善譽慕用之乆徃歳雖辱寵臨而倥偬卒迫不能少欵每以爲恨近乃竊窺所著易論語書又歎其得之之晩而不獲親扣名理也間因虞君轉請所疑初未敢以姓名自通而髙明不鄙逺辱貽書所以傾倒之意甚厚三復以還感慰亡量不敢無以報也蓋道體之大無窮而於其間文理密察有不可以毫釐差者此聖賢之語道所以旣言發育萬物峻極于天以形容其至大而又必曰禮儀三百威儀三千以該悉其至㣲而其指示學者脩徳凝道之功所以既曰致其廣大而又必曰盡其精㣲也近世之言道者則不然其論大抵樂渾全而忌剖析喜高妙而略細㣲其於所謂廣大者則似之而於精㣲有不察則其所謂廣大者亦未易以議其全體之眞也今且以經言論之其所發明固不外乎一理然其所指則不能無異同之别而就其所同之中蓋亦不無賔主親踈逺近之差焉如卦之所以八者以竒偶之三加而成也而爻之所以三則取諸三才之象而非竒偶所能與此理之一而所指之不同者也四象之說本爲畫卦則當以康節之說爲主而七八九六東西南北水火金木之類爲客得其主則客之親踈逺近皆即此而可定不得其主而曰是皆一說則我欲同而彼自異終有不可得而同者矣此所指之同而不能無賔主之分者也是皆樂渾全而忌剖析之過也至於乾坤之純而不雜者聖人所以形容天地之徳而爲六十四卦之綱也乾之純於剛健而不雜又聖人所以形容天理自然之全體而爲坤之綱也所以賛其剛健柔順之全徳以明聖人體道之妙學者入徳之方者亦云備矣未嘗以其偏而少貶之也至於諸爻雖或不免於有戒然乾九三之危以其失中也其得無咎以其徤而徤也坤六五之元吉以其居尊而能下也上六之龍戰以其太盛而亢陽也是豈惡乾之剛而𣣔其柔惡坤之柔而𣣔其剛哉今未察乎其精㣲之藴而遽指其偏以爲當戒意若有所未足於乾坤而陿小之者是不亦喜髙妙而略細㣲之過乎至於用九用六乃爲戒其剛柔之偏者然亦因其隂變爲陽陽變爲隂之象而有此戒如歐陽子之云者非聖人創意立說而強爲之也大抵易之書本爲卜筮而作故其詞必根於象數而非聖人巳意之所爲其所勸戒亦以施諸筮得此卦此爻之人而非反以戒夫卦爻者近世言易者殊不知此所以其說雖有義理而無情意雖大儒先生有所不免比因玩索偶幸及此私竊自慶以爲天啓其衷而以語人人亦未見有深暁者不知髙明以爲如何舊亦草筆其說今謾録二卦上呈其他文義未瑩者多未能卒業姑以俟後世之子雲耳近又嘗編一小書略論象數梗槩并以爲獻妄竊自謂學易而有意於象數之說者於此不可不知外此則不必知也心之精㣲言不能盡臨風引領馳想増劇答趙提舉易學未蒙指教乃有簡易之襃令人踧踖其書草略何足以當此然此二字在易數中眞不可易之妙近世說易者愈多而此理愈晦非見之明孰能以一言盡之哉歎伏亡巳近嘗略修數處㝷别寄呈但圖書錯綜縱横無不脗合終有不可得而盡者信乎天地之文非人之私智所能及也與周益公熹竊以孟夏清和伏惟判府安撫少保大觀文丞相國公鈞候動止萬福熹近嘗拜書并胡先生墓文請教今者至城中乃知未遣巳白史君趣其行諒亦非乆當徹鈞聴也熹有少懇率易拜禀熹先君子少喜學荆公書收其墨蹟爲多其一𥿄乃進鄴侯家傳奏草味其詞㫖玩其筆勢直有跨越古今開闔宇宙之氣然與今版本文集不同疑集中者乃刪潤定本而此𥿄乃其胷懐本趣也嘗欲抄目録李傳本語附其後而并刻之使後之君子得以考焉而未暇也今江西使者汪兄季路乃欲取而刻之臨川妄意欲亦爲忠宣所刪也忠宣固賢然其規模氣象似與文正有未盡同者深諱此事雖不害爲守正然未得爲可與權也不審髙明以爲如何少日見徐玉丈端立自言嘗見石林疑范馬鍾律之辨乃故爲同異以釋朋比之疑者因告之曰此事信否未可知然爲此論者亦可謂不占便冝矣石林爲之一笑而罷今日之論恐或類此故并及之僭率皇恐切望矜恕答周益公前者累蒙誨諭范碑曲折考据精博論議正平而措意深逺尤非常情所及又得吕子約録記所𬒳教墨參互開發其辨益明熹之孤陋得與聞焉幸巳甚矣復何敢措一詞於其間哉然隱之於心竊有所不能無疑者盖嘗竊謂吕公之心固非晩生所能窺度然當其用事之時舉措之不合衆心者盖亦多矣而又惡忠賢之異巳必力排之使不能容於朝廷而後巳是則一世之正人端士莫不惡之况范歐二公或以諷議爲官或以諫諍爲職又安可置之而不論且論之而合於天下之公議則又豈可謂之太過也哉逮其晩節知天下之公議不可以終拂亦以老病將歸而不復有所畏忌又慮夫天下之事或終至於危亂不可如何而彼衆賢之排去者或將起而復用則其罪必歸於我而并及於吾之子孫是以寜損故怨以爲收之桑榆之計蓋其慮患之意雖未必盡出於至公而其𥙷過之善天下實𬒳其賜則與世之遂非長惡力戰天下之公議以貽患於國家者相去逺矣至若范公之心則其正大光明固無宿怨而惓惓之義實在國家故承其善意既起而樂為之用其自訟之書所謂相公有汾陽之心之徳仲淹無臨淮之才之力者亦不可不謂之傾倒而無餘矣此書今不見於集中恐亦以忠宣刋去而不傳也此最為范公之盛徳而他人之難者歐陽公亦識其意而特書之蓋吕公前日之貶范公自爲可罪而今日之起范公自爲可書二者各記其實而羙惡𥘉不相掩則又可見歐公之心亦非淺之爲丈夫矣今讀所賜之書而求其指要則其言若曰吕公度量渾涵心術精深所以期於成務而其用人才徳兼取不爲諸賢專取徳望之偏故范歐諸公不足以知之又未知其諸子之賢而攻之有太過者後來范公雖爲之用然其集中歸重之語亦甚平平蓋特州郡之常禮而實則終身未嘗解仇也其後歐公乃悔前言之過又知其諸子之賢故因范碑託爲解仇之語以見意而忠宣獨知其父之心是以直於碑中刋去其語雖以取怒於歐公而不憚也凡此曲折指意微密必有不苟然者顧於愚見有所未安不敢不詳布其說以求是正伏惟恕其僭易而垂聴焉夫吕公之度量心術期以濟務則誠然矣然有度量則宜有以容議論之異同有心術則宜有以辨人才之邪正欲成天下之務則必從善去惡進賢退姦然後可以有濟今皆反之而使天下之勢日入於昏亂下而至於區區西事一方之病非再起范公㡬有不能定者則其前日之所爲又惡在其有度量心術而能成務也哉其用人也欲才徳之兼取則亦信然矣然范歐諸賢非徒有徳而短於才者其於用人蓋亦兼收而並取雖以孫元規滕子京之流恃才自肆不入規矩亦皆将護容養以盡其能而未嘗有所廢棄則固非專用徳而遺才矣而吕公所用如張李二宋姑論其才亦决非能優於二公者乃獨去此而取彼至於一時豪俊跅弛之士窮而在下者不為無人亦未聞其有以羅致而器使之也且其𥘉觧相印而薦王随陳堯佐以自代則未知其所取者為才也耶為徳也耶是亦不足以自觧矣若謂范歐不足以知吕公之心又不料其子之賢而攻之太過則其所攻事皆有迹顯不可揜安得為過且為侍從諌諍之官為國論事乃視宰相子弟之賢否以爲前却亦豈人臣之誼哉若曰范吕之仇𥘉未嘗解則范公旣以吕公而再逐及其起任西事而超進職秩乃適在吕公三入之時若范公果有怨於吕公而不釋乃閔黙受此而無一語以自明其前日之志是乃内懐憤毒不能以理自勝而但以貪得羙官之故俛而受其籠絡爲之驅使未知范公之心其肯爲此否也若曰歐公晩悔前言之失又知其諸子之賢故因范碑以自解則是畏其諸子之賢而欲隂爲自託之計於是寧賣死友以結新交雖至以無爲有愧負幽冥而不遑恤又不知歐公之心其忍爲此否也况其所書但記解仇之一事而未嘗并譽其他羙則前日斥逐忠賢之罪亦未免於所謂欲蓋而彰者又何足以贖前言之過而媚其後人也哉若論忠宣之賢則雖亦未易輕議然觀其事業規模與文正之洪毅開豁終有未十分肖似處蓋所謂可與立而未可與權者乃翁解仇之事度其心未必不深恥之但不敢出之扵口耳故濳扵墓碑刋去此事有若避諱然者歐公以此深不平之至屢見扵書䟽非但墨莊所記而巳况龍川志之扵此又以親聞張安道之言爲左驗張實吕黨尤足取信無疑也若曰范公果無此事而直為歐公所誣則為忠宣者正當沬血飲泣貽書歐公具道其所以然者以白其父之心迹而俟歐公之命以為進退若終不合則引義告絶而更以屬人或姑無刻石而待後世之君子以定其論其亦可也乃不出此而直於成文之中刋去數語不知此為何等舉措若非實諱此事故隱忍寢黙而不敢誦言則曷為其不為彼之明白而直為此黯闇耶今不信范公出處文辭之實歐公丁寕反復之論而但取於忠宣進退無據之所為以為有無之决則區區於此誠有不能識者若摭實而言之但曰吕公前日未免蔽賢之罪而其後日誠有𥙷過之功范歐二公之心則其終始本末如青天白日無纎毫之可議若范公所謂平生無怨惡於一人者尤足以見其心量之廣大髙明可為百世之師表至於忠宣則所見雖狹然亦不害其為守正則不費詞說而名正言順無復可疑矣不審尊意以爲如何狂瞽之言或未中理得賜鐫曉千萬幸甚後書誨諭又以昭録不書解仇之語而斷其無有則熹以為吕公拜罷范公進退旣直書其嵗月則二公前憾之釋然不待言而喻矣不然則昭録書成歐公固巳不爲史官而正獻忠宣又皆巳爲時用范固不以墓碑全文上史氏而吕氏之意亦恐其有所未快於歐公之言也是以姑欲置而不言以泯其迹而不知後世之公論有不可誣者是以啓今日之紛紛耳如又不然則范公此舉雖其賢子尚不能識彼爲史者知之必不能如歐公之深或者過爲隱避亦不足恠恐亦未可以此而定其有無也墨莊之録出於張邦基者不知其何人其所記歐公四事以爲得之公孫當世而子約以爲紹興舎人所記此固未知其孰是但味其語意實有後人道不到處疑或有自來耳若談叢之書則其記事固有得於一時傳聞之誤者然而此病在古雖遷固之愽近世則温公之誠皆所不免况扵後世雖頗及見前輩然其平生蹤跡多在田野則其見聞之間不能盡得事實冝必有之恐亦未可以此便謂非其所著也丹朱之云誠爲太過然歐公此言嘗爲令孤父子文字繁簡而發初亦無大羙惡但似一時語勢之適然不暇擇其擬倫之輕重耳故此言者雖未敢必其爲公之言而亦未可定其非公之言也此等數條不足深論然偶因餘誨之及而并講之使得皆蒙裁正則亦不爲無小𥙷者唯是所與子約書中疑學道三十年爲後學之言者則熹深惑焉而尤以爲不可以不辨不審明公何所惡扵斯言而疑之也以道爲髙逺玄妙而不可學邪則道之得名正以人生日用當然之理猶四海九州百千萬人當行之路爾非若老佛之所謂道者空虚寂㓕而無與於人也以道爲迂逺踈闊而不必學耶則道之在天下君臣父子之間起居動息之際皆有一定之明法不可頃刻而暫廢故聖賢有作立言垂訓以著明之巨細精粗無所不備而讀其書者必當講明究索以存諸心行諸身而見諸事業然後可以盡人之職而立乎天地之間不但玩其文詞以爲綴緝纂組之工而巳也故子游誦夫子之言曰君子學道則愛人小人學道則易使而夫子是之則學道云者豈近世後學之言哉若謂歐公未嘗學此而不當以此自名耶則歐公之學雖於道體猶有欠闕然其用力於文字之間而泝其波流以求聖賢之意則於易於詩於周禮於春秋皆嘗反復窮究以訂先儒之繆而本論之篇推明性善之說以爲息邪距詖之本其賢於當世之號爲宗工巨儒而不免扵祖尚浮虚信惑妖妄者又逺甚其於史記善善惡惡如唐六臣傳之屬又能深究國家所以廢興存亡之㡬而爲天下後世深切著明之求鑒者固非一端其他文說雖或出於遊戲翰墨之餘然亦隨事多所發明而詞氣譪然寛平深厚精切的當眞韓公所謂仁義之人者恐亦未可謂其全不學道而直以燕許楊劉之等期之也若謂雖嘗學之而不當自命以取髙摽掲巳之嫌耶則爲士而自言其學道猶爲農而自言其服田爲賈而自言其通貨亦非所以爲夸若韓公者至乃自謂巳之道乃夫子孟軻楊雄所傳之道則其言之不讓益甚矣又可指爲後生之語而疑之耶凡此又皆熹之所未諭者蓋嘗反復思之而竟不得其說恭惟明公以事業文章而論世尚友其於范歐之間固巳異世而同轍矣至於慱觀今昔考訂是非又非肯妄下雌黄者且扵六一之文收拾編彚讎正流通用力爲多其於此事必不草草況又當此正道湮㣲異言充塞之際餘論所及小有左右則其輕重厚薄便有所分竊計念之巳熟而處之亦巳精矣顧熹之愚獨有未能無疑者是以不敢默黙而不以求正於有道所恨偽學習氣巳深不自覺其言之狂妄伏惟高明恕而教之則熹不勝千萬幸甚與留丞相别𥿄伏蒙别𥿄垂諭楊至曲折不勝皇恐熹前此本以異議得罪於丞相幸蒙矜察今又失扵周防有此踈脫意必巳重得罪而遂見絶矣不謂丞相采聽不遺洞見底藴至扵誨諭之詳雖使熹自爲辯數不過如此幸甚然聞州縣奉行之間不無觀望囚繋箠撻横及無辜程督之嚴至今未解逺近傳聞過有疑論此殆未知丞相與其外家自有契分而仁心曠度本不忍使其狼狼至此也熹旣蒙鐫誨感懼之深尚恐未有以此聞于鈞聽者輒復禀白伏惟照察千萬幸甚與留丞相前此蒙喻楊至秀才事率易報禀似聞巳荷寛慈許以容恕足見大人之度至公無我有如此者不勝敬服然聞有司尚以前日符移之峻追捕未巳其人至今竄伏無所容寄有足矜者如蒙推念更得一言明喻所屬罷其捕逮仍俾互相關白使知盛徳雅量不讎匹夫之意則此人終受賜矣熹辱知素厚不敢復避嫌疑而冐昧及此并冀容察皇恐死辠答留丞相李通判歸出示所賜手教拜領伏讀慰幸巳深至於垂喻諄複勤懇則又竊仰德盛禮恭樂取諸人不難舎巳之意蓋有一介布衣之士所不易者歎慕感激所得多矣前此偶因垂問率易呈獻亦以姑備燕申餘暇遮服止睡之湏不謂乃蒙親賜點閱日有程課以及終篇而斟酌取予詳審精切又有專門名家所不逮者此周公執贄還贄之心畢公克勤小物之意此所以爲聖賢之盛節而非近世諸公所及也熹雖凡陋然其用力於此不爲不乆而歷選平生講磨論說其得此於人蓋鮮不意臨老乃有遇於明公也更有它書欲遂傾囷倒廪以跪進於几下而私居乏人艱於繕冩少假歳月當遂此心儻得一一悉䝉印證則亦足以自信而無憾扵方來矣顧所不能無恨者猶以登門之晩而其質疑請益乃有十年之遟伏想明公扵此亦不能不慨然其間也謹因李倅還便奏記叙謝目昏不得謹好尤以皇懼并乞矜察與曽裘父求仁之方竊意潜心乆矣方恨未獲躬扣昨欽夫寄示送行序文其說似皆的當不審高明以爲如何與曽裘父向聞垂意魯論聖門親切指要正在此書想所造日以深矣恨未得聞一二也敬夫得書否比來講論尤精宻亦嘗相與講所疑否元履遇合非常未知所以稱塞士友盖多榮之而熹竊有懼焉想高懐正如此當有以警䇿之也與曽裘父敬夫爲元履作齋銘嘗見之否謾納一夲其言雖約然大學始終之義具焉恐可寘左右也崇安二公祠記熹所妄作輙徃求教雖不及改尚警其後也答黃叔張維之示及三書感感誠立誠通之論誠如尊喻不敢多遜竊意自有此書無人與之思索至此西銘太極諸說亦皆積數十年之功無一字出私意釋氏以胷襟流出爲極則以今觀之天地之間自有一定不易之理要當見得不假毫髮意思安排不著毫髮意見夾雜自然先聖後聖如合符節方是究竟處也答耿直之秉熹生長窮僻少日所聞於師友者不過脩身窮理守正俟命之說雖行之不力有愧夙心亦未嘗敢舎之而從人也頃歳入浙從士大夫游數月之間凡所聞者無非枉尺直㝷苟容偷合之論心竊駭之而獨扵執事者見其綜理名實直道而行卓然非當世之士也顧雖未及一見而職事之間適相首尾乃有不約而合者於是始復益信前日心期之不偶然也兹者又承示及所與學官弟子講論之說不唯有以見賢侯在泮弦歌之盛而濳心大業體用圎融之妙所以警發昧陋者又爲深切三復欣幸不知所言然頃於此書粗嘗討究亦見前輩之說有如此者因以文義求之竊疑聖言簡直未遽有此曲折而孔顔之所以爲聖賢必有超然無一毫意必固我之私者以爲之本然後有以應事物之變而無窮以是止據舊說不復致疑今睹來示雎若不異於前人而其規模之大體用之全則非彼所到而熹之愚亦未及也更俟從容反復玩味别以求教它所論著亦有欲就正者私居乏人抄冩後便寄呈也去嵗救荒後時狼狽殊甚不謂其人乃復見恕如此來喻所及令人恐懼不自安耳答薛士龍季宣熹竊伏窮山講服盛名之日乆矣去年邂逅林擇之歸自宣城又能道餘論一二皆成巳成物之大致區區益願承教扵前顧以憂患之餘屏跡田里而執事名問方昭德業方起隠顯異趣私竊揣料未容遽遂鄙懐則亦悵然太息而巳兹者林擴之之來乃知榮􅈾睿眷出試輔藩宣布之初譽處休洽深以爲慰又蒙不鄙逺貽書翰所以教告甚悉擴之又以所聞相與推說皆平生所深欲聞者感幸之至不容於心然而三復來教則有熹愚不敢當者二焉請陳其說而左右者察之熹自少愚鈍事事不能及人顧嘗側聞先生君子之餘教粗知有志扵學而求之不得其術蓋舎近求逺處下窺髙馳心空妙之域者二十餘年比乃困而自悔始復退而求之於句讀文義之間謹之於視聽言動之際而亦未有聞也方將與同志一二友朋并心合力以從事於其間庶㡬銖積絲累分寸躋攀以幸其粗知理義之實不爲小人之歸而嵗月侵㝷齒髮遽如許矣懔然大懼日力之不足思得求助於當世有道之君子以速其進而未得也執事乃不知此而反以講道教人之事期之此熹之所以不敢當者一也至於聖賢出處之義則亦略聞之矣顧以材智淺劣自知甚明而又學無所成不堪酬酢故自十數年來日益摧縮不敢復有當世之念雖昨來奉親之日急扵丼㫖之奉猶不敢自彊其所不足以犯世患矧今孤露餘生形神凋喪懶廢無用益甚扵前誠不忍復爲彯纓結綬之計以重不孝之罪是以杜門空山丼忍窮寂以遂區區之志而庶㡬或寡過焉執事又不知此而反以行道濟時之事責之此熹所以不敢當者二也感服至意無以爲謝敢布腹心伏惟加憐察焉繼此儻未斥絶尚冀有以警誨之使不迷於入德之塗則執事之賜厚矣它非所敢望也湖學之盛甲扵東南而其湮廢亦巳乆矣蓋自熈寧設置教官之後學者不復得自擇師是以學校之正名存實亡而人才之出不復如當日之盛今得賢太守身爲之師其必將有變矣然竊甞讀安定之書考其所學蓋不出乎章句誦說之間以近歲學者髙明自得之論校之其卑甚矣然以古準今則其虚實淳漓輕重厚薄之效其不相逮至逺是以嘗竊疑之敢因垂問之及而請質焉因風見教及此幸甚又聞慶暦間嘗取湖學規制行之太學不知當時所取果何事也求諸故府必尚有可考者得令書吏録以見賜則又幸甚相望之逺無由造前請益所欲言者何啻萬端遥想郡齋之間伏𥿄不勝引領答薛士龍熹屏居窮陋幸無他苦而渉春以來親友喪亡吊問奔走不得少安殊無好況此外無足言者誨諭諄複仰荷不鄙之意然無可不可之教則非初學所敢自期而待禮而應者尤非衰陋所敢萌意也區區之懐前言蓋巳盡之矣萬一諸公終不察則不過恭俟嚴譴而巳無它說也䝉愛念之深而其間頗有未相悉者故敢及之然不足爲外人道也垂論湖學本末不勝感歎而所論胡公之學蓋得於古之所謂灑掃應對進退者尤爲的當警發深矣竊意髙明所以成巳成物之要未嘗不在於此而廣大精微之藴其所超然而獨得者又非言之所能諭也跧伏之蹤未由承教於前徒切歎仰儻不棄外時得惠音以鞭䇿之實爲萬幸而來教之云倒置巳甚讀之愧汗踧踖不知所以自容萬望矜察自此書來存訪死生之外削去虚文直以道義啓告誘掖此眞區區所望扵門下者鄙懐悾悾亦得無所慚憚而悉布之以求藥石之誨不審尊意能容而聽之否答林謙之光朝兹承祗召還朝不獲爲問以候行李伏奉黄亭所賜教帖恭審執御在行神相起居萬福感慰之至比日伏想巳遂對揚從容啓沃必有以發明道學之要切中當世之病者恨未得聞至於不次之除非常之數則不足爲執事道也熹愚不適時自量甚審所願不過力田養親以求寡過而巳所謂趨赴事功自當世賢人君子事豈熹所敢議哉過蒙諄譬荷愛之深書尾丁寧尤爲切至屬數日前巳申祠官之請聞命不早雖欲奉教而不可得矣抑熹乆欲有請扵門下而未敢以進今輙因執事之問而一言之蓋熹聞之自昔聖賢教人之法莫不使之以孝弟忠信莊敬持養爲下學之本而後愽觀衆理近思密察因踐履之實以致其知其發端啓要又皆簡易明白初若無難解者而及其至也則有學者終身思勉而不能至焉蓋非思慮揣度之難而躬行黙契之不易故曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也夫聖門之學所以從容積累涵養成就隨其淺深無非實學者其以此與今之學者則不然蓋未明一理而巳傲然自處以上智生知之流視聖賢平日指示學者入德之門至親切處例以爲鈍根小子之學無足留意其平居道說無非子貢所謂不可得而聞者徃徃務爲險恠懸絶之言以相髙甚者至扵周行却立瞬目揚眉内以自欺外以惑衆此風肆行日以益甚使聖賢至誠善誘之教反爲荒幻險薄之資仁義充塞甚可懼也熹緜力薄材學無所至徒抱憂歎末如之何竊獨以爲非如執事之賢素爲後學所觀仰者不能有以正而捄之故敢以爲請執事誠有意焉則熹雖不敏且將勉䇿駑頓以佐下風之萬一不識執事亦許之否乎謹此布聞因謝先辱餘惟爲道自重以慰後學之望上狀不宣答江元適泳孤陋晩生屏居深僻未嘗得親几杖之遊乃䝉不鄙使賢子遺之手書致發明道要之文三編加賜親札存問繾綣反若後進之禮於先進熹愚不肖不知所以得此扵門下者拜受踧踖若無所容退而伏讀以思至于三四雖昏懵無聞未獲直闚所至之堂奥然竊有以識夫所謂求仁之端者而知其玩心髙明深造自得非世儒之習也幸甚幸甚熹天資魯鈍自㓜記問言語不能及人以先君子之餘誨頗知有意扵爲巳之學而未得其處蓋出入於釋老者十餘年近嵗以來獲親有道始知所向之大方竟以才質不敏知識未離乎章句之間雖時若有㑹於心然反而求之殊未有以自信其所以奉親事長居室延交者蓋欲寡其過而未能也日者誤蒙收召草野之臣其義不敢固辤造朝之際無以待問輙以所聞於師友者一二陳之豈胷中誠有是道以進之吾君哉特欲發其大端冀萬一有助焉耳不謂流傳復誤長者之聴伏讀誨喻慚負不知所言然厚意不可虚辱敢因所示文編其間有不能無疑者略抒其愚以請扵左右伏惟幸復垂教焉無極齋記發明義理之本原正名統實於毫釐㡬忽之際非見之明玩之熟詎能及此然其間有曰易姑象其機詩書禮樂姑陳其用熹竊謂姑者且然而非實之辭也夫易之象其機詩書禮樂之陳其用皆其實然而不可易者豈且然而非實之云乎又有曰髣髴曰強名曰假狀凡此皆近乎老莊溟涬鴻蒙之說以六經語孟考之凡聖人之言皆慤實而精明平易而淵奥似或不如是也又有曰禮樂政事典謨訓誥皆斯齋之土苴耳土苴之言亦出扵莊周識者固巳議之今祖其言以爲是說則是道有精粗内外之隔此恐未安又曰老兮釋兮付諸大鈞範質之初語意隱奥亦所未喻又曰西伯不識不知仲尼毋意毋我兹盖乾坤毀無以見易易不可見乾坤或㡬乎息矣熹竊謂詩人之稱文王雖曰不識不知然必継之曰順帝之則孔門之稱夫子雖曰毋意毋我然後之得其傳者語之必曰絶四之外必有事焉盖體用相循無所偏滯理固然也且大傳所謂易不可見則乾坤息者乃所以明乾坤即易易即乾坤乾坤無時而毀則易無時而息爾恐非如所引終篇之意乃類於老氏復歸扵無物之云也若夫中庸之終所謂無聲無臭乃本於上天之載而言則聲臭雖無而上天之載自顯非若今之所云并與乾坤而無之也此恐扵道體有害自所謂求仁之端者推之則可見矣士箴夲末該備說天人貫通其餘指示仁體極其親切三要書推天理而見諸人事其曰體不立而徒恃勇㫁以有爲一旦智窮力屈善後之謀索矣可謂切中今日之病又曰體中心之誠實者逹扵禮樂刑政之間而加之四方萬里之逺可謂善𥙷衮職之闕皆非淺陋所及也然熹竊嘗聞之聖人之學所以異乎老釋之徒者以其精粗隱顯體用渾然莫非大中至正之矩而無偏倚過不及之差是以君子智雖極乎髙明而見扵言行者未嘗不道乎中庸非故使之然髙明中庸實無異體故也故曰道之不行也智者過之愚者不及也道之不明也賢者過之不肖者不及也又曰差之毫釐繆以千里聖人丁寧之意亦可見矣凡此謬妄之言皆不知其中否正欲求教於左右以啓其未悟故率意言之無復忌憚蓋以爲不如是不足以來警切之誨爾因來不吝垂教實所幸願而非敢望也答江元適别𥿄所喻汪洋愽大不可涯涘然竊以平生所聞扵師友者驗之雖其大致規模不能有異至其所以語夫進修節序之緩急先後者則或不同矣蓋熹之所聞以爲天下之物無一物不具夫理是以聖門之學下學之序始扵格物以致其知不離乎日用事物之間别其是非審其可否由是精義入神以致其用其間曲折纎悉各有次序而一以貫通無分叚無時節無方所以爲精也而不離乎粗以爲末也而不離乎本必也優游濳玩饜飫而自得之然後爲至固不可自畫而緩亦不可以欲速而急譬如草木自萌芽生長以至於枝葉華實不待其日至之時而揠焉以助之長豈不無益而反害之哉凡此與來教所謂傷時痛俗急扵自反且欲㑹通其㫖要以爲駐足之地者其本末指意似若不同故前後反復之言率多違異今姑論其大槩以爲求教之目其他曲折則非得靣承不能究也精義二字聞諸長者所謂義者冝而巳矣物之有冝有不冝事之有可有不可吾心處之知其各有定分而不可易所謂義也精義者精諸此而巳矣所謂精云者猶曰察之云爾精之之至而入扵神則扵事物所冝毫釐委曲之間無所不悉有不可容言之妙矣此所以致用而用無不利也來教之云似扵名言之間小有可疑雖非大指所繫然此乃學者發端下手處恐不可略故復陳之不審髙明以爲如何答江元適熹嘗謂天命之性流行發用見扵日用之間無一息之不然無一物之不體其大端全體即所謂仁而扵其間事事物物莫不各有自然之分如方維上下定位不易毫釐之間不可差繆即所謂義立人之道不過二者而二者則𥘉未嘗相離也是以學者求仁精義亦未嘗不相爲用其求仁也克去巳私以復天理𥘉不外乎日用之間其精義也辨是非别可否亦不離乎一念之際盖無適而非天理人心體用之實未可以差殊觀也孟子告齊王曰權然後知䡖重度然後知長短物皆然心為甚王請度之嗚呼此求仁之方也而精義之本在焉孟子其可謂知言之要矣今執事以反身自認存真合體者自名其學信有意於求仁矣而必以精義之云為語道之精體而無與乎學者之用力又以辨是非别可否為空言不充實用而有害乎簡易之理則熹恐其未得為至當之論也盖曰道之精體則義不足以名之以義強名則義之為名又無所當此盖原扵不知義之所以為義是以既失其名因昧其實於是乎有空言實用之說此正告子義外之蔽也既不知義則夫所謂仁者亦豈能盡得其全體大用之實哉近世爲精義之說莫詳扵正蒙之書而五峯胡先生者名宏字仁仲亦曰居敬所以精義也此言尤精切簡當深可玩味恐執事未以爲然則試直以文義考之精義入神正與利用安身爲對其曰精此義而入於神猶曰利其用而安其身耳揚子所謂精而精之用字正與此同乃學者用功之地也若謂精義二字只是道體則其下復有入神二字豈道體之上又有所謂神者而自道以入神乎以此言之㫁可决矣抑所謂反身自認存眞合體者以孔子克巳復禮孟子勿忘勿助之說驗之則亦未免失之急迫而反與道爲二大抵天人𥘉無間隔而人以私意自爲障礙故孔孟教人使之克盡巳私即天理不期復而自復惟日用之間所以用力循循有序不凌不躐則至扵日至之時廓然貫通天人之際不待認而合矣今扵古人所以下學之序則以爲近扵傀儡而鄙厭之遂欲由徑而捷出以爲簡易反謂孔孟未甞有分明指訣殊不知認而後合揠苗助長其不簡易而為傀儡亦巳大矣熹竊以爲日用之間無一事一物不是天眞本體孔孟之言無一字一句不是分明指訣故孔子曰吾無隱乎爾又曰天何言㢤而子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也夫豈平日雅言常行之外而復有所謂分明指訣者哉此外牴牾尚多然其大槩節目具於是矣以執事教誨不倦念未有承晤之期不敢乆虚大賜是以冐昧罄竭其愚伏惟恕其狂妄少賜覽觀還以一言示及可否虚心以竢如有所疑不敢不以復也答詹體仁儀之湘中學者之病誠如來教然今時學者大抵亦多如此其言而不行者固失之又有一種只說踐履而不務窮理亦非小病欽夫徃時蓋謂救此一種人故其說有太快處以啓流傳之弊今日正頼髙明有以救之也爲學是分内事纔見髙自標致便是不務實了更說甚底今日正當反躬下學讀書則以謹訓說爲先脩身則以循規矩爲要除却許多懸空閑說庶㡬平穩耳不審尊意以爲如何答楊庭秀萬里程弟轉示所惠書教如奉談笑仰見放懐事外不以塵垢粃糠累其胷次之超然者三復歎羡不能巳巳數日偶苦脾疾心腹撓悶意緒無聊值此便風不敢不附報自力布此僅能問何如他皆未暇及也時論紛紛未有底止契丈清徳雅望朝野屬心切冀眠食之間以時自重更能不以樂天知命之樂而忘與人同憂之憂毋過扵優㳺毋决扵遁思則區區者猶有望扵斯世也答李季章壁兩書縷縷皆有飄然逺引之意不審果以何日決此計耶熹懇祠得請深荷上恩旣還舊官無復可辤之誼孤危之跡雎未可保然姑無媿扵吾心可也承問及先人紹興中文字遺藁中劄子第三篇疑即此奏豫章所刋集中有之今以納呈巳加籖貼扵其上矣筆削之際儻得附見千萬幸甚諸公争和議時先人與胡德輝范伯逹諸公同入文字皆史院同寮也當時此一宗議論不知有無登載魏元履所集戊午讜議一書甚詳亦嘗見之否耶如館中未有得行下建寧抄録上送亦一事也慶逺計程巳到零陵乆矣又聞其自處㤗然亦不易也但未知便得一向安坐否耳前年與陳君舉啇量拈出孝宗入繼大統一事當時議臣如婁寅亮趙張二相岳侯范伯逹陳魯公皆未有襃録恐可更詢訪當時曽有議論之人并與拈出也答李季章昨承喻及先君奏䟽巳蒙筆削得附史氏篇末幸甚痛念先君早嵗讀書即爲賈陸之學遭時艱難深願有以自見而不幸不試所得陳扵當世者止此而巳今乃得託史筆以垂不朽豈不幸甚但恐贒者去國之後或爲不肖之孤所累因見刋削未可知耳又聞黃文叔頃年嘗作地理木圖以獻其家必有元様欲煩爲㝷訪刻得一枚見寄或恐太大難扵寄逺即依謝莊方丈木圖以兩三路爲一圗而傍設牝牡使其犬牙相入明刻表識以相離合則不過一大掩可貯矣切幸留念河西爲一陜西爲一河東河北燕雲爲一京東西爲一淮南爲一兩浙江東西爲一湖南北爲一西川爲一二廣福建爲一大略如此更詳闊狹裁之相合處湏令脗合不留縫罅乃佳答李季章熹罪戾之蹤竟不免吏議然巳晩矣又幸寛恩未即流竄杜門念咎足以遣日不足爲故人道也累年欲脩儀禮一書釐析章句而附以傳記近方了得十許篇似頗可觀其餘度亦嵗前可了若得前此别無魔障即自此之後便可塊然兀坐以畢餘生不復有世間念矣元來典禮淆訛處古人都已說了只是其書衮作一片不成叚落使人難看故人不曽看便爲憸人舞文弄法迷國誤朝若梳洗得此書頭靣出來令人易看則此軰無所匿其姦矣扵世亦非少助也勿廣此說恐召坑焚之禍荆公奏草不記曽附去否今徃一通可見當日規摹亦不草草也禹迹圖云是用長安舊本飜刻然東南諸水例皆踈略頃年又見一蜀士說蜀中嘉州以西諸水亦多不合今其顯然者如蜀江至瀘州東南乃分派南流東折逕二廣自畨禺以入海以理勢度之豈應有此必是兩水南北分流而摹刻者誤連合之遂使其北入江者反爲逆流耳然柳子厚詩亦言䍧牱南下水如湯則二廣之水源計必距蜀江不逺但不知的自何州而分爲南北耳又自瀘以南諸州今皆不聞必巳廢併幸爲詢究一一見喻其圖今徃一𥿄可爲勾抹貼說却垂示也答李季章熹今嵗益衰足弱不能自隨兩脅氣痛攻注下體結聚成塊皆前所未有精神筯力大非前日之比加以親舊凋零如蔡季通吕子約皆死貶所令人痛心益無生意决不能復支乆矣所以未免惜此餘日正爲所編禮傳巳略見端緒而未能卒就若更得年餘間未死且與了却亦可以瞑目矣其書大要以儀禮爲本分章附䟽而以小戴諸義各綴其後其見扵它篇或它書可相發明者或附扵經或附扵義又其外如弟子職保傳傳之屬又自别爲篇以附其類其目有家禮有郷禮有學禮有邦國禮有王朝禮有䘮禮有祭禮有大傳有外傳今其大體巳具者盖十七八矣因讀此書乃知漢儒之學有𥙷扵世教者不小如國君承祖父之重在經雖無明文而康成與其門人答問盖巳及之具於賈䟽其義甚備若巳預知後世當有此事者今吾黨亦未之講而憸佞之徒又飾邪說以蔽害之甚可嘆也喻及仁里士人有志扵學而能不事科舉者近亦似曽聞說但不知其姓名此殊不易得幸因風略報及也舊來諸經說三四年來幸免煨燼今亦恐未可保然間因講說時有更定欲寄一本去恐可與西州同志者共之而未暇也留衛公得詩說日閱数版手加點抹書來頗極稱賞仍盡能提其綱亦甚不易老年精力乃能及此又不厭章句訓詁之煩也要是天姿深静純實故能若此亦恨其聞此之晩不得早效區區之愚耳德脩文叔家居亦何所務各有一書煩爲致之子直亦然也今年閩中鄭黄鄧皆物故氣象極覺蕭索楊子直得祠又遭駁項平父聞亦杜門不敢見人其它吾人徃徃藏頭縮頸不敢吐氣其可笑也熹明年七十巳草告老之章只從本貫依庻官例陳乞亦不欲作廟堂書劄而或者尚恐觸犯禍機顧念禮律自有明文而罪戾之餘尚忝階官亦無不許致仕之法並巳決意爲之不復顧慮政使不免亦所丼心盖比之一時軰流巳獨爲優幸矣尚欲低囬貪戀㣲禄以負平生之懐復何爲哉前此附書似是因李普州便書中欲煩借黄文叔家地里木圖爲製一枚不知逹否此近巳自用膠泥起草似亦可觀若更得黄圖參照尤佳但恐此書或巳浮沉不曽製得即亦不必爲矣禮殿圖舊亦有之但今所寄摹畫精好想正得古本筆意也三五之目不可考古事類此者多矣今日豈能必其是非也邪但旣有是名號則必有是人易大傳但舉其制作之盛者而言耳如漢人但言髙祖孝文豈可便謂其間無惠帝耶洮研發墨鋒鋩可畏此所難得足爲佳玩矣答李季章熹伏承不鄙貺以先正文簡公詩編行實并及三夫人二壙刻文跽領伏讀足慰平生高山仰止之心而反復再三又見其立徳立言明白磊落所以開發蒙吝有不一而足者幸甚幸甚至於不察熹之愚陋而將使之纂次其事刻之幽宫以視來世則熹之不德不文人知其不足以勝此寄矣顧念平生未嘗得拜文簡公之函丈而讀其書仰其人則爲日蓋巳乆又嘗聴於下風而知公之所以相知亦有不待識其靣目而得其心者是以願自附焉而不敢辭也唯是今者方以罪戾書名僞籍平居杜門屏氣齰舌不敢輙出一語以干時禁而凛凛度日猶懼不免乃扵此時忽爾破戒政使不自愛惜亦豈不爲公家之累是以彷徨顧慮欲作復止而卒未有以副來命之勤也伏惟執事姑少察此而深計之竊意髙文大筆取之今世不爲無人固不必眷眷於一無狀罪廢之人而使盛德百世之傳不得以時定也熹區區鄙意前幅具之詳矣始者亦嘗深念欲便草定而託以前日所爲旣而思之又似不誠而不可爲也又念劉孫所定本出賢昆仲之手者自足傳信後世但循例必欲更經一手刪節則雖在今日隂竊爲之亦自不害只是目下未可使人知有此作將來草定亦不可使人見有此書此則難遮護耳來使本欲留以少俟渠亦以丁寧之切不來相逼但覺此終是未敢落筆不如且遣之還俟一靣更將所示者子細繙閱隨記所當増損處密託人送令弟處又恐經由都下不便不若且少忍之若未即死固當有以奉報或使溘先朝露亦當以付兒軰令轉奉聞也平生多做了閑文字不能無愧詞今此好題目可惜不做但又適當此時令人鬰鬰耳續通典見詩中及之恐有印本求一部長編改定本只冩改處不知有多少冊得爲致之爲幸或云建炎紹興事亦巳成書不知然否尤所欲得但恐字多難冩耳頃見靖康間事楊龜山多有章䟽不曽編入不知後來曽𥙷否蓋汪丈所刻本不曽載福州成都二本皆然其奏議後來南劒一本却有之恐亦不可不𥙷也答范文叔大學之序固以致知爲先而程子發明未有致知而不在敬者尤見用力本領親切處今讀來喻知扵主一蓋嘗用功則致知之學冝無難矣而尚欲更求其說何耶熹舊讀大學之書嘗爲之說每以淺陋有所未安近加訂正似稍明白親知有取以鋟木者今内一通幸試考之或有未當却望誨喻然切告勿以示人益重不韙之罪也答范文叔讀書不覺有疑此無足恠蓋徃年經無定說諸先生所發或不同故讀書不能亡疑比年以來衆說盡出講者亦多自是無所致疑但要反復玩味認得聖賢本意道義實體不外此心便自有受用處耳尹和靖門人贊其師曰丕哉聖謨六經之編耳順心得如誦巳言要當至此地位始是讀書人耳子約之去私計良便象先相從所論云何去歲相見不欵未得盡所欲言至今爲恨耳講義反復詳明深得勸誦之體特寄此章豈亦有感於時論耶大學近閱舊編復改數處今徃一通試以舊本參之當見鄙意也答范文叔春風堂記乆巳奉諾安敢忘之但近覺孤危之迹爲當世所憤疾日以益甚遂絶口不敢爲人出一語非獨畏禍亦義理之當然也兼亦覺得此等空言無益於實僅同戯劇區區裝點是亦徒為玩物喪志而巳若論為巳切實功夫豈此等所能助而為仁由巳亦何待他人之助耶况明道先生氣象如此乃是不違仁之影子今於影外旁觀而玩其形似孰若深察其心之所到而身詣之之爲實耶竊謂為仁之要固不出乎聖賢之言若子夏所謂慱學篤志切問近思夫子所謂克巳復禮所謂恭敬忠恕可以備見其用力之始終矣幸深味乎此而實加功焉則為有以慰區區之望固不在於言語文字之間而巳也答陳君舉熹自頃寓書之後南來優優未能嗣音至於懐仰德義則無日而不勤也乃蒙不忘專人枉教此意厚矣何感如之垂諭詩說向見二君能道梗槩大指略同意其必有成編故以爲請今承語及乃知爾雅蟲魚决非磊落人之所冝注也唐突負愧如何可言誨示之勤尤荷不鄙然嘗謂人之爲學若從平實地上循序加功則其目前雖未見日計之益而積累功夫漸見端緒自然不假用意裝點不待用力支撑而聖賢之心義理之實必皆有以見其確然而不可易者至扵講論之際心即是口口即是心豈容别生計較依違遷就以爲諧俗自便之計耶今人爲學旣巳過髙而傷巧是以其說常至於依違遷就而無所分别蓋其胷中未能無纎芥之疑有以致然非獨以避咎之故而後詭於詞也若熹之愚自信巳篤向來之辯雖至於遭䜛取辱然至于今日此心耿耿猶恨其言之未盡不足以暢彼此之懐合異同之趣而不敢以爲悔也不識髙明何以教之惟盡言無隱使得反復其說千萬幸甚老病幽憂死亡無日念此一大事非一人私說一朝淺計而終無靣冩之期是以冐致愚悃鄕風引領不勝馳情答陳君舉前書所扣未蒙開示然愚悃之未能盡發扵言者亦多每恨無由得遂傾倒以求鐫切近曹器之來訪乃得爲道曲折計其復趨函丈必以布露敢丐髙明少垂采擇其未然者痛掊擊之庶有以得其眞是之歸上不失列聖傳授之統下使天下之爲道術者得定于一非細事也惟執事圖之與陳君舉先人自少豪爽出語驚人踰冠中第更折節讀書慕爲賈誼陸贄之學乆之又從龜山楊氏門人問道授業踐修愈篤紹興𥘉以館職郎曹與脩神宗正史哲徽兩朝實録而扵哲録用力爲多其辨明誣謗刋正乖謬之功具見襃詔後以上䟽詆講和之失忤秦相去國𥙷郡不起奉祠以終與陳君舉先人贈告必巳蒙落筆母妻二告如亦合命詞則前日失於具禀今再有懇先妣徳性純厚事姑極孝敬祖母性嚴先妣能順適之治家寛而有法歳時奉祀必躬必親撫媵御有㤙意無纎毫嫌忌之意亡婦先世自國𥘉時以儒學登高科其父諱勉之字致中紹興中嘗以布衣召至都堂與秦丞相議不合而去東萊呂舎人所謂老大多才十年堅坐者也凡此曲折得頗見於詞命足爲泉壤之榮幸辱矜念脫或巳行亦乞刋定幸甚幸甚與劉德修光祖方念乆不聞動静怱閱邸報有房陵之行爲之悵然寢食俱廢累日不能自釋不審彼以何日就道自簡至房道里㡬何取道何州閲㡬日而後至風土氣候不至甚異否居處飲食能便安否官吏士民頗知相尊敬否吾道之窮一至於此然亦乆知㑹有此事但不謂在目前耳偶有鄂便託劉公度轉致此問如有的便亦望得一書之報使知動息少慰逺懐千萬之幸馮李亦復不容季章得郡而名見乃弟䟽中恐亦非乆安者李良仲鴻飛冥冥使人深羡第恨不得扣其玄中之趣范文叔却幸未見物色想亦深自晦也熹足弱氣痞巳半年矣䇿杖人扶僅能略移跬歩而腹脇脹滿不能俯案觀書作字一切皆廢獨扵長者未敢依例口占耳數日又加右臂作痛冩字不成衰憊至此無復乆存之理承教無期尚冀以時深爲世道自愛耳熹隨例納禄幸巳得請中間蓋亦小有紛紛後雖粗定然猶不免爲之之累亦可歎也一本爲下空一字答黄文叔度八月二十二日具位朱熹蝢首復書于知府顯謨正言執事熹跧伏窮山聞執事之名舊矣未獲旣見每竊恨焉去歲趨召北歸道聞新天子以執事爲賢擢居言路方與善類同深喜幸以爲上新即位首擇一人以爲諫官即得執事之賢以充其選是必將用其言以新庶政無疑矣以執事之賢如此又遭難得之時如此其必將有以開寤上心謹始建極以慰中外之望又無疑矣而未一二日巳聞出守之命則又爲之惘然昏惑莫曉所謂比至中都亟問其故則凡有識無不扼腕而劉德脩獨取執事所上免章謄本相視熹扵是時亦復慨然浩歎蓋不唯爲執事惜此事㑹亦爲朝廷惜此舉措且自恨其失一見之便而又決知吾道之將不行矣曽未兩月果巳罷遣道間聞當來婺又以行役有程不能宿留以俟車騎之來還家又苦疾病重以春夏之交氣候大變邪毒薫心危證悉見自謂必死矣固不能先自通於左右乃扵呻吟之中忽奉手教之辱三復醒然過望幸甚然而執禮過謙稱道浮實比擬非倫則非淺陋之所敢當也豈其戯耶則執事莊士也非以言爲戯者也以爲誠耶則懼其有傷執事者閱理之明知人之哲也至論古昔聖賢所處之難易則執事之意可知矣如熹之愚盖甞不自揆度而妄竊有志於此然學未聞道言語無力精神不專不足以動人悟物盖昔人所謂說將尚不下者而又何足以議此耶雖然今亦老矣衰病益侵旦暮且死此心雖不敢忘亦無復有望扵將來矣顧今運祚方隆聖德日新有永之圗必將與明者慮之則夫所謂致一以格天者乃執事事也執事其亦察乎舜之所謂人心道心者爲如何擇之必精而不使其有人心之雜守之必固而無失乎道心之純則始終惟一而伊尹之所以格天者在我矣於以正君定國而大庇斯人扵無窮豈不偉哉鄙見如此不識執事以爲如何如有未當願反復之以卒承教之願千萬幸也前此承書未乆即聞去郡來使遂不復來取報章今想巳還㑹稽不審爲況復何如時論日新尚復何說因趙主簿歸天台寓此爲謝不能盡所欲言又苦目痛不能多作字不得親書深以愧恨相望千里邈無晤見之期惟冀以時自重使斯世猶有頼焉則幸甚不宣答徐元敏昨者拜書方愧草率人還賜教勤至區區悚仄巳不自勝别𥿄垂誨警發尤深但詞意之間謙卑巳甚非晩學小子所敢當伏讀再三益増恐懼然竊伏觀尊誨之微指大率以曲禮首章爲脩巳治人之大要喜其易行而病扵難乆此非擇善之精反躬之切何以及此顧念平昔所聞扵師友者其大端誠不外是然行之不力一暴十寒其樂舒肆喜談謔之病殆有甚於髙明之所患者而何能有以少𥙷於萬分抑又聞之主敬者存心之要而致知者進學之功二者交相發焉則知日益明守日益固而舊習之非自將日改月化於㝠冥之中矣所聞如此然躬所未逮不自知其當否敢因垂問之及而以質焉儻䝉矜憐還賜誨飭使不迷於入徳之方則熹千萬幸甚答林正夫湜慕仰高風固非一日中間雖幸寅縁再見然苦怱怱不得欵奉誨語至今以爲恨也歸來抱病人事盡廢無繇奉記以候起居每深馳跂今兹楊通老來忽奉手誨之辱假借期許既非愚昧之所敢當而執礼過恭尤使人恐懼踧踖而無所避也雖然高明之所以見屬之意豈若世之指天誓日而相要於聲利之場者哉况在今日而言之尤足以見誠之至而好之篤是以不敢隠其固陋而碩自附於下風焉盖嘗聞之先生君子觀浮圖者仰首注視而高談不若俯首歴階而漸進盖觀於外者雖足以識其崇髙鉅麗之爲羙孰若入扵其中者能使眞爲我有而又可以深察其層累結架之所由哉自今而言聖賢之言具在方冊其所以幸教天下後世者固巳不遺餘力而近世一二先覺又為之指其門戸表其梯級而先後之學者由是而之焉冝亦甚易而無難矣而有志焉者或不能以有所至病在一觀其外粗覘彷彿而便謂吾巳見之遂無復入於其中以為真有而力䆒之計此所以驟而語之雖知可恱而無以深得其味遂至半途而廢而卒不能以有成耳竊計高明所學之深所守之正其所藴蓄盖巳施之朝廷而見於議論之實於此冝不待於愚言矣然既䝉下問不可以虚辱而熹之所有不過如此若不以告於門下以聴執事者之采擇則又有非區區之所敢安者是以敢悉布之可否之决更俟來教熹所虚佇而仰承也通老在此相聚甚樂比舊頓進知有切磋之益惜其相去之逺忽起歸興而不可留也從之聞以牙痛為庸醫所誤投以凉劑一夕之間遂至長徃深可痛惜然此亦豈醫之所能為哉徳脩﨑嶇逺謪令人動心然聞其平居對客誦言固每以此自必乃今爲得所願然所關繋則不淺矣有冩其記文以來者巳屬通老呈白想亦深爲廢卷太息也元善寓霅川殊不自安旦晩必歸子宣今日方得書也熹氣痞不能乆伏几案作字草草且亦未能䆒所𣣔言臨風引領悵想亡量惟髙明察之晦庵先生朱文公文集卷第三十八閩縣學訓導何器校朱文公集第三十八卷後考異荅袁機仲八卦相錯其数殊塗其一本作二以上五條只少箇柱杖箇下一本有拈字伏承别𥿄誨諭况說卦之夲文云云至未嘗有一隂一陽始生之說也一本作况說卦之本文於巽則但取其㓗齊而位之東南於乾則但取其戰而位之西北巽以三畫言之雖爲一隂之生而其所以位之東南者𥘉非有取乎其義至於乾則又三陽之全体而𥘉無一陽巳生之義可得而取也接凡此﨑嶇云云來諭謂坤之上六陽與復遇之說遇一本作姤易說垂示以前論参之又一本作伍荅周益公范碑既起而樂為之用一本無既字前日之所為前一本作當當行之路當一本作常荅林謙之簡易明白簡一本作坦荅江元適孤陋晩生正名綂實一本無綂字熹嘗謂天命之性由徑而捷出由一本作曲閩縣儒學訓導何器校
