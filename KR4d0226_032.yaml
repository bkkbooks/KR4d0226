body:
  text: 書汪張吕劉問答答敬夫論中庸說鳶飛魚躍注中引程子說蓋前靣說得文義巳極分明恐人只如此容易領略便過故引此語使讀者於此更加涵泳又恐枝葉太盛則人不復知有本根妄意穿穴别生病痛故引而不盡使讀者但知此意而别無走作則只得將訓詁就本文上致思自然不起狂妄意思當時於此詳略之間其慮之亦審矣今欲盡去又似私憂過計懲羮吹虀雖救得狂妄一邉病痛反没却程子指示眼目要切處尤不便也前知之義經文自說禎祥妖孽蓍龜四體觧中又引執玉髙卑之事以明四體之說則其所謂前知者乃以朕兆之萌知之蓋事㡬至此巳自昭晣但湏是誠明照徹乃能察之其與異端恠誕之說自不嫌於同矣程子所說用與不用似因異端自謂前知而言其曰不如不知之愈者蓋言其不知者本不足道其知者又非能察於事理之㡬微特以偵伺於幽隱之中妄意推測而知故其知之反不如不知之愈因引釋子之言以見其徒稍有識者巳不肯爲皆所以甚言其不足道而深絶之非以不用者爲可取也今來喻發明固以爲異端必用而後知不用則不知惟至誠則理不可揜故不用而自知是乃所謂天道者此義精矣然不用之云實生於程子所言之嫌而程子之言𥘉不謂此引以爲說恐反惑人且以此而論至誠異端之不同又不若注中指事而言尤明白而直截也切磋琢磨但以今日工人制器次第考之便可見切者以刀或鋸裁截骨角使成形質磋則或鑢或盪使之平治也琢者以椎撃鑿鐫刻玉石使成形質磨則礱以沙石使之平治也蓋骨角柔韌不容琢磨玉石堅硬不通切磋故各隨其宜以攻治之而其功夫次第從粗入細又如此雖古今沿習或有不同然物有定理恐亦無以相逺也故古注舊說雖與此異然其以切磋爲治骨角琢磨爲治玉石亦未嘗亂但不當分四者各爲一事而不相因耳豈亦有所傳授而小失之與來喻欲以四者皆爲治玉石之事而謂切爲切其璞琢爲琢其形此於傳文恊矣然切其璞而琢其形則不必遽磋磋之旣平而復加椎鑿則滑淨之上却生瘢㾗與未磋何異竊恐古人知能創物不應如此之迂拙重複也蓋古人引詩往往略取大意𥘉不甚拘文義故於此兩句但取其相因之意而不細分其物若細分之則以切琢爲道學磋磨爲自脩如論語之以切琢比無謟無驕磋磨比樂與好禮乃爲穩帖今旣不同亦不必彊爲之說但識其大意可也況經傳中此等非一若不寛著意思緩緩消詳則字字相梗亦無時而可通矣答張敬夫諸諭一一具悉比來同志雖不爲無人然更事旣多殊覺此道之孤無可告語居常鬰鬱但每奉教喻輙爲心開目明耳子澄所引馬范出處渠輩正坐立志不彊而聞見駁雜胷中似此等草木太多每得一事可借以自便即遂據之以爲定論所以緩急不得力耳近來尤覺接引學者大是難事蓋不博則孤陋而無徴欲其博則又有此等駁雜之患況其才質又有髙下皆非可以一格而例告之自非在我者充足有餘而又深識㡬㑹亦何易當此責耶周君恨未之識大率學者須更令廣讀經史乃有可據之地然又非先識得一箇義理蹊徑則亦不能讀正惟此處爲難耳建康連得書規模只如舊日前日與之書有兩語云憂勞惻怛雖盡於鰥寡孤獨之情而未有以爲本根長乆之計功勲名譽雖播於兒童走卒之口而未有以喻乎賢士大夫之心此語頗似著題未知渠以爲如何然亦只說得到此過此尤難言也尋常戯謂佛氏有所謂大心衆生者今世絶未之見凡今之人營私自便得少爲足種種病痛正坐心不大耳子重語前書巳及之所言雖未快然比來衆人巳皆出其下矣交戰雜好之說誠爲切至之論吾輩所當朝夕自點檢也誠之乆不得書如彼才質誠欠追琢之功恨相去逺無所效力也陳唐㢸者舊十餘年前聞其爲人每恨未之識此等人亦可惜沉埋逺郡計其年當不下五六十矣呉儆者聞對語亦能不苟不易不易此等人材與温良愽雅之士世間不患無之所恨未見前所謂大心衆生者莫能揔其所長而用之耳寄示書籍石刻感感近作濂溪書堂記曽見之否謾内一本發明天命之意粗爲有功但恨未及所謂不謂命者闕却下一截意思耳此亦是玩理不熟故臨時收拾不上如此非小病可懼也學記刻就幸早寄及只作兩石不太大否近思舉業三段及横渠語一段并録呈幸付彼中舊官屬正之或更得数字說破増添之意尢佳蓋閩浙本流行巳廣恐見者疑其不同兼又可見長者留意此書之意尤學者之幸也中庸章句只如舊本巳如所戒矣近更看得數處穩實尤覺日前功夫未免好髙之弊也通鑑綱目近再修至漢晉間條例稍舉今亦謾録數項上呈但近年衰悴目昏燈下全看小字不得甚欲及早修纂成書而多事分奪無力謄冩未知何時可得脫藁求教耳答張敬夫誨諭曲折数條始皆不能無疑旣而思之則或疑或信而不能相通近深思之乃知只是一處不透所以觸處窒礙雖或考索彊通終是不該貫偶却見得所以然者輙具陳之以卜是否大抵日前所見累書所陳者只是儱侗地見得箇大本逹道底影象便執認以爲是了却於致中和一句全不曽入思議所以累蒙教告以求仁之爲急而自覺殊無立脚下功夫處蓋只見得箇直截根源傾湫倒海底氣象日間但覺爲大化所驅如在洪濤巨浪之中不容少頃停泊蓋其所見一向如是以故應事接物處但覺粗厲勇果増倍於前而寛𥙿雍容之氣略無毫髪雖竊病之而不知其所自來也而今而後乃知浩浩大化之中一家自有一箇安宅正是自家安身立命主宰知覺處所以立大本行逹道之樞要所謂體用一源顯㣲無間者乃在於此而前此方徃方來之說正是手忙足亂無著身處道邇求逺乃至於是亦可笑矣正蒙可疑處以熹觀之亦只是一病如定性則欲其不累於外物論至靜則以識知爲客感語聖人則以爲因問而後有知是皆一病而巳復見天地心之說熹則以爲天地以生物爲心者也雖氣有闔闢物有盈虚而天地之心則亘古亘今未始有毫釐之間斷也故陽極於外而復生於内聖人以爲於此可以見天地之心焉蓋其復者氣也其所以復者則有自來矣向非天地之心生生不息則陽之極也一絶而不復續矣尚何以復生於内而爲闔闢之無窮乎此則所論動之端者乃一陽之所以動非徒指夫一陽之巳動者而爲言也夜氣固未可謂之天地心然正是氣之復處苟求其故則亦可以見天地之心矣答張敬夫前書所禀寂然未發之㫖良心發見之端自以爲有小異於疇昔偏滯之見但其間語病尚多未爲精切比遣書後累日潜玩其於實體似益精明因復取凡聖賢之書以及近世諸老先生之遺語讀而驗之則又無一不合蓋平日所疑而未白者今皆不待安排徃徃自見灑落處始竊自信以爲天下之理其果在是而致知格物居敬精義之功自是其有所施之矣聖賢方䇿豈欺我哉蓋通天下只是一箇天機活物流行發用無間容息據其巳發者而指其未發者則巳發者人心而凡未發者皆其性也亦無一物而不備矣夫豈别有一物拘於一時限於一處而名之哉即夫日用之間渾然全體如川流之不息天運之不窮耳此所以體用精粗動靜本末洞然無一毫之間而鳶飛魚躍觸處朗然也存者存此而巳養者養此而巳必有事焉而勿正心勿忘勿助長也從前是做多少安排没頓著處今覺得如水到船浮解維正柂而沿洄上下惟意所適矣豈不易哉始信明道所謂未嘗致纎毫之力者眞不浪語而此一段事程門先逹惟上蔡謝公所見透徹無隔礙處自餘雖不敢妄有指議然味其言亦可見矣近范伯崇來自邵武相與講此甚詳亦嘆以爲得未曽有而悟前此用心之左且以爲雖先覺發明指示不爲不切而私意汩漂不見頭緒向非老兄抽關啓鍵直發其私誨諭諄諄不以愚昩而捨置之何以得此其何感幸如之區區筆舌蓋不足以爲謝也但未知自髙明觀之復以爲如何爾孟子諸說始者猶有齟齬處欲一二條陳以請今復觀之恍然不知所以爲疑矣但性不可以善惡名此一義熹終疑之蓋善者無惡之名夫其所以有好有惡者特以好善而惡惡耳𥘉安有不善哉然則名之以善又何不可之有今推有好有惡者爲性而以好惡以理者爲善則是性外有理而疑於二矣知言於此雖嘗著語然恐孟子之言本自渾然不須更分裂破也知言雖云爾然亦曰粹然天地之心道義完具此不謂之善何以名之哉能勿喪此則無所適不爲善矣以此觀之不可以善惡名太似多却此一轉語此愚之所以反覆致疑而不敢巳也問張敬夫心具衆理變化感通生生不窮故謂之易此其所以能開物成務而冐天下也圎神方知變昜二者闕一則用不妙用不妙則心有所蔽而明不遍照洗心正謂其無蔽而光明耳非有所加益也寂然之中衆理必具而無朕可名其宻之謂歟必有怵惕惻隱之心此心之宰而情之動也如此立語如何問張敬夫熹謂感於物者心也其動者情也情根乎性而宰乎心心爲之幸則其動也無不中節矣何人欲之有惟心不宰而情自動是以流於人欲而每不得其正也然則天理人欲之判中節不中節之分特在乎心之宰與不宰而非情能病之亦巳明矣蓋雖曰中節然是亦情也但其所以中節者乃心爾今夫乍見孺子入井此心之感也必有怵惕惻隱之心此情之動也内交要譽惡其聲者心不宰而情之失其正也怵惕惻隱乃仁之端又可以其情之動而遽謂之人欲乎大抵未感物時心雖爲巳發然苗裔發見却未嘗不在動處必舎是而别求却恐無下功處也所疑如此未審尊意如何問張敬夫遺書有言人心私欲道心天理熹疑私欲二字太重近思得之乃識其意蓋心一也自其天理備具隨處發見而言則謂之道心自其有所營爲謀慮而言則謂之人心夫營爲謀慮非皆不善也便謂之私欲者蓋只一豪髪不從天理上自然發出便是私欲所以要得必有事焉而勿正勿忘勿助長只要没這些計較全體是天理流行即人心而識道心也故又以鳶魚飛躍明之先覺之爲後人也可謂切至矣此語如何更乞裁喻答云栻近思却與來喻頗同要當於存亡出入中識得惟微之體識得則道心𥘉豈外是不識只爲人心也然須實見方得不識如何問張敬夫熹謂存亡出入固人心也而惟㣲之本體亦未嘗加益雖舎而亡然未嘗少損雖曰出入無時未嘗不卓然乎日用之間而不可掩也若於此識得則道心之微𥘉不外此不識則人心而巳矣蓋人心固異道心又不可作兩物看不可於兩處求也不審尊意以謂然否答張敬夫人心私欲之說如來教所改字極善本語之失亦是所謂本原未明了之病非一句一義見不到也但愚意猶疑向來妄論引必有事之語亦未的當蓋舜禹授受之際所以謂人心私欲者非若衆人所謂私欲者也但㣲有一毫把捉底意思則雖云本是道心之發然終未離人心之境所謂動以人則有妄顔子之有不善正在此間者是也旣曰有妄則非私欲而何湏是都無此意思自然從容中道才方純是道心也必有事焉却是見得此理而存養下功處與所謂純是道心者蓋有間矣然旣察本原則自此可加精一之功而進夫純耳中間儘有次第也惟精惟一亦未離夫人心特須如此克盡私欲全復天理儻不由此則終無可至之理耳答張敬夫問目孟子曰盡其心者知其性也知性則知天矣心體廓然𥘉無限量惟其梏於形器之私是以有所蔽而不盡人能克巳之私以窮天理至於一旦脫然私意剥落則廓然之體無復一毫之蔽而天下之理逺近精粗隨所擴充無不通逹性之所以爲性天之所以爲天蓋不離此而一以貫之無次序之可言矣孔子謂天下歸仁者正此意也存其心養其性所以事天也心性皆天之所以與我者不能存養而梏亡之則非所以事天也夫心主乎性者也敬以存之則性得其養而無所害矣此君子之所以奉順乎天蓋能盡其心而終之之事顔冉所以請事斯語之意也然學者將以求盡其心亦未有不由此而入者故敬者學之終始所謂徹上徹下之道但其意味淺深有不同爾殀壽不貳脩身以俟之所以立命也云殀與夭同夫夭壽之不齊蓋氣之所禀有不同者不以悅戚二其心而惟脩身以俟之則天之正命自我而立而氣禀之短長非所論矣愚謂盡心者私智不萌萬里洞貫歛之而無所不具擴之而無所不通之謂也學至於此則知性之爲德無所不該而天之爲天者不外是矣存者存此而巳養者養此而巳事者事此而巳生死不異其心而脩身以俟其正則不拘乎氣禀之偏而天之正命自我立矣告子曰不得於言勿求於心不得於心勿求於氣孟子引告子之言以告丑明告子所以不動其心術如此告子之意以爲言語之失當直求之於言而不足以動吾之心念慮之失當直求之於心而不必更求之於氣蓋其天資剛勁有過人者力能堅忍固執以守其一偏之見所以學雖不正而能先孟子以不動心也觀其論性數章理屈詞窮則屡變其說以取勝終不能從容反覆審思明辨因其所言之失而反之於心以求至當之歸此其不得於言而勿求諸心之驗也歟不得於心勿求於氣可不得於言勿求於心不可孟子旣引告子之言而論其得失如此夫心之不正未必皆氣使之故勿求於氣未爲盡失至言之不當未有不出於心者而曰勿求於心則有所不可矣伊川先生曰人必有仁義之心然後有仁義之氣晬然逹於外所以不得於心勿求於氣可也又曰告子不得於言勿求於心蓋不知義在内也皆此意也然以下文觀之氣亦能反動其心則勿求於氣之說未爲盡善但心動氣之時多氣動心之時少故孟子取其彼善於此而巳凡曰可者皆僅可而未盡之詞也至於言則雖發乎口而實出於心内有蔽䧟離窮之病則外有詖淫邪遁之失不得於言而毎求諸心則其察理日益精矣孟子所以知言養氣以爲不動心之本者用此道也而告子反之是徒見言之發於外而不知其出於中亦義外之意也其害理深矣故孟子斷然以爲不可於此可見告子之不動心所以異於孟子而亦豈能終不動者哉滿腔子是惻隱之心此是就人身上指出此理充塞處最爲親切若於此見得即萬物一體更無内外之别若見不得却去腔子外尋不見即莽莽蕩蕩無交渉矣陳經正云我見天地萬物皆我之性不復知我身之所爲我矣伊川先生曰它人食飽公無餒乎正是說破此病知言亦云釋氏和虚空沙界爲已身而不敬其父母所生之身亦是說此病也仲尼焉學舊說得太髙詳味文意文武之道只指先王之禮樂刑政教化文章而巳故特言文武而又以未墜於地言之若論道體則不容如此立言矣但向來貪箇意思將此一句都瞞過了李光祖雖欲曲爲之說然終費氣力似不若四平放下意味深長也但聖人所以能無不學無不師而一以貫之便有一箇生而知之底本領不然則便只是近世博雜之學而非所以爲孔子故子貢之對雖有遜詞然其推尊之意亦不得而隱矣寂感之說甚佳然愚意都是要從根本上說來言其有此故能如此亦似不可偏廢但爲字下不著耳今欲易之云有中有和所以能寂感而惟寂惟感所以爲中和也如何夫易何爲者也止以斷天下之疑此言易之書其用如此是故蓍之徳止不殺者夫此言聖人所以作易之本也蓍動卦靜而爻之變易無窮未畫之前此理巳具於聖人之心矣然物之未感則寂然不動而無朕兆之可名及其出而應物則憂以天下而所謂圎神方智者各見於功用之實矣聦明睿智神武不殺言其體用之妙也是故明於天之道止以前民用此言作易之事也聖人以此齋戒以神明其德夫此言用易之事也齋戒敬也聖人無一時一事而不敬此特因卜筮而言尤見其精誠之至如孔子所愼齋戦疾之意也湛然純一之謂齋肅然警愓之謂戒玩此則知所以神明其徳之意也乾坤其易之藴耶止乾坤或㡬乎息矣自易道統體而言則乾陽坤隂一動一靜乃其藴也自乾坤成列而觀之則易之爲道又不在乾坤之外惟不在外故曰乾坤毁則無以見易然易不可見則乾自乾坤自坤故又曰易不可見則乾坤或㡬乎息矣學而說此篇名也取篇首兩字爲别初無意義但學之爲義則讀此書者不可以不先講也夫學也者以字義言之則巳之未知未能而暁夫知之能之之謂也以事理言之則凡未至而求至者皆謂之學雖稼圃射御之微亦曰學配其事而名之也而此獨專之則所謂學者果何學也蓋始乎爲士者所以學而至乎聖人之事伊川先生所謂儒者之學是也蓋伊川先生之意曰今之學者有三詞章之學也訓詁之學也儒者之學也欲通道則舎儒者之學不可尹侍講所謂學者所以學爲人也學而至於聖人亦不過盡爲人之道而巳此皆切要之言也夫子之所志顔子之所學子思孟子之所傳皆是學也其精純盡在此書而此篇所明又學之本故學者不可以不盡心焉哭則不歌一日之中或哭或歌是䙝於禮容范曰哀樂不可以無常無常非所以養心也哭與歌不同日不惟恤人亦所以自養也尹曰于此見聖人忠厚之心也不圖爲樂之至於斯言不意舜之爲樂至於如此之羙使其恍然忘其身世也愼而無禮葸絲里反畏懼之皃絞急也寢不尸范以爲嫌惰慢之氣設於身體孫思邈言睡欲踧覺則舒引夫子寢不尸爲證君子不以紺緅飾紺玄色說文云深青楊赤色也緅絳色飾者縁領也齋服用絳三年之䘮旣朞而練其服以緅爲飾紅紫非正色青赤黃白黒五方之正色也緑紅碧紫騮五方之間色也蓋以木之青克土之黄合青黄而成緑爲東方之間色以金之白克木之青合青白而成碧爲西方之間色以火之赤克金之白合赤白而成紅爲南方之間色以水之黒克火之赤合赤黒而成紫爲北方之間色以土之黄克水之黒合黄黒而成騮爲中央之間色可欲之謂善天機也非思勉之所及也今人乍見孺子入井皆有怵惕惻隱之心小人閒居爲不善無所不至見君子而后厭然揜其不善而著其善玩乍見字厭然字則知可欲之謂善其衆善之首萬理之先而百爲之㡬也歟可欲之謂善㡬也聖人妙此而天也賢人明此而敬也善人由此而不知也小人舎此而不由也雖然此㡬不爲尭存不爲桀亡其始萬物終萬物之妙也歟喜怒哀樂之未發謂之中性也發而皆中節謂之和情也子思之爲此言欲學者於此識得心也心也者其妙情性之徳者歟易無思也無爲也寂然不動忠也敬也立大本也感而遂通天下之故恕也義也行逹道也定靜安三字雖分節次其實知止後皆容易進安而後能慮慮而后能得此最是難進處多是至安處住了安而后能慮非顔子不能之去得字地位雖甚近然只是難進挽弓到臨滿時分外難開舜好察邇言邇言淺近之言也猶所謂尋常言語也㝷常言語人之所忽而舜好察之非洞見道體無精粗差别不能然也孟子曰自耕稼陶漁以至爲帝無非取諸人者又曰聞一善言見一善行若決江河沛然莫之能禦此皆好察邇言之實也伊川先生曰造道深後雖聞常人語言至淺近事莫非義理是如此孟子明則動矣未變也顔子動則變矣未化也有天地後此氣常運有此身後此心常發要於常運中見太極常發中見本性離常運者而求太極離常發者而求本性恐未免釋老之荒唐也答張敬夫道即本也道即本也却恐文意未安蓋莫非道也而道體中又自有要約根本處非離道而别有本也如云親親仁也敬長義也此所謂本也無它逹之天下也則是本旣立而道生矣此則是道之與本豈常離而爲二哉不知如此更有病否苟志於仁夫舉措自吾仁中出而俯仰無所愧怍更無打不過處此惟仁者能之顔曽其猶病諸今以志於仁者便能如此亦不察乎淺深之序矣愚竊以爲志於仁者方是𥘉學有志於仁之人正當於日用之間念念精察有無打不過處若有即深懲而痛改之又從而究夫所以打不過者何自而來用力之乆庶乎一旦廓然而有以知仁矣雖曰知之然亦豈能便無打不過處直是從此存養十分純熟到顔曽以上地位方是入此氣象然亦豈敢自如此擔當只是誠心恭巳而天理流行自無間斷爾今說才志於仁便自如此擔當了豈復更有進歩處耶又且氣象不好亦無聖賢意味正如張子韶孝經首云直指其路急䇿而疾趨之此何等氣象耶蓋此章惡字只是入聲諸先生言之巳詳豈忽之而未嘗讀耶理之至當不容有二若以必自巳出而不蹈前人爲髙則是私意而巳矣横耳所聞無非妙道横耳所聞乃列子之語與聖人之意相入不得聖人只言耳順者蓋爲至此渾是道理聞見之間無非至理謂之至理便與妙道不同自然不見其它雖有逆耳之言亦皆隨理冰釋而初無横耳之意也只此便見聖人之學異端之學不同處其辨如此只毫髮之間也與四時俱者無近功所以可大受而不可小知也謂它只如此一事之能否不足以盡君子之藴故不可小知任天下之重而不懼故可大受小人一才之長亦可器而使但不可以任大事爾民非水火不生活於仁亦然尤不可無者也然水火猶見蹈之而死仁則全保生氣未見蹈之而死者此段文義皆是只此一句有病不必如此過求知仁勇聖人全體皆是非聖人所得與焉故曰夫子自道也道體無窮故聖人未嘗見道之有餘也然亦有勉進學者之意焉自道恐是與道爲一之意不知是否上逹下逹凡百事上皆有逹處惟君子就中得箇髙明底道理小人就中得箇汙下底道理吕謂君子日進乎髙明小人日究乎汙下天下之爲父子者定爲子必孝爲臣必忠不可易也羅先生云只爲天下無不是底父母此說得之四體不言而喻無人說與它它自暁得語太簡不知它指何人此亦好髙之弊强恕而行臨事時却爲私利之心奪不强則無以主恕萬物皆備於我矣反身而誠樂莫大焉此是理明欲盡者强恕而行求仁莫近焉此是强恕而行者無所用恥小人機變之心勝初不知有恥故用不著它爲機變之巧則文過飾非何所不至無所用恥也禮之用和爲貴禮之發用處以和爲貴是禮之和猶水之寒火之熱非有二也當時行之百姓安之後世宜之莫不見其爲美也所謂民之質矣日用飲食羣黎百姓徧爲爾徳先王之道若以此爲美而小大由之則有所不行蓋天下皆知美之爲美斯惡矣知和之云云又逐末而忘本故亦不可行也大凡老子之言與聖人之言全相入不得也雖有相似處亦須有毫釐之差況此本不相似耶此說似亦過當禮與和是兩物相須而爲用范說極好伊川和靜以小大由之一句連上句說似更分明可更詳味若如此說恐用心漸差失其正矣先行其言一云行者不是汎而行乃行其所知之行也但先行其言便是箇活底君子行仁言則仁自然從之行義言則義自然從之由形聲之於影響也道理自是如此非有待而然也惟恐其不行耳此章范謝二公說好不須過求恐失正理見其禮而知其政子貢自說巳見禮便知政聞樂便知徳禮樂正意不必是百世之王亦不必是夫子只是汎論由百世之後等校百世之王皆莫能逃吾所見吾所見自生民以來未有如孔子者宰我子貢有若到那時雖要形容孔子但各以其所自見得孔子超出百世而孔子所以超出百世終不能形容也此說甚好但不知子貢敢如此自許否恐亦害理也更商量看一云是子貢見夫子之禮而知夫子之所以爲政聞夫子之樂而知夫子之所以爲徳也如知夫子之得邦家之事也亦是子貢聞見所到也莫之能違則吾夫子是箇規矩準繩也君子無所爭必也射乎謂必於射則不免有爭焉及求其所以爭者則乃在乎周旋揖遜之間故其爭也君子異乎衆人所以角力尚客氣也此說甚好充類至義之盡也謂之義則時措之宜無有盡也若要充類而至如不由其道而得者便把爲盗賊之類是義到此而盡舉世無可與者殊不知聖賢權機應用無可無不可者亦與其㓗之義如象日以殺舜爲事及見之象喜亦喜義到此有何盡時不必如此說夫謂非其有而取之者盗也充類至義之盡也熹舊嘗爲說曰充吾不穿窬之心而至於義之盡則可自謂如此豈可緊以此責人哉諸侯之於民所取固不足道云答張欽夫論仁說天地以生物爲心此語恐未安熹竊謂此語恐未有病蓋天地之間品物萬形各有所事惟天確然於上地隤然於下一無所爲只以生物爲事故易曰天地之大徳曰生而程子亦曰天只是以生爲道其論復見天地之心又以動之端言之其理亦巳明矣然所謂以生爲道者亦非謂將生來做道也凡若此類恐當且認正意而不以文害詞焉則辨詰不煩而所論之本指得矣不忍之心可以包四者乎熹謂孟子論四端自首章至孺子入井皆只是發明不忍之心一端而巳初無義禮智之心也至其下文乃云無四者之心非人也此可見不忍之心足以包夫四端矣蓋仁包四德故其用亦如此前說之失但不曽分得體用若謂不忍之心不足以包四端則非也今巳改正仁專言則其體無不善而巳對義禮智而言其發見則爲不忍之心也大抵天地之心粹然至善而人得之故謂之仁仁之爲道無一物之不體故其愛無所不周焉熹詳味此言恐說仁字不著而以義禮智與不忍之心均爲發見恐亦未安蓋人生而靜四德具焉曰仁曰義曰禮曰智皆根於心而未發所謂理也性之徳也及其發見則仁者惻隱義者羞惡禮者恭敬智者是非各因其體以見其本所謂情也性之發也是皆人性之所以爲善者也但仁乃天地生物之心而在人者故特爲衆善之長雖列於四者之目而四者不能外焉易傳所謂專言之則包四者亦是正指生物之心而言非别有包四者之仁而又别有主一事之仁也惟是即此一事便包四者此則仁之所以爲妙也今欲極言仁字而不本於此乃槩以至善目之則是但知仁之爲善而不知其爲善之長也却於巳發見處方下愛字則是但知巳發之爲愛而不知未發之愛之爲仁也又以不忍之心與義禮智均爲發見則是但知仁之爲性而不知義禮智之亦爲性也又謂仁之爲道無所不體而不本諸天地生物之心則是但知仁之無所不體而不知仁之所以無所不體也凡此皆愚意所未安更乞詳之復以見教程子之所訶正謂以愛名仁者熹按程子曰仁性也愛情也豈可便以愛爲仁此正謂不可認情爲性耳非謂仁之性不發於愛之情而愛之情不本於仁之性也熹前說以愛之發對愛之理而言正分别性情之異處其意最爲精宻而來諭每以愛名仁見病下章又云若專以愛命仁乃是指其用而遺其體言其情而略其性則其察之亦不審矣蓋所謂愛之理者是乃指其體性而言且見性情體用各有所主而不相離之妙與所謂遺體而略性者正相南北請更詳之元之爲義不專主於生熹竊詳此語恐有大病請觀諸天地而以易彖文言程傳反復求之當見其意若必以此言爲是則宜其不知所以爲善之長之說矣此乃義理根源不容有毫釐之差竊意髙明非不知此特命辭之未善爾孟子雖言仁者無所不愛而繼之以急親賢之爲務其差等未嘗不明熹按仁但主愛若其等差乃義之事仁義雖不相離然其用則各有主而不可亂也若以一仁包之則義與禮智皆無所用矣而可乎哉無所不愛四字今亦改去又論仁說昨承開諭仁說之病似於鄙意未安即巳條具請教矣再領書誨亦巳具暁然大抵不出熹所論也請復因而申之謹按程子言仁本末甚備今撮其大要不過數言蓋曰仁者生之性也而愛其情也孝悌其用也公者所以體仁猶言克巳復禮爲仁也學者於前三言者可以識仁之名義於後一言者可以知其用力之方矣今不深考其本末指意之所在但見其分别性情之異便謂愛之與仁了無干渉見其以公爲近仁便謂直指仁體最爲深功殊不知仁乃性之徳而愛之本因其性之有仁是以其情能愛義禮智亦性之徳也義惡之本禮遜之本智知之本因性有義故情能惡因性有禮故情能遜因性有智故情能知亦若此爾但或蔽於有我之私則不能盡其體用之妙惟克巳復禮廓然大公然後此體渾全此用昭著動靜本末血脉貫通爾程子之言意蓋如此非謂愛之與仁了無干渉也此說前書言之巳詳今請復以兩言决之如熹之說則性發爲情情根於性未有無性之情無情之性各爲一物而不相管攝二說得失此亦可見非謂公之一字便是直指仁體也細觀來喻所謂公天下而無物我之私則其愛無不溥矣不知此兩句甚處是直指仁體處若以愛無不溥爲仁之體則䧟於以情爲性之失髙明之見必不至此若以公天下而無物我之私便爲仁體則恐所謂公者漠然無情但如虚空木石雖其同體之物尚不能有以相愛況能無所不溥乎然則此兩句中初未嘗有一字說著仁體須知仁是本有之性生物之心惟公爲能體之非因公而後有也放曰公而以人體之故爲仁細看此語却是人字裏靣帶得仁字過來由漢以來以愛言仁之弊正爲不察性情之辨而遂以情爲性爾今欲矯其㢢反使仁字汎然無所歸宿而性情遂至於不相𬋩可謂矯枉過直是亦枉而巳矣其弊將使學者終日言仁而實未嘗識其名義且又并與天地之心性情之徳而昧焉竊謂程子之意必不如此是以敢詳陳之伏惟采察又論仁說熹再讀别𥿄所示三條竊意髙明雖巳灼知舊說之非而此所論者差之毫忽之間或亦未必深察也謹復論之伏幸裁聽廣仲引孟子先知先覺以明上蔡心有知覺之說巳自不倫其謂知此覺此亦未知指何爲說要之大本旣差勿論可也今觀所示乃直以此爲仁則是以知此覺此爲知仁覺仁也仁本吾心之德又將誰使知之而覺之耶若據孟子本文則程子釋之巳詳矣曰知是知此事如此事當如此也覺是覺此理知此事之所以當如此之理也意巳分明不必更求玄妙且其意與上蔡之意亦初無干渉也上蔡所謂知覺正謂知寒暖飽飢之類爾推而至於酬酢佑神亦只是此知覺無别物也但所用有小大爾然此亦只是智之發用處但惟仁者爲能兼之故謂仁者心有知覺則可謂心有知覺謂之仁則不可蓋仁者心有知覺乃以仁包四者之用而言猶云仁者知所羞惡辭讓云爾若曰心有知覺謂之仁則仁之所以得名𥘉不爲此也今不究其所以得名之故乃指其所兼者便爲仁體正如言仁者必有勇有德者必有言豈可遂以勇爲仁言爲徳哉今伯逢必欲以覺爲仁尊兄旣非之矣至於論知覺之淺深又未免證成其說則非熹之所敢知也至於伯逢又謂上蔡之意自有精神得其精神則天地之用皆我之用矣此說甚髙甚妙然旣未嘗識其名義又不論其實下功處而欲驟語其精神此所以立意愈髙爲說愈妙而反之於身愈無根本可據之地也所謂天地之用即我之用殆亦其傳聞想像如此爾實未甞到此地位也愚見如此不識髙明以爲如何又論仁說來教云夫其所以與天地萬物一體者以夫天地之心之所有是乃生生之藴人與物所公共所謂愛之理也熹詳此數句似頗未安盖仁只是愛之理人皆有之然人或不公則於其所當愛者又有所不愛惟公則視天地萬物皆爲一體而無所不愛矣若愛之理則是自然本有之理不必爲天地萬物同體而後有也熹向所呈佀仁說其間不免尚有此意方欲改之而未暇來教以爲不如克齋之云是也然於此却有所未察竊謂莫若將公字與仁字且各作一字看得分明然後却看中間兩字相近處之爲親切也若遽混而言之乃是程子所以謂以公便爲仁之失此毫釐間正當子細也又看仁字當并義禮智字看然後界限分明見得端的今舎彼三者而獨論仁字所以多說而易差也又謂體用一源内外一致爲仁之妙此亦未安蓋義之有羞惡禮之有恭敬智之有是非皆内外一致非獨仁爲然也不審髙明以爲如何答欽夫仁疑問仁而不佞章說云仁則時然後言疑此句只說得義字不知其仁也章說云仁之義未易可盡不可以如是斷若有盡則非所以爲仁矣又曰仁道無窮不可以是斷此數句恐有病蓋欲極其廣大而無所歸宿似非知仁者之言也未知焉得仁章此章之說似只說得智字井有仁焉章此章之說似亦只說得智字克巳復禮爲仁章說云由乎中制乎外按程集此誤兩字當云而應乎外又云斯道也果思慮言語之可盡乎詳此句意是欲發明學要躬行之意然言之不明反若極其玄妙務欲使人暁解不得將啓望空揣摸之病矣向見吳才老說此章云近世學者以此二語爲微妙隱奥聖人有不傳之妙必深思黙造而後得之此雖一偏之論然亦吾黨好談玄妙有以啓之也此言之失恐復墮此不可不察必世而後仁章說云使民皆由吾仁如此則仁乃一巳之私而非人所同得矣樊遲問仁章說云居處恭執事敬與人忠則仁其在是矣又云要須從事之乆功夫不可間斷恐須先說從事之乆功夫不可間斷然後仁在其中如此所言却似顚倒也仁者必有勇章說云於其所當然者自不可禦又云固有勇而未必中節也者故不必有仁此似只說得義字未有小人而仁者也章說云惟其冥然莫覺皆爲不仁而巳矣此又以覺爲仁之病殺身成仁章說云是果何故㦲亦曰理之所㑹全吾性而巳欲全吾性而後殺身便是有爲而爲之且以全性兩字言仁似亦未是知及仁守章說云如以愛爲仁而不明仁之所以愛此語盖未盡宰我問䘮章說云以爲不仁者盖以其不之察也宰我聞斯言而出其必有以悚動於中矣㩀此似以察知悚動爲仁又似前說冥然莫覺之意殷有三仁章說云三人皆處之盡道皆全其性命之情以成其身故謂之仁又云可以見三子之所宜處矣此似只說得義字又以全其性命之情爲仁前巳論之愽學而篤志章明道云學者要思得之說云蓋不可以思慮臆度也按此語與明道正相反又有談說玄妙之病前所論不知其仁克巳復禮處與此正相類大抵思慮言語躬行各是一事皆不可廢但欲實到須躬行非是道理全不可思量不可講說也然今又不說要在躬行之意而但言不可以言語思慮得則是相率而入於禪者之門矣以上更望詳考之復以見敎又劉子澄前日過此說髙安所刋太極說見今印造近亦有在延平見之者不知尊兄以其書爲如何如有未安恐須且收藏之以俟考訂而後出之也言仁之書恐亦當且住即俟更討論如何答欽夫仁說仁說明白簡當非淺陋所及但言性而不及情又不言心貫性情之意似只以性對心若只以性對心即下文所引孟子仁人心也與上文許多說話似若相戾更乞詳之又曰巳私既克則廓然大公與天地萬物血脉貫通愛之理得於内而其用形於外天地之間無一物之非吾仁矣此亦其理之本具於吾性者而非彊爲之也此数句亦未安蓋巳私既克則廓然大公皇皇四逹而仁之體無所蔽矣夫理無蔽則天地萬物血脉貫通而仁之用無不周矣然則所謂愛之理者乃吾本性之所有特以廓然大公而後在非因廓然大公而後有也以血脉貫通而後逹非以血脉貫通而後存也今此数句有少差紊更乞詳之愛之之理便是仁若無天地萬物此理亦有虧欠於此識得仁體然後天地萬物血脉貫通而用無不周者可得而言矣蓋此理本甚約今便將天地萬物夾雜說却鶻突了夫子答子貢愽施濟衆之問正如此也更以復見天地之心之說觀之亦可見蓋一陽復處便是天地之心完全自足非有待於外也又如濂溪所云與自家意思一般者若如今說便只說得一般兩字而所謂自家意思者却如何見得耶又云視天下無一物之非仁此亦可疑蓋謂視天下無一物不在吾仁中則可謂物皆吾仁則不可蓋物自是物仁自是心如何視物爲心耶又云此亦其理之本具於吾性者而非彊爲之也詳此蓋欲發明仁不待公而後有之意而語脉中失之要之視天下無一物非仁與此句似皆剰語並乞詳之如何答張欽夫諸說例蒙印可而未發之㫖又其樞要旣無異論何慰如之然比觀舊說却覺無甚綱領因復體察得見此理須以心爲主而論之則性情之德中和之妙皆有條而不紊矣然人之一身知覺運用莫非心之所爲則心者固所以主於身而無動靜語黙之間者也然方其靜也事物未至思慮未萌而一性渾然道義全具其所謂中是乃心之所以爲體而寂然不動者也及其動也事物交至思慮萌焉則七情迭用各有攸主其所謂和是乃心之所以爲用感而遂通者也然性之靜也而不能不動情之動也而必有節焉是則心之所以寂然感通周流貫徹而體用未始相離者也然人有是心而或不仁則無以著此心之妙人雖欲仁而或不敬則無以致求仁之功蓋心主乎一身而無動靜語黙之間是以君子之於敬亦無動靜語黙而不用其力焉未發之前是敬也固巳主乎存養之實已發之際是敬也又常行於省察之間方其存也思慮未萌而知覺不昧是則靜中之動復之所以見天地之心也及其察也事物紛紏而品節不差是則動中之靜艮之所以不獲其身不見其人也有以主乎靜中之動是以寂而未嘗不感有以察乎動中之靜是以感而未常不寂寂而常感感而常寂此心之所以周流貫徹而無一息之不仁也然則君子之所以致中和而天地位萬物育者在此而巳蓋主於身而無動靜語黙之間者心也仁則心之道而敬則心之貞也此徹上徹下之道聖學之本統明乎此則性情之徳中和之妙可一言而盡矣熹向來之說固未及此而來喻曲折雖多所發明然於提綱振領處似亦有未盡又如所謂學者先須察識端倪之發然後可加存養之功則熹於此不能無疑蓋發處固當察識但人自有未發時此處便合存養豈可必待發而後察察而後存耶且從𥘉不曽存養便欲隨事察識竊恐浩浩茫茫無下手處而豪釐之差千里之繆將有不可勝言者此程子所以每言孟子才髙學之無可依據人湏是學顔子之學則入聖人爲近有用力處其微意亦可見矣且如灑掃應對進退此存養之事也不知學者將先於此而後察之耶抑將先察識而後存養也以此觀之則用力之先後判然可觀矣來教又謂動中涵靜所謂復見天地之心亦所未喻熹前以復爲靜中之動者蓋觀卦象便自可見而伊川先生之意似亦如此來教又謂言靜則溺於虚無此固所當深慮然此二字如佛者之論則誠有此患若以天理觀之則動之不能無靜猶靜之不能無動也靜之不能無養猶動之不可不察也但見得一動一靜互爲其根敬義夾持不容間斷之意則雖下靜字元非死物至靜之中蓋有動之端焉是乃所以見天地之心者而先王之所以至日閉關蓋當此之時則安靜以養乎此爾固非逺事絶物閉目兀坐而偏於靜之謂但未接物時便有敬以主乎其中則事至物來善端昭著而所以察之者益精明爾伊川先生所謂却於已發之際觀之者正謂未發則只有存養而巳發則方有可觀也周子之言主靜乃就中正仁義而言以正對中則中爲重以義配仁則仁爲本爾非四者之外别有主靜一段事也來教又謂熹言以靜爲本不若遂言以敬爲本此固然也然敬字工夫通貫動靜而必以靜爲本故熹向來輙有是語今若遂昜爲敬雖若完全然却不見敬之所施有先有後則亦未得爲諦當也至如來教所謂要湏察夫動以見靜之所存靜以涵動之所本動靜相須體用不離而後爲無滲漏也此數句卓然意語俱到謹以書之座右出入觀省然上兩句次序似未甚安意謂易而置之乃有可行之實不審尊意以爲如何晦庵先生朱文公文集卷第三十二閩縣學訓導何器校
