body:
  text: 書知舊門人問答答蔡季通元定昨日上狀必巳逹此人至又辱書三復感歎不能自巳所謂一劔兩假者改過之勇固當如此改過貴勇而防患貴怯二者相須然後真可以修慝辨惑而成徙義崇德之功不然則向來竊聆悔過之言非不切至而前日之書頓至於此亦可驗矣自今以往設使真能一劔兩假亦不可以此自恃而平居無事常存祗畏警懼之心以防其源則庶乎其可耳易説三條昨亦思之此上下文本自通貫前此求其説而不得故各自為説而不能相通耳洗心齋戒特觀象玩辭觀變玩占之大者但方其退藏而與民同患之用巳具及其應變則又所以齋戒而神明其德此則非聖人不能與精義致用利用崇德亦頗相類此下所言闔闢往來乃易之道易有太極則承上文而言所以往來闔闢而無窮者以其有是理耳有是理則天地設位而易行乎其中矣兩而生四四而生八至於八則三變相因而三才可見故聖人因之畫為八卦以形變易之妙而定吉凶至此然後可以言書耳前所謂易有太極者恐未可以書言也愚意如此不審如何答蔡季通人之有生性與氣合而巳然即其巳合而析言之則性主於理而無形氣主於形而有質以其主理而無形故公而無不善以其主形而有質故私而或不善以其公而善也故其發皆天理之所行以其私而或不善也故其發皆人欲之所作此舜之戒禹所以有人心道心之别蓋自其根本而巳然非為氣之所為有過不及而後流於人欲也然但謂之人心則固未以為悉皆邪惡但謂之危則固未以為便致凶咎但既不主於理而主於形則其流為邪惡以致凶咎亦不難矣此其所以為危非若道心之必善而無惡有安而無傾有凖的而可憑據也故必其致精一於此兩者之間使公而無不善者常為一身萬事之主而私而或不善者不得與焉則凡所云為不待擇於過與不及之間而自然無不中矣凡物剖判之𥘉且當論其善不善二者既分之後方可論其中不中惟精惟一所以審其善不善也允執厥中則無過不及而自得中矣非精一以求中也此舜戒禹之本意而序文述之固未嘗直以形氣之發盡為不善而不容其有清明純粹之時如來諭之所疑也但此所謂清明純粹者既屬乎形氣之偶然則亦但能不隔乎理而助其發揮耳不可便認以為道心而欲據之以為精一之地也如孟子雖言夜氣而其所欲存者乃在乎仁義之心非直以此夜氣為主也雖言養氣而其所用力乃在乎集義非直就此氣中擇其無過不及者而養之也來諭主張氣字太過故於此有不察其他如分别中氣過不及處亦覺有差但既無與乎道心之微故有所不睱辨耳答蔡季通所喻以禮為先之説又似識造化之云不免倚於一物未是親切工夫耳大抵濂溪先生説得的當通書中數數拈出幾字要當如此瞥地即自然有箇省力處無規矩中却有規矩未造化時巳有造化然後本隱之顯推見至隱無處不吻合也答蔡季通觀過説猶未安前日二生所寫告為收毀仍試别加思索只於欽夫舊説中去得昨來所攻之病便自妥帖簡當也國寶程書告早為校正示及書堂誠欲速就然當使伯夷築之乃佳耳小兒輩又煩收教尤劇愧荷但放逸之久告痛加繩約為幸所示孟子數説未及細觀略看大意皆好但恐微細有所未盡耳所與子直書論大本處甚佳雖云凡聖本同亦有明與不明之異昨見子直説及正疑其太儱侗今得此書乃釋然耳通鑑東漢巳後却未用得然昨日略看更有一例如人主稱上稱車駕行幸皆臣子之詞我師我行人之屬皆內詞皆非所宜施於異代此類更須别考也但無道之君無故而入諸臣之家無詞以書只當書幸以見其出於私恩耳餘卷想看了若行李暫出告并所編例示及所欲改處望子細開諭也環中圖巳見之𥘉意書中别有密傳耳樂圖曽理會否此便是七均八十四調之法變當是變徴閏當是變宮耳疑大樂亦只是如此推校但律之髙下未有凖則王朴之樂想亦只是得此法而不得律之高下所云黃鍾之管與今黃鍾之聲相因因而推之得十二律乃是只以當時見存之律為凖如此安能得其真耶故歐公云凡其所為當時莫敢難者然亦莫能加也似亦以此等為疑耳向所托校歸藏告示及朝以道易説亦望借及此書近細讀之恐程傳得之巳多但不合全説作義理不就卜筮上看故其説有無頓著處耳今但作卜筮看而以其説推之道理自不可易但其間有不須得如此説處剩著道理耳正如詩之興者舊説常剩却一半道理也答蔡季通子幸大兒不兒疑有誤字還家半月節中哀痛不自勝兩兒久欲遣去因循至今今熹亦欲過寒泉矣謹令詣左右告便令入學勿令遊嬉廢業子幸大兒不兒令讀時文然觀近年一種淺切文字殊不隹須尋得數十年前文字寬舒有議論者與看為佳雖不入時無可奈何要之將來若能入場屋得失又須有命決不專在趨時也向借得子勉舊本書義皆今人所不讀者其間儘有佳作又記向年曽略看論粹前後集其間亦多好論然當時猶以為俚俗而不觀安知今日乃作此曲拍乎可歎此兒讀左傳向畢經書要處更令溫繹為佳如禮記令㨂篇讀韓歐曽蘇之文滂沛明白者㨂數十篇令寫出反復成誦尤善莊荀之屬皆未讀可更與兼善斟酌度其緩急而授之也此兒作文更無向背往來之勢自首至尾一樣數假更看不得可怪望與鐫之小者尤難説然只作小詩無益更量其材而誘之為幸近來覺得稍勝往年不知竟能少進否可慮錢物巳令携去一千足米俟到后山遣致或彼價廉即寄錢去煩為糴也數日在家看得孟子兩篇今日讀滕文公篇觀其答景春之問直是痛快三復令人胸中浩然如濯江漢而暴秋陽也胡文定一書答朱子發舉南泉新貓話者集中有之否看此等處直是好著眼目也所論始終條理甚精密矣引康節志文尤當兒寬未必是引孟子恐是古來樂家自有此語而因用之耳蓋前漢人多不甚説孟子也此亦無緊要但前日説中亦不曽如此説又其文太冗須更刋定趨約乃隹耳持養之功想日有味要之以久則克伐怨欲之私自當退聽矣欽夫伯恭晦叔得書納去一觀却付此便回欽夫書勿以示人也伯恭竟未脫然前日答書不免又極論持飬欽莊實有愧於其語然不敢私其身之意當有能識之者所答書無暇寫去大槩是此意可見也擇之亦得書中有數條今再以往數書之説得暇試為一一論之相見日靣講也伯諌前日過宿其家來書示之渠甚歎服精進但公濟孤立甚可念恨無力能挽回耳道間思久假之説欲下語云五伯假之而至於功施當時名顯後世則是久假而不歸失人亦安能知其本非真有哉孟子之言蓋疾矯偽之亂真傷時人之易惑而非與五伯之辭也煩為呈似元禮可大二兄商量看如何今日因思此義偶得一法大抵思索義理到紛亂窒塞處須是一切掃去放教胸中空蕩蕩地了却舉起一看便自覺得有下落處此説向見李先生曽説來今日方真實驗得如此非虛語也綱目數日曽看得否高紀中數詔極佳如立口賦法及求賢詔皆合入更煩推此類添入有看了册旋付此童來幸甚易學辨惑及邵氏辨誣暫借皆可付此人便欲用也别又旬日巳劇馳情奉告承即日秋暑侍履吉慶夀堂眷集一一隹勝為慰前日之歎蓋見近日朋友談説紛然而躬行不力以至言談舉止之間猶未有以異於衆人是以憂之承問之及豈亦致疑於此耶古易納上坊中更有王日休所刋求之未獲可訪問考訂孰為得失也鄙意與伯諌深欲季通一來稍霽便望命駕有合商量事甚多非書札所能辨也通鑑簽貼甚精密乍到此未暇子細并俟相見靣論撥冗作書遣此人歸不及詳悉千萬早來為佳兼善逺訪無以堪其意愧惕不自勝然捐其舊學之非非季通深排痛抵之力亦不能辨朋友正當如此衰懶不振負愧多矣渠不肯少留未及子細亦恨賢者不在此共評訂耳熹向所論中和等説近細思之病敗不少理固未易窮然昏憒如此殊可懼安得即靣言之佇俟來音旦夕别遣人奉候啓蒙近又推得𥘉揲之餘不五則九其數皆竒而其為數之實五三而九一之應圍三徑一之數第二三揲之餘不四則八其數皆偶而其為數之實四八皆二亦應圍四用半之數是三揲之次亦巳自有竒偶之分若第二三揲不挂則不復有此差别矣如何星經紫垣固所當先太微天市乃在二十八舍之中若列於前不知如何指其所在恐當云在紫垣之旁某星至某星之外起某宿幾度盡某宿幾度又記其帝坐處須云在某宿幾度距紫垣幾度赤道幾度距垣四靣各幾度與垣外某星相直及記其昏見及昏旦夜半當中之月其垣四靣之星亦須注與垣外某星相直乃可易曉不知盛意如何也參同二册鍾乳一兩納上考異熹安能決其是非但恐文義音讀間有可商量處耳鐘律之篇大槩原於盛編而其先後不同蓋但用古書本語或注疏而以巳意附其下方甚簡約而極周盡學樂者一覽可得梗槩其他推説之泛濫旁證之異同不盡載也當俟歸日靣呈決求訂正耳星經可付三哥畢其事否甚願早見之也近校得步天歌頗不錯其説雖淺而詞甚俚然亦𥘉學之階梯也但恨難得人説話非惟不能有助亦目不曉人意令人鬱鬱無分付處想亦不能無此歎也答蔡季通人還承書為慰又承示及行日卦爻之説尤荷留念即此春暖其惟尊履萬福所苦比復如何須鹿茸納去視至通鑑本末并注綱目提要第九第十册以是未定不曽寫此物甚難作書法固不可不本春秋然又全用春秋不得舊有例一册不知曽并送去了洪範新説恨未得聞俟靣見以請算工俟為尋訪然亦須立一格目要得甚樣人始得如州縣攢司儘有能算者但恐不能算曆耳人還承書知巳還舍為慰易圖甚精但發例中不能盡述當略提破而籍圖以傳耳陳法大略亦可見當如近日所説但未能洞曉其曲折耳藥圖煩更問子本此只有十二樣而調見之多何耶琴説亦告尋便示及千萬調見之多疑有誤字登山失事久知如此雖遂事不諌亦可斟酌簡其功程也二譜巳領昨日過元善聽其弦歌二南七月頗可聽但恐嚇走孔夫子耳磬制乃賢者立論之失豈可推范蜀公蜀公若道季通許多説著處都不推我只這一事錯了便相執殢則將何詞以對耶如此護前恐為心術之害不但一事之失也通書注修改甚精元來誠幾德便是太極二五此老些子活計盡在裏許也前後知他讀了幾過都不曾見此意思於此益知讀書之難也近得林黃中書大罵康節數學橫渠西銘袁機仲亦來攻邵氏甚急可笑嘗記共甫説往時有亡大夫坐乞毀通鑑板𬒳責發來復官詞臣草其制有一聮云出幽谷而遷喬木朕姑示於寬恩以鳲鶚而笑鳳凰爾無沈於迷識此輩今亦可并按也一笑鳲鶚疑鴟梟之誤前日七八九六之説於意云何近細推之乃自河圖而來即老兄所謂洛書者欲於啓蒙之首增此一篇并列河圖洛書以發其端而揲蓍法中只自大衍以下又分變卦圖别為一篇此卦以後雖不畫卦亦列卦名庶幾易檢幸為録示也河洛辨説甚詳然皆在夫子作傳之後其間極有不足據以為説者鄙意但覺九宫之圖意義精約故疑其先出而八卦十數九疇五行各出一圖自不相妨故有虛中為易實中為範之説自謂頗得其旨今詳所論亦是一説更俟靣論然恐卒未有定論不若兩存以俟後人之為愈也歸竒多寡不同向時嘗辱見示無可疑者似合附入圖中今却附還幸便寫入四象之後也律吕新書并往題辭協律恨未得聞且愧其詞義之不稱也祭禮只是於溫公儀內少增損之正欲商訂須俟開春稍睱乃可為也程氏冬至立春二祭昔嘗為之或者頗以僣上為疑亦不為無理亦并俟詳議也作肅所求熹與其人本不相熟今才一見耳固不容便作書亦見近日朋友憂道不如憂貧之切心甚愧恐平日所講果為何事而一旦小利害便打不過欲望其守死善道難矣答蔡季通至臨江忽𬒳改除之命超越非常不敢當也始者猶欲且歸里中俟辭召命豫決今既如此又得朝士書皆云召旨乃出上意親批且屢問及不可不來又云主上虛心好學增置講員廣立程課深有願治之意果如此實國家萬萬無強之休義不可不一往遂自臨川改轅趨信上以俟辭免之報但嶽麓事前書奉報乃廷老所定後兩日彥忠到却説合在風雩右手僧寺菜畦之中背負亭腳靣對筆架山面前便有右邉橫按掩抱左邊坂亦拱揖勢似差勝但地盤直淺而橫闊恐須作排廳堂乃可容耳巳屬廷老更畫圖來納去求正而未至更俟其來當别遣人但代者乃毁道學之人未知其能不敗此否耳熹老矣方學做官甚可笑朝從奔走皆非所堪但叨冒過分上恩深厚未敢言去耳經筵陳説不敢不盡區區上意亦頗相嚮但未蒙下問反復未得傾竭鄙懷耳君舉在上前陳説極詳緩勤懇其所長自不可及區區實敬愛之非但如來教所云也通理宗教之命巳行前日亦巳歸矣渠年少家溫所欠者腹中書耳得闕逺官間更讀數年書未必不為福也何必汲汲於此乎公濟不長進只管來討書若有相識自不須説若無如何寫得不知他許多禪寄放甚處臨此等小小利害便如此手足皆露也不知今巳行未如未行煩致意不成臘月三十日亦問人討書去見閻家老子也諸公巳各為致意但黃文叔巳逝去熹來亦不及見之此非獨吾黨惜之亦為宗社惜也今日進講恭聞玉音以為太上心氣漸寧但尚苦健忘發引之前必得相見此亦是一大事幸甚幸甚恐欲知之也不知何時可赴三衢之約能乘興東下為數日欵幸甚摟陳諸公亦數奉問也修曆事若下須更商量蓋但測驗即人皆可為或須改造則恐不免一出亦非今日一時事也史遷不可謂不知孔子然亦知孔子之粗耳歷代世變即六國表序是其極致乃是俗人之論知孔子者固如是耶正朔服色乃當時論者所共言如賈生公孫臣新垣平之徒皆言之豈獨遷也此等處自是渠輩眼目低故見得高了亦可笑耳祭法須以宗法參之古人所謂始祖亦但謂始爵及别子耳非如程氏所祭之逺上僣則過於禘下僣則奪其宗之為未安也曆事不知後來有何施行若如其説不知可為一行否祭法世數明有等差未易遽改古人非不知祖不可忘而立法如此恐亦自有精意也史記不知渠説好處是如何好必須曾舉一二尤緊切處若只如曹器逺輩所説則亦不足言也答蔡季通癸丑三月二十一日中間到宅上聞是日得子深為贊喜衰鈍之蹤素不利市自年三十餘時每到人家輒令人生女如是凡五七處今年乃值慶門得男則又似漸有傾否亨屯之象既以奉慶又竊自賀但恨其巳晚耳夏口武昌一帶形勢既聞命矣涉重湖窺衡湘歷襄漢下吳會方羊而歸所得當益富屈指計歸程兾得傾竦以聽劇談也律準前日一哥來此巳刻字調絃而去但中絃須得律管然後可定然則此器亦是樂家第二義也閣記固難遽辦又適此數日腳氣雖輕而未愈今旦右臂下自瓜掌以上連肩背無處不痛寒熱大作其勢非更數日卒未能定不知許教既滿彼中代者為誰或同官中别有可託以竟此事者為誰亦巳作書報之及與元善説俟此間病愈一面㑫合成當尋的便寄薛卿處與之當無不逹也今年病雖不重而氣體極衰至於昨日遂至無力説話朋友逺來相守又不欲甚孤其意勉強應接常慮相見之日不復更能長久季通倦遊亦望早歸相與切磋以盡餘年實所願望啓蒙修了未早欲得之通書皇極例等説不知巳下手否如未幸早為之乍歸窘甚㸑無欲請之人只欲得賢者一來會語數日為幸切不必多與人同虛費又難語也可以他意却之不必露此千萬千萬所苦且喜向安亦宜更加將護也許見訪甚幸但亦自欲一到寒泉未能預定日子恐或塗中相失也此行見上褒豫甚至言雖狂妄亦無忤色意謂可以少效尺寸而事之不可料者乃發於先天訂頑之間是可笑也巳專人自劾及盡還江右迓兵矣此等小小怪謬議論如蝟毛而起更不可開口奈何始者信書太過而閲人不廣不謂萭物之靈者乃如此不靈也奈何更五七日當有後命未知如何也元善説欲下州郡月致筆札之費然此事亦當審處恐此事靣生後或有悔也伯諌來此巳兩三日𥘉欲來日歸因與商量約左右一來相聚今專遣此人相挽渠亦遣人歸戒徒御少緩一兩日來矣千萬即命駕其所論極不爭多孤城悉拔合軍并力鼓可克也中間報去欲改文王八卦邵子説應天時應地方説下注腳今覆檢之不得其説恐前説有誤却錯改却印本煩令一哥檢出録示幸甚細詳此圖若以卦畫言之則震以一陽居下兊以一隂居上而相對坎以一陽居中離以一隂居中故相對巽以一隂居下艮以一陽居上故相對乾純陽坤純隂故相對此亦是一説但不知何故四隅之卦却如此相對耳此圖是説不得也聞有在陳之厄不能有以相周為之歎息而巳律説少有礙處便不可筆之於書此意甚善不惟此一事而巳它事亦何莫不然也但貟徑亦須更子細如引漢志由此之義起十二律之周徑恐未免有牽強處也嘉量積處數之前合定方深圍徑之數以相參驗證辨首章可早修定寄來商量此處無頭難下語也四象之數前日間推只自三畫未成之時巳具此數蓋太陽居一而含九少隂居二而含八少陽居三而含七太隂居四而含六不待揲蓍而後有也揲蓍歸竒之數乃是揍著此數過揲之數又是揍著歸竒之數耳近見論者專以過揲之數斷七八九六之説至於歸竒之數尚不能明况能及此乎嘗為之説曰四象之畫六七八九之祖也四象之次六七八九之父也歸竒者其子也過揲者其孫也此論似不可易又曰象之次自十倒數畫六而得太隂之四以上皆然又屈五指而計之一與九同二與八同三與七同四與六同此亦自然不言之妙直是可笑不由人安排也不知明者以為如何啓蒙所疑當得靣扣然得先批示大略尤佳歸竒巳具卦象固平日所常論但亦其中一小支節耳蓋其多寡不均無所發明於蓍卦之説正自不足深論也如何如何律説幸早改定過彼即借看或能相伴入城途中得欵曲啇訂尤幸也中庸序云若吾夫子則雖不得其位昨看此間寫本脫一吾字煩一哥為看如少即添之此雖不繫義理然亦覺少不得也費隱之説今日終日安排終不能定蓋察乎天地終是説做隱字不得百種計較更説不來且是所説不知不能有憾等句虛無恍惚如捕風繫影聖人平日之言恐無是也與未之或知不可能也不同不審看得如何幸詳以見喻也仁義之説固如來喻但於説卦六畫中安排則仁剛義柔不可易矣仁柔義剛又别是一説不相參雜也程先生謂天地間無截然為隂為陽之理然其升降生殺之大分不可無也正是此意而袁於此等處都瞢然不曉所以難説話也修身齊家固當警省至於有無之慮姑直任之不必切切介意若此等處更放不下即修行轉無力矣區區於此可憂者大於老兄然亦只得隨事驅遣瞑目之後一切任之亦不復屬自巳界分矣中庸詩傳幸速修改示及中庸更有數處今并録呈幸即付之也西山之約一何拒客之深耶俟武夷歸别當奉扣然臨風引領似巳聞采薇之歌矣歸來又得伯恭書云學者須是專心致志絶利一源凝聚渟滀方始收拾得上此論甚當不敢不以告也吳曽文字巳領亦甚不易但無斁三篇似不甚條暢耳數日臨睡讀史記一兩卷沈著痛快真不可及不知永嘉諸人尊信此書而道得言語却不相似是何故也豈善學柳下惠者固如是耶元吉尚未行何耶渠來此未嘗不忠告之但渠自不耐煩而憤然訣去豈長者之絶子乎季通似亦不須枉費心力宋元憲公牢籠之事吾所不能而聖人亦巳固有顯比之訓矣若必人人贈言以恱之豈不勞哉公濟伯諌得書否某歸塗過伯諌見收公濟書大假手忙腳亂也大學誠意之説巳再觀之果如所論想他書似此處多須一一整頓也明道遺文納去一本答蔡季通律書中有欲改更别𥿄奉呈不審如此是否幸早報及也易中七八九六之數向來只從揲蓍處推起雖亦吻合然終覺曲折太多不甚簡易疑非所以得數之原近因間看四象次第偶得其説極為徑捷不審亦嘗如此推尋否亦幸語及本原第一章圍徑之説殊不分明此是最大節目不可草草候氣章恐合移在第四五間蓋律之分寸既定便當埋管候氣以驗其應否至於播之五聲二變而為六十調者乃其餘耳況審度嘉量謹權尤不當在候氣之前也但候氣章巳有黃鍾之變半分數而前章未有明文恐合於正律分寸章後别立一章具載六變律及正半變半聲律之長短分寸乃為完備耳後假論説有發明此章指者并移附入審度章云云生於黃鐘之長下當改云以子穀秬黍中者九十枚度之一為一分凡黍實於管中則十三枚而滿一重積九十重則千二百枚而滿其籥矣故此九十枚之數與下章千一百枚之數其實一也十分為寸云云嘉量章籥合升斗斛皆當實計廣狹分寸證辨第一章今欲求聲氣之中下當改云而莫適為準則莫若且多截竹以擬黃鍾之管或極其短或極其長長短之內每差一分而為一管皆即以其長權為九寸而度其圍徑如黃鐘之法焉如是則更迭以吹云云司馬貞九分為寸之説本原既不載恐合於證辨中立為一條以證前篇之説諸尺是非後來考得如何巳改定幸并録示答蔡季通前日野行巳拜狀不審即日行次何許每念逺别不勝惆悵至於讀書玩理欲講而無從又不但常人離别之思也云云熹連日讀參同頗有趣知千周萬遍非虛言也但恨前此不得面扣耳向見為抄一册卦氣消息者不知了未幸語一哥取以見豫也又讀握機後語何也數條尤竒昔蓋未有此體亦恨不得究其説耳平日相聚未知其樂别後乃覺闕事可歎可歎答蔡季通别後得到豐城及宜春書知途中諸況足以為慰但至今尚未聞到舂陵復深以為懸念每至讀書講學無可咨扣無可告語尤覺仰德之深也比日恭惟尊候萬福三哥子陵一一安佳此亦時得一哥書八哥前日入城亦過此熹足病前日幾作今又小定未知竟如何但精神日耗血氣日衰舊學荒蕪有退無進恐遂沒沒無聞而死耳樂書非敢忘之但方此齰舌豈敢更妄作耶此書決然泯沒不得近看他人所説更無堪入耳者不知老兄平日與元善相處曽説到子細處否但恐子期不曽聽得便只似不曽説也近因諸人論琴就一哥借得所畫圖子適合鄙意乃知朝端只説得黃鐘一均內最上一弦而遽以論琴之全體宜乎膠固偏執而無所合也學不欲陋豈不信然偶有邵州便託彥中附此亦令過一哥處取安問矣政逺千萬為道自愛答蔡季通云云琴説向寄去者尚有説不透處今别改定一條録呈比舊似差明白不審盛意以為如何琴固每絃各有五聲然亦有一絃自有為一聲之法故沈存中之説未可盡以為不然大抵世間萬事其間義理精妙無窮皆未易以一言斷其始終須看得玲瓏透脫不相妨礙方是物格之驗也衆至之患賢者所未免乃以散遣諸生見教何耶此亦任其去來若有患難雖杜門齰舌亦未必可免也答蔡季通琴中旋宫一事正為𥘉絃有緊慢而衆絃隨之耳若一定而不可移則旋宫之法何所施耶但恐午未以後聲太高急而小絃斷絶故疑所謂五降者乃謂蕤賔以下不可為宫耳此説固未必然然與今所謂一定而不可易古所謂隨十二月為宫者似得中制試更推之如何復以見教也參同之説子細推尋見得一息之間便有晦朔弦望上弦者氣之方息自上而下也下弦者氣之方消自下而上也望者氣之盈也日沈于下而月圎于上也晦朔之間者日月之合乎上所謂舉水以滅火金來歸性𥘉之類是也眼中見得了了如此但無下手處耳自從别後此等事更無商量處劇令人憒憒今此病中又百事不敢思量未知異時賢者之歸得復相見論此否耳答蔡季通前人疑當作前日熹自開正即病至今未平今日方能把筆作書足猶未能平步也氣血日衰前去光景想亦不多病中塊坐又未能息心休養才方翻動册子便覺前人闊略病敗欲以告人而無可告者又不免輒起著述之念亦是間中一大魔障欲力去之而未能以此極思向來承晤之樂未知此生能復相從如往時否耳知看語孟有味深慰所願巳許誨示幸早寄及也前書奉扣琴譜旋宫之法不知考得果如何若𥘉弦一定不復更可緊慢恐無是理也答方伯謨士繇隨時變易以從道主卦爻而言然天理人事皆在其中今且以乾卦潛見飛躍觀之其流行而至此者易也其定理之當然者道也故明道亦曰其體則謂之易其理則謂之道而伊川又謂變易而後合道易字與道字不相似也又云人隨時變易為何為從道也此皆可以見其意矣易中無一卦一爻不具此理所以沿流而可以求其源也會以理之所聚而言通以事之所宜而言其實一也或躍在淵九四中不在人則其進而至乎九五之位亦無嫌矣但君子本非有此心故云或躍而文言又以非為邪也等語釋之九六之説楊遵道録中一假發明傳意與來喻不同然亦未曉其説嘗謂五行成數去其地十之土而不用則七八九六而巳陽竒隂耦故七九為陽六八為隂陽進隂退故九六為老七八為少然陽極於九則退八而為隂隂極於六則進七而為陽一進一退循環無端此揲蓍之法所以用九六而不用七八蓋取其變也只以此説推之似無窒礙龜山所謂參之為九兩之為六乃康節以三為真數故以三兩乘之而得九六之數今以一三五為九二四為六則乃是積數非參之兩之之謂且若此而為九六則所謂七八者又何自而來乎疑亦未安大明終始傳意自明其曰明曰見曰當非人而何更看楊遵道録中一假則尤分明矣天人一理人之動乃天之運也然以私意而動則人而不天矣惟其潛見飛躍各得其時則是以人當天也然不言當天而言御天以見遲速進退之在我爾雖云在我然心理合一𥘉無二體但主心而言爾元者用之端而亨利貞之理具焉至於為亨為利為貞則亦元之為爾此元之所以包四德也若分而言之則元亨誠之通利貞誠之復其體用固有在矣恐亦不得如龜山之説也以用言則元為主以體言則貞為主彖詞乃卜筮詞釋彖則夫子推其理以釋之也以安貞之吉應地無強為卜筮之詞恐記之誤也答方伯謨夫子夢寐周公正是聖人至誠不息處然時止時行無所凝滯亦未嘗不灑落也故及其衰則不復夢亦可見矣若是合做底事則豈容有所忽忘耶以忘物為高乃老莊之偏説上蔡所論曽點事似好然其説之流恐不免有此弊也志於道志字如有向望求索之意大學格物致知即其事也衛輒事龜山以為有靈公之命左傳史記皆無此説冉有子貢之疑只以嫡孫承重之常法言之似有可以得國之理耳謂夷齊不當去此説深所未曉且當闕之不義而富且貴所謂富貴非指天位天職而言但言勢位奉養之盛耳此等物若以義而得則聖人隨其所遇若固有之無鄙厭之心焉但以不義而得則不以易吾飯疏飲水之樂耳富而可求以文義推之當從謝楊之説東坡説亦是此意似更分明蓋上句是假設之詞下句方是正意下句説從吾所好便見上句執鞭之事非所好矣更味而字雖字亦字可見文勢重處在下句也答方伯謨正所以立近之全字不穩當俟更思之齊王見牛兩假當未發見時便合涵養惟其平日有涵養之功是以發見著明而擴充逺大也若必俟其發見然後保夫未發之理則是未發之時漠然忘之及其發然後助之長也泄柳申詳聞李先生説正如是林説恐非天之生物使之一本前説是王歡之説亦是周公之過只依舊説孟子言昔者所進今日不知其亡故王問何以識其不才而舍之而孟子告以進賢如不得巳蓋於進退之間無所不審非但使之致察於去人殺人也明道先生言性即氣氣即性生之謂也又云論性不論氣不備論氣不論性不明二之便不是大抵本然之性與氣質之性亦非判然兩物也前日之説只是論性雖有五然却亦不離乎一未有磨瑩澄治之意也仁覺兩假互有得失然論愈精微言愈易差不若只遵伊川先生之説以公字思量而從事乎克復之實久當自有見也正固便是事之幹故傳曰亨貞之體各稱其事明其義與乾坤不殊但各主於其事而言耳觀六三傳但以為未至失道而求不失道耳非直以為不失道也鬼神功用之説得之李説不可曉不知如何自有一種意亦不解其文義也揲法陽爻皆用九而不用七故於純陽之卦發此凡例凡揲而六爻皆九者則以此辭占之見群龍謂值此六爻皆九也無首謂陽變而隂也剛而能柔故吉而聖人因之以發明剛而不過為用剛之道也左傳蔡墨云在乾之坤曰見羣龍無首吉杜注亦如此説知至至之知終終之舊來所説未是遺書知至至之主知知終終之主終蓋上句則以知至為重而至之二字為輕下句則以知終為輕而終之二字為重也存義言其有以存是理而不失非有取乎不過之義也碩果不食只不食便有復生之意不必云推廣而言也答方伯謨昨承致書久無便可報但每朋友講論未嘗不奉懷耳文字煩抄録為愧比復有更定一二且未可出以示人也所論數條足見思索之深甚副所望正所以守守字誠未安但此字難下不知曾為思之否因來及之得以反復也所論聖賢立言之意亦中淺陋之失蓋當時欲矯其顧慮遲疑之弊不自覺其過而生病耳頃嘗語伯恭此是吾二人氣質之偏當各加矯革古人韋弦之戒殆正為此設也所論隂陽男女之説則未然天地之間隂陽而巳以人分之則男女也以事言之則善惡也何適而不得其類哉中正仁義如君子時中順受其正仁者愛人義以為質之類皆周子之意他處有不同者各隨所主而言𥘉不相妨如子貢以學不厭為智教不倦為仁而中庸則以成巳為仁成物為智此類亦可推矣甚思晤語秋前想未能來有便時寄所疑為望答方伯謨熹自春涉夏多病多故奔走出入不得少休近屏杯杓病才少愈惟是事端無窮未有寧息之期又迫朝命有託故稽留令憲府覺察指揮勢或當一出前憂後愧未知所以為計也甚欲一與伯謨相見不知能乘隙一見過否來月之𥘉須且扶送叔母之喪還政和歸來月末方得為去計也擇之來此巳兩月秋間方歸日間時有講論然苦人事斷續不得專一若伯謨能一來為旬日欵殊慰所望也子澄亦到此三四日而行令舅府判侍次煩為致問訊意此便少遽未及拜書克明為況何如曾再往光澤否欲作書及附趙宰書亦未睱悉煩道區區或伯謨未能來近日講學所得所疑便還略告批喻李君到彼略周顧之為幸未間千萬力學自愛答方伯謨昨王變還承書至慰不聞問又許久劇暑伏惟侍履佳勝所喻心説似未安蓋孔子説此四句而以惟心之謂與結之不應如此著力却只形容得一箇不好底心也來書所説自相矛盾處亦多可更詳之令舅府判侍次嘗及此否試為質之必有至當之説也克明及諸朋友皆煩以此詢之誠之聞歸巳久不知今在甚處或見煩致意南軒云有書附渠來告早尋便示及也答方伯謨前日託俞尉附一書當逹比日逺惟侍學增勝前所懇令舅府判兄作字不知巳為落筆否二月甲子下更著一朔字尤佳仍望早附的便示及也近作得六先生畫象贊謾録去煩呈令舅一觀求其未當處旦夕畫成當并以拜凂早得刋定為幸耳李積微篆字墨本近偶得之似亦不滿人意小技難精猶如此況其大者乎得連嵩卿書云廖子晦言天地之性即我之性豈有死而遽亡之理因引大全集中堯舜託生之語為證渠諸人未有以折之伯謨可與克明各下一語便中見喻也月𥘉至寒泉叔京約來相聚旬日不知能約諸同志者同為此會否但恐不欲令諸生又廢業耳答方伯謨昨附俞尉及崇化兩書不知皆逹否得兼善報云所要文字巳發去想亦巳到久矣前書託稟令舅向日所凂敬針更求注字乾道癸巳二月甲子新安朱熹作建安吕書後書欲甲子下增一朔字不知巳為寫否如巳寫下即於空處别寫此字不妨不必易𥿄也六先生象內去并煩求揮翰但不知前日所呈本子曽經參訂否今别録去內略有改更處又叔京疑伊川贊後四句不相應本意謂伊川之言平易深逺人所難識耳不知叔京之意如何渠又疑橫渠贊中逃字據行狀云於是盡棄舊學淳如也即是舊時嘗有雜學下此字似亦不妨更稟令舅看如何若無可疑即乞為書付此便回并所懇敬針此贊就畫象上寫一本須依今寫去本首尾向背蓋隨靣所向也就此界𥿄上寫一本首尾亦依寫去本此本伯諌欲刻石如𥿄不好界不勻即煩為易之如叔京之説當改或别有可疑處即且留此畫於彼人回喻及俟却報去也敬針大本乃立一句乃字不知舊作甚字恐舊本不同即改作乃字為佳數以鄙語塵溷妙筆何愧如之數日偶無事了得數篇文字未有人寫得去俟後便也向跋胡公帖煩録一本并跋語付此人回或有講論亦可付此便此便甚的也與方伯謨人還承書至慰比日逺惟侍履隹勝篆字甚佳然其間不能無病筆巳封寄去但恐彼欲磨崖則所書大字或不堪用今其人過彼更煩别為大書徑尺以上者封與誠之令轉呈南軒但筆路亦須稍重蓋恐崖石粗若字畫太細即不可辨耳向寄二刻不必寄來只留几間可也許來春見過幸甚但正𥘉恐亦須略出叔京又約相會於邵武若至此相聚尤便但恐人事擾擾不能從容耳所欲言者無窮未即會靣千萬自愛孟子説附還彼中朋友商量此書有疑處否與方伯謨昨承枉顧别遽纍月馳向深矣比日春晚伏惟侍學增勝所與處者為誰見作何等工夫有可以見告者便中及之為幸近嘗一至雲谷留十餘日朋友來集隨分有少講論大率追正舊説之太髙者為多也克明德柄皆未及書煩為致意直翁聞問否欲作書亦未暇俟後便也濟之有少文字欲至彼粥之有可為鄉導處幸略為致力幸甚長沙人歸未耶與方伯謨别後一得手書亦無便可報今復久不聞問懷想可量比想劇暑侍履佳慶熹衰悴如昨欲往弔茂實至今未能不免且遣人致書亦復因循不能得遣蓋目前百事敗人意當此午暑時兩眼幾不復可視物也向見所作平父諸小詩甚隹章辰州為人求詩懶甚無隹思輒以奉煩渠本取韋賢語名閣須略點破也近讀何書向見頗有因循之病更宜勉強區區所望於賢者不但如此而巳也季通病甚強起如建陽料理墳墓數日不得書不知為况如何聞欲遂過邵武不知是否遣此人本欲子細作書適意思不佳草草附此殊不及所懷之一二季克佐卿皆巳得郡季克侍闕否佐卿想便赴官也因見致意倦甚未及拜狀也方暑自愛與方伯謨熹此粗安免章雖未報然諸公巳見許章下必遂請無疑也前日所説伯恭昏事以書問之得其兄弟報字只要年長淑善安貧睦族他所不計以吾輩度更須耐靜之巳悉以屬茂實亦略與周佐説來祝其密之只與伯謨商量若有七八分以上可問即為微扣之却託茂實專人來報也千萬留意至祝至祝茂實仲本前日到此不及登山然却得靜坐兩日説話頗𣢾仲本託為齋記巳為草寄當必見之也虞祠刻巳寄來規模甚大文固不稱篆額似亦差小耳未有别本俟續得之當分去也前書所煩作字便中示及為幸置物亦然季通竟罹家難窘迫可念彼中葬事如何勢須俟堯舉復來耳仲本别時所寄聲奉聞者想巳發之此不可巳也與方伯謨昨承逺訪愧感良深别去惘惘人還奉告聞比日侍履佳勝為幸熹悲悴如昨無可言甚感愛念寬勉之意然觸事傷懷亦未能遽平也匕筯衣𬒳并領季通屢得書殊未有定論然亦未聞其西去之期不知果如何爾録示九江文字甚發人意大體只須如此得失已自可見但恐未足以盡其情偽曲折之變彼或以吾曹為真可欺耳然世間自當有明眼人此亦𥘉不足辨也得伯恭書云到會稽見伯諌守其所聞牢不可破自信之篤如此亦良可尚耳常德二書煩逹之想日相聚所講論當益有緒因便示一二為幸因孫巨源見過附此草草襄事之後能一來顧慰此幽鬱否乎常德之官後别有學徒相從否因便早及之為望與方伯謨前日承書人還匆匆不能作報比日秋暑德履佳勝永福收近信否熹此諸况如前所與廷老書此後竟未得雨祈禱萬方平生所不欲為者皆為之亦卒無驗然每設醮處為人引去天師前燒香即記著後漢書此亦何緣有效也救災之備不敢不勉但今日上下不相恤雖巳具奏及申省部諸司未知復如何也在今日義不當求去萬一所請不從則亦可以巳矣但憲司有相料理之意今日又聞其劾信州林子方此亦是殺鳴犢底消息旦夕或自以此去不可知耳數日前寫得趙帥兄弟書因欲致一奠今為此災傷凡百皆廢且往空書因見幸略及之也居仁遭誰喪昨日欲作書偶檢來書不見下筆不得因書更報及也搬過建安良便恐此間動未得秋涼能來為幸但恐薦送即又不容來耳諸刻昨巳遣去想巳逹未相見珍重與方伯謨韓文考異大字以國子監版本為主而注其同異如云某本某作某辨其是非如云今按云云斷其取舍從監本者巳定則云某本非是諸别本各異則云皆非是未定則吾加疑字别本者巳定則云定當從某本未定則云且當從某本或監本别本皆可疑則云當闕或云未詳其不足辨者略注而巳不必辨而斷也熹不及奉書考異須如此方有條理幸更詳之與方伯謨便中承書具審即日所履佳勝為慰親闈安問想不輟收也惠及新茶極感厚意病軀更此蒸濕却幸不動飰食亦粗喫得只願且得如此則譴何之及有以當之他不足計也韓文考異巳寫成未如無人寫可懇元善轉借一二筆吏速寫以來只有此一事稍稍趨時不可緩也聞公試簾前語否與方怕謨比想所履日佳端午莫須一歸否耶韓考煩早為并手寫來便付此人尤幸聞冰玉皆入偽黨為之奈何為之魁者不暇自謀特為賢者慮破頭耳因便草草與方伯謨適方遣人奉簡忽承手示為慰幼恭書巳領少須手可作字并奉報章但不知其行期在幾時幸批報也韓考巳領今早遣去者更煩詳閲籖示適有人自三衢來云瑣闥以論陳源故輔外見詹卿煩及之人還草草楊子序篇有冠乎群倫之云以為無義者固可笑而問人出處者亦踈脫也與方伯謨承簡喜聞佳勝韓考所訂皆甚善比亦别修得一例稍分明五夫人到日能略過此少欵一二日為幸勿以徒御為憂白飰青芻不難辦也兼更欲有所扣耳人還草草與方伯謨熹今年之病久而甚衰此月來方能飲食亦緣灸得脾腎俞數壯似頗得力也韓考巳從頭整頓一過今且附去十卷更煩為看籖出疑誤處附來換下卷但鄙意更欲俟審定所當從之正字後却修過以今定本為主而注諸本之得失於下則方本自在其間亦不妨有所辨論而體靣正當不見排抵顯然之迹但今未暇耳緣其間有未甚定處須更子細為難也記得籍溪先生曾寫得陳希夷墓表云是吕洞賔所撰見與偶尋不見煩為問子端恐有本即為借寫一本附來也廟額方礬得紙旦夕寫得自從此寄去所求龕額便中望早寄也天氣甚好能下來數日否與方伯謨别近旬日不審為况復何如前日匆匆又以病作遽歸不及拜尊夫人皇恐不可言也大哥來聞子端竟有哭子之悲深為惘然且煩致意不及附書為問也欲煩篆數十字納去𥿄兩卷各有題識幸便為落筆欲寄江西刻之巖石有人在此等候不能久也千萬便付此人回仍不須大作意只譬如等間胡寫則神全氣定自然合作矣更欲篆六十四卦名及一等小字數十其界𥿄又作一封請并書之所寫之字各在封內矣熹忽聞有鐫職罷祠之命尚未𬒳受不勝皇恐何時可來相聚數日耶專人馳布不宣大哥今日巳行矣已戒令速去恐碑倒也可因書更促之與方伯謨詹卿昨日過此尚在南林更兩三日方行不出見之否韓文欲并外集及順録作考異能為貟滿此功德否耶宓子賤洪慶善楚辭輔注中引顔之推説云是伏字濟南伏生即其後也如何如何與方伯謨昨辱惠書為慰但見元興及小兒皆説伯謨頗覺衰悴何為如此今想巳強健矣更宜節適自愛但強其志則氣自隨之些小外邪不能為害也熹病軀粗遣諸證亦時往來但亦隨事損益終是多服輔藥不得令子聞已歸韓文外集考異曽帶得歸否便中得早寄示幸幸正集者巳寫了更得此輔足須更送去詳定莊仲為點勘巳頗詳細矣近又看楚詞抄得數卷大抵世間文字無不錯誤可歎也趙幹之喻荷其不彼冒此巇險尤見所存異於流俗之意但憂畏之餘多所謝絶固不容獨破戒幸為道此區區多謝其意可也異時未死之間禁網稍寬則或尚可勉強也因便寓此草草與方伯謨昨日承寄示吕公奏議至感至感比想侍奉佳慶令子程試必甚如意聞將以望前一日揭榜冀聞吉語也奏議得一快讀甚幸朝廷無此議論六十年矣可為慨歎也但末卷乞詔定大舉䇿一篇未竟而定䇿大舉一篇全無幸更為輔之乃隹耳韓考後卷如何得早檢示幸甚熹衰病百變支吾不暇近又得一竒證若寒疝者間或腹中氣刺而痛未知竟如何姑復任之耳答梁文叔瑑淡臺石刻巳領考證詳密亦自是一種工夫也略於制度之説不知謂何往往亦多是問得繁碎非學者所先或是從來剖判不得如論語千乘之國注家自是兩説此等如何強通況又舍所急之義理而從事於此縱得其説亦何所用乎昨日有人問看史之法熹告以當且治經求聖賢修巳治人之要然後可以及此想見傳聞又説不教人看史矣答梁文叔日用功夫如此甚善然須實下功夫只説得不濟事也李先生意只是要得學者靜中有箇主宰存養處然一向如此又不得也皇極之説來説亦得之大抵此章自皇建其有極以下是總説人君正心修身立大中至正之標準以觀天下而天下化之之義無偏無陂以下乃是反覆贊歎正説皇極體假曰皇極之敷言以下是推本結殺一章之大意向見諸葛誠之説略是如此但渠説有過當處耳答梁文叔示喻所處甚善不知幾道相聚作何工夫近看孟子見人即道性善稱堯舜此是第一義若於此看得透信得及直下便是聖賢更無一毫人欲之私做得病痛若信不及孟子又説箇第二節功夫又只引成覸顔淵公明儀三假説話教人如此發憤勇猛向前日用之間不得存留一毫人欲之私在這裏此外更無别法若於此有箇奮迅興起處方有田地可下功夫不然即是畫脂鏤氷無真實得力處也近日見得如此自覺頗得力與前日不同故此奉報可以呈幾道也答梁文叔鄭康成所説氣魄雜學辨云精聚則魄聚氣聚則魂聚蓋精是隂氣如耳目之聰明乃隂精之所為故謂之魄或欲於魄中求魂魂中求魄瑑竊謂氣在人之一身陽即為魂隂則為魄噓吸聰明乃是一身之中魂魄之所發見而易見者耳恐不必於魂中求魄魄中求魂也精氣周流充滿於一身之中噓吸聰明乃其發而易見者固如來喻然既周流充滿於一身之中則鼻之知臭口之知味非魄耶耳目之中皆有暖氣非魂耶推之遍體莫不皆然佛書論四大處似亦祖述此意體魄歸于地先生云體魄自是兩物不知如何分别以目之明言之則目之輪一成而不可變者體也睛中之明而能照鑑萬象者魄也魄既降則目之輪雖存而其精光則無矣以耳之聰求之未透蓋耳但見其竅而不見其他故也所論目之體魄得之耳則竅即體也何暇他求耶體魄既是兩物不知魂與氣亦為兩物否孔潁逹謂魂附於氣中庸或問直指康成之説則孔氏之説亦未得為通論體魄從前所聞只指為一物是以今人言目魄亦皆以黑處為魄若以眼光落地之説推之竊恐月之全輪受光處為魄及其月光漸虧亦如人之魄降其黑處却是體注疏之説皆不然思之未通魂氣細推之亦有精粗但其為精粗也微非若體魄之懸殊耳或問之意誠少子細也所論月魄恐不然日月不可以體言只有魂魄耳月魄即其全體而光處乃其魂之發也且鬼神魂魄就一身而總言之不外乎隂陽二氣而巳然既謂之鬼神又謂之魂魄何耶瑑竊謂以其屈伸往來而言故謂之鬼神以其靈而有知有覺而言故謂之魂魄或者乃謂屈伸往來不足以言鬼神蓋合而言之則一氣之往來屈伸者是也分而言之則神者陽之靈鬼者隂之靈也以其可合而言可分而言故謂之鬼神以其可分而言不可合而言故謂之魂魄或又執南軒陽魂為神隂魄為鬼之説乃謂鬼神魂魄不容更有分别瑑竊謂如中庸或問雖曰一氣之屈伸往來然屈者為隂伸者為陽往者為隂來者為陽而所謂陽之靈者隂之靈者亦不過指屈伸往來而為言也鬼神通天地間一氣而言魂魄主於人身而言方氣之伸精魄固具然神為主及氣之屈魂氣雖存然鬼為主氣盡則魄降而純於鬼矣故人死曰鬼南軒説不記首尾云何然只據二句亦不得為無别矣與吳茂實英近來自覺向時工夫止是講論文義以為積集義理久當自有得力處却於日用功夫全少點檢諸朋友往往亦只如此做工夫所以多不得力今方深省而痛懲之亦願與諸同志勉焉幸老兄遍以告之也陸子夀兄弟近日議論與前大不同却方要理會講學其徒有曹立之萬正淳者來相見氣象皆儘好却是先於情性持守上用力此意自好但不合自主張太過又要得省發覺悟故流於怪異耳若去其所短集其所長自不害為入德之門也然其徒亦多有主先入不肯捨棄者萬曹二君却無此病也與吳茂實所欲言者不過前夕然亦非謂全然不事其心但資次等級未應遽爾超躐須物格知至然後意可誠心可正耳答任伯起希夷示喻諍中私意橫生此學者之通患能自省察至此甚不易得此當以敬為主而深察私意之萌多為何事就其重處痛加懲窒久之純熟自當見效不可計功於旦暮而多為説以亂之也論語别本未曽改定俟後便寄去然且專意就日用處做涵養省察功夬未必不勝讀書也答任伯起誠敬寡欲皆是緊切用力處不可分先後亦不容有所遺也然非逐項用力但試著實持守體察當自見耳答任伯起所喻巳業荒廢比亦甚以為疑意謂世味漸深遂巳無復此志今乃猶有愧恨之心足以見善端之未泯也一旦幡然如轉戶樞亦何難之有哉熹衰病之軀飲食起居尚未能如舊流竄放殛久巳置之度外諸生逺來無可遣去之理朝廷若欲行遣亦須符到奉行難以遽自匆匆也詳觀來諭似有仰人鼻息以為慘舒之意若方寸之間日日如此則與長戚戚者無以異矣若欲學道要須先去此心然後可以語上上蔡先生言透得名利關方是小歇處今之士大夫何足道能言真如鸚鵡也不知曽見此書否答江德功默道千乘之國以此五者為人君之德意則甚善然程先生只云論其所存故不及治具龜山只云苟無是心雖有政不行焉以此二言觀之則德字似太重矣兼亦不必引道之以德為證似有牽合之病子入太廟所云巳當執事不可不問固然然亦須知聖人平日於禮固已無所不知而臨事敬愼又如此也德不孤據此文意但言同聲相應同氣相求德不孤立必以類至而巳若如所訓則其文當云德不私於巳必不私於人如此則成何文理耶吾道一以貫之一以貫之不專為彼巳而發忠恕亦非專為一彼巳而巳也二程先生論此甚詳且宜濳心未容輕議也子謂仲弓此意甚佳東坡之説正如此但不必以仲弓字為絶句如子謂顔淵未見其止亦非與顔淵言也加我數年無大過恐只是聖人之謙辭蓋知吉凶消長之理進退存亡之道然後可以無大過耳謂易道無大過差雖是程先生説然文意恐不甚安謂使後人不敢輕立説聖人未必有此意然在今日深足以有警於學者聖人吾不得而見之矣此但為思其上者而不可得故思其次之意無不觀其質而觀其學之意也若論質學之異則聖人君子以學而言善人有常者則其質美而巳張敬夫説如此似頗有理曽子有疾此章之指蓋言日用之間精粗本末無非道者而君子於其間所貴者在此三事而巳謂其動容貌則能和敬而無暴慢也其正顔色則非色莊而能近信也其出詞氣則能當於理而無鄙倍也凡此三者皆其平日涵養功夫至到之驗而所以正身及物之本也故君子貴之若夫籩豆之事則道雖不外乎此然其分則有司之守而非君子之所有事矣蓋平日涵養功夫不至則動容貌不免暴慢正顔色不出誠實出詞氣不免鄙倍矣一身且不能治雖欲區區於禮文度數之末是何足以為治哉此乃聖門學問成巳成物著實效驗故曾子將死諄諄言之非如異端揚眉瞬目妄作空言之比也所謂道在容貌顔色詞氣者文意義理皆有所不通必若此言則道固無所不在君子所貴又何止於三乎且其氣象狂易恍惚不近聖賢意味尤非區區之所敢聞也士不可以不弘毅謂仁以為巳任者體之而不違是也若曰循頂至踵知痛癢處都是仁則非聖賢之本意矣體而不違只是克巳復禮無一念之不仁耳死而後巳來説亦太過若曰生有限量仁無紀極則豈以死而遂巳耶吾有知乎哉無知者聖人之謙詞叩其兩端而竭焉又言巳雖無知而於告人不敢不盡大凡聖人氣象只是如此著實看自然見得無世俗許多玄妙虛浮之説也扣兩端而竭只如程先生范尹諸公説盡之若曰只舉兩端教人默識取中間底此又近世禪學之餘三代以前風俗淳厚亦未有此等險薄浮誕意思也唐棣之華别為一章甚是精義中范公巳有此説東坡亦然但其為説或未盡耳其言似不足者此説謝氏得之所謂意有餘者恐未是當暑袗絺綌先儒之説皆如來喻但鄙意常疑其不然似却是先著裏衣表絺綌而出之於外乃得文意不知如何不撤薑食恐只合依舊説若如所云則是他物有可棄之於地者矣恐不然也南人有言此但甚言無常之不可𥘉不論道藝之别也其言之不怍此但謂大言不怍者其實難副耳來説理意亦善但文勢稍倒恐不若依舊説子路問君子諸説之中此條尤為險怪深非鄙拙之所敢聞也若曰修巳以安百姓幾時安得了故曰堯舜其猶病諸然則其曰修巳以安人而不曰堯舜病諸者又何謂耶君子疾沒世而名不稱焉只合依程先生説誰毀誰譽所論毀譽是加減了底甚當但此章更有曲折當熟玩之所謂如有所譽者又何謂耶見善如不及聖人之用舍行藏非但求志行義而巳且此章文勢斷續或有闕文或非一章皆不可考不必強為之説性相近也此只合依程先生説若如所論似欲深而反淺欲密而反疏也性之在人豈得以相近而為言耶子張問仁所論行字之意甚善聖言著實大抵類此推之以及其餘則聖人之意可得而浮誕之見無所入於其中矣飽食終日此不欲啓博奕之端防慮甚密然聖人乃假此以甚彼之辭不必過為之説文義不通却成穿鑿也君子有惡諸先生有説夫子所惡以戒人子貢所惡以自警者此意得之恐無天人之别子夏之門人小子此章之説明道先生曰先傳後倦君子教人有序先傳以小者近者而後教以逺者大者非是先傳以近小而後不教以逺大也愚按諸家之説唯此數句明白的當試詳味之可見文義譬諸草木區以别矣只是説大小有序不可躐等之意君子之道焉可誣也東坡得之有始有卒其惟聖人尹氏得之猶之與人也舊説猶字只為譬字之意文義亦通若覺未穩即且闕之不必強為之説也答江德功有禮則安説立意甚善但詳本文之意只説施報往來之禮人能有此則不忤於物而身安耳未遽及夫心安也況古人之所以必由於禮但為禮當如此不得不由豈為欲安吾心而後由之也哉若必為欲安吾心然後由禮以接於人則是皆出於計度利害之私而非循理之公心矣大抵近世學者溺於佛學本以聖賢之言為卑近而不滿於其意顧天理民彛有不容殄滅者則又不能盡叛吾説以歸於彼兩者交戰於胸中而不知所定於是因其近似之言以附會而説合之凡吾教之以物言者則挽而附之於巳以身言者則引而納之於心苟以幸其不異於彼而便於出入兩是之私至於聖賢之本意則雖知其不然而有所不顧也蓋其心自以為吾之所見巳高於聖賢可以咄嗟指顧而左右之矣又况推而高之鑿而深之使其精神氣象有加於前則吾又為有功於聖賢何不可者而不自知其所謂高且深者是乃所以卑且陋也此近世雜學之士心術隱微之大病不但講説異同之間而巳不審賢者以為如何大學諸説亦放前意蓋不欲就事窮理而直欲以心會理故必以格物為心接乎物不欲以愛親敬長而易其所謂清爭寂滅者故必以所厚為身而不為家以至新民知本潔矩之説亦反而附之於身蓋惟恐此心之一出而交乎事物之間也至於分别君相諸侯卿大夫士庶人之學亦似有獨善自私之意而無公物我合內外之心此蓋釋氏之學為主於中而外欲強為儒者之論正如非我族類而欲強以色笑相親意思終有間隔礙阻不浹洽處若欲真見聖賢本意要當去此心而後可語耳格物之説程子論之詳矣而其所謂格至也格物而至於物則物理盡者意句俱到不可移易熹之謬説實本其意然亦非苟同之也蓋自十五六時知讀是書而不曉格物之義往來於心餘三十年近歲就實用功處求之而參以他經傳記內外本末反復證驗乃知此説之的當恐未易以一朝卒然立説破也夫天生蒸民有物有則物者形也則者理也形者所謂形而下者也理者所謂形而上者也人之生也固不能無是物矣而不明其物之理則無以順性命之正而處事物之當故必即是物以求之知求其理矣而不至夫物之極則物之理有未窮而吾之知亦未盡故必至其極而後巳此所謂格物而至於物則物理盡者也物理皆盡則吾之知識廓然貫通無有蔽礙而意無不誠心無不正矣此大學本經之意而程子之説然也其宏綱實用固巳洞然無可疑者而微細之間主賔次第文義訓詁詳密精當亦無一毫之不合今不深考而必欲訓致知以窮理則於主賔之分有所未安知者吾心之知理者事物之理以此知彼自有主賔之辨不當以此字訓彼字也訓格物以接物則於究極之功有所未明人莫不與物接但或徒接而不求其理或粗求而不究其極是以雖與物接而不能知其理之所以然與其所當然也今日一與物接而理無不窮則亦太輕易矣蓋特出於聞聲悟道見色明心之餘論而非吾之所謂窮理者固未可同年而語也且考之他書格字亦無訓接者以義理言之則不通以訓詁考之則不合以功用求之則又無可下手之實地竊意聖人之言必不如是之差殊踈略以病後世之學者也又所謂非特形之所接乃志之所至所謂格物與小學同致知與小學異亦皆無當之言其為闕字增語反致讀者之疑多矣至於強解程子之意以附巳説其如他語之可證何又謂熹解以格物致知混為一説則其考之亦未詳也又謂老佛之學乃致知而離乎物者此尤非是夫格物可以致知猶食所以為飽也今不格物而自謂有知則其知者妄也不食而自以為飽則其飽者病也若曰老佛之學欲致其知而不知格物所以致其知故所知者不免乎蔽陷離窮之失而不足為知則庶乎其可矣所厚者謂父子兄弟骨肉之恩理之所當然而人心之不能巳者今必外此而厚其身此即釋氏滅天理去人倫以私其身之意也必若是而身修則雖至於六度萬行具足圓滿亦無以贖其不孝不弟之刑矣此謂知本以例推之凡言此謂者皆傳文非經之結句也無所不用其極觀上文三引詩書而此以無所二字總而結之則於自新新民皆欲用其極可知矣自新固新民之本然天下無一物非吾度內者亦無一事非吾之所當為者譬如百尋之木根本枝葉生意無不在焉但知所先後則近道耳豈曰專用其本而直棄其末哉今曰不求為新民而專求之德化則又賤彼貴我之私心而無以合內外之道矣盛德至善民不能忘此言聖人之事蓋渾然一體不可得而分焉者也但以人言則曰德以理言則曰善又不為無辨耳今曰體至善以成德則乃學者之事而非傳文所指矣然體而成德以至於盛而無思勉之纍焉則亦聖人而巳矣聽訟與新民之説略同請併詳之又古人言語有序此傳未解格物以下數節不應先解結句况此謂知本之云又非經之結句乎誠意一章大意頗善然此傳文意但解經文所謂誠意者只是教人不得自欺而欲其好善惡惡皆如好色惡臭之實然耳非以聖人而言也今之所發聖人所以即事即物而止於至善又恐人不信故即人所知者以明之則失其指矣心廣體胖之説甚善甚善人之其所親愛而辟焉訓之為至非是此等處雖非大義所係然亦須虛心平氣徐讀而審思之乃見聖賢本意而在巳亦有著實用處不必如此費力生説徒失本指而無所用也此以心感彼以心應其效如此之速感應神速理固如此但著一以字便有欲速之意所謂憧憧往來朋從爾思者正病此也潔矩者度物而得其方也以下文求之可見今曰度物以矩則當為矩潔乃得其義矣治國平天下與誠意正心修身齊家只是一理所謂格物致知亦曰知此而巳矣此大學一書之本指也今必以治國平天下為君相之事而學者無與焉則內外之道異本殊歸與經之本旨正相南北矣禹稷顔回同道豈必在位乃為為政哉風濤洶湧之説亦所未喻此篇所論自一身而推之以及天下平正簡易不費纎毫氣力與橫渠所論周官冡宰法制之事意思不同答江德功致知格物前説巳詳來書只舉得一截正當説格字致字處乃遺而不道恐考之有未詳若但以格為法度之稱而欲執之以齊天下之物則理既未窮知既未至不知如何為法而執之且但守此一定之法則亦無復節節推窮以究其極之功矣此義且當以程子之説為主而以熹説推之不必強立説徒費力也經文末後兩句來喻固與舊説有間矣但所論先後之序經中上文巳屢言之而本亂末治之云又巳該舉自不須説但聖人於此特下此語正要讀者有以知夫人道之大有在於此不可同於仁民愛物之例而一以末視之此意不可不著眼耳今不領此而又必以身言非釋氏之意而何哉衍文得失不足深辨然以所謂免作衍文者觀之便見苟且遷就之意若信未及莫若兩存而徐玩之不必決取舍於今日也盛德至善盛也至也皆無以復加之詞而上下文規模氣象皆聖人事則此不得獨為賢人事矣且賦詩斷章此但取其咏歎不忘之意與衛武公𥘉無干涉也潔矩之説蓋以巳之心度物之心而為所以處之之道爾來喻殊不可曉而所謂先自度者尤無所當今以鄙説畫為兩圖合而觀之則方正之形隱然在目中矣側圖其心而然耶且學者之勉強力行亦勉其所當為者而巳若曰勉焉以冀其有以自慰則是先獲後難而為謀利計功者之所為矣聖學異端之别於此亦略可見試深察之可也答江德功圓而神也其所以藏往者向之所謂方以知者也神武不殺言聖人不假卜筮而知吉凶也是以明於天之道以下言教民卜筮之事而聖人亦未嘗不敬而信之以神明其德也此章文義只如此程先生説或是一時意到而言不暇考其文義今但玩味其意别看可也若牽合經旨則費力矣答江德功亥十一月五日中庸集解程先生曰生之謂性性即氣氣即性止舜有天下而不與焉者也默竊謂此假反復譬喻皆是生之謂性而必以性善之説間乎其中以性善之言證之於後何也若曰性只是理則夫為惡者謂之非理可也何以言惡亦是性濁亦是水此理不為堯桀存亡何以言流之逺近清之遲速此皆氣稟之譬於性善之説自當分别却衮説了不知如何直翁以水譬氣稟清譬天理濁譬人欲𥘉亦可喜恐只是元𥘉水一句又解不得直翁又為之説曰夫所謂繼之者善者以下皆因言性善而為説水譬性就下與清譬性善流而至於海終無所汚者此譬聖人之全天理流而濁者譬人欲也不可以濁者不為水謂感物而動皆性之欲也及其清明却只是元𥘉水謂復其本然之善也此説於不可以濁者不為水一句似失性善之意不知先生以為何如此説但以性善為本而以氣稟有善惡者錯綜之反復玩味自然見得中庸曰人莫不飲食也鮮能知味也竊謂此兩句大意言百姓日用而不知程先生牲牢之譬却是不曾飲食而不知非日用不知也據程先生所言只譬如道者如人食牲牢須曽喫了方知非為此章至於吕與叔謂必察於芻豢之性草木之滋火齊之節調飫之宜恐非本旨默竊謂味即指飲食而言若曰人莫不飲食鮮能知味也即飲食則行之而著習矣而察者也味與飲食只是作互用文耳不知如何直翁以飲食譬日用味譬理此説亦似當不知是否直翁説是中庸曰君子之道造端乎夫婦及其至也察乎天地默竊謂此四句若本上文謂道始於夫婦之愚不肖意味殊少默竊妄意謂上下察是知得此理察乎天地是行到處君子之道造端乎夫婦者子思下章巳申言之曰君子之道譬如行逺必自邇譬如登高必自卑詩云妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻孥子曰父母其順矣乎此察乎天地之次序也本意言君子所語而繼之以上下察故默謂是知此理蓋孟子難言之意也言君子之道而繼之以察乎天地故默謂是行到處蓋文王刑于寡妻之氣象也不知如何直翁云先生或問中巳有易重咸常之説默未之見也此察字訓著不訓到觀此兩句只是疊説上文意思未有知到行到之意論語精義伊川先生曰學必盡其心盡其心則知其性知其性云云反而誠之聖人也故洪範曰思曰睿睿作聖誠之之道在乎信道篤信道篤則行之果行之果則守之固直翁所疑曰學而至於盡心則與道不隔非信道篤者能之也則所以誠之者特在存養而巳至此豈待言信道篤而伊川云爾者蓋信道者通貫上下者也為學之始固在夫信道之篤至於盡心之後亦在夫信道之篤也默以為惟與道不隔者為能信篤若與道隔則尚未識道安能信哉其所信者特信聖賢之言爾非自信也故伊川信道篤必在於盡心知性之後學者要當先明盡心性為何學然後知學之可以為聖人決矣不知先生以為如何信有淺深有是篤信聖賢而信之者有是自見得道理當然而信之者伊川之意蓋如德功之説然謂如此然後能信則又過矣又道字之義恐伊川之意與德功亦不同也伊川先生曰不違仁是無纎毫私欲有少私欲便是不仁直翁推之曰仁者天理也人能無欲則天理之妙渾然于中其心無所越於仁矣然謂越字與違别違字乃違背之意只私欲蔽了仁便是違也越字却是違越之意豈得違越得他直翁云才有放心便是違越仁矣默云放心亦只是不能存其心云放心非是越也惟禮有品節可以言越仁者無外不可言越不知先生以為如何違猶離也去也此卷據鄙見奉報未知是否幸反復論之也易説則全然草率不通點檢未敢奉報告且子細未要如此容易立論千萬千萬至懇至懇答江德功所喻易中庸之説足見用心之切其間好處亦多但聖賢之言意旨深逺子細反覆十年二十年尚未見到一二分豈可如此才方撥冗看得一過便敢遽然立論似此恐不但解釋文義有所差錯且是氣象輕淺直與道理不相似願且放下此意思將聖賢言語反覆玩味直是有不通處方可權立疑義與朋友商量庶幾稍存沉浸醲郁氣象所繫實不輕也直翁謹願詳審好相聚講習所論遮欄意亦佳然前賢固巳言之矣但在力行如何答江德功示喻誠敬之别此猶是以地位而言須看其命字之本意則誠是真實敬是畏謹指意自不同也又論今昔用功之異此固曉然但不知今日之有昔日之無是同是别是相妨是不相妨更須他日欵曲靣論今未敢懸斷可否也二銘意甚佳然亦皆有未安處如天理既循人欲自克彼巳既融萬物同體等語亦當俟面講之但此等文字非有不得巳者亦不必作不若默存此理於胸中而驗之行事之實也答江德功辛丑正月二日示喻諸説巳悉前書所論誠敬字義不同正為方此論敬不當引誠為説本欲高妙反成支離耳意皆因事物而有然事物外至而意實內生但於中有邪正耳難以誠意為內邪意為外也來喻又云誠者體物而不可遺敬亦體物而不遺此語殊不可曉大率左右向來不曾子細理會文義反復涵泳義理故於此等處多是鹵莾恐更須加詳細也所喻舊學之誤但為不將事試故不能自合義理今就義理上用工又患未能全合詳此意思似是欲因舊學所見而加事試之功以輔其闕耳正恐所見有差根腳便不是了雖加事試之功終不免兩截也義理名字呼喚得尚自有差却如何便得全合義理耶此等處仍是舊病躐等欲速之意尤不可不察也答江德功疑義俟細看奉報易説知頗改更甚善然學者以玩索踐覆為先不當汲汲於著述既妨日用切巳工夫而所説又未必是徒費精力此區區前日之病今始自悔故不願賢者之為之也絶學捐書是病倦後看文字不得正緣前日費力過甚心力俱衰且爾休息耳然亦覺意思安諍無牽動之擾有省察之功非真若莊生所謂也答江德功示及易説等書實不曉所謂不敢開卷纍承喻及必欲見強使同其説隱之於心有未能安者遂不敢奉報今承見語欲成書而不出姓名以避近名之譏此與掩耳偷鈴之見何異不知賢者所見何故日見邪僻至於如此夫天下之理唯其是而巳若是則出名何害若不是則不出名何益若如所論乾坤二字乃是將一部周易從頭鶻突了豈能使易道著明乎若曰人人親見三聖而師之此尤不揆之言如所説乾坤字義恐自家未夢見三聖在如何敢開此大口耶元書謹用封納拙直之言盡於此書今後不復敢聞命矣千萬見察答江德功所示經説孟子大意頗佳其間亦有少未合處徐議未晚也但易説愈見乖戾三復駭然因復慨念鄉里朋友清素朴實刻意讀書無世間種種病痛未有如德功者所以平日私心常竊愛慕思有以輔萬分者亦荷德功不鄙三數年來雖所論不合加以鄙性淺狹譏誚排斥無所不至而下問之意愈勤不懈此在他人亦豈能及然自須至今為日愈久而所執愈堅所見愈僻孜孜矻矻日夜窮忙不暇平心和氣參合彼巳異同之説反覆論難以求至當之歸而專徇巳意競出新竒以求巳説之勝以至於展轉支離日益乖張而不悟不知用心錯誤何故至此使人更不可曉但竊歎恨而巳今且據來示而舉其一二言之如既曰乾健也而又曰能體其健之謂乾若乾本是健即别無體此健者若更要體得此健方謂之乾則是乾在健外以此合彼而後得謂之乾也又如羣龍無首乃用程傳無妄六二之説雖於理不謬然安頓不是地頭全然不是文理又且𡵨而為二互相矛盾蓋乾為萬物之始故天下之物無不資之以始但其六爻有時而皆變故有羣龍無首之象而君子體之則當謙恭卑順不敢為天下先耳非謂可天德而不可為首也又非謂乾不為首也可天德而不可為首不成文理無可言者若曰乾不為首則萬物何所資始而又誰使為之首乎且程傳之説為人不可以私意造始故為之戒耳若乾之為始乃是天理自然非若人有形體心思而能以私意造始也此二説者其失甚不難見原其所以失之大抵只是日前佛學玄妙之見尚在故以理為外以事為粗而必以心法為主然又苦其與大易體靣不同須至杜撰揑合所以欲髙而反下欲密而反踈耳此是義理本原大差謬處不但文義之失然在今日德功病痛尚是第二義却是日用之間自巳分上更不曽實下功夫而窮日夜之力以為穿鑿附會之計此是莫大之害正使撰得都是亦無用處不得力况其乖戾日甚一日豈不枉費功夫虛度光隂不惟無益而反有害乎熹之鄙意竊願德功放下日前許多玄妙骨董即就日用存主應接處實下功夫理會箇敬肆義利是非得失之判若要讀書即且讀語孟詩書之屬就平易明白有事迹可按據處看取道理體靣涵飬德性本原久之漸次踏著實地即此等説話須自見得黑白不須如此勞心費力矣若必欲便窮竟此説亦請先罷穿鑿巳見且更追思今日以前凡熹所説與德功不同者并合兩家寫作一處子細較量考其是非痛加辨詰亦庶幾有究竟處不至如今日只見一邊不相照應而信口信筆無有了期也病起倦甚懷不能巳略此奉報千萬詳之若以為是幸即加功若以為非即此書不煩見答今後亦不須更下喻矣答江德功熹災病相仍衰悴萬狀昨𬒳按刑之命判不能往赴矣正𥘉忽聞奏事指揮疲曵進趨尤覺費力專人懇辭竟不得命旦夕不免就道或入文字而於前路俟報萬一不獲即一到都下靣懇而歸度此衰殘必蒙聖照也所示諸經序解偶此冗劇未及細看然觀大略似亦未離舊處也渾儀詩甚佳其間黃簿所謂渾象者是也三衢有印本蘇子容丞相所撰儀象法要正謂此俯視者為渾象也但詳吳掾所説平分四孔加以中星者不知是物如何制作殊不可曉恨未得見也答江德功老病之餘扶曵造朝自取羞辱雖幸天日有以辨明然罪終有未盡滌者巳力請奉祠矣理直義明計必可得不然雖使得罪亦勝忍耻作官也璣衡之制在都下不久又苦足痛未能往觀然聞極踈略若不能作水輪則姑亦如此可矣要之以衡窺璣仰占天象之實自是一器而今人所作小渾象自是一器不當并作一説也元祐之制極精然其書亦有不備乃最是緊切處必是造者祕此一節不欲盡以告人耳答黃直翁寅商因於夏禮所損益可知也周因於殷禮所損益可知也是周監二代之制而損益之其文大備亦時使然也聖人不能違時烏得不從周之文乎然亦少有不從處如行夏之時乘商之輅是也周之文固可從而聖人不得其位無制作之時亦不得不從也使夫子而得邦家則將損益四代以為百王不易之法不專於從周矣程子曰三讓者不立一也逃之二也文身三也寅竊意求之繼立以嫡聞父喪而奔身體不敢毀傷萬世之通義也泰伯胡為而不然耶蓋不立者泰伯知王季之賢又有文王之聖必能基成王業從而讓之亦太王之志也不奔父喪非本心也奔則王季辭立矣太王欲立之而未有命季歷必為叔齊之事逃而適他國足矣必之荆蠻斷髮文身而後巳者蓋不示以不可立則心不安其位未定終無以仁天下繼父志而成其逺者大者也三者權也夫泰伯之讓上以繼太王之志下以成王季之業無非為天下之公而不為一身之私其事深逺民莫能測識而稱之兹其德所以無得而加也此説亦是但以天下讓只依龜山説推本而言之為是所云不示以不可立則王季之心不安而位未定此意甚好非惟説得泰伯之心亦説得王季之心也蘇子由云漢東海王以天下授顯宗唐宋王成器以天下授玄宗皆兄弟終身無間言何必斷髮文身若使王季之心如漢顯宗唐玄宗則此説可也若有叔齊之心則不能一朝居矣王季之賢豈下叔齊也哉然泰伯三讓權而不失其正是乃所以為時中也故夫子以至德稱之答黃直翁衛君事伯謨書中巳略論之徐思不奉父命而逃去固為未善故程子亦以為不可但居勢如此不逃却不得如泰伯王季之事亦非常理但變而不失其正耳答黃直翁示喻誠敬異同之説巳具德功書中矣且既曰誠之者擇善而固執之則敬者但可為誠之之一事不可專以敬為誠之之道也明道先生蓋舉其一事而言爾大凡看文字須認正意不可如此支蔓無了時也答曹子野闕示及史記疑數條熹向曽考證來了功臣表與漢史功臣表其戶數先後及姓名多有不同二史各有是非當以傳實證之不當全以史記所傳為非真也如淮隂為連敖典客漢史作票客顔師古謂其票疾而以賔客之禮禮之夫淮隂之亡以其不見禮於漢也簫何追之而薦於漢王始為大將若巳以賔禮禮之淮隂何為而亡哉此則史記之所載為是三代表是其踈謬處無可疑者蓋他説行不得若以為堯舜俱出黃帝是為同姓之人堯固不當以二女嬪于虞舜亦豈容受堯二女而安於同姓之無别又以為湯與王季同世由湯至紂凡十六傳王季至武王才再世爾是文王以十五世之祖事十五世孫紂武王以十四世祖而代之豈不甚繆戾耶通鑑先後之不同者却不必疑史家敘事或因時而記之或因事而見之田和遷康公通鑑載於安王十一年是因時而紀之也史記載於安王十六年是因事而見之也何疑之有只有伐燕一節史記以為湣王通鑑以為宣王史記却是考他源流來通鑑只是憑信孟子溫公平日不喜孟子到此又却信之不知其意如何張敬夫説通鑑有未盡處似此一節亦是可疑但二説今皆無所證未知孰是孰非更可反覆詳究如有所見却幸垂教閩縣儒學教諭王製校晦庵先生朱文公文集卷第四十四
