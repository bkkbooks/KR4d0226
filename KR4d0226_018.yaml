body:
  text: 奏狀奏台州免納丁絹狀具位臣朱熹臣廵歴至台州㩀屬縣人戸陳狀稱逐年身丁每丁合納本色絹三尺五寸并錢七十一文𬒳州縣登承抑納絹七尺其實本州毎丁只發納上供三尺五寸却将錢七十一文令人戸倍輸折納本色竊念本州縣人戸連遭荒旱細民艱食見蒙追催緊急無所從出乞将逓年多納理作今年合納其今年倍納在官乞理爲来年合納之數臣喚到台州典級楊松年陸迅等供拖照案例臨海五縣人戸合納丁絹除第一等止第四等係将丁産稅錢併紐科納絹帛外所有第五等丁絹撿凖建炎三年十一月三日徳音節文兩浙人戸歳出丁塩錢毎丁納錢二百二十七文並令納絹一丈綿一兩巳是太重自今第五等以下人戸一半依舊折納外餘一半折納見錢台州人戸身丁毎丁供塩稅錢一百四十一文足折納絹七尺自紹興三年首正将第五等人戸丁塩錢除一半折納絹三尺五寸外有一半折納見錢七十文足五分計减退本色絹數是致闕少絹帛支遣本州扵紹興四年相度貼支官錢揍納具申朝廷獲奉聖旨令台州樁𬋩見錢與人戸納到数目依市價賣發不得科敷搔擾本州自紹興四年以後却将第五等人戸合納一半丁錢七十文五分足紐納絹三尺五寸照得第五等人戸計一十九萬九千八十四丁合納丁塩錢二萬八千七百貫八百四十四文除一半納本色外有一半止合納丁錢一萬四千三十五貫四百二十二文足本州却将上件丁錢紐作本色絹三尺五寸催納計絹一萬六千五百九十匹一丈二尺以致人戸陳理今来若放免一半丁絹却合納催一半丁錢一萬四千三十五貫四百二十二文足其所免上件丁絹本州逐年自有支用䟎剰紬絹一萬六千二百餘匹可以通那充官兵等支遣不礙起發上供綱運之數臣照對台州諸縣連年災傷細民重困若不優加存恤必見流移其第五等人戸所納丁稅旣有元降建炎三年指揮許納一半見錢自不應並納本色今来台州若免納一半丁絹本州自有䟎剰紬絹可以通那支遣不礙起發上供之数委無相妨臣巳行下台州及臨海等縣遵照建災三年獲降聖㫖令人戸逐年毎丁送納絹三尺五寸并一半見錢七十文五分足免致重困貧民下戸不得仍前違戾科抑外湏至奏聞者右謹録奏聞謹狀再乞給降錢物及减放住催水利等狀具位臣朱熹臣扵今月𥘉一日及六日兩次具奏乞給降錢物應副本路諸州糶濟支用等事至今半月未奉進止竊縁自今巳向深秋欲得上項錢物給付逐州及早運糴其餘事件亦合早作措置庻㡬将來飢民得沾實惠不至復似去年措置後時追悔無及但縁臣近日不合按劾知台州唐仲友不公不法事件違忤貴臣不敢更以私書手劄陳懇廟堂催促敷奏竊慮進呈淹緩有誤一道飢民性命之計今不免再具畫一事目奏聞欲望聖慈鍳茲愚悃發自宸衷斟酌事宜特降處分先将愚臣重賜行遣别選膚使錫以緡錢使布寛大之恩其减放住催水利募糴等事亦係本路救荒緊要節目若俟新官奏請然後施行必是遲緩誤事欲乞權依臣奏且與施行不勝幸甚湏至奏聞者一奏乞特降睿旨支撥錢一百七十萬貫揍前所給通作二百萬貫令臣及早分給諸州廣行運糴俟見糶給戸口實数却行計度支用不盡之数先次拘收回納仍乞扵内紐計米数量給空名告身五七十道并度牒官㑹揍成二百萬貫付臣收掌如有獻助及格之人令臣與安撫使書填給付一奏乞特降睿㫖扵今来所降减半指揮内刪去将来檢踏見得災傷最重處方得保明取旨之文只依乾道七年耿延年所請巳得指揮施行一奏乞特降睿旨将本路災傷縣分人戸夏稅權行住催少俟檢放秋米分数定日却将夏稅亦依分数蠲减一奏乞特降睿旨許臣前項所請百七十萬貫却扵数内量撥什三候諸州通判申到合興修水利去處即與審實應副其合糶給人有應募者即今繳納糶給由暦就顧入役俟畢工日糶給如舊一奏乞特降睿旨許令𬒳災州縣人戸苗米五斗以下不候檢踏先次蠲放令轉運司疾速施行一奏乞特降睿旨申嚴米糓不得收稅舊法仍詔有司諸𬒳災州縣人戸欲興販物貨徃外州府收糴米糓就闕米處出糶者各經所在或縣或州或監司自陳所帶貨物判執前去其糶米訖所買回貨亦各從所在自陳判執回歸徃回所過並不得輙收分文稅錢違者並依稅米糓法必行無赦徑下轉運司約束施行一奏乞特降睿旨就撥紹興府先給到度牒一百道換到米及明州先蒙降到二十萬貫糴到米並付本司均撥應副紹興府明州糶濟及貸與食利人戸興修水利却扵二百萬貫内除豁其水利貸錢向後豐年却令逐旋回納右謹録奏聞伏候敕㫖乞降㫖令婺州撥還所借常平米狀具位臣朱熹臣伏凖尚書省劄子備㩀知婺州錢佃奏乞扵本州見𬋩常平義倉米内支借二萬石支遣軍粮八月三日三省同奉聖旨許支借二萬石限至歳終撥還臣除巳恭禀施行外臣竊見義倉米在法唯充賑給不許他用今歳婺州諸縣例皆旱傷将来細民必致闕食本司尚自申奏朝廷支降官㑹度牒應副本州糴米而義倉窠名正係賑給之数先来本州巳曽借過一萬七千石元降指揮候秋成先次撥還尚未還到顆粒今来再借二萬斛止存七千餘石巳是不足支遣而所借之米又蒙許令歳終撥還深恐後時有誤糶濟欲望聖慈特降指揮令婺州将兩次借過米三萬七千石趂此秋成盡數先行撥還庻㡬可以添助糶濟湏至奏聞者右謹録奏聞伏候敕旨奏廵歷至台州奉行事件狀具位臣朱熹臣照得本路州縣今歳旱傷臣自七月十五日出廵取道􅌘縣迤邐入台州按視及預行措置賑恤事件節次具奏外臣已扵八月十八日起離台州取處州前去所有台州奉行事件湏至奏聞者一臣七月二十三日到台州二十五日凖尚書省劄子恭奉聖旨給降度牒三百道官㑹一十五萬緡臣即時分撥應副諸州外仍扵台州刷到常平司及諸州庫眼有𬋩窠名錢八萬貫及扵降到錢㑹内撥錢二萬貫共揍一十萬貫量逐縣災傷輕重地里闊狹均撥應副仍詢訪到土居官員士人誠實練事爲衆所服者一縣数人以禮敦請令與州縣當職官公共措置差募人舡前徃得熟去處收糴米斛循環賑糶仍多方敦請上戸說諭或出米穀或出錢物并行運糴添助賑糶仍㩀本州申到見𬋩常平義倉米五萬二千餘石巳令摏𬋩凖備賑濟及一面立式選差都正鄉官等家至戸到從實抄劄法應糶濟大小戸口取見的確数目各随比近置塲以俟将来闕食就行糶濟仍立罪賞約束不得泛濫抄劄枉費官廩外伏乞聖照一臣所經歴去處得雨之後晚稻之未全損者並皆長茂可望收成但民間所種不多僅當早稻十之一二其早稻未全損者亦皆抽莖結實土人謂之二稻或謂之傳稻或謂之孕稻其名不一目今有巳黄熟處亦有尚帶青色處村民得此接濟所益非細但其稻莖稀踈秕多糓少其色青者巳逼霜露恐難指擬至扵粟荳油麻蕎麥之類却並有收次第今冬未至乏絶只爲荐飢民無盖藏竊恐来春必至艱食臣巳面諭州縣官吏常切體訪不拘早晚但覺民間闕食便行賑糶收錢運糴循環接濟無損扵官有益扵民實爲利便伏乞聖照一臣體訪到本州黄巖縣界分闊逺近来出榖最多一州四縣皆所仰給其餘波尚䏻陸運以濟新昌􅌘縣之闕然其田皆係邊山瀕海舊有河涇堰閘以時啓閉方得灌漑收成無所損失近年以来多有廢壊去處雖累曽𨳩淘修築又縁所費浩瀚不䏻周徧臣竊惟水利修則黄巖可無水旱之災黄巖熟則台州可無飢饉之苦其爲利害委的非輕遂扵降到錢内支一萬貫付本縣及土居官宣教郎林鼐承節郞蔡鎬公共措置給貸食利人戸相度急切要害去處先次興工俟向後豐熟年分却行拘納其林鼐曽任明州定海縣丞敦篤曉練爲衆所稱蔡鎬曽任武學諭沈審果决可以集事但本縣知縣范直興不甚曉事恐難倚仗欲乞依本司巳獲降到指揮特與獄廟理作自陳别選清強官權攝縣事庻㡬興役救荒不至闕誤伏候敕㫖臣前項所奏給降到錢三十萬貫臣巳分撥婺州八萬貫衢州六萬貫處州五萬貫台州二萬貫黄岩興修水利一萬貫及明州定海縣亦乞興修水利巳撥一萬貫共巳撥二十三萬貫外尚剰七萬貫初欲分撥應副明州紹興府而明州申到巳奏乞撥錢一百萬貫臣遂不敢拈出兼婺衢兩州連年荒歉並無蓄積可以那兊運糴竊恐将来更有欠闕欲且留此錢数更俟聖慈添撥到錢即并諸州再行均給所有添撥之数巳兩次具奏今更扵後項開說伏乞聖照一臣扵八月初三日及十二日兩次具奏更乞聖慈添撥錢物及紹興府明州元降度牒官會所糴米斛通揍作二百萬貫文乞不候檢踏先放五斗以下苗米又乞權住催夏稅零欠俟檢放秋苗分数定日并行除豁理納又乞申嚴米糓免稅舊法仍乞特降指揮與免徃回物貨及搭帶稅物亦巳日乆未奉進止欲乞聖慈詳臣兩狀早賜指揮伏候敕㫖右謹録奏聞伏候敕㫖簽黄臣第二狀内巳有陳乞别選膚使付以緡錢一節今更自度决難自効并望聖慈早賜處分奏均减紹興府和買狀同本府臣聞欲救巨患者不可惜小費欲除實弊者不可循虚名臣等叨蒙聖恩備数東浙竊見紹興和買之患民所不堪巧詐之徒姦弊百出前此議者非不欲救而除之而徃徃過爲國家顧惜小費下比流俗苟循虚名是以因循終莫䏻革臣等不肖誠不足仰窺聖徳之萬分然有以知陛下愛民之心燭理之明扵此必有所不屑者是以敢昧萬死而一言之伏惟陛下留神財擇臣等契勘浙東七州除温州無和買外其餘六州共𬋩和買二十八萬一千六百四十匹二丈一尺紹興一州獨當一十四萬六千九百三十八匹乃占諸州一半以上縁此重困人不䏻堪所以子戸詭名巧爲姦弊雖有重法終不䏻禁且如會稽一縣經界之初舊例雖是物力三十八貫五百以上起科和買然以通数計之實及四十七貫方滿一疋今亦自三十八貫五百起科以通数計之乃自十八貫六百單一文巳科一疋則是向来科納一疋者今増爲二匹半矣官之所入不加贏田之在民不加損止縁人苦其重避免者多以故姦僞日滋以至此極向来官吏之有意扵民者莫不知有此弊亦未嘗不爲之惻然動心評議措畫亦旣多端而利害相形終無定說如欲首併詭戸則懼其告訐成風徒敗風俗而暫併復分終不能禁欲以畆頭均紐則縦舎㳺末重困農民輕重之間亦未爲允欲科有産無丁之戸則彼䏻立詭戸者固不憚更立虚丁而寡妻弱子實無丁籍者反受其弊如欲减退物力等則或作䑕尾推排則彼昔者既能析而爲三十八貫五百以下之戸矣今豈不䏻再析而爲若干錢以下之戸乎故嘗叅酌前後衆人之論而折衷之獨有通計家活浮財物力貫頭均紐之說稍爲無弊雖第五等戸昔無今有者未免有言然扵其間真偽亦復相半若真貧民輸一戸之和買不過丈尺彼自不較惟是子戸詭名之衆頓輸数戸積計甚多故尤不以爲便而必争之其力又足以挾下戸唱浮論以揺衆聴故不察其實者遂以自疑而莫能復措其說此和買之議所以汹汹累年而和買之害固未嘗有一毫之損也然竊嘗深究其受病之原則無他焉直以元額之太重而巳故今臣等相與熟議輙陳此說欲望聖慈先發徳音痛减歳額然後用貫頭均敷之說以定其制惟慮所敷第五等戸之中真下戸者或受其弊則請叅用髙下等第均敷及减免下戸丁錢之說以優恤之但使真下戸者審知此法之行不爲厲巳而無他辭則彼姦民之浮論亦可以置而不問矣謹畫一條具于后一所以先裁减歳額者臣聞祖宗初立和預買法先支見錢後納紬絹民間實頼其利至有形扵歌謡者而當是時本路漕臣有私扵越州者其吏復私扵㑹稽故此郡縣所抛獨多其後請本之数遂爲歳額而錢不復支絹日益貴以至今日而白着之科遂反爲一州無窮之害故建炎元年五月一日光堯夀聖憲天體道性仁誠徳經武緯文太上皇帝登極赦書有曰和預買法本支實價訪聞官司立價甚低或髙擡他物價直凖折或以無實虚劵充数甚者直至受納未支本錢不遵條限前期起催急扵星火今来上供之類欲依祖宗法其和預買有前項違戾守令并轉運司並以違制論加二等仍委提刑司覺察每歳扵依限後一月内具有無違戾奏聞不以實聞與同罪仰味大㢤之言則是太上皇帝再造之初聖慮之深固巳及扵此矣而兩聖相承扵今五十餘年迫以軍國之湏所資至廣卒未能有以仰稱睿謨預攴實價以復祖宗之舊者臣等竊思其次獨有擇其甚處如紹興府者有以少解其倒垂之急爲庻㡬焉爾然今欲去紹興和買之害使無姦弊稍得均平而不先减其當日請本之額譬如負千鈞者背膂之力旣巳不堪乃不知减其所負之物但欲移而寘之懐袖亦必無益扵事矣故今臣等扵此首陳减額之說而議者顧以爲有虧經費無所從補徒然奏陳必不聴許則臣等雖愚有以知其必不然也臣等仰觀陛下愛育黎元如親父母有以病告如切其身如頃年四川之虚額饒州之金徽州之絹汀州之銀青陽星子之稅放免蠲除不可勝計而連年水旱施舎貸給何啻数十巨萬何獨扵此知其爲害之甚而不出捐数萬匹者以紓之乎又况近日巳蒙聖恩减免天慶攅陵等處和買二千餘匹固巳漸示救患除弊之端矣然通而計之人戸所减每匹纔及一尺有竒而坊本煎塩坍江放生四色所放尚未除免則臣等所以望扵陛下者不但如此而巳也臣等竊見浙西和買最重去處無如臨安府者而其數纔及八萬餘匹欲望聖慈将紹興府且依此例爲額而蠲其餘数至扵版曹經費或有所闕則乞量撥内帑之蓄以補其数盖如本路坊場課利出剰錢数歳輸内帑者至若干萬貫皆是近歳曹泳創置窠名即非舊法所當供者如此之類倘捐一二歸之版曹還以𥙷填本路上供蠲减之數則聖澤下流人知徳意舊弊庶乎其可革矣一所以謂貫頭均紐之說爲無弊者盖今和買之重人悉規避詭爲下戸長姦滋弊莫可關防如經界之𥘉㑹稽一縣凡爲物力錢一百二十六萬餘貫而四等以上科納和買者當一百一十萬餘貫今来四十年所謂四等以上止有物力錢三十七萬九千四百六十貫六百文而轉入五等者乃至七十二萬五百餘貫皆縁和買之重姦猾之民爭爲子戸詭名以避均敷而其淳謹畏法不敢爲者顧乃爲之代受所免之数㡬再倍扵其舊政之不平莫甚扵此從来爲州縣者灼知其弊非不嚴詭戸之禁徃徃随併随分終莫䏻革今若蒙恩先次痛减歳額却以貫頭均敷自物力一文以上並紐寸尺則髙下多寡其數一定而姦弊無所從出矣若猶以真實下戸創科爲慮則所謂髙下等第科敷以及减免下戸身丁之說臣等請得而備陳之一所謂髙下等第均敷者上戸舊科和買𢾗多今用貫頭均敷則其数却湏少减下戸舊不曽科和買今用貫頭均敷則其数乃是頓増若使頓増數中皆是子戸詭名則固不足恤第其間却有真實下戸不䏻無咨怨者故今復爲此法以優恤之如第一等物力四十貫當科和買一匹則第二等四十五貫乃科一匹等而下之至扵五等則戸愈卑而科愈少矣如此施行庻㡬下戸所増不多不至反有重困一所謂减免下戸丁錢者大率第五等中有丁者多是真實下戸無丁者多是子戸詭名今若将第五等戸所納丁錢特與除放則真實下戸雖増和買而得除此色官物其乗除之間亦畧足以相𥙷矣右謹件如前欲望聖慈特賜省覧直降睿旨悉與施行則不惟臣等之幸實紹興闔境百萬生靈数十百年永永無窮之幸貼黄第五等戸計若干丁每丁一歳納錢若干統府八縣計若干貫後闕又小貼子所以欲改畆頭二字爲物力貫百者盖以畆頭科紐則獨有田之家𬒳科而有浮財物力者不與亦有未均之弊故欲改作物力貫百則有田及浮財者皆在其中此奏是衆人商量而新秀州嘉興主簿諸葛千䏻操筆爲之其人有學行審細詳練恐可招而問之必能博盡異同得其利病之實伏乞台照熹上覆奏塩酒課及差役利害狀臣竊見本司所𬋩塩酒課利國計所資爲甚廣而民情所患爲甚深若不根索弊原别行措畫竊恐民力日困亦非國家乆逺之利臣雖書生不曉錢糓然其大體亦竊講聞乆欲條奏以聞顧以救荒方急有所不暇今以罪疾力請投閑惓惓之私懐不能巳輙有巳見冐昧奏陳如有可採欲乞别選忠厚通敏之臣付以其事令其詳細稽考因事制宜使民情亟得去其所患而國計永不失其所資實爲利便至扵差役一事亦屬本司所𬋩今亦有少利害并具其說如後湏至奏聞者一浙東所𬋩七州而四州瀕海既是産塩地分而民間食塩必資客鈔州縣又有空額比較增虧此不便之大者夫産塩地分距亭塲去處近或跬歩之間逺亦不踰百里故其私塩常賤而官塩常貴利之所在雖有重法不能禁止故販私塩者百十成群或用大舡般載廵尉既不䏻訶州郡亦不䏻詰反與通同資以自利或乞覔財物或私收稅錢如前日所奏台州一歲所收二萬餘貫是也以此之故除明越兩州稍通客販粗有課利外台温兩州全然不成次第民間公食私塩客人不復請鈔至有一塲一監累月之間不收一袋不支一袋而官吏縻費吏卒搔擾有不可勝言者然以有比較之法州縣恐有殿罰則不免創立塩鋪抑勒民戸妄作名色抑令就買出入暗昧不可稽考大畧瘠民以肥吏困農民以資㳺手爲州縣爲提舉主𬋩者非不之知然皆以國計所資不敢輙有陳說日深月乆民愈無聊若不變通恐成大患臣生長福建竊見本路下四州軍舊行産塩之法令民随二稅納産塩錢而請塩扵官近歲官塩雖不支給而民間日食私塩官司既得産塩稅錢亦不復問其私販雖非正法然實兩便欲乞聖慈特詔本司取會福建路轉運司下四州軍見行産塩法将本路地里逺近塩價髙低比附叅考立爲沿海四州塩法其餘州軍自依舊法施行則亦革弊救民之一事也伏乞聖慈詳酌施行一酒坊之弊其說有四一曰官監二曰買撲三曰拍戸抱額四曰萬戸抱額臣竊以爲莫不便扵官監莫便扵萬戸其他則亦互有利害而萬戸之中亦不能無少利害要在講究詳盡然後施行則庻乎其弊之可革矣今官監之害朝廷既知而罷之矣然州郡占吝多不遵禀戸部漕司所撲仍不廢罷此則害雖除而未盡者也買撲之害在買人有消折本柄破壊家産之患在衆人有掗托抑勒捕捉欺凌之擾雖加禁防法式明備然勢之所在終不能革拍戸抱額則庻㡬矣然或額重而抱納不前或藉此而掗托搔擾則其弊亦不異扵買撲唯萬戸抱額最爲簡便然湏以一州或一縣通計田畆浮財物力而均出之使無官戸民戸之殊城居村居之異一槩均敷立爲定籍乃爲盡善若舎官戸而敷民戸舍城居而困村居不立官簿而私置草簿使吏得以隂肆出没走弄扵其間則又病矣此法本路處州見巳施行四五十年民無爭訟官省禁防雖其小害尚不能無然入其封境觀其氣象宛然樂國與諸州不同今欲便取其法行扵諸州則恐本州課額素輕或非他州之比未可遽議然他州課額雖多從来拘催少曽登足皆是虚名徒掛空簿若蒙聖恩深詔有司取淳熈六年七年八年三歳實催到庫之数叅校取中立爲定額然後以此科敷俾爲萬戸則亦庻㡬安民省事之一端也伏乞聖慈詳酌施行一臣扵今年月内曽具差役利害事申尚書省㡬数千言内有徐詡所畫歇役年限一條最爲詳宻而近凖戸部行下乃無一言見施行者臣生長田間頗諳鄙事竊謂其言若得聖明一賜觀覽决須有可采者欲望聖慈特賜宣索觀其大槩然後付之愛民曉事老成詳細之臣令其看詳擇可行者具爲條畫别降指揮施行庻扵陛下愛民之意少有裨補臣不勝萬幸右謹録奏聞伏候敕旨奏義役利害狀具位臣朱熹臣廵歴到處州竊見本州昨奉聖旨依布衣楊權所請結立義役此見陛下愛民之切雖草茅之言苟有便扵民者無不采納施行天下幸甚然本州目今奉行却有未盡善者如令上戸官戸寺觀出田以充義田此誠善矣而本州却令下戸只有田一二畆者亦皆出田或令出錢買田入官而上戸田多之人或却計㑹减縮所出殊少其下戸今旣𬒳科出田将来却不充役無縁復收此田之租乃是困貧民以資上戸此一未盡善也如逐都各立役首𬋩收田租排定役次此其出納先後之間亦未免却有不公之弊将来難施刑罰轉添詞訴此二未盡善也又如逐都所排役次今日巳是多有不公而况三五年後貧者或富富者或貧臨事不免却致争訟此三未盡善也所排役次以上戸輪充都副保正中下戸輪充夏秋戸長上戸安逸而下戸陪費此四未盡善也凡此四事是其大槩目下詞訴紛然何况其間更有隱㣲曲折未可倅見若不兼採衆論熟加考究竊恐将来弊病百出詞訴愈多改之則枉費前功不改則反貽後患将使義役之名重爲異議者所笑無復可行之日誠有未便臣昨見紹興府山隂縣見行義役只是本縣勸諭人戸各出義田均給保正戸長各有畆数具載砧基其保正戸長依舊只從本縣定差更不别置役首亦不先排役次而其當役之戸旣有義田可收自然樂扵充應不至甚相紏訐但其割田未廣去處未免尚仍舊弊若更葺理增置便無此患竊謂其法雖似闊踈然却簡直易明無他弊病又且不湏衝改見行條法委實利便故嘗取其印本砧基行下州縣然以未經奏請畫降指揮州縣徃徃未肯奉行臣愚欲望聖慈詳酌行下處州止令合當應役人戸及官戸寺觀均出義田罷去役首免排役次止用山隂縣法官差保正副長輪收義田仍令上戸兼充戸長俟處州行之有緒却令諸州體倣施行庻㡬一變義風永息争兢湏至奏聞者右謹録奏聞伏候敕㫖按知台州唐仲友第一狀外封奏爲本路諸州人戸間有流移去處奏聞事内封奏爲台州催稅緊急戸口流移知台州唐仲友别有不公不法事件臣一面前去審究虚實奏聞事貼黄臣竊見本人近蒙進擢而臣暰跡方此孤危較權量力實犯不韙顧以踈賤蒙𬒳誤恩實當一路耳目之寄不敢緘黙以負使令伏惟眷照力賜主張免致復爲小人隂有中害不勝幸甚具位臣朱熹臣今月十六日起離紹興府白塔院道間遇見台州流民兩輩通計四十七人扶老攜㓜狼狽道途臣問其故皆云本州旱傷至重官司催稅緊急不免抛離鄉里前去逐食臣即量給錢物喻令復業竟不䏻回各巳迤邐西去臣因詢究得本州日前似此流移戸口巳多目今方是初秋巳致如此竊恐向後愈見数多除巳行下本州約束令其存撫見在人戸母致復有流移外臣續訪聞知台州唐仲友催督稅租委是刻急多差官吏在縣追呼屬邑奉承轉相促迫急扵星火民不聊生又聞本官在任多有不公不法事件衆口讙譁殊駭聞聴臣今一面躬親前去審究虚實别具聞奏乞賜究治外所有上項事理湏至先次奏聞者右謹録奏聞伏候敕㫖按唐仲友第二狀貼黄奏爲知台州唐仲友違法促限催稅搔擾飢民事伏候敕㫖具位臣朱熹臣昨訪聞知台州唐仲友催稅急迫致得民戸流移等事即具大畧奏聞今廵歴到本州天台縣㩀人戸遮道陳訴本縣夏稅絹一萬二千餘匹錢三萬六千餘貫縁本州催促嚴峻六月下旬巳納及絹五千五百餘匹錢二萬四千餘貫而守臣唐仲友嗔恠知縣趙公植催理遲緩差人下縣追請赴州縣人聞之相與號泣遮欄公植回縣情願各催戸下所欠零稅絹二千五百匹限十日内赴州送納方得放免仲友遂專牒縣尉康及祖催納零欠更不照應三限條法及近日累降指揮牒内明言要在六月終以前一切数足又牒縣尉催淳熈七年八年殘欠官物專差人吏牟頴在縣監督及節次差下承局禁子等人絡繹在道乞覔搔擾無所不至又㩀寧海人戸論訴本州專差天台主簿張伯温及州吏鄭椿姜允在縣催督去年殘米下戸丁稅百端搔擾本司見行追問未到而聞張伯温在寧海縣追呼迫急本縣人戸不堪其擾相與群聚喧譟欲行歐撃伯温知之僅得走免臣竊惟台州頻年災傷民力凋弊仲友儒臣幸得蒙恩典郡專以布宣徳澤摩撫疲瘵爲職而乃舞智循私動乖仁恕在法夏稅省限至八月三十日下限方滿近来戸部擅行指揮必要七月盡数到庫已是違法而仲友乃扵戸部所促之限又促一月公行文移督迫屬縣頓辱良吏苦虐飢民使千里之人愁怨歎息無所告訴甚失聖朝所以選用賢良惠恤鰥寡之本意又况方此飢饉人心易摇萬一果然生事不知何以彈壓臣雖踈賤誤蒙任使職在刺舉不敢不言欲望聖慈先将仲友亟賜罷黜以慰邦人之望其不公不法事件臣當一面審實以聞湏至奏聞者右謹録奏聞伏候敕㫖申尚書省狀具位朱熹今有狀奏知台州唐仲反促限催稅違法擾民乞賜罷黜事縁在道路次舎淺迫慮有漏泄不敢備録全文申尚書省其狀如蒙聖慈降出欲乞早賜敷奏施行以快千里疲民之憤湏至供申右謹具申尚書省伏乞照㑹謹狀按唐仲友第三狀貼黄奏爲知台州唐仲友在任不公不法事件除巳將干連人送紹興府司理院根勘録案奏聞欲乞聖慈将唐仲友先賜罷黜仍詔有司母得觀望嚴行究治事伏候敕㫖此項已追到鐡匠作頭林明供具分明尋别具奏伏乞聖照仲友差官非法估没人戸財産多是差曹格及司戸趙善徳案中可見伏乞聖照造假㑹人蔣輝巳㩀通判趙善伋監押趙彦将就州宅後門捉獲臣已押送紹興府司理院傳聞此人在此造作假會甚多其台州解到行在諸庫官會欲乞宻遣公正臣寮驗其真僞伏乞聖照此項已據人戸潘牧繳到仲友長子手簡與弟子王静内說計囑周士衡論分公事及婦人李六娘訴王静及弟子鮑雙入宅求嘱犯姦公事臣追到王静鮑雙供通委有取受詣實尋别奏聞伏乞聖照具位臣朱熹臣昨兩次具狀按劾知台州唐仲友促限催稅違法擾民罪狀聞奏乞賜罷黜及聞本人更有不公不法事件乞候一面審究以聞臣扵今月二十三日到本州宻切體訪及先㩀本州通判申并㩀士民陳狀皆稱仲友到任以来少曽出􅈦受領詞狀多是人吏應褒林木接受財物方得簽押無錢竟不得通以市戸應世榮爲耳目令其在外刺求富民之隂事民間初無詞訴急遣吏卒奄至其家捕以送獄擇姦貪之吏鍜鍊考掠傅致其罪徃徃徒配或請嘱旣行則又忽然縦舎曲直輕重初無定論邦人畏其凶𦦨無不重足而立又本州違法收私塩稅錢歳計一二萬緡入公使庫以資妄用遂致塩課不登不免科抑爲害特甚又抑勒人戸賣公使庫酒催督嚴峻以使臣姚舜卿人吏鄭臻馬澄陸侃爲腹心妄行支用至扵饋送親知刋印書籍染造匹帛製造器皿打造細甲兵器其数非一逐旋發歸鄉里其他細碎不急之物下至魚塩臭腐但直一文以上無不津致以歸籠檐動十百計絡繹不絶扵路凡此皆人所共見有口者類䏻言之臣嘗令本州通判趙善伋取其公庫文暦自二十四日巳午間至中夜不至㩀監庫官司理王之純及造買使臣姚舜卿供每遇知州判下支單即時關支出庫所有應干簿籍扵今日巳時知州聞得本司勾追馬澄即時盡行拘收入宅有公庫貼司俞實張公輔吳允中備見之純等曽親徃控告知州堅執不肯付出仲友又悅營妓嚴蘃欲携以歸遂令僞稱年老與之落籍多以錢物償其母及兄弟㩀司理王之純供今年五月滿散聖節方知弟子嚴蘃王蕙張韻王懿四名知州判狀放令前去即不曽承凖本州公文行下妓樂司照㑹仲友身旣不正遂不䏻令其子弟以至白晝公然乗轎出入娼家交通關節受納財賂曽爲群不逞就娼家歐撃狼狽而仲友不敢問其嚴蘃沈芳之徒招權納賂不可盡紀其簿暦文字少經倅貳之手惟倚臨海縣丞曹格及曹官范杉等格妻與之有㜕姻得出入其家早暮無節物論頗醜凡此細碎汚穢之迹臣不敢縷陳以瀆天聽臣謹按仲友身爲儒生早取科目繼登臺省爲清望官今又蒙恩出守名郡所宜夙夜恪勤正身率下務以承流宣化牧養小民爲職顧乃不思報稱公肆姦心其刻核擾民之政旣如臣前奏所述其貪汚不法之狀又如臣今奏所陳而近侍貴臣或未知其所爲猶以故意期之以至交章論薦上誤寵擢臣以職事所在恐負使令誠知蹤跡孤危不敢隱情惜已其官屬所言士民所訴與臣前後所聞大畧不異雖其曲折未必盡如所陳然萬口一詞此其中必有可信者而觀其公然占吝公庫文暦不肯解送則其衷私折換以盖日前侵盗入已之迹亦有不待案驗而可知者臣更不敢差官體究慮渉張皇却致本人潜將文案盡底改易無可供證竊謂唯有付之所司盡實根勘則其有無虚實自不可掩除巳牒本州通判趙善伋髙文虎拘收本州自仲友到任以後至截日終應干收支文暦公案及将合干人等押送紹興府司理院禁勘外欲望聖慈閔此一方乆罹凶害亟詔有司母得觀望嚴行究治依法施行以爲逺近四方守臣貪殘不法之戒湏至奏聞者一淳熈八年受納秋苗糙米每年是十月半後間開塲仲友信委司戸趙善徳差爲受納官公然倍取合耗髙帶斛面不半月間善徳巳申所納糙米数足方十一月仲友将人戸未納糙米違法髙價一併折錢人戸盡用賤價糶米髙價納官一郡皆以爲苦至今追催所折米錢更不顧恤朝廷上司時暫住催指揮其收到錢雖入扵糴本庫收附多是關入公庫巧作名色支破私用欲乞委官到州監合干人供具去年折納糙米月日石數見得不恤民力一意取錢實迹一淳熈八年春本州荒歉抄劄諸縣合賑濟人戸姓名散給未嘗周徧仲友却專委人吏李廻乗勢監勒鄉司儧具隱落丁稅之人抑勒鄉司乗此作弊増减其姦計詞訴至今不巳每縣添至数千人多是失實比常年添増五縣丁産絹数千匹在兩年中納夏稅和買絹未及七分却並髙價折錢困及小民無錢可納増起丁稅以無爲有爲一州無窮之害欲乞委官再行審實早與除豁其所取到添丁錢並不曽起發不審将作何用一公使庫自来不許賣酒縁添歸正人合支些小供給錢仲友到任以来以此爲名公庫每日貨賣生酒至一百八十餘貫煑酒亦及此数一日且以三百貫爲率一月凡九千貫一年凡收十萬餘貫其所造酒米麥之屬旣並取扵倉庫羡餘而所收息錢太半不曽收附公使庫錢暦並是入巳一自到任以来縁公庫賣酒錢額旣髙督責兵官尉司逐日捕捉私造酒麴及糶糯米糯榖者所犯之家與四鄰盡是籍没貲産以充自立賞錢格所犯止扵升合亦不䏻免兩年中破壊二千餘家其間乆繋囹圄染疫而死者甚多所犯甚輕並出私意文致其罪至扵徒配如兵士盧宗之類闔郡軍民冤恨無一日安迹一公庫所入舊例並支見任官員逐月供給及宴㑹之屬自兩年来却以糴本庫錢撥入軍資庫軍資庫撥入公使庫以支供給公庫之錢旣富乃巧作名色以饋送爲名多至五百貫少至𢾗十貫專委公庫手分馬澄支行及書表司楊楠僞作書劄送與官員封角了當却供入宅堂又其間婺州親戚如妻之親兄何知縣何教授其子之妻父曹宣教其表弟髙宣教者甚多止宿郡齋爭受關節以此類作宴㑹無不預坐留連数月臨行饋送各以數百千及去年十一月次子娶婦凡供帳幙帟染破紫綾羅絹凡数百匹從人衣衫数百領樂妓衣服並是什物庫陸侃支公使庫錢徃仲友私家婺州所開綵帛舖髙價買到暗花羅并瓜子春羅三四百匹及紅花数百斤本州收買紫草千百斤日逐拘繋染戸在宅堂及公庫變染紅紫其妓弟四十餘人都行首嚴蘃分真紅暗花羅餘行首分瓜子羅其餘分春羅每人分俵真紅大袖帔子背子紅裙衫叚幃子各一副一州驚駭自来未嘗有知州爲妓弟製造衣服名件不一違法如此盡是父子踰濫以此取媚其餘所染到真紅紫物帛並發歸婺州本家綵帛舖貨賣其子親㑹宴集經月姻族内外一文以上皆取辦扵公庫其妓弟今夏又分紗帛衣名件並如前一仲友專委司戸趙善徳兼𬋩公庫前後妄自支使並無合破名色條例善徳将滿遂宻獻計以收買米麴物料爲名扵今年二月上旬一日之間支錢二萬貫皆是入已並無他處簿書收附證照一司戸趙善徳兼𬋩糴本庫今年二月上旬忽支落十餘萬貫以轉運司差官點檢且欲移寄他庫爲名此項錢後来即不見起發亦不見拘收並無下落一仲友專委人吏鄭榛陳忠充財賦司凡官賦所入其間有不該係省及諸庫收附者盡是别作名色支破差人徃外州買銀子及收到来即不知将作何用及就本州置買銀塲逐日監繋舖戸稍違限期無不重斷多是以所賣公庫生酒錢支買不曽附暦先是司戸趙善德及二胥吏同謀作弊逐時扵公庫以犒賞爲名支錢遺賂善徳一歳至二三千緡其妄用錢物甚扵泥沙不可明說其兩吏所支亦数百貫一仲友少曽坐􅈦受領詞狀間有判下人戸論訴皆係應褒林木接受忽自宅堂傳出盡是子弟同坐商議判詞其父子或自相爭執弟妓早晚出入宅堂公然請嘱每事皆有定價多至数千緡又縦獄吏百端乞覔民間冤苦不可勝言一仲友自到任来本性喜引致姦私公事或告首事不干已或幃箔曖昧不明或僧道與人有冤並行受領皆欲窮究根底並不慿信獄官推司所勘自引歸花園中亭舘及宅堂後宴坐去處親自鞠問語言穢媟吏卒羞聞當面露示其合該刑名至重之意其弟妓與心腹人吏住持鄉僧等内外相通同共請托取受貨賂不可勝計並是子弟專决其所諾不副者雖已釋去復行追繋増其刑名所需旣滿者刑名雖重結案之後平白不㫁如僧景猷犯姦事道士祝元善亦預景猷富厚責賂甚重不䏻應其所需則籍没其衣鉢莊産之屬祝元善因栖霞知官姓李者以彈琴出入宅堂首以厚賂徑逹未㫁間先令放出竟不㫁罪李承節之妻爲應楊所犯乃外甥犯從舅母或佃者犯主母干連十餘人臨㫁時得二千緡平白不斷富室黄士龍黄日新更易其妻穢不可言並自引上親勘旣受其物至今不㫁凡此等事皆顯然人所共知者一兩獄直日收禁罪囚羅織枝蔓不容獄官依法裁處湏令逐日過廳取禀已意以爲輕重髙下毎事多是曲法枉斷縁此拘繋旣多致死百餘人全不顧恤一仲友在鄉開張魚鮝舖去年有客人販到鮝鮭一舡凡数百篰更不容本州人戸貨買並自低價販般歸本家出賣並差本州兵級般運其他海味悉皆稱是至今逐時販運不絶一仲友自到任以来關集刋字工匠在小􅈦側雕小字賦集每集二千道刋板旣成般運歸本家書坊貨賣其第一次所刋賦板印賣将漫今又關集工匠又刋一番凡材料口食𥿄墨之類並是支破官錢又乗勢雕造花板印染斑襭之屬凡数十片發歸本家綵帛舖充染帛用一仲友因修造兵器前後發買牛羊皮穿甲及生絲打弓弩弦支破不可勝計其牛羊皮買来甚少錢亦不歸所買生絲除量支作弓弩弦用外並發歸本家綵帛舖機織貨賣一仲友又因修造兵器自造精細鐡甲数副及弓弩刀鎗各十数件收入宅堂不知将作何用一本州新報恩寺元有住持僧誣以他罪逐去却請鄉僧介登来此住持早晚出入宅堂傳度關節凡五縣僧寺易換住持㡬遍盡是介登保明乞差通同接受貨賣每處必数百緡其中皆是婺州富僧近又有應世榮者亦作士戸狀陳乞即時給帖其無忌憚容小人紊亂郡政一至扵此一仲友自到任以来違法招刺廂兵每一名必立定價外寨兵士一百貫在城兵士止三五十貫下至學院子修合醫人刋碑刋版工匠弟妓厨子各得干預請求去年七月間有外寨兵士經州下狀告論兵士周榮託仙居縣丞楊浩齎錢一千貫囑本官􅈦子轉求刺軍十名事雖送有司縁錢入已竟不追究有案狀可驗若刷具仲友自到任以来刺過廂兵人数可照所受錢数一本州販香牙人應世榮姦猾小人因其家資稍厚左右引置以曽與仲友建立生祠乃延爲上客與之頌賛親自題冩世榮乃刻石誇張因此妄作聲勢出入宅堂仲友專一信委爲心腹牙瓜凡首姦獲酒盡是世榮發之仲友却令臨海縣丞将帶兵卒数十人追捕毎一如此闔郡搔擾驚走其他挑起事端及報其私冤羅織平人寘扵重憲不可勝数所斷輕重並出世榮巳意全無州郡雖士大夫善人之家亦𬒳凌衊郡人指爲殃禍其人取受前後不可計数每事所得必與其子弟分受若非送有司勘其情犯編配逺惡去處何以贖䧟害鄉土善良無窮之罪一臨海縣丞曹格係仲友長子妻黨其人㐫暴貪婪全無忌憚自仲友到任倚恃至親之故妄作聲勢凌侮同官捶撻胥吏凡士大夫不問見任寄居無不遭其譛訴以其妻出入郡齋日有醜惡之聲傳播一郡公然不時出入宅堂或入其子舎傳度關節百端取受并仲友長子之妻父曹宣教者即曹格之堂兄徃来曹格之家通同于預公事全無顧藉仲友弟婦兒女婦姪不時徃曹格之家飲燕媟狎無禮靡所不至全無廉耻其曹格日来縦横尤甚毎年受納官物皆干求差預百端阻抑人戸所納之物絹必挼拶令破綿子曬或經月米麥必十来日宿倉又多取合耗人之冤苦無所告訴似此姦猾小吏輙敢慿藉聲勢苦虐士民可不明正典刑一仲友有三子長曰士俊次曰士特士濟及其甥姪数人随侍来此自到任見客則立扵屏側引問公事則環扵坐隅與胥吏混立紛然干預有簽押决遣各出巳意不容其父下筆多因賄賂先入其父不止明知有公受其欺者是非曲直一切反戾其父子各㩀弟妓三子多出入王静沈玉張嬋朱妙沈芳之家盤合簡帖絡繹道路本州士民有得其子所與弟妓書簡受關節者亦曽連粘投狀訴于提刑行司一仲友自到任以来寵愛弟妓遂與諸子更相踰濫行首嚴蘃稍以色稱仲友與之媟狎雖在公筵全無顧忌公然與之落籍令表弟髙宣教以公庫轎乗錢物津發歸婺州別宅嚴蘂臨行時係是仲友祖母私忌式假却在宅堂令公庫安排筵㑹餞送嚴蘂近来又與沈芳王静沈玉張嬋朱妙等更互留宿宅堂供直仲友洗浴引㫁公事多是沈芳先入私約商議旣定沈芳親抱仲友㓜女出􅈦事勸解仲友僞作依從形狀即時寛放如應揚犯姦等事並是臨時􅏻點此等情態本州亢旱啓建祈雨道塲安撫司文牒傳奉聖旨令精意祈求非不嚴切仲友却追拘収外縣弟子十餘人及散樂二三十人逐日出入宅堂以下碁彈琴爲名公然扵道塲前徃来一日寄居士民在儀門下修設水陸道塲其長子士俊自臨海縣丞曹格家醉歸帶挾弟妓数人扵本處觀視嬉笑歌唱無所不至士庻嘆恨皆云太守如此兒子又如此如何會有雨澤感應又因㫁屠日仲友却令公厨供造法煑雞鵞蹄肚食物入宅堂其長子士俊又以盤合乗貯生料猪羊水雞之類送與行首王静人皆驚駭縁此百姓忿怒因士俊閧㳺無節公然捶打扵弟妓家更不敢根究一仲友有婺州隣近人周四會放烟火其妻㑹下碁仲友招換来此遇作州會以呈藝爲由每次支破公庫錢酒計十餘貫前後支過錢約数百貫妻常出入宅堂下棊仲友却委放煙火人探听外事如犯姦首酒等事亦是此人在外邀求稍不如意即時挑發其間又有在婺州喚到刋字碑塑佛工匠十餘人壁截郡治堂屋安歇支破公庫錢物供贍專是在外探刺生事一仲友造置浮橋破費支萬餘貫官錢搔擾五縣百姓数月方就初以濟人徃来爲名及橋成了却專置一司以收力勝爲名攔截過徃舟舡滿三日一次放過百端阻節搜檢生出公事不可勝計此項若不早與奏聞行下廢罷却是本州添一稅塲遺害無窮向去復有掊刻之人因而増添收稅課額若一兩政循襲必不肯廢此大係利害橋成未及一年巳收過力勝錢二千五百餘貫見有簿暦可照一仲友貪墨無耻素乏㢘稱到官之初適見公使庫有前政積下官錢十餘萬貫遂有席卷之意乃擇姦猾使臣姚舜卿爲監官并與公庫手分馬澄日夕握手宻謀将公庫諸色官錢巧作名色支破變轉官㑹並用竹籠盛貯入宅輙先令其子節次作文字行李擔押歸前後㡬数萬緡皆有實跡及染造真紫色帛等物動至数千匹皆用官錢託以人事爲名逐旋發歸以爲貨賣之資其他不急之物徃徃稱是乞追姚舜卿馬澄並帳設庫專知陸侃送清強官司勘鞠便見著實今来旣得改除歸鄉行李亦数百擔他可知矣有雕匠姓蔣人因造假㑹事發永康縣差人宻来擒捕仲友輙令兵卒刼取反将承差人送獄絣打永康縣無如之何徑申提刑司牒本州發遣仲友輙作本人身死備申至今尚在本州其不遵法度皆此類也右其通判及士民所述仲友罪狀謹件如前謹録奏聞伏候敕旨晦庵先生朱文公文集卷第十八福州府儒學訓導舒鏊校
