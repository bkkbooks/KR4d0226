front:
  text: 免江東運使狀一右熹見任主管西京嵩山崇福官忽於今年九月凖尚書省劄子奉聖㫖朱熹除江東轉運副使塡見闕不候受告疾速之任任滿前來奏事熹聞命震驚不知所措伏念熹空疎無取疾病早衰入仕四十餘年止是循常竊祿本無竒節可以踰人徒以屢䝉恩私横加除用間有非其分之所當得與其力之所能堪者不得不控辭以干朝聽而傳聞不察指目多端獨荷壽皇天日之照臨許全素守又辱聖主雲章之藻飾誤借寵褒遂得偷安里閭畢願香火在於愚分已極叨踰不謂聖恩記憐遂加任使仰惟始初清明之日正是賢智馳騖之秋顧雖殘廢之餘豈不願效尺寸實以積衰既久百恙交攻心勦形疲視昏聽重竊自揣度决然不堪一路耳目之寄若不祈哀丐免必致自取顛隮兼熹祖鄉徽州正屬本路見有墳墓宗族田産在婺源竊慮在法亦合回避欲望朝廷洞照本末曲為敷奏特與追寢新命令熹復還故官庶幾少安愚賤之迹則熹不勝千萬幸甚謹具狀申尚書省伏候鈞㫖
