body:
  text: 與宰執劄子熹輙有愚誠仰干崇聽今者伏蒙聖恩除熹江南東路轉運副使此葢廟堂光輔聖主圖起治功既已並用羣材不忍獨遺一士之意非特熹之私幸然熹以久病積衰目昏耳重心力凋殘動多遺忘自度不堪公朝一道之寄已具狀申尚書省乞賜敷奏寢罷去訖其間所陳病證皆有實迹不敢輙有一詞之偽至於墳墓田産有嫌當避理亦明甚欲望洪造矜憐早賜將上曲為開陳使得依舊竊食祠官以安賤迹實熹疾病孤危千萬之幸干冐威尊不勝俯伏震懼之至辭免江東運使狀二右熹十月二十一日凖尚書省劄子據熹辭免新除江南東路轉運副使恩命及回避祖鄉田産事十月五日奉聖㫖免回避依已降指揮疾速之任熹己於當日望闕謝恩訖竊聞臣之事君猶子事父東西南北唯命之從熹雖至愚敢忘斯義又况平生碌碌初無竒節今者該遇覃恩轉官改賜章服並是隨衆陳乞冐昧祗受豈敢獨於聖恩除授差遣乃飾它詞固為遜避上干違命之誅下速近名之謗實以衰病支離不容勉彊且於衆疾之中目昏為甚今但拜官入境便有吏民訴訟遮擁道路百十為羣若但草草一觀備禮撥遣即於愚心有所未安若欲子細披閲必期有以上副使令下慰民望則熹之目力實所不堪未論其它職業曠廢只此一事便見疎虞在熹孤蹤固難逃於吏議而於公朝推擇之意亦豈不至上累聖明反復思惟益增惶懼不免復此控訴祈免誤恩欲望朝廷特賜敷奏令熹仍舊奉祠竊祿以安愚分干冐威尊下情不任戰灼之至謹具申尚書省伏候鈞㫖小貼子熹所陳回避田産事雖䝉聖恩特免回避然熹宗族衰微子弟猥衆當此之際豈無寅緣侵擾鄉鄰紊煩官府之害故雖未敢祗受而已不勝憂懼之懐然不敢專以此事為辭者葢恐又煩朝廷換移别路差遣而熹衰病終是不堪又須再有塵瀆則熹獲罪愈深無由自解伏乞鈞慈俯賜憐察與宰執劄子熹輙布腹心仰干造化熹昨䝉聖恩擢貳江東將漕之寄自度衰朽不堪任使且有故里之嫌恐招物議即已具狀辭免今乃䝉恩特免回避仍令疾速之任仰誤隆指感極涕零但熹衆疾所攻目眚為甚受理詞訴搜尋案牘皆有所不堪者竊恐黽勉到官必致曠闕上誤委寄為罪益深已有公狀申尚書省欲望鈞慈特賜將上冀䝉聖慈矜憫追寢前命仍畀祠祿以安愚分則熹區區不勝幸甚干瀆崇嚴無任俯伏俟命之至辭免知漳州狀右熹凖尚書省劄子奉聖㫖差知漳州填見闕不候受敕疾速之任候任滿前來奏事者伏念熹昨者懇辭江東恩命陳乞依舊祠祿今凖前件指揮雖未盡從所請然已極為優幸自惟么麽無所取材乃䝉聖主覆冐容載之恩公朝委曲成就之意至於如此豈宜復有辭避以重違命之誅實以所苦目疾昏暗愈甚省閲書判皆有所妨若不自量冐昧祗赴必至貽患千里獲罪非輕是以再三籌度終不獲已而復敢冐鈇鉞之威以畢前懇欲望鈞慈特賜敷奏令熹依舊奉祠以安愚分固為莫大之幸或且别與僻遠閑慢差遣一次使得少效微勞仰承德意而免於曠職殃民之罪以全晚節則亦熹之幸也謹具狀申尚書省伏候鈞㫖小貼子竊見諸路帥司參議之屬比之宫觀粗有職業但以禮秩太優不敢陳乞若䝉陶鎔使得備數過望幸甚與宰執劄子熹輙以私懇仰干公聽熹昨者懇辭江東恩命己䝉聖恩改畀郡紱此葢廟堂矜憐衰朽曲賜陶鎔有以及此幸甚幸甚但熹所苦目疾比復增劇自度决然不任郡事已具狀申省乞許辭免若䝉矜憐令熹依舊奉祠固為甚幸或與改一閑慢差遣使得少效微勞仰承德意而免於曠職殃民之罪則於熹亦為甚幸屢瀆威嚴俯伏戰汗辭免知漳州劄子熹伏凖尚書省劄子以熹辭免差知漳州恩命令熹依已降指揮疾速之任者螻蟻寸誠未能上達天聽又迫己行之命有不容勉彊者敢復控辭以干洪造伏念熹多病早衰本非一證昨以餘疾雖切己身未至有妨職事以故不敢一一陳述而專以目眚為言又念聖主臨御之初非是臣子堅卧固辭之日以故不敢必求祠祿而并以閑局為請區區愚悃自謂必䝉矜憐不意廟堂未察其私不為及時將上使熹違命日久進退無據今又反䝉朝命督趣危懼益深是以不免復此控訴伏望鈞慈俯垂聽察特與敷奏除熹依舊宫觀或合入閑慢差遣一次使熹得以尋訪醫藥休養衰殘庶幾未死之前或可别聽驅䇿則熹不勝千萬幸甚干冐威嚴無任俯伏俟罪之至自劾本州地震及患脚氣不能祗赴錫宴妨廢職務乞賜罷黜奏狀右臣中年病廢久託祠官近䝉聖恩起分符竹到任今恰半年却無大叚疾痛又被聖訓令臣相度本州先行經界利害臣竊自幸以為若得慿恃威靈更且彊徤誓當竭力奉行仁政使一方千里之内貧富之民各得其所而州縣之間亦得以隱覈姦欺實出失陷財賦而免於白撰歲計違法害民之弊而臣不幸賦性至愚臨事多暗刑政乖戾侵迫隂陽當州境内自九月以來累次地震臣實恐懼未及申奏待罪而舊苦脚氣忽然發動痛楚寒熱倍於常年遍傳兩足連及右臂以至會慶聖節滿散錫宴之日病勢方劇臣以臣子之誼不敢自安亟欲彊自扶掖少伸三呼百拜之恭而筋骨拘攣不容自力憂悸反側無地自容只此一節已無心顔可居士民之上又况在告日久獄訟稽留今雖略能彊起視事而病中服藥出汗過多氣血精神日益凋耗一郡軍民之務日有萬端思慮少或不周為害非細加以年歲向晚播穀有期而所請經界至今未奉進止設使即今便䝉行下已是後時雖欲竭力奉行終恐不免緩不及事之責以是思惟憂惶怵迫不知所以為計輙冐萬死哀籲以聞伏惟聖慈察臣守土失職事上不恭之罪特賜罷黜投之遠裔以為中外臣子之戒臣死且不朽儻或憐臣愚暗拙疎疾病狼狽之實不加大譴曲賜保全使臣得以自裹殘骸歸窆故土亦死且不朽干犯天威臣無任震懼隕越之至謹錄奏聞伏候勅㫖乞宫觀劄子熹輙有哀懇仰瀆崇聽熹昨以被病不堪郡寄輙露投閒之請伏䝉聖恩未賜俞允亦會賤軀稍可支吾不敢再有陳乞續凖轉運司牒被奉聖㫖許令本州先行經界熹即已遵禀日逐講究漸見倫緒只俟秋冬下手打量意謂可以少效疲駑仰副使令之意而熹無狀行負幽明長男暫往婺州遽爾夭歿不惟老病之餘不堪悲痛而料理喪葬收拾遺孤相去隔遠私計實有未便雖欲彊自扶持黽勉從事勢有不可得者欲望鈞慈特為敷奏復俾奉祠退歸田里則熹父子存歿均被莫大之恩不勝千萬幸甚辭免袐閣修撰狀一右熹昨䝉聖恩權發遣漳州事在任陳乞奉祠今月二十七日凖尚書省劄子奉聖㫖依淳熈十六年正月二十三日指揮除袐閣修撰差主管南京鴻慶宫任便居住熹己於當日望闕謝恩將本州牌印職事交割次官通判軍州事髙伉管幹訖獨念熹以愚賤疎遠無所能似昨者誤䝉至尊壽皇聖帝非常之知已曾除授前件職名熹以無名授受力具辭免適當聖上即政之初已荷聖恩特降褒詔曲從其請自爾以來曾未再朞守郡一年又無絲髮勞效可紀特以禍患輙丐便私已乖陳力致身之義方竊恐懼不謂天慈矜閔許以投閑復申前命有此超躐内自循省何以克堪所有前件除袐閣修撰恩命熹實不敢祗受欲望朝廷特為敷奏許熹辭免則不惟在熹愚分不貽冐受之譏其於公朝亦免輕授之失熹下情無任懇禱激切之至謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有誠懇仰于崇聽熹昨以禍患陳乞祠祿以便私計伏䝉聖慈矜憐即賜開允拜命之次感極涕零但又䝉誤恩復申進職之命則熹昔已力辭於前今又無名再叨横寵區區私義實有所不自安者已具公狀申尚書省欲望鈞慈特賜敷奏收還成命令熹且以舊職寅奉真游而免於受爵不遜之譏則在熹愚分榮幸已多伏惟髙明俯垂照察辭免袐閣修撰狀二右熹七月四日凖尚書省劄子以熹辭免新除袐閣修撰恩命奉聖㫖不許辭免者陳誠未力聞命不遑謹已即日望闕謝恩訖伏念熹昨於淳熈十六年内被前件恩除兩具辭免所陳事理已極詳備所以當時便䝉開允今者乃以私故丐祠又叨申命之寵在熹愚分尤所未安葢若使熹在任之日遭罹災患而能抑制私情黽勉王事究宣聖朝經界之仁政以惠千里侵寃失職之民或於懇求去郡之際遂能辭榮納祿致其為臣之事以謹不能者止之戒則朝廷之旌勞奬退猶頗有名而熹之辭受取舍尚不為甚無説者今皆不然則於前此所陳之外又有此不當受之説二焉是以雖迫宸命之嚴而顧慮徘徊進退無據不免上冐瀆尊之罪下觸干名之嫌復控血誠仰干公聽欲望鈞慈特為敷奏收還已行告命别降勅牒指揮令熹且以舊帶職名仍充祠官差遣則在熹已不勝其過分叨榮之幸干冐威嚴皇恐無地伏候鈞㫖與宰執劄子熹輙有愚昧不移之懇再冐威嚴仰瀆鈞聽熹一昨辭免新除袐閣修撰恩命近凖省劄奉聖㫖不許辭免在熹微賤曲荷天慈寛其狂僣之誅加以申命之寵固不當再有辭避然反覆以思在任既無尤異可賞之功求去又無廉退可褒之節靦顔冐受實懼無名謹已再具公狀申省辭免欲望特賜矜憐都俞之際曲為敷奏得從所乞實為至幸干慁頻煩伏深戰栗辭免湖南運使狀一右熹十月九日凖尚書省劄子奉聖㫖除熹荆湖南路轉運副使填見闕不候受告疾速之任任滿前來奏事熹聞命震驚罔知所措己於當日望闕謝恩訖伏念熹前任假守漳州適緣長男物故輙丐閑秩歸治喪葬䝉恩得備祠官到任方及月餘凡百經營未有次第加以憂患摧頽精力衰耗雖欲痛自䇿勵勉赴事功終恐無以仰稱使令之意欲望朝廷特為敷奏收還成命令熹且食祠祿以終餘年不勝千萬幸甚謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有愚懇仰干公聽熹昨以私家患難乞歸治葬伏䝉矜憐陶鑄祠祿今來到任方及一月貧家舉動費力凡百尚未就緒今者忽被聖恩付以湖南將漕之節仰體皇慈不遺孤遠之意不勝感荷激切之至然熹之家事如前所陳而憂患以來精力凋耗竊恐無以仰副使令自速罪戾欲望某官特賜敷奏收還成命令熹且食祠祿以終餘年則熹不勝千萬幸甚冐瀆威嚴俯伏竢罪辭免湖南運使狀二右熹昨具狀辭免新除荆湖南路轉運副使恩命近凖尚書省劄子奉聖㫖不許辭免仍依已降指揮疾速之任熹己於當日望闕謝恩訖仰戴皇慈容覆之深恭體聖訓丁寧之切極知臣子之義不當復以家事為辭便欲起發前去祗服職事以稱明詔顧竊惟念昨者䝉恩假守漳州伏值聖㫖行下臣僚申請乞行本州經界令熹相度聞奏熹竊見本州紹興年中經界良法方行遽罷貧民産去税存不堪追呼之擾富家業多税少益長兼并之勢後來朝廷節次欲再舉行皆以豪右浮言沮撓而輟積至於今苦樂不均公私受弊有害國家發政施仁之實日甚一日無有窮已是以不勝憤懣即以已見論其當行本路諸司審此曲折亦已條具申奏伏䝉聖恩特從所請貧民下戸欣幸方深而鄉官土豪已慘然不樂怨謗蠭起矣今者果聞已行住罷静惟厥咎由熹愚昧思慮不審上誤朝廷得逭誅夷己為幸免更叨寵擢益紊彛章熹雖不才粗識廉恥誠無心復效奔走無顔復臨吏民無宜復當委寄輙冐萬死自劾以聞伏望公朝特賜敷奏收還除命重行黜責以為不度時勢生事擾民之戒謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙罄愚𠂻再干洪造熹昨以私家喪葬未畢懇辭湖南之行伏䝉聖恩未賜俞允仰惟詔令督遣之嚴俯念臣職驅馳之賤不敢更以家事為請自求便安惟是伏思見識迂疎思慮淺短中間被㫖相度經界不量事勢上誤朝廷負犯已深何以復堪一道耳目之寄輙已具狀申省自劾欲望鈞慈俯垂聽察特為敷奏收還成命重賜黜責使得退省前愆免罹後咎則熹不勝千萬幸甚辭免湖南運使狀三右熹今月二十日凖尚書省劄子以熹具狀自劾前任漳州相度經界不合妄乞施行上誤朝聽乞賜敷奏收還湖南轉運副使除命别行黜責奉聖㫖漳州經界議行已久湖南使節事不相關可依己降指揮疾速之任者自罹罪戾當伏重誅上賴皇慈曲加容覆不唯赦其萬死而又申以訓詞慰喻丁寧趣令之任葢雖慈父之於愛子其恩勤閔惻不過如此在熹一介疎遠疵賤何以堪之是以聞命拜恩至於感泣便欲即日就道祗服厥官以稱明詔而熹命窮福薄災病相挻舊苦脚氣今春發動腫痛寒熱倍於常年目今困重未能步履設使從今便得减瘥更加休養三數月間亦恐未堪上道曠日彌久既乖承命之恭而本司闕官已是數月恐亦不無廢務在熹愚分尤所未安欲望朝廷特賜敷奏令熹補滿舊任宫觀差遣庶幾得以深省前愆免罹後咎不勝幸甚謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙輸賤誠上瀆鈞聽熹昨以前任妄議經界罪戾自劾乞罷新除湖南將漕恩命伏䝉聖慈赦宥洗雪趣遣之官訓喻丁寧反復勤至疎賤小臣何以得此所宜即日引道以稱所䝉而脚氣發動異於常年曉夕呻吟不能履地委實不容起發前去竊慮久稽詔命仰觸雷霆之威已具狀申尚書省陳乞祠祿外區區愚悃欲望鈞慈憐閔早賜開陳得諧卑願以活餘年千萬幸甚冐昧威嚴俯伏竢罪辭免知静江府狀一右熹十二月十九日凖尚書省劄子奉聖㫖除知静江府熹聞命震驚竊自惟念孤賤寒遠碌碌無聞伏自聖主臨御于今累年又未嘗得羣下士仰望日月之光而聖恩龎鴻不間幽隱擢自閑散付以名藩在熹感激誠無以喻謹已即時望闕謝恩訖再念熹性本至愚學無所就自其少日己不如人矧今衰殘寧復有用又况静江守臣實兼帥司職事有數千里邊面軍民之寄舉措得失所係不輕自度無能决難冐處加以所患脚氣之疾作止不常春夏二時尤難將攝萬一前路發動却致稽留朝命在熹愚分尤所未安欲望朝廷特賜敷奏寢罷已降指揮令熹依舊宫觀實為大幸謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有危懇仰扣公朝熹伏凖省劄恭奉聖㫖除知静江府事區區感激葢不勝言顧以罪戾之餘疾病沉痼不堪任使而内自揆度迂疎悖謬又非邊帥之才實不敢冐當重寄以累君相知人之明輙具公狀申省辭免欲望某官特賜省覽曲為開陳許其遜避以安愚分熹冐瀆威尊不勝皇恐戰栗之至辭免知静江府狀二右熹正月二十三日凖正月七日尚書省劄子以熹辭免知静江府恩命正月六日奉聖㫖不許辭免依已降指揮疾速之任熹聞命震驚隕越無地竊伏思念罪戾孤蹤誤䝉收用命輕恩重感激難勝向使自量粗能供事豈敢輙有辭避以速刑誅實以材質凡庸識慮淺暗向來假守支郡非有繁難然猶不能審度時宜以致上誤朝聽雖幸曲䝉寛貸獲免譴訶然而内自省循未忘憂懼以故前年䝉恩將漕湖南尚且不敢拜受况今除授實專西南一面軍政邊防之寄責任至重非它帥比則熹又安敢冐受而不辭哉前狀所陳懇切詳盡不謂未䝉照察申命益嚴熹雖至愚亦豈不知微賤之臣分義有守不當再有煩瀆然反復以思區區所言非止自為身計實恐邊境事宜或有緩急全頼帥臣區處鎮壓而熹乖繆妄發又復如前必將有以仰貽國家南顧之憂者非細事也是敢昧死復有陳述至於憂悴蚤衰足疾時作目昏耳重心氣短乏凡此種種於熹私計有不便者則皆不敢言矣伏惟朝廷曲垂矜閔再為開陳收回誤恩俾還舊秩熹不勝祈懇激切俯伏俟命之至謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙布誠懇仰扣公朝熹昨具狀辭免知静江府恩命今凖省劄備奉聖㫖未賜允俞聞命憂懼莫知所措然區區愚慮猶有未能已者已再具狀申尚書省伏乞丞相少保國公參政相公詳賜省覽曲為開陳收回誤恩復畀祠祿千萬幸甚千萬幸甚小貼子愚慮終恐疎拙不足以當一面之寄或有緩急必誤使令欲望知院相公樞密同知相公深加照察曲為開陳收回誤恩以安愚分辭免知潭州狀一右熹十二月初十日凖尚書省劄子奉聖㫖差知潭州者伏念熹疎謬不材試郡無狀解罷之後方知循省所以中間兩䝉聖恩皆嘗力陳愚悃竟荷從欲尚叨祠祿以盡餘年不意今者又䝉記憐有此除授三年之間三被抆拭自惟何者有此叨踰假使衰病支離不堪扶曵亦當聞命奔走不敢復有辭避實以區區愚慮前已控陳而昨來已曾辭免知静江府又不能無辭遠就近之嫌在熹私義尤難冐處所有降到省劄内聖㫖指揮竊緣熹見遭大功之喪凖格未該除服未敢望闕謝恩已送建陽縣庫寄收訖欲望朝廷檢㑹前此兩番辭免申狀詳酌事理早賜開陳令熹仍舊補滿宫觀考任實為大幸謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有誠懇仰干朝聽熹幸䝉陶鑄備數祠官竊祿養痾方以愧幸忽䝉恩命假守長沙仰戴鴻私伏深感涕重念熹賦性迂闊處事乖疎昨試偏州已無善狀所以兩年之間再䝉除用力陳悃愊得遂退藏不意今來復此叨冐載循涯分實所未安又况昨來已辭遠戍於今未久復玷近藩擇地顧私人言可畏謹已具狀申尚書省乞賜敷奏寢罷欲望某官曲垂矜閔早賜開陳使得仍舊奉祠苟安田里則熹千萬幸甚冐犯威尊不勝戰栗辭免知潭州狀二熹昨䝉聖恩差知潭州即已具狀申乞補滿宫觀考任今凖尚書省劄子奉聖㫖不允依己降指揮疾速之任熹聞命震驚即已望闕謝恩訖伏念熹自惟災患日覺摧頽唯有疎頑略無悛改所以前此再辭誤恩皆荷天慈俯從人欲不謂今者尚閟俞音竊自省循决難黽勉是敢冐昧再有控陳欲望矜憐特賜敷奏曲從所請或畀偏州改命通才往奠南服則不惟衰晚無狀獲逃戒得之譏亦足使處置得宜益壯維藩之勢熹不勝鞠躬祈懇引領俟命之至與宰執劄子熹區區愚悃前屢控陳天聽未回日深恐懼今復有狀披告朝廷若䝉矜憐許歸祠館别咨時彦往布上恩則賢否公私各得其所而為幸大矣萬一未䝉體察必使復效驅馳亦乞别與陶鑄遠小州軍或充以次閑慢差遣則於私義雖或未免冐昧之譏而為湖南一道軍民之計猶為莫大之幸再干威重彌切戰兢伏惟髙明俯賜財幸乞放歸田里狀右熹叨被聖恩濫分民社兼領一道事任非輕顧嘗竊謂天下國家之所以長久安寧唯頼朝廷三綱五常之教有以建立修明於上然後守藩述職之臣有以禀承宣布於下所以内外相維小大順序雖有彊猾姦宄之人無所逞其志而為亂不然則以一介白面書生彊而置諸數千百里軍民之上彼亦何所慿恃而能服其衆哉熹雖至愚自知甚審而亦粗嘗竊窺古今治亂安危存亡之變矣誠恐朽鈍之餘不堪今日方面之寄兼以近者伏奉大行至尊壽皇聖帝遺誥攀號不逮迷悶隕絶自覺精力亦難支吾欲望朝廷特賜敷奏放歸田里速選民牧以濟多虞則不唯下保衰殘亦庶幾不至上誤國家建設藩屏之意熹不勝幸甚謹具狀申三省樞密院伏候鈞㫖辭免召命狀右熹凖七月十一日尚書省劄子奉聖㫖令熹赴行在奏事者聞命震懾不知所為謹已望闕祗受稱謝訖恭惟聖上受禪之初一新庶政寤寐俊傑協圖事功宜得超異之才以承付託之重而搜揚之失下及凡庸是葢不惟無益於時亦恐適足重取嗤誚况熹衰晚疾病摧殘方以不堪治劇為憂故敢輙以投閑為請又以未䝉開允未敢再干朝聽誠不自意誤恩猥及俯仰踧踖無所逃避若使區區之精神筋力稍堪勉强亦豈不願及此際會效其涓埃以卒平生愛君憂國畢義願忠之志顧實支離不堪扶曵政使得至殿庭亦恐顛沛失容增益罪戾是以不免控瀝肝膽冀䝉哀憐俾還香火之班以終螻蟻之命則熹不勝大幸今亦不敢仰稽朝命久留軍府已將職事牌印交割本路運判何異迤邐前路聽候指揮外謹具申尚書省欲望鈞慈特賜敷奏伏候鈞㫖與宰執劄子熹輙有誠懇仰干朝聽熹衰病迂疎不適世用䝉恩補郡并以一道軍民為寄到任未久已覺疲憊方恐仰孤任使輙敢便請退閑豈意非常之恩使得赴闕奏事熹雖至愚竊自揆度荒陋不學頑鄙無聞不惟無以仰禆嗣皇訪落之初政而目疼足腫不利進趨使造殿庭必致顛踣除已詳具曲折申尚書省一面起發前路聽候指揮外欲望某官察其悃愊曲賜矜憐特為敷陳俾諧私願則熹不勝幸甚干冐威嚴伏增震恐辭免煥章閣待制侍講奏狀一右臣昨任潭州日䝉恩令赴行在奏事方以迂疎疾病力具懇辭已歴兩旬未奉報可今者東歸道中忽被省劄誤䝉聖恩除臣煥章閣待制兼侍講者臣聞命震驚罔知所措恭惟國家設官分職以熈庶事其遷進之序選用之方雖甚細微莫不有法而况次對之官班通禁近其自内而除者猶有歲月之限在外而擢者必以勞效而陞從昔以來未嘗輕授至於經帷則又仰關帝學在今初政尤所當先必得醇儒使任其職然後有以發揮道要感格君心大明謹始之規以為出治之本尤不可以不遴其選也如臣疎賤久以病廢比叨試用又復罔功固已不堪超躐不次之除聞見甚淺記識不彊妄意本原亦未知要則又無以仰副招延自近之意在臣非敢自愛實恐不免冐昧之譏有累維新之政加以盲瞶跛躄不利走趨昨䝉收召之恩已伸辭避之懇所有今來恩命臣實不敢祗受欲望皇帝陛下察其悃愊特矜賜憐俯徇愚誠曲全素志則臣不勝千萬幸甚臣無任瞻天望聖激切祈懇之至謹錄奏聞伏候勅㫖與宰執劄子熹輙有私懇仰干公聽熹昨任潭州特䝉收召方以疾病迂疎力祈寢罷未奉報可忽被殊恩擢陞次對之聨俾司勸講之職除命超躐近比所無聞命震驚措身無所謹已具奏辭免外欲望某官察今所陳參以前狀即見區區懇避之實但使暫詣闕庭一修朝覲揣其分際猶所不堪况欲接武俊遊入侍經幄既冐叨踰之誚復深頓踣之虞在於鄙懐可勝慙懼敢乞特為敷奏速賜收還俾以舊官續食祠廪庶安愚分免累清朝熹不勝千萬幸願之至辭免煥章閣待制侍講奏狀二右臣昨具狀奏辭免新除煥章閣待制侍講恩命今到信州仍凖尚書省劄子奉聖㫖不允者愚𠂻已竭聰聽未回須至敷陳再干旒扆葢念臣迂闊無能分甘閑散雖自蚤年入仕而實歴釐務差遣僅及五任通計不滿九考前後伏䝉兩朝聖恩除授職名内自循省已為過分所有見帶秘閣修撰仍是紹熈二年八月祗受至今僅及三年其間即無絲髪勞效可錄資淺望輕既不足以汙侍從之選加以年齡晚莫學殖荒落目盲聽重步履艱難其於勸講經幄出入禁闥私竊自揆尤所不堪所以懇辭皆出情實即非飾詞備禮姑應故事而已不謂螻蟻之誠不足仰動天聽聞命踧踖恐懼益深又竊惟念皇帝陛下嗣位之初方將一新庶政所宜愛惜名器不可輕以假人若使僥倖之門一開其弊豈可復塞至於萬機之暇博延儒臣早夜孜孜專意講學葢將求所以深得親懽者為建極導民之本思所以大振朝綱者為防微慮遠之圖顧問之臣實資輔養用人或謬所係非輕并望聖明曲垂洞照亟還虚授以穆師言臣以昨辭召命已被疾速前來供職指揮今兹祈免詔除又奉不允之詔不敢更有留滯見己一面起離信州前路聽候處分仰冀聖慈早賜開允臣不勝千萬幸甚之至謹錄奏聞伏候勅㫖與宰執劄子熹輙控鄙誠仰干朝聽熹攝承帥閫方愧不堪誤辱聖恩特加收召辭免未獲又奉詔除亟拜遜章未䝉開允今再具奏冀得收還恩命區區誠懇悉已敷陳皆出實情即非偽飾如䝉降出切望某官早賜將上詳為開陳庶幾聖主無輕授之譏賤臣免非據之辱盡繄大造圖報敢忘干冐威嚴不勝恐懼辭免煥章閣待制侍講乞且帶元官職詣闕奏狀三右臣凖尚書省劄子以臣再狀辭免新除煥章閣待制侍講恩命九月十四日三省同奉聖㫖依已降指揮不允疾速前來供職者愚𠂻屢竭天聽未回祗誦恩言益增震悸伏念臣猥以凡品遭值昌辰龍德天飛萬物咸覩豈不願以此時進趨軒陛仰瞻穆穆之光况使執經入侍帷幄得以所學論説人主之前臣雖至愚亦豈不冀幸少有萬一可以仰裨聖聰特以次對異恩無故超受在臣私分實難自安是以徬徨未敢拜受今來復凖前項聖㫖雖已望闕遥謝聖恩即日起發前去外欲乞到日許臣且依七月十一日已降指揮帶元官職詣闕奏事所有新除却俟面奏辭免别聽處分冐瀆宸嚴臣不任惶懼隕越之至謹錄奏聞伏候勅㫖申省狀右熹凖尚書省劄子以熹再狀辭免新除煥章閣待制侍講恩命九月十四日三省同奉聖㫖依已降指揮不允疾速前來供職者伏念熹愚賤小臣屢煩嚴詔不敢再三辭避謹已即日起發前去欲乞到日許熹且依七月十一日元降指揮帶元官職詣闕奏事所有新除却俟面奏辭免别聽處分除已具狀奏聞外謹具申尚書省伏乞照㑹又申省狀右熹凖尚書省劄子以熹辭免新除待制侍講恩命奉聖㫖不允依已降指揮疾速前來供職者伏念熹昨以聖恩過厚私義未安三具懇辭自知拙訥不能仰動聖聽所以未敢必冀開允只乞許帶元官赴闕奏事面陳悃愊别聽處分今來已到國又凖前項指揮在熹猶有未盡之懐决然不敢冐昧祗受然又不敢再具奏牘頻煩天聽欲望朝廷特賜敷奏依熹前請庶幾早得趨赴行宫奏事瞻望日月之光則熹不勝幸甚謹具狀申尚書省伏候鈞㫖辭免待制侍講面奏劄子臣一介草野初乏寸長遭遇兩朝過加擢用不幸未能有以報效萬一而大行至尊壽皇聖帝奄棄萬國奉諱攀號欲死無路旋聞太上皇帝哀疚迫切亦厭萬機臣子之心尤極震懼所幸復得遭值皇帝陛下祗膺寳命正位當天臨御之初首加記憶召命既出除目隨頒稽以故常實為超躐自惟鄙拙重以衰殘義當力辭以安愚分顧以當仕有職不敢屢瀆天威冐昧以來唯冀仰望清光俯鑒愚欵今幸二事已遂所懐雖先犬馬退就溝壑亦無所恨唯是新除恩命累奏辭免未䝉開允在臣愚悃亦豈不願因此際㑹得以所聞一二仰賛大猷獨恨病衰足弱拜起艱難目左翳而右昏耳右聾而左重内自量度必至顛隮伏惟聖明必已洞照欲望矜憐特賜處分收還元降除命令臣姑守舊官賜以祠禄放歸田里待盡餘齡則臣不勝千萬大幸干冐宸嚴伏俟誅殛取進止辭免待制改作説書狀右熹昨具劄子面奏辭免新除煥章閣待制侍講恩命續凖尚書省劄子奉聖㫖依已降指揮不允日下供職者熹昨䝉誤恩輙加奬拔實以資淺不敢冐受愚誠屢控天聽未孚至於面有奏陳意謂必䝉矜許乃䝉恩㫖尚閟俞音祗拜以還不勝感激熹己仰體聖意不敢力辭講筵職事第以未得進説先受厚恩萬一異時未有報效而疾病發作不可支吾遂竊侍從職名而去則熹之愚死有餘罪欲望朝廷察其情實特為開陳與免待制職名改作説書差遣容熹即日拜命供職或勉强年歲之間少有補於聖主緝熈光明之學見諸行事之實發號施令罔有不臧然後隨衆霑恩熹亦不敢多遜古語有之事君者大言入則望大利小言入則望小利夫進言於君而望其利已非正理况今一言未入而遽受大利區區於此尤所未安然不敢數具奏狀上勞聖覽謹具狀申尚書省伏候鈞㫖與宰執劄子熹昨日面禀懇辭恩命意謂愚悃必䝉矜照今被省劄乃奉睿㫖未賜允俞誠意未孚深自咎責然念既䝉君相恩意之重如此今已不敢力辭講筵職事唯是職名太峻前已具陳庶官侍講亦無近比欲乞改正然後供職庶於愚分稍得自安熹有狀申省敷述義理已極詳盡欲望某官特為開陳不憚改命使熹千里而來早得進説上前不至遷延虚度時日亦區區千萬之幸頻有干瀆伏深恐懼謝御筆以次對係銜供職奏狀右臣十月初十日凖御前降到御筆一封付臣令臣勿復牢辭次對之職臣昨以新除恩命超躐異常累具辭免日望開允豈意仰勤聖主親御翰墨俯賜褒諭令勿牢辭疎賤小臣分不當得拜受伏讀不勝恐懼謹已仰遵聖訓係銜供職外謹具奏聞伏乞睿照回中使劄子云熹伏䝉轉到御筆一封已祗受訖今有奏狀一封稱謝得為進呈不勝幸甚辭免兼實錄院同修撰奏狀一右臣今月十四日凖尚書省劄子奉聖㫖差臣兼實錄院同脩撰者臣聞命震駭不知所為伏惟髙宗皇帝中興艱難實同創業成功盛德莫可形容信史所傳垂法萬世宜得鴻博之士執簡操筆其間庶幾將來有以考信如臣固陋才不逮人白首章句之間僅能略通訓詁入侍經幄已愧叨踰至於蒐輯舊聞勒成大典自知寡陋本非所長况復病衰心目俱廢豈能冐昧彊所不能塵穢簡編以取嗤誚在臣非敢自愛實懼仰貽聖朝之羞所有前件恩命臣决不敢祗受欲望聖慈洞鑒誠悃特賜追寢以安愚分謹錄奏聞伏候勅㫖辭免兼實錄院同修撰奏狀二右臣昨具狀辭免差兼實錄院同修撰恩命今凖尚書省劄子奉聖㫖不允者瀝懇控陳必期從欲聞命悚惕不知所言重念臣愚素無史學然於是非得失之故實有善善惡惡之心又况先臣在紹興初嘗掌兹事實事髙宗皇帝其於豐祐紹符之際分别邪正用力為多臣雖至愚敢忘斯志今獲叨冐復踐世官在臣私心豈非幸願但恨心力凋耗目翳耳昏記憶檢尋皆所不便復叨選擇備數經帷晝繹夜思猶懼不逮豈有餘力可效編摩所以懇辭即非備禮雖被譴却恐懼徒深義當固辭不容黙已儻䝉聖察特賜允從庶使妄庸獲安愚分臣無任祈天望聖千萬懇激之至謹錄奏聞伏候勅㫖謝御筆與宫觀奏狀右臣今月二十一日伏凖降到御筆賜臣朕憫卿耆艾方此隆冬恐難立講已除卿宫觀可知悉臣衰病餘年不知引退曲䝉聖造特賜矜憐臣無任感恩荷聖激切屏營之至謹具狀奏謝伏乞聖照乞放謝辭狀右熹今月二十一日伏凖御筆除熹宫觀已具奏稱謝訖緣熹脚氣發動有妨拜跪欲望朝廷特賜敷奏與免謝辭謹具狀申尚書省伏候指揮辭免寳文閣待制與郡狀右熹昨者恭奉御筆除熹宫觀續凖尚書省劄子奉聖㫖與放謝辭熹即已起發前路聽候指揮至二十五日晚又凖尚書省劄子奉聖㫖除熹寳文閣待制與州郡差遣熹聞命震驚罔知所措伏念熹戇拙有餘勸講無狀分當顯黜豈合優遷况耳重目昏累嘗面奏州郡繁劇尤所不堪所有恩命决難祗受欲望朝廷特賜敷奏令熹只以本官仍舊主管南京鴻慶宫庶協師言以安愚分謹具狀申尚書省伏候指揮辭免兩次除授待職名及知江陵府奏狀右臣昨奉手詔宣諭除臣宫觀繼凖省劄又䝉聖恩除臣寳文閣待制與州郡差遣臣以無名不敢冐受即具辭免又奉省劄恭奉聖㫖不允仍除臣知江陵府不候受告疾速之任者寳儲峻秩荆楚要藩委寄益隆視遠猶邇恩㫖之重捧戴難勝然臣伏念昨者皇帝陛下即位之初臣以愚賤疎遠之蹤首䝉眷知召置講席正以庶官無由入侍禁闥故特假以侍從職名臣於是時固已自料衰病迂闊勢必不能久奉清間故嘗再三懇辭乞以本官充職庶免後日别致紛紜不唯不䝉開允乃更曲荷天慈加賜手札俾速祗受此見陛下虚心求善屈己下賢之意近歲以來君臣之間所未有也而臣不佞適幸遭逄可謂千載一時之會私念若得因此罄竭凡陋裨補聰明是亦臣子之至願學問之初心因遂不敢力辭輙爾冐受供職四旬屢得進講凡所關啓多䝉開納而臣戅愚迫切便欲致君堯舜之上遂觸忌諱以煩譴訶皇慈過恩猶不加罪親御翰墨俾就退間旬日之間除書繼下蕩滌瑕垢曲全始終是亦近歲以來君臣之間所未有也臣雖至愚豈不知感所宜即日拜命奔走率職别圖後效以塞前愆而反復思惟前日之罪既以學力未充誠意不至無以仰稱明詔感悟天𠂻釁咎已深不容湔洗所有元借職名已是難復冐居豈敢更叨進擢之寵至於西門甲兵委寄尤重亦豈目盲耳聵之人所宜竊據以誤使令昨來雖略申陳然猶未盡底藴是致今復有此誤恩揣分量材决難祗受是敢瀝懇直貢封章欲望聖明俯垂鑒察正其瘝曠之罪追還新舊職名俾以寄祿元官復奉鴻慶故宫列聖香火庶幾慿恃威靈涵濡德澤未填溝壑之間猶及親見陛下聖學日新聖德日茂盡送往事居之孝極用賢納諫之誠永御丕圖為宋令主則臣雖即死無復遺憾干試雷霆眷戀軒幄無任皇恐激切之至謹錄奏聞伏候勅㫖貼黄臣伏覩元祐初特起河南處士程頥以為通直郎崇政殿説書後以人言罷守本官權同主管西京國子監頥上奏乞歸田里其間有云若臣元是朝官朝廷用為説書雖罷説書却以朝官去乃其分也臣本無官只因説書授以朝官既罷説書獨取朝官而去極無義理臣今實以侍講之故得此待制職名既罷侍講即所授職名理合追奪與頥所陳事理實無以異伏望聖慈鑒察許臣辭免不勝至幸申省狀右熹昨具狀申乞辭免進職與郡恩命今凖尚書省劄子奉聖㫖不允仍除熹知江陵府不候受告疾速之任者伏念熹無所能似元係庶官只因聖主欲令進講遂除侍從職名今既奉職無狀莫補豪分尚䝉寛恩假以秩祿即於私分已為過優先來所授侍從職名自不當得况又寵加峻秩俾殿大藩尤非罪戾殘廢之人所能負荷已具奏聞乞賜追還新舊職名只以本官還奉鴻慶香火其間叙述義理詳明如䝉降出欲望朝廷早賜敷奏特從所請千萬幸甚謹具狀申尚書省伏候指揮與宰執劄子熹昨被寛恩奉祠去國自疑罪戾不獲躬詣大府靣禀辭行下懐至今不勝悵仰兹者乃復叨被除書進職寳儲作牧荆楚在熹無狀失職負痾實無心顔可備驅使謹已具奏申省皆極詳明不敢逐一覼縷以勤聽覽欲望鈞慈察其悃愊特與將上力賜開陳使區區賤迹得以自安實衰朽迂愚千萬之幸干冐威尊不勝震悚乞追還煥章閣待制奏狀二右臣昨具狀奏辭免新除寳文閣待制知江陵府恩命并乞追還昨來任侍講日所帶煥章閣待制職名今凖尚書省牒奉勅宜差提舉南京鴻慶宫臣己於今月十一日望闕謝恩祗受訖得辭閫寄還備祠宫仰荷天慈俯從人欲恩深莫報感極難言然而尚有待制職名未䝉鐫削區區愚悃須至重陳伏念臣本是庶官無它勞效元帶袐閣修撰已是兩朝過恩比者只緣聖意欲亦令講書遂使暫陪邇列臣亦自知衰病迂闊决難久冐寵榮故於聞命之初即嘗瀝懇具奏乞免進職改授説書不謂鄙誠未能上達更煩親札褒諭益勤遂爾冐居未及兩月果以罪戾遣罷而歸所被誤恩理宜追奪而一再陳懇竟未矜從仰戴皇慈豈勝感激顧以愚分實有未安敢觸天威復此祈扣伏望聖明洞照早賜收還或令依舊論撰職名改作主管宫觀差遣則在朝廷黜陟之典免紊彛章而於微臣進退之宜亦全私誼謹錄奏聞伏候勅㫖貼黄臣今雖已拜命繫衘然尚未敢幇勘請給恭俟報可伏乞聖照申省狀右熹昨具狀申奏辭免進職補郡恩命及乞追還先來任侍講日所帶待制職名近凖勅命特授前件宫觀差遣熹已即時望闕拜受訖唯是所乞追還職名未奉允俞理難冐據恐懼益深除己再具奏聞外欲望朝廷更賜敷奏特從所請以安愚分則熹不勝千萬幸甚謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有誠懇再冐威嚴熹昨具申奏辭免進職補郡恩命已荷開允改授祠官尚有所乞收還待制職名未䝉施行熹已具奏及申朝廷再有祈懇欲望某官深賜照察特為開陳俾遂所祈以安愚分則熹不勝千萬幸甚乞追還待制職名奏狀三右臣三月三日凖尚書省劄子以臣再奏乞追還煥章閣待制職名奉聖㫖不允臣已即時望闕遙謝聖恩訖但念臣之所請實出丹𠂻天聽太髙未賜開允迫以私義决難冐居敢復控陳必冀省察葢臣竊以西廂待對名列近臣班序既崇恩禮尤渥葢國家所以寵待儒學議論之賢欲其雖或守藩奉祠於外而猶有論思獻納之責不異朝夕陪侍於禁闥之下出入乎周衛之間也臣之凡愚素號山野入侍經幄僅及四旬意見闊疎言辭鄙拙固已自知不堪選用之意惟有中間輙議僖祖皇帝皇家始祖不當一旦并行祧毁且使太廟之祀止及八世降於天子九廟之禮尤非所宜獨䝉聖恩特賜宣問親奉玉音以謂僖祖之廟自不當遷至於再三即以所進議狀并劄子並行降出竊意已䝉嘉納必遂施行不謂孤論難持竟亦無取退伏循省益愧心顔尚借寵榮許仍舊職非但有乖輿論亦恐上累清朝控避莫回周章失據敢冐萬死再犯天威欲望聖明察臣誠悃縱未重加貶黜亦合收還誤恩庶使孤蹤獲逃後咎臣無任祈天望聖皇恐俟罪之至謹錄奏聞伏候勅㫖申省狀右熹三月三日凖尚書省劄子以熹奏乞收還待制職名奉聖㫖不允者愚誠既竭聰聽未回私義未安不容寢黙重以向來曾有妄議太廟初室不合遷毁已䝉聖主宣問嘉納而朝廷不為施行竊疑其間所陳必是有違典禮自知不學無術難以復厠近班謹已再具奏聞欲望朝廷特為將上早賜行遣以為臣子孤陋寡聞輕議大典之戒熹不勝幸甚謹具狀申尚書省伏候鈞㫖與宰執劄子熹昨具狀奏乞賜收還元降待制恩命未䝉開允私義未安不容寢黙重以向來曾有妄議太廟初室不合遷毁已䝉聖主宣問嘉納而朝廷不為施行竊疑其間所陳必是有違典禮自知不學無術難以復厠近班謹已再具奏聞并具狀申朝廷矣欲望鈞慈特為將上早賜行遣以為臣子孤陋寡聞輕議大典之戒熹不勝幸甚干冐威尊皇恐俟罪申省狀右熹伏凖尚書省降到劄子一道以熹辭免煥章閣待制職名奉聖㫖不允緣熹目今脚氣發作手足拘攣不堪拜起謝恩不得已送建寧府建陽縣寄收候痊安日請領别具申奏次謹先具狀申尚書省伏乞照會申建寧府乞保明致仕狀右熹舊患脚氣近數發動日加困重不可支吾欲乞守本宫致仕謹具狀申建寧府伏乞照會依條施行乞追還待制職名及守本官致仕奏狀四右臣昨具狀奏乞賜追還待制職名三月二十八日凖尚書省劄子伏奉聖㫖次對之職除授已久與廟議初不相關依已降指揮不允不得再有陳請臣以見患脚氣有妨拜跪不得謝恩祗受遂將所被省劄權送建陽縣庫寄收仍申尚書省照會去訖後來不意病勢危篤自知難戀聖朝依例合乞致仕又念見係庶官不敢專具奏牘遂申本貫依條陳乞今來復凖省劄恭奉聖㫖未賜開允戴恩重疊恐懼難勝揣分捫心但知感激唯是區區本以鄉來入侍日淺自知未有毫髪報稱不當仍帶舊職出領祠官所以懇避再三即非過為沽激况今疾病沉痼雖未即死精華已竭後效無期更竊寵榮義益難處兼覩近日從臣有自西掖出守大藩者猶自止帶修撰况臣罪戾方此投閒而所得職名過為優厚以此較彼誠有未安是敢不避煩瀆之誅復陳迫切之悃欲望皇明委照聖度并容深察愚𠂻㕘稽近比特降睿㫖俾遂所祈則臣不勝千萬大幸所有昨來陳乞致仕實緣病勢危迫方敢冐昧今雖苟延殘息終是不堪異日使令不敢更叨廪祿以速滿盈之咎亦望矜憐并賜俞允使就窮約庶保餘年臣無任祈天望聖俯伏俟命之至謹錄奏聞伏候勅㫖貼黄臣今者伏䝉吏部闕告命磨勘轉官臣即已謝恩祗受可見愚𠂻非敢飾詞妄為遜避伏乞聖照申省狀右熹累具申奏乞罷所帶職名及於建寧府陳乞保明致仕今凖尚書省劄子各奉聖㫖未賜開允熹以私義難安不能自已不免復申前請别具奏陳如䝉降出欲望朝廷特賜將上俯從所請早賜施行不勝幸甚謹具狀尚書省伏候鈞㫖與宰執劄子熹輙有危懇仰干鈞聽熹昨以入侍日淺無補豪分既領侍官不當復帶舊職累奏乞行追奪未䝉開允近者復以疾病危篤陳乞致仕又䝉聖恩未從所請伏念熹前後所乞皆出誠心非敢詭衆飾辭過為矯激未能感格深不自安不免再露血誠復干天聽其間陳叙曲折援引比例極為詳盡若䝉降出欲望朝廷深察情悃力賜開陳使孤危之迹早遂退藏免以罪戾姓名愚昧識見數干旒扆久紊彛章招致人言重煩譴斥則熹不勝千萬大幸情迫意切言語無倫伏惟鈞慈并賜容照乞追還待制職名并自劾不合妄議永阜􅓖陵事奏狀五右臣昨累具奏乞免帶待制職名仍以病衰再乞致仕伏䝉垂慈特降睿㫖辭職謝事非朕優賢之意不得再有陳請臣即已望闕拜命恭謝聖恩訖自惟愚賤誤被睿知陳力無堪輙求閑退更䝉寵渥申諭隆私假以優賢之名却其再至之請顧臣何者可稱衮褒感激之深無言以諭所乞致仕謹已恭禀聖訓未敢再溷宸聰所辭職名亦已仰體睿慈不敢再祈避免然伏自念去歲叨冐獲厠周行曾因集議永阜􅓖宫妄意輒陳管見欲乞少寛遠日改卜神阜庶妥威靈以延運祚後雖罷議無所施行然在私心豈容自昧今者伏覩進奏院報前日小大之臣曾議此者皆已坐罪次第降黜而臣狂妄又嘗面奏其跡尤不可揜其罪尤不可赦但以所入文字不曾付外是致漏網未抵譴訶若遂隱匿不言更冐榮寵竊慮祗受之後公論不容未及終朝便煩褫奪顧微臣進退之義雖不足言而聖朝刑賞之中則為可惜以此之故反復思惟復致憂疑未敢拜受輙冐斧鉞自劾以聞伏望聖明奮發威斷付之司敗以肅邦刑庶免煩言重勞淵聽臣無任祈天俟罪踧踖屏營之至謹錄奏聞伏候勅㫖申省狀右熹昨具申奏乞免帶待制職名仍以病衰再乞致仕今來伏凖尚書省劄子奉聖㫖辭職謝事非朕優賢之意不得再有陳請熹已望闕謝恩恭禀聖訓未敢再乞致仕以煩朝聽所有職名仰體聖恩本亦不敢更具辭免却緣去年集議永阜􅓖宫葢嘗妄陳管見欲乞少緩發引之期别擇寧神之地今者竊見前日臣僚有曾論此者皆已坐罪次第行遣而熹無狀乃獨幸免區區愚慮實不自安若使祗受聖恩復忝近列竊料非久即致迷誤朝廷紊亂刑賞愚賤之迹獲罪愈深謹已具奏自劾恭俟嚴誅如䝉降出乞賜將上取㫖特賜處分則熹不勝千萬幸甚謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有愚悃仰干公聽熹昨者累奏辭免職名再奏陳乞致仕近凖省劄批降睿㫖示以優賢之意杜其再至之請恩指隆厚假借超踰熹雖至愚豈不知感告老之牘未敢重陳除職之恩亦擬拜受但以頃扵􅓖陵嘗有妄議今見前後同為此説者皆已坐罪行遣而熹獨漏網更冐寵榮竊料公論終不見容異日决難幸免萬一拜命之後即致煩言則不唯使聖朝失刑賞之中而區區賤迹亦乖進退之義俯仰踧踖無地自容謹已具奏自劾及申朝廷去訖欲望某官曲加憐念特賜開陳照例施行庶惬輿議熹不勝千萬祈懇之至乞追還待制職名奏狀六臣昨具奏自劾擅議山陵陳乞免帶舊職今者伏凖尚書省劄子恭奉聖㫖朱熹自劾無罪可待餘依已降指揮者頻瀆天威久須嚴譴復䝉寛宥感極涕零伏念臣自去歲誤䝉聖恩擢寘近列使侍講筵即以迂疎寡陋資淺望輕懇辭四五而不獲命遂已不敢復辭講職只慮所帶職名大為超躐今若冐受則將來或有罷免却須回納又致紛紜遂具狀申省乞賜敷奏令臣且以元官舊職改充説書其所陳説極為詳備尋以宸翰下臨不容固避然而口與心誓所有職名只是暫受權帶以為入從之階異時若罷講官此職决當回納庶以少贖今日不能力辭之罪其後果以老病怯寒不能立講曲䝉矜憫重賜親筆除臣宫觀既已拜命又被恩㫖進職與郡則臣不敢當而亟如向來私誓之言具奏辭免雖幸追寢後命而猶未鐫舊職自是之後凡四具奏力申前懇率皆不䝉開允葢臣本意止為已罷講官不敢復帶侍從職名而於其間三次奏狀乃因它事忘其前語此其所以屢瀆聖聰而曾不足以少回天意者也於今始覺前日之繆不敢再有它説輙冐萬死復此祈恩伏惟聖明洞鑒誠悃特降睿㫖照臣去年申省及後來第一第二次辭免奏狀早賜施行使臣得以本官仍奉香火屏伏田畝以終餘年則臣不勝千萬大幸干冐宸嚴無任祈天俟命激切屏營之至伏候勅㫖貼黄臣聞或者謂臣去歲初除之日已受疏封錫服之寵該遇饗恩又叨封贈䕃補之澤其後又承吏部取㑹磨勘得轉一官皆為已受侍從恩數之實今扵職名乃欲回避不無作偽之嫌臣味其言極為有理實於彼時思慮不及致此冐昧追悔無由今又不敢輙乞回納伏望聖慈并賜處分討論改正臣不勝幸甚乞改正已受過從官恩數狀右熹昨具狀奏乞免待制職名已䝉聖恩特賜開允仍舊充袐閣修撰提舉南京鴻慶宫已於今月六日望闕祗受及奉表稱謝訖竊緣元奏内有貼黄稱於昨來已冐疏封錫服之寵封贈䕃補之澤及用檢舉磨勘轉官皆為已受從官恩數乞賜處分討論改正今來未奉進止在熹私義實所未安然又不敢頻具封章上瀆天聽只乞朝廷更賜矜憐特為敷奏申勅攸司將熹所陳五項事理檢照條例逐一討論悉行改正庶安愚分免紊彛章則熹不勝大願謹具狀申尚書省伏候鈞㫖與宰執劄子熹復有誠懇敢瀆公聽熹昨來辭免近職已荷聖恩特從所請不勝幸甚但元奏貼黄内所陳疏封錫服磨勘封贈䕃補五項欲乞并行改正未䝉施行在熹愚計深不自安今來不敢别具奏牘輙具公狀申尚書省欲乞將上取㫖特降處分則熹不勝千萬幸甚申建寧府乞保明致仕狀熹年滿七十疾病衰殘尚忝階官義當納祿伏緣見係謫籍不敢冐貢封章乞依條備錄申奏令熹守本官致仕庶得偷安田里以盡餘年伏候台㫖與宰執劄子熹輙有私懇仰干公聽熹伏為今歲年滿七十疾病衰殘尚忝階官義當納祿又以見係謫籍不敢冐貢封章遂經本貫建寧府具狀陳乞本府以熹罪戾不敢依條保奏已為備錄申尚書省去訖欲望鈞慈矜念特與敷奏令熹守本官致仕庶得偷安故里待盡餘年則熹不勝千萬幸甚冐瀆威嚴伏深戰栗乞致仕狀右熹昨為年滿七十疾病衰殘尚忝階官義當納祿又以見係謫籍不敢冐貢封章遂經本貫建寧府具狀陳乞本府以熹罪戾不敢依條保奏己為備錄申尚書省去訖近者忽覩臣僚論列士大夫老不知退之弊已得聖㫖播告施行因伏自念雖幸日前已嘗有請然今累月未聞可報竊慮本府所申在路或有遺失致熹寸誠不能上達且將重得違戾聖制干犯名教之罪反復思惟不勝恐懼不免冐昧驀越披訴欲望朝廷矜憐特賜敷奏依熹所乞令守本官致仕庶安賤迹以盡餘年免以孤愚再犯吏議則熹不勝千萬幸甚謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有私懇仰干公聽熹昨以年滿七十疾病衰殘尚忝階官義當納祿又以見係謫籍不敢冐貢封章遂經本貫建寧府具狀陳乞本府以熹罪戾不敢依條保奏己為備錄申尚書省去訖今來日久未奉進止又聞臣僚建議申嚴致仕條限已得聖㫖播告施行竊慮元狀稽留遺墜使熹重得違戾聖制干犯名教之罪不勝憂懼不免再具公狀徑申朝廷欲望鈞慈矜念特與敷奏令熹守本官致仕庶得偷安故里待盡餘年免以孤蹤再煩吏議與宰執劄子熹輙有危懇再干崇聽熹草野微命罪戾孤蹤始生之年號紀建炎歲在庚戌應舉入仕脚色分明推移至今適滿七十足歲考之禮經合乞致仕顧念名在謫籍深慮不合自陳因竊詢考條貫乃知元無妨礙遂於去冬預懇州郡投納公狀乞作今年正月開假之日備錄申奏而閭里横議官吏過疑咸謂負罪之人無仕可致不當冐昧自求優逸遷延稽故不為依條保奏至二月半間方得申尚書省狀一紙又以私家貧乏無力遣人至三月初方得附發前去尋覩邸報知有臺臣章疏申嚴休致舊法已得指揮播告施行方幸所請前已控陳私歲官年元無增减然而引頸俟命今已五旬却方探問得此狀三月末間尚未申到竊慮在路稽違或是别有沉匿致使微誠無路上達則於元犯姦惡大罪之外且將更取違戾聖制干犯名教之誅枯朽之餘豈堪摧拉謹已具狀徑申朝廷及具公劄申禀去訖恐此瑣末無由上徹鈞聽故敢復此縷縷敷陳冐犯威嚴伏祈鑒照與宰執劄子熹竊以孟夏漸熱伏惟某官廊廟尊嚴政幾暇豫神人依頼鈞候起居萬福熹罪戾孤蹤名在謫籍化鈞無外得以偷安區區鄙懐豈不知感兹緣年及禮合告休又管某官特為開陳即賜俞允所以上昭聖明優老念舊洗垢匿瑕之美意下使衰朽捐棄之人得託退休之號除廢錮之籍而少慰其出身事主一世勤苦之夙心則其為賜也大矣其為勸也廣矣然猶非為熹一人設也至於加賜鈞翰封示勅書且復垂諭所以委曲保全之意則又仰見洪鈞大化之中克勤小物之慮至深至遠而熹獨幸得被此賜之為安且吉也感激之私言有不能喻者禮當修具公啓畧布萬一而聖制有嚴不敢干紊謹具短劄少見下情伏惟鈞慈特垂照察黄閤在望趨拜無期切乞順時之宜從民之望益保崇重以永太平之基熹下情不勝瞻望拳拳之祝考異乞追還待制職名奏狀三議論之賢議一作講晦庵集巻二十三欽定四庫全書晦庵集卷二十四宋朱子撰書時事出處
