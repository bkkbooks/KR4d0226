body:
  text: 記徽州休寧縣㕔新安道院記休寧大夫信安祝侯汝玉以書来曰休寧之為邑雖有難治之名而吾之為之已再嵗矣始也不能不以人言為慮中乃意其不然而今則遂有以信其果不然也盖其封域實鄣山之左麓而浙江出焉山峭厲而水清激故稟其氣食其土以有生者其情性習尚不能不過剛而喜鬭然而君子則務以其剛為髙行竒節而尤以不義為羞故其俗難以力服而易以理勝茍吾之所為者出於公論之所是則雖或拂於其私而卒不敢以為非也以是吾之始至盖不能無不悦者而今則驩然無與為異吾嘗困於事之不勝其繁而今則廓然無事之可為也吾將更葺㕔事之東㕘採賓佐属詠之什而榜之以新安道院子能為我記之則後之君子益知所以為治而無吾始者之慮矣予惟汝玉之為此可以見其政之成民之服而官曹之無事矣然道之得名正以人所共由之路而非無事之謂也夫以汝玉之始至坐于堂皇之上則左簿書右法律日夜苦心勞力而不得休其或少暇則又不免衝寒風冒烈日以出入乎阡陌之中而不敢怠凡所以勸民之善而懲其惡興民之利而除其害者非有道以行之則何以致今日之無事哉顧其名此乃若専取乎今日之無事而反序前日之厪事為非道其無乃出於老子浮屠之謂而汝玉未之思耶抑嘗計之天下之事雖有動静勞逸之殊而所謂道者則無彼此精粗之間汝玉之學固有以知此矣彼其所以喜於政成之無事而不避異學之淫名豈非朝夕之間猶欲從容於此以深思前日之己行而益求其所未至而卒以究夫無彼此精粗之間者而大發於功名事業之間乎予故邦人且汝玉予舊也樂其意為書本末以示来者使於此邦之俗賢宰之志尚有考云淳熙戊申八月甲申朱熹記玉山劉氏義學記始予守南康鄰境徳安有宰焉為政一本儒術甚以恵愛得其民嵗饑為請蠲租而州家不可顧民狼顧相驚有逃去者則亟使人追止之曰所不為若等力請於州必蠲十七者令寧委印綬去終不忍使若等為異鄉鬼也民聞是令下為之感泣復相與攜持而歸衆乃具以情白州若部刺史竟得如約乃已予聞而竊心善之而問其邑里姓名則曰玉山劉侯也南康屬邑有越徳安而縣屬者每遣掾吏循行則必戒使謁劉侯觀其荒政所施以為法於是劉侯之恵不止行其封内而又波及南康之境竟食新民得無流亡殍死者及予將終更乃得納謁劉侯之館而拜賜焉則望其貌聴其言而有以信其為君子人也後數嵗予以事過玉山則劉侯以待次家居復得相見如平生懽一日慨然語予曰吾家本單貧而入仕又甚晩顧無以仁其三族者間嘗割田立屋聘知名之士以教族子弟而鄉人之願學者亦許造焉兄弟之間有樂以其貲来助者而吾猶懼其或不繼也則又出新安餘俸為之發舉居積以佐其費而凡所以完葺丘壟周恤族姻者亦取具焉既已言於吾州而邦君吴侯樂聞之為之出教刻符以詔吾之子孫使毋違吾志吾子雅知我其為我記之以告其斆且學於此者使知有以勉焉予聞而歎曰今士大夫或徒步至三公然一日得志則髙臺深池撞鐘舞女所以自樂其身者唯恐日之不足雖廩有餘粟府有餘錢能毋為州里災害則足矣固未暇以及人也如劉侯者身雖寵而官未登六品家雖温而産未能千金顧其所以用心者乃如此是則可謂賢逺於人而亦可以見其前日徳安之政不為無本而豈徒以聲音笑貌為之矣乃追本其事而記之如此雖然古人之所謂學者豈讀書為文以干禄利而求温飽之云哉亦曰明理以修身使其推之可以及夫天下國家而已矣羣居于此者試以此意求諸六經孔孟之言而深思力行之庶其有以不負劉侯之教也劉侯名允迪字徳華今以朝奉郎㕘議㳂海制置使軍事云淳熙十有五年秋九月己未新安朱熹記漳州守臣題名記漳以下州領軍事唐垂拱二年用左玉鈐衞翊府左郎將陳元光奏置領漳浦懐恩二縣而治漳浦開元四年徙治李澳川在舊治南八十里二十九年廢懐恩入漳浦而割泉州龍溪縣来属天寳元年改漳浦郡乾元二年復為州大厯十二年又割汀州龍巖来属正元元年乃更徙治龍溪唐末五季之亂常為泉州支郡而偽刺史董思安者至以私諱輒改號為南州我宋乾徳四年泉州陳洪進以二州版圖歸王府始詔復故號太平興國三年五月一日洪進入朝請吏遂以衞尉寺丞劉援来知州事而五年又割泉之長泰縣以属焉盖凡漳之所以為州其本末之可考者如此其守將則陳公沒而為神今以王封廟食後乃或見或否以至于劉侯而後始有紀焉盖其㕔壁之記本嘉祐中鄭侯偕之所立逮淳熙中火而復刻則又趙侯公綢之為也紹熙元年假守朱熹至而觀焉則其木理往往龜裂且其所書又太煩悉而將無地之可書也乃為買石延平礱置聴事更為擘窠省文之法以寫舊記而虛其左方以俟来者云徳安府應城縣上蔡謝先生祠記應城縣學上蔡謝公先生之祠今縣令建安劉炳之所為也先生名良佐字顯道學於河南程夫子兄弟之門初頗以該洽自多講貫之間旁引傳記至或終篇成誦夫子笑曰子可謂玩物喪志矣先生聞之爽然自失面熱汗下若無所容乃盡弃其所學而學焉然其為人英果明決强力不倦克己復禮日有程課夫子蓋嘗許其有切問近思之功所著論語説及門人所記遺語皆行於世如以生意論仁以實理論誠以常惺論敬以求是論窮理其命理皆精當而直指窮理居敬為入徳之門則於夫子教人之法又最為得其綱領建中靖國中詔對不合得官書局後復轉徙州縣沈淪卑冗以沒其身而處之浩然未嘗少挫中間嘗宰是邑南陽胡文定公以典學使者行部過之不敢問以職事顧因紹介請以弟子禮見入門見吏卒植立庭中如土木偶人肅然起敬遂稟學焉其同時及門之士亦皆稱其言論閎肆善啓發人今讀其書尚可想見也然先生之沒㳺公定夫先生實識其墓而喪亂之餘兩家文字皆不可見應城㓂暴尤劇莽為丘墟其條教設施固無復有傳者劉君之来訪其遺跡僅得題詠留刻數十字而已為之慨然永歎以為先生之遺烈不建於此邦後之君子不得不任其責於是既新其學乃即講堂之東偏設位而祠焉千里致書求文以記熹自少時妄意為學即賴先生之言以發其趣而平生行事又皆髙邁卓絶使人興起衰病零落凜然常懼其一旦泯滅而無傳也劉君之請乃適有㑹於予心者於是不辭而記之如此以示其學者云紹熙辛亥冬十月丙子朔旦新安朱熹記壯節亭記淳熙己亥嵗予假守南康始至訪求先賢遺跡得故尚書屯田外郎劉公凝之之墓於城西門外草棘中予惟劉公清名髙節著於當時而聞於後世暫而挹其餘風者猶足以激懦而律貪顧今不幸饋奠無主而其丘墓之寄於此邦者又如此是亦長民者之責也乃為作小亭於其前立門牆謹扃鑰以限樵牧嵗以中春率羣吏諸生而祠焉郡之詩人史驌請用歐陽公語名其亭以壯節適有㑹於予意因属友人黄銖大書以掲焉自是以来東西行而過者莫不顧瞻起敬而予亦自以為兹丘之固且安可以久而不壊矣紹熙三年嵗在辛亥予去郡甫十年而今太守章貢曽侯寔来按圖以索其故則門牆亭牓皆已無復存者為之喟然太息即日更作門牆築亭其間益為髙厚宏闊以支永久又礲巨石以培其封植名木以廣其籟求得舊牓復置亭上嵗時奉祀一如舊章且割公田十畆以畀旁近能仁僧舍使専奉守為増葺費而又以予為嘗經始於此也以書来曰願得一言以記之使後之人知吾二人者所為拳拳之意而不懈其尊賢尚徳之心也斯不亦有補於世教之萬分乎予曰諾哉曽侯名集字致虚學有家法故其為政知所先後如此云三年夏五月癸未新安朱熹記冰玉堂記南康使君曽侯致虛既修葺屯田劉公之墓明年乃訪得其故居遺址於郡治之東暇日屏騶馭披荆棘而往觀焉問其北隠然以髙者則劉公所賦之東臺也顧其南窊然以下者則詩序所指之蓮池也盖自兵亂以来蕪廢日久唯是僅存而其他則皆漫滅不可復識矣曽侯為之躊蹰四顧喟然而嘆曰凝之之為父道原之為子其髙懐勁節有如歐馬蘇黄諸公之所道是亦可謂一世之人豪矣想其平日之居此林塘館宇之邃詩書圖史之盛既有以自適其適而一時逰且官於此邦者亦得以扣門避席而考徳問業焉何其盛也顧今百年之外臺傾沼平鞠為灌莽而使樵兒牧子皆得以嘯歌躑躅於其上又何其可悲也雖然此吾事也不可以不勉乃出少府羨錢贖之民間垣而溝之以合於郡圃纍石以崇其臺引流以深其池遂作冰玉之堂於臺之西北而繪劉公父子之象於其上且聞陳忠肅公之嘗館於是也則又繪其象以侑焉既而所謂是是堂漫浪閣者亦以次舉而皆復其舊既成使人以圖及書来属予記予惟異時承乏此邦亦嘗有意於斯而不克就今披圖考驗尚能憶其彷彿固喜曽侯之敏於事而能有成矣抑予又有感焉近嵗以来人心不正行身者以同流合汙為至行任事者以便私適已為長䇿其聞劉氏父子之風不唾而罵之者㡬希矣欲其能如曽侯一以表賢善俗為心而不奪於世習豈可得哉於是既書其事而適有以陳令舉騎牛詩畫為寄者因并以遺曽侯請刻堂上以補一時故事之缺云紹熙三年秋九月庚午朔旦新安朱熹記黄州州學二程先生祠記齊安在江淮間最為窮僻而國朝以来名卿賢大夫多辱居之如王翰林韓忠獻公蘇文忠公邦人至今樂稱而於蘇氏尤致詳焉至於河南兩程夫子則亦生於此邦而未有能道之者何哉盖王公之文章韓公之勲業皆以震耀於一時而其議論氣節卓犖竒偉尤足以驚動世俗之耳目則又皆莫若蘇公之為盛也若程夫子則其事業湮鬱既不得以表於當年文詞平淡又不足以夸於後世獨其道學之妙有不可誣者而又非知徳者莫能知之此其遺跡所以不能無顯晦之殊亦其理勢之宜然也盖天聖中洛人太中大夫程公珦初任為黄陂尉秩滿不能去而遂家焉實以明道元年壬申生子曰顥字伯淳又以明年癸酉生子曰頤字正叔其後十有餘年當慶厯丙戌丁亥之間攝貳南安乃得獄掾舂陵周公惇頤而與之㳺於是二子因受學焉而慨然始有求道之志既乃得夫孔孟以来不傳之緒於遺經遂以其學為諸儒倡則今所謂明道先生伊川先生是也先生之學以大學論語中庸孟子為標指而達于六經使人讀書窮理以誠其意正其心修其身而自家而國以及於天下其道坦而明其説簡而通其行端而實是盖將有以振百代之沈迷而内之聖賢之域其視一時之事業詞章論議氣節所繫孰為輕重所施孰為短長當有能辨之者而世非徒不之好也甚者乃或目以道學之邪氣而必謭蔑之於斯時也茍無遭其伐木而削跡焉斯已幸矣尚何望於其餘哉今太守李府君侯乃能原念本始追誦遺烈立二夫子之祀於學宫於以風厲其人而作興之非其自信之篤而不以世俗之趨舍動其心其孰能與於此李侯名訦字誠之其為此邦勤事愛民固多可紀特於此舉尤足以見其趣操之不凡而非衆人所能及是以因其請記而具論之以告来者使有考焉紹熙三年秋九月戊子後學新安朱熹記邵武軍光澤縣社倉記光澤縣社倉者縣大夫毗陵張侯訢之所為也光澤於邵武諸邑最小而僻自張侯之始至則已病夫市里之間民無盖蔵每及春夏之交則常糴貴而食艱也又病夫中下之家當産子者力不能舉而至或棄殺之也又病夫行旅之涉吾境者一有疾病則無所於歸而或死於道路也方以其事就邑之隠君子李君吕而謀焉適㑹連帥趙公亦下崇安建陽社倉之法於属縣於是張侯乃與李君議略放其意作為此倉而節縮經營得他用之餘則市米千二百斛以充入之夏則損價而糶以平市估冬則増價而糴以備来嵗又買民田若干畆籍僧田民田當沒入者若干畆嵗收米合三百斛并入于倉以助民之舉子者如帥司法既又附倉列屋四楹以待道塗之疾病者使皆有以棲託食飲而無暴露迫逐之苦盖其創立規模提挈綱領皆張侯之功而其條畫精明綜理纎密者則李君之力也邑人既䝉其利而歌舞之部使者亦聞其事而加勸奨焉於是張侯樂其志之有成而思有以告来者使勿壊則以書来請記予讀古人之書觀古人之政其所以施於鰥寡孤獨困窮無告之人者至詳悉矣去古既逺法令徒設而莫與行之則為吏者賦斂誅求之外亦飽食而嬉耳何暇此之問哉若張侯者自其先君子而學於安定先生之門則已悼古道之不行而抱遺經以痛哭矣及其聞孫遂傳素業以施有政宜其志慮之及此而能委心求助以底于有成也李君於予盖有講學之舊予每竊歎其負經事綜物之才以老而無所遇也今乃特因張侯之舉而得以粗見其毫末是不亦有感夫故予既書張侯之事而又附以予之所感於李君者来者尚有考云紹熙四年春二月丁巳新安朱熹記鄂州州學稽古閣記人之有是身也則必有是心有是心也則必有是理若仁義禮智之為體惻隠羞惡恭敬是非之為用是則人皆有之而非由外鑠我也然聖人之所以教不使學者收視反聴一以反求諸心為事而必曰興於詩立於禮成於樂又曰博學審問謹思明辨而力行之何哉盖理雖在我而或蔽於氣稟物欲之私則不能以自見學雖在外然皆所以講乎此理之實及其浹洽貫通而自得之則又初無内外精粗之間也世變俗衰士不知學挟冊讀書者既不過於誇多鬭靡以為利祿之計其有意於已者又直以為可以取足於心而無事於外求也是以墮於佛老空虛之邪見而於義理之正法度之詳有不察焉其幸而或知理之在我與夫學之不可以不講者則又不知循序致詳虚心一意従容以㑹乎在我之本然是以急遽淺迫終已不能浹洽而貫通也嗚呼是豈學之果不可為書之果不可讀而古先聖賢所以垂世立教者果無益於後来也哉道之不明其可嘆已鄂州州學教授許君中應既新其學之大門而因建閣於其上櫝藏紹興石經兩朝宸翰以為寳鎮又取板本九經諸史百氏之書列寘其旁不足則使人以幣請於京師之學官使其學者討論誦説得以饜飫而開發焉其役始於紹熙辛亥之冬而訖於明年之夏其費亡慮三百萬而取諸廩士之贏者盖三之一其餘則太守煥章閣待制陳公居仁轉運判官薛侯叔似實資之而總卿詹侯體仁戎帥張侯詔亦揮金以相焉既成因予之友蔡君元定以来請曰願有記也予雅聞許君之學盖有志於為己而意其所以學者亦曰取足於心而已矣今以是舉觀之則見其所以誨人者甚平且實然後知其所以自為者不以泯心思滅聞見為極摯之歸也因為之記其本末而并推近世所以為學讀書之病請具刻焉以告登此閣而讀此書者使姑無溺於俗學之下流無迷於異端之捷徑則於理之在我者庶乎有以深求而自得之矣道之不明豈足患哉四年癸丑九月甲子朔旦新安朱熹記信州貴溪縣上清橋記貴溪之水其原東出鉛山之分水北出玉山之鎮頭者合為大溪自弋陽西流逕縣治南少西迺折而北大溪之南有小港焉出縣東南境上西北流至縣治西南乃入于溪居民行客之往来者故以舟楫為二渡自縣治西南絶大溪者曰中溪當其西流北折之處者曰鑿石小港水落時廣不過百餘尺褰裳可涉霖潦暴至則其深廣往往自倍而亦為一渡中溪之舟每以是時過港常為横波所蕩擊人力不得施鑿石則水觸西崖鬭怒騰蹙其險為尤甚故二渡者嵗率一再覆溺邑人病之欲為浮梁以濟久矣而役大費廣無敢倡者今縣大夫建安李君正通至則隂計而嘿圖之久之迺得縣之餘財八十萬將以属工而邑之大姓聞之有以銕為連環巨絙千五百尺以獻者有捐其林竹十餘里以獻者州家又以米百斛者佐之於是李君乃相大溪二渡之間水平不湍者以為唯是為可久遂以紹熙三年六月始事民讙趨之不百日而告成兩崕礲石為磴道髙者五百尺卑者亦居其五之四橋之脩九百尺比舟七十艘且眡水之上下而時損益焉又維十舟以梁小港作雙艦以航巨浸於是東西行者春夏免漂沒之虞秋冬無病涉之歎其功甚大而費則省盖其規模籌畫一出李君主吏工師拱手受成不能有所預也既又留錢五十萬於明覺浮屠氏使自為質貸而嵗輸其贏五一以奉増葺之費明年李君將去乃以書来道邑人之意請予文以記之予惟李君此橋之功百里之人與四方之往来者固已頌而歌之宜不待記而顯且其才之果藝明達用無不宜又非獨此為可書也姑為記其本末以告後之君子使知其成之不易者如此相與謹視而時修之是則李君與其邑人之志也云爾四年九月戊寅既朢新安朱熹記邵州州學濂溪先生祠記邵陽太守東陽潘侯燾以書来曰郡學故有濂溪先生周公之祠盖治平四年先生以零陵通守来攝郡事而遷其學且属其友孔公延之記而刻焉其後遷易不常乾道八年乃還故處而始奉先生之祀於其間既又以故府張公九成之學為出於先生也則亦祠以侑焉於今盖有年矣燾之始至首稽祀典竊獨惟念先生之學實得孔孟不傳之緒以授河南二程先生而道以大明然自再傳之後則或僅得其彷彿或遂失其本真而不可以若是其班矣乃更闢堂東一室特祀先生以致區區尊嚴道統之意今嵗中春釋奠于先聖先師遂命分獻而祝以告焉以吾子之嘗講於其學也敢謁一詞以記之使来者有考而無疑也熹發函三復為之喟然而歎曰甚矣道之難明而易晦也自堯舜以至于孔孟上下二千餘年之間盖亦屢明而屢晦自孟氏以至于周程則其晦者千五百年而其明者不能以百嵗也程氏既沒誦説滿門而傳之不能無失其不流而為老子釋氏者㡬希矣然世亦莫之悟也今潘侯於此乃獨深察而致謹焉道之明也倘庶㡬乎雖然先生之精立圖以示先生之藴因圖以發而其所謂無極而太極云者又一圖之綱領所以明夫道之未始有物而實為萬物之根柢也夫豈以為太極之上復有所謂無極者哉近世讀者不足以識此而或妄議之既以為先生病史氏之傳先生者乃增其語曰自無極而為太極則又無所依据而重以病夫先生故熹嘗欲援故相蘇公請刋國史草頭木脚之比以正其失而恨其力有所不逮也乃今於潘侯之舉而重有感焉是以既敘其事而併附此説以俟後之君子抑潘侯學識之長既足以及此矣則又安知其不遂有以成吾之志也耶紹熙癸丑冬十月庚申後學朱熹記浦城縣永利倉記浦城縣遷陽鎮永利倉者故提舉常平公事黄侯某之所為也聞之故老某年中黄侯以鄉人奉使本道奏立是倉其里中嵗時斂散以賑貧乏且使鎮官兼董其事行之累年近村之民頗賴其利後以兵亂廢熄無餘嵗或不收民輒告病於今若干餘年而吏部之調鎮官猶襲故號也中間知縣丞王君鉛視邑之仁風諸里社倉頗有成効欲取其法以復此倉之舊而議不克合今知縣事括蒼鮑君恭叔之来乃復有請而使者吴興李侯沐深然之於是鮑君得致其役營度故壤築倉若干楹不日告成略如舊制遂移縣庾之粟若干斛以貯焉夏發以貸冬斂以蔵一以淳熙某年社倉制勅從事盖凡貸之所及者某里某都之人固皆有以望於其後而無復凶年之慮矣其所未及則亦欣然相告曰是倉息滋而藏羨其肯卒遺我哉鮑君聞之以書来告曰邑人之情如此不忍以無記也予觀黄侯當日之權足以制一道而其後為此乃僅足以恤其鄉鄰盖未嘗不歎其心之仁而病其不廣以今推之則未必其勢之有不能也是安得以今日社倉之法告之哉若李侯鮑君之是役則既足以使黄侯之心愈久而不泯而又能承天子之詔以廣其恵於無窮是皆可書也已獨後之人能推所餘以徧乎其所未及則有未可必者故特為之書其本末而并以告焉庶乎有所考而不忘也紹熙五年夏四月己酉朝散郎秘閣修撰新權發遣潭州主管荆湖南路安撫司公事朱熹記信州州學大成殿記紹熙五年秋九月熹自長沙䝉恩召還道過上饒其州學教授嘉興林君某来見請問所以為學之意甚勤與之語知其平日所用力者皆古人為己之學而進則未己也既乃起而言曰此邦學政其弊久矣士子習熟見聞因仍淺陋知有科舉而不知有學問且其屋不時修亦多頽圮而禮殿之壊為尤甚至於象設衣冠位次又皆不如法式某不自料既為之講以所聞幸頗有知鄉方者又將撤其故殿而一新之倘遂有成願得一言以記之且有以進其學者於將来則幸甚熹謝不敏退而問諸邦人則皆曰林君所以教其諸生者有常業而皆本於所謂古人為己之意其於學之庶務則又巨細必親無所漏失故能當此儉嵗既廣其弟子之員且什五六而猶有餘力以及此盖属役之初首出餐錢以給諸費而漕臺州家亦有助焉諸生之有職秩者又相與捐俸入以相其事瓦木工徒之直一毫無所取於民也熹心善之比歸而往觀焉則其軒楹宏敞堂室靚深先聖鄉明先師西面左右衆賢以次列坐一如今嵗奉常所下新制而其冠冕服韍應圖合禮取諸監學靡有僭差盖雖近輔名藩鮮有能及之者熹於是焉喟然太息益信林君之學有以充其志而力又有以行其學也嵗晚還家甫爾休息而林君復以書来曰殿既訖功將以来嵗正月丁亥朔旦謁守貳合羣吏率諸生而釋菜以落之前日之請願卒有以賜之也熹惟國家稽古命祀而禮先聖先師於學宫盖將以明夫道之有統使天下之學者皆知有所鄉往而㡬及之非徒修其牆屋設其貌象盛其器服升降俯仰之容以為觀美而已也而今之為吏者於是數者猶有不及求其能如林君之所為者則既難矣而况欲其仰體國家之意以身為率使其學者皆知古人之所以為學者而心庶㡬焉豈不又難矣哉於是為記其事使刻諸石以厲其徒且使後之君子有以考焉而毋忘林君之志也十二月辛巳朝請郎新安朱熹記常州宜興縣學記紹熙五年十二月宜興縣新修學成明年知縣事承議郎括蒼髙君商老以書来請記而其學之師生迪功郎孫庭詢貢士邵機等數十人又疏其事以来告曰吾邑之學久廢不治自今明府之来即有意焉而縣貧不能遽給其費乃稍葺其所甚敝亟補其所甚缺且籍閒田五千畆以豐其廩斥長橋僦金嵗入七十餘萬以附益之為置師弟子員課試如法而又日往逰焉躬為講論開之以道徳性命之指博之以詩書禮樂之文使其知士之所以學盖有卓然科舉文字之外者於是縣人學子知所鄉慕至於里居士大夫之賢者亦攜子弟来聴席下無不更相告語更相勉勵而自恨其聞之之晩也退而相與出捐金齎以佐其役合公私之力得錢㡬七百萬而學之内外煥然一新堂涂門廡靡不嚴備象設禮器皆應圖法盖髙君之於是學非獨其經理興築之緒為可書而其所以教者則非今世之為吏者所能及而邑之人材風俗實有賴焉幸夫子之悉書之以告来者於無窮則諸生之望也予頃得髙君於㑹稽而知其賢今乃聞其政教之施於人者又有成効如此故已樂為之書矣而况其邑之父兄子弟能率髙君之教而有所興起皆知從事於古人為己之學而不汲汲乎誇多鬭靡之習以追時好而取世資則又予之所深嘆而尤樂取以告人者也乃為悉記其語使後之君子有考焉抑髙君之於此邑嘗新其社稷之位而并作風雨雷師於其側以嚴祀事穿故瀆疏積水以防旱潦作社倉儲羨粟以備凶荒其所以事神治民者類能行其所學而皆出於至誠懇惻之意是以言出其人信從之盖不待至於誦説之間然後以言教也嗚呼賢哉慶元元年春三月庚申朝請郎提舉南京鴻慶宫新安朱熹記常州宜興縣社倉記始予居建之崇安嘗以民饑請於郡守徐公嚞得米六百斛以貸而因以為社倉今㡬三十年矣其積至五千斛而嵗斂散之里中遂無凶年中間䝉恩召對輒以上聞詔施行之而諸道莫有應者獨閩帥趙公汝愚使者宋公若水為能廣其法於數縣然亦不能逺也紹熙五年春常州宜興大夫髙君商老實始為之於其縣善拳開寳諸鄉凡為倉者十一合之為米二千五百有餘斛擇邑人之賢者承議郎趙君善石周君林承直郎周君世徳以下二十有餘人以典司之而以書来屬予記予心許之而未及為也㑹是嵗浙西水旱常州民饑尤劇流殍滿道顧宜興獨得下熟而貸之所及者尤有賴焉然予猶慮夫貸者之不能償而髙君之惠將有所窮也明年春髙君將受代以去乃復與趙周諸君皆以書来趣予文且言去嵗之冬民負米以輸者繦屬争先視貸籍無龠合之不入予於是益喜髙君之恵將得以久於其民又喜其民之信愛其上而不忍欺也則為之記其所以然者抑又慮其久而不能無弊於其間也則又因而告之曰有治人無治法此雖老生之常談然其實不可易之至論也夫先王之世使民三年耕者必有一年之蓄故積之三十年則有十年之蓄而民不病於凶饑此可謂萬世之良法矣其次則漢之所謂常平者今固行之其法亦未嘗不善也然考之於古則三登泰平之世盖不常有而驗之於今則常平者獨其法令簿書筦鑰之僅存耳是何也盖無人以守之則法為徒法而不能以自行也而况於所謂社倉者聚可食之物於鄉井荒閒之處而主之不以任職之吏馭之不以流徒之刑茍非常得聰明仁愛之令如髙君又得忠信明察之士如今日之數公者相與并心一力以謹其出納而杜其姦欺則其法之難守不待異日而見之矣此又予之所身試者故并書之以告後之君子云慶元元年三月庚午既朢具位朱熹記寧菴記侍講王公病革顧謂其子瀚等曰生之有死如旦之有暮盖理之必然也吾幸晚得歸息故廬今又以正終牖下是張子所謂存吾順事沒吾寧者復何憾哉汝曹亦無過哀但兄弟友恭敬奉而母力學自立扶植門庭毋為吾羞足矣語絶而逝諸子泣奉其教不敢違未㡬而公夫人亦不起疾諸子既奉兩柩合葬白沙石荀之原乃築祠堂寮舍以奉烝嘗居守者而取公遺語命之曰寧菴買田百餘畆以給菴費輸王租而斂其遺餘以為嵗時增葺之備間以告予而請記其所以名之意予感王公之言足以見其所守之正死而後已又嘉伯海昆弟之能遵先志而不忍忘也因為書其本末如此云慶元乙卯六月己未新安朱熹記建昌軍進士題名記建昌之為郡據江西一道東南上㳺其地山髙而水清其民氣剛而材武其士多以經術論議文章致大名如直講李公中書翰林曾公兄弟尤所謂傑然者也其他能以詞藝致身取髙科而登顯仕者亦不絶於當世前此乃未有以著其名氏而傳於後世者比年以来鄉之先達始病其闕乃率其徒考自國初以至今日得若干人且將礲石刻之寘諸郡學講堂之上以竢来者之嗣書焉而利君元吉鄧君約禮以書来曰今日教人取士之法誠有異於古者然其所以取之之意則亦固有在也顧士之由此而幸得之者乃或不能刮磨奮勵以自見於斯世則亦不必論其教法之是非而吾之所以負其見取之意者已不勝言矣故今吾徒相率為此非敢以為夸乃欲以為鑒邦人士子咸願得子之一言冠其顛以發之庶乎嗣而書者相與讀之而知所警也予三復其書而為之喟然曰二君子之言誠美矣然不論夫教法之是非則無以識其取士之本意不反身以自求而得其有貴於已者則又未足以議其教法之是非也夫古之人教民以徳行道藝而興其賢者能者其法備而意深矣今之為法不然其教之之詳取之之審反復澄汰至于再三而其具不越乎無用之空言而已深求其意雖或亦將有賴於其用然彼知但為無用之空言而便足以要吾之爵禄則又何暇復思吾之所以取彼者其意為如何哉二君子盖嘗有所受學而得其所貴於己者矣盍亦推明其説以告夫鄉之後進使之因是感發以求古人之所以教者而盡心乎誠盡其心而有得乎此然後知今日教人之法雖不由此而吾之於此自當有不能已者今日取士之意雖或不皆出此而吾之所以副其意者自當無日而不在乎此也是則不惟無愧於今人而亦且無愧乎古不惟無愧於一官而視彼文字聲名之盛者猶將有所不屑况乎不義而富且貴者其又何足道哉顧予不足以當其属筆之意姑記是說以復于二君子幸與父兄子弟評之以為如何也慶元元年秋八月丙寅新安朱熹記魏國録贈告後記臣熹伏讀故㕘知政事龔茂良等所記孝宗皇帝襃贈故太學録魏掞之事三復以還至於感涕竊惟掞之本以白衣召見天子悦之擢為學官在職未㡬數上書論政事以至力遏近倖之不當進者遂不自安而告歸以卒上則初未始厭其言也至是越五年矣而眷念不忘咨嗟閔悼錫命追榮至於如此嗚呼偉哉甚盛徳也其所以感人心而厲臣節為如何耶後二十年掞之從弟誠之始議摹刻制書立石冡上而臣頃嘗待罪史氏偶得茂良等所記因書畀之請并刻焉以丕揚先帝之光訓俾彌億萬年不墜于地是則不惟聖子神孫永有觀法而任事之臣有志之士亦得以稱誦道説更相勉勵而亦勸於忠讜云慶元元年九月九日庚寅朝奉大夫提舉南京鴻慶宫婺源縣開國男食邑三百户賜紫金魚袋臣朱熹記福州州學經史閣記福州之學在東南為最盛弟子員常數百人比年以来教養無法師生相視漠然如路人以故風俗日衰士氣不作長老憂之而不能有以救也紹熙四年今教授臨邛常君濬孫始至既日進諸生而告之以古昔聖賢斆學之意又為之飭厨饌葺齋館以寧其居然後謹其出入之防嚴其課試之法朝夕其間訓誘不倦於是學者競勸始知常君之為吾師而常君之視諸生亦閔閔焉唯恐其不能自勉以進於學也故嘗慮其無書可讀而業將病於不廣則又為之益置書史合舊為若干巻度故御書閣之後更為重屋以蔵之而以書来請記其事且致其諸生之意曰願有以教之也予惟古之學者無他明徳新民求各止於至善而已夫其所明之徳所止之善豈有待於外求哉識其在我而敬以存之其亦可矣其所以必曰讀書云者則以天地隂陽事物之理修身事親齊家及國以至於平治天下之道與凡聖賢之言行古今之得失禮樂之名數下而至於食貨之源流兵刑之法制是亦莫非吾之度内有不可得而精粗者若非考諸載籍之文沈􅅗參伍以求其故則亦無以明夫明徳體用之全而止其至善精微之極也然自聖學不傳世之為士者不知學之有本而唯書之讀則其所以求於書不越乎記誦訓詁文詞之間以釣聲名干禄利而已是以天下之書愈多而理愈昧學者之事愈勤而心愈放詞章愈麗論議愈髙而其徳業事功之實愈無以逮乎古人然非書之罪也讀者不知學之有本而無以為之地也今觀常君之為教既開之以古人斆學之意而後為之儲書以博其問辨之趣建閣以致其奉守之嚴則亦庶乎本末之有序矣予雖有言又何以加於此哉然無已而有一焉則亦曰姑使二三子者知夫為學之本有無待於外求者而因以致其操存持守之力使吾方寸之間清明純一真有以為讀書之地而後宏其規密其度循其先後本末之序以大玩乎閣中之蔵則夫天下之理其必有以盡其纎悉而一以貫之異時所以措諸事業者亦將有本而無窮矣因序其事而并書以遺之二三子其勉之哉凡閣之役始於慶元初元五月辛丑而成於七月之戊戌材甓傭食之費為錢四百萬有竒則常君既率其属輸俸入以首事而帥守詹侯體仁使者趙侯像之許侯知新咸有以資之至於旁郡之守趙侯伯璝十二邑之長陳君羾等亦以其力来助而董其役者學之選士楊誠中張安仁蕭孔昭也是嵗九月丁亥朝奉大夫提舉南京鴻慶宫新安朱熹記建昌軍南城縣吳氏社倉記乾道四年建人大饑熹請於官始作社倉於崇安縣之開耀鄉使貧民嵗以中夏受粟於倉冬則加息什二以償嵗小不收則弛其息之半大祲則盡弛之期以數年子什其母則恵足以廣而息可遂捐以予民矣行之累年人以為便淳熙辛丑熹以使事入奏因得條上其説而孝宗皇帝幸不以為不可即頒其法於四方且詔民有慕從者聽而官府毋或與焉徳意甚厚而吏惰不恭不能奉承以布于下是以至今㡬二十年而江浙近郡田野之民猶有不與知者其能慕而從者僅可以一二數也是時南城貢士包揚方客里中適得尚書所下報可之符以歸而其學徒同縣吳伸與其弟倫見之獨有感焉經度久之乃克有就遂以紹熙甲寅之嵗發其私穀四千斛者以應詔㫖而大為屋以儲之涖事有堂燕息有齋前引兩廊對列六庾外為重門以嚴出内其為條約盖因崇安之舊而加詳密焉即以其年散斂如法鄉之隠民有所仰食無復死徙變亂之虞咸以徳於吴氏而伸與倫不敢當也則謹謝曰是倉之立君師之教祖考之澤而鄉鄰之助也吾何力之有哉且今雖幸及於有成而吾子孫之賢否不可知異時脱有不能如今日之志以失信於鄉人者則願一二父兄為我教之教之一再而不能從則已非復吾子孫矣盍亦相與言之有司請正其罪庶其懼而有改其亦可也於是衆益咨嗟嘆息其賢以為不可及而包君以書来道其語且遣倫及伸之子振来請記熹病力不能文然嘉其意不忍拒也乃為之書其本末既以警夫吳氏之子孫使其數世之後猶有以知其前人之意如此而不忍壊抑使世之力能為而不肯為者有所羞愧勉慕而興起焉則亦所以廣先帝之盛徳於無窮而又以少致孤臣泣血號弓之慕也慶元丙辰正月己酉朱熹記平江府常熟縣學吳公祠記平江府常熟縣學吳公祠者孔門髙第弟子言偃子㳺之祀也按太史公記孔門諸子多東州之士獨公為吳人而此縣有巷名子㳺有橋名文學相傳至今圖經又言公之故宅在縣西北而舊井存焉則今雖不復可見而公為此縣之人盖不誣矣然自孔子之沒以至于今千有六百餘年郡縣之學通祀先聖公雖以例得從腏食而其鄉邑乃未有能表其事而出之者慶元三年七月知縣事通直郎㑹稽孫應時乃始即其學宫講堂之東偏作為此堂以奉祠事是嵗中冬長日之至躬率邑之學士大夫及其子弟奠爵釋菜以妥其靈而以書来曰願有記也熹惟三代之前帝王之興率在中土以故徳行道藝之教其行於近者著而人之觀感服習以入焉者深若夫句吳之墟則在虞夏五服是為要荒之外爰自太伯采藥荆蠻始得其民而端委以臨之然亦僅沒其身而虞仲之後相傳累世乃能有以自通於上國其俗盖亦朴鄙而不文矣公生其間乃獨能恱周公仲尼之道而北學於中國身通受業遂因文學以得聖人之一體豈不可謂豪傑之士哉今以論語考其話言類皆簡易疎通髙暢宏達其曰本之則無者雖若見詘於子夏然要為知有本也則其所謂文學固皆有以異乎今世之文學矣既又考其行事則武城之政不小其邑而必以詩書禮樂為先務其視有勇足民之効盖有不足為者至使聖師為之莞爾而笑則其與之之意豈淺淺哉及其取人則又以二事之細而得滅明之賢亦其意氣之感黙有以相契者以故近世論者意其為人必當敏於聞道而不滯於形器豈所謂南方之學得其精華者乃自古而已然也耶矧今全吳通為畿輔文物之盛絶異曩時孫君於此又能舉千載之闕遺稽古崇徳以勵其學者則武城弦歌之意於是乎在故熹喜聞其事而樂為之書至於孔門設科之法與公之言所謂本所謂道及其所以取人者則願諸生相與勉焉以進其實使此邑之人百世之下復有如公者出而又有以一洒夫媮懦憚事無㢘恥而耆飲食之譏焉是則孫君之志而亦熹之願也公之追爵自唐開元始封吳侯我朝政和禮書已號丹陽公而紹興御贊猶有唐封至淳熙間所朌位次又改稱吳公云五年六月甲申具官封賜朱熹記晦庵集卷八十欽定四庫全書晦庵集卷八十一宋朱子撰跋跋朱給事奏劄伏讀給事中朱公奏劄共惟前輩學問醇明故所以告其君者知所先後如此而忠誠懇至溢於文辭筆札之間者又可以見其充養之厚云隆興元年正月既朢新安朱熹謹書後二十八年再得披玩因觀舊題歎前修之益逺悼吾年之不留復記其後云跋陳了翁與兄書章氏議却不成農師極惓惓亦不敢就自到官尤覺中饋不可無人而瑞奴等零丁益可憐不免議同年周戸曹之妹鍔其家清貧其人年長貧則不驕長則諳事為瑞奴等之慮只欲如此書尾又云周氏雖貧然舉家好善故就之男女可無慮予嘗讀陳忠肅公之文觀其述已之志稱人之善未嘗不推而決諸義利取舍之間於是知公之所以常胸中浩然前定不疚者其所自得盖有在也孟子曰欲知舜與蹠之分無他利與善之間耳又曰生亦我所欲義亦我所欲二者不可得兼舍生而取義也陳公之學盖得諸此惟其察而精之也入毫芒是以擴而充之也塞宇宙善觀此帖者亦足以識其㡬矣帖藏邯鄲賈元放家元放文學議論有餘又通當世之務而砥礪㢘隅不為茍合其亦深有得於斯歟隆興甲申十月九日新安朱熹謹書跋胡文定公詩手握乾坤殺活機縦横施設在臨時滿堂兔馬非龍象大用堂堂總不知踏遍江南春寺苔野雲蹤跡去還来如今宴坐孤峯頂無法可傳心自灰祝融峰似在城天萬古江山在目前須信死心元不死夜来明月又重圓明公從小便超羣佳句流傳繼碧雲聞道别来諸念息定將何法退魔軍十年音信㫁鴻鱗夣想雲居頂上人香飯可能長自飽也應分濟百千身右胡文定公答僧五詩公子侍郎所書以授墳僧妙觀而妙觀之所摹刻也儒釋之間盖有所謂毫釐之差者讀之者能辨之則庶乎知言矣乾道乙酉十一月庚午新安朱熹書跋張敬夫所書城南書院詩久聞敬夫城南景物之勝常恨未得往逰其間今讀此詩便覺風篁水月去人不逺然敬夫道學之懿為世醇儒今乃欲以筆札之工追蹤前作豈其戲耶不然則敬夫之豪放奔逸與西臺之温厚靚深其得失之筭必有能辨之者朱仲晦父云跋胡五峰詩幽人偏愛青山好為是青山青不老山中出雲雨太虚一洗塵埃山更好右衡山胡子詩也初紹興庚辰熹卧病山間親友仕於朝者以書見招熹戲以兩詩代書報之曰先生去上芸香閣時籍溪先生除正字赴館供職閣老新峩豸角冠劉共父自秘書丞除察官留取幽人卧空谷一川風月要人看一章甕牖前頭列畫屏晚来相對静儀刑浮雲一任閒舒卷萬古青山只麽青二章或傳以語胡子子謂其學者張欽夫曰吾未識此人然觀此詩知其庶㡬能有進矣特其言有體而無用故吾為是詩以箴警之庶其聞之而有發也明年胡子卒又四年熹始見欽夫而後獲聞之恨不及見胡子而卒請其目也因叙其本末而書之于䇿以無忘胡子之意云跋張魏公為了賢書佛號世之學士大夫措身利害之塗馳騖而不反是以生死窮達之際每有愧於山林之士觀丞相魏公所以慨然於賢老者則可見矣嗚呼服儒衣服學聖人之道誠能一以義理存心而無惑於利害之際則其所立當如何哉乾道丁亥冬十有二月九日新安朱熹書跋方伯謨家藏胡文定公帖兒曹外甥輩比過治宇在寅為同年宜盡切磋之義在宏宜提耳誨導之在范甥宜勉進其所未聞者而一一以重言題品褒借之豈所望也昔事定夫先生未嘗以言色相假後與民瞻叔夏逰茍有過在安國則二公必面折之不令貳其過在二公即安國亦正色規之不但已也數十年来俗習頽靡此風日以替矣安老器識過人當今之望津途軌則當以往哲自期庶㡬此風之復見也邸報十五巻并五月分者并以歸納乾菌承貺示珍感珍感安國再拜去夏所借報中有言吕舜徒章者或見之望更借示自五月以来新報能一一借及幸幸吕公諸子聞自衡陽過江西不知今何在或知信喻及鄉里得近信否所奏前章及第二義不以示他人恐知安國又上朋友之交責善所以盡吾誠取善所以益吾徳非以相為賜也然各盡其道而無所茍焉則麗澤之益自有不能已者方生士繇出示所藏胡文定公與其外大父尚書吕公手帖讀之使人凜然起敬若嚴師畏友之在其左右前後也嗚呼是數君子者其可謂盡朋友之道而無所茍矣其卓然有以自立於當年而遺風餘烈可傳於世者豈徒然哉三復歎息因敬書其後以致區區尊仰之意云乾道壬辰十二月二十四日新安朱熹書跋劉平甫家藏胡文定公帖彥修必已奉太夫人赴温陵此郡樂國也便於養親同増歡慰臨川密邇鄉邦音問易達彥沖退然自守深可嘉尚徳門積善久矣如昆仲出則奮其才力建立事功居者進修術業養成徳器乃邦國之光凡在鄉鄰亦預榮焉衰老覩此盛事不勝欽歎安國又啓安國再啓湖湘旱饑之後民間窘迫而供饋頻繁江西諒亦爾然教令既孚吏民信服不晚必有除擢矣寅在桐江幸亦粗遣然歸養之意甚濃謾恐知之憲姪比蒙恩命皆昆仲平日奬提之所及也感佩之意言不能喻安國再啟伯達孫今已長成莫須早晚令隨貢元伯伯習知禮義若一向不讀書恐不便也與族兄書其略如此屏山劉玶平甫藏胡文定公帖一卷前兩紙胡公與平甫伯父秘閣君盖公之辭而其子祠部君筆也時秘閣守臨川兄侍郎公守温陵弟屏山先生稱疾不仕胡公之子侍郎守桐江兄子籍溪先生以布衣特起典教鄉郡書辭盖徧及之後一紙胡公與其族兄書實公手筆平甫購得之所稱范甥者即平甫外舅太史公也胡公正大方嚴動有法教讀此者視其所褒可以知勸視其所戒可以知懼平甫能葆藏之其志亦可知矣乾道癸巳三月乙酉新安朱熹觀於劉氏山館之復齋因敬書其後云書屏山先生文集後屏山先生文集二十卷先生嗣子玶所編次已定可繕寫先生啓手足時玶年甚幼以故平生遺文多所散逸後十餘年始復訪求以補家書之缺則皆傳寫失真同異參錯而不可讀矣於是反復讎訂又十餘年然後此二十卷者始克成書無大譌謬熹以門牆洒掃之舊幸獲與討論焉竊以為先生文辭之偉固足以驚一世之耳目然其精微之學静退之風形於文墨有足以發蒙蔽而銷鄙吝之萌者尤覽者所宜盡心也因書其故以告後之君子云乾道癸巳七月庚戌門人朱熹謹書跋張敬夫為石子重作傳心閣銘熹既為尤溪大夫石子重記其修學之事又為作此五銘焉時子重方為藏書之閣於講堂之東中寘周程三君子像旁列書史之櫃而使問名於熹請以傳心榜之而子重遂并以其銘見属熹愚不敏不敢専也且惟子重之為是閣盖非學校􅀴常之則非得知道而健於文者不能有所發明也則轉以属諸廣漢張君敬夫而私記其説如此云跋古今家祭禮右古今家祭禮熹所纂次凡十有六篇盖人之生無不本乎祖者故報本反始之心凡有血氣者之所不能無也古之聖王因其所不能無者制為典禮所以制其精神篤其恩愛有義有數本末詳焉遭秦滅學禮最先壊由漢以来諸儒繼出稍稍綴緝僅存一二以古今異便風俗不同雖有崇儒重道之君知經好學之士亦不得盡由古禮以復於三代之盛其因時述作隨事討論以為一國一家之制者固未必皆得先王義起之意然其存于今者亦無㡬矣惜其散脱殘落將遂泯沒于無聞因竊蒐輯敘次合為一篇以便觀覽庶其可傳於後然皆無雜本可參校往往闕誤不可曉知雖通典唐書博士官舊藏版本亦不足據則他固可知已諸家之書如荀氏徐暢孟馮翊周元陽孟詵徐潤孫日周等儀有録而未見者尚多有之有能采集附益并得善本通校而廣傳之庶㡬見聞有所興起相與損益折衷共成禮俗于以上助聖朝敦化導民之意顧不美哉淳熙元年五月戊戌新安朱熹謹識書近思錄後淳熈乙未之夏東莱吕伯恭来自東陽過予寒泉精舍留止旬日相與讀周子程子張子之書歎其廣大閎博若無津涯而懼夫初學者不知所入也因共掇取其闗於大體而切於日用者以為此編總六百一十二條分十四卷盖凡學者所以求端用力處已治人之要與夫辨異端觀聖賢之大畧皆粗見其梗槩以為窮鄉晚進有志於學而無明師良友以先後之者誠得此而玩心焉亦足以得其門而入矣如此然後求諸四君子之全書沈􅅗反復優柔厭飫以致其博而反諸約焉則其宗廟之美百官之富庶乎其有以盡得之若憚煩勞安簡便以為取足於此而可則非今日所以纂集此書之意也五月五日朱熹謹識跋通鑑紀事本末古史之體可見者書春秋而已春秋編年通紀以見事之先後書則每事别記以具事之首尾意者當時史官既以編年紀事至於事之大者則又採合而别記之若二典所記上下百有餘年而武成金縢諸篇其所紀載或更數月或厯數年其間豈無異事盖必已具於編年之史而今不復見矣故左氏於春秋既依經以作傳復為國語二十餘篇國别事殊或越數十年而遂其事盖亦近書體以相錯綜云爾然自漢以来為史者一用太史公紀傳之法此意固不復講至司馬温公受詔纂述資治通鑑然後千三百六十二年之事編年繫日如指諸掌雖托始於三晉之侯而追本其原起於智伯上系左氏之卒章實相受授偉哉書乎自漢以来未始有也然一事之首尾或散出於數十百年之間不相綴属讀者病之今建安袁君機仲乃以暇日作為此書以便學者其部居門目始終離合之間又皆曲有微意於以錯綜温公之書其亦國語之流矣或乃病其於古無初而區别之外無發明者顧第弗深考耳機仲以摹本見寄熹始得而讀之為之撫卷太息因記其後如此以曉觀者淳熈二年秋七月甲寅新安朱熹書于雲谷之晦庵云書和静先生遺墨後和静尹公先生遺墨一卷皆先生晚嵗片紙手書聖賢所示治氣養心之要粘之屋壁以自警戒者其家緝而藏之今陽夏趙侯刻寘臨川郡齋摹本見寄熹竊惟念前賢進修不倦死而後已其心炯炯猶若可識而趙侯所以摹刻之意又非取其字畫之工以供好事者之傳玩而已捧讀終篇恍然自失因敢識其後以自詔云淳熈丙申三月丁巳新安朱熹敬書跋張公予竹溪詩婺源雖巖邑而故多文士竹溪丈人張公予其一也好為歌詩精麗宏偉至其得意往往亦造於閒澹其大篇短韻又皆各得其體晚嵗屏居山田水竹之間専用詩酒自娱以忘其老所與游多一時名勝類皆退讓推伏樂稱道之觀吕侍郎諸公所題文編可見矣淳熈丙申予自建安歸故里公予之子珍卿持以見示因得三反咏嘆究觀製作之意信乎其如諸公所稱不誣也然予聞公予天資孝友絶人其篤於兄弟之愛至犯患難取禍辱而不悔有古篤行君子所難能者諸公乃徒盛稱其詩而曽不及此予不能識其説也因竊記編之後以示鄉人使知公予之所以自見於世者不但其詩而已盖於名教庶亦深有補云五月既朢邑子朱熹書跋劉元城言行錄元祐諫議大夫元城劉公安世字器之受學於司馬文正公得不妄語之一言拳拳服膺終身不失故其進而議於朝者無隠情退而語於家者無愧詞今其存而見於文字若此數書者凜然其與秋霜夏日相髙也熹之外舅劉聘君少嘗見公睢陽間為熹言其所見聞與是數書畧同而時有少異惜當時不能盡記其説且其俯仰仰揚之際公之聲容猶恍若相接焉而今亦不可復得矣嗚呼嵗月如流前輩既不可見而其流風餘韻日逺日忘又已如此可勝嘆哉記大學後右大學一篇經二百有五字傳十章今見於戴氏禮書而簡編散脱傳文頗失其次子程子盖嘗正之熹不自揆竊因其説復定此本盖傳之一章釋明明徳二章釋新民三章釋止于至善以上並従程本而増詩云瞻彼淇澳以下四章釋本末五章釋致知並今定六章釋誠意従程本七章釋正心修身八章釋修身齊家九章釋齊家治國平天下並従舊本序次有倫義理通貫似得其真謹第錄如上其先賢所正衍文誤字皆存其本文而圍其上旁注所改又與今所疑者并見於釋音云新安朱熹謹記書中庸後右中庸一篇三十三章其首章子思推本先聖所傳之意以立言盖一篇之體要而其下十章則引先聖之所嘗言者以明
