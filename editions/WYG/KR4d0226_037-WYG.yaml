body:
  text: 與籍㴱胡原仲先生熹拜覆正字丈丈尊前熹拜違敎席忽已月餘瞻慕之誠食息不置即日秋暑未闌伏惟秘府清暇尊候動止萬福熹侍親養疾幸粗遣不煩賜念但自别後殊不聞動靜今日拜省二十姑亦云未得到任所消息不勝懸想耳計程月初可到今想視事久矣官居廩食之况不敢問物情時變必已了然於胸中矣如有用我而將奚先此則區區所欲聞也因來賜書願以開示少紓畎畝之憂幸甚幸甚吾道不幸范丈前月十八日遂不起疾憂時㴱切信道篤誠世豈復有斯人哉前此往哭其殯視其家生理蕭然未知所税衆議葬於渭曲從其卜居之志甚善但聞其家欲居泰寧似非良計然伯修樂之人不得而間也熹初與元履諸人議以為居建陽一則便於墳墓二則便於講學三則便於生事言之甚詳未有見從之意竊惟范丈平日敎誨之誼未敢默然故敢復言於左右伏想一慟之餘亦當念之至此因書一提其耳或能改轍東來則甚善也八哥此月亦物故其重不幸如此可傷伯逢令姪自崇安徑趨邵武聞留止數日想今已行矣不得一見甚以為恨共父數相見否迎侍乍到不知為况又如何旬父後月初可歸到闕尚留邵武旦夕亦當歸也山中絶無事早秔收熟斗榖售十五錢小民無他恙幸可寧息謾恐欲知之熹衰疾幸不作氣體似亦差勝向欲得真齊州半夏合固真丹不知都下有之否如可尋訪乞為置得一二兩便中寄示幸甚葢病雖小愈不得不過為隄防也伯誠仙尉尊兄想非晚可歸矣不敢别狀天氣向涼伏願順時保重行奮壯猷以慰人望謹啓不備與籍溪胡先生熹拜覆正字丈丈尊前前月附便拜書不知已達尊視否自拜違後一向不聞問數日前拜省二十姑宜人蒙出示家問獲聞詳實深以為喜承嘗有賜書然亦未拜領也即日秋氣澄明伏惟尊候動止萬福熹奉親養疾幸歸田里不敢上勒紀錄但里中秋來闕雨此數日來晚稻秀而將實尤覺焦渴為患方議祈禱謾恐欲知范丈卜以重陽日葬近得伯崇書令為處葬禮一二變節一日為檢閱今日方略定矣逺地不得求正於丈丈及有為撰壙中誌石文并俟他日請敎倦甚拜書不能詳范家事於共父書中言之頗子細乞轉詢之也熹前書所議謀居一事與前日所見家問中意偶合此事勢難復與葢其家已目元履與熹為伯宗之黨矣可歎之甚然不能息意者政以范丈平日敎誨之德不敢忘耳得丈丈因書告語之甚善秋已向深江上消息如何得且平善甚幸然愚意反以為憂葢今出師防戍轉輸科斂所不能免聞沿江海州縣已騷然矣嵗嵗如此何以支吾此不待兩兵相加而坐受敝之勢也前日劉子源來此道嶺上拜别所聞誨言以為必極論天下事至於慷慨洒涕有以見仁人之心不能忘世如此近又見其父家與士説丈丈至彼耳聴漸聰天其或者將一試大儒之效乎聞之喜而不寐伏計必有規模素定於胸中熹竊謂天下形勢如前所云者亦當路所不可不知也救之之術獨在救其本根而已若隨其變而一一應之則其變無窮豈可勝救也哉而所謂救其本根之術不過視天下人望之所屬者舉而用之使其舉措用舍必當於人心則天下之心翕然聚於朝廷之上其氣力易以鼓動如羸病之人鍼藥所不能及焫其丹田氣海則氣血萃於本根而耳目手足利矣不審丈丈以為如何因筆不覺及此燈下作書目力方倦極草草不如法伏乞尊察未拜侍間伏乞保重以俟休命中秋前一日謹拜啓不備熹拜覆與范直閣胡丈書中復主前日一貫之説甚力但云若理㑹得向上一著則無有内外上下逺近邊際廓然四通八達矣熹竊謂此語深符鄙意葢既無有内外邊際則何往而非一貫哉忠恕葢指其近而言之而其意則在言外矣聞子直説吾丈猶未以卑論為然敢復其説如此幸垂教其是非焉熹頃至延平見李愿中丈問以一貫忠恕之説見謂忠恕正曾子見處及門人有問則亦以其所見諭之而已豈有二言哉熹復問以近世儒者之説如何曰如此則道有二致矣非也其言適與卑意不約而合謾以布聞李丈名洞師事羅仲素先生羅嘗見伊川後卒業龜山之門深見稱許其棄後學久矣李丈獨深得其閫奥經學純明涵養精粹延平士人甚尊事之請以為郡學正雖不復應舉而溫謙慤厚人與之處久而不見其涯鬱然君子人也先子與之遊數十年道誼之契甚深與范直閣伏奉賜敎獲聞邇日起居之詳慰感亡以喻信後暑雨應候伏惟盛德所臨百神勞相台候萬福熹親㫄粗遣未有寸言者伏蒙教諭忠恕之説自非愛予之深不鄙其愚豈肯勤勤反復如此感幸深矣但伏思之終未有契處不敢隐然請畢其詞以求正於左右熹前書所論忠恕則一而在聖人在學者則不能無異此正猶孟子言由仁義行與行仁義之别耳孟子之言不可謂以仁義為有二則熹之言亦非謂忠恕為有二也但聖賢所論各有所為而發故當隨事而釋之雖明道先生見道之明亦不能合二者而為一也非不能合葢不可合也彊而合之不降髙以就卑即推近以為逺始倚一偏終必乖戾葢非理之本然是乃所以為不一也盖曾子專為發明聖人一貫之旨所謂由忠恕行者也子思專為指示學者入德之方所謂行忠恕者也所指既殊安得不以為二然核其所以為忠恕者則其本體葢未嘗不同也以此而論今所被教問曲折可以無疑矣不識尊意以為然否若夫曾子所言發明一貫之旨熹前書一再論之皆未蒙決其可否熹又有以明之葢忠恕二字自衆人觀之於聖人分上極為小事然聖人分上無非極致葢既曰一貫則無小大之殊故也猶天道至教四時行百物生莫非造化之神不可專以太虚無形為道體而判形而下者為粗迹也此孔子所謂吾無隐乎爾者不離日用之間二三子知之未至而疑其有隠則是正以道為無形以日用忠恕為粗迹故曾子於此指以示之耳此説雖陋乃二程先生之舊説上蔡謝先生又發明之顧熹之愚實未及此但以聞見之知推衍為説是以不自知其當否而每有請焉更望詳覽前書重賜提誨不勝幸甚前日諸疑亦望早賜鐫譬俾母疑為望時序向熱伏乞為道保重以湏環召區區不勝大願不備與范直閣四月一日領所賜教帖伏讀再三仰佩眷予之厚感慰不可以言前日因平甫遣人亦嘗拜狀矣不審已達台聴否即日初夏清和伏惟班布多暇台候起居萬福熹奉親屏處幸粗遣免山間深僻亦可觀書又得胡丈來歸朝夕有就正之所窮約之中此亦足樂矣迫於親養夏末湏為武林之行計不三四月未得定居也伏蒙别紙垂諭忠恕義仰荷不棄其愚與之反復為賜甚厚謹以來教所示熟思之矣敢復為説以請益焉熹所謂忠恕者乃曾子於一貫之語默有所契因門人之問故於所見道體之中指此二事日用最切者以明道之無所不在所謂已矣者又以見隨寓各足無非全體也忠恕兩字在聖人有聖人之用在學者有學者之用如曾子所言則聖人之忠恕也無非極致二程所謂維天之命於穆不已天地變化草木蕃者正所以發明此義也如夫子所以告學者與子思中庸之説則為學者言之也故明道先生謂曾子所言與違道不逺異者動以天爾葢動以天者事皆處極曾子之所言者是也學者之於忠恕未免參校彼己推已及人則宜其未能誠一於天安得與聖人之忠恕者同日而語也若曾子之所言則以聖人之忠恕言之而見其與性與天道者未嘗有二所以為一貫也然此所謂異者亦以所至之不同言之猶中庸安行利行勉行之别耳茍下學而上達焉則亦豈有所隔閡哉愚見如此更乞教其不至者重賜鐫曉使得所正焉不勝幸甚他疑義尚多蒙諭使得請教此宿昔之願但今日方聞伯崇欲以初三四日行迫遽未暇抄錄所記俟暇日料理有便即附行也前日在共父處見直閣丈還朝陛對副本讀之不能舍去愛君敬主之義葢終篇三致意焉然久矣莫以此言謦欬吾君之側者矣近日所用雖不能盡滿人望其間若亦有一二端士焉前言儻見思乎思其言必用其人延登之命計亦非晚矣願為斯道斯民厚自保重副此歸依與范直閣熹向嘗以忠恕一貫之説質疑於函丈伏蒙鐫曉切至但於愚見尚有未安比因玩索遂於舊説益有發明乃知前者請教之時雖略窺大義然涵泳未久説詞未瑩致煩辨析之勤如此今再錄近所訓義一叚拜呈乞賜批鑿可否示下容更思索續具咨請也去嵗在同安獨居㡬閲嵗看論語近十篇其間疑處極多筆札不能載以求教伏紙但切馳仰與慶國卓夫人熹輙有愚見初欲面稟今既不成行敢此布之五哥嶽廟近自春中以來頓減遊燕復近書冊若常能如此寡過可期更望因書褒勸以奬成之且聞尊意欲為經營幹官差遣不知然否熹則竊以為不可近世人家子弟多因為此壊却心性一生仕宦費力葢其生長富貴本不知艱難一旦仕宦便為此官逐司只有使長一人可相拘轄又間有寛厚長者即以貴遊子弟相待不欲以法度見繩上無職事了辦之責下無吏民窺伺之憂而州縣守倅勢反出已下可以凌轢故後生子弟為此官者無不傲慢縱恣席勢凌人其謹飭者雖不至此亦緣不親民事觸事懵然非如州縣小吏等級相承職事相轄一日廢慢則罪戾及之故仕於州縣者常曉事而少過愚意以為平父可且令參部受簿尉之屬乃為正當若不欲如此即舍人兄為營一稍在人下有職事喫人打罵差遣乃所以成就之若必欲與求幹官乃是置之有過之地誤其終身恐非太碩人髙明教子之本意也受恩深厚冐昧及此皇恐皇恐熹所稟大槩如此更有曲折意度紙盡寫不得舍人兄長必深委悉只乞因其侍次試以問之必以為然也熹又覆上黄端明八月十一日具位熹敢齋沐裁書請納再拜之禮於致政尚書端明文丈台座熹聞之孟子有言天下有達尊三爵一齒一德一此言三者之尊達于天下人所當敬而不可以慢焉者也雖然爵也齒也葢有偶然而得之者是以其尊施于朝廷者則不及於鄉黨施於鄉黨者則不及於朝廷而人之敬之也亦或以貌而不以心惟德也者得於心充於身刑於家而推於鄉黨而達於朝廷者也有此而兼夫二者之尊焉則通行天下人莫不貴雖斂然退避不以自居而人之所以心悦而誠服者葢不可解矣恭惟明公以兩朝侍從元老上還印綬而退處於家自天子不敢煩以政賜之几杖而乞言焉其位與年固非偶然而得之者矣而明公則未嘗以是而自異於人其所以默而成之不言而信者則日新又新而未嘗有止也此天下知德之士所以莫不竊慕下風之義俱有執鞭之願而熹之愚則有甚焉者葢其平生氣稟偏駁治已則不能謹於細微立志則不能持於常久以至待人接物之際溫厚和平之氣不能勝其粗厲猛起之心是以常竊自悼以為安得朝夕望見明公之盛德容貌而師法其萬一庶幾可以飭身補過於將來而不遂為小人之歸也今日之來葢將頓首再拜于堂下以償其夙昔之願伏惟明公坐而受之使得自進於門人弟子之列而不孤其所以來之意則熹之幸也鄉往之深不自知其僣越敢以書先於將命者而立於廡下以聽可否之命熹不勝皇恐之至與王龜齡熹窮居晚學無所肖似往者學不知方而過不自料妄以為國家所恃以為重天下所賴以為安風俗所以既漓而不可以復淳紀綱所以既壞而不可以復理無一不係乎人焉是以聞天下之士有聲名節行為時論所歸者則切切然以不得見乎其人為歎及其久也或得見之或不得見之而熹之拳拳不少衰也聞其進為時用則私以為喜聞其阨窮廢置則私以為憂及夫要其所就而觀之則始終大節真可敬仰者葢無㡬人而言論風旨卒無可稱功名事業卒無可紀者亦往往而有以此喟然自歎知天下所謂聲名節行者亦未足以定天下之人而天下之事未知其果將何寄也自是以來雖不敢易其賢賢之心緩其憂世之志然亦竊自笑其前日所求於人之重而所以自待者反輕如孟子之所譏也於是始復取其所聞於師友者夙夜講明動靜體察求仁格物不敢弛其一日之勞以庶㡬乎有聞者而於前日之所為切切然者則既有所不暇矣當是時聴於士大夫之論聽於輿人走卒之言下至於閭閻市里女婦兒童之聚亦莫不曰天下之望今有王公也已而得其為進士時所奉大對讀之已而得其在館閣時上奏事讀之已而得其為柱史在臺諫遷侍郎時所論諫事讀之已而又得其為故大丞相魏國公之誄文及楚東酬唱等詩讀之觀其立言措意上自奏對陳説下逮燕笑從容葢無一言一字不出於天理人倫之大而世俗所謂利害得䘮榮辱死生之變一無所入於其中讀之真能使人胸中浩然鄙吝消落誠不自意克頑廉懦立之效乃於吾身見之於是作而歎曰士之求仁固當以反求諸已為務然豈不曰事其大夫之賢者云哉今以前日失數公者自懲是以一噎而廢食也於是慨然復有求見於左右之意而未獲也昨聞明公還自夔州撫臨近甸而熹之里閈交游適有得佐下風者因以書賀之葢喜其得賢大夫事之而自傷無狀獨不得一從賓客之後以望大君子道德之餘光也不意夤緣與其向來鄙妄無取之言皆得徹聞於視聴明公又不以凡陋為可棄狂僣為可罪而辱枉手筆以抵宋倅盛有以稱道竊惟明公之志豈非以志衰道微遺君後親之論交作肆行無所忌憚舉俗滔滔思有以障其横流者是以有取於愚者一得之慮因以不求其素而借之辭色也耶明公之志則正矣大矣而熹之愚未有稱明公之意也雖然有一於此其惟益思砥礪不敢廢其所謂講明體察求仁格物之功者使理日益明義日益精操而存之日益固擴而充之日益逺則明公之賜庶乎其有以承之而幸明公之終教之也雖然明公以一身當四海士大夫軍民一面之責其一語一黙一動一靜之間所係亦不輕矣伏惟盛德大業前定不窮其剛徤中正篤實光輝者固無所勉彊以熹之所覩記則古語所謂行百里者半九十里明公其亦念之况今人物𦕈然如明公者僅可一二數是以天下之人責望尤切而明公尤不可以不戒不審明公以為如何哉熹又聞之古之君子尊德性矣而必曰道問學致廣大矣必曰盡精微極髙明矣必曰道中庸溫故知新矣必曰敦厚崇禮葢不如是則所學所守必有偏而不備之處惟其如是是故居上而不驕為下而不倍有道則足以興無道則足以容而無一偏之蔽也熹之區區以此深有望於門下葢所謂德性廣大髙明知新者必有所措而所謂問學精微中庸崇禮者又非别為一事也狂易無取明公其必有以裁之往者明公在䕫成都汪公聲聞密邇竊意有足樂者比來時通問否此公涵養深厚寛靜有容使當大事必有不動聲色而内外賓服者明公相知之深一日進為於世引類之舉其必有所先矣熹杜門養親足以自遣昨嘗一至湖湘出資交遊講論之益歸來忽被除命既不敢辭而拜命矣然明公未歸朝廷熹亦何所望而敢前也引領牙纛未有瞻拜之期向風馳義日以勤止輙敢復因宋倅相為介紹致書下執事以道其拳拳之誠伏惟照察與陳丞相一本作龔實之熹竊觀古之君子有志於天下者莫不以致天下之賢為急而其所以急於求賢者非欲使之綴緝言語譽道功德以為一時觀聴之美而已葢將以廣其見聞之所不及思慮之所不至且慮夫處己接物之間或有未盡善者而將使之有以正之也是以其求之不得不博其禮之不得不厚其待之不得不誠必使天下之賢識與不識莫不樂自致於吾前以輔吾過然後吾之德業得以無愧乎隠微而寖極乎光大耳然彼賢者其明既足以燭事理之微其守既足以遵聖賢之轍則其自處必髙而不能同流合汙以求譽自待必厚而不能陳詞飾說以自媒自信必篤而不能趨走唯諾以茍容也是以王公大人雖有好賢樂善之誠而未必得聞其姓名識其面目盡其心志之底蘊又况初無此意而其所取特在乎文字言語之間乎恭惟明公以厚德重望為海内所宗仰者有年矣而天下之賢士大夫以未得盡出於門下也豈明公所以好之者未至歟所以求之者未力歟所以待之者未盡歟此則必有可得而言之者矣葢好士而取之文字言語之間則道學德行之士吾不得而聞之矣求士而取之投書獻啓之流則自重有恥之士吾不得而見之矣待士而雜之妄庸便佞之伍則志節慷慨之士寧有長揖而去耳而况乎所謂對偶駢驪諛佞無實以求悦乎世俗之文又文字之末流非徒有志於髙逺者鄙之而不為若乃文士之有識者亦未有肯㴱留意於其間者也而間者竊聴於下風似聞明公專欲以此評天下之士若其果然則熹竊以為誤矣江右舊多文士而近嵗以來行誼志節之有聞者亦彬彬焉惟明公留意取其彊明正直者以自輔而又表其惇厚廉退者以厲俗毋先文藝以後器識則陳太傅不得專美於前而天下之士亦庶乎不失望於明公矣衰病屏伏所欲面論者非一而不獲前姑進其大者如此若䝉采擇則熹所不及言者必有輕千里而告於明公者矣與劉共父近略到城中歸方數日見平父示近問承寄聲存問感感但所論二先生集則愚意不能無疑伯逢主張家學固應如此熹不敢議所不可解者以老兄之聰明博識欽夫之造詣精深而不曉此此可怪耳若此書是文定所著即須依文定本為正今此乃是二先生集但彼中本偶出文定家文定當時亦只是據所傳錄之本雖文定葢不能保其無一字之訛也今别得善本復加補綴乃是文定所欲聞文定復生亦無嫌間不知二兄何苦尚爾依違也此間所用二本固不能盡善亦有灼然却是此間本誤者當時更不曾寫去但只是平氣虚心看得義理通處便當從之豈可肚裏先横却一箇胡文定後不復信道理耶如定性書及明道叙述上富公與謝帥書中刪却數十字及辭官表倒却次序易傳序改沿為泝祭文改姪為猶子之類皆非本文必是文定刪改熹看得此數處有無甚害者但亦可惜改却本文葢本文自不害義理故也叙述及富謝書是也有曲為囘互而反失事實害義理者辭表是也曲為囘互便是私意害義理矣惟定性書首尾雖非要切之辭然明道謂横渠實父表弟聞道雖有先後然不應以聞道之故傲其父兄如此語錄説二先生與學者語有不合處明道則曰更有商量伊川則直云不是明道氣象如此與今所刪之書氣象類乎不類乎且文定答學者書雖有不合亦甚宛轉不至如此無含蓄况明道乎今如此刪去不過是減得數十箇閑字而壞却一箇從容和樂底大體氣象恐文定亦是偶然一時意思欲直截發明向上事更不暇照管此等處或是當時未見全本亦不可知今豈可曲意狥從耶向見李先生本出龜山家猶雜以游察院之文比訪得游集乃知其誤以白先生先生歎息曰此書所自來可謂端的猶有此誤況其它又可盡信耶只此便是虚已從善公平正大之心本亦不是難事但今人先着一箇私意横在肚裏便見此等事為難及耳又猶子二字前論未盡禮記云䘮服兄弟之子猶子也言人為兄弟之子䘮服猶己之子非所施於平時也况猶字本亦不是稱呼只是禮記者之辭如下文嫂叔之無服姑姊妹之薄也今豈可沿此遂謂嫂為無服而名姑姊妹以薄乎古人固不謂兄弟之子為姪然亦無云猶子者但云兄之子弟之子孫亦曰兄孫耳二先生非不知此然猶從俗稱姪者葢亦無害於義理也此等處文定既得以一時己見改易二程本文今人乃不得據相傳别本改正文定所改之未安處此何理耶又明道論王霸劄子等數篇胡本亦無乃此間錄去有所脫誤非文定之失伊川上仁廟書此間本無後來乃是用欽夫元寄胡家本校亦脱兩句此非以它人本改文定本乃是印本自不曾依得文定本耳似此之類恐是全不曾參照只見人來説自家刻得文字多錯校得不精便一切逆拒之㡬何而不為訑訑之聲音顔色拒人於千里之外乎夫樂聞過勇遷善有大於此者猶將有望於兩兄不意只此一小事便直如此殊失所望然則區區所以劇論不置者正恐此私意根株消磨不去隨事滋長為害不細亦不專為二先生之文也如必以胡氏之書一字不可改易則又請以一事明之集中與吕與叔論中書注云子居和叔之子胡氏編語錄時意其為邢恕之子遂削此注直與正文子居之上加一邢字頃疑吕氏亦有和叔因以書問欽夫答云嘗問之邢氏果無子居者以此例之則胡氏之書亦豈能一無繆誤乃欲不問是非一切從之乎况此乃文字間舛誤與其本原節目處初無所妨何必一一遵之而不敢改乎近以文定當立祠於鄉郡説應求邦彦二公皆指其小節疑之魏元履至為扼腕今二兄欲尊師之而又守其尤小節處以為不可改是文定有所謂大者終不見知於後世也此等處非特二先生之文之不幸亦文定之不幸耳今既用官錢刋一部書却全不睹是只守却胡家錯本文字以為至當可謂直截不成議論恐文定之心却湏該遍流通決不如是之陋也若説文定決然主張此書以為天下後世必當依此即與王介甫主張三經字説何異作是説者却是謗文定矣設使微似有此亦是克未盡底己私所謂賢者之過横渠所謂其不善者共改之正所望於後學不當守己殘而妒道真使其遺風餘弊波蕩於末流也程子嘗言人之為學其失在於自主張太過横渠猶戒以自處太重無復以來天下之善今觀二兄主張此事得無近此聖賢稽衆舍己兼聴並觀之意似不然也胡子知言亦云學欲約不欲陋此得無近於陋耶如云當於他處别刋此尤是不情悠悠之説與月攘一雞何異非小生所敢聞也每恨此道衰微邪説昌熾舉世無可告語者望二兄於千里之外葢不翅飢渴之於飲食乃不知主意如此偏枯若得從容賓客之後終日正言又不知所以不合者復㡬何耳欽夫尊兄不及别狀所欲言者不過如此幸為呈似所云或不中理却望指教熹却不敢憚改也向所錄去數紙合改處當時極費心力又且勞煩衆人意以為必依此改正故此間更無别本今既不用切勿毁棄千萬盡為收拾便中寄來當十襲藏之以俟後世耳向來數十本欲遍遺朋友今亦不湏寄來熹不敢以此等錯本文字誤朋友也天寒手凍作字不成不能傾竭懷抱惟加察而恕其狂妄可也與劉共父修德之說但云主上憂勤恭儉非不修德然而上而天心未豫下而人心未和凡所欲為多不響應疑於修德之實有未至焉葢修德之實在乎去人欲存天理人欲不必聲色貨利之娛宫室觀遊之侈也但存諸心者小失其正便是人欲必也存袛懼之心以畏天擴寛宏之度以盡下不敢自是而欲人必已同不狥偏見而謂衆無足取不甘受佞人而外敬正士不狃於近利而昧於逺猷出入起居發號施令念兹在兹不敢忘怠而又擇端人正士剛明忠直能盡言極諫者朝夕與居左右不使近習便利捷給之人得以窺伺間隙承迎指意汙染氣習惑亂聰明務使此心虚明廣大平正中和表裏洞然無一毫私意之累然後為德之脩而上可以格天下可以感人凡所欲為無不如志陛下自省於是數者其心有得於中乎其方從事於此而有未至乎其無乃謂此無益而正背馳乎一有不合乎此則臣恐所謂修德之實者有所未至也恢復之形一段切中今日之病前日籖帖更定數語非是欲茍全正論葢只此豪釐之間便是人欲天理同行異情處不可不精察而明辨也夫内修自治本是吾事所當為非欲與人為敵然後為之而為之之道必急其實而緩其名必以深厚淵塞為務而不為浮薄淺露之態然後可以蓄可久之德而成可大之功亦非為畏泄其機而固為是不可測也若謂姑為純正之論而其實必用機心扶隂謀然後可則是心迹乖離内外判析孔子讀而儀秦行矣彼管仲商君呉起申不害非無一切之功而所以卒得罪於聖人之門者正在於此願明者之熟察之也與劉共父平父示别紙諭及明道冠服事熹初意既在學校立祠密邇先聖先師之側則不應直用野服為象故有此議兼在延平學中見曹御史陳了翁象亦是豸冠法服二公自去諫職流落於此皆非卒於其官者見聞習熟因欲援以為例而未嘗計其當時之得失也今如或者之言固亦有理但明道之為御史初非攝官而宗正之除未嘗就職此其考之亦恐有未精也竊謂今日御史法冠乃是追用其平生冠服之最盛者似亦無害於理不然則直用承議郎本品法服亦佳據㑹要則九品官皆有法服但不知元豐官制後寄祿官有法服與否耳又不然則直用幞頭公服亦可嘗見其家畫本緋衣也但太不近古耳鄙見如此更惟髙明裁之或者所謂伊川祠堂之制不知何謂更告詢之并問何人所立今在何處可也與劉共父熹前幅所稟訪問人材事初若率然既而思之此最急務然其意有未盡者輙詳論之如左云古之大臣以其一身任天下之重非以其一耳目之聰明一手足之勤力為能周天下之事也其所賴以共正君心同斷國論必有待於衆賢之助焉是以君子將以其身任此責者必咨詢訪問取之於無事之時而參伍較量用之於有事之日葢方其責之必加於已而未及也無旦暮倉卒之湏則其觀之得以久無利害紛挐之惑則其察之得以精誠心素著則其得之多嵗引月長則其蓄之富自重者無所嫌而敢進則無幽隠之不盡欲進者無所為而不來則無巧偽之亂真久且精故有以知其短長之實而不差多且富故有以使其更迭為用而不竭幽隠畢達則讜言日聞而吾德脩取舍不眩則望實日隆而士心附此古之君子所以成尊主庇民之功於一時而其遺風餘韻猶有稱思於後世者也今之人則不然其於天下之士固有漠然不以為意者矣其求之者又或得之近而不知其遺於逺足於少而不知其漏於多求之備而不知其失於詳也其平居暇日所以自任者雖重而所以待天下之士者不過如此是以勤勞惻怛雖盡於鰥寡孤獨之情而未及乎本根長久之計恩威功譽雖播於兒童走卒之口而未諭乎賢士大夫之心此葢未及乎有為而天下之士先以訑訑乃始欲泛然求已所未知之賢而用之不亦難哉或曰然則未當其任而欲先得天下之賢者宜奈何曰權力所及則察之舉之禮際所及則親之厚之皆不及則稱之譽之又不及則鄉之慕之如是而猶以為未足也又於其類而求之不以小惡揜大善不以衆短棄一長其如此而已抑吾聞之李文公之言曰有人告曰某所有女國色也天下之人必將極其力而求之無所愛也有人告曰某所有人國士也天下之人則不能一往而先焉此豈非好德不如好色者乎嗚呼欲任天下之重者誠反此而求之則亦無患乎士之不至矣答韓無咎誨諭儒釋之異在乎分合之間既聞命矣頃見蘇子由張子韶書皆以佛學有得於形而上者而不可以治世嘗竊笑之是豈知天命之性而叙秩命討已粲然無所不具於其中乎彼其所以分者是亦未嘗真有得於斯耳不審髙明以為如何和靖兩書昔嘗見之其謹於傳疑之意則是而遂欲禁絶學者使不復觀則恐過矣如以春秋改用夏時為無此説以傳為案經為斷為背於理則疑其考之未精或未盡聞他人所聞而欲一以已所聞者槩之之失也春秋傳乃伊川所自著其詞有曰周正月非春也假天時以立義耳若果無改用夏時之意則此説復何謂乎况序文所引論語之言尤為明白不可謂初未嘗有此意也又門人所記有答黄聱隅之語謂以傳考經之事迹以經别傳之真偽者盖見於兩家之書是亦猶所謂傳為案經為斷之意而豈二人所記不期而皆誤乎推此兩條則凡和靖所謂非先生語者恐特它人聞之而和靖亦未聞耳今疑信未分而不復思繹遽以一偏之説盡廢衆人所傳之書似不若盡存其説而深思熟講以考其真偽得失之為善也况明道行狀云其辨析精微稍見於世者學者之所傳耳觀此則伊川之意亦非全不令學者看語錄但在人自着眼看耳如論語之書亦是七十子之門人纂錄成書今未有以為非孔子自作而棄不讀者此皆語錄不可廢之驗幸更深察之如何如何與苪國器煜竊聞學政一新多士風動深副區區之望但今日學制近出崇觀專以月書季攷為陞黜使學者屑屑然較計得失於毫釐間而近嵗之俗又專務以文字新竒相髙不復根據經之本義以故學者益騖於華靡無復探索根原敦勵名檢之志大抵所以破壞其心術者不一而足葢先王所以明倫善俗成就人材之意掃地盡矣惟元祐間伊川程夫子在朝與修學制獨有意乎㴱革其弊而當時咸謂之迂濶無所施行今其書具在意者後之君子必有能舉而行之區區願執事少加意焉則學者之幸也又蘇氏學術不正其險譎慢易之習入人心㴱今乃大覺其害亦望有以抑之使歸於正尤所幸願與芮國器昨者妄以鄙見薦聞伏蒙垂諭反復其説幸甚幸甚然熹竊以為未嘗行之不可逆料今日之不可行且事亦顧理之所在如何耳理在當行不以行之難易為作輟也盡心竭力而為之不幸而至於真不可行然後已焉則亦無所憾於吾心矣蘇氏之學以雄深敏妙之文煽其傾危變幻之習以故被其毒者淪肌浹髓而不自知今日正當拔本塞源以一學者之聴庶乎其可以障狂瀾而東之若方且懲之而又遽有取其所長之意竊恐學者未知所擇一取一捨之間又将與之俱化而無以自還是則執事者之所宜憂也答鄭景望龔帥過建陽遣人相望不及一見為恨今日季敎授見訪云嘗小欵道其語皆出於忠厚長者然在愚意尚未有深解處如論范忠宣救蔡新州及元祐流人以為至當之舉熹嘗竊論此矣以為元祐諸賢憂確之不可制欲以口語擠之固為未當而范公乃欲預為自全之計是亦未免於自私皆非天討有罪之意也至其論諸公忽反爾之言違好還之戒自取禍敗尤非正理使後世見無禮於君親者拱手坐視而不敢逐則必此言之為也且舜流四凶族為臯陶者亦殊不念反爾之戒何耶推此心以往恐無適而非私者邵子文以為明道所見與忠宣合正恐徒見所施之相似而未見所發之不同盖毫釐之間天理人欲之差有不可同年而語者矣又聞深以好名為戒此固然矣然偏持此論将恐廉隅毁頓其弊有甚於好名故先聖云君子疾沒世而名不稱焉而又曰君子求諸已詳味此言不偏不倚表裏該備此其所以為聖人之言歟學者要當於此玩心則勿忘勿助之間天理卓然事事物物無非至當矣熹又記向蒙面誨堯舜之世一用輕刑當時嘗以所疑為請匆匆不及究其説近熟思之有不可不論者但觀臯陶所言帝德罔愆以下一節便是聖人之心涵育發生真與天地同德而物或自逆於理以干天誅則夫輕重取舍之間自有決然不易之理其宥過非私恩其刑故非私怒罪疑而輕非姑息功疑而重非過予如天地四時之運寒涼肅殺常居其半而涵養發生之心未始不流行乎其間此所以好生之德洽於民心而自不犯於有司非既犯而縱舍之謂也不識髙明以為如何乂别本聞二十一日旌斾定行何丞之諭已不及事矣然渠所言大槩謂盜賊之餘土曠人稀州縣以昔日嵗計之額取辦今日見存之户民力素已不堪後來復以荒田之産均之見户由此流移愈多公私愈困耳向蒙面誨堯舜之世一用輕刑當時嘗以所疑為請匆匆不及究其説近熟思之亦有不可不論者但觀臯陶所言帝德罔愆以下一節便見聖人之心涵育發生真與天地同德而物或自逆於理以干天誅則夫輕重取舍之間亦自有決然不易之理其宥過非私恩其刑故非私怒罪疑而輕非姑息功疑而重非過予如天地四時之運寒涼肅殺常居其半而涵育發生之心未始不流行乎其間此所以好生之德洽於民心而自不犯於有司非既抵冐而復縱舍之也夫既不能止民之惡而又為輕刑以誘之使得以肆其凶暴於人而無所忌則不惟彼見暴者無以自伸之為患而姦民之犯於有司者且将日以益衆亦非聖人匡直輔翼使民遷善逺罪之意也答鄭景望虞書論刑最詳而舜典所記尤密其曰象以典刑者象如天之垂象以示人而典者常也示人以常刑所謂墨劓剕宫大辟五刑之正也所以待夫元惡大憝殺人傷人穿窬淫放凡罪之不可宥者也曰流宥五刑者流放竄殛之類所以待夫罪之稍輕雖入於五刑而情可矜法可疑與夫親貴勲勞而不可加以刑者也四凶正合此法曰鞭作官刑扑作敎刑者官府學校之刑以待夫罪之輕者也曰金作贖刑罪之極輕雖入於鞭朴之刑而情法猶有可議者也疑後世始有贖五刑法非聖人有也此五句者從重及輕各有條理法之正也曰眚災肆赦者眚謂過悞災謂不幸若人有如此而入於當贖之刑則亦不罰其金而直赦之也此一條專為輕刑設春秋肆大眚則過悞之大入于典刑者亦肆之矣所以為失刑也書又曰宥過無大明過之大入於典刑者特用流法以宥之耳曰怙終賊刑者怙謂有恃終謂再犯若人有如此而入於當宥之法則亦不宥以流而必刑之也此二句者或由重而即輕或由輕而入重猶今律之有名例乂用法之權衡所謂法外意也聖人立法制刑之本末此七言者大略盡之矣雖其輕重取舍陽舒隂慘之不同然欽哉欽哉惟刑之恤之意則未始不行乎其間也葢其輕重毫釐之間各有攸當者乃天討不易之定理而欽恤之意行乎其間則可以見聖人好生之本心矣夫豈一於輕而已哉又以舜命臯陶之辭考之士官所掌惟象流二法而已鞭朴以下官府學校隨事施行不領於士官事之宜也其曰惟明克允則或刑或宥亦惟其當而無以加矣又豈一於宥而無刑㦲今必曰堯舜之世有宥而無刑則是殺人者不死而傷人者不刑也是聖人之心不忍於心惡大憝而反忍於銜寃抱痛之良民也是所謂怙終賊刑刑故無小者皆為空言以悞後世也其必不然也亦明矣夫刑雖非先王所恃以為治然明刑弼教禁民為非則所謂傷肌膚以懲惡者亦既竭心思而繼之以不忍人之政之一端也今徒流之法既不足以止穿窬淫放之姦而其過於重者則又有不當死而死如彊暴贓滿之類者茍采陳羣之議一以宫剕之辟當之則雖殘其支體而實全其軀命且絶其為亂之本而使後無以肆焉豈不仰合先王之意而下適當世之宜哉况君子得志而有為則養之之具敎之之術亦必隨力之所至而汲汲焉固不應因循茍且直以不養不敎為當然而熟視其争奪相殺於前也答鄭景望初謂按行涓吉必不渝期今所賜字殊未及此何耶逺民傾首以聴車馬之音久矣行期屢却無乃使之失望而下吏之奉約束聴期㑹者將亦因是懈弛而不䖍乎伏惟執事者試㴱慮之僭易及此皇懼之至示諭明道程文不必見於正集考求前此固多如此然先生應舉時已自聞道今讀其文所論無非正理非如今世舉子阿世狥俗之文乃有愧而不可傳也曾南豐序王深父之文以為片言半簡非大義所繫皆存而不去所以明深父之於細行皆可傳也况先生非欲以文顯者而即此程文便可見其經綸之業已具於此時雖文采不艷而卓然皆有可行之實正學以言未嘗有一辭之茍其所以警悟後學亦不為不深矣愚意只欲仍舊次第不審台意以為如可答鄭景望家祭禮三策并上不知可補入見版本卷中否若可添入即孟詵徐潤兩家當在賈頊家薦儀之後孟為第七徐為第八而遞儹以後篇數至政和五禮為第十一而繼以孫日用為第十二乃以杜公四時祭享儀為第十三而遞儹以後至范氏祭儀為第十九又於後序中改十有六為十有九仍刪去孟詵徐潤孫日用七字此版湏别換不然即存舊序而别作數語附見其後尤為詳實不審尊意以為如何更俟誨諭也但寫校湏令精審無誤然後刻版免致将來更俟費力為佳或未刻間且并寫定上版真本寄示容與諸生詳勘納上尤便也答尤延之袤熹杜門竊食不敢與聞外間一事尚不能無虎食其外之憂衰病疲薾雖在山林亦不能有尋幽選勝之樂但時有一二學子相從於寂寞之濱講論古人為已之學至會心處輒復欣然忘食不自知道學之犯科也年來目昏不甚敢讀書經説閑看疎漏頗多不免隨事改正比舊又差勝矣綱目不敢動着恐遂為千古之恨蒙教楊雄荀彧二事按温公舊例凡莽臣皆書死如太師王舜之類獨於楊雄匿其所受莽朝官稱而以卒書似涉曲筆不免却按本例書之曰莽大夫楊雄死以為足以警夫畏死失節之流而初亦未改温公直筆之正例也荀彧却是漢侍中光祿大夫而參丞相軍事其死乃是自殺故但據實書之曰某官某人自殺而系於曹操擊孫權至濡湏之下非故以彧為漢臣也然悉書其官亦見其實漢天子近臣而附賊不忠之罪非與其為漢臣也此等處當時極費區處不審竟得免於後世之公論否胡氏論彧為操謀臣而劫遷九錫二事皆為董昭先發故欲少緩九錫之議以俟它日徐自發之其不遂而自殺乃劉穆之之類而宋齊丘於南唐事亦相似此論竊謂得彧之情不審尊意以為何如李淙謝廓皆略識之李在此作縣甚得民情謝甚俊即任伯參政之孫其家有古書者也但呉仲權亦聞其名見其文字甚清警未知材氣如此也今日下位後生中尚不為無人雖真偽相半然亦且得勸勉奨就之未敢輕有遺弃也陳同父近得書大言如昨亦力勸之令其稍就斂退若未見信即後日之患猶或有甚於此者甚可念也叔祖奉使葬事甚荷憐念此事初未敢有請不謂已蒙特達如此不知今有定論否叔祖當日挺身請使留彼中十六年竟保全節而歸以奏對論和不可專恃且彼有可圖之釁忤秦丞相遂廢以死在彼中時嘗有祭徽廟文或傳以歸乙覽感動錫賚甚寵其書皆在此此便不的不敢附呈鄙意輙欲次其行事以請於左右幸而并賜之銘則宗族子孫皆受不貲之惠矣叔祖受知於晁景迂學甚博詩其一也答尤延之垂諭楊雄事足見君子以恕待物之心區區鄙意正以其與王舜之徒所以事莽者雖異而其為事莽則同故竊取趙盾許止之例而槩以莽臣書之所以著萬世臣子之戒明雖無臣賊之心但畏死貪生而有其迹則亦不免於誅絶之罪此正春秋謹嚴之法若温公之變例則不知何所據依晚學愚昧實有所不敢從也不審尊意以為如何如未中理却望垂教也答林黄中栗室户之説屢蒙指教竟所未曉葢如所論即室户乃在房之西偏而入室者先必由房而後進至於室矣歴考禮書不見此曲折處郤子之登必自西階房戸雖在室户之東蓋亦無所經見恐未足以證室户之必東出也愚意於此深所未解更丐一言以發其蔽幸甚幸甚又見易圖深詆邵氏先天之説舊亦嘗見其書然未曉其所以為説者髙明既斥其短必已洞見其底藴矣因來并乞數語掊擊其繆又大幸也答林黄中誨喻縷縷備悉樂章必已得之因風幸早示及丘推參選未還尚未得聞室户之誨大抵所欲知者此户南鄉西鄉果安所決而經傳實據果安所取不論傳授之有無也邵氏先天之説以鄙見窺之如井蛙之議滄海而髙明直以不知而作斥之則小大之不同量有不可同年而語者此熹之前書所以未敢輕效其愚而姑少見其所疑也示諭邵氏本以發明易道而於易無所發明熹則以為易之與道非有異也易道既明則易之為書卦爻象數皆在其中不待論説而自然可覩若曰道明而書不白則所謂道者恐未得為道之真也不審髙明之意果如何其或文予而實不予則熹請以邵氏之淺近疎略者言之葢一圖之内太極兩儀四象八卦生出次第位置行列不待安排而粲然有序以至於第四分而為十六第五分而為三十二第六分而為六十四則其因而重之亦不待用意推移而與前之三分焉者未嘗不脗合也比之并累三陽以為乾連疊三隂以為坤然後以意交錯而成六子又先畫八卦於内復畫八卦於外以旋相加而後得為六十四卦者其出於天理之自然與人為之造作葢不同矣况其髙深閎闊精密微妙又有非熹之所能言者今不之察而遽以不知而作詆之熹恐後之議今猶今之議昔是以竊為門下惜之而不自知其言之僣易也答林黄中所扣鄉飲酒疑義近細考所奏樂有不用二南小雅六笙詩而用南吕無射兩宫十章不知何據豈有以見古之鄉樂用此律而寫其遺聲邪將古樂已亡不可稽考而别製此樂也然則特用此律其旨安在又所奏樂必有辭聲必有譜而律之短長必有定論凡此數端皆所未諭幸因風詳悉指教與郭沖晦熹窮鄉晚出妄竊有志於道雖幸有聞於師友而行之不力荏苒頽侵今犬馬之年五十有一矣脩身齊家未有可見之効而志氣不彊不能固守貧賤之節彊起從宦舊學愈荒施之於人尤齟齬而不合大抵志不能帥氣理未能勝私中夜以思怛然内疚髙明不鄙不知將何以教誨之熹所拱而竢也向來次輯諸書雖亦各有據依不敢妄意損益然疑信異傳不無牴牾嘗得汪丈端明示以執事所辨數事方且復書質之汪丈更求一二左驗别加是正則汪公已捐賓客矣自此毎念一扣門下以畢其説而相去絶逺無從致問今幸得通姓名又以單車此來無復文書可以檢索不復記向之所欲質問者尚俟異時還家别圖寓信但恐益逺難致耳近刻程先生尹和靖二帖及白鹿五賢二記各納一本伏幸視至其間恐有可因以垂教者切望不棄與郭沖晦易説云數者䇿之所宗而策為已定之數熹竊謂數是自然之數策即蓍之莖數也禮曰龜為卜筴為筮是已老陽一爻過揲三十六策故積六爻而得二百一十有六策耳又云大衍之數五十是為自然之數皆不可窮其義熹竊謂既謂之數恐必有可窮之理又云竒者所掛之一也扐者左右兩揲之餘也得左右兩揲之餘寘於前以竒歸之也熹竊謂竒者左右四揲之餘也扐指間也謂四揲左手之策而歸其餘於無名指間四揲右手之策而歸其餘於中指之間也一掛之間凡再扐則五嵗之間凡再閏之象也又云三多二少人言其數雖不差而其名非矣熹竊謂多少之説雖不經見然其實以一約四以竒為少以偶為多而已九八者兩其四也隂之偶也故謂之多五四者一其四也陽之竒也故謂之少竒陽體員其法徑一圍三而用其全故少之數三偶隂體方其法徑一圍四而用其半故多之數二歸竒積三三而為九則其過揲者四之而為三十六矣歸竒積三二而為六則其過揲者四之而為二十四矣歸竒積二三一二而為八則其過揲者四之而為三十二矣歸竒積二二一三而為七則其過揲者四之而為二十八矣過揲之數雖先得之然其數衆而繁歸竒之數雖後得之然其數寡而約紀數之法以約御繁不以衆制寡故先儒舊説專以多少決陰陽之老少而過揲之數亦冥㑹焉初非有異説也然七八九六所以為隂陽之老少者其説又本於圖書定於四象詳見後叚其歸竒之數亦因揲而得之耳大抵河圖洛書者七八九六之祖也四象之形體次第者其父也歸竒之竒偶方圓者其子也過揲而以四乘之者其孫也今自歸竒以上皆棄不錄而獨以過揲四乘之數為説恐或未究象數之本原也又云四營而後有爻又曰一掛再扐共為三變而成一爻熹竊謂四營方成一變故云成易易即變也積十二營三掛六扐乃成三變三變然後成爻易有太極是生兩儀兩儀生四象四象生八卦熹竊謂此一節乃孔子發明伏羲畫卦自然之形體次第最為切要古今説者惟康節明道二先生為能知之故康節之言曰一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四猶根之有榦榦之有枝愈大則愈小愈細則愈繁而明道先生以為加一倍法其發明孔子之言又可謂最切要矣盖以河圖洛書論之太極者虚其中之象也兩儀者隂陽竒耦之象也四象者河圖之一含六二含七三含八四含九洛書之一含九二含八三含七四含六也八卦者河圖四正四隅之位洛書四實四虚之數也以卦畫言之太極者象數未形之全體也兩儀者一為陽而一為隂陽數一而隂數􅄲也四象者陽之上生一陽則為二而謂之太陽生一隂則為而謂之少隂隂之上生一陽則為而謂之少陽生一隂則為而謂之太隂也四象既立則太陽居一而含九少隂居二而含八少陽居三而含七太隂居四而含六此六七八九之數所由定也八卦者太陽之上生一陽則為而名乾生一隂則為而名兑少隂之上生一陽則為而名離生一隂則為而名震少陽之上生一陽則為而名㢲生一隂則為而名坎太隂之上生一陽則為而名艮生一隂則為而名坤康節先天之説所謂乾一兌二離三震四㢲五坎六艮七坤八者盖謂此也至於八卦之上又各生一隂一陽則為四畫者十有六經雖無文而康節所謂八分為十六者此也四畫之上又各有一隂一陽則為五畫者三十有二經雖無文而康節所謂十六分為三十二者此也五畫之上又各生一隂一陽則為六畫之卦六十有四而八卦相重又各得乾一兌二離三震四㢲五坎六艮七坤八之次其在圖可見矣今既以七八五六為四象又以揲之以四為四象疑或有未安也河圖洛書熹竊以大傳之文詳之河圖洛書盖皆聖人所取以為八卦者而九疇亦并出焉今以其象觀之則虚其中者所以為易也實其中者所以為洪範也其所以為易者已見於前叚矣所以為洪範則河圖九疇之象洛書五行之數有不可誣者恐不得以出於緯書而略之也叢書云理出乎三才分出於人道西銘專為理言不為分設熹竊謂西銘之書横渠先生所以示人至為深切而伊川先生又以理一而分殊者賛之言雖至約而理則無餘矣盖乾之為父坤之為母所謂理一者也然乾坤者天下之父母也父母者一身之父母也則其分不得而不殊矣故以民為同胞物為吾與者自其天下之父母者言之所謂理一者也然謂之民則非真以為吾之同胞謂之物則非真以為我之同類矣此自其一身之父母者言之所謂分殊者也又况其曰同胞曰吾與曰宗子曰家相曰老曰㓜曰聖曰賢曰顛連而無告則於其中間又有如是差等之殊哉但其所謂理一者貫乎分殊之中而未始相離耳此天地自然古今不易之理而二夫子始發明之非一時救弊之言姑以彊此而弱彼也又云西銘止以假塗非終身之學也熹竊謂西銘之言指吾體性之所自來以明父乾母坤之實極樂天踐形窮神知化之妙以至於無一行之不慊而沒身焉故伊川先生以為充得盡時便是聖人恐非專為始學者一時所見而發也又云性善之善非善惡之善熹竊謂極本窮原之善與善惡末流之善非有二也但以其發與未發言之有不同耳盖未發之善只有此善而其發為善惡之善者亦此善也既發之後乃有不善以雜焉而其所謂善者即極本窮原之發耳叢書所謂無為之時性動之後者既得之矣而又曰性善之善非善惡之善則熹竊恐其自相矛盾而有以起學者之疑也又云孟子以養氣為學以不動心為始熹竊謂孟子之學盖以窮理集義為始不動心為效盖唯窮理為能知言唯集義為能養其浩然之氣理明而無所疑氣充而無所懼故能當大任而不動心考於本章次第可見矣答程可久逈熹昨者拜書草率重蒙枉答誨示懃懇并劉掾轉示所製古度量及圖義一冊伏讀捧玩開發良多其為感慰不可具言熹孤陋之學於古人制度多所未講近看范蜀公集引房庶漢志别本比今增多數字又論員分方分之差亦甚詳悉竊意其所以與司馬公胡先生不同之端正在於此所當明辨今圖義中似已不取其說然未嘗質其所以不然之意熹於此有未曉然者因便更乞詳以見教幸甚劉掾又云蒙許并寄古權亦願早得之也温公周尺刻本舊亦嘗依倣製得一枚乃短於今鐵尺寸許不知何故如此差誤俟檢舊本續求教也口賦阡陌二説并荷指教考證精博歎服尤深但阡陌二字鄙意未能無疑因以來教千百之義推之則熹前説所謂徑涂為阡者當為陌畛道為陌者當為阡盖史記索隠引風俗通南北曰阡東西曰陌又云河南以東西為阡南北為陌今以遂人之法考之當以後説為正也遂人鄭注徑從畛横涂從道横今考一徑之内為田百畝一涂之内為田百夫而徑涂皆從即所謂南北之陌一畛之内為田千畝一道之内為田干夫而畛道皆横即所謂東西之阡也其立名取義正以夫畝之數得之而其字為道路之類則當从􅎧而不當从人盖史記其本字而漢志則因假借而亂之恐不當引以為據也馬阡陌之間成羣正謂往來田間道路之上富者連阡陌亦謂兼并踰制跨阡連陌不守先王疆理之舊界耳若作仟佰字説恐難分明也不審尊意以為如何却望終賜誨示幸甚答程可久熹昨承寵示公劄諭及黍尺制度極荷不鄙但素所未講同官亦少有能知其説者竊慮髙明必有一定之論却乞垂教幸甚幸甚敝郡向來製造祭器時未凖頒降此冊只用臨川印本司馬書儀内周尺為之殊覺低小今雖得此制亦已無力可修改矣并㡬台悉少懇田賦夫田二書更欲求得數本以廣長者捄世之心得早拜賜甚幸甚幸答程可久太極之義正謂理之極致耳有是理即有是物無先後次序之可言故曰易有太極則是太極乃在隂陽之中而非在隂陽之外也今以大中訓之又以乾坤未判大衍未分之時論之恐未安也形而上者謂之道形而下者謂之器今論太極而曰其物謂之神又以天地未分元氣合而為一者言之亦恐未安也有是理即有是氣氣則無不兩者故易曰太極生兩儀而老子乃謂道先生一而後一乃生二則其察理亦不精矣老荘之言之失大抵類此恐不足引以為證也兩儀四象之説閩中前輩嘗有為此説者鄙意亦竊謂然初未敢自信也今得來示斯判然矣但謂兩儀為乾坤之初爻謂四象為乾坤初二相錯而成則恐立言有未􅉷者盖方其為兩儀則未有四象也方其為四象則未有八卦也安得先有乾坤之名初二之辨哉妄意兩儀只可謂之隂陽四象乃可各加以太少之别而其序亦當以太陽少陽少隂太隂為次盖所謂逓升而倍之者不得越與而先為也此序既定又逓升而倍之適得乾一兑二離三震四㢲五坎六艮七坤八之序也與邵氏先天圖合此乃伏羲始畫八卦自然次序非人私智所能安排學易者不可不知也晉公子貞屯悔豫之占韋氏舊注固有不通而來示之云鄙意亦不能無所疑也盖以穆姜東宫之占言之則所謂艮之八者正指其所當占之爻而言之也今云貞屯悔豫皆八也而釋之以為指三爻之不變者而言則非其當占之爻而於卦之􅁻凶無所繫矣據本文語勢似是連得兩卦而皆不值老陽老隂之爻故結之曰皆八也而占之曰閉而不通爻無為也盖曰卦體不動爻無所用占爾然兩卦之中亦有陽爻又不為偏言皆八則此説似亦未安且東宫之占説亦未定恐或只是遇艮卦之六爻不變者但乃艮其背不獲其身行其庭不見其人之占史彊為之隨之説以苟悦於姜耳故傳者記史之言而曰是謂艮之隨明非正法之本然也然其九三上九亦是陽爻又似可疑大抵古書殘闕未易以臆説㫁惟占筮之法則其象數具存恐有可以義起者推而得之乃所謂活法耳答程可久熹前書所謂太極不在隂陽之外者正與來教所謂不倚於隂陽而生隂陽者合但熹以形而上下者其實初不相雜故曰在隂陽之中吾丈以形而上下者其名不可相雜故曰不在隂陽之外雖所自而言不同而初未嘗未異也但如今日所引舊説則太極乃在天地未分之前而無所與於今日之為隂陽此恐於前所謂不倚於隂陽而生隂陽者有自相矛盾處更望詳考見教兩儀四象恐難如先天之序乃為自然之數而始乾終坤理勢亦無不可若必欲初次乃是以意安排而非自然之序又象之上各生兩爻即湏以乾兑艮坤為次復無所據更乞詳攷見教乾坤六爻圖位鄙意亦有未曉處更乞誨示揲蓍新圖内䇿數不知於占筮有用處否亦乞開諭答程可久臨汀鹽筴既無可言經界又不得行民之窮困日以益甚但有散為流庸聚為盗賊兩事耳廣右首議之人行遣甚峻近世少見其比益令人懶開口奈何奈何黄齊賢韻語用心甚苦諸圖尤有工夫甚不易得已遵尊命以數語附卷末晚生淺學何足為重三復長者之言為之慨歎科舉之弊至於如此奈何奈何答程可久所諭為學本末甚詳且悉前書所謂世道衰微異言蠭出其甚乖刺者固已陷人於犯刑受辱之地其近似而小差者亦足使人支離繳繞而不得以聖賢為歸岐多路惑甚可懼也願且虚心徐觀古訓句解章析使節節透徹段段爛熟自然見得為學次第不湏别立門庭固守死法也答程可久示諭曲折令人慨歎然今日上下相迫勢亦有不得已者故事之從違可否常在人而不可必唯審時量力從吾所好為在已而可以無不如志爾先生研精於易至有成書樂行憂違伏想胷中已有成算固非晚學所得而輕議也答程可久程書易原近方得之謹以授來使易學啓蒙當已經省覽矣有未安處幸辱鐫誨上饒財賦源流得蒙錄示幸甚伯謨説近有刻石記文亦願得之也又有小懇欲求妙墨為寫大戴禮武王踐祚一篇以為左右觀省之戒不審可否卷子納上得蒙揮染不勝幸甚答程可久忽聞有奉祠之命為之惘然得非反以貳車改正之舉而激之至此也耶世路險巇人情不可測以長者之寛平博厚處之尚未能坦然無所繫閡况如鄙狹之姿又安可望於少行其志耶行亦力請祈還故官仰繼後塵爾答程可久春秋例目拜貺甚厚其間議論小國自貶其爵以從殺禮最為得其情者頃年每疑胡氏滕子朝桓之説非春秋惡惡短之義今已釋然葢後來鄭大夫亦有鄭伯男也而使從諸侯之賦之説則當時諸侯之願自貶者固多但霸主必以此禮責之故有不得而自遂爾然其它尚有欲請教者便遽未暇大抵此經簡奥立説雖易而貫通為難以故平日不敢措意其間假以數年未知其可學否爾答程泰之大昌道生一一生二二生三熹恐此道字即易之太極一乃陽數之竒二乃隂數之偶三乃竒偶之積其曰二生三者猶所謂二與一為三也若直以一為太極則不容復言道生一矣詳其文勢與列子易變而為一之語正同所謂一者皆形變之始耳不得為非數之一也䇿數策者蓍之莖數曲禮所謂策為筮者是也大傳所謂乾坤二篇之策者正以其掛扐之外見存蓍數為言耳盖揲蓍之法凡三揲掛扐通十三策而見存三十六策則為老陽之爻三揲掛扐通十七策而見存三十二策則為少隂之爻三揲掛扐通二十一策而見存二十八策則為少陽之爻三揲掛扐通二十五策而見存二十四策則為老隂之爻大傳專以六爻乘老陽老隂而言故曰乾之策二百一十有六坤之策百四十有四凡三百有六十其實六爻之為隂陽者老少錯雜其積而為乾者未必皆老陽其積而為坤者未必皆老隂其為六子諸卦者或陽或隂亦互有老少焉盖老少之别本所以生爻而非所以名卦今但以乾有老陽之象坤有老隂之象六子有少隂陽之象且均其策數又偶合焉而因假此以明彼則可若便以乾六爻皆為老陽坤六爻皆為老隂六子皆為少陽少隂則恐其未安也但三百六十者隂陽之合其數必齊於此若乾坤之爻而皆得於少隂陽也則乾之策六其二十八而為百六十八坤之策六其三十二而為百九十二其合亦為三百六十此則不可易也河洛圖書論雖以四十五者為河圖五十五者為洛書然序論之文多先書而後圖盖必以五十五數為體而後四十五者之變可得而推又况易傳明有五十有五之文而洪範又有九位之數耶當朞易卦之位震東離南兌西坎北者為一説十二辟卦分屬十二長者為一説及焦延壽為卦氣直日之法乃合二説而一之既以八卦之震離兌坎二十四爻直四時又以十二辟卦直十二月且為分四十八卦為之公侯卿大夫而六日七分之説生焉若以八卦為主則十二卦之乾不當為已之辟坤不當為亥之辟艮不當侯於申酉㢲不當侯於戌亥若以十二卦為主則八卦之乾不當在西北坤不當在西南艮不當在東北㢲不當在東南彼此二説互為矛盾且其分四十八卦為公侯卿大夫以附於十二辟卦初無法象而直以意言本已無所据矣不待論其減去四卦二十四爻而後可以見其失也楊雄太元次第乃是全用焦法其八十一首盖亦去其震離兑坎者而但擬其六十卦耳諸家於八十一首多有作擬震離兑坎者近世許翰始正其誤至立踦贏二贊則正以七百二十九贊又不足乎六十卦六日七分之數而益之恐不可反据其説以正焦氏之説也孔潁達孔氏是一揲也四字先儒莫有覺其誤者今論正之信有功矣但細詳疏文後段孔氏實非不曉揲法者但為之不熟故其言之易差而誤多此四字耳其云合於掛扐之處又云合於掛扐之一處而總掛之則實有誤然於其大數亦不差也畢中和畢氏揲法視疏義為詳柳子厚詆劉夢得以為膚末於學者誤矣畢論三揲皆掛一正合四營之義唯以三揲之掛扐分措於三指間為小誤然於其大數亦不差也其言餘一益三之屬乃夢得立文太簡之誤使讀者疑其不出於自然而出於人意耳此與孔氏之失固不可不正然恐亦不可不原其情也答程泰之熹昨聞禹貢之書已有奏篇轉借累年乃得其全猶恨繪事易差間有難攷䆒處近乃得溫陵印本披圖按説如指諸掌幸甚幸甚此書之傳為有益於學者但頃在南康兩年其地宜在彭蠡九江東陵敷淺原之間而攷其山川形勢之實殊不相應因攷諸説疑晁氏九江東陵之説以為洞庭巴陵者為可信盖江流自澧而東即至洞庭而巴陵又在洞庭之東也若謂九江即今江州之地即其下少東便合彭蠡之口不應言至東陵然後東迤北㑹于滙也白氏所論敷淺原者亦有理而未盡盖詳經文敷淺原合是衡山東北一支盡處疑即今廬阜但無明文可攷耳徳安縣敷陽山正在廬山之西南故謂之敷陽非以其地即為敷淺原也若如舊説正以敷陽為敷淺原則此山甚小又非山脈盡處若遂如晁氏之説以為江入海處則合是今京口所過之水又不但九江而已也若以衡山東北盡處而言即為廬阜無疑盖自岷山東南至衡山又自衡山東北而至此則九江之原出於此三山之北者皆合於洞庭而注於岷江故自衡山而至此者必過九江也此以地勢攷之妄謂如此不審參以它書其合否又如何但著書者多是臆度未必身到足厯故其説亦難盡據未必如今目見之親切著明耳閤下向者固嘗經行而留意之久記覽之富其必有以質之故敢輒獻所疑伏惟有以教之幸也答程泰之病中得窺易老新書之袐有以見立言之指深逺奥博非先儒思慮所及矣尚以道中籃輿搖兀神思昏憒未容盡究底藴獨記舊讀儼若容止作容字而蘇黄門亦解為修容不惰之意嘗疑此或非老子意後見一相書引此乃以容字為客字於是釋然知老子此七句而三協韻以客韻釋脗若符契又此凡言若某者皆有事物之實所謂客者亦曰不敢為主而無與於事故其容儼然耳近見温公注本亦作容字竊意古本必更有可攷者雖非大義所繫然恐亦可備討論之萬一不審台意以為如何答李壽翁熹竊嘗聞之侍郎知易學之妙深造理窟每恨不得執經請業兹辱誨諭警省多矣麻衣易説熹舊見之常疑其文字言語不類五代國初時體製而其義理尤多淺俗意恐只是近三五十年以來人收拾佛老術數緒餘所造嘗題數語於其後以俟知者及去年至此見一戴主簿者名師愈即今印本卷後題跋之人初亦忘記其有此書但每見其説易專以麻衣為宗而問其傳授來厯則又袐而不言後乃得其所著他書觀之則其文體意象多與所謂麻衣易説者相似而間亦多有附會假託之談以是心始疑其出於此人因復徧問邦人則雖無能言其贋作之實者然亦無能知其傳授之所從也用此決知其為此人所造不疑然是時其人已老病昏塞難可深扣又尋即物故遂不復可致詰但今考其書則自麻衣本文及陳李戴汪題四家之文如出一手此亦其同出戴氏之一驗而其義理則於鄙意尤所不能無疑今以台諭之及當復試加考訂他日别求教也程君蓍説亦嘗見之其人見為進賢令至此數得通書愷悌博雅君子人也自别為易説又有田制書近寄印本及所刻范伯達丈夫田説來今各以一編呈納伏幸視至它所欲請教者非一屬以嵗凶郡中多事留此便人日久且草具此拜稟早晚别尋便拜啟次答陳體仁蒙别紙開示説詩之意尤詳因得以窺一二大者不敢自外敢以求於左右來教謂詩本為樂而作故今學者必以聲求之則知其不茍作矣此論善矣然愚意有不能無疑者盖以虞書攷之則詩之作本為言志而已方其詩也未有歌也及其歌也未有樂也以聲依永以律和聲則樂乃為詩而作非詩為樂而作也三代之時禮樂用於朝廷而下達於閭巷學者諷誦其言以求其志詠其聲執其器舞蹈其節以涵養其心則聲樂之所助於詩者為多然猶曰興於詩成於樂其求之固有序矣是以凡聖賢之言詩主於聲者少而發其義者多仲尼所謂思無邪孟子所謂以意逆志者誠以詩之所以作本乎其志之所存然後詩可得而言也得其志而不得其聲者有矣未有不得其志而能通其聲者也就使得之止其鐘鼓之鏗鏘而已豈聖人樂云樂云之意哉况今去孔孟之時千有餘年古樂散亡無復可攷而欲以聲求詩則未知古樂之遺聲今皆以推而得之乎三百五篇皆可協之音律而被之絃歌已乎誠既得之則所助於詩多矣然恐未得為詩之本也况未必可得則今之所講得無有畫餅之譏乎故愚意竊以為詩出乎志者也樂出乎詩者也然則志者詩之本而樂者其末也末雖亡不害本之存患學者不能平心和氣從容諷詠以求之情性之中耳有得乎此然後可得而言顧所得之淺深如何耳有舜之文德則聲為律而身為度簫韶二南之聲不患其不作此雖未易言然其理盖不誣也不審以為如何二南分王者諸侯之風大序之説恐未為過其曰聖賢淺深之辨則説者之鑿也程夫子謂二南猶易之乾坤而龜山楊氏以為一體而相成其説當矣試考之如何召南夫人恐是當時諸侯夫人被文王太姒之化者二南之應似亦不可專以為樂聲之應為言盖必有理存乎其間豈有無事之理無理之事哉惟即其理而求之理得則事在其中矣答顔魯子熹昨蒙諭及深衣謹并幅巾大帶納上皆温公遺製也但帶當結處合有黑紐之組所未能備其説見於書儀本章可攷而增益也又有黑履亦見書儀此不敢納呈去古益逺其冠服制度僅存而可考者獨有此耳然逺方士子亦所罕見往往人自為制詭異不經近於服妖甚可歎也若得當世博聞好禮者表而出之以廣其傳庶㡬其不冺乎答顔魯子蒙諭深衣約紐正所未曉向借得者亦闕此制但既云絛似紳而加濶即與今之匾絛相似不知其制果如何又今法服背後垂綬亦是古組綬之遺象不記其以何物為之恐亦可參考却俟訂正垂教也又承垂諭景望謙卦忌盈之説未審曲折并薛氏鬼神事於此素亦未能無疑顧恨未得面扣其旨以怯所惑或恐有可以言語發明者幸因筆及之也熹忽例蒙誤恩寛其致旱之罪而過錄微勞皆出推借之及初不敢辭適郡人應募賑濟者數家合得官資皆未放行義難先受不免申堂辭免并乞早與推恩矣恐欲知其曲折故敢及之非敢固為矯激也晦庵集卷三十七欽定四庫全書晦庵集卷三十八宋朱子撰書問答答袁機仲樞熹數日病中方得紬繹所示圖書卦畫二說初若茫然不知所謂因復以妄作啓蒙考之則見其論之之詳而明者偶未深考是以致此紛紛多説而愈致疑耳夫以河圖洛書為不足信自歐陽公以來已有此說然終無奈顧命繋辭論語皆有是言而諸儒所傳二圖之數雖有交互而無乖戾順數逆推縱横曲直皆有明法不可得而破除也至如河圖與易之天一至地十者合而載天地五十有五之數則固易之所自出也洛書與洪範之初一至次九者合而具九疇之數則固洪範之所自出也繋辭雖不言伏羲受河圖以作易然所謂仰觀俯察近取逺取安知河圖非其中之一事耶大抵聖人制作所由初無一端然其法象之規模必有最親切處如鴻荒之世天地之間隂陽之氣雖各有象然初未嘗有數也至於河圖之出然後五十有五之數奇耦生成粲然可見此其所以深發聖人之獨智又非汎然氣象之所可得而擬也是以仰觀俯察逺求近取至此而後兩儀四象八卦之隂陽奇耦可得而言雖繋辭所論聖人作易之由者非一而不害其得此而後决也來喻又謂熹不當以大衍之數參乎河圖洛書之數此亦有說矣數之為數雖各主於一義然其參伍錯綜無所不通則有非人之所能為者其所不合固不容以強合其所必合則縱横反覆如合符契亦非人之能強離也若於此見得自然契合不假安排底道理方知造化功夫神妙巧密直是好笑說不得也若論易文則自大衍之數五十至再扐而後掛便接乾之䇿二百一十有六至可與祐神矣為一節是論大衍之數自天一至地十却連天數五至而行鬼神也為一節是論河圖五十五之數今其文間斷差錯不相連接舛誤甚明伊川先生已嘗釐正啓蒙雖依此寫而不曽推論其所以然者故覽者不之察耳至於卦畫之論反復來喻於熹之說亦多未究其底藴且如所論兩儀有曰乾之畫奇坤之畫偶只此乾坤二字便未穩當盖儀匹也兩儀如今俗語所謂一雙一對云爾自此再變至生第三畫八卦已成方有乾坤之名當為一畫之時方有一奇一耦只可謂之隂陽未得謂之乾坤也來喻又曰以二畫増至四畫為二奇二耦又於四畫之上各增一奇一耦而為八畫此亦是於熹圖中所說發生次第有所未明而有此語盖四象第一畫本只是前兩儀圖之一奇一耦縁此一奇一耦之上各生一竒一耦是以分而為四而初畫之一竒一偶亦隨之而分為四叚耳非是以二畫增成四畫又以四畫増成八畫也此一節正是前所謂自然契合不假安排之妙孔子而後千載不傳至康節先生始得其說然猶不肯大叚説破盖易之心髓全在此處不敢容易輕說其意非偶然也來喻又曰不知隂陽二物果可分老少而為四象乎此恐亦考之未熟之過夫老少於經固無明文然揲蓍之法三變之中掛扐四以奇偶分之然後爻之隂陽可得而辨又於其中各以老少分之然後爻之變與不變可得而分經所謂用九用六者正謂此也若其無此則終日揲蓍不知合得何卦正使得卦不知當用何爻安得以為後世之臆說而棄之乎又詳所論直以天地為兩儀而天生神物以下四者為四象此尤非是大抵曰儀曰象曰卦皆是指畫而言故曰易有太極而生兩儀四象八卦又曰易有四象而示人以卦爻吉凶若如所論則是先有太極兩儀四象然後聖人以畫八卦而兩儀四象八卦三物各是一種面貎全然相接不著矣此乃易之綱領如法律之有名例不可以毫釐差熹之所見判然甚明更無疑惑不審髙明以為如何如其未然幸復有以見教也答袁機仲邵子曰太極既分兩儀立矣此下四節通論伏羲六十四卦圓圗此一節以第一爻而言左一奇為陽右一偶為隂所謂兩儀者也今此一竒為左三十二卦之初爻一偶為右三十二卦之初爻乃以累變而分非本即有此六十四叚也後倣此陽上交於隂隂下交於陽而四象生矣此一節以第一爻生第二爻而言也陽下之半上交於隂上之半則生隂中第二爻之一奇一偶而為少陽太隂矣隂上之半下交於陽下之半則生陽中第二爻之一竒一偶而為太陽少隂矣所謂兩儀生四象者也太陽一奇今分為左上十六卦之第二爻少隂一偶今分為右下十六卦之第二爻少陽太隂其分放此而初爻之二亦分為四矣陽交於隂隂交於陽而生天之四象剛交於柔柔交於剛而生地之四象此一節以第二爻生第三爻言也陽謂太陽隂謂太隂剛謂少陽柔謂少隂太陽之下半交於太隂之下半則生太隂中第三爻之一奇一偶而為艮與坤矣太隂之上半交於太陽之下半則生太陽中第三爻之一奇一偶而為乾與兑矣少陽之上半交於少隂之下半則生少隂中第三爻之一奇一偶而為離與震矣少隂之下半交於少陽之上半則生少陽中第三爻之一竒一偶而為巽與坎矣此所謂四象生八卦也乾一奇今分為八卦之第三爻坤一偶今分為八卦之第三爻餘皆倣此而初爻二爻之四今又分而為八矣乾兌艮坤生於二太故為天之四象離震巽坎生於二少故為地之四象八卦相錯而後萬物生焉一卦之上各加八卦以相間錯則六十四卦成矣然第三爻之相交則生第四爻之一奇一偶於是一奇一偶各為四卦之第四爻而下三爻亦分為十六矣第四爻又相交則生第五爻之一奇一偶於是一奇一偶各為二卦之第五爻而下四爻亦分而為三十二矣第五爻又相交則生第六爻之一竒一偶則一竒一偶各為一卦之第六爻而下五爻亦分為六十四矣盖八卦相乗為六十四而自三畫以上三加一倍以至六畫則三畫者亦加二倍而卦體横分亦為六十四矣其數殊塗不約而㑹如合符節不差毫釐正是易之妙處此來教所引邵氏先生說也今子細辨析奉呈幸詳考之方可見其曲折未遽可輕議也然此已是就六十四卦已成之後言之故其先後多寡有難著語處乍看極費分疏猝然曉㑹不得若要見得聖人作易根原直截分明却不如且看卷首横圖自始初只有兩畫時漸次看起以至生滿六畫之後其先後多寡既有次第而位置分明不費詞說於此看得方見六十四卦全是天理自然挨排出來聖人只是見得分明便作依本畫出元不曽用一毫智力添助盖本不煩智力之助亦不容智力得以助於其間也及至卦成之後逆順縱横都成義理千般萬種其妙無窮却在人看得如何而各因所見為說雖若各不相資而實未嘗相悖也盖自初未有畫時說到六畫滿處者邵子所謂先天之學也卦成之後各因一義推說邵子所謂後天之學也今來喻所引繋辭說卦三才六位之說即所謂後天者也先天後天既各自為一義而後天說中取義又多不同彼此自不相妨不可執一而廢百也若執此說必謂聖人初畫卦時只見一箇三才便更不問事由一連便掃出三畫以擬其象畫成之後子細看來見使不得又旋劃擘添出後一半截此則全是私意杜撰補接豈復更有易耶來喻條目尚多然其大節目不過如此今但於此看破則其餘小小未合處自當迎刃而觧矣故今不復悉辨以凂髙明伏幸財察答袁機仲來教疑河圖洛書是後人偽作熹竊謂生於今世而讀古人之書所以能别其真偽者一則以其義理之所當否而知之二則以其左驗之異同而質之未有舍此兩塗而能直以臆度懸斷之者也熹於世傳河圖洛書之舊所以不敢不信者正以其義理不悖而證驗不差爾來教必以為偽則未見有以指其義理之謬證驗之差也而直欲以臆度懸斷之此熹之所以未敢曲從而不得不辨也况今日之論且欲因象數之位置徃來以見天地隂陽之造化吉凶消長之本原茍於此未明則固未暇别尋證據今乃全不尋其義理亦未至明有證據而徒然為此無益之辨是不議於室而譟於門不味其腴而齩其骨也政使辨得二圖真偽端的不差亦無所用又况未必是乎願且置此而於熹所推二圖之說少加意焉則雖未必便是真圖然於象數本原亦當略見意味有歡喜處而圖之真偽将不辨而自明矣來教疑先天後天之說據邵氏說先天者伏羲所畫之易也後天者文王所演之易也伏羲之易初無文字只有一圖以寓其象數而天地萬物之理隂陽始終之變具焉文王之易即今之周易而孔子所為作傳者是也孔子既因文王之易以作傳則其所論固當專以文王之易為主然不推本伏羲作易畫卦之所由則學者必将誤認文王所演之易便為伏羲始畫之易只從中半說起不識向上根原矣故十翼之中如八卦成列因而重之太極兩儀四象八卦而天地山澤雷風水火之類皆本伏羲畫卦之意而今新書原卦畫一篇亦分兩儀伏羲在前文王在後必欲知聖人作易之本則當考伏羲之畫若只欲知今易書文義則但求之文王之經孔子之傳足矣兩者初不相妨而亦不可以相雜來教乃謂專為邵氏觧釋而於易經無所折衷則恐考之有未詳也來教謂七八九六不可為四象四象之名所包甚廣大抵須以兩畫相重四位成列者為正而一二三四者其位之次也七八九六者其數之實也其以隂陽剛柔分之者合天地而言也其以隂陽老少分之者專以天道而言也若專以地道言之則剛柔又自有太少矣推而廣之縱横錯綜凡是一物無不各有四者之象不但此數者而已矣此乃天地之間自然道理未畫之前先有此象此數然後聖人畫卦時依様畫出揲蓍者又隨其所得掛扐過揲之數以合焉非是元無實體而畫卦揲蓍之際旋次安排出來也來喻於此見得未明徒勞辨說竊恐且當先向未畫前識得元有箇太極兩儀四象八卦底骨子方有商量今未須遽立論也用九用六之文固在卦成之後而用九用六之理乃在卦成之前亦是此理但見得實體分明則自然觸處通透不勞辨說矣至謂一八九六乃揲蓍者所為而非聖人之法此誤尤不難曉今且說揲蓍之法出於聖人耶出於後世耶若據大傳則是出於聖人無疑而當是之時若無七八九六則亦無所取决以見其爻之隂陽動静矣亦何以揲蓍為哉此事前書辨之已詳非熹之創見新說更請熟玩當自見之今不復縷縷也來喻又云繋辭本只是四象生八卦今又倍之兩其四象而生八卦之一此數字不可曉然想不足深辨請且於前所謂實體者驗之庻乎其有得也來教疑四爻五爻者無所主名一畫為儀二畫為象三畫為卦則八卦備矣此上若旋次各加隂陽一畫則積至三重再成八卦者八方有六十四卦之名若徑以八卦徧就加乎一卦之上則亦如其位而得名焉方其四畫五畫之時未成外卦故不得而名之耳内卦為貞外卦為悔亦是畫卦之時已有此名至揲蓍求之則九變而得貞又九變而得悔又是後一段事亦如前所論七八九六云爾非謂必揲蓍然後始有貞悔之名也大抵新書所論卦位與繋辭說卦容有異同至論揲蓍則只本繋辭何由别有他說如此等處至為淺近而今為說乃如此竊恐考之殊未詳也來教引伊川先生說重卦之由重卦之由不但伊川先生之說如此盖大傳亦云八卦成列因而重之矣但八卦所以成列乃是從太極兩儀四象漸次生出以至於此畫成之後方見其有三才之象非聖人因見三才遂以己意思惟而連畫三爻以象之也因而重之亦是因八卦之已成各就上面節次生出若旋生逐爻則更加三變方成六十四卦若併生全卦則只用一變便成六十四卦雖有遲速之不同然皆自然漸次生出各有行列次第畫成之後然後見其可盡天下之變不是聖人見下三爻不足以盡天下之變然後别生計較又并畫上三爻以盡之也此等皆是作易妙處方其畫時雖是聖人亦不自知裏面有許多巧妙奇特直是要人細心體認不可草草立說也以上五條鄙意傾倒無復餘藴矣然此非熹之說乃康節之說非康節之說乃希夷之說非希夷之説乃孔子之說但當日諸儒既失其傳而方外之流隂相付受以為丹竈之術至於希夷康節乃反之於易而後其說始得復明於世然與見今周易次第行列多不同者故聞者創見多不能曉而不之信只據目今見行周易縁文生義穿鑿破碎有不勝其杜撰者此啓䝉之書所為作也若其習聞易曉人人皆能領畧則又何必更著此書以為屋下之屋牀上之牀哉更願髙明毋以為熹之說而忽之姑且虚心遜志以求其通曉未可好髙立異而輕索其瑕疵也玩之久熟浹洽於心則天地變化之神隂陽消長之妙自将瞭於心目之間而其可驚可喜可笑可樂必有不自知其所以然而然者矣言之不盡偶得小詩以寄鄙懷曰忽然半夜一聲雷萬戸千門次第開若識無心涵有象許君親見伏羲來説得太郎當了只少箇拄杖卓一下便是一囘普說矣狂妄僣率幸勿鄙誚也答袁機仲伏承别紙誨諭諄悉及示新論尤荷不鄙但區區之說前此已悉陳之而前後累䝉排擯揮斥亦已不遺餘力矣今復下喻使罄其說顧亦何以異於前日耶然既辱開之使言則又不敢嘿嘿然其大者未易遽論姑即來教一二淺者質之夫謂溫厚之氣盛於東南嚴凝之氣盛於西北者禮家之說也謂陽生於子於卦為復隂生於午於卦為垢者厯家之說也謂巽位東南乾位西北者說卦之說也此三家者各為一說而禮家厯家之言猶可相通至於說卦則其卦位自為一說而與彼二者不相謀矣今來教乃欲合而一之而其間又有一說之中自相乖戾者此熹所以不能無疑也夫謂東南以一隂已生而為隂柔之位西北以一陽已生而為陽剛之位則是陽之盛於春夏者不得為陽隂之盛於秋冬者不得為隂而反以其始生之㣲者為主也謂一隂生於東南一陽生於西北則是隂不生於正南午位之遇而滛於東陽不生於正北子位之復而旅於西也謂巽以一隂之生而位乎東南則乾者豈一陽之生而位於西北乎况說卦之本文於巽則但取其潔齊於乾則但取其戰而已而未嘗有一隂一陽始生之說也凡此崎嶇反復終不可通不若直以陽剛為仁隂柔為義之明白而簡易也盖如此則發生為仁肅殺為義三家之說皆無所牾肅殺雖似乎剛然實天地收斂退藏之氣自不妨其為隂柔也來教又論黑白之位尤不可曉然其圖亦非古法但今欲易曉且為此以寓之耳乾則三位皆白三陽之象也兌則下二白而上一黑下二陽而上一隂也離則上下二白而中一黑上下二陽而中一陰也震則下一白而上二黑下一陽而上二陰也巽之下一黑而上二白坎之上下二黑而中一白艮之下二黑而上一白坤之三黑皆其三爻隂陽之象也蓋乾兌離震之初爻皆白巽坎艮坤之初爻皆黑四卦相間兩儀之象也乾兌巽坎之中爻皆白離震艮坤之中爻皆黑兩卦相間四象之象也乾離巽艮之上爻皆白兌震坎坤之上爻皆黑一卦相間八卦之象也豈有震坎皆黑而如坤巽離皆白而如乾之理乎此恐畫圖之誤不然則明者察之有未審也凡此乃易中至淺至近而易見者契丈猶未之盡而況其體大而義深者又安可容易輕忽而遽加詆誚乎此熹所以不敢索言蓋恐其不足以解左右者之惑而益其過也幸試詳之若熹所言略有可信則願繼此以進不敢吝又讀來書以為不可以仁義禮智分四時此亦似太草草矣夫五行五常五方四時之相配其為理甚明而為說甚久非熹獨於今日創為此論也凡此之類竊恐髙明考之未詳思之未審而卒然立論輕肆詆訶是以前此區區所懷不欲盡吐於老丈之前者尚多此其為訑訑之聲音顔色大矣若欲實求義理之歸恐當去此而虛以受人庶幾乎其有得也僣易皇恐熹又禀答袁機仲别幅乾於文王八卦之位在西北於十二卦之位在東南坤於文王八卦之位在西南於十二卦之位在西北故今圖子列文王八卦於内而布十二卦於外以見彼此位置逈然不同雖有善辨者不能合而一之也然十二卦之説可曉而八卦之説難明可曉者當推難明者當闕按圖以觀則可見矣論十二卦則陽始於子而終於己隂始於午而終於亥論四時之氣則陽始於寅而終於未隂始於申而終於丑此一説者雖若小差而所爭不過二位蓋子位一陽雖生而未出乎地至寅位泰卦則三陽之生方出地上而温厚之氣自此始焉己位乾卦六陽雖極而温厚之氣未終故午位一陰雖生而未害於陽必至未位遯卦而後温厚之氣始盡也其午位隂已生而嚴凝之氣及申方始亥位六陰雖極而嚴凝之氣至丑方盡義亦倣此盖地中之氣難見而地上之氣易識故周人以建子為正雖得天統而孔子之論為邦乃以夏時為正盖取其隂陽始終之著明也按圖以推其説可見來喻謂坤之上六陽氣已生其位在亥乾之上九隂氣已生其位在巳以剥上九碩果不食十月為陽月之義推之則剝卦上九之陽方盡而變為純坤之時坤卦下爻已有陽氣生於其中矣但一日之内一畫之中方長得三十分之一必積之一月然後始滿一畫而為復方是一陽之生耳夬之一陰為乾為遇義亦同此來喻雖有是説而未詳宻故為推之如此盖論其始生之微固己可名於隂陽然便以此為隂陽之限則其方盛者未替而所占不啻卦内六分之五方生者甚微而所占未及卦内六分之一所以未可截自此處而分陰陽也此乃十二卦中之一義與復遇之説理本不殊但數變之後方説得到此不可攙先輥説亂了正意耳來諭又謂冬春為陽夏秋為陰以文王八卦論之則自西北之乾以至東方之震皆父與三男之位也自東南之巽以至西方之兑皆母與三女之位也故坤蹇解卦之彖辭皆以東北為陽方西南為陰方然則謂冬春為陽夏秋為陰亦是一説但說卦又以乾為西北則隂有不盡乎西以巽為東南則陽有不盡乎東又與三卦彖辭小不同此亦以來書之説推之而説卦之文適與彖辭相為表裏亦可以見此圖之出於文王也但此自是一説與他説如十二卦之類各不相通耳來喻以東南之温厚為仁西北之嚴凝為義此鄉飲酒義之言也然本其言雖分仁義而無陰陽柔剛之别但於其後復有陽氣發於東方之說則固以仁為屬乎陽而義之當屬乎陰從可推矣來喻乃不察此而必欲以仁為柔以義為剛此既失之而又病夫柔之不可屬乎陽剛之不可屬乎陰也於是彊以温厚為柔嚴凝為剛又移北之隂以就南而使主乎仁之柔移南之陽以就北而使主乎義之剛其於方位氣候悉反易之而其所以為説者率皆參差乖迕而不可合又使東北之為陽西南之為陰亦皆得其半而失其半愚於圖子已具見其失矣蓋嘗論之陽主進而陰主退陽主息而陰主消進而息者其氣彊退而消者其氣弱此隂陽之所以為柔剛也陽剛温厚居東南主春夏而以作長為事陰柔嚴凝居西北主秋冬而以歛藏為事作長為生歛藏為殺此剛柔之所以為仁義也以此觀之則隂陽剛柔仁義之位豈不曉然而彼楊子雲之所謂於仁也柔於義也剛者乃自其用處之末流言之盖亦所謂陽中之陰隂中之陽固不妨自為一義但不可以雜乎此而論之爾向日妙湛盖嘗靣禀易中卦位義理層數甚多自有次第逐層各是一箇體靣不可牽彊合為一説學者須是旋次理㑹理㑹上層之時未要攪動下層直待理㑹得上層都透徹了又却輕輕掲起下層理㑹將去當時雖似遲鈍不快人意然積累之久層層都了却自見得許多條理千差萬别各有歸著豈不快哉若不問淺深不分前後輥成一塊合成一說則彼此相妨令人分䟽不下徒自紛紛成鹵莽矣此是平生讀書已試之效不但讀易為然也前書所論仁義禮智分屬五行四時此是先儒舊説未可輕詆今者來書雖不及之然此大義也或恐前書有所未盡不可不究其説蓋天地之間一氣而已分陰分陽便是兩物故陽為仁而隂為義然陰陽又各分而為二故陽之初為木為春為仁陽之盛為火為夏為禮隂之初為金為秋為義隂之極為水為冬為智蓋仁之惻隱方自中出而禮之恭敬則已盡發於外義之羞惡方自外入而智之是非則已全伏於中故其象類如此非是假合附㑹若能黙㑹於心便自可見元亨利貞其理亦然文言取類尤為明白非區區今日之臆説也五行之中四者既各有所屬而土居中宫為四行之地四時之主在人則為信為真實之義而為四德之地衆善之主也五聲五色五味五臭五藏五䖝其分放此盖天人一物内外一理流通貫徹初無間隔若不見得則雖生於天地間而不知所以為天地之理雖有人之形貌而亦不知所以為人之理矣故此一義切於吾身比前數段尤為要𦂳非但小節目而已也答袁機仲垂諭易説又見講學不倦下問不能之盛美尤竊欽仰已悉鄙意别紙具呈矣此但易中卦畫隂陽之分位耳未是吾人切身之事萬一愚見未合盛意可且置之而更别向裏尋求恐合自有𦂳切用功處也答袁機仲再辱垂諭具悉尊㫖然細觀本末初無所爭只因武陵舊圖仁義兩字偶失照管致有交互其失甚微後來既覺仁字去西北方不得義字去東南方不得即當就此分明改正便無一事顧乃䕶其所短而欲多方作計移換隂陽剛柔四字以盡其失所以競辨紛紜以至於今而不能定也蓋始者先以文王八卦為說而謂一隂生於巽一陽生於乾則既非説卦本意矣其以二陽純乾之方為一陽始生之地則又為乖剌之甚者及既知之而又以十二卦為説則謂一陽生於乾之上九一隂生於坤之上六遂移北方之隂柔以就南使之帶囘仁字於西南而不失其為隂柔移南方之陽剛以歸北使之帶囘義字於東北而不失其陽剛則亦巧矣然其所移動者凡二方而六辰六卦例皆失其舊主又更改却古來陰陽界限蓋不勝其煩擾而其所欲遷就之意乃不過僅得其半而失其半蓋北方雖曰嚴凝而東方已為温厚南方雖曰温厚而西方已為嚴凝也是則非惟不足以救舊圖一時之失而其耻過作非故為穿鑿之咎反有甚於前日者竊恐髙明於此急於求勝未及深致思也欲究其説以開盛意又念空言繳繞難曉易差不免畫成一圖先列定位而後别以舊圖之失及今者兩次所論之意隨事貼説有不盡者則又詳言别為數條以附於後切望虛心平氣細考而徐思之若能於此翻然悔悟先取舊圖分明改正仁義二字却將今所移易陰陽剛柔等字一切發囘元來去處如熹新圖之本位則易簡圓成不費詞説而三才五行天理人事已各得其所矣至於文王八卦則熹嘗以卦畫求之縱横反覆竟不能得其所以安排之意是以畏懼不敢妄為之説非以為文王後天之學而忽之也夫文王性與天合乃生知之大聖而後天之學方根求其説而不得熹雖至愚亦安敢有忽之之心耶但如來書所論則不過是因其已定之位已成之説而應和贊歎之爾若使文王之意止於如此則熹固己識之不待深思而猶病其未得矣故嘗竊謂髙明之於此圖尊之雖至信之雖篤而所以知之則恐有不如熹之深者此又未易以言語道也至於邵氏以此圖為文王之學雖無所考然説卦以此列於天地定位雷以動之兩節之後而其布置之法逈然不同則邵氏分之以屬於伏羲文王恐亦不為無理但未曉其根源則姑闕之以俟知者亦無甚害不必卓然肆意立論而輕排之也又謂一竒一耦不能生四象而二竒二耦不能生八卦則此一圖極為易曉又不知老丈平時作如何㸔而今日猶有此疑也盖其初生之一竒一耦則兩儀也一竒之上又生一竒一耦則為二畫者二而謂之太陽少陰矣此耦之上亦生一竒一耦則亦為二畫者二而謂之少陽太隂矣此所謂四象者也四象成則兩儀亦分為四太陽竒畫之上又生一竒一耦則為上爻者三而謂之乾兌矣餘六條準此此則所謂八卦者也八卦成則兩儀四象皆分為八是皆自然而生瀵湧而出不假智力不犯手勢而天地之文萬事之理莫不畢具乃不謂之畫前之易謂之何哉僕之前書固己自謂非是古有此圖只是今日以意為之寫出竒耦相生次第令人易曉矣其曰畫前之易乃謂未畫之前已有此理而特假手於聰明神武之人以發其秘非謂畫前已有此圖畫後方有八卦也此是易中第一義若不識此而欲言易何異舉無綱之網挈無領之裘直是無著力處此可為知者道也目疾殊甚不能親書切幸深照第四畫者以八卦為太極而復生之兩儀也第五畫者八卦之四象也第六畫者八卦之八卦也再㸔來書有此一項此書未答故復及之熹又禀答袁機仲易説不知尊意看得如何前書所云二方六卦六辰皆失其所與得半失半之說後來思之亦有未盡盖徙陽扵北使陽失其位而奪隂之位徙隂於南使隂失其位而奪陽之位二方固己病矣東方雖得仍舊為陽然其温厚之仁不得南與同類相合而使彊附於北方嚴凝之義不則却須改仁為義以去隂而就陽方得寧貼然又恐無此理是東方三卦三辰亦失其所也西方雖得仍舊為隂然其離北附南與夫改義為仁其勢亦有所不便是西方三卦三辰亦失其所也盖移此二方而四方八面十二辰十二卦一時鬼亂無一物得安其性命之情也前書所禀殊未及此之明白詳盡也答袁機仲易説已悉若只如此則熹固己深曉不待諄諄之告矣所以致疑正恐髙明之見有所未盡而費力穿鑿使隂陽不得據其方盛之地仁義不得保其一德之全徒爾紛紜有損無益爾今既未䝉省察執之愈堅則區區之愚尚復何說竊意兩家之論各自為家公之不能使我為公猶我之不能使公為我也不若自此閉口不談各守其說以俟羲文之出而質正焉然以髙明之見自信之篤竊恐羲文復出亦未肯信其說也魏鄭公之言以為望獻陵也若昭陵則臣固己見之矣佛者之言曰諸人知處良遂摠知良遂知處諸人不知正此之謂矣世間事吾入身在閑處言之無益此正好從容講論以慰窮愁而枘鑿之不合又如此是亦深可歎者而信乎其道之窮矣答袁機仲易說垂示極荷不鄙然淺陋之見前已屢陳至煩訶斥久矣今復何敢有言但詳序說諸篇唯是依經說理而不惑於諸儒臆說之鑿此為一書要切之㫖今以篇中之說考之則如繋辭說卦觧兩引禮記以春作夏長為仁秋斂冬藏為義說卦觧又獨引温厚之氣始於東北盛於東南嚴凝之氣始於西南盛於東北以為仁義之分此於經既有据又合於理之自然真可謂不惑於諸儒臆說之鑿矣但其所以為說則又必以為聖人恐乾止有陽剛而無仁坤止有隂柔而無義故必兼三才以為六畫然後能使乾居東北而為冬春之陽坤居西南而為夏秋之隂又必横截隂陽各為兩叚以分仁義之界然後能使春居東而為乾之仁夏居南而為坤之仁秋居西而為坤之義冬居北而為乾之義此非本書之詞但以鄙意注觧如此庻覽者之易曉耳則其割裂補綴破碎參差未知於經何所据依而何以異於諸儒臆説之鑿也又按文王孔子皆以乾為西北之卦艮為東北之卦顧雖未能洞曉其所以然然經有明文不可移易則已審矣今乃云乾位東北則是貶乾之尊使居艮位未知使艮却居何處此又未知於經何所据依而何以異於諸儒臆說之鑿也又按孔子明言易有太極是生兩儀是則固以太極為一兩儀為二而凡有心有目者皆能識之不待推厯布算而後可知也今太極論乃曰乾坤者易之太極則是以兩儀為太極而又使之自生兩儀矣未知此於經何所据依而又何以異於諸儒臆說之鑿也至繋辭觧又謂太極者一之所由起則是又以為太極之妙一不足以名之而其序則當且生所起之一而後再變乃生兩儀矣此則又未暇論其於經有無据依是與不是諸儒臆說之鑿而但以前論參之已有大相矛盾者不審髙明之意果何如也凡此四條熹皆不敢輙以為非以觸尊怒但所未曉不敢不求教耳答袁機仲誨諭參同邵氏不知易之說辨博髙深非淺陋所能窺測但參同之書本不為明易乃姑借此納甲之法以寓其行持進退之候異時每欲學之而不得其傳無下手處不敢輕議然其所言納甲之法則今所傳京房占法見於火珠林者是其遺說沈存中筆談解釋甚詳亦自有理參同所云甲乙丙丁庚辛者乃以月之昏旦出沒言之非以分六卦之方也此雖非為明易而設然易中無所不有茍其言自成一說可推而通則亦無害於易恐不必輕肆詆排也至扵邵氏先天之說則有推本伏羲畫卦次第生生之妙乃是易之宗祖尤不當率爾妄議或未深曉且當置而不論以謹闕疑若必以為不知易則如熹輩尚何足與言易而每煩提耳之勤也既荷不鄙不敢不盡其愚其他如六五坤承向亦疑有誤字見於考異而所示十二卦圖以垢為子以復為午亦所未喻所引坎離無爻位亦有脱字此或只是筆誤皆未暇論也答趙提舉善譽慕用之久徃歳雖辱寵臨而倥偬卒廹不能少欵每以為恨近乃竊窺所著易論語書又歎其得之之晚而不獲親扣名理也間因虞君轉請所疑初未敢以姓名自通而髙明不鄙逺辱貽書所以傾倒之意甚厚三復以還感慰無量不敢無以報也盖道體之大無窮而於其間文理密察有不可以毫釐差者此聖賢之語道所以既言發育萬物峻極于天以形容其至大而又必曰禮儀三百威儀三千以該悉其至微而其指示學者脩德凝道之功所以既曰致其廣大而又必曰盡其精㣲也近世之言道者則不然其論大抵樂渾全而忌剖析喜髙妙而略細微其於所謂廣大者則似之而於精微有不察則其所謂廣大者亦未易以識其全體之真也今且以經言論之其所發明固不外乎一理然其所指則不能無異同之别而就其所同之中盖亦不無賔主親踈逺近之差焉如卦之所以八者以奇耦之三加而成也而爻之所以三則取諸三才之象而非奇耦所能與此理之一而所指之不同者也四象之說本為畫卦則當以康節之說為主而七八九六東西南北水火金木之類為客得其主則客之親疎逺近皆即此而可定不得其主而曰是皆一說則我欲同而彼自異終有不可得而同者矣此所指之同而不能無賔主之分者也是皆樂渾全而忌剖析之過也至於乾坤之純而不雜者聖人所以形容天地之德而為六十四卦之綱也乾之純於剛健而不雜又聖人所以形容天理自然之全體而為坤之綱也所以贊其剛健柔順之全德以明聖人體道之妙學者入德之方者亦云備矣未嘗以其偏而少貶之也至於諸爻雖或不免於有戒然乾九三之危以其失中也其得無咎以其健而行也坤六五之元吉以其居尊而能下也上六之龍戰以其太盛而亢陽也是豈惡乾之剛而欲其柔惡坤之柔而欲其剛哉今未察乎其精微之藴而遽指其偏以為當戒意若有所未足於乾坤而陿小之者是不亦喜髙妙而略細微之過乎至於用九用六乃為戒其剛柔之偏者然亦因其隂變為陽陽變為隂之象而有此戒如歐陽子之云者非聖人創意立説而強為之也大抵易之書本為卜筮而作故其詞必根於象數而非聖人已意之所為其所勸戒亦以施諸筮得此卦此爻之人而非反以戒夫卦爻者近世言易者殊不知此所以其說雖有義理而無情意雖大儒先生有所不免比因玩索偶幸及此私竊自慶以為天啓其衷而以語人人亦未見有深曉者不知髙明以為如何舊亦草筆其說今漫録二卦上呈其他文義未瑩者多未能卒業姑以俟後世之子雲耳近又嘗編一小書畧論象數梗槩并以為獻妄竊自謂學易而有意扵象數之說者於此不可不知外此則不必知也心之精㣲言不能盡臨風引領馳想增劇答趙提舉易學未蒙指教乃有簡易之褒令人踧踖其書草略何足以當此然此二字在易數中真不可易之妙近世說易者愈多而此理愈晦非見之明孰能以一言盡之哉歎服亡已近嘗略修數處尋别寄呈但圖書錯綜縱横無不脗合終有不可得而盡者信乎天地之文非人之私智所能及也與周益公熹竊以孟夏清和伏惟判府安撫少保大觀文丞相國公鈞候動止萬福熹近嘗拜書并胡先生墓文請教今者至城中乃知未遣已白史君趣其行諒亦非久當徹鈞聽也熹有少懇率易拜禀熹先君子少喜學荆公書收其墨蹟為多其一紙乃進鄴侯家傳奏草味其詞㫖玩其筆勢直有跨越古今開闔宇宙之氣然與今版本文集不同疑集中者乃刪潤定本而此紙乃其胸懐本趣也嘗欲抄目録李傳本語附其後而并刻之使後之君子得以考焉而未暇也今江西使者汪兄季路乃欲取而刻之臨川妄意欲求相公一言以重其事庻幾覽者有以知此幅紙數行之間而其所闗渉乃有不可勝言之感非獨為筆札玩好設也伏惟相公亦當慨然於此而終惠之早賜揮染附季路為幸甚厚其他尚有與王觀文論邉事數紙異時并當附呈以求審定也專此具禀不敢它及伏乞鈞照答周益公昨蒙寵喻范歐議論鄙意有所不能無疑欲以請教而亦未暇今遇此便似不可失而病軀兩日覺得沉重愈甚於前勢不容詳細禀白但竊以為范歐二公之心明白洞逹無纖芥可疑吕公前過後功瑕瑜自不相掩若如尊喻却恐未為得其情者故願相公更熟思之也向見范公與吕公書引汾陽臨淮事者語意尤明白而集中却不見之恐亦為
