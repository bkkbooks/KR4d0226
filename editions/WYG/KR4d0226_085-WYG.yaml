body:
  text: 啓婚書上梁文講座銘紹興二十三年新安朱熹仲晦来為吏於同安而兼領其學事越明年五月新作講座以臨諸生顧其所以作之意不可以不銘銘曰師道絶塞以圮其居今其言言亦莫我敢都前聖後師文不在兹如或見之有儼其思立之堂壇惟以有嚴厥臨孔昭式訛爾瞻四齋銘志道曰趨而挹者孰履而持曰飢而寒者誰食而衣故道也者不可須臾離子不志於道獨㒺罔其何之據徳語道術則無往而不通談性命則疑獨而難窮惟其厚於外而薄於内故無地以崇之依仁舉之莫能勝行之莫能至雖欲依之安得而依之為仁由已而由人乎哉雖欲違之安得而違之㳺藝禮云樂云御射數書俯仰自得心安體舒是之謂㳺以㳺以居鳴呼㳺乎非有得於内孰能如此其從容而有餘乎鼓銘擊之鏜兮朝既暘兮巧趨蹌兮至樂齋銘葉學古讀書蕭寺取歐陽子詩語名其室曰至樂紫陽朱熹仲晦父實為之銘呻吟北窓氣鬱不舒我讀我書如病得甦客問此書中作何味君乃嗜之如此其至趣為子語無味乃然是有味者乃㾞乃羶天下之樂我不敢知至歐陽子乃敶斯詩我思古人實感我心惟曰愔愔式鈎且深南劍州尤溪縣學明倫堂銘天敘有典匪學弗明我作此堂大猷是經匪忠曷勸匪孝曷程咨爾學子永觀厥成又四齋銘崇徳尊我徳性希聖學兮玩心神明蛻汚濁兮廣業樂節禮樂道中庸兮克勤小物奏膚公兮居仁勝已之私復天理兮宅此廣居純不已兮由義羞惡爾汝勉擴充兮遵彼大路行無窮兮學古齋銘浦城周侯嗣恭葺其先大父徽猷公所作學古齋以教齊宗族子弟新安朱熹為題其榜周侯又来請銘則推其意乃作銘曰相古先民學以為已今也不然為人而已為已之學先誠其身君臣之義父子之仁聚辨居行無怠無忽至足之餘澤及萬物為人之學􅂱然春華誦數是力纂組是誇結駟懐金煌煌煒煒世俗之榮君子之鄙維是二者其端則微眇綿弗察胡越其歸卓哉周侯克承先志日新此齋以迪来裔此齋何有有圖有書厥裔斯何衣冠進趨夜思晝行咨詢謀度絶今不為惟古是學先難後獲匪亟匪徐我其銘之以警厥初尊徳性齋銘内弟程允夫以道問學名齋予謂當以尊徳性易之允夫請銘因為作此維皇上帝降此下民何以予之曰義與仁維義與仁維帝之則欽斯承斯猶懼弗克孰昏且狂茍賤汙卑淫視傾聴惰其四肢䙝天之明慢人之紀甘此下流衆惡之委我其監此祇栗厥心有幽其室有赫其臨執玉奉盈須臾顛沛任重道逺其敢或怠敬恕齋銘莆陽陳師中讀書之室新安朱熹題以敬恕且為之銘出門如賓承事如祭以是存之敢有失墜已所不欲勿施于人以是行之與物皆春胡世之人恣已窮物惟我所便謂彼奚䘏孰能反是斂焉厥躬于牆于羮仲尼仲弓内順于家外同于邦無小無大㒺時怨恫為仁之功曰此其極敬哉恕哉永永無斁求放心齋銘番陽程正思作求放心齋汪子卿祝汝玉既為之銘新安朱熹掇其遺意復為作此天地變化其心孔仁成之在我則主于身其主伊何神明不測發揮萬變立此人極晷刻放之千里其奔非誠曷有非敬曷存孰放孰求孰亡孰有屈伸在臂反覆惟手防微謹獨兹守之常切問近思曰惟以相之書字銘明道先生曰某書字時甚敬非是要字好只此是學握管濡毫伸紙行墨一在其中㸃㸃畫畫放意則荒取妍則惑必有事焉神明厥徳劉屛山復齋蒙齋二琴銘屏山先生之琴二其嗣子玶葆藏之門人朱熹敬為作銘匪金匪石含玉真兮雷伏于腹閟其神兮砰然一作萬物皆春兮我覿器寳懐若人兮主静觀復修厥身兮與時偕屈而不及其伸兮復齋抑之幽然者若直其遇險而止寫之泠然者若導其出山之泉盖先生之言不可得而聞矣若其亨貞之意則託兹器而猶傳蒙齋黄子厚琴銘黄子琴號純古晦翁銘之無名之樸子所琴兮扣之而鳴獲我心兮杳而弗黙麗弗淫兮維我知子山髙而水深兮紫陽琴銘養君中和之正性禁爾忿欲之邪心乾坤無言物有則我獨與子鈎其深尺銘有矗其經有棘斯緯字體變化忽與神㑹倨句如矩其繩則直我端我躬允相兹尺又魯曽氏作斯器正文字畀来系窗銘言思毖動思躓過思棄端爾躬正爾容一爾衷寫照銘乾道九年嵗在癸巳予年四十有四而容髪凋悴遽已如此然亦將修身以畢此生而已無他念也福唐闕元為予寫照因銘其上以自戒云闕端爾躬肅爾容檢於外一其中力於始遂其終操有要保無窮題魏府藏趙公飲器趙公飲器魏府藏我思兩公愛甘棠惟魏子孫寳無斁敬奉其盈如弗克平陵朱熹拜手書魏國公府犀爵銘丞相趙公所餽公者天水公屹堂堂舉兕爵孰敢當惟魏公一心膂受蔵之永終古後之人奉其盈如不克視熹銘懐玉硯銘我輯墜簡大法以存孰摯其寳使與斯文㸃染之餘往夀逋客墨爾毫端毋俾𤣥白慶元丁巳三月庚子懐玉南谿近出此石徐斯逺以予方討禮篇持以為贈㑹分半稿以属吕子約於髙安因掇寄之慶元强圉大荒落日南至晦翁記藏書閣書厨字號銘於穆元聖繼天測靈出此謨訓恵我光明永言寳之匪金厥籝含英咀實百世其承敬齋箴讀張敬夫主一箴掇其遺意作敬齋箴書齋壁以自警云正其衣冠尊其瞻視􅅗心以居對越上帝足容必重手容必恭擇地而蹈折旋蟻封出門如賓承事如祭戰戰兢兢罔敢或易守口如瓶防意如城洞洞屬屬罔敢或輕不東以西不南以北當事而存靡他其適弗貳以二弗參以三惟精惟一萬變是監従事於斯是曰持敬動静無違表裏交正須臾有間私欲萬端不火而熱不冰而寒毫釐有差天壤易處三綱既淪九法亦斁於乎小子念哉敬哉墨卿司戒敢告靈臺調息箴鼻端有白我其觀之隨時隨處容與猗移静極而嘘如春沼魚動極而翕如百蟲蟄氤氲開闢其妙無窮孰其尸之不宰之功雲卧天行非予敢議守一處和千二百嵗易五贊原象太乙肇判隂降陽升陽一以施隂兩而承惟皇昊羲仰觀俯察竒耦既陳兩儀斯設既榦乃支一各生兩隂陽交錯以立四象竒加以竒曰陽之陽竒而加耦陽隂以章耦而加竒隂内陽外耦復加耦隂與隂㑹兩一既分一復生兩三才在目八卦指掌竒竒而竒初一曰乾竒竒而耦兌次二焉竒耦而竒次三曰離竒耦而耦四震以隨耦竒而竒巽居次五耦竒而耦坎六斯睹耦耦而竒艮居次七耦耦而耦八坤以畢初畫為儀中畫為象上畫卦成人文斯朗因而重之一貞八悔六十四卦由内達外交易為體往此来彼變易為用時静而動降帝而王傳夏厯商有占無文民用弗彰文王繫彖周公繫爻視此八卦二純六交乃乾斯父乃坤斯母震坎艮男巽離兑女離南坎北震東兑西乾坤艮巽位以四維建官立師命曰周易孔聖傳之是為十翼遭秦弗燼及宋而明邵傳羲畫程演周經象陳數列言盡理得彌億萬年永著常式述㫖昔在上古世質民淳是非莫别利害不分風氣既開乃生聖人聰明睿智出類超羣仰觀俯察始畫竒耦教之卜筮以㫁可否作為君師開鑿户牖民用不迷以有常守降及中古世變風移淳澆質喪民偽日滋穆穆文王身蒙大難安土樂天惟世之患乃本卦義繫此彖辭爰及周公六爻是資因事設教丁寧詳密必中必正乃亨乃吉語子惟孝語臣則忠鈎深闡微如日之中暨乎末流淫于術數僂句成欺黄裳亦誤大哉孔子晚好是書韋編既絶八索以袪乃作彖象十翼之篇専用義理發揮經言居省象辭動察變占存亡進退陟降飛􅅗曰毫曰釐匪差匪謬加我數年庶無大咎恭惟三古四聖一心垂象炳明千載是臨惟是學者不本其初文辭象數或肆或拘嗟予小子既微且陋鑚仰沒身奚測奚究匪警滋荒匪識滋漏維用存疑敢曰垂後明筮倚數之元參天兩地衍而極之五十乃備是曰大衍虚一無為其為用者四十九蓍信手平分置右於几取右一蓍掛左小指乃以右手揲左之䇿四四之餘歸之于扐初扐左手無名指間右䇿左揲將指是安再扐之竒通掛之筭不五則九是謂一變置此掛扐再用存䇿分掛揲歸復準前式三亦如之竒皆四八三變既備數斯可察數之可察其辨伊何四五為少八九為多三少為九是曰老陽三多為六老隂是當一少兩多少陽之七孰八少隂少兩多一既得初爻復合前蓍四十有九如前之為三變一爻通十八變六爻發揮卦體可見老極而變少守其常六爻皆守彖辭是當變視其爻兩兼首尾變及三爻占兩卦體或四或五視彼所存四二五一二分一専皆變而他新成舊毁消息盈虚捨此視彼乾占用九坤占用六泰愕匪人姤喜来復稽類八卦之象説卦詳焉考之於經其用弗専彖以情言象以象告惟是之求斯得其要乾健天行坤順地從震動為雷巽入木風坎險水泉亦雲亦雨離麗文明電日而火艮止為山兑説為澤以是舉之其要斯得凡卦六虚竒耦殊位竒陽耦隂各以其類得位為正二五為中二臣五君初始上終貞悔體分爻以位應隂陽相求乃得其正凡陽斯淑君子居之凡隂斯慝小人是為常可類求變非例測非常曷變謹此為則警學讀易之法先正其心肅容端席有翼其臨于卦于爻如筮斯得假彼象辭為我儀則字從其訓句逆其情事因其理意適其平曰否曰臧如目斯見曰止曰行如足斯踐毋寛以略毋密以窮毋固而可毋必而通平易從容自表而裏及其貫之萬事一理理定既實事来尚虚用應始有體該本無稽實待虚存體應用執古御今由静制動潔静精微是之謂易體之在我動有常吉在昔程氏繼周紹孔奥㫖宏綱星陳極拱惟斯未啟以俟後人小子狂簡敢述而申之復卦贊萬物職職其生不窮孰其尸之造化為工隂闔陽開一静一動於穆無疆全體妙用奚獨於斯􅅗陽壯隂而曰昭哉此天地心盖翕無餘斯闢之始生意蓊然具此全美其在于人曰性之仁斂蔵方寸包括無垠有茁其萌有惻其隠于以充之四海其準曰惟兹今眇綿之間是用齋戒掩耳閉闗仰止羲圖稽經協傳敢賛一辭以詔無倦六先生畫像賛濂溪先生道喪千載聖逺言湮不有先覺孰開我人書不盡言圖不盡意風月無邊庭草交翠明道先生揚休山立玉色金聲元氣之㑹渾然天成瑞日祥雲和風甘雨龍徳正中厥施斯普伊川先生規員矩方繩直準平允矣君子展也大成布帛之文菽粟之味知徳者希孰識其貴康節先生天挺人豪英邁盖世駕風鞭霆厯覽無際手探月窟足躡天根閑中今古醉裏乾坤横渠先生早悦孫吳晚逃佛老勇撤􅆏比一變至道精思力踐妙契疾書訂頑之訓示我廣居洓水先生篤學力行清修苦節有徳有言有功有烈深衣大帶張拱徐趨遺象凛然可肅薄夫張敬夫畫象賛亡友荆州牧張侯敬夫畫象新安朱熹為之賛曰擴仁義之端至於可以彌六合謹善利之判至於可以析秋毫拳拳乎其致主之切汲汲乎其幹父之勞仡仡乎其任道之勇卓卓乎其立心之髙知之者識其春風沂水之樂不知者以為湖海一世之豪彼其揚休山立之姿既與其不可傳者死矣觀於此者尚有以卜其見伊吕而失蕭曹也耶吕伯恭畫象贊括蒼潘君叔度畫其先師東莱吕氏伯恭父之象于可菴退老堂之上曰使西河之民毋疑我於夫子也属其友朱熹賛之為作詞曰以一身而備四氣之和以一心而涵千古之祕推其有足以尊主而庇民出其餘足以範俗而垂世然而狀貌不踰於中人衣冠不詭於流俗迎之而不見其来隨之而莫睹其躅矧是丹青孰形心曲惟嘗見之者於此而復見之焉則不但遺編之可續而已也陳明仲畫象賛故候官大夫陳君明仲之象友人朱熹仲晦父賛之曰介然而不使人忌者其自持之謹温然而不使人狎者其汎愛之和其仕也自詭以循良之最其學也自期以徳行之科嗚呼孰謂其齎此志而中道以沒使吾老於其里而不得為東阡北陌之經過也耶程正思畫象賛程君正思畫象朱仲晦父作賛嗚呼正思退然如不勝衣而自勝有以舉烏獲之任言若不出諸口而衞道有以摧髠衍之鋒俛焉曰有孳孳者吾方未見其止乃一朝而至此則天曷為而不假之夀以成其終嗚呼此猶未足以見其七分之貌来者亦姑以是而想象其遺風紹熙壬子重陽前一月書月字疑日字之誤書畫象自警從容乎禮法之場沈􅅗乎仁義之府是予盖將有意焉而力莫能與也佩先師之格言奉前烈之餘矩惟闇然而自修或庶㡬乎斯語聚星亭畫屏賛并序按世説陳太丘詣荀朗陵貧儉無僕役乃使元方將車季方持杖従後長文尚小載著車中後漢書曰陳實字仲弓潁川許人嘗為聞喜令遷太丘長修徳清静百姓以安後以黨人連及逮捕人多逃避求免實曰我不就獄衆無所恃乃請囚焉遇赦得出宦者張讓權傾天下父死歸葬潁川名士無往弔者而實獨弔焉後復誅黨人讓以實故多所全宥實在鄉閭平心率物或有争訟輒求判正曉譬曲直退無怨者黨禁解累徵不起年八十四卒諡曰文範先生又曰荀淑字季和潁川潁隂人也少有髙行博學而不好章句州里稱其知人李固李膺皆師宗之舉賢良方正對䇿譏刺貴倖梁冀忌之出補朗陵侯相莅事明理稱為神君棄官而歸閑居養志又曰陳紀字元方實長子也至徳絶俗與實髙名並著而弟諶字季方又配之每宰府辟召羔雁成羣世號三君百城皆圖畫紀子羣字長文為魏司空既至荀使叔慈應門慈明行酒餘六龍下食文若亦小坐著膝前荀淑有八子儉緄靖燾注爽肅敷居西豪里縣令苑康曰昔髙陽氏有才子八人遂署其里為髙陽里時人號曰八龍靖字叔慈有至行不仕早卒號曰𤣥行先生爽字慈明年十二通春秋論語潁川為之語曰荀氏八龍慈明無雙舉至孝拜郎中對䇿陳便宜數千言即棄官去後坐黨錮隠遁十餘年董卓用事徵拜司空爽以卓忍暴終危社稷多舉才畧之士與王允等密謀討之未及而以病終後允乃竟誅卓緄子彧字文若少時父以畏禍為娶宦者唐衡女後従曹操操以為謀主比之子房及操將受九錫彧諫止之遂為所害彧亦作郁于時太史奏真人東行續晉陽秋曰陳仲弓従諸子姪造荀父子于時徳星聚太史奏五百里賢人聚考亭陳氏故有離榭名以聚星盖取續陽秋語中更廢壊近始作新適邇敝廬因得相其役事既又為之本原事迹畫著屏上并為之賛以視来者云猗歟陳子神嶽鍾英文淵範懿道廣心平危孫汙隆卷舒自我是曰庶㡬無可不可獻身安衆弔豎全邦炯然方寸秋月寒江願言懐人曰我同志故朗陵君荀季和氏連峯對起麗澤􅅗滋僾而不見有黯其思薄言造之顧無僕役獨呼二兒駕予以出青芻黄犢布幰柴車䇿紀前衞杖諶後趨所造伊何髙陽之里維時荀君聞至而喜顧謂汝靖往應于門七龍矯矯布席開尊靖肅而前翁拜其辱何悟斯晨得見清穆命爽行觴旅饋次陳獻酬交錯禮度情親載笑載言㒺非徳義益邁乃猷以輔斯世髧髦兩稚亦著膝前原深本固莫出匪賢維此慈明特謝儔匹晚際國屯敢憚濡迹贅旒之命恃以少延邦朋之最孰與為先郁乃附曹羣亦忘漢嗣守之難古今共歎崇臺囘極于以占天猶曰兹野徳星萃焉我寓有亭舊蒙斯號今刺前聞象儀以告髙山景行好徳所同課忠責孝獨槩余衷百爾窺臨竟考毋怠死國承家永奉明戒南康軍到任謝表臣熹言伏奉勅命差臣權發遣南康軍尋具辭免奉聖㫖不允辭免令疾速前去之任候任滿前来奏事臣已於淳熙六年三月三十日到任交割職事訖者迂愚無用久陪香火之班臨照不遺驟假兵民之寄懇辭弗獲宣布云初感極涕零愧深汗洽中謝伏念臣受材凡近賦性顓蒙徒能讀古人之書夫豈識當世之務頃蒙登進獲奉清閒繼逺迹於丘樊遂閲嵗華之久顧馳心於魏闕敢忘葵藿之誠中兩奉於除書亦屢祇於召節銜哀抱病既莫效於驅馳假寵疏榮反繆膺於眷奬方誓堅於素守庶少答於殊知豈意因仍復階任使論資校考既已極於超踰揣分量能懼愈難於稱塞矧自乖於夙志又仰負於前恩雖嘗控􅅹而莫回終坐懦庸之無守遂扶衰朽暫别故山已見吏民具宣徳意豈曰昨非而今是實繇義重而身輕此盖伏遇皇帝陛下性得堯仁道髙舜哲念安民之不易故慮尤軫於逺方謂知人為甚難故用或收於棄物致兹孱瑣亦備使令臣敢不仰奉詔條俯詢民瘼儻粗間於疾疢詎辭撫字之勞冀少假於旬時卒上退蔵之請尚全末路克對寵光浙東提舉到任謝表宣教郎直祕閣提舉兩浙東路常平茶鹽公事臣朱熹上表臣言準告授臣前件差遣填見闕臣已於今月六日就本路蕭山縣交割職事訖者擢於偏壘付以外臺便道造朝單車詣部延見父老問其疾苦之因宣布詔書諭以丁寧之意榮踰望表懼溢情涯中謝伏念臣生長田間棲遲林壑居然朴拙見謂迂踈􅅗心竊慕於師承行已敢干於義命㑹逢聖旦參預時流驟自草莱起分符竹乾坤大徳施且不貲螻蟻私情報於何所属歉嵗民無艱食謂愚臣職有微勞寵之册府之華畀以近畿之節雖駑馬之十駕後者鞭之然鼯鼠之五窮技止此耳毋乃累公朝之選重以為多士之羞兹盖恭遇皇帝陛下闢舜四門馭周八柄欲尺寸之長並用致孱微之品亦收比奉對揚親叨臨遣大明委照不棄負薪之言零露疏恩更下賜緡之令顧憂所在稱塞為難臣惟當恪意講求因時施舍不能則止戒小闕之闕當官而行慕古人之報國庶殫毫末上答丘山臣無任謝依所乞仍舊直寳文閣及賜詔書奬諭表臣熹言臣昨具狀辭免新除祕閣修撰恩命近準尚書省劄子奉聖㫖依所乞仍舊直寳文閣仍賜臣詔書一道特加奨諭者白記上聞幸曲全於愚守璽封下逮庸特示於異恩祇服以還戰兢無已中謝伏念臣學雖違俗意敢近名徒以迂疎蚤絶榮途之望乃遭神聖晚深國士之知中少效於驅馳竟靡聞於報稱及奉金華之召寧忘丹扆之忠顧惟塵腐之淺聞莫副緝熙之隆指逮復退閑之秩仍升論譔之華寵雖荷於殊常義終慚於非據故上聖方臨於宸極而微臣屢觸於天威自度孤危豈勝糜滅敢意出綸之渥有嘉陳義之明幸引分之少安愧叨榮之愈甚兹盖伏遇皇帝陛下重明必照大度并容謂臣粗業詩書諒亦有聞於古義憐臣稍知㢘恥欲其無負於初心特屈憲章過形褒勸臣敢不服膺至教邁迹前修不忮不求何止終身之誦是彝是訓庶㡬有極之歸臣無任漳州到任謝表朝散郎直寳文閣權發遣漳州軍州事朱熹上表臣熹言準勅差前件差遣已於四月二十四日到任訖抱病支離莫副光華之遣封章懇切更叨選用之良引避弗囘兢惶失次即强扶於枯朽已親見於耄倪仰戴恩威俯深感懼中謝伏念臣蚤由場屋獲厠縉紳惟自信其迂愚故絶希於榮進中荷夀皇之深眷屢嘗收用而終許退蔵晚逢嗣聖之誤知亦既閔勞而復加任使凡此兩朝之殊遇豈伊一介之能堪矧漳浦之名邦實甌閩之絶徼青衫捧檄昔嘗粗習其土風白首分符今庶少安於甿俗静揣不才之分極知為幸之多此盖伏遇皇帝陛下近法舜功逺循堯道九徳咸事尚憂片善之或遺四方無虞猶軫一夫之不獲肆曲收於棄物俾加恵於逺黎臣敢不深體皇仁廣詢民瘼筋骸可勉豈忘盡瘁之勤疾疢或加未免告歸之瀆尚繄覆燾卒遂生成臣無任除祕閣修撰謝表朝散郎新授祕閣修撰主管南京鴻慶宫臣朱熹上表言準告授前件職事臣再具辭免奉聖㫖論譔之職以寵名儒依已降指揮不許辭免臣已於八月二十三日望闕謝恩祇受訖者愚誠屢黷初必冀於矜從成命莫回反重勤於褒借叨踰已甚俯僂何容中謝伏念臣賦質甚迂遭時獨異頃罷外臺之使薦陞内閣之華至於論撰之除尤荷聖神之眷顧無名而有愧遂瀝悃以祈哀本謂夀皇知遇之深當卒全其素守敢意睿主清明之始即洞鑒其丹衷逮兹因事以求閑重以牧民之無狀乃逭黜幽之典復加申命之恩危悃再殫俞音終閟更諭崇儒之意俾知假寵之由仰隆指之若斯豈固辭之敢必措躬無所引分弗遑此盖伏遇皇帝陛下盛徳日新至仁天覆欲風勵於四方之士誤用奨於一介之臣臣敢不祇服訓詞恪思職業對揚休命惟慚薄技之無堪敷暢遺經尚冀方来之有補以兹塵瀆少答生成瞻望闕廷臣無任潭州到任謝表朝散郎秘閣修撰權發遣潭州軍州事主管湖南安撫司公事臣朱熹上表言臣昨準告命差臣前件差遣已於五月初五日交割職事訖者衰病卧家不堪驅使誤恩分閫重玷選掄雖屢控於懇辭顧曲勤於褒諭寵榮實異感懼難勝亟扶曳以就塗已支持而視事中謝伏念臣迂疎末學災患餘生得陪香火之班豈復冠紳之念海瀕牧養尚愧彊顔嶺表蕃宣幸蒙反汗豈期巨屏洊拜明綸昔獨避禮樂之華今専辱詩書之試况學兼嶽麓修明逺自於前賢而壤帶洞庭鎮拊近煩於元老俾承二任孰稱萬分豈惟冒辭逺就近之嫌抑恐為知人安民之累雖欲量能而易地自知無力以回天勉見吏民具宣威徳兹盖伏遇皇帝陛下文明出治仁孝保邦謂臣有討古之勤以臣懐澤物之志假之師帥之職責以治教之功臣敢不仰佩訓詞俯殫學力雖馳驅靡及唯知趨事之誠或黽勉不前願遂歸田之請預陳悃愊終望矜憐謝除待制侍講修撰實錄表臣熹言伏奉告命授臣煥章閣待制侍講又準勅差兼實錄院同修撰者分閫南州愧蔑一毫之補論經内閣恍驚二命之頒畀史職以仍兼戴上恩而愈重蔵逃莫避跼蹐靡容中謝竊以王求多聞是惟建事帝入西學于以上賢當始初清明之朝資朝夕論思之助作於心而闗政事必救其原修其身以及國家要知所本非精誠之有格何論説之足云視孟軻之敬王始不負聖人之學為張禹之持禄殆將貽天下之憂况薦紳之所難又載筆之為重顧頭白汗青之可誚豈槁項黄馘之能為念昔先臣嘗掌兹事正熙寧元豐之殽舛嚴於朱墨之分辨元祐紹聖之譏誣炳若丹青之著茍無家業曷踐世官懵而居之吁亦危矣伏念臣見聞甚狭才識非長開七袠之殘年荷三朝之異眷頃叨崇政之選嘗獲遂於終辭兹玷邇英之聨靦莫從於素守此盖伏遇皇帝陛下言稽往訓動法成謨以緝熙光明之美而佛時仔肩以剛健篤實之資而日新其徳念遺大投艱之託推好善忘勢之勤借是孤蹤聿来多士講魯論一簞之義敢竊企於師傳誦楚史八索之文庶無忘於規益臣無任感天荷聖激切屏營之至辭免待制仍舊充秘閣修撰提舉南京鴻慶宫謝表臣熹言伏蒙聖恩以臣累奏辭免煥章閣待制特降睿㫖依臣所乞仍舊充秘閣修撰提舉南京鴻慶宫者假寵過優居速冒榮之愧封章屢却退深留令之虞敢謂天慈訖從人欲恩隆莫報感極何言中謝伏念臣早以迂儒濫塵官簿晚逢興運誤簡淵衷首頒召節之光華促侍經帷之清燕趨廂侍對復過借於龍光挟䇿陳詞竟何裨於帝學旋奉閔勞之詔適諧退處之私雖竊便安甫深依戀第顧山林之逺迹難通禁闥之近班亟冒威顔薦輸卑悃幸所陳之大義已孚於未拜之前故引避之微誠得遂於終辭之後然匪聖神之洞照敢期耉陋之曲全而况内閣簡編未賛兩朝之深眷舊邦香火有嚴四聖之真㳺足安垂盡之期允謂非常之遇此盖伏遇皇帝陛下仁涵萬有徳奉三無謂臣於勸講之功雖無所就察臣所懇辭之意悉出於誠特畀俞音使償本願臣敢不益堅素守仰稱鴻施景雖迫於桑榆力難報國身未填於溝壑詎敢忘君臣無任落職罷宫祠謝表臣熹言臣前任祕閣修撰提舉南京鴻慶宫今年五月十三日已該滿罷至二十七日伏準尚書省慶元二年十二月劄子節文臣寮論臣罪惡乞賜睿㫁禠職罷祠奉聖㫖依臣已於當日謝恩祇受訖者罪多擢髪分甘兩觀之誅量極包荒姑示片言之貶逮復尋於白簡始知麗於丹書鐫延閣論譔之名輟真祠香火之奉兹為輕典允賴洪私捧戴奚勝感蔵曷喻中謝伏念臣草茅賤品江海孤生蚤值明時已誤三朝之眷奨晚逢興運復叨上聖之深知召自藩維擢參帷幄畧無可紀足稱所蒙暨逺去於朝行即永歸於農畆然猶賦之秩禄使庇身於卜祝之間寘在清流容厠迹於圖書之府所宜恭恪或逭悔尤乃弗謹於彝章致自投於寛網果煩臺劾盡發隂私上瀆宸嚴交駭聞聴凡厥大譴大訶之目已皆不忠不孝之科至於衆惡之交歸亦乃羣情之共棄而臣憒眊初㒺聞知及此省循甫深疑懼豈謂乾坤之造獨回日月之光畧首従之常規既俾但書於薄罰稽眚終之明訓儻許卒遂其餘生是宜衰涕之易零已覺大恩之難報此盖伏遇皇帝陛下堯仁廣覆舜哲周知謂表正於萬邦已極忠邪之判則曲全於一物未傷黜陟之公遂使㝠頑獲逃竄殛臣敢不涵濡聖澤刻厲愚衷雖補過以修身無及桑榆之暮景然在家而憂國未忘葵藿之初心瞻望闕廷臣無任落秘閣修撰依前官謝表臣熹言臣昨於慶元三年正月二十七日準尚書省劄子節文臣寮奏臣罪惡乞與褫職罷祠奉聖㫖依劄臣照㑹臣即於當日望闕謝恩解罷職名仍奉表稱謝去訖今於闕月闕日復準都進奏院遞到闕月闕日告命一道付臣落秘閣修撰依前官者彈文上徹已幸免於嚴誅詔墨下頒復寵加於明訓閲時既久祇命惟新感極涕零懼深首隕中謝伏念臣草茅賤士章句腐儒惟知偽學之傳豈適明時之用頃叨任使已屢奏於罔功旋即便安復未能於寡過致煩重劾盡掎宿愆謂其習魔外之妖言履市㕓之汙行有母而甞小人之食可驗恩衰為臣而髙不事之心足明禮闕以至私故人之財而納其尼女規學宫之地而改為僧坊諒皆考覈以非誣政使竄投而奚憾不虞恩貸乃誤保全第令少避於清班尚許仍居於散秩愸璽書之来下恍嵗律之還周視要囚詎止於旬時盖有遷就逮數惡難從於末減猶聴省循口誦以還心銘敢墜此盖伏遇皇帝陛下仁兼覆載明極照臨作福作威總大權而在已曰賢曰佞付公論於得人謂刑罰固足以懲姦而播告豈容於匿指式敷顯號徧警具寮臣敢不深省昨非細尋今是年齡晼晩雖悲後效之無期肝膽輪囷尚喜孤忠之有在誓堅死守覬答生成致仕謝表臣熹言四月二十三日準尚書省遞到勅牒一道伏奉聖㫖宜守本官致仕臣已於當日望闕謝恩訖者投閑置散方疑宿負之未償引户校年忽慶湛恩之純被適符忱請遂沐殊私揖杖知榮戀軒増慨中謝伏念臣聖朝賤士幽谷鄙生自審凡材每抱遺經而永歎人嗤僻學雖逢盛旦以何施乃誤選掄過叨任使然計出藩而入侍善無毫髪之稱獨聞倡偽以黨姦罪有丘山之積果煩清議卒抵大訶幸夙簡於皇明得下從於輕典跡已安於甿里禄猶寄於朝班出入三年未能寡過周旋再赦亦既蒙恩汔臻告老之期亟決歸田之計尚意拘縻於謫籍豈容遂休佚之懐暨聞播告於臺評方喜有允俞之望本原所自㑹幸何多此盖伏遇皇帝陛下神聖自天文明周物當彼忠佞交拏之際既皆判别而不疑逮其精華欲竭之時壹與休息而無間智仁兼盡威徳並流豈但一夫獨為私幸臣敢不仰陶至化俯遂餘年廣厦細旃雖已絶雲天之望東阡北陌尚難忘畎畝之忠生復何為死而後已一云仰􅅗至教益厲初心懍嵗月之無多雖已不堪於把玩悵淵冰之未免獨何敢怠於戰兢誓畢餘生仰酬大化天申節賀表黄屋非心茂對重明之運玉巵為夀聿臨載育之辰慶洽中天驩騰廣域中謝恭惟尊號至仁被世盛徳在躬立聖政九百五條行堯之道履帝位三十六載薦舜於天得聖人時心至愉而形至佚為天子父貴無敵而富無倫既申命之用休宜降年之有永臣欽逢盛旦假守偏城即雲氣而望蓬莱阻陪拜手觀泰元之授神筴徒切傾心㑹慶節賀表盛徳當陽光啓重熙之運羣心就日樂推歸美之誠有開繞電之祥敢罄祈年之禱中賀恭惟陛下慶流有衍徳合無疆膺厯數以在躬垂衣裳而致治接黄帝推筴迎日之統以莫不増過周家定鼎卜年之期自今其始臣承流支郡幸際昌辰鼇抃千官班阻趨於文石嵩呼萬嵗祝敢後於華封天申節功徳疏式逢舜旦慶龍樓虹渚之祥仰祝堯年假玉籍金輪之教大啓天人之㑹少伸臣子之心尊號伏願注南斗之長生等西方之無量上千萬嵗夀阻趨文石之班同億兆人心願效華封之祝㑹慶節功徳疏聰明作元后式開長發之祥黎獻惟帝臣願上無疆之頌欽崇殊利庸假勝緣恭願陛下日月照臨乾坤廣大仰瞻魏闕莫陪虎拜之班願比華封請祝虹流之祉祈雨疏丁壯在田厲農功之既作隂雲布野閔時雨之尚愆由拙政之不修顧疲民而何罪肆陳丹悃仰籲蒼穹伏願鼓以雷霆亟霈為霖之施澤及牛馬併銷連死之憂瞻仰歸誠吁嗟請命卧龍潭送水文往分靈液来即祠壇誠未格於幽􅅗澤尚愆於田畆惟時淹久懼弗吉蠲敢奉冰壺言歸貝闕别禱餘潤用弭炎氛尚神聴之淵沖鑒微衷而響答與江東張憲啓頃奉誤恩特令試郡屢陳危悃未許投閒懼留命以干誅已諏辰而就道伏念熹器非適用才不逮人粤自壯年薦罹災患暨兹晚景益就衰頽逝將屏迹於荒寒敢復萌心於仕進属九重之過聴恥一士之遐遺曲賜甄收載加湔拂遂從祠館畀以郡章倦鳥依林久絶髙飛之意􅅗魚在沼但知深入之安而况恩既厚則其責為甚深力不能則雖勞而無補遂竊祈於罷免卒無幸於矜従輿病以来彊顔特甚近瞻斧綉益愧冠紳恭惟徳厚望隆材宏用博適布宣於使指已明謹於邦刑激濁揚清吏咸思於稱職持平履正人自以為不寃矧是衰遲獲依庇冒載尋曩昔幸際光儀斂板趨庭兹不特少伸下吏之敬奉命承教殆有以深慰積年之思春令向深嘉生咸遂冀茂經於福履以前對於龍光頌願唯深敷宣莫既與葉提刑啓術畧精明材猷敏贍頃屢將於使指兹復謹於邦刑深窮法令之原吏無以肆茂著平反之績人用不寃顧此妄庸將依庇冒修容以進即伸巡属之恭奉教於前預切簡書之畏春和在序淑氣方升惟加厚於保綏用對揚於休渥傾瞻之悃頌述奚殫與姚提㸃啓學貫古今材周鉅細兹暫勞於節傳起盡䕶於東南子母相權已懋無窮之計君民兩足更宏可大之規顧此妄庸將依庇冒修容以進同上回寄居趙將仕啓熟聞英譽有日于兹忽奉珍函為禮特厚啓緘疾讀荷意難忘伏惟玉葉傳芳璇源孕秀謙恭克守綽有老成之風問學自將盡脱豪華之習宗盟推重公聴益孚㑹看發軔之初即快亨塗之騁熹属叨誤寵驟畀左符方斯引分以投閑未敢修書而見意豈圖先辱良用厚顔眷然息偃之安庶㡬得請邈矣披承之願徒切馳情回楊通判啓稔聞髙誼雖識面之未諧遽辱珍函仰撝謙之特厚拜嘉寵甚荷意難忘恭惟識量淵深器資宏博盤根錯節知剸割之無難茂實英聲盖蜚騰而甚久頃任監州之寄已聞奏課之優豈容堅卧於鄉閭㑹見横翔於禁闥熹属叨誤寵驟畀左符方斯引分以投閑未敢修書而見意豈圖先辱良用厚顔眷然田里之安庶㡬得請邈矣門牆之隔徒切馳情回曹職官啓分符假守深懐躐次之慙抗疏投閑久露由衷之請誤英僚之雅眷辱華問以為榮伏惟材識通時器資宏博裁煩剸劇曽無盤錯之難約已奉公克有㢘勤之譽㑹聞交薦即見横翔熹久與世疎難堪吏役儻資忠益或免悔尤悵疾病之有加不任牽勉念合并之無日祇益傾馳回教授啓學術深淳行能端直辟雍受業久聞多士之推先泮水横經復見諸生之承式英聲日茂異數鼎来熹久與世疎同上回都昌知縣啓分符假守深懐躐次之慙抗疏投閑久露由衷之請誤英僚之雅眷辱華問以為榮伏惟某官器宇宏深才猷敏邵銅章墨綬煩暫試於鳴弦錯節盤根顧何勞於逰刃㑹聞課最别奉詔除熹久與世疎難堪吏役儻階聨事庶獲蒙成悵病疾之有加不任牽勉念合并之無日祇益傾馳與正言啓懇辭使節敢擇地以求安申畀郡符忽自天而疏寵凜難回於上命耿莫遂於初心以數年疾病之餘任千里撫摩之寄雖加强勉尤切凌兢伏念熹林壑閑蹤布韋故習少而慕古師出處於前修介不通今恥浮沈於流俗曩荷聖神之眷屢加選用之榮當官而行盖圖報上知難則止匪欲為髙既疾疢之交攻且形神之俱耗久便田廬之偃伏詎堪原隰之驅馳辭尊居卑豈為貧而猶仕投閑置散或揣分之誠宜敢期宸渥之過優復使侯藩之假守意昔時之㳺宦固嘗習熟於鄰封謂晚嵗之衰殘尚可従容於道院然比年之非舊由積弊之相仍財賦既促而費用寢浮田産不均而姦欺滋出要必更張而乃善恐非卧治之能勝深虞五技之窮仰負九重之託伏惟正言大明國論力振朝綱心正意誠盖得本原之學諫行言聴汔臻膏澤之流每於獻納之雍容尤務推揚於疎逖肆如枯朽誤玷承宣二千石之第循良已預慙於共理八十日而賦歸去初何俟於終更悃愊之私剡摩㒺既謝政府啓漳州解罷得祠迫憂患以求閑方陳危懇即便安而誤寵并沐殊私弗遂懇辭迄成忝冒伏念熹學惟信已材不逮人生際休明豈自甘於淪棄病侵遲暮久莫奉於驅馳比叨民社之臨猶冀桑榆之効属私門之變故致公務之弛隳黽俛旬時已積簡書之畏顧瞻疇昔未忘香火之修仰洪造之不違服明恩而已厚敢意便蕃之錫更陞論譔之華顧夀皇特達之深知昔幸容其遜避而聖上丁寧之申命今復軫於眷懐惟拜賜之無名屢騰章而自列重煩睿㫖曲借寵光仰戴皇慈欲終辭而不敢自憐末路知仰報之難圖祇命以還措躬無所兹盖伏遇丞相國公妙熙天縡獨運化鈞樞使相公力扶皇極獨運鴻樞㕘政同知相公夙推衆望久賛化鈞欲儲材於朽鈍之餘肯垂意於事功之外遂令衰晚有此叨踰熹敢不思稱榮名勉終素業考諸前聖倘不謬於正傳覺彼後知或少裨於大化過此以往未知所裁答辛幼安啓光奉宸綸起持憲節昔愚民犯法既申震讋之威今聖上選賢更作全安之計先聲攸暨慶譽交興伏惟某官卓犖竒材疏通逺識經綸事業有股肱王室之心㳺戲文章亦膾炙士林之口軺車每出必著能名制閫一臨便收顯績兹久真庭之逸爰深正宁之思當季康患盗之時豈張敞處閒之日果致眷渥特畀重權歌皇華之詩既諭示君臣之好稱直指之使想􅅗消郡國之姦第恐賜環不容暖席熹茍安祠祿獲託部封属聞斧繡之来嘗致鼎裀之問尚煩縟禮過委駢緘雖雙南金恐未酬於鄭重况一本薤亦奚助於髙明但晤對之有期為感欣而無已還鄉謝人恵書啓逺勤車盖已欣獲奉於清標寵被函書復喜與聞於雅趣第慙衰陋莫稱揄揚雖請誦其所聞盖嘗自竭尚敬修其可願式副深期過是以還未知所報謝人投生日詩啓年及無聞已負蓬弧之志日臨初度復増莪蔚之悲誤辱謙光俯加賁飾顧兹衰朽雖黼黻以何施仰歎瑰竒用襲蔵而為好回謝解啓待問澤宫登名天府方幸䆒宣於明詔敢期誤枉於華牋披味以還感蔵難喻解元先輩學髙庠序行著州閭疇昔旦評已推髙於前列厥今嵗舉反見屈於後来顧輿議之弗平宜壯圖之未快然察四端之固有第聞辭遜之心旋觀三揖之彌文盖敦㢘退之節矧是専經之舊豈忘立教之端諒考聖言益恢賢業捄洙泗齗齗之弊尚及此時致唐虞濟濟之和更期異日回黄氏定書摳衣問政夙仰吏師之賢受幣結婚兹喜徳門之舊逺承嘉命良慰鄙懐令兄察院位第四令姪直卿宣教厲志為儒久知為已熹第二女子服勤女事殊不逮人雖貪同氣之求實重量材之愧於異日執笄以見倘免非儀則他年覆瓿之傳庶無墜失此為忻幸曷可喻云回范氏定書兩翁抗議已偕許國之忠再世聨姻遂忝通家之好及兹幸㑹夫豈偶然伏承某人詩禮有聞方謹好逑之擇而熹女徳容未習亦期吉士之歸誤煩匪斧之求遽委儷皮之聘欽承嘉命實重永懐雖唐虞世祿之榮莫容攀附然鴻耀素風之懿或可庶㡬欣荷之私敷陳㒺既回周氏定書里閭追逐久欽臭味之同媒妁往来遂講婚姻之好静言衰落敢意扳聨兹承令弟府判以第二令姪先輩詩禮早聞不輕授室謂熹長男房下長孫女組紃粗習亦欲有家飾禮幣以見臨枉函書而甚寵老懐易感適増䑛犢之悲之子于歸倘遂乘龍之喜其為慰幸豈易名言同安縣學經史閣上梁文兒郎偉大同古地駱粤名邦間出巨人鼎在公卿之位亦多賢士鬱為閭里之師雖山川之炳靈迺教化之純被比罹屯難益復澆漓學校荒涼久風猷之不競圖書散脫閴絃誦以無聲詔令壅而弗宣父兄以為大戚顧惟竊食敢不究心是以申諭諸生俾沈􅅗於訓義力裒衆記務廣博其見聞幸大府之哀憐總羣書而推予惟上賢篤意於教誘使邑子蒙幸於作成爰即學宫創為傑閣庶緘縢之慎固絶蟲䑕之覬覦既畫諾於縣庭旋受金於省户西曹藉力羣彦併心而吏惰不供㡬若道旁之室顧人疲久役將起澤門之謳迨程事之既嚴始掄材而甫就僝功見效獻室有期不惟士得讀未見之書人知自勵且使書得為無窮之利計以永存聊出詞章用升梁欐想均童耄共此歡呼兒郎偉抛梁東曉日曈曨出海紅照見黌堂通複閣層甍如畫揷晴空兒郎偉抛梁西春草秋雲極望低文圃山髙君莫羨聖門􅏭嵲與天齊兒郎偉抛梁南滄溟無際水天涵蕩潏魚龍君莫畏淵源學海更潭潭兒郎偉抛梁北錯落衆星髙拱極昭回運轉君莫疑燦爛光明在方冊兒郎偉抛梁上聖朝碩輔蘇丞相魯無君子定虚言猶是諸生丈人行兒郎偉抛梁下人老遺書追董賈諸生勉繼舊王貢時泰不憂身在野伏願上梁之後士無廢業家有傳書究述作之原遂見古人之大體際功名之㑹起為當世之儒宗惟不悖其所聞乃式符於深望晦庵集卷八十五欽定四庫全書晦庵集卷
