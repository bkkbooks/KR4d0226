front:
  text: 過乳香度牒錢一萬餘貫凑糴軍糧支遣官兵及撥到賑糶米五萬石又拖欠兩年上供折帛月樁等錢共九萬三千四百一十六貫石匹兩然後遺民復得存活以至今日今兹不幸復罹枯旱之災又䝉御筆深詔守臣精加祈禱而熹奉職無狀無以感格幽明祈禱兩月殊無應效今則早田十損七八晚田亦未可知正使幸得薄收其數亦不能當早田之一二訪問耆老皆云乾道七年之旱雖不止於如此然當時承屢豐之後富家猶有蓄積人情未至驚憂又以朝廷散利薄征賑給之後而人民猶不免於流移殍死閭井蕭條至今未復况今民間蓄積不及往時人情已甚憂懼目下軍糧便缺支遣計料見管常平米斛斗亦恐將來不足賑濟支用若不瀝懇先事奏聞竊恐將來流殍之禍及它意外之憂又有甚於前日除已具錄奏聞許依分數放免租税更令轉運常平兩司多撥錢米應副軍糧凖備賑濟外云云
