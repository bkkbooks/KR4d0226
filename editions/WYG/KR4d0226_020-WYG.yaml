body:
  text: 申南康旱傷乞倚閣夏税狀熹昨為本軍今年災傷至重奏截留兩年上供米斛已䝉支撥淳熈六年未起米五千石充軍糧及賑糶等支用本軍除已恭禀施行訖今來檢放旱傷秋苗通計不止七分除已一面儹具奏聞外竊見本軍今年所理夏税緣自省限起催以來即苦旱乾人戸車水救田日不暇給憂勞愁歎實與常歲不同遂不敢嚴督諸縣依限催理只令勸諭人户自行輸納至今截日方據納到絹九千四百匹錢一萬六千七百三十五貫二百五十九文省其絹一面支裝起發所有見錢竊緣本軍别無儲積可備賑糶不免擅行兑借并未起淳熈六年折帛錢七千三百一十九貫二百九十六文省通前兩項共錢二萬四千五十二貫五百五十文省趂此米價未起之間收糴米斛約計可得一萬一千五百七十餘石賑糶饑民却俟糶畢收簇元錢節次起發其餘人戸所欠錢絹數目尚多而民間自今以往饑餓寒凍之憂日甚一日漸次無力可以供輸熹誠不忍更行催督以速其流離轉死之禍除已具錄奏聞乞賜許將本軍今年人戸未納夏税錢帛權行倚閣令候來年蠶麥成熟却隨新税帶納庶幾饑饉餘民得保生業不勝萬幸所有熹輙將上供官錢兑借糴米之罪亦已具奏恭俟朝典併乞施行乞住招軍買軍器罷新寨狀具位熹照對本軍見凖上司備凖朝省指揮招填缺額禁軍及抛買軍器物料并向來申請乞行省罷管下都昌縣剙置新寨逐項利害除已具公狀申聞外合行供禀者一凖安撫司備凖樞密院劄子立定本軍軍額招填禁軍共五百人今照本軍舊管禁軍額數至多蓋緣承平之際戸口繁多投募者衆州郡又未有諸色上供及揀汰歸正使臣軍員倉庫充溢足以支遣近年以來税重民貧戸口逃散已是無人應募州郡上供之額既重冗食之數又多並無留州得用錢米可以養贍所以招收常不及額猶尚支遣不足䝉朝廷察見上件事理於淳熈七年内已降指揮權以二百人為額今來又凖上項指揮照應見管二百人外尚缺三百人雖已遵依分委兵官招收緣本軍僻陋小郡戸口不多目今雖是荒年尚乃無人應募設若有人應募其添招禁軍三百人每年合用糧米五千四百石料錢八百六十四貫文省春冬衣絹一千三百五十匹紬一百五十匹綿四千五百兩衣錢七百六十五貫委是數目浩瀚即無合撥窠名可以支遣况當荒歉之後税苗蠲放殆盡見在人數尚且支給不行若不申陳竊慮虚負稽緩之責欲望鈞慈特賜敷奏乞依元降指揮且以二百人為額如以州郡武備不備必欲招足元數亦乞限一年添招十人庶幾數十年間漸還舊貫而州郡得以漸次措畫不致違悞一凖轉運司備凖樞密院行下抛買第十一料至十五料甲葉牛皮數竊緣郡境民貧不堪搔擾十一至十五料節次具申未敢行下收買獨十四料幸䝉漕司申奏蠲免而又已有抛買第十五料指揮竊緣本軍三縣去歲大旱民間貧困異於常時官司夏秋二税檢放倚閣無可催理逐月官兵請俸尚且積壓無可支遣今來雖是漸次起催新税然旱荒之後民氣未蘓尤當存恤撫摩庶幾不至流散若更分抛下縣催督買發官司初無合破官錢不過科擾取辦上件軍器既未有急切用處徒爾驅逐饑民使之逃亡失業因致死亡有負朝廷救荒䘏民之意事屬不便欲望鈞慈軫念特賜敷奏權與蠲免候二三年後年糓豐熟却令漸次收買起發施行一照對本軍淳熈五年内䝉提刑司奏請於管下都昌縣剙置營寨招刺軍兵彈壓盜賊已行依應旋招到軍兵二十名及於管下巡檢司各差撥兵士十名并於本軍添差兵官内差委一員專一在寨統轄教閲今照都昌為邑百餘里見有棠隂四望松門楮溪大孤山五寨土軍額管四五百人縣郭又有弓手八十人足可彈壓盜賊當時止緣盜徒倪四等乘船經過縣岸提刑髙公泗一時申請添置此寨見在縣郭當五寨之中而與尉司相去僅百餘步委是虚設徒費帑廩昨來備述利害及以本軍匱乏無以贍給累具申陳乞行省罷此寨欲將招到軍兵併歸四望山寨填補闕額之數未䝉行下欲望鈞慈特賜敷奏依所乞施行乞除豁經總制錢及月樁錢狀熹照對本軍去歲旱傷至重檢放秋苗八分以上及䝉朝省行下將第三等以下人戸夏税畸零倚閣是致經總制錢收趂不及合行除豁及月樁錢無從樁辦不能如額已嘗具申總領轉運提刑司照㑹乞行除豁無收經總制錢及乞據實樁到月樁錢數起發除别具狀供申尚書省乞賜敷奏外今具事節合行申稟者一經總制錢年額係於夏秋二税内收趂緣本軍去年分檢放過苗米三萬七千四百五十石一斗二升三合一勺紐計無收經總制勘合頭子錢六千三百七十二貫一百一十七文省及依凖淳熈七年十月二十六日聖㫖指揮倚閣本年第三等以下人戸未納畸零夏税折帛錢二萬三千三百一十五貫四百六十五文本色絹三千八百一十六匹九尺六寸紐計無收經總制勘合頭子錢二千九百二十五貫八百四十七文二項共合除放經總制錢九千二百九十七貫九百六十四文其苗米上所收經總制頭子勘合等錢遵從淳熈四年戸部韓尚書申明已得指揮並合隨苗除放其夏税畸零錢帛既已倚閣亦無合收經總制勘合頭子錢數目合依例除豁方欲具申乞下總所并憲司照㑹今㑹得池州近以旱傷申請已奉聖㫖除豁檢放苗米上無收經總制錢况本軍旱傷尤甚既檢放秋苗外又䝉倚閣第三等以下畸零夏税所有上項經總制錢委實無所從出欲望鈞慈矜察特賜敷奏於本軍淳熈七年分合發經總制錢内除豁前項放免無收錢九千二百九十七貫九百六十四文仍乞行下憲司總所及本軍照㑹一本軍月樁錢係於夏秋二税并場務出納錢物收到頭子經總制無額錢及酒税課利分𨽻樁辦緣去歲旱傷之故苗米放及八分三等夏税亦復倚閣自九月十二月終月額共合樁辦一萬四千五百三十三貫九百一十二文除已據實收樁到錢將新補舊遞互儹那共計一萬三千九百一十三貫五百四十七文節次起發外尚有六百二十貫三百六十五文及今年正月以後合發錢數目今空竭無可樁辦欲望鈞慈特賜敷奏將淳熈七年九月至十二月終收趂不足月樁錢六百二十貫三百六十五文特賜蠲免外所是淳熈八年正月以後合發月樁錢數亦乞行下淮東總領所照會據本軍每月實樁到錢數起發候向去年歲豐熟民力稍蘓即依舊數發納申修白鹿洞書院狀具位契勘廬山白鹿洞舊屬江州今𨽻本軍去城十有餘里元係唐朝李渤隱居之所南唐之世因建書院買田以給生徒立師以掌教導號為國學四方之士多來受業其後出為世用名跡章顯者甚衆至國初時學徒猶數十百人太宗皇帝聞之賜以監書又以其洞主明起為蔡州褒信縣主簿以旌勸之其後既有軍學而洞之書院遂廢累年於今基地埋沒近因搜訪乃復得之竊惟廬山山水之勝甲於東南老佛之居以百十數中間雖有廢壊今日鮮不興葺獨此一洞乃前賢舊隠儒學精舍又䝉聖朝恩賜褒顯所以惠養一方之士德意甚厚顧乃廢壊不修至於如此長民之吏不得不任其責除己一面計置量行修立外竊緣上件書院功役雖小然其名額具載國典則其事體似亦非輕若不申明乞賜行下竊慮歲久復至埋沒須至申聞者右謹具申尚書省及尚書禮部伏乞鈞㫖檢會太平興國年中節次指揮行下照㑹庶幾官吏有所遵守久遠不至堙沒謹狀小貼子契勘本軍已有軍學可以養士其白鹿洞所立書院不過小屋三五間姑以表識舊跡使不至於荒廢堙沒而己不敢妄有破費官錢傷耗民力伏乞鈞照乞支錢米修築石隄劄子照對本軍邊臨大江舊有石砌隄寨堰住西灣水汊藏泊舟船每歲江西諸州錢糧綱運并商𣙜舟船浮江上下並於寨内抛泊或值風濤大作亦免沉溺之患公私兩便自紹興以來不暇開修逐年風浪衝擊砌石損動往往多被回運空綱偷般壓船前去以致寨内水汊沙土填塞積歲之久不復開浚重載舟船不免於石寨外江心排泊沿岸石磊不堪繫纜每有大風震作漂溺人船不容拯救前後抛失官私錢物不可勝計本軍慮其所用工料錢米無所從出又恐土石一興有妨農作緣此坐視不敢申請今緣本軍旱傷至重細民闕食檢凖紹興重修常平免役令諸災傷監司隨所分州縣有興工役而可以募人者雖非農田水利謂如城隍道路隄岸土工及種林木之類各預行檢計工料錢穀之數具利害奏聞本軍已委星子知縣王文林司戸毛迪功躬親詣地頭逐一從實檢計到開修石寨去處合用工料等錢五千三百七貫一百二文米四百五十六石四斗五升本軍已行具申轉運使衙取撥窠名錢米雇募人工修葺去後近凖使司回牒止撥到移用錢一千貫文米五百石今照先委星子知縣王文林司戸毛迪功檢計工料錢米並是實用之數本軍今不敢全乞取撥望止乞更行增撥錢米付本軍支散自餘少缺之數本軍自行計置貼助使司撥到錢米趂此天氣和暖雇募人工開修不唯官私舟船得免風濤之患且使饑民就役不致缺食須至申禀者乞催修石隄劄子熹照對本軍臨江石砌隄岸自紹興以來被風浪衝擊損壊及港汊堙塞稍自江水退落不堪住泊舟船已嘗具利害申禀乞行計料開修已䝉委官相度開具合用工食錢米供申去訖未䝉行下緣目今水涸正是併工開修之際若是蹉時向後寒凍工匠艱辛除别具公狀申呈欲望台慈早賜申奏仍乞行下逐旋取撥窠名錢米一面趂時用工開修施行實為公私久遠利濟之惠論都昌創寨劄子熹竊見自古建立州縣與安頓營寨去處不同州縣須得山水環聚地土寛平可容官府民居去處而未必要害營寨即須相度地勢果是盜賊來往所必經由之地可以卓望邀截不容走透方為要害然後建立此事理之必然也故古人於此二者經度安置各有所處未嘗差互其州縣去處雖非要害然既有官府民居倉庫刑獄則亦不可無備故逐縣皆有尉司弓級大者百餘人小者不下數十人與營寨土軍表裏防䕶其用意亦備詳而深遠矣若以州縣去處瀕江帶河恐有姦人不測侵犯便為要害則凡州縣少不近水設使果是要害去處其縣道亦有弓手足得防䕶不必更於弓手之外立寨招兵然後可以守也本軍都昌縣者地實瀕江然上有棠隂木門四望下有楮溪大孤山大小五寨近者四五十里遠者亦不過百餘里逐處可以卓望把截是為要害其縣郭去處正在五寨之間又有尉司弓級額管七十五人四至八到在隆興饒江三州星子建昌兩縣之間即與淮南州郡並無連接去處百十年來除李成大盜横流之後不聞曾有盜賊直犯縣邑只於淳熈四年因有散亡窮冦三人匿跡舟中經由縣步初未嘗敢上岸作過却被尉司弓級緝捉驚趕即時竄逸是時偶有饒州職官沿檄到縣中路得於傳聞意謂本縣已被焚刼遂張皇其事妄申憲司一時慿信便將官吏對移奏稱都昌縣接連淮南而南康管内都無一兵乞創此寨以天子使者持斧逐捕之威而為窮寇三人驚駭擾亂至於如此固己可笑又况初不計筭增兵百人一歲所費為米一千八百石錢五百餘貫絹五百匹綿一千五百兩使州縣何所從出亦不審慮兵官一員禁軍百人出在外縣使聽何人節制於民有無搔擾致誤朝廷降此指揮自今觀之利害得失昭然可見人無愚智莫不知之故本軍昨來輙具申陳乞行廢罷今幸朝廷行下使司相度竊計必䝉洞照底裏力賜主張使邑屋無侵擾之虞州郡免供億之費遂除一方永久之害然熹愚慮尚恐州縣官員解事者少而便文自營之私勝觀望畏怯之習深既不明形制要害之緩急又不察公私事力之有無但恐廢罷之後萬一復有衝突或能累已又見元係憲司陳請不無觀望之意雖到地頭相度往往不能盡公竭慮而偷為一切首䑕之計或稱實係要害去處見有招到軍兵造到寨屋難以廢罷上誤鈞聽則熹請有以折之夫地勢要害衣糧耗費種種利害熹前已詳言之矣請更以一事論之今所置寨正在本縣尉司之南數十步間若以弓手為不足恃則廢弓手而專募寨兵可也今置寨以來弓手之巡警未嘗敢廢近又會合外縣捉獲但淳莊賊而所招新兵者飽食安坐未嘗少立功効及至本軍行下督責巡尉之際其軍兵反教寨官申稱當來置寨只為防獲縣郭不合下鄉巡捕其無用如此但能在縣生事擾民詞訴不絶州郡相去既遠縣官莫敢誰何若不早行廢罷向後郡縣民間之害將有不可勝言者若䝉察此利害數端之實許行廢罷其見招軍兵數目不多自可撥𨽻諸寨填補闕額見造之屋其數亦少自可就近撥充弓手營房他無所用也豈可明知其傷財害民有損無益而但為此羸卒數人破屋數間之故留此巨害之根以貽患於無窮乎夫論事不論其利害之實而欲因陋就簡偷合取容以徇目前一切之計此乃世俗淺陋之常談宜不足以惑髙明之聽然熹之愚亦有不能無過計之憂者故敢復盡其言以煩執事伏惟幸垂察焉其或議者尚慮復有前日舟中三人之盜而不可以無備則望鈞慈更垂體察只勒本縣立限招足闕額弓手而更於額外增置二十五人凑足一百人亦足以增重形勢防衛不虞而弓手係屬本縣縣尉知縣等級相承名分素定易為拘轄比之立寨招軍利害蓋萬萬不侔矣其都昌縣與諸寨相去遠近里數形勢今并彩畫成圖連粘在前乞賜鈞覽干冐威尊皇恐死罪申免移軍治狀凖安撫轉運使衙牒備凖尚書省劄子新差知袁州曹大夫奏乞將南康軍移治湖口縣撥𨽻彭澤縣及都昌縣依舊成三邑却將星子建昌縣撥𨽻江州事除已移牒諸司從長相度經久可行利便修寫同銜檢狀連書施行外牒軍詳此從長相度有無利害具狀供申所凖前項使牒指揮本軍檢會昨淳熈三年内凖安撫提刑轉運提舉使衙牒二月二十六日尚書省劄子戸部申凖都省批下白劄子乞將南康軍建昌縣𨽻江州而復以江州湖口縣𨽻南康軍或建昌縣若還𨽻隆興府事牒本軍契勘建昌縣湖口縣坐落去處并各縣抵接本軍水陸界分地里遠近相度經久可行利便具狀供申本軍已行取㑹逐縣具利害回報及塌畫地圖送簽㕔集衆官會議合依建昌縣士民比建昌水陸地界至江州皆遠至南康皆近陳乞仍舊𨽻屬本軍為便事理保明具申安撫提刑轉運提舉使衙照會施行去訖今又凖上項指揮本軍今相度開具下項須至申聞者一本軍自太平興國七年始建軍治至建炎間李成賊馬殘破其元建軍額案牘不存㝷照圖經及簽判㕔舊題名記并詢訪士民檢到皇宋咸平本軍判官兼通判余致堯撰新剏利民橋記見得自太平興國六年相國張齊賢轉漕江表以其地在廬山之陽彭蠡匯澤直注于是每春江水漲洲沈島沒䖍吉撫筠洪諸城軍實萬艘浮江而下或天鼓噫氣怒濤沃空篙工棹郎摧檣是慮指斯邑也為拯溺之地公於是度其便則泝流之要衝相其宜則上游之樞會非鳴鼓角樹牧帥以守兹土則觀風之政幾致闕如由是紀事實以入奏請改其邑為軍太宗皇帝嘉其言曰俞南方之俗其在康哉可賜名南康軍自是之後幾二百年至紹興以來復建軍治及諸倉庫郡官廨舍兩獄諸軍營房洎至成就所費不貲若一旦棄而不用徙置它所必須剙建軍治城壁及諸帑廩郡官廨舍兩獄諸軍營房不知所費從何取撥而湖口縣治地勢窄狹前近大江後逼髙山亦無建立軍壘去處今欲剙建軍壘必須占奪民間田地搔擾不細以此論之移治之説彼此公私有害無利灼然可見一星子縣係本軍見今治所地瘠民貧昨因經界之後二税愈重倍於它邑自辛卯大旱之後民力未甦幸而輸納水陸皆便朝至暮歸無諸枉費然而民間未免猶有愁歎若𨽻江州則陸路一百二十里而水路順流一百二十里至湖口縣入泝流四十里至江州泝流一里折二里通二百里輸送期會轉見遙遠以此論之則割𨽻江州於民有害於官無利灼然可見一建昌縣元申據進士熊望之等并父老及税户傅政等連狀本縣陸路至江州二百八十里至南康一百三十里水路至本縣三百里去江州則又一百二十里到湖口縣湖口縣又泝流而上八十里方到江州又必經由南康軍湖口縣兩處口岸不無阻節見今江州係駐劄去處一有所科近縣則便遠處則不便且如德安縣乃江州屬邑之遠者尚不過一百二十里本縣去在德安縣之南又六十里且以馬料微事言之隨税髙下均科本縣水行五百餘里方至江州如陸程則南去鄉分到本縣又百餘里往返有六百里之遠動經旬日若中等之家科藁二百束毎人止負兩束以人數較之動費百夫上等人戸則又不止百夫若令人戸就縣交納亦有般擔縻費官司解發亦不過取辦於民本縣既遠於德安縣况連丁大旱之後人民流移未盡全復若更以𨽻江州豈特流移之家不歸而見在人户亦必逃移竊以普天之下莫非王土江之東西亦皆王民萬一必欲撥𨽻民間豈敢固違然望之等伏見朝廷清明四方無虞東西兩路之民各安其業與其有所改易不若仍舊貫為安陳乞備申朝省詳酌利害施行以便民情本軍今來相度建昌縣昨來所申事理委得允當以此論之則割𨽻江州於民有害於官無利灼然可見一本軍逐年起發上供經總制月樁等錢及支遣官兵衣糧百色支費全仰三邑樁辦而建昌星子應辦不啻過半今來若將撥𨽻它州則所餘都昌地瘠人貧歲多旱歉催科稍急則有逃徙之患財計實無所出雖以湖口彭澤兩縣改𨽻本軍名為依舊三縣而湖口彭澤所入亦少不足裨補且以苗米論之星子湖口各止六千僅可相當而建昌秋苗二萬彭澤所入約計不及其半今欲以二縣二州夏秋二税及諸色歲計之目依各縣元數令逐州承認惟上供之數或可隨縣改割至於養贍在軍官吏軍兵支用之數不知何從而出以此論之以建昌星子𨽻江州以湖口彭澤𨽻本軍於官有害於民無利灼然可見右本軍相度利害於前又詳建議之人首尾陳述畧無義理其言江南分東西路實以江西為界者今契勘江西一路自隆興府撫州建昌軍皆在江西之東若如議者之言則此一府一州一軍盡合移治江西之西而其諸縣亦合改𨽻江南東路矣又江州南康疆境交互奔走期會民頗難之又有風濤之險監司巡歴民戸輸送往來每以為艱今契勘星子建昌兩縣民戸輸送地里遠近如前所陳若以議者之言便行改割則是使之捨近就遠去易就難與其所陳事理利害正相違背兼本軍所管都昌一縣雖是隔江然人戸輸納不過苗米一項最為麤重自來久例又只在本縣交納裝綱起發人戸即無往來之阻至於移動一軍城壁官舍倉庫營寨所費浩瀚度須用數萬緡而起遣一縣民居屋舍及占奪其地使之蕩析流離不得安其生業尤非細事而議者率爾言之僅同兒戯不知今日民力凋敝州縣空竭之際如何計置得上件錢物給此支用而勞民動衆為此有害無利之舉其説竊恐難以施行徒然煩費文移動搖物議使一境軍民日夕憂惶不遑寧處極為非便謹具申監司衙欲望詳酌早賜奏聞寢罷前件指揮以安一郡軍民之心不勝幸甚伏候台㫖小貼子契勘本軍建昌縣陸路至本軍經渉江州德安縣界而小路直至本軍不隔外州其隔江州界分去處初亦無甚利害只是德安縣遞鋪兵士以非本軍所轄尋常不肯傳送本軍及建昌縣文字有此一節小小利害然亦須别有措置豈有為此之故而輕移一軍遽割四縣之理今若將德安一縣遞角文字特令兩州巡轄使臣通行㸃檢則郵傳亦自不至阻滯併乞台照論馬辛獄情劄子熹契勘本軍軍院昨凖使帖押下承局馬辛根勘凌犯階級情罪依條施行已據本院勘到招伏情節依條合徒二年配鄰州熹竊詳本人所犯却因發覺方彦故違使司元降約束私買板木遂致争閙若便依條斷罪竊恐情輕法重或非台慈之本意未敢便行決遣亦不敢輙具公狀申陳敢以此私於下執事欲望矜察行下稍從寛典不勝幸甚熹以亟遣遞筒未暇别紙布謝悃併乞台照論南康移治利害劄子熹輙有愚懇仰瀆台聽近凖安撫衙牒備承使司公文差委池州余推官前來相度曹大夫者所陳移治湖口改割兩縣事本軍已遵依行下兩縣相度去訖然其事理實有不難知者本軍建立二百餘年兵火之餘掃地赤立今又五十餘年官府民居方稍就緒然猶頗有未圓備處若更遷徙必致狼狽兼今來民力已極困弊官司尤覺煎熬移治所費少亦不下數萬緡不知何所從出又聞湖口地步窄狹目今為縣尚且費力若欲改建軍壘城壁官府倉庫牢獄所占地步計須十倍於前未知何處可以安頓設使可以安頓亦必起遣居民毁拆其屋占奪其地乃可營建不知今日幸無迫切利害何必為此以動搖人心為國取怨此移治不便之説也至於改割兩縣則兩縣距今南康治所道里近而去江州治所道里遠南康財賦取辦於建昌星子者過半而湖口彭澤二縣所入不足以補其數雖上供歲額或可隨縣改割而本軍官兵吏員廩禄不知何所從出此割縣不便之説也竊意此事終久决難施行而徒煩費文移動搖衆聽使兩處軍民之情疑慮惶惑不安厥居極為非便熹衰病之餘扶曳來此旦夕即為引去之計視此不啻如傳舍豈有毫髮顧戀之心特以既荷聖恩彊畀民社既未能有以使其人安於田里而無愁嘆之聲誠不忍更使復為庸人淺議所擾故敢直以己意干昧申呈其詳見於公狀欲乞台覽早賜奏陳寢罷其説以安兩處軍民之心不勝幸甚論阿梁獄情劄子熹照對本軍阿梁之獄節次審詞互有同異須至依條再行推鞫然以愚見本人審詞雖非實情然且只據其所通情理亦不可恕不必再行推鞫盡如前後累勘所招然後可殺也蓋阿梁與葉勝私通致葉勝因其夫病而手殺之雖使阿梁全然不知殺害之情究其所因已絶人理况已明知殺意當時自合出門聲呌或密投隣里以求救援今乃抱兒立於門外半時之久以俟其夫之死及見其夫之出聞其夫之聲知其事之不成然後隨聲呌呼以求救只此一節其情葢已灼然可見不必同謀共殺然後可寘極典也夫人道莫大於三綱而夫婦為之首今阿梁所犯窮凶極惡人理之所不容據其審詞自合誅死無足憐者本軍雖已具申乞行推鞫然熹愚意欲望使司詳此情節别具奏聞乞降睿㫖只依元降指揮處斬施行不惟得以蚤正典刑使姦凶之人不得以遷延幸免亦以聳動羣聽使衆著於人倫之義於以弼成聖教實非小補熹以人微職賤不敢頻有奏陳敢以此私於執事伏惟鈞照論木炭利害劄子一熹輙有愚懇仰瀆台聽伏見管下都昌縣人戸夏税錢内一項科折木炭自來只用本色備船裝載赴監送納自紹興二十四年提㸃韓寳文任内因納炭稽遲追典押取問偶一時懼罪自行供認乞每秤折納價錢二百六十文省解發赴監自行置場買炭考之縣吏每税錢二十文折木炭一秤以税錢則例言之夏税見錢一貫五十文合折絹一匹官交價錢六貫文省若折木炭合管炭五十二秤半每炭一秤官交正錢二百六十文省共錢一十三貫六百五十文已上以兩項價錢比並則木炭錢多於折絹價錢七貫六百五十文係争一倍以上數目已極懸絶况都昌民戸逐年長養園林採柴燒炭每斤直錢五文至六文止若比倣折納價錢又幾三倍所以民力重困多掛欠籍追逮督迫幾不聊生今來人户乞依祖來舊例備本色自雇船裝載赴監送納獲鈔銷注誠為便利民戸所陳大略如此所有曲折具干公牘敢乞台慈詳酌俯從所請庶幾疲瘵之民得以少蘓實出使臺之惠不勝幸甚冐昧台嚴不勝悚仄小貼子上件所陳乞納本色木炭事或以為不若比附納絹量減價錢却從使司置場收買尤為利便更乞台慈詢究詳酌施行論木炭錢利害劄子二照對本軍管下都昌縣人戸舊例送納本色木炭赴使司交納紹興十五年間使司行下每秤折納價錢一百五十文足續又每秤至二百六十文省契勘其炭係以絹税紐折今來所納價錢比之折絹計多一倍以上委是太重民力不堪昨據人戸陳訴己曾具申使司乞納本色未䝉行下不免具申朝廷今凖省劄已送使司指定竊念本軍地狹民貧税額偏重而折納炭錢比於納絹計增一倍以上比於本色計增三倍以上農桑之家有本無錢送納累年委實困弊欲望台慈仰體聖朝勤恤民隱之意特賜詳酌許依所乞送納本色不勝幸甚干冐台嚴俯伏俟罪論木炭錢利害劄子三熹昨日伏䝉面諭許賜行下究實都昌木炭價錢利害特與蠲減仰見仁人君子所以愛民之實不為苟悦於一時而所以為之計慮深遠如此感幸歎息無以為喻適凖使帖謹已遵禀施行續當條上然熹竊伏思之復有一説上可以推廣台慈矜恤之惠而下不至於多失有司經常之入敢預言之以俟采擇謹按木炭本以税絹紐計納本色比之納絹所費已增一倍之數折納價錢比之納絹所費又增三倍之數反覆紐折至於數倍上違法意下損民力本軍三縣皆受其弊然二縣距使臺為遠津般本色其費不貲故雖價錢稍重而不敢深以為苦都昌則距使臺甚近而津般不難故獨願納本色而深以價錢之重為病要之以錢比絹而論之則三縣之事體初不異也熹前者妄論未能及此向若使司直從所請令納本色則熹不及有所議矣今乃幸䝉矜念更令究實却與蠲減是以熹得以復有所言欲望台慈更賜詳酌三縣第三等戸一槩重行蠲減其上兩等人戸却令且依舊送納庶幾一郡細民均被大賜而上兩等戸事力稍重猶可不至大叚狼狽兼亦不至多費使司財計免致别有經畫實為利便須至申禀者乞聽從民便送納錢絹劄子熹近者兩具劄目陳乞宫廟差遣恭想已徹鈞聽外服下僚不敢數以寒暄浮禮仰塵威重兹乃復有愚悃輙冐布之熹束髮讀書不親世務加以疾病益復懶廢兹䝉誤恩起家試郡觸事昏塞不知所為近因奉行近降指揮令上三等戸税絹畸零文尺凑鈔送納本色外下戸不成端匹税絹每尺並以一百文足折價從便獨鈔送納節次據本軍下戸陳訴乞依舊凑納本色熹初不知利害曲折只見朝廷指揮之意本為優恤下戸但行喻遣催促送納自後㸃檢得見納到數目大叚稀少遂行詢問乃知本軍絹價每匹不過三貫文足今令上三等戸得納本色而下戸却令一尺折錢一百文足即納一匹計成四貫文足委是折錢太多所輸反重於上户所以下户不願折納而熹昏愚不能加意詢訪及時申明致此違慢已從本軍具狀申尚書省欲乞許從民便送納錢絹敢乞鈞慈早賜敷奏行下以慿遵守催督免致拖欠為公私久遠之害所有熹申明後時上誤國計亦乞明賜黜責以為守臣慢令廢職之戒干冐鈞聽伏深恐懼小貼子熹所申事理緣今夏税末限將滿欲乞鈞慈詳酌徑自朝廷施行庶幾猶可及事若送戸部行遣往還動淹旬月州縣之吏無所禀承則懦者不敢督趣必至於闕供强者不恤有無必至於病民矣為乞垂念熹又竊詳今者所降指揮它州未聞有以為病而申陳者或是本處絹價髙貴今得例從低估民間實以為便故熹所申亦不敢乞減所定錢數只乞許從民便則價貴處人自納錢價賤處人自納絹兩不相妨各得其便伏乞鈞照乞禁保甲擅關集劄子契勘保甲之法什伍其民使之守䕶里閭覺察姦盜誠古今不易之良法也然既許其蓄藏兵仗備置金鼓則其節制階級似亦不可不嚴竊見目今見行條法累降指揮但有團結教習之文初無戒令紏禁之法鄉里豪右平居挾財恃力已不可制一旦籍此尺寸之權妄以關集教閲為名聚衆弄兵凌弱暴寡拒捍官司何所不至如本軍都昌縣劉邦逵等只緣劉彦才争競聞得官司追呼遂於盛夏輙行關集鳴鑼持仗過都越保欲以報復怨仇抗禦捕吏向非託於保甲之名安敢公然如此熹除已將劉邦逵等依相毆報寃為名結集徒黨立社法等第决配編管外仍具利害申使司欲望台慈詳酌特賜行下約束施行區區之懐别有愚見更望使司特賜敷奏明降指揮今後應保甲首領等人輙以關集教習為名聚衆弄兵欲以恐脅官私報怨拒捕者比凡人之法特加一等收罪庶幾豪强知畏不致夤緣敗壊良法委實利便須至申禀者乞保明减星子縣税劄子熹昨日方遣人具劄目申禀想徹台聽適所遣陳乞減星子税人回齎到省劄一道謹復專人申納乞賜台念保明回申不勝幸甚其間上供對補之説竊謂若本不虧上供元額即初無可申請若有别色可以對補即亦不須申請今有司之吝至乃以此為問則蠲減之恩似已無復可望然邑人緣此陳乞往來計會亦已薄有所費其心不能無僥倖於萬一而熹元奏固已有謂如䝉施行不唯今日見存人戸得保生業而已逃未復願耕無田之人必將有扶老携㓜而至者不數十年生齒日繁墾田日廣向來樁閣之數亦可漸次起理以復承平之舊者似己預為今日解紛之地欲望台慈頗采其意特為申述使得不為刀筆所沮而早得䝉被堯舜之澤熹與邑人千萬幸甚干冐威尊無任戰悚小貼子上件文字欲乞不别委官看詳徑從使司保明回申幸甚報經總制錢數目劄子按坊場敗闕下有一本有體字熹照對近凖使司公牒依凖總領使所牒催發本軍去歲未發錢四千六百餘貫并今年未發錢三萬九千五百四十餘貫謹按去年錢内合除豁坊場敗闕減下錢一千四百四十貫三百餘文僧道免丁比額不敷錢一百六十四貫六百餘文截使招軍造甲經總制錢一千八百九十五貫文及已申及乞理折曹秉義等税錢九百九貫餘文共計登四千四百九貫三百四十五文省外實催到茶租錢二百八貫已差衙前蕭彦押發别無未起之數節次具申總領所照會去訖所是今來錢除已起發春季外未發錢數内亦有合除豁坊場敗闕體減下錢僧道免丁比額不敷錢共登一千九百一十三貫七百九十文自餘合催錢數緣本軍今年夏初以來田禾便遭枯旱今則秋苗已放八分已上民間目下已自闕食兼淳熈七年第三等以下未納畸零夏税己䝉上司備奉聖㫖行下權行倚閣今來正税既無所入其經總制等錢亦别無合收窠名官錢可以樁辦所有秋季經總制等錢係據實收到錢七千四百六十三貫二十四文省差衙前王溥管押外有冬季錢數當在來年正月起發本軍亦緣旱傷人户艱於輸納兼凖近降指揮住閣夏税官物竊恐將來施下合發錢數虚負罪戻已節次具申朝廷并上司乞賜敷奏將合趂經總制錢容本軍據所屬實收到錢數批歴入帳拘收起發免以遞年季分比虧去訖除已别具公狀供申外今䝉使司所追都吏以下欲望台慈存留催發官物干冐威嚴不勝惶恐之至乞減移用錢額劄子熹契勘本軍財賦匱乏官兵支遣常是不足逐時全仰酒税課利分𨽻相助近自乾道九年内䝉使司於經常分𨽻錢數之外創立名色每月抛移用額錢一千二百餘貫均於城下及兩縣酒税務趂辦自此之後酒税所收課利除樁移用錢外諸司所得分𨽻錢數不多致本軍財計轉見闕乏支之不行兼近年以來沿流州軍收税太重商旅稀疎又為諸軍差出軍兵販賣物色齎到戸部總所歴頭不許州縣收税場務愈見虧欠州縣愈見窘闕只如本軍見今拖欠使司移用錢四箇月無以起解今有公狀具申欲望台慈矜憐特賜於元抛移用額錢上重賜裁減行下樁辦非獨場務可以補解逋欠亦於本軍不無少有補助干冐威嚴不任悚慄小貼子照對州縣財計取辦於税務税務課額仰給於客旅然則客旅雖非農民之比亦官司財用取資不宜重困使其望風畏避而不敢出於其塗也今者本軍得䝉使司蠲減苗米水脚錢每石至一百三十九文農民固已幸甚獨往來商旅州郡場務以課額浩大不容優恤若䝉台慈詳察將上件移用無名之額痛賜裁減使州郡得以約束務官輕減商税招邀客旅令得通行是亦使司久遠大利之源不必竭取於一時然後為快也乞行遣攔米官吏劄子熹已具申禀未行之間復有危懇重凂鈞聽熹昨嘗妄以隣路遏糴利害申聞已䝉聖㫖特賜指揮近得彼路諸司文移始許通放而屬縣下吏乃敢蔑視朝廷號令帶領吏卒公肆拘攔至於越境釘㫁陂口以絶往來之路正復戰國相傾之世不至於此雖己移書彼郡及諸監司請照條令按劾尚恐未以為意不免具狀申省乞賜約束欲望鈞慈矜憐早賜行遣不勝幸甚熹干冐非一罪無所逃伏紙不勝戰栗俟罪之至乞申明閉糴指揮劄子熹輙有迫切之懇仰干鈞聽本軍地瘠民貧米穀不多遞年雖是豐熟亦仰上流州軍客船販米糶糴食用今年遭此大旱檢放七分以上而上流儘有得熟去處顧乃循習舊弊公然遏糴以致米船不通細民闕食本軍竊慮無以賑糶支遣遂逐急那兑諸色官錢差人前去收糴米斛今據差去人申己糴到米而諸處官司出牓禁約不許放行竊慮客販不通官糴又阻境内饑民日就狼狽除已移文諸處官司請照累降指揮疾速放行及不許阻節客旅外更欲具奏及申尚書省又慮遽失隣援之驩向後别致邀阻反為深害謹密具此申禀欲望鈞慈特賜矜察早為敷奏特降睿㫖檢舉舊法遍下諸路嚴行約束但使公私米糓遠近通行則沿流荒旱州軍自當不至闕食非獨此邦之幸而已干冐威尊伏增震悚小貼子照對本軍勸諭上户賑糶近十萬石其間多有有錢無米之人亦須上流收糴若彼沿路阻節米船不通即此勸諭之數盡失指凖民命所繫為害非輕伏乞鈞慈深賜留念乞撥兩年苗税劄子熹昨曾具奏及申尚書省約計本軍今秋放旱外三分苗米一萬三千九百五十五石及去年零欠綱運米五千餘石乞賜截撥下本軍充軍糧支遣今續據管内三縣申到檢放實數多是全户乾死所傷不啻八九分若依元數必取三分苗米即恐人户無從輸納必致逃移其去年殘欠初意亦候今冬催理填納今既災傷如此亦非并督舊逋之時以此計之即熹前奏所乞兩項米數正使便䝉聖恩許賜截撥然皆已難作十分指凖未䝉哀憐則其狼狽又將有不可勝言者蓋嘗竊謂有軍則糧决不可以不足既旱則税决不可以不放此二者皆必然之理也但在今日欲取足軍糧則民已無食更責其税必有逃移死亡之憂欲盡放民税則有軍而無糧民亦將有不能保其安者二者之為利害其交相代又如此然就其一端而論之則闕軍食之禍淺而易見不放税之禍深而難知故今州縣之吏不過且救目前為應文逃責之計掩蔽災傷阻遏披訴務以餉軍不闕為先務至於民不堪命而流殍死亡皆不暇恤殊不知民既死徙閭井蕭條田園蕪没或數十年而戸口賦税無以復於其舊積其所失比之全放一年之税何止倍蓰且如本軍乾道七年歲嘗大侵流殍滿道至今十年而流庸尚有未安集者田土尚有未開墾者今者不幸復遭此旱計其分數乃或甚於彼時民尚無以為食若復責以輸納租税將來之患必當有甚於前不知更費幾年功夫可得復似今日此尤不可不深慮者也然非朝廷察此利害之幾有以給其軍食使之得以盡實檢放而無乏供之患則難知之深害未弭而目前立至之禍已不可免此熹之所以不敢避僭瀆之罪復論前奏之未審者仰冀鈞慈深加憐察特賜敷奏且依所乞截留兩項米斛外更令帥漕兩司同共相度别行應副則闔郡軍民死生而骨肉矣如䝉留念更望早賜行下以安其心熹無任惶恐俟命之至小貼子熹所申禀只為乞撥六年殘欠及七年放外兩項米斛又恐朝廷怪其檢放分數之多故其妄言遂至覼縷誠不能無草野倨侮之嫌然其區區之心實欲深為國家生聚教訓恢復久遠之計若熹之私則去替不遠疾病侵陵罪戾孤蹤日俟譴斥决非久於此者亦何必曲沽民譽過為身謀以罔朝聽而陷於不測之誅伏惟鈞慈深賜洞察與執政劄子熹瞻望台躔久不申起居之問下情第切宗仰比以災旱告急于朝竊計已䝉鈞念惟是疎拙素不更事重此困迫不無煩擾今復有劄子二通申禀放税乞米及隣境閉糴事而熹疾病之餘不堪扶曳輙有私懇仰瀆威尊敢望鈞慈并為敷奏乞從所請千萬之幸熹頻有干慁不敢累幅以勞侍史并乞鈞照乞以泗水侯從祀先聖狀照對本軍昨因修葺軍學照得從祀神位名號差舛曾具狀申尚書禮部續凖本部符降到見行從祀神位名號本軍謹已遵依彩畵題寫奉安訖熹恭覩崇寧元年二月二十五日詔追封孔鯉為泗水侯孔伋為沂水侯今按本部降到神位名號其泗水侯獨未得在從祀之列蓋嘗考之論語伯魚過庭親承詩禮之訓先望又嘗使為周南召南之學其才雖曰不及顔淵然亦不應盡出七十子之下竊意當來禮官一時討論偶失編載非固有所取舍升黜於其間也熹愚欲望朝廷特賜詳酌將泗水侯列於從祀位在七十子之後沂水侯之前庶幾孔門之賢悉登祀典有以仰稱崇寧聖詔褒崇之意須至申聞者右謹具申尚書省伏乞照會施行謹狀乞頒降禮書狀照會政和五禮新儀州郡元有給降印本兵火以來往往散失目今州縣春秋釋奠祈報社稷及祀風雨雷師壇壝器服之度升降跪起之節無所據依循習茍簡而臣民之家冠昏喪祭亦無頒降禮文可以遵守無以仰稱國家欽崇祀典防範民彛之意須至申聞者右謹具申行在尚書禮部欲乞特賜申明檢㑹政和五禮新儀内州縣臣民合行禮制鏤板行下諸路州軍其壇壝器服制度亦乞彩畵圖本詳著大小髙低廣狹淺深尺寸行下以慿遵守小貼子契勘王公以下冠昏喪祭之禮鄂州見有印本但恐其間或有謬誤只乞行下取索精加校勘印造給降不須别行鏤版其州縣祭禮及壇壝器服制度即乞檢會抄寫圖畵别為一本鏤版行下乞增修禮書狀伏見本軍昨凖尚書禮部符下政和五禮祭祀儀式竊嘗㕘攷其間頗有未詳備處方欲具狀申審今覩進奏官報近者判部侍講侍郎奏請編類州縣臣民禮儀鏤版頒降己奉聖㫖依奏此誠化民善俗之本天下幸甚然熹竊慮其間未詳備處將來奉行或致牴牾今具如後須至申聞者一所凖行下釋奠禮儀熹按其神位除正配三位外有殿上兩廊從祀未見位號名數不委新儀全書有無具載欲乞討論并賜行下然按祀令二月八月上丁釋奠文宣王以兖國公鄒國公配牲共用羊一豕一白幣三而已今其所祀乃近一百餘位一羊一豕無緣可以徧及又州縣廟學窄狹祭器獻官多不及數往往不能一一分獻其為欺慢莫甚於斯竊欲更乞相度申明許令州學免祭兩廊諸位縣學并免殿上十位庶幾事力相稱儀物周備可以盡其誠敬熹又按行下釋奠行事儀引三獻官詣舒王神位前一節係政和間所定後來靖康年中已有指揮追貶王安石爵秩停罷配享訖今來上件儀注尚仍舊文竊慮州縣奉行反致疑惑亦合申明改正并乞台照一所凖行下釋奠陳設儀云設著尊四犧尊四為二重在殿之東南隅北向西上配位即於正位酌尊之東著尊在前皆有坫加勺羃為酌尊著尊一實明水為上尊餘實泛齊初獻酌之犧尊一實明水為上尊餘實醴齊亞終獻酌之熹按後章行事儀云初獻酌犧尊之泛齊亞終獻酌象尊之醴齊與此不恊竊疑兩處必有一誤尋考祭社稷祀風雨雷師陳設犧皆設犧尊象尊為酌尊乃知正是此章之誤其著字當作犧字犧字當作象字又既云北向則是犧尊在北象尊在南所云在前亦是重複倒置欲乞申明改正行下一所凖行下釋奠祭祀陳設章皆云又設太尊二山尊二在神位前太尊一實泛齊山尊一實醴齊各以一尊實明水著尊二犧尊二象二壺尊六著尊一實盎齊犧尊一實醍齊象尊一實沈齊各以一尊實明水壺尊三實元酒三實三酒明水元酒皆在上五齊三酒皆以本處酒充在殿下皆北向西上内祭社稷儀云南向東上加羃五齊三酒皆設而不酌熹按此太尊山尊乃是都共設於殿之前楹壇之南面其北更容獻官拜跪酌獻非是逐位之前各設四尊所謂北向者恐是太尊二為一行其南山尊二為一行又次南階下著尊二為一行又次南犧尊二為一行又次南象尊二為一行又次南壺尊六為三行其南向者反此所謂西上者謂四實元酒東實五齊三酒其東上者反此未委是否各乞討論并賜行下一所凖行下州縣社稷風雨雷師壇壝制度熹按其文有制度而無方位尋考周禮左祖右社則社稷壇合在城西而唐開元禮祀風師於城東祀雨師於城南未委新儀全書有無同異欲乞討論并賜行下一凖禮諸侯祭名山大川之在其境内者又曰山川之神水旱疫癘之災於是乎禜之蓋以其崇髙深廣能出雲氣為風雨以滋養潤澤乎一方也今州郡封域不減古之諸侯而封内名山大川未有望祭之禮其有祠廟亦是民間所立淫誣鄙野非復古制顧乃舍其崇高深廣能出雲雨之實而傴僂拜伏於土木偶人之前以求其所謂滋養潤澤者於義既無所當又其牲牢器服一切循用流俗䙝味燕器於禮又無所稽至於有山川而無祠廟者其歲時祈禱遂不復禜於山川而反求諸異教淫祠之鬼此則尤無義理而習俗相承莫知其謬欲乞檢照五禮新儀如已有祭山川禮即與編類行下如有遺闕亦乞討論依放祭社禮儀立定時日壇場方位制度并賜行下一伏覩累降赦書歴代聖帝明王忠臣烈士有功及民者竝令致祭謹按唐開元禮享先代聖王竝用禮器法服今即未委新儀全書有無歲時祠祭儀式欲乞檢照討論并賜行下右謹具申尚書禮部如有可採乞賜台㫖施行庶編類成書之後免致疑惑復有更改謹狀淳熈七年三月闕日乞加封陶威公狀據都昌縣税戸董翌等狀伏覩本軍牓示詢訪先賢事跡數中一項晉侍中太尉長沙陶威公興建義旗康復帝室勤勞忠順以沒其身謹按圖經公始家鄱陽後徙潯陽見有遺跡在本軍都昌縣界及有廟貌在本軍城内及都昌縣水旱禱禳皆有感應未委上件事跡是與不是指實且翌等係都昌縣居民縣境之南北的有陶威公廟二所其神聰明正直隂有所助廟貌建立年代深遠逐時居民商旅祈禱無不感應及本縣管下并隣近州縣等處遇春夏闕雨鄉民詣廟祈求立有感應兼本廟邊臨滙澤大江水勢湍急綱運舟船往來祈禱風濤自然恬靜前後廟記聲述分明今來翌等不敢沒其實陳乞詳酌具錄陶威公靈應事跡保明奏聞乞加封號本軍所据前項狀述尋行下都昌縣勘會得董翌等所陳委是著實保明申軍及繳到江南劉羲仲所撰公贊曰晉太尉陶威公侃有大功於晉讀其書凛乎若見其唱義於武昌破石頭斬蘓峻何其壯也東坡蘓公嘗為予言威公忠義之節横秋霜而貫白日晉史書折翼事豈有是乎且就其説考之威公夢生八翼登天門九重登其八閽者以杖擊之墜地折左翼及握彊兵居上流潛有窺覦之志輙思折翼之祥自抑而止心之所寓者為志神之所寓者為夢何自而知其然哉至其書梅陶稱機神明鑒似魏武忠順勤勞似孔明豈不信哉魏武起徒步唱義兵非若威公威名之著也以漢徳之深磐石之固可折箠驅之以息天下之禍非若成帝削弱之資也董卓之亂未必大於蘓峻魏武之功未必過於威公保兖州以為固挾天子以為資其意安在則其託興復以為名是乃窺漢之計也名莫大乎忠孝分莫大乎君臣若魏武無忠臣之節其所謂機神明鑒者姦雄耳威公豈其比乎始蘓峻之禍賊將害其子者馮鐡也馮鐡奔石勒為戍將石勒畏威公之彊殺馮鐡石勒自以為一時豪傑標置二劉之間俯視曹孟徳司馬仲達而氣出其右顧畏威公如此威公沒距今幾千年所在廟祀之都昌縣南北廟為尤盛廟屢廢而屢興由其有功徳於斯民者厚也又繳到近世撫州布衣吳澥所著辯論曰卓哉陶士行之獨立也方魏晉之際浮虚之俗搖蕩朝野一時聞人達士名卿才大夫莫不陷於末流罔知攸濟惟士行深疾時弊慨然有作蓄其剛毅沉厚之氣秉其忠慤正固之節以與流俗争衡雖動而見尤所向白眼一入仕途荆棘萬狀而方寸耿耿者未始少渝終日運百甓於竹頭木屑間纎悉經營雖一束之穟劬勞不怠當時名士觀之宜若老農俗吏無足比數而士行確然為之不屑也卒能恢廓才猷立功立事以大庇斯民當晉室横流之中屹為底柱自非明智獨立安能臻此哉然覽庾亮之傳應詹之書則疑侃有跋扈之心觀溫嶠之舉毛寳之謀則見侃有顧望之跡比至洒血成文登天折翼動可疑怪豈有是事也哉此蓋行髙於人衆必非之加以蘓峻之誅庾亮恥為之屈既士行溘先朝露後嗣零落而庾氏世總朝權其志一逞遂從而誣謗之耳秉史筆者既有所畏何所求而不得哉是其旁見曲出乃所以證成其罪也然觀士行義旗既建一麾東下子喪不臨直趨蔡洲一時勤王之師蔑有先者暨元勲克集實主斯盟而退然不有旋師歸藩既坐擁八州踞上流已重泰山晉輕鴻毛移其宗社曾不反掌而臣節益脩未始擅作威福以自封殖朝廷憚其勲名每加疑備而士行泰然曾不少芥胸次及末年卧疾封府庫而登舟舉愆期而自代視去方伯之重不啻脱屣其臣節終始夷險無一可訾窮晉二百年間卓然獨出不忠之迹果安在哉今捨其灼然之實而信其似是之虚豈可謂善觀史也哉嗟乎自古欲誣人而不得者必汙以閨房之事以其難明故也今晉史欲誣士行而乃以夢寐之祥是其難明殆又甚於閨房哉然不知士行而實懐異志則如此夢寐之祥正合自知耳人安得而知之晉史以此待士行其智果不得與小兒等其説固不待攻而自破云本軍今檢凖乾道重修令諸道釋神祠祈禱靈應宜加官爵封號廟額者州具實事狀申轉運司本司驗實保明及詳本縣繳到文字所以發明公之心迹尤為明白有補名教理宜褒顯而公位登三事爵冠五等當時所以品節尊名者亦已稱其行事之實今据士民陳請在前欲乞朝廷詳酌採其行事特賜廟額以表忠義更不别賜爵號須至申聞者右謹具申轉運使衙伏乞照會詳酌前項所申事理依條施行伏候台㫖考異脩白鹿洞書院基地一作基坵脩築石隄種林木種下一有植字禁保甲豪右一作豪民晦菴集巻二十欽定四庫全書晦庵集卷二十一宋朱子撰
