  text: 晦庵集卷五十
  hash: sha256:7705d71b7cb72b0855dea1948582b9437c281b934159de00d8c5c6fa0706bf29
body:
  text: 宋朱子撰書問答門一本作知舊人問答合楊元範大法承示及新著易説開卷一讀啟發已多屬此數日諸處書問萃集撥置不下未及詳細但所略看過處其不能無疑者已兩三條如元亨利貞文王本意只是大亨而利於正耳至彖傳文言乃有四德之説今若依而釋之則此乾卦只合且以陽氣推説不應於利字遽以隂氣佐陽為言且以一木言之萌芽則元華葉則亨枝幹堅彊則利子實成熟則貞貞則所成之實又可種而為元循環盖無窮也若但謂歸根復命則亦不見貞字之意矣此須更於天地大化通體觀察其曲折未易以尺紙言也又大明終始乃言聖人大明乾道之終始程先生説本如此但傳中言之簡略却是語錄中有此意若云乾道自能大明其終始殊費言語卒不成文義也大有卦亨享二字據説文本是一字故易中多互用如王用亨於岐山亦當為享如王用享于帝之云也字畫音韻是經中淺事故先儒得其大者多不留意然不知此等處不理㑹却枉費了無限辭説牽補而卒不得其本意亦甚害事也非但易學凡經之説無不如此獨恨早衰無精力整頓得耳大抵隂陽只是一氣隂氣流行即為陽陽氣凝聚即為隂非直有二物相對也此理甚明周先生於太極圖中已言之矣答潘文叔友文所喻為學利病至纎至悉既知如此便當實下功夫就其所是去其所非久之自然有得力處正不必如此論量計較却成空言無益已事也况其所説一前一卻纒綿繳繞終日勞攘更不曾得下功夫只如此疑惑擔閣過却日時深為可惜向見子約書來多是如此嘗痛言之近日方覺撒手向前行得數步雖未必盡是且免如此遲疑惶惑首鼠兩端也知行之説恐古人説知字不如此大學所謂格物致知乃是即事物上窮得本來自然當然之理而本心知覺之體光明洞達無所不照耳非是囘頭向壁隙間窺取一霎時間已心光影便為天命全體也斵輪相馬之説亦是此病紙尾所謂壞證者似已有之切宜便就脚下一切掃去而於日用之間稍立程課著實下工夫不要如此胡思亂量過却日子也答潘文叔瞥然知見之説前書似已奉聞矣尚書亦無他説只是虚心平氣闕其所疑隨力量看敎浹洽便自有得力處不須預為較計必求赫赫之近功也近亦整頓諸家説欲放伯恭詩説作一書但鄙性褊狹不能兼容曲狥恐又不免少紛紜耳詩亦再看舊説多所未安見加刪改别作一小書庶㡬簡約易讀若詳考即自有伯恭之書矣大學之格物中庸之明善近日方亦看得親切恨相逺無由面論耳答潘文叔命之以事與上文謂之有謂之無一例未是指殺之語侯先生文字疎率只可大槩看然此一節却無病也人之氣質不同謀野而獲亦是虚曠閒靜處見事精審無膠擾之患耳固是質之所偏然亦非大病也左右固非大臣亦非閹宦弄臣但謂親近之臣如漢侍中給事中魏晉以來中書門下之比云耳所謂左右太親者身蔽正指劉放孫資而言耳大夫却是任政之臣六卿官之長亦上大夫也孟子之意但欲齊王審於擇人未必以其信左右之言而發所云教之以不信大臣亦是推説之過大抵讀書只合平心説理不必如此過求却失正意也答潘文叔所喻讀書求道深思力行之意深慰所望然殊未見常日端的用功及逐時漸入進步之處而但説不敢向外馳求不作空言解㑹恐又只成悠悠度日永不到真實地頭也承許官滿見訪㑹面非逺當得細論但嵗月如流光隂可惜既以自歎又不能不以人物世道為憂也答潘端叔友端示諭講學之意甚善甚善但此乃吾人本分事只以平常意思宻加慤實久逺功夫而勿計其效則從容之間日積月累而忽不自知其益矣近時學者求聞計獲之私勝其於學問思辨之功未加毫末而其分畫布置準擬度量之意已譁然於其外矣是以内實不足而遊聲四馳及其究也非徒無益於己而其為此學之累有不可勝言者惟明者思有以反之則友朋之望也答潘端叔示喻子約曲折甚當渠所守固無可疑但其論甚怪教得學者相率而舍道義之塗以趨功利之域充塞仁義率獸食人不是小病故不免極力陳之以其所守言之固有過當若據其議論則亦不得不説到此地位也承需論語或問此書久無功夫修得只集注屢改不定却與或問前後不相應矣山間無人錄得不得奉寄可只用舊本看有不穏處子細喻及却得評量也今年諸書都修得一過大學所改尤多比舊已極詳宻但未知将來看得又如何耳義理無窮精神有限又不知當年聖賢如何説得如此穏當精宻無些滲漏也答潘端叔持守省察不令間斷則日用之間不覺自有得力處矣禮記須與儀禮相參通修作一書方可觀中間伯恭令門人為之近見路德章編得兩篇頗有次弟然渠輩又苦盡力於此反身都無自得處亦覺枉費工夫爾答潘端叔子曰囘也其心三月不違仁其餘則日月至焉而已矣友端竊謂仁人心也盖非二物曰心不違仁者分而言之則心猶言仁之形仁猶言心之理也顔子心不違仁雖無時而或違然視聖人則猶有以此合彼氣象聖人以三月言其久盖常而不變也顔子未達一間者政在不違處以尚有些小思勉而已或謂不違則有時而或違不違者三月則或違於三月之外非也三月不違則三月之外或有時而少違矣以此合彼亦恐説得心與仁真成二物了所謂仁之形者亦然此類更涵養意思看不容如此太急迫也志於道據於德依於仁遊於藝友端竊謂事事物物皆有理也志於道則思以極之於涵泳之中也志者求之知是理而期於必至之謂天生德於予桓魋其如予何友端竊謂夫子之身桓魋所能害也夫子之德桓魋其如之何哉以畏匡之語叅之此聖人決知桓魋不能害己之詞之身之德其説過矣子與人歌而善必使反之而後和之伊川先生解歌必全章也與割不正不食席不正不坐同也未曉乞開誨嘗謂此章見聖人謙退詳審不掩人善之意乃為盡其曲折伊川先生但言其不從中間一截和起耳雖亦是一意思然恐未盡子曰泰伯其可謂至德也已矣三以天下讓民無得而稱焉友端竊謂文王有聖德盖天命之所在也泰伯知天命之所在故其讓也純乎天下之公而不係乎一己之私雖㫁髪文身舉世不見知而不悔止於至善而已庸他計乎非精於義達於權者其孰能與於此至德云者人心之安天理之極無過與不及而不可一毫加損者也此段意思甚佳曾子曰可以託六尺之孤可以寄百里之命臨大節而不可奪也君子人與君子人也友端竊謂臨大節而不可奪也貫上二句盖惟臨大節而不可奪方見得可以託可以寄耳夫託孤寄命幸而無大變未見其難也唯其㡬微之間義理精明危疑之時志意堅定雖國勢搶攘人心搖兀猶能保輔㓜孤而安其社稷維持百里而全其生靈利害不能移其見死生不能易其守故曰臨大節而不可奪也斯足以當夫所謂可以託可以寄矣此段亦好鄙意正如此説然可以二字盖猶以其才言之不可奪處乃見其節重處正在此也子曰如有周公之才之美使驕且吝其餘不足觀也已友端竊謂驕則挾為己有專於夸己者也吝則固為己私不肯舍己者也二者皆生於有己而已但驕者驕於人吝者吝於己驕則外若有餘吝則内常不足耳曰其餘不足觀者其餘指才美而言盖善者天下之公善也人之有善如才美在身雖若周公之多亦人之所當為耳夫何有於己以為己有則所謂才美者皆出於一己之私雖善猶利也故曰有其善䘮厥善是以其餘不足觀也二者之病未易去也自學者言之以一能自居以一知自喜皆所謂驕也善而不公於人過而憚改於己皆所謂吝也惟深致其知而勇於克己者始知二者之誠有害而後能覺其起而化其萌矣此義亦善子曰三年學不至於穀不易得也友端竊謂三年之間存察之功無斯須之忘也則工夫亦熟矣積累亦久矣其必至於善矣有不至焉者難得也則以夫所學之差等施工之斷續而然耳此章文義難通嘗意當從楊先生説但至當作志乃通耳考上下章意亦此類子畏於匡至匡人其如予何友端竊謂堯舜禹湯武王周公有其時而道行於世者也文王非其時而道傳之書者也孔子聖人之在下者老而不遇退而将傳之書故此章以斯文為言而獨曰文王既沒也此章意恐未然文王道行於當時澤及於後世矣子曰從我於陳蔡者至子游子夏友端竊謂顔閔冉雍稱其學宰我子貢以下稱其才顔閔四子非無才才不足以名之故所稱者學也宰我以下非不學學未至於成故所稱者止於才也皆舉其重者言之耳然非由賜游夏之徒終身之事而止於所稱者而已也盖才有不同學則無不同因其才之偏而抑揚進退之教者之事也因其才之偏而求有以化之學者之事也今程先生曰有以文學入者有以政事入者有以言語入者有以德行入者是學有多歧而所入之門各不同也盖恐記者之誤耳學不可以一事名德行言語政事文章皆學也今專以德行為學誤矣伊川先生之言恐當深味而以實事驗之由賜游夏之徒終身之事孔子所稱盖亦如此不必過為辭説曲加尊奉也子曰君子恥其言而過其行友端竊謂過其行猶易所謂行過乎恭䘮過乎哀用過乎儉之過非言過其行也以而字貫其中可見矣范氏以下之説恐文勢不順舊嘗疑此章當如此説今得來喻甚合鄙意也子張問行至子張書諸紳友端竊謂言忠信行篤敬存養之功繼而不息則事來知起不為物欲所昏而理之所在不能揜於省察之際矣若如楊氏其者指物之辭所謂其者果何物學者見此而後行則無入而不自得之説置之胸中則恐事物之來反成疑貳却反無下手處其字正指忠信篤敬耳參前倚衡謂言必欲其忠信行必欲其篤敬念念不忘常如有此二物在目前也答潘恭叔友恭友恭坐時亦間有虚靜之象此時却是無欲而未能無欲也此謂平時所恨工夫未能接續故憚煩失錯之處極多惟其憚煩愈多失錯深知之而不能改盖欲靜意勝也所論皆善但不可如此迫切計功非惟無益反有所害宜深戒之横渠説性命於氣性命於德之命恐只是聴命之意性天德命天理天理云者亦曰聴命於德無非天理之當然耳不知是否性命於氣恐性命兩字須作一般看言性命皆出於氣稟之偏也性天德命天理即所謂性命於德惟聖人可以踐形云者踐行當來吾身所具之理也可云者盡理而無餘欠也楊氏體性之説如何程先生以充人之名解踐形字甚善踐猶踐言踐約之踐非謂踐行所具之理也楊氏體性之語不可曉本作説太子蒯瞶得罪靈公出奔晉趙氏靈公嘗遊於郊謂公子郢曰我将立若為後靈公卒夫人奉遺命而立郢郢以輙在為辭於是國人立輙輙立十二年輙出亡蒯聵入是為荘公莊公立三十年而出奔友恭竊詳此事妄意謂輙不顧其父而自立固已失父子之義矣蒯聵得罪於父而出奔乃因豎良夫及孔悝毋劫悝升臺而盟立之是不用先君之遺命父子君臣之義俱失之矣然則宗國所宜立者何人其必郢乎當郢辭國之日國人立輙之時輙能逃去則郢無得而辭蒯瞶亦無復君衞之意及夫蒯瞶既入良夫悝母相與劫悝是時若能守之以死則蒯瞶安得而立哉惜乎孔悝不知出此一切付之無可奈何此蒯聵所以立也雖然天下豈有無父子君臣之國哉宜乎蒯聵未㡬而復奔也此論大槩得之但謂輙逃去則蒯聵無復君衛之意及蒯聵既立而復奔者非是盖輙自當逃去非欲為是以拒蒯瞶之來也蒯聵脱或能守其國亦不可知但義理自不是耳不必如此牽合也孔悝有母不能禁而使之為亂及為衛之臣又不能有所立以子路之賢為其家臣其事如何心甚疑之亦何所見而如此乞賜敎聖人之門不使人逃世避人以為潔故羣弟子多仕於亂邦然若子路冉有之徒亦太不擇矣此學者所當深戒也仲尼元氣段中并字莫是包上兩句否時焉而已時字恐是戰國風氣所致并秋殺盡見則以春生為主而兼舉之也時焉而已語意不分明未知端的指趣如此所説亦通或恐更有時既無人不得不自任之意或説秋殺氣象不常如此盖有時而或見之也未知孰是試并思之或謂游氏以犯上作亂為兩節據友恭所見只是一節遽説不好犯上處亦貫忠順而言則知其非兩節也作亂以上後説得之為仁之本一句似皆未得其説程説自與謝説不同不可混為一説也看得程説分明則自見謝説之非矣或謂傳不習乎是得於人而不習友恭謂不習而傳與人或謂忠信能相有而不能相無故程先生以為内外表裏友恭謂盡已者自反而無慊於中故曰内以實者即此而施之於人故曰外或謂謝氏雖推廣見得不止踐言為信亦恐包括不盡後結云幾於無我則能之莫傷易否友恭謂説信處却不少包總只欠以踐言為信作本意㡬於無我亦不為過傳習恐當如前説忠信後説近之而亦未盡蓋忠信一理但以所從言之則異耳所云自反無慊即此而施之語皆失之更當别下語也踐言後説得之無我前説得之大率前説看得文意平直而傷於草略後説子細而失之支蔓有囘互遷就之意不知前説誰所論不罪輕率也閔子侍側舊説誾誾和悦而諍也侃侃剛直之貌此訓得之更宜詳味子樂但為樂得英才而敎育之之意如云不害為自得皆其力分之所至似皆衍説也楊氏所引傷勇亦非孟子之意師過商不及詳味此章厯考二子言行之間有以知其因氣稟之偏而失性情之正此説甚佳二子晚年進德雖不可知然子張之語終有慷慨激揚之氣子夏終是謹守䂓矩也所云氣稟雖為未化亦不可謂全未化也此語亦是但似此立語微覺有病耳楊墨之説恐未然楊氏之學出於老耼之書墨子則晏子時已有其説也非二子之流也屢空只是空乏之空古人有簞瓢屢空之語是也但言顔子數數空匱而不改其樂耳下文以子貢貨殖為言正對此相反而言以深明顔子之賢也若曰心空則聖人平日之言無若此者且數數而空亦不勝其間㫁矣此本何晏祖述老莊之言諸先生盖失不之正耳程子曰孔子弟子顔淵而下有子貢夫子門人要其歸而論之則曾子仲弓閔子冉子恐不在子貢之下莫以其天資頴悟而言否程子所指意果如何此等不須遙度造理深後當自見得答潘恭叔友恭竊謂性命主理而言德氣主身而言性命之理得之於身者德也而其梏亡陷溺之者氣也盖德無不善而氣則有偏善所以成性立命而氣偏則隔之耳兩端之在身相為消長隨其多寡迭為勝負德不勝氣是無以勝其偏偏日以勝而善日以微則是性命之理反亂於氣矣故德不勝氣性命於氣德勝其氣是有以勝其偏善日以充而偏日以化則是性命之理不外於德矣故曰德勝其氣性命於德未知是否氣亦有純有駁不得專以梏亡陷溺為言但德不勝氣則其善者亦出於血氣之稟耳孟子曰形色天性也惟聖人可以踐形先生謂踐言踐約之踐反復紬繹極覺有味竊謂有是性則有是形色單舉形色則天性固在其中矣故曰形色天性故孟子言聖人不曰盡性而曰踐形也踐形云者猶言爽厥子不愆于素云耳曾子全而歸之曰啟予足啟予手亦此意盖㡬於踐矣學者主忠信所以求夫踐也一息不存則非踐矣游氏之説比楊氏為宻曰形者性之質曰能盡其性則踐形而無愧又曰未能盡性則於質有所不充如此發明固好但終不若程先生充人之形為的也盖盡性乃能踐形在性則言盡在形則言踐其實一也如引反身而誠之説及豈不慊於形哉之論則亦本程先生之意矣楊氏指形色為性指天性為則固佳如謂踐形體性恐未善尹氏引程先生之説盖亦充人之形之意也不知此語見於何書先生之説皆善但其間微有疎宻妄意如此乞賜批誨學者求至於可以踐形之功非但主忠信一事而已非踐語亦未瑩盖曰形有所不踐云耳盡性然後可以踐形今曰盡性乃能踐形亦未瑩先生曰忠信一理但所從言之異耳友恭竊謂忠信一理而於已言忠於物言信者盡已則主心而言物則主理而言故盡已之心為忠循物之理為信雖内外之不同要之皆誠於我耳心理不可以彼已分以理為事可也循物無違非謂循物之理但言此物則循於此物之實而無所違則是所謂信耳冉有子貢侃侃如也先生曰侃侃剛直之貌二子剛直之象無顯言者以論語考之妄意冉有自謂非不悦子之道力不足也有以見其不肯掩覆不敢欺隠為子華請粟夫子與之釜請益與之庾不滿其意便往自與粟五秉至於子貢因叔孫武叔毁夫子便曰人雖欲自絶其何傷於日月乎多見其不知量也夫子答問友曰不可即止毋自辱焉意者子貢平日多直己見因其質而語之凡此恐帶剛直之象恐别有所據侃侃只是比之誾誾者微有發露顯著氣象便是涵養未甚深厚處先生所云子張子貢氣質雖為未化亦不可謂全未化此語亦是似此立語漸覺有病耳友恭竊謂學者氣質茍未至於聖人皆不可以言化以二子進功之久殆曰變而未已者然當用力則未可謂之化也變化氣質之化與大而化之之化不同或問程子以薄昭之言證桓公之為兄信乎曰荀卿嘗謂桓公殺兄以爭國而其言固在薄昭之前矣盖亦未有以知其必然但孔子之於管仲不復論其所處之義而獨稱其所就之功耳盖管仲之為人以義責之則有不可勝責者亦不可以復立於名教之中以功取之則其功所以及人者未可以遽貶而絶之也是以置其所不勝責者而獨以其不可貶者稱之稱之固若與之而其所置而不論者又若將有時而論之也夫若將有時而論之則其所以為存萬世之防者亦不可不謂之切至耳矣盖聖人之心至明至公人之功罪得失固無所逃於其間而其抑揚取舍之際亦未嘗有所偏勝而相掩也非可與權者其孰能知之曰然則程子非與曰彼與聖人之所存而不論者曲加意焉其所以微顯闡幽建立民彛之意至深逺矣學者當熟考而深求之未可以率然議也友恭竊詳二子之問子路曰召忽死之管仲不死未仁乎以召忽對管仲言之是以召忽之死為是以疑仲不死難為非故以為未仁也子貢曰不能死又相之既言不能死復繼以又相之是疑仲不特不能死而又事殺其主之人故亦以為非仁也意者子路以仲為當死而不當生而子貢則并以為設使可生桓公亦不當事而俱有未仁之問也殊不知仲同糾謀則雖有可死之道而桓乃當立則無不可事之理盖仲雖糾之傅然非糾之臣乃齊之臣也桓公當立則桓乃吾君所當事也但仲之罪乃在於不能諫糾之爭而反輔糾之爭耳是其不死殆知前日之爭為不義而非求生之比也桓公舍其罪而用之則名不正而事正亦非反覆不忠之比也故夫子答子路為未仁之問則稱九合之功曰如其仁以為不死之未仁不如九合之仁也夫以九合之仁過於不死之未仁則夫子之意未真真一本作直以不死為非可知矣答子貢不死又相桓為非仁之問則復稱其功又辨其不死而曰豈若匹夫匹婦之為諒自經於溝瀆而莫之知曰豈若云者是又以仲之不死過於死也是夫子之意皆以不死相桓為可而不以其所處為非也故舊日讀此一章以程先生之説為正以桓公為兄子糾為弟召忽之死為守節管仲不死為改過二子不仁之問正疑其所處之非而夫子答之乃論其所處之義而非專取其所就之功也今伏讀先生之説恍然自失玩味累日迄未有得區區之意竊謂若從荀卿之説則桓公為殺兄管仲為事讐是仲不可復立於名敎之中聖人當明辨之以存萬世之防可也舍二子之所問而旁及其所就之功毋乃以功而揜義乎使二子問仲之功夫子置其所處之義而以不可貶者稱之可也今所問者不答而所答者非問則是畧其義而取其功也且不明以辨二子之問而隂以存萬世之防當其時而不論而將有時而論之㡬於不切而謂之切至何也薄昭之言雖未知其必然然以聖人取之之意則妄意謂桓公非殺兄管仲非事讐可也此論甚善向吕子約亦來辨之然不若來喻之詳也但管仲之意未必不出於求生但其時義尚有可生之道未至於害仁耳答潘恭叔性固不能不動然其無所不有非為其不能不動而後然也雖不動而其無所不有亦曷嘗有虧欠哉釋氏之病乃為錯認精神魂魄為性非為不知性之不能不動而然也使其果能識性即不可謂之妄見既曰妄見則不可言見夫性之本空此等處立語未瑩恐亦是見得未分明也答潘恭叔示喻為學之意甚善然不須如此計較但持守省察不令間斷則日用之間不覺自有得力處矣讀詩之説甚善頃見祁居之論語説此一段亦好大槩如來喻之云也其他各據偏見便為成説殊不能有所發明此固無足怪者而伯恭集解首章便引謝氏之説已落一邊至桑中篇後為説甚長囘䕶費力尤不能使人無競不審亦嘗致思否近年讀書頗覺平穏不費注解處意味深長脩得大學中庸語孟諸書頗勝舊本禮記須與儀禮相叅通脩作一書乃可觀中間伯恭欲令門人為之近見路德章編得兩篇頗有次第然渠輩又苦盡力於此反身都無自得處亦覺枉費工夫熹則精力已衰決不敢自下工夫矣恭叔暇日能為成之亦一段有利益事但地逺不得相聚評訂為恨如欲為之可見報當寫様子去也今有篇目先錄去此又是一例與德章者不同也綱目亦苦無心力了得盖心目俱昏不耐勞苦且更看㡬時如何如可勉强或當以漸成之耳答潘恭叔學問根本在日用間持敬集義工夫直是要得念念省察讀書求義乃其間之一事耳舊來雖知此意然於緩急先後之間終是不覺有倒置處誤人不少今方自悔耳詩説已注其下亦未知是否更告詳之大抵近日學者之弊苦其説之太髙與太多耳如此只是意緒叢雜都無玩味工夫不惟失却聖賢本意亦分却日用實功不可不戒也范公立子之説誠有未盡然太王之明太伯之讓王季之友皆有非唐髙祖父子所及者盖此意思不是一朝一夕揑合得成故范公寜守經据正而不敢遽以用權達節論之也儀禮已附髙要范令去不知今已到否此等工夫度有餘力乃可為不可使勝却涵養省察之實也答潘恭叔詩備六義之旨六義次序孔氏得之但六字之旨極為明白只因鄭氏不曉周禮籥章之文妄以七月一詩分為三體故諸儒多從其説牽合附㑹紊亂顛錯費盡安排只符合得鄭氏曲解周禮一章而於詩之文義意旨了無所益故鄙意不敢從之只且白直依文解義既免得紛紜枉費心力而六義又都有用處不為虚設葢使讀詩者知是此義便作此義推求極為省力今人説詩空有無限道理而無一㸃意味只為不曉此意耳周禮以六詩敎國子亦是使之明此義例推求詩意庶乎易曉若如今説即是未通經時無所助於發明既通經後徒然增此贅説敎國子者何必以是為先而詩之為義又豈止於六而已耶籥章之豳雅豳頌恐大田良耜諸篇當之不然即是别有此詩而亡之如王氏説又不然即是以此七月一篇吹成三調詞同而音異耳若如鄭説即兩章為豳風猶或可成音節至於四章半為豳雅三章半為豳頌不知成何曲拍耶關雎疑周公所作凡言風者皆民間歌謠採詩者得之而聖人因以為樂以見風化流行淪肌浹髓而發於聲氣者如此其謂之風正以其自然而然如風之動物而成聲耳如闗雎之詩正是當時之人被文王太姒德化之深心膽肺腸一時換了自然不覺形於歌詠如此故當作樂之時列為篇首以見一時之盛為萬世之法尤是感人妙處若云周公所作即國風雅頌無一篇是出於民言只與後世差官撰樂章相似都無些子自然發見活底意思亦何以致移風易俗之效耶卷耳詩疑文王征伐四方朝會諸侯時后妃所作卷耳詩恐是文王征伐四方朝㑹諸侯時后妃所作首章來喻得之後三章疑承首章之意而言欲登髙望逺而往從之則僕馬皆病而不得往故欲酌酒以自解其憂傷耳大意與草蟲等篇相似又四愁詩云我所思兮在太山欲往從之梁父艱亦暗合此章耳樛木序文有嫉妒之心則必無逮下之思矣此序却未有害也思疑恩字之誤螽斯序文螽斯不妒忌未有以察之小序又非的確可信之書詩中亦無不妒忌之意但見其衆多和集之状如人之不妬忌耳桃夭詩曰華曰葉自其生意之所及以至無所不及言室家家室家人亦其德之所及以至無所不及也一則生意寖大一則德意寖廣宛轉取譬此言意之所以無窮也桃夭序文首句恐已涉附㑹矣他説得之羔羊之序與桃夭相似二南篇中類多如此委蛇如毛氏説即於正直二字意尤親切然小序本未必能盡詩意即鄭張二説意亦自佳更須審擇取舍或兼存而自為一義不妨不可彊合為一説也振振君子即是家室思念君子不著其惡而著其善盖居者念行者事之常也殷其雷本無著其惡之意不必為此説但如死麕之吉士日月之德音則須説破耳標有梅上二句盖言男女之念人皆有之而若是者皆女子之發乎情而不能以自達者也下兩句盖言必待媒妁之言婚禮之備而後可行亦止乎禮義之謂也此詩即人情之近以感切當時之為人父母者使之婚姻之不失其時而已或曰是皆當時女子自賦之辭則不足以為風之正經矣發乎情止乎禮義之説甚善感切人之父母却恐未必有此意或是女子自作亦不害盖里巷之詩但如此已為不失正矣小星兼取程説甚善江沱之序恐未安又始則不能無悔至不我與則隨其所遇而安終不我過則處之已熟知其無可奈何無復憂慮嘯如淵明之舒嘯小序固不足信然謂江沱之間則未有以見其不然盖或因其所見山川以起興也其後也悔其後也處兩句若如今説以為媵之自言則後字不通而三章其字皆指物之稱亦非所以自命也集傳歗字之義向來伯恭深以為然野有死麕言彊暴者欲以不備之禮為侵凌之具者得之騶虞驅發之説近亦疑之楚詞云君王親發兮憚青兕此為發矢之義明矣然舊説虞人翼五豝以待公射中則殺一而已恐文勢不順疑此亦為禽獸之多見蒐田以時不妄殺伐至於當殺而殺則所謂取之以時用之以禮固不病其殺之多也盖養之者仁也殺之者義也自不相妨不必曲為之説兼文勢如此乃順如杜詩一箭正墜雙飛翼之比若如所解即當先言五豝而後言一發乃可通耳疑何彼穠矣何彼穠矣此詩義疑故兩存之東遷之初王室猶未甚卑也王命諸侯固有不斥其名者如微子畢公之類文侯當時既有大功稱字或是禮秩當然未可便為王室衰弱之證答潘恭叔讀詩諸説前書已報去近再看二南舊説極有草草處已畧刋訂别為一書以趨簡約尚未能便就也周禮恐五峰之論太偏只如冡宰一官兼領王之膳服嬪御此最是設官者之深意盖天下之事無重於此而胡氏乃痛詆之以為周公不當治成王燕私之事其誤甚矣胡氏大紀所論井田之屬亦多出臆斷不及注疏之精宻常恨不曾得見薛陳諸人不知其説又如何也通鑑舉要詳不能備首尾略不可供檢閲此綱目之書所為作也但精力早衰不能卒業終為千古之恨耳小學未成而為子澄所刻見此刋脩旦夕可就當送書市别刋成當奉寄此書甚有益也答潘恭叔敬之一字萬善根本涵養省察格物致知種種工夫皆從此出方有據依平時講學非不知此今乃覺得愈見親切端的耳願益加功以慰千里之望禮記如此編甚好但去取太深文字雖少而功力實多恐難得就又有擔負耳留來人累日欲逐一奉答所疑以客冗不暇昨夕方了得一篇今别錄去册子必有别本可看却且留此俟畢附的便去也儀禮附記似合只依德章本子盖免得拆碎記文本篇如要逐段參照即於章末結云右第㡬章儀禮即云記某篇第㡬章當附此不必載其全文只如此亦自便於檢閲禮記即云當附儀禮某篇第㡬章又如此大戴禮亦合收入可附儀禮者附之不可者分入五類如管子弟子職篇亦合附入曲禮類其他經傳類書説禮文者並合編集别為一書周禮即以祭禮賓客師田䘮紀之屬事别為門自為一書如此即禮書大備但功力不少須得數人分手乃可成耳所諭讀通鑑正史曲折甚善學不可不博正須如此然亦須量力恐太拽出精神向外減却内省功夫耳若作集注即諸家説可附入或有己見亦可放温公楊子法言太𤣥例也若只用注疏即不必然亦悶人耳分為五類先儒未有此説第一類皆上下大小通用之禮第二類即國家之大制度第三類乃禮樂之説第四類皆論學之精語第五類論學之粗者也大戴禮亦可依此分之卷數之説須俟都畢通計其多少而分之今未可定也其書則合為一書者為是但通以禮書名之而以儀禮附記為先禮記分類為後如附記初卷首即云禮書第一本行下寫儀禮附記一五字次行云士冠禮第一本行下寫儀禮一三字冠義第二本行下寫禮記一三字分類初卷首第一行云禮書第㡬本行下寫禮記分類一五字次行云曲禮上第一本行下寫禮記㡬通前篇數計之其大戴管子等書亦依此分題之首章言君子修身其要在此三者而其效足以安民乃禮之本故以冠篇毋不敬止安民哉賢者至能遷此言賢者於其所狎能敬之於其所畏能愛之於其所愛能知其惡於其所憎能知其善雖積財而能散施雖安安而能徙義可以為法與上下文禁戒之辭不同舊説非是安安而能遷來説得之但辭太煩耳疑事毋質直而勿有兩句連説為是疑事毋質即少儀所謂毋身質言語是也直而勿有謂陳所見聴彼決擇不可據而有之専務彊辨不能如此則是以身質言語矣敖不可長云云此篇雜取諸書精要之語集以成編雖大意相似而文不連屬如首章四句乃曲禮古經之言敖不可長以下四句不知是何書語又自為一節皆禁戒之辭也賢者以下六句又當别是一書説見前段臨財毋茍得以下六句又是一書亦禁戒之辭若夫坐如尸立如齊劉原父以為此乃大戴記曾子事父母篇之辭曰孝子惟巧變故父母安之若夫坐如尸立如齊弗訊不言言必齊色此成人之善者也未得為人子之道也此篇盖取彼文而若夫二字失於刪去鄭氏不知其然乃謂此二句為丈夫之事其説誤矣此説得之又立如齊注疏所説立容甚詳今皆不取而所取者乃無所發明之剩語此類恐更宜詳擇也禮從宜使從俗當又是一書其説舊注亦得之劉氏七經小傳有儀禮等説不可不看若夫二字與中庸好學近乎智上子曰二字相似皆失於刪去者也聖人作絶句舊見蜀中印本有如此㸃者似亦有理又人生十年曰幼亦為絶句學字自為一句下文至百年曰期頤皆然似亦得之取於人此與孟子治人治於人食人食於人語意相類於人者為人所取法也取人者人不來而我引取之也下文來學往敎即其事之實也齋戒儀禮雖無娶妻告廟之文而左傳曰圍布几筵告於荘共之廟而來是古人亦有告廟之禮不知何故不同耳答潘恭叔大抵此本本一作是成於樂如學樂誦詩舞勺舞象豈不是學者事舜命䕫典樂敎胄子豈不是學者事但漸次見效直至聖人地位始可言成耳敖惰讀者毎疑之嘗欲於或問中補數語以發之而未暇大抵此本有一等人上不至於可親愛畏敬下不至於可賤惡哀矜使人視之泛然不入念慮者耳然如此而猶以恐其有偏為戒則豈真敖忽而忘之哉己欲立而立人己欲達而達人欲立謂欲自立於世立人謂扶持培植使之有以自立也欲達謂欲自遂其志達人謂無遏塞沮抑使之得以自達也此説是隠居求志行義達道集注謂伊尹太公之流可當之是也顔子所造所得二賢恐無以過之而云亦庶乎此下語輕重抑揚處疑若於顔子少貶者若云古之人有行之者伊尹太公之流是也若顔子可以當之矣然隠而未見又不幸蚤死故夫子言然不知可否當時正以事言非論其德之淺深然也語意之間誠有如所論者更俟詳之驕吝二字平時作兩種看然夫子使驕且吝之言則若不分輕重者程子氣盈氣歉之説亦然今集注引程子之言而復有本根枝葉之論此説雖甚精但與程子説不同而以鄙嗇訓釋吝字若語意未足者盖先生將吝字看得重直是説到蔽固自私不肯放下處故凡形於外者無非私己之發此驕之所由有如此則工夫全在吝上此義亦因見人有如此之弊故微發之要是兩種病痛彼此相助但細看得吝字是隂病裏証尤可畏耳禮記言鄙詐慢易之心入之則是内外有兩心曰入之則此心是在外矣鄙詐慢易似非所以言心入之一字正是見得外誘使然非本心實有此惡也雖非本有然既為所奪而得以為主於内則非心而何恐不必致疑也答鄭仲禮一别二十餘年不復聞動静但中間得季隨所寄疑義獨賢者之言偶合鄙意而厄於衆口不能自伸初不知其為誰何既而乃知改名曲折甚慰别後之思也兹辱惠書益以為喜比日春和逺惟德履殊勝熹憂患衰朽中間㡬有浮湘之便竟以病懶迂疎不復敢出今又紛紛度其勢終亦難動每念吾敬夫逝去之後不知後來諸賢所講復如何比得季隨書又無復十年前意象矣嵗月易失歧路易差無由相聚痛相切磨千里相望徒有慨歎耳示諭讀易之説甚善向見敬夫及吕伯恭皆令學者專讀程傳往往皆無所得盖程傳但觀其理而不考卦畫經文則其意味無窮各有用處誠為切於日用工夫但以卦畫經文考之則不免有可疑者熹盖嘗以康節之言求之而得其畫卦之次第方知聖人只是見得隂陽自然生生之象而摹冩之初未嘗有意安排也至於經文亦但虚心讀之間畧曉其一二至有不可曉處則便放下不敢穿鑿以求必通如此却似看得有些意思亦嘗粗筆其説而未成也至於畫卦揲蓍之法則又嘗有一書模印以傳名曰啟蒙不知賢者曾見之否今以奉寄試詳考之復以見喻幸也來喻所謂隠者豈非麻衣之流乎此乃偽書向來敬夫雖不以其説為然然亦誤以為真希夷之師説也其言專説卦畫大槩似是而其所以為説者則皆瑣碎支離附㑹穿鑿更無是處如别紙所示數説恐亦未免此病此大學章句一本并往其間雖無𤣥妙奇特之説然皆是直説聖門著實用功處亦幸細觀如有所疑并以見告不敢不盡所懷也彼中朋友今有㡬人其趣向成就果能不失前人衣鉢之傳否向來猶時有往來商訂之益得以知其疎宻近年遂有不涉思慮言語之意虚無象罔不可捕詰皆非平日所聞於吾亡友者不知何故變得如此甚可歎也因便寄此未能盡所欲言正逺千萬以時自愛答鄭仲禮示喻為學之意甚善讀書固不可廢然亦須以主敬立志為先方可就此田地上推尋義理見諸行事若平居泛然略無存養之功又無實踐之志而但欲曉解文義説得分明則雖盡通諸經不錯一字亦何所益况又未必能通而不誤乎近覺朋友讀書講論多不得力其病皆出於此不可不深戒也季隨季忱為學如何近來有何講論因書幸致此意答余占之試期不逺且作舉子文固所當然然義理意味亦不可遽斷絶耳思無邪之説伊川意已如此氣味自長不必牽合諸説却味短也仁者能好惡人上蔡亦謂無私好惡耳但語中少却一私字便覺有病不以辭害意可也平易固疑於卑近然却正是初學事須從此去漸次自到髙逺處乃是升髙自下陟遐自邇之義未聞先髙逺而後平易也仁者愛之理而直以愛為仁則不可此處且更潛心久之有見方信得及今且當就此兩句裏面思量不必向外頭走作也周張二書恐未暇及若欲便看過熟讀深思此外更無别巧然亦不惟二書凡讀書之法皆不外此也答余占之仁愛之説大槩近之且更涵泳推廣久之浹洽自當信得及也井有仁焉謂赴井以救人為仁耳文義雖略迂晦然大意當是如此以下文可逝不可陷者觀之可見也七月開冰之説近亦有朋友如此致疑但不如此説則鑿冰踰月而後納之又似太緩恐此但先後相因之文非實以為今日明日也經傳類此處多但兼通衆説以俟講究虚心以容之不必遽為一定之説也答余占之熹比亦粗遣但老衰殊甚疾病益侵仇怨交攻盖未知所税駕也今年絶無朋友相過近日方有至者只一二輩猶未有害若多則恐生事矣無由㑹面逺書不能盡懷不知冬間能枉路一顧否答余占之直卿已歸在此今年往來亦有一二十人相過講習其間豈無曉㑹得意思者然未見大段斷然可負荷此事者甚可慮也答汪清卿所喻五常即是五行之性初無異義此性本善但感動之後或失其正則流於惡耳此等處反之於身便自見得不必致疑只是自家感動善惡之端須常省察持守耳答程正思設啟奠祝詣殯前跪告祝詞依髙氏書日内復具饌以辭訣塟前數日啟殯前未可謂之辭訣恐是日但設奠而啟殯至塟前一夕乃設奠辭訣啟䘮遣奠用髙氏書祝文髙氏祝詞云形神不留者非是據開元禮當作靈辰不留旋亦當作柩今雖不用此詞亦漫及之按禮既虞之後以吉祭易䘮祭吉祭䘮祭何辨未葬時奠而不祭但酌酒陳饌再拜而已虞始用祭禮卒哭則又謂之吉祭其説則髙氏説已詳矣但古禮於今既無所施而其所制儀復無吉凶之辨惟温公以虞祭讀祝於主人之右卒哭讀祝於主人之左為别盖得禮意大抵髙氏考古雖詳而制儀實疎不若温公之慤實耳答程正思示喻日用操存之意甚善甚善用功如此所造豈易量然亦須藉窮理功夫令胸次灑落始有進步處大學所謂知至而後意誠者正謂此也讀禮之暇宜取論語逐章細看每日不過兩三段先令盡通諸説異同然後深求聖言本意則久久自當見效矣答程正思所示禮文考訂詳悉上合禮意下適時宜甚善甚善其間小未備處已輙補之矣幸詳擇而勉行之使州里之間有所觀法非細事也答程正思承喻致知力行之意甚善然欲以靜敬二字該之則恐未然盖聖賢之學徹頭徹尾只是一敬字致知者以敬而致之也力行者以敬而行之也靜之為言則亦理明心定自無紛擾之效耳今以靜為致知之由敬為力行之凖則其工夫次序皆不得其當矣中庸所謂博學審問慎思明辨者皆致知之事而必以篤行終之此可見也茍不從事於學問思辨之間但欲以靜為主而待理之自明則亦没世窮年而無所獲矣答程正思塟地之訟想已得直凡百更宜審處與其得直於有司不若兩平於鄉曲之為愈也觀書以己體驗固為親切然亦須遍觀衆理而合其歸趣乃佳若只據己見却恐於事理有所不周欲徑急而反疎緩也答程正思論語舊嘗纂定諸説近細考之所當改易者什過五六知近讀此書有緒亦甚欲相與商訂耳答程正思論語三篇説甚子細衮衮未暇詳看所訂集注中一二字甚善如三事之為三者當即改易也此間講説不廢能問者不過二三人耳濂溪祠記刻成已久何為未見今併新刻三種内去先人小集一冊併往此間無他物可為寄也答程正思熹忽被改除之命來日當往奏事儻得遂瞻玉陛不敢愛身以為朋友羞但恐疎拙不能有以感動上意耳致知力行論其先後固當以致知為先然論其輕重則當以力行為重昨告擇之正為徒能知之言之而不能行者設耳於理固無大害也答程正思諸書再看義理未安處甚多皆是要切大頭項處令人恐懼不可言答程正思熹病倦不敢極力觀書閑中玩養頗覺粗有進處恨相去逺不得朝夕欵聚亦幸有一二朋友在此不廢講論因事提掇不為無助不知正思能一來否沙隨程丈聞亦欲入閩不知何時定成行也聞其制度之學甚精亦見其一二文字恨未得面扣之耳清卿省處恐靠不得不知他日來如何做工夫離羣索居易得鈍滯了人甚可懼也答程正思遷塟重事似不宜容易舉動凡百更切審細為佳若得已不如且已也異論紛紜不必深辨且於自家存養講學處朝夕㸃檢是切身之急務朋友相信得及者宻加評訂自不可廢切不可於稠人廣坐論説是非著書立言肆意排擊徒為競辨之端無益於事向來盖嘗如此今乃悔之故不願賢者之為之耳答程正思且歸侍旁日與諸弟姪講學甚善所謂聖賢大旨㫁然無疑久知賢者有此意思但覺有枯燥生硬氣象恐却有合疑處不知致疑耳所示孟子數條大槩得之但論心處以為此非心之本體若果如此則是本體之外别有一副走作不定之心而孔孟敎人却舍其本體而就此指示令做工夫何耶此等處非解釋之誤乃是本原處見得未明無箇涵泳存養田地所以如此更願察之也世學不明異端蠭起大率皆便於私意人欲之實而可以不失道義問學之名以故學者翕然趨之然諺有之是真難滅是假易除但當力行吾道使益光明則彼之邪説如見睍耳故不必深與之辨如下一本空一字疑是雪字答程正思所論放心之説甚善且更如此存養體驗久久純熟又須見得存養省察不是兩事也答程正思向見行王謝論大意甚善但論此兩人實事太草草恐是看得史書未熟亦不可不加意今日正要見得此兩人功少罪多處方見儒者大學功用之實耳所喻心説亦恐未精大抵此心有正而無邪故其存則正而亡則邪耳答程正思所喻孟子前日因一二朋友看到此疑其説之不明方略改定正與來喻合叔重必自報去矣答陳同父書不知曾細看否人皆以為此不足深辨此未察時學之弊者也區區之意豈為一人發哉鋟版乃此間吕沅州為之婺本初未有也此等事當平心觀之不必如此為已甚也答程正思所論皆正當確實而衛道之意又甚嚴深慰病中懷抱省試得失想不復置胸中也告子生之謂性集注雖改細看終未分明近日再改一過此處覺得尚未有言語解析得出更俟欵曲細看他時相見却得面論祝汀州見責之意敢不敬承盖緣舊日曾學禪宗故於彼説雖知其非而不免有私嗜之意亦是被染説得遮前揜後未盡見其底藴譬如楊墨但能知其為我兼愛而不知其至於無父無君雖知其無父無君亦不知其便是禽獸也去冬因其徒來此狂妄凶狠手足盡露自此乃始顯然鳴鼓攻之不復為前日之唯阿矣浙學尤更醜陋如潘叔昌吕子約之徒皆已深陷其中不知當時傳授師説何故乖訛便至於此深可痛恨元善遂能辨此深可歎賞深慚老繆放過此著今日徒勞頰舌用力多而見功寡也然則犬之性猶牛之性牛之性猶人之性與犬牛人之形氣既具而有知覺能運動者生也有生雖同然形氣既異則其生而有得乎天之理亦異盖在人則得其全而無有不善在物則有所蔽而不得其全是乃所謂性也今告子曰生之謂性如白之謂白而凡白之白無異白焉則是指形氣之生者以為性而謂之物之所得於天者亦無不同矣故孟子以此詰之而告子理屈詞窮不能復對也右第三章乃告子迷繆之本根孟子開示之要切盖知覺運動者形氣之所為仁義禮智者天命之所賦學者於此正當審其偏正全闕而求知所以自貴於物不可以有生之同反自陷於禽獸而不自知己性之大全也告子一段欲如此改定仍刪去舊論似已簡徑但恐於一原處未甚分明請看詳之答程正思所喻數説皆善孟子中間又改一過不記曾錄去否今恐未曾别寄一本但初看甚分明今讀之又似不分曉試更為思之如來喻固佳初欲取而用之又覺太繁注中著不得許多言語今可更約其辭為下數語來若發脱得意思分明又當改却此説乃佳也致知説及他數處近改者德粹寫得今有所改或問一二條亦寫寄之可就取看日新一條似比舊有功也發見之説已具叔重書中可更相與詳之此是日用工夫最精約處與向來五峰敬夫之説不同可更思之恐説未透却又須别下語也大學或問所引孟子正是傳授血脈與援引牽合者不同試更詳之人心道心近書雖云無疑恐亦有未徹處故猶有不善看之説亦請更察之也其他所論大槩皆正當但於曲折處間有未察則恐於所謂亭亭當當恰好處未免不子細也大抵近日朋友例皆昏弱無志散漫無主鞭策不前獨正思篤志勤懇一有見聞便肯窮究此為甚不易得常與朋友言之以為為學正須如此方有可望然亦覺得意思有粗疎處辨論工夫勝却玩索意思故氣象間有喧閙急迫之病而少從容自得之意此為未滿人意耳答程正思熹再辭之章并一疏上之頗推夏間所言之未盡者語似太訐未知得免於戻否所遣人以月初七八間行至今未還不知聖意定何如自覺疎拙無以堪此厚恩冒昧而前必取顛踣若得話行而身隠乃為莫大之幸耳所示諸書甚善甚善但臨川之辨當時似少商量徒然合閙無益於事也其書近日方答之所説不過如所示者而稍加詳耳此亦不獲已而答恐後學不知為惑耳渠則必然不肯囘也此間書院近方結裏江浙間有朋友在彼相聚興國萬正淳不知舊在南康曾相識否其間一二人亦儘可講論也小學字訓甚佳言語雖不多却是一部大爾雅也答程正思答子靜書無人寫得聞其已謄本四出久矣此正不欲暴其短渠乃自如此可歎可歎然得渠如此亦甚省力且得四方學者略知前賢立言本旨不為無益不必深辨之云似未知聖賢任道之心也答程正思所示策甚佳然詞氣之間亦覺尚欠平和處豈有所不能平於中耶陳正已之論何足深辨杲老嘗説少時見張天覺或告之曰蔡元長説相公極正當只是少些機數張應之曰蔡京斫頭破肚漢我若有機數却與你一般也若待它説伊川用處不周即伊川與你一般矣此可付一笑也通書注説善惡分明作兩節何為尚疑無先善後惡之意耶性字之説亦無可疑然得賢者如此發明亦有助也答汪子文似聞比來急於進取遂為神怪所惑殊駭聞聴於此等處把捉不定則所講聞於簡册者將以何用耶自此切須安常守正以為進學之地不宜復狥前失以陷於邪妄之域也答汪聖可示喻讀書勵行之意甚善甚善然更願反躬務實以充其言使無浮行之愧則區區之深望也答周舜弼謨熹適承枉顧示以長牋稱道過實決非淺陋所敢當不敢自辨數也至謂程氏二書出於記錄之餘不能無誤誠如所論向來所以各因大篇而存其姓號以相别者正謂是爾然言有似是而實非者有似非而實是者非好之篤玩之深而辨之明者或未能無誤也暇日見過得面叩其一二幸甚幸甚答周舜弼臨行所説務實一事途中曾致思否觀之今日學者不能進步病痛全在此處但就實做工夫自然有得未須遽責效騐也仁字想别後所見尤親切或有議論因來不妨見寄答周舜弼塟事不易便能了辦䘮禮盡誠不狥流俗此尤所難更宜深念閔卜二子除䘮而見之意以終禮制區區之望也彼中朋友用功為學次第如何便中喻及向時毎説持敬窮理二事今日所見亦只是如此但覺得先後緩急之序愈分明親切直是先要是持守上著力方有進步處也孟子説性善及求放心處最宜深玩之答周舜弼前此所示别紙條目雖多然其大槩只是不曾實持得敬不曾實窮得理不曾實信得性善不曾實求得放心而乃緣文生義虚費説詞其説愈長其失愈逺此是莫大之病只以其間所論曲折及後段克伐怨欲鄉原思學瞻忽前後之類觀之便自可見若果是實曾下得工夫即此等處自無可疑縱有商量亦須有著實病痛不應如此泛泛矣曾子一段文意雖説得行然似亦未是真見似此等處且須虚心涵泳未要生説却且就日用間實下持敬工夫求取放心然後却看自家本性元是善與不善自家與堯舜元是同與不同若信得及意思自然開明持守亦不費力矣君子而時中却是集注失於太簡令人生疑今已削去只見存文義已自分明若不為此句所牽則亦無可疑矣恐枉費思索故并及之然其切要工夫無如前件所説千萬留意也答周舜弼所論仁字殊未親切而語意叢雜尤覺有病須知所謂心之德者即程先生穀種之説所謂愛之理者則正所謂仁是未發之愛愛是已發之仁耳只以此意推之更不須外邊添入道理反混雜得無分曉處若如此處認得仁字即不妨與天地萬物同體若不㑹得而便將天地萬物同體為仁却轉見無交涉矣仁義禮智便是性之大目皆是形而上者不可分為兩事顔子之勇只以曾子所稱數事體之於身非大勇者其孰能之克己之説未為不是但如此言語上理㑹恐無益耳其他數條似皆未切大抵前後見舜弼講論多是不切已而止於文字上揑合所以無意味不得力須更就此斡轉方有實地工夫也答周舜弼示及疑問且當如此涵泳甚善致知工夫亦只是且據所已知者玩索推廣將去具於心者本自無不足也敬子逺來不易其志甚勇而功夫未宻更宜相與切嗟更令精細平穏乃佳耳觀其病痛與長孺頗相似所以做處一般不知吾人所學且要切身正不以此等為髙也若親養未便亦須委曲商量不須如此躁迫也伊川告詞如此是亦紹興初年議論未免一褒一貶之雜也答周舜弼所諭敬字工夫於應事處用力為難此亦常理但看聖賢説行篤敬執事敬則敬字本不為黙然無為時設須向難處力加持守庶㡬動靜如一耳克己亦别無巧法譬如孤軍猝遇彊敵只得盡力舍死向前而已尚何問哉答周舜弼示喻為學之意大槩不過如此更在日用之間實用其力念念相續勿令間斷答周舜弼來喻所云皆學者不能無疑之處然讀書則實究其理行已則實踐其迹念念鄉前不輕自恕則在我者雖甚孤髙然與他人元無干預亦何必私憂過計而陷於同流合汙之地耶答周舜弼講學持守不懈益勤深慰所望又聞頗有朋友之助當此嵗寒不改其操尤不易得也更願相與磨厲以造其極毋使徒得虚名以取實禍乃為佳耳前書絜矩之説大槩得之二字文義盖謂度之以矩而取其方耳今所示數條各以鄙意附於其後却以封還幸試思之來説大槩明白詳細但且於此更加反復虚心静慮宻切玩味久之須自見得更有精微處不但如此而己也承欲見訪固願一見但逺來費力不若如前所説著實下功果自得之則與合堂同席亦無以異也鄉來蔡君今安在能不受變於俗否耶大學之道莫切於致知莫難於誠意意有未誠必當隨事即物求其所以當然之理然觀天下之事其㡬甚微善惡邪正是非得失未有不相揉雜乎芒芴之間者静而察之者精則動而行之者善聖賢之學必以踐履為言者亦曰見諸行事皆平日之所素定者耳今先生之敎必曰知之者切而後意無不誠盖若泛論知至如諸家所謂極盡而無餘則遂與上文所謂致知者為無别况必待盡知萬物之理而後别求誠意之功則此意何時而可誠耶此正學者𦂳切用功之地而先生訓釋精明誠有以發聖賢未發之藴竊嘗體之於心事物之來必精察乎善惡之兩端如是而為善則確守而不違如是而為惡則深絶而勿近先生勿去此并上二句亦庶㡬不茍於致知而所知者非復泛然無切於事理不茍於誠意而好善惡惡直欲無一毫自欺之意敬守此心無敢怠忽課功計效則不敢以為意焉如此用力不知如何知至只是致知到處非别有一事也但見得本來合當如此之正理自然發見透徹則所知自切不須更説確守深絶而意自無不誠矣傳之二章釋自新新民而結之以君子無所不用其極者言皆欲止於至善也盖自致知以至脩身無非所以自新也自齊家以至平天下無非所以新民也凡此八者誠大學之條目然必曰止於至善者深言擇善不可以不精耳夫善一也有至善則有未善先生改云善而未至所以言擇善之難如此過則失中不及則亦未至于中宜其應事接物之際固有欲為公而反遂其私欲為義而乃狥乎利厚薄輕重泛然而應不得其當是皆知之有未切也補亡之章謂用力之久而一旦廓然貫通焉則理之表裏精粗無不盡而心之分别取舍無不切是必加之以積習之功庶乎廓然貫通然後可以言止於至善之事乎茍未至此則分别取舍於心當如何一事自有一事之至善如仁敬孝慈之類忿懥恐懼好樂憂患人之所不能無者然有一于此則心不得其正何哉盖此心不可以頃刻而不存茍喜怒憂懼一萌于中則心有係累不特不能帥乎氣而氣反得以動其心矣故當忿懥之時唯有忿懥而已既以忿懥為主尚何心之可存恐懼之類莫不皆然聖人於此深欲學者常存此心無少間斷喜怒哀懼猶不可有而况於曠蕩外馳邪辟妄念以為此心之累者乎故曰心有不存則無以檢其身矣以此意體之如何有喜怒憂懼則四者之發不得其正無喜怒憂懼則四者之發何不正之有絜矩之道推已度物而求所以處之之方故於上下左右前後之際皆不以己之所不欲者施諸彼而已矣然皆以敬老事長恤孤之三者推之以見民心之同然故下文極言好惡不可以異乎人而財利不可以擅乎已茍惟不然皆取惡之道也是則一章之意無非發明恕之一字上章既言所藏乎身不恕則不能喻諸人矣於此復推廣之以極其所不通之意恕之為用其大如此求其指歸則不過孝弟慈三者行乎一家推而至於治國平天下同一㡬而已孝弟慈非恕也自身而家自家而國自國而天下推之者近施之者廣必與人同其欲而不拂乎人之性茲其所以為恕以此觀之是否此段説得條暢致中和注云自戒謹恐懼而守之以至於無一息之不存則極其中而天地位矣自必謹其獨而察之以至於無一行之不慊則極其和而萬物育矣夫喜怒哀樂未發謂之中戒謹恐懼所以守之於未發之時故無一息之不存而能極其中發而皆中節謂之和必謹其獨所以察之於既發之際故無一行之不慊而能極其和天地之所以位者不違乎中萬物之所以育者不失乎和致中和而天地自位萬物自育者葢如此學者於此靜而不失其所操動而不乖其所發亦庶㡬乎中和之在我而已天地萬物之所以位且育焉則不敢易而言之未識是否其説只如此不難曉但用力為不易耳勉旃勉旃凡事豫則立一節言與事行與道皆欲先定於其初則不跲不困不疚不窮斯有必然之驗故下文自不獲乎上不信乎朋友不順乎親而推之皆始於不誠乎身而已然則先立乎誠為此章之要旨而不明乎善則不可以誠乎身也今欲進乎明善之功要必格物以窮其理致知以處其義夫然後真知善之為可好而好之則如好好色真知惡之為可惡而惡之則如惡惡臭明善如此夫安得而不誠哉以是觀之則中庸所謂明善即大學致知之事中庸之所謂誠身即大學意誠之功要其指歸其理則一而已是否得之費而隠章引鳶飛魚躍之詩以明其旨程夫子以為子思喫𦂳為人與必有事焉而勿正之意同活潑潑地竊以為子思之言無非實理而程夫子之説亦皆真見今又得先生竄定此章反復開曉昭然著見耽玩久之心融意釋夫形而下者道之用矣必有形而上者為之體其用廣夫安得而不費其體微又安得而不隠體用顯微初無間絶人惟覩其用之顯而不見其體之微也是以終身由之而不知子思於是託鳶魚以明此理之昭著而其所以然之故則亦可知其隠然為難見也夫見於鳶魚者尚爾而况自夫婦隠微之間極而至於天地廣博之際化育流行洪纎髙下莫不皆然此理固非偶然者而亦孰與之哉子思之言精宻峻潔而程子之論無纎毫凝滯倚著之意非先生其孰知之大意如何只是如此更宜詳味二十七章始言道之體極於至大而無外道之用入於至小而無間非至德之人不足以凝之中言至道之凝非大小精粗舉而並行則不足以凝是道也末言所處之無不宜所以極言至道之凝其效如此然大小精粗之旨諸家所論不同張子逐句為義吕氏因之以一句自相反覆為説游氏以逐句相承接為説楊氏以逐句上一節承上節下一節承下節為説却以温故知新為道問學之事敦厚崇禮為道中庸之事兼而讀之亦足以發明大旨然分比精宻條理該貫終不若以尊德性為存心之本而極乎道體之大以道問學為致知之本而盡乎道體之細遂以廣大髙明温故敦厚為存心之屬以精微中庸知新崇禮為致知之屬於是犁然各當於人心使學者有用力之地而不悖乎名義之紛紜也竊嘗玩索所謂不以一毫私意自蔽者指致廣大而言也不以一毫私欲自累者指極髙明而言也乍讀兩句似若一意相同然試體之一以私意自蔽則心不洪放而狹隘迫窄何以致廣大乎一以私欲自累則此心沉溺而昏暗卑陋何以極髙明乎此二句若相似而實不同者妄意如此是否得之末章八引詩前五條論始學至成德疎宻淺深之序後三條皆所以贊不顯之德前此盖未有發明斯義若此昭著明白也今觀尚絅一條則知為己之學不可以狥名而入德之方皆由乎已而已進而至於亦孔之昭則謹獨之行已著又進而至於不愧屋漏則謹獨之效益彰其曰奏假無言所以言其德之已成又曰不顯惟德所以言其德之至盛故先之以不賞不怒而民自畏勸終之以篤恭而天下平也夫自下學謹獨之事積而至於篤恭而天下平則其存心也愈謹而進德也彌盛復三引詩以歎詠不顯之德固不在乎聲色之末亦非德輶如毛之可比極論其妙不若無聲無臭之詩為可以形容其不顯之至耳竊嘗謂此章之旨正與首章相應首章論道體之大端故以性命敎之三者言之於始然必戒謹恐懼而存其未發之中必謹其獨而保其既發之和中和之至所以能位天地育萬物者盖其德之盛同乎天而然也中庸之書所以始於是者其旨深哉有志於學者可不知天德之在聖人者為如何於此宜盡心焉爾未審是否亦孔之昭是謹獨意不愧屋漏是戒謹恐懼意君子無終食之間違仁不但終食之間而已也雖造次必於是不但造次而已也雖顛沛必於是盖欲此心無頃刻須臾之間㫁也及稱顔子則曰三月不違於衆人則曰日月至焉而已今學者於日月至焉且茫然不知其所謂况其上者乎克己工夫要當自日月至焉推而上之至終食之間以至造次至顛沛一節宻一節去庶㡬持養純熟而三月不違可學而至不學則己欲學聖人則純亦不已此其進歩之階歟下學之功誠當如此其資質之髙明者自應不在此限但我未之見耳不忮不求何用不臧貧與富交彊則忮弱則求人惟中無所養而後饑渴得以害其心也故不能自安於貧而有慕乎彼之富此心一動物欲行焉故雖可已而不已孟子所謂宫室之美妻妾之奉所識窮乏者得我而為之類葢有不可勝窮之私由是以失其本心而忮嫉忮害生焉否則謟曲以求之而不自知其為卑汚淺陋之甚也子路之志不牽乎外物之誘夫子稱之欲以進其德惜乎不能充此而上之至有終身誦之之蔽不然簞瓢陋巷之樂當與顔子同之日用工夫信乎不可遽已也是如是晦庵集卷五十欽定四庫全書晦菴集卷五十一宋朱子撰書問答門一本作知舊人問答
