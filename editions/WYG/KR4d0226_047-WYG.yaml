body:
  text: 答吕子約喻及日來進學之功尤慰孤陋且深有助於警省為惠厚矣氣質未化偏重難反學者之通病今亦但當用力於恭敬持養之地而玩索義理以培養之不必反復較計悔咎尅責如此太深却恐有害清明和樂之氣象亦足以妨日新之益也答吕子約示諭縷縷備見篤學力行之意然未免較計務獲之病著此意思横在方寸間日夕紛擾非所以進於日新也所讀書亦太多如人大病在床而衆醫雜進百藥交下決無見效之理不若盡力一書令其反復通透而復易一書之為愈盖不惟專力易見功夫且是心定不雜於涵養之功亦有助也又謂不欲但為聞見之知此固當然聞見之知要得正當亦非易事誠未可輕厭而躐等也答吕子約時習之義程子云習重習時復思繹浹洽於中則説此恐是學原於思之意凡所當事者皆學也不致其思繹以通之則無自而進茍苦思力索則淺迫無味亦失所謂説矣惟學焉而時復思繹勿忘勿助積累停蓄浹洽涵養杜元凱所謂如江海之浸如膏澤之潤渙然冰釋怡然理順然後為得此即時習而説之注釋也張先生所云似與程子之意未合此説甚佳南軒解義為人借去不盡記其説然覺得儘有未安處也巧言令色鮮矣仁恐止當從尹氏説尹説固好然其間曲折恐亦不可不講若有人引上蔡所引許多同異問之尹公他必有説不只如此打過也傳不習乎恐止當從明道説葢恐不習而傳之則在已審問明辨之功有加無已篤於自反而懼於傳之或差上蔡之説恐與章指未合差下一本有也字如明道説文勢似不甚順若從上蔡之説則先忠信後講學乃與上下章意思相似又文勢安帖不煩多訓似亦有理試更思之父在觀其志一章恐指意在下又志所存也行所為也有父兄在安得聞斯行之雖欲成父之美而親心未順焉雖欲為不善而莫得肆焉止觀志之所存可也若親没矣吾之所欲為者遂矣故必觀其所為之專與不專而後可盖雖為之善然不能忍而遽改則亦謂之死其親可也至於三年之間事死如事生而無伸已之意迺謂之孝可謂孝矣云者深嘉之辭若曰如其非道則何待三年是未深體觀其行之意也夫不幸而有所當改是乃吾平日之拳拳而未能孚於吾親者今也哀痛之深固有所斡旋改移於不動聲氣之中者矣茍有決厲之意則縱有丘山之善然此心不㡬於息乎此説甚好但謂固有斡旋改移於不動聲氣之中者此句未安熹舊來亦嘗有此意後看史書見有居官不改前人之政但因事遷就使人不見其迹者必大悦之以為代人居官猶有能如此者况於所天乎因以此問於李先生先生曰此意雖好但每事用心如此恐駸駸然所失却多聖人所謂無改者亦謂尚可通行者耳若不幸而有必不可行者則至誠哀痛而改之亦無可奈何不必如此囘互也此意竊謂學者不可不知恐當更思之也又有謂其志其行皆指父而言意亦自好試并思之如何日月謂一日一箇亦得論氣之感也謂古今一箇亦得論氣之本也感字未安李文饒謂日月終古常見而光景常新此亦善言天者季路問事鬼神告以事人問死告以知生欲令子路原始觀終聚而通之也未知生焉知死是固然矣未能事人焉能事鬼恐救子路忽於近之病盖在目今雖曰未能事人然隠微之間如執虚奉盈所以事之者自當深用其力茍於此知所事則事人之道亦可進但闕畧於事人則益不能事鬼矣熹嘗謂知乾坤變化萬物受命之理則知生而知死矣盡親親長長貴貴尊賢之道則能事人而能事鬼矣只如此看意味自長戒慎隠微又别是一事不必牽合作一串也體物而不可遺之義盖物是形而下者物其物則息生不窮是所謂體物而不可遺也即形於上者也茍物而不物則死矣體云者其流行發見非物自爾而必有體之者也體物之意剖析得甚好但本是鬼神之德為此萬物之體非是先有是物而鬼神之德又從而體之也物而不物則死矣此句有病須知若初無體之者則亦無是物矣游䰟為變之義如何精魄也耳目之精明為魄氣魂也口鼻之嘘吸為䰟二者合而成物精虚魄降則氣散魂遊而無不之矣魄為鬼魂為神禮記有孔子答宰我之問正説此理甚詳雜書云魂人陽神也魄人隂神也亦可取横渠上蔡論此亦詳誰毁誰譽一章恐當看誰字此正見聖人大公無我之心如有所譽者其有所試矣此又聖人無所私好而於善善之意亦不侵過分毫來誨所謂但有先褒之善而無預詆之惡似恐於公平之意思未完熹昨來之説善善速惡惡緩正書所謂與其殺不辜寧失不經罪疑惟輕功疑惟重春秋傳所謂善善長惡惡短孔子樂道人之善惡稱人之惡之意而仁包五常元包四德之發見證驗也聖人之心雖至公至平無私好惡然此箇意思常在便是天地生物之心若但一向恝然無情則恐或有流於申商慘覈之科矣試更思之洪範皇極亦有此意答吕子約所喻日用工夫足見為已之意甚善然别紙所論論語首章便是讀書玩理之様轍更無别塗請只如此用功不必切切論功計獲也答吕子約示喻日用功夫有未到處此見省身克己用力之深不勝歎仰然前後已屢奉聞不必如此計較迫切但措其心於中和平正之地而深以義理灌溉培養之自然日有進益如其不然則存養講習之功未及一二而疑悔勞殆之病已奪其千百矣試更思之至如讀書只且立下一箇簡易可常底程課日日依此積累功夫不要就生疑慮既要如此又要如彼枉費思慮言語下梢無到頭處昔人所謂多岐亡羊者不可不戒也答吕子約巧言令色鮮矣仁論章旨則尹氏之説為完若旁通其義如辭欲巧之類是迺修省細宻工夫其發原自别然修辭之功亦易得入於安排計較而不自知其所發之偏者亦為鮮矣仁也發原自别之説甚好修辭之功固易入於安排計校然亦只得就發原處謹之耳若捨此而别生疑慮則又轉見繳繞不得剖決也曾子之三省為人謀與朋友交傳諸人惟恐應物之或不如已而篤於自反也尹子言諸公逺來依先生之門某豈敢輙為他説萬一有少差豈不誤他一生恐正是傳不習之意先忠信後講學固是如此但忠因謀言信因交言恐與行有餘力則以學文之意未類上蔡之説竟未敢安所引尹公語甚好然於此文句中似覺少兩三字聖賢立言不如是之巧而晦也謀不忠則欺於人交不信則欺於友傳不習則欺於已欺於師是亦忠信之類耳更思之其志其行皆指父而言意亦好但於本章之旨恐未安父在觀其志觀其所志之善惡也父沒觀其行觀其所行之肆與否也三年無改於父之道則事亡如事存而不忍死其親焉故曰可謂孝矣斡旋改移其始止於隠惡諱過本在於愛親駸駸而往易入於私其病固不細然彌縫調停之工又不可廢所謂度不可行至誠哀痛而改之固不必囘互但弗知所以改之之方則或傷於張皇驟快而無遲遲浸漸之意味亦非篤於愛親者也謝方明事祖儉舊看得甚可為法然李先生之言亦要於此致察先生之言恐更當思之至誠哀痛四字儘有意思存得此心自不至張皇也據今日病證似當且服此藥便自胸次開闊黑白分明若更主張調停兩字正是以水濟水竊恐昬昧隘促轉見無進步處父没觀行必如舊說亦為是非邪正之類所包甚廣今只云肆與否却覺拘滯兼又與上句參差下句重併尤未穏當日月終古常見而光景常新其理固如此然所謂常見所謂常新必有科别日月隂陽之精終古不易然非以今日已昳之光復為來日將升之光也故常見而常新未能事人而欲事鬼未能知生而欲知死是猶未知其首而欲知其尾也知首之旨當如來教又思事人之旨恐止是不敢欺不敢慢出門如賓之類皆是如此而致敬宻察庶㡬可以交神明矣事如祗事之事所謂盡親親長長貴貴尊賢之道恐於事字未叶此説甚好比熹説尤親切盖親親長長貴貴尊賢之道固不外乎愛敬但如此説方親切耳然四者之目亦不可廢請更思之視之不見聴之不聞體物而不遺此三句乃指鬼神之德而言視不見聴不聞無形聲臭味之可聞可見也然却體物而不遺則甚昭然而不可揜也所謂體物者固非先有是物而後體之亦非有體之者而後有是物萬物之體即鬼神之德猶云氣即性性即氣而不可離也可離則無物矣所謂不可遺者猶言無遺闕滲漏盖常自洋洋生活不間乎晦明代謝也物之聚散始終無非二氣之往來伸屈是鬼神之德為物之體而無物能遺之者也所謂非有體之者而後有是物與所謂無遺闕滲漏者皆非是䰟者其氣也氣散䰟遊而無不之所謂無不之者已屈之氣尚有在於天地之間邪抑否也然氣聚則生氣盡則死何者為遊䰟玩遊之一字謂其即便消散又似未盡也體魄藏於地恐指成質而言如月魄以無光明者言謂耳目之聰明為魄有所未曉合耳目之聰明而言則䰟不離魄聰明即氣之運乃是䰟也失其耳目之聰明而言則䰟去魄存恐難以耳目聰明命之為魄也程子曰䰟氣歸于天消散之意遊䰟亦是此意盖離是體魄則無所不之而消散矣雖未必皆即時消散要必終歸於消散也䰟魄之分更當熟究隂陽之分體魄自是二物魄之降乎地猶今人言眼光落地云爾體即所謂精氣為物盖必合精與氣然後能成物也洙泗言仁及契丈仁説竊得諷味復之九二休復之吉以下仁也謂初九也易傳云一陽復於下乃天地之心此正與元者善之長同理竊謂五常之仁猶四時之春至善醇醲不雜孟子指乍見之心為仁之端下即論非内交要譽而然盖因乍見之真而可知其有仁也端云者苖裔端倪之謂也覺痛痒則非不仁則覺者所以驗乎仁有彼我心則為不仁則公者是仁之意思愛是仁之用恕是仁之施而樂山靜壽又乃形容仁之體叚也程子氣類相合之言殊覺有味要湏先以萬善之先名仁而後可以用工致力若所謂克己復禮如見如承之類皆用功致力之道也要皆當一一剖析又不敢太成支離失其全體以萬善之先名仁殊不親切且以所引易傳及四時之春者體之即見熹前所論綂仁義禮智及四端而言者其分界限明而血脈通貫不必别立名字但要用功致力使真不失此心然後為得耳答吕子約承喻專看論語寖覺滯固因復看易傳及繫辭此愚意所未喻盖前書布此曲折已再三矣似已畧蒙聴察不知何為而復蹈舊轍也夫論語所記皆聖人言行之要果能專意玩索其味無窮豈有滯固之理竊恐却是不曾專一故不見其味而反以為滯固耳至如讀易亦當遵用程子之言卦爻繫辭自有先後今亦何所迫切而手忙脚亂一至於此邪所論主一主事之不同恐亦未然主一只是專一盖無事則湛然安靜而不驚於動有事則隨事應變而不及乎他是所謂主事者乃所以為主一者也觀程子書中所論敬處類集而考之亦可見矣若是有所係戀却是私意雖似專一不舍然既有係戀則必有事已過而心未忘身在此而心在彼者此其支離畔援與主一無適非但不同直是相反今比而論之亦可謂不察矣惟其不察於此是以未能專一而已有固必矜持之戒身心彼此實有係戀支離之病而反不自知其非又凡前後所言類皆瞻前顧後一前一却之論不曾坦然驀直行得數步此亦一箇大病根株恐當痛下功夫刋削不可悠悠又只如此説來説去久之看得只似尋常也答吕子約修省言辭誠所以立也修飾言辭偽所以增也發原處甚不同夫子所謂巧令鮮仁推原辭意而察巧令之病所從來止是有所為而然如未同而言以言餂人脅肩謟笑以喜隨人之類皆有所為也曰鮮矣仁云者獨言巧令之人於仁或㡬乎息而不敢謂之全無也有所為之説甚善但不敢謂之全無指意畢竟如何幸更喻及伊川先生解中却云謂非仁也便如此直截説破意又如何曾子之三省忠信而已則程子包傳不習乎一語解之矣所謂欺於已欺於師想是程子之意但祖儉竊謂傳不習乎亦湏兼就不習而傳於人上説盖不習而傳則是中有未盡而與欺人無異也與上文同旨而傳習又所當省者故專言之如子夏後為荘周之類皆由傳之有所未習故流傳之久不能無弊觀老於西河之上氣味謂之講習之功全盡未可也惟曾子謹其所傳故至今無弊然彼以其富之言摽使者出大門之義説大人則藐之之訓其血脈貫通皆似有少傷和粹處信乎傳而習之為難也所謂傳非如釋氏半夜傳法之謂盖在已有所未克則其動止之間不能無失茍時習之功有所未至流傳於後豈不有害所論甚善末後注脚尤好但恐文意未如此耳恐當放下許多道理且平心看他文義向甚處去都不要將道理向前牽拽他待他文義有歸著去處穏帖分明後却有箇自然底道理出來不容毫髪有所增損抑揚此處正好玩味也大抵先要虚心為要耳如禹無間然一叚五峯説得甚好然近日細看恐聖人當日賛歎之時未有此意他似此者甚多李先生之論盖欲拯世人計較之病大要恐人思前算後遷就囘互入於不誠不直而弗自覺知然人之資稟剛柔不齊則藥其所偏者又恐難一槩論止是要認得此意旨所發而於計較思算時常常㸃檢也日用功夫固當縝宻然覺得如此煩碎繳繞又似自縳殺了故先生之意大抵且要簡節疎目先整頓得大體是當然後却就上面子細㸃檢是亦學不躐等之意也坎離隂陽之成質故為上篇之終既濟坎離之合未濟坎離之交故為下篇之終五行之運獨言水火又謂為成質何也隂陽成質水火為先故洪範一曰水二曰火正蒙中亦有一段論五行次序説得分明可更檢看數學有乾坤付正性於離坎之説似亦有理日月隂陽之精氣向時所問殊覺草草所謂終古不易與光景常新者其判别如何非以今日已昳之光復為來日將升之光固可畧見大化無息而不資於已散之氣也然竊嘗觀之日月虧食隨所食分數則光沒而魄存則是魄常在而光有聚散也所謂魄者在天豈有形質邪或乃氣之所聚而所謂終古不易者邪日月之説沈存中筆談中説得好日食時亦非光散但為物掩耳若論其實須以終古不易者為體但其光氣常新耳然亦非但一日一箇盖頃刻不停也二氣五行造化萬物一闔一闢萬變是生所謂五行之氣即雷風水火之運邪又即二氣之參差散殊者邪先儒謂物物皆具則人之氣稟有偏重者謂之皆具可乎或謂雖物皆具而就五行之中有得其多者有得其少者於此思之殊茫然未曉五行之氣如温涼寒暑燥濕剛柔之類盈天地之間者皆是舉一物無不具此五者但其間有多少分數耳五音五色五味之類皆是也鬼神之德盖甚難知於此粗入思慮竟於體物不遺上看得未極分明於此不透故不自知而溺於釋氏處多明道答上蔡語謂向你道有來又恐賢問某討向你道無來你又恁生信得及每每於此思量乍得乍失近因相識有饋生鵞者欲殺之則甚不忍欲貨之則取其利而殺其身恐有寃之之意常感於中此病不已便入因果上去又因夜夢疑若有世間所謂鬼者欲出雖未睡覺然心知其無以理却之竟無有也雖曰以理却之然中心不無驚悸若此類則釋氏之説久久極易惑人但先入者為主可以主張然非實曉亦安能保也鬼神只是氣之屈伸其德則天命之實理所謂誠也天下豈有一物不以此為體而後有物者邪以此推之則體物而不可遺者見矣著實見得此理則聖賢所論一一分明不然且虚心向平易分明處别理㑹箇題目勿久留情於此却生别種怪異底病痛也生鵞之論只以子釣而不綱弋不射宿孟子逺庖厨之義斷之便自直截呉才老之論亦是一意然覺得未完吾必謂之學云者謂夫世人不知以是為學而專以講論為學也則以學文者謂夫世人不知修其當位之職而徒欲學文也意各有當言各有指似難以未該徧論之伯恭論得此意甚好謂才老之論不可謂不然但其發處有病耳誠然誠然今日兩端之論恐亦正坐此也但若論文義子夏所説終是倚著一邊豈亦矯枉過直而然邪乾知大始程子云乾當始物乾以易知程子又云乾始物之道易似不以此知字為知崇及極髙明之意當字如何形容乾便是物之太始故以當字言之最為宻切䰟陽也屬天魄隂也屬地䰟氣歸于天體魄蔵于地是也聚而復散者為䰟聚而不散者為魄魄非氣也精氣為物者合氣之聚而復散與夫聚而不散言也遊䰟者專指聚而復散言也來教謂體魄自是兩物未能深曉更願詳賜批誨䰟陽而魄隂故䰟之盡曰散散而上也魄之盡曰降降而下也古人謂之徂落亦是此義林少頴云然今以聚而不散者為魄恐未然體魄是二物精氣為物猶言魂魄為體爾以此推之更有曲折仁者天下之正理此一語與仁意義如何此是對下文禮樂而言非專以訓仁之名義也大率前賢語意寛廣不若今人之急迫今人見得些道理便要䥴鑿開却正是心量小不耐煩耳近日甚覺前日説得惡模様也然説得如此人尚不㑹况不説乎此又不可廢也答吕子約程氏葬説父祖子孫同氣彼安則此安彼危則此危墓以藏體魄也所謂安者何所指邪正指體魄而言耳程子論此意思甚詳讀之使人惻然感動有此疑者豈非惑於莊生愛其使形者之論邪此異端之言賊恩之大者不可以不辨上蔡以我視我聴等言以子絶四之旨觀之終未免有我底意思雖與放而不知求者逺甚然其究極似未平正也見於文句者每每有我底意思五峯作復齋記云知自反而以理視此語無病如此所引非惟有我不平於下學切己功夫亦有任意而失理之病其流弊之甚多至於妄作主忠信之言後於不重則不威其意如何聖賢所言為學之序例如此須先自外面分明有形象處把捉扶竪起來不如今人動便説正心誠意却打入無形影無稽考處去也傳不習乎據文勢章脈當以明道言為正此等處義理亦兩通存之可也程子知周乎萬物而道濟天下故不過釋之曰義之所包知也文意如何程子説易字皆為易之書而言故其説如此但鄙意似覺未安盖易與天地凖故能彌綸天地之道此自指書而言自仰觀俯察以下湏是有人始得盖聖人因易之書而窮理盡性之事也近讀此書方見得一端緒非面論不能既也夏商損益繼周者亦必有損益盖氣運升降不容不爾特聖人能因時而不逆之耳理大槩如此然非夫子告子張之意請更詳之林放問禮之本歴考程子之言有曰飾實則失實故寜儉又曰儉則實所出又曰節文太過則和那些誠意都不見則儉近本而不可正名曰本也禮正在恰好處泝而上之則儉為本㳂而下之則奢為末當以易傳之言為正龜山發明得亦佳生死者氣運往來之常也異端以有生為幻而謂之無常是不明乎天地之性隂陽之本也此説固然程子盖言之矣每事問程子謂雖知亦問欽慎之至問者問所未知也問所知焉似于未誠謝氏之説聖人之心恐不如是程子之意雖知其意味甚深然看得未分明以石慶數馬與張湯陽驚事相對觀之可見雖知亦問自有誠偽之别兼或人謂夫子為鄒人之子則亦夫子始仕初入太廟時事雖平日知其説然未必身親行之而識其物也故問以審之理當如此必不每入而每問也然大綱節目與其變異處亦須問也不以其道得去貧賤當如明道説若曰不以其道得貧賤則不去恐君子之心不如是也明道説意甚宻但文義似費力耳近看得忠恕只是體用其體則純亦不已其用則塞乎天地其體則實然不易其用則擴然大通然體用一源而不可析也故程子謂看忠恕二字自見相為用處而夫子曰吾道一以貫之此説甚善出入無時莫知其鄉只是大槩言人之心如是甚言此心無時不感而不可以不操也不操則感動於不善而失其本心矣雖曰失其本心而感處即心也故程子曰感乃心也而程子答心有亡也之問又曰纔主著事時先生以目視地便在這裏纔過了便不見又云心豈有出入亦以操舍而言盖寂然常感者心之本體惟其操舍之不常故其出入之無止耳惟其常操而存則動無不善而瞬息頃刻之間亦無不在也顔氏之子三月不違其餘則日月至政以此心之常感而易危故也寂然常感者固心之本體也然存者此心之存也亡者此心之亡也非操舍存亡之外别有心之本體也然亦不須苦説到此只到朱勾處便可且住也答吕子約示喻讀書用力之意甚善所謂收拾向裏固為急務但亦當虚以待之則心體自存善端自著不可一向抑遏安排也近作一文字正述此意錄寄伯崇矣亦屬轉以奉呈也謝説未安者多此類所論孝弟之説盖本有不屑卑近之意故其言日用切身處往往多有此意思且如此章不以事親從兄為本分當然之事而持藉之以為知仁之資則方其事親從兄之時其心亦不専扵所事而又别起知仁之想矣往年與正字兄論知言中病痛亦多如此盖其所授受有自來也却是吕與叔先生論民可使由之處意思極好昔侍李先生論近世儒佛雜學之弊因引其説先生亦深然之凡百但以此等意思存之便自平實至於近世專門之説盖亦不必深論其失取其可取者焉可也答吕子約時復思繹之義如何長沙説中謂紬繹其端緒又何也又時習專以思繹為訓又何也凡言學多指講論誦讀言之故以習為思繹長沙説不記云何紬繹端緒亦苦無異義也學即行也所謂所以學者將以行之也意必有在中庸言博學又言篤行則學與行自是兩事説樂之分如何所謂説在心政孟子理義悦我心猶芻豢悦我口之意但所謂樂主發散在外朋友之樂盖亦實見其可樂但比説為發舒耳謂之主發散在外願明其説謂之發散在外即是由中而出但樂字之義主於發散在外而得名耳謝氏時習朋來不愠一章意脈似與本章之旨不貫所謂不必同堂合席謂之朋則於朋來而樂之意似不切所謂知我者希則我貴既以不知者希為貴則亦與人不知而愠者相去只一間耳非所謂不見是而無悶者也謝氏説多類此大抵過於髙逺也孝弟為仁之本程子謝氏之旨如何程子謂孝弟行於家而後仁愛及於物盖以本立而道生也謝氏謂知此心則知仁盖以自是而仁可見是固然也却恐非為仁自孝弟始之意只當從程子説近年論者多欲設為機械以求知仁其原蓋出於謝氏且若如其説則其事親從兄之際心亦不專於所事矣明道論孝弟本其所以生乃為仁之本而又論守身守之本不失其身而能事其親乃誠孝也推此可以知為仁之本此意如何明道因論事親又推本守身之意以明必如此然後為能事其親乃所謂孝子成身之義其為人也孝弟自然和順慈祥豈復萌犯上之心况於為逆理亂常之事乎此盖深言孝弟之為順德而人道之根柢也自是而積習著察則為仁之道自然周溥充大所謂老吾老以及人之老幼吾幼以及人之幼而非過情違道之小仁也故曰本立而道生而又贊之曰孝弟也者其為仁之本歟若夫仁民而推親親固曰無本然所謂仁民者亦必有甚不仁者矣自仁民而推親親本不足辨然亦不必言必有甚不仁者巧令鮮仁尹氏之説為完程子直指為非仁何也詳考程子辭意盖直指修飾之為非仁欲學者深知乎仁與不仁之分故他有所未暇論也昨領來喻謂程子如此直截説破恐是此意否程子固是直指修飾之為非仁而聖人本意初亦不兼持養者而為言也但聖人辭意舒緩程子恐人不㑹更向巧令中求其少有之仁故如此直説破耳曾子之三省忠信而已而不及傳不習乎一語何也前雖求教謂已兼釋之今却未曉程子説傳不習乎是不習而傳與人是亦欺人之事故以忠信舉三省此句須更思之與謝氏孰長入孝出弟謹行信言泛愛親仁盖為弟為子日用出入之實職曠此而徒區區於文義章句間抑末也程子謂非為已之學意盖如此然必曰學文者誠以未能著察而品節等差重輕緩急不得其宜則或有所害以此見周伯忱之説甚當謝氏盡孝盡弟以及乎親仁成已至行有餘力則以學文則看得學文頗輕而説得入孝出弟之類一節便做成德似非本旨意修弟子之職固所以為已然博學於文以明義理之歸亦為已也洪慶善説未有餘力而學文則文滅其質有餘力而不學文則質勝而野此意亦好道千乘之國政與道之以德道之以政之道同道猶導也與齊治之義别敬事而信以下或以為五者或以為三者當從何説程子釋此章謂今之諸侯能如是足以保其國矣非小乎此也政以今之諸侯所以導其國者不能如是也然否分别道齊二字甚善此章當為五事然先後相因不可相無則亦一事而已程子之言固非小此盖以其畧故其言之若不足耳程子謂論性則以仁為孝弟之本又謂仁是性也孝弟是用也因此得求仁之方要須是從克己入程子論季路顔淵言志一段可見盖喜怒好惡之偏頃刻胡越霄壤之判如何得氣脈通貫本末連屬每覺於至親上尚有物我處多况於他人乎直須是由身至家由家至外檢察消磨漸漸融通則庶乎仁矣前輩謂公近仁愛屬仁而魯論所謂已欲立達而立人達人為仁之方而孟子所謂仁者如射正已而發發而不中不怨勝已反求諸已如此之類皆是欲人之求仁當自克治己私而入學者但當於此下手耳向者所謂以萬善之先名仁誠不親切論性則以仁為本此只是泛説論義理則性中只有仁義禮智而孝弟本出於仁論為仁之功夫則孝弟是仁中之最緊切處當務此以立本而仁道生也來喻雖善然非程子立言之本意也一心之謂誠盡心之謂忠其分如何又謂忠天道也其與盡心之義同否一心之謂誠專以體言盡心之謂忠是當體之用忠天道也對恕之推已而言指盡心之義答吕子約所示心無形體之説鄙意正謂如此不謂賢者之偶同也然所謂寂然之本體殊未明白之云者此則未然盖操之而存則只此便是本體不待别求惟其操之久而且熟自然安於義理而不妄動則所謂寂然者當不待察識而自呈露矣今乃欲於此頃刻之存遽加察識以求其寂然者則吾恐夫寂然之體未必可識而所謂察識者乃所以速其遷動而流於紛擾急迫之中也程夫子所論纔思便是已發故涵養於未發之前則可而求中於未發之前則不可亦是此意然心一而已所謂操存者亦豈以此一物操彼一物如鬬者之相捽而不相舍哉亦曰主一無適非禮不動則中有主而心自存耳聖賢千言萬語考其發端要其歸宿不過如此子約既識其端不必别生疑慮但循此用功久而不息自當有所至矣答吕子約向來所喻數條亦皆窮理之要今承喻及有不曉毫髪之語此又范太史所謂小其所知以為不知之弊竊謂莫若因其所知者玩繹而推廣之自當有味不可捨此而别求恐轉益荒逺而終無得也此類猶是好髙之病不可不警答吕子約示喻縷縷具悉但泛説尚多皆委曲相合恐更當放下且玩索所讀書依本分持養為佳耳陸子静之賢聞之盖久然似聞有脱畧文字直趨本根之意不知其與中庸學問思辨然後篤行之旨又如何耳答吕子約所喻日用功夫甚善然必謂博學詳説非初學事則大不然古人之學固以致知格物為先然其始也必養之於小學則亦洒掃應對進退之節禮樂射御書數之習而已是皆酬酢講量之事也豈以此而害夫持養之功哉必曰有害則是判然以動靜為兩物而居敬窮理無相發之功矣大抵聖賢開示後學進學門庭先後次序極為明備今皆舍之而自立一説以為至當殊非淺陋之所聞也向示心説初看頗合鄙意細觀乃復有疑亦嘗竊與朋友論之而未及奉報今得所論益知向所疑者之不謬也盖操舍存亡雖是人心之危然只操之而存則道心之微便不外此今必謂此四句非論人心乃是直指動静無端無方無體之妙則失之矣又謂荒忽流轉不知所止雖非本心而可見心體之無滯此亦非也若心體本來只合如此則又何惡其不知所止而必曰主敬以止之歟近與一朋友論此錄以奉呈幸試思之復以見告昨日得欽夫書亦論此於鄙意亦尚有未盡者異時相見面論之筆札不能既其曲折也答吕子約所示内外兩進之意甚善此是自古聖賢及近世諸老先生相傳進步真訣但當篤信而力行之不可又為他説所搖復為省事欲速之計也近聞陸子靜言論風旨之一二全是禪學但變其名號耳競相祖習恐誤後生恨不識之不得深扣其説因獻所疑也然想其説方行亦未必肯聴此老生常談徒竊憂歎而已操舍存亡之説諸人皆謂人心私欲之為乃舍之而亡所致却不知所謂存者亦操此而已矣子約又謂存亡出入皆神明不測之妙而於其間區别真妄又不分明兩者盖胥失之要之存亡出入固皆神明不測之所為而其真妄邪正始終動靜又不可不辨耳答吕子約來書所喻程門議論鄙意正謂如此此或問之書所為作也但掎摭前賢深負不韙之罪耳管仲之喻甚正但以夫子之言考之恐無此意程子之意盖欲主張名教而以為夫子許其不死却不如以為存而不論之可畏也試更思答吕子約叔度忽為佛學私竊憂之前嘗因書扣之今此書來不答所問但云實病難除實功難進不敢容易言之而已如此則是以為求進實功除實病必求之釋氏然後可而吾聖賢立言垂訓與吾黨平日講學存養皆容易之空言也叔度所見不應如此盖不欲人之議已而設此以峻却之耳區區雖欲再進其説而已覺難於發口然鄙意猶有未能已者願子約從容自以已意言之勸其且讀論語看諸先生説而深思之以求聖人之意聖人之意即是天地之心思而得之則實理可見而實病可除實功可進初不待求之釋氏之言矣且求之釋氏却是適越北轅却行求進此區區所以深惜叔度平日之用心而不欲其陷於此也頃在靜安見其議論之間每不欲人攻釋氏之非私心固已疑之今果如此盖本其平日用功只以博學力行為事而未嘗虚心平氣熟玩聖賢之言以求至理之所在故其弊至於如此熹恐伯恭亦不得不任其責不知其聞此消息以為如何然熹之愚猶竊有疑於伯恭詞氣之間恐其未免有隂主釋氏之意但其徳性深厚能不發之於口耳此非小病吾輩於此若猶或有纎芥之疑速須極力講究以去其非而審其是不可含糊隠忍存而不決以貽他日走作之患也大抵彼中朋友立説過髙立心太迫不肯相聚討論只欲閉門劇讀以必其自得故人自為學而或不免蔽於一己之私見此亦殊非小病耳答吕子約所喻數條足見玩理之深然論孟兩説恐看得太幽暗支離了所謂欲宻而反疎者須更就明白簡約處看一句只是一句截斷兩頭都無許多枝蔓方是真實見處也太極諸説亦未見端的處又所謂萬化未嘗止息者是矣然却為甚於復然後見天地之心邪請更下此一轉語如何如何答吕子約前書所喻原憲一條似於鄙意有未安者而來書云云支蔓繳繞只如舊日更望詳細思繹勇猛掃除庶於正大光明之域有進歩處也答吕子約所論江西之弊切中其病然前書奉告者非論其人也乃論吾學自有未至要在取彼之善以自益耳謂彼全無本原根柢則未知吾之所恃以為本原根柢者果何在邪幸更思之復以見教答吕子約熹衰病如昨無足言者暇日自力觀書惟覺聖賢之言意味深長儘有向來見不到處若於子約所謂經史貫通之妙則未有得也然既曰千里一曲則便不如且就不曲處理㑹之為愈且如史記禮書篇首四言恐只是大槩説道理如此豈為秦漢把持天下而設且既曰把持天下矣則又豈有不由智力而致者邪此等處恐是舍却聖賢經指而求理於史傳故只見得他底髙逺便一向隨他脚跟轉極力賛歎他若看得聖賢説禮樂處有味決定不作此見兼謂其為秦漢而發此四言亦恐反説低了他意思也讀詩諸説乃是詩小序説非詩説疑亦是從前太於世變一事留意得重故只見得此意思大率向外底意思多切己底意思少所以自己日用之間都不得力前書因論陸子静處及説韓岩時話似己詳説此病奈何都不見察至今日然後始覺身心欠收拾乎兼此語前此己屢聞之恐今日所覺亦未必是真覺也所謂秦漢把持天下有不由智力者乃是明招堂上陳同甫説底平日正疑渠此論未安不謂子約亦作此見為此論也大抵讀書寛平正大者多失之不精而精宻詳審者又有局促姦巧之病雖云人之情偽有不得不察者然此意偏勝便覺自家心術亦染得不好了近年此風頗盛雖純誠厚德之君子亦往往墮於其中而不自知所以區區常竊憂之而不願子約之為之也子約何不試取論語孟子中庸大學等書讀之觀其光明正大簡易明白之氣象又豈有如此之狡獪切害處邪世路險窄已無可言吾人之學聖賢者又將流而入於功利變詐之習其勢不過一傳再傳天下必有受其禍者而吾道益以不振此非細事也子約思之如何大事記尚有第十一巻半卷未寫今附元冊去幸為寫足附來不須裁截装背却恐與前後冊大小不同也此書固佳然昨看論張湯公孫𢎞處亦不能無疑也答吕子約前書所喻正容謹節之功比想加力此本是小學事然前此不曾做得工夫今若更不補填終成欠闕却為大學之病也但後書又不免有輕内重外之意氣象殊不能平愚意竊所未安大抵此學以尊德性求放心為本而講於聖賢親切之訓以開明之此為要切之務若通古今考世變則亦隨力所至推廣增益以為補助耳不當以彼為重而反輕凝定收歛之實少聖賢親切之訓也若如此説則是學問之道不在於己而在於書不在於經而在於史為子思孟子則孤陋狹劣而不足觀必為司馬遷班固范曄陳壽之徒然後可以造於髙明正大簡易明白之域也八字乃來書本語夫學者既學聖人則當以聖人之教為主今六經語孟中庸大學之書具在彼以了悟為髙者既病其障礙而以為不可讀此以記覽為重者又病其狹小而以為不足觀如是則是聖人所以立言垂訓者徒足以悞人而不足以開人孔子不賢於堯舜而達磨遷固賢於仲尼矣無乃悖之甚邪前書所示中庸詩頌西銘等説皆極精宻意者後書所謂不能下心細意特一時憤激所發耳如其不然則不能下心細意於孔孟乃能下心細意於遷固何邪此則尤非區區所素望於賢者不敢不盡所懐也禮樂之云前此只恐未必史遷有此意耳正使有之乃是挾禮樂動化之權以為智力把持之用學者所以謹於毫釐之差而懼其有千里之繆者正為此耳今不之察而遂指人欲為天理吾恐其不止於議論之小失而且為心術之大害也阡陌二字熹前説亦未是當如風俗通後説乃為得之盖阡之為言千也陌之為言百也遂人徑是百畝之界涂是百夫之界而二者皆從即所謂南北之陌畛是千畝之界道是千夫之界而二者皆横即所謂東西之阡盖二字名義本以夫畝之數得之決是井田舊制所本有若曰秦始為之則決裂二字牽彊説合費氣力而無文理且井田既有徑畛之制而秦人去之則又何必更取東西南北之正以為阡陌然後可以静生民之業而一其俗哉此細事不足辨或恐有助於古今事變之學耳徽錄新書近方看得數卷大抵是用長編添修然亦有不盡處長編亦據曾布蔡絛為多此二書雖無状然亦見其不可掩者禍敗之釁豈偶然哉讀之令人憤鬱殊損道心也同父事解後得書亦甚呶呶前此盖己作書慰勞之勸其因此一洗舊轍斂就繩墨若能相信失馬却未必不為福耳此事向來朋友畏其辯博不究其是非而信奉其説遂無一言及於儆戒切磋之意所以使渠至此盖有不得不任其責者子約既敬之於此恐不可不盡情也叔晦必且家居待除象先呈身之說恐是且欲揚此虚聲以避守髙之嫌然亦不必如此也李和聞亦不為久計相見勸其早歸亦是一事渠却甚歸心恭兄教誨與他人不同也誠之恐難説話盖本是氣質有病又被杜撰扛夯作壞了論其好處却自可惜也恭兄文字状子己投之當路如醉如夢面前事尚不能管得何可望以此等但近日百怪競出不可禁遏又甚於前此既無可柰何但當修其本以勝之早為收拾平生文字訓説之畧成書而可傳者著為篇目而公傳道之則彼託真售偽者將不禁而自息矣若但築堤堙水決無可救之理也答吕子約熹再叨祠祿遂為希夷法眷冐忝之多不勝慚懼今年病軀粗覺勝前時但心目俱昬不堪繙閱深以為撓耳所喻向來立論之偏近日用功之實甚慰所望兩卷所論皆精義也其間亦有鄙意未合處具之别紙幸更思之或猶未安却更反復極論以歸至當乃佳耳同父後來又兩得書己盡底裏答之最後只問他三代因甚做得盡漢唐因甚做得不盡見頓著聖賢在面前因甚不學而必論漢唐覔他好處并文中子一併破除一語似頗痛快著題未知渠復如何做轉身一路也可因書扣之令錄去此無人寫得也兩書皆引惟精惟一者是來書亦於智力二字必竟看不破放不下殊不知此正是智力中之仁義賓中之主鐵中之金若苦向這裏覔道理便落在五伯假之以下規模裏出身不得孟子董子所以拔本塞原斬釘截鐵便是正怕後人似此拖泥帶水也熹嘗論此間朋友孟子一生忍窮受餓費盡心力只破得枉尺直尋四字今日諸賢苦心勞力費盡言語只成就枉尺直尋四字不知淆訛在甚麽處此話無告訴處只得仰屋浩歎也史遷固非班范之比然便以為學者於此不可有所未足而欲專就此處尋討道理則亦陋矣公謹前日一二書來問所疑覺得却似稍通曉勝往時也此一等人不能談王説霸然終是慤實謹厚是這一邊人鄙意近來覺得只愛此等人也兩卷之説今亦不能易紙仁字固不可專以發用言然却須識得此是箇能發用底道理始得不然此字便無義理訓釋不得矣且如元者善之長便是萬物資始之端能發用底本體不可將仁之本體做一物又將發用底别做一物也平旦之氣以下一節譬喻得不甚相似至以元氣淋漓星斗清潤為利貞之象亦不可曉合而言之一句文意亦似未安大抵仁之為義須以一意一理求得方就上面説得無不通貫底道理如其不然即是所謂儱侗真如顜頇佛性而仁之一字遂無下落矣向來鄙論之所以作正為如此中間欽夫盖亦不能無疑後來辨析分明方始無説然其所以自為之説者終未免有未親切處須知所謂純粹至善者便指生物之心而言方有著實處也今欲改性之德愛之本六字為心之德善之本而天地萬物皆吾體也但心之德可以通用其他則尤不著題更須細意玩索庶幾可見耳求其放心與克己復禮恐亦不可分為兩事盖放却心即視聴言動皆非禮非禮而視聴言動即是放却心此處不容更作兩節今所論却似太支離也養氣一節只説得程子意若論孟子門庭指意又却不然至大至剛只合四字為句以直養而無害此直字便是上文縮字下文義字孟子之意只是説每事做得是當即自然無所愧怍意象雄豪所以雖當大任而無所畏懼耳推其本原固未有不立敬而能集義者然此章之意則未及夫敬字也此自程子門庭功夫因此説出來耳易所謂寂然不動感而遂通天下之故乃指蓍卦而言之推之天下萬物無一不如此者初不為心而發而遂不可以言性也五峯議論似此拘滯處多惜乎不及其時而扣之反復究窮必有至當之論也孝悌則心下心下則此心溥此意甚巧然却走了孝弟二字親切本意若但如此則只卑巽兩字亦得不必云孝弟矣此盖本因立下仁人心也四字要得貫穿許多去處道理又怕惹著愛字故不免有此牽彊似不必如此却只成立議論做文字也未知焉得仁文義句讀恐亦不如此若如此説則前所謂不知其仁等句又作如何説耶程子所謂仁者天下之公善之本也止是賛歎仁字之言非是直解字義如云仁者天下之正理此亦只是包涵在内不可便以此為盡得仁字之義也正顔色斯近信矣盖謂學者平日心不誠實則雖正顔色而不免於欺偽如所謂色取仁而行違者故以正顔色而能近信為貴耳亦非如來示注中所云也論語所記有失無失須見到夫子地位方判斷得今此所論亦侏儒之觀優耳吾人但當玩索涵養以到為期自不必如此預先安排此等閒議論無益於學也所過者化程子於易傳中引之革九五及其語錄中説似皆以為身所經歴處人化其徳此意平實亦與上下文意相應似不必更為他説若論人心本虚事物過了便無朕迹却自不妨有此理也凡此數説不知賢者以為如何如有未安幸更反復也答吕子約自頃承書有專介存問之約日望其至忽得郭希吕書聞嘗感疾不輕甚以為慮而無從附問但切懸情前日使至忽領手書未及發視亟問來人知己無他憂疑頓釋既而細讀乃審向來疾證誠亦可畏今幸平復而又自能過意調攝尤副所望比日竊惟體候益佳健矣但來書以為勞耗心力所致而諸朋友書亦云讀書過苦使然不知是讀何書若是聖賢之遺言無非存心養性之事決不應反至生病恐又只是太史公作祟耳孟子言學問之道惟在求其放心而程子亦言心要在腔子裏今一向耽著文字令此心全體都奔在册子上更不知有己便是箇無知覺不識痛癢之人雖讀得書亦何益於吾事邪况以子約平日氣體不甚壮實豈可直以耽書之故遂忘飢渇寒暑使外邪客氣得以乘吾之隙是豈聖人謹疾孝子守身之意哉今既能以前事為戒凡百應酬計亦例加節嗇然區區之意於此猶不能忘言更祝深以門户道學之傳為念幸甚幸甚枉尺直尋素未嘗以此奉疑也但見頃來議論一變如山移河決使學者震蕩囘撓不問愚智人人皆有趍時狥勢馳騖功名之心令人憂懼故不得不極言之盖非獨為子約惜實為伯恭惜又重為正獻滎陽諸公惜也漢唐本體只是智力就中有暗合處故能長久如此言之却無過當但若講得聖門學問分明則此固無足言者而正道正理未嘗一日而可無者亦不待引此然後為有徵也設若接引下根亦只須略與説破仍是便須救拔得他跳出功利窠窟方是聖賢立教本指今乃深入其中做造活計不惟不能救得他人乃并自己陷入其中而不能出豈不誤哉陳正己書來説得更是怕人今錄所答渠書去幸一觀此尤可為歎息也仁字之説論之愈詳愈覺迷昧然竊恐所謂祗就發用之端而言則無由見仁之本體只此一句便是病根也盖孟子論仁雖有惻隠人心之殊程子於此亦有偏言專言之别然若實於惻隠之偏言處識得此人心專言者其全體便可見今只為於此認得不真故不能有以識其全體乃欲廣大其言以想象而包籠之不知言愈廣大而意愈不親切也程子之言惟穀種一條最為親切而非以公便為仁者亦甚縝宻今乃反皆不認而必以易傳偏旁賛歎之言為直解字義則不惟不識仁亦錯看了易傳矣克己復禮前説己得之却是看得不子細誤答了今承再喻愈詳宻無疑矣浩然之氣一章恐須先且虚心熟讀孟子本文未可遽雜他説俟看得孟子本意分明却取諸先生説之通者錯綜於其間方為盡善若合下便雜諸説混看則下梢亦只得周旋人情不成理㑹道理矣近日經説多有此弊盖己是看得本指不曾分明又著一尊畏前輩不敢違異之心便覺左右顧瞻動皆窒礙只得曲意周旋更不復敢著實理㑹義理是非文意當否矣夫尊畏前輩謙遜長厚豈非美事然此處纔有偏重便成病痛學者不可不知也又非義襲而取之句内亦未見外面尋義理之意請更詳之横渠先生言觀書有疑當且濯去舊見以來新意此法最妙凡言易者多只是指蓍卦而言蓍卦何嘗有思有為但只是扣著便應無所不通所以為神耳非是别有至神在蓍卦之外也曾子告孟敬子三句不是説今日用功之法乃言平日用功之效如此看得文義方通來喻糾紛殊不可曉也不知其仁之説恐未安且未論義理只看文勢己自不通若更以義理推之尤見乖戾矣盖知自是知仁自是仁孔門教人先要學者知此道理便就身上著實踐履到得全無私心渾是天理處方喚作仁如子路諸人正為未到此地故夫子不以許之非但欲其知之而已也若謂未知者做得皆是而未能察其理之所以然則諸人者又恐未能所為皆是固未暇責其察夫理之所以然也答吕子約日用功夫比復何如文字雖不可廢然涵養本原而察於天理人欲之判此是日用動靜之間不可頃刻間斷底事若於此處見得分明自然不到得流入世俗功利權謀裏去矣熹亦近日方實見得向日支離之病雖與彼中證候不同然其忘己逐物貪外虚内之失則一而已程子説不得以天下萬物撓己巳立後自能了得天下萬物今自家一箇身心不知安頓去處而談王説霸將經世事業别作一箇伎倆商量講究不亦誤乎相去逺不得面論書問間終説不盡臨風歎息而已答吕子約所論為學之意比向來儘正當矣但所謂省節視聴及閒得心地半時便是半時功夫者却似微有趣靜之偏所謂鬼神雖無形聲可求而須著視聴者又似推求考索之過由前之説且可為目前養病之計而非所以為學由後之説則不惟義理有差而亦非所以休養己憊之精神也晦庵集卷四十七欽定四庫全書晦庵集卷四十八宋朱子撰書問答門一本作知舊
