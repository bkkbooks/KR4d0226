front:
  text: 吕子約示喻縷縷足見力學之志然所讀書似亦太多矣大抵今人讀書務廣而不求精是以刻苦者迫切而無從容之樂平易者泛濫而無精約之功兩者之病雖殊然其所以受病之源則一而已今觀來喻雖云數書之外有所未暇然只此已是多少功夫又論孟中庸大學乃學問根本尤當專一致思以求其指意之所在今乃或此或彼泛然讀之此則尤非所以審思明辨而究聖學之淵源也愚意此四書者當以序進每畢一書首尾通貫意味浹洽然後又易一書乃能有益其餘亦損其半然後可以研味從容深探其立言之旨而無迫切泛濫之累不審賢者以為如何
