front:
  text: 洽細讀来書知進學之意不倦甚慰讀書切忌貪多唯少則易以精熟而學問得力處正在於此茍為不熟不如稊稗非虚語也大學等書近多改定處未暇録寄亦有未及整頓者如論孟兩書甚恨其出之早也此間事雖不多然亦終日擾擾少得暇看文字甚覺其嵗月之可惜也通書太極之㫖更宜虚心熟玩乃見鄙説一字不可易處政使濂溪復生亦必莞爾而笑也若如所論則所謂静者别在四者之外而不相管矣而可乎顔子所以發聖人之藴恐不可以一事言葢聖人全體大用無不一一於顔子身上發見也孰不可忍亦不必如此説此等處有兩説當時存之皆不偶然更宜詳玩也武成文字不曽帶来不能盡記春秋之説尤所未究此類又是一種功夫未曉即且闕之可也易數之説近有一書謾往讀之来問所疑已悉具其中矣七經向見其初成之本後未得也計此亦是劉公少時作不然則亦以其多而不能精故耶其間詩説尤草草也
