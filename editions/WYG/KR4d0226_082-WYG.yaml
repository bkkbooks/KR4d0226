canonical_identifier: bkk:krp/KR4d0226/WYG/v1/juan/82
seq: 82
front:
  text: 東坡與林子中帖淳熈辛丑中冬乙酉觀此於衢州浮石舟中時浙東饑甚予以使事被㫖入奏三復其言尤深感歎當摹刻諸石以視當世之君子新安朱熹書
  hash: sha256:824c9b8629af9dd8e6c20bb3acfbc9c7b2a9ce7582e223017c7984c6da62d118
body:
  text: 再跋淳熈辛丑浙東水旱民饑予以使事被召入奏道過三衢得觀此帖於玉山汪氏以為仁人之言不可以不廣也明年乃刻石常平司之西齋新安朱熹書第三書節畧云别後淫雨不止所過災傷殊甚京口米斗百二十文人心已是皇皇又四月天氣全似正月今嵗流殍疾病必煩措置淮南蠶麥已無望必拽動本路米價欲到廣陵更與正仲議之更一削願老兄與微之中玉啇議早聞朝廷厚設儲備熙寧中本路截撥及别路般来錢米并因大荒放税及虧却課利盖累百鉅萬然於救饑初無絲毫之益者救之遲故也願兄早留意又乞與漕司商量今嵗上供斛米皆未宜起發兄自二月間奏乞且遲留數月起發徐觀嵗熟至六月起未遲免煩他路般運賑濟如此開述朝廷必不訝荷知眷之深輒爾僭言想加恕察不一某惶恐跋李後主詩後平叔任散誕夷甫坐論空豈悟昭陽殿遂作單于宫此陶隠居託魏晉以諷蕭梁之詩也當時不悟竟蹈覆轍其為商監益以明矣而違命李侯乃復以無生混茫者亡其國何哉道學不明人心不正詖淫邪遁之説肆行而莫之禁也嗚呼痛哉熹觀汪伯時所藏李後主手寫詩歎息書此潘叔昌訪熹釣臺因書贈之淳熈辛丑十一月十八日跋吕伯恭日記觀吕伯恭病中日記其繙閲論著固不以一日懈至於氣候之暄涼草木之榮悴亦必謹焉則其察物内省盖有非血氣所能移者矣此來不得復見伯恭父固為深恨然於此得窺其學力之所至以自警省則吾伯恭之不亡者其誨我亦諄諄矣三復流涕敬書其後淳熈壬寅新安朱熹書題伯恭所抹荆公目録伯恭病中讀書漏刻不去手既定詩説記古今大事而其餘力又及此然皆未及終篇而卒讀者恨之此書經楊陳二公掊擊不遺餘力而其肺腑之際猶有未盡白者今觀伯恭於書首四卷乃不加一詞而其㡬微毛髪之間皆不得有所遁學者於此不唯可以究觀前事而極夫治亂之源抑亦可以反求諸心而審其得失之端矣淳熈壬寅正月十七日來哭伯恭之墓而叔度出此編視示感歎之餘為書其左朱熹仲晦父跋畫卷後淳熈壬寅上已朱熹仲晦父觀疑此卷勝名畫詩也跋尤延之論字法後尤延之論古人筆法來處如周太史奠世係真使人無間言朱熹仲晦父識題歐陽公金石録序真蹟集録金石於古初無盖自歐陽文忠公始今順伯嗜古無厭又有甚於公之所為而復得公此序真蹟蔵之其不偶然矣淳熈壬寅褉飲㑹稽西園暮歸書此朱熹仲晦父題西臺書西臺書在當時為有法要不可與唐中葉以前筆跡同日而語也細觀此帖亦未見如延之所云也新安朱熹仲晦父題荆公帖先君子自少好學荆公書家藏遺墨數紙其偽作者率能辨之先友鄧公志宏嘗論之以其學道於河雒學文於元祐而學書於荆舒為不可曉者今觀此帖筆勢翩翩大抵與家藏者不異恨不使先君見之因感咽而書于後朱熹書題荆公帖熹家有先君子手書荆公此數詩今觀此卷乃知其為臨寫本也恐後數十年未必有能辨之者畧識于此新安朱熹云題力命帖力命表舊惟見近世刻本今乃得見貞觀所刻深以自幸然字小目昏殆不能窺其妙處又愧其見之晚也他日見右方諸公當請問焉又未知其所見與予果如何耳朱熹仲晦父題樂毅論新安朱熹觀王順伯所藏樂毅論黄庭經東方贊皆昔所未見撫歎久之題蘭亭敘淳熈壬寅上已飲禊㑹稽郡治之西園歸玩順伯所藏蘭亭敘兩軸知所謂世殊事異亦將有感於斯文者猶信及覽諸人跋語又知不獨㑹禮為聚訟也附書其左以發後來者之一笑或者猶以牋奏功名語右軍是殆見杜徳機耳晦翁題鍾繇帖此表嵗月予未嘗深攷然固疑征南將軍為曹仁也今觀順伯所論適與意合是時字畫猶有漢𨽻體知此墓田帖及官本白騎等字為非鍾筆亡疑也朱熹記題法書予舊嘗好法書然引筆行墨輒不能有毫髪象似因遂懶廢今觀此帖益令人不復有餘念今人不及古人豈獨此一事推是以往庶乎其能自彊矣朱熹書題曹操帖余少時曽學此表時劉共父方學顔書鹿脯帖余以字畫古今誚之共父謂予我所學者唐之忠臣公所學者漢之簒賊耳時予黙然亡以應今觀此謂天道禍淫不終厥命者益有感於共父之言云晦翁書璽臣熹恭惟我太祖皇帝受天明命以有九有之師時盖未得此璽也紹聖元符之後事變有不可勝言者矣臣熹敬書題右軍帖隨事行藏固謝萬之藥石然右軍未必能踐斯言也豈其自知己審遂超然逺逝而不顧邪三復此紙欲罷不能後之君子當有識此意者朱熹仲晦父跋諸人贈路君詩後路君㫁橋擊賊手斬凶渠其功甚偉而賞不醻識者恨之然君材氣過人臨事不茍決非終不遇者觀此詩卷固多竒語而余於簽書沈公之言為有感也路君勉旃而已淳熈壬寅九月丙申朱熹題沈公盖叔晦之尊人時為越州簽判路君名岩卿嘗為蘄水尉跋喻湍石所書相鶴經舊藏碧虚子相鶴經石本意頗愛之今觀湍石喻公所書法度謹嚴而意象蕭散知彼為法縛矣淳熈壬寅臘月庚申朱熹跋朱希真所書樂毅報燕王書余嘗恨右軍不寫此書而寫夏侯之論今觀玉山汪季路所藏伊水老人手筆老人得無亦有余之恨乎季路將刻之石以貽永久余知有志之士當復有廢書而泣者矣淳熈壬寅十二月庚申新安朱熹書跋朱喻二公法帖書學莫盛於唐然人各以其所長自見而漢魏之楷法遂廢入本朝来名勝相傳亦不過以唐人為法至於黄米而欹傾側媚狂怪怒張之勢極矣近嵗朱鴻臚喻工部者出乃能超然逺覽追迹元常於千載之上斯已竒矣故嘗集其墨刻以為此卷而尤以樂毅書相鶴經為絶倫不知鑒賞之士以為如何也跋應仁仲所刋鄭司業詩鄭司業金華被召八詩慈祥温厚之氣藹然發於筆墨畦徑之外其門人應君仁仲刻石摹本見寄三復詠歎如見其人為之隕涕淳熈乙巳正月庚戌朱熹仲晦父書跋蔣邕州墓誌銘始予讀張敬夫遺文見所記蔣邕州事常恨不得蔣君為人之詳一日有新攸縣蔣令者過門枉顧出張安國所述其先墓文則邕州公也予驚喜疾讀數過不能去手又觀劉文潛跋語則又知君之遺愛在人久而不衰也嗚呼世固未嘗無材也惟其生於窮荒下邑既無以自振而又知自貴重不肯希世取寵遂以陸沈下僚不及究其所有者為不少矣如君之材晚雖小試然其志業豈遽盡於其所已試者而已耶是可哀已文潛所論聲病綴緝遺賢之弊尤與人意合章卿稱攸縣嘗論􅊐西鹽法因得扣焉又喜邕州家法之未泯也嗟歎不已輒記其後云淳熈乙巳二月庚辰新安朱熹跋鄭威愍遺事鄭威愍公擁羸卒守孤城以抗暴起方張之㓂鄰援既絶遂以身殉予讀褒贈詔書及其家刻墓銘未嘗不三復流涕也夫忠義之性出於人心之秉彜䇿名委質以事人者其講之宜熟矣而吾觀於前日中原之禍一時士大夫出身殉國死其官守如鄭公者何少也豈非義利之分不素明取舍之極不素定一旦倉卒則貪生畏死而惟利之從哉嗚呼如鄭公者可謂得其本心而無愧於臣人之義矣是固有國家者所宜殷勤褒録以為臣子之勸使其有所鄉慕感激而興起其忠義之良心非獨以私於鄭氏之子孫而已也因竊敬識其後以告觀者云淳熈乙巳三月甲申朔新安朱熹書跋米元章帖米老書如天馬脱銜追風逐電雖不可範以馳驅之節要自不妨痛快朱君所藏此卷尤為奔軼而所寫劉無言詩亦多竒語信可寳也淳熈乙巳三月晦日朱熹仲晦父觀于建陽西山景福僧舍書歐陽文忠公集古録跋尾後歐陽文忠公集古所録盖千卷也頃嘗見其曾孫當世家尚二百本但跋尾及一二名公題字其石刻謂離亂之後逸之爾今觀此四紙自趙徳父来則在崇寧間已散落也不然豈其藁耶以校文集所載多訛舛脱畧是當為正而楊君集碑文集則無惟中字作仲宗建武之元作孝武恐却乃筆誤也然徳父平生自編金石録亦二千卷又倍於文忠公今復安在公所謂君子之垂不朽不託於事物而傳者真知言哉三復嘆息淳熈九年重五日潁川韓元吉書集古跋尾以真蹟校印本有不同者韓公論之詳矣然平泉草木記跋後印本尚有六七十字深誚文饒處富貴招權利而好竒貪得以取禍敗語尤𦂳切足為世戒且其文勢至此乃有歸宿又鬼谷之術所不能為者之下印本亦無也字凡此疑皆當以印本為正云十一年四月既朢朱熹記華山碑仲宗字洪丞相隸釋辨之乃石刻本之假借用字非歐公筆誤也跋周元翁帖法楊者讀書至老不輟持論甚正常云農家有百錢斗粟之贏必謹藏之與僧乃已民安得不貧故其住山不營土木不遣其徒出勾曰吾不忍助民蠧也權貴人有所求一毫不予而凶年作糜粥以活人餓者豈易得哉豈易得哉願公併書之可乎此乃陸倉闕與先生書明州大梅老法楊者故龍圖閣學士鄭公向之曽孫也藏周元翁帖與其先世手書一軸嘗属山隂陸務觀求予跋尾未及遣而下世務觀乃以書致之且言楊既死此軸無所付寫畢願為送濂溪書堂藏之元翁詞翰之美前輩已多稱之無所俟於予言者獨味其言知老先生之學之傳乃専在於程氏此可歎也楊公雖不及識然如務觀所稱則其故家遺俗猶可想見豈亦自悔其失身於此而不能有以自還也耶此又重可歎也務觀别紙筆札精妙意寄髙逺楊公所賴以不朽盖有在於是者因剟以附巻中而識其後云淳熈乙巳孟夏既望雲臺隠吏朱熹仲晦父書跋胡澹菴所作李承之論語説序通經之士固當終身踐言乃為不負所學斯言之要所以警乎學者可謂至深切矣然士之必於通經正為講明聖賢之訓以為終身踐履之資耳非直以分章析句為通經然後乃求踐言以實之也李君承之來自廬陵出示澹菴先生胡公所為作論語解序斂袵三復如奉音㫖敢竊推其餘意以附卷尾李君幸以愚言思之則庶乎知先生所以推揚期待之意矣淳熈乙巳六月乙丑新安朱熹敬書跋胡澹菴和李承之詩蜀人李君承之見過山間示詩一編詞源奔放而句律謹嚴讀之令人亹亹不厭間出澹菴先生胡公和章一卷皆其手筆又知君詩之勝已為名流知重如此也因復自念頃嵗嘗得一見先生於臨安其後遂叨薦寵而不知所以得之或者以為先生嘗見其詩而喜之也顧今衰落恵許不酬而李君辯博縦横究知西南利病盖不但深於詩者亦復流落艱難疲於道路豈先生所許以為可與言詩者例如此耶慨念先生不可復見因太息為書其後云淳熈乙巳六月乙丑新安朱熹書跋宋君忠嘉集莊周有言子之愛親命也不可解於心臣之事君義也無適而非君也無所逃於天地之間古今以為名言然以予論之父子之仁君臣之義莫非天賦之本然民彛之固有彼乃獨以父子為自然而謂君臣之相属特出於事勢之不得已夫豈然哉今讀東海宋君之事觀其出身以報國家之讎履鋒鏑蹈危難濱九死而不悔及其一旦棄妻子去以逃左袵之禍則窮困極矣而變易姓名猶不能忘於國家興復之念夫豈有所不得已而强為之哉於此觀之則君臣之義如吾所論無可疑者而莊生為我無君禽獸食人之邪説亦可以不辨而自明矣抑觀諸人所記宋君本末猶可以想見其魁竒磊落之氣至於挂劍之章語尤悲壯則每讀之未嘗不流涕太息也先是天子録君之遺忠官其子南强而南强今為南劍之沙縣治甚有聲其亦思有以不墜其先人忠義之教乎哉淳熈乙巳七月庚戌新安朱熹書跋范文正公送竇君詩片帆飛去若輕鴻一霎春潮過淛東王謝江山久蕭索子真今為起清風右范文正公詩也鄞尉㕔無壁記竇君不知何許人及居官嵗月然為范公所與如此必非常流矣而卒泯滅不少槩見於世何哉新安滕璘徳粹嗣守其官以是詩為不可無傳也礲石治舍請書而刻之淳熈乙巳八月壬戌同郡朱熹書而記其後云跋溪上翁集須江嚴伯奮来訪出其先君子溪上翁遺文三巨編後有當世諸賢題識甚詳熹於翁為同年生前此未獲相識今讀其文汪洋放肆究極事情而無艱難辛苦之態至於四六五七言則尤兄延之題品發明又已曲盡其妙其夢中一詩置之張司業楊少尹集中殆無以辨信亦近世之佳作也伯奮求序適予大病眩瞀不能致思為題其後如此而歸之淳熈十二年九月二十三日新安朱熹書跋潘顯甫字序余年十六七時屏山劉先生字余以元晦而祝之其詞曰木晦於根春容曄敷人晦於身神明内腴余受其言而行之不力涉世犯患顛沛而歸然後知其言之有味也讀潁川公所為潘氏子顯甫字説竊獨重有感焉為之太息而識其後顯甫視之而能以予為戒則於父師之訓其庶㡬矣是嵗冬十月壬子新安朱熹書跋謝艮齋所作静齋銘艮齋受學長陽沖晦先生之門得其宗㫖訓誘後學孜孜不倦其論求仁功夫如此所以期於子山者逺矣子山盍亦有以用其一日之力使斯銘者不為虚語乎哉卷中又有同年趙彦徳題字覽之如見其人益深存沒之感淳熈乙巳十月甲寅題顧侯射記後顧侯以殊科自奮射藝精絶予久聞之未得一寓目而侯以秩滿去矣一日来山間出此記讀之想見一時星飛的破起坐諠譁之樂尤恨不得為坐上客也讎㓂雖衰故疆未復侯其勉􅏧有以副聖主教訓作成之意云淳熈丙午七月七日雲臺外史朱熹書跋李夀翁遺墨韓退之著書立言觝排佛老不遺餘力然讀其謝潮州表答孟簡書及張籍侑奠之詞則其所以處於禍福死生之際有愧於異學之流者多矣其不能有以深服其心也宜哉侍郎李公玩心於易以沒其身平居未嘗深斥異教而間獨深為上言天地變化萬物終始君臣父子夫婦之道性命之理幽明之故死生之説盡備於易不當求之無父無君之言以傷俗化其言雖約而功實倍於韓子至其平生大節則不惟進退險夷一無可憾而超然於生死之際又如此此足以明吾道之有人而信其言之不妄矣易所謂黙而成之不言而信者其公之謂歟熹不及從公逰而蒙公見與甚厚其子正夫視以絶筆因得捧讀而竊識其説於後云淳熈丙午九月甲辰朔跋任伯起家藏二蘇遺蹟元豐間西南夷與疆吏不相得怒且生事時眉山任公伋字師中守瀘州曰我曲彼直不可與校務一以恩信撫柔之已聴命矣而部使者或壊其約以邀功公争之不得其後師出果屢敗天子震怒將吏皆伏誅使者懼并及則反誣公以幸免事下有司雜治未竟而公沒其子三訴於朝卒不得伸然任氏自此世有聞人而龍閣公遂以剛直不撓進為於世今其家藏兩蘇公文記詩篇甚衆盖詩猶真蹟而於瀘事尤反復致意焉龍閣之曽孫希夷將刻石以視子孫而属予序之予惟任公當日之意知其事理之當然而不得不然耳非以令名之可慕後福之可邀而為之也而以今觀之其效乃如此豈易所謂不耕穫不菑畬而利有攸往者耶因記其事如此後之君子有以考焉淳熈丁未七月己酉新安朱熹書跋滕南夫溪堂集婺源為縣窮僻斗入重山複嶺間而百十年来異材間出如翰林汪公及我先君子太史公皆以學問文章顯重於世至户掾滕公雖稍後出然其才志傑然逺過流輩譬如汗血之駒墮地千里方將服韅靷鳴和鸞範其馳驅以追二公之逸駕則不幸而短命死矣平生遺文在者不能什一故侍郎吕公仁父嘗為之傳云然多一時應用之作未足以見其志之所存也嗚呼以滕公之才之傑使得永年益求師友於四方以充其志則其所就豈止此而已哉淳熈丁未其兄孫璘訪予崇安出其集與此傳示予因太息而書其後傳言公嘗為書萬言論和戰守利害其言甚偉今亦不見集中甚可惜也吕丈此傳筆力奔放而法度謹嚴讀者可以想見當時朋友切磋之盛云九月丙辰里人朱熹書跋馮君家藏誥黄巢之亂唐僖宗出居成都以王鐸鄭畋為宰相協力討賊鐸以都統檄召諸道之兵入西畿屯盩厔而賊勢遂衰卒逐巢復長安今觀馮君告身以中和二年十一月下則正此時事也其曰右都者即西畿其曰吏部行在之印者即成都行省其曰太尉兼中書令而使者以舊史考之即王鐸而新史鐸傳乃作檢校司徒誤矣其曰司空兼門下侍郎同平章事者則為鄭公不疑而其官稱二史通鑑亦不異也但通鑑載諸道師屯所處甚悉而不及福建豈以道逺後至而不得列序耶抑且以將卑師少而畧之也夫以閩之窮僻阻逺而當此之時乃能命將遣兵奔赴國難馮君又能為之領率人徒﨑嶇萬里以投命於君親其功雖不大顯然其於忠則有餘矣其十一世孫允中出以示予且言君之後散居劍邵之間為三大族子孫甚衆衣冠不絶予以為此豈忠勞之報耶允中將刻石以示三族之人俾之無忘其初因為記其本末云淳熙丁未十一月甲子新安朱熹書跋程董二生學則道不逺人理不外事故古之教者自其能食能言而所以訓導整齊之者莫不有法而况於家塾黨庠遂序之間乎彼其學者所以入孝出弟行謹言信羣居終日徳進業修而暴慢放肆之氣不設於身體者繇此故也番昜程端蒙與其友生董銖共為此書將以教其鄉人子弟而作新之盖有古人小學之遺意余以為凡為庠塾之師者能以是而率其徒則所謂成人有徳小子有造者將復見於今日矣於以助成后王降徳之意豈不美哉淳熙丁未十一月甲子新安朱熹書書伊川先生帖後故端殿上饒汪公鎮蜀時嘗得此帖又見邵溥所論而疑之因録見寄而使審其真偽熹時為公言楊遵道記先生嘗語學者讀易如素未讀不曉文義必先熟讀三家然後却有用心處其說正與此合然味其言固有抑揚非以易之説為盡於三家所言也此帖實出先生溥言不足為病且尋繹通貫之云又真讀書之法近世學者閲理不精正坐讀書太草草耳況春秋大義數十炳若日星固已見於傳序而此所謂不容遺忘者又非先生決不能道也夫三綱五常大倫大法有識以上即能言之而臨小利害輒已失其所守正以學不足以全其本心之正是以無所根著而忘之耳既有以自信其不容遺忘又不覺因事而形於筆札之間非先生之徳盛仁熟左右逢原能及是耶謝君闕見張思叔所記師説而崇觀間久官太學未知果能尊所聞否其家尚藏此帖今制幕趙崇憲摹刻以示蜀人逺寄墨本因記前説輒為附識其後使覽者有以知夫學之有統道之有歸而不但為文字之空言以譁世取寵而已也淳熙戊申春二月乙卯譁一本作希題太極西銘解後始予作太極西銘二解未嘗敢出以示人也近見儒者多議兩書之失或乃未嘗通其文義而妄肆詆訶予竊悼焉因出此解以示學徒使廣其傳庶㡬讀者由辭以得意而知其未可以輕議也淳熙戊申二月己巳晦翁題跋東坡與趙徳麟字説帖神宗皇帝稽古立法以教宗子此萬世之大慮也蘇公發明其意以字徳麟所以望之豈淺淺哉今趙君善希能得此帖而珍藏之則亦有意於此矣尚其勉􅏧無為徒玩其華藻而已淳熙戊申夏五月既朢新安朱熹敬書書楊龜山帖後楊陳二公論易有不同者而楊公之詞平緩如此夫二公之間豈有所嫌疑畏避而然哉亦其徳盛仁熟而自無鄙倍耳楊公於先天之學有所未講則闕而不論其不自欺又如此尤後學之所宜取法也淳熙戊申六月十六日新安朱熹書跋楊遵道遺文先君子嘗識楊公遵道之墓記其論説梗槩皆極精詣且言其平生為文數百篇存者什一二耳熹每伏讀家集至此未嘗不掩巻太息恨其遺文之散逸而其幸存者亦不得而見之也近乃得此編於將樂鄧綯而綯得之公孫璿者急披疾讀驚喜幸甚然其文不過五六篇而墓記所書論莊周語不復見則視作記時所失亡又已多矣遂讀至上伊川先生論易第二書則喟然曰是所謂發微詣極冰解的破者耶至於陳李異同之辨則恨未有以見其取舍之決惜乎不得其全書而考之也獨懴經疏祔母而始遷逺祖享先而雜用異教雖云代作恐亦非公所宜為者豈其嵗月久逺次輯之際容或有亂真者歟敬書其後如此以告觀者使不唯於楊公之學有以考焉又於吾先君子之作有以信其非世俗諛墓之文也記言後若干年始克𦵏公某處璿為鄧言公先已葬將樂縣垂恵鄉珠林山作記時盖將改葬故其言如此然竟不果且欲屬熹更定其字熹謝不敢因并記之以見其實云淳熙戊申八月壬辰新安朱熹謹書跋陳了翁責沈後陳忠肅公剛方正直之操得之天姿而其燭理之益精陳義之益切則學問之功有不可誣者觀於此帖其克己尊賢虚心服善之意尚可識也墨蹟今藏所贈兄孫宗正之子筠家而建業桂林延平皆有石本顧字畫不能無小失真獨沙縣乃為版刻尤不足以傳逺今縣丞黄東始復就摹墨蹟礱石刻之縣學祠堂以為此邑之人百世之下猶當復有聞風而興起者其志逺矣至於心畫之妙刋勒尤精其凜然不可犯之色尚足以為激貪立懦之助而桂林本有張敬夫題字以為於公之意有發明者因并刻之淳熙戊申十一月辛丑新安朱熹敬為書其左方記參政龔公陛辭奏藁後大參龔公平生不喜言用兵晚年去國論事者乃言其陛辭之日請大舉恢復之師以迎合上意聞者莫不怪之予曩從公逰甚久盖嘗與公反復論此雖兩有所持然竟不能以相屈也至是竊獨意公不宜有此公薨後數年過其故里從公二子得其副本讀之乃極論不可輕舉之意盖猶其平生之素論也痛公見誣之甚為之太息流涕久之然尚恨匆匆不暇借其手藁以觀而亦未敢以示人也近者乃聞聖上知公無罪特詔有司還其職秩聖度如天固非賤臣淺識所能窺測然向使其真有纎芥如言者之所謂則亦豈復有是也哉此可以驗公家書之不誣因稍出之而記其本末如此淳熙己酉正月既朢新安朱熹記跋通鑑韻語沙隨先生程公以書見抵盛稱臨川黄君齊賢為學之不茍也既而齊賢亦槖其所著書六十卷以示余余病衰目盲不能徧讀齊賢又親為指畫乃得窺其大畧然猶恨未能有以究其藴也嗚呼是亦勤矣因語齊賢韻語雖工而諸圖用力之深尤不可及雖無通鑑亦可孤行今乃託於韻語而謂節本真出温公之手何耶齊賢又出艮齋先生諸公跋語俾嗣書之余惟諸公皆當代儒先其言自足取信區區鄙語何足為助顧嘗竊為齊賢深言古人為已之意而齊賢未能無聴熒也其以是復于諸老先生而益廣求之則庶乎有得於身而是書之中一字一義亦無不光焰矣淳熙己酉三月癸卯清明嵩髙隠吏朱熹書跋程宰登瀛閣記建陽大夫程侯示予以馬公子才所記其家登瀛閣之文以今觀之其言亦畧驗矣程侯為政寛易愛人意者前人為善之報未止於此也然予聞之古之君子施而不望其報祀而不祈其福盖以為善為當然而天人之間應若影響者自不容已也程侯属予書其後因輒附見此意云淳熙己酉十月四日新安朱熹書題方氏家藏紹興諸賢帖後莆陽方徳順早以文行知名一時諸公長者皆折輩行與交紹興初嘗召對極論講和不便雖不合以去而名問益髙張忠獻折大參曽侍郎張給事吕舍人皆深知之仕竟不遭以卒其子士龍藏諸公所與往還書帖甚富嘗出以見示熹謂此不唯足以見徳順之為人而中興人物之盛謀猷之偉於此亦可槩見因為撫卷三歎而敬書其後跋先吏部留題延福院詩先君吏部三詩以宣和辛丑留題政和延福院壁至今紹熙庚戌適七十年矣孤熹来自崇安裴回其下流涕仰觀慮其益久而或圮也里人謝君東卿陳君克請為模刻以傳永久熹因竊記其後云二月二十日敬書跋施良翰軍政䇿施君良翰示予以軍政䇿一編其言當世利病之實本末備見皆可施行属予方有行役之勞未遑盡讀然當㑹意處未嘗不三復而屢歎也至所謂恩不歸於有功而歸於倖門則才否雖當已自不厭公論者又獨深有感焉因竊識其語於艮齋智甫書卷之後紹熙改元三月二十一日新安朱熹書再跋參政龔公陛辭奏藁始予得龔公陛辭奏草而記其本末以解聴者之惑然猶以未及見其真筆為恨者非予有所疑於公之言盖慮世之不能無疑於予言也今年復過莆中公之二子及其孫堪復以此軸見示塗乙㸃定手筆粲然而其指意審重詳密又與江西奏劄實相表裏於此足以見公平生之言未嘗少變而彼譖人者真可以畀􅉘虎而猶懼其不之食也歐陽子曰後世茍不公至今無聖賢盖天下之事必至於久而後是非之實可見此君子之立言制行所以不屑流俗一時之毁譽而唯欲其無所愧悔於吾心也既感其事因復書前説之後以著吾言之不妄庶㡬秉南董之筆者猶有考云紹熙庚戌四月十三日書於僊逰長嶺廏置跋閭丘生隂符經説括蒼閭丘君之官臨賀迂道千里過予於漳水之上示予以所釋隂符之篇觀其意寄髙逺而文義精密出入乎異端之説而能折衷以義理之正至論當世之為道術者則其所是非取舍又皆不失其當盖今之學子能若是者少矣然予憂其知之過髙氣之太鋭而無以道乎中庸之實或將反以喪失其所以為心者而不自知也於其告别書以遺之紹熙庚戌五月二十九日新安朱熹書跋黄山谷詩杜子美詩小序有言虎搪突䕫人藩籬者䕫人正謂䕫州人耳而山谷詩乃有虎䕫藩之語今此頌又用躨觸字按躨跜見靈光殿賦自為虯龍動貌元無觸義不知山谷何所據也此卷詞筆精麗而指意所属未免如李太白所以見譏於王荆公者覽者亦可以發深省矣書伊川先生與方道輔帖後伊川先生徳性嚴重不輕與人接今觀其於方公父子兄弟之間眷眷如此則方公之賢可知己熹舊嘗得前數帖刻之廬山白鹿洞公之曽孫長泰主簿壬又并其所藏數帖模刻於家間以視熹求書其後雖先生之所以書者有非熹之所敢知然觀於應舉耕田之語可以決内外取舍之輕重察於買櫝還珠之諭可以知讀書求道之要在此而不在彼也既以自厲又書卷尾以属方君使與其族之父子兄弟相與勉焉紹熙改元孟秋七日新安朱熹書臨漳所刋四􅀴後書世傳孔安國尚書序言伏生口傳書二十八篇堯典􅆏陶謨禹貢甘誓湯誓盤庚髙宗肜日西伯戡黎微子牧誓洪範金縢大誥康誥酒誥梓材召誥洛誥多士無逸君奭多方立政顧命吕刑文侯之命費誓秦誓孔氏壁中書増多二十五篇大禹謨五子之歌𦙍征仲虺之誥湯誥伊訓太甲上太甲中太甲下咸有一徳説命上説命中説命下泰誓上泰誓中泰誓下武成旅獒微子之命蔡仲之命周官君陳畢命君牙冏命分伏生書中四篇為九篇又増多五篇舜典益稷盤庚中盤庚下康王之誥并序一篇合之凡五十九篇及安國作傳遂引序以冠其篇首而定為五十八篇今世所行公私版本是也然漢儒以伏生之書為今文而謂安國之書為古文以今考之則今文多艱澀而古文反平易或者以為今文自伏生女子口授晁錯時失之則先秦古書所引之文皆已如此或者以為記録之實語難工而潤色之雅詞易好則暗誦者不應偏得所難而考文者反専得其所易是皆有不可知者至諸序之文或頗與經不合如康誥酒誥梓材之類而安國之序又絶不類西京文字亦皆可疑獨諸序之本不先經則賴安國之序而可見故今别定此本一以諸篇本文為經而復合序篇於後使覽者得見聖經之舊而不亂乎諸儒之説又論其所以不可知者如此使讀者姑務沈潛反復乎其所易而不必穿鑿傅㑹於其所難者云紹熙庚戌十月壬辰新安朱熹識詩鄭康成説南陔等篇遭秦而亡其義則與衆篇之義合編故存至毛公為詁訓傳乃分衆篇之義各置於其篇端愚按鄭氏謂三篇之義本與衆篇之義合編者是也然遂以為詩與義皆出於先秦詩亡而義猶存至毛公乃分衆義各置篇端則失之矣後漢衞宏傳明言宏作毛詩序則序豈得為與􅀴並出而分於毛公之手哉然序之本不冠於篇端則因鄭氏此説而可見熹嘗病今之讀詩者知有序而不知有詩也故因其説而更定此本以復于其初猶懼覽者之惑也又備論於其後云紹熙庚戌冬十月壬辰新安朱熹識易右古文周易經傳十二篇亡友東莱吕祖謙伯恭父之所定而音訓一篇則其門人金華王莘叟之所筆受也熹嘗以謂易經本為卜筮而作皆因吉凶以示訓戒故其言雖約而所包甚廣夫子作傳亦畧舉其一端以見凡例而已然自諸儒分經合傳之後學者便文取義往往未及玩心全經而遽執傳之一端以為定説於是一卦一爻僅為一事而易之為用反有所局而無以通乎天下之故若是者熹盖病之是以三復伯恭父之書而有發焉非特為其章句之近古而已也音訓則妄意其猶或有所遺脱莘叟盖言書甫畢而伯恭父歿是則固宜然亦不敢輒補也為之别見于篇後云淳熙九年夏六月庚子朔旦新安朱熹謹書春秋熹之先君子好左氏書每夕讀之必盡一卷乃就寢故熹自幼未受學時已耳熟焉及長稍從諸先生長者問春秋義例時亦窺其一二大者而終不能有以自信於其心以故未嘗敢輒措一詞於其間而獨於其君臣父子大倫大法之際為有感也近刻易詩書於郡帑易用吕氏本古經傳十二篇而絀詩書之序置之經後以曉當世使得復見古書之舊而不錮於後世諸儒之説顧三禮體大未能緒正獨念春秋大訓聖筆所刋不敢廢塞而河南邵氏皇極經世學又以易詩書春秋為皇帝王霸之書尤不可以不備乃復出左氏經文别為一書以踵三經之後其公穀二經所以異者類多人名地名而非大義之所繫故不能悉具異時有能放吕氏之法而為三經之音訓者尚有以成吾之志也哉紹熙庚戌冬十月壬辰新安朱熹謹書書楚辭協韻後始予得黄叔垕父所定楚辭協韻而愛之以寄漳守傳景仁景仁為刻板置公帑未㡬予来代景仁景仁為予言大招昭遽同韻此謂遽當為遭似矣然嘗讀王岐公集銘詩中用遽字正入昭韻則大招之遽自不當改然又疑其或反是承襲此篇之誤因考漢書敘傳則有符與昭韻者髙恵功臣侯表區與驕韻者西南夷兩粤傳乃知大招本文誠不為誤而岐公用韻其考之亦詳也予按諸書信如景仁之言盖字之從豦聲者噱臄醵平讀音皆為疆然則大招之遽當自疆而為喬乃得其讀於是即其板本復刋正之使覽者無疑焉景仁説尚有欲商訂者㑹其去亟不果他日當并扣之附刻書後也紹熙庚戌十月壬午新安朱熹書再跋楚辭協韻楚辭叶韻九章所謂將寓未詳者當時黄君盖用古杭本及晁氏本讀之故於此不得其説而闕焉近見閤皂道士甘夣叔説寓乃當字之誤因亟考之則黄長睿洪慶善本果皆作當黄注云宋本作寓洪注云當值也以文義音韻言之二家之本為是杭本未校舛誤最多宜不足怪獨晁氏自謂深於騷者顧亦因襲其謬而不能有所是正若此類者尚多有之然則其所用力不過更易序引増廣篇帙以飾其外而於是書之實初未嘗有所發明也近世之言刪述者例如此不但晁氏而已予於此編實嘗助其吟諷今乃自愧其眩於名實而考之不詳也因復書其後以曉觀者云題屈原天問後此書多不可曉處不可强通亦有顯然謬誤而讀者不覺又從而妄為之説者如啓棘賓商九辨九歌王逸則訓棘為陳訓賓為列謂商為五音之商固已穿鑿而洪興祖又以為急相符契以賓客之禮而作是樂尤為迂逺今詳此乃字以篆文相似而誤棘當作夣商當作天言啓夣上賓于天而得此二樂以歸耳如列子史記所載周穆王秦穆公趙簡子等事爾若山海經云夏后上三嬪于天得九辨九歌以下則是當時此書别本賓字亦誤作嬪故或者因以為説雖實怪妄不足為据然商字猶作天字則可驗矣栁子厚貿嬪之云乃為山海經所誤而或者又誤解之三寫之闕可勝歎哉嘗疑山海經與此書相出入處皆是並縁此書而作今説者反謂此書為出於彼而引彼為説誤矣若淮南子則明是此書之訓傳亡疑然亦未必有所傳聞只是𫝊㑹説合耳跋劉子澄與朱魯叔帖觀亡友劉君子澄手墨為之隕涕其言當看切已文字分别義利之間所以期吾魯叔者為不淺矣魯叔尚勉􅏧哉丹陽朱熹仲晦父書于臨漳郡齋紹熙庚戌中冬十一日跋黄山谷帖此朱希真書也韓子蒼之誤可耳何斯舉親見前輩亦誤何耶然希真書自不凡老筆尤放逸此雖其少作盖亦可蔵也晦翁書跋蔡端明帖蔡公節槩論議政事文學皆有以過人者不獨其書之可傳也南来多見真蹟每深敬歎朱熹題跋曽文昭公與朱給事帖舊讀徽録見曽公兄弟往還書每深慨嘆今觀文昭此帖乃知朱公從臾之力益以喟然然觀後来事變盖有所謂天實為之者諸公區區其間乃欲以一葦障江河卒以至於流離􅇡斥而不悔可悲也哉紹熙庚戌中冬十一日丹陽朱熹書書曽帖程弟跋後建中紀號調停兩黨實曽丞相之䇿其後元祐諸人頗攻其短故國論遂中變非子宣本謀也但薰蕕同器決無久逺芬馥之理觀程弟所論有未究者故復書此云跋東坡牛賦蘇公此紙似是臨本紹熙庚戌晦翁審定跋王端明奏稿王公四疏首末一意丁寜懇惻無不以忠邪之判為言其所以輔成元祐之治而夀國家元氣之脈者人到于今賴之厥功茂矣僊逰朱魯叔游宦衡陽得此遺墨於其家而寳蔵之出以示熹為之三復太息而不能已時紹熙改元十一月十一日也書臨漳所刋四子後聖人作經以詔後世將使讀者誦其文思其義有以知事理之當然見道義之全體而身力行之以入聖賢之域也其言雖約而天下之故幽明巨細靡不該焉欲求道以入徳者舍此為無所用其心矣然去聖既逺講誦失傳自其象數名物訓詁凡例之間老師宿儒尚有不能知者况於新學小生驟而讀之是亦安能遽有以得其大指要歸也哉故河南程夫子之教人必先使之用力乎大學論語中庸孟子之書然後及乎六經盖其難易逺近大小之序固如此而不可亂也故今刻四古經而遂及乎此四書者以先後之且考舊聞為之音訓以便觀者又悉著凡程子之言及於此者附於其後以見讀之之法學者得以覽焉抑嘗妄謂中庸雖七篇之所自出然讀者不先於孟子而遽及之則亦非所以為入道之漸也因竊并記於此云紹熙改元臘月庚寅新安朱熹書于臨漳郡齋跋蔡端明獻夀儀蔡忠恵公書蹟徧天下而此帖獨未布今嵗南来始得見於其来孫誼之家乃知昔之君子所以事其親者如此其愛且敬也孤露餘生無所為孝捧玩摧咽不能仰視遂請其真摹而刻之以視世之為人子者庶以廣蔡公永錫爾類之志非獨以其字書之精而已然又偶得善工且属諸生黄榦臨視唯謹知書者亦以為不失其用筆之微意云紹熙庚戌臘月既朢丹陽朱熹書于漳浦郡齋跋李忠州家諸帖郡人李君禨伯仲視予以其家蔵羣公碑志書帖知忠州使君之節槩才畧絶人如此而年未及老乃能一旦飄然謝事而歸其識逺而慮深矣劉忠定公題其碑隂至以儕於歐范二公之列豈徒取夫一節之髙而已哉其子晉江大夫又以文字追逐一時名勝之間盛見稱許雖不幸未究其實以死然視世之茍賤貪鄙而泯沒於無聞者則有間矣讀之三歎欲刻之石以視邦人而迫去不果乃書其後而歸之恕齊之説唯鄒忠公為詳實然其卒章亦不能無可疑者習俗之溺人如此吁可畏哉黄太史所論讀書貴精者切中學者之病惜其手帖之不存也新安朱熹書跋髙彦先家諸帖熹猶及見紹興中年姦凶擅朝忠賢奔播時事而知漳浦髙公之為烈也老矣南来乃獲拜其祠象於學宫窺其逸稿於家集而識其嗣子之為人又益得其本末之詳甚可歎也季士又以此軸見視如李曽二胡諸公皆先人所從㳺當日相隨去國者三復其言益以慨歎乃敬書其後而歸之紹熙辛亥四月二十七日新安朱熹書跋葉氏慕堂詩雲巖處士葉君仲微以清徳馴行聞於鄉余不及見矣晚與其子徳符為寮於漳一日出示諸君所賦慕堂詩然後益知仲微為父之慈而又知徳符為子之孝也同官多賢者莫不髙仰其事而樂為之詩余獨以私故重有感焉而悲不能言也乃書其後以寄余意時徳符亦老且倦㳺矣而於公家事無所茍其貌雖瘠而詩甚腴余心竊敬愛之而不能薦察徳符無不足之色余以是益愧其人云紹熙二年重五日丹陽朱熹仲晦父書于晉江洛陽下生院跋滕户曹守台州事實始予以事至台州州人士君子為予道滕公城守時事甚悉予心竊獨壯之而不及訪其文字數年之間時往日來于中不忘也今從公孫仲宜仲宣得此編而讀之乃知公平生大節類皆卓犖竒偉如此非獨守台一事為可稱也但守台事有陳師恭之記守南都事有程千秋之記故其謀畫之竒節制之密皆焯焯在人耳目至其守蔡陳鄂功亦不細而莫有能言其事者千秋又記其説大元帥部西北之兵以迎二聖檄東南之衆以討邦昌皆切事機適形便而建炎初元所論五事與賀公所狀因論事而送吏部争建都而遭䜛毁則意必亦有卓絶切至之論而世莫得而語其詳焉然行狀又言公有奏議十餘卷與政府書三十篇則是數説者必已具於其間矣夫已不用於當時若又不傳於後世則是遂將泯沒於無聞豈不可惜也哉今太史氏方將􅃠羅天下放失舊聞以著中興君臣一時之盛是必既有任其責者二君其求諸家書以附此録而往獻焉則九原有知其亦足以少慰也夫紹熙二年秋九月壬子鴻慶外史朱熹書跋吕舍人帖吕公之言所以發明講道修身之法詳矣學者審其先後緩急之序而用力焉其入聖賢之域也孰禦紹熙辛亥九月癸酉新安朱熹敬書跋景吕堂詩滕徳章寄此册来求景吕堂詩余謂後學宗慕前輩而表其遺跡固為美事然黙而識之求其所以至於彼者而勉焉可也何以詩為哉至於傳之逺久使人不忘則徳粹之記諸公之詩已足以垂後矣亦無待於余言也乃書其後而歸之紹熙辛亥十月戊寅朱熹仲晦父題晦庵集巻八十二欽定四庫全書晦庵集卷
