body:
  text: 奏狀奏衢州守臣李嶧不留意荒政狀臣昨䝉賜對輙論州縣檢放災傷不實之弊伏䝉聖慈開納即降睿㫖令臣詢訪不實最多去處按劾施行臣㳟禀聖訓伏自到任即行詢訪大抵本路被災諸郡檢放分數多不盡實而衢州尤甚蓋自去歲大水之後知州事朝散郎李嶧專務掩蔽不以實聞及轉運司訪聞差官驗問既得其實反為李嶧執稱無水而其親戚方在政路曲為主張遂再下提刑司體究欲以遂其姦詐幸所差官不肯曲從方欲具以實聞又為李嶧生事把持至今未竟及既遭旱嶧又妄申諸司稱民不闕食未至流移後來甚不得已然後差官檢視所差之官受其風㫖早田之旱例不為檢晚田又不盡實如常山一縣被災最甚通計無慮七八分而嶧乃只作一分六釐減放至開化縣被災不減常山而其所放則又僅及一釐一毫而已臣今行視兩縣之境水痕尚存高岸民居皆至半壁山谷之人採取蕨根以充飢腸羸瘦萎黄非復人貎歲前雨寒死亡已多而李嶧恬然畧不加恤對臣依舊隱諱堅執舊說其於荒政全不留意但知一味差人下縣督責財賦急如星火所䝉聖恩撥賜米斛共六萬石不為不多而至今日久並不科撥下縣亦不曉諭民間諸縣官吏尚有初不聞者况於窮民何緣得知聖主天地㴠育之恩加以病昏不能視履百度廢弛不成州郡不但檢放不實荒政不修而已也臣既奉聖訓詢訪見得上件事理不敢緘黙以負委寄敢昧萬死按劾以聞伏惟聖慈早賜處分奏請畫一事件狀臣今有合具奏請事件謹具下項一臣昨為紹興府米斛有限飢民日衆向後日月尚逺竊恐無以接續糶濟仰貽宵旰之憂曽具奏聞乞再給㑹子三十萬貫及盡推去年賞典半減度牒米數至今日久未奉進止今到衢婺見得兩州元係災傷稍輕去處而糶濟之備可接初秋紹興係災傷最重去處而糶濟之備反不能盡春月將來青黄未接必致狼狽無可疑者欲望聖慈檢臣前奏早賜處分庻幾有以接續糶濟不棄前功不勝幸甚一臣昨到婺州為見豪戸脩職郎朱熙績不伏糶米抵拒官司曾具奏聞乞賜行遣今據婺州申到本人居鄉豪横不法事件條目猥多不敢復具奏聞已條具申尚書省去訖其人多貲力能使鬼伏乞睿斷早賜施行不勝幸甚一臣昨凖尚書省劄子勘㑹已降指揮行下江浙兩淮旱傷州縣將第四第五等户今年以前應干殘欠苖税丁錢竝特住催及將官私債負權免理還其流移人拖欠官物亦與除豁不得令保正長代納并支撥米斛通行賑濟謹已即時行下州縣遵守施行去訖續據紹興府新昌縣申今年以前未委是淳熈七年官物或是淳熈八年二税臣亦已申省欲乞明降指揮未奉回降今來廵厯見得州縣奉行果是互有不同蓋有以今年以前為七年者則八年四等五等夏秋殘欠依舊催理有以今年以前為八年者則八年四等五等夏秋殘欠悉已住催蓋緣本文未明致此差互臣亦未能别其是非然竊以謂治財思予寧過於厚渙汗之號有出無反欲望聖慈明降指揮將八年四等五等殘欠併行住催仍乞令臣督其奉行不如法者庻幾雨露之澤均一霑被不勝幸甚一衢州守倅竝各任滿在即欲乞特降指揮催促已差下人前來赴任奏張大聲孫孜檢放旱傷不實狀臣昨䝉賜對奏論州縣檢放不實令臣詢訪最多處按劾臣詢訪得本路州縣檢放類多不實而衢州為甚衢州檢放既多不實而開化一縣又為尤甚已節次奏聞外今取㑹到本州元差監戸部贍軍酒庫成忠郎張大聲前去檢視及差龍遊縣丞從政郎孫孜覈實逐官自當從實檢視減放却乃觀望本州守臣意指不以恤民為念不曾逐一親詣田頭檢視輙敢欺㒺滅裂將七八分以上災傷作一釐一毫八絲六忽檢放是致被災人户困於輸納追呼監繋决罰之苦流移四出而貧下之民無從得食歲前寒雨死亡甚衆有傷聖朝子育黎元救恤災患之意逐人委是難以存畱在任欲望聖慈特降睿㫖將張大聲孫孜竝行重賜黜責以為日後附下罔上慢法害民之戒乞賜䥴削狀臣昨以職事横被中傷伏䝉聖恩特賜臨照謹已遵禀復還紹興府界竊見諸暨縣災傷至重疾疫大作民之羸瘠死亡者已不勝數由臣前日聞命之際震恐猝迫輕去職守有失照管目今雖已一面多方措置收拾救濟然前日之辠已在不赦之域加以蹤跡孤危風采銷奪竊恐無以號令州縣卒副使令顧獨惟念飢民生死之命在此數日之間恐勤宸慮未敢再乞賜罷只乞聖慈且將臣見在官職先次䥴削候救荒給局日别行竄責庻充公議乞給降官㑹等事仍將山隂等縣下戸夏税秋苖丁錢並行住催狀臣恭被聖恩復抵官次今有職事須至奏聞謹具下項一臣自衢婺州復囘紹興府界竊見衢婺災傷比之紹興分數殊少而兩州公私本皆富實賑恤之備足至秋成惟紹興府災傷極重所費不貲目今已是非常狼狽而考其後日之備乃不能盡三月而止竊恐新麥未登之際尚有闕乏之患而下田之麥亦有遭雨浸損去處又已無復食新之望其豐熟處常歲所收亦不過可為兩月之計五六月間青黄未接之際此必復有以勞聖慮者若至其時方作處置竊恐復有緩不及事之歎如欲及今講究早為措畫則臣昨累具奏所乞數事今皆尚可行也其一乞推去年獻助之賞者已䝉節次施行近日遂有婺州進士陳䕫詣臣投狀陳乞獻助二千五百石訪聞浦江等縣更有一二家亦欲陳獻此亦可見不吝恩賞之效今若更賜指揮催促省部盡行推賞使無一戶之遺然後鏤板開具頒下諸州廣行曉諭則其慕而效之者當不止此而已也其二乞減度牒米數亦已蒙減五十石此則恐所減太少未足多致米斛蓋度牒本價止四百貫適今之宜更合少損以濟飢民乃為得䇿不當反高其直使曠日持久卒無所售以誤指凖也其三則臣嘗與帥臣王希吕同奏再乞撥賜錢㑹三十萬貫而未䝉開允也此固無厭之請宜不足聽然紹興之民不幸罹此非常之災父老相傳以為數十百年所未嘗有而陛下所以扶持救恤恩勤備至亦數十百年所未嘗有今其不能免於死亡捐棄者已無可言其幸得延殘息以至今日者豈可不為終惠之計而使之旬月之間頓至闕絶以棄前日之功哉抑官㑹出於印造非有鼔鑄之勞見今通行輕重之權與見錢等雖使更散三數十萬亦未遽有害於流通也况以陛下之至仁至聖夫豈有愛於此而輕百萬人之命哉且又紹興累年荒歉常平錢米目下支散無復一文一粒可為將來久逺之備今此所乞若䝉聖慈依數撥賜則亦非惟可救目前之急萬一支遣不盡又足以接續收糴更為後日之儲其利尤不細也凡此三者乞留聖念早賜施行庻幾緩急不至誤事然臣尚慮麥前急闕收糴未辦獻助不多有失賙救竊見本路諸州常平義倉米斛尚有餘剰未支遣處欲乞特降指揮許臣照應移用條法量行取撥尤為利便一臣昨具奏乞照應元降指揮明降睿㫖住催淳熈八年四等五等殘欠官物未䝉施行而後來戶部勘當止將淳熈七年終殘欠住催於是州縣日前雖已將八年秋米住催者皆復追催其未放者則其催督愈益嚴峻臣於此時適以俟辠不敢復有陳論然竊獨病其深失朝廷命令之體其後乃聞軍器監主簿李嘉言請以臨安餘杭兩縣四五等戶八年苖税比附徽饒州例亦行住催而陛下可之則又有以知凡此戶部之所行者皆非陛下之本心也蓋所謂四等五等戶者非他也乃今日䝉被糶濟之飢民陛下所為焦心勞思傾囷倒廪而拯之於溝壑之中者也夫以救之如此其悉而猶常慮其有所未至其肯使州縣之吏追呼禁繫加以箠撻而速其死亡也哉况今本路災傷紹興為甚比之徽饒兩州臨安餘杭兩縣事體有甚不侔者若䝉矜憐出自聖意特降指揮將紹興府山隂㑹稽嵊縣諸暨蕭山五縣四等五等戸夏稅秋苖丁錢並與住催其餘諸州縣逐都檢放旱傷及五分以上者五等戸亦與住催七分以上者并四等戸並與住催候秋成日併行帶納則初不失縣官之入而足以少寛飢民目下之迫免致流移死損不勝幸甚乞將山隂等縣下戸夏稅和買役錢展限起催狀照對紹興府諸縣去歲水旱相仍田禾損傷人民飢餓幸䝉聖恩給賜錢米廣行賑救以至今日二麥既已成熟民之幸免於死亡者亦稍蘇息全藉官司存恤休養方可安業今不住據屬縣第四第五等人戸列狀陳稱災傷之餘生理未復竊恐和買役錢夏稅綿絹凖例起催乞特與具奏放免一年臣照得人戸夏税綿絹係是朝廷常賦難以放免外惟是起催省限在五月十五日竊見下戸今春乏食養蠶甚少二麥雖熟亦只得供給口食尚慮將來青黄未接更有闕食之患所有稻田又方䝉聖恩借給秧本始得布種向去早禾成熟尚逺若或依限便行起催竊慮細民未有可以送納不免追呼之擾却致逃移欲望聖慈特降睿㫖將紹興府最荒蕭山諸暨嵊縣會稽山隂五縣第四第五等戸合納今年夏稅和買役錢與展限兩月起催庻幾新榖成熟之時可以送納所有上三等人戸自從常年條限催理如䝉開允從臣所乞則上既不虧縣官經常之費下可少安飢餓羸困之人誠為兩便乞住催被災州縣積年舊欠狀具位臣朱熹臣伏覩四月二十二日聖㫖指揮紹興府蕭山諸暨會稽山隂嵊縣五縣并嚴州諸縣各為去年水旱最甚可將第四第五等人戸合納今年夏稅和買役錢並特與展限兩月起催内有願依條限送納之人聽從其便仰見陛下愛育黎元天地父母之意臣竊慮州縣奉行不䖍仰稽睿澤即已鏤板多印小榜散下紹興府五縣曉示去訖臣訪聞本路被災州縣知通令佐多有只見蠶麥稍熟便謂民力已蘇遽於此時催理積年舊欠上下相乘轉相督促使斯民方幸脫於溝壑之憂而一旦便罹追呼决撻囚繫之苦甚可哀痛况今疫氣盛行十室九病呻吟哭泣之聲所不忍聞豈堪官吏更加殘擾臣雖已行下諸州及通判約束外尚慮未能禁戢欲望聖慈特降指揮令被災最重州縣如紹興府衢婺州且據今年合納官物照應三限條法勸諭人戶及時送納其積年舊欠直候秋冬收成之後逐料帶催庻幾飢餓餘民得以有活其温台等州去年災傷雖不至甚然亦不為樂歲并乞同此指揮戒飭官吏不得意外生事妄有搔擾則一路生民䝉被徳澤不勝幸甚臣以狂妄曲荷優容偶有所聞不敢不奏累瀆天威臣無任戰栗俟辠之至須至奏聞者右謹錄奏聞伏候勅㫖乞推賞獻助人狀臣昨具奏乞依前㸃檢台州措置賑濟官耿延年所奏將本路獻助糶濟米人戸比乾道七年糶濟賞格特減米數之半優與推賞已䝉聖恩開允特降指揮依臣所乞將諸路州縣人戸願出米榖自行般運前來紹興府糶濟減半推賞臣當即恭禀施行節次勸諭到婺州進士陳䕫等各赴本司及紹興府入狀情願獻助米斛本司與紹興府各已差官交量或已就行散給去訖臣已與安撫轉運司連名具狀申尚書省及戸部乞依乾道七年及淳熈八年十二月十三日指揮推賞外今來竊恐有司將同常事未即推恩致使失信本人無以激勸來者欲望聖慈特降睿㫖依已降指揮將陳䕫等特補合得官資庻幾有以取信於民將來或有災傷易為勸諭實為利便開具逐人所獻米數合補官資畫一下項婺州金華縣進士陳䕫獻米二千五百石凖淳熈八年十二月十三日指揮合補廸功郎婺州浦江縣進士鄭良裔獻米二千石凖淳熈八年十二月十三日指揮合補上州文學婺州東陽縣進士賈大圭獻米二千石凖淳熈八年十二月十三日指揮合補上州文學處州縉雲縣進士􅉟玠獻米二千五百石凖淳熈八年十二月十三日指揮合補廸功郎奏衢州官吏擅支常平義倉米狀照對臣昨據衢州知州朝奉大夫沈崈一申今年二月二十一日到任適當荒歉之後財計匱乏别無可以措置己申明朝廷乞於豐儲倉内更給助米二萬石以濟支遣本州四月合散官兵米四千餘石未有指擬遂急於常平義倉米内權行借兊合有擅支之罪除已具奏乞賜處分施行外申本司照會本司契勘衢州見管常平義倉米數不多其災傷之餘尚慮新陳未接之際細民闕食凖擬接續濟糶設欲借兌自合申聞朝廷聽候囘降又不聞本司知覺輙行擅借四千餘石支散官兵有違條法遂申尚書省乞劄下根究監勒本州擅支借官吏照數補還元舊窠名樁管去後又據衢州申再行借兌義倉米支散五月分官兵糧米本司契勘衢州設有欠闕即合措置於别色米斛應副今來本路州軍見管常平米數不多本司尚且申奏朝廷乞給降錢會收糴若或容令州縣違法侵撥萬一不測有誤指擬再具申尚書省乞賜敷奏依法施行如是本州軍糧委實欠闕即乞别行應副去後未䝉劄下近覩已降指揮衢州守臣已行放罪臣伏緣在法義倉榖惟充賑給不得他用即擅支借移用以違制論臣竊惟常平之法所以凖備災傷廣行賑給民命所係利害非輕所以祖宗以來立法之嚴至於如此而議者不以為過以為久長緩急之計非茍狥目前姑息之私者所能知也今衢州當職官不能計度軍儲應副支遣而坐指常平儲蓄之備以為一時之用雖原其情實未必有他情弊而隳廢法度耗散儲蓄漸不可長故臣昨來不欲便具奏劾只具狀申尚書省乞與敷奏依法施行意謂朝廷必須薄行責罰以戒後來今乃一無所問亦不畧行戒約即在本司何以約束諸郡况今來旱勢已成衢州尤甚昨日有轉運司差出官員自彼囘來説城中米價已是七十文足一升兼本州水路淺澁卒難般運他處米斛將來糶濟全仰見管常平義倉米斛尤宜愛惜不可違法妄有侵耗欲望將本州當職官吏畧加責罰或念其委實欠闕軍糧即乞朝廷别行應副嚴行約束今後不得輙將常平官物妄有侵支實為久逺之利伏候勅㫖奏蝗蟲傷稼狀簽黄奏為紹興府㑹稽縣廣孝鄉蝗蟲入境臣親到地頭田間看視委有咬傷稻苖今與知紹興府王希吕詢訪祈禱打撲焚瘞奏聞事具位臣朱熹臣昨於今月初四日聞得紹興府㑹稽縣蝗蟲頗多即遣人走探昨已據所差人孫勝囘報㑹稽縣白塔寺相對東山下有蝗蟲數多收拾得大者一籃小者一袋其地頭村人皆稱蝗蟲遇夜食稻臣已具事狀并大小蝗蟲二色申尚書省乞賜敷奏去訖臣遂即時乗船出門向曉至蝗蟲地頭廣孝鄕第十都第十七都同㑹稽令尉歩行親到田間看視其蟲大者不多小者無數集於稻苖之上其未結實者莖葉皆為咬傷其已結實者榖苖皆為咬落委是為災有害苖稼紹興府先已支錢一百貫文付㑹稽縣募人打撲赴官埋瘞本司亦已支錢一百貫文付縣添貼收買據本縣申兩日内已買到七石三斗八升五合臣亦與帥臣王希呂一面詢究祈禱打撲焚瘞外須至奏聞者右謹錄奏聞謹奏御筆囘奏狀御筆覧奏知紹興府界蝗頗為災朕心憂懼今不欲專遣使人降香二合付卿等宜即䖍潔分詣祈禱又聞蝗之小者滋育甚多可更支賞召人收捕務速殄滅母使遺種以為異日之害故兹札示當體至懐具位臣朱熹臣昨具奏紹興府㑹稽縣廣孝鄉蝗蟲臣已同本府發錢專令本縣令尉親在地頭召人捕獲收買焚埋每得大者一斗給錢一百文小者每升給錢五十文續奉御札令臣分詣祈禱更行支賞召人收捕務速殄滅臣恭禀聖訓夙夜不遑即同帥臣王希呂就府治設醮祈禳又發錢出牓曉諭於先支賞錢之外更行倍加増貼召人收捕仍差茶鹽司幹辦公事沈大雅前去監視督責及敦請鄉官二員同縣官分頭給賞收捕今據申到截今月十三日通計收到大蟲一石五斗三升六合小蟲二十五石九斗三升九合並已埋瘞目今尚有一分以上未至盡絶臣續又見諸暨縣寄居與投詞人稱紫巗鄉亦有飛蝗在境臣即已專委本縣令佐親臨田陌子細從實相視如委的實即從㑹稽縣所行召人支賞收捕焚埋去外臣伏為本路所管衢婺等六州今歲旱損比之紹興其災尤甚本欲取本月上旬起離前徃親行檢視預備賑恤正緣收捕蝗蟲未盡未得起發今不住據逐州縣接續申到事理委是大叚𦂳急不免定取十五日起發前去經由蝗蟲地頭更行督責取見殄滅次第然後取道嵊縣山間望婺州界迤邐前去前路有合奏聞事件續次申發所有上項事理須至先具奏聞者右謹錄奏聞謹奏簽黄臣竊聞旱蝗之災過貽聖慮夙夜焦勞至忘寢味臣雖踈賤不勝感泣震懼之至今此前去災傷州郡敢不究心竭力周爰咨詢庻有以仰稱明詔之萬一但前奏乞錢數事欲望睿㫖早賜施行臣雖未到諸郡近日提刑傳淇張詔自彼來歸其言所見委實災傷至重尚慮臣所乞錢數少不足周給臣緣未經目見不敢再具懇請且乞早賜指揮依臣前奏應副施行庻幾前路所到州郡便可布宣德意掯約收糴以慰饑民之望若不得此實無措手之處將來坐視陛下赤子流離溝壑臣雖萬死不足贖罪伏乞聖照臣去年到任已是深冬狼狽急廹措置不辦只得將所䝉給賜錢米計口分俵誠為可惜今來雖是災傷然日月尚寛足可措置臣已行下逐州通判檢計有合興脩水利去處將來廣募飢民給食工作唯是老弱殘疾婦女之類無依者方與賑給庻幾不至又似去年虛費官物伏乞聖照乞脩德政以弭天變狀具位臣朱熹右臣昨為本路旱傷祈禱不應累曾具奏及申尚書省乞為敷奏早作防備近凖省劄已䝉聖慈特從所請支錢於明州置塲糴米而又伏覩陛下發自宸𠂻特遣中使降香祈禱臣有以見陛下畏天恤民之心至深至切不勝感激願效愚忠顧恨官有常守無由瞻望清光罄竭血誠庻裨萬一不勝犬馬螻蟻區區之情竊謂累年之旱譴告已深今日之災地分尤廣非惟官府民間儲備已竭而大農之積亦已無餘又當大禮年分戸部催督州縣積年欠負官物其勢不容少緩凡所以為施舍賑恤之恩者竊恐又必不能如去年之厚臣竊不勝大懼以為此實安危治亂之機非尋常小小災傷之比也為今之計獨有斷自聖心沛然發號深以側身悔過之誠解謝高穹又以責躬求言之意敷告下土然後君臣相戒痛自省改以承皇天仁愛之心庻幾精神感通轉禍為福其次則唯有盡出内庫之錢以供大禮之費為收糴之本而詔戸部無得催理舊欠詔諸路漕臣遵依條限檢放稅租詔宰臣沙汰被災路分州軍監司守臣之無狀者遴選賢能責以荒政庻幾猶足以下結民心消其乗時作亂之意如其不然臣恐所當憂者不止於餓殍而在於盜賊䝉其害者不止於官吏而上及於國家也臣䝉恩至深不知死所敢冐鈇鉞為陛下言之觸犯天威㳟俟夷滅謹錄奏聞伏候勅㫖地分一作地里再奏衢州官吏擅借支常平義倉米狀具位臣朱熹臣照對本路諸州今歲旱傷比之他郡衢州尤甚將來細民必至艱食全藉本州所管常平義倉米斛賑濟賑糶以救民命臣近㸃檢衢州沈崈一違法擅行借兊過常平義倉米八千石充四月五月官兵俸料臣已一面行下衢州催督補還元舊窠名及具錄奏聞乞將本州當職官畧行責罰以戒後來未得囘降今來再據衢州沈崈一申又於常平米内借支三千五百石充六月分軍糧三箇月共擅借過一萬一千五百石并本州申先借支過常平米一萬九千五百八十一石五斗六升四合亦係充官兵俸料未曾撥還及稱目下盤量折欠米一萬七千七百一十五石五斗一升三合三勺三項共計四萬八千七百九十七石七升七合三勺更有衢州濟糶未盡米一萬八千一百九十九石一斗九升本州所申不曾聲說此項米着落必是亦有互用臣照對在法義倉榖唯充賑給不得他用擅支用者以違制論况本路諸州所管常平義倉米斛唯衢州萬數稍多輙皆擅行支用目今見管止有三千一百六十五石三斗八升委是大失指凖而本州畧無忌憚甚非朝廷置立常平之意竊慮必有情弊臣除已一面牒隣近州追衢州合干人收索赤厯干照逐一根勘從法施行外欲望聖慈先將衢州違法擅支常平義倉米當職官吏特行責罰以警諸郡為擅用常平義倉米者之戒須至奏聞者右謹錄奏聞伏候勅㫖奏救荒畫一事件狀臣竊見本路諸郡頻年災傷䝉被聖恩僅獲全濟今又亢旱周遍七州其幸免者不過三五縣比之去年被災地分大叚濶逺至於公私積蓄則連年饑歉支移發散畧已無餘其於措置尤為費力臣本欲此月上旬廵厯諸郡計度合用錢米詢訪合行事務回日類聚奏聞庻免頻煩天聽今為紹興府㑹稽縣界蝗蟲害稼見行監督掩捕埋瘞已是累日未見衰減未敢起發前去竊慮合奏請事漸致後時有失及早措畫今畧條具一二冐昧以聞伏望聖慈閔此一方重罹災數特垂矜恤早賜施行不勝幸甚一臣昨曾具奏乞詔州縣照應省限理納夏稅不得促限追呼已䝉聖慈頒下施行今聞諸州間有不遵禀者公行文移必要七月上旬取足顯屬違戾兼昨具奏乞將紹興府去年住催夏稅人戶納過之數依倣秋苖所放分數特與比折今秋合納之數亦䝉聖慈行下又為戶部巧為沮難行下本府催督愈峻今來既是復有災傷豈是追呼箠撻催督稅賦之時欲望聖慈特降指揮令被災州郡將所管縣分被災重處特與寛限勸諭送納其不係被災縣分内有被災鄉分亦合較量輕重依此施行其紹興府理折夏稅亦乞直降指揮依臣所乞施行庻幾遭難遺民稍獲安業一臣昨具奏諸州雨暘次第曾有貼黄奏禀乞詔州郡依條受理旱状及早差官檢放事蓋為田稻既是乾損及其未穫之際便行檢踏即荒熟之狀明白易知非惟官司不得病民亦使姦民無由僥倖所以著令訴旱自有三限夏田四月秋田七月水田八月蓋欲公私兩便近來官吏不曾考究令文但據傳聞云訴旱至八月三十日斷限遂至九月方檢早田則非惟田中無稼之可觀至於根查亦不復可得而見矣於是將旱損早田一切不復檢踏蠲放窮民受苦無所告訴而其狡猾有錢賂吏者則乘此暗昧以熟闕瞞官作弊皆不可得而稽考去歲本路諸州大率皆然欲乞降指揮劄下轉運司及本司遍牒諸州縣疾速受理旱狀目下差官檢踏旱田荒熟分數其中晚稻田却候八月受狀節次檢踏如有奉行違慢後時失實之處許兩司按劾以聞庻幾窮民將來獲霑實惠目下聞此德音便知朝廷存恤之意不至猖狂别生妄念仰勞宵旰之憂實為利便一賑恤之備去年諸郡公私猶有蓄積緣今春支用數多悉已無餘今被災之民既是不可不加接濟則其費皆當出於朝廷臣本欲遍詢諸郡約見合用實數然後奏請今恐因循後時失於措置兼聞衢婺明州守臣皆欲丐祠而去台州亦申本司乞撥錢糴米數目甚多又見臣寮劄子論衢州等處見已乏食及有指揮行下閩廣勸諭客米前來溫州接濟可見一路州軍荒歉匱乏事勢已急臣今且約一路之數權以一百萬貫為率欲望聖慈特賜開許印給度牒官㑹早賜給降其度牒欲乞就十分錢數之内且給三分依近降指揮每道且賣五百貫文省或依元價作四百貫文省容臣約度分俵諸州守臣令其多方措置變轉收糴庻幾趂此早榖成熟之際便於左近有米去處價直尚平之時節次收拾免致臨時倉卒貴價收糴緩不及事一訪聞諸州府村落已有彊借刼奪之患此在官司固當禁約然亦須先示存恤之意然後禁其為非庻幾人心懐德畏威易以彈戢若慢不加省待其生事然後誅鉏則所傷已多所費又廣况其不勝何患不生乞降指揮早撥上項錢數使如臣者得以奉承宣布遍行曉諭即德意所孚固有以銷厭禍亂之萌矣然後明詔安撫提刑兩司察其敢有作過唱亂之人及早擒捕致之典憲庻幾姦民知畏不至生事一去歲獻納糶濟之人近已各䝉聖恩補授官資無不感戴然去歲所降減半指揮止於紹興一府施行今則一路皆荒事體不同乞降指揮檢㑹當來耿延年所乞事理許於浙東一路通行一檢凖常平免役令諸興脩農田水利而募被災飢流民充役者其工直糧食以常平錢榖給臣契勘本路水利極有廢壊去處亦有全未興創去處欲俟將來給到錢物即令逐州計度合興修處顧募作役既濟飢民又成永久之利實為兩便一伏見州縣之吏不為不多而其間才能忠信可倚仗者極不易得將來七州糶濟往來督察用人必廣乞降指揮特許將得替待闕丁憂致仕及在法不應差出之官權行差使候結局日如舊庻可集事右謹錄奏聞謹奏簽黄臣所乞錢數雖多然以今日明州中色米價計之方糶得二十四五萬石散之七州不為甚多而盤運水脚糜費又在其外伏乞聖照臣所乞紹興府理折夏稅事理極為分明然在中夏以前未經再旱之時行之固若有過優者在今日再旱之後人物煎熬朝不謀夕之際沛然行之以紓民力則恐未為甚過况今據大數通府所放秋苖不過六分三釐以此計之所減夏稅亦不甚多若以去年比例言之今年夏稅亦合住催况此是補還去年之數直行放免不為過當重念臣自論此事上為省部所嫉下為州郡所仇藉躪形迹無所不至原其本心只為陛下愛養疲民護惜根本誠亦何罪而至於此切望聖明哀憐照察臣竊詳在法檢視蠲閣𨽻轉運司臣今敢以為請者蓋緣蠲閣賑恤本是一事首尾相須若蠲放後時失實使飢民已被輸納追呼之擾然後復加賑恤則與割肉㗖口無異故臣妄意欲得叅與其事庻幾血脉通貫使聖朝賑恤之恩不為虛枉伏乞聖照臣所奏請固皆今日所當施行而此項最為急切竊恐大臣進呈之際謾將一二項不甚𦂳要事節量行應副却將此項沉溺不為施行俟臣再請則又費月日致失機㑹且如明州糴米一事臣本是四月二十三日以後節次申奏是時明州米船輻凑正好收糴乃不施行及至六月十一日方得指揮則所有船米已為上戶收糴殆盡矣今朝廷施行事體緩慢姦弊百端不稱陛下救焚拯溺之意大率類此臣不敢越職奏聞惟是此事切乞斷自聖志力賜主張蓋不惟一路民命所繫實亦國家休戚所關願陛下獨畱聖慮臣曾摹得蘇軾與林希書說熙寧中荒政之弊費多而無益以救之遲故也其言深切可為後來之龜鑑近已刻石本司緣是臣下私書不敢容易繳進今有一本急於申奏不及如法標背己申納尚書省或䝉宣索一賜覽觀仍詔大臣常體此意不勝幸甚此項以後係是次𦂳内推賞差官兩條亦乞早留聖意乞留婺州通判趙善堅措置賑濟狀具位臣朱熹臣據知婺州錢佃申備據國學進士唐季淵等狀本州去歲遭旱特甚通判朝奉郎趙善堅恊力措置災傷廣求利害籍貧乏家七十萬口置濟糶塲五百餘所勘諭上戶糶米借貸排日煑粥以食民之不給津遣鄰郡流移收養小兒遺棄病者醫藥以療之無流移凍餒之人存活者幾百萬口實迹可考今歲闔郡乾旱祈禱尚未感通飢餓狼狽指日可待趙善堅前來賑濟有方况今歲之旱甚於去歲善堅解罷在即不惟邦民失所倚頼而州郡亦大失禆助乞特敷奏權留在州同共措置賑濟佃契勘去歲旱歉通判趙善堅專一措置賑濟遍厯諸邑山谷㸃檢糶塲委是宣勞實惠及民今年梅雨愆期旱歉至甚照得通判趙善堅今年七月十八日任滿本州委是闕官措置乞移牒趙善堅權留在任同共措置賑濟候來年細民接食却行解罷臣照對婺州去歲災傷本州通判趙善堅措置濟糶存恤飢民委有勞効本官雖將任滿本州今歲又遭旱傷比之去年尤甚𦂳要知得措置首尾官員差委幹辦欲望聖慈特賜睿㫖許從本州守臣錢佃備到士民連狀所請令善堅在任同錢佃恊力措置災傷庶免誤事須至奏聞者右謹錄奏聞伏候勅㫖乞將合該蠲閣夏稅人戸前期輸納者理折今年新稅狀具位臣朱熹臣昨備據紹興府士民魏必大等狀陳訴具狀申奏朝廷乞行下紹興府將災傷諸縣自第一等至第五等人戶照應淳熙八年已納夏稅和買役錢等依秋苖檢放分數除豁外有餘剰納過分數與理作今年合納夏稅事續承降五月三十日省劄戶部勘當即不委本府去年受納到人戶錢物自第一等至第五等各等各戶納到若干分數比秋苖有無多納過錢絹紬綿數目獲奉聖㫖指揮劄下開具保明供申臣已㳟禀施行及照得取㑹各等逐戶數目緣諸縣戶名萬數浩瀚竊慮遲延有妨催科繼已具申尚書省今一靣取㑹到諸縣去年總計管納夏稅官物除山園陸地浮財屋産外其湖籍田共計合納二十八萬六千三十七屯匹三丈六尺七寸五分折帛役錢等二十萬三千四百九十六貫七百五十文除被水渰浸倚閣蠲免及人戶納到錢帛外有未納共五萬三千五百七十六屯匹一丈五尺一寸六分錢四萬一千四百六十一貫二百六十八文若以檢放秋苖分數合計七萬一千三百七十八屯匹一丈七尺八寸錢一十萬九千五百一十六貫二百八十六文外諸縣止有剩納三萬七千八百九屯匹三丈九尺八寸六分錢七萬七千二百三貫九百二十六文在官乞理作今年合納之數臣照對紹興府諸縣所管湖藉田畝出納夏秋二稅官物去年緣為災傷其秋苖係隨田内禾稻輕重檢放其所輸夏稅雖因水災得䝉蠲閣後來繼即遭旱水不及處亦無所收緣係未收成以前起催所以人戶多不霑被減放之恩又八月内降到蠲閣指揮之時人戶之善良畏事者皆已輸納其得被聖恩者實皆頑猾之戶事體輕重甚不均一臣又竊覩去歲災傷飢民猥衆尚䝉聖慈撥賜錢米救濟豈有田内夏稅已䝉蠲閣人戶前期誤行輸納者却不與理折今年新稅甚非朝廷矜恤之意况今夏以來諸邑又多亢旱斯民接連飢荒方苦艱食當此催科之時委實無可輸納若不䝉朝廷特加優恤必見失所况以諸縣數百萬戶口今來所乞通理剰納之數其為物帛止三萬七千八百九十七屯匹三丈九尺八寸六分錢止七萬七千二百三貫九百二十六文數目既少於朝廷所損不多而民戶可霑實惠欲望聖慈俯賜允從特降指揮將人戶去年剰納前項數目與理作今年之數蠲豁庻幾嗷嗷之民得以安業須至奏聞者右謹錄奏聞伏候勅㫖奏廵厯沿路災傷事理狀具位臣朱熹今具沿路災傷事理下項須至奏聞者一臣七月十六日再到田間看視蝗蟲大者絶少而小者尚多當處多是旱中禾稻皆已成熟多被喫損人戶皆稱檢官未到見分數不敢收割臣已牒本府催促所差下官日下出門前來檢視去訖又支錢付曹娥監鹽官收買十四十五都蝗蟲并行埋瘞續據上虞餘姚縣申到本縣蝗蟲頗多亦已行下催促支錢收捕埋瘞今來頻得雨澤遠近沾足竊意其蟲必當殄滅已牒本府一靣審實具奏伏乞聖照一臣十七日經厯上虞縣界田皆遭旱彌望焦赤間有近水去處尚有些小可望收成觀其災傷委是至重而本縣不受人戶投訴反將投訴人户刷具舊欠監繫門頭及出招子催督稅賦無問貧富大小人戶五日一限逐限輸官之外人吏定要乞錢一百文省其不到者即差公人下鄉追捉搔擾尤甚乞覔尤多人戶不勝其苦一日之間遮臣泣訴者至五七百狀臣已送本府存恤究治施行去訖更乞聖慈特賜指揮庻幾州縣有所懲戒免致重困飢民不勝幸甚一臣十八日到嵊縣其旱勢尤甚於上虞蓋紹興諸縣之旱嵊為最而上虞次之餘姚又次之然上虞餘姚去年猶得薄收獨嵊縣一連三年遭此極重之災雖其上戶中家已覺艱窘鰥寡細民則已有掇稗子而食者臣曾支錢三十文買到所採稗子一升今申納尚書省欲乞宣索一賜觀覽早降指揮令紹興府將此三縣新舊稅租特與倚閣俟見秋苖合放分數斷自宸𠂻别賜處分不勝幸甚一臣十九日至新昌縣是日午後連得大雨幾至通夕本縣先來亦苦乾旱早稻皆已失收中晚之田亦已龜拆方自中旬以來連日得雨田中遂皆有水中晚之禾間有可望去處可勝上虞等縣但諸縣大抵旱乾日久得雨後時秋序已深氣候寒冷其間稻苖雖尚青活而不復能結實者亦多有之荒熟之形尤難分别臣已遍牒檢視官員切宜子細不可差誤伏乞聖照一沿路人戶巳損田叚不堪收割皆欲及早耕犂布種蕎麥二麥之屬接續喫用但以檢放未定不敢施工欲望聖慈特降指揮催促檢放庻幾不妨民間及早耕種其有闕少種糧之人更令官司量行應副尤為厚幸一臣二十一日入台州天台縣界以後事理尋别具奏聞伏乞聖照右謹錄奏聞伏候勅㫖奏知寧海縣王辟綱不職狀具位臣朱熹臣昨為親見台州寧海縣人戶流移已曾具奏竊慮深軫聖懐自到本州即行詢究見得本縣流移人戸已是千有餘口其知縣宣敎郎王辟綱恬然不恤亦無申報委是不職竊恐將來糶濟事務繁夥必是不能了辦欲望聖慈特賜罷黜或依已得指揮與監廟一次仍特不理作自陳須至奏聞者右謹錄奏聞伏候勅㫖奏救荒事宜畫一狀貼黄奏為本路災傷已䝉聖慈支降錢三十萬貫更乞揍作二百萬貫及别有畫一奏聞等事伏候勅㫖具位臣朱熹臣昨以本路薦被災傷輙以賑䘏事宜一二條奏伏䝉聖慈曲賜俞允仍賜錢三十萬貫以充七郡糶濟之用德意甚厚臣謹已奉宣詔㫖頒布逺近飢饉餘民感激受賜歡聲如雷此固足以見陛下天地父母生成覆育之恩矣然臣愚暗不知分量輙敢更有無厭之請蠲冐萬死復以奏聞伏惟陛下少畱聖聽臣不勝幸甚今具下項一臣昨奏請給降錢一百萬貫為一路救荒之備已䝉聖慈開允應副三十萬貫不勝幸甚然臣自昨者具奏之後續據諸州申到所乞錢數明州一百萬貫婺州六十萬貫處州十萬貫台州十萬貫而紹興府衢溫州尚未申到計其所須當亦不下三二十萬大抵通以一路計之約二百餘萬貫始可足用而臣向來所請不及其半致陛下未知合用實數其所予者又不及所請之半臣之罪大無所逃刑唯有及今據實披露尚冀可補萬一臣竊計本路四十一縣除得熟縣分不過十數其餘大抵皆荒且以三十縣計之若得二百萬貫則一路可得米五十萬石而一縣當得一萬六千餘石若止得一百萬貫則一縣但可得米八千餘石今乃僅得三十萬貫則是一路得米不過七萬餘石而一縣為二千餘石而已其逐縣合糶給戸口雖已立式行下取㑹未到然以去年紹興諸邑之費推之則一縣用米有至四五萬石者况今歲之荒甚於去歲一縣飢民之衆其非八千二千石之所能濟亦不待筭計而可知矣今欲少俟取見戸數而後計所不足續有陳請則恐地分濶逺取㑹未能遽集之間而已後糴米之期矣冬春之間糴者日衆米價日高臣恐用錢愈多得米愈少而民之飢者愈失望也臣愚欲望聖慈深察前項事理特降睿㫖更撥錢一百七十萬揍前所給通作二百萬貫令臣及早分給諸州廣行運糴俟見糶給戸口實數却行計度支用不盡之數先次拘收回納亦未為晚伏候聖㫖簽黄竊恐度牒官㑹發出太多難以發洩今減半賞格已䝉施行欲乞指揮紐計米數量給空名告身五七十道并度牒官㑹揍成二百萬貫付臣收掌則富民間之願獻助者必多如有應格之人即乞許令提舉官與安撫使照應見行減半賞格聚㕔書塡當靣給付亦足以關防私曲情弊伏乞聖照一臣昨奏乞依耿延年所奏浙東一路獻助米斛人戶並與減半推賞已䝉聖慈開允施行不勝幸甚但指揮内却有將來檢踏見得災傷最重處方得保明取㫖之文則臣恐聽者不能無疑而未有應募之意也臣雖已行下州縣令人戸願獻助者先經本司自陳待與摽撥赴災傷最重州縣送納支散然人戶未知省部人吏將來的將是何州縣作災傷最重去處則終不能無疑且天下一家初無彼此而本路災傷重處殆計八九但令在在處處米榖堆積而徐視飢民闕食尤甚去處般運以往則亦無處不可入納又何必逆為此不可取㫖之端以疑羣聽而誤飢民之命哉臣愚欲望聖慈深察上件事理特降睿㫖一依乾道七年耿延年所請已得指揮施行而刪去今來所增委曲關防之語使大哉之言一哉之心有以宣著暴白於天下則有餘粟者争先應募而所賜之錢又可㑹計餘數拘收回納是亦所謂惠而不費者伏候聖㫖一臣昨具奏乞詔州縣寛限催稅已䝉聖慈特詔本路州縣將合納稅賦並照省限催促不得非理搔擾不勝幸甚但今年旱傷實非去年之此若據事理所有夏稅自合依去年例特與住催竊緣節次蠲放䝉恩已多不敢便為陳乞但今八月十五日省限已滿州縣自此必是公肆追呼無所忌憚使被災餘民無所告訴馴致死徙仰貽宵旰之憂臣愚欲望聖慈深察上件事理特詔有司將本路被災縣分人戸夏稅權行住催却俟檢放秋苖分數定日却將夏稅亦依分數蠲減一併催理庻幾飢民均被實惠伏候聖㫖簽黄臣契勘紹興府今年人戶丁錢已䝉聖慈盡數蠲放今者本路諸州例遭災旱而台州丁錢最重下戸尤以為苦欲望聖慈許將台州五縣第五等人戸今年丁絹特與蠲放庻幾千里飢民得免追呼决撻之擾不勝幸甚伏取聖㫖一臣昨所奏逐項事理並䝉開允獨有依凖舊制募飢民修水利一事未䝉施行臣竊見連年災旱國家不忍坐視夫民之死大發倉廩以拯救之其費以巨億計蓋其賑給者固不復收其賑糶者雖曰得錢而所折閲亦不勝計仁聖之心於此固無所吝然飢民百萬安坐飽食而於公私無毫髪之補則議者亦深惜之故臣嘗竊仰稽令甲私計以為若微於數外有所增加以為募民興役之資則救災興利一舉而兩得之其與見行糶給之法利害之筭相去甚逺故不自揆既以奏聞而輙下諸州委是通判詢究水利合興復處以俟報可至於近日廵厯又得親見所至原野極目蕭條唯是有陂塘處則其苖之蔚茂秀實無以異於豊歲於是竊歎益知水利之不可不修自謂若得奉承明詔悉力經營令逐村逐保各有陂塘之利如此則民間永無流離餓莩之患而國家亦永無蠲減糶濟之費矣不謂言語疎畧未䝉鑒照敢竭其愚重以為請伏望聖慈深察上件事理許臣前項所請百七十萬貫者而令於内量撥什三候諸州通判申到合興脩水利去處即與審實應副其合糶給人有應募者即令繳納糶給由厯就顧入役俟畢工日糶給如舊則所損不至甚多而可以成永久之利絶凶年之憂費短利長未為失策伏候聖㫖簽黄臣又竊恐興脩水利所費太多難以支給即乞且令貸與食利人戸雇工興役却候將來豐熟年分紐計米數量分料次赴官送納樁管在官尤為利便伏候聖㫖一臣昨嘗靣奏乞令被災州縣人戸苖米五斗以下不候檢踏先次蠲放以絶下戸細民奔走供億計囑陪費之擾誤䝉聖慈曲賜開納今者本路復遭旱虐竊欲取㫖依此施行但今檢官已在田野如䝉開允即乞聖慈特降指揮令轉運司疾速施行若俟命下到臣廵厯去處然後施行却恐緩不及事伏候聖㫖一臣伏覩歳既不登所在艱食全賴啇賈阜通之利所宜存恤不可搔擾今米穀不得收稅雖有成法而州縣塲務多不遵守至於往糴而有所挾之資既糶而有所資之貨則往來之間經由去處尤以邀阻抽稅為苦是致客人憚於興販欲望聖慈特降睿㫖申嚴舊法仍詔有司諸被災州縣人戸欲興販物貨往外州府收糴米榖就闕米處出糶者各經所在或縣或州或監司自陳所帯貨物判執前去其糶米訖所買回貨亦各經所在自陳判執回歸往回所過並不得輙收分文稅錢違者並依稅米榖法必行無赦如䝉開允即乞徑下轉運司約束沿江瀕海所過塲務遵禀施行庻幾啇販流通民食不匱伏候聖㫖右謹錄奏聞伏乞勅㫖奏明州乞給降官㑹及本司乞再給官㑹度牒狀具位臣朱熹臣據明州申契勘本州今歲闕雨管下六縣皆有旱傷去處竊慮細民闕食本州雖有常平錢米所管不多今來事勢不可少緩本州遂於七月十八日具奏乞支降官㑹一百萬貫下本州循環充本雇備人船出海往潮廣豐熟州軍收糴米斛凖備賑糶賑濟或朝廷不欲支動經常之費即乞支降空名度牒一千道官告三千道下本州轉變糴米未䝉回降申本司乞更賜敷奏臣照對本路諸州今歲皆有旱傷比去年大叚不同雖荷聖恩給降官㑹度牒共三十萬不足支遣臣已具奏乞再給一百七十萬貫揍前作二百萬貫如䝉朝廷應副便可均給諸州今又據明州所申合行備錄奏聞伏望聖慈照臣前奏事理早賜依數給降仍乞就撥紹興府先䝉降到度牒一百道所換米二萬石及明州先䝉降到二十萬貫糴到米並付本司均撥應副紹興府明州糶濟及貸與食利人戸興修水利却於二百萬貫内除豁其水利貸錢向後豐年却令逐旋回納實為利便須至奏聞者右謹錄奏聞伏候勅㫖晦菴集卷十七欽定四庫全書晦菴集卷十八宋朱子撰奏狀
