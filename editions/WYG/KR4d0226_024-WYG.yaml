body:
  text: 與鍾戸部論虧欠經總制錢書二月一日具位朱熹謹東向再拜致書侍郎右司執事熹昨得見執事於省戸下忽忽五年矣中間執事來使閩部熹是時方退伏田里有俯仰出入之故雖不得瞻望履舄之餘光亦嘗以章少卿文所致書輙為數字之記以通於左右是後乃不復敢有所關白不自知其果能達視聽否也比來同安跧伏簿書塵土中乃聞執事復為天子出使巴蜀萬里之外弛去逋負緍錢之在官者以數百巨萬計弭節來還天子嘉之下所議奏於四方擢執事置尚書省為郎以計六曹二十四司之治可謂寵且榮矣又以執事通於君民兩足之義俾執事攝貳於版曹務以均節財用便安元元為職除日流聞四方幽隱無不悦喜以為執事必能以所嘗施於蜀者惠綏此民寛其財力之所不足以助天子仁厚清靜之政也今執事之涖事數月矣四方之聽未有所聞也熹不佞竊有所懐敢以請於下執事蓋熹聞之天子憫憐斯民之貧困未得其職故數下寛大詔書弛民市征口筭與逃賦役者之布又詔税民毋㑹其踦贏以就成數又詔遣執事使蜀弛其逋負如前所陳者熹愚竊以為此皆民所當輸官所當得制之有義而取之有名者而猶一切蠲除不復顧計又出御府金錢以償有司是天子愛民之深而不以利為利也明矣而况於民所不當輸官所不當得制之無藝而取之無名若所謂虧少經總制錢者乎熹以謂有能開口一言於上以天子之愛民如此所宜朝奏而暮行也而公卿以下共事媕阿莫肯自竭盡以助聰明廣恩惠前日之為戸部者又為之變符檄急郵傳切責提刑司提刑司下之州州取辦於縣轉以相承急於星火奉行之官如通判事者利於賞典意外督趣無所不至此錢既非經賦常入為民所逋負官吏所侵盜而以一歲偶多之數制為定額責使償之又如合零就整全是經總制錢今年二税放免今年虧欠必多亦不可不知也自戸部四折而至於縣如轉圜於千仞之坂至其址而其勢窮矣縣將何取之不過巧為科目以取之於民耳而議者必且以為朝廷督責官吏補發非有與於民也此又與盜鐘掩耳之見無異蓋其心非有所蔽而不知特藉此為説以詿誤朝聽耳計今天下州縣以此為號而率取其民者無慮什之七八幸其猶有未至於此者則州日月使人持符來逮吏繫治撻擊以必得為效縣吏不勝其苦日夜相與撼其長官以科率事不幸行之則官得其一吏已得其二三並緣為姦何所不有是則議者所謂督責官吏者乃所以深為之地而重困天子所甚愛之民也夫吏依公以侵民又陽自解曰此朝廷所欲得非我曹過也夫愚民安知其所以然者何哉亦相聚而怨曰朝廷不䘏我等耳嗚呼此豈民之所當輸官之所當得者耶其制之無藝取之無名甚矣夫以天子之愛民如此彼所當輸當得有藝而有名者猶一切出捐而無所吝况如此者惟其未之知耳一有言焉其無不聽且從矣而獨愛其言者何哉是執政任事之臣負天子也執事誠能深察而亟言之使所謂虧欠經總制錢者一日而罷去則州縣之吏無以藉其口而科率之議寢矣然後堅明約束痛加繩治敢以科率病民者使民得自言尚書省御史臺則昔之嘗為是者其罪亦無所容矣於以上廣仁厚清靜之風下副四方幽隱之望無使西南徼外巴賨卭莋之民夷獨受賜也豈不休哉豈不休哉熹疎遠之跡於執事有先君子之好而亦嘗得一再見辱教誨焉今也執事適在此位為可言者誠不自知其愚且賤思有以補盛德之萬分故敢獻書以聞惟執事之留意焉方春向温伏惟益厚愛以俟真拜不宣與李教授書竊惟朝廷興建學官以養天下之士使州之士以學於州縣之士以學於縣以便其仰事俯育之私而非以别異之也然其制財用之法所謂贍學錢者蓋州縣通得用之今執事之議於提學司曰業於州者得食於縣官而業於縣者無與焉以熹觀之朝廷立學養士之意與夫制財用之法似皆不如此今且置此而以私言之蓋朝廷以執事宜為人師故以執事教泉之人為士者執事固不得而盡教之雖使教不能盡亦不愈於坐而棄之乎今執事之議曰使縣之任其費執事以為縣將焉取之於民者悉矣今兹民力困竭官吏愁勞日不暇給而責之以此是其不能有以教而將直棄之明甚於執事不為有補執事何苦而必行之以棄此縣之人也如曰縣學所以教者不能如州則諸縣者熹所不能知如熹所領學其誦説課試大小條科熹自以為亦無甚愧於執事之門而其師生相接之勤則竊自隱度以為雖執事力或有所未能也謂宜得在假借之域而反以例削之使不得自盡此何説哉熹已具公狀申禀而以此私於左右伏惟思究朝廷立學養士之意而攷其制財用之法痛念吏民之艱弊而深察熹之所領其於州縣有異焉於不可與之中捐而與之亦所以視髙明之意有在而不專於已勝足以勸其能者而不能者知所厲焉又况理法有可與者乎干冐威嚴不勝皇恐答陳宰書昨夕坐間䝉出示廣文公書似未見察者聊陳其一二李君兄弟之賢聞於閩中熹少時見諸老先生道語其故心甚慕之及來此道過三山乃識其兄迂仲即之粹然而温無諸矜争之色時未識李君以謂其猶兄也至官未久聞其分教是邦心甚喜以為所領縣學事有相關者當大得其力助故事有可不可未嘗不因書文以喻意指而不意其怒至此也熹所辨七事如左李君書以為熹有少年鋭氣嘗為論事者當以事理之長短曲直而不當以其年之先後若直以年長者為勝則是生後於人者理雖長而終不可以自伸也又謂奚不於監司郡守前論列此李君之所能而熹誠不敢也所以然者直不欲以監司郡守之勢脅持上下耳此李君之所能而熹誠不敢也李君又自謂本無欲勝人之心止是推車欲前耳異哉李君之欲前其車也獨不思夫郡縣之學本一車耶譬則郡其軫蓋而縣其衡軛也後其衡軛而獨以蓋軫者驅馳之曰吾欲前此耳此熹所不曉也又謂四分錢乃郡縣學通得用熹既留其二而歸其二於郡學矣尚何言使縣不得用其二分是猶州不得用其二分也假糧於道是乃前所謂自備錢糧者奚獨縣學則可而郡學則不可乎推此言之前李君所自謂無勝人之心者熹不信也又謂郡學泉州學也同安學同安縣學也各盡力於其中耳此又不然熹前疏所陳云云者非以自髙乃所以極論究心一二而求見哀於李君外自有一州之教官上為丞相所自擇用下與大府部刺史分庭抗禮而熹銓曹所擬一縣小吏而敢有勝之之心乎今李君所云無乃與熹之私指謬也又謂熹不能有所養而於此未能自克此則中其病但熹所争乃公家事無毫髮私意於其間此固官長之所深知而其戒熹敢不思也熹已謝學事但此色官錢終不可失蓋此乃同安一縣久遠利害非吾人所得用以徇一旦之私伏惟持之不變以幸此縣之人而以熹所陳者曉李君無深怒也李君書與熹前所為劄并封納呈他尚容靣究與黄樞密書竊聞敵酋隕命種人遁走淮北遺民悉降我師此蓋天命眷顧宗廟社稷之靈廓清中原以全畀付莫大之慶海内同之然熹之愚慮獨不勝私憂過計敢以布於下執事蓋自戊午講和以至於今二十餘年朝政不綱兵備弛廢國勢衰弱内外空虚近歲以來天啓聖心稍加振理始復漸有條緒然宿弊已深非得同心同德之臣素為海内所屬望者為之輔佐進賢退姦修滯補弊要之以盡而持之以久使其勢翕然而大變則未可以有為也前日不量事勢亟下親征之詔則既失之易矣然理直言順庶幾有成事同發機有進無退而曠日引月不聞進發之期任國政者不聞有冦忠愍之謀典宿衛者不聞有髙烈武之請使諸將惰心六軍解體敵騎横突深入兩淮兵少而敵益彊事急而糧已匱於是戒嚴未及兩月而募兵科借之禍已及民矣向非天佑皇家降罰於彼則勝負之决蓋未可知今日之事其不可謂諸公謀於廟堂之效羣帥攻城野戰之功亦已明矣愚謂正宜君臣相戒兢慎袛肅改圖柄任益修政理以答揚上天眷顧之命不宜坐虞鄰國之難以幸為利而遽自以為安也抑今中原之地幅員萬里敵人奔走震駭之餘力未能争朝廷坐視而不取則持計取之則功緒廣而勞費多此正安危得失之機差之毫釐繆以千里不可以不審也熹竊以為必能因其人以守因其糧以食使東南之力不困然後根本固而不摇必有以大慰其來蘓之望而深結其同濟之心使西北之情益堅然後藩籬密而可恃必使敵人他日痛定力全之後不能復窺吾盧龍之塞然後朝謁陵廟還反舊京之事乃可言也不知今日朝廷之上侍從之列誰為能辦此者獨舊人之賢起而未用者一二公使之出則重於今日視師之人授之政則賢於今日秉鈞之士獨恐朝廷終不聽用則無如之何耳失今不早為計敵人士馬精彊固未有損今兹所失獨完顔亮一夫耳萬一旬月之間復悉其衆挾其喪君之恥以來修怨於我不知朝廷之議復以何計禦之歛民則民憔悴而不堪募兵則兵脆弱而無用將據中原而與之争則形勢未習將棄中原而守淮泗則恢復無期不知議者何以處此茍處之未審而曰姑又以待天幸之來則非愚之所敢知者是以私憂過計夙夜拳拳而不能已也顧衰病之餘氣短辭拙不能言利害之實然其大要不遠是矣閣下以道學履踐致身廟堂在諸公間最有人望故熹敢以此言進觸冐威尊皇恐無地狂妄之罪惟左右者裁之答陳漕論鹽法書季若熹昨承垂示鹽法利害累日究觀竊以為適今之宜莫便於此及詢諸鄉人則其説不無同異不敢不以聞蓋問之崇安之人則比其舊費畧有所省無不以為便者問之建陽之人則云千金之産今日買鹽所折不過千錢而新法輸錢半倍其舊又須出錢買引鹽食之計引鹽至建溪上流比之今價亦不能甚賤則其為利為害未可知也兩邑之數具之别紙可見其實又不知他邑如何爾然熹竊謂法之大體實已利便蓋彊弱均敷已寛下貧應役之民便省賠費又凡種種弊倖皆無所自而作固不可以輕變但更須博盡衆謀多方措置使輸錢之數比舊稍輕買鹽之價比舊頓減即公私兩便法可久行若其不然則官戸豪宗昔幸免而今例輸者横議紛紛必有所緣而起雖有良法美意不可行矣竊嘗思之引價之所以貴以引額之數拘之也本錢之所以多以所支之數取之也此鹽之所以貴也賣引之額所以㣣以所運之數拘之也海船之錢所以取以般運之費計之也此計産輸錢之所以重也欲致二利去二害在乎罷海倉之買納而已矣誠能罷海倉及下四州諸縣之買納而使客人請引南自漳泉北至長溪各從便路徑就埕戸買鹽興販則引價可減本錢可輕而鹽賤矣引額可增海船可罷而計産所輸亦薄矣夫海倉為鹽法蠧害之根本使臺知之詳矣下四州諸縣買納之弊不異乎海倉而漳州以盜賣合支産鹽重為民害使臺知之亦詳矣使其無害於今日所議之法猶將廢置以蠲積弊况所以增官鹽之價而厚私鹽之利者皆在乎此豈可以不罷而改圖其新乎夫賣引之額以上四州逐年運到一千萬斤者為率而海倉每歲所取亦止此數尚有乏絶不繼停留綱運之時故引價至於二十三文而患其貴引錢止得二十三萬而患其少皆此之由也熹竊謂夫一千萬斤者官運之正數也若夫出於埕戸搭於綱船漏於步擔而散於四郡之間食之無餘者一歲又何啻數百萬斤此乃埕戸所煎民間所食之實數而前日棄之以為私販之資者正以海倉侵盜本錢稽留割剝使埕戸不願輸官而寧私為賤鬻以捄目前之急故也今若罷去海倉而收此數百萬斤者併入引額則引價每斤可減數錢而所以收引錢大數反增於舊矣謂如增作一千五百萬斤引而一斤止賣二十文亦得三十萬貫恐不止此數更乞籌之又使埕戸更無私鹽可賣而官鹽益快何憚而久不為此夫所以使客人納鹽本錢每斤十二文者將以給埕戸為循環本也今官收而官給之在客人則為枉費在埕戸則無實利曷若使埕戸客人自為貿易而官封之沿海逐縣專委令丞或簿尉則客人不費四五文可得鹽一斤每斤所省數錢足以具舟楫資往來埕戸售鹽一斤實得四五文比之請於官司名為十二文而經過官吏攬子之手什不得其一二者大相遠矣所以使州縣樁海船錢五萬餘貫者本為漕司自海倉運至懐安以待客販也若罷海倉而使客人徑從便路興販則此錢固已在所蠲矣行此數者使引價可減本錢可省則官鹽自賤而私販自戢引額可增海船錢可罷則此兩項所增所罷之數以減計産所輸之數亦不啻什四五矣下四州人戸則使徑就埕戸買鹽不限引法但立法以防其興販透入上四州界可也此外非熹聞見思慮所及但議者見使司自王侍郎以來三四年間代納上供其數不少或謂增鹽尚有可減之數更望計度如其可減則願更減分數於三項立法之中均退幾錢尤為久遠之利使閩中之人相與稱曰鹽法之利於吾民自陳公始子孫不忘豈不休哉鄙見如此未知當否以下問之勤不敢虚辱既採民言又竭愚慮以稱塞萬分狂妄之罪尚冀髙明矜而恕之幸甚幸甚答劉平甫書聞已遣兩使議和金人待遇甚厚或疑金勢實衰故欲且緩我師耳所遣乃歸正人也楊已罷御營用周元特之言也周已還南榻矣山中已聞否伯崇兄不及别上狀想且留屏山比日讀何書講論切磋之益想不但文字間也上蔡帖中儒異於禪一節道間省記頗覺有警試相與究之見日靣論也與陳書謾寫去只可呈大兄一讀而焚之勿留也此言之發其不能受也固宜然萬一成行則所言必有甚於此者又將何以堪之耶觀此氣象不若杜門之為愈下計終當出此耳元履云若為貧即不妨已以行道自任而以為貧處人此正吳材老之論古音也可以一笑與延平李先生書熹拜違侍右倐忽月餘頃嘗附兩書於建寧竊計已獲關聽矣熹十八日離膝下道路留滯二十四日到鈆山館於六十兄官舍路中幸無大病今日戴君來診脉其言極有理許示藥方矣云無他病只是禀受氣弱失汗多心血少氣不升降上下各為一人其他曲折皆非俗醫所及頃在建陽惟見大湖一親戚語近此耳至於心意隱微亦頗得之信乎其不可揜也熹向䝉指喻二説其一已叙次成文惟義利之説見得未分明説得不快今且以泛論時事者代之大畧如日前書中之意到闕萬一得對畢即錄呈也但義利之説乃儒者第一義平時豈不講論及此今欲措辭斷事而茫然不知所以為説無乃此身自坐在裏許而不之察乎此深可懼者此間亦未有便姑留此幅書以俟附行若䝉賜教只以附建寧陳丈處可也天氣未寒更乞為道保重以慰瞻仰九月二十六日拜狀不備與魏元履書熹六日登對初讀第一奏論致知格物之道天顔温粹酬酢如響次讀第二奏論復讎之義第三奏論言路壅塞佞幸鴟張則不復聞聖語矣副本已送平甫託寫呈當己有之矣十二日有㫖除此官非始望所及幸甚幸甚然闕尚遠恐不能待已具請祠之劄辭日投之更屬凌丈催促必可得也和議已决邪説横流非一葦可杭前日見周葵靣質責之乃云此皆處士大言今姑為目前計耳熹語之曰國家億萬斯年之業參政乃為目前之計耶大率議論皆此類韓無咎李德遠皆不復尋遂初賦矣庶寮唯王嘉叟諸人尚持正論然皆在閒處空復爾為兩日從官過堂詣府第不知所論云何欲少賛之輙不值未知渠所處也言路惟小坡論甚正但恐其發不勇不能勝衆楚爾王之望龍大淵已差使副不知尚能挽回否諸非筆札可盡共父之出中批所命朝野不知所坐本欲作先生一書醉矣不能因書及之亦令平甫寫其劄副藁寄呈矣與魏元履書近時一種議論出於正人之口而含糊鶻突聽之使人憒憒似此氣象規模如何抵當得王之望尹穡輩更何足掛齒牙間也與陳侍郎書昨者伏䝉還賜手書慰藉甚厚拜領感激不知所言而奉祠冐昧之請又䝉台慈引重再三卒以得其所欲所示堂帖謹以祗受仰荷恩眷尤不敢忘而不知所以報也蓋熹賦性朴愚惟知自守間一發口枘鑿頓乖度終未能有以自振於當世退守丘園坐待溝壑而已今以閣下之力得竊廩假以供水菽之養其為私幸亦已大矣顧以義分猶有僥冐之嫌而閣下推挽之初心猶以為不止於此此則豈熹所敢聞哉又䝉垂喻今日之事慨然有戞戞乎其難哉之嘆且承任職以來屢有建白去處之義自處甚明熹也雖未獲與聞其詳然有以見賢人君子立乎人之本朝未嘗一日而忘天下之憂亦不肯以一日居其位而曠其職蓋如此然猶不鄙迂愚疎賤之人而語之及此其意豈徒然哉熹誠不足以奉承教令然竊不自勝其慕用之私是以忘其不佞而試效一言焉執事者其亦聽之熹嘗謂天下之事有本有末正其本者雖若迂緩而實易為力捄其末者雖若切至而實難為功是以昔之善論事者必深明夫本末之所在而先正其本本正則末之不治非所憂矣且以今日天下之事論之上則天心未豫而饑饉薦臻下則民力已殫而賦歛方急盜賊四起人心動搖將一二以究其弊而求所以為圖囘之術則豈可以勝言哉然語其大患之本則固有在矣蓋講和之計決而三綱頽萬事隳獨斷之言進而主意驕於上國是之説行而公論鬱於下此三者其大患之本也然為是説者茍不乘乎人主心術之蔽則亦無自而入此熹所以於前日之書不暇及他而深以夫格君心之非者有望於明公蓋是三説者不破則天下之事無可為之理而君心不正則是三説者又豈有可破之理哉不審閤下前日之論其亦嘗及是乎抑又有大於此者而山野之所弗聞弗知者乎閤下誠得其本而論之則天下之事一舉而歸之於正殆無難者而吾之去就亦易以決矣熹竊不自勝其憤懣之積請復得而詳言之夫沮國家恢復之大計者講和之説也壊邊陲備禦之常規者講和之説也内咈吾民忠義之心而外絶故國來蘓之望者講和之説也茍逭目前宵旰之憂而養成異日宴安之毒者亦講和之説也此其為禍固已不可勝言而議者言之固已詳矣若熹之所言則又有大於此者蓋以祖宗之讎萬世臣子之所必報而不忘者茍曰力未足以報則姑為自守之計而蓄憾積怨以有待焉猶之可也今也進不能攻退不能守顧為卑辭厚禮以乞憐於仇讐幸而得之則又君臣相慶而肆然以令於天下曰凡前日之薄物細故吾既捐之矣欣欣焉無復分毫忍痛含寃迫不得已之言以存天下之防者嗚呼孰有大於祖宗陵廟之讐者而忍以薄物細故捐之哉夫君臣之義父子之恩天理民彛之大有國有家者所以維繫民心紀綱政事本根之要也今所以造端建極者如此所以發號施令者如此而欲人心固結於我而不離庶事始終有條而不紊此亦不待知者而凛然以寒心矣而為此説者之徒懼夫公論之沸騰而上心之或悞也則又相與作為獨斷之説傅㑹經訓文致姦言以深中人主之所欲而隂以自託其私焉本其為説雖原於講和之一言然其為禍則又不止於講和之一事而已是蓋將重悞吾君使之傲然自聖上不畏皇天之譴告下不畏公論之是非挾其雷霆之威萬鈞之重以肆於民上而莫之敢攖者必此之由也嗚呼其亦不仁也哉甚於作俑者矣仁人君子其可以坐視其然而恬然不為之一言以正之乎此則既然矣而旬日之間又有造為國是之説以應之者其欺天罔人包藏險慝抑又甚焉主上既可其奏而羣公亦不聞有以為不然者熹請有以詰之夫所謂國是者豈不謂夫順天理合人心而天下之所同是者耶誠天下之所同是也則雖無尺土一民之柄而天下莫得以為非况有天下之利勢者哉惟其不合乎天下之所同是而彊欲天下之是之也故必懸賞以誘之嚴刑以督之然後僅足以刼制士夫不齊之口而天下之真是非則有終不可誣者矣不識今日之所為若和議之比果順乎天理否耶合乎人心否耶誠順天理合人心則固天下之所同是也異論何自而生乎若猶未也而欲主其偏見濟其私心彊為之名號曰國是假人主之威以戰天下萬口一辭之公論吾恐古人所謂德惟一者似不如是而子思所稱具曰予聖誰知烏之雌雄者不幸而近之矣昔在熈寧之初王安石之徒嘗為此論矣其後章惇蔡京之徒又從而紹述之前後五十餘年之間士大夫出而議於朝退而語乎家一言之不合乎此則指以為邦朋邦誣而以四凶之罪隨之蓋近世主張國是之嚴凛乎其不可犯未有過於近時者而卒以公論不行馴致大禍其遺毒餘烈至今未已夫豈國是之不定而然哉惟其所是者非天下之真是而守之太過是以上下相徇直言不聞卒以至於危亡而不悟也傳曰差之毫釐繆以千里况所差非特毫釐哉嗚呼其可畏也已奈何其又欲以是重誤吾君使之尋亂亡之轍跡而躬駕以隨之也嗚呼此三説者其為今日大患之本明矣然求所以破其説者則又不在乎他特在乎格君心之非而已明公不在朝廷則已一日立乎其位則天下之責四靣而至與其顛沛於末流而未知所濟孰若汲汲焉以勉於大人之事而成已成物之功一舉而兩得之也熹杜門求志不敢復論天下之事久矣於閤下之言竊有感焉不能自己而復發其狂言如此不審髙明以為如何也尚書王公計就職已久方羣邪競逐正論消亡之際而二公在朝天下望之屹然若中流之底柱有所恃而不恐雖然時難得而易失事易毁而難成更願合謀同力早悟上心以圖天下之事此非獨熹之願實海内生靈之願也與汪帥論屯田事崇安有范芑通判者頃從鄭資政鎮蜀能言當時漢中屯田之利所以實邊郡紓民力省歲費者甚有條理不知其幕府文書猶有存於今日者否就使不完當日官吏必尚有可訪者今之所謂和好豈可長保萬一可保而在我者亦豈當但為安坐以守所保之計乎聚人之本財用為急與其賣度牒責財於民而髠其首以絶生聚之源賣官告使入仕之流猥濫訛雜以為吾民之病孰若因天時分地利借力於飽食安坐之兵而坐收富彊之實效乎况前人已試之驗未遠在博訪而亟行之爾稼穡之功經歲乃成然當可為之時緩之一日則失一歲之事今以閤下之明乘此邊事少休歲收大稔之際兵民皆有餘力可以就事况諸司又皆通情則事之在漢中者亦可委曲審議而共為之失今不為恐後難復值此可為之㑹矣熹在遠僻不能深得利病之詳然得於傳聞參以簡冊所記載竊以為此最當今邊防之急務而申軍律練士卒備器械抑又次之皆不可不先事預謀以為之備不審台意以為如何與曹晉叔書熹此月八日抵長沙今半月矣荷敬夫愛予甚篤相與講明其所未聞日有問學之益至幸至幸敬夫學問愈髙所見卓然議論出人意表近讀其語説不覺胸中洒然誠可嘆服嶽麓學者漸多其間亦有氣質醇粹志趣確實者只是未知向方往往騁空言而遠實理告語之責敬夫不可辭也長沙使君豪爽俊邁今日竒士但喜於立異不肯入於道德可惜屢詢近况似深念尊兄者曾得近書否共父到闕之後言事者數矣其言又皆慷慨勁正近世之所未有聖主聰明無不容納然所憂者一薛居州若得三五人賛助之國事或可扶持也此豈人力所能參哉看上蒼如何耳與魏元履書被教備悉至意大槩只放税廩窮兩事爾放税是秋冬間事且與諸公商量未晚廪窮亦是州縣間合行事似不必聞之朝廷朝廷每事如此降指揮恐不是體靣昨日已作芮書今錄呈不知且如此可否第五等是五百文以下其間極有得過之人若物業全被水傷固不可不全放若但傷些小如何一例放得但百十錢以下産戸即不能如此分别與全放不妨爾西府書旦夕遣去熹亦當作書且以老兄所説與熹鄙意告之惟其所擇但一兩縣灾傷似只是監司州郡事若執政者切切然只專為鄉里理㑹事似屬偏頗道理亦不如此芮漕之書相咨問如此若以誠告豈有不行徐任亦方留意此事儘得商量若商量到十數日間亦須有定議矣朝廷在千里外其為報應豈不緩耶但商量事須酌中合宜教人行得即無不可告之理其或不入咎乃在彼若自家所説過當教人信不及行不得則是自家未是安得專咎他人耶况禹稷顔子事體不同吾人已是出位犯分了若合告州府監司者告州府監司合告朝廷者告朝廷盡誠以告之而行與不行付之於彼猶未為大失今又向如此却似未是道理蓋此事一發使朝廷失慮四方之體州郡監司失其職吾輩失其守雖活千人不可為也如何如何不若更度事理之所宜力告諸公有合朝廷應副者令自申明而約以助其請則庶幾或可爾謝諸公書必已有定論頃見伊川集中謝韓康公啓乃是除講官後方謝之吳憲既得書却難不答且答其書因謝其意似無不可但諸公無書來者則未須爾將來謝帥之辭不過自叙已意謝其薦揚而已横渠有數篇謝人薦舉書甚佳何必作佞語亦何必作惷辭但薦書中有此人姓名亦是人生不幸事此古人所以難受爵位也養源小批如此而遂竟去何耶熹看得今日之事只是士大夫不肯索性盡底裏説話不可專咎人主柳子厚曰食君之祿畏不厚兮憚得位之不昌退自服以黙黙兮曰吾言之不行今人多是此般見識也得汪文六月十九日九江書云六月末可到玉山於彼俟請祠之報已作書速其行矣一請猶是禮數若又再請則無謂矣熹與書云有如再請忽遂雅懐而治亂消長由此遂分豈惟公終身恨之天下後世亦且有所歸責矣不知渠又以為如何所欲言甚衆亟遣人草草與魏元履書里中大稔數年所無幸事然小民債負亦倍常年比收歛已想亦無餘矣昨得趙推書云漕司已備錄熹劄子行下府中未知後來如何王守趙漕都未通書蓋亦懶與此事矣其父前月二十間因論王琪專被宻㫖築真州城不經由三省密院大忤上㫖批與端殿宫觀次日又批與知隆興乞放謝却令朝辭乞以念八日又令初四日却似悔前舉之失然共父書云陳丈力争此事恐亦不能久兩公在朝雖做大事不得然善類不無所持今各辭去亦可慮也書中令致意尊兄云事體與昔不同陳丈若去則此事當自審處平父亟遣人至雲際人立俟書草此為報集議文字上内欽夫他文未暇檢然多取而不究其㫖此乃尊兄舊病何為未能去耶芮老書中相告戒切中拙病荷其相愛之意不敢忘也賀陳丞相書㳟聞制書延拜進秉國均凡在陶鎔孰不欣賴伏惟明公以大忠壯節早負天下之望自知政事賛襄密勿凡所論執皆繫安危至其甚者輙以身之去就争之雖未即從而天子之信公也益篤天下之望公也益深懍懍然惟懼其一旦必去而不可留也夫明公所以得此於上下者豈徒然哉今也進而位乎天子之宰中外之望莫不欣然咸曰陳公前日之言天下之言也争之不得危於去矣而今乃為相則是天子有味乎陳公之言而將卒從之也陳公其必以是要説上前而決辭受之幾矣且天下之事其大且急者又不特此陳公果不得謝而立乎其位必且次第為上言之為上行之其不黙然而受兀然而居也明矣熹雖至愚亦有是説然今也聽於下風亦既餘月政令之出黜陟之施未有卓然大異於前日則是明公蓋未嘗以中外之望於公者自任而茍焉以就其位矣熹受知之深竊所愧歎未知明公且將何以善其後也請得少效其愚而明公擇焉蓋聞古之君子居大臣之位者其於天下之事知之不惑任之有餘則汲汲乎及其時而勇為之知有所未明力有所不足則咨訪講求以進其知扳援汲引以求其助如捄火追亡尤不敢以少緩上不敢愚其君以為不足與言仁義下不敢鄙其民以為不足以興教化中不敢薄其士大夫以為不足與成事功一日立乎其位則一日業乎其官一日不得乎其官則不敢一日立乎其位有所變而不肯為者私也有所畏而不敢為者亦私也屹然中立無一毫私情之累而惟知為其職之所當為者夫如是是以志足以行道道足以濟時而於大臣之責可以無愧不審明公圖所以善其後者其有合於此乎其有近於此乎無乃復有進於此者而熹之愚不足以知之乎願亟圖之庶乎猶足以終慰天下之望母使前日之欣然者更為今日之悒然也抑熹又有請焉蓋熹嘗辱明公賜之書矣其言有曰前輩為大臣不過持循法度主張公道知無不言履君以德公行賞罰進賢退不肖而已今日事有至難風俗敗壊官吏茍且彊敵在前邊備未立如之何其可為也熹愚不肖深有所疑蓋凡明公之所易者皆古人之所難而明公所難者乃古人之所易也反復思慮不得其説將以質之左右而未暇也今者敢因修慶而冐以為請伏惟明公試反諸心而以事理之輕重本末權之誠知夫真難易之所在而有以用其心焉則亦無難之不易矣詩曰伐柯伐柯其則不遠願明公留意則天下幸甚答魏元履書所喻杜征南語此固切論然今日之事恐異於此蓋彼以彊大兼人之國故其計謀規畫不得不然今以弱小自守而義當有為乃其義理事勢不得不爾今日雖無征南之明畧而天下之事當得但已耶愚謂孟子所謂成功則天董子所謂明道正義武侯所謂鞠躬盡力死而後已成敗利鈍非所逆料者正是今日用處若以征南之言為正竊恐落第二義也前日答書思慮偶不及此見來書又言之聊發其愚不知老兄以為如何也頃見林黄中説在宫邸讀史記秦伐楚王翦李信争兵多少處偶及近事因云今乃欲以數萬之卒横行中原何其慮事之不詳也熹因為言此事正不爾秦滅六國楚最無罪故楚既亡而其國人悲思有三戸之謠則當時秦人之攻楚人之守勢可知矣今日之事與此正相反奈何以為比乎此與所論亦稍相似因謾及之大抵議論先要根本正當然後紀綱條目有所依而立近看論語説及為兒輩説唐鑑因得究觀范太史之學不知此人胸中如何其議論乃爾暇日試熟觀數過當見古人論事輕重緩急之方矣每讀至㑹心處未嘗不廢卷而歎也與陳丞相書熹啓中夏毒熱恭惟僕射平章樞使相公鈞候起居萬福熹昨奉咫尺之書修致慶問因以愚慮上瀆髙明自揣妄庸宜得譴斥之罪乃䝉鈞慈還賜手教撫存開納禮意勤厚伏讀三歎有以見明公位愈髙而心愈下德彌盛而禮彌恭果非小人之腹所能料也台司禮絶不敢復致啓謝惟是區區歸心黄閤之下未始一日而忘忽又奉承堂帖戒以祗事之期囊封疾置似亦非常制所當得者自顧何人可以當此尤竊恐懼不能自安然熹之狂獧朴愚不堪世用明公知之蓋有素矣頃自祠官叨被除目聞命之初即惕然有不敢當之意顧以近制不應辭避之科因欲復求祠官幾得斗升之祿以共水菽之養則又以待次尚遠懼有貪躁之嫌是以因仍寢嘿以至於今幸官期已及而廟堂又特為下書以招徠之則熹之不獲已而有求似亦不為甚無謂者已别具劄子一通道其所欲伏惟明公哀憐而幸聽之不使輕犯世故以貽親憂則明公之賜於熹厚矣或恐未即遽䝉矜許則熹請得復罄其説蓋熹雖愚不肖無所短長然區區用力於古人之學閲天下之義理亦庶幾不為懵然者豈不知外有君臣之義内有母子之情而平生知已如明公者待之又不為不厚豈不願及明時效尺寸以報君親酬知遇而直逡巡退縮以求守此東南之陂乎此其中必有甚不得已者惟明公幸察焉而聽其所欲使得竊祠官之祿以養其親而自放於荒閒寂寞之境以益求其所志庶乎動心忍性涵泳中和賴天之靈得遂變化其狂獧朴愚之質則異時明公未忍終棄猶欲熏沐而器使之其或可以奉令承教而不敢辭也明公亦宜自謀所以清化原革流弊者使乾剛不亢而君道下濟忠讜競勸而臣道上行則天地交泰上下志同而天下之士雖有囂囂然處畎畝而樂堯舜者猶將為明公出况如熹者又豈足道也哉伏惟明公勉焉則天下幸甚自餘加獲鼎食以慰具瞻熹不勝懇禱拳拳之至謹奉手啓以聞伏惟照察與汪尚書書自頃拆號日望登庸尚此滯留不省所謂海内有識之士蓋莫不為明公遲之而熹之愚獨有為明公喜者蓋以省闈之取舍觀之則疑明公於天下之義理尚有當講求者而喜其猶及此閒暇之時也自道學不明之久為士者狃於偷薄浮華之習而詐欺巧偽之姦作焉上之人知厭之矣兹欲遂變而復於古一以經行廸之則古道未勝而舊習之姦已紛然出於其間而不可制世之人本樂縱恣而憚繩檢於是乘其隙而力攻之以為古道不可復行因以遂其自恣茍簡之計俗固已薄為法者又從而薄之日甚一日歲深一歲而古道真若不可行矣譬之病人下寒而客熱熾於上治其寒則熱復大作俗工不求所以治寒之術遂以為真熱而妄以寒藥下之其不殺人也者幾希矣蘓氏貢舉之議正如此至其詆東州二先生為矯誕無實不可施諸政事之間則其悖理傷化抑又甚焉而省為盜用此文者兩人明公皆擢而寘之衆人之上是明公之意蓋不以其説為非也生於其心害於其政發於其政害於其事明公未為政於天下而天下之士已知明公之心争誦其書以求速化耳濡目染以陷溺其良心而不自知遂以偷薄浮華為真足尚而敢肆詆欺於昔之躬行君子者不為非也况於一旦坐廟堂之上而以宰相行之其害又當如何哉明公前者駮正張綱之謚深詆王氏之失識者韙之而今日之取舍乃如此死者有知得無為綱所笑不審明公亦嘗悔之否乎熹愚無知辱知奬甚厚往者亦嘗闗説及此而今畧驗矣故獨不敢以延拜之遲為恨而以猶得及此暇時講所未至為深喜明公若察其願忠之意而寛其忘分之誅則願深考聖賢所傳之正非孔子子思孟程之書不列於前晨夜覽觀窮其指趣而反諸身以求天理之所在既以自正其心而推之以正君心又推而見於言語政事之間以正天下之心則明公之功名德業且將與三代王佐比隆而近世所謂名相者其規模蓋不足道况蘇氏浮靡機變之術又其每下者哉熹忽被堂帖戒以官期本不欲行今乃得遂初心有書懇丞相求祠祿以供水菽之奉恐或怒其不來未易遽得即乞從容一言之賜早遂所求幸甚幸甚參政梁公之門初無灑掃之舊不敢以書請又恐疑於簡已也有劄子一通乞轉致之且及此意則又幸甚熹不敢復論時事蓋亦有不待論而白者明公尚勉之哉答汪尚書書徐倅轉致五月二十七日所賜教帖恭審比日暑雨潤溽台候起居萬福感慰之深伏䝉勸行尤荷眷念熹近拜手啓并申省狀自崇安附遞􅈤請祠祿不審已得徹台聽否熹孤賤無庸學不加進而戅愚日甚與世背馳自度不堪當世之用久矣往者猶意明公來歸必將有以上正君心下起頽俗庶幾或可效其尺寸以佐下風是以未敢決然遂為自屏之計而今也明公之歸亦既累月矣似又未有以大慰區區平昔之望則熹也尚復何望於他人而可輙渝素守以從彼之昏昏哉所以深不獲已而有前書之請非獨自為亦欲明公識察此意而圖其新耳今承誨飭之勤敢不深體至意然熹愚竊謂明公必欲引内其身不若聽用其言言行矣則其身之出也可以無所愧其不出也可以無所恨若言不用道不合顧踽踽然冐利祿而一來前有厚顔之愧後有駭機之禍熹雖至愚獨何樂乎此而必為之而明公亦何取乎熹而必致之也抑明公之教熹曰既到之後若有未安則在我矣兩得元履書亦以公言見告如此此則明公愛熹之深而所以為熹謀者反未盡也夫事之可否方雜乎㝠㝠之中而未知所决則姑為之以觀其後可也今此身之不可仕仕路之不見容已昭然矣尚何待於既至然後有所未安耶古之君子量而後入不入而後量今身在山林尚恐不能自主况市朝膠擾之域當世之大人君子至是而失其本心者踵相尋也若熹者又可保其不失耶故熹深有所不能無疑於明公之計惟前書之懇敢因是而復有請焉如䝉矜許固為大幸若其不遂則熹豈敢坐違朝命而不一行但老人年來多病既不敢勞動登途又不敢遠去膝下只此一事便自難處藉令單行至彼就職則便被拘縻不就則重遭指目就職之後遽去則又似無説不去則自違素心凡此曲折皆已思之爛熟其勢必至顛沛無可疑者伏惟明公以其所以見愛之心施之於此而為之謀則必有所處矣然熹亦非必欲祠祿若荒僻無士人處教官少公事處縣令之屬似亦可以藏拙養親但恐無見闕耳窮空已甚若有數月之闕即不可待又不若且作祠官之為便也復因徐倅便人拜啓區區底藴敢盡布之伏惟明公察焉進見未期伏乞進德脩業為主眷人千萬自重不宣謹啓答汪尚書書國史侍讀内翰尚書文台席去月十一日徐倅轉致台翰之賜即已具啓盡布腹心今當徹聽聞久矣今日得崇安遞中十八日所賜教帖伏讀再三仰認至意感服之餘得以竊聞比日暑中台候起居萬福又以為慰熹學不加進而迂戾日甚特以去違門墻之久明公不深知猶復以故意期之移書招徠詞㫖篤厚此見髙明好賢樂善之意有加於前而熹無以堪之徒自懼耳區區之懐所欲陳者所附徐倅書已索言之但不知向託元履致丞相書及申省狀等曾一一投之否度可否之報必已有所定然未知諸公所以必欲其來何謂也哉以為欲行其道則熹學未自信固無可行之道今日所處人得為之又非可行之官且諸公皆以耆德雋望服在大僚而紀綱日紊姦倖肆行未有能遏之者又非有可行之效也以為欲榮其身則使熹捐親而仕舍靈龜而觀朶頤隨行逐隊則有持祿之譏卬首信眉則有出位之戒是亦何榮之有哉凡此數者久已判然於胸中往時猶欲以明公卜之是以未敢決然為長往之計今明公還朝朞年諸事又且如此則熹亦豈待視一魏元履而為去就哉然聞元履數有論建最後者尢切至若一旦真以此去則有志之士雖欲不視之以為去就亦不可得矣蓋出處語黙固不必同然亦有不得不同者皆適於義而已熹累䝉敦譬固已不敢輙徇匹夫之守今只俟前日之報若已得請固為幸甚無所復言若猶未也而諸公果能協成元履之論使聖德日新讒佞屏遠逆耳利行之言日至於前而無所忤焉則熹失所望於前者猶或可以收之於後又何説之辭哉程張二先生固可仕而仕然亦未嘗不可止而止也熹則何敢議此特因來教而及之至於前日冐進瞽言明公不以為譴而欲與之上下其論且將推是而益省察焉明公進德不倦之意可謂盛矣然事變無窮幾㑹易失酬酢之間蓋有未及省察而謬以千里者是以君子貴明理也理明則異端不能惑流俗不能亂而德可久業可大矣若熹前日所請欲明公致一於孔孟程子之書者乃窮理之要不審高明果以為何如也近見吕申公家一二議論殊乖僻悖理不謂原明親炙有道而所見乃爾向見明公篤信之今亦覺其非否蓋天下無二道今兩是相持於胸中所以臨事多疑而當疑者反不察也所欲言者無窮薄暮欲遣書入遞不能盡懐伏惟益為此道千萬自重不宣陳丞相書熹昨以愚懇冐瀆威尊似聞鈞慈憐念未許遽就閑退區區感激何可具言實以鄙性惷愚觸事妄發竊觀近事深恐一旦不能自抑以取罪戾不肖之身非敢自愛誠懼仰負相公手書招徠之意重玷聽言待士之美則其為罪大矣伏况老親行年七十旁無兼侍尤不欲其至於如此旦夕憂煩幾廢寢食人子之心深所不遑是敢再瀝悃誠仰干大造欲乞檢㑹前狀特與陶鑄嶽廟一次俾得婆娑丘林母子相保遂其麋鹿之性實為莫大之幸情迫意切不知所言伏望鈞慈俯賜憐察答汪尚書書熹此月二日遞中領賜教即以尺書附遞拜答續又領章左藏寄來台翰又以數字附劉審計伸前日之懇不審今皆呈徹未也忽徐倅送示九日所賜手帖㳟審即日秋暑盛德有相台候起居萬福感慰不可言重䝉戒喻令熹審思出處之計茍合於義他不必問也熹雖至愚荷明公矜念之深教誨之切至於如此豈不願奉承一二少答知己之遇然區區之意已具前書更望留意反復則有以知熹之所處其度於義蓋已審矣但恐熹所謂義乃明公所謂不必問者而忽之耳然熹既已申省則今日亦須再得省劄而後敢行但至彼不過懇辭而歸他亦無以自效却慮一旦親見諸公之訑訑音聲顔色有不能平所發或至放過甚以自取戾則明公雖欲曲加庇䕶而不可得殆不若早為一言遂其所請之為愈也前書戒以勿視元履為去就熹固已畧言之矣夫朝有闕政宰執侍從臺諫熟視却立不能一言使小臣出位犯分顛沛至此已非聖朝之美事又不能優容奬勵顧使之逡巡而去以重失士心又不俟其自請而直譴出之則駭聽甚矣陳公之待天下之士乃如此明公又不少加調䕶而聽其所為則熹亦何恃而敢來哉蓋熹非敢視元履為去就乃視諸公所以待天下之士者而為進退耳願明公思之為熹謝陳公熹之坐違朝命已三月矣欲加之罪不患無辭既不早從所請則不若正其違傲之罪而謫斥之亦足以少振風聲使天下之士知守道循理之不可為而一於阿諛委靡之習以遂前日之非亦一事也不識明公其亦以為然乎頃年陳公在建安明公在蜀郡熹嘗獲侍言於陳公竊以為天下之事非兩公不能濟陳公蓋不辭也至於今日乃復自憂言事之不效往者則不可諫矣來者其亦尚可追乎伏惟明公深達陳公相與亟圖之熹之心蓋猶不能無拳拳也承諭旦夕即上告歸之請熹竊惑之蓋明公非不可去特萬里還朝主知人望如此其不薄也一旦未有以藉手而無故以去此古人所以有屑屑往來之譏也愚意却願明公審思以合於義毋使人失望焉則熹之願也陳公劄子一通乞賜傳達幸甚幸甚邈然未有拜侍之期伏惟順時之宜為國自重不宣與陳丞相書屢以愚懇冐瀆鈞聽未䝉矜許憂懼實深今日復得尚書汪公書戒以速行謹以愚見復之頗盡曲折竊恐相公未知區區之心試取而一觀之則知我罪我當有所決矣熹受知之深豈願如此亦惟有以深矚其不得已之故或遂改圖則不惟熹猶有望焉而天下實受其賜惟相公深圖之答劉平甫書領武昌五月下旬書知行李平安登覽雄勝甚慰所懐而安國諸詞更勤手筆讀之使人飄然直有凌雲之氣也比日新秋尚熱伏惟到荆已久侍奉萬福熹請祠久不報昨得元履書云相君怒甚恐不可得然三得汪尚書書已兩報之竭盡底藴次第亦須見怒矣或恐更有備禮文字來即當再入文字彊勉一到衢􅄔間聽朝命又不得請即煩一到靣懇諸公恐到彼終無好出場耳元履竟不容於朝雖所發未為中節然比之尸位素餐口含瓦石者不可同年語矣陳固無可觀汪亦碌碌知人之難乃如此此則拙者之誤一兄也聞到鄂已有所處置威望隱然甚善甚善到荆不知又别有何施行想規模素定不勞而政舉也邊候既未聳統帥之命當且中止似亦不必切切以為言熹向兩書為一兄言此知皆達否答張欽夫昨所惠吳才老諸書近方得暇一觀始謂不過淺陋無取未必能壊人心術如張子韶之甚今乃不然蓋其設意專以世俗猜狹怨懟之心窺聖人學者茍以其新竒而悦之其害亦有不勝言者道學不明無一事是當更無開眼處奈何奈何元履十六日已到家昨日遣書來未暇往見之然想其脱去樊籠快適當如何也諸公既不能克已從善使人有樂告之心又曲意彌縫恐有失士之誚用心如此亦已繆矣熹所與劄子謾錄呈足以見區區然勿視人幸甚晦庵集卷二十四欽定四庫全書晦庵集卷二十五宋朱子撰
