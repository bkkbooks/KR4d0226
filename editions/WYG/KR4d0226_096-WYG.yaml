  text: 九十六
  hash: sha256:6d86a0c6a72d64fabd8d144de36fdbf523041f35ee987bb6e17097b36d685bca
body:
  text: 宋朱子撰行狀少師觀文殿大學士致仕魏國公贈太師諡正獻陳公本貫興化軍莆田縣感徳鄉胡公里曽祖贈太師沂國公妣黄氏贈徐國夫人祖贈太師蜀國公妣李氏贈蜀國夫人父贈太師冀國公妣黄氏贈越國夫人卓氏贈冀國夫人公諱俊卿字應求其先世葢出潁川晉永嘉之亂太尉廣陵郡公準之孫西中郎將逵南遷泉江始為閩人其居莆田者歴唐五季而太尉十九世孫真二十二世孫嶠沆始班班見於碑碣然世逺不可得而詳矣公之家自沂公以來皆以好施周急聞於鄉里公生而莊重不妄言笑七八嵗自知為學冀公薨執喪如成人長益自刻厲紹興八年以鄉舉試禮部知舉朱公震張公致逺得其文讀之歎曰公輔器也將寘首選而同列有異議者乃屈居其次授左文林郎泉州觀察推官服勤職業不以科第自髙同寮宴集常謝不往一日郡中失火太守汪公藻走視之則諸掾屬方相從飲某所而公之輿卒亦或假之以行於是例以後至被詰責公亦唯唯權謝已而汪公廉知其實始召公慰諭且問其故公曰某已不能止同寮之行而又資其僕御亦安得為無過且是時公方盛怒某也其忍幸於自解而重人之罪乎汪公歎服以為不可及秩滿改宣義郎故事第二人再調即為館學清官是時秦丞相檜用事察公意不附己乃以為南外睦宗院教授終更造朝中塗心悸夜不得眠公曰吾他曰未嘗如此意者吾親其不康乎翌日馳歸則冀國夫人果以是日屬疾矣遭喪服除添差通判南劒州未行而檜死乃以秘書省校書郎召在館嵗餘非時未嘗一詣東西府時今天子方為普安郡王髙宗命宰相擇可輔導者宰相爭欲置其所善髙宗不可命擇館職端厚静重者為之乃以公對除著作佐郎兼普安郡王府教授尋遷著作郎在邸二年講説常傅經義以規戒言簡理精以王好鞠戲誦韓愈之言以諫王敬納之王左右親吏故多與諸府寮狎公獨正色出入未嘗私交一談歴司勲禮部員外郎樞宻院檢討諸房文字除監察御史始公嘗與國子監丞朱倬隣居朝夕往來及倬為言事官公一賀之遂不復往倬以是敬公既遷中司欲薦以為御史而先以告公力辭之後數月汪徹為殿中侍御史乃宻以公名進命下然後謝公曰恐公復辭不敢告也俄遷殿中侍御史首為上言人主以兼聴為美而存心必本於至公人臣以不欺為中而論事必達於大體反復推明引今附古詞指温厚而正直之氣凜然不可犯上固異之又論御下之道惟恩與威不可偏廢今主兵之官率無逺慮惟事驕侈其志不過聚斂以肥家其術不過交結以固寵其所以侵漁百姓刻剥軍士陵駕州縣輕侮朝廷者無所不至而任事者未嘗一誰何之則將不知有威矣養兵之費月計百萬而虚籍太半不可稽考軍士疲於私使困於回易大率以奉主將之私而所得衣糧隨手尅盡羸瘦單薄有可憐之色而主將恬不之恤則士不知有恩矣陛下誠有以抑將之驕而驚其惰作士之氣而收其心則紀綱正而號令行三軍之士孰不感戴上恩而效死以報國者哉上亦稱善再三公遂劾奏韓仲通本以獄事附秦檜寃䧟無辜今檜黨盡逐而仲通獨全何以懲惡劉寳總戎京口紀律不嚴裒歛特甚朝命分兵屯戍輒拒不遣亦不可不治於是二人皆抵罪公論快之宰相湯思退秉政無狀公論沸騰㑹冬無雲而雷公與同列共奏論之同列爭掎摭苛細公曰宰相上不當天心下不厭人望是固當罷何以它為乃獨奏言思退文藝有餘而器識淺暗不足以任天下之重詔罷思退以大學士奉外祠同列復議詣褫其職公曰事貴適中而已思退非有大罪特以不堪宰相而罷之則祖宗時免相恩禮米可殺也且思退雖不才然視沈該不有間乎今該猶以大學士家居而思退顧不得則執法之地所以議賞罰者偏矣遂不復論金人自燕徙汴謀遂舉兵中外震恐而楊存中久握兵柄尤以裒歛交結得幸士卒嗟怨三十一年春正月既望大雷雹已雨雪凝沍旬日不解公引春秋所書雷雪之變且言當時兩異相距八日其變有漸聖人猶謹而書之矧今一日並見其異甚矣葢雷雹陽也雨雪隂也雷而復雪是陽不能制隂隂桀得作出而為物害也以類推之是為外敵將陵中國臣下將竊威權之象所以應之恐非虚文常禮所能及也今敵勢駸駸葢已可見備禦之計未知所出而大將官保傅總兵戎殖貨財事交結奪民利壊軍政其力足以奔走死士其威足以杜塞衆口道塗仄目中外切齒久矣養之不已將有指大於股之患此最不可不深慮至於開言路用人望别能否正紀綱信號令廣惠澤亦所以應天消變之術而不可緩者惟陛下并留聖意因遂劾奏存中罪狀語益切天子為罷存中奪其兵公又言去冬無雲而雷今春已雷而雪間者日闇無光而淫雨不止前日又有地震之異變不虚生實應人事豈賢才有未用而賞罰有未當歟備禦有未脩而賦歛有未節歟近習有撓權而大臣無任責者歟左右阿諛者衆而忠讜之論不聞歟何嘉氣之不應也傳曰聴之不聰厥罰常寒願下求言之詔以審政事之闕而深詔大臣念咎引慝以答天戒又言部使者多不舉職請令自今臺諫論列一道嵗中四人以上臺司檢舉議罪以聞又言近世例以小廉曲謹文采醖藉取人而於識量深沈智畧慷慨之士未有以為意者所以名士盈庭而臨事嘗有乏才之歎謂宜廣收博采舎短録長用之繩墨之外責以事業之成勿拘小節勿課近効庶其有得以濟時用㑹詔以災異數見令臺諫侍從條上計䇿公言金人窺伺其意不測而兩淮之籓籬未固荆襄之聲援不接宜擇近臣有威望者盡䕶荆襄諸將之兵而假以它用隂遣間使往來江上宻問諸將計䇿或令各遣腹心赴堂禀議使諸大臣從容延問詰難往復以盡其情參酌去取以定其論庶幾緩急内外相應不失事機其它則選練犒賜以作士氣擇吏蠲賦以輯鄉兵修城築壘以嚴保障亦事之不可緩者而總其大要則在朝廷處置得宜有以服人心者而推其大本則又在陛下益堅睿㫁先定規模無以憂疑自為退沮而已又言命令之出不可不審内外之任不可不均又言今日之急在節財用而冗官妄費實為今日財用之大蠧且如添差總管鈐轄一郡或不下十數人月俸大者百萬小者不下五六十萬公使人從費又倍之其間又有連為數任而不替者有更歴數州而不已者宗戚生朝賜物尚依承平舊例外命婦亦請内命婦俸給有㫖罷勅局而或兩年不罷有㫖减吏員而三省宻院御史臺不減大禮浮費以巨億計樂工五百人教習百日食錢至二萬緡修輿服器㐲不過増飾而户工兩房兩部將作軍器兩監文思車輅兩院以至儀仗等庫官吏添給食錢日五六百者不知幾人自四月朔以至禮成為錢不知幾許大率一有興為無問大小稍有闗涉行遣文書一字以上無不支食錢者而一嵗之中無慮以十數凡若此類乞令後省取索立限裁損而陛下以身先之始自宫掖如寳元慶厯熈寜故事則邦用足民力寛而人心不患於不服矣又言諸州將兵例供私役教閱不時緩急不堪倚仗故今諸州往往有大軍留屯皆截上供以給其費宜詔有大軍處即令將兵通共教閱無大軍處即令旁近大軍分遣將吏就州教之勸以厚賞禁其私役異時習熟則所屯大軍漸可抽回以省截留之費是時金人侵軼之勢已形而江淮備禦之方未講大小惴惴莫敢發言公又力言宜蚤置統帥使擇間探逺斥堠謹烽火修城池以待其變而當是時莫有堪其選者中興舊臣唯張忠獻公獨無恙而方困於讒口謫居湖湘中外物情翕然屬之上心益以為疑不肯用也公乃上疏曰竊惟今日事勢可謂危且迫矣而竊聞之軍民士夫之論則皆曰張浚素懐忠義兼資文武且諳軍旅之事可當閫外之寄臣素不識浚竊亦聞其為人意廣才疎其初雖有勤王之節安蜀之功然䧟陜服散淮師其敗事亦不少特其許國之忠白首不渝今居謫籍杜門念咎未嘗不追悔前非老而練事殆非復前日浚矣今事勢危迫如此而在廷之臣又未有能過之者雖有射鉤斬袪之仇猶當置而不問況浚嘗為陛下腹心之臣初未嘗有此隙乎竊聞譖者言其隂有異志又以放棄之久疑沮益深若付以權恐漸難制臣請有以明其不然夫浚之所以得人心伏士論者為其有忠義之素心也若其有此則人將去之誰復與為變乎臣願陛下察其讒誣畧加辨白且與除一近郡以係人心庶幾緩急之際可以相及疏入未報因請對力言之上意乃悟首肯久之内侍張去為隂沮用兵之䇿且陳避敵之計公遂抗言去為竊㺯威權虧損聖徳今復沮撓成算請按軍法斬之以作士氣上愕然曰卿可謂仁者之勇矣明日除權兵部侍郎後數月竟用張公守建康如公䇿既而邊報益急王師始北渡江屯據要害而用兵之意猶未決也公言今守禦畧備士氣亦振以此待敵何慮不勝若得金人便發士卒蜂擁而來則中原塗炭之民與其交相怨叛之衆争欲起而圖之者何可勝數但以吾之重兵與之相持而别遣鋭師分出間道以𢷬其虚則敵之成禽必矣臣之所慮獨恐其知吾有備偽為甘言復以和議誤我耳然彼或出此而吾能益嚴備禦之計修築營壘大開屯田以為久駐之基俟其退歸境外然後姑與之和此則猶為中䇿但恐淺謀之士苟於目前更勸陛下受其甘言反以今日之計為非是而遂歛兵増幣墮其計中則為無䇿而大事去矣金兵尋果渡淮公受詔措置浙西水軍李寳因之遂有膠西之捷公因勸上進幸建康號令諸將指授方畧上然其計戒嚴未發而金軍自亂殺其主亮而歸詔公措置淮東堡寨屯田公行所過勞來安集流逋稍復舊業金人更立新酋遣使來申舊好朝廷方議酬答之宜而議者或謂得故疆者實利也正名分者虚名也朝著多附其説公聞之亟上奏曰陛下前日和戎之計葢非得已今此使來正審事機正名分之日也若以得故疆為實利則得之而未必能守是亦虚名而已豈若因此先正名分名分一正則雖未能即復中原遽謁陵廟然亦足以作頽墮之氣慰神靈之心矧今金人挫衂之餘急於自定汲汲求和情亦可見是豈能復以彊大之勢取必於我如前日之為哉當此機㑹臣以為非獨名分可正而嵗幣亦當可減惟在朝廷先定規模有以俟之則復中原謁陵廟亦不足以為難也公又以為和好果成尤不可以無備因陳選將練兵之䇿并圖上兩淮戍守屯田事宜所以為保江之計者甚悉又請戒諸將申嚴逃叛之法毋得互相招誘又請擇文臣有膽畧者以為諸將參佐使察軍政除宿弊因習戎務以儲將材又言淮北流民自相剽畧吏不能禁宜加區别撫其柔良而收其暴桀者畜之軍中䇿以紀律至於敵中形勢彼雖或能言之然皆務為可喜之言以冀投合不可輕信而吾之虚實險易彼皆得之則又不可以不為之防大抵但當益増屯兵多遣間諜以俟得其情狀之實然後乘其機㑹量力以應之耳今天子受禪公入對陳戒懇切且言今日之事固當以嚴守備練將卒戒貪暴省浮費信賞罰抑僥倖為急然此事也非事之本也清心寡欲屏逺便佞使姦聲亂色不留聰明淫詞詖行不接心術則庶乎用志專而見理明功業可就而邪正可分矣又言為國之要有三曰用人曰賞功曰罰罪而所以行之者一曰至公而已故古人善為國者賢不以讎而棄愚不以親而用賞不以逺而遺罰不以近而免葢不敢以一己之私廢天下之公也若以生殺予奪人莫予違而惟好惡喜怒之私是狥則不惟示天下以不廣而其偏黨反側之害於政事亦且無不至矣昔太祖皇帝坐太寜宫使闢重門而直視之曰此如我心少有邪曲人必見之此陛下家學也願留聖意以幸天下七月遷中書舎人尋以本職充江淮東西路宣撫判官兼權建康府事時上初即位慨然有復境土雪讎恥之志方屬張忠獻公以閫外之事顧在廷無可使佐之者以公忠義奮發而沈静有謀故有是命公力辭建康不允乃辟材吏通判府事分理民政而獨與張公協規并力大飭邉備是時蜀漢之兵北征秦隴雖頗畧定城邑而勝負久不决公為張公言請襲金以分其勢張公然之公因上奏曰吴璘孤軍深入而金人悉衆拒戰兩軍殺傷雖畧相當然久而不决則危道也兩淮戰士今雖且當固守然事勢已急豈可不為牽制之舉臣竊以為莫若分遣舟師出其不意直𢷬山東中原豪傑宜有應者則彼必還西師以自救而璘得乗勝以定闗中我又及其未至長驅深入潰其腹心不世之功可一旦而立也若其有備回颿轉柂信宿可還彼亦將如我何哉此不唯救急之計實因敵制勝之一竒不可失也奏入㑹朝廷有力主和議者已詔璘班師而公計遂不行識者恨之公又極論軍中虚籍冗占擺鋪營田差借之弊且請戒諸將毋得以回易資饋餉結權要十一月召入奏事既對遣中使面賜金帶㑹給從臣筆札條上時弊公陳十事一曰定規模二曰振紀綱三曰勵風俗四曰明賞罰五曰重名器六曰遵祖宗之法七曰杜邪枉之門八曰裁任子之恩九曰限改官之數十曰蠲無名之賦其杜邪枉之説曰比年以來左右近習稍有以名聞於外者士大夫奔走趨附將帥納賂買官逺近相傳道路以目願深察而痛懲之無使或為聖徳之累也隆興改元都督府建改參賛軍事力辭建康得免别除禮部侍郎領職張公初謀大舉北征公以為不若養威觀釁俟萬全而後動張公從之㑹諜報敵多聚糧邊邑諸將以為如此則其勢秋髙必來不可當不若先其未動舉兵擊之以破散其業張公又以為然乃請於朝而出師焉幕府次盱眙大將李顯忠邵宏淵連下虹縣靈壁遂將乘勝長驅公曰盛暑興師深入敵國皆兵家所忌宜亟還不然師老力疲遇敵恐不可用也張公然之亟以檄召顯忠班師則顯忠等已進破宿州而金大發河南之兵以來矣顯忠身出鏖戰城下殺傷過當㑹夜兩軍不相聞知各驚潰去而道路流言以為官軍失亡數萬敵且乗勝南來素主和議者又侈其説以摇衆心公從張公駐兵不動潰兵聞之稍稍來歸計其實所亡失數千人張公檄公亟入奏且勸上勿為浮議所摇公見上具道其事且曰勝負兵家常事願勿以小衂而沮大計上曰朕任魏公不改也張公抗章待罪公亦奏請從坐上不得已詔皆貶秩兩等湯思退復相公以嘗論思退請罷不許諫官尹穡隂附思退建議罷張公都督使復以宣撫使治揚州公上疏曰朝廷果以浚為不可用則罷之而更屬賢將可也若猶欲責其後効則貶官示罰亦古法也今乃使之去都督甚重之權居揚州必死之地凡所奏請臺諫又從而沮之如此則人情觀望無不解體浚方為敵餌之不暇尚何後効之圖哉且浚近畫兩淮備禦之計惟保險清野可挫敵鋒陛下既許之矣今議者之言乃如此雖浚即以家行有死無避然浚負天下重望一有蹉跌人情震駭臣恐江上之事將有不可測者議者但知惡浚而欲殺之乃不復為宗社計此陛下所宜自憂也願下詔書戒勅中外相與協濟使浚得以畢力自效贖其往愆如度其終不可用則請先治臣阿黨之罪而後改圖無使浚它日復誤使令而臣亦得不言之罪也疏上未報公又奏言陛下必以浚為不可復用則請速詔中外别求智勇可代浚者而拔用之不然則幸且勿加沮撓使得支吾畢此殘嵗詞益懇切上覽奏感悟即詔張公復開督府卒召相之然不數月竟為思退穡等所擠遣出視師遂不復返而公亦累章請罪明年五月乃除寳文閣待制知泉州復以自請提舉江州太平興國宫及思退貶死上乃思公言而太學生數百人伏闕下拜疏請起公詔復命知泉州未至召赴闕以乾道元年正月入對上撫勞再三公引歐陽脩司馬光之言極論朋黨之弊以為紹聖崇觀以來此説肆行實基靖康之亂近嵗宰相罷黜則其所用之人不問賢否一切屏棄此鈎黨之漸非國家之福也願詔大臣一以大公至正為心並用恩仇兼忘物我唯才是任毋恤其它則植壊羣散而人人得以自效矣又奏敵騎既退兩淮屯田似不可緩前此行之而不見效其失在於任人不久而責效太速且為今之計莫若擇二大將使以建康鎮江之軍分屯兩淮而就兼一路之帥使擇軍中禆將各以所領分屯沿邉諸州而就兼一州之守境内財賦得自用以為屋廬耕牧之費或募新軍或取舊人之不入隊者授田使耕不盡其利則人争趨之遲以數年而成效可睹矣又勸上察羣情之所甚欲者行之所甚惡者去之捐其所甚愛謹其所可戒審真偽辨忠邪從諫任賢以格天心以作士氣庶幾外敵畏威不敢侵侮除吏部侍郎尋兼侍讀同修國史嘗言本朝之治惟仁宗為最盛願陛下治心脩身之道專以仁宗為法而立政任人之際必稽成憲而行則慶厯嘉祐之治不難致也又言今日積弊千條萬端朝廷非不知之而不能革者葢大臣受任不専用事不久不能以一身當衆怨而風俗頽弊人各有心上所建立有不便於己者則興訛造訕百計傾摇必罷之而後已願詔大臣力任此責合羣議而討論之力行堅守必冀有成則風俗變而紀綱立矣又言人才者國家之命脈也而論人才者又當以氣節為主祖宗盛時作成涵養名公巨人傑立角出争以氣節相髙頃自蔡京秦檜用事以來摧喪既畧盡矣太上更化之初力捄其弊而士狃見聞未能盡革臣願陛下深以為念氣節之士雖有小過猶當容之佞邪之人雖甚有才猶當察之庶幾有以作新人才興起頽弊於是上顧公甚厚葢有意於大用矣㑹錢端禮起戚里秉政駸駸入相館閣之士相與上疏斥之皆為端禮所逐工部侍郎王弗隂附端禮建為國是之説以助其勢公抗疏力詆其非且為上言本朝無以戚屬為宰相者今若此懼不可為子孫法上以為然端禮聞之宻遣門下士語公曰聞兩宫皆許相已即相當引公共政公不答退而終日不樂謂所親曰此言奚為至於我哉翌日進讀寳訓適及外戚事公又極言本朝家法外戚不預政最有深意陛下所宜謹守無使天下後世有以此議聖徳者上首肯久之端禮之客亟馳報之端禮由是深忌公諷使求去除寳文閣直學士知漳州改建寜府中書舎人閻安中封還詞頭力請留公命復下安中不能力争然亦竟得罪以去而端禮卒不相時右正言龔茂良方以排擊近習黜守建而未上公言茂良前以言事補郡且臣故交今往奪之於義有不安者不得請乃之官在郡期年治以寛簡省節厨傳官無浮費然人服其清亦莫之毁也三年執政請徙公帥江東上稱公鯁亮俾召赴闕既至入對上諭公曰卿前去國葢有譛卿者卿今日無一語自辨朕益服卿厚徳也乃授吏部尚書入謝之日奏曰銓綜事有成法臣固當謹守第愚淺之見或有不及願陛下時警勅之葢君臣之分雖嚴而情不可以不通上曰卿言是也朕或有過卿亦當盡言公曰唐太宗唯能導人使諌所以致貞觀之治今陛下導臣使諫臣敢不奉詔上曰朕每讀太宗事未嘗不慕之觀徳宗之忌刻不樂受言亦未嘗不鄙之也公對曰聖言及此天下幸甚遂從容為上言今日人材衰少士氣不振若必求全責備而後用之則遺賢多矣要當君臣一意公聴並觀畧人細過而取其大節去己私意而循夫至公則人材彬彬出為時用矣又言為政而不行甚者必改而更化此先儒之格言也然臣竊以為一時之敝政可更而祖宗之成法不可改也就所當更亦必計之審議之熟然後可更既已更之則當守之不變而不可以屡更也又言州縣之間號為能吏者往往務為急刻専以趣辦財賦為功而視撫字聴㫁為不急其間又有聚斂以為羡餘之獻者增市征則害商賈督逋賦則病農民甚或侵移常賦貽患後人朝廷不察反謂有才願有以深戒戢之則天下之幸也時上猶未能屏鞠戲又將遊獵白石公上疏力諫至引漢桓靈唐敬穆及司馬相如之言以為戒後數日入對上迎謂公曰前日之奏備見忠讜朕決意用卿矣公再拜謝上曰朕在藩邸已知卿為忠臣矣十二月受詔館北使遂拜同知樞宻院事兼參知政事首薦陳良翰林栗劉朔等五人恬退有守可為侍從臺諫之儲時龍大淵曾覿以舊恩竊寵士大夫頗出其門言事者語或及之往往獲罪及公館客大淵為副公見外未嘗與交一言大淵造門納謁亦謝不見至是中書舎人洪邁來見語公曰人言鄭聞當除右史某當除某官信乎公曰不知也公獨何自得之邁以淵覿告公明日至漏舍語諸公曰外議久指此兩人漏洩省中語而未嘗得其實狀故前此言者雖多而不能入今幸得此不可以不聞諸公皆以為然入奏事畢公乃獨進具以邁語質於上前曰臣不知平日此等除目兩人實與聞乎抑其宻伺聖意而播之於外以竊㺯陛下威福之權也上曰朕何嘗謀及此輩必竊聴而得之卿言甚忠當為卿逐之公再拜謝退未及門已有㫖出二人於外矣中外快之至或舉酒相賀云一日出省還第有飲馬道周而不避者公問為誰曰戚里某官也公遣直省吏白二相此輕侮朝廷不可不治即使詰之且具以聞上怒曰朕在藩邸時出逢相車未嘗不避此輩乃敢爾耶明日以白髙宗下臨安府捕繫其從者重坐之知樞宻院事虞允文入謝徳夀宫髙宗語之曰卿與陳俊卿同在樞府俊卿極方正非如它人面從而退有後言也公以兩淮藩籬未固言於上曰備邊經久之計不過屯田積粟増陴濬隍訓卒練兵以為不可犯之基而已然今日任人之弊大抵太拘而邊郡為尤病謂宜廣求人才勿間文武使陳所見與定規模悉如太祖皇帝所以遇李漢超馬仁瑀輩者分之以兵使自為守饒之以財使自為用仍語臺諫畧其細過使倜儻之人得以行其志而自效諸使唯鹽司為不可廢自餘皆可且罷而間遣使循行諸郡按閲稽考以行賞罰數年之後守備必固敵人知之自不敢犯萬一有之亦可責諸將以必守而無異時望風奔潰之虞矣荆襄諸郡亦宜放此大率不過得十數材力任事之人便可集事唯陛下留意圖之金使來庭公以故事押宴使者致私覿其狀花書而不名公使却之掌儀懼白公恐生事公使語之曰今日豈當用辛巳前故事耶使者詞屈乃問公爵里甚悉而易狀書名以遣曰特為陳公屈耳自是遂為例云金又移書邊吏取前所俘畧人上顧輔臣議所以應之者公曰此不可以力争而可以理勝彼方淫侈安有逺謀設欲用兵亦不必假此為詞今當且如常時泛然報云已下諸處根刷俟至三四然後報以諸處所申皆無其人或是軍前一時殺戮或是後來節次死亡且誓書之文俘畧叛亡自是兩事俘畧發過已多叛亡自不應遣且如本朝兩淮之民昨來上朝兩次俘畧亡慮數萬本朝未嘗以為言者誠恐破壊和議使兩國邊境之民皆不得安也如其不聴或至交兵則曲直之勢勝負有所在矣從臣有怯懦争言不可不予者議久未决公復上奏曰敵知此輩皆在軍中故遣官臨境揭牓招諭欲以摇我人心冀或有變而以兵乗其隙此計深矣今留不遣彼必藉此以起兵端然臣竊料彼無信義専恃暴彊盡發亦來不發亦來初不以吾之從違為作輟也但發之則吾國中先自紛紛而彼乗其弊其禍甚速不發則其侵軼尚在一二年後吾但堅壁勿戰絶其糧道彼亦安能持久况兵之勝負亦有天理今我直彼曲安能逆知其必不能勝而遽為此怱怱乎沈介守上饒以上供負課罷郡鐫秩公争以為不可鎮江軍帥戚方刻剥役使軍士嗟怨言者及之公奏外議内臣中有主方者上曰朕亦聞之方罪固不可貸亦當并治左右素主方者以警其餘即詔罷方而以内侍陳瑶李宗回付大理究其賄狀又諭輔臣以建康劉源亦嘗有賂於近習方思有以易之今欲且遣王抃至彼檢察姦弊留數月而後歸庶幾新帥之來不至循習公奏曰今但遴選主將則宿弊當自革矣上曰政患未得其人耳公曰苟未得人更宜精擇既已委之則當信任今未得其人而已先疑之似非朝廷所以待將帥之體况軍中積弊不在乎它特患交結之風未革所以有裒尅自營之事今陛下既赫然罪其尤者而又并及譽阿之人中外之情莫不震懾何事於此而後可以除宿弊乎且軍中財賦所以激勸將士但主帥不以自私則其它當一切聴之今檢柅苛細動有拘礙則誰復敢出意繩墨之外為國家立大事乎况朝廷所以待將帥者如此使有氣節者為之心先不服其勢必將復得姦猾之徒則其巧思百出敝隨日滋又安得而盡防耶今不慮此而欲獨任一介單車之使以察之政使得人猶失體而無益况不得人則其弊又將不在將帥而在此人矣上納公言罷抃不遣金使來賀㑹慶節上夀在郊禮散齋之内不當用樂公請令館伴以禮諭之而議者慮其生事多請權用樂者公又奏請必不得已則上夀之日設樂而宣㫖罷之及宴使客然後復用庶幾事天之誠得以自盡而所以禮使人者亦不為薄彼自當悦服矣上可公奏且曰宴殿雖進御酒亦毋用樂惟於使人乃用之耳諸公顧以為紫宸上夀乃使客之禮固執前議公又不可獨奏言曰適奉詔㫖有以見聖學髙明過古帝王逺甚臣敢不奉詔然猶竊謂更當先令館伴以初議喻使人再三不從乃用今詔則於禮為盡而彼亦無詞不可遽鄙夷之而遂自為失禮以狥之也蔣芾猶守前説公争愈力上顧公曰可即諭閤門行之公退復為奏曰彼初未嘗必欲用樂我乃望風希意而自欲用之彼必笑我以敵國之臣而虧事天之禮它時輕侮何所不至此尤不可不留聖慮上嘉納焉既而上以當郊有雷震之異内出手詔戒飭大臣宰相葉顒魏杞坐免公亦俟罪不獲命越數日遂除參知政事公辭謝不得已就職言於上曰執政之臣惟當為陛下進賢退不肖使百官各任其職至於細務宜歸有司者自此當日有以省之庶幾中書之務稍清而臣等得以悉力於其當務之急上甚然之一日審察吏部所注知縣有老不任事者公判令吏部改注吏曰例當奏知公曰此豈足以勞聖聴明日取㫖自今此等請勿以聞上可其奏時有以四明銀礦獻者上命守臣詢究且將召冶工即禁中鍛之公奏曰陛下留神庶務克勤小物至於如此天下幸甚然不務帝王之大而屑屑乎有司之細臣恐有識者有以窺陛下也况彼懼其言之不副則其鑿山愈深役民愈衆而百姓將有受其害者又豈可以不慮乎夫天地之産其出無窮若愛惜撙節常如今日則數年之後自當沛然但願民安嵗稔國家所少者豈財之謂哉請直以其事付之明州使收其嬴餘以佐國用則亦不至於甚擾民矣從臣梁克家莫濟俱求外補公奏二人皆賢其去可惜葢近列中有以騰口交鬬致二人之不安者於是遂與同列劾奏洪邁姦險讒佞不宜在人主左右罷斥之七月宰相蔣芾以憂去公遂獨持政枋尋兼知樞宻院事即言於上曰臣自叨執政之列每見三省察院被内降指揮茍有愚見必皆宻奏多蒙開納為之中止然比及如此已為後時今以參預首員奉行政令欲乞自今内降恩澤有未允公議者容臣卷藏不示同列即時繳奏或次日面納上曰卿能如是朕復何憂每勸上親忠直納諫諍抑僥倖肅紀綱講明軍政寛䘏民力用人之際隨才任使未嘗求備異時統兵官不見執政無以别其能否公日召三數人從容與語察其材智所堪而宻記之以備選用減福建鈔鹽嵗額罷江西和糴廣西折米鹽錢且蠲諸道累嵗逋負金榖錢帛以巨億計當是時上於公言多所聴用大抵政事頗歸中書矣既而龍大淵死上憐曾覿欲召之公曰自陛下出此兩人中外無不稱頌聖徳今若復召必大失天下望臣請得先罷去上納公言遂止不召殿前指揮使王琪被㫖按視兩淮城壁還薦和州教授劉甄夫上命召之公與同列請其所自上曰王琪稱其有才公曰琪薦兵將官乃其職教官有才何預其事上曰卿等可召問之公退召琪責之琪惶恐不知所對㑹揚州奏昨琪傳㫖増築州城今已訖事公請於上則初未嘗有是命也公曰若爾即琪為詐傳聖㫖此非小利害也容臣等熟議以聞退至殿廬遣吏召琪詰之琪叩頭汗下公亟草奏言曰王琪妄傳聖訓移檄邊臣増修城壁此事係國家大利害朝廷大紀綱而陛下之大號令也人主機務至繁天下情偽百出豈智力所能一一防閑所恃紀綱號令賞罰耳今琪所犯如此考其案牘及所置對前後牴牾姦偽明審此而可許則亦何所不可為也哉臣等不勝大懼謹按律文詐為制書者絞惟陛下奮發英㫁早賜處分於是有㫖削琪官而罷之先是禁中宻㫖直下諸軍者朝廷多不與聞有禁官張方者以某事發覺公方與同列奏請自今百司承受御筆處分事宜並須申朝廷奏審方得施行未報至是因琪事復以為言上乃悦而從之事下兩日則又有㫖收還前命公語同列曰反汗如此必闗牒至内諸司有不樂者相與為之耳即具奏曰三省宻院所以行陛下詔命也百司庶府所以行朝廷號令也詔命必出於陛下號令必由於朝廷所以謹出納而杜姦欺也祖宗成憲著在令甲比年以來漸至墮紊臣等昨以張方之事輒有奏陳及此踰月又因王琪姦妄之故陛下赫然震怒然後降出聖慮亦已審矣聖㫁亦已明矣中外傳聞莫不歎服而昨日陛下諭臣等曰禁中欲取一飲一食必待申審豈不留滯而今又有此指揮夫臣等所慮者命令之大如令三衙發兵則宻院不可不知令户部取財則三省不可不知耳豈為此宫禁細微之事哉况朝廷乃陛下之朝廷臣等偶得備數其間出内陛下命令耳凡事奏審乃欲取决於陛下臣等非敢欲専之也況此特申嚴舊制亦非創立新條而已行復收中外惶惑且將因循觀望并舊法而廢之為後日無窮之害則臣等之罪大矣或恐小人因此疑似隂以為言上激雷霆之怒更望聖明深賜體察翌日面奏上色甚温顧謂公曰朕豈以小人之言而疑卿等耶同知樞宻院事劉珙進對語切遂忤上意既退御筆除珙端明殿學士在外宫觀公即藏去宻具奏言前日奏劄臣實草定珙與王炎畧更一兩字即以投進以為有罪則臣當先罷若幸寛之則珙之除命臣未敢奉詔也明日復申前説且曰陛下即位以來容納諫諍體貎大臣皆盛徳事今珙乃以小事忤㫖而獲罪如此臣恐自此大臣皆以阿諛順㫖為持禄固位之計非國之福也上色悔久之公又言珙正直有才畧肯任怨臣所不及願且留之上曰業已行之不欲改也公曰珙無罪而去當與大藩以全進退之禮上然之乃以珙為江西帥公退又自劾草奏抵突被命稽留之罪上手札留之公請不已上曰卿必欲去朕當勉從然亦且在四明或平江一兩月復來可也公以平江繁劇辭上使自擇兩浙近地公因以四明為請上乃許之公退即家居俟命而翌日上更遣中使召公入奏事迎謂之曰朕昨思之卿不可去且諫官陳良祐亦奏留卿是非獨朕所不可公議亦不以為可也卿其免為朕留公請益堅上曰卿雖百請朕必不從也公退復上疏上親書其後曰卿之忠實朕素簡知而辭位無名屢留愈慤公論所協宜勿再陳公遂不敢復請越數日上喻且相公公懇避再三上竟不許遂以乾道四年十月制授尚書右僕射同中書門下平章事兼樞宻使公為相以用人為己任所除吏皆一時選尤抑奔競奬廉退或才可用而資歴尚淺即宻薦於上退未嘗以語人有忽被召對改秩除用而不知所自者每接朝士及牧守來自逺方者必問以時政得失人才賢否見給舎必勉之曰朝廷政令安得每事盡善主上從諫如流公等意有未安勿憚舉職朝廷唯是之從初不以為忤也又以兩淮備禦未設民無固志萬一㓂至倉卒渡兵恐不及事奏於揚州和州各屯三萬人預為定計仍籍民家三丁者取其一以為義兵授之弓弩教以戰陳農隙之日給以兩月之食聚而教之沿江諸郡亦用其法諸將渡江則使之城守以備緩急且以隂制州兵頡頏之患其兩淮諸郡守臣但當擇才不當復論文武計資歴捐以財賦許辟官吏略其小過責其成功要使大兵屯要害必争之地待敵至而决戰使民兵各守其城相為犄角以壯聲勢而又言於上曰國家養兵甚費募兵甚難惟有此䇿可保邊面可壯軍勢而樂因循憚改作之人皆以擾民為詞天下之事欲成其大安能無小擾但守臣得人公心體國不憚勞苦善加拊循則教習有方自不至大擾矣上意亦以為然詔即行之然竟為衆論所持公尋亦去位不能及其成也邊民侍旺擁衆來歸北帥移文取索公以為但可説諭令其北歸不可捕遣以快彼意上意猶欲粗遣百十以塞其意公曰粗遣一二已失其心使懐憤怨而敵知其然求索必不遽己竊料兵端必起於此是始欲兩全而終不免於兩失之也此事本末曲雖在我然彼亦豈得為直若且悠悠勿遣彼必虞我有備未敢遽動萬一不免用兵却可全山東歸正之心士氣自倍矣於是卒從公計一日御札依祖宗舊制復置武臣提刑公言此職自景徳以來置復不常今用文臣一員亦無闕事員外添置徒為煩費無益也乃止時虞允文宣撫四川公薦其才堪宰相上即召允文為樞宻使至是拜公左相遂以允文為右相乾道五年八月也允文既相建議遣使金國以陵寢為請公既面陳以為未可復手疏曰陵寢幽隔誠臣子之痛憤然在今日彼方以本朝意在用兵多方為備若更為此以速之彼或先動則吾之事力未辦不知何以待之况使者既行中外疑惑果得所請猶為有名茍或未從殊失國體且天下之人亦以為陛下舎其大而圖其細也若欲必遣則俟侍旺事定或因遣使賀正令王抃偕行先與彼之館伴者議之或令因見金主面陳此意彼若許遣則有必從之理若其不許則願陛下深謀逺慮舎其小而圖其大它時恢復故疆陵寢固在度内今日為之則是慕虚名而受實害臣竊為陛下危之上感公言事得少緩既而上御弧矢有弦激之虞公以不能先事陳戒深自克責宻疏言曰陛下經月不御外朝口語籍籍由臣輔相無狀不能先事開陳以致驚動聖躬虧損盛徳非細事也前日已嘗面奏俟罪聖體未寜未敢復請然區區之愚不敢不先言之冀或有以感寤宸衷則臣歸死司敗無復憾矣臣聞自昔人主處富貴崇髙之極志得意滿道不足以制欲則游畋聲色車服宫室不能無所偏溺而不得為全徳之君陛下憂勤恭儉清浄寡欲凡前世英主所不能免者一切屏絶顧於騎射之末猶有未能忘者臣知陛下非有所樂乎此也葢神武之畧志圖恢復故俯而從事於此以閲武備以激士氣耳然誠如此臣亦竊以為過矣夫弧矢之利雖聖人所以威天下然本非帝王所當親御也一劒之任吴起且羞為之而况萬乘之主乎趙王好劒而莊周説以天子之劒楚王好弋而莊辛説以王霸之弋陛下既有志於武功誠能任智謀之士以為腹心仗武猛之材以為爪牙明賞罰以鼔士卒恢信義以懐歸附則英聲義烈不出尊俎之間而敵人固已逡巡震疉於千萬里之逺矣尚何待區區馳射於百步之間哉太祖皇帝深郤手撾之獻葢有見於此矣又况陛下承祖宗積累之休膺太上皇付託之重一身之動静宗社生靈之休戚繫焉可不自重以為天下無窮之計乎今者之事尚賴天地祖宗宻垂覆佑即獲痊愈使其萬一有甚於此則貽太上之憂念駭四方之觀聴雖誅左右執射之人亦何益乎故臣願陛下常以今日之事永為後來之戒不惟志之聖心而又書之盤盂銘之几杖不使須臾忘之則天下幸甚且古之命大臣者使之朝夕納誨以輔徳繩愆糾繆以格非欲其有以正君之過於未形而不使著見於外也唐太宗臂鷹將獵見魏徵而遽止憲宗蓬萊之遊憚李絳而不行此其效也臣人微望輕無二子骨鯁强諫之節致陛下過舉彰聞於外今誅將及身而後乃言亦何補於既往之咎哉雖然懲羮者必吹於虀傷桃者或戒於李弓矢之技人所常習而易精然猶不免今日之患況毬鞠之戯本無益於用武而激射之虞銜橜之變又有甚於弓矢者乎間者陛下頗亦好之臣屡獻言未蒙省録今兹之失乃天之仁愛陛下示以警懼使因其小而戒其大誠宗社無疆之福也陛下誠以弦㫁之變思之則向之盛氣馳騁於奔踶擊逐之間無所蹉跌葢亦幸矣豈不為之寒心哉太祖皇帝嘗以墜馬之故而罷獵又以乘醉之誤而戒飲遷善改過不俟旋踵此子孫帝王萬世之大訓也臣願陛下克已厲行一以太祖為法罷毬鞠之㑹屏騎射之習謹威儀之節玩經典之訓則盛徳輝光將日新於天下而前日之過何傷日月之明哉既而曽覿官滿當代公度其必將復入預請以浙東總管處之上曰覿意似不欲為此官公曰前此陛下去此兩人中外無不歎仰盛徳今外間往往竊議以謂覿必復來願陛下且捐私恩以伸公議上稱善久之已而又以墨詔進覿官公復持不可曰必爾亦當有名㑹當賀金國正旦乃請以覿為副還奏因以例遷其官而竟申浙東之命覿猶遲徊不去公戒閤門趣覿即日朝辭覿怏怏而去樞宻承㫖張説欲為親戚求官憚公不敢言㑹公在告請於右相得之公聞勅已出詰吏留之説惶恐詣公謝右相亦愧甚然猶為之請公卒不與説以是亦深怨公永陽郡王居廣欲為其客求嶽祠先使人伺公意公曰它官則不可嶽祠無傷也然居廣憚公嚴正卒不敢啟口吏部尚書汪應辰舉李垕應制科有㫖召試權中書舎人林機言垕詞業未經後省平奏且獨試非故事公奏元祐中謝悰亦獨試機葢為人所使耳上喻公詰之乃機與諫官施元之宻謀以是沮應辰而對上又不以實公因極論其姦遂詔暴二人朋比交通之狀而罷之中外稱快然應辰竟以與右相議事不合求去公奏應辰剛毅正直士望所屬當有以留其行者因遂數薦應辰可以執政上初然之而後竟出應辰守平江自是上意益向允文而公亦數求去矣明年允文復申前議一日上以手札諭公曰朕痛念祖宗陵寢不能展謁者四十餘年今欲遣使往請卿意以為如何公奏曰陛下焦勞萬機日不暇給痛念陵寢思復故疆臣雖疲駑豈不知激昂憤切仰賛聖謨庶雪國耻然性質頑滯於國家大事每欲計其萬全不敢輕為嘗試之舉是以前者留班面奏欲俟一二年間彼之疑心稍息吾之事力稍充乃可遣使往返之間又一二年彼必怒而以兵臨我然後徐起而應之以逸待勞此古人所謂應兵其勝十可六七兹又仰承聖問臣之所見不過如此不敢改詞以迎合意指不敢依違以規免罪戾不敢僥倖以上誤國事惟陛下察之繼即杜門上疏以必去為請三上乃許遂以觀文殿大學士知福州兼福建路安撫使陛辭猶勸上逺佞親賢修政事以靖兵革泛使未宜輕遣然公既去允文遂遣使竟不獲其要領而曾覿亦召還遂建節旄歴使相以躋保傅而士大夫莫有敢言者矣公至福州政尚寛厚而嚴於治盜明年定海水賊倪郎侵軼閩廣海道騷然公召統領官鄭慶授以方畧慶頗逗留以風為解公植旗於庭視其所鄉慶知公不可欺晝夜窮追遂悉擒捕海道以清上嘉其功特遷銀青光禄大夫力辭不許始公任政建言選人嶽廟無事得禄又理考任陞改此太僥倖且非祖宗舊法奏請革之人以為當而權貴多不悦扇為浮論游説萬方公持之不變衆亦自定畧計一嵗可省冒濫改官者三十員至是不悦者幸公去卒奏改之公猶抗疏辨理然事已行不及止也簽書節度判官事尚大伸以事忤提㸃刑獄鄭興裔興裔廉得其罪以語公公即以屬吏驗問未竟憲屬張位擅呼獄吏喻以意㫖公劾奏位并大伸罷黜之興裔勢大沮惶恐託它事出按旁郡以避公轉運判官陳峴建議改行鈔鹽法公移書宰執曰福建鹽法與淮浙不同葢淮浙之鹽行八九路八十餘州地廣數千里食之者衆取之者多百貨可通故其利甚博福建八州下四州瀕海已為出鹽之鄉惟汀邵劔建四州可售而地狹人貧土無重貨非可以他路比也且四州每嵗舊額當運鹽千三百萬觔而實運僅及九百餘萬葢食鹽之民有限其勢不可以復増也然漕司以比嵗得三十餘萬緡而四州二十餘縣供給上下百費皆取於此二三十年以來州縣稍無科擾百姓亦各安便此則官自鬻鹽亦不為不利矣今欲改行鈔法比於它路且於額外更責以増鬻取嬴而又隂奪州縣嵗計以充其數此不可之大者也而或謂官鹽不行由私販之不禁今若稍嚴必倍其利此知其一而不知其二者福建民貧上四州猶甚性復强悍輕生喜亂農桑之外多利私販百十為羣操持兵仗官不能禁託名魚鱐量收税錢而已貧民既有此路可以自給則不至輕於為非官司又得此錢亦足少助經費今欲改行鈔法已奪州縣嵗計又欲嚴禁私販必虧税務常額而貧民無業又將起而為盜夫州縣闕用則必横歛農民税務既虧則必重征商旅盜賊既起則未知所増三十萬緡之入其足以償調兵之費否也將來官鈔或滯不行則必科下州縣州縣無䇿必至抑配民户本以利民而反擾之此恐皆非變法之本意也欲望朝廷更下有司熟議或令建議之人一以身任責必有以見其决然可行者然後行之則庶乎其不悮也當時諸公不能用然鈔法果不行又明年力請閑遂以提舉臨安府洞霄宫歸第敝屋數楹湫隘特甚怡然不以屑意淳熈二年再命知福州辭不得請乃行民習其政不勞而治始至帑藏空竭公節省浮費用亦不乏㑹有㫖盡發本路海船及揀中禁軍土軍公奏曰陛下厲精為治約已利民於軍湏之用亦無取之民者獨於海舟尚藉民力葢不獲已然自頃邉事既息率三分調一以備守禦非有緩急不盡發也此意亦已厚矣今乃但以教閱之故而使三番併發彼不當番者既已逺出豈能遽歸則必徒使其家有追逮係累之擾至於柂師水手其技素習初不待教但其平日類皆轉移執事今固不容拘以名籍則又安知今日所教必為異時所用之人哉何補於事而煩擾如此且去嵗朝廷疑州郡有所隠漏遣黄飛英㸃集拘留年半始得放散商賈固已失業今而併發寜不重困畧計本路所發五百七十艘用柂師水手萬四千人留屯五月犒設借請朝廷費經總制錢六十餘萬緡米六七萬餘石衣装器甲與夫州縣之費又不在是推此一路以觀兩浙則其費又當倍之矣又况民力不可不惜大衆不可輕動無事而發玩習為常一旦有急或反誤事曷若盡以教閱付之州縣或令且發一番當亦未至闕事而船户既蒙優恤異時或有緩急雖赴湯蹈火亦不避矣其揀中禁軍已行起發但本路帶山瀕海民俗獷悍私販㓂盜所在有之全賴土軍控制之力向來戚世朋銜命揀選但欲數多未嘗精擇福州十二寨合千九百人而揀中者已千七百餘人所餘逐寨不過十人今若將揀中人盡行起發則州縣表裏空虚姦民得計其害有不可勝言者欲乞許留其半以備緩急詔皆施行如章公又嘗奏本路上四州軍及江西湖北諸郡豪猾之民多由衣食不充相結為盜盤據險阻官軍多不能制近者茶寇雖平其類尚多有之與其縱使為盜不若籠以為兵謂宜専委逐路帥憲選閒居官員有方畧者及土豪有信義者毋拘以文使風喻此曹令各以其技自獻官為格試收而籍之或刺其手置寨教閱厚其衣糧拔其尤異補轉資級因事立功更加優賞或有小寇責之收捕决可討平異時或欲起發亦必感奮為用此銷盜賊嚴武備固根本之一策也既而州境大旱失火延燒且有星隕地震之異公悉以其事上聞且曰一夕之間變異兩見臣愚不學莫原休咎之端惟劇震恐竊計陛下必欲聞之不敢不奏上感其言適州校有部綱至在所者上忽召入問公治行甚悉即降親札撫勞賜以帶笏香藥甚厚三年太上皇帝聖夀七十頒慶宇内公以紹興從官特轉金紫光禄大夫四年復累章告歸上欲許之而難其代為遲回累日乃除特進提舉洞霄宫五年五月起判隆興府未視事改判建康府江南東路安撫使兼行宫留守且詔赴闕奏事既至都人聚觀無不咨嗟喜公之將復用也入對垂拱殿上為改容加敬命坐賜茶宣問欵至公因從容言曰擇將多由公選臣聞諸將多以賄賂交結而得之如此大壊軍政上曰大將交結恐或因仍如統領官以下皆朕親選前日鄭鑑亦有是説朕再三諭以無是事矣鑑公壻也故上語及之公即奏曰臣在逺亦聞鑑以小臣輙論朝廷事陛下和顔聴納中外莫不仰服聖明從諫之美然諸將交結之弊則陛下不可以不察葢主兵者得之不以材能而以貨賂則其下不服必致誤事上曰誠然公又奏曰陛下選用人材當辨邪正然又必由朝廷乃合公論如聞曽覿王抃招權納賂薦進人材而皆以中批行之外間口語籍籍恩盡歸於此輩謗獨萃於陛下此非宗社之福也上曰小小差遣或勉循之至於近上差除此輩豈敢干預公曰此輩未必敢於陛下之前明有論薦或恐探知聖意而傳報於外耳大抵禁中事外間無不聞皆此曹所為大非美事願嚴加戒約上亦然之公又奏曰比來出令多不審隨即變更祖宗故事固不能守而陛下初政力去弊事可以為後世法者今亦不能守矣上問何事公曰如未銓試不得注官未歴任不許堂除之類今皆以内降放行矣上曰此誠一時不思之過公又奏曰贓吏最可惡比亦有已經勘結而直降内批改正者如此天下何所懲勸上曰恐無此事公曰臣知其人但事已往不欲斥其姓名耳此皆左右害政之大者陛下不可不毎事加察防其微漸上曰卿言甚當朕若知之决不容也既退上遣中使賜金器犀帶香茶明日朝辭上曰卿逺來得相見氣貎不減往時今年幾何矣公對曰犬馬之齒六十有六矣上曰極清健可喜也公因奏曰臣去國九年重入修門見都下穀賤物平人情安帖惟是士大夫風俗大變上曰何也公曰向來士大夫奔覿抃之門十才一二尚畏人知今則公然趨附十已七八不復有顧忌矣人才進退由於私門大非朝廷美事上曰抃則不敢覿雖時或有請朕亦多抑之自今不復從矣公曰陛下之言雖如此其如外間喧傳某人由某人之薦某人出某人之門此曹聲勢既長臺諫侍從往往多出其門頥指如意朝廷亦惟命是聴無敢為陛下言者天下靡靡風俗日趨敗壊奈何臣昨所奏將帥賄賂交結又為特甚不惟士大夫言之雖軍伍使臣朝廷胥史下至走卒亦能言之獨陛下以為無有臣恐小人姦計百端巧為彌縫使陛下獨不悟此不可不深察而嚴禁也陛下信任此曹壊朝廷之紀綱廢有司之法令敗天下之風俗累陛下之聖徳臣實痛之願陛下勿忘臣此四言者常留聖慮則天下幸甚上曰卿到建康見兵將有如此者一一奏來公又奏諸路監司亦望精擇須稍諳練有風采之人乃可用若膏􅆝子弟未更民政權要子姪親故率皆負勢妄作為一路之害上因語及人材問公識某人否公對曰臣素知之今日正當得此等人布之朝列則所謂猛虎在山藜藿不採汲黯在朝淮南寢謀者也願陛下留意上為沈思久之上初欲為公設宴㑹小疾不果乃命二府飲餞于浙江亭公去建康至是葢十五年父老喜公之來所至相聚以百數焚香迎拜如見親戚公為政平易寛簡悉罷無名之賦府有軍屯異時多為民害公為出令犯者當取㫖以軍法從事諸軍肅然行宫扄鑰别以宦者主之留守待之如部使者之禮時節按行殿中則宦者置酒自坐東偏而留守顧為客甚或邀去就飲其家公悉罷之宦者浸不樂而不能害也建康距淮南一水間毎聞邊面利害無不言嘗奏北界羣盜百餘焚掠淮隂殺人簒囚執縳官吏此由跳河盜馬之徒有以啟之請加嚴禁而於沿淮諸縣量増戍兵以防之其自北方來歸者則慰諭而勿受也又奏宻院昨下諸郡造甲自有程限而諸郡争先希賞不無追集之擾乞行戒喻以安農業且自頃罷兵至今十五六年諸軍造甲當已足用而御前軍器所甲匠又凡三千五百人若以百工為一具則以嵗計之今不啻十四五萬具矣行宫之甲見管四萬今諸郡所造計亦不下三萬欲望試加檢括茍可足用即逐州常年合納甲葉鐵炭之類或可間年量與裁減亦寛民力之一事也又奏日者陛下深念諸軍有口衆而廩假不足以自贍者特降緡錢三總領司各付以二十萬俾之回易嵗取息錢五分以為優給甚大惠也然商賈之利不過什一今以總所之權奉朝命用禁令而責五分之息其勢必至於盡籠商賈之利隂奪場務之課使道塗嗟怨公私困竭而淮西總司嵗以十萬緡者散之兩軍多者不過兩千少或僅得千錢以朝廷黄牓措置使此曹終嵗仰望而所得不過如此得者既未足為惠而不得者又有怨言甚無謂也請亟罷之而嵗捐交子三十萬於一司以其半給諸軍之口衆者以其半大閱而激犒之不惟名正惠周亦可少振士氣而數路細民商旅受賜又不貲矣是時御前多行白劄子率用左右私人賫送而迎送饋遺體同王人至是樞宻承㫖王抃遣所親以白劄來吏白故事公悉罷之因上奏曰號令出於人主行於朝廷布於中外古今之所同也間有軍國機宻文字或御前批降則用寳行下此所以示信而防偽也今乃直以白劄傳㫖處分事宜於數百里之外則臣不知其可矣其間亦有初非甚宻之事自可付之省部今用白劄雖無甚害然白劄既信於天下則它時緩急或有支降錢物調發軍馬處置邉防于國家大利害事其間豈能保其無偽若嚴重知體之人必須奏審則往來之間或失事機若庸懦無識之人即便施行則真偽不分豈不悮事况祗禀文字只付差來人或令回申元承受處到之與否不可得知此於事體猶為非便惟陛下審察而改之上為手札奬諭愧謝其意公尋上章請致其事答詔不允上又出手札付三省除公少保加恩判建康府如故宣制之日亦上所自定葢異禮也公力辭以為曽公亮嘗言司空非賞勞之官卒不拜受今之少保即昔之司空也况又無勞其敢受乎上手札敦諭至于再三公乃受命時江東諸郡皆旱而南康廣徳為尤甚上詔公預講荒政公奏曰薄征緩刑已責勸分之屬不敢不勉亦已揭牓招誘米商嚴戒場務毋得征税但恐未到之間民已流散不可復收欲乞於本路諸州朝廷樁積數内借米三十萬石穀二十萬石分給州縣賑糶而又繼以常平之粟仍先揭牓諭之使細民不至流移富家不敢閉糴商旅不敢邀價又奏乞除放淳熈四年夏秋逋賦權罷淮東和糴倚閣畸零夏税申明納粟賞格上多從之惟所借樁積米穀前後三奏詞甚懇激而廟堂有不樂公者才得三萬斛人皆為公憂而公處畫有方船粟四集境内帖然民無流徙咸仰公徳焉八年正月復上告老之章累詔不允而公請益堅二月除醴泉觀使進封申國公將歸薦本道守令耿秉等五人皆以次擢用九年正月公之年已七十矣元日即謝醴泉之俸復上疏申前請凡表五上上又手批其奏卻之是嵗親祠召公陪位公力辭又三表懇請告休不獲即為手札以請上不得已詔以少傅致仕進封福國公有司以法當給全俸公按富文忠公故事獨受少傅之禄餘悉歸之十一年十月七日上以公生朝遣使賜手詔金器香藥十二年又詔公陪祀南郊且以増太上尊號來嵗當行慶夀之禮上喻宰臣曰陳丞相久不相見宜趣其來若赴陪祠不及亦可赴慶夀且是禮之行尤以元老在廷為重也公拜疏辭行上復手札催促書其末曰付陳少傅而不名也公竟懇辭慶典告成册拜少師進封魏國公公辭避再四乃受十三年十一月屬疾二十一日疾革夜半手書一紙示諸子曰予病恐不能自還生死大數無足悲者白屋起家致身三少報國無功叨榮有靦獲死牖下尚復何云遺表只謝聖恩無得祈求恩澤死之後百日入葬不用僧道追薦等事吾欲以身率薄俗汝等不可違也無功無徳無得立碑請諡汝等力學為善人惟忠惟孝可報國家此外無可祝命婦女出寢門顧謂中子守曰遺表惟以選用忠良恢復境土為請可也翌旦整冠歛衽神氣静定安卧而薨先是郡之鎮山壺峯大石崩墜聲聞數里是日地復大震鄉人異之公生二十有六年而仕仕三十年而相相二年而去去十三年而老老三年而薨薨之年葢七十有四矣上聞其喪對輔臣嗟悼久之再輟視朝贈太保令本路轉運司給葬事後數月有㫖賜諡遂以靖共其位文賢有成二法諡公曰正獻而以制可告于第公孝友忠敬得於天資為人清嚴好禮終日無惰容雖疾病見子孫必衣冠胷懐坦然遇人無少長一以誠實一言之出終身可復平居恂恂言若不出諸口而在朝廷危言正色分别邪正排斥權要無所顧避論事上前指切時病如請起張忠獻公乞斬張去為按逐龍曽議復奏審及極論近習㺯權納賂鬻賣將帥之弊皆卓犖竒偉為天下安危治亂之所繫一時上意雖未即開納公必懇請再三然心平理順色温氣和無激訐近名之意上多悦而從之處國家顧大體務持重不為幸勝茍得之計在中書尤以愛惜名器裁抑僥倖為事故小人多不樂而聖主獨深知之是以居外積年眷禮彌厚嵗時錫賚存問不絶年六十七即告老于朝上所以留之甚至且屢稱其忠誠不欺為當今賢相公子守賞以宗正寺簿奏事殿中上顧問公甚厚陪祠之召葢將有所咨訪而公病不能行天下有志之士至今恨之然非為公私恨也公性寛洪簡淡無私喜怒於天下士泛然若無所親疎而好賢之心實篤於内於一時人材薦達甚衆然皆不以語人有如熹之不肖公前後葢嘗三薦之而赴建康時對語尤切然熹皆莫之知也雅善故端明殿學士汪公應辰敷文學士李公燾嘗曰吾待罪宰相所以幸無過舉者二公之力也於人無所怨惡錢端禮嘗沮公洪邁亦與公不合至入相皆以名藩大郡處之治郡崇尚風教民有骨肉之訟親以義理仄覆譬之争者亦悔悟感泣而去所至民必相率為生祠且立碑以頌公徳公聞之亟命禁止而碎其碑平居自奉甚約言談舉止不改鄉閭之舊食不過一肉而衣或二十餘年不易晚嵗築第不為華侈僮使不過數人皆謹愿忠樸門庭閴然過者或不知其為公相家也俸賜入門多以施與撫愛宗族恩意甚備内外緦功之喪必素服以終月數在官不受饋遺建康諸司例有月餉公不欲異衆别儲之以周貧士之往來者將去所餘幾萬緡悉歸之公帑於外物澹然無所好獨喜觀書史疾病猶不釋卷其學一以聖賢為法於浮屠老子之説未嘗過而問也嘗有詩曰吾方蹈孔孟未暇師粲可此足以見其志矣有遺文二十卷奏議二十卷娶聶氏封唐國夫人子男五人寔朝奉郎通判泉州事守承議郎權發遣漳州事定承奉郎有志於學而蚤卒熹嘗銘其墓以哀之宓宿皆承事郎女四人長適進士黄洧次適故著作佐郎鄭鑑再適太常少卿羅㸃次適奉議郎通判漳州事梁億㓜未行孫男四人垕承務郎址坦皆承奉郎塾未官孫女六人長許嫁修職郎泉州司户趙善綽餘㓜初公歸自金陵即預為棺衾嘗遊鄉縣之保豐里龍汲山妙寂僧舎愛其山水相羊久之命作夀藏既薨諸孤悉遵遺戒惟百日而窆懼於不懐則以十五年七月二日奉公之柩葬焉謂熹蚤蒙公知晚嵗尤篤授以家傳使蕞其迹以告于太史氏熹不得辭直書其事如右以俟采擇謹狀淳熈十五年十二月日朝奏郎直寳文閣主管西京嵩山崇福宫朱熹狀晦庵集卷九十六欽定四庫全書晦庵集卷九十七宋朱子撰行狀
