body:
  text: 詩崇夀客舎夜聞子規得三絶句寫呈平父兄煩為轉寄彦集兄及兩縣間諸親友空山初夜子規鳴静對琴書百慮清喚得形神兩超越不知底是斷腸聲空山中夜子規啼病怯餘寒覔故衣不為明時堪眷戀久知岐路不如歸空山後夜子規號斗轉星移月尚髙夢裏不知歸未得已驅黄犢度寒臯寄雲谷瑞泉菴主憶昔誅茅日山房我自名風埃猶俗累烟雨負巖耕多謝空門侣能同物外情肯来分半壑聊爾度平生少待清秋日閒尋逺嶽盟不知誰是客一笑絶塵纓入南康界閲圖經感陶公李勃劉凝之事戱作長官定笑歸来晚中允應嫌去却回惟有山人莫相笑也曽還俗做官来屢游廬阜欲賦一篇而不能就六月中休董役卧龍偶成此詩登車閲嶺徼息駕康山陽康山髙不極連峰鬱蒼蒼金輪西嵯峨五老東昻藏想象仙聖集似聞笙鶴翔林谷下凄迷雲闗杳相望千巖雖競秀二勝終莫量仰瞻銀河翻俯看交龍驤長吟謫仙句和以玉局章疇昔勞夢思兹今幸徜徉尚恨忝符竹未愜棲雲房已尋兩峰間結屋依陽岡上有飛瀑駛下有清流長循名協心期弔古増悲凉壮齒乏竒節頽年矧昏荒誓将塵土蹤暫寄雲水鄉封章儻從欲歸哉澡滄浪讀李賔老玉澗詩偶成獨抱瑶琴過玉溪琅然清夜月明時秪今已是無心久却怕山前荷蕢知立秋日同子澄寺簿及僉判教授二同寮星子令尹約周君段君同遊三峽過山房登折桂分韻賦詩得萬字輙成十韻呈諸同遊抗塵㡬何時猿鶴共悲怨豈知朱墨暇乃適山水願兹晨秋令初休沐謹邦憲佳賔忽四来英僚亦三勸駕言北郭門謝此旟隼建散目山崔嵬縱轡路修蔓凭欄快倒峽躋壑困脱輓追攀林樾深歡喜脚力健登髙眺逺浦衆景争自獻何必仍丹丘徑欲凌九萬和子澄白鹿之句經旬不到鹿場隂夢想飛馳不自禁幸有髙軒同勝賞何妨折屐共幽尋徘徊未厭詩書樂感慨難忘忠孝心更對豐鐫哦伐木風泉雲壑助清吟暇日侍法曹叔父陪諸名勝為落星之遊分韻得往字率爾賦呈聊發一笑長江西委輸匯澤東滉瀁中川屹孤嶼佛屋寄幽賞我来此何日秋氣欲蕭爽共載得髙儔良晨豈孤徃酒酣清歗發浪湧初月上疊鼓喚歸艎陳迹真俯仰九日奉陪髙州史君莆陽别駕㑹稽丞公善化明府仲衡詩伯并屈子美元範二兄及郡中諸文武同登紫霄絶頂南望江湖北眺淮甸少快心目既歸又得仲衡佳篇句法清麗情致悽惋三復不勝起予之歎謹次韻呈請皆賦之以紀一時之盛甚惠甚望此日登髙處千年錦樹稠無人嘲落㡌有客賦悲秋忽忽塵中老怱怱物外遊江湖空極目不盡古今愁下元節假行視陂塘因與賔友挈兒甥出郭登山歸賦二詩示子直春卿及折桂雲谷并寫呈郡中諸寮友廬阜東北際岧嶤五峰尊中巖穹林繞青天白雲屯郡閣有佳眺徙倚空朝昏今晨幸休暇發軔北郭門牽蘿出林端躡屐躋雲根髙尋却清宦小憩欣潺湲古殿宿寒靄新甍麗朝暾扶藜陟東岡夙昔規曽軒却倚千尋峭前窺百泉奔長風卷浮埃江湖渺相吞結架雖未諧雄瓌已難論同来俱勝流晤語仍王孫已踐支許諾不慙夙尚魂賦詩紀兹日嵗晚期相敦卧龍之遊得秋字賦詩紀事呈同遊諸名勝聊發一笑躡石度急澗窮源得靈湫谽谺兩對立噴薄中怒投何年避人世結屋棲巖陬嘉名信有託故迹誰能求我来一經行凄其仰前修鄰翁識此意伐木南山幽為我立精舎開軒俯清流多岐諒匪安一壑真良謀解組云未遂驅車且来遊嘉賔頗蟬聨野䔩更獻酬飲罷不知晚欲去還淹留躋攀已别峰窺臨忽滄洲下集西澗底沉吟樹相樛王淵茗飲餘三峽空尊愁懐賢既伊鬱感事増綢繆前旌向城郭回首千峰秋卧龍之遊錢通守得江字不及賦詩已解維矣熹用其韻紀事以贈并附卷末君行安所適衝風泝濤江傳聞閬州好未見心已降邀君康山遊聽此巨壑淙班坐酌溪石幽尋憇雲窓勸君盡此杯錦帆已稠杠明年儻来東鳴鐃建髙幢訪我深澗底晤言絶紛嚨城南且細説慰我心悾悾分韻得眠意二字賦醉石簡寂各一篇呈同遊諸兄驅車何所適往至秋雲邊企彼澗中石舉觴酹飛泉懐哉千載人矯首辭世喧凄凉義熈後日醉向此眠仰視但青冥俯聽驚潺湲起坐三太息涕泗如奔川神馳北闕隂思屬東海壖丹衷竟莫展素節空復全低徊萬古情惻愴顔公篇為君結茅屋嵗暮當来還醉石天秋山氣深日落林景翠亦知後騎廹且復一流憇環瞻峰列屏迥矚泉下濞永懐仙陸子久挹浮丘袂于今知㡬載故宇日荒廢空餘醮壇石香火誰復繼更憐韋刺史五字有真意虎竹付歸人悲風起横吹沉吟向絶迹浩蕩發幽寄来者知為誰念我疇三喟簡寂尋白鹿洞故址愛其幽䆳議復興建感歎有作清冷寒澗水窈窕青山阿昔賢有幽尚眷言此婆娑事往今㡬時髙軒絶来過學館空廢址鳴絃息遺歌我来勸相餘杖䇿搴緑蘿謀野欣有獲披圖知匪訛永懐當年盛華莘衿佩多博約感明恩涵濡熈泰和凄凉忽荒榛俯仰驚頽波發教逮綱紀喟然心靡它伐木循隂岡結屋依陽坡一朝謝塵濁歸哉碩人薖時已疏上尚書乞洞主矣遊白鹿洞熹得謝字賦呈元範伯起之才三兄并示諸同遊者嵗月有環周窮臘忽受謝眷眷山水心幸此朱墨暇招呼得良友邂逅成夙駕深尋故轍迹喜見新結架永懐拾遺公藏器此待價横流詩書澤下及楊李霸炎神撫興運制作流大化石室萬卷藏綸言九天下規模未云逺荒茀良可詫自非賢邑宰誰復此精舎㑹當求敕賜畢願老耕稼更與盡心期臨流抗風榭元範尊兄示及十梅詩風格清新意寄深逺吟玩累日欲和不能昨夕自白鹿玉澗歸偶得數語江梅大雪天地閉窮隂渺寒濵誰知江南信已作明年春嶺梅梅花破蕚時瘴雨吹成雪驛使忽相逢無言似愁絶野梅野風吹孤芳逈立正愁絶皂盖莫徘徊堪看不堪折早梅霜風殊未髙杖䇿荒園裏仙子别經年相看共驚喜寒梅白玉堂前樹風清月影殘無情三弄笛遥夜不勝寒小梅且喜梅花開莫嗟梅花小花小風味深此意君已了疎梅玉笛未黄昏氷灘已清淺疎影不勝妍愁心為誰逺枯梅樛枝卧龍蛇冷蘂綴氷雪千里古人心今年為誰折予家居時劉平甫折此枝為贈落梅花開已凄凉花落更愁寂来嵗烟雨時為君和鼎實賦梅君欲賦梅花梅花若為賦繞樹百千回句在無言處觀梅小集以齋禁不得奉陪因寄小詩梅花年後欲離披恰是先生變食時送與西樓一尊酒諸君莫負可憐枝元範别後寄惠佳篇清叟次韻見示格律俱髙詠歎不置因亦用韻寫呈二兄聊發一笑故人别我去一月曠音驛今朝得新詩開卷意已適知君到里門征騎聊一息行復敞天閽從容正朝幘自今九霄路不復兩塵隔容與日華東翺翔禁扉北回頭五峰下寂寞笑孤客不賦歸去來心形謾相役右呈元範五十行過二雙鬢颯秋草平生素心人誰與共兹抱今年廬山下得子恨不早嵗月幸同庚詩書復同道惟應山南北雲母夜堪擣獨生有仙期廻崖詎難到丹經不我誑白髮不一掃看公鬚眉蒼杖鉞督征討右呈清叟次卜掌書落成白鹿佳句重營舊館喜初成要共羣賢聽鹿鳴三爵何妨奠蘋藻一編詎敢議明誠深源定自閑中得妙用元從樂處生莫問無窮菴外事此心聊與此山盟白鹿講㑹次卜丈韻宫墻蕪沒㡬經年秪有寒烟鏁澗泉結屋幸容追舊觀題名未許續遺編請為洞主不報青雲白日聊同趣謂西澗劉公霽月光風更别傳謂濓溪夫子珍重箇中無限樂諸郎莫苦羨騰騫再用前韻示諸同遊幽卧寒巖不記年飽看山月聽風泉舒憂正得琴三疊玩意惟慿易一編誤落塵中乖夙尚却思洞裏付真傳封章倘幸天從欲便解銅符謝縶騫次韻四十叔父白鹿之作誅茅結屋想前賢千載遺蹤尚宛然故作軒窓挹蒼翠要将絃誦答潺湲諸郎有志須精學老子無能但欲眠多少箇中名教樂莫談空諦莫求仙送四十叔父吾家從昔號清門叔父于今道更尊客路艱難空自惜遺經終始向誰論獨尋雲嶠逢孤姪共愛春江接故園細説刈葵休放手此来真不為盤餐伏蒙秘閣張丈寵顧下邑并以長篇為貺降歎之餘牽勉繼韻仰求斤削僣率皇恐向来滅迹東山東閉門不問烏雌雄門前有路向塵土兩足未舉心先慵當時亦有車馬客此意欲説嗟誰同窮居聊復追仲蔚篤論何必須劉龔平生故人子張子相思安得長相從毎勞書疏問生死坐想星宿羅心胸㡬年持節漢水上木牛流馬旌旗紅君王輟饋思頗牧外庸且訖来朝宗因能過我紫霄下後乘載得朱簾櫳蒼顔白髮應笑我曷不飽卧陶窓風開樽鵝池水清激下馬醮石烟空濛須㬰路轉山更好摩天巨刃排雙峰少看銀河忽倒掛直欲跳下清泠中南臨匯澤共指㸃縹緲貝闕浮珠宫公言平日愛登覽到此一洗羣山空坐間為我出竒句不用逺寄南飛鴻上言雲泉足竒賞下歎契闊歡相逢紛吾失脚墮世網乃有此㑹寧天窮流光過眼驚昨夢舊約回首羞塵容明朝却上烟艇去滅沒萬頃追鳬翁和張彦輔初到南康之句十年不共賦陽春正有胸中萬斛塵失喜清詩還入手細看佳句轉驚人知公近覺青山好顧我頻嗟白髮新肯過寒齋共尊酒向来心事請深陳奉同都運直閣張丈哭敬夫張兄張丈有詩敢次元韻悲悼之極情見乎詞伏幸采覽二首秀翁威畧憺華戎遺恨車書久未同喜有象賢堪嗣事故知鴻業自無窮蕃宣合奏三年最風采俄驚一旦空根本平生有深計遺書不但子囊忠不應世道即漂淪何事今年失此人禮樂端能懐益友琴笙忍遽樂嘉賔亦知遊好曽通譜却記登臨喚卜鄰兩首悲詩數行淚感傷那復鬬清新張文垂顧適聞訃音為罷郡宴敬夫向嘗約熹徙居湖之上盖相語於裴公臺上云秘閣張丈簡寂之篇韻髙難繼别賦五字以謝来貺勞農㑹稽宅息駕丹元鄉丹元不可見翠碧空雲房是時中春月暄風發新陽白水注幽壑緑樹敷崇岡俯聽足怡悦仰觀共徜徉班坐得瑶草傾壺出瓊漿長吟遊仙詩亂以招隠章忽忽林景西躊躇申慨慷坐上江海客兀傲鬚眉蒼逸氣邁霄漢英詞吐琳琅思與泉石勝韻隨笙鶴翔追遊不敢及咏嘆可能忘俗傳歸宗是王右軍故宅陸修静封丹元真人和張彦輔落星寺之作嵌空竒石戰驚濤樓殿峥嶸勢自髙四靣真成開玉鑑三山應是失金鰲題詩正爾難搜句舉酒何妨共作豪倚遍䦨干更愁絶歸来白盡鬢邊毛和張彦輔白鹿洞之作䆳谷新華館風烟再吐吞舊眠聞野鹿遺恨響驚猿李拾遺自此徙居少室乃被徴故有此句共賞忻同趣分擕愴别魂徘徊空日夕無䇿駐行軒次張彦輔西原之作無處堪投跡空山寄一椽懸門窺絶壁繚徑上層巔檻闊吞江浪窓虚響谷泉丹經閒自讀不為學神仙次張彦輔卧龍之作瀑水源何處髙疑雲漢通瀉時垂練直落處古潭空客寄詩能好龍蟠意自雄知君来峴首為我説隆中次張彦輔棲賢之作融冶何年事停杯莫問天秪今從痼疾疇昔似因緣傾耳真三峽投文總九淵蘭亭那得此猶足致羣賢和張彦輔雪後棲賢之作夜来春雪遍林丘却喜風威曉便收好上籃輿閒縱目莫将衲被苦蒙頭㣲官正愧逍遥社勝日猶堪汗漫遊欲出林闗戀瑶草不妨尊酒更淹留謝張彦輔留别之作一别屢更嵗思君無已時知君亦念我相望平兩嗟咨我病卧田間君行䕶疆陲隠顯既殊跡㑹合安可期今年定何年有此一段竒我来五峰陽君歸九江湄聞君肯来辱歡喜不自持迎君紫霄峰舉觴白鵝池强健初共欣艱棘旋相悲相顧出危涕薄言首東岐留連十日飲愴恨八哀詩散懐水石幽遂忘筋力疲雄篇既鼎来逸韻方窮追云胡遽告别牙纛風披披攬袪不得留酌酒前致辭願君醻此觴去上白玉墀國論罄忠益廟謨參設施一請正紀綱再請誅羗夷及時樹勲業慰我空山飢時聞張荆州訃張丈有詩哭之故有八哀之句奉答張彦輔戯贈之句已驅送客車復著登山屐未論窺臨快且脱詩酒厄從今謹出入保此頥正吉不奈嵗寒心於公有深憶王輔嗣注頥卦大象云禍從口出病從口入奉答張彦輔解嘲康俗遺居萬疊山髙垂鐵鏁詎容攀青鞋布韈非公事古木寒泉要我閑伏蒙某官寵示和陶見寄舊作伏讀歎仰又感知待期許之意盖非一日率易次韻少見謝臆伏惟矜憐有以教之吾心抱經濟軒冕非所欣向来清禁闥本是山林人浩歌歸去来神父邈何因一朝脱冠去妙境聊同臻謂予雖後来臭味亦有聞賡詞久見屬重以告語勤荒寒想髙風令人思無鄰甘棠矧在此躑躅晴湖濵贈于盛二生昔日豐城劍寒光射斗牛江山餘秀傑人物尚風流二妙今安匹孤帆各倦游還家問師友折節慕前修秋日告病齋居奉懐黄子厚劉平父及山間諸兄友出山今㡬時忽忽嵗再秋江湖豈不永我興終悠悠况復逢旱魃農畝無餘收赤子亦何辜黄屋勞深憂而我忝朝寄政荒積􅄽尤懐痾卧空閣惻愴増綢繆東南望故山上有𤣥烟浮平生采芝侣寂寞今焉儔朝游雲峰巔夕宿寒巖幽為我泛瑶瑟冷然發清謳裂牋寄晨風問我君何求洪澤捩君柁狹硤摧君輈君還若不早無乃非良謀再拜謝故人低徊更包羞桂華幸未歇去矣從君遊夜坐有感秋堂天氣清坐久寒露滴幽獨不自憐兹心竟誰識讀書久已懶理郡更無術獨有憂世心寒燈共蕭瑟讀諸友遊山詩卷不容盡和和首尾兩篇去年尋得李家山考卜真成屋數間要與青衿時散帙閑臨碧澗共觀瀾詩書本説人間事勲業休看鏡裏顔誰識寥寥千古意新詩題罷蘚痕斑向来結友尋名山下窮絶壑髙危顛胡為一旦墮塵網五老在望心茫然青牛底處有行迹白鹿㡬時同正員清遊帶雨想幽絶妙處只恐詩中傳戱贈勝私老友槐花黄盡不闗渠老向功名意自疎乞得山田三百畝青燈徹夜課農書勝私先侍講嘗著農書三卷代勝私下一轉語碓下泉鳴溜決渠屋頭桑樹緑扶疎朱虚正自知田事馬服何妨讀父書和戴主簿韻平生本自好樓居况接髙人永晝餘共喜江山入尊爼從教幕府省文書感君肯出新詩句恨我終思舊草廬擬借韋編訂龍馬免推納甲話蟾蜍戴嘗有麻衣易説自以為得之異人云次沈侍郎遊楞伽李氏山房韻喜陪後騎陟崔嵬竹裏泉鳴古寺開吟罷蘇仙頭白句天風更送好詩来天聰已許一言悟年少懸知萬卷開珍重當時讀書處低回空有後人来奉同尤延之提舉廬山雜詠十四篇白鹿洞書院在郡城東北十五里事見記文昔人讀書地町疃白鹿塲世道有升降兹焉更表章矧今中興年治具一以張絃歌獨不嗣山水無輝光荒榛適剪除聖謨以汪洋亦有皇華使肯来登此堂問俗良懇惻懐賢増慨慷雅歌有餘韻絶學何能忘折桂院黄雲觀在書院東北五里院後作亭取李白黄雲萬里動風色之句名之城中東北望五老何蒼蒼下有前朝寺一原頗深藏門前林澗幽屋後雲木荒閑窓亦明潔著此瑞錦長僧房有瑞香花更能理枯笻步上林北岡仰視天宇濶俯瞰江流長即黄雲觀受書彼何人姓氏不足詳竹帛有遺臭桂樹徒芬芳李逢吉嘗讀書此院去而登第以故得名楞伽院李氏山房在折桂西十里李公擇讀書處有東坡記文詩刻枯樹墨䟦躡石循急磵穿林度重岡俛入幽谷䆳仰見竒峰蒼李公英妙年讀書此雲房一去上臺閣致身何慨慷蘇公記藏書文字有耿光餘事亦騷雅戯墨仍風霜兩公不歸来嵗月忽已荒何用建遺烈寒泉薦孤芳棲賢院三峽橋在楞伽西五里兩岸蒼壁對直下成斗絶一水從中来湧潏知㡬折石梁據其㑹迎望逺明滅倐至走長蛟㨗来翻素雪聲雄萬霹靂勢倒千崿嵲足掉不自持魂驚詎堪説老仙有妙句千古擅竒崛尚想化鶴来乘流弄明月西澗清浄退菴在棲賢西三里劉凝之舊隠作亭取黄太史詩語名之凌兢度三峽窈窕復一原絶壁擁蒼翠奔流逝潺湲聞昔避世人寄此茅三間壮節未云逺髙風杳難攀深尋得遺墟縳屋臨清灣坐睨寒木杪飛泉閟雲闗兹遊非昔遊累解身復閑保此清浄退當歌不能諼解印後與友生遊集徘徊久之卧龍菴武侯祠在西澗西三里空山龍卧處蒼峭神所鑿下有寒潭幽上有明河落我来愛佳名小築寄幽壑永念千載人丹心豈今昨英姿儼繪事凛若九原作寒藻薦芳馨飛泉奉明酌公来識此意顧歩慘不樂抱膝一長吟神交付㝠漠萬杉寺在卧龍西十里休沐聊命駕駕言何所之行尋慶雲寺想像昭陵時門前杉徑深屋後杉色竒空山嵗年晚鬱鬱凌寒姿當年雨露恩千載有餘滋匠石不敢睨孤標儼相持寺前後杉萬木皆天聖中植有旨禁剪伐者更啟石室藏仰瞻天像垂願以清浄化永為太平基寺藏仁祖御飛白書有清浄字開先潄玉亭在萬杉西二里亭舊在橋上今廢竒哉康山陽雙劍屹對起上有横飛雲下有瀑布水崩騰復璀璨佳麗更雄偉勢從三梁外影落明湖裏平生兩仙句詠歎深仰止三年落星灣悵望眼空眯今朝隨杖屨得此弄清泚更誦玉虹篇塵襟諒昭洗簡寂觀在開先西五里陸修静所居髙士昔遺世築室蒼崖隂朝真石壇峻煉藥古井深結交五栁翁屢賞無絃琴相擕白蓮渚一笑傾夙心晚嵗更市朝故山鎖雲岑柴車竟不返鸞鶴空遺音修静晚為宋明帝召至建康卒於崇虚館我来千載餘舊事不可尋四顧但絶壁苦竹寒蕭槮相傳竹自修静手植其萌即所謂甜苦筍歸宗寺在簡寂西十里金輪紫霄上寳界鸞溪邊往昔王内史願香有餘烟相傳寺是王右軍故宅千年今一歸景物還依然澗水既蕩潏山花亦清妍不辭原隰勞樂此賔從賢訪古共紆鬱勞農獨勤拳憐我乖勝踐裂牋寄真詮逃禪公勿遽且畢區中緣是日熹以事不得陪杖屨陶公醉石歸去来館在歸宗西五里予生千載後尚友千載前每尋髙士傳獨歎淵明賢及此逢醉石謂言公所眠况復巖壑古縹緲藏風烟仰看喬木隂俯聽横飛泉景物自清絶優游可忘年結廬倚蒼峭舉觴酹潺湲臨風一長歗亂以歸来篇温湯在醉石南二里連山西南来中斷還崛起干霄㡬千仞據地三百里飛峰上靈秀衆壑下清美逮此勢力窮猶能出竒偉誰燃丹黄燄㸑此玉池水客来争解帶萬劫付一洗當年謝康樂絃絶今已矣水碧復留温相思五湖裏康樂湖中詩云水碧輟流温豈未見此水也耶康王谷水簾谷口景徳觀在温湯西十五里入谷又十五里至簾下循山西北騖﨑嶇㡬經丘前行荒蹊斷豁見清溪流一涉臺殿古再涉川原幽縈紆復屢渡乃得寒巖陬飛泉天上来一落散不收披崖日璀璨噴壑風颼颼追薪㸑絶品瀹茗澆窮愁敬酹古陸子何年復来游陸鴻漸茶經第此水為天下第一落星寺在郡城南湖中浩浩長江水東逝無停波及此一回薄湖平烟浪多孤嶼屹中川層臺起周阿晨望愛明滅夕遊驚蕩磨極目青冥茫回瞻碧嵯峨不復車馬迹唯聞榜人歌我願辭世紛兹焉老漁簔㑹有滄浪子鳴絃夜相過閏月十一日月中坐彭蠡門喚船與諸人共載汎湖至隄首回棹入西灣還分韻賦詩約来晚復集詩不至者浮以太白簽判渺教授空知縣望吳學録柱掌儀明大彭兄蘭判官擊南公一小彭兄遡彦忠人直卿余公度漿敬直懐衛父流晦翁光泰兒美棹方解組無多日歸哉喜欲狂臨風成邂逅載月下滄浪酌酒傳清影鳴橈擊素光它年隔千里此夜莫相忘和林擇之黄雲之句兼簡同遊諸兄登覽日云晏歸車眇同岡天風振余旟夕露沾我裳數子情未厭春山杳茫茫還瞻長江白迥眺飛雲黄當念塵中友心期邈相望無為跨鴻鵠决起凌青蒼和彭蠡月夜汎舟落星湖長占烟波弄明月此心久矣從誰説只今一舸漾中流上下天光兩竒絶回頭忽見西郭門尚喜蘇仙有遺烈問予何事却回船塵土涴君頭上雪首句前用蘇養直詩蘇舊居水西門外舟行望見其處熹罷官觀康王谷水簾夜飲山月軒分韻得主字奉别送行諸君嗟余老不才記憶謝明主畀兹山水郡北邇通𤣥府一官再温涼十日九塵土迨此解章紱絶境方快覩殷勤故人厚追送崖寺古把酒聽鳴泉相看淚如雨游天池三年落星渚北望天池山臨風㡬浩歎欲往無飛翰今朝復何朝陟此青雲端髙尋已竒絶俯瞰何其寛西窮濓溪原東盡湓城闗渺然滄波外淮山碧連環我意殊未極更思出塵寰何當駕輕鴻八表須㬰間視此長江水滔滔儻西還觀野燈飛螢腐草尋常事作底兹山獨耀芒須信地靈資物化金膏隨處發明光山北紀行十二章章八句祗役廬山陽矯首廬山隂雲峰不可覿碧澗何由尋昨朝解印章結友同窺臨盡彼巖壑勝滿兹仁知心予以閏月二十七日罷郡是夕出城宿羅漢二十八日宿白鹿二十九日登黄雲觀度三峽窺玉淵憇西澗飲西原宿卧龍四月一日過間先宿歸宗二日浴湯泉宿康王谷觀水簾宿景徳觀三日與清江劉倩之子澄永嘉張揚卿清叟潯陽王阮南卿周頥龜父長樂林用中擇之洛陽趙希漢南紀㑹稽陳祖永慶長武當祁真卿師忠温陵吳兼善仲達廬陵許子春景陽新安胡莘尹仲建安王朝春卿長樂余偶占之陳士直彦忠黄榦季直臨淮張彦先致逺㑹稽僧志南明老俱行窺臨事若何請從圓通説逶迤山門路悄蒨修篁列溪仍侯家名屋是孱王設何救黍離歌喟焉傷覆轍圓通寺地名侯溪本侯氏所居李後主取以為寺無它竒但門徑竹木深茂可觀耳行逢石門雨解驂寒澗東朝隮錦繡谷俯仰春冥濛懸泉忽淙琤雜樹紛青紅屢憇小亭古幽探思無窮石門澗正在天池山下有小菴三四是夕宿所謂廣福菴者来日登山道錦繡谷再過小橋橋皆有亭下又有亭基二小亭一竦身長林端䇿足層崖表仰瞻空界濶俯歎塵寰小天池西嶔崟佛手東窈窕杖屨徃復来慿軒瞰歸鳥盡錦繡谷登山稍髙無復林木坡陀而上至天池院在小峰絶頂乃有石池泉水不竭東過佛手巖石室嵌空中有井泉僧緣崖結架以居下臨錦繡谷又有石榻名逺公講經臺斯須暮雲合白日無餘暉金波從地湧寳燄穿林飛僧言自雄誇俗駭無因依安知本地靈發見隨天機天池院西數步有小佛閣下臨絶壑是遊人請燈處僧云燈非禱不見是日不禱而光景明滅頃刻異状諸生或疑其妄予謂僧言則妄而此光不可誣豈地氣之盛而然耶深尋兩林間清波貫華屋蓮社有遺蹤草堂非舊築修廊餘古刻好醜雜珉玉亦復記經行深慙後人讀五日下山至東西林兩寺相去不百步一溪清駛横貫其間皆自方丈前南廡下過他處所無有也白蓮池在東林法堂前白公草堂基在寺東久廢近嵗復剏數椽制殊狹陋然亦非其正處矣是日題名屬寺僧刻於咸通荘田記石行軒復東騖祠城當晚遊胡然冠盖集不盡心期幽夜厭百谷喧旦失千峰稠出門有遺恨回首空綢繆晚至太平興國宫唐九天使者祠也江州教授翁名卿載酒肴與鄉人遊應和歐景文及其諸生二十餘人皆至山水誠乃竒云誰究終始曇逺亦何人神君豈其鬼東西妄采獲誣謟共恢詭百世踵謬訛彛倫日頽圮東林慧逺雜取孔老之言以附佛學嘗著沙門不敬王者論唐明皇自言親見使者降於殿庭因立此宫而羣臣造為妖妄以迎合者甚衆本朝仍賜宫額神號置提舉官云以兹遊覽富翻令懐抱傷誰哉可告語舉俗昏且狂乾坤有真心日月垂休光茫茫宇宙内此柄孰主張北度石塘橋西訪濓溪宅喬木無遺株虚堂唯四壁竦曕徳容睟跪薦寒流碧幸矣有斯人渾淪再開闢平生勞仰止今日登此堂願以圖像意質之中几傍先生寂無言賤子涕泗滂神聽儻不遺惠我思無疆六日拜濓溪先生書堂遺像子澄請為諸生説太極圖義先生之曽孫正卿彦卿𤣥孫濤為設食於光風霽月之亭明晨江磯寺尊酒聊對設孰是十日遊遽成千里别英僚樹嘉政素友厲孤節努力莫相忘清宵共明月七日薛洪持志王仲傑之才擕酒自南康来飲罷與張陳趙南還軍子澄許張歸廬陵南鄉龜父還家擇之之湖南予與王余陳黄東度湖口而歸考異崇夀客舎月向一作月上歸未得一作身是客分韻賦簡寂迥矚一作俯矚誰復一作復謝嶺梅似愁一作但愁野梅風吹一作風破愁絶一作幽絶小梅莫嗟一作莫歎疎梅不勝一作不成送四十叔父獨尋一作獨遊逢孤一作尋孤秘閣張丈長篇饋思一作饋念和張彦輔失喜一作賸喜奉同張丈哭敬夫喚卜一作要卜和白鹿洞再吐一作自吐次棲賢韻融冶一作融結傾耳一作澒耳和陶次韻吾公一作吳公棲賢院三峽橋倐至一作倐起長蛟一作長虹温湯據地一作環地山北紀行嶔崟一作嵯峨孰是一作云是晦菴集卷七欽定四庫全書晦菴集卷八宋朱子撰
