front:
  text: 講義
  hash: sha256:8c7df028615f72719930aad6bf3a2a8ec699e99ac8ed423fdcd0245c7bd42450
body:
  text: 經筵講義大學臣熹曰大學者大人之學也古之為教者有小子之學有大人之學小子之學灑掃應對進退之節詩書禮樂射御書数之文是也大人之學窮理脩身齊家治國平天下之道是也此篇所記皆大人之學故以大學名之臣又嘗竊謂自天之生此民而莫不賦之以仁義禮智之性敘之以君臣父子兄弟夫婦朋友之倫則天下之理固已無不具於一人之身矣但以人自有生而有血氣之身則不能無氣質之偏以拘之於前而又有物欲之私以蔽之於後所以不能皆知其性以至於亂其倫理而陷於邪僻也是以古之聖王設為學校以教天下之人使自王世子王子公侯卿大夫元士之適子以至庶人之子皆以八歳而入小學十有五歳而入大學必皆有以去其氣質之偏物欲之蔽以復其性以盡其倫而後己焉此先王之世所以自天子至於庶人無一人之不學而天下國家所以治日常多而亂日常少也及周之衰聖賢不作於是小學之教廢而人之行藝不脩大學之教廢而世之道徳不明其書雖有存者皆不過為世儒誦說口耳之資而己未有能因其文以既其實必求其理而責之於身者也是以風俗敗壊人才衰乏為君者不知君之道為臣者不知臣之道為父者不知父之道為子者不知子之道所以天下之治日常少而亂日常多皆由此學不講之故也至于我朝天運開泰於是河南程顥及其弟頤始得孔孟以來不傳之緒而其所以開示學者則於此篇之㫖深致意焉若其言曰大學乃孔氏遺書須從此學則不差又曰大學乃初學入徳之門於今可見古人為學次第者頼有此篇尚存其他則莫如論孟其可謂知言之要矣後之君子欲脩己以治人而及於天下國家者豈可以舍是而他求哉臣以無能獲奉明詔使以此篇進講謹誦所聞釋其名義如右惟聖明之留意焉大學之道在明明徳在親民在止於至善臣熹曰大學者大人之學也明明之也明徳者人之所得乎天至明而不昧者也但為氣禀所拘人欲所蔽則有時而昏故當有以明之而復其初也親程氏以為字當作新是也其義則去其舊而新之云爾言既能自明其明徳又當推以及人使人亦有以去其舊染之汙也止者必至於是而不遷之意至善則事理當然之極也言明明徳新民皆當止於至善之地而不遷蓋必其有以盡夫天理之極而無一毫人欲之私也此三者大學之綱領也臣竊謂天道流行發育萬物而人物之生莫不得其所以生者以為一身之主但其所以為此身者則又不能無所資乎陰陽五行之氣而氣之為物有偏有正有通有塞有清有濁有純有駁以生之類而言之則得其正且通者為人得其偏且塞者為物以人之類而言之則得其清且純者為聖為賢得其濁且駁者為愚為不肖其得夫氣之偏且塞而為物者固無以全其所得以生之全體矣惟得其正且通而為人則其所以生之全體無不皆備於我而其方寸之間虛靈洞徹萬理粲然有以應乎事物之變而不昧是所謂明徳者也人之所以為人而異於禽獸者以此而其所以可為堯舜而參天地贊化育者亦不外乎此也然又以其所得之氣有清濁純駁之不齊也是以極清且純者氣與理一而自無物欲之蔽自其次者而下則皆已不無氣禀之拘矣又以拘於氣禀之心接乎事物無窮之變則其目之欲色耳之欲聲口之欲味鼻之欲臭四肢之欲安佚所以害乎其徳者又豈可勝言也哉二者相因反覆深固是以此徳之明日益昏昧而此心之靈其所知者不過情欲利害之私而已是則雖曰有人之形而實何以逺於禽獸雖曰可以為堯舜而參天地然亦不能有以自知矣是以聖人施教既已養之於小學之中而後開之以大學之道其必先之以格物致知之說者所以使之即其所養之中而發其明之之端也繼之以誠意正心脩身之目者則又所以使之因其已明之端而致其明之之實也夫既有以發其明之之端而又有以致其明之之實則吾之所得於天而未嘗不明者豈不超然無有氣質物欲之累而復得其本然之明哉是則所謂明明徳者而非有所作為於性分之外也然其所謂明徳者又人人之所同得而非有我之得私也向也俱為物欲之所蔽則其賢愚之分固無以大相逺者今吾既幸有以自明矣則視彼衆人之同得乎此而不能自明者方且甘心迷惑没溺於卑汙苟賤之中而不自知也豈不為之惻然而思有以救之哉故必推吾之所自明者以及之始於齊家中於治國而終及於平天下使彼有是明徳而不能自明者亦皆如我之有以自明而去其舊染之汙焉是則所謂新民者而亦非有所付畀増益之也然徳之在己而當明與其在民而當新者則又皆非人力之所為而吾之所以明而新之者又非可以私意苟且而為也是其所以得之於天而見於日用之間者固己莫不各有本然一定之則矣以其義理精微之極有不可得而名者故姑以至善目之而傳所謂君之仁臣之敬子之孝父之慈與人交之信乃其目之大者也衆人之心固莫不有是而或不能知學者雖或知之而亦鮮能必至於是而不去此為大學之教者所以慮其理雖復而有不純欲雖克而有不盡將無以盡夫脩己治人之道而必以是為明徳新民之標的也欲明徳而新民者誠能求必至是而不容其少有過不及之差焉則其所以去人欲而復天理者無毫髪之遺恨矣知止而后有定定而后能静静而后能安安而後能慮慮而后能得臣熹曰止者所當止之地即至善之所在也知之則志有定向静謂心不外馳安謂所處而安慮謂思無不審得謂得其所止臣謹按此一節推本上文之意言明徳新民所以止於至善之由也蓋明徳新民固皆欲其止於至善然非先有以知其所當止之地則不能有以得其所當止者而止之如射者固欲其中然不先有以知其所當中之地則不能有以得其所當中者而中之也知止云者物格知至而於天下之事皆有以知其至善之所在是則吾所當止之地也能知所止則方寸之間事事物物皆有定理矣理既有定則無以動其心而能静矣心既能静則無所擇於地而能安矣能安則日用之間從容閒暇事至物來有以揆之而能慮矣能慮則隨事觀理極深研幾無不各得其所止之地而止之矣物有本末事有終始知所先後則近道矣臣熹曰明徳為本新民為末知止為始能得為終本始所先末終所後此結上文兩節之意臣竊謂明徳新民兩物而内外相對故曰本末知止能得一事而首尾相因故曰終始誠知先其本而後其末先其始而後其終也則其進為有序而至於道也不逺矣蓋欲治人者不可不先於治己欲體道者不可不先於知道此則天下國家之達道通義而為人君者尤不可以不審是以臣愚竊願陛下深留聖意伏乞睿照古之欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先脩其身欲脩其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物臣熹曰明明徳於天下者使天下之人皆有以明其明徳也心者身之所主也誠實也意者心之所發也實其心之所發欲其一於善而無自欺也致推極也知猶識也推極吾之知識欲其所知無不盡也格至也物猶事也窮至事物之理欲其極處無不到也此八者大學之條目也臣謹按此言大學之序其詳如此蓋綱領之條目也格物致知誠意正心脩身者明明徳之事也齊家治國平天下者新民之事也格物致知所以求知至善之所在自誠意以至於平天下所以求得夫至善而止之也所謂明明徳於天下者自明其明徳而推以新民使天下之人皆有以明其明徳也人皆有以明其明徳則各誠其意各正其心各脩其身各親其親各長其長而天下無不平矣然天下之本在國故欲平天下者必先有以治其國國之本在家故欲治國者必先有以齊其家家之本在身故欲齊家者必先有以脩其身至於身之主則心也一有不得其本然之正則身無所主雖欲勉彊以脩之亦不可得而脩矣故欲脩身者必先有以正其心心之發則意也不能純一於善而不免為自欺則心為所累雖欲勉彊以正之亦不可得而正矣故欲正心者必先有以誠其意若夫知則心之神明妙衆理而宰萬物者也不能推而致之使其内外昭融無所不盡則隱㣲之際私欲萌焉雖欲勉彊以誠之亦不可得而誠矣故欲誠意者必先有以致其知致者推致之謂如喪致乎哀之致言推之而至於盡也至於物則理之所在人所必有而不能無者也不能即而窮之使其精粗隱顯䆒極無餘則理所未窮知固不盡雖欲勉彊以致之亦不可得而致矣故致知之道在乎即事觀理以格夫物格者極至之謂如格于文祖之格言窮之而至其極也物格而后知至知至而后意誠意誠而后心正心正而后身脩身脩而后家齊家齊而后國治國治而后天下平臣熹曰物格者物理之極處無不到也知至者吾心之所知無不盡也知既盡則意可得而實矣意既實則心可得而正矣臣謹按此覆說上文之意也物格者事物之理各有以詣其極而無餘之謂也理之在物者既詣其極而無餘則知之在我者亦隨所詣而無不盡矣知無不盡則心之所發可一於善而無不實矣意不自欺則心之本體可致其虛而無不正矣心得其正則身之所處可不陷於其所偏而無不脩矣身無不脩則推之天下國家亦舉而措之耳豈外此而求之智謀功利之末哉自天子以至於庶人壹是皆以脩身為本臣熹曰壹是一切也正心以上皆所以脩身也齊家以下則舉此而措之耳其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也臣熹曰本謂身也所厚謂家也此兩節結上文兩節之意臣竊謂以身對天下國家而言則身為本而天下國家為末以家對國與天下而言則其理雖未嘗不一然其厚薄之分亦不容無等差矣故不能格物致知以誠意正心而脩其身則本必亂而末不可治不親其親不長其長則所厚者薄而無以及人之親長此皆必然之理也孟子所謂天下國家皆本於身又謂於所厚者薄無所不薄其言皆本於此蓋君猶表也民猶影也表正則影無不正矣君猶源也民猶流也源清則流無不清矣若夫天下之物則有親有疎有近有逺而心之應物則有重有輕有長有短親者重而疎者輕近者長而逺者短重而長者在所先輕而短者在所後亦理勢之必然非人之所能為也是以此章詳陳大學之條目曰格物曰致知曰誠意曰正心曰脩身曰齊家曰治國曰平天下凡有八事而於章末獨以脩身齊家二事結之亦猶前章知所先後之云而其㫖益以深矣臣願陛下清閒之燕從容諷味常存於心不使忘失每出一言則必反而思之曰此於脩身得無有所害乎每行一事則必反而思之曰此於脩身得無有所害乎小而嚬笑念慮之間大而號令黜陟之際無一不反而思之必無害也然後從之有害則不敢也則又夙興而思之曰吾於吾親得無有未厚乎夜寐而思之曰吾於吾親得無有未厚乎以至於出入起居造次食息無時不反而思之必已厚也然後守之而勿失一有未厚則又恐懼而益加厚焉念念如此無少間㫁則庶乎身脩親恱舉而措諸天下無難矣惟陛下深留聖意臣又謹按自此以上皆大學經文自則近道矣以上為前章自古之欲明明徳於天下者以下為後章前章略提綱領後章細分條目鉅細相涵首尾相應極為詳備蓋夫子所誦古經之言而曾子記之自此以下傳文十章則曾子之意而門人記之也當俟異日詳䆒其說然必先讀經文使之習熟而綱領條目羅列胸中如指諸掌然後博考傳文隨事體察而實致其力使吾所以明徳而親民者無不止於至善而天下之人皆有以見其意誠心正身脩家齊國治天下平之效則大學之道不在於書而在於我矣伏惟陛下深留聖意則天下幸甚康誥曰克明徳臣熹曰克能也又有勝義言文王能明其明徳也太甲曰顧諟天之明命臣熹曰顧目在之也諟古是字通用天之明命即人之明徳也言先王之心常欲明其明徳如目在夫物不敢忘也帝典曰克明峻徳臣熹曰峻書作俊大也大徳即明徳也言堯能明其大徳也皆自明也臣熹曰結所引書以釋明明徳之意皆謂自明已之明徳也臣謹按此傳之首章釋經文明明徳之義舊本脱誤今移在此其曰克明徳者見人皆有是明徳而不能明惟文王能明之也夫人之所以不能明其明徳者何哉氣禀物欲害之也蓋氣偏而失之太剛則有所不克氣偏而失之太柔則有所不克聲色之欲蔽之則有所不克貨利之欲蔽之則有所不克不獨此耳凡有一毫之偏蔽得以害之則皆有所不克唯文王無氣禀物欲之偏蔽故能有以勝之而無難也其曰顧諟天之明命者人受天地之中以生所謂命也故人之明徳非他也即天之所以命我而至善之所存也是其全體大用蓋無時而不發見於日用之間事親事長飲食起居其所當然各有明法人唯不察於此是以氣禀物欲得以蔽之而不能自明常目在之無少間㫁真若見其參於前倚於衡也則明徳常明而天命在我矣其曰克明峻徳者人之為徳未嘗不明而其明之為體亦未嘗不大但人自有以昏之是以既不能明而又自陷於一物之小唯堯為能明其大徳而無昏昧狹小之累是則所謂止於至善也皆自明也者言此上所引三句皆言人當有以自明其明徳也能自明其明徳則能治其天下國家而有以新民矣湯之盤銘曰苟日新日日新又日新臣熹曰盤沐浴之盤也銘名其器以自警之辭也苟誠也湯以為人之洗濯其心以去惡如沐浴其身以去垢故銘其盤言誠能一日有以滌其舊染之汙而自新則當因其已新者而日日新之又日新之不可畧有間㫁也康誥曰作新民臣熹曰鼓之舞之之謂作言振起其自新之民也詩曰周雖舊邦其命維新臣熹曰言周國雖舊至文王能新其徳以及於民而始受天命也是故君子無所不用其極臣熹曰自新新民皆欲止於至善也臣謹按此傳之二章釋新民之義也蓋沐浴之盤者常用之噐而銘者自警之辭也古之聖賢兢兢業業固無時而不戒謹恐懼然猶恐其意有所怠而忽忘之也是以於其常用之器各因其事而刻銘以致戒焉欲其常接乎目每警乎心而不至於忽忘也其辭所謂茍日新日日新又日新者則取沐浴之事而言之蓋人之有是徳猶其有是身也徳之本明猶其身之本潔也徳之明而利欲昏之猶身之潔而塵垢汚之也一旦存養省察之功眞有以去其前日利欲之昏而日新焉則亦猶其䟽瀹澡雪而有以去其前日塵垢之汚也然既新矣而所以新之之功不繼則利欲之交將復有如前日之昏猶既潔矣而所以潔之之功不繼則塵垢之集將復有如前日之汙也故必因其已新而日日新之又日新之使其存養省察之功無少間斷則明徳常明而不復為利欲之昏亦如人之一日沐浴而日日沐浴又無日而不沐浴使其疏瀹澡雪之功無少間斷則身常潔清而不復為舊染之汙也昔成湯所以反之而至於聖者正惟學於伊尹而有得於此故有感乎沐浴之事而刻銘於盤以自戒焉而稱其徳者亦曰不邇聲色不殖貨利又曰以義制事以禮制心又曰從諫弗咈改過不吝又曰與人不求備檢身若不及皆日新之謂也至詩所謂聖敬日躋者則其語意於日新為至近而敬之一字又見其所以日新之本蓋不如是則亦何地可據而能日繼其功哉其後伊尹復政太甲復以終始惟一時乃日新為丁寧之戒蓋於是時太甲方且自怨自艾於桐處仁遷義而歸是亦所謂茍日新者故復推其嘗以告于湯者告之欲其日進乎此無所間斷而有以繼其烈祖之成徳也其意亦深切矣至周武王踐祚之初受師尚父丹書之戒而於几席觴豆刀劒户牖盥槃莫不銘焉則亦聞湯之風而興起者皆可以為萬世帝王之法矣傳者釋新民之義而及於此蓋以是為自明之至而新民之端也其曰作新民者武王之封康叔以啇之餘民染紂汙俗而失其本心也故作康誥之書而告之以此欲其有以鼓舞而作興之使之振奮踴躍以去其惡而遷於善舍其舊而進乎新也然此豈聲色號令之所及哉亦自新而已矣其曰周雖舊邦其命維新者言周之有邦自后稷以來千有餘年至於文王聖徳日新而民亦丕變故天命之以有天下是其邦雖舊而命則新也蓋民之視效在君而天之視聼在民若君之徳昏蔽穢濁而無以日新則民徳隨之亦為昏蔽穢濁而日入於亂民俗既壊則天命去之而國勢衰弊無復光華如人向老如日將暮日凋日瘁日昏日暗不覺滅亡之將至若其有以自新而推以及民使民之徳亦無不新則天命之新將不旋日而至矣其曰君子無所不用其極者盤銘言自新也康誥言新民也文王之詩自新新民之極也故曰君子無所不用其極極即至善之云也用其極者求其止於是而已矣詩云邦畿千里惟民所止臣熹曰邦畿王者之都也止居也言物各有所當止之處也詩云緡蠻黄鳥止于丘隅子曰於止知其所止可以人而不如鳥乎臣熹曰緡蠻鳥聲丘隅岑蔚之處子曰以下孔子說詩之辭言人當知所當止之處也詩云穆穆文王於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信臣熹曰穆穆深逺之意於嘆羙辭緝繼續也熈光明也敬止言其無不敬而安所止也引此而言聖人之止無非至善五者乃其目之大者也詩云瞻彼淇澳菉竹猗猗有斐君子如切如磋如琢如磨瑟兮僴兮赫兮喧兮有斐君子終不可諠兮如切如磋者道學也如琢如磨者自脩也瑟兮僴兮者恂慄也赫兮喧兮者威儀也有斐君子終不可諠兮者道盛徳至善民之不能忘也臣熹曰淇水名澳隈也菉詩作緑猗猗美盛貌斐文貌切以刀鋸琢以椎鑿皆裁物使成形質也磋以鑢鐋磨以沙石皆治物使其滑澤也治骨角者既切而復磋之治玉石者既琢而復磨之皆言其治之有緒而進進不已也瑟嚴宻之貌僴武毅之貎喧詩作咺赫喧宣著盛大之貌諠詩作諼忘也道言也學謂講習討論之事自脩者省察克治之功恂鄭氏讀作峻恂慄戰懼也威可畏也儀可象也引詩而釋之以見能得至善之所由而又以贊羙徳容之盛也詩云於戲前王不忘君子賢其賢而親其親小人樂其樂而利其利此以没世不忘也臣熹曰於戲嘆辭前王賢後謂文武也君子謂其後王小人謂後民也此言前王盛徳至善之餘澤使天下後世無一物不得其所所以雖已没世而人思慕之愈久而不忘也此兩節咏嘆滛泆其味深長當熟玩之臣謹按此傳之三章釋經文止於至善之義其曰邦畿千里維民所止者以民止於邦畿明物之各有所止也其曰可以人而不如鳥乎者言鳥於其欲止之時猶知其當止之處豈可人為萬物之靈而反不如鳥之能知所止而止之也其引穆穆文王以下一節則以聖人之止而明至善之所在也蓋天生烝民有物有則是以萬物庶事莫不各有當止之所但所居之位不同則所止之善不一故為人君則其所當止者在於仁為人臣則其所當止者在於敬為人子則其所當止者在於孝為人父則其所當止者在於慈與國人交則其所當止者在於信是皆天理人倫之極致發於人心之不容已者而文王之所以為法於天下可傳於後世者亦不能加毫末於是焉但衆人類為氣稟物欲之所昏故不能常敬而失其所止唯聖人之心表裏洞然無有一毫之蔽故連續光明自無不敬而所止者莫非至善不待知所止而後得所止也故傳引此詩而厯陳所止之實使天下後世得以取法焉學者於此誠有以見其發於本心之不容已者而緝熈之則其敬止之功是亦文王而已矣詩所謂上天之載無聲無臭儀刑文王萬邦作孚正此意也然君之所以仁臣之所以敬子之所以孝父之所以慈朋友之所以信皆人心天命之自然非人之所能為也但能因事推窮以至其極而又推類以盡其餘則天下之物皆有以見其至善之所在而止之矣其引瞻彼淇澳以下舊本脱誤今移在此其意則以明夫所以得其至善而止之之方與其得止之驗也夫如切如磋言其所以講於學者已精而益求其精也如琢如磨言其所以脩於身者已宻而益求其宻也此其所以擇善固執日就月將而得止於至善之由也恂慄者嚴敬之存乎中也威儀者輝光之著乎外也此其所以晬面盎背施於四體而為止於至善之驗也盛徳至善民不能忘蓋人心之所同然聖人既先得之而其充盛宣著又如此是以民皆仰之而不能忘也盛徳以身之所得而言也至善以理之所極而言也切磋琢磨求其止於是而已矣其引於戲前王不忘以下一節則因上文民不能忘而言也蓋賢其賢者聞而知之仰其徳業之盛也親其親者子孫保之思其覆育之恩也樂其樂者含哺鼓腹而安其樂也利其利者耕田鑿井而享其利也此皆先王盛徳至善之餘澤故雖已没世而人猶思之愈久而不能忘也子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本臣熹曰猶人不異於人也情實也引夫子之言而言聖人能使無實之人不敢盡其虛誕之辭蓋我之明徳既明自然有以畏服民之心志故訟不待聽而自無也觀於此言可以知本末之先後矣臣謹按此傳之四章釋經文物有本末之義也舊本脱誤今移在此蓋言聖人徳盛仁熟所以自明者皆極天下之至善故能大有以畏服其民之心志而使之不敢盡其無實之辭是以雖其聽訟無以異於衆人而自無訟之可聽蓋已徳既明而民徳自新則得其本之明効也或不能然而欲區區於分爭辨訟之間以求新民之效其亦末矣臣又謹按自此以上大學之傳以釋正經前章之義者也其言克明徳者欲學者自彊其志以勝其氣禀之偏物欲之蔽而能明其明德也其言顧諟天之明命者欲學者之於天理心存目在而不可以頃刻忘也其言茍日新日日新又日新者欲學者深自省察一日沛然有以去惡而遷善則又如是日日加功而無間斷也其言如切如磋如琢如磨者欲學者之不以小善自足而益進其功以求止於至善亦日新之意也凡此數者其言雖殊其意則一臣願陛下深畱聖意而實致其功必使一日之間曉然有以見夫氣禀物欲之為已害脱然有以去之而無難則天理之明瞭然在目而有以為日新之地矣然後日日新之又日新之如既切而復磋之如既琢而復磨之以至於至善在我而無所不用其極則宋雖舊邦而天之所以命陛下者則新矣如其不然則臣恐天下之勢將有如前章所謂向老而將暮者臣不勝大懼惟陛下之畱意焉此謂知本程子曰衍文也此謂知之至也臣熹曰此句之上當有闕文臣謹按此傳之五章其次當釋物格知至之義今亡其辭而獨畱此一句乃章末之結語也臣嘗竊考此篇之㫖其綱領有三其條目有八而格物致知最為先務今乃獨遺其本傳之文不知其所以發明此㫖者果為何說甚可惜也然而尚賴程氏之言有可以補其亡者如曰學莫先於正心誠意然欲正心誠意必先致知而欲致知又在物格致盡也格至也凡有一物必有一理窮而至之所謂格物者也然而格物亦非一端如或讀書講明道義或論古今人物而别其是非或應接事物而處其當否皆窮理也但能今日格一件明日又格一件積習既多然後脱然有貫通處又曰窮理者非謂必窮天下之理又非謂止窮得一理便到但自一身之中以至萬物之理理㑹得多自當脱然有悟處又曰格物非欲盡窮天下之物但於一事上窮盡其他可以類推至於言孝則當求其所以為孝者如何若一事上窮不得且别窮一事或先其易者或先其難者各隨人淺深譬如千蹊萬徑皆可以適國但得一道而入則可以推類而通其餘矣蓋萬物各具一理而萬物同出一原此所以可推而無不通也至於論其所以用力之本則其言又曰學道以知為先致知以敬為本又曰涵養湏是敬進學則在致知又曰致知在乎所養養知莫過於寡欲論其所以為敬之方則其言又曰主一之謂敬無適之謂一又曰但莊整齊肅則心便一一則自無非僻之干存之久而天理明矣至其門人謝良佐之言則曰敬是常惺惺法尹焞之言則曰人能收歛其心不容一物則可以謂之敬矣此皆切至之言深得聖經之旨傳文雖亡然於此可以得其梗槩矣故臣又拾遺意而論之曰天道流行造化發育凡有聲色貎象而盈於天地之間者皆物也既有是物則其所以為是物者莫不各有當然之則具於人心而自不容己是皆得於天之所賦而非人之所能為也今且以其至切而近者言之則心之為物實主於身其體則有仁義禮知之性其用則有惻隱羞惡恭敬是非之情渾然在中隨感而應各有攸主而不可亂也次而及於身之所具則其口鼻耳目四支之用又次而及於身之所接則有君臣父子夫婦長㓜朋友之常是皆必有當然之則而自不容已所謂理也外而至於人則人之理不異於已也逺而至於物則物之理不異於人也是乃書所謂降𠂻詩所謂秉彛劉子所謂天地之中子思所謂天命之性孟子所謂仁義之心程氏所謂天然自有之中張載所謂萬物之一原邵雍所謂道之形體者但其氣質有清濁偏正之殊物欲有淺深厚薄之異是以聖之與愚人之與物相與殊絶而不能同耳以其理之同故以一人之心而於天下萬物之理無不能知以其禀之異故於其理或有所不能窮也理有未窮故其知有不盡知有不盡則其心之所發必不能純於義理而無雜乎物欲之私此其所以意有不誠心有不正身有不脩而天下國家不可得而治也昔者聖人蓋有憂之是以於其始教為之小學而使人習於誠敬則所以養其徳性收其放心者已無所不用其至矣及其進乎大學則所謂格物致知云者又欲其於此有以窮究天下萬物之理而致其知識使之周徧精切而無不盡也若其用力之方則或考之事為之著或察之念慮之微或求之文字之中或索之講論之際使於身心性情之徳人倫日用之常以至天地鬼神之變鳥獸草木之宜莫不有以見其所當然而自不容已者而又從容反覆而日從事于其間以至於一日脱然而貫通焉則於天下之理皆有以究其表裏精粗之所極而吾之聰明睿知亦皆有以極其心之本體而無不盡矣凡此推演雖出管窺然實皆聖經賢傳之意造道入徳之方也抑臣聞之治古之世天下無不學之人而王者之子弟其教之為尤密蓋自其為赤子之時而教已行矣及其出就外傅則又有小學之學及其齒於胄子則又有大學之學凡所以涵養其本原開導其知識之具已先熟於為臣為子之時故其内外凝肅思慮通明之効有以見於君臨天下之日所以能秉本執要醻酢從容取是舍非賞善罰惡而姦言邪説無足以亂其心術也降及後世敎化不脩天下之人例不知學而尊且貴者為尤甚蓋㓜而不知小學之教故其長也無以進乎大學之道凡平日所以涵養其本原開導其知識者既已一切鹵莾而無法則其一旦居尊而臨下决無所恃以應事物之變而制其可否之命至此而後始欲學於小學以為大學之基則已過時而不暇矣夫手握天下之圖身據兆民之上可謂安且榮矣而其心乃茫然不知所以御之之術使中外小大之臣皆得以肆其欺蔽眩惑於前騁其擬議窺覦於後是則豈不反為大危大累而深可畏哉然而尚幸有可為者亦曰敬而已矣若能於此深思猛省痛自䇿勵兼取孟子程氏之言便從今日從事於敬以求放心則猶可以涵養本原而致其精明以為窮理之本伏惟陛下深畱聖意實下功夫不可但崇空言以應故事而已也臣義切愛君不覺煩瀆下情無任恐懼懇激之至所謂誠其意者毋自欺也臣熹曰母者禁止之辭也人心本善故其所發亦無不善但以物欲之私雜乎其間是以為善之意有所不實而為自欺耳能去其欲則無自欺而意無不誠矣如惡惡臭如好好色此之謂自慊故君子必慎其獨也臣熹曰如惡惡臭惡之深也如好好色好之切也慊快也足也獨者人所不知而已所獨知之之地也好善惡惡深切如此則是意常快足而無自欺矣必慎其獨者所以察之於隱微之間不使其有物欲之雜而為自欺也小人閒居為不善無所不至見君子而后厭然揜其不善而著其善人之視已如見其肺肝然則何益矣此謂誠於中形於外故君子必慎其獨也臣熹曰閒居獨處也厭然銷沮閉藏之貎小人為惡於隱微之中而詐善於顯明之地則自欺之甚也然既實有是惡於中則其證必見於外徒爾自欺而不足以欺人也君子之謹獨不待監此而後能然亦不敢不監此而加勉也曾子曰十目所視十手所指其嚴乎臣熹曰言雖幽隱之中吾所獨知之地而衆所共見有如此者可畏之甚也富潤屋徳潤身心廣體胖故君子必誠其意臣熹曰胖舒也言富則能潤屋矣徳則能潤身矣故心無愧怍則體常舒泰徳之潤身者然也蓋善之實於中而形於外者如此又君子之所以不可不謹獨而誠其意也臣謹按此傳之第六章承上章之言以釋經文誠意之義者也臣又詳說之曰民之秉彛本無不善故人心之發莫不知善之當為而欲為之惟其氣禀之雜物欲之私有以害之是以為善之意有所不實而不免為自欺也所謂自欺者外有欲善之形而其隱微之間常有不欲者以拒乎内也外有惡惡之狀而其隱微之間常有不惡者以主乎中也是以其外雖公而中則私其形常是而心則否是皆自欺之類也所謂誠其意者亦禁此而已矣能禁乎此則其心之所發在於好善則表裏皆好而隱微之間無一毫之不好心之所發在於惡惡則表裏皆惡而隱微之間無一毫之不惡是以其好善也如好好色其惡惡也如惡惡臭而方寸之間無有纎芥不快不足之處是則所謂自慊而意之誠也能自慊而意誠則其隱微之間無非善之實者君子於此亦致其謹而不使一毫之私得以介乎其間而已若小人之自欺則不惟形於念慮之間而必見於事為之際此知其為惡而揜之則既不足以自欺人之視已如見其肺肝則又不足以欺人亦何益之有哉此君子所以又以為戒而必謹其獨也其引曾子之言以下則所以明夫隱微之間實有不善則人皆知之如十目之所同視十手之所同指無不見之甚可畏也隱微之間實無不善則其形於外也亦然蓋多財之人其屋必羙有徳之人其身必脩其心廣大則其體必安舒此又以著理之必然而見君子所以必誠其意之指也然考之於經則所以能誠其意者乃在夫知至蓋知無不至則其於是非得失皆有以剖析於毫釐之間而心之所發必無外善内惡之弊所以有主於中有地可據而致謹於隱微之間也若知有不至則其不至之處惡必藏焉以為自欺之主雖欲致其謹獨之功亦且無主之能為而無地之可據矣此又傳文之所未發而其理已具於經者皆不可以不察也然猶為衆人言之耳若夫人君則以一身託乎兆民之上念慮之間一有不實不惟天下之人皆得以議其後而禍亂乘之又將有不可遏者其為可畏又不止於十目所視十手所指而己願陛下於此深加省察實用功夫則天下幸甚如其不然則今日區區之講讀亦徒為觀聽之美而己何益於治道有無之實以窒夫禍亂之原哉從後看起本朝太廟制見行廟今禮官等議今熹擬定室次第具位準尚書吏部牒奉聖㫖令侍從兩省臺諫禮官集議四祖祧主宜有所歸者熹今竊詳羣議其說雖多而揆以禮經皆有可疑如曰藏於太廟之西夾室則古者惟有子孫祧主上藏於祖考夾室之法而無祖考祧主下藏於子孫夾室之文昔者僖祖未遷則西夾室者僖祖之西夾室也故順翼二祖之主藏焉而無不順之疑今既祧去僖祖而以太祖祭初室矣則夾室者乃太祖之夾室自太祖之室視之如正殿之視朶殿也子孫坐於正殿而以朶殿居其祖考於禮安乎此不可之一也至於祫享則又欲設幄於夾室之前而别祭焉則既不可謂之合食而僖祖神坐正當太祖神坐之背前孫後祖此又不可之二也如曰别立一廟以奉四祖則不惟喪事即逺有毁無立而所立之廟必在偏位其棟宇儀物亦必不能如太廟之盛是乃名為尊祖而實卑之又當祫之時羣廟之主祫於太廟四祖之主祫於别廟亦不可謂之合食此又不可之三也如曰藏主於天興殿則宗廟原廟古今之禮不同不可相雜而不得合食亦與别廟無異此又不可之四也凡此數者反復尋繹皆不可行議者亦皆知其不安而不知所以然者特以其心急欲尊奉太祖三年一祫時暫東向之故而為此紛紛不復顧慮殊不知其實無益於太祖之尊而徒使僖祖太祖兩廟威靈常若相與争校强弱於冥冥之中并使四祖之神疑於受擯徬徨躑躅不知所歸令人傷痛不能自己不知朝廷方此多事之際亦何急而為此也今亦無論其他但以太祖皇帝當日追尊帝號之心而黙推之則知太祖今日在天之靈於此必有所不忍而不敢當矣又况僖祖祧主遷於治平而不過數年神宗皇帝復奉以為始祖已為得禮之正而合於人心所謂有其舉之而莫敢廢者乎且孔子論武王周公之孝而曰踐其位行其禮奏其樂愛其所親敬其所尊事死如事生事亡如事存孝之至也今天下既踐太祖之位行太祖之禮奏太祖之樂矣則當愛太祖之所親敬太祖之所尊所以事太祖者無以異於生成之時乃為至孝而議者顧欲黜其所追尊之祖考置之他所而又未有一定之處是豈所謂愛敬其所親尊而事之如生存之時乎且議者之所以必為此説者無他但以太祖膺圖受命化家為國而王業之興不由僖祖耳若以此言則后稷本封於邰而不窋已自竄於戎狄公劉太王又再遷而後定文武之興又何嘗盡出於后稷哉但推其本始為出於此故不可以不祭而祭之不可以不尊耳豈計其功徳之小大有無哉况周人雖以后稷為太祖而祭法亦曰祖文王而宗武王是乃所謂祖有功而宗有徳之意故自為世室而百世不遷以冠羣廟則亦不待東向於祫然後可以致崇極之意矣然今日宗廟之制未能如古始以權宜而論之則莫若以僖祖擬周之后稷而祭於太祖之初室順祖為昭翼祖為穆宣祖為昭而藏其祧主於西夾室太祖為穆擬周之文王為祖而祭於太廟之第二室太宗為昭擬周之武王為宗而祭於太廟之第三室其太祖太宗又皆百世不遷而謂之世室真宗為穆其祧主亦且權藏於西夾室仁宗為昭為宗而祭於第四室亦為世室如太宗之制英宗為穆藏主如真宗之制神宗為昭祭第五室哲宗為穆祭第六室徽宗為昭祭第七室欽宗為穆祭第八室髙宗為昭祭第九室孝宗為穆祔第十室異時髙宗亦當為宗為世室如太宗仁宗之制三歲祫享則僖祖東向如故而自順祖以下至于孝宗皆合食焉則於心為安而於禮為順矣至于古者宗廟之制今日雖未及議尚期異時興復之後還反舊都則述神宗之志而一新之以正千載之謬成一王之法使昭穆有序而祫享之禮行於室中則又善之大者也蓋尊太祖以東向者義也奉僖祖以東向者恩也義者天下臣子今日之願也恩者太祖皇帝當日之心也與其伸義詘恩以快天下臣子之願孰若詘義伸恩以慰太祖皇帝之心乎韓愈所謂祖以孫尊孫以祖詘者正合此意而又以為四時各祭其廟則所伸之祭常多三年然後一祫則所詘之祭常少亦中事情故熹於此嘗有感焉竊獨以為今欲議四祖神位所祔之宜而卒不免於舛逆而難通不若還僖祖於太廟三年而一東向之為順易而無事也熹孤陋寡聞所見如此昨日適以衰病不及預議伏念宗廟事重不敢緘黙須至申聞者右件如前并畫到圖子四紙繳連在前謹具狀申尚書省敕乞并賜詳酌敷奏施行伏候鈞㫖小貼子熹謹按禮家先儒之説兄弟傳國者以其嘗為君臣便同父子各為一世而天子七廟宗者不在數中此為禮之正法若今日見行廟制則兄弟相繼者共為一世而太祖増為九世宗者又在數中皆禮之末失也故熹狀中所擬太廟世數一準先儒之説固知未必可用若議者乃用今制而反不曽詳考自僖祖以至孝宗方及十世太祖太宗為第三世尚在四昭四穆之中今日祧遷只合依孝宗初年遷翼祖例且遷宣祖然後為得乃不察此而欲一旦無故并遷僖宣二祖又强析太祖太宗各為一世既與哲徽欽髙之例不同又使太廟所祀其實僅及八世進不及今之九退不成古之七尤為乖繆無所據依政使熹説迂濶多所更改不可施行其議者并遷二祖析一為二之失亦合速行改正且遷宣祖而合太祖太宗復為一世以足九世之數伏乞詳察熹既為此議續搜訪得元祐大儒程頤之説以為太祖而上有僖順翼宣先嘗以僖祧之矣介甫議以為不當祧順以下祧可也何者本朝推僖祖為始已上不可得而推也或難以以僖祖無功業亦當祧以是言之則英雄以得天下自已力為之並不得與祖徳或謂靈芝無根醴泉無源物豈有無本而生者今日天下基本盖出於此人安得謂無功業故朝廷復立僖祖廟為得禮介甫所見終是髙於世俗之儒熹竊詳頤之議論素與王安石不同至論此事則深服之以為髙於世俗之儒足以見禮義人心之所同固有不約而合者但以衆人不免自有爭較强弱之心雖於祖考亦忘遜避故但見太祖功徳之盛而僖祖則民無得而稱焉遂欲尊太祖而卑僖祖又見司馬光韓維之徒皆是大賢人所敬信其議偶不出此而王安石乃以變亂穿鑿得罪於公議故欲堅守二賢之説并安石所當取者而盡廢之所以無故生此紛紛今以程頤之説考之則可以見議論之公而百年不決之是非可坐判矣并乞詳察臣竊見太祖皇帝受命之初未遑他事首尊四祖之廟而又以僖祖為四廟之首累聖尊崇㒺敢失墜中間雖以世數寖逺遷之夾室而未及數年議臣章衡復請尊奉以為太廟之始祖宰相王安石等遂奏以為本朝自僖祖以上世次不可得而知則僖祖有廟與稷契疑無以異今欲毁其廟而藏其主替祖宗之尊而下祔於子孫非所以順祖宗之孝心也於是神宗皇帝詔従其請而司馬光韓維孫朴孫固等以為非是力奏争之其說甚詳然其立意不過以為太祖受命立極當為始祖而祫享東向僖祖初無功徳親盡當祧而已臣嘗深考其說而以人心之所安者揆之則僖祖者太祖之髙祖考也雖厯世久逺功徳無傳然四世之後篤生神孫順天應人以寧兆庻其為功徳盖不必身親為之然後為盛也是以太祖皇帝首崇立之以為初廟當此之時盖已歸徳於祖而不敢以功業自居矣今乃以欲尊太祖之故而必使之奪據僖祖初室東向之位臣恐在天之靈於此有所不忍而不敢當也安石之為人雖不若光等之賢而其論之正則有不可誣者世之論者不察乎此但見太祖功徳之盛而不知因太祖當日崇立僖祖之心以原其所自但見光等之賢非安石章衡之所及而不知反之于已以即夫心之所安是以紛紛多為異說臣嘗病其如此每恨無以正之不謂今者之來適逢此議而又以疾病之故不獲祗赴謹已略具鄙見申尚書省乞與敷奏并畫成圖本兼論古今宗廟制度得失因又訪得元祐大儒程頤所論深以安石之言為當貼說詳盡而所論并祧二祖上成八世之說尤為明白未知已未得達聖聴欲乞宣問詳賜覽觀并下此奏别令詳議以承太祖皇帝尊祖敬宗報本反始之意上延基祚下一民聴千萬幸甚取進止乞降付尚書省貼黄臣竊見今者羣臣所議奉安四祖之禮多有未安盖不遷僖祖則百事皆順一遷僖祖則百事皆舛雖復巧作囘互終不得其所安而又當此人心危疑之際無故遷移國家始祖之祀亦惑衆聴實為非便而或者以為前日之議已奉聖㫖恭依難復更改臣竊詳治平四年三月議者請遷僖祖已詔恭依至熙寧五年十一月因章衡王安石等申請復還僖祖又詔恭依盖宗廟事重雖已施行理或未安不容不改伏乞聖照議祧廟劄子臣前日面奏祧廟事伏䝉聖慈宣諭若曰僖祖自不當祧髙宗即位時不曽祧壽皇即位時亦不曽祧太上即位時又不曽祧今日豈可容易臣恭承聖訓仰見陛下聖學髙明燭見事理尊事宗廟决定疑惑至孝至明非羣臣所能及不勝嘆仰然今已多日未聞降出臣元奏劄子付外施行竊慮萬機之繁未及指揮欲望聖明早賜處分臣不勝幸甚乞降付尚書省進擬詔意廟議劄状并圖包括古今曲盡底藴非獨可為今日之法亦可留備他日稽考不若降出更令詳議如彼說妄便可反覆剖析以盡同異如彼説是此便不當固執如但含糊直降指揮却恐不厭衆心反有輕率偏徇之誚若必不欲降出再議即當擬定詔意乞降御筆指揮然終不若再議之為善也其詔意如左云昨因臣僚請遷僖祖皇帝而尊太祖皇帝為初室将来祫享即正東向之位當已恭依今復思之殊有未便盖太廟見祀九世十二室僖祖自熙寧以来尊為始祖祭于初室百世不遷遇祫享日即居東向之位已合典禮有其舉之莫敢廢也太祖尚在四昭四穆之内亦未合便居初室亟正東向却使太廟止成八世而四祖不得合食不若上存僖祖為初室東向如故而遷宣祖一世於西夾室太祖太宗仁宗三室亦為百世不遷之廟将來永不祧毁庻幾有以仰順祖宗之孝心不至妄減太祖世數且符合食之義以副朕欽承宗廟之意其闕月闕日閏十月闕日兩次已降指揮更不施行山陵議状具位臣朱熹凖尚書吏部牒十月九日􅓖宫覆按使孫逢吉状定到大行至尊壽皇聖帝神穴事三省樞宻院同奉聖㫖令侍從臺諌限三日集議聞奏臣方欲赴臺集議忽聞朝廷已别差官前去宣諭即與衆官具状申省别聴指揮外臣竊有愚見深恐言之不早有誤大計須至先具奏聞者右臣竊惟至尊壽皇聖帝聖徳神功覆冒寰宇深仁厚澤浸潤生民厭世上賓率土哀慕宜得吉土以奉衣冠之藏垂裕後昆永永無極而因山之卜累月于兹議論紛紜訖無定說臣嘗竊究其所以皆縁専信臺史而不廣求術士必取國音坐丙向壬之穴而不博訪名山是以粗畧茍簡唯欲祔於紹興諸陵之旁不惟未必得其形勢之善若其穴中水泉之害地面浮淺之虞偪仄傷破之餘驚動諸陵之慮雖明知之亦不暇顧羣臣議者又多不習此等猥賤之末術所以不能堅决剖判致煩明詔博訪在廷臣實痛之其敢無辭以對臣盖聞之𦵏之為言藏也所以藏其祖考之遺體也以子孫而藏其祖考之遺體則必致其謹重誠敬之心以為安固久逺之計使其形體全而神靈得安則其子孫盛而祭祀不絶此自然之理也是以古人之𦵏必擇其地而卜筮以决之不吉則更擇而再卜焉近世以來卜筮之法雖廢而擇地之說猶存士庻稍有事力之家欲𦵏其先者無不廣招術士博訪名山參互比較擇其善之尤者然後用之其或擇之不精地之不吉則必有水泉螻蟻地風之屬以賊其内使其形神不安而子孫亦有死亡絶滅之憂甚可畏也其或雖得吉地而𦵏之不厚藏之不深則兵戈亂離之際無不遭罹發掘暴露之變此又其所當慮之大者也至於穿鑿已多之處地氣已洩雖有吉地亦無全力而祖塋之側數興土功以致驚動亦能挻災此雖術家之說然亦不為無理以此而論則今日明詔之所詢者其得失大槩已可見矣若夫臺史之說謬妄多端以禮而言則記有之曰死者北首生者南向皆從其朔又曰𦵏於北方北首三代之達禮也即是古之𦵏者必坐北而向南盖南陽而北隂孝子之心不忍死其親故雖𦵏之於墓猶欲其負隂而抱陽也豈有坐南向北反背陽而向隂之理乎若以術言則凡擇地者必先論其主勢之强弱風氣之聚散水土之淺深穴道之偏正力量之全否然後可以較其地之美惡政使實有國音之説亦必先此五者以得形勝之地然後其術可得今乃全不論此而直信其庸妄之偏説但以五音盡類羣姓而謂塜宅向背各有所宜乃不經之甚者不惟先儒已力辨之而近世民間亦多不用今乃以為祖宗以来世守此法順之則吉逆之則凶則姑亦無問其理之如何但以其事質之則其謬不攻而自破矣盖自永安遷奉以来已遵用此法而九世之間國統再絶靖康之變宗社為墟髙宗中興匹馬南渡壽皇復自旁支入繼大統至於思陵亦用其法而壽皇倦勤之後旋即升遐太上違豫日久以至遜位赤山亦用其法而荘文魏邸相繼薨謝若曰吉凶由人不在於地不有所廢其何以興則國音之說自為無用之談從之未必為福不從未必為禍矣又何為信之若是其篤而守之若是其嚴哉若曰其法果驗不可改易則洛越諸陵無不坐南而向北固已合於國音矣又何吉之少而凶之多耶臺史之言進退無據類皆如此試加詰問使之置對必無辭以自解矣若以地言則紹興諸陵臣所未覩不敢輕議然趙彦逾固謂舊定神穴土肉淺薄開深五尺下有水石難以安建矣而荆大聲者乃謂新定東頭之穴比之先定神穴髙一尺一寸五分開深九尺即無水石臣嘗詳考二人之言反復計度新穴比之舊穴只髙一尺一寸五分則是新穴開至六尺一寸五分則與舊穴五尺之下有水石處髙低齊等如何却可開至九尺而其下二尺八寸五分者無水石耶且大聲既知有此無水吉穴當時便當指定何故却定土肉淺薄下有水石之處以為神穴直至今日前說漏露無地可𦵏然後乃言之耶其反復謬妄小人常態雖若不足深責然其姦心乃欲奉壽皇梓宫置之水中而略不顧忌則其罔上迷國大逆無道之罪不容誅矣脫使其言别有曲折然一坂之地其廣幾何而昭慈聖皇皇后已用之矣徽宗一帝二后又用之矣髙宗一帝一后又用之矣計其地氣已發洩而無餘行圍巡路下宫之屬又已迫狹之甚不可移減今但就其空處即以為穴東西趲那或逺或近初無定論盖地理之法譬如針炙自有一定之穴而不可有毫釐之差使醫者之施砭艾皆如今日臺史之定宅兆則攻一穴而徧身皆創矣是又安能得其穴道之正乎若果此外别無可求則亦無可奈何而今兩浙數州皆為近甸三二百里豈無一處可備選擇而獨遷就偪仄於此數步之間耶政使必欲求得離山坐南向北之地亦當且先泛求壮厚髙平可𦵏之處然後擇其合於此法者况其謬妄不經之說初不足信也耶臣自南来經由嚴州富陽縣見其江山之勝雄偉非常盖富陽乃孫氏所起之處而嚴州乃髙宗受命之邦也説者又言臨安縣乃錢氏故鄉山川形勢寛平邃宻而臣未之見也凡此數處臣雖未敢斷其必為可用然以臣之所已見聞者逆推其未見未聞安知其不更有佳處萬萬於此而灼然可用者乎但今偏信臺史之言固執紹興之說而不肯求耳若欲求之則臣竊見近年地理之學出於江西福建者為尤盛政使未必皆精然亦豈無一人粗知梗槩大畧平穩優於一二臺史者欲望聖明深察此理斥去荆大聲置之於法即日行下兩浙帥臣監司疾速搜訪量支路費多差人兵轎馬津遣赴闕令於近甸廣行相視得五七處然後遣官按行命使覆按不拘官品但取通曉地理之人參互考校擇一最吉之處以奉壽皇神靈萬世之安雖以迫近七月之期然事大體重不容茍簡其孫逢吉所謂少寛日月别求吉兆為上此十字者實為至論惟陛下采而用之庻幾有以少慰天下臣子之心用為國家祈天永命之助臣本儒生不曉術數非敢事以淫巫瞽史之言眩惑聖聴自速譏誚盖誠不忍以壽皇聖體之重委之水泉沙礫之中殘破浮淺之地是以痛憤激切一為陛下言之譬如鄉隣親舊之間有以此等大事商量吾乃明知其事之利害必至於此而不盡情以告之人必以為不忠不信之人而况臣子之於君父又安忍有所顧望而黙黙無言哉惟陛下詳賜省察斷然行之則天下萬世不勝幸甚謹録奏聞伏候勅㫖乞付尚書省臺吏之恐當作史晦菴
