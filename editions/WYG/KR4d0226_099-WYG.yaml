  text: 九十九
  hash: sha256:185f23bea0a1fac274cadd6d191dc3457c39f3bee9190d1386a058a0f81d7c32
body:
  text: 宋朱子撰公移知南康榜文當職久以疾病退伏里閭比蒙誤恩假守兹土懇辭不獲扶曳而來到任之初伏自惟念聖天子所以搜揚幽隠付畀民社之意固將使之宣明教化寛恤民力非徒責以簿書期㑹之最而已顧雖不能其敢不勉今有合行詢訪勸喻事件下項一本軍土瘠民稀役煩税重前後長吏非不欲多方措置寛恤民力實縁上供官物既已浩瀚軍用所資亦復不少只得逐急了辦目前更無餘力可以議此是知民力日困無復安土樂生之心深可哀憐安忍坐視今恐管下士人父老僧道軍民諸色等人有能知得利病根原次第合作如何措置可以寛䘏並請子細開具著實事狀不拘早晚赴軍披陳切待面加詢問審實相度多方措置庶幾户口嵗増家給人足有以仰副聖天子愛養元元之意一本軍民俗號稱淳厚庭少諍訟獄少係囚及按圖經前代有太中大夫司馬暠司徒從事中郎司馬延義宜春縣令熊仁贍皆以孝行顯名及至國初又有義門洪氏亦以累世義居􅄔婦陳氏守節不嫁遂蒙太宗皇帝賜以宸翰寵以官資旌表門閭蠲除徭役此足見其風俗之美非他郡之所及又況天性人心不易之理在昔既有今豈無之患在師帥不良不加敦勸是致頽靡日陷偷薄今請管下士民鄉鄰父老嵗時集㑹並加教戒間或因事反復丁寜使後生子弟咸知修其孝弟忠信之行入以事其父兄出以事其長上敦厚親族和睦鄉鄰有無相通患難相恤庶幾風俗之美不愧古人有以仰副聖天子敦厚風俗之意一本軍背負匡廬前据彭蠡地勢雄秀甲於東南禹跡所經太史所遊有聖賢之遺風下逮東晉陶氏則長沙靖節祖孫相望爰及聖朝劉氏則屯田祕丞父子相繼皆有徳業著在丹青宜其風聲氣俗猶有存者後來之秀接踵比肩而比年以來士風衰弊而學校養士不過三十人大比應書人數亦少雖講道修身之士或未必肯遊學校入場屋然詢於物論以求物外之英豪則亦未聞卓然有可稱良由長民之吏未嘗加意使里閭後生無所從學以至於此今請鄉黨父兄各推擇其子弟之有志於學者遣來入學陪厨待補聴講供課本軍亦一面多方措置増置學糧當職公務之餘亦當時時詣學與學官同共講説經㫖多方誘掖庶幾長材秀民為時而出有以仰副聖天子長育人材之意右出榜星子都昌建昌縣并市曹曉諭管下士民父老等請詳前項事理逐一尊稟仰副聖朝愛民敦化之美意并牒三縣照㑹及别給印榜毎縣各一百道委巡尉分下鄉村張掛不得隠匿并牒軍學教授請從長相度合如何増添贍學錢糧脩立課試規矩開具回報切待措置施行又牒頭同南康榜文但改寛䘏民力為敦厲風俗合行詢訪勸諭為合行詢究一晉侍中太尉長沙陶威公興建義旗匡復帝室勤勞忠順以没其身今按圖經公始家鄱陽後徙尋陽見有遺跡在本軍都昌縣界及有廟貎在本軍城内及都昌縣水旱禱禳皆有感應未委上件事迹是與不是詣實一晉太傅廬陵謝文靖公始自隠淪已推時望及登宰輔優有武功今按圖經公始封建昌即本軍之建昌縣未審本縣曽與不曽建立祠宇一晉靖節徴士陶公先生隠遯髙風可激貪懦忠義大節足厚彞倫今按圖經先生始自柴桑徙居栗里其地在本軍近治三十里内未委本處曽與不曽建立祠宇一按圖經建昌縣有陳太中大夫司馬暠司徒從事中郎司馬延義皆以孝行見於陳書有墓在本縣界又有唐宜春縣令熊仁贍亦以孝行旌表門閭未委其墓及唐朝所表門閭有無損壊一按圖經白鹿洞學館雖起南唐至國初時猶存舊額後乃廢壊未委本處目今有無屋宇一按圖經建昌縣義門洪氏本以累世義居􅄔婦守節嘗蒙太宗皇帝賜以宸翰寵以官資旌表門閭蠲除徭役未委其家目今有無子孫依舊義居所藏御書見作如何崇奉所表門閭曽與不曽修葺一濂溪先生虞部周公心傳道統為世先覺熈寜中曽知本軍未委軍學曾與不曽建立祠貎一西澗先生屯田劉公避世清朝髙蹈物表其子祕丞公亦以博聞勁節見知於故司馬文正公與修資治通鑑而所著十國紀年通鑑外紀又自别行於世故黄門蘇文定公嘗以冰清玉剛比其父子而鄉人因以冰玉名其所居之堂今按圖經西澗舊有劉居士庵及訪聞城西能仁寺側有劉公墓及太史范公所撰祕丞墓碣獨冰玉堂無所登載未審其墓是與不是的實庵堂墓碣曾與不曾損壊一訪聞故贈諫議大夫陳忠肅公曽居本軍未委日前有何遺跡一竊恐本軍更有前代忠臣孝子義夫節婦圖經文字有失該載及目今見有似此之人或山林之間科舉之外别有懐材抱藝守道晦迹之士亦合廣行詢訪有無遺逸右牒教授楊迪功司户毛迪功請詳逐項事理廣行詢究取見詣實逐一子細條具回申以慿稽考别行措置仍榜客位遍呈寄居過往賢士大夫恐有知得本軍上件事迹詳細切幸特賜開諭及榜示市曹仰居民知委如有知得上件事迹詳細之人仰子細具狀不拘早晚赴軍衙申説切待併行審實措置施行淳熈六年四月日榜白鹿洞牒契勘本軍廬山白鹿洞書院於國朝㑹要本軍圖經記文石刻元係唐朝李賓客渤隠居舊有臺榭環以流水雜植花木為一時之勝南唐昇元中因建學館買田以給諸生學者大集乃以國子監九經李善道為洞主掌其教授至本朝太平興國二年知江州周述言廬山白鹿洞學徒嘗數十百人望賜九經書使之肄習詔從其請俾國子監給以印本仍傳送之七年又以洞主明起為蔡州襃信縣主簿七年始置南康軍遂屬郡境至祥符初直史館孫冕請以為歸老之地及卒還塟其所其子比部郎中琛復置學館十間書白鹿洞之書堂六字揭於楹間以教子弟四方之士願就學者亦給其食當塗郭祥正實為之記後經兵亂屋宇不存其記文石刻遂徙置軍城天慶觀昨來當職到任之初即嘗詢訪未見的實近因按視陂塘親到其處觀其四面山水清邃環合無市井之喧有泉石之勝真羣居講學遯迹著書之所因復慨念廬山一帯老佛之居以百十計其廢壊無不興葺至於儒生舊館只此一處既是前朝名賢古迹又蒙太宗皇帝給賜經書所以教養一方之士徳意甚美而一廢累年不復振起吾道之衰既可悼懼而太宗皇帝敦化育材之意亦不著於此邦以傳於後世尤長民之吏所不得不任其責者其廬山白鹿書院合行修立云云示俗孝經云用天之道因地之利謂依時及節耕種田土謹身節用謹身謂不作非違不犯刑憲節用謂省使儉用不妄耗費以養父母人能行此三句之事則身安力足有以奉養其父母使其父母安穏快樂此庶人之孝也庶人謂百姓也能行此上四句之事方是孝順雖是父母不存亦須如此方能保守父母産業不至破壊乃為孝順若父母生存不能奉養父母亡殁不能保守便是不孝之人天所不容地所不載幽為鬼神所責明為官法所誅不可不深戒也以上孝經庶人章正文五句係先聖至聖文宣王所説奉勸民間逐日持誦依此經解説早晚思惟常切遵守不須更念佛號佛經無益於身枉費力也曉諭兄弟争財産事照對禮經凡為人子不蓄私財而律文亦有别籍異財之禁葢父母在上人子一身尚非自己所能専有豈敢私蓄財貨擅据田園以為己物此乃天性人心自然之理先王制禮後王立法所以順之而不敢違也當職昨來到任之初詢訪民俗考按圖經曾以司馬大夫司馬中郎熊縣令洪義門孝行義居事跡勸諭士民務修孝弟忠信之行入事父兄出事長上敦厚親族和睦鄉鄰有無相通患難相恤庶幾有以仰副聖天子敦厚風俗之意今已累月而誠意不孚未有顯効比閲詞訴有建昌縣劉珫兄弟都昌縣陳由仁兄弟並係母親在堂擅將家産私下指撥分併亙相推託不納賦税争論到官殊駭聞聴除已行下建昌縣及索到陳由仁等指撥闗約盡已毁抹當㕔説諭令劉珫陳由仁與其兄弟依舊同居共財上奉母親下率弟姪協力家務公共出納輸送官物外竊慮管屬更有似此棄違禮法傷害風教之人而長吏不能以時教訓糾禁上負承流宣化之責内自循省不勝恐懼今檢坐條法指揮下項須至曉諭者凖律云云右除已出榜市曹并星子縣門都昌建昌縣市張掛曉示人户知委如有祖父母父母在堂子孫擅行違法分割田産析居别籍異財之人仰遵依前項條法指揮日下具狀將所立闗納赴官陳首毁抹改正侍奉父母協和兄弟同管家務公共出納輸送官物不得拖欠如不遵今來約束却致違犯到官之人必定送獄依法㫁辠云云淳熈六年八月日榜勸農文當職久處田間習知穡事兹忝郡寄職在勸農竊見本軍已是地瘠税重民間又不勤力耕種耘耨鹵莽滅裂較之他處大段不同所以土脈疎淺草盛苗稀雨澤稍愆便見荒歉皆縁長吏勸課不勤使之至此深懼無以下固邦本仰寛顧憂今有合行勸諭下項一大凡秋間收成之後須趂冬月以前便將户下所有田段一例犂翻凍令酥脆至正月以後更多著遍數節次犂杷然後布種自然田泥深熟土肉肥厚種禾易長盛水難乾一耕田之後春間須是揀選肥好田段多用糞壤拌和種子種出秧苗其造糞壤亦須秋冬無事之時預先剗取土面草根㬠曝燒灰施用大糞拌和入種子在内然後撒種一秧苗既長便須及時趂早栽挿莫令遲緩過却時節一禾苗既長稈草亦生須是放乾田水子細辨認逐一拔出踏在泥裏以培禾根其塍畔斜生茅草之屬亦須節次芟削取令净盡免得分耗土力侵害田苗將來榖實必須繁盛堅好一山原陸地可種粟麥麻豆去處亦須趂時竭力耕種務盡地力庶幾青黄未交之際有以接續飲食不至飢餓一陂塘之利農事之本尤當協力興修如有怠惰不趂時工作之人仰衆列狀申縣乞行懲戒如有工力浩瀚去處私下難以糾集即仰經縣自陳官為修築如縣司不為措置即仰經軍投陳切待别作行遣一桑麻之利衣服所資切須多種桑柘麻苧婦女勤力養蠶織紡造成布帛其桑木毎遇秋冬即將旁生拳曲小枝盡行斬削務令大枝氣脈全盛自然生葉厚大餧蠶有力一大凡農桑之務不過前項數條然鄉土風俗亦自有不同去處尚恐體訪有所未盡更宜廣詢博訪謹守力行只可過於勤勞不可失之怠惰傳曰民生在勤勤則不匱經曰惰農自安不昏作勞不服田畝越其罔有黍稷此皆聖賢垂訓明白凡厥庶民切宜遵守右今印榜勸諭民間各請體悉前件事理父兄教誨子弟子弟遵承教誨務敦本業耕耘收歛以養父母毋或惰游賭博喫酒妨廢農桑庶幾衣食給足禮義興行感召和平共躋仁夀淳熈六年十二月日勸農文竊惟民生之本在食足食之本在農此自然之理也若夫農之為務用力勸趨事速者所得多不用力不及時者所得少此亦自然之理也本軍田地磽确土肉厚處不及三五寸設使人户及時用力以治農事猶恐所收不及他處而土風習俗大率懶惰耕犂種蒔既不及時耘耨培糞又不盡力陂塘灌溉之利廢而不修桑柘麻苧之功忽而不務此所以營生足食之計大抵疎畧是以田疇愈見瘦瘠收拾轉見稀少加以官物重大别無資助之術一有水旱必至流移下失祖考傳付之業上虧國家經常之賦使民至此則長民之吏勸農之官亦安得不任其責哉當職久在田園習知農事到官日久目覩斯弊恨以符印有守不得朝夕出入阡陌與諸父兄率其子弟從事於耘鋤耒耜之間使其婦子含哺鼓腹無復飢凍流移之患庶幾有以上副聖天子愛養元元夙夜焦勞惻怛之意昨去冬嘗印榜勸諭管内人户其於農畝桑蠶之業孝弟忠信之方詳備悉至諒已聞知然近以春初出按外郊道傍之田猶有未破土者是父兄子弟猶未體當職之意而不能勤力以趨時也念以教訓未明未忍遽行笞責今以中春舉行舊典奉宣聖天子徳意仍以舊榜并星子知縣王文林種桑等法再行印給凡我父兄及汝子弟其敬聴之哉試以其説隨事推行於朝夕之間必有功効當職自今以往更當時出郊野巡行察視有不如教罰亦必行先此勸諭各宜知悉勸諭築埂岸今曉示農民火急趂此未耕種之際遞相勸率各將今秋田畝開濬陂塘修築埂岸毋至後時追悔毋及二月日榜勸諭救荒契勘本軍管内久闕雨澤祈禱未應田禾已有乾損去處皆由長吏不明政刑乖錯致此災殃永念厥愆實深悼懼除已具申朝省及諸監司乞行寛恤賑濟及檢計軍倉兩縣常平米見管萬數不少又已多方招邀米船日近出糶仍兑借諸色錢往外州循環收糴凖備賑濟況朝廷愛民如子聞此災傷非晚必有存恤指揮將來决然不至大段狼狽今有預行勸諭將來事件下項一本軍日前災傷人户多至流移一離鄉土道路艱辛往往失所甚者横有死亡抛下墳墓田園屋宇便無人為主一向狼藉至今遺跡尚有存者詢問來歴令人痛心况今淮南湖北等路亦不甚熟捨此往彼等是飢餓有何所益今勸人户各體州縣多方救恤之意仰俟朝廷非常寛大之恩各且安心著業更切祈禱神明車戽水漿救取見存些少禾榖依限陳訴所傷田段頃畝聴候官司減放税租賑濟米斛不可容易流移别致後悔一今勸上户有力之家切須存恤接濟本家地客務令足食免致流移將來田土抛荒公私受弊一今勸上户接濟佃火之外所有餘米即須各發公平廣大仁愛之心莫增價例莫減升㪷日逐細民告糴即與應副則不惟貧民下户獲免流移飢餓之患而上户之所保全亦自不為不多其糶米數多之人官司必當施行保明申奏推賞其餘措借出放亦許自依鄉例將來填還不足官司當為根究如有故違不肯糶米之人即仰下户經縣陳訴從官司究實一今勸貧民下户既是平日仰給於上户今當此凶荒又須賴其救濟亦仰各依本分凡事循理遇闕食時只得上門告糴或乞賖借生榖舉米如妄行需索皷衆作閙至奪錢米如有似此之人定當追捉根勘重行决配逺惡州軍其尤重者又當别作行遣一早禾已多損旱無可奈何只得更將早田多種蕎麥及大小麥接濟食用曉諭逃移民户檢㑹趙知軍任内訪聞本軍三縣民貧年榖稍不登熟往往捨墳墓離鄉井轉移之他者非其本心逃移未出境而豪右請佃之狀已至縣司其弊多端或止押狀而無户帖或逃請因而冒耕者或計㑹鄉司作逃移多年而免科例者或有户帖而官無簿者或免科例限滿而詭名冒請者或有强占而人不可誰何者所有都分之内遞相容蔽遂至租税皆無稽考及其陳狀歸業鄉司邀阻及上户强占百般沮難淹留嵗月無以自明又復棄之而去深可矜䘏已散榜管下縣分元給曉諭切慮文榜沈匿合行再給文榜曉諭右今印榜曉示逃移民户具狀赴使軍陳訴切待追人根究施行各令知悉減木炭錢曉諭近據人户陳訴木炭折錢太重遂行申請乞行均減今凖提㸃鑄錢衙委官考究科敷輕重及水程近逺特行裁減自淳熈七年為始數内建昌縣毎料元科錢貳百陸拾文省今裁減錢四十文省實納錢二百二十文省除已出榜縣市曉示人户知悉外竊恐鄉村人户未能通知須至散榜曉示者右出榜建昌縣管下鄉村曉示人户知悉据户下合納木炭斤秤依今來減定實錢送納如本縣鄉司人吏輒敢過數催科即仰人户徑赴本軍陳訴切待追人根勘㫁勒各令知悉夏税牌由契勘人户遞年送納夏税和買本色折帛錢多是無慿照應合納數目是致送納或多或少及有人户在約束前已納之數當來亦無照慿兼下户不成端疋之數依已降指揮每尺納錢一百文足已行下星子都昌建昌縣毎户置立牌由分明開説某啚某都人户合納夏税折帛和買紬絹各若干給付人户收執須管於省限内盡數具鈔同牌由赴場照數送納如不賫牌由同鈔前來定不交受其有人户在今來約束以前赴所屬送納者亦仰給付牌由數内若有少欠仰人户照牌由數目依數納足須至曉諭受納秋苗曉諭檢㑹趙知軍任内契勘星子都昌建昌縣毎年受納人户秋苗所收水脚雇船起綱頭子市例等錢數多是人户輸納重有所費深屬不便使軍今將三縣人户應合納秋苗每正米一石收雇船水脚起綱頭子并専㪷市例總減作六百七十文足其勘合促零錢係照鈔收納除外並不得多交民户一文竊慮合干人依前例外非理巧作名目别行乞覔錢米已散榜管下縣分曉諭切慮元給文榜沈匿合行再給文榜曉諭者右除已再牒受納官常切鈐束外今立賞錢三十貫文出榜縣管下要閙處張掛曉示人户知悉自今後應輸納户下米斛每正米一碩除前項立定雇船起綱市例錢六百七十文足并隨鈔收勘合促零錢外不許例外乞覔民户一文如有合千人依前例外非理巧作名目别作乞錢米之人不拘多寡許人户經官陳告將犯人根究依條㫁勘罪追賞施行的不虚示各令知悉減秋苗照對本軍去年交納人户秋苗每一石正米連省耗加耗共計一石七㪷六升今年冬米許人户從便赴軍倉交納今於去年所納數上每一石更與减米一㪷合行曉示者曉示人户送納秋苗契勘管屬都昌建昌縣遞年所納人户秋苗並係起發上供之數縁是工户攬子等人把持縣道兠収在已與公吏通同作弊拖延不納窺伺縣道窘束全無措置即將下等秈米以應副預借為名動欲減饒合數唯是循良細民各縣却復倍收加耗髙量斛面多端邀阻及勒令折錢將收到水脚錢等侵移使用緣此起發綱運大段遲滯且又欠折不足事係利害今照淳熈六年苗米起催在即若不預行措置定致上供轉見拖壓細民愈受重困今相度欲互差都昌建昌縣官前去各縣受納與減加耗縻費之類令人户自行打盪斛面不得阻節如有諸鄉人户情願赴軍倉輸納苗米並聼從便重與優加裁減務使樂輸及行下約束都昌建昌縣不許預借官物如有不遵約束輒將米斛預借縣道本軍將來並不理為納過之數本軍除已具申諸監司照㑹外須至曉示曉示科賣民户麴引及抑勒打酒勘㑹民間吉凶㑹聚或修造之類若用酒依條聴隨力沽買如不用亦從其便並不得抑勒今訪聞諸縣並佐官㕔每遇人户闕輒以承買麴引為名科納人户錢物以至坊場違法抑勒人户打酒切恐良民被害婚塟造作失時須至約束右今印榜曉示民户知悉今後如遇吉凶聚㑹或修造之類官司輒敢科買麴引或酒務坊場抑勒買酒並仰指定見證具狀徑赴使軍陳告切待拘收犯人根勘依條施行約束科差夫役訪聞管下諸縣以和雇為名科差夫力應副過往官員修造船扛諸般役使以至縣官出入公幹亦令保正長闗唤夫力荷轎擔擎有妨農業甚者至令陪貼錢物為害尤甚除已行下約束外如更有似此去處仰被擾人户徑赴本軍投訴切待依法重作施行約束差公人及朱鈔事應今後本縣違法輒差公人下鄉追擾許人户赴軍陳訴定追犯人重㫁應軍縣倉庫送納過人户錢米經日不得朱鈔仰人户赴軍陳訴定追犯人勘㫁當官給還應人户二税如已送納獲鈔而本縣重叠追擾許人户執鈔赴軍陳訴定追承行鄉司等人重㫁勒罷社倉事目勅命并跋語附宣教郎直祕閣新提舉兩浙東路常平茶鹽公事朱熹今具社倉事目如後一逐年十二月分委諸部社首保正副將舊保簿重行編排其間有停藏逃軍及作過無行止之人隠匿在内仰社首隊長覺察申報尉司追捉解縣根究其引致之家亦乞一例㫁罪次年三月内將所排保簿赴鄉官交納鄉官㸃檢如有漏落及妄有増添一户一口不實即許入告審實申縣乞行根治如無欺弊即將其簿紐算人口指定米數大人若干小兒減半候支貸日將人户請米狀拖對批填監官依狀支散一逐年五月下旬新陳未接之際預於四月上旬申府乞依例給貸仍乞選差本縣清强官一員人吏一名㪷子一名前來與鄉官同共支貸一申府差官訖一面出榜排定日分分都支散先逺後近一日一都曉示人户産錢六百文以上及自有營運衣食不闕不得請貸各依日限具狀狀内開説大人小兒口數結保每十人結為一保遞相保委如保内逃亡之人同保均備取保十人以下不成保不支正身赴倉請米仍仰社首保正副隊長大保長並各赴倉識認面目照對保簿如無偽冒重疊即與簽押保明其社首保正等人不保而掌主保明者聴其日監官同鄉官入倉據狀依次支散其保明不實别有情弊者許人告首隨事施行其餘即不得妄有邀阻如人户不願請貸亦不得妄有抑勒一收支米用淳熈七年十二月本府給到新添黒官桶及官㪷毎桶受米五筲半仰㪷子依公平量其監官鄉官人從逐㕔只許兩人入中門其餘並在門外不得近前挨拶攙奪人户所請米斛如違許被擾人當㕔告覆重作施行一豐年如遇人户請貸官米即開兩倉存留一倉若遇饑歉則開第三倉専賑貸深山窮谷耕田之民庶幾豐荒賑貸有節一人户所貸官米至冬納還不得過十一月下旬先於十月上旬定日申府乞依例差官將帯吏㪷前來公共受納兩平交量舊例每石收耗米二㪷今更不收上件耗米又慮倉厫折閲無所從出毎石量收三升凖備折閲及支吏㪷等人飯米其米正行附厯收支一申府差官訖即一面出榜排定日分分都交納先近後逺一日一都仰社首隊長告報保頭保頭告報人户遞相糾率造一色乾硬糙米具狀同保共為一狀未足不得交納如保内有人逃亡即同保均備納足赴倉交納監官鄉官吏㪷等人至日赴倉受納不得妄有阻節及過數多取其餘並依給米約束施行其收米人吏斗子要知首尾次年夏支貸日不可差換一收支米訖逐日轉上本縣所給印厯事畢日具總數申府縣照㑹一每遇支散交納日本縣差到人吏一名㪷子一名社倉算交司一名倉子兩名每名日支飯米一㪷約半月發遣褁足米二石共計米一十七石五斗又貼書一名貼斗一名各日支飯米一斗約半月發遣褁足米六斗共計四石二斗縣官人從七名鄉官人從共一十名每名日支飯米五升十日共計米八石五斗已上共計米三十石二斗一年收支兩次共用米六十石四斗逐年葢牆并買藳薦修補倉厫約米九石通計米六十九石四斗一排保式某里第某都社首某人今同本都大保長隊長編排到都内人口數下項甲户大人若干口小兒若干口居住地名某處或産户開説産錢若干或白煙耕田開店買賣土著外來係某年移來逐户開列餘開右某等今編排到都内人户口數在前即無漏落及増添一户一口不實如招人户陳首甘伏解縣㫁罪謹狀年月日大保長姓名押狀隊長姓名保正副姓名社首姓名一請米狀式某都第某保隊長某人大保長某人下某處地名保頭某人等幾人今遞相保委就社倉借米每大人若干小兒減半候冬收日備乾硬糙米每石量收耗米三升前來送納保内一名走失事故保内人情願均備取足不敢有違謹狀年月日保頭姓名甲户開名大保長姓名隊長姓名保長姓名社首姓名一社倉支貸交收米斛合係社首保正副告報隊長保長隊長保長告報人户如闕隊長許人户就社倉陳説告報社首依公差補如闕社首即申尉司定差一簿書鎖鑰鄉官公共分掌其大項收支須監管官簽押其餘零碎出納即委鄉官公共掌管務要均平不得徇私容情别生奸弊一如遇豐年人户不願請貸至七八月而産户願請者聴一倉内屋宇什物仰守倉人常切照管不得毁損及借出他用如有損失鄉官㸃檢勒守倉人備償如些小損壊逐時修整大段改造臨時具因依申府乞撥米斛具位朱熹奏節文一臣所居建寜府崇安縣開耀鄉有社倉一所其法可以推廣行之他處欲望聖慈行下諸路州軍曉諭人户有願置立者州縣量支常平米斛責付本鄉出等人户主執歛散隨宜立約實為久逺之利其建寜府社倉見行事目謹録一道進呈伏望聖慈詳察特賜施行十一月二十八日三省同奉聖㫖令户部看詳聞奏􅃯命行在尚書户部凖淳熈八年十二月二十八日􅃯中書門下省尚書省送到户部狀凖淳熈八年十一月二十八日尚書省送到宣教郎直秘閣新提舉兩浙東路常平茶鹽公事朱熹劄子奏臣所居建寜府崇安縣開耀鄉有社倉一所係昨乾道四年鄉民艱食本府給到常平米六百石委臣與本鄉土居朝奉郎劉如愚同共賑貸至冬收到元米次年夏間本府復令依舊貸與人户冬間納還臣等申府措置每石量收息米二斗自後逐年依此歛散或遇小歉即蠲其息之半大饑即盡蠲之至今十有四年量支息米造成倉厫三間收貯已將元米六百石納還本府其見管三千一百石並是累年人户納到息米已申本府照㑹將來依前歛散更不收息每石只收耗米三升係臣與本鄉土居官及士人數人同共掌管遇斂散時即申府差縣官一員監視出納以此之故一鄉四五十里之間雖遇凶年人不闕食竊謂其法可以推廣行之他處而法令無文人情難强妄意欲乞聖慈特依義役體例行下諸路州軍曉諭人户有願依此置立社倉者州縣量支常平米斛責與本鄉出等人户主執斂散每石收息二斗仍差本鄉土居官員士人有行義者與本縣官同共出納收到息米十倍本米之數即送元米還官却將息米歛散毎石只收耗米三升其有富家情願出米作本者亦從其便息米及數亦與撥還如有鄉土風俗不同者更許隨宜立約申官遵守實為久逺之利其不願置立去處官司不得抑勒則亦不至搔擾此皆今日之言雖無所濟於目前之急然實公私儲蓄預備久逺之計及今歉嵗施行人必願從者衆伏望聖慈詳察特賜施行取進止三省同奉聖㫖令户部㸔詳聞奏本部今檢凖紹興重修常平免役令下項諸州常平錢榖及場務錢不足申提舉司通一路之數移用仍聴互相兑便支撥諸義倉附常平倉監専兼管厫屋以轉運司倉充其積藏而應兑換者凖常平法無轉運司倉處撥充常平物諸義倉計夏秋正税無正税榖處物帛之類折為榖者凖此每一㪷别納五合應豐熟計一縣九分以上即納一升同正税為一鈔不收頭子脚乗錢及耗限一日先次交入本倉出剩通正税候盤量畢亦限一日據數紐撥即正税不及一㪷并本户放税二分以上及孤貧不濟者免納諸義倉榖唯充賑給不得他用縣遇災傷當職官體量自第四等以下闕食户給散若放税七分以上通第三等給並預申提舉司審度行訖奏諸災傷計一縣放税七分以上第四等以下户乏種食者雖舊有欠閣不以月分聴結保貸借即榖不堪充種子者紐直以錢各成貫石給限二年隨税納仍免息州預以應支數保明申提舉司行訖申尚書户部雖計一縣放税不及七分而本户放税及七分者凖此本部看詳欲行下諸路提舉司徧下本路諸州縣曉示任從民便如願依上件施行仰本鄉土居或寄居官員有行義者具狀赴本州縣自陳量於義倉米内支撥其歛散之事與本鄉耆老公共措置州縣並不須干預抑勒仍仰提舉司類聚具申聴候朝廷指揮奏聞事十二月二十二日三省同奉聖㫖依户部看詳到事理施行奉􅃯如右牒到奉行前批十二月二十四日辰時付户部施行仍闗合屬去處須至指揮兩浙東路提舉常平司主者仰一依今來勅命指揮疾速施行仍闗合屬去處符到奉行淳熈八年十二月日下書令史郭令史頓圯主事全安仁將作少監兼權户部郎中兼權押新除郎官未上郎中跋語淳熈八年冬十有一月己亥臣熹以備使浙東奉行荒政蒙恩召入延和殿戒諭臨遣因得具以所居建寜府崇安縣開耀鄉社倉本末推説條奏誤蒙開納即詔頒其法於四方而臣熹又以使事適獲奉承仰戴皇仁頓首幸甚因竊惟念里社有倉實隋唐遺法往嵗里中妄意此舉所以收恤隠民者葢偶合其微指顧以國家未定著令是以不能逺及且懼其弗克久今乃得蒙上恩徧下郡國將遂得與闔宇之間含生之類均被仁聖之澤於無窮固已不勝大幸而荒陬下里斗升之積又得上為明詔之所稱揚下為四方之所取則抑又有榮耀焉故敢具刻尚書户部所被勅命下浙東提舉常平司者厝於故里本倉㕔事而記其説如此俾千萬年含哺皷腹之儔有以無忘帝力之所自云淳熈九年四月丙辰宣教郎直祕閣提舉兩浙東路常平茶鹽公事借緋臣朱熹拜手稽首謹言勸立社倉榜當司恭奉聖㫖建立社倉已行印榜遍下管内州縣勸諭尋據紹興府㑹稽縣鄉官新嘉興主簿諸葛修職名千能狀乞請官米置倉給貸而致政張承務名宗文新台州司户王迪功名若水衢州龍游縣袁承節名起予等又乞各出本家米榖置倉給貸當司契勘前件官員心存惻怛惠及鄉閭出力輸財有足嘉尚除已遵依所降指揮具申朝廷外須至再行勸勉量出米榖恭禀聖㫖建立社倉庶幾益廣朝廷發政施仁之意有以養成閭里睦婣任䘏之風再此勸諭各請知悉九年六月八日約束侵占田業榜本司簽㕔申照對本司見行下諸縣根刷没官田産有下項事件申乞指揮須至曉示一今來根刷諸司没官户絶等田産并新漲海塗溪漲淤成田地等多是豪勢等第并官户公吏等人不曽經官請佃擅收侵占暗收花利不納官租其間雖有經官請佃止量立些少租課計囑主行人吏又且不曽催納入常平倉上下蒙庇官司無縁得知今出榜遍於縣鎮鄉村張掛曉示限一月經官陳首與免罪從公紐立租課就行給佃更與免追日前冐占花利如犯人尚敢恃其豪勢仍前坐占限滿不首如官司覺察得知或因諸色人告首定當送所司根究從條㫁罪追日前花利入官仍盡給告人租佃一諸司没官田産多是本縣公吏與有䕃人詭名請佃或與出名人分受花利上下蒙庇不曽納租如此積弊何緣覺察今來出榜曉示諸色人如有似此之人仰經官陳首當與將所首出田産不拘多寡盡給告人租契如詭名人并出名人能在一月内赴官首説當與免罪從公紐立租課就令租賃仍免追日前花利如限滿不首被人陳告或官司覺察得知當送所司根勘依條施行約束不得搔擾保正等榜當職照對在法保正副管幹鄉村盗賊鬭毆煙火橋道公事大保長催約税租及隨租所納錢數一税一替今來訪聞管下諸縣縣官不能仰體成法妄有科擾致見一經役次家産遂空深屬利害今有約束事件下項一保正管幹鄉村盜賊煙火橋道公事委是繁重今一縣之内有令有丞有簿有尉號為四衙雜出文引别置木牌各立程限盡令趂赴申展繳押需索百出多剏名色立為定例分文不可違少如押到則有到頭錢繳引則有繳跋錢展限錢定限常限所用之錢復有多寡又有批朱縫印日齪之類一引狀之出乞取動是數項稍有稽違則枷錮箠楚無所不至且以保正一身豈能徧受諸衙督責一追催二税非保正副之責今來縣道盡以文引勒令拘催其間有頑慢不肯輸納之人又有無著落税賦往往迫以期限不堪杖責勒令填納無所赴愬豈有既充重役復兼催科可謂重困一保正副最為重役豈堪復有科擾今來縣道畧不加䘏應干敷買物件必巧作名目公然出引令保正副買辦如修造廨舎迎送官員整葺祠宇置造軍器似此之類其名不一竹木瓦磚油漆麻苧等物例以和買為名不曽支給分文又如役使工匠科差人夫勒出錢米陪備供輸椎剥肌髓至此為甚一縣官或遇檢驗定奪打量體究等事下鄉多是過數將帯當直雖公吏輩亦用轎乗排備酒饌需索錢物動是取辦保正亦有本官喫食令保正供買及所經過都分雖無公事干涉例有過鄉錢過水錢其為搔擾非止一端一訪聞縣道差募保正拘催二税自承認之日便先期借絹借米硬令空作人户姓名投納在官曽未旬月分限完較或三五日一次或五六日一次人吏鄉司皆有常例需索稍不如數雖所催分數已及却計較毫釐將多為少未免箠楚一月之内盡是趂赴比較之日即不曽得在鄉催税及至催納次第則又别出一簿謂之剗簿増添改易不可稽考有坍溪落江逃亡死絶有名無實之税縣道不與勘㑹著實臨期動是勒令填納以至典賣屋業無可填備一次充應催税至有三四年者雖所欠尺寸升合些少官物亦行綰繫無能得脱百姓受此抑勒破蕩之苦而縣道恬不加䘏委是無辜右鏤榜示所管鄉分鄉村市鎮張掛其縣道於前件約束事件如有違戾許保正副催科保長徑赴本司陳訴切待追究著實即行按奏公吏依法重行㫁治施行淳熈九年八月某日榜減半賞格榜浙東提舉常平司二月二十五日凖尚書省劄子備提舉司奏今嵗災傷條畫賑䘏事件數内一項去嵗上户别納糶濟之人近已蒙聖㫖補受官資無不感戴然去嵗蒙降減半指揮止於紹興一府施行今嵗一路皆荒事體不同今檢㑹當年耿延年所乞事理許於浙東一路通行奉聖㫖令吏部檢坐乾道七年八月一日賞格節次指揮行下浙東州縣勸諭富室上户賑濟賑糶應格之人保明推賞如後來檢踏得災傷最重處許提舉司開具保明申尚書省取㫖與依減半指揮施行劄付本司須至曉諭右當司除已恭依聖㫖指揮行下諸州縣勸諭外今印榜曉示富室上户仰體朝廷恤民之意廣出米榖以拊鄉閭有欲依募之家先赴本司自陳切待摽撥就比近災傷最重州縣入納即為保明申奏朝廷乞補官資應得上件減半指揮不致有胥吏阻抑故榜九月七日約束糶米及刼掠榜照對管下州縣中夏以來久不得雨髙低早禾多有旱損切慮人民不安理合存䘏曉諭一州縣目今米價髙貴止緣早禾旱傷其中晚之田自有得雨足可灌溉成熟去處兼當司已蒙朝廷給降本錢及取撥别色官錢見今廣招廣南福建浙西等處客販搬運米斛到來投糶凖備闕米州縣搬運前去出糶切恐有米積蓄上户與停塌之家未知前項事因以謂旱損少米意圖邀求厚利閉糴不糶此項除已牒諸州府請速行遍下屬縣勸諭有米積蓄上户停塌之家趂此米榖未登之際各依時價自行出糶應副細民食用如敢輒有違戾切待根究重行㫁遣如是向去民間大段艱食切待别行申奏朝廷乞更多撥錢米前來濟糶一州縣火客佃户耕作主家田土用力為多全仰主家借貸應副今來旱損其田主自當優䘏賙給存養無令失所訪聞多有坐視火客佃户狼狽失業恬不介意切恐因而失所却致無人布種荒廢田畝此項除已牒諸州府請遍行下諸縣勸諭應有田之家請以田客所日耕布勤勞為念常加優䘏應副存養勿令失業云云一州縣旱傷去處慮有無知村民不務農業専事扇惑聚衆輒以借貸為名於村疃之間廣張聲勢亂行逼脅以至刼掠居民財物米榖此項當司檢凖律强盜不得財徒二年一疋徒三年二疋加一等十疋及傷人者絞殺人者斬其持杖者雖不得財流三千里五匹絞傷人者斬今來切慮愚民不曉條法悮犯刑名深可憐憫除已牒諸州府請遍下諸縣曉諭民户知悉各自安業勿致扇惑輕犯典憲後悔無及再放苗米分數榜契勘本路今年旱傷檢放苗米多有不實去處曽具奏請今來當職詢訪不實最多未欲按劾施行今來到任已是深冬難以檢劾須至别行措置將諸州縣人户災傷苗米等第更行蠲放除已奏聞及申尚書省外須至曉諭右今將本路州縣人户苗米元檢放五分已上鄉分全户五斗已下全放元檢放四分以上鄉分全户四斗以下全放元檢放三分以上鄉分全户三斗以下全放元檢放二分以上鄉分全户二斗以下全放元檢放一分以上鄉分全户一斗以下全放其紹興府人户須有丁之家方得蠲放其湖田米亦依例蠲放施行今印榜曉示人户知悉如州縣再行催理仰經本司陳訴切待追究按劾施行約束檢旱照對今嵗適當旱歉州縣合差官徧往鄉村檢視每見差出官員多是過數將帯人從反行須索搔動村落以納圖册為名不論人户髙低每畝科配項畝頭牲之類又不親行田畝從實檢校反將訴荒人户非理監繫勒令服熟殊失救荒䘏民之意今來當職斟酌每官一員止得帯㕔子一名吏貼一人當直八名仰從本州縣陳乞計日給錢米各自賫行並不許分毫搔擾保正副及大小保長須親行田畝從實檢放如有違戾許人户徑到本司陳訴切待追治施行浙東客次榜熹叨被臨遣専以刺舉為職自惟昧陋雖不足以盡知官吏之賢否然既尸其任不敢不悉心詢究故自到任以來凡所論薦皆必稽諸公論考其事實然後剡奏不敢狥私容情以自䧟於罔上之誅凡我同寮亦望究心職事律已愛民以待考察不必投書獻啟自陳脚色挾持勢援宛轉請求徒失所以自重之道而反貽絀辱之羞也或恐實有賢哲之士潛晦不耀而熹之愚不足以知之則却望相與推揚具以見教熹敢不承命加察焉除秦檜祠移文竊見故相秦檜歸自金庭久専國柄内忍事讐之恥外張震主之威以恣睢戮善良銷沮人心忠義剛直之氣以喜怒為進退崇奬天下佞諛偷惰之風究其設心何止誤國岳侯既死於棘寺魏公復竄於嶺隅連逮趙汾之獄葢將掩衆正而盡誅徘徊漢鼎之旁已聞圖九錫而來獻天不誅檜誰其弱秦今中外之有識猶皆憤惋而不平而朝廷於其家亦且擯絶而不用况永嘉號禮義之地學校實風化之源尚使有祠無乃未講雖捐田以示濡沫恐出市恩然設像以厠英賢何以為訓晦庵集卷九十九欽定四庫全書晦庵集卷一百宋朱子撰
