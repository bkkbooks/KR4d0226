front:
  text: 八十七
  hash: sha256:b5e449c83529c5a300539e6d899c5968f25028b29a94f5c796128f7a541d5100
body:
  text: 宋朱子撰祭文祭籍溪胡先生文嗚呼哀哉惟公之生氣温質良弱冠而學有志四方發軔蓬蒿至於臨漳學承於家行著於鄉乃獻王府乃游膠庠中退而休客彼洛陽有隠其居維蜀之莊公乃束修踵門升堂一語妙契發乎天光浩然東歸衡泌洋洋我簞我瓢我糟我糠或漁於溪或圃於崗水鯉鮮腴藥頴豐長以是為養胡考寜康以是為樂逍遥相羊我心悠悠嵗月於荒華髪斑衣名聞帝旁弓旌鼎來聘幣是將義不去親欲隠彌彰乃降命書乃賜冠裳乃命典教於梓於桑學徒莘莘儼立成行謦欬未聞眉睫不揚式訛厥心炳其文章作人之功於今靡忘中秘之官典冊是藏公晚而居羣儒所望陳謨帝前震聲廟廊人曰先生允仁且剛旋反舊廬既夀且臧云胡不淑奄忽而亡嗚呼哀哉惟我先君志行文潔有不吾儕一顧不屑而於我公所愛無斁豈面而朋所趣同轍纊息之言屬以其孤公亦見哀不鄙其愚卜兆使藏卜鄰使居擇術使由求田使餔我壯而頑學無所至悔尤已多視公則愧公不謂然欲終誨之其言諄諄夫豈予欺南風之薰草堂晝寂方侍公言遽問公疾公啓手足我不及知遣使饋藥公猶見之謂我當來命延以入我趨適至則已無及袒跣而入哭於寢門淵氷之戒竟莫得聞嗚呼哀哉惟昔治命三公是託屏山傾頽草堂㝠漠幸公獨存爛若星辰今亦往矣誰復儀刑嗚呼哀哉人生百年誰則不死公有令名亦既夀祉全而生之全而歸之公實奚憾後人之思嗚呼哀哉尚饗祭延平李先生文道喪千載兩程勃興有的其緒龜山是承龜山之南道則與俱有覺其徒望門以趨惟時豫章傳得其宗一簞一瓢凛然高風猗歟先生早自得師身世兩忘唯道是資精義造約窮深極㣲凍解氷釋發於天機乾端坤倪鬼秘神彰風霆之變日月之光爰暨山川草木昆蟲人倫之正王道之中一以貫之其外無餘縷析毫差其分則殊體用混元隠顯昭融萬變並酬浮雲太空仁孝友弟灑落誠明清通和樂展也大成婆娑丘林世莫我知優哉游哉卒嵗以嬉迨其季年徳盛道尊有來摳衣發其昬蔽侯伯聞風擁篲以迎大本大經是度是程税駕云初講義有端疾病乘之醫窮技殫嗚呼先生而止於斯命之不融誰實尸之合散屈伸消息滿虚廓然大公與化為徒古今一息曷計短長物我一身孰為窮通嗟惟聖學不絶如綫先生得之既厚以全進未獲施退未及傳殉身以殁孰云非天熹也小生丱角趨拜恭惟先君實共源𣲖誾誾侃侃歛衽推先氷壺秋月謂公則然施及後人敢渝斯志從游十年誘掖諄至春山朝榮秋堂夜空即事即理無幽不窮相期日深見勵彌切蹇步方休鞭繩已掣安車暑行過我衡門返斾相遭涼秋已分熹於此時適有命召問所宜言反覆教詔最後有言吾子勉之凡兹衆理子所自知奉以周旋幸不失墜歸裝朝嚴訃音夕至失聲長號淚落懸泉何意斯言而訣終天病不舉扶殁不飯含奔赴後人死有餘憾儀刑永隔卒業無期墜緒茫茫孰知我悲伏哭柩前奉奠以䞇不亡者存鑒此誠意又祭延平李先生文山頽梁壊嵗月不留即逺有期親賔畢㑹栁車既飭薤露懐悲生榮死哀孰不摧慕熹等乆依教育義重恩深學未傳心言徒在耳載瞻繐綍彌切痛傷築室三年莫酬夙志舉觴一慟永訣終天嗚呼哀哉祭魏元履國録文人生而材乃克自貴材者亦多鮮或有志猗歟元履才英氣豪凌空趠逺志節堅高爰自弱齡聲華秀發事賢友仁其聞四達迨其中嵗考古驗今訂以經術益宏益深聞人之賢若獲於已推之揚之情曷能已視人之阨若已擠之是振是拔力無有遺婆娑丘林嵗月遲莫聘幣鼎來片言感悟謂當用世遂究厥施誰謂落落乃遄其歸歸來考槃於澗於陸慺慺之忠永矢弗告謂當暫愒尋復詔追誰謂一疾而訖於斯嗚呼哀哉念昔交情兄膠我漆更攻互磨兄玉我石世途艱險孟門太行兄行我憂兄歸我藏與兄同心誰則如我奚必梁丘君可亦可兄實高明卒監此心顧託警勵琅琅其音訶佛詆巫考禮正俗奉承靡他葬又得卜長坂之阿兄所樂游孰云兹今有墳其邱謂我宜銘亦兄所寄行高文卑秪以為累日月有時漬緜束芻長慟寢門愧恨何如恭惟神靈尚記疇昔感此哀誠來飲來食蔞翣在門往寜厥宫没而不朽君子之終嗚呼哀哉尚饗祭何叔京知縣文程氏倡道英材景從逮罹部黨門舘一空惟時東平志道誠篤請操拔篲甘委秩禄勁節孤忠遭難而發身没言存孰嗣其烈侃侃辰州受業於門舉幡報徳亦取斥奔抱負弗施退講於家兄克承之以振厥華惟兄天資高明峻潔幹父承師允蹈遐轍稽經訂史取友以端博聞約守惟義之安孝友静亷不絿不競一試其能亦克有政令於湘土兹適問塗云胡不淑而隕其軀兄未病時過我精舍講道論心窮日繼夜既歸而病函以書來千萬永訣嗚呼痛哉惟兄之明原始反終罔怛於化以病其公上念母慈下歉徳學逺忠極慮語簡情慤兄子謂予盍銘諸幽外期永世知徳是求若兄之賢實我所畏惟其不能辭則靡愧嗚呼痛哉昔我來斯兄出迎門羅列豆觴語笑温温今我來斯奠此空尊長號大慟兄卧不聞嗚呼痛哉祭劉參議文惟公文足以取高科才足以躋顯仕踐揚中外三十餘年呉蜀之鄉自尉而令康新之郡由貳而専白首斑衣内既懽於榮養朱轓皂盖外益謹於承宣旋登王畿出參幕府人謂低徊而不偶公獨逶迤而泰然方將告休天朝言歸故里棲神乎香火之社玩意乎詩史之編何一疾之弗瘳遽百年之難料悵轜車之既駕倐丹旐以孤翩行路酸辛知名悼恨而况邦人與邑子孰不齎咨而涕漣嗚呼哀哉熹以孤童早依仁里無所肖似獨荷知憐登高冩懐毎繳紛而近後探囊搜袐或拏攫以争先以至發廪勸公築倉移粟既同憂而共喜如合病以齊痊惟此好之難忘感餘生而自悼舉空觴而一慟聊永訣乎終天祭汪尚書文維淳熙三年嵗次丙申三月朔二十七日壬申從表姪宣教郎主管台州崇道觀朱熹謹以香茶清酌致祭於近故端明殿學士尚書汪公之靈曰嗚呼惟公學貫九流而不自以為足材高一世而不自以為名道尊徳備而不自以為得位高聲重而不自以為榮蓋玩心乎文武之未墜抗志乎先民之所程巍乎其若嵩岱之雄峙浩乎其若滄海之涵渟自秀發於妙齡冠倫類而獨立中委棄於諸侯實天脱其羈馽迨壯嵗之來歸曰良時之儻吾及曾墨突之未黔復吾行之汲汲汨東閩而西蜀亘萬里而周流騰茂實而愈偉膺神聖之訪求既銓綜於天官又潤色乎皇猷謂朝夕之疇咨即進陪於廟謀何儇媚之狡夫獻功利之浮説公抗䟽而指陳請昭姦而堲絶事乃謬而不然吾何為乎兹列寜隠屏而就閒弭長騖之遐轍粤退司於閒舘遂遄反乎丘林託僧廬以静處或獨往而孤尋眷塵編而寄懐若與世乎無心衆徒嘆公何其樂之獨而孰知公為有憂之深伊有識之望公釋東山而再起以卒究其所施俾斯民之咸喜胡彼蒼之不可信曽不一老之慗遺忽堂堂而逝去興殄瘁之悲詩熹也孤生叨塵末契辱教誨之殊常殆相期於國士雖不見者十年亦音書之相繼不鄙謂其庸虚毎咨詢而弗置兹逖聞於訃告悵失聲而永號巾素車以即路越閩嶺之崇高行踽踽而涼涼孰知有如予心之鬱陶跪陳詞而侑奠痛人師之難遭祭柯國材文維淳熙四年二月辛未朔旦新安朱熹謹以香茶酒果奠於近故柯君國材老丈之靈俗弊道衰士鮮知學束書不觀遊談燕樂有不其然剽掠為工乘時射利莫反其躬孰能知君苦心刻意探討之勤白首不置弗榮於禄弗媚於時自信之篤死生莫移余少之時試吏君里實始識君敬慕興起致君序室以表後生弦誦洋洋徳義振聲闊焉闕反覆講評匪同而和肺腑以傾自兹一别遂隔死生何遽至此闕惟君之徳剛毅近仁望之可畏即之可親居今行古勇莫能奪行行之名不肖所怛哀哉已矣無復斯人緘辭千里寄此酸辛嗚呼哀哉伏惟尚饗祭姚式文嗚呼簮纓之鏘然唯子之纍然聲利之囂然唯子之澹然貎甚癯兮病已纒不復興兮歸其全我之來兮閔子賢一臂交兮失九泉念官曹兮若蟬聯涕子零兮具此筵祭呉晦叔文維君學造深㣲行履繩約交朋友盡切偲之義處兄弟竭怡怡之歡脱屣勢榮玩心道要方日新而未已遽川逝而不留熹久辱逰從多蒙規益睽離雖久書疏鼎來忽聞不淑之音實隕無從之涕屬纒朞慘逺寓奠觴莫獲長言以詠潛徳臨風一慟永訣終天祭劉共父樞密文維淳熙五年嵗次戊戌九月辛酉朔二十日庚辰從表弟宣教郎主管建寜府武夷山沖佑觀朱熹敢以清酌庶羞之奠告於近故建康留守觀文殿學士彭城劉公之靈嗚呼哀哉天胡付公以瓌奇俊偉之材而不并假以耆耋期耄之夀胡位公以樞機藩屏之重而不遂畀以彌綸輔賛之權使公名若極富貴而無欲實則抱憂歎以終天此中外志義之士所以聞公之薨皆失聲而相弔或雖未識公面而亦不自知其涕泗之流漣者也嗚呼哀哉惟公生有異質早擢巍科退而自保弗競弗譁屈首受書典學於家内充其美外振厥華暨登王朝遂掌綸綍獻納綢繆訏謨密勿忤權觸要無所回屈帝眷弗渝試以郡紱受鉞於南勦頑踣凶婉孌赤子撫摩哀恫禮賢勸學導和致豐報政三年鄒魯其風帝曰來歸本我兵柄曽不幾時咨以大政公奮其庸帝虚以聴張磔宏綱塞絶僣令道直身危突不暇黔出臨兩鎮威燀恩漸適嬉於堂遽哭於苫恩詔起之有竦其瞻公卧弗承帝悉其孝曰究汝哀來覲來教公言益切公守不撓再撫於潭亦顯其効乃遷建業民病以饑公不寢食起坐嗟咨方畧既張惠術四施曽是流莩化為充肥帝嘉乃勲加勞進律倚毗方深遽告以疾忠無隠情諫有遺筆帝驚罷朝悼此良弼嗚呼哀哉我以孤童來託公家公不鄙我勸導有加公姿鸞鵠我性麏䴥豈無異同卒莫疵瑕自公進為論議慷慨實始斯公高明光大公之知我亦晚而最迨其永歸手札告戒褒徳撫孤古昔所難并以諉我我其敢安把書長號涕隕闌干還坐以思慨其永歎念昔帝師為國死義亞傳承之夷險一致屏山雖隠亦豈忘世公襲其傳克廣無替衆咸謂公當訖外庸入賛皇極下釐庶工登賢屏姦復境攘戎内繼祖考畢其餘忠天胡難諶而止於此羣邪交慶衆正心死矧予之哀竊究終始願言思公曷其有已嗚呼哀哉昔誦離騷舉公觴兮今拜以哭酹公堂兮私情公義兩怛傷兮神靈不昧尚克鑒予之𠂻腸兮嗚呼哀哉尚饗又祭劉共父樞密文嗚呼哀哉惟公之薨迨兹半載殄瘁之嘆雖久彌新日月有期佳城將啓惟時親故罔不悼傷矧予孤生蚤託恩契道義期許晚而益敦臨絶之音寄屬良厚其為感惻豈獨常情迫此詔除懇辭未獲義當引道以俟報聞凡公誨言略已遵奉倘未即死尚圖厥終輀車之行不遑祖送敢持薄奠以訣終天倥􅘓悲涼言無次叙惟公精爽克鑒此心又祭劉共父樞密文年月日具位朱熹謹遣男埜門人林允中略具酒肴之奠敬奉熹所撰次先正少傅公神道碑銘章藁告於近故留守觀文樞密彭城劉公靈几之前曰在昔嵗秋公病欲絶自力為書來告永訣上言國家讎恥未雪冡骨易枯此恨難滅次念遺阡豐碑未揭謂我銘之以永前烈下及諸孤羈貫在列謂我教之他靡顧謁字畫方嚴詞氣凛冽是豈死人而有是説三復悲號心膂貫徹聞公是日三簡并折拜疏千言忠憤是洩我雖不武實仰竒節生既人英死當鬼傑又惟公家忠孝閥閲紀徳銘功盍付時哲公命不亂曷取凡劣諒以孤生幼罹禍孽蒙被前恩欲報罔竭故略其愚以累斯碣方將涉筆叙次鋪列屬其來西曠日引月迄今乃成事偉詞拙逺薦陳之如聴予决想像兩公感涕摧咽顧念滯留塵土羈紲莫相嗣人講貫劘切以此負公一飰再噎頃為迎師寄此筆舌比聞授受稍契磁鉄尚其不厭習久而悦盡掃童心罔蹈非轍彼齊彼孺悉藉提挈卒大公門緩此憂惙山瓢往酹野䔩并設老淚如傾逺寄清血嗚呼哀哉尚饗祭張敬夫殿撰文嗚呼敬夫遽棄予而死也耶我昔求道未獲其友蔽莫予開吝莫予剖蓋自從公而觀於大業之規模察彼羣言之紛糾於是相與切磋以究之而又相勵以死守也丙戌之冬風雪南山解袂櫧州今十五年公試畿輔公翔禁省公牧於南我遯巖嶺顯晦殊迹心莫與同書疏懇惻鬼神可通公尹江陵我官廬嶽驛騎相望音問逾數去臘之窮有來自西告我公疾手書在攜我觀於時神理或僣是疾雖㣲已足深念函遺問訊閲月而歸叩函發書歎吒歔欷時友曾子實同我憂揮涕請行誼不忍留曾行未幾公訃果至張侯適來相向反袂嗚呼敬夫竟棄予而死也耶惟公家傳忠孝學造精㣲外為軍民之所屬望内為學者之所依歸治民以寛事君以敬正大光明表裏輝映自我觀之非惟十駕之弗及蓋未必終日言而可盡也矧聞公喪痛徹心膂緘詞寄哀不遑他語顧聞公之臨絶手遺疏以納忠召賓佐而與訣委符節而告終蓋所謂得正而斃者又凛乎其有史魚之風此猶足以為吾道而増氣抑又可以上悟於宸聦又聞公於此時屬其弟以語予用斯文以為寄意懇懇而無餘顧何徳以堪之然敢不竭其庸虚并矢詞以為報尚精爽其鑒兹嗚呼哀哉又祭張敬夫殿撰文維淳熙七年嵗次庚子六月癸未朔六日丁亥具位朱熹竊聞故友敬夫張兄右文修撰大葬有期謹遣清酌時羞奠於柩前南望拜哭起而言曰嗚呼自孔孟之云逺聖學絶而莫繼得周翁與程子道乃抗而不墜然㣲言之輟響今未及乎百嵗士各私其所聞已不勝其乖異嗟惟我之與兄脗志同而心契或面講而未窮又書傳而不置蓋有我之所是而兄以為非亦有兄之所然而我之所議又有始所共鄉而終悟其偏亦有蚤所同擠而晚得其味蓋繳紛往反者幾十餘年末乃同歸而一致由是上而天道之㣲逺而聖言之秘近則進修之方大則行藏之義以兄之明固已洞照而無遺若我之愚亦幸竊窺其一二然兄喬木之故家而我衡茅之賤士兄高明而宏博我狷狹而迂滯故我嘗謂兄宜以是而行之當時兄亦謂我盍以是而傳之來裔蓋雖隠顯之或殊實則交須而共濟不惟相知之甚審抑亦自靖而無愧嗚呼孰謂乃使兄終在外以違其心予亦見縻於斯而所願將不遂也政使得閒以就其書是亦任左肱而失右臂也傷哉吾道之窮予復何心於此世也惟修身補過以畢餘年庶有以見兄於下地也聞兄之葬而不得臨獨南望長號以寄此酹也惟兄憐而鑒之尚隂有以輔予之志也嗚呼哀哉祭鄭自明文故友台州史君大著鄭兄自明之靈曰比年以來士氣衰弱觀時俯仰徇勢前郤其心有一身而無天下其口有唯唯而無諤諤偉哉自明之為人信所謂喧啾百鳥之羣忽見秋天之一鶚者也蓋自其布衣而已有憂天下之心其揖讓人主之前則直欲排佞倖之朋而折其角其言明白切至磊磊落落憤激峻厲嶢嶢嶽嶽明主所為虚心而嘉嘆羣公所為變容而駭愕善類所為喜幸而心開邪黨所為戚嗟而氣索偉哉自明之為人凛乎其有古爭臣之風求之近世則措之鄒陳之間而無怍者也夫何天命之不延竒禍一朝而遽作使前日之悲者喜而喜者悲紛慶弔之交錯嗚呼哀哉君昔過我寒泉之濱一語定交情義日親逮上饒之草次語宵分而更僕謂當擇善以潜心毋以一長而自足粤今兹之秋孟又札書以申之眷予心之悃款實千載以為期書適往而訃來噭然號其焉及哦殄瘁之悲詩坌百憂之來集惟平生之忠赤諒雖死而不忘跽陳情於一酹詞與淚而俱傷嗚呼哀哉尚饗祭陸子夀教授文學匪私説惟道是求茍誠心而擇善雖異序以同流如我與兄少不並遊蓋一生而再見遂傾倒以綢繆念昔鵝湖之下實云識面之初兄命駕而鼎來載季氏而與俱出新篇以示我意懇懇而無餘厭世學之支離新易簡之規模顧予聞之淺陋中獨疑而未安始聴瑩於胷次卒紛繳於談端徐度兄之不可遽以辨屈又知兄必將返而深觀遂逡巡而旋返悵猶豫而盤旋别來幾時兄以書來審前説之未定曰子言之可懐逮予辭官而未獲停驂道左之僧齋兄乃枉車而來教相與極論而無猜自是以還道合志同何風流而雲散乃一西而一東蓋曠嵗以索居僅尺書之兩通期杖履之肯顧或慰滿乎予𠂻屬者乃聞兄病在床亟函書而問訊并裹藥而攜將曽往使之未返何來音之不祥驚失聲而隕涕沾予袂以淋浪嗚呼哀哉今兹之嵗非龍非蛇何獨賢人之不淑屢興吾黨之深嗟惟兄徳之尤粹儼中正而無邪至其降心以從善又豈有一毫驕吝之私耶嗚呼哀哉兄則已矣此心實存烱然叅倚可覺惰昏孰泄予𠂻一慟寢門緘辭千里侑此一尊祭黄尚書文大道既隠淳風日弊氣鍾於人鮮克全粹習而益逺輕肆茍偷言如可重考行則羞猗歟我公受材特異不假修為嘿與道契端莊静一終日欽欽不動而敬神保是臨賓於王庭昌言大對庸弗順隨久斥於外晚歸獻納正笏垂紳時而後發一言萬鈞誾誾省曹侃侃禁闥權倖顧之心摧氣奪孝慈㨯幬未返北征引經抗疏罷宴請行帝嘉其忠衆服其勇咸惜公行係國輕重公嘗老矣兹復告歸祖帳東門觀者歔欷公在故鄉恂恂翼翼士夫高仰逺邇承式帝曰懐哉舊學之賢乃詢乃訪加璧以先公拜曰都此帝之徳盡言不隠是乃臣職公年雖高不杖不扶謂當復起駟馬安車一病踰年竟以喪告疏有遺忠當宁震悼嗚呼哀哉熹以晚學獲游公門望公容貌鄙寛薄敦惟其躁輕弗克持久公不鄙焉撫接加厚去嵗之春入拜公堂公時已病志氣則彊正冠肅容不異平日端拱立談教告諄悉豈謂此别遂隔死生聞訃欲往竹符是縈冩哀陳辭漬綿走酹想像徳容恍若瞻對顧惟媮惰不克其躬永言疇昔以此負公又祭黄尚書文己亥之春拜公床下嘗辱面命先徳是銘自惟晚生弗克堪此懇辭未獲而公永歸官守拘牽莫遑弔哭寓觴一奠無所復辭於是彊顔勉為叙次卑鄙進越既懼且慙今奉以來昧冒陳薦永惟疇昔慨想音容徳盛禮恭不以病懈任重道逺何愧昔人今兹之亡寧復可見殄瘁之痛豈以其私惟其榛蕪卒無以稱公靈不昧尚鑒厥𠂻祭詹淑人文熹來會公葬問舍修容乃聞夫人遽亦薨逝其為駭愕良不自勝恭惟夫人克有令徳作配君子賓敬齊莊化被閨門怡愉肅穆胡不眉夀以永徳聲兩殯在堂行道悽惻一觴奉奠少見鄙誠敬想淑靈諒垂歆鑒祭吕伯恭著作文嗚呼哀哉天降割於斯文何其酷耶往嵗已奪吾敬夫今者伯恭胡為又至於不淑耶道學將誰使之振君徳將誰使之復後生將誰使之誨斯民將誰使之福耶經説將誰使之繼事記將誰使之續耶若我之愚則病將孰為之箴而過將誰為之督耶然則伯恭之亡曷為而不使我失聲而驚呼號天而慟哭耶嗚呼伯恭有蓍龜之智而處之若愚有河漢之辯而守之若訥胸有雲夢之富而不以自多詞有黼黻之華而不易其出此固今之所難而未足以議兄之彷彿也若乃孝友絶人而勉勵如弗及恬淡寡欲而持守不少懈盡言以納忠而羞為訐秉義以飭躬而恥為介是則古之君子尚或難之而吾伯恭猶欿然而未肯以自大也蓋其徳宇寛洪識量閎廓既海納而川渟豈澄清而撓濁矧涵濡於先訓紹文獻於厥家又隆師而親友極探討之幽遐所以稟之既厚而養之深取之既博而成之粹宜所立之甚高亦無求而不備故其講道於家則時雨之化進位於朝則鴻羽之儀造辟陳謨則宣公獨御之對承詔奏篇則右尹祈招之詩上方虚心而聴納衆亦注目其旉施何遭時之不遂遽縈疾而言歸慨一卧以三年尚左圖而右書聞逍遥以曳杖恍沂上之風雩衆咸喜其有瘳冀卒攄其素藴不惟傳道以著書抑亦後來之程準何此望之難必奄一夕而長終増有邦之殄瘁極吾黨之哀恫嗚呼哀哉我實無似兄辱與逰講摩深切情義綢繆考前日之枉書尚粲然其手筆始言沈痼之難除猶幸死期之未即中語簡編之次第卒誇草樹之深幽謂昔騰牋而有約盍今命駕以來遊欣此㫖之可懐懔訃車而偕至考日月之幾何不旦暮之三四嗚呼伯恭而遽死耶吾道之衰乃至此耶既為位以泄哀復緘辭以寓奠冀嗣嵗之有間尚前言之可踐嗚呼哀哉尚饗祭劉氏妹文年月日兄具位以酒饌祭於亡妹五十六娘之靈昔妹之亡兄縻郡紱病弗及療歛弗克臨歸來撫棺一慟永訣今兹窀穸已復有期輙具酒肴來哭爾殯兄及老幼共此一哀惟爾有靈尚其歆享嗚呼痛哉祭陳休齋文維淳熙十一年嵗次甲辰三月庚寅朔二十有七日丙辰具位朱熹謹以香茶酒果奠於近故休齋先生沖佑叅議陳公之靈熹少日遊宦獲從公遊於泉漳之間蒙公愛予誘掖良厚其後别去幾三十年而去嵗之冬復得見公相與開懐握手如平生歡公雖老矣而意氣不衰為我置酒談經論義篇什間作亹亹不休相與追遊連華九日涼峯鳯凰雲臺之間晝則聫車夜則對榻視公起居食飲呌呼談噱皆有非後生所能及者謂公夀考宜未艾也然我之還公復載酒餞我洛陽則摻袂分攜澘然出涕而有此㑹難又之悲矣醉中别去慘然不樂久而不能平也然亦不謂未及兩月而公訃遽來嗚呼痛哉公於諸經皆有論述許以寄我相與考評而今而後不復得遂此願矣緘詞千里寄此一奠尚惟精爽聴我此言嗚呼哀哉尚饗祭許順之文維淳熙十二年四月庚辰宣教郎直徽猷閣主管華州雲臺觀朱熹謹以香茶及賻幣一匹奠於故友許君順之之靈我官同安諸生相從遊者多矣其恬淡靖退無物欲之累未有如順之者也逮予秩滿相與俱歸不以千里為逺其後别去二十餘年中間相見不過一再前嵗雲臺一别匆匆未及究其所欲言不意君之遽至此也聞訃慘怛寓此一哀君其有靈尚克鑒此尚饗祭劉平父文憶我少日來託君家君時未齓蘭茁其芽誦書琅然意氣英發見者驚嗟謂即聞達逮其冠嵗甫就一官兩除幕府再値省員世路威夷恥復自眩婆娑丘林始適於願疏泉成沼種樹著行舘宇連延澗壑青蒼穠春素秋風朝月夕把酒哦詩情高意適流光荏苒素髪星鮮人為君屈君獨超然恨山不高惜水不廣勝日籃輿翩然獨往行樂餘功燕及里閭枵腹夏飽甕兒夜􅈱校考書勞豈慚肉食胡不百年享此休逸一病遽革百藥莫瘳神理杳冥孰訊厥由親友駿奔行道灑涕矧我於君情實昆弟蓋自卜居餘四十年豈無他人合散風烟惟我與君俱不偕偶跧伏窮山别希㑹久中念恩契申以昏姻逮兹晚嵗情義益親方從君遊遽問君疾代君發棠君語諄悉何意一朝隻影蹣跚扶疾哭君幾不自還一奠寢門醪單饌薄唯此哀誠庶通冥漠嗚呼哀哉祭陳福公文繄名之至下脱一句惟公徳在生民功書信史大節昭然善終善始中興輔相比立豪英曰文曰武各以其名孰如我公道全徳備莫得而名繄名之至亦弗自知惟誠惟一衆善畢隨士於見聞以多為富公無不窺不以博著士於詞章以麗為精公無不能弗以文稱匪清匪濁不夷不惠和不至流亷不至劌論無茍異亦無必同温温其毅坦坦其恭執法於中不専為直大姦既除國論斯一承流於外不一於寛苛嬈不作閭里自安中坐廟堂宏綱是總主徳既修民聴不聳從容一言拔佞移寵帝納其忠人服其勇晚而告休税冕遺紳安車駟馬歸卧里門進不出位退不忘君垣屋雖卑徳義日尊羣行兼融尚不勝記公亦何心有此全美惟其不有道則彌光兩宫之眷四海之望謂當百年再登承弼卒惠我民永綏王國云胡不淑奄忽長終臨絶之言不忘教忠嗚呼哀哉我從公遊出入三紀晚途間關遂託知己千里訃至一觴薦誠想公如在灑淚同傾嗚呼哀哉祭詹侍郎文維紹熙元年嵗次庚戌七月癸丑朔十有一日癸亥具位朱熹謹致奠於近故經略閣學侍郎詹公之靈嗚呼世之學者衆矣其所以為學者類不過出入乎口耳之間求其篤志力行以期入乎聖賢之域者則鮮矣惟公粹美之資得於天禀孜孜學問樂善不倦其尊聞行知之效見於日用之間者在家在邦隨事可紀蓋一本於中和而行之以慈恕信乎所謂志於仁而無惡者矣晚登從班出鎮南服急於救弊以綏其民故不暇計百全之利而其害有出於意慮之外者上雖不獲已於積毁之言然暫謫而亟還之則既有以知公之無罪矣衆亦咸謂商度財利鈎校米鹽本非所以煩儒學老成之士莫不冀公之復起而有以卒究其所學之藴也不謂歸未及門而遽以病告税駕未幾而遂至於不起此則有志於學者所以歎息流涕而遺恨於無窮也熹辱知惟舊蒙念亦深聞訃踰年一奠莫致其為愧負蓋不勝言緘詞寓哀尚祈鑒享嗚呼哀哉祭潘叔度文嗚呼叔度生非不偶而終身不涉乎仕進之塗家非不足而比老不渝其寒苦之節出門從師則不計生之先後而惟善是主閉户積學則不顧世之毁譽而唯道是求蓋其立志之高有如此者是以其躬行之效内則孝友著於家庭外則仁義信於朋友以至於州閭鄉黨莫不高其峻潔畏其嚴正而不敢以非義加焉雖世之賢士大夫知之者比肩顧未有能引而致之要路之津使試其學以及於人而遂奄然以没於地也嗚呼哀哉熹愚不肖辱知最深申以婚姻情義愈篤因風聞訃悲不自勝酹此一觴千古永訣嗚呼哀哉尚饗祭劉子澄文維年庚戌嵗闕月闕朔二十六日闕具位朱熹謹致祭於亡友子澄劉兄袁州使君之靈嗚呼子澄以樂易之姿躬純篤之行立志高雅信道深堅處家庭則孝弟達聞交朋友則信義昭著居閒則其講道著書有以樂衆人之所不樂從官則其養民善俗獨能憂衆人之所不憂至於收恤宗黨而接引後來蓋孜孜焉無不用其至若其樂人之善而矜人之惡又汲汲焉唯恐不盡其誠故賢者與之逰則常幸其有思齊聞過之益不賢者與之處則常病其有明汚招過之羞然世之賢者少而不賢者多是以子澄之得譽寡而蒙毁衆道不得行於一州而遂齎志以没也是豈不可為之深悲而痛恨也耶予以無能蚤結交好切磋之益嵗晚益親然而解袂江磯忽焉十載屢卜再㑹卒焉無期病不得伸執手之悲没不得展撫棺之慟聞訃累月乃能使人而病衰不文言又不足以盡其區區之意引首西望涕泗交流尚幸楊兄昔同遊好屬其一酹足寄此心嗚呼子澄其尚能有以知予之悲也耶尚饗祭潘左司文維紹熙元年嵗次庚戌七月癸丑朔二十有八日庚辰具位朱熹謹致奠於近故太平顯謨左司使君契文潘公之靈嘗謂論世之學士大夫優於學行者政事之才或未必達精於政事者學行之趣或未必醇就使能兼二者之長則於去就出處之大節又或未必能無所愧也惟公文學之華行義之實既有以成於身而信於友及其典州郡殿藩服則其聰明仁愛精審持重所以惠柔良而讋姦暴者又卓然非今之從政者所能及爰及晚嵗稱疾卧家懇避詔除引義慷慨是其見幾之明守道之固應變從容不可回撓又足以關讒慝之口而奪之氣嗚呼是亦可謂志力之備徳業之全而無歉於為人矣謂當復起及此聖朝卒究所施以慰士論何其奄忽遽即夜臺凡在聞知莫不傷悼况熹不敏辱知最深書疏相尋問遺勸勉勤懇之至久而不忘聞訃失聲涕霣心折顧以衰病復窘王程逮此踰年始克布奠鄉風引首悲恨來并惟公不亡鑒此誠意嗚呼哀哉祭劉子禮文從表具位朱熹謹以清酌時羞奠於近故劉君子禮六十七兄之靈曰自我少日託昏高門得從兄逰於今五十年矣毎竊見兄志氣堅彊色莊言厲論議英發滚滚不窮而臨事應變從容裁處不動聲氣目無全牛未嘗不歎其英邁閎達老大多材真有䀻君先生之遺風意其必當出應時須以世前烈豈謂中嵗事多不諧一日慨然謝去場屋少肆餘力誅草淮鄉數年之間亦有成緒而兄好義周急不間戚疏肥馬輕裘視猶涕唾遂散其積翩然南歸憩止玉山愛其山川之秀風俗之美遊從之盛則遂求田問舍而定居焉曽未幾時遽以病卧易簀之旦神宇泰然徧告親朋千萬永訣不鄙謂我幅紙丁寜筆勢低昻亡異平日赴車來止我病亦衰把書長號不能自己嗚呼痛哉以兄之才終以不遇而止於此豈非天乎昏憊支離未能亟往拊棺大慟以罄一哀又聞佳城亦既得卜祖奠之日近不踰旬走使緘詞逺寄一酹忽焉精爽如在目前嗚呼哀哉伏惟尚饗祭張敬夫城南祠文年月日具位朱熹敬以一觴酹於亡友敬夫侍講左司張公尊兄城南之祠昔從公遊登高望逺指顧兹土水竹之間謂予肯來相與卒嵗予以懐土顧謝不能其後聞公開鑿亭沼帶經倚杖日逰其間冩景哦詩辱以寄我寂寥短韻幾篇在吟於今幾何嵗月犇逝我復來此白髪蒼顔追懐舊遊顧步涕落未奠宿草姑即遺祠玉色金聲恍如對接草木魚鳥莫知我哀祭張魏公墓文惟公功存社稷澤在生民上比列星多歴年所英靈陟降千古如存曰有遺丘乃寄兹土熹夙深宗慕亦誤知憐兹幸分符獲叅守奉瞻言螭首饋奠莫親寓此一觴諒蒙昭鑒祭南軒墓文惟公閎達之資聞道最早發揮事業達於家邦中嵗閒居益求其志鶴鳴子和朋簮四來我時自閩亦云戾止更互切磨羣疑乃亡厥今幾何俯仰一世公逝既久我老益衰何意重來獨撫陳迹塵筵髣髴拱木荒涼録牒散亡音徽莫紹世道之感平生之懐交切於中有涕横落欲推公志據舊圖新衆允未孚唯以自愧一觴往酹并寄此情公乎不忘起聴我語祭叔祖奉使直閣文維紹熙五年嵗次甲寅十月戊子朔二十日丁未從孫具位熹敢昭告於故五十六叔祖父奉使直閣府君故五十六叔祖母恭人王氏之墓惟昔鼻祖徳潜弗升施及後人克濟其美公仗漢節立哭朔庭白首來歸無所汙涅而熹先子亦翔天朝適以此時遭讒去國死生契濶遂以終天今四十年熹復來此無所肖似寵秩横加能薄幸多仰愧前烈恭惟明詔全節是褒照弟㷀然亦霑禄仕瞻望封闕來拜公祠惟公不亡歆此誠意尚饗祭叔父崇仁府君文故三叔父崇仁府君故三叔母安人丁氏之墓昔拜叔父於霅之川粤既南歸遂不復見及拜叔母於帝之鄉告違未幾即以訃告今復來此雙冡蕘然㣲弟之賢孰襄此事既被先澤行矣官榮尚與後人無怠嗣慶一觴所酹林長草豐尊靈不亡歆此誠意尚饗祭趙丞相文嗚呼惟公天賦中和家傳忠孝愛君憂國懇懇不忘進秉樞機適逢變故禀承慈訓援立聖明計定一時功垂萬世夫何不幸乃困煩言適此退閒忽聞逺役衝風冒雪千里於征行未及休病遽不起赴車所暨痛憤惟均白叟黄童興言出涕矧予衰鄙素辱知憐推挽彌縫期於國定何悟反覆接踵言歸我罪未論公行先邁臨風一慟雞絮是將精爽如存尚識兹意嗚呼哀哉尚饗祭程允夫文維慶元二年十一月乙巳晦外兄具位謹以香茶酒果奠於内弟吉州録事程允夫之靈此月之初得吾弟九月六日書於便中首言濫得美名恐為師門之辱次言老不解事愧貽老兄之憂予蓋深有味乎其言如接笑談之適也既又視其字畫謹好詞氣安閒且言受代有日骨肉俱安則又深以為喜蓋初不聞其有所疾痛也及二十有九日曾君無疑使以書來乃言吾弟比以此月八日不幸死矣嗚呼哀哉以吾允夫之才之志而止於此且以何疾而遽然耶余生多艱今復老病中外兄弟蓋亡幾人有如允夫尤號同志而學與時背仕皆不逢猶冀莫年卒其舊業更相勉勵以畢餘生何意允夫而遽止此緘詞往酹悲不能文君其有知尚識此意嗚呼哀哉祭黄子厚文維慶元五年四月二十八日己丑雲谷老人朱熹謹遣男某奉酒茗之奠告於亡友穀城隠君子厚黄廿八兄之靈曰嗚呼哀哉與君相逢俱十五六夜諷同聲朝嬉競逐尋各壯長居又卜鄰講藝論文笑語日親兄才甚高俯睨一世顧獨謂余許以並轡迨其中間合散不常倐然兩翁顔衰鬢蒼我行既艱歸以病廢兄老一丘亦困羣吠念昔兄言凡兹並遊唯我與君庶其後凋亦既有徴謂可長保此外悠悠置勿復道孰謂兹今兄去而先遺是一老顧影孑然欲往哭兄炙雞絮酒足曳弗前目斷門栁兄雖已矣其存則長流傳滿世偉畫名章兄學有徒頗勤收拾庶幾成編追配騷什唯其清苦絶去羶葷誰其知之後世子雲我論有疑亦竢兄决今則已夫琴破弦絶嗚呼哀哉尚饗祭蔡季通文維慶元四年嵗次戊午十月二十有九日癸已新安朱熹竊聞亡友西山先生蔡君季通羇旅之襯逺自舂陵言歸故里謹以家饌隻雞斗酒酹於柩前嗚呼哀哉尚饗又祭蔡季通文慶元四年十有二月六日新安朱熹竊聞亡友西山先生蔡兄季通輀車祖載將就窀穸已飭素車往助執紼而連日大病遂不能前謹遣男埜奉香燭茶酒往奠柩前於其行也哭而送之曰嗚呼季通而至此耶精詣之識卓絶之才不可屈之志不可窮之辯不復可得而見矣天之生是人也果何為耶西山之顛君擇而居西山之足又卜而藏而我於君之生既未得造其廬以遂半山之約至於今日又不能扶曳病軀以視君之反此真宅而永訣以終天也並遊之好同志之樂已矣已矣哀哉哀哉祭方伯謨文嗚呼痛哉久此卧病聞君之訃不能往哭東望涕零又以悲悼之深未暇為文以侑此奠惟君之行未能甚逺英靈炳然當識此意嗚呼痛哉晦庵集卷八十七欽定四庫全書晦庵集卷
