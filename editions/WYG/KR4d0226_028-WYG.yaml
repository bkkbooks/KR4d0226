front:
  text: 熹前日專人奏記伏想尋當登徹昨日先所遣人還拜領鈞翰之賜感慰之極不可具言至於進職疏恩奉祠得請又岀陶鑄尤以銜戢然而丞相方且欿然深以前日不能力辨是非為病此則仰見大君子責己之周又不自勝其愧仰也崇福謹已拜命矣嫌名之喻曲荷記存此於禮律無疑豈敢更煩公聽惟是進職之恩則有所未安者蓋方以避仇自列而彼黜已升内揆於心尚覺未免上九鞶帶之嫌况於他人豈容戸曉且於近制此等遷除雖非徳選亦必有所托以為號今此何名也哉又况溫陵之行情狀未白此必怏怏尚有餘言且其為人亦嘗頗有時譽今日之去遠近必有為之不平者異時得以藉口則非獨為熹之害竊恐丞相亦不得不以為慮也大抵近年習俗凡事不欲以大公至正之道顯然行之而每區區委曲於私恩小惠之際本欲人人而悅之而其末流之弊常反至於左右拘牽倍費財處而卒又無以慰天下之公論此則熹之所不敢言而丞相之明其自知之亦不待熹之言矣熹今有公狀申省并以劄子遍懇羣公語悉由𠂻即非備禮切望矜察早賜開陳得遂鄙懐乃荷大賜昨辭遷秩想亦已䝉鈞念若猶未上得并與將上不勝幸甚
