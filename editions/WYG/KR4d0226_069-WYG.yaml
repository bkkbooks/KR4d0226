body:
  text: 漢同堂異室廟及原廟議五峰胡仁重論漢文帝之短䘮其失不在文帝而景帝當任其責予於不起寢廟之詔則以為明帝固不得為無失然使章帝有魏顆之孝其羣臣有宋仲幾楚子囊之忠則於此必有處矣况以一時之亂命而壊千古之彜制其事體之輕重又非如三子之所正者而已耶然古今諸儒未有斥其非者而徒知論惠帝叔孫通作原廟之罪夫原廟誠不當作要必復古宗廟之制然後可得而議爾或曰周公祀文王武王於洛邑非原廟耶曰此固理之變也然設於别都而不設於京師及所幸郡國又不聞其以菓獻之䙝禮施焉則亦與漢異矣别定廟議圖説圖巳見前紹熈甲寅某月詔以孝宗祔廟當議宗廟迭毁之次禮部侍郎許及之太常少卿曽三復等相與上議請遷僖祖宣祖而奉太祖居第一室祫享則正東鄉之位有詔恭依且令復議二祖祧主奉安之所時熹始赴經筵供職亦甞預議屬以病不能赴遂以議狀申省大指以為僖祖實為帝者始祖百世不遷之廟不當祧毁合仍舊居太廟第一室四時常享則居東鄉之位宣祖太祖太宗真宗仁宗英宗六室皆在三昭三穆之外親盡宜毁而太祖太宗仁宗功徳茂盛宜凖周之文武百世不遷號為世室其宣祖真宗英宗則遷於西夾室以從順祖翼祖之後祫享則序昭穆於堂上而時享不及焉神宗哲宗徽宗欽宗高宗孝宗六室為親廟時享祫享如儀異時迭毁則三昭三穆以次而遷惟高宗受命中興異時雖或親盡亦當如仁宗故事别為世室百世不遷葢雖通為十室而三世室自在三昭三穆外其始祖之廟與三昭三穆正合七世之文如劉歆説而兄弟相繼各為一世先儒亦有定議并考古今畫成圖様其説甚備且謂他日恢復中原還反舊京則又當别考古制世為一廟而革去東漢以來同堂異室之陋葢不獨為今日議也而廟堂持之不上獨奏禮官及諸從臣所論請為别廟以奉四祖又詔恭依遂即毁撤僖祖宣祖廟室熹見諸公爭之甚力而右相趙汝愚雅不以熙寧復祀禧祖為然給舍樓鑰陳傳良又復牽合􅋔綴以附其説其語頗達上聽某月某日忽有㫖宣召熹赴内殿奏事葢將問之以此也熹因節畧狀文及為劄子畫圖貼説以進上覽之良以為然且喻熹曰僖祖乃國家始祖高宗時不曽遷孝宗時又不曽遷太上皇帝時又不曽遷今日豈敢輕議熹因奏曰此事義理甚明而聖意又已見得如此其不當遷無可疑者前日集議雖已施行而臣申省議狀獨未得經聖覽不曽降出即今來劄子却乞降出再令臣僚集議必有定論退見臺諫謝深甫張叔椿亦皆以熹説為然而謝獨甚悔前日合議之失其後不乆熹即罷歸而所議遂不復有所施行後却聞臺諫後省亦甞互入文字乞降出熹前所議而亦不知後來竟作如何収殺也然當日議狀奏劄出於匆匆不曽分别始祖世室親廟三者之異故其為説易致混亂而甞反疑前日之誤故今特備著之而别定兩圖以見區區之本意云君臣服議淳熙丁未十月八日太上皇帝上仙遺詔至州縣有司莫識衣冠制度大率盡用今式斬衰之服哀臨既畢及被禮部所下符則止當用布四脚直領布襴衫麻絰而已此符當與遺詔同日俱下乃遲數日有司不䖍惑悞四方已如此而於布四脚之下注云係幞頭於直領布襴下注云上領不盤則雖間有舉哀稍緩之處官吏傳觀亦多不曉四脚幞頭之説予記温公書儀及後山談叢所記頗詳乃周武帝所製之常冠用布一方幅前兩角綴兩大帯後兩角綴兩小帯覆頂四垂因以前邉抹額而繫大帯於腦後復收後角而繫小帯於髻前以代古冠亦名幞頭亦名折上巾其後乃以漆紗為之而專謂之幞頭其實本一物也今禮官以幞頭解四脚是矣而又不肯詳言其制則未知其若馬陳之所謂周武之所制者耶抑將以紙為胎使之剛强植立亦若今之漆紗所為者耶至於直領布襴衫上領不盤之説則衆尤莫曉葢既曰直領則非上領既曰上領則不容不盤兩言之中自相牴牾至於如此雖予亦莫識其所以然也乃有强為之説者曰雖為上領而不聫綴斜帛凑成盤曲之勢以就正圓但以長布直縫使足以遶項而已予謂禮官之意或是如此亦不可知但求之於古既無所考則亦何敢信而從之耶疑此特生於古今之禮不同禮官不能分别去取而欲依違其間是以生此回惑耳葢直領者古禮也其制具於儀禮其像見於三禮圖上有衣而下有裳者是也上領有襴者今禮也今之公服上衣下襴相屬而弗殊者是也竊意國恤舊章之本文必有曰直領布衫者而又有曰布襴衫者其服直領布衫則兼服布裙而加冠於首其服布襴衫則首加四脚而已葢其初雖合古今之禮而猶各有所施則亦未為失也今既不察其異矣又但見公服之上領而有襴遂解直領為上領不盤而増襴字於衫字之上文若遷今以就古而不自知其實之悞反至於廢古以徇今也又前此州縣誤用之禮皆著菅屨而符乃無又承用之者遂屨韈以赴臨殊乖禮意獨無曰杖云者於禮為粗合而亦有所未盡葢禮君之喪諸逹官之長杖所謂逹官謂專逹之官在今日則内之省曹寺監長官外之監司郡守凡一司之長若甞任侍從以上得専奏事者是也故今不杖之制施於僚佐以下則得之矣至使其長官下而同之而雖故相領帥若家居者無異文豈不薄哉又後數日乃得邸吏所報朝廷冠服制度則云皇帝初喪服白羅袍黒銀帶絲鞋白羅軟脚折上巾成服日服布斜巾四脚裙袴冠㡌竹杖腰絰首絰直領大袖布襴衫白綾襯衫視事日去杖首絰小祥日改服布四脚直領布襴衫腰絰布袴大祥日服素紗軟脚折上巾淺黄衫黒銀帶羣臣之服分為三等上等布頭冠布斜巾布四脚大袖襴衫裙袴首絰腰絰竹杖襯服中等布頭冠幞頭大袖襴衫袴腰絰其下等則布幞頭襴衫腰絰而已詳此帝服有冠有裙而衫曰直領則是古之喪服當自為一襲者又有四脚有襴衫則皆當世常服又當别為一襲者而今乃一之則果如予之所料矣然至於小祥之服則衫直領而下不裙宰臣之服則下雖有裙而衫非直領此又不可曉者其餘亦多重複繆悞如斜巾四脚冠㡌乃四物不當一時並加於首四者皆首服獨冠為古制斜巾乃民間初喪未成服時所用既成服則去之葢古者冕之遺制也今成服而與冠並用其失一也四脚之説已見於前葢宇文氏廢古冠而為之若兼存而互用猶不相妨今同時並加其失二也㡌古今皆為燕服與正服之用亦各有所施今與古冠四脚並用三失也今天子之冠四衮冕通天幞頭㡌子雖皆御服如之何而可並用於一時乎直領上領古裙今襴亦四物不當一時並加於身説已見前冠當服以終喪不當小祥而釋古禮小祥改服練冠但以熟布為之其制不易也今小祥便只服布四脚不服練冠非是其去巾㡌亦不知有何據也四脚幞頭折上巾三名一物不當錯出而異其名説亦見前兼禮官亦云四脚係幞頭則知二者非異物而於朝臣之服上等曰四脚中下等曰幞頭不知何謂其曰銀帶絲鞋白綾襯衫者則尤非喪禮之所宜服亦不待辨而知其非矣大抵其失在於兼盡古今以為天子備物之孝而不知考其得失而去取之正天子議禮制度考文之事也然此等條目之多欲一一而正之則有不勝正者必循其本而有以大正焉則曰斬衰三年為父為君如儀禮䘮服之説而已其服則布冠直領大袖布衫加布衰辟領負版揜袵布襯衫布裙麻腰絰麻首絰麻帶菅屨竹杖自天子至於庶人不以貴賤而有增損也但儀禮之冠三梁乃士禮今天子通天冠二十四梁當凖之而去其半以為十二梁羣臣則如其本品進賢冠之數以為等大本既立然後益考禮經以修殯𦵏饋奠之禮參度人情以為居處飲食之節行之天下凡諸吉凶之禮有詭聖不經如上領竒服之類者一切革而去之則亦庶乎一王之制而無紛紛之惑矣而前此議者猶或慮其説之難行雖以元祐之盛時而不能行范祖禹之論葢不知自漢以來所以不能復行君父三年之䘮者一則以人主自無孝愛之誠心而不能力行以率於上二則慮夫臣民之衆冠婚祠享會聚之有期而不欲以是奪之也國家自祖宗以來三年通䘮實行於内則其所以立極導民者無所難矣獨所以下為臣民之慮者未有折衷是以依違於此而未敢輕議此亦慮之過矣夫古之所謂方喪三年者葢曰比方於父母之喪云爾葢事親者親死而致喪三年情之至義之盡者也事師者師死而心喪三年謂其哀如父母而無服情之至而義有所不得盡者也事君者君死而方喪三年謂其服如父母而分有親踈此義之至而情或有不至於其盡者也然則所謂方喪者豈曰必使天下之人寢苫枕塊飲水食粥泣血三年真若居父母之喪哉今臣民之服如前所陳則已有定説矣獨庶人軍吏之貧者則無責乎其全雖以白紙為冠而但去紅紫華盛之飾其亦可也至如飲食起居之制則前所謂參度人情者正欲其斟酌古今之宜分别貴賤親踈之等以為隆殺之節且以婚姻一事言之則宜自一月之外許軍民三月之外許士吏覆土之後許選人祔廟之後許承議郎以下小祥之後許朝請大夫以下大祥之後許中大夫以下各借吉三日其太中大夫以上則並湏禫祭然後行吉禮焉官卑而差遣職事高者從高遷官者從新貶官者從舊如此則亦不悖於古無害於今庻乎其可行矣或者又謂今之吉㐫服上領之制相承已乆而遽盡革之恐未為允此不然也古今之制祭祀用冕服朝會用朝服皆用直領垂之而不加紳束則如今婦人之服交掩於前而束帶焉則如今男子之衣皆未甞上領也今之上領公服非先王之法服自五季之末流入中國至隋煬帝時廵遊無度乃令百官戎服從駕而以紫緋緑三色為九品之别本非先王之法服亦非當時朝祭之正服也今雜用之亦以其便於事而不能改耳曷若凖朝服祭服之法參取唐公服之制以為便服而去之哉唐公服見通典開元禮序例下篇民私䘮五服制度皆如此禮但以親踈分五等而衣服之制不殊温公書儀但斬衰齊衰用此制而大功以下從俗禮非是惟高氏送終禮其説甚詳當更討論訂正别為公私通行喪服制度頒行民間令其遵守庶幾先王之禮大小由之上下交修可以乆而不廢且使大義素定於臣民之家免至臨事紛錯疑惑衆聴民臣禮議同安作禮不難行於上而欲其行於下者難也葢朝廷之上典章明具又自尚書省置禮部尚書侍郎以下至郎吏數十人太常寺置卿少以下至博士掌故又數十人每一舉事則案故事施行之而此數十人者又相與聚而謀之於其器幣牢醴共之受之皆有常制其降登執事之人於其容節又皆習熟見聞無所違失一有不當則又有諫官御史援據古今而質正之此所謂不難行於上者也惟州縣之間士大夫庻民之家禮之不可已而欲行之則其勢可謂難矣搃之得其所以不合者五必欲舉而正之則亦有五説焉葢今上下所共承用者政和五禮也其書雖甞班布然與律令同藏於理官吏之從事於法理之間者多一切俗吏不足以知其説長民者又不能以時布宣使通於下甚者至或并其書而亡之此禮之所以不合者一也書脱幸而存者亦以上下相承㳂習茍簡平時既莫之習臨事則驟而學焉是以設張多所謬盭朝廷又無以督察䋲紏之此禮之所以不合者二也祭器甞經政和改制盡取古器物之存於今者以為法今郊廟所用則其制也而州縣専取聶氏三禮制度醜怪不經非復古制而政和所定未甞頒降此禮之所以不合者三也州縣惟三獻官有祭服其分獻執事陪位者皆常服也古今雜揉雅俗不辨而縣邑直用常服不應禮典此禮之所以不合者四也又五禮之書當時修纂出於衆手其間亦有前後自相矛盾及踈畧不備處是以其事難盡從此禮之所以不合者五也禮之所以不合者五必将舉而正之則亦有五説焉曰禮之施於朝廷者州縣士民無以與知為也而盡頒之則傳者苦其多習者患其博而莫能窮也故莫若取自州縣官民所應用者参以近制别加纂録號曰紹興纂次政和民臣禮畧鋟板模印而頒行之州縣各為三通一通於守令㕔事一通於學一通於名山寺觀皆櫝藏之守視司察體如詔書而民庻所用則又使州縣自鋟之板正歲則摹而掲之市井村落使通知之則可以永久矣此一説也禮書既頒則又當使州縣擇士人之篤厚好禮者講誦其説習其頒禮州縣各為若干人廩之於學名曰治禮每將舉事則使教焉又詔監司如提學司者察其奉行不如法者舉䋲治之此二説也祭器不一郡縣所用至廣諸祭惟釋奠從祀所用器物為多當約此數為定一州一縣必具之難以悉從朝廷給也但每事給一以為凖式付之州郡櫝藏於太守㕔事使以其制為之以給州用以賦諸縣或恐州縣自造不能齊同即賦錢於州縣各為若干詣行在所屬製造其器物用者自為一庫别置主典與所櫝藏者守令到罷舉以相付書之印紙以重其事禮書禮服並用此法此三説也祭服則當凖政和禮州縣三獻分獻執事贊祝陪位之服舉其所有者議其所無者補之使皆為古禮服釋奠分獻之屬皆用士人餘祭用吏人當殊其制製造頒降如祭器法此四説也禮書之不備者熹甞考釋奠儀之失今别出之更加詳考而正之仍為圖其班序陳設行事升降之所事為一圖與書通班之守視如書法則見者曉然矣此五説也夫禮之所以不合者如此必将舉而正之其説又如此亦可謂明白而易知矣而世未有議之者則以茍簡之俗勝而莫致意焉故也是其所以每難也愚故曰禮不難行於上而欲其行於下者難也故述斯議以為有能舉而行之則庻乎其有補焉爾改官議一諸州教官以經明行修登第人充罷去試法如不足則令侍從兩省臺諫及諸路監司雜舉歲無定員有闕則降指揮令舉一近制新改官人並令作縣其舉狀内只言犯入巳贓甘與同罪即不言若本人改官之後任親民差遣日如有疲懦殘酷違法害民即與同罪是以舉者狥私妄舉多不擇人及至負敗又無譴責今欲乞於舉狀中添入此項如有違戾必罰無赦一今改官人雖有引見之法然未甞親奉玉音詢考治行所以人得妄舉而昬繆不材之人或與其間欲乞今後引見之日每十人中特宣兩人升殿詢其前任職事及民間利害如有庸繆即行退黜仍将舉主降官放罷有職名者即令落職則舉者知畏而庸妄之徒不敢徼倖求進矣一改官之人設使所舉皆當然其才亦有大小之不同而今之縣道亦有難易之别今銓部之法未甞為官擇人而使人自擇官是以才高者審於擇地多注優閒易辦之縣才短者昧於所向多注繁劇難辦之縣使人與官兩失其所所以縣多不治而人有遺才也欲乞将天下諸縣分其難易又以大小為次委自尚書將合注知縣之人精加考究分作四等以可任繁難大縣者為上繁難小縣者次之優閒大縣又次之小縣為下其已任繁難者後任便與注權通判其任優閒縣者後任須管再入知縣一次不得别注差遣願注縣丞者聴但亦以三年為任一累任教官不曾實歴治民之人不許薦舉改官學校貢舉私議古者學校選舉之法始於鄉黨而逹於國都教之以徳行道藝而興其賢者能者葢其所以居之者無異處所以官之者無異術所以取之者無異路是以士有定志而無外慕蚤夜孜孜惟懼徳業之不修而不憂爵禄之未至夫子所謂言寡尤行寡悔禄在其中孟子所謂修其天爵而人爵從之葢謂此也若夫三代之教藝為最下然皆猶有實用而不可闕其為法制之密又足以為治心養氣之助而進於道徳之歸此古之為法所以能成人材而厚風俗濟世務而興太平也今之為法不然雖有鄉舉而其取人之額不均又設太學利誘之一塗監試漕試附試詐冐之㨗徑以啓其奔趨流浪之意其所以教者既不本於徳行之實而所謂藝者又皆無用之空言至於甚弊則其所謂空言者又皆怪妄無稽而適足以敗壊學者之心志是以人材日衰風俗日薄朝廷州縣每有一事之可疑則公卿大夫官人百吏愕眙相顧而不知所出是亦可驗其為教之得失矣而議者不知其病源之所在反以程試文字之不工為患而唱為混補之説以益其弊或者知其不可又欲斟酌舉行崇寧州縣三舍之法而使歲貢選士於太學其説雖若賢於混補之云然果行此則士之求入乎州學者必衆而今州郡之學錢糧有限將廣其額則食不足將仍其舊則其勢之偏選之艱而塗之狹又將有甚於前日之解額少而無所容也正使有以處之然使游其間者校計得失於旦暮錙銖之間不得寕息是又不惟無益而損莫大焉亦非計之得也葢甞思之必欲乗時改制以漸復先王之舊而善今日之俗則必如明道先生熈寕之議然後可以大正其本而盡革其末流之弊如曰未暇則莫若且均諸州之解額以定其志立徳行之科以厚其本罷去詞賦而分諸經子史時務之年以齊其業又使治經者必守家法命題者必依章句答義者必通貫經文條舉衆説而斷以已意學校則遴選實有道徳之人使専教導以來實學之士裁减解額舍選謬濫之恩以塞利誘之塗至於制科詞科武舉之屬亦皆究其利病而頗更其制則有定志而無奔競之風有實行而無空言之弊有實學而無不可用之材矣此其大畧也其詳則繼此而遂陳之夫所以必均諸州之解額者今之士子不安於鄉舉而爭趨太學試者以其本州解額窄而試者多太學則解額濶而試者少本州只有解試一路太學則兼有舍選之㨗徑又可以智巧而經營也所以今日倡為混補之説者多是温福處婺之人而他州不與焉非此數州之人獨多躁競而他州之人無不亷退也乃其勢驅之有不得不然者耳然則今日欲捄其弊而不以大均解額為先務雖有良法豈能有所補哉故莫若先令禮部取見逐州三舉終塲人數太學終塲人數解試亦合分還諸州理為人數通比舊額都數定以若干分為率而取其若干以為新額如以十分為率而取其一則萬人終塲者以百人為額更斟酌之又損太學解額舍選取人分數使與諸州不至大叚殊絶其見住學人分數權許仍舊則士安其土而無奔趨流浪之意矣所以必立徳行之科者徳行之於人大矣然其實則皆人性所固有人道所當為以其得之於心故謂之徳以其行之於身故謂之行非固有所作為増益而欲為觀聴之羙也士誠知用力於此則不惟可以修身而推之可以治人又可以及夫天下國家故古之教者莫不以是為先若舜之命司徒以敷五教命典樂以教胄子皆此意也至於成周而法始大備故其人材之盛風俗之羙後世莫能及之漢室之初尚有遺法其選舉之目必以敬長上順鄉里肅政教出入不悖所聞為稱首魏晉以來雖不及古然其九品中正之法猶為近之及至隋唐遂專以文詞取士而尚徳之舉不復見矣積至於今流弊已極其勢不可以不變而欲變之又不可不以其漸故今莫若且以逐州新定解額之半而又折其半以為徳行之科如解額百人則以二十五人為徳行科葢法行之初恐考察未精故且取其半而又減其半其餘五十人自依常法明立所舉徳行之目如八行之類専委逐縣令佐從實搜訪於省試後保明津遣赴州守倅審實保明申部於當年六月以前以禮津遣限本年内到部撥入太學於近上齋舍安排而優其廩給仍免課試長貳以時延請詢考至次年終以次差充大小職事又次年終擇其尤異者特薦補官餘令特赴明年省試比之餘人倍其取人分數如餘人二十取一則此科十而取一葢解額中已减其半矣殿試各升一甲其不中人且令住學以俟後舉其行義有虧學術無取舉者亦當議罰則士知實行之可貴而不専事於空言矣所以必罷詩賦者空言本非所以教人不足以得士而詩賦又空言之尤者其無益於設教取士章章明矣然熈寧罷之而議者不以為是者非罷詩賦之不善乃專主王氏經義之不善也故元祐初議有改革而司馬温公呂申公皆不欲復其欲復之者惟劉摯為最力然不過以考校之難而為言耳是其識之卑而説之陋豈足與議先王教學官人之本意哉今當直罷無可疑者如以習之者衆未欲遽罷則限以三舉而逓損其取人之數俟其為之者少而後罷之則亦不駭於俗而其弊可革矣所以必分諸經子史時務之年者古者大學之教以格物致知為先而其考校之法又以九年知類通達强立不反為大成葢天下之事皆學者所當知而其理之載於經者則各有所主而不能相通也况今樂經亡而禮經缺二戴之記已非正經而又廢其一焉葢經之所以為教者已不能備而治之者類皆舍其所難而就其所易僅窺其一而不及其餘則於天下之事宜有不能盡通其理者矣若諸子之學同出於聖人各有所長而不能無所短其長者固不可以不學而其所短亦不可以不辨也至於諸史則該古今興亡治亂得失之變時務之大者如禮樂制度天文地理兵謀刑法之屬亦皆當世所須而不可闕皆不可以不之習也然欲其一旦而盡通則其勢將有所不能而卒至於不行若合所當讀之書而分之以年使天下之士各以三年而共通其三四之一則亦若無甚難者故今欲以易書詩為一科而子年午年試之周禮儀禮及二戴之禮為一科而夘年試之春秋及三傳為一科而酉年試之年分皆以省試為界義各二道諸經皆兼大學論語中庸孟子義各一道論則分諸子為四科而分年以附焉諸子則如荀揚王韓老莊之屬及本朝諸家文字當别討論分定年數兼許於當年史傳中出論二道䇿則諸史時務亦然諸史則左傳國語史記兩漢為一科三國晉書南北史為一科新舊唐書五代史為一科通鑑為一科時務則律歴地理為一科通禮新儀為一科兵法刑統勑令為一科通典為一科以次分年如經子之法䇿各二道則士無不通之經無不習之史而皆可為當世之用矣其治經必専家法者天下之理固不外於人之一心然聖賢之言則有淵奥爾雅而不可以臆斷者其制度名物行事本末又非今日之見聞所能及也故治經者必因先儒已成之説而推之借曰未必盡是亦當究其所以得失之故而後可以反求諸心而正其繆此漢之諸儒所以専門名家各守師説而不敢輕有變焉者也但其守之太拘而不能精思明辨以求真是則為病耳然以此之故當時風俗終是淳厚近年以來習俗茍偷學無宗主治經者不復讀其經之本文與夫先儒之傳注但取近時科舉中選之文諷誦摹倣擇取經中可為題目之句以意扭揑妄作主張明知不是經意但取便於行文不暇恤也葢諸經皆然而春秋為尤甚主司不惟不知其繆乃反以為工而置之高等習以成風轉相祖述慢侮聖言日以益甚名為治經而實為經學之賊號為作文而實為文字之妖不可坐視而不之正也今欲正之莫若討論諸經之説各立家法而皆以注疏為主如易則兼取胡瑗石介歐陽脩王安石邵雍程頥張載吕大臨楊時書則兼取劉敞王安石蘓軾程頥楊時晁説之葉夢得吳棫薛季宣吕祖謙詩則兼取歐陽脩蘓軾程頥張載王安石吕大臨楊時吕祖謙周禮則劉敞王安石楊時儀禮則劉敞二戴禮記則劉敞程頥張載吕大臨春秋則啖助趙匡陸淳孫明復劉敞程頥胡安國大學論語中庸孟子則又皆有集解等書而蘓軾王雱吳棫胡寅等説亦可采以上諸家更加考訂増損如劉彜等説恐亦可取令應舉人各占兩家以上於家狀内及經義巻子第一行内一般聲説將來答義則以本説為主而旁通他説以辨其是非則治經者不敢妄牽已意而必有据依矣其命題所以必依章句者今日治經者既無家法其穿鑿之弊已不可勝言矣而主司命題又多為新竒以求出於舉子之所不意於所當斷而反連之於所當連而反斷之大抵務欲無理可解無説可通以觀其倉卒之間趨附離合之巧其始葢出於省試上天之載無聲無臭儀刑文王之一題然而當時傳聞猶以為怪及今數年則無題不然而人亦不之怪矣主司既以此倡之舉子亦以此和之平居講習専務裁剪經文巧為餖飣以求合乎主司之意其為經學賊中之賊文字妖中之妖又不止於家法之不立而已也今既各立家法則此弊勢當自革然恐主司習熟見聞尚仍故態却使舉子愈有拘礙不容下筆願下諸路漕司戒勑所差考試官今後出題須依章句不得妄有附益裁剪如有故違許應舉人依經直答以駁其繆仍經本州及漕司陳訴將命題人重作行遣其諸州申到題目亦令禮部國子監長貳看詳紏舉譴罰則主司不敢妄出怪題而諸生得守家法無復敢肆妖言矣又按前賢文集䇿問皆指事設疑據實而問多不過百十字嘉祐治平以前尚存舊體而吕申公家傳記熈寧事乃云有司發䇿問必先稱頌時政對者因大為諛詞以應之然則此風葢未逺也今亦宜為之禁使但條陳所問之疑畧如韓歐諸集之為者則亦可以觀士子之實學而息其諛佞之姦心矣其必使答義者通貫經文條陳衆説而斷以己意者其説己畧具于家法之條矣葢今日經學之難不在於治經而難於作義大抵不問題之大小長短而必欲分為兩叚仍作兩句對偶破題又須借用他語以暗貼題中之字必極於工巧而後已其後多者三二千言别無他意不過止是反復敷衍破題兩句之説而已如此不帷不成經學亦復不成文字而使學者卒歲窮年枉費日力以從事於其間甚可惜也欲更其弊當更寫巻之式明著問目之文而疏其上下文通約三十字以上次列所治之説而論其意又次旁列他説而以已意反復辯析以求至當之歸但令直論聖賢本意與其施用之實不必如今日經義分叚破題對偶敷衍之體毎道止限五六百字以上則雖多增所治之經而答義不至枉費辭説日力亦有餘矣至於舊例經義禁引史傳乃王氏末流之弊而論子史者不復訂以經指又俗學卑近之失皆當有以正之使治經術者通古今議論者識原本則庶乎其學之至矣其學校必選實有道徳之人使為學官以來實學之士裁减解額舍選謬濫之恩以塞利誘之塗者古之太學主於教人而因以取士故士之來者為義而不為利且以本朝之事言之如李廌所記元祐侍講吕希哲之言曰仁宗之時太學之法寛簡國子先生必求天下賢士真可為人師者就其中又擇其尤賢者如胡翼之之徒使専教導規矩之事故當是時天下之士不遠萬里來就師之其游太學者端為道藝稱弟子者中心説而誠服之葢猶有古法之遺意也熈寧以來此法浸壊所謂太學者但為聲利之塲而掌其教事者不過取其善為科舉之文而甞得雋於塲屋者耳士之有志於義理者既無所求於學其奔趨輻凑而來者不過為解額之濫舍選之私而已師生相視漠然如行路之人間相與言亦未甞開之以徳行道藝之實而月書季考者又祗以促其嗜利苟得冐昧無耻之心殊非國家之所以立學教人之本意也欲革其弊莫若一遵仁皇之制擇士之有道徳可為人師者以為學官而乆其任使之講明道義以教訓其學者而又痛减解額之濫以還諸州罷去舍選謬濫之法而使為之師者考察諸州所解徳行之士與諸生之賢者而特命以官則太學之教不為虚設而彼懐利干進之流自無所為而至矣如此則待補之法固可罷去而混補者又必使與諸州科舉同日引試則彼有鄉舉之可望者自不復來而不患其紛冗矣至於取人之數則又嚴為之額而許其補中之人從上㡬分特赴省試則其舍鄉舉而來赴補者亦不為甚失職矣其計會監試漕試附試之類亦當痛减分數嚴立告賞以絶其冐濫其諸州教官亦以徳行人充而責以教導之實則州縣之學亦稍知義理之教而不但為科舉之學矣至於制舉名為賢良方正而其實但得記誦文詞之士其所投進詞業亦皆無用之空言而程試論䇿則又僅同覆射兒戲初無益於治道但為仕宦之㨗徑而已詞科則又習於謟諛夸大之詞而競於駢儷刻雕之巧尤非所以為教至於武舉則其弊又不異於儒學之陋也欲革其弊則制科當詔舉者不取其記誦文詞而取其行義器識罷去詞業六論而直使待對於廷訪以時務之要而不窮以隠僻難知之事詞科則當稍更其文字之體使以深厚簡嚴為主而以能辨析利害敷陳法度為工武舉則亦使學官放經義論䇿之制叅酌定議頒下武經總要等書而更加討論補其遺逸使之誦習而立其科焉則庶乎小大之材各得有所成就而不為俗學之所病矣夫如是是以教明於上俗羙於下先王之道得以復明於世而其遺風餘韻又將有以及於方來與夫規規然固守末流之弊法而但欲小變一二於其間者利害相絶固有間矣草茅之慮偶及於此故敢私記其説以為當路之君子其或將有取焉天子之禮如此者數段先生初欲以入禮書後又謂若如此却是自己著書也遂除去不用今惟見此一段豈禘祫議之類皆是歟天子之禮至尊無上其居處則内有六寢六宫外有三朝五門其嬪御侍衛飲食衣服貨賄之官皆領於冡宰其冕弁車旗宗祝巫史卜筮瞽侑之官皆領於宗伯有師以道之教訓有傅以傅其徳義有保以保其身體有師氏以媺詔之媺下本冇訓字有保氏以諫其惡前有凝後有丞左有輔右有弼其侍御僕從罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧在輿有旅賁之規旅賁勇士掌執戈楯夾車而趨位宁有官師之典門屏之間謂之宁倚几有訓誦之諫工師所誦之諫書之於几也居寢有􅉏御之箴􅉏近也臨事有瞽史之道宴居有工師之誦史為書太史君舉則書瞽為詩工又誦箴諫大夫規誨士傳言庻人謗商旅於市旅陳也陳貨物以示時所貴尚百工獻藝獻其技藝以喻政事動則左史書之言則右史書之其書春秋尚書有存者御瞽幾聲之上下㡬猶察也察其存樂不幸而至於有過則又有爭臣七人面列廷爭以正捄之葢所以養之之備至於如此是以恭已南面中心無為以守至正而貌之恭足以作肅言之從足以作乂視之明足以作哲聴之聰足以作謀思之睿足以作聖然後能以八柄馭羣臣八統馭萬民而賞無不慶刑無不威逺無不至邇無不服傅説所謂奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民武王所謂亶聰明作元后元后作民父母所謂天降下民作之君作之師惟其克相上帝寵綏四方箕子所謂皇建其有極歛時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極董子所謂正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方者正謂此也何謂六寢六宫曰王大寢一小寢五大寢聴政故嚮明而治故在前小寢釋服燕息也故在後其小寢一寢在中四寢在於四角春居東北夏居東南秋居西南冬居西北土王之月居中后之六宫正宫在前五宫在後其制如王之五寢何謂三朝五門曰王宫之外門一曰臯門二曰雉門三曰庫門四曰應門五曰路門又曰虎門又曰臯門此鄭司農説也康成以雉門在庫門外而設兩觀其朝在雉門之外者曰外朝在路門之外者曰治朝路寢之廷曰内朝臯門之内外朝也朝士掌其法小司農掌其政列三槐與九棘設嘉石與肺石而朝諸侯聴詔詢大事在焉應門之内治朝也司士正其位宰夫掌其法大儀正王之位而王日視朝在焉路門之内燕朝也大儀正其位掌擯相族人朝焉玉藻曰朝服以視朝退適路寢聴政然則王日視朝於治朝而退聴政於燕朝矣雉門之外懸象治所以待民應門之外設宗廟社稷所以嚴神位路門之外則九室九卿朝焉路寢之内亦九室九嬪居焉外朝之法朝士掌之左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後左嘉石平罷民焉右肺石達窮民焉小宗伯職曰建國之神位右社稷左宗廟然則外朝在庫門之外臯門之内與今司徒府有天子以下大會殿亦古之外朝者周天子諸侯皆有三朝外朝一内朝二内朝之在路門之内者或謂之燕朝何謂貨賄曰有太府以受其貨賄之入關市之賦以待王之膳服邦中之賦以待賔客四郊之賦以待稍秣家稍之賦以待匪頒邦甸之賦以待工事邦縣之賦以待幣帛邦都之賦以待宗祀山澤之賦以待喪紀幣餘之賦以待賜予凡邦國之貢以待予用凡萬民之貢以充府庫凡式貢之餘財以供玩好之用而金玉玩好玉府掌之良兵良器内府掌之王后世子衣服之用則外府掌之滄洲精舍釋菜儀前期獻官以下皆盛服今用深衣涼衫掌儀設神座用席先聖南向配位西向從祀位東西向設祝版於先聖位之右設香爐香案香合於堂中設祭器於神坐前每位各左一籩今用漆盤實以脯果右一豆今用漆盤實以笋菜設犧尊一於堂上東南隅今以瓦尊代加勺羃設燭四於堂中二於東西從祀位之前設洗二於東階之東盥洗在東爵洗在西卓一於洗東卓上箱二巾東爵西設獻官位於堂下北面分奠者二人次之諸生又次之皆北向西上及期獻官以下序立於東廊下掌儀帥執事者升堂實酒饌贊者一人引獻官升堂㸃閱降就堂下位分奠官及諸生各就位贊者一人離位少前再拜訖進立於主人之右西向曰再拜在位者皆再拜掌儀祝司尊者皆升掌儀立於東序西向祝立於阼階上西向司尊者立於尊南北向贊引獻官詣盥洗之南北向立盥手帨手升焚香再拜降再詣盥帨如初詣爵洗南北向立洗爵以授贊升詣尊所西向立贊以爵授獻官司尊舉羃酌酒獻官以爵授贊俱詣先聖前獻官北向跪贊跪授爵獻官執爵三祭奠爵於籩之間俛伏興少立祝詣獻官之左東向跪讀祝訖興復位獻官再拜次詣盥洗爵如初洗諸配位爵訖贊者以盤兼捧升酌詣配位如初儀但不讀祝獻官復位當獻官詣配位酌獻時贊者二人各引分奠官分行東西從祀禮盥洗以下並如配位之儀東先西後分奠訖復位在位者皆再拜退獻者贊者分奠二人贊者二人祝掌儀者司尊趙壻親迎禮大畧前期女氏使人張陳其壻之室及期具饌設椅卓置於堂中東西相對各置杯匕箸蔬果於卓上酒壺在案席之後别置卓子於席南注子置其上壻盛服主人醮子之禮乘馬至女氏之門下馬俟于次女尊長父母醮子之禮出迎壻於門外揖遜而入至於㕔事主人升自阼階立西向壻升自西階北面再拜向内拜宅裏去主人不答拜姆奉女出中門至於㕔事壻揖之至婦轎前舉簾以俟姆奉婦登車下簾壻揖主人主人不降送壻乘馬在前婦車在後皆以二燭前導以行壻先至㕔事俟婦下車揖遂導以入婦從之贊者導壻揖婦而後婦從之適其室婦從者布席於閫内東方壻從者布席於西方壻立於東席婦立於西席婦拜壻答拜壻為婦舉䝉頭訖揖婦坐壻東婦西從者斟酒壻揖婦同祭酒舉飲從者置殽壻揖婦同祭殽食畢又斟舉飲饌不祭三斟亦如之此參酌古人合牢之禮乃徹饌晦庵集巻六十九欽定四庫全書晦庵集巻七十宋朱子撰
