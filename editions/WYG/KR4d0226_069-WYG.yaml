front:
  text: 韋元成劉歆廟數不同班固以歆説為是今亦未能决其是非姑兩存之至於遷毁之序則昭常為昭穆常為穆假令新死者當祔昭廟則毁其高祖之廟而祔其主於左祧遷其祖之主于高祖之故廟而祔新死者于祖之故廟即當祔於穆者其序亦然葢祔昭則羣昭皆動而穆不移祔穆則羣穆皆移而昭不動故虞之明日祔于祖父葢将代居其處故為之祭以告新舊之神也今以周室世次為圖如右所謂高祖以上親盡當毁虞之明日祔于祖父者也元豐議禮何洵直張璪以此為説而陸佃非之曰昭穆者父子之號昭以明下為義穆以恭上為義方其為父則稱昭取其昭以明下也方其為子則稱穆取其穆以恭上也豈可膠哉壇立於右墠立於左以周制言之則太王親盡去右壇而為墠王季親盡去左祧而為壇左右遷徙無嫌又曰顯考王考廟與左祧為昭皇考考廟與右祧為穆如曰成王之世武王為昭文王為穆則武不入考廟而入王考廟矣此皆為説之誤殊不知昭穆本以廟之居東居西主之向南向北而得名初不為父子之號也必曰父子之號則穆之子又安可復為昭哉壇墠之左右亦出先儒一時之説禮經非有明文也政使果然亦為去廟之後主藏夾室而有禱之祭且壇墠又皆一而已昭不可以越壇而徑墠穆不可以有壇而無墠故迭進而無嫌非若廟之有昭穆而可以各由其序而遞遷也又况昭穆之分自始封以下入廟之時便有定次後雖百世不復移易而其尊卑則不以是而可紊也故成王之世文王為穆而不害其尊於武武王為昭而不害其卑於文非謂之昭即為王考謂之穆即為考廟也且必如佃説新死者必入穆廟而自父以上穆遷於昭昭遷於穆祔一神而六廟皆為之動則於其祔也又何不直祔於父而必隔越一世以祔於其所未應入之廟乎佃又言曰假令甲於上世之次為穆今合堂同食實屬父行乙於上世之次為昭今合堂同食實屬子行則甲宜為昭乙宜為穆豈可遠引千歳以來世次覆令甲為右穆乙為左昭以紊父子之序乎此亦不曉前説之過也葢昭穆之次既定則其子孫亦以為序禮所謂昭與昭齒穆與穆齒傳所謂太王之昭王季之穆文之昭武之穆者是也如必以父為昭而子為穆則太伯虞仲乃太王之父而文王反為管蔡魯衛之子矣而可乎哉且一昭穆也既有上世之次又有今世之次則所以序其子孫者無乃更易不定而徒為紛紛乎曰然則廟之遷次如圖可以見矣子孫之序如佃所駁得無真有難處者耶曰古人坐次或以西方為上或以南方為上未必以左為尊也且又安知不如時祫之位乎時祫有圖在後昭穆之不為尊卑説已前見其大祫則始封以下以次相承亦無差舛故張璪以為四時常祀各於其廟不偶坐而相臨故武王進居王季之位而不嫌尊於文王及合食乎祖則王季文王更為昭穆不可謂無尊卑之序者是也但四時之祫不兼毁廟之主則右無昭而穆獨為尊之時若兩世室之主則文常為穆而武常為昭也故陸佃以為毁廟之主有皆不祫之時難之而未見璪之所以對也予竊以為以上世之次推之一昭一穆固有定次而其自相為偶亦不可易但其散居本廟各自為主而不相厭則武王進居王季之位而不嫌尊於文王及其合食於祖則王季雖遷而武王自當與成王為偶未可以遽進而居王季之處也文王之為穆亦虚其所向之位而已則雖北向而何害其為尊哉作此圖以見之
