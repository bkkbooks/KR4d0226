seq: 55
front:
  text: 潘謙之柄所喻心性分别不知後来見得如何性即是理情是流岀運用處心之知覺即所以具此理而行此情者也以智言之所以知是非之理則智也性也所以知是非而是非之者情也具此理而覺其為是非者心也此處分别只在毫釐之間精以察之乃可見耳愛恭宜别喜怒哀樂皆情也以前説推之可以三隅反矣看論語只看集注涵泳自有味集義或問不必句句理㑹却看一經一史推廣此意尤佳
  hash: sha256:62d48a94c7405db1d41093e4ea61f55ce9439f73a9ceacd2467c7e0038262fb3
  markers:
  - {type: page-break, offset: 88, content: '', id: KR4d0226_WYG_055-1b, image: WYG1144/WYG1144-0649b.png}
body:
  text: 答潘謙之所示問目如伊川亦有時教人静坐然孔孟以上却無此説要須從上推尋見得静坐與觀理兩不相妨乃為的當爾易説大槩得之但一隂生之卦本取一隂而遇五陽之義今如此説亦佳但更須子細看不知能兼此兩意否萃卦三句是占詞非發明萃聚之意也此是諸儒説易之大病非聖人繫辭焉而明吉凶之意卜田之吉占特於巽之六四言之此等處有可解者有不可解者只得虛心玩味闕其所疑不可强穿鑿也成性成之者性成字義同而用異成性是已成之性如言成説成法成徳成事之類成之者性是成就之意如言成已成物之類神之所為與祐神同與神徳行之神小異法象變通如此説亦得但不免微有牽合之病耳近日别看文字有疑幸語及也答潘謙之孟子首數篇與齊梁君語大抵皆為國治民之事特患學者不能用之耳即義利之對而定所趨充易牛之心以廣其善端閨門之内妻子臣妾皆有以察其温飽均其勞佚而無尊賤之僻焉亦與民同樂之意又何徃而非切身之事哉所論孟子書首若能如此推類反求固不害為切已但初學者便教如此看却又添了一重事不若且依本文看逐處各自見箇道理乆乆自然通貫不須如此費力也樂天畏天不同以仁者而居小國固不免為智者之事使智者而居大國則未必能為仁者之舉何者智者分别曲直未必能容忍而不與之較如仁者之為也得之禹稷顔子時不同而出處不同乃義之宜伯夷伊尹時同而出處異一是則一非一善則一惡孟子何以皆謂之聖人耶謂伯夷伊尹所為為非恐未安許行欲君民並耕則於人無貴賤之别欲市價不貳則於物無貴賤之差事雖異而意則同孟子因齊王易牛以發其不忍之心因夷之厚葬其親以箴其兼愛之失皆因其發見處以啟之得之伊川云養志莫如敬以直内此是就未發上説孟子所謂自反而縮以直養而無害集義所生皆指事而言就已發上説孟子方辨告子故専救其偏孟子論養氣只合就已發處説程子説養志自是當就未發處説各是一義自不妨内外之交養不可説孟子為救告子義外之失而姑為此言也恐大人所以為大人者不過不失其赤子之心而已論赤子之心恐未然若大人只是守箇赤子之心則於窮理應事皆有所妨矣王子墊以人之為士下既不為農工商之事上又未有卿大夫之職故疑其若無所事者孟子言士雖未得位以行道而其志之所尚則有仁義焉尚志之説甚善志字與父在觀其志之志同葢未見於所行而方見於所存也説大人則藐之葢主於説而言如曰見大人則藐之則失之矣得之於不可已而已一節以仁言於所厚者薄一節以義言夫不可已而已當厚而薄則怠惰自私而無力行篤義之心而失之不及矣或有發憤勇進者則又失之助長迨夫意氣一衰則私心邪念潰出而不可遏此又失之太過也仁義之説未是進鋭退速之説亦未精切葢其病正在意氣方盛之時已有易衰之勢不待意氣已衰之後然後見其失也盡心第一章游氏以知天為造其理事天為履其事固善矣然夭夀不貳一節又乃承上二節而言上乃知而行之此乃守而不變游氏之説恐未當夭夀不貳亦是知天之效但游氏説得下句太輕耳或問中以楊氏所譏王氏之説為非是柄竊以髙明之與中庸雖非二物然細分之亦不為無别中庸者理之所當然也髙明者理之所以然也聖人處已應物固無二道然處已而盡其理之當然者所以為中庸也知處已所以當然之理則髙明也應物而盡其理之當然者所以為中庸也知應物所以當然之理則髙明也王氏判而為二固非矣而楊氏又渾然無所區别則亦不察中庸髙明所以得名之實也其曰智不足以致知明不足以盡誠者其意葢以智為髙明誠為中庸但明字與誠字不類而反與上句所謂智者為一律豈牽於自明而誠之語而誤乎若如其意竊欲易曰知不足以致知誠不足以力行惟不足以致知故以髙明為淵深微妙而非局於一事為之末而不知髙明所以為中庸惟誠不足以力行故以中庸為出於人力之所勉強而非天理之自然而不知中庸所以為髙明此則王氏受病之處髙明是説中心所存不為物欲之所累處非指理而言也首章明道第四説云凡人説性只是説繼之者善也孟子言人性善是也似以孟子所言為氣禀之性若以為氣禀之性則固有善􅁖矣不得專謂之善也以下文水流之喻觀之則又似以氣稟本善發而後有善惡也使氣稟皆善則所發之惡何自來哉孟子所言不是氣稟之性但是性自不容説纔説性時便只説箇善字所謂天下之言性則故而已者正謂此也横渠氷水凝釋之喻似亦無害但以受光照納為言則㡬於釋氏所謂一靈真性者矣其所謂未嘗無者豈以其靈照之中實無一物之不具耶此則心之知覺而非性之實跡也既如此説即是有害矣舜察邇言所以無智者之過葢智者之過常在於騖髙逺而厭卑近也舜之智不過非獨為此一事須以全章體之舜隠惡而揚善聽言之道當如此葢不隠其惡則人將恥而不言矣後之當進賢退不肖之任者亦以隠惡揚善盜兼包并容之名是不知隠惡揚善之義也隠惡揚善不為進賢退不肖言乃為受言擇善者發也和而不流則非不恭之和中而不倚則非執一之中中和而不流不倚者擇之精有道而不變者守之固擇之精則不患乎道之難明守之固則不患乎道之不行能勉乎此則無賢智之過矣章句中謂四者各有次序不知如何豈不流尚易而不倚為難如富而無驕易貧而無怨難乎和而不流中立而不倚須就強字上看如此説無功夫矣武王周公之所以為達孝者柄竊以為舜之大孝所遭之至不幸也文王之無憂所遭之至幸也至幸與至不幸皆不可以為常惟武王周公之孝而天下通行之孝也恐無此意章句中以學知利行為仁困知勉行為勇竊恐未盡乎仁勇之徳也夫仁者安仁固不容以利行為言知仁勇皆謂之達徳則勇固通上下而言也不可專以困知勉行者目之以柄觀之三知三行云者所以總言達道達徳之在人其氣質雖有不同而及其至之則一也三近云者言人未至乎達徳而求至之者其用功當如是也似不必以三知三行分知仁勇如何此等處且虛心看到並行不悖處乃佳敬大臣則不眩章句中以為信任專而小臣不得以間之故臨事則不眩也柄竊觀下文官盛任使之意似以為不使之役役於細事乃所以敬之也惟其不役役於細事故其精神暇逸不至昏眩而迷於大體也不然二十七章既言大哉聖人之道矣而復以優優大哉冠於禮儀之上者葢言道體之大散於禮儀之未者如此得之二十四章成已仁也成物智也以柄觀之論語以學不厭為智誨不倦為仁又與此相反且學不厭與成已雖皆在己之事然一則學以明其理一則實體是理於吾身一知一仁猶可言也若夫成物乃仁之事何所與於知而歸之耶若非有智何以成物二十八章生乎今之世反古之道如此者烖及其身夫子非使後人不得復古也但以為生於春秋之世既無得位之理徒欲以匹夫之㣲而復古之道則不可耳使得時得位何不可者反古之道連上文愚賤説前輩多以夫子損益四代之制以告顔子而又曰吾從周其説似相牴牾者然以二十八章吾學周禮今用之吾從周之意觀之則夫子之從周特以當時所用而不得不從耳非以為當盡從周若答為邦之問乃其素志耳得之君子動而世為天下道行而世為天下法言而世為天下則世猶言世上也法是法度則是準則有可跂之實故言法言未見於行事故以其言為準而行之也得之答楊至之至所喻詩序既不曽習詩何縁便理㑹得只今且看四子音後所題依其次序用心講究入得門户立得根本然後熟讀一經子細理㑹有疑即思不通方問庶有進處若只如此泛泛掲過便容易生説雖説得是亦不濟事况全未有交涉乎所説易傳恐亦方是見得皮膚如何便説得易之大全無餘藴矣向嘗面説至之有膚淺之病不知曽究其所以然而加濬治之功否後之歸永春後曽復來否子順子能為學復如何彼中朋友後之講論可師叔文持守可法諸友若能頻與切磋必有益也漳州朱飛卿近到此病作未得細講陳淳者書來甚進異日未可量也答楊至之率性之説大槩得之然亦有未精宻處修道之教當屬何處亦出乎天耳君子中庸章二又字不用亦可但恐讀者不覺故特下此字要得分明耳人皆曰予知一條説得是中庸不可能一條亦然然三者亦是就知仁勇上説來葢賢者過之之事只知就其所所長處著力做去而不知擇乎中庸耳中立不倚之説當於或問中發之素隠行怪一章文義極分明如何看不破聖人之言固渾融然其中自有條理毫髪不可差非如今人鶻圇儱侗無分别也及其至也或問中已如此説足以相發明侯氏之説如何是非全體中之不能者更請子細看未能一焉固是謙辭然亦可見聖人之心有未滿處各見一義自不相妨也况此兩章正相連如何見得不是一意不見不聞此正指隠處如前後章只舉費以明隠也達徳次第甚明不須疑著柔逺人亦然物之終始或問説得極分明請更詳之不須便立異議也上焉者王天下者其上不容有人故只得以時言之上文極分明矣代明之説細碎無理答李守約閑祖讀書之法無他唯是篤志虛心反復詳玩為有功耳近見學者多是率為穿鑿便為定論或即信所傳聞不復稽考所以日誦聖賢之書而不識聖賢之意其所誦説只是據自家見識撰成耳如此豈復能有長進前輩葢有親見有道而其所論終不免背馳處者想亦正坐此耳所説持敬功夫恐不必如此徒自紛擾反成坐馳但只大綱収斂勿令放逸到窮理精後自然思慮不致妄動凡所營為無非正理則亦何必兀然静坐然後為持敬哉答李守約所示課程及日用功夫甚善但有疑雖當識以俟問然亦不可不時時提起閒看儻或相值殊勝問而後通也答李守約克已復禮為仁曽子言容貌顔色辭氣而其要在動正出之際大抵得之但曽子之語功夫更在三字之前此特語其效驗處耳自古皆有死集注云無信則雖生無以自立不若死之為安恐語有未瑩安字極有味更宜玩之仲弓為季氏宰問政程子曰便見聖人與仲弓用心之小大謂仲弓為蔽於小則可若曰仲弓必欲舉賢之權皆出於已有若要譽而市恩者則恐仲弓之賢未必至是程子之意固非謂仲弓有固權市恩之意而至於䘮邦但一蔽於小則其害有時而至此亦不為難矣故極言之以警學者用心之私也衛君待子而為政胡氏所謂具其事之本末告諸天王請於方伯命公子郢而立之於名正矣然孔子之於衛重非世臣親非貴戚之卿則恐衛君之未能安己以聽之也胡氏之言乃聖人大用之全體但其間曲折之微聖人須更有隨宜裁處處不患其不從也若但令出從蒯瞶為輒之私計則可其如衛國何哉程子論請討陳常處云所以勝齊者孔子之餘事此可見聖人之用矣衛公子荆善居室言居室則似是處家之意定公問一言可以興邦舊㸃言不可以若是為句今以言不可以若是其㡬也作一句不識别有微意否如集注説恐二字亦自相應以若是絶句恐不詞也夫子不答南宫适适雖非問然其言可取則亦不應全然不答疑其實有貶當世而尊夫子之意夫子不欲承當故不答耳管仲奪伯氏駢邑亦嘗疑蘓説少異然牽於愛而存之此但當用吳氏説引荀子以證之可也避地避世避色避言所遇不同固有未及徴於色而已發於聲者矣閌祖比會江西一士人謂太極圖主静之説乃出於老氏之説江西士人大抵皆對塔説相輪之論未嘗以身體之故敢如此無忌憚而易其言耳敬齋箴云須臾有間毫釐有差須臾之間以時言毫釐之差以事言皆謂失其敬耳非兩事也十月未嘗無陽之説發明程子之所未盡至為明白此理分明列莊之徒葢已窺見之矣故有宻移之説答李守約三詩甚善然為學當以修身窮理為急不患不能此也師禮自度未有以大為朋友之益故不敢當來喻似未悉鄙懐也答李守約示喻為學之病此非他人所能與直須痛自循省勇猛奮發方有下工夫處若只如此悠悠恐無入徳之期也答李守約所喻春秋難讀固然大抵今所可見者但程先生所謂大義數十炳如日星然亦時有所謂隠之於心而未能惬當者况其精微之意乎此湏異時别商量也集古後録甚荷畱念但向見傳漕處本中有一跋古鐘鼎帖銘載翟伯夀説或分一字作兩三字或合兩三字為一字者甚有理後來見尤延之説常州有葛子平推此説以讀尚書甚有功以是常欲得之而悔當時不及傳録今此本乃無之不知何故試煩更為尋訪恐有别本只為檢此一段來也答李守約熹目益盲而中庸未了數日來不免力疾整頓一過勢須作三書章句或問粗定但集畧覺得尚有未全備處今併附去煩子細為看過記辯併往册頭有小例子可見去取之意但覺刪去太多恐有可更補者可為補之或有大字合改作小字小字合改作大字者煩悉正之早遣一介示及為佳章句或問中有可商量處幸喻及答李守約中庸看得甚精章句大槩已改定多如所論但致中和處舊來看得皆未盡要須兼表裏而言如致中則欲其無少偏倚而又能守之不失致和則欲其無少差謬而又能無適不然乃為盡其意耳葢致中如射者之中紅心而極其中致和如射者之中角花而極其中又所發皆中無所間㫁近來看得此意稍精舊説却不及此也答李守約熹向來所苦只是勞心所致尋以般移應接内外勞擾遂不藥而愈乃知君逸臣勞真養生之要訣也答李守約所喻庶母之名亦未正庶母自謂父妾生子者士服緦麻而大夫無服若母則儀禮有公子為其母之文今令甲其下亦明有注字曰謂生己者則是不問父妻父妾而皆得母名矣故注中則有嫡母之文又以明此生己者之正為母也至如封叙封贈亦但謂之所生母而不謂之庶母也通典之説未暇檢但以公子為母練冠麻衣既塟除之為比則承宗廟社稷之重者恐不得為父所生之祖者母持重矣更俟病間續攷奉報數日因人説琴謾為考之頗有條理然不能琴不識其聲但以文字求之恐未必是亦須面論答李守約所問喪禮乆以病勢侵廹無復心情可以及此又見所説皆己失其大體而區區於其小節若隨宜區處則恐亦自失其正而陷於以禮許人之罪故一向因循不能奉報今又承專人以來不免以屬劉用之令其條析其如别紙又不知能行否也大率平日見得賢者鄉學之意雖力而終不免多有世俗之心凡事必生宛轉回䕶遮前掩後之意常不快意今乃悉見於此葢其處已處人無不然者不知亦嘗内省及此否耶答李守約王子合過此説失解曲折甚以為恨此等事遲速自有時節若㫁置得下則自與我不相干矣上蔡於此發明甚有力正好於實地上驗之也前書所問誠字之説大槩已得之禽獸於義禮上有見得處亦自氣稟中來如饑食渇飲趨利避害之類而已只為昏愚故上之不能覺知而下亦不能作偽來喻上文葢己言之不知如何又却更疑著也大中之説不記向來所論首尾此亦只是無事之時涵養本原便是全體隨事應接各得其所便是時中養到極中而不失處便是致中推到時中而不差處便是致和不可説學者方能盡得一事一物之中直到聖人地位方能盡得大中之全體也仁包五常之説已與令裕言之大抵如今朋友就文義上說如守約儘説得去只恐未曽反身真箇識得故無田地可以立脚只成閒話不濟事耳答李守約前日所喻舉世皆謂當然熹亦豈敢以為不然但恐禍福之來亦有定分非智力所能免不欲枉作此怱怱耳若謂與時消息固並行而不悖也答李守約一本作答李時可所論克復工夫甚簡潔知用心之精切也但依此用力更加講學之功則必有所至矣前所寄者今答於後史論大槩亦甚正也好仁惡不仁章某竊觀之人之資禀固有偏重如此如顔孟之事亦可見矣顔子嫉惡不仁之事罕見於經可謂好仁者於孟子則辨數不仁者之情狀無一毫少貸可謂惡不仁者此説得之斯仁至矣至若來至之意昔者亡之今忽在此如自外而至耳如易言來復實非自外而來也君子所貴乎道者三正之為言猶有待乎用力之意非如動容貌出辭氣文意自然言君子所貴於道者在此三事而籩豆之事則其所賤也動出非是全不用力正亦非是大段用力惟正之而非偽飾所以為可貴耳更詳集注以解經文自見曲折驕吝章集注曰驕矜誇吝鄙吝某竊思之似謂誇其有於已驕也不以其有與人吝也然又載程子之言曰驕氣盈吝氣歉夫自以為有餘則氣盈自以為不足則氣歉似於集注之説不同吝之所有乃驕之所恃也故驕而不吝無以保其驕吝而不驕無所用其吝此盈於虛者所以必歉於實而歉於實者所以必盈於虛也執御章集注謂然則吾當執御矣則以為夫子真執御至於末後載尹氏之説曰吾將執御矣則以為夫子之設詞某竊以後説於上下文意為順黨人之稱孔子如此不知孔子當以嘗執賤事告人而辭其無所成名之大耶當故為自屈之詞以顯其所稱之失耶二者氣象之大小必有能辨之者沽之哉哉之為義以常例言之則為疑辭集注直曰固當賣之而不以為疑詞何也哉本歎辭其或為疑辭者亦歎以疑之也此言沽之哉而繼以待價則不得為疑辭矣巍巍乎舜禹之有天下也而不與焉伊川曰舜禹之有天下也而不與求焉集注不取何也有字與與字相應若為不與求則有當作得矣恐不然也不忮不求不嫉人之有故無害人之心此之謂不忮不恥已之無故無貪欲之心此之謂不求則是以一人而兼二病然末後載吕氏説曰貧與富交強者必忮弱者必求似非此意而於本文不明如何不嫉人之有不恥已之無正是吕氏意不知更有何疑更詳言之不得其醬不食醬者當是鮓醢之物如魚膾不得芥醬麋腥不得醢醤則不食謂其不備或傷人也孟子口之於味章言人之性命有此二端自口之嗜味以至四體之嗜安逸形氣之性君子有弗性焉自仁之於父子以至聖人之於天道道義之性君子性之猶舜所謂人心道心之在人特要精别而力行之耳看得儘好答李時可中庸非自成已而已也章求之章句曰誠雖所以自成然在我者無偽則自然及物矣若仁皆性之徳故在内外無二道所以時措之而各得其宜也審如是説則是以仁知為合内外二道而非以誠為合内外之道恐於合字有疑礙唯誠為能盡仁知之徳而合内外之道章句語有未瑩處耳中庸不見而章章求之章句則曰不見而章以配地言不動而變以配天言何也且觀上下文雖先言博厚次言髙明先言配地後言配天然繼此而論天地山川則又以天為稱者是葢錯綜而言之耳不必以地為先也此等處不須深求只是隨文贊歎大畧看過可也中庸喜怒哀樂未發謂已中正萬物育焉竊謂中也者言性之體也此屬天命之謂性和也者言道之用也此屬率性之謂道致中和者言教之推也此屬修道之謂教伏讀章句或問則致中和專言自己之事恐欠推以及人數句已字疑之字誤正字疑止字誤既曰天下之大本天下之達道則只是此箇中和便總攝了天地萬物不須説推以及乎人也前章今承先生曲賜指教思之大槩有二説能推致中和之極而又得時得位以行之則道民以徳齊民以禮以吾之先知覺彼之後知以吾之先覺覺彼之後覺使中和之化浹於天下然後中道之所感格天地以位萬物以育此以事言者也雖不得位以行之而既以全大中之極致即天地之所以定位者也既已全至和之極致即萬物之所以育者也此以理言之也所論中和兩叚大意皆是但前叚説得新民意思太多致和處猶可如此説若致中却如何得天下之人皆如吾之寂然不動而純亦不已耶只是自家有些小本領方致得和然後推以及人使人觀感而化而動天地感鬼神耳自其已成而論之則見天地之位本於致中萬物之育本於致和各有脉絡潜相灌輸而不可亂耳誠者物之終始章云云凡有一物則其成也必有所始其壊也必有所終而其所以始者實理之至而向於有也其所以終者實理之盡而向於無也若無是理則亦無是物矣此誠所以為物之終始而人心不誠則雖有所為皆如無有也葢始而未誠則事之始非始而誠至之後其事方始終而不誠則事之終非終而誠盡之時其事已終若自始至終皆無誠心則徹頭徹尾皆為虛偽又豈復有物之可言哉此即向來所説之意但章句或問説得都不分明故讀者不能曉今得時可反復問辨方説得到次第兩處皆須更定此可并以示守約也答李時可所喻子文事大槩得之但專以愛言似未盡耳嘗聞延平先生説三仁事云當理而無私心則仁矣今以此語推之則子文合下便有未仁處不待語其愛之不廣然後知其未仁也三仁之心只欲紂改過而圖存比干之殺身葢非得已箕子亦偶未見殺耳非有意於為奴也事勢既爾㣲子自是只得全身以存先王之祀皆理不得不然者使其先有殺身強諫之心則亦不得為仁人矣答李時可示喻執中之説程先生云惟精惟一所以至之允執厥中所以行之明此中字無過不及之中初非未發之中也向於中庸章句序中曽發此義今謾録去答李時可所論大學之要甚善但定静只是知止之效不須言養之以定静又别做一項工夫也所引孟敬子章集注中語有餘云者恐是有素豈印本之誤耶然莊敬誠實涵養亦非動容貌正顔色出詞氣之外别有一叚工夫只是就此持守著力至其積乆純熟乃能有此効而不費力耳魯秉周禮葢於是時地醜徳齊之中猶能守得舊日禮樂文章耳若三綱九法之亡則當時諸侯之國葢莫不然亦非獨魯之責也答李時可諸家説見今方尋檢元祐説命無逸講義乃晁以道葛子平程泰之吴仁傑數書先附去可便參訂序次當以注疏為先疏節其要者以後只以時世為先後可也西山間有發明經㫖處固當附本文之下其統論即附篇末也記得其數條理㑹㸃句及正多方多士兩篇可併效之答李時可所寄堯典以目視頗難又有他冗未暇討究已付諸朋友看俟其看了却商量也書序不須引冠篇首但諸家所解却有相接續處恐當作注字附於篇目之下或低一字作𫝊冩而於首篇明著其謬亦可但恐諸家元無此説即且闕之以俟書成别加訂正也王氏書義序中明言是雱説然荆公奏議却云一一皆經臣手今但以序為正可也餘未報者併俟後信答李時可所喻固知孝思之切於此不能自己者然風色如此不論也人雖賢昆仲寧能保其不漏露於三族之間耶此須他日面見子細商量亦為未晚但恐衰朽風燭不定則是天之命也亦無可奈何矣書説縁此間禮書未了日逐更無餘功可及他事只畧看得禹貢如冀州分為三段頗有條理易照管而諸州皆只作一段則太濶逺而叢雜矣恐皆合依冀州例而逐句之下夾注某人曰某地在某州某縣其古今州縣名不同有復見者亦並存之以備參考段後低一字大書右某州第幾節以圈隔㫁而先儒有辨論通説處即亦大字附於其下如逾于河過九江等處今所取程説只有辨而無解大是欠闕須更子細補足若今日自有所疑有所㫁則更低一字冩之如治梁及岐恐晁説為是其餘固草草程泰之最著力説然亦不通葢梁山在同州近河猶可言河流波及若岐山則在今鳯翔府自京兆府西去猶有六七百里觀地理圖可見其地勢之髙且逺河水何由可及耶此類須載其本説而㫁以非是則讀者曉然矣如無此兩項則各留一二行空紙以俟恐後有補入者其導山處須以四列為四叚導水則一水為一叚叚後亦如前例云右導山第幾節右導水第幾節其通論疑㫁亦如之如此則庶幾易看矣所寄册子今却封還請依此格目作一草卷便中寄及也答劉定夫所喻為學之意甚善然説話亦已太多鄙意且要得學者息却許多狂妄身心除却許多閑雜説話著實讀書初時儘且尋行數墨乆之自有見處最怕人説學不在書不務佔畢不專口耳下稍説得張皇都無収拾只是一場大脱空直是可惡細讀來書似尚有此意思非區區所欲聞也答劉定夫來書詞氣狂率又甚往時且宜依本分讀書做人未須如此胡説為佳答包顯道揚所喻致曲如此説於功夫無不可但盡性乃是自然盡得不可謂之直處用功耳致曲只是於惻隠處擴充其仁羞惡處擴充其義耳雖在一偏此却如何少得耶大率來喻依舊有忽略細微徑趨髙妙之意子淵書來云顯道於異説已自洗濯熹固疑之今以此驗之乃知果如所疑也答包顯道既未免讀書則不曽大段著力理㑹復是何説向見前舉程文從頭罵去如人醉酒發狂當街打人不可救勸心甚疑之今乃知其病之有在也答包詳道詳道資禀篤實誠所愛重前書云云非以苟相悦也但觀所與顯道講論竊恐却與去嵗未相見時所見一般葢熟處難忘所驟聞者未能遽入而復失之耳大學鄙説近看尚有未安處却是未甚平正方畧竄定恨未得奉呈然使賢者見之愈未必信大抵如熹所見愈退而愈平賢者所見愈進而愈險彼此不同終未易合且當置之各信其所信者即看久逺如何耳顯道根本處亦且是從前所見但添得此中些説話如敏道令弟則立論又甚髙尤非熹之所敢知耳答包詳道示喻為學之意自信不疑如此他人尚復何説然觀古人為學只是升髙自下步步踏實漸次解剥人欲自去天理自明無似此一般作捺紐揑底工夫必要豁然頓悟然後漸次修行也曽子工夫只是戰兢臨履是終身事中間一唯葢不期而㑹偶然得之非是别有一節功夫做得到此而曽子本心蘄向必欲得此然後施下學之功也所論當論是非不當論平險者甚善然是則必平正縁不是故有險耳此説甚長非幅紙可既也答包詳道示喻曲折足見進道之力然若謂氣質之偏只得如此用力則固不失為近本而於獨善其身有得力處今却便謂聖門之學只是如此全然不須講學纔讀書窮理便為障蔽則無是理矣顔子一問為邦夫子便告以四代之禮樂若平時都不講學如何曉得禮記有曽子問一篇於禮文之變纎悉曲盡豈是塊然都不講學耶東坡作蓮花漏銘譏衛朴以已之無目而欲廢天下之視來喻之云無乃亦類此乎答包敏道示喻已悉求放心固是第一義然如所謂軌則一定而浩然獨存使赤子之心全復於此而明義之本先立於此然後求聞其所未聞求見其所未見則亦可謂凌躐倒置而易其言矣聖賢示人模範具在近世乃有竊取禅學之近似者轉為此説以誤後生後生喜其為説之髙為力之易便不肯下意讀書以求聖賢所示之門户而口傳此説髙自標致亂道誤人莫此為甚三復來喻恐未免此因便布聞未知明者以為如何第深僣率之愧而已答包敏道承喻粗心浮氣剥落向盡閒居意味殊不淺自許如此他人復何所道區區但覺欲寡其過而未能耳答包敏道所喻已悉但道既不同不相為謀不必更紛紛今後但以故人相處問訊徃來足矣九卦若如此説却似與前幅自相矛盾也一笑答符舜功叙嘗謂敬之一字乃聖學始終之要未知者非敬無以知己知者非敬無以守若曰先知大體而後敬以守之則夫不敬之人其心顛倒繆亂之不暇亦将何以察夫大體而知之耶答符復仲初聞向道之意甚勤向所喻義利之間誠有難擇者但意所疑以為近利者即便舍去可也向後見得親切却看舊事只有見未盡舍未盡者不解有過當也見陸丈回書其言明當且就此持守自見功効不須多疑多問却轉迷惑也答符復仲且讀易傳甚佳但此書明白而精深易讀而難曉須兼論孟及詩書明白處讀之乃有味耳答符國瑞辱書具道為學之志又見令叔為言曲折甚善既有此志則窮理飭躬處且當勉力未可便肆虚談厭末求本恐或流於輕妄而反失之也所需墓額偶苦臂痛不能冩然仁人孝子所以顯其親者正亦不在此也答黄幾先示喻已悉但既曰各勉其志以自立而有待於歲寒則何必為此縷縷而煩執禮之恭哉衰病比劇舜功遣人行速布此不及詳然亦無以詳為矣答陳超宗示喻向來鄙論有未盡者甚善甚善但為學雖有階漸然合下立志亦須畧見義理大槩規模於自已方寸間若有箇惕然愧懼奮然勇决之志然後可以加之討論玩索之功存養省察之力而期於有得夫子所謂志學所謂發憤政為此也若但悠悠泛泛無箇發端下手處而便謂可以如此平做将去則恐所謂荘敬持養必有事焉者亦且若存若亡徒勞把捉而無精明的確親切至到之効也但如彼中誠是偏頗向日之言正為渠輩之病却是賢者之藥恐可資以為益耳以今觀之政不必爾但将聖賢之言事理就已心上作一處看隨得隨守則乆之須自有開明處也答陳超宗示喻已悉但如此安排布置都是病痛又如必欲繆札安立標榜尤是大病若是真實做功夫底人只此一念之間便著實從脚根下做将去何暇如此擬議粧㸃耶不須深議他人得失政恐未免反為彼所笑也答陳超宗示喻自覺已與舊時迥别但未免間有小失果能至此甚慰所望但向來商量及得近書所論似於著實下功處猶未親切不知如何便得到此恐可且更向裏用心将此等向外粧㸃安排底心一切掃去乆乆或有長進耳若如此説今日用功明日見効則其不曽下功斷可知矣答顔子堅包顯道在此數稱吾子之賢每恨未獲一見辱書偹見雅志亦足以當晤言矣然所謂古人學問不在簡編必有所謂統之宗㑹之元者則僕之愚於此有未諭也聖人教人博文約禮學問思辨而力行之自灑掃應對章句誦説以至於精義入神酬酢萬變其序不可誣也若曰學以躬行心得為貴而不專於簡編則可若曰不在簡編而惟統宗㑹元之求則是妄意躐等以陷於邪説詖行之流而非聖賢所傳之正矣抑觀來書詞氣之間輕揚傲誕殊無謹厚篤實之意意者吾子於下學之功有未嘗加之意者不知往年見張陸二君子其所以相告者果何事也又聞不念身體髮膚之重天叙天秩之隆方将毁冠裂冕以從夷狄之教則又深為惘然不意吾子知尊敬夫而所趨者若是豈亦所謂統宗㑹元者之為􅑂而使吾子至於此耶顯道不能諫止已失朋友之職節夫更有助縁尤非君子愛人之意也聞已得祠曹牒髠􅗴有期急作此附遞奉報願吾子於此更入思慮或意已決亦且更與子静謀之必無異論而後為之似亦未晚如曰不然則道不同不相為謀僕不知所以為子計矣答熊夢兆天命謂性充體謂氣感觸謂情主宰謂心立趨向謂志有所思謂意有所逐謂欲此語或中或否皆出臆度要之未可遽論且涵泳玩索乆之當自有見或云學者天資庸常舊習未去便令他學中則怠惰廢弛循常習故去須是奮發有豪邁之氣出得舊習了然後求中所以孔子道不得中行而與之必也狂狷乎竊謂所學少差便只管偏去恐無先狂後中之理或人之説非惟用力處有病亦説壊了中字後説得之或云明道説居處恭執事敬與人忠了此便是徹上徹下語且道如何是徹下語居處恭執事敬與人忠此是形而下者然於此須察其所以恭所以敬所以忠其來由如何以至耳目鼻口視聽言動皆然了此便透頂上去便是天命天性純乎天理此是形而上者是徹上語是一體渾然底事元無兩般能了此則他禅宗許多詭怪説話皆見破若如此説是乃自陷於異端而不自知又如何見得他破常學持敬讀書心在書為事心在事如此頗覺有力只是暝目静坐時支遣思慮不去或云只瞑目時已是生妄想之端讀書心在書為事心在事只是収聚得心未見敬之體静坐而不能遣思慮便是静坐時不曽敬敬則只是敬更尋甚敬之體似此支離病痛愈多更不曽得做功夫只了得安排杜撰也每有喜好適意底事便覺有自私之心若欲見理莫當便與克下此等事見得道理分明自然消磨了似此廹切却生病痛上蔡對伊川也只是去箇矜字上蔡才髙所以病痛盡在此此説是父母之於子有無窮憐愛欲其聰明欲其成立此謂之誠心耶父母愛其子正也愛之無窮而必欲其如何則邪矣此天理人欲之間正當審决待人接物之道如何知所以處心持已之道則所以接人待物自有準則近專看論語精義不知讀之當有何法别無方法但虚心熟讀而審擇之耳安老懐少恐其間多有節目今只統而言之恐學者流為兼愛去此是大槩規模未説到節目處學者有志於仁雖其趨向已正而心念未必純善豈得言無惡也志於仁則雖有過差不謂之惡惟其不志於仁是以至於有惡此志字不可草草看富貴貧賤不以道得不去處之説此是為大賢以下設若大賢以上則處富貴貧賤只如一更不消如此説聖賢之言多是為學者發若是聖人分上固是不須説不但此章而已也聖人不勉不思今書載傳授之㫖云允執厥中下一執字似亦大段喫力如何聖人固不思不勉然使聖人自有不思不勉之意則罔念而作狂矣經言此類非一更細思之孔子言闗雎樂而不淫哀而不傷是言樂不至於淫哀不至於傷今詩序将哀樂淫傷判作四事説似錯㑹論語意以此疑大序非孔子作此説得之大序未知果誰作也大雅小雅或謂言政事及道故謂之大雅止言政事故謂之小雅竊恐不可如此分别如此分别固非是然但謂不可分别則二雅之名又何以辨耶五伯秦穆未嘗主盟中夏乃與其數晉悼嘗為盟主却楚服鄭何故不與此等無所考且依舊説又有昆吾豕韋大彭之説亦兼存之可也竊謂釋氏之失一是自私自利厭死生為學大體已非二是滅絶人倫三心徑求上達不務下學偏而不該其失固不止此然其大處無越是三者未須如此立論釋氏言輪回轉化之説所傳禅長老去何處託生其迹甚著是謂氣散而此性靈不滅伊川聞之曰若謂既斃之氣復為方伸之氣與造化殊不相似似與性靈之説不相干如何此等處窮理精熟自當見得未可如此臆度論也答安仁吳生去嵗辱書無便可報今又承專人枉問極感至意且知志尚之髙逺為可喜也然三復來示葢已自謂所得之深而自信不疑矣復何取於老拙之無聞而勤懇若是耶以為見教則僕未嘗有請於吾子以為求知於僕則易簡理得可乆可大之君子似不應若是其汲汲也且僕於吾子初未相識問之來使則知吾子之齒甚少而家有嚴君之尊焉今書及詩序等乃皆嵬岸倨肆若老成人之為者至於卒然以物饋其所不當饋之人而不稱其父兄之命則於愛親敬長之良知良能又若不相似也吾子自謂已得是心而明是理僕不知吾子之所謂心者果何心所謂理者果何理也夫顔子之樂未嘗自道曽晳之志非夫子扣之再三而不置亦未嘗肯遽以告人也豈若是其髙自譽道而惟恐人之不我知也哉相望之逺不知吾子師友淵源之所自恐其所以相告者未得聖賢窮理修身之實而徒以空言相誤使吾子陷於狂妄恣睢之域而不自知其非也所惠紙簡硯墨受之無説不敢發封復以授來使矣吾子其於聖賢小學之教少加意焉則其進有序而終亦無所不至矣答趙然道師雍足下求官得官今所從宦又去親庭不逺足以徃來奉養君親之義為不薄矣今乃無故幡然自謂棄一官如棄涕唾何始慮之不審而乃為此傲晲之詞耶此鄙拙之所未喻也荆門之訃聞之慘怛故舊凋落自為可傷不計平日議論之同異也來喻又謂恨不及見其與熹論辨有所底止此尤可笑葢老拙之學雖極淺近然其求之甚艱而察之甚審視世之道聽塗説於佛老之餘而遽自謂有得者葢嘗笑其陋而譏其僭豈今垂老而肯以其千金易人之弊帚者哉又况賢者之燭理似未甚精其立心似未甚定竊意且當虛心擇善求至當之歸以自善其身自此之外葢不惟有所不暇而亦非所當預也向有安仁吳生書來狂僣無禮嘗以數字答之今謾録去試一觀之或不為無補也所喻冩孟子字多不暇三大字適冗亦未及作然此亦何能有助於學而徒使老者勞於揮染耶答康户曹仲潁一本無仲字熹衰懶杜門少與人接頃嵗偶見足下省闈條對之文愛其詞氣議論之不凡每恨無因縁相見數為士友言之兹辱惠書乃知此意嘗得徹聞而又喜賢者之不予鄙也示喻縷縷足見所存之逺大矣然嘗以熹所聞聖賢之學則見其心之所存不離乎日用尋常之近小而其逺者大者自不待於他求初不若是其荒忽放浪而無所歸宿也故曰下學而上達又曰學問之道無他求其放心而已矣此聖賢終身事業熹也少而嘗有志焉今老且死尚恨未能有以得其彷彿之萬分也足下不以愚言為無取幸試思之異時肯來如約其從與否熹将望足下眉睫而有以得之也答邵叔義一本無叔義二字有機字逺辱惠書良荷厚意而長牋短幅表裏殫盡尤見雅志之髙逺也髙侯教士養民之績已悉書之如來喻之云矣但衰晚多病目瞽神昏序事之外無能有所發明此為愧耳至於髙侯之所以教與足下之所以學亦恨未得其詳然竊意必欲實為此學亦當有以自致其力於日用之間存心養氣讀書窮理積其精誠循序漸進然後可得决非一旦慨然永嘆而躐等坐馳之所能至也答邵叔義竊聞下車以來究心職業設施注措類非俗吏之所能者甚善甚盛委喻祠記深認不鄙初以衰病之餘心力衰耗兼前後欠人文字頗多不敢率爾承當又念題目甚佳却欲附名其間使後人知賢大夫用心之所在但見有一二文字未竟度須更數日方得下筆九月間更令一介往山間取之為幸絜知之義乃少日聞之先友范公名如圭字伯達其説如此義理切當援据分明先儒訓説皆未及也今得仁者表而出之豈惟學者之幸葢今百里之人與異時臨莅所及無不䝉被其澤幸甚幸甚大學鄙説舊本紕陋不足觀近年屢加刋訂似頗得聖賢之遺意怱怱未暇抄録求教答邵叔義所喻日用工夫如此數語誠是要切然亦須真踐其實乃為有益不然徒為墻屋標榜反招譏訕也答邵叔義子静書來殊無義理每為閉匿不敢廣以示人不謂渠乃自暴揚如此然此事理甚明識者自當知之當時若便不答却不得也所與左右書渠亦録來想甚得意大率渠有文字多即傳播四出惟恐人不知此其常態亦不足深怪吾人所學却且要自家識見分明持守正當深當以此等氣象舉止為戒耳太極等書四種謾附呈恐有所疑却望䟽示徐丞處想時有便也吳大年極荷留念想且留畨陽也答湯徳逺示喻為學之意極為髙逺非愚慮所及然未知所論於聖賢之言以何為據其用力次第果如何此必有親切慤實可以循序而進者乃為吾儒之學如其不然恐未免陷於佛老之邪説非熹之所敢知也答王徳修熹兒侍先君子官中秘書是時和静先生實為少監熹嘗於衆中望見其道徳之容又得其書而抄之然幼穉愚䝉不能識其為何等語也既長從先生長者游受論語之説遍讀河南門人之書然後知和静先生之言始有以粗得其味然既不得親受音㫖而其髙第弟子如老丈者又未得見以信其所粗得者果先生之意否也正叔之來既獲聞所以相予之意甚厚又得其所聞於左右者一二信乎河南夫子所謂終有守者其傳固如此也甚慰甚幸二説頃嵗葢嘗見之其間尚有未盡曉處恨未得面叩耳讀論語詩三復感嘆今日學者不沒於利欲之塗即流於釋氏之徑徃徃視此為迂濶卑近亦無怪其迷於入徳之方也答蘇晉叟溱示喻為學之意比之前日加通暢矣牛山之木一章比類觀之甚善但論心與性字似分别得太重了有直以為二物而各在一處之病要知仁義之心四字便具心性之理只此心之仁義即是性之所為也梏之反復非顛倒之謂葢有互換更迭之意如平旦之氣為旦晝所為所梏而亡之矣以其梏亡是以旦晝之所為謬妄愈甚而所以梏亡其清明之氣者愈多此所以夜氣不足以存其仁義之良心也舊説夜氣不足非是唯程先生説夜氣之所存者良知也良能也此語最分明更詳之是豈人之情也哉此句解得亦太迂曲存亡出入一節乃是正説心之體用其妙不測如此非獨能安靖純一亦能周流變化學者須是著力照管豈專為其已放者而言耶今專指其安靖純一者為良心則於其體用有不周矣書中所論性情者得之但亦須更以心統性情一句參看便見此心體用之全自寂然不動以至感而遂通天下之故無非此心之妙也儀象法要頃過三衢已得之矣今承寄示尤荷留念但其間亦誤一二字及有一二要切處却説得未相接不知此書家藏定本向無恙否因書可禀知府丈丈再為讐正庶幾觀者無復疑惑亦幸之甚也西銘説極可笑渠今春寄來前日紛紛此亦其一端後來又嘗請對詆横渠尤力不答乃退向非天日清明此亦足為學者之禍也答蘇晉叟示喻已悉但心統性情一語更宜玩味令其同異分合之際判然不疑即於窮理修身到處得力耳易圖昨亦有書粗論其意後來有少改更修版未畢他日當寄去論孟解乃為建陽衆人不相闗白而輒刋行方此追毁然聞鬻書者已持其本四出矣問之當可得然乃是静江本之未修者亦不足觀也近為此事所撓甚悔傳出之太早也答蘇晉叟所喻大槩皆近之但頗傷冗雜及論仁字未當更宜虛心玩味不必外求但將此見在所説者子細反復之自然見得簡約條暢也持敬格物功夫本不相離來喻亦太説開了更宜審之見得不相離處日用間方得力耳答蘇晉叟别紙所示一一報去程先生云性即理也此言雖約而甚親切有喚省人處可更就此思之大抵讀書且當隨丈熟看俟其詞㫖曉析貫通然後自有發明未可遽捨本文别立議論徒長虛見無益於實也溱竊謂性體純静無善惡之可名愚知之可分而情與才者則實寓於此性夫人禀賦之初自非聖人生知安行不俟矯揉其他氣質徃徃滯於一偏而才也者遂有髙下清濁之異人苟隨其所偏而任其情則賢者僅止於賢而不賢者無復可反善惡之流自此分矣則是學之不可以已故賢者即其才之善而抑其偏則情之所發無非循性之自然乆乆不已得性之全則與聖人一矣不賢者即其才之不善而矯其偏則情之所發始能裁制以求合乎天理之正進進不已漸履其常常而乆之則亦純合乎此性固有之善而與聖人亦一矣故循性之情則情不離性情隨質遷則性因習逺情不離性聖域攸歸性因習逺終焉下愚中庸曰及其知之一也又曰及其成功一也至一之地其純静明潔大同之始乎致一之功其博學篤志不已之力乎溱擬欲以是為性情與才之辨乞賜批誨情性與才之辨當熟考孟子及程先生諸説而反之於身即今何者是性何者是情何者是才須令一一實有下落方有下功夫處如此泛論非惟條理不明名言多誤而用力處亦不親切更幸思之溱竊謂易之體用天地人物安然自有至信至順底道理停停當當不以人而過不以人而不及此易之體也中也宜也時也犁然一契於至當之理此易之用也人何以晦是之體反是之用夫人汨之以情偽亂之以私欲囘視其身不啻如虚舟飄瓦尚何覺知此體此用為如何哉必也主敬以直其内立義以方其外損益盛衰之理隨時裁制以就其宜自然出入起居之際易之全體不隔毫釐而易之大用無或偏蔽體用渾融妙理純契一天地之闢闔㑹鬼神之動静至矣盡矣不可有加矣溱擬欲如是讀易乞賜批誨易本卜筮之書而其畫卦繫辭分别吉凶皆有自然之理讀者須熟考之不可只如此想象贊歎若可只如此統説便了即夫子何用絶韋編而滅漆簡耶學原於思不思則不得然而溱竊復以謂覬得之之心又學者之患不審先生以為然否更乞誨教方其思時自是著覬得之心不得但思則自當有得如食之必飽耳溱竊謂學者儘収斂儘安静去道儘近儘放逸儘流蕩去道儘逺不知先生以為如何理固如此不須如此安排後章倣此程先生云知至至之始條理也知終終之終條理也其義何如乞賜批誨學者之初須是知得到方能行得末後須是行得到方是究竟故程先生又云知至至之主知知終終之主行此語亦可更考玩也答蘇晉叟示及自警詩甚善然頗覺有安排凑合之意要須只就日用分明要切處操存省察而此意油然自生乃佳耳答蘇晉叟所示文字足見潜心之力但却須更於分明平實處看乃見端的一向如此恐浸淫入禪學去矣答蘇晉叟先墓之文每以為念前此病足之後脾胃衰弱不能飲食精力疲怠不能支吾近方小康而目盲愈甚其一已不復見物矣加以應接紛紜日間見客寫書更無少暇以故乆未能下筆積欠頗多非獨賢者所屬為然也今又重以偽學得罪明時姓名蹤跡無日不掛議者之口又豈作為文字治伐金石之時耶所示文字敬具收藏萬一未死之間幸蒙寛恩蕩滌瑕垢乃當有以報耳在親迎黄岩未歸正以向來奏補僥冒自疑未敢令赴試也考異答潘謙之卜田之吉占一本無占字答楊至之朱飛卿一作朱雲卿晦庵集巻五十五欽定四庫全書晦庵集巻五十六宋朱子撰書知舊門人問答答趙子欽
