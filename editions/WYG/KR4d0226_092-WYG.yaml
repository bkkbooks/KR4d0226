front:
  text: 九十二
  hash: sha256:1efa74cedcb1228c09310c3199cad5850247571060f656a5aa67ab652fbd1056
body:
  text: 宋朱子撰墓誌銘岳州史君郭公墓碣銘公姓郭氏諱份字仲質其先自吉水徙新淦曽祖亶祖麾皆不仕父彌約始仕有能稱至朝散郎以卒誄其行者皆當世逹官名士公幼沈敏能自力學問甫冠中進士第為辰州道州南雄州州學敎授荆湖南路轉運司幹辦公事湖南自軍興治戰艦積材於場久而腐敗相承募丁卒守視不已公白之臺毁材為薪歲省衣糧萬計官有羡緡數十萬議欲獻諸朝公曰此非可繼也使者為止醴陵有豪族取民田以治居室上流有古陂輙徙之田以蕪廢訟數十年不息公曰是不難辨以地比與圖視之一訊而决還陂於上流溉田如初用轉運使黄鈞等薦得通判常德軍府事賜緋衣銀魚常德在湖北為望郡更二太守無善狀公至委曲扶持之靖獠干紀王師討之公主督運山行既艱而水道經若水寨遡流百餘里尤險惡漕幾不通公命輕装淺舟水陸俱進軍用不乏師還第功遷秩擢守興國軍至郡承前守罪去之餘帑庾空乏北軍以廪假不時至或羣噪府下公奏留上供萬斛以寛郡計而申者令以戒有司凡給俸賜以下為先衆乃悦服未久以憂去免䘮奏事闕下即日除知岳州又積年勞轉朝散郎還至豐城暴得病卒於館舎年五十有七公娶李氏再娶喬氏男曰䝉今為廸功郎新贑州瑞金縣東尉女二人長適彭浩前卒次未嫁公性純儉被服如寒儒家人習慣不知為驕奢居官歛晦不為赫赫之名然所至為上官所推舉平時温温不妄喜怒及其遇事破姦發伏人亦不能囘也公最樂義亦勇於有為有踈屬之女受鬻于人公聞之遽投牒遣幣贖而嫁之鄉人有旅死者公為棺歛歸其柩于家有舊同僚之官地遠貧不能行公為装遣之雖靴袍巾幞之類畢具周人之急皆此類嘗因講治道以義役節目授其門人李伯賢令推行之自其鄉始今江西諸郡義役公實發之嘗謂門人曰九重有規恢之志而文武士不任其責寛恤令屢下而百姓無固結之心北軍就食東南布滿州縣無以善其後是三患也嘗因賜對建言常德當夷獠出没之衝比年復有茶㓂之警而屯兵財二百人不足用以彈壓湖北一道北被邉南控溪洞多㓂賊而城壁皆不治尤非所以備不虞者請以荆鄂千人戍常德而諸郡城惡者亟治之便又言獄者人命所繋故推吏賦祿厚而受賕輙以重法論至獄卒隂操木索笞箠輕重之權慘虐尤甚而今以無禄故為姦利者得從輕坐甚亡謂請詔有司議廪獄卒而重其法義倉嵗賑矜寡孤獨甚厚然其惠偏於市井而不逮山谷請即鄉落寺觀分置居養院以活遠民之無告者葢公雅有當世之志而於吏事尤不苟其所欲為固不止數事然即此而觀亦足以見其所存矣使究其用當如何哉天資樂善見當世德人莊士必慕與遊在長沙善故張侍講敬夫敬夫稱其靖端有守數為延譽諸公間居鄉厚今劉常州子澄子弟皆從之學有立志公沒而蒙愈自力于為善嘗以田二頃為義荘周貧族人以為猶用公平日之意也公卒以淳熈某年某月某日葬以九年正月乙酉墓在吉水縣同水鄉赤石潭之原蒙以子澄之狀來曰吾先君子甚髙下風之義顧不幸不得卒其定交之願以死蒙又不孝無以慰其泉壌之思唯是表墓之碣未有以書敢介常州以請吾子惠而許之則為有賜於吾先矣予聞其言而悲之讀其事狀又知公之為人如此亦恨前此之未始得從公遊也既次其事又作銘以系之銘曰端而靖足以有守敬而敏足以有為胡嗇於年不卒其施惟後有人克堂厥基我銘斯石以詔無期宜人王氏墓誌銘右朝請大夫任公諱賢臣之妻宜人王氏明州慈谿縣人故朝奉大夫中書門下檢正諸房公事諱庭秀之女年十七歸任氏任氏世為睂山人後徙蔡州靖康之亂大夫公昆弟始奉其母魏國太夫人犇走南渡生理蕭然宜人嫁時􅏻甚厚盡捐以佐朝夕之用事太夫人盡愛敬甘㫖無闕供無故未嘗輙去左右遇有疾衣不解帯粥藥嘗而後進與大夫公相敬如賔所以輔佐之者甚至大夫公嘗通守武昌久攝郡事前例攝事者受俸給與請司問遺徃來皆如真太守大夫公疑之以語宜人宜人曰異時貧甚宜不聊生亦且至今日矣今幸粗足何以是自汙為哉大夫公以為然皆謝不取大夫公歴守數郡晚嵗奉祠以歸或以其精力未衰猶可以復仕而宜人深以止足為戒大夫公乃不行宜人治家嚴而有法嵗時祭祀先旬月戒具至期齋肅毎事必親雖疾亦强起中饋酒食之事葢終身不以諉人敎飭子孫甚嚴未嘗假以言色而視其飲食時其寒燠皆有條理遇下有恩意然敝衣袴亦不妄與既病猶治家事不廢中外肅然者十年以淳熈九年十一月三日卒享年闕子男三人璜宣敎郎知江州德化縣事玠承務郎知臨江軍清江縣事皆先卒璋廸功郎袁州萬載縣丞女一人適通直郎通判容州程説之孫男七人希夷舉進士調廸功郎建寧府浦城縣主簿圖南廸功郎嚴州建德縣尉斗南應南鵬南摶南女三人璋希夷將以十年七月某日奉宜人之柩葬於邵武軍邵武縣長樂之原使其友方士繇述宜人閥閱事狀來請銘予先君子嘗與大夫公昆弟游義不可辭而希夷士繇又皆嘗來學其言宜不妄乃删取其大者而系以銘銘曰奉饋髙堂恭敬止佐夫子治成厥美肅如嚴君秉周禮考終卜吉藏於此土平川紆山崛起長樂之樂詒孫子知南康軍石君墓誌銘吾友石君子重諱某其先世為㑹稽新昌右族曽大父諱某不仕大父諱某避庚子之亂始居台州臨海縣後以遺逸召授右廸功郎以沒父諱某贈朝奉郎母安人朱氏太宜人陳氏君幼端慤警悟不羣年十二即自知刻意為學晝夜不怠年十八擢進士第丁外艱服除授左廸功郎郴州桂陽縣主簿㑹故參知政事李安簡公謫居郡下性嚴重不輕許可一見君深器重之授舘其家日與論説前言徃行勵以致遠之業常語人曰吾閲人多矣未有石君比者秩滿改從事郎調泉州同安縣丞天旱民饑縣白府請得蠲嵗租如故事太守怒檄君杖主吏君移書太守曰杖一吏細事耳然其所繫則大民今皇皇無以為命縱不能救忍復箝其口乎守怒未巳遣幕府官按驗至則希守意以為不當蠲君爭益力部使者聞之因以其事諉君君既行視歸即掲牓喻民蠲之什九然後言府且亟召鄉吏閉廨中使鄉為一榜戸列所蠲與其當輸之數既成立授里胥使走掲於其所於是上官不得變其説鄉吏無所逞其姦邑人便之改宣教郎知常州武進縣事民訟有數年不決者君一訊立辨雖姦民健猾者亦皆驚服愧謝而去它邑滯訟多請屬君以决郡守欲為寓客治第而屬役于縣其費且數十萬君不可曰吾為天子牧民豈為若人治第者耶且浚吾民之膏血以媚人吾不忍也守怒欲中以法掇拾亡所得㑹君有親嫌法當兩易君不顧求罷竟歸民數千人詣郡請留君不可則相與伺守出遮道號訴至有禠其䄡帷者守不能禁君因更調南劔州尤溪縣待次家食三年雖貧不戚也至官吏以財匱請借民租君不答但日治税籍凡民逃絶而田入見戸者與鬻産而不能更其籍者皆正之又謹視其出内之際要為簡易以便民而吏不得以容其姦闗市之征亦損其數於是官無苛擾農商得職租入以時力役有序至有争先為里正者縣故窮僻學校久廢士寡見聞不知所以為學君至即命其友古田林用中來掌教事而選邑子願學者充弟子員始敎之日親率佐史宿賔客徃臨之因為陳説聖賢教學凡以為修已治人之資而非如今之所謂者聞者皆動心焉自是五日一徃伐鼔升堂問諸生進業次第相與反復以求義理至當之歸員外諸生數十或異邦之人皆裹糧來就學君視故學宫為不稱乃廣其規模新其棟宇市書萬卷買田數百畆以充入之既成為考古制舉鄉飲酒禮以落之於是士始知學而民俗亦變君又摭其舊俗之不美者數事為文以訓飭之民皆傳寫誦習焉遠鄉有據險自豪不輸租賦數十年日與此鄉為仇敵者君為榜喻之即斂手聽命輸賦解仇復與齊民齒民王某者有刑罪具獄上府吏以邀求不厭欲致之死君爭之不聼則請自對獄與吏辯代民死民乃得免嵗大疫多治藥劑分遣醫者散之村落自為詩以勸之頼以活者甚衆及代去民或畫像祠之監察御史陳公舉善聞其賢薦之朝而君自從吏部選授福建路安撫司幹辦公事以去㑹丞相史公再入薦一時名士數人君復與焉有㫖召對君辭不獲乃入見首陳人君之道與天同方天心至公故人君之心不可以有一毫之私因歴引時事以質之言甚剴切上皆然之差監登聞檢院未幾除將作監主簿㝷改太常居頃之有所不樂因謁告歸省請得奉祠終養除知南康軍事將行而􅇜内艱未終制有詔舉材堪刺舉者吏部尚書鄭公丙以君對然君已不及聞矣其卒以淳熈九年六月乙丑享年五十有五積官至朝散郎君為人外和内剛平居恂恂如不能言者而遇事立㫁毅然有不可犯之色事繼母承順不違兄弟之間怡怡如也族黨有貧不能自活者買田捐金以振業之教其子與己子等嫁孤女多得所歸道遇弃子募人母之月有給焉其為政一主於愛民而憂國之心又甚切於賢材之用舎政令之得失一有所聞憂喜之誠形于言色至或累日不解然自處甚約自律甚嚴在州縣未嘗屈意上官在朝廷未嘗造請當路繇踈賤一旦見天子盡言竭忠未嘗少為迂囘避就之計其為學自聘君朝奉時已傳其業後更從舅氏太子詹事陳公良翰受書焉聞人之善必手記而心慕之其人可見雖少賤僻遠不憚其與予遊相好尤篤也晚名其燕居之室曰克齋讀書其間沒身不懈後生執業就正者皆頼君知所鄉而君未嘗少自足也此其志豈可量哉予前年守南康朝廷以君與予善除以爲代予亦日夜望君至冀得用疲甿學子為寄而君不果來當年奉使浙東聞新剡饑民轉入台境甚衆亟以屬君君即慨然以為己任其得免于饑凍捐瘠而歸者葢數百人然其後予以事至台則已不及見君而哭其殯矣嗚呼悲夫君之配朱氏劉氏李氏皆贈安人姜氏封安人子男四人繼微繼喻繼善繼周女五人長適范籍次許嫁商月卿餘尚幼君為文明白徑切似其為人然非有故未嘗作今有文集十卷藏於家所集周易大學中庸解又數十卷傳學者繼微等將以十二月庚申葬君龍谷山雲溪先瑩之側使來請銘時予已病歸臥故山念不得徃而祖君之行也乃叙其事而銘之其詞曰予悲斯人之病而莫與瘳也悼斯學之孤而莫與儔也又哀君之有志而久不醻也時若可竢而君不畱也龍谷之城雲溪之宅詔彼茫茫不在斯刻榮國夫人管氏墓誌銘故參知政事㑹稽李安簡公之配曰榮國夫人姓管氏其先齊大夫敬仲相桓公霸諸侯有功世祀于齊中徙秣陵後避五季之亂復徙處州龍泉縣久未有顯者及夫人之曽大父諱大忠以子師仁同知樞宻院事贈太子少師始為郡著姓樞宻之弟師醇贈承事郎生子時可以明經飭行為鄉里所宗遠近受業之士甚衆嘗有欲薦之朝者謝而不許竟不仕以卒鄉人皆以先生稱之後亦贈承事郎夫人其季女也生有淑德族人稱其婉嫕李公聞而聘之時公方以侍御史言事謫官貧甚夫人入門泰然無纎芥不樂意後公復為時用入參侍從出殿藩維遂登廟堂位亞丞相祿賜豐矣而夫人處之以約食飲居處所以自奉者不少異于前日也從公守郡輙戒家人無得買官下一物在宣城時巨盜猝至攻圍甚急公方悉力拒守而夫人以免乳得疾危甚公以爲憂夫人曰死生命也公宜一意捍賊無念我公壯其言厲氣循城賊為觧去及公以忤秦檜謫嶺外遂浮海南居儋耳久不得還家留故里日復窮空夫人至斥賣簮珥以給用度身不肉食者十餘年而亦無甚戚戚也檜憾公不釋捕公子孟堅繫廷尉誣以私史遣吏索其家或以告曰夫人亦且逮矣闔門懼夫人獨夷然不為動曰禍福之來非可避就自是無愧斯已矣己而卒無它始夫人嫁不及舅姑以為恨嵗時祠祀齋潔嚴敬凡滌濯烹飪之事必身親之比老愈篤諸子女多出元配黄氏夫人獨生二男二女而撫愛均一人無間言公南遷時二男者皆方數嵗夫人教之學既冠皆以文行稱公及見之喜曰吾自教之亦不過如是耳待諸婦如己女遇左右寛而有節有所不及務掩覆之平居端荘静一舉動有常度内外親黨皆法象其賢嘗從容語諸子曰凡人處心宜公待物宜恕吾雖不學然於此若有得焉行之終身不敢一日忘也葢李公平生以剛直聞晚歲遭讒去國投荒蹈海九死不悔而夫人之德所以配之者如此亦可以無愧矣累封縉雲郡夫人以淳熙二年二月某日薨享年七十有二十月丙申葬㑹稽縣太平鄉官漾之村後以子孟珍請貤所遷官以益封於是乎有榮國之贈子男五人孟博左宣教郎主管台州崇道觀孟堅右宣義郎提舉淮東常平茶鹽公事孟醇不仕皆先卒孟珍通直郎權發遣江隂軍事孟傳從事郎浙東提舉常平司幹辦公事女五人長適左朝散郎曹粹次適登仕郎陳汝楫次適進士陸權之次適承直郎沈程再適奉議郎章駒次適朝奉大夫潘時孫男八人知常從事郎早卒知微從事郎知言知易皆承務郎知退知孝知和皆未仕女十一人其四已適人曽孫男女各一人皆幼初大理卿章貢曽公逢以女妻浙東從事深知夫人行事之實既為之狀將以請銘而未有所屬也曽公卒江隂使君乃以狀授熹熹既晚出又滯窮鄉不及升堂盡敬以觀夫人門内之治而曽公又先達也初不敢當顧先君子實嘗為安簡公所知則義又有不得辭者敬為之銘銘曰婦德之美維順以柔剛以幹之其德乃修人曰夫人匪慈則孝我相其中不可屈撓貧安富節執禮勝私逢世之紛蹈險若夷維其堅剛以一其度俾易其艱以燕以譽惟公夫人合德殊施此内而安彼外以危要其所終兩絶慚悔匪篆匪辭曷詔𡨕昧朝請大夫李公墓碣銘右朝請大夫李公諱縝字伯玉濟川巨野人故駕部郎中贈太子少傅諱景山之曽孫朝請大夫贈少師諱瑑之孫而參知政事贈太師諱邴之嗣子也公之家自少傅之第四子樂静先生諱昭玘者學於髙郵孫公覺眉山蘇公軾之門文甚髙而㢘静樂道不求人知仕元祐及建中靖國中為起居舎人至太師公遂以文字行中朝有重名于政宣之間及叅建炎大政又以忠節為詔所褒退而老於江海之上餘二十年當世益髙仰之公生有竒質警悟絶人年十二三時賦盆池詩有疑與月相吞之句故相何㮚一見嗟賞既長益自植立務記覧為詞章其言奥雅靚深有非一時文士所及者而深自閉匿惟恐人之或知也性至孝事太師公及母和國夫人油油翼翼無故未嘗輙去左右雖近出數里必取期以還少以父任補承務郎監南嶽廟差充福建路轉運司幹辦公事再除轉運司主管文字公以去親逺不欲行太師公强遣之至官竟不一嵗兩易主管敦宗院以歸未幾丁内外艱服除連丐宗官舊秩及為崇道祠官退處于家不復有仕進意葢方是時秦丞相檜當國猜暴叵測故家大族一罹飛語無不糜碎公雖棲遲冗散猶懼不得脱於是益務潛晦息絶交遊雖親戚少見其面如是累年人亦莫測其意也買園居第之東結廬種樹翛然其間自號萬如居士而為之傳其詞曰居士少知讀書通訓詁不能洽浹如當世儒者然亦無所不讀其于授受必以義接物必以誠逕情直行不屑毁譽雖仕宦連蹇不遂視一時儕輩官尊祿厚而不肯一動其心為敦宗凡三十年官不易而家益貧常誦其先訓曰與其有求于人何若無欲于己與其使人可賤不若以賤自安以是當官及家居未嘗求人知而人之知之者常出于意外少慕阮思曠向子平之為人既孤買宅東隙地僅五畆為屋數楹植花數十本竹百箇而置常所閲書數十卷朝夕徜徉於其間雖金石絲竹之音姬嬙環珥之飾車馬旌旗之列五鼎方丈之食不以易其樂性懶甚不喜為文酒酣性發時為詩以舒懷至其行意擊節慷慨自以為未後于古人性謹宻而胸次蕭然無所適莫顧不喜與俗子語稠人廣坐或終日不交一談而藜杖幅巾率然乗興訪髙人勝士於閒暇時談世外法至或忘歸間問祖師西來意㫖僅識其趣不能悟觧也其胸懐本趣葢如此然知公者猶以為文不足而實有餘也秦丞相死衆賢稍稍登用丞相陳魯公雅知公推挽甚力而不能致乃白以為通判福州事而公已病矣連帥汪公應辰亦知公賢禮敬之且不欲煩以事公曰食焉而怠其事豈吾心哉力請得復奉祠以歸居二年而卒時年五十有六隆興二年十二月某日也公娶趙氏寳文閣待制思誠之女再娶馬氏中大夫安仁之女皆封宜人子男二人諌承務郎爽慧秀發年甫十三而讀書作文有兼人之功公竒愛之不幸蚤卒公哭之哀乆而不能平也訥今為從事郎福州長樂縣主簿女四人其壻右通直郎徐樗文林郎劉珫進士周庭實承信郎陳時可孫男一人啟宗將仕郎始公葬太師公泉州南安縣石鼔山而指其北百餘歩曰此吾之所歸也卒之明年三月某日訥奉公柩藏焉又集公所為文十卷梅百詠一編藏于家熹之先君子太史公嘗獲從太師公遊而辱知焉及熹試吏泉之屬邑又得拜公函丈毎白事府下退輙詣公公必為置酒畱連竟日論説古今商略文字皆極其趣下至吏道物情利病纎悉亦無不盡至于有所難言則其悼嘆閔惻之情未嘗不鬱然見于眉睫之間熹以是知公非真無意于世者意公猶且進而有為也後三十年再至温陵而拜公墓則其木拱矣俯仰今昔為之流涕葢不唯荒􅃄蔓草之悲亦以重嘆公之終不遇也於是訥狀公行來請銘熹不得辭乃為銘曰右史之德冲靖淵黙太師之文泆為忠勲公承厥家克篤其慶惟德與文既積而盛胡不逢遇達于事功浩其永歸閟此幽宫萬如之篇公實自贊銘以昭之不遐有歎夫人虞氏墓誌銘建陽縣崇政鄉百樂里有君子居焉曰左宣教郎江君諱琦字全叔以學行有聞所與遊多當世鉅人長者没而徽猷閣直學士胡公黄實銘之其夫人虞氏亦有賢德後公四十有一年卒其嗣子明將以淳熈甲辰二月庚申朔旦葬于其居里普光之原而使介子嗣奉書及承議郎同里賈君應之狀來請銘予家建陽崇安間距夫人之居不百里蚤得與夫人二子遊因得講聞夫人之行事而竊髙仰之獨恨未及進拜堂下而夫人沒今乃幸得託名立石以詔後世其何敢辭夫人諱道永字無盡本劉氏女其父處士某同産有適虞君恫者自夫人之幼而愛之携以歸鞠虞氏因冐其姓少長聰明識義理不樂為世俗華靡事徃來兩家愛敬曲盡恩義兩得兩家父母皆憐之擇其配以歸江公入門時舅姑年皆甚髙禮法峻整諸婦少得當其意者獨夫人左右奉承禮無違者凡調胹烹飪之事既躬服其勞而薪火之節亦必謹候視務為敏給以稱㣲指既進饋則又退屏側立踧踖以聼惟恐少不中度至或隂儲它饌以備更索雖在亂離顛沛乏絶之中亦必多方營致不使有纎芥不滿之意皇舅朝奉公年九十餘每語人曰是善事我其居家事夫教子皆有法度閨門之内肅然以莊雍然以和江公性剛直居官遇事有可否必極力論辨人有過失至面質責之夫人視其或過甚者輒從容諷觧江公敬焉江公沒時諸子皆幼夫人年甫四十以禮法自將持守門户教督諸子親授經訓嵗時薦享細大必親江公從官時先疇之入恣兄弟衣食無所問既沒夫人命諸子悉推與之且别其籍曰此前人之志也虞君老且失子夫人歸養益謹送其終哀戚甚葢不沭浴不鹽酪者三年且為之選于宗人以奉祀而歸其貲産江公女兄適人既老且貧夫人迎以歸厚其養給禮敬飭備十五六年不少懈既又為之室其子焉聞人之善如出諸已見人疾病困窮閔惻調護惟恐不及性喜觀書讀易論語得其大意下至練養醫藥卜筮數術無不通曉平居處事詳練縝宻與人言必依于孝弟忠信詞甚簡而理無不足族姻内外咸髙其行服其言有疑必就咨焉事有難平者衆口方讙呶不觧有告曰夫人之言如是則徃徃翕然以定晚學浮圖法一旦脱然若有㑹於心者即屏簪珥卻酒肉布衣蔬食以終其身遭淳熙慶夀恩當得封諸子言于有司將上其事夫人聞之曰吾已棄人間事何以此為且命而不謝是為欺君吾敢安乎竟畱其狀不復上九年嵗在壬寅夫人年八十矣一日語諸子曰我將行矣諸子驚遽呼醫進藥皆揮去曰毋勞我葢甘寢六日而沒三月十五日也子男四人曰渙曰明曰紹曰嗣渙紹早卒明嗣皆以文行知名嘗以選士貢京師孫男五人女四人賈君所狀夫人之行如此大抵予所逮聞也葢嘗竊謂夫人資稟髙明器宇恢廓凛然有烈丈夫之操使其生於治古禮義隆治之時習聞姆師之誦以盡夫人倫物理之精㣲則其所以自立于世者詎止於此然今以其所就而論之則為子孝為婦順為妻正為母慈嗇于奉而豐于施厚于義而薄于財於人之所以為人者亦㡬可以無憾是則可不謂賢乎哉而世或以佛學稱之亦淺乎其為言矣為之銘曰士誦聖賢以沒其世孰不有聞鮮克身詣豈如夫人弗學而知知之所至其行亦随俾究而窮曷内而外藉令不然亦寡其悔彼幽者禪此明者天有如不信訂此豐鐫篤行趙君彦遠墓碣銘淳熈四年冬十有二月戊寅崇道趙公善應卒于餘干私第之正寢明年葬縣東北華林岡後六年今少傅福國陳公乃大書其碣之首曰皇宋篤行趙君彦遠之墓於是趙公嗣子汝愚方以敷文閣待制知福州充福建路安撫使涕泣手䟽使人奉其書及故荆州牧張侯栻鄂州守羅君願所序行實若狀兩通致之新安朱熹曰請得銘而刻于下方熹竊惟念平日所聞太宗皇帝之元子漢恭憲王實以至德髙行為宋太伯後世雖屬籍䟽遠爵秩寖㣲然猶多法象其賢者葢歴七世而得公則又以孝友仁厚被服儒雅克篤于家而聞于邦卓然為宗室儀表雖士大夫之賢而有禮者皆自以為不及益教其子移孝為忠對䇿庭中無所諱避天子異之擢以為天下第一後歴館閣侍從奉使典州皆以風節惠愛有聞于時然天下不以賢其子而曰子直之能為此嗟乃其父之教也嗚呼其真可謂篤行君子者矣陳公之目之也豈虗也哉是法宜銘顧陳公書法之嚴已足傳世而熹愚賤又所不當得為既禮辭不獲命則敬考其書而悉次第之葢公之曽大父曰開府儀同三司建寧軍節度使建國公仲企者恭憲王之曽孫也實生東頭供奉官士慮供奉生成忠郎不求成忠娶濟陽晁氏生公公生于政和戊戌卒時年六十自建炎初補承信郎八遷至修武郎歴監秀州崇德饒州餘干安仁縣景德鎮之酒税潭州南嶽廟江南西路兵馬都監主管台州崇道觀卒後五年汝愚逢宗祀恩始更贈為通直郎公資純篤孝謹少時父病訪醫行禱暑不觧帯遭䘮不内勺飲既殯居廬歠粥既葬乃食菜果終䘮比御猶弗入也事母益兢兢致養嘗以寒夜遠歸從者將扣門公遽止之曰毋恐吾母為也露坐逹旦門啟而入以母畏雷夜或聞雷必披衣走其所視門隙有光則扣而入否則屏立以待官薄食貧諸弟未製衣不敢製已製矣未服不敢服雖一瓜果必相待共嘗之諸妹遠嫁者極力致之相與娱侍親側内外諸孫合貴賤且百口菜􅃵䟽食恩意均洽人無間言從姊妹之遠而貧者亦以令分俸給之遭母䘮時年五十有五矣始侍疾時嘗刺血和藥以進至是哭泣嘔血毁瘠柴立終日俯首柩旁聞雷猶起側立垂涕凡食之可于口者不必酒肉衣之適于體者不必華采聲之悦于耳者不必音樂皆弗忍以身接雖其哭泣有時而哀痛之心無時忘也三年之外生朝必哭于廟有欲為禮者號泣向之其後累年言毎及親猶未嘗不揮涕晉陵尤袤延之見而歎曰古君子也父以肺疾終終身不忍以諸肺為羞母生嵗值卯謂兎神亦終身不食也墓户有不能事其母者觀公之為惕然悔悟遂以孝稱識度超曠不計有無平居自奉甚約而汲汲然惟以愛人及物為事故人許珪死家貧女無所歸公即聘以為次子婦嘗與台人蔣彛者同僚後至其鄉首問之則死乆矣貧不克葬而子亦謀食于外即徃哭之還其子予貲使葬它若是者不勝紀道見病者必收養躬為煮藥比瘉或觧衣遺之嵗饑設器于庭毎食先舎其半家人繼之則取以濟饑者其用心之㣲宻至于夏不去草冬不破壌懼百蟲之游且蟄者失其所也為人謙和坦易與人語惟恐失詞色至誼有不可則奮然無所顧雖以公族䟽遠流落江湖而憂國之深如在廊廟聞當世進一善人行一善政則喜不自勝聞遠近或水旱則憂見顔色辛巳江淮之警為流涕不食者數日同僚有㑹飲者公獨悵然北望曰此豈諸君樂飲時耶衆為失色罷去好讀書所藏至三萬卷所著有唐書錄遺三十卷幸庵見聞錄二卷台州勸諭婚葬文一卷居家不設條約於子弟無所程督而躬行之實所漸漬而興起者甚衆居常稱曰欲學聖賢當消客氣灑掃應對是其入處也汝愚從屬籍冠多士國朝故事所未有人為公喜而公處之如平時及聞其入館適與莆田林光朝謙之同舎然後喜可知也於其守上饒而來迎也故不徃一日呼二田夫肩輿潛入其境訪問民情閲信宿意無所忤因稍進至近郊人始知之其為人大畧如此顧宗室之在右列者例不得為要官故其事業無以見于世至其潛德隠行與其志念之精㣲則人又有不得而言者嗚呼其真可謂篤行君子矣陳公之目之也豈虗也哉其配令人李氏丞相文正公七世孫家號西李司馬公所謂能守先法久而不衰者也方承平時宫宅婚姻皆勲侯貴戚公父子獨再世娶儒家令人明達剛果居家以孝聞既嫁事姑如母嘗刲股以愈其疾公罷崇德歸時晁夫人尚無恙篋有餘金將出以獻而探之不獲葢令人已奉而致之姑矣服飾之具擇其新美以奉公諸妹而躬取其故敝者公既勤其家不吝一錢而令人安貧自力所以成公之志為多先公十二年卒葬縣西雕峯距公墓三十里所子男四人汝愚既為時名卿次汝拙承信郎汝魯保義郎汝未仕亦皆斤斤謹質能守其家法女三人長適宣教郎逢維石次適將仕郎路希傅季未行也孫男十二人女七人而其長曰崇憲亦舉進士中其科云熹聞公之名葢久而不及識居常以為恨今乃獲叙德美以贊誄事而附于陳公所書之石則既幸甚然毎讀行實之書而于吕伯恭之言又未嘗不廢卷太息也因頗采其意銘以系焉銘曰漢邸之别去本而支心融迹冺世莫予知建土分封再世弗振逮公而顯匪爵其仁孝不老衰惠不約弛忠不遠忘以畀厥子篤行之表華林之臯惟其不愧日遠彌髙嗟爾後人益謹毋怠出者難工德友所戒廸功郎致仕王君墓碣銘淳熙十有一年秋八月廸功郎致仕番陽王君彦暉卒冬十月葬其家山先塋之右既卒哭其子安墨衰絰走謁予于建安潭溪之上拜泣且言曰安不天徃嵗失吾母東萊先生既不鄙辱而銘之今重不幸而失吾父則東萊亦既沒矣兄弟聚謀大懼不朽之託無所歸敢使安也介東萊之文以為重而謀于下執事惟吾子之有以哀之也予以病衰久廢筆硯四方知舊文字之屬所拒者無慮數十家既以例謝不能而視安之來布衣蔬食重趼十舎踰越險阻蒙犯霜雪所以不死其親之意有非人所及者不忍使之徒手而歸也且吾伯恭父之病矣而亦既銘其母焉我其得辭之耶則應曰諾於是安乃出其友安遠節度掌書記章洙之狀以視予曰王氏唐末避地始為饒州德興人中有名申甫者以能雅歌補郡博士弟子員晚嵗教授縣東三十里所曰柘溪者樂其山水之勝卻諸生嵗時脯脩而易其地以居焉生四子其仲曰畿隠居自放里人髙之其後子孫益蕃昌遂盡有柘溪地人因以里名其家畿生之純之純生居立君居立之子也字子充少孤自植立以勤儉持家娶程氏生四男子曰賔曰安曰憲曰宗皆教之學斥家貲為市書史聘師儒日釀黍為具博延四方名士使與之接雖殫貨詘力不計既而安業獨先就鄉里父兄賢之多遣子弟從之遊郡有司亦以其程試應書再送禮部未第㑹天子奉觴德夀宫勞賜耆老而君夫婦皆以安故相先後得官封君卒時年七十有二四子皆儼然服儒冠獨兩女前卒而孫男女已十有四人矣君性脩潔嚴重不苟所至必拂拭正席乃坐及將去猶徘徊周視乃行生平謹禮比老益䖍鄉隣慶弔必先雖幼賤必躬造族姻有䘮戒門内毋食肉以屬親䟽為日久近有差輕財好施樂成人之美人有未善苟知之必告雖以賈憎不自悔更為竊歎如已憂其嫁姜氏二女事則伯恭父已書之程氏之墓矣葢君之志而其室有以相之也予雖不及識王君然既嘉其子之能脩身以幸于先生君子也又哀其能始終勤劇以覬顯其親于無窮也而既諾之矣今又觀于王君之行事如此葢亦庶乎孔子所謂十室之忠信者是以三復其書而歎息焉因輯其事而詩之俾歸刻墓上既以表王君之徳而又申伯恭父之遺意以厲其後之人其詩曰鹿鳴先生詩禮傳荒此柘溪祀邈綿逮君教子子能賢千里丐我銘君阡至哉我友授子言皇皇業業無窮年眇思所屬非華軒有能力此榮其先通判恭州江君墓誌銘君諱介字邦直姓江氏曽大父時大父夢符父衍世居徽之婺源未有仕者至君始居饒之德興以鄉舉中第至通朝籍而贈其父宣教郎遂為德興人君少頴悟年十五六治舉子業鄉先生亟稱之君不自多一日讀程子書至水清性善之説喟然太息視平日所學不過為利祿有不足為者亟走謁衢州徐先生誠叟以書道其所志而請業焉徐讀書喜謂其徒曰此可與共學矣居數年而歸更以其説授學者多所興起初仕廸功郎興國軍司户參軍先是受俸米者率倍其劵君獨不取其予人也亦然郡將試以難事又皆從容以决遂以廉吏薦之陞從事郎調隆興府進賢令將行㑹天旱民饑度比至官且不及事亟移文喻民廣殖牟麥民知君之愛已也聞其且至争相扶􅂝拜迎馬首既至不暇燕饗倍道趨府極陳所以拯救之䇿甚備富民舒氏當出糓餘萬斛以糶而自請以緡錢輸府冀得免糶規賞君争之力帥守龔公茂良不悦而君執義愈堅龔公始悟從君計而君不俟報已先喻舒氏出其糓矣視饑民尤困憊者收養療治頼以全活者甚衆既而旁邑官吏多以救饑受賞或喻君盍自言君曰民饑而令食之猶子饑而母乳之也敢幸賞乎㑹詔蠲民田半租君白部使者程公大昌曰常時輸租雖合勺之畸亦必使就盈數今若但減其半則全户輸一升者名減五合而實猶輸一升也若自全户三升以下悉蠲之則貧民被實惠矣程公以君語聞詔從之程公喜舉酒屬君曰君宰百里而惠加一路可謂仁人之言矣君始至官有㫖新沿道廐置時民方饑瘁聞是令下欲相率逃去君喻以不得已之故且相率温户金伐道旁木徹廢佛屋以助其役民喜趨事而執牽者亦便安之未㡬宻院又頒新圖漕臺趣使改為甚亟君言前役未既後役復興民且不堪况廣西之馬嵗不過三十綱綱不過五十疋新圖乃度為容二百四十疋者亦何為乎且馬之息耗在芻秣之盈虗今不察兵吏之盜其廪而必病民以豐其屋尤非分之所安也使者是其言縣得罷役而旁邑亦有頼以免者天子以連嵗旱饑詔吏勅民修築陂塘以為之備吏惰不供而畏罪以希賞至有未嘗一施畚鍤而以訖事告者君獨出入阡陌推上德意喻民以利害之實而身勸督之民感君誠意作治如法後雖惡嵗猶得半稔君又深以獄事為已憂籍逃田收其租為繫囚食飲醫藥之費言于憲臺而刻其事于石暇日延見學子教以孝弟忠信亹亹不倦且祠唐故隠者崔君于學以風勵之改宣教郎知興國軍永興縣事君舊為郡掾習知其俗到官移書諸臺為陳五事一曰税重之弊二曰准衣之弊三曰續起上供之弊四曰累年不放水旱之弊五曰魚池𣙜税之弊其言明白懇切覧者動心然卒無有能行之者盗劫民尹惠政家殺其奴而逸尉恐負課脅惠政使自誣為殺奴者知君不可欺賂吏移鞫軍獄君條其可疑者九事毅然以去畱争之惠政乃得免永興田多水少君以水種豐㓙不可期則兼課陸種立賞勸募父老傳誦至于感泣天申錫宴舊例百物皆取之民吏縁為姦費且數倍君白太守和市予直民甚便之郡當通衢使客接踵而力役不均有一嵗而數役者有終身不一行者君至始為籍以均之他所以便民者多此類也轉奉議郎四川總領司主管文字總領主餉大軍平時未嘗與民事至是東川大饑君言于其長太府卿李公昌圖請得庫之羨錢徃賑之李公以為然得緡錢五十四萬以行漕米勸分極力拯救既又盡蠲被災郡縣田租而以所賫官錢代輸水浮陸走衝冒暑暍至感疾以歸而果合昌普廣安數郡之民爭繪像立祠以報其德金川民千餘家以負茶租逮繫笞箠十餘年不得釋君一旦白除之無不鼔舞感泣而去遂寧守李公燾聞之以書遺君曰公兩邑之政可比古之循吏而見于文字者又皆如絲麻穀粟之有用于世今來佐饋軍而幕府施設有忠厚之稱葢賢者之助多矣秩滿將歸而諸使者畱之使從外銓調補通判恭州事非其志也因以檄書至武昌已事而歸舟次江陵則不幸而以疾卒矣卒時年五十八淳熙十年十二月二十一日也君為人誠慤敦重不妄言笑意所與合開心見誠即與異趣雖對之終日如未嘗有人少時貧窶裋褐不完而處之怡然不妄以一毫取諸人也䘮親毁瘠甚事兄敬愛有過人者自奉省約而周贍族姻甚厚徐先生之䘮為位以哭遇諱日為却酒肉以報居官廉直不可屈撓孜孜焉以愛民為事興利除害如已嗜欲至于身之利害則未嘗有毫髪顧藉意也於上官有所不合争辨反復詞㫖慷慨始雖小忤然以其發于誠心卒多聴納或遂為知己如龔公尤相愛重還朝欲薦之廹銓法當試邑不果君於聼訟折獄察見底藴而風喻開誘卒多歸于仁恕所治兩邑獄空皆嵗餘它日道出其境民老稚相携持羅拜道周有屑涕扶輿而不去者送之或越境而後反君為文不務雕刻而辨説縱横詞氣卓犖曲盡事理有玉汝堂集藏于家君之配孺人胡氏子男四人元恭仲恭叔恭懿恭女二人其壻舒竦汪升之也君卒之明年元恭等乃克以君柩還里中又明年二月壬戌遂反葬于婺源瀛山大田之原元恭以予之與君善也使君門人程端蒙狀其行事來拜泣請銘其事皆予素所聞者且哀君之命止于此而不得盡其用以厚其澤于吾民也為之銘曰學以為己仕以為人廉直不撓有志必伸惠滿一同溢於四隣士飽餘功野殍懐仁才雄氣剛一言萬鈞退省其私嗛嗛恂恂宜登天朝正色垂紳攖鱗折角卒惠我民云胡不弔隕于中身欲考其德訂此墓文從事郎監潭州南嶽廟劉君墓誌銘淳熈十二年夏六月二十三日從事郎監潭州南嶽廟建安劉君平甫卒于家予徃哭之再三其兄子學雅與諸孤學古等遂以墓銘為請予初嘗受學于平甫先君子之門因得與平甫相長大其後平甫諸兄遊宦四方平甫多家居不從以故予與平甫又獨得久相與於今四十有餘年矣然予長平甫八九嵗又以勞悴早衰而平甫優游彊健雖少年有不及豈意今乃反哭平甫而遂銘其藏哉顧與平甫遊最久而知之深莫如予者不忍辭也平甫名玶建之崇安縣人屏山先生諱子翬之子而贈太師文安忠顯公之孫也忠顯公以忠義死國著名靖康建炎之間國史有傳生三子長曰寳文閣直學士贈少傅諱子羽而屏山先生其季也少嘗一仕為莆陽郡丞秩滿即稱疾奉祠以歸樂道著書十有七年而卒其書皆傳世平甫以少傅公幼子為之後補官餘三十年未嘗一日仕州縣雖其邂逅不遭事有適相似者抑其家法之傳亦有自也葢平甫自始仕即為南嶽祠官嘗調諸路提㸃坑冶鑄錢司幹辦公事福建路安撫司凖備差遣皆未及赴而以省員罷最後從兄忠肅公强使出為注官得邵武軍司户參軍則平甫山林之趣已成不能俯首從吏役矣亦㑹忠肅公薨平甫遂决長徃之計力請諸公復得為祠官超然自放以殁其身葢其年少時氣甚豪自再直廢省即自知其不偶而先廬屏山之下前帶潭溪舘宇靚深竹樹䝉宻顧而樂之不忍去也因以暇日廣其觀游種木䟽泉上下澗谷竟日不厭自以為退隠于家兼農圃漁樵之役而随緣閲世復善修身又庶㡬古人日損日益之意則自名其室曰七者之寮而刻文壁間以志其目中葬其妻武夷東南十里許即預卜夀藏其旁因山田闢臺舘以逹于溪上良辰勝日徃來兩山之間弦琴觴酒屬客賦詩其樂雖與人同而其習聞先君子之遺風餘韻與夫當世之儒先長者之雅致冺然有以㑹于其心而適于其身至于不知爵祿之可懐勢利之可悦則人有所不能及也天資孝友事世母慶國夫人及忠肅公甚謹服其䘮皆過禮嗣主家政聚族衆多而法度修整㤙意均洽少有逸才而不肯事舉子業賦詩甚敏而工然亦未嘗深畱意也為人簡易跌宕衣冠食飲取具無所擇而蒐輯先世遺文軼事纎悉無遺聚書教子校讐課督皆有程品為州縣董社倉斂散為帥司賑貧民舉子者詢究利病鈎校簿書其夙夜之勤居官者有不及鄉人德之而論者於是乃知平甫非漠然無意于世者扵其死也莫不哀之以為使得試用所立當何如也平甫娶同郡范氏直秘閣如圭之女無子而撫愛諸子如己出事慶國夫人孝愛尤篤苟可以已其疾雖體膚無所愛也先平甫十六年卒平甫有六男七女學古廸功郎泉州同安縣主簿學博將仕郎學圃尚幼而學正學箕學稼皆出為諸兄後其次女亦嫁而夭云平甫卒時年四十八葬以是嵗十二月十二日墓在范夫人塋東十有八歩其銘曰嗚呼平甫寧其材之不信而不忍其志之詘也寧其躬之不燕而不忘其鄉之䘏也幔亭之南其川奫淪岡􅍶崒也生樂其遊死銘其丘彌百世而不歿也贑州趙使君墓碣銘淳熈十二年十一月某日知贑州軍州事朝請郎趙公某卒于官明年二月某日歸葬所居邵武軍城西南樵嵐山其友沅州吕使君勝已實銘其行内壙中而其弟善傑以書來曰仲兄之志葢嘗欲有以自見于當世今不幸早死未有以償其平日之願士友之相知者莫不痛之其所以告諸幽者既雖幸有沅州之文矣而所以表其墓上使百世之下過者讀之而想見其為人則未有託也仲氏蚤從張荆州遊而晚交于子子其哀之予發書慨然曰吾交于佐卿固久而自其守贑知之始深今其弟以是為屬其何可辭盖始佐卿赴鎮時嘗以書來問政所宜先予以所聞告之佐卿至官未幾徃來者稱其政不容口久之乃來告曰曏所聞者至是訪之皆如言既一二罷行之矣顧所以病吾民者猶不止于是也如某事如某事吾代而歸將以告于上而革之則一方永乆之利也予聞之喜甚葢不獨為佐卿喜又為贑人喜也然未乆而聞佐卿之訃則又為之悲嘆出涕而不能已佐卿素彊健至是暴得疾頃刻遂不可救州人聞之驚怖啼號老稚相扶携走哭府下皆失聲退相與畫其象而祠之嗚呼此豈人力之可為者耶因考吕使君所記則曰公六世祖商恭靖王某我宋太宗皇帝之第闕子也曽祖仲闕開府儀同三司贈太師追封成王祖士訔舉進士中第未仕而卒父不衰武經郎福建兵馬鈐轄贈朝散郎母滿氏太碩人鈐轄公恬淡寡欲太碩人名家子有賢行閨門肅穆為士大夫所稱公天資闓爽好學遊庠序有聲名同業者皆自以為不及以宗室子試有司連中其科初補承節郎改授左承務郎知南劍州將樂縣丞簽書武安軍判官㕔公事差通判鎮江府未赴改知泰州徙知常德府以家難不行及是為贑州踰年年甫五十有二而遂以卒嗚呼是可哀已其佐湖南軍時帥張公孝祥深知之沈公介亦竒其材遂與轉運副使黄公鈞合章薦之為郡奉法愛民以勤儉自約飭不妄費公家一錢干請無所應雖有挾而至者不為動也在贑遇旱禱祠賑貸必盡其力節逰宴罷土木勸民藝麥瀦水寛諸縣逋負損市人酒課人甚便之常時州郡别以使臣掌牙兵公罷之而歸其職于兵官責以嚴紀律謹訓練未㡬營部肅然吏士皆可用鮮犯禁者舉吏必先寒畯權貴請屬皆置不問吏服其公於是州人相率以其治行數十言於使者之臺公聞亟喻止之曰太守德薄政荒不能布宣聖天子寛大之詔使旱至此父老不以為有罪則已幸矣何善之可稱父老其亟歸教子弟孝於親弟於長忍小忿敦大信使太守之政為能善其俗者則父老之賜厚矣天暑道逺毋苦父老為也聞者感嘆益相告戒毋違公令在長沙從張敬夫遊受其學以歸其後待次遭憂閒居累年㝷繹舊聞講習不倦而尤究心于易築室所居之南朝夕讀書其間䟽泉種樹有以自樂其於進退得失之際有未数數然者人亦不意其夀之不永而遂葬于此也初娶王氏福建安撫參議康功之女再娶黄氏湖南轉運判官洧之女皆先卒子男一人汝掖尚幼公沒三年太碩人故康寧而伯氏龍閣公数典巨藩亦以寛惠見紀葢其家法傳有自云予惟公之志雖未克大施于時而二邦之政所以及人者已廣以其地逺且無門人故吏之記故不得書其與予書諭贑事者又逸不存而不得附見以俟後之君子則予於此不獨為公恨之又為贑人恨也為書其事使以刻于其碣且為之銘銘曰於皇上聖哀此下民吏壅其流澤唫以屯惟時若人有聞于古肆其所臨霂若膏雨章貢之間禾黍油油公胡遽歸樵嵐之丘我銘其阡用勸來者毋以惠文易此章甫郭德誼墓銘東陽郭君德誼之墓新安朱熹銘之其詞曰才百夫之特而身不階于一命志四方之遠而行不出乎一鄉然而子弟服師儒之訓州閭識孫弟之方霍然其變豪俠之窟煥乎其闢理義之場是則其思百世而長勿替䋲之有永彌昌夫人許氏墓碣銘夫人許氏其先太岳之後在三代為姜姓國于陳鄭之間其後子孫居髙陽者為望族中徙丹陽又徙永嘉至唐宋有令瓌者仕江右為集賢院學士貶山陽令謫居建州闗𨽻鎮因家所謂梧桐村者闗𨽻今為政和縣而梧桐之許特盛其散漫四出者無慮數百家猶以天祐保大譜牒相傳世次可考夫人父名瓞娶同郡丘氏亦儒門令族故夫人生而静淑治絲枲鍼縷皆過人生十九年嫁邑士黄君朝佐嫁八年而卒嘗生一女失之又生一男曰石纔二嵗而夫人屬疾自度且不起指以屬其姑曰新婦即死願以是兒為託然教之必嚴勿以無母而厚于慈也使其幸而有立則新婦為不亡矣既而石長遊太學有聲稱遂擢進士甲科以歸中外長老始相與傳誦夫人臨絶之言而歎其識之遠也夫人始葬屋山之東遭亂不保再遷得某鄉某里延福僧舍之左石嘗教授某州學又教授敦宗院丞紹興之上虞年甫若干以末疾致其事自從政郎特遷通直郎賜緋衣銀魚以還故里予一日過之見其病雖廢而神氣不衰出故鄂州教授吳君特所狀夫人世系行實一通泣語予曰石生不幸不及識吾母無以觧終身之憂猶冀行身不辱有以卒顯吾親于無窮也今病若此恐乂不克其志且墓道之銘未立吾子其有以哀之語未既復感慨嗚咽泣數行下予亦悲不能仰視亟許諾受書而出不忍無以慰其心也乃序而銘之銘曰夫人系家出髙陽世祀有牒存餘唐睨化㒺怛音琅琅教而弗愛後以昌賢乎孝哉兩弗忘我最其實崇斯岡潘氏婦墓誌銘新海門尉金華潘友恭以書來曰友恭少受室于穀熟之王氏于今十有五年矣與之俱從家君以適南海而不幸疾病以沒二親哭之過時而哀友恭亦不自勝其悲也惟王氏婦自居家時事親孝親愛之年十有九而嫁移所以事親者事舅姑舅姑亦愛之處娣姒長幼之間肅穆無間言御下寛而有節為人簡静莊重恭儉信實於婦功不少懈然不務為纂組華靡之習所以謹嫌微安貧約又有人所難者喜讀論語大學中庸孟子諸書略通大義毎語人曰吾嘗自省終日之間承上接下幸無一失然後得以退休而少安此意日新而未巳也淳熈丙午某月某日卒年甫三十有三今將以其柩歸葬㑹稽上虞之徐山惟先生幸哀而與之銘則猶足以少慰也王氏曽祖甡光祿大夫祖令洙朝議大夫父琮奉議郎母孺人潘氏王氏歸友恭生子曰履孫用家君奏補將仕郎年十有三矣予昔從友恭尊君湖南公遊見其施于官者治友恭兄弟皆來學見其飭于身者嚴履孫七嵗侍立王父之旁見其視聼專一而進趨有度今讀友恭之書而以是質之知其婦之賢不疑也為之最其語而銘之曰越江之潯徐山之阜孰藏斯丘恭叔之婦匪婦則然是實良友我銘畀之百世其久宣教郎方君墓誌銘予始仕為泉州同安主簿得莆田方君德明而代之一見傾倒如舊相識既去聲問徃來無虗月閒以其詩遺予語亦清麗奥博非常人所及也予後數以檄書徃來莆中君必為予置酒畱連欵曲其後數年予以病不能事奉祠里中而君來為建獄掾又得相見握手道舊如平生懽又二十年而予復以事至莆則君塜上之木已拱矣其子注來見且為予泣出君州里世系官閥之狀一通請銘君墓予固悲君之不遇而又歎交舊之零落盖凡三十餘年之間而同安寮友所繼所同無一人在則不忍辭而受其書以歸顧以病未及作而注數使來請其詞益悲乃出其書而叙之葢方氏之先有諱某者始家莆田六子官皆通顯遂為郡著姓君其第五子禮部郎中仁達之八世孫也父諱某母林氏君諱士端少苦學年十八以鄉薦試南省不刋益務記覧不耑為舉子業以授室宗邸補登仕郎試吏部復髙選授右廸功郎調主同安簿攝尉得盜當受賞棄不顧遂為建寧府左司理參軍改宣教郎知福州福清縣事福清故號難治令多以罪去君始至慨然以公勤自勵曰是豈不可為哉然不一嵗竟亦以公事免君不戚戚歸家日治具召賔友飲酒賦詩以相娱樂後雖以㤙得還舊秩而君已無復仕宦意矣乾道六年閏月八日遂以疾卒年四十五夫人濮國趙氏武略大夫士㚍之女後君三年亦卒淳熙乙未乃得合葬于楓嶺三山之原子男三人注清汪皆業進士而清嘗以承節郎試禮部與汪皆蚤卒女四人其壻林瓘林叔子鄭鐸季未行也孫男女各四人皆幼嗚呼君之才不後人而仕竟不偶既退而休矣又不得永終夀考以遂其優游閒適之願是可悲夫為之銘曰猗君之才足以自奮仕而不遭樂亦無悶乗除有數奚又不年尚覆來者百世之延晦庵集卷九十二欽定四庫全書晦庵集卷
