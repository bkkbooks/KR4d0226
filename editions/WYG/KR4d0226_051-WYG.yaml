body:
  text: 答董叔重示喻日用功夫更於収拾持守之中就思慮萌處察其孰是天理孰是人欲取此舍彼以致敬義夾持之功爲佳讀書亦是如此先自看大指却究諸說一一就自己分上體當出來庶幾得力耳易字之說前累奉報鄙意但不欲學者切切於此不急之外務耳必欲與名相稱則以叔重易之蓋取通書其重無加焉耳之義如何如何答董叔重所論心之存亡得之前日得正思書說得終未明了適答之云此心有正而無邪故存則正不存則邪不知渠看得復如何也但來喻所謂深體大原而涵養之則又不必如此正惟操則自存動靜始終不越敬之一字而已近方見得伊洛拈出此字眞是聖學眞的要妙功夫學者只於此處著實用功則不患不至聖賢之域矣答董叔重書中所喻兩義比皆改定大學在德粹處孟子似已寫去矣但所疑搜尋急廹之病恐是用心大過使然所云發見之端只平日省覺提撕處便是只要人就此接續向下推究令其開濶卽不曽說等待尋討將來做功夫也今所改者亦其詞有未瑩或重􅃨處耳大意只是如此也答董叔重所喻數說甚善更宜加意涵養於日用動靜之間爲佳不然徒爲空言無益而有害也答董叔重君子務本一章集註云本猶根也君子務本本立而道生言君子凡事專用力於根本根本既立其道自生如孝弟則是行仁之本不務乎此則仁道無自而生也銖竊妄謂仁固孝弟之本有仁而後有孝弟伊川曰仁是性孝弟是用然仁道生也生莫先於孝弟蓋其油然内發至精實而無僞自然不可已者莫如愛親從兄之心故伊川曰仁主於愛愛莫大於愛親愛則仁之施仁則愛之理也仁者愛之理而愛莫大於愛親故推行仁道自孝弟始是乃行仁之根本也根本既立則親親而仁民仁民而愛物至於廓然大公無所不愛而有以全盡其仁道之大則皆由此本既立而自生生有不可遏者耳此所謂本立而道自生也生者生生不窮之意伊川所謂其道充大是也非無本而漸生之謂猶之木焉根本既立則枝葉生茂而不可已茍無其本枝葉安自而生哉又程子曰盡得孝弟便是仁恐在盡字上是聖人人倫之至之意蓋孝弟亦通上下而言猶忠恕之爲道也或人謂由孝弟可以至仁則孝弟與仁是二本矣妄意揣度如此乞賜逐一垂誨大概且用此意涵泳久之自見得失後皆放此程子曰循物無違謂信竊謂物者事物之物有是事則循是事而無所違無是事則不鑿空而爲之說此與以實之謂信意相似或者謂物者理也實循是理而無所違有反身而誠之意蓋孟子有諸己之說不知是否又程子所謂盡物之謂信者銖所未喻豈盡已之謂忠者處於己者無不盡盡物之謂信者施於物者必以實歟則必以實施於物者亦無不盡矣其所謂表裏内外者蓋惟其存於己者必盡則其施於物也必實在己自盡之謂忠推是忠而行之之謂信雖然曽子之三省必亦各致其功未必恃此而責彼也乞賜逐一垂誨或者之說非是程子曰公而以人體之故爲仁銖昔嘗問此語於先生先生曰體猶體物之體猶易所謂幹事其意若謂人之生具此形即有此性有此性則有此理與生俱生完具無欠只爲蔽於私所以不行若能公則此理便自周流充足不假於外此理即所謂仁也仁者愛之理故程子曰仁之道只消道一公字然伊川又恐人將公便喚作仁故曰公須以人體之體猶主也銖當時雖省記先生是此意恐記得差誤乞賜垂誨此下數說大槩皆近之更冝涵泳而實履之不可只如此說過無益於事也賢賢易色一章竊謂上蔡所謂如惡惡臭如好好色天下之誠意無以加此好德如好色亦可謂好德之至也此語似甚精而或者乃謂不若張子韶曰學所以明人倫也好德不好色則夫婦之倫正似恐不必推說至此然上蔡之說與伊川所謂見賢則變易顔色愈加恭敬好善而誠也二說孰精又子夏之意以謂人能如此則雖人以為未嘗學子夏必以爲己學也玩其語意則子夏未嘗不欲人學然其語不無病不若夫子所謂行有餘力則可以學文者爲有本末先後故集註特著呉氏之說所以垂訓者精矣乞賜垂誨當從謝氏說夫子温良恭儉讓以得之一章竊謂程子之意固己明白謝氏曰學者觀於聖人威儀之間亦可以進德矣此語似甚精而或者乃謂不若張子韶曰温良恭儉讓固不可以不學要當學聖人之道以求其自然發見者若乃矯僞其行粉飾其容此又聖門所誅也銖竊謂夫子德容至於如是固有德盛仁熟而其自然之光輝著見於外學者之學聖人固不當矯情飾貌徒見其外而不養其中也然容色辭氣之間亦學者所當用功之地而致知力行之原今不於此等處存養涵蓄學聖人氣象不知復於何者爲學聖人之道乎竊謂學者内外交相養之功正當熟玩此等氣象自别不知是否又儉節制也節制莫是自然有法度繩約之意否温良讓有和易氣象恭儉有嚴恪氣象謝氏所謂奉然如春儼然如秋是也併乞逐一垂誨如張氏說則鄉黨篇可廢矣三年無改於父之道一章銖自㓜年則見先生與程先生反復論此一段當時固莫能曉近來思之竊謂程子所謂孝子居喪志存守父在之道不必主事而言者頗爲的當請試言其所思而得之者以求教志者志趣其心之所趣者是也行者行實行其志而有成也父在子不得專於行事而其志之趣向可知故觀其志父没則子可以行其志矣其行實暴白故觀其行然三年之間疾痛哀慕其心方皇皇然望望然若父之存而庶幾於親之復見豈忍以爲可以得行已志而遽改以從己志哉存得此心則於事有不得不改者吾迫於公議不得已而改之亦無害其爲孝矣若夫其心自幸以爲於是可以行己之志而於前事不如己意者則遂遽改以從己之志則不孝亦大矣豈復論其改之當與不當哉蓋孝子處心親雖有存没之間而其心一如父在不敢自專况謂之父道則亦在所當改而可以未改者三年之間如白駒過隙此心尚不能存而一不如志率然而改則孝子之心安在哉故夫子直指孝子之心推見至隱而言不必主事言也若乃外迫公議内懷欲改而方且隱忍遷就以俟三年而後改焉則但不失經文而已大非聖人之意矣妄論如此不知稍不畔否乞賜垂誨此說得之然前輩已嘗有此意矣更須子細體認不可只如此說過君子不重則不威一章程子曰人安重則學堅固范氏游氏推明其說精矣然味其經文竊謂恐不若呂氏曰學則知類通達故不至於蔽固蓋若作一事說則曷不曰君子不重則不威而學不固乎不重則不威有篤敬意學則不固有致知意學固兼知與行而言而夫子言之於此則學又自有專說知意主忠信竊謂忠信蓋誠實之意蓋自理而言則謂之誠實自人所行而言則謂之忠信其實一也故伊川曰忠信者以人言之要之則實理也無友不如己者程先生以謂上蔡云與不勝己者友鈍滯了人此語誠是然人之求友固不可無此心而亦不可必也心欲求勝己者而後友則勝己者亦不與我友矣聖人用心不如是子夏教其門人以擇交之道曰可者與之其不可者拒之此未爲過也而子張猶以爲不可則不勝己者不與之友聖人氣象恐不如是楊氏所謂如己者合志同方而已不必勝己也似以此言爲當銖嘗問之曰恐如此其弊或至於無責善輔仁之益先生曰道不同不相爲謀然銖思之終恐未安蓋味聖人語意正謂人好與不已若者處故爲此言以戒之無與毋通禁止之辭聞之李氏曰人皆求勝己者友則愚與魯幾於無友矣然世人知與賢已處者常少而損己者常多此學所以不進有志於學則不如己者宜非所友此意不知近是否乞賜垂誨學則不固程范游說是毋友不如己者李說是顏子不改其樂章程子嘗曰昔受學於周茂叔每令㝷仲尼顏子樂處所樂何事銖豈當躐等妄論及此但近見一朋友講論次說及此覺得說入𤣥妙且又拘牽於鮮于侁之問使顏子樂道則不爲顏子之說說入空寂去因試妄意揣度以謂聖賢所以皇皇汲汲者正謂欲求得本心而已苟得其本心以制萬事則天下之樂何以加此區區貧窶豈足以累其心顏子在陋巷人不堪憂而顏子獨樂者正樂此而已此與求仁而得仁又何怨之意近似孟子曰君子所性雖大行不加窮居不損所性謂所得於性者君子所得於性分之内雖大行窮居不爲加損樂莫大焉不知如此揣度不至大段礙理否乞賜垂誨此等處不可彊說且只看顏子如何做功夫若學得他功夫便見得安樂處非思慮之所能及也書金縢曰我之弗辟我無以告我先王一段按馬鄭氏皆音辟爲避其意蓋謂管蔡流言成王既疑周公公乃避居東都二年之久以待成王之察及成王遭風雷之變啟金縢之書迎公來返乃攝政方始東征所謂罪人斯得者成王得其流言之罪人也陳少南呉才老從之而詆先儒誅辟之說銖竊謂周公之誅管蔡與伊尹之放太甲皆聖人之變惟二公至誠無愧正大明白故行之不疑未可以淺俗之心窺之也此辟字與蔡仲之命所謂致辟之辟同安得以辟爲避且使周公委政而去二年之久不幸成王終不悟而小人得以乗間而入則周家之禍可勝言哉周公是時不知何以告我先王也觀公之告二公曰我之弗辟我無以告我先王其言正大明白至誠惻怛則區區嫌疑有所不敢避矣惟有此心無愧而先王可告也自潔其身而爲匹夫之諒周公豈爲之哉妄意如此乞賜垂誨辟字當從古註說微子篇曰詔王子出廸我舊云刻子一段銖於三仁之去就死生未知其所以當留當去當死之切當不可易處嘗讀微子書見其所以深憂宗國之將亡至於成疾爲狂瞶耄無所置身其心切矣然終不言於紂以庶幾萬一感悟而遽爲之去是必有深意者東坡則曰箕子在帝乙時以微子長且賢欲立之而帝乙不可卒立紂紂忌此兩人故箕子曰子之出固其道也我舊所云者害子子若不出則我與子皆危矣微子之告箕子若欲與之俱去然微子曰吾三人者各行其志自用其心之所安者而已人各自以其意貢於先王微子去之以續先王之國箕子爲之奴以全先王之祀比干以諫而死爲不負先王也而林少穎亦從其說以爲二人處危疑之地身居嫌隙不可彊諫徒死又無益故微子雖欲謀於箕子以救紂之顚隮然箕子以謂我興受其敗猶言我起而諫則受其禍不可以復諫又不可居位故微子遁逃以避禍而箕子隱晦以自存惟比干不處嫌疑故彊諫而死三人所處之勢不同故各行其志以自達於先王而已審如是說則微子箕子皆未嘗諫無乃屑屑然避嫌逺禍以苟存乎唐孔氏曰我興受其敗者我適起而受其禍敗不可逃免然殷滅之後我不事異姓不能與人爲臣僕示必欲以死諫紂但箕子之諫適値紂怒未甚故得不死耳微子告二人而獨箕子答者比干與箕子意同經省文也竊謂孔氏去古未逺唐孔氏蓋推本安國之意其言必有所據蓋嘗因是妄謂微子以宗國將亡不勝其憂愁無􅂓之心而謀出處於箕子比干故箕子爲言我興受其敗不可逃免當與宗國俱爲存亡故雖商祀或至淪亡我亦誓不臣屬他人蓋將諫紂紂不聽亦不敢苟全逃死而比干無一言者孔氏所謂心同不復重言是也其後比干果以諫死而箕子乃不死者比干初心豈欲徒死以沽名哉所以諫者庶幾吾言得行而紂改焉耳紂既不改而言益切故紂遂殺之則比干亦不得而逃死耳箕子初心亦豈欲隱晦自存苟全其生哉亦猶比干之諫冀吾言得行而紂改焉耳紂既不改而囚之偶不死耳紂囚之而不置之死則箕子豈固欲自經於溝瀆而爲匹夫之諒哉故因遂佯狂而爲奴蓋亦未欲即死庶幾彌縫其失而冀其萬有一開悟耳蓋諫行而紂改過者二子之本心也諫不行而或死或囚者二子所遇之不同爾使紂而囚比干意比干亦未敢即死也使紂而殺箕子箕子敢求全哉二子易地則皆然矣至於箕子爲微子之計則其意豈不以謂吾二人者皆宗國之臣利害休戚事體一同皆當與社稷俱爲存亡不可復顧明哲保身之義然而微子國之元子也往者紂未立吾嘗言於帝乙而立子帝乙不從而立紂是以紂卒疑吾兩人故吾舊所云者足以害於子若起諫紂則紂益生疑非惟不從害必先及子而併我危矣死分也不足惜而未有毫髮益於紂而遽死可惜也東萊所謂人先有疑心則雖盡忠與言而未必不疑蓋疑心先入而爲之主是也故微子不可留但當遯逃而出乃合於道又况我與比干既留諫以事紂則存亡未可知萬一不死罔爲人臣僕此心已堅定則亦不可使成湯以來廟不血食况汝爲元子又居危疑之地義當逃去萬有一全宗祀可也此三子者其制行不同各出於至誠惻怛之心無所爲而爲之故孔子並稱三仁或以此歟妄意如此乞賜諄切垂誨此說得之史記亦說箕子諫而被囚也咸有一德竊謂一者其純一而不雜德至於純一不雜所謂至德也所謂純一不雜者蓋歸於至當無二之地無纎毫私意人欲間雜之猶易之常中庸之我也說者多以咸有一德爲君臣同德咸有一德固有同德意而一非同也言君臣皆有此一德而已蘇氏曰聖人如天時殺時生君子如水因物賦形天不違仁水不失平惟一故新惟新故一一故不流新故無斁此語似是不知可以作如此看否乞賜垂誨此篇先言常德庸德後言一德則一者常一之謂終始惟一時乃日新蘓氏說未的當可更退步就實做工夫處看盤庚言其先王與其羣臣之祖父若有眞物在其上降災降罰與之周旋從事於日用之間者銖竊謂此亦大概言理之所在質諸鬼而無疑爾而殷俗尚鬼故以其深信者導之夫豈亦眞有一物耶乞賜垂誨鬼神之理聖人蓋難言之謂眞有一物固不可謂非眞有一物亦不可若未能曉然見得且闕之可也銖竊謂書序之作出於聖人無疑學者觀書得其序則思過半矣班固言書之所起逺矣至孔子纂時上斷於堯下訖於周凡百篇而爲之序言其作意而林少穎乃謂書序乃厯代史官轉相授受以書爲之總目者非孔子所作今玩其語意非聖人其孰能與於此哉書序言成湯既沒太甲元年玩其語意則是成湯没而太甲立太甲既立不明伊尹放諸桐三年則是太甲服湯之喪既不明伊尹遂使居於湯之墓廬三年而克終允德也或者乃曰孟子曰湯崩太丁未立外丙二年仲壬四年湯没六年而太甲立太甲服仲壬之喪夫服仲壬之喪而廬於乃祖之墓恐非人情伊川謂太丁未立而死外丙方二歲仲壬方四歲乃立太子之子太甲而或者又謂商人以甲乙爲兄弟之名則丙當爲兄而壬當爲弟豈有兄二歲弟乃四歲乎按皇極經世圖紀年之次則太甲實繼成湯而立無疑不知外丙二年仲壬四年之說當作如何訓釋乞賜垂誨書序恐只是經師所作然亦無證可考但决非夫子之言耳成湯太甲年次尤不可考不必妄爲之說讀書且求義理以爲反身自修之具此等殊非所急也西伯戡黎舊說多指文王惟陳少南呂伯恭薛季隆以爲武王呉才老亦曰乗黎恐是伐紂時事武王未稱王亦只稱西伯而已銖按書序言殷始咎周周人乗黎則殷自此以前未嘗惡周也殷始有惡周之心而周又乗襲戡勝近畿之黎國迫於王都且見征伐黎在漢上黨郡壼關紂都朝歌上黨在朝歌之西此祖伊所以恐而奔告於受曰天既訖我殷命曰恐曰奔告曰訖我殷命則其事勢亦且迫矣恐非文王時事也文王率殷之叛國以事紂而孔子亦稱其三分天下有其二以服事殷爲至德所謂有事君之小心者正文王之事孔子所以謂之至德也當時征伐雖或有之未必迫於畿甸然史記又謂文王伐犬戎密須敗耆國耆即黎也史記文王得專征伐故伐之二說未知孰是乞賜垂誨此等無證據可且闕之服父母之喪而祭祀祖先當衣何服與居母喪而見父居父母喪而見祖父母其朔旦歲節上壽爲禮各衣何服父母在而遭所生喪謂非出母不知合衣何服合與不合設几筵出聲哭舅姑俱存而子婦丁其父母憂雖合奔喪然卒哭後必當復歸恐三年之服自不可改遇節序變遷不審可以發哀出聲否見舅姑及從舅姑以祭不知所易當何服乞賜垂誨古者居喪三年不祭見曽子問其見祖父母之屬古人亦有節文不盡記然上壽之禮自不合與所生母喪禮律亦有明文更宜詳考亦當稍避尊者乃爲安耳如女已適人爲父母服朞禮律亦甚明若有舅姑難以發哀於其側從祭但畧去華盛之服可也答董叔重人心之體虚明知覺而已但知覺從義理上去則爲道心知覺從利欲上去則爲人心此人心道心之别也所謂利欲如口之於味目之於色之類非遽不好但不從義理上去則墮於人欲而不自知矣亦是中庸之中字本是指時中之中而言然所以能時中者以其有是不偏倚者爲本故中庸之中實兼二義非如中和之中專指性也致中者如立乎天地四方之中未感者無一息之不然致和者如處一堂一室之中隨處得宜無少乖戾無時而不然也或者有疑於中庸中和二中字不同故妄論如此不知於章句意無大悖否無一息之不然當改云無一息之少差曽㸃言志氣象固是從容灑落然其所以至此則亦必嘗有所用力矣知其所用力處則知堯舜事業㸃優爲之然堯舜事業亦非一事要必如㸃用力則不難爲但道理自有淺深所至亦有高下㸃資質高合下見得聖人大本如此故其平日用力之妙必有超乎事物之外而爲應事物之本者其視三子規規於事爲之末者固有間矣然一事一物亦各有一事一物之理學者大本功夫固當篤至亦必循下學上達之序逐件逐事理會到底乃能内外縝宻親切不差㸃言志甚高而行不掩焉觀其舍瑟倚門亦可見矣蓋道理無纎毫空闕不周滿處外面纔有罅漏則於道體爲有虧矣或謂曽㸃只是天資見得大頭腦如此元不曽用力又謂㸃已見到如此天下萬事皆無不了者恐皆一偏之論也未知是否此條大概近似而語意不宻且看他見得道理分明觸處通貫處是箇甚底可也答董叔重或曰天地之數五十有五而大衍之數五十何也銖竊謂天地之所以爲數不過五而已五者數之祖也蓋參天兩地三陽而二隂三二各隂陽錯而數之所以爲數五也是故三其三三其二而爲老陽老隂之數兩其三一其二而爲少隂之數両其二一其三而爲少陽之數皆五數也河圖自天一至地十積數凡五十有五而其五十者皆因五而後得故五虚中若無所爲而實迺五十之所以爲五十也一得五而成六二得五而成七三得五而成八四得五而成九五得五而成十無此定數則五十者何自來耶洛書自一五行至九五福積數凡四十有五而其四十者亦皆因五而後得故五亦虚中若無所爲而實乃四十之所以爲四十也一六共宗而爲太陽之位數二七共朋而爲少隂之位數三八成友而爲少陽之位數四九同道而爲太隂之位數不得此五數何以成此四十耶即是觀之河圖洛書皆五居中而爲數宗祖大衍之數五十者即此五數衍而乗之各極其十則合爲五十也是故五數散布於外爲五十而爲河圖之數散布於外爲四十而爲洛書之數衍而極之爲五十而爲大衍之數皆自此五數始耳是以於五行爲土於五常爲信水火木金不得土不能各成一氣仁義禮智不實有之亦不能各爲一德此所以爲數之宗而揲蓍之法必衍而極於五十以見於用也不知是否此說是變者化之漸化者變之盡蓋化無痕迹而變有頭面逐漸消縮以至於無者化也陽化爲剛隂化爲柔暖化爲寒是也其勢浸長突然改換者變也隂變爲陽柔變爲剛寒變爲暖是也陽化爲隂是進極而囘故爲退隂變爲陽則退極而上故爲進故曰變化者進退之象也陽化爲隂隂變爲陽者變化也所以變化者道也道者本然之妙變化者所乗之機故隂變陽化而道無不在兩在故不測故曰知變化之道者其知神之所爲乎不審可作如此看否亦得之隂陽若以推行言之不過一氣之運而已所謂一動一靜互爲其根也以闔闢言之則有兩物所謂分隂分陽兩儀立焉也既曰隂陽又曰柔剛者隂陽以氣言剛柔則有形質矣此猶四象之有老少亦如以子午夘酉分言隂陽也不知是否闔闢與動靜無異易中以對待言者自多不必引此也在天成象在地成形變化見矣變化非因形象而後有也變化流行非形象則無以見故因形象而變化之迹可見也日月星辰象也山川動植形也象陽氣所爲形隂氣所爲然陽中有隂則日星陽也月辰隂也隂中有陽則山隂而川陽然隂陽又未嘗不相錯而各自爲隂陽細推之可見矣不知是否亦是乾以易知與易則易知之知字不同乾以易知知猶主也知如知郡縣之知蓋乾健不息惟主於生物如瓶施水無他艱阻故以易知大始也易則易知言人體乾之易故曰直無艱阻而人易知之也文義亦得之孟子曰口之於味也目之於色也耳之於聲也鼻之於臭也四肢之於安佚也性也此性字專指氣而言如性相近之性有命焉此命字兼理與氣而言如貧賤之安分富貴之有節是也仁之於父子也義之於君臣也禮之於賔主也智之於賢者也聖人之於天道也命也此命字專指氣而言所遇應不應所造有淺深厚薄清濁之分皆係乎氣稟也有性焉此性字專指理而言如天地之性之性不知可作如此看否此說分得好中和者性情之德也寂感者此心之體用也此心存則寂然時皆未發之中感通時皆中節之和心有不存則寂然者木石而已大本有所不立也感通者馳肆而已達道有所不行也故夫動靜一主於敬戒謹恐懼而謹之於獨焉則此心存而所寂感無非性情之德也不知是否亦是極之爲言究竟至極不可有加之謂以狀此理之名義則舉天下無以加此之稱也故常在物之中爲物之的物無之則無以爲根主而不能以有立故以爲在中之義則可而便訓極爲中則不可以有形者論之則如屋之有脊棟囷廩之有通天柱常在此物之中央四靣八方望之以取正千條萬别本之以有生禮所謂民極詩所謂四方之極其義一也未知推說如此是否是近見一書名廣川家學蓋董逌彦逺所爲所論亦稍正不知有傳授否其爲人如何如曰心者性之所寓也所貴於養心者以性之在心也又曰形之靈者曰魄氣之神者曰魂既生魄矣魄内自有陽氣氣之神者名之曰魂附形之靈者謂初生時耳目手足運動啼呼爲聲此則魄之爲靈也附氣之神者謂精神性識漸有所知此則附氣之神也魂在魄先附魄以神此等說得亦無甚病否既生魄陽曰魂謂纔有魄便有魂自初受胞胎時已俱足矣不可言漸有所知然後爲魂也董氏有詩解自謂其論關雎之義暗與程先生合但其他文澁難曉集傳中論京師之屬頗祖其說又據黄端明行狀說圍城中作祭酒嘗以僞楚之命慰諭諸生他事不能盡知也近見曽彦和論彭蠡既瀦引漢志豫章九水合於湖漢東至彭澤入江禹貢漢水入江而湖漢九水見遏於江北於是自匯爲彭蠡則彭蠡之水本受湖漢之水欲入江而爲江漢所遏因却而自瀦蓋漢水未入江之前則彭蠡未瀦故曰東匯澤爲彭蠡此說自當但又有曰彭蠡之瀦以受其江漢而不能絀蘓氏味别之說則非也又言九江即是洞庭引漢志沅水漸水元水底水叙水酉水澧水湘水資水皆合洞庭中東入於江江則過之而已九水合於洞庭澤故洞庭亦可名九江若謂江分九道則經當曰九江既道而不曰孔殷當曰播爲九江而不曰過九江矣然林少穎辨其不然不知洞庭之澤果是受此水之入否然彭蠡自有源而非受江漢而成九江爲洞庭而不在潯陽南則無可疑矣若彦和之於禹貢雖未盡善亦考索精詳勝他人也曽彦和說書精博舊看得不子細不知其已有此說但漢志不知湖漢即是彭蠡而曰源出雩都至彭蠡入江此爲大謬恐彦和亦不能正也九江之說今亦只可大概而言恐當時地入三苗禹亦不能細考若論小水則湖南尚有蒸瀟之屬况兼湖北諸水上流其數不止於九若實計入湖之水只是湘沅澧之屬三四而已又不能及九也漢水未入江之前彭蠡未瀦此亦未是江流甚大漢水入之未必能有所増益也大率今人不敢說經文有誤故如此多方囘互耳孟子集註古公亶甫下註云太王公劉九世孫五世而斬下註云父子相繼爲一世按史記自公劉至古公凡十世今謂九世豈不數古公已身耶然按豳詩集傳云公劉復修后稷之業十世而太王徙居岐山之陽則疑孟子集註或錯九字否又按明道行狀云先生五世而上居中山之博野高祖始賜第京師則高祖五世祖也而上即爲六世是通已身數矣伏乞垂誨通數即計己身爲數曰祖曰孫則不當計己身蓋謂之祖孫則是指他人而言矣史傳及今人文字以高祖之父爲五世祖甚多無可疑也答董叔重程先生論中庸鳶飛魚躍處曰與必有事焉而勿正心之意同活潑潑地銖詳先生舊說蓋謂程子所引必有事焉與活潑潑地兩語皆是指其實體而形容其流行發見無所滯礙倚著之意其曰必者非有人以必之曰勿者非有人以勿之者蓋謂有主張是者而實未嘗有所爲耳今說則謂必有事焉而勿正心者乃指此心之存主處活潑潑地云者方是形容天理流行無所滯礙之妙蓋以道之體用流行發見雖無間息然在人而見諸日用者初不外乎此心故必此心之存然後方見得其全體呈露妙用顯行活潑潑地畧無滯礙耳所謂必有事而勿正心者若有所事而不爲所累云爾此存主之要法蓋必是如此方得見此理流行無礙耳銖見得此說似無可疑而朋友間多主舊說蓋以程子文義觀之其曰與曰同而又以活潑潑地四字爲註云則若此兩句皆是形容道體之語然舊說誠不若今說之實舊說讀之不精未免使人眩瞀迷惑學者能實用力於今說則於道之體用流行當自有見然又恐非程子當日之本意伏乞明賜垂誨舊說固好似涉安排今說若見得破則即此須臾之頃此體便已洞然不待說盡下句矣可更猛著精彩稍似遲慢便蹉過也性與氣雖不相離元不相雜孟子論性獨指其不雜者言之其論情才亦如此要必如程張二先生之說乃爲備耳不知是否甚善集註中似已有此意矣呂芸閣云性一也流形之分有剛柔昏明者非性也有三人焉皆一目而别乎色一居乎宻室一居乎帷簿之下一居乎廣廷之中三人所見昏明各異豈目不同乎隨其所居蔽有厚薄爾銖竊謂此言分别得性氣甚明若移此語以喻人物之性亦好銖頃嘗以日爲喻以爲大明當天萬物咸覩亦此日耳蔀屋之下容光必照亦此日耳日之全體未嘗有小大只爲隨其所居而小大不同耳不知亦可如此諭人物之性否伏乞指誨亦善周霄問君子仕乎一段霄意蓋以孟子不見諸侯爲難仕故舉此問以諷切之孟子所言皆告以君子急仕之意所引禮曰諸侯耕助以供粢盛一段疑指爲貧而仕者言蓋仕非爲貧也然有爲貧而仕者則君子於仕亦可謂急矣然仕之心未嘗不急仕之道則不可以急而不由其道也蓋欲急仕者君子之仁不由其道不敢仕者君子之義義行則仁存未有違義而可以爲仁也大率孟子教人多因人情而制之以義此所以卓乎非異端之說所能知也伏乞垂誨此章但言不仕無義未見爲貧而仕之意禮曰别子爲祖繼别爲宗繼禰者爲小宗有百世不遷之宗有五世則遷之宗竊謂君適長爲世子繼先君正統自母弟以下皆不得宗其次適爲别子不得禰其父則不可宗嗣君又不可無統屬故立爲先君之族大宗之祖所謂别子爲祖也其適子繼之則爲大宗凡先君所出之子孫皆宗之百世不遷故曰大宗者繼别子之所自出也呂氏言别子所自出者謂别子所出之先君也如魯李友乃桓公别子所自出故爲桓公一族之大宗不知是否百世不遷者以其統先君之子孫而非統别之子孫也别子之庶長義不禰别子而自爲五世小宗之祖其適子繼之則爲小宗小宗者繼别子庶子之所自出也故惟及五世五世之外則無服蓋以其統别之子孫而非統先君之子孫也不知是否伏乞垂誨宗子有公子之宗有大宗有小宗國家之衆子不繼世者若其間有適子則衆兄弟宗之爲大宗若皆庶子則兄弟宗其長者爲小宗此所謂公子之宗者也别子即是此衆子既没之後其適長者各自繼此别子即是大宗直下相傳百世不遷别子之衆子既没之後其適長子又宗之即爲繼禰之小宗每一易世高祖廟毁則同此廟者是爲袒免之親不復相宗矣所謂五世而遷也孟子集註序說言史記言孟子受業子思之門人註云趙氏註及孔叢子亦皆云孟子親受業於子思銖謂趙岐所註必有所考孔叢子恐是僞書似不必引此書如何孔叢子雖僞書然與趙岐亦未知其孰先後也姑存亦無害史記謂孟子之書孟子自作趙岐謂其徒所記今觀七篇文字筆勢如此决是一手所成非魯論比也然其間有如云孟子道性善言必稱堯舜亦恐是其徒所記孟子必曽畧加刪定也此非甚𦂳切以朋友間或有疑此者嘗以此答之恐未是也伏乞垂誨或恐是如此答董叔重參天兩地倚數天之象圓圓者徑一而圍三參天者參其一也地之象方方者徑一而圍四兩地者兩其二也故參其一而爲三者因圎象而有三數也兩其二而爲四者因方象而爲四數也參天兩地則爲數者五故天地之數皆五也三三爲六則爲老陽老隂之數兩其三一其二則爲少隂之數兩其二一其三則爲少陽之數故參天兩地者數之祖也未知是否圍四者以二爲一故其一隂而爲二故曰參天兩地今曰兩其二而爲四則不得爲參天兩地矣天一而圍三地一而圍四然天全用而地半用故參天爲三而兩地爲二也今曰二二爲四非是揲蓍之數以四爲主蓋四者數之用也太陽一少隂二少陽三太隂四其位四也分揲掛歸必四營也揲之亦必以四故皆以四爲主故老陽三十六少隂三十二少陽二十八太隂二十四皆四約之也及其揲也五四爲奇五除掛一四不除掛一皆爲四者一所謂竒也九八爲偶九除掛一八不除掛一則爲四者二所謂偶也是皆以四數爲主不知是否四營恐與四揲不相關河圖之數不過一竒一偶相錯而已故太陽之位即太隂之數少隂之位即少陽之數少陽之位即少隂之數太隂之位即太陽之數見其迭隂迭陽隂陽相錯所以爲生成也天五地十居中者地十亦天五之成數蓋一二三四已含六七八九者以五乗之故也蓋數不過五也洛書之數因一二三四以對九八七六其數亦不過十蓋太陽占第一位已含太陽之數少隂占第二位已含少隂之數少陽占第三位已含少陽之數太隂占第四位已含太隂之數雖其隂陽各自爲數然五數居中太陽得五而成六少隂得五而成七少陽得五而成八太隂得五而成九則與河圖一隂一陽相錯而爲生成之數者亦無以異也不知可如此看否啓䝉言其數與位皆三同而二異三同謂一三五二異謂河圖之二在洛書則爲九河圖之四在洛書則爲七也蓋一三五陽也二四隂也陽不可易而隂可易陽全隂半隂常從陽也然七九特成數之陽所以成二四生數之隂則雖陽而實隂雖易而實未嘗易也不知是否所論甚當河圖相錯之說尤佳隂陽以氣言剛柔則有形質可見矣至仁與義則又合氣與形而理具焉然仁爲陽剛義爲隂柔仁主發生義主収歛故其分屬如此或謂楊子雲君子於仁也柔於義也剛蓋取其相濟而相爲用之意仁體剛而用柔義體柔而用剛艮其背不獲其身者止而止也所謂靜而止其所也行其庭不見其人者行而止也所謂動而止其所也靜而止其所者是只見道理所當止處不見己身之有利害禍福也動而止其所者只見道理所當行處不見在人之有彊弱貴賤也古人所以舍生取義殺身成仁者不獲其身也所以不侮鰥寡不畏彊禦者不見其人也然惟不獲其身者乃能不見其人故曰動靜各止其所而必以主夫靜者爲本焉所以自源而徂流也程先生所謂止於所不見則無以亂其心而止乃安是又就做工夫上言不獲其身不見其人推說甚善然亦不專在此日用精粗蓋無不然也程先生說自是其所見如夫子彖傳文言未必文王之本意也答董叔重辱惠問并以長牋喻及銘墓之意尤以愧仄今年多病異於常時又以築室遷居之擾殊無好况文字本不能作前後所辭甚多但以叔重如此見屬獨不可辭因留來人累日不得功夫此三數日又覺傷冷時作寒熱意緖尤不佳今日小定方能力疾草定奉寄又更與允夫訂之或有疑則見告可改也但此間辭人之多幸且勿廣爲佳今所作先丈誌文易就亦因得好行狀故不費力數年前有相屬作一大誌銘者事緖既多而狀文全類新唐書體至今整頓不得也允夫所作令祖墓表尤佳近歲難得此文也與黄子耕祭禮極難處竊意神主惟長子得奉祀之官則以自隨影像則諸子各傳一本自隨無害也支子之祭先儒雖有是言然竟未安向見范丈兄弟所定支子當祭旋設紙牓於位祭訖而焚之不得已此或可采用然禮文品物亦當少損於長子或但一獻無祝亦可也答黄子耕熹數年來疾病日侵患難交至氣血凋瘁大非徃時之比來日無幾甚思與四方士友并力切磋以求無負師傅之託而不可得每一念之徒増永歎而已子耕近日所用工處頗得力否向時說得致知兩字亦頗散漫望更思之復以見諭也答黄子耕新除甚佳闕亦不逺否但聲利海中溺人可畏耳前書所謂格物主敬者甚善但主敬方是小學存養之事未可便謂篤行須修身齊家以下乃可謂之篤行耳日用之間且更力加持守而體察事理勿使虚度光隂乃是爲學表裏之實近至浙中見學者工夫議論多靠一邊殊可慮耳答黄子耕時事傳聞不一然亦未知是否衰病閒散既無所効其區區亦不敢深問也示諭且看大學俟見大指乃及他書此意甚善但看時須是更將大段分作小段字字句句不可容易放過常時暗誦黙思反覆研究未上口時須教上口未通透時須教通透已通透後便要純熟直得不思索時此意常在心胸之間驅遣不去方是此一段了又換一段看令如此數段之後心安理熟覺得工夫省力時便漸得力也近日看得朋友間病痛尤更親切都是貪多務廣匆遽渉獵所以凡事草率粗淺本欲多知多能下稍一事不知一事不能本欲速成反成虚度歲月但能反此如前所云試用歲月之功當自見其益矣至於作無益語以本心正理揆之誠是何補於事但人不作自己功夫向外馳走便見得此等事重若果見得自己分上合做底事千條萬端有終身勉勉而不能盡者則亦自當不暇及此矣答黄子耕示喻爲學之意甚善但恐更須看令簡潔明白親切令下功夫處約而易守乃佳耳别紙兩條亦覺繁雜本末始終之說只是要人先其本後其末先其始後其終耳不必如此多說也格物只是就一物上窮盡一物之理致知便只是窮得物理盡後我之知識亦無不盡處若推此知識而致之也此其文義只是如此纔認得定便請依此用功但能格物則知自至不是别一事也格物致知只是窮理聖賢欲爲學者說盡曲折故又立此名字今人反爲名字所惑生出重重障礙添枝接葉無有了期要須認取本意而就中看得許多曲折分明便依此實下功夫方見許多名字並皆脱離而其功夫實處却無欠闕耳答黄子耕示及疑義比舊益明潔矣但尚有繁雜處且就正經平白玩味久當自見親切處自然直截簡易也正淳伯豐近皆得書學皆進益可喜泉漳之間亦得一二學者將來可望不虚爲此行也但經界一事恐未有人承當而豪右不樂異論蠭起遂且悠悠耳在官一年不能爲民興利而除害亦未能盡此爲可恨也長孺之去甚勇但曽守解事何乃至此昨晚得趙帥書亦云然甚可怪也答黄子耕熹憂悴無憀無足言者治葬結廬二事皆在來年今且造一小書院以爲往來幹事休息之處他時亦可藏書宴坐然已不勝其勞費未知來年復如何也來喻云云足見講學自修之力甚慰所望所謂動上求靜亦只是各止其所皆中其節則其動者乃理之當然而不害其本心之正耳近脩大學此章或問頗詳今謾録去可以示斯逺也或問喜怒憂懼人心之所不能無也而曰有是一者則心不得正而身不可脩何哉人之心湛然虚明以爲一身之主者固其本體而喜怒憂懼隨感而應者亦其用之所不能無者也然必知至意誠無所私係然後物之未感則此心之體寂然不動如鑑之空如衡之平物之既感則其妍媸高下隨物以應皆因彼之自爾而我無所與此心之體用所以常得其正而能爲一身之主也以此而視其視必明以此而聽其聽必聰以此而食食必知味身有不脩者哉苟其胸中一有不誠則物之未感而四者之私已主於内事之已至而四者之動常失其節甚則暴於其氣而反動其心此所以反覆循環常失其正而無以主於身也以無主之身應無窮之物其不爲仰面貪看鳥囘頭錯應人者幾希孟子所論平旦之氣與先立乎其大者正謂此耳答黄子耕熹湘中之行初但以私計不便懇辭然愚意尚無固必既而乃有决不可行者遂至投劾諸公蓋已厭之然猶不肯以此爲名又以病辭然後得免世途艱險乃至於此本非欲以是爲高也歸來已一年矣而卜𦵏未遂築室未成自春來無日不病見苦脚氣寒熱伏枕已兩日矣大抵血氣日衰雖是舊病亦如新證未知能復得幾時也示諭爲學之意及中庸疑義皆比舊儘詳宻矣病中看得恐不子細畧疏一二在别紙餘俟旦夕附便奉報也别紙所論二先生說中庸以體用言之甚善呂氏詭激之說本亦無病聖人之道廣大寛平豈以詭激爲事但世之狃常習故者借之以成其私則不可不察耳不可以此而廢彼也呂氏盡心以知性此語有病躬行以盡性此却得之蓋孟子言盡其心者知其性也則是人之所以能盡其心者以其能知性故也大學所謂知至而后意誠是也民受天地之中以生是始生之生義與産字相似忠信所以進德此段初只是解終日乾乾是終日對越在天之義下文因而說天字道理其間有許多分别如說如在其上如在其下亦只是實有此理自然昭著形而上爲道形而下爲器如今事物莫非天理之所在然一物之中其可見之形即所謂器其不可見之理即所謂道然兩者未嘗相離故曰道亦器器亦道於此見得透徹則亦豈有今與後已與人之間哉率性之謂道非是人有此性而能率之乃謂之道但說自然之理循將去即是道耳道與性字其實無甚異但性字是渾然全體道字便有條理分别之殊耳脩道之謂教乃是聖人脩此道以爲教於天下如禮樂刑政之類是也諸說多端然細考程先生說其要不過如此其間亦有說得不相似處恐是當時論亦未定也人心道心之說甚善蓋以道心爲主則人心亦化而爲道心矣如鄉黨所記飲食衣服本是人心之發然在聖人分上則渾是道心也答黄子耕病中不宜思慮凡百事且一切放下專以存心養氣爲務但跏趺靜坐目視鼻端注心臍腹之下久自温暖即漸見功効矣答黄子耕熹初意到此即遣人招正淳伯豐及余正叔而此間事煩財匱時論又方擾擾令人憂懼不知所以爲計遂未能及幸因書爲致此意徐觀事勢如何乃敢議此也答黄子耕兩書皆領所云云何不安之甚今日仕宦只是如此既未免出來只得忍耐勉其力之所及而已日用之間更看自家分内許多道理甚底是欠闕底隨處操存隨處玩索不妨自有餘樂何至如此焦躁耶所聞豈有是事政使有便遭貶責亦是臣子之常分但恨力不及耳答黄子耕伏枕月餘已分必死自入夏以來却稍輕减但今餘證狂來頗亦廢事明年便當七十據禮而論亦合衰殘無足深嘆也但此道衰微方賴朋友潛思固守以庶幾於久遠年來僅得伯豐最爲可望乃復盛年奄至大故聞之傷悼不能爲懐非獨以平日徃來遊好之情而己聞其親年高遭此何以堪處江西朋友書來却皆言其子曉事此則猶爲不幸之幸欲遣一人持書致奠并弔其家而力不能辦今有書信不免奉煩爲尋的便附徃若相去不逺更得專人取其囘書以來尤所望也所喻職事縷縷備悉既是出來仕宦此等自不能免耗金文字以目昏未能盡讀然其大概已可見矣改秩後授一湖北淮南僻縣優哉悠哉􅂓以卒歲此乃今日最上䇿也答黄子耕兩辱手示得詳近况良以爲慰竟從銓部調逺邑而歸既無冐進之嫌又絶矯亢之累所處其精吾黨足以増氣矣甚幸甚賀聞湖北深僻民少事稀無迎送督促之煩以優游讀書此今日仕宦之最佳處想歲下了却令兄位下一二事便可行矣自分寧取道應亦不逺但恨相望益逺衰晚沈痼無復相見之期此爲恨耳伯豐子弟如何自其云亡念之不能已蓋朋友中敏悟未有其比意其他日可以任傳付之責者非獨爲遊好之私情也答黄子耕知赴官有期僻遠之鄉官事簡少可以讀書進學若如此實做得三年功夫比之奔走塵埃俯仰應接殊未爲失計也來喻更欲於經史中求簡易用功處此亦别無他巧只是且將所已學者反復玩味不厭重複久之當覺意味愈深逺理致愈明白耳此外昔所未學亦有切於修已治人之實者更以暇時量力探討使其表裏精粗通貫浹洽則於本原之地亦將打成一片無處不得力矣有如衰朽百病交攻常時氣滿心腹今日乍寒痛甚幾不能起觀此氣象餘日幾何然每開卷及與朋友講論未嘗不覺其有起予之益况如賢者春秋尚富精力尚彊其可不自勉乎安仁經界文字其畫一中所言戸部行下者即是李仲水所行其言本縣措置者即是當來邑中推廣其說雖未及一一細觀然亦可以見其不苟之意鄉在臨漳訪問打量算法得書數種比此加詳然鄉民卒乍不能通曉反成費力後得一法只於田段中間先取正方步數却計其外尖斜屈曲處約凑成方却自省事恨爲私意浮議所搖不得盡力其間以見均田平賦之効今讀所示尤使人悵然也答曹立之伊川先生帖摹勒甚精石已謹具但工力未至更旬日亦當可成或即去此亦可屬同官畢其事也范詩無甚發明不知前輩讀書何故却只如此苟簡不可曉也熹近得蜀本呂與叔先生易說却精約好看方此傳冩或未見當轉寄也録示陸兄書意甚佳近大冶萬正淳來訪亦能言彼講論曲折大概比舊有間矣但覺得尚有兼主舊說以爲隨時立教不得不然之意似此意思却似漸有揜覆不明白處以故包顯道輩仍主先入尚以讀書講學爲充塞仁義之禍此語楊子直在南豐親聞其說而南軒頃亦云傳夢泉者揚眉瞬目云云恐不若直截剖判便令今是昨非平白分明使學者各洗舊習以進於日新之功不宜尚復疑貳袐藏以滋其惑也旦夕亦有人去臨川自當作書更扣陸兄也進賢宰昨日亦得書論易數條已據鄙見報之未知以爲如何耳答曹立之所録示二書甚善但所謂不可以一說片言立定門戸則聖賢之教未嘗不有一定之門戸以示衆人至於逐人分上各隨其病痛而箴藥之則又自有曲折然亦分明直截無所隱袐囘互令人理會不得也隨已分修習隨已見觀書學者只得如此其至不至明道與不明道則在其人功力淺深恐亦不可謂此爲雖不中不逺者而别求顏曽明道見古人用心底竒特工夫也極欲一見渠兄弟更深究此而未可得向許此來今賤迹既不定想其聞此旱暵又未必成來深以爲恨也程丈諸說亦有鄙意所未安者以未參識不欲劇論但未知立之見得宥辟未發等語如何若已無疑即不須論矣立之所疑太極之說甚當此恐未易以口舌爭也輔養人主心術與開陳善道排抑佞邪正是相資爲用不可作兩事看如公仲之事則人主本有畏相畏義之心而近習之智尚淺故其爲蔽也未深是以幸而有濟若使趙侯之歌者先覺其所薦之能害己而有以間之則公仲者又如何而爲計耶元祐諸公不能開導君心固爲有罪然謂不當斥逐小人使至相激則亦未通但當時施行有過當處此則不可不監耳陳太丘亦是不當權位故可以逶迤亂世而免於小人之禍若以其道施之朝廷而無所變通則亦何望其能有益於人之國哉然此恐亦姑論其理之當然若熹自爲之則必有甚於元祐諸公之所爲而䧟於范滂陽球之禍必矣氣質一定不能自易奈何奈何近得程丈文字論及黍尺制度此中無人及文字可討論尚未及報但告糴進賢甚䝉其留意亦以此取怒於府帥使人不自安也立之所與趙子直論事甚佳如熹自度必不能濟當世之務然渠輩作此議論見識亦適可保身不犯世患耳其不能濟世恐亦無以異也答萬正淳心生道之說恐未安大抵此段是張思叔所記多以已意文先生之辭恐不能無少失眞也繼之者善繼之爲義接續之意言既有此道理其接續此道理以生萬物者莫非善而物之成形即各具此理而爲性也試以此意推之當得其㫖也答萬正淳所論大概只是如此但日用間須有箇欛柄方有執捉不至走失若只如此空蕩蕩地恐無撈摸也中只是應事接物無過不及中間恰好處閲理之精涵養之久則自然見得矣答萬正淳人傑昨答伯豐書云示及浩氣說所謂浩然之氣集義所生既與道義渾然而無間然道義則實助之以達其用是氣雖生於集而其充也却能爲道義之助此數語發明集註之說甚佳子約以爲未安乃是大綱上看得未分明但上蔡語子約辨之似當然上蔡本因孟子鄉爲今爲之言而生血氣盛衰之論則上蔡之論亦未可專以爲非也觀子約之論誠可見其用功實處但鄙見竊謂界分有未甚明故其辨論多疵病不審先生以爲如何子約之病乃賓主不明非界分不明也不知論集義所生則義爲主論配義與道則氣爲主一向都欲以義爲主故失之若如其言則孟子數語之中兩句已相複矣天下豈有如此絮底聖賢耶子約見得道理大段支離又且固執己見不能虚心擇善所論不同處極多不但此一義也伯豐說得極分明朋友間極不易得因來喻及此爲之感歎不能已然子約之老成質實今尤難得但恨未有道理喚得他醒耳人傑昨得伯豐書云必大向以鳶魚之說請益於紫陽尚未得報近得直卿書與鄙見合試商確之却以見教直卿書云浴沂一章終是看不出喟然而嘆夫子與㸃之意深矣集註云日用之間無非天理流行之妙曽晢有見於此故欲樂此以終身如此却是樂此天理之流行而於本文曽晢意㫖恐不相似榦竊意恐須是如此天理方流行中心斯須不和不樂則與道不相似而計較係戀之私入之矣夫子無意必固我老者安之朋友信之少者懐之政是此意直是與天地相似易曰貞吉悔亡憧憧徃來朋從爾思夫子傳之曰天下何思何慮聖人豈教人如死灰槁木曠蕩其心徜徉其志也哉張子曰湛一性之本攻取氣之欲物各付物而無一毫計較係戀之私則致廣大而極高明雖堯舜事業亦不能一毫加益於此矣後來邵康節先生全是見得此意思明道先生詩中亦多此意此是一大節目望詳以見教人傑竊謂浴沂一章集註甚分明無可疑者其説曰曾㸃之學有以見夫天理本然之全體無時而不發見於日用之間故其胸中灑落無所滯礙而動靜之際從容如此及其言志則又不過樂此以終身焉無他作爲之念也乃是曾㸃見得天理之發見故欲樂此以終身今直卿所云固是道理高處然其本意却謂須是如此天理方流行則是先有曽㸃之所樂方得天理之流行也人傑竊恐全體大用未能瞭然於心目間而欲遽求曽㸃之所樂則夫事物未接之時此心平靜胸中之樂固或有時而發見然本根不立憑虚亡實亦易至消鑠矣蓋與集註之意未免有差也伯豐所見與之相合鄙意却未敢以爲然伏乞賜教集註誠有病語中間嘗改定亦未惬意今復改數句似頗無病試更詳之直卿之說却是做工夫底事非曽㸃所以答如或知爾則何以哉之問也况論實做工夫又却只是操之而存是要的處不在如此曠蕩茫洋無収接處也甘節吉甫亦來問此事并以示之曽㸃之學蓋有以見夫人欲盡處天理渾然日用之間隨處發見故其動靜之際從容如此而其言志則又不過即其所居之位適其所履之常而天下之樂無以加焉用之而行則雖堯舜事業亦不外此不待更有所爲也但夷考其行或不揜焉故不免爲狂士然其視三子者規規於事爲之末則不可同年而語矣所以夫子嘆息而深許之答萬正淳謝氏曰義重於生則舎生取義生重於義則當舎義取生最要臨時權輕重以取中愚謂舎義取生之說未當所謂生重於義者義之所當生也義當生則生豈謂義與生相對而爲輕重哉且義而可舎則雖生無益矣如此則所謂臨時權輕重者將反變而爲計較利害之私矣尚安能取中乎此論甚當故明道先生曰義無對楊氏謂高明者中庸之體中庸者高明之用恐不可以體用言此說亦是楊氏解知者過之爲極高明而不知中庸之爲至解賢者過之爲尊德性而不及道問學恐未安極高明而道中庸尊德性而道問學是徹上下貫本末工夫皆是一貫無適而非正也如楊氏之說則上下本末可離而爲二矣大概得之更宜體味游氏引鄒衍談天公孫龍詭辨爲智者之過亦未當若佛老者知之過也談天詭辨不足以爲智者之過知者之過非一端如權謀術數之類亦是龍衍乃是誑妄又不足以及此呂云剛而寡欲故能中立而不倚夫中立不倚者湛然在中無所偏倚而義理全具者也剛而寡欲恐不足以言之引栁下惠之行爲和而不流夫下惠固聖之和矣然孟子推其有不恭之弊則與中庸所謂和而不流者亦異矣又引非其君不事非其民不使與夫獨立不懼遯世無悶者爲中立而不倚夫非其君不事非其民不使是乃清者之德豈可便謂之中立不倚哉獨立不懼遯世無悶固是有中庸之德而窮困在下者如此然專以此事解釋中立不倚之義則名義非所當矣蓋獨立不懼遯世無悶者以操行言中立而不倚以理義言也中立不倚亦只是以行言所引獨立不懼者近之不倚是無所阿附之意呂氏解索隱爲方鄉乎隱索隱行怪爲未當行而行之且舉易之隱而未見與孟子之論狂者爲證恐非本意索隱行怪乃是無德而隱而爲怪僻之行者爾意甚分明何必曲爲之說乎呂說未安侯氏以夷齊下惠爲索隱行怪恐失之太過若晨門荷簣沮溺莊列之徒乃可以當此名夷齊下惠雖未爲中庸之至然皆大賢事業恐未易以此名加之也亦是呂氏說費隱一章固多差斘然論知與能一段雖非正意却說得易知簡能確實明白有所發明此不記得無本可檢游氏說多不可曉但謂其大無外而中無不周故天下莫能載其小無間而中無不足故天下莫能破此說爲無病耳然上文本爲君子之道無徃而不中則其下中字有未當耳既曰未當便不可謂之無病程子曰我不欲人之加諸我也吾亦欲無加諸人中庸曰施諸已而不願亦勿施於人正解此兩句恐是一時問答之語當以論語解仁恕之别爲正是或問稱呂氏一本語尤詳實深可玩味未見有可玩味處謂道雖本於天而行之者在人非此章之正意忠恕不可謂之道而道非忠恕不行此所以言違道不逺其意亦恐未安觀程子降一等之說與掠下教人之說斯可見矣其論四者未能之說則曰盡人倫之至通乎神明光於四海有性焉君子不謂之命則雖聖人亦自謂未能夫以盡人倫之至而自謂未能猶可也通神明而光四海奚暇遽論及此哉今觀呂氏論四者未能之說亦有意恐未容輕議呂氏說恐亦不得此句之讀更試考之游氏引其則不逺爲盡已之忠不以道責人而以人治人取其改而止爲盡物之恕似乎其語未當楊氏說以人治人仁之也伊尹以斯道覺斯民是也恐不當其義今觀楊氏說亦有可取宛轉說來亦可通但恐不必如此説枉費言語張子謂君子之道天地不能覆載恐失之太高子思雖云天下莫能載復云天下莫能破大小兼該可也戾天躍淵亦以範圍之内言之今言天地莫能覆載則過矣亦是謝氏說致生之故其鬼神致死之故其鬼不神何也人以爲神則神人以爲不神則不神矣按夫子致生致死之說本爲明器發也以致死之爲不仁故必有是明器以致生之爲不智故爲是明器而不可用故曰神明之也謝氏之意則與此不同矣又其說主乎致生故謂人以爲神則神如此則所謂鬼神者其有無專係乎人心而已無乃似流於作用是性之失乎又曰以爲有亦不可以為無亦不可這裏有妙理又曰自家要有便有要無便無皆是此意記得論語說中似有當生者使人致生之當死者使人致死之此却有理謝氏論語說曰隂陽交而有神形氣離而有鬼知此者爲智事此者爲仁推仁智之合者可以制祀典祀典之意可者使人格之不使人致死之不可者使人逺之不使人致生之致生之故其鬼神致死之故其鬼不神則鬼神之情狀豈不昭昭乎侯氏曰消息盈虚往來神明皆是理也吉凶悔吝剛柔變化皆是物也恐難分明愚謂是數者皆物也而有理存焉又曰以隂陽言之則曰道以乾坤言之則曰易貫通乎上下則曰誠夫道非隂陽也所以一隂一陽者道也程子固言之矣繫辭止曰乾坤其易之門易之藴而謂易爲乾坤則非也且既以貫通上下爲誠矣而又曰總攝天地斡旋造化動役鬼神闔闢乾坤萬物由之以生死日月由之以晦明者誠也則是誠者乃一作用之物有似乎隂符經之云者而不可謂之貫通上下矣既以鬼神爲形而下者而非誠矣又曰誠無内外無幽明故可格而不可度射審如此說則詩當云誠之格思而不當言神之格思也凡此自相矛盾有不可曉者不審如何看得是顔雖夭而不亡者存或問以爲侯氏之說而集解繫之楊氏說後孰爲誤也似是楊氏侯氏皆有此語更考之若無即是誤也呂氏楊氏引三年之喪皆有爲妻之文按夫爲妻服齊衰杖期而左氏傳昭公十五年王太子壽卒王穆后崩晉叔向曰王一歲而有三年之喪二焉杜氏註云天子絶期惟服三年故后雖期通謂之三年喪審此則是天子之后母儀天下后之喪天子可以絶期而不服故服其喪而通謂之三年也据經文既曰三年之喪達乎天子又曰父母之喪無貴賤一也則是三年之喪有爲長子爲妻與嫡孫爲祖故别乎父母之喪也所謂達乎天子則是三年之喪亦有通乎上下者矣今律文與温公書儀皆無爲妻之文獨呂氏楊氏引叔向之說而呂氏之說有可疑者呂氏之說曰三年之喪達乎天子者三年之喪爲父爲母適孫爲祖爲長子爲妻而已天子達乎庶人一也似與經文本㫖與今律文書儀皆不同蓋經文分三年之喪與父母之喪而呂氏則合之律文書儀載夫爲妻杖期而呂氏則皆以爲三年也楊氏之說曰三年之喪爲長子爲妻與嫡孫爲祖故王太子壽卒穆后崩而叔向云云蓋天子爲子爲妻通謂之三年之喪也故曰三年之喪達乎天子父母之喪則自天子至於庶人無貴賤一也信如楊氏之說則與經之本文無戾而與叔向杜預之言皆合矣愚謂三者之喪爲長子與嫡孫爲祖三年者主當爲後者言之爲妻三年者主天子絶期而言之也蓋在大夫士庶之長子長孫有當爲後者有不當爲後者故有服三年與不服三年之别妻之喪則自大夫以下皆服期故是三年者惟天子皆服之故曰達乎天子也恐三年之喪只是指父母之喪而言下文父母之喪無貴賤一也便是解所以達乎天子之意與孟子答滕文公語亦相類游氏至貴在我至富在我至願在我生生在我之説恐非聖人意思此等皆衍説集註曰仁者心之德愛之理也其言之不一何耶蓋仁有偏言者有專言者專言者心之德也程子西銘之意是也偏言者愛之理也愛之所施則親親仁民愛物是也固是如此然心之德即愛之理非二物也但所從言之異耳所謂道者君臣父子夫婦昆弟朋友之交是也所謂德者智仁勇三者是也此聖人之所謂達道達德天下公共之理也此外更無他道後世學者惑於異端求𤣥求妙窮高極逺而不知道果在此而不在彼也孔子曰君子之道四丘未能一焉君子道者三我無能焉聖人非果不能也亦非姑爲自謙之辭也蓋欲學者知道之極致不在他求而人倫之至即斯道之所在也呂氏曰所謂道者合天地人而言之所謂仁者合天地之中而言之夫道固所以合天地人而言然方論脩身以道則不必遽及於此也孟子論仁只說仁人心也惻隱之心人皆有之則仁者人也之意自是分明今曰合天地之中所謂仁者而言則似謂一人不足以爲仁必合天下之人而後足以爲仁也是其爲言大而無當不若人皆有之等語爲明白切要而詳盡也以上二段皆當呂氏以知所以治人爲聞一以知二知所以治天下國家爲聞一以知十恐未安夫治人治天下國家猶曰安人安百姓云爾皆脩身之効也聞一知二與聞一知十自是分量不同皆窮理脩身之事豈可引爲比也此等處不必深辨楊氏曰力行則能推其所爲故近仁楊氏之意蓋指孟子彊恕仁莫近之意而謂推其所爲乃恕之事故引之以解近仁也夫推其所爲正古人所以大過人之事以其猶待乎推所以未遽可謂之仁今楊氏舉此以解力行近仁之說似不爲過而或問謂其不可曉何也如此則仁字只就愛上說了楊氏論誠身一節失之輕易其論誠則曰非自外得反求諸身而不知不明乎善則心不可得而誠論不誠則曰豈知一不誠他日舟中之人皆是爲敵國而不知所謂不誠亦儘有淺深也又引莊周鷗鳥之說而曰忘機則非其類可親則其所以說誠身者益差矣又曰反身而至於誠則利仁者不足道也夫反身而至於誠正利仁之事若安仁者則不待於反亦不待乎至於誠而自誠矣鷗鳥以下所論得之或問謂隱之見微之顯實之存亡而不可揜者也存亡字有誤否心廣體胖實之存也如見肺肝實之亡也此當時立文之本意然語誠有病當改之耳謝氏曰誠是無虧欠忠是實有之理忠近於誠正倒說著忠是無虧欠誠是實有之理蓋盡已之謂忠一有不盡是有虧欠也以其自盡者言之則謂之忠以其實有者言之則謂之誠謂忠近於誠亦非也又曰有我不能窮理人誰識眞我何者爲我理便是我其言過高而且怪理者天下之公認之爲我則驕吝亦肆矣得之章句中解致曲一段乃是程子之説然一曲之誠至於則形則著則明者是一曲之誠充擴發見而至於無所不誠故能變化否而章句與程子之説但稱一曲之誠著見光輝而所謂誠能動物止一曲之誠耶將無所不誠而能動物耶若張子以明爲餘善兼照楊氏以明爲無物不誠豈疑此而爲說也故楊氏曰曲能有誠誠在一曲也明則誠矣無物不誠也竊疑楊氏之說不爲無理此章所言正是一曲之誠然致曲者固無曲之不致也經雖不言意自可見張楊之說恐未爲得不若程子之言爲當呂氏曰學不厭所以致吾知教不倦所以廣吾愛自入德而言也亦恐未安子貢之論學不厭教不倦爲仁智正所以形容夫子之聖自是成德事豈可以入德言之乎得之楊氏曰大學一篇聖學之門戸其取道甚徑夫聖人之道自有等級由其所造之地如何耳非可以徑取也甚徑亦言其平直而無回曲耳呂氏曰誠與神交感則同心者無不應德與氣同運則同類者無不化蓋誠者德之至實神者氣之至妙誠與神以其精者言之故曰交感則同心者無不應德與氣以其統體言之故曰同運則同類者無不化呂說恐亦未可以爲至論謝氏謂帝是天之作用處自然之理恐不可以作用言如程氏謂以主宰謂之帝則善於形容者也得之楊氏曰無息者誠之體不息所以體誠也非也無妄者誠之體不息者誠之所用也得之尊德性而道問學致廣大而盡精微極高明而道中庸程子只解極高明而道中庸所謂二事中庸天理也天理固高明不極乎高明不足以道中庸豈以極乎高明者是乃中庸之道非别有高明也又曰理則極高明行之只是中庸以此而例上二句則意皆明矣然此乃兼費隱貫上下之極至者言之須得張子逐句一義一段之說其義始備其曰尊德性須是將前言往行所聞所知以參騐恐行有錯致廣大須盡精微不得鹵莽極高明須道中庸之道互相發明斯無餘藴矣今觀或問之說乃謂呂氏因張子之意須更以謝楊二說足之其義始備愚謂三子之說皆非中庸之正意謂之各是一說可也吕氏曰雖有問學不尊吾自得之性則問學失其道雖有精微之理不致廣大則精微不足以自信雖有中庸之德不極高明以行之則同汙合俗今未暇辨乎其他所謂雖有中庸之德不極高明以行之則同汙合俗則是高明中庸自是兩事不相關涉不能極乎高明則道中庸者乃同汙合俗耳豈有同汙合俗而尚可謂之中庸乎豈有同汙合俗之中庸必極高明以行之而復異乎此乃縁文立義而未究程張之指與夫此章之正意也且既以德性廣大高明皆至德問學中庸精微皆至道其言雖不能無失而其意則不害其爲兼舉全體今曰失道與同汙合俗之云則至德果如是乎又以道之在我道之全體道之上達分始中終之序而謂不先立乎此充乎此止乎此之類者其失同出一轍今不暇復辨也游楊之說皆以先後循序而言則亦恐非正意特其解經之一說爾大抵此五句之義乃是聖賢竭其兩端之教不容偏廢或偏於一則必陷於異端曲學而不足以知道學之全然而學者之病往往多欲進於德性廣大高明之域而於所謂問學精微中庸者不留意或爲之而不知盡其義極其至焉則其所謂德性廣大高明者是烏足以爲德性廣大高明哉程張之說深得乎此而呂氏之說之意則所重者在德性廣大高明所輕者在問學精微中庸則正與張子之說相反豈得爲因其意乎楊氏又以温故知新爲道問學之事敦厚崇禮爲道中庸之事亦恐失之遷就本文之意蓋謂温故者多不知新敦厚者少能崇禮與上三句相類耳若必遷就其說則温故知新亦可以爲盡精微而敦厚崇禮亦可以爲尊德性矣又曰道中庸而不極乎高明則愚不肖者之不及則是凡愚不肖皆可以道中庸乎比呂氏則甚焉者也侯氏之說尤無倫次既以禮爲道之物其名禮者既失之矣又以和而至合内外以和行使萬物各當其分謂之禮禮各有其物謂之儀則言禮又不經矣繼之曰統而言之則曰道分而言之則仁者見之謂之仁智者見之謂之智學禮者見之則謂之禮可也先後不倫輕重失當果何爲哉特其辨楊氏道非禮不止之言之失則似可取耳其他至德至道之説求仁上達之文義皆失之矣此段未安二十九章三重之說程子言之侯氏述焉程子所謂此與春秋正相合者意尤親切而侯氏所以發明者亦詳備而可觀通乎此則一章之義首尾通貫意脈接續深有餘味且又承上章夫子所言三代之禮則三重爲三王之禮所重之事亦可信矣若如章句所從呂氏之說固亦可通但意味不如程子之長且一章文意斷續如所謂上焉者指夏商下焉者指孔子則是非惟夏商之禮全不可用而孔子之善亦無所施然則夏時商輅與夫春秋之作謂之何哉若謂其不必如此說則下文繼之以故君子之道是上焉下焉皆不可用明矣章句或問考究推明其必不苟幸明辨而明告之更思侯氏舉明道堯舜事業如太虚中浮雲之說以解故曰配天一段其引據己不親切繼之曰尚可得而言也若夫至誠又非特如天如淵配天而已却是發至聖不如至誠豈有此理至聖至誠非有優劣然聖字是從外説誠字是從裏說呂氏說以中立大本以庸正大經以下恐皆未安姑辨此二句大本即中也大經即庸也經綸大經立大本即是盡此中庸之道若謂以中而立大本以庸而正大經則中與大本庸與大經皆二物也至謂大經之正親親長長貴貴尊賢又發明紛揉會同更相爲用處儘有功然而不若只論君臣父子夫婦兄弟朋友五者爲尤盡大經之義也得之楊氏曰大經天理也惇典敷教所以經綸之也大本中也建其有極所以立之也化育何也窮神而後知之也惇典敷教即是經綸大經即是天理非惇典敷教之外别有天理爲大經也建其有極固與立大本之義不同然所謂建其有極所以立大本莫却無病否以化育爲和則其失明矣自聖人人倫之至以下與侯氏之失同而又甚焉惇敷是經綸典教是大經建是立極是本侯氏誠則經綸之以下其失與呂氏言以中立大本者同蓋本文之意謂惟天下至誠者固能如此非是以誠去立之知之也知逺之近知風之自知微之顯乃承上文尚絅之意起下文不愧屋漏與慎獨之端蓋道雖無所不備而其所以不可離者實在於戒謹恐懼之際惟君子不愧屋漏是所謂知逺之近知風之自也隱微之間雖人所忽而理之善惡則顯然著見惟君子必慎其獨是所謂知微之顯也然而言戒謹恐懼之意則以知逺知風言之謹獨則止以知微言之何也蓋逺之近者以事物而言則其理未嘗不具於吾心風之自者以人倫而言則其用未嘗不本於吾心故言之也詳言微則隱在其中故言之也畧今觀章句之釋所謂著乎外者本乎内有諸内者形諸外發明三知之義固已明白若更以愚意參之則上下語脈愈益通貫精宻矣不審如何呂氏卒章之說綱目不眀誠如或問之所論者至於以天何言哉以下爲不待言動而人敬信則屬之不愧屋漏之下者非惟失其文意愈錯亂而不備矣如忘法度忘言動德之聲色之者尤過高而無實與其他慤實自得之言若相背馳不可曉矣以上皆得之答萬正淳人傑去歲嘗讀中庸妄意辨析先儒之說今春録以求教矣間在鄱陽有一朋友舉或問二十七章之說來言曰先生以德性廣大高明故與厚者爲道之大以問學精微中庸新與禮者爲道之小何也人傑始而疑之因檢章句或問研究是說忽悟其㫖蓋此章首言大哉聖人之道洋洋乎發育萬物峻極於天則道之極於至大而無外者也優優大哉禮儀三百威儀三千則道之入於至小而無間者也大小兼該本末不遺行之者其在人乎繼之以故曰苟不至德至道不凝焉誠謂道之所以極於至大至小而莫不具舉而無遺者必待至德之人以行之也夫既論其必至德然後可以行至道之意矣而其指示學者所以進於是道先生改作脩是德之工夫則又不可不詳言之於是又繼之曰故君子尊德性而道問學致廣大而盡精微極高明而道中庸温故而知新敦厚以崇禮所以示學者之於此道不可徒志其大而遺其小得其本而遺其末馳意於高逺而不求夫致知力行之實也知乎此則横渠之說與夫呂氏游楊之説皆所以發明此理而人傑前日之疑是乃見理不明妄議之也呂氏游楊有未安處或問既言之矣若楊氏又以温故知新爲道問學之事敦厚崇禮爲道中庸之事則恐不必如此說以害正意耳侯氏以禮爲道之物不知道之理果何謂也至其辨楊氏道非禮不止之言之失却似可取謹復具此以求教不知先生以爲如何此說得之但進於是道者未安答萬正淳通書謹獨章動而正曰道用而和曰德匪仁匪義匪禮匪智匪信悉邪也以太極圖配之五常配五行則道德配隂陽德隂而道陽也亦有此理今士大夫家喪服有稍從禮制者止留意於男子之服若婦人之服止是因仍時服按禮記檀弓婦人不葛帶章註云婦人重要而質不變所重然則婦人喪服衣裳相連如深衣形製而用麻爲帶約之至期除去只散其要也又云卒哭直變絰而已絰首絰也按喪服小記正義云婦人有三髽一是斬衰髽二是齊衰布髽今云變首絰是變麻爲葛也不知婦人之首絰是髽之外别有首絰如男子之首絰或髽之用麻用布者即是否若髽之用麻用布者即是絰則麻可變而爲葛若布變爲葛則反重矣乞詳以見教麻髽布髽恐是以此二物括髪而爲髻其絰則自加於髽上非一物也當暑目昏不暇檢閲可更詳之古者一世自爲一廟後世同堂異室是一室之中夫婦相配也若祫祭之位則太祖與妣皆東向昭之位次則高祖西而妣東祖西而妣東皆南向穆之位次則曽祖西而妣東禰西而妣東皆北向亦是夫婦相配今按喪有祔祭必以昭穆蓋卒哭而祔既行禮畢復迎所祔神主於几筵以終喪制至祔廟時却有當遷之祖而所祔神主自爲一世但父在母亡未可祧遷恐須别爲一處以祭其母也又按喪小記云婦祔於祖姑祖姑有三人則祔於親者恐亦是卒哭之祔若親者是妾祖姑婦却是適婦妾祖姑祭於孫止婦乃傳重入廟者豈可以混於彼乎凡喪父在父爲主母或先亡父自祔之祖母之室歲時祭之東廂父死乃隨之以入廟耳嫡婦祔於妾祖姑誠似未安然未有考則不得已且從祔於親者之文蓋捨此杜撰不得也喪小記妾祔於妾祖姑正義云妾母不世祭於孫否則妾無廟春秋考仲子之宫胡氏云孟子入惠公之廟仲子無祭享之所審如是則天子之元后諸侯之元妃雖曰無子必當配食於廟而其他或繼室或媵妾雖曰有子而即天子諸侯之位者皆當爲壇於廟而别祭之至大祫則祔於正嫡而祭所謂諸侯不再娶於禮無二嫡之說可通於天子也不審如何妾母不世祭則永無妾祖姑矣向竇文卿亦嘗問此無以答之今恐疏義之說或未可從也爲壇之說恐亦未安祔嫡而祫妾並坐尤爲未便恐於禮或容有别廟但未有考耳命士以上父子異宫是同處而各有室廬否古人宮室之制前有門中有堂後有寢凡爲屋三重而通以牆圍之謂之宫以理言之父子固當同處然所居之左右前後或是他人之居不可展拓不知又如何得同處此等事古今異宜不可得而考也宋公陳侯蔡人衞人伐鄭衞人殺州吁于濮衞人立晉三稱衞人是非不相掩也直書而義自見矣滕侯於隱公時書卒書來朝至桓公二年以後終春秋之世止稱滕子胡氏以爲因其朝威降而稱子果如是說則威公之世貶之足矣自是稱子而不侯無乃非惡惡止其身之義乎沙隨程丈此說甚精曽見之否胥命於蒲三傳荀卿及胡氏皆有取齊衞二侯之說而或者以謂二侯不由王命相推戴命爲方伯故春秋變文以譏之也愚謂若如或者之說則於文義爲順恐合經意彼春秋諸侯私相要誓誠爲可罪然其私相會聚交政中國雖曰不盟亦未見其有可取也彼所謂相命而信諭謹言而退凡交際之間有投合者大率皆然又何足以爲異而必變文深許之乎况齊僖衞宣行事載於春秋誠舉一端如紀會桃丘等事莫非傾險之習則其相命之際不知果何所命乎不要其相命之公私而概以相命爲可取愚未敢深信史記書齊衞會于徐州以相王似或者胥命之說夫人姜氏薨于夷齊人以歸恐當從左氏閔公二年之傳胡氏謂齊人歸者以其喪歸于魯也書曰以歸何以决知其以喪歸於魯乎且七月齊人以喪歸魯而十有二月其喪方至豈若是其遲遲乎凡書以歸皆爲以之而歸其國如戎伐凡伯之類滕侯自威公以後稱子祀侯自莊公以後稱伯又僖二十三年卒而書子二十七年朝而書子後又稱伯竊意當時小國朝會於大國從其爵之大小以納其貢之多少故子産爭承於平丘之會以謂鄭伯男也而使從公侯之貢呉晉黄池之會呉人將以公見晉侯子服何以謂敝邑之職貢於呉有豐於晉今將以寡君見晉敝邑將改職貢若爲子男則將半邾以屬於呉而如邾以事晉由此觀之則當時公侯之國以其職貢之不共而自貶其爵者多矣沙隨說正如此侵曹伐衛再稱晉侯先生側邊批云此正是晉文譎處恐非貶辭蓋圍宋之役二國雖不與而其從楚則一也晉文不先加兵於陳蔡鄭許而先侵曹伐衛或是當時事勢有未可者豈有楚人暴橫諸侯皆南向從楚而得一諸侯用兵以張中國之威春秋遂遽貶之乎先生側批云康節論五霸功罪之意得之今以楚人救衞爲善楚貶晉而成凡書救者未有不善之例則文公九年楚人伐鄭公子遂會晉人宋人衞人許人救鄭爲罪趙盾何也既罪趙盾何以又書救乎學春秋者固不可執定例以害大義也至於下書執曹伯畀宋人衛侯出奔復歸與元咺等事則晉侯無所逃責矣有難言者楚子䖍誘蔡侯般殺之于申利其國而誘殺之也故名胡氏謂蔡般弑君與諸侯通會盟十有三年矣楚子若以大義唱天下奉詞致討其弑父弑君之罪謀於蔡衆置君而去雖古之征暴亂者不越此矣愚謂諸侯與通會盟者楚子爲之會主也以弑君之賊會弑君之賊同惡相求非惟不能討其罪亦不敢討其罪矣今欲圖其國而殺之惡人之常態也是烏可於十有一年之後責楚子以唱大義以討般楚子未暇治也而又責其討般典刑紊矣甚善舜孔子先天者也先天而天弗違志壹之動氣也伏羲氏後天者也後天而奉天時氣壹之動志也此數語恐未安伏羲是闡三才之理舜孔子是感和氣之應其引先天後天之說固爲失之引孟子志氣之論尤失其㫖其後又言聖人之心感物而動辭意亦差皆以作用觀聖人之失也胡氏此章似無病更冝詳味但不知文成致麟果然否耳極高明而道中庸中庸雖是常行之道然其德之至則極乎高明高明猶言上達也中庸猶言下學也極高明而道中庸若如來喻即是上達而下學成何道理此處且當虚心熟玩本文之意參以章句之說便見日用工夫的確處不須容易立說也有氣稟之惡有陷溺之惡然皆當復之以爲善明道所謂有流而未逺已漸濁有出而甚逺方始濁却是說陷溺之惡陷溺之惡比比皆是氣稟之惡則如子越椒之類不常有也氣稟之性猶物之有萬殊天命之性則一也氣稟物欲之陷溺此不必論其常有不常有但當致其澄治之功耳呂氏説率性之謂道一段如禮謂差等節文與夫喪服異等儀章異制大意與修道之謂教相似呂氏意却在無所憾莫敢爭處見得率性是道也侯氏引告子生之謂性以解率性却只是說得氣質之性而所謂率性者不專主乎氣質也如曰物之自有也草木之不齊飛走之異稟然而動者動植者植天機自完豈非性乎馬之性健而健牛之性順而順犬吠盗鷄司晨不待教而知之豈非率性乎言草木飛走馬牛犬鷄之性而不及人之性仁義禮智之爲性則疎畧之甚無待於此侯氏說固疏畧然却是宗程先生說但得其言而不得其意故信口言之而爲此疏脫耳一隂一陽之謂道言天道之流行者也率性之謂道言人物之所以得乎天道者也一隂一陽之說是楊氏言仁義不足以盡道恐未安易只說立人之道曰仁與義仁義不足以盡道游楊之意大率多如此蓋爲老莊之說陷溺得深故雖親聞二先生之言而不能虚心反覆著意稱停以要其歸宿之當否所以陽離隂合到急衮處則便只是以此爲主也此爲學者深切之戒然欲論此更須精加考究不可只恃曰仁與義之言而斷以爲必然也近得龜山列子説一編讀了令人皇恐不知何故直到如此背馳也侯氏曰君子終日乾乾至无咎者戒謹所不聞也君子終日對越上帝尚何戒謹恐懼之有以聖人之誠則無待乎此也恐未安乾乾夕惕爲戒謹恐懼其說雖可旁通然乾乾夕惕乾九三之事也九三居下之上君德已著聖人之心自是如此中庸言戒謹不睹恐懼不聞乃學者之事比而同之則少差矣且其說既已如此又曰君子對越上帝尚何戒謹恐懼以聖人之誠則無待乎此其説自相背馳殆不可曉侯氏説固多疏濶然以乾乾夕惕爲聖人之事戒謹恐懼爲學者之事亦恐未然大抵戒懼惕厲之心則一而成德初學所至自不同耳張子曰禮亦有不須變者如天叙天秩之類時中者不謂此五典五禮生民日用之常君子之所力行者舉不外此常者固此理也凡事不出此五者非五者之外别有箇時中也張子之言如三代所因及所損益之類理雖一而事不同也未可遽以爲不然答萬正淳兩箇其爲氣也是言浩氣之體用未是以養爲氣主集義以下是推明氣所由生非是論以集義爲主蓋氣雖至剛大配道義然非集義則無以生之非可以行義而掩取之也如此爲文乃得抑揚之意横渠論易乾卦諸爻恐皆過論大抵易卦爻辭本只是各著本卦本爻之象明吉凶之占當如此耳非是就聖賢地位說道理也故乾六爻自天子以至於庶人自聖人以至於愚不肖筮或得之義皆有取但純陽之德剛健之至若以義類推之則爲聖人之象而其六位之高下又有似聖人之進退故文言因潛見躍飛自然之文而以聖人之迹各明其義位有高下而德無淺深也然其本意亦甚分明未嘗過爲深巧如横渠之説也且如初九則是德已成而行未著故衆人未見其德而君子之心確然已有以自信也九二則人見其庸言庸行閑邪存誠之迹又從而化之也九三則雖涉此危地而但進德脩業之不已也九四則其位愈進其危益甚而亦但知循理不恤其他也九五則以天德居天位而天下莫不仰觀之也上則過極而亢不能無悔矣若以德言則愈進愈高此當爲聖而不可知之地又豈有可悔耶今橫渠專以聖人爲説已失本經之指又逐爻爲漸進之意又非文言之義且其龍德正中不在九二而在九三九二之德博而化非進於九三則未免於非理非義之失而其取義前後相妨因繆益訛而轉不得其所矣大抵近世説經者多不虚心以求經之本意而務極意以求之本文之外幸而渺茫疑似之間畧有縫罅如可鉤索畧有形影如可執搏則遂極筆摸寫以附於經而謂經之爲說本如是也其亦誤矣此數段文義正淳所疑多得之但謂九三天下將歸益當進德脩業爲未然乾乾夕惕自是君子之常事今雖處危地而不失其常耳知至知終亦不是言脩爲先後之漸只是見德業内外之别蓋心則致誠以進德身則脩辭以居業進德者曰新居業者無倦與周公繼日待旦意雖畧相近而不相似也九四只是循理而行自無固必耳亦不爲信孚於人而後可躍也乾有兩乾是兩天也昨日行矣今日又行其實一天耳而行健不已此所爲天行健地平則不見其順必其高下層層地去此所以見地勢之坤順看易傳若自無所得縱看數家反被疑惑如伊川先生教人看易只須看王弼註胡安定王介父解今有伊川傳且只看此尤妙解書難得分曉趙岐孟子拙而不明王弼周易巧而不明格物致知正心誠意不可著些纎毫私意在其中晦菴集卷五十一欽定四庫全書晦菴集卷五十二宋朱子撰書知舊門人問答答吳
