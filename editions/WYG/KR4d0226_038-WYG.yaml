body:
  text: 答周益公前者累蒙誨諭范碑曲折考据精博論議正平而措意深逺尤非常情所及又得吕子約録記所被教墨參互開發其辨益明熹之孤陋得與聞焉幸已甚矣復何敢措一詞於其間哉然隱之於心竊有所不能無疑者盖嘗竊謂吕公之心固非晚生所能窺度然當其用事時其舉措之不合衆心者盖亦多矣而又惡忠賢之異已必力排之使不能容於朝廷而後已是則一世之正人端士莫不惡之况范歐二公或以諷議為官或以諫諍為職又安可置之而不論且論之而合於天下之公議則又豈可謂之太過也哉逮其晚節知天下之公議不可以終拂亦以老病将歸而不復有所畏忌又慮夫天下之事或終至於危亂不可如何而彼衆賢之排去者或將起而復用則其罪必歸於我而并及於吾之子孫是以寕損故怨以為收之桑榆之計盖其慮患之意雖未必盡出於至公而其補過之善天下實被其賜則與世之遂非長惡力戰天下之公議以貽患於國家者相去逺矣至若范公之心則其正大光明固無宿怨而惓惓之義實在國家故承其善意既起而樂為之用其自訟之書所謂相公有汾陽之心之德仲淹無臨淮之才之力者亦不可不謂之傾倒而無餘矣此書今不見於集中恐亦以忠宣刋去而不傳也此最為范公之盛德而他人之難者歐陽公亦識其意而特書之盖吕公前日之貶范公自為可罪而今日之起范公自為可書二者各記其實而美惡初不相掩則又可見歐公之心亦非淺之為丈夫矣今讀所賜之書而求其指要則其言若曰吕公度量渾涵心術精深所以期於成務而其用人才德兼取不為諸賢專取德望之偏故范歐諸公不足以知之又未知其諸子之賢而攻之有太過者後來范公雖為之用然其集中歸重之語亦甚平平盖特州郡之常禮而實則終身未嘗觧仇也其後歐公乃悔前言之過又知其諸子之賢故因范碑託為觧仇之語以見意而忠宣獨知其父之心是以直於碑中刋去其語雖以取怒於歐公而不憚也凡此曲折指意微密必有不茍然者顧於愚見有所未安不敢不詳布其說以求是正伏惟恕其僭易而垂聽焉夫吕公之度量心術期以濟務則誠然矣然有度量則宜有以容議論之異同有心術則宜有以辨人才之邪正欲成天下之務則必從善去惡進賢退姦然後可以有濟今皆反之而使天下之勢日入於昏亂下而至於區區西事一方之病非再起范公幾有不能定者則其前日之所為又惡在其有度量心術而能成務也哉其用人也欲才德之兼取則亦信然矣然范歐諸賢非徒有德而短於才者其於用人盖亦兼收而並取雖以孫元規滕子京之流恃才自肆不入規矩亦皆将䕶容飬以盡其能而未嘗有所廢棄則固非專用德而遺才矣而吕公所用如張李二宋姑論其才亦决非能優於二公者乃獨去此而取彼至於一時豪俊跅弛之士窮而在下者不為無人亦未聞其有以羅致而器使之也且其初觧相印而薦王隨陳堯佐以自代則未知其所取者為才也耶為德也耶是亦不足以自觧矣若謂范歐不足以知吕公之心又不料其子之賢而攻之太過也其所攻事皆有迹顯不可揜安得為過且為侍從諫諍之官為國論事乃視宰相子弟之賢否以為前却亦豈人臣之誼哉若曰范吕之仇初未嘗觧則范公既以吕公而再逐及其起任西事而超進職秩乃適在吕公三入之時若范公果有怨於吕公而不釋乃閔默受此而無一語以自明其前日之志是乃内懐憤毒不能以理自勝而但以貪得美官之故俛而受其籠絡為之驅使未知范公之心其肯為此否也若曰歐公晚悔前言之失又知其諸子之賢故因范碑以自觧則是畏其諸子之賢而欲隂為自託之計於是寕賣死友以結新交雖至以無為有愧負幽冥而不遑恤又不知歐公之心其忍為此否也况其所書但記觧仇之一事而未嘗并譽其他美則前日斥逐忠良之罪亦未免於所謂欲盖而彰者又何足以贖前言之過而媚其後人也哉若論忠宣之賢則雖亦未易輕議然觀其事業規模與文正之𢎞毅開豁終有未十分肖似處盖所謂可與立而未可與權者乃翁觧仇之事度其心未必不深恥之但不敢出之於口耳故濳於墓碑刋去此事有若避諱然者歐公以此深不平之至屢見於書疏非但墨荘所記而已况龍川志之於此又以親聞張安道之言為左驗張實吕黨尤足取信無疑也若曰范公果無此事而直為歐公所誣則為忠宣者正當沫血飲泣貽書歐公具道其所以然者以白其父之心迹而俟歐公之命以為進退若終不合則引義告絶而更以屬人或姑無刻石而待後世之君子以定其論其亦可也乃不出此而直於成文之中刋去數語不知此為何等舉措若非實諱此事故隱忍寢默而不敢誦言則曷為其不為彼之明白而直為此黯闇耶今不信范公出處文辭之實歐公丁寧反復之論而但取於忠宣進退無據之所為以為有無之决則區區於此誠有不能識者若摭實而言之但曰吕公前日未免蔽賢之罪而其後日誠有補過之功范歐二公之心則其終始本末如青天白日無纖毫之可議若范公所謂生平無怨惡於一人者尤足以見其心量之廣大髙明可為百世之師表至於忠宣則所見雖狹然亦不害其為守正則不費詞說而名正言順無復可疑矣不審尊意以為如何狂瞽之言或未中理得賜鐫曉千萬幸甚後書誨諭又以昭録不書觧仇之語而斷其無有則熹以為吕公拜罷范公進退既直書其歳月則二公前憾之釋然不待言而喻矣不然則昭録書成歐公固已不為史官而正獻忠宣又皆已為時用范固不以墓碑全文上史氏而吕氏之意亦恐其有所未快於歐公之言也是以姑欲置而不言以泯其迹而不知後世之公論有不可誣者是以啟今日之紛紛耳如又不然則范公此舉雖其賢子尚不能識彼為史者知之必求能如歐公之深或者過為隱避亦不足怪恐亦未可以此而定其有無也墨莊之録出於張邦基者不知其何人其所記歐公四事以為得之公孫當世而子約以為紹興舍人所記此固未知其孰是但味其語意實有後人道不到處疑或有自來耳若談叢之書則其記事固有得於一時傳聞之誤者然而此病在古雖遷固之博近世則溫公之誠皆所不免况於後世雖頗及見前輩然其平生蹤跡多在田野則其見聞之間不能盡得事實宜必有之恐亦未可以此便謂非其所著也丹朱之云誠為太過然歐公此言嘗為令狐父子文字繁簡而發初亦無大美惡但似一時語勢之適然不暇擇其擬倫之輕重耳故此言者雖未敢必其為公之言而亦未可定其非公之言也此等數條不足深論然偶因餘誨之及而并講之使得皆蒙裁正則亦不為無小補者唯是所與子約書中疑學道三十年為後學之言者則熹深惑焉而尤以為不可以不辨不審明公何所惡於斯言而疑之也以道為髙逺𤣥妙而不可學邪則道之之名正以人生日用當然之理猶四海九州百千萬人當行之路爾非若老佛之所謂道者空虚寂滅而無與於人也以道為迂逺疎濶而不必學耶則道之在天下君臣父子之間起居動息之際皆有一定之明法不可頃刻而暫廢故聖賢有作立言垂訓以著明之巨細精粗無所不備而讀其書者必當講明究索以存諸心行諸身而見諸事業然後可以盡人之職而立乎天地之間不但玩其文詞以為綴緝纂組之工而已也故子游誦夫子之言曰君子學道則愛人小人學道則易使而夫子是之則學道云者豈近世後學之言哉若謂歐公未嘗學此而不當以此自名耶則歐公之學雖於道體猶有欠闕然其用力於文字之間而泝其波流以求聖賢之意則於易於詩於周禮於春秋皆嘗反復窮究以訂先儒之繆而本論之篇推明性善之說以為息邪距詖之本其賢扵當世之號為宗工巨儒而不免於祖尚浮虛信惑妖妄者又逺甚其於史記善善惡惡如唐六臣傳之屬又能深究國家所以廢興存亡之幾而為天下後世深切著明之永鑒者固非一端其它文說雖或出於遊戲翰墨之餘然亦隨事多所發明而詞氣藹然寛平深厚精切的當真韓公所謂仁義之人者恐亦未可謂其全不學道而直以燕許楊劉之等期之也若謂雖嘗學之而不當自命以取髙標揭已之嫌耶則為士而自言其學道猶為農而自言其服田為賈而自言其通貨亦非所以為夸若韓公者至乃自謂已之道乃夫子孟軻楊雄所傳之道則其言之不譲益甚矣又可指為後生之語而疑之耶凡此又皆熹之所未諭者盖嘗反復思之而竟不得其說恭惟明公以事業文章而論世尚友其於范歐之間固已異世而同轍矣至於博觀今昔攷訂是非又非肯妄下雌黄者且於六一之文收拾編彚讐正流通用力為多其於此事必不草草况又當此正道湮微異言充塞之際餘論所及小有左右則其輕重厚薄便有所分竊計念之已熟而處之亦已精矣顧熹之愚獨有未能無疑者是以不敢默默而不以求正於有道所恨偽學習氣已深不自覺其言之狂妄伏惟髙明恕而教之則熹不勝千萬幸甚與留丞相别紙伏蒙别紙垂諭楊至曲折不勝皇恐熹前此本以異議得罪於丞相幸蒙矜察今又失於周防有此疎脱意必已重得罪而遂見絶矣不謂丞相采聽不遺洞見底藴至於誨諭之詳雖使熹自為辯數不過如此幸甚然聞州縣奉行之間不無觀望囚繫箠撻横及無辜程督之嚴至今未觧逺近傳聞過有疑論此殆未知丞相與其外家自有契分而仁心曠度本不忍使其狼狽至此也熹既蒙鐫誨感懼之深尚恐未有以此聞於鈞聽者輙復禀白伏惟照察千萬幸甚與留丞相前此蒙喻楊至秀才事率易報禀似聞已荷寛慈許以容恕足見大人之度至公無我有如此者不勝敬服然聞有司尚以前日符移之峻追捕未已其人至今竄伏無所容寄有足矜者如蒙推念更得一言明喻所屬罷其捕逮仍俾互相闗白使知盛德雅量不讐匹夫之意則此人終受賜矣熹辱知素厚不敢復避嫌疑而冐昩及此并冀容察皇恐死􅖄答留丞相李通判歸出示所賜手教拜領伏讀慰幸已深至於垂喻諄複勤懇則又竊仰德盛禮恭樂取諸人不難舍已之意盖有一介布衣之士所不易者歎慕感激所得多矣前此偶因垂問率易呈獻亦以姑備燕申餘暇遮眼止睡之須不謂乃蒙親賜點閱日有程課以及終篇而斟酌取予詳審精切又有專門名家所不逮者此周公執贄還䞇之心畢公克勤小物之意此所以為聖賢之盛節而非近世諸公所及也熹雖凡陋然其用力於此不為不久而歴選平生講磨論說其得此於人盖鮮不意臨老乃有遇於明公也更有它書欲遂傾囷倒廩以跪進於几下而私居乏人艱於繕寫少假歳月當遂此心儻得一一悉蒙印證則亦足以自信而無憾於方來矣顧所不能無恨者猶以登門之晚而其質疑請益乃有十年之遲伏想明公於此亦不能不慨然其間也謹因李倅還便奏記叙謝目昏不得謹好尤以皇懼并乞矜察與曾裘父求仁之方竊意潛心久矣方恨未獲躬扣昨欽夫寄示送行序文其説似皆的當不審髙明以為如何與曾裘父向聞垂意魯論聖門親切指要正在此書想所造日以深矣恨未得聞一二也敬夫得書否比來講論尤精密亦嘗相與講所疑否元履遇合非常未知所以稱塞士友盖多榮之而熹竊有懼焉想髙懐正如此當有以警䇿之也與曾裘父敬夫為元履作齋銘嘗見之否謾納一本其言雖約然大學始終之義具焉恐可寘左右也崇安二公祠記熹所妄作輙徃求教雖不及改尚警其後也答黄叔張維之示及三書感感誠立誠通之論誠如尊喻不敢多遜竊意自有此書無人與之思索至此西銘太極諸說亦皆積數十年之功無一字出私意釋氏以胸襟流出為極則以今觀之天地之間自有一定不易之理要當見得不假毫髪意思安排不著毫髮意見夾雜自然先聖後聖如合符節方是究竟處也答耿直之秉熹生長窮僻少日所聞於師友者不過修身窮理守正俟命之說雖行之不力有愧夙心亦未嘗敢舍之而從人也頃歳入浙從士大夫逰數月之間凡所聞者無非枉尺直尋茍容偷合之論心竊駭之而獨於執事者見其綜理名實直道而行卓然非當世之士也顧雖未及一見而職事之間適相首尾乃有不約而合者於是始復益信前日心期之不偶然也兹者又承示及所與學官弟子講論之說不惟有以見賢侯在泮弦歌之盛而潛心大業體用圓融之妙所以警發昩陋者又為深切三復欣幸不知所言然頃扵此書粗嘗討究亦見前輩之說有如此者因以文義求之竊疑聖言簡直未遽有此曲折而孔顏之所以為聖賢必有超然無一毫意必固我之私者以為之本然後有以應事物之變而無窮以是止據舊說不復致疑今睹來示雖若不異於前人而其規模之大體用之全則非彼所到而熹之愚亦未及也更俟從容反復玩味别以求教它所論著亦有欲就正者私居乏人抄寫後便寄呈也去歳救荒後時狼狽殊甚不謂其人乃復見恕如此來喻所及令人恐懼不自安耳答薛士龍季宣熹竊伏窮山講服盛名之日久矣去年邂逅林擇之歸自宣城又能道餘論一二皆成已成物之大致區區益願承教於前顧以憂患之餘屏跡田里而執事名問方昭德業方起隱顯異趣私竊揣料未容遽遂鄙懐則亦悵然太息而已兹者林擴之之來乃知榮膺睿眷出試輔藩宣布之初譽處休洽深以為慰又蒙不鄙逺貽書翰所以教告甚悉擴之又以所聞相與推說皆平生所深欲聞者感幸之至不容於心然而三復來教則有熹愚不敢當者二焉請陳其說而左右者察之熹自少愚鈍事事不能及人顧嘗側聞先生君子之餘教粗知有志於學而求之不得其術盖舍近求逺處下窺髙馳心空妙之域者二十餘年比乃困而自悔始復退而求之於句讀文義之間謹之於視聽言動之際而亦未有聞也方将與同志一二友朋并心合力以從事於其間庻幾銖積絲累分寸躋攀以幸其粗知理義之實不為小人之歸而歳月侵尋齒髮遽如許矣懔然大懼日力之不足思得求助於當世有道之君子以速其進而未得也執事乃不知此而反以講道教人之事期之此熹之所以不敢當者一也至於聖賢出處之義則亦略聞之矣顧以材智淺劣自知甚明而又學無所成不堪酬酢故自十數年來日益摧縮不敢復有當世之念雖昨來奉親之日急於甘㫖之奉猶不敢自彊其所不足以犯世患矧今孤露餘生形神彫䘮懶廢無用益甚於前誠不忍復為彯纓結綬之計以重不孝之罪是以杜門空山甘忍窮寂以遂區區之志而庻幾或寡過焉執事又不知此而反以行道濟時之事責之此熹所以不敢當者二也感服至意無以為謝敢布腹心伏惟加憐察焉繼此儻未斥絶尚冀有以警誨之使不迷於入德之塗則執事之賜厚矣它非所敢望也湖學之盛甲於東南而其湮廢亦已久矣盖自熈寧設置教官之後學者不復得自擇師是以學校之正名存實亡而人才之出不復如當日之盛今得賢太守身為之師其必将有變矣然竊嘗讀安定之書考其所學盖不出乎章句誦說之間以近歳學者髙明自得之論校之其卑甚矣然以古凖今則其虛實淳漓輕重厚薄之效其不相逮至逺是以嘗竊疑之敢因垂問之及而請質焉因風見教及此幸甚又聞慶厯間嘗取湖學規制行之太學不知當時所取果何事也求諸故府必尚有可攷者得令書吏録以見賜則又幸甚相望之逺無由造前請益所欲言者何啻萬端遥想郡齋之間伏紙不審引領答薛士龍熹屏居窮陋幸無它苦而渉春以來親友䘮亡弔問奔走不得少安殊無好况此外無足言者誨諭諄複仰荷不鄙之意然無可不可之教則非初學所敢自期而待禮而應者元非衰陋所敢萌意也區區之懐前言盖已盡之矣萬一諸公終不察則不過恭俟嚴譴而已無它說也蒙愛念之深而其間頗有未相悉者故敢及之然不足為外人道也垂諭湖學本末不勝感歎而所論胡公之學盖得扵古之所謂洒掃應對進退者尤為的當警發深矣竊意髙明所以成已成物之要未嘗不在於此而廣大精㣲之藴其所超然而獨得者又非言之所能諭也跧伏之蹤末由承教於前徒切歎仰儻不棄外時得惠音以鞭䇿之實為萬幸而來教之云倒置已甚讀之愧汗踧踖不知所以自容萬望矜察自此書來存訪死生之外削去虚文直以道義啟告誘掖此真區區所望於門下者鄙懐倥倥亦得無所慚憚而悉布之以求藥石之誨不審尊意能容而聽之否答林謙之光朝兹承祗召還朝不獲為問以候行李伏奉黄亭所賜教帖恭審執御在行神相起居萬福感慰之至比日伏想已遂對揚從容啟沃必有以發明道學之要切中當世之病者恨未得聞至於不次之除非常之數則不足為執事道也熹愚不適時自量甚審所願不過力田養親以求寡過而已所謂趨赴事功自當世賢人君子事豈熹所敢議哉過蒙諄譬荷愛之深書尾丁寧尤為切至屬數日前己申祠官之請聞命不早雖欲奉教而不可得矣抑熹久欲有請於門下而未敢以進今輙因執事之問而一言之盖熹聞之自昔聖賢教人之法莫不使之以孝弟忠信荘敬持養為下學之本而後博觀衆理近思密察因踐履之實以致其知其發端啓要又皆簡易明白初若無難觧者而及其至也則有學者終身思勉而不能至焉盖非思慮揣度之難而躬行默契之不易故曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也夫聖門之學所以從容積累涵養成就隨其淺深無非實學者其以此與今之學者則不然盖未明一理而已傲然自處以上智生知之流視聖賢平日指示學者入德之門至親切處例以為鈍根小子之學無足留意其平居道說無非子貢所謂不可得而聞者徃徃務為險怪懸絶之言以相髙甚者至於周行却立瞬目揚眉内以自欺外以惑衆此風肆行日以益甚使聖賢至誠善誘之教反為荒幻險薄之資仁義充塞甚可懼也熹緜力薄材學無所至徒抱憂歎末如之何竊獨以為非如執事之賢素為後學所觀仰者不能有以正而捄之故敢以為請執事誠有意焉則熹雖不敏且将勉䇿駑頓以佐下風之萬一不識執事亦許之否乎謹此布聞因謝先辱餘惟為道自重以慰後學之望上狀不宣答江元適泳孤陋晚生屏居深僻未嘗得親几杖之遊乃蒙不鄙使賢子遺之手書致發明道要之文三編加賜親札存問繾綣反若後進之禮於先進熹愚不肖不知所以得此於門下者拜受踧踖若無所容退而伏讀以思至扵三四雖昏懵無聞未獲直闚所至之堂奥然竊有以識夫所謂求仁之端者而知其玩心髙明深造自得非世儒之習也幸甚幸甚熹天資魯鈍自㓜記問言語不能及人以先君子之餘誨頗知有意於為已之學而未得其處盖出入於釋老者十餘年近歳以來獲親有道始知所向之大方竟以才質不敏知識未離乎章句之間雖時若有㑹扵心然反而求之殊未有以自信其所以奉親事長居室延交者盖欲寡其過而未能也日者誤蒙收召草野之臣其義不敢固辭造朝之際無以待問輙以所聞於師友者一二陳之豈胸中誠有是道以進之吾君哉特欲發其大端冀萬一有助焉耳不謂流傳復誤長者之聽伏讀誨諭慚負不知所言然厚意不可虛辱敢因所示文編其間有不能無疑者略抒其愚以請於左右伏惟幸復垂教焉無極齋記發明義理之本原正名統實於毫釐幾忽之際非見之明玩之熟詎能及此然其間有曰易姑象其機詩書禮樂姑陳其用熹竊謂姑者且然而非實之辭也夫易之象其機詩書禮樂之陳其用皆其實然而不可易者豈且然而非實之云乎又有曰髣髴曰強名曰假状凡此皆近乎老莊溟滓鴻蒙之說以六經語孟攷之凡聖人之言皆慤實而精明平易而精奥似或不如是也又有曰禮樂政事典謨訓誥皆斯齋之土苴耳土苴之言亦出於荘周識者固已議之今祖其言以為是說則是道有精粗内外之隔此恐未安又曰老兮釋兮付之大鈞範質之初語意隠奥亦所未喻又曰西伯不識不知仲尼毋意毋我兹盖乾坤毀無以見易易不可見乾坤或幾乎息矣熹竊謂詩人之稱文王雖曰不識不知然必繼之曰順帝之則孔門之稱夫子雖曰毋意毋我然後之得其傳者語之必曰絶四之外必有事焉盖體用相循無所偏滯理固然也且大傳所謂易不可見則乾坤息者乃所以明乾坤即易易即乾坤乾坤無時而毀則易無時而息爾恐非如所引終篇之意乃類於老氏復歸於無物之云也若夫中庸之終所謂無聲無臭乃本於上天之載而言則聲臭雖無而上天之載自顯非若今之所云并與乾坤而無之也此恐於道體有害自所謂求仁之端者推之則可見矣士箴本末該備説天人貫通其於指示仁體極其親切三要書推天理而見諸人事其曰體不立而徒恃勇斷以有為一旦智窮力屈善後之謀索矣可謂切中今日之病又曰體中心之誠實者逹於禮樂刑政之間而加之四方萬里之逺可謂善補衮職之闕皆非淺陋所及也然熹竊嘗聞之聖人之學所以異於老釋之徒者以其精粗隠顯體用渾然莫非大中至正之矩而無偏倚過不及之差是以君子智雖極乎髙明而見於言行者未嘗不道乎中庸非故使之然髙明中庸實無異體故也故曰道之不行也智者過之愚者不及也道之不明也賢者過之不肖者不及也又曰差之毫釐謬以千里聖人丁寧之意亦可見矣凡此謬妄之言皆不知其中否正欲求教於左右以啓其未悟故率意言之無復忌憚盖以為不如是不足以來警切之誨爾因來不吝垂教實所幸願而非敢望也答江元適别紙所喻汪洋博大不可涯涘然竊以平生所聞於師友者驗之雖其大致規模不能有異至其所以語夫進修節序之緩急先後者則或不同矣盖熹之所聞以為天下之物無一物不具夫理是以聖門之學下學之序始於格物以致其知不離乎日用事物之間别其是非審其可否由是精義入神以致其用其間曲折纖悉各有次序而一以貫通無分叚無時節無方所以為精也而不離乎粗以為末也而不離乎本必也優㳺濳玩饜飫而自得之然後為至固不可自畫而緩亦不可以欲速而急譬如草木自萌芽生長以至於枝葉華實不待其日至之時而揠焉以助之長豈不無益而反害之哉凡此與來教所謂傷時痛俗急於自反且欲㑹通其指要以為駐足之地者其本末指意似若不同故前後反復之言率多違異今姑論其大槩以為求教之目其它曲折則非得面承不能究也精義二字聞諸長者所謂義者宜而已矣物之有宜有不宜事之有可有不可吾心處之知其各有定分而不可易所謂義也精義者精諸此而已矣所謂精云者猶曰察之云爾精之之至而入於神則於事物所宜毫釐委曲之間無所不悉有不可容言之妙矣此所以致用而用無不利也來教之云似於名言之間小有可疑雖非大指所繋然此乃學者發端下手處恐不可略故復陳之不審髙明以為如何答江元適熹嘗謂天命之性流行發用見於日用之間無一息之不然無一物之不體其大端全體即所謂仁而於其間事事物物莫不各有自然之分如方維上下定位不易毫釐之間不可差謬即所謂義立人之道不過二者而二者則初未嘗相離也是以學者求仁精義亦未嘗不相為用其求仁也克去己私以復天理初不外乎日用之間其精義也辨是非别可否亦不離乎一念之際盖無適而非天理人心體用之實未可以差殊觀也孟子告齊王曰權然後知輕重度然後知長短物皆然心為甚王請度之嗚呼此求仁之方也而精義之本在焉孟子其可謂知言之要矣今執事以反身自認存真合體者自名其學信有意於求仁矣而必以精義之云為語道之精體而無與乎學者之用力又以辨是非别可否為空言不充實用而有害乎簡易之理則熹恐其未得為至當之論也盖曰道之精體則義不足以名之以義強名則義之為名又無所當此盖原於不知義之所以為義是以既失其名因昩其實於是乎有空言實用之說此正告子義外之蔽也一不知義則夫所謂仁者亦豈能盡得其全體大用之實哉近世為精義之説莫詳於正蒙之書而五峰胡先生者名宏字仁仲亦曰居敬所以精義也此言尤精切簡當深可玩味恐執事未以為然則試直以文義攷之精義入神正與利用安身為對其曰精此義而入於神猶曰利其用而安其身耳揚子所謂精而精之用字正與此同乃學者用功之地也若謂精義二字只是道體則其下復有入神二字豈道體之上又有所謂神者而自道以入神乎以此言之斷可决矣抑所謂反身自認存真合體者以孔子克已復禮孟子勿忘勿助之說驗之則亦未免失之急迫而反與道為二大抵天人初無間隔而人以私意自為障礙故孔孟教人使之克盡己私即天理不期復而自復惟日用之間所以用力循循有序不凌不躐則至於日至之時廓然貫通天人之際不待認而合矣今於古人所以下學之序則以為近於傀儡而鄙厭之遂欲由徑而㨗出以為簡易反謂孔孟未嘗有分明指訣殊不知認而後合揠苗助長其不簡易而為傀儡亦已大矣熹竊以為日用之間無一事一物不是天真本體孔孟之言無一字一句不是分明指訣故孔子曰吾無隠乎爾又曰天何言哉而子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也夫豈平日雅言常行之外而復有所謂分明指訣者哉此外牴牾尚多然其大槩節目具於是矣以執事教誨不倦念未有承晤之期不敢久虛大賜是以冐昩罄竭其愚伏惟恕其狂妄少賜覽觀還以一言示及可否虛心以竢如有所疑不敢不以復也答詹體仁儀之湘中學者之病誠如來教然今時學者大抵亦多如此其言而不行者固失之又有一二只說踐履而不務窮理亦非小病欽夫徃時盖謂救此一種人故其說有太快處以啓流傳之弊今日正頼髙明有以救之也為學是分内事纔見髙自標致便為不務實了更說甚的今日正當反躬下學讀書則以謹訓說為先脩身則以循規矩為要除却許多懸空閑說庻㡬平穩耳不審尊意以為如何答楊廷秀萬里程弟轉示所惠書教如奉談笑仰見放懐事外不以塵垢粃糠累其胸次之超然者三復歎羡不能巳巳數日偶苦脾疾心腹撓悶意緒無聊值此便風不敢不附報自力布此僅能問何如他皆未暇及也時論紛紛未有底止契丈清德雅望朝野屬心切冀眠食之間以時自重更能不以樂天知命之樂而忘與人同憂之憂毋過於優游毋决於遁思則區區者猶有望於斯世也答李季章璧兩書縷縷皆有飄然逺引之意不審果以何日决此計耶熹懇祠得請深荷上恩既還舊官無復可辭之誼孤危之跡雖未可保然姑無愧於吾心可也承問及先人紹興中文字遺藁中劄子第三篇疑即此奏豫章所刋集中有之今以納呈已加籖貼於其上矣筆削之際儻得附見十萬幸甚諸公争和議時先人與胡德輝范伯逹諸公同入文字皆史院同寮也當時此一宗議論不知有無登載魏元履所集戊午儻議一書甚詳亦嘗見之否耶如館中未有得行下建寧抄録上送亦一事也慶逺計程已到零陵久矣又聞其自處泰然亦不易也但未知便得一向安坐否耳前年與陳君舉商量拈出孝宗入繼大統一事當時議臣如婁寅亮趙張二相岳侯范伯逹陳魯公皆未有褒録恐可更詢訪當時曾有議論之人并與拈出也答李季章昨承喻及先君奏疏已蒙筆削得附史氏篇末幸甚痛念先君早歳讀書即為陸賈之學遭時艱難深願有以自見而不幸不試所得陳於當世者止此而已今乃得託史筆以垂不朽豈不幸甚但恐賢者去國之後或為不肖之孤所累因見刋削未可知耳又聞黄文叔頃年嘗作地理木圖以獻其家必有元様欲煩為尋訪刻得一枚見寄或恐太大難於寄逺即依謝荘方丈木圖以兩三路為一圖而傍設牝牡使其犬牙相入明刻表識以相離合則不過一大掩可貯矣切幸留念河西為一陜西為一河東河北燕雲為一京東西為一淮南為一兩浙江東西為一湖南北為一西川為一二廣福建為一大略如此更詳濶狹裁之相合處須令脗合不留縫罅乃佳答李季章熹罪戾之蹤竟不免吏議然已晚矣又幸寛恩未即流竄杜門念咎足以遣日不足為故人道也累年欲修儀禮一書釐析章句而附以傳記近方了得十許篇似頗可觀其餘度亦歳前可了若得前此别無魔障即自此之後便可塊然兀坐以畢餘生不復有世間念矣元來典禮淆訛處古人都已說了只是其書衮作一片不成叚落使人難看故人不曾看便為憸人舞文㺯法迷國誤朝若梳洗得此書頭面出來令人易看則此輩無所匿其姦矣於世亦非小助也勿廣此說恐召坑焚之禍荆公奏草不記曾附去否今徃一通可見當日規摹亦不草草也禹迹圖云是用長安舊本翻刻然東南諸水例皆疎略頃年又見一蜀士說蜀中嘉州以西諸水亦多不合今其顯然者如蜀江至瀘州東南乃分𣲖南流東折逕二廣自畨禺以入海以理勢度之豈應有此必是兩水南北分流而摹刻者誤連合之遂使其北入江者反為逆流耳然栁子厚詩亦言䍧牱南下水如湯則二廣之水源計必距蜀江不逺但不知的自何州而分為南北耳又自瀘以南諸州今皆不聞必已廢併幸為詢究一一見喻其圖今徃一紙可為勾抹貼說却垂示也答李季章熹今歳益衰足弱不能自隨兩脅氣痛攻注下體結聚成塊皆前所未有精神筋力大非前日之比加以親舊凋零如蔡季通吕子約皆死貶所令人痛心益無生意决不能復支久矣所以未免惜此餘日正為所編禮傳已略見端緒而未能卒就若更得年餘間未死且與了却亦可以瞑目矣其書大要以儀禮為本分章附疏而以小戴諸義各綴其後其見於它篇或它書可相發明者或附於經或附於義又其外如弟子職保傅傳之屬又自别為篇以附其類其目有家禮有鄉禮有學禮有邦國禮有王朝禮有䘮禮有祭禮有大傳有外傳今其大體已具者盖十七八矣因讀此書乃知漢儒之學有補於世教者不小如國君承祖父之重在經雖無明文而康成與其門人答問盖已及之具於賈疏其義甚備若已預知後世當有此事者今吾黨亦未之講而憸佞之徒又餙邪説以蔽害之甚可歎也喻及仁里士人有志於學而能不事科舉者近亦似曾聞說但不知其姓名此殊不易得幸因風略報及也舊來諸經說三四年來幸免煨燼今亦恐未可保然間因講說時有更定欲寄一本去恐可與西州同志者共之而未暇也留衛公得詩說日閱數版手加點抹書來頗極稱賞仍盡能提其綱亦甚不易老年精力乃能及此又不厭章句訓詁之煩也要是天姿深静純實故能若此亦恨其聞此之晚不得早效區區之愚耳德脩文叔家居亦何所務各有一書煩為致之子直亦然也今年閩中鄭黄鄧皆物故氣象極覺蕭索揚子直得祠又遭駁項平父聞亦杜門不敢見人其它吾人徃徃藏頭縮頸不敢吐氣甚可笑也熹明年七十已草告老之章只從本貫依庻官例陳乞亦不欲作廟堂書劄而或者尚恐觸犯禍機顧念禮律自有明文而罪戾之餘尚忝階官亦無不許致仕之法並已决意為之不復顧慮政使不免亦所甘心盖比之一時輩流已獨為優幸矣尚欲低囘貪戀㣲禄以負平生之懐復何為哉前此附書似是因李普州便書中欲煩借黄文叔家地里木圖為製一枚不知逹否此近已自用膠泥起草似亦可觀若更得黄圖參照尤佳但恐此書或已浮沉不曾製得即亦不必為矣禮殿圖舊亦有之但今所寄摹畫精好想正得古本筆意也三五之目不可考古事類此者多矣今日豈能必其是非也邪但既有是名號則必有是人易大傳但舉其制作之盛者而言耳如漢人但言髙祖孝文豈可便謂其間無惠帝耶洮研發墨鋒鋩可畏此所難得足為佳玩矣答李季章熹伏承不鄙貺以先正文簡公詩編行實并及三夫人二壙刻文跽領伏讀足慰平生髙山仰止之心而反復再三又見其立德立言明白磊落所以開發蒙吝有不一而足者幸甚幸甚至於不察熹之愚陋而将使之纂次其事刻之幽宫以視來世則熹之不德不文人知其不足以勝此寄矣顧念平生未嘗得拜文簡公之函丈而讀其書仰其人則為日盖已久又嘗聽於下風而知公之所以相知亦有不待見其面目而得其心者是以願自附焉而不敢辭也唯是今者方以罪戾書名偽籍平居杜門屏氣齰舌不敢輙出一語以干時禁而凛凛度日猶懼不免乃於此時忽爾破戒政使不自愛惜亦豈不為公家之累是以彷徨顧慮欲作復止而卒未有以副來命之勤也伏惟執事姑少察此而深計之竊意髙文大筆取之今世不為無人固不必眷眷於一無狀罪廢之人而使盛德百世之傳不得以時定也熹區區鄙意前幅具之詳矣始者亦嘗深念欲便草定而託以前日所為既而思之又似不誠而不可為也又念劉孫所定本出賢昆仲之手者自足傳信後世但循例必欲更經一手刪節則雖在今日隂竊為之亦是不害只是目下未可使人知有此作将來草定亦不可使人知有此書此則難遮䕶耳來使本欲留以少俟渠亦以丁寧之切不來相逼但覺此終是未敢落筆不如且遣之還俟一面更将所示者子細繙閱隨記所當增損處密託人送令弟處又恐經由都下不便不若且少忍之若未即死固當有以奉報或使溘先朝露亦當以付兒輩令轉奉聞也平生多做了閑文字不能無愧詞今此好題目可惜不做但又適當此時令人鬱鬱耳續通典見詩中及之恐有印本求一部長編改定本只寫改處不知有多少册得為致之為幸或云建炎紹興事亦已成書不知然否尤所欲得但恐字多難寫耳頃見靖康間事楊龜山多有章疏不曾編入不知後來曾補否盖汪丈所刻本不曾載福州成都二本皆然其奏議後來南劍一本却有之恐亦不可不補也答范文叔大學之序固以致知為先而程子發明未有致知而不在敬者尤見用力本領親切處今讀來喻知於主一盖嘗用功則致知之學宜無難矣而尚欲更求其説何耶熹舊讀大學之書嘗為之說每以淺陋有所未安近加訂正似稍明白親知有取以鋟木者今内一通幸試攷之或有未當却望誨喻然切告勿以示人益重不韙之罪也答范文叔讀書不覺有疑此無足怪盖徃年經無定說諸先生所發或不同故讀書不能無疑比年以來衆說盡出講者亦多自是無所致疑但要反復玩味認得聖賢本意道義實體不外此心便自有受用處耳尹和靖門人贊其師曰丕哉聖謨六經之編耳順心得如誦己言要當至此地位始是讀書人耳子約之去私計良便象先相從所論云何去歳相見不欵未得盡所欲言至今為恨耳講義反復詳明深得勸誦之體特寄此章豈亦有感於時論耶大學近閱舊編復改數處今徃一通試以舊本參之當見鄙意也答范文叔春風堂記久已奉諾安敢忘之但近覺孤危之迹為當世所憤疾日以益甚遂絶口不敢為人出一語非獨畏禍亦義理之當然也兼亦覺得此等空言無益扵實僅同戲劇區區裝點是亦徒為玩物䘮志而已若論為已切實功夫豈此等所能助而為仁由已亦何待它人之助耶况明道先生氣象如此乃是不違仁之影子今於影外旁觀而玩其形似孰若深察其心之所到而身詣之之為實耶竊謂為仁之要固不出乎聖賢之言若子夏所謂博學篤志切問近思夫子所謂克已復禮所謂恭敬忠恕可以備見其用力之始終矣幸深味乎此而實加功焉則為有以慰區區之望固不在於言語文字之間而已也答陳君舉熹自頃寓書之後南來擾擾未能嗣音至於懐仰德義則無日而不勤也乃蒙不忘專人枉教此意厚矣何感如之垂諭詩說向見二君能道梗槩大指略同意其必有成編故以為請今承語及乃知爾雅蟲魚决非磊落人之所宜注也唐突負愧如何可言誨示之勤尤荷不鄙然嘗謂人之為學若從平實地上循序加功則其目前雖未見日計之益而積累功夫漸見端緒自然不假用意裝點不待用力支撑而聖賢之心義理之實必皆有以見其確然而不可易者至於講論之際心即是口口即是心豈容别生計較依違遷就以為諧俗自便之計耶今人為學既已過髙而傷巧是以其說常至於依違遷就而無所分别盖其胸中未能無纎芥之疑有以致然非獨以避咎之故而後詭於詞也若熹之愚自信已篤向來之辯雖至扵遭讒取辱然至于今日私心耿耿猶恨其言之未盡不足以暢彼此之懐合異同之趣而不敢以為悔也不識高明何以教之惟盡言無隱使得反復其說千萬幸甚老病幽憂死亡無日念此一大事非一人私說一朝淺計而終無面寫之期是以冐致愚悃鄉風引領不勝馳情答陳君舉前書所扣未蒙開示然愚悃之未能盡發於言者亦多每恨無由得遂傾倒以求鐫切近曹器之來訪乃得為道曲折計其復趨函丈必以布露敢丐髙明少垂采擇其未然者痛掊撃之庶有以得其真是之歸上不失列聖傳授之統下使天下之為道術者得定于一非細事也惟執事圖之與陳君舉先人自少豪爽出語驚人踰冠中第更折節讀書慕為賈誼陸贄之學久之又從龜山楊氏門人問道授業踐修愈篤紹興初以館職郎曹與修神宗正史哲徽兩朝實録而於哲録用力為多其辨明誣謗刋正乖戾之功具見褒詔後以上疏詆講和之失忤秦相去國補郡不起奉祠以終與陳君舉先人贈告必已蒙落筆母妻二告如亦合命詞則前日失於具禀今再有懇先妣德性純厚事姑極孝敬祖母性嚴先妣能順適之治家寛而有法歳時奉祀必躬必親撫媵御有恩意無纖毫嫌忌之意亡婦先世自國初時以儒學登髙科其父諱勉之字致中紹興中嘗以布衣召至都堂與秦丞相議不合而去東萊吕舍人所謂老大多才十年堅坐者也凡此曲折得頗見於詞命足為泉壤之榮幸辱矜念脫或已行亦乞刋定幸甚幸甚與劉德修光祖方念久不聞動靜忽閱邸報有房陵之行為之悵然寢食俱廢累日不能自釋不審彼以何日就道自簡至房道里幾何取道何州閱幾日而後至風土氣候不至甚異否居處飲食能便安否官吏士民頗知相尊敬否吾道之窮一至於此然亦久知㑹有此事但不謂在目前耳偶有鄂便託劉公度轉致此問如有的便亦望得一書之報使知動息少慰逺懐十萬之幸馮李亦復不容季章得郡而名見乃弟疏中恐亦非久安者李良仲鴻飛冥冥使人深羡第恨不得扣其𤣥中之趣范文叔却幸未見物色想亦深自晦也熹足弱氣痞已半年矣策杖人扶僅能畧移跬歩而腹脇脹滿不能俯案觀書作字一切皆廢獨於長者未敢依例口占耳數日又加右臂作痛寫字不成衰憊至此無復久存之理承教無期尚冀以時深為世道自愛耳熹隨例納禄幸已得請中間盖亦小有紛紛後雖粗定然猶不免為之之累亦可歎也一本為下空一字答黄文叔度八月二十二日具位朱熹頓首復書於知府顯謨正言執事熹跧伏窮山聞執事之名舊矣未獲既見每竊恨焉去歳趨召北歸道聞新天子以執事為賢擢居言路方與善類同深喜幸以為上新即位首擇一人以為諌官即得執事之賢以充其選是必将用其言以新庻政無疑矣以執事之賢如此又遭難得之時如此其必将有以開悟上心謹始建極以慰中外之望又無疑矣而未一二日已聞出守之命則又為之惘然昏惑莫曉所謂比至中都亟問其故則凡有識無不扼腕而劉德脩獨取執事所上免章謄本相視熹於是時亦復慨然浩歎盖不惟為執事惜此事㑹亦為朝廷惜此舉措且自恨其失一見之便而又决知吾道之将不行矣曾未兩月果已罷遣道間聞當來婺又以行役有程不能宿留以俟車騎之來還家又苦疾病重以春夏之交氣候大變邪毒薰心危證悉見自謂必死矣固不能先自通於左右乃於呻吟之中忽奉手教之辱三復醒然過望幸甚然而執禮過謙稱道浮實比擬非倫則非淺陋之所敢當也豈其戲耶則執事荘士也非以言為戲者也以為誠耶則懼其有傷執事者閱理之明知人之哲也至論古昔聖賢所處之難易則執事之意可知矣如熹之愚盖嘗不自揆度而妄竊有志於此然學未聞道言語無力精神不專不足以動人悟物盖昔人所謂說将尚不下者而又何足以議此耶雖然今亦老矣衰病益侵旦暮且死此心雖不敢忘亦無復有望於將來矣顧今運祚方隆聖德日新有永之圖必将與明者慮之則夫所謂致一以格天者乃執事事也執事其亦察乎舜之所謂人心道心者為如何擇之必精而不使其有人心之雜守之必固而無失乎道心之純則始終惟一而伊尹之所以格大者在我矣於以正君定國而大庇斯人於無窮豈不偉哉鄙見如此不識執事以為如何如有未當願反復之以卒承教之願千萬幸也前此承書未久即聞去郡來使遂不復來取報章今想已還㑹稽不審為况復何如時論日新尚復何說因趙主簿歸天台寓此為謝不能盡所欲言又苦目痛不能多作字不得親書深以愧恨相望千里邈無晤見之期惟冀以時自重使斯世猶有頼焉則幸甚不宣答徐元敏昨者拜書方愧草率人還賜教勤至區區悚仄已不自勝别紙垂誨警發尤深但詞意之間謙卑己甚非晚學小子所敢當伏讀再三益增恐懼然竊伏觀尊誨之㣲指大率以曲禮首章為脩已治人之大要喜其易行而病於難久此非擇善之精反躬之切何以及此顧念平昔所聞於師友者其大端誠不外是然行之不力一暴十寒其樂舒肆喜談謔之病殆有甚於髙明之所患者而何能有以少補於萬分抑又聞之主敬者存心之要而致知者進學之功二者交相發焉則知日益明守日益固而舊習之非自将日改月化於冥冥之中矣所聞如此然躬所未逮不自知其當否敢因垂問之及而以質焉儻蒙矜憐還賜誨飭使不迷於入德之方則熹千萬幸甚答林正夫湜慕仰髙風固非一日中間雖幸寅縁再見然苦怱怱不得欵奉誨語至今以為恨也歸來抱病人事盡廢無繇奉記以候起居每深馳跂今兹楊通老來忽奉手誨之辱假借期許既非愚昩之所敢當而執禮過恭尤使人恐懼踧踖而無所避也雖然髙明之所以見屬之意豈若世之指天誓日而相要於聲利之塲者哉况在今日而言之尤足以見誠之至而好之篤是以不敢隱其固陋而願自附於下風焉盖嘗聞之先生君子觀浮圗者仰首注視而髙談不若俯首歴階而漸進盖觀於外者雖足以識其崇髙鉅麗之為美孰若入於其中者能使真為我有而又可以深察其層累結架之所由哉自今而言聖賢之言具在方冊其所以幸教天下後世者固已不遺餘力而近世一二先覺又為之指其門戶表其梯級而先後之學者由是而之焉宜亦甚易而無難矣而有志焉者或不能以有所至病在一觀其外粗覘彷彿而便謂吾已見之遂無復入於其中以為真有而力究之計此所以驟而語之雖知可恱而無以深得其味遂至半途而廢而卒不能以有成耳竊計髙明所學之深所守之正其所藴蓄盖已施之朝廷而見於議論之實於此宜不待於愚言矣然既蒙下問不可以虚辱而熹之所有不過如此若不以告於門下以聽執事者之采擇則又有非區區之所敢安者是以敢悉布之可否之决更俟來教熹所虛佇而仰承也通老在此相聚甚樂比舊頓進知有切磋之益惜其相去之逺忽起歸興而不可留也從之聞以牙痛為庸醫所誤投以凉劑一夕之間遂至長徃深可痛惜然此亦豈醫之所能為哉德脩崎嶇逺謫令人動心然聞其平居對客誦言固每以此自必乃今為得所願然所闗繋則不淺矣有寫其記文以來者已屬通老呈白想亦深為廢卷太息也元善寓霅川殊不自安旦晚必歸子宣今日方得書也熹氣痞不能久伏几案作字草草且亦未能究所欲言臨風引領悵望亡量惟髙明察之考異答袁機仲八卦相錯其數殊塗其一本作二以上五條只少箇柱杖箇下一本有拈字伏承别紙誨諭况説卦之本文云云至未嘗有一隂一陽始生之説也一本作况説卦之本文於㢲則但取其潔齊而位之東南於乾則但取其戰而位之西北㢲以三畫言之雖為一隂之生而其所以位之東南者初非有取乎其義至於乾則又三陽之全體而初無一陽已生之義可得而取也接凡此﨑嶇云來喻謂坤之上六陽與復遇之說遇一本作垢易說垂示以前論參之之一本作伍答周益公范碑既起而樂為之用一本無既字前日之所為前一本作當當行之路當一本作常答林謙之簡易明白簡一本作坦答江元適孤陋晚生正名統實一本無統字熹嘗謂天命之性由徑而㨗出由一本作出晦菴集卷三十八欽定四庫全書晦庵集卷三十九宋朱子撰
