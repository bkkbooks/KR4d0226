front:
  text: 忠宣所刪也忠宣固賢然其規模氣象似與文正有未盡同者深諱此事雖不害為守正然未得為可與權也不審髙明以為如何少日見徐玉丈端立自言嘗見石林疑范馬鍾律之辨乃故為同異以釋朋比之疑者因告之曰此事信否未可知然為此論者亦可謂不占便宜矣石林為之一笑而罷今日之論恐或類此故并及之僭率皇恐切望矜恕
  hash: sha256:b9148986f07a9d06d0db2f61059e8333ca4ac759509d01e568592b703104ec35
