front:
  text: 在廬山之陽五乳峯下予自少讀三山先生楊公詩見其記卧龍劉君隱居辟榖木食澗飲蓋巳度百嵗而神清眼碧客至輒先知之則固已知有是庵矣去嵗蒙恩來此又得陳舜俞令舉廬山記者讀之其言曰凡廬山之所以著於天下蓋有開先之瀑布見於徐凝李白之詩康王之水簾見於陸羽之茶經至於幽深險絶皆有水石之美也此庵之西蒼崖四立怒瀑中瀉大壑淵深凜然可畏有黄石數丈隱映連屬在激浪中視者眩轉若欲蜿蜒飛舞故名卧龍此山水之特勝處也於是又知其泉石之勝乃如此間以行田始得至焉則庵既無有而劉君亦不可復見獨其泉石之勝不可得改然其壯偉竒特之勢則有非陳記所能仿彿者余既惜其出於荒堙廢壊之餘而又幸其深阻夐絶非車塵馬跡之所能到儻可得擅而有也時已上章乞解郡紱乃捐俸錢十萬屬西原隠者崔君嘉彦因其舊址縳屋數椽以俟命下而徙居焉既又緣名潭之義畫漢丞相諸葛公之象寘之堂中而故友張敬夫嘗爲賦詩以紀其事然庵距潭猶數百步步亂石間三涉澗水乃至至又無所託足以寓瞻眺或乃顛沛而反因相其東崖鑿石爲磴而攀緣以度稍下乃得巨石横出澗中仰翳喬木俯瞰清流前對飛瀑最爲谷中勝處遂復作亭於其上既以爲吏民禱賽之地而凡來遊者亦得以仿彿徙倚而縱目快心焉於是嵗適大祲因牓之曰起亭以爲龍之淵卧者可以起而天行矣然予前日之請迄今蓋巳屢上而竟未有得也嵗月飄忽念之慨然乃敘其作興本末而書之屋壁來者讀之尚有以識予之意也淳熙庚子冬十有一月丙辰新安朱熹記
