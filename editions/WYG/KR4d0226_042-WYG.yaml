front:
  text: 胡廣仲欽夫未發之論誠若分别太深然其所謂無者非謂本無此理但謂物欲交引無復澄静之時耳熹意竊恐此亦隨人禀賦不同性静者須或有此時節但不知敬以主之則昏憒駁雜不自覺知終亦必亡而已矣故程子曰敬而無失乃所以中此語至約是真實下工夫處願於日用語黙動静之間試加意焉當知其不妄矣近来覺得敬之一字真聖學始終之要向來之論謂必先致其知然後有以用力於此疑若未安盖古人由小學而進於大學其於灑掃應對進退之間持守堅定涵養純熟固已久矣是以大學之序特因小學已成之功而以格物致知為始今人未嘗一日從事於小學而曰必先致其知然後敬有所施則未知其以何為主而格物以致其知也故程子曰入道莫如敬未有能致知而不在敬者又論敬云但存此久之則天理自明推而上之凡古昔聖賢之言亦莫不如此者試考其言而以身驗之則彼此之得失見矣
