body:
  text: 晦菴集卷十六宋朱子撰奏狀乞蠲減星子縣稅錢第二狀第一狀闕臣誤䝉聖恩竢辠偏壘自度庸愚無以補報到任以來夙夜憂勞惟思所以上布聖恩下求民瘼仰副使令之萬一者竊見本軍諸縣大扺荒凉田野榛蕪人烟稀少而星子一縣為尤甚因竊究其所以乃知日前兵亂流移民方復業而官吏節次増起税額及和買折帛數目浩瀚人户盡力供輸有所不給則復轉徙流亡無復顧戀鄉井之意其幸存者亦皆茍且偷安不為子孫長久之慮一旦小有水旱則復顧而之他觀其氣象如腐草浮苴無有根蔕愁歎亡聊深可憐憫是以去年六月曾以此縣税錢利害條具聞奏乞賜蠲減伏䝉聖恩即日降出而户部下之本路漕司漕司委官究實復以申部取㫖施行百里疲羸日夕仰望聖澤之下流不啻飢渇而户部乃以去歳議臣之請復下漕司責以對補吏民相顧悼心失圖臣愚惶惑亦不知所以為計然竊伏惟念陛下寛仁勤儉恭已愛民四方逺近凡以病告無不惻然興念即賜復除臣不敢廣引前事且如近者汀州所貢白金歳數千兩一旦沛然出令舉以丐之了無難色此豈復責其有所取償而後予之哉慘怛之愛發於誠心而不可已也而往者議臣不足以窺測天地含容施生之大徳輙為對補之說以逆沮逺近祈恩望幸之心臣雖至愚有以知其决非陛下之本心也且州郡誠有餘財自當措置兊那以紓民力豈復敢以此等瑣末上勞天聽正為公私匱乏不能相救是以冐昧有此陳請今乃限以對補之說不附其說則逺縣窮民永無蘇息之期必從其說則勢無從出不過剜肉補瘡以欺天罔人不惟無益而或反以為害不惟仰失陛下愛民之本心而臣之愚亦有所不忍為也是以敢冐萬死復以奏聞欲望聖慈特降睿㫖檢㑹前奏依汀州例直賜蠲放施行計其所捐除不礙上供數外不過紬絹一千五十餘匹錢二千九百餘貫比之汀州之數未為甚費而可以少寛斯人使得安其生業臣不任祈天瀝懇皇恐俟命之至奏南康軍旱傷狀照㑹本軍并管屬星子都昌建昌縣自六月以來天色亢陽缺少雨澤田禾乾枯本軍㳟依御筆處分嚴禁屠宰精意祈禳及行下逐縣精加祈禱去後今據星子都昌建昌縣申依應遍詣寺觀神祠及諸潭洞建壇祭祀請水精加祈禱雨澤並無感應今來諸鄉早禾多有乾損及備據税户陳徳祥等狀披訴所布田禾緣雨水失時早禾多有乾槁不通收刈申乞委官檢視本軍今檢凖淳熈令諸官私田災傷秋田以七月聽經縣陳訴至月終止本軍除已依條施行外須至奏聞乞放免租税及撥錢米充軍糧賑濟狀臣伏覩本軍今為久缺雨澤早田旱損已依凖令式具狀奏聞訖照對本軍地荒田瘠税重民貧昨於乾道七年曽遭大旱伏䝉聖恩放免本年夏秋二税錢米紬絹共八萬六千三百二十貫石匹及詔本路監司應副軍糧米四千石撥到糴軍糧米錢九千餘貫并撥本軍未起米一萬一千七百餘石本軍借兊過乳香度牒錢一萬餘貫凑糴軍糧支遣官兵及撥到賑濟米五萬石又拖欠兩年上供折帛月椿等錢共九萬三千四百一十六貫石匹兩然後遺民復得存活以至今日今兹不幸復罹枯旱之災又䝉陛下親降御筆深詔守臣精加祈禱而臣奉職無狀無以感格幽明祈禱兩月殊無應効今則早田什損七八晚田亦未可知正得薄收其數亦不能當早田之一二訪聞耆老云乾道七年之旱雖不止於如此然當時承屢豐之後富家猶有蓄積人情未至驚憂又以朝廷散利薄征賑給之厚而人民猶不免於流移殍死閭井蕭條至今未復况今民間蓄積不及往時人情已甚憂懼目下軍糧便闕支遣計料見管常平斛斗亦恐將來不足賑濟支用若不瀝懇先自奏聞竊恐將來流殍之禍及他意外之憂又有甚於前日欲望聖慈早降睿㫖許依分數放免税租外更令轉運常平兩司多撥錢米應副軍糧凖備賑濟則一郡軍民庻幾不致大段狼狽冐犯天威臣無任恐懼待辠之至再奏南康軍旱傷狀照對本軍管屬星子都昌建昌三縣管下諸鄉自春夏以來雨澤少愆尋行祈禱於五月中旬已獲感應稍稍霑足遂至髙下之田皆已布種至六月上旬以來又闕雨澤及遍詣管屬靈跡寺觀神祠諸處淵潭取水建置壇塲依法冊祭龍及修設醮筵禁止屠宰精加祈禱自後未獲感應其管下民户陂塘所積水利雖車戽注䕃禾稻縁乾亢日久兼又風色滲漏是致民田多有乾槁不通收刈見不住據人户投陳旱傷不絶本軍㳟依御筆處分嚴禁屠宰精意祈禳及行下逐縣精加祈禱去後據星子都昌建昌縣申依應遍詣寺觀神祠及諸潭洞建壇祭祀請水精加祈禱雨澤並無感應今來諸鄉早禾多有乾損及備據税户陳徳祥等狀披訴所有田禾縁雨水失時早禾多有乾槁不通收刈申乞委官檢視本軍檢凖淳熙令諸官私田災傷秋田以七月聽經縣陳訴至月終止具錄奏聞乞截畱米綱充軍糧賑糶賑給狀臣熹昨以衰病無能退居田野陛下過聽不忍棄捐超資越序付以千里民社之寄徳至渥也而臣亡狀不能悉心營職宣布寛恩馴致旱災害及民物雖已嘗具奏聞及申省部諸司乞行賑救今來竊聞接濟飢民事常平司已行措置惟有軍糧一節利害尤為不輕而未聞諸司有所措置竊慮一旦事出意外辠無所逃須至昧死再有陳奏伏望聖明俯垂臨照臣契勘南康軍受納人户苖米計四萬六千五百一十九石逓年科撥並充上供起發而本軍官吏軍兵一歳糧廩計當用米二萬七千五百一十三石並無科名支撥從來只於人户輸納苖米多收加耗高量斛靣皮侵支漕司科撥未盡米斛應副支遣昨於淳熙五年内奉聖㫖令人户自行把槩見青交量每斛已減斛靣二斗及臣到任訪聞民間猶以所納為重又行措置減去加耗一斗所入之數既已不多然若無水旱災傷非泛支遣更以别色官錢多方糴補亦可僅免曠闕今者不幸遭此旱傷差官檢放雖未見得分數多寡然以目所見叅之傳聞其勢所收未必及三四分竊慮將來減放之後實納苖米頭數不多當此凶年所減加耗斛靣又難以復行增起即本軍官兵所支糧廪委是並無指擬夫民飢猶能流移逐食軍兵既係尺籍從來仰食於官豈容一日有所欠闕臣既淺短無術可為旬月以來晝度夜思以至成疾雖已畧控危𠂻陳乞罷免然念州郡事勢日就危廹又有萬倍於一身者若不力告朝廷早為之所而但偷為一身之計自求安便則其上負陛下㧞擢任使之恩雖復萬死猶有餘辠故不自揆其踈賤輙敢復具情實冐昧奏聞欲望聖慈哀憐遠方軍民遭此旱虐凛然日有溝壑之憂特降睿㫖許留淳熈六年殘零未起米綱及七年合起米綱並充本軍軍糧及賑糶賑給支用其賑糶米錢候將來收到别隨綱運解發庻幾一郡生靈若軍若民皆得以保其螻蟻之微命共感天地造化無窮之恩更乞憐臣所患心疾不堪思慮又苦脚氣不任歩履早賜罷免仍催已差下人石􅗐不候般家接人疾速前來之任使臣得輿病還家待盡餘息則臣之私計亦為幸甚謹録奏聞伏候勅㫖貼黄照對本軍淳熈六年米綱未起僅五千石今年苖米且約減放七分即所餘合納米不過一萬三千九百五十五石若䝉聖㫖盡行撥賜亦不為多又况賑糶米錢將來續次發納即其實支之數愈更不多此在朝廷至為微末而可以救活一郡軍民之命誠非細事伏乞聖照奏推廣御筆指揮二事狀具位臣朱熹伏覩本路安撫使司牒備奉御筆指揮頗聞雨澤愆期有妨農務仰本路帥守勤恤民隱决遣滯獄嚴禁屠宰精加祈禳若未感格即具奏聞當議降香前來期於必應俾雨澤霑足寛朕憂軫卿等各勉㫋母怠臣伏讀聖訓有以仰見陛下畏天之誠愛民之切雖成湯桑林之禱宣王雲漢之章無以過此甚盛徳也臣幸以愚賤獲奉詔㫖謹以謄冩播告質之幽明仰慿威靈屢獲感應但其雨澤不至浹洽均勻目今正是早禾吐穗結實之時尚多闕水去處又聞湖南湖北淮西等路例皆枯旱將來不幸或至荒歉即雖移民移粟之小惠亦無所施臣是以夙夜憂愓不遑啓居竊以愚見推廣聖訓畫為二䇿具以奏聞如有可採乞賜施行庻幾有以導迎和氣銷去旱災仰寛陛下宵旰之憂惟是不量卑鄙屢犯天威無任震懼隕越之至臣之所陳謹具如后一臣伏讀聖詔有曰勤恤民隱臣謹已遵禀施行訖然臣竊聞陸贄有言民者邦之本財者民之心其心傷則其本傷其本傷則支幹凋瘁而根柢蹶㧞矣推此言之則今日所以勤恤民隱莫若寛其税賦弛其逋負然後可以慰悦其心而感召和氣也臣自去年到任之初即以本軍星子縣税賦偏重嘗具奏聞乞賜蠲減及續體訪到三縣夏料木炭錢科紐太重亦嘗具申省部及提㸃司其木炭錢近得提㸃司保明條奏已䝉聖恩蠲減二千貫訖獨星子減税一事雖䝉聖恩施行而户部行下漕司漕司委官覈實近日方得回申户部此事若格以有司之法必是方多沮難未容便得蠲減所願聖慈深賜矜憐直降睿㫖特依所乞則此縣之民庻幾復得樂生安土永為王民不勝幸甚臣又竊見州縣積欠官物已凖去年明堂赦書自淳熈三年以前並行除放而近者上司行下依舊催督至如本軍雖小而所催除虛額逃閣外凡一十三項計三萬四千七百三十三貫石匹兩其他大郡抑又可知其間所欠雖復名色多端然而皆是赦恩已放之物今日再行催理不唯仰虧帝王大信而其為害有不可勝言者蓋若勒令州縣填補則州縣無所從出必至額外巧作名色取之於民若但責之欠人則其間多已貧乏狼狽雖使賣妻鬻子不足填納而監繫在官無復觧脱之期均之二者皆不足以足用豐財而適足以傷和致沴為害不輕臣愚欲望聖慈特推曠蕩之恩自淳熈三年以前但干欠負官物不問是何名色凡赦恩已放若已放而未盡者一切蠲除如有違詔輙行催理仰被受官司繳連具奏委自三省看詳將施行官司重作行遣其被苦人戸亦許徑赴登聞鼔院進狀陳理依此施行庻幾聖恩下達民情上通可以感格和平銷去災沴惟聖明留意則天下幸甚一臣伏讀聖詔有曰決遣滯獄臣謹已遵禀施行訖然臣竊聞之易曰君子明謹用刑而不留獄此聖人觀象立教萬世不易之法也今州縣之獄勘結圓備情法相當者並皆即隨時决遣惟其刑名疑慮情理可閔者法當具案聞奏下之刑寺審閱輕重取自聖裁而州縣不敢以意决也此深得古人明謹用刑之意矣然奏案一上動渉年歳且如本軍昨於淳熈四年十一月内申樞宻院乞奏刼賊倪敏忠辠案其罪狀明白初無可疑而凡經二年有半至今年三月内方凖勅斷行下其他似此亦且非一竊計他州繁劇去處此類尤多若使皆是行刼殺人之賊偶有疑慮使之久幽囹圄亦何足恤其間蓋有法重情輕之人本為有足憫憐冀得䝉被恩貸而反淹延禁繫不得早遂解釋則恐非聖人所謂不留獄之意也臣愚欲望聖慈特詔大臣一員專督理官嚴立程限令將諸州奏案依先後資次排日結絶其合貸命從輕之人須當日便與行下其情理深重不該減降者即更寛與一限責令審覈然後行下庻幾輕者早得决遣釋放重者不至倉卒枉濫是亦導和弭災之一術惟聖明留意則天下幸甚右謹件如前謹錄奏聞伏候勅㫖奏借兌上供官錢糴米并乞權行倚閣夏税錢帛狀臣昨為本軍今年災傷至重奏乞截留兩年上供米斛内循狂妄伏俟誅夷不謂聖恩即垂開允臣與合郡千里軍民鼓舞相慶仰戴天地父母再生之恩雖復捐軀隕首誠不足以仰報萬分之一今來檢放旱傷秋苖通計不止七分除已一靣攅具奏聞外復有危迫之懇須至冐昧以聞竊見本軍今年所理夏税縁自省限起催以來即苦旱乾人户車水救田日不暇給憂勞愁歎實與常歳不同遂不敢嚴責諸縣依限催理只令勸諭人戸自行輸納至今截日方據納到絹九千四百匹錢一萬六千七百二十五貫二百五十九文省其絹一靣支裝起發所有見錢竊縁本軍别無儲積可備賑糶不免擅行兊借並未起淳熙六年折帛錢七千三百一十九貫二百九十六文省通前兩項共錢二萬四千五十二貫五百五十五文省趂此米價未起之間收糴米斛約計可得一萬一千五百七十石賑糶飢民却俟糶畢收簇元錢節次起發其餘人户所欠錢絹數目尚多而民間自今以往飢餓寒凍之憂日甚一日漸次無力可以供輸臣誠不忍更行催督以速其流離轉死之禍敢冐萬死復以上聞欲望聖慈更賜哀憐許將本軍今年人户未納夏税錢帛權行倚閣令候來年蠶麥成熟却隨新税帶納庻幾飢餓餘民得保生業不勝萬幸所有臣輙將上供官錢借兌糴米之辠敢不俯伏㳟俟朝典伏乞聖慈併賜施行臣無任瞻天望聖皇懼懇切之至乞撥賜檢放合納苖米充軍糧狀凖尚書省劄子宣教郎權發遣南康軍朱熹奏為今歳旱傷除接濟飢民一事常平司已行措置惟有軍糧歳用二萬七千五百一十三石並無窠名支撥乞將淳熈六年未起米五千石并今年苖米檢放外餘數乞盡行撥賜充軍糧及賑糶賑給支用奉聖㫖令本路提舉常平司將所部州軍應管常平義倉錢米通融寛數支撥外更許本軍將淳熈六年未起米並皆盡數存留充軍糧及賑糶等支用内糶到價錢令項樁管非奉朝廷指揮不得擅行支使其淳熈七年分來候見得實旱傷分數别行申取朝廷指揮本軍除已遵禀施行外今據星子都昌建昌縣申到檢放通計八分四毫四絲所有今秋苖米管催四萬六千五百餘石除放八分四毫四絲計米三萬七千四百餘石外合納米九千九十餘石竊緣本軍一年支遣米計二萬七千五百一十三石政使盡䝉撥賜上項米斛其於歳計尚闕支遣若於數内更令發起即其狼狽又將有不可勝言者欲望聖慈矜憐孤遠特許盡數支撥上件放外苖米與充軍糧則一郡軍民不勝幸甚伏候勅㫖奉勸諭到賑濟人户狀照對本軍今歳旱傷細民闕食已行下管屬星子都昌建昌縣勸諭到上户張世亨等承認米榖賑糶接濟民間食用已行下逐縣告示上户依所認數目樁管在家伺候差官審實監糶去後續凖行在尚書户部符九月十九日辰時凖淳熈七年九月十三日勅中書門下省檢㑹昨凖乾道七年八月一日勅節文訪聞湖南江西間有旱傷州軍竊慮米價踴貴細民艱食理合委州縣守令勸諭有米斛富室上户如有賑濟饑民之人許從州縣審究指實保明申朝廷依今來立定格目給降付身補授名目内無官人一千五百石補進義校尉願補不理選限將仕郎聽二千石補進武校尉如係進士與免文解一次不係進士候到部與免短使一次四千石補陳信郎如係進士與補上州文學五千石補承節郎如係進士補廸功郎符本軍疾速施行本軍遂㳟禀行下星子都昌建昌縣勸諭承認賑糶米榖之人如願將來賑濟依今來所降指揮格法推賞去後今據都昌建昌縣狀申勸諭到元認賑糶米榖税户張世亨張邦獻劉師輿黄澄四名各情願依格法將米榖賑濟飢民乞依今降指揮保奏推賞本軍已行下逐縣告示張世亨等依數樁管米斛伺候本軍給厯付飢民及差官前去監轄賑濟飢民請領食用候見的實賑過米數别行保奏推賞外須至奏聞者繳納南康任滿合奏禀事件狀臣熹昨於淳熈五年凖勅差前件差遣續奉聖㫖令臣任滿前來奏事臣已於次年三月到任至今年三月已係成資方欲等候替人前來交割職事即依元降指揮前去奏事忽於三月二十五日凖尚書省劄子奉聖㫖除臣提舉江南西路常平茶鹽公事自顧踈頑已試無狀薦䝉任使恩重命輕未敢遽有辭避已於當日望闕謝恩袛受訖縁為替人未到凖法未得離任其元降奏事指揮又緣已有前件恩命兼臣見患心氣精神不全思慮應對動有差錯不敢前詣國門聽候進止外伏念臣愚賤踈逺在任二年凡所奏陳多䝉開納甫及終更曾無績効又䝉聖恩有此陞擢臣雖至愚然早服父師之訓其於君臣大義與夫古今治亂得失之故粗亦識其梗槩豈不願得一望天日之光少罄平日愚忠之萬一顧以衰頽不獲自盡退就田畝死有遺憾惟是今任職事尚有合具奏禀事件不免具事狀條畫以聞而總其目如左須至奏聞者一臣熹狀奏為本軍星子縣税錢太重欲乞直降睿㫖特賜蠲減事一臣熹狀繳連本軍狀奏為勸諭到税户張世亨張邦獻劉師輿黄澄共承認米一萬九千石賑濟飢民給賜了畢欲乞不候諸司保明早依元降賞格推恩事一臣熹狀奏為乞降指揮淳熈七年被災之郡不得催理積欠及將倚閣夏税特與蠲放其上三等户零欠夏税亦與多作料次逐年帶納事一臣熹奏為乞賜白鹿洞書院勅額及乞頒降光堯壽聖憲天體道性仁誠徳經武緯文太上皇帝御書石經及國子監九經注䟽等事右謹具如前欲望聖慈特降睿㫖逐一施行不勝幸甚臣瞻望闕庭無任慕戀祈懇之至謹録奏聞伏候勅㫖一右臣誤䝉聖恩俟辠偏壘自度庸愚無以補報到任以來夙夜憂勞惟思所以上布聖恩下求民瘼仰副使令之萬一者竊見本軍諸縣大抵荒凉田野榛蕪人烟稀少而星子一縣為尤甚因竊究其所以乃知日前兵亂流移民方復業而官吏節次增起税額及和買折帛數目浩瀚人户盡力供輸有所不給則復轉徙流亡無復顧戀鄉井之意其幸存者亦皆茍且偷安不為子孫長久之慮一旦小有水旱則復顧而之他觀其氣象如腐草浮苴無有根蔕愁歎亡聊深可憐憫是以到任之初曾以此縣税錢利害條具聞奏乞賜蠲減伏䝉聖恩即日降出而户部下之本路漕司漕司委官究實復以申部取㫖施行百里疲羸日夕仰望聖澤之下流不啻飢渴而户部乃以往者議臣之請復下漕司責以對補吏民相顧悼心失圖臣愚惶惑亦不知所以為計者是以黙息久之不敢復有奏陳今既終更不逺郡境又遭去年之旱其憔悴無憀之態又有甚於前所陳者是以不敢愛死復嬰鈇鉞而一言之夫以民之貧病至於如此州郡誠有餘財自當措置兌那以紓其力豈便敢以此等瑣末上勞天聽正為公私匱乏不能相救是以冐昧有此陳請今乃限以對補之說使逺民之疾苦不得以上聞而陛下之徳澤不得以下究此殆議者過計之憂臣雖至愚有以知其决非仁聖之本心也欲望聖慈特降睿㫖將淳熈六年十月十九日對補指揮更不施行仍照有司檢㑹臣熹前奏本軍星子縣税錢事直賜蠲放蓋其所捐除不礙上供數外不過紬絹一千五十餘匹錢二千九百餘貫此於大農之經費不足以當九牛之一毛而可以少寛百里之民使得安其生業臣不任祈天瀝懇惶恐俟命之至謹録奏聞伏候勅㫖二貼黄奏為本軍勸諭都昌建昌縣税户張世亨劉師輿進士張邦獻待補太學生黄澄賑濟飢民斗斛照㑹本軍去歳旱傷至重細民闕食雖有樁管及撥到常平米斛數目不多深恐不行周給遂行勸諭到管屬上戶承認米數賑糶接濟民間食用續於去年十月十一日凖行在尚書户部九月十六日辰時凖淳熙七年九月十三日勅中書門下省檢凖乾道七年八月一日勅節文訪聞湖南江西間有旱傷州軍竊慮米價踴貴細民艱食理合委州縣守令勸諭有米斛富室上戸如有賑濟飢民之人許從州縣審究指實保明申朝廷依今來立定格且給降付身補授名目内無官人一千五百石補進義校尉願補不理選限將仕郎聽二千石補進武校尉如係進士與免丈解一次不係進士候到部與免短使一次四千石補承信郎如係進士與補上州文學五千石補承節郎如係進士與補廸功郎符本軍疾速施行本軍㳟禀行下管屬再行勸諭承認賑糶米數之人如願將米賑濟切待審究保明申朝廷依今來所降指揮格法推賞去後據都昌建昌縣申數内勸諭到元認糶米税户張世亨劉師輿進士張邦獻黄澄四名各情願承認米依格法賑濟内建昌縣税户張世亨五千石乞補承節郎進士張邦獻五千石乞補廸功郎税户劉師輿四千石乞補承信郎并都昌縣待補太學生黄澄五千石乞補廸功郎各乞依今降指揮保奏施行本軍遂行下告示張世亨等依數樁米伺候給厯付飢民差官監轄賑濟已於去年十二月二十八日先具奏聞及申本路諸監司照㑹去訖續據管屬星子都昌建昌三縣共開列闕食飢民二萬九千五百七十八户數内大人一十二萬七千六百七口小兒九萬二百七十六口本軍各印給厯頭牌靣置簿厯發送逐縣當職官給散付人户預於縣市及諸鄉均定去處共置三十五塲分差見任寄居指使添差監押酒税務監廟大小使臣共三十五員監轄賑糶賑濟及委縣官分塲廵察嚴戢減尅乞覔之弊自淳熙八年正月初一日為始令抄劄到闕食人户赴塲賑糶其鰥寡孤獨之人即以常平米斛依法賑濟至正月内又縁雪寒行下屬縣將元係賑糶飢民用上件張世亨黄澄等米及常平義倉米一例賑濟兩日至三月内又慮飢民艱得錢收糴米斛再自十一日為頭行下諸縣將己給厯賑糶飢民一例普行賑濟一十三日通作半月及照得都昌縣止有黄澄一名承認賑濟米五千石凑所管義倉米㑹計賑濟不周本軍遂於建昌縣張世亨等賑濟米内撥米四千石本軍措置官錢和雇脚夫舟船裝載發送都昌縣交管分於置塲去處責令監轄賑濟至閏三月十五日終節次據都昌縣建昌縣申到張世亨張邦獻劉師輿黄澄賑濟過米撮筭共計一萬九千石星子縣元無勸諭到上户賑濟米斛即以常平義倉米斛依例普行賑濟外本軍節次行下都昌建昌知縣逐旋審究的實賑濟過張世亨黄澄等米數保明申軍去後據廸功郎監城下酒税權都昌縣事孫僑通直郎知建昌縣事林叔坦狀保明到張世亨張邦獻劉師輿黄澄賑濟過米一萬九千石委是節次賑濟飢民食用之數即無冐濫本軍一靣差委從政郎本軍司法叅軍陳祖永前去都昌建昌縣覈實到張世亨張邦獻劉師輿黄澄賑濟米一萬九千石委是賑濟過的實之數本軍再行稽考别無冐濫保明是實本軍勘㑹得張世亨劉師輿各係税户張邦獻係應舉習詩賦終塲士人并黄澄係於淳熈四年秋試應舉習詩賦取中待補太學生第十五名是實其張世亨張邦獻劉師輿黄澄賑濟過米數各應得近降指揮賞格數内税户張世亨賑濟過米五千石合補承節郎税户劉師輿賑濟過米四千石合補承信郎進士張邦獻賑濟過米五千石合補廸功郎待補太學生黄澄賑濟過米五千石合補廸功郎除已具申本路安撫司轉運司提舉司提刑司照㑹依條保奏推賞外欲望聖慈下所屬給降合得付身發下以憑給付張世亨張邦獻劉師輿黄澄祗受須至奏聞者貼黄臣契勘本軍管下去秋種麥甚廣春初亦極茂盛續次訪聞近緣雨水頗多大叚傷損民間養蠶亦緣雨濕桑柘不至十分成熟伏乞聖照臣契勘除上項張世亨等四家米數已行支散了畢外續次訪聞都昌縣下尚有漏落人户未曾賑濟除已帖本縣知佐審實用義倉米支散去訖伏乞聖照貼黄奏為乞特詔有司不候諸司保明將本軍所奏黄澄等賑濟早賜依格推賞奏聞事右臣昨奉淳熙七年九月十三日聖㫖勸諭到本軍人户黄澄等出備米一萬九千石賑濟飢民已曾累具畫一奏聞去訖近緣春初風雪寒凍及三月以來農功將起巳帖諸縣將上件米普行賑濟管内飢民兩次通計二萬九千五百七十八户數内大人一十二萬七千六百七口小兒九萬二百七十六口大人一斗五升小兒七升五合足為半月之糧今已了畢千里之民既免於飢餓流離殍死之憂無不歡呼鼓舞感戴聖恩臣亦多方體察詢究委無欺隱漏落誑妄不實之弊已因近降指揮具事狀申本路監司乞行保奏外竊緣當來勸諭並是臣親書榜帖分遣官屬再三往復示以朝廷命令官賞之信其人乃肯欣然聽命今臣秩滿非久解罷若不力為奏陳早乞推賞萬一他日有司視同常事巧為沮郤則不惟使臣得辠於民亦恐朝廷異時命令無以取信於下本軍不免别具狀奏欲望聖慈特詔有司不候諸司保明將本軍所奏黄澄張世亨張邦獻劉師輿早賜處分依格推賞庻幾民間早獲為善之利日後或有災傷富民易以勸率貧民不至狼狽實為永久之利臣不勝大願其本軍奏狀繳連在前謹録奏聞伏候勅㫖三右臣輙有愚見上瀆聖聰臣竊見本軍去年大旱田畝不收幸䝉聖恩減放秋苖倚閣夏税而又申詔有司發廪勸分前後丁寧勤勤懇懇凡所以加惠於無告之窮民者至深至厚以故今歳開春以來及今已是七十餘日而閭里細民幸不至於大叚闕食又幸目今雨澤以時原野漸潤度料不過四五十日則二麥可收又四五十日則早稻相繼决不至於復有流離捐瘠之禍以勤陛下宵旰之憂矣然臣竊以為捄荒之政蠲除賑貸固當汲汲於其始而撫存休養尤在謹之於其終譬如傷寒大病之人方其病時湯劑砭灸固不可以少緩而其既愈之後飲食起居之間所以將䕶節宣小失其宜則勞復之證百死一生尤不可以不深畏也今者飢餓之民雖得䝉被聖恩以幸免於死亡然亦類皆鳥形鵠靣薾然無異於大病之新起若有司加意撫綏寛其財力則一二年間筋骸氣血庻幾可復其舊若遂以為既愈而不復致其調攝之功但見其尚能耕墾田疇撑拄門户而遽欲責以累年之逋負與夫去歳倚閣之官物則是人者其必無全理矣竊聞乾道七年之旱夏税秋苖亦皆嘗䝉聖恩矣而流殍甚衆迄今不復者正以次年帶納前料税物者迫之也然考其實所謂帶納者初未嘗大叚有人納到以佐有司用度之闕而姦胥猾吏得以並緣搔擾則其害有不可勝言者其後淳熈元年九月四日乃以薦饑始䝉蠲放則三年之間所失已多而無及於事矣今舊逋未除新税將起斯人懔懔已有狼顧之憂臣愚欲望陛下赦臣之辠察臣之言亟詔有司凡去年被災之郡盡今年毋得催理積年舊欠及將去年倚閣夏税悉與蠲放其上二等人户當此凶年細民所從仰食其間亦有出粟減價賑糶而不及賞格者欲望聖慈普加恩施許將去年殘欠夏税多作料數逐年帶納則覆載之間幅員之内當此災旱之餘無有一夫一婦不被堯舜之澤矣臣愚賤踈逺不當妄有陳奏實以誤膺委寄職在牧民竊於詔令之間有以仰窺陛下子愛黎元之心有加無已大懼無以仰稱萬分是以不敢不盡其愚冐瀆天威臣無任恐懼顚越之至謹録奏聞伏候勅㫖四右臣竊嘗伏讀國朝㑹要㳟視太宗皇帝嘗因江州守臣周述之奏詔以國子監九經賜廬山白鹿洞書院既又以其洞主明起為蔡州褒信縣主簿以旌儒學每恨無由一至其處仰觀遺迹及䝉聖恩假守兹土到任之初考按圖經詢究境内民間利病乃知書院正在本軍星子縣界而陳舜俞廬山記又載真宗皇帝咸平五年嘗勅有司重加修繕間因行視陂塘始得經由其地見其山川環合草木秀潤眞閒燕講學之區而荒凉廢壊無復棟宇因竊惟念太宗皇帝眞宗皇帝所以幸教多士垂裕萬世之意其盛如彼而下吏淺聞弗克原念以稱萬分之辠其大如此駭懼震慴不皇啟居既又按考此山老佛之祠蓋以百數兵亂之餘次第興葺鮮不復其舊者獨此儒館莾為荆榛雖本軍已有軍學足以養士然此洞之興逺自前代累聖相傳眷顧光寵徳意深逺理不可廢况境内觀寺鐘鼓相聞殄棄彛倫談說空幻未有厭其多者而先王禮義之宫所以化民成俗之本者乃反寂寥希濶合軍與縣僅有三所而已然則復修此洞蓋未足為煩於是始議即其故基度為小屋二十餘間教養生徒一二十人節縮經營今已了畢但其勅額官書皆已燒毁散失無復存者不敢擅行標題收置輙昧萬死具奏以聞欲望聖明俯賜鑒察追述太宗皇帝眞宗皇帝聖神遺意特降勅命仍舊以白鹿洞書院為額仍詔國子監仰摹光堯壽聖憲天體道性仁誠徳繼武緯文太上皇帝御書石經及印版本九經䟽論語孟子等書給賜本洞奉守看讀於以褒廣前烈光闡儒風非獨愚臣學子之幸實天下萬世之幸謹録奏聞伏候勅㫖貼黄臣頃年親見潭州嶽麓書院尚存舊碑大書勅賜嶽麓書院六字伏乞睿照阿馬奏案内小貼子臣熹等契勘阿馬既與外人通情宻謀殺夫自是不容旁有知證本不敢具案聞奏今凖提刑司牒須至具奏謹按本人所犯隳絶三綱情狀慘酷聞之猶可酸鼻竊慮有司因循常格擬從減等之坐有害風敎事體不輕欲望聖明洞察特依常法以警昬愚以正邦法臣等不任大願奏紹興府都監賈祐之不抄劄飢民狀照對紹興府諸縣今歳災傷飢民流移闕食甚衆㳟禀聖訓寅夕究心奉行縁本府山隂㑹稽縣人户不住遮道告訴抄劄不盡漏落不實臣即已措置專設一局見今呼集耆保鄉司專委本府當職官敦請鄉官重行隔别審實其在城五廂闕食細民及流移到府之人本府雖委逐廂官沿門抄劄訪聞多是止憑廂典合干人多有不實不盡亦行前來陳訴臣又已送下廂官審實抄劄所有他處流移到府臣亦已行下本府與縣令佐約束停房店舍不得多所賃資并津渡邀滯仍遍行收拾病患飢困及遺棄小兒就寛濶寺院安著支撥常平官錢收買柴薪藳薦給衣襖之類修合藥餌醫治煑造三兩等稀稠粥次第救助仍委諸慈悲僧道主管看養所行非不告戒臣今月十九日據馬林等投狀稱是嵊縣人事人事疑當作人氏移在本府第一廂居住闕食飢餓内有馬百四一名扶到臣治所已是飢餓日久十分羸困纔到不久即便倒死臣即令醫人用藥灌救移時方得甦醒遂行呼到本廂官武翼郎紹興府兵馬都監賈祐之取問元不抄劄供報因依本官應對不行及先來承受本府牒委及承臣送下陳狀並無抄劄事因報應本官委是不職難以存留在任臣除已先將賈祐之牒紹興府對移本府指使差遣外欲望聖慈特降睿㫖重賜黜責以為官吏奉行賑濟不䖍之戒乞借撥官㑹給降度牒及推賞獻助人狀未論止許之許疑當作計臣昨被臨遣備使浙東又䝉聖慈賜以錢㑹三十萬貫以給一路賑糶賑濟自謂遭値聖恩隆厚至於如此其勢必可以救活此道之人伏自入境以來日據紹興府㑹稽山隂兩縣人户投訴抄劄漏落遂將諸縣悉行根括先據兩縣申到比舊計增二十五萬六千一百九十二口其餘諸縣尚未申到計其縣分地里之大小戸口决當數倍於此蓋緣當來諸縣抄劄不甚子細而又渉日既久向之粗能自給者今皆闕食所以飢民之數日有增加因以此數考按本府昨來均定所得錢米撥下諸縣之數其為欠闕數目尚多遂將昨來所䝉給降㑹子等錢除五萬貫諸州申到已無見在更畱五萬凖備諸州取撥外即計逐縣大小及已得錢米多寡等第均給計已支費十八萬餘貫而㑹稽山隂兩縣自占九萬餘貫其餘凖擬諸縣申到再劄人數别行均給者共不過一萬餘貫計可得米三四千石而已事勢危迫不免逐急於鹽司錢内借撥九萬餘貫牒紹興府措置運糴然亦僅可得米二萬餘石而已以兩縣再劄所添計之則此二萬二三千石之米其勢豈足以均及諸縣之人然而兩縣所得一家不過日得一二升一口不過日得一二合而已此皆僅足以茍延喘息而不足以救其死命竊料更加旬月未論不得食者必致殍死而此得食之人亦有羸困不能以自存者矣又况當來計料糶濟止到三月十五日便行住罷已不能給而麥熟猶在四月麥之熟否姑置未論止許住罷至麥熟猶有半月餘日無以接濟夫以紹興一郡之飢自臣未到已䝉撥賜米十四萬石錢九萬貫至臣有請又䝉聖恩如此其厚而臣智術淺短不能變通其所施為止於如此竊恐考之於今則徒有賑救之名而無賑救之實要之於後則既已養之數月之久而不免棄之旬日之間徒費陛下軍國之儲數十大萬而不足以稱陛下救民水火之心固臣之無狀死不償責至於減米增賞雖已得㫖通行而去年獻助之人至今未䝉推賞度牒換米雖已得㫖給降而米數太多度牒一道計當錢千五百緡以此至今皆未聞有應募者則此竊恐陛下憂勞惻怛慱施濟衆廣大無窮之心或格於有司等攣纎嗇之議而不得以下究也臣已與帥臣王希吕同狀奏聞欲望聖慈更賜憐憫再行借撥㑹子三十萬貫及今糴米五六萬石通融接續措畫糶濟而復於此詳具其所以然者以聞其去年本路所奏合推賞人則乞特詔有司直與推賞給降告命付之本州令守臣喚上當㕔袛受不須更令官司保明徒為文具其度牒亦乞裁減半價只作百五十石仍再給降三百本付紹興府令臣與王希吕同共掌管交到米斛即與書塡則人必樂從應募者衆凡此三者儻䝉施行庻幾此郡飢民逐家一日各添得米一二升逐口一日各添得米二三合而逐縣續有劄到漏落户口及流移歸業之人亦得以漸次收拾不至飢死既有以卒究陛下憂勞惻怛博施濟衆廣大無窮之心而草野愚臣亦得以慿藉威靈不負飢民之命千萬幸甚如其不然則臣計已窮終必仰孤任使伏自到任以來朝夕憂懼精神耗竭四肢緩弱時復麻痺竊恐一旦溘然無以見百萬餒鬼於地下欲望聖慈赦其罪戾許臣罷免使得脱此寃債歸骨故山亦千萬幸甚披心瀝血干冐宸嚴臣無任恐懼戰栗之至奏救荒事宜狀臣䝉恩將命浙東奉行救恤到官日夕考究求所以上副焦勞之意竊見浙東諸州例皆荒歉台明號為最熟亦不能無少損而紹興府之飢荒昔所未有臣以目所覩囘思去歳南康之歉猶謂之樂歳可也賑救既在所急事體宜先奏聞今紹興八邑餘姚上虞號為稍熟然亦不及半收新昌山隂㑹稽所損皆七八分嵊縣旱及九分蕭山諸暨水旱相仍幾全無收今除餘姚上虞稍似可緩外且論蕭山等六縣約其所收不過十一先次朝廷撥米一十四萬七千石錢九萬貫并本司前官申朝廷於衢婺州通融撥到義倉錢三萬八千七十五貫一百文明州義倉米五千石數目非不多州郡日夕惟賑濟是務官吏稍解事者皆奔走不暇雖寄居士大夫亦不敢寧處不可謂不留意然終未有能救飢莩之實民情嗷嗷日甚一日不獨下户乏食而士子宦族第三等人户有自陳願預乞丐之列者驗其形骸誠非得已兼自秋來賣田拆屋斫伐桑柘鬻妻子貨耕牛無所不至不較價之甚賤而以得售為幸典質則庫户無錢舉貸則上户無力藝業者技無所用營運者貨無所售魚蝦螺蚌久已竭澤野菜草根取掘又盡百里生齒飢困支離朝不謀夕其尤甚者衣不蓋形面無人色扶老携㓜號呼宛轉所在成群見之使人酸辛怵惕不忍正視其死亡者蓋亦不少臣深究其所以然正緣紹興地狹人稠所産不足充用稔歳亦資鄰郡非若浙西米斛之多又以和買偏重無巨富之家連遭水旱兼失蠶麥些小積榖春首勸糶無有存者上户先已匱乏是以細民無所仰給狼狽急迫至於如此大抵荒歉自五分以下猶可措置蓋以五分之粟給十分之人稍行勸分便可茍活今以空虛之郡而荒及九分則一分之粟既不能給十倍之人而户口甚多所闕浩瀚亦有非移民移粟所能補助者臣所目見心思兼詢訪士夫父老者既如此復約墾田收租之數以證之除餘姚上虞外今將田畝計其歳入六縣為田度二百萬畝每畝出米二石計歲收四百餘萬又將今再抄劄山隂㑹稽兩縣口數以約六縣之數則山隂㑹稽丁口半於諸暨嵊縣而比新昌蕭山相去不逺絶長補短兩縣當六縣四分之一今抄劄山隂㑹稽四等五等貧乏之户計三十四萬口四等之稍自給及上三等者不預焉則統計六縣之貧民約須一百三十萬口併上户當不下百四十萬計稔歳所歛四百萬石米除上供及州用外養百四十萬之生齒日計猶不能及二升之數則所謂樂歳無餘者既信而有證矣又約六縣所蠲放分數以計今歳民間所收不過十分之一則所不收之米約計三百六十萬石而所收止四十萬石闕乏數目如此浩瀚則所謂補助無䇿者又信而有證矣今將紹興府先所得錢一十二萬八千七十五貫一百文并臣所得三十萬貫除五萬貫諸州申到已無見在又措留五萬貫均給諸州外不過共折米八萬二千餘石并前項米一十四萬石總而計之不及其田租所闕十分之一今來措置除蕭山僅能口給半月外其餘五縣以户計之日之所得固已不過一二升若以口計之則日之所得又不過一二合是僅足以使之皆知聖主憂勞憫恤不忍坐視之意而已若謂如此而便足以救其必死之命則固難指凖然遂欲以百三十萬之貧民盡仰官司口以升計麥秋之前九十餘日當為粟百萬石則亦非朝廷今日事力之所及也然臣竊謂有司之力誠有限量而聖主天地父母覆載生育之心則無終窮以有限之力言之則救䕶之切撥賜之多誠若不可以有加之今日然以陛下無窮之心論之則豈不欲使此邦更得數十萬石之粟以必救數十萬人之命其忍直以無可奈何處之而熟視其飢餓顚仆於前乎故臣輙敢厯叙其所見聞考驗之實本末如此而别具施行事目以干聖聽惟陛下哀憐財幸意迫情切言無倫次臣無任皇恐俟辠之至奏紹興府指使宻克勤偷盗官米狀照對紹興府諸縣去歳旱傷飢困及流移之民見今闕食昨䝉聖恩撥下米斛賑濟紹興府遂差指使保義郎宻克勤往平江府請取米一萬三千石分下上虞新昌嵊縣交卸賑濟今月初七日臣廵厯到嵊縣㸃檢據嵊縣主簿廸功郎葉梓申承本縣差往三界鎮交量宻克勤請到賑濟米一萬石依應躬親將本府通判承議郎呉津較量斛斗交量每斛比少米一升五合又令親隨斗子葉吉等徑自用斛行槩意在虧減升合兼其米盡用糠泥拌和却乃倚恃本府指使對衆抑捺意欲庇䕶船稍合干人作弊縁此未敢交量乞施行及據本縣土豪黄彦等列狀陳訴宻克勤押到米䝉告示前去般擔並係濕惡夾雜糠泥及每斗不應本塲斛斗去後折欠負累不便臣尋取到米様看視其米多係糠土拌和遂喚到斗子康勝對衆用斛量計每石少欠九升於内量出一斗篩簸内有泥土碎米一升二合并糠一升一合通約所押一萬三千石内折欠拌和之數計米四千一百六十石臣竊惟陛下聖慈天覆矜憫飢民給賜米斛徳意至為深厚然以臣所見嵊縣一帯飢餓之民羸困瘦瘠宛轉道路呼號之聲不可忍聞其不免於死亡者已不勝計其宻克勤乃敢輙將官米如此偷盗作賤使飢餓之民不得霑被實惠情理重害不可容恕除已牒本府通判承議郎呉津逐急用嵊縣斛斗交量發下本縣賑濟仍拘管宻克勤聽候施行及牒紹興府送獄根勘取見著實依法施行外欲望聖慈先將本人重作施行仍令紹興府疾速根勘監追所盜米斛送納入官庻副賑濟奏廵厯合奏聞陳乞事件狀臣自正月四日起奏紹興府迤邐廵厯有合奏聞陳乞事件今具下項欲望聖慈檢㑹臣前兩狀所奏及今所陳事理再賜官㑹三十萬貫速行舊歳之賞痛減度牒之價庻幾儲備稍豐官吏更敢放手救活飢民其作捺湖埂亦係一縣新年農事利害之大者并乞特依所乞早賜給降不勝幸甚一臣初六日到三界鎭見有餓損人口頗多其死亡者亦已不少七日至嵊縣八日至本縣清化孝節鄉所見尤多飢羸尤甚據其稱説皆自八九月來闕食至今其死亡者不可勝數道殣相望深可憐憫臣謹已再於昨䝉給賜錢内取撥五千貫付紹興府通判呉津令收拾賑給嵊縣新昌及三界鎮一帶病困之人庻幾稍獲安存未至一向死損但恐錢少不足支用伏乞睿照早賜接濟一臣初九日入諸暨界所有縣之東南一帶山鄉所見病損人數絶少問之鄉人云是去年稍得收成去處却見令佐鄉官稱說縣北湖鄉一帶接連蕭山病死人多不減嵊縣臣亦再撥給賜錢五千貫付紹興府通判劉俁令收拾諸暨蕭山病困之人及根刷到勸諭上户賑糶米未曽出糶之數尚有四千餘石已牒通判劉俁及本縣催促赴塲增添人户每户除單丁外更與一口收糴及有人户陳訴乞借官錢及早修捺湖埂緣臣曾與帥臣王希呂連狀奏乞給降米斛未䝉應副今恐失時浸損二麥兼廢農工已逐急於給賜錢内借撥三千貫應副所有三項錢米雖已支撥尚恐數少未足支用伏乞睿照早賜拯濟一臣十三日入􅄔州界以後事體續具奏聞大抵􅄔州災傷比之紹興府分數頗輕州縣措置亦似稍有倫理伏乞睿照奏上戸朱熙績不伏賑糴狀臣廵厯到􅄔州界一路飢民頗少本州見將元撥賜米及勸諭到上户米斛置塲糶濟逐日煑粥以給城市鄉村艱食之人亦已頗有倫緒臣自入境以來每過米塲必親臨視閲其文厯校其升斗小有欺弊即行懲戒至十四日到金華縣孝順鄉第十二都地名十里牌有朱二十一米塲本塲即無人在彼糶米據貧乏人户俞九等列狀哀訴本鄉田產盡賣與豪户朱縣尉去年荒旱本縣給厯令就本都朱二十一米塲糴朱縣尉米養濟且九等每日往來竝不曾般米到來致一村人民飢餓其朱縣尉為見行司到來却於沿路散榜詐稱糶米施粥及據金二等陳訴朱縣尉雖在十四都糶米即與朱二十一塲隔逺二十餘里本人令幹人許浩用使私升及濕潤粞碎糙米及將人户官給厯頭擅自批鑿每七升減作五升五升減作四升又有收下厯頭不肯付還百端抑遏無處告訴又據人户周楊朱子智等衆狀告訴朱縣尉典買産業累年白收花利不肯批割物力皆係出産之家抱空代為送納臣尋令人暫喚朱縣尉取問本人倚恃豪强不伏前來遂委金華縣尉追發據縣尉廸功郎陸適申依應追喚朱縣尉係極等上户居屋三百餘間倚恃豪勢藏隱在家不伏前來竊緣本人家僕叢衆全無忌憚臣又已行下本州追發亦復不到臣照得朱縣尉係修職郎朱熙績元因進納補受官資田畝物力雄於一郡結託權貴凌蔑州縣豪横縱恣靡所不為本縣昨為第十二都無上户米斛可糶就近分撥本人在第十二都朱二十一家置塲糶米其朱熙績輙敢欺凌縣道不復發米前去洎至臣廵厯到彼又乃詐出文榜稱就十四都出糶致得一塲糴米人户無從得食其在家所糶又皆減尅升斗虚批厯頭姦弊非一所稱散粥亦是虛文日以一二斗米多用水漿煑成粥飲來就食者反為所誤狼狽而歸凡其所為無非姦狡切害之事及至官司呼喚又敢公然抵拒首尾三日不肯前來若使人皆如此荒政何由可辦欲望聖慈特降睿㫖將朱熙績重賜黜責以為豪右姦猾不恤鄉鄰之戒奏廵厯婺衢救荒事件狀臣昨按視紹興府嵊縣諸暨縣已具事目奏聞訖續於正月十一日入􅄔州浦江縣界厯義烏金華武義縣由蘭溪縣界入衢州龍遊西安常山開化江山縣今有合奏聞事謹具下頃一􅄔州諸邑蘭溪水旱相仍被災最甚金華次之而境内馬海白沙一帶為尤甚其他又次之惟永康一縣為稍輕大槩通計比之紹興府諸邑事體殊不侔然諸縣措置不無乖謬以臣所見武義坊郭已有飢民而訪聞蘭溪金華山谷之間流殍已衆幸今守臣錢佃頗能究心料理專委通判一員往來檢察請到鄉官五員日夕商議計當不至大叚闕敗臣尚恐其所有錢米不足支用已於昨䝉聖恩所賜錢内取撥台州處州義倉米錢五萬貫應副本州糴米糶濟伏乞睿照一衢州常山開化水旱最甚江山次之西安龍遊又次之通計其實不減􅄔州但緣當時州郡吝於檢放常山開化係災傷極重去處而常山所放僅及一分六釐有竒開化又止一釐一毫而已故文案之間但覺災傷輕可而兩邑之民隂受其害不可勝言聞得歳前死亡已多今之所見羸餓之民亦有甚於􅄔州諸邑者西安雖輕於兩邑而聞芝溪一源向來俞七俞八作過去處人民已極困悴加之守倅皆已逼替吏民解弛無復條貫臣竊憂之已輙行下本州所得朝廷許撥義倉米五萬石内將一萬石專充賑濟專委曹官兩員鄉官三員分縣措置收拾飢餓羸困之人貎驗支給伏乞睿㫖一􅄔州諸邑有災傷稍重而廵厯未到處回程當一一㸃檢别具奏聞伏乞睿照晦菴集巻十六欽定四庫全書晦菴集巻十七宋朱子撰
