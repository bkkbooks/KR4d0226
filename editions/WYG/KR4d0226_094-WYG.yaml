front:
  text: 九十四
  hash: sha256:1ace8b6c089bdb7ede4c1bc534525352a6371c9394c47ebb4886edccbbbbd607
body:
  text: 宋朱子撰墓誌銘直顯謨閣潘公墓誌銘公諱畤字德鄜姓潘氏婺州金華縣人曾大父諱宗簡大父贈中奉大夫諱祖仁父贈通奉大夫諱良佐始以儒學教授諸弟皆從受學而中書公良貴遂以清直致大名公生頴悟少長莊重如成人既孤中書公愛而收教之欲使後已公以親沒無所受命辭乃任以為登仕郎為娶李莊簡公女李公亦器許焉初調袁州分宜主簿躬校簿書蚤夜寒暑不少懈田里頼以安監臨安府造船場部使者以為能多屬以事皆迎刃立觧且不以上官喜怒為向背御史杜莘老聞而賢之欲引以為屬㑹去不果公亦未嘗求薦而當路争知之改通直郎宰相畱官中都公固求奉祠以去已而差提轄雜買務雜賣場嚴禁防謹次第大官要人無敢干以私皇城邏卒挾恃干紀公按致其罪不少貸人為公危之然公以廉白自將其黨雖怨之卒無以報也終更宰相又欲留之不可遂出知興化軍莆俗險健多訟公至究其利病施置之方為科條以屬吏簡易嚴宻無所偏倚郡以大治時即學宫召諸生而教飭之遂無敢以事至廷中者女官道士託妖妄求勅賜以表其居挾簽樞張説書屬公上其事公不可説復喻意部使者以撼公公卒不為動嵗旱禱雨不應公慮獄有寃亟徃訊焉果得二人破械遣之而歸其獄于吏車未及旋大雨立至郡故有洋城陳霸二斗門及木蘭陂溉田數萬頃嵗久廢壞公為興築壯固牢實民至今詠歌之適嵗荐饑募客舟予錢博糴而寛其期人始莫喻其意既而糴者得以其間徃返一再然後及期則糴價久已自平而民不饑矣人始服公為有謀也請蠲嵗輸丁米錢千萬久之未報輙移屬縣緩其輸漕司不悦督愈峻公訴于朝竟得罷乃已召還賜對公言郡縣者朝廷之根本而百姓又郡縣之根本也今不計州縣之事力而一切取辦又不擇人材之能否而輕以畀之欲本固而邦寧其可得乎上善其言欲畱以為郎而公有所不樂力請外乃除提舉兩浙西路常平茶鹽公事至則罷中都饋餉之不如法者豪貴已多不悦而平江庫錢失漏守因是誣富室以取償一郡大擾有死者公檄罷之守以是怨隂以禁兵紿白直而訹它司上其事公坐削一官移江西未行又移江東入境發贓吏一人故相有為請者不聼竟按逐之列城震聳行部所過延見父老使縣别為輩以次召問所疾苦及吏治得失戒州縣毋得除舎館飾供張鈐鍵吏卒所過肅然父老歎息以為未始有也池守趙粹中恣横不法遞卒廪給不時有盜發邉奏竄匿名書以訴者詔以屬郡粹中恐怒捕繫卒汪清訊治强服亟奏誅之刑獄使者丁時發過郡聞其寃取具獄閲之將發其事粹中遣其屬突入傳舎即几間奪去嫚罵陵折一郡大駭公時出按旁縣馳歸與時發共劾之㑹時發改使湖北事久不報而公繩之愈急章三上遂與俱罷後得真竄書者朝廷始罪粹中而恤清家尋復起公提舉荆湖北路常平茶鹽事入奏為上言比年戸部調度不繼督賦苛急監司州縣希意避罪不暇復以百姓為心下失人和上干天變其原在此願詔有司悉蠲州縣民間舊逋而内出禁錢以補上供之缺其招衛卒除戎器皆許留經總制錢以充費不則且止以俟他年更詔大臣選官置􅈰考校紹興以來出内之㑹参互省嗇繼續補助為經乆計常使户部支計有餘則州縣寛而民力紓和氣應矣上聞公言歎息稱善且曰朕於户部應副多矣民間逋租内藏積乆亦已蠲放卿言州縣擾民之事朕亦聞之葢所謂黄紙放白紙催者若已蠲之而又責于户部此誠何益正當一一與補還耳因諭所以寄任之意甚悉宰相猶欲留公典選公力辭之部承水旱之餘教喻懲戢安集賑捄曲盡其力民又病疫則遣醫視療家至而日課之以其死生多寡為殿最由是全活者衆俗喜焚尸公敕諸縣各治叢冡焚者有禁民莫敢犯湖北多陂澤官不障故使貧民得漁其間頼以食者甚衆既而或以輸租自占而専其利則民固已病之至是議者請復増租而吏緣為姦盡斥貧民所漁以給富家失業狼狽者不可計公為申明其法悉以還之未㡬改南路提㸃刑獄公事將行猶為條奏本道荒政數十事詔悉施行行之日士民自言諸司乞畱公者以千數出境猶遮道攀戀涕泣不肯去有盜殺人而誣指賈人梁晚四為罪首論當殊死前後七推具伏錄問輙不承最後至公親鞫則方盜殺人之時晚四實在他所参騐行由印歴晷刻不差乃得其寃狀即理出之而劾官吏失入者上大喜可公奏下諸路以為法又奏新法獄經再鞫詞或少異必取初鞫官吏承伏而并按之追逮徃返或淹旬嵗再鞫官憚于留滯雖或有寃亦弗敢白以此獄少平反枉濫者衆請得復用舊法上亦可之除直祕閣知廣州兼主管廣南東路經略安撫司公事將行猶奏郴州度用不足多横賦以供軍馴致巨㓂前後非一請下漕司通融補助以息後患廣東地接郴桂汀贑之境四州之民嵗一踰嶺貿易折閲即相聚為盜大羣至數千人公入境適捕得渠帥八人即斬以狥曰三日而去者吏不得格期外不去復捕如初於是皆散有梁氏兄弟者招納亡命前後殺人無數而掠其貲以致富交通州縣吏不敢詰民患苦之號為四彪公擒捕誅殺汙瀦其居宅盜望風破膽大奚山斗入海中㓂攘所聚雖良民亦以漁鹽為命急之則散入賊中不可禁所從來乆至是新置都鹽使者鋭欲禁之檄水軍逐捕公曰水軍専受帥府節度非它司可得而調也且争小利起大盜將誰使任其責耶卒拒法不為發良民既得少安乃隂募其酋豪使以捕賊自効由是盜發輙得有功者為奏補官闘死即官其子而重責其坐視不赴救者官屬不幸死者厚賻遣歸存沒老稚無一人流落如是者三十餘家士族女失身非類贖而歸之上聞公究心獄事詔特轉朝議大夫進直徽猷閣知潭州安撫湖南復值凶嵗精禜禱廣咨詢蠲税租弛逋負民得小康饑不為害飛虎軍驕横不可制有恃醉挾刃傷人者案軍法誅之於是帖服無敢犯明年召還以疾辭進直顯謨閣知太平州未上又明年除尚書左司郎中竟辭不就乃申太平之命未行而以疾卒享年六十有三累官中大夫爵金華縣開國男食邑三百户其配李氏諱孟琰字文靚孝友聰明識趣髙逺莊簡公南遷時年未及笄已能刻苦自厲甘忍貧薄周恤親黨雖凶事無所憚既歸公諸妹多未行奩具所須推予不少靳奉祭祀必誠敬事以公義衣必親製食必親嘗藥必親煮從公居官未嘗問外事買市物而門内之治雖細必親條理精宻如嚴官府毎罷官治􅏻皆一日辦警敏絶人而不為苛察治家嚴整而御下有恩縫紉必精潄澣必潔而不為組繡華靡與公言未嘗以爵秩進退為欣戚其教諸子亦然有識髙之累封令人後公三年卒子男友端友恭皆力學有志操友端嘗以進士髙選今俱為從事郎女友松嫁太常寺主簿史彌遠孫男履孫將仕郎女二人皆幼友端等葬公紹興府上虞縣永豐鄉張澳之原以令人祔公少從中書公學長壻李氏又得莊簡公為依歸中年遊張敬夫吕伯恭間切劘不倦晚嵗讀書厲志彌篤自為小官即以治行有聞治郡先教化而訟獄期㑹無不謹務施舎而出納纎細無所遺興利除害皆有成績為部使者廢置不避權門紏劾不憚大吏咨詢撫摩無隠不達至典方面養威持重務大體不細苛精擇丞史随才授任治民訓兵禁姦除暴無一不可法者葢嘗自謂吾之為治主于寛而不使有寛名輔以嚴而不使有嚴迹唯其綱維總攝而脉絡通流是以坐走百吏而我常無為也有所弛張必先究見利病本末然後出令耻為姑息小恵以掠虗譽毎言欲寛民力先恤州縣州縣足則科斂自息而田里安矣謂𣙜酤茶鹽非古法不忍盡以律令從事於犴獄尤兢兢然亦未嘗縱釋有罪也所至必問人材興學校潭州嶽麓衡之石鼔皆一新之學者用勸薦士唯公論是與不私親故不受請囑有所薦輒閉閣草奏勑吏莫敢言雖被薦者亦事下然後知伯恭聞而歎曰潘公薦士可謂盡善盡美矣所部水旱盜賊無巨細必以聞以祥瑞告則抑而不省其愛民如子馭吏如童僕按寮屬如朋友惜官帑如私財治公事如家事事有不便于文法輙身任之不以累其下是以人争為盡力所至稱治近世士大夫間號精吏道有科指而寛猛適宜大小中度者無出其右其持身尤謹飭言笑有常度其仕進不即人而人即之然有小嫌輙避不處曽覿貧賤時嘗以詩文見及貴絶不與通使人來致殷勤輙不報以書請事亦不從歸自江東環堵蕭然彈琴讀書有以自適未嘗一與諸公貴人通聲問晚嵗召還葢將有以處之而公病矣亦㑹有謀傾宰相者隂尼之遂竟不獲究其用論者莫不歎息而公處之超然少喜學書得歐顔楷法勁挺嚴宻如其為人雅不信浮屠詭異之説嘗著石橋錄以斥其妄䘮祭不狥流俗平居無所嗜好既病神明不衰起居莊敬如常時顧諸子誦曽子易簀時語而絶是則世之所以知公者猶未足以議其方也熹從公遊雖不乆然相知為最深友端等又來學故于其葬來請銘不得辭也銘曰士患不學學患不行口榮身悴物重身輕偉歟潘公夙有竒尚蹈履宻微老益堅壯湖清海謐百辟儀之歸歟憊矣道固委蛇唯其徳學知者葢鮮我銘其幽以告悠遠敷文閣直學士李公墓誌銘公諱椿字夀翁洛州永年縣人曽祖安祖泰皆不仕父升進士起家為吏以廉正稱累官朝奉郎贈大中大夫母楊氏趙氏張氏皆贈碩人靖康之難汴都不守大中公以衛父見傷父子偕卒公年尚少藁殯佛屋深竁而詳識之奉母南走湖嶺間備嘗艱窘而竭力以養母子相慈孝人不知其趙出也用遺澤補官調潭州衡山尉擿姦發伏人不能欺决事問理如何不為勢奪再調桂陽監司理恭軍盜發臨武將尉縳六十餘人以獻公辨理之才六人抵死它所活亦甚衆以數争獄事失守意求去不獲守悟乃更相知建復臨武縣盜以不作者二十年徙衡州軍事判官守與部使者交惡公諌止之不聼後闔郡坐劾去公獨免邵民有告兩人為盜者郡得其一將寘之法而囚家訴寃公被檄鞫之使召告者則無其人問其同徒則已斃于路矣閲故牘則斃者是夕乃在他州有左驗囚乃得釋徙寧國軍節度推官豪民執偽劵取陳氏田陳父子斃于獄妻又將斃矣公辨其偽奪田歸陳氏金人將渝平亟白守將修城壁葺軍械料民兵甚整人恃以安張忠獻公節制兩淮軍馬辟凖備差遣及拜宣撫都督皆以自随葢公始見胡文定公退與其諸子遊從容言曰椿願天下之人無不唯是之求耳胡公聞而異之其子仁仲後見公所論富川六事亦謂有經濟才張公知之故取以為屬諉以經畫淮甸事公為奔走兩路綏集流民布置屯兵察廬夀軍情相視山水寨險要凡四五反詳審精宻所助為多它如謂督府當鎮無為請制戰車以易拒馬之屬未及行者尚衆至于事有不可則固未嘗為苟同也宣司訖事議請第賞官屬公曰今未有功而遽求賞已非所宜且先將佐則無以勸士卒溥及之則無以待有功皆不便張公然之為止不上後諸將有以北討之議聞者事下督府將從之公在外亟奏記張公曰復讎討賊天下之大義也然必正名定分養威觀釁而後可圖今議不出于督府而出于諸將則已為輿尸之凶矣况藩籬不固儲備不豐將多而非才兵弱而未練節制未允議論不定雖得其地不能守也書未入而師已行則又言曰大將勇而無謀願授成筭俾進退可觀毋損威重既而果無功張公悔之一日喟然歎實材之難得公徐對曰十室之邑必有忠信天下之大豈可厚誣誠欲致之惟不惡逆耳而甘遜志則庻乎其肯來矣張公復拜右相公知事不可為勸之去明年春又出視師公曰小人之黨已勝而公無故去廟堂此必為復申前議甚苦張公心是之而自以宗臣任天下之重不忍决去計也未㡬果罷公出幕府得監登聞鼔院在職數月有所不樂請通判廉州以歸未上召對首請復廣西州縣運鹽而罷折税和糴招糴之擾二請無汰去軍中百戰之士以壯軍勢寛郡縣三請以墾田為課最而更賦法改禄令多以榖帛少以錢皆當上意除知鄂州再對請令墾荒田者三分其租三年乃増其一三増而畢輸請罷經總制錢悉為上供一其賬目以省吏姦上可其墾田説至鄂行之復户數千曠土大辟鄂地重而守權輕賦薄而用廣公交際以誠調度從約未㡬遽振而贏嚴火備禁姦盜皆有方略軍民之爭一决以法主將悦服移廣南西路提㸃刑獄公事廣西舊遊習其民情之欲惡有所更革不戒而孚官吏有罪免之而已無所窮治未竟之獄一以輕平所縱釋數十百人盛夏按行慮問諄悉退閲文書一夕千紙奏罷發運司所復昭州金坑請禁仕海南者無得市土物事皆施行移荆湖南路轉運判官俾入奏事行及近甸時宰忌之促便道之部適嵗大祲官配民備賑糶民爭糴米踊貴復抑米價商船不來公至損配數除米估人用不饑奏請蠲嵗糴代發二分米出緡錢權楮幣和糴米宜用市直使毋太賤傷民人以為便自為小吏時已病監司行部從吏卒擾州縣至是當出輙前戒吏具州縣所當問事目以行而罷諸常從者所至州取吏卒使令凡以例致饋一不受自是人多效其所為言事者亦請下諸道以為法召為吏部員外郎復論廣西鹽法上是其説俾條施行之目以上遂改法焉其後二十年間法雖屢變而折苖和糴招糴之擾竟罷民頼以安除樞宻院驗詳諸房文字小吏持南丹莫氏表來請于宜州市馬因簽書張説以聞公語説邕遠宜近人孰不知其前日故遷其塗豈無意哉况今莫氏方横乃欲為之除道而擅以互市之饒誤矣小吏妄作將啟邉釁請論如法説又議諸郡招軍宜立法以課殿最公語之曰贑吉建劍等州民衆俗悍雖多募不難致淮漢荆湖凋弊未復若限以額恐有抑捽之擾積二事忤説説怒語人曰吾乃無一可耶公聞之求去上問知之亟令慰喻安職未㡬説免乃遷公左司員外郎宻裨國論深抑吏姦號為稱職嘗言三衙御前之兵有用當益諸州廂禁兵無用當銷銷之之術死亡勿補二十年之後無復無用之兵矣它時寧壹以御前兵分屯諸州可也始公在督府嘗建軍民雜耕之䇿既而詳其利病乃欲盡捐以予諸軍使嵗分半卒以耕而益其食至是亦為上言甚悉尋復請外除直龍圖知隆興江南西路安撫避祖諱改荆湖南路轉運副使至未一月移都大提舉四川茶馬俄復歸故官建請十三事同日報可大者減桂陽軍月椿錢嵗萬二千緡而損民税折銀之直民刻石記之免户部配鬻乳香諸路並得免訖今不復配衡嶽廟火公言廟洊火天寔厭其非制請毋復屋而築壇以望用遵禮典省財力不報茶㓂作帥以失律免公攝其事時江西兵已集㓂勢窘謀復南走公亟收散亡分守要害㓂不能越故江西得蹙而擒之姦民有規聚徒應賊者公募土豪捕其魁桀誅之餘悉散走事平請于朝嵗分卒戍産茶處盜以益衰又言茶商買劵于官而復市茶于園户與鹽商買劵而即受鹽於官者殊科今一其賈是以茶商獨困而私販多嵗額不敷而民被擾甚則闘􅐁攻刼為羣盜前日之事亦可驗矣請損其直以便事而有司吝出納乃析小劵以一為六實無所損而重以煩費人益病焉召還見上首論軍政之弊曰屬者鄂渚大軍三千捕茶㓂數百亡失過半小㓂尚爾如大敵何臣嘗求其故矣大抵將不得人馭衆無術廪食既薄又恐侵漁老成習戰之士一以疲老被汰則挈其强壯子弟以去軍中惟有抑勒寄招之人又皆不習戰陳而不可用至于待遇復不均壹使吾老舊之卒自傷其不及歸正之人而歸正者又自以為待之不如俘虜之厚也誠亟圖之反此數者則軍聲振而國勢强矣因復力陳茶法之弊乃得頗増鹽數而公意未已也政府白擬司農少卿上自用公為正卿京師月須米十四萬五千石而省倉之儲多不能過兩月請給南庫錢以足嵗糴之數又糴洪吉潭衡軍食之餘及鄂啇船并取江西湖南諸寄積米自三總領所送輸以達中都常使及二百萬石為一嵗偹乆之不行公以不得其職求去不獲又以白宰相曰今豐儲倉南上庫皆移東就西以眩主聴而使朝廷户部自分彼此告借索還有同市道願革而正之凡百政事各付攸司委任而責其成則名正而實舉矣臨安擇守公在議中執政或謂公於人無委曲上曰正欲得如此人遂兼權臨安府事守比非其人日走權門奉約束耳民事悉付吏手吏得狥勢為姦公既視事親閲文書躬自予决要人請囑一無所聴府故以宦者為承受公事守至例謁之公不徃怒因喻㫖故遷延以相沮傷公白政府無所用承受請罷之市有火近巨璫所居舎怒不專挾護遣兩卒喧厲公所公奏其狀下兩卒大理獄大理觀望覆逮府吏卒公即家居自劾詔杖兩卒釋府吏卒勿問僧倚豪貴立私宇至百數㑹有以姦穢事覺抵罪者因悉以令沒入之而逐僧還所𨽻事在府三月竟以權倖不便亟觧去而民至今稱之公在朝過事輙言執政故不悦及是轉對又言易以九居五六居二為當位而詞多艱以六居五九居二為不當位而詞多吉葢君以剛健為體而虚中為用臣以柔順為體而剛中為用君誠以虗中行其剛健臣誠以剛中守其柔順則上下交而其志同矣陛下得虗中之道以行剛健之徳矣而在廷之臣未見其能以剛中守柔順而事陛下者也願觀象玩詞求剛中之臣遠柔佞之士以應經義起治功由是執政滋不悦沮公茶議使不得行公益論事自若乆之求去復除江南西路轉運副使陛辭上曰卿未可遠去改知婺州進秘閣修撰上意猶欲留公而公亟言軍政敝武偹弱必誤事不合㫖乃之郡居數月郡以大治㑹詔市牛筋五千斤公奏一牛之筋才四兩今必求此是欲屠二萬牛也上悟為收前詔且思公前言召以為吏部侍郎公又為上言民貧多盗非國之福願詔中外有司各條所部冗費可省者以聞上善之而亦不果行也在吏部與吏史約予奪命士所陳身計當悉䟽著令堅定其可否乃行既行而有遺若未允者重坐吏以此不能肆其姦秀邸館客特注州掾公言其人未試且衝待次人請更受員外置不簽書公事執政建議欲有所私而託以吏部所啟公言是事雖小所闗則大請究治上嘉納焉上親慮囚命公與知閤門事張掄次比其事以聞掄自以官承宣使欲列名公右公不可白之丞相亦右掄公奏言臣固知承宣使序權侍郎上但使事以閤門副侍郎耳故所被㫖臣實先掄唯陛下裁幸上不直掄罷之公以上常獨㩜機務而羣臣偷安苟免乃按易象為上言乾首坤腹而六子之卦各象其事故聖賢之訓皆以君為元首臣為腹心股肱耳目喉舌各有攸主今君勞臣逸非治之體且使出令用人或有未善則過歸于上而政亂于下願觀易卦之象體乾剛之健而使腹心股肱耳目喉舌之臣各任其職且察臣下有遊近習之門者嚴禁絶之而益以公道用人名節取士則士風振而人材出矣一時弊事如衛兵壊僧廬掠都市而朝廷不深治言事官彈劾不勝去職而取從風聞者坐黥𨽻軍中結邏卒開鋪以摇主將皆極言之又建白凡選監司若大郡守宜使侍從集都堂公舉所知而宰相㧞其尤者以聞皆切治體又請凡應輸義米者皆置倉鄉社以藏而㓙嵗還以予之亦便于事然皆不得行獨衡州監牧諸軍回易竟罷如公言又嘗抗言徃者閹寺之盛卒階靖康明受之變今復盛矣請抑制之不使寖長官置蠺室限其進子之數官髙者使補外而門禁宫戒之外它毋得有所預嚴士大夫兵將官與之交通之禁則上下俱安而禍變潜弭矣上聞靖康明受之語嚬蹙久之曰幼亦聞此因納䟽䄂中以入最後極言邉備不可以不豫如欲保淮則楚州盱眙昭信濠梁渦口花靨正陽光州皆不可以不守如欲保江則髙郵六合瓦梁濡湏巢湖北峽亦要地也其形勢之緩急兵力之多寡計䇿之利鈍皆歴陳之如指諸掌又論應城四達之衝宜屯一軍以為襄陽近援荆南兵戍襄陽宜徙其家屬營江南毋使為虜所襲以病請祠不許而請益力乃除集英殿修撰知寧國府數日改太平州賜尚方珍劑以遣焉當塗重地葢以一靣為寄公因自請以時行視圩垾有機事得以宻䟽直達上皆從之既至力圖上流之備請募選横江水軍千人以為濡湏東闗采石聲援采石水軍舟多卒少宜以步卒之半為水戰之用使可舟可陸徃來巢湖為必保濡湏之計而凡沿江津渡宜使皆𨽻南岸比來和州利商筭輙穿支港以内舟首尾皆屬之江此為自隳天險邉民盜虜馬或為它盜來歸者有司不問甚或賞以勸之皆不便上納其言亟命塞港它亦頗施行居年餘年六十九即上章請老上初惜其去三請乃許以敷文閣待制致仕越再嵗上以湖南兵役之餘公私困敝上下恫疑思有以鎮安之謂公厚重可倚復起公以顯謨閣待制知潭州荆湖南路安撫使私禮免繫帥銜以避家諱公雅無復出意再辭不獲乃勉起至無㡬何悴者蘇疑者釋氣象一切如盛時復税酒法人以為便前此官市民物不予直者悉為償之斗酒千錢不妄用故人賔客薄少周助率以私錢州宅火徐葺之不調一夫而復其舊諸縣有羨賦州竭取之縣以不可為公歸其半曰嵗饑用不足少須之當悉歸矣嵗旱賑廪勸公蠲租十一萬給常平米二萬糶又數萬民以不流死飛虎軍新立或以為非便公曰長沙一都㑹控扼湖嶺鎮撫蠻徼而二十年間大盜三起何可無一軍且已費縣官緡錢四十二萬民財力不可計何可廢耶亦在馭之而已異論乃息郴民輸租吏所加賦㡬再倍力請裁之三去其一民以小寛前在兩州再言配法之弊請使凡應配者秪坐加役流法髠鉗居作三年而免毋或黥湼使得自新免竄逸免逓送廣至恩召和氣至是計長沙一嵗所遞配卒千二百五十餘人復申其説朝廷為下其事而議者狃常或笑以為迂不能革也未滿嵗復告歸進敷文閣直學士致仕朝拜命夕登舟歸老衡陽故居野塘之上淳熈十年十一月旦日薨享年七十有三公生十有五年避地南來貧無以為養不得専力于學年三十始學易兩鞫郡獄須慮問者累旬不至因得晝夜研考乃若有得遂樂玩而沒身焉其言于朝廷措諸行事無適而不於是也尤惡佛老邪説在臨安被詔擇靈隠寺主因復于上曰天地變化萬物終始君臣父子夫婦之道性命之理死生之故鬼神之情狀易盡之矣曷為求之他他時僧或宣對後苑復䟽其失請崇先王之道正人倫之本漸汰游惰歸復農桑其在當塗申法禁戢誑誘出教喻民語極諄悉至是病革題詩一章以示諸子沭浴正衣巾而逝人以是益知公之于易非徒誦説而已也公莊重簡淡嶷然有守泊然無欲喜怒不形見于色故人不可得而親䟽而中夷易平直廉不近名介不絶物應事存心悉主于厚平生未嘗失節于權倖然非有意以矯厲為髙也在六院時淵覿寵方盛同舎日走其門公耻之自引去晚登從列覿己位使相竟不徃謁它一二輩職事所及輙與忤又嘗為上指言其姦其徒相與聚而訕公有言太尉獨不奈李某何者其人復之曰誠無奈其不顧官職何耳頼上知公深屢歎其樸直故小人無以行其計公于中外鉅細知無不言其尤致意焉者邉備軍制賦法禄令茶鹽屯田經總制錢揀汰歸正配法也葢自少日親罹兵難復歴邉事盡悴州縣乃登守府乃踐省寺於大小之務皆身履而心喻焉非如它人剽聞掠説而藉口嘗試者也其從違忤合雖不可常然持其見終身不易言之懇懇至于四三其才通其識遠不阿主好不詭時譽無書生之輕俗吏之陋其所藴蓄使得宣究斯世其庶乎公娶龎氏早沒繼室以韓氏有賢行夫婦相敬如賔皆贈令人男二人毅夫承務郎後公三年卒正夫宣義郎廣南西路提舉常平司幹辦公事女二人長適朝散郎提舉荆湖南路常平茶鹽公事臨川吳鎰次適邯鄲劉仝孫男八人大有大來皆修職郎大謙廸功郎大用大臨大鼎大觀大鼐未仕女二人尚幼公居家有常度不情替亦不嚴厲約不戚豐不泰終身一致在官儉而法官燭不入中門家人不用公家供張初臨有新帟幕必撤而藏之存以迎新去之日不私一物焉家至今無有敝帷葢凡例所饋餉私不應法之入率積之公帑以供公不應法之用餘則委置而去門内化之落然清素素篤風誼嘗僚章貢李爕死于安陸有女棄民間公贖而育之韓令人愛之如己子以歸士族初仕亦嘗從衆投上官爵里狀心怵然不寧自是不干請嘗獲盜委曲可以被賞置之弗問既循資則曰吾老于職官耳年五十有二乃改京秩自是出為時用然未嘗忘歸志未始携家入中都亦不至畿郡仕五十年上為人主敬信下為士大夫尊慕無纎謗微累出入中外數四其入也皆以特召其出也皆以力請年至亟歸不得已而勉起起又竟歸以終素志而沒出處之義特為全盡以是年閏十一月十一日葬于衡州花光寺之山後二里與韓令人同穴以葬日廹不及識而吳鎰狀公行大略如此後十年正夫乃以其銘見屬熹不足以銘公然熟公聞望葢乆中間一再通書荷公見予良厚今又得吴狀及公平生議奏讀之觀其行身如履䋲蹈矩無一事之不合于理論事如絲麻穀粟無一言之不適于用而其忠厚純篤之氣又有藹然溢于行事言語之外者未嘗不廢書三歎而悚然心服也乃最其事而系以銘銘曰大易之藴㣲妙不窮孰窺其表而測其衷懿彼李公心潜躬詣逮其渙然隠顯一致進矢于廷退諗于私迎知失得不假蓍龜閔天越民忠君及國在古有評曰庶常吉胡不百年以究其施長言鼔缶奄吳其離衡山之陽非其故土竁而弗銘曷詔終古滕君希尹墓誌銘君姓滕氏諱洙字希尹世家徽之婺源葢莫詳其始所自來中間有見故翰林學士逹道者扣之乃知與東陽之族同原而亦不能言其遷徙合散之所由也君曽祖谷祖為父恂皆不仕而叔父愷蚤以文學論議有聞于時起進士官信之户掾以卒士友惜之君幼聞家學緒餘長從鄉先生俞君宋祐及一二知名士遊益務記覧其蓄甚富為舉子文亦精緻有程度而數以不偶即棄去不復為獨教諸子為學而不専為場屋計平居厲以篤志力行之訓甚悉及二子登科從仕則又時時為道平日閭里間所聞見情偽得失之變以開曉風切之以故二子皆以能自樹立有聲州縣間晚得末疾猶手抄孔孟言仁梗槩一編日夕玩誦而又大書躬自厚而薄責于人之語于壁以自警其好學檢身雖老不倦如此病革却醫藥手書死生有命富貴在天兩言以示諸子而卒紹熈四年七月二十七日也年六十有五夫人胡氏有賢行前君二年卒五男子璘從政郎鄂州州學教授珙廸功郎寧國府旌徳縣主簿瓘珵皆業進士琇前卒二女子嫁進士程萬頃程槱之孫男七女四君為人恭儉質實遇人無少長俛首接語如見大賔凡世所謂少年豪習饒樂放縱事未嘗一接于身自奉甚薄終身如一日不以豐約易其度居家事親誠心孝愛委巷之禮薄俗之態雖於强之不忍為也兩逢慶夀㤙或勸増年以應格君不可或問之則曰欺君而受爵亦何榮之有哉有士族女未齓落娼家君謀贖之娼儈知君貧立偽劵髙其直以難之君未有以為䇿也㑹璘預薦書郡致金錢若干為勸駕禮盡以予娼得女嫁之不復詰其偽縣宰張安中賢之為書其牒以表焉君之為人大抵如此嗚呼是亦可為善人君子矣然其志與材既不得少自見于當世其夀命乂不得究于髙年獨諸子既能順承其志而又將有以顯揚之則人將以是為天之報施果不繆也璘等將以明年五月二十四日合葬君夫人於萬安鄉龍陂四牡之源使珙奉吉州錄事恭軍程君洵之狀以來請銘余以疾病乆衰謝不能而珙請益堅余竊哀之乃為次其事而銘之銘曰行之躬學之力積之豐施之嗇謂天夢夢請視斯刻承務郎李公墓誌銘乾道六年成都府路轉運判官權安撫司事趙公説知漢州事拜表上言其州人李君之行義聞于朝未報而四川宣撫使王炎安撫使薛良朋轉運副使王璠判官趙不􅖊相繼表上孝宗皇帝聞而嘉之乃九年閏正月丁酉制曰務穡勸分有司之為政發廪賑乏仁者之用心爾以布衣居于下土因年饑之不足動義槩以有聞屢出私藏多所全活與計偕而已老從官牒則徒勞勉服官榮歸教鄉里可特授廸功郎致仕里之人髙君之行而飽其惠既相與嗟歎而詠歌之君沒之後十有七年其孫寅仲入袐書省佐著作㑹進史得増秩因請貤以及君於是又詔特贈承務郎人以是益知君積善之報為未艾也又後數年著作君乃自其家使人以書致君行述一通于予請以是銘君之墓予故未得交君父子間又以病廢書久欲謝不能而惟閩蜀相望數千里著作君乃近舎其鄉之先生君子而遠以屬我是豈可以虗辱哉乃最其書之言曰君諱發字浩然其先隴西人唐明皇帝逃難入蜀過漢小留其近屬之從行者因或家焉君其後也世居什邡縣邕順鄉後徙長原曽祖保榮祖有質父世通皆隠不仕君資禀髙邁自少俶儻不群讀書有大志傲睨場屋謂功名可立致以鄉貢入辟廱補内舎乆之未第宦者梁師成方貴幸士之不得志者類資以得官或以是怵君君正色拒之京師被圍䟽陳大計不報即棄禄牒歸養于家其先府君晚厭人事常獨居一室家務一以諉君君節衣縮食瘠已以崇義買書闢館迎修士以教子孫而于忠孝立身之大義尤致意焉不専為覔舉干禄計也親疾療治不遺力雖毁傷無所憚免䘮既乆語及親猶泣下廬墓側再踰嵗弟沒亡子遺腹生一女婦服未竟輙謀私其橐以行君以義正之其家愧恨欲以危法中君君不為屈吏又偏主其詞而卒不能有以汚也已而撫其遺女如已生且厚資之以歸名族無纎芥餘憾自其少日生理未裕之時以至于老而豐殖推財讓産恤孤懐幼賙人之急自兄弟族黨以及于踈遠之無告者無不必盡其力而退無自多之色平生折劵棄責不勝計里人有闘訟者就以求直聞其言皆失所争而去其㣲至于病者予藥石産者給薪米亦乆不懈嵗旱犯烈日徒歩數十里為鄉人致禱雨為立應人尤徳之嵗或不登輙為食以食餓者自春徂冬日以千數乾道戊子民饑甚官為振廪勸分而就食君家者日至三四萬人明年流庸未復而荒政以罷民愈困敝數百里間扶老携幼挈釜束薪而以君為歸者其衆又倍于前葢君之為此自紹興之丙辰至此三十餘年嵗以為常所出捐不知其若干斛所全活不知其㡬何人矣及是而惠益廣績愈茂以故州郡及諸使者始上其事而蒙顯賞焉君初不欲而不能止也既起拜命因摘詔語牓其所居為義槩之堂曰姑以示吾之子孫使之無忘聖朝所以褒勸之意而益勉于及人也葢於是時君之年七十有七矣明年屬疾且革猶顧左右問今日所飯凡㡬人既没所活餓人過其門者無不流涕也嗣子􅔲既葬君其鄉古魁之原又次君行事如此而論其槩曰君才雖髙而動以繩墨自守凡有所為必問禮律如何其中退然如不勝衣者唯于義之所在則奮然以身先之雖壓以公卿之勢弗奪也臨大患難瀕死而氣不少沮季子以言事得罪至徙嶺表君不為動與人交開心見誠不逆其詐尤謹然諾不為利囘人有小善稱之不容口不則必面折之而亦不復留胷中也故從之遊者莫不愛敬而嚴憚之或者至以俠名歸之葢不知世之以武犯禁者正君所深耻也雖無官守之責而聞四方水旱疾疫輙憂見言色論天下事激昂慷慨利害曉然聴者忘倦故相魏國張忠獻公雅知君書䟽徃來未嘗不稱歎其賢張公都督征討君移書為陳量力慮勝之戒甚切嗚呼君之為人如此使及强盛之年得用其力于當世則其所立宜必有大過人者今既不獲施用而其餘功猶足以活千萬人之死命雖其存沒幸嘗再被寵褒然天之所以報君者豈若是而休耶君卒之嵗淳熈甲午二月丙寅葬以辛丑五月之壬寅君夫人同郡楊氏先卒二子􅔲以累舉得官著作陞朝籍累封宣教郎致仕賜緋魚袋竑中進士第至宣教郎後公數年皆卒一女適朝散大夫知嘉州王神孫男五人寅仲為長次賔仲次康早世次憲仲次寘仲寅仲賢而有文辭今為奉議郎知普州所以篤君之慶于無窮者將于是乎在予雖不及識君而于君之事無所疑者獨以行述為可信又讀義槩諸詩而全蜀名士無不在焉益知行述之果不誣也乃悉論次而系以銘銘曰徳而不才徳匪其徳才而不徳乃才之賊賢哉若人抱道隠居振廪之功日活萬夫茂實既騰帝偉其績命服命書于以徃錫既寵于堂又賁于幽惟是聞孫益鴻厥休我銘其藏千古不泐義槩之名永世無斁宣教郎致仕陳公墓誌銘君姓陳氏諱衡字公權曽祖確祖某父某皆不仕世為福州侯官縣人及君之生質直嚴重謹然諾寡言笑飲食起居有常度寒暑不易危坐終日對妻子未嘗見齒雖嚴于家而與鄉人處則斂退樂易唯恐失色于人虗懐待物不疑人欺遭詐取直無愠責逋于人愧若已負以故不能治生而安于貧嘗曰吾不怨人亦莫余怨不侮人亦莫余侮也中嵗益貧廼闔門以教子為事奉養靳靳而資其子使從師友講學至觧衣無吝色起居晨夜必以身率之其勤約人所不堪而君處之裕如也已而諸子舉進士有名仲子孔碩登科從官所涖多可紀人意其䋲約少寛而君訓飭彌厲未嘗假以言色其平居所以告語之者随事不同而要其歸必出于守道循理愛人及物之意孔碩為邵武宰方以聰明慈愛甚得其民而君遽以疾終于寺舎市里聞之無不失聲嘆吒如悲親戚紹熈五年十二月丙寅也平生不喜僧道巫覡誑誘之説及病遺戒悉擯不用葢其天資有過人者故雖未嘗問學而卒能有以自㧞于流俗乃如此初以慶夀恩授某官致仕既再遇登極及明堂㤙累階宣教郎賜五品服娶同郡黄氏封宜人先卒而葬于閩清縣賀恩里大將之原至是孔夙等將奉公柩以合焉亟以書來曰諸孤不孝荐遭閔凶前日先生既嘗幸哀而賜之銘矣今而闕焉是使孔夙兄弟無以見先人于地下也敢泣以請惟先生憐之時予方以負罪杜門俟譴不敢復近筆硯為辭章然讀其状于中若有愧焉因竊叙而銘之其子孫男女已具前志此不復出銘曰言之出不踰閾行之長不滿鄉人莫我尤我豈人憂載此餘驩以適其丘吾淺之為丈夫者又安能窺其際而渉其流乎范直閣墓記宋故左朝散郎直秘閣主管台州崇道觀范公諱如圭字伯達曽大父履謙妣阮氏大父補之妣李氏童氏父舜舉從事郎累贈左朝議大夫妣胡氏繼葉氏俱贈恭人大父以上世家建州建陽縣之由原先大夫始居漳濵遂為荆門軍當陽縣人以崇寧元年𤣥黓敦䍧九月己丑巳時生于舅氏胡文定公荆南學官廨中既孤自奮從文定公受春秋學舉進士建炎二年對䇿廷中語切直張和公時為考官第為首選同列不可於是以乙科賜及第授從事郎武安軍節度推官以母䘮觧職服除從外舅葉公辟為江南東路安撫司書寫機宜文字召試館職除袐書省正字兼史館校勘如故紹興十年春謁告如荆門遷奉先大夫恭人之柩歸葬建陽始公在館數陳論時政與宰相意不合至是遂請奉祠差主管台州崇道觀秩滿輙復請由是歴十載三為祠官十九年添差通判邵州秩滿差通判荆南府賜緋二十七年召赴行在上殿直秘閣提舉江南西路常平茶鹽公事嵗餘除利州路提㸃刑獄公事在道上書論宗社大計有人所難言者㑹有目疾辭得不行差主管崇道觀二十九年秋起知泉州十月到郡革弊抑强人方受其賜而貴勢不以為便俄有㫖與宫觀理作自陳越明年正月始被命即日罷歸四月受敕復為主管崇道觀而公已病矣六月乙丑卒于邵武軍寓居之正寢享年五十有九而是嵗紹興三十年上章執徐也公娶葉氏右文殿修撰宗諤之女封安人子男三人長念祖右廸功郎次念徳次念兹念兹後公十八日而亡年十有七矣女二人長適右承務郎折知常次適登仕郎劉玶孫男四人女一人皆尚幼其年九月甲申諸孤奉公䘮歸葬建陽縣渭曲山謹次公姓系爵里始終梗概納諸壙中以識若經術行誼出處之詳則將請于先生君子深知公者刻辭墓左以明示後世云從表姪左廸功郎監潭州南嶽廟朱熹謹記皇考左承議郎守尚書吏部員外郎兼史館校勘朱府君遷墓記先府君諱松字喬年姓朱氏徽州婺源人曽祖諱振祖諱絢妣皆汪氏考諱森妣陳氏三世皆不仕考妣以府君故贈承事郎孺人府君生于紹聖四年閏二月戊申性至孝有髙志大節落筆語輙驚人政和八年以同上舎出身授廸功郎建州政和縣尉承事公卒貧不能歸因葬其邑而遊官徃來閩中始從龜山楊氏門人為大學中庸之學調南劔州尤溪縣尉監泉州石井鎮税循左從政郎紹興四年召試除袐書省正字丁内艱服除召對改宣教郎除秘書省校書郎遷著作佐郎尚書度支員外郎兼史館校勘歴司勲吏部兩曹皆領史職如故以史勞轉奉議郎以年勞轉承議郎丞相趙忠簡公張忠獻公皆深知府君未及用而去秦檜以是忌之而府君又方率同列極論和戎不便檜益怒出府君知饒州去赴請間差主管台州崇道觀以十三年三月辛亥卒于建州城南之寓舎年四十有七所為文有韋齋集十二卷娶同郡祝氏處士確之女封孺人後二十七年卒男熹嘗為左廸功郎差充樞宻院編修官女嫁左廸功郎長汀縣主簿劉子翔孫男塾埜在女巽兌皆幼初府君將沒欲葬崇安之五夫卒之明年遂􅉎其里靈梵院側時熹幼未更事卜地不詳既懼體魄之不獲其安乃以乾道六年七月五日遷于里之白水鵝子峯下熹攀慕號殞痛貫心骨重惟先君既不得信其志以沒而熹又無所肖似不能有以顯揚萬分敢次叙姓系官閥志業梗概刻而揜諸幽且將請文作者以表其隧昊天罔極嗚呼痛哉尚書吏部員外郎朱君孺人祝氏壙誌先妣孺人祝氏徽州歙縣人其先為州大姓父諱確始業儒有髙行娶同郡喻氏以元符三年七月庚午生孺人性仁厚端淑年十有八歸于我先君諱松字喬年姓朱氏逮事舅姑孝謹篤至有人所難能者以先君校中袐書賜今號及先君卒熹年才十有四孺人辛勤撫教俾知所向不幸既長而愚不適世用貧病困蹙人所不堪而孺人處之怡然乾道五年九月戊午卒年七十生三男伯仲皆夭熹其季也嘗為左廸功郎差充樞宻院編修官一女適右廸功郎長汀縣主簿劉子翔孫男塾埜在女巽兌皆幼越明年正月癸酉葬于建寧府建陽縣後函天湖之陽東北距先君白水之兆百里而遠不孝子熹號慕隕絶敢竊記壙中如此昊天罔極嗚呼痛哉知縣何公壙誌君姓何氏諱鎬字叔京邵武軍邵武縣人父諱兌左朝奉郎母陳氏劉氏林氏鄧氏皆封安人而君劉出也以朝奉公致事恩補將仕郎更授右廸功郎泉州安溪縣主簿辟江南西路安撫司書寫機宜文字調汀州上杭縣丞陞從政郎潭州善化縣令未上以淳熈二年十一月丁丑晦卒于家年四十有八娶同郡李氏子男三人琰某某女三人長壻吳大同次馮棟季未行也君天資夷曠㢘静寡欲有過人者始朝奉公學于故殿院東平馬公伸受河南程氏中庸之説篤信力行沒身不怠而君又得其傳培殖從容克篤前烈佐邑有惠愛著書數萬言琰等將以四年三月某日葬君臺溪東碭之原其友新安朱熹為識壙中如此且將叙次其詳以表于墓上云劉樞宻墓記代劉平甫公諱珙字恭父姓劉氏世為建寧府崇安縣人曽祖諱民先故任承事郎累贈太子太保妣黄氏彭城郡夫人祖諱韐故任資政殿學士銀青光祿大夫謚忠顯累贈太師妣李氏秦國夫人繼吕氏韓國夫人父諱子羽故任右朝議大夫充徽猷閣待制累贈少傅妣熊氏福國夫人繼卓氏慶國夫人公生于宣和四年二月十日卯時建炎三年以忠顯公致仕恩補承務郎紹興十二年中進士第調紹興府任城都税務未赴改監潭州南嶽廟十五年差主管西外敦宗院十六年磨勘轉承事郎十月丁少傅公憂服未除而韓國夫人薨公以嫡孫承重二十一年服除差諸三宫大小學教授二十四年四月權袐書省校勘書籍官又權禮部郎官六月權中書舎人十二月磨勘轉宣教郎二十五年五月罷二十六年差主管台州崇道觀二十八年召赴行在除大宗正丞未赴二十九年磨勘轉奉議郎改袐書丞三十年兼權吏部郎官四月除吏部員外郎改監察御史十月復為吏部員外郎三十一年正月兼權袐書少監六月除起居舎人九月兼權中書舎人十月兼權直學士院從車駕幸建康三十二年三月除中書舎人賜紫金魚袋五月正兼直學士院八月以扈從恩轉承議郎今上登極覃恩轉朝奉郎借朝議大夫禮部尚書奉使大金上以公辟置官屬公當特賜御札奬諭時始議與金人為敵國之禮未决以故未出疆而復隆興元年二月磨勘轉朝散郎十一月除集英殿修撰知泉州未赴二年二月改衢州乾道元年三月除敷文閣待制知潭州荆湖南路安撫使以平郴賊李金功賜御札奬諭又除敷文閣直學士三年正月召赴行在八月到闕除翰林學士知制誥兼侍讀以郊祀恩封建安縣開國男食邑三百户十一月除中大夫同知樞宻院事四年七月兼参知政事八月除端明殿學士在外宫觀改知隆興府江南西路安撫使五年四月除資政殿學士知荆南府荆湖北路安撫使六月被㫖措置荆襄邉面六年九月丁慶國夫人憂七年三月起復同知樞宻院事進封開國伯加食邑四百户實封一百户公再辭不允乂除荆襄宣撫使依舊同知樞宻院事差内侍省内侍殿頭徐偁賜以御札宣押奏事公又四辭乃得終䘮八年十二月服除除知潭州荆湖南路安撫使進爵加食邑實封如前九年三月赴闕奏事進大學士以行淳熈二年正月除知建康府江南東路安撫使兼行宫留守未㡬復以恩徙封彭城郡開國侯加食邑三百户七月以修城功轉一官公辭不受十月又以津發禁軍教閲轉一官許回受三年三月以慶夀恩加食邑三百户實封一百户六月又轉大中大夫七月以賑濟事畢賜詔奨諭十一月又賜御札鞍馬器物四年三月以居守績効顯著除觀文殿學士四月以三年郊祀恩加食邑三百户五年閏六月以疾再請奉祠不允遂乞致仕詔遣内侍省西頭供奉官陸彦禮宣押翰林醫痊診御脉周昭眡治公痰未至七月三日薨享年五十有七轉通議大夫致仕贈光祿大夫輟視朝一日詔建康府應副人夫津發又詔建寧府應辦葬事身後恩數令有司具條取㫖公娶吕氏兵部尚書祉之女追封新定郡夫人繼室韓氏魏國忠獻公之元孫追封新興夫人又娶其女弟追封淑人子男二人曰學雅承務郎曰學裘尚幼女二人長適將仕郎吕欽公所任也次在室卜以六年二月乙巳葬于甌寧縣慈善鄉豐樂里顯揚妙湛禪寺之南從公志也坪惟公平生大節顯于朝廷傳于海内固已不待夫記述而傳矣然其謀猷行治曲折精微之際則又有不可不詳載以俟後世者方將討論撰次而請銘于作者顧又未及就篇而葬日已廹謹略叙公始終閥閲如右刻而納諸壙中它所欲論著者尚見于隧道之碑云從弟從仕郎坪涕泣叙次丁復之墓記復之名堯姓丁氏建寧府崇安縣上梅里人父名愛母某氏復之為人篤厚慈良深有志于為己之學從予遊數年不幸早死朋友莫不哀之有子二人曰某某淳熈十有二年冬十有一月某日卒某月某日其父葬之某處友人蔡君季通實相其事新安朱熹記亡嗣子壙記宋朱塾字受之其先徽州婺源人大父諱松紹興史官也父熹今為鴻慶祠官母劉氏聘士勉之之女塾于紹興癸酉七月丁酉生紹熈辛亥正月癸酉卒娶潘氏生二男長曰鎮次恩老四女歸昭接滿鎮滿皆天明年十有一月甲申葬大同北麓上實天湖其父為之志嗚呼痛哉陳君廉夫壙誌陳㢘夫名址莆田人故少師觀文殿大學士贈太保魏國正獻公之孫今朝請大夫新提舉福建路市舶寔師是之子厚重明敏自幼即有志于學正獻公竒愛之用致仕恩奏授承奉郎轉承事郎差監鎮江府户部大軍倉未赴丁母憂再調監泉州南安縣鹽税慶元三年七月二十有二日卒享年二十有八娶兵部侍郎岳公霖之女女子一人師是將以慶元四年十一月三日袝㢘夫龍汲山正獻公大墳之右以其嘗學于余也使來謁銘余以老病久廢筆札亦悲㢘夫之賢而不克就其志也不能文姑記其實請刻石納壙中十月己卯既望新安朱熹記晦庵集卷九十四欽定四庫全書晦庵集卷九十五上宋朱子撰行狀
