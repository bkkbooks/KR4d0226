body:
  text: 公移漳州延郡士入學牒見臨漳語錄契勘州縣兩學講説課程近日以來漸有倫緒但以州郡尊賢尚徳之心有所未至致使諸生無所薰陶涵養以發其向道入徳之趣不敏之咎何以自文今覩新江州知錄黄從事器資渾厚操履端方杜門讀書不交權利鄉閭有識莫不推髙若以禮請屈居州學正錄之任兼同主管縣學教遵必能使諸生觀感而化有所興起前州學施學正允夀石學正洪慶皆以耆艾之年進學不倦强毅方正衆所嚴憚林貢士易簡李進士唐次或究索精微或持循雅􅅚察其志行乆益可觀貢士陳淳太學生楊士訓齒雖尚少學已知方永嘉學生徐寓務學求師志尚堅確凡此數士當職所知若悉招延異其禮際則凡學之子弟藏修逰息無適而不得良師畏友之益庶㡬理義開眀徳業成就仰副聖朝教養作成之意其在外士人竊恐尚有年髙徳劭閭里推尊經眀行修流輩歸重而藏器自珍不求聞達者更當廣行咨訪續議延請紹熙三年正月初二日牒南康軍請洞學堂長怗以下見南康集謹按國朝會要修復白鹿洞書院已差補職事學生入洞管幹訖今按江南野史本洞舊制洞主之外更有堂長名目今覩學錄楊日新年髙老成在洞供職紀綱庶事表率生徒績效可觀合行敦請須至給怗者右給帖付貢士楊日新凖此充白鹿洞書院堂長職事淳熙七年九月日帖洞學榜契勘本軍廬山白鹿洞書院元係唐朝太子賔客李公遺跡經歴五代號為國庠及至本朝太平興國中甞蒙太宗皇帝賜以官書咸平年又蒙真宗皇帝重加修葺中間廢壊殆且百年今者本軍鼎新建立教養生徒漸有倫緒又承本路諸司及四方賢士大夫發到文籍収藏應副學者看讀以至山林田土亦已標簽界至措置撥買規模一新可垂乆逺已具事狀奏聞乞賜敕額去訖竊慮向後諸色等人不知上件事理輙有毁壊以至偷盜文籍侵占田土及過往之人妄有搔擾事屬不便須至曉示者右出榜白鹿洞書院張掛各請知悉淳熙八年閏三月日榜申諭耕桑榜當職二月十五日依凖近降指揮守令出郊勸農已印給勸農文榜并先來勸諭耕種田土勸課農桑及星子知縣王文林種桑等法文榜發下三縣貼掛曉諭民間通知去訖續據王文林申到勸諭種田方法尤為詳細竊慮都建昌縣人户未能通知今分下兩縣曉示鄉村人户仰遞相勸諭依此方法及時耕種用力既勤必有豐年之報再此勸諭各宜知悉淳熙七年二月辛丑勸農文當職昨為本軍民間農事滅裂累曽出榜反復勸諭自從去嵗以來凡吾父兄子弟似亦稍相聴信方欲從事於深耕疾耘之務以冀一飽而當職不徳刑政失中侵迫隂陽招致旱虐使吾父兄子弟終嵗勤動而不獲有秋之望永思厥咎愧負何言尚幸一二父兄皆能率其子弟當此荒歉之中種麥耕田及時盡力不為輕去墳墓之計而又賴天之靈宗社之福雨雪應候土潤泉通麥既可期稻又可種嗣嵗之功似已有可觀者而當職亦幸免於罪戾且將受代而歸矣今以中春之月祇率典常躬載酒食出郊行田延見一二父兄同舉此觴以告將别父兄其强食自愛謹身循理以教子弟使之孝敬父母慈愛骨肉和睦鄉鄰救䘏災患輸納苗稅畏懼公法專心致力於農桑之務如前此勸諭之云者而勿為飲博逰惰争鬭論訟一切非理違法之事以䧟刑辟其子孫之敏秀者則又教令講學讀書使知先王禮義之教既以上副國家長育人才之意而爾之門户亦將與有榮焉其前年舊榜及星子知縣王文林耕田種桑法今亦再行給散并此勸諭各宜體悉淳熙八年二月招學者入郡學榜惟此邦江山竒秀如此俊茂宜倍於他郡而誦絃之聲寥寥曠絶此長吏教化不眀之責也今敦請新臨江軍新淦縣尉某人就軍學傳道堂主盟文社教授總司教條每日講書次日覆三八出題四九日納課擇精勤者書考以示勸無籍者給食有籍者以此差補職事其不率教者則有規請賢父老勉其子弟努力從事於學尚庶㡬以見其成焉招舉人入白鹿咨目恭惟國家以科舉取士盖循前代之舊規非以經義詩賦䇿論之區區者為足以盡得天下之士也然則士之所以講學修身以待上之選擇者豈當自謂止於記誦綴緝無根之語足以應有司一旦之求而遂已乎今嵗科場解發赴省待補之士二十有八又文行彬彬識者盖稱之郡亦與有榮焉然惟國家之所以取士與士之所以為學待用之意有如前所謂者是以更欲與諸君評之今白鹿諸生各已散歸山林閴寂正學者潜思進學之所諸君肯來當戒都養給館致食以俟專此咨白可否須報勸農民耘草糞田榜雨水調勻田苗茂盛仰人户及時耘苗㧞去草根多用土糞如法培加已帖知佐月半以後不測下鄉㸃檢將田中有草無糞之人量行决罰的無輕恕六月六日勸諭趂時請地種麥榜契勘秋來乆旱晚田失収兹幸得雨可種二麥今勸人户趂此天時多耕闊種接濟口食其有無地可耕之人及有力多而地少者仰自踏逐空閑官地具出字號四至畆角經縣陳請布種當與判狀執照免料權給一年其有情願永逺請佃之人亦仰分眀聲説即與給據管業特免五年税料即不得因而侵占他人見耕田地及廣行包占狀外官地頃畆如有違犯許人陳告當以狀内所請地及見種子利充賞本人仍别科罪除已行下三縣照應施行外須至曉諭約束者右榜勸諭人户請詳此事理趂時多種二麥量力請佃官地務盡人力以相天功庶㡬來年不至闕食淳熙六年九月放官私房廊白地錢約束照對日今天色亢陽見行禁止屠殺祈求雨澤未獲感應竊慮細民不易所有官私房廊白地錢自七月初二日為頭五十文以上放五日五十文以下放十日措置賑䘏糶糴事件竊見軍境乆闕雨澤深慮細民將來艱食合預行招誘客販米船就軍出糶并勸誘上户停蓄以備饑急措置事件下項如遇客販米到岸欲就軍出糶仰赴務陳狀看騐稅物訖令就石寨内捎泊出糶即與免在城稅錢三分或有糶不盡之數欲載往它處須再經本務出給闗引方得起離前去庶可闗防欺隠透漏之弊今帖城下稅務遵依施行尋常客人糶米必經由牙人方敢糶常被邀阻多抽牙錢是致不肯住糶合嚴立榜賞上約許從民旅之便情願交易庶得牙人不敢搔擾使軍今立賞錢一千貫文榜市曹張掛曉示如遇客旅興販米斛到軍聴從民旅之便自行糶糴如牙人不遵今來約束輙敢邀阻解落牙錢許被擾人畫時具狀經使軍陳訴切待勾収犯人重行勘斷追納賞錢入官施行米船到岸雖欲出糶然貧民下户不過斗糴卒難轉變錢物未免畱滯須當勸諭上户及時収糴不惟他時可濟荒歉於停蓄之家豈無宜利可謂兩便合帖委官敦請上户説諭措置兩縣到岸米船事照對旱傷細民闕食合行出糶常平米斛應接細民食用切慮向去日乆有誤不測賑濟况今鄰郡州縣収成正是客旅興販米斛之際本軍已行措置不行収稅仍放免本船雜物稅錢招納米船住岸出糶接濟民户日食其兩縣務亦合依此措置招誘米船候有米船到岸即將常平米斛住糶凖備將來支用七月十一日帖都昌縣招誘客販米斛免収力勝雜物税曉諭照對本軍并管屬縣近日以來闕少雨澤見今祈禱未獲感應米價漸髙本軍已行下城下税務都建昌縣招誘客販米斛前來從便住糶免収力勝雜物税錢不得邀阻減尅牙錢之類外竊慮客人未能通知須至曉諭并帖縣依此施行七月十五日再勸修築陂塘契勘今嵗旱傷盖緣人户不修築陂塘積水灌溉田禾致令乾死使軍已節次行下三縣及散榜給印榜曉示人户陂塘淺漏處亦合併力開掘修築如有欠闕工料支費并諸軍縣借米喫用修築次年送納如陂塘廣闊費用工力數多亦當計料工食申軍切待具申提舉衙撥米借貸措置客米到岸民户収糴不盡曉諭照對管内田禾多有旱損切恐民間闕食已措置令税務多方招誘客人米船住岸出糶接濟民間収糴食用與免収納雜物税錢今來漸有客旅興販米斛到來如有民户収糴不盡之數許令牙人并有餘之家収糴停頓凖備接濟合行出榜曉示曉示鄉民物貨減饒市税照對近城鄉民全藉將些小係税之物入城貨賣辦糴口食若依遞年収税切慮無從所出合將客旅步擔興販紗帛藥草絲綿雜物依舊収税外其餘鄉民應有些小土産物貨入城轉變並與減饒三分之一合行約束不得因而作弊約束不許偷竊禾穀照對三縣管下田禾雖是旱損其間有水源及可車戽去處今來漸次成熟切慮有不守行止之人聚集偷竊禾穀合行下巡尉司嚴行禁約約束諸縣泛催官物各給憑由訪聞逐縣尋常文引勾追欠户更不於引内批鑿少欠是何年分官物名色若干數目泛稱積年拖欠及追人户到官多是人吏作弊不問所欠多寡例將斷罪是致小民憂疑不能安迹合行下諸縣約束如有人户少欠官物各給慿由眀言批鑿所欠是何年分官物立限給付少欠之人依限赴官送納免流移民船力勝照對有流移之民船至軍岸合行下税務審實並與蠲免力勝放行禁旅店不許遞傳單獨訪聞管下旅店遇有單獨困病或流移之人到店多是慮其死亡更不容畱遂行遞傳驅逐出界因此䘮命合行下諸縣多印榜文於旅店約束遇有過往單獨飢餓困病之人即仰所到店户不得遞傳扛擡送出外界許就便米場騐實量給口食臨安痊日遣去萬一有死亡之人即時報都保審實申縣行下如法埋𦵏取㑹管下都分富家及闕食之家契勘管界乆闕雨澤田禾旱損使軍已行委官措置招誘客人興販米斛蠲免力勝雜物税錢禁戢減尅牙錢之弊勸諭前來出糶目今日逐有米不闕軍司亦已行帖都建昌縣及委官依使軍所行措置招誘客米赴縣住糶及勸諭上户將所有米斛相各逐鄉村開倉依時價出糶應接民間食用去訖切慮向去富實户將米斛停頓不行出糶使細民闕食不便合行立式預先委官取會管下都分蓄積米穀上户及闕食之家如後七月十六日某都共㡬家一富家有米可糶者㡬家除逐家口食支用供贍地客外有米㡬石可糶鄉例糶數即依鄉例開客户姓名米數併佃地客姓名一富家無餘米可糶者計㡬家而僅能自給其地客佃客不闕仍各開户姓併佃客地客姓名一中産僅能自足而未能盡贍其佃客地客者計㡬家開户名取見佃客地客姓名所闕之數一下户合要糴米者㡬家作田㡬家各開户名大人㡬口小人㡬口别經營甚業次不作田㡬家各開户名大人㡬口小人㡬口經營甚業次作他人田幾家各開户名係作某人家田大人幾口小人㡬口兼經營甚業次右件如前竝是着實即無隠漏其闕食之家亦無詐冒重叠仍五家結一保如將來使軍委官審實挑覆却有不實去處甘伏重罪不辭施行旱傷委官驗視照會本軍并管屬星子都昌建昌三縣自六月以來天色亢陽闕少雨澤田禾乾枯本軍恭依御筆處分嚴禁屠宰精意祈禱及行下諸縣精加祈禱去處今據星子都昌建昌三縣申依應遍詣寺觀神祠及諸潭洞建壇祭祀請水精加祈禱雨澤竝無感應今來諸鄉早禾多有乾損及備據税户陳徳詳等狀訴所佈田禾緣雨水失時早禾多有乾稿不通収刈申乞委官檢視本軍今檢凖淳熙令諸官私田災傷秋田禾以七月聴經縣陳訴至月終止本軍酌立規條施行及具奏聞申省部監司外須至出榜三縣管屬鄉村都保各仰通知以上七月十六日施行旱傷住催官物一月契勘本軍三縣遭此旱災早禾乾損已出榜曉諭人户依期投訴旱狀將來檢踏奏減秋税外有去年秋粮零欠甚多及今年夏税全未納及分數緣其所欠並係起發上供及本軍軍粮之數雖是今年旱田不熟在法無緣免放然而訪聞諸縣催科無術不免决撻保長搔擾人户當此闕雨之時深慮重困民力除已行下各住追催一月免致保長人户奔走期限例遭刑責費去車水工夫今仰人户各體此意遞相告報於住催一月限内自偹所欠錢粮各赴倉送納上以應副官司起發綱運供贍軍兵下亦使本户不被追呼得以一意車水救田别作營求用備將來闕食之患公私兩便各仰知悉諭上户承認賑糶米數目契勘本軍管下今嵗旱傷田禾切慮細民闕食使司已行下三縣推舉管下富實有米上户并自能贍給地佃客富家姓名各家見蓄米穀數目或有田産而不多或無田産却有營運蓄積米穀錢物之家敦請赴官以禮勸諭承認賑糶米穀數目申軍所委官并三縣勸諭到上户承認賑糶米共七萬三千二百六十八碩五斗已檢凖前項條令出給公據付人户収糴米斛囘軍賑糶在城上户二十五名共認賑糶米一萬一千六百三十五碩每升價錢一十七文足星子縣勸諭到上户三十一名共認賑糶米一萬一千九百三十五碩每升價錢一十七文足都昌縣勸諭到上户五十九名共認賑糶米二萬八千九百八碩五升每升價錢一十四文足建昌縣勸諭到上户九十一名共認賑糶米一萬八百碩每升價錢一十二文足約束鋪兵本軍盖緣旱傷遂置歴及黄旗綠匣急速前去兩縣追會旱傷事件須管遵依台判日限時刻仰鋪兵連夜走傳至縣仍仰本縣於歴内批鑿承受日時手分姓名即時依限回報亦仰批發離縣日時責付鋪兵連夜依限赴軍投下以慿稽考違滯去處根究重作施行檢坐乾道指揮檢視旱傷使軍照對管屬星子都建昌縣人戸陳訴秋田旱傷使軍已立式出榜三縣曉示人戸赴縣投帳繳申使軍切待依條差官檢視減放苗米所有近水鄉分可以車戽注䕃得熟田段切慮人户將旱傷田段滚同得熟之田影帯披訴今檢凖乾道六年六月二十七日勅戸部曾尚書劄子奏契勘州縣每遇災傷依法聴人户經官陳訴差官檢視蠲放税租訪聞近來往往多被豪户計嘱鄉司將豐熟去處一例減放其實被旱澇去處所委官憚於往來檢視則貧乏下户不得蠲減臣愚欲望聖慈特降睿旨委諸路漕臣散出文榜於鄉村曉諭應有災傷去處仰民户依條式於限内陳狀仍錄白本户砧基田産數目四至投連狀前委自縣官將砧基㸃對坐落鄉村四至畆步差官覈實檢放如輙敢妄移豐熟鄉分在旱傷地分僥倖減免許諸色人陳告依條斷罪仍將妄訴田畆並拘沒入官以一半給告人充賞施行若州縣奉行滅裂從漕臣按治重寘典憲取進止六月二十七日三省同奉聖旨依兼照檢踏災傷在法差官同令佐詣田所先檢見存苗畆次檢災傷田段合委官前去三縣鄉村究實得熟田段具帳申軍已行帖出榜星子都建昌縣約束人户從實投帳以備差官檢放如有將得熟田段影帶披訴却致被人户陳告定依條斷罪追賞施行施行下諸縣躬親徧詣田段相視使軍契勘今嵗三縣田禾旱傷間有邊臨山源溪澗或有得雨去處自熟田段其税賦合全行輸納又有邊臨大港并有積水陂塘可以車戽接救田段皆是人户自入夏一乾之後合家老幼舉債辛勤用工車水救得其禾稻十中只有三五分熟者即行比倣自熟之田究見其數斟量輕重别作一等優䘏兼有無水車戽全然旱死田段切慮人户將來一概投訴旱傷欲將各縣鄉分分委縣官趂此未曽収刈之際躬親下鄉遍詣田段地頭親自相視仍闗呌耆保并人户指證供給罪賞攅類開具供申禁戢人從不許乞覓使軍照對所委官下鄉切慮將帶合干等人因而生事乞覓搔擾事属不便合令縣給口食與隨行人不得搔擾保正寺觀等人仍立賞降給文榜付檢旱官隨行張掛約束放免官私房廊白地照對星子都建昌縣軍自六月以來天色亢陽闕少雨澤見據人户經軍縣陳訴旱傷切慮細民不易理宜寛䘏所有人户承賃官私房廊白地錢自八月初一日為頭以十分為率權行減免二分候至來年麥熟日仍舊諭人户種蕎麥大小麥仰人户趂此雨潤多種蕎麥及大小麥接濟食用施行人户訴狀乞覓據學生馮椅劄子述照對今嵗旱荒民户已是投詞星子見行委官檢踏其在都昌舊來踏旱之弊名色非一不敢不以告者凡押旱狀官中所收則謂之醋息錢直日司乞覓則謂之接狀錢已下案案吏乞覓則謂之買紙錢及投旱帳則謂之投帳錢官員下鄉檢踏供帳民户着押社司乞覓則謂之着字錢檢踏官員隨從人吏於保正名下乞覓則謂之俵付錢官司行下蠲放所納米斛社司隨斗敷數乞覓則謂之苗頭錢凡此之類皆蠧民之尤者官中所放本以裕民而民之縻費乃至於是人户既已困窮坐受其弊無力赴愬委實切害合行下星子都建昌縣嚴行約束及出榜各縣門并檢踏官隨行張掛曉示人户知悉如合干人依前乞覓前項逐色錢數仰人户不以早晚具狀經縣陳訴從本縣拘収犯人申解軍切待根勘依條施行各令知施行專欄牙人不許妄収力勝等錢照對本軍近出榜於上江州軍曉諭客販米斛前來從便住糶免収力勝雜物税錢及約束不得邀減牙錢之類外切慮牙人并税務專欄不依先來約束仍前収納力勝等税錢及牙人妄有邀阻減尅牙錢之類今立賞錢三十貫文省榜市曹并税務檢税亭張掛曉示客人知悉廣行興販米斛前來出糶嬴落利息如税務專欄等人并米牙人輙敢収納力勝等税錢及邀阻減尅牙錢之類仰各人不以早晚具狀赴軍陳論切待追収犯人斷罪追賞施行禁豪户不許盡行収糶照對本軍管下今嵗旱傷訪聞目今外郡客人興販米穀到星子都建昌縣管下諸處口岸出糶多是豪強上户拘占盡數収糴以待來年穀價騰踴之時倚収厚利更不容細民収糴事屬未便如遇客人販到穀米仰上户不得獨行拘占盡數収糴許細民皆得從便食用管下縣相視約束及開三項田段使軍契勘在法檢視災傷先檢見存苗畆次檢災傷田段盖欲趂得人户未及収刈之際略見荒熟大概的實分數然後豁出熟田細檢荒旱去處不致猾吏姦民通同作弊本軍近緣荒旱檢坐上項條法行下諸縣遵依施行除星子知縣王文林躬親下鄉兩日之内多歴都分見得荒熟田段分眀民間咸樂其來不以為擾都昌權縣孫迪功亦己申到躬親行視所見災傷等第人情苦樂皆有條理獨有建昌一縣地里稍逺未據申到却訪聞得本縣官吏誤認法意欲將熟田一坵一角逐一看視委是繁碎不惟重擾災傷人戸亦恐枉費日月不能了辦合行約束且如一坂之田大約百坵内有三五十坵成熟即指定是何人田段約計畆角抄入熟田數内不在將來檢放之限如一坂百畆只有一二十畆稍稍成熟即不須逐畆抄劄畱與人户充収半藁口食仍令人户一面収刈犁翻種麥量畱根查聴候檢放或有田面大概黄熟而其中有未出者有出而青空者有出而白死者並係荒損然其根查却與熟田無異切恐將來収刈之後誤被抄入熟田數内不得檢放尤為不便今請便行貎約多少定下荒熟分數令人户一面犁翻種麥如今來所檢熟田數内將來續有死損即仰人户量畱穗穡候檢旱官到别行陳訴續與檢放乞行下江西從便客旅興販米穀契勘本軍并管屬諸縣今嵗旱傷全藉江西豐熟州軍客旅興販米斛出糶接濟細民本軍已行散出文榜招誘興販前來與免附載雜物税錢行下城下税務約束及出榜曉示米牙人不得減尅分文牙錢令客人自行出糶切慮向上州軍阻節不令穀米下河致使客旅不通及間有興販米穀舟船州軍妄以雜物為名倚収税錢是致商賈不肯搬販米穀前來出糶細民失望為害非輕欲望鈞慈速賜行下江西豐熟州軍許令商賈從便興販米穀向下以來出糶應接民間食用仍乞嚴行禁戢場務不得妄作名色収納税錢庶得客旅通行米價不致騰踴約束米牙不得兠攬搬米入市等事契勘諸縣鄊村人户搬米入市出糶多被米牙人兠攬拘截在店入水拌和増擡價值用小升斗出糶嬴落厚利遂致細民艱食情實切害合行約束約束質庫不許闗閉等事契勘質庫户平時開張庫店典質錢物利息所入不為不多纔值旱傷嵗時輙以闕錢闗閉邀阻遂至細民急切闕用無處質當兼目今闕雨澤城市古井多被有錢之家拘占夾欄不令衆人汲運情理切害合行告示約束施行戒約上户體認本軍寛䘏小民契勘本軍并諸縣今嵗旱傷民間理宜寛䘏今訪聞乾道七年放債豪强之家為緣旱傷人無以償多被强取去猪羊以至入其家搜奪種子豆麥之類及抑令將見住屋宇并桑園田地低價折還人無所歸遂致流移有至今尚未能歸業之人本軍雖行下三縣曉諭上户體認本軍寛䘏之意量度欠債人户如粗有収成有力可還之人隨宜取索外其貧乏之人見闕口食委實無可償還仰上户且與寛容俟民力少蘇却行取索如將來人户恃頑不還官司即為理索外上户乗此旱傷細民闕食之際强以些小錢作合子文字借貸遂空頭年月價貫立契字未及踰時即行填掗預先月日經官投印及有吞圖婦女顧充奴婢致細民受苦不一理合禁約施行張廷諫訴旱傷事據學生張廷諫劄子述夫旱暵之嵗朝廷檢収秋苗成法具在而上中等户無不力陳必求其放免而後已縱使官吏有弊亦須及半下户無力陳告憚於所費故皆不投帳守令慮不及此則有帳者次第減放無帳者多至全催粮食之儲既絶望於其前追租之吏又驅迫於其後囘視屋宇器皿布帛不可食者皆不可售進退皇皇朝暮不能相保今若不待投陳檢視凡下等之苗先此全免放則見存者其志益堅而已逃者各思反其鄉里矣遂行下當縣取㑹五㪷以下米單名申軍不待檢視先次並與除放施行施行邵艮陳訴踏旱利害使軍今照近據管属星子都昌建昌三縣人户陳訴田禾旱傷已帖委縣官躬親下鄉先次檢視熟田具帳供申去後據進士邵艮劄子竊見官吏下鄉檢視田段略不問及人户旱傷去處惟於每户悵狀供具所熟田畆亦不問所熟分數但勒令供作全熟田段鄉民不知官吏深意皆相顧駭惑夫都昌田禾例宜旱秈非若星子早田十居七八安有五月中旬一雨至今而有全熟之理雖陂塘脚下及近容水去處間有熟者然賴車戽之勤所得不償所費而又如此便利去處其實無㡬且以所居一都言之惟麥坊劉坊大寧余于之旱為尤慘雖或一二分熟者然大概顆粒不収然則熟田實不能當旱田二十分之一誠恐官司它日以所供熟田多少而定通放秋苗分數則些少熟處適所以累及旱傷之家有大不均之病聞之鄉老皆以為今嵗之旱酷於辛卯盖彼時人家尚有嵗備自夫一旱之後加以連年暗折入間例無盖藏自前月來鄉曲上户小民流離已覺相踵且今此正収刈之際人家尚有一二分早禾可恃而已如此者雖亦糊口迫之誠以催科之窘且深為後日慮而畫此至無賴計耳比年以來都昌上戸多為小人誣賴故闕乏之際有力之家至不敢與交易由是貧乏下户愈覺坐困而無告今鄉曲猶未雨油麻粟豆並烏有赤地未耕二麥且有失時之慮嗣嵗之計彼將何措此蠲租之惠尤鄉民之所深望也昔唐制旱七分租庸調皆免被三分之収非不知取捐之盖有深望也本軍遂作訪聞行帖三縣檢視官約束委官置場循環収糴米斛照得本軍管界乆闕雨澤旱死田禾目今在市闕米出糶切慮細民闕食合行借撥官錢委官就軍置場措置循環収糴米斛出糶應偹細民食用約束遊手不許脅持良民契勘今嵗旱傷委官下鄉檢踏成熟田段外有旱田人户一面犁翻種麥量畱根查聴候别有官前來檢収切慮逰手脅持之人見人户旱田已經犁翻耕種妄作鄉村虛聲首熟欺詐乞覓使善良人户不敢犁翻以至種麥失時不能安業今仰人户知悉若實有旱田即依條量畱根查以備檢放一面犁翻種麥免致失時如有似此脅持妄稱陳訴欺詐之人仰被擾人户經官陳理切待追取送獄根勘斷罪施行援例乞撥錢米照對本軍今嵗旱傷細民闕食已行下星子都昌建昌縣委官抄劄合賑糶賑濟户口人數申軍及照得乾道七年旱傷係蒙提舉常平使司支撥到池州太平州蕪湖繁昌等縣常平米五萬碩差官管押前來本軍分撥下三縣賑糶賑濟遂具申常平提舉使司乞支撥米斛差官管押前來本軍賑糶賑濟續蒙提舉使司支撥信州貴溪縣常平米五千碩差人前去搬取及支撥池州常平錢五千貫省付軍収糴米斛賑糶再諭人户種二麥使軍累行勸諭人戸耕種二麥盖為今年荒旱不比常年須是併力加工救濟性命今訪聞多有未施工處顯是頑慢已帖檢旱官并行催趣將頑慢惰農之人量行决罰先此曉諭各仰知悉行下三縣抄劄賑糶人戸照對近委官抄劄三縣管下賑糶人戸姓名大小口數申軍尋將己申到帳拖照得合賑糶人戸並不見聲説見住地名去處恐有漏落増添情弊難以稽考合行下逐縣將逐都塌畫地圖畫出山川水陸路徑人戸住止去處數内不合賑糶人户用紅筆圈欄合賑糶人户用青筆圈欄合賑濟人户黄筆圈欄逐一仔細填寫姓名大小口數令本都保正長等叅考指實繳申切待差官㸃摘管實行下三縣置場照對見委官抄劄三縣賑糶賑濟人戸大小口數畫圖結申務要實惠及民無致妄冒所有置場去處委官酌量地里逺近分定置場去處各縣水陸地里若干其勸諭到上户賑糶米斛亦合撥隸近便赴場去處以慿施行續據三縣申置場共三十五處星子縣置場七處都昌縣置場十一處建昌縣置場一十七處約束許下户就上户借貸契勘今嵗旱傷非常得熟處少本軍已節次行下三縣散榜曉諭人户趂此土脉未乾并力耕墾廣種二麥接濟將來食用如有惰農耕種失時之人即請照已行榜示行遣其貧乏無種粮之家請諭上戸借貸如要官司文歴即印給令上戸収執遇有下户借貸麥種粮食即令就歴批領將來還足對行勾銷如有不還官為理索再諭上户䘏下户借貸契勘今年荒旱非常得熟處少本軍多方救䘏務使人户不至飢餓流移及行勸諭人户多種二麥接濟喫用非不叮嚀當職近因出郊相視陂塘見得麥田多有未施工處盖緣人户打糓未了亦是官司勸諭未至其得熟處不闕種粮可以佈種然其人既無飢餓之憂便乃懶惰其荒旱處合更勤苦又以難得粮種遂致因循今仰人户速將所収禾穀日下打持趂此土脉未乾并力耕墾其髙田堪種麥處即仰一面種麥其水田不堪種麥處亦仰趂早耕翻多着遍數務要均熟庶得乆逺耐旱宜禾其得熟人户當念幸得収成常生慚愧不可便致惰怠趂此餘力多種二麥將來可以博得他處物貨其遭旱人户當念既遭此難尤當勤力多種食物方可養贍老小不致飢餓流移其下户無種粮者上户當興憫惻之心廣加借貸目今施惠既可以結鄰里之驩將來収成亦自不失収息之利庶㡬過此荒年各保安業今恐前來勸諭未眀再此榜示仰人户知悉革住米船隠瞒情弊契勘賑糶場収糴米斛如遇米船到岸内過税船隻収糴三分住糶米船止糴一分其住糶米船法格並與免収税錢外訪聞客旅多生奸猾動是數隻到岸於内却將一兩隻作住糶結計在市米牙人令其虚解牙錢稱就市糶訖却將在船住糶米斛夤夜搬往過税船内隠瞞官司合行出榜約束行下場所革住米船隠瞞照得賑糶場近緣住糶米船客人結計牙人虚解牙錢夤夜搬傳米斛往過税米船之内隠瞞官司有此欺弊遂出榜河岸約束今來尚慮住糶客人雖依曉示在市出糶切慮闗防不盡合行下本場自今後遇有住糶米船即令城下税務看驗具數闗報賑糶場本場權住出糶令客人搬米赴場從本場差人監用本場升斗自行出糶接濟細民日報糶過米數糶足為給闗子放行庶㡬杜絶隠瞞官司之弊申提舉司將常平米出糶契勘本軍今嵗旱傷細民闕食遂行下三縣抄劄到合賑糶賑濟户口人數已行措置賑糶賑濟所有本軍城下常平倉見樁管在倉米八千八百九十三碩二㪷六升五合二勺除今年八月内盤量欠折米一千六十碩三㪷二升四合外實管見在米七千八百三十二碩九㪷四升四合八勺係是乾道八年以後逐年収糴到數目價錢不一其米今年在厫内有結冒陳損兼照今年七月内管属建昌縣闕少米斛出糶所支撥義倉米估價應接民間食用每升計價錢一十文足已具収報提舉使衙照㑹去訖所是見管和糴米本軍今追到牙人沈先等供具其米經年陳損與受納到人户義倉米陳損色様一同依市價每一升估計價錢一十文足本軍照得上件米係是當來委官和糴到數目切慮虧損元價未敢擅便出糶具狀申提舉使衙照㑹依目今所估價直賑糶應接民間食用庶㡬飢民不致流移行下置場不許畱滯客旅契勘本軍今嵗旱傷細民闕食雖移文江西州縣通放到客米舟船又慮牙鋪解落及市民日糴數少阻滯客旅不便遂行委官置場支撥官錢依市價兩平交量収糴客米以備賑糶應接細民食用今訪聞得本場每遇客米到場中糶更不即時交量及至交量又不即時支還價錢切慮合干人因而作弊畱滯乞覓錢物合行約束限當日交量即時當官支結價錢如違將犯人勘斷行下兩縣委官捉人户糶米減尅契勘管下今嵗旱傷細民闕食使軍遂措置支撥官錢差人前往外州縣収糴到米分撥兩縣出糶訪聞合干人將人户所糴米並不依實支量公然作弊減尅今委逐縣知縣縣尉每日不測捉人户所糴米三兩户當官覆量如有少數即根究解人赴軍申諸司乞行下江西不許遏糴契勘本軍并管屬諸縣今嵗旱傷最甚細民闕食及無米支遣軍粮遂多方借兊官錢差撥公吏前去江西得熟處州縣収糴米數回軍賑糶支遣及檢凖淳熙令災傷官司不得禁止搬販及近降指揮州縣不許閉糴如有遏糴州軍許鄰州越訴及凖今年八月十九日聖旨節文江東安撫使陳少保奏今嵗災傷先合措置通放米斛州縣有遏糴去處許行越訴本軍遂節次備坐移文隆興府照會収糴去後已承回報行下諸縣許令本軍所差人収糴米穀放行今却據差去公吏吕棋狀申在本軍建昌縣管下二陂山田等處四散収糴靖安新建縣鄉人米斛欲装上船覩奉新縣尉司弓手五十餘人各持鎗棒沿江巡綽不容装發米斛又被奉新縣差人越界釘斷建昌縣管下三陂潭徳爻口陂水把截不放船隻上下往來巳申建昌縣差保正隅官防䕶所糴米船今於十月二十四日被奉新縣差弓級徐成等部領弓手保正等於要路把截不容鄉人搬糴米穀申乞施行本軍今照差去公吏吕棋係在本軍建昌縣界収糴靖安新建縣管下米穀其奉新縣官吏公然違戾見行條法及不遵今年八月十九日專降聖旨指揮輙差弓手持鎗棒㳂河巡綽不容収糴又差人越界前來建昌縣管下三陂把截釘斷水口不惟本軍所糴米穀百端攔遏不行通放有悞賑糶支遣至於客販米穀舟船亦不得往來公私利害至重移文隆興府并江西轉運司照詳前項條法指揮請將奉新官吏按劾仍通放米船并申諸司行下隆興府通放本軍所糴米船并申御史臺乞依近降指揮彈奏施行晦庵别集卷六欽定四庫全書晦庵别集卷七宋朱子撰
