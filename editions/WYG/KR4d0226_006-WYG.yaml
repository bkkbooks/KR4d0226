body:
  text: 晦庵集卷六宋朱子撰詩和人逰西巖平生壯志浩無窮老寄寒泉亂石中閑去披襟㺯清泚静來合眼聽玲瓏不知澗寺晴時雨何似溪亭落處風吟罷君詩自瀟灑此心端不限西東次知郡章丈遊山之韻前峰鸞鶴去無蹤邂逅荒尋得故宫但覺風烟隨意好便驚塵土轉頭空提壺命駕幽期逺授簡哦詩妙處同安得西山一丸藥共隨簫鼔向雲中題周氏溪園三首循澗闢芳園結亭對虛壁澄潭俯幽鑒空翠仰寒滴主人心事逺妙寄塵壌隔豈為功名期而忘此泉石溪亭危亭竹栢間悄蒨日幽絶朔風一以厲愛此枝上雪仰悲𤣥景駛俯歎羣芳歇不用此時來那知歳寒節雪亭手種籬間樹枝繁不忍刪新亭最佳處勝日共懽顏景晏春紅淺雨餘寒翠澘光風囘巧笑桃李任漫山嫣然亭寄林擇之故人千里寄書來三復塵襟頓豁開勸我從容深燕飬莫將佔畢苦沉埋杖藜此日應同趣揮麈何時得共陪珍重相期俱努力自慚殊未竭淵才送林擇之還鄉赴選三首青驪去路欲駸駸囘首猶須話此心一别便成三數月有疑誰講過誰箴門外槐花似欲黄高堂應望促歸装箇中自有超然處肯學兒曹一例忙今朝握手送君歸馬上薰風拂面吹不用丁寕防曲學寒窓久矣共心期題林擇之欣木亭危亭俯清川登覽自晨暮佳哉陽春節看此隔溪樹連林争秀發生意各呈露大化本無言此心誰與晤真懽水菽外一笑和樂孺聊復共徜徉殊形乃同趣擇之誦所賦擬吕子進元宵詩因用元韻二首何處元宵好山房入定僧徃來衣上月明暗佛前燈實際徒勞說空華詎可憑還教知此意妙用一時興何處元宵好寒龕獨寐人月窓同皎皎燈鏡自塵塵静鑒通天地潛思妙鬼神却憐迷路子狂走閙城闉次韻擇之梧竹二首并呈季通竹塢深深處檀欒遶舍青暑風成慘淡寒月助清泠客去空塵榻詩來拓采櫺此君同一笑午夢頓能醒永日長梧下清隂小院幽自憐風嫋嫋客賦雨瀏瀏作别今千里相思欲九秋更憐同社友復此誤淹留擇之寄示深卿唱和烏石南湖佳句輙次元韻三首未識南湖景遥欣二子逰賞心并勝日妙語逼清秋䞉欲携書卷相将買釣舟㣲吟歸去晚杜若滿汀洲平湖渺空濶積水暮生寒但見緑千頃不知深幾竿人間元迫隘世路足艱難若了滄洲趣無勞正眼看年來年去為誰忙三伏炎蒸忽變凉閲世謾勞心悁悁塵人空得鬢蒼蒼詩篇眼界何終極道學心期未遽央安得追尋二三子舞雩風月共徜徉小詩奉送擇之仁友赴漕臺之招後篇喜趙公之得士而不敢致私怨焉然别懐黯然不能成章亦足以見區區也二首之子論交久深衷兩自知提擕方有頼離索遽成悲聖處應無數書來肯見私臨分莫惆悵努力共心期珍重東臺老英聲舊所聞能懐吐哺意豈但枉書勤得士看如許持心定不羣願言推此志清濁見朋分擇之賢友歸途左顧示以四明酬唱煥爛盈編三復咏嘆想見聚逰之樂輙用黄山即事之韻賦呈擇之兼懐子重老兄順之賢友十年身卧白雲堆已分黄塵斷徃回不是幽人遺俗去肯尋流水渡闗來三秋風月從頭說千里湖山覿面開久欲過逢須一快豈知勞結倍難裁夜聞擇之誦師曾題畫絶句遐想髙致偶成小詩一幅瀟湘不易求新詩誰遣送閑愁遥知水逺天長外更有離騷極目秋次林擴之開善避暑韻二首炎官虐焰遍山村也到蕭蕭栁下門水玉秋菰那可得羡君行處午隂繁山齋幾日旱塵昏欲拂朱絃已憚煩凉意感君持寄我雨聲花思滿胸存送林熈之詩五首君行徃返一千里過我屏山山下村濁酒寒燈静相對論心直欲到忘言仁體難明君所疑欲求直截轉支離聖言妙縕無窮意涵泳從容只自知天理生生本不窮要從知覺驗流通若知體用元無間始笑前來說異同十年燈火與君同誰道年來西復東不學世情雲雨手從教人事馬牛風古鏡重磨要古方眼明偏與日争光明明直照吾家路莫指并州作故鄉春雪用韓昌黎韻同彭應之作既有陽春曲那無白雪謡連天飛不斷著地煖還銷未掩髙人戸難齊衲子腰稍開銀世界漸長玉枝條興盡愁烟艇行迷認野橋酒腸渾欲凍吟筆為誰摇殘臘成三白餘寒又一朝香隨梅蘂落輕伴栁花飄神女羞捐佩鮫人敢獻綃東皇應好事避舍亦相饒次彭應之餐雪韻雪水瀹清茗自謂絶世清終然犯烟火况復勞煎烹豈如午霽餘探此竹外楹柘漿發甘和寳盌凝寒晶心胸既清凉齒頰亦鏘鳴吞腥期永謝飲玉希長生次彭應之魚樂亭韻亭前活水破輕氷漸見遊鯈傍石稜老子自知魚樂處不須莊惠與同登與劉德明祝濟之胡子寛晚歩偶成雨罷寒逾勁霜威正凛然不知荒逕溼行到野橋邉曠望情何極徘徊意莫傳清波涵衆影日落暗晴川劉德明彥集祝弟以夏雲多奇峰為韻賦詩戲成五絶出山㡬何時歸來便長夏端居心不怡散䇿長林下為客厭城市還家辭世紛朝昏何所見但有四山雲閉門事幽討歳月忽已多客來無可問與君共絃歌干時本已懶胸次况無奇若問中林趣婆娑祗自知炎蒸不可奈雲氣滿前峰向夕風吹盡微聞逺寺鐘仙洲新亭熹名以晝寒紫㣲張公為書其額判院劉丈乃出新句輙次髙韻二首聞説藤蘿外神龍舊所蟠擘開千丈峽寫盡一襟寒賞寄三杯酒歸投六尺竿若無詩律好清絶不成歡悄蒨非人境寒蟬夏已稠陽崖驚素雪午扇怯清秋共說新亭好真堪妙墨留賞心元不厭仙夢肯來遊時已聞國之計次韻晝寒行穿危磴盡林表見孤亭澗瀉千尋白峰囘四靣青塵襟元落落風腋自泠泠一醉今何許無心賦獨醒次院判丈晝寒亭韻有懐平父把酒懐人處幽尋記徃時新亭勞指顧勝踐闕追隨為報層櫩出莫憂浮柱欹惟應舊飛雪想象合心知次判院丈清湍之什明滅青羅帶周遭碧玉環孤亭感陳迹茂樹喜重攀爽氣琴尊外泉聲枕簟間詩成無寫處絶壁蘚㾗斑遊密菴分韻賦詩得還字我行得佳友勝日尋名山春山既妍秀清溪亦潺湲行行造禪扉小憇腰脚頑窮探意未已理䇿重躋攀入谷翳䝉密俯澗隨泓灣誰将百尺綃掛此長林間雄聲殷地厚洪源瀉天慳偉哉奇特觀償此一日閑所恨境過清悄愴暮當還顧歩三歎息人生何苦艱遊密菴分韻賦詩得絶字閩鄉饒奇山仙洲故稱傑巍然一峰髙復與衆山絶傳聞極目處天水逺明滅萬里倐徃還三光下羅列我來發孤興竟欲躋嵽嵲病骨竟支離何當攀去轍次韻宿密菴忽作經宵别胸奇莫與陳暮歸誇得句寒苦頓生春道義知無斁文章自有真它年應共說此日自由身遊密菴弱齡慕丘壑兹山屢逰盤朝躋青㝠外暮陟浮雲端晴嵐染襟裾水石清肺肝俯仰未云已歳月如飛翰中年塵霧牽引脰空長歎曠歳一登歴心期殊未闌矧此親友集笑談有餘歡結架迫彎碕徙倚臨奔湍共惜前古秘今為後來觀落景麗雲木囘風馥秋蘭林昏景益佳悵然撫歸鞍諒哉故山好莫遣兹盟寒游晝寒以茂林脩竹清流激湍分韻賦詩得竹字仙洲幾千仭下有雲一谷道人何年來借地結茅屋想應厭塵網寄此媚幽獨架亭俯清湍開徑玩飛瀑交游得名勝還徃有篇牘杖屨或鼎來共此巖下宿夜燈照奇語曉䇿散游目茗椀共甘寒蘭皐薦清馥至今壁間字來者必三讀再拜仰髙山􅌶然心神肅我生雖已後久此寄齋粥孤興屢呻吟羣遊幾追逐十年落塵土尚幸不逺復新凉有佳期㡬日戒征軸宵興出門去急雨遍原陸入谷尚輕埃觧裝已銀竹虛空一瞻望逺思翻蹙恧袒跣亟躋攀冠巾如膏沐雲泉增舊觀怒響震寒木深尋得新賞一簣今再覆同來况才彥行酒屢更僕從容出妙句珠貝爛盈匊後生更亹亹俊語非碌碌吾纓不復洗已失塵萬斛所恨老無奇千毫真浪秃聞季通德明諸友入山以詩迎之仍請先徃觀瀑布勝友南窓底看書老歳華不因寒瀑響肯到野僧家古徑開能久新亭去豈賖躋攀那可緩寂寞有雄夸次觀瀑布韻快瀉蒼崕一道泉白龍飛下鬱藍天空山有此真奇觀倚杖来看思凛然和季通晝寒韻萬壑争流處千年樹石幽危亭因我作勝日為君留酒笑紅裙醉詩慙雜珮酬尚嫌心境窄更約九垓游次韻謁忠顯劉公墓下理亂由來今古同覆車那肯戒前蹤紛紛誤國人無數不昩丹心獨此公次季通晝寒亭韻二首不信髙懐與世殊清游試問與誰俱相将静聽潺湲水洗滌塵襟肯自汚山行前後有光輝撲撲浮嵐翠染衣直到仙洲奇絶處晝寒亭下白龍飛飲清湍亭石上小醉再登晝寒水邉今日共傳杯多謝殷勤數子來三伏炎蒸那有此百年懐抱頓能開雲山合匝還生霧雪澗崩騰怒吼雷却恨蒼屏遮逺目凌風直欲跨蓬萊次清湍亭韻二首上下青山今白頭穿雲入塢未能休因君去覔仙洲路却歎周南獨滯留仄徑穿雲欲造天未妨停䇿聽涓涓知君便有刀頭意莫忘仙洲澗底泉立春大雪邀劉圭甫諸兄遊天湖同雲被四野寒氣慘悲凉囘風一以定密雪來飄揚時當冬候窮開歳五日彊蓬巷無與適陟此瓊臺岡賔友既追隨兒童亦擕將攀躋得冡頂徙倚聊彷徨俯視千里空仰看萬鶴􅃋逺迷亂峰翠近失平林蒼偃薄瑩神骨咀嚥清肝膓朗詠招隱作悲吟黄竹章古人不可見來者誰能量且復記兹日他年亦難忘次圭父游将軍巖韻二首極目危岑杳靄間誰將層棟壓巑岏瘦笻上上莫辭逺絶境行行得細觀眢井尚餘茅絰處考槃無復碩人寛倦來拂石支拳睡萬壑吟風午夢䦨陳迹真成俯仰間囘頭猶認碧巑岏更煩地主殷勤意得盡雲山表裏觀景晏共愁歸路逺年侵獨負酒盃寛明朝覔句酬珠玉剩喜詩情却未䦨圭父約為金斗之遊次韻獻疑聊發一笑㡬日春風未破寒逺峰晴露玉巑􅖺不成蠟屐携笻去且復鉤窓拄頰觀聞道追遊當作意故應期日尚能寛隂崖凍合無垂練却恐詩翁興易䦨次彦集經營别墅之作回北成南指顧間要令華敞對巑岏家山信有千巖擁家山堂見武夷諸峯雲月何妨兩處觀傑閣已資鄰築勝熹近䝉知府掇賜舊第樓居新基還見繚墻寛老仙鶴骨殊蕭爽歸興從今豈易䦨彦集圭父擇之同飲白雲精舍以醉酒飽德為韻熹分得飽字醉中走筆奉呈奔趨名利場禍福急相絞夜窓一反側膚垢紛兩𤓰豈知親朋集晚食聊一飽心期共悠悠文字各稍稍華燭既屢更詩腸亦頻攪寒更儘渠深孤諷寧至夘次劉圭甫和人梅花韻意行欲遍江村路恰到詩人斷魂處梅花未肯笑春風蔓草何須怨零露歸來四壁無餘聲俯檻秪有寒塘青美人邂逅一笑粲倒影的皪疎枝横寸心久矣遺紛雜不但老禪齋夏臘此時悢悢欲何言本根落落㡬難合走遍諸君詩卷中西湖東閣病還同劃然長嘯驚夢破碧雲散盡山叢叢平父有攀條嚼蘂繞千囬日暮碧雲驚四合之句故云奉酬圭父末利之作玉蘂琅玕樹天香知見薰露寒清透骨風定逺含芬爽致銷繁暑髙情謝曉雲遥憐河朔飲那得醉時聞奉酬圭父白蓮之作忽傳䕫府句并送逺公蓮翠盖臨風迥氷華浥露鮮舞衣清縞袂倒景爛珠躔想象芙蓉闕冥冥絶世縁次圭父觀魚韻平生三伏斷追遊誰喚來穿澗樹幽初訝網横天影破忽驚人蹴浪花浮鳴榔不用齊吳榜鼓枻何須學楚謳便有金盤堆白雪却憐清泚向東流奉同黄子厚賦白芙蓉呈劉彥集平父湛湛曲池水曉含風露清田田緑蘿盖粲粲白玉英澹然絶世姿不與穠艶并俯鑒氷雪影詎懐兒女情山中徒淹留堂下空目成獨有㤀機客相看兩無營觀洪遵雙陸譜有感呈劉平甫范仲宣二兄近從新譜識梟盧擬喚安陽舊博徙只恐分隂閒過了更教人誚牧猪奴陶桓公嘗語人曰大禹聖者乃惜寸隂至扵衆人當惜分隂豈可逸逰荒醉生無益於時死無聞於後是自棄也諸參佐或以談戲廢事者乃命取其酒器蒲摶之具悉投之江吏將則加鞭朴曰樗蒲者牧猪奴戲耳君子當正其衣冠攝其威儀何有蓬頭跣足自謂