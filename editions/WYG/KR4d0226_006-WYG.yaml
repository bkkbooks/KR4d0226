必問真源神襟一蕭爽石池兩岸蒼峭石䕶此碧泓寒秋月來窺影驪珠吐玉盤山楹山楹一悵望恨此雲迷谷仙人不可期縹緲雙髻緑藥圃長鑱劚靈根蒔此泉下圃珍劑未須論丹荑已堪煑井泉山髙澤氣通石竇飛靈液默料谷中雲多應從此出西寮畬田種胡麻結草寄林樾珍重無心人寒棲㺯明月晦菴憶昔屏山翁示我一言教自信久未能巖棲冀㣲效草廬青山遶蓬廬白雲障幽戸卒歳聊自娱時人莫留顧懐仙西望多奇峯北瞰獨仙府欲致武夷君石壇羅桂醑揮手山臺一揮手從此斷将迎不見塵中事惟聞打麥聲雲社自作山中人即與雲為友一嘯雨紛紛無勞三奠酒桃蹊澗裏春泉響種桃泉上頭爛紅紛委地未肯出山流竹塢悄蒨桃蹊北蕭槮竹塢深不堪秋夜永風雨助悲吟漆園舊聞南華仙作吏漆園裏應悟見割憂㗳然空隠几茶坂擕籝北嶺西采擷供茗飲一啜夜窓寒跏趺謝衾枕絶頂當年赫曦臺移治在兹嶺寥廓無四鄰三光疑倒影北澗土斷川亦分北下成隂澗秀石得佳名服膺吾敢慢澗有仁義石中溪南下東嶺阿云是中溪道巖樹愛樛枝石田悲蔓草休菴别嶺有精廬林巒亦幽絶無事一徃來茶𤓰不復設雲谷雜詩十二首登山夕陽翳東峰微月下西嶺不辭青鞋穿陟此巖路永巖路永且躋中情何耿耿值風山下風吹衣山上風抜木茅茨何足保瀛海慮翻覆未念執鬯人無心還自恧見易傳震卦􅥬月風起雲氣昏風定天宇肅遥遥萬里暉炯炯穿我屋良友共徘徊山中詎幽獨謝客野人載酒來農談日西夕此意良已勤感歎情何極歸去莫頻來林深山路黑勞農四體久不勤筋力坐駑緩何事兩山阿離離豆苗滿多謝植杖翁居然見長短講道髙居逺塵雜崇論探杳㝠亹亹𤣥運駛林林羣動爭天道固如此吾生安得寧懐人吾黨二三子欲來從我逰塵機諒擾擾遐諾終悠悠空山日復晚佇立悵夷猶子厚伯崇有約不至倦遊故人千里别約我仍丹丘云何一觧散書到令人愁此山豈不幽何必賦逺遊時得伯㳟書報罷天台之遊修書紬書厭塵累執簡投雲闗靈鑰啓𤣥秘肅斧鋤幽姦書成莫示人留置此山間宴坐登山思無窮臨水心未厭沈痾何當平膏肓今自砭默坐秋堂空遐觀靡餘念下山行隨流水聲歩出哀壑底緑樹枝相樛白澗石齒齒樹石無窮年流水日千里還家出去柴門掩歸來蕙草秋素荂林下吐清芬衣上浮欲寄山中友日暮悵離憂雲谷合記事目要俳體戲作三詩寄季通雲闗須早築基址要堅牢栽竹行教密穿池岸欲髙乘春移菡蓞帶雪覔蕭槮謂杉徑也更向闗門外疏泉斬亂蒿堂成今六載上雨復旁風逐急添茆盖連忙畢土功謂柱下貼磚桂林何日秀蘭逕幾時通并築雙臺子東山接水筒荘舍宜先立山楹却漸營泉疏藥圃潤堰起石池清早印荒田契仍標别戸名想應頻檢校秪恐欠方兄雲谷懐魏元履歎息艮齋老當年共此來千峰奇絶處一望興悠哉病怯披雲卧詩勞擁鼻裁秪今何處所宿草閟餘哀送許順之南歸二首門前三逕長蒿萊愧子殷勤千里來校罷遺書却歸去此心元自不曾灰㡬年江海事幽尋徧與雲僧話此心今日肯來論舊學歳寒猶恐雪霜侵宿雲際寺許順之将别以詩求教次韻薄暮投花縣聫車入翠微長林生缺月永夜照寒扉情話欣無斁離懐悵有違勉哉彊毅力千里要同歸挽汪端明三首聖主興炎運明公起妙年材推漢庭右學自北方傳出入丹心壯安危素髮鮮空餘題劍在光燭舊林泉矌宇元無際孤標自不羣物情良有寄讒口詎堪聞未許時明政猶堪史闕文衣冠忽長夜餘子謾紛紛先友當年盛斯文元祐徒艱虞共流落存沒半嗚呼顧我真無頼逢公幸不孤秪今還一慟即此是窮塗彥集奉檄歸省示及佳篇次韻奉酬呈諸兄友遊子思親久聚糧不堪官裏簿書忙平生况少鷹鸇志此日尤慙時世粧臘雪未消歡奉檄春風初轉喜還鄉上堂佳慶從容問一嚼何妨累十觴彥集兄再適臨汀惠顧蓬蓽賦詩留别眷予良勤次韻祖行言不盡意賸喜君才老更成伊優叢裏見孤撑官身未免心徒壯親膝頻違淚欲横簿領不嫌春筍束亷聲要比玉壺清枉車投翰殷勤甚安得仁言與贈行圭父為彥集置酒白蓮沼上彥集有詩因次其韻呈坐上諸友大阮歸來客滿堂更移芳席近回塘共憐的礫水花净并倚離披風盖凉銀筆看題青玉案佳人悵望白雲鄉此情此景真愁絶病著無因為舉觴寄題宜春使君定叟張兄隱齋大專槃萬生異體實同氣云胡分彼已直以私自蔽君家桂林伯德學妙一世閉戸不忘憂纓冠矧行義眷言介弟賢四益謹先畀千里各分符一心同盡瘁逺題齋戸冊來表棲息地系述寫心胸俯仰資惕厲陽嘉既滌蕩隂慝失封閉介然彼苛癢嚇若我黔劓拊摩極哀恫征取敢常藝戰兢一日力洋溢四封被君看物我間隠顯豈殊致願反振民功更懋根本計次韻題平父兄重建一枝堂畫㦸朱門枕碧山貂蟬元自出儒冠更餘此日林間樂逺繼當年膝下歡命駕賔朋千里近放懐琴酒百憂寛遺編却好傳孫子莫遣因循學晏安日用自警示平父圓融無際大無餘即此身心是太虛不向用時勤猛省却於何處味真腴尋常應對尤須謹造次施為更莫疎一日洞然無别體方知不枉費功夫抄二南寄平父因題此詩闕里言詩得賜商子貢子夏千秋誰復與相望鄒汾孟子文中子斷簡光前載闗洛張子程子新書襲舊芳析句分章功自少吟風㺯月興何長從容詠歎無今古此樂從兹樂未央題劉平甫定菴五詠定菴風生長林悲雲起空谷暝下有不死人一室常在定巢雲入山何所見雲樹春濛濛安知巢居子避世於其中山臺林居厭棲迷山頂幸清曠無事一登臨却愁心浩蕩井泉開山昔何人鑿此寒泉井獨夜𠻳瓊瑶泠然發深省夀穴百年不可期一壑當預卜自憐木偶人空羡王官谷劉平甫席上分韻得寫字歳暮風雨交流雲暗平野公子燕華姻招呼及同社髙情寄壺觴晤語到風雅剪燭夜堂深幽懐共輸寫此詩恐當作一首劉平甫分惠水梔小詩為謝二首年來衰懶罷書滛偶向盆山寄此心何事凉隂老居士便分幽賞助清吟何處飛來簷蔔林老枝樛屈更蕭槮凄凉杜老江頭句坐對行吟得自箴少陵江頭五詠於梔子詩云於身色有用與道氣傷和和喜雨二絶雨師誰遣送餘春珍重天公惠我民且看歡顏垂白叟莫愁頩頰踏青人黄昏一雨到天明夢裏豐年有頌聲起望平疇烟草緑只今投筆事農畊和章國華祈雨呈平父諸兄三首極目平疇半欲枯遥知精禱意無餘更憐不待豚蹄祝便得汙邪暗滿車九重清夜仰昭囬旱魃知從何處來不是幽人祈得雨又煩丹詔走風雷晴窓揮汗苦驕陽雨檻披衣快晚凉多謝龍公餘事業為驅寒谷變炎方山館諸兄共賦驟雨鷺鷥二絶平疇焦渴不堪論簫鼓悲秋徹帝閽霹靂一聲雲自墨山前山後雨翻盆雨罷微塘凛欲秋飛來白鳥便夷猶從今認得横塘路水逺山長百不憂唐石雪中春風欲動客辭家霖潦縱横路轉賖行到溪山愁絶處千林一夜玉開花秋日同廖子晦劉淳叟方伯休劉彥集登天湖下飲泉石軒以山水含清暉分韻賦詩得清字閒居寡儔侣掩闗抱孤清良友倐來止曠然舒我情矧此凉秋初暑退裳衣輕相與一携手東山𦕈遐征前穿林嶺幽俯瞰川原平降集崖寺古徘徊濁醪傾長吟伐木篇濳鱗亦相驚願結沮溺耦窮年此巖畊淳熈戊戌七月二十九日與子晦純叟伯休同發屏山西登雲谷越夕乃至而季通德功亦自山北來㑹賦詩記事以雲卧衣裳冷分韻賦詩得冷字端莢得幽貞考槃寄兹嶺未成長徃計抱恨中耿耿秋風吹庭樹遥夜枕席冷感彼歳序移慨此心事永明晨發孤興趣駕向絶境躋攀力雖倦想象意逾騁雲山一以眺俯仰疑倒景檢校石田收眷戀茅屋静淹留復未遂外物愧張邴珍重同來人妙語各清整擊節三歎餘超然得深省宿黄沙以山如翠浪湧分韻賦詩得如字日中秣吾馬日暮膏吾車崎嶇陟南嶺浩蕩凌八嶇夜雨薦峰前朝登碧琳瓀蒼茫永歗罷翕忽清景徂去此二三子我行將焉如崔嵬正丘垤萬里思南圖雲谷次吳公濟韻昔營此幽棲邈與世相絶誓将百年身來守固窮節心期苦未遂歳月一何濶終然匹夫志肯遽甘沒沒兹晨復登瞰目盡雲一抹激烈永歗餘朗寥高韻發夫君内德備不學王駘兀觀心見參倚出世自英傑朅來肯顧我同去弄雲月微言得深扣大句亦孤㧞多謝警疎慵未敢歎瞻忽更問毫釐間是同端是别宿休庵用德功壁間韻贈陳道人暮入千峰裏寒棲一草菴室連丹竈煖厨引石泉甘塵慮紛難到神光暖内含非君有道氣孤絶詎能堪挽劉樞密三首天畀經綸業家傳忠義心謀謨經國逺勲烈到人深廊廟風雲斷江湖歳月侵一朝成殄瘁九牧共沾襟談笑平蠻䇿焦勞振廪功復讐乖宿志忍死罄餘忠人嘆百身贖天悲一鑑空九原終莫起千載自英風久矣身無用前恩嘆莫償豈期今老大復此重悲傷淚向遺書盡心隨宿草荒諸君那不死慟絶鬢成霜武夷七詠天柱峯屹然天一柱雄鎮斡維東秪說乾坤大誰知立極功洞天絶壁上千尋隠約巖栖處笙鶴去不還人間自今古畫鶴誰冩青田質髙超鴈鶩羣長疑風月夜清唳九霄聞仰髙堂靣勢來空翠哦詩獨好仁懐人今已矣誰遣棟梁新此堂與迎緑亭皆劉建康所名禮記引髙山仰止景行行止之詩而曰詩之好仁如此趨真亭危亭久已傾秪有頽基在何事徃來人不知容鬢改大小藏巖藏室岌相望塵編何莽鹵欲問伯陽翁風烟迷處所丹竈仙人推卦節煉火守金丹一上烟霄路千年亦不還壬子三月二十七日聞迅雷有感誰將神斧破頑隂地裂山開鬼失林我願君王法天造早施雄斷答羣心考異和人遊西巖澗寺一作澗樹題周氏溪園三首一無後一首次韻梧竹檀欒一作團欒慘淡一作惨澹次開善避暑韻花思滿胸存一作花氣滿思存送林熈之妙縕一作妙蓄只自一作合自若知體用元無間一作若明體用真無間晚歩偶成雨罷寒逾勁一作雨歇寒逾勁暗晴川一作陪澄鮮和晝寒韻争流一作爭陳樹石一作謝石謁劉公墓誤國一作迷國此公一作我公次彥集别墅信有一作倍有次和人梅花韻本根一作本願蔊芳杳一作芬杳翠頴一作秀頴芹牧單一作收功筍籜龍一作伏龍寄吳公濟客子一作投紱秪應一作秪因罷登一作倦登從今一作只今寄聲一作寄音年深一作年來欲問一作若問游百丈山隨川一作隨風石臺出谷一作山谷同丘子服逰蘆峰兩川一作滿川杉逕南起一作晨起桃蹊裏春一作東春絶頂移治在兹嶺一作移來名北嶺休菴林巒一作林􅦎值風山上一作山中謝客酒來一作酒至頻來一作煩來修書雲闗一作靈闗定菴山臺林居一作林中雲谷次吳公濟韻觀心見參倚一作秉心極清浄世自一作世有更問一作且問晦庵集卷六欽定四庫全書晦菴集卷七宋朱子撰
