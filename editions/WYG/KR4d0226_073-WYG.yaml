seq: 73
front:
  text: 隱之尊孟辨隱之名允文建安人
  hash: sha256:d930f26ddbe5a5a93f90ebcac0241f8ba70513d93a8d1a7f256953238a504e78
body:
  text: 温公疑孟上疑曰孟子稱所願學者孔子然則君子之行孰先於孔子孔子厯聘七十餘國皆以道不合而去豈非非其君不事歟孺悲欲見孔子孔子辭以疾豈非非其友不友乎陽貨為政於魯孔子不肯仕豈非不立於惡人之朝乎為定哀之臣豈非不羞汚君乎為委吏為乘田豈非不卑小官乎舉世莫知之不怨天不尤人豈非遺佚而不怨乎飲水曲肱樂在其中豈非阨窮而不憫乎居鄉黨恂恂似不能言豈非由由然與之偕而不自失乎是故君子邦有道則見邦無道則隱事其大夫之賢者友其士之仁者非隘也和而不同遯世無悶非不㳟也苟毋失其中雖孔子由之何得云君子不由乎辨曰孟子曰伯夷隘栁下惠不㳟隘與不㳟君子不由原孟子之言非是瑕疵夷惠也而清和之弊必至於此葢以一於清其流必至於隘一於和其流必至於不㳟其弊如是君子豈由之乎苟得其中雖聖人亦由之矣觀吾孔子之行時乎清而淸時乎和而和仕止久速當其可而已是乃所謂時中也是聖人之時者也詎可與夷惠同日而語哉或謂伯夷制行以清下惠制行以和捄時之弊不得不然亦非知夷惠者苟有心於制行則清也和也豈得至於聖哉夷之清惠之和葢出於天性之自然特立獨行而不變遂臻其極至此其所以為聖之清聖之和也孟子固嘗以百世之師許之矣慮後之學者慕其清和而失之偏於是立言深捄清和之弊大有功於名教疑之者誤矣觀吾夫子之行時乎清而清時乎和而和仕止久速當其可而已是乃所謂時中也是聖人之時者也詎可與夷惠同日而語哉五十八字愚欲刪去而補之曰然此不待别求左驗而是非乃明也姑即温公之所援以為說者論之固已曉然矣如温公之説豈非吾夫子一人之身而兼二子之長歟然則時乎清而非一於清矣是以清而不隘時乎和而非一於和矣是以和而未嘗不㳟其曰聖之時者如四時之運温凉和燠各以其序非若伯夷之清則一於寒凉栁下惠之和則一於温燠而不能相通也以是言之則是温公之所援以為說者乃所以助孟子而非攻也又曰苟有心於制行至章末愚欲刪去而易之曰使夷惠有心於制行則方且勉强修為之不暇尚何以為聖人之清和也歟彼其清且和也葢得於不思不勉之自然是以特立獨行終其身而不變此孟子所以直以為聖人而有同於孔子也又恐後之學者慕其清和而失之一偏於是立言以捄其末流之弊而又曰乃所願則學孔子也其抑揚開示至深切矣亦何疑之有疑曰仲子以兄之祿為不義之禄葢謂不以其道事君而得之也以兄之室為不義之室葢謂不以其道取於人而成之也仲子葢嘗諌其兄矣而兄不用也仲子之志以為吾既知其不義矣然且食而居之是口非之而身享之也故避之居於於陵於陵之室與粟身織屨妻辟纑而得之也非不義也豈當更問其築與種者誰歟以所食之鵝兄所受之饋也故哇之豈以母則不食以妻則食之耶君子之責人當探其情仲子之避兄離母豈所願耶若仲子者誠非中行亦狷者有所不為也孟子過之何其甚耶辨曰陳仲子弗居不義之室弗食不義之禄夫孰得而非之居於於陵以彰兄之過與妻同處而離其母人則不為也而謂仲子避兄離母豈所願耶殊不曉其說仲子之兄非不友孰使之避仲子之母非不慈孰使之離烏得謂之豈所願耶仲子齊之世家萬鍾之祿世之有矣不知何為諌其兄以其祿與室為不義而弗食弗居也謂仲子為狷者有所不為避兄離母可謂狷乎孟子深闢之者以離母則不孝避兄則不㳟也使仲子之道行則天下之人不知義之所在謂兄可避母可離其害教也大矣孟子之言履霜之戒也歟温公云仲子嘗諌其兄而兄不用然且食而居之是口非之而身享之也故避之又曰仲子狷者有所不為者也愚謂口非之而身享之一時之小嫌狷者之所不為一身之小節至於父子兄弟乃人之大倫天地之大義一日去之則禽獸不逺矣雖復謹小嫌守小節亦將安所施哉此孟子絶仲子之本意隱之云仲子之兄非不友孰使之避仲子之母非不慈孰使之離愚謂政使不慈不友亦無逃去之理觀舜之為法於天下者則知之矣疑曰孔子聖人也定哀庸君也然定哀召孔子孔子不俟駕而行過位色勃如也足躩如也過虛位且不敢不㳟况召之有不徃而他適乎孟子學孔子者也其道豈異乎夫君臣之義人之大倫也孟子之徳孰與周公其齒之長孰與周公之於成王成王㓜周公負之以朝諸侯及長而歸政北面稽首畏事之與事文武無異也豈得云彼有爵我有徳齒可慢彼哉孟子謂蚳鼃居其位不可以不言言而不用不可以不去已無官守無言責進退可以有餘裕孟子居齊齊王師之夫師者導人以善而救其惡者也豈謂之無官守無言責乎若謂之為貧而仕耶則後車數十乘從者數百人仰食於齊非抱關撃柝比也詩云彼君子兮不素餐兮夫賢者所為百世之法也余懼後之人挾其有以驕其君無所事而貪祿位者皆援孟子以自况故不得不疑辨曰孟子將朝王王使人來曰寡人如就見者也有寒疾不可以風朝將視朝不識可使寡人得見乎探王之意未嘗以尊徳樂道為事方且恃萬乘之尊而不肻先賢者之屈故辭以疾欲使孟子屈身先之也孟子知其意亦辭以疾者非驕之也身可屈道其可屈乎其與君命召不俟駕而行異矣又孟子曰天下有逹尊三朝廷莫如爵鄉黨莫如齒輔世長民莫如徳夫尊有徳敬耆老乃自古人君通行之道也人君所貴者爵爾豈可慢夫齒與徳哉若夫伊尹之於太甲周公之於成王此乃大臣輔導㓜主非可與逹尊槩而論也又孟子謂蚳鼃為士師職所當諫諌之不行則當去為臣之道當如是也為王之師則異矣記曰君之所不臣於其臣者二而師處其一尊師之禮詔於天子無北面非所謂有官守有言責者也其進退豈不綽綽然有餘裕哉孟子以道自任一言一行未嘗少戾於道意謂人君尊徳樂道不如是則不足與有為而謂挾其有以驕其君無所事而貪祿位者過矣温公云孔子聖人也定哀庸君也然定哀召孔子孔子不俟駕而行過位色勃如也足躩如也過虚位且不敢不恭况召之有不徃而他適乎孟子學孔子者也其道豈異乎夫君臣之義人之大倫也孟子之徳孰與周公其齒之長孰與周公之於成王成王㓜周公負之以朝諸侯及長而歸政北面稽首畏事之與事文武無異也豈得云彼有爵我有齒徳可慢彼哉愚謂孟子固將朝王矣而王以疾要之則孟子辭而不徃其意若曰自我而朝王則貴貴也貴貴義也而何不可之有以王召我則非尊賢之禮矣如是而徃於義何所當哉若其所以與孔子異者則孟子自言之詳矣恐温公亦未深考耳孟子逹尊之義愚謂逹者通也三者不相值則各伸其尊而無所屈一或相値則通視其重之所在而致隆焉故朝廷之上以伊尹周公之忠聖耆老而祗奉嗣王左右孺子不敢以其齒徳加焉至論輔世長民之任則太甲成王固拜手稽首於伊尹周公之前矣其迭為屈伸以致崇極之義不異於孟子之言也故曰通視其重之所在而致隆焉唯可與權者知之矣官守言責一職之守耳其進退去就決於一事之得失一言之從違者也若為師則異於是矣然亦豈不問其道之行否而食其祿耶觀孟子卒致為臣而歸齊王以萬鍾畱之而不可得則可見其出處之大槩矣疑曰孟子知燕之可伐而必待能行仁政者乃可伐之齊無仁政伐燕非其任也使齊之君臣不謀於孟子孟子勿預知可也沈同既以孟子之言勸王伐燕孟子之言尚有懷而未盡者安得不告王而止之乎夫軍旅之事民之死生國之存亡皆繫焉苟動而不得其宜則民殘而國危仁者何忍坐視其終危乎辨曰沈同問燕可伐孟子答之曰可伐者言燕之君臣擅以國而私與受其罪可伐沈同亦未嘗謂齊將伐之也豈可臆度其意預告之以齊無善政不可伐燕歟且言之不可不慎也久矣彼欲伐人之國未嘗與已謀苟逆探其意而沮其謀政恐不免貽禍矣或謂其勸齊伐燕孟子已嘗自明其說意在激勸宣王使之感悟而行仁政爾孟子答問之際抑揚高下莫不有法讀其書者當求其立言垂訓之意而䆒其本末可也聖賢之心如明鑑止水來者照之然亦照其面我者而已矣固不能探其背而逆照之也沈同之問以私而不及公問燕而不及齊惟以私而問燕故燕之可伐孟子之所宜知也惟不以公而問齊故齊之不可伐孟子之所不宜對也温公疑孟子坐視齊伐燕而不諌隱之以為孟子恐不免貽禍故不諌温公之疑固未當而隱之又大失之觀孟子言取之而燕民悦則取之取之而燕民不悦則勿取然燕之可取不可取决於民之悦否而已使齊能誅君弔民拯之於水火之中則烏乎而不可取哉疑曰經云當不義則子不可不爭於父傳曰愛子教之以義方孟子云父子之間不責善不責善是不諫不教也可乎辨曰孟子曰古者易子而教之非謂其不教也又曰父子之間不責善父為不義則爭之非責善之謂也傳云愛子教之以義方豈自教也哉胡不以吾夫子觀之鯉趨而過庭孔子告之不學詩無以言不學禮無以立鯉退而學詩與禮非孔子自以詩禮訓之也陳亢喜曰問一得三聞詩聞禮又聞君子之遠其子孟子之言正與孔子不約而同其亦有所受而言之乎子雖不可以不爭於父觀内則論語之言則其諫也以㣲隱之説已盡更發此意尤佳疑曰告子云性之無分於善不善猶水之無分於東西此告子之言失也水之無分於東西謂平地也使其地東高而西下西高而東下豈決導所能致乎性之無分於善不善謂中人也瞽瞍生舜舜生商均豈陶染所能變乎孟子云人無有不善此孟子之言失也丹朱商均自㓜及長所日見者堯舜也不能移其惡豈人之性無不善乎辨曰孟子曰人性之善也猶水之就下也人無有不善水無有不下葢言人之性皆善也繋辭曰一陰一陽之謂道繼之者善也成之者性也是則孔子嘗有性善之言矣中庸曰天命之謂性樂記曰人生而静天之性也人之性禀於天曷嘗有不善哉荀子曰性惡楊子曰善惡混韓子曰性有三品皆非知性者也犠生犂胎龍寄蛇腹豈常也哉性一也人與鳥獸草木所受之初皆均而人為最靈爾由氣習之異故有善惡之殊上古聖人固有禀天地剛健純粹之性生而神靈者後世之人或善或惡或聖或狂各隨氣習而成其所由來也遠矣堯舜之聖性也朱均之惡豈性也哉夫子不云乎唯上智與下愚不移非謂不可移也氣習漸染之久而欲移下愚而為上智未見其遽能也詎可以此便謂人之性有不善乎温公疑孟下疑曰孟子云白羽之白猶白雪之白白雪之白猶白玉之白告子當應之云色則同矣性則殊矣羽性輕雪性弱玉性堅而告子亦皆然之此所以來犬牛人之難也孟子亦可謂以辨勝人矣辨曰孟子白羽之白與白雪白玉之同異者葢以難告子生之謂性之説也告子徒知生之謂性言人之為人有生而善生而惡者殊不知惟民生厚因物有遷所習不慎流浪生死而其所禀受亦從以異故有犬牛人性之不同而其本性未始不善也猶之水也其本未嘗不清所以濁者土汨之耳澄其土則水復清矣謂水之性自有清濁可乎孟子非以辨勝人也懼人不知性而賊仁害義滅其天理不得已而為之辨孝經曰天地之性人為貴以言萬物之性均惟人為貴耳性之學不明人豈知自貴哉此孟子所以不憚諄諄也此二章熹未甚曉恐隱之之辨亦有未明處疑曰禮君不與同姓同車與異姓同車嫌其偪也為卿者無貴戚異姓皆人臣也人臣之義諌於君而不聽去之可也死之可也若之何以其貴戚之故敢易位而處也孟子之言過矣君有大過無若紂紂之卿士莫若王子比干箕子㣲子之親且貴也㣲子去之箕子為之奴比干諌而死孔子曰商有三仁焉夫以紂之過大而三子之賢猶且不敢易位也况過不及紂而賢不及三子者乎必也使後世有貴戚之臣諌其君而不聽遂廢而代之曰吾用孟子之言也非簒也義也其可乎或曰孟子之志欲以懼齊王也是又不然齊王若聞孟子之言而懼則將愈忌惡其貴戚聞諌而誅之貴戚聞孟子之言又將起而蹈之則孟子之言不足以格驕君之非而適足以為簒亂之資也其可乎辨曰道之在天下有正有變堯舜之讓湯武之伐皆變也或謂堯舜不慈湯武不義是皆聖人之不幸而處其變也禪遜之事堯舜行之則盡善之噲行之則不善矣征伐之事湯武行之則盡美魏晉行之則不美矣伊尹之放太甲霍光之易昌邑豈得已哉為人臣者非不知正之為美或曰從正則天下危從變則天下安然則孰可苟以安天下為大則必曰從變可唯此最難處非通儒莫能知也尹光異姓之卿擅自廢立後世猶不得而非之况貴戚之卿乎紂為無道貴戚如㣲子箕子比干不忍坐視商之亾而覆宗絶祀反覆諌之不聽易其君之位孰有非之者或去或奴或諌而死孔子稱之曰商有三仁焉以仁許之者疑於大義猶有所闕也三仁固仁矣其如商祚之絶何季札辭國而生亂孔子因其來聘貶而書名所以示法春秋明大義書法甚嚴可以鍳矣君有大過貴戚之卿反覆諌而不聽則易其位此乃為宗廟社稷計有所不得已也若進退廢立出於群小閽寺而當國大臣不與焉用彼卿哉是故公子光使專諸弑其君僚春秋書吳以弑不稱其人不稱其國者歸罪於大臣也其經世之慮深矣此孟子之言亦得夫春秋之遺意歟隱之云三仁於大義有闕此恐未然蓋三仁之事不期於同自靖以獻于先王而已以三仁之心行孟子之言孰曰不可然以其不期同也故不可以一方論之况聖人之言仁義未嘗備舉言仁則義在其中矣今徒見其目之以仁而不及義遂以為三子猶有偏焉恐失之蔽也此篇大意已正只此數句未安疑曰君子之仕行其道也非為禮貌與飲食也昔伊尹去湯就桀豈能迎之以禮哉孔子棲棲皇皇周遊天下佛肸召欲徃公山弗擾召欲徃彼豈為禮貌與飲食哉急於行道也今孟子之言曰雖未行其言也迎之有禮則就之禮貌衰則去之是為禮貌而仕也又曰朝不食夕不食君曰吾大者不能行其道又不能從其言也使飢餓於我土地吾耻之周之亦可受也是為飲食而仕也必如是是不免於鬻先王之道以售其身也古之君子之仕也殆不如此辨曰孔子之於魯衞始接之以禮則仕及不見悦於其君則去豈可謂不為禮貌而仕歟為魯司㓂不用從而祭燔肉不至不稅冕而行豈可謂不為飲食而仕歟進以禮退以義得之不得曰有命孰謂孔子棲棲皇皇不為禮貌與飲食哉孟子曰迎之有禮則就禮貌衰則去又曰朝不食夕不食周之亦可受者則是言也未嘗或戾於吾孔子之所行如曰不為飲食則當慕夷齊可也又何仕為聖賢固不專為飲食其所以為飲食云者為禮貌耳而謂古之君子能辟榖者耶不顧廉恥而苟容者耶誦孟子之言而不量其輕重之可否何說而不可疑孟子言所就三所去三其上以言之行不行為去就此仕之正也其次以禮貌衰未衰為去就又其次至於不得已而受其賜則豈君子之本心哉盖當是時舉天下莫能行吾言矣則有能接我以禮貌而周我之困窮者豈不善於彼哉是以君子以為猶可就也然孟子葢通上下言之若君子之自處則在所擇矣孟子於其受賜之節又嘗究言之曰飢餓不能出門戸則周之亦可受也明未至於如是之貧則不可受免死而已矣言受之有限不求嬴餘明不多受以是而觀則温公可以無疑於孟子矣而隱之所辨引孔子事為證恐未然也疑曰所謂性之者天與之也身之者親行之也假之者外有之而内實亾也堯舜湯武之於仁義也皆性得而身行之也五覇則强焉而已夫仁所以治國家而服諸侯也皇帝王覇皆用之顧其所以殊者大小高下遠近多寡之間耳假者文具而實不從之謂也文具而實不從其國家且不可保况於覇乎雖久假而不歸猶非其有也辨曰仁之為道有生者皆具有性者同得顧所行如何耳堯舜之於仁生而知之率性而行也湯武之於仁學而知之體仁而行也五伯之於仁困而知之意謂非仁則不足以治國家服諸侯於是假而行之其實非仁也而謂皇帝王覇皆用之顧其所以殊者大小高卑遠近多寡之間耳何所見之異也孟子之言曰堯舜性之湯武身之五覇假之假之而不歸烏知其非有正合中庸所謂或安而行或利而行或勉强而行及其成功一也孟子之意以勉其君為仁耳惜乎五伯假之而不能久也隱之以五伯為困知勉行者愚謂此七十子之事非五伯所及也假之之情與勉行固異而彼於仁義亦習聞其號云爾豈眞知之者哉温公云假者文具而實不從之謂也文具而實不從其國家且不可保况於覇乎雖久假而不歸猶非其有也愚謂當時諸侯之於仁義文實俱䘮惟五覇能具其文耳亦彼善於此之謂也又有大國資强輔因竊仁義之號以令諸侯則孰敢不從之也哉使其有王者作而以仁義之實施焉則爝火之光其息久矣孟子謂久假不歸烏知其非有止謂當時之人不能察其假之之情而遂以為眞有之耳此正温公所惑而反以病孟子不亦誤哉疑曰虞書稱舜之徳曰父頑母嚚象傲克諧以孝烝烝乂不格姦所貴乎舜者為其能以孝和諧其親使之進進以善自治而不至於惡也如是則舜為子瞽瞍必不殺人矣若不能止其未然使至於殺人執於有司乃棄天下竊之以逃狂夫且猶不為而謂舜為之乎是特委巷之言也殆非孟子之言也且瞽瞍既執於臯陶矣舜烏得而竊之雖負而逃於海濵臯陶外雖執之以正其法而内實縱之以予舜是君臣相予為偽以欺天下也惡得為舜與臯陶哉又舜既為天子矣天下之民戴之如父母雖欲遵海濱而處民豈聽之哉是臯陶之執瞽瞍得法而亡舜也所亡益多矣故曰是特委巷之言殆非孟子之言也辨曰桃應之問乃設事耳非謂已有是事也桃應之意葢謂法者天下之大公舜制法者也臯陶守法者也脫或舜之父殺人則如之何孟子答之曰執之者士之職所當然也舜不敢禁者不以私恩廢天下之公法也夫有所受云者正如為將閫外之權則專之君命有所不受士之守法亦然葢以法者先王之制與天下公共為之士者受法於先王非可為一人而私之舜既不得私其父將寘之於法則失為人子之道將寘而不問則廢天下之法寧并棄天下願得竊負而逃處於海濱樂以終其身焉更㤀其為天子之貴也當時固無是事彼既設為問目使孟子不答則其理不明孟子之意謂天下之富天子之貴不能易事父之孝遂答之以天下可忘而父不可暫捨所以明父子之道也其於名教豈曰小補之哉龜山先生嘗言固無是事此只是論舜心耳愚謂執之而已矣非洞見臯陶之心者不能言也此一章之義見聖賢所處無所不用其極所謂止於至善者也隱之之辯專以父子之道為言郤似實有此事於義未瑩史剡曰堯以二女妻舜百官牛羊事舜於畎畝之中瞽瞍與象猶欲殺之使舜塗廩而縱火舜以兩笠自扞而下又使舜穿井而實以土舜為匿空出他人井剡曰頑嚚之人不入徳義則有之矣其好利而畏害則與衆不殊也或者舜未為堯知而瞽瞍欲殺之則可矣堯已知之四嶽舉之妻以二女養以百官方且試以百揆而禪天下焉則瞽瞍豈不欲利其子之為天子而尚欲殺之乎雖欲殺之亦不可得已藉使得殺之瞽瞍與象將隨踵而誅雖甚愚人必不為也此特閭父里嫗之言而孟子信之過矣後世又承以為實豈不過甚矣哉史剡又一篇疑舜與益無避之之事辨在後常語中辨曰萬章問曰父母使舜完廩捐階瞽瞍焚廩使浚井出從而揜之象曰謨葢都君咸我績牛羊父母倉廩父母干戈朕琴朕弤朕二嫂使治朕棲象徃入舜宫舜在牀琴象曰鬰陶思君爾忸怩舜曰惟兹臣庶汝其予于治繼曰不識舜不知象之將殺已歟孟子答曰奚而不知也象憂亦憂象喜亦喜又問曰然則舜偽喜者歟答曰彼以愛兄之道來故誠信而喜之奚偽焉且夫舜未為堯知瞽瞍與象殺之可也堯既知之象焉得而殺之温公云閭父里嫗之言固然矣萬章既以為誠有是事如謂其必無而不答則兄弟之道孰與明之乎孟子答之云云者以見聖人之心不藏怒不宿怨惟知有兄弟之愛而已使天下後世明兄弟之道者孟子之功大矣讀孟子者不求其明教之意而謂其信之過是亦不思之甚也則兄弟之道孰與明之乎以下至終篇愚欲易之曰然因其所問而告之亦可以見仁人之於兄弟之心矣葢仁人之於兄弟不藏怒不宿怨惟知有兄弟之愛而已今不求孟子之意而以信之太過疑之是以筋骨形容之不善而棄天下馬也李公常語上太伯常語曰堯傳之舜舜傳之禹禹傳之湯湯傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉如何曰孔子死不得其傳矣彼孟子者名學孔子而實背之者也焉得傳敢問何謂也曰孔子之道君君臣臣也孟子之道人皆可以為君也天下無王霸言偽而辨者不殺諸子得以行其意孫吳之智蘇秦之詐孟子之仁義其原不同其所以亂天下一也辨曰大道之傳至吾夫子然後大成夫子沒百餘歲楊朱墨翟各持所見以惑後學朱之為我則偏於為義翟之兼愛則偏於為仁聖人之道自是而晦孟軻氏出以仁義之言解其蔽斯道復明不幸六藝之文厄於秦火由漢以來佛老顯行聖道不絶如綫韓愈氏斷然號於世曰軻之死不得傳夫道不可斯湏離而其在於人心者固常自若豈眞不傳哉葢以道之大要不外乎仁義自孟子没未有唱為仁義之説者此道所以為不傳也謂孟子名學孔子而實偝之妄矣又謂孫吳之智蘇張之詐與孟子之仁義一於亂天下且仁義之與智詐不啻氷炭之異非可槩而論遂併以仁義爲亂天下所見之謬如是烏知帝王所傳之道哉孔子傳之孟軻軻之死不得其傳此非深知所傳者何事則未易言也夫孟子之所傳者何哉曰仁義而已矣孟子之所謂仁義者何哉曰仁人心也義人路也曰惻隱之心仁之端也羞惡之心義之端也如斯而已矣然則所謂仁義者又豈外乎此心哉堯舜之所以為堯舜以其盡此心之體而已禹湯文武周公孔子傳之以至於孟子其間相望有或數百年者非得口傳耳授宻相付屬也特此心之體隱乎百姓日用之間賢者識其大不賢者識其小而體其全且盡則為得其傳耳雖窮天地亘萬古而其心之所同然若合符節由是而出宰制萬物酬酢萬變莫非此心之妙用而其時措之宜又不必同也故堯舜與賢而禹與子湯放桀文王事殷武王殺受孔子作春秋以翼衰周孟子說諸侯以行王道皆未嘗同也又何害其相傳之一道而孟子之所謂仁義者亦不過使天下之人各得其本心之所同然者耳李氏以蘇張孫吳班焉葢不足以窺孟子之籓籬而妄議之也推此觀之則其所蔽亦不難辨矣常語曰孟子曰五霸者三王之罪人也吾以為孟子者五霸之罪人也五霸率諸侯事天子孟子勸諸侯為天子苟有人性者必知其逆順耳矣孟子當周顯王時其後尚且百年而秦并之嗚呼孟子忍人也其視周室如無有也辨曰孟子說列國之君使之行王政者欲其去暴虐行仁義而救民於水火耳行仁義而得天下雖伊尹太公孔子說其君亦不過此彼五覇者假仁義而行陽尊周室而陰欲以兵强天下孟子不忍斯民死於闘戰遂以王者仁義之道詔之使當時之君不行仁義而得天下孟子亦惡之矣豈復勸諸侯為天子哉大抵入人之罪必文致其事巧為鍜錬無所不至謂孟子為忍人入罪也多矣其知有天誅鬼責之事乎李氏罪孟子勸諸侯為天子正為不知時措之宜隱之之辯已得之但少發明時措之意又所云行仁義而得天下雖伊尹太公孔子說其君亦不過如此語亦未盡善若云行仁義而天下歸之乃理勢之必然雖欲辭之而不可得也又辨云大抵入人之罪以下疑可刪去常語曰孔子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁又曰管仲相桓公覇諸侯一匡天下民到於今受其賜㣲管仲吾其被髪左袵矣而孟子謂以齊王猶反手也功烈如彼其卑故曰管仲曽西之所不為嗚呼是猶見人之鬬者而笑曰胡不因而殺之貨可得也雖然他人之鬬者耳桓公管仲之於周救父祖也而孟子非之奈何辯曰孔子謂管仲如其仁言仲之似仁而非仁也又謂㣲管仲吾其被髪左袵言仲有攘郤夷狄之功也至謂其小器奢僣不知禮言仲之不能圖大致遠也夫奢僣不知禮之人豈得為仁乎其所以九合諸侯者假仁而行以濟其不仁耳宜曾西之所不為也昔成湯以七十里為小國之諸侯伊尹相之以王於天下齊以千里之國而相管仲管仲得君之專行國政之久功烈如彼其卑童子且羞稱之况大賢乎有好功利者必喜管仲仁者不為也管仲急於圖覇藉周室以為之資耳謂桓公管仲之於周如救父祖吾弗信之矣夫子之於管仲大其功而小其器邵康節亦謂五覇者功之首罪之魁也知此者可與論桓公管仲之事矣夫子言如其仁者以當時王者不作中國衰夷狄横諸侯之功未有如管仲者故許其有仁者之功亦彼善於此而已至於語學者立心致道之際則其規模宏遠自有定論豈曰若管仲而休耶曾西之恥而不為葢亦有説矣李氏又有救鬬之說愚以為桓公管仲救父祖之鬬而私其財以為子舍之藏者也故周雖小振而齊亦寢强矣夫豈誠心惻怛而救之哉孟子不與管仲或以是耳隱之以為小其不能相桓公以王於天下恐不然齊桓之時周徳雖衰天命未改革命之事未可為也孟子言以齊王猶反手自謂當年事勢且言已志非為管仲發也常語曰或曰然則湯武不為歟曰湯武不得已也契相土之時詎知其有桀哉后稷公劉古公之時詎知其有紂哉夫所以世世種徳以善其身以及其國家而已湯武之生不幸而遭桀紂放之殺之而蒞天下豈湯武之願哉仰畏天俯畏人欲遂其為臣而不可得也由孟子之言則是湯武修仁行義以取桀紂爾嗚呼吾乃不知仁義之為簒器也又仲虺之誥成湯放桀于南巢惟有慙徳曰予恐來世以台為口實孔子謂武盡美矣未盡善也彼順天應人猶臲卼如此而孟子固求之其心安乎哉辨曰仁義者人心之所同好不仁不義者人心之所同惡豈惟人心好惡為然天心亦如之湯武為順天應人之舉放桀伐紂豈得已哉孟子憫戰國之際人之道不立矢口成言無非仁義而謂孟子以仁義為簒器斯言一發天下以談仁義為諱則人將遺其親後其君為忍心害理之歸矣言其可不愼乎湯有慙徳仲虺之誥言之詳孔子雖以武為未盡善而終憲章之故彖易之革曰湯武革命順乎天而應乎人其論仁政徳教必以三代為稱首曷嘗謂湯武不可為歟惜乎戰國之君以孟子為迂闊不能求為湯武三代之治不可復見此僻儒得以妄生譏議也隱之此辯甚精但所云矢口而言無非仁義兩句説事意不盡不若云教諸侯行仁義以救百姓倒懸之急因言其效以為苟能行此則天下必將歸之至於仁孚義逹而天下之人各得其本心之所同然者則雖三代之治何以加此常語曰三分天下有其二以服事殷周之徳其可謂至徳也已矣又曰有君民之大徳有事君之小心書序伊尹既醜有夏復歸于亳孟子亦曰五就湯五就桀伊尹也夫周顯王未聞有惡行特㣲弱爾非紂也而齊梁不事之非桀也而孟子不就之嗚呼孟子之欲為佐命何其躁也辨曰三分天下有其二以服事商者文王亦俟上天之休命爾使其歴數在躬天命之人歸之文王雖欲盡臣節予知其不能焉此武王所以謂文王誕膺天命九年而大勲未集也伊尹樂堯舜之道而耕莘湯三聘之乃幡然而改意其五就云者是必湯得伊尹而貢之使之事桀聘問徃來至於五就也且王者之迹熄而詩亡詩亡然後春秋作則知王者之賞罰不行乎天下而自列於侯邦也周之衰㣲久矣仲尼生靈王之時猶不去魯而事周至于顯王則又㣲弱矣孟子安得去齊而事周乎今有人焉父不能主其家諸子各營别業不事其父有以孝悌之道訓之使其子知有孝悌雖未能事其父則亦不敢悖逆矣苟不知出此乃相其父曰汝為父之尊曷不治其子使事已歟吾恐諸子悖逆之心自是而生矣是無異劉文公與萇𢎞欲合諸侯以城成周與夫張儀欲挾天子以令天下也孟子肻為是舉乎借使當時有湯武為之君孟子為之佐命興仁義之化則天下復見商周之盛治而三王可四矣何其幸耶夫何孟子不遇其時不見諸行事徒託之空言猶足扶衞聖道七篇之著與詩書相為表裏曷謂其躁哉李氏謂周顯王未聞有惡行特微弱爾而孟子不使齊梁事之以是咎孟子愚謂周以失道寖㣲寖滅孔子作春秋雖云尊周然貶天子以逹王事二百四十二年之間亦屢書矣至於顯王之時天下不知有周室葢人心離而天命改久矣是時有王者作亦不待滅周而後天下定于一也聖人心與天同而無所適莫豈其拳拳於已廢之衰周而使斯人坐䝉其禍無已哉臯陶曰天聰明自我民聰明天明畏自我民明威逹于上下敬哉有土知此則知天矣聖人之心豈異是耶隱之只以衰㣲二字斷周之不可事正在李氏詆罵中而所謂以孝悌訓之則子必能事其父乃謂使諸侯事周也孟子本無此意常語曰大哉孔子之作春秋也援周室於千仞之壑使天下昭然知無二王削吳楚之塟辟其僣號也諱茅戎之戰言莫敢敵也㣲孔子則春秋不作㣲春秋則京師不尊為人臣子不當如是哉嗚呼孟子其亦聞之也哉首止之會殊會王世子尊之也其盟復舉諸侯尊王世子而不敢與盟也洮之盟王人㣲者也序乎諸侯之上貴王命也美哉齊桓其深知君臣之禮如此夫使孟子謀之則桓公偃然在天子之位矣世子王人為亡人之不暇孰與諸侯相先後哉辨曰春秋之時周室衰㣲天王不能自立以至下堂而見諸侯當是時徒擁其虚位爾孔子厯聘七十二君未嘗説之使尊周室及夫公山氏之召乃曰如有用我者吾其為東周乎此聖人之知幾也嗚呼知幾其神矣乎苟惟說諸侯使之尊周諸侯不得自肆而彊者必生變則是速其滅周也先見之幾豈陋儒所能知哉或曰齊晉尊周非歟曰齊晉志在覇業不得不尊周也孟子距孔子之時又百有餘歲則周之㣲弱可知矣若管仲之功可為孔子為之矣孔子不為孟子安得為之乎孔子作春秋寓一王之法正天下之名分使亂臣賊子知所懼孟子以王者仁義之道説諸侯使之知有君臣父子而杜僣竊簒弑之禍正得夫春秋之㫖但學者有所未究爾又孟子曰以力假仁者覇以徳行仁者王孟子未嘗不欲當時之君尚徳而不尚力豈復使諸侯偃然在天子之位哉齊桓之於管仲學焉而後臣之任賢之專固無愧於湯武惜乎桓公無王者量管仲無王佐才徒相與謀託周室以號天下而成覇者之業爾為君而内亂醜惡為臣而亡禮僣奢何足道哉首止之會尊王世子復舉諸侯而不敢與盟洮之盟序王人於諸侯之上以尊王命君臣之禮固盡矣其志在於圖覇不得不爾盗亦有道其是之謂乎孔子尊周孟子不尊周如冬裘夏葛飢食渇飲時措之異宜爾此齊桓不得不尊周亦廹於大義不得不然夫子筆之於經以明君臣之義於萬世非專為美桓公也孔孟易地則皆然李氏未之思也隱之以孟子之故必謂孔子不尊周又似諸公以孔子之故必謂孟子不合不尊周也得時措之宜則並行而不相悖矣常語曰或曰仲尼之徒無道桓文之事者吾子何為曰衣裳之會十有一春秋也非仲尼修乎木瓜衞風也非仲尼刪乎正而不譎魯語也非仲尼言乎仲尼亟言之其徒雖不道無歉也嗚呼覇者豈易與哉使齊桓能有終管仲能不侈則文王太公何恧焉詩曰采葑采菲無以下體葢聖人之意也辨曰周衰王者之賞罰不行乎天下諸侯擅相侵伐强凌弱衆暴寡是非善惡由是不明人欲肆而天理滅矣吾夫子憂之乃因魯史而修春秋以代王者之賞罰是是而非非善善而惡惡誅姦䛕於既死發潛徳之幽光是故春秋成而亂臣賊子懼觀夫二百四十二年之間書會者無國無之惟齊之會以尊王室為辭夫子屢書之攘戎狄而封衞人思之作木瓜之詩夫子取之伐楚責包茅之貢不入問昭王南征不復夫子有正而不譎之言夫子亟言之者以是時無能尊王室故進之爾然以權詐有餘而仁義不足功止於覇此夫子之徒所以無道之也儗人必於其倫謂使齊桓能有終管仲能不侈則文王太公何恧過矣春秋序桓績葢所謂彼善於此論語論桓文之事猶曰師也過商也不及使當日無公西華之問則今之説者必有優劣之分矣詩錄木瓜即春秋序績之意亦以善衞人之情也豈以齊桓之事為盡可法哉李氏詆孟子而甚畏齊桓尊管仲至以文王太公比之反易顚倒如此良由不識聖賢所傳本心之體故不知王道之大而易怵於功利之淺爾李公常語下常語曰孟子曰盡信書則不如無書仁人無敵於天下以至仁伐至不仁而何其血之流杵也曰紂一人惡耶衆人惡耶衆皆善而紂獨惡則去紂久矣不待周也夫為天下逋逃主萃淵藪同之者可遽數耶紂存則逋逃者曷歸乎其欲拒周者人可數耶血流漂杵未足多也或曰前徒倒戈攻于後以北故荀卿曰殺者皆商人非周人也然則商人之不拒周審矣曰如皆北也焉用攻又曰甚哉世人之好異也孔子非吾師乎衆言驩驩千徑百道幸存孔子吾得以求其是虞夏商周之書出於孔子其誰不知孟子一言人皆畔之畔之不已故今人之取孟子以斷六經矣嗚呼信孟子而不信經是猶信他人而疑父母也辯曰魯語曰爼豆之事則嘗聞之矣軍旅之事未之學也孔子之意可見矣客有問陶𢎞景注易與本草孰先陶曰注易誤不至殺人注本草誤則有不得其死者世以為知言唐子西嘗曰𢎞景知本草而未知經注本草誤其禍疾而小注六經誤其禍遲而大前世儒臣引經誤國其禍至於伏尸百萬流血千里武成曰血流漂杵武王以此自多之辭當時倒戈攻後殺傷固多非止一處豈止血流漂杵乎孟子深慮戰國之君以此藉口故曰盡信書則不如無書而謂血流漂杵未足為多豈示訓之意哉經注之禍正此類也反以孟子為畔經是亦惑矣謂虞夏商周之書出于孔子人宜取信詩非孔子之刪乎雲漢之詩曰周餘黎民靡有孑遺信斯言也則是周無遺民也請以此說為證常語曰或曰然則舜避堯之子於南河之南禹避舜之子於陽城何如曰堯不聼舜讓舜受終于文祖舜不聼禹讓禹受命于神宗或二十有八載或十有七年厯數在躬既决定矣天下之心既固結矣又何避乎禹舜未相避也由孟子之言則古之聖人作偽者也好名者也王莽執孺子手流涕歔欷何足哂哉辨曰舜受堯之遜禹受舜之遜雖經歴年久然舜格于文祖乃在卒堯䘮之後書曰月正元日者言是月始即正云爾則禹之即正從可知也舜禹服䘮畢退而避之歸其位於子理所宜然孟子之言葢非臆說亦必有所據舜禹大聖人也豈固欲為天子哉天與之人與之有不可得而辭避者如以此為偽則舜讓于徳弗嗣禹拜稽首固辭皆以其作偽可乎此二段辨已得之無可議者矣常語曰或曰以徳行仁者王王不待大湯以七十里文王以百里何如曰皆孟子之過也大雅曰瑟彼玉瓚黄流在中九命然後錫以玉瓚秬鬯帝乙之時王季為西伯以功徳受此賜周自王季中分天下而治之矣奚百里而已哉商頌曰𤣥王桓撥受小國是達受大國是達率履不越遂視既發相土烈烈海外有截帝命不違至于湯齊契之時已受大國相土承之入為王官伯出長諸侯威武烈烈四海之外率服截爾整齊商自相土威行乎海外矣奚七十里而已哉嗚呼孟子之教人已不知量也哉辨曰孟子曰湯以七十里文王以百里葢言亳豐皆小國也雖王季相土嘗為伯以長諸侯而其受封之初乃七十里百里爾固未嘗闢土地并吞諸侯之國也而謂大雅曰瑟彼玉瓚黄流在中九命然後受此賜王季為西伯中分天下而治矣奚止於百里商頌曰相土烈烈海外有截契之時已受大國相土承之入為王官伯以長諸侯威行乎海外矣奚止七十里遂以是為孟子之過教人已不知量余所未喻瑟彼玉瓚黄流在中詩說恐未然就使如其言則隱之之辯已得之矣常語曰或曰父母使舜完廩捐階瞽瞍焚廩使浚井出從而揜之象曰謨葢都君咸我績牛羊父母倉廩父母干戈朕琴朕弤朕二嫂使治朕棲象徃入舜宫舜在牀琴象曰鬰陶思君爾忸怩舜曰惟兹臣庶汝其予于治有諸曰書云瞽子父頑母嚚象傲克諧以孝烝烝又不格姦又曰負罪引慝祗載見瞽瞍䕫䕫齊栗瞽瞍亦允若瞽象未嘗欲殺舜也瞽象欲殺舜刃之可也何其完廩浚井之迂其亦有所虐矣象猶能慮則謂二嫂者帝女也奪而妻之可乎堯有百官牛羊倉廩以備事舜於畎畝之中而不能衞其女乎雖其見奪又無吏士無刑以治之乎舜以父母之不愛號泣於旻天父母欲殺之幸而得脫而遽鼔琴何其樂也是皆委巷之說而孟子之聼不聰也此一叚辨在温公史剡常語曰舜誕敷文徳舞干羽于兩階七旬有苖格則孟子之譏武成宜矣哉曰以天下征一國以天子征諸侯如孟賁摶童子遲速在我修文徳以待其來可也大雅曰以爾鉤援與爾臨衝以伐崇墉臨衝閑閑崇墉言言執訊連連攸馘安安文王以諸侯伐諸侯固有訊有馘武王以諸侯伐天子奚不用戰哉牧野詩云檀車煌煌駟騵彭彭維師尚父時維鷹揚涼彼武王是也此一叚無辨太伯著書立言非詆前賢有識見未到處宜與之辨明如前叚云瞽象欲殺舜刅之可也何其完廩浚井之迂此可為訓耶又謂武王以諸侯伐天子奚不用戰其言之不祥如是何足辨之哉常語曰或曰孟子之言諸侯奚不聼也謂迂闊者乎曰迂闊有之矣亦足憚也孟子謂諸侯能以取天下矣位卿大夫豈不能取一國哉為其君不亦難乎然滕文公嘗行孟子之道矣故許行陳相目之曰仁政曰聖人其後寂寂不聞滕侯之得天下也孟子之言固無驗也辨曰滕文公嘗行孟子之道矣既而許子為神農之言告文公文公與之處孟子葢嘗闢之以從許子之道是相率而為偽惡能治國家則知文公行孟子之道不克終矣當是時許行稱之曰仁政曰聖人亦不可謂行孟子之言無驗其後不聞滕侯之得天下夫天下大物也豈可必得哉然滕侯亦未嘗禮孟子使為輔相而授以國政此不足為孟子疵辨已得之常語曰孔子與賓牟賈言大武曰聲滛及商何也對曰非武音也有司失其傳也若非有司失其傳則武王之志荒矣武王之志猶不貪商而孟子曰文王望道而未之見謂商之祿未盡也病其有賢臣也文王貪商如此其甚則事君之小心安在哉豈孔子之妄言哉孔子不妄孟子之誣文王也辨曰孟子曰文王視民如傷望道而未之見葢言文王之仁望治道而未之見爾趙岐釋之曰殷錄未盡尚有賢臣道未得至故望而不致誅於紂此岐之失也讀孟子而識其意正岐之失可也而乃用岐之說攻孟子謂孟子誣文王之貪商豈理也哉欲加人以罪援引他事以實之其不仁甚矣望道而未之見而與如古人多通用此句與上文視民如傷為對孟子之意曰文王保民之至而視之猶如傷體道之極而望之猶如未之見其純亦不已如是愚意謂然不審隱之以為如何常語曰或曰孟子之心以天下積亂矣諸侯皆欲自雄苟說之以臣事周孰能喜也故掲仁義之竿而湯武為之餌幸其速售以拯斯民而已矣曰孟子不肻枉尺直㝷謂以順為正者妾婦之道其肻屑就之如此乎夫仁義又豈速售之物也子噲不得與人燕子之不得受燕於子噲固知有周室矣天之所廢必若桀紂周室其為桀紂乎盛之有衰若循環然聖王之後不能無昏亂尚賴臣子扶救之爾天下之地方百里者有幾家家可以行仁義人人可以為湯武則六尺之孤可託者誰乎孟子自以為好仁吾知其不仁甚矣辨曰湯居毫小國也伊尹相湯使之伐夏救民桀雖無道天子也君也湯有道諸侯也臣也伊尹胡不說湯率諸侯而朝夏乎行李徃來至於五就觀時察變葢已熟矣不得已為伐夏之舉致湯於王道固非盛徳之事後世莫有非之者以能躬行仁義順天應人故也自非伊尹之聖安能任其責哉文王在豐亦小國也文王之於紂與湯之於桀事體均也其所以異者時焉而已觀其得太公而師事之伐崇遏莒戡黎雖曰三分天下有其二以服事殷亦以厯數未歸得以盡其臣節至武王則赫然有剪商之志又况商紂罪惡貫盈又過於桀而此十亂之賢為之輔相雖欲率諸侯遵文考之道而事紂莫可得矣此所以興牧野之師而建王業也孟子之於列國說之以行仁政者不過言治岐之事而已說之使為湯武者不過以徳行仁而已說之以行王道者不過乎使民養生䘮死無憾而已未嘗說之使伐某國誅某人開疆拓土大綂天下而為王也若孟子者眞聖人之徒歟識通變之道達時措之宜不肻枉尺直尋奈何時君咸謂之迂闊於事終莫能聼納其說仁義之道不獲見於施設以濟斯民所以不免後世紛紛之議嗚呼說其君使為湯武以為不仁乃以桓公管仲為仁乖謬如是安得有道之士與之正曲直哉辨已得之但李氏所云家家可以行王道人人可以為湯武則六尺之孤可託者誰乎此三句當略與之辨愚謂王道即堯舜禹湯文武周公孔孟相傳之道由周公而上上而為君由孔子而下下而為臣固家家可以得而行矣湯武適遭桀紂故不幸有征誅之事若生堯舜之時則豈將左洞庭右彭蠡而悍然有不服之心耶其在九官羣后之列濟濟而和可知矣如此則人人為湯武又何不可之有常語曰孟子曰紂之去武丁未久也其故家遺俗流風善政猶有存者又有㣲子㣲仲王子比干箕子膠鬲皆賢人也相與輔相之故久而後失之也尺地莫非其有也一民莫非其臣也然而文王猶方百里起是以難也齊人有言曰雖有智慧不如乘勢雖有鎡基不如待時今時則易然也今之學者曰自天子至於庶人皆得以行王道孟子說諸侯行王道非取王位也應之曰行其道而已乎則何必紂之失之也何憂乎善政之存何畏乎賢人之輔尺地一民皆紂之有何害諸侯之行王道哉齊宣王問曰人皆謂我毁明堂毁諸已乎孟子對曰夫明堂者王者之堂也王欲行王政則勿毁之矣行王政而居明堂非取王位而何也君親無將不容纎芥於其間而學者紛紛强為之辭辨曰不談王道樵夫猶能笑之孰謂學而為士反不知道乎謂之王道者即仁義也君行王道者以仁義而安天下也君行覇道者以詐力而服天下也孟子說其君以仁義不猶愈於說其君尚詐力歟且天下不可以詐力得也尚矣得民心斯得天下假仁義而行民心且不可得况能王天下乎仁義之道萬世之所常行天下之所共由民生之所日用也今乃謂自天子至於庶人皆得以行王道為非果何理耶觀其應學者之言皆增損其詞而非議孟子君子無取焉子貢欲去告朔之餼羊孔子曰爾愛其羊我愛其禮魯自文公廢朝享之禮祭而孔子不去其羊者欲使後世見其羊猶能識其禮羊亡禮亦亡矣孟子欲勿毁明堂其意亦猶是也明堂在泰山之下周天子廵狩朝諸侯之所適在齊地非齊之建立也存之不為僣亦可以見王政之大端如以為諸侯不用而毁之則後世之君不惟不知王政將謂後世不可復行矣此孟子所以勸齊勿毁之也而謂孟子勸齊宣居明堂取王位抑何燭理不明而厚誣孟子歟李氏此叚之意不謂天子庶人不可並行王道但謂孟子所論文王與紂之事為不然爾當辯之曰孟子之時有信行王道者必有天下其勢與文王不同非謂文王計欲取紂而不能也人人可行王道已辯於前但孟子行王道者必有天下其時措之不同又不可執一而論隱之之辯似未中李氏之失也常語曰學者又謂孟子權以誘諸侯使進於仁義仁義逹則尊君親親周室自復矣應之曰言仁義而不言王道彼說之而行仁義固知尊周矣言仁義可以王彼說之則假仁義以圖王唯恐行之之晚也尚何周室之顧哉嗚呼今之學者雷同甚矣是孟子而非六經樂王道而㤀天子吾以為天下無孟子可也不可無六經無王道可也不可無天子故作常語以正君臣之義以明孔子之道以防亂患於後世爾人知之非我利人不知非我害悼學者之迷惑聊復有言辨曰泰伯曰天下無孟子可也不可無六經無王道可也不可無天子噫是果㤗伯之說耶使其說行害理傷教也大矣余請易之曰無六經則不可而孟子尤不可無無天子則不可而王道尤不可無嘗試言之易詩書禮樂春秋之六經所以載帝王之道為致治之成法固不可無也孟子則闢楊墨距詖行放滛辭使邪說者不得作然後異端以息正道以明堯舜禹湯文武周孔之業不墜此孟子所以為尤不可無也經曰天子作民父母以為天下王史曰天子建中和之極其可無之乎夫所謂王道者天子之所行六經之所載孟子之所說者是也孰謂其可無哉無王道則三綱淪九法斁人倫廢而天理滅矣世之學者稍有識見不為此言豈好事者假設滛辭詭賢者之名以行于世乎學者宜謹思之李氏難學者謂孟子以權誘諸侯之說孟子本無此意是李氏設問之過當略明辨之天下可無孟子不可無六經可無王道不可無天子隱之之辨已得之愚又謂有孟子而後六經之用明有王道而後天子之位定有六經而無孟子則楊墨之仁義所以流也有天子而無王道則桀紂之殘賊所以禍也故嘗譬之六經如千斛之舟而孟子如運舟之人天子猶長民之吏而王道猶吏師之法今曰六經可以無孟子天子可以無王道則是舟無人吏無法將焉用之矣李氏自以為悼學者之迷惑而為是言曾不知己之迷惑也亦甚哉鄭公藝圃折𠂻叔友折𠂻曰孟軻非賢人仲尼之徒無道桓文之事者聞誅一夫紂矣未聞弑君三宿出晝於予心猶以為速沈同問燕可伐歟吾應之曰可此孟子之罪也辨曰周衰之末戰國縱横用兵爭疆以相侵奪當時處士務先權謀以為上賢先王大道陵遲墮廢異端並起若楊朱墨翟放蕩之言以干時惑衆者非一此趙岐之說也天下豈復有王道哉豈復知有仁義哉幸而有唱為仁義之說者猶足以使亂臣賊子逡廵退縮不敢自肆而况孟子治儒術承三聖以仁義之道說於諸侯思濟斯民不幸而其說不行而商周之盛治不可復見其與假仁而行急於覇功者有間矣可謂非賢人乎又舉數條以為孟子之罪余於温公疑孟李公常語辨之矣誅一夫紂即泰誓所謂獨夫紂也三宿出晝即孔子去魯之意也如之何以為孟子之罪乎仲尼之徒無道桓文之事者聞誅一夫紂矣沈同問燕可伐此三事已辯於疑孟常語中矣唯出晝一事當於第九叚辯之此叚辯孟軻非賢人之句亦湏引孟子所傳之說今只以趙氏題辭為據恐未足以折談者之鋒也折𠂻曰春秋書王存周也孔子曰如有用我者吾其為東周乎此仲尼之本心也孟軻非周民乎履周之地食周之粟常有無周之心學仲尼而叛之者也周徳之不競亦已甚矣然其虚位猶拱而存也使當時有能唱威文之舉則文武成康之業庸可庶幾乎為軻者徒以口舌求合自媒利祿盍亦使務是而已乎奈何今日說梁惠明日說齊宣說梁襄說滕文皆㗖之使為湯文武之為此軻之賊心也譬之父病亟雖使商臣為子未有不望其生者如之何其直寘諸不救之地哉軻忍人也辯士也儀秦之雄也其資薄其性慧其行輕其說如流其應如響豈君子長者之言哉其自免於蘇張范蔡申韓李斯之黨者挾仲尼以欺天下也使數子者皆咈其素矯其習竊仁義兩字以藉口是亦孟軻而已矣要之戰國縱横捭闔之士皆發冡之人而軻能以詩禮也是故孟軻誦仁義猶老錄公之誦法也老錄公誦法賣法者也軻誦仁義賣仁義者也安得為仲尼之徒歟嗟夫孔子生而周尊孟軻生而周絶何世人一視孔孟之心記曰儗人必於其倫寧從漢儒曰孔墨辨曰父子主乎親君臣主乎義不可以一槩論先儒謂宗子有君道試摭其說古者諸侯之子弟異姓之卿大夫立嫡子為大宗族人宗之有人焉宗其繼别子之所自出則立為大宗百世不遷也不幸大宗者恣為驕侈荒耽酒色横逆殘暴子弟不能堪諫諍之不聼益又甚焉夫欲說其族者將使之率子弟事之助其為惡歟將使之躬行孝弟收合其親屬歟至於衆族歸已而易其大宗於義苟可為亦不得辭此伊尹之相湯呂望之相武而其用心正有類此自平王以東周徳不競為天子者雖無驕侈殘暴之事然不能振皇綱但擁虚位而已孔子厯聘七十二君未嘗一言說其君率諸侯而尊周以力假仁為覇者事孔子不肻為也而所以作春秋者為天下之無主也不然何以降黍離於國風乎其所以降雅為風者亦其自取也孔子豈有心哉孔子曰如有用我者吾其為東周乎乎疑詞其不為東周也明矣公山弗擾召孔子孔子欲徃遂言如有用我不為東周則說之以西周之王道也必矣又嘗有其或繼周者之語孔子豈能必其周之祚不移乎逮戰國時周室衰㣲抑又甚矣孟子則學孔子者也詎肻效管仲假仁而圖覇哉又况當時之君爭地爭城侵奪簒弑不復知有君父矣其視仁義為何等事耶天下之民死於戰鬬死於賦斂死於徭役不知其幾孟子說梁惠齊宣梁襄滕文使之為湯武行仁義其心在於救民爾未嘗說之以富國彊兵用征伐而取天下也乃謂孟子叛仲尼之道有無周之心妄矣又謂孟子為賣仁義而有賊心不猶愈於不知仁義而非之乎墨氏兼愛不知有父乃欲從漢儒曰孔墨誤後之學者必此之言夫此與李氏常語所以謗孟子者大指略同前之辯詳矣辨云父子主親君臣主義不可一槩論甚當但喻宗子事云恣為驕侈以下數句不類周衰事體當㣲改之乃為盡善鄭引孔子言吾其為東周乎為字當作去聲讀先儒有作平聲讀者隱之之說是也但謂欲說弗擾以王道則非孔子之心也降黍􅄐作春秋不知果有繼周之意否此一節更望見教也鄭以孔孟並稱為不倫而欲以墨配孔則益非其倫也大抵未知孟子所傳者何事故其論詭僻顚倒如此也折𠂻曰吉人惟知為善而已未嘗望其報也為善而望其報是今世委巷溺浮圖者之處心也孟子勸滕文公曰苟為善後世子孫必有王者矣是心何心哉武王伐紂而利之非太王王季文王之本心也孔子謂㤗伯三以天下讓亦曰周之有天下㤗伯不襲封也其遜國也秪其所以為天下也歟夫㤗伯雖知季厯之賢可以繼緒保邦而吾不若也如使㤗伯包藏禍商之心也夫何至徳之足云辨曰善者福之滛者禍之天之道也吉人為善固不望報而天必報之以福可以天道難信而不足信歟孟子勸滕文公為善謂後世子孫必有王者非但告之以周家之事是亦以天道告之也使周不積徳行仁則子孫未必蕃衍雖欲伐紂而利之不可得矣况能卜世三十卜年八百于公治獄多陰徳猶能逆知其子孫必有興者當戰國之際人倫棄而天理滅不知為善之利今以孟子之言為非則將何以勸其君耶乃謂周之天下由泰伯之不襲封也使人人遜國如㤗伯無季厯之賢以繼之則覆宗絶祀矣季札之事可不監諸孟子言若夫成功則天也君如彼何哉强為善而已矣初無望報之心也苟為善後世子孫必有王者矣乃為太王避狄而言易大傳曰積善之家必有餘慶書曰作善降之百祥亦豈望報乎折𠂻曰孟子謂沈同曰子噲不得與人燕子之不得受燕於子噲有士於此而子悦之不告於王而私與之吾子之祿爵夫士也亦無王命而私受之於子則可乎大夫爵祿制於諸侯是誠古之道也孟軻既教齊梁滕之君使自為湯武則是諸侯未嘗受命於天子也沈同不敢以爵祿私人齊制之也子噲不敢以燕私人將復誰制之哉何孟軻獨能約燕以王制而不能約齊梁滕於古道也辨曰孟子告沈同曰子噲不得與人燕子之不得受燕於子噲有士於此而子悦之不告於王而私與之吾子之祿爵夫士也亦無王命而私受之於子則可乎者是約燕於王制也其意曷嘗不存周哉勸齊梁滕之為湯武者正欲其行仁義而知有王制云爾豈可謂夏商在上而湯武不得行仁義歟湯武行仁義無一言及之唯罪湯武之征伐掩善揚惡豈得為公論亦可謂處變事而不知其權者也勸其君行仁義以為不道者余知之矣彼非以仁義為不美也但急於近功謂仁義為迂闊不切時務不若進富國彊兵之術也若其誠然商鞅之徒為之孟子不為也諸侯受國於天子故子噲之讓為無王天子受命於天故文王受命作周不受於紂而無罪辯謂鄭氏以仁義為迂闊則未然苐恐若商鞅之談帝道爾折𠂻曰今之諸侯取於民雖不義不可謂禦人於國門之外取非其有賊義也取充其類盡義也是輕重之等也是孟軻原情以處罪也至未能什一去關市之征復與攘鷄同科何任情出入而前後自戻也如此辨曰孟子謂今之諸侯賦歛於民不由其道而與禦人而奪之貨何異取非其有為盗取充其類為義之盡猶未為盗是輕重之等是誠孟子能原情以處罪也至於戴盈之問未能什一去關市之征請輕之以待來年孟子設攘鷄之喻以答之而曰如知其非義斯速已矣何待來年者意謂戴盈徒知其非而不能速改故以此譏之豈得謂任情出入前後自戾歟鄭氏專以偏見曲說而非詆孟子學無師承其蔽也如此卒為名教之罪人也惜哉辨得之矣折𠂻曰析直薪者不費斧訟直理者不費詞魯論二十篇如聖君咨俞如嚴父教戒莊而親簡而當焉孟軻以游辭曲說簧鼓天下其答陳代告子萬章公孫丑之問皆困而遁遁而支離想當時酬酢之際必沮氣赧顔無所不至所謂浩然者安在哉近世歐陽永叔王介甫蘇子瞻者徒癖好其書嗚呼斯文衰矣辨曰析直薪者不費斧訟直理者不費詞為是說者正俗所謂不哭之孩孰不能抱是知常而不知變者也戰國之時處士横議異端並起聞孟子談仁義其不駭且疑者幾希陳代告子萬章公孫丑之徒見識不及孔子門弟子遠甚酬答之際安得不諄復告之理苟明矣何患乎辭之費乃謂歐陽永叔王介甫蘇子瞻僻好孟子之書為斯文之衰識見之優劣可知矣疑歐陽氏王氏蘇氏未得為眞知孟子者亦隨其所見之淺深志焉而樂道之爾餘隱之之辯已得之矣折𠂻曰悟云迷失也安云病人也治云亂世也喜之之辭也無憂無懼喜孰因來哉孟子曰覇者之民驩虞如也王者之民皥皥如也愚曰王者之民驩虞如也帝者之民皥皥如也齊晉驅民於鋒鏑湯武拯民於塗炭唐虞措俗於恬愉是故商周之書若有矜喜色虞書二典如平居對語慶賀之容不形焉辨曰孟子勸齊梁滕之君為湯武乃痛詆之謂孟子賣仁義納君於不道而欲易孟子之言曰王者之民驩虞如也帝者之民皥皥如也又云齊晉驅民於鋒鏑湯武拯民於塗炭抑何前後之言自相戾歟已不能事父兄而責人以孝弟之道有未至亦其蔽也寐而狂言秪足以駭童稚及長者聞之付一笑爾此辨甚善但已不能事父兄以下文意隱晦似未條暢愚謂學者當先識聖人相傳大體同處然後究其所至之深淺則不出乎大方而義理精矣帝王無二道而民之䝉化不能無淺深使孟子言之固當有辨但鄭謂王者之民驩虞如也則是未識王者氣象彼語堯舜亦徒好高爾非眞知堯舜者也折𠂻曰孫子十三篇不惟武人之根本文士亦當盡心焉其詞約而縟易而深暢而可用論語易大傳之流孟荀楊著書皆不及也以正合以竒勝非善也正變為奇奇變為正非善之善也即奇為正即正為奇善之善也辨曰昔吾夫子對衞靈公以軍旅之事未之學答孔文子以甲兵之事未之聞及觀夾谷之㑹則以兵加萊人而齊侯懼費人之亂則命將士以伐之而費人北嘗曰我戰則克而冉有亦曰聖人文武並用孔子豈有眞未學未聞哉特以軍旅甲兵之事非所以為訓也乃謂孫子十三篇不惟武人根本文士所當盡心其詞可用論語易大傳之流孟荀楊著書皆不及是啟人君窮兵黷武之心庸非過歟叛吾夫子已甚矣何立言之不審也此叚本不必辨但斯人薄三王罪孟子而尊堯舜似矣乃取孫武之書厠之易論語之列何其駁之甚歟愚前所謂鄭氏未能眞知堯舜而好為太高之論以駭世若商鞅之談帝道於是信矣折𠂻曰京師坐鬻者愚逺方之人直百必索千酬之當其直則售意其知價也知價不可復愚酬之過其直則不售意其不知價也不知價則唯吾之愚必極其所索而後售孟軻抱縱横之具餙以仁義行鬻于齊齊王酬之以客卿且曰我欲中國而授孟子室飬弟子以萬鍾軻意齊王不知價者遂愚齊王求極所索而後售齊王徐而思軻之言曰王如用予則齊王猶反掌開闢以來無是理是必索高價者悔而不酬軻亦覺齊王之稍覺也卷而不售抱之以他徐而自思曰齊王之酬我其直矣矯然不售行將安鬻遲遲吾行三宿出晝冀齊王呼已而還直是又市井販婦行鬻漁鹽果菜之態京師坐鬻猶有體小兒方啼而怒進以飯推而不就徐其怒歇而飢也睨然望人進之矣軻之去齊畱齊兒態也夫辨曰子貢曰有美玉於斯韞匵而藏諸求善價而沽諸子曰沽之哉沽之哉我待價者也吾夫子大聖人也猶待價而沽况孟子乎孟子抱仁義之道較其美非止荆玉之比也急於求售而獻非其人未免刖足爾孰若珍其貨而後市乎孟子三宿去齊乃孔子去魯之意萬一齊王省悟聼納其說舉安天下之民而其價豈止十五城之重哉乃謂孟子索直於齊如市販婦兒之態不若京師坐鬻者猶有體其言過矣詆孟子未有若此言之醜者雖欲自絶而於日月何傷乎有不必辨已然欲與之辨則亦有說矣孟子之稱孔子曰可以仕則仕可以止則止可以久則久可以速則速而孔子之自言曰無可無不可又曰我待價者也今以夫子之事觀之則斯言皆非虚語矣孟子學孔子而得其傳焉其去齊之果而出晝之遲皆天理之自然而未嘗有毫髪私心也非知其所傳者何事則何足以語是哉折𠂻曰秦始皇漢武帝唐太宗欲無夷狄韓愈欲無釋老孟子欲無楊墨甚哉未之思也天不唯慶雲瑞雲景風時雨而霜雹降焉地不唯五糓桑麻而荑稗鉤吻生焉山林河海不唯龜龍鱗鳯而鴟梟豺狼蛟鼉出焉古今豈有無小人之國哉作易者其知道乎辨曰秦始皇漢武帝唐太宗欲無夷狄是皆好大喜功窮兵黷武之過孟子欲無楊墨韓子欲無釋老豈愛摩頂放踵利天下為之一則為義之偏其過至於無君一則為仁之偏其過至於無父先王大道由是榛塞孟子辭而闢之然後廓如也釋氏生西竺漢明帝始求事之老氏生周末西漢竇后始好尚之自晉梁以及於唐其教顯行韓公力排斥之然後大道得不冺絶有識之士謂洪水之害害於人身邪說之害害於人心身之害為易見尚可避者心之害為難知溺其說者形存而生亡矣自非知識高明孰知其害而務去之乎韓公謂孟子距楊墨而其功不在禹下唐之史臣謂韓公排釋老而其功與孟子齊而力倍之詎不信夫且夫唐虞三代之盛時未嘗有所謂釋老楊墨者苟欲其無亦不為過而謂地不唯五榖桑麻而荑稗鉤吻生焉世豈有種五榖桑麻而不去荑稗鉤吻者歟若孟子者正務去荑稗鉤吻之害而欲五榖桑麻之有成也今乃立異論以攻之是誠何心哉予懼聖道之不明故不得不與之辨或曰二三君子近世最為知名者後學多宗其議論孟子之書講之熟矣非之詆之不徒為是紛紛也理有窒礙可得而隱乎子辨則辨矣其如招咎何答之曰余貧且賤固知其不免也然吾夫子之道得孟氏而益尊使其可非可詆則吾夫子之道何能而益尊歟世之學者貴耳賤目厭常好怪往往喜其立論之異誠以孟子為不足學羞稱王道恥言仁義叛道亂倫淪胥為禽獸之歸矣予為此憂不得已而與之辨務明仁義而已矣是我咎我遑恤乎哉遑恤乎哉知堯舜孔孟所傳之正然後知異端之為害也深而息邪距詖之功大矣彼曰景風時雨與戾氣旱蝗均出於天五榖桑麻與荑稗鉤吻均出於地此固然矣人生其間混然中處盡其爕理之功則有景風時雨而無戾氣旱蝗有五榖桑麻而無荑稗鉤吻此人所以參天地贊化育而天地所以待人而為三才也孟子之闢異端如宣王之攘夷狄其志亦若此而已豈秦始皇漢武帝之比哉聖人作易以立人極其義以君子為主故為君子謀而不為小人謀觀㤗否剝復名卦之意則可見矣而曰古今豈有無小人之國哉嗚呼作易者其知道乎其不知易者甚哉胡子知言疑義知言曰天命之謂性性天下之大本也堯舜禹湯文王仲尼六君子先後相詔必曰心而不曰性何也曰心也者知天地宰萬物以成性者也六君子盡心者也故能立天下之大本人至于今賴焉不然異端並作物從其類而瓜分孰能一之熹謂以成性者也此句可疑欲作而綂性情也如何栻曰綂字亦恐未安欲作而主性情如何熹謂所改主字極有功然凡言刪改者亦且是私竊講貫議論以為當如此耳未可遽塗其本編也如何熹按孟子盡心之意正謂私意脫落衆理貫通盡得此心無盡之體而自是擴充則可以即事即物而無不盡其全體之用焉爾但人雖能盡得此體然存養不熟而於事物之間一有所蔽則或有不得盡其用者故孟子既言盡心知性又言存心養性葢欲此體常存而即事即物各用其極無有不盡云爾以大學之序言之則盡心知性者致知格物之事存心養性者誠意正心之事而夭壽不貮修身以俟之者修身以下之事也此其次序甚明皆學者之事也然程子盡心知性不假存養其唯聖人乎者葢惟聖人則合下盡得此體而用處自然無所不盡中間更不湏下存養充擴節次功夫然程子之意亦指夫始條理者而為言非便以盡心二字就功用上說也今觀此書之言盡心大抵皆就功用上說又便以為聖人之事竊疑未安舊說未明今别改定如此祖謙曰成性固可疑然今所改定乃兼性情而言則與本文設問不相應來諭以盡心為集大成者之始條理則非不可以為聖人事但胡子下者也兩字却似㫁定爾若言六君子由盡其心而能立天下之大本如此熹謂論心必兼性情然後語意完備若疑與所設問不相應而者也二字亦有未安則熹欲别下語云性固天下之大本而情亦天下之逹道也二者不能相無而心也者知天地宰萬物而主性情者也六君子惟盡其心故能立天下之大本行天下之逹道人至于今賴焉云云不知更有病否若所謂由盡其心者則詞恐太狹不見程子所謂不假存養之意知言曰天理人欲同體而異用同行而異情進脩君子宜深别焉熹按此章亦性無善惡之意與好惡性也一章相類似恐未安葢天理莫知其所始其在人則生而有之矣人欲者梏於形雜於氣狃於習亂於情而後有者也然既有而人莫之辨也於是乎有同事而異行者焉有同行而異情者焉君子不可以不察也然非有以立乎其本則二者之幾微瞹萬變夫孰能别之今以天理人欲混為一區恐未允當祖謙曰天理人欲同體而異用者却似未失葢降𠂻秉彛固純乎天理及為物所誘人欲滋熾天理泯滅而實未嘗相離也同體異用同行異情在人識之爾熹再詳此論胡子之言葢欲人於天理中揀别得人欲又於人欲中便見得天理其意甚切然不免有病者葢既謂之同體則上面便著人欲兩字不得此是義理本原極精㣲處不可少差試更子細玩索當見本體實然只一天理更無人欲故聖人只說克己復禮教人實下工夫去却人欲便是天理未嘗教人求識天理於人欲汨没之中也若不能實下功夫去却人欲則雖就此識得未嘗離之天理亦安所用乎知言曰好惡性也小人好惡以己君子好惡以道察乎此則天理人欲可知熹按此章即性無善惡之意若果如此則性但有好惡而無善惡之别矣君子好惡以道是性外有道也察乎此則天理人欲可知是天理人欲同時並有無先後賓主之别也然則所謂天生烝民有物有則民之秉彛好是懿徳者果何謂乎龜山楊子曰天命之謂性人欲非性也却是此語直截而胡子非之誤矣栻曰好惡性也此一語無害但著下數語則為病矣今欲作好惡性也天理之公也君子者循其性者也小人則以人欲亂之而失其則矣熹謂好惡固性之所有然直謂之性則不可葢好惡物也好善而惡惡物之則也有物必有則是所謂形色天性也今欲語性乃舉物而遺則恐未得為無害也知言曰心無不在本天道變化為世俗酬酢參天地備萬物人之為道至大也至善也放而不知求耳聞目見為己蔽父子夫婦為己累衣裘飲食為己欲既失其本矣猶皆曰我有知論事之是非方人之短長終不知其䧟溺者悲夫故孟子曰學問之道無他求其放心而已矣熹按人之為道至善也至大也此說甚善若性果無善惡則何以能若是耶栻曰論性而曰善不足以名之誠為未當如元晦之論也夫其精㣲純粹正當以至善名之龜山謂人欲非性亦是見得分明故立言直截耳遺書中所謂善固性也惡亦不可不謂之性也則如之何譬之水澄清者其本然者也而或渾焉則以夫儷滓之雜也方其渾也亦不可不謂之水也夫專善而無惡者性也而其動則為情情之發有正有不正焉其正者性之常也而其不正者物欲亂之也於是而有惡焉是豈性之本哉其曰惡亦不可不謂之性者葢言其流如此而性之本然者亦未嘗不在也故善學者化其滓以澄其初而已熹詳此論性甚善但明道所謂惡亦不可不謂之性是説氣禀之性觀上下文可見熹又看此章云本天道變化為世俗酬酢疑世俗字有病猶釋子之謂父母家為俗家也改作日用字如何熹又細看雖改此字亦為未安葢此兩句大意自有病聖人下學而上逹盡日用酬酢之理而天道變化行乎其中耳若有心要本天道以應人事則胷次先横了一物臨事之際著意將來把持作弄而天人之際終不合矣大抵自謝子以來雖說以灑掃應對為學然實有不屑卑近之意故纔說灑掃應對便湏急作精義入神意思想像主張惟恐其滯於小也如為朱子發說論語乃云聖門學者敢以天自處皆是此箇意思恐不免有病也又云以其小者移於小物作日用工夫正是打成两截也知言曰或問性曰性也者天地之所以立也然則孟軻氏荀卿氏揚雄氏之以善惡言性也非歟曰性也者天地鬼神之奥也善不足以言之况惡乎哉或又曰何謂也曰宏聞之先君子曰孟子所以獨出諸儒之表者以其知性也宏請曰何謂也先君子曰孟子道性善云者歎美之詞不與惡對或問心有死生乎曰無死生曰然則人死其心安在曰子既知其死矣而問安在耶或曰何謂也曰夫惟不死是以知之又何問焉或者未逹胡子笑曰甚哉子之蔽也子無以形觀心而以心觀心則其知之矣熹按性無善惡心無死生兩章似皆有病性有善惡前此論之已詳心無死生則幾於釋氏輪迴之說矣天地生物人得其秀而最靈所謂心者闕夫虚靈知覺之性猶耳目之有見聞耳在天地則通古今而無成壊在人物則隨形氣而有始終知其理一而分殊則亦何必為是心無死生之說以駭學者之聼乎栻曰心無死生章亦當刪去知言曰凡天命所有而衆人有之者聖人皆有之人以情為有累也聖人不去情人以才為有害也聖人不病才人以欲為不善也聖人不絶欲人以術為傷徳也聖人不棄術人以憂為非逹也聖人不忘憂人以怨為非𢎞也聖人不釋怨然則何以别於衆人乎聖人發而中節而衆人不中節也中節者為是不中節者為非挾是而行則為正挾非而行則為邪正者為善邪者為惡而世儒乃以善惡言性邈乎遼哉熹按聖人發而中節故為善衆人發不中節故為惡世儒乃以善惡言性邈乎遼哉此亦性無善惡之意然不知所中之節聖人所自為耶将性有之耶謂聖人所自為則必無是理謂性所固有則性之本善也明矣栻曰所謂世儒殆指荀楊荀楊葢未知孟子所謂善也此一叚大抵意偏而詞雜當悉刪去熹謂此叚不可盡刪但自聖人發而中節以下刪去而以一言㫁之云亦曰天理人欲之不同爾栻曰所謂輕詆世儒之過而不自知其非恐氣未和而語傷易析理當極精㣲毫釐不可放過至於尊譲前輩之意亦不可不存也熹觀此論切中淺陋之病謹已刪去訖知言曰彪居正問心無窮者也孟子何以言盡其心曰惟仁者能盡其心居正問為仁曰欲為仁必先識仁之體曰其體如何曰仁之道𢎞大而親切知者可以一言盡不知者雖設千萬言亦不知也能者可以一事舉不能者雖指千萬事亦不能也曰萬物與我為一可以為仁之體乎曰子以六尺之軀若何而能與萬物為一曰身不能與萬物為一心則能矣曰人心有百病一死天下之物有一變萬生子若何而能與之為一居正竦然而去他日某問曰人之所以不仁者以放其良心也以放心求心可乎曰齊王見牛而不忍殺此良心之苗裔因利欲之間而見者也一有見焉操而存之存而養之養而充之以至于大大而不已與天同矣此心在人其發見之端不同要識之而已熹按欲為仁必先識仁之體此語大可疑觀孔子答門人問為仁者多矣不過以求仁之方告之使之從事於此而自得焉爾初不必使先識仁體也又以放心求心之問甚切而所答者反若支離夫心操存舍亡間不容息知其放而求之則心在是矣今於己放之心不可操而復存者置不復問乃俟異時見其發於他處而後從而操之則夫未見之間此心遂成間斷無復有用功處及其見而操之則所操者亦發用之一端耳於其本源全體未嘗有一日涵養之功便欲擴而充之與天同大愚竊恐其無是理也栻曰必待識仁之體而後可以為仁不知如何而可以識也學者致為仁之功則仁之體可得而見識其體矣則其為益有所施而亡窮矣然則答為仁之問宜莫若敬而已矣祖謙曰仁體誠不可遽語至於答放心求心之問却自是一說蓋所謂心操存舍亡間不容息知其放而求之則心在是矣者平時持養之功也所謂良心之苗裔因利欲而見一有見焉操而存之者隨事體察之功也二者要不可偏廢苟以此章欠說涵養一叚未見之間此心遂成間㫁無復用功處矣是若曰於已放之心置不復問乃俟其發見於他處而後從而操之語却似太過蓋見牛而不忍殺乃此心之發見非發見於他處也又謂所操者亦發用之一端胡子固曰此良心之苗裔固欲人因苗裔而識本根非徒認此發用之一端而已熹謂二者誠不可偏廢然聖門之教詳於持養而略於體察與此章之意正相反學者審之則其得失可見矣孟子指齊王愛牛之心乃是因其所明而導之非以為必如此然後可以求仁也夫必欲因苗裔而識本根孰若培其本根而聼其枝葉之自茂耶知言曰天地聖人之父母聖人天地之子也有父母則有子矣有子則有父母矣此萬物之所以著見道之所以名也非聖人能名道也有是道則有是名也聖人指明其體曰性指明其用曰心性不能不動動則心矣聖人傳心教天下以仁也熹按心性體用之云恐自上蔡謝子失之此云性不能不動動則心矣語尤未安凡此心字皆欲作情字如何栻曰心性分體用誠為有病此若改作性不能不動動則情矣一語亦未安不若伊川云自性之有形者謂之心自性之有動者謂之情語意精宻也此一叚似亦不必存熹詳此段誠不必存然性不能不動此語却安但下句却有未當爾今欲存此以下而頗改其語云性不能不動動則情矣心主性情故聖人教人以仁所以傳是心而妙性情之徳又按伊川有數語說心字皆分明此一段却難曉不知有形二字合如何說晦庵集巻七十三欽定四庫全書晦庵
