seq: 61
front:
  text: 至示喻進學之意甚善甚善從事於此自當有味但畏間斷不接續爾然續與不續其機亦在我而不在人也
  hash: sha256:534303ccd26e2f798c487e868e4c73fcda406e69ceb2e98fa39102c7a30311af
body:
  text: 答林徳久收斂之喻足見信道之勇然湏博約相資方有進歩處而讀書之法又只是要專一久自見功難以歳月期速效也易說大槩多與啟蒙相出入但後數條旁通衆說亦有功俟更徐攷奉報然既知其無取自不必深究王輔嗣所謂縱或復值而義無所取此一言切中事理中間亦嘗有數語論之後便寫寄也向在玉山道間見徐彦章說離為龜故卦中言龜處皆有離象如頤之靈龜損益十朋之龜以其卦雖無離而通體似離也頤六爻損自三至上益自初至五此其求之巧矣然頤猶取龜義而無取於離損益則但言其得益之功而義亦不復繫於龜矣今乃不論其所以得益之故以為求益之方而必窮其龜之所自來亦可謂枉費心力矣大學歸來不暇整理蓋此等多因朋友辨論間彼此切磨説得細密今無事時自作文字却有搜索不到處因暇試為追記前日所論便中示及或便可用也昨在玉山學中與諸生説話司馬宰令人録來當時無人劇論説得不痛快歸來偶與一朋友説因其未喻反復曉譬却說得詳盡因并兩次所言録以報之試取一觀或有助於思索也答林徳久殿記正以病思昏塞不能有所發明為愧斯逺書來疑一兩處已報之矣恐更有未安且更商量未可便入石也彭書荷留意此公之去深為可惜今外廷尚得諸人扶持未至甚有過事但本根之慮外間無由知其深淺令人憂歎耳所喻日用功夫甚慰所望但云一著力便覺多事此恐未然此心操舍存亡只在瞬息間本不湏大段著力然又不可不著力如此久之自然見效若如此論竊恐非晚定湏别求捷徑矣窮理亦無它法只日間讀書應事處毎事理會便是雖若無大頭段增益然亦只是積累久後不覺自浹洽貫通正欲速不得也易象説似未條暢所論小過中孚先儒之説却似未為過也熹所論别紙録去然其大意不過欲姑存而未論耳後書所疑不知後來看得曉然未耶熹嘗愛韓子説所以為性者五而今之言性者皆雜佛老而言之所以不能不異在諸子中最為近理蓋如吾儒之言則性之本體便只是仁義禮智之實如老佛之言則先有箇虛空底性後方旋生此四者出來不然亦説性是一箇虛空底物裏靣包得四者今人却為不曾曉得自家道理只見得它説得熟故如此不能無疑又纔見説四者為性之體便疑實有此四塊之物磊塊其間皆是錯看了也湏知性之為體不離此四者而四者又非有形象方所可撮可摩也但於渾然一理之中識得箇意思情狀似有界限而實亦非有牆壁遮欄分别處也然此處極難言故孟子亦只於發處言之如言四端又言乃若其情則可以為善之類是於發處敎人識取不是本體中元來有此如何用處發得此物出來但本體無捉摸處故只可於用處看便省力耳所引程子之言乃暢潛道本前輩疑其間或非先生語以今觀之誠是不精切也所論春不可以包夏秋冬亦未然若如所論則是元字是總説下面湏更添一字與亨利貞别為四徳矣豈理也耶禮智二字當時只是漫説初無𦂳要然亦不可不理會得今但以四時觀之即自可見也中庸游楊説得不精切不必深求中庸對高明而言是就事物上説各要得中而平常正是三千三百底事安得不謂之小凡此類更熟味之自見意思也目盲作此數紙已極費力未能盡鄙意如更有疑遞中附數字來子細反復此處正好劇論也答林徳久目盲益甚它疾亦浸劇辭免未報且爾杜門無足言也新齋已畧就而學子至者終少難得穎悟可告語篤信肯用力之人兀坐殊憒憒耳賢者斆學之功當日有緒見讀何書有可商量者便中示及一二為幸答林徳久新齋雖就而竹木未成陰學者居之多不安然今歲適有科舉之累來者亦無多人又病中無氣力不能與人劇論甚覺負其來意也疑義兩紙各已奉報鬼神之説只且如此涵泳聖賢諸説久自分明不必穿鑿彊作見解也持敬之云誠如所喻此是最𦂳切處大病之餘又苦目昬讀書不得兀坐終日於此甚有味也界限之説亦是要見得五行之在性中各有體段要得分辨不雜不可説未感時都無分别感物後方有分别也觀程先生沖漠無朕一段可見矣徳脩王丈逝去甚可惜雖其所講未甚精到然朴厚誠實今亦難得此等人也答林徳久所示疑義各附鄙説於其後近覺向來所論於本原上甚欠工夫間為福州學官作一説發此意欲寫奉寄以斯逺亟欲附家報未能辦俟後便也中庸章句已刻成尚欲脩一兩處以或問未罷亦未欲出次第更一兩月可了大抵日困應接不得専一工夫今又目盲尤費力爾不知天意如何且留得一隻眼了些文字以遺後來亦是一事今左目已不可治而又頗侵右目矣伊川曰性中只有箇仁義禮智而已曷嘗有孝悌來事親從兄雖人之良能論性之體則仁義禮智所謂孝悌乃仁之發見者未知是否伊川所以謂仁主於愛愛莫大於愛親伊川先生固曰仁性也孝悌用也此可見矣夫子温良㳟儉譲伊川以為盛徳光輝接見於人者也學聖人者其徳性當如何涵養恐是持敬為先否持敬固是本原然亦須隨事省察去其不如此者因不失其親二程先生謂信恭因不失親近於義禮橫渠先生謂不失親於可賤之人當從何説橫渠得之但全章文意却微有病吾十有五而志於學一章伊川以為且為學者立下一法所以勉進後人橫渠以為行著習察則皆聖人進徳次序二説不同未知孰是今讀集註是其日用之間必有獨覺其進而人不及知者因其近似以自名所謂近似之説未能盡曉此三説未湏理會只且就自己分上㸃檢不思而得不勉而中中庸皆以為誠之事初無節次以耳順為不思而得不踰矩為不勉而中所謂不思不勉有十年工夫未知如何同上欲是聖人作用處否妄意聖人所謂從心所欲蓋自志學至此則純是義理心之所欲即道體流行自不踰乎天則莊老猖狂妄行蹈乎大方立脚處義理皆差彼所謂大方豈真法度也未知是否欲字分明聖人作用處却難曉如此解經轉見迷昧矣猖狂妄行便是不依本分了上蔡曰聖人未嘗無思故有所欲未嘗放過不踰矩聖人之心澹如止水體用未嘗相離竊意無思收與放恐是學者分上事上蔡語無病四十而不惑伊川曰明善之徹又曰言不惑則自誠敢問不惑已至誠之地位否若橫渠言不惑則於功用上見二説如何二先生之言未嘗有異更宜玩索由誨汝知之乎竊意子路勇於進其於學問恐欠深潛密察之功故夫子誨之者如此上蔡謂死生之説鬼神之情狀為學者當知千歲之逺六合之外為學者所不必知死生鬼神之所以然非窮神知化者不足以與此夫子嘗告之以未知生未能事人正子路從事於功用之間豈强其所未易知者恐非誨其務實之意不必如此説上蔡之説且以文意論之已自不是也巧言令色鮮矣仁諸儒皆以為其心未必不仁志在於善而失其所習與若實之以君子之徳雖巧令未為過竊意巧令者務悦於人失其本心甚矣若如諸説恐離心迹於二而容悦於外者曰吾心不如是也可乎諸説蓋為鮮字所惑又為詞欲巧令儀令色所牽皆以詞害意之失故伊川先生直截説破云謂非仁也知巧言令色之非仁則知仁矣此足以破千載之謬矣伊川曰心具天徳心有不盡處便是天徳處未能盡何緣知性知天觀諸先生議論皆謂盡心而後知性知天而先生盡心第一章以謂知性而後能盡心與諸先生議論不同如孟子教人皆從心上用功不知先自知性始當從何處實下工夫敢告指敎以文勢觀之盡其心者知其性也言人之所以能盡其心者以其知其性故也蓋盡心與存心不同存心即操存求放之事是學者初用力處盡心則窮理之至廓然貫通之謂所謂知性即窮理之事也湏是窮理方能知性性之盡則能盡其心矣至大至剛以直養而無害若直字絶句則直仍論氣之體若剛字絶句則直是養氣矣二者未知孰是如楊遵道録伊川語與龜山語録嫌將一物養一物之説則直為絶句至常思之人心平氣定不為私慾所誘氣之本體覺廣大不可屈一為私意所撓則便有歉所謂直養而無害者是全義理去私慾否以直養而無害即上文自反而縮之意人能集義則無不直而氣浩然矣配義與道伊川謂以義理養成此氣合義與道又云既生得此氣語其體則與道合語其用則莫不是理義配義與道自養氣者而言或自養而既成者也龜山謂氣無聲之可名故難言之也而以道義配之所以著名也一似氣道義各為一物姑借此以明彼爾尹和靖謂其為氣也至大至剛以直其體則名曰道其用則名曰義學者能識之然後能養之則三者皆一事而氣為之主兩説未知如何集註謂合而有助之詞亦未能盡曉併告開發集註説得分明更宜深攷當見不敢曲從楊尹之説必有事焉而勿正二程多主於敬一説湏當集義是承上文是集義所生者而言所謂必有事則積集衆善工夫否孟子上下文無敬字只有義字程子是移將去敬字上説非孟子本意也集註亦可細玩有子以孝悌為仁之本孟子分事親從兄為仁義之實義主敬或主於事之宜也以宜為主而敬在其中故者以利為本故者謂其本如是也或是已然之故也謂其本如是則自其稟受之初者觀之若已然之故則必待端緒著見而後可也伊川謂必求其故者只是欲順而不害之謂所謂順利者得非中庸率性之道而人為不得叅於其間耶又曰凡性之初未嘗不以順利為主則是性本順利不待矯揉成就也此只就性之本而言也至觀順杞柳之性與夫水無有不下兩章則性本善凡所謂不善皆拂其本也伊川二説恐叅合看而後全也如龜山以故為氣質之性竊類莊子去智與故之言蘇黃門亦有此説不知如何故者已然之迹也如性之有仁義禮智不可得而見而惻隠羞惡恭敬是非則有已然之迹矣然四者之發非有所矯揉而後成也非以利為本耶楊蘇之説皆非是蘇之失尤甚此類湏痛與辨析方見工夫孟子論三聖獨伊尹不言聞其風者亦不言其流弊如夷惠者何也豈以其樂堯舜之道於畎畝之中必待湯往聘之乃幡然而起行止近於聖之時也此恐亦偶然耳如所論者恐或亦有之也智聖一章自集大成也者以下舊見鄉人陳先生説孟子教學者集大成門户故分智聖始終之事以示人謂其知有偏全則行亦有偏全必自致知而入也竊觀此章前言聖人之時後方兼明智聖始終之義獨言孔子者恐為智聖功用而言也三子者或不足於知或知有所偏也如橫渠謂聖者不勉而中不思而至似不特智之事也豈所謂智亦生而知之者否孟子此言固専為孔子而發然亦可見三子欠闕處及學者工夫次第不是説教學者以集大成門户及聖人之功用而言也集大成乃聖賢地位極至處豈有門户之可言然其所謂知有偏全則行亦有偏全必自致知處而入則得之矣孟子曰人無有不善水無有不下程氏謂善亦性也惡亦不可不謂之性也若指上文氣稟而言則如子越椒之生世偶有之不應稟氣賦形有善惡存焉若指下文水就下而言則若有可使為不善之意然濁水沙石非水本然也惡亦不可不謂之性此語未曉所指此章性字説得最雜有是説本性者有是説氣禀者其言水之下與水之清亦是兩意湏細分别耳生之謂性一章集註以知覺運動者言也仁義禮智性也嘗觀釋氏之説止以知覺運動者為性今其徒之説亦有以是靈靈昭昭者為非者前此常被其惑今析性與氣而言性之大本雖已分曉更有疑處人賦氣成形之後便有知覺所有知覺者自何而發端又死之後所謂知覺運動者隨當與形氣俱亡性之理則與天地古今周流而無間橫渠所謂非有我之得私者而有形聚成物形潰反原之説如何釋氏以謂覺性常存不受沈墜如其説誠有一物在造化之外老子亦謂死而不亡至於聖人之於䘮祭求諸幽漠如此其至者果有物無物耶知覺正是氣之虛靈處與形器渣滓正作對也魂游魄降則亦隨以亡矣横渠反原之説程子蓋嘗非之今東見録中不可以既反之氣復為方伸之氣此類有數條皆為此論發也䘮祭之禮是因其遺體之在此而致其愛敬以存之意思又别若夫為不善非才之罪也孟子謂人之才無有不善伊川謂性出於天才出於氣氣清則才清氣濁則才濁才則有善不善性則無不善其説似與孟子相反或四端著見處是才或所以能充拓者為才也性既本善則才只可為善為氣有不善故才有不善耳然孟子不論氣之病集註言之詳矣請更詳之君子不謂性命一章上言不謂性也下言有性焉上下言性不同恐上是氣質之性下是天地之性否横渠所謂形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉正本此意否以口之於味之屬為性非專指氣質蓋以理之屬於血氣者而言如書之言人心也中庸章句序中已詳之可考大而化之之謂聖橫渠謂大而化不可為也在熟之而已矣此則與易之擬議以成其變化同或説大猶有迹化無迹謂充實光輝者使泯然無形迹之可見竊疑與釋氏銷礙入空之説相似不知如何孟子説化字與易之變化不同後説得之然非銷礙入空之謂更分别之自可見矣橫渠曰由太虚有天之名由氣化有道之名合虛與氣有性之名合性與知覺有心之名橫渠所謂性者恐兼天地之性氣質之性而言否所謂心者併人心道心言否非氣無形無形則性善無所賦故凡言性者皆因氣質而言但其中自有所賦之理爾人心道心亦非有兩物也忠信所以進徳終日乾乾君子當終日對越在天也蓋上天之載無聲無臭其體則謂之易其用則謂之神其命於人則謂之性率性則謂之道修道則謂之教孟子去其中又發揮出浩然之氣可謂盡矣故説神如在其上如在其左右大小大事而只曰誠之不可揜如此夫徹上徹下不過如此形而上為道形而下為器湏著如此説器亦道道亦器但得道在不係今與後已與人至竊謂此段論至理徹上徹下本自完具初無天人微顯之間誠敬者所以體當是理者也一不誠敬則幾於無物矣豈能貫通而無間此終始専在誠敬上著力是否此是因解乾字乾字即是天字遂推言許多名字只是一理而各有分别雖各有分别又却只是一箇實理誠者實理之謂也非論人當以誠敬體當是理也中者天下之大本天地之間亭亭當當直上直下之正理出則不是唯敬而無失最盡至竊謂此段論中之體直上直下無所偏倚發而中節雖謂之和而中之體固存所論出則不是者出謂發而不中節者否敬而無失持養於未發之前否出則不是蓋謂發即便不可謂之中也且如喜而中節雖是中節便是倚於喜矣但在喜之中無過不及故謂之和耳答林徳久别紙所論敬為求仁之要此論甚善所謂心無私欲即是仁之全體亦是也但須識得此處便有本來生意融融洩洩氣象乃為得之耳顔子不改其樂是它功夫到後自有樂處與貧富貴賤了不相闗自是改它不得仁智夀樂亦是功夫到此自然有此効驗來喻雖亦無病然語意終未親切活絡更宜涵養玩索更於仁智實處下工夫則久當自見矣酉室所聞未見全書恐是陳長方所記此只有震澤記善錄乃淮郡印本想已有之其間議論亦多可疑也答林徳久近地教官闕次必逺既非禄養之宜又不更治民亦使人怠惰茍簡非所以磨厲器業似不若參選擬一近闕丞佐之屬為佳也熹屏居如昨朋舊多勸謝客省事者亦嘗試之似難勉强又揀别取舍却恐反生怨怒不若坦懐待之若合湏過嶺此亦何可避也答林徳久待次閑中足得為學未為失計要之仕宦只合從選部注擬是家常茶飯今人干堂慣了不覺其非故有志之士亦不免俯首其間為人所前却此可為後來之戒也無事靜坐有事應酬隨時處無非自己身心運用但常自提撕不與俱往便是功夫事物之來豈以漠然不應為是耶疑義已略用己意説釋其後恐有未安更望反復大抵似用意未精齩嚼可破也漢卿甚不易得想亦難得相聚也齋中自去秋後空無一人亦幸省事今復頗有來者然亦不多目前未見卓然可望也唯江西吳必大伯豐者相從累年明敏過人儘能思索從事州縣隨事有以及民而自守勁正不為時勢所屈甚不易得今乃不幸短命而死甚可傷悼耳答林徳久熹疾病益侵氣痞足弱不能屈伸屏居無事尚能讀書而以病故不能俯伏几案所幸猶有一二朋友早晚講論少足為慰耳引年告老昨以鄉閭橫議官吏過憂久不得上至煩臺評播告後乃得之尸居餘氣何足為世重輕而每煩當路注意如此既以自歎又自笑也二陸祠記甚佳此題目本不好做想亦只得且如此説過耳幕中無事儘可讀書不知比來作何功夫因書幸略及之也武成錯簡尋常如何讀韓退之與大顛書歐蘇之論孰當因風幸及之答林徳久盡心知性之説恐未然今亦未論義理如何只看文勢者也二字便可見近有朋友引得其民者得其心也以證之亦自有理若如所論私意脱落無有查滓為盡心即不知却如何説存心兩字兼既未知性即是於理尚有未明如何便到得此田地耶此處一差便入釋氏見觧矣此理甚明更宜思之况知者有漸之詞盡者無餘之義其意象規模自應有先後也太虛實理正是指形而上者而言既曰形而上者則固自無形矣然謂之無理可乎以此思之亦自曉然也答歐陽希遜謙之所示疑義比舊甚進所未安各己疏出幸更思之因風喻及也所謂徒守紙上語擬規畫圓摸矩作方此初學之通病然尚有不能守紙上之語雖擬規矩而不能成方圓者而未必自知其非也以愚計之但且謹守規矩朝夕模之不暫廢輟積久純熟則不待模擬而自成方圓矣切不可輙萌妄念求之於言語文字之外也觀孔子言仁如告顔子以克己復禮所以為仁之機殆若發露而無餘藴至孟子論仁雖嘗指人心而言然其意使人自惻隠之心推之要其㫖歸多主於愛之一辭雖所以指示於人者豈不精切而確實然不似聖人之言仁廣大渾全而使人自得於精思力行之餘也意者孟子適當夫好戰嗜殺人之時為救焚拯溺之計不可不自夫受病之所而藥之歟程子曰四徳之元猶五常之仁偏言則一事專言則包四者惻隠之類偏言之也克己之類専言之也然即此一事便包四者蓋亦非二物也故論語集注中云仁者心之徳愛之理也此言極有味可更思之不可謂孟子之言不如孔子之周徧孟子亦有専言之者仁人心是也孔子亦有偏言之者愛人是也又謂孟子以世人好殺而言惻隠尤非也孔子雖不以義對仁然每以智對仁更宜思之君子所貴乎道者三君子之所以重乎此者為其發乎吾身而非有待於外也為其得於不勉不思而非出於造作而然也豈若籩豆之事器數之末皆身外之物可以品節劑量安排布置而為之者乎曾子之意只是説人之用力有此三處此大而彼小此急而彼緩爾亦未説到不勉不思處籩豆之事固是末節然亦非全然忽畧而不以為意但當付之有司使供其事而非吾之所當切切留意者耳所云身外之物以下云云者尤非本文之意也論語集註曰曾㸃氣象從容辭意灑落某竊想像其舍瑟之際玩味其詠歸之辭亦可以略識其大槩矣程子謂其便是堯舜氣象竊嘗以程子之意求之所謂堯舜氣象者得非若所謂不以位為樂與夫有天下而不與之意乎集註又云是雖堯舜事業固優為之不知所謂事業者就其得於已者而言就其得於事功者而言孟子之所謂狂者蓋謂夷考其行而不掩焉者也所謂行不掩焉者若曰言不顧行行不顧言所行不能掩其所言也不知曾㸃行不掩焉者何處可見檀弓曰季武子死曾㸃倚其門而歌於此而作歌可以見其狂否曾㸃氣象固是從容灑落然須見得它因甚到得如此始得若見得此意自然見得它做得堯舜事業處不可以一事言也行有不掩亦非言行背馳之謂但行不到所見處耳倚門而歌亦略見其狂處只此舍瑟言志處固是聖人所與然亦不害其為狂也過此流入老莊去矣孟子曰我知言我善養吾浩然之氣集註云浩然盛大流行之貌氣即所謂體之充者本自浩然失養故餒某竊味氣體之充與下面浩然之氣兩箇氣字大意似同而精微密察處略似有異前面氣字若専主形於外者而言後面氣字若専主發於内者而言氣無二義但浩然之氣乃指其本來體段而言謂體之充者泛言之耳然亦非外此而别有浩然之氣也反身而誠者知至之功强恕而行者力行之事知之在前行之在後與篇首盡其心者知其性也知其性則知天矣存其心養其性所以事天也文勢略同未審是否反身而誠乃是反求諸身而實有是理如仁義忠孝應接事物之理皆真有之而非出於勉强偽為也此是見得透信得及處到此地位則推已及物不待勉强而仁在我矣下言强恕而行者蓋言未至於此則當强恕以去已私之蔽而求得夫天理之公也孟子施於四體四體不言而喻集註云言四體雖不能言而其理自可曉也似若指在人而言集註此義近看得似未安恐只是説四體不待安排而自然中禮也舜不告而娶告則廢人之大倫則娶為重而告為輕不幾於禮輕而色重賢者飢餓於土地賙之則受免死而已則免死為重潔身為輕不幾於禮輕而食重禮固重於食色矣然禮亦有大體小節之殊而食色所係亦自有大小緩急之不同孟子言之詳矣無可疑也答毆陽希遜所示卷子巳悉疏其後矣時亨處亦有三紙可互見也元徳為況如何元瞻已歸未也吾人為學自為己事豈以時論而少變千萬勉力謙之前此請問曾㸃氣象從容辭意灑落堯舜事業亦優為之先生批敎云曾㸃氣象固是從容灑落然湏見得它因甚得到如此始得若見得此意自然見得它做得堯舜事業處謙之因此熟玩集注之語若曰但味其言則見其日用之間無非天理流行之妙而用舍行藏了無所與於我見得曾㸃只是天資高所見處大所以日用之間無非天理流行之妙惟其識得這道理破便無所係累於胸中所謂雖堯舜事業亦優為之自其所言以逆諸其日用之間而知其能爾也何者堯舜之聖只是一箇循天理而已然曾㸃雖是見處如此却無精微縝密工夫觀論語一書㸃自言志之外無一語問答焉則其無篤實工夫可見矣使曾㸃以此見識加之以鑚仰之功謹於步趨之實則其至於堯舜地位也孰禦本朝康節先生大略與㸃相似伏乞指教人有天資高自然見得此理真實流行運用之妙者未必皆由學問之功如康節二程先生亦以為學則初無不知也來喻皆已得之大抵學者當循下學上達之序庶幾不錯若一向先求曾㸃見解未有不入于佛老也謙之前此請問語孟仁不同處先生批教云集註中云仁者心之徳愛之理也此言極有味可更思之近來却覺看得論語中答諸弟子問仁處如告之以主敬行恕告之以先難後獲之類往往不是先藥其人之病痛則是其人未到仁者地位未可以抽闗啟鑰告之且為它安下一箇為仁底根脚根脚平正牢固然後却可語之以仁若答子貢之問直曰工欲善其事必先利其器此可以觀矣樊遲問仁告之以居處恭執事敬與人忠胡氏以為樊遲問仁者三此最先先難次之愛人其最後乎似得聖人之意矣若是根脚不穏而語之以仁縱使能用力焉果能為我有乎根脚既正雖不告語之亦自然能尋求向上去也前此讀論語見聖人答問仁之語其説不一便將作聖人言仁廣大周徧底意思看了是以求其要領而不可得却把孟子言仁處看小了遂謂孟子之言不如孔子廣大周徧今此却看得孟子所言惻隠之心與夫人心等語乃是實指仁之端倪學者便可體認尋求便有靠實下手處於此益見得所謂心之徳者乃是仁之真體蓋事事要得此心之安不使有一毫之不足處而愛者乃是仁之實不以吾身之外皆無與於我而一毫不䘏也程子以西銘為仁之體其以此歟不知是否伏乞指教此段看得大有病告樊遲三語便與告顔淵仲弓都無異故程子曰此是徹上徹下語安得謂姑為之安立根脚乎若此只是安立根脚即不知如何方是正下手為仁處耶大率孔子只是説箇為仁工夫至孟子方解仁字之義理如仁之端仁人心之類然仁字又兼兩義非一言之可盡故孔子敎人亦有兩路克己即孟子仁人之心説愛人即孟子惻隠之説而程子易傳亦有専言偏言之説如熹訓釋又是孟子程子義疏可更詳之謙之前此請問孟子程子論才處曽妄為之説曰性無不善而氣有清濁人之有昏明强弱者氣使之然也才發於性固無有不善也氣稟之清而本性常用則才固無不明且强也氣稟之濁而本性障蔽則或有以梏其才之美而使之昏且弱矣氣稟昏濁既蔽其性之善則遂併與其才而失之何者性固才之根本也此孟子所謂不能盡其才而非才之罪也故夫氣之清則能盡其才氣之濁則不能盡其才然其才發於性自人氣之有清濁而後才始有盡不盡者焉則夫昏明强弱其本固不係於才而係於氣也已上前時請問之語此時先生賜答不以為不可然謙之近来玩味孟子本文與集註之説又覺前説殊未為當孟子之言若曰惻隠羞惡恭敬是非之心人皆有之可見其性之善也夫人之受此性以生也則必具此形體也有此形體則其才能固具於此形體之中若是器為刃也必能刺物也是器為舟也必能行水也是故有此惻隠羞惡辭遜是非之心能思而求之以充惻隠羞惡辭遜是非之心是所謂盡其所能也彼其不思不求不知所以充之者非無是能也不知所以盡其所能也其所以不盡其所能者則稟是氣之濁與夫陷溺其心者也程子所謂學而知之即孟子求則得之之論也程子所謂自暴自棄即孟子不盡其才之論也二説雖異不害其為同也不知是否伏乞指教謙之又觀集注曰才固有昏明强弱之不同竊疑昏明是氣强弱是才不知於才字上下昏明字如何伏乞指教氣稟之殊其類不一非但清濁二字而已今人有聰明通達事事曉了者其氣清矣而所為或未必皆中於理則是其氣之不淳也人有謹厚忠信事事平穏者其氣醇矣而所知未必能達於理則是其氣之不清也推此類以求之才自見矣程子曰生之謂性性即氣氣即性生之謂也又曰人生而静已上不容説才説性時便已不是性也謙之竊意明道所言生之謂性與告子所言生之謂性不同明道之意若謂人生而後方始謂之性前此天命流行未有所寄寓只可謂之善不可謂之性然以無可得名又是性之本源只且謂之性若論其體叚則不可謂之性此人生而静以上不容説才説性時便已不是性也性即氣氣即性葢必稟是氣然後人之形體始立必命之以是性然後人之良知良能始具必有是性而後有是氣必有是氣而後有是性二者葢不能以相離也人物未生之時天命之流行雖其未有底止不可謂之性而性之本真實渾然而無所間雜人物已生之後氣質之成形雖其理已命於人始得謂之性而性之本體始與氣質交雜而有待於察識其端倪矣程子所謂性即氣氣即性非謂氣便是性性便是氣葢言其不相離也此程子所謂論性不論氣不備論氣不論性不明二之則不是葢以此也不知是否伏乞指教此叚近之程子曰人生氣稟理有善惡然不是性中元有此兩物相對而生也有自幼而善有自幼而惡者是氣稟使然也善固性也然惡亦不可不謂之性也謙之竊攷夫下文所引水流為喻是所謂不是元有兩物相對而生也然既謂之流而復有濁則非自幼而惡矣既曰水之清則性善之謂也則不可謂之惡亦不可不謂之性矣既曰有流而至海終無所汚有流而未逺已有所濁有出而甚逺方有所濁又曰清濁雖不同然不可謂濁者不為水也謙之竊以謂既是初流出時無濁者則後来雖有濁者或是泥沙溷之外物汨之不是元初水裏面帶得濁来到此方見也此則孟子所謂陷溺其心者也豈得以惡為不可不謂之性哉程子之言必有深意伏乞指教此所謂泥沙外物正指氣稟而言程子曰凡人説性只是説繼之者善也孟子言性善是也近觀先生答嚴時亨所問云易大傳言繼之者善是指未生之前孟子言性善是指已生之後與程子之説似若有異伏乞指教明道先生之言高逺𢎞闊不拘本文正意如此處多若執其方而論則所不可通者不但此句而已須知性之原本善而其發亦無不善則大傳孟子之意初無不同矣鄉黨非帷裳必殺之集註云朝祭之服用裳問時遺此一句正幅如帷要有襞積而旁無殺縫其餘如深衣要半下齊倍要則無襞積而有殺縫矣所謂有襞積恐是若今裙制近要有殺入聲是也要半下謂近要者狹半放下面齊也齊倍要謂向下者闊倍於上面要也不知旁無殺縫之制如何恐是深衣之制裳下面是裁布為之近要者殺從其小以就半下之法所以旁有殺縫也伏乞指教此讀集註遺下首句故其下皆無文理昨乍看之亦自曉不得也今添此句讀之自合見得分明矣帷裳如今之裙是也襞積即是摺處耳其幅自全安得謂近要者有殺縫耶論語君子周而不比字舊音毗志反集註無音古註集註皆為偏黨之義義之與比舊音毗志反集註音必二反孟子願比死者一洒之與且比化者無使土親膚其義與音又俱備無可疑者若御者且羞與射者比集註亦為偏黨之義亦必二反不知比字為偏黨之義者皆當作必二反如何至將比今之諸侯而誅之集註曰比連也音去聲所謂去聲者想却是作毗志反否伏乞指教記得此字是用賈昌朝羣經音辨改定比今之諸侯一處改未盡耳更俟契勘然亦無甚𦂳要今目昏甚此等處恐不暇料理矣孟子曰我不貫與小人乘貫舊音慣註曰貫習也集註無音亦曰貫習也恐是不須音轉亦可此等不應以煩瀆尊聽郷里後生或来質問不敢以私意揣量以告伏乞尊察貫若不音慣不知讀作何字如有别音即須補之若依舊只是貫字則自不須音也此不暇檢可更詳之後便批来答歐陽希遜所論程先生鳶飛魚躍必有事焉之語元德亦以為疑此乃為或問中舊説所誤今詳味之方見程先生説鳶飛魚躍是子思喫𦂳為人處以其於事物中指出此理令人隨處見得活潑潑地必有事焉是孟子喫𦂳為人處以其教人就已分上略綽提撕便見此理活潑潑地也非以其文義相似而引以為證也今看中庸且看子思之意見得分明即將程先生所説影貼出便見所引孟子之説只是一意不可以其文字言語比類牽合而使為一説也凡若此類更宜深思所論鬼神一章全不子細援引太多愈覺支離不見本經正意可且虚心將經文熟看甚不能曉處然後參以章句説教文義分明道理便有去著體物之義兩處説得如此分明足以致思乃更泛然而問可見元不曽入思慮也祭統所説如有見聞論語所説祭神如在皆是主於祭者而言此章言使天下之人齊明盛服以承祭祀是主於鬼神而言自有賔主如何却如此看體物使人兩句更須深體又来喻言如其神之在焉非真有在者也此言尤害理若如此説則是偽而已矣又豈所謂誠之不可掩乎昭明焄蒿悽愴疏説非是昭明謂光景焄蒿謂氣象悽愴使人神思灑浙如漢書云風肅然者宰我答問一章所論鬼神正與中庸相表裏今且先看令中庸意思分明却看此章便見子細智仁勇一章雖非經文正意然文勢相聮讀者亦須識得去著方見義理大小精粗縱横貫穿無空闕處今觀所論全未致思至如所引論語仁者安仁智者利仁豈是不知有此兩句所以如此筆之於書決須更有深意今乃如此草草看過率然發問殊非所望於朋友也答嚴時亨世文五行之生各一其性氣質是隂陽五行所為性即太極之全體但論氣質之性則此全體堕在氣質之中耳非别有一性也明道言人生而静以上不容説人生而静是未發時以上即是人物未生之時不可謂性才謂之性便是人生以後此理堕在形氣之中不全是性之本體矣然其本體又未嘗外此要人即此而見得其不雜於此者耳易大傳言繼善是指未生之前孟子言性善是指已生之後雖曰已生然其本體初不相雜也程子以忠為天道恕為人道莫是謂忠者聖人之在已與天同運而恕者所以待人之道否聖人處已待人亦無二理天人之别但以體用之殊耳放於利而行多怨南軒獨以為已之怨人南軒説固有此理只是此章語意只合如古註及程子説不容一語可兼二意虚心平氣静以察之當自見得不可以其近裏而遷聖人之本意以就之也發已自盡謂忠循物無違謂信所謂發已莫是奮發自揚之意否循物無違未曉其義如何發已自盡但謂凡出於已者必自竭盡而不使其有茍簡不盡之意耳非奮發之謂也循物無違謂言語之發循其物之真實而無所背戾如大則言大小則言小言循於物而無所違耳逃墨必歸於楊逃楊必歸於儒楊墨皆是邪説無大輕重但墨氏之説尤出於矯偽不近人情而難行故孟子之言如此非以楊氏為可取也孔墨並稱乃退之之繆然亦未見得是與原道之作孰先孰後也簡易引吕東莱觧禹貢一段此説大槩得之然亦不必言先為其難大抵只是許多道理須要理㑹得分明後方無窒礙不費力而自簡易耳如治亂繩若不解放得開豈能自成條理而不紛糾耶三重當從伊川之説伯者之事不得為善此章正與上章相發明乃是相承為文非隔章取義也六言六蔽説此亦但疑其文有不同耳先立題目又令復坐而後言之亦似太鄭重也答嚴時亨問目各已批出請更詳之禮書近方畧成綱目但疏義雜書中功夫尚多不知餘年能了此事否當時若得時亨諸友在近相助當亦汗青有期也浙中朋友數人亦知首尾亦苦不得相聚未有見日千萬自愛更於義理切身處著實進得一步則所以守此身者不待勉而固矣某昨来請問五行之生也各一其性傳云五行之生隨其氣質而所稟不同所謂各一其性也各一其性則渾然太極之全體無不各具於一物之中而性之無不在又可見矣各一其性周子之意固是指五行之氣質然水之潤下火之炎上木之曲直金之從革土之稼穡此但可以見其氣質之性所稟不同却如何便見得太極之全體無不各具於一物之中而性此性字是指其義理之性之無不在也莫是如上一節所謂五行異質而不能外乎隂陽隂陽異位而皆不能離乎太極即此可見得否覺得此處傳文似猶欠一二轉語每讀至此未能釋然先生答云氣質是隂陽五行所為性即太極之全體但論氣質之性則此全體墮在氣質之中耳非别有一性也某反復思之誠非别有一性然觀聖賢説性有是指義理而言者有是指氣稟而言者却不容無分别敬讀誨語謂氣質是隂陽五行所為性即太極之全體始悟周子所謂各一其性專是主理而言葢五行之氣質不同人所共知也而太極之理無乎不具人所未必知也此周子喫𦂳示人處今所在板行傳文皆云五行之生隨其氣質而所稟不同所謂各一其性也詳此文義這箇性字當指氣而言各一其性則渾然太極之中全體無不各具於一物之中而性之無不在又可見矣詳此文義這箇性字當是指理而言一叚之間上下文義頗相合恐讀者莫知所適從若但云五行之生雖其氣質所稟不同而渾然太極之全體無不各具於一物之中所謂各一其性如此則辭約而義明正是回教所謂全體墮在氣質之中底意思伏乞指教隂陽五行之為性各是一氣所禀而性則一也故自隂陽五行而言之則不能無偏而人稟其全所以得其秀而最靈也某昨来請問明道先生云人生而静以上不容説才説性時便已不是性也凡人説性只是説繼之者善也孟子言性善是也夫人生而静是喜怒哀樂未發之前此已上誠有不容説者然自孟子以来至於周程諸先生皆善言性者其大體指人物所得以生之理而言親切著明今謂其所説皆不是性可乎性理之説本自精微今謂才説性時便已不是性無乃使人致思於杳𡨕不可致詰之境乎明道此叚大意首尾大要是推明人生氣稟理有善惡竊詳易繫言繼之者善正謂大化流行賦與萬物無有不善孟子言性善止是言義理之性人所均禀初無不善皆是極本窮源之論引此以明人生氣稟理有善惡似不相侔不知明道所見是如何先生答曰人生而静是未發時已上即是人物未生之時不可謂性才謂之性便是人生以後此理墮在形氣之中不全是性之本體矣然其本體又亦未嘗外此要人即此而見得其不雜於此者耳易大傳言繼善即是指未生之前孟子言性善是指已生之後雖曰已生然其本體初不相雜也以上是人物未生之時是某思慮所未到伏讀批誨指示親切却覺得先生之説甚明而明道之説益有可疑何者人物未生時乃是一隂一陽之謂道而天命之流行所謂繼之者善便是以上事何故言以上不容説方其人物未生固不可謂性及人物既生須著謂之性雖則人生已後此理墮在形氣中不全是性之本體然氣稟不能無善惡者性之流也義理之有善無惡者性之本體也然皆不可不謂之性要在學者隨所讀書自去體認取今謂才説性時便已不是性深恐啓人致思於杳􅁳不可致詰之境而大傳言繼善是指未生之前則命之道也未可謂之性孟子言性是指已生之後乃易大傳所謂成之者性而非所謂繼之者善也明道却云凡人説性只是説得繼之者善也孟子言性善是也此尤不可曉近思録一書皆刪取諸先生精要之語以示後學入德之門户而首卷又是示人以道體所在編入此段必不是閑慢處既有所疑未容放下再此扣請乞恕再三之瀆此一段已詳於希遜巻中矣明道先生如此處多若以本文論之則皆不可曉矣要當忘言㑹意别作一格看可也子路曾晳冉有公西華侍坐一章夫子既語之以居則曰不吾知也如或知爾則何以哉正是使之盡言一旦進用何以自見及三子自述其才之所能堪志之所欲為夫子皆不許之而獨與曾㸃看来三子所言皆是實事曽㸃雖答言志之問實未嘗言其志之所欲為有似逍遥物外不屑當世之務者而聖人與此而不與彼何也集註以為味曾㸃之言則見其曰用之間無非天理流行之妙而用舎行藏了無與於我是雖堯舜之事業葢所優為其視三子規規於事為之末不可同年而語矣某嘗因是而思之為學與為治本来只是一統事他日之所用不外乎今日所存三子却分作兩截看了如治軍旅治財賦治禮樂與凡天下之事皆是學者所當理㑹無一件是少得底然須先理㑹要教自家身心自得無欲常常神清氣定涵養直到清明在躬志氣如神則天下無不可為之事程子所謂不得以天下撓己巳立後自能了當得天下事物者是矣夫子嘗因孟武伯之問而言由也千乘之國可使治其賦也求也千室之邑百乘之家可使為之宰赤也束帶立於朝可使與賔客言聖人固已深知其才所能辦而獨不許其仁夫仁者體無不具用無不該豈但止於一才一藝而已使三子不自安於其所已能孜孜於求仁之是務而好之樂之則何暇規規於事為之末縁他有這箇能解横在肚皮裏常恐無以自見故必欲得國而治之一旦夫子之問有以觸其機即各述所能子路至於率爾而對更無推遜求赤但見子路為夫子所哂故其辭謙退畢竟是急於見其所長聖門平日所與講切自身受用處全然掉在一邊不知今日所存便是後日所用見得他不容將為學為治分作兩截看了所以氣象不宏事業不能造到至極如曽㸃浴沂風雩自得其樂却與夫子飯疏食飲水樂在其中顔子簞瓢陋巷不改其樂􅁭懐相似程子謂夫子非樂蔬食飲水也雖蔬食飲水不能改其樂也謂顔子非樂簞瓢陋巷也不以貧窶累其心而改其所樂也要知浴沂風雩人人可為而未必能得其樂者正以窮達利害得以累其心而不知其趣味耳夫舉體遺用潔身亂倫聖門無如此事全不可以此議曽㸃葢士之未用須知舉天下之物不足以易吾天理自然之安方是本分學者曽㸃言志乃是素其位而行不願乎其外無入而不自得者故程子以為樂而得其所也譬如今時士子或有不知天分初無不足游泳乎天理之中大小大快活反以窮居隠處為未足以自樂切切然要做官建立事功方是得志豈可謂之樂而得其所也孟子謂廣土衆民君子欲之所樂不存焉中天下而立定四海之民君子樂之所性不存焉君子所性雖大行不加焉雖窮居不損焉分定故也孟子所謂君子所性即孔子顔子曽㸃之所樂如此如老者安之朋友信之少者懐之物各付物與天地同量惟顔子所樂如此故夫子以四代禮樂許之此浴沂風雩識者所以知堯舜事業曽㸃固優為之也然知與不知在人用與不用在時聖賢於此乘流則行遇坎則止但未用時只知率性循理之為樂正以此自是一統底事故也龜山謂堯舜所以為萬世法亦只是率性而已外邊用計用較假饒立功業只是人欲之私與聖賢作處天地懸隔如子路當蒯聵之難知食焉不避其難而不知衛輒之食不可食季氏富於周公而求也為之聚歛而附益之後来所成就止於如此正為他不知平日率性循理便是建功立事之本未到無入不自得處夫子之不與其有以知之矣所見如此不背馳否乞與訂正此一叚説得極有本末學者立志要當如此然其用力却有次第已為希遜言之矣答嚴時亨生之謂性一章論人與物性之異固由氣稟之不同但究其所以然者却是因其氣稟之不同而所賦之理固亦有異所以孟子分别犬之性牛之性人之性有不同者而未嘗言犬之氣牛之氣人之氣不同也人之所以異於禽獸一章亦是如此若如所論則孟子之言為不當而告子白雪白羽白玉之白更無差别反為至論矣程先生有一處有隙中日光之論最為親切更須詳味於同中識其所異異中見其所同然後聖賢之言反覆都不相礙若只據一偏各説道理則互相逃閃終身間隔無復㑹通之時矣杞栁之性固可以為桮棬然須斫伐裁截矯揉而後可成故孟子言戕賊杞栁而後可以為桮棬也若杞栁可以為桮棬而楩楠不可以為桮棬又是第二重道理與此元不相入不當引以説也此等處須且虚心看他聖賢所説文義指意以求義理之所當乃為善學若如所論徒為紛擾不惟枉費思慮言語而反有害於窮理之實也多怨之説固有此理但恐如此包裹費力聖人之言簡易平直未必如此屈曲且依程先生説為善五行太極便與生之謂性相似以為同則同中有異以為異則未嘗不同親親長長貴貴尊賢皆天下之大經固當各有所尚然亦不可以此而廢彼故鄉黨雖上齒而有爵者則俟賔主獻酬禮畢然後入又席於尊東使自為一列不為衆人所壓亦不壓却他人即所謂遵也遵亦作僎如此則長長貴貴各不相妨固不以齒先於爵亦不以爵加於齒也祭五祀説見於月令註疏甚詳可自攷之越紼之説註雖簡疏必詳此等可自檢看居喪不祭伊川横渠各有説若論今日人家所行則不合禮處自多難以一槩論若用韓魏公法則有時祭有節祀時祭禮繁非居喪者所能行節祀則其禮甚簡雖以墨縗行事亦無不可也喪禮自葬以前皆謂之奠其禮甚簡葢哀不能文而於新死者亦未忍遽以鬼神之禮事之也自虞以後方謂之祭故禮家又謂奠為喪祭而虞為吉祭葢漸趨於吉也酹酒有兩説一用鬱鬯灌地以降神則唯天子諸侯之禮有之今其書亡不可深攷一是祭酒葢古者飲食必祭人以鬼神自不能祭故代之祭也今人雖存其禮而失其義不可不知禮必本於太一髙氏説恐不然贑州所刋語解乃是鄭舜舉侍郎者名汝諧中間畧看亦有好處但如所引數條却似未安今且論其一二大者如三仁之事左傳史記所載互有不同但論語只言微子去之初無面縳􅋦璧之説今乃捨孔子而從左氏史遷已自難信又不得已而曲為之説以為微子之去乃去紂而適其封國則尤為無所據矣此乃人道之大變聖賢所處事雖不同而心則未嘗不同故孔子歴舉而並稱之且皆許其仁焉更須玩索未可輕論也絶四之説尤為無理且更虚心看集註中所引諸先生説不必如此求竒失却路脉也答曽光祖興宗知别後為學不倦甚慰然所謂念欲刻苦加勵又恐遂成助長之患而致知之功亦非旦夕可兾則似未得箇下手處也大綱且得以敬自守而就其間講論省察便是致知如得一分更有一分功夫節節進去自見欲罷不能不待刻苦加勵而後得也但目下持守講學却亦不得不刻苦加勵不須遽以助長為憂也答曾光祖所示問目甚慰所懐此是求其放心乃為學根本田地既能如此向上須更做窮理功夫方見所存之心所具之理不是兩事隨感即應自然中節方是儒者事業不然却亦與釋子坐禪攝念無異矣所論内外賔主之辨意亦得之但語猶未瑩須知在内之日多即是為主在内之日少即是為客耳主式乃伊川先生所制初非朝廷立法固無官品之限萬一繼世無官亦難遽易但繼此不當作耳有官人自作主不妨牌子亦無定制竊意亦須似主之大小高下但不為判合陷中可也凡此皆是後賢義起之制今復以意斟酌如此若古禮則未有攷也大學或問之誤所疑甚當中間已修定矣今内去兩本幸收之偶歸故居監視社倉交米草草作此不暇他及正逺千萬進學自愛只如前所論用功久之自當有進盖已得其要領不易如此切已致思也答曽光祖熹行役已涉建昌之境垂老復出非力所堪深以愧歎耳所示為學之意甚善此事元無窮盡不可計功程但當鞠躬盡力看到甚地位耳答曽光祖所詢喪祭之禮程張二先生所論自不同論正禮則當從横渠論人情則伊川之説亦權宜之不能已者但家間頃年居喪於四時正祭則不敢舉而俗節薦享則以墨衰行之盖正祭三獻受胙非居喪所可行而俗節則唯普同一獻不讀祝不受胙也如此則於逺祖不必别議稱呼矣遷主禮經所説不一亦無端的儀制竊意恐當以大祥前一日祭當遷之主告而遷之然後次日撤几筵奉新主入廟似亦稍合人情幸更詳之此事尚逺可徐議之也答曾光祖横渠曰仲尼絶四意有思也夫子嘗言學而不思則㒺又言君子有九思今横渠之言與此相反絶四是聖人事不思不勉者也學者則思不可無但不可有私意耳伊川易傳序曰至微者理也至著者象也體用一源顯微無間觀㑹通以行典禮則辭無所不備其曰象曰辭固皆理之所寓然其曰體用一源未知三者以何為體以何為用又所謂典禮者無非天叙天秩之自然不知於㑹通處如何而觀易中之辭何者備之上四句其説已見於太極圖解後統論中矣觀㑹通是就事上看理之所聚與其所當行處辭謂卦爻之辭横渠云始學之要當知三月不違與日月至焉内外賔主之辨某謂實有諸已乃能為仁雖仁有久近之不同然非有諸已不能也其所以三月日月者特主義理客氣消長分數之多寡耳非三月日月有内外賔主也所謂實有諸已乃能為仁不知實有是有何物為仁是為何事知得此意方可理㑹内外賔主之辨明道曰目畏尖物此事不得放過便與克下室中率置尖物須以理勝他尖必不刺人也何畏之有興宗未曉其説人有目畏尖物者明道先生教以室中率置尖物便見之熟而知尖之不刺人也則知畏者妄而不復畏矣便疑當作使觀之上九曰觀其生君子無咎象曰觀其生志未平也其生謂言行事為之見於外者既有所省便是未得安然無事答曾景建辱書文詞通暢筆力快健蔚然有先世遺法三復令人亹亹不倦所論讀書求道之意亦為不失其正所詆近世空無簡便之弊又皆中其要害亦非常人見識所能到也然文字之設要以達吾之意而已政使極其髙妙而於理無得焉則亦何所益於吾身而何所用於斯世鄉来前輩盖其天資超異偶自能之未必専以是為務也故公家舎人公謂王荆公曰文字不必造語及摹擬前人孟韓文雖髙不必似之也况又聖賢道統正傳見於經傳者初無一言之及此乎至於讀書則固吾事之不可已者然觀古今聖賢立言垂訓亦未始不以孝弟忠信收歛身心為先務然後即吾日用之間參以往訓之指反覆推窮以求其理之所在使吾方寸之間虚明洞徹無毫髪之不盡然後意誠心正身修而推以治人無往而不得其正者若但泛然博觀而槩論以為如是而無非學如是而無非道則吾恐其無所歸宿不得受用而反為彼之指本心講端緒者所笑矣鄙見如此幸試思之有所未安復以見告甚幸甚幸録示先大父司直公所記龜山先生語前此所未見然以其他語推之知其誠出於龜山無疑也所示佳篇句法髙簡亦非世俗所及然憤世太過恐非遜言之道千萬謹之尤所願望答曾景建便中辱書備知向来徧參反求始末而又深以主一窮理得所歸宿為喜也比日秋清計所履益佳勝從事於斯亦當益有味矣然二事知之甚易而為之實難為之甚易而守之為尤難主一之功固須常切提撕不令間斷窮理之事又在細心耐煩將聖賢遺書從頭循序就平實明白處玩味不須貪多但要詳熟自然見得意緒若騖於髙逺渉獵領解則又不免如向来之清話欲求休歇而反成躁亂也示及與柴君書甚善不知渠以為如何今人亦未説到此異端之蔽自是已分上差却入路欠却功夫其迷溺者固無足道其慨然以攘斥為已任者又未免有外貪内虚之患亦徒為譊譊而已若之何而能喻諸人哉幸更思之若於已分上真實下得切已功夫則於此等亦有所不暇矣答曽景建所示詩文疑問其間頗有曲折俟黄兄歸奉報熹以臺評蒙恩鐫免尚為輕典感幸深矣而所連及反罹重坐令人愧惕今因其行草草附此恐其在塗有合料理事得為垂念幸甚其人辨博多所該綜亦可欵扣也答曾景建前此辱書蔡季通行曾附數字奉報矣所論主一之功甚善但讀書須更量力少看而熟復之只依文義㝷箇明白處去自然有味不在極力苦思轉求轉逺也先徳所抄龜山語以他書攷之不妄然却不及向来所記雜説數條必是又有李蕭逺所定也所問兩條三省事鄙意正如此後段之云亦可謂怪論矣今既知其繆便直置之不須與辨且自理㑹已分功夫可也科舉之學在賢者為餘事但公家自有文章大宗師何故不學而學他人不好處一向如此不惟議論不正當併與文章亦成澆薄無餘味矣爾雅未暇細看然此等亦未須閑費日力也答曾景建季通逺役深荷煖熱之意今想已到地頭矣其所論律歴尤精詣恨與賢者相聚不久未極其底藴也三篇甚勝卒章尤工而僕不足以當之也爾雅竟未暇細攷但釋親篇恐非如所刋定也禮書已畧定但惜無人録得亦有在黄直卿處者聞吉父在彼必能傳其梗槩然此間後来又有續修處及更欲附以釋文正義卒未得便斷手耳乾坤性情之説以三隅反之何疑之有性情本是一物特以動靜而異其名耳答曾景建别紙七條第一論勿動勿思者動可以該思而思不可以該動故聖言如此非有先後淺深之序也但立語用功自是合如此耳第二論曽㸃言志以為便欲進取揖遜泰和氣象殊非本意彼亦但自言其日間受用處而自他人觀之則見其或出或處無所不可雖堯舜事業亦優為之非専指揖遜而言也第三論問答衛君一條以為有所畏避亦非是此只是禮合如此耳此等處相似而不同只差毫釐便有公私之異不可不察也第四論吕氏恍惚之説未有大病不須如此迴避且認取正意可也上章亦然第五責原壤三語須作一句看若只老而不死則聖賢固有壽考者豈可以其竊天地之機而謂之賊耶第六射宿亦不必如此説第七按史記之言如此必有所据非馬遷自造之語也盖今闗雎三章皆是闗雎之亂其前必有散聲序引之類有聲無詞而此其卒章也若止第三章是亂則史之言不如此矣此七條者其首二義更宜思之第二條尤須體認不可草草其下五條則皆非所急又看得差了且須虚心認取聖賢立言教人用功之正意不可只如此容易立説也答曽景建參同舊本深荷錄示已令蔡伯静㸃對附刻新本之後矣但龍虎經却是取法參同亦有不曉其本語而妄為模放處如論乾坤二用周流六虚處可見疎脱試考之可見也近来不知所觀何書或有所見因風筆示若得乘此春暖與吉父相約俱来以踐前約豈勝幸甚征苖之説甚新但恐其他無此比數兼若如此則禹自當班師不待伯益贊之而後决矣此等無所攷據不若姑置之而涵泳於義理之實之為得也考異補遺答林徳久伊川曰心具天徳條内與諸先生議論不同下一本有盡心知性此是大學第一皆從心上用功下一本有如操舎存亡求放心之類答嚴時亨遷聖人之本意以就之也下有問云禮無大小未嘗不重於食色有時而重於禮食色重處是亦禮之重答云此章無它可疑熟讀本文自可見矣答曽光祖仲尼絶四意有思也下一本有竊意晦庵集卷六十一欽定四庫全書晦菴集巻六十二宋朱子撰書知舊門人問答答張元徳
