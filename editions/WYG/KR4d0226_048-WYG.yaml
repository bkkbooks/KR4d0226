seq: 48
front:
  text: 人問答
  hash: sha256:a51d6fa21e664a7491105e9fa47b3ef919eafcb657a133ffc5d2b2c2f39e1f6d
body:
  text: 答吕子約聞後來有來依講席者斆學之功交相為助政自不惡但所論經指頗覺支蔓如云維清一篇又周禮之所寓此等議論又支蔓之尤甚者只似時文如此即我將亦周禮之所寓矣太皥臯陶之祀一旦廢絶固足以見世衰道喪之徵然其未泯則於世道却未能大有所扶助如胡致堂兄弟極論闗雎專美后妃之不妒忌而以獨孤亡隋為證熹嘗論之以為妒忌之禍固足以破家滅國而不妒忌之美未足以建極興邦也此等處恐皆是道理太多隨語生解要須滌除令胸次虚明直截然後真箇道理方始流行不至似此支蔓勞攘徒為心害有損無益也詩説鄙意雖未必是然看子約議論如此自是無緣得契合更請打併了此一落索後看却須有㑹心處也答吕子約丁未七月三日示諭維清須句二義既是真實見得足以自信則亦何待他人之言但鄙意覺得此般偏旁寄搭議論無光明正大氣象終不甚喜聞故前此輒爾獻疑而今雖承誨諭之悉竟亦不能深曉也戰國時秦趙出伯益齊出舜楚出祝融魏出畢公燕出召公韓亦姬姓之國此獨非聖賢之後邪又有一事向讀元城譚錄論劉壮輿字畫處嘗疑其言之過以今觀之則似信而有徴者不審明者以為何如公謹之言不記云何來喻云云得無有尤人之意邪答吕子約九月十三日用功夫不可以老病而自懈覺得此心操存舍亡只在反掌之間鄉來誠是太涉支離盖無本以自立則事事皆病耳來喻拈出劉康公語甚善甚善但上面蹉却話頭恐亦是義理太多費了精神故向裏時少耳詩説久已成書無人冩得不能奉寄亦見子約專治小序而不讀詩故自度其説未易合而不寄耳謂變風止乎禮義其失甚明但若只以小序論之則未見其失耳讀古人書直是要虚著心大著肚髙著眼方有少分相應若左遮右攔前拖後拽隨語生解節上生枝則更讀萬卷書亦無用處也易書似己納去何為未見恐此誤記後便喻及却納去此亦是見近日説者多端都將自然底道理穿鑿壞了固不得己而出之耳聞子約敎學者讀禮甚善然此書無一綱領無下手處頃年欲作一功夫後覺精力向衰遂不敢下手近日潘恭叔討去整頓未知做得如何但禮文今日只憑注疏不過鄭氏一家之説此更合商量耳齋中見作如何理㑹必有一規模様轍因風幸示一二也又聞講授亦頗勤勞此恐或有未便今日正要清源正本以察事變之㡬微豈可一向汨溺於故紙堆中使精神昏弊失後忘前而可以謂之學乎答吕子約聞欲與二友俱來而復不果深以為恨年來覺得日前為學不得要領自做身主不起反為文字奪却精神不是小病每一念之惕然自懼且為朋友憂之而每得子約書輒復恍然尤不知所以為賢者謀也且如臨事遲囘瞻前顧後即此亦可見得心術影子當時若得相聚一番彼此極論庶㡬或有判決之助今又失此機㑹極令人悵恨也訓導後生若説得是當極有可自警省處不㑹減人氣力若只如此支離漫無統紀則雖不敎後生亦只見得展轉迷惑無出頭處也答吕子約示諭授學之意甚善但更須小作課程責其精熟乃為有益若只似日前大飡長啜貪多務速即不濟事耳洒掃應對乃小子之學今既失之於前矣然既壮長而專使用力於此則恐亦無味而難入須要有以使之内外本末兩進而不偏乃為佳耳向見説書旁推曲説蔓衍太多此是大病若是初學便遭如此纒繞即展轉迷闇無復超脱之期矣要當且令看得大意正當精約則其趣味自長不在如此支離多説也答吕子約十一月二十七日子合到此亦略能言彼中相聚曲折云子約頗訝熹書中語太峻不記是何事若只是説易處則來書又有權術及伯恭心迹未明等語殊不可曉竊恐今亦不須如此支蔓只且做一不知不㑹底人虚心看聖賢所説言語未要便將自家許多道理見識與之爭衡退步久之却須自有箇融㑹處盖自家道理見識未必不是只是覺得太多了却似都不容他古人開口不覺蹉過了他説底道理耳至如前人議論得失今亦何暇為渠分疏且捄取自家目今見處是要切事若舍却自己又捄那一頭則轉見多事不能得了矣前日借得荆公日錄閒看其論某人但能若古未能稽古此等説話想平日己知其失而笑之然不知其病所以至此者亦只是道理太多不得聖賢言語中下一兩箇閒慢字便著𦂳説出許多道理來楦塞得更轉動不得只此便是病根未論所説之邪正得失也所論易是聖人模寫隂陽造化此説甚善但恐於盡其言處未免多著道理説煞了耳此非面論未易究竟然向於啓蒙後載所述四言數章説得似已分明卒章尤切不知曾細看否幸試考之有所未安却望見敎也對班在何時今日極難説話而在疎逺為尤難不得且只收斂得人主心念不至大段走作是第一義其他道理非不可説只恐説得未必應急救病耳若此處不下功夫便要飜騰拆洗了安靜和平底家計做艱難辛苦底功夫恐尤不相當耳禮書已領但喪禮合在祭禮之前乃是只恐不欲改動本書卷帙則且如此亦不妨也但士庶人祭禮都無一字豈脱漏邪若其本無則亦太草草矣鄉人欲者甚多便欲送書坊鏤版以有此疑更俟一報幸早示及也恰寫至此忽報已有農簿之命此亦可喜但不知不蹉却對班否却恐釋奠祭噐等文字又因循也然舊同官有可語者得更叮囑之尤佳㡬道且得改秩亦是一事其弟在此亦佳台州又有一師䢼者在此亦儘知用力不易得也子欽恨未識面寄得禮圖來甚精未暇細考此却好一員禮官也但説易亦多瑣碎穿穴耳十弟事不知竟如何今日一箇風俗如此不知士大夫是何等見識也别紙數事皆切中其病如偏執濶疎貴氣之云尤是親切一種樂因循者已不足言其有作為之意又有此病豈天固不生材於今日邪前日因饒廷老去嘗寄聲痛箴之不知能聴受否奉常差彊人意但覺亦欠子細商量甚恨前此匆匆不能甚欵也其可喜處却是簡潔而不支蔓故力專而勢不分又沈靜而有思量故機圓而語有力若安排得在要地須儘可望也叔昌必己之官同父為况如何頗亦謀所以善後之計否因書幸痛箴之此却是箇改過遷善底時節㡬㑹所謂乃今可為者正謂此耳切告留念答吕子約示諭日用功夫如此甚善然亦且要見得一大頭腦分明便於操舍之間有用力處如實有一物把住放行在自家手裏不是謾説求其放心實却茫茫無把捉處也公而以人體之只是無私心而此理自然流行耳非是公後又將此意尋討他也答吕子約所示日用功夫大慰所望舊讀胡子知言答或人以放心求放心之問怪其覼縷散漫不切嘗代之下語云知其放而欲求之則不放矣嘗恨學者不領此意今觀來論庶㡬得之矣所論必有事焉鳶飛魚躍意亦甚當孔子只説箇先難後獲一句便是這話後來子思孟子程子為人之意轉切故其語轉險直説到活潑潑地處耳知得如此己是不易更且虚心寛意不要囘頭轉腦計較論量却向外面博觀衆理益自培殖則根本愈固而枝葉愈茂矣若只於此靜坐處尋討却恐不免正心助長之病或又失之則一蹴而墮於釋子之見矣亦可戒也讀書如論孟是直説日用眼前事文理無可疑先儒説得雖淺却别無穿鑿壞了處如詩易之類則為先儒穿鑿所壞使人不見當來立言本意此又是一種功夫直是要人虚心平氣本文之下打疊敎空蕩蕩地不要留一字先儒舊説莫問他是何人所説所尊所親所憎所惡一切莫問而唯本文本意是求則聖賢之指得矣若於此處先有私主便為所蔽而不得其正此夏蟲井蛙所以卒見笑於大方之家也且如向來主張史記時變之學以近日都人觀美出涕沱若之章觀之亦可見其流弊之所極矣此乃前人有醇徳而無虚心之弊反為所誘以墮一偏之見今日子弟欲發其所長而覆其所短正在專於自己分上公聴並觀打破前來窠臼乃可以發明前人本來心事之正而使學者戒其所偏此在子約比之他人又有此擔負尤不可以不勉也答吕子約誨諭工夫且要得見一箇大頭腦便於操舍間有用力處如實有一物把住放行在我手裏不是漫説收其放心某盖嘗深體之此箇大頭腦本非外面物事是我元初本有底其曰人生而静其曰喜怒哀樂之未發其曰寂然不動人汨汨地過了日月不曾存息不曾實見此體段如何㑹有用力處程子謂這箇義理仁者又看做仁了智者又看做智了百姓日用而不知此所以君子之道鮮此箇亦不少亦不剰只是人看他不見不大段信得此話及其言於勿忘勿助長間認取者認乎此也認得此則一動一静皆不昧矣惻隠羞惡辭讓是非四端之著也操存久則發見多忿􅓰憂患好樂恐懼不得其正也放舍甚則日滋長記得南軒先生謂驗厥操舍乃知出入乃是得主腦於操舍間有用力處之實話盖茍知主腦不放下雖是未能常常操存然語黙應酬間厯厯能自省驗雖非實有一物在我手裏然可欲者是我底物不可放失不可欲者非是我物不可留蔵雖謂之實有一物在我手裏亦可也若是謾説既無歸宿亦無依據縱使彊把捉得住亦止是襲取夫豈是我元有底邪愚見如此敢望指敎省驗一作有驗此段大槩甚正當親切操存久則發見多放舍甚則日滋長此二句甚好誨諭胡子知言舉或人以放心求心之問怪其覼縷散漫不切嘗代之下語云知其放而欲求之則不放矣某竊謂或者之問元不識心體所對雖欲使人察夫良心之苖裔致操存之功然説得驚惶不縝宻便是用功處未到恐方説時亦未免是放也自家所知固有廣狹淺深處然曾云省察則是我元初者非我元初者真妄客主亦豈不識箇體段模様操存稍熟則省察寖精省察寖精則操存愈固昨之所謂非放者今猶覺其為放昨之所謂相近者今猶覺其尚逺近看遺書説修辭立其誠乃是體當自家敬以直内義以方外之實事又説聖賢千言萬語只是欲人將已放之心約之使反復入身來自能尋向上去下學而上達此語方是不覼縷散漫自覺用力雖未能勇敏然實欲從事於斯也又嘗深自體驗固是知其放而求之期不放然其間㡬多艱難曲巧方其志不勝氣其為抑遏掩蔽心固知之如醉中知醉而未醒夢中知夢而未覺非澄治平帖亦未易遽存及其身心向裏有頓放處非不是我來為主然浮念忽起病根隠然又思乎此也方有端緒他思便來間之展轉牽引把捉不住近得一法於致思之時而思慮忽起若所當思也則便以筆識之不使之累吾心然亦難槩論盖適有所感當便尋繹則只得放下元初所思却致思乎此若非所當思也則當深省而消去之亦頗有效驗苐於主一功夫未至不能如程子所謂使他思時方思然且得隨力量如此存察更望指敎此意大槩亦好但太支蔓不直截不覺却將此心放了恐當一切掃去且將所代五峰一語早晚提撕令有箇要約處乃佳不然又似程子説温公為中所亂矣誨諭謂必有事焉鳶飛魚躍孔子只説箇先難後獲一句便是這話後來子思孟子程子為人之意轉切故其語轉險直說到活潑潑地某竊謂此箇義理固是自家元有底無少無剰初無差異然亦須實見到這裏不可少有鶻突聖賢設敎固不越於下學而上達然著書立言必有不容己者如鳶飛魚躍子思雖以上下察為言固己示諸人然非得伊洛諸君子再拈掇出來如何理㑹得是子思吃𦂳為人處其曰與必有事焉而勿正之意同既説得親切與我相應又曰㑹得活潑潑地不會得時只是弄精䰟則又恐人將此玩弄走作以為神通妙用却入私意却成助長却失了元初本有底其為害又不特入於語險而已大抵窮理工夫若不能認取則非我所及者皆為涉虚若能認取則一動一靜天理流行莫非無極之真也程子又云勿忘勿助只是養生之法不識怎養生此語極善盖識箇主腦則勿忘勿助而無害非勿忘勿助是本體於勿忘勿助之間認取本體也此全在學者於己分上實自體認方信得聖賢之言先儒之論都是將實得者説與人不是説分外事顧我之領略淺深何如耳敢望誨示此段看得亦未親切須知必有事焉只此一句便合見得天理流行活潑潑地方要於此著意尋討便窒礙了如説先難只此二字己見得為仁工夫然於此處才有計較便夾雜了故才説上句便説下句以急救之如方安頓一物在此又便即時除却是非敎人先安排此有事勿正之兩端而就其中以求之也誨諭謂只於靜坐處尋討却恐不免助長之病或又失之則一蹴而墮於釋氏之見某自顧渙散之久近稍收拾粗有靜養工夫然工夫淺薄客慮猶多雖未至便有此病然亦豈敢不常自警省也兼亦自覺未墮釋氏之見者盖釋氏是從空處求吾儒是自實處見喜怒哀樂之未發初非空無寂然不動本皆完具釋氏於此看得偏闕所以隨在生病又元者善之長底意思釋氏既不識元絶類離羣以寂滅為樂反指天地之心為幻妄將四端苖裔遏絶閉塞不容其流行若儒者則要於此發處認取也近看周子動而無動靜而無靜之語頗有所省夫動而無動則喚不有止静而無靜則喚不森然此雖非天下之至神不能與於此然一動一静之本體盖元如是因此静存動察既無交互亦不落空今所慮者非在於墮釋氏之見乃在於日用之間主敬守義工夫自不接續而已若於此能自力則敬義夾持此心少放自不到得生病痛也所見如此更願指誨此正如明道所説扶醉人語不溺於虚無空寂即淪於紛擾支離矣誨諭讀書如論語孟子是直説日用眼前事文理無可疑先儒説得雖淺却别無穿鑿壞了處如詩易之類則為先儒穿鑿所壞不見當來立言本意此又是一種功夫直是要人虚心平氣本文之下打疊教空蕩蕩地不要留先儒一字舊説莫問他是何人所説所尊所親所憎所惡一切莫問而唯本文本義是求則聖賢之指得矣某深惟訓誨真可謂直截指示雖非某所及未能言下即承然敢不黙會此意苐有所欲論辨當吐露者亦不敢不詳陳之某往者讀書有時自驗於㑹心處固有不待注釋訓説而見得明白然此心稍有蔽虧即便忘失且又閱理不熟大指精義弗能致察若非自生意見即便讀過不覺終歸之因循鶻突而已日來豈敢以為能讀稍能收拾身心有箇主腦義理之實漸漸相親玩索先覺所説時時有契于心反復讀之其于本文本義固能打疊到空蕩蕩田地然於用意深處漸能進其所知隨其文義亦各略見所説着落因此見得讀書之法固是要見得立言本意不要繳繞支離然須是自有工夫使義理來相浹洽方能與書相應若與書相應始能善思通其精微而意味無窮雖當讀時固不可先留舊説在胸中然虚心平氣待其自見有意要掃去他亦不得茍要掃去則又是我底意見亦未必是真實指義也如讀易只以程子易傳為主非不知象占為不可廢然文王夫子作彖象文言大傳所發明者却不在於象上直是要人得其辭以通其意其曰易變易也隨時變易以從道也其間吉凶消長之理進退存亡之道備於辭推詞考卦可以知變象與占在其中其曰至微者理至著者象體用一源顯微無間其曰乾坤為易知諸卦為難知今學者不求諸象占固有所闕然學有本末若未能玩索乎此而欲求之於象占則於程子備於詞在其中之意不能無失也又自孟子後易書非不以象占而傳然非所謂自秦而下其學不傳者果何所指邪雖所見如此然先生謂又是一種工夫則殊未詳更望指敎也大凡讀書湏是虚心以求本文之意為先若不得本文之意即見任意穿鑿如説㑹心處之類正是大病根本如易之詞乃是象占之詞若舍象占而曰有得於詞吾未見其有得也此皆過髙之弊所以不免勞動心氣若只虚心以玩本文自無勞心之害誨諭公而以人體之只是無私心而此理自然流行耳非是公後又将此意思尋討也某深味此語固是恐人添箇意思尋討然覺得下語自傷於快竊謂仁固難名以覺名仁而覺非仁也以愛名仁而愛則屬情也以公名仁特近仁耳亦難指公為仁也先生謂仁者愛之理别出性情最為明白然程子公而以人體之意則於公字上兼愛之理意思言之盖公雖近仁然又須實下工夫物物皆體若有扞格各不相貫屬便有未仁若只是説箇公字便此理自流行却欠却體仁工夫也又近看南軒先生復卦賛有云其在於人純是惻隠動匪以斯則非天命曰義禮智位雖不同揆厥所基脈絡流通及近來玉山所刻先生講説於程子所謂偏言之則一事專言之則包四者雖未能昭晰然却見得此意脈分明其曰偏言則本末次第不可以混言其曰專言則莫不始於此本於此而皆一貫也孟子論乍見孺子怵惕惻隠之心便説由是觀之無惻隠之心非仁無羞惡之心非義無辭讓之心非禮無是非之心非智其只舉惻隠一端發見處示人餘三端更不一一拈出夫豈有所略哉盖此乃良心苖裔發見最先處乃天地之心萬物之元必自此而後流行不息亨而利貞則是章雖曰偏言而所謂專言之者亦不離此矣仁是本來固有之理不因公而有特因公而存爾如溝渠窒塞故水不通流去其窒塞則水流矣水固不因去塞而有然亦非既去其塞而又别有一段工夫使水流通也以此推之所論之得失自見矣又論偏言專言處語意未瑩使人難曉答吕子約代語之喻甚善妄為此語今已是十餘年每以告人無領略者今乃得子約書知其為切要之語始有分付處也但前日張富歸所惠書所論或問中語却似未安請且自反於心分别未發已發界分令分明却將冊子上所説來合看還是如此否自心下看得未明便将衆説囘互恐轉生迷惑斷置不下也且如子約平生還曾有耳無聞目無見時節否便是祭祀若耳無聞目無見即其升降饋奠皆不能知其時節之所宜雖有贊引之人亦不聞其告語之聲矣故前旒黈纊之説亦只是説欲其專一於此而不雜他事之意非謂奉祭祀時都無聞見也所謂王乃在中尤無交涉讀書最忌如此支蔓况又平居無事之時乎故程子云若無事時耳須聞目須見既云耳須聞目須見則與前項所答已不同矣又安得曲為之説而强使為一義乎至静之時但有能知能覺者而無所知所覺之事此於易卦為純坤不為無陽之象若論復卦則須以有所知覺者當之不得合為一説矣故康節亦云一陽初動處萬物未生時此至微至妙處須虚心静慮方始見得若懷一㸃偏主彊説意思即方寸之中先自擾擾矣何緣能察得彼之同異邪答吕子約所示四條其前二義雖有小差然猶不至難辨各己略報去矣至於未發浩氣二義則皆雜亂膠轕不可爬梳恐非一朝之辨所能決本欲置而不論以俟賢者之自悟又恐安于舊説未肯致疑不免略啓其端千萬虚心垂聴不可一向支蔓固執只要彌縫前人闕誤不知却礙自家端的見處也盖今所論雖累數百言之多然於中庸但欲守程門問者之説謂未發時耳無聞目無見而已於浩氣之説但欲謂此氣元是配合道義而成無道義則氣為之餒而已其他援引之失皆緣此文以生異義自為繁冗若一一究析往復不已則其説愈繁其義愈汨而未必有益故今奉勸不若只取子思孟子之言虚心平看且勿遽增他説只以訓詁字義隨句略解然後反求諸心以驗其本體之實為如何則其是非可以立判若更疑著則請復詳論之夫未發已發子思之言已自明白程子數條引寂然感通者皆與子思本指符合更相發明但答吕與叔之問偶有凡言心者皆指已發一言之失而隨即自謂未當亦無可疑至遺書中纔思即是已發一句則又能發明子思言外之意盖言不待喜怒哀樂之發但有所思即為已發此意已極精微説到未發界至十分盡頭不復可以有加矣問者不能言下領略切己思惟只管要説向前去遂有無聞無見之問據此所問之不切與程子平日接人之嚴當時正合不答不知何故却引惹他致他如此記錄前後差舛都無理㑹後來讀者若未敢便以為非亦且合存而不論今却拘守其説字字推詳以為定論不信程子手書此固未當之言而寧信他人所記自相矛盾之説彊以已發之名侵過未發之實使人有生已後未死已前更無一息未發時節惟有爛熟睡著可為未發而又不可以立天下之大本此其謬誤又不難曉故或問中粗發其端今既不信而復有此紛紛之論則請更以心思耳聞目見三事較之以見其地位時節之不同盖心之有知與耳之有聞目之有見為一等時節雖未發而未嘗無心之有思乃與耳之有聴目之有視為一等時節一有此則不得為未發故程子以有思為已發則可而記者以無見無聞為未發則不可若苦未信則請更以程子之言證之如稱許渤持敬而注其下云曷嘗有如此聖人又每力詆坐禪入定之非此言皆何謂邪若必以未發之時無所見聞則又安可譏許渤而非入定哉此未發已發之辨也若氣配道義則孟子之意不過曰此氣能配道義若無此氣則其體有不充而餒然耳此其賔主向背條理分合略無可疑但粗通文理之人無先入偏滯之説以亂其胸次則虚心平氣而讀之無不曉㑹若反諸身而驗之則氣主乎身者也道義主乎心者也氣形而下者也道義形而上者也雖其分之不同然非謂氣在身中而道義在皮外也又何嫌於以此配彼而為﨑嶇詰曲以為之説曰道義本存乎血氣但無道義則此氣便餒而止為血氣之私故必配義與道然後能浩然而無餒乎語勢不順添字太多不知有何慿據見得如此若果如此則孟子於此當别有穏字以盡此意之曲折不當下一配字以離二者合之之本形而又以氣為主以倒二者賔客之常勢也且其上既言其為氣也以發語而其下復言無是餒也以承之則所謂是者固指此氣而言若無此氣則體有不充而餒然矣若如來喻以是為指道義而言若無此道義即氣為之餒則孟子於此亦當别下數語以盡此意之曲折又不當如此倒其文而反其義以疑後之讀者如今之云也且若如此則其上本未須説以直養而無害其下亦不須更説是集義所生矣今乃連排三句只是一意都無向背彼此之勢則已甚重複而太繁冗矣而其中間一句又如此其暗昧而不分明如此其散緩而無筋骨依以誦説使人迷悶如口含膠漆不可吞吐竊意孟子胸中明快洒落其發於言語者必不至於如此之猥釀而紕繆也又况來喻已指無是而餒者為浩氣於前矣其後又謂無道義則氣為之餒而但為血氣之私不亦自相矛盾之甚邪若程子之言則如以金為器積土為山之喻皆有不能使人無疑者來喻雖亦不敢據以為説然其所慮恐為二物者亦程子之常言今又不察其施安之所當而冐取以置於此也其他分别血氣浩氣小體大體皆非孟子正意而妄為離合却自墮於二物之嫌原其所以只因配義與道一句不肯依文解義著實平説故須從頭便作如此手勢翻弄乃可以迤邐遷就委曲附㑹而求其通耳孟子言無暴其氣而釋之曰氣體之充又言其為氣也而指之曰無是餒也是數語者首尾相應表裏相發其所指者正一物耳今必以無暴者為血氣而其為氣者為浩然而又恐犯二物之戒故又為之説曰浩氣不離乎血氣徒為紛擾增添冗長皆非孟子之本意也今亦不暇悉數以陷於來喻之覆轍然只如此説已覺不勝其冗矣幸深思之且以自己分上明理致知為急不須汲汲以救䕶前輩為事葢其言之得失白黑判然已不可揜救之無及又况自家身心義理不曾分明正如方在水中未能自拔又何暇救他人之溺乎但所云未發不可比純坤而當為太極此却不是小失不敢隨例放過且試奉扣若以未發為太極則已發為無極邪若謂純坤不得為未發則宜以何卦為未發邪竊恐更宜靜坐放敎心胸虚明淨潔却将太極圖及十二卦畫安排頓放令有去著方可下語此張子所謂濯去舊見以來新意者也如決不以為然則熹不免為失言者不若權行倚閣之為愈不能如此紛挐彊聒徒費心力有損而無益也答吕子約張元德訓道為行固為疎濶子約非之是也然其所説行字亦不為全無來厯今不就此與之剖析而别引程子沖漠氣象者以告之故覺得有墮於窈冥恍惚之病程子所説乃因對義而言故自有歸著而不為病而所以破其説者又似彼東我西不相領略此乃吾之所見自未透徹未免臆度籠罩而强言之所以支離浮汎而不能有所發明也若如鄙意則道之得名只是事物當然之理元德直以訓行則固不可當時若但以當行之路答之則因彼之説發吾之意而沖漠之云亦自通貫矣今且以來示所引一隂一陽君臣父子形而上下沖漠氣象等説合而析之則隂陽也君臣父子也皆事物也人之所行也形而下者也萬象紛羅者也是數者各有當然之理即所謂道也當行之路也形而上者也沖漠之無朕者也若以形而上者言之則沖漠者固為體而其發於事物之間者為之用若以形而下者言之則事物又為體而其理之發見者為之用不可槩謂形而上者為道之體天下達道五為道之用也元德所云道不能以自行以下自無病而答語却説開了其説自是好語但答他不着爾今更為下一語云形而上者謂之道物之理也形而下者謂之器物之物也且試屏去他説而只以此二句推之若果見得分明則其他説亦自通貫而無所遺也答吕子約所以不以元德以道訓行為然者盖以道為行則道非行字所能盡又須以所以行者言之則毋乃欲一而反二乎故以程子道有沖漠氣象告之欲渠深探夫峻極之體而黙識夫無聲無臭之妙則自知非行之一字所能盡若謂當行之路則恐秪可言達道耳於論道之原則恐難如此著語也形而下即形而上者易傳謂至微者理即所謂形而上者也至著者象即所謂形而下者也體用一源顯微無間則雖形而上形而下亦只是此箇義理也元德所説之病前書盡之如來喻之云却攻他不著恐是只見自家底是於鄙論却未深考也謂當行之理為達道而沖漠無朕為道之本原此直是不成説話不謂子約見處乃只如此亦無怪他説之未契也須看得只此當然之理沖漠無朕非此理之外别有一物沖漠無朕也至於形而上下却有分别須分得此是體彼是用方説得一源分得此是象彼是理方説得無間若只是一物却不須更説一源無間也元德訓道為行便似來義訓學為義理之藴一般一則以所能為能一則以能為所能也佛書有能與所能之説能謂人所做作所能謂人所做作底事其分别文義亦甚宻如道即所能之謂學即所謂能也如今小兒屬對看花折栁㸔與折字是能花與栁是所能此不可亂也此等倫類尚不能通是乃心意大段麄在豈能及其深微之奥邪答吕子約下論語雜論同所謂五帝紀所取多古文尚書及大戴禮為主為知所考信者然伏羲神農見易大傳乃孔子之言而八卦列於六經為萬世文字之祖不知史遷何故乃獨遺而不錄遂使史記一書如人有身而無首此尚為知所考信者邪太史公之洋洋美德即蘇黄門之騶虞竊脂觀其下文全書不知還撐柱得此數句起否學者於聖人之道徒習聞其外之文而不考其中之實者往往類此王介父所以惑主聴而誤蒼生亦只是此等語耳豈可以此便為極摯之談而躋之聖賢之列屬以斯道之傳哉以此等議論為極至便是自家見得聖賢道理未曾分明被他嚇倒也以史遷能貶卜式與桑羊為伍又能不與管仲李克為深知功利之為害不知六國表所謂世異變成功大議卑易行不必上古貨殖傳譏長貧賤而好語仁義為可羞者又何謂邪伯夷傳辨許由事固善然其論伯夷之心正與求仁得仁者相反其視蘇氏之古史孰為能考信于孔子之言邪謂遷言公孫𢎞以儒顯為譏𢎞之不足為儒不知果有此意否彼固謂儒者博而寡要勞而少功是以其事難盡從然則彼所謂儒者其意果何如耶所示數條不暇悉辨若以馬遷與班固並論則固不無優劣而其書數十萬言亦豈無好處但論其大旨則蘇氏兩語恐史遷復生不能自解免也今乃諱其所短暴其所長以為無一不合聖人之意推尊崇奨至與六經比隆聞有議其失者則浡然見於詞色奮拳攘臂欲起而扔之一何所見之低矮耶此事不唯見偏識淺去取差謬為明眼人所笑亦至犯子惡苗碩之戒大為心術之害不可不知論語一本復下無有字外下無則字學之為言盖指義理之藴至于感孚而復有講習相滋之説自夫始學而所願者外則其本已虧矣謝氏坐如尸坐時習立如齋立時習觀聖人立言之旨有不在于彼者尹氏學在已知不知在人微有立我之病以義理之藴訓學字恐非字義不成文理後不重章更有説感孚之説與所願者外意似相反且程子於朋來之樂何故不如此説恐更當細思之尹氏説未見立我之病此章是説初學入道之門未須大段説得𤣥妙也鮮則和順積諸中者未厚所積者既厚其於逆理亂常之事可以保其必無也犯上之過小作亂之罪大故其言之序如此非謂未厚已厚而然也務本道生是泛言以起下句之實集註之説宜更詳之巧言令色鮮矣仁此章論明善之功此章只是戒人勿為巧言令色如何便説得明善之功有所未習其傳或差如師之過商之不及不能不生流弊唯傳而習習而傳然後為得其正傳傳不習乎文勢恐不如此曾子之學其傳不差乃是合下見得通透的確非習之功也若所見不是而徒習之愈增其誤耳讀書窮理須認正意切忌如此緣文生意附㑹穿穴只好做時文不是講學也敬以事言而信則無不盡也信是與民有信期㑹賞罰不欺其民淺言之則魏文侯之期獵商君之徙木亦其類也不須如此髙説失聖言之本意行有餘力而後學文夫豈以講切為可緩哉書固不可不讀但比之行實差緩耳不然則又何必言行有餘力而後學邪究義理之藴言學者不可不究夫義理之藴也因此語為子夏之言而遂致疑于其間以子夏之言為不如孔子亦未為貶不必如此囘䕶但當虚心觀理而隨宜斟酌耳義理之藴上著一究字比首章稍成文理然首章之義實當兼踐履而言故謝説亦不可廢若如此説却只説得窮理一邊也由乎中而應乎外制乎外所以養其中由乎中而應乎外是推本視聴言動四者皆是由中而出泛言其理之如此耳非謂從裏面做功夫出來也制乎外所以養其中方是説做功夫處全是自外而内自葉流根之意非謂内外交相養與此章之文本不相戾不須如此分疎也如視聴二箴云心兮本虚秉彜天性亦皆是推本而言若其功夫則全在制之於外閑邪勿聴處可更詳之向見叔昌之弟摹刻尹和靜所書四箴作由乎中所以應乎外嘗辨其謬後見尹書他本却皆不錯然既有此誤則尹公想亦未免錯㑹其師之意也答吕子約戒懼於不睹不聞者乃謹獨之目而謹獨者乃戒懼於不睹不聞之總名似未可分為二事也今曰道固無適而不在而其要切之處尤在於隠微雖無所不謹而所謹者尤在於獨固欲學者用功轉加切近云云若末章潛雖伏矣不愧屋漏分為兩節雖可以各相附屬然前一節謂人所不見則屬乎人後一節謂已之所有則猶有迹比之已之不睹不聞則又有間矣今以人之所不見為謹獨意雖切而反輕以不愧屋漏為不睹不聞則又㡬於躐等來示所疑中庸首章數句文義亦通比之章句之説尤省力而有味但以上文考之既言道不可須臾離即是無精粗隠顯之間皆不可離故言戒謹乎不睹不聞以該之若曰自其思慮未起之時早已戒謹非謂不戒謹乎所睹所聞而只戒謹乎不睹不聞也此兩句是結抹上文不可須臾離一節意思了下文又提起説無不戒謹之中隠微之間念慮之萌尤不可忽故又欲於其獨而謹之又别是結抹上文隠微兩句意思也若如來説則既言不可須臾離而當戒謹矣下句却不更端而偏言唯隠微為顯見而不可不謹其獨則是所睹所聞不隠不微之處皆可忽而不謹如此牽連即將上句亦説偏了只這些子意思恐於理有碍且於文勢亦似重複而繁冗耳所謂固欲學者用功轉加謹宻熹之本意却不如此盖無所不戒謹者通乎已發未發而言而謹其獨則專為已發而設耳卒章所引潛雖伏矣猶是有此一物藏在隠微之中不愧屋漏則表裏洞然更無纎芥查滓矣盖首章本静以之動卒章自淺以及深也且所不見非獨而何不動而敬不言而信非戒謹乎其所不睹不聞而何若首章不分别即此等處皆散漫而無統矣答吕子約不睹不聞既即是隠微之間念慮之萌則所謂莫見乎隠莫顯乎微者盖非别有一段工夫在戒懼不睹不聞之後明矣只為道不可須臾離與莫見乎隠莫顯乎微不同戒謹不睹恐懼不聞與謹獨不同所以文意各别今却硬説做一事所以一向錯了也既以不睹不聞為已所不知若能於此致謹則所謂隠微之間念慮之萌固已不能不謹若果如此則上段文意已足不知何故又須再説必謹其獨邪曷嘗有如此煩絮底聖賢不愧屋漏亦未免於微有迹也謂之表裏洞然更無查滓則恐㡬於陵節矣若猶有迹便是未能無愧於屋漏矣此叚説得愈更支離若只管如此纒繞固執則只已見便為至當之論亦不須更講論矣前書寫去已極分明只是不曾子細看先横著一箇人我之見在胸中於已説則只尋是處雖有不是亦瞞過了於人説則只尋不是處吹毛求疵多方駁難如此則只長得私見豈有長進之理此亦便是論司馬遷底心也今更不能再説得只請將舊本再看將此兩節虚心體認只求其分勿求其合認來認去直到認得成兩段了方是到頭如其未然更不須再見喻也來敎又謂心之有思與耳之有聞目之有見為一等時節所圈出思字初看即疑恐當作知字而尋舊本未見不知當時的是何字又恐或是筆誤方欲再請舊本來看子細剖析奉報偶復尋得舊本果是知字不知來喻何故如此錯誤豈舊本脱漏此一節邪如其不然則此等處尚爾疎略又安能得其精微之意邪元本兩行今再錄去可更詳之舊本云心之有知與耳之有聞目之有見為一等時節雖未發而未嘗無心之有思乃與耳之有聴目之有視為一等時節云云再看來書他處所説已有知字即是舊本元無脱漏是直看得潦草将知字思字作一様看耳前書無聞無見之説只做未有聞未有見平看過若看得過重以為無所聞無所見則誠近於異端矣未有聞見與無所聞見平看重看不知如何分别更請子細説謂未有聞未有見為未發所謂沖漠無朕萬象森然已具不知衆人果能有此時乎學者致知居敬之功積累涵養而庶㡬有此爾子思只説喜怒哀樂今却轉向見聞上去所以説得愈多愈見支離紛冗都無交涉此乃程門請問記錄者之罪而後人亦不善讀也不若放下只白直看子思説底須知上四句分别中和不是説聖人事只是汎説道理名色地頭如此下面説致中和方是説做功夫處而唯聖人為能盡之若必以未有見聞為未發處則只是一種神識昏昧底人睡未足時被人驚覺頃刻之間不識四到時節有此氣象聖賢之心湛然淵靜聰明洞徹決不如此若必如此則洪範五事當云貌曰僵言曰啞視曰盲聴曰聾思曰塞乃為得其性而致知居敬費盡工夫却只養得成一枚癡獃罔兩漢矣千不是萬不是痛切奉告莫作此等見解若信不及一任狐疑今後更不能説得也詳看此段來意更有一大病根乃是不曾識得自家有見聞覺知而無喜怒哀樂時節試更著精彩看莫要只管等聞言語失却真的主宰也以未發為太極以未發為太極只此句便不是所以下文一向差却未發者太極之静已發者太極之動也須如此看得方無偏滯而兩儀四象八卦十二卦之説皆不相礙矣太極動而生陽動則為已發矣以動而生陽為已發是也即不知静而生隂為已發為未發邪前日所稟未嘗敢以已發為無太極也而又云已生兩儀四象八卦難以為未發未嘗以已發為無太極是也而又云已生兩儀四象八卦難以為未發何邪易之無思無為比未發猶是以心為言於性之體段已是猶欠拈出以無思無為為説心而不及性不知心性兩字是一物邪兩物邪來敎謂有此氣來配道義始能充其體而無餒若無此氣來配則雖有道義亦不能不餒矣孟子兩言其為氣也云云即當以氣字為主而以下文天地道義等字為客方是文意今却硬將文義紐轉以道義為主而氣為客又將熹説亦添入一來字則區區所見雖謬決不至如此之顛倒也前書之言已盡今更不能説得只請且依此意捩轉舊來話頭依孟子本文主客形勢排齪敎成行道有歸著直候將來見得舊説全然不是方是究竟如其不然不若忘言之為愈也答吕子約所喻前論未契今且當以涵養本原勉强實履為事此又錯了也此是見識大不分明須痛下功夫鑽研勘覈敎透徹了方是了當自此以後方有下手涵養踐履處如横渠先生所見只是小小未瑩伊川先生猶令其且涵泳義理不只説完養思慮了便休也如今乃是大段差舛却不汲汲向此究竟而去别處閒坐道我涵養本原勉强實履又聞手寫六經亦是無事費日都不是長進底道理要須勇猛捐棄舊習以求新功不可一向如此悠悠閒過嵗月也本欲俟德華人囘附書今日偶有南豐便至道夫處且先附此奉報此事不比尋常不可頃刻失其路脈也大抵學問只有兩途致知力行而已在人須是先依次第十分著力節次見效了向後又看甚處欠闕即便於此更加功夫乃是正理今却不肯如此見人説著自家見處未是却不肯服便云且待我涵養本原勉强實履此如小兒迷藏之戲你東邊來我即西邊去閃你西邊來我又東邊去避如此出没何時是了邪區區本已不能説得今更説此一番若更不相領略便且付之忘言矣如人上山各自努力到此時節豈更有心情管得他人邪答吕子約兩書所喻備見日來進學新功甚慰牢落兩卷悉已條對納呈幸更詳之也大抵為學只是博文約禮兩端而已博文之事則講論思索要極精詳然後見得道理巨細精粗無所不盡不可容易草略放過約禮之事則但知得合要如此用功即便著實如此下手更莫思前算後計較商量所以程子論中庸未發處答問之際初甚詳宻而其究意只就敬之一字都收拾了其所謂敬又無其他𤣥妙竒特止是敎人每事習箇專一而已都無許多閒話説也今詳來喻於當博處既不能虚心觀理以求實是如論易詩處是也於當約處乃以引證推説之多反致紛擾如論求其放心而援引論説數十百言不能得了只此便是放其心而不知求矣凡此之類皆於鄙意深所未安竊謂莫若於此兩塗各致其極無事則專一嚴整以求自己之放心讀書則虚心玩理以求聖賢之本意不須如此周遮勞攘枉費心力損氣生病而實無益於得也横渠謂心寜靜於此一向定疊目前縱有何事亦不恤也休將閒細碎在思慮近雖見此漸明然養得未熟有時不好底意思上心來則此見便若有物昏蔽雖目前小小事亦能來相碍因是知得尚未屬已此理固然然亦須是真實知至物格方得自然如此若但説時快活間或又不如此則只是想像摶量不足恃也子在川上云云觀諸天地古今事變莫非逝者然故故新新相因不已以何為始以何為終故周子發明太極之藴則曰太極本無極云云聖人之心純亦不已此乃天德有天德便可語王道其要只在謹獨終歸於謹獨者莫見乎隠莫顯乎微不於獨而致謹則天命流行遏於躬而不知矣理固如此然援引太多反汨没了正意兼所引亦有不相似者如周子無極之語純亦不已只是無間㫁於獨而不謹焉則有間㫁而與天地不相似矣太極動而生陽以本體言之即易所謂繼之者善也以氣運言之即易所謂復其見天地之心也以卦言之即震之一索咸之男下下字疑也然易傳謂動則終而復始所以恒而不窮雖物有終始而此理無窮則雖動極而靜靜極復動也云云學者固當兼致靜存動察之功然於動之端而有見乎天地之心斯能窺乎太極之藴矣其曰元亨誠之通利貞誠之復其曰利貞者乾之性情盖以夫人徒見生意之發於春夏而不知夫蔵于根荄也觀諸草木搖落之時生意若息矣而根荄膏潤苞芽潛萌是乃終而復始盖性情然也有以明乾之性情則知太極之性情矣有以見天地之心則知太極之動而生陽矣此段尤多可疑請且就通書太極體認令此數項厯落分明未要添入復卦震咸性情等説夾雜得都不明不濟事也震咸尤無干涉性情之義亦非是須各自看乃佳程子暌卦傳曰物雖異而理本同故天下之大羣生之衆暌散萬殊而聖人為能同之某觀至此於不有兩則無一之義稍分明但所謂理本同者程子之説雖詳終未能實見其理天施地生男倡女隨此感彼應盖不能以相無也非理之本同何以如此其為氣也云云某竊詳此段所言其為氣也非有異義上言此氣之浩然體段本如是養之之法勿忘勿助則無所耗傷而此氣流行充塞無所抑遏盖不待自反而縮也故直之一字當因大剛而為三徳若坤之直方即浩然之剛直其可虧欠乎下言此氣合義與道而成而血氣循乎軌轍到此則血氣便是道義矣非是養氣之後又待此而為助也所以再言其為氣也配義與道盖深明夫此氣之發見本是道義若識得此氣之本然則知所養而其動非血氣矣其曰無是餒也欲人知夫此身之所以為主者茍或虧失則便枵然矣愚見如此不敢不竭言之自反而縮是本章上文坤爻直方是他書異義二者孰為親疎試請思之得失可見氣是形而下者道義是形而上者如何合得况配義與道分明是將此氣配彼道義而為之助豈是養氣之後又將此而為助也如此看得全然不識文義更宜深思未易遽立説也此是胸中先有舊説為所牽制不得虚平故爾滯礙枉費心力可且将舊説權行倚閣而只将本文反復玩味久久自然漸虚漸平則於此無疑矣朝聞道夕死可矣近看得程子所謂除了身只是理之説於此最親切盖私乎此身則莫知主乎此身者為何如其生其死真有同於醉夢矣云云故大程子謂動容周旋中禮者盛徳之至君子行法以俟命而已朝聞道夕死可矣之意小程子既謂死得是又謂茍有此志則不肯一日安於所不安何止一日須臾不能皆是發明除了身只是理底意思詳觀遺書亦載大程子有云皆實理也人知而信者為難死生亦大矣非誠知道豈以夕死為可乎則雖槩言之而日月寒暑屈伸往來之常理同乎晝夜死生者皆可致察小程子有云聞道者知所以為人也夕死可矣是不虚生也則又指切言之以明實理所存是亦除了身只是理之意至於小程子經解乃親筆也則止云人不可以不知道茍得聞道雖死可也雖不加一辭而語意則甚不輕矣今集注本大程子實理之説而以事物當然之理名之固不使人求之恍惚然果足以究斯義乎又大程子非誠知道之言以尹氏所説考之固為切實然恐所謂得者或流於偏差而未必得其總腦也某據所曉者吐露以求誨剖道字理字禮字法字實理字日月寒暑往來屈伸之常理事物當然之理此數説不知是同是别除了身只是理只是不以血氣形骸為主而一循此理耳非謂身外别有一物而謂之理也流于偏差則非所謂得矣一隂一陽之謂道天地絪緼也繼之者善物與无妄也成之者性各正性命也各正性命則屬乎氣稟矣遺書言凡人説性只是説繼之者善也孟子言人性善是也又若先言氣稟而後及此周子以萬物資始為善各正性命為性此是就造化處説今欲以物與无妄言之則此句屬性而以上句天下雷行為善方始相對得過程子所云今人説性只是説繼之者善此又是近下就人性分上説語各有當更請詳之只看本文都不得引外來一字方始見得向觀遺書所載人生而靜以上不容説才説性時便已不是性也凡人説性只是説繼之者善也孟子言人性善是也茫然不曉所謂今始粗曉此文義人生而静天之性也周子所謂主靜者以此也然所謂不容説者是豈終不可得而説乎周子不得已而言之曰無極而太極則指不容説者以喻諸人耳所謂才説性時便已不是性此却因上文而言之或指太極為性則非矣盖天命之謂性命之於人始謂之性也所謂凡人説性只是説繼之者善此説得性善最為親切若秪論成而不論繼則有二本非性之果善也故孟子道性善既因其繼而得其本源其言惻隠仁之端羞惡義之端則又因其發見之苖裔而知其為固有學者於此唯有操存之功不舍使漸著察耳此條尤覺紊亂更請且以前段之説識認文義令有條理未可如此引援衮雜轉見不分明也所謂治絲而棼之也答吕子約所喻博文約禮盡由操存中出固是如此但博文自是一事若只務操存而坐待其中生出博文功夫恐無是理大抵學問功夫看得規模定後只一向著力挨向前去莫問如何若何便是先難後獲之意若方討得一箇頭緒不曾做得半月十日又却計較以為未有效驗遂欲别作調度則恐一生只得如此移東換西終是不成家計也益公近亦收書于歐集考訂益精亦不易老來有許多心力也需中庸詩傳此便未可寄又恐且要操存無暇看讀更俟後便也蘇黄門初不學佛只因在筠州陷入此漩渦中恐是彼中風土不好一生出不得今請著些精彩莫只管囘頭轉腦忽然不知不覺也旋入去即不相奈何也風色愈勁精舍諸生方幸各散去今日輔漢卿忽來甚不易渠能自拔向在臨安相聚見伯恭舊徒無及之者説話儘有頭緒好商量非徳章諸人之比也答吕子約前書所論四事不審雅意云何竊意賢者用力於此不為不久其切問近思之意不為不篤而比觀所講與累書自叙説處覺得瞻前顧後頭緒太多所以胸次為此等叢雜壅塞纒繞不能得明快直截反不得如新學後生聞一言且守一言解一義且守一義雖未能便有所得亦且免得如此支離紛擾狼狽道途日暮程遙無所歸宿也晦庵集卷四十八欽定四庫全書晦庵集卷四十九宋朱子撰書問答門一本作知舊人問答
