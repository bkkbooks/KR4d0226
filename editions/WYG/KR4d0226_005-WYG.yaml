  text: 詩
  hash: sha256:dadaa127c07bba9daf4b1560ebaef106a81f2f12f57046b045d4e88ae4df3a68
body:
  text: 拜張魏公墓下衡山何巍巍湘流亦湯湯我公獨何徃劒履在此堂念昔中興初孽竪倒冠裳公時首建義自此扶三綱精忠貫宸極孤憤摩穹蒼元戎二十萬一旦先啓行西征奠梁益南轅撫江湘士心既豫附國威亦張皇縞素哭新宫哀聲連萬方黠虜聞褫魄經營久徬徨玉帛驟徃來士馬且伏藏公謀適不用拱手遷南荒白首復來歸髮短丹心長拳拳冀感格汲汲勤脩攘天命竟難諶人事亦靡常悠然謝台鼎騎龍白雲鄉坐令此空山名與日月彰千秋定軍壘岌嶪遥相望賤子來歳隂烈風振髙岡下馬九頓首撫膺淚淋浪山頺今㡬年志士日慘傷中原尚腥羶人類㡬豺狼公還浩無期嗣德煒有光恭惟宋社稷永永垂無疆敬簡堂分韻得月字煌煌定方中農隙孟冬月君侯敞齋扉華榜新未揭我來適兹時亦有大夫茇清觴不留行晤語得超越更看雷雨勢翻動龍蛇窟襟懐頓能輸肝膽亦已竭老仙來何方湖海氣硉矹君侯斂􅃑起顛越承屨襪坐人驚創見引去殊卒卒伊余不忍逝頓首願有謁人生均秉彜天造豈停歇云何利害判所較無一髮兹焉辨不早大本將恐蹷吾言實自箴君聽未宜忽登嶽麓赫曦堂聯句乾道丁亥冬九日泛舟長沙渚振䇿湘山岑晦翁烟雲眇變化宇宙窮髙深懐古壮士志憂時君子心敬夫寄言塵中客莽蒼誰能尋晦翁登定王臺寂寞番君後光華帝子來千年餘故國萬事只空臺日月東西見湖山表裏開從知爽鳩樂莫作雍門哀次敬夫登定王臺韻今朝風日好抱病起登臺山色愁無盡江波去不囘客懐元老草節物又疎梅且莫催歸騎慿欄更一杯七日發嶽麓道中尋梅不獲至十日遇雪作此自此後係南嶽唱酬三日山行風繞林天寒歳暮客愁深心期已悞梅花笑急雪無端更滿襟大雪馬上次敬夫韻仙人喬嶽頂散髮吹參差喚我二三友集此西南垂列筵命洛公侑坐迎江妃導之千羽旄投以萬璧璣繽紛一何麗晻靄難具知衆真亦來翔恍覺叢霄低茫茫雲霧合一一瓊瑶姿回首謝世人千載空相思吾衰怯雄觀未敢探此竒短衣一匹馬一作乗匹馬幸甚得所随天寒飲我酒酒罷賡君詩人生易南北復此知何時風雪未巳决䇿登山用敬夫春風樓韻披風蘭臺宫看雨百常觀安知此山雲對面隔霄漢群隂匝寰區密雪渺天畔峩峩雪中山心眼悽欲斷吾人愛奇賞遞發臨河歎我知沍寒極見睍今當泮不須疑吾言苐請視明旦蠟屐得鴈行籃輿或魚貫十三日晨起霜晴前言果驗再用敬夫定王臺韻賦詩北渚無新夢南山有舊臺端能成獨徃未肯遽空囘磴滑新經雪林深不見梅急須乘霽色何必散銀杯敬夫用熹定王臺韻賦詩因復次韻新詩通造化催出火輪來雲物低南極江山接漢臺心期千古迥懐抱一生開回首狂馳子紛紛政可哀馬上口占次敬夫韻幾日城中歌酒昏今朝匹馬向烟村迎人况有南山色勝處何妨倒一尊馬上舉韓退之話口占昨日風烟接混茫今朝紫翠接青蒼此心元自通天地可笑靈宫枉炷香雪消溪漲山色尤可喜口占頭上瓊岡出舊青馬邉流水漲寒汀若為留得晶熒住突兀長看素錦屏馬跡橋下馬驅車過野橋橋西一路上雲霄我來自有平生志不用移文逺見招登山有作次敬夫韻晚峰雲散碧千尋落日衝颷霜氣深霽色登臨寒夜月行藏只此驗天心方廣道中半嶺小憇次敬夫韻不用洪厓逺拍肩相将一笑俯寒烟向來活計蓬蒿底浪説江湖極目天道中景物甚勝吟賞不暇敬夫有詩因次其韻穿林踏雪覔鐘聲景物逢迎歩歩新隨處留情隨處樂未妨聊作苦吟人崖邉積雪取食甚清次敬夫韻落葉疎林射日光誰分殘雪許同嘗平生願學程夫子恍憶當年洗俗腸後洞山口晚賦日落千林外烟飛紫翠深寒泉添壑底積雪尚崖隂景要吾人共詩留永夜吟從教廣長舌莫盡此時心後洞雪壓竹枝横道石灘聫騎雪垂垂已把南山入小詩後洞今朝逢折竹却思聯騎石灘時方廣奉懐定叟偶來石廪峰頭寺忽憶畫船齋裏人城市山林雖一致不知何處是真身方廣聖燈次敬夫韻神燈照夜惟聞說皓月當空不用尋箇裏忘言真所得便應從此正人心羅漢果次敬夫韻目勞足倦登喬嶽吻燥腸枯到上方從遣山僧煮羅漢未妨分我一杯湯壁間古畫精絶未聞有賞音者老木樛枝入太隂蒼崕寒水斷追尋千年粉壁塵埃底應識良工獨苦心方廣版屋秀木千章倒層甍萬瓦差悄無人似玉空詠小戎詩泉聲次林擇之韻空巖寒水自悲吟遥夜何人為賞音此日團欒都聽得他時離索試追尋霜月次擇之韻蓮花峰頂雪晴天虛閣霜清絶縷烟明發定知花䔩䔩如今且看竹娟娟枯木次擇之韻百年蟠木老聱牙偃蹇春風不肯花人道心情頑似汝不須持向我儂誇夜宿方廣聞長老守榮化去敬夫感而賦詩因次其韻拈椎竪拂事非真用力端須日日新只麽虛空打筋斗思君辜負百年身蓮花峰次敬夫韻月曉風清墮白蓮世間無物敢爭妍如何今夜峰頭雪撩得新詩續舊篇奉題張敬夫春風樓乾道丁亥冬至隆堂謹前規傑閣聳奇觀慿欄俯江山極目眇雲漢主人沂上翁顧肯吟澤畔俛仰一喟然冲融無間斷我來抑何幸屢此承晤歎平生滯吝胷砉若層氷泮繼今兩切切保合勤旦旦萬事儘紛綸吾道一以貫方廣睡覺次敬夫韻風簷雪屋澹無情巧作寒窓静夜聲倦枕覺來聽不斷相看渾欲不勝清感尚子平事翩然逺嶽恣游行慨想當年尚子平我亦近來知損益只將懲窒度餘生殘雪未消次擇之韻脚底悲風舞凍鴉此行真是躡蒼霞仰頭若木敷瓊蘂不是人間玉樹花自方廣過髙臺次敬夫韻素雪留清壁蒼霞對赤城我來隂壑晚人說夜燈明貝葉無新得蒲人有舊盟咄哉寧負汝安敢負吾生清疑當作靑石廪峰次敬夫韻七十二峰都挿天一峰石廪舊名傳家家有廪髙如許大好人間快活年行林間㡬三十里寒甚道傍有殘火温酒舉白方覺有暖意次敬夫韻千林一路雪毰堆吟斷飢腸苐幾回温酒正思㪣石火偶逢寒燼得傾杯林間殘雪時落鏘然有聲青鞋布襪踏瓊瑶十里晴林未覺遥忽復空枝墮殘雪恍疑鳴璬落叢霄至上封用擇之韻疇昔朱陵洞如今白帝城天高雲共色夜永月同明萬里争囘巧千峰盡乞盟登臨須我輩更約羡門生福嚴寺囘望嶽市昨夜相擕看霜月今朝誰料起寒烟安知明日千峰頂不見人間萬里天福嚴讀張湖南舊詩樓上低囬摻别袖山中磊落見英姿白雲未屬分符客已有經行到處詩登祝融峯用擇之韻今年縁底事浪走太無端直以心期逺非貪眼界寛雲山扵此盡風袂不勝寒孤鳥知人意茫茫去不還穹林閣讀張湖南七月十五夜詩詠歎久之因次其韻南嶽天下鎮祝融最髙峰仰干幾千仞俯入一萬重開闢知何年上有釋梵宫白日照雪屋清宵響霜鏞極知瓌特觀仙聖情所鍾雲根有隠訣讀罷凌長風晚霞日落西南第㡬峰斷霞千里抹殘紅上方傑閣凭欄處欲盡餘暉怯晚風過髙臺携信老詩集夜讀上封方丈次敬夫韻十年聞說信無言草草相逢又黯然借得新詩連夜讀要從苦淡識清妍贈上封長老夜宿上封寺翛然塵慮清月明殘雪裏泉溜隔窓聲楮衲今如許綈袍那復情爐紅虛室暖聊得話平生自上封登祝融峯絶頂次敬夫韻衡嶽千仞起祝融一峯髙羣山畏突兀犇走如曹逃我來雪月中歴覽快所遭捫天滑青壁俯壑崩銀濤所恨無十犗一掣了六鼇遄歸青蓮宫坐對白玉毫重閣一徙倚霜風利如刀平生山水心真作貨食饕明朝更清澈再徃豈憚勞中宵撫世故劇如千蝟毛嬉遊亦何益歳月今滔滔起望東北雲茫然首空搔十五日再登祝融用臺字韻江流圍玉帶天影抱瓊臺柱杖烟霄外中巖日月囬箕山藏遁許吳市隠仙梅一笑今何在相期再舉杯胡丈廣仲與范伯崇自嶽市來同登絶頂舉酒極談得聞比日講論之樂我已中峯住君從何處來莫留巖底寺徑上月邉䑓濁酒團欒坐髙談次第開前賢渺安在清酹寄餘哀醉下祝融峯作我來萬里駕長風絶壑層雲許盪胸濁酒三杯豪氣發朗吟飛下祝融峯十六日下山各賦一篇仍迭前韻絶頂來還晚寒窓睡達明連床眇歸思三宿悵餘情雲合山無路風囘雪有聲嶽祗珍重意只此是將迎和敬夫韻蠟屐風煙隨處别下山人事一畨新世間不但山中好今日方知此意真和擇之韻仰止平生舊今年得得來舉頭天一握倚杖雪千堆講道心如渴哦詩思湧雷出山遺語在歸騎莫徘徊二詩奉酬敬夫贈言并以為别我行二千里訪子南山隂不憂天風寒况憚湘水深辭家仲秋旦稅駕九月初問此為何時嚴冬歳云徂勞君歩玉趾送我登南山南山髙不極雪深路漫漫泥行復幾程今夕宿櫧洲明當分背去惆悵不得留誦君贈我詩三歎增綢繆厚意不敢忘為君商聲謳昔我抱氷炭從君識乾坤始知太極藴要眇難名論謂有寧有跡謂無復何存惟應酬酢處特逹見本根萬化自此流千聖同兹源曠然逺莫禦惕若初不繁云何學力微未勝物欲昏涓涓始欲達已被黄流吞豈知一寸膠救此千丈渾勉哉共無斁此語期相敦讀林擇之二詩有感自此後係東歸亂稾筍輿隨望入寒烟每誦君詩輙黯然今夜定知連榻夢一時飛墮錫山前竹輿傲兀聽嘔啞合眼歸心已到家遊子上堂慈母笑豈知行李尚天涯馬上贈林擇之與君歸思𣺌悠哉馬上看山首共囘認取山中奇絶處他年無事要重來梅溪陂下作野牛浮鼻過寒溪落木萷槮水下陂俗手定應摹不得無人説與范牛知寄題李東老淵乎齋東老幽棲地淵乎亦妙哉空山無客到流水有花開句律今誰敵詩仙舊所陪朱絃悄餘韻綺席澹浮埃竟日門多掩長沙歳一來端能負猿鶴歸計莫徘徊宿梅溪胡氏客舘觀壁間題詩自警二絶貪生莝豆不知羞靦面重來躡俊遊莫向清流浣衣袂恐君衣袂涴清流十年湖海一身輕歸對黎渦却有情世路無如人欲險幾人到此誤平生擇之所和生字韻語極警切次韻謝之兼呈伯崇不是譏訶語太輕題詩只要警流情煩君屬和增危惕虎尾春氷寄此生再答擇之兢惕如君不自輕世紛何處得闗情也應妙敬無窮意雪未消時草已生十一月二十六日宿苹鄉西三十餘里黄花渡口客舍稍明潔有宋亨伯題詩亦頗不俗因録而和之鼎足爐邉坐陶然共一樽道心元自勝世味不湏論安穩三更睡清明一氣存雖無康樂句聊爾慰營魂二十七日過毛山鋪壁間題詩者皆言有毛女洞在山絶頂問之驛吏云狐魅所為耳因作此詩人言毛女住青冥散髮吹簫夜夜聲却是郵童觧端的向儂說是野狐精次擇之韻聊紀秦事不知四海已湯湯舞殿歌臺樂未央五帝威神等牛馬六王子女盡嬪嬙仙心久已攀姑射辨口從教泣華陽行客詎明千古意虛疑霞佩響琳琅雪梅二闋奉懐敬夫二闋合次樂府以有後詩仍舊編附此雲垂幕隂風慘淡天花落天花落千林瓊玖一空鸞鶴征車𣺌𣺌穿華薄路迷迷路増離索增離索剡溪山水碧湘樓閣梅花發寒梢掛著瑶臺月瑶臺月和羮心事履霜時節野橋流水聲嗚咽行人立馬空愁絶空愁絶為誰凝佇為誰攀折題二闋後自是不復作矣久惡繁哇混太和云何今日自吟哦世間萬事皆如此兩葉行将用斧柯次韻擇之聽話語道深慚話一塲感君親切為宣揚更将充擴隨鉤索意味從今積漸長次韻伯崇自警二首十載相期事業新云何猶歎未成身流光易失如翻水莫是因循誤得人誦君佳句極優柔未得明彊是所憂若悟本來非木石保君𢎞毅不能休奉答擇之四詩意到即書不及次韻為閔人疲上馬行此時消息儘分明更憐跣足無衣苦充此直教天下平君看灞橋風雪中南來北去莽何窮想應亦有還家客使爾譏訶恐未公東頭不見西頭是南畔唯嫌北畔非多謝聖門傳大學直将絜矩露天機安肆真同鴆毒科君言雖苦未傷和觧嘲却是生囘互政恐紛紛事轉多答擇之長言三復儘溫純妙處知君又日新我亦平生傷褊廹期君苦口却諄諄次韻擇之見路傍亂草有感世間無處不陽春道路何曾困得人若向此中生厭斁不知何處可安身到袁州二首馬蹄今日到袁州山木蕭槮四面愁多謝晚來風力勁朔雲寒日共悠悠袁州刺史㡬何人韓李流芳獨未泯道䘮時危今日意九原遺恨一時新十二月旦袁州道中作今朝已是臘嘉平我獨何為在逺行白髮倚閭應注想青山聫騎若為情同林擇之范伯崇歸自湖南袁州道中多奇峰秀木怪石清泉請人賦一篇我行宜春野四顧多奇山攢巒不可數峭絶誰能攀上有青葱木下有清冷灣更憐灣頭石一一神所剜衆目共遺棄千秋保堅頑我獨抱孤賞喟然起長歎賦歸雲洞人生信多患吾道初不窮云何感慨士伏死嵁巖中宜陽古道周竅石何嵌空窮幽歴肺腑履坦開房櫳頗疑有畸人徃昔寄此宫歳月詎云㡬井竈無遺蹤我來記清秋歸塗渺窮冬興懐重幽討永嘯囘長風風囬雲氣歸洞口春濛濛信美非人境出門吾欲東人言石乳洪羊之勝不及徃遊作此人道歸雲未足誇洪羊石乳更谽谺連環入夢難紆軫囘首西風又日斜分宜晚泊江亭望南山之勝絶江徃遊將還而舟子不至擇之刺船徑渡呼之予與伯崇佇立以俟因得二絶寒水􅉿􅉿受晚風輕舠來徃思無窮何妨也向溪南去徙倚空林暮靄中一棹翩然喚不囬兩笻江畔久徘徊早知君有如神技同下中流亦快哉新喻西境北嶺蒼茫雨欲來南山騰躑翠成堆穉杉繞麓千旗卷野水涵空一鑑開客路情懐元倥偬今晨逰眺却徘徊自然觸目成佳句雲錦無勞更剪裁道間厭苦泥淖思亟還家安坐講習用擇之韻呈二賢友客路泥塗正所憂可堪雲物更油油向來結友輕千里此去還家且一丘妙處自應從我得躬行肯使歎吾猶兩賢定許相提挈厚意何勝雜珮酬再和油字韻楚山黄落正離憂喜見寒杉卷碧油倦客今年真白髮羽人何日定丹㐀奇兵㨗出吾當避狹路争先子不猶箇裏竟能無一語應慙二鳥起相酬次韻擇之懐張敬夫徃時聨騎向衡山同賦新詩各據鞍此夜相思一杯酒囘頭猶記雪漫漫别韻賦一篇踏雪凌霜眼界新舉鞭遥指玉嶙峋回頭此日成千里横槊思君少一人宿新喻驛夜聞風鐸倦枕欹眠到五更却嫌風鐸久悲鳴恍疑絺綌南鄰夜寒鐵丁東客夢驚題野人家茒簷竹落野人家只麽悠悠閲歳華田父把犁寒雨足牧兒吹笛晚風斜題萬安野館身似孤雲去復還投裝猶記此窗間只應烟雨蒼茫外即是當時萬疊山萬安遇長沙便欲附書不果長沙一别兩悠悠夢想清湘帶橘洲欲寄行人數行字行人不作置書郵不見梅再用來字韻舊歳将除新歳來梅花長是雪毰堆如何此日三洲路不見寒葩一樹開野水風烟迷慘澹故園霜月想徘徊夜窓却恐勞幽夢速把新書取次裁賦水僊花隆冬凋百卉江梅厲孤芳如何蓬艾底亦有春風香紛敷翠羽帔温靘白玉相黄冠表獨立淡然水僊装弱植愧蘭蓀高操摧氷霜湘君謝遺楪漢水羞捐璫嗟彼世俗人欲火焚衷膓徒知慕佳冶詎識懐貞剛凄凉栢舟誓惻愴終風章卓哉有遺烈千載不可忘清江道中見梅今日清江路寒梅第一枝不愁風嫋嫋正奈雪垂垂煖熱唯須酒平章却要詩他年千里夢誰與寄相思臨江買舟征驂聊駐近江樓南市津頭問買舟共説明朝乘雪水長歌一日到洪州薌林東臯濺寒水西崦饒清隂南埭奎璧麗北垞静且深入門流緑波竹樹何箾槮積石象雲壑髙堂杳沉沉左通雲水區右徑梅杏林沼沚共囘薄觀臺鬱差參紛吾千里遊發軔南山岑過門得嘉賞慰此夙昔心􅒺懐企疏翁歳晚投冠簪婆娑此澗谷俯仰成古今嗣德世有人聞道我所欽相見無雜語晤言寫胸襟懐舊復惆悵命酒聊同斟飲罷我當去握手清江潯冠簪一作華簪過樟木鎮晚晴二首朝晴遣我看薌林頃刻浮雲萬里隂拂袖凌風二十里依然寒日照長吟飛雲極目疑梅嶺落日囘頭夢橘洲從此不愁東路永祗應西望轉悠悠赤岡頭望逺山作曉起清江㺯小舟晚風吹過赤岡頭逺峰自作修眉斂萬里那知客子愁次韻擇之發臨江千里烟波一葉舟三年已是兩經由今宵又過豐城縣依舊長江直北流次韻擇之漫成落日晴江更逺山逺山猶在有無間不須極目傷懐抱且看漁船近徃還船一本作舠竹節灘船下清江竹節灘長烟漠漠水漫漫人家斷岸斜陽好客子中流薄暮寒舟中晚賦長風一萬里披豁暮雲空極浦三年夢扁舟二子同離離浮逺樹杳杳沒孤鴻若問明朝事西山晻靄中次韻擇之将近豐城有作老矣身如萬斛舟長風破浪若為收江山若有逄迎意到處何妨為少留過豐城作𣺌渺豐城縣囬頭憶舊遊晴江羅逺樹宿莽亂中洲寳劒今鱗甲神光尚斗牛他年還記得此夜一扁舟舟中見新月伯崇擇之二友皆已醉卧以此戲之舟中見新月烟浪不勝寒與問醉眠客豈知行路難殘陽猶水靣孤鴈更雲端篷底今宵意天邉芳歳闌次韻擇之舟中有作二首一江煙水浩漫漫昨夜扁舟寄此間共向船頭望南北不知何處是家山一席三人抵項眠心知篷外水如天起來却怪天如水月落烏啼浦樹邉自東湖至列岫得二小詩孺子髙風何處尋東湖臺觀水雲深生芻一束人如玉此日凄凉萬古心昨日來時萬里隂長江雪後玉十岑蒼茫不盡登臨意重對晴天豁晚襟列岫望西山最正殆無毫髮遺恨滕王秋屏皆不及也因作此詩二首城中望西山拄頰朝空暮不到列岫亭詎知親切處東西水平分南北山中判妙處毫髮間商略無遺算晚飲列岫危亭披豁對蒼霞䇿杖重來日未斜滿目江山一尊酒哦詩莫遣大雄誇觀上藍賢老所藏張魏公手帖次王嘉叟韻火風吹散旱天雲膚寸空餘翰墨新拭淚相看渺今古堂堂那復有斯人次韻伯崇登滕王閣感舊盖聞徃時延閣公拜疏於此云金闕銀臺夢想中樓前拜舞皁囊空十年殄瘁無窮恨歎息今人少古風觀西山懷嶽麓以為莫能相上下也聊賦此云風月平生意江湖自在身年華供轉徙眼界得清新試問西山雨何如湘水春悠然一長嘯妙絶兩無倫進賢道中徃辭湘水曲今過豫章城改歳無多日到家才㡬程晝憐春意廹夜喜月華清此去無淹軌前塗似掌平野望登髙立馬瞰晴川四面平林接暝烟東望不堪頻極目歸心已度鳥飛前次韻擇之進賢道中漫成五首白酒頻斟當啜茶何妨一醉野人家據鞍又向岡頭望落日天風鴈字斜笑指斜陽天外山無端長作翠眉攢豈知男子桑蓬志萬里東西不作難夜宿林岡月滿川歸期屈指正茫然也知地脉無嬴縮只把隂晴更問天誰作窓間擁鼻聲更哦樂府短歌行從教永夜清無寐只恐晨雞不肯鳴日暮重岡上人勞馬亦饑不妨隨野雀容易宿寒枝次韻擇之夜宿進賢客舍白日照寒野􅒺然千里平馳暉一以沒浩蕩驚颷生露彩林表見月華波上明同行魯狂士忽發商歌聲洗耳金石奏信知塵累輕次韻擇之潤陂有作我行欲安適莽莽窮山陂晨裝逺林表午憩通川湄曠望想慈親行役嗟吾兒喟然陟屺歎歸心浩無涯曉霜徒御寒莫雨朋儔悲前期諒非逺無為苦愁思過潤陂日晴意可喜至暮復雨伯崇有詩因次其韻客裏歳云暮我心殊未平悠悠惜徃日鬱鬱懐平生况復久隂雨喜兹霜曉明那知不終日又作瀟瀟聲坐厭泥塗辱空嗟鴻鴈輕山行兩日至金歩復見平川行夷路計程七日可到家矣行穿側徑度荒山又踏深泥過野田路轉忽然開逺望眼明復此見平川江烟浦樹悲重疊楚水閩山喜接連稅駕有期心轉迫稜稜瘦馬不勝鞭次韻擇之金歩喜見大江有作江頭四望逺峰稠江水中間自在流並岸東行三百里水源窮處即吾州此江發源分水嶺故前詩有楚水閩山喜接連之句次韻擇之餘干道中寒盡春生草又青化工消息㡬曾停因君一詠陵陂麥恍憶儂家老圃亭亭下予家種麥處也安仁曉行夙駕安仁道行行得自娛荒山圍野濶逺樹岀林孤景晦長烟合天寒碧草枯歸心懐徃路極目向平蕪十七日早霜晴觀日出霧中喜而成詩斜月夜窓白肅霜朝氣清長塗披素錦寒霧湧金鉦已作三冬雨何妨十日晴天公且相念莫遣暮雲生再用前韻久隂冬竟暖欲霽氣先清田舍占烟火軍家候鼓鉦風霜千里肅天地一朝晴明日知何日陽春又發生次韻擇之過了頭巖四面晴岡紫石崖如何渾作白皚皚須知暖入隂泉溜不是寒封積雪堆章巖豁爾天開宇呀然夜不扃閒雲任棲宿密雨斷飄零破屋僧常住髙軒客屢經古今題寫處一半蘚文青次韻擇之章巖驅馬倦長道投鞭憇此巖來應六鼇戴跡是五丁劖泉脉流青潤林稍擁碧巉老禪深閉戸客子且征衫鉛山立春六言二首雪擁山腰洞口春廻楚尾吳頭欲問閩天何處明朝嶺水南流行盡風林雪徑依然水館山村却是春風有脚今朝先到柴門次二友石井之作三首一竇隂風萬斛泉新秋曾此弄清漣人言湛碧深無底只恐濳通小有天聫騎君登泉上亭黄塵雙眼想增明籃輿獨向溪南路惆悵不成同隊行泉嵌側畔一川明水石縈廻更有情聞說近來疏葺好想應仍是舊溪聲次韻擇之鉛山道中二首幾月髙堂闕問安歸塗不管上天難誦君兩疊思親句也信從來取友端行盡江湘萬疊山家山猶在有無間明朝漸喜登閩嶺澗水分流響珮環次韻擇之發紫溪有作明日振衣千仞岡夜分起看月和霜久知行路難如此不用悲歌淚滿裳次韻别林擇之暫時相别不須悲楚調凄凉政爾為幾曲清溪足相送一天明月豈曾離上堂嘉慶多為問縁道風光少賦詩更謝同袍二三子夜來幽夢滿春池次韻别范伯崇二首東歸亂稾止此平生罪我只春秋更作囂囂萬里遊頼有吾人肯相伴群譏衆詆不能憂累月追隨今别離人生離合豈無時願言更勵堅髙志力索窮探慰所思有懐南軒老兄呈伯崇擇之二友二首憶昔秋風裏尋盟湘水傍勝逰朝挽袂妙語夜連床别去多遺恨歸來識大方惟應微宻處猶欲細商量積雨芳菲暗新晴始豁然園林媚幽獨窓戶愜清妍晤語心何逺謂日與擇之講論書題意未宣謂數收伯崇近書懸知今夜月同夢舞雩邉九日登天湖以菊花須挿滿頭歸分韻賦詩得歸字去歳瀟湘重九時滿城寒雨客思歸故山此日還佳節黄菊清樽更晚暉短髮無多休落㡌長風不斷且吹衣相看下視人寰小祗合從今老翠㣲歸報德再用前韻幾枝藤竹醉相携何處千峰頂上歸正好臨風眺平埜却須入谷避斜暉酒邉泉溜寒侵骨坐上嵐光翠染衣踏月過橋驚易晚林坰回首更依微雪中與林擇之祝弟登劉圃之宴坐巖有懐南嶽舊逰賦此呈擇之屬和并寄敬夫兄風雪集歳晏掩闗聊自休今辰展遐眺倚此寒巖幽同雲暗空室皓彩迷林丘崩奔小澗歇飛舞增綢繆仰看鸞鶴翔俯視江漢流乾坤有奇變澒洞驚兩眸三酌不自温倚杖空㝠搜悲歌動華薄璀璨忽滿裘向來一杯酒浩蕩千里遊亦復有兹賞微言寄清酬解携今㡬許光景逝不流懐人眇山嶽省已紛愆尤對此奇絶境一懽生百憂茫然發孤詠逺思誰能收考異拜張魏公墓下劒履一作劒几精忠一作精誠孤憤一作忠憤國威一作國勢敬簡堂分韻齋扉一作齋房大雪馬上次韻羽旄一作羽化馬上口占歌酒一作飲酒烟村一作前村馬跡橋生志一作生意髙臺次韻留清一作流清石廪峰家家有廪高如許大好人間快活年一云教人鎮作豐年願樂聖何妨萬億年林間殘雪忽復空枝墮殘雪一作忽聽氷條墮清響福巖讀張湖南舊詩白雲未屬分符客一作今朝暫豁平生意奉别敬夫要眇一作要妙豈知一作豈無淵乎齋澹浮一作湛浮雪梅野橋一作斷橋答林擇之四詩家客一作家樂再和油字韻羽人一作新詩日定一作日寄觀西山悠然一作悠悠進賢客舍同行一作同舟山行至金歩悲重疊一作傷緜邈稅駕有期心轉迫一作欲近慈闈心轉切
