body:
  text: 答馮作肅所諭兩條如叔京兄所論孔子非沮子貢乃勉其進此意甚善而作肅所疑亦有不得不疑者但此章自不必别為之說但看伊川先生觧云我不欲人之加諸我吾亦欲無加諸人仁也己所不欲勿施於人恕也恕則子貢可勉而能仁則非子貢之所及此意極分明矣博施濟衆之問與此語先後不可考疑却因能近取譬之言用力有功而有欲無加人之說也熹嘗謂欲立人欲逹人即子貢所謂欲無加人仁之事也能近取譬求仁之方即孔子所謂勿施於人恕之事也熟玩文意似當如此然諸先逹未之嘗言未知是否幸試思之更白叔京兄質其可否復以見諭幸甚又所引與㸃為證恐聖人與㸃之意不止如此亦可并商量也答馮作肅所諭懲創後生妄作之弊甚善然亦不可以此而緩於窮理但勿好異求新非人是己則知識益明而無穿穴之害矣若因陋畜疑不為勇决之計又非所以矯氣質之偏而進乎日新也答馮作肅示喻頗為他慮所牽不得一意講習只得且将明白義理澆灌涵飬令此義理之心常勝便是𦂳切功夫久之須得力也答馮作肅敬義之說甚善然居敬窮理二者不可偏廢有所偏廢則德孤而無所利矣動静仁智之體對下文樂夀為仁智之效而言猶言其體叚如此耳非體用之謂也學者求為仁智之事亦只如上章居敬窮理之說便是用力處若欲動中求静静中求動却太支離然亦無可求之理也以伊尹為天民盖以其事言之如耕莘應聘之事即分明見得有此蹤跡也治亦進亂亦進是指五就湯五就桀而言乃是就湯之後以湯之心為心非不待可行而遽行之謂也傳說是大賢比伊尹須少貶其見可而後行雖同但所以行者或不及耳周孔又髙直是正己而物正之事可行而行亦有所不足道矣二南乃天子諸侯燕樂用之鄉人用之邦國所以風天下也然隨事自有正樂者則兼及之如燕禮自有鹿鳴等詩無正樂者則專用之如鄉飲酒别無詩也恐是如此然亦未及考也可欲之善與繼善之善同有諸己之信與成之者性理雖一而所施則異當更深察之性情等說有己見叔京書者但所與嵩卿論者今議其得失於此嵩卿云理即性也不可言本此言得之程子亦云性即理也今見遺書二十二上但其下分别感有内外則有病作肅非之是也作肅又云性者自然理則必然而不可悖亂者此意亦近之語亦有病但下云理不待性而後有必因性而後著此則有大病盖如此則以性與理為二也下云性者理之㑹却好理者性之通則又未然盖理便是性之所有之理性便是理之所㑹之地而嵩卿失之於太無分别作肅又失之於太分别所以各人只說得一邉也作肅云情本於性故與性為對心則於斯二者有所知覺而能為之統御者也未動而無以統之則空寂而已已動而無以統之則放肆而已此數句却好但必以不動為心則又非矣若心本不動則孟子又何必四十而後不動心乎須知未動為性已動為情心則貫乎動静而無不在焉則知三者之說矣知言曰性立天下之有情效天下之動心妙性情之德此言甚精宻與其他說話不同試玩味之則知所言之失矣答連嵩卿正顏色斯近信矣此言持養乆熟之功正其顏色即近於信盖表裏如一非但色莊而已以上下兩句考之可見非謂正顏色即是近信也若非持養有素則正顏色而不近信者多矣宿諾者未有以副其諾而預諾之如今人未有此物而先以此物許人之類集觧不用此義盡心以見處而言盡性以行處而言易簀結纓未須論優劣但看古人謹於禮法不以死生之變易其所守如此便使人有行一不義殺一不辜而得天下不為之心此是𦂳要處子路仕衛之失前輩論之多矣然子路却是見不到非知其非義而苟為也以道左為無用則道乃無用之物也而可乎但仁是直指人心親切之妙道是統言義理公共之名故其言有親䟽其實則無二物也中庸言修道以仁胡子亦謂人而不仁則道義息意亦可見天地設位而易行乎其中以造化言之也乾坤成列而易立乎其中以卦位言之也乾者萬物之始對坤而言天地之道也元者萬物之始對亨利貞而言四時之序也錯綜求之其義乃盡功用妙用之說來諭得之所謂天地之性即我之性豈有死而遽亡之理此說亦未為非但不知為此說者以天地為主耶以我為主耶若以天地為主則此性即自是天地間一箇公共道理更無人物彼此之間死生古今之别雖曰死而不亡然非有我之得私矣若以我為主則只是於自己身上認得一箇精神魂魄有知有覺之物即便目為己性把持作弄到死不肯放舍謂之死而不亡是乃私意之尤者尚何足與語死生之說性命之理哉釋氏之學本是如此今其徒之黠者徃徃自知其陋而稍諱之却去上頭别說一般𤣥妙道理雖若滉漾不可致詰然其歸宿實不外此若果如此則是一箇天地性中别有若干人物之性毎性各有界限不相交雜改名換姓自生自死更不由天地隂陽造化而為天地隂陽者亦無所施其造化矣是豈有此理乎煩以此問子晦渠必有說却以見喻答連嵩卿為其多聞也為其賢也多聞何以謂之師夫賢有小大記曰以人望人則賢者可知至於多識前言徃行以畜其德易之大畜故可以為師賢與多聞細分固當有别但若只如此理㑹則與王氏新經何異恐不必深致意也下叚春秋補助之說放此配義與道而不言仁充塞天地之間則仁在其中矣孟子言氣主於集義故也更熟看上下文子細思索不可只如此草草說過樂正子有諸己之謂信與反身而誠則能動人也如何信有諸已誠則能動人也信與誠大槩相似但反身而誠所指處地位稍髙亦未論能動人否也孟子不見儲子謂其儀不及物夫儲子之平陸特遣人致幣交於孟子則其接也不以禮孟子何以受其幣而不見豈非不屑教誨之道與孔子不見孺悲而鼓瑟之義同初不自來但以幣交未為非禮但孟子既受之後便當來見而又不來則其誠之不至可知矣故孟子過而不見施報之宜也亦不屑之敎誨也楚令尹子南之子棄疾雍紏之妻一告而殺夫一不告而殺父二者亦不幸而遇此然當如何為正居二者之間調䕶勸止使不至於相夷者上也勸之不從死而以身悟之次也舍是亦無䇿矣桓公不足以有為民不免左袵管仲之不死得為仁乎或以為管仲自信其才雖不遇而仲之仁自若也若夫成功則天也孔子許管仲以仁正以其功言之耳非以管仲為仁人也若其無功又何得為仁乎答連嵩卿恭敬二字語孟之言多矣如敬而無失與人恭而有禮居處恭執事敬行已也恭事上也敬責難於君謂之恭陳善閉邪謂之敬伊川先生言發於外者謂之恭有諸中者謂之敬盖恭敬只一理表裏之言以此意觧語孟之言似不契莫是有輕重否恭主容敬主事自學者而言則恭不如敬之力自成德而言則敬不如恭之安鬼神馮依此亦有理莫見乎隱莫顯乎微而已此莫只是誠之不可揜感而遂通之意否鬼神馮依之說大槩固然然先生盖難言之亦不可不識其意也窮神則無易矣此言人能窮神則易之道在我矣豈復别有易哉乾是聖人道理坤是賢人道理乾是自然而然坤便有用力處論性不論氣不備論氣不論性不明論性不論氣則無以見生質之異論氣不論性則無以見理義之同兵法逺交近攻須是審行此道智崇禮卑之意盖學者其知要髙明其行須切近立則見其參於前所見者何事竊謂言忠信行篤敬所主者誠敬而已所主者既誠敬則所見者亦此理而無妄矣故坐必如尸立必如齊此理未嘗不在前也二說皆善顏淵問仁孔子告之以仁與禮仁與禮果異乎竊謂五常百行理無不貫仁者人此者也義者宜此禮者履此仁之與禮其命名雖不同各有所當皆天理也人之所以滅天理者以為人欲所勝耳人能克去己私則天理者復動容周旋中禮仁孰大焉仁禮之說亦得之但仁其統體而禮其節文耳答連嵩卿德輶如毛民鮮克舉之孔子所謂為仁由己也仁以為己任不亦重乎程子所謂克己最難也周子亦曰至易而行難果而確無難焉盖輕故易重故難知其易故行之必果知其難則守之宜確能果能確則又何難之有乎恐不必引堯舜病諸以為任重之證也死生有命言禀之素定非今日所能移富貴在天言制之在彼非人力所能致如所諭却費力也天下歸仁熟考經文及程氏說似只謂天下之人以仁歸之與吕氏贊不同盖事事合理則人莫不稱其仁如宗族稱孝鄉黨稱悌之比若有毫髮之私留於胸中則見乎外者必有所不可揜矣人亦必以其實而稱之又何歸仁之有知化只是知化育之道不必以知為主但窮神知化存神過化伊川横渠說此二義皆不同試考其說當孰從耶忠質文不見於經然亦有理盖忠則只是誠實質便有損文就質之意矣曾子言仁人此義宜此只就孝上說孟子言仁之實義之實則兼孝悌而言程子言此雖只是一理然須分别得出是亦理一而分殊之意大凡道理皆如此也此是說遺書第一卷中仁人此一叚夫仁者已欲立而立人已欲逹而逹人所謂以己及物仁也能近取譬可謂仁之方也己所謂推己及物恕也並行不悖一章甚善此君子所以不謂命也但堯舜孔子為䟽戚之異似未然此各是發明一事皆不以天而廢人者然所謂人者是亦天而已矣此所以並行而不相悖也答程允夫讀蘇氏書愛其議論不為空言竊敬慕焉蘇氏議論切近事情固有可喜處然亦譎矣至於􅃷浮華而忘本實貴通逹而賤名檢此其為害又不但空言而已然則其所謂可喜者考其要歸恐亦未免於空言也為學之道戞戞乎難哉為學之道至簡至易但患不知其方而溺心於淺近無用之地則反見其難耳潁濵浩然一叚未知所去取反復讀孟子此章則蘇氏之失自見孟子集觧先録要切處一二事如論飬氣之類孟子集觧雖已具槀然尚多所疑無人商㩁此二義尤難明豈敢輕為之說而妄以示人乎來書謂此二義為甚切處固然然學者當自博而約自易而難自近而逺自下而髙乃得其序今舍七篇而直欲論此是躐等也為學之序不當如此而來書指顧須索氣象輕肆其病尤大窮理之要不必深求先儒所謂行得即是者此最至論若論雖髙而不可行失之迂且矯此所謂過猶不及其為失中一也窮理之要不必深求此語有大病殊駭聞聽行得即是固為至論然窮理不深則安知所行之可否哉宰予以短䘮為安是以不可為可也子路以正名為迂是以可為不可也彼親見聖人日聞善誘猶有是失况於餘人恐不但如此而已窮理既明則理之所在動必由之無論髙而不可行之理但世俗以苟且淺近之見謂之不可行耳如行不由徑固世俗之所謂迂不行私謁固世俗之所謂矯又豈知理之所在言之雖若甚髙而未嘗不可行哉理之所在即是中道惟窮之不深則無所凖則而有過不及之患未有窮理既深而反有此患也易曰精義入神以致用也盖惟如此然後可以應務未至於此則凡所作為皆出於私意之鑿㝠行而已雖使或中君子不貴也前所論蘇潁濵正以其行事為可法耳蘇黄門謂之近世名卿則可前書以顏子方之僕不得不論也今此所論又以為行事可法本朝人物最盛行事可法者甚衆不但蘇公而已大抵學者貴扵知道蘇公早拾蘇張之緒餘晚醉佛老之糟粕謂之知道可乎古史中論黄帝堯舜禹益子路管仲曾子子思孟子老耼之屬皆不中理未易槩舉但其辨足以文之世之學者窮理不深因為所眩耳僕數年前亦嘗惑焉近歳始覺其謬所謂行事者内以處已外以應物内外俱盡乃可無悔古人所貴於時中者此也不然得於己而失於物是亦獨行而已矣處已接物内外無二道也得於己而失於物者無之故凡失於物者皆未得於己者也然得謂得此理失謂失此理非世俗所謂得失也若世俗所謂得失者則非君子所當論矣時中之說亦未易言若如來諭則是安常習故同流合汙小人無忌憚之中庸後漢之胡廣是也豈所謂時中者哉大抵俗學多為此說以開苟且放肆之地而為蘇學者為尤甚盖其源流如此其誤後學多矣答程允夫所示詩文筆力甚快書中所云則未敢聞命别紙條析以徃試熟看數過當自見得大抵自道學不明千有餘年為士者習於耳目見聞之陋所識所趣不過如此如欲為文章之士而已則以吾弟之才少加勉勵自應不在人後但不當妄談義理徒取誚於識者若果有意扵古人之學則如所示皆未得其門而入者要須把作一件大事深思力究厚養力行然後可議耳但恐浮艶之詞染習已深未能勇决棄彼而取此則非僕之所敢知也答程允夫熹承寄示前書所諭皆未中理不得不相曉來書謂熹之言乃論蘇氏之粗者不知如何而論乃得蘇氏之精者此在吾弟必更有說然熹則以為道一而已正則表裏皆正譎則表裏皆譎豈可以析精粗為二致此正不知道之過也又謂洗垢索瘢則孟子以下皆有可論此非獨不見蘇氏之失又并孟子而不知也夫蘇氏之失著矣知道愈明見之愈切雖欲為之覆藏而不可得何待洗垢而索之耶若孟子則如青天白日無垢可洗無瘢可索今欲掩蘇氏之疵而援以為比豈不適所以彰之耶黄門比之乃兄似稍簡靜然謂簡靜為有道則與子張之指清忠為仁何以異第深考孔子所答之意則知簡静之與有道盖有間矣况蘇公雖名簡静而實隂險元祐末年規取相位力引小人楊畏使傾范忠宣公而以己代之既不效矣則誦其彈文於坐以動范公此豈有道君子所為哉此非熹之言前輩固已筆之於書矣吾弟乃謂其躬行不後二程何其考之不詳而言之之易也二程之學始焉未得其要是以出入於佛老及其反求而得諸六經也則豈固以佛老為是哉如蘇氏之學則方其年少氣豪固嘗妄觝禪學如大悲閣中和院等記可見矣及其中歳流落不偶鬱鬱失志然後匍匐而歸焉始終迷惑進退無據以比程氏正楊子先病後瘳先瘳後病之說吾弟比而同之是又欲洗垢而索孟子之瘢也又謂程氏於佛老之言皆陽抑而隂用之夫竊人之財猶謂之盗况程氏之學以誠為宗今乃隂竊異端之說而公排之以盖其跡不亦盗憎主人之意乎必若是言則所謂誠者安在而吾弟之所以敬仰之意果何謂也挾天子以令諸侯乃權臣䟦扈借資以取重於天下豈真尊主者哉若儒者論道而以是為心則亦非真尊六經者此其心術之間反覆畔援去道已不啻百千萬里之逺方且自為邪說詖行之不暇又何暇攻百氏而望其服於己也凡此皆蘇氏心術之蔽故其吐辭立論出於此者十而八九吾弟讀之愛其文辭之工而不察其義理之悖日徃月來遂與之化如入鮑魚之肆久則不聞其臭矣而此道之傳無聲色臭味之可娛非若侈麗閎衍之辭縱横捭闔之辨有以昡世俗之耳目而蠱其心自非真能洗心滌慮以入其中真積力久卓然自見道體之不二不容復有毫髮邪妄雜扵其間則豈肯遽然舍其平生之所尊敬向慕者而信此一夫之口哉故伊川之為明道墓表曰學者於道知所向然後見斯人之為功知所至然後見斯名之稱情盖為此也然世衰道微邪偽交熾士溺於見聞之陋各自是其所是若非痛加剖析使邪正真偽判然有歸則學者将何所適從以知所向况欲望其至之乎此熹之所不得不為吾弟極言而忘其僭越之罪也程氏書布在天下所至有之此間所有不過是耳謾寄大全集一本龜山語録一本去大全中有他人之文目録中已題出矣恐已自有之如未有且留看夏中寄來未晚也程氏髙弟尹公嘗謂易傳乃夫子自著欲知其道者求之於此足矣不必傍觀他書盖語録或有他人所記未必盡得先生意也又言先生踐履盡一部易其作傳只是因而寫成此言尤有味試更思之若信得及試用年歳之功屏去雜學致精於此自當有得始知前日所謂蘇程之室者無以異於雜薰蕕氷炭於一器之中欲其芳潔而不汙盖亦難矣蘇氏文辭偉麗近世無匹若欲作文自不妨模範但其詞意矜豪譎詭亦若非知道君子所欲聞是以平日每讀之雖未嘗不喜然既喜未嘗不厭徃徃不能終帙而罷非故欲絶之也理勢自然盖不可曉然則彼醉於其說者欲入吾道之門豈不猶吾之讀彼書也哉亦無怪其一胡一越而終不合矣蘇程固嘗同朝程子之去蘇公嗾孔文仲齕而去之也使其道果同如吾弟之所論則雖異世亦且神交豈至若是之戾耶文仲為蘇所嗾初不自知晚乃大覺憤悶嘔血以至於死見於吕正獻公之遺書尚可考也吾弟未之見耳因筆及此似傷直矣然不直則道不見吾弟察之幸甚答程允夫仁者天理也理之所發莫不有自然之節中其節則有自然之和此禮樂之所自出也人而不仁滅天理夫何有於禮樂此說甚善但仁天理也此句更當消詳不可只如此說過明則有禮樂幽則有鬼神鬼神者造化之妙用禮樂者人心之妙用此說亦善禮之用和為貴禮之用以和為貴也和如和羮可否相濟先王制禮所以節人情抑其太過而濟其不及也若知和而和則有所偏勝如以水濟水誰能食之中庸曰發而皆中節謂之和知和而和則不中節矣以和對同則和字中已有禮字意思以和對禮則二者又不可不分恐不必引和羮相濟之說政者法度也法度非刑不立故欲以政道民者必以刑齊民德者義理也義理非禮不行故欲以德道民者必以禮齊民二者之决而王伯分矣人君於此不可不審此一正君而國定之機也此說亦善然先王非無政刑也但不專恃以為治耳孔氏之門雖所學者有淺深然皆以誠實不欺為主子曰由誨汝知之乎知之為知之不知為不知是知也教之以誠也若未得謂得未證為證是謂自欺如此人者其本已差安可與入道樊遲問智孔子既告之矣又質之子夏反覆不知己不敢以不知為知也凡此皆為學用力處此說亦善非其鬼而祭之諂也諂於鬼則於人可知矣推說則如此亦可但本文諂字止謂諂於鬼神耳自孔子謂季氏八佾舞於庭至季氏旅於㤗山五叚皆聖人欲救天理於将滅故其言哀痛激切與春秋同意此說亦善夏殷之禮杞宋固不足徵然使聖人得時得位有所制作雖無所徵而可以義起者亦必将有以處之為是言者恐後生以私意妄議先王之典禮耳夏殷之禮夫子固嘗講之但杞宋衰微無所考以證吾言耳若得時有作當以義起者固必有以處之但此言之發非謂後生妄議而云耳身有死生而性無死生故鬼神之情人之情也死生鬼神之理非窮理之至未易及如此所論恐墮於釋氏之說性固無死生然性字須子細理㑹不可将精神知覺做性字看也居上不寛為禮不敬臨䘮不哀吾何以觀之哉寛敬哀皆其本也聖人觀人必觀其本實不足而文有餘者皆不足以入道此說得之心有所知覺則明明則公故曰惟仁者能好人能惡人仁者固有知覺然以知覺為仁則不可更請合仁義禮智四字思惟就中識得仁字乃佳一念之善則惡消矣一念之惡則善消矣故曰苟志於仁無惡也又曰未有小人而仁者也此意亦是然語太輕率似是習氣之病更當警察療治也行不由道而得富貴是僥倖也其可苟處乎行不由道而得貧賤是當然也其可苟去乎然則君子處貧賤富貴之際視我之所行如何耳行無愧於道去貧賤而處富貴可也故曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也當以不以其道為一句得之為一句先生批如此說則其字無下落恐不成文理也此章只合依先儒說有得富貴之道有得貧賤之道為是張子韶云此言君子審富貴而安貧賤亦甚簡當朝聞道夕死可矣天下之事惟死生之際不可以容偽非實有所悟者臨死生未嘗不亂聞道之士原始反終知生之所自來故知死之所自去生死去就之理了然於心無毫髮疑礙故其臨死生也如晝夜如夢覺以為理之常然惟恐不得正而斃耳何亂之有學至於此然後可以託六尺之孤寄百里之命臨大節而不可奪也此又雜於釋氏之說更當以二程先生說此處熟味而深求之知吾儒之所謂道者與釋氏迥然不同則知朝聞夕死之說也君子懐德小人懐土君子懐刑小人懐惠君子安於德義如小人安於居處君子安於法度如小人之安於惠利心之所安一也所以用其心不同耳此蘇氏說之精者亦可取也放於利而行多怨利與害為對利於己必害於人利於人必害於己害於己則我怨害於人則人怨是利者怨之府也君子循理而行理之所在非無利害也而其為利害也公故人不得而怨人且不得而怨而况於己乎此說得之德不孤中德也中必有鄰夫子之道至今天下宗之非有鄰乎此說非是心本仁違之則不仁顏子三月不違仁不違此心也熟味聖人語意似不如此然則何以不言囬也其身三月不違心乎凡人有得於此必有樂於此方其樂於此也寢可忘也食可廢也盖莫能語人以其所以然者唯以心體之乃可自見周濓溪嘗使二程先生求顏子所樂者何事而先生亦謂顏子不改其樂其字有味又云使顏子樂道則不為顏子夫顏子舍道亦何所樂然先生不欲學者作如是見者正恐人心有所繋則雖以道為樂亦猶物也須要與道為一乃可言樂不然我自我道自道與外物何異也須自體㑹乃得之此只是贊咏得一箇樂字未嘗正當說著聖賢樂處更宜於著實處求之易曰敬以直内義以方外敬以飬其心無一毫私念可以言直矣由此心而發所施各得其當是之謂義此與中庸言喜怒哀樂未發謂之中發而皆中節謂之和相表裏中庸言理易言學此說是也聖言其所行智言其所知聖智兩盡孔子是也若伯夷伊尹栁下惠者其力皆足以行聖人之事而其知不逮孔子故惟能於清和任處知之盡行之至而其他容有所未周然亦謂之聖者以其於此三者已臻其極雖使孔子處之亦不過如此故也前輩言人固有力行而不知道者若三子非不知道知之有所未周耳知之未周故伯夷於清則中已於仕於和未必中也伊尹栁下惠於任於和則中而於清未必中也易大傳論智常與神相配而中庸稱舜亦以大智目之則智之為言非天下之至神孰能與於此此說亦是但易大傳以下不必如此說智有淺深若孔子之金聲則智之極而無所不周者也學者則隨其知之所及而為大小耳豈可槩以為天下之至神乎學道者始於知之終於行之猶作樂者始以金奏終以玉節也孟子之意特取其終始言之不必於金玉上求其義此說亦是但孟子正取金玉以明始終智聖之義盖金聲有洪纖而玉聲則首尾純一故也不動心一也所養有厚薄所見有正否則所至有淺深觀曾子子夏子路孟子告子北宫黝孟施舍之議論趨操則可見矣此章之說更須子細玩索不可如此草草說過郭立之以不動心處已以擴充之學教人與王介父以髙明中庸之學析為二致何以異郭立之議論不可曉多類此尹和靖言其自黨論起不復登程氏之門伊川沒亦不弔祭則其所得可知矣此論未理㑹析為二致止恐其所謂不動心者未必孟子之不動心也答程允夫去東走湖湘講論之益不少然此事須是自做工夫於日用間行住坐卧處方自有見處然後從此操存以至於極方為已物爾敬夫所見超詣卓然非所可及近文甚多未暇録且令寫此一銘去此尤勝他文也密院闕期尚逺野性難馴恐不堪復作吏然亦姑任之不能預以為憂耳所示語孟諸說深見日來進學之力别紙一一答去更且加意如此探討不已當有得耳丁寧葉仁來時去取書恐更有商量處一一示及孤陋無所用心惟得朋友講論則欣然終日千萬有以慰此懐也可欲之謂善此句㝷常如何看因來諭及龜山易傳傳出時已缺乾坤只有草藁數叚不甚完備繋辭三四叚不絶筆亦不成書此有寫本謾附去然細看亦不甚滿人意不若程傳之厭飫充足潘子淳書頃亦見之盖雜佛老而言之者亦不必觀向所論蘇學之蔽吾弟相信未及今竟以為如何他時於已學上有見處此等自然氷消瓦觧無立脚處遊於聖人之門者難為言真不虚語正蒙已領近泉州刋行程氏遺書及二先生語録此間所録旦夕得本首當奉寄也此學寂寥士友不肯信向吾弟幸有其志又有其才每一得書為之增氣更願專一工夫期以數年當有用力處如艮齋銘便是做工夫底節次近日相與考證古聖所傳門庭建立此箇宗旨相與守之吾弟試熟味之有疑却望示諭秋試得失當已决早了此一事亦佳然是有命焉亦不足深留意也答程允夫可欲之說甚善但云可者欲之不可者不欲非善矣乎此語却未安盖只可欲者便是純粹至善自然發見之端學者正要於此識得而擴充之耳若云可者欲之則已是擴充之事非善所以得名之意也又謂能持敬則欲自寡此語甚當但純尾之意以為須先有所見方有下手用心處則又未然夫持敬用功處伊川言之詳矣只云但莊整齊肅則心便一一則自無非僻之干又云但動容貌整思慮則自然生敬只此便是下手用功處不待先有所見而後能也須是如此方能窮理而有所見惟其有所見則可欲之㡬瞭然在目自然樂於從事欲罷不能而其敬日躋矣伊川又言涵養須用敬進學則在致知又言入道莫如敬未有致知而不在敬者考之聖賢之言如此類者亦衆是知聖門之學别無要妙徹頭徹尾只是箇敬字而已又承苦於妄念而有意於釋氏之學此正是元不曾實下持敬工夫之故若能持敬以窮理則天理自明人欲自消而彼之邪妄將不攻而自破矣至於鳶飛魚躍之問則非他人言語之所能與亦請只於此用力自當見得盖子思言君子之道費而隱以至於天下莫能載莫能破因舉此兩句以形容天理流行之妙明道上蔡言之已詳想非有所不觧正是信不及耳欲信得及捨持敬窮理則何以哉所示宗𣲖不知何人為之昔子貢方人而孔子自謂不暇盖以學問之道為有急乎此者故也使此人而知此理則宜亦有所不暇矣無見於此則又何所依據而輕議此道之傳乎若云只據文字所傳則其中差互叢雜亦不可勝道今亦未暇泛論且以耳目所及與前輩所嘗論者言之圗内游定夫所傳四人熹識其三皆未嘗見游公而三公皆師潘子醇亦不云其出游公之門也此殆見游公與四人者皆建人而妄意其為師弟子耳至於張子韶喻子才之徒雖云親見龜山然其言論風㫖規摹氣象自與龜山大不相似胡文定公盖嘗深闢之而熹載其說於程氏遺書之後試深考之則世之以此學自名者其真偽皆可覈矣胡公答仲并語切中近時學者膏盲之病尤可發深省也三年無改只是說孝子之心如此非指事而言也存得此心則雖或不得已而改焉亦無害其為孝矣元祐之於熈豐固有所謂不得已者然未知當時諸公之心如何若蘇公野花啼鳥之句得無亦有幸禍之心耶答程允夫亦足以發顏子所聞入耳著心布乎四體形乎動静則足以發明夫子之言矣忠恕誠仁之别誠字以心之全體而言忠字以其應事接物而言此義理之本名也若曾子之言忠恕則是聖人之事故其忠與誠恕與仁得通言之恕本以推已及物得名在聖人則為以己及物矣侯氏說未嘗誤萬物者誠有病有德者必有言有仁者必有勇洵竊謂有德者未必有言然因事而言則言之中理可必也仁者未必有勇然義所當為則為之必力可必也故皆曰必有有德者未必以能言稱仁者未必以勇著然云云以下各如所說天下有道則庻人不議不議謂不得與聞國政非謂禁之使勿言也如陽虎之流以庻人而與國政者也恐不如此陽虎饋豚於孔子盖以大夫自處非庻人也蘇說之誤天何言哉四時行焉百物生焉天何言哉洵竊謂四時行百物生皆天命之流行其理甚著不待言而後明聖人之道亦猶是也行止語黙無非道者不為言之有無而損益也有言乃不得已為學者發耳明道先生言若於此上看得破便信是㑹禪亦非為此語中有禪盖言聖人之道坦然明白但於此見得分明則道在是矣不必參禪以求之也如此辨别甚善近世甚有病此言者每以此意曉之然不能如是之快也子夏曰仕而優則學學而優則仕洵竊謂仕優而不學則無以進德學優而不仕則無以及物仕優而不學固無足議者學優而不仕亦非聖人之中道也故二者皆非也仕優而不學如原伯魯之不說學是也學優而不仕如荷蓧丈人之流是也子夏之言似為時而發其言雖反覆相因而各有所指或以為仕而有餘則又學學而有餘則又仕如此則其序當云學而優則仕仕而優則學今反之則知非相因之辭也不知此說是否此說亦佳舊亦嘗疑兩句次序顛倒今云各有所指甚佳遺書載司馬温公嘗問伊川先生欲除一人為給事中云云洵竊謂若以公言之何嫌之足避豈先生於此亦未能自信邪前賢語黙之節更宜詳味吾輩只為不理㑹此等處故多悔吝耳近正有一二事可悔忽讀此問為之矍然上蔡語録中有真我之語洵竊謂不必如此立論恐啓後人好奇之弊盖毋我之我與我所固有之我字同義異本自分明只下一真字便似生事二程先生議論不如此上蔡之學所造固深此亦似是其小疵也答程允夫龜山曰宰我問三年之䘮非不知其為薄也只為有疑故不敢隱於孔子只此無隠便是聖人作處龜山之意當是如此然聖人之無隱與宰我之無隱亦當識其異處伊川舟行遇風端坐不為之變自以為誠敬之力烈風雷雨而舜不迷錯其亦誠敬之力歟舜之不迷此恐不足以言之善為說辭則於德行或有所未至善言德行則所言皆其自已分上事也此說得之善與人同以己之善推而與人同為之也舍己從人樂取諸人以為善以人之善為己之善也此說亦善賢賢事父母事君與朋友交此四者皆能若子夏之言可以言學矣然猶有雖曰未學之語若猶頼乎學者盖雖能如是而不知其所以能如是者從何而來則所謂行之而不著習矣而不察者也此句意思未見下落請詳言之方可議其得失也羞惡之心義之端故人不可使之無亷恥無㢘恥則無以起其好義之心若之何而可化聖人之於民必使之有耻且格者此也人自是不可無恥不必引羞惡好義為言也知敬親者其色必恭知愛親者其色必和此皆誠實之發見不可以偽為故子夏問孝孔子答之以色難據下文恐是言承順父母之色為難然此說亦好君子周而不比小人比而不周君子循理之所在周流天地之間無不可者其親之也理之所當親也其逺之也理之所當逺也何比之有尊賢容衆嘉善而矜不能此之謂周溺愛狥私黨同伐異此之謂比周周徧也比偏比也不必言周流天地之間謝上蔡曰慎言其餘慎行其餘皆有深意惟近思者可以得之盖言行有絲毫不慎則於理有絲毫之失則與天地不相似矣慎言其餘慎行其餘藉用白茅之意似此推言於理不害然恐未遽說到此也小人之陵上其初盖㣲僣其禮之末節而已及充其僭禮之心遂至於弑父弑君此皆生於忍也故孔子謂李氏八佾舞於庭是可忍也孰不可忍也敢僭其禮便是有無君父之心人有中雖不然而能勉彊於其外者君子當求之於其中中者誠也外者偽也故父在當觀其事父之志行者行其志而有成者也父沒則人子所以事父之大節始終可觀矣故父沒當觀其事父之行事父之行既已終始無愧而於三年之間又能不失其平日所以事父之道非孝矣乎此說甚好然文義似未安敏於事如必有事焉之事當為即為不失其㡬也事只是所行之事必有事焉不知尋常如何說請詳論之乃見所指之意大抵說經以彼明此固為簡便然或失其本意則彼此皆不分明所以貴於詳說也子貢曰貧而無諂至告諸徃而知來者此為學之法也亦可以見聖賢悟入深淺處凡窮理自有極致觀聖人如此發明子貢則可見矣此章論進學之實效非論悟入深淺也悟入兩字既是釋氏語便覺氣象入此不得大學所謂致知格物者非悟入之謂死生一理也死而為鬼猶生而為人也但有去來幽顯之異耳如一晝一夜晦明雖異而天理未嘗變也死者去而不來其不變者只是理非有一物常在而不變也更思之子聞之曰是禮也三字可以見聖人氣象宏大後世諸子所不及也詩三百一言以蔽之曰思無邪與闗雎樂而不滛哀而不傷皆聖人教人讀詩之法此類言之大畧不曉所主之意恐其間有差或致千里之繆也見實理是為智得實理是為仁惟仁者能得是理而以得實為仁則仁之名義隱矣而以得實下疑當有理字理之至實而不可易者莫如仁義禮智信非仁不成如孝弟禮樂恭寛信敏惠皆仁之用也此數句亦未見下落學者須先有所立故孔子三十而立又曰患所以立然則若何而能立曰窮理以明道則知所立矣立是操存踐履之效所說非是患所以立承不患無位而言盖曰患無以立乎其位云爾古者言之不出恥躬之不逮也如諸葛孔明草廬中對先主論曹孫利害其後輔蜀抗魏吳其言無一不酬者盖古人無侈心故無侈言如此所引事不相類劉器之問誠之目於温公曰當自不妄語入此易所謂脩辭立其誠也近之子謂公冶長可妻也長之可妻以其平昔之行也非以無罪䧟於縲紲為可妻也雖嘗陷於縲紲而非其罪則其平昔之行可知吾斯之未能信言我於此事猶未到不疑之地豈敢莅官臨政發之於用乎此事是何事子謂子貢曰女與囬也孰愈孔子以此問子貢則子貢之才亦顏曾之亞然其所以不及二子者正在於以見聞為學孔子未欲以見聞外事與之故姑云吾與女弗如他日乃警之曰汝以予為多學而識之者歟道非多學所能識則聞一知十亦非所以為顏子子貢言聞一知二知十乃語知非語聞也見聞之外復謂何事請更言之忠與清皆仁之用有覺於中忠清皆仁無覺於中仁皆忠清以覺為仁近年語學之大病如此四句尤為乖戾盖若如此則仁又與覺為二而又在其下矣又敬不違非從父之令謂事親以禮無違於禮也所謂起敬起孝見志不從又敬不違則不得已而從父之令者有矣勞而不怨則所謂悅則復諌不敢疾怨也若不從而遂違之則父子或至相夷矣居簡而行簡則有志大畧小之患以之臨事必有怠忽不舉之處居敬而行簡則心一於敬不以事之大小而此敬有所損益也以之臨事必簡而盡居敬則明燭事㡬而無私意之擾故其行必簡為仁固難歟曰孔子不以易啓人之忽心亦不以難啓人之怠心故曰仁逺乎哉我欲仁斯仁至矣又曰為之難言之得無訒乎仁固不逺然不欲則不至仁固難為之則無難致知以明之持敬以養之此學之要也不致知則難於持敬不持敬亦無以致知二者交相為用固如此然亦當各致其力不可恃此而責彼也丘之禱乆矣聖人與天地合其德與鬼神合其吉凶我即天地鬼神天地鬼神即我何禱之有自他人言之謂聖人如此可也聖人之心豈以此而自居耶細味丘之禱也久矣一句語意深厚聖人氣象與天人之分自求多福之意皆可見以能問於不能以多問於寡有若無實若虚犯而不校此聖人之事也非與天同量者不能顏子所以未逹一間者正在此故第曰嘗從事於斯非謂已能爾也此正是顏子事若聖人則無如此之迹有如此說處便有合内外之意如舜善與人同舍己從人好察邇言用中於民必兼言之惟顏子行而未成故其事止於如此耳子絶四盖以此教人也故曰毋毋者戒之之辭毋史記作無當以無為正未見其止也學必止於中而止非息也於中止行耳百尺竿頭猶須進歩豈有止法乎據上下章止字皆但為止息之意學止於中乃止其所之止非止息之意字同用異各審其所施竿頭進歩狂妄之言非長於譬喻者四科乃述論語者記孔氏門人之盛如此非孔子之言故皆字而不名與上文不當相屬或曰論語之書出於曾子有子之門人然則二子不在品題之列者豈非門人尊師之意歟四科皆從於陳蔡者故記者因夫子不及門之歎而列之君子之道本末一致灑掃應對之中性與天道存焉行之而著習之而察則至矣孰謂此本也宜先而可傳此末也宜後而可倦哉譬諸草木其始植也為之區别而已灌溉之長養之自芽蘖以至華實莫不有序豈可誣也然學者多慕逺而忽近告之以性與天道則以為當先而傳教之以灑掃應對則以為當後而倦焉躐等陵節相欺以為髙學之不成常必有此惟聖人下學上逹有始有卒故自志學充而至於從心不踰矩自可欲之善充而至於不可知之神莫不有序而其成也不可禦焉觀孟子謂徐行後長者為堯舜之孝悌則灑掃應對進退之際苟行著而習察焉烏有不可至於聖者子夏言我非以灑掃應對為先而傳之非以性命天道為後而倦教但道理自有大小之殊不可誣人以其所未至惟聖人然後有始有卒一以貫之無次序之可言耳二先生之說亦是如此但學者不察一例大言無本末精粗之辨反使此叚意指都無歸宿須知理則一致而其教不可闕其序不可紊耳盖惟其理之一致是以其教不可闕其序不可紊也更細思之篤實也學當論其實論其實則與君子者乎與色莊者乎君子有實者也色莊無實者也得之克己之道篤敬致知而已非禮勿視勿聽勿言勿動篤敬也所以知其為非禮者致知也克己乃篤行之事固資知識之功然以此言之却似不切只合且就操存持養處說方見用力切要處言顧行行顧言故古者言之不出恥躬之不逮也中庸曰力行近乎仁論語司馬牛問仁子曰為之難言之得無訒乎答司馬牛之意更宜思之質直而好義則能修身察言而觀色則能知人内能修身外能知人而又持之以謙此盛德之士也雖欲不逹得乎此與禄在其中同意名實相稱之謂逹有名無實之謂聞察言觀色如孟子所謂聽其言也觀其眸子人焉廋哉孔子所言三句皆誠實退讓之事能如此則不期逹而自逹矣非謂能修身知人而持之以謙也說知人猶逺正意子路問政子曰先之勞之請益曰無倦凡不敎而殺不戒視成慢令致期皆無以先之也既有以先之又當有以勞之帝堯曰勞之來之凡生之而不傷厚之而不困皆勞之之謂也此堯舜之政也其要在力行耳故復告之以無倦先之謂以身率之勞之謂以恩撫之二者苟無誠心久必倦矣故請益則曰無倦而已簿書期㑹各有司存然後吾得以畱意教化之事故曰先有司先有司然後綱紀立而責有所歸答程允夫張子曰天性在人猶水性之在氷凝釋雖異其為物一也觀張子之意似謂水凝而為氷一凝一釋而水之性未嘗動氣聚而為人一聚一散而人之性未嘗動此所以以氷喻人以水性喻天性也然極其說恐未免流於釋氏兄長以為如何程子以為横渠之言誠有過者正謂此等發耳觀孔子子思孟子論性似皆不如此康節云性者道之形體也心者性之郛郭也身者心之區宇也物者身之舟車也鬼神之理某向嘗蒙指示大意云氣之來者為神徃者為鬼天地曰神曰祗氣之來者也人曰鬼氣之徃者也此說與張子所謂物之始生氣日至而滋息物生既盈氣日反而游散至之謂神以其伸也反之為鬼以其歸也之意同近見兄長所著中庸說亦引此義張子所謂物者通言萬物耶抑特指鬼神也若特指鬼神則所謂物者如易大傳言精氣為物之物爾若通言萬物則上四句乃泛言凡物聚散始終之理如此而下四句始正言鬼神也精氣為物嚮亦嘗與季通講此渠云精氣為物者氣聚而為人也遊魂為變者氣散而為鬼神也此說如何更望詳賜批教易大傳所謂物張子所論物皆指萬物而言但其所以為此物者皆隂陽之聚散耳故鬼神之德體物而不可遺也所謂氣散而為鬼神者非是答程允夫程子曰鬼神者天地之妙用造化之迹也凡氣之徃來聚散無非天地之用而鬼神尤其妙者也然既已動於氣見於用矣是形而下者也故曰造化之迹吕氏曰萬物之莫不有是氣氣也者神之盛也莫不有是魄魄也者鬼之盛也故人亦鬼神之㑹爾中庸說曰鬼神之為德雖不可以耳目見聞接然萬物之聚散始終無非二氣之屈伸徃來者是鬼神之德為物之體而無物能遺棄之者也向按此二說則張子所謂物之始生氣日至而滋息物生既盈氣日返而游散乃泛言萬物聚散始終之理如此而鬼神者亦物之一爾但其德在物之中為尤盛故為物之體而莫有能遺之者人亦物之一也其斂散終始亦二氣之屈伸徃來與鬼神同故吕氏曰人亦鬼神之㑹耳然則非特人也凡天地之間禽獸草木之聚散始終其理皆如此也其理一而其得於氣者有隱顯偏正厚薄之不同兹其所以有鬼神人物之異歟謝氏曰鬼神是天地妙用流行充塞觸目皆是欲其有則有欲其無則無鬼神氣也人心之動亦氣也以氣感氣故能相為有無吕氏曰鬼神周流天地之間無所不在雖寂然不動然因感而必通即此意也詳此兩叚皆是人物鬼神各為一物是殆見廟中泥塑鬼神耳吕氏所謂人亦鬼神之會者甚精更詳細推之答程允夫太極觧義以太極之動為誠之通麗乎陽而繼之者善屬焉静為誠之復麗乎隂而成之者性屬焉其說本乎通書而或者猶疑周子之言本無分𨽻之意陽善隂惡又以類分又曰中也仁也感也所謂陽也極之用所以行也正也義也寂也所謂隂也極之體所以立也或者疑如此分配恐學者因之或漸至於支離穿鑿不審如何此二義但虚心味之久當自見若以先入為主則辯說紛拏無時可通矣仁義中正洵竊謂仁義指實德而言中正指體叚而言然常疑性之德有四端而聖賢多獨舉仁義不及禮智何也中正即是禮智觧義曰程氏之言性與天道多出此圖然卒未嘗明以此圖示人者疑當時未有能受之者也是則然矣然今乃遽為之說以傳之是豈先生之意耶當時此書未行故可隱今日流布已廣若不說之却令學者枉生疑惑故不得已而為之說爾濂溪作太極圖發明道化之原横渠作西銘掲示進為之方然二先生之學不知所造為孰深此未易窺測然亦非學者所當輕議也程子曰無妄之謂誠不欺其次矣無妄是聖人之誠不欺是學者之誠如何程子此叚似是名理之言不為人之等差而發也近思録載横渠論氣二章其說與太極圖動静隂陽之說相出入然横渠立論不一而足似不若周子之言有本末次第也横渠論氣與西銘太極各是發明一事不可以此而廢彼其優劣亦不當輕議也程子曰孔子言語句句是自然孟子言語句句是事實所謂事實者豈非是當行可行底事耶然未可謂自然者豈以其猶有思焉而得之歟大槩如此更翫味之所教學者看精義說甚善然竊以為學者須先從師友講貫粗識梗槩然後如此用工不然恐眩於衆說之異同也此乃憚煩欲速之論非所敢聞然亦非獨此書為然若果有志無書不可讀但能剖析精微翫味久熟則衆說之異同自不能眩而反為吾磨礪之資矣答程允夫昨來疑義久不奉報然後來長進又見得前說之是非也每與吾弟講論覺得吾弟明敏看文字不費力見得道理容易分明但以少却玩味踐履功夫故此道理雖看得相似分明却與自家身心無干渉所以滋味不長久纔過了便休反不如遲鈍之人多費功夫方看得出者意思却久逺此是本原上一大病非一詞一義之失也記得向在髙沙因吾弟說覺得如此講論都無箇歸宿處曾奉答云講了便将來踐履即有歸宿此語似有味更告思之草此為報不能多及餘惟力學自愛答程允夫版籍固所職然勢有所壓而不得為則亦無可奈何潘憲却要理㑹事俟出入少定試更白之咸能相聽亦百里之幸也版籍分明自是縣道理財之急務今人只見重疉催稅之利而不察鄉吏隱瞞之害故不肯整理此是上下俱落在厮兒計中甚可歎也石鼓之役意思甚好但恐擇之却難處耳魏公好佛敬夫無如之何此正明道先生所謂今之入人因其髙明所以為害尤甚不知這些邪見是壞却世間多少好人破却世間多少好事也誠字得力甚善然知之亦已晚矣凡百就實事上更着力為佳答黄子厚知讀精義有得尤以為喜大指固不出二先生之說然並觀博考見其淺深疎宻於毫釐之間尤能發人意思使人益信二先生之說不可易也忠信只是一事但自我而觀謂之忠自彼而觀謂之信此先生所以有盡已為忠盡物為信之論也鄙意如此試思之然否却見諭登山之興前日失之於跬歩之間今復冐暑而徃則有所不能矣或恐欲㝷舊約即請見過却議行計也伯恭甚愛上嵐山水前日經行適值風雨尤快心目也考異程允夫問答此其心跡之間跡一作術此句更索消詳索一作當至於鳶飛魚躍之問問一作間理之至實理一作道晦庵集卷四十一欽定四庫全書晦菴集卷四十二宋朱子撰書知舊門人問答答
