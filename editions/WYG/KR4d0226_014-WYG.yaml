body:
  text: 奏劄戊申延和奏劄一臣聞昔者帝舜以百姓不親五品不遜而使契為司徒之官教以人倫父子有親君臣有義夫婦有别長㓜有序朋友有信又慮其教之或不從也則命臯陶作士明刑以弼五教而期於無刑焉盖三綱五常天理民彛之大節而治道之本根也故聖人之治為之教以明之為之刑以弼之雖其所施或先或後或緩或急而其丁寧深切之意未嘗不在乎此也乃若三代王者之制則亦有之曰凡聽五刑之訟必原父子之親立君臣之義以權之盖必如此然後輕重之序可得而論淺深之量可得而測而所以悉其聰明致其忠愛者亦始得其所施而不悖此先王之義刑義殺所以雖或傷民之肌膚殘民之軀命然刑一人而天下之人聳然不敢肆意於為惡則是乃所以正直輔翼而若其有常之性也後世之論刑者不知出此其陷於申商之刻薄者既無足論矣至於鄙儒姑息之論異端報應之説俗吏便文自營之計則又一以輕刑為事然刑愈輕而愈不足以厚民之俗往往反以長其悖逆作亂之心而使獄訟之愈繁則不講乎先王之法之過也臣伏見近年以來或以妻殺夫或以族子殺族父或以地客殺地主而有司議刑卒從流宥之法夫殺人者不死傷人者不刑雖二帝三王不能以此為治於天下而況於其繫於父子之親君臣之義三綱之重又非凡人之比者乎然臣非敢以此之故遂勸陛下深於用法而果於殺人也但竊以為諸若此類涉於人倫風化之本者有司不以經術義理裁之而世儒之鄙論異端之邪説俗吏之私計得以行乎其間則天理民彛㡬何不至於泯滅而舜之所謂無刑者又何日而可期哉故臣伏願陛下深詔中外司政典獄之官凡有獄訟必先論其尊卑上下長㓜親疎之分而後聽其曲直之辭凡以下犯上以卑凌尊者雖直不佑其不直者罪加凡人之坐其有不幸至於殺傷者雖有疑慮可憫而至於奏讞亦不許輙用擬貸之例又詔儒臣博采經史以及古今賢哲議論及於教化刑罰之意者刪其精要之語聚為一書以教學古入官之士與凡執法治民之官皆使畧知古先聖王所以勅典敷教制刑明辟之大端而不敢隂為姑息果報便文之計則庶㡬有以助成世教而仰稱陛下好生惡死期於無刑之本意取進止延和奏劄二臣聞獄者民命之所繫而君子之所盡心也今天下之獄死刑當決者皆自縣而達之州自州而達之使者其有疑者又自州而上之朝廷自朝廷而下之棘寺棘寺讞議而後致辟焉其維持防閑可謂周且審矣然而憲臺之所詳覆棘寺之所讞議者不過受成於州縣之具獄使其文案粗備情節稍圓則雖顛倒是非出入生死盖不得而察也是故欲清庶獄之源者莫若遴選州縣治獄之官今縣之獄委於令其選固已精矣而未必皆得人其弊未易革也若州獄則今銓格凡選人任滿有舉主闗陞者方注繁難令録其慮盖已詳矣然注司理者乃不用此令而近制唯進納癃老之人然後不得注擬此外則常調闗陞雖昏繆疾病之人皆得而為之甚至於流外補官若省部胥史亦得而為之彼以薦舉闗陞者固未必盡得才能公正之人然比之昏繆疾病無善可稱與夫胥史之入官者則有間矣盖昏繆疾病之人茍且㣲禄唯知自營其於獄事䝉成吏手漫不加省而胥史之入官者又或狃於故習與吏為徒販鬻走弄無所不至故州郡小大之獄往往多失其平怨讟咨嗟感傷和氣上為聖政之累莫此為甚臣愚欲望陛下明詔銓曹更定選格凡州郡兩獄官專注任滿有舉主闗陞人或應格不足則次任任滿銓試中第二等以上人其常調闗陞及省部胥史並不得注擬見在任者非舉主闗陞人即令守倅銓量如委昏繆疾病即保明聞奏特與祠禄其未到人候赴上日亦從守倅銓量方許放上若守倅徇私失實即許監司劾奏罷免所有省部胥史雖已注官待次並令赴部别與擬授庶㡬治獄之官其選少清各知任職仰副陛下欽恤之意取進止貼黄臣契勘縣獄止是知縣獨員推鞫一或不得其人則拆換款詞變亂情節無所不至今既未能盡變銓法則亦不容無少更革欲望睿慈詳酌明降指揮令縣丞同行推訊無丞處即用主簿仍遇大囚到獄即限兩日内具入門欵先次飛申本州及提刑司照㑹庶㡬粗革舊弊天下幸甚延和奏劄三臣竊見諸路提刑司所管拘催州縣經總制錢盖前代之所無而祖宗盛時亦未之有特起於宣和末年倉卒用兵權宜措畫當時建議之臣方且自以為功而其兄聞之乃為哭於先廟以為作俑之禍且及子孫渡江以後雖知其弊然費出愈繁遂不能罷復有増加以至於今乃為大農之經賦有司不復敢有蠲除之議然其始者亦但計其出納多寡之實數而隨以取之則事雖失體而未有甚害及紹興中推行經界之法民間違限契約悉出投印故一二年間此錢之額倍於常嵗逮其畢事則便復常數而無復前日之羨矣而一時乃有憸侫掊克之人輙為比較之説以誤朝聽使凡嵗入經總制錢悉以經界之年為額其後雖或知其非義而小變之然猶必使趂及一年所收最多之數至其甚無藝者則雖或災傷年分檢放倚閣苖米税錢已無所入而所謂經總制錢者版曹總所猶不肯與之蠲除上下相臨轉相逼廹下吏無所措其手足則其勢必至於巧為名色取之於民以求幸免司察之官雖知其然然既利其嵗額之盈則亦不容有所何問顧猶不足以及數則遂不過将新盖舊轉後為前嵗月愈深逋負日積大郡所欠十數萬緡小郡亦不下一二萬數官吏操切日益嚴峻而莫有知其事之本原者臣愚不知州縣之煎熬局促果何日而少紓斯民之歎息愁怨果何時而少息也陛下厚徳深仁愛民如子疾痛疴癢無細不知抑搔按摩無逺不及顧偶未聞此法之弊而已故臣輙敢冐昧以聞伏望聖慈深照本末特詔有司先将災傷年分檢放倚閣苗税數内所收經總制額盡依分數豁除然後别詔大臣深圖所以節用裕民之術計論經總制錢合與不合立額比較之利病而罷行之以幸天下臣不勝大願取進止延和奏劄四臣竊見江西路諸州舊有科罰之弊盖因嵗入有限而費出無常是以不免巧取於民以備支發凡是百姓有事入門不問曲直恣意誅求無有藝極民間受弊不可勝言為監司州縣者欲一切繩之以法則財計頓闕州縣不可復為雖有良吏亦無以免若一切恣之不問則法廢不行民怨無告而貪虐之吏更復並緣以濟其私為害愈甚前此漕司盖嘗頗捐羨錢以補州縣嵗計之闕而禁其科罰然後逺民得以粗安然聞其間亦有循習舊態未能盡革去處欲望聖慈特降睿㫖令本路帥臣諸司博訪事宜共行措畫逐一條奏以俟聖裁庶㡬官用不乏民賦有經仰寛宵旰之憂潛消災沴之氣一路幸甚取進止延和奏劄五臣竊惟陛下以大有為之資奮大有為之志即位之初慷慨發憤恭儉勤勞務以内修政事外攘夷狄汛掃陵廟恢復土疆為己任如是者二十有七年於兹矣而因循荏苒日失嵗亡了無尺寸之效可以仰酬聖志下慰人望不審陛下亦嘗中夜以思而求其所以然之説耶以為所任者非其人則陛下之神明豈可謂所任盡非其人以為所由者非其道則陛下之神聖豈可謂所由盡非其道以為規模不定則陛下之規模嘗定矣以為志氣不立則陛下之志氣嘗立矣然且若是何耶臣誠愚賤嘗為陛下惑之故嘗反覆而思之無乃燕閒蠖濩之中虚明應物之地所謂天理者有未純所謂人欲者有未盡而然歟天理有未純是以為善常不能充其量人欲有未盡是以除惡常不能去其根為善而不能充其量除惡而不能去其根是以雖以一念之頃而公私邪正是非得失之㡬未嘗不朋分角立而交戰於其中故所以體貌大臣者非不厚而便佞側媚之私顧得以深被腹心之寄所以寤寐豪英者非不切而柔邪庸繆之輩顧得以久竊廊廟之權非不樂聞天下之公議正論而亦有時而不容非不欲堲天下之䜛説殄行而亦未免於誤聽非不欲報復陵廟之讎耻而或不免於畏怯茍安之計非不欲愛養生靈之財力而或未免於歎息愁怨之聲凡若此類不一而足是以所用雖不至盡非其人而亦不能盡得其人所由雖不至盡非其道而亦不能盡合其道規模盖嘗小定而卒至於不定志氣盖嘗小立而卒至於不立虚度嵗月以至於今非獨不足以致治而或反足以召亂非獨不可以謀人而實不足以自守非獨天下之人為陛下惜之臣知陛下之心亦不能不以此為恨也間者天啟聖心日新盛徳奮發英斷整頓綱維盖有意乎天理之純而人欲之盡矣然臣竊以其事觀之則猶恐其未免乎交戰之患也盖詰傳寫漏洩文字之罪則便嬖側媚之流知所懼矣然而去者未逺而復還存者更進而愈盛則知陛下親寵此曹之意未衰也罷累年竊位盗權之姦則柔邪庸繆之黨知所懼矣然而希次補者襲其迹以僥倖而不訶當言責者懐其私以緘黙而不問則知陛下委任此輩之意猶在也増置諫員斥逺邪佞則兼聽之美固有以異乎前日矣然可諫之端無窮則其或繼進而愈切未知陛下果能納而用之否也辨明誣枉慰撫孤直則燭幽之明固有以異乎前日矣然造言之人無責則其或㨗出而益巧未知陛下果能逺而絶之否也謝却傲使嘉奨壮圖宜若可以勵茍安之志矣而置将之權旁出奄寺軍政敗壊士卒愁怨則恐未有以待天下之變振廩蠲租重禁科擾宜若可以寛疲民之力矣而監司不擇守令貪殘政煩賦重元元失職則恐未可以固有邦之本即是數者而論之則是所謂天理者雖若小勝而所謂人欲者終未盡除也夫以陛下之神聖仁明涖政之久圖治之切宜其晏然髙拱以享功成治定之安久矣而嵗月逾邁四顧茫然隂陽方争勝負未決不知将復何日何時而可以粗見聖治之成也耶聞之道路比來士大夫之進説者多矣然不深其本而徒指其末不先其難而姑就其易毛舉天下之細故而不本於陛下之身營營馳騁乎事為利害之末流臣恐其未足以端出治之本清應物之源以贊陛下正大宏逺之圖而使天下之事悉如聖志之所欲也昔者舜禹孔顔之間盖嘗病此而講之矣舜之戒禹曰人心惟危道心惟㣲惟精惟一允執厥中而必繼之曰無稽之言勿聽弗詢之謀勿庸謹乃有位敬修其可願四海困窮天禄永終孔子之告顔淵既曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎哉而又申之曰非禮勿視非禮勿聽非禮勿言非禮勿動既告之以損益四代之禮樂而又申之曰放鄭聲逺佞人鄭聲淫佞人殆嗚呼此千聖相傳心法之要其所以極夫天理之全而察乎人欲之盡者可謂兼其本末巨細而舉之矣兩漢以來非無願治之主而莫克有志於此是以雖或隨世以就功名而終不得以與夫帝王之盛其或耻為庸主而思用力於此道則又不免蔽於老子浮屠之説静則徒以虚無寂滅為樂而不知有所謂實理之原動則徒以應緣無礙為達而不知有所謂善惡之機是以日用之間内外乖離不相為用而反以害於政事盖所謂千聖相傳心法之要者於是不復講矣臣愚不肖竊願陛下即今日之治效泝而上之以求其所以然之故而於舜禹孔顔所授受者少留意焉自今以往一念之萌則必謹而察之此為天理耶為人欲耶果天理也則敬以擴之而不使其少有壅閼果人欲也則敬以克之而不使其少有凝滯推而至於言語動作之間用人處事之際無不以是裁之知其為是而行之則行之惟恐其不力而不當憂其力之過也知其為非而去之則去之惟恐其不果而不當憂其果之甚也知其為賢而用之則任之惟恐其不專聚之惟恐其不衆而不當憂其為黨也知其為不肖而退之則退之惟恐其不速去之惟恐其不盡而不當憂其有偏也如此則聖心洞然中外融徹無一亳之私欲得以介乎其間而天下之事将惟陛下之所欲為無不如志矣詩云豐水有芑武王豈不仕貽厥孫謀以燕翼子武王烝哉矧今祖宗光明盛大之業付在陛下将以傳之無窮四海之内所望於陛下者不但數世之仁而已書曰若藥不瞑眩厥疾不瘳惟陛下深留聖志痛自刻勵而力行之使萬世之後猶可以為後聖法程則宗社神靈永有依託萬方黎獻永有歸往天下幸甚天下幸甚臣孤陋寡聞學無所就前此兩䝉賜對所言大意與此畧同辭不别白㫖不分明曽不足以上悟聖心而陛下哀憐不忍終棄使得復望清光環視其中無他所有輙繹舊聞復以此進僣妄狂率罪當萬死伏惟陛下財赦不勝恐懼取進止甲寅行宫便殿奏劄一臣竊聞之天下之事有常有變而其所以處事之術有經有權君臣父子定位不易事之常也君令臣行父傳子繼道之經也事有不幸而至於不得盡如其常則謂之變而所以處之之術不得全出於經矣是則所謂權也當事之常而守其經雖聖賢不外乎此而衆人亦可能焉至於遭事之變而處之以權則唯大聖大賢為能不失其正而非衆人之所及也故孔子曰可與立未可與權盖言其難如此而夷齊季札之徒所以輕千乘之國以求即乎吾心之所安寧隕其身亡其國而不敢失其區區之節者亦為此也乃者天運艱難國有大咎天變為之見於上地變為之作於下人情為之哀恫拂鬱而皆有離叛散亂之心方此之時宗廟社稷危於綴旒是則所謂天下之大變而不可以常理處焉者也是以太皇太后躬定大䇿皇帝陛下寅紹丕圖未及號令之間不越須㬰之頃而鄉之危者安離者合天下之勢翕然而大定此亦可謂處之以權而庶㡬乎有以不失其正者矣然自頃至今亦既三月而天變未盡消地變未盡弭君親之心未盡懽學士大夫羣黎百姓或反不能無疑於逆順名實之際至於禍亂之本又已伏於㝠㝠之中特待時而發耳臣雖至愚亦知竊為陛下憂之而未知其計之所出故嘗反覆以思而參以所聞則尚猶有可諉者亦曰陛下之心前日未嘗有求位之計今日未嘗忘思親之懐而已爾嗚呼此則所謂道心㣲妙之全體天理發用之本然而所以行權而不失其正之根本也誠即是心以充之則孔子所謂求仁得仁而無怨孟子所謂終身訢然樂而忘天下者臣有以知陛下之不難矣借曰天命神器不可以無傳宗廟社稷不可以無奉則轉禍為福易危為安亦豈可以舎此而他求哉充吾未嘗求位之心則可以盡吾負罪引慝之誠充吾未嘗忘親之心則可以致吾温凊定省之禮始終不越乎此而大倫可正大本可立矣陛下誠能動心忍性深自抑損所以自處常如前日未嘗有位之時内自宫掖燕私之奉服食器用之須不敢一毫有所加於潛邸之舊外至百辟多儀之享恩澤匪頒之式不敢一旦而全享乎萬乘之尊專務積其誠意期以格乎親心然後濬發徳音痛自克責嚴飭羽衛益勤問安視膳之行十日一至而不得見則繼以五日五日一至而不得見則繼以三日三日而不得見則二日而一至以至于無一日而不一至焉仰伏寝門怨慕號泣雖勞且辱有所不憚然而親心猶未底豫慈愛猶未復初逆順名實之疑不渙然而冰釋則臣不信也若夫災異之變禍亂之㡬有未盡去則又在乎陛下凝神恭黙深監古先日與大臣講求政理可否相濟惟是之從必使發號施令無一不出乎朝廷進退人材無一不合乎公論不為偏聽以啟私門則聖徳日新聖治日起而天人之應不得違釁孽之萌不得作矣今日之計莫大於此惟陛下深留聖意而亟圖之若復因循日復一日所以行權者遂失其正則臣恐禍變之來不但禮樂不興刑罰不中而已也人心易離天命難保厥監不逺深可畏懼臣山野戅愚不識忌諱罪當萬死惟陛下寛之取進止行宫便殿奏劄二臣竊惟皇帝陛下祇膺駿命恭御寳圖正位之初未遑他事而首以博延儒臣討論經藝為急先之務盖将求多聞以建事學古訓而有獲非若記問愚儒詞章小技誇多以為博鬭靡以為工而已也如是則勸講之官所宜遴選顧乃不擇誤及妄庸則臣竊以為過矣盖臣天資至愚極陋雖嘗挾䇿讀書妄以求聖賢之遺㫖而行之不力老矣無聞况於帝王之學則固未之講也其何以當擢任之寵而辱顧問之勤乎是以聞命驚惶不敢奉詔然嘗聞之人之有是生也天固與之以仁義禮智之性而教其君臣父子之倫制其事物當然之則矣以其氣質之有偏物欲之有蔽也是以或昧其性以亂其倫敗其則而不知反必其學以開之然後有以正心修身而為齊家治國之本此人之所以不可不學而其所以學者初非記問詞章之謂而亦非有聖愚貴賤之殊也以是而言則臣之所嘗用力固有可為陛下言者請遂陳之盖為學之道莫先乎窮理窮理之要必在於讀書讀書之法莫貴於循序而致精而致精之本則又在於居敬而持志此不易之理也夫天下之事莫不有理為君臣者有君臣之理為父子者有父子之理為夫婦為兄弟為朋友以至於出入起居應事接物之際亦莫不各有理焉有以窮之則自君臣之大以至事物之㣲莫不知其所以然與其所當然而亡纎芥之疑善則從之惡則去之而無毫髮之累此為學所以莫先於窮理也至論天下之理則要妙精㣲各有攸當亘古亘今不可移易唯古之聖人為能盡之而其所行所言無不可為天下後世不易之大法其餘則順之者為君子而吉背之者為小人而凶吉之大者則能保四海而可以為法凶之甚者則不能保其身而可以為戒是其粲然之跡必然之效盖莫不具於經訓史冊之中欲窮天下之理而不即是而求之則是正墻靣而立爾此窮理所以必在乎讀書也若夫讀書則其不好之者固怠忽間斷而無所成矣其好之者又不免乎貪多而務廣往往未啟其端而遽已欲探其終未究乎此而忽已志在乎彼是以雖復終日勤勞不得休息而意緒怱怱常若有所奔趨迫逐而無從容涵泳之樂是又安能深信自得常久不厭以異於彼之怠忽間斷而無所成者哉孔子所謂欲速則不達孟子所謂進鋭者退速正謂此也誠能鑒此而有以反之則心潛於一久而不移而所讀之書文意接連血脉通貫自然漸漬浹洽心與理㑹而善之為勸者深惡之為戒者切矣此循序致精所以為讀書之法也若夫致精之本則在於心而心之為物至虚至靈神妙不測常為一身之主以提萬事之綱而不可有頃刻之不存者也一不自覺而馳騖飛揚以徇物欲於軀殻之外則一身無主萬事無綱雖其俯仰顧盻之間盖已不自覺其身之所在而況能反覆聖言參考事物以求義理至當之歸乎孔子所謂君子不重則不威學則不固孟子所謂學問之道無他求其放心而已矣者正謂此也誠能嚴㳟寅畏常存此心使其終日儼然不為物欲之所侵亂則以之讀書以之觀理将無所往而不通以之應事以之接物将無所處而不當矣此居敬持志所以為讀書之本也此數語者皆愚臣平生為學艱難辛苦已試之效竊意聖賢復生所以教人不過如此不獨布衣韋帶之士所當從事盖雖帝王之學殆亦無以易之特以近年以來風俗薄陋士大夫間聞此等語例皆指為道學必排去之而後已是以食芹之美無路自通每抱遺經徒竊慨歎今者乃遇皇帝陛下始初清明無他嗜好獨於問學孜孜不倦而臣當此之時特䝉引對故敢忘其固陋而輙以為獻伏惟聖明深賜省覽試以其説驗之於身蚤寤晨興無忘今日之志而自彊不息以緝熈於光明使異時嘉靖邦國如商髙宗興衰撥亂如周宣王以著明人主講學之效卓然為萬世帝王之標凖則臣雖退伏田野與世長辭與有榮矣何必使之勉彊盲聾扶曳跛躄以汙近侍之列而為盛世之羞哉干冐宸嚴不勝戰慄惟陛下留神財幸取進止行宫便殿奏劄三臣前任備員潭州兼管荆湖南路安撫司事竊見本路土瘠民貧無他生理而州縣嵗計入少出多往往例於常賦之外多收加耗重折價錢尚且入不支出公私俱困昨來諸司察見其弊累嘗蠲減務寛民力連年所放盖已不貲而州縣起發上供支遣俸給諸色費用尚仍舊額畧無所損沿此官司已是狼狽不可支吾或有非泛賞給調發支賜若更差到諸班換授歸正雜流補官之人復有增加則愈見逼迫無以為計臣近者嘗與漕臣何異備奏全州守臣韓邈所申乞減添差員數可見一端至於其他州縣大畧往往類此不唯官吏茍逭目前多方趣辦不暇為國家赤子計而按察之官知其甚不得已以至於此亦不忍盡法按治無由發覺竊念本路東望朝廷逺在二千餘里之外而北據重湖南撫諸峒形勢所闗亦非他道之比萬一民貧不堪誅剥一旦屯結自為擾亂而盜賊蠻猺相挺而起則不知議者何以處之臣自到任以至去官僅及三月雖未及詳宻究其曲折然其大勢如此亦不待智者而後知矣故嘗深以為憂欲為料理但以召還之遽未暇子細詢考畫一奏聞今者既䝉賜對又不敢不為陛下一言欲望聖慈深察一視同仁特詔本路帥臣監司更以前日全州所申事理通之諸郡並行均節将大叚闕乏去處特與痛加退減指定奏聞取㫖行下庶㡬州得以恤其縣縣得以寛其民而其間或有不奉詔者亦且無詞以逃其罪則遐逺之民均被實惠而寛大之恩不但為掛墻壁之具而已臣奉使亡状不早上聞以至今日死有餘罪伏惟矜赦而亟圖之則一路幸甚取進止行宫便殿奏劄四臣昨於去冬伏䝉聖恩除知潭州方具辭免未及起發即聞湖北猺人侵擾邵州界分及今年春伏奉聖㫖不許辭免臣遂即日就道比及到官湖北已行進兵攻討賊氣漸衰遂就招降一向寧帖却據邵州守臣潘燾申到見得從前邊防全無措置以致小醜敢肆侵犯因條畫到移置寨柵増撥戍兵利害數條臣與漕臣何異潘燾所申頗有條理遂行詢究見得委的合行措置遂已具奏乞賜施行竊計已徹天聽欲望聖慈明詔大臣早賜處分及何異潘燾在任之日依元所申日下措置其提刑趙不迂先次申奏亦與臣等所乞無大異同欲乞并行劄下公共相度從長區處庶使姦賊畏威邊民安業實一方永逺之利取進止貼黄臣昨招到猺賊蒲來矢等已赴安撫司公參其人衰弱初無能解但恃險阻敢爾跳梁今已歸降則於事理不得不加存恤欲乞聖慈行下本司常切照管毋失大信庶㡬異日復有此輩易以招納伏候聖㫖行宫便殿奏劄五臣伏見潭州城壁昨因敵騎殘破之後剥落摧圮五十餘年不曾修築近者守臣周必大方議補砌已䝉朝廷支降度牒一百道買到錢八萬貫未及興工而必大奉祠就第臣到任之初即行㸃檢其錢已支六萬餘貫買到甎灰見在餘錢不多不足為雇工犒設之費又元科只擬用本州諸色軍兵共不過三千餘人竊慮不堪久役勞苦而其城廣闊中間多有空閑無民居處若盡修築亦無所用枉費工力初已尅定七月下旬起工而偶值小旱繼以霖雨旋遭國哀人情洶洶未敢容易然念興作有緒所買甎灰費錢已多若遂因循便成廢棄亦又可惜故自登極赦後事勢稍定即别委官再行計度擬将其城北面一帶荒逈去處量加成減向裏别築盖如此則不唯目今工力易辦将來萬一不測有警亦易防守但未及子細條畫而臣忽奉聖恩召令奏事竊恐新任守臣未知始末欲望聖慈行下詳審計度如臣妄議有可施行即乞睿㫖再給度牒雜募軍民促減北邊近裏修築乘此樂嵗擇日興工亦為一方永久不虞之備取進止乞進徳劄子臣竊聞周武王之言曰惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母而孟子又曰堯舜性之湯武反之盖嘗因此二説而深思之天地之大無不生育固為萬物之父母矣人於其間又獨得其氣之正而能保其性之全故為萬物之靈若元后者則於人類之中又獨得其正氣之盛而能保其全性之尤者是以能極天下之聰明而出乎人類之上以覆冐而子蓄之是則所謂作民父母者也然以自古聖賢觀之惟帝堯大舜生而知之安而行之為能履此位當此責而無愧若成湯武王則其聰明之質固已不能如堯舜之全矣惟其能學而知能利而行能擇善而固執能克己而復禮是以有以復其徳性聰明之全體而卒亦造夫堯舜之域以為億兆之父母盖其生質雖若不及而其反之之至則未嘗不同孔子所謂及其成功一也正此之謂也恭惟皇帝陛下聰明之質性之於天固非常情所能窺度然而生長深宫春秋方富臣恐稼穡艱難容有未盡知人之情偽容有未盡察國家憲度容有未盡習至於學道修身立志揆事之本制世御俗發號施令之要亦容有未能無待於講而後明者故竊以為陛下誠能於此深留聖意日用之間語黙動静必求放心以為之本而於玩經觀史親近儒學已用力處益用力焉數召大臣切劘治道俾陳今日要急之務畧如仁祖開天章閣故事至於君臣進對亦賜温顔反復詢訪以求政事之得失民情之休戚而又因以察其人材之邪正短長庶於天下之事各得其理經歴詳盡浹洽貫通聰明日開志氣日彊徳聲日聞治效日著四海之内瞻仰畏愛如親父母則是反之之至而堯舜湯武之盛不過如此不宜妄自菲薄因循茍且而不復以古之聖賢自期也臣本迂儒加以老病自知無用分甘窮寂今者徒以趣召之峻冐昧而來耳目筋骸皆難勉彊然而未敢遽以告歸為請者誠感眷遇之厚猶欲少忍須臾以俟陛下聖志之立聖學之成決知異日姦言邪説不能侵亂果如前所期者然後乞身以去則為上不負天子下不負所學而臣主俱榮矣顧以此事在臣但能言之而其用力則在陛下萬一暮景迫人不容宿留則抱此耿耿私恨無窮伏望聖慈憐臣此志察臣此言䇿厲身心勉進徳業使臣蚤得遂其所願則雖夕死瞑目無憾矣冐瀆宸聽臣無任悃欵激切之至取進止貼黄臣聞中庸有言人一能之已百之人十能之已千之果能此道雖愚必明雖柔必彊而元祐館職吕大臨為之説曰君子所以學者為能變化氣質而已徳勝氣質則愚者可進於明柔者可進於彊不能勝之則雖有志於學亦愚不能明柔不能彊而已矣盖均善而無惡者性也人所同也昏明彊弱之禀不齊者才也人所異也誠之者所以反其同而變其異也夫以不美之質求變而美非百倍其功不足以致之今以鹵莽滅裂之學或作或輟以求變其不美之質及不能變則曰天質不美非學所能變是果於自棄其為不仁甚矣臣少時讀書偶於此語深有省焉奮厲感慨不能自已自此為學方有寸進食芹而美敢以為獻伏乞聖察乞不以假故逐日進講劄子臣伏見近制每遇隻日蚤晚進講及至當日或值假故即行權罷又按故事将來大寒大暑亦繫罷講月分恭聞陛下天性好學晨夕孜孜雖處深宫必不暇逸但臣誤䝉選擇以經入侍固當日有獻納以輔聖志今乃淹旬累月不得修其職業素餐之刺實不自安故嘗面奏假日無事正宜進講已䝉聖慈俯賜嘉納今已兩日未見施行因省昨來所陳似亦未至詳悉今别具奏欲乞聖明特降睿㫖今後除朔望旬休及過宫日外不以寒暑雙隻月日諸色假故並令逐日蚤晚進講内有朝殿日分伏恐聖躬久坐不無少勞却乞權住當日蚤講一次庶㡬藏修遊息無非典學之時聖徳日躋天下幸甚取進止乞差官看詳封事劄子臣前日面奏恭奉詔㫖以雷雨之異許陳闕失仰見陛下畏天省已之意然臣未敢奉詔者竊見陛下登極之初已下明詔來獻言者甚衆未聞一有施行今復求言殆成虚語欲乞睿㫖令後省官鎖宿看詳擇其善者條上取㫖以次施行已䝉聖慈開納再三玉音宣諭如此則求言之詔不為文具臣不勝感激欣幸而今已兩日未見指揮竊慮當時所奏他事猥多又無文字可以降出是致遲緩今敢再具奏聞欲望聖明早賜處分庶㡬聞者知勸直言日聞開悟聖聰益修政徳應天之實莫大於此取進止十月十七日奉聖㫖差沈有開劉光祖限十日看詳聞奏乞瑞慶節不受賀劄子臣伏覩今日瑞慶節前一日宰執率文武百寮詣行宫便殿拜表稱賀臣已前來祗赴立班然竊惟念夀皇梓宫在殯陛下追慕方新乃以此時講行賀禮臣當以經術入侍帷幄覩此缺失心實未安久欲奏聞又念疏逺不敢僭越昨晚忽奉睿㫖特令宣引今日晚講仰見聖心虚懐求善唯恐不及待遇之恩復異常品感激之深不能自已謹此宻奏欲望聖慈速賜傳㫖便令權免其表亦不收接三年之内凡有合稱賀事並依此例庶㡬上廣孝治益隆聖徳風示四表垂法萬世臣不勝大願取進止貼黄臣今所奏雖已遲晚然羣臣班賀於外而聖主抑而不受益見聖徳之盛可為後世法程伏乞睿照經筵留身面陳四事劄子臣迂愚衰賤無以逾人仰荷聖明召從逺外置之近侍之列處以勸誦之官此豈私於小臣者哉意者必以其粗嘗講學稍有思慮不肯隨衆黙黙或有以仰禆聖治萬分之一也而臣伏自到闕三獲進對狂妄之言時䝉采納如増添講日看詳封事不受賀表之屬皆得施行臣竊不自知以為庶㡬可以披瀝肝膽畢義願忠而無負於陛下所以收録使令之意又竊惟念服在内朝實以從容諷議為職故雖被求言之詔亦不敢輙同外臣撰述文字以致宣洩但嘗面奏一二意望陛下自以聖意施行而累日以來竊觀天意雷霆之後繼以隂雨沉鬱不解夜明晝昏此必政事設施大有未厭人望以致隂邪敢千陽徳者而臣前日所嘗言之大者尚亦未䝉省察若但碌碌隨羣解釋文義時時陳説一二細㣲以應故事則不唯非陛下所以召用愚臣之意亦豈愚臣所以服事陛下之志哉今有㣲誠須至傾竭臣之所言其最大者則勸陛下凡百自奉深務抑損自宫闈之私居處服用且如濳邸之舊以至外庭禮數僕御恩澤亦未可遽然全享萬乘之尊庶㡬有以感格親心早遂晨昏定省之願以為陛下必垂開納而數日來乃聞有㫖修葺舊日東宫為屋三數百間外議皆謂陛下意欲速成早遂移蹕以為便安之計不惟未能抑損乃是過有増加臣不知此果出於陛下之心大臣之議軍民之願耶抑亦左右近習倡為此説以誤陛下而欲因以遂其姦心也臣恐不惟上帝震怒災異數出正當恐懼修省之時不當興此大役以咈譴告警動之意亦恐畿甸百姓飢餓流離阽於死亡之際忽見朝廷正用此時大興土木修造宫室但以適己自奉為事而無矜惻憫憐之心或能怨望忿切以生他變不惟無以感格太上皇帝之心以致未有進見之期亦恐夀皇在殯因山未卜几筵之奉不容少弛太皇太后皇太后皆以尊老之年梵然在憂苦之中晨昏之養尤不可闕而四方之人但見陛下亟欲大治宫室速得成就一旦翩然委而去之以就安便六軍萬民之心必又将有扼腕而不平者矣前鑒未逺甚可懼也至於一離尊親之側輕去倚廬之次深宫永巷園囿池臺耳目之娛雜然而進臣又竊恐陛下之心未易當此紛華盛麗之熒惑感移雖欲日親儒士講求經訓以正厥事而進徳修業亦将有所不暇矣此又臣之所大懼也至於夀康定省之禮則臣嘗言之矣而其意有未盡也今聞邇日一再過宫亦未得見而不亟為之慮如臣所謂下詔自責頻日繼往者顧乃逶迤舒緩無異尋常之時泛然而往泛然而歸太上皇帝聞之必以為此徒備禮而來實無必求見我之意其深閉固拒而不肯見固亦宜矣又聞太上皇后懼忤太上皇帝之意不欲其聞太上之稱又不欲其聞内禪之説此又慮之過者殊不知若但一向如此而不為宛轉方便使太上皇帝灼知陛下所以不得已而即位者但欲上安宗社下慰軍民姑以代己之勞而非敢遽享至尊之奉則父子之間上怨怒而下憂懼将何時而已乎父子天倫三綱所繫不惟陛下之心深所未安而四方觀聽殊為不美久而不圖亦将有借其名以造謗生事者此又臣之所大懼也至於朝廷紀綱尤所當嚴上自人主以下至於百執事各有職業不可相侵盖君雖以制命為職然必謀之大臣參之給舎使之熟識以求公議之所在然後揚于王庭明出命令而公行之是以朝廷尊嚴命令詳審雖有不當天下亦皆曉然知其謬之出於某人而人主不至獨任其責臣下欲議之者亦得以極意盡言而無所憚此古今之常理亦祖宗之家法也今者陛下即位未能旬月而進退宰執移易臺諌甚者方驟進而忽退之皆出於陛下之獨斷而大臣不與謀給舎不及議正使實出於陛下之獨斷而其事悉當於理亦非為治之體以啟将來之弊况中外傳聞無不疑惑皆謂左右或竊其柄而其所行又未能盡允於公議乎此弊不革臣恐名為獨斷而主威不免於下移欲以求治而反不免於致亂盖自隆興以來已有此失臣嘗再三深為夀皇論之非獨今日之憂也尚頼夀皇聖性聰明更練世事故於此輩雖以驅使之故稍有假借實亦隂有以制之未至全墮其計然積習成風貽患於後其害已有不可勝言者如陳源袁佐之流皆陛下所親見也奈何又欲襲其跡而蹈之乎且陛下自視聰明剛斷孰與夀皇更練通達孰與夀皇夀皇尚不能制之於前而陛下乃欲制之於後臣恐其為患之益深非但前日而已此又臣之所大懼也至於􅓖宫之卜偏聽臺史膠固謬妄之言墮其交結眩惑之計而不復廣詢術人以求吉地但欲於祐思諸陵之傍儹那遷就茍且了當既不為夀皇體魄安寧之慮又不為宗社血食久逺之圖則自宰執侍從以至軍民皆知其非而不敢力争夫以夀皇之豐功盛烈百世不忘而所以葬之如此其草草也此豈不又大咈天人之心以致變異之頻仍而貽患於無窮乎此又臣之所大懼也凡此四懼皆非小故臣願陛下深察愚言而反之於心明詔大臣首罷修葺東宫之役而以其工料回就慈福重華之間草創寝殿一二十間使粗可居又於宫門之外草創供奉宿衛之廬數十間勿使其有偪仄暴露之苦如是則上有以感格太上皇帝之心而速南内進見之期又有以致夀皇几筵之奉而盡兩宫晨昏之禮下有以塞羣下窺觀眩惑之姦而慰斯民飢餓流離之歎此一事也若夫過宫之計則臣又願陛下下詔自責減省輿衛入宫之後暫變服色如唐肅宗之改服紫􅂁執控馬前者預詔近屬尊行之賢使之先入首白太上皇后以臣前所陳宛轉方便之説然後隨之而入望見太上皇帝即當流涕伏地抱膝吮乳以伸負罪引慝之誠而太上皇后宗戚貴臣左右環擁更進譬諭解釋之詞則太上皇帝雖有忿怒之情亦且霍然雲消霧散而懽意浹洽矣此二事也若夫朝廷之紀綱則臣又願陛下深詔左右勿預朝政但使朝廷尊嚴紀綱振肅而國家有泰山之安則此等自然不失富貴長久之計其實有勲庸而所得褒賞未愜衆論者亦詔大臣公議其事稽考令典厚報其勞而凡號令之弛張人才之進退則一委之二三大臣使之反復較量勿徇己見酌取公論奏而行之批㫖宣行不須奏覆但未令尚書省施行先送後省審覆有不當者限以當日便行繳駁如更有疑則詔大臣與繳駁之官當晚入朝面議於前互相論難擇其善者稱制臨決則不惟近習不得干預朝權大臣不得專任己私而陛下亦得以益明習天下之事而無所疑於得失之算矣此三事也若夫山陵之卜則臣前日嘗以議状進呈近日又與同列連名具奏今更不敢頻煩聖聽亦望特宣大臣使詳臣等前後所論而決其可否於立談之間先寛七月之期次黜臺史之説别求草澤以營新宫使夀皇之遺體得安於内則宗社生靈皆䝉福於外矣此四事也凡此四事皆今日最急之務切乞留神反覆思慮斷而行之以答天變以慰人心上以彰聖主用人求諌之實下以伸小臣愛君憂國之忠則臣不勝千萬大幸又竊念臣老病之餘寒齋獨宿終夜不寐憂慮萬端而進對之時率多遺忘言語精神又不能以自達是以前日一再靣奏所陳數事有未䝉深察者今因入侍敢復冐昧輙形紙墨伏惟聖明獨賜詳覽而擇其中至於孤危之蹤不敢自保竊恐自今以徃不復久侍清閒之燕矣臣無任瞻戀懇切皇恐俟罪之至取進止乞留中不受賀表下貼黄臣又聞前日賀表雖䝉退出而未降指揮今後合稱賀事三年之内並與權免其節序變遷並合進名奉慰并乞聖明先賜處分庶㡬遇事免致失禮伏候聖㫖竊觀天意下貼黄臣又聞前此雷雨之時累曽地震此十七日半夜前後其震尢甚八月半聞蜀中大震墻屋徃徃傾摧臣雖不曽親見然見者頗多傳聞甚的聖政方新而變異不止天戒甚明必有所為并乞睿照此三事也下貼黄臣又嘗謂人主當務聰明之實而不可求聰明之名信任大臣日與圖事反覆辯論以求至當之歸此聰明之實也偏聽左右輕信其言每事從中批出處分此聰明之名也務其實者今雖未明久必通悟務其名者或外間一時可以竦動觀聽然中實未明愈久而愈暗矣二者之間所差毫釐而其得失則有大相逺者伏乞睿照論災異劄子臣竊聞今月五日夜漏方下五六刻間都城之内忽有黒煙四塞草氣襲人咫尺之間不辨人物著於靣目皆為沙土臣雖不曾親見然親舊相訪見之者多驗之數人其説如一決非虚妄臣竊思惟間者以來災異數見秋冬雷雹苦雨傷稼山摧地陷無所不有皆為隂盛陽㣲之證陛下雖嘗下責躬之詔出敢諫之令而天心未豫復有此怪亦為隂聚包陽不和而散之象臣竊懼焉而恐其未有敢以聞於聖聽者也盖嘗聞之商中宗時有桑榖並生於朝一暮大拱中宗能用巫咸之言恐懼修徳不敢荒寧而商道復興享國長久至於七十有五年髙宗祭於成湯之廟有飛雉升鼎耳而鳴髙宗能用祖己之言克正厥事不敢荒寧而商用嘉靖享國亦久至於五十有九年古之聖王遇災而懼修徳正事故能變災為祥其效如此伏願陛下視以為法克己自新蚤夜思省舉心動念出言行事之際常若皇天上帝臨之在上宗社神靈守之在旁懔懔然不復敢使一毫私意萌於其間以煩譴告而又申勅中外大小之臣同寅協恭日夕謀議以求天意之所在而交修焉則庶乎災害日去而福禄日來矣臣不勝惓惓愛君憂國之至取進止一本乞留中省覽一本乞降付三省樞宻院乞令看詳封事官面奏劄子臣昨具奏乞降指揮看詳臣庶所上封事已䝉聖慈施行今來竊見看詳官所具進册其間貼説極為詳備若令因侍經幄面奏指陳庶於聰明實有裨補取進止乞討論喪服劄子臣聞三年之喪齊疏之服飦粥之食自天子逹於庶人無貴賤之殊而禮經勅令子為父嫡孫承重為祖父皆斬衰三年盖嫡子當為父後以承大宗之重而不能襲位以執喪則嫡孫繼統而代之執喪義當然也然自漢文短喪之後歴世因之天子遂無三年之喪為父且然則嫡孫承重從可知己人紀廢壊三綱不明千有餘年莫能釐正及我大行至尊夀皇聖帝至性自天孝誠内發易月之外猶執通喪朝衣朝冠皆以大布超越千古拘攣牽制之弊革去百王衰陋卑薄之風甚盛徳也所宜著在方册為世法程子孫守之永永無斁而間者遺誥初頒太上皇帝偶違康豫不能躬就喪次陛下實以世嫡之重仰承大統則所謂承重之服著在禮律所宜一遵夀皇已行之法易月之外且以布衣布冠視朝聽政以代太上皇帝躬執三年之喪而一時倉卒不及詳議遂用漆紗淺黄之服不唯上違禮律無以風示天下且将使夀皇已革之弊去而復留已行之禮舉而復墜臣愚不肖誠竊痛之然既徃之失不及追改唯有将來啟殯發引禮當復用初喪之服則其變除之節尚有可議欲望陛下仰體夀皇聖孝成法明詔禮官稽考禮律預行指定其官吏軍民男女方喪之禮亦宜稍為之制勿使過為華靡布告郡國咸使聞知庶㡬漸復古制而四海之衆有以著於君臣之義實天下萬世之幸取進止書奏藳後凖五服年月格斬衰三年嫡孫為祖謂承重者法意甚明而禮經無文但傳云父没而為祖後者服斬然而不見本經未詳何據但小記云祖父沒而為祖母後者三年可以旁照至為祖後者條下疏中所引鄭志乃有諸侯父有廢疾不任國政不任喪事之問而鄭答以天子諸侯之服皆斬之文方見父在而承國於祖之服向來入此文字時無文字可檢又無朋友可問故大約且以禮律言之亦有疑父在不當承重者時無明白證驗但以禮律人情大意答之心常不安歸來稽考始見此説方得無疑乃知學之不講其害如此而禮經之文誠有闕畧不無待於後人向使無鄭康成則此事終未有決斷不可直謂古經定制一字不可増損也乞修三禮劄子臣聞之六經之道同歸而禮樂之用為急遭秦滅學禮樂先壊漢晉以來諸儒補緝竟無全書其頗存者三禮而已周官一書固為禮之綱領至其儀法度數則儀禮乃其本經而禮記郊特牲冠義等篇乃其義説耳前此猶有三禮通禮學究諸科禮雖不行而士猶得以誦習而知其説熈寧以來王安石變亂舊制廢罷儀禮而獨存禮記之科棄經任傳遺本宗末其失已甚而博士諸生又不過誦其虚文以供應舉至於其間亦有因儀法度數之實而立文者則咸幽㝠而莫知其源一有大議率用耳學臆斷而已若乃樂之為教則又絶無師授律尺短長聲音清濁學士大夫莫有知其説者而不知其為闕也故臣頃在山林嘗與一二學者考訂其説欲以儀禮為經而取禮記及諸經史雜書所載有及於禮者皆以附於本經之下具列注疏諸儒之説畧有端緒而私家無書檢閲無人抄寫久之未成㑹䝉除用學徒分散遂不能就而鍾律之制則士友間亦有得其遺意者竊欲更加參考别為一書以補六藝之闕而亦未能具也欲望聖明特詔有司許臣就秘書省太常寺闗借禮樂諸書自行招致舊日學徒十餘人踏逐空閑官屋數間與之居處令其編類雖有官人亦不繫衘請俸但乞逐月量支錢米以給飲食紙札油燭之費其抄寫人即乞下臨安府差撥貼司二十餘名候結局日量支犒賞别無推恩則於公家無甚費用而可以興起廢墜垂之永久使士知實學異時可為聖朝制作之助則斯文幸甚天下幸甚取進止晦菴集卷十四欽定四庫全書晦菴集卷十五宋朱子撰
