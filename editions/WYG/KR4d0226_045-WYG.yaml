canonical_identifier: bkk:krp/KR4d0226/WYG/v1/juan/45
seq: 45
front:
  text: 謂萬物在吾性分中如鑑之影則性是一物物是一物以此照彼以彼入此也横渠先生所謂若謂萬象為太虛中所見則物與虛不相資形自形性自性者正談此爾
  hash: sha256:3857b662e46cb39041cf7e28fee5dd9486d7f06d78a5e95f456fb331088675fe
body:
  text: 夫子告子路曰未能事人焉能事鬼未知生焉知死意若曰知人之理則知鬼之理知生之理則知死之理存乎我者無二物也故正蒙謂聚亦吾體散亦吾體知死而不亡者可與言性矣竊謂死生鬼神之理斯言盡之君子之學汲汲修治澄其濁而求清者盖欲不失其本心凝然而常存不為造化隂陽所累如此則死生鬼神之理將一於我而天下之能事畢矣彼釋氏輪回之説安足以語此盡愛親敬長貴貴尊賢之道則事鬼之心不外乎此矣知乾坤變化萬物受命之理則生之有死可得而推矣夫子之言固所以深曉子路然學不躐等於此亦可見矣近世説者多借先聖之言以文釋氏之㫖失其本意遠矣德明伏讀先生太極圖解義第二章曰動而生陽誠之通也繼之者善萬物之所資始也靜而生陰誠之復也成之者性萬物各正其性命也德明謂無極之眞誠也動而生陽靜而生隂動靜不息而萬物繼此以出與因此而成者皆誠之著固無有不善者亦無非性也似不可分隂陽而為辭如以資始為繫於陽以正性命為繫於隂則若有獨陽而生獨陰而成者矣詳究先生之意必謂陽根於陰陰根於陽陰陽元不相離如此則非得於言表者不能喻此也繼善成性分屬陰陽乃通書首章之意但熟讀之自可見矣盖天地變化不為無陰然物之未形則屬乎陽物正其性不為無陽然形器已定則屬乎陰甞讀張忠定公語云公事未著字以前屬陽著字以後屬隂似亦窺見此意答廖子晦德明平日鄙見未免以我為主盖天地人物統體只是一性生有此性死豈遽亡之夫水有所激與所礙則成漚正如二機闔闢不已妙合而成人物夫水固水也漚亦不得不謂之水特其形則漚滅則還復是本水也人物之生雖一形具一性及氣散而滅還復統體是一而已豈復分别是人是物之性所未瑩者正惟祭享一事推之未行若以為果饗耶神不歆非類大有界限與統體還一之説不相似若曰饗與不饗盖不必問但報本之道不得不然而詩書却明言神嗜飲食祖考來格之類則又極似有饗之者竊謂人雖死無知覺知覺之原仍在此以誠感彼以類應若謂盡無知覺之原只是一片太虚寂則似㫁滅無復實然之理亦恐未安君子曰終小人曰死則智愚於此亦各不同故人不同於鳥獸草木愚不同於聖雖以為公共道理然人須全而歸之然後足以安吾之死不然則人何用求至賢聖何用與天地相似倒行逆施均於一死而不害其為人是直與鳥獸禽魚俱壞懵不知其所存也死生之論向來奉答所諭知生事人之問己發其端而近答嵩卿書論之尤詳意明者一讀當己洞然無疑矣而來書之諭尚復如此雖其連類引義若無津涯然尋其大指則皆不出前此兩書所論之中也豈未甞深以鄙説思之而直以舊聞為主乎旣承不鄙又不得不有以奉報幸試思之盖賢者之見所以不能無失者正坐以我為主以覺為性爾夫性者理而已矣乾坤變化萬物受命雖所稟之在我然其理則非有我之所得私也所以反身而誠盖謂盡其所得乎已之理則知天下萬物之理初不外此非謂盡得我之知覺則衆人之知覺皆是此物也性只是理不可以聚散言其聚而生散而死者氣而已矣所謂精神魂魄有知有覺者皆氣之所為也故聚則有散則無若理則初不為聚散而有無也但有是理則有是氣茍氣聚乎此則其理亦命乎此耳不得以水漚比也鬼神便是精神魂魄程子所謂天地之功用造化之迹張子所謂二氣之良能皆非性之謂也故祭祀之禮以類而感以類而應若性則又豈有類之可言耶然氣之已散者旣化而無有矣其根於理而日生者則固浩然而無窮也故上蔡謂我之精神卽祖考之精神盖謂此也然聖人之制祭祀也設主立尸焫蕭灌鬯或求之陰或求之陽無所不用其極而猶止曰庶或享之而已其至誠惻怛精微恍惚之意盖有聖人所不欲言者非可以世俗麤淺知見執一而求也豈曰一受其成形則此性遂為吾有雖死而猶不滅截然自為一物藏乎寂然一體之中以俟夫子孫之求而時出以饗之耶必如此説則其界限之廣狹安頓之處所必有可指言者且自開闢以來積至於今其重併積疊計已無地之可容矣是又安有此理耶且乾坤造化如大洪爐人物生生無少休息是乃所謂實然之理不憂其㫁滅也今乃以一片太虚寂目之而反認人物已死之知覺謂之實然之理豈不誤哉又聖賢所謂歸全安死者亦曰無失其所受乎天之理則可以無愧而死耳非以為實有一物可奉持而歸之然後吾之不㫁不滅者得以晏然安處乎冥漠之中也夭壽不貳脩身以俟之是乃無所為而然者與異端為生死事大無常迅速然後學者正不可同日而語今乃混而言之以彼之見為此之説所以為説愈多而愈不合也凡此皆亦粗舉其端其曲折則有非筆舌所能盡者幸併前兩説而參考熟思之其必有得矣若未能遽通卽且置之姑卽夫理之切近而平易者實下窮格工夫使其積累而貫通焉則於此自當曉解不必别作一道理求也但恐固守舊說不肯如此下工則拙者雖復多言終亦無所補耳答廖子晦德明自得賜誨日夕不去手紬繹玩味未能盡究亦甞隨所知而為之説盖天人無二理本末無二致盡人道卽天道亦盡得於末則本亦未離雖謂之聖人亦曰人倫之至而已佛氏離人而言天岐本末而有所擇四端五常之有於性者以為理障父子君臣夫婦長㓜所不能無者以為縁合甚則以天地陰陽人物為幻化未嘗或過而問焉而直語太虚之性夫天下無二理豈有天人本末輙生取舍而可以為道乎夫其所見如此則亦偏小而不全矣豈所謂徹上徹下一以貫之之學哉聖門下學而上達由灑掃應對進退而徃雖飲食男女無所不用其敬盖君子之道費而隱費卽日用也隱卽天理也卽日用而有天理則於君臣父子夫婦長㓜之間應對酬酢食息視聽之頃無一而非理者亦無一之可紊一有所紊天理䘮矣故君子無所不用其敬由是而操之固習之熟則隱顯混融内外合一而道在我矣佛者烏足以語是哉佛氏之所謂悟亦瞥見端倪而已天理人心實然而不可易者則未甞見也其所謂修亦攝心寂坐而已棄人倫滅天理未見其有得也此先生所以謂其卒不近也喜怒哀樂之未發卽寂然不動者是也卽此為天地之心卽此為天下之本天下無二本故乾坤變化萬類紛揉無不由是而出而形形生生各有天性此本末之所以不可分也得其靈而為人而於四者之際淵然而虚靜若不可以名言者而子思以其無所偏倚而謂之中孟子以其純粹而謂之善夫子卽謂生生之體而言之以仁名不同而體一亦未嘗離於日用之間此先生所以謂其分明不待尋究者也某昔者讀紛然不一之書而不得其要領泛觀乎天地陰陽人物鬼神而不能一在邇求遠未免有極力尋究之過亦甞聞於龜山先生之説曰未言盡心先須理㑹心是何物若體得了然分明然後可以言盡某前日之説正坐是也然道無須臾可離日用昭昭奚俟於尋究此先生所為丁寧開諭某敢不敬承至於鑑影之惑非先生之教幾殆也某昔者閒居黙坐見夫所謂充周而洞達者萬物在其中各各呈露遂以鑑影之譬為近故推之而為鳶魚之説竊以為似之先生以太虚萬象而闢其失某讀之乆始大悟其非若爾則鳶魚吾性分為二物矣詳究先生之意盖鳶魚之生必有所以為鳶魚者此道體之所在也其飛其躍豈鳶魚之私盖天理發越而不可已也勿忘勿助長之間天理流行無纎毫之私正類是此明道先生所以謂之同某鄙見如此未知合於先生之意否乎其它死生鬼神之説須俟靣求教誨來喻一一皆􅆻鄙懷足見精敏固知前此心期之不謬也其間尚一二未合亦非大故屬此客中冗冗未及一二條對更願益加辨學之功所見當漸真實也答廖子晦所諭詩説先儒本謂周公制作時所定者為正風雅其後以類附見者為變風雅耳固不謂變者皆非美詩也大序之文亦有可疑處而小雅篇次尤多不可曉者此未易攷但聖人之意使人法其善戒其惡此則炳如日星耳今亦不須問其篇章次序事實是非之如何但玩味得聖人垂示勸戒之意則詩之用在我矣鄭衛之詩篇篇如此乃見其風俗之甚不美若止載一兩篇則人以為是適然耳大抵聖人之心寛大平夷與今人小小見識遮前掩後底意思不同此語亦卒乍與人説不得且徐思之俟它日靣講也答廖子晦乾之四德以貞配冬無可疑人之四德以智配冬猶未􅉷豈以一歲之功萬物之成畢見於此如智之明辨者乎智主含藏分别有知覺而無運用冬之象也以五常之道配五典之倫則仁行於父子義行於君臣禮行於長㓜智行於夫婦智所以别信行於朋友皆不易之定理中庸或問首章不以禮主長㓜智主夫婦何也豈以禮與智通行無間不當指定分配也歟智字分配似稍費力正不必如此牽合也一陰一陽之謂道其在人者不越仁義兩端而已陽為仁陰為義自此推之四端竊謂禮亦陽德仁之屬也智亦陰德義之屬也如火木皆陽水金皆陰之類不識然否此段無可疑者德明讀先生詩傳極有感發始知詩眞可以興也所疑正變風雅已荷開曉又見教讀書之説且云聖人之心寛大平夷與今人小小見識遮前掩後底意不同夫温柔敦厚寛大平夷固詩之教求諸緑衣終風栢舟考槃尤曉然可見但所謂小小見識遮前掩後者不知所主何意於詩何與豈只以所載刺詩有淫䙝不可告語者聖人亦存而不刪也耶所疑未得伏乞批誨鄙意初亦正謂如此但寛大平夷亦舉大體而言不專指此一類也答廖子晦熹頓首再拜使至奉告欣審比日秋清尊履佳福熹此諸况已具平父書中矣輕犯世禍非欲如此顧恐邂逅蹉跌亦非所能避耳要之惟是不出可以無事一行作吏便如此計較不得才涉計較囘互便是私意也劉家大哥聞甚知好學皆教導之力感不可言此衰拙之任而老兄當之其效又如此為幸甚矣行期想有定論渠家叔姪意甚拳拳也問及學舍次第此間事旣隔手又生徒希少殊不成次第無可言者然亦未甞不告之以窮理脩身之事但無縁朝夕與之親接又其間知為己求益者絕少故亦無以用其力耳論語集注已移文兩縣并作書囑之矣今人得書不讀只要賣錢是何見識苦惱殺人奈何奈何余隱之所刋聞之已乆亦未之見此等文字不成器將來亦自消滅不能管得也鄭台州竒禍可駭天意殊不可曉令人憂懼人還草此未暇它及惟千萬自愛不宣熹再拜上問慈闈安問日至作肅家事處置甚善示及疑義各以鄙見條析但宗法從來理㑹不分明此間又無文字檢閱恐只依鄭氏舊說亦自穏當也答廖子晦所論易傳无妄之說甚善但所謂雖無邪心而不合正理者實該動靜而言不專為莊敬持養此心旣存設也盖如燕居獨處之時物有來感理所當應而此心頑然固執不動則此不動處便非正理又如應事接物處理當如彼而吾所以應之者乃如此則雖未必出於血氣人欲之私然只似此亦是不合正理旣有不合正理則非邪妄而何恐不必言未免紛擾敬不得行然後為有妄之邪心也所論近世識心之弊則深中其失古人之學所貴於存心者盖將卽此而窮天下之理今之所謂存心者乃欲恃此而外天下之理其得失之端於此亦可見矣故近日之弊無不流於狂妄恣肆而不自知其非也答廖子晦守官得上官相知可以行志然獲上有道自守亦不可失也獄事人命所繫尤當盡心近世流俗惑於隂德之論多以縱出有罪為能而不思善良之無告此最弊事不可不戒然哀矜勿喜之心則不可無也所示疑義甚善但一二處小未圓備别紙具去職事之餘更能玩意於此固佳然觀書亦須從頭循序而進不以淺深難易有所取舍自然意味詳宻至於浹洽貫通則無緊要處所下功夫亦不落空矣今人多是揀難底好底㸔非惟聖賢之言不可如此間别且是只此心意便不定疊縱然用心探索得到亦與自家這裏不相干突兀聱牙無田地可安頓此病不可不知也子晦所論始終條理甚善然去歲見三山上游諸論皆不可曉何耶豈同官所見不同難力爭耶至中固不當以始終言然射之所以中者亦是其未用力時眼中見得親切故其發而能中耳發處方用得力也其它則所論皆善矣國材以仁喻心之説恐渠記之誤不應如此謬妄也理一分殊便是仁義之理不待行之而後為義也以行之為義乃是告子義外之説自韓子失之矣大抵仁義禮智皆心之理而仁在其中又無所不包故孟子以人心言之如四端皆心之用而惻隱之心無所不貫亦可見也信近於義言可復也未可便説言不必信盖言欲其信然須是近義然後言可復而能全其信此正言慮所終之意也竭力非不敢有其身之謂卒至於不敢慢語尤無序皆不必如此説四端一段甚好此義理之綱領能如此推明甚慰所望也説大人之義熹甞説孟子不是教人去藐大人但教人勿視其巍巍然者而已今人不是畏大人只是畏其巍巍然者而已如蘇秦嫂所謂見季子位高金多正是此見識也若能勿視其巍巍然而不失夫畏大人之心則是乃真能畏大人者矣萬物皆備於我下文反身强恕皆蒙此句為義不可只説一截所謂反身而誠乃窮理力行功夫成就之效貫通純熟與理為一處不可只以敬字盡之也答廖子晦巧言令色為失其本心此語非不是但近時説者多因孟子之言遂以心字替却仁字此則不可當更於此思之得其説則凡言仁者皆可黙識不但此章之義而已且巧言亦不專為譽人過實大凡辭色之間務為華飾以悦人之觀聽者皆是上蔡語録中説寫柬請客之類皆是察私心所從起亦不記當時如何説然亦非謂平居無事而伺其所起但操存有功卽念慮之萌無不知覺未能如此卽此心應物之際不可不審其邪正公私而施克復之功也曾子易簀非記者之誤所論得之千乘之説未有端的證據司馬法説雖占地太廣然以周禮考之又不止此如云九夫為井四井為邑四邑為丘四丘為甸鄭氏讀甸為乘云四丘之地出車一乘乃是十六井也所云未聞七家出一人之役後來宇文周制府衛法乃是七家共出一兵疑於古制亦有所攷然今不可知矣此類恐當細攷而兼存之以俟知者决焉不必自為之說也答廖子晦所喻已悉但事已如此不若且靜以聽之吾人所學正要此處呈驗若㸔些利害便不免開口告人却與不學之人何異向見李先生説若大段排遣不去只思古人所遭患難有大不可堪者持以自比則亦可以少安矣始者甚卑其説以為何至如此後來臨事却覺有得力處不可忽也若閤中不快亦無可奈何事已至此已展不縮已進不退只得硬著脊梁與它厮捱㸔他如何自家决定不肯開口告他若到任滿便作對移批書離任則它許多威風都無使處矣豈不快哉東坡在湖州被逮時面無人色兩足俱軟幾不能行求入與家人訣而使者不聽雖伊川先生謫涪陵時亦欲入告叔母而不可得惟陳了翁被逮聞命卽行使人駭之請其入治行裝而翁反不聽竒哉竒哉願子晦勉旃毋為後人羞也此間有吳伯起者不曾講學後聞陸子靜門人説話自謂有所解悟便能不顧利害及其作令纔被對移它邑主簿却不肯行而百方求免熹甞笑之以為何至如此若對移作指使卽逐日執杖子去知府㕔前唱喏若對移做押録卽逐日抱文案去知縣案前呈覆更做耆長壯丁亦不妨與它去做况主簿乎吳不能用竟至憤鬱成疾而死當時若放得下却未必死今不免死而枉陪了許多下情所失愈多雖其臨機失於㫁决亦是平日欠了持論也志士不忘在溝壑勇士不忘䘮其元此夫子所以有取於虞人而孟子亦發明之李先生說不忘二字是活句須向這裏參取愚謂若果識得此意辦得此心則無入而不自得而彼之權勢威力亦皆無所施矣前幅未盡鄙意故復布此試反復之當自有判决處答廖子晦唐臣問中孚傳曰中虚為中孚之象中實亦為孚義又曰中虚信之本中實信之質又曰中虚為誠之象中實為孚之象夫有本則有質有誠則有孚盖卽質生於本而孚出於誠也似有終始似有先後然不可得指而名之以為終始先後也故分而言之則曰中實合而言之則曰中虚分謂二體兌與㢲也合謂全體中孚是也二體以剛而得上下之中雖曰實矣及其成體則二柔在中而又生於虚焉盖中虚未甞無實而中實未甞不虚也以虚為實之體而實為虚之用雖曰體曰用又不可岐而為二也大抵虚根於實實出於虚及其虚也實之理未甞不在焉於其實也虚之義未甞不存焉但不可執其虚而忘其實忘其實則無質也無信也又不可泥其實而失其虚失其虚則無本也不誠也是猶陰根於陽陽根於陰靜無而動有道並行而不相悖者也今夫天地之間一元之氣杳冥無迹豈非虚耶萬物生成各具形器豈非實耶然物雖成形豈能離於一元之氣豈能捨於物而自用哉在今學者體天地之化盡形色之則中不可不虚亦不可不實存養在我則中心廣大纎毫不留不失於信之本不忘於誠之象豈非虚耶應接於外則必矜細行克勤小物不失於信之質不忘於孚之象豈非實耶此亦伊川先生所謂由乎中以應乎外制於外所以養其中之義也如是則體用一源内外交養豈不美哉某讀易傳而有此疑義萬望詳教德明答云中孚之義微奥豈德明所能識甞試考諸卦體二五皆陽而中實者中心純實而有信之義也内外皆實而中虚者中心虛明而能信之義也就所主而言則中實為信之質就所感而言則中虛為信之本又以澤風二象言之則水以虛而受風之入下以虚而受上之感皆所以為信也其體其實其虚一歸於信此易之所以變易而無不各極其道而中孚之義著矣來説謂虚中未甞無實實中未甞無虚固善又謂虚根於實實根於虚又以一元之氣為虚萬物生成為實其言竊恐有病精義云冲漠無朕而萬象森然已具其曰萬象已具則雖冲漠無朕之際已不為虚矣况於一元之氣所旣有者得為虚乎此幾於老氏有生於無之論見闢於正蒙之書者也又以存養於中應接於外為兩截恐失程子由乎中以應乎外之本意不審高明以為如何唐臣問吕與叔甞言思慮多不能驅除曰此正如破屋中禦㓂東面人來未逐得西面又一人至矣左右前後驅逐不暇盖四面空疎盜固易入無縁作得主定又如虚器入水水自然入若以一器實之以水置之水中水何能入來盖中有主則實實則外患不能入自然無事學者先務固在心志然有謂欲屏去聞見知思則是絕聖棄智有欲屏去思慮患其紛亂則須坐禪入定如明鑑在此萬物畢照是鑑之常難為使之不照人心不能不交感萬物難為使之不思慮若欲免此唯是心有主如何為主敬而已矣有主則虚虚謂邪不能入無主則實實為物來奪之大凡人心不可二用用於一事則它事更不能入者事為之主也事為之主尚無思慮紛擾之患若主於敬又焉有此患乎所謂敬者主一之謂敬所謂一者無適之謂一且欲涵泳主一之意不一則二三矣至於不敢欺不敢慢尚不愧於屋漏皆是敬之事也此二條一以實為主一以虚為主而皆收入近思録唐臣以愚意度之虛以敬言實以事言以敬為之主則虚虚則邪不能入以事為之主則實實則外患不能入故程先生於有主則實下云自然無事於無主則實下云實謂物來奪之詳此二條之意各有所在不可併作一意看未知是否德明答云有主則實有主則虚虚實二說雖不同然意自相通皆謂以敬為主也敬則其心操存而不亂虚靜而能照操存不亂外患自不能入虚靜而能照外物自不能干無有二事程子曰主一之謂敬又曰敬則自虚靜又曰敬勝百邪意亦可見只縁吕氏患思慮多程子謂其中心無主所致如虚器入水破室致㓂故言有主則實實則外患不能入後來學者又欲盡屏見聞知思程子以為人心不能無感如鑑不能不照但涵養清明則自無紛擾不待屏除也故言有主則虚虚謂邪不能入各有攸當皆是以敬為主若岐而為二恐非程子本意又前言有主則實則是心有主也後言無主則實則是物來奪之中心昏塞也辭雖同而意則異所言虚者亦然李君二說亦佳但太支蔓作病耳有本則有質有誠則有孚盖質生於本而孚出於誠此四句自好似有始終以下則贅矣分合則是論卦體非為不可以先後指名而言也虚中未甞無實以下亦是衍説與此義初不相干所云實出於虚此尤無理至謂執虚忘實泥實失虚皆極有害大抵如今一念之間中無私主便謂之虚事皆不妄便謂之實不是兩件事也其說又以存養於中為虚應接於外為實亦誤矣子晦之言大抵近之但語有未親切處耳後段虚實之説亦類此子晦之説甚善但敬則内欲不萌外誘不入自其内欲不萌而言則曰虚自其外誘不入而言故曰實只是一時事不可作兩截㸔也答廖子晦所喻禮文此等事平昔不曾講究一旦荒迷又不暇問所以例多茍簡不滿人意然䘮與其易也寧戚但存其大節使不失吾哀痛之誠心為急此等雖小不備亦不得已也禮服制度見於儀禮為詳諸家皆祖之而有更變爾若必欲致詳可細攷也據今所急卜葬為先葬後三虞卒哭而祔祔畢主復於寢以俟三年而後撒几筵此禮經皆有明文不必用它説改易也答廖子晦廟議當時只用荆公之説盖伊川先生之意也所謂不備九廟之制盖議者欲并祧僖宣二祖而祔孝宗一室則自太祖而至孝宗纔八世耳兄弟共為一世正使荆公之説未必當理宣祖亦未合在祧毁之限也此事不當私議然蒙見問故謾及之不必為它人言也所問葬法大概得之但後來講究木椁瀝青似亦無益但於穴底先鋪炭屑築之厚一寸許其上之中即鋪沙灰四傍即用炭屑側厚寸許下與先所鋪者相接築之旣平然後安石椁於其上四傍又下三物如前椁底及棺四傍上面復用沙灰實之俟滿加盖復布沙灰而加炭屑於其上然後以土築之盈坎而止盖沙灰以隔螻蟻愈厚愈佳頃嘗見籍溪先生說甞見用灰葬者後因遷葬則見灰已化為石矣炭屑則以隔木根之自外入者亦里人改葬者所親見故須令甞在沙灰之外四面周宻都無縫罅然後可以為固但法中不許用石椁故此不敢用全石只以數片合成庶幾不戾法意耳答廖子晦德明向者侍坐甞問降衷之性具有五典之彛旣已知之而行之或有未至只是為私欲所撓耳其要在窒欲先生賜教云一分私欲便有一分見不盡時道中妄陳所見以及無極太極動靜隂陽五氣五性與夫萬事善惡之出因言大端人倫似只如此不審如何著工夫方見得盡先生云據説亦只是如此無可思索此乃雖欲從之末由也已處只要時習常讀書令常在目前久之自然見得某佩服至訓罔敢失墜兹者辱書又蒙誨以離羣索居之際自能提撕不廢講習體驗之功則與同堂合席朝夕講磨無以異矣某執書三復不勝感發生我者父也教我者夫子也俛焉孳孳斃而後已因念顔子鑚仰堅高恍惚前後喟然發嘆旣知道體之無窮又無所用其力將欲罷之而此理已躍如於中有不容已者而夫子循循善誘復示以用力之方博之以文約之以禮顔子窮格克復旣竭吾才日新不息於是實見此理卓然若有所立昭昭而不可欺且又非力行之所能至故曰雖欲從之末由也已如顔子者可謂眞知者哉夫博文約禮先生所謂講習體驗之功也所立卓爾亦豈離降衷之性固有之彛哉而顔氏之真知如彼後人之不能及又如此進寸退尺每誦師言惕然警懼輒敢推廣先生之説復以求教詳賜開曉幸甚所論顔子之嘆大概得之然亦覺有太煩雜處約而言之則高堅前後者顔子始時之所見也博文約禮者中間用力之方也欲罷不能以後者後來得力之效驗也中庸所謂得一善則拳拳服膺而不失者正謂此博文約禮工夫不可間㫁耳若能如此實用其力久之自然見得此箇道理無處不在不是塊然徒守一物而硬定差排喚作心性也若不如此政使思索勞苦説得相似亦恐隨手消散不為吾有况欲望其融㑹貫通而與己為一耶舊見李先生常説少從師友幸有所聞中間無講習之助幾成廢墮然賴天之靈此箇道理時常只在心目間未甞敢忘此可見其持守之功矣然則所見安得而不精所養安得而不熟邪近時朋友漫説為學然讀書尚不能記得本文講説尚不能通得訓詁因循茍且一暴十寒日徃月來漸次老大則遂漠然忘之更無頭緒可以接續至有不獲講學之利而徒取廢錮之禍者甚可嘆也來喻盖已得此大意然持之以久全在日用工夫勿令間㫁乆當自有真實見處也班朝治軍蒞官行法非禮威嚴不行禱祠祭祀非禮不誠不莊先生謂古人以誠莊對威嚴盖為政以嚴為本寛以濟嚴之太過也某向聞其語猶未深訂近讀蒙卦初九曰發蒙利用刑人用脱桎梏而程氏傳曰聖王設刑罰以齊其衆明教化以善其俗刑罰立而後教化行治蒙之功若非威之以刑使之脱去昏蒙之桎梏則善教無由而入某反覆深思若威信不立誠不足以立政然猶有疑焉孔子曰居上不寛吾何以觀之哉竊謂居上以寛為本寛則得衆嚴以濟寛之不及耳若一意任威是蒙爻所謂以徃吝也其弊將有至於法令如牛毛者抑又聞之四德之元猶五常之仁故元為善之長仁包義禮智三者先之以仁裁之以義三代得天下以仁莫不有慘怛之愛忠利之教所以不免於刑者亦好仁惡不仁耳今之為州縣者不念民生之艱刑罰失平征取無藝箠楚流血茍以逃上官之責而過於寛者又一切廢弛不立所在有之此固不足道然先王為政之本寛嚴先後之異施者不敢不詳講伏乞賜誨為政以寛為本者謂其大體規模意思當如此耳古人察理精宻持身整肅無偷惰戲豫之時故其政不待作威而自嚴但其意則以愛人為本耳及其施之於政事便須有綱紀文章關防禁約截然而不可犯然後吾之所謂寛者得以隨事及人而無頽弊不舉之處人之蒙惠於我者亦得以通達明白實受其賜而無間隔欺蔽之患聖人説政以寛為本而今反欲其嚴正如古樂以和為主而周子反欲其淡盖今之所謂寛者乃縱弛所謂和者乃哇淫非古之所謂寛與和者故必以是矯之乃得其平耳如其不然則雖有愛人之心而事無統紀緩急先後可否與奪之權皆不在已於是姦豪得志而善良之民反不被其澤矣此事利害只在目前不必引書傳攷古今然後知也緩急可否是兩事無程限則緩急不在已不親臨則可否不在已今見争訟人到官常苦不得呈覆須當計㑹案吏然後得之便可見其無政事不待可否失當然後知其繆矣又如縣道送兩税簿上州磨審皆有日限有違失則紏正之無即簽押用印給還今有數月不還者守倅漫不加省如此之類不可勝數以此為寛不知孔子意裏道如何也但為政必有規矩使姦民猾吏不得行其私然後刑罰可省賦歛可薄所謂以寛為本體仁長人孰有大於此者乎河出圖洛出書而起八卦九疇之數聽鳴鳯而生六律六吕之聲因思黄帝造律一事與伏羲畫卦大禹錫疇同功况度量權衡皆起於律而衡運生規規生圓圓生矩繩直凖平至於定四時興六樂悉由是出故曰律者萬事之根本學者詎可廢而不講哉夫黄鐘之管九寸三分損一下生林鐘之管六寸三分益一上生太簇周旋十二律復生黄鐘而還相為宫之義又一宫各生五聲總十二律凡生六十聲如八卦重而為六十四皆自然之理也然司馬遷律數與班固志不同者多未曉攷其實亦無不同但司馬歴書微隱此等尤費思索耳如黄鐘長八寸七分或謂七字是誤盖十分也是為九寸此等不審然否十二律還相為宫今攷禮運疏義黄鐘為第一宫下生林鐘為徴上生太簇為商下生南吕為羽上生姑洗為角林鐘為第二宫終於中吕為第十二宫各有上生下生所管之聲此數盖本於司馬遷歴書然與黄鐘為宫太簇為商姑洗為羽林鐘為徵南吕為羽應鐘為變宫㽔賔為變徵者不同其次大吕太簇終於無射應鐘凡十二律迭相為宫其下各有商角羽徵變宫變徵之聲向見書堂七絃琴凖用此法以定清濁高下之聲但不知疏義各為一説孰是孰否其必各有所主也變宫變徴其聲清耶不知古律已用之否或後來增加之也至於埋律候氣一事尤所未曉書傳所載候氣之法置十二律於宻室實灰葭管埋之地中一氣至則一律飛灰或疑所置諸律方不踰數尺氣至獨本律應之何也此必有造化宻相感召之理或又按隋志之説曰律之長短不同各齊其上隨深淺入地中冬至陽氣距地面九寸而止惟黄鐘之管九寸故達此説似為有理今因其説而推之十一月黄鐘管長九寸十二月大吕八寸四分正月太簇管長八寸二月夾鐘長七寸推而下之其長者逓减至九月無射五寸十月應鐘四寸五分雖埋律之地方不踰數尺氣至無有不達然候管長短不同管長者氣必先達灰亦先動管短者氣達在後亦如所謂南枝春先到北枝差遲耳不審然否律呂之説今有新書并辨證各一冊及向時所撰序一篇并徃可細考之當得其説凡十二律各以本律為宫而生四律如黄鐘為宫則太簇為商姑洗為羽林鐘為徵南吕為角是黄鐘一均之聲也若林鐘為宫則南吕為商應鐘為角太簇為徵姑洗為羽是林鐘一均之聲也各就其宫以起四聲而後六十律之聲備非以黄鐘定為宫太簇定為商姑洗定為羽林鐘定為徴南呂定為角也但黄大太夾姑中㽔林夷南無應為十二律長短之次宫商角徵羽為五聲長短之次黄鐘一均上生下生長短皆順故得各用其全律之正聲十二律名今俗樂亦用之合字即是黄鐘但其律差高耳筆談言之甚詳可呼俗工問之自林鐘之宫而生太簇之徴則林鐘六寸而太簇八寸徴反長於宫而聲失其序矣故以十二律而言雖當為林鐘上生太簇而以五聲而言則當為宮下生徴而得太簇半律四寸之管其聲方順又自太簇半律四寸之徴而生南吕五寸有竒之商則於律雖本為下生而於聲反為上生矣自南吕五寸有竒之商而生姑洗七寸有竒之羽則於律雖本為上生而於聲則又當用其半而為下生矣自姑洗半律三寸有竒之羽而生應鐘四寸有竒之角則於律雖為下生而於聲反為上生矣其餘十律皆然孔疏盖知此法但言之不詳耳半律杜佑通典謂之子聲者是也此是古法但後人失之而惟存黄鐘大吕太簇夾鐘四律有四清聲即此半聲是也變宮變徴始見於國語注中及後漢樂志乃十二律之本聲自宫而下六變七變而得之者非清聲也如黄鐘為宫則第六變得應鐘為變宫第七變得㽔賔為變徵如林鐘為宫則第六變得㽔賔為變宫第七變得大吕為變徴是也凡十二律皆有二變一律之内通前五聲合為七均祖孝孫王朴之樂皆同所以有八十四調者盖每律各添此二聲而得之也新書此説甚詳候氣之説其中亦已論之盖埋管雖相近而其管之長短入地深淺有不同故氣之應有先後耳非以方位而為先後也但畫一圖朝夕看誦仍於指掌閒輪之久久自熟乃見其妙此又可騐凡事皆然别無竒巧只是久而習熟便是妙處也禮書有此一巻比新書差約偶在他處俟取到寄去看也天有黄赤二道沈存中云非天實有之特歴家設色以記日月之行耳夫日之所由謂之黄道史家又謂月有九行黑道二出黄道北赤道二出黄道南白道二出黄道西青道二出黄道東并黄道而九如此即日月之行其道各異况陽用事則日進而北晝進而長隂用事則日退而南畫退而短月行則春東從青道夏南從赤道秋西從白道冬北從黑道日月之行其不同道又如此然每月合朔不知何以同度而㑹於所㑹之辰又有或蝕或不蝕悉未能曉向承指喻其行或高而出黄道之上或低而出黄道之下或相近而偪或差逺而不相値則皆不蝕是時不能反覆今望賜誨日月道之說所引皆是日之南北雖不同然皆隨黄道而行耳月道雖不同然亦常隨黄道而出其旁耳其合朔時日月同在一度其望日則日月極逺而相對其上下弦則日月近一而逺三如日在午則月或在卯或在酉之類是也故合朔之時日月之東西雖同在一度而月道之南北或差逺於日則不蝕或南北雖亦相近而日在内月在外則不蝕此正如一人秉燭一人執扇相交而過一人自内觀之其兩人相去差逺則雖扇在内燭在外而扇不能掩燭或秉燭者在内而執扇者在外則雖近而扇亦不能掩燭以此推之大畧可見此說在詩十月之交篇孔疏説得甚詳李迂仲引證亦博可并檢看當得其説易啓蒙曰圓者河圖之數方者洛書之文夫河圖無四隅之位截然四正而方謂之圓何也又曰圓者星也歴紀之數其肇於此乎注云歴法合二始以定剛柔二中以定律歴二終以紀閏餘今攷班固志天數始於一中於三終於二十五地數始於二中於六終於三十夫始中終盖如此推之於剛柔律歴閏餘却有未深􅉷者抑亦履端於始舉正於中歸餘於終之義乎然亦不合願求其説河圖旣無四隅則比之洛書固為圓矣注中三句本唐書歴志一行之説二始者一二也一竒故為剛二耦故為柔二中者五六也五者十日六者十二辰也二終者十與九也閏餘之法以十九歲為一章故其言如此然一章之數似亦附㑹當時姑借其説以明十數之為河圖耳寗武子邦有道則智邦無道則愚其智可及也其愚不可及也此章一句初理㑹不得今讀集注參攷左氏傳乃知武子當衛成公無道失國之時周旋其間盡心竭力而不去及成公囚京師武子求掌槖饘賂醫薄酖免衛侯於死終以復國及元咺之訟武子又獨以忠而獲免其能保身以濟其君如此雖謂之智可也而夫子曰其愚不可及夫子甞曰君子哉蘧伯玉邦有道則仕邦無道則可巻而懷之以伯玊之事責武子雖謂之愚不識時亦可也然武子惓惓忠君不避險艱能為人所不能為抑亦難矣故夫子曰其愚不可及盖閔之也今觀論語一書於有道無道之世屢致意焉其稱南容曰邦有道則仕邦無道則􅊵於刑戮武子之免者亦幸矣然武子仕衛兩世其君信任之義不可棄之而去其幾於東漢王允乎允又不免被害嘗聞先生誦周子之言曰學顔子之學志伊尹之志夫伊尹以天下為己任者也治亦進亂亦進然使成湯不興聘幣不至雖五就桀其志曷施陳蕃漢代人豪驅馳險阨之中與刑人腐夫同朝爭衡屢退而不去者以仁而為己任非人倫莫相恤也卒以謀疎見殺亦昧於夫子免刑戮之戒矣然陳蕃王允猶是當時朝廷倚任身居鼎軸義當與國存亡故程子曰亦有不當愚者比干是也若無言責官守則如東海逢萌當先漢之亂憤三綱之旣絕挂冠東都門浮海而去惟恐其或緩也君子之道或出或處或黙或語詎可不識時㡬聊發狂言以驗中否所疑寗武子事大概得之但為蘧伯玊南容之愚則易而為武子之愚則難所以聖人有不可及之嘆也陳蕃王允固不得為伯玉南容之愚然蕃事未成而謀已泄允功未就而志已驕則又不能為寗武子之愚矣此其所以取禍也然為逢萌則甚易為二公則甚難又不可以彼而責此但當問其時義之如何與其所處之當否耳答廖子晦陳君全未有用心處相見殊未有益近時後生多只如此難可以向上事期望之只如老蘇但為學做些小語言文字直將聖賢之言兀然端坐終日讀了七八年今人説要學道乃不曾畧􅂸得旬月工夫讀一巻書不曾成行記得如此而望有成吁亦難矣答廖子晦顔子之歎一段是顔子見處今無的確證驗之可言但以義理推之且得如諸先生及集註之説庶幾少病如有所立卓爾只是見得比之舊時愈見親切不似鄉來無捉摸處但亦未有道理便得入於其間據為已物耳今此謂在顔子心目之間則是先來所見者不在顔子心目之間又以為方是實見則前此非是實見矣恐不然也大抵此等處吾輩旣未到彼地位臆度而言只可大槩實説却於其中反覆涵泳認取它做工夫處做自己分上工夫久之自當心融神㑹黙與契合若只似此直以今日所見附㑹穿鑿只要説得成就正使全無一字之差亦未有益况以近觀逺以小觀大又自不能無所失乎心性一段大概則然但中間方説心為之主不知從前説太極二五四端之未發時此心却在甚處可更思之實見一段大意極善然非熹之説也程先生遺書中自有一段説得極分明章首云皆實理也人知而信者為難云云即此意也大學誠意章説如惡惡臭如好好色亦是此意可并詳之曾㸃一段集註中所引諸先生説已極詳明盖以其所見而言則自源徂流由本制末堯舜事業何難之有若以事實言之則旣曰行有不揜便是曾㸃實未做得又何疑哉聖人與之盖取其所見之高所存之廣耳非謂學問之道只到此處便為至極而無以加也上蔡所記伊川先生與之荅問天下何思何慮一段語意亦正類此見於外書可并檢看然則學者觀此要當反之於身須是見得曾㸃之所見存得曾㸃之所存而日用克己復禮之功却以顔子為師庶幾足目俱到無所欠闕横渠先生所謂心要𢎞放文要宻察亦謂此也來喻大概得之然其間言語亦多有病其分根原學問為兩節者尤不可曉恐當更入思慮也禮書中青史氏之記見大戴禮經世紀年其論甚正然古人已嘗言之如漢高后之年則唐人已於武后中宗紀發之蜀漢之統則習鑿齒晉春秋已有此論矣堯以甲辰年即位乃邵康節皇極經世説諸家之説亦有同者此則荒忽不可究知敬夫所説牴牾處必是謂武王克商之年泰誓序作十一年經作十三年而編年之書乃定從序説鄉見柯國材説以洪範攷之訪於箕子是十三年事必是當年初克商時便釋其囚而問之不應十一年已克商至兩年後乃問之也其説似有理亦甞以告敬夫敬夫大以為然其書已甞刋行至是遂止敬夫之服善如此亦難及也潮州王尚書舊甞識之其人勁正忠實有餘在言路甞論湯思退之姦而逐之但為人頗疎率學問偏任己見諸經極有怪説立朝議論亦有不到頭處然不害為一代正人今所得奏議煩録一本見寄傳景初是其壻恐必有本旦夕當寄書問之也樂記圖譜甚荷録示但尚未曉用律次第此間有人頗知俗樂方欲問之偶以事冗未暇此固未必盡合古制然未及百年而淪廢已如此是可嘆也韓文攷異袁子質鄭文振欲寫本就彼刻版恐其間頗有僞氣引惹生事然當一面録付之但開版事須更斟酌耳若欲開版須依此本别刋一本韓文方得又恐枉複勞費工力耳禮書入疏者此間已校定得聘禮以前二十餘篇今録其目附去彼中所編早得為佳此間者已送福州令直卿與劉履之兄弟參校寫成定本尚未寄來若有可增益處自不妨添入也然因此得看禮疏一番亦非小補不然此等如嚼木札定無功夫看得也答廖子晦來書疑著生死鬼神之説此無可説只縁有箇私字分了界至故放不下耳除了此字只看太極兩儀乾父坤母體性之本然還有此間隔否耶答廖子晦前此屢辱貽書有所講論每竊怪其語之不倫而未能深曉其故只據一時鄙見所未安處草草奉答徃徃只是說得皮膚不能切中其病所以賢者亦未深悉而猶有今日之論也此雖微陋疎率之罪然因此却得左右明辨力扣敷述詳明然後乃能識得前後所説之本意而區區愚見亦因得以自竭非小補也盖詳來喻正謂日用之間别有一物光輝閃爍動蕩流轉是即所謂無極之真所謂谷神不死二語皆來書所引所謂無位真人此釋氏語正谷神之酋長也學者合下便要識得此物而後將心想象照管要得常在目前乃為根本功夫至於學問踐履零碎凑合則自是下一截事與此粗細逈然不同雖以顔子之初鑚高仰堅瞻前忽後亦是未見此物故不得為實見耳此其意則然矣然若果是如此則聖人設教首先便合痛下言語直指此物教人著緊體察要令實見著緊把捉要常在目前以為直截根原之計而却都無此説但只教人格物致知克已復禮一向就枝葉上零碎處做工夫豈不誤人枉費日力耶論孟之言平易明白固無此等𤣥妙之談雖以子思周子喫緊為人特著中庸太極之書以明道體之極致而其所説用功夫處只説擇善固執學問思辨而篤行之只説定之以中正仁義而主静君子修之吉而已未甞使人日用之間必求見此天命之性無極之真而固守之也盖原此理之所自來雖極微妙然其實只是人心之中許多合當做底道理而已但推其本則見其出於人心而非人力之所能為故曰天命雖萬事萬化皆自此中流出而實無形象之可指故曰無極耳若論功夫則只擇善固執中正仁義便是理㑹此事處非是别有一段根原功夫又在講學應事之外也如説求其放心亦只是説日用之間收斂整齊不使心念向外走作庶幾其中許多合做底道理漸次分明可以體察亦非捉取此物藏在胸中然後别分一心出外以應事接物也來書又云事事物物皆有實理如仁義禮智之性視聽言動之則皆從天命中來須知顔曾洞見全體即無一不善此説雖似無病然詳其語脉究其意指亦是以天命全體者為一物之渾然而仁義禮智之性視聽言動之則皆是其中零碎查滓之物初不異於前說也至論所以為學則又不在乎事事物物之實理而特以洞見全體為功凡此似亦只是舊病也且曰洞見全體而後事無不善則是未見以前未甞一一窮格以待其貫通而直以意識想象之耳是與程子所訶對塔而說相輪者何以異哉來喻又疑考異中説韓公見道之用而未得其體以為亦若自謂根原學問各有一種功夫者此亦不然前日鄙意正為韓公只於治國平天下處用功而未甞就其身心上講究持守耳非病其不曾捉得此物藏在懷袖間也此是學問功夫徹上徹下細宻緊切處向使不因來喻之詳終未覺其病之在是今幸見得不是小事千萬詳看此説子細尋繹更推其類盡將平生所認有相關處一一勘驗當自見得如有未契更宜反覆不可容易放過也安卿之病正亦坐此向來至此說得旣不相合渠便藏了更不説著遂無由與之極論至今以為恨或因與書幸亦以此曉之勿令久自拘縶也大顚問答初疑只是其徒僞作後細思之想亦有些彷彿計其為人山野質朴雖不㑹説而於修行地位做得功夫著實故其言語有力感動得人又是韓公所未甞聞而亦切中其病故公旣聞其語而不覺遂悦之也然亦只此便見得韓公本體功夫有欠闕處如其不然豈其自無主宰只被朝廷一貶異教一言而便如此失其常度哉此等處極不可草草㸔過更宜深體之也其餘已具見於考異外集卷中者今不復論然若不得此碑亦無由見得許多曲折也坡公海外意况深可嘆息近見其晚年所作小詞有新恩雖可冀舊學終難改之句每諷詠之亦足令人慨然也二詩亦未甚曉不敢又便率然奉答然恐亦只是舊來意思但請只就前説觀之恐亦可自見得矣盖性命之理雖微然就博文約禮實事上看亦甚明白正不須向無形象處東撈西摸如捕風繋影用意愈深而去道愈逺也考異答嚴居厚久當純熟明快快一作决答廖子晦故又曰中者天下之大本一本無又字晦菴集卷四十五欽定四庫全書
