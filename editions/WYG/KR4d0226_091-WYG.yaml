seq: 91
front:
  text: 墓誌銘
  hash: sha256:1ac66613c1bc0c2408b81474e658932f2b7c755f19b72b2ba2647721f0a6ce04
body:
  text: 劉十九府君墓誌銘熹年十四五時以先君遺命學於故聘士劉君先生時幼且愚未足以識其大者逺者特觀於容貌詞氣之間知其偉然非今世之士也既又獲見於先生之兄十九丈府君者詞色俯仰蓋與先生不異而温厚謹良則又過之因亦甚敬愛其為人及少長而先生以女妻之又得數往拜於府君之側時府君老矣然其持已接人動有法度危坐終日無怠惰偃側之容與人言必依於孝弟忠信至於治生處事之方耕稼蠶績之務亦皆纚纚有條理間而及於先世遺事與夫鄉里故家舊俗之傳則必顧而歎曰吾之不復見此也久矣夫熹於是退而毎為朋友道之以為前輩氣質淳厚悃愊無華而其謹於禮法粲然有文又如此蓋不惟其天資之美抑亦昇平教化之餘澤衣冠文物之遺風其視今人誦書業文沾沾自喜而輕儇浮媠反無以異於市井之人者相去逺矣如是三十餘年而府君卒既葬其子某狀其行以授熹使為之書以表於墓道熹按府君諱某字致端建寧府崇安人其曾大父職方郎中贈開府儀同三司諱某始以文學起家歴典數州皆有惠愛大父朝請郎諱某為縣有所不得行其志年未七十即致其事以歸父某明經勵行不仕以卒而鄉人敬之娶同郡余氏讀書史有智識實生府君兄弟國子祭酒翁公所為志其墓者也府君於兄弟為最長自少則任家事以故不及於學而其孝愛恭敬誠信敦篤自有以過人者家世清貧至先府君時食口益衆府君經營纎宻而不失大體蓋凡春秋晨夕之奉婚喪燕勞之須以至族姻黨友賀吉而弔凶其厚薄往來之數無不稱情而合禮者先府君於是得以放情事外而遂其高諸弟亦皆得以遊學四方親師取友各成就其器業而聘君先生卓然傑立遂為一世之聞人名立於不朽實府君有以相之也府君自少無外慕晚嵗足跡不出里門者數十年其精神氣力老而不衰登山臨水常翛然獨往其所以自樂者人不得而言也年八十有五以乾道癸巳正月原缺日病卒於家而葬於宅之西南數百步曰彭原者府君娶信安祝氏有賢行前卒子男某也女適進士江之瑞孫男潤女三人凡狀之所載如此與熹前所竊論者實相發明謹叙而并書之且為之銘銘曰士學口耳弗誠以身既佻以儇汙我冠紳孰如丈人庸信庸謹詞無支葉動有繩凖彭原之木有翳其隂我銘斯刻以詔來今國録魏公墓誌銘元履姓魏氏舊名挺之後更名掞之則字子實然其以元履聞也久故稱者莫能易也家建寧府建陽縣之招賢里以儒學顯其胄出遷徙之所繇則故侍郎胡公寅巳識於元履先君子之墓矣元履幼有大志少長逰郡庠事籍溪先生胡公憲先生竒之已而徧從鄉之儒先長者遊間適四方又盡交其先達名士於是聞見日廣而聲稱日益大嘗客衢守章傑家㑹故相趙忠簡公薨海上歸葬常山傑雅怨趙公又希秦檜意逮繫其家人劾治甚急人畏其兇虐無敢議者元履獨慨然以書噍讓傑長揖徑歸傑亦不能害也兩以鄉舉試禮部皆不第閩帥汪公應辰建守陳公正同知其賢相與論薦於朝時相尼之又不得召後數嵗詔舉遺逸部刺史芮公􅂱遂帥其僚與帥守六人者共以元履行誼為言於是詔特徴之元履辭謝不獲則以布衣入見極陳當世之務大要勸上以修徳業正人心養士氣為恢復之本上奬歎開納勞問移時明日遂有詔賜同進士出身授左迪功郎守太學録乾道四年十有二月也異時學官不與諸生接亦漫不省學事徒養望自高而已元履既就職則日進諸生而教誨之且視其居有壊者或幾壓焉則請於朝得緡錢四十萬以葺之釋奠孔子祠職當分獻先賢之從祀者則先事白宰相王安石父子以邪説惑主聴溺人心馴致禍亂不應祀典而河南程氏兄弟唱明絶學以幸來今其功為大請言於上廢安石父子勿祀而追爵程氏兄弟使從食不聴它日又言太學之教宜以徳行經術為先其次又當使之通習世務以備官使今壹以空言浮説取人非是又不聴至它政事有係安危治亂之機而宰相不能正臺諫侍從不敢言者亦無不抗䟽盡言以諫至三四上不納則移病杜門以書質責宰相語尤切宰相雅知元履招徠之至是始不能平而元履前已數求去矣遂以迎親予告使歸行數日罷為台州州學教授元履自少則有志於當世晚而遇主謂可以行其學然其仕不能半嵗而不合以歸間獨喟然歎曰上恩深厚如此而吾學不至無以感悟報塞吾罪大矣先是嘗榜其書之室曰艮齋至是日處其間方將條理舊學以益求其所未至從遊之士稍有自逺來者而不幸病不起矣病革時顧念君親處理家事無一言之繆其母視之不巾不見也戒其子毋以僧巫俗禮凂我且以書召其友新安朱熹至則盡以終事為寄而訣卒之日實九年閠月壬戌其年五十有八矣娶同郡劉氏徴士勉之之兄女先十九年卒繼室虞氏子男二人孝伯國學進士孝朋尚幼所為文章若論議訓説合數十卷藏於家元履於學無不講而尤長於前代治亂興廢存亡之説以至本朝故事之實皆領畧通貫識其大者平居論説聴者悚然居家謹喪祭重禮法恤親舊雖貧不懈從父有落南者千里迎養死葬如禮而字其孤尤有恩嵗饑為粥以食餓者而力請移粟於官邑里賴焉又嘗請督鄉人之不葬其親者富予期貧予費而掩其無主後者以千數為文以戒生子而不舉者所全活者亦甚衆與人交尤盡情嘉其善而救其失如恐不及後進以禮來者苟有一長必汲汲推挽成就之其處心制行類如此故嘗有病其為人太過者元履笑曰不猶愈於横目自營者耶至或訾其近名則蹙然曰使夫人而皆避此嫌則為善之路絶矣此其學道愛人之本意也嗚呼使其老夀通達舉而施之則其所以及人者為如何哉孝伯將以七月己未奉其柩葬所居之南不十里所謂長坂者元履平生時所樂處也予往蒞其卜孝伯泣拜奉嚴君士敦之狀以銘文為請予惟元履垂絶之言若有及此者顧雖不能不忍負也則應曰諾退視其狀不誣因掇其大者序而銘之銘曰謂天嗇之則曷其材且志也曰其徳之則又不年以位也竟使抱其餘以没於地也我銘以哀之又以掩其隧也陳師徳墓誌銘自周衰官失而民無常産士不知學或者務為剽掠纂組之工以希名射利蓋本出於俯仰寒餓之迫有不獲己者而其後或更以為能焉俗弊風訛迭相夸尚於是公卿子弟之才者往往亦慕而為之無所於迫而徒取􅃷鬻之羞顧反薄君恩輕世禄捐本學以從事於場屋無用之文舉世競馳恬不覺悟而聖賢修已治人之方國家禮義亷恥之教益泯泯矣嗚呼斯其為弊也久矣不有卓然高志逺識之士其孰能有以反之哉如吾師徳者蓋庶幾焉而又不及就其志而疾病以死其亦可哀也已師徳莆田人姓陳氏名定丞相信安公之第三子也母曰福國夫人聶氏師徳生秀異自孩幼已有成人之度年十二三則已知古人為己之學而不屑為舉子之文矣一日以公命因予友括蒼吳君耕老以書來道其志而請業焉予三復其辭而嘉之然亦意其必已淫思力索於空幻恍惚之場也則報之曰聖賢之學雖不可以淺意量然學之者必自其近而易者始師徳於是始欲因予言而反求之既疲於宿昔思慮之苦而感疾殆矣其後屢欲求見且將徧求世之有道君子而師友之竟以病不果行且死猶語其友方來耕道使言於予以不及相見為深恨明年其仲兄守師中見予於建陽遂以耕道所狀行實一通屬予銘其竁予不忍辭也狀言師徳性至孝事信安公及母夫人曲盡愛敬劑和烹飪必躬必親左右周旋不違義理而未嘗失顔色於兄弟尤友愛以公奏授右承奉郎娶同郡林氏朝請郎一鳴之女年二十有五以淳熈甲午七月己亥卒於其疾之革也公夫人往視之謂曰死生有命汝所知也師徳拱手對曰戰戰兢兢如臨深淵如履薄氷又顧其兄屬以問學修身之意越夕而逝公夫人哭之哀以其伯兄之子福孫後之而葬之石泉祖塋之側嗚呼有如師徳之志而其行事可得而書者止於如此是不亦可哀也哉然其所立視世俗之學昧利辱身得已而不已者則既絶矣夫豈不足以頗慰公夫人之念與其兄弟朋友之思哉予是以銘曰士孰不學其方則殊毫忽之差有蹠其徒卓哉若人惟義之學刻意劬躬蹈履前覺天不耆之以駿其奔淵氷免矣志氣則存石泉之瀕於袝於宅孰全其歸視此幽刻何叔京墓碣銘邵武之東百里而近七臺之麓小溪之濱有君子者曰何君名鎬字叔京予獲從之遊相好也今年冬過予於寒泉精舍留止浹旬歸而屬疾既病則手書來告訣語不及私獨以不獲終養卒學為深念而於當世之慮亦眷眷不忘也時予别君甫踰月發書驚歎失聲亟走省焉至則君已逝矣既入哭盡哀明日君之親友門人以予至皆復來會哭相弔議語葬故君嗣子琰亦衰絰杖出拜伏哭固以銘墓為請予惟君實以其死累我今其子又哀以請如是其何説之辭則與諸來會者共訂君事皆曰君家臺溪且數世世有隠徳至君皇考諱兌始仕為左朝奉郎通判辰州事娶陳氏劉氏林氏鄧氏皆封安人而君劉出也生孝謹有器識既出就傅暮歸則不復去親側誦書日數千言為文敏而有思趣尚高逺識者竒之辰州嘗受程氏中庸之學於故殿中侍御史東平馬公伸服行不怠又以其忠節事狀移書太史忤秦檜下吏􅇡南方危死不恨間復悉以其所聞者語君君既受其説則益務貫穿經史取友四方博考旁資以相參伍蓋久而後有以自信之於是一意操存杜門終日澹然若無所營者至其論説古今指陳得失則又明白慷慨可舉而行平居崇徳義厲亷節絶口未嘗及功利至於收族恤孤興事濟衆則又懇惻憂勞如已嗜欲言行相循没身不懈由此南州之為程學者始又知有馬氏之傳焉始用辰州致仕恩補官授泉州安溪主簿未赴鄧舅祚帥江西辟掌書冩機宜文字再調汀州上杭丞數行縣事専用寛簡為治白罷税外無名之賦人便安之部使者鄭君伯熊名好士行部得君喜甚顧郡事為不理囚繫或累嵗月不得釋檄君佐其守君入幕悉取文書閲視具得其所以然者持白守决遣之旬日皆盡又以田税不均貧弱受病夙夜疚思為所以均之之説甚備他所以彌縫補助者亦盡其力而守顧不悦君即謝去君事鄧安人素謹其赴上杭也安人以瘴毒為憚君不敢請遂單行至官嵗以公事一再歸省毎行輙不受俸秩滿計其月十有四悉歸其券於有司一時學士僚友高君學行多師尊之而當路鮮識之者君固不求亦不自悔獨以年格循資調潭州善化令將行而卒年四十有八淳熈乙未十有一月丁丑晦也君為人清夷恬曠亷直惠和談經論事簡易條暢所著書有易論語説史論詩文數十卷其言多可傳者晚築書堂所居南坂上名以高逺用見已志疾病召子弟教戒一以義理終不及家人生産事獨曰治喪以禮勿用浮屠鬼教亂吾法而已娶同郡李氏其叔父郁學於龜山楊公所謂西山先生者也子男琰為長次某長女適吳大同次馬棟次未行也諸君所論君行事如此皆予所聞知琰等葬君東碭之原予既書其最納竁中然閒嘗竊目君學行可以司教育論議可以陪獻納而其心誠才實又可以宣徳澤而惠鰥寡今乃僅得一縣令而又不及試以死此為重可哀者乃復叙次其詳刻石表墓且系以銘銘曰清直而温夷易而方惟學不懈厥猷以光孰啓於家而居於邦孰豐其粹而嗇其長帝罔弗𠂻氣或交沴既欽厥承君則奚愧莫尊匪徳莫久匪言銘以相之刻石墓門夫人吕氏墓誌銘夫人姓吕氏建寧府建陽縣長平里人其先世於唐為河東著姓乾符中有侍御史行立者避地始家建陽入宋餘百年乃有顯人而夫人之父希説亦進士中第剛介不苟合晚乃為劒浦令以卒夫人生愿慤不妄戯笑未笄失其母劒浦俾治家事撫弟妹如成人㝷以歸邵武饒君偉事舅姑甚得其懽心餘年生子幹甫睟而寡夫人誓志秉節毅然不可奪無何劒浦及皇舅漳州府君亦皆卒而姑氏固前没饒氏固清貧諸叔妹皆幼稚夫人以孀婦抱弱子持守門户奉承賓祭和輯上下内外斬斬無間言其出内用度不以一錢自私文薄整整雖龠合分寸無所漏少或遺亡則為之躊躇不懌者累日指馭僕妾接隣婦里嫗咸有恩意幹幼時愛之異甚捧視潄沐一不以委他人及少長遣就學則程其術業謹其出入交遊之際未嘗輙借以顔色幹亦孝謹敦實能自力學問見稱朋友間中淳熙二年進士第人謂夫人盛年苦節以有斯子今且享其報矣始夫人女弟為劉氏婦早卒至是其子崇之與幹偕選夫人為其母之不見毎及之未嘗不悲歎出涕人又以是知夫人之薄於榮利而厚於孝慈也幹調吉州吉水縣尉將行夫人屬㣲疾一夕遂不起聞者莫不哀之嵗丁酉秋七月十四日也時年五十有六明年幹卜葬夫人於其鄉之思順里而奉其友江州録事叅軍游九思之狀來請銘拜起涕泗嗚咽不能言予哀其志亦雅聞夫人行實如游掾言因删取其大者叙而銘之曰皇皇后帝垂三剛制婦繫夫隂綂陽盛衰脩夭初莫量有繫弗改兹厥長吁嗟夫人仁且莊祗若帝訓篤不忘疚㷀艱棘廩欲僵卒濟厥子後以昌玊靈食墨此澗岡納詞誄行告幽荒山夷淵實無壊傷特奏名李公墓誌銘邵武軍光澤縣東里所有地曰烏洲李氏世居之為郡著姓其先有贈大理評事者諱鐸始以文行知名鄉黨生太常博士誥始登進士第卒贈朝請大夫陳忠肅公賢之稱其真率樂易有古人之風其仲子深紹聖間以論斥時相之姦與任公伯雨等俱入元祐籍季曰處士淳隠居不仕而其葬也右文殿修撰李公夔實銘之蓋自其先世所與交游姻好盡一時知名士故其子弟見聞開廓趣尚高逺不與世俗同若特奏府君諱某字得之者則處士之長子也少治周禮學兼通左氏春秋為文簡古不逐時好弱冠遊太學薦而不第舍法行當充貢又不果行竟以累試禮部恩奏名天府將入奉廷對前一日卒於臨安之客舍實紹興五年八月十八日年才五十有二歸殯宅之東岡三十二年其子吕乃更卜兆於烏君山下獅子嶺之原奉其柩而遷焉淳熙六年吕始見予廬阜之陽如舊相識一日泣而言曰吕不孝先人之没二十七年而後克以禮葬塟又十有九年矣而未克識將無以為幽逺無窮之計惟吾子幸而予之銘因出其親友崇陽大夫游君訔之狀以請予辭謝不獲乃次其事如右按狀又言府君為人事親孝謹友愛其弟甚篤之死不少衰遇族黨有恩意少有忿爭則為居間極力平處不令入官府不幸死喪則為經理其家事而任其婚嫁之責嘗有死上庠者遣仲弟䕶其匶以歸里人有以惡聲至者未嘗與之較至周其急則輟衣食不顧也諸弟嘗問善人之道府君語之曰臨事而無隂據便利之心斯可矣又嘗語人事有當為力雖未及亦勉為之若必有餘而後為則終無時矣此其行身及物之本意也平居方嚴不妄戯笑而遇事輙應無所凝滯從弟西山先生嘗面歎曰兄於答問若不經意而受其言者反覆十思終無以易此非諸弟所能及也性尤敦厚質實發言處事不以幽顯物我為間樂聞人善而務掩其惡所與交皆巨人長者無不愛而敬之縣嘗以民兵為屬府君為制戰陳擊刺之法而以時閲習之甚可觀也令欲以聞冀為府君得勲賞府君笑謝去不復有所預時海内多虞舉人有不能試禮部者往往以恩直補官人有謂府君盍自言者府君不答老之將至婆娑丘林吟諷書史逌然自適未嘗有不遇之歎也嗚呼予生晚不及識府君而游君不予欺也則府君者可謂好徳有常之士矣乃不得少見於用以没其身其亦可悲也夫夫人上官氏朝議大夫合之女繼室黄氏曲江令銓之女子男三人吕為長次某次某女四人游君與將仕郎高志旻從政郎何鎬保議郎上官賁其婿也孫男女於今二十有六人而呂之彊學既有聞又教諸子皆有法天之所以報府君者其將在於此乎乃為之銘使刻墓上以竢其詞曰利不自予惟義之取義則彊為惟仁之歸孰長其源不豐其委斯丘斯藏有起無墜金紫光禄大夫黄公墓誌銘淳熙六年春正月端明殿學士黄公寢疾於邵武故縣之私第熹往問其起居謁入公正衣冠舉扶起坐顧中子瀚召熹入至則又扶以立辱與揖讓為禮共坐食飲恭謹不懈如常時卒食又扶而起涕泣為熹言曰中也先考妣之藏久未克識蓋不敢輕以屬人今以累子子其為我成之熹頓首辭謝不敢當而公命之不置熹懼以久勞公則不敢辭而受命以出歸又以書辭未報而公薨諸子遣使來訃且致遺命以同郡李君吕之狀來熹既哭公盡哀且念今則無所於辭乃考其狀而附以所聞為列其事曰謹按右宣義郎致仕贈金紫光禄大夫黄公諱崇字彦高其先光州固始人十一世祖膺避地閩中今為邵武軍邵武縣人曾祖扆有隠徳為鄉里所尊晚以子登朝授太常丞以卒故知制誥吕公夏卿實銘其墓後以孫履為尚書右丞累贈司徒祖汝臣不仕父豫用右丞奏為右承務郎皆以孝謹聞於鄉黨公自幼力學日誦千言人謂是且大其門矣既長承務公任以家事於是無復進取意既孤而貧悉力治喪不以累其昆弟而所以為禮者無不備觀者歎息母孫夫人春秋高性嚴而多病公治養勤劇得其驩心隣家有李永者尚氣節雅敬慕公察公養親之意有餘而力不足請助公以經紀公亦信之不疑竭貲付之一不問其出入如是者十有五年李衘公徳將死感慨執公手曰子吾父也公之兄客遊以疫死人無敢往視之者公獨毅然告行千里還柩視其槖得餘貲尚百餘萬悉奉以歸其寡嫂不以一毫自私平居恭儉自守不妄取予至其教子擇師雖輟衣食無所愛由是二子皆舉進士及公時取高科以徳業風概各有聞於當世既又並登朝列遇郊慶奏公為右宣義郎而致其事公乘安車東西就養二子皆孝謹篤至諸孫滿前晨夕所以奉養娛樂公者甚備鄉黨榮之紹興癸酉正月十九日以疾卒於南劒州沙縣之寺舍享年八十有一其年十月塟於九墪先塋之次娶建安游氏先卒亦以二子故追封孺人一女適貢士劉紀公卒時端明公方以某官通判建州事而季於章亦以某官知沙縣事其後端明公被遇太上皇帝擢館職郎曹史官攝賛書命兼司業祭酒侍講歴工吏兵禮部侍郎又以府教授給事中兵部尚書事今上皇帝侍讀禁中正色立朝聲烈甚茂以顯謨龍圖閣學士退老於家天子又乞言焉即拜端明殿學士恩禮殊渥而海内有識之士亦莫不歸心焉沙縣屢宰劇邑有能稱然不肯媚事權豪後以御史中丞湯鵬舉薦入臺為主簿又以持論不阿而去提舉福建路常平茶事知台州所至聲績皆可紀以是累贈公至金紫光禄大夫夫人亦啟封本郡而孫曽仕者又十餘人然後鄉人知公所以遺其子孫者為無窮也李君又言吕以壻公孫女嘗得拜公堂上間竊窺觀公之為人望之儼然即之温然危坐竟日無惰容雖遇臧獲不妄言笑自少至老如一日熹以是又知端明公之徳之盛所以没身於禮而不倦者為有自來也嗚呼公其亦賢矣哉敬為作銘銘曰司徒之徳浹於州鄉矧其孫曽弗俊以良光禄之賢克篤其慶隠耀弗章及子而盛其盛伊何學士尚書介也英英亦假節符國慶所覃逮其考廟結紫垂黄天子有詔匪爵之貴惟徳之褒保而弗墜有積彌高我思古人恍其對接承命作銘用亶來葉建安郡夫人游氏墓誌銘有宋建安郡夫人游氏右宣義郎致仕贈金紫光禄大夫邵武黄公諱崇之妻而子端明殿學士諱中台州史君諱章之所追爵也世為建州建陽縣長平里人曽祖正卿祖希古父儀皆不仕而有隠徳鄉里推長者夫人資静淑族母阮氏以婦徳為女師夫人幼嘗學焉受班昭女訓通其大義至它組紉筆札之藝皆不待刻意而能輙過人早孤其母鍾愛之以歸大夫公事舅姑承祭祀勤肅不懈舅喜賓客佳辰令節親舊滿門夫人供饋唯謹未嘗頃刻自逸而委勞於娣姒也姑性嚴諸婦侍旁有二十年不命坐者夫人獨能順適其意盥櫛温清禮無違者姑有疾非夫人進藥不嘗毎因事指言以為諸婦模楷遭舅喪大夫公素貧昆弟相顧謀鬻田以葬夫人曰毋隳爾先業為也退斥槖中􅋔以奉其役以故大夫公得以不煩於衆而襄大事大夫公為人誠慤莊重夫人以柔順堅正佐之相敬如賔謀無不協其待遇族姻謙謹有禮樂道其美而不喜聞其過至其貧困則賙之必盡其力日誦女訓及它經言以自箴警亦頗信尚浮屠法娠子則必端居靜室焚香讀儒佛書不疾呼不怒視曰此古人胎教之法也故其子生皆賢材而夫人所以教之者又甚至稍能言則寘膝上授以詩書少長即為迎師擇友教詔諄悉從兄御史先生學於河南程氏行業淳懿為學者所宗夫人毎語諸子曰視乃舅而師法之足以為良士矣紹興壬子四月二十三日以疾卒病革大夫公泣視之夫人曰生死聚散如夜旦然何以戚戚為哉於是年五十有六矣二子皆舉進士中其科而端明公實以第二人賜第其後侍從兩朝出入二十餘年忠言直節老而益壯退居於鄉天子閔勞以事嘗遣信使奉璽書就而問之其忠孝大節固已偉然而其言行之細又皆可紀人以為夫人之遺教也台州嘗為御史臺主簿亦以治行精敏議論慷慨有聞於時二公前後凡累逢慶恩得追榮其母至今封里人榮之一女則貢士劉紀其壻也卒之明年葬於邵武縣石岐之原大夫公嘗命台州狀其行而未有所託銘後四十有六年端明公乃以命熹其語具於大夫公之誌此不著獨按狀文剟其大者書而銘之銘曰長平之游世有徳人弗耀於世乃里其仁女士攸宜壼彛是式配徳娠賢慶餘善積尚書刺史之徳之才湯沐之封本邦是開煌煌命書賁此𤣥宅伐石篆辭永世貽則端明殿學士黄公墓誌銘公姓黄氏諱中字通老其先有諱膺者自光州固始縣入閩始家邵武至公間十有二世矣公之曽大父汝臣不仕大父豫假承務郎父崇贈金紫光禄大夫母游氏追封建安郡夫人公生而頴悟端慤少長受書不過一再讀退輙黙然危坐竟日問之則皆已成誦矣未冠從舅御史先生定夫愛其厚重手書為夫人賀踰冠入太學㑹京城失守偽楚僣位號公即日出居於外既而邦昌果遣學官致偽詔藥物勞問諸生公以前出故獨無所汙建炎再造丞相潜善公族祖父也雅器重公薦諸朝詔補修職郎御營使司幹辦公事紹興五年舉進士對䇿廷中極論孝弟之意冀以感動聖心天子果異其言擢置上第名次舉首授左文林郎保寧軍節度推官改宣義郎主管南外敦宗院代還秦丞相檜方用事察公意不附已差通判建州事罹外艱服除復差通判紹興府事時公登第二十有餘年矣轉徙外服士友嘆其滯淹而公處之泊如也檜已死公道稍開上記公姓名乃召以為秘書省校書郎兼實録院檢討官遷著作佐郎兼普安恩平郡王府敎授遷司封員外郎兼權國子司業滿歳為紹興二十八年充賀金國生辰使與賀正使袐書少監沈介相先後明年公還獨言敵作治汴宫役夫萬計此必欲徙居以見迫不可不早自為計時約和既久中外解弛無復戰守之備上聞公言矍然曰非但為離宫耶公曰臣見其營表之目宫寢悉備此豈止為離宫者以臣度之敵勢必南敵南居汴則壯士健馬不數日可至淮上事勢已迫惟陛下亟深圖之上是公言而宰相皆不悦顧詰公曰沈監之歸屬耳不聞此言公安得獨為此殊不以為意踰月公復往扣之且曰即不以鄙言為可信請治其罪又皆憮然莫應而右相湯思退怒甚至以語侵公公不為動已乃除沈吏部侍郎而徙公秘書少監以抑之公猶以邊備為言不聴則請補外上不許曰黄某可謂恬退有守矣除起居郎賜以鞍馬非故事也踰月兼權中書舍人顯仁太后崩百官朝臨將避辰日公以非經且引唐太宗哭張公謹事争之已而卜殯日適在權制釋服之外有司議百官以吉服陪位公又論之曰唐制殯在易月之内則曰百僚各服其服啟殯在易月之外則曰各服其初服今殯雖過期獨不得以啟殯例之而服其初服乎且喪與其易寧戚惟稽古定制有以伸臣子之至情者則幸甚㝷差同知三十年貢舉權工部侍郎奏御前軍器所領屬中人其調度程品工部軍器監有不得而聞者非祖宗正名建官之意請得𨽻屬稽考不報金人來賀天申節充接伴使故事錫宴使者謝於庭中至是辭以方暑請拜宇下公持不可乃如故事遂為送伴使還又言聞金日繕兵不休且其重兵皆屯中州宜有以待之明年兼侍講又兼吏兵部侍郎㑹將有事於明堂公請毋新幄帟毋設四輅以節浮費詔從之既而金使復以天申來賀方引見遽以欽宗皇帝訃聞且多出不遜語諸公惟駭不知所為至謂上不可以凶服見使者欲俟其去乃發喪公聞之馳白宰相此國家大事臣子至痛之節一有失禮謂天下後世何且使人或問故將何以對於是始議行禮公又率諸同列請對論决䇿用兵事衆莫有同者公乃獨陳備禦方略且曰朝廷與仇邦通好二十餘年之間我未嘗一日言戰敵未嘗一日忘戰以我嵗幣啗彼士卒我日益削敵日益彊今幸天裭其魄使先墜言以警陛下惟陛下亟加聖心焉蓋公自使還三年毎進對未嘗不以兹事為言至是上始入其説然不數月而金主已擁衆渡淮矣遷權禮部侍郎入謝因論淮西將士不用命請擇大臣督諸軍既而殿帥楊存中以御營使行公又率同列論存中不可遣狀甚力敵騎至江壖朝臣震怖争遣家逃匿公獨晏然如平日家人亦朝暮請行公曰天子六宫在是吾為從臣獨安適耶比敵退唯公與左相陳魯公家在城中衆皆慚服於是車駕將撫師建康而欽宗未祔廟留守湯思退請省虞以速祔公持不可上納用焉而議者獨謂凶服不可以即戎上曰吾固以縞素詔中外矣卒從公言而行月朔留司百官當入臨思退復議寢其禮公又力争得不罷比作主當瘞重公又以初服請右相朱倬不可曰徽考大行有故事矣公曰此前日之誤今正當改之耳倬因妄謂上意實然臣子務為恭順可也公曰責難於君乃為恭耳金既易主明年復遣使來通好議者皆曰土地實也君臣名也先實後名我之利也公又奏曰君臣之名既定則實將從之百世不易者土地則其得失取予非有定也安得反謂之實而先之乎上然之詔公去權號㑹有詔問足食足兵之計公以量入為出為對且曰今天下財賦半入内帑有司莫能計其盈虚請悉以歸左藏且引唐楊炎告德宗語曰陛下仁聖豈不能為徳宗之為哉上亦善之然未及行也未幾今天子受禪登極公始蓋嘗與聞其議至是自以舊學老臣且察左右有以術數惑上聴者首以堯舜禹湯文武周孔所傳正心誠意致知格物之説為上敷陳甚悉㑹詔給筆札侍臣論天下事公既條上且申前奏極論内帑之弊於是有詔更以内藏激賞為左藏南庫明年兼國子祭酒詔以旱蝗星變命近臣言闕政公曰前給筆札羣臣悉已條對今什未一二施行夫言非難行之為難願陛下力行而已無以多言為也已而有㫖自今太上皇后令皆以聖㫖為號公以故典争之不得宰相建遣王之望使金約和公又論之亦不從俄兼給事中明年天申上夀議者以欽宗服除將復用樂事下禮曹公奏曰臣事君猶子事父禮親喪未葬不除服春秋君弑賊不討則雖葬不書以明臣子之罪况今欽宗實未葬也而遽作樂不亦失禮違經之甚乎退復以白宰相且引永祐龍輴未返時事為比左相湯思退曰時已遣使奉迎今則未也公曰此又誰之責也右相張魏公亦曰今乃為親之故不得以前日比公曰太上皇帝於欽宗親弟昆且常北面事之有君臣之義尤恐非所安也退具草將復論之詞益壯厲㝷有㫖集議而廟堂間遣禮官來偵公意公出奏草示之知公議正不可屈乃寢公在東臺不半嵗詔勑下者問理如何未嘗顧已狥人小有所屈内侍李綽徐紳賈竑梁珂遷官不應法諫官劉度坐論近習龍大淵忤㫖補郡已復罷之公壹不書讀繳奏以聞左右已深忌之㑹復有㫖賜安穆皇后家墳寺田而僧遂奪取殿前選鋒軍所買丁禩田以自入軍士以為言事下户部尚書韓仲通以為不可而侍郎錢端禮觀望獨奏予之公復封上曰今若奉行前詔則當以官田給賜不當取諸軍家所買若謂丁禩得之非道軍家不應得買則亦當還直取田不當遽乾没也䟽奏羣小相與益肆媒糵公遂以特㫖罷中書舍人馬騏上䟽留公未報而言事官尹穡希意投隙詆公為張公黨騏後亦不能自堅而公竟去國矣明年乾道改元公年適七十即移文所居邵武軍引年告老除集英殿修撰致仕進敷文閣侍制久之上亦寖悟思公言將復用之五年因御講筵顧侍臣曰黄某老儒今居何許年幾何矣筋力彊否於是召公赴闕公辭謝不獲明年乃起公以老成宿望直道正言去國七年至是復來觀者如堵入對内殿問勞甚寵時用事者方以權譎功利日肆欺罔公因復以前奏正心誠意致知格物者為上精言之又言比年以來言和者忘不共戴天之讎固非久安之計而言戰者徒為無顧忌大言又無必勝之䇿必也暫與之和而亟為之備内修政理而外觀時變則庶乎其可耳上皆聴納以為兵部尚書兼侍讀毎當入直上帝先遣人候視至則亟召入坐語極從容如是數月月必一再見公知無不言其大者則迎請欽廟梓宫罷天申錫宴也初公在禮部論止作樂事公去踰年卒用之然猶未設宴也至是將錫宴公奏申前説且曰三綱五常聖人所以維持天下之要道須臾不可無也欽宗梓宫逺在沙漠為臣子者未嘗以一言及之獨不錫宴一事僅存如魯告朔之餼羊爾今又廢之則三綱五常掃地盡矣陛下將何以責天下臣子之不盡忠孝於君親哉已而詔遣中書舍人范成大使金以山陵為請公又奏曰陛下聖孝及此天下幸甚然置欽廟梓宫而不問則有所未盡於人心且令夷狄之君臣其或以是而窺我矣上善其言而不及用金於是果肆嫚言人乃服公論之正而識之早也公又嘗奏請命有司作乾道㑹計録以制國用罷去發運使及它民間利病邊防得失數事公前以不得其言而被讒以去其復來也將有以卒行其志而上意鄉公亦益厚至是不能卒嵗又以言不盡用浩然有歸志然猶未忍决求去也乃陳十要道之説以獻曰用人而不自用者治天下之要道也以公議進退人材者用人之要道也察其正直納忠阿諛順㫖者辨君子小人之要道也廣開言路者防壅蔽之要道也考核事實者聴言之要道也量入為出者理財之要道也精選監司者理郡邑之要道也痛懲贓吏者恤民之要道也求文武之臣面陳方略者選將帥之要道也稽考兵籍省財之要道也言皆切中時病毎奏一篇上未嘗不稱善公遂從容乞身以歸詞㫖堅確上不能奪乃除顯謨閣學士提舉江州太平興國宫入謝且辭上意殊眷眷内出犀帶香茗為賜既歸再䟽告老遂以龍圖閣學士致仕淳熙元年上意猶欲用公以公篤老不敢召則上手為書遣使詣公訪以天下利害朝政闕失進職端明殿學士且以銀絹將之公受詔感激拜䟽以謝略曰朝政之闕失多矣其尤失者君子在野小人在位政出多門言路壅塞亷恥道喪貨賂公行也天下之利害多矣其尤害民者官吏貪墨賦斂煩重財用匱謁盜賊多有獄訟不理政以賄成也臣願進君子退小人精選諸道部使者以察州縣則朝政有經民不告病矣公之復歸又十年雖身安田里老夀康寧無復它念然其心未嘗一日忘朝廷間語及時事或慷慨悲辛不能已聞者蓋動心焉然尚冀公之復起而卒有以寤上心也七年八月公竟以疾薨於家之正寢先是屬疾踰年手草遺表猶以山陵境土欽廟梓宫為言而戒上以人主之職不可假之左右言尤剴切至是上之上聞悲悼朝野相弔詔以正議大夫告其第享年八十有五累封江夏郡開國侯食邑千五百户實封百户娶熊氏詹氏又娶詹氏封淑人三男源通直郎瀚承務郎浩從政郎六女承議郎倪治通直郎呉應時宣教郎謝源明承事郎張鑄承事郎陳景山其婿也第二子及第二女皆夭孫男七人女五人公天性莊重終日儼然坐立有常處未嘗傾側跛倚語黙有常節未嘗戯言苟笑它人視之若有所拘縶而不能頃刻安者公獨泰然以終其身雖在燕私亦未嘗須臾變也居家孝友篤至夫婦相敬如賓與人交恭而信淡而久苟非其義一介不取諸人亦不以予人少時貧窶炊黍或不繼而處之甚安至其力所可致則亦不使親與其憂也晚嵗宦達而自奉簡薄不改於舊惟祭祀則致豐潔細大必身親之仕州縣奉法循理敦尚風敎在朝廷守經據正思深慮逺不為激訐之言表襮之行以矜已取名然誠意所格愈久而上下愈信服之上雅敬重公屢有大用意而公卒不少貶以求合上問進取必謹對曰先自治問理財必謹對曰量入為出始終一説未嘗少及功利至於忠孝大節敬終追逺之際則深有所不能忘者蓋自始對詔䇿已發其端而痛夫欽廟梓宫之未返則論之終身至於垂絶之言不釋也嗚呼悲夫推公此心可謂無歉於幽明而其法戒之所存雖與天壤相弊可也尤恬於勢利興廢之間人莫見其喜愠之色為郡從事時驗茶劵有偽者吏白公當受賞公謝却之罷惇宗而造朝也臨安學官與試貢士公以朝命攝其事時見官外猶有缺員用事者故以嘗公已而試事畢公即解印去其人曰所攝當缺員盍亦自言以審之乎公竟不顧用事者以是惡之在王府時龍大淵為内知己親幸它教授或與過從觴詠公獨未嘗與之坐朝夕見則揖而退其後它教授多蒙其力公獨不徙官為司業時芝草生武成廟武學官吏請以聞公不答則隂圖以獻宰相召長貳而詰之曰治世之瑞抑而不奏何耶祭酒周公綰未對公指所畫對曰治世何用此為周退語人曰黄公之言精切簡當惜不使為諫諍官也六和㙮成宰相命諸達官人寫釋氏四十二章之一刻之壁閒公謝不能請至再終不與其不惑異端又如此所居官人莫敢干以私然公初未嘗有意固拒之也蜀士有仕於朝者同列多靳侮之獨感公遇已厚然公亦未嘗有意獨厚之也尤喜薦士王詹事十朋張舍人震皆公所引張忠獻公劉太尉錡之復用公力為多然未嘗以告人諸公或不之知也致仕里居前後十五年收死恤孤振貧繼絶蒙賴者衆而公未嘗有自徳之色平居門無雜賓邑里後生有來見者躬與為禮如對大賓諄諄教語必依於孝弟忠信未嘗以爵齒自高而有懈意惰容也蓋公之為人生質粹美天下之物既無足以動於其心其學於天下之義理又皆不待問辨而已識其大者若其誠意躬行則又渾然不見其勉强之意而謙厚慤實尤以空言為恥以故當世鮮克知之然親炙而有得焉則未有不厭然心服者嗚呼所謂訥言敏行實浮於名者公其是與明年將葬嗣子源使其弟瀚狀公行事屬熹以銘熹辱公知顧甚厚且嘗受命以識先大夫先夫人之墓矣不復敢辭乃敬叙其事而銘之公墓在邵武縣仁澤鄉闕里居第之北曰闕原葬以十二月初五日其銘曰天下國家孰匪當務曷為斯本身則其處事物之理指數其窮曷其大者維孝與忠我觀黄公天畀淳則植本自躬有大其識儼其若思履衡蹈從盛徳之表見於聲容烝烝於家懇懇於國敬終厚逺靡有遺忒根深末茂綱舉目隨行滿當世言為寳龜出入兩朝初終一意酬酢佑神表裏一致用而不究君子惜之勒銘幽宫維以質之武經大夫趙公墓誌銘公諱基字夢周有宋太宗皇帝之六世孫也其曽大父某大父某皆為開府儀同三司贈太師追王韓成二國事皆見國史父某舉進士中第未及仕而卒贈中奉大夫公生睦親宅以郊祀恩補成忠郎少孤能自植立刻意為學欲以文字成名於世遭亂轉徙不克遂其志年甫冠調監常州宜興縣税是時㓂難未夷道路艱棘公治征筭不以苛皦為事往來便之在官獨居一室日以讀書鼓琴為事一無他嗜同寮莫測其所為至使人隂伺之已乃信服叅知政事張公守亦知其賢更以為饒州永平監舊法課卒淘土取棄銅以益鑄用數登萬斤輙書勞受賞前後相承程董峻切役者病之公至獨歎曰瘠人肥已吾弗忍也亟罷去而節他費以足用守董耘賢之且愛其詞章薦於朝請為易文資不果去居信之弋陽一時名勝争迎致舘穀且遣子弟從之遊久之自請為祠官得主管華川雲臺觀始來居邵武時中書舍人王洋知軍事尤深禮敬與酬唱往來稱嘆不置秩滿為建昌軍兵馬都監郡守知其亷帑藏出納悉以諉之復監泉州郡使司糴事公知前積蠧弊歎曰踵是則吾固不能正之則蒙其辜者必衆吾豈為禍始乎因力辭之既而有求代其任者果不免聞者歎服晚再為福建路兵馬鈐轄累官至武經大夫行年七十有三淳熙六年七月某日以疾卒公配恭人滿氏某官中行之曽孫女子男五人善俊朝議大夫直龍圖閣知廬州主管淮西安撫司公事善佐朝散郎知常徳府事善儀秉義郎善任承節郎善傑忠翊郎而善任蚤卒女七人亦夭其五人則從政郎鄧祖攸迪功郎揚挰李絪黄造司馬􅣫其壻也孫男女各二人皆幼明年諸孫特奉公柩葬於邵武縣新屯西宅之原而書其事狀如此使人來請銘熹雅聞公為人恬淡寛博自少以亷謹自將平居未嘗有愠色尤不喜言人過以急難告者必周之未嘗計有無也生長太平公族間不為華靡之習從宦所至壹以仁恕惻怛為心雖勢卑不得盡行其志然其隨事及物亦足以見其胷中所存者滿恭人有賢行諸子皆以文學稱而淮西常徳連中進士第皆及公無恙時被遇通顯知名當世公晚更得閒適因不復問家事顓用棊酒自娯而老夀以没嗚呼是亦可以無憾也夫乃考其狀叙而銘之銘曰唯紓人之勞寧郤已之進豈曰已之亷而速人以病仁夫趙公有睪其宫我銘斯石以詔其終夫人徐氏墓誌銘夫人徐氏温州瑞安縣人世隠徳不仕夫人生柔順静正父母愛之擇所宜歸以配郡人張君某既歸事舅姑盡禮晨夕敬問衣服飲食寒燠之宜而節適之舅姑未食不敢食未寢不敢寢姑性嚴重事有不可其意終日不懌左右莫能近夫人獨從容娯侍所以開釋其意者萬方俟其語笑復常乃敢退如是者十有八年隣里親族覸之不見其一日懈也舅姑没哀毁不勝衰張君家故饒則喜賓客中嵗少窶約然不以屑意朋舊過門輙飭庖具饌相與樂飲如故時館客於家至或旬月不厭夫人節衣食以奉其費無難色不使張君知其有異於前也佐張君教諸子皆有文行既而其長揚卿遂登進士第仕州縣以敦樸詳練為諸公長者所知張君由此亦以太上慶夀恩補承務郎而致其事老夀家居子孫滿前鄉鄰以為榮而夫人已不及見久矣蓋夫人以紹興二十六年十二月闕卒享年五十有五凡生三男三女揚卿之弟曰振卿曰闕卿女伯季蚤卒仲適成忠郎監左藏西庫林鏞孫男八人女六人卒後四年乃克祔於先姑周氏之塋又二十有五年而揚卿以從政郎為南康軍學教授與予聯事相好也一日狀夫人之行以告曰揚卿之禄已不得逮其母日夜痛于厥心如又不能有以表其行實之懿於方來則不孝之罪死有餘責敢敬泣拜以請夫子幸哀而予之銘是使揚卿得以不死其親而免於戾也予辭謝不獲而未及為明年去郡揚卿又以書來請不置乃序其事而銘之其詞曰既孝既敬又儉以勤天曷報之子秀而文生短慶長儲豐饗嗇銘以訂之百世其澤劉氏妹墓誌銘新瀏陽丞建安劉君子翔彦集之妻吳郡朱氏者先太史吏部府君之女而熹之女弟也為人質實易良自幼不見其有妄言愠色生五年而失先君先孺人愛之年二十有一以歸劉氏事皇舅大夫公禮敬飭備下及旁側侍御委曲逢將尤有人所難者大夫公没佐彦集理家事勤約不懈撫教諸子愛而有節其逮下有恩意門内之治雍如也淳熙八年年四十有三二月乙未以疾卒子男二人瑾瑱皆將仕郎女二人未嫁彦集將以是嵗十月辛酉藏其柩於崇安縣西三里大夫公塋左若干步謂予曰子盍銘諸予寡兄弟先君之遺女唯此妹予既杜門山間而妹亦幸不逺嫁一嵗中率再三見其逺别惟從其家之官時為然然不一二嵗輙歸復相見今其病死而予適從吏役歸則不復相見矣獨與彦集相持大慟而彦集又為予道其將死時與家人訣别付託兒女狀尤使人不忍聞嗚呼孰謂吾妹而遽至此耶老病且哀不能文彊書此以識壙且為銘曰哀哀吾弟歸藏其丘懿此遺徳後人之休邵武縣丞謝君墓碣銘臨川有隠君子曰溪堂先生謝君名逸字無逸與其弟竹友先生名薖字幼槃俱學詩於黄太史氏而以清介亷節有聞於時然皆不遇以死是以獨以其詩行於四方而其行業之懿則非其邑子有不得而詳焉是可歎已竹友之子曰敏行字長訥自號中隠居士娶李氏生子曰源字資深始以進士得官為文林郎邵武軍邵武縣丞且以慶恩得封其母為太安人蓋將有以大其門者而不幸以卒識者莫不傷之資深自幼日誦數千言少長受經屬文有聲庠塾間士大夫之賢者來臨川聞其名莫不延致而賓禮之再試禮部中第宰相以兩先生故不使從吏部選言於上以為建昌軍學教授居官静重有守然事有當為亦不憚改革也嘗祠其鄉之賢者五人於學以勸諸生而故劉侍郎季高為之記秩滿諸生相率狀其行治扣漕臺請留之使者知其賢顧法不可因相與薦之得稍遷秩復教授江州州學未行遭父喪終制調隆興府南昌縣丞㑹李侍郎仁甫將漕江西披輯舊聞以修一路圖經於官屬中獨以資深為可與於此者又與諸使者共薦之嘗行邑事嵗餘屬帥守以聚歛為急諸邑奉承唯謹而資深獨無所屈常歎曰迫貧民以奉上官吾弗忍為也帥守以是於資深獨不悦而邑人深徳之既去父兄子弟相與送之數里不絶帥守愧歎亟以薦書追而與之詣曹校考當改京秩㑹舉將有故不果遂來邵武當路者多知其賢而常平使者宋君若水尤敬重之又率同列交薦章下而資深已病不起矣時年五十有八淳熈辛丑九月己丑也資深天資渾厚人少見其喜怒未第時斆學以奉甘㫖教撫弟妹而婚嫁之鄉黨稱其孝友家世清貧獨有園㕓數畆中隠君既以其號榜之至資深雖從官然於生産亦不能有所増益獨葺此園築室其間雜蒔花木蔬果桑竹暇日挾册吟哦其間雖飯䟽飲水不自知其有不足也其詩秀潤和雅有二祖風致存者百餘篇號空齋詩藁云資深娶同郡黄氏生三男五女男曰樞曰機曰椿女所適曰嚴享甫曰饒祁餘未有行也資深在邵武時嘗以檄書便道過我予雅聞資深名一見即知其長者既去逰武夷山水間得予所結廬處復留詩見屬予以是又知其句律之妙可追前輩無慙也顧未及酬而聞其訃又以病不能往弔今樞等既葬資深中隠君墓之側而以書奉資深親友呉君炳若之状來請銘時予方病欲謝不能又念資深前日賦詩相屬之意不可以終莫之償也乃為之銘銘曰惟君家世隠淪載其徳之後人君承之勢欲振塗未半隕厥身藏於斯從隱君陵為谷訂此文司農寺丞翁君墓碣銘紹興中宰相秦檜専柄用事諸有故怨及不附己者皆誣以罪竄嶺海故相趙忠簡公用此死朱崖天子哀之還其柩將葬衢州常山縣郡將章傑紹聖丞相惇諸孫雅怨趙公當國時奉詔治惇罪又希檜㫖陽以善意檄常山尉翁君蒙之䕶其喪一日下書翁君曰趙氏私為酒以飲役夫亟捕寘之法而隂使人喻意使并搜取趙公平日知舊往來書䟽欲以敗趙氏快私憾且媚檜取美官翁君不可則啗以利又不可則脅以威往反再三翁君度傑意壯不但已或更屬它吏則事有不可為者即宻告趙氏夜取諸文書悉燒之無片紙在翌旦乃往為搜捕者而以無所得告傑怒又兼知翁君女弟適故禮部侍郎胡公寅實當時草詔罪狀惇者益怒乃誣翁君它罪劾之會胡公弟寧為尚書郎具以其事白檜檜亦悟為傑所賣下其事安撫使問狀徙翁君官旁郡趙氏亦竟得無它而傑遂廢不復用當是時天下莫不高翁君之誼慕翁君之名而想見其為人者今天子即位近臣乃以其事聞上亟召見嘉歎其節改秩再除中都官皆以省員補外晚乃歸為司農寺丞未幾而卒聞者莫不哀之君字子功世家建寧府崇安縣之白水村大父彦深宣和中為秘書少監梁師成欲一見之不可得遂久不徙官其後歴國子祭酒太常少卿以集英殿修撰歸老於家父揆文林郎宻州司士曹事亦以文行知名蚤卒君以集英任補登仕郎調右迪功郎尉常山移婺之蘭溪更調明州司理叅軍以母喪不赴主管吏部架閣文字又以少母喪去官改原缺郎監登聞鼓院出為江南東路安撫司主管機宜文字當塗澇疫君以檄按行拯療極力全活甚衆除軍器監丞又主江西安撫機宜文字復値嵗凶君佐其府咨訪處畫用力尤多使龔公茂良與諸使者合言於朝乃召丞大農卒時年五十有二淳熙元年二月十三日也君自幼卓犖不羣曹偶敬憚而孝謹順悌事集英及母兄無間言兄没撫其孤甚厚嫁其女先已女集英引年恩當及君子君推以予從祖弟履之家居不問有無仕官不計升黜至於周人之急則亦不復知有難易多寡之擇即有不逮雖奔走乞貸勞辱不憚也歴陽張晉彦以子孝祥被親擢冠多士故忤相檜意逮繫廷尉親舊畏禍及已莫與通求所以為橐饘費者無所得君聞之獨慨然謁其兄罄家貲得白金百兩遺之㑹檜死事乃解後張氏父子俱官達以此徳君終其身不能忘君與之遊亦毎規正其失無所避人兩賢之在江西時同寮劉氏子琦奔父喪病疫甚殆人莫敢視君獨輿致其家蚤莫躬治粥藥琦得不死它所為類此人所難者甚衆不勝紀平居食客滿堂莫非有求於君者而君不之厭也娶李氏紹興史官彌正之女先卒無子以從祖兄誠之之子樗年為後一女適修職郎王伸君家自集英時有别業金陵君即居之既卒遂葬江寧縣西北村祔以李氏後數年君之甥豫章通守胡君大原狀君行事以來曰舅氏志未克伸而不幸至此其高節馴行有不可以弗識者子盍識諸吾且刻其墓上予婦家與君有連姻得蚤從君游相期甚厚讀其書為出涕不忍辭也乃書其事而銘之銘曰仁全故家知折姦謀勇蹈大難賁育其儔偉哉若人躬此達徳俛哉終身靡有回遹無曰斯邱四尺之崇忘私起懦千載高風晦庵集卷九十一欽定四庫全書晦庵集卷
