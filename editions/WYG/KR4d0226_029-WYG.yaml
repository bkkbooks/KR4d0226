  text: 出處
  hash: sha256:482848c9cdbc9eda0b21616d5daa4b0158b802494ab6dde93bf4b3afbff85be9
body:
  text: 與趙尚書書竊以仲春之月氣候暄和伏惟某官茂對明恩神人恊相台候起居萬福兹者竊聞榮被追詔入長天宫夫以尚書望實之隆宜在廟堂參斷國論之日久矣去歲入朝登用在即而抗論極言不以利害之私少有回屈士論益以歸重而深恨其不少留也乃今幸甚天啓聖心召還故官是蓋將授以政無可疑者有識傳聞交相慶賀蓋不獨為門下之私喜也然今日之事蓋有甚難於為力者不審明公何以處之竊計雅懐於其大者素有定論不待愚者之言矣惟其小者之一二區區鄙懐竊有所疑於平日輒忘僭易而一言之惟高明之垂聽焉蓋天下之事決非一人之聰明才力所能獨運是以古之君子雖其徳業智謀足以有為而未嘗不博求人才以自裨益方其未用而收寘門墻勸奬成就已不勝其衆是以至於當用之日推挽成就布之列位而無事之不成也今日明公之立朝不為不久而未聞天下有卓然可用之才出於門墻之下自頃出臨藩服而熹始得觀於進退官屬之際則見明公之所與者率多碌碌凡庸睢盱偵伺以希寸進之流未有以職修事舉為衆所稱以為當舉而得之者也而况於其學行醞畜真有以大過於人者乎今者進位於輔相之列則所資於天下之才者益衆而所進退於天下之才者益重若但以前日進退官屬之尺度取之則熹恐天下之士所以望於明公者有未厭也時事如此之難明公之任如此之重而所以求助者如此之狹熹雖至愚猶竊為明公慮之而辱知有素不敢不及此而一言也伏惟寛宏恕其狂易試加察焉蓋不惟明公所自舉而凡所為屬之同列以妨賢者之路若宜皆在詘指之中則熹之虚實可覩矣來使還自三山熹前此已屢拜啓薄冗姑此少伸賀禮而亦不敢為無益之空言也末由趨拜履舄伏乞以時為國自重答趙尚書四月二十六日熹扣首再拜上覆吏部尚書台座熹久病不得拜書第切馳仰即日淫雨寒凉伏惟論思多暇神人交相台候起居萬福竊聞清蹕已御外朝尚書首奉延訪忠言至論聳動上心有識傳聞無不感歎但以疇昔所嘗商較者揆之似已太勁切矣豈忠肝義膽得全於天有不可得而抑者抑以論議不齊事功難必而故出此以趨勇退之塗耶以出處語黙之常理言之二者誠皆有當然非海内深思遠識之士所以望於明公者也顧今指趣已聞標的已建而未見幡然聽納之效不審髙明又當何以繼此此恐更宜廣詢博訪以善其後未可以便謂無策而付之不可如何也朝士下僚中恐不能無可咨訪者願自今以來稍加延納虛心降意採其所長庶乎其有補耳東府復留勢豈能久意其亦必自知如此而姑為偷安引日之計以媚羣小冀無後災此其為害又將有不可勝言者尚書與之情義不薄曷若勸之乘此必不能久之勢力言於上極陳安危治亂之機大明忠邪枉直之辨以為國家久遠之計其濟則宗社之靈生民之幸不濟則與其抑首下心前迫後畏以保此須臾之光景纎芥之榮禄而不能自拔於小人之羣以誤國家以此易彼豈不浩然而無愧悔於心哉但其人自無遠識親狎庸佞全身保妻子之慮深而憂國愛民之念淺恐未必能聽此大度之言耳但尚書既與之厚而不乘此機發此策則於吾之心有不盡者嘗試一言之政使未必能用亦未至於有害又與建白於朝事體不同也不審髙明以為如何劉徳修忽自蜀中寄一書來慷慨振厲畧不少衰真竒士也觀其書意似亦甚悔前日欠人商量失却事機此真可太息爾然事變無窮又安知後之視今不猶今之視昔人之視己不猶己之視人耶士居平世處下位視天下之事意若無足為者及居大位遭事㑹便覺無下手處信乎義理之難窮而學問之不可已也病中信手亂抽得通鑑一兩卷看正值難處置處不覺骨寒毛聳心膽墮地向來只作文字看過却全不自覺真是枉讀了他古人書也熹一春病脚至今未能出入醫藥雜進灸灼滿身殊未見效只今兩脛細軟飲食減少自度非能久於世者所幸小屋畧就旦夕可以定居便與世相忘矣向來小報幸是誤傳不然又費分疎愈增罪累耳閩中自得林辛一路已甚幸若象先來更能為上四州整頓得財賦源流即更為久遠之惠但恐其意只如所謂去泰甚者則又失望耳近日此等議論真全軀保位之良藥而病國殄民之烏喙也無由瞻晤寫此紆鬱切冀深為人望千萬自重不宣與趙尚書論舉子田事熹拜書將遣而周宰見訪說及近降指揮出賣絶戸官田此間舉子義莊絶院二十五所田收米四百八十餘石或云史公所買而無明文可考只有淳熙三年陳公政内劄子催督義莊租課開列二十五院與今一同又有八年梁公政内劄下丞㕔亦云拖照淳熙元年買建陽縣絶産田充義莊即是當時已買分明今自不合隨例出賣唯是兩縣絶戸江驥江大受作過人程如岡三家田收米七百三十餘石即係元不曾買今日難以拘占然今倉司施行甚峻縣吏奉承唯謹固不容辨其當賣與否矣若不及早整理則此田日下便為他人之有而舉子之政遂成中輟甚可惜也欲望詳酌特為申明乘此機會别降指揮依贍學田與免出賣則不唯已買者不為奪去而未買者亦可因而撥正無復動搖其元降指揮恐隨行無本今并録呈其間所引淳熙三年指揮本路絶産不許出賣通融以充一路養子之費者或恐亦可再與拈出且只免賣上四州絶院使朝廷易於聽從而其他未舉行處亦可漸次接續措置誠為永久之利周宰亦已有書懇丘侍郎言之但須自尚書發之彼乃有据而行爾此事甚急切幸早賜留念熹皇恐上覆吏部尚書後項所禀若只云住賣上四州絶院則又礙江驥江大受程如岡田須云乞將已買及已撥充舉子田免行出賣外將來上四州軍如有絶産寺院並免出賣撥充舉子之費令安撫司拘收措置如此則無病矣與趙尚書書熹向託廷老靣禀一二事不審台意如何今日之事第一且是勸得人主收拾身心保惜精神常以天下事為念然復可以講磨治道漸次更張如其不然便欲破去因循茍且之弊而奮然有為決無此理既無此理則莫若且靜以俟之時進陳善閉邪之說以冀其一悟此外庶事則唯其甚害於君心政體而立致患害者不得不因事捄正若其它閑慢非安危存亡所繫者皆可置而不論如學校之政是也此等事欲大更張非唯任事者未必肯行亦恐主議之人未必究知先生學校教育之本意良法政使行之未能有益而反有害若欲因議而發且如來教所謂就見行法中畧與修整則熹前書紙尾四五條者最為穩當不驚動人耳目而可以坐消奔馳偽冐請囑之弊然其行與不行亦非安危存亡之所繫議而不行正亦不必固請也今所規畫皆是創立條貫多所更革安得謂之就見行法中修整乎又况教官未必得人將來姦弊百出既已慮之而未知所以為計又何必抗言極論以爭此嘗試疎濶之策而使旁觀者重有紛更不靜之譏乎前日山間拜書不能盡此曲折深有遺恨蓋策之未善猶未足言所深慮者尚書人望之重本所拳拳者當為何事而今乃切切於此不急之務以取嫌忌嘲笑於流俗知時識勢者固如是乎然欲為前所謂時進陳善閉邪之說以冀上心之悟者又在反之於身以其所欲陳於上者先責於我使我之身心安靜精神專一然後博延天下之賢人智士日夕相與切磋琢磨使於天下之事皆有以洞見其是非得失之正而深得其所以區處更革之宜又有以識其先後緩急之序皆無毫髪之弊然後并心一力潜伺黙聽俟其間隙有可為者然後徐起而圖之乃庶幾乎其有益耳尚書天資髙明而於當世之務講之熟矣至於前世名臣議奏又嘗博觀而精擇之以為一書宜其投機合變慮無遺策而今者之議以大言之則不時以小言之則不巧不唯熹之至愚以為未安而天下有識亦無不竊怪其不當出於明者之口也抑其言又有大於此者蓋又皆以為尚書頗以簡貴自高憚於降屈而無好士受言之美也不識尚書何以得此於梁楚之間哉其必有以取之矣願反諸身而熟察之有諸已而後可以求諸人無諸已而後可以非諸人雖敵已以下猶然而况於南嚮萬乘之主乎尚書誠以天下之事為己任則當自格君心之非始欲格君心則當自身始蓋非獨熹之所望於下執事者如此計善類之所望莫不然也久欲言之而不得暇今日偶病怯風不敢出戸因得極陳其愚伏惟恕其狂率幸甚幸甚他所欲言無大此者請俟後便不宣與留丞相劄子熹竊以季冬極寒伏惟丞相國公鈞候起居萬福熹伏自春間一再干冐竟蒙恩厚獲安祠館區區感戴蓋不勝言顧以罪戾之餘不敢復以姓名自通門墻之下不意今者曾未踰年又叨除目付以一路軍民之寄此蓋某官愛惜人才不忍使其終身棄於無用之地故以及此徳意良厚感激難勝但熹衰病益侵精神益耗使之從政其所施為悖眊顛錯必有甚於前者而廣西一路地廣民貧邊靣濶遠得失所繫又非内地監司郡守之比在熹自度實難冐受以誤使令之意謹已具狀辭免欲望鈞慈俯察愚誠特與將上令熹終滿今任祠禄之後别聽指揮若其精神筋力足以堪之熹不敢復辭避也干冐威嚴俯伏俟命惟某官裁之熹瞻望台躔無由趨拜履舄伏乞上為兩宫垂意茵鼎之衛光輔神聖永福寰區熹不勝願望之至伏惟鈞照與執政劄子熹伏自違遠門墻積有年所疾病不間無從修致􅉏御者之問邇者竊承延登宥宻中外交慶辱知有素欣賀尤深而亦不敢進越輒以姓名自通不意今者誤恩横被擢自閑散付以一路軍民之寄此蓋某官顧念疇昔曲借推揚有以及此餘同前與漕司劄子政和縣有小路數條通羅源寧徳海鄉步行不過兩三程可到故私鹽每斤不過四十五文而官鹽則必泝流運綱或半歲而後達脚費不貲故官鹽立價不得不髙每斤之直遂至不下九十文所以從來民間只喫私鹽而官鹽自非科抑雖銖兩無售者蓋縣道空乏狼狽而州府漕司不得此縣財賦之入者有年矣中間知縣袁采始為出賣落草私鹽之術其實乃自買私鹽而分置數坊賣之以給歲計自此以來縣道稍可支吾而州府漕司亦獲其助但民間本自不願買喫官坊貴鹽而不買者又有申舉追呼之擾故行之未久即以違法致訟而罷於是本縣一歲但起兩綱盡數折還州府版帳漕司增鹽之屬本錢雖不易辦而官吏免得冐法賣鹽致訟民間免得買喫官坊貴鹽以致申舉追呼之擾比之袁宰之術尤為穩便上下方以為安而漕使陳右司政内有司偶失契勘却將本司積下諸州縣增鹽用船裝載泝流般上政和勒令出賣每月責認解錢五百貫文殊不知若使政和官鹽可賣則本縣必須自般自賣以供公上而積其餘以為循環之本前不至為冐法行險販私之詭計後不至為逐綱撰本盡以還州之拙謀矣正縁鹽不可賣是以不得已而為此今乃不察而必使之抱賣他州外縣可賣不賣之增鹽至於移貴就賤倒置煩擾則又未論於民有無利害而善理財者似亦不肯如此自此之後本縣遂復置坊出賣此鹽然實計每斤只賣得四十五文其餘四十五文無所從出又官鹽在倉日久亦有走滷欠折之數乃用袁宰之餘謀隂許管坊人潛販私鹽以足其數後來趂賣不上雖已量減鹽價月額然病根不除使官吏日懼譴責百姓須喫貴鹽而漕司一歲所得不過三四千貫而已於民有害於官無利其理甚明竊恐髙明未詳本末敢採民言以獻欲望台慈特不下司宻行考究特賜住罷百里幸甚與留丞相書熹輙有愚悃仰塵鈞聽孤賤鄙儒迂濶有素中間諸公不知其不肖往往誤有收拾使令之意而熹方拙不能奉承是以多致齟齬而不能無遺恨於其後爰自戊申之夏狼狽出關杜門空山蓋已無復當世之念矣不意相公曾未識其靣目乃於秉鈞之初首加拔用熹以衰懶不堪劇部為辭又蒙改命更畀郡符到官一年有請必遂如褒贈漳浦髙公減免經總制錢之屬皆前日守臣所屢請而不得者是相公於熹知之不為不深而於漳之士民愛之不為不厚矣至於經界一事乃獨屢上而不報至其甚不得已而陽許之則又多為疑貳之言以來讒賊之口曾不一年而卒罷之則熹於是始疑相公所以知熹者不若其於鄉里小兒之深所以愛夫漳之士民者不如其於瑣瑣姻婭之厚而匹夫之志因以慨然自知其決不可以復入相公之門矣是以湖南廣西再命再辭蓋不唯以粗伸已志亦庶幾隂以解謝臨漳千里狼狽失業之民而於相公則不敢以為恨也今者相公郊居累月一旦來歸未遑他事而復首以不肖之姓名言於上前付以湖南一路之寄聖主以相公之言為重即使出命而相公又申以手扎之賜慰喻勸勉禮意勤渥有加於前君相之恩隆厚若此政使賤軀羸頓不堪上道神識昏昧不任治劇亦當黽勉拜命走伏官次以稱所蒙而熹之私心反復思之終以前事有未能忘者又竊惟念相公自居大位悉引海内知名之士無一不聚於朝今兹之事雖相公出舍於郊不得親回天意而諸賢在列各攄忠悃並進苦言不遺餘力是乃無異出於相公之口相公於此得士之多致君之效其亦以無愧古人矣然則若熹之愚姑亦勿問而置之度外似亦未足以虧盛徳之萬分而况啓擬之恩謙尊之美相公又已行之乎夫宰相以得士為功下士為難而士之所守乃以不自失為貴今相公之得士如此下士如此已為盛美若又能容熹使不自失其所守則是古人所謂人有其寳者亦何必使之回靣汚行而為終身之羞哉抑今日之勢天意雖若暫回而恐未固禍機雖若暫息而恐未除事㑹之來乃有大於漳州之經界者而恐不但如前日之易平也願相公深以前事為戒公其心遠其慮母使天下之士賢於熹者復有所激而不肯出於門墻則熹今日之言猶未為無以報徳也區區此意但欲相公知之所有省狀公劄則不敢盡吐所懐矣儻蒙將上早賜施行勿使至於再瀆則熹千萬幸甚與留丞相書昨日伏蒙丞相少保國公降屈威重先辱手書雖以奏記畧陳謝悃而語意狂率不知所裁竊意相公必將怒而絶之則熹因得以伸匹夫之志而相公方且坦懐虚受不以為忤加賜真筆眷眷益勤此已出於望外矣至於所乞寢罷誤恩則又未蒙贊可顧以元日奉觴盛禮之次開陳督遣且因書指喻以宜行熹誠狹中不足以窺大人之度然私心猶竊不能無所疑者則以為此雖足以見相公含垢納汙之量屈己下士之誠而未知相公之心以熹前日之事今日之言為果何如也熹今承命再三固已不敢必於退避但恐衰年精力不足以勝一道之責欲丐相公都俞之際委曲一言換一小壘若帥幕謀曹之屬庶幾可以扶曵衰殘仰承恩指然其所以事相公者則不敢少有毫髮異於前日之心也亦願相公深以前事為戒於天下之事有可否則斷以公道而勿牽於内顧偏聽之私於天下之議有從違則開以誠心而勿誤以陽開隂闔之計則庶乎徳業盛大表裏光明中外遠邇心悅誠服非獨如熹等輩終身服役而不敢有議於萬分矣如其不然則殆不若及其去就之未定而遂其本志之為愈也干冐罄竭恐懼殊深進之退之唯相公之所以命答吳茂才書益熹衰繆亡狀謬沗召除業已在官不容辭避然亦以病告而宿留前途以俟報罷之命矣所論時務衆共知其如此而未知所以處之之方來誨又若有所難言而不欲盡者反復思之未得其要若便得請固無所預萬一不免一到臨安或恐當路有問焉者尚望髙明不鄙而瀆告之然必直書其事而勿為才語使愚者一見而曉然乃為厚幸不然又將有所不解而虚辱諄諄之誨矣至懇至望與臨江王倅書熹昨臨罷郡見邸報臺諫集議素服事已有指揮施行時彼中尚未著紫衫然即已榜客位預告賔客官屬矣過袁見郡縣官皆已素服獨盛府未之行心竊疑之欲以奉扣而匆匆不暇也不知後來别有指揮衝改耶抑偶未之省也至此又有豐城縣官亦如宜春恐隆興亦已如此竊慮更當檢校討論白守侯而正之乃為宜爾向以將赴江西入辭時永思已入土而壽皇所御衣冠皆以大布此為革去千古之弊而百官皆用紫衫皂帶乃王丞相以親老為嫌不肯素服議者皆有有君無臣之譏近日之論乃鑒其失然猶未能彷彿古制也又記在長沙初奉諱時方悟從吏車帷當易紫以青適未即出而何漕已易之如所言矣蓋於心有不安故不約而同也并幸知之答汪長孺書熹到官三月無日不病扶曵此來良非獲已上恩過厚辭謝不獲叨冐供職愧恨難勝所幸無他而主上留神問學得以少效區區丞相時得聞見可以吐露心腹但事勢牽掣亦有不得如人意處天變未銷人情未靖如涉大水不見津涯尚深憂懼耳今日入侍方講大學頗蒙開納歸來疲倦來使索書草草附此與王樞使謙仲劄子熹昨者到官長沙嘗獲一修記府之問伏蒙鈞慈還答之寵捧領感慰不勝下懐繼以病作不能嗣致牋敬惟是尊仰不忘於中未幾遂以收召去郡行未兩日即聞大纛移鎮是邦甚恨不得宿留以俟參展然甚為一路軍民喜於將蒙惠澤而三月之間頗類之政亦幸有以陶冶於大專槃物之中也伏想今兹已遂開府輙因還役敬具公牘修賀而復以此布其腹心伏幸鈞察熹麋鹿之性久放山林老入修門尤以為苦雖荷閔勞之意職務優閒而其實則有甚難副者日夕悚懼未知所以逃責伏惟髙明有以教之則千萬之幸也長沙版築不容中輟軍屯未得專制皆不得不言者比已僭易陳及亦皆得㫖施行想今已有所處矣湘西精舍漕臺想已禀聞得賜一言俾遂其役千萬之望昨欲廟祀一二忠賢以厲凡百已委官相視矣不知亦可并垂念否二事皆關名教計所樂聞故敢輙以為請并幾矜察與王樞使劄子熹昨在任日因凖赦書修葺忠臣祠廟契勘晉譙閔王及近世孟趙二龍圖劉大夫趙將軍皆以忠義死於國事合立廟像歲時奉祠以勵臣節即已牒州委官措置并檢到晉志譙王衣冠制度外及申太常寺乞㑹孟龍圖等衣冠製度今取到太常寺回牒一道并令人塑到孟龍圖等小様兩身責付承局袁超齎回投納伏望鈞㫖檢㑹元案特賜處分熹又嘗支錢令進奏官製造本州祭祀三獻官法服冠冕等恐未發到亦乞并令催促免致遺墜不勝幸甚其譙王等廟熹已具奏乞賜勅額候得指揮别具稟次熹上覆答李季章書熹扶曵殘骸幸抵田舍行藏之計無復可言但向來職事不能無遺恨此獨深愧耳東府為况如何故宇凄凉新居鼎盛行路之人忘其前事頗復有為之不平者此處不早調䕶將有乘人之隙者此大可慮又向來放過大體已多今亦不容坐視不為收救之計此外則無他說唯有去耳欲去則不可不早然未去之間亦不可一日不葺理季章相與之深不可不力為言此也近事因來語及一二大者幸幸與趙丞相書熹竊以獻歲發春伏惟丞相國公鈞候起居萬福熹伏蒙賜教并示差勅得備祠官之數皆出陶鎔豈不知感但鐫職之請未蒙敷奏特從所請區區私分深所未安復有祈懇切乞留念熹今未敢請俸必以得遂為期非若異時一再不獲尚可黽勉冐受也奏牘所陳之外又有一事蓋向來祧廟之議上意已自開納而丞相持之不下便將太廟毁拆及臺諫有言不知只作如何處分致後省復有云云据其所言亦未敢深以熹說為非但云未見本議欲乞降出而丞相又不降出便從其請以此而觀其罪不在樓陳而丞相實任之也夫絀始祖之尊置之别廟不使與於合食之列而又并遷二祖止祀八世熹固已議之矣而亦未敢盡其詞也今太上聖壽無疆方享天下之養而於太廟遽虚一世畧無諱忌此何禮也熹本欲於免奏自劾前議不明致此疎脱又聞彼中他議方作不欲以此助其指摘姑從刋削然不可不使丞相聞之也聞今别廟乃是向來二后所袝不知是否夫以十世之祖考而下列於孫婦之廢廟此不論而知其得失也相公何忍為之耶歸來因閲所編奏議乃知平日已不主荆公之論此乃向來講究未精之失今乃不遂其非而不肯改其誤益甚矣熹愚暗不見事機向者誤謂丞相有相知之意及今而後知丞相之大不相知而平日相與之意初不出於誠實也然則今日不唯得罪於人主而丞相固亦謂其不堪言語侍從之選矣但恨日前不合受過恩數不容一一回納故且乞收還職名以贖後咎若又不蒙白從其請則熹不得已將出下策不復能計世道之消息盛衰矣然丞相以宗枝入輔王室而無故輕納鄙人之妄議毁撤祖宗之廟以快其私其不祥亦甚矣欲望神靈降歆垂休錫羡以永國祚於無窮其可得乎言及於此令人痛心疾首不如無生丞相其亦念之熹自此不敢復通記府之問矣周吳二劄亦已拜領皇恐之劇專此具禀目盲不辨白黑不能他及唯乞以時為國自重千萬至懇别幅録呈所擬奏藁向來嘗竊妄論僖祖皇帝實本朝始祖之廟不合祧遷已荷聖明延問嘉納而竟不蒙廟堂講究施行遂致太廟并遷二祖止祀八世不唯上簡宗廟失禮違經而尤非所以仰稱陛下孝養壽康祝延萬壽之意由臣淺陋不學言無足採致累聖朝貽灾後世自知不堪言語侍從之選不免再干旒扆自劾以聞答李季章書熹歸來粗遣但左目全盲右目昏甚又脾泄時作頗妨應接耳前日始拜祠命職名義不當受已復上免章賤跡何繫重輕計必得之也昨聞一壽徳夫之去方為歎惜忽報徳修繼往令人尤不能為懐今日之勢政使衆賢交輔未必能濟顧乃㭬之如此其將奈何不知徳修徑歸蜀耶或且留江湖間也一書煩附便幸勿沉浮計此形勢與集賢不能無關渉不知能復幾許時耳與李季章書台鼎動搖想諸事又一新外日聞茂獻亦補外是何故耶文叔除命可喜且歸鄉里作村監司亦不惡也徳修赴湖南否近皆得書日夕未暇報因書更煩道意旦夕寫得却别寄也去相彈文云何因風語及聞當序遷者乃下兼參與然則當卜相於外矣不知果誰得之也答黄仁卿書所示劄子語簡意足李倉必須留意但恐見黄商伯狼狽後打草蛇驚亦不敢放手做事耳鹽利向時不暇整頓但初出關時陳時中名庸台州人時作檢正清和豈弟人也相訪於浙江亭說此利害甚詳時不甚曉又失於詢訪且以救荒方急不暇及既而悔之今得來諭乃審曲折甚愧見事之遲也趙公相見有何語當時大事不得不用此輩事定之後便須與分界限立紀綱若不能制而去亦全得朝廷事體不就自家手裏壊却去冬亦嘗告之而不以為然乃謂韓是好人不愛官職今日弄得朝廷事體郎當自家亦立不住畢竟何益且是羣小動輙以簒逆之罪加人置人於族滅之地以茍自已一時之利亦不復為國家計此可為寒心者惜乎此公有憂國之心而無其術以至於此也熹一目已盲其一亦漸昏暗勢亦必盲而後已今年脚氣幸未發而脾胃先衰飲食不化兀坐更無好况辭職趙公已相諾再請可得而今已去方復請之未知如何然勢不可已或只得次等職名不作從官亦便可受却是來書所說鄙夫見識蓋位卑勢遠只得如此亦不奈何也答李公晦書兩請既皆不遂不免再告鄙意休官尚可少緩而辭職不容不力正與諸人之見相反然又未知今此果能遂此志否累書所喻得所未聞然事已爾無可奈何只得任之耳試後去住如何鄉里雖窮寂然却無閑是非亦可樂也答李公晦書别紙或者以為鄉來封贈奏補磨勘之屬皆已引用次對恩數今日不當反有辭避遠近知識所說亦多如此而熹鄙意竊謂前此供職講筵之日帶此職名便合受此恩例今年已罷講職則自不合帶此職名便不合受此恩例前日之受今日之辭彼此一時自不相須設使前日為不當受則今日只有改正納還豈可却因已嘗誤受而終遂其非之理至於所謂已罷講職不當復帶侍從職名則其理亦甚分明但人不察耳且如侍郎給舍班皆在待制上及其補外則往往止帶論撰職名如近日鄧舍人是也豈可以其在内嘗任侍從差遣而補外亦必待帶侍從職名乎嘗試屏去一切利害之私而平心以觀之則此理曉然不難知也與鄭參政劄子熹竊以仲冬之月陽氣潜萌伏惟參政相公鈞候起居萬福熹伏蒙鈞慈還賜手教捧讀感悚不知所言區區之請又復不遂雖荷容庇得免大戾然非素心所望於門下也今復有狀申奏并懇諸公矣此事直自去冬此等時節勞攘至今若使鄙意止為備禮辭讓亦何苦冐觸天威煩瀆朝聽更使不相樂者得以議其後而終不自已耶實以從初不欲虚受已有狀申省甚詳後來既以罪去其無分毫之補可知即是全無義理可受官職其勢不得不辭前此却荷趙公察知此意許以再上當為開陳若渠更得一兩月不去則此事已定久矣不然則及國論未變善類未逐之時冐昧受了今亦無由追悔却是後來過了許多時月入了許多文字說了許多道理下稍却只如此閔黙受却則熹雖無􅃺豈有顔靣可見友朋今不得已須至再上以得為期却望參政力賜主張恊贊諸公同為敷奏謂其所請實出誠意則天意必須可回或恐不欲盡奪即得降一二等却得舊來所帶閣選熹亦不敢固辭矣况此因熹力辭而改即非責降而可以保庇孤蹤免遭彈射又可以仰全國家退人之禮於事體殊無所傷廟堂何憚而不肯為乎如更不蒙留意則是參政畧無矜念之意而直付之言路之筆端使得肆其詆毁而諉曰我無所預也熹不得請即須得罪決於此行若使未然亦不容茍止但自此不復敢以告於門下而坐待譴訶之及耳伏惟少垂意焉貼黄内事恐只䕃補磨勘兩事須合改正蓋熹去年本是帶職員郎前此一郊中子已叨恩命去年自不合奏請非但不應得京官也磨勘則所供考第不知比之庶官月日如何恐或不足則亦當鐫改其餘雖不繫利害然得盡削去亦一快也熹今年遣人來往虚費不貲今亦不能復遣初欲附遞致懇適龔提幹過門謹此修敬并致下懐切幸情照無由瞻望馳仰良深切幾以時為國自重熹千萬至禱與鄭參政劄子熹山野伉拙處世不諧然自少日即蒙當世一二鉅公教誨期許待以國士居常厲志不敢少貶以辱其門亦庶幾得因濟㑹少有毫髮以自效於當世不意暮年此志不遂而又適遭時論大變威福下移忠賢奔波海内震駭病中聞之憤悶鬱結覔死無路亟欲草疏自通幾或開悟而子弟諸生交謁更諫以為如此適增國家之累而無益紛挐累日疾勢遂侵此乃窮命使然是亦無足言者今若得因病辭官并脫無名之職則與世長辭含笑入地無可恨矣伏惟參政矜憐有素切望乘此機㑹曲賜保全萬一更有纒撓不遂所懐則熹素心尚在本未能平一旦遇事感觸不能自已更以垂死之年自貽投竄之禍亦非參政之所欲也抑時事如此有識寒心而參政從容其間未肯深任其責此亦中外所深疑者而熹猶竊恐髙明之有待而發也不知其果然耶其不然耶如其果然則安危之機相去日遠亦不可以少緩矣垂絶之言無復倫次唯此一念炳然如丹伏惟明公念之與李季章書平生少年日分手易前期及此同衰暮非復别離時勿言一樽酒明日難重持夢中不識路何以慰相思史院同僚餞别靈芝坐間或誦此言季章見謂平生亦甚愛此盍書以見贈予謂如僕乃知此味季章未也胡為亦愛此耶既而思之解擕之際但有一人衰暮便足令滿坐作惡乃知隱侯之言猶有所未盡也因并書以寄季章以為如何也已作前幅送行之處渠未遣行而熹復從渠借人去上謝表方得并令帶去衡陽之訃聞者傷歎况吾人相與之厚耶歸葬之恩可見上意未嘗忘之復書雖未遂恐終不能久沮格也熹前所請封贈䕃補等五事未得指揮不免再申朝廷只得付之有司使以法裁之足矣若不可辭熹亦無固必但衆議論紛紛至今未巳熹非固欲如此也幸因見諸公一言及之仍懇鄭丈早得回降付去人歸為幸此是借人難令久伺候也昨聞宣入試闈今想已出前書所說歸計果如何耶行之昨日過此亦疑久未踐也與留丞相書熹自少鄙拙凡事不能及人獨聞古人為已之學而心竊好之久以為是乃人之所當為而力所可勉遂委已從事焉庶幾粗以塞其受中以生之責初不敢為異以求名也既而閭里後生有相問者因以所聞告之而流傳之誤乃有自遠至者其才之髙下質之厚薄雖為不同然皆以是心至熹不得拒也不謂熹之無狀偶自獲罪於世而詿誤連染上累斯道下及衆賢例得詭偽之名詆以不道之法至有初不相識而横罹其禍者杜門循習私竊負愧雖欲悔之而厥路無繇矣顧其繼而來者又未忍郤然每對之未嘗不自笑其愚而又憐彼之愚甚於熹也今幸旬月以來各以事歸計亦聞之外間風色自不敢復來矣垂問之及深感鈞慈風諭保全之意故敢詳布委折昨日李袁州過此能言近事又知僥冐獲附下風之義尤竊自慶幸也答任行甫書衰病益侵無足言者今有申府公狀及府公手書為乞保明申請休致煩為投之仍計㑹申奏一宗文字付之去人仍作來年正月押下申發乃佳幕僚二書併以囑之矣又此休致文字不知更要録白繳申脚色之類否案中紙札及省部亦應有合用常例悉煩問之此間者已批付幹人依例支與幸呼來付之省部者得子細批報為佳答任行甫書休致文字極荷留念所以亟欲得之只為欲因赴省人帶行然亦不敢令到日即投計程未合到須令正月下旬以後投之決不至為州郡之累也今再有書懇文昌及託林推言之想必可得也録白俟檢法看如何若須用即續寄去數日來頗有講論之樂恨賢者不聞之也答任行甫書熹病愈甚蓋是天意催促休致消息可見悠悠之論殊無所謂府公聞已許開正發文字而俞建安亦數為游說又今再與書致懇此中初六七間有人入都須趂此前到此乃佳書中已說託建安及賢者靣言幸早留念若難相見只建安言之可也林推書說要録白文字等今亦有書報之但陳乞狀不欲全依式恐有嫌疑其他建安書中可互見此不能盡布也答任行甫書謝事文字極荷留念林推所喻印紙已借人寫須更兩三日方可得即遣人送去且煩為道鄙意謝之俟遣人别上狀也保官俞宰書中已說但亦恐其難之故不欲直求之但云託其宛轉而已今果如所料可付一笑所說諸人或恐未升朝或恐亦有所畏不欲更啓口只南劒田右司雖是放罷然屢已經赦罷後又曾磨勘轉官恐或可作已專令吳定往求之今若不是乞兒不肯與癩子作保然亦煩更問法意如何以狀式官觀之非分司致仕等人自可作也亦已喻幹請人令勿幇正月以後俸錢并煩為收起劵身之屬便中示及也與任行甫書保官久求不得已絶意不求只欲懇州府乞一申省狀又聞府坐移鎮已亟作書賀之并别緘致此懇遣行矣忽得昭武黄衡州書自求作保人之識度相越乃如此不免趕回且發去賀書煩為投之亦一靣遣人去昭武僉圓文字借印紙來俟到即發去求奏狀内有一書至林推今亦且抽回只劵身仍煩取回俟有回便却付來也與楊子直書熹一病沉綿遂不能起今遣人去下致仕文字不知尚及拜受否也世間喻於義者則為君子喻於利者即是小人而近年一種議論乃欲周旋於二者之間回互委曲費盡心機卒既不得為君子而其為小人亦不索性亦可謂悞用其心矣人之將死其言也善惟老兄念之與項平父書熹老病死矣無復可言今漫遣人去下致仕文字念公平生故人不可無數字之訣時論一變盡言者得禍求全者得謗利害短長之間亦明者所宜審處也答張定叟書熹昧於攝理百病交攻初亦只是常年脚氣而根本已衰不能與病為敵遂至沈困日甚一日今已無復生全之望亟上掛冠之請矣自惟平生無所肖似雖不及趨拜先忠獻公幕府而荷知遇之意不薄及遊兄伯仲間又以道義徳業相期於千載敬夫棄我而先已十餘年而熹今衰病又如此則亦不得久留矣昨蒙朝廷不棄累加收用訖無補報狼狽而歸方此省愆尚期後效而時論一變中外震駭忠賢斥逐下及韋布蓋近世所未有病中憤悶無聊悲歎累日顧念疎遠言之無益竟不能發一語以效其愚適㑹疾亟遂姑出此下計庶幾旦夕瞑目有以見兄家父兄平生師友於地下耳此外尚何言哉時事如此有識寒心黙計中外羣公威望隱然忠義明白誰如吾定叟者異時扶傾補敗洪濟艱難熹雖瞑目實不能不以此望於門下也更願勉思令猷益求彊輔燕居深念恬養本原遠耳目之細娛圖國家之大計此又區區所深望也游誠之才力可仗不但救荒一事得收置門下異時儘有用處但亦更願兼收並蓄更得方正嚴重有餘識遠慮可敬畏者參錯其間使勤攻吾闕如崔州平法孝直之於孔明則天下之事庶乎其可濟也承喻先正經解寳藏無恙今謹封納其間頗有續記所聞處蓋亦疑而未定之詞今固不容輙有增損不審尊意以為如何也熹病甚不能作字口占布此氣已不相屬矣即此永訣切望俯念愚言千萬自愛至懇至懇答劉季章書告老得謝固為甚幸而無狀之蹤乃復累及從之方此踧踖不能自安忽得來書乃聞其訃尤深痛惜欲寄一書慰其子弟不知曾作何差遣來有便幸批報也子壽憂悴殊可念近日樓大防又已行遣一時流輩芟夷畧盡其勢必從頭别尋題目整頓一番聞鄉日湖南所按吏有訴寃於朝者已下本路體量改正次第首見及矣知在晉輔處相聚甚善可更勉其收拾身心向裏用力不須向外枉費心神非唯無益當此時節更生患害不可知鄉日石刻及今所刋三冊勸其且急收藏不可印出鄉後或欲更為此舉千萬痛止之也無疑志趣誠實相惜其横起猜疑自立界限不肯鄉上進步書中枉費心力分疎與黄直卿書三月八日熹啓人還得書知己至三山一行安樂又知授學次第人益信向所示告文規約皆佳深以為慰今想愈成倫理凡百更宜加勉力吾道之託在此者吾無憾矣衰病本自畧有安意為俞夢達薦一張醫來用􅗠砂巴豆等攻之病遂大變此兩日愈甚將恐不可支吾泰兒又遠在千里外諸事無分付處極以為撓然凡百已定只得安之耳異時諸子諸孫切望直卿一一推誠力賜教誨使不大為門戸之羞至祝至祝恩老昏事餘干有許意彼所言者上有外家之嫌不可問也禮書今為用之履之不來亦不濟事無人商量耳可使報之可且就直卿處折𠂻如向來喪禮詳畧皆已得中矣臣禮一篇兼舊本今先附案一面整理其他并望參考條例以次脩成就諸處借來可校作兩様本行道大小并附去并紙各干番可收也謙之公庶各煩致意不意遂成永訣各希珍重仁卿未行亦為致意病昏且倦作字不成所懐千萬徒切悽黯不具與陳建寧劄子伏見本府夏稅小麥秋稅糯米除折錢外並納淨利錢聞之故老本府酒課舊來元係官𣙜至宣政間故御史中丞翁公出鎮鄉邦始以官務煩費收息不多而民以私釀破業䧟刑者不勝其衆於是申請罷去官務而㑹計一年酒課所入除米麥本柄官吏請給之外總計凈利若干均在二稅小麥糯米折錢數内别項送納民間遂得除去酒禁甚以為便但今竊詳淨利二字不見本是酒課之意竊慮將來官司不知本末或有再𣙜之議欲望台慈詢究本末申明省都將凈利二字改作酒息庶幾翁公所以惠於鄉邦者垂於永久不勝幸甚此事曲折舊見妻家尊長說及當時以鄉黨親戚之故親兄翁公措置此事至今為利中間偶聞官司有再𣙜之意因以此說告之得寢其議然數年以來耆舊凋零已無知其說者深慮日久無復稽考必有後患伏惟知府尚書於姻戚間必嘗知其本末今又屈臨此邦得賜台念幸甚幸甚乞給由子與納稅戸條目一諸縣舊例每遇二稅起催前期印造由子開具逐戸産錢出入及合納稅物逐項數目給付人戸以慿送納近年諸縣間有都不印給由子致人戸無慿送納或有所納過多既成虚費或有少欠些小又被追呼欲乞行下約束依例及時印給一諸縣人戸送納稅物官司交訖合給朱鈔縣鈔即關主簿勾銷戸鈔即付人戸執照使人戸免致重疊追呼搔擾近年諸縣間有受納錢物不即印鈔即以鈔單給付人戸既無官印不可行用及至追呼不為㸃對勘斷監納山谷細民被害尤甚欲乞檢坐勅條行下約束諸縣倉庫交到人戸稅物一錢以上須管當日印給朱鈔令所納人當官交領不得似前只將鈔單脫賺人戸一諸縣受納亦有即印鈔者又不即時關過簿㕔已關過者主簿又不即時勾銷正簿雖承使府倉庫發下朱鈔亦是如此怠慢不即勾銷以致縣道妄行追呼人户雖有執到戸鈔者又不與照應釋放及將鄉司案吏重作行遣却將已納人決撻監繫追胥案吏誅求乞覔至有只欠三五十錢而所費十數千者甚者又遭送獄禁繫勘斷監納人不聊生欲乞檢坐勅條行下約束嚴責主簿須管依限勾銷其催稅官司如有人戸執到戸鈔即仰畫時疎放仍將鄉司案吏重行勘斷右具如前並乞行下約束仍印小榜簡約其詞令人戸通知其有奉行違戾去處許人戸徑赴使府陳訴將官吏重作行遣與李彦中張幹論劄濟劄子示喻勸分之說足見仁人之心區區所慮蓋亦如此但閒中不敢數與外事前日但以船粟盡輸城中鄉落細民無所得食恐有他患不免以書扣府公久未得報未知竟如何但此說又與來喻浦城發米之說正相戾恐不容自有異同竊意莫若邀率鄉里諸長上先次相與合議可行之策使城郭鄉村富民貧民皆無不便然後共以白於當路而施行之蓋此事利害稍廣非一夫之智所能獨決又筆札敷陳未必盡意不若面言之可究底藴也但此事之行於富民必不能無所不利但以救民之急不得不小有所忍權以濟事若為富民計較太深則恐終無可行之策也告急朝廷丐糴鄰部恐亦不能有補吾鄉在重山複嶺之中朝廷縱有應副不識何路可以運致鄰部唯有廣東船米可到泉福然彼中今年亦旱近得福州知識書言之甚詳此固無可指凖就使有之亦如何運得到此浦城之米想亦不能甚多發之無節恐山谷間細民饑餓將復有貽州郡諸司之憂者尤不可不深慮也度今城下惟有兩縣勸分之說須作措置然亦且令愛惜撙節接續長遠乃為至策若乘快督迫數日之間散盡所畜則無以為後日之計矣但上戸有米無米之實最為難知若一槩用産錢高下為數此最不便顧恐今勢已迫不暇詳細不免只用此法耳若說不拘多少勸喻任其自糶則萬無是理也要須别有一法以核其實乃佳耳浦城之米必不得已可就糴而不可通販蓋就糴猶為有限而通販則其出無窮必傾此縣而後已凡此數端恐可以裨商論之末故畧陳之不識高明以為如何也考異與趙丞相書論祧廟世道消息一作消長晦庵集卷二十九欽定四庫全書晦庵集卷三十宋朱子撰
