front:
  text: 之也㳺氏曰以性情言之則曰中和以徳行言之則曰中庸其實一也至十二章又子思之言而其下八章復以先聖之言明之也十二章明道之體用下章庸言庸行夫婦所知所能也君子之道鬼神之徳大舜文武周公之事孔子之言則有聖人所不知不能者矣道之為用其費如此然其體之微妙則非知道者孰能窺之此所以明費而隠之義也第二十章據家語本一時之言今諸家分為五六者非是然家語之文語勢未終疑亦脱博學之以下今通補為一章二十一章以下至于卒章則又皆子思之言反復推説互相發明以盡所傳之意者也二十一章承上章總言天道人道之别二十二章言天道二十三章言人道二十四章又言天道二十五章又言人道二十八二十九章承上章為下居上而言亦人道三十章復言天道三十一三十二章承上章小徳大徳而言亦天道卒章反言下學之始以示入徳之方而遂極言其所至具性命道教費隠誠明之妙以終一篇之意自人而入于天也熹嘗伏讀其書而妄以已意分其章句如此竊惟是書子程子以為孔門傳授心法且謂善讀者得之終身用之有不能盡是豈可以章句求哉然又聞之學者之於經未有不得於辭而能通其意者是以敢私識之以待誦習而玩心焉新安朱熹謹書
