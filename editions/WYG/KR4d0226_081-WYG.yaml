body:
  text: 書張氏所刻潛虚圖後紹興己巳洛人范仲彪炳文避章傑之禍自信安来客崇安予得従之逰炳文親唐鑑公諸孫嘗娶温國司馬氏及諫議大夫無恙時為子壻逮聞文正公事為多時為賔客道語亹亹不厭且多藏文正公遺墨嘗示予以􅅗虚别本則其所闕之文尚多問之云温公晚著此書未竟而薨故所傳止此盖嘗以其手藁属景迂晁公補之而晁謝不敢也因従炳文借得寫本藏之其後三十餘年所見之本皆然欲訪完書不復可得每以為恨近得泉州季思侍郎所刻則首尾完具遂無一字之闕始復驚異以為世果自有完書而疑炳文語或不可信讀至剛行遂釋然曰此贋本也人問何以知之予曰本書所有句皆協韻如易彖文象𤣥首贊測其今有而昔無者行變尚協而解獨不韻此盖不知也字處末則止字為韻之例爾此人好作偽書而尚不識其體製固為可笑然亦幸其如此不然則㡬何而不遂至於偪真也耶間又考炳文之書命圖之後跋語之前別有凡例二十六字尤為命圖之闗紐而記占四十二字注六字又足以見占法之變焉今本顧亦無之故其所附論説徒知以凶吉臧否平為所遇之占而不知其所占者之又有所待而然也因亟以書扣季思此本果家世之舊傳否耶則報曰得之某人耳於是益知炳文為不妄嘗欲私記本末以訂其謬而未暇今復得鄉人張氏印本乃泉本之所自出於是始出舊書授學者使以相㕘凡非温公之舊者悉朱識以别之凡行之全者七補者二十有六變百八十有八解二百一十有二又補命圖九凡例記占之闕大小七十有四字而記其所聞於炳文者如此使覽者有以考焉是時又得温公易説於炳文盡隨卦六二之半而其後亦闕焉炳文自言其家使人就謄温公手摹適至而興亡之故所存止此後數年予乃復得其全書云好事者於北方互市得版本焉始亦喜其書之獲全今則不能無疑然無以考其果為真與偽也時又嘗問炳文或謂涑水記聞非温公書者信乎炳文曰是何言也温公日錄月别為卷而記行事皆述見聞手筆細書今可覆視豈他人之所得為哉特其間善惡雜書無所隠避使所書之家或諱之而不欲傳耳炳文又云金人入洛時從温公家避地至某州遇羣盜執以見其渠帥帥問何人應曰司馬太師家也羣盜相顧失色且訊虛實因出畫像及敕誥之属示之則皆以手加額既而俯仰歎息謂炳文曰向使朝廷能用汝家太師之言不使吾属披猖至此矣凡吾所欲殺掠者蔡京王黼輩親舊黨與耳汝無憂懼為也亟傳令軍中無得驚司馬太師家又揭牓以曉其後曹以故骨肉皆幸無他而圖書亦多得全凡此人亦聞之者因并書之淳熈丙申十一月丁卯朱熹謹書書麻衣心易後麻衣心易頃嵗嘗畧見之固已疑其詞意凡近不類一二百年前文字今得黄君所傳細讀之益信所疑之不謬也如所謂雷自天下而發山自天上而墜之類皆無理之妄談所謂一陽生於子月而應在卯月之類乃術家之小數所謂由破體煉之乃成全體則爐火之末技所謂人間萬事悉是假合又佛者之幻語耳其他比比非一不容悉舉要必近年術數末流道聴塗説掇拾老佛醫卜諸説之陋者以成其書而其所以託名於此人者則以近世言象數者必宗邵氏而邵氏之學出於希夷於是又求希夷之所敬得所謂麻衣者而託之以為若是則凡出於邵氏之流者莫敢議已而不自知其説之陋不足以自附於陳邵之間也夫麻衣方外之士其學固不純於聖賢之意然其為希夷所敬如此則其為説亦必有竒絶過人者豈其若是之庸瑣哉且五代國初時人文字言語質厚沈實與今不同此書所謂落處活法心地等語皆出近年且復不成文理計其偽作不過四五十年間事耳然予前所見本有張敬夫題字猶摘其所謂當於羲皇心地上馳騁莫於周孔脚跡下盤旋者而與之辨是亦徒費於辭矣此直無理不足深議但當摘其謬妄之實而掊擊之耳淳熈丁酉冬十一月五日書再跋麻衣易説後予既為此説後二年假守南康始至有前湘隂主簿戴師愈者来謁老且躄使其壻自掖而前坐語未久即及麻衣易説其言暗澀殊無倫次問其師傳所自則曰得之隠者問隠者誰氏則曰彼不欲世人知其姓名不敢言也既復問之邦人則皆曰書獨出戴氏莫有知其所自来者予省前語雖益疑之然亦不記前已見其姓名也後至其家因復扣之則曰學易而不知此則不明卦畫之妙而其用差矣予問所差謂何則曰坎兑皆水而卦畫不同若煮藥者不察而誤用之則失其性矣予了其妄因不復問而見其几間有所著雜書一編取而讀之則其詞語氣象宛然麻衣易也其間雜論細事亦多有不得其説而公為附託以欺人者予以是始疑前時所料三五十年以来人者即是此老既歸亟取觀之則最後跋語固其所為而一書四人之文體製規模乃出一手然後始益深信所疑之不妄然是時戴病已昏不久即死遂不復可窮詰獨得其易圖數巻閲之又皆鄙陋瑣碎穿穴無稽如小兒嬉戲之為者欲以其事馳報敬夫則敬夫亦已下世因以書語吕伯恭曰吾病廢有年乃復為吏然不為他郡而獨来此豈天固疾此書之妄而欲使我親究其實耶時當塗守李夀翁侍郎雅好此書伯恭因以予言告之李亟以書来曰即如君言斯人而能為此書亦吾所願見也幸為津致使其一来予適以所見聞報之而李已得謝西歸遂不復出不知竟以予言為如何也淳熈丁未初夏四日病中間閲舊書念夀翁敬夫伯恭皆不可復見因并記此曲折以附其後使覽者知予之論所以不同於二君子者非茍然也跋李少膺脞説人有士君子之行乃先王教化徳澤薰陶所就非一比長之官所能致也闗市譏而不征乃文王治岐時事周禮乃成周大備之法隨時制宜自有不能同者前輩盖嘗論之不當以此而難彼也以言動行為之重乃藍田吕氏説然以經文推之有所不通不若只從舊註之為安求全之毁對不虞之譽而言則亦當從舊註三代正朔胡氏春秋傳已有此論然鄭康成杜元凱説亦不可廢盖三代雖不改時與月而春秋紀春無冰為異則固以周正紀事也石林葉氏又考左傳所記祭足取麥穀鄧來朝三事以為經傳所記有例差兩月者是經用周正而傳取國史直自用夏正者失于更改也詩中月數多用夏正者書金縢秋大熟亦是夏時此為不改時月之驗甚明但孟子所謂七八月乃五六月所謂十一月十二月乃九月十月為不可曉此亦宜當闕之耳天産地産之説熹所未曉而李君所論亦未通地上有水恐不若從程傳之説大抵今人讀書不廣索理未精乃不能致疑而先務立説此所以徒勞苦而少進益也因讀李君脞説書此跋黄仲本朋友説人之大倫其别有五自昔聖賢皆以為天之所敘而非人之所能為也然以今考之則惟父子兄弟為天属而以人合者居其三焉是則若有可疑者然夫婦者天属之所由以續者也君臣者天属之所賴以全者也朋友者天属之所賴以正者也是則所以紀綱人道建立人極不可一日而偏廢雖或以人而合其實皆天理之自然有不得不合者此其所以為天之所敘而非人之所能為者也然是三者之於人或能具其形矣而不能保其生或能保其生矣而不能存其理必欲君臣父子兄弟夫婦之間交盡其道而無悖焉非有朋友以責其善輔其仁其孰能使之然哉故朋友之於人倫其勢若輕而所繫為甚重其分若疎而所闗為至親其名若小而所職為甚大此古之聖人修道立教所以必重乎此而不敢忽也然自世教不明君臣父子兄弟夫婦之間既皆莫有盡其道者而朋友之倫廢闕為尤甚世之君子雖或深病其然未必深知其所以然也予嘗思之父子也兄弟也天属之親也非其乖離之極固不能輕以相棄而夫婦君臣之際又有雜出于情物事勢而不能自己者以故雖或不盡其道猶得以相牽聨比合而不至于盡壊至於朋友則其親不足以相維其情不足以相固其勢不足以相攝而為之者初未嘗知其理之所從職之所任其重有如此也且其於君臣父子兄弟夫婦之間猶或未嘗求盡其道則固無所藉於責善輔仁之益此其所以恩疏而義薄輕合而易離亦無怪其相視漠然如行路之人也夫人倫有五而其理則一朋友者又其所藉以維持是理而不使至於悖焉者也由夫四者之不求盡道而朋友以無用廢然則朋友之道盡廢而責善輔仁之職不舉彼夫四者又安得獨力而久存哉嗚呼其亦可為寒心也已非夫彊學力行之君子則孰能深察而亟反之哉始予讀王深甫告友之篇感其言若有補於世教者徐而考之則病其推之不及於天理之自然顧以夫婦君臣一出於情勢之偶合至於朋友則亦不求其端直以為聖人彊而附于四者之間也誠如是也則其殘壊廢絶是乃理分之當然無足深嘆而其至是亦晚矣近得黄君仲本朋友説讀之其言天理人倫之意乃若有㑹於予心者然於朋友之道廢所以獨至於此則亦恐未究其所以然也因書其後如此庶乎其有發云跋范文正公家書三郎官人昨得書知在官平善此中亦如常只是純佑未全安汝守官處小心不得欺事與同官和睦多禮有事只與同官議莫與公人商量莫縦鄉親来部下興販自家且一向清心做官莫營私利汝看老叔自来如何還曽營私否自家好家門各為好事以光祖宗頻寄書来言彼動静將息將息不具叔押報十五日新婦孩兒各安好十叔房下如何弟兄還漸識好惡否右范文正公與其兄子之書也其言近而易知凡今之仕者得其説而謹守之亦足以檢身而及物矣然所謂自未嘗營私者必若公之先天下之憂而憂後天下之樂而樂事上遇人一以自信不擇利害為趨舍然後足以充其名而其所論親僚友以絶壅蔽之萌明禁防以杜姦私之漸者引而伸之亦非獨效一官者所當知也友人陳君明仲為候官宰得公此帖刻置坐隅以自觀省而以其墨本見寄熹盖三復焉而深贊其言之近指之逺敢書其説於左方庶㡬覽者有以發焉淳熈戊戌季夏閏月新安朱熹謹書書徽州婺源縣中庸集解板本後此書始刻於南劒之尤溪熹實為之序其篇目今建陽長沙廣東西皆有刻本而婺源宰三山張侯又將刻之縣學以恵學者熹故縣人嘗病鄉里晚學見聞單淺不過溺心於科舉程試之習其秀異者又頗馳騖乎文字纂組之工而不克専其業於聖門也是以儒風雖盛而美俗未純父子兄弟之間其不能無愧於古者多矣今得賢大夫流傳此書以幸教之固熹之所欲聞而樂贊其成者也是書所記雖本於天道性命之微而其實不外乎達道達徳之粲然者學者誠能相與深究而力行之則先聖之所以傳與今侯之所以教者且將有以自得之而舊俗之未純者亦可以一變而至道矣書徽州婺源縣周子通書板本後熹舊記先生行實采用黄太史詩序中語若以濂之為字為出於先生所自製以名廬阜之溪者其後累年乃得何君所記然後知濂溪云者實先生故里之本號而非一時嫓合之強名也欲加是正則其傳已久懼反以異詞致惑故特附何君語於遺事中以著其實後又得張敬夫所刻先生墨帖後記先生家譜載濂溪隠居在營道縣榮樂鄉石塘橋西而舂陵胡良輔為敬夫言濂實溪之舊名父老相傳先生晚居廬阜因名其溪以示不忘其本之意近邵武鄒旉官舂陵歸為熹言嘗親訪先生之舊廬所見聞與何張之記皆合但云其地在州西南十五里許盖溪之源委自為上下保而先生居下保其地又别自號為樓田至字之為濂則疑其出於唐刺史元結七泉之遺俗也旉嘗有文辨説甚詳其論制字之所従則熹盖嘗為九江林使君黄中言之與旉説合方將并附其説於書後以證黄序之失而婺源宰三山張侯適將鋟板焉因書以遺之庶㡬有補於諸本之闕若此書所以發明聖學之傳而學者不可以不讀之意則熹前論之已詳矣因不復重出云淳熈己亥正月朔旦縣人朱熹謹書跋歐陽國瑞母氏錫誥淳熙己亥春二月熹以卧病鈆山崇夀精舍邑士歐陽國瑞来見且出其母太孺人錫號訓辭及諸名勝跋語俾熹亦題其後熹觀國瑞器識開爽陳義甚髙其必有進乎古人為已之學而使國人願稱焉曰幸哉有子如此矣夫豈獨以其得乎外者為親榮哉因竊不辭而敬書其後如此國瑞勉旃無忽其言之陋也跋趙宰母夫人錫誥熹伏讀夀昌夫人始封訓辭因得遍觀諸賢跋知趙侯之所以厚於其親者非今世常人之所及矣問於士友之間皆言趙侯與其昆弟平居奉養所以悦其親者無所不用其至又知其非出於一時勉慕而為之也嗚呼其亦可謂孝矣夫事親孝故忠可移於君吾知趙侯異時進而立於朝廷其必有以異乎今世士大夫之所為者無疑也因亦輒書其後云淳熙己亥四月辛丑新安朱熹書跋趙侯彦逺行實名善應子直之父也孟子喜稱柳下恵之為人以為百世之下聞其風者鄙夫寛薄夫敦而世或疑之今得崇道趙侯行實之書而讀之足以信孟氏之不我欺矣著作君所以觀法其親而顯揚之者深密詳盡至於如此豈亦侯之身教有以發之也歟抑以是為質而致知以精之則天性人心固有不可泯之義理以是為始而力行以終之則由家及國又有不可窮之事業是則熹愚不肖於著作君盖猶不能無惓惓之望也敢竊議編末而歸其書趙氏云淳熙己亥中夏丁卯新安朱熹書伊川先生易傳板本後易之為書更厯三聖而制作不同若庖羲氏之象文王之辭皆依卜筮以為教而其法則異至於孔子之贊則又一以義理為教而不専於卜筮也是豈其故相反哉俗之淳漓既異故其所以為教為法者不得不異而道則未嘗不同也然自秦漢以來考象辭者泥於術數而不得其𢎞通簡易之法談義理者淪於空寂而不適乎仁義中正之歸求其因時立教以承三聖不同於法而同於道者則惟伊川先生程氏之書而已後之君子誠能日取其一卦若一爻者熟復而深玩之如已有疑將決於筮而得之者虚心端意推之於事而反之於身以求其所以處此之實則於吉凶消長之理進退存亡之道將無所求而不得邇之事父逺之事君亦無處而不當矣華山皇甫斌嘗讀其書而深好之盖嘗大書深刻摹以予人惟恐傳者之不廣而讀者之不多也顧猶来請其所以讀之之説熹不得讓輒書此以遺之淳熙六年秋八月丙戌朔新安朱熹謹書跋蘇文定公直節堂記右南康軍治直節堂記欒城蘇文定公為郡守徐君師回望聖作又手書而刻石焉自元豐乙丑距今淳熙己亥凡九十有五年而新安朱熹來領郡事問堂所在則既無有而杉亦不存求其記文則又非復故刻而委之他所矣於是厯訪郡之老人竟無有能言其處者盖自元豐以至今其間世故亦多變矣然建炎羣盜於今纔五十年舊迹蕪滅未應至此意者斯堂之毁其在紹聖黨論之時乎撫事興懐慨然永嘆顧郡方貧而民已病正使堂之故基尚在勢亦不能有以復於其舊獨聽事之西有堂無額而庭中有老柏焉焚斮之餘生意殆盡而屹立不僵如志士仁人更厯變故而剛毅獨凜凜然不衰者因取直節之號寓之此堂而輦記石陷壁間且欲盡去庭之凡木而雜植杉柏以彷彿前賢之遺意則既非時而熹亦以病告歸矣嗚呼後之君子其尚有以成予之志也夫是嵗八月丁亥識書濂溪先生愛蓮説後右愛蓮説一篇濂溪先生之所作也先生嘗以愛蓮名其居之堂而為是説以刻焉熹得竊聞而伏讀之有年矣属来守南康郡實先生故治然㓂亂之餘訪其遺跡雖壁記文書一無在者熹竊懼焉既與博士弟子立祠於學又刻先生象太極圖於石通書遺文於版㑹先生曽孫直卿来自九江以此説之墨本為贈乃復寓其名於後圃臨池之館而刻其説置壁間庶㡬先生之心之徳来者有以考焉淳熙己亥秋八月甲午朱熹謹記跋敘古千文右敘古千文故禮部侍郎胡公明仲所作其敘事立言昭示法戒實有春秋經世之志至於發明大統開示正塗則又於卒章深致意焉新學小童朝夕諷之而問其義亦足以養正於蒙矣清江劉孟容出其先朝奉君所書八分小卷莊謹齊一所以傳家之意甚備豈亦有取於斯乎因摹刻寘南康郡齋傳諸小學庶㡬其有補云淳熈己亥八月戊戌新安朱熹書書濂溪先生拙賦後右濂溪先生所為賦篇聞之其曽孫直卿云近嵗耕者得之溪上之田間已㫁裂然尚可讀也熹惟此邦雖陋然往嵗先生嘗辱臨之乃闢江東道院之東室牓以拙齋而刻置焉既以自警且以告後之君子俾無蹈先生之所恥者以病其民云淳熈己亥秋八月辛丑朱熹謹記跋曽吕二公寄許吏部詩奉懐子禮吏部賢友本中再拜寒松厭庭院老馬倦維縶翛然出塵去粗糲朝夕急我友隔江湖尚作一日葺平生學道心擇善有固執豈不在行路自逺霜露濕百川灌河来砥柱乃中立何時一尊酒更與交舊集長句奉寄子禮提宫吏部闕㡬草堂竹塢閉門中吏部持身有古風老去一麾還作病歸来四壁又成空今朝札翰知亡急舊日詩書郤未窮拭目看君進明徳乃兄事業聽天公先君子之執友吏部許公熹不及見也然而竊聞其學盖以修已治人為一致要之事實而不為空言者今頌二公之詩可見當日衆賢注心髙仰之意矣至於前輩交㳺之際所以觀考徳業相期於無窮者與夫中興一時人物之盛覽者亦當慨然有感於斯焉淳熈己亥十一月辛巳新安朱熹謹書跋王樞密贈祁居之詩王公素剛毅有大節方廷爭和議時視秦檜無如也而能屈體下賢出於誠意如此是可尚已祁公以布衣諸生抗彊相折悍吏卒全窮交非其所養之厚所守之堅何以及此三復此卷為之太息而書其後云淳熈己亥臘月壬辰新安朱熹謹書書康節誡子孫文康節先生邵公手書誡子孫語及天道物理二詩得之薌林向氏刻寘白鹿洞之書堂以示學者淳熈庚子開基節日新安朱熹謹書跋陳居士傳熹少讀龜山先生文集固已想見居士之為人今得鄧生綯所攜墨本觀之又見了翁道鄉㳺察院李丞相張侍郎諸前輩稱述之盛如此不勝慨嘆夫居士之為人盖子夏所謂雖曰未學吾必謂之學者先生猶嘆其莫有開導而輔成之者吾儕小人姿本薄惡其可不汲汲於學問以矯厲而切磋之邪因敬書其後既以自警且以視諸同志云淳熈庚子季春壬申新安朱熹書於南康郡舍之拙齋跋徐誠叟贈楊伯起詩熹年十八九時得拜徐公先生於清湖之上便蒙告以克已歸仁知言養氣之説時盖未逹其言久而後知其為不易之論也来南康得楊君伯起於衆人中意其淵源之有自也一日出此卷示熹三復恍然思復見先生而不可得掩卷太息久之淳熈庚子四月辛亥新安朱熹書跋伊川與方道輔帖右伊川先生與莆田方君元宷道輔帖後一帖乃嘉祐二年語時先生之年纔二十有五爾真蹟今藏道輔曽孫友陵家後百二十四年後學朱熹得曹建模本刻石于白鹿洞書院題洛神賦圖此卷筆意淳古畧似漢石刻中所見草樹人物亦可考見當時器用車服制度不但為好事者無益之玩而已朱熹識跋歐陽文忠公帖歐陽公作字如其為文外若優㳺中實剛勁惟觀其深者得之淳熙庚子中夏丁巳新安朱熹觀于南康郡圃之愛蓮堂因識其後跋冰解圖熹觀此圖讀洪陸二公跋語為之隕涕淳熈庚子五月戊午跋太室中峰詩畫觀此卷二室諸峰誦陶翁送羊長史詩為之慨然掩卷太息至於畫筆精深山勢雄偉不暇論也淳熈庚子中夏七日朱熹仲晦父書書語孟要義序後熹頃年編次此書鋟版建陽學者傳之久矣後細考之程張諸先生説尚或時有所遺脱既加補塞又得毗陵周氏説四篇有半於建陽陳焞明仲復以附于本章豫章郡文學南康黄某商伯見而悦之既以刻于其學又慮夫讀者疑於詳略之不同也属熹書于前序之左且更定其故號精義者曰要義云淳熈庚子冬十有一月己丑朔旦江東道院拙齋記跋免解張克明啓行藏勲業銷倚樓看鏡之懐窈窕﨑嶇増尋壑經丘之趣此老子心事也此公方欲求試南宫而輒以自與何哉然予亦濡滯於此而未得遂其所懐也三復其言為之太息庚子至前一夕六老軒書跋獨孤及答楊賁處士書獨孤及為舒州刺史作口賦法處士楊賁以書譏之曰富者出萬今易以千貧者出百今乃數倍富倍優貧倍苦及答之曰據保簿數百姓并浮寄户三萬三千而應差科者唯三千五百其餘二萬九千五百户蠶而衣耕而食不持一錢以助王賦每嵗三十萬貫之税悉鍾於三千五百人之家髙户嵗出千貫其次九百八百貫其次七百六百貫九等最下兼本丁租庸猶輸四五十貫以此人日困蹙故今為口賦法以三萬三千人之力分三千五百家之税乃損有餘補不足之道富人貧人悉令均減倍優倍苦何従而生右見獨孤常州文集及大厯中卒於常州此又在其前可見當時田制隳壊之實然不能精加考覈以復武徳貞觀之舊而遽為一切之法以亂經制何耶所謂三十萬貫者盖并租庸與雜徭言之而所謂口賦法者則已有兩税之漸矣跋洪芻所作靖節祠記讀洪芻所撰靖節祠記其於君臣大義不可謂懵然無所知者而靖康之禍芻乃縦慾忘君所謂悖逆穢惡有不可言者送學榜示講堂一日使諸生知學之道非知之艱而行之艱也跋白鹿洞所藏漢書熹既為劉子和作傳其子仁季致書以其先人所藏漢書四十四通為謝時白鹿洞書院新成因送使藏之以備學者看讀子和五世祖磨勘府君式南唐時讀書此洞後仕本朝有名太祖時其孫敞攽皆為聞人今子和弟子徵之家尚蔵其手抄孟子管子書云是洞中日課也年月日朱熹仲晦父記跋張巨山帖近世之為詞章字畫者爭出新竒以投世俗之耳目求其蕭散澹然絶塵如張公者殆絶無而僅有也劉兄親承指畫妙得其趣然公晚以事業著故其細者人無得而稱焉敬夫雅以道學自任而逰戲翰墨乃能為之題識如此豈亦有賞於斯乎跋陳簡齋帖簡齋陳公手寫所為詩一巻以遺寳文劉公劉公嗣子觀文公愛之属廣漢張敬夫為題其籖予嘗借得之欲摹而刻之江東道院竟以不能得善工而罷間獨展玩不得去手盖嘆其詞翰之絶倫又嘆劉公父子與敬夫之不可復見也俯仰太息因書其末以歸之劉氏云跋蘇聘君庠帖予来南康聞蘇聘君嘗居郡西門外暇日訪其遺迹無復存者永懐髙風不勝慨嘆南上人出示此軸三復之餘益深遐想淳熈辛丑正月二十八日新安朱熹仲晦父題跋南上人詩南上人以此卷求余舊詩夜坐為寫此及逺逰秋夜等篇顧念山林俯仰疇昔為之慨然南詩清麗有餘格力閒暇絶無蔬筍氣如云沾衣欲濕杏花雨吹面不寒楊柳風余深愛之不知世人以為如何也淳熈辛丑清明後一日晦翁書跋金谿陸主簿白鹿洞書堂講義後淳熈辛丑春二月陸兄子静来自金陵其徒朱克家陸麟之周清叟熊鑑路謙亨胥訓實従十日丁亥熹率寮友諸生與俱至于白鹿書堂請得一言以警學者子静既不鄙而恵許之至其所以發明敷暢則又懇到明白而皆有以切中學者隠微深錮之病盖聽者莫不竦然動心焉熹猶懼其久而或忘之也復請子静筆之于簡而受蔵之凡我同志於此反身而深察之則庶乎其可以不迷於入徳之方矣新安朱熹識跋顔魯公栗里詩右唐魯郡顔文忠公栗里詩見陳令舉廬山記而不得其全篇雖然讀之者亦足以識二公之心而著於君臣之義矣栗里在今南康軍治西北五十里谷中有巨石相傳是陶公醉眠處予嘗往逰而悲之為作歸去来館於其側嵗時勸相間一至焉俯仰林泉舉酒属客盖未嘗不賦是詩也地之主人零陵從事陳君正臣聞之若有慨然於中者請大書刻石上予既去郡請益堅乃書遺之淳熈辛丑秋七月壬午新安朱熹仲晦父跋張魏公與劉氏帖張忠獻公平生心事無一念不在君親而其學又以虚静誠一求之於天為本故其與人言亦未嘗不依於此今觀其所與寳學劉公屏山先生共父樞密書帖詩文亦可見矣劉公從公川陜并心國事故公於其兄弟父子之間眷眷如此亦豈茍然者哉先生之子玶有味其言欲廣傳之以悟當世因屬熹書其後淳熈辛丑八月甲子新安朱熹敬書跋鄭景元簡六經記載聖賢之行事備矣而於死生之際無述焉盖以是為常事也獨論語檀弓記曽子寢疾時事為詳而其言不過保身謹禮與語學者以持守之方而已於是足以見聖賢之學其所貴重乃在於此非若浮屠氏之不察於理而徒以坐亡立脱為竒也然自學者言之則死生亦大矣非其平日見善明信道篤深􅅗厚養力行而無間夫亦孰能至此而不亂哉今觀鄭君景元所報其兄龍圖公事亦足以驗其所學之正而守之固矣所謂朝聞道夕死可矣者於公見之因竊書其後以自警又將傳之同志相與勉焉淳熈辛丑八月乙巳朔丹陽朱熹書跋鄭景望書吕正獻公四事右申國吕正獻公四事見其家傳而故建寧太守鄭侯書之齋壁以自警者也侯書此時已屬疾間不兩月而終啓手足時清明安定執禮不懈如常日是足以驗其平生學力果能踐斯言者非一時偶書屋壁而已也夫吕公之行髙矣其可師者不止此鄭侯亦無不學顧豈舍其大而規規於其細如此哉誠以理無巨細精粗之間大者既立則雖毫髪之間亦不欲其少有遺恨以病夫道體之全也侯之莫府趙君彦能將摸刻寘府學以視學者而屬熹書其本末熹不得辭也侯名伯熊字景望永嘉人其為此邦號令條教必本於孝弟忠信學者傳之淳熈辛丑秋八月乙巳朔旦州民宣教郎新提舉江南西路常平茶鹽公事朱熹謹書書劉子澄所編曽子後右曽子書七篇其内篇一外篇雜篇各三吾友清江劉清之子澄所集録也昔孔子歿門人唯曽氏為得其傳其後孔子之孫子思樂正子春公明儀之徒皆從之學而子思又得其傳以授孟軻故其言行雜見於論語孟氏書及他傳記者為多然皆散出不成一家之言而世傳曽子書者乃獨取大戴禮之十篇以充之其言語氣象視論孟檀弓等篇所載相去逺甚子澄盖病其然因輯此書以傳學者而於其精粗純駁之際尤致意焉於戲若子澄者其可謂嗜學也已然熹嘗考之竊以謂曽子之為人敦厚質實而其學専以躬行為主故其真積力久而得以聞乎一以貫之之妙然其所以自守而終身者則固未嘗離乎孝敬信讓之規而其制行立身又専以輕富貴安貧賤不求人知為大是以從之㳺者所聞雖或甚淺亦不失為謹厚修潔之人所記雖或甚踈亦必有以切於日用躬行之實盖雖或附而益之要亦必為如是之言然後得以自託於其間也然則是七篇者等而别之雖有内外雜篇之殊而其大致皆為有益於學者非他書所及也讀者誠能志其大而必謹其小厯其淺而徐望其深則庶乎其無躐等之病而有日新之功矣淳熈八年九月丁丑新安朱熹謹記跋陳徽猷墓誌銘後秦丞相用陳公為淮西帥盖將付以邊事公以其意叵測力辭不就頃年公再罷番陽熹見公考亭私第公為熹言此甚詳今不能盡記其曲折也淳熈辛丑中冬乙亥因觀汪公所撰誌銘書此以補其闕時汪公薨已七年而敬夫明仲亦已下世令人悲慨之深新安朱熹書公孫坦蔵周子通書後記通書者濂溪夫子之所作也夫子姓周氏名惇頥字茂叔自少即以學行有聞於世而莫或知其師傳之所自獨以河南兩程夫子嘗受學焉而得孔孟不傳之正統則其淵源因可槩見然所以指夫仲尼顔子之樂而發其吟風弄月之趣者亦不可得而悉聞矣所著之書又多放失獨此一篇本號易通與太極圖説並出程氏以傳於世而其為説實相表裏大抵推一理二氣五行之分合以紀綱道體之精微決道義文辭禄利之取舍以振起俗學之卑陋至論所以入徳之方經世之具又皆親切簡要不為空言顧其宏綱大用既非秦漢以来諸儒所及而其條理之密意味之深又非今世學者所能驟而窺也是以程氏既沒而傳者鮮焉其知之者不過以為用意髙逺而已熹自蚤嵗即幸得其遺編而伏讀之初盖茫然不知其所謂而甚或不能以句壯嵗獲逰延平先生之門然後始得聞其説之一二比年以来􅅗玩既久乃若粗有得焉雖其宏綱大用所不敢知然於其章句文字之間則有以實見其條理之愈密意味之愈深而不我欺也顧自始讀以至于今嵗月㡬何倐焉二紀慨前哲之益逺懼妙㫖之無傳竊不自量輒為注釋雖知凡近不足以發夫子之精藴然創通大義以俟後之君子則萬一其庶㡬焉淳熈丁未九月甲辰後學朱熹謹記晦庵集卷八十一欽定四庫全書晦庵集巻八十二宋朱子撰跋跋
