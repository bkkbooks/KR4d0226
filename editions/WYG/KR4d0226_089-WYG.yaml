  text: 八十九
  hash: sha256:d2ce5f4ae55a38fac4238548c582ac5fc1061d3711308d82372d38ef5cc20be9
body:
  text: 宋朱子撰碑右文殿修撰張公神道碑淳熙七年春二月甲申祕閤修撰荆湖北路安撫廣漢張公卒於江陵之府舍其弟衡州使君杓䕶其柩以歸葬於潭州衡陽縣楓林鄉龍塘之原按令式立碑墓道而以書來謂熹曰知吾兄者多矣然最其深者莫如子今不可以不銘熹嘗竊病聖門之學不傳而道術遂為天下裂士之醇慤者拘於記誦其敏秀者􅃷於詞章既皆不足以發明天理而見諸人事於是言理者歸於老佛而論事者鶩於管商則於理事之正反皆有以病焉而去道益逺矣中間河洛之間先生君子得其不傳之緒而推明之然今不能百年而學者又失其指近嵗乃幸得吾友敬夫焉而天下之士乃有以知理之未始不該於事而事之未始不根於理也然又不得盡其所為而中道以没不有考焉以垂於世吾恐後之君子將有憾於吾徒也熹之愚固不足以及此然於共學輩流偶獨後死矧定叟之所以見屬者又如此其何以辭顧以疾病之不間後五六年乃得考其事而叙之曰公諱栻字敬夫故丞相魏國忠獻公之嗣子也生有異質頴悟夙成忠獻公愛之自其幼學而所以教者莫非忠孝仁義之實既長又命往從南嶽胡公仁仲先生問河南程氏學先生一見知其大器即以所聞孔門論仁親切之指告之公退而思若有得也以書質焉而先生報之曰聖門有人吾道幸矣公以是益自奮厲直以古之聖賢自期作希顔録一篇蚤夜觀省以自警䇿所造既深逺矣而猶未敢自以為足則又取友四方益務求其學之所未至蓋玩索講評踐行體騐反覆不置者十有餘年然後昔之所造深者益深逺者益逺而反以得乎簡易平實之地其於天下之理蓋皆瞭然心目之間而實有以見其不能已者是以决之勇行之力而守之固其所以篤於君親一於道義而没世不忘者初非有所勉慕而强為也少以䕃補右承務郎辟宣撫司都督府書冩機宜文字除直祕閤是時天子新即位慨然以奮伐仇敵克復神州為已任忠獻公亦起謫籍受重寄開府治戎參佐皆極一時之選而公以藐然少年周旋其間内賛宻謀外參庶務其所綜畫幕府諸人皆自以為不及也間以軍事入奏始得見上即進言曰陛下上念宗社之讐恥下閔中原之塗炭惕然於中而思有以振之臣謂此心之發即天理之所存也誠願益加省察而稽古親賢以自輔焉無使其或少息也則不惟今日之功可以必成而千古因循之弊亦庶乎其可革矣上異其言蓋於是始定君臣之契已而忠獻公辭位去用事者遂罷兵與敵和敵乘其隙反縱兵入淮甸中外大震然廟堂猶主和議至勑諸將毋得以兵向敵時忠獻公已即世公不勝君親之念甫畢藏事即拜疏言吾與敵人乃不共戴天之讐向來朝廷雖亦嘗興縞素之師然玉帛之使未嘗不行乎其間是以講和之念未忘於胸中而至誠惻怛之心無以感格乎天人之際此所以事屢敗而功不成也今雖重為羣邪所誤以蹙國而召㓂然亦安知非天欲以是開聖心哉謂宜深察此理使吾胸中了然無纎芥之惑然後明詔中外公行賞罰以快軍民之憤則人心悦士氣充而敵不難却矣繼今以往益堅此志誓不言和専務自强雖折不撓使此心純一貫徹上下則遲以嵗月亦何功之不成哉疏入不報後六年始以補郡臨遣得復見上時宰相雖以恢復之説自任然所以求者類非其道且妄意公素論當與已合數遣人致慇懃公不答見上首言先王之治所以建事立功無不如志以其胸中之誠足以感格天人之心而與之無間也今規畫雖勞而事功不立陛下誠深察之日用之間念慮云為之際亦有私意之發以害吾之誠者乎有則克而去之使吾中扄洞然無所間雜則見義必精守義必固而天人之應將不待求而得矣夫欲復中原之地當先有以得其百姓之心欲得中原之心當先有以得吾百姓之心而求所以得吾民之心者豈有他哉不盡其力不傷其財而已矣今日之事固當以明大義正人心為本然其所施有先後則其緩急不可以不詳所務有名實則其取舍不可以不審此又明主所宜深察也明年召還宰相又方謂敵勢衰弱可圖建遣泛使往責陵寢之故士大夫有憂其無備而召兵者皆斥去之於是公見上上曰卿知敵中事乎公對曰不知也上曰敵中饑饉連年盜賊四起公又對曰敵中之事臣雖不知然境中之事則知之詳矣上曰何事公遂言曰臣竊見比年諸道亦多水旱民貧日甚而國家兵弱財匱官吏誕謾不足倚仗正使彼實可圖臣懼我之未足以圖彼也上為黙然久之公因出所奏書讀之曰臣竊謂陵寢隔絶誠臣子不忍言之至痛然今未能奉詞以討之又不能正名以絶之乃欲卑詞厚禮以求於彼其於大義已為未盡而異論者猶以為憂則其昧陋畏怯又益甚矣然臣竊揆其心意其或者亦有以見我未有必勝之形而不能不憂也歟蓋必勝之形當在於蚤正素定之時而不在兩陣决機之日上為竦聴改容稱善至於再三公復讀曰今日但當下哀痛之詔明復讐之義顯絶敵人不與通使然後修徳立政用賢養民選將帥練甲兵通内修外攘進戰退守以為一事且必治其實而不為虚文則必勝之形隠然可見雖有淺陋畏怯之人亦且奮躍而争先矣上為嘆息褒諭以為前未始聞此論也其後又因賜對反復前説上益嘉歎面諭當以卿為講官冀時得晤語也時還朝未朞嵗而召對至六七公感上非常之遇知無不言大扺皆修身務學畏天恤民抑權倖屏讒諛之意至論復讐之義則反復推明所以為名實之辨者益詳於是宰相益憚公而近倖尤不悦遂合中外之力以排之而公去國矣葢公自是退居三年更歴兩鎮雖不復得聞國論而蚤夜孜孜反身修徳愛民討軍以俟國家扶義正名之舉尤極懇至於是天子益知公可用嘗賜手書褒其忠實葢將復大用之而公已病矣病亟且死猶手疏勸上以親君子逺小人信任防一已之偏好惡公天下之理以清四海克固丕圖若眷眷不能忘者冩畢緘付府僚使驛上之有頃而絶嗚呼靖康之變國家之禍亂極矣小大之臣奮不顧身以任其責者葢無幾人而其承家之孝許國之忠判决之明計慮之審又未有如公者雖降命不長不克卒就其業然其志義偉然死而後已則質諸鬼神而不可誣也始公出幕府即罹外艱屏居舊廬不交人事會盜起郴桂間聲摇數路湖南帥守劉公珙雅善公時從訪問籌䇿卒用以破賊還朝為上極言公學行志業非常人比上亦記公議論本末除知撫州未上改嚴州到任問民疾苦首以丁鹽錢絹太重為請得蠲是嵗半輸召為尚書吏部員外郎兼權左右司侍立官時廟堂方用史正志為發運使名為均輸而實但盡奪州郡財賦以惑上聴逺近騷然人不自安賢士大夫争言其不可而少得其要領者公亦為上言之上曰正志以為今但取之諸郡非取之於民也何傷公對曰今日州郡財賦大扺刼刼無餘若取之不已而經用有闕則不過巧為名色而取之於民耳上聞之矍然顧謂公曰論此事者多矣未有能及此者如卿之言是朕假手於發運使以病吾民也旋閲其實果如公言即詔罷之兼侍講除左司員外郎經筵開以詩入侍因葛覃之篇以進説曰治常生於敬畏亂常起於驕淫使為國者毎念稼穡之勞而其后妃不忘織紝之事則心之不存者寡矣周之先后勤儉如此而其後世猶有以休蠶織而為厲階者興亡之效於此見矣既又推廣其言上陳祖宗自家刑國之懿下斥當時興利擾民之害詳焉上亦歎曰此王安石所謂人言不足恤者所以誤國事也俄而詔以知閤門事張説簽書樞宻院事公夜草手疏極言其不可且詣宰相質責之語甚切宰相慚憤不堪而上獨不以為忤親札疏尾付宰相使諭指公復奏曰文武之勢誠不可以太偏然今欲左文右武以均二柄而所用乃得如此之人非惟不足以服文吏之心正恐反激武臣之怒也於是上意感悟命得中寢然宰相實隂附説明年乃出公知袁州而申説前命於是中外讙譁而説後竟謫死云淳熙改元公家居累年矣上復念公詔除舊職知静江府經略安撫廣南西路廣西去朝廷絶逺諸州土曠民貧常賦入不支出故往時立法諸州以漕司錢運鹽鬻之而以其息什四為州用以是州得粗給而民無加賦其後或乃奪取其息之半則州不能盡運而漕司又以嵗額責其虚息則高價抑賣之弊生而公私兩病矣公始至未及有為専務以訪求一道之利病為事既得其所以然者則為奏以鹽息什三予諸郡又因兼攝漕臺出其所積緡錢四十萬而中分之一以為諸倉買鹽之本一以為諸州運鹽之費奏請立法自今漕司復有多取諸州輙行抑賣悉以違制議罪其敢以資燕飲供饋餉者仍坐贓論詔皆從之所統州二十有五遼夐荒殘故多盜賊徼外蠻夷俗尚讎殺喜侵掠間亦入塞為暴而州兵皆脆弱慵惰又乏糧賜死亡輙不復補鄉落保伍亦名存而實廢邕管斗入羣蠻中最為重地而戍兵不能千人獨恃左右江洞丁十餘萬為藩蔽而部選提舉巡檢官初不擇人公知其弊則又為之簡閲州兵汰冗補闕籍諸州黥卒伉健者以為効用合親兵摧鋒等軍日習而月按之悉禁他役視諸州猶有不足於糧賜若凡戈甲之費者更斥漕司鹽本羨錢以佐之申嚴保伍之令而信其賞罰知流人沙世堅才勇喻以討賊自效所捕斬前後以十百數又奏乞選辟邕州提舉巡檢官以撫洞丁傳令溪洞酋豪喻以弭怨睦鄰愛惜人命為子孫長久安寧之計毋得輒相虜掠讎殺生事而它所以立恩信謹關防示形制者亦無不備於是境内正清方外柔服幕府無南鄉之慮矣朝廷買馬横山嵗久弊積邊氓告病而馬不時至至者多道死公究其利病得凡六十餘條如邕守上邊則瀕江有買船之擾綱馬在道則縁道有執牽之勞其或道死則抑賣其肉重為鄰伍之患是皆無益於馬而有害於人首奏革之其他如給納等量支券之姦以至官校叅司名次之弊皆有以究其根穴而事為之防由是諸蠻感悦争以其善馬來嵗額率常先期以辦而馬無滯留人知愛惜遂無復死道路者上聞公治行且未嘗叙年勞乃詔特轉承事郎進直寳文閣再任五年除秘閣修撰荆湖北路轉運副使改知江陵府安撫本路湖北尤多盜州縣不以為意更共縱釋以病良民公入境首劾大吏之縱賊者罷之捕姦民之舍賊者斬之羣盜破膽相率遁去公又益為條教喻以利害俾知革心開其黨與得相捕告以除罪其餘禁令方略大率如廣西時於是一路肅清善良始有安居之樂郡去北邊不逺雖頗有分屯大軍而主兵官率常與帥守不相中帥守所將獨神勁親兵及義勇民兵若干人比年亦廢簡閲不足恃公既以禮遇諸將得其驩心而所以恤其士伍之私者亦無不至於是將士感悦相戒無輒犯公令毎按親兵必使與大軍雜試以相激厲均犒賞修義勇法使從縣道階級喻以農隙閲習武事以俟不時按驗而加賞罰焉其後團教則又面加慰諭勉以忠義而教以敦睦首領有捕盜者為奏補官由是戎政日修而士心亦益感奮㑹有獻言於朝請盡籍客戸為義勇者公慮惑民聴且致流亡亟取丁籍閲之命一戸而三丁者乃籍其一以為義勇副軍别置總首人給一弩俾家習之三嵗一遣官就按它悉無有所與且為奏言所以不可盡取之故闔境賴焉辰沅諸州自政和間奪民田募游惰號刀弩手葢欲以控制諸蠻而實不可用中廢復修議者多不以為便詔與諸司平處列上公為奏去其病民罔上者數條詔皆施行人亦便之並淮姦民出塞為盜法皆處死異時官吏多蔽匿弗治至是捕得數人仍有北人在黨中公曰朝廷未能正名討敵則疆場之事不宜使數負吾曲命斬之以狥於境而縳其亡奴歸之北人歎其理直且曰南朝於是為有人矣信陽守劉大辯者婺州人也怙勢希賞誘致流民而奪見戸熟田以與之一郡汹汹公為遣吏平章乃定及是聞北人逐盜有近淮者則又虚驚夜棄城郭盡室南走數十里軍民復大擾公方劾奏之而朝廷用大辯請以見戸荒田授流民事下本道施行如章公復奏曰陛下幸哀邊民前詔占田已懇者不復通檢其未懇者二年不懇乃收為營田徳至渥也今未及期而大辯不務奉承宣布反設詐諼虧國大信以濟凶虐且所招流民不滿百數而虚奏且十倍請并下前奏論罪如法章累上大辯猶得易它郡以去蓋方是時上所以知公者愈深而惡公者忌之亦愈力公自以不得其職數求去不得尋以病請乃得之然比詔下以公為右文殿修撰提舉武夷山沖佑觀則已不及拜矣卒時年四十有八柩出江陵老稚挽車號慟數十里不絶訃聞上亦深為嗟悼四方賢士大夫往往出涕相弔而静江之人哭之尤哀葢公為人坦蕩明白表裏洞然詣理既精信道又篤其樂於聞過而勇於徙義則又奮厲明決無毫髪滯吝意以至疾病垂死而口不絶吟於天理人欲之間則平日可知也故其徳日新業日廣而所以見於論説行事之間者上下信之至於如此雖小人以其好惡之私或能壅害於一時然至於公論之久長蓋亦莫得而揜之也公之教人必使之先有以察乎義利之間而後明理居敬以造其極其剖析開明傾倒切至必竭兩端而後已所為郡必葺其學於静江又特盛暇日召諸生告語不倦民以事至廷中者亦必隨事教戒而於孝弟忠信睦婣任恤之意尤孜孜焉猶慮其未徧也則又刻文以開曉之至於喪葬嫁娶之法風土習俗之弊亦列其事以為戒命閭井各推耆宿使為鄉老授之夏楚使以所下條教訓厲其子弟不變然後言之有司而加法刑焉在廣西刑獄使者陸濟之子棄家為浮屠聞父死不奔喪為移諸路俾執拘以付其家官吏有犯名教者皆斥遣之甚或奏劾扺罪尤惡世俗鬼神老佛之説所至必屏絶之蓋所毁淫祠前後以闕而獨於社稷山川古先聖賢之奉為兢兢雖法令所無亦以義起其水旱禱祠無不應也平生所著書唯論語説最後出而洙泗言仁諸葛忠武侯傳為成書其它如書詩孟子太極圖説經世編年之屬則猶欲稍更定焉而未及也然其提綱挈領所以開悟後學使不迷於所鄉其功則已多矣蓋其常言有曰學莫先於義利之辨而義也者本心之所當為而不能自己非有所為而為之者也一有所為而後為之則皆人欲之私而非天理之所存矣嗚呼至哉言也其亦可謂擴前聖之所未發而同於性善養氣之功者歟公之州里世系已見於忠獻公之碑此不著其配曰宇文氏朝散大夫師中之女事舅姑以孝聞佐君子無違徳封安人前卒子焯承奉郎亦蚤世二女長適五峯先生之子胡大時次未行而卒孫某某尚幼後數年胡氏女與某亦皆夭嗚呼敬夫已矣吾尚忍銘吾友也哉銘曰鬬尹之忠文子之清匪欲之徇而仁弗稱孰的孰張以詔後學公乘厥機如寐斯覺自時厥後動罔弗欽孝承考志忠格天心唯孝唯忠惟一其義惟命有嚴豈曰為利羣邪肆誕公避而歸兩鎮餘功以徳為威帝曰懐哉汝忠而實姑訖外庸來輔來拂上天甚神曷監而遺彼頑弗天此哲而萎往昔茫茫來今不盡求仁得仁公則奚恨直秘閣贈朝議大夫范公神道碑紹興之初天子痛念宗社阽危之辱久而未報寤寐俊傑以圖事功既得趙忠簡公張忠獻公而相之又俾兩公博求天下之英材以備官使於是忠賢畢集讜言日進國以大競仇敵讋焉其後兩公相繼去位秦檜遂以講和誤國脅主檀權一時諸賢率以異議擯逐二十年間堙阨淪謝其幸及檜死復見收用者什不二三然亦往往遲暮奄忽而不及究其所為矣嗚呼此豈獨士之不幸也哉若故直秘閣范公則其一人已公諱如圭字伯達建州建陽縣人曽大父履謙大父補之皆隠徳不仕父舜舉始登進士第官從事郎以卒其學行志業延平楊文靖公實銘之以公故贈左朝議大夫母胡氏葉氏皆封恭人公生數嵗遭母喪哀毁如成人未冠而孤奉繼母尤謹撫弟妹曲盡恩意有人所難能者從舅氏胡文定公受春秋學鄉舉屢試皆第一對䇿廷中極論人主正心立志之方力詆和議宴安之失言甚壯切張公時為考官讀而異之第以為選首而同列有病其言者抑寘乙科授左從事郎武安節度推官始至帥將斬人公白其誤帥為已署不易也公正色曰節下奈何重易一字而輕數人之命帥矍然從之自是府中事無大小悉以咨焉居數月以憂去時敵騎已陷長沙湘中大亂公﨑嶇避地艱苦百罹而志業益修開口論議皆切當世之務諸公多訪以事而文定亦亟稱之辟江東安撫司書冩機宜文字近臣交薦召試除秘書省正字改宣義郎遷校書郎兼史館校勘㑹秦檜力建和議金使鼎來而朝廷草創無所於館將虚秘書省以處之公亟見趙公曰秘府謨訓所藏平時以館好使猶不可况今日之仇敵而可使其居之乎趙公竦聴即為改館既而使至悖傲所議多不可從者中外憤鬱公與同省十餘人合議拜疏争之既具草而駭懅引郤者衆公乃獨手書抵檜責以曲學倍師忘讎辱國之罪且曰公不喪心不病狂奈何一旦為此若不改圖必且遺臭萬世矣檜以是怒而公所議奏草卒與史官六人者上之未幾金歸河南以嘗我檜方自以為功公曰是亦安能久有顧今日之義則有不可不為者乃因論對言曰兩京之版圖既入則九廟八陵瞻望咫尺今朝修之使未遣何以仰慰神靈下萃民志上泫然曰非卿不聞此言立命遣使於是檜以公不先白已也益怒公亦以先墓久寄荆門中更變亂乃謁告奉柩歸葬故鄉飯蔬帶絰往返數千里既窆即以病告差主管台州崇道觀前後三請杜門讀書不與人事者十餘年尋起通判邵州又通判荆南府事荆南戸口舊數十萬㓂亂荒餘無復人迹朝廷為蠲口賦以安集之百未還一二也而議者希檜意遽謂流民寖復可使稍輸什二而嵗增之吏不能供顧無敢言者至是積逋二十餘萬緡他負亦數十萬戸部日下書責償甚急曰不且有譴時檜晚節悖亂喜怒不可測為戸部者又其姻黨凶焰赫然帥孫汝翼懼欲賦於民以塞責公持不可曰吾寧被譴此不忍為也無何孫去公言於後帥王公師心悉奏蠲之時檜已死公所與同時去國者多召用公亦被命入對上猶記公前議勞問久之公因進言為治以知人為先知人以清心寡慾為本語甚切至又論東南不舉子之俗傷絶人理請舉漢胎養令以全活之抑亦勾踐生聚報呉之意也上善其言時陳文恭公知政事亦欲留公朝著而同列有以檜黨暴起秉事者忌公前輩不肯媚事已乃以直秘閣提舉江西常平茶鹽公事出之公辭行復奏言今日屯田之法嵗之所獲官盡征之而田卒賜衣廪食如故使力穡者絶贏餘之望惰農者無饑餓之憂貪小利失大計謀近效妨逺圖是以歴年久用力多而無成功謂宜舉籍荆淮曠土畫為丘井倣古助法酌今之宜别為科條以令政役則農利修武備飭而復古亦有漸矣章下任事者或笑以為迂闊寢不奏公平時所至詢究利病搜訪人材汲汲如嗜慾至江西論奏數事皆一方久逺之利薦臨川宰陳鼎有古循吏之風聞者亦以為當改利州路提㸃刑獄公事以病復請為祠官以歸時宗藩並建而儲位未定道路竊竊有異言公雖在逺外獨深憂之嘗剟至和嘉祐間名臣章奏凡三十六篇合為一書至是囊封以獻且言曰願陛下深考羣言仰師成憲斷以公道無貳無疑則天下幸甚人或以越職為公危之公不顧也上感其言以語輔臣而歎之曰如圭可謂愛君矣遂留陳公决定大計即日下詔以普安郡王為皇子進封建王因復起公知泉州公辭不得請而行既至舉大體盡下情擇丞史任之郡以大治蠲屬縣負課久不能償者什三四度其力而寛與之期縣感公誠意輸將惟謹財用以紓泉地瀕海通商民物繁夥風俗錯雜而經用常不足人始以公不更治民理財為憂至是乃大服南外宗官寄治郡中挾勢為暴前守不敢詰至奪賈人浮海巨艦其人訴於州於舶司者三年不得直占役禁兵以百數復盜煑海之利亂産鹽法為民病苦公皆以法義正之則大沮恨宻為浸潤以去公遂以中㫖罷公領祠如故邦人涕慕欲相與號訴於朝公禁之不得行遂邵武僦舍以居門巷蕭然士大夫益高仰之逺近學者多從質問經子疑義公亦孜孜引接朝夕不倦屬疾移書政府舊交告訣語不及私惟以中原未復民力未蘇遺賢未用為寄戒諸子强學且毋得用浮屠法治吾喪以紹興庚辰六月十八卒享年五十有九後兩年今天子遂由青宫受内禪即皇帝位父堯子舜海内大安而公已不及見世亦莫知公之嘗有言也近嵗士大夫頗有見紹興日歴及陳公手記者然後乃知公之忠精為不可及公為人篤厚易直不飾邊幅忠孝誠實得之於天其學根於經術不為無用之文有集十卷皆書疏議論之語藏於家所議屯田嘗别草具其施行之目數千言未及上其後張公摠師江淮奏下公家取其書而張公尋罷亦不果行識者恨之公累官左朝散郎贈朝議大夫娶葉氏封安人後贈恭人公繼母之弟右文殿修撰宗諤女也静淑儉素配公無遺徳後五年卒與公合葬建陽之渭曲村公始嘗欲卜居處也子男三人念祖通直郎知撫州宜黄縣致仕念徳今為朝奉郎江南東路安撫司主管機宜文字念兹早卒女二人通直郎利州路提㸃刑獄折知常從事郎劉玶其壻也始公之葬不及銘既葬諸孤始屬其故賓客魏君掞之狀公行將請文於上饒汪公而刻石以表其隧又未及而汪公薨則公之同時輩流已無復在者矣乃奉其書泣以屬熹熹愚晚出何以及此然惟先人為史官時實常與公連名奏事及罷而歸又與公同日艤舟國門外其相與期於固窮守死之意晚而愈篤先人既没公所以憐熹者亦益厚至於親為講畫反復辨告蓋惟恐其迷昧没溺喪失所守以辱其先人也此意豈可忘哉乃受其書考之而論著其大者如此且系以銘銘曰嗚呼惟公廣博易良不耀其章不劌其方斤斤其容坦坦其行懇懇其言循循其政剛毅勁切以時發之賁育雖强孰能奪之晚殫厥猷遂啓明聖萬世之傳一語而定凡今有慶孰匪公功我銘斯闕以詔無窮朝議大夫致仕贈光禄大夫黄公神道碑宣和之末國家承平百有餘年中外無事乃有二三弄臣竊國大柄建取燕雲以召非常之變有識之士已私憂之而衆莫之覺也捷書日聞官吏相慶獨信徳府司録事邵武黄公有憂色人問其故公蹙然曰太平日久軍旅遽興廪無兼嵗之儲不取於民將何以濟顧今嵗薦饑民死無數况河北天下根本又可重困之邪聞者莫不笑之俄而河北盜賊果蠭起信徳城守屢危金人乘之遂不能支官吏相與匍匐拜降唯恐居後而公獨奮然誓死不屈敵既入城放兵四出有挺刃脅公以降者公顧左右踣之而逸變姓名匿里巷中敵退乃出則先降者皆以抵罪而宣撫使獨竒公節俾行府事公亦撫摩瘡痍期復安堵未幾以内禪轉朝議大夫則以資高不當復屈佐郡而省罷以歸矣靖康元年還次京師遭圍城之變而明年欽宗出幸敵營敵遂以兵威脅城中擁張邦昌而立之一時公卿繇千百數相顧俛首唯唯聴命公獨感憤義不辱身即日移檄致其事而去蓋當是時不約而去此者亦四十人然不數日而公竟以病卒矣二年二月丙子也嗚呼祖宗百年禮義亷恥之化其所以涵養斯人者可謂至深逺矣夫以熙寧以來羣小相師滅理窮欲以逮於兹適已六十年矣士大夫酣豢之餘心志潰爛不可收拾宜其禍變危迫而皆不知以為憂敗衂迎降而皆不知以為恥棄君叛父奉賊稱臣而皆不知以為辱也而猶復有如公等者出於其間是雖人之秉彛不容泯滅然而祖宗所以涵養斯人至深且逺者亦豈不於此而少見遺餘哉公卒時年始六十有三夫人林氏攜挈諸孤奉公之柩﨑嶇兵火亂離之中川陸五年乃能達於故里紹興乙丑之嵗然後始克葬焉而公之子永存寖以材能有聞於世上聞其名召以為尚書郎軍器監出為淮南轉運副使俾修農戰之業以為北向之漸前後贈公至光禄大夫而夫人自公時已封宜人又以子貴屢逢慶恩得賜冠帔累封至始興郡太夫人淳熙乙未八月五日年九十七而薨又以郊恩贈蘄春郡夫人而副使歸自淮南則使人以同郡徐君復之狀來謂新安朱熹曰吾先君之徳如是而葬久未銘且先夫人率履持家克享上夀世鮮及之亦當得附先君遺事以垂後世子其圖之熹受書考之具得光禄大夫蘄春夫人行事本末歎息久之因論其大者如此并記其州里世次閥閲公諱中美字文昭其先自潮入閩居建之浦城徙邵武遂為郡人焉曾大父夢臣大父扃皆有隠行至公父蒙始舉進士後贈中奉大夫中奉娶施氏生公七年而卒後贈令人中奉没時公年甫冠勵志為學而貧不能得書常假於人以讀率一再過而歸之則已成誦而不忘矣中元祐九年進士第調真定府左司理叅軍知邢州平鄉縣皆善其職以守正不阿忤上官罷退久之貧甚不以為意親友强起之乃更調鎮西軍節度推官隣極邊守武將視法令僚屬蔑如也公不為撓事有不可必庭辯之守愧屈焉改宣徳郎知濬州衛縣令縣民有被誣殺人者公察其寃縱之同列有害公者謂公故出死罪守疑之公不恤也會河決敗數郡詔諸令長各䕶丁夫疏鑿隄障縣獨不擾而集以功轉奉議郎除河北都轉運司屬官北京留守辟以為真定府録事是時河北連嵗不登民多相聚為盜而郡守歡燕敖逸如平時公獨憂之毎當集輒辭不與守問其故公對以實守黙然不説於是乃移信徳而遂去以卒焉其為人坦易不事邊幅而與人交必以誠當官不為赫赫之名而於事細㣲無不謹旁郡有疑獄部刺史多奏以屬公往往得其情樂施予不問識否人雖負之不悔有求輒復周之在鎮時府丞陳紹夫死公以俸錢遣其喪女兄寡居迎養三十年始終如一日故人有通貴者招致之謝不往都轉運使吕公頥浩及他使者多知其材欲薦之未果而竟没論者惜之公初娶宛句劉氏贈和議郡夫人蘄春其繼室也延平人贈少師積之女夫人渾厚静専歸黄公甚貧處之自若晚雖豐泰亦未嘗改其度也事公之女兄如姑公之没而歸其喪教其子務以忠言直節立其志使卒為聞人以大其家嵗幾滿百而神明不耗起居不衰又似有道者家人百口撫之一以慈愛而教告勉飭隨之未嘗見其有嚴厲之色而中外整整莫敢越軌度鄉黨傳以為法公葬邵武縣仁澤鄉寳隆山之原夫人葬永城鄉黄溪保銅青山下相距蓋十里子男五人曰端愿端平皆有俊才丱角已與薦送而皆早卒次端方亦卒次永存今為朝議大夫主管武夷山沖佑觀次永年右儒林郎知静江府理定縣亦先卒女五人其壻宣徳郎朱康年保義郎朱郁修職郎趙舜臣通直郎杜鐸進士李先之也孫男十人龜朋儒林郎格鉞南卿範槱勲夏欽鈞皆未仕而格鉞欽亡矣孫女六人其壻周敦書李厖李徽將仕郎呉時萬上官珪上官揚曾孫十七人大正大時大椿大全大猷大學大昌大淵大闕大聲大韶大受大嚴大任大用餘未名女十四人其壻任斗南林杞李价餘尚幼𤣥孫男六人公震公升公顯公回公煥公章嗚呼是亦盛矣黄氏之昌阜於世也其可量哉銘曰暨暨黄公逢時之危跡隨衆兆思屬𦕈㣲之死弗汙以全其歸温温夫人克相其夫又詔其子以成厥家夀考尊榮百歳而徂寳隆之阿黄溪之里東西相望兩闕對起子孫盈前曾𤣥滿後尚有寵靈不逺來又旌忠愍節廟碑紹興三年十月己酉信州守臣王自中言臣幸得䝉恩剖符假守支郡視事之日考按圖牒竊見故簽書樞宻院事張忠文公叔夜故知同州事鄭威愍公驤衣冠之藏皆在郡境蓋聞在昔靖康之難敵騎長驅都城危迫四面勤王之兵逡巡前却莫有至者而忠文獨以南道之師千里赴難軍鋒鋭甚毎戰必克乃以廟筭猶豫卒不能有成功而﨑嶇顚沛之餘竭力致死猶以必存宗社為已任事復不就則遂閉口絶食而以身殉焉其後金人分兵西闚關陜所向降下無不如意則又有如威愍者獨以孤城憊卒嬰其乘勝焱鋭之鋒蔽遮三秦以備巡幸金兵大至鄰援四絶知不能守而勇氣彌厲誓必與郡俱為存亡城陷之日遂隕其生而不悔是其見危致命殺身成仁皆足以無愧於人臣之義是以聖朝痛悼褒恤屢加立廟賜名著在祀典蓋非獨以慰忠魂於地下實以昭示萬世臣子忠義之大訓而吏惰失職修奉弗䖍忠文雖得即墓為祠以嚴貌象然而僻在永豐靈鷲深山之中既無以侈上恩厲衆志至於威愍葬祭在馮翊者道既阻絶而其故鄉玉山東郭有墳無廟則行路之人所為愴惻而臣不佞尤竊懼焉謹以相地兩縣之境通涂之側岀留州錢屬吏鳩工度為雙廟擬則巡逺庶幾有以揭䖍妥靈表勸忠義仰稱建炎紹興明詔之遺㫖謂宜假以光靈定其名號䇿書申命以詔無極臣不勝大願敢昧死請事下禮部太常合議條奏咸謂二臣之廟前已賜額宜因其故合而名之制詔禮官議是其以旌忠愍節之廟為額於是尚書符郡主者施行如章而王侯已召還矣始侯既屬役於玉山令芮立言永豐令潘友文又以書來請銘於熹於是兩令課功作治如法復使人來申致侯命熹既樂道二公之事又重侯請乃序而詩之俾俟廟成釁而刻焉王侯字道夫永嘉人自少魁壘有竒節嘗為夀皇聖帝極陳當世之務夀皇悦其言欲大用之而未及也是其為政知所先務固宜如此其詩曰皇皇后帝降𠂻下民君臣之義父子之仁臣之事君䇿名委質報生以死身豈遑恤若魚熊掌取舍之間是孰使之其性則然林林之生孰無此性利害刼之或失其正文武張公投命重圍擁孤弗遂視死如歸侃侃鄭公遥遥孤壘城亡與亡其節亦偉方時大變衆潰如川二公相望砥柱屹然慷慨臨危一心如水實全其天萬世不死招魂作主帝有閔書吏惰不稱神用弗居孰見孰聞孰嗟孰歎孰烝孰嘗孰克用勸守侯請命奠此新宫煌煌巨扁合舊增崇麗牲有碑螭蟠龜負我其銘之過者必下紹熙四年五月戊寅具位新安朱熹撰熹既銘此碑明年祗召造朝道出祠下將往拜焉則貌象未設而他役亦未訖功問其故則曰王侯既去而嵗惡民饑兩令尋亦終更而今玉山宰温國司馬君䢍始將終之也君文正公諸孫其大父忠潔公亦以扈從北狩守節不汙没其身宜其有感於二公之事不待州家之命而卒有以成王侯之志也十月壬子以訖事來告熹以為是亦宜得附書因紀其事使冩刻於碑之左方中奉大夫直煥章閣王公神道碑銘孝宗皇帝嗣服之初慨念陵廟之讎恥未報中原之版圖未復寤寐俊傑以圖事功而羣臣駑下曽莫有以當上意者蓋十餘年乃得金部郎官王公於奏對間意聳然異其言既退又出手札以訪焉俾悉其詞以對公自以孤逺一朝得見人主論天下事便蒙開納而詔墨下詢其勤又如此誠為不世之遇遂極言無所隠上益嘉歎詔兼崇政講官夜直必召反覆咨訪屢移晷刻大臣忌之啓以為淮東帥上不許曰王某諫官御史材也由是忌者愈側目則使人通慇懃更以美官啖公公不為屈彼計無所施而猜懼益深㑹公與本曹尚書争職事乃潜相表裏為巧語以中公使出補郡蓋公自是轉徙於外幾二十年而孝宗念公終始不替數對近臣及公猶有臺諫語比復召還則已迫移御不及對矣以是公訖不得復與朝廷議以没有識為公歎恨而公處之怡然無幾㣲見言面其所以言於上者亦未嘗以一字語人雖親子弟莫得聞焉蓋公之為人於此可見其梗概而君臣之際從古所難可勝歎哉可勝歎哉公世為婺州人八世祖始自義烏之鳯林徙居金華郡城下曾祖某祖某父某皆不仕而父以公貴贈中散大夫母賈氏亦贈令人公諱師愈字與正一字齊賢生七年逢兵亂從父嬰城誓死不暫去其側少長讀書郊外精舍鄉先生潘舍人義榮出游見而異之指菴前竹命賦詩公遜謝一再操筆立成其卒章有願堅松栢操同保嵗寒心之句潘公大嗟賞之命刻其語竹上後復以書論為文養氣之法於潘公時年甫十三而義正詞達意象和雅蔚然有成人之度潘公益竒之召致門下教視均子姪與見龜山先生楊公受易論語之説公又自從東萊吕舍人居仁問知中朝諸老言行之懿二公皆器許之於是益自刻厲大肆其力於六經子史百氏之書手抄口誦晝夜不息俄遭父喪貧不得窆族姻欲使從俗為火葬公號泣不食者累日見者感動合力助之乃克襄事終喪家益窮空教學以養母而自奉甚薄人所難堪其教飭子弟極懇欵與其父兄言亦未嘗不依於孝弟忠信而閭巷田野之間情偽休戚皆習知之其所以動心忍性拂亂増益而進於日新者又非他人所及知也年二十有七乃登進士第調建州崇安尉未行遭母喪哀毁骨立得疾幾殆服除調臨江軍軍學教授江西之俗右文詞而左學行及公之來諸生見其色温氣和言動有法固已深敬服之及開講席則又告以學為君子之説聞者亦動心焉其不率者教詔懇惻亦多自悔改行僧杲有時名竄嶺外得歸所過士大夫争先禮敬至臨江郡守延致俾升高坐説佛法而率其屬往聴焉召公與俱公謝曰彼之説某所不能知然以儒官委講而北面於彼某縱自輕奈辱吾道何守不能强識者韙之再調和州教授軍興官省更授提㸃坑冶司幹辦公事未赴改潭州南嶽廟蓋居閒又七八年生事益落而徳學益進朋舊間有去登要路者視之漠如也尋改京官知潭州長沙縣事其為政一以仁恕安静為本而綱目嚴整守之有常人亦莫得而犯也民以事至廷中降意循撫辨告諄悉事有難處為之反復計慮深逺不以一旦决遣快健為已能而要以民不受弊於數十年之後為已安人始而或笑其迂久而後服其存心之厚愛人之周也里正之役困於科擾故多隠避吏又操先後予奪之柄以導其争而又久不為决使必破産而後已公至罷諸無名之斂人已欣然就役至有當代則又第其丁産之高下停年之近逺先期下之俾自推擇定當役者以告於是民無以役訟至常平使者之臺者臺吏病之反白使者下書詰公為骫法狥情者公不為變楚俗尚巫鬼窮山中有叢祠號影株神愚民千百輩操兵會祭且欲為亂郡議發兵討之公曰此非所以靖亂也退宻召語一二土豪貼以射士出其不意往悉擒其魁桀以送州而散其黨與因撤其廟禁勿復祠民間疾病婚嫁舊皆决於巫史俗以甚弊而官利其多鬻乳香不之禁也公復下令毋以香市於巫其為竒袤以惑衆者必罰無赦俗為少變時汶上劉子駒廣漢張敬夫皆居郡中公以暇日與之遊從容講貫所造益深逺一旦幕府所下文書有不便於民者公以利害争之不得退將引去敬夫疑之曰行而無資奈何公曰吾之來也固已慮此而先辦歸裝矣豈待今日而後計耶敬夫面歎加敬而事亦竟得寢帥守張安國舍人知公深既剡薦之及移荆州又奏取以為屬而公已有召命矣入對首論人主不可自用其聰明以失委任之體又論災異之來當恐懼修省以盡應天之實言甚剴切上皆嘉納公復進言辛巳之變天實授我以中原而我無以待之坐失機㑹今當亟為修徳惠民搜羅俊傑屯據要害之計庶幾異日機㑹復來有以待之因及邊事甚悉上意良悦問卿何以知此公對曰臣在長沙戍將往來臣必詢之故得其實上益喜曰卿為縣乃能留意於此耶除知嚴州先是張敬夫守此邦民安樂之既召還而諸公難其代故特以授公公至一躡其故迹無所更改民又益喜敬夫嘗奏請蠲丁鹽紬絹之税得免一年至是公又奏曰州土窮瘠唯産蠶桑乃不取其紬絹而使折錢已非任土之意而所折又太重是以民尤苦之今未能盡罷而僅免其一年不若但令嵗輸本色猶足以少紓民力也會嵗旱為請於朝得移婺州米五千斛以糶且俾糴於秋成以償公又奏曰郡無良田多水旱有如異日復致饑饉而後奏請俟報則恐有不及事之悔况郡素少米使糴以償亦非計也願詔有司異時嚴州饑則移婺州之粟如今嵗而即以其直歸之則於事為兩得矣詔皆從之公為政大略如長沙時然於權豪則用法無所貸大姓倚勢合黨貪賴民田公數其罪杖之而奪田歸其主凡姦民大駔詐冒侵誣皆下吏案驗悉置之法賞信罰必威令肅然姦凶帖息不敢犯而善良獲安其業邦人畏而愛之至今猶曰安得復如王奉議時也然嚴距行都宻邇士大夫往來無虚日公莊正自持接遇以禮不以形勢有所低昻以故多不悦者因謂公政過嚴相與騰口以撼公會上饒驕兵讙譟臺臣因露章請移公守信以彈壓之蓋名以材選而實非善意也然公威望素孚驕兵聞風畏讋不敢復為故態公至更為申明紀律而壹以寛惠撫之遂以無事嵗復大旱他郡流民就食者衆公先事定計時方仲秋即議發廪以糶或咎其太蚤恐後無以繼公曰此非若所知也救之早則民心安而流移少且各愛其屋廬生業而無與為亂矧吾已致米二十萬斛矣不患其無以繼也即命揭牓賑糶始自今日以盡來年八月而後已時民間米價已騰踴公命官糶之直財少損之使不至大相絶視私價自平則又益下之故無冒濫之姦而私價亦不得起於是人心帖然而富室自知無所牟大利莫復有閉糴者願有以佐縣官者聴之而亦弗之强也公又益以金錢致船粟來者舳艫相衘日糶千斛而猶不乏常平司下書俾移五萬斛於番陽官吏皆言勿予父老亦遮道泣訴公曉之曰彼與若曹皆國家赤子吾食既有餘矣亦何忍視彼之莩死而不之救乎亟具舟輸之番陽賴以濟明年流民欲歸其郡者復予行資以遣之蜀人黄鈞仲秉知名士也聞其事貽書贊美以為富公青社之功不是過以是政譽日聞有㫖召對除金部郎官尋兼崇政殿説書乾道七年也公時年已五十餘矣數召對言事上所賜書若曰比聞奏對頗及治道之具而未詳也尚有可裨政體而宜於今者亟復條奏其眷待之渥一時在廷之士莫得望焉執政曽懐以財利進而前在版曹貸内府緡錢數百萬未有以償一日上以問户部尚書楊倓倓不知所對退取諸郡積逋緡錢七百萬付金部使督之公曰此錢徒有名耳督之未必有得而文移一下所擾者不知幾何人且中外一體若邦計未裕不若歸誠君父以幸寛免豈宜舉此虚籍以罔上而病民耶持其事不下倓大不樂乃宻言於上曰王某以學術自負不肯屑意金穀事而曽懐亦畏公在上左右斥其短又譛公漏洩省中語上始怒詔罷公而臺諫有為公辨明者上復問懐所洩何語懐不能對上悟遂改知饒州待次兩年以例入奏所論縣令宜以三年為任事亦施行當軸或欲留公以自助公遜辭謝去上命更以公為京西路轉運判官公以楊倓方帥湖北兩路事多相關不欲行乃卒赴番陽番陽久廢不理公私凋弊公到郡為振綱維决滯訟政始有經塞弊源革浮蠧財用有紀郡嵗輸米十二萬斛於建康僦載之資取之民者有常數後多為總所移他處而道里或過倍則其費無所取郡常輟他錢以續之以故郡日益貧而綱運亦有愆期折閲之患至是公力請於朝凡綱運皆無得改撥有不獲已即先期告下俾得預辦其費以行朝廷從之綱運遂得無耗失而郡嵗省緡錢六七萬云郡故多盜妖賊酋帥韓政黨衆日盛且為亂公設方略擒捕獲之及將受代淮甸劇賊劉五從惡少五十餘人轉掠入境殺人縱火與官軍遇輒以九人分三隊以迎敵其鋒不可當或被圍則合其衆為圓陳外向潰出所殺傷官軍民兵甚衆公不以當去自弛調兵定計命毋得與賊戰但嚴守津要而日驅逐之晝夜毋得休息一旦乘其憊盡獲之於是羣盜震懾其後累年猶相告戒以番陽為不可犯也就除本路轉運判官時諸郡多賢守而政事之才不能無短長有訟不决而訴於臺者公為更互委屬而隂喻以意要使訟者得伸而聴者無所貶一路稱治會嵗大旱奏請出樁積米百萬斛分子諸郡使為賑糶以安民心人以為便而用事者靳之僅得其什一又奏閣畸零夏稅免甲札牛皮馬穀諸賦詔皆從之饑民賴焉改除荆湖北路轉運判官而湖北之旱甚於江東公究心賑恤奏請規畫曲盡其至遂得寒疾得請主管武夷山沖佑觀除兩浙東路提㸃刑獄公事未行改福建路轉運判官始至承空乏之後入不支出公念一路之寄獨仰漕司而經費猶不給奈緩急何即為校索源流整飭程度節冗費檢吏姦要使嵗用之餘常有倍積而後已行之有常不徐不疾未幾帑藏日充而民不苦疾後之繼者皆莫能及也閩上四州官鬻鹽以給嵗費始皆為民病後屡改法三郡得少蘇而汀之為郡獨以兵㓂之餘田稅隠陷故公私百計皆倚鹽以辦而鹽所自來則官運逺而私販近故官價高而私直平又以距諸使治所皆絶逺故抑配刼假之公行而民無所訴困極無聊數起為亂輒見夷滅議者欲變官鬻為鈔引以捄之公獨言鬻鹽固不能無弊然異時鈔或不售則科買之害必有甚於鬻鹽者今但盡蠲汀州宿負漕司緡錢若干而下其鹽直斤十有五錢其當送漕司以轉餉者若干分𨽻諸司者若干皆丐之以足留州之用則一嵗之間公私所損合為緡錢五萬有竒矣若更精擇守令一意奉行自為悠久之利而法亦不必改也然鈔議既寢而公説亦竟不行汀民之病迄今不得瘳議者蓋兩惜之孝宗猶念公不忘屡欲召用而輔臣以宗屬為嫌竟不果垂滿乃詔公以直秘閣居故官年餘上更用宰相乃除官兩浙西路提㸃刑獄公事促召入對㑹孝宗已厭萬幾乃見今夀康皇帝即奏宜體付託之重勿忘未報之讎并及中外輕重大勢上亦褒歎再三始至即發平江通守姦贓累鉅萬畿甸肅然然公於是時已决退休之志未數月即上章丐閒詔進職一等提舉武夷山沖佑觀公從容還家燕閒自適讀書玩理教誘後進徳望隠然為東州之重明年紹熙改元七月七日以疾終於居第之正寢時年六十有九矣階至中奉大夫職直煥章閣爵金華縣男邑戸三百蓋公為人沈静篤實簡淡和粹得之天資平居莊黙不妄言笑雖在暗室如對大賓其於接物温恭誠信充積有餘而出之謹嚴如有劑量使人可親而不可狎嘗念親在時貧無以養食飲服用終身不忍有所加嵗時祀享輒哀慕如弗勝書史外泊然無所嗜几案間無一長物居官取予問法如何推達賢才不為勢屈其見於施設者大要以聖賢之言為必可行師友之論為必可信雖其中所以自守者凛然有不可奪之操至於稱人之善則又色愉神暢如已有之雖剸繁治劇剔蠧鉏姦隨事制變各有條理然仁厚之意惻怛之誠藹然行於其中則又有非一時長於吏治者所能及晚年更練益精涵養益厚渾然不見圭角病革猶為諸子誦説前賢事業勉勵訓飭語訖而逝其見於死生之際又如此公於文不苟作議奏又多削藁今次其存者若干卷藏於家娶同郡俞氏封令人其父持國倜儻有逺志蚤以文試有司不合遂放意山水間自號溪西老人令人歸公時公甚貧佐公養親盡其力斥奩中􅋔以遺諸妹無少吝後公居閒累年相與攻苦食淡處之甚安使公得以厲志徳業而無内顧之憂者令人之力為多也及公宦達而令人儉素勤力不改平日之舊治家甚整教子甚嚴遇族姻甚厚奉祀享賓甚敬而潔至是哭公過哀後三月亦不起疾子男四人長瀚從事郎新武當軍節度推官次漢迪功郎新臨安府仁和縣尉次洽未仕次潭迪功郎新紹興府㑹稽縣主簿女五人長適進士陳思次適太學上舍生時涇次適進士俞衮次適進士葉紹彭次適將仕郎潘晉孫孫男六人桐集操餘未名明年十月諸孤奉公及令人之柩葬於金華縣白沙鄉石筍原之臺山後三年乃以太府寺丞吕君祖儉之狀來請銘熹與公雖同年進士視公為前輩自公在長沙時始獲從遊固已敬愛其為人及公入閩而聞其議論觀其行事又益熟義不得辭且讀吕君之狀事皆詳實不誣乃删其要而系以銘銘曰天賦之竒又粹以温篤行敏學有本有文誠意所通士服民信入告於廷帝有清問孰媒而合孰隙以離歛其餘功梟凶哺饑白首來歸謂諧曩契時與事違卒不大試白沙之里石筍之原一丘之閟萬世之安石筍之原白沙之里孰詔無窮視此哀誄義靈廟碑慶元元年春二月勅以台州士民所請故直秘閣滕侯之祠為義靈廟州人老穉聞是命下驚喜讙呼奔走迎拜導致祠下酌奠以告大書扁牓金朱煒煌揭於門楣庸侈上賜而其􅂄艾學士大夫葉君聖耦等四十餘人亦會祠廷相與言曰往嵗盜起幇原連陷六州戎毒所加民無噍類而吾台人獨得全其室家仰父俯子傳世不絶以至於今者滕侯力也没而弗祀固無以慰吾民之心祀而弗命又無以彰吾侯之徳今則廟事既修而亦幸蒙上恩列祀典矣顧無金石以著本初其何以昭報事於長久且當日棄城冒賞之人其子孫猶有存者蓋嘗肆為妄説强袝其祖以遂侵誣之計吾州之人亦斥其偽以控於朝而報絀之矣然或久而不傳則未敢必其無後患也乃以書來請篆其事熹以衰朽欲謝不能而復自念往使淛東留台最久固已熟聞兹事而有感於中矣矧以諸君之請之力其何可辭則應曰諾而病未能也乃今太守周府君侯又因鄞縣主簿趙生師䢼踵門以請則為考按台人前進士陳君思恭所為日記及故吏部侍郎陳公公輔諸人之銘序贊頌皆言聞亂之初闔郡震恐太守趙資道郡丞李景淵咸愕眙不知所為謀欲遁去它吏相顧亦無敢出一語者侯方司戸曹事乃獨慨然請任其責有異議者輒面叱之即日移書訣其父母昆弟而閉其妻子於官舍悉召州人諭以利害人人感泣踴躍聴命乃亟下令發夫守險増陴濬隍除器募兵積糧致用分屯列栅為死守計日夜循撫甘苦同之城中之人始有固志而守丞以下則皆已遁去久矣既而山民吕師囊起兵應賊號十餘萬導以攻城前後數四侯皆應機設械立摧破之手弓臨城殪厥渠帥賊遂退走卒全其郛凡所存活以大萬計參伍其説一無異詞是則侯之為烈章章明矣獨稽史籍則見當時實以守城破賊為丞之功進領郡符就加職秩乃與所聞不類而於妄説反有助焉於是更即諸書以求其故然後乃見當時守丞雖遁而侯於所下文書猶必存其位號㓂退圍解亟迎以歸俾上功狀而已不預焉丞蓋熙豐故家諸子又皆貴仕故得獨冒􅂋賞塵䇿書而侯反下從捕盜七人之賞僅改京秩初階移官旁郡以去是則閹尹擅兵賊臣柄國之所為而後來侵誣妄論所由起也一時之謬流惑萬世向非台之文獻有足證者民吏稱思久而不怠則亦何所質正而决其是非哉嗚呼是又可歎也已滕侯名膺字子勤後保南都守陳蔡以抗狂敵乘勝炎鋭之鋒勲績尤盛勸進大元帥於濟州所陳又皆當時天下大計切中機會其於建炎紹興之史法當立傳而熹於是書蓋嘗受詔叅筆削矣是以因書此碑而并覈其真偽如此不唯少塞台人之意亦使後之執筆者有以考焉廟數遷徙今在城西北隅永慶寺東實侯所再築而力戰破賊處台人迎侯繼室趙夫人及諸孫仲宜等使居其旁通判州事呂君祖儉謀為買田以資奉守未就而去談者惜之然以台人之徳侯如此吾知其繼而成之者無難也是嵗八月癸丑朔具官朱熹撰晦庵集卷八十九欽定四庫全書晦庵集卷九十宋朱子撰
