front:
  text: 雜著
  hash: sha256:3fa7dbae5a21deaec57b95f58a1628d3bb444d8dcbeb411f0c55d235d9363c19
body:
  text: 跪坐拜説古人之坐者兩膝著地因反其蹠而坐於其上正如今之胡跪者其為肅拜則又拱兩手而下之至地也其為頓首則又以頭頓于手上也其為稽首則又郤其手而以頭著地亦如今之禮拜者皆因跪而益致其恭也故儀禮曰坐取爵曰坐奠爵禮記曰坐而遷之曰一坐再至曰武坐致右軒左老子曰坐進此道之類凡言坐者皆謂跪也若漢文帝與賈生語不覺膝之前於席管寕坐不箕股榻當膝處皆穿皆其明驗老子云雖有拱璧以先駟馬不如坐進此道葢坐即跪也進猶獻也言以重寳厚禮與人不如跪而告之以此道也今説者乃以為坐禪之意誤矣然記又云授立不跪授坐不立莊子亦云跪坐而進之則跪與坐又似有小異處疑跪有危義故兩膝著地伸腰及股而勢危者為跪兩膝著地以凥著蹠而稍安者為坐也又詩云不遑啓居而其傳以啓為跪爾雅以妥為安而跪以為安定之坐夫以啓對居而訓啓為跪則居之為坐可見以妥為安定之坐則跪之為危坐亦可知葢兩事相似但一危一安為小不同耳至於拜之為禮亦無所考但杜子春説太祝九拜處解竒拜云拜時先屈一膝今之雅拜也夫特以先屈一膝為雅拜則他拜皆當齊屈兩膝如今之禮拜明矣凡此三事書傳皆無明文亦不知其自何時而變而今人有不察也頃年屬錢子言作白鹿禮殿欲據開元禮不為塑像而臨祭設位子言不以為然而必以塑像為問予即畧為考禮如前之云又記少時聞之先人云甞至鄭州謁列子祠見其塑像席地而坐則亦并以告之以為必不得已而為塑像則當放此以免於蘇子俯伏匍匐之譏子言又不謂然㑹予亦辭江東之節遂不能强然至今以為恨也東坡文集私試䇿問云古者坐於席故籩豆之長短簠簋之高下適與人均今土木之像既已巍然於上而列器皿於地使鬼神不享則不可知若其享之則是俯伏匍匐而就地其後乃聞成都府學有漢時禮殿諸像皆席地而跪坐文翁猶是當時琢石所為尤足据信不知蘇公蜀人何以不見而云爾也及楊方子直入蜀帥幕府因使訪焉則果如所聞者且為寫放文翁石象為小土偶以來而塑手不精或者猶意其或為加趺也去年又以屬蜀漕楊王休子羙今乃并得先聖先師二像木刻精好視其坐後兩蹠隠然見於帷裳之下然後審其所以坐者果為跪而亡疑也惜乎白鹿塑像之時不得此證以曉子言使東南學者未得復見古人之像以革千載之繆為之喟然太息姑記本末寫寄洞學諸生使書而掲之廟門之左以俟來者考焉周禮太祝九􅉔辯䟽云此九拜之中四種是正拜五者逐事主名還依四種正拜而為之也又云稽首頓首空首此三者正拜也肅拜婦人之正拜也其餘五者附此四種振動吉拜㓙拜褒拜附稽首竒拜附空首又云空首一拜其餘皆再拜肅拜或再闕故郤至三肅使者一曰稽首注曰拜頭至地也疏曰先以兩手拱至地及頭至手又引頭至地多時也稽首稽留之字也稽首拜中最重臣拜君之拜哀十七年公㑹齊候盟於蒙孟武伯相齊侯稽首公則拜齊人怒武伯曰非天子寡君無所稽首襄三年公如晉孟獻子相公稽首知武子曰天子在君辱稽首寡君懼矣郊特牲曰大夫之臣不稽首非尊家臣以避君也是諸侯于天子大夫于諸侯皆當稽首二曰頓首注曰拜頭叩地也疏曰先以兩手拱至地乃頭至手而又引頭即舉也頭叩地謂若以首叩物然此平敵自相拜家臣於大夫及凡自敵者皆當從頓首之拜也記疏曰頭叩地不停留地也又曰諸侯相拜則然三曰空首注曰拜頭至手所謂拜手也疏曰先以兩手拱至地乃頭至手也以其頭不至地故名空首君答臣下拜也其有敬事亦稽首洛誥曰拜手稽首是也又曰稽首頓首空首此三者相因而為之空首而引頭頓地即舉故名頓首而引頭至地稽留多時故名稽首此三者之正拜也四曰振動注曰戰栗變動之拜書曰王動色變記疏曰謂有敬懼故為振動疏曰案中候膺云季秋七月甲子赤雀啣丹入鄷王再拜稽首受案今文太誓得火烏之瑞使以周公書報於王王動色變雖不見拜文與文王受赤雀之命為稽首拜也五曰吉􅉔六曰㓙􅉔注曰吉拜拜而後稽顙謂齊衰不杖以下者言吉者此殷之㓙拜周以其拜與頓首相近故謂之吉拜云㓙拜稽顙而後拜謂三年服者疏曰拜而後稽顙謂先作頓首後作稽顙稽顙還是頓首但觸地無容則謂之稽顙記曰拜而後稽顙頽乎其順也稽顙而後拜頎乎其至也疏曰拜是為親痛深貌惻隠之至也記又曰晉獻公薨秦穆公使人弔公子重耳勸其反國重耳稽顙而不拜哭而起穆公曰稽顙而不拜則未為後也故不成拜哭而起則愛父也疏曰若為後則當拜謝其㤙今不受其勸故不拜謝所以稽顙者自為父喪哀號也凡喪禮先稽顙而後拜乃成直稽顙而不拜故云不成拜也今既聞父死勸其反國之義哀慟而起若欲攀轅然故云則愛父也七曰竒􅉔八曰褒􅉔注曰杜子春云竒讀為竒偶之竒鄭大夫云竒拜謂一拜答臣下拜褒拜再拜神與尸杜子春書又曰竒拜先屈一膝今雅拜是疏云後鄭不從此説九曰肅􅉔注曰肅拜但俯下手今時撎是也介者不拜故曰為事故敢肅使者疏曰肅拜者拜中最輕惟軍中有此肅拜婦人亦以肅拜為正又曰儀禮賔撎入門推手曰揖引手曰撎記䟽曰少儀妨人告事雖有君賜肅拜壺説今詳經文不言壺之圍徑而但言其高之度容之量以為相求互見之功且經言其所容止於斗有五升而注乃以二斗釋之則經之所言者圓壺之實數而注之所言乃借以方體言之而筭法所謂虚加之數也葢壺為圓形斗五升為竒數皆繁曲而難計故筭家之術必先借方形虚加整數以定其法後復四分去一以得圓形之實此鄭氏所以舍斗五升之經文而直以二斗為説也然其言知借而不知還知加而不知減乃於下文遂并方體之所虚加以為實數又皆必取全寸不計分釐定為圓壺腹徑九寸而圍二尺七寸則為失之䟽家雖知其失而不知其所以失顧乃依違其間訖無定説是以讀者不能無疑今以筭法求之凡此定二斗之量者計其積實當為三百二十四寸而以其高五寸者分之則每高一寸為廣六十四寸八分此六十四寸者自為正方又取其八分者割裂而加於正方之外則四面各得二釐五毫之數乃復合此六十四寸八分者五為一方壺則其高五寸其廣八寸五釐而外方三尺二寸二分中受二斗如注之初説矣然此方形者筭術所借以為虚加之數爾若欲得圓壺之實數則當就此方形規而圓之去其四角虚加之數四分之一使六十四寸八分者但為四十八寸六分三百二十四寸者但為二百四十三寸則壺腹之高雖不減於五寸其廣雖不減於八寸五釐而其外圍則僅為二尺四寸一分五釐其中所受僅為斗有五升如經之云無不諧㑹矣深衣制度并圖裁用細白布度用指尺中指中節為寸衣二幅不裁其長過脇下屬於裳用布二幅中屈而下垂之如今之直領衫但不裁破掖下每幅之下屬裳三幅裳交解十二幅上屬於衣其長及踝用布六幅每幅裁為二幅一頭廣一頭狹狹頭當廣頭之半以狹頭向上而聫其縫以屬屬衣每三幅屬衣一幅圓袂用布二幅各中屈之如衣之長屬於衣之左右而縫合其下以為袂其本之廣如衣之長而漸圓殺之以至袂口則其徑一尺二寸方領兩襟相掩衽在掖下則兩領之會自方曲裾用布一幅如裳之長交解裁之疊兩廣頭並令向上布邉不動但稍裁其内旁大半之下令漸如魚腹末如鳥喙内向而緝之相㳫綴於裳上之右旁以掩裳際右幅在下左幅在上布邉在外裁處在内衣裳皆緣緣用黑繒具父母以青大父母以繢領表裏各二寸裳下及邉表裏各一寸半皆就布緣袂口表裏亦寸一半布外接出大帶帶用白繒廣四寸夾縫之其長圍要而結於前再繚之為兩耳及垂其餘為紳下與裳齊以繒縁其紳之兩旁及下表裏各半寸如縁之色復以五縁絛廣二分約其相結處長與紳齊緇冠糊紙為之武高寸許前後三寸左右四寸上為五梁辟積左縫廣四寸長八寸跨頂前後著於武外反屈其兩端各半寸内向黒漆之武之兩旁半寸之上竅以受笄用齒骨凡白物幅巾用黑繒六尺許刺一邉作巾額當中作㡇兩旁三寸許各綴一帶廣一寸許長二尺許循㡇中上反屈之當幅之中斜縫向後去其一角而復反之使巾頂正圓乃以額㡇當頭前向後圍裹而繫其帶於緇後餘者垂之黑履白絇繶純綦殿屋廈屋説殿屋五間前皆為堂後為房室中間之前為兩楹間後為室東間之前為東楹之東又少東為阼階上少北為東序後為東房西間之前為西楹之西又少西為賔階上少北為西序後為西房序即墻也設位在東西序者負墻而立也其南為序端東序之東西序之西為夾亦謂之廂又説文云廂廊也廊東西序也此亦可見但疑序下脱一外字其前為東西堂其後為東西夾室夾外之廣為側階房後為北階此其地之盤也其棟則中三間為一棟横指東西至兩序之上而盡遂自此處分為四棟邪指四隅上接横棟下與霤齊此其上棟之制所謂四阿也其宇則横棟前後即為南北兩下横棟盡外即為東西兩下四棟之旁即各連所向而下四面榱桷覆堂廉出階外者謂之廡説文云廡堂下周屋也其屋盡水下處謂之霤此其下宇之制也廈屋則前五間後四間無西房堂中三間之後只分為兩間東房西室其餘並如殿屋之制但五間皆為横棟棟之前後皆為兩下之宇横棟盡外有版下垂謂之搏風搏風之下亦為兩廡接連南北以覆側階但其廡亦不出搏風之外耳儀禮疏云卿大夫為夏屋其室兩下而四周之殿屋四阿連下為廡四面之簷其水皆多故其簷皆得以霤為名廈屋南北兩下之廡與殿屋同故其簷亦謂之霤東西兩廡則但為腰簷不連棟下又不出搏風之外雖或有水亦不能多故但謂之榮謂之翼而不得以霤名也榮翼乃接簷之名疏乃直指搏風誤矣明堂説論明堂之制者非一熹竊意當有九室如井田之制東之中為青陽太廟東之南為青陽右箇東之北為青陽左箇南之中為明堂太廟南之東即東之南為明堂左箇南之西即西之南為明堂右箇西之中為總章太廟西之南即南之西為總章左箇西之北即北之西為總章右箇北之中為𤣥堂太廟北之東即東之北為𤣥堂右箇北之西即西之北為𤣥堂左箇中是為太廟太室凡四方之太廟異方所其左箇右箇則青陽之右箇乃明堂之左箇明堂之右箇乃總章之左箇也總章之右箇乃𤣥堂之左箇𤣥堂之右箇乃青陽之左箇也但隨其時之方位開門耳太廟太室則每季十八日天子居焉古人制事多用井田遺意此恐是也儀禮釋宫宫室之名制不盡見於經其可考者宫必南鄊廟在寢東皆有堂有門其外有大門周禮建國之神位右社稷左宗廟宫南鄉而廟居左則廟在寢東也寢廟之大門一曰外門其北葢直寢故士䘮禮注以寢門為内門中門凡既入外門其向廟也皆曲而東行又曲而北案士冠禮賔立于外門之外主人迎賔入每曲揖至于廟門注曰入外門將東曲揖直廟將北曲又揖是也又按聘禮公迎賔于大門内每門每曲揖及廟門賈氏曰諸侯五廟太祖之廟居中二昭居東二穆居西每廟之前兩旁有隔墻墻皆有閤門諸侯受聘于太祖廟太祖廟以西隔墻有三大門東行至太祖廟凡經三閤門故曰每門也大夫三廟其墻與門亦然故賔問闕大夫迎賔入亦每門每曲揖乃及廟門其説嘗考大夫士之門惟外門内門而已諸侯則三天子則五庠序則惟有一門鄉飲酒射禮主人迎賔于門外入門即三揖至階是也堂之屋南北五架中脊之架曰棟次棟之架曰楣鄉射禮記曰序則物當棟堂則物當楣注曰是制五架之屋也正中曰棟次曰楣前曰􅔑賈氏曰中脊為棟棟前一架為楣楣前接簷為􅔑今見於經者惟棟與楣而已棟一名阿案士昏禮賔升當阿致命注曰阿棟也又曰入堂深示親親賈氏曰凡賔升皆當楣此深入當棟故云入堂深也又按聘禮賔升亦當楣賈氏曰凡堂皆五架則五架之屋通乎上下而其廣狹隆殺則異爾後楣以北為室與房後楣之下以南為堂以北為室與房室與房東西相連為之案少牢饋食禮主人室中獻祝祝拜于席上坐受注曰室中廹狹賈氏曰棟南兩架北亦兩架棟北楣下為室南壁而開户以兩架之間為室故云廹狹也昏禮賔當阿致命鄭云入堂深明不入室是棟北乃有室也序之制則無室案鄉射禮記曰序則物當棟堂則物當楣注曰序無室可以深也又禮席賔南面注曰不言于户牖之間者此射于序賈氏曰無室則無户牖故也釋宫曰無室曰榭即序也人君左右房大夫士東房西室而已聘禮記若君不見使大夫受聘升受負右房而立大射儀薦脯醢由左房是人君之房有左右也公食大夫禮記筵出自東房注曰天子諸侯左右房賈氏曰言左對右言東對西大夫士惟東房西室故直云房而已然按聘禮賔舘于大夫士君使卿還玉于館也賔亦退負右房則大夫亦有右房矣又鄉飲酒禮記薦出自左房少牢饋食禮主婦薦自東房亦有左房東房之稱當考室中西南隅謂之奥邢昺曰室户不當中而近東西南隅最為深隠故謂之奥而祭祀及尊者常處焉東南隅謂之窔鳥弔反郭氏曰窔亦隠闇西北隅謂之屋漏詩所謂尚不愧于屋漏是也曽子問謂之當室之白孫炎曰當室日光所漏入也鄭謂當室之白西北隅得户明者經止曰西北隅室南其户户東而牖西説文曰户半門也牖穿壁以木為交忩也月令正義曰古者窟居開其上取明雨因霤之是以後人户室為中霤開牖者象中霤之取明也牖一名鄉其扇在内案士虞禮祝闔牖户如食間啓户啓牖鄉注曰牖先闔後啓扇在内也鄉牖一名是也户牖之間謂之依郭氏曰忩東户西也覲禮斧扆亦以設之于此而得扆名士昏禮注曰户西者尊處以尊者及賔客位于此故又曰客位户東曰房户之間士冠禮注曰房西室户東也寢廟以室為主故室户専得户名凡言户者皆室户若房户則兼言房以别之大夫士房户之間於堂為東西之中按詩正義曰鄉飲酒義云尊于房户之間賔主共之由無西房故以房與室户之間為中也又鄉飲酒禮席賔于房牖間而義曰坐賔于西北則大夫士之户牖間在西而房内間為正中明矣人君之制經無明證按釋宫曰兩階間謂之鄉郭氏曰人君南鄉當階間則人君之室正中其西為右房而户牖間設扆處正中矣又按詩斯干曰築室百堵西南其户箋曰天子之寢左右房異於一房者之室户也正義曰大户惟有一東房故室户偏東與房相近天子諸侯既有右房則室當在其中其户正中北一房之室户為西當考房户之西曰房外士昏禮記母南面于房外女出于母左士冠禮尊于房户之間若庶子則冠于房外南面注曰謂尊東也是房户之西得房外之名也房之户於房南壁亦當近東案士昏禮注曰北堂在房中半以北南北直室東隅東西直房户與隅間隅間者葢房東西之中兩隅間也房中之東其南為夾洗直房户而在房東西之中則房户在房南壁之東偏可見矣房中半以北曰北堂有北階士昏禮記婦洗在北堂直室東隅注曰北堂房中半以北賈氏曰房與室相連為之房無北壁故得北堂之名按特牲饋食禮記尊兩壺於房中西墉下南上内賔立于其北東面南上宗婦北堂北上内賔在宗婦之北乃云北堂又婦洗在北堂而直室東隅是房中半以北為北堂也婦洗在北堂而士虞禮主婦洗足爵於房中則北堂亦通名房中矣大射儀工人士與梓人升下自北階注曰位在北堂下則北階者北堂之階也堂之上東西有楹楹柱也古之築室者以垣墉為基而屋其上惟堂上有兩楹而已楹之設葢於前楣之下按鄉射禮曰射自楹間注曰謂射於庠也又曰序則物當棟堂則物當楣物畫地為物射時所立處也堂謂庠之堂也又曰豫則鉤楹内堂則由楹外當物北面揖豫即序也鈎楹繞楹也物當棟而升射者必鈎楹内乃北面就物則棟在楹之内矣物當楣而升射者由楹外北面就物又鄭氏以為物在楹間則楹在楣之下也又按釋宫曰梁上楹謂之棁棁侏儒柱也梁楣也侏儒柱在梁之上則楹在楣之下又可知矣堂東西之中曰兩楹間公食大夫禮致豆實陳于楹外簠簋陳於楹内兩楹問言楹内外矣又言兩楹間知凡言兩楹間者不必與楹相當謂堂東西之中爾南北之中曰中堂聘禮受玉於中堂與東楹之間注曰中堂南北之中也入堂深尊賔事也賈氏曰後楣以南為堂堂凡四架前楣與棟之間為南北堂之中公當楣拜訖更前北侵半架受玉故曰入堂深也案東楹之間侵近東楹非堂東西之中而曰中堂則中堂為南北之中明矣又按士䘮禮注曰中以南謂之堂賈氏曰堂上行事非専一所若近户即言户東户西近房則言房外房東近楹即言東楹西楹近序即言東序西序近階即言東階西階其堂半以南無所繼屬者即以堂言之祝淅米于堂是也堂之東西墻謂之序郭氏曰所以序别内外序之外謂之夾室公食大夫禮大夫立于東夾南注曰東於堂賈氏曰序以西為正堂序東有夾室今立于堂下當東夾是東於堂也又按公食禮宰東夾北西面賈氏曰位在北堂之南與夾室相當特牲饋食禮豆籩鉶在東房注曰東房房中之東當夾北則東夾之北通為房中矣室中之西與右房之制無明文東夾之北為房中則西夾之北盖通為室中其有兩房者則西夾之北通為右房也歟夾室之前曰廂亦曰東堂西堂覲禮記注曰東廂東夾之前相翔待事之處特牲饋食禮注曰西堂西夾之前近南爾賈氏曰即西廂也釋宫曰室有東西廂曰廟郭氏曰夾室前堂是東廂亦曰東堂西廂亦曰西堂也釋宫又曰無東西廂有室曰寢按書顧命疏寢有東夾西夾士喪禮死于適寢主人降襲經于序東注曰序東東夾前則正寢亦有夾與廂矣釋宫所謂無東西廂者或者謂廟之寢也歟凡無夾室者則序以外通謂之東堂西堂按鄉射禮主人之弓矢在東序東大射儀君之弓矢適東堂大射之東堂即鄉射之東序東也此東西堂堂各有階案雜記夫人奔喪升自側階注曰側階旁階奔喪曰婦人奔喪升自東階注曰東階東面階東面階則東堂之階其西堂有西面階也東堂下西堂下曰堂東堂西大射儀賔之弓矢止于西堂下其將射也賔降取弓矢于堂西堂西即西堂下也特牲饋食禮主婦視饎㸑于西堂下記曰饎㸑在西壁則自西壁以東皆謂之西堂下矣又按大射儀執冪者升自西階注曰羞膳者從而東由堂東升自北階立于房中則東堂下可以達北堂也堂角有坫士冠禮注曰坫在堂角賈氏釋士䘮禮曰堂隅有坫以土為之或謂堂隅為坫也堂之側邉曰廉堂鄉飲酒禮設席于堂廉注曰側邊曰亷䘮大記正義曰堂廉堂基南畔廉稜之上也又按鄉射禮衆弓倚于堂西矢在其上注曰上堂西廉則堂之四周皆有廉也升堂兩階其東階曰阼階士冠禮注曰阼酢也東階所以答酢賔客也每階有東西兩廉聘禮饔鼎設于西階前當内廉此則西階之東廉以其近堂之中故曰内廉也士之階三等按士冠禮降三等受爵弁注曰下至也賈氏曰匠人云天子之堂九尺賈馬以為階九等諸侯堂宜七尺階七等大夫宜五尺階五等士宜三尺故階三等也兩階各在楹之外而近序按鄉射禮升階者升自西階繞楹而東燕禮勝爵者二人升自西階序進東楹之西酌散交于楹北注曰楹北西楹之北則西階在西楹之西矣士冠禮冠于東序之筵而記曰冠于阼䘮禮攅置于西序而檀弓曰周人殯于西階之上故知階近序也堂下至門謂之庭三分庭一在此設碑聘禮注曰宫必有碑所以識日景知隂陽也賈氏釋士昏禮曰碑在堂下三分庭一在北按聘禮歸饔餼醯醢夾碑来設於中庭注曰庭實固當中庭言中庭者南北之中也列當醯醢南列米在醯醢南而當庭南北之中則三分庭一在北可見矣聘禮注又曰設碑近如堂深堂深謂從堂廉北至房室之壁三分庭一在北設碑而碑如堂深則庭葢三堂之深也又按鄉射之侯去堂三十丈大射之侯去堂五十四丈則庭之深可知而其降殺之度從可推矣堂塗謂之陳郭氏曰堂下至門徑也其北屬階其南接門内霤按凡入門之後皆三揖至階昏禮注曰三揖者至内霤將曲揖既曲北面揖當碑揖賈氏曰至内霤將曲者至門内霤主人將東賔將西賔主相背時也既曲北面者賔主各至堂塗北行向堂時也至内霤而東西行趨堂塗則堂塗接於霤矣既至堂塗北面至階而不復有曲則堂塗直階矣又按聘禮饔鼎設於西階前陪鼎當内廉注曰辟堂塗也則堂塗在階廉之内矣鄉飲酒禮注三揖曰將進揖當陳揖當碑揖陳即堂塗也中門屋為門門之中有闑士冠禮曰席于門中闑西閾外注曰闑橛也玉藻正義曰闑門之中央所竪短木也釋宫曰樴在地者謂之臬郭氏曰即門橛也然則闑者門中所竪短木在地者也其東曰闑東其西曰闑西門限謂之閾釋宫曰秩謂之閾郭氏曰閾門限邢昺曰謂門下横木為内外之限也其門之兩旁木則謂之棖棖闑之間則謂之中門見禮記闔謂之扉邢昺曰闔門扉也其東扉曰左扉門之廣狹案士昏禮曰納徴儷皮記曰執皮左首隨入注曰隨入為門中阨狹賈氏曰皮皆横執之門中阨狹故隨入也匠人云廟門容大扄七箇大扄牛鼎之扄長三尺七箇二丈一尺彼天子廟門此士之廟門降殺甚小故云阨狹也推此則自士以上宫室之制雖同而其廣狹則異矣夾門之堂謂之塾釋宫曰門側之堂謂之塾郭氏曰夾門堂也門之内外其東西皆有塾一門而塾四其外塾南鄉按士虞禮陳鼎門外之右匕爼在西塾之西注曰塾有西者是室南鄉又按士冠禮擯者負東塾注曰東塾門内東堂負之北面則内塾北向也凡門之内兩塾之間謂之宁按聘禮賔問卿大夫迎于外門外及廟門大夫揖入擯者請命賔入三揖並行注曰大夫揖入者省内事也既有俟于宁也凡至門内霤為三揖之始上言揖入下言三揖並行則俟于霤南門内兩塾間可知矣李廵曰宁正門内兩塾間義與鄭同謂之宁者以人君門外有正朝視朝則於此宁立故耳周人門與堂修廣之數不著於經案匠人云夏后氏世室堂修二七堂四修一堂修謂堂南北之深其廣則益以四分修之一也門堂三之二室三之一門堂通謂門與塾其廣與修取數於堂得其三之二室三之一者兩室與門各居一分也以夏后氏之制推之則周人之門殺於堂之數亦可得而知矣門之内外東方曰門東西方曰門西特牲饋食禮注曰凡鄉内以入為左右鄉外以出為左右士冠禮注又曰出以東為左入以東為右以入為左右則門西為左門東為右鄉飲酒禮賔入門左燕禮卿大夫皆入門右是也以出為左右則門東為左門西為右士冠禮主人迎賔出門左西面士虞禮側享于廟門之右是也闑東曰臬右亦自入者言之也天子諸侯門外之制其見於經者天子有屏諸侯有朝案覲禮侯氏入門右告聴事出自屏南適門西注曰天子外屏釋宫曰屏謂之樹郭氏曰小墻當門中曲禮正義曰天子外屏屏在路門之外諸侯内屏屏在路門之内此侯氏出門而隠於屏則天子外屏明矣釋宫又曰門屏之間謂之宁謂宁在門之内屏之外此屏據諸侯内屏而言也諸侯路寢門外則有正朝大門外則有外朝按聘禮夕幣于寢門外宰入告具于君君朝服出門左南鄉注曰寢門外朝也入告入路門而告賈氏曰此路門外正朝之處也是正朝在寢門外也聘禮又曰賔死介復命柩止于門外若介死惟上介造于朝注曰門外大門外也必以柩造朝達其中心又賔拜饔餼于朝注曰拜于大門外賈氏曰大門外諸侯之外朝也賔拜於朝無入門之文則諸侯外朝在大門外明矣是外朝在大門外也諸侯三朝其燕朝在寢燕禮是也正朝與外朝之制度不見於經葢不可得而考矣寢之後有下室士喪禮記士處適寢又曰朔月若薦新則不饋于下室注曰下室如今之内堂正寢聴事賈氏曰下室燕寢也然則士之下室於天子諸侯則為小寢也春秋傳曰子太叔之廟在道南其寢在廟北其寢廟之寢也廟寢在廟之北則下室在適寢之後可知矣又按喪服傳曰有東宫有西宫有南宫有北宫異宫而同財内則曰由命士以上父子皆異宫賈氏釋士昏禮曰異宫者别有寢若不命之士父子雖大院同居其中亦隔别各有門户則下室之外又有異宫也自門以北皆周以墻聘禮釋幣于行注曰喪禮有毁宗躐行出于大門則行神之位在廟門外西方檀弓正義曰毁宗躐行毁廟門西邉墻以出柩也士䘮禮為垼于西墻下注曰西墻中庭之西特牲饋食禮主婦視饎㸑于西堂下記曰饎㸑在西壁注曰西壁堂之西墻下案門之西有墻則墻屬於門矣西墻在中庭之西則墻周乎庭矣西壁在西墻下則墻周乎堂矣墻者墉壁之總名室中謂之墉昏禮尊于室中北墉下是也房與夾亦謂之墉冠禮陳服于房中西墉下聘禮西夾六豆設于西墉下是也堂上謂之序室房與夾謂之墉堂下謂之壁謂之墻其實一也隨所在而異其名爾堂下之壁闈門在焉案士䘮禮冠者降適東壁見于母注曰適東壁者出闈門也時母在闈門之外婦人入廟由闈門士虞禮賔出主人送主婦亦拜賔注曰女賔也不言出不言送拜之於闈門之内闈門如今東西掖門釋宫曰宫中之門謂之闈郭氏曰謂相通小門也是正門之外又有闈門而在旁壁也人君之堂屋為四注大夫士則南北兩下而已士冠禮設洗直于東榮注曰榮屋翼也周制自卿大夫以下其室為夏屋燕禮設洗當東霤注曰人君為殿屋也案考工記殿四阿重屋注曰四阿若今之四注屋殷人始為四注屋則夏后氏之屋南北兩下而已周制天子諸侯得為殿屋四注卿大夫以下但為夏屋兩下四注則南北東西皆有霤兩下則惟南北有霤而東西有榮是以燕禮言東霤而大夫士禮則言東榮也霤者説文曰屋水流也徐鍇曰屋檐滴處榮者説文曰屋梠之兩頭起者為榮又曰屋齊謂之檐楚謂之梠郭璞注上林賦曰南榮屋南檐也義與説文同然則檐之東西起者曰榮謂之榮者為屋之榮飾謂之屋翼者言其軒張如翬斯飛耳士䘮禮升自前東榮喪大記降自西北榮是屋有四榮也門之屋雖人君亦兩下為之燕禮之門内霤則門屋之北霤也凡屋之檐亦謂之宇案士䘮禮為銘置于宇西階上注曰宇梠也説文曰宇屋邉也釋宫曰檐謂之樀郭氏曰屋梠邢昺曰屋檐一名樀一名梠又名宇皆屋之四垂也宇西階上者西階之上上當宇也階之上當宇則堂廉與坫亦當宇矣特牲饋食禮主婦視饎㸑于堂下注曰南齊于坫其記又注曰南北直屋梠是也階上當宇故階當霤鄉射禮記磬階間縮霤是也霤以東西為從故曰縮霤此霤謂堂之南霤也此其著於經而可考者也禮經雖亡闕然於覲見天子之禮於燕射聘食見諸侯之禮餘則見大夫士之禮宫室之名制不見其有異特其廣狹降殺不可考耳案書顧命成王崩於路寢其陳位也有設斧扆牖間南鄉則户牖問也西序東嚮東序西嚮則東西序也西夾南嚮則夾室也東房西房則左右房也賔階面阼階面則兩階前也左塾之前右塾之前則門内之塾也畢門之内則路寢門也兩階戺則堂廉也東堂西堂則東西廂也東垂西垂則東西堂之宇階上也側階則北階也又曰諸侯出廟門俟則與士䘮禮殯宫曰廟合也然則鄭氏謂天子廟及路寢如明堂制者葢未必然明堂位與考工記所記明堂之制度者非出於舊典亦未敢必信也又案書多士傳曰天子之堂廣九雉三分其廣以二為内五分内以一為髙東房西房北堂各三雉公侯七雉三分廣以二為内五分内以一為高東房西房北堂各一雉伯子男五雉三分廣以二為内五分内以一為高東房西房北堂各一雉士三雉三分廣以二為内五分内以一為高有室無房堂注曰廣榮間相去也雉長三丈内堂東西序之内也高穹高也此傳説房堂及室與經亦不合然必有所據姑存之以備參考答社壇説所喻社壇别紙奉報此是見行禮制更可計㑹法司檢淳熙間所攽册子為佳此事在州郡為至重今人皆不以為意太守乃能及此深可為法又能擇賢者而屬之尤見其不茍也州縣社壇方二丈五尺高三尺四出陛稷壝如社壇之制社以石為主其形如鐘長二尺五寸方一寸剡其上培其下半四門同一壝二十五歩壇餙各隨方色上葢以黄土瘞坎於壇之北壬地南出陛方深取足容物右出政和五禮新儀第二十一卷淳熙中曽有印本攽行州郡法司必有之可更檢看又以行事儀考之二壇東西相並坐南向北社壇石主在壇上之南方北門壝外空地須令稍寛可容獻官席位空地之北乃作齋㕔以備風雨設獻官位獻官南向行事州縣社壇方二丈五尺四歩今每歩六分之一凡言方者皆徑也此言方二丈五尺者從東至西二丈五尺從南至北二丈五尺也後叚壝内二十五歩其説亦然高三尺既言壇高三尺又言壇分三級則是以一尺為一級也四出陛此陛之級即壇之級也但於四面陛之兩傍各以石砌作慢道隔斷使其中為陛級外為壇級可也社主舊法惟社有主而稷無主不曉其意恐不可以已意增添其言壇上之南方非壇之中也葢神位坐南向北而祭器設於神位之北故此石主當壇上南陛之上更宜詳考畫作圖子便可見若在壇中央即無設祭處矣四門同一壝二十五歩壝方二十五歩者亦是徑二十五歩謂從東至西二十五歩從南至北二十五歩以丈計之六尺為歩則為十五丈也四角築土為壝高三尺許使壇上與齋㕔相望得見壝上不用瓦葢但以磚兩面砌之使其走水尤為堅固四門當中開門古法不言闊狹恐須闊一丈餘庶幾行禮執事之人往來寛展不相妨礙兩旁各立一華表髙一丈許上以横木貫之如門之狀華表於禮無文但見州縣有如此者或恐易得損壊不作亦得請更依此歩數丈數界作方眼中間以紙剪作兩壇貼之便見四面壇脚取壝丈數但壇面二丈五尺乃最上一級之數下面更兩級一級須展一尺即壇脚須徑二丈九尺壇飾古者社稷不屋有明文不用磚砌無所考然亦不言磚砌者中原土宻雖城壁亦不用磚今南方土踈不砌恐易壊赤土飾之又恐僣於郊壇不可用也瘞坎於壇之北壬地南出陛方深取足容物瘞坎在壇之北壬地即是合在北壝門内兩壇邉各於中央下日隔取壬地各用磚石砌作一小天井深闊三四尺許其南作踏道上下閑時以土實之臨祭即令人取去土掃令潔浄祭畢即使人持幣及祝版之屬從踏道下送入坎中然後下土築實依條差人守視燎壇古者祭天以燔燎祭地以瘞埋來喻所云燎壇為風師雨師雷師設者是也古今禮制社稷風雨雷神各有壇又各有方位社稷於西方風師於東北雨雷於東南大畧如此不記子細今州縣亦皆别有壇但方位多不合古不謂建寕大邦乃無風雨雷神之壇而寓於社稷之壇也新儀所云在神壇之左而高於神壇者不謂此社稷壇左設燎壇而高於社稷壇也植木按周禮社各植之以土之所宜木今當以本府之所宜木植之尺壇壝等亦是禮制當用古尺不當用今尺井田類説漢文帝十三年六月除田租荀氏論曰古者什一而税以為天下之中正也今漢民或百一而税可謂鮮矣然豪疆富人占田逾侈此處疑有闕字輸其賦太半官収百一之税民收太半之賦官家之惠優於三代豪疆之暴酷於亡秦是上惠不通威福分於豪疆也今不正其本而務除租稅適足以資富疆夫土地者天下之大本也春秋之義諸侯不得専封大夫不得専地今豪民占田或至數百千頃富過王侯是自専封也買賣由已是自専其地也孝武時董仲舒甞言宜限民占田至哀帝時乃限民占田不得過三十頃雖有其制卒不得施然三十頃有不平矣且夫井田之制宜於民衆之時地廣民稀勿為可也然欲廢之於寡立之於衆土地既富列在豪疆卒而規之並起怨心則生紛亂制度難行由是觀之若高帝初定天下及光武中興之後民人稀少立之易矣就未悉備井田之法宜以口數占田為立科限民得耕種不得買賣以贍貧弱以防兼并且為制度張本不亦宜乎雖古今異制損益隨時然綱紀大畧其致一也本志曰古者建歩立畆六尺為歩歩百為畆畆百為夫夫三為屋屋三為井井方一里是為九夫八家共之一夫一婦受私田百畆公田十畆是為八百八十畆餘二十畆以為廬舍出入相交佇班志作守望相接疾病相救民受田上田夫百畆中田夫二百畆下田夫三百畆歲更耕之換易其處何休曰司空謹别田之高下善惡分為三品上田一歲一墾中田二歲一墾下田三歲一墾肥饒不得獨樂墝埆不得獨苦三年一換土易居其家衆男為餘夫亦以口受田如此比士工商家受田五口乃當農夫一人有賦有税賦謂計口發財六字係班志顔注税謂公田什一及工商衡虞之入也賦供車馬兵甲士徒之役充實府庫賜予之費稅給郊宗廟百神之祀天子奉養百官禄食庶事之費充實以下並班志文民年二十受田六十歸田種榖必雜五種以備災害中弗得有樹以妨五榖力耕數耘收穫如㓂盗之至環廬種桑菜茹有畦爪瓠果蓏於疆畔雞豚狗豕無失其時女修蠶織五十則可以衣帛七十則可以食肉五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉鄉萬二千五百户比長位下士自此以上稍登一級至鄉為大夫矣於是閭有序而鄉有庠序以明教庠以行禮而視化焉春令民畢出於野其詩云同我婦子饁彼南畆田畯至喜冬則畢入於邑其詩云同我婦子曰為改歲入此室處春則出民閭胥平旦坐於左塾比長坐於右塾畢出而後歸夕亦如之入者必薪樵輕重相分班白不提挈何休曰晏出後時者不得出暮不持樵者不得入冬則民既入婦人同巷夜績女工一月得四十五日功必相從者所以省費燭火同工拙而合習俗也男女有不得其所者因而相與歌詠以言其情是月餘子亦在序室未征役為餘子八歳入小學學六甲四方五行書計之事始知室家長㓜之節始知以下班志文十五入大學學先王禮樂而知朝廷二字班志君臣之禮其有秀異者移於鄉學鄉學之秀移於國學學於小學諸侯歳貢小學之秀者於天子學於大學其有秀者命曰造士行同而能偶别之以射於鄉學以下以何休説増損修定然後爵命焉孟春之月羣居將散行人振木鐸以狥於路以採詩獻之太師比其音律以聞於天子何休曰男年六十女年五十無子者官衣食之使之民間求詩鄉移於邑邑移於國國以聞於天子三年耕則餘一年之畜故三年有成成此功也故王者三載考績九年耕餘三年之食進業曰登故三考黜陟再登曰平餘六年食三登曰泰平二十七歳餘九年食然後至徳流洽禮樂成焉故曰如有王者必世而後仁繇此道也九年以下並以班志修定書曰天秩有禮天罰有罪故聖人因天秩而制五禮因天罰而制五刑建司馬之官設六軍之衆因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為衆衆班志並作終字十為同同方百里同十為封封十為畿畿方千里地四井為邑四邑為丘丘十六井有戎馬一匹牛三頭四丘為甸六十四井有戎馬四匹兵車一乘牛十二頭甲士三人歩卒七十二人干戈備具是謂司馬之法一同百里提封萬井除山川坑塹城池邑居園囿街路三千六百井定出賦六千四百井戎馬四百匹兵車百乘此卿大夫采地之大者是謂百乘之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此諸侯之大者謂之千乘之國天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乘戎馬車徒干戈素具春振旅以蒐夏㧞舍以苗秋治兵以獮冬大閲以狩於農隙以講事焉五國為屬屬有長十國為連連有帥三十國有卒卒有正二百一十國為州州有牧牧有連帥比年簡車卒正三年簡徒羣牧五年大簡輿徒此先王為國立武足兵之大畧也連帥以下並以班志晦庵集卷六十八欽定四庫全書晦庵集卷六十九宋朱子撰雜著禘祫議王制天子七廟三昭三穆與太祖之廟而七諸侯大夫士降殺以兩而祭法又有適士二廟官師一廟之文大抵士無太祖而皆及其祖考也鄭氏曰夏五廟商六廟周七廟今按商書已云七世之廟鄭志恐非顔師古曰父為昭子為穆孫復為昭昭明也穆羙也後以晉室諱昭故學者改昭為韶其制皆為中門外之左外為都宫内各有寢廟别有門垣太祖在北左昭右穆以次而南晉博士孫毓議天子太祖百世不遷一昭一穆為宗亦百世不遷宗亦曰世室亦曰祧鄭注周禮守祧曰宗亦曰祧亦曰世室周禮言守祧之宫鄭氏曰逺廟為祧周為文武之廟遷主藏焉又曰遷主所藏曰祧先公之遷主藏于太祖后稷之廟先王之遷主藏於文武之廟羣穆於文羣昭於武明堂位有文世室武世室鄭氏曰世室者不毁之名也二昭二穆為四親廟高祖以上親盡則毁而遞遷昭常為昭穆常為穆昭之二廟親盡則毁而遷其主于昭之宗魯祖遷于昭之二新入廟者祔于昭之三而高祖及祖在穆如故穆廟親盡放此新死者如當為昭則祔於昭之近廟而自近廟遷其祖於昭之次廟而於主祭者為曾祖自次廟遷其高祖于昭之世室蓋於主祭者為五世而親盡故也其穆之兩廟如故不動其次廟於主祭者為高祖其近廟於主祭者為祖也主祭者沒則祔于穆之近廟而逓遷其上故此凡毁廟遷主改塗易彩示有所變非盡毁也見榖梁傳及注諸侯則無二宗大夫則無二廟其遷毁之次則與天子同傳毁廟之主藏於太祖儀禮所謂以其班祔檀弓所謂祔于祖父者也曲禮云君子抱孫不抱子此言孫可以為王父尸子不可以為父尸鄭氏云以孫與祖昭穆同也周制自后稷為太祖不窋為昭鞠為穆以下十二世至太王復為穆十三世至王季復為昭十四世至文王又為穆十五世至武王復為昭故書稱文王為穆考詩稱武王為昭考而左氏傳曰太伯虞仲太王之昭也虢仲虢叔王季之穆也又曰管蔡魯衛文之昭也邘晉應韓武之穆也葢其次序一定百世不易雖文王在右武王在左嫌於倒置而諸廟别有門垣足以各全其尊初不以左右為尊卑也三代之制其詳雖不得聞然其大畧不過如此漢承秦敝不能深考古制諸帝之廟各在一處不容合為都宫以序昭穆韋元成傳云宗廟異處昭穆不序但考周制先公廟在岐周文王在豐武王在鎬則都宫之制亦不得為與漢亦無甚異未詳其説貢禹韋元成匡衡之徒雖欲正之而終不能盡合古制旋亦廢罷後漢明帝又欲遵儉自抑遺詔無起寢廟但藏其主於光武廟中更衣别室其後章帝又復如之後世遂不敢加而公私之廟皆為同堂異室之制見後漢明帝紀祭祀志志又云其後積多無别而顯宗但為陵寢之號自是以來更歴魏晉下及隋唐其間非無奉先思孝之君据經守禮之臣而皆不能有所裁正其弊至使太祖之位下同孫子而更僻處於一隅既無以見其為七廟之尊羣廟之神則又上厭祖考而不得自為一廟之主以人情而論之則生居九重窮極壯麗而沒祭一室不過尋丈之間甚或無地以容鼎爼而隂損其數孝子順孫之心於此宜亦有所不安矣肆我神祖始獨慨然深詔儒臣討論舊典葢捋以遠迹三代之隆一正千古之謬甚盛舉也不幸未及營表世莫得聞秉筆之士又復不能特書其事以詔萬世今獨其見於陸氏之文者為可考耳然其所論昭穆之説亦未有定論圖説在後獨原廟之制外為都宫而各為寢廟門垣乃為近古但其禮本不經儀亦非古故儒者得以議之如李清臣所謂畧于七廟之室而為祠於佛老之側不為木主而為之象不為禘祫烝甞之祀而行一酌奠之禮楊時所謂舍二帝三王之正禮而從一繆妄之叔孫通者其言皆是也然不知其所以致此則由於宗廟不立而人心有所不安也不議復此而徒欲廢彼亦安得為至當之論哉王者始受命諸侯始封之君皆為太祖以下五世而迭毁毁廟之主藏乎太祖五年而再毁祭言一禘一祫也祫祭者毁廟與未毁廟之主皆合食於太祖父為昭子為穆孫復為昭古之正禮也周之所以七廟者以后稷始封文王武王受命而王是三廟不毁與親廟四而七七者其正法數可常數者宗不在此數中宗變也茍有功徳則宗之不可預為設數故於殷有三宗周公舉之以勸成王由是言之宗無數也劉歆周七廟圖稷高圉以上藏主公叔王季亞圍古公文王時稷亞圉以上藏主公叔王季大王文王武王時稷公叔以上藏主王季武王太王文王成王時稷太王以上藏主王季武王文王成王康王時稷王季以上藏主武康文成昭王時稷文世室武康成昭穆王時稷武世室文世室康穆成昭共王時稷武世室文成康穆昭共懿王時稷武康文成穆懿昭共孝王時稷武康昭文成穆懿共孝夷王時稷武康穆文成昭懿夷共孝厲王時稷武康穆共文成昭懿夷孝厲宣王時稷武康穆懿文成昭共夷宣孝厲幽王時劉歆周九廟圖稷稷公非以上藏主高公叔王季亞圍太王文王武王時稷高圉以上藏主公叔王季武王亞圉太王文王成王時稷亞圉以上藏主公叔王季武王太王文王成王康王時稷公叔以上藏主王季武王康主太王文王成王昭王時稷太王以上藏主王季武康文王成昭穆王時稷王季以上藏主武康穆文成昭共王時稷文世室武康穆成昭共懿王時稷武世室文世室康穆㦤成昭共孝王時稷武成文康穆懿昭共孝夷王時稷武康文成穆懿夷昭共孝厲王時稷武康昭文成穆懿夷共孝厲宣王時稷武康穆文成昭懿夷宣共孝厲幽王時
