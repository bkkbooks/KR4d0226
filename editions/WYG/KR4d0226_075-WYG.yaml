front:
  text: 記文定公問答皆他書所無有而提綱挈領指示學者用力處亦卓然非他書所及下篇四十七章與板本吳氏本畧同然時有小異蓋損益曽氏所記而精約過之輙因其舊定著爲二篇且著曽氏本語及吳氏之異同者於其下以備參考獨板本所増多猶百餘章然或失本指雜他書其尤者五十餘章至詆程氏以助佛學直以或者目程氏而以予曰自起其辭皆荒浪無根非先生所宜言亦不類答問記述之體意近世學佛者私竊爲之以亢其術偶出於曽氏雜記異聞之書而傳者弗深考遂附之於先生傳之久逺疑誤後學使先生爲得辠於程夫子而曽氏爲得􅖄於先生者則必是書之爲也故竊不自知其固陋輒放而絶之雖或被之以僭妄之罪而不敢辭也其餘所謂失本指雜他書甚者亦頗刋去而得先生遺語三十餘章别爲一篇然記錄不精僅存仿彿非復前篇比矣凡所定者書三篇已校定可繕寫因論其所以然之意附見其後以俟知言有道君子考而擇焉紹興二十九年三月庚午新安朱熹謹書
