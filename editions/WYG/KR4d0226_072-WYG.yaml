body:
  text: 雜著北辰辨帝座惟在紫微者据北極七十二度常見不隱之中故有北辰之號而常居其所蓋天形運轉晝夜不息而此為之樞如輪之轂如磑之臍雖欲動而不可得非有意於不動也若太微之在翼天市之在尾攝提之在亢其南距赤道也皆近其北距天極也皆逺則固不容於不動而不免與二十八宿同其運行矣故其或東或西或隱或見各有度數仰而觀之蓋無晷刻之或停也今曰是與在紫微者皆居其所而為不動者四則是一天而四樞一輪而四轂一磑而四臍也分寸一移則其輻裂而瓦碎也無日矣若之何而能為運轉之無窮哉此星家淺事不足深辨然或傳寫之誤則不可以不正也聲律辨五聲之序宫最大而沉濁羽最細而輕清商之大次宫徵之細次羽而角居四者之中焉然世之論中聲者不以角而以宫何也曰凡聲陽也自下而上未及其半則屬於隂而未暢故不可用上而及半然後屬於陽而始和故即其始而用之以為宫因其每變而益上則為商為角為變徵為徵為羽為變宫而皆以為宫之用焉是以宫之一聲在五行為土在五常為信在五事為思蓋以其正當衆聲和與未和用與未用隂陽際㑹之中所以為盛若角則雖當五聲之中而非衆聲之㑹且以七均論之又有變徵以居焉亦非五聲之所取正也然自其聲之始和者推而上之亦至於變宫而止耳自是以上則又過乎輕清而不可以為宫於是就其兩間而細分之則其别又十有二以其最大而沈濁者為黄鍾以其極細而輕清者為應鍾及其旋相為宫而上下相生以盡五聲二變之用則宫聲常不越乎十二之中而四聲者或時出於其外以取諸律半聲之管然後七均備而一調成也黄鍾之與餘律其所以為貴賤者亦然若諸半聲以上則又過乎輕清之甚而不可以為樂矣蓋黄鍾之宫始之始中之中也十律之宫始之次而中少過也應鍾之宫始之終而中已盡也諸律半聲過乎輕清始之外而中之上也半聲之外過乎輕清之甚則又外之外上之上而不可為樂者也正如子時初四刻屬前日正四刻屬後日其兩日之間即所謂始之始中之中也然則聲自屬隂以下亦當黙有十二正變半律之地以為中聲之前段如子初四刻之為者但無聲氣之可紀耳由是論之則審音之難不在於聲而在於律不在於宫而在於黄鍾蓋不以十二律節之則無以著夫五聲之實不得黄鍾之正則十一律者又無所受以為本律之宫也今有極論宫聲之妙而無曰黄鍾云者則恐其於聲音法制之間猶有所未盡也夫以聲音法制之粗而猶有未盡則雖有黄帝大舜之君伶倫后䕫之佐亦如之何徒手而可以議大樂之和哉又有為宫當配仁之説者恐亦非是迹其所以葢以仁當四徳之元而有包四者之義耳夫仁木行而角聲者也以之配宫則仁既不安而信亦失據然以為可包四者則不害其有是理也夫五行之序木為之始水為之終而土為之中以河圖洛書之數言之則水一木三而土五皆陽之生數而不可易者也故得以更迭為主而為五行之綱以徳言之則木為發生之性水為貞静之體而土又包育之母也故木之包五行也以其流通貫徹而無不在也水之包五行也以其歸根反本而藏於此也若夫土則水火之所寄金木之所資居中而應四方一體而載萬類者也故孔子賛乾之四徳而以貞元舉其終始孟子論人之四端而不敢以信者列序於其間葢以為無適而非此也是則宫之統五聲仁之包五常葢有並行而不悖者矣何必奪彼以予此然後快於其心哉開阡陌辨漢志言秦廢井田開阡陌説者之意皆以開為開置之開言秦廢井田而始開阡陌也故白居易云人稀土曠者宜修阡陌户繁鄉狹者則復井田葢亦以阡陌為秦制井田為古法此恐皆未得其事之實也按阡陌者舊説以為田間之道蓋因田之疆畔制其廣狹辨其縱横以通人物之往來即周禮所謂遂上之徑溝上之畛洫上之涂澮上之道也然風俗通云南北曰阡東西曰陌又云河南以東西為阡南北為陌二説不同今以遂人田畝夫家之數攷之則當以後説為正葢陌之為言百也遂洫從而徑涂亦從則遂間百畝洫間百夫而徑涂為陌矣阡之為言千也溝澮横而畛道亦横則溝間千畆澮間千夫而畛道為阡矣阡陌之名由此而得至於萬夫有川而川上之路周於其外與夫匠人井田之制遂溝洫澮亦皆四周則阡陌之名疑亦因其横從而命之也然遂廣二尺溝四尺洫八尺澮二尋則丈有六尺矣徑容牛馬畛容大車涂容乗車一軌道二軌路三軌則幾二丈矣此其水陸占地不得為田者頗多先王之意非不惜而虚棄之也所以正經界止侵争時畜洩備水旱為永乆之計有不得不然者其意深矣商君以其急刻之心行茍且之政但見田為阡陌所束而耕者限於百畝則病其人力之不盡但見阡陌之占地太廣而不得為田者多則病其地利之有遺又當世衰法壊之時則其歸授之際必不免有煩擾欺隱之姦而阡陌之地切近民田又必有隂據以自私而税不入於公上者是以一旦奮然不顧盡開阡陌悉除禁限而聽民兼并買賣以盡人力懇闢棄地悉為田疇而不使其有尺寸之遺以盡地利使民有田即為永業而不復歸授以絶煩擾欺隱之姦使地皆為田而田皆出税以覈隂據自私之幸此其為計正猶楊炎疾浮户之弊而遂破租庸以為兩税葢一時之害雖除而千古聖賢傳授精微之意於此盡矣故秦紀鞅傳皆云為田開阡陌封疆而賦税平蔡澤亦曰决裂阡陌以静生民之業而一其俗詳味其言則所謂開者乃破壊剗削之意而非創置建立之名所謂阡陌乃三代井田之舊而非秦之所置矣所謂賦税平者以無欺隱竊據之姦也所謂静生民之業者以無歸授取予之煩也以是數者合而証之其理可見而蔡澤之言尤為明白且先王疆理天下均以與民故其田間之道有經有緯不得無法若秦既除井授之制矣則隨地為田隨田為路尖斜屈曲無所不可又何必取其東西南北之正以為阡陌而後可以通往來哉此又以物情事理推之而益見其説之無疑者或乃以漢世猶有阡陌之名而疑其出於秦之所置殊不知秦之所開亦其曠僻而非通路者耳若其適當衝要而便於往來則亦豈得而盡廢之哉但必稍侵削之不使復如先王之舊耳或者又以董仲舒言富者連阡陌而請限民名田疑田制之壊由於阡陌此亦非也葢曰富者一家而兼有千夫百夫之田耳至於所謂商賈無農夫之苦有阡陌之得亦以千夫百夫之收而言葢當是時去古未逺此名尚在而遺迹猶有可考者顧一時君臣乃不能推尋詳究而修復之耳豈不可惜也哉九江彭蠡辨嶓冡道漾東流為漢又東為滄浪之水過三澨至於大别南入於江東匯澤為彭蠡東為北江入於海又曰岷山導江東别為沱又東至於澧過九江至於東陵東迤北㑹於滙東為中江入於海又曰岷山之陽至於衡山過九江至於敷淺原此皆禹貢之文也古今讀者皆以為是既出於聖人之手則固不容復有訛謬萬世之下但當尊信誦習傳之無窮亦無以覈其事實是否為也是以為之説者不過隨文解義以就章句如説九江則曰江過尋陽派别為九或曰有小江九北來注之説彭蠡則曰漢水所匯而江水亦往㑹焉説北江中江則曰漢既匯而出為北江江既㑹而出為中江也説九江則但指今日江州治所以當之説敷淺原則但以為漢厯陵縣之傳易山在今日為江州之徳安縣而已如是而言姑為誦説則可矣若以山川形勢之實攷之吾恐其説有所不通而不能使人無所疑也若曰派别為九則江流上下洲渚不一今所計以為九者若必首尾短長均布若一則横斷一節縱别為九一水之間當有一洲九江之間沙水相間乃為十有七道於地將無所容若曰參差取之不必齊一則又不知斷自何許而數其九也况洲渚出没其勢不常江陵先有九十九洲後乃復生一洲是豈可以為地理之定名乎此不可通之妄説也若曰旁計横入小江之數則自岷山以東至入海處不知其當為幾千百江矣此又不可通之妄説也且經文言九江孔殷正以見其吐吞壯盛浩無津涯之勢决非尋常分派小江之可當又繼此而後及夫沱潜雲夢則又見其决非今日江州甚逺之下流此又可以證前二説者為不可通之妄説也若曰漢水匯為彭蠡而江水亦往㑹焉則彭蠡之為澤也實在大江之南自今江州湖口縣南跨南康軍饒州之境以接於隆興府之北瀰漫數十百里其源則東自饒徽信州建昌軍南自贑州南安軍西自袁筠以至隆興分寜諸邑方數千里之水皆㑹而歸焉北過南康楊瀾左里則兩岸漸廹山麓而湖面稍狹遂東北流以趨湖口而入於江矣然以地勢北高而南下故其入於江也反為江水所遏而不得遂因卻而自瀦以為是瀰漫數十百里之大澤是則彭蠡之所以為彭蠡者初非有所仰於江漢之匯而後成也不唯無所仰於江漢而衆流之積日遏日高勢亦不復容江漢之來入矣又况漢水自漢陽軍大别山下南流入江則其水與江混而為一至此已七百餘里矣今謂其至此而後一先一後以入於彭蠡既匯之後又復循次而出以為二江則其入也何以識其為昔日之漢水而先行何以識其為昔日之江水而後㑹其出也何以識其為昔日之漢水而今分以之北何以識其為昔日之江水而今分以居中耶且以方言之則宜曰南㑹而不應曰北㑹以實計之則湖口之東今但見其為一江而不見其分流然則所謂漢水匯為彭澤而江水亦往㑹焉者亦不可通之妄説也此一説者既無一之不窮於是味别洲别之論出焉而終亦不免於窮也葢曰味别則不知凡禹之所為過門不入胼手胝足而不以為病者為欲大濟天下昏墊之民使得乎土而居以衣且食而遂其生耶抑如陸羽張又新輩但欲較計毫分於齒頰間以為茗飲一時之快也嗚呼彼以是而為説者亦可謂童騃不思之甚矣且河之所㑹漆沮涇渭伊洛瀍澗支川尤多而初無味别之説濟之所經或潜或見或止或流其變不一而初無味别之説何獨至此而辨之若是悉耶此又可見其為不通之妄説也若曰洲别則又九江之鑿吾既辨於前矣若果如此則漢水入江之後便須常有一洲介於其間以為江漢之别而湖口入匯之處又當各分為二以為出入之辨而後可也今皆無之而湖口横度之處予嘗過之但見舟北為大江之濁流舟南為彭蠡之清漲而已葢彭蠡之水雖限於江而不得洩然及其既平則亦因其可行之隙而又未嘗不相持以東也惡睹所謂中江北江之别乎此又可見其為不通之妄説也若曰古之九江即今之江州古之敷淺原即今之徳安縣則漢九江郡本在江北而今所謂江州者實武昌郡之柴桑縣後以江北之尋陽并柴桑而立郡又自江北徙治江南故江南得有尋陽之名後又因尋陽而改為江州實非古九江地也又况經言過九江至於東陵而後㑹於彭蠡則自今江州城下至湖口縣才四十里不知東陵的在何處何所表異而其志之繁密促數乃如此又曰過九江至於敷淺原則已自江州順流東下湖口又復泝流南上彭蠡百有餘里而後至焉亦何説哉此又不可通之妄説也至於今之所謂敷淺原者為山甚小而卑不足以有所表見而其全體正脉遂起而為廬阜則甚高且大以盡乎大江彭蠡之交而所以識夫衡山東過一支之所極者唯是山為宜耳今皆反之則吾恐其山川之名古今或異而傳者未必得其真也凡此差舛其類不一讀而不思思而不攷者既昏憒鹵莽而無足言矣其間亦有心知其誤而口不敢言乃反為之遷就穿鑿以葢其失者則其巧愈甚而其謬愈彰使有識之士讀之愈疑而愈不敢信唯國初胡秘監旦近世晁詹事説之皆以九江為洞庭則其援証皆極精博而莆田鄭樵漁仲獨謂東匯澤為彭蠡東為北江入於海十三字為衍文亦為得之予既目覩彭蠡有原兩江不分之實又參之以此三説者而深以事理情勢求之然後果得其所以誤也葢洪水之患唯河為甚而兖州乃其中流水曲而流緩地平而土踈故河之患於此為尤甚是以作治之功十有三載然後同於諸州竊計當時唯此等處事急民困勢重役煩禹乃親蒞而身督之不可一日而舍去若梁雍荆揚地偏水急不待䟽鑿固已通行則分遣官屬往而視之其亦可也况洞庭彭蠡之間乃三苖氏之所居當是之時水澤山林深昧不測彼方負其險阻頑不即工則官屬之往者固未必遽敢深入其境是以但見彭蠡之為澤而不知其源之甚逺而且多但見洞庭下流之已為江而不知其中流之嘗為澤而甚廣也以此致誤宜無足怪若其用字之同異則經之凡例亦自可攷顧讀書者未深思耳今但刪去東匯北江之衍字而止以洞庭為九江更以經之凡例通之則過九江至於東陵者言導岷山之水而是水之流横截乎洞庭之口以至東陵也是漢水過三澨之例也過九江至於敷淺原者言導岷陽之山而導山之人至於衡山之麓遂越洞庭之尾東取山路以至乎敷淺原也是導岍岐荆山而逾於河以盡常碣之例也以是觀之則經之文意不亦既明矣乎若更以他書攷之則山海經云廬江出三天子都本注云一作鄣今按丹陽故為鄣郡其得名葢以此則作鄣為是入江彭澤西本注云彭澤今彭蠡也在鄱陽彭澤縣漢志亦云廬江出陵陽東南北入江葢陵陽者丹陽之屬縣今寧國府旌徳縣有陵陽山而三天子都乃在徽饒之境疑與陵陽腹背相直故廬江者得出其東南而西流北折以為鄱餘二水遂以㑹於彭蠡而入於江也及其入江則廬山屹立乎其西南而江之北岸即為郡之南境疑江與山葢相因以得名而郡境雖在江北亦以其南直此江此山而名之也然則彭蠡安得為無原而必待漢匯江㑹而成哉漢志豫章為郡領縣十八其彭蠡縣下注云禹貢彭蠡澤在西其餘則言水入湖漢者八鄱陽鄱水餘干餘水艾脩水塗淦水南城盱水建成蜀水宜春南水南埜彭水入大江者一贑豫章水而湖漢一水則又自雩都東至彭澤入江行千九百八十里也按今地勢彭蠡既與江通而豫章諸水不由彭蠡别無入江之路則湖漢者即是彭蠡而其所受衆水之原又不止於廬江而已也以此而觀則山海經之言猶有未盡且其曰入江彭澤西者本謂逕彭蠡縣之西而入江耳而語意不明遂若析江與澤各為一水而一東一西以入江者此亦其立言之疵也漢志又自不知湖漢之即為彭蠡而兩言之又不知入大江者亦必瀦於彭蠡而别為一例又不知湖漢之為湖正以其澤名之而復兼以漢稱則又承禹貢之誤而弗深考也至於雩都之水則但見其為一郡衆流之最逺者而遂推為湖漢之源以主其名則又不知湖漢之名初非一水必自隆興以北衆水皆㑹瀦為大澤然後可以名之非雩都一水所可得而專也至如鄭漁仲漢水衍文之説固善矣而其下文江水東迤北㑹於匯東為中江入於海之數言似亦可疑而彼猶未能盡正也嗚呼禹貢所載者九州之山川吾之足迹未能遍乎荆揚而見其所可疑者已如此不知耳目見聞之所不及所可疑者又當幾何是固不可得而知矣至於經之凡例本自明白而諸儒乃有過為新竒之説以亂之者若論導山而逾於河而以為導岍岐荆山之脉使之度河以為壺口諸山之類則亦不待聞見之及而知其謬矣夫禹之治水隨山刋木其所表識諸山之名必其高大可以辨疆域廣博可以奠民居故謹而書之以見其施功之次第初非有意推其脉絡之所自來若今論葬法者之所言也若必實以山脉言之則亦自有可言而尤足以見其説之謬者葢河北諸山本根脊脉皆自代北寰武嵐憲諸州乗高而來其脊以西之水則西流以入龍門為河之上流其脊以東之水則東流而為桑乾道幽冀以入於海其西一支為壺口太岳次一支包汾晉之源而南出以為析城王屋而又西折以為雷首又次一支乃為太行又次一支乃為常山其間各隔沁潞諸川不相連屬豈自岍岐跨河東度而反為是諸山哉若過九江至於敷淺原亦有襲其謬者以為衡山之脉東度而來則以見聞所及而知其必不然也葢岷山之脉其一支為衡山者已盡於九江之西其一支又南而東度桂嶺者則包湘原而北徑潭袁之境以盡於廬阜其一支又南而東度大庾者則包彭蠡之原以北至乎建康其一支則又東包浙江之原而北其首以盡於㑹稽南其尾以盡乎閩越也豈衡山之脉能度九江而其度也又直為敷淺原而已哉又有欲以揚州之三江即為荆州之中江北江而猶病其闕一乃顧彭蠡之餘波適未有號則姑使之潜冐南江之名以足之且又自謂聖經書法之妙非它人之所及是亦極巧而且新矣然自湖口而下江本無二安得有三且於下文之震澤又懸隔遼夐而不相属也則又安能曲説而彊附之哉問諸吳人震澤下流實有三江以入於海彼既以目驗之恐其説之必可信而於今尚可攷也因并論之以俟來者有以質焉皇極辨洛書九數而五居中洪範九疇而皇極居五故自孔氏傳訓皇極為大中而諸儒皆祖其説余獨嘗以經之文義語脉求之而有以知其必不然也葢皇者君之稱也極者至極之義標準之名常在物之中央而四外望之以取正焉者也故以極為在中之凖的則可而便訓極為中則不可若北辰之為天極脊棟之為屋極其義皆然而禮所謂民極詩所謂四方之極者於皇極之義為尤近顧今之説者既誤於此而并失於彼是以其説展轉迷繆而終不能以自明也即如舊説姑亦無問其它但即經文而讀皇為大讀極為中則夫所謂惟大作中大則受之為何等語乎今以予説推之則人君以眇然之身履至尊之位四方輻凑面内而環觀之自東而望者不過此而西也自南而望者不過此而北也此天下之至中也既居天下之至中則必有天下之純徳而後可以立至極之標凖故必順五行敬五事以脩其身厚八政協五紀以齊其政然後至極之標凖卓然有以立乎天下之至中使夫面内而環觀者莫不於是而取則焉語其仁則極天下之仁而天下之為仁者莫能加也語其孝則極天下之孝而天下之為孝者莫能尚也是則所謂皇極者也由是而權之以三徳審之以卜筮驗其休咎於天攷其禍福於人如挈裘領豈有一毛之不順哉此洛書之數所以雖始於一終於九而必以五居其中洪範之疇所以雖本於五行究於福徳而必以皇極為之主也若箕子之言有曰皇建其有極云者則以言夫人君以其一身而立至極之標凖於天下也其曰歛時五福用敷錫厥庶民云者則以言夫人君能建其極則為五福之所聚而又有以使民觀感而化焉則是又能布此福而與其民也其曰惟時厥庶民於汝極錫汝保極云者則以言夫民視君以為至極之標凖而從其化則是復以此福還錫其君而使之常為至極之標凖也其曰凡厥庶民無有淫朋人無有比徳惟皇作極云者則以言夫民之所以能有是徳者皆君之有以為至極之標凖也其曰凡厥庶民有猷有為有守汝則念之不協於極不罹於咎皇則受之云者則以言夫君既立極於上而下之從化或有淺深遲速之不同其有謀者有才者有徳者人君固當念之而不忘其或未能盡合而未抵乎大戾者亦當受之而不拒也其曰而康而色曰予攸好徳汝則錫之福時人斯其惟皇之極云者則以言夫人之有能革面從君而以好徳自名則雖未必出於中心之實人君亦當因其自名而與之以善則是人者亦得以君為極而勉其實也其曰無虐㷀獨而畏高明人之有能有為使羞其行而邦其昌云者則以言夫君之於民一視同仁凡有才能皆使進善則人才衆多而國賴以興也其曰凡厥正人既富方穀汝弗能使有好於而家時人斯其辜於其無好徳汝雖錫之福其作汝用咎云者則以言夫凡欲正人者必先有以富之然後可以納之於善若不能使之有所賴於其家則此人必將陷於不義至其無復更有好徳之心而後始欲教之以修身勸之以求福則已無及於事而其起以報汝唯有惡而無善矣葢人之氣禀或清或濁或純或駁有不可以一律齊者是以聖人所以立極乎上者至嚴至密而所以接引乎下者至寛至廣雖彼之所以化於此者淺深遲速其效或有不同而吾之所以應於彼者長養涵育其心未嘗不一也其曰無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極云者則以言夫天下之人皆不敢狥其已之私以從乎上之化而㑹歸乎至極之標凖也葢偏陂好惡者已私之生於心者也偏黨反側者已私之見於事者也王之義王之道王之路上之化也所謂皇極者也遵義遵道遵路方㑹其極也蕩蕩平平正直則已歸於極矣其曰皇極之敷言是彛是訓於帝其訓云者則以言夫人君以身立極而布命於下則其所以為常為教者皆天之理而不異乎上帝之降衷也其曰凡厥庶民極之敷言是訓是行以近天子之光云者則以言夫天下之人於君所命皆能受其教而謹行之則是能不自絕逺而有以親被其道徳之光華也其曰天子作民父母以為天下王云者則以言夫人君能立至極之標凖所以能作億兆之父母而為天下之王也不然則有其位無其徳不足以首出庶物統御人羣而履天下之極尊矣是書也原於天之所以錫禹雖其茫昧幽眇有不可得而知者然箕子之所以言之而告武王者則已備矣顧其詞之宏深奥雅若有未易言者然嘗試虚心平氣而再三反復焉則亦坦然明白而無一字之可疑但先儒未嘗深求其意而不察乎人君所以脩身立道之本是以誤訓皇極為大中又見其詞多為含洪寛大之言因復誤認中為含胡茍且不分善惡之意殊不知極雖居中而非有取乎中之義且中之為義又以其無過不及至精至當而無有毫髪之差亦非如其所指之云也乃以誤認之中為誤訓之極不謹乎至嚴至密之體而務為至寛至廣之量其弊將使人君不知脩身以立政而墮於漢元帝之優游唐代宗之姑息卒至於是非顛倒賢否貿亂而禍敗隨之尚何歛福錫民之可望哉嗚呼孔氏則誠誤矣然迹其本心亦曰姑以隨文解義為口耳佔畢之計而已不知其禍之至此也而自漢以來迄今千有餘年學士大夫不為不衆更厯世變不為不多幸而遺經尚存本文可攷其出於人心者又不可得而昧也乃無一人覺其非是而一言以正之者使其患害流於萬世是則豈獨孔氏之罪哉予於是竊有感焉作皇極辨馮當可字時行蜀人博學能文其集中有封事云願陛下逺便佞疎近習清心寡欲以臨事變此興事造業之根本洪範所謂皇建其有極者也其論皇極深合鄙意然則予前所謂千有餘年無一人覺其繆而正之者亦近誣矣但專經之士無及之者而文士反能識之豈汨没傳注者不免於因陋踵訛而平心誦味者有時而得之文字之外耶慶元丙辰臘月甲寅東齋南窓記尹和靖手筆辨伊川先生曰某在何必看此書若不得某之心只是記得它意豈不有差既云某在不必看則先生不在之時語録固不可廢矣不得先生之心而徒記已意此亦學者所當博學審問精思而明辨之不可以一詞之失而盡廢其餘也但先生在則可以式瞻儀刑親受音㫖自是不必看耳然讀焉而質其疑於先生豈不益有助於發明哉如楊遵道録中記李端伯録至大至剛以直之論若使遵道於此廢而不觀存而不論則亦無以决此語之得失矣伊川所以告和靖者葢就其力量所至而語之惜乎其不復致疑於此而遽誦以終身也所見有淺深故所記有工拙失其意者不假一二言也淺拙而失其意者固不足觀矣其見深其記工而得其意者豈可以彼之失而遽廢之哉如世傳史評之類皆非先生所著史評固非先生所著但當論辨以曉學者不可因此并廢語録也紹興初士大夫頗以伊川語録資誦説言事者直以狂怪淫鄙詆之葢難力辨也以語録資誦説者當時士大夫之罪以狂怪淫鄙詆之當時言事者之失非語録使然也今惡當時士大夫畏當時言事者而諱語録以為不足觀是既助言者以自攻而又無以服當時學者之心也豈不誤哉掇同門所記僅數十端示之愚嘗讀此書矣類多解釋經義之言若程氏之學止於如此則亦無以繼孔孟不傳之緒前輩言學欲博不欲雜欲約不欲陋誠有味哉伊川之學在易傳不必他求也孔子刪詩定書繫周易作春秋而其徒又述其言以為論語其言反復證明相為表裏未聞其以此而廢彼也易傳所自作也語録它人作也人之意它人能道者幾何哉如是則孔氏之門亦可以專治春秋而遂廢論語矣而可乎伊川先生為中庸解疾革命焚於前門人問焉伊川先生曰某有易傳在足矣何以多為嘗見别本記或問和靖據語録先生自言中庸已成書今其書安在和靖曰先生自以為不滿意而焚之矣此言恐得其真若無所不滿於其意而專恃易傳逆廢中庸吾恐先生之心不如是之隘也雜學辨何叔京䟦語附蘇氏易解乾之彖辭發明性命之理與詩烝民維天之命書湯誥泰誓中庸孟子相表裏而大傳之言亦若符契蘇氏不知其説而欲以其所臆度者言之又畏人之指其失也故每為不可言不可見之説以先後之務為閃倐滉漾不可捕捉之形使讀者茫然雖欲攻之而無所措其辨殊不知性命之理甚明而其為説甚簡今将言之而先曰不可言既指之而又曰不可見足以眩夫未嘗學問之庸人矣由學者觀之豈不適所以為未嘗見未嘗知之驗哉然道衰學絶世頗惑之故為之辨以待後之君子而其它言死生鬼神之不合者亦并附焉大哉乾元萬物資始乃統天蘇曰此論元也元之為徳不可見也所可見者萬物資始而已天之徳不可勝言也惟是為能統之愚謂四徳之元猶四時之春五常之仁乃天地造化發育之端萬物之所從出故曰萬物資始言取其始於是也存而察之心目之間體叚昭然未嘗不可見也然惟知道者乃能識之是以蘇氏未之見耳不知病此顧以已之不見為當然而謂真無可見之理不亦惑之甚與雲行雨施品物流形蘇曰此所以為亨也大明終始六位時成時乗六龍以御天蘇曰此所以為利也愚謂此言聖人體元亨之用非言利也乾道變化各正性命保合大和蘇曰此所以為貞也愚謂此兼言利貞而下句結之也乃利貞蘇曰并言之也愚謂此結上乾道變化各正性命保合大和之文與大明終始六位時成時乗六龍以御天不相蒙蘇氏之説亦誤矣蘇曰正直也方其變化各之於情無所不至反而循之各直其性以至於命此所以為貞也愚謂品物流形莫非乾道之變化而於其中物各正其性命以保合其大和焉此乾之所以為利且貞也此乃天地化育之源不知更欲反之於何地而又何性之可直何命之可至乎若如其説則保合大和一句無所用矣蘇曰古之君子患性之難見也故以可見者言性以可見者言性皆性之似也愚謂古之君子盡其心則知其性矣未嘗患其難見也其言性也亦未嘗不指而言之非但言其似而已也且夫性者又豈有一物似之而可取此以况彼耶然則蘇氏所見殆徒見其似者而未知夫性之未嘗有所似也蘇曰君子日修其善以消其不善不善者日消有不可得而消者焉小人日修其不善以消其善善者日消有不可得而消者焉夫不可得而消者堯舜不能加焉桀紂不能逃焉是則性之所在也又曰性之所在庶幾知之而性卒不可得而言也愚謂蘇氏此言最近於理前章所謂性之所似殆謂是耶夫謂不善日消而有不可得而消者則疑若謂夫本然之至善矣謂善日消而有不可得而消者則疑若謂夫良心之萌蘖矣以是為性之所在則似矣而蘇氏初不知性之所自來善之所從立則其意似不謂是也特假於浮屠非幻不滅得無所還者而為是説以幸其萬一之或中耳是將不察乎繼善成性之所由梏亡反覆之所害而謂人與犬羊之性無以異也而可乎夫其所以重歎性之不可言葢未嘗見所謂性者是以不得而言之也蘇曰聖人以為猶有性者存乎吾心則是猶有是心也有是心也偽之始也於是又推其至者而假之曰命命令也君之命曰令天之令曰命性之至者非命也無以名之而寄之命耳愚謂蘇氏以性存於吾心則為偽之始是不知性之真也以性之至者非命而假名之是不知命之實也如此則是人生而無故有此大偽之本聖人又為之計度隱諱偽立名字以彌縫之此何理哉此葢未嘗深攷夫大傳詩書中庸孟子之説以明此章之意而溺於釋氏未有天地已有此性之言欲語性於天地生物之前而患夫命者之無所寄於是為此説以處之使兩不相病焉耳使其誠知性命之説矣而欲語之於天地生物之前葢亦有道必不為是支􅄐淫遁之辭也蘇曰死生壽夭無非命者未嘗去我也而我未嘗覺知焉聖人之於性也至焉則亦不自覺知而已矣此以為命也又曰命之與性非有天人之辨也於其不自覺知則謂之命愚謂如蘇氏之説則命無所容命無所容則聖人所謂至命者益無地以處之故為是説以是迷㒺又以罔夫世之不知者而已豈有命在我而不自覺知而可謂之聖人哉蘇氏又引文言利貞性情之文傳㑹其説皆非經之本㫖今不復辨首出庶物萬國咸寜蘇氏云云愚謂此言聖人體利貞之徳也蘇氏説無病然其於章句有未盡其説者一隂一陽之謂道繼之者善也成之者性也蘇云隂陽果何物哉雖有婁矌之聰明未有能得其髣髴者也隂陽交然後生物物生然後有象象立而隂陽隱凡可見者皆物也非隂陽也然謂隂陽為無有可乎雖至愚知其不然也物何自生哉是故指生物而謂之隂陽與不見隂陽之髣髴而謂之無有皆惑也愚謂隂陽盈天地之間其消息闔闢終始萬物觸目之間有形無形無非是也而蘇氏以為象立而隂陽隱凡可見者皆物也非隂陽也失其理矣逹隂陽之本者固不指生物而謂之隂陽亦不别求隂陽於物象見聞之外也蘇曰聖人知道之難言也故借隂陽以言之曰一隂一陽之謂道一隂一陽者隂陽未交而物未生之謂也喻道之似莫密於此者矣隂陽一交而生物其始為水水者無有之際也始離於無而入於有矣老子識之故其言曰上善若水又曰水幾於道聖人之徳雖可以名而不囿於一物若水之無常形此善之上者幾於道矣而非道也若夫水之未生隂陽之未交廓然無一物而不可謂之無有此真道之似也愚謂一隂一陽往來不息舉道之全體而言莫著於此者矣而以為借隂陽以喻道之似則是道與隂陽各為一物借此而况彼也隂陽之端動静之機而已動極而静静極而動故隂中有陽陽中有隂未有獨立而孤居者此一隂一陽所以為道也今曰一隂一陽者隂陽未交而物未生廓然無一物不可謂之無有者道之似也然則道果何物乎此皆不知道之所以為道而欲以虚無寂滅之學揣摸而言之故其説如此蘇曰隂陽交而生物道與物接而生善物生而隂陽隱善立而道不見矣故曰繼之者善也成之者性也仁者見道而謂之仁智者見道而謂之智夫仁智聖人之所謂善也善者道之繼而指以謂道則不可今不識其人而識其子因之以見其人則可以謂其人則不可故曰繼之者善也學道而自其繼者始則道不全愚謂繼之者善言道之所出無非善也所謂元也物得是而成之則各正其性命矣而所謂道者固自若也故率性而行則無往而非道此所以天人無二道幽明無二理而一以貫之也而曰隂陽交而生物道與物接而生善物生而隂陽隱善立而道不見善者道之繼而已學道而自其繼者始則道不全何其言之繆耶且道外無物物外無道今曰道與物接則是道與物為二截然各据一方至是而始相接則不亦繆乎蘇曰昔上孟子以為性善以為至矣讀易而後知其未至也孟子之於性葢見其繼者而已矣夫善性之效也孟子未及見性而見其性之效因以所見者為性猶火之能熟物也吾未見火而指天下之熟物以為火夫熟物則火之效也愚謂孟子道性善葢探其本而言之與易之㫖未始有毫髪之異非但言性之效而已也蘇氏急於立説非特不察於易又不及詳於孟子故其言之悖如此蘇曰敢問性與道之辨曰難言也可言其似道之似則聲也性之似則聞也有聲而後聞耶有聞而後聲耶是二者果一乎果二乎孔子曰人能𢎞道非道𢎞人又曰神而明之存乎其人性者所以為人者也非是無以成道矣愚謂子思子曰率性之謂道邵子曰性者道之形體也與大傳此章之㫖相為終始言性與道未有若此言之著者也蘇氏之言曲譬巧喻欲言其似而不可得豈若聖賢之言直示而無隱耶昔孔子順謂公孫龍之辨幾能令臧三耳矣然謂兩耳者甚易而實是也謂三耳者甚難而實非也將從其易而是者乎將從其難而非者乎此言似之矣仁者見之謂之仁知者見之謂之智百姓日用而不知故君子之道鮮矣蘇曰屬目於無形者或見其意之所存故仁者以道為仁意存乎仁也知者以道為智意存乎智也賢者存意而妄見愚者日用而不知是以君子之道成之以性者鮮矣愚謂蘇氏不知仁智之根於性顧以仁智為妄見乃釋老之説聖人之言豈嘗有是哉謂之不見其全則或可矣又曰君子之道成之以性者鮮矣文義亦非原始反終故知死生之説蘇曰人所以不知死生之説者駭之耳原始反終使之了然而不駭也愚謂人不窮理故不知死生之説不知死生之説故不能不駭於死生之變蘇氏反謂由駭之而不知其説失其指矣窮理者原其始之所自出則知其所以生反其終之所於歸則知其所以死夫如是凡所以順生而安死者葢有道矣豈徒以了然不駭為竒哉蘇氏於原始反終言之甚略無以知其所謂然以不駭云者驗之知其溺於坐亡立化去來自在之説以為竒而於聖人之意則昧矣精氣為物遊魂為變是故知鬼神之情狀蘇曰物鬼也變神也鬼常與體魄俱故謂之物神無適而不可故謂之變精氣為魄魄為鬼志氣為魂魂為神故禮曰體魄則降志氣在上鄭子産曰其用物也𢎞矣其取精也多矣古之逹者已知此矣一人而有二知無是道也然而有魄者有魂者何也衆人之志不出於飲食男女之間與凡養生之資其資厚者其氣彊其資約者其氣㣲故氣勝志而為魄聖賢則不然以志一氣清明在躬志氣如神雖禄之天下窮至匹夫無所損益也故志勝氣而為魂衆人之死為鬼而聖人為神非有二致也志之所在者異也愚謂精聚則魄聚氣聚則魂聚是以為人物之體至於精竭魄降則氣散魂遊而無不之矣降者屈而無形故謂之鬼遊者伸而不測故謂之神人物皆然非有聖愚之異也孔子答宰我之問言之詳矣蘇氏葢不攷諸此而失之子産之言是或一道而非此之謂也蘇黄門老子解蘇侍郎晚為是書合吾儒於老子以為未足又并釋氏而彌縫之可謂舛矣然其自許甚髙至謂當世無一人可以語此者而其兄東坡公亦以為不意晚年見此竒特以予觀之其可謂無忌憚者與因為之辨而或者謂蘇氏兄弟以文義賛佛乗葢未得其所謂如傳燈録解之属其失又有甚焉不但此書為可辨也應之曰予之所病病其學儒之失流於異端不病其學佛未至而溺於文義也其不得已而論此豈好辨哉誠懼其亂吾學之傳而失人心之正耳若求諸彼而不得其説則予又何暇知焉蘇曰孔子以仁義禮樂治天下老子絶而棄之或者以為不同易曰形而上者謂之道形而下者謂之器愚謂道器之名雖異然其實一物也故曰吾道一以貫之此聖人之道所以為大中至正之極亘萬世而無弊者也蘇氏誦其言不得其意故其為説無一辭之合學者於此先以予説求之使聖人之意曉然無疑然後以次讀蘇氏之言其得失判然矣孔子之慮後世也深故示人以器而晦其道愚謂道器一也示人以器則道在其中聖人安得而晦之孔子曰吾無隱乎爾然則晦其道者又豈聖人之心哉大抵蘇氏所謂道者皆離器而言不知其指何物而名之也使中人以下守其器不為道之所眩以不失為君子愚謂如蘇氏此言是以道為能眩人而使之不為君子也則道之在天下適所以為斯人之禍矣而中人以上自是以上逹也愚謂聖人所謂逹兼本末精粗而一以貫之也蘇氏之所謂逹則舍器而入道矣老子則不然志於明道而急於開人心愚謂老子之學以無為為宗果如此言乃是急急有為惟恐其緩而失之也然則老子之意蘇氏亦有所不能窺者矣故示人以道而薄於器以為學者惟器之知則道隱矣故絶仁義棄禮樂以明道愚謂道者仁義禮樂之總名而仁義禮樂皆道之體用也聖人之脩仁義制禮樂凡以明道故也今曰絶仁義棄禮樂以明道則是舍二五而求十也豈不悖哉天道不可言可言者皆其似者也逹者因似以識真而昧者執似以陷於偽愚謂聖人之言道曰君臣也父子也夫婦也昆弟也朋友之交也不知此言道耶抑言其似者而已耶執此而行亦有所陷者耶然則道豈真不可言但人自不識道與器之未嘗相離也而反求之於昏黙無形之中所以為是言耳故後世執老子之説以亂天下者有之而學孔子者無大過愚謂善學老子者如漢文景曹參則亦不至亂天下如蘇氏之説則其亂天下也必矣學孔子者所得亦有淺深有過無過未可槩論且如蘇氏非不讀孔子之書而其著書立言以惑悮天下後世如此謂之無過其可得乎因老子之言以逹道者不少而求之於孔子者嘗苦其無所從愚謂因老子之言以逹道者不少不知指謂何人如何其逹而所逹者何道也且曰不少則非一二人而已逹道者果如是之衆耶孔子循循善誘誨人不倦入徳之途坦然明白而曰常苦其無所從入則其未嘗一日從事於此不得其門而入可知矣宜其析道與器而以仁義禮樂為無與於道也然則無所從入之言非能病孔子之道而絶學者之志乃所以自狀其不知道而妄言之實耳二聖人者皆不得已也愚謂以孔子老耼並稱聖人可乎世人譏太史公先黄老後六經然太史公列孔子於世家而以老子與韓非同傳豈不有微意焉其賢於蘇氏逺矣全於此必略於彼矣愚謂有彼有此則天下當有二道也蘇氏後序云六祖所云不思善不思惡即喜怒哀樂之未發也愚謂聖賢雖言未發然其善者固存但無惡耳佛者之言似同而實異不可不察又云葢中者佛性之異名而和者六度萬行之總目也愚謂喜怒哀樂而皆中節謂之和而和者天下之逹道也六度萬行吾不知其所謂然毁君臣絶父子以人道之端為大禁所謂逹道固如是耶又云天下固無二道而所以治人則異君臣父子之間非禮法則亂知禮法而不知道則世之俗儒不足貴也居山林木食澗飲而心存至道雖為人天師可也而以之治世則亂古之聖人中心行道而不毁世法然後可耳愚謂天下無二道而又有至道世法之殊則是有二道矣然則道何所用於世而世何所資於道耶王氏有高明處已中庸處人之論而龜山楊公以為如此明是道常無用於天下而經世之務皆私智之鑿愚於蘇氏亦云張無垢中庸解無垢本佛語而張公子韶侍郎之别號也張公以佛語釋儒書其跡尤著故正其名如此張公始學於龜山之門而逃儒以歸於釋既自以為有得矣而其釋之師語之曰左右既得欛柄入手開導之際當改頭換面而隨直説法使殊塗同歸則世出世間兩無遺恨矣然此語亦不可使俗輩知將謂實有恁麽事也見大慧禪師與張侍郎書今不見於語録中葢其徒諱之也用此之故凡張氏所論著皆陽儒而隂釋其離合出入之際務在愚一世之耳目而使之恬不覺悟以入乎釋氏之門雖欲復出而不可得本末指意略如其所受於師者其二本殊歸葢不特莊周出於子夏李斯原於荀卿而已也竊不自揆嘗欲為之論辨以曉當世之惑而大本既殊無所不異因覧其中庸説姑掇其尤甚者什一二著於篇其它如論語孝經大學孟子之説不暇遍為之辨大抵怱遽急廹其所以為説皆此書之類也天命之謂性率性之謂道脩道之謂教張云天命之謂性第賛性之可貴耳未見人收之為已物也率性之謂道則人體之為已物而入於仁義禮智中矣然而未見施設運用也脩道之謂教則仁行於父子義行於君臣禮行於賓主知行於賢者而道之等降隆殺於是而見焉愚謂天命之謂性言性之所以名乃天之所賦人之所受義理之本原非但賛其可貴而已性亦何待於人賛其貴耶董子曰命者天之令也性者生之質也此可謂庶幾子思之意而異乎張氏之言矣且既謂之性則固已自人所受而言之今曰未為已物則是天之生是人也未以此與之而置之他所必是人者自起而收之而後得以為已物也不知未得此性之前其為人也孰使之呼吸食息於天地之間以收此性且夫性者又豈塊然一物寓於一處可摶而置之軀殻之中耶仁義禮智性之所有與性為體者也今曰體為已物然後入於仁義禮智之中則是四者逆設於此而後性來於彼也不知方性之未入也是四者又何自而來哉凡此皆不知大本妄意穿鑿之言智者觀之亦不待盡讀其書而是非邪正已判於此章矣仁行於父子義行於君臣是乃率性之道而遽以為脩道之教亦失其次序矣是故君子戒慎乎其所不睹止慎其獨也張云不睹不聞少致其忽宜若無害矣然而怠忽之心已顯於心目之間云云不足以惑人動物而招非意之辱莫為之禍焉此君子所以慎其獨也愚謂君子所以慎其獨者非為恐招禍辱而已也今曰不睹不聞之間少致其忽初無所害特恐招禍辱而後慎其獨焉非知道者之言也喜怒哀樂之未發謂之中張云未發以前戒慎恐懼無一毫私欲愚謂未發以前天理渾然戒慎恐懼則既發矣君子中庸張云方率性時戒慎恐懼此學者之事也及其深入性之本原直造所謂天命在我然後為君臣父子兄弟夫婦之教以幸於天下至於此時聖人之功用興矣愚謂率性之謂道言道之所以得名者如此葢曰各循其性之本然即所謂道耳非以此為學者之事亦未有戒慎恐懼之意也脩道之謂教通天下而言之聖人所以立極賢人所以脩身皆在於此非如張氏之説也又曰深入性之本原直造所謂天命在我理亦有礙且必至此地然後為人倫之教以幸天下則是聖人未至此地之時未有人倫之教而所以至此地者亦不由人倫而入也凡此皆爛漫無根之言乃釋氏之緒餘非吾儒之本㫖也張云率性之謂道未離本位脩道之謂教不可以離不離名之也愚謂言性有本位則性有方所矣聖賢言性似不如此假如其説則前章云率性所以求中言求則是自此求彼非離正位而何至於以脩道為聖人之功用則又曰不可以離不離名之葢其説有所不通而駸駸乎遁矣人皆曰予知張曰人皆用知於詮品是非而不知用知於戒慎恐懼使移詮品是非之心於戒慎恐懼知孰大焉愚謂有是有非天下之正理而是非之心人皆有之所以為知之端也無焉則非人矣故詮品是非乃窮理之事亦學者之急務也張氏絶之吾見其任私鑿知不得循天理之正矣然斯言也豈釋氏所稱直取無上菩提一切是非莫管之遺意耶嗚呼斯言也其儒釋所以分之始與回之為人張云顔子戒慎恐懼超然悟未發己發之幾於喜怒哀樂處一得天命之性所謂善者則深入其中人欲都忘我心皆䘮愚謂超然悟未發己發之幾中庸無此意也喜怒哀樂莫非性也中節則無不善矣不知更欲如何得之而又如何深入其中也若此則是前乎此者未得此性而常在性之外也耶且曰我心皆䘮尤害於理張云人第見其拳拳服膺而不知顔子與天理為一無一毫私欲横乎其間不識不知我已且無有矣愚謂此言葢欲極意以䛕顔子而無所凖則不自知其言之過也惟聖者能之張云予嘗求聖人而不可得今乃知止在喜怒哀樂未發處爾愚謂有道者見理平常其言雍容閑暇而理致自逺似不如此之駭遽而張皇也君子之道費而隱張云由戒慎恐懼以養喜怒哀樂使為中為和以位天地育萬物愚謂喜怒哀樂之未發乃本然之中發而中節乃本然之和非人之所能使也天地位焉萬物育焉亦理之自然今加以字而倒其文非子思之本意矣此乃一篇之指要而張氏語之輙有差繆尚安得為知言哉張云中庸無止法故聖人有所不知不能自謂知能止矣又曰君子之道所以大莫能載小莫能破以其戒慎恐懼察於微茫之功也愚謂大學之道在知所止葢無止則高者過卑者陷非所以為中庸矣聖人固未嘗自謂知能然非此章之指也葢所謂不知不能莫能載莫能破皆言道體之無窮爾非謂聖人而言亦無察於微茫之意也張云戒慎恐懼則未萌之始已致其察至於鳶飛魚躍而察乃在焉又曰上際下蟠察無不在所以如鳶飛魚躍察乃随飛躍而見焉愚謂中庸引此詩以發明道體之無所不在所謂費而隱也明道上蔡言之已詳子思復生不能易也張氏之云不亦異乎且曰未萌之始已致其察則是有事焉而正之也張云顧惟此察始於戒慎恐懼以養中和而喜怒哀樂未發己發之間乃起而為中和愚謂起而為中和如之何其起也此豈知中和者之語哉君子以人治人改而止張云人即性也以我之性覺彼之性愚謂詳經文初無此意皆釋氏之説也且性豈有彼我乎又如之何其能以也張云使其由此見性則自然由乎中庸而向來無物之言不常之行皆掃不見跡矣愚謂見性本釋氏語葢一見則已矣儒者則曰知性既知之矣又必有以養而充之以至於盡其用力有漸固非一日二日之功日用之際一有懈焉則幾微之間所害多矣此克己復禮之所以為難而曽子所以戰戰兢兢至死而後知其免也張氏之言與此亦不類矣然釋氏之徒有既自謂見性不疑而其習氣嗜欲無以異於衆人者豈非恃夫掃不見跡之虚談而不察乎無物不常之實弊以至此乎然則張氏之言其淵源所自葢可知矣忠恕違道不逺張云恕由忠而生忠所以責已也知己之難克然後知天下之未見性者不可深罪也又曰知一己之難克而知天下皆可恕之人愚謂恕由忠生明道謝子侯子葢嘗言之然其為説與此不相似也若曰知一己之難克而知天下皆可恕之人則是以己之私待人也恕之為義本不如此正䝉曰以責人之心責已則盡道以愛己之心愛人則盡仁以衆人望人則易從此則物我一致各務循理而無違矣聖賢之言自有凖則所謂以人治人者雖曰以衆人望人然而必曰道不逺人則所以為衆人者亦有道矣以己不能克其私而并容它人使之成其惡則是相率而禽獸也其為不忠不恕孰大於是所求乎子句以事父未能也張云子事父臣事君弟事兄朋友先施之皆曰求者葢所以致其察也察子之事父吾未能安敢責父之愛子乎愚謂此四句當為八句子臣弟友四字是句絶處求猶責也所責乎子者如此然我以之事父則自有所未能正䝉所謂以責人之心責己則盡道葢將由是而加勉正身以及物非如上章所云以己難克而并容它人也且又曰察子之事父吾未能則安敢責父之愛子乎則是君臣父子漠然為路人矣昊天之泣小弁之怨又何謂也葢其馳心高妙而於章句未及致詳故因以誤為此説以求為察亦非文義言顧行張云顧者察也愚按上章以求為察固已無謂此又以顧為察尤為牽合大抵張氏之為是説得一字可推而前者則極意推之不問其至於何處與其可行不可行也篇内所謂戒慎恐懼下章所謂忠恕所謂知仁勇所謂發育峻極皆此類也在上位不陵下張云君子戒慎恐懼醖醸成中庸之道愚謂中庸之道天理自然非如酒醴必醖醸而成也君子之道譬如行逺必自邇張云欲知戒慎恐懼之效當於忠恕卜之欲知忠恕之效當於父母卜之愚謂此言皆牽合無理且父母至尊豈人子所以卜忠恕之物乎詳味此言可見其二本矣鬼神之為徳張云天地萬物森然鬼神列於中不可違也愚按張氏它章之説甚詳而此獨略將有所疑而不敢盡耶抑其所謂鬼神者特如世俗之論而不之究耶然詳味列字之意則以鬼神别為一物明矣豈知鬼神者之言哉大徳必受命張云言此所以勉天下之為徳也當始一戒慎恐懼而以位禄名壽卜徳之進否愚謂徳盛則名位禄壽從之乃理之必然非姑為此言以勉天下之為徳亦非使學者以是四者卜其徳之進否也舜之飯糗茹草若將終身焉其受命也乃不期而自至耳豈曰卜之云乎張氏之説乃謀利計功之尤者學者一有此念存乎胸中則不可以進徳矣無憂者其惟文王乎張云戒慎恐懼則無適而不在中和中其無憂也必矣中和之中自當有賢父聖子又曰武王之舉危道也愚謂凡此類皆牽合而此數句尤踈濶無理又以武王之舉為危道則是聖人行險以徼幸也是豈知順天應人之為安哉郊社之禮禘嘗之義張云不知先王居於何地乃知天神自郊求地􅅘自社求人鬼自禘嘗求哉愚謂先王所以知此以其理而已矣不煩更為竒怪之説地道敏樹張云布種下實未及頃刻云云愚謂雖天下至易生之物亦未有下種未及頃刻而發生者此可見其矜竒欲速之心矣故君子不可不脩身止不可以不知天張云戒慎恐懼深致其察所以知天也愚謂戒懼致察既知天而事天之事也未能知天則何所戒懼乎張云推知天之心以知人推知人之心以事親愚按推知天以知人猶之可也推知人以事親不亦悖乎伊川先生曰不知人則所與或非其人所由或非其道而辱身危親者有之故思事親不可以不知人此論不可易也所以行之者一也及其知之一也及其成功一也張曰知而未能行是未能運用此誠也愚謂知而未能行乃未能得之於巳豈特未能用而已乎然此所謂知者亦非真知也真知則未有不能行者且曰運用此誠亦非知誠者之語葢誠則無為而成初不煩運用矣張云行知仁勇者誠也而所以知此誠者非它物也亦即誠也所以行此誠者非它物也亦即誠也此聖人極誠之所在而指之也又云誠字雖同而行知仁勇之誠不若知誠之誠為甚明知誠之誠不若行誠之誠為甚大也愚按經文所以行之者一也與及其知之一也及其成功一也兩句立語命意不同張氏似誤作一例讀之故其為説如此文義猶不暇通而遽欲語其精㣲此其所以失之也且所謂誠者一而已矣今乃裂而三之又於其中相與自為優劣葢不窮天理無所凖則而逞其私智逆探幽深横騖捷出必極其所如往而後己則安得不至於是乎然推其本原則生生化化見見聞聞之緒餘也好學近乎知力行近乎仁知恥近乎勇張云近之為言以不逺也不逺即在此而已第知所以好學者誰所以力行者誰所以知恥者誰則為知仁勇矣見於言語文字者皆近之而已惟人體之識所以體者為當幾而明即事而解則知仁勇豈它物哉愚謂上章既言逹徳之名恐學者無所從入故又言其不逺者以示之使由是而求之則可以入徳也聖人之言淺深逺近之序不可差次如此張氏以為不逺者是矣而又曰即在此而已何其言之相戾也葢其所以為説者牽之以入於荒唐繆悠之中其勢不得而自己爾夫好學力行知恥在我而已又必求其所以如此者為誰而後為至是是身外復有一身心外復有一心紛紛乎果何時而已耶設使果如其言則所謂誰者一而已矣聖人復何用虚張三者之目使學者徒為是多方以求之耶詳求聖人之意决不如是特釋氏之説耳此章之指惟吕博士之言淵慤有味庶幾得之張氏之徒葢以為淺近而忽之矣然豈知其言近指逺其得聖賢之意也與凡為天下國家有九經張云如其知仁勇則亦不期於修身尊賢親親敬大臣體羣臣子庶民來百工柔逺人懷諸侯矣又曰九經以次而行皆中其㑹矣愚謂如張氏之云則九經皆剰語矣聖人之道所以異於異端者以其本末内外一以貫之而無精粗之辨也故子思於九經反復三致意焉而張氏忽之如此葢每事欲高於聖賢一等而不知慿虚失實秪其所以卑也凡事豫則立張云欲學者養誠於平日也愚謂先立乎誠則無不豫矣非謂豫養誠也既誠矣則何豫養之云乎不誠乎身矣張云世之論誠者多錯認專為誠夫至誠無息専非誠也以專為誠則是語言寢處應對醻酢皆離本位矣愚謂專固不足以盡誠然遂以無息為誠則亦誤矣葢惟至誠為無息非因其無息而命之以誠也離本位之言聖人無有已辨於前矣然專亦豈遽離本位哉張云世之行誠者類皆不知變通至於誦孝經以禦賊讀仁王以消災愚謂聖賢惟言存誠思誠未嘗言行誠葢思之既得存之既著則其誠在己而見於行事者無一不出於誠謂之行誠則是已與誠為二而自我以行彼誠之為道不如是也如此者其失不但不知變通而已若曰所行既出於誠則又不可謂之行誠而亦無不知變通之理張氏之言進退無所據矣至於誦孝經以禦賊葢不知明理而有迂愚之蔽以是為行誠而不知變通然則張氏之所謂誠亦無以異於專矣讀仁王經者其溺於邪僻又甚不得與誦孝經者同科矣張云格物知至之學内而一念外而萬事無不窮其終始窮而又窮以至於極盡之地人欲都盡一旦廓然則性善昭昭無可疑矣愚按格物之學二先生以來諸君子論之備矣張氏之云乃釋氏看話之法非聖賢之遺㫖也吕舍人大學解所論格物正與此同愚亦已為之辨矣張云注之於身則身誠注之於親則親悦注之於友則友信注之於君於民則獲上而民治愚謂明乎善則身自誠乃理之自然身誠則親自悦由是以至於友於君於民皆然乃積盛充實而自致耳今曰注之而然則是設之於此射之於後而冀其必然也其為不誠莫大於是張云誠之所在擊觸轉移愚謂至誠積於中而事物應於外理之常也然豈若是其驚遽暴疾哉張云安得不想孔子孟子再拜以謝其格言乎愚謂觀此氣象甚矣其粗鄙而輕浮也博學之審問之慎思之明辨之篤行之張曰博學者戒慎恐懼非一事也問思辨放此愚謂戒慎恐懼乃篤行之事非博學之謂也誠明明誠張云由上智之自得而合乎聖人之教者性也由遵聖人之教而造乎上智之地者教也上智自得而不合於聖人之教則為異端矣愚謂張氏於誠明之説葢未嘗深攷而為此説以合其素論觀其自處傲然已在誠明之域矣然謂上智自得而有不合於聖人之教者則未知其所得果何事也且所謂異端者復誰謂乎夫豈不自知其已失身於此而故為是言者是乃所謂改頭換面隂予而陽擠之將以自葢其迹而幸人之不疑已其為不誠莫大於是以是心而語中庸不亦戾乎大哉聖人之道章云荒唐夢幻之學其意亦猶是也後不復重出矣惟天下至誠為能盡其性止天地參矣張云此誠既見已性亦見人性亦見物性亦見天地之性亦見愚謂經言惟至誠故能盡性非曰誠見而性見也見字與盡字意義逈别大率釋氏以見性成佛為極而不知聖人盡性之大故張氏之言每如此其次致曲張云禮樂射御書數中直造乎誠之地也愚謂直造乎誠則非致曲也張云變者此誠忽然而有倐然而無愚謂誠若如此何以為物之終始乎至誠之道可以前知張云既前知之則以誠造化轉移變易使禍為福妖為祥亡為興葢無難也愚謂至誠之道非可以者以之則非誠矣夫轉禍為福易災為祥以太戊高宗之事觀之則理固有是然不如是之易也是以古之聖賢遇災而懼嚴恭祗畏以正厥事猶不敢庶幾其萬一故曰瞻仰昊天曷惠其寕豈曰轉移變易而無難哉然此章之指初亦不為是發也不誠無物張云吾誠一往則耳目口鼻皆壊矣愚謂誠無人我之别不必言吾無彼此之殊不必言往耳目鼻口亦豈有一旦遽壊之理哉此章之説諸先生言之悉矣以彼觀此得失可見君子誠之為貴張云誠未足貴誠而又誠之斯足貴也愚謂聖人言天下之理無出於誠而曰誠未足貴何其言之悖也且既誠矣以為未足貴而又誠之乃足貴則前之所謂誠者無乃為棄物與葢縁本不知誠而惟恐其言之小故其言每如此且誠者天之道豈亦未足貴必待誠之者人之道乃足貴耶雖至愚有以知其不然矣至誠無息張云不見形象而天地自章不動聲色而天地自變垂拱無為而天地自成天地亦大矣而使之章使之成皆在於我又曰至誠不息則有不見而章不動而變無為而成天地又自此而造化之妙矣愚詳經意葢謂至誠之理未嘗形見而自彰著未嘗動作而自變化無所營為而自成就天地之道一言而盡亦不過如此而已張氏乃以為聖人至誠於此能使天地章明變化於彼不惟文義不通而亦本無此理其曰天地自此而造化語尤險怪葢聖人之於天地不過因其自然之理以裁成輔相之而已若聖人反能造化天地則是子孫反能孕育父祖無是理也凡此好大不根之言皆其心術之蔽又原於釋氏心法起滅天地之意正蒙斥之詳矣尊徳性而道問學止敦厚以崇禮張云自戒慎恐懼而入入而造於發育峻極之地而不敢己則行乎三千三百之中而道問學矣尊徳性而不敢己則又變而為致廣大此下不敢己者三又變而為者三知新崇禮又致廣大極高明之變名也愚按此皆言體道成徳之目無不敢己而又變之意變名之説亦無義理張云豈有一毫之變怪以驚眩天下之耳目哉愚按張氏之書變怪驚眩葢不少矣猶以為無有不知更欲如何乃為變怪驚眩哉吾從周張云周法已弊其過多矣孔子身非輔相不在尊位所以不敢輕議妄論而曲意以從周之法度愚按孔子言周監於二代郁郁乎文哉吾從周則其從周也亦有道矣非不得已而妄從之也若末世之弊有如拜上之泰則不盡從矣其不得不從者是亦義理之所在斯誠然而從之以為曲意而從非聖人之心也張氏歸心乎釋氏而曲意於儒者故其所以窺聖人者如此非一辭之失也其所從來逺矣君子未有不如此而蚤有譽於天下者也張云夫如此指何事而言哉即予所謂戒慎不睹恐懼不聞也愚按張氏戒慎恐懼二句横貫中庸一篇之中其牽合附㑹連章累句已不容一一辨正矣至於此章經文所謂如此乃上文君子之道本諸身以下耳張氏欲成其前説乃近舍本章上文之義逺指戒慎恐懼於數千字之間未論義理之當否而豈言語文字體勢之常哉故特論此一章尤踈漏處以見其餘之皆此類也此天地之所以為大也張云論至於此則夫子葢未嘗死也觀乎天地此亦夫子之乾坤也愚按孔子言文王既没文不在兹乎未嘗言文王之不死也然言近㫖逺其味無窮所以為聖人之言也不死之云變怪駭人而實無餘味故程子有言立言當涵蓄意思不使知徳者厭無徳者惑正為此耳吕氏大學解吕氏之先與二程夫子遊故其家學最為近正然未能不惑於浮屠老子之説故其末流不能無出入之弊按正獻公神道碑載公進讀上語及釋老虚寂之㫖公曰堯舜雖知此乃以知人安民為急此其所差之端也堯舜之道精粗本末一以貫之其所知者似與釋老不相似也以為所知在此而所急在彼是二本也本原如此則其末流之弊豈可勝道哉今論其一二以補其闕葢其他説之近正者則君子猶有取焉知所先後則近道矣吕氏曰異端之學皆不知所先後考索勤苦雖切而終不近故有終始為一道本末為兩端者愚謂此言似為釋氏發然吕氏終身學焉不知以誰為異端而為是説以詆之耶葢其心未必不以為有先後者世間之粗學而無先後者出世間之妙道兩者初不相為謀雖並行而不相悖也方其言此故不得不是此而非彼及其為彼則又安知其不是彼而非此哉彼其陽離隂合自以為左右采獲而集儒佛之大成矣曽不悟夫言行不類出入支離之為心害而莠亂苗紫奪朱之患又將無所不至也此葢原於所知在此所急在彼之意而其失又甚焉近世之言道者葢多如此其誤後學深矣致知在格物物格而後知至吕氏曰致知格物脩身之本也知者良知也與堯舜同者也理既窮則知自至與堯舜同者忽然自見黙而識之愚謂致知格物大學之端始學之事也一物格則一知至其功有漸積乆貫通然後胸中判然不疑所行而意誠心正矣然則所致之知固有淺深豈遽以為與堯舜同者一旦忽然而見之也哉此殆釋氏一聞千悟一超直入之虚談非聖門明善誠身之實務也其與前章所斥異端之學不知所先後者又何以異哉吕氏曰草木之㣲器用之别皆物之理也求其所以為草木器用之理則為格物草木器用之理吾心存焉忽然識之此為物格愚按伊川先生嘗言凡一物上有一理物之微者亦有理又曰大而天地之所以高厚小而一物之所以然學者皆當理㑹吕氏葢推此以為説而失之者程子之為是言也特以明夫理之所在無間於大小精粗而已若夫學者之所以用功則必有先後緩急之序區别體驗之方然後積習貫通馴致其極豈以為直存心於一草一木器用之間而與堯舜同者無故忽然自識之哉此又釋氏聞聲悟道見色明心之説殊非孔氏遺經程氏發明之本意也嚮以吕氏之博聞彊識而不為是説所迷則其用力於此事半而功必倍矣今乃以其習熟見聞者為餘事而不復精察其理之所自來顧欲置心草木器用之間以伺其忽然而一悟此其所以始終本末判為兩途而不自知其非也舊見吕氏晚年尺牘數語有足以證成此義者因系之於後并為之説云吕氏曰聞見未徹正當以悟為則所謂致知格物正此事也比來權去文字專務體究尚患雜事紛擾無專一工夫若如伊川之説物各付物便能役物却恐失渉顢頇爾吕自注云其意以為物不可去事不可無正當各任之耳愚謂以悟為則乃釋氏之法而吾儒所無有吕氏顧以為致知格物之事此其所以誤為前説而不知其非也若然則又安得獨以不知所先後者為異端之病哉若由吾儒之説則讀書而原其得失應事而察其是非乃所以為致知格物之事葢無適而非此理者今乃去文字而專體究猶患雜事紛擾不能專一則是理與事為二必事盡屏而後理可窮也終始二道本末兩端孰甚於此則未知吕氏所體所究果何理哉伊川之説正謂物各有理事至物來隨其理而應之則事事物物無不各得其理之所當然者如舜之舉十六相去四凶也此其所以不為物之所役而能役物豈曰各任之而已哉如曰任之而已則是漫然不察其是非可否而一切聽其所為也如此則能不為物之所役者鮮矣顧舍其顢頇而謂人顢頇豈不惑哉先王之世一道徳同風俗故天下之大人無異言家無異學豈復知有異端之害哉及周之衰正道陵遲禮壊樂崩夫子憂之乃緒正六􅀴以明先王之教當是時異端雖不能無猶未有以名家者也及夫子没世道益衰狂僣之士見聖人之有作也遂各逞其聰明競立異説以自名於世顧與正道並馳而争勝於是天下之人耳目眩瞶而莫知適從矣然諸子百家雖各主其説而其為害則有淺深如老荘之虚浮人固知其無著申韓之刑名人固知其少恩皆不足以惑人也惟楊墨之學假仁義以為名而實為仁義之害惑人之尤甚者也故孟子起而閑先聖之道舍諸子而獨闢楊墨以正人心息邪説距詖行放淫辭使天下若醉而醒夢而覺然後正道廓如也噫孟子以來千有餘載儒者溺於詞采實不見道徒辯楊墨之非至身為楊墨則不自覺徒惡楊墨之害至躬蹈楊墨則不自知况敢冀其有孟氏之功乎夫浮屠出於夷狄流入中華其始也言語不通人固未之惑也晉宋而下士大夫好竒嗜怪取其侏離之言而文飾之而人始大惑矣非浮屠之能惑人也導之者之罪也今有人於此詭衣冠而談空無衆必止而詬之一旦有貴顯名譽之士亦從而效尤則人皆眙愕改觀未論其事之是非且以其人而信之矣幾何其不胥而為夷狄哉此有識之所憂而永嘆也二蘇張吕豈非近世所謂貴顯名譽之士乎而其學乃不知道徳性命之根原反引老荘浮屠不經之説而紊亂先王之典著為成書以行於世後生既未有所聞必以其人而尊信之漸染既深將如錮疾可不哀乎新安朱元晦以孟子之心為心大懼吾道之不明也弗顧流俗之譏議嘗即其書破其疵謬鍼其膏肓使讀者曉然知異端為非而聖言之為正也學者苟能因其説而求至當之歸則諸家之失不逃乎心目之間非特足以悟疑辨惑亦由是而可以造道焉故余三復而樂為之書云乾道丙戌孟冬晦日臺溪何鎬謹䟦古史餘論近世之言史者唯此書為近理而學者忽之予獨愛其序言古之帝王皆聖人也其於為善如水之必寒火之必熱其於不為不善如騶虞之不殺竊脂之不糓非近世論者所能及而所論史遷之失以為淺近而不學踈略而輕信亦中其病顧其本末乃有大不相應者竊以為於此有以識之則其逹於聖賢不逺矣作古史餘論本紀蘇子曰古之帝王皆聖人也其道以無為宗萬物莫能嬰之予竊以為此特以老子浮屠之説論聖人非能知聖人之所以聖者也故其為説空虚無實而中外首尾不相為用若削其其道以下而更之曰其心渾然天徳完具萬事之理無一不備而無有一毫人欲之私焉則庶乎其本正而體用可全矣印本皆作以無為為宗而蘇子嘗云佛書言以無為法者謂以無而為法非謂有無為之法也僧徒拙於文義乃以佛法為無為之法誤矣其言如此而其為黄帝紀亦但言以無為宗而為字不再出不應此序無字之下獨得有兩為字也蘇子之言雖非至論而於佛書文義猶為得之今復并失其指故略為之辨云至其所謂其積之中者有餘故推以治天下有不可得而知者則雖非大失而積與推者終非所以言聖人不若易之曰黙而該之者既溥博而淵泉故其揮而散之者自以時出而無不當則庶乎輕重淺深之間亦無可得而議也其曰管仲子産叔向之流皆不足以知者是則然矣至謂孔子知之至而未嘗言孟子知其一二而人不信則是以夫子之言為有隱孟子之知為未盡也且其謂數子之所未知孟子之所未盡與孔子之所知者皆果為何事耶若但曰以無為宗萬物莫能嬰之而已則數子之未知也不足恨而孔孟之所知吾恐其非此之謂也其必易之曰至於孔子葢全體焉而孟子之知亦足以至乎其極則庶乎數子之所未知者可得而言耳時以告人時字亦未當當改作然每字嗚呼秦漢以來史册之言近理而可觀者莫若此書而其所未合猶若此又皆義理之本原而不可失者豈其學之所從入者既己未得其正而其所以講磨體蹈之者又有所未精是以雖既其文而未既其實雖聞其號而未燭厥理也歟嗚呼聖學不傳其害可勝言哉黄帝紀云其師岐伯明於方士之言醫者宗焉然黄帝之書戰國之間猶存其言與老子相出入以無為宗其設於世者與時俯仰皆其見於外者也予謂此言尤害於理竊意黄帝聰明神聖得之於天其於天下之理無所不知天下之事無所不能上而天地隂陽造化發育之原下而保神練氣愈疾引年之術以至其間庶物萬事之理巨細精粗莫不洞然於胸次是以其言有及之者而世之言此者因自托焉以信其説於後世至於戰國之時方術之士遂筆之書以相傳授如列子之所引與夫素問握竒之屬葢必有粗得其遺言之彷彿者如許行所道神農之言耳周官外史所掌三皇五帝之書恐不但若此而已也今蘇子乃獨指其與老子相出入者為黄帝之本真而其前所叙載制作征誅開物成務之大法下至醫方炙刺之屬皆以為設於世見於外而與時俯仰者則是聖人之内外心跡判然兩途而其文章事業之見於世者皆不出於其中心之實然矣而可乎哉舜紀所論三事其一許由者是已然當全載史遷本語以該卞隨務光之流不當但斥一許由而已也然太史公又言箕山之上有許由冡則又明其實有是人亦當世之高士但無堯譲之事耳此其曲折之意蘇子亦有所未及也其一瞽象殺舜葢不可知其有無今但當知舜之負罪引慝號泣怨慕象憂亦憂象喜亦喜與夫小杖則受大杖則走父母欲使之未嘗不在側欲求殺之則不可得而已爾不必深辨瞽象殺舜之有無也其一舜禹避朱均而天下歸之則蘇子慮其避之足以致天下之逆至益避啓而天下歸啓則蘇子又譏其避之為不度而無恥於是凡孟子史遷之所傳者皆以為誕妄而不之信今固未暇質其有無然蘇子之所以為説者類皆以世俗不誠之心度聖賢則不可以不之辨也聖賢之心淡然無欲豈有取天下之意哉顧辭譲之發則有根於所性而不能已者苟非所據則雖巵酒豆肉猶知避之况乎秉權據重而天下有歸己之勢則亦安能無所惕然於中而不逺引以避之哉避之而彼不吾釋則不獲已而受之何病於逆避之而幸其見舍則固得吾本心之所欲而又何恥焉唯不避而彊取之乃為逆偃然當之而彼不吾歸乃可恥耳如蘇子之言則是凡世之為辭譲者皆隂欲取之而陽為遜避是以其言反於事實至於如此而不自知其非也舜禹之事世固不以為疑今不復論至益之事則亦有不能無惑於其説者殊不知若太甲賢而伊尹告歸成王冠而周公還政宣王有志而共和罷此類多矣當行而行當止而止而又何恥焉蘇子葢賢共伯而尚何疑於益哉若曰受人之寄則當遂有之而不可歸歸之則為不度而無恥則是王莾曹操司馬懿父子之心而楊堅夫婦所謂騎虎之勢也乃欲以是而語聖賢之事其亦誤矣夏紀與賢與子之論孟子言之盡矣彼以好異期聖人者固妄而謂聖人畏天下後世喜名失實之弊而後不敢與賢以為異至累數十百言以辨之者亦淺乎其知聖人矣序文所謂水寒火熱騶虞竊脂者又安在哉且於篇首即以苟字為言則其簡慢狥情之意勝又以不求為異為主則其同流合汚之願深大抵不知天命人心為義理本原之正而横斜曲直唯其意之所欲此則蘇氏膏肓沈痼之疾凡其父子兄弟少日之言若此類者不可勝舉而少公資禀稍為静厚故其晚歳粗知省悟而意聖賢之心不徒若是其卑也是以特序此書以救前失然舊習已安未易猝㧞而本原綱領終未明了故其平日之邪論乗間竊發而一時正見之暫明者不足以勝之也若長公之志林則終身不能有以少變於其舊又不逮其弟逺矣周論之云似矣然細考之有不能無失者請試言之夫民生之初固未始有禮義之文也然自其相生養而有父子則知有相愛之恩矣自其相保聚而有君臣則知有相敬之義矣是則禮義之實豈可謂之無哉今曰民生之初父子無義君臣無禮此其不知道體之言一也父子言義君臣言禮亦非是今以此等處多皆不暇辨也夫人唯其本有禮義之心也是以凡所作為有所凖則而知其安與不安所謂民之秉彛好是懿徳者也今曰無禮義矣則觸情而行從欲而動乃其當然無所不可而又謂其戚然有所不寜而後反求諸心以得所安則未知其何所凖則而知之也此其不知道體之言二也且人心固有禮義之實矣然非有聖人全體此心以當君師之寄因其有是實者而品節之則禮義之文亦何自而能立其品節之也雖非彊之以其所不欲然亦非苟狥其私意之所便也今味蘇子之言乃若以為天下之人自能為禮而無待於聖人又以為人之為禮但求以即其所安而不論其所安之凖則則其末流之弊必将反有至於裸袒踞肆而後己者此又其不察事理之言也若夫古今之變極而必反如晝夜之相生寒暑之相代乃理之當然非人力之可為者也是以三代相承有相因襲而不得變者有相損益而不可常者然亦唯聖人為能察其理之所在而因革之是以人綱人紀得以傳之百世而無弊不然則亦將因其既極而横潰四出要以趨其勢之所便而其所變之善惡則有不可知者矣若周之衰文極而弊此當變之時也而聖王不作莫能有變周用夏救僿以忠如孔子董生太史之言者是以文日益勝禮日益繁使常人之情有所不能堪者於是始違則作偽以赴之至於久而不堪之甚則遂厭倦簡忽而有横潰四出之患若秦之掃除二帝三王之迹而專為自恣苟簡之治以至於今遂有如蘇子所謂冠婚䘮祭不為之禮墓祭而不廟室祭而無所者正坐此也而蘇子固謂生民以來天下未嘗一日不趨於文即是又謂禮俗之變皆唯衆人之所自為而聖人之通其變者為無所與於其間也且曰日趨於文矣則又安有秦之苟簡與今之無禮如蘇子之所病而秦之苟簡與今之無禮又豈為治者真有革薄從忠之意而故為不文以從唐虞夏商之質如彼之所譏者耶其言反覆自相矛盾此又不察時變不審物情之甚者也然則有聖賢出而欲為今日之禮者宜奈何曰行夏時乗殷輅服周冕樂韶舞此吾夫子之言萬世不易之通法也今以繼周而言則固當救之以忠更以適時而慮亦恐其未能遽及夫文也亦曰躬行以率之講學以開之厚其實而粗品節之使其文雖未備而不至於鄙野大綱略舉而不至於難行則亦庶乎其有移風易俗之漸矣蘇子論戰國之勢以為當是之時雖有桓文之君假仁義挾天子以令之其勢將有所不行必得至誠之君子自脩而不争如商周之先王庶幾可以服之其為秦計則曰因秦之地用秦之民按兵自守修徳以來天下之民彼將襁負其子而至誰與共守此其言皆善矣其視史遷六國年表之云不啻美玉之視碔砆也然其為六國計但以齊魏之不受兵為驗則是不知文侯之時秦方以戎翟見擯於中國固未能窺兵於山東君王后之時秦方用逺交近攻之術日以三晉荆楚為事故為二國者得以少安而無患若孝公商鞅之後始皇李斯之時則如楚用子蘭齊用后勝召之㑹則㑹劫之朝則朝今日割五城明日獻十邑其事秦豈不甚謹而不争哉而卒以危亡之不暇蘇子之䇿亦不足以支矣然則冝奈何曰其亦彊於自治厚於養民博求聖賢之佐以自輔使徳之脩於己者秦一巳百秦十巳千固守四方交鄰以道使其勢出可以征而入可以守汲汲乎以一世生民塗炭䧟溺為己任而不專以求利於吾國為心焉則亦庶乎其可也若姑以自修者藉口而實專主於不爭以事秦則所謂自脩者吾恐區區之杯水不足以救焦邑滅都之火而所謂不爭者乃所以稔子蘭后勝之禍也彼孟子所以告齊梁之君者其本末次第之詳焉如何而其終也又未嘗不以無敵於天下為效豈若蘇子苟簡備數之言而已哉始皇紀論封建之不可復其説雖詳而大要直謂無故國之可因而已嘗試考之商周之初大賚所富已皆善人而其土地廣狹隨時合度無尾大外彊之患王者世世脩徳以臨之又皆長乆安寜而無倉卒傾摇之變是以諸侯之封皆得傳世長久而不可動非以有故國之助而然也秦至無道决無久存之理正使采公卿之議用淳于越之説並建子弟以自藩屏不過為陳吴劉項魚肉之資雖有故國之助亦豈能以自安也哉至若漢晉之事則或以地廣兵彊而逆節萌起或以主昏政亂而骨肉相殘又非以無故國之助而亡也蘇子之攷之也其已不詳矣至於又謂後世之封建者舉無根之人寄之吏民之上君民不親一有變故則將漂卷而去亦與秦之郡縣何異若使秦能寛刑薄賦與民休息而以郡縣治之雖與三代比隆可也夫以君民不親而有漂卷之患為不異於郡縣是固以封建為賢於郡縣但後世之封建不能如古之封建故其利害無以異於郡縣耳而又必曰以郡縣善而治之猶可以比隆於三代至於封建則固以為不可豈封建則不可以善治而必為郡縣乃可以善治耶若以無根為慮則吾又有以折之夫天生烝民有物有則君臣之義根於情性之自然非人之所能為也故謂之君則必知撫其民謂之民則必知戴其君如夫婦之相合朋友之相求既已聮而比之則其位置名號自足以相感而相持不慮其不親也如太公之於齊伯禽之於魯豈其有根而康叔之於衛又合其再世之深仇而君之然皆傳世數十衛乃後周數十年而始亡豈必有根而後能久耶至於項羽初起即戰河北其為魯公未必嘗得一日臨涖其民也而其亡也魯人猶且為之城守不下至聞其死然後乃降以至彭越之於梁張敖之於趙其為君也亦暫耳而欒布貫高之徒争為之死以至漢魏之後則已為郡縣久矣而牧守有難為之掾屬者猶以其死捍之是豈有根而然哉君臣之義固如此也若秦之時六國彊大誠不可以為治既幸有以一之矣則冝繼續其宗祀而分裂其土壌以封子弟功臣使之維持參錯於其間以義言之既得存亡繼絶之美以勢言之就使有如蘇子之所病則夫故國之助根本之固者又可於此一舉而兩得之亦何為而不可哉但秦至無道封建固不能待其乆而相安而為郡縣亦不旋踵而敗亡葢其利害得失之算初不繫乎此耳蘇子乃以其淺狹之心狃習之見率然而立論固未嘗察乎天理民彛本有之常性而於古今之變利害之實人所共知而易見者亦復乖戾如此是則不惟其窮理之學未造本原抑其暮年精力亦有所不逮而然也或曰然則為今之計必封建而後可以為治耶而度其勢亦可必行而無弊耶曰不必封建而後可為治也但論治體則必如是然後能公天下以為心而逹君臣之義於天下使其恩禮足以相及情意足以相通且使有國家者各自愛惜其土地人民謹守其祖先之業以為遺其子孫之計而凡為宗廟社稷之奉什伍閭井之規法制數度之守亦皆得以久逺相承而不至如今日之朝成而暮毁也若猶病其或自恣而廢法或彊大而難制則雜建於郡縣之間又使方伯連帥分而統之察其敬上而恤下與其違禮而越法者以行慶譲之典則曷為而有弊耶晦庵集巻七十二欽定四庫全書晦庵集卷七十三宋朱子撰雜著讀虞
