body:
  text: 觀文殿學士大中大夫知建康軍府事兼管内勸農使充江南東路安撫使馬步軍都總管營田使兼行宫留守彭城郡開國侯食邑一千六百户食實封二百户賜紫金魚袋贈光禄大夫劉公行狀代平父作本貫建寜府崇安縣開耀鄉五夫里曽祖民先故任承事郎累贈太子太保妣黄氏彭城郡夫人祖韐故任資政殿學士銀青光禄大夫諡忠顯累贈太師妣李氏秦國夫人繼吕氏韓國夫人父子羽故任右朝議大夫充徽猷閣待制累贈少傅妣熊氏福國夫人繼卓氏慶國夫人公諱珙字共父其先葢長安人唐末避地入閩遂為建人六世至忠顯公仕始通貴靖康中守真定有功京城失守金人得之欲以為將相義不辱而死少傅公紹興初佐川陜宣撫使軍事保障梁益為中興名臣公其長子也生有竒質英悟絶人少長從季父屏山先生受書知刻苦自勵屬文敏有思致一時鄉先生皆歎以為不可及始以忠顯公死節恩補承務郎舉進士一上中紹興十二年乙科調監紹興府都税務請監潭州南嶽廟以歸杜門讀經史書討論纂述益務其逺且大者秩滿差主管西外敦宗院未赴遭外艱既禫而韓國夫人薨持重終喪除諸王宫大小學敎授權祕書省校勘書籍官禮部郎官中書舎人時秦丞相當國用事一日微示風㫖欲為其父作諡以公不亟奉行也怒風言者論去之踰年秦丞相死乃得主管台州崇道觀召為大宗正丞未就職改祕書丞兼權吏部郎官即真尋除監察御史避薦者復還故官公前在銓曹時苦吏為姦思有以制之一日命張幕設案於庭置令式其中使選集者得出入繙閱與吏辯吏無得藏其巧人甚便之間攝侍郎引選人改官班占對詳敏天子悦焉且聞其能檢柅吏姦故因其引嫌復委以選事兼權祕書少監遷起居舍人兼權中書舎人㑹金人渝盟天子震怒將悉鋭師北向以雪讐耻復土疆一時詔檄多出公手詞氣激烈聞者感奮或至泣下御史杜莘老既擊侍醫王繼先逐之又論宦者張去為遂以忤㫖左降公不草制奏留之莘老得不去從車駕視師建康兼權直學士院既而車駕將還臨安江淮軍務未有所付張忠獻公方典留鑰衆望屬之而詔乃以楊存中為宣撫使中外大失望公不書録黄奏論其不可上怒顧宰相曰劉珙之父為張浚所知其為此奏意專為浚地耳宰相召公喻㫖且曰再繳累且及張公公曰珙為國家計故不暇為張公謀若為張公謀則不為是以累之矣命再下執奏如初存中命乃寢未幾真除中書舍人直學士院召入草制立建王為皇太子今上皇帝既即位詔公借禮部尚書使金國是時南北甫罷兵始為鈞敵之禮敵意不可測公受命慷慨不復問家事入辭母夫人戒家人悉裘葛兼副以行曰藉令不死歸未可期也副使某者以選置官屬不公抵罪上以為公辟召無所私手札褒諭之尋以議禮不决未出疆而還然公於是時固以其死許國矣在掖垣凡三年事有不便者知無不言嘗有詔問足食足兵之策公以擇將帥核軍實為對甚悉㑹有太白經天旱暵飛蝗之變詔復問近臣闕政公又奏曰太白兵象也旱蝗盭氣也今仇敵窺覦哆然未厭而國家因仍縱弛有賞無罰諸將専事刻剥以媚權倖取官爵士卒怨之有甚於仇敵者且輿土未復地狹民貧而費用日滋征求日廣為監司者不卹郡為郡者不卹縣為縣者不卹民至或重為貪虐以肆其心則百姓之苦於官吏亦不異於士卒之仇將帥也然則天人相與之際夫豈偶然而已哉欲救其失唯當信賞必罰以肅將帥之心痛懲刻剥以固士卒之志節浮冗練軍實精擇郡守誅鉏贓吏以厚吾民之生而是數者之得失則又係乎人主之心誠與不誠耳陛下審能擴恭儉日新之徳屏馳騁無益之戯登崇俊良斥逺邪佞常使日用之間有以養吾之誠而無害焉則夫數者固將有所依以立而災異之變庶乎其可銷矣間又嘗為上言應敵無一定之謀而彊國有不易之䇿今曰和曰戰曰守者皆應敵之計因事制宜不可膠於一説者也若夫不易之策則必講明自治之術博詢救弊之原毋事虚文専責實効使政事修舉國勢日彊然後三者之權在我唯所用之無不如志今議者自紛紛於末流而於其本未有言者臣竊為陛下憂之上皆納焉故將田師中死其家請以没入王繼先園第為賜詔許之公以師中久竊兵柄無尺寸功貪饕刻剥為國家斂士卒之怨不當予方為繳奏以聞而其家復以請公以録黄稽程被詰亟奏俟罪而持之愈力於是乃不果賜有迪功郎李珂者以闗通近習得補官而自奏求為督府掾詔除已下公奏曰珂名品至卑不繇召見敢以劄子非分祈恩非所以嚴堂陛之勢杜邪枉之門也且今邉郵大計方倚督府為重官屬尤當審擇如珂小人非惟不堪此選政恐或能妄作以沮撓其事機也奏上改除珂樞宻院編修官公論執益堅乃罷之然亦竟以數直諫不得久居中而宰相亦有隂忌公者隆興元年冬除集英殿修撰知泉州明年改衢州始至委事僚屬一無所問人以公未更治民意其懵於事或不屑為者既乃一旦悉取而自為之辨察精明區處的當羣下歛手不能有所為人始大服先是吏員猥衆公視員外置者悉罷之受租米輒使民自操量槩其發鈔銷簿亦皆有法人甚便之㑹湖南旱饑官吏不之恤而郴州宜章縣方抑民市乳香期㑹峻迫有李金者乘衆怒奮起為亂衆餘萬人南逾嶺徼分道犯英韶連廣徳慶肇慶封梧賀州之境旁入道州桂陽軍殺掠萬計州縣不知所為至斂民間金帛賂之以免由是賊勢日盛而帥守監司更共蔽匿不以實聞賊遂犯宜章䧟桂陽聲震逺近朝廷憂之以公為敷文閣待制知潭荆湖南路安撫使是嵗乾道元年也公以五月入境則賊衆己數萬人矣公聲言發郡縣兵討擊且檄鄰道謹斥堠守隘塞聴期㑹而亟以實奏請下荆㐮發卒奔命又度此章下或已歴旬時失幾㑹則移書制置使沈介曰請毋須報而亟遣以來擅興之罪吾自當之不敢以累公也介為遣兵詔亦報如公請然皆未有至者賊勢愈盛而湘隂縣橋口鎮羣盜劉花三李無對者又竊發距城郭僅六十里人情益震公亟簡州之役兵得三百人使部將趙彦帥之合巡尉兵以行下令戕舟發梁募有生得盜者錢若干得其首者錢若干凡盜所挾贓無多少悉給捕者不數日彦等擒捕三十餘人公悉以便宜誅之梟首於市餘盜走多溺死其散入墟落者又為村民縳以送府又悉誅之奏將尉有功者皆被賞於是威聲大振吏士用命人心少安六月制置使所遣遊奕軍統制田寳乃以千人至居數日鄂州水軍統制楊欽又以千五百人至公知其暑行疲怠悉為發夫迎之數程之外代其任負以行軍士固已歡呼感激及至撫勞犒賜又皆豐飫過望諸軍益喜盡死力欽故羣盜楊么部曲公知其可用檄諸軍皆受節度使率其衆鼓行而前下令境中凡軍民討捕有功者皆以率受賞其賊所誘脅能相捕斬以詣吏者亦除罪受賞有差是月晦田寳大敗李金於郴州城下追奔二十餘里殺獲甚衆七月楊欽敗賊黨田政尹寛等於桂陽鄂將谷青王翌又各以二千人至公遣扼宜章大路以分賊勢通糧道而欽連戰破賊遂入宜章八月鏖龍岡下賊兵數萬自辰至申官軍稍却欽被髮大呼䇿馬横衝之賊分為兩其前列精兵殱焉餘皆遁走進至莽山賊徒曹彦黄拱遂執李金與其腹心黄谷以降欽因窮追深入盡誅其酋豪而其支黨脅從者尚衆皆竄入山谷間公喻欽等郤兵而使人賫牓聴其自詣則皆相率聴命嵗盡師還李金黄谷等數十人皆伏誅其降者公皆稱詔給據納兵復故田宅葢以十數曹彦黄谷皆奏補官而厚撫之既乃第録諸將功狀列上又盡得其實不以一毫有所私上嘉歎再三詔以為敷文閣直學士且賜璽書曰近世書生但務清談經綸實才葢未之見朕以是毎有東晉之憂今卿既誅羣盜而功狀詳實諸將優劣破賊先後歴歴可觀甚副朕意卿其益勉之哉賊地既定境内已清公乃喟然歎曰吾豈樂殺人哉向者軍興令不可以不肅而今而後庶有以諒吾心矣吾豈樂殺人哉自是一意於撫摩之政且為請於朝曰今欲懲既往之失銷未形之患莫若擇守宰寛賦歛以安吾民而已不此之圖一李金死一李金生臣恐湖南自是無寜嵗也奏留鄂兵戍郴桂而益廣蒐募以補忠義親兵之缺厚其恩意嚴其紀律而時訓習焉於是湖南隠然為重鎮方地數千里外户不閉商旅野宿焉潭州故有嶽麓書院真廟特賜以敕額給田與書經亂蕪廢公一新之養士數十人延禮修士彪君居正使為之長而屬其友廣漢張侯栻敬夫時往遊焉與論大學次第以開其學者於公私義利之間聞者風動三年召還見上首論獨㫁雖英主之能事然必合衆智而質之以至公然後有以合乎天理人心之正而事無不成若棄僉謀狥私見而有獨御區宇之心焉則適所以蔽其四達之明而左右私昵之臣將有乘之以干天下之公議者矣又論税絹退剥羨餘和糴之弊又論州郡禁軍紀律不明驕惰自恣宜遴選武臣之奮行伍習戎事者使為將副而貴游子弟閤門國信五房出職之輩不得與焉則州郡之軍政庶乎其可修矣上然其言以為翰林學士知制誥兼侍讀間復從容言於上曰世儒多病漢髙帝不悦學輕儒生臣竊獨以為髙帝之聰明英偉其所不悦特腐儒之俗學耳誠使當世之士有以聖王之學告之臣知其必將竦然敬信而其功烈之所就不止於是而已矣葢天下之事無窮而應事之綱在我唯其移於耳目動於意氣而私欲萌焉則其綱必弛而無以應夫事物之變是以古之聖王無不學而其學也必求多聞必師古訓葢將以明理正心而立萬事之綱也此綱既立則雖事物之來千變萬化而在我常整整而不紊矣惜乎當是之時學絶道喪未有以是告髙帝者上亟稱善是嵗小不登公請亟詔監司郡守先事條畫來年荒政所宜不者亦使任其無他又奏州兵營伍教戰之法甚備上由是益知公學問精深忠義慷慨可任大事十一月擢拜中大夫同知樞宻院事公辭謝不獲乃就職因進言曰汪應辰陳良翰張栻學行材能皆臣所不逮而栻窮探聖微曉暢軍務曩幸破賊栻謀為多願陛下亟召用之上可其奏以次登用焉公以西府本兵柄於諸將之能否不可以不周知乃自諸管軍統制官下至裨佐日召三數人從容與語得其材用所宜輒筆識之以待選用一日上顧輔臣圖議恢復公奏曰復讎雪恥誠今日之先務然非内修政事有十年之功臣恐未易可動也同列有進而言者曰機㑹之來間不容髮奈何拘此曠日彌久之計且漢之髙光皆起匹夫不數年而取天下又安得所謂十年修政之功哉公曰髙光唯起匹夫也故以其身蹈不測之危而無所顧陛下躬受太上皇帝祖宗二百年宗社之寄其輕重之勢豈兩君比哉臣竊以為自古中興之君陛下所當法者惟周宣王而已宣王之事見於詩者始則側身修行以格天心中則任賢使能以修政事而已其終至於外攘戎狄以復文武之境土則其積累之功至此自有不能已者非一旦率然僥倖之所為也上以公言為然四年七月詔兼㕘知政事公方與一二同列夙夜悉心竭力益圖所以叙進人材寛養民力計理軍政務以成上意之所欲為者葢除福建鈔鹽嵗額二萬萬罷江西和糴及廣西折米鹽錢又蠲累年逋負金錢穀帛巨億計而公尤以輔成上徳振肅朝綱抑僥倖奨廉退為己任進則盡言無隠退亦未嘗輕以詞色假人茍清議之所不與不以親故而有所私也以是近倖仄目而流俗亦多不悦公者先是潜邸使臣龍大淵曽覿者慿恃舊恩暴起富貴公論不平者累年上一日發寤逐去之未幾而大淵死上顧憐覿欲還之公力陳其不可且曰此曹奴𨽻耳憐之則厚賜之可也今引以自近而賓友接之至使得以與聞機事進退人才則臣懼非所以増盛徳之光華飭治朝之綱紀也上納公言為止不召殿前指揮使王琪謁告至淮上還宻薦和州教授劉甄夫上諭執政召之諸公相問莫有知其所自來者公曰薦士吾徒之責可不知耶明日請曰此人名微位下陛下何自知之上以琪告公又請其所以薦上曰卿自問之公退坐堂上呼吏作頭引追之琪至公詰其故授牘使對琪恐懼不能置辭久之公乃叱使責戒勵狀而去無何揚守來言前琪過郡稱受宻㫖増所築新城若干尺諸公請之初未嘗有是命也公既與諸公合奏請其罪罷之因奏自今聖㫖不經三省察院者所下之官皆請俟奏審乃得行上欣然從之公即從宻院移中外諸官府而内侍省與焉明日忽復有㫖前奏審事勿行因諭諸公即如此則或須一飲食亦必奏審乃得邪公即以藝祖熏籠事對退又與諸公合奏言曰朝廷者陛下之朝廷命令者陛下之命令臣等偶得備數其間典司出納而已非敢有所専也今方舉行舊典以正紀綱而已出復收中外惶惑竊恐小人有因疑似微以姦言上激雷霆之怒者願陛下察之上不悦曰朕豈以小人之言而疑卿等者耶時諸公雖更進懇請而公言尤激切故獨罷公為端明殿學士在外宫觀改知隆興府江南西路安撫使公入辭猶以開廣言路講明聖學敦本節用虚己任賢斥逺佞邪選將撫軍數事為獻上蹵然曰卿雖去國不忘忠言而材又非他人所及行召卿矣隆興承前帥刻剥之後場務皆増新額而輸租更用方斛視省量率多斗餘公首罷之屬邑奉新有復出税錢三十五萬有竒租六百二十八石攤配諸鄉多有視正税且什四嵗久困不能輸相率逃去田畝榛蕪所攤固不可得而失正税又數倍公奏蠲之又除二税合零租米暗耗免役足錢之弊人或為公憂不足公量入為出用度未嘗乏也暇日咨訪賓僚講求利病率常一二延見使得從容各盡所懐以故下情宣通舉無過事而其人之器識短長亦無所隠訟訴有久不决者取其案牘藏之旬日輒召㑹官屬之賢可委者合坐堂上人付一二事使平决之有司供具飲食如法至暮白所予奪而退其大事則公先閲視黙有所處然後參衆説以决焉以故多得其情無不厭服明年除資政殿學士知荆南湖北路安撫使始至條上荆㐮兵少財匱之狀詔即諉公措置公因行視㐮鄂兵屯並邊形勢盡得其實以聞凡圖回役使詭名虚籍之弊與夫部伍教習之法有不善者皆奏罷之先是荆南兵戍㐮陽者累年不得歸父子至不相識公奏為半年番休之法春夏三軍秋冬四軍更迭往來軍士感悦荆㐮故有民兵皆農家子敦樸豪勇又有土著常産自愛惜且居近邊知敵情輕戰鬭比稍墮廢公更為簡閱寛其取丁之數貧者弛其賦役隨鄉團結以七十五人為隊隊有長四隊為部部有將縣置總首都副各一人當教則郡為選官訓練已事而罷之至於資糧械器皆為處畫各有條理撫循犒賞嵗費錢一萬萬而不以一介有取於民也明年遭内艱又明年起復同知樞宻院事荆㐮宣撫使遣中使奉璽書即喪次宣押奏事其書曰朕以荆㐮上流宿師尤重欲以軍民之寄付卿其任重矣奪情臨民國有常典况吾大臣義當體國毋以家事辭王事也公六上奏辭不肯起引經據禮詞甚切至最後言曰三年通喪先王因人情而節文之三代以來未之有改至於漢儒乃有金革無避之説此固己為先王之罪人矣然尚有可諉者則曰魯公伯禽有為為之也今以陛下威靈邉陲幸無犬吠之警臣乃欲冒金革之名以私利禄之實不亦又為漢儒之罪人乎且孝之與忠豈有二致事君事親初無兩心使親喪而可奪則他日所以事君可知矣況陛下方以天下奉兩宫之驩而以衰絰不祥之人簉迹二三大臣之間殆非所以全孝治之美且使仇敵聞之亦必以為中國乏材乃至如此而敢肆其輕侮此臣所以受恩感激反覆慮思而卒不能起也抑陛下之詔臣則有曰義當體國者矣臣其敢噤無一言以塞明詔哉乃手䟽别奏以聞其畧曰天下之事有其實而不露其形者無所為而不成無其實而先示其形者無所為而不敗今徳未加修賢不得用賦歛日重民不聊生將帥方割士卒以事苞苴士卒方飢寒窮苦而生怨謗凡吾所以自治而為恢復之實者大抵濶畧如此而乃外招歸正之人内移禁衞之卒規算未立手足先露其勢適足以速禍而致亂臣不知為此議者將何以待之也且荆襄四支也朝廷腹心元氣也誠使朝廷設施得宜元氣充實則克復神州在反掌間耳何荆㐮之足慮如其不然則荆㐮雖得臣輩百人悉心經理顧亦何足恃哉以今而慮臣恐恢復之功未易可圖而意外立至之憂將有不可勝言者惟陛下圖之上納其言為寝前詔八年免喪乃復除知潭州安撫湖南過闕見上言曰人君能得天下之心然後可以立天下之事能循天下之理然後可以得天下之心然非至誠虚已兼聴並觀使在我者空洞清明而無一毫物欲之蔽亦未有能循天下之理者也因引其意以傅時事言甚切至上加勞再三進職資政殿大學士以行湖南公舊鎮威惠之在人者久而愈深及是再至葢有不待教令而孚者而公所以自律者愈嚴所以撫民者愈寛以是人愈畏服而敬愛之㑹安南貢馴象所過發夫一縣至二千人除道路毁屋廬數路騷動公奏曰象之用於郊祀不見於經驅而逺之則有若周公之典且使吾中國之疲民困於逺夷之野獸豈仁聖之所忍為也哉嵗旱公亟遣官吏行視蠲放田租聞郴道桂陽民饑則檄轉運常平司移粟賑之且慮山谷姦民乗時竊發則又遣將益兵戍守遂以無事一旦茶鹽數千人入境疆吏以告公曰此非必死之寇緩之則散而求生急之則聚而致死乃處處揭榜喻以自新聲言大兵且至令屬州縣具數千人之食盗果散去獨餘五百許人公乃遣兵戒曰來毋亟戰去毋窮追毋遏其塗不去者乃擊之耳於是盜之存者無幾進兵擊之盡擒以歸公獨奏誅首惡數人餘悉以𨽻諸軍明年盗之餘黨賴文政等復入境後帥曰此前日養寇罪也吾必盡誅之盗聞其言悉力死戰既勦湖南軍遂入江西侵擾數州官軍數敗將吏死者數十人為費以數萬計於是人乃服公為有謀也淳熈二年除知建康府江南東路安撫使行宫留守始至孔目吏有為姦利稔惡數十年者杖而黥之一郡稱快㑹嵗水旱髙下田皆不收公首奏倚閣下三等户夏税為錢六十萬紬絹二千疋綿三千兩分遣官吏行田蠲正租米十三萬七千八百斛雜折米又二萬八千七百斛豆草蕟茭布租稱是又奏下漕司遣吏行屬州視其所蠲租頗未盡者悉以與民又奏禁上流税米遏糴違者劾治如法即在他路亦願得以名聞請其罪詔從之得商人米三百萬斛貸樁管及總司錢合三萬萬遣官糴米上江又得十四萬九千斛又奏禁州縣毋得督舊逋以重困饑民借常平米付圩户堤塞缺漏籍農民當賑貸者若干户十口以上一斛六口以上八斗五口以下六斗客户當賑濟者若干户五口以上五斗四口以下三斗又運米村落從本價賑糶合十餘萬斛而貸者卒亦不取償焉置局府中以通判府事趙善珏觀察推官王以寜前蘄州教授李宗思新楚州教授劉煒領之而分遣羣屬循行境中窮山僻壌無所不到公又憊心疲精廣詢博訪夙夜不少懈凡官吏奉行之不謹民間寃苦之無告幽隠纎悉無不畢聞縣給印厯親書所聞告諭奨詰絡繹於道無不切中事宜者葢本之以誠意輔之以賞罰是以人人争效其力如辦已事起是年九月盡明年四月闔境數十萬人無一人捐瘠流徙者上嘉其績賜書褒喻焉公治財寛於民而急於吏二税之入所以禁其漁取察其蠧弊者甚悉自累鎮所施行每益加詳至是人被其澤尤深凡屬縣所負課不能償者悉以丐之而禁其非法病民者至於蠲租振廩其費又數十巨萬而軍吏糧賜皆隨月遣給無不暨者被㫖甓城面大以萬計者數千用錢八千萬米千五百斛而役不及民又償前帥所負内庫錢三萬上積公勞効賜手札勞奨賚以鞍馬器物甚厚府四十年不葺弊甚公一新之以明道程公先生嘗主上元簿即學祠之且刻陳忠肅公責沈之文於壁以示學者建康大軍所屯盗賊常竄迹尺籍中吏不能禁公耳目跡捕每發輒得繩以重典盗皆相戒遁去市里晏然道無拾遺者明年進觀文殿學士五年閏月屬疾再請奉祠未報則請致仕上意公疾病亟遣中使挾侍醫以來公亦知疾不可為不復得見上矣即草遺奏千餘言首引恭顯伾文以為近習用事之戒且言今以腹心耳目寄之此曹故士大夫倚之以媒其身將帥倚之以饑其軍牧守倚之以賊其民朝綱以紊士氣以索民心以離咎皆在是願亟加屏逺以幸天下若羣臣之賢臣所知者則唯陳俊卿忠良確實可以任重致逺張栻學問醇正可以拾遺補闕願陛下亟召用之則衆賢彚進而羣小黜伏矣既又手書屬敬夫及其故友新安朱熹仲晦父及從弟玶皆以國恩未報國恥未雪為言然後以家事為寄七月甲子疾革命取前所草奏封上之遂以是日薨于府寺之正寢享年五十有五訃聞上為震悼始從公請轉通議大夫致仕贈光禄大夫輟視朝一日詔建康府致其喪建寜府給塟事公娶吕氏兵部尚書祉之女贈新定郡夫人繼韓氏贈新興郡夫人又娶其季贈淑人皆魏國忠獻公四世孫也二男子學雅承務郎學裘承奉郎二女長適將仕郎吕欽㓜未行六年二月乙巳塟于甌寜縣慈善鄉豐樂里新歴之原公所命也公為人機鑒精明議論英發遇事立㫁其威不可犯而居家極孝慈事繼母慶國夫人禮敬飭備遭喪時年逾五十執禮盡哀以致毁得疾幾殆友愛諸弟晚嵗彌篤嵗時祭祀配古今禮而敬以行之内外功緦之戚必素服以終月數在官為罷燕樂聞同寮有喪者亦如之福國夫人蚤薨公哀慕無以自致出疆侍祠再當得任子恩欲奏官其内弟輒不遂竟三奏然後得之所治有骨月之訟皆召至前喻以恩意責以義理反覆詳盡至或深自引咎詞意懇切聞者悔悟感泣往往失其所争而去遺命治喪毋用浮屠法平居樂取人善不啻如已出與張敬夫朱仲晦父游久而益敬信之居官樂受盡言事小失中雖下吏言之無不立改以是得南豐曽撙於湖南幕府厚遇之公去撙為後帥所惡誣奏奪其官公在建康力為辨理得伸而要路有忌公者奏却之葢其意不在撙也公不悔遇撙益厚在朝廷危言正色直前無所避其忠義奮發不以死生動其心葢得乎家世之傳而論事之際務在審宻持重不肯為僥倖嘗試之舉其侍上語毎及恢復大計必以修政事固根本為先辭起復手疏盡發當時用事者大言不顧罔上誤國之姦大臣葢不悦而上獨深察其忠其在方鎮愛民戢吏平訟獄理財用治軍旅除盜賊皆有科指而尤以敦教化厲風俗為急務葢其生質雖髙聞譽雖蚤而徳成望尊尤在晚節故天子知之久而益深増秩賜金勞問狎至葢將有意復用之也士大夫之賢者平日固多豫附其不能無私意異説者晚亦相與歸重及聞其喪無賢不肖莫不慘然相弔恨國家失此洪毅忠壯忘身憂國之臣也所臨數鎮民愛之如父母聞訃有罷市巷哭者至於諸軍將吏外暨邊圉則於公家威名義烈服習葢久莫不想聞其風采軍士固敬愛之而敵諜者至荆㐮亦每詗今劉公於延康為何屬也延康葢忠顯公舊官云公自少即以文學知名於時及登朝廷入禁掖論思潤色當世尤稱其得體而平居未嘗輒為無用之文間有應酬之作隨輒棄去後省駁議又多削藳故今存於家者文集八卷奏議十卷内外制二十卷而已然公之所以自立於不朽者有不在於空言也玶謹按令甲考公品秩實應誄行易名之典其姓名事迹又當得書信史以示來世故敢狀其鄉里世系歴官行事之實如右以告於太常考功并移太史氏而其事闗國體軍機之重者猶弗敢盡著尋第録别上謹狀淳熈九年四月日從弟從事郎玶狀籍溪先生胡公行狀先生諱憲字原仲姓胡氏建州崇安人故侍讀南陽文定公從父兄之子也祖聳父淳皆不仕先生生而沈静端慤不妄言笑稍長從文定公學始聞河南程氏之説尋以鄉貢入太學㑹元祐學有禁乃獨與鄉人白水劉君致中隂誦而竊講焉既又學易於涪陵處士譙公天授久未有得天授曰是固當然葢心為物漬故不能有見唯學乃可明耳先生於是喟然歎曰所謂學者非克己工夫也耶自是一意下學不求人知一旦揖諸生歸隠于故山非其道義一毫不取於人力田賣藥以奉其親文定公稱其有隠君子之操而鄉人士子慕從之遊日以益衆一時賢士大夫聞其名者亦皆注心髙仰之於是從臣折公彦質范公冲朱公震劉公子羽吕公祉本中共以先生行義聞於朝詔特徴之先生以母老辭既而折公入西府又言於上促召愈急先生辭益固乃授左迪功郎添差建州州學敎授先生猶不欲起郡守魏公矼為遣行義諸生入里致詔且為手書陳大義開譬甚力先生不得已乃出拜命既就職日進諸生而告之以古人為已之學聞者始而笑中而疑久而觀於先生所以修身所以事親所以接人無一不如所言於是翕然尊信悦服而先生猶以為未足也郡人程君元以馴行稱龔君何以廉節著皆迎致之俾參學政於是教日益孚士日益化秩滿復留者再葢七年不徙官而太夫人年益髙不樂居官舎求得監南嶽廟以歸居累年間嘗一為福建路安撫司凖備差遣帥守大鬻鹽私販者雖銖兩必重坐先生為陳法義請寛之而帥守顧不悦先生於是有去意久之復請奉祠以歸是時秦檜用事天地閉塞幾二十年先生亦已泊然無復當世之念及檜死羣賢稍復進用白以先生為大理司直未行改秘書省正字人謂先生必不復起而先生一辭即受雖門人弟子莫不疑之到館下累月又黙黙無一言人益以為怪㑹次當奏事殿中而病不能朝即草疏言金人大治汴京宫室勢必敗盟今元臣宿將惟張浚劉錡在而中外有識皆謂敵果南牧非此兩人莫能當惟陛下亟起而用之臣死不恨矣時二公皆為積毁所傷上意有未釋然者論者雖或頗以為説然未敢斥然正言之也至先生始獨極意顯言無所顧避疏入即求去諸公留之不得上亦感其言以為左宣教郎主管崇道觀使歸而食其禄於是向之疑者乃始愧歎心服而繼其説者亦益衆以故二公卒召用而先生則以病不起矣紹興三十二年四月十二日也享年七十有七明年塟於建陽縣東田里先生兩娶劉氏皆白水先生之女弟又娶嚴氏子男一人愉蚤世女一人適進士詹炳孫男親仁治進士業先生質本恬澹而培養深固平居危坐植立時然後言望之枵然如槁木之枝而即之温然雖當倉卒不見其有疾言遽色人或犯之未嘗校也其讀書不務多為訓説獨嘗纂論語説數十家復抄取其要附以己説與他文章藳藏於家先生所與同志唯白水先生既與俱隠又得屏山劉公彦沖先生而與之遊更相切磨以就其學而熹之先君子亦晚而定交焉既病且没遂因以屬其子故熹於三君子之門皆嘗得供洒掃之役而其事先生為最久先生塟時親仁尚㓜不克銘乃令屬熹使狀其行將以請於當世之君子熹不敢辭謹件如右以俟采擇謹狀淳熈五年七月日門人宣教郎主管台州崇道觀朱熹狀皇考左承議郎守尚書吏部員外郎兼史館校勘累贈通議大夫朱公行狀本貫徽州婺源縣萬年鄉松巖里曽祖振故不仕妣汪氏祖絢故不仕妣汪氏父森故贈承事郎妣程氏贈孺人公諱松字喬年以紹聖四年閏二月戊申生於邑里之居第未冠繇郡學貢京師以政和八年同上舎出身授迪功郎建州政和縣尉丁外艱服除更調南劒州尤溪縣尉監泉州石井鎮紹興四年召試館職除秘書省正字循左從政郎丁内艱服除召對改左宣教郎除秘書省校書郎遷著作佐郎尚書度支員外郎兼史館校勘歴司勲吏部兩曹兼領史職如故與修哲宗實録書成轉奉議郎以年勞轉承議郎出知饒州未上請間得主管台州崇道觀滿秩再請命下而卒紹興十三年三月二十四日辛亥也公生有俊才自為兒童時出語已驚人少長遊學校為舉子文即清新灑落無當時陳腐卑弱之氣及去場屋始放意為詩文其詩初亦不事雕飾而天然秀發格力閑暇超然有出塵之趣逺近傳誦至聞京師一時前輩以詩鳴者往往未識其面而已交口譽之其文汪洋放肆不見涯涘如川之方至而奔騰蹙沓渾浩流轉頃刻萬變不可名狀人亦少能及之然公未嘗以是而自喜一日喟然顧而歎曰是則昌矣如去道愈逺何則又發憤折節益取六經諸史百氏之書伏而讀之以求天下國家興亡理亂之變與夫一時君子所以應時合變先後本末之序期於有以發為議論措之事業如賈長沙陸宣公之為者既又得浦城蕭公顗子莊劒浦羅公從彦仲素而與之遊則聞龜山楊氏所傳河洛之學獨得古先聖賢不傳之遺意於是益自刻勵痛刮浮華以趨本實日誦大學中庸之書以用力於致知誠意之地自謂卞急害道因取古人佩韋之義以名其齋蚤夜其間以自警飭繇是向之所得於觀考者益有以自信而守之愈堅故嘗稱曰士之所志其分在於義利之間兩端而已然其發甚微而其流甚逺譬之射焉失毫釐於機括之間則差尋丈於百步之外矣又嘗以為父子主恩君臣主義是為天下之大戒無所逃於天地之間如人食息呼吸於元氣之中一息之不屬理必至於斃是以自昔聖賢立法垂訓所以維持防範於其間者未嘗一日而少忘其意豈特為目前之慮而已哉是時宣和之季士之干世至是已無可言者矣旋屬靖康之變中朝蕩覆公在尤溪方與同寮燕集忽有以北狩之問來諗者公聞震駭投袂而起大慟幾絶既而建炎再造王室漂摇未有所定敵騎縱横道路梗塞固不暇於博求幽逺以盡一世人材之用而公抱負經竒尤恥自售以求聞達以是困於塵埃卑辱鋒鏑擾攘之中逃寄假攝以養其親十有餘年以至下從算商之役於嶺海魚鰕無人之境則已無復有當世意矣㑹詔出御史胡公世將撫喻東南公乃因謁見而説之曰古之為天下國家者必有一定之計以為子孫萬世之業未有俯仰依違茍度朝夕曾不為終嵗之備而可以為國者也今日廟堂之議固必有所謂一定之計矣然未知其但欲襟慿江漢控引荆吴以保東南而已乎抑當克復神州汛掃陵闕據中原而撫三河也葢嘗聞之不取闗中中原不可復不取荆淮東南不可保唐唯不失闗中故更三亡不失舊物而吴孫氏東攻新城西攻㐮漢乃所以保建業其後桓温劉裕雖能以江漢舟艫西入河渭然既得之而不能守則亦僅足以保東南而已然則天下之大勢可知已今進既不能以六師之重通道荆㐮循漢沔以赴興元結連拓跋控引五路東嚮以圖中原退又不能移蹕建康治兵訓武北争荆淮以為固守之計而但蹙處一方費日月於道塗前不能有尺寸之利後又無所保以為安未知漂漂者竟何如耶胡公竒其言壯其䇿歸即以聞於朝而泉守資政殿學士謝公克家隨亦露章薦公學行之懿不宜滯筦庫於是乃得召試而發䇿者以中興事業之難易後先為問公即對言自古謀國有得失而成功無難易葢天下國家有至計而國勢之强弱兵力之盛衰土地之開蹙不與焉唯能順人心任賢才正綱紀則天下之事將無難之不易惟上之人惜時愛日而亟圖之反覆馳騁辯説縱横出入古今證驗精博日未昳奏篇已上累數千言而文不加㸃髙宗覽而異焉趙忠簡公方以元樞受詔西督川陜荆㐮軍事欲奏取公為屬㑹太夫人屬疾不果既遂遭喪以歸而趙公卒亦不果行也再召入對時上已用張忠獻公之䇿進次建康指授諸將計日大舉以復中原國勢亦小振矣公始進見欲堅上意以遂中興之業即奏言曰陛下以聖哲之資撫艱難之運側身焦思累年于兹而民困兵弱外敵侵凌勘定之勲久而未集意者陛下殆當抗聖志於髙明而輔之以睿智日躋之學垂精延訪蚤夜汲汲以求宗廟社稷經逺持久之計申明紀律崇奬節義而又以民心為基本忠良為腹心則臣有以知外敵之不足憂而恢復大功指日可冀矣因論自古中興之君唯漢之光武勤勞不怠身濟大業可以為法晉之元帝唐之肅宗志趣卑近功烈不終可以為戒反覆切至而猶慮夫計畫之間或未精審無以服衆心而成大功也則又言曰人主操大權以御一世必有所以處此者有以切中於理然後足以深服天下之心是以無為而不成今萬機之務決於早朝侍立逡巡之頃未有以博盡謀謨之益使其必當事理以服人心謂宜畧放唐朝延英坐論之制仰稽仁祖天章給札之規延訪羣臣博求至計然後總攬參訂以次施行則政令之出上下厭服天下之事無所為而不成矣顧又嘗病士溺於俗學而不明君臣之大義是以處於成敗之間者常有茍生自恕之心而缺於舎生取義之節將使三綱淪墜而有國家者無所恃以為安則又奏言宜鑒既往之失深以明人倫勵名節為先務而又博求魁磊骨骾沈正不回之士寘之朝廷使之平居無事正色立朝則姦萌逆節銷伏於㝠㝠之中一朝有緩急則奮不顧身以抗大難亦足以禦危辱凌暴之侮則庶幾乎神器尊嚴而基祚强固矣上悦其言而於光武晉唐之論尤所嘉歎明日以喻輔臣且論元帝肅宗之失而尤以元帝區區僅保江左畧無規取中原之志為誚乃詔改公京秩仍典校中秘書則當是之時聖志所存亦可見矣不幸適有淮西殺將叛兵之變中外恫疑異議蠭起張公至為解相印去而國論遂變至欲盡撤兩淮之戍還建康以自衞公深以為不可因率同列拜疏言曰淮淝東南之屏蔽昔人之所百戰而必争者今皆幸為我有而無故捐之以資敵非計之得也若彼乘吾之郤長驅以來不信宿而至江津人心一摇則建康雖有甲卒十萬亦將無所施矣且其新民累嵗安集亦既有緒今乃一朝而棄之使其老稚狼狽而南來丁壯忿憾而北去其失人心以貽後患抑又甚焉即以宿衞單寡必行今䇿則願毋庸盡撤而使合肥盱眙兩戍所留各不下三萬人則亦足以固吾圉而折敵衝矣疏奏不省而劉豫果數求援於金以乗吾隙議者方以為憂而金反忌豫强將不可制一旦執而廢之遂不暇以我為事不然則亦殆矣自是之後廟算低回上下懈弛北伐之謀日以益衰顧望中原坐失機㑹而明年車駕遂還臨安矣御史中丞常公同薦公恬尚有守可任大事因復召對公即抗言當今國論不過兩端喜進取之謀者既以行險妄動而及於敗為待時之説者又以玩日愒嵗而至於媮二者不能相通而常墮於一偏是以成功不可見而均受其弊故臣嘗謂能自治以觀釁則是二者通為一説而無所偏廢葢能夙夜憂勞率厲衆志則未嘗不待時而不至於媮審知彼已必順天道則未嘗不進取而不及於敗謀人之國者誠能如是以求逞於讐敵而有不得志者臣不信也然臣竊迹近事則夫往年江上之㨗日者偽劉之廢中原之釁可謂大矣而吾終未肯求所逞豈非以行險妄動為不可以不戒而於吾所以自治其國家者將益求其至歟今日之勢雖未至於危機交急亦可謂迫矣謂宜㫁自聖志深思昔人愛日之義憂勞為政無少怠忽凡事之故常非天下所以安危存亡者悉歸之有司而日與輔相大臣一心戮力明禮義正綱紀除弊政振媮俗撫循凋瘵之民淬勵士大夫而責之職業凡以求吾所以自治者然後謹察四方之釁投隙而起安受其燼以致天地之殛則雖有智者亦不知為敵謀矣初劉光世守淮西御軍無法而敵至輒謀引避既正其罪而奪之兵矣尋有叛兵之變廟議反謂由罷光世使然更慰藉而寵秩之張俊守盱眙方撤戍時猶命分兵留屯而俊不受命悉衆以歸朝廷亦不能詰公於是又言陛下有為之志未嘗少衰而天下之事每每病於不立使中興之烈未有卓然可見之效臣竊不勝憂憤而深惟其故以為陛下誠能並進忠賢修明紀律懲陵夷委靡之禍革姑息茍且之政深詔大臣號令所出必務合於天下之正義而毋䘏匹夫狥私之怨則威令必振國勢安强雖桀驁之敵亦將歛祍而退聴尚何病於事之不立哉上亦不以為忤特命除郎兼畀史筆而常公猶以為此非所謂薦論之本意再論上前言甚懇至然事已行不及改也公至史院㑹方刋修蔡卞所撰哲宗實録而宣仁附傳實公所分所以辨明誣謗分别邪正者於體為尤重而公考訂精宻直筆無隠論者美之其後顧亦不免頗為他官所竄易是以讀者猶有憾焉既而金人亟遣使來請和趙公以議小不合亦罷去而秦丞相檜始顓政事遂决屈已和戎之議矣金使名稱既不遜而所責奉承之禮又有大可駭者於是衆心共怒軍士至洶洶欲為變夜或揭通衢指檜為金諜都人洶懼一時忠智之士競起而争之公亦亟與史院同舎胡公珵凌公景夏常公明范公如圭五六人者合辭抗疏言曰金人方據中原吞噬未厭何憂何懼而一旦幡然與我和哉葢其狃於薦食之威動輒得志而我甚易恐故常喜為和之説以侮我又慮我訓兵積粟畜鋭俟時而事有不可知者故不得不為和之説以撓我耳葢金人和使即秦之衡人兵家用之百勝之術也六國不悟衡人割地之無饜以亡其國今國家不悟金使請和之得䇿其禍亦豈可勝言哉而執事者顧方以為吾為梓宫母后淵聖天屬之故遂不復顧祖宗社稷二百年付託之重而輕從之使彼得濟其不遜無稽之謀而藉躪以逞將焉避之哉昔楚漢相持之際項羽常置太公俎上而約髙祖以降矣使為髙祖者信其詐謀而遽為之屈則自其一身且無處所尚何太公之可還哉唯其不信不屈而日夜思所以圖楚者以故卒能蹙羽鴻溝之上使其兵疲食盡勢窮力屈而太公自歸此其計之得失亦足以觀矣其言之切如此葢出公與諸公之意而成於胡公之手檜雖持其議不少變然金人狂謀因是亦有不得盡逞者論者莫不壯之然自是之後邊備遂弛士氣益衰而興復之謀上下皆以為諱正墮公等所憂撓我之計檜顧自以為得上心始謀以次盡逐諸異議者公因是亦數自求引去而參知政事李莊簡公又嘗欲引以寘近班以是檜尤忌之固留不許及金使再至獨許歸我河南地公因輪對又言陛下踐艱難之運十年于兹雖有大有為之志而於天下國家所以經逺持久之計多有所未暇者今者天啓戎心畫地數千里以歸于我此雖異時之變未可以豫知意者天其以禮悔禍使陛下間於憂虞而大有為之志將有所使此萬世一時也然天下之事每病于難立者正以嚮一夫獨見之言而畧衆口異同之論是以謀始太鋭而用計有未詳也願考漢廷雜議之法自今發政造事陛下既與大臣謀謨於上又令卿士大夫有忠慮者亦得以自竭于下然後總攬羣䇿而裁處其中將舉天下之事惟陛下之所欲為而無不成矣此於前日講和之議猶欲三致意焉又念國步日艱人心未服而天子無自將之兵諸道無典戎幹方之實二三大將人擁重兵强不可令事葢有不可知者則又數數建言宜復武舉責實用必其洞曉韜鈐長於綏御者以儲將帥之才下州郡選驍勇悉送行在以補周衞之缺精擇帥守使蒐卒乘以莊藩維之勢亦皆當世之急務久長之至計反復惓惓不能自己其於請建太學明大倫以倡節義之風而厲茍媮之習則又平日之所深慮而每言之所謂如人食息呼吸於元氣之中一息之不屬理必至於斃焉者非若後來諸人承望風㫖但以課試文墨為粉飾太平之具而已也然而國是已定言無所入由是公之求去愈力而檜之怒公愈甚十年春遂使言者論公獨以懐異自賢陽為辭遜為罪而出之外郡然公去未幾而金果敗盟復奪我河南地悉其鋭師數道大入如公所謂未可豫知者於是中外大震檜亦不知所謂周章回惑至於視師之奏援引乖錯而不自知聞者莫不竊笑而深憂之幸而一時將卒猶有前日東拔蒐練之餘以故闗陜順昌槖臯之師連戰大捷敵乃引退復議講解而梓宫母后始得南歸又如公等所論楚漢强弱之勢然檜遂掩已失而冒以為功公奪主權肆然無復有所忌憚矣公固不能復為之屈遂自請為祠官屏居建溪之上日以討尋舊學為事手抄口誦不懈益䖍葢玩心於義理之微而放意於塵垢之外有以自樂澹如也舊喜賦詩屬文至是非有故不徒作乃其文氣則更為平緩而詩律亦益閒肆視諸少作如出兩手矣然公自是不復起年未五十而奄至大故善人之類莫不傷之其後十餘年間檜遂顓國秉大作威福諸與公同時被逐之人大者削籍投荒小亦棄置閒散迄檜死敗其幸存者乃起復用或至大官而公皆已不及見矣嗚呼熹尚忍言之哉公性至孝事太夫人左右無違友愛諸弟委曲將就有人所難能者與人交重然諾不以生死窮達二其心撫孤甥教之學而經理其家事曲有條理人無間言接引後進教誘不怠聞人之善推荐如不及至於邪佞嵬瑣簡賢附勢之流與已異趣則鄙而逺之或不忍正視其面至其所以施於吏治者亦皆果决明辨抑邪與正無所顧避顧熹生晚不及於聞見之詳故不得而記也晚既屬疾自知必不起而處之泰然畧無憂懼之色手書告訣所善胡公憲原仲劉公勉之致中劉公子翬彦沖屬以其子而顧謂熹往受學焉其志道服膺死而後已垂裕後人不使迷於所鄉者又如此云所為文有韋齋集十二卷行於世外集十卷藏於家始時吏部尚書徐公度欲為之序畧言少日多見前輩而自得從公及正平張定夫遊始得為文之法㑹病革不及脱藳而今序則直秘閣傅公自得之文也其論以為公詩髙潔而幽逺其文温婉而典裁至於表疏書奏又皆中於理而切事情亦為得其趣者公娶同郡祝氏封孺人贈碩人其父處士確有髙行碩人性慈順孝謹佐公事太夫人於窮約中未嘗一日不得其懽心承接内外姻親下逮妾媵僮使曲有恩意後公二十七年卒一男子熹今以朝奉大夫致仕一女子嫁故瀏陽縣丞劉子翔蚤卒孫男三長塾亦蚤卒次埜將仕郎次在承務郎女三其婿修職郎劉學古迪功郎黄榦進士范元裕曽孫男五鉅鈞鑑鐸銍女九長適文林郎趙師夏餘或許嫁而未行也公卒之明年熹奉其柩塟于建寜府崇安縣五夫里之西塔山而碩人别塟建陽縣崇泰里後山鋪東寒泉塢然公所藏地勢卑濕懼非久計乃卜以慶元某年某月闕日奉而遷于武夷鄉上梅里寂歴山中峯僧舎之北葢公之詩嘗有鄉闗落日蒼茫外尊酒寒花寂歴中之句嗚呼此豈其䜟耶不肖子熹追慕攀號無所逮及竊惟納銘幽堂具著聲烈以告萬世葢自近古以來未之有改而公贈官通議大夫正第四品凖格又當立碑螭首龜趺其崇九尺刻辭頌美以表于神道用敢追述其平生論議行實之大者如右以請于當世立言之君子伏惟幸垂聴而擇焉謹狀慶元五年十二月日孤朝奉大夫致仕􅄔源縣開國男食邑三百户賜紫金魚袋熹狀延平先生李公行狀先生諱侗字愿中姓李氏南劔州劔浦人曽祖諱幹屯田郎中致仕贈金紫光禄大夫妣清源郡太夫人朱氏祖諱纁朝散大夫贈中奉大夫妣永嘉郡太君胡氏咸寜郡太君朱氏父諱渙朝奉郎贈右朝議大夫妣太恭人饒氏先生朝議公之季子也生有異禀㓜而穎悟少長孝友謹篤朝議公太恭人特所鍾愛既冠遊鄉校有聲稱已而聞郡人羅仲素先生得河洛之學於龜山楊文靖公之門遂往學焉羅公清介絶俗雖里人鮮克知之見先生從遊受業或頗非笑先生若不聞從之累年受春秋中庸語孟之説從容潛玩有㑹於心盡得其所傳之奥羅公少然可亟稱許焉於是退而屏居山田結茅水竹之間謝絶世故餘四十年簞瓢屢空怡然自適中間郡將學官聞其名而招致之或遣子弟從遊受學州郡士子有以矜式焉晚以二子舉進士試吏旁郡更請迎養先生不得已為一行自建安如鉛山訪外家兄弟於昭武過其門弟子故人于武夷潭溪之上徜徉而歸㑹閩帥玊山汪公以書禮車乘來迎葢將相與講所疑焉先生因往見之至之日疾作遂卒于府治之館舎是年七十有一矣隆興元年十月十有五日也汪公為遣參議官王君伯序觀察推官謝公倣䕶喪事躬視棺歛禮意喪具無不周悉居數日諸子畢至遂以喪歸先生娶同郡吴氏子男三人友直左修職郎信州鉛山縣尉信甫左修職郎建寜府建安縣主簿友聞未仕女一人早亡孫男四人女八人皆㓜初龜山先生唱道東南士之遊其門者甚衆然語其潜思力行任重詣極如羅公葢一人而已先生既從之學講誦之餘危坐終日以驗夫喜怒哀樂未發之前氣象為如何而求所謂中者若是者葢久之而知天下之大本真有在乎是也葢天下之理無不由是而出既得其本則凡出於此者雖品節萬殊曲折萬變莫不該攝洞貫以次融釋而各有條理如川流脈絡之不可亂大而天地之所以髙厚細而品彚之所以化育以至於經訓之微言日用之小物折之于此無一不得其衷焉由是操存益固涵養益熟精明純一觸處洞然泛應曲酬發必中節故其事親誠孝左右無違仲兄性剛多忤先生事之致誠盡敬更得其驩心焉閨門内外夷愉肅穆若無人聲而衆事自理與族婣舊故恩意篤厚久而不忘生事素薄然處之有道量入為出賓祭謹飭租賦必為隣里先親戚或貧不能婚嫁為之經理節衣食以賑助之與鄉人處食飲言笑終日油油如也年長者事之盡禮少者賤者接之各盡其道以故鄉人愛敬暴悍化服其接後學答問窮晝夜不倦隨人淺深誘之各不同而要以反身自得而可以入於聖賢之域故其言曰學問之道不在多言但嘿坐澄心體認天理若見雖一毫私欲之發亦退聴矣久久用力於此庶幾漸明講學始有力耳又嘗曰學者之病在於未有洒然冰解凍釋處縱有力持守不過茍免顯然悔尤而已若此者恐未足道也又嘗曰今人之學與古人異如孔門諸子羣居終日交相切磨又得夫子為之依歸日用之間觀感而化者多矣恐於融釋而脱落處非言説所及也不然子貢何以言夫子之言性與天道不可得而聞也耶嘗以黄太史之稱濂溪周夫子胷中灑落如光風霽月云者為善形容有道者氣象嘗諷誦之而顧謂學者曰存此於胷中庶幾遇事廓然而義理少進矣其語中庸曰聖門之傳是書其所以開悟後學無遺䇿矣然所謂喜怒哀樂未發謂之中者又一篇之指要也若徒記誦而已則亦奚以為哉必也體之於身實見是理若顔子之嘆卓然見其為一物而不違乎心目之間也然後擴充而往無所不通則庶乎其可以言中庸矣其語春秋曰春秋一事各是發明一例如觀山水跬步而形勢不同不可拘以一法然所以難言者葢以常人之心推測聖人未到聖人灑然處豈能無失耶其於語孟他經無不貫達茍有疑問答之必極其趣然語之而不惰者或寡矣葢嘗曰讀書者知其所言莫非吾事而即吾身以求之則凡聖賢所至而吾所未至者皆可勉而進矣若直以文字求之悦其詞義以資誦説其不為玩物喪志者幾希以故未嘗為講解文書然其辨析精微毫釐畢察嘗語問者曰講學切在深潛縝宻然後氣味深長蹊徑不差若槩以理一而不察乎其分之殊此學者所以流於疑似亂真之説而不自知也其開端示人大要類此先生資禀勁特氣節豪邁而充養完粹無復圭角精純之氣達於面目色温言厲神定氣和語黙動静端詳閑泰自然之中若有成法平居恂恂於事若無甚可否及其酬酢事變㫁以義理則有截然不可犯者早嵗聞道即棄場屋超然逺引若無意於當世然憂時論事感激動人其語治道必以明天理正人心崇節義厲廉恥為先本末備具可舉而行非特空言而已異端之學無所入於其心然一聞其説則知其詖淫邪遁之所以然者葢辨之於錙銖眇忽之間而儒釋之邪正分矣熹先君子吏部府君亦從羅公問學與先生為同門友雅敬重焉嘗與沙縣鄧迪天啟語及先生鄧曰愿中如冰壺秋月瑩徹無瑕非吾曹所及先君子深以為知言亟稱道之其後熹獲從先生遊每一去而復來則所聞必益超絶葢其上達不已日新如此嗚呼若先生之道徳純備學術通明求之當世殆絶倫比然不求知於世而亦未嘗輕以語人故上之人既莫之知而學者亦莫之識是以進不獲施之於時退未及傳之於後而先生方且玩其所安樂者於畎畝之中悠然不知老之將至葢所謂依乎中庸遯世不見知而不悔者先生庶幾焉比年以來學者始益親而方伯連帥之賢者又樂聞其道而邀致之其意豈徒然哉不幸天喪斯文而先生殁矣龜山之所聞於程夫子而授之羅公者至是而不得其傳矣嗚呼痛哉諸孤方謀窀穸之事謂熹承學之久宜知先生之藴使具其事以請銘於作者將勒諸幽堂以告後世知徳者有以考焉熹愚不肖蒙被教育不為不久聴其言觀其行而服膺焉不為不詳然未能有以得其逺者大者故悉取凡聞見所及一二書之詞若繁而不敢殺者葢有待於筆削云耳謹狀朝散郎致仕陳公行狀本貫泉州同安縣永豐鄉感化里曽祖珠故不仕祖彦嗣故不仕考禧贈右朝請郎妣吴氏封安人公諱汝楫字濟夫政和八年上舎出身補官迪功郎建州工曹掾屬官省不行調南劔州順昌主簿秩滿正權漳州司户參軍行長泰事代為漳巖主簿丁内外憂終制陞從政郎為汀州司法參軍未行改宣教郎轉奉議郎知汀州寜化縣丞追榮其考妣以承事郎孺人誥第四加至今官封而公自寜化罷歸歴承議朝奉朝散郎凡十年不調晏如也年六十一以紹興二十三年三月二十六日終于家公自始屬疾即使其弟為奏上請得致仕郎未報疾革召親戚常所往來者告語屬其子而逝既尚書下公請事如章而公不起矣公在事以廉勤自約勅所至有能聲為太府部刺史所知事有他吏所不能辦者皆以諉公公為辦治日以謹方在長泰直嵗不收公力為言得蠲田租什之三在漳巖尉老病不任事以公代易㑹民余勝蘇居羣黨攘敓為姦公悉禽取寘之法民乃乂安朝廷嘉録其功改中都官而龍圖林公遹守南劔翰林綦公崇禮守漳州皆嘗論薦之在寜化興學校治複屋聚經子史氏羣書以教其人始寜化以武為俗民不見義至是學者彬彬焉公自是歸杜門里閈非嵗時慶問未嘗出入閭巷諸公府鄉人欽愛而仕者安之公亦是適恬不以進趣干其意可謂善人君子矣而夀不遐於公猶為有憾也公兩娶黄氏皆封安人後安人左宣義郎致仕某之女亦先公卒子男一人忱以公恩補將仕郎女一人未笄熹先君子吏部府君與公同年進士也熹之來此不及拜公矣公嗣子忱將塟公於某山之原以公行事授熹序次將以求志於作者熹謝不能而其請不已既不得辭乃取忱所論纂具著其大者如右時紹興嵗次乙亥人日左迪功郎泉州同安縣主簿主管學事朱熹狀承議郎主管台州崇道觀賜緋魚袋羅公行狀公諱博文字宗約一字宗禮南劔州沙縣人曽祖安中贈中奉大夫妣太㳟人鄧氏祖畸朝請郎右文殿修撰妣宜人張氏宜人陳氏父彦温右從事郎知建州甌寜縣事贈右承議郎妣孺人鄧氏太孺人黄氏羅氏世為豫章人唐長慶中有為沙縣尉以卒者子孫因家焉至五世孫覺始舉進士中其科再世而得右文公以懿文清徳顯重於世又再世而得公復以道學行誼克世其家有聞於時然位卑數促曾不及究其用而死識者恨之盖公㓜有異質生嵗始周家人示以晬盤公一無所顧獨扶服前取書之論性理者展玩久之右文公歎異為文以記其事且曰是兒當復以文學大吾門且復聞道而不為章句之習也十餘嵗遭甌寧府君之喪哀毁如成人治喪塟又皆必誠信有法度用右文公奏補將仕郎授右迪功郎福州司户參軍治倉庾謹出納盡去宿弊後皆可法再調静江府觀察支使桂管為嶺徼以西一都㑹民物繁夥常時幕府已不勝事至公為當路所知事待公决者尤多公裁處從容人未嘗見其疾言遽色而事無不各得其理者時秦氏用事士大夫以牾意竄斥係踵南來道出府下者公悉善遇之至竭廩奉則鬻衣以濟其乏用薦者改右宣義郎知趙州瑞金縣事轉宣教郎始至嵗歉公度民且饑則先事為備多所儲積及饑發廩賑贍事無鉅細必躬臨之不以勤勞為憚其至誠惻怛雖壹主於惠愛無所計惜而厝置纎宻辨察精明人亦不能有以欺也邑人既賴以全而公又請推其餘以及旁縣縣故多盜公飭巡徼設方畧得渠帥數人寘諸法而境内帖然在官餘九月㑹故丞相魏國張忠獻公都督江淮雅器重公請以為幹辦公事用上嗣位覃恩轉通直郎賜五品服使募兵江西得數千人以歸和糴建康以實軍又以公與其事未幾得穀亦巨萬計張公再入相賓客例出幕府公得知和州未上而吏部侍郎玊山汪公制置全蜀奏辟公參議官以行軍府之政必以咨焉汪公既虚心好問公亦推誠啟告反復殫盡必歸於至當而後已成都之政遂最天下公之助為多也嘗銜命漢中勞撫將士宣撫使以禮致遺為錢三百萬公不欲受而難於辭郤還次漢州州方治貢院不能就以五十萬予之餘悉輸成都公帑取河南程夫子之遺文與他名臣論奏纂述之可以垂世者募工鋟板用之畧盡而横渠張夫子之家避地流落貧不自振公訪得之為言汪公延置府學蜀士知所勸焉東方士大夫遊宦蜀土貧不能歸或不幸死不克塟者公皆出捐俸金以振業之賴以濟者甚衆累遷承議郎秩滿自請奉祠得主管台州崇道觀命下而汪公亦召還公復從東至嘉州宿留與同舎㑹集笑語如常時一日忽語人曰吾將逝矣然幸大事已竟可無憾也遂就寢酬酢從容了不異平日獨無一語及其私俄而遂化乾道四年四月十有三日也盖其年五十有三矣同舎聚而哭之解其裝以理喪事則槖中獨有書數十帙餘金足以歸其喪而已相與咨嘆以為不可及遂以柩歸其年冬十有一月塟于沙縣嚴地祖塋之旁公娶陳氏了齋先生之兄孫女先公卒子男二人曰問曰闢孫男八人女七人皆㓜公資禀和粹沈静寡欲其處已待人一主於誠敬平居怡愉人莫見其喜愠之色聞人之善稱慕如不可及至其有過則常若有所隠避而不忍言也視人患難困乏如切其身經營周救必盡其力年未三十即屏逺聲色一榻蕭然惟樂善不倦如嗜慾聞天下之士有一言一行之幾乎道至或千里求之以是凡四方之名山勝槩多所登歴而於佛老子之學亦往往能道其所以然者或者遂意公誠篤好之而不知公之所志與其所學有不在是也葢嘗從張忠獻公問行已之大方張公為手書所為敬説一通以授焉公受而行之終身不懈又從同郡李愿中先生遊聞河洛所傳之要多所發明於是喟然而嘆曰儒佛之異亡他公與私之間耳由此沛然自信其守益堅在桂州時汪公葢方通判州事知公所為日就公語且亟稱道其為人故卒引以自助而今刑部員外郎劉公芮亦方隠居州之西山躬耕勵志人罕識之公獨以坐曹决事之餘日往從之遊劉公名家子及見前輩多識前言往行顧獨恨得公晚及聞公卒哭之慟為寢疾不食者數日此豈勢利之使然哉抑公才志行業之美固當有為於世而充養有素神觀清明人亦不謂其止於此也嗚呼其可謂不幸也已熹嘗受學李先生之門先生為熹道公之為人甚詳於其從辟江淮也喜而言曰張公髙明閎大有餘而宗禮以精宻詳練佐之幕府無過事矣時熹未識公也及先生没乃獲從公遊而得其志行之美然後益信先生為知人然公自是入蜀相望數千里書問嵗亦一再至所以勸勵從學者殊厚日夜望公之還幾得復相與講其舊學而公乃以喪歸熹既痛公之不幸不及大為時用又傷吾道之不幸而失此人也亟往哭焉諸孤既號哭受弔則以公從弟頥所叙官閥梗槩一通授熹使狀次之將以請銘於作者熹誼不獲辭既趣以就事矣惟是從遊之晚於公之行治有不盡知大懼闕漏放失將無以備采擇為罪伏惟立言之君子有以財之謹狀乾道五年五月日迪功郎新差充樞宻院編修官朱熹狀敷文閣直學士陳公行狀公諱良翰字邦彦早孤事母孝遊鄉校以謹厚莊重為人所稱讀書務通大指為文恢博有氣紹興初舉進士中第授左迪功郎調紹興府㑹稽縣主簿秩滿循從事郎知明州慈溪縣事嵗凶民饑公喻富室發廩以糶籍貧民授劵以糴上安下濟邑人賴之導徳門三鄉之渠溉田甚廣改宣教郎知温州瑞安縣事轉奉議郎瑞安俗强梗號難治或謂公宜厲威嚴以彈治之不然不濟公歎曰縣令字民之官愛之如子猶懼不蔇況奮其武怒以懾威之彼亦何所恃耶催租不下文符第揭逋户姓名通衢為之期日民樂於不擾如期皆集聴訟多得其情或問其術公曰吾何術苐公吾心使如虚堂懸鏡而物之至者妍醜自别耳罹内憂去官邑人送者皆泣涕而返免喪授衢州州學教授日進諸生教以修身厲行之意不専器人於文字語言之間轉承議郎用殿中侍御史吴公芾薦為御史臺檢法官擢監察御史上即位覃恩轉朝奉郎時金亮敗盟既斃而歸其嗣主新立復遣使來約以舊禮修好而中州遺民又皆相率來歸詔問所以處之者公上疏曰襁負之民皆吾赤子去墳墓離親戚捐生業而來歸我其義不可以不納然若許以舊禮而又納其降人則異日彼必來索索而歸之傷向化心納之不便其必定計在我以自治為先而和與不和付之泛應然後乃可納耳二者在陛下聖志如何願熟計之尋復有詔問時務所宜公復上疏請明階級以修軍政核兵籍以豐財用禁折變以蘇民力省堂選以抑奔競内外之官皆久其任賞罰輕重務合衆心上嘉納焉隆興元年秋詔以災異求言時上用故相張忠獻公軍淮泗以規進取而議者不一争獻防江之説公於是上疏極論以為備邉之要在固籓籬専委任而已今欲捨淮防江却地奪便非計也而朝廷過聴使督府不得専任閫外之寄臣竊以為誤矣上然之除右正言入謝首陳納諫修徳之説以開上意㑹有飛蝗之異公又勸上以畏天恤民為心語益切於是金人再移書求復故疆且邀嵗幣朝議將許之公入見上極陳前日講和之失使山陵隔絶疆埸無備北方忠臣義士來歸我者反為敵用而致怨於我皆秦檜之罪今不可以復蹈其失且中原之地皆吾祖宗二百年故土外敵據屬爾况唐鄧海泗又金人渝盟之後吾以兵取而得之者安得以故疆為言我亦何説而歸之乎既而宰相湯思退力主和議建遣盧仲賢李栻持書幣賜金國大臣主兵者公為上言仲賢輕儇無恥栻自北來其蹤跡不可知宜罷勿遣姑報以書徐觀其變而為之所上鄉公説而宰相力争竟遣二人行公又論今廟堂督府議論不同凡邉奏上聞廟堂皆陽為唯諾無所可否而隂實百方沮敗其計萬一爽於事機督府安得獨任其責上矍然稱善以公語語宰相時楊存中為御營使悉總殿前諸軍公言存中自太上皇帝時提禁旅二十餘年權勢極盛中外憂疑賴太上聖明威㫁罷使就第今又無故假以使名授以兵柄隂凝冰堅不可以不戒願陛下為宗社計亟罷存中使以兵屬三衙如故事則天下幸甚疏三上論者再竟罷存中㑹仲賢等出疆敵迎勞如禮朝廷上下皆喜以謂和議决可指日而定公獨抗言曰和議於金人有大利四而在我有未可必者五葢罷兵講和則彼得以中原休養民力威制小種銷伏羣盜此皆金之大利而我欲與為敵國請復山陵又必其不求四郡不索降人不疑邉備此則殊未可必願陛下毋惑羣議先定久逺之規以應其變上欣然開納既而李栻竟不敢涉淮公奏論奪其官獨仲賢至汴輒許以疆土嵗幣輸敵而還上大怒下仲賢吏欲誅之宰相叩頭懇請得免因極言邊備不足恃和好不可不修上不得已復遣户部侍郎王之望知閤門事龍大淵使金公遂與侍御史周公操請見力言前遣仲賢已辱國命而大臣不悔前議之失又欲肆臆决郤衆謀不謂秦檜復見於今且彼書要我罷四郡屯兵而以其地歸之如此是彼不折一兵而坐收數千里要害之地也臣愚以為决不可許若嵗幣則俟得陵寢而後予之庶幾猶為有名今計議未決而之望遽行恐其辱不止仲賢而已願先馳一介往議堅决行未晚也上以公奏示宰相宰相請召侍從臺諫議之詔可公上議如前一時侍從之賢者亦多附其説上遂以胡昉楊由義為審議官令専議四郡事而手詔之望大淵使議陵寢梓宫降人邉備四事利害以聞二人奏上上燭其姦凡語之依違轉脱者皆墨識之以示臺諫公因復伸前論上乃從之時嵗十二月也除左司諫㑹長秋宫建官其内外之屬若干人公上疏論之且請節他冗費始自宫掖以奉邊軍詔諸以長秋為官者損其七人他亦頗有所減省如公請既而昉及由義與金議四郡不合大為金所困辱而歸思退尚執前議正言尹穯素以謟事龍大淵得進用又本仲賢姻黨隂附思退以撼督府公因疏論思退姦邪誤國宜早罷黜以靖中外張浚精忠老謀不宜以小人之言摇之上曰思退前議誠失然朕愛其警敏冀可責後効卿其置之至魏公則今日人材物望孰有出其右者朕豈容有此意正使有之亦豈不謀卿等此殆言路有異意者卿為朕諭之公頓首謝曰陛下言及此天下幸甚然宰相之任古難其人正使不得全才寜取椎頓朴實之人緩急猶可倚賴思退庸狡小黠大癡恐誤陛下國計且警敏二字非明主所以卜相之法也退以上語諭同列穯勃然變色明日亦請對於是以王之望為諫議大夫罷公言職以直敷文閣知建寜府越兩日而有詔張公罷兵還朝又兩月張公竟罷相印去而和議遂定如思退等之䇿矣時隆興二年六月也初公惡穯姦邪面舉韓魏公富貴易求名節難保之語以警切之穯大愧恨至是既得隂結近幸以售其姦遂連中外之力先排公去之然後罷督府退張公召還四郡戍兵毁撤兩淮守備務以强敵勢孤上心而冀其説之必用不復能為宗社計也金於是乘勢大入幾不可支上亦悔悟而太學諸生數百人前後伏闕再上疏請召用公及胡銓王十朋等而斬思退之望尹穯洪适以謝天下謂之四姦思退等由是始敗然邊備遂弛不能復張天下至今恨之公至建寜一以惠愛撫其民如為縣令時掾史以死囚獄具至録問輙不承請循故例即訊而已公不可曰録囚于庭法也吾何容心哉既亦卒無稱寃者未幾就除福建路計度轉運副使聴覽不倦幽隠畢達欲行部輒先移文所至毋得治道路飾供張諸州以例致餽一不受作觀風七詠以示敦本厚俗之意轉朝散郎除江東路提㸃刑獄公事移浙西轉朝請郎以宗正少卿召還五年權太常少卿侍立官給事中除兵部侍郎時朝廷欲調㳂江數郡民兵列屯江津以備敵公力為宰相言敵未嘗窺邉民兵未嘗練習無故㸃集恐徒擾而無益語聞事寢以足疾求去不許㑹浙東有風水之災秋稼盡壊州縣不以聞公以白上上即遣漕臣按視蠲租賦賑流氓官吏蔽匿者皆抵其罪尋詔公同修國史轉朝奉大夫除右諫議大夫命下之日中外翕然時杭帥周淙多創攝局以私親故秀守徐藏遣吏持錢買燈都下聞之恐懼皆亟罷之公入謝陳四事曰畏天曰愛民曰脩政曰官人因言治効未易遽言而治象可以立見陛下誠能盡取天下賢才寘之列位自然壯觀朝廷而治象可見治象見則治效因可卜矣上曰善六年正月戊辰大雨震電庚午大雨雪公求對極陳祗畏天戒飭正庶事之説時東宫久未建復奏手疏言之上皆嘉納時上已深悟前日和議之失思欲亟致富强以為恢復之漸而小人乘間争售其説有王天覺者以貨結左右陳聚歛擊刺之術皆狂妄乖剌上未之察以為樞宻院編修官臺諫攻之不能動公極論之上始開寤逐去史正志者素以傾巧進至是當帥成都憚逺役則使其黨請復置發運使而以己為之上然其説公入奏曰祖宗本建此官葢㳂唐制轉東南以餉京師今已居東南而衣食其租税矣又頗分給武昌建康京口諸軍應上供者數亦無幾而虚立此官甚無謂况正志反覆小人誕妄有素不過欲假此重權割剥州縣侵牟商賈以自為功耳自今以往法之既宻者不復寛法之未宻者日加宻臣恐數年之間民愁盜起有以勞聖慮也疏三上且面論之益切上亦知正志之妄謂公曰吾姑試之耳公於是退而求去上封還所奏手札喻公若曰都俞吁咈前聖所不免卿豈可輕去為髙耶公復求對面請益力上留公亦益至已而發運司為公私之病果皆如公言正志遂以罪竄而發運官屬皆罷矣公嘗為上言曰蜀漢之兵可以窺闗陜荆襄之衆可以趨韓魏江淮之師可以𢷬青徐三者之勢相為犄角不容有偏今蜀道既委大臣開府節制而荆淮之郊東西數千里未有任其責者願擇重臣分以委之則久逺萬全之計也上曰武臣為之可乎公曰文武固無異道但必得真才宿望足以服軍民之心者然後可以濟國事耳上曰善公言曰中興之初諸將領兵者皆别選精鋭數百人自為一卒優其廪犒以故驍勇競勸所向有功韓世忠所謂背嵬張俊所謂親隨劉光世所謂部落是也今養兵雖衆而諸將未聞有能為陛下拔尤取穎以生其氣勢者願陛下之有以詔之也上欣然曰此朕意也即下其書諸將尋以與修玉牒成書轉朝散大夫再上章求去不許七月除給事中㑹節將成閔冒請真俸事覺詔罪官吏之出納者而置閔不問閤門王抃招納妄人謝顯矯稱宻㫖出境生事詔抵顯等罪而亦不以及抃公皆處駁議乞正典刑章上翼日除禮部侍郎公力辭不拜遂除敷文閣待制提舉江州太平興國宫以去七年詔起公知􅄔州辭不獲命再踰月始就道未至除太子詹事兩詔趣行仍令州郡敦遣公遂入見上慰藉甚厚屬以調䕶之意公亦竭誠輔翼凡所以告太子者無非規戒之言一日召對東華門賜坐從容訪以治道公論士大夫茍且欺誕之弊及江湖荒政甚悉上皆納之因出手書唐太宗與魏鄭公論徳仁功利之語而書其後俾公極陳今日所未至公拜謝退上疏曰臣聞仁徳者治之本也功利者治之効也大有為之君務其本而効自至未有無其本而有其効者也陛下鑒觀古事親御神筆深詔愚臣以求今日所未至此堯舜之心也臣敢無辭以對臣竊觀陛下欲承天意而比年以來水旱間作數千里間流殍萬計是所以承天意者未至也陛下欲結民心而營造寨屋民不聊生死凍餒者不知其幾是所以結民心者未至也陛下欲任賢能而張栻一言遽從外補正直之氣鬱而不伸是所以任賢能者未至也陛下欲退小人而正志方逐張某繼之張某適罷韓玉又進是所以退小人者未至也至於欲擇將帥而内外諸軍脧削士卒専事交結不修軍政欲䘏軍情而移戍江津措置失當使其老㓜狼狽失所欲擇監司而以祥刑之寄付之武臣欲吏久任而或到官旬日即行改易凡此八者一有未去則於陛下深仁厚徳不為無累臣恐功利之効未易可致也願陛下無以仁徳為難而忘為治之本無以功利為易而速為治之効欽崇奉若以承天意哀矜惻怛以結民心任君子必盡其才去小人必絶其本廣搜智畧以司閫外之權作成武勇以振三軍之氣罷監司之非人申久任之良法自然仁徳昭著功利烜赫將與唐虞比隆而視太宗之事有不足為者矣疏奏上嘉歎再三出以示輔臣詔以公兼侍講公以足疾有加求去甚苦上固留之詔聴五日一參公力辭不許十二月以病劇請致其事上始知公果病除敷文閣直學士提舉太平宫遣使賜以告身衣帶公還家病間已而復作再奏告老遂以八年四月癸丑卒於正寢自疾革即屏醫却藥湛然無怛化之意七日而終享年六十有五詔轉一官致仕訃聞贈太中大夫公質實無偽莊毅有守而色和氣温不露節角人有片善稱歎不已小有不善必面規之自起寒素以至通顯奉養益薄無所嗜好不治生産財利禄賜隨用輒盡不為毫髮計留自罹内艱不復入私室誨督子弟接引後進孜孜不倦在州縣勤事愛民號為良吏及登朝廷直言正色遭值聖明開奬納用抑邪與正中外倚以為重隆興中協賛廟謀經營北向之䇿尤盡其力當是時國勢幾振不幸為小人所間以去比其復來則事已異於前日而公亦益老矣然其氣不少衰因事獻言必極其意而後已葢公嘗為人言先儒有論為貧之仕者曰俟吾之飢餓不能出門户也而後計之此孫言也而聴者不喻則其弊將無所不至夫飢餓而不能出門户則死而已矣尚何計之為哉公敬遜誠慤非欲以大言夸世者而其語如此足以見其所存之素定而所立之非偶然也少時聞潘左史良貴廷叱奏事官竊獨歎曰潘公戇矣曷若退而疏之之為得體乎族父某部侍郎公輔聞而賞之曰子少年而議論及此異日立朝當必有可觀者願子自愛至是卒如其言所為奏議及他文若干卷藏于家娶朱氏封碩人子男四人元夀右迪功郎耆夀右承務郎彭夀太學生廣夀􅃯賜進士出身女二人適右迪功郎郭戡進士吴洎孫男七人女三人皆㓜元夀等將以是年九月壬申塟公于義城鄉疉石山之原以熹辱公知待薦寵之厚俾次其行事將以求誌於作者請謚于太常且備異時史氏採録熹不得辭謹第録如右謹狀乾道八年八月日前右迪功郎朱熹狀南嶽處士吴君行狀君諱翌字晦叔世為建寜府建陽縣忠孝里人曽祖惻祖深父從周皆不仕君早孤踰冠遊學衡山師事五峯胡先生聞其所論學問之方一以明理修身為要遂捐科舉之學曰此不足為吾事也先生既沒又與先生之從弟廣仲從子伯逢門人張敬夫遊既誦其所聞於先生者而又上稽前古聖賢之言中覽前世儒先之論下引四方朋友之説參伍辨訂去短集長其左右出入雖不専主於一家然其大要以胡氏所傳為宗也其為人忠信明决通微曉事教撫諸弟曲有恩意與人交表裏殫竭心所不安告語切至而不失其和以是朋友多賴其益而樂親之雖或不能從而亦不厭其言之盡也衡山人葉公賢君為人妻以其女君因教其子定使知所趨又見之敬夫而俾受學焉定以是為修士鄉䣊稱之張氏門人在衡湘者甚衆亦無不往來從君參决其所疑者長沙故有嶽麓書院國初時郡人周式為山長教授數百人後更變亂院廢而山長罷五峯方辭秦氏禮命時嘗請為之不報乾道初帥守建安劉公珙始復立焉猶虚山長不置至是轉運副使九江蕭侯之敏始以禮聘君請為之君曰侯之意則美矣然此吾先師之所不得為者豈可以否徳忝之哉卒辭不能蕭侯亦髙其義不强致也時君方買田築室於衡山之下有竹林水沼之勝因取程夫子澄濁求清之語牓之曰澄齋日與賓客從容其間講道讀書間出詩篇以咏歌其所志葢翛然有以自樂然不數月而病不起矣淳熈四年八月三日也享年四十有九君娶葉氏生一男曰傅纔六嵗一女亦尚㓜君既没葉夫人以君遺命請於其父使弟定與君之外弟游霖游彰等以九月三日塟君衡山之東海橋之原於是君之外弟游彬居故里踰月而後聞君之喪泣而言於熹曰吴兄之終彬獨以逺不得奔走其塟今將狀兄之行而請文於桂州張先生以表于墓願吾子之文之也熹與晦叔有朋友之誼不可以辭乃論其行事始終大者如此以備采擇然敬夫與晦叔學同師居同郡其遊久於熹所以知之必將有深於此者請并列而具刻焉謹狀晦庵集卷九十七欽定四庫全書晦庵集卷
