front:
  text: 酉擬上封事具位臣朱熹敢拜手稽首言曰臣竊惟皇帝陛下有聰明睿智之資有孝友温恭之徳有寛仁博愛之度有神武不殺之威養徳春宫垂二十年一旦受命慈皇親傳大寳龍飛虎變御極當天凡在覆載之間稍有血氣之屬莫不延頸舉踵觀徳聽風而臣適逢斯時首䝉趨召且辱賜對得近日月之光感幸之深其敢無説以效愚忠之一二盖臣聞古之聖賢窮理盡性備道全徳其所施為雖無不中於義理然猶未嘗少有自足之心是其平居所以操存省察而致其懲忿窒欲遷善改過之功者固無一念之間斷及其身之所履有大變革則又必因是而有以大警動於其心焉所以謹初始而重自新也伊尹之告太甲曰今王嗣厥徳罔不在初又曰今嗣王新服厥命惟新厥徳召公之戒成王曰若生子罔不在厥初生自貽哲命今天其命哲命吉凶命歴年知今我初服肆惟王其疾敬徳盖深以是而望於其君其意亦已切矣今者陛下自儲貳而履至尊由監撫而專聽斷其為身之變革孰有大於此者則凡所以警動其心而謹始自新者計已無所不用其極矣而臣之愚猶竊有懼焉者誠恐萬分有一所以警動自新之目或未悉舉則釁孽之萌将有作於眇綿之間出於防慮之外者是以輙忘疎賤而妄以平日私憂過計之所及者深為陛下籌之則若講學以正心若修身以齊家若逺便嬖以近忠直若抑私恩以抗公道若明義理以絶神姦若擇師傳以輔皇儲若精選任以明體統若振綱紀以厲風俗若節財用以固邦本若修政事以攘夷狄凡是十者皆陛下所當警動自新而不可一有闕焉者也臣不勝犬馬愛君憂國之誠輙敢事為之説而昧死以獻謹條其事如左
