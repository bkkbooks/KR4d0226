body:
  text: 書知舊門人問答答蔡季通元定昨日上狀必已達此人至又辱書三復感歎不能自己所謂一劒兩段者改過之勇固當如此改過貴勇而防患貴怯二者相須然後眞可以修慝辨惑而成徙義崇德之功不然則向來竊聆悔過之言非不切至而前日之書頓至於此亦可驗矣自今以徃設使眞能一劒兩段亦不可以此自恃而平居無事常存祇畏警懼之心以防其源則庶乎其可耳易説三條昨亦思之此上下文本自通貫前此求其説而不得故各自為説而不能相通耳洗心齋戒特觀象玩辭觀變玩占之大者但方其退藏而與民同患之用已具及其應變則又所以齋戒而神明其德此則非聖人不能與精義致用利用崇德亦頗相類此下所言闔闢徃來乃易之道易有太極則承上文而言所以徃來闔闢而無窮者以其有是理耳有是理則天地設位而易行乎其中矣兩而生四四而生八至於八則三變相因而三才可見故聖人因之畫為八卦以形變易之妙而定吉凶至此然後可以言畫耳前所謂易有太極者恐未可以畫言也愚意如此不審如何答蔡季通人之有生性與氣合而已然即其已合而析言之則性主於理而無形氣主於形而有質以其主理而無形故公而無不善以其主形而有質故私而或不善以其公而善也故其發皆天理之所行以其私而或不善也故其發皆人欲之所作此舜之戒禹所以有人心道心之别蓋自其根本而已然非謂氣之所為有過不及而後流於人欲也然但謂之人心則固未以為悉皆邪惡但謂之危則固未以為便致凶咎但既不主於理而主於形則其流為邪惡以致凶咎亦不難矣此其所以為危非若道心之必善而無惡有安而無傾有凖的而可憑據也故必其致精一於此兩者之間使公而無不善者常為一身萬事之主而私而或不善者不得與焉則凡所云為不待擇於過與不及之間而自然無不中矣凡物剖判之初且當論其善不善二者既分之後方可論其中不中惟精惟一所以審其善不善也允執厥中則無過不及而自得中矣非精一以求中也此舜戒禹之本意而序文述之固未嘗直以形氣之發盡為不善而不容其有清明純粹之時如來諭之所疑也但此所謂清明純粹者既屬乎形氣之偶然則亦但能不隔乎理而助其發揮耳不可便認以為道心而欲据之以為精一之地也如孟子雖言夜氣而其所欲存者乃在乎仁義之心非直以此夜氣為主也雖言養氣而其所用力乃在乎集義非直就此氣中擇其無過不及者而養之也來諭主張氣字太過故於此有不察其他如分别中氣過不及處亦覺有差但既無與乎道心之㣲故有所不暇辨耳答蔡季通所諭以禮為先之説又似識造化之云不免倚於一物未是親切工夫耳大抵濂溪先生説得的當通書中數數拈出幾字要當如此瞥地即自然有箇省力處無規矩中却有規矩未造化時已有造化然後本隱之顯推見至隱無處不脗合也答蔡季通觀過説猶未安前日二生所寫告為収毁仍試别加思索只於欽夫舊説中去得昨來所攻之病便自妥帖簡當也國寳程書告早為校正示及書堂誠欲速就然當使伯夷築之乃佳耳小兒輩又煩収教尤劇愧荷但放逸之久告痛加繩約為幸所示孟子數説未及細觀畧看大意皆好但恐微細有所未盡耳所與子直書論大本處甚佳雖云凡聖本同亦有明與不明之異昨見子直説及正疑其太儱侗今得此書乃釋然耳通鑑東漢已後却未用得然昨日畧看更有一例如人主稱上稱車駕行幸皆臣子之詞我師我行人之屬皆内詞皆非所宜施於異代此類更須别考也但無道之君無故而入諸臣之家無詞以書只當書幸以見其出於私恩耳餘巻想看了若行李暫出告并所編例示及所欲改處望子細開諭也環中圖已見之初意書中别有宻傳耳樂圖曾理會否此便是七均八十四調之法變當是變徴閠當是變宮耳疑大樂亦只是如此推校但律之髙下未有凖則王朴之樂想亦只是得此法而不得律之髙下所云黄鐘之管與今黄鐘之聲相因因而推之得十二律乃是只以當時見存之律為凖如此安能得其眞耶故歐公云凡其所為當時莫敢難者然亦莫能加也似亦以此等為疑耳向所托校歸藏告示及晁以道易説亦望借及此書近細讀之恐程傳得之已多但不合全説作義理不就卜筮上看故其説有無頓著處耳今但作卜筮看而以其説推之道理自不可易但其間有不須得如此説處剩著道理耳正如詩之興者舊説常剩却一半道理也答蔡季通還家半月節中哀痛不自勝兩兒久欲遣去因循至今今熹亦欲過寒泉矣謹令詣左右告便令入學勿令遊嬉廢業子幸大兒不兒令讀時文然觀近年一種淺切文字殊不佳須尋得數十年前文字寛舒有議論者與看為佳雖不入時無可奈何要之將來若能入場屋得失又須有命决不專在趨時也向借得子勉舊本書義皆今人所不讀者其間儘有佳作又記向年曾畧看論粹前後集其間亦多好論然當時猶以為俚俗而不觀安知今日乃作此曲拍乎可歎此兒讀左傳向畢經書要處更令温繹為佳如禮記令揀篇讀韓歐曾蘇之文􅒔沛明白者揀數十篇令寫出反復成誦尤善莊荀之屬皆未讀可更與兼善斟酌度其緩急而授之也此兒作文更無向背徃來之勢自首至尾一様數段更看不得可怪望與鐫之小者尤難説然只作小詩無益更量其材而誘之爲幸近來覺得稍勝徃年不知竟能少進否可慮錢物已令攜去一千足米俟到后山遣致或彼價廉即寄錢去煩爲糴也子幸大兒不兒疑有誤字數日在家看得孟子兩篇今日讀滕文公篇觀其答景春之問直是痛快三復令人胸中浩然如濯江漢而暴秋陽也胡文定一書答朱子發舉南泉新猫話者集中有之否看此等處直是好著眼目也所論始終條理甚精宻矣引康節志文尤當兒寛未必是引孟子恐是古來樂家自有此語而因用之耳蓋前漢人多不甚説孟子也此亦無𦂳要但前日説中亦不曾如此説又其文太冗須更刋定趨約乃佳耳持養之功想日有味要之以久則克伐怨欲之私自當退聽矣欽夫伯恭晦叔得書納去一觀却付此便囘欽夫書勿以示人也伯恭竟未脫然前日答書不免又極論持養欽莊實有愧於其語然不敢私其身之意當有能識之者所答書無暇寫去大槩是此意可見也擇之亦得書中有數條今再以徃數書之説得暇試爲一一論之相見日面講也伯諫前日過宿其家來書示之渠甚歎服精進但公濟孤立甚可念恨無力能挽囘耳道間思久假之説欲下語云五伯假之而至於功施當時名顯後世則是久假而不歸矣人亦安能知其本非眞有哉孟子之言蓋疾矯偽之亂眞傷時人之易惑而非與五伯之辭也煩為呈似元禮可大二兄商量看如何今日因思此義偶得一法大抵思索義理到紛亂窒塞處須是一切掃去放教胸中空蕩蕩地了却舉起一看便自覺得有下落處此説向見李先生曾説來今日方眞實驗得如此非虚語也綱目數日曾看得否高紀中數詔極佳如立口賦法及求賢詔皆合入更煩推此類添入有看了冊旋付此童來幸甚易學辨惑及邵氏辨誣暫借皆可付此人便欲用也别又旬日已劇馳情奉告承即日秋暑侍履吉慶壽堂眷集一一佳勝爲慰前日之歎蓋見近日朋友談説紛然而躬行不力以至言談舉止之間猶未有以異於衆人是以憂之承問之及豈亦致疑於此耶古易納上坊中更有王日休所刋求之未獲可訪問考訂孰爲得失也鄙意與伯諫深欲季通一來稍霽便望命駕有合商量事甚多非書札所能辨也通鑑簽貼甚精宻乍到此未暇子細并俟相見面論撥冗作書遣此人歸不及詳悉千萬早來為佳兼善逺訪無以堪其意愧惕不自勝然捐其舊學之非非季通深排痛抵之力亦不能辨朋友正當如此衰懶不振負愧多矣渠不肻少留未及子細亦恨賢者不在此共評訂耳熹向所論中和等説近細思之病敗不少理固未易窮然昏憒如此殊可懼安得即面言之佇俟來音旦夕别遣人奉候啓䝉近又推得初揲之餘不五則九其數皆竒而其為數之實五三而九一之應圍三徑一之數第二三揲之餘不四則八其數皆偶而其爲數之實四八皆二亦應闈四用半之數是三揲之次亦已自有竒偶之分若第二三揲不掛則不復有此差别矣如何星經紫垣固所當先太微天市乃在二十八舎之中若列於前不知如何指其所在恐當云在紫垣之㫄某星至某星之外起某宿㡬度盡某宿幾度又記其帝坐處須云在某宿幾度距紫垣幾度赤道幾度距垣四面各幾處與垣外某星相直及記其昏見及昏旦夜半當中之月其垣四面之星亦須注與垣外某星相直乃可易曉不知盛意如何也㕘同二冊鍾乳一兩納上考異熹安能决其是非但恐文義音讀間有可商量處耳鐘律之篇大槩原於舊編而其先後不同蓋但用古書本語或注疏而以已意附其下方甚簡約而極周盡學樂者一覽可得梗槩其他推説之汎濫㫄證之異同不盡載也當俟歸日面呈决求訂正耳星經可付三哥畢其事否甚願早見之也近校得步天歌頗不錯其説雖淺而詞甚俚然亦初學之階梯也但限難得人説話非惟不能有助亦自不曉人意令人鬱鬱無分付處想亦不能無此歎也答蔡季通人還承書為慰又承示及行日卦爻之説尤荷留念即此春暖共惟尊履萬福所苦比復如何須鹿茸納去視至通鑑本末并注綱目提要第九第十冊以是未定不曾寫此物甚難作書法固不可不本春秋然又全用春秋不得舊有例一冊不知曾并送去了洪範新説恨未得聞俟面見以請算工俟為尋訪然亦須立一格目要得甚様人始得如州縣攢司儘有能算者但恐不能算厯耳人還承書知已還舎為慰易圖甚精但發例中不能盡述當畧提破而籍圖以傳耳陳法大畧亦可見當如近日所説但未能洞曉其曲折耳藥圖煩更問子本此只有十二樣而調見之多何耶琴説亦告尋便示及千萬調見之多疑有誤字登山失事人知如此雖遂事不諫亦可斟酌簡其功程也二譜已領昨日過元善聽其絃歌二南七月頗可聽但恐嚇走孔夫子耳磬制乃賢者立論之失豈可推范蜀公蜀公若道季通許多説著處都不推我只這一事錯了便相執殢則將何詞以對耶如此䕶前恐為心術之害不但一事之失也通書注修改甚精元來誠幾德便是太極二五此老些子活計盡在裏許也前後把他讀了幾過都不曾見此意思於此益知讀書之難也近得林黄中書大罵康節數學横渠西銘袁機仲亦來攻邵氏甚急可笑嘗記共甫説徃時有亡大夫坐乞毁通鑑板被責發來復官詞臣草其制有一聨云出幽谷而遷喬木朕姑示於寛恩以鴟鶚而笑鳳凰爾無沈於迷識此輩今亦可并按也一笑前日七八九六之説於意云何近細推之乃自河圖而來即老兄所謂洛書者欲於啓䝉之首增此一篇并列河圖洛書以發其端而揲蓍法中只自大衍以下又分變卦圖别爲一篇此卦以後雖不畫卦亦列卦名庶幾易檢幸為錄示也河洛辨説甚詳然皆在夫子作傳之後其間極有不足據以爲説者鄙意但覺九宮之圖意義精約故疑其先出而八卦十數九疇五行各出一圖自不相妨故有虚中為易實中為範之説自謂頗得其旨今詳所論亦是一説更俟面論然恐卒未有定論不若兩存以俟後人之為愈也歸竒多寡不同向時嘗辱見示無可疑者似合附入圖中今却附還幸便寫入四象之後也律吕新書并徃題辭協律恨未得聞且愧其詞義之不稱也祭禮只是於温公儀内少增損之正欲商訂須俟開春稍暇乃可爲也程氏冬至立春二祭昔嘗為之或者頗以僣上為疑亦不爲無理亦并俟詳議也作肅所求熹與其人本不相熟今才一見耳固不容便作書亦見近日朋友憂道不如憂貧之切心甚愧恐平日所講果爲何事而一旦小利害便打不過欲望其守死善道難矣答蔡季通至臨江忽被改除之命超越非常不敢當也始者猶欲且歸里中俟辭召命予决今既如此又得朝士書皆云召旨乃出上意親批且屢問及不可不來又云主上虚心好學增置講員廣立程課深有願治之意果如此實國家萬萬無疆之休義不可不一徃遂自臨川改轅趨信上以俟辭免之報但嶽麓事前書奉報乃廷老所定後兩日彦忠到却説合在風雩右手僧寺菜畦之中背負亭脚面對筆架山面前便有右邊横按掩抱左邊坂亦拱揖勢似差勝但地盤直淺而横闊恐須作排㕔堂乃可容耳已屬廷老更畫圖來納去求正而未至更俟其來當别遣人但代者乃毁道學之人未知其能不敗此否耳熹老矣方學做官甚可笑朝從奔走皆非所堪但叨冒過分上恩深厚未敢言去耳經筵陳説不敢不盡區區上意亦頗相嚮但未䝉下問反復未得傾竭鄙懐耳君舉在上前陳説極詳緩勤懇其所長自不可及區區實敬愛之非但如來教所云也通理宗教之命己行前日亦已歸矣渠年少家温所欠者腹中書耳得闕遠官閒更讀數年書未必不為福也何必汲汲於此乎公濟不長進只管來討書若有相識自不須説若無如何寫得不知他許多禪寄放甚處臨此等小小利害便如此手足皆露也不知今已行未如未行煩致意不成臘月三十日亦問人討書去見閻家老子也諸公已各爲致意但黄文叔已逝去熹來亦不及見之此非獨吾黨惜之亦爲宗社惜也今日進講恭聞玉音以爲太上心氣漸寧但尚苦健忘發引之前必得相見此亦是一大事幸甚幸甚恐欲知之也不知何時可赴三衢之約能乘興東下爲數日欵幸甚樓陳諸公亦數奉問也修厯事若下須更商量蓋但測驗即人皆可爲或須改造則恐不免一出亦非今日一時事也史遷不可謂不知孔子然亦知孔子之粗耳歴代世變即六國表序是其極致乃是俗人之論知孔子者固如是耶正朔服色乃當時論者所共言如賈生公孫臣新垣平之徒皆言之豈獨遷也此等處自是渠輩眼目低故見得高了亦可笑耳祭法須以宗法㕘之古人所謂始祖亦但謂始爵及别子耳非如程氏所祭之遠上僣則過於禘下僣則奪其宗之爲未安也厯事不知後來有何施行若如其説不知可爲一行否祭法世數明有等差未易遽改古人非不知祖不可㤀而立法如此恐亦自有精意也史説不知渠説好處是如何好必須曾舉一二尤𦂳切處若只如曹器逺輩所説則亦不足言也答蔡季通癸丑三月二十一日中間到宅上聞是日得子深爲贊喜衰鈍之蹤素不利市自年三十餘時每到人家輒令人生女如是凡五七處今年乃値慶門得男則又似漸有傾否亨屯之象既以奉慶又竊自賀但恨其已晚耳夏口武昌一帶形勢既聞命矣渉重湖窺衡湘歴襄漢下吳㑹方羊而歸所得當益富屈指計歸程兾得傾竦以聽劇談也律凖前日一哥來此已刻字調絃而去但中絃須得律管然後可定然則此器亦是樂家第二義也閣記固難遽辦又適此數日脚氣雖輕而未愈今旦右臂下自爪掌以上連肩背無處不痛寒熱大作其勢非更數日卒不能定不知許教既滿彼中代者為誰或同官中别有可託以竟此事者為誰亦已作書報之及與元善説俟此間病愈一面捻合成當尋的便寄薛卿處與之當無不達也今年病雖不重而氣體極衰至於昨日遂至無力説話朋友遠來相守又不欲甚孤其意勉强應接常慮相見之日不復更能長久季通倦游亦望早歸相與切磋以盡餘年實所願望啓䝉修了未早欲得之通書皇極例等説不知已下手否如未幸早為之乍歸窘甚㸑無欲請之人只欲得賢者一來㑹語數日爲幸切不必多與人同虚費又難語也可以他意却之不必露此千萬千萬所苦且喜向安亦宜更加將䕶也許見訪甚幸但亦自欲一到寒泉未能預定日子恐或途中相失也此行見上褒予甚至言雖狂妄亦無忤色意謂可以少効尺寸而事之不可料者乃發於先天訂頑之間是可笑也已專人自劾及盡還江右迓兵矣此等小小怪謬議論如蝟毛而起更不可開口奈何始者信書太過而閲人不廣不謂萬物之靈者乃如此不靈也奈何更五七日當有後命未知如何也元善説欲下州郡月致筆札之費然此事亦當審處恐此事面生後或有悔也伯諫來此已兩三日初欲來日歸因與商量約左右一來相聚今專遣此人相挽渠亦遣人歸戒徒御少緩一兩日來矣千萬即命駕其所論極不爭多孤城悉㧞合軍并力一鼓可克也中間報去欲改文王八卦邵子説應天時應地方説下注脚今覆檢之不得其説恐前説有誤却錯改却印本煩令一哥檢出錄示幸甚細詳此圖若以卦畫言之則震以一陽居下兌以一陰居上而相對坎以一陽居中離以一陰居中故相對巽以一陰居下艮以一陽居上故相對乾純陽坤純陰故相對此亦是一説但不知何故四隅之卦却如此相對耳此圖是説不得也聞有在陳之厄不能有以相周爲之歎息而已律説少有礙處便不可筆之於書此意甚善不惟此一事而已它事亦何莫不然也但員徑亦須更子細如引漢志由此之義起十二律之周徑恐未免有牽强處也嘉量積處數之前合定方深圍徑之數以相㕘驗證辨首章可早修定寄來商量此處無頭難下語也四象之數前日間推只自三畫未成之時已具此數葢太陽居一而含九少陰居二而含八少陽居三而含七太陰居四而含六不待揲蓍而後有也揲蓍歸竒之數乃是揍著此數過揲之數又是揍著歸竒之數耳近見論者專以過揲之數斷七八九六之説至於歸竒之數尚不能明况能及此乎嘗爲之説曰四象之畫六七八九之祖也四象之次六七八九之父也歸竒者其子也過揲者其孫也此論似不可易又曰象之次自十倒數畫六而得太陰之四以上皆然又屈五指而計之一與九同二與八同三與七同四與六同此亦自然不言之妙直是可笑不由人安排也不知明者以爲何如啓蒙所疑當得面扣然得先批示大畧尤佳歸竒已具卦象固平日所常論但亦其中一小支節耳葢其多寡不均無所發明於蓍卦之説正自不足深論也如何如何律説幸早改定過彼即借看或能相伴入城途中得欵曲商訂尤幸也中庸序云若吾夫子則雖不得其位昨看此間寫本脫一吾字煩一哥爲看如少即添之此雖不繫義理然亦覺少不得也費隱之説今日終日安排終不能定葢察乎天地終是説做隱字不得百種計較更説不來且是所説不知不能有憾等句虚無恍惚如捕風繫影聖人平日之言恐無是也與未之或知不可能也不同不審看得如何幸詳以見喩也仁義之説固如來喩但於説卦六畫中安排則仁剛義柔不可易矣仁柔義剛又别是一説不相㕘雜也程先生謂天地間無截然爲陰爲陽之理然其升降生殺之大分不可無也正是此意而袁於此等處都瞢然不曉所以難説話也修身齊家固當警省至於有無之慮姑直任之不必切切介意若此等處更放不下即修行轉無力矣區區於此可憂者大於老兄然亦只得隨事驅遣瞑目之後一切任之亦不復屬自己界分矣中庸詩傳幸速修改示及中庸更有數處今并錄呈幸即付之也西山之約一何拒客之深耶俟武夷歸别當奉扣然臨風引領似已聞采薇之歌矣歸來又得伯恭書云學者須是專心致志絶利一源凝聚渟滀方始収拾得上此論甚當不敢不以告也吳㑹文字已領亦甚不易但無斁三篇似不甚條暢耳數日臨睡讀史記一兩巻沈著痛快眞不可及不知永嘉諸人尊信此書而道德言語却不相似是何故也豈善學栁下惠者固如是耶元吉尚未行何耶渠來此未嘗不忠告之但渠自不耐煩而憤然訣去豈長者之絶子乎季通似亦不須枉費心力宋元憲公牢籠之事吾所不能而聖人亦已固有顯比之訓矣若必人人贈言以悦之豈不勞哉公濟伯諫得書否某歸途過伯諫見收公濟書大段手忙脚亂也大學誠意之説已再觀之果如所論想他書似此處多須一一整頓也明道遺文納去一本答蔡季通律書中有欲改更别紙奉呈不審如此是否幸早報及也易中七八九六之數向來只從揲蓍處推起雖亦脗合然終覺曲折太多不甚簡易疑非所以得數之原近因閒看四象次第偶得其説極為徑捷不審亦嘗如此推尋否亦幸語及本原第一章圍徑之説殊不分明此是最大節目不可草草候氣章恐合移在第四五間葢律之分寸既定便當埋管候氣以驗其應否至於播之五聲二變而爲六十調者乃其餘耳况審度嘉量謹權尤不當在候氣之前也但候氣章已有黄鐘之變半分數而前章未有明文恐合於正律分寸章後别立一章具載六變律及正半變半聲律之長短分寸乃爲完備耳後段論説有發明此章指者并移附入審度章云云生於黄鐘之長下當改云以子榖秬黍中者九十枚度之一爲一分凡黍實於管中千三枚而滿一重積九十重則千二百枚而滿一龠矣故此九十枚之數與下章千一百枚之數其實一也十分爲寸云云嘉量章龠合升斗斛皆當實計廣狹分寸證辨第一章今欲求聲氣之中下當改云而莫適爲凖則莫若且多截竹以擬黄鐘之管或極其短或極其長長短之内每差一分而爲一管皆即以其長權爲九寸而度其圍徑如黄鐘之法焉如是則更迭以吹云云司馬貞九分爲寸之説本原既不載恐合於證辨中立爲一條以證前篇之説諸尺是非後來考得如何已改定幸錄示答蔡季通前日埜行已拜狀不審即日行次何許每念逺别不勝惆悵至於讀書玩理欲講而無從又不但常人離别之思也云云熹連日讀㕘同頗有趣知千周萬遍非虚言也但恨前此不得面扣耳向見爲抄一冊卦氣消息者不知了未幸語一哥取以見予也又讀握機後語何也數條尤竒昔葢未有此體亦恨不得䆒其説耳平日相聚未知其樂别後乃覺闕事可歎可歎答蔡季通别後得到豊城及宜春書知途中諸况足以爲慰但至今尚未聞到舂陵復深以為懸念每至讀書講學無可咨扣無可告語尤覺仰德之深也比日恭惟尊候萬福三哥子陵一一安佳此亦時得一哥書八哥前日入城亦過此熹足病前日幾作今又小定未知竟如何但精神日耗血氣日衰舊學荒蕪有退無進恐遂沒沒無聞而死耳樂書非敢㤀之但方此齰舌豈敢更妄作耶此書决然冺沒不得近看他人所説更無堪入耳者不知老兄平日與元善相處曾説到子細處否但恐子期不曾聽得便只似不曾説也近因諸人論琴就一哥借得所畫圖子適合鄙意乃知朝瑞只説得黄鐘一均内最上一絃而遽以論琴之全體宜乎膠固偏執而無所合也學不欲陋豈不信然偶有邵州便託彥中附此亦令過一哥處取安問矣政遠千萬爲道自愛答蔡季通云云琴説向寄去者尚有説不透處今别改定一條錄呈比舊似差明白不審盛意以爲如何琴固每絃各有五聲然亦有一絃自有爲一聲之法故沈存中之説未可盡以爲不然大抵世間萬事其間義理精妙無窮皆未易以一言斷其始終須看得玲瓏透脫不相妨礙方是物格之驗也衆至之患賢者所未免乃以散遣諸生見教何耶此亦任其去來若有患難雖杜門齰舌亦未必可免也答蔡季通琴中旋宫一事正爲初絃有𦂳慢而衆絃隨之耳若一定而不可移則旋宫之法何所施耶但恐午未以後聲太髙急而小絃斷絶故疑所謂五降者乃謂蕤賓以下不可爲宫耳此説固未必然然與今所謂一定而不可易古所謂隨十二月爲宫者似得中制試更推之如何復以見教也參同之説子細推尋見得一息之間便有晦朔弦望上弦者氣之方息自上而下也下弦者氣之方消自下而上也望者氣之盈也日沈於下而月圓於上也晦朔之間者日月之合乎上所謂舉水以滅火金來歸性初之類是也眼中見得了了如此但無下手處耳自從别後此等事更無商量處劇令人憒憒今此病中又百事不敢思量未知異時賢者之歸得復相見論此否耳答蔡季通熹自開正即病至今未平今日方能把筆作書足猶未能平步也氣血日衰前去光景想亦不多病中塊坐又未能息心休養才方繙動冊子便覺前人闊畧病敗欲以告人而無可告者又不免輒起著述之念亦是閒中一大魔障欲力去之而未能以此極思向來承晤之樂未知此生能復相從如徃時否耳知看語孟有味深慰所願已許誨示幸早寄及也前書奉扣琴譜旋宫之法不知考得果如何若初弦一定不復更可𦂳慢恐無是理也答方伯謨士繇隨時變易以從道主卦爻而言然天理人事皆在其中今且以乾卦潛見飛躍觀之其流行而至此者易也其定理之當然者道也故明道亦曰其體則謂之易其理則謂之道而伊川又謂變易而後合道易字與道字不相似也又云人隨時變易爲何爲從道也此皆可以見其意矣易中無一卦一爻不具此理所以沿流而可以求其源也會以理之所聚而言通以事之所宜而言其實一也或躍在淵九四中不在人則其進而至乎九五之位亦無嫌矣但君子本非有此心故云或躍而文言又以非爲邪也等語釋之九六之説楊遵道錄中一段發明傳意與來喩不同然亦未曉其説嘗謂五行成數去其地十之土而不用則七八九六而已陽竒陰耦故七九爲陽六八爲陰陽進陰退故九六爲老七八為少然陽極於九則退八而爲陰陰極於六則進七而爲陽一進一退循環無端此揲蓍之法所以用九六而不用七八蓋取其變也只以此説推之似無窒礙龜山所謂參之爲九兩之爲六乃康節以三爲眞數故以三兩乘之而得九六之數今以一三五爲九二四爲六則乃是積數非㕘之兩之之謂且若此而爲九六則所謂七八者又何自而來乎疑亦未安大明終始傳意自明其曰明曰見曰當非人而何更看揚遵道錄中一段則尤分明矣天人一理人之動乃天之運也然以私意而動則人而不天矣惟其潛見飛躍各得其時則是以人當天也然不言當天而言御天以見遲速進退之在我爾雖云在我然心理合一初無二體但主心而言爾元者用之端而亨利貞之理具焉至於爲亨爲利爲貞則亦元之爲爾此元之所以包四德也若分而言之則元亨誠之通利貞誠之復其體用固有在矣恐亦不得如龜山之説也以用言則元爲主以體言則貞爲主彖詞乃卜筮詞釋彖則夫子推其理以釋之也以安貞之吉應地無疆爲卜筮之詞恐記之誤也答方伯謨夫子夢寐周公正是聖人至誠不息處然時止時行無所凝滯亦未嘗不灑落也故及其衰則不復夢亦可見矣若是合做底事則豈容有所忽忘耶以忘物爲髙乃老莊之偏説上蔡所論曾㸃事似好然其説之流恐不免有此弊也志於道志字如有向望求索之意大學格物致知即其事也衛輒事龜山以爲有靈公之命左傳史記皆無此説冉有子貢之疑只以嫡孫承重之常法言之似有可以得國之理耳謂夷齊不當去此説深所未曉且當闕之不義而富且貴所謂富貴非指天位天職而言但言勢位奉養之盛耳此等物若以義而得則聖人隨其所遇若固有之無鄙厭之心焉但以不義而得則不以易吾飯疏飲水之樂耳富而可求以文義推之當從謝楊之説東坡説亦是此意似更分明葢上句是假設之詞下句方是正意下句説從吾所好便見上句執鞭之事非所好矣更味而字雖字亦字可見文勢重處在下句也答方伯謨正所以立近之全字不穩當俟更思之齊王見牛兩段當未發見時便合涵養惟其平日有涵養之功是以發見著明而擴充逺大也若必俟其發見然後保夫未發之理則是未發之時漠然忘之及其發然後助之長也泄柳申詳聞李先生説正如是林説恐非天之生物使之一本前説是王驩之説亦是周公之過只依舊説孟子言昔者所進今日不知其亡故王問何以識其不才而舎之而孟子告以進賢如不得已葢於進退之間無所不審非但使之致察於去人殺人也明道先生言性即氣氣即性生之謂也又云論性不論氣不備論氣不論性不明二之便不是大抵本然之性與氣質之性亦非判然兩物也前日之説只是論性雖有五然却亦不離乎一未有磨瑩澄治之意也仁覺兩段互有得失然論愈精㣲言愈易差不若只遵伊川先生之説以公字思量而從事乎克復之實久當自有見也正固便是事之榦故傳曰亨貞之體各稱其事明其義與乾坤不殊但各主於其事而言耳觀六三傳但以爲未至失道而求不失道耳非直以爲不失道也鬼神功用之説得之李説不可曉不知如何自有一種意亦不解其文義也揲法陽爻皆用九而不用七故於純陽之卦發此凡例凡揲而六爻皆九者則以此辭占之見羣龍謂値此六爻皆九也無首謂陽變而陰也剛而能柔故吉而聖人因之以發明剛而不過爲用剛之道也左傳蔡墨云在乾之坤曰見羣龍無首吉杜注亦如此説知至至之知終終之舊來所説未是遺書知至至之主知知終終之主終蓋上句則以知至爲重而至之二字爲輕下句則以知終爲輕而終之二字爲重也存義言其有以存是理而不失非有取乎不過之義也碩果不食只不食便有復生之意不必云推廣而言也答方伯謨昨承致書久無便可報但每朋友講論未嘗不奉懷耳文字煩抄錄爲愧比復有更定一二且未可出以示人也所論數條足見思索之深甚副所望正所以守守字誠未安但此字難下不知曾爲思之否因來及之得以反復也所論聖賢立言之意亦中淺陋之失葢當時欲矯其顧慮遲疑之弊不自覺其過而生病耳頃嘗語伯恭此是吾二人氣質之偏當各加矯革古人韋絃之戒殆正爲此設也所論陰陽男女之説則未然天地之間陰陽而已以人分之則男女也以事言之則善惡也何適而不得其類哉中正仁義如君子時中順受其正仁者愛人義以爲質之類皆周子之意他處有不同者各隨所主而言初不相妨如子貢以學不厭爲智教不倦爲仁而中庸則以成已爲仁成物爲智此類亦可推矣甚思晤語秋前想未能來有便時寄所疑爲望答方伯謨熹自春涉夏多病多故奔走出入不得少休近屏杯杓病才少愈惟是事端無窮未有寧息之期又迫朝命有託故稽留今憲府覺察指揮勢或當一出前憂後愧未知所以爲計也甚欲一與伯謨相見不知能乘隙一見過否來月之初須且扶送叔母之䘮還政和歸來月末方得爲去計也擇之來此已兩月秋間方歸日間時有講論然苦人事斷續不得專一若伯謨能一來爲旬日欵殊慰所望也子澄亦到此三四日而行令舅府判侍次煩爲致問訊意此便少遽未及拜書克明爲况何如曾再徃光澤否欲作書及附趙宰書亦未暇悉煩道區區或伯謨未能來近日講學所得所疑便還畧告批喻李君到彼畧周顧之爲幸未間千萬力學自愛答方伯謨昨王變還承書至慰不聞問又許久劇暑伏惟侍履佳勝所喻心説似未安葢孔子説此四句而以惟心之謂與結之不應如此著力却只形容得一箇不好底心也來書所説自相矛盾處亦多可更詳之令舅府判侍次嘗及此否試爲質之必有至當之説也克明及諸朋友皆煩以此詢之誠之聞歸已久不知今在甚處或見煩致意南軒云有書附渠來告早尋便示及也答方伯謨前日託俞尉附一書當達比日逺惟侍學增勝前所懇令舅府判兄作字不知已爲落茟否二月甲子下更著一朔字尤佳仍望早附的便示及也近作得六先生画象贊謾錄去煩呈令舅一觀求其未當處旦夕畵成當并以拜凂早得刋定爲幸耳李積㣲篆字墨本近偶得之似亦不滿人意小技難精猶如此况其大者乎得連嵩卿書云廖子晦言天地之性即我之性豈有死而遽亡之理因引大全集中堯舜託生之語爲證渠諸人未有以折之伯謨可與克明各下一語便中見喩也月初至寒泉叔京約來相聚旬日不知能約諸同志者同爲此㑹否但恐不欲令諸生又廢業耳答方伯謨昨附兪尉及崇化兩書不知皆達否得兼善報云所要文字已發去想亦已到久矣前書託禀令舅向日所凂敬箴更求注字乾道癸巳二月甲子新安朱熹作建安吕闕書後書欲甲子下增一朔字不知已爲寫否如已寫下即於空處别寫此字不妨不必易紙也六先生象内去并煩求揮翰但不知前日所呈本子曾經㕘訂否今别錄去内畧有改更處又叔京疑伊川贊後四句不相應本意謂伊川之言平易深逺人所難識耳不知叔京之意如何渠又疑横渠贊中逃字據行狀云於是盡棄舊學淳如也即是舊時嘗有雜學下此字似亦不妨更禀令舅看如何若無可疑即乞爲書付此便囘并所懇敬箴此贊就畫象上寫一本須依今寫去本首尾向背葢隨靣所向也就此界紙上寫一本首尾亦依寫去本此本伯諫欲刻石如紙不好界不匀即煩爲易之如叔京之説當改或别有可疑處即且留此畫於彼人囘喩及俟却報去也敬箴大本乃立一句乃字不知舊作甚字恐舊本不同即改作乃字爲佳數以鄙語塵溷妙筆何愧如之數日偶無事了得數篇文字未有人寫得去俟後便也向䟦胡公帖煩錄一本并䟦語付此人囘或有講論亦可付此便此便甚的也與方伯謨人還承書至慰比日逺惟侍履佳勝篆字甚佳然其間不能無病筆已封寄去但恐彼欲磨崖則所書大字或不堪用今其人過彼更煩别爲大書徑尺以上者封與誠之令轉呈南軒但筆路亦須稍重葢恐崖石麤若字畫太細即不可辨耳向寄二刻不必寄來只留几間可也許來春見過幸甚但正初恐亦須畧出叔京又約相㑹於邵武若至此相聚尤便但恐人事擾擾不能從容耳所欲言者無窮未即㑹靣千萬自愛孟子説附還彼中朋友商量此書有疑處否與方伯謨昨承枉顧别遽累月馳向深矣比日春晚伏惟侍學増勝所與處者爲誰見作何等工夫有可以見告者便中及之爲幸熹近嘗一至雲谷留十餘日朋友來集隨分有少講論大率追正舊説之太高者爲多也克明德柄皆未及書煩爲致意直翁聞問否欲作書亦未暇俟後便也濟之有少文字欲至彼粥之有可爲鄉導處幸畧爲致力幸甚長沙人歸未耶與方伯謨别後一得手書亦無復可報今復久不聞問懷想可量比想劇暑侍履佳慶熹衰悴如昨欲徃弔茂實至今未能不免且遣人致書亦復因循不能得遣葢目前百事敗人意當此午暑時兩眼幾不復可視物也向見所作平父諸小詩甚佳章辰州爲人求詩懶甚無佳思輒以奉煩渠本取韋賢語名閣須畧㸃破也近讀何書向見頗有因循之病更宜勉彊區區所望於賢者不但如此而已也季通病甚彊起如建陽料理墳墓數日不得書不知爲况如何聞欲遂過邵武不知是否遣此人本欲子細作書適意思不佳草草附此殊不及所懷之一二季克佐卿皆已得郡季克待闕否佐卿想便赴官也因見致意倦甚未及拜狀也方暑自愛與方伯謨熹此粗安免章雖未報然諸公已見許章下必遂請無疑也前日所説伯恭昏事以書問之得其兄弟報字只要年長淑善安貧睦族他所不計以吾輩度之更須耐靜已悉以屬茂實亦畧與周佐説來祝其宻之只與伯謨商量若有七八分以上可問即爲㣲扣之却託茂實專人來報也千萬留意至祝至祝茂實仲本前日到此不及登山然却得靜坐兩日説話頗欵仲本託爲齋記已爲草寄當必見之也虞祠刻已寄來規模甚大文固不稱篆額似亦差小耳未有别本俟續得之當分去也前書所煩作字便中示及爲幸置物亦然季通竟罹家難窘廹可念彼中葬事如何勢須俟堯舉復來耳仲本别時所寄聲奉聞者想已發之此不可已也與方伯謨昨承逺訪愧感良深别去惘惘人還奉告聞比日侍履佳勝爲幸熹悲悴如昨無可言甚感愛念寛勉之意然觸事傷懐亦未能遽平也匕筯衣被并領季通屢得書殊未有定論然亦未聞其西去之期不知果如何耳錄示九江文字甚發人意大體只須如此得失已自可見但恐未足以盡其情偽曲折之變彼或以吾曹爲真可欺耳然世間自當有明眼人此亦初不足辨也得伯恭書云到㑹稽見伯諫守其所聞牢不可破自信之篤如此亦良可尚耳常德一書煩達之想日相聚所講論當益有緒因便示一二爲幸因孫巨源見過附此草草襄事之後能一來顧慰此幽鬰否乎常德之官後别有學徒相從否因便早及之爲望與方伯謨前日承書人還匆匆不能作報比日秋暑德履佳勝永福収近信否熹此諸况如前所與廷老書此後竟未得雨祈禱萬方平生所不欲爲者皆爲之亦卒無驗然每設醮處爲人引去天師前燒香即記著後漢書此亦何縁有效也捄災之備不敢不勉但今日上下不相恤雖已具奏及申省部諸司未知復如何也在今日義不當求去萬一所請不從則亦可以已矣但憲司有相料理之意今日又聞其劾信州林子方此亦是殺鳴犢底消息旦夕或自以此去不可知耳數日前曽得趙帥兄弟書因欲至一奠今爲此災傷凡百皆廢且徃空書因見幸畧及之也居仁遭誰䘮昨日欲作書偶檢來書不見下筆不得因書更報及也撇過建安良便恐此間動未得秋凉能來爲幸但恐薦送即又不容來耳諸刻昨已遣去想已達未相見珍重與方伯謨韓文考異大字以國子監版本爲主而注其同異如云某本某作某辨其是非如云今按云云斷其取舎從監本者已定則云某本非是諸别本各異則云皆非是未定則各加疑字别本者已定則云定當從某本未定則云且當從某本或監本别本皆可疑則云當闕或云未詳其不足辨者畧注而已不必辨而斷也熹不及奉書考異須如此方有條理幸更詳之與方伯謨便中承書具審即日所履佳勝爲慰親闈安問想不輟収也惠及新茶極感厚意病軀更此蒸濕却幸不動飰食亦粗喫得只願且得如此則譴呵之及有以當之他不足計也韓文考異已寫成未如無人寫可懇元善轉借一二筆吏速寫以來只有此一事稍稍趨時不可緩也與方伯謨比想所履日佳端午莫須一歸否耶韓考煩早爲并手寫來便付此人尤幸聞冰玉皆入僞黨爲之奈何爲之魁者不暇自謀特爲賢者慮破頭耳因便草草與方伯謨適方遣人奉簡忽承手示爲慰㓜恭書已領少須手可作字并奉報章但不知其行期在幾時幸批報也韓考已領今早遣去者更煩詳閲籖示適有人自三衢來云瑣闥以論陳源故補外見詹卿及之人還草草楊子序篇有冠乎羣倫之云以爲無義者固可笑而問人出處者亦踈脱也與方伯謨承簡喜聞佳勝韓考所訂皆甚善比亦别修得一例稍分明五夫人到日能畧過此少欵一二日爲幸勿以徒御爲憂白飰青芻不難辦也兼更欲有所扣耳人還草草與方伯謨熹今年之病久而甚衰此月來方能飲食亦縁灸得脾腎逾數壯似頗得力也韓考已從頭整頓一過今且附去十巻更煩爲看籖出疑誤處附來換下巻但鄙意更欲俟審定所當從之正字後却修過以今定本爲主而注諸本之得失於下則方本自在其間亦不妨有所辨論而體靣正當不見排抵顯然之迹但今未暇耳縁其間有未甚定處須更子細爲難也記得籍溪先生曽寫得陳希夷墓表云是吕洞賓所撰見與偶尋不見煩爲問子端恐有本即爲借寫一本附來也廟額方礬得紙旦夕寫得自從此寄去所求龕額便中望早寄也天氣甚好能下來數日否與方伯謨别近旬日不審爲况復何如前日匆匆又以病作遽歸不及拜尊夫人皇恐不可言也大哥來聞子端竟有哭子之悲深爲惘然且煩致意不及附書爲問也欲煩篆數十字納去紙兩巻各有題識幸便爲落筆欲寄江西刻之巖石有人在此等候不能久也千萬便付此人囘仍不須大作意只譬如等閒胡寫則神全氣定自然合作矣更欲篆六十四卦名及一等小字數十其界紙又作一封請并書之所寫之字各在封内矣熹忽聞有鐫職罷祠之命尚未被受不勝皇恐何時可來相聚數日耶專人馳布不宣大哥今日已行矣已戒令速去恐碑倒也可因書更促之與方伯謨詹卿昨日過此尚在南林更兩三日方行不出見之否韓文欲并外集及順錄作考異能爲員滿此功德否耶宓子賤洪慶善楚辭補注中引顔之推説云是伏字濟南伏生即其後也如何如何與方伯謨昨辱惠書爲慰但見元興及小兒皆説伯謨頗覺衰悴何爲如此今想已彊健矣更宜節適自愛但彊其志則氣自隨之些小外邪不能爲害也熹病軀粗遣諸證亦時徃來但亦隨事損益終是多服補藥不得令子聞已歸韓文外集考異曾帶得歸否便中得早寄示幸幸正集者已寫了更得此補足須更送去詳定莊仲爲㸃勘已頗詳細矣近又看楚詞抄得數巻大抵世間文字無不錯誤可歎也趙幹之喻荷其不鄙冒此􅇖險尤見所存異於流俗之意但憂畏之餘多所謝絶固不容獨破戒幸爲道此區區多謝其意可也異時未死之間禁網稍寛則或尚可勉彊也因便寓此草草與方伯謨昨日承寄示吕公奏議至感至感比想侍奏佳慶令子程試必甚如意聞將以望前一日揭牓冀聞吉語也奏議得一快讀甚幸朝廷無此議論六十年矣可爲慨歎也但末卷乞詔定大舉䇿一篇未竟而定䇿大舉一篇全無幸更爲補之乃佳耳韓考後巻如何得早檢示幸甚熹衰病百變支吾不暇近又得一竒證若寒疝者間或腹中氣刺而痛未知竟如何姑復任之耳答梁文叔瑑澹臺石刻已領考證詳宻亦自是一種工夫也畧於制度之説不知謂何徃徃亦多是問得繁碎非學者所先或是從來剖判不得如論語千乘之國注家自是兩説此等如何強通况又舎所急之義理而從事於此縱得其説亦何所用乎昨日有人問看史之法熹告以當且治經求聖賢修已治人之要然後可以及此想見傳聞又説不敎人看史矣答梁文叔日用功夫如此甚善然須實下功夫只説得不濟事也李先生意只是要得學者靜中有箇主宰存養處然一向如此又不得也皇極之説來説亦得之大抵此章自皇建其有極以下是緫説人君正心修身立大中至正之標凖以觀天下而天下化之之義無偏無陂以下乃是反覆贊歎正説皇極體段曰皇極之敷言以下是推本結煞一章之大意向見諸葛誠之説畧是如此但渠説有過當處耳答梁文叔示喻所處甚善不知幾道相聚作何工夫近看孟子見人即道性善稱堯舜此是第一義若於此看得透信得及直下便是聖賢更無一毫人欲之私做得病痛若信不及孟子又説箇第二節工夫又只引成覸顏淵公明儀三段説話敎人如此發憤勇猛向前日用之間不得存留一毫人欲之私在這裏此外更無别法若於此有箇奮迅興起處方有田地可下功夫不然即是畫脂鏤氷無眞實得力處也近日見得如此自覺頗得力與前日不同故此奉報可以呈幾道也答梁文叔鄭康成所説氣魄雜學辨云精聚則魄聚氣聚則䰟聚蓋精是陰氣如耳目之聰明乃陰精之所爲故謂之魄或欲於魄中求䰟䰟中求魄瑑竊謂氣在人之一身陽即爲䰟陰則爲魄嘘吸聰明乃是一身之中䰟魄之所發見而易見者耳恐不必於䰟中求魄魄中求䰟也精氣周流充滿於一身之中嘘吸聰明乃其發而易見者固如來喻然既周流充滿於一身之中則鼻之知臭口之知味非魄耶耳目之中皆有煖氣非䰟耶推之遍體莫不皆然佛書論四大處似亦粗述此意體魄歸於地先生云體魄自是兩物不知如何分别以目之明言之則目之輪一成而不可變者體也睛中之明而能照鑑萬象者魄也魄既降則目之輪雖存而其精光則無矣以耳之聰求之未透蓋耳但見其竅而不見其他故也所論目之體魄得之耳則竅即體也何暇他求耶體魄既是兩物不知䰟與氣亦爲兩物否孔頴達謂䰟附於氣中庸或問直指康成之説則孔氏之説亦未得爲通論體魄從前所聞只指爲一物是以今人言目魄亦皆以黑處爲魄若以眼光落地之説推之竊恐月之全輪受光處爲魄及其月光漸虧亦如人之魄降其黒處却是體注䟽之説皆不然思未通魂氣細推之亦有精粗但其爲精粗也㣲非若體魄之懸殊耳或問之意誠少子細也所論月魄恐不然日月不可以體言只有魂魄耳月魄即其全體而光處乃其魂之發也且鬼神魂魄就一身而總言之不外乎隂陽二氣而已然既謂之鬼神又謂之魂魄何耶瑑竊謂以其屈伸徃來而言故謂之鬼神以其靈而有知有覺而言故謂之魂魄或者乃謂屈伸徃來不足以言鬼神蓋合而言之則一氣之徃來屈伸者是也分而言之則神者陽之靈鬼者隂之靈也以其可合而言可分而言故謂之鬼神以其可分而言不可合而言故謂之魂魄或又執南軒陽魂爲神隂魄爲鬼之説乃謂鬼神魂魄不容更有分别瑑竊謂如中庸或問雖曰一氣之屈伸徃來然屈者爲隂伸者爲陽徃者爲隂來者爲陽而所謂陽之靈陰之靈者亦不過指屈伸徃來而爲言也鬼神通天地間一氣而言魂魄主於人身而言方氣之伸精魄固具然神爲主及氣之屈魂氣雖存然鬼爲主氣盡則魄降而純於鬼矣故人死曰鬼南軒説不記首尾云何然只據二句亦不得爲無别矣與吳茂實英近來自覺向時工夫止是講論文義以爲積集義理久當自有得力處却於日用功夫全少㸃檢諸朋友徃徃亦只如此做工夫所以多不得力今方深省而痛懲之亦願與諸同志勉焉幸老兄徧以告之也陸子夀兄弟近日議論與前大不同却方要理㑹講學其徒有曹立之萬正淳者來相見氣象皆儘好却是先於情性持守上用力此意自好但不合自主張太過又要得省發覺悟故流於怪異耳若去其所短集其所長自不害爲入德之門也然其徒亦多有主先入不肯捨棄者萬曹二君却無此病也與吳茂實所欲言者不過前夕然亦非謂全然不事其心但資次等級未應遽爾超躐須物格知至然後意可誠心可正耳答任伯起希夷示喻靜中私意横生此學者之通患能自省察至此甚不易得此當以敬爲主而深察私意之萌多爲何事就其重處痛加懲窒久之純熟自當見效不可計功於旦暮而多爲説以亂之也論語别本未曾改定俟後便寄去然且專意就日用處做涵養省察功夫未必不勝讀書也答任伯起誠敬寡慾皆是𦂳切用力處不可分先後亦不容有所遺也然非逐項用力但試著實持守體察當自見耳答任伯起所喻已業荒廢比亦甚以爲疑意謂世味漸深遂已無復此志今乃猶有愧恨之心足以見善端之未冺也一旦幡然如轉戸樞亦何難之有哉熹衰病之軀飲食起居尚未能如舊流竄放殛久已置之度外諸生還來無可遣去之理朝廷若欲行遣亦須符到奉行難以遽自匆匆也詳觀來諭似有仰人鼻息以爲慘舒之意若方寸之間日日如此則與長戚戚者無以異矣若欲學道要須先去此心然後可以語上上蔡先生言透得名利關方是小歇處今之士大夫何足道能言眞如鸚鵡也不知曾見此書否答江德功黙道千乘之國以此五者爲人君之德意則甚善然程先生只云論其所存故不及治具龜山只云苟無是心雖有政不行焉以此二言觀之則德事似太重矣兼亦不必引道之以德爲證似有牽合之病子入太廟所云已當執事不可不問固然然亦須知聖人平日於禮固已無所不知而臨事敬愼又如此也德不孤據此文意但言同聲相應同氣相求德不孤立必以類至而已若如所訓則其文當云德不私於已必不私於人如此則成何文理耶吾道一以貫之一以貫之不專爲彼已而發忠恕亦非專爲一彼已而已也二程先生論此甚詳且宜潛心未容輕議也子謂仲弓此意甚佳東坡之説正如此但不必以仲弓字爲絶句如子謂顏淵未見其止亦非與顏淵言也加我數年無大過恐只是聖人之謙辭蓋知吉凶消長之理進退存亡之道然後可以無大過耳謂易道無大過差雖是程先生説然文意恐不甚安謂使後人不敢輕立説聖人未必有此意然在今日深足以有警於學者聖人吾不得而見之矣此但爲思其上者而不可得故思其次之意無不觀其質而觀其學之意也若論質學之異則聖人君子以學而言善人有恒者則其質美而已張敬夫説如此似頗有理曾子有疾此章之㫖蓋言日用之間精粗本末無非道者而君子於其間所貴者在此三事而已謂其動容貎則能和敬而無暴慢也其正顏色則非色莊而能近信也其出詞氣則能當於理而無鄙倍也凡此三者皆其平日涵養功夫至到之驗而所以正身及物之本也故君子貴之若夫籩豆之事則道雖不外乎此然其分則有司之守而非君子之所有事矣蓋平日涵養功夫不至則動容貎不免暴慢正顏色不出誠實出詞氣不免鄙倍矣一身且不能治雖欲區區於禮文度數之末是何足以爲治哉此乃聖門學問成已成物著實效驗故曾子將死諄諄言之非如異端揚眉瞬目妄作空言之比也所謂道在容貎顏色詞氣者文意義理皆有所不通必若此言則道固無所不在君子所貴又何止於三乎且其氣象狂易恍惚不近聖賢意味尤非區區之所敢聞也士不可以不𢎞毅謂仁以爲已任者體之而不違是也若曰循頂至踵知痛癢處都是仁則非聖賢之本意矣體而不違只是克已復禮無一念之不仁耳死而後已來説亦太過若曰生有限量仁無紀極則豈以死而遂已耶吾有知乎哉無知者聖人之謙詞叩其兩端而竭焉又言已雖無知而於告人不敢不盡大凡聖人氣象只是如此著實看自然見得無世俗許多𤣥妙虚浮之説也扣兩端而竭只如程先生范尹諸公説盡之若曰只舉兩端教人黙識取中間底此又近世禪學之餘三代以前風俗淳厚亦未有此等險薄浮誕意思也康棣之華别爲一章甚是精義中范公已有此説東坡亦然但其爲説或未盡耳其言似不足者此説謝氏得之所謂意有餘者恐未是當暑袗絺綌先儒之説皆如來喻但鄙意常疑其不然似却是先著裏衣表絺綌而出之於外乃得文意不知如何不撤薑食恐只合依舊説若如所云則是他物有可棄之於地者矣恐不然也南人有言此但甚言無常之不可初不論道藝之别也其言之不怍此但謂大言不怍者其實難副耳來説理意亦善但文勢稍倒恐不若依舊説子路問君子諸説之中此條尤爲險怪深非鄙説之所敢聞也若曰修已以安百姓幾時安得了故曰堯舜其猶病諸然則其曰修已以安人而不曰堯舜病諸者又何謂耶君子疾沒世而名不稱焉只合依程先生説誰毁誰譽所論毁譽是加減了底甚當但此章更有曲折當熟玩之所謂如有所譽者又何謂耶見善如不及聖人之用舎行藏非但求志行義而已且此章文勢㫁續或有闕文或非一章皆不可考不必彊爲之説性相近也此只合依程先生説若如所論似欲深而反淺欲宻而反䟽也性之在人豈得以相近而爲言耶子張問仁所論行字之意甚善聖言著實大抵類此推之以及其餘則聖人之意可得而浮誕之見無所入於其中矣飽食終日此不欲啓博奕之端防慮甚宻然聖人乃假此以甚彼之辭不必過爲之説文義不通却成穿鑿也君子有惡諸先生有説夫子所惡以戒人子貢所惡以自警者此意得之恐無天人之别子夏之門人小子此章之説明道先生曰先傳後倦君子教人有序先傳以小者近者而後教以逺者大者非是先傳以近小而後不教以遠大也愚按諸家之説惟此數句明白的當試詳味之可見文義譬諸草木區以别矣只是説大小有序不可躐等之意君子之道焉可誣也東坡得之有始有卒其惟聖人尹氏得之猶之與人也舊説猶字只爲譬字之意文義亦通若覺未穩即且闕之不必强爲之説也答江德明有禮則安説立意甚善但本文之意只説施報徃來之之禮人能有此則不忤於物而身安耳未遽及夫心安也况古人之所以必由於禮但爲禮當如此不得不由豈爲欲安吾心而後由之也哉若必爲欲安吾心然後由禮以接於人則是皆出於計度利害之私而非循理之公心矣大抵近世學者溺於佛學本以聖賢之言爲卑近而不滿於其意顧天理民彛有不容殄滅者則又不能盡叛吾説以歸於彼兩者交戰於胷中而不知所定於是因其近似之言以附㑹而説合之凡吾教之以物言者則挽而附之於已以身言者則引而納之於心茍以幸其不異於彼而便於出入兩是之私至於聖賢之本意則雖知其不然而有所不顧也蓋其心自以爲吾之所見已髙於聖賢可以咄嗟指顧而左右之矣又况推而髙之鑿而深之使其精神氣象有加於前則吾又爲有功於聖賢何不可者而不自知其所謂髙且深者是乃所以卑且陋也此近世雜學之士心術隠㣲之大病不但講説異同之間而已不審賢者以爲何如大學諸説亦放前意蓋不欲就事窮理而直欲以心㑹理故必以格物爲心接乎物不欲以愛親敬長而易其所謂清净寂滅者故必以所厚爲身而不爲家以至新民知本絜矩之説亦反而附之於身蓋惟恐此心之一出而交乎事物之間也至於分别君相諸侯卿大夫士庶人之學亦似有獨善自私之意而無公物我合内外之心此蓋釋氏之學爲主於中而外欲强爲儒者之論正如非我族類而欲强以色笑相親意思終有間隔礙阻不浹洽處若欲眞見聖賢本意要當去此心而後可語耳格物之説程子論之詳矣而其所謂格至也格物而至於物則物理盡者意句俱到不可移易熹之謬説實本其意然亦非茍同之也蓋自十五六時知讀是書而不曉格物之義徃來於心餘三十年近嵗就實用功處求之而參以他經傳記内外本末反復證驗乃知此説之的當恐未易以一朝卒然立説破也夫天生蒸民有物有則物者形也則者理也形者所謂形而下者也理者所謂形而上者也人之生也固不能無是物矣而不明其物之理則無以順性命之正而處事物之當故必即是物以求之知求其理矣而不至夫物之極則物之理有未窮而吾之知亦未盡故必至其極而後已此所謂格物而至於物則物理盡者也物理皆盡則吾之知識廓然貫通無有蔽礙而意無不誠心無不正矣此大學本經之意而程子之説然也其宏綱實用固已洞然無可疑者而㣲細之間主賓次第文義訓詁詳宻精當亦無一毫之不合今不深考而必欲訓致知以窮理則於主賓之分有所未安知者吾心之知理者事物之理以此知彼自有主賓之辨不當以此字訓彼字也訓格物以接物則於究極之功有所未明人莫不與物接但或徒接而不求其理或粗求而不究其極是以雖與物接而不能知其理之所以然與其所當然也今曰一與物接而理興不窮則亦太輕易矣蓋持出於閒聲悟道見色明心之餘論而非吾之所謂窮理者固未可同年而語也且考之他書格字刅無訓接者以義理言之則不通以訓詁考之則不合以功用求之則又無可下手之實地竊意聖人之言必不如是之差殊踈畧以病後世之學者也又所謂非特形之所接乃志之所至所謂格物與小學同致知與小學異亦皆無當之言其爲闕字増語反致讀者之疑多矣至於彊觧程子之意以附已説其如他語之可證何又謂熹觧以格物致知混爲一説則其考之亦未詳也又謂老佛之學乃致知而離乎物者此尤非是夫格物可以致知猶食所以爲飽也今不格物而自謂有知則其知者妄也不食而自以爲飽則其飽者病也若曰老佛之學欲致其知而不知格物所以致其知故所知者不免乎蔽陷離窮之失而不足爲知則庶乎其可矣所厚者謂父子兄弟骨肉之恩理之所當然而人心之不能已者今必外此而厚其身此即釋氏滅天理去人倫以私其身之意也必若是而身修則雖至於六度萬行具足圎滿亦無以贖其不孝不弟之刑矣此謂知本以例推之凡言此謂者皆傳文非經之結句也無所不用其極觀上文三引詩書而此以無所二字緫而結之則於自新新民皆欲用其極可知矣自新固新民之本然天下無一物非吾度内者亦無一事非吾之所當爲者譬如百尋之木根本枝葉生意無不在焉但知所先後則近道耳豈曰專用其本而直棄其末哉今曰不求爲新民而專求之德化則又賤彼貴我之私心而無以合内外之道矣盛德至善民不能忘此言聖人之事蓋渾然一體不可得而分焉者也但以人言則曰徳以理言則曰善又不爲無辨耳今曰體至善以成德則乃學者之事而非傳文所指矣然體而成德以至於盛而無思勉之累焉則亦聖人而已矣聽訟與新民之説畧同請併詳之又古人言語有序此傳未觧格物以下數節不應先觧結句况此謂知本之云又非經之結句乎誠意一章大意頗善然此傳文意但觧經文所謂誠意者只是教人不得自欺而欲其好善惡惡皆如好色惡臭之實然耳非以聖人而言也今之所發聖人所以即事即物而止於至善又恐人不信故即人所知者以明之則失其指矣心廣體胖之説甚善甚善人之其所親愛而辟焉訓之爲至非是此等處雖非大義所係然亦須虚心平氣徐讀而審思之乃見聖賢本意而在已亦有著實用處不必如此費力生説徒失本指而無所用也此以心感彼以心應其效如此之速感應神速理固如此但著一以字便有欲速之意所謂憧憧徃來朋從爾思者正病此也絜矩者度物而得其方也以下文求之可見今曰度物以矩則當爲矩絜乃得其義矣治國平天下與誠意正心修身齊家只是一理所謂格物致知亦曰知此而已矣此大學一書之本㫖也今必以治國平天下爲君相之事而學者無與焉則内外之道異本殊歸與經之本㫖正相南北矣禹稷顔囘同道豈必在位乃爲爲政哉風濤洶湧之説亦所未喻此篇所論自一身而推之以及天下平正簡易不費纎毫氣力與横渠所論周官冡宰法制之事意思不同答江德功致知格物前説已詳來書只舉得一截正當説格字致字處乃遺而不道恐考之有未詳若但以格爲法度之稱而欲執之以齊天下之物則理既未窮知既未至不知如何爲法而執之且但守此一定之法則亦無復節節推窮以䆒其極之功矣此義且當以程子之説爲主而以熹説推之不必彊立説徒費力也經文末後兩句來喻固與舊説有間矣但所論先後之序經中上文已屢言之而本亂末治之云又已該舉自不須説但聖人於此語正要讀者有以知夫人道之大有在於此不可同於仁民愛物之例而一以末視之此意不可不著眼耳今不領此而又必以身言非釋氏之闕意而何哉衍文得失不足深辨然以所謂免作衍文者觀之便見苟且遷就之意若信未及莫若兩存而徐玩之不必決取舍於今日也盛德至善盛也至也皆無以復加之詞而上下文規模氣象皆聖人事則此不得獨爲賢人事矣且賦詩㫁章此但取其咏歎不忘之意與衛武公初無干涉也絜矩之説蓋以己之心度物之心而爲所以處之之道爾來喻殊不可曉而所謂先自度者尤無所當今以鄙説畫爲兩圗合而觀之則方正之形隠然在目中矣有禮則安無禮則危如云仁則榮不仁則辱初無身心本末之辨蓋聖賢之言各有所指隨其淺深而莫非至理之極也今必以内外爲精粗而欲去彼取此豈非有所陷溺其心而然耶且學者之勉彊力行亦勉其所當爲者而已若曰勉焉以冀其有以自慰則是先獲後難而爲謀利計功者之所爲矣聖學異端之别於此亦畧可見試深察之可也答江德功圓而神也其所以藏徃者向之所謂方以知者也神武不殺言聖人不假卜筮而知吉凶也是以明於天之道以下言教民卜筮之事而聖人亦未嘗不敬而信之以神明其德也此章文義只如此程先生説或是一時意到而言不暇考其文義但今玩味其意别看可也若牽合經㫖則費力也答江德功中庸集解程先生曰生之謂性性即氣氣即性止舜有天下而不與焉者也熹竊謂此段反復譬喻皆是生之謂性而必以性善之説間乎其中以性善之言證之於後何也若曰性只是理則夫爲惡者謂之非理可也何以言惡亦是性濁亦是水此理不爲堯桀存亡何以言流之逺近清之遲速此皆氣禀之譬於性善之説自當分别却衮説了不知如何直翁以水譬氣稟清譬天理濁譬人欲初亦可喜恐只是元初水一句又解不得直翁又爲之説曰夫所謂繼之者善者以下皆因言性善而爲説水譬性就下與清譬性善流而至於海終無所汚者此譬聖人之全天理流而濁者譬人欲也不可以濁者不爲水謂感物而動皆性之欲也及其清明却只是元初水謂復其本然之善也此説於不可以濁者不爲水一句似失性善之意不知先生以爲何如此説但以性善爲本而以氣禀有善惡者錯綜之反復玩味自然見得中庸曰人莫不飲食也鮮能知味也竊謂此兩句大意言百姓日用而不知程先生牲牢之譬却是不曾飲食而不知非日用不知也據程先生所言只譬如道者如人食牲牢須曾喫了方知非爲此章至於呂與叔謂必察於芻豢之性草木之滋火齊之節調飫之宜恐非本㫖黙竊謂味即指飲食而言若曰人莫不飲食鮮能知味也即飲食則行之而著習矣而察者也味與飲食只是作互用文耳不知如何直翁以飲食譬日用味譬理此説亦似當不知是否直翁説是中庸曰君子之道造端乎夫婦及其至也察乎天地黙竊謂此四句若本上文謂道始於夫婦之愚不肖意味殊少黙竊妄意謂上下察是知得此理察乎天地是行到處君子之道造端乎夫婦者子思下章已申言之曰君子之道譬如行逺必自邇譬如登髙必自卑詩云妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻孥子曰父母其順矣乎此察乎天地之次序也本意言君子所語而繼之以上下察故黙謂是知此理蓋孟子難言之意也言君子之道而繼之以察乎天地故黙謂是行到處蓋文王刑于寡妻之氣象也不知如何直翁云先生或問中已有易重咸常之説黙未之見也此察字訓著不訓到觀此兩句只是疊説上文意思未有知到行到之意論語精義伊川先生曰學必盡其心盡其心則知其性知其性云云反而誠之聖人也故洪範曰思曰睿睿作聖誠之之道在乎信道篤信道篤則行之果行之果則守之固直翁所疑曰學而至於盡心則與道不隔非信道篤者能之也則所以誠之者特在存養而已至此豈待言信道篤而伊川云爾者蓋信道者通貫上下者也爲學之始固在夫信道之篤至於盡心之後亦在夫信道之篤也黙以爲惟與道不隔者爲能信篤若與道隔則尚未識道安能信哉其所信者特信聖賢之言耳非自信也故伊川信道篤必在於盡心知性之後學者要當先明盡心性爲何學然後知學之可以爲聖人决矣不知先生以爲如何信有淺深有是篤信聖賢而信之者有是自見得道理當然而信之者伊川之意蓋如德功之説然謂如此然後能信則又過矣又道字之義恐伊川之意與德功亦不同也伊川先生曰不違仁是無纎毫私慾有少私慾便是不仁直翁推之曰仁者天理也人能無慾則天理之妙渾然於中其心無所越於仁矣然謂越字與違别違字乃違背之意只私欲蔽了仁便是違也越字却是違越之意豈得違越得他直翁云纔有放心便是違越仁矣然云放心亦只是不能存其心云放心非是越也惟禮有品節可以言越仁者無外不可言越不知先生以爲如何違猶離也去也此卷據鄙見奉報未知是否幸反復論之也易説則全然草率不通㸃檢未敢奉報告且子細未要如此容易立説千萬千萬至懇至懇答江德功所喻易中庸之説足見用心之切其間好處亦多但聖賢之言意㫖深逺子細反復十年二十年尚未見到一二分豈可如此纔方撥冗看得一過便敢遽然立論似此恐不但解釋文義有所差錯且是氣象輕淺直與道理不相似願且放下此意思將聖賢言語反覆玩味直是有不通處方可權立疑義與朋友商量庶㡬稍存沉浸醲郁氣象所繫實不輕也直翁謹愿詳審好相聚講習所論遮欄意亦佳然前賢固己言之矣但在力行如何答江德功示喻誠敬之别此猶是以地位而言須看其命字之本意則誠是眞實敬是畏謹指意自不同也又論今昔用功之異此固曉然但不知今日之有昔日之無是同是别是相妨是不相妨更須他日欵曲面論今未敢懸斷可否也二銘意甚佳然亦皆有未安處如天理既循人欲自克彼己既融萬物同體等語亦當俟面講之但此等文字非有不得已者亦不必作不若黙存此理於胷中而驗之行事之實也答江德功示喻諸説己悉前書所論誠敬字義不同正爲方此論敬不當引誠爲説本欲高妙反成支離耳意皆因事物而有然事物外至而意實内生但於中有邪正耳難以誠意爲内邪意爲外也來喻又云誠者體物而不可遺敬亦體物而不遺此語殊不可曉大率左右向來不曽子細理㑹文義反復涵泳義理故於此等處多是鹵莽恐更須加詳細也所喻舊學之誤但爲不將事試故不能自合義理今就義理上用工又患未能全合詳此意思似是欲因舊學所見而加事試之功以補其闕耳正恐所見有差根脚便不是了雖加事試之功終不免兩截也義理名字呼喚得尚自有差却如何便得全合義理耶此等處仍是舊病躐等欲速之意尤不可不察也答江德功疑義俟細看奉報易説知頗改更甚善然學者以玩索踐履爲先不當汲汲於著述既妨日用切已工夫而所説又未必是徒費精力此區區前日之病今始自悔故不願賢者之爲之也絶學捐書是病倦後看文字不得正縁前日費力過甚心力俱衰且爾休息耳然亦覺意思安靜無牽動之擾有省察之功非眞若莊生所謂也答江德功示及易説等書實不曉所謂不敢開巻累承喻及必欲見疆使同其説隱之於心有未能安者遂不敢奉報今承見語欲成書而不出姓名以避近名之譏此與掩耳偷鈴之見何異不知賢者所見何故日見邪僻至於如此夫天下之理惟其是而已若是則出名何害若不是則不出名何益若如所論乾坤二字乃是將一部周易從頭鶻突了豈能使易道著明乎若曰人人親見三聖而師之此尤不揆之言如所説乾坤字義恐自家未夣見三聖在如何敢開此大口即元書謹用封納拙直之言盡於此書今後不復敢聞命矣千萬見察答江德功所示經説孟子大意頗佳其間亦有少未合處徐議未晚也但易説愈見乖戾三復駭然因復慨念鄉里朋友清素朴實刻意讀書無世間種種病痛未有如德功者所以平日私心嘗竊愛慕思有以補萬分者亦荷德功不鄙三數年來雖所論不合加以鄙性淺狹譏誚排斥無所不至而下問之意愈勤不懈此在他人亦豈能及然自頃至今爲日愈久而所執愈堅所見愈僻孜孜矻矻日夜窮忙不暇平心和氣參合彼已異同之説反覆論難以求至當之歸而專徇己意競出新竒以求己説之勝以至於展轉支離日益乖張而不悟不知用心錯誤何故至此使人更不可曉但竊歎恨而已今且據來示而舉其一二言之如既曰乾健也而又曰能體其健之謂乾若乾本是健即别無體此健者若更要體得此健方謂之乾則是乾在健外以此合彼而後得謂之乾也又如羣龍无首乃用程傳无妄六二之説雖於理不謬然安頓不是地頭全然不是文理又且岐而爲二互相矛盾蓋乾爲萬物之始故天下之物无不資之以始但其六爻有時而皆變故有羣龍无首之象而君子體之則當謙恭卑順不敢爲天下先耳非謂可天德而不可爲首也又非謂乾不爲首也可天德而不可爲首不成文理無可言者若曰乾不爲首則萬物無所資始而又誰使爲之首乎且程傳之説爲人不可以私意造始故爲之戒耳若乾之爲始乃是天理自然非若人有形體心思而能以私意造始也此二説者其失甚不難見原其所以失之大抵只是日前佛學𤣥妙之見尚在故以理爲外以事爲粗而必以心法爲主然又苦其與大易體靣不同須至杜撰揑合所以欲高而反下欲宻而反踈耳此是義理本原大差謬處不但文義之失然在今日德功病痛尚是第二義却是日用之間自己分上更不曾實下功夫而窮日夜之力以爲穿鑿附㑹之計此是莫大之害正使撰得都是亦無用處不得力况其乖戾日甚一日豈不枉費功夫虚度光隂不惟無益而反有害乎熹之鄙意竊願德功放下日前許多𤣥妙骨董即就日用存主應接處實下功夫理㑹箇敬肆義利是非得失之判若要讀書即且讀語孟詩書之屬就平易明白有事迹可按據處看取道理體靣涵養德性本原久之漸次踏著實地即此等説話須自見得黒白不須如此勞心費力矣若必欲便窮竟此説亦請先罷穿鑿己見且更追思今日以前凡熹所説與德功不同者并合兩家寫作一處子細較量考其是非痛加辯詰亦庶幾有究竟處不至如今日只見一邊不相照應而信口信筆無有了期也病起倦甚懐不能已畧此奉報千萬詳之若以爲是幸即加功若以爲非即此書不煩見答今後亦不須更下喻矣答江德功熹災病相仍衰悴萬狀昨被按刑之命判不能徃赴矣正初忽聞奏事指揮疲曵進趨尤覺費力專人懇辭竟不得命旦夕不免就道或入文字而於前路俟報萬一不獲即一到都下靣懇而歸度此衰殘必䝉聖照也所示諸經序解偶此冗劇未及細看然觀其大畧似亦未離舊也渾儀詩甚佳其間黃簿所謂渾象者是也三衢有印本蘇子容丞相所撰儀象法要正謂此俯視者爲渾象也但詳吳掾所説平分四孔加以中星者不知是物如何制作殊不可曉恨未得見也答江德功老病之餘扶曵造朝自取羞辱雖幸天日有以辨明然罪終有未盡滌者已力請奉祠矣理直義明計必可得不然雖使得罪亦勝忍恥作官也璣衡之制在都下不久又苦足痛未能徃觀然聞極踈畧若不能作水輪則姑亦如此可矣要之以衡窺璣仰占天象之實自是一器不當并作一説也元祐之制極精然其書亦有不備乃最是𦂳切處必是造者秘此一節不欲盡以告人耳答黄直翁寅商因於夏禮所損益可知也周因於殷禮所損益可知也是周監二代之制而損益之其文大備亦時使然也聖人不能違時烏得不從周之文乎然亦少有不從處如行夏之時乘殷之輅是也周之文固可從而聖人不得其位無制作之時亦不得不從也使夫子而得邦家則將損益四代以爲百王不易之法不專於從周矣程子曰三讓者不立一也逃之二也文身三也寅竊意求之繼立以嫡聞父䘮而奔身體不敢毁傷者萬世之通義也泰伯胡爲而不然耶蓋不立者泰伯知王季之賢又有文王之聖必能基成王業從而讓之亦太王之志也不奔父喪非本心也奔則王季辭立矣太王欲立之而未有命季歴必爲叔齊之事逃而適他國足矣必之􅍮蠻斷髮文身而後已者蓋不示以不可立則心不安其位未定終無以仁天下繼父志而成其遠者大者也三者權也夫泰伯之讓上以繼太王之志下以成王季之業無非爲天下之公而不爲一身之私其事深逺民莫能測識而稱之兹其德所以無得而加也此説亦是但以天下讓只依龜山説推本而言之爲是所云不示以不可立則王季之心不安而位未定此意甚好非惟説得泰伯之心亦説得王季之心也蘇子由云漢東海王以天下授顯宗唐宋王成器以天下授𤣥宗皆兄弟終身無間言何必斷髮文身若使王季之心如漢顯宗唐𤣥宗則此説可也若有叔齊之心則不能一朝居矣王季之賢豈下叔齊也哉然泰伯三讓權而不失其正是乃所以爲時中也故夫子以至德稱之答黄直翁衞君事伯謨書中已畧論之徐思不奉父命而逃去固爲未善故程子亦以為不可但居勢如此不逃却不得如泰伯王季之事亦非常理但變而不失其正耳答黄直翁示喻誠敬異同之説已具德功書中矣且既曰誠之者擇善而固執之則敬者但可爲誠之之一事不可專以敬爲誠之之道也明道先生蓋舉其一事而言爾大凡看文字須認正意不可如此支蔓無了時也答曹子野䮐示及史記疑數條熹向曾攷證來了功臣表與漢史功臣表其戸數先後及姓名多有不同二史各有是非當以傳實證之不當全以史記所傳爲非眞也如淮隂爲連敖典客漢史作票客顔師古謂其票疾而以賓客之禮禮之夫淮陰之亡以其不見禮於漢也蕭何追之而薦於漢王始爲大將若己以賓禮禮之淮陰何爲而亡哉此則史記之所載爲是三代表是其踈謬處無可疑者蓋他説行不得若以爲堯舜俱出黄帝是爲同姓之人堯固不當以二女嬪于虞舜亦豈容受堯二女而安於同姓之無别又以爲湯與王季同世由湯至紂凡十六傳王季至武王纔再世爾是文王以十五世之祖事十五世孫紂武王以十四世祖而代之豈不甚繆戾耶通鑑先後之不同者却不必疑史家叙事或因時而記之或因事而見之田和遷康公通鑑載於安王十一年是因時而記之也史記載於安王十六年是因事而見之也何疑之有只有伐燕一節史記以爲湣王通鑑以爲宣王史記却是攷他源流來通鑑只是憑信孟子温公平日不喜孟子到此又却信之不知其意如何張敬夫説通鑑有未盡處似此一節亦是可疑但二説今皆無所證未知孰是孰非更可反覆詳究如有所見却幸垂教晦菴集卷四十四欽定四庫全書晦庵集卷四十五宋朱子撰書知舊門人問答答虞士朋太中易有太極是生兩儀者一理之判始生一竒一偶而為一畫者二也兩儀生四象者兩儀之上各生一竒一偶而為二畫者四也四象生八卦者四象之上各生一竒一偶而為三畫者八也爻之所以有竒有偶卦之所以三畫而成者以此而已是皆自然流出不假安排聖人又已分明説破亦不待更著言語别立議論而後明也此乃易學綱領開卷第一義然古今未見有識之者至康節先生始傳先天之學而得其説且以此為伏羲氏之易也説卦天地定位一章先天圖乾一兊二離三震四巽五坎六艮七坤八之序皆本於此若自八卦之上又放此而生之至於六畫則八卦相重而成六十四卦矣六十四卦之上又放此而生之至十二畫則六十四卦相重而成四千九十六卦矣焦貢易林是也剛柔雖若各有所偏必相錯而後得中然在乾坤二卦之全體當剛而剛當柔而柔則不待相錯而不害其為全矣其爻位之無過不及者如乾坤之二五亦不待相錯而不害其為中矣隂陽變化而太極之妙無不在焉於此蓋可見也今謂乾剛坤柔便有所偏恐於二卦之彖及二五之爻詞有不通者其論四爻過不及之淺深則為精宻非他説之所及矣用九用六當從歐陽公說為揲蓍變卦之凡例蓋陽爻百九十二皆用九而不用七隂爻百九十二皆用六而不用八也特以乾坤二卦純陽純隂而居篇首故就此發之此歐陽公舊説也而愚又嘗因其說而推之竊以為凡得乾而六爻純九得坤而六爻純六者皆當直就此例占其所繫之辭不必更㸔所變之卦左傳蔡墨所謂乾之坤曰見羣龍无首者可以見其一隅也蓋羣龍无首卽坤之牝馬先迷也利永貞卽乾之不言所利也學而首章甚善但學之一字實兼致知力行而言不可偏舉今所引顔子工夫乃専為力行事耳二章所謂不失其愛敬之本心則仁不可勝用者甚善但有子亦據實理而正言之非曲為當世而發也巧言令色求以悅人則失其本心之德矣不待利己害人然後為不仁也三年無改乃謝氏之説其意美矣然恐過之不若游氏尹氏之為實也無諂無驕一章文義東坡得之蓋無諂無驕隨事知戒足以自守矣然未見其於全體用功而有自得處也樂與好禮乃見其心之所存有非貧富之所能累者此子貢所以有切磋琢磨之譬也治骨角者旣切而復磋之治玉石者旣琢而復磨之皆先略而後詳先粗而後精之意大學乃㫁章取義不必引以為説也如愚之説為不知之説焉得知之説觀過之説皆恐失之過高後亦多類此者詳其意味似從張無垢議論中來其為得失非但訓詁文義之間而已此須異日子細商量今未敢容易說也一以貫之乃聖門末後親傳密旨其所以提綱挈領統宗會元蓋有不可容言之妙當時曾子黙契其意故因門人之問便著忠恕二字形容出來則其一本萬殊脉絡流通之實益可見矣然自秦漢以來儒者皆不能曉直至二程先生始發明之而其門人又獨謝氏侯氏為得其説今不考焉而但以忘物我者為言吾恐其失之逺也況夫子以此語告子貢乃因博學多識而發其與忘物我者又有何關涉耶答虞士朋昨承寄示趙倉易論語説足浣愁疾易説簡易精密不惟鄙意多所未及警發之深而近世諸儒説不到處亦甚多甚不易其玩索至此深恨未得一見靣扣其詳也但象數乃作易根本卜筮乃其用處之實而諸儒求之不得其要以至苛細繳繞令人厭聽闕一向屏棄闊略不復留意却恐不見制作綱領語意來歴似亦未甚便也昨於乾坤二卦略記所疑之一二今謾錄呈幸為詳之試因話次以盛意扣之看有何説却以見報熹與之未相識不欲遽相辯難千萬不必云熹所説也論語説有意古人為己之學意亦甚正但覺看得張無垢文字太熟用意太切立説太高反致失却聖人本指處多今亦未欲遽論二説謾徃并煩扣之亦勿云熹所寄也答游誠之九言示喻讀書玩理次第甚慰所懷但嚴立功程寛著意思久之自當有味不可求欲速之功也所論日用功夫尤見其為己之意但心一而已所謂覺者亦心也今以覺求心以覺用心紛挐廹切恐其為病不但揠苖而已不若日用之間以敬為主而勿忘焉則自然本心不昧隨物感通不待致覺而無不覺矣故孔子只言克己復禮而不言致覺用敬孟子只言操存舍亡而不言覺存昧亡謝先生雖喜以覺言仁然亦曰心有知覺而不言知覺此心也請推此以騐之所論得失自可見矣若以名義言之則仁自是愛之體覺自是知之用界分脉絡自不相關但仁統四德故人仁則無不覺耳然謝子之言侯子非之曰謂不仁者無所知覺則可便以心有知覺為仁則不可此言亦有味請試思之克齋記近復改定今别寫去後面不欲深詆近世之失波動危廹等語皆已削去但前所論性情脉絡功夫次第自亦可見底裏不待盡言而後喻也因見南軒試更以此意質之當有以相發明爾答游誠之仁覺之説前書已詳報矣此書所喻惻隱似非出於覺者此語甚佳但所謂覺之一字未必不佳者鄙意亦非以覺為不佳但謂功夫用力處在敬而不在覺耳上蔡云敬是常惺惺法此言得之但不免有便以惺惺為仁之意此則未穏當耳所喻從前馳騖之過此非明者不能自知甚善然旣自知之則亦自改之而已它人不得而與也窮理涵養要當並進葢非稍有所知無以致涵養之功非深有所存無以盡義理之奥正當交相為用而各致其功耳答游誠之心體固本静然亦不能不動其用固本善然亦能流而入於不善夫其動而流於不善者固不可謂心體之本然然亦不可不謂之心也但其誘於物而然耳故先聖只説操則存存則靜而其動也無不善矣舍則亡於是乎有動而流於不善者出入無時莫知其鄉出者亡也入者存也本無一定之時亦無一定之處特係於人之操舍如何耳只此一句説得心之體用始終眞妄邪正無所不備又見得此心不操卽舍不出卽入别無閒處可安頓之意若如所論出入有時者為心之正然則孔子所謂出入無時者乃心之病矣不應却以惟心之謂與一句直指而總結之也所答石吕二書寫呈但子約書中語尚有病當時不暇子細剖析明者擇焉可也答吳伯起成都之諾乃爾輕發可怪然亦在我者有以致之但當自省不當責人也渠近辟韜仲不下次第愈縮手矣趙總卿頃得書甚相念不知所許竟如何然吾之所謂義者無窮而彼之具析體究對移者有盡但十二時中常切照管勿令有滲漏處則彼之來者不足問矣今人戚戚不能信命者固無足道然謂付之造物亦非極摯之語此處儘要見得分明便不動心不可只靠一言半句海上單方便以為足恐事變之來抵當不去恐成好笑也答吳伯起且審聞善感發判然義利之間衰懦之餘警省多矣然一時意氣易得消歇正要朝夕講求義理以培植之不可專恃此便為究竟也答歐陽慶似光祖頃在里中雖屢獲見而常苦匆匆不及盡所欲言然已固知所志之不凡矣今辱惠問乃慨然有志於學甚善甚善抑嘗病今之學者不知古人為己之意不以讀書治己為先而急於聞道是以文勝其質言浮於行而終不知所底止方竊以是反而求之而未之有得也愧辱下問之勤無以稱塞敢私布之不識明者謂之然否答歐陽慶似所需序文迫歲冗甚不暇執筆然為學治己之方前此講之熟矣當官之務推此而達之則奉法愛民不求聞達皆吾分内事耳此固不待拙者之言又况其外之文乎吕氏童蒙訓下巻論守官之法亦頗明備暇日更試攷之當有益也答嚴居厚士敦示喻進學加功處甚善觸事未能不為事物所奪只是未遇事時存養未熟所以如此然又别無它岐不可欲速但常存此心勿令間㫁講明義理以栽培之則久當純熟明快矣科舉之習前賢所不免但循理安命不追時好則心地恬愉自無怵廹之累昨見所論三子具體而微似未免太徇時好然務為竒險反使詞義俱不通暢久欲奉告而未及也因此布陳僭易僭易别紙喻及養氣之説足見講學不倦之意但此章文義正自難明且當虛心平氣反復諷誦久當有味今以廹切之心求之正猶治絲而棼之雖欲彊為之説終非吾心所安穿鑿支離愈叛於道矣今且據來喻而畧言之縮字訓直禮書如此處多先儒之言似不可易壹字非訓一便只是一字乃專一之意耳記得程先生有説志專在淫僻豈不動氣氣專在喜怒豈不動志試以是思之知言則知義理之所在無毫釐之差故日用之間有以集義而生浩然之氣詖淫邪遁四字有次序而無彼此之分如楊墨釋老之言無不具此四者然今亦未易遽論也請且如前説反復玩味要之以久自當釋然有解悟處不必廣求徒勞日力只二先生有説處抄出同看可也答丘子野示喻觀玩之别想已有成説兹因下問之及嘗竊思之敢布左右盖易有象八卦六爻然後有辭卦爻之辭筮有變老陽老陰然後有占變爻之辭象之變也在理而未形於事者也辭則各因象而指其吉凶占則又因吾之所値之辭而决焉其示人也益以詳矣故君子居而學易則旣觀象矣又玩辭以攷其所處之當否動而諏筮則旣觀變矣又玩占以攷其所値之吉凶善而吉者則行否而凶者則止是以動靜之間舉無違理而自天祐之吉無不利也盖觀者一見而决玩者反復而不舍之辭也筮短龜長之説惟見於左氏元凱之注理固有之但先王制卜筮之法至嚴至敬虚其心以聽於鬼神專一則應疑貳則差故禮曰卜筮不相襲盖為此也晉獻之欲立驪姫以理觀之不待卜而不吉可知及其卜之不吉也則亦深切著明已矣乃不勝其私意而復筮之是以私心為主而取必於神明也豈有感通之理哉此所以筮之雖吉而卒不免於凶也今不推其所以聽於鬼神者之不專不一而遽欲卽此以較龜筮之短長恐未免乎易其言之責也理則一而已矣其形者則謂之器其不形者則謂之道然而道非器不形器非道不立盖陰陽亦器也而所以陰陽者道也是以一陰一陽徃來不息而聖人指是以明道之全體也此一陰一陽之謂道之説也不審高明以為然否答丘子服膺寵辱若驚貴大患若身貴猶重也言寵辱細故而得之猶若驚焉若世之大患則尤當貴重之而不可犯如愛其身也寵為下者寵人者上於人者也寵於人者下於人者也是辱固不待言而寵亦未足尚今乃得之而猶若驚而况大患與身為一而可以不貴乎若使人於大患皆若其將及於身而貴重之則必不敢輕以其身深預天下之事矣得如是之人而以天下託之則其於天下必能謹守如愛其身而豈有禍敗之及哉老子言道之眞以治身又言身與名孰親而其言外其身後其身者其實乃所以先而存之也其愛身也至矣此其學之傳所以流而為楊氏之為我也蘇子由乃以忘身為言是乃佛家夢幻泡影之遺意而非老氏之本眞矣答丘子服兩日連得手示為慰貴大患如此説固好但後一貴字别為一義似未安耳出生入死章諸家説皆不愜人意恐未必得老子本指今只自夫何故以下看則語意自分明盖言人所以自生而趨死者以其生生之厚耳聲色臭味居處奉養權勢利欲皆所以生之者惟於此太厚所以物得而害之善攝生者遠離此累則無死地矣此却只是目前日用事便可受持他旣難明似亦不必深究也如何如何答李深卿泳昨擇之特示别紙教告甚悉時亦不暇奉報然因其行嘗口附區區不知高明以為然否夫儒釋正邪之異未易以口舌爭但見得分明則觸事可辨今未暇逺引且以來教所舉中庸首章論之則吾之所謂一者彼以謂二吾之所謂實者彼以為虚其邪正得失於此已判然矣然世之學者於吾學初未嘗端的用功而於彼説顧嘗著力研究是以於彼説日見其高妙而視吾學為不足為陷溺益深則遂不復自知其為陷溺是雖以孟子之辨守而告之恐未易㧞而况今日才卑德薄之人乎然有一於此疑若可捄盖天理人心自有至當我順彼逆體勢不侔是以為吾學者深拒力排未嘗求合於彼而為彼學者支辭蔓説惟恐其見絕於我是於其心疑亦有所不安矣誠如是也則莫若試於吾學求其所以用力者如徃時之一意於彼而從事焉假以歲時不使間㫁則庶乎其可以得本心之正而悟前日之非矣所論不當啓後學輕視前輩之弊此則至論敢不承教然觀聖賢議論雖未嘗不推尊前輩而其是是非非之際亦未甞有毫髪假借之私若孟子之論伊尹夷惠抑揚其辭不一而足亦可見矣若吕氏之學在近世則亦近正矣然觀正獻對神祖空寂之問則以堯舜所知所急為兩途觀原明述正獻學佛之事則見正獻所學所言為二致諸若此類不可殫舉盖猶未免於習俗之蔽也以前輩之故一例推尊禁不得復議其失是孔子不當論臧文仲之不仁不智且當直許子文文子以仁然後為可也擇之講論精宻務求至當似未為過但其間却實不免有輕視前輩之心此則不可去年因書盖甞箴之正如老兄之意但不敢謂縁此都不得别白是非也凡此二條皆近世學者深錮之弊是以因來喻之及而極論之願試以愚言思之一事正則其餘皆正矣盖理無二致非如老兄所論中庸首章三句别為兩事與吕氏所知所急所學所言有彼此之殊也鄙見如此或有未當因來却望見教勿憚反復不有益於彼則必有益於此矣千萬至懇至懇答胡寛夫示喻疑義數條足見别後進學之篤甚慰甚慰大概如此看更須從淺近平易處理會應用切身處體察漸次接續勿令間㫁久之自然意味浹洽倫類貫通切不可容易躁急厭常喜新專揀一等難理會無形影底言語暗中想像杜撰穿鑿枉用心神空費日力更勿與人辨論釋氏長短自家未有所見判㫁它不得况廢却自家合做底𦂳切工夫却與人爭一場閒口舌有損無益尤當深戒也主一之功學者用力切要處承於此留意甚善但其它推説似太汗漫多病痛以熹觀之似不必如此只就如今做書會處理會便見漸次大抵自家所看文字及提督學生工夫皆須立下一定格目格目之内常切存心格目之外不要妄想如看論語今日看到此段卽專心致意只看此段後段雖好且未要看直待此段分曉説得反復不差仍且盡日玩味明日却看後段日用凡事皆如此以類推之可見不然雖是好事亦名妄想此主一之漸也若不如此方寸之間頃刻之際千頭萬緒卒然便要主一如何按伏得下試更思之我不欲人之加諸我吾亦欲無加諸人與子思所謂施諸已而不願亦勿施於人此言且只各就本句中體味踐履久之純熟自見淺深今亦不須彊分别也大抵學者之患在於好談高妙而自己脚根却不㸃地正所謂道在邇而求諸遠事在易而求諸難也大學解想亦㸔未到四哥又自有日課不欲妨它教人者須常存此心郭子和中庸頃曾見之切不可看看著轉迷閟也其它所欲文字合用者前已附去其他非所急者更不上内想自曉此意千萬息却此心且就日課中逐些理㑹慤實踐履方有意味千萬千萬後生輩誦書亦如吾人講學只是量力不要貪多仍須反覆熟讀時時温習是要法耳答吳德夫獵承喻仁字之説足見用力之深熹意不欲如此坐談但直以孔子程子所示求仁之方擇其一二切於吾身者篤志而力行之於動靜語黙間勿令間㫁則久久自當知味矣去人欲存天理且據所見去之存之功夫旣深則所謂似天理而實人欲者次第可見今大體未正而便欲察及細微恐有放飯流歠而問無齒决之譏也如何如何易之為義乃指流行變易之體而言此體生生元無間㫁但其間一動一靜相為始終耳程子曰上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神正謂此也此體在人則心是已其理則所謂性其用則所謂情其動靜則所謂未發已發之時也此其為天人之分雖殊然靜而此理已具動而此用實行則其為易一也若其所具之理所行之用合而言之則是易之有太極者昨來南軒嘗謂太極所以明動靜之藴盖得之矣來喻以不易變易為未發已發恐未安試以此説推之非惟見得易字意義分明而求仁用力要處亦可得矣答楊子直方承喻太極之説足見用力之勤深所歎仰然鄙意多所未安今且畧論其一二大者而其曲折則托季通言之盖天地之間只有動靜兩端循環不已更無餘事此之謂易而其動其靜則必有所以動靜之理焉是則所謂太極者也聖人既指其實而名之周子又為之圖以象之其所以發明表著可謂無餘藴矣原極之所以得名盖取樞極之義聖人謂之太極者所以指夫天地萬物之根也周子因之而又謂之無極者所以著夫無聲無臭之妙也然曰無極而太極太極本無極則非無極之後别生太極而太極之上先有無極也又曰五行陰陽陰陽太極則非太極之後别生二五而二五之上先有太極也以至於成男成女化生萬物而無極之妙盖未始不在是焉此一圖之綱領大易之遺意與老子所謂物生於有有生於無而以造化為眞有始終者正南北矣來喻乃欲一之所以於此圖之説多所乖礙而不得其理也熹向以太極為體動靜為用其言固有病後已改之曰太極者本然之妙也動靜者所乘之機也此則庶幾近之來喻疑於體用之云甚當但所以疑之之説則與熹之所以改之之意又若不相似然盖謂太極含動靜則可以本體而言也謂太極有動靜則可以流行而言也若謂太極便是動靜則是形而上下者不可分而易有太極之言亦贅矣其它則季通論之已極精詳且當就此虛心求之久當自明不可别生疑慮徒自攪繞也持敬之説不必多言但熟味整齊嚴肅嚴威儼恪動容貎整思慮正衣冠尊瞻視此等數語而實加功焉則所謂直内所謂主一自然不費安排而身心肅然表裏如一矣豈陸棠之謂哉彼其挾詐欺人是乃敬之賊耳今反以敬之名歸之而謂敬之實眞有不足行者豈不誤甚矣哉大抵身心内外初無間隔所謂心者固主乎内而凡視聽言動出處語黙之見於外者亦卽此心之用而未嘗離也今於其空虚不用之處則操而存之於其流行運用之實則棄而不省此於心之全體雖得其半而失其半矣然其所得之半又必待有所安排布置然後能存故存則有揠苖助長之患否則有舍而不芸之失是則其所得之半又將不足以自存而失之孰若一主於敬而此心卓然内外動靜之間無一毫之隙一息之停哉叔京來書尚執前説而來喻之云亦似未見内外無間之實故為此説并以寄叔京而所以答叔京者亦并寫呈幸詳思之却以見告也答楊子直來書譙責不少置不記前書云何何所得罪一味皇恐而已但來書旣云鐫責諄切其後又謂不教而棄之殊不可曉如前書尚在望令小吏録以見寄當一一供答以聽裁處熹却自覺尚且耐煩不至如老兄激發怨懟之深也且如向來出川時所予書無非怨懟之語此非怨熹之詞想自記得故竊疑之以為士君子去就離合之際不當如此因答書中頗致寛解之詞未有相貶外處如後來見教政事條目其間亦有一二心未安處故因筆自解初非相貶外不知今來所謂貶外是指何語恐實有之而熹不自覺者卽望一二疏示容其改過幸甚幸甚且如今書四子之説極荷見教然此書之目只是一時偶見大學太薄裝不成册難作標題故如此寫亦欲見得四書次第免被後人移易顚倒只如大學據程先生説乃是孔氏遺書而謂其他莫如論孟則其尊之固在論語之右非熹之私説矣今必欲抑之而尊論語復何説乎竊恐此意未必為大學壓論語發恐又只是景迂作祟意欲擯斥孟子耳萬一揣料失當所言非是亦告且為平心息怒子細見教使得反復以究實是之歸幸甚幸甚平時與老兄講論常是不曾合殺只被中間一句不合尊意便蒙見怒更不暇復論前語之是非而一向且爭閒氣所以老兄見教之美意與區區獻疑之誠懇皆不見其有益而反積為後日無窮之怨隙所謂忠告善道不可則止者豈若是乎世衰道䘮吾黨日孤見自無事不要似此尋事厮炒使旁觀指目益為道學之病乃是助彼自攻古人所謂將鬭而自㫁一手以求必勝者也願老兄自今或有異同之論且耐煩息怒而極論理之是非則理日益明氣日益和雖使十反極其紛挐亦自無忿懟之撓矣老兄見責不能受人盡言而前後怨忿之詞至於如此請出兩家之書付之識者使其審訂則誰為不能受言者必有在矣王肅方於事上而好人佞已此不絜矩之過也願更思之下交淺劣不勝至望答楊子直學者墮在語言心實無得固為大病然於語言中罕見有究竟得徹頭徹尾者盖資質已是不及古人而工夫又草草所以終身於此若存若亡未有卓然可恃之實近因病後不敢極力讀書閒中却覺有進步處大抵孟子所論求其放心是要訣爾答楊子直前日晦伯人還已上狀矣但忘記一事欲煩為作小楷四箴百十字今納界行去暇日得為揮染甚幸此箴舊見只是平常説話近乃覺其旨意之精宻眞所謂一棒一條痕一摑一掌血者故欲揭之座隅使不失墜云耳時節不是當字學亦絕故又欲得妙札時以寓目以祛病思幸勿靳也答楊子直此庚申閏二月二十七日書去夢奠十二日熹病日覺沉重而醫者咸以為可治但服藥殊不見効亦付之無可奈何安坐拱手以聽天命耳曾光祖在此備見當能道之也此間諸况曲折亦不暇詳布渠亦可問也前書所求妙札曾為落筆否便中早得寄示為幸近以書懇益公求作先人墓碑不知渠肯作否若肯作又并書卽不敢奉凂不然又當有請也夏小正文已編入禮書但所見數本率多舛誤所示未暇參考少俟功夫子細校畢卽納還也四民月令中亦見當時風俗及其治家齊整卽以嚴致平之意推尋也亦俟抄了并納還不知近日更得何異書便中望見告此却亦讀得舊書但鍜鍊得愈純熟亦頗有實用不專是空言也此間新定參同契曾寄去否如未有可喻及當續致也此書理㑹他下手處不得但愛其文古雅因校此本買櫝還珠甚可笑也光祖家有泉石頗佳已屬令去求詩能為出數語否王才臣寄示所得諸圖幽閒淡泊彼間風俗嗜好不同未必識此味也答吕季克承示及環叟之書粗釋所疑此公舊亦聞之平父伯崇皆與之相識然不聞其為濓溪家子弟也其所著書乃如此若原説者則可謂青過於藍矣道學不明異端競起士雖有意於學而浮沉世故不能篤信聖言躬行黙體以至不疑之地鮮有不没溺者甚可歎也八桂久不得書昨亦見其所與尊兄書論原説者大意甚正但似未究其巧譎之情耳答廖子晦德明德明舊嘗極力尋究於日用事上若有所感而知吾身之具有者廣大虛靜範圍天地根本萬物易所謂寂然不動中庸所謂喜怒之未發者是也德明將以此為大本漸加修治之功未知所見是否聖門之學下學而上達至於窮神知化亦不過德盛仁熟而自至耳若如釋氏理須頓悟不假漸修之云則是上達而下學也其與聖學亦不同矣而近世學者每欲因其近似而説合之是以為説雖詳用心雖苦而卒不近也中庸所謂喜怒哀樂之未發謂之中發而皆中節謂之和只是説情之未發無所偏倚當此之時萬理畢具而天下萬物無不由是而出焉故學者於此涵養栽培而情之所發自然無不中節耳故又曰中者天下之大本和者天下之達道此皆日用分明底事不必待極力尋究忽然有感如來喻之云然後為得也必若此云則是溺於佛氏之學而已然為彼學者自謂有見而於四端五典良知良能天理人心之實然而不可易者皆未甞畧見彷彿甚者披根㧞本顚倒錯繆無所不至則夫所謂見者殆亦用心太過意慮冺絕恍惚之間瞥見心性之影象耳與聖門眞實知見端的踐履徹上徹下一以貫之之學豈可同年而語哉程子以敬教人自言主一之謂敬不之東又不之西不之此又不之彼如此則何時而不存然欲到得此功夫須如釋氏攝心坐禪始得德明又慮至此成正與助長故近日又稍體究禮樂不可斯須去身之説盖禮則嚴謹樂則和樂兩者相須而後能故明道先生旣以敬教人又自謂於外事思慮儘悠悠又曰旣得後便須放開不然却只是守故謝子因之為展托之論德明又恐初學勢須把持未敢便習展托於斯二者孰從孰違雖然是固操存舍亡之意而孔氏教人求仁為先竊謂仁人心也克己之私而循天之理則本心之仁得矣夫復何事嘗試求之覺得難甚先難後獲寧不信然二先生所論敬字須該貫動靜看方得夫方其無事而存主不懈者固敬也及其應物而酬酢不亂者亦敬也故曰毋不敬儼若思又曰事思敬執事敬豈必以攝心坐禪而謂之敬哉禮樂固必相須然所謂樂者亦不過謂胸中無事而自和樂耳非是著意放開一路而欲其和樂也然欲胸中無事非敬不能故程子曰敬則自然和樂而周子亦以為禮先而樂後此可見也旣得後須放開不然却只是守者此言旣自得之後則自然心與理㑹不為禮法所拘而自中節也若未能如此則是未有所自得纔方是守成法之人爾亦非謂旣自得之又却須放教開也克己復禮固非易事然顔子用力乃在於視聽言動禮與非禮之間未敢便道是得其本心而了無一事也此其所以先難而後獲歟今言之甚易而苦其行之之難亦不考諸此而已矣明道先生云鳶飛戾天魚躍于淵言其上下察也與必有事焉而勿正心同德明竊謂萬物在吾性分中如鑑中之影仰天而見鳶飛俯淵而見魚躍上下之見無非道體之所在也方其有事而勿正之時必有參乎其前而不可致詰者鳶飛魚躍皆其分内耳活潑潑地智者當自知之鳶飛魚躍道體無乎不在當勿忘勿助之間天理流行正如是爾若
