seq: 60
front:
  text: 而無德者無用有也然大有可謂盛
  hash: sha256:f5b7549cbca4ab1ba64b6cc2739496b853dc9e118f208c01c11180821b30b352
body:
  text: 矣而卦有卦德不知如何元亨利貞本非四德但為大亨而利於正之占耳乾卦之彖傳文言乃借為四德在他卦尤不當以德論也晉六三衆允悔亡傳曰或曰不由中正而與衆同得為善乎曰衆所允者必至當也竊謂世固有不義而得衆如齊之陳氏魯之季氏者矣顧可以為善乎易是虚設之辭不可以實迹論若以卦象言之則順而麗乎大明自不應有不善也家人有嚴君焉傳曰家人之道必有所尊嚴而君長者謂父母也如此則嚴君作兩字説然自舊諸家只作一字説未知如何所尊嚴之君長也蹇九五大蹇朋來傳以其無剛陽之臣不足以濟蹇竊謂自古患君之不剛明耳未有有其君而無其臣者也傳又以李固王允周顗王導為言竊意當時正以無剛明之君故耳設使有之數子未必能有為也更乞指教讀易當看卦畫時節不可以此論夬象曰居德則忌傳曰則約也忌防也謂約立防禁則無潰散某於此義不能無疑更乞批報未詳艮行其庭不見其人傳曰庭除之間至近也在背則雖至近不見謂不交於物也外物不接内慾不萌如是而正乃得止之道夫人豈能不交於物而孑然自立於世哉意此所謂不交者謂非已之所當應則雖在至近而猶不見也若非所當應亦感之而動則非所以為止矣未知是否熟讀彖傳之詞可見文義艮其背乃止其所之意程傳恐非本文之㫖啟蒙述㫖篇云仰觀俯察始畫竒偶教之卜筮以斷可否不知伏羲之後文王周公之前未有卦及辭何以定吉凶敢乞批示此無可考但周禮三易經卦皆八别皆六十有四則疑已有辭矣義訓宜禮訓别智訓知仁當何訓竊意仁只是人心一箇生理不知以生字訓得否不必須用一字訓但要曉得大意通透耳明道先生曰學只要鞭辟近裏著已而已故切問而近思則仁在其中矣言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉立則見其參於前也在輿則見其倚於衡也夫然後行只此是學質美者明得盡查滓便渾化却與天地同體其次惟莊敬以持養之及其至則一也竊謂切問近思是主於致知忠信篤敬是主於力行知與行不可偏廢而此條之意謂隨人資質各用其力而其至則一如是則亦有行不假於知者未知如何伏乞指教切問忠信只是泛引切已底意思非以為致知力行之分也質美者固是知行俱到其次亦豈有全不知而能行者但因持養而所知愈明耳恕則仁之施愛則仁之用施與用不知如何分恕之所施施其愛耳不恕則雖有愛而不能及人也人之為學忌先立標凖若循循不已自有所至矣竊意若以聖人為標凖何不可之有若無所指擬茫然而去將何所歸宿哉伏乞指教忌先立標凖如孟子所謂勿正者學者固當以聖人為標凖然豈可日日比並而較量之乎觀顔子喟然之嘆不於堅髙瞻忽處用功却就博文約禮上進步則可見矣德不勝氣性命於氣德勝其氣性命於德窮理盡性則性天德命天理氣之不可變者獨死生修夭而已竊謂知所攝養者則多壽考肆其嗜慾者則多殀亡是死生修夭亦可變也故程子以火為喻與此説不合如何正蒙之言恐不能無偏横渠云心要洪放又曰心大則百物皆通心小則百物皆病孫思邈云膽欲大而心欲小竊謂横渠之説是言心之體思邈之説是言心之用未知是否心自有合要大處有合要小處若只著題目斷了則便無可思量矣且見得路逕後各自立得箇門庭歸而求之可矣竊謂門庭豈容各立耶有所未解伏乞指教此是説讀六經只要從師講問且識得如何下工夫便是立得門庭却歸去依此實下工夫便是歸而求之答潘子善比奉從容累月别去不勝悵惘比日秋冷計還舍之久諸况安適家務酬酢之餘當亦不廢學也此間朋友去多來少早晚亦且講論如常但精力愈衰愧無警切之功耳答潘子善所論為學之意善矣然欲專務静坐又恐墮落那一邊去只是虚著此心隨動隨静無時無處不致其戒謹恐懼之力則自然主宰分明義理昭著矣然著箇戒謹恐懼四字已是壓得重了要之只是略著提撕令自省覺便是工夫也所示數條今各奉答可更詳之所論孟子大學説正心處不知敬仲如何説如何是二説相似處如何是有此四者心便不正可更扣之須盡彼説方可判斷未可更以已意障斷他人話頭也純仁可念此間方為季通逺謫作惡忽又聞此其禍乃更甚於季通使人不能忘懐然此中近日改移新學復為僧坊塑象摧毁要膂斷折令人痛心彼聖賢者尤不免遭此厄㑹况如吾輩何足道哉精舍春間有朋友數人近多散去僅存一二未有精進可望者亦縁無長上在彼唱率功夫殊無次第諸友頗思董叔重也或疑清廟詩是祀文王之樂歌然初不顯頌文王之德止言助祭諸侯既敬且和與夫與祭執事之人能執行文王之德者何也某曰文王之德不可名言凡一時在位之人所以能敬且和與執行文王之德者即文王盛德之所在也必於其不可容言之中而見其不可掩之實則詩人之意得矣讀此詩想當時聞其歌者真若洋洋乎如在其上如在其左右又何待多著言語委曲形容而後足之哉妄意如此不知是否此説是谷風詩四章就其深矣方之舟之就其淺矣泳之游之集傳以為興體某疑是比體未知如何乞指教若無下面四句即是比既有下四句則只是興矣凡此類皆然非獨此章也事君數斯辱矣胡氏曰事君諫不行則當去導友善不納則當止至於煩瀆則言者輕聽者厭矣是以求榮而反辱求親而反疏也某竊以為事君而納忠交友而責善職所當然而心之不能已者本非有求榮求親之心恐胡氏之説不能無過未知如何胡氏説盡人情未有不是處栁下惠進不隠賢集註謂不隠賢不枉道也某竊疑與下文必以其道意闕莫重疊否尚乞指教兩句相承只作一意讀文勢然也乃孔子則欲以微罪行微罪不知是指魯言是孔子自謂也耶乞指教自謂知性則知天矣不知知性便能知天亦有淺深耶乞指教窮理到知天處自然見得飢者甘食渴者甘飲某竊謂此章是借飢渴之害以言人心之害所謂人心之害恐不止為貧賤而已凡一切欲有求之不得而遂不暇擇焉皆是也所謂人能無以飢渴之害為心害者謂人能無以飢渴害口腹之類為其心害則不憂其不及人矣未知如此説得否此章從來有兩説以意則此説勝葢不欲人以利欲害其心如飢渴之害口腹也以語則不以飢渴之害動其心者為切於文義未知果孰是但後説差不費力耳温公稽古録秦論謂知及之仁不能守之雖得之必失之秦之謂矣又引賈生之論曰仁義不施而攻守之勢異也某竊謂秦以虎狼并天下設使守之以道且不可保况又非其道耶論者不當徒咎其守之非道而不論其攻之已不善也伏更乞指教賈生温公之論若究其極固為有病然彼其立論非為攻取者謀以為可以如是取之而無害也乃為既得之後而論以為如是則或可以守耳今且試以身處胡亥子嬰之地而自謀所以處之之宜則彼前日取之之逆者既不可及矣吾乃可以拱手安坐以待其亡耶魏論温公謂魏太祖取天下於盗手而非取之于漢室某於此有所未喻葢盡忠以事君興衰而撥亂此人臣之職也安可因其危亂自多其功遂掩取之耶今有巨室一夕㓂至據其室廬而攘其貲財有强奴悍僕却其羣盗而復其室廬不歸之於主而遂以為已有謂吾取之於盗手而非取之於主人其可乎温公之論殆將啟天下姦雄之心故不能無疑并乞教誨温公此論殊不可曉知其非是足矣不須深論前賢之失也答潘子善所論為學工夫亦甚稳宻尤以為喜更切勉力乃所望也楊敬仲其人簡淡誠慤自可愛敬而其論議見識自是一般又自信已篤不可復與辨論正不必徒為嘵嘵也答潘子善欽明文思某謂恐當從去聲讀若只作思慮之思未見其發揮於事業處作去聲讀為是克明俊德止黎民於變時雍俊德或以為已之明德或以為俊德之士百姓或以為民或以為百官未知二説如何若以大學之序觀之則俊德為已之明德百姓為民似無可疑者俊德當依大學説百姓程先生以為畿内之民是也平秩南訛敬致林氏謂如周禮致日之致此乃致南方之中星耳未知是否致日乃考日中之景如周禮土圭之法非考中星也戒之用休董之用威􅂆之以九歌林氏謂自戒自董自勸未知此説如何九歌今亡其詞不可稽考以理觀之恐是君臣相戒如賡歌之類臯陶矢厥謨禹成厥功帝舜申之未知申字如何看此是三篇之叙第一句説臯陶謨第二句説大禹謨第三句説益稷所謂申之即所謂汝亦昌言者也此書伏生本只是二篇臯陶謨益稷之間語勢亦相連孔壁中析為三篇故其序如此亦不足據而説者又多失之甚可笑也念兹在兹釋兹在兹允出兹在兹諸説皆以禹欲舜念臯陶而林氏以為禹自言其念之如此未知二説如何林説是允迪厥德謨明弼諧疑是稱臯陶未知是否若以為稱臯陶則下句禹曰俞者為何所俞耶恐此八字是臯陶之言禹善之而問其詳故臯陶復説下句解此八字之義或云此八字是言臯陶之德諧字下别有臯陶之言今脱去未知是否姑存之可也亦行有九德或以為人之性行或以為君之行未知二説當何從亦行有九德泛言人之行有此九德故言其人之有德則當以此而論之載采采古語不可曉當闕之夙夜浚明有家止亮采有邦古注以為可以為卿大夫及諸侯林氏以為卿大夫諸侯用此三德六德之人未知孰是林説恐得之猶孝經説争臣之類葢曰如是足矣非必以是為限也天聰明自我民聰明天明畏自我民明威不知明畏是兩字還是一字林氏以為聰明言視聴明畏言好惡未知如何林氏似是明畏言天之所明所畏所明如明明揚側陋之明上明字所畏如董之用威威用六極之意以出内五言林氏以為宫商角徵羽之言古注以為仁義禮智信之言未知當孰從未詳當闕自侯以明之以下皆然闗石和鈞竊謂此只是鈞石之名如周禮嘉量之類耳未知是否恐是鬼神其依龜筮協從不知是已卜還是未卜恐是初未嘗卜先時者殺無赦不及時者殺無赦林氏謂是誓衆之辭非言昏迷天象之人以上文考之林説非是然此篇自可疑當闕之矧予之德言足聽聞據古注云道德善言某竊意言足聽聞自當作一句言吾之德言之足使人聴聞彼安得不忌之未知是否是賁若草木兆民允殖諸家説多不同未知當如何看連上句言天命不僣明白易見故人得遂其生也自周有終古注及諸家皆以周訓忠信竊謂以忠信自周則可以忠信訓周恐未安未知如何自周二字本不可曉王惟庸罔念聞諸家皆於庸字絶句竊謂只作一句讀以庸訓用如説命中王庸作書以告之庸未知是否六字一句若虞機張諸家皆訓虞為度竊謂只作虞人説如何作虞人為是臣為上為德為下為民諸説不同不知此四為字當如何音四為字並去聲為上者輔其德而不阿其意之所欲為下者利於民而不狥已之所安武成一篇諸家多以為錯簡然反覆讀之竊以為自王若曰以後皆是史官厯叙以前之事雖作武王告羣后之辭而實史官叙述之文故其間如有道曾孫周王發及昭我周王之語皆是史官之言非武王當時自稱如此也亦如五誥中王若曰以下多是周公之語若如此看則似不必改移亦自可讀又既生魄恐是晦日既者言其魄之既足也以厯推之當為四月晦未知此篇先生尋常如何看王若曰以下固是告羣后之辭兼叙其致禱之辭亦與湯誥相類但此詞却無結殺處只自叙其功烈政事之美又書戊午癸亥甲子日辰亦非誥命之體恐須是有錯簡然自王氏程氏劉原父以下所定亦各不同舊嘗考之劉以為王語之末有闕文似得之彼有七經小傳否可檢看又漢書厯志謂是嵗有閏亦是也洪範之書林氏以為洛出書之説不可深信謂帝乃震怒不畀洪範九疇彞倫攸斁猶言天奪之鑒也天乃錫禹洪範九疇􅂜倫攸叙猶言所謂天誘其衷也又云洪範之書大抵發明彞倫之叙本非由數而起又曰天乃錫禹洪範九疇猶言天乃錫王勇智耳不必求之太深也某竊謂闕河出圖洛出書易中明有此説豈得而不之信耶未知林氏之説如何望折衷便使如今天錫洛書若非天啟其心亦無人理㑹得兩説似不可偏廢也八庶徵曰時林氏取蔡氏説謂是嵗月日之時自五者來備而下所以申言曰雨曰暘曰燠曰寒曰風之義自王省惟嵗而下所以申言曰時之義某竊謂此時字當如孔氏五者各以其時之説為長林氏徒見時字與雨暘燠寒風五者並列而為六則遂以此時字為贅不知古人之言如此類者多矣且仁義禮智是為四端加一信字則為五常非仁義禮智之外别有所謂信也故某以為時之在庶徵猶信之在五常不知是否林氏之説只與古説無異但謂有以嵗而論其時與不時者有以月而論其時與不時者有以日而論其時與不時者可更推之某讀書至盤庚及五誥諸篇其疑不可數舉若以諸家之説勉强解去亦説得行但恐當時指意未必如此耳如此等處只得姑存之如何漳州所刻四經書序有此説需卦六四出自穴上六入于穴程傳謂穴物之所安也本義謂穴者險陷之所某以為謂之險陷之所正得坎體之象未知是否坎即穴也訟六三或從王事无成本義謂必无成功似與象辭從上吉也之意不協又與坤六三文言亦不協竊意本義是直作占辭解如此未知是否易中經傳不同如此處多且兼存之然經意是本傳辭是第二節話也小畜九五富以其隣本義謂巽體三爻同力畜乾隣之象也據程傳則曰以一隂畜五陽某竊謂以統體言之固是以一隂畜五陽然就九五而言則下與四比上與上連為隣之象謂巽三爻同力畜乾自見得自上畜下之意分明未知是如此否更以泰卦不富以其隣對之即可見其文意大過上六爻本義謂是殺身成仁之事莫是如晉荀息之類否荀息所處未得為成仁者遯小利貞本義謂小人也按易中小字未有以為小人者如小利有攸往與小貞吉之類皆大小之小耳未知此義如何經文固無此例然以彖傳推之則是指小人而言今當且依經而存傳耳豐天地盈虛與時消息而况於人乎况於鬼神乎程子曰鬼神者造化之跡然天地盈虚即是造化之跡矣而復言鬼神何耶天地舉全體而言鬼神指其功用之跡似有人所為者以謙卦彖辭推之尤明白聖人有以見天下之賾本義云賾雜亂也訓詁皆云深也未知如何先儒有此訓今忘記檢不得字書無賾字口同義只作嘖云大呼也左傳曰嘖有煩言非謂深也若以深義即與隠深逺三字一義矣且又何以云不可惡乎本義云變化云為故象事可以知器吉事有祥故占事可以知來不知變化云為主於人而言否變化者隂陽之所為云為者人事之所作幽贊於神明而生蓍本義謂蓍生滿百莖某謂恐只與立卦生爻同義猶言立蓍而用之耳卦爻是人所畫蓍是天地所生不可作一例説兼以立蓍而用之為生蓍亦不成文理勞乎坎某恐勞字當作去聲讀恐或如此然此一節多難曉處辟雍天子之學不知從來是天子之學名還是文王始為之後遂以為定制亦如臯門應門始立於太王而後遂以為天子之門也見不得召旻第六章集傳作賦體竊疑是比體作比為是仁者不憂集注云理足以勝私故不憂某嘗推之恐只是此心常存不暇閒思慮惹起閒煩惱耳未知是否未是春秋翬帥師某謂春秋為聖人褒貶之書其説舊矣然聖人豈損其實而加吾一字之功哉亦即其事之固然者而書之耳如翬帥師之類是也葢不待君命而固請以行則書之如是宜也或以為若是則一代之事自有一代之史春秋何待聖人而後作哉曰春秋即魯史之舊名非孔子之創為此經也使史筆之傳舉不失其實聖人亦何必以是為己任惟官失其守而策書記注多違舊章故聖人即史法之舊例以直書其事而使之不失其實耳初未嘗有意於褒之貶之也以是而觀春秋庶足以見聖人光明正大之意而非持夫一字之功以私榮辱之權也惟夫不失其實則為善者安得而不勸為惡者安得而不懼孟子曰孔子作春秋而亂臣賊子懼宜哉不知書翬帥師如何見得其不待君命而行之罪又如何見得舊例合如此書此須更有商量未達則闕之可也答潘子善漢志引武成篇曰惟一月壬辰旁死霸若翌日癸巳武王乃朝步自周于征伐紂此與古文合伹一二字差又曰粤若來三月既死霸粤五日甲子咸劉商王紂顔氏曰今文尚書之辭又曰惟四月既旁生霸粤六日庚戌武王燎于周廟翌日辛亥祀于天位粤五日乙夘乃以庶國祀馘于周廟顔氏曰亦今文尚書也又畢命豐刑曰惟十有二年六月庚午朏王命作策豐刑孟康曰逸書篇名今按伏生今文尚書無武成獨孔氏古文尚書乃有此篇今顔氏注劉歆所引兩節見其與古文不同遂皆以為今文尚書不知何所考也諸家推厯以為此年二月有閏四月丁未為十九日庚戌為二十二日若無閏即四月無丁未庚戌然二日皆在生魄之後則古文為倒而此志所引者為順但其言燎于周廟似無理耳况古文此篇文皆錯繆安知既生魄庶邦冡君暨百工受命于周十四字非本在示天下弗服之下丁未祀于周廟之上而王若曰以下乃大告武成之文耶以湯誥考之此説為是畢命古文有此篇其年月日與此同而王命作冊乃序文唯豐刑為無據然年月之下亦有至于豐字豈又若伊訓之方明耶但古文之序冊下更有畢字孔傳以為命為冊書以命畢公如此則全不成文理本文似亦有闕語疑作冊二字乃衍文而闕一公字也以此可見劉歆所見古文已非其正而今本亦有闕誤難盡信也孟康便以豐刑為逸書篇名則亦不復本上文自有畢命矣此又誤之甚也此恐是劉氏七經小傳之説當考答潘子善所喻主一功夫甚善千萬更加勉力為佳書説今宜報去去嵗巻子八月間已寄往黄巖矣不知何故未到然大抵看得似皆疎淺更且玩索其間曲折意味方有得力處也學禮之意甚善然此事頭緒頗多恐精力短包羅不得今可且讀詩俟他日所編書成讀之未晩書雖讀了亦更宜温習如大學語孟中庸則須循環不住温習令其爛熟為佳春秋一經從前不敢容易令學者看今恐亦可漸讀正經及三傳且當看史功夫未要便穿鑿説褒貶道理久之却别商量亦是一事也公食禮至今未寄來已報公叔致道趣之矣子約之亡深可傷痛此間蔡季通亦死貶所尤可惜目前便覺無人説得話也答潘子善洪範中休徵咎徵諸家多以義推説竊以為五者不出隂陽二端雨寒隂也暘燠風陽也肅謀深沈而屬静隂類也故時雨時寒應之乂哲聖發見而屬動陽類也故時暘時燠時風應之狂反於肅急失於謀故恒雨應之未知如此看得否大槩如此然舊以雨屬木暘屬金燠屬火寒屬水而或者又欲以雨屬水暘屬火燠屬木寒屬金其説孰是可試思之旅獒人不易物讀家皆讀易如字某竊意當讀作輕易之易恐不然時庸展親諸家多訓展作信是否展審視也不當訓信召誥文只説召公先至洛而周公繼至不説成王亦來也然召公出取幣入錫周公乃曰旅王若公其辭又多是戒成王未知如何此葢因周公以告于王耳但洛誥之文則有不可曉者其後乃言王在新邑而其前已屢有問答之詞矣可試考之立政兹乃三宅無義民據此三宅即上文宅事宅牧宅凖之宅今孔氏蘇氏以為居無義之民猶舜典五宅三居之意吕氏以三宅無義民一句桀德惟乃弗作往任謂當桀之時三宅者曾無義民未知二説孰長吕説是司徒司馬司空亞旅不知何故叙於太史尹伯庶常吉士之下吕氏以為諸侯之官未知是否謂三官之副與其屬耳亞謂小司徒之屬旅則下士也見周禮序官奠麗陳教則肄麗字據孔氏音力馳反施也諸家多作附麗之麗謂土著也奠麗謂養之陳教則教之未知其説如何某竊謂從孔氏説亦自平直奠麗者謂定其所施之號令也陳教則陳其所以教之之道也肄或訓勞習愚意謂從習為長未敢自決尚幸批誨前篇有以麗訓刑者肄當訓習爾無以釗冒貢於非幾幾者事之微也康王釋喪服而被衮冕且受黄朱圭幣之獻諸家皆以為禮之變獨蘇氏以為禮之失天子諸侯之禮與士庶人不同故孟子有吾未之學之語葢謂此類耳如伊訓元祀十二月朔亦是新喪伊尹已奉嗣王祗見厥祖固不可用凶服矣漢唐新主即位皆行冊禮君臣亦皆吉服追述先帝之命以告嗣君韓文外集順宗實録中有此事可考葢易世傳授國之大事當嚴其禮而王侯以國為家雖先君之喪猶以為己私服也五代以來此禮不講則始終之際殊草草矣程先生文集中主式與古今家祭禮長短不同所謂古尺當今五寸五分弱不知當用今何尺古今家祭禮中有古尺様較之今尺又不止五寸五分注云省尺省尺莫是今准尺否主式適檢二書髙低雖有少不同然本只要見式様其髙廣之度自有尺寸初不取此為凖也省尺乃是京尺温公有圖子所謂三司布帛尺者是也㑹稽司馬侍郎家必有此本可轉求之其圖并有古尺數等此舊有之今久不見矣答潘子善六月二十七日熹頓首久不聞問便中辱書具審比日所履佳勝又知己遂親迎良以為慰熹衰病益侵本無足言最是氣痞不可伏几觀書殊以為撓耳近日作何工夫前此問目已嘗奉報矣此間朋友亦有十餘人頗有講論之益然亦皆不能久留也不知秋冬間能率諸同志一來為旬月之集以盡所欲言者否因便口占布此草草餘唯以時自愛答余彞孫範有憂有懼者志不勝氣氣反動其心若志立則氣定矣故曰内省不疚夫何憂何懼有憂有懼者内有所歉也自省其内而無所病則心廣體胖而何憂何懼之有夫子之語固已明白完備今以志立氣定為言則是未嘗熟復本文而别生枝節也文中子曰仁義教之本先王以是繼道德此先道德而後仁義之説也此説得之大學知止以至能得孟子自得以至逢原或以二章次第相似範以為不然大學知止而下乃孟子欲其自得之事至於能得乃自得處居之安則資之深資之深則取之左右逢其原此乃自得後所進愈不止也此亦得之但聖賢之言各有所指其次序深淺隨事而言不可如此牽合此説猶為粗可通耳不耕穫不菑畬程子易傳爻辭恐未明白範竊謂無不耕而穫不菑而畬之理只是不於耕而計穫之利如程子所解象辭移之以解爻辭則可易傳爻象之辭雖若相反而意實相近特辭有未足耳爻辭言當循理象辭言不計利循理則不計利計利非循理也但攷之經文則傳與來説於文義之間皆若有可疑者若曰不耕而穫則多却而字若曰不於耕而求穫之利則又須增數字方通嘗謂此爻乃自始至終都不營為而偶然有得之意耕穫菑畬舉事之始終而言也當無妄之世事葢有如此者若以義言則聖人之無為而治學者之不要人爵而人爵從之皆是也大抵此爻所謂旡妄之福而六三則所謂旡妄之禍也艮六二不拯其隨程子謂二不得以拯三之不終則勉而隨之不拯而惟隨也恐惟字未的當若不拯而惟隨則如樂正子之於子敖冉求之於季氏也當只言不拯其所隨故其心不快如孔孟之於時君諫不行言不聴則去而已勉而隨之恐非時止之義得之大司樂祀天地四望皆文之以五聲至於祀天神地示人鬼獨用宫角徵羽而不及商或曰祭尚柔又何以統言五聲耶一變致羽物六變致象物有感則無不通但不可以次序先後言然下管鼗鼓而鳥獸蹌簫韶九成而鳳凰儀又若有次序先後豈所感有淺深故其應如之耶但一本作似五聲葢總言之其用則不及商也沈存中筆談亦有説然此等今無所考未須深究感有淺深古注之説已詳然今亦未睹其實也司服卿大夫加以大功小功則自卿大夫而上皆無此者何也此義周禮疏中其説已備中庸所謂期之䘮達乎大夫是也乃古人貴貴之義吕氏之説詳矣精義君子反經處亦有説然亦是周公制禮而後方如此故檀弓又云古者不降上下各以其親大凡禮樂制度若欲理㑹湏從頭做工夫不可只如此章草畧説一二但恐日力未遽及此不若且專意於其近者為佳耳章字疑草字之誤考異温公稽古録攻守之勢異也下一作某竊以為守固不當如此守攻亦豈可如此攻耶秦之兼并天下不啻如禦人於國門之外者設使守之有道且不可况又非其道耶然則論秦之亡者豈可徒咎其守之非道而不論其攻之已不善哉更乞指教答潘子善欽明文思一作某竊謂思猶意思之思若只作思慮之思未見發於事業處惟從去聲讀則見其發於事業者莫不切中情理煥然可觀彷彿如論語中倫中慮之類未知是否伏乞批誨鬼神其依龜筮協從下一作不知已是曾卜一畨了還是未曾卜按文義恐是已曾卜了禹更請枚卜故舜言其不必再卜之意鬼神其依者以鬼神不可得而知但人謀既恊則鬼神亦必依之亦是言向者卜時已是無可疑者今不必更卜也未知是否伏乞批誨武成一篇言其魄之既足也下一有先生批云此句非是豐天地盈虚豐下一有彖曰造化之迹下一作今既言天地而復言鬼神未知如何分幽賛於神明而生蓍下一作本義引龜筴傳蓍生滿百莖為證某竊謂生字似只當與下面對立卦立字生爻生字同例看所謂生蓍者猶言立蓍而用之耳未知是否勞乎坎下一作據下文云萬物之所歸也故曰勞乎坎竊意勞字當作去聲讀未知是否辟雍天子之學云云一作於倫鼓鍾於樂辟雍註云辟雍天子之學也不知辟雍從來是天子之學否還是文王始為之及周有天下遂以為天子之學亦如臯門應門始立於太王而後遂以為天子之門耶又有一問云小序麟趾詩雖衰世之公子皆信厚如麟趾之時也此句似無義理江有汜詩是媵自作非美媵也此二處下皆未曽註未知如何答云當補某謂春秋為聖人褒貶書上一作某讀春秋至翬帥師㑹宋公陳侯蔡人衛人伐鄭處畧窺見聖人所以作春秋之意僣易録呈伏乞指教洪範中云云竊以為下一作此猶易中取象相似但可以彷彿看而不可以十分親切求也庶徴雖有五者大抵不出於隂陽二端而已雨寒隂也云云旅􅋙人不易物下一作惟德其物諸家皆讀易如字某竊意當作去聲讀葢此二句接上文無替厥服與時庸展親之意謂人不敢輕易其物惟知徳其物知德其物者謂以所賜之物為德也至下文德盛不狎侮却自是别生意不與惟德其物相接諸家往往以惟德其物之德接下文德盛不狎侮之德而不以接上時庸展親之意故以易作如字讀未知是否時庸展親諸家多訓展作信謂信其親親之意某竊意只作展省之展自是平直未知是否爾無以釗冒貢於非幾一作思夫人自亂於威儀爾無以釗冒貢於非幾幾字多訓危某竊謂幾即事也猶萬幾之幾冒貢於非幾謂冒進於非所當為之事未知是否康王釋喪服而被衮冕受虎賁之逆於南門之外且受黄朱圭幣之獻諸家皆以為禮之變獨蘓氏以為失禮使周公在必不為此未知當此際合如何區處所謂古尺上一作程先生文集中主式與古今家祭禮中主式長短濶狹不同不知此二書開時皆曾經先生校過否易傳爻象云無則字晦庵集卷六十欽定四庫全書晦庵集卷六十一宋朱子撰書問答一本作知舊門人問答答林徳久
