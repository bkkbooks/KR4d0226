body:
  text: 易象説易之有象其取之有所從其推之有所用非茍為寓言也然兩漢諸儒必欲究其所從則既滯泥而不通王弼以來直欲推其所用則又疎畧而無據二者皆失之一偏而不能闕其所疑之過也且以一端論之乾之為馬坤之為牛説卦有明文矣馬之為健牛之為順在物有常理矣至於案文責卦若屯之有馬而無乾離之有牛而無坤乾之六龍則或疑於震坤之牝馬則當反為乾是皆有不可曉者是以漢儒求之説卦而不得則遂相與創為互體變卦五行納甲飛伏之法參互以求而幸其偶合其説雖詳然其不可通者終不可通其可通者又皆傅會穿鑿而非有自然之勢惟其一二之適然而無待於巧説者為若可信然上無所闗於義理之本原下無所資於人事之訓戒則又何必苦心極力以求於此而欲必得之哉故王弼曰義苟應健何必乾乃為馬爻茍合順何必坤乃為牛而程子亦曰理無形也故假象以顯義此其所以破先儒膠固支離之失而開後學玩辭玩占之方則至矣然觀其意又似直以易之取象無復有所自來但如詩之比興孟子之譬喻而已如此則是説卦之作為無所與易而近取諸身逺取諸物者亦剩語矣故疑其説亦若有未盡者因竊論之以為易之取象固必有所自來而其為説必已具於太卜之官顧今不可復考則姑闕之而直據辭中之象以求象中之意使足以為訓戒而決吉㐫如王氏程子與吾本義之云者其亦可矣固不必深求其象之所自來然亦不可直謂假設而遽欲忘之也易精變神説變化之道莫非神之所為也故知變化之道則知神之所為矣易有聖人之道四焉所謂變化之道也觀變玩占可以見其精之至矣玩辭觀象可以見其變之至矣然非有寂然感通之神則亦何以為精為變而成變化之道哉此變化之道所以為神之所為也所以極深者以其幾也所以研幾者以其變也極深研幾所以不疾而速不行而至者以其神也此又發明上文之意復以易有聖人之道四焉者結之也或曰至精至變皆以書言之矣至神之妙亦以書言可乎曰至神之妙固無不在詳考之文意則實亦以書言之也所謂无思无為寂然不動云者言辭在册象在畫蓍在櫝而變未形也至於玩辭觀象而揲蓍以變則感而遂通天下之故矣推而極於天地之大反而驗諸心術之㣲其一動一靜循環始終之際至神之妙亦如此而已矣嗚呼此其所以不疾而速不行而至也歟參伍以變錯綜其數説參以三數之也伍以伍數之也如云什伍其民如云或相什伯非直為三與五而已也盖紀數之法以三數之則遇五而齊以五數之則遇三而會故荀子曰窺敵制變欲伍以參注引韓子曰省同異之言以知朋黨之分偶三五之驗以責陳言之實又曰參之以比物伍之以合三而漢書趙廣漢傳亦云參伍其賈以類相凖皆其義也易所謂參伍以變者盖言或以三數而變之或以五數而變之前後多寡更相反覆以不齊而要其齊如河圖洛書大衍之數伏羲文王之卦歴象之日月五星章蔀紀元是皆各為一法不相依附而不害其相通也綜字之義沙隨得之然錯綜自是兩事錯者雜而互之也綜者條而理之也參伍錯綜又各是一事參伍所以通之其治之也簡而疏錯綜所以極之其治之也繁而宻易寂感説易曰无思也无為也寂然不動感而遂通天下之故者何也曰无思慮也无作為也其寂然者無時而不感其感通者無時而不寂也是乃天命之全體人心之至正所謂體用之一源流行而不息者也疑若不可以時處分矣然於其未發也見其感通之體於已發也見其寂然之用亦各有當而實未甞分焉故程子曰中者言寂然不動者也和者言感而遂通者也然中和以性情言者也寂感以心言者也中和盖所以為寂感也觀言字者字可以見其㣲意矣舜典象刑説聖人之心未感於物其體廣大而虚明絶無毫髪偏倚所謂天下之大本者也及其感於物也則喜怒哀樂之用各隨所感而應之無一不中節者所謂天下之達道也盖自本體而言如鏡之未有所照則虚而已矣如衡之未有所加則平而已矣至語其用則以其至虚而好醜無所遁其形以其至平而輕重不能違其則此所以致其中和而天地位萬物育雖以天下之大而舉不出乎吾心造化之中也以此而論則知聖人之於天下其所以為慶賞威刑之具者莫不各有所由而舜典所論敷奏以言明試以功車服以庸與夫制刑明辟之意皆可得而言矣雖然喜而賞者陽也聖人之所欲也怒而刑者隂也聖人之所惡也是以聖人之心雖曰至虛至平無所偏倚而於此二者之間其所以處之者亦不能無小不同者故其言又曰罪疑惟輕功疑惟重此則聖人之㣲意也然其行之也雖曰好賞而不能賞無功之士雖曰惡刑而不敢縱有罪之人而功罪之實茍已曉然而無疑則雖欲輕之重之而不可得是又未甞不虚不平而大本之立達道之行固自若也故其賞也必察其言審其功而後加以車服之賜其刑也必曰象以典刑畫象而示民以墨劓剕宫大辟五等肉刑之常法也其曰流宥五刑者放之於遠所以寛夫犯此肉刑而情輕之人也其曰鞭作官刑扑作教刑者官府學校之刑所以馭夫罪之小而未麗于五刑者也其曰金作贖刑使之入金而免其罪所以贖夫犯此鞭扑之刑而情之又輕者也此五者刑之法也其曰𤯝災肆赦者言不幸而觸罪者則肆而赦之其曰怙終賊刑者言有恃而不改者則賊而刑之此二者法外之意猶今律令之名例也其曰欽哉欽哉惟刑之恤哉者此則聖人畏刑之心閔夫死者之不可復生刑者之不可復續惟恐察之有不審施之有不當又雖已得其情而猶必矜其不教無知而抵冐至此也嗚呼詳此數言則聖人制刑之意可見而其於輕重淺深出入取舍之際亦已審矣雖其重者或至於誅斬斷割而不少貸然本其所以至此則其所以施於人者亦必當有如是之酷矣是以聖人不忍其被酷者之衘寃負痛而為是以報之雖若甚慘而語其實則為適得其宜雖以不忍之心畏刑之甚而不得赦也惟其情之輕者聖人於此乃得以施其不忍畏刑之意而有以宥之然亦必投之逺方以禦魑魅盖以此等所犯非殺傷人則亦或滛或盗其情雖輕而罪實重若使既免於刑而又得便還鄉里復為平民則彼之被其害者寡妻孤子将何面目以見之而此幸免之人髪膚支體了無所傷又將得以遂其前日之惡而不知悔此所以必曰流以宥之而又有五流有宅五宅三居之文也若夫鞭扑之刑則雖刑之至小而其情之輕者亦必許其入金以贖而不忍輙以真刑加之是亦仁矣然而流専以宥肉刑而不下及於鞭扑贖専以待鞭扑而不上及於肉刑則其輕重之間又未甞不致詳也至於過誤必赦故犯必誅之法則又權衡乎五者之内欽哉欽哉惟刑之恤之㫖則常通貫乎七者之中此聖人制刑明辟之意所以雖或至於殺人而其反覆表裏至精至宻之妙一一皆從廣大虚明心中流出而非私智之所為也而或者之論乃謂上古惟有肉刑舜之為流為贖為鞭為扑乃不忍民之斬戮而始為輕刑者則是自堯以上雖犯鞭扑之刑者亦必使從墨劓之坐而舜之心乃獨不忍於殺傷滛盗之凶賊而反忍於見殺見傷為所侵犯之良民也聖人之心其不如是之殘賊偏倚而失其正亦已明矣又謂周之穆王五刑皆贖為能復舜之舊者則固不察乎舜之贖初不上及於五刑又不察乎穆王之法亦必疑而後贖也且以漢宣之世張敞以討羌之役兵食不繼建為入榖贖罪之法初亦未甞及夫殺人及盗之品也而蕭望之等猶以為如此則富者得生貧者獨死恐開利路以傷治化曾謂三代之隆而以是為得哉嗚呼世衰學絶士不聞道是以雖有粹羙之質而不免一偏之弊其於聖人公平正大之心有所不識而徒知切切焉餙其偏見之私以為羙談若此多矣可勝辨哉若夫穆王之事以予料之殆必由其廵遊無度財匱民勞至其末年無以為計乃特為此一切權宜之術以自豐而又托於輕刑之説以違道而干譽耳夫子存之盖以示戒而程子䇿試甞發問焉其意亦可見矣或者又謂四㓙之罪不輕於少正夘舜乃不誅而流之以為輕刑之驗殊不知共兠朋黨鯀功不就其罪本不至死三苗拒命雖若可誅而蠻夷之國聖人本以荒忽不常待之雖有負犯不為畔臣則姑竄之逺方亦正得其宜耳非故為是以輕之也若少正夘之事則予甞竊疑之盖論語所不載子思孟子所不言雖以左氏春秋内外傳之誣且駁而猶不道也乃獨荀况言之是必齊魯陋儒憤聖人之失職故為此説以夸其權耳吾又安敢輕信其言而遽稽以為决乎聊并記之以俟來者周禮三徳説或問師氏之官以三徳教國子一曰至徳以為道本二曰敏徳以為行本三曰孝徳以知逆惡何也曰至徳云者誠意正心端本清源之事道則天人性命之理事物當然之則修身齊家治國平天下之術也敏徳云者彊志力行畜徳廣業之事行則理之所當為日可見之跡也孝徳云者尊祖愛親不忘其所由生之事知逆惡則以得於已者篤實深固有以真知彼之逆惡而自不忍為者也至徳以為道本明道先生以之敏徳以為行本司馬温公以之孝徳以知逆惡則趙無愧徐仲車之徒是也凡此三者雖曰各以其材品之高下資質之所宜而教之然亦未有専務其一而可以為成人者也是以列而言之以見其相須為用而不可偏廢之意盖不知至徳則敏徳者散漫無統固不免乎篤學力行而不知道之譏然不務敏徳而一於至則又無以廣業而有空虚之弊不知敏徳則孝徳者僅為匹夫之行而不足以通于神明然不務孝徳而一於敏則又無以立本而有悖徳之累是以兼陳備舉而無所遺此先王之教所以本末相資精粗兩盡而不倚於一偏也其又曰教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長何也曰徳也者得於心而無所勉者也行則其所行之法而已盖不本之以其徳則無所自得而行不能以自修不實之以其行則無所持循而徳不能以自進是以既教之以三徳而必以三行繼之則雖其至末至粗亦無不盡而徳之修也不自覺矣然是三者似皆孝徳之行而已至於至徳敏徳則無與焉盖二者之行本無常師必協于一然後有以獨見而自得之固非教者所得而預言也惟孝徳則其事為可指故又推其類而兼為友順之目以詳教之以為學者雖或未得於心而事亦可得而勉使其行之不已而得於心焉則進乎徳而無待於勉矣况其又能即是而充之以周於事而泝其原則孰謂至徳敏徳之不可至哉或曰三徳之教大學之學也三行之教小學之學也鄉三物之為教也亦然而尤詳樂記動靜説樂記曰人生而靜天之性也感於物而動性之欲也何也曰此言性情之妙人之所生而有者也蓋人受天地之中以生其未感也純粹至善萬理具焉所謂性也然人有是性則即有是形有是形則即有是心而不能無感於物感於物而動則性之欲者出焉而善惡於是乎分矣性之欲即所謂情也又曰物至而知知而後好惡形焉何也曰上言性情之别此指情之動處為言而情在其中也物至而知知之者心之感也好之惡之者情也形焉者其動也所以好惡而有自然之節者性也好惡無節於内知誘於外不能反躬天理滅矣何也曰此言情之所以流而性之所以失也情之好惡本有自然之節惟其不自覺知無所涵養而大本不立是以天則不明於内外物又從而誘之此所以流濫放逸而不自知也茍能於此覺其所以然者而反躬以求之則其流也庶乎其可制矣不能如是而惟情是狥則人欲熾盛而天理滅息尚何難之有哉此一節正天理人欲之機間不容息處惟其反躬自省念念不忘則天理益明存養自固而外誘不能奪矣夫物之感人無窮而人之好惡無節則是物至而人化物也人化物也者滅天理而窮人欲何也曰上言情之所以流此以其流之甚而不反者言之也好惡之節天之所以與我也而至於無節宰制萬物人之所以為貴也而反化於物焉天理惟恐其存之不至也而反滅之人欲惟恐其制之不力也而反窮之則人之所以為人者至是盡矣然天理秉彜終非可殄滅者雖化物窮欲至於此極茍能反躬以求天理之本然者則初未甞滅也但染習之深難覺而易昧難反而易流非厲知耻之勇而致百倍之功則不足以復其初爾中庸首章説中庸曰天命之謂性率性之謂道修道之謂教何也曰天命之謂性渾然全體無所不該也率性之謂道大化流行各有條貫也修道之謂教克己復禮日用工夫也知全體然後條貫可尋而工夫有序然求所以知之又在日用工夫下學上達而已矣又曰道也者不可須臾離也可離非道也是故君子戒謹乎其所不覩恐懼乎其所不聞莫見乎隠莫顯乎㣲故君子謹其獨也何也曰率性之謂道則無時而非道亦無適而非道如之何而可須臾離也可須臾離則非率性之謂矣故君子戒謹乎其所不覩恐懼乎其所不聞盖知道之不可須臾離則隠㣲顯著未甞有異所以必謹其獨而不敢以須臾離也然豈怠於顯而偏於獨哉盖獨者致用之源而人所易忽於此而必謹焉則亦無所不謹矣喜怒哀樂未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉何也曰天命之性渾然而已以其體而言之則曰中以其用而言之則曰和中者天地之所以立也故曰大本和者化育之所以行也故曰達道此天命之全也人之所受盖亦莫非此理之全喜怒哀樂未發是則所謂中也發而莫不中節是則所謂和也然人為物誘而不能自定則大本有所不立發而或不中節則達道有所不行大本不立達道不行則雖天理流行未甞間斷而其在我者或㡬乎息矣惟君子知道之不可須臾離者其體用在是則必有以致之以極其至焉葢敬以直内而喜怒哀樂無所偏倚所以致夫中也義以方外而喜怒哀樂各得其正所以致夫和也敬義夾持涵養省察無所不用其戒謹恐懼是以當其未發而品節已具隨所發用而本體卓然以至寂然感通無少間斷則中和在我天人無間而天地之所以位萬物之所以育其不外是矣已發未發説中庸未發已發之義前此認得此心流行之體又因程子凡言心者皆指已發之云遂目心為己發而以性為未發之中自以為安矣比觀程子文集遺書見其所論多不符合因再思之乃知前日之説雖於心性之實未始有差而未發已發命名未當且於日用之際欠却本領一叚工夫葢所失者不但文義之間而已因條其語而附以己見告于朋友願相與講焉恐或未然當有以正之文集云中即道也又曰道無不中故以中形道又云中即性也此語極未安中也者所以狀性之體段如天圓地方又云中之為義自過不及而立名若只以中為性則中與性不合又云性道不可合一而言中止可言體而不可與性同徳又云中性之徳此為近之又云不若謂之性中又云喜怒哀樂之未發謂之中赤子之心發而未逺乎中若便謂之中是不識大本也又云赤子之心可以謂之和不可謂之中遺書云只喜怒哀樂未發便是中又云既思便是已發喜怒哀樂一般又云當中之時耳無聞目無見然見聞之理在始得又云未發之前謂之靜則可靜中須有物始得這裏最是難處能敬則自知此矣又云敬而無失便是喜怒哀樂未發謂之中也敬不可謂之中但敬而無失即所以中也又云中者天下之大本天地間亭亭當當直上直下之理出則不是惟敬而無失最盡又云存養於未發之前則可求中於未發之前則不可又云未發更怎生求只平日涵養便是涵養乆則喜怒哀樂發而中節又云善觀者却於已發之際觀之右據此諸説皆以思慮未萌事物未至之時為喜怒哀樂之未發當此之時即是心體流行寂然不動之處而天命之性體叚具焉以其無過不及不偏不倚故謂之中然已是就心體流行處見故直謂之性則不可吕博士論此大槩得之特以中即是性赤子之心即是未發則大失之故程子正之解中亦有求中之意葢答書時未暇辨耳葢赤子之心動靜無常非寂然不動之謂故不可謂之中然無營欲知巧之思故為未遠乎中耳未發之中本體自然不須窮索但當此之時敬以持之使此氣象常存而不失則自此而發者其必中節矣此日用之際本領工夫其曰却於已發之處觀之者所以察其端倪之動而致擴充之功也一不中則非性之本然而心之道或幾乎息矣故程子於此每以敬而無失為言又云入道莫如敬未有能致知而不在敬者又曰涵養須是敬進學則在致知以事言之則有動有靜以心言之則周流貫徹其工夫初無間斷也但以靜為本爾周子所謂主靜者亦是此意但言靜則偏故程子又説敬向來講論思索直以心為已發而所論致知格物亦以察識端倪為初下手處以故缺却平日涵養一叚功夫其日用意趣常偏於動無復深潜純一之味而其發之言語事為之間亦常躁迫浮露無古聖賢氣象由所見之偏而然爾程子所謂凡言心者皆指已發而言此却指心體流行而言非謂事物思慮之交也然與中庸本文不合故以為未當而復正之固不可執其已改之言而盡疑論説之誤又不可遂以為當而不究其所指之殊也周子曰無極而太極程子又曰人生而靜以上不容説纔説時便已不是性矣葢聖賢論性無不因心而發若欲専言之則是所謂無極而不容言者亦無體叚之可名矣未審諸君子以為如何程子養觀説程子曰存養於未發之前則可又曰善觀者却於已發之際觀之何也曰此持敬之功貫通乎動靜之際者也就程子此章論之方其未發必有事焉是乃所謂靜中之知覺復之所以見天地之心也及其已發隨事觀省是乃所謂動中求靜艮之所以止其所也然則靜中之動非敬其孰能形之動中之靜非敬其孰能察之故又曰學者莫若先理㑹敬則自知此矣然則學者豈可舍是而他求哉論語或問説一或曰程子以孝弟為行仁之本而又曰論性則以仁為孝弟之本何也曰仁之為性愛之理也其見於用則事親從兄仁民愛物皆其為之之事也此論性而以仁為孝弟之本者然也但親者我之所自出兄者同出而先我故事親而孝從兄而弟乃愛之先見而尤切者若君子以此為務而力行之至於行成而徳立則自親親而仁民仁民而愛物其愛有差等其施有漸次而為仁之道生生而不窮矣此學孝弟所以為仁之本也論語或問説二或曰子於有子孝弟之章既以仁為愛之理矣於巧言令色鮮仁之章又以為心之徳何哉曰仁之道大不可以一言而盡也程子論四徳而曰四徳之元猶五常之仁偏言則一事専言則包四者推此而言則可見矣葢仁也者五常之首也而包四者惻隠仁之體也而貫四端故仁之為義偏言之則曰愛之理前章所言之類是也専言之則曰心之徳後章所言之類是也其實愛之理所以為心之徳是以聖門之學必以求仁為要而語其所以行之者則必以孝弟為先論其所以賊之者則必以巧言令色為甚記語者所以列此二章於首章之次而其序又如此欲學者知仁之為急而識其所當務與其所可戒也巧言令色説容貌詞氣之間正學者持養用力之地然有意於巧令以悦人之觀聴則心馳於外而鮮仁矣若是就此持養發禁躁妄動必温恭只要體當自家直内方外之實事乃是為已之切求仁之要復何病乎故夫子告顔淵以克己復禮之目不過視聴言動之間而曾子將死之善言亦不外乎容貌顔色辭氣三者而已夫子所謂遜以出之辭欲巧者亦其一事也仲山甫之徳柔嘉維則令儀令色則大賢成徳之行而進乎此者夫子之逞顔色怡怡如也乃聖人動容周旋中禮之事又非仲山甫之所及矣至於小人訐以為直色厲内荏則雖與巧言令色者不同然考其矯情餙偽之心實巧言令色之尤者故聖人惡之上蔡引此數條而不肻明言其所以然者將使學者深求而自得之也然令學者反求之於㝠漠不可知之中失之愈逺言仁録中所解亦少曲折故詳論之使學者無滛思力索之苦而有以審夫用力之幾焉觀過説觀過之説詳味經意而以伊川之説推之似非専指一人而言乃是通論人之所以有過皆是隨其所偏或厚或薄或不忍或忍一有所過無非人欲之私若能於此看得兩下偏處便見勿忘勿助長之間天理流行鳶飛魚躍元無間斷故曰觀過斯知仁矣葢言因人之過而觀所偏則亦可以知仁非以為必如此而後可以知仁也若謂觀已過竊甞試之尤覺未穏葢必俟有過而後觀則過惡已形觀之無及乆自悔咎乃是反為心害而非所以養心若曰不俟有過而預觀平日所偏則此心廓然本無一事却不直下栽培涵養乃豫求偏處而注心觀之聖人平日教人養心求仁之術似亦不如此之支離也忠恕説子曰參乎吾道一以貫之曽子曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而已矣曾子之學主於誠身其於聖人之日用觀省而服習之葢已熟矣惟未能即此以見夫道之全體則不免疑其有二也然用力之乆亦將自得矣故夫子以一貫之理告之葢當其可也曾子於是黙契其㫖然後知向之所從事者莫非道之全體雖變化萬殊而所以貫之者未甞不一也此其自得之深宜不可以容聲矣然門人有問而以忠恕告之者葢以夫子之道不離乎日用之間自其盡已而言則謂之忠自其及物而言則謂之恕本末上下皆所以為一貫惟下學而上達焉則知其未甞有二也夫子所以告曾子曾子所以告門人豈有異㫖哉君子所貴乎道者三説本末精粗無非道也而君子所貴貴其本而已矣葢動容貌而能逺暴慢也正顔色而能近信也出辭氣而能逺鄙倍也三者道之得於身者也所謂本也若夫儀章器數之末道雖不外乎是然其分則有司之守而非君子之所有事矣曾子之言其亦如此而已至論三者之所以然則必有内外交相養之功焉積之之乆而後能至於此也二先生發明此意最為詳備朱公掞問學劉元城手編内各有一叚至於諸儒往往只以臨時强勉修飾為功此固失之惟上蔡専以動正出三字為用力處以能此則暴慢鄙倍不期逺而自逺此庶幾得其本矣然亦只是臨時著力不見平日涵養工夫又只以由中而出為正不是恭敬持守之則以二先生之説格之則亦未免為一偏之論也盡心説盡其心者知其性也知其性則知天矣言人能盡其心則是知其性能知其性則知天也葢天者理之自然而人之所由以生者也性者理之全體而人之所得以生者也心則人之所以主於身而具是理者也天大無外而性禀其全故人之本心其體廓然亦無限量惟其梏於形器之私滯於聞見之小是以有所蔽而不盡人能即事即物窮究其理至於一日會貫通徹而無所遺焉則有以全其本心廓然之體而吾之所以為性與天之所以為天者皆不外乎此而一以貫之矣太極説動靜無端隂陽無始天道也始於陽成於隂本於靜流於動者人道也然陽復本於隂靜復根於動其動靜亦無端其隂陽亦無始則人葢未始離乎天而天亦未始離乎人也元亨誠之通動也利貞誠之復靜也元者動之端也本乎靜貞者靜之質也著乎動一動一靜循環無窮而貞也者萬物之所以成終而成始者也故人雖不能不動而立人極者必主乎靜惟主乎靜則其著乎動也無不中節而不失其本然之靜矣靜者性之所以立也動者命之所以行也然其實則靜亦動之息爾故一動一靜皆命之行而行乎動靜者乃性之真也故曰天命之謂性情之未發者性也是乃所謂中也天下之大本也性之已發者情也其皆中節則所謂和也天下之達道也皆天理之自然也妙性情之徳者心也所以致中和立大本而行達道者也天理之主宰也靜而無不該者性之所以為中也寂然不動者也動而無不中者情之發而得其正也感而遂通者也靜而常覺動而常止者心之妙也寂而感感而寂者也明道論性説生之謂性止生之謂也天之付與萬物者謂之命物之禀受於天者謂之性然天命流行必二氣五行交感凝聚然後能生物也性命形而上者也氣則形而下者也形而上者一理渾然無有不善形而下者則紛紜雜揉善惡有所分矣故人物既生則即此所禀以生之氣而天命之性存焉此程子所以發明告子生之謂性之説而以性即氣氣即性者言之也人生氣禀止不可不謂之性也所禀之氣所以必有善惡之殊者亦性之理也葢氣之流行性為之主以其氣之或純或駁而善惡分焉故非性中本有二物相對也然氣之惡者其性亦無不善故惡亦不可不謂之性也先生又曰善惡皆天理謂之惡者本非惡但或過或不及便如此葢天下無性外之物本皆善而流於惡耳葢生之謂性止水流而就下也性則性而已矣何言語之可形容哉故善言性者不過即其發見之端而言之而性之韞因可黙識矣如孟子之論四端是也觀水之流而必下則水之性下可知觀性之發而必善則性之韞善亦可知也皆水也止各自出來此又以水之清濁譬之水之清者性之善也流至海而不汚者氣禀清明自㓜而善聖人性之而全其天者也流未逺而已濁者氣禀偏駁之甚自㓜而惡者也流既逺而方濁者長而見異物而遷焉失其赤子之心者也濁有多少氣之昏明純駁有淺深也不可以濁者不為水惡亦不可不謂之性也然則人雖為氣所昏流於不善而性未甞不在其中特謂之性則非其本然謂之非性則初不離是以其如此故人不可以不加澄治之功惟能學以勝氣則知此性渾然初未甞壊所謂元初水也雖濁而清者存故非將清來換濁既清則本無濁故非取濁置一隅也如此則其本善而已矣性中豈有兩物對立而並行也哉此理天命也止此舜有天下而不與者也此理天命也該始終本末而言也修道雖以人事而言然其所以修者莫非天命之本然非人私智所能為也然非聖人有不能盡故以舜明之定性説定性者存養之功至而得性之本然也性定則動靜如一而内外無間矣天地之所以為天地聖人之所以為聖人不以其定乎君子之學亦以求定而已矣故擴然而大公者仁之所以為體也物來而順應者義之所以為用也仁立義行則性定而天下之動一矣所謂貞也夫豈急於外誘之除而反為是憧憧哉然常人之所以不定者非其性之本然也自私以賊夫仁用知以害夫義是以情有所蔽而憧憧耳不知自反以去其所蔽顧以惡外物為心而反求照於無物之地亦見其用力愈勞而燭理愈昧益以憧憧而不自知也艮其背則不自私矣行無事則不用知矣内外兩忘非忘也一循於理不是内而非外也不是内而非外則大公而順應尚何事物之為累哉聖人之喜怒大公而順應天理之極也衆人之喜怒自私而用知人欲之盛也忘怒則公觀理則順二者所以為自反而去蔽之方也夫張子之於道固非後學所敢議然意其彊探力取之意多涵泳完養之功少故不能無疑於此程子以是發之其㫖深哉觀心説或問佛者有觀心説然乎曰夫心者人之所以主乎身者也一而不二者也為主而不為客者也命物而不命於物者也故以心觀物則物之理得今復有物以反觀乎心則是此心之外復有一心而能管乎此心也然則所謂心者為一耶為二耶為主耶為客耶為命物者耶為命於物者耶此亦不待較而審其言之謬矣或者曰若子之言則聖賢所謂精一所謂操存所謂盡心知性存心養性所謂見其參於前而倚於衡者皆何謂哉應之曰此言之相似而不同正苖莠朱紫之間而學者之所當辨者也夫謂人心之危者人欲之萌也道心之㣲者天理之奥也心則一也以正不正而異其名耳惟精惟一則居其正而審其差者也絀其異而反其同者也能如是則信執其中而無過不及之偏矣非以道為一心人為一心而又有一心以精一之也夫謂操而存者非以彼操此而存之也舍而亡者非以彼舍此而亡之也心而自操則亡者存舍而不操則存者亡耳然其操之也亦曰不使旦晝之所為得以梏亡其仁義之良心云爾非塊然兀坐以守其烱然不用之知覺而謂之操存也若盡心云者則格物窮理廓然貫通而有以極夫心之所具之理也存心云者則敬以直内義以方外若前所謂精一操存之道也故盡其心而可以知性知天以其體之不蔽而有以究夫理之自然也存心而可以養性事天以其體之不失而有以順夫理之自然也是豈以心盡心以心存心如兩物之相持而不相舍哉若參前倚衡之云者則為忠信篤敬而發也葢曰忠信篤敬不忘乎心則無所適而不見其在是云爾亦非有以見夫心之謂也且身在此而心參於前身在輿而心倚於衡是果何理也耶大抵聖人之學本心以窮理而順理以應物如身使臂如臂使指其道夷而通其居廣而安其理實而行自然釋氏之學以心求心以心使心如口齕口如目視目其機危而迫其途險而塞其理虚而其勢逆葢其言雖有若相似者而其實之不同葢如此也然非夫審思明辨之君子其亦孰能無惑於斯耶仁説浙本誤以南軒先生仁説為先生仁説而以先生仁説為序仁説又註此篇疑是仁説序姑附此十字今悉刪正之天地以生物為心者也而人物之生又各得夫天地之心以為心者也故語心之徳雖其總攝貫通無所不備然一言以蔽之則曰仁而已矣請試詳之葢天地之心其徳有四曰元亨利貞而元無不綂其運行焉則為春夏秋冬之序而春生之氣無所不通故人之為心其徳亦有四曰仁義禮智而仁無不包其發用焉則為愛恭宜别之情而惻隠之心無所不貫故論天地之心者則曰乾元坤元則四徳之體用不待悉數而足論人心之妙者則曰仁人心也則四徳之體用亦不待遍舉而該葢仁之為道乃天地生物之心即物而在情之未發而此體已具情之既發而其用不窮誠能體而存之則衆善之源百行之本莫不在是此孔門之教所以必使學者汲汲於求仁也其言有曰克已復禮為仁言能克去已私復乎天理則此心之體無不在而此心之用無不行也又曰居處恭執事敬與人忠則亦所以存此心也又曰事親孝事兄弟及物恕則亦所以行此心也又曰求仁得仁則以讓國而逃諫伐而餓為能不失乎此心也又曰殺身成仁則以欲甚於生惡甚於死為能不害乎此心也此心何心也在天地則坱然生物之心在人則温然愛人利物之心包四徳而貫四端者也或曰若子之言則程子所謂愛情仁性不可以愛為仁者非與曰不然程子之所訶以愛之發而名仁者也吾之所論以愛之理而名仁者也葢所謂情性者雖其分域之不同然其脉絡之通各有攸屬者則曷甞判然離絶而不相管哉吾方病夫學者誦程子之言而不求其意遂至於判然離愛而言仁故特論此以發明其遺意而子顧以為異乎程子之説不亦誤哉或曰程氏之徒言仁多矣葢有謂愛非仁而以萬物與我為一為仁之體者矣亦有謂愛非仁而以心有知覺釋仁之名者矣今子之言若是然則彼皆非與曰彼謂物我為一者可以見仁之無不愛矣而非仁之所以為體之真也彼謂心有知覺者可以見仁之包乎智矣而非仁之所以得名之實也觀孔子答子貢博施濟衆之問與程子所謂覺不可以訓仁者則可見矣子尚安得復以此而論仁哉抑泛言同體者使人含糊昏緩而無警切之功其弊或至於認物為已者有之矣専言知覺者使人張皇迫躁而無沉潜之味其弊或至於認欲為理者有之矣一忘一助二者葢胥失之而知覺之云者於聖門所示樂山能守之氣象尤不相似子尚安得復以此而論仁哉因并記其語作仁説王氏續經説道之在天下未甞亡而其明晦通塞之不同則如晝夜寒暑之相反故二帝三王之治詩書六藝之文後世莫能及之葢非功效語言之不類乃其本心事實之不侔也雖然維天之命於穆不已彼所謂道者則固未甞亡矣而大學之教所謂明徳新民止於至善者又已具有明法若可階而升焉後之讀其書考其事者誠能深思熟講以探其本謹守力行以踐其實至於一旦豁然而晦者明塞者通則古人之不可及者固已倐然而在我矣夫豈患其終不及哉茍為不然而但為模倣假竊之計則不惟精粗懸絶終無可似之理政使似之然於其道亦何足以有所發明此有志為已之士所以不屑而有所不暇為也王仲淹生乎百世之下讀古聖賢之書而粗識其用則於道之未甞亡者葢有意焉而於明徳新民之學亦不可謂無其志矣然未甞深探其本而盡力於其實以求必得夫至善者而止之顧乃挾其窺覘想像之彷彿而謂聖之所以聖賢之所以賢與其所以修身所以治人而及夫天下國家者舉皆不越乎此是以一見隋文而陳十二策則既不自量其力之不足以為伊周又不知其君之不可以為湯武且不待其招而往不待其問而告則又輕其道以求售焉及其不遇而歸其年葢亦未為晚也若能於此反之於身以益求其所未至使明徳之方新民之具皆足以得其至善而止之則異時得君行道安知其卒不逮於古人政使不幸終無所遇至於甚不得已而筆之於書亦必有以發經言之餘藴而開後學於無窮顧乃不知出此而不勝其好名欲速之心汲汲乎日以著書立言為已任則其用心為已外矣及其無以自託乃復捃拾兩漢以來文字言語之陋功名事業之卑而求其天資之偶合與其竊取而近似者依倣六經次第采輯因以牽挽其人强而躋之二帝三王之列今其遺編雖不可見然考之中説而得其規模之大畧則彼之賛易是豈足以知先天後天之相為體用而高文武宣之制是豈有精一執中之傳曹劉顔謝之詩是豈有物則秉彜之訓叔孫通公孫𢎞曹褒荀朂之禮樂又孰與伯夷后䕫周公之懿至於宋魏以來一南一北校功度徳葢未有以相君臣也則其天命人心之向背綂緒繼承之偏正亦何足論而欲攘臂其間奪彼予此以自列於孔子之春秋哉葢既不自知其學之不足以為周孔又不知兩漢之不足以為三王而徒欲以是區區者比而效之於形似影響之間傲然自謂足以承千聖而紹百王矣而不知其初不足以供兒童之一戲又適以是而自納於吳楚僣王之誅使夫後世知道之君子雖或有取於其言而終不能無恨於此是亦可悲也已至於假卜筮象論語而强引唐初文武名臣以為弟子是乃福郊福畤之所為而非仲淹之雅意然推原本始乃其平日好高自大之心有以啓之則亦不得為無罪矣或曰然則仲淹之學固不得為孟子之倫矣其視荀揚韓氏亦有可得而優劣者耶曰荀卿之學雜於申商子雲之學本於黄老而其著書之意葢亦姑托空文以自見耳非如仲淹之學頗近於正而粗有可用之實也至於退之原道諸篇則於道之大原若有非荀揚仲淹之所及者然考其平生意嚮之所在終不免於文士浮華放浪之習時俗富貴利達之求而其覧觀古今之變將以措諸事業者恐亦未若仲淹之致懇惻而有條理也是以予於仲淹獨深惜之而有所不暇於三子是亦春秋責賢者備之遺意也可勝歎哉養生主説莊子曰為善無近名為惡無近刑縁督以為經督舊以為中葢人身有督脉循􅆃之中貫徹上下見醫書故衣背當中之縫亦謂之督見深衣注皆中意也老莊之學不論義理之當否而但欲依阿於其間以為全身避患之計正程子所謂閃姦打訛者故其意以為為善而近名者為善之過也為惡而近刑者亦為惡之過也惟能不大為善不大為惡而但循中以為常則可以全身而盡年矣然其為善無近名者語或似是而實不然盖聖賢之道但教人以力於為善之實初不教人以求名亦不教人以逃名也盖為學而求名者自非為已之學盖不足道若畏名之累已而不敢盡其為學之力則其為心亦已不公而稍入於惡矣至謂為惡無近刑則尤悖理夫君子之惡惡如惡惡臭非有所畏而不為也今乃擇其不至於犯刑者而竊為之至於刑禍之所在巧其途以避之而不敢犯此其計私而害理又有甚焉乃欲以其依違茍且之兩間為中之所在而循之其無忌憚亦益甚矣客甞有語子者曰昔人以誠為入道之要恐非易行不若以中易誠則人皆可行而無難也予應之曰誠而中者君子之中庸也不誠而中則小人之無忌憚耳今世俗茍偷恣睢之倫葢多類此不可不深察也或曰然則莊子之意得無與子莫之執中者類耶曰不然子莫執中但無權耳葢猶擇於義理而誤執此一定之中也莊子之意則不論義理専計利害又非子莫之比矣葢迹其本心實無以異乎世俗鄊原之所見而其揣摩精巧校計深切則又非世俗郷原之所及是乃賊徳之尤者所以清談盛而晉俗衰葢其勢有所必至而王通猶以為非老莊之罪則吾不能識其何説也既作皇極辨因感此意有相似者謾筆之於其後云觀列子偶書向所謂未發者即列子所謂生之所生者死矣而生生者未甞終形之所形者實矣而形形者未甞有爾豈子思中庸之㫖哉丙申臘日因讀列子書此又觀其言精神入其門骨骸反其根我尚何存者即佛書四大各離今者妄身當在何處之所由出也他若此類甚衆聊記其一二於此可見剽掠之端云參同契説按魏書首言乾坤坎離四卦槖籥之外其次即言屯蒙六十卦以見一日用功之早晚又次即言納甲六卦以見一月用功之進退又次即言十二辟卦以分納甲六卦而兩之葢内以詳理月節而外以兼綂歲功其所取於易以為説者如是而已初未甞及夫三百八十四爻也今世所傳火候之法乃以三百八十四爻為一周天之數以一爻直一日而爻多日少則不免去其四卦二十四爻以俟二十四氣之至而漸加焉已非出於自然脗合之度矣且當日所用之爻或隂或陽初無次第不知工夫有何分别又况一日之間已周三百六十之數而其一氣所加僅得一爻多少重輕不相權凖及此二十四者進增㣲漸退減暴疾無復往來循環之勢恐亦後人以意為之未必魏君之本指也竊意此書大要在於坎離二字若於此處得其綱領則功夫之節度魏君所不言者自可以意為之但使不失其早晚之期進退之節便可用功不必一一拘舊説也故今推得策數一法似亦齊整其與爻數之法雖皆魏君所不言然此為粗有理也葢月以十二卦分之卦得二日有半各以本卦之爻行本爻之䇿自八月觀卦以後至正月㤗卦陽用少二十八䇿隂用老二十四䇿自四月大壯以後至七月否卦陽用老二十六策隂用少三十二䇿陽即注意運行隂即放神㝠寂一爻已足即一開目舒氣以休息之十二卦周即為一月之功十二月周即為一歲之運反復循環無有餘欠其數如左方震一至五復一至三半一陽二十八五隂百二十陽生臨三半至五二陽五十六四隂九十六兌六至十泰六至八半三陽八十四三隂七十二壯八半至十四陽百四十四二隂六十八乾十一至十五夬十一至十三半五陽百八十一隂三十二乾十一半至十五六陽二百一十六陽極無隂㢲十六至二十過十六至十八半一隂三十二五陽百八十隂生遯十八半至二十二隂六十八四四陽百四十艮三十一至二十五否二十一至二十三半三隂九十六三陽一百八觀二十二半至二十五四隂九十六二陽五十六坤二十六至三十剝二十六至二十八半五隂百二十一陽二十八坤二十八半至三十六隂一百四十四隂極無陽此説欲與季通講之未及寫寄而季通死矣偶閲舊藁為之泫然戊午臘月一十六日晦庵集卷六十七欽定四庫全書晦庵集卷六十八宋朱子撰
