front:
  text: 元亨利貞性也生長收藏情也以元生以亨長以利收以貞藏者心也仁義禮智性也惻隠羞惡辭讓是非情也以仁愛以義惡以禮讓以智知者心也性者心之理也情者心之用也心者性情之主也程子曰其體則謂之易其理則謂之道其用則謂之神正謂此也又曰言天之自然者謂之天道言天之付與萬物者謂之天命又曰天地以生物為心亦謂此也
