body:
  text: 答林一之揆疑問兩條至誠之説固難躐等遽論熹於四子後序中已畧言之矣不謂性命集注甚明恐未詳考之過宜且平心寛意反復玩味必當自見或與朋友講之亦必得其説也答林一之所示疑義悉已附注鄙見於其下大抵向來見賢者言語論議頗多繁雜牽連之病今者所示亦復如此此是大病須痛掃除凡有文字只就一段内看並不須引證旁通如此看得乆之自直截也養氣一章却條暢所以如此只為此章不雜其他説支蔓耳此得失之證甚明不待逺求也答林一之二解垂示足見别後進學之功悲冗亡憀未暇細考然其大指似已多得之矣但西銘中申生伯竒事張子但要以此心而事天耳天命不忒自無獻公吉父之惑也集注所疑亦甚精宻但天之生物不容有二命只是此一理耳物得之者自有偏正開塞之不同乃其氣稟使然此理甚明程張論之亦甚詳悉可更詳考當見其意告子之失乃是不合以生為性正是便認氣為性故其稟不能不同此亦當更細消詳也二十五畝為貢恐是印本多二十字此眼前事不應如此之誤至如實皆什一之説記得亦用廬舍折除公田二十畝如先儒之舊但此却只説得百畝而徹耳七十而助之法則須就公田七十畝中扣除廬舍而實計則亦可揍成什一注中必是不曽説此一節此間無本檢不得然此亦是大槩依約不見古法果如何且當取其大指之畧通可也如來喻商人以七畝為助此語亦疎葢貢助異法貢則直計其五畝之入自賦於官助法則須計公田之中八家各助七畝只得五十六畝其十四畝須依古法折除一家各得一畝若干步為廬舍方成八家各助耕公田七畝也如謂熹説商人九分取一周人十分取一恐亦非熹本文商人九分取一除廬井則為十分取一如前所云固自分明周人則鄉遂溝洫用貢法而自賦自不妨十分取一唯都鄙井田用助法則為九一然如前説去其廬井則亦不害為十之一矣周人未嘗専用九一也張子遺法不可見李泰伯平土書集中有之亦不在此然此等姑緩之亦無害正唯義理之大原與日用親切功夫不可不汲汲耳答李堯卿唐咨示及疑義已悉奉報但恐且當據見成文義反復玩味自見深趣不必如此附㑹立説無益於事也安卿書來看得道理儘宻此間諸生亦未有及之者知昏期不逺正為徳門之慶區區南官亦喜為吾道得此人也鄧守下車既乆諸事當一親鹽筴已囑鄭丞趙糾言之未知能勇為否所示鬼神之説甚精更宜玩索使凡義理皆如此見得有分别而無滯礙則理其可窮矣但所云非實有長存不滅之氣魄者亦須知未始不長存耳答李堯卿集注仁者愛之理心之徳也妄意推求其説以謂老者安之朋友信之少者懐之此固仁也而亦莫非愛也親親而仁民仁民而愛物此亦仁也而亦莫非愛也所以安之所以信之所以懐之此則理也非愛也理則根原來處確然不可易者也愛則指其見於用者言之故愛屬乎情愛乃仁之一事理屬乎性而理乃仁道之大全故愛不是仁而愛之理則仁也理者性也愛者情也性則體情則用仁之為道本性而該情而心乃性情之主乎主乎性則所以然之理莫不具於心主乎情則所當然之愛莫不發於心由是而理完於此由是而愛行於彼皆心有以主之則仁豈非心之徳歟愛之理所説近之心之徳更以程子穀種之譬思之道千乘之國章集注謂五者相承各有次序竊意有土有民無非事者敬其事則心專在是纔敬便有信底意思民便有觀感之心不敬則心不在焉事便鹵莽便無終始全無誠意何以示信於民哉既敬而信則主一之功致而無不慤實者其自奉必薄必能節以制度矣制度無非出於民者既知省節必是以民為念而知所以愛之也愛之則不敢傷之必欲厚其生然非及時以耕則其生亦無自而厚故使之必不違其時矣不審於相承之意是否此等處須看有能如此後方能如此之意又看有能如此後又不可不如此之意反復推之乃見曲折主與尸其别如何既設主祭於其所又迎尸祭於其奥本是一神以奥為尊以主為卑何也宗廟之祭設尸謂以人類求之五祀有尸其義如何不是尊奥而卑主但祭五祀皆設主於其處則隨四時更易皆迎尸於奥則四時皆然而其尊有常處耳据禮家説祭山川亦有尸其詳不可考矣論韶武者大槩不出揖讓征伐二條程子則兼大傳為説集注兼性之反之為説以中庸三知三行觀之及其成功一也既謂之成功則一而見於樂又有不同之實何也莫是生知安行終不可得而並雖曰學知利行有可企及之理恐亦只是全盡得許多道理論其天成渾然處其氣象終有間否不惟大傳之説不足信但看兩聖人事業氣象自是有等差如性之反之成功雖一然武王地位終是覺得有痕迹在樊遲問知告以敬鬼神而逺之在三代之時民間所謂鬼神士則有五祀與其先祖此樊遲之所當祭想無後世之所謂淫祠者告以敬而逺莫只以五祀為戒也然以子路請禱觀之則曰禱爾于上下神祗程子謂子路以古人之誄對則是子路但舉此誄詞謂其有此禱之理耳意不在指所禱之神以為請否鬼神固不謂淫祀然淫祀之鬼神既不當其位未能除去則亦當敬而逺之耳先生答安卿忘食忘憂是逐事上看一憤一樂循環代至今畧借一事明之學樂至於三月不知肉味此發憤忘食底意及其得之深乃曰不圗為樂之至於斯此樂以忘憂底意想其逐事上皆有此義故一憤一樂循環代至然亦不以此而終身其言不知老之将至葢謙已勉人耳觀耳順從心之年樂且不可得而言况所謂憤耶此説得之然亦太拘滯矣須看他立言意思如何不可似此泥著也明道先生云百官萬務金革百萬之衆飲水曲肱樂在其中萬變皆在人其實無一事某竊意宅百揆總元戎之任與髙卧草廬悠然自樂者其理則一本無大小之分所謂禹稷顔囘同道也萬變乃人之萬變在吾心實無一事吾之所以為心者葢無入而不自得素富貴行乎富貴素貧賤行乎貧賤而已不審是否吾之所以為心者如何而能無入而不自得此須意㑹不可只作閒話説過便休也太王有翦商之志而太伯不從太王欲傳位季歴以及昌則太伯遜位而去莫是翦商之事在我雖不從而難必於後人若不遜位而去則又兄弟争國違父之命已先失徳此所以固讓也太王既有避狄之心何故又萌翦商之志於數十年之前莫是以其理與天命推之知商之必亡周家世世修徳知不能違天命之眷付耶方其去豳也為民之故不欲驅之鋒鏑及其傳季歴以及昌亦為民之故必欲救之水火之中故避狄翦商亦時焉耳而已事雖不同其心則一均之為民無所利也太伯只是不欲為此事耳今亦未見其曲折不須如此穿鑿附㑹也成於樂是古人真箇學其六律八音習其鐘鼓管絃方底於成今人但借其意義以求和順之理如孟子樂之實樂斯二者亦可底於成否古樂既亡不可復學但講學踐履間可見其遺意耳故曰今之成材也難子罕言利程子謂計利則害義害義則勿道可矣罕言何也有自然之利如云利者義之和是也但專言之則流於貪欲之私耳夫子教人不出博文約禮二事在門人莫不知有此學惟顔子獨於博約之間有所進有所得故髙者有可攀之理堅者有可入之理在前在後者有可從而審其的之理非若其他僅可以弗畔而已此門人之所以不可企及也此説得之升堂摳衣用兩手則手中無所執矣若有贄及執圭則升堂有不必摳衣但防其不至攝齊否執圭而升則足縮縮如有循自不至攝齊矣執圭上如揖下如授既曰平衡而又有上下莫是心與手齊如步趨之間其手微有上下但髙不至過揖下不至過授否得之明衣之制未詳當闕答李堯卿禘説舉趙伯循謂魯太廟以周公為始祖以文王為配趙莫只是以意推之否春秋纂例中引證甚詳每事問之義如何葢平日講學但聞其名而未識其器物未見其事實故臨事不得不問耳答李堯卿比干之忠方始謂之仁然亦只是一事之仁祭有大小有天地之祭山川之祭社稷之祭又有所謂五祀之祭及先祖之祭不知隨其大小各有其神耶抑天地間只一理感通耶竊嘗思其説天地之間自其成形而觀之或小或大不能無别故王者既為天下之主則天地之大王者當之故王者祭天地而推之諸侯為一國之主則境内之名山大川諸侯祭之士為一家之法則家之法門戸中霤之屬為士者祭之若夫社稷則專為民而設凡有土有民者莫不各有所建社稷而祭之必有祖而祖在所祭自天子以致於庶人莫不有先祖之祭若論大小之制則因王公士庶而為之等差其祭秩不能無分别也若論其所以致祭之理則所謂如在其上如在其左右誠之不可揜處則上而王者之於天地下而士庶之於五祀祖先其感通只一理耳上蔡謂祖考精神便是自家精神即此而推天地精神便是王者精神其鬼神之徳感通之理不容有所分别也妄意推求不審是否大槩如此然更有分别曲折處宜詳味之三代革命何故要改正朔夏時既正必欲改之商周無乃好異而未盡相承之義春夏秋冬以成一嵗此時序之正必欲改之無益於事祇見亂天時耳其改之之義謂何改正朔所以新民之耳目古人葢有深意而子丑之月亦有可為嵗首之義孔子於定公時墮三都欲収其甲兵孟氏不肯墮郕圍之不克聖人舉事自是精審何故郕不肯從命及圍之又不克何也三都當墮是時又有可墮之勢故因而乘之孟氏亦非不肯墮但其守者不肯因喚醒了孟氏耳某徃年與先兄異居不知考禮經輒從世俗立家先龕子妄意按温公書儀立牌子不知用古尺只用匠者尺頗長大且實植於趺考用紫囊妣用緋囊考妣共用一木匣從上罩下至趺伏承台誨云而今不可動謹輒再有懇請家中所設之主既不可動尋常只講俗節之祭向來祭禮行於先兄之家時祭及禰祭某皆預陪祭執事之例自先兄去後舍姪承祭祀祧髙祖而祀先兄為禰某家中既有家先上闕髙祖之祭下無禰祭於心實不安欲於時祭畢移饌一分祭髙祖於某家某主之遇當祭禰之月亦欲私舉禰祭如何若舉此二祭又成支子有祭庶子祭禰於禮經不合此事只合謹守禮文未可遽以義起也况有俗節自足展哀敬之誠乎某家中自髙祖而上三墓埋沒草間髙祖墓又被曽叔祖以不利其房下欲改葬方發故壙見其中甚温燥倉皇掩塞墓面磚石狼藉自先世皆不及整三墓相去三四里之内又在田頭某往來其下甚不遑安今欲重修整春秋薄講墓祭之禮令舍姪主之不審於親盡之墓合祭否墓祭無明文雖親盡而祭恐亦無害自髙祖至禰忌日之衣服飲食當如何衆子孫當何如伯叔父母兄弟孫姪嫡子衆子及再從三從已往忌日又當如何横渠忌日衣服有數等今恐難遽行且主祭者易以黲素之服可也答李堯卿前書所喻大學改字處已報方簿矣鄭氏字不必去亦無害也盡字固可兼得切意恐切字却是盡於内之意若只作盡字須兼看得此意乃佳耳康誥小序以為成王封康叔之書今考其詞謂康叔為弟而自稱寡兄又多述文王之徳而無一字及武王者計乃是武王時書而序者失之向來於或問中曽有此一叚後覺其非急遂刪去之今亦不必添也但存此一句讀者須自疑著别去推尋也答李堯卿或問所釋皆因經文獨致知舉程子五條於格物之前何也莫是格物致知亦難截然分先後故或問於此章一衮説去否格物致知只是一事難分先後窮理舉延平先生説推其意亦不出於程子謂其規模之大條理之宻有所不逮者莫是延平窮一事必待其融釋脱落然後别窮一事若偶於此一事尚未能遽爾融釋是終為此一事所拘不若程子云且别窮一事或先其易或先其難此便是所不逮處否程子之言誠善然窮一事未透又便别窮一事亦不得彼謂有甚不通者不得已而如此耳不可便執此説容易改換却致功夫不專一也窮理之學於六十四卦大象便是貫通處否貫通須是無所不通如此説却拘束了經文先從明明徳於天下節次説來説至下工夫之處始謂致知在格物又從物格知至節次説去説至成功之終處謂天下平所以如此反覆推説者欲人知夫進功之序則不可不勉又知夫成功之終則不可不至於傳之十章則專以進功為言葢進功之序在學者當深知其然則成功之驗自可終耳此傳文釋經之意也此説得之樂意相闗禽對語生香不斷樹交花此語形容得浩然之氣莫是那相闗不斷底意可以見浩然者本自聯屬又交花對語便是無不慊與不餒底意否只是大意如此難似此逐字分析也仁則通上下言聖則造其極孟子於三子清和任各以聖言之此語涉於通上下否三子清和任正是造其極處天地之塞吾其體云云塞者日月之往來寒暑之迭更與夫星辰之運行山川之融結又五行質之所具氣之所行無非塞乎天地者塞字意得之答陳安卿淳仁字近看未審認得意是否請質諸明訓之下夫仁者天地生物之心而人生所得以為心者其體則通天地而貫萬物其理則包四端而統萬善葢專一心之全徳而為性情之主即所謂乾坤之元者也故於此語其名義則以其冲融涵育温粹渾厚常生生而不死因謂之仁人惟己私蔽之是以生道息而天理隔遂頑然不識痛痒而為忍人人之所以體乎仁者必此身私欲净盡廓然無以蔽其所得天地生物之體其中真誠懇惻藹然萬物之春意常存徹表徹裏徹巨徹細徹終徹始渾是天理流行無一處不匝無一處不到無一息不貫於一元之氣流行無間斷乃可以當渾然之全體而無愧若一處稍有病痛一微細事照管不到一頃刻稍有間斷則此意便私私意行而生道息理便不流通便是頑麻絶愛處烏得渾全是仁如人之一身渾是血氣周流便是純無病人纔一指血脈不到便是頑麻不仁處顔子三月不違仁三月之後則㣲有少違然當下便覺融化依然復不見其違焉竊意三月之内渾是中心安仁底氣象三月之後便是勉而中否中後又不須勉但乆則又不免於有違耳志學是於斯道方識得大綱大體其心一直向乎此以求之視聽寢食講論思索無時不念念在此更不參差挿雜轉慮却顧遲回於天理人欲之間而不决此即格物致知用功處也立是於大綱大體已把得定確然有主於中持之堅守之固而不為外物所遷奪此即誠意正心修身用功處也不惑是於大綱大體中又極節目纎悉皆昭晰明徹灼然真知其藴而無一理之或疑矣此即物格處也知天命是又總其精粗大小根原所自來處全體廓然洞明而㑹萬理於一本矣此即知至處也耳順是我與理一徹表徹裏無間隔違逆聲纔入心便通不待吾有以聽於彼凡入吾聞者無非至理精義此又物格知至之熟處也從心則心體渾淪是義理如一團光潤良玉如百鍊明瑩精金至是則非由我矣凡有動皆隨心之所之行便行止便止喜便喜怒便怒惻隠便惻隠羞惡便羞惡無不從容大道上行而莫非準繩規矩之至絶不容一毫有我於其間此又意誠心正身修之熟處也不審如此分别得否立是物格知至而意誠心正之効不止是用功處不惑知命是意誠心正而所知日進不已之驗以至耳順則所知又至極而精熟矣餘則來説得之孔文子何以謂之文據其妻太叔事亦大節目處悖理傷義如此其他更不足道矣孔子却不沒其善而許以好學下問何也恐此句直就問諡處説當時人作此諡其本意所取者在此故特因其説而言之亦姑語其大槩而已非美其有是善而許之否此章固因論諡而發然人有一善之可稱聖人亦必取之此天地之量也陳文子棄馬十乗章集注云去之他國不能審度輕重而卒反於齊焉輕重字何所指而言之恐重只是去他國不能請方伯連帥以討崔子之罪而輕又不能終守其自潔之節乃戀戀復反其故居云陳文子以崔子弑君而去齊可也他邦未有是事乃以為猶崔子而去之所謂不審輕重者此也再斯可矣只是就季文子身上行事處説在學者窮索理義則思之思之而又思之愈深而愈精豈可以數限而君子物格知至者萬事透徹事物之來皆有定則則從容以應之亦豈待臨時方致其思不審此語只是文子事抑衆人通法皆當以再為可耶不容有越思耶而程子又何故只就為惡一邊説也物格知至者應物雖從容然臨事豈可不思况未至此又豈可不熟思耶故以再思為衆人之通法葢至此則思已熟而事可决過則惑矣與朋友共敝之而無憾有人實無憾朋友之心但於日間合用之物貧無財置之也艱故或敝則闕其用亦不能恝然忘情於是物而不為之嘆惜不審此於無憾意有妨否雖無憾於朋友而眷眷不能忘情於己敝之物亦非賢達之心也可也簡可者僅可而有所未盡之辭上句可使南面亦有可字此可字乃實許之與下可字意不同不審以何别之可字单稱與下文有所指者不同不如樂之者此樂字與顔子樂意思差異否較其大槩亦不争多但此樂之者之字是指物而言是有得乎此道從而樂之也猶樂斯二者之樂樂循理之樂如顔子之樂又較深是安其所得後與萬物為一泰然無所窒礙非有物可玩而樂之也發憤忘食是始者著力去求之時樂以忘憂是後來有得而安之時二者先後自不同而氣象亦自不相並按集注意是二者齊著力到老如何是二者之辯處恐在學者於此有先後之截而聖人生知安行徹始徹終渾是如此将那箇截做先将那箇截做後但以其序而言則且如是分别否抑嘗玩味此章三句固是謙己勉人如此然亦可見聖人之心别無他從生至死全渾淪在義理中相與周流不少離而身世事物之念皆灑然不凝於胸次也不審是否忘食忘憂是逐事上説一憤一樂循環代至非謂終身只此一憤一樂也逐事上説故可遂言不知老之将至而為聖人之謙辭若作終身説則憤短樂長不可并連下句而亦不見聖人自貶之意矣來喻未然而集注亦未盡也子食於有喪者之側未嘗飽也子於是日哭則不歌葢胸中和樂然後於食能甘美而飫飽臨乎哀戚之地此心為之感動而吾之哀戚亦興然於食葢不下咽矣豈能甘美而飫飽也哭者哀之至弔死而至於哭必其情之厚者非尋常行弔比也其思感傷悴中情之所形必不能頓然遽釋於一哭之退而便歌樂此二者皆天理自然而然貞情自有所不忍處而非人所強為者聖人但由天理行順之而不逆耳是謂情性之正本中而達和而仁之所以流行者也然質之日用間則此事更有曲折如臨乎有喪者之側主人固留飲或辭之不得或與長者同行長者留則少者有不得而辭者辭以實則形主人之非禮辭以疾則偽難揜力辭而峻拒則又恐咈情而近於硜硜之信果不知如何為當其有情輕不至於哭但以尋常行弔者恐亦不能終食之間不化或感物而笑樂或燕㑹於他所與夫送人之葬而與飲胙燕賓等類不審有妨無妨如何若謝氏此章之説其末意恐施於情厚而當哭者則未穏否聖人情性之正當於哀未遽忘處看謝氏乃以忘處為正豈習忘養生之餘習耶聞韶忘味之説亦然恐皆過矣所喻行弔而遇酒食此須力辭必不得已而留亦須數辭先起不可醉飽程子曰行藏安於所遇命不足道也又謂命為中人設上智更不言命然孔子曰天生徳於予桓魋其如予何又曰天之未喪斯文也匡人其如予何又曰公伯寮其如命何皆斷以命而安之之辭何也命遇之説望為剖示三語皆必其不能為害之辭與不得已而聽命以自安者不同也伯夷何以只知有父命而不知有天倫叔齊何以只知有天倫而不知有父命恐是在伯夷則其兄弟係於已而父命係於公以二者權之則父命為尊而兄弟為卑在叔齊則其父子繫於已而天倫係於公以二者權之則天倫為重而父子為輕否以天下之公義裁之則天倫重而父命輕以人子之分言之則又不可分輕重但各認取自家不利便處退一步便是伯夷叔齊得之矣胡氏春秋後有謹始例説得好子路請禱集注舉士喪禮疾病行禱五祀程子曰禱者悔過遷善以祈神之祐也范氏亦曰子之於父臣之於君有疾而禱禮之常也然世俗纔疾病則靡神不禱靡祀不修此乃燭理不明而惑於淫怪不知死生有命在天彼沈魂滯魄安能夀之而安能夭之是特鄉閭庸夫庸婦鄙陋之見耳今子路如此舉而諸家如此説則亦有此理而或可為之耶疾病行禱者臣子之於君父各禱於其所當祭士則五祀是也子路所欲禱必非淫祀但不當請耳故孔子不以為非而但言不必禱之意聖人憂世覺民之心終其身至死而不忘耶抑當憂世覺民非其時此意亦嘗在懐但不戚戚發露也若終其身常不忘則不見聖人胸中休休焉和樂處若時或恬然不戚戚發露則又不見聖人於斯人其心相闗甚切處若憂世之心與和樂之心並行而不悖則二者氣象又為何如聖人之心樂天知命者其常也憂世之心則有感而後見耳君子於其所當怒者正其盛怒之時忽有當喜事來則如何應將應怒了而後應喜耶抑中間且輟怒而應喜喜了又結斷所怒之事耶抑當權其輕重也喜怒迭至固有輕重然皆自然而應不暇權也但有所養則其所應之分數緩急不失輕重之宜耳先生嘗説善人不足任道狷者剛介有守有骨肋做得事如曽子孟子皆過於剛如文帝是善人只循循自守武帝有狷底氣象足以大有為又嘗説孟子比原憲則憲狷介謹守有餘然不足以任道孟子便擔當做得事其説狷字意不同何也狂者志髙可以有為狷者志潔有所不為而可以有守漢武帝不是狷恐聽之不審也武帝近狂然又不純一不足言也為善則福報為惡則禍報其應一一不差者是其理必如此抑氣類相感自如此耶善惡各以氣類相感而其應便是理合如此淳向者道院中常問未發之前是静而静中有動意否先生答謂不是静中有動意是有動之理淳彼時不及細審後來思之心本是箇活物未發之前雖是静亦常惺在這裏惺便道理在便是大本處故謂之有動之理然既是常惺不恁地暝然不省則謂之有動意亦豈不可耶而先生却嫌意字何也恐意字便是已發否抑此字無害而淳聽之誤也凡看精微處恐易差更望示教未動而能動者理也未動而欲動者意也人心是箇靈底物如日間未應接之前固是寂然未發於未發中固常恁地惺不恁瞑然不省若夜間有夢之時亦是此心之已動猶晝之有思如其不夢未覺正當大寐之時此時謂之寂然未發則全沈沈瞑瞑萬事不知不省與木石葢無異與死相去亦無㡬不可謂寂然未發不知此時心體何所安存所謂靈底何所寄寓聖人與常人於此時所以異者如何而學者工夫此時又何以為驗也寤寐者心之動静也有思無思者又動中之動静也有夢無夢者又静中之動静也但寤陽而寐隂寤清而寐濁寤有主而寐無主故寂然感通之妙必於寤而言之昏禮用命服程子常論之矣然以得為悦言之恐涉於以利言也若其意在於為悦則終是令人有怍容不審於禮果合如何淳正月欲行親迎欲只用冠帶如何昏禮用命服乃是古禮如士乘墨車而執鴈皆大夫之禮也冠帶只是燕服非所以重正昏禮不若從古之為正答陳安卿大學舉吾十有五章來教云立是物格知至而意誠心正之效不止是用功處不惑知命是意誠心正而所知日進不己之驗以至於耳順則所知又至極而精熟矣淳竊疑夫立者確然堅固不可移奪固非真知不能然此時便謂物已格知已至恐莫失之大快否又事物之理精㣲眇忽未至於灼然皆無疑惑萬理根原來處未洞見天命流行全體安得謂之知已至曰所知日進不已則是面前猶有可進步又安得全謂之至而耳順又云所知至極而精熟又何言之重複也而集注於耳順條方云知之至又何也凡此皆淺見未喻抑此之㫖在聖人分上言則聖人合下本是生知義理本是昭著自兒童知已至極本無疑惑天命全體本無蔽隔當入大學則亦漫勘驗其所以然隨衆做些小致知格物工夫雖做此工夫而與衆超越云云若以學者為學之序言則自其志學時方一一做致知格物工夫以考察夫義理積十五年之功至於確然有立時是亦真有所知然後能然未可便謂物已格知已至細思此意只得做學者事看而聖人所説則是他自見得有畧相似處今窺測他不得也正如曽子借忠恕兩字發明一貫之妙今豈可謂聖人必待施諸已而不願然後勿施於人也然曽子所借猶有跡之可擬此則全不可知但學者當以此自考耳來教孔文子章云此章固因論諡而發然人有一善之可稱聖人亦必取之此天地之量也淳謂自聖人平心泛論人物言之則凡有一善之可稱雖元惡大憝亦必取之如天地之量無所不容自學者精考人物言之則聖人所取之善當實體以為法而其不善則亦當知所以自勵大槩是如此然不必説得太過却覺張皇無涵蓄意思再思可矣再字未詳如何方是一畨思如何方是再畨思事到面前便斷置了是一畨思斷置定了更加審訂是第二畨思桓魋其如予何匡人其如予何公伯寮其如命何來教云三語皆必其不能為害之辭與不得已而聴命以自安者不同淳竊謂三語皆是必其不能為害之辭此便是聖人樂天知命處見定志確斷然以理自信絶無疑忌顧慮之意雖曰命而實在主於理渾不見有天人之辨彼不得已而聽命以自安者本不顧夫理義之當如何但以事勢無可奈何遂委之命以自遣而實未能自信乎命與聖人之所謂命者自不同程子所謂命為中人設即此等所謂命耳故在聖人分上則此等命不足道也是則聖人之所謂命與常人之所謂命者事同而情異焉不審是否聖人所謂命者莫非理上二語是聖人自處處驗之已然而知其决不能害己也下一語是為子服景伯等言知其有命而未知其命之如何但知公伯寮之無如此何耳來教論夷齊云以天下之公義裁之則天倫重而父命輕以人子之分言之則又不可分輕重但各認取自家不便利處退後一步便是伯夷叔齊得之矣淳詳此竊謂諸侯繼世襲封所以為先君之嗣而爵位内必有所承上必有所稟而大倫大義又不至於相悖端可以光付託而無歉然後於國為正伯夷叔齊以天倫言之則伯夷主器之嫡在法固當立然不得先君之命則内無所承烏得以嗣守宗廟而有國也以父命言之則叔齊固有命矣然伯夷長也叔齊弟也叔齊之徳不越於伯夷其父乃舍嫡立少一時溺愛之私意非制命以天下之公義者也亂倫失正王法所不與何可以聞於天子而撫國也此皆在已有礙而不利便處此在伯夷所以不敢挾天倫自處以壓父命之尊只得力辭而不受而决然不敢以或受在叔齊所以不敢恃父一時之命以壓天倫之重只得固譲而不為而决然不敢以或為此是據其分之所當然以求即乎吾心之安葢不如是則於心終不安為伯夷者是不受之先君不受之天王而受之於弟為叔齊者是成父之非命而干王法也豈得為受國之正乎此説得之但更看求仁得仁處再問子路請禱大槩是如此但推得太支蔓如云禱爾于上下神祗只是引此古語以明有禱之理非謂欲禱於皇天后土也又嘗疑集注曰聖人未嘗有過無善可遷其素行固已合於神明故曰丘之禱乆矣夫自其論聖人所以無事於禱者其義固如此然此一句乃聖人自語也聖人之意豈自謂我未嘗有過無善可遷其素行固已合於神明哉不審此問少曲折更何如聖人固有不居其聖時節又有直截擔當無所推讓時節如天生徳於予未喪斯文之類葢誠有不可揜者小學載庾黔婁父病毎夕稽顙北辰求以身代而全文此下更云數日而愈果有此應之之理否若果有應之之理則恐是父子一氣此精誠所極則彼既餒之氣因復為之充盛否抑此適遭其偶然而實非闗於禱實無轉夭為夀轉禍為福之理人子於此雖知其無應之之理而又却實行其禮則恐心足不相似禱是正禮自合有應不可謂知其無是理而姑為之來教云寤寐者心之動静也冇思無思者又動中之動静也有夢無夢者又静中之動静也但寤陽而寐隂寤清而寐濁寤有主而寐無主故寂然感通之妙必於寤而言之淳思此竊謂人生具有隂陽之氣神發於陽魄根於隂心也者則麗隂陽而乗其氣無間於動静即神之所㑹而為魄之主也晝則隂伏藏而陽用事陽主動故神運魄隨而為寤夜則陽伏藏而隂主静故魄定神蟄而為寐神之運故虚靈知覺之體灼然呈露有苖裔之可尋如一陽復後萬物之有春意焉此心之寂感所以為有主神之蟄故虚靈知覺之體沈然潛隠悄無蹤跡如純坤之月萬物之生性不可窺其朕焉此心之寂感所以不若寤之妙而於寐也為無主然其中實未嘗冺而有不可測者存呼之則應驚之則覺則是亦未嘗無主而未嘗不妙也故自其大分言之寤陽而寐隂而心之所以為動静也細而言之寤之有思者又動中之動而為陽之陽也無思者又動中之静而為陽之隂也寐之有夢者又静中之動而為隂之陽也無夢者又静中之静而為隂之隂也又錯而言之則思之有善與惡者又動中之動陽明隂濁也無思而善應與妄應者又動中之静陽明隂濁也夢之有正與邪者又静中之動陽明隂濁也無夢而易覺與難覺者又静中之静陽明隂濁也一動一静循環交錯聖人與衆人則同而所以為陽明隂濁則異聖人於動静無不一於清明純粹之主而衆人則雜焉而不能齊然則人之學力所係於此亦可以驗矣得之宰予晝寢云云予雖非顔閔之倫而在聖門亦英才髙弟皆聖人所深屬意者而予懈怠如此故云云學者自是不可懈怠非有已前許多説話也又前段云吾職分已修而吾事業已畢乎吾生已足而吾將俯仰無愧乎云云義理無窮若自謂四事都了而可以自安則雖不晝寢而已為懈怠矣此段大支蔓語氣頗似張無垢更宜收斂就親切處看此事可否兩言而决耳何用如此說作耶仁者先難而後獲先難克己也既曰仁者則安得有己私恐此仁者字非指仁人而言語脈猶曰所謂仁云者必先難後獲乃可謂之仁仁人者正其誼不謀其利明其道不計其功語意正如此仁者雖己無私然安敢自謂己無私乎來示數卷此一様病痛時時有之又集注曰先其事之所難而後其效之所得仁者之心也此處下心字是如何豈此處便己是仁者之心耶抑求仁而其心當如是也曉此一字未徹仁者之心如是故求仁者之心亦當如之又吕氏四句正是解此意四句然不憚所難為一句似亦只説得先難意而後獲意思不切如何當時本欲只用吕説後見其有此未備故别下語又惜其語非他説所及故存之於後耳述而第三十二章既以為之不厭誨人不倦自許而第二章學而不厭誨人不倦集注又謂皆我所不能有或者疑聖人之意不應如此相反欲以第二章亦為自許之詞而何有於我哉只謂其何但我有此衆人皆能如此庶前後意不相背淳為説以破之曰聖人之言各隨所在而發未嘗參差挿雜當其有稱夫子以聖且仁者故夫子辭之而不敢當因退而就夫為之不厭誨之不倦以自處此是為謙之意是辭髙而就卑也及人以學而不厭誨人不倦二事歸之夫子則又辭之以我所未嘗有此時為謙之意是辭其有能以就無能二處之言雖相襲而意之所主各自不同不居仁聖已為謙矣以學不厭誨不倦為無有又謙之謙也至於事父兄公卿一節則又謙謙之謙也葢聖人只見義理無窮而自己有未到處是以其言毎下而益見其髙也論語或問説桓魋匡人不能違天害己處此間病處亦與晝寢章相類聖人既知天生徳於我决無可害之理矣而避患又必周詳謹宻者何耶云云此身為天地附託至重云云患之當避自是理合如此衆人亦然不必聖人為然也君子坦蕩蕩坦蕩二字只相連俱就氣象説只是胸懐平坦寛廣否抑坦字就理説由循理平坦然後胸懐寛廣也只合連説看下文對句可見子温而厲威而不猛恭而安集注云盛徳之容中正和平隂陽合徳竊嘗因其言而分之以上三截為陽而下三截為隂似乎有合然又以上三截為隂而下三截為陽亦似有合未知所决抑聖人渾是一元氣之㑹無間可得而指學者強為之形容如此以其説自分三才而言則温然有和之可挹而不可屈奪則人之道也儼然有威之可畏而不暴於物則天之道也恭順卑下而恬然無所不安則地之道也自陽根隂而言則温者陽之和厲者隂之嚴威者陽之震不猛者隂之順恭者陽之正安者隂之定自隂根陽而言則温者隂之柔厲者陽之剛威者隂之慘不猛者陽之舒恭者隂之肅安者陽之健葢渾然無適而非中正和平之極不可得而偏指者也此説推得亦好泰伯之事集注云云當時商室雖衰天命時勢猶未也大王乃萌是心睥睨於其下豈得不謂之邪志泰伯固譲為成父之邪志且自潔其身而以所不欲者推之後人何以為至徳集注所謂豈無至公之説又果何如翦商乃詩語不從亦是左氏所記當時必有所據看書中説肇基王迹中庸言武王纉太王王季文王之緒則可見矣此聖賢處事之變不可拘以常法處而太伯之讓則是守常而不欲承當此事者也其心即夷齊之心而事之難處則有甚焉尚以成父之邪志責之誤矣以能問於不能章集注採尹氏幾於無我㡬字只就從事一句可見耶抑併前五句皆可見耶犯而不校亦未能無校此可見非聖人事顔子正在著力不著力之間非但此䖏可見又只就從事上看便分明不須㬰説無校之云也篤信好學猶篤行之云不是兩字並言既篤而又信否集注云篤厚而力也何謂厚而力只是其心加隆重於此而又懇切於為之既不輕信而又不茍信否篤信只是信得牢固不走作耳未有不輕信茍信之意不輕不茍却在好學上見泰伯第十六章蘇氏有是徳無是徳之説所謂徳者是原於天命之性否徳字只是説人各有長處不必便引到天命之性處也恫而不愿愿字何訓或謂謹愿則有不放縱之意或謂愿慤則有朴實之意二説各不同不審其義果如何第十七篇鄉原章亦引荀子愿慤之説二説無甚不同鄉人無甚見識其所謂愿未必真愿乃卑陋而隨俗之人耳集注又曰侗無知倥倥無能竊意侗者同也於物同然一律瞑無識别是猶是也非猶是也倥者空也倥而又倥是表裏俱倥無寸長之實此亦因舊説以字義音韻推之恐或然耳此類只合大槩看不須苦推究也食不厭精膾不厭細集注云言以是為善非謂必欲如是也竊謂善者微有未穏善者則有嘉善之意此不厭但不嫌逺而已葢聖人平日簡淡以下文推之聖人凡事子細初無簡淡之意若如所説則記者當云膾不厭粗食不厭糲乃為正理不應反作如此説也不得其醤不食集注云惡其不備也竊疑惡字太重似見聖人有意處惡其不備非惡其味之不美但惡其貪味不茍食耳集注中仲尼不易為夫子何也若如中庸第二章所辨則恐在當時為可耳不曽如此理㑹恐亦不須如此理㑹也中庸或問乃為近年有以此疑中庸非子思之作者故及之耳文之為説大要只是有文禮可觀之謂葢凡義理之載於經籍而存乎事物之間與夫見於威儀華采而為盛徳之輝光形於禮樂制度而為斯道之顯及以引為有文理之可觀者皆是云云物相雜故曰文如前所説是也如下面分别諸説則恐未然如曰則以學文何以見其不為威儀華采禮樂制度耶大學疑或問云人物之生莫不得其所以生者以為一身之主近改物字作類字竊意類字意固不重疊而字似少開不若只依物字向來改此類字葢為下文專説人之明徳故不可下物字若作物字即須更分别人與物之所以異乃為全備近已如此改之矣或問云既真知所止則其必得所止若已無甚間隔竊疑若已字辭㫖恐未明白欲改作亦非有甚間隔若字意自分明未是真無間隔也格物章或問云其所以精微要妙不可測度者乃在其真積力乆心通黙識之中此句曉之未詳此處細看當時下語不精今已改定或問又曰所謂豁然貫通者又非見聞思慮之可及也此句曉之未詳不審此只是方其正一一格物時猶可勉勵用工夫以格之如所謂豁然貫通處則必真積之乆從容涵泳優㳺純熟不期而自到非強探力索可擬議以至耶抑是既到豁然貫通地位便是真知透徹云云若如此而猶用力思索便是沛然自得前説只以文義推可見何待如此致疑耶或問所引書降衷以下八言雖皆所以證夫理而其相次莫亦有序否嘗試推之降衷自天賦於人而言秉彛自人稟於天而言衷者理之至善而無妄也彛則理之一定而有常也常即善之所為因有是善故能常衷者統言彛則指定言此二句方舉其大綱而下文則詳之天地之中統言天地間實理渾然大中無所偏倚為萬邦之極而萬物之生莫不以是為樞紐也此比所謂衷則又加確矣天命之性指是理降而在人為賦生之全體而性則實即夫天理之中而非有二者是二言者一言天一言自天而人又所以兼明夫天賦於人而詳其降衷之意也仁義之心仁義乃即天命之性指其實理而心則包具焉以為體而主於身者也此比所謂彛則又加實矣天然自有之中又細言是理之散於事物之間莫不各有當然一定之則無過無不及皆天之所為而非人之力者而其實又不外於其心此二句又就性而言合衷彛而結之葢萬物雖各有當然無過不及之理然總其根源之所自則只是一大本而同為一理也此理人物所共由天地間所公共所以謂之道而其體則統㑹於吾之性非泛然事物之間而不根於其内也竊疑此下更宜以周子所謂無極而太極以包天人事物體用動静内外終始一貫為説似於八言之下其意尤為圓也而不之取不審何也當時只以古今為次第未有此意周子語意差逺故不得引以為證恐却費注解也延平格物之説原其意亦自程子説中得之云云又嘗疑前面反復論難専以程説為主葢不可以復加矣至此段引延平説則又曰有非他説所能及未易以口舌争其辭似抑揚低昂有左程右李别立一家之意他説是指門人説語意自明何疑之有傳言謹獨正就誠意著工夫處説或問又就意己誠之後説夫意之誠者既無所不盡真能慊快充足仰不愧俯不怍到此地位其勢决然自不能已矣而猶曰不敢弛其謹獨之勞焉所以防慮省察使其日新又新而不至於間斷何也恐此時所謂謹獨與向時所謹獨者大不同兩説不見其不同但説到此恰好著力不可間斷耳絜矩或問云各得其分不相侵越廣狹長短平均如一此四句曉之未詳所惡於左便是左邊人侵了自家右邊界分而我惡之故我亦不以此待右邊人而不侵他右邊之左如此方得左邊界分分明又以所惡乎右者度之方得右邊界分分明上下前後亦莫不然則四至所向皆得均平而界分方整無偏廣偏狹之病矣作新民是成王封康叔之語而或問中曰武王何也此書序之誤五峯先生嘗言之舊有一段辨此後以非所急而去之但看此與酒誥兩篇只説文王而不及武王又曰朕其弟小子封又曰乃寡兄朂武王自稱猶今人云劣兄則可見矣周公初一節是錯簡又雜疑中庸序曰人莫不有是形故雖上智不能無人心人心只是就形氣上平説天生如此未是就人為上説然上文又曰或生於形氣之私乃却下私字何也私恐或涉人為私欲處説似與上智不能無人心句不相合不審如何如飢飽寒燠之類皆生於吾之血氣形體而他人無與焉所謂私也亦未便是不好但不可一向徇之耳程子曰人無父母生日當倍悲痛如先生舊時亦嘗有夀母生朝及大碩人生朝與向日賀髙倅詞恐非先生筆不審又何也豈在人子自己言則非其所宜而為父母待親朋則其情又有不容己處否然恐為此則是人子以禮律身而以非禮事其親以非禮待於人也其義如何此等事是力量不足放過了處然亦或有不得已者其情各不同也程子以心使心之説竊謂此二心字只以人心道心判之自明白葢上心字即是道心專以理義言之也下心字即是人心而以形氣言之也以心使心則是道心為一身之主而人心其聽命也不審是否亦是如此然觀程先生之意只是説自作主宰耳貧者舉事有費財之浩瀚者不能不計度繁約而為之裁處此與正義不謀利意相妨否竊恐謀利者是作這一事更不看道理合當如何只論利便於己與不利便於己得利便則為之不得則不為若貧而費財者只是目下恐口足不相應因斟酌裁處而歸之中其意自不同否當為而力不及者量宜處乃是義也力可為而計費吝惜則是謀利而非義矣中庸尚絅條以為己立心明之象不審如何以為己立心明之象莫是有美在其中只要自温好不用人知否象字疑不同此説得之然更宜詳味答陳安卿泰伯篇三分天下有其二以服事商嘗因是而推設使文王當武王之時則革命之事亦為之否乎武王處文王之地則服事之禮亦如文王否乎竊恐此處皆繫乎天不由乎人使天果欲有為則亦不容文王不欲為天果未欲有為則亦不容武王必欲為聖人之心廓然大公如衡之平彼此一無所偏惟其來而順權以應之耳初何容心預安排指擬於其間文王武王易地則皆然不審是否此非本章正義但欲因其事變看聖人心耳張子謂一日天命未絶則為君當日天命絶則為獨夫天命絶否視之人情而已不審一夫之心未解還得為天命猶未絶否抑許大公天下之命豈偏在一夫上到此則聖人用權之地惟幾微義精者乃可以決之自不容以常法論也詳考詩書則文武之心可見若使文王漠然無心於天下斂然終守臣節即三分之二亦不當有矣然此等處正夫子所謂未可與權者食肉不食馬肝未為不知味也髙堅前後大槩只是譬其無階可升無門可入無象可執捉也然而考其髙堅前後之實恐亦不外乎日用行事之近即是日用間事但其理如是之髙堅𤣥妙耳髙是理義原頭上達處如性天道所由也堅是理義節㑹難考處如數端參錯盤根錯節處前後是理義變化不居處仰者望而冀及之貌鑚者鑿而求通之意瞻則視之方㣲見也忽則視之又未定也此正用功憤悶懇篤之際而萬疑畢湊欲融未融之時也所謂欲罷之意亦易萌於此矣而夫子在前却循循善誘不亟不徐而教有其序既博我以文使我有以廓其知而無一理不洞研諸心又約我以禮使我有以㑹其極而無一理不實踐諸已至此則堅髙前後之㫖趣要歸亦不外乎其中而有可從升之級有可從入之門有可執守之象矣是以日益有味而中悦懌雖欲罷而自不能己於是又即仰鑚博約之功所未精宻而猶可以容吾力者一一極盡更無去處然後向之所以為堅髙前後者始瞭然盡在目前如渠決水通大明之中睹萬象真見其全體之實卓爾直立於其所昭著親切端的確定而無纎毫疑礙遺遁之處矣然欲更進一步實與夫子相從於卓爾之地則無所由葢前此猶可以用力此則自大而趨於化自思勉而之不思勉介乎二者之境所未達者一間非人力之所能為矣但當據其所已然從容涵養勿忘勿助至於日深月熟則亦将忽不期而自到而非今日之所預知也不審是否卓爾即是前日髙堅前後底今看得確定卓然爾如巍巍髙底今從頭徹底皆分明卓然盡在目中無有遺遁節㑹堅底今皆融泮自成條理卓然森列於中不容紊亂前後捉摸兩不定者今則前者灼見其卓然在前不可移於後後者灼見其卓然在後不可移於前不是髙堅前後之外别有所謂卓爾者也諸家多以前為過後為不及恐無此意前後只是恍忽不可認定處將以前者為是耶忽又有在後者焉而前者又似不是皆捉摸不著若見得端的時皆是時中無過不及諸家又以卓為聖人之中卓却是中然亦恐未可便説中則卓字意又看不切矣此説甚善昔聞李先生説此章最是夫子循循然善誘人博我以文約我以禮至親切處其言有味前後固非專指中字然亦彷彿有些意思逝者如斯夫不舍晝夜嘗因是推之道無一息之停其在天地則見於日往月來寒往暑來水流而不息物生而不窮終萬古未嘗間㫁其在人則本然虚靈知覺之體常生生不已而日用萬事亦無一非天理流行而無少息故舉是道之全而言之合天地萬物人心萬事統是無一息之體分而言之則於穆不己者天之所以與道為體也生生不已者心之所以具道之體也純亦不己者聖人之心所以與天地一體也自強不息者君子所以學聖人存心事天而體夫道也不審是否楊氏曰章有不逝之説亦猶解中庸説死而不亡之意皆是墮異端處此亦得之但范氏説與道為體四字甚精葢物生水流非道之體乃與道為體者也可更詳之學道立權章集注舉楊氏曰信道篤然後可與立且篤信是好學以前事既篤信而後能好學也今此於既學適道之後却言篤信何也恐信字徹首徹尾不可分先後如篤信而後好學者方只信箇大槩既學之後而又信道篤者是真知而信之所信意味自不同其言各有主而此意所引篤字又應立自為切否信道篤三字誠有未盡善者鄉人儺古人所以為此禮者只為疫癘乃隂陽一帶不和之氣游焉非有形象附著人乃天地精氣所㑹故至誠作威嚴以驅之則志帥充實精氣彊壯自無疑忌怯懾而有可勝之理否但古人此禮節目不可考想模様亦非後世俚俗之所為者後漢志中有此想亦近古之遺法顔子無所不説與終日不違聞一知十語之不惰等類若以知上言之則此時方只是天資明睿而學力精敏於聖人之言皆深曉黙識未是於天下之理廓然無所不通猶未得全謂之物己格知己至而復其本心光明知覺之全體處葢是時猶有待於聖人之言故也至於所謂卓爾之地乃是廓然貫通而知之至極與聖人生知意味相似矣不審是否恐是如此鄉黨𤓰祭陸氏謂魯論𤓰作必而季氏一篇又是齊論則今此書非漢時魯論之篇乃後世相傳集三論皆有混其間否此雖非大義所係亦當知之何晏序云就魯論篇章考之齊古為之注然今不可得而分矣舊亦嘗病其如此矣喜怒哀樂未發謂之中發而皆中節謂之和自天道言未發之前聖與愚同此一大本未有是四者之事而均涵是四者之理及其發也衆人之所自然中節處亦宛然是本底形見亦與聖人底無異自人道言則聖人未發全醒定既發則全中節衆人未發則本然底固在而瞑然不省其發則雖有中節時節而其不中者多矣如中庸此節四句據本文正義恐只是推原性情之本統就天道言若上文兩節乃是就人工夫言所以存中和之體而下文一節則工夫之極又所以致中和之用也然或問中曰以其天地萬物無所不該故曰天下之大本以其古今人物之所共由故曰天下之達道則此處又不特是未分不在其中矣既云大本達道則無一物不在其中矣理有能然有必然有當然在自然處皆須兼之方於理字訓義為備否且舉其一二如惻隠者氣也其所以能是惻隠者理也葢在中有是理然後能形諸外為是事外不能為是事則是其中無是理矣此能然處也又如赤子之入井見之者必惻隠葢人心是箇活底然其感應之理必如是雖欲忍之而其中惕然自有所不能以已也不然則是槁木死灰理為有時而息矣此必然處也又如赤子入井則合當為之惻隠葢人與人類其待之理當如此而不容以不如此也不然則是為悖天理而非人類矣此當然處也當然亦有二一就合做底事上直言其大義如此如入井當惻隠與夫為父當慈為子當孝之類是也一泛就事中又細揀别其是是非非當做與不當做處如視其所當視而不視其所不當視聽其所當聽而不聽其所不當聽則得其正而為理非所當視而視與當視而不視非所當聽而聽與當聽而不聽則為非理矣此亦當然處也又如所以入井而惻隠者皆天理之真流行發見自然而然非有一毫人為預乎其間此自然處也其他又如動静者氣也其所以能動静者理也動則必静必復動其必動必静者亦理也事至則當動事過當静者亦理也而其所以一動一静又莫非天理之自然矣又如親親仁民愛物者事其所以能親親仁民愛物者理見其親則必親見其民則必仁見其物則必愛者亦理也在親則當親在民則當仁在物則當愛其當親當仁當愛者亦理也而其所以親之仁之愛之又無非天理之自然矣凡事皆然能然必然者理在事先當然者正就事而直言其理自然則貫事理言之也四者皆不可不兼該而正就事言者必見理直截親切在人道為有力所以大學章句或問論難處惟專以當然不容己者為言亦此意熟則其餘自可類舉矣此意甚備大學本亦更有所以然一句後來看得且要見得所當然是要切處若果得不容己處即自可黙㑹矣公而以人體之故為仁李公前所問葢以仁字純就生人之類而言某謂人字不當如此説而李公以為先生説𦂳要在人字上今承批教復未之然某請畢愚見而折衷焉竊謂此段之意人字只是指吾此身而言與中庸言仁者人也之人自不同不必重看𦂳要却在體字上葢仁者心之徳主性情宰萬事本是吾身至親至切底物公只是仁之理專言公則只虚空説著理而不見其切於已故必以身體之然後我與理合而謂之仁亦猶孟子合而言之道也然公果如之何而體如之何而謂之仁亦不過克盡己私至於此心豁然瑩净光潔徹表裏純是天理之公生生無間斷則天地生物之意常存故其寂而未發惺惺不昧如一元之徳昭融於地中之復無一事一物不涵在吾生理之中其隨感而動也惻然有隠如春陽發達於地上之豫無一事非此理之貫無一物非此生意之所被矣此體公之所以為仁所以能恕所以能愛雖或為義為禮為智為信無所徃而不通也不審是否此説得之不然則如釋氏之捨身飼虎雖公而不仁矣先生批答李公有云比干不止是一事之仁竊謂比干不止是一事之仁只説此一事見其有仁耳葢此大節目上不昏昧則是性綱己舉其餘自可類從然詳夫子所以許之之意葢亦重在此處以是為主而於全徳無所妨故耳固非謂止此一事有仁而其他尚有不仁處亦非謂全體渾然無闕而不容止以此一事偏指之也故此三仁之仁與一事之仁固異而與合下來全仁者亦自不同先生答李公又云吾之所以為心者如何而能無入而不自得須要理㑹竊謂須是知止有定然後無入而不自得也得之然亦須有涵養工夫也吕氏孟子惻隠説云葢實傷吾心非譬之也然後知天下皆吾體生物之心皆吾心彼傷則我傷非謀慮所及非勉強所能此所謂皆吾體皆吾心者亦只是以同一理言之否非但同理亦同氣也心説維天之命於穆不已所以為生物之主者天之心也人受天命而生因全得夫天之所以生我者以為一身之主渾然在中虚靈知覺常昭昭而不昧生生而不可己是乃所謂人之心其體則即所謂元亨利貞之道具而為仁義禮智之性其用則即所謂春夏秋冬之氣發而為惻隠羞惡辭讓是非之情故體雖具於方寸之間而其所以為體則實與天地同其大萬理葢無所不備而無一物出乎是理之外用雖發乎方寸之間而其所以為用則實與天地相流通萬事葢無所不貫而無一理不行乎事之中此心之所以為妙貫動静一顯微徹表裏終始無間者也人惟拘於隂陽五行所值之不純而又重以耳目口鼻四支之欲為之累於是此心始梏於形氣之小不能廓然大同無我而其靈亦無以主於心矣人之所以欲全體此心而常為一身之主者必致知之力到而主敬之功專使胸中光明瑩浄超然於氣稟物欲之上而吾本然之體所與天地同大者皆有以周徧昭晰而無一理之不明本然之用與天地流通者皆無所隔絶間斷而無一息之不生是以方其物之未感也則此心澄然惺惺如鑒之虚如衡之平葢真對越乎上帝而萬理皆有定於其中矣及夫物之既感也則妍蚩髙下之應皆因彼之自爾而是理固周流該貫莫不各止其所如乾道變化各正性命自無分數之差而亦未嘗與之俱往矣静而天地之體存一本而萬殊動而天地之用達萬殊而一貫體常涵用用不離體體用渾淪純是天理日常呈露於動静間夫然後向之所以全得於天者在我真有以復其本而維天於穆之命亦與之為不已矣此人之所以存夫心之大畧也王丞子正云看得儘有功但所謂心之體與天地同大而用與天地流通必有徴驗處更幸見教淳因復有後篇所謂體與天地同其大者以理言之耳葢通天地間惟一實然之理而已為造化之樞紐古今人物之所同得但人為物之靈極是體而全得之總㑹於吾心即所謂性雖㑹在吾之心為我之性而與天固未嘗間此心之所謂仁即天之元此心之所謂禮即天之亨此心之所謂義即天之利此心之所謂智即天之貞其實一致非引而譬之也天道無外此心之理亦無外天道無限量此心之理亦無限量天道無一物之不體而萬物無一之非天此心之理亦無一物之不體而萬物無一之非吾心那箇不是心做那箇道理不具於心天下豈有性外之物而不統於吾心是理之中也哉但以理言則為天地公共不見其切於己謂之吾心之體則即理之在我有統屬主宰而其端可尋也此心所以至靈至妙凡理之所至其思隨之無所不至大極於無際而無不通細入於無倫而無不貫前乎上古後乎萬古而無不徹近在跬步逺在萬里而無不同雖至於位天地育萬物亦不過充吾心體之本然而非外為者此張子所謂有外之心不足以合心者也所謂用與天地相流通者以是理之流行言之耳葢是理在天地間流行圓轉無一息之停凡萬物萬事小大精粗無一非天理流行吾心全得是理而是理之在吾心亦本無一息不生生而不與天地相流行人惟欲浄情達不隔其所流行然後常與天地流通耳且如惻隠一端近而發於親親之間親之所以當親是天命流行者然也吾但與之流行而不虧其所親者耳一或少有虧焉則天理隔絶於親親之間而不流行矣次而及於仁民之際如老者之所以當安少者之所以當懐入井者之所以當怵惕亦皆天命流行者然也吾但與之流行而不失其所懐所安所怵惕者耳一或少有失焉則天理便隔絶於仁民之際而不流行矣又逺而及於愛物之際如方長之所以不折胎之所以不殺殀之所以不夭亦皆天命流行者然也吾但與之流行而不害其所長所胎所殀者耳一或少有害焉則天理便隔絶於愛物之際而不流行矣凡日用間四端所應皆然但一事不到則天理便隔絶於一事之下一刻不貫則天理便隔絶於一刻之中惟其千條萬緒皆隨彼天則之自爾而心為之周流貫匝無人欲之間焉然後與元亨利貞流行乎天地之間者同一用矣此程子所以指天地變化草木蕃以形容恕心充擴得去之氣象也然亦必有是天地同大之體然後有是天地流通之用亦必有是天地流通之用然後有是天地同大之體則其實又非兩截事也王丞批此篇後截稍近又曰天命性心雖不可謂異物然各有界分不可誣也今且當論心體便一向與性與天衮同説去何往而不可若見得脱灑一言半句亦自可見更宜涵養體察淳再思之體與天地同大用與天地流通自原頭處論竊恐亦是如此然一向如此則又涉於過髙而有不切身之弊不若且只就此身日用見定言渾然在中者為體感而應者為用為切實也又覺聖賢説話如平常然此二篇辭意恐皆過當併望正之此説甚善更寛著意思涵養則愈見精宻矣然又不可一向如此向無形影處追尋更宜於日用事物經書指意史傳得失上做工夫即精粗表裏融㑹貫通而無一理之不盡矣答陳安卿知在王丞處甚善且得朝夕講學有商量也昨所寄諸説乆己批報但無便可寄今并附還又堯卿一紙煩為致意達之也前此所問主祭事據禮合以甲之長孫為之乃是若其不能則以目今尊長攝行可也如又疾病則以次攝似亦無害異時甲之長孫長成却改正亦不妨也為僧無後固當祭之無可疑但宗祭説未暇細考後更奉報答陳安卿淳前日疑大學或問然既真知所止則其必得所止若己無甚間隔其間四節葢亦推言其所以然之故有此四者淳竊謂真能知所止者必真能得所止而定静安慮上下一以貫之當下便一齊都了中間實無纎毫間隔乃聖人地位事也上文若己無云者其接真知所止必得所止之意誠為快然既曰無矣而又繼以甚者則是亦有些間隔而不甚多之辭也恐甚字與無字又不相應否然曰所以欲將若己無字換為非有字若之為言似也雖似如此而其間亦有少過度處也健步勇往勢雖必至而亦須移步畧有漸次也孟子所謂盡心今既定作知至説則知天一條當何繫屬繫之知性之下而盡心之前與知性俱為一衮事耶抑繫之盡心之下乃知至後又精熟底事耶夫三者固不容截然分先後然就其間細論之亦豈得謂全無少别知性則知天矣據此文勢只合在知性裏説一之寄問誌石之制在士庶當如何題温公謂當書姓名恐所未安夫婦合葬者所題之辭又當如何宋故進士或云處士某君夫人某氏之墓下畧記名字鄉里年嵗子孫及葬之年月一之卜以三月半葬併改葬前妣祔於先塋以前妣與其先丈合為一封土而以繼妣少間數步又别為一封土與朋友議以神道尊右而欲二妣皆列於先塋之左不審是否然程子葬穴圗又以昭居左而穆居右而廟制亦左昭右穆此意何也一之所處得之昭穆但分世數不為分尊卑如父為穆則子為昭又豈可以尊卑論乎周室廟制太王文王為穆王季武王為昭此可考也明器亦君子不死其親之意熹家不曽用答陳安卿太極者天地之性而心之體也一元者天地之心而性情之㑹也陰陽慘舒者天地之情即性之流行而心之用也不審是否程子曰其體則謂之易其理則謂之道其用則謂之神更以此語參看前者納去心説後來覺得首語説天心不的當今改云維天之命於穆不己所以為生物之主者天之心也不知是否改得語意全備甚善先生答妻父鬼神説云所謂非實有長存不滅之氣魄者又須知其未始不長存爾廖子晦見此謂長存不滅乃以天地間公共之氣體言之淳恐只是上蔡所謂祖考精神即自家精神之意耳王子合以為二説只是一意若非公共底則安有是精神耶不審何從上蔡説是魂魄二字向聞先生説發用處是魂定處是魄記事處是魄小兒無記性不定叠皆是魄不足又先生答梁文叔書謂鼻之知臭口之知味魄也耳目中之煖氣魂也淳竊以為魂不離氣魄不離體魂則氣上一箇活處其所流行而不息發越而有生意者也魄則體上一箇精處其所真實確定凝然而不散漫者也魂魄且如此看不須更支蔓言語間未能無病乆之自見得失今不須苦求也所與王丞論者則太支離矣王丞説魂即是氣魄即是體却不是須知魂是氣之神魄是體之神可也佛氏説地水火風亦相類月之不受日光處其魄也故十六以後謂之生魄其受日光處則其陽氣之明也故初二三以後謂之生明葢日月只是隂陽之氣非實有形質也明道先生曰生之謂性人生而静以上不容説舊認作未生以前天理未有所降賦時近思此説恐㡬太過人既未有生則不得謂之性也明矣更何待如此言耶疑此所謂以上云者似只説其從未感物以前至於所以生之始云耳恐非離人言天虚説未生以前事此説費力恐只合仍舊更思之赤子之感於物有天然發處有發以人處如啞鳴震悸則天然之發也如飲乳轉盼孩笑者則發以人處也又有人之天處有人之人處如良知良能人之天也順情則喜逆情則怒凡其嗜好則人之人處也所以感者皆從外生所以應者皆從中出静中之知覺伊川以復言之乃其未發者也然先生復卦賛曰生意闖然具此全美又曰有茁其萌有惻其隠又似有生意何也常思之群陰固蔽之中一陽之萌生生之心就本位上己畧萌出其端但未到發達出於外耳是所謂闖然者在人則為萬事沈寂之際其中虚靈知覺有活物者存即此便是仁者生生之心就生體己㣲露出其端矣但未到感動出於外耳是所謂有茁其萌者與伊川説無異惻隠則又在茁萌已後乃已發見處達而為惻隠也若以時運言則丑盡子初為復以月運言則晦盡朔交為復以日運言則黒極而微露於東為復在人言則赤子初生者復也以神識言則神初發知者復也闖字後來亦欲改之但未有穏字耳茁萌惻隠却是正指初發處日運以下有説得太遲處更消息之補遺李堯卿問近思録生之謂性性即氣一叚此叚看得好更詳味之在明衣之制未詳當缺後陳安卿問子賤之成徳實出於聖門夫子歸於魯多賢者聖人謙厚於此事可見而蘇氏説恐未盡不然在一様病痛時時有之之後晦庵集巻五十七欽定四庫全書晦庵集卷五十八宋朱子撰
