front:
  text: 八十四
  hash: sha256:158318d50f1e02d553fbcdc3e5f28de3300ce79b64be04c1eaa3f10901ac1bf2
body:
  text: 宋朱子撰跋跋趙鈐轄墓誌先王封建子弟蕃屏王室所以厚人倫而寧天下非獨私其為力於已而已下及漢晉莫不由之雖其治亂得失有不齊者然要為宗社久長之計也唐自明皇疑忌諸王不令出閤後遂相踵以為家法是以享有天下餘三百年而其子孫絶無聞於今者然則神祖之出宗支以仕州縣其所以法前聖而鑒後王者聖謨逺矣以故靖康之禍近属雖頗北遷而疏逺在外者往往能建勲績其抗羣盜拒仇敵而死其官守者亦不乏人若江東鈐轄趙公是已其孫崇遵出此軸以見示因得反復諸公所記并感前事為太息而書其後獨恨東莱吕舍人所撰碑銘今不復存當為求之其家以附益之又記頃年守潭考其祀典有紹興初年死難之士四人其一兵官趙侯聿之亦宗室子城陷巷戰罵賊而死㓂退事聞詔贈右監門衞將軍然皆未有廟貌而寓祭他所因竊仰歎而深悲之即教綱紀并晉故刺史譙閔王等立象奉祠而為請於朝不旬日間即蒙報可賜其號曰忠節之廟徳意所加神人歆動非獨諸君之靈為有歸也今聞鈐轄諸孫且將自列求所以易其名者以熹所為請額之事推之竊計厚骨肉之恩崇節義之勸聖朝於此正有所不宜吝也譙王亦晉宗室事具本傳云慶元丙辰七月庚子具位朱熹謹書跋劉雜端奏議及司馬文正公帖士大夫出身事主上則欲致其君為堯舜之君下則欲使其民為堯舜之民至於諫不行言不聴而潔身以去豈其心之所樂哉是以雖聖賢之處此不免遲遲其行而不忍為茍去甚或眷戀徘徊三宿而後出境其於君臣大倫恩義之際篤矣固不以茍得一時之虚譽為喜而輕去之也今觀熙寧雜端劉公之奏議知其致君澤民之願勤懇切至不啻其身之疾痛觀司馬文正公之遺帖見其忠君愛國而相勉以正之意又不勝其拳拳也嗚呼盛哉然而道勝名立之言或者猶竊病之以熹而慮彼葢有激而云爾不然夫豈不知既有其實則名自隨之在我固有不得辭者而當時風俗之厚習尚誠慤亦不以是為嫌也又况忠賢去國一時之心固不能無慨然者司志之士憂之過甚恐其以是而不能鬱鬱以久也則姑為是説以寛譬之是乃忠君愛國之尤者而猶深有望於他時也豈以近名為累而故為回隠以避之哉劉公之事紹興大㕘晉陵張公記之已詳一時衆賢又從而推明之亦皆足以見其鄉慕之意矣公之闕世孫君房又出以示熹使得託姓名焉自惟晚出何敢復賛一詞於其間特因或者所疑而妄論之以附于後云慶元丙辰八月戊申朔朱熹跋張忠確公家問熹嘗銘張忠文公之廟因得讀其遺書而歎慕其風烈今又得觀公子忠確公汾州家問尤深敬仰竊惟國家承平百年徳隆澤茂世臣喬木不為無人而一旦危難之際忠義之節乃獨萃於張氏之一門其亦盛矣公之大節如青天白日固不待賛述而后明而熹獨於其筆札之精謹見其神氣之安閒於其家人父子之間見其誓死之外唯以收䘏遺孤為寄而無一毫内顧下流之私也嗚呼非其胸中有以大過人者何以及此先覺有言慷慨殺身者易從容就義者難若公之死其真所謂從容就義者邪公孫行儉因友人余克忠以此軸見視三復以還為之感涕因敬識其後云慶元丙辰十月己巳跋東陽郭徳輔行狀東陽郭君徳輔將葬其子淇不逺數百里過予於建溪之上狀其行事一通以請銘而今四明帥守林公和叔前太府丞吕君子約又皆以書来言君之為人如狀不誣可銘無愧也予雖不及識徳輔然以二君子之言而讀其狀見其好學樂善之誠忠厚㢘退之實心固樂為之書顧念比以多病心目俱衰凡銘之請所諾而未及償者前後以十數所辭而不敢諾者又不止此今復安敢越次開端以来怨詈因謝不能而淇請益堅予悲其意乃為書其行狀之後如此而歸之抑林吕二君子皆非輕許人者其言固足以信後世矣又何竢於予銘哉慶元二年九月丁丑朔旦新安朱熹書跋許侍郎詩卷侍郎許公經事綜物之才見於已試其為文章盖直吐出胸中之藴未嘗屑屑焉為如是之言也其孫建陽丞公視熹以公手書詩卷觀其長篇大句固自雄健豪逸磊落驚人而新宅書懐近體諸作又皆律切精穏不留縫罅亦足以驗其才力之有餘無所施而不可矣熹與公俱江東人所居徽饒之間相望不百里獨恨生長閩嶠不及識公顧今如此迺獲窺其筆蹟而因以得其為人豈非幸耶慶元丙辰十月丙午朔旦婺源朱熹書書河圖洛書後世傳一至九數者為河圖一至十數者為洛書考之於古正是反而置之予於啓蒙辨之詳矣讀大戴禮書又得一証其明堂篇有二九四七五三六一八之語而鄭氏注云法龜文也然則漢人固以此九數者為洛書矣閤皂甘君叔懐欲刻二圖山中覽者未必深考又當大啟争端聊書以識之慶元丁巳上元節日遯翁書跋萬君行事後自鄉舉里選之法廢取士者先文藝後材實於是野多遺賢朝多曠位而治具民俗每不能無愧於前世讀正父所論著其舅氏萬君之行事而以視於當世之人材其亦足以觀矣正父好古多學深有志於治道而其筆力從横詞氣雅健又如此亦所謂似其家姓者耶跋吕范二公帖後山談叢記蘇端明當國恤時與人書疏疑於當慰與否而罷乃載前輩往還慰狀以正之今觀吕正獻公帖乃知當時此禮固已通行亦臣子之心不能已者不審蘇公何所疑也仁宗皇帝慈儉之徳冠冕百王而因山之奉煩費若此豈其心哉宜乎老蘇先生有華元樂舉之譏而忠獻韓公不敢辭其責也然此帖所云置司裁損仍是韓公當國時事亦足以驗其悔悟之實矣此其所以為韓公者耶吕公幅紙之間愛君及民拳拳不舍其於劉公心期所㑹必有不約而同者覽之令人感歎不能已范忠宣公平淡忠恕雅不欲以智名勇功自見故熙豐間授鉞臨邊數被譙讓觀第二帖可槩見矣然迹其平生排濮議争新法干忤君相無少顧避最後論捄元祐諸賢卒與同貶盖終身無所屈則又豈非所謂仁者之勇哉其於劉氏姻好綢繆盖亦聲氣之同非茍然者子夷得其家學之傳不卑小官直道自信東莱吕舍人亟稱之覽者其亦考焉慶元丁巳中元節前二日朱熹敬書跋度正家蔵伊川先生帖後頤謹詣行館拜謝長官秘書十月日河南程頤狀正為遂寧户掾友人王君世垕數數為正言城西傅君光家蔵先正韓范諸公手蹟甚富迺祖大夫公嘉祐初實見濂溪周先生于合陽求教先生手書家人艮遇等説贈之其後程太中公知漢州大夫公時為邑西川又得交伊川兄弟間手筆相問往往皆在正每見王君必悉意咨懇屬以訪求周程諸先生手蹟慶元二年正月四日王君忽自山中来謁講禮已袖出伊川先生手狀一幅徐加考訂殆先生入蜀時筆也大夫公集以為日記冊此版起六月終七月十六日内載王氏父子吕氏兄弟遷擢盖熙寧間日報作細字背面皆滿先生字處闕之獨得不謾又問濂溪書曰亡矣正且悲且喜謂王君曰正不敏讀諸先生遺書學其學求其道今十年餘矣每見當時一事一物如南國之棠曲阜之履旁皇不忍去之也今此紙幸脱於敗爛之中然諸先生所以開示後世者世方以為竒貨安知叔孫武叔輩見之不遂投之水火耶為我謝傅君正奉藏之俾勿壊其年秋傅君来言曰先生之書謹如命大夫公諱耆字伯夀名在元符黨籍光字用之世垕字叔載後學樂活度正謹書傅君周旋周程師弟子間知所主友而伊川先生手刺謁謝為禮亦恭則其人之賢不問可知度君求訪之勤意欲甚美濂溪先生往還遺蹟計其族姻閭里之間猶有存者度君其廣詢之當可得也嘗讀明道先生顔樂亭詩其卒章曰井不忍廢囿不忍荒嗚呼正學其何可忘然則熹之所望於度君者又不専在於此也度君其益勉之哉慶元丁巳七月二十二日朱熹書跋張敬夫與馮公帖此張敬夫與縉雲馮當可書也味其詞意知其一時家庭之間定省從容未嘗食息不在中原之復令人感慨不已馮公獨不及識然嘗見故端殿汪公甚推重之近得其文集讀之論議偉然而所論人主正心親賢為所謂建極者明禹箕之傳破諸儒之陋乃適與鄙意合尤恨不得一見其面目而聴其話言也慶元丁巳七月二十五日新安朱熹書于建安坤峽之野店跋孔君家藏唐誥闕里裔孫孔仲良以鄉貢明經仕唐正元大和間至莆田令卒官因家焉子孫散居民伍無復顯人紹興中熹之友括蒼吳任授室其門間以其家所藏告身家牒世譜相視皆唐世舊物牒又其應舉時所通具列三世官諱獨曽祖文整名見譜中乃襲文宣王齊卿之别子而齊卿實先聖第三十有七世孫也考之元豐版本襲封家譜皆合推而下之得莆田令君則為第四十有一世矣牒頗殘缺無州里而以洪州之印欵其縫視其告則以為泗州連水縣臨淮鄉進賢里人豈其寓於洪耶告身凡七通其二為令君之父丞公所厯南頓溧水二縣尉其五為令君明經冬集全椒尉青陽丞及莆田考課皆尚全好獨莆田令為謄本而其家自令君至此又已傳九世矣熹得其書審訂不謬乃以告於莆守傅侯自得令丘君鐸請得更其版籍為至聖文宣王第四十九世孫孔宜户二公欣然許諾即施行之時紹興二十五年乙亥嵗也後二十有六年宜之子幼夏乃以鄉舉試禮部又數年知縣事廖徳明為摹刻其告於縣齋然其跋語以令君為三十八世則為小差幼夏以其墨本来因記舊事輒為書之且使摹其家譜世譜及南頓溧水二告并刻于家而附以令君以来世次之属使後有考云慶元丁巳中秋日朝奉大夫朱熹書跋孔毅夫談苑孔毅夫談苑清江張元徳藏其手稿然多是抄取江鄰㡬嘉祐雜志中語此本方是一傳以失校已多脱誤又世傳孔書有珩璜新論者多是類集古今事實之近似者而一本附記近世見聞數十事自趙獻公以下無不遭其詆毁嘗細考之筆勢不甚相似或好事者附益之惑亂後生甚可惡也因閲此帙筆其後以曉之慶元丁巳八月晦翁跋十七帖官本法帖號為佳玩然其真偽已混殽矣如劉次莊有能書名其所刻本亦有中分一字半居前行之底半處後行之顛者極為可笑唯此十七帖相傳真的當時雖已入官帖卷中而元本故在人間得不殽亂此本馬莊甫所摹刻也玩其筆意從容衍裕而氣象超然不與法縛不求法脱真所謂一一從自己胸襟流出者竊意書家者流雖知其美而未必知其所以美也書詞問訊蜀道山川人物屋宇圖畫至纎至悉盖深有意於逰覽而竟不遂豈所謂不朽之盛事信難偶耶因念頃年廬阜終更諸公議遣使蜀而孝廟記憐不欲使之逺去議乃中寢然東留訖無補報而徒失西逰之便每以為恨今觀此帖重以慨然又念僊逰之日逺無復有意於人世也熹記跋杜工部同谷七歌杜陵此歌豪宕竒崛詩流少及之者顧其卒章嘆老嗟卑則志亦陋矣人可以不聞道哉跋李伯時馬觀龍眠飛騎圖及讀延之廷秀大防三君子佳句因思法雲秀公語尤物移人甚可畏也慶元三年孟冬八日朱熹仲晦父跋東坡書李杜諸公詩東坡此卷考其印章乃紹興御府所藏不知何故流落人間捧玩再三不勝敬歎但其所寫李白行路難闕其中間八句道子胥屈原陸機李斯事者此老不應有所遺忘意其刪去必當有説老翁并詩在老蘇送蜀僧去塵之前必非他人之作然不見於嘉祐集亦不省其何説也彼欲并中老翁改顔易服不使人知而後篇遽有嫌瘦廢彈之嘆何耶然其言怨而不怒獨百世以俟後賢而不惑則其用意亦逺矣哉慶元丁巳十月丁丑新安朱熹觀玉山汪季路所藏而識其後如此云跋杜祁公與歐陽文忠公帖杜公以草書名家而其楷法清勁亦自可愛諦玩心畫如見其人慶元丁巳十月丁丑新安朱熹觀跋東方朔畫贊平生所見東方生畫贊未有如此本之精神者筆意大槩與賀捷表曹娥碑相似不知何人所刻石在何處是可寳也朱熹仲晦父跋蔡端明寫老杜前出塞詩蔡公大字盖多見之其行筆結體往往不同豈以年嵗有蚤晚功力有淺深故耶巖壑老人多見法書筆法髙妙獨稱此為勁健竒作當非虚語慶元三年十月戊寅朱熹巖壑再題勢若飛動可見字隨年長也跋吳道子畫頃年見張敬夫家藏吳畫昊天觀壁草卷與此絶相類但人物差大耳此巻用紙而不失色又有補畫頭面手足處應亦是草本也張氏所藏本出長安安氏後有張芸叟題記云其兄弟析産分而為二此特其半耳頃經臨安之火今不知其存亡而此巻㫁裂之餘所謂天龍八部者亦不免為焦頭爛額之客豈三災厄㑹仙聖所不能逃耶是可笑也吳筆之妙冠絶古今盖所謂不思不勉而從容中道者兹其所以為畫聖與季路所藏法書名畫甚富計無出其右者既以得觀為幸因記嵗月於其後時慶元丁巳十月十日己卯也朱熹仲晦父襄陽張舍人筆法出其家存誠子先君子甚愛之而世莫之貴也因覽遺墨不勝悲歎熹謹書跋歐陽文忠公與劉侍讀帖歐陽公與劉侍讀尺牘一卷汪季路持以見示因得竊觀前輩之笑談風味於此猶可想見其彷彿然當是時朝廷清明風俗醇厚國家致治之美莫此為盛而公猶有薄惡之歎盖其所不可及者獨有嫉善之言不勝公論此為治亂之分耳三復之餘掩卷太息而記其後季路其謹藏之慶元三年十月己卯書跋舊石本樂毅論沈存中筆談云皇祐中嘗於髙紳之子錢塘主簿安世家見此石後十餘年安世在蘇州石已破為數片以鐵束之後安世死石不知所在或云蘇州一富家得之亦不復見存中所記與歐陽公不同如此延之所謂錫山徐氏者豈又得之蘇州富家耶延之又謂損泐糢糊則石雖幸存亦無復如此本之清勁矣續閣帖中所刻全文又不知所自来頃年曽於折子明家見其所藏舊本筆意絶類徐季海要皆非此本之比也慶元丁巳十月己卯朱熹跋東坡祭范蜀公文汪季路所藏蘇文忠公祭范忠文公文稿慶元丁巳十月己卯朱熹觀于考亭溪居跋富文忠公與洛尹帖富文忠公與洛尹帖以史考之尹者李中師也熙寧元年公自河陽被召入京以病請汝而歸過洛少留連遭三喪赴汝後又一遭喪劄子云喪骨肉大小四口是時李以天章閣待制知河南府營奉應天㑹聖兩神御殿故此一帖自言附庸悲惱而賛李二役畢工者為第一公既至汝神廟遣中貴人馮宗道挟太醫陳易簡来治足疾故此一帖言中璫太醫者為第二移囚不知何事馮来恐亦即宗道也故此帖為第三明年被召入相故此一帖云詔使到郡即交州事辦行而東者為第四三年李自權三司使進龍直再尹洛故此帖致賀始稱龍圖給事者為第五四年公在亳州坐不散青苗罷歸洛未至改判汝州故此一帖言近赴小邑勝於窮坐里閭且感君相厚恩而恨不得時奉談笑者為第六公至汝不久即請歸洛故此一帖言擇日就第者為第七既而告老遂以司空使相致仕故此一帖答其封示單報者為第八凡十三帖其嵗月先後可考者如此其餘似亦皆是在洛時徃還者盖李之事公不為不謹而公之遇李亦不為不厚矣而其後李因奉行免役之令乃籍公户使出泉同於編甿以媚用事者小人觀時徇勢反覆異態何世無之覽此卷者可為發一大笑也慶元丁巳十月庚辰朱熹跋韓魏公與歐陽文忠公帖張敬夫嘗言平生所見王荆公書皆如大忙中寫不知公安得有如許忙事此雖戲言然實切中其病今觀此卷因省平日得見韓公書蹟雖與親戚卑幼亦皆端嚴謹重略與此同未嘗一筆作行草勢盖其胸中安静詳密雍容和豫故無頃刻忙時亦無纎芥忙意與荆公之躁擾急迫正相反也書札細事而於人之徳性其相闗有如此者熹於是竊有警焉因識其語於左方慶元丁巳十月庚辰朱熹跋朱希真所書道徳經巖壑老人小楷道徳經二篇精妙醇古近世楷法如陳碧虚之相鶴黄長睿之黄庭皆所不及唯湍石喻公之典引諸書為可方駕耳季路得之逺以相視恨目已昏盲不得盡見其妙處把玩不足因記其後而歸之季路能攻石傳刻以與好事者共之即大幸盖此書難得善本讀此數章似少譌謬又為可傳也慶元丁巳十月庚辰雲臺子私記如儼若客語意最精今本多誤作容殊失本指此本為不誤也跋趙清獻公家書趙清獻公之為人公忠孝慈表裏洞徹固所謂無間然者然其晚嵗學浮屠法自謂有得故於兄弟族姻之間無不以是勉之前後見其家間手帖多矣如此卷稱其弟心已明瑩見性復元教其姪以不失正念要使純一不雜又教以公私謹畏踐履不失便是初心佛事且引古人二業清浄即佛出世之語以為此亦直截為人處則與今之學佛者大言滔天而身心顛倒不堪著眼者盖有間矣嗚呼聖學不傳其失而求諸野者若此尚為有可觀也予是以表而出之慶元丁巳十月十一日庚辰朱熹書跋湯叔雅墨梅墨梅詩自陳簡齋以来類以白黑相形逮其末流㡬若禪家五位正偏圖一矣故湯君始出新意為倒暈素質以反之而伯謨因有冰雪生面之句也然白黑未分時一句畢竟未曽道著詩社髙人試各為下一轉語看湯君自云得其舅氏楊補之遺法其小異處則又有所受也觀其藴藉敷腴誠有青於藍者特未知其豪爽超㧞之韻視牢之為何如爾病眼眵昏不能覈論故願與諸君評之戊午三月病起戲書跋王信臣行實慶元紀號之初余友吕子約謫居廬陵間遣詢其動息子約報書具言罪大責輕念咎之餘復何所道獨所寓居得王氏别館有臺榭花木之勝而江山雲物晨夕萬變足以逰目騁懐尤過望不落寞耳因極道王君之為人以為好賢樂善所交盡其鄉之名公卿才大夫又能同其憂樂不隨世俗為俛仰既又以書来稱王君之子峴為方有意於學謂余當有以告語之者峴亦以書来贄甚勤余讀之信子約之言不誣也無㡬時子約内徙髙安以卒而峴亦以王君之沒来赴且述其事狀一通而以銘墓為請余病疾久廢筆研既弔且謝不能而峴請益堅乃記其後而歸之以見余意又以見峴之狀君詞有不盡而無所溢也四年戊午中冬丙申朔旦雲谷老人朱熹仲晦父書跋程沙隨帖離騷九章云乘鄂渚而反顧兮欸秋冬之緒風説文欸譍也亞改切又焉開切史記范増撞破玉斗曰唉説文唉譍也烏開切二字音義並同如歎與嘆欬與咳實一字耳其聲則皆楚語也故元次山有欸乃曲而栁詩亦用此二字皆湘楚間作栁文舊本作靄襖音上字正協亞改之聲集韻亦於皆韻收唉字海韻收欸唉二字為一其説盖與説文不異但乃字之讀如襖者未有考耳近世乃有倒讀之者又或寫欸為欵則其誤益甚矣欸乃歌唐肅宗中興之業上比漢東京固有愧而下方晉元帝則有餘矣故許右丞之言如此盖亦有激而云者然元次山之詞歌功而不頌徳則豈可謂無意也哉至山谷之詩推見至隠以明君臣父子之訓是乃萬世不可易之大防與一時謀利計功之言益不可同年而語矣近嵗復有諂子妄為刻畫以謗傷之其説之陋又許公所不道直可付一笑云語溪詩顔公剛毅忠烈得之天資與其學之不純而諂道佞佛自不相掩有志於道者師其所當師而戒其所可戒可也淺聞卑論易以溺人不足為法覽者詳之麻姑山詩余少嘗學書而病於腕弱不能立筆遂絶去不復為今觀沙隨程丈此卷饒娥一紙盖有意於黄絹之碑者亦可愛也饒娥故居小廟在樂平縣東二十餘里余嘗特往沃茗酹之䨥闕已不復存矣因語州縣宜増葺之且為請敕額列祀典而莫有應者甚可歎也辨饒娥余嘗為沙隨言孝經獨篇首六七章為本經其後乃傳文然皆齊魯間陋儒纂取左氏諸書之語為之至有全然不成文理處傳者又頗失其次第殊非大學中庸二傳之儔也程丈報書云吾嘗聞之玉山汪公亦若吾子之言是也今覽其手書遺論因記其語於後云孝經論慶元戊午十一月二十六日劉用之為劉伯醇攜此卷来求跋為書以歸之書釣臺壁間何人所題後此詞實亦先生所作不見嚴夫子寂寞富春山空留千丈危石髙出暮雲端想象羊裘披了一笑兩忘身世来揷釣魚竿肻似林間翮飛倦始知還中興主功業就鬢毛斑驅馳一世人物相與濟時艱獨委狂奴心事未羨癡兒鼎足放去任疎頑爽氣動星斗終古照林巒頃年屢過七里灘見壁間有胡明仲丈題字刻石拈出嚴公懐仁輔義之語以厲往来士大夫未嘗不為之摩娑太息也然亦不能盡記其語後數十年再過因覓其石則已不復存意或者惡聞而毁滅之也獨一老僧年八十餘能誦其詞甚習為予道之俾書之冊比予未久而還則亦為好事者裂去矣因覽兩峰趙傁醉筆釣臺樂府偶記向所嘗見一詞正與同調并感胡公舊語聊為書此慶元己未人日雲谷老人云釣臺故有范公記文詞義甚偉後人不容復措手矣中間有江子我一記獨書作新嵗月最為得體而粗述其以羊裘題軒客星命閣之意名義亦為髙雅今屢經火不知此石尚存否也近年乃有作記力辨嚴公非詭激素隠者盖邵康節作安樂窩中好打乖詩明道程先生和之曰時止時行皆有命先生不是打乖人而康節又復之乃有安知不是打乖人之句此言有味也使嚴公而可作當為此發一大笑云跋吕氏嵗時雜記右吕公嵗時雜記熹得而伏讀之既於周退傳陸放翁之所嘆竊亦深有感焉又意公之為此亦前賢集録方書之遺意也然則後之君子又將有感於余言也夫慶元己未二月辛巳新安朱熹書跋張安國帖安國天資敏妙文章政事皆過人逺甚其作字多得古人用筆意使其老夀更加學力當益竒偉建陽張大夫珍蔵此紙間以視予展玩恍然如接談笑書其後而歸之慶元己未三月八日跋山谷宜州帖山谷宜州書最為老筆自不當以工拙論但追想一時忠賢流落為可歎耳雲谷老人因覽竊識慶元己未三月八日跋米元章下蜀江山圖米老下蜀江山嘗見數本大畧相似當是此老胸中丘壑最殊勝處時一吐出以寄真賞耳蘇丈粹中鑒賞既精筆語尤勝頃嵗嘗獲從㳺今觀遺墨為之永嘆慶元己未三月八日新安朱熹仲晦父跋蔡端明帖蔡公書備衆體此卷評書一紙獨有歐虞筆意甚可愛也慶元己未三月八日雲谷老人觀縣大夫張侯所蔵為識其後跋歐陽文忠公帖歐陽文忠公與蔡忠恵公手帖前輩交情篤厚語意真實於此可見慶元己未三月八日新安朱熹仲晦父書跋東坡帖東坡筆力雄健不能居人後故其臨帖物色牝牡不復可以形似校量而其英風逸韻髙視古人未知其孰為後先也成都講堂畫象一帖盖屢見之故是右軍得意之筆豈公亦適有㑹於心歟慶元己未三月八日朱熹仲晦父觀永福張氏所蔵墨蹟歎賞不足因記其左方跋曽南豐帖余年二十許時便喜讀南豐先生之文而竊慕效之竟以才力淺短不能遂其所願今五十年乃得見其遺墨簡嚴静重盖亦如其為文也慶元己未三月八日跋彭監丞集余頃使淛東時諸郡民以保伍之役不便相與自言者衆獨台之臨海為無有問其故則曰前此縣令彭君視其聚落之貧富而稍正定其疆理使貧里得免頻役之苦以故皆樂趨事無所為訴余念聚落貧富之不均最為役法大害間者雖設歇役年嵗倍半之差而猶有所不通今彭君所行雖律令所無有然亦非有禁也真可謂得法外意矣間頗推其法於他郡縣人果皆以為便後以按事至台留甚久聞臨海士民稱彭君之政不容口曰吾邑數年之前唯顔侍郎度為有去思而近嵗乃得彭君其恵愛惻怛酷相似而綜理詳密殆過之既又得其所為户口財賦之書讀之益知彭君之志不但為百里規模而已也然余自是罷歸不復出者累年亦聞彭君登朝出守持使者節而竟不及試以卒每深以為恨也慶元己未君之中表林生補持此集及葉卿所撰墓銘過余三復感歎因書疇昔所聞以附焉以為有志於民者尚有取也三月丁丑既朢新安朱熹跋劉司理行實長樂劉砥及其弟礪相與来學累年于兹更厯變故志尚愈堅察其居家孝友交朋友信實臨事謹畏不敢畔繩墨知其教習之有素也一日出友人趙君昌父所狀其先府君行事一通因以銘墓為請余讀其文考其事有以信余所知之不謬矣然余久以疾病憂畏不能文比年以来所辭且十數家以故雖知劉君之賢而不能有以少答二生之意獨識其後而歸之後有君子尚有以識此心也雖然二生勉􅏧尊聞行知而有以卒就其徳業則所以顯揚其親者於是為大銘之有無初不足為重輕也慶元己未四月乙酉新安朱熹書跋家蔵劉病翁遺帖病翁先生壯嵗棄官端居味道一室蕭然無異禪衲視世之聲色權利人所競逐者漠然若亡見也熹蚤以童子獲侍左右先生始亦但以舉子見期而熹竊窺觀見其自為與所以教人者若不相似暇日僭有請焉先生欣然嘉其有志始為開示為學門户朝夕誨誘亹亹不倦其後先生属疾熹適行役在外亟歸省問先生喜甚顧而語曰病中無可與語幸吾子之来歸也自是日奉湯藥先生所以教詔益詳期許益重至為具道平生問學次第傾倒亡餘一日從容因出詩一篇見授先生性不喜書常時詩文率多口占使諸生執筆獨此與贈劉致明丈長句皆手書之其意可見也贈别詩有小几清香慰臨别極知了了萬縁輕之句子妷或惡其語之不祥者先生笑曰此何足諱然亦為汝更之因别定為愁絶字既又發故篋得碎紙數十皆平日省躬自厲之言稍以先後次為一篇命熹與同舍生黄銖筆之復取閲視手自更定數十字間不一日遂啓手足諸子妷乃共發其先所緘封遺書數幅皆熹未歸時所留處畫庶事遍及遺孤復有片紙属熹為作張公書末有勉力大業之語熹始得泣受而寳蔵之以至于今不敢失墜然而躬行不力老大無成不能有以仰副當日付授之意抱此愧恨每念將無以見先生於地下今病已力何所復云姑取遺墨聨為一編而序其本末以示子孫且以示諸同志使於前修景行之懿知所跂慕而又視熹之慵惰亡聞以為前車之戒也熹字元晦亦先生所命其祝詞具在以非臨終手筆别附他卷先生沒以紹興十七年丁卯後五十三年慶元己未五月丙申門人朱熹謹書跋病翁先生詩月髙夜鳴筝聲従綺窗来隨風更迢遞縈雲暫徘徊餘音若可玩繁弦互相催不見理筝人遙知心所懐寧悲舊寵棄豈念新期乖含情鬱不發寄曲宣餘哀一彈飛霜零再撫流光頽每恨聴者稀銀甲生浮埃幽幽孤鳳吟衆鳥聲難諧盛年嗟不偶況乃容華衰道同符片諾志異勞事媒栖栖牆東客亦抱凌雲才此病翁先生少時所作聞筝詩也規模意態全是學文選樂府諸篇不雜近世俗體故其氣韻髙古而音節華暢一時輩流少能及之逮其晚嵗筆力老健出入衆作自成一家則已稍變此體矣然余嘗以為天下萬事皆有一定之法學之者須循序而漸進如學詩則且當以此等為法庶㡬不失古人本分體製向後若能成就變化固未易量然變亦大是難事果然變而不失其正則縱横妙用何所不可不幸一失其正却似反不若守古本舊法以終其身之為穏也李杜韓栁初亦皆學選詩者然杜韓變多而栁李變少變不可學而不變可學故自其變者而學之不若自其不變者而學之乃魯男子學栁下恵之意也嗚呼學者其毋惑於不煩繩削之説而輕為放肆以自欺也哉己未五月二十二日書先吏部韋齋記銘并劉范二公帖後右劍浦羅先生仲素為先君子作韋齋記而沙陽曹丈令徳又為之銘家蔵遺蹟數十年矣恭惟先君子名齋之意不唯自警乃其所以垂裕後人者盖亦至深至厚而無以加而熹踐修不謹陷身危辱今病且死大懼無以奉慈顔於地下故敢收輯遺文蔵之家廟以示子孫使永永奉承不至失墜庶㡬得以少伸省愆念咎之萬一其横渠西銘寔外舅草堂劉先生所授首尾有先生手筆二十字造字祝辭病翁劉先生所作及祕閣范公手帖今皆以附于後三公皆先君子執友其所以教熹者今皆不能有以副也慶元己未五月丙申孤熹敬書書先吏部與浄悟書後某啓比獲從容良慰北巖重勤逺出伏暑中時得雨法體多福安下處未欲遽以干人須決成入城即自有書信去城中數日人事紛紜歸来静坐累日意緒始復舊雲監寺不别書空石斗一枚付去人謝諫去若借得兩人即分付兩籠令共舁来不然即且取古田丙字紙五軸付謝諫来及珙首座並煩致意未相見加愛閏月三日某啓上尊勝長老浄悟見世美兄弟致意城中滚滚不欵未及為書先君子少日喜與物外髙人往還而於浄悟師為尤厚後嘗為記尊勝佛殿今刻石具在可考也浄悟建陽後山人晚自尊勝退居南山雲際院一室翛然禪定之餘禮佛以百萬計年過八十目光炯然非常僧也常為余道富文忠趙清獻學佛事其言收斂確實無近世衲僧大言欺世之病以是知先君子之厚之非茍然也古田林生蒙正持此卷来捧玩手澤不勝悲感因為略記其本末云慶元己未六月既朢雲谷朱熹謹書跋徳本所藏南軒主一箴敬之一字學者若能實用其力則雖程子兩言之訓猶為剰語如其不然則言愈多心愈雜而所以病乎敬者益深矣誦敬夫之箴者要當以識此意云慶元己未初伏雲谷老人書題吳和中感秋賦後和中感秋作賦既發深省乃欲逃之麴蘖之間叔通以碩果不食者厲之可謂得朋友之職矣顧予姦偽排擯之餘何足知此二君子其相與切磋之時有以見警焉則區區之望也慶元己未八月既朢雲谷老人書跋張以道家蔵東坡枯木怪石蘇公此紙出於一時滑稽詼笑之餘初不經意而其傲風霆閲古今之氣猶足以想見其人也以道東西南北未嘗寧居而能挾此以俱寳玩無斁此其意已不凡矣且不以視王公貴人而獨以誇於畸人逐客則又有不可曉者雲谷老人因覽為識時慶元己未仲秋既朢愚叟之墓已有宿草矣撫玩遺墨相視感慨泫然久之若歸羌廬以視西坡當同此嘆也愚叟謂吕子約晚謫髙安寓大愚寺自號大愚老叟西坡謂黄商伯跋劉子勉行狀余自為童子時得見大夫公於病翁先生之側聞其自誦所為程試之文意氣偉然音節華暢已知敬愛其人後因葬親於公之鄉始得從公逰好欵密見公居家居鄉言行之詳及聞其所以施於官政者表裏殫盡莫非忠厚信實慈恵恭儉之意於是始益心服其為人及公之沒其諸子示以此書盖將使志其墓㑹余方有幽憂之疾不遑序次然三復其文而㕘以平生所聞見盖無一詞之非實也顧念嵗月逾邁後生之及見前輩者日加少而俗愈媮也為之太息而識其後云新安朱熹書跋吉水周君家藏訴牒吉水鄉貢周君訴牒七通其家寳藏閲八世餘二百年矣覽者不暇尋其端原一旦丞相益國公表而出之為之稽考嵗年推校事實上及正朔名諱至纎至悉於是周君之事得以備見其本末其後之人可以益嚴奉守而無所事於他求矣而其孫洽乃徧以属其鄉黨知名之士悉使賛述而揄揚之是則已病於贅而意猶未已又復不逺千里夤緣紹介以諉於余此其為贅豈不又甚矣余欲謝而却之又念無以答其累舍重趼之勤乃書此以諗焉生其持歸杜門讀書求其所未學者以繼乃祖之業毋庸復爾奔走請謁而求無所用之跋語以老嵗月為也噫若余之言固亦無所用者然使生因是而有發焉則猶足為有用也夫慶元己未三月甲子新安朱熹跋山谷草書千文李端叔崇寧三年八月一日題云紹聖中詔元祐史官甚急皆拘之畿縣以報所問例悚息失據獨魯直隨問為報弗隠弗懼一時栗然知其非儒生文士而已也紹聖史禍諸公置對之辭今皆不見於文集獨嘗於蘇魏公家得陸左丞畫一數條皆詆元祐語也其間記黄太史欲書王荆公勿令上知之帖而已力沮止之黄公争辨甚苦至曰審如公意則此為佞史矣是時陸為官長以是其事竟不得書而黄公猶不免於後咎然而後此又數十年乃復賴彼之言而事之本末因得盡傳於世是亦有天意矣惜乎秉史筆者不能表而出之以信來世而顧獨稱其詞筆以為盛美因觀此卷李端叔跋語為之感慨太息輒記其後若其書法則世之有鑒賞者自能言之故不復及云慶元己未十一月既望雲谷老人朱熹記跋陳光澤家蔵東坡竹石東坡老人英秀後凋之操堅確不移之姿竹君石友庶㡬似之百世之下觀此畫者尚可想見也跋陳大夫詩常人之情小有一善則自視哆然若有餘而其責報也欿然常若有所不足所以善日消而惡日長卒以陷溺於利欲之横流而不自知也大夫陳公㢘靖自守不肯屈意權門寧俯首於下寮終身而不悔比其晚嵗僅以年勞得官其世而所以省身知足之意見於短章者乃如此其志念之所存與庸者逺矣嗚呼子孫之賢其亦深念而敬守之也哉慶元己未十一月既望新安朱熹識跋進賢傅君行實從政進賢傅君既沒將葬其子修抱其行實一通不逺千里辱以顧予流涕言曰先人蚤嵗有志功名之㑹中間不幸遭罹國難盖嘗解儒服以事戎行實従宣撫岳公轉戰許洛之間屢以捷告上功未報而南北通和岳公遂罹䜛口失兵柄得竒禍先人為之感慨憤激棄其官勲以歸故里復治家人生産作業教子讀書酌酒賦詩以自排適倐然不知其身之老也晚值慶恩三蒙錫命之寵遂易文階老夀康寧閭里嗟嘆今者不幸至於大故不肖之孤銜哀忍死以奉窀穸之事既有期矣顧恨未得當世之大人君子發其􅅗徳之幽光傳之久逺以覆霑其後嗣是以匍匐而来再拜以請于執事惟公幸哀而與之銘則死者有知亦無恨於泉下矣予視其冠屨應禮而戚容與之稱言詞懇慤情㫖酸辛為惻然動心焉知其平日習於賢父兄之教訓也以是雖不及識傅君而於此得其為人顧念罪戾之餘言語不足以取重當世而疾病摧頽意緒荒忽亦無復心力可以治筆研作文詞矣特以其逺来泣請之哀不可以不答也因為書此于行狀之後使并以視来者云慶元己未十一月辛丑新安朱熹書跋大父承事府君行狀右先大父贈承事郎府君行狀先君太史吏部贈通議大夫君所撰也當時既以請銘於政和主簿盧君㸃未及礱石而羣盜蠭起文書散逸於今僅存半稿不可復刻矣熹竊惟念吾家自歙入閩而府君始葬於此不可使後之子孫不知其時世嵗月與其所以積徳垂慶開祐後人之深意敬立石表刻狀下方立于墓左先世墳廬在婺源者及祖妣孺人以下别葬所在亦具刻于碑隂使来者有考焉盧君字師予老儒博學清謹有馴行定宅者弋陽金生字確然亦㢘節士頗通方外之學姓字皆見先集云慶元五年十有二月甲子孝孫具位熹謹記跋楊子直所賦王才臣絶句王摩詰輞川漆園詩云古人非傲吏自闕經世務偶寄一微官婆娑數株樹余深愛之而以語人輒無解余意者今讀子直此詩而於南谷之篇竊有感焉因識其後復以寄才臣果以為何如也慶元庚申正月二十八日晦翁書楊詩曰南山髙且明其下有深谷文豹識顯藏終朝霧如沐跋黄壺隠所藏師説旰江黄柟達材以其先君子壺隠居士手抄此冊見示乃熹昔年所受師説手書居前記録在後伏讀愀然如復得侍坐左右而聞其緒言也顧恨慵惰不能拳拳服膺以報萬一而荒淺昧陋趣録之際又不能無失其深微之意三復以還不勝悚愧然觀壺隠好學自强樂善不倦乃至於此熹雖不及識面而於此亦足以窺其所存矣因竊記其後而歸之達材昆弟其亦寳蔵敬守精究而勉學焉以無忘前人之訓慶元庚申二月八日新安朱熹謹書跋袁州萍鄉縣社倉記萍鄉胡君安之来學於余一日致其鄉人士君子之意欲余為之記其社倉之役及扣其詳則出是書一卷曰此邑士鍾君詠之所為也是倉之成鍾君及彭君公脩實有力焉故所登載詳悉如此余固嘉其敏於事而又能述以文也因念紹熙甲寅之嵗赴鎮長沙道出兹邑邑之士子導余以觀於其學而請記之及行堂序間則既有亡友劉君清之之刻在焉余拱而讀顧而歎曰美哉乎子澄之言也諸君日誦而時省之則亦無以余言為矣即謝去不敢為而諸生至今猶有望於余也矧曰是倉之成既出鍾君之手而此文又出其筆則亦何以異於學之有記而復何待於余言哉又況天下之事是非得失固有定在而其盛衰興廢亦有繫於時勢而不可常者顧余之衰謝淪落徒足以為是倉之累而不足以増其重諸君亦何所賴而求之若是其勤耶為諸君計莫若具刻鍾君之記以示後人使讀之者有以知其成之之不易如此而不忍壊焉斯亦足矣胡君告歸因跋其尾以授之且以寄謝庠序諸君使毋忘子澄之教也慶元庚申二月辛巳春分晦菴病叟朱熹書跋周司令所藏東坡帖蘇公翰墨為世寳藏故流俗多偽作者余家有其與徳叟先輩書兩紙詞意超然筆勢飛動觀者尚或疑之余亦不能辨也今觀作肅所藏源流有自而二公賞識又如此其亦可以無疑矣五月朔日朱熹云跋章國華所集注杜詩章國華過予山間出所集注杜詩示予其用力勤矣然其所引東坡事實者非蘇公作聞之長老乃閩中鄭昂尚明偽為之所引事皆無根據反用杜詩見句増減為文而𫝊其前人名字託為其語至有時世先後顛倒失次者舊嘗考之知其決非蘇公書也况杜詩佳處有在用事造語之外者唯其虚心諷詠乃能見之國華更以予言求之雖以讀三百篇可也朱熹仲晦書題林汝器論語集説後友人范百崇嘗為予言語孟聖賢之言本自平易又有諸先生相為發明義理昭著如日星然學者體味於心念念不已自然血脈通貫無所底滯然後可言有益於吾身不然涉獵强記無沈浸釀郁之功則其所資亦淺淺焉耳予愛其言因書於林汝器所編論語説後汝器以此説驗之則其所編之是非得失當自見矣題李太白詩世道日交喪澆風變淳原不求桂樹枝反棲惡木根所以桃李樹吐華竟不言大運有興沒羣動若飛奔歸来廣成子去入無窮門林光之攜陳光澤所蔵廣成子畫像来看偶記太白此詩因寫以示之今人捨命作詩開口便説李杜以此觀之何曽夣見他脚板耶書周易參同契考異後右周易參同契魏伯陽所作魏君後漢人篇題盖放緯書之目詞韻皆古奥雅難通讀者淺聞妄輒更改故比他書尤多舛誤今合諸本更相讐正其間尚多疑晦未能盡祛姑據所知寫成定本其諸同異因悉存之以備參訂云題不養出母議後禮不著嫁母之服而律令有之或者疑其不同以予考之禮於嫁母雖不言親而獨言繼又著出母之服焉皆舉輕以明重而見親母之嫁者尤不可以無服與律令之意初不殊也又於為父後者但言出母之無服而不及嫁母是亦舉輕以别重而見嫁母之猶應有服也余觀余正父之所辨貢士之妾母雖非父卒子幼而更嫁然無七出之罪而其去也有故則其實乃嫁母而非出也樂平令尹所論之失正坐以嫁母為出母謂有服為無服而正父之辨之也亦唯此二者之為急耳今乃獨有是嫁母也之一言而不論其所以不為出而猶有服者顧反題其篇端曰不養出母又但論其與古之出母者不同而不可從於不喪之文則亦自相矛盾而反以證成令尹之誤説矣予懼夫覽者之不能無疑故書此以質焉正父雖不能深明其不為出母然亦不敢正以出母目之但篇末一處有不養出母字而自改出字為生字亦可見其大指之所在矣但少著力分明説破耳抑正父之欲使夫人養是母也將使如何而養之耶予聞之母嫁而子從者繼父為之築廟於家門之外使其子祀之而妻不敢與焉説者以為恩雖至親族已絶矣夫不可二故也此則是嫁母者生不可以入于廟死不可以祔于廟而亦不可以養於家矣為之子者率其婦子就母之家或舍其側而養之則於禮也其節矣乎或曰此為母之有家者言之則可矣不幸而無以為家則如之何築室於外可也書張伯和詩詞後右紫微舍人張伯和父所書其父子詩詞以見属者讀之使人奮然有擒滅讐㓂掃清中原之意淳熙庚子刻置南康軍之武觀以示文武吏士跋徐騎省所篆項王亭賦後騎省自言晚乃得闕匾法今觀此卷縱横放逸無毫髪姿媚意態其為老筆亡疑淳熙辛丑仲冬乙酉新安朱熹觀汪伯時所蔵於西安浮石舟中跋蘭亭敘觀王順伯袁起巖論蘭亭序如尤延之著語猶未免有疑論余乃安敢復措説於其間但味務觀之言亦復慨然有楚囚之歎耳朱熹跋汪季路所蔵其外祖湍石喻公所書文中子言行卷後玉泉喻公手書王文中子言行以授其外孫其可謂不言之教矣後學朱熹敬觀淳熙壬寅十二月庚申跋泰山秦篆譜乾道丁亥予訪張敬夫於長沙一日相與謁劉子駒又閱其先世所蔵法書古刻及近世諸公往来書帖竟日不能徧因出泰山秦篆譜曰此雖墨本然舊蔵僅存此紙頃嵗有欲取以入石者顧手澤所在不忍壊遂已獨學易養性二篇乃重刻本因取以見遺予受蔵之後累年乃得篆譜新本於汪季路不知其何從得本以刻也因合二書通為一卷追省前事如宿昔也劉丈多聞彊記清貧苦節少仕州縣遇熙豐故家子孫輒引避饘粥不繼或憊卧終日而處之泰然相見時已老尚能談説往事滚滚不休氣貌醇古自然有前輩風度今不復有斯人矣去嵗守潭俯仰昔㳺㡬閲一世劉丈與敬夫逝去皆已久而劉氏子妷無欲無咎獨能閉門忍窮謹守家法又足令人感慨太息云明年慶元改號嵗在乙卯五月丁未病中讀養性語因記其後跋蔡藻筆後蔡藻造筆能書者識之此故沅州吕使君語也因試其所製棗心様喜方老而益精并深山陽鄰笛之感慶元丙辰冬至前五日晦翁書題袁機仲所校參同契後予頃年經行順昌憩篔簹舖見有題煌煌靈芝一年三秀予獨何為有志不就之語於壁間者三復其詞而悲之不知題者何人適與予意㑹也慶元丁巳八月七日再過其處舊題固不復見而屈指嵗月忽忽餘四十年此志真不就矣道間偶讀此書并感前事戲題絶句鼎鼎百年能㡬時靈芝三秀欲何為金丹嵗晚無消息重歎篔簹壁上詩晦翁跋周益公楊誠齋送甘叔懐詩文卷後退傅精勤小物無有入於無間老監縱横妙用諸相即是非相且道二公用處是同是别叔懐於此卷中直下薦得不妨竒特如或未然待汝一口吸盡西江水即向汝道慶元己未四月甲申朱熹跋陳剛中帖陳剛中詩諸公跋語已具見其顛末周君季宏特以示余使題於後顧熹復何能有所發明但計紹興庚申距今己未六甲五子適一周矣胡陳雖死尚有生氣而彼紛紛者果安在哉嗟嘆不足姑竊識其左方十月甲子雲谷老人朱熹書記逰南康廬山晦翁與程正思丁復之黄直卿俱来覽觀江山之勝樂之忘歸時淳熙己亥重午日翁子在甥魏恪侍行書濂溪光風霽月亭淳熙八年嵗在辛丑夏四月六日後學朱熹張揚卿王沅周頥林用中陳祖永許子春王余隅陳士直張彦先黄榦敬再拜于濂溪先生書堂下惟先生承天畀系道統所以建端垂緒啓佑于我後之人者厥初㒺不在斯堂用咸歎慕低回弗忍去熹乃復出所誦説先生太極圖賛其義以曉衆咸曰休哉退先生之曾孫正卿彦卿𤣥孫濤設饌光風霽月亭祁真卿吳兼善僧志南與熹敬書以誌逰密菴記淳熙辛丑秋七月癸未朱仲晦父劉彦集敬父平父黄徳逺方伯休陳彦忠来逰密菴仲晦父之子塾在彦集之子瑾平父子姪學雅學文學古學博學裘侍向夕冒大雨涉重澗登晝寒亭觀瀑布壯甚明日仲晦父復與彦集平父步自野鶴亭下尋澗底得水石佳處三四規築亭以臨之而陳力就深父繼至見之欣然許相其役遂復登晝寒㑹雨小霽日光璀璨尤覺雄麗歸飲清湍以崇山峻嶺茂林脩竹清流激湍映帶左右分韻賦詩明日復循澗疏理泉石飲罷而還道人宗慧宗歸有約不至晦庵集巻八十四欽定四庫全書晦庵集卷八十五宋朱子撰銘箴贊表疏
