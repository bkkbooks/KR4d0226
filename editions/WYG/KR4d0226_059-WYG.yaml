front:
  text: 林正卿季通書來亦謂正卿甚進不知乃有異論如此此正是渠病處葢不先其在已而欲廣求於外所以向裏不甚得力又不察學者才識之髙下而槩欲其無所不知所以誤得他人亦多馳騖於外吾人當識其好處而畧其所偏也聞渠謫居却能自適亦甚不易歸期正不須問旬呈亦不必求免如陳了翁曾作諫官及被謫猶著白布衫繫麻鞋赴旬呈朝廷行遣罪人正欲以此困辱之若必求免是不受君命也不受君命不受天命也而可乎所論易大槩得之但時事人位等字説得太早今只可且作卦爻看看得通透了到推説處方説得平居無事處時應事之法是第二節事也如乾之初九只是陽氣潛藏之象未可發用之占耳若便著箇不易乎世不成乎名隠而未見行而未成底人坐在裏面便死殺了非所謂潔静精微者若㑹得卦爻本意却不妨當此時居此位作此人也頃年嘗因人問易應之曰公曾看靈棋課否易之模様便只是如此也後有人問豈以其不足告而云爾耶此錯認了話頭也試思之
