body:
  text: 答林正卿觀變於隂陽而立卦發揮於剛柔而生爻分竒偶便是畫積畫便成卦卦中看畫便是爻若如所説只是引證作文不知四句之義又如何説諺所謂囫圇吞棗者是也何由知其味耶伏羲畫卦以寫隂陽之變化文王周公作彖爻辭以決天下之疑孔子作彖象傳以推明事物當然之理然爻畫既具而三者已備乎其中前聖後聖互相發明耳此説近之然亦未盡所以名卦之例非一端有兼取二義二象者有專取二義者有專取二象者有兼取二象與人情者有專取人情者有兼取一象與隂陽之位者有取爻畫之多寡者有取爻畫兼二象者有取變卦者有取爻畫之形與二義者有不可曉者且逐卦玩索當見各有意味不須如此安排貪多涉淺勞心費力不濟得事家人卦乾剛也施於家則離兌説也施於家則亂坤静也施於家則廢震動也施於家則擾坎艮非所取義惟明而順家之道也穿鑿得不好革與睽相類睽上火下澤則不相入此火在澤下有變革之理睽中女在前少女在後有相離之義而此以中女繼少女故曰革鑿豫四以震體之陽為隂主如大臣轉天下之危為安上無為而下佚樂故曰豫此等處孔子分明説順以動豫理甚分明安得舍之而自為説耶大病只是著力安排不曾虚心玩味耳中孚外剛中柔至誠惻怛之人也得無色厲内荏之姦耶大抵此一類都不是此特其小失耳以伏羲易觀之則看先天圖如寒暑往來隂陽代謝若有推排而又莫知其所以然者以文王周公易觀之則六十四卦之名乃十八變以後之私記三百八十四爻乃三變竒偶之私記潛龍牝馬等物如今之卦影勿用利有攸往等語如今斷卦之文以孔子易觀之則卦名者時也事也物也初二三四五上者位也而初上又或為始末之義九六者人之才也處某事居某時用某物其才位適其所當則吉不然則凶始末一本作始終此説近之然乃知此而又不免為前段之支蔓穿鑿何耶然乃一本作然既易有取兩卦象以為法者有取卦名之義而思所以處之者有取二義而思所以處之者亦不必如此籠罩易疏論連山歸藏一以為伏羲黄帝之書一以為夏商之書未知孰是無所考當闕之論上下二經為文王所分果可信否亦不必論論六十四卦重於伏羲果否此不可考或耒耜市井已取重卦之象則疑伏羲已重卦或者又謂此十三卦皆云葢取則亦疑詞未必因見此卦而制此物也今無所考只説得到此以上當且闕之但既有八卦則六十四卦已在其中此則不可不知耳答林正卿所示易疑恐規模未是葢讀書之法須是從頭至尾逐句玩味看上字時如不知有下字看前句時如不知有後句看得都通透了又却從頭看此一段令其首尾通貫然方其看此段時亦不知有後段也如此漸進庶幾心與理㑹自然浹洽非惟㑹得聖賢言語意脈不差且是自己分上身心義理日見純熟若只如此匆匆檢閱一過便可隨意穿鑿排布硬説則不唯錯㑹了經意於已分上亦有何干涉耶且如看此幅紙書都不行頭直下看至行尾便只作旁行横讀將去成何文理可試以此思之其得失亦不難見也答林正卿季通云亡凡在同志無不痛傷然人生要必有死遲速逺近亦何足較聞其臨行却甚了了區處付屬皆有條理亦足强人意也所示中庸疑義畧此條析奉報大率朋友看文字多有淺迫之病淺則於其文義多所不盡迫故於其文理亦或不暇周悉兼義理精微縱横錯綜各有意脈今人多是見得一邊便欲就此執定盡廢他説此乃古人所謂執德不𢎞者非但讀書為然也要須識破此病隨事省察庶幾可以深造而自得也答曹元可示喻為學之意仰見造詣之深不勝歎仰然嘗聞之為學之實固在踐履茍徒知而不行誠與不學無異然欲行而未明於理則所踐履者又未知其果何事也故大學之道雖以誠意正心為本而必以格物致知為先所謂格物致知亦曰窮盡物理使吾之知識無不精切而至到耳夫天下之物莫不有理而其精藴則已具於聖賢之書故必由是以求之然欲其簡而易知約而易守則莫若大學論語中庸孟子之篇也是以頃年嘗刻四古經於臨漳而復刻此四書以先後其説又畧述鄙意以附書後區區於此所以望於當世之友朋者葢已切矣歸來只有數本皆為知識持去不得納呈然彼間相去不逺自可致之不難也讀之有得復以見教千萬之望答李巽卿所喻進學處事之意省察警懼固當如此然頭緒太多却成紛擾但將聖賢之書小立程課熟讀深思反復玩味以栽培澆灌自有長進處不必如此閑計度也答程次卿示喻存心之説此固為學之本然來喻又有所謂有是事必有是理者不知又何從而察之耶若如所謂當應事然後思是事之理當接物然後思是物之理則恐思之不豫而無所及若豫講之則又䧟於所謂出位而思念慮紛擾之病竊意用力之久必有説以處此矣幸明告我得以反復之答龔惟微聞進學不倦之意甚幸甚幸但春秋之説向日亦嘗有意而病於經文之大畧諸説之太煩且其前後抵牾非一是以不敢妄為必通之計而姑少緩之然今老矣竟亦未敢再讀也來喻以為他處皆可執其一説以為據獨即位之説為難通愚恐其所執之説未必聖人之真意而非獨即位之説為無據也若只欲為塲屋計則姑取其近似而不害理者用之若欲真實為學則不若即他書之易知者而求之庶明白而不差也答龔伯著示喻以門户之故不免兩用其心於道全未有得此今日士子之通患但窮達有命非可力求若其有之當不待求而自至如其無之求亦奚益惟道義在我人皆有之而求無不得今乃以彼而易此其於利害之筭可謂舛矣願以此而反思之庶乎其有决也答汪叔耕十月二十三日熹扣首啓叔耕茂材郷友辱書并示詩文論説甚富三復不置足以見鄉道之勤衛道之切而所以用力於詞章者又若是其博而篤也顧惟衰晚於道既無所聞不足以堪見予之意而少日粗親筆研終不能窺作者藩籬且自覺其初無補於身世遂用絶意棄去不為今數十年矣又無以知所論之中失而上下其説也然私竊計之鄉道之勤衛道之切不若求其所謂道者而修之於已之為本用力於文詞不若窮經觀史以求義理而措諸事業之為實也葢人有是身則其秉彛之則初不在外與其鄉往於人熟若反求諸已與其以口舌馳説而欲其得行於世孰若得之於已而一聽其用舎於天耶至於文章一小伎耳以言乎邇則不足以治已以言乎逺則無以及人是亦何所與於人心之存亡世道之隆替而校其利害勤懇反復至於連篇累牘而不厭耶足下志尚髙逺才氣明决過人逺甚而所以學者未足以副其天資之美熹竊惜之又念其所以見予之厚而不忍忘也不敢不盡其愚足下試一思之果能舍其舊而新是圖則其操存探討之方固自有次第矣請繼今以言人還姑此為報向寒千萬以時為親自愛不宣熹再拜答汪叔耕來書所論向來為學次第足以見立志之髙矣然雜然進之而不由其序譬如以枵然之腹入酒食之肆見其肥羮大胾餅餌膾脯雜然於前遂欲左挐右攫盡納於口快嚼而亟吞之豈不撑腸拄腹而果然一飽哉然未嘗一知其味則不知向之所食者果何物也今承來喻將欲損其逐末玩華之習而加反本務實之功則善矣然所論周程傳授次第恐亦有未易言者而以太極圖為有單傳宻付之三昧則又近世學者背形逐影指妄為真之弊也夫道在目前初無隠蔽而衆人沈溺膠擾不自知覺是以聖人因其所見道體之實發之言語文字之間以開悟天下與來世其言丁寧反復明白切至惟恐人之不解了也豈有故為不盡之言以愚學者之耳目必俟其單傳宻付而後可以得之哉但患學者未嘗虚心静慮優柔反覆以味其立言之意而妄以已意輕為之説是以不知其味而妄意乎言外之别傳耳不欺論中所談儒佛同異得失似亦未得其要至論所以求乎儒者之學而以平其出入之息者參之又有忘心忘形非寐非寤虚白清鏡火珠静月每現輙變之説則有大不可曉者不知儒者之學自六經孔孟以來何嘗有是説而吾子何所授受而服行之哉所以求之者如是之雜無怪乎愈求而愈不得也而反自謂將從主静持敬應事接物以求之則有没世而不能達者是豈應事接物主静持敬之罪哉如此不已不唯求之不得而已愚恐其必將有狂易喪心之患竊為吾子憂之不敢不以告也幸且置此而即聖賢之言平易明白之處虚心平氣熟玩而躬行之玩之深則理自明行之篤則力自進持之以久亹亹而上達焉則道體精微之妙聖賢親切之傳不待單傳宻付而已了然心目之間矣其他所論亦儘有合商量處未暇悉陳然根本若正則此等枝葉亦不待辨而明矣史論却勝他書然姑少後之而先其本則其所至又當不止此也大學章句一本附往古人為學規模及今日用力次第盡在此矣幸試詳之勿以為老生常談而忽之也答李元翰元翰前日説得儘近似今看所示又説開了葢前日所説尤非實見故把捉不定又㑹走作爾如前日云存得此心即便是仁此句甚好但下面説合於心者行之不合於心者勿為又説從義上去了不干仁事矣今所寫來者乃先存得此心一句便只説合於心為之云云却是全説不符也今且只以孟子仁人心也義人路也兩句看來便見仁義之别葢仁是此心之德纔存得此心即無不仁如説克己復禮亦只是要得私欲去後此心常存爾未説到行處也纔説合於心者云云則便侵過義人路底界分矣然義之所以能行却是仁之用處故學者須是此心常存方能審度事理如其不然則方寸之間自無主宰亦不復能審度可否而行所當行矣此孔門之學所以必以求仁為先葢此萬事之原萬事之本且要先識認得先存養得方有下手立脚處爾其他所論未稳者多但先看此一節久之自見得也答陳與叔夢良弟子職音韻此非大義所繫不暇深考夢良竊意弟子職一章自先生施教弟子是則以下似言學莫先於立教云云自志無虚邪以下又詳言其學之之功如此云云此説得之然亦本無奥義不必如此之詳也夢良竊意弟子職一章論教學之方其所以敬親事長從師受業與夫洒掃應對進退之要皆括乎是自二章至末十二章又分明條具其節目之詳由早至夜周旋從事葢為纎悉其四章弟子饌饋注饋謂選具在食葢饌乃訓具食饋訓進食恐饋者是進具在之食疑進字誤作選字未審如何又飯是為卒注既飯而食則卒義未能通五章三飲二斗注三飯必毁二斗及左執虚豆斗是何器毁義如何左執虚豆欲何用六章拚前枚祭枚字何訓何用物搜歛所祭置之何地八章葉適已葉義如何葉是箕舌此句即曲禮所謂以箕自鄉者也章措摠之法注摠設燭之束類今時何物此段中小字先生批此數條多所未詳但貳是周禮再貳一貳之貳葢必所食已盡而增益之也故執虚挾匕視其不足者而貳之但豆中有物而謂之虚此不可曉爾大學明明德新民皆欲止於至善而傳之一章結語止言自明而二章結語乃言無所不用其極二章兼明自新新民之事故通結之下章又自正解止於至善之意初不相妨也胡子知言曰天下莫大於心患在不能推之爾莫久於性患在不能順之爾莫成於命患在不能信之爾不能推故人物内外不能一也不能順故死生晝夜不能通也不能信故富貴貧賤不能安也先生嘗以延平先生讀正䝉書語示夢良此後五峯胡子書竟未敢看然此段語已嘗熟誦自見得説心著大字推字性著久字順字命著成字信字為有理恐大亦是與天地同體之意久只是常而不變之意成只是一定不易之意否此段好但㸃出兩處理㑹不得子在川上曰逝者如斯夫不舍晝夜程子曰自漢以來儒者皆不識此義此見聖人之心純亦不已也純亦不已乃天德也有天德便可語王道其要只在謹獨竊意其要在謹獨莫是工夫無間斷否川流不息天運也純亦不已聖人之心也謹獨所以為不已學者之事也夫仁者已欲立而立人已欲達而達人能近取譬可謂仁之方也已集注以上一截説仁之體下一截説仁之術而程子於此二截乃合而言曰欲令如是觀仁可以得仁之體程子合而言之上下句似不相應不若分作兩截看然惟其仁者之心如此故求仁之術必如此也答陳與叔所示疑義各已批鑿附回幸更思之且於義理上留心制度名物少緩亦不妨也答方履之杜門讀書謝去場屋自計已決夫復何言逖聞髙風第劇歎尚但所謂難者過之不復致疑此則汎汎悠悠恐不得力目前雖似無事向後無歸宿處茫然如未始學者則恐不免却有多事之累也平生見朋舊間好資質而似此者多矣私心嘗竊深歎惜之故不願賢者之為之也因便寓書并此奉曉幸試思之以為如何也答方若水壬龍巖之行若問得實使無罪者不以寃死而有罪者無所逃刑此非細事也静退之説亦甚善但今亦未是教人求退只是要得依本分識廉恥不敢自􅃷自鬻以求知求進耳然亦須是讀書窮理使方寸之間洞見此理知得不求只是本分求著便是罪過不惟不可有求之之迹亦不可萌求之之心不惟不得説著求字亦不可説著不求字方是真能自守不求人知也答方子實芹之昨者經由幸獲一見别又數月豈勝馳情令叔來承書獲審比日秋冷德履佳勝為慰熹比幸粗遣無足言長泰令兄幸得同事相去不逺亦時相見也跋語殊犯不韙更勤刻畫為愧益深耳示喻主敬之説先賢之意葢以學者不知持守身心散漫無縁見得義理分明故欲其先且習為端莊整肅不致放肆怠惰庶幾心定而理明耳程子無適之適訓之訓往而讀如字論語無適之適訓專訓主而讀如的其音義皆不同不當以此而明彼細考之可見程子之云只是持守得定不馳騖走作之意耳持守得定而不馳騖走作即是主一主一即是敬只是展轉相解非無適之外别有主一主一之外又别有敬也答何巨元進之杜門讀書固為可樂而入居學校又可推以及人想賢者於此亦不憚應接之煩也示喻人物之説未知康節之意果如何但如來喻以隂陽分之似亦有理大抵先天圖自復至乾為陽自姤至坤為隂隂陽所主既有淑慝之分則人物所禀亦不能無純駮之辨也手探足躡出於一時之謬説無足深論當時但以姤在上而復在下故以手足言之耳四端之説若以體用言之則體為首而用為末若自其發處而言則發之初為首而發之終為未二説亦不相妨熟玩之可見也匆匆奉報幸更思之有所未安復以見喻幸甚答程成甫熹服膺二先生之教有年矣雖幸得誦其詩讀其書然猶以未得識其子孫為恨兹迺辱書欣感無量且承叙述世次行治之詳使得聞之又嘆大賢之後中間流落不偶至於如此甚者遂至淪陷隔絶而無聞獨幸賢者於此乃能守其門户而不失其問學之傳猶足以自慰也今郡博士又能屈致以為學校之重其所以望於賢者豈不欲其服先生之服誦先生之言行先生之行以警動其學者而勉勵之哉荷意之勤敢申其説以致區區之意惟左右者念之答竇文卿辱書知進學不倦之意甚善甚善但自以不能致疑便謂賢於辨論而不能行者似有臨深為髙不求進益之病亦未免為自畫也彼以空言生辨我以實見致疑自不相妨固不當以似彼為嫌而倦於探討亦不當一槩視彼皆為空言而逆料其全無實見也顔子以能問不能以多問寡曷嘗敢是已非人而自安於不進之地哉程先生説於不疑處有疑方是長進此不可不深念也知日誦四書時時省察此意甚善但不知何故都無所疑恐只是從頭讀過不曾逐段思索玩味所以不見疑處若果如此則不若且看一書逐段思索反復玩味俟其畢而别換一書之為愈也近思録説得近世學問規模病痛親切更能兼看亦佳也公謹未及附書相見煩致意渠從吕東萊讀左傳宜其於人情物態見得曲折今乃如此不解事何耶德章似亦不安其官頗有責上責下而中自恕之意皆是學問不用力處吾輩觀此真當痛自警省實下工夫也答竇文卿為學之要只在著實操存宻切體認自已身心上理㑹切忌輕自表襮引惹外人辨論枉費酬應分却向裏工夫答竇文卿示喻問學之難豈獨今日吾黨但當日加持守省察之功而不廢講誦討論之業專以古人之為已者為師而深以今人之為人者為戒則庶乎其無負平生之志矣答竇文卿夫為妻喪未𦵏或已𦵏而未除服當時祭否不當祭則已若祭則宜何服恐不當祭熹家則廢四時正祭而猶存節祠只用深衣涼衫之屬亦以義起無正禮可考也節祠見韓魏公祭式未葬不當祭時或遇先忌又不知當祭否若祭則又何服忌者喪之餘祭似無嫌然正寢已設几筵即無祭處恐亦可暫停也凡題主男子婦人無官稱者宜何書伊川主式已詳言之可考也夫在妻之神主宜何書何人奉祀若用夫則題嬪某氏神主旁注夫某祀否夫祭妻而云奉祀莫太尊否旁注施於所尊以下則不必書也古者父在子為母期夫為妻期其練祥禫之祭皆同今制夫為妻服與古同而子為母齊衰三年則夫為妻大祥之日乃子為母小祥之祭矣至於子為母大祥及禫夫已無服其祭當如何恐只是夫為祭主其辭曰夫某為子某薦其祥事如曾子問宗子為介子之禮不識可否今禮几筵必三年而除則小祥大祥之祭皆夫主之但小祥之後夫即釋服大祥之祭夫亦恐須素服如弔服可也以祭但改其祝詞亦不必言為子而祭也父在母没父既除期之喪子尚為母服其見父之時當以何服此於禮無文但問喪有父在不杖之説可更檢疏議參訂之子之所生母死不知題主當何稱祭於何所祔於何所今法五服年月篇中母字下注云謂生已者則但謂之母矣若避嫡母則止稱亡母而不稱妣以别之可也伊川先生云祭於私室禮記曰妾母不世祭於子祭於孫止又曰妾祔于妾祖姑既不世祭至後日子孫有妾母又安有妾祖姑之可祔耶不知合祭幾世而止此條未詳舊讀亦每疑之更詢考也妾母若世祭其孫異日祭妾祖母宜何稱自稱云何世祭與否未可知若祭則稱之為祖母而自稱孫無疑矣答李公晦所喻數條蘇氏逺慮之説只是譬喻未必專以地言謀道一章若取舊説則二語為復出矣兼又有以學求禄之嫌恐不若今文協而義精也知及仁守之説則是但此亦泛言如云知之非艱行之惟艱古之聖賢亦未嘗無此戒也恕之示義亦佳先儒訓詁直是不草草也正思所言覽之令人感歎偶其鄉人有在此者當轉致其家也至之一族被擾非常極可念渠近日講論儘精細但前日忿不思難生此辠端累及無辜為可恨耳聞其敵近日遣人四出捕緝至有來此登門尋覔者惜不及知不得收縳送官耳近日章徐皇甫黄商伯四章各出何人之手幸宻批示答李公晦墓銘前已為令叔言之矣若無此慮豈敢辭也子約之亡深可痛悼不知諸公能因此事惻然於中盡還諸遷客否如其不然舂陵之請適足為禍亦尚未見復之當即作書以力止其行耳近日蘇子曰日字疑任德翁文字當已見之宜春之詬至今未知此近事之鑒也答李公晦所喻四説往嵗在彼固皆聞之只是欠却明理其説如東坡所謂不以火㸃終不明耳説詩近修得國風數巻舊本且未須出甚善答李處謙昨辱逺訪深以不獲一見為恨及得所留書而讀之益知賢者之有志慶閥之多才又重以為喜也大抵為學當以存主為先而致知力行亦不可以偏廢縱使已有一長未可遂恃以輕彼而長其驕吝克伐之私况其有無之實又初未可定乎凡日用間知此一病而欲去之則即此欲去之心便是能去之樂但當堅守常自警覺不必妄意推求必欲舍此拙法而必求妙解也答劉復之衰朽益甚思與朋友反復講論而外事紛擾不能如願如復之者又相去之逺不得早晩相見為恨然此事全在當人自家著力雖日親師友亦須自做功夫不令間斷方有入處得箇入處却隨時游心自不相妨雖應科舉亦自不為科舉所累也答楊子順履正示喻具悉古人之學雖不傳於天下而道未嘗不在於人心但世之業儒者既大為利禄所決潰於其前而文詞組麗之習見聞掇拾之工又日夜有以滲泄之於其後使其心不復自知道之在是是以雖欲慕其名而勉為之然其所安終在彼而不在此也及其求之而茫然如捕風繋影之不可得則曰此亦口耳之習耳吾將求其躬行力踐之實而為之殊不知學雖以躬行力踐為極然未有不由講學窮理而後至今惡人言仁言恕言西銘言太極者之紛紛而吾乃不能一出其思慮以致察焉是惡人説河而甘自渴死也豈不誤哉承許枉臨尚須面論紛紛一本作紛紜答楊子順來書所論為學大意似已得之但賢者本自㑹説説得相似却不為難只恐體之未實即此所説皆是空言不濟事耳又以後書孟子之説考之即前書所謂講明義理以為涵養培植之地者似若未精此處尚且未精則其本領工夫恐未免亦類此也孟子所云必有事焉乃承上文集義而言語脈通貫即無敬字意思來厯但反覆讀之便自見得不假注釋矣明道之語却是借此四句移在敬字上説非解此章文義不若伊川先生之説為得本文之意然其解正字即是助長則亦未安記得一處説正之之甚遂至於助長此語却差近然猶有所未盡也若看得本文語脉分明而詳考集注以究其曲折子細識認見得孟子當時立意造語無一字無來厯不用穿鑿附㑹枉費心力而轉無交涉矣來書所云孟子不肯措恁説欲學者體認此處喫緊工夫又云學者纔要修身正心便是助長告子釋氏之學皆坐此爾又云但嫌於迂曲其文以從注釋此皆非是而第二條為尤甚請更詳之也答楊子順所喻數條皆善如克己復禮工夫只是如此著實用力久之自然見效若只如此做閒話説過則不濟事矣天下歸仁亦是畧以其效言之非是便能使天下皆知吾之仁也但言若能如此則雖天下之大亦無異詞耳人稱不稱固非已之所急但其效自必至如此食而飽飲而醉亦固然之理也云天下皆歸吾仁之中即是太作意説得張皇了仁義禮智是性之四德四端乃其發處乃所謂情也孟子論性而曰乃若其情則可以為善正指其發處以明其本體之有是耳非直指四端為性也鍾磬有特懸者有扁懸者其特懸者器大而聲宏雜奏於八音之間則絲竹之音皆為所掩而不可聴故但於起調畢曲之時撃其本律之懸以為作止之節其扁懸者則聲器皆小故可以雜奏於八音之間而不相凌也不知今世所謂大樂者其制如何但以理推之意古者當如此耳魂氣之説近之但便謂魂為知則又未可大抵氣中自有箇精靈底物即所謂魂耳正名一義乃可與權者之事今以常情論之決不能合不若且置勿論而於君臣父子大倫之正深致察焉則亦不待他求而其輕重取舍之間當自知所處矣此亦食肉之馬肝不須深論也至於書中所説則狷忿之外加以猜防意思殊覺鄙陋此是氣質本不髙明寛廣又為學日淺未有得力處所以不免如此今且未論其他只夫子乗桴之歎獨許子路之能從而子路聞之果以為喜且看此等處聖賢氣象是如何世間許多紛紛擾擾如百千蚊蚋鼓發狂閙何嘗入得他胸次耶若此等處放不下更説甚克已復禮直是無交涉也至之粗疎不如子順細宻然此等處却似打得過正好相切磋也儀禮此間所編已畧定便遽未暇詳報亦恨賢者未能勇於自拔不能一來共加刋訂耳答楊子順謂一隂一陽之謂道已涉形器五性為形而下者恐皆未然隂陽固是形而下者然所以一隂一陽者乃理也形而上者也五事固是形而下者然五常之性則理也形而上者也試更思之即可見矣答楊子順所示疑義若據易文即艮其背即止其所之義而伊川説作兩般恐非經之本指然其言止欲於無見乃非禮勿視勿聴之義於學者亦不為無用更思之答李寳之祭禮畧看已甚可觀但特牲第一條凖前篇例合入祭義耳其他更俟詳考續奉報唯祭法及宗廟兩篇附諸篇後不見祭祀綱領恐須依向寫去者移在諸篇之前為祭禮之首但舊作兩篇太細碎今可只通作祭法一篇如此則王制一段周禮事鬼神􅅘之日及祭法本文皆可全載不必拆開矣祭法禘郊祖宗更攷國語去取又鄭注恐不可用次特牲次少牢次有司次諸侯釁廟次諸侯遷廟次祼獻易名甚當但前篇之例依儀禮本又皆自下而上故其序當如此次祭義内事此如來示合祭義祭統為之通言上下祭先之義故又加内事二字以别後篇次中霤次郊社次祭義外事此為中霤郊社兩篇之義其蜡祭等説亦附此此祭禮篇目也其他大傳外傳向已附去者可并為之只此目中祭義内外二篇及中霤郊社二篇亦未編定幸并留念也禘郊祖宗之説公穀國語家語趙氏春秋纂例中説横渠禮説皆當考也祭法祭義及遷廟附記三篇今附還可照前説重定為佳中霤郊社二篇可并編定其祭義内外事兩篇并處諸篇之後亦佳祭法内郊之祭也一章當入外事篇他皆放此答吴生玭熹遲鈍之資總角聞道終躬求之未有得也賢者誤聴以為可與言者誨諭詳悉皆非熹所敢當也而令弟仲方判院之來又幸數得從容開警雖多然所未合者亦不少熹既以乍到疾病公私紛冗而匆匆遽歸之際仲方亦不甚佳遂不得竟其説至今以為恨也葢道之體用雖極淵微而聖賢言之則甚明白學者誠能虚心静慮而徐以求之日用躬行之實則其規模之廣大曲折之詳細固當有以得之燕閒静一之中其味雖淡而實腴其㫖雖淺而實深矣然其所以求之者不難於求而難於養故程夫子之言曰學莫先於致知然未有能致知而不在敬者而邵康節之告章子厚曰以君之材於吾之學頃刻可盡但須相從林下一二十年使塵慮銷散胸中豁豁無一事乃可相授正為此也今觀來喻似於義理未有實見而强言之所以談經則多出於新竒立意則或流於偏蕩而辭氣之間又覺其無温厚和平歛退篤實之意是固未論其説之是非而此數端者已可疑矣豈於先賢指示入道之方猶有所未至耶抑已講之而用力有未至耶若熹之愚無以及此然荷不鄙不敢不盡其愚而又不敢摘一辭之未達一義之未安以浼髙明之聴也區區拙直言不能文恕其僭率千萬之幸答吴斗南人傑竊伏田間久聞德義且知著述甚富每以未得亟見其人而盡讀其書為恨兹辱惠問并寄古易刋誤二書所以見屬之意甚勤且厚非熹淺陋之所能堪也比日春和敬惟撫字有相尊履萬福二書三復不能去手可謂極精博矣鄙意尚有欲奉扣者迫此治行之冗未能盡布别紙略見一二幸復有以告之他書承許盡以見寄何幸如之但洪範詩樂二論尤欲早得之或其餘未能悉辦且先得此幸甚幸甚來書又謂方思所以收其放心而患於未有以自入此見髙明之志又將有意於古人為已之學不但為言語誦説之計而已區區不敏尤所敬歎葢竊嘗謂今之人知求雞犬而不知求其放心固為大惑然茍知其放而欲求之則即此知求之處一念悚然是亦不待别求入處而此心體用之全已在是矣由是而持敬以存其體窮理以致其用則其日增月益自將有欲罷而不能者矧以執事之明而加意焉則其見聞之博參考之詳亦何適而非窮理之地哉如其不然則是直為玩物喪志而已固知賢者不屑為此然熹之愚不得不為執事者慮之也感見與之勤不敢隠其固陋伏惟察焉旦夕南去相望益逺惟幾以時自愛亟膺召用時時書來慰此窮寂千萬之望别紙一本作答吴斗南古易既畫全卦繫以彖辭又再畫本卦分六爻而繫以爻辭似涉重復且覆卦之法不知何所考據近歲林栗侍郎乃有此説然其法又與所論小異不知曾見其書否渠亦自以為先儒未發之秘則是古未嘗有是説也且如所論以用九為少陽用六為少隂如此只當為用七用八矣何九六之有乎此與啟蒙陋説正相南北不審今當定從何説因筆幸見喻也吕伯恭頃嘗因晁氏本更定古易十二篇考訂頗詳然據淳于俊之説便以今王弼易為鄭康成易嘗疑其未安今得所示分别鄭王二本乃有歸著甚善甚善然不知别有何證據也未有文字已有此書謂有此理則可謂有此書則不可繫辭恐并彖辭亦是葢彖繫於全卦之下而爻繇分繫於逐爻之下其經只是連書并在卦下不再畫卦如今所定之本也彖傳釋卦辭象傳釋爻辭繫辭傳則通釋卦爻之辭故統名之曰繫辭傳恐不可改繫辭傳為説卦葢説卦之體乃分别八卦方位與其象類故得以説卦名之繫辭傳兩篇釋卦爻之義例辭意為多恐不得謂之説卦也大傳言繫辭者四今攷其二上文皆兼卦爻而言恐不得專以為爻辭其一雖專指爻辭則爻辭固繫辭之一也其一為七八九六而言七八九六雖是逐爻之數然全卦七八則當占本卦辭三爻七八則當占兩卦辭全卦九六則當占之卦辭卦辭固不害其為繫辭也蔡墨謂乾之坤曰見羣龍無首吉則覆卦之説有不可行者矣漢書刋誤固多熹所未講然其暗合者亦多但劉氏所斷句如項羽傳由是始為諸侯上將軍儒林傳出入不悖所聞者此類甚多皆與史記合恐當表而出之以見其非出臆斷唯為原廟渭北一條頃見一書廟渭之間有於字亦其明證但今不記此出處徧檢史記漢書之屬皆無之恐或記得幸批喻也劉氏所疑亦自有舛誤處如溝洫志第二條於楚字本文自屬下句下文於呉於齊於蜀字皆是句首而劉誤讀屬之上句乃不悟其非而反疑本文之誤補遺未之正也楚詞協韻尚多謬誤幸略為訂之復以見喻尚可修改也答吴斗南便中奉告感慰亡量比已改歲竊惟履此泰亨倍膺多祉熹承攝於此忽已踰年疾病侵凌無一日好况請祠不遂經界之役得請後時不可舉手少須三五月即復告歸矣世路艱棘不若歸卧田里以休餘年及人之事非復吾力之所及矣每誦先聖不夢周公之嘆未嘗不慨然也承受代改秩亦既有期甚以為慰不知諸公相知者為誰鼎之有實宜謹所之我仇有疾乃無尤耳前寄諸書竟未得細考然疑諸儒之説有不足信據者要當審擇而遴取之乃無誤耳今此所寄却得一觀恨讀書少未能有以上下其論然亦有一二疑處假開多事便人行速未暇一一奉扣姑録一二别紙奉呈幸一一批報頃見東漢討羌檄日辰與通監長厯不同又沈存中筆談所載朱浮傳引天作詩目今范書印本亦異不記前書曾奉問否今亦見紙尾幸併喻及也李彦平所見趙顔子不知何人莫是永嘉趙彦昭否其所論學大意甚佳然恐於窮理功夫有所未至則亦只㝠行終不能升堂睹奥直入聖賢之域也裒集程門諸公行事頃年亦嘗為之而未就今邵武印本所謂淵源録者是也當時編集未成而為後生傳出致此流布心甚恨之不知曾見之否然此等功夫亦未須作比來深考程先生之言其門人恐未有承當得此衣鉢者此事儘須商量未易以朝耕而暮穫也心不耐閒亦是大病此乃平時記憶討論慣却心路古人所以深戒玩物喪志政為此也此後且當盡心一意根本之學此意甚善今人陷於所長決不能發此聴信身心也佛學之與吾儒雖有畧相似處然正所謂貌同心異似是而非者不可不審明道先生所謂句句同事事合然而不同者真是有味非是見得親切如何敢如此判斷耶聖門所謂聞道聞只是見聞玩索而自得之之謂道只是君臣父子日用常行當然之理非有𤣥妙竒特不可測知如釋氏所云豁然大悟通身汗出之説也如今更不可别求用力處只是持敬以窮理而已參前倚衡今人多錯説了故每流於釋氏之説先聖言此只是説言必忠信行必篤敬念念不忘到處常若見此兩事不離心目之間耳如言見堯於羮見堯於牆豈是以我之心還見我心别為一物而在身外耶無思無為是心體本然未感於物時事有此本領則感而遂通天下之故矣恐亦非如所論之云云也所云禪學悟入乃是心思路絶天理盡見此尤不然心思之正便是天理流行運用無非天理之發見豈待心思路絶而後天理乃見耶且所謂天理復是何物仁義理智豈不是天理君臣父子兄弟夫婦朋友豈不是天理若使釋氏果見天理則亦何必如此悖亂殄滅一切昏迷其本心而不自知耶凡此皆近世淪陷邪説之大病不謂明者亦未能免俗而有此言也子合便人督書甚速草草布此手痛復作不能究所欲言何時面談倒此胸臆正逺唯千萬自愛為禱答吴斗南所示廟議乃全用左氏臨于周廟一條為説然不知似此安排有何經據如髙祖以下通為禰廟已非所安又皆以西為上乃後漢同堂異室之制無復左昭右穆之分非古法也若如江都集禮所載孫毓之説却似可信而所示舊太廟圖近之不知是誰所定但其圖又以廟皆東向而以北為昭南為穆乃是室中祫祭之位而非廟制耳周有帝嚳廟禮書並無此文左傳亦無此説似難臆斷况僖祖只可比后稷又與帝嚳不相似如此牽合如熹之陋固不敢盡信况朝廷諸賢皆深於禮者恐亦未敢便依此改作也草木疏用力多矣然其説蘭蕙殊不分明葢古人所説似澤蘭者非今之蘭澤蘭此中有之尖葉方莖紫節正如洪慶善説若蘭草似此則決非今之蘭矣自劉次莊以下所説乃今之蘭而非古之蘭也今並引之而無結斷却只辨得畦畹二字似欠子細又所謂蕙以蘭推之則古之蕙恐當如陳藏器説乃是若山谷説乃今之蕙而亦非古之蕙也此等處正當掊撃乃見功夫今皆如此放過似亦太草草矣荼恐為蓼屬見詩疏載芟篇故詩人與堇並稱堇乃烏頭非先苦而後甘也又云荼毒葢荼有毒今人用以藥溪取魚荼是其類則宜亦有毒而不得為苦苣矣如薺如飴乃詩人甚言周原之美舊室之悲如易之載鬼詩之童羖非荼實能甘也熹讀書最少然見此類不能無疑者尚多則恐此書亦更少子細也若論為學則考證已是末流况此又考證之末流恐自此不須更留意却且收拾身心向裏做些工夫以左右之明其必有所至矣若遂困於所長而不知所以自反則熹之愚竊為賢者惜之也因便奉報不覺傾倒勿過勿過南北相望未知見日千萬珍重以副願言答輔漢卿廣示喻所疑足見探討不倦之意前時所報實有錯誤已令直卿子細報去矣熹向於中庸章句中嘗著其説今并録去可見前説之誤也漢卿身在都城俗學聲利場中而能閉門自守味衆人之所不味雖向來金華同門之士亦鮮有見其比者區區之心實相愛重但恨前日相見不款今又相去之逺無由面講以盡鄙意更幾勉力卒究大業答輔漢卿近况如何既失楊館之期後來别有相聚處否讀書既有味想見自住不得近看舊作諸書其間有説未透處見此畧加刋削深覺義理之無窮也答輔漢卿所記鄙語亦有小小差誤處便中未暇詳報并所改書亦未暇寫寄不知近讀何書有疑示及此間今嵗絶無人來只所招上饒某人早晚講論耳答輔漢卿知徙居寛曠不廢讀書足以為慰此間年來應接差簡然苦多病不能用力文字間又無朋友共講間有一二則其鈍者既難凑泊敏者又不耐煩有話無分付處甚思賢者相聚之樂也諸書無人整頓抄寄然改處亦不多但所録語儘有商量恐非面不能盡耳風力稍勁而此一等人多是立却不住千萬更加勉力以副所期餘祝自愛而已柴中行聞報漕司考校之語其詞甚壯亦聞之否答輔漢卿年滿七十禮合休致又以罪戾不敢自上奏牘百端懇禱僅得州郡申省狀一紙今託常寧游宰附與邸吏投之已子細寫與十弟更煩賢者同為分付此事或觸禍機不可知但已斷置一切不須較矣恐有浮議相阻止者幸勿聴也比來看何文字做何工夫亦頗有進處否向所寄來冊子方為看得一半其間亦有不足記者其小未備者已頗為補足矣後便方得寄去也精舍亦有朋友數人相聚李敬子胡伯量尚未去早晚頗有講説但每相與共恨賢者之不同此樂也只是禮書不能得成又以氣痞不可凭几恐此事又成不了底公案也省榜非久當出不知一畨朋友得失如何味道聞寓書館今尚留否耶其在彼者頗皆相見否當此時節立得脚定者亦甚難得人况更向上事耶答輔漢卿省闈不利亦是時節如此看此火色且得安坐喫飯已是幸事豈可别有冀望耶承許秋涼相訪甚幸此箇道理功夫本不可有間斷時節目下雖無人講貫自已分上思索體認持守省察自不可頃刻虚度如此積累功夫則其間必有所大疑亦必有所大悟一旦相聚覿面相呈如決江河更無凝滯矣今以謝致仕表附便去令十弟分付投下及更料理一二事渠相見必自説及恐有可疑合商量處亦望與之剖決也昨承許借博古圖甚欲見之但重滯如何得來可更試為籌度也答輔漢卿精舍有朋友十數人講學頗有趣仲秉甚不易逺來看得文字亦好但恨漢卿不同此㑹耳答陳思誠景思承喻為學之意與其所聞於師友而服膺弗失者甚慰甚幸然此乃近世所謂詭偽之學而斥去之者向來雖或好之今亦隠諱遁逃之不暇以賢者之門地聲迹葢將進為於斯世者而乃有意於此何嗜好之異耶夫名實義利為已為人之判正則之言是也但其所為者要當真實有用力處所不為者要當深自省察蚤戒而預逺之是乃所謂徴驗之實不然則提空名以鄉道而實無以自拔於流俗之所為則亦君子之不取也荷意之勤率易布此不識以為然否然勿以語人又千萬之懇也答陳衛道鞏疏示所見此固足以自樂賢於世之沈迷冒没之流逺矣但猶有許多節次脈絡何耶然以釋氏所見較之吾儒彼不可謂無所見但却只是從外面見得箇影子不曾見得裏許真實道理所以見處則儘髙明脱洒而用處七顛八倒無有是處儒者則要得見此心此理元不相離雖毫釐絲忽間不容畧有差舛才是用處有差便是見得不實非如釋氏見處行處打成兩截也嘗見龜山先生引龎居士説神通妙用運水般柴話來證孟子徐行後長義竊意其語未免有病何也葢如釋氏説則但能般柴運水即是神通妙用此即來喻所謂舉起處其中更無是非若儒者則須是徐行後長方是若疾行先長即便不是所以格物致知便是要就此等處微細辨别令日用間見得天理流行而其中是非黑白各有條理是者便是順得此理非者便是逆著此理胸中洞然無纎毫疑礙所以才能格物致知便能誠意正心而天下國家可得而理亦不是兩事也天生烝民有物有則只生此民時便已是命他以此性了性只是理以其在人所稟故謂之性非有塊然一物可命為性而不生不滅也葢嘗譬之命字如朝廷差除性字如官守職業故伊川先生言天所賦為命物所受為性其理甚明故凡古聖賢説性命皆是就實事上説如言盡性便是盡得此君臣父子三綱五常之道而無餘言養性便是養得此道而不害至微之理至著之事一以貫之畧無餘欠非虚語也此話甚長非幅紙可盡然其梗槩於此可見不審明者以為如何因風示及有所未契尚容反復也答陳衛道示喻謹悉但今欲為儒者之學却在著實向低平處講究踐履日求其所未至所謂樂處却好且拈向一邊久逺到得真實樂處意又自别不似此動蕩攪聒人也性命之理只在日用間零碎去處亦無不是不必著意思想但每事尋得一個是處即是此理之實不比禪家見處只在儱侗恍惚之間也所云釋氏見處只是要得六用不行則本性自見只此便是差處六用豈不是性若待其不行然後性見則是性在六用之外别為一物矣譬如磨鏡垢盡明見但謂私欲盡而天理存耳非六用不行之謂也又云其接人處不妨顛倒作用而純熟之後却自不須如此前書所譏不謂如此正謂其行處顛錯耳只如絶滅三綱無父子君臣一節還可言接人時權且如此將來熟後却不須絶滅否此箇道理無一息間斷這裏霎時間壊了便無補填去處也又云雖無三綱五常又自有師弟子上下名分此是天理自然他雖欲滅之而必竟絶滅不得然其所存者乃是外面假合得來而其真實者却已絶滅故儒者之論每事須要真實是當不似異端便將儱侗底影象來此罩占真實地位也此等差互處舉起便是不勝其多寫不能窮説不能盡今左右既是於彼留心之久境界熟了雖説欲却歸此邊來終是脱離未得熹向來亦曾如此只是覺得大槩不是了且權時一齊放下了只將自家文字道理作小兒子初上學時様讀後來漸見得一二分意思便漸見得他一二分錯處迤邐看透了後直見得他無一星子是處不用著力排擯自然不入心來矣今云取其長處而㑹歸於正便是放不下看不破也今所謂應事接物時時提撕者亦只是提撕得那儱侗底影象與自家這下功夫未有干涉也鄙見如此幸試思之還説得病痛著否因來却見喻也中庸欲修改未得功夫然看文字亦不可如此一輥念過便只領畧得儱侗影象不見裏面間架詳宻毫髪不可差處須是且看一書一日只看一兩段俟其通透浹洽然後可漸次而進也必竟之必恐當作畢答陳才卿前書所論方叔所説不同者只是渠以知覺為性此是大病後段所謂本然之性一而已矣者亦只是認著此物而言耳本領既差自是不能得合今亦不能枉費言語但要學者見得性與知覺字義不同則於孟子許多説性善處方無窒礙而告子生之謂性所以為非者乃可見耳才卿所論中庸戒懼謹獨二事甚善但首章之説性或通人物或專以人而言此亦當隨語意看不當如此滯泥也葢天命之性雖人物所同稟然聖賢之言本以修為為主故且専言人而修為之功在我為切故又有以吾為言者如言上帝降衷于民民受天地之衷以生不可謂物不與有孟子言我善養吾浩然之氣不可謂他人無此浩然之氣也又謂微細之物亦皆有性不可以仁義禮智而言微物之性固無以見其為仁義禮智然亦何縁見得不是仁義禮智此類亦是察之未精當更思之又謂所謂率性只就人物當體而言却欲刪去而言之三字此亦誤矣道只是性之流行分别處非是以人率性而為此道也謝氏天地不恕之論所説亦未當凡此之類有本不須致疑者但且虚心反復當自見得不必如此横生辨難枉費詞説也答陳才卿子顔一室蕭然有以自樂令人敬歎看詩且如此亦佳大凡讀書須且虚心參驗久當自見切忌便作見解主張也玉山所説當已見之若嫌離析即却教他揑做一團也所答守約書大槩得之更當虚心玩味當更純熟也離析下一本無即字答陳才卿秋試不逺計不免小忙然以義理觀之此亦當有處也來書所喻大率少寛裕之氣有勁急之心如此不已恐轉入棒喝禪宗矣切宜省覺不可一向如此也子融看得文字痛快直截可喜想時相見正叔在此無日不講説終是葛藤不斷也答陳才卿方叔子融曾相見否方叔看得道理儘自稳實却是子融去嵗在此講論多不合處中間葢嘗苦口言之後來一向不得書不知能相信否似渠堅苦力量朋友間豈易得覺微有向外欲速意思便做出許多病痛學者於此豈可不痛加省察或因通書幸為致意答陳才卿詳來示知日用功夫精進如此尤以為喜若知此心此理端的在我則參前倚衡自有不容捨者亦不待求而得不待操而存矣格物致知亦是因其所已知者推之以及其所未知只是一本元無兩様工夫也答陳才卿新詩甚佳康節胸懐未易窺測須更於實地加功若只就之乎者也上學他恐無交涉也答陳才卿熹碌碌如昨但年老益衰已分上自未有得力處朋友功夫亦多間斷方以為憂而忽此紛紛遂皆不敢為久留計未知天意果何如也答陳才卿傳簿赴部何時可歸待次之間且勉其讀書為學亦非細事也熹今年足疾為害甚於常年氣全滿凭几不得縁此禮書不得整頓且看向後病勢又如何若有可奉煩者即奉寄也禮學是一大事不可不講然亦須看得義理分明有餘力時及之乃佳不然徒弊精神無補於學問之實也答陳才卿知看儀禮有緒甚善此書雖難讀然却多是重復倫類若通則其先後彼此展轉參照足以互相發明久之自通貫也此間所編直卿及用之兄弟分去謄寫尚未送來熹以苦氣痞殊甚不能俯伏几案嵗晚諸人或來即開正不免作數月功夫自聴對讀或可了也傳兄相聚看得甚文字想其家務不能專一不免小作課程而令其日有常度則積累久之自見功效矣明年只在水北即亦相去不逺猶不廢切磋之益也子融日益孤髙深可歎羡一書却煩達之答陳才卿精舍朋友往來不常早晚頗有講問之樂但病軀應接比之日前頗費力耳禮書得直卿劉用之在此漸可整頓然亦多費功夫甚恨相去之逺不得賢者之助也所示儀禮所疑此等處難卒説但看時隨手劄記向後因讀他處邂逅或有發明自不費力今徒守此一處反成擔擱虚度光隂不濟事也其他更讀何書子融相聚有何講論因筆及之所願聞也答陳才卿熹衰病如昨加以患難今嵗夏間復失一小孫秋來又有仲婦之戚悲傷之餘羸困益甚細讀來喻知亦有災患不知何故然亦深為怛然也示喻憂懼所奪工夫不進此亦别無他巧但得勉力向前爾答陳才卿正叔别後書來復有疑問已詳報之託其轉寄才卿可便依此作日用功夫不須更生疑慮空費談説過却光隂也答陳才卿彼中相聚子弟幾人有可告語者否此亦時有朋友往來但難得身心純一功夫不間斷耳答陳才卿所喻誠意之説只舊來所見為是昨來章句却是思索過當反失本㫖今已改之矣正叔子融相聚累日多得講論甚恨才卿獨不在此也諸書二兄處皆有本歸日必同觀有疑幸詳諭及康節文字二兄亦已見之熹亦不能盡究其説只啟蒙所載為有發於易他則别成一家之學季通近編出梗槩欲刋行旦夕必見之然亦不必深究也答陳才卿熹衰晚甚幸復安外祠之禄深以自慶但使賢者為亂夢不無愧耳大學章句或問比復畧修大㫖不殊但稍加精約耳中庸亦更欲刪訂大抵舊書太冗也遇事固不當有所厭然謂欲放令此心疏豁無所執滯此却恐硬差排不得著意開放却成病痛但且守常程久之純熟自然疏豁乃佳耳子融説得樂意生香處甚痛快但恐又轉入舊腔裏也答陳才卿正叔遽至於此令人痛傷人生虚浮朝不保夕深可警懼真當勇猛精進庶幾不虚作一世人也答余正叔示喻已悉前日所論正為敬義工夫不可偏廢彼專務集義而不知主敬者固有虛驕急迫之病而所謂義者或非其義然專言主敬而不知就日用間念慮起處分别其公私義利之所在而決取舍之幾焉則恐亦未免於昏憒雜擾而所謂敬者有非其敬矣且所謂集義正是要得看破那邊物欲之私却來這下認得天理之正事事物物頭頭處處無不如此體察觸手便作兩片則天理日見分明所謂物欲之誘亦不待痛加遏絶而自然破矣若其本領則固當以敬為主但更得集義之功以祛利欲之蔽則於敬益有助葢有不待著意安排而無昏憒雜擾之病上蔡所謂去却不合做底事則於用敬有功恐其意亦謂此也正叔本有遲疑支蔓之病今此所論依舊墮在此中恐亦是當時鄙論不甚分明致得如此故今復如此剖析將去使正叔知得鄙意不是舍敬談義去本逐末正欲兩處用功交相為助正如程子所謂敬義夾持直上達天德自此者耳今亦不須更生疑慮别作商量但請依此實下功夫久逺純熟便自見得也前日三詩首篇計功程字是大病根而其下亦未見的實用功得力之處後二篇亦未見踐言之效只成虚説尤犯聖門大禁大槩皆是平日對塔説相輪慣了意思致得如此須是勇猛決烈實下功夫力捄此病不可似前泛泛悠悠虚度時日也答余正叔示喻日用工夫甚副所望然前者所論未嘗欲專求息念但以為不可一向專靠書冊故稍稍放教虚閒務要親切自已然其無事之時尤是本根所在不可昏惰雜擾故又欲就此便加持養立个主宰其實只是一个提撕警策通貫動静但是無事時只是一直如此持養有事處便有是非取舍所以有直内方外之别非以動静真為判然二物也上蔡之説便是如此亦甚要切但如此警覺久逺須得力爾千萬且於日用間及論語中著力令有个㑹通處即他書亦不難讀爾答余正叔熹一出無補幸已還家又幸奉祠遂請且得杜門休息間讀舊書雖葵藿之心不敢弭忘然疎逺之分亦不敢不安何也别後讀書觀理復增勝否熹歸家只看得大學與易修改頗多義理無窮心力有限奈何唯需畢力鑽研死而後已耳答余方叔大猷所喻别紙奉報幸更思之有所未安復以見告講論不厭精審方見義理之真然亦須是虚心平氣方能精審若以一時粗淺之見便自主張即無由有進處也大猷竊謂仁義禮智信元是一本而仁為統體故天下之物有生氣則五者自然完具無生氣則五者一不存焉只是説及本然之性先生以為枯槁之物亦皆有性有氣此又是以氣質之性廣而備之使之兼體洞照而無不徧耳天之生物有有血氣知覺者人獸是也有無血氣知覺而但有生氣者草木是也有生氣已絶而但有形質臭味者枯槁是也是雖其分之殊而其理則未嘗不同但以其分之殊則其理之在是者不能不異故人為最靈而備有五常之性禽獸則昏而不能備草木枯槁則又并與其知覺者而亡焉但其所以為是物之理則未嘗不具耳若如所謂纔無生氣便無此理則是天下乃有無性之物而理之在天下乃有空闕不滿之處也而可乎他説皆得之但謂敬只是防去此等以復於理語意未切須知敬即此心之自做主宰處更宜用力即自見得也答趙恭父師惠書得聞為學之志固已甚幸又觀所論條目甚詳皆學者通患顧非親曾用力不能知耳大抵只是主敬功夫不至致得間斷但日用間常自提撕勿令昏惰則久久自長進矣答趙恭父所示諸説備見用意之精然看得皆過髙不平稳若一向如此説即非唯令人解經不得雖聖賢亦無開口處凡有言語皆為剰物矣又説日用間似見光景不覺喜悦此亦非好消息且宜就平實明白處看道理是非久之自然開明安稳無凝滯也儀禮文字却好致道一篇已入注疏他時諸篇皆當放此或所附之文有難曉者亦當附以注疏也致道告歸甚令人作惡此間事渠能言之更不縷縷渠認得門路却不錯但恐未有勤懇積累工夫凡百更相勸勉為佳耳答趙恭父謹終追逺游氏曰終者人之所易忽也而謹之逺者人之所易忘也而追之厚之至也竊意游氏意恐指凡事而言非專為喪祭而發夫顙泚非為人愴悽非謂其終之當謹非謂其逺之當追是皆天理人心不能自己非若凡事玩於常情故終謹於始而及其終也往往易以忽闕為近及逺也往往易以忘非謂下元本空一字其一本作葢聖人之言為衆人發非專為賢者發也故其所言皆理之所當然而人多不能然者若皆如來喻則世間更無背死忘先之人不待堯舜而比屋常可封矣曾子亦不須説此兩句程子亦不當兼説喪祭也富貴是人之所欲一章恐亦不可小看看此自非顔閔以上工夫至到者恐未易言看文字只虚心隨文平看豈有所説本小而須作大看之理此章之指更宜深玩方見實用力處原思為之宰疑亦以類相從而别為一章未詳此類亦多分得不同如仲弓子桑顔淵子路不曾分子賤子貢回也冉求却分了葢一時失於㸃對然非大義所繫不能易也要之不若皆析為二乃佳賢哉回也章集注云今不敢妄為之説某竊疑下克己復禮之云已煞為學者説破却似剰著此語不曾説樂處如何所樂何事也用之則行舍之則藏章竊疑唯我與爾之與是訓同則誰與吾不與之與是訓許故竊以為恐難合作一章詳集注意夫子行三軍必與已同意子路自謂若行三軍則舍我復誰同耶但覺得氣象太粗暴若作兩章而不害其相蒙則字義既明而氣象亦不覺至如此也分章已見前説但與字恐難作兩般説子路問得粗暴是其氣象如此雖作兩章然粗暴亦只在也况彼之粗暴吾又安能追而抑之耶吾止吾往也竊意文義恐吾者聖人自吾也若如所解即句内字數不足聖人之言不如是之造作竒巧也君子不以紺緅飾注云君子謂孔子下文蘇氏曰此孔子遺書雜記曲禮非特孔子事此二義兼存以待學者之自擇未有一定之説集注解回也其庶乎屢空章言其近道又能安貧也竊疑又字似作兩截葢樂道故能安貧而安貧所以樂道也世間亦有美質而能安貧者皆以為知道可乎更思之論篤是與章集注云云詳此文義恐只是説不可以言取人下文又言不可以貌取人何也色莊便是兼著貌字祭義深愛和氣一節承上文孝子之祭不詘不愉不欲等語而發非獨為敬齊之色一句也其下乃迤邐雜記孝事未必為祭發也所編者但取其相闗者附之經下其全篇且與泛存祭統先於祭義亦無害也鄉飲酒義謹按此篇自鄉飲酒之義而下先儒以為記鄉大夫飲賔于庠序之禮自鄉飲酒之禮而下先儒以為記黨正飲酒于庠序以正齒序之位今詳考其文由前之説則有所謂古之學術道者將以得身也云云固足以見賔興之意由後之説則有所謂六十者坐五十者立侍以聽政役之類亦足以證序齒之事但某竊疑儀禮所載鄉飲只是鄉大夫興其賢能而以禮賔之不知説禮者何取於黨飲而記為是義據鄭注云漢郡國以十月行此飲酒葢取黨正之説然則自鄉飲酒之禮而下豈自成一章之文乃世儒述其所以有取於黨正之義而因以傅益之耶淺陋未得其説此無他義只是作記者并舉之耳燕義首載庶子官一節未詳據文勢恐當以諸侯燕禮之義為篇首而置庶子官一節於篇末乃成文耳當如此内則一篇文理宻察法度精詳見古先聖王所以厚人倫美教化者無所不用其全某疑中間似有難看處如飯黍稷稻梁止大夫於閣三士於坫一一節與上下文似不相蒙豈特載此因以著夫貴賤品節之差耶又凡養老止𤣥衣而養老一節疑王制文重出不然亦豈先王之成法因子事父母而達之天下以及人之老哉又曾子曰孝子之養老也止至於犬馬盡然而况於人乎一節雖承上章養老之文而云然此篇既曰后王命冢宰降德于衆兆民則是古昔盛時朝廷所下教命恐不應引到曾子之言疑是他簡脱誤在此耳又凡養老五帝憲止皆有惇史一節疑錯簡恐或當在上文𤣥衣而養老之下又淳熬止以與稻米為酏一節亦疑錯簡恐或當屬上文冬宜鮮羽膳膏羶及雉兔皆有芼之下自此外數節上下井井有條獨此未易曉暢養老一節舊亦疑之似當削去曾子惇史兩節亦然但説飲食處未知如何更詳考之所削去者亦須别收勿使漏失某比在侍側見余正甫云奔喪投壺兩篇可補儀禮之闕心甚喜之近見禮記釋文引鄭氏篇目注獨此二篇注云實曲禮之正篇也餘皆否某竊詳謂之正篇則非先儒雜記之文又按儀禮疏云儀禮亦名曲禮又禮器注云曲禮謂今禮也禮篇多亡本數未聞某謂鄭氏所謂今禮即指儀禮而言然則可補儀禮之闕似無疑矣内則附昏禮後作傳文亦善少儀附相見禮則疑未安葢其間數節見少儀已編入本篇矣餘為雜記恐不足以相證而徒足以相亂耳未知是否禮經殘缺可疑者不能一二數凡此非敢泛然煩瀆師聽但據眼前編集文字因致愚慮於其間理既有疑問不容已自餘不惟不敢肆其狂斐即亦未暇及悉告尊察少儀亦是無收附處且因篇首之言而附之耳若以為疑不知却合如何區處幸批報也答趙恭父所喻數條皆善然當實用其力乃見意味徒為空言雖多無益也大學或問所改首尾兼該本末具備若只讀一半截便下注脚宜其不能不有偏倚之疑也鄙意却嫌全提直指四字近禪學語未暇改也又論亦有真知而自欺者此亦未然只此自欺便是知得不曾透徹此間昨晚有嘗鼠藥而中毒者幾致委頓只此便是不曾真知砒霜能殺人更何疑耶然又不是隨衆畧知之外别有真知更須别作道理尋求但只就此畧知得處著實體驗須有自然信得及處便是真知也所謂退人一步低人一頭者此則甚善致道恐亦不可不聞此説可更相勉勵今已是不得已而從官唯有韜晦静黙勿太近前為可免於斯世耳一或不幸為人所知便不是好消息也答趙恭父所論大學則似不必如此致疑此等大槩諷詠畧見經意以助知新之功耳如此拘滯却成支蔓而墮於異學之所訶矣要之淇澳言其明德而可以新民以見明德之極功烈文因言非獨一時民不能忘而後世之民亦不能忘以見新民之極功自是語勢當然况又無可疑耶親賢樂利上四字皆自後人而言下四字或指前王之身親賢或指前王之澤樂利又皆毫分縷析無可疑者可試考之當自見得也答趙恭父道心雖微然非人欲亂之則亦不至甚難見惟其人心日熾是以道心愈微也人之所以為人以其有是性耳若云性之所以為性則語意大重複矣君子之時中與索隠行怪兩章未是可更將章句反覆體認不須便如此立説也體羣臣子庶民子字與吕説不異體字雖小不同然吕説大意自好不欲廢也勸者所以致吾親愛之心而慰悦其意也親親似多一字然非大義所繫不能深論也前知之説章句中説得已自分眀經綸大經立大本似亦是看得章句未熟知逺之近亦不必如此迫切却有不實之病知風之自一句尤無著落須看教寛平著實乃佳耳大學若從物格上看下去即不可不如此之意甚少更詳之答趙詠道熹求道不力衰晚無聞辱問之勤不知所以為報然少嘗聞之天下有正理唯博學審問慎思明辨不先自主於一偏之説而虚心以察衆理之是非乃可以自得於一定之説而無疑若得一先入之言而媛媛姝姝自以為足便謂天下之美無易於此則不唯不足以得天下之正理亦歸於陋而已矣胡子曰學欲博不欲雜欲約不欲陋此天下之至言也願明者以是思之若曰佛老之説衆人亦知其非豈以彼之明智而肯取以為用此殆侏儒觀優之論今固未論有見於吾道者之如何但讀近嵗所謂佛者之言則知其原委之所在矣此事可笑非面見極談不能盡其底裏然為學之初便欲窮其説之是非而去取之則又恐緑衣黄裏之轉而為裳也如渉大水渺無津涯要當常以聖賢之言為標凖則不至於陷矣令弟致道在此相聚數月雖未能悉力鋭進亦似頗識為學之門戸經由必能具道此間曲折凡此所未及言者可問而不暇盡布也答趙致道師夏所疑理氣之偏若論本原即有理然後有氣故理不可以偏全論若論禀賦則有是氣而後理隨以具故有是氣則有是理無是氣則無是理是氣多則是理多是氣少即是理少又豈不可以偏全論耶答趙致道周子曰誠無為幾善惡此明人心未發之體而指其已發之端葢欲學者致察於萌動之微知所決擇而去取之以不失乎本然之體而已或疑之以謂有類於胡子同體而異用之云者遂妄以意揣量為圖如后此明此證惡幾周子誠幾善幾胡氏誠幾之意之説善幾善惡雖相對當分賔主天理人欲雖分𣲖必省宗孽自誠之動而之善則如木之自本而幹自幹而末上下相達者則道心之發見天理之流行此心之本主而誠之正宗也其或旁榮側秀若寄生龎贅者此雖亦誠之動則人心之發見而私欲之流行所謂惡也非心之固有葢客寓也非誠之正宗葢庶孽也茍辨之不早擇之不精則客或乗主孽或代宗矣學者能於萌動幾微之間而察其所發之向背凡其直出者為天理旁出者為人欲直出者為善旁出者為惡直出者固有旁出者横生直出者有本旁出者無源直出者順旁出者逆直出者正旁出者邪而吾於直出者利導之旁出者遏絶之功力既至則此心之發自然出於一途而保有天命矣於此可以見未發之前有善無惡而程子所謂不是性中元有此兩物相對而生又曰凡言善惡皆先善而後惡葢謂此也若以善惡為東西相對彼此角立則是天理人欲同出一源未發之前已具此兩端所謂天命之謂性亦甚汙雜矣此胡氏同體異用之意也此説得之而圖子有病已畧改定更詳之四子言志一條程子曰夫子與㸃葢與聖人之志同便是堯舜氣象故子路若達為國以禮道理却便是這氣象也何也葢為國不循理道則必任智力不任智力則循理道不能出此二途也曾㸃有見乎發育流行之體而天地萬物之理所謂自然而然者但吾不以私智擾之則天地順序而萬物各得其所此堯舜事業也子路則以才氣之勝自以為雖當顛沛敗壊不可支持之處而吾為之亦能使之有成子路誠足以任此矣然不免有任智力之意故志意激昻而氣象勇鋭不若曾㸃之閒暇和平也然不曰理而曰禮者葢言理則隱而無形言禮則實而有据禮者理之顯設而有節文者也言禮則理在其中矣故聖人之言體用兼該本末一貫若曾㸃則見其體而不及用識其本而違其末所以行有不掩而失於狂矣得之上蔡云佛氏之言性如儒者之言心釋氏之言心如儒者之論情葢釋氏以作用者為性而儒者以主宰為心所以相似也釋氏以縁景而生者為心儒者以感物而動者為情所以相似也大要釋氏不識理故其言遞低一級故雖欲歸於清浄寂滅而卒不能離乎形而下者也然雖遞低一級而僅相似即其僅相似者實大不同何也其於作用則不分真妄而皆以為真其於感物則不分真妄而皆以為妄儒者則於其中分真妄云耳此其大不同也大槩亦是荀子言性惡禮偽其失葢出於一大要不知其所自來而二者亦互相資也其不識天命之懿而以人慾横流者為性不知天秩之自然而以出於人為者為禮所謂不知所自來也至於以性為惡則凡禮文之美是聖人制此以返人之性而防遏之則禮之偽明矣以禮為偽則凡人之為禮皆反其性矯揉以就之則性之惡明矣此所謂互相資也告子杞栁之論則性惡之意也義外之論則禮偽之意也亦得之答趙致道人心道心一章其上三句只循中庸章句叙説看未有所疑所謂允執厥中之中不知指何者而言若言時中恐於提綱挈領處未遽及此若言未發之中則所謂人心道心正是因已發而言兼未發之時亦難以言執今欲於人受天地之中上看未知可否程子曰惟精惟一所以至之允執厥中所以行之如此則所謂允執厥中正時中之中矣惟精惟一正是提綱挈領處此句乃言其效耳程子言仕宦奪人志或言為富貴所移也愚意以為不特言此但才仕宦則於窒礙處有隨宜區處之意浸浸遂入於隨時狥俗之域與初間立心各别此所謂奪志也不知程子之意果出於此否又不知人未免仕宦而有此病又何以救之敢乞指誨所喻奪志之説是也若欲救此但當隨事省察而審其輕重耳然㡬微之間大須著精彩也考異荅汪叔耕來書書有熹扣首啓前此人還奉書草草深以未得面論為恨專人至此荐辱枉書獲聞新歲以來起居佳勝為慰少儀亦是無收附處一無收字晦庵集卷五十九欽定四庫全書晦庵集卷六十宋朱子撰書知舊門人問答答朱朋孫長書垂示尤荷不鄙所論為學之意又足以見雅志之所存也夫學非讀書之謂然不讀書又無以知為學之方故讀之者貴專而不貴博葢惟專為能知其意而得其用徒博則反苦於雜亂淺畧而無所得也今一旦而讀八書則其茫然而不得其要也豈足怪哉願且致精一書優柔厭飫以求聖學功夫次第之實俟其心通意解書冊之外别有實下功夫處然後更易而少進焉則得尺得寸雖少而皆為吾有矣欲為沙隨程丈立祠甚善但衰病不堪思慮曲折已報余正父矣幸察之答周純仁彼中既有故舊可以相依氣候亦須差勝嶺外又在鄉里逺亦時得親闈安問於理似亦可少安年來時論似亦漸平昨日又聞廟堂一畨除拜固不足為吾道之重輕然於故舊或畧能垂意但在自己分上只合閉門堅坐聽其所為切不可因此便起妄念徒爾紛紜有損無益也所欲買書偶小兒赴銓未歸己為託相識置到付之來人數在别紙可自檢㸃付來楮券殊少不足於用已為兌數券買去然尚有不能盡買者及所補印漢書不知是要何等紙板様大小如何其人未敢為印有便子細報及當續為印也閒中無事固宜謹出然想亦不能一併讀得許多似此專人往來勞費亦是未能省事隨寓而安之病又如多服闕熱藥亦使人血氣偏勝不得和平不但非所以衛生亦非所以養心竊恐更須深自思省收拾身心漸令向裏令寧静閒退之意勝而飛揚躁擾之氣消則治心養氣處世接物自然安稳一時長進無復前日内外之患矣答周純仁神也者妙萬物而為言者也止既成萬物也本義云云某竊謂上言六子用文王八卦之位者以六子之主時成用而言故以四時為序而用文王後天之序下言六子用伏羲八卦之位者推六子之所以主時成用而言故以隂陽交合為義而用伏羲八卦之序葢隂陽各以其偶合而六子之用行所以能變化盡成萬物也伏羲八卦則兌震以長男而合少女艮巽以長女而合少男皆非其偶然故自動萬物者莫疾乎雷至終萬物始萬物者莫盛乎艮皆别言六子之用故以四時之次言之則用文王八卦之序下則推其所以成用於隂陽各得闕故用伏羲八卦之序若上用伏羲卦次則四時失其序下用文王八卦則兌震艮巽皆非其偶矣伏羲卦序與今卦序不同不知是孔子創為之而作序卦耶抑自文王周公繫辭之後已更伏羲之序如此而孔子特以序卦明其義耶伏羲自是伏羲卦序文王周公自是文王周公卦序答周南仲南往嵗湖寺雖嘗獲一面而病冗不能款扣餘論後乃得見廷對之文切中時病深以歎服益恨相去之逺不得㑹聚以講所聞也兹辱惠書又見季通具道遊從切磋之益深以為慰比日雪寒德履佳福熹頑鈍之學晚方自信每病當世道術分裂上者入於佛老下者流於管商學者既各以其所近便先入者為主而又驅之以其好髙欲速之心是以前者既以自誤而遂以自欺後者既為所欺而復以欺人文字愈工辨説愈巧而其為害愈甚不有明者孰能舍其舊而新是謀哉來喻許以所疑下詢幸甚大抵聖賢之言已是明白真實説盡道理讀者但能虚心一意循序致詳使其句内無一字之不通則其道理無一毫之不察矣切不可為人大言相誑如九方臯相馬之説者而妄意馳逐於言語之外也方賔王每書來説得道理儘有歸著知與遊從可謂得友恐今已歸嘉禾也周叔謹行草草附此不能究所言政逺切祈珍重答周南仲承喻教學相長之意尤副所望但為學之序必先成已然後可以成物反復來示似於自己分上未免猶有所闕恐不若且更向裏用工也此心此理元無間斷虧欠聖賢遺訓具在方冊若果有意何用遲疑等待何用凖擬安排只從今日為始隨處提撕隨處收拾隨時體究隨事討論但使一日之間整頓得三五次理㑹得三五事則日積月累自然純熟自然光明矣若只如此立得箇題目頓在面前又却低徊前却不肯果決向前真實下手則悠悠嵗月豈肯待人恐不免但為自欺自誣之流而終無得力可恃之地也何程二君能招致之甚善甚善來書已報之矣闕書中問及三事雖未要切然已是能著實講究若闕未可量也後來之秀未見有能勇往直前探討負荷以續傳道之脈兹為可歎耳答周南仲誠其意者自修之首也毋者禁止之辭自欺云者知為善以去惡而心之所發有未實也慊快也足也獨者人所不知而已所獨知之地也言欲自修者知為善以去其惡則當實用其力而禁止其自欺使其惡惡則如惡惡臭好善則如好好色皆務決去而求必得之以自快足於已不可徒茍且以狥外而為人也然其實與不實葢有他人所不及知而已獨知之者故必謹之於此以審其幾焉答周南仲此言小人隂為不善而陽欲掩之則是非不知善之當為與惡之當去但不能實用其力以至此耳然欲掩其惡而卒不可掩欲詐為善而卒不可詐則亦何益之有哉此君子所以重以為戒而必謹其獨也答孟良夫猷示喻為學之意甚善但伊洛垂訓以持敬為先此要切之語若不於此處立得根本即讀書應事思惟計度徒成紛擾卒無歸宿之所也若能於此用力則動静之間無適而不為學矣有書數冊託茂實送學中與諸生共之能往一觀當有益也聞當路有奉薦者足見公論之不泯甚慰然更深其本以須時用乃所望耳答許生中應去嵗陸闕先過此極道左右賢德令聞之美甚恨跧伏無因縁相見今者乃承惠書一通反復讀之益見所以求道鄉學之意深以為幸至於稱引前輩比擬非倫則有所不敢當也左右以應舉覔官美名好事之學為不足學而欲講乎義理以求修已治人之方固已不繆於所趨矣夫道之體用盈於天地之間古先聖人既深得之而慮後世之不能以達此於是立言垂教自本至末所以提撕誨飭於後人者無所不備學者正當熟讀其書精求其義考之吾心以求其實參之事物以驗其歸則日用之間諷誦思存應務接物無一事之不切於已矣來喻乃謂讀書逐於文義玩索墮於意見而非所以為切已之實則愚有所不知其説也世衰道微異論蠭起近年以來乃有假佛釋之似以亂孔孟之實者其法首以讀書窮理為大禁常欲學者注其心於茫昧不可知之地以僥倖一旦恍然獨見然後為得葢亦有自謂得之者矣而察其容貌辭氣之間修已治人之際乃與聖賢之學有大不相似者左右於此無乃亦惑其説而未能忘耶夫讀書不求文義玩索都無意見此正近年釋氏所謂看話頭者世俗書有所謂大慧語録者其説甚詳試取一觀則其來厯見矣若曰儒釋之妙本自一同則凡彼之所以賊恩害義傷風壊教聖賢之所大不安者彼既悟道之後乃益信其為幻妄而處之愈安則亦不待他求而邪正是非已判然於此矣又如所謂寧有人皆得見之過無或有不睹不聞之欺夫中庸之言正謂道體流行初無間斷是以無所不致其戒懼非謂獨戒懼乎隱微而忽畧其顯著也若如來喻則人所共見之處間斷多矣而曰循是存養不疾不徐吾恐其未免為好髙欲速之尤者也至如孟子所謂非義襲而取之文義本自分明而今學者未嘗細考但據口耳相承以至施安失所者葢十人而二五也既勤下問不敢不盡其愚然亦未暇詳究其曲折幸深察之當否俟報也近至富沙見陳安舍人説及建閣藏書事欲以記文見委而未得其詳今收張卿元善蔡兄季通書備見首末偶數日脚氣發作不能飲食而右臂亦痛至不能親執筆憊卧支離口占布此知代期不逺他日病起草得記成當因薛卿轉達代者或同官中必有能竟其事者但恐文詞鄙俚議論不同未必可用耳答章季思康辱書具悉雅志大抵聖賢之教不過博文約禮四字博文則須多求博取熟講而精擇之乃可以浹洽而通貫約禮則只敬之一字已是多了日用之間只以此兩端立定程課不令間斷則久之自有進歩處矣答顔伯竒昆仲椅柖聖門設教具有科條持守講習要當各致其功無所偏廢而不使有頃刻之間斷焉則當有以自得其趣矣答杜叔髙游往嵗辱訪於湖寺且以佳篇為贈讀之知所志之不凡然恨去國怱怱未得從容罄所懐也兹辱枉書并寄兩論詞意竒偉則所以知足下者益以深矣顧念頃與仁里諸賢屢講此事尚多未契足下必已聞之若以愚言為是則固無今日之辨若以為非則又何以見語為哉聖逺道湮人心頗僻險詞怪説雜然並起不憚於誣天罔聖詭經破義而務以適其利欲之私自非剛健明哲之才確然以勝私復理為己任者鮮不惑焉率獸食人人將相食其兆已見於此甚可懼也足下試以愚言思之反諸其身而驗以聖賢之明訓必有以得其本心之正然後可以燭理揆事而無不合毋徒苦心勞力為此附㑹穿鑿而卒以陷溺其良心也答杜叔髙示喻克已之説甚慰所望道理分明本如大路聖賢又如此指示提撕不為不切今人都不理㑹却别去千生萬受杜撰百般胡説亂道於自已分上了無分毫利益只可誑嚇他人然亦只誑嚇得不識底人若被識道理人旁邊冷看成甚模様此區區所以於前日面論之際不能不失笑於賢者之言也今承來喻乃知後來思之有得力處此又見賢者資質本自過人但從前本欲誑人却反為人所誑今日一聞逆耳便能發悟於心不易得也然克已固學者之急務亦須見得一切道理了了分明方見日用之間一言一動何者是正何者是邪便於此處立定脚根凡是已私不是天理者便克將去不但輕躁二字也辛丈相㑹想極款曲今日如此人物豈易可得向使早向裏來有用心處則其事業俊偉光明豈但如今所就而已耶彼中見聞豈不有小未安者想亦具以告之渠既不以老拙之言為嫌亦必不以賢者之言為忤也答程生珙示喻正名之説胡氏所論固有未盡然其大義謹嚴而聖人之妙用變通又自有不可測者不可以私情常識議其方也如以為疑則食肉不食馬肝未為不知味姑置此而議其切於吾身者焉可也答王南卿熹方幸閒中得與一二學徒整理舊書而忽蒙恩收用雖實衰老不敢以逺為辭但恐迂疎議論多與時背一辭不獲比已再上傳聞諸公亦無相彊之意計必得之矣萬一未遂則又未知所以為計也示及隊圖雖不知兵然頃讀曹公杜牧孫子見其所論車乗人數諸儒皆所未言唯友人蔡季通每論此事以考周禮軍制皆合今得此書乃知前輩已嘗用之而有效矣是其可傳無疑也跋尾所論皆精當卒章辨荆公事則恐未然家有荆公與襄敏公手帖數紙見當時事若非荆公力主於内則羣議動摇決難成功但是後來襄敏見其他政事多出於聚斂掊克之意故不免有異論耳若論熈河之事則二公實同心膂無異説也幸試思之恐須畧轉換過乃可取信其帖今録以上呈荆公政事固多失然此一事却是看得破也答王南卿長沙除命深感上恩但老病衰懶昏塞廢忘恐不能堪一道之寄而再辭不獲上語丁寧伏讀皇恐遽欲起拜而鄙意尚有少疑又苦足疾未容拜受遂且宿留更須旬日可決去就萬一可往不知老兄能一乗興相過否所欲扣者千條萬端非面不能究但恐不成行即此㑹又未可知承所改後語甚佳但恐金人立嘉勒氏後一節恐不足深辨耳彼於我為外臣而反連夏㓂以為邊患則我之討伐自為義舉彼於金人非相吞之國則金人立之以樹黨在彼不失為逺交近攻之計而外假存亡繼絶之名又足以使之怨我而德彼亦其狡計之過人也豈足為義舉哉且嘉勒斯賚既有罪則當時討其所立之子自不為過正不必以討其叛孫自解雖或金人能立斯賚所立之後亦未足以愧我而為賢也又謂因進陣法而或以咎荆公亦不記是誰説然此事只合論其取之是非而其瑣細皆不足較若果是矣則雖進陣法亦何不可之有耶又云今為荆公之累恐此句亦未甚稳不知盛意是謂我累彼耶彼累我耶若我累彼則此語可用而非所為立説之意不然則恐當改之為安或云今以荆公為累語意似覺深厚也妄論如此目昏不見字潦草勿怪而并詳之幸甚幸甚陣法印本有便求數冊信州有潏水集印本乃長安人李復之文記董氊非嘉勒斯賚之子乃盗斯賚之妻而竊其國不知曾見之否事冗不暇細看更考之也答王南卿陣法細看尚有誤處如上卷第五板陣法内左邊兩隊各欠馬軍紅㸃二十五人第四板陣法凡馬軍後並無押隊照隊中卷第一版四十萬人而增之至三十萬其四字當作由字幸更詳考恐更有此等當改正也答汪易直示喻尊名之意極荷不鄙但今朋友必已有所稱往時忘記奉扣後便幸批示或已得先端明本㫖即不必改也疑義數條意皆甚正但首章管仲事程子所推聖人本意恐已得之葢其不死子糾而從桓公乃是先迷後得如今叛逆而遭赦宥自無可死之理然此事夫子當時不曾明言但今以其言專取其功而畧無譏貶之詞可以推見之耳若果有罪則聖人必有微詞以見功過不相掩之意不特如此説矣故疑程子此意講之甚精而鄙意所疑則其曰若當死而不死則後雖有功亦不復取此則未安耳功自功過自過若過可以掩功則功亦得以掩其過矣康節先生論學春秋者當先定五伯之功罪而以五伯為功之首罪之魁此語最為切當然非獨論古事為然也見諸行事則操賞罰之權持黜陟之柄者亦當以是為心乃能盡用一世之材以濟天下之務而不失其正耳仁之一字以其德而言則必心無私而事當理乃能當之若其功則惟利澤及人有恩有惠便可稱之初不計其德之如何也偶來城中人事冗擾且畧為論此條試更思之餘俟還家奉答别附便也夫子説可與立未可與權程子説春秋大義易見而時措從宜者為難知此等處更宜致思思而得之則所示數條皆可類推矣然此不可以强通却須反求諸心向性分上講究存養始當有以自得耳末由面論臨風馳想切幾力學自愛答汪易直示喻自訟之篇足見立志為已之切尤以為慰此正大學所謂誠其意者然意不能以自誠故推其次第則欲誠其意者又必以格物致知為先葢仁義之心人皆有之但人有此身便不能無物欲之蔽故不能以自知若能隨事講明令其透徹精粗巨細無不通貫則自然見得義理之悦心猶芻豢之悦口而無待於自欺如其不然而但欲禁制抑遏使之不敢自欺便謂所以誠其意者不過如此則恐徒然為是迫切而隠微之間終不免為自欺也舊説大學此章葢欲發明此意而近日讀之殊覺未透因畧更定數句今謾録去試深察之以為何如也近思小本失於契勘致有差誤此執事不敬之罪也後來此間書坊别刋得一本卷尾所增已附入卷中仍削去重出數字矣偶未有别本旦夕求得續當附去也答彭子壽龜年齊銘之屬豈所敢承况此病餘昏憊將何以發明聖賢之㫖為日用功夫之助乎然竊聞之大學於此雖若使人戒夫自欺而推其本則必其有以用力於格物致知之地然後理明心一而所發自然莫非真實如其不然則雖欲防微謹獨無敢自欺而正念方萌私欲隨起亦非力之所能制矣竊意髙明於此非有所未察特因來喻僭復言之以為誠能於此益致其功則亦無待於􅉏御之箴而學日益進德日益修矣答彭子壽以日不足或作不足日以垂喻中庸疑義别紙甚詳乃知賢者於此方且以講求經㫖究極精微以日不足為事世間利害固未易以入其胸次也修道之教修之者固専出於人事而所修之道則天地萬物之理莫不具焉是乃天人之合亦何害其為同耶又論事豫之説張游不同葢此章首尾以誠為本而推其所以誠者乃出於明善故釋其文義且得以誠為言如大學之序始於格物而其後乃云壹是皆以修身為本亦此類也隠微聞見之分當時偶見如此而謾序之若疑未安置之無害此非大義所繫不足深論也智仁勇經文本不曾分若以為疑亦不足論但諸家所分却未稳當必欲分之則須從今説乃為盡善若如來喻則仁字不合列於三德之中而又位於其次葢聖人之言其名理隨處輕重所指不同讀者須隨其輕重而讀之乃見其意不可一槩死殺排定也鄙見如此不審明者以為如何如復未安更望報及也答折子明伏蒙鐫喻先正墓文使人三返而勤懇益至熹雖至愚心非木石豈不惻然有動於中亦何忍為此牢辭固拒以逆盛意實以衰悴心目俱疲不堪思慮檢閱而兩年以來名在罪籍每讀邸報觀其怒目切齒之態未知將以此身終作如何處置然後快於其心未嘗不惕然汗出浹背沾衣也是以年來絶不敢為人作一字近所祈懇百拜而辭者已數家矣若以尊喻之嚴遽弛此禁則四面之責紛然而至從之則召禍不從則取怨反復思之未見其可兼餘年無幾疾病侵凌神思昏然豈有精力可以給此切告矜亮貸此殘生不勝千萬哀懇之至答劉君房元城之孫先正忠定公有德有言没而不朽百世之下聞者興起而熹之外舅聘士劉公嘗得親見而師承之熹少時猶及竊聞其餘論於忠定公之言行志節詳矣是以雖不得及其門牆而想望其聲容猶若相接不止於今世紙上所傳而已也今辱惠書乃知其後人所以繼業承家之意如此而所以見顧者又甚厚非淺陋之所敢承也但來喻頗以未有世其禄者為憂此則賢者慮之過矣先德遺風具在方冊有能誦其言行其行不替其志節則所以世其家者孰大於是彼區區之外物何足道哉又承類次遺文已就篇帙見使為之序引以傳來世此則又豈晚生妄意所敢幾及但願亟遂鋟木傳之其人使熹與有聞於大體之純全則為幸甚矣答劉君房所喻讀易甚善此書本為卜筮而作其言皆依象數以斷吉凶今其法已不傳諸儒之言象數者例皆穿鑿言義理者又太汗漫故其書為難讀此本義啟蒙所以作也然本義未能成書而為人竊出再行模印有誤觀覽啟蒙本欲學者且就大傳所言卦畫蓍數推尋不須過為浮説而自今觀之如論河圖洛書亦未免有剰語要之此書真是難讀不若詩書論孟之明白而易曉也此是偽學見識不審明者以為如何答曾無擇闕已報去但覺得多是在外邊看未有箇入門處須更虚心静慮將聖賢言語從裏面親切處看出來庶幾見得意味不為空言不然似此泛濫含糊無益於事終久不得力也答曾無疑三時承枉書奉報草草方以為愧忽辱再告益荷眷勤且審比日涼秋起處佳福足以為慰詩卷寵示尤認不鄙之意三復以還既歎其精麗警拔之不可及又重歎其不為大言險語以投世俗之耳目也然承喻及為學之意則似所志又有不止於此者此尤區區所樂聞但未知雅意姑欲粗一闖其藩籬而為彼善於此之計耶抑將勇革舊習而真欲一蹴以至道也如前之説則非區區所敢知如後之説則如來喻之云固非不善然欲自是以求道則恐亦未免為空言也大率人之為學當知其何所為而為學又知其何所事而可以為學然後循其次第勉勉而用力焉必使此心之外更無異念而舊習之能否世俗之毁譽身計之通塞自無一毫入於其心然後乃可幾耳此固未易以毫楮既而承見語亦將有枉顧之期矣儻得面論庶竭鄙懐顧此迂濶干觸科禁恐非賢者進取之利更冀審處於未動之前毋使貽後日之悔焉乃所願也答曾無疑辱書良以為慰而反復來喻已得雅志之所存則區區所疑亦不敢隠也葢嘗聞之孟子之言有曰人之所以異於禽獸者幾希庶民去之君子存之此君子所為而學也然欲存此則必有以識此之為何物而後有以存之能識之則所以存之者又必勉勉孜孜而不少懈焉然後乃可幾也此君子之所以為學者而終身勉焉唯恐一毫之不盡而不敢少貳其心者也今足下自謂學無本原心常駁雜豈亦自覺其未嘗用力於此而然耶此其自知亦明矣然又欲因其固有而循習之則亦可以殊塗而同歸則未知足下所謂固有者為何物又如何而循習之與何者為殊塗又同歸於何許也又謂雖舊習之未忘而未嘗為學之累則又未知今之新者為何學而昔之舊者若何而能不為之累也凡此所云竊恐非獨熹之愚有所不解意者足下之心亦未必能别其孰為同異而孰為是非也足下幸試思之其然乎其不然乎如其果然則願姑以前者所引孟子之言為主而博考古昔聖賢之遺訓以參驗之則夫人之所為而學與其所以學者不待外求而得之於我向之所謂固有所謂同歸者始為有以識之而知昔之舊者真不足為而果有累乎今日之新矣人之為學必其有以先識乎此而知取舍之所定然後其功夫利病可得而言如其不然徒為論説皆是空言無下落處無所補於事也景陽季章於此皆嘗有聞雖未知其後來所進如何然茍善取之亦當有以為助矣吾人既不見用於世只有自己分上一段功夫若見得門户分明端緒正當實用得些子氣力乃可以不負降衷秉彞之重此外瑣瑣一知半解正不足為重輕也不審明者亦有意乎答曾無疑示喻為學之方固得其要然若只如此便了則論語只須存此兩條其餘皆可以削去矣聖人教人博學審問慎思明辨而篤行之葢於理之巨細精粗無所不講然後胸次光輝明徹無所不通踐履服行無非真實似不當如此先立界限預設嫌疑以自障礙也答曾無疑承喻令兄喪期於禮聞訃便合成服當時自是成服太晚以已失之於前然在今日祥練之禮却當計成服之日至今月日實數為節但其間忌日却須别設祭奠始盡人情耳謂聖人以喜怒動其志固為不可若謂都無所動則是聖人心如木石而喜怒之見於外者特為偽耳豈有是理哉此等處須是存養體驗自做得些工夫當自見之難以淺識懸斷也學習之習與傳習之習非有不同傳即謂所學也大抵博學審問學之事也慎思明辨而篤行之習之事也集注中所載諸先生説甚備可細考之來喻忠恕二説皆近之熹鄉來所論正謂如此近復細觀乃有未盡已於論語集注中更定其説矣試詳考之當見曲折所謂竊恐狂騖髙逺者視之云云却不當如此顧慮終身行之自是學者事於聖人何所預哉蓍數之説其義亦精但不知所謂老隂老陽其數則一少隂少陽其數乃三是如何葢四象之變極於六十有四老陽十二老隂四少陽二十少隂二十八乃自然之數不審增減揲者隨其所得而言之又何慮其不可觀變耶揲法初爻成則便止有三十二卦二爻成則便止有十六卦三爻成則便止有八卦四爻成則便止有四卦五爻成則便止有二卦亦是自然次序節次可見今所疑者亦何嫌哉揲蓍之法周禮領於太卜之官計其法度必甚詳宻今皆不可見矣獨賴大傳有此數句可以畧見彷彿而以今推之亦無不可通處學者既不得見當時舊法則亦且當守此不當妄以私意横起計度也蒿固非蓍然亦猶是其類若以木棊竹筭金錢當之則其去蓍亦逺矣又如所言交重之論亦所未曉交者拆之聚故為老隂重者單之積故為老陽亦何疑之有乎然此六爻既成而畫地以記之象耳於揲法初無所預也答曾無疑所論為學之意甚荷不鄙但若果有所得出言吐氣便自不同纔見如此分疏解説欲以自見其能而唯恐人之不信便是實無所得自明眼人觀之固不待其詞之畢而有以識之矣孝悌忠恕若淺言之則方是人之常行若不由此即日用之間更無立脚處故聖人之教未嘗不以為先如所謂入則孝出則悌忠恕違道不逺是也若極言之則所謂通於神明光於四海無所不通而曾子所以形容聖人一貫之妙者亦不過如此又非如前者言之可易而及也故大學之道必以格物致知為先而於天下之理天下之書無不博學審問慎思明辨以求造其義理之極然後因吾日用之間常行之道省察踐履篤志力行而所謂孝悌之至通於神明忠恕之一以貫之者乃可言耳葢其所謂孝悌忠恕雖只是此一事然須見得天下義理表裏通透則此孝悌忠恕方是活物如其不然便只是箇死底孝悌忠恕雖能持守終身不致失墜亦不免但為鄉曲之常人婦女之檢押而已何足道哉今且以所舉有子曾子之言觀之似於文義之間全未考究雖近世先覺如程夫子之言所以發明其妙者恐皆未嘗過目而經心而况於其他義理精微千差萬别豈能一一㑹其㫖歸也哉故熹竊以為今日與其自辨以求合枉費言語枉費心力不若一切放下便依此説且將大學論語反復熟讀而因程子之言與其門人數公之説以求聖賢之㫖意所在句句而講字字而思使無毫髪不通透處則自不須如此妄自拘束强作主張也無疑試更思之恐或可信則一兩月間天氣差暖或能乗興一來面罄其説庶幾彼此殫盡免至如此擔閣虚費光隂也晷景製作甚精三衢有王伯照侍郎所定官厯刻漏圖一編亦與此同厯象之學自是一家若欲窮理亦不可以不講然亦須大者先立然後及之則亦不至難曉而無不通矣北宫􅉳似孟施舍孟子本文無此語不知尋常如何曉㑹此句未敢輕論其得失也答曾無疑子約書來必盛稱無疑之為人但不知中間相聚所與切磨誦説者果為何事計於𦂳要親切處亦未必能盡所懐而日月逝矣嵗不我與丈夫有志者豈當為此悠悠泛泛徘徊猶豫以老其身乎答曾擇之祖道禮即理也但謂之理則疑若未有形迹之可言制而為禮則有品節文章之可見矣人事如五者固皆可見其大槩之所宜然到禮上方見其威儀法則之詳也節文儀則是曰事宜細考之忠恕二字其本義只是學者衆人之事曾子所言乃借此以形容聖人一貫之妙程子之言又借天地造化之體用以明聖人之事須作三節看見得各有下落則一章之指自通貫矣更徐玩之非欲速所能達也此説未然但漆雕語意深宻難尋而曾㸃之言可以玩索而見其意若見得曾㸃意則漆雕之意亦可得矣且看程子説大意兩字是何意二子見得是向甚處如何見得答曾擇之仁者心之德愛之理也仁者心之德猶言潤者水之德燥者火之德愛之理猶言木之根水之原試以此意思之盡已之謂忠祖道初以為盡吾心之所至而無一毫自隠先生以為語未瑩祖道再思之恐止是竭盡吾心而無一毫不足之義後語轉疎前語只自隠二字不切須知不必自隠然後為不忠但有不盡處便是病也主一無適之謂敬此等語須力行之方見得真實意味禮者天理之節文人事之儀則更就天人上看義者事之宜也更以孟子説義處推之忠恕曾子忠恕二字便是一以貫之底注脚可更以二程先生及上蔡説反復體認仍以集注之説參之便見聖賢之意直是細宻不是泛然儱侗説話以約失之者鮮矣約有收歛近裏著實之意非徒簡而已上蔡説得好德不孤此德不孤與易中説德不孤不同此但言有德者聲氣相求自不孤立故必有鄰易中却是説敬義既立則内外兼備則其德盛而不孤也漆雕開曾㸃二子是信箇甚底又是如何地信曾㸃語可更以集注為主子細體驗仍看上蔡之説發明得亦親切三年之喪而復有期喪者當服期喪之服以臨其喪卒事則反初服或者以為方服重不當改衣輕服不知如何或者之説非是卒哭百日卒哭承開元禮以今人葬或不能如期故為此權制王公以下皆以百日為斷殊失禮意古者士踰月而葬葬而虞虞而卒哭自有日數何疑之有但今人家諸事不辦自不能及此期耳若過期未葬自不當卒哭未滿一月則又自不當葬也答曾擇之前書所説欲於一字中推尋曲折不知後來看得如何恐亦不必如此但從頭看到要𦂳處更加功夫子細辨别而不𦂳要處亦不可草草則久之自然浹洽貫通精粗一致矣季章説致曲處不知如何今亦不記當時所説大抵彼中朋友看得文字疎畧不肯依傍先儒成説反覆體驗而便輕以己意著字下語正使得其大意中間亦不免有空闕處相接不著欲革此弊莫若凡百放低且將先儒所説正文本句反覆涵泳庶幾久久自見意味也答曾擇之所論曾㸃大意則然但謂漆雕開有經綸天下之志則未必然正是已分上極親切處自覺有未盡耳雖其見處不及曾㸃之開濶得處未至如曾㸃之從容然其功夫精宻則恐㸃有所不逮也以此見二人之規模格局大槩不相上下然今日只欲想象聖賢胸襟灑落處却未有益須就自家下學致知力行處做功夫覺得極辛苦不快活便漸見好意思也天下歸仁之説程先生是説實事吕與叔恐不免墮於虚見其得失自可見也季宏之來只是要求跋尾全然不曾講學却須曾理㑹作文大率彼間士人多是如此鄉外走作不曾鄉裏思量論其淵源葢有不得不任其責者矣甚可歎也因其告歸附此為報熹衰病沈痼闕心之患已成尚思更與朋友講論此事少革流弊以闕賢者無事更能見過相聚旬月是所望也答王才臣來喻縷縷備見雅志然於讀書窮理所得所疑未有以見教者而較短量長非人是已之意實多若果有得於義理之歸恐不應更有此病也明者思之以為如何茍有取焉則願置此而姑相與實講所疑乃千萬之幸也無疑書來其大指與左右亦相似已詳報之或因過目併以一言論其得失可也六詠之需非敢忘之實以年來纂次禮家文字頭項頗多衰病之餘精力向盡無暇可及亦覺未是急務故不敢以奉凂爾格齊大字此却好箇題目顧未知所以充之者如何寫字亦非所難適此兩日寒甚衰病拘攣不可輕動向後晴暖當試為之以奉寄也承有枉顧之意尤荷不鄙若得㑹面彼此傾倒以判所疑何幸如之未間千萬及時專力使有箇端的用心處庶幾合并之日有可討論也子直詩甚佳南容之篇尤有餘味已輙為題其後因書幸以報之也答度周卿正比來為况如何讀書探道亦頗有新功否耶嵗月易得義理難明但於日用之間隨時隨處提撕此心勿令放逸而於其中隨事觀理講求思索沈潛反復庶於聖賢之教漸有黙相契處則自然見得天理性命真不外乎此身而吾之所謂學者舍是無有别用力處矣因書信筆不覺縷縷切勿為外人道也答李誠之說特承寄示新刻二先生祠記并枉長書一通記文鄙淺而書意勤厚非區區所敢當也然先生之道即伏羲堯舜禹湯文武周公孔孟所傳之道先生之書即所以發明六經孔孟之書初非别有𤣥妙竒特自為一家之説而與古之聖賢異軌殊轍也世之君子固未必嘗讀其書而驟讀其書亦未能遽曉是葢不唯不知程氏之學實乃并與古昔聖賢之學而不知之也舉世昏㝠恬不覺悟而其聰明辨博能為文字語言名有氣槩才力者則其惡之為尤甚今以門下之才之美宜已無愧此數者而其用心獨不然葢不惟立祠伐石以著其尊慕之意而來書之喻又將不鄙迂陋而辱問津焉此其志豈獨賢於今世之士也哉竊感下問之勤故粗論其梗槩如此近所刋定大學章句一通今致几下所欲言者不能外此幸一讀而三思之其必將有以得之而異時所以見於文章事業者愈有光矣僭率皇恐答李誠之昨蒙不鄙俾撰先正文集後序自知不文不足以副厚意顧以先契之重鄉往之深且欲託此以少見尊奬節義别嫌明微之意以是不敢力辭而輒草定其説以求商訂區區之心葢未敢自以為是也所欲更定尊復明辟四字刋去繁冗著語精切前輩所謂自有稳字正此謂也玩味歎服不能自己但平賊之功雖由外濟之語乃是區區鄙意分功紀實以息争論之微指朱丞相所記當時之事非不詳明正以欲專其功而反詆吕張為敗事又其後深詆李趙諸公誣謗已甚故讀者往往心非而鼻笑之并與其可信者而不信之也願熟思之恐不可改如何答徐崇文僑日用功夫且得如此照管莫令間斷久之浹洽自有見處亦不須别立標的便計工程也敖惰之説如所引孟子隠几而卧而以為當然則已得之矣何必疑其非本有耶不但孟子如孔子取瑟而歌亦是此類但大學之意却是恐人於此一向偏却更不照管今當看此重處識取正意受用省察不必向閒慢處枉費思索也子顔時時往來甚佳才卿得託門館甚善其人有立作看得道理亦子細儘好從容講論也答林叔恭為學只要致誠耐久無有不得不須别生計較思前算後也答潘子善時舉辱書􅊀知學問之志甚善甚幸杜門獨學與周旋師友之間學之難易固不同矣然其用力實在於我非他人所能代也况彼中朋友以書來者已自數人切切偲偲相觀而善似亦不可謂之全然無助者更在勉力而已答潘子善便中兩承惠書深以為慰比日秋涼所履佳勝熹衰病涉秋似有向安之漸但辭職告老皆未報可日深悚惕之懐耳恭父留此甚久儘得從容因其行草草附此其他恭父必能言之未間唯冀以時自愛眷集一一佳慶諸疑問各疏其下矣恭父當能道其詳答潘子善問易傳近思録大畜彖曰能止健大正也傳曰能止乎健者非大正則安能據大畜天在山中之象則是能止其健於下也今曰止乎健者不知是止於健還是止其健耶伏乞批誨能止健言以艮之止止乾之健也傳意亦是如此但其文勢似倒他亦多此類也習坎八卦中獨坎加習字説者多矣未知義果如何此等不必深求其説習坎卦義傳云一始於中有生之最先者也故為水夫陽氣之生必始於下復卦之象是也今曰始於中其義如何氣自下而上為始程説别是一義各有所主不相妨然亦不可相雜咸上六咸其輔頰舌竊意此爻宜有悔吝而不言悔吝何也吉凶悔吝係乎邪正此但見其不足以感人之意耳未見有失故不得以悔吝言也遯九三畜臣妾吉傳曰係吝之私恩懐小人女子之道也故以畜養臣妾則得其心為吉也小人女子近之則不孫逺之則怨若專以私恩懐之未必不有悔吝而此爻以為吉何耶此爻不可大事但可畜臣妾耳御下而有以懐之未為失正但恐所以懐之者失其正耳大壯上六羝羊觸藩不能退不能遂無攸利艱則吉傳以艱字為遇艱困則失其壯而得柔弱之分故吉竊意不能退遂而無所利則是已艱困矣而又曰遇艱何也恐此艱字只作艱難其事而不敢求進不已則吉如大畜九三利艱貞之艱説如何當如大畜之例晉序卦物不可以終壯故受之以晉傳曰物無壯而終止之理既壯盛則必進竊意物進而後至於壯盛既壯盛則衰退繼之矣今曰壯盛則必進此義如何物固有壯而後進者亦有進而後壯者各隨其事而言難以一説拘也且以十二月卦論大壯之為夬夬之為乾豈非壯而後進乎至乾乃極而衰耳晉傳曰晉之盛
