front:
  text: 答吕伯恭問龜山中庸龜山中庸首章之語往者蓋以為疑欽夫亦深不取自今觀之却未有病但集中云喜怒哀樂未發之際以心體之則中之體自見執而勿失無人欲之私焉發必中節矣此則不可天地之所以位萬物之所以育雖出一理然亦各有所從來玩其氣象自可見龜山之語亦不為病如孟子語始終條理則亦豈不分别而言耶達道達徳一章婺本因有兩達徳字而脱去中間數句以故不成文理今以為勝嚴本是亦喜合而惡離之過耳成已成物之道無不備故能合内外之道而得時措之宜蓋融徹洞達一以貫之而然也然細分之亦有龜山之意但不當專以此為説却無總統耳誠自成也此説恐是蓋此是道理自然如此但人却只要誠之耳尊德性一章龜山從上説下吕與叔從下説上蓋無所不通不尊不信此段未得其説向見伊川亦只如此説且當從之有説勝此乃可易耳龜山中庸有可疑處如論中庸不可能不可以為道鬼神之為徳等章實有病而來教所指却不為疵也
