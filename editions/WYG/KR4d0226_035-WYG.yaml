body:
  text: 别紙聖賢之言離合弛張各有次序不容一句都道得盡故中庸首章言中和之所以異一則為大本一則為達道是雖有善辨者不能合之而為一矣故伊川先生云大本言其體達道言其用體用自殊安得不為二乎學者須是於未發已發之際識得一一分明然後可以言體用一源處然亦只是一源耳體用之不同則固自若也天地位便是大本立處萬物育便是達道行處此事灼然分明但二者常相須無有能此而不能彼者耳子思之言與龜山氣象固不同然若使龜山又只道箇致中和天地位萬物育則不成解書矣釋氏便要如此嘗見其徒説李遵朂請某僧注信心銘其人每句大書而再注本句於其下便是只要如此鶻突也中庸不可能明道但云克已最難故曰中庸不可能也此言貫徹上下不若龜山之竒險也龜山之説乃是佛老緒餘決非孔子子思本意兼人之為道而逺人不可以為道兩句若如龜山之意則文理自不通但人悦其新竒不覺其礙耳若今人依本分做文字則而逺人處下而字不得須下則字方成文理後面雖有求仁之説然其言自道言之自學者言之又似王氏説話道若果不可為則學者又安可求仁以為道若學者可求則不可為之説又贅矣枉費説詞無益學者而反有害於義理之正不可從也向見李先生亦自不守此説又言羅先生陳幾叟諸人嘗以為龜山中庸語意枯燥不若吕與叔之浹洽此又可見公論之不可揜矣吕與叔説道不逺人處記得儘好可更檢看鳶魚鬼神兩章却是上蔡説得通透有省發人處如此説雖是排着一片好言語然却無箇貫穿處也智仁勇須做有輕重看若言仁者必有勇則仁勇一而已豈有輕重若言勇者不必有仁則又豈可便言無輕重乎此三者天下之達徳然遂人稟賦成就不同故有生知安行學知利行困知勉行之異然仁則渾然全體智勇固在其中生知安行則從容中道而學利困勉不足言矣其動以天聖人之事龜山此章若以上章誠者天之道言之則以字不為害若直指道體而言則以字下不得矣近而不尊者謂何等事試舉一二以證之要之此章説得常不快人意也答吕伯恭承喻整頓収歛則入於著力從容游泳又墮於悠悠此正學者之通患然程子嘗論之曰亦須且自此去到徳盛後自然左右逄其原今亦當且就整頓収歛處著力但不可用意安排等候即成病耳勿正之正其字義正如今人所謂等候指凖春秋傳云師出不正反戰不正勝用字之意亦正如此耳别紙川上之論甚當不逝之云極知非是然須如此説破乃可以釋學者之疑耳以修道之謂教為設教此固有諸儒之説以程子之言為為此而設教則恐微有牽合之弊大抵諸先生解經不同處多雖明道伊川亦自有不同處蓋或有先後得失之殊或有一時意各有指不可彊牽合為一説也修道之謂教疑只與自明誠謂之教之教皆同言由教而入者耳所謂以失其性故修而求復只是直解此文非有為此設教之曲折也故下文遂言戒慎恐懼及致中和乃脩道之始終也近得侯氏中庸亦正如此説不知髙明以為如何先生自注云此説非是中和中庸如所論得之然中和之中專指未發而言中庸之中則兼體用而言參前倚衡之説甚簡當尹公云此只是収拾心令有頓放處此意亦好艮背之用固在於止其所然能止其所乃知至物格以後事始學者還便可用否更告喻及也仁字之義孟子言心該貫體用統性情而合言之也程子言性剖析疑似分體用而對言之也其他已具别説如來喻之云固好然恐未為直截分明耳學者推求言句工夫常多㸃檢日用工夫常少今日此等人極多然或資質敏利其言往往有可采者則不免資其講論之益而在我者躬行無力又無以深矯其弊方此愧懼今得來喻敬當徧以警告常所與往來者使自省察耳却是老成敦篤志行可保之人往往又却遲鈍看道理不透求其有精神而醇者真難得耳近看中庸古注極有好處如説篇首一句便以五行五常言之後來雜佛老而言之者豈能如是之慤實耶因此方知擺落傳注須是兩程先生方始開得這口若後學未到此地位便承虛接響容易呵叱恐屬僣越氣象不好不可以不戒耳又注仁者人也云人也讀如相人偶之人以人意相存問之言相人偶此句不知出於何書疏中亦不説破幸以見告所謂人意相存問者却似説得字義有意思也答吕伯恭泰伯夷齊事鄙意正如此蓋逃父非正但事須如此必用權然後得中故雖變而不失其正也然以左傳為據便為泰伯未嘗㫁髪文身此則未可知正使㫁髪文身亦何害也富而可求以文義推之恐只得依謝楊説伊川説雖於義理為長恐文義不妥帖似硬説也上蔡本説學詩者不得以章句横在胷中因有堯舜事業横在胷中之説然則非為有其善之意矣竊疑此乃習忘養心之餘病而遺書中上蔡所記亦多此等説話如玩物喪志之類此恐須更有合商量處不可草草看過也誰毁誰譽一章所論得之但只説得三代直道而行意思更有斯民也之所以六字未有下落疑斯民也是指當時之人而言今世雖是習俗不美直道難行然三代盛時所以直道而行者亦只是行之於此人耳不待易民而化也諸儒之説於此文義殊不分明却是班固景贊引得有意思注中説得亦好大抵聖人之意止是説直道可行無古今之異耳言譽而不及毁之意來喻亦善但毁譽兩字更須細看譽者善未顯而亟稱之也毁者惡未著而遽詆之也試亦恐其將然而未見其已然之辭聖人之心欲人之善故但有所試而知其賢則善雖未顯已進而譽之矣不欲人之惡故惡之未著者雖有以決知其不善而亦未嘗遽詆之也此所以言譽而不及毁蓋非全不别白是非但有先褒之善而無預詆之惡是則聖人之心耳周教授語解誠如所喻愚意其篤實似尹公謹嚴過之而純熟不及高明以為如何新刻小本易傳甚佳但籖題不若依官本作周易程氏傳舊嘗有意凡經解皆當如此不以傳先乎經乃見尊經之意漢晉諸儒經注皆如此也後見朋友説晁景迂亦有此論乃知前輩意已及此矣今日又得景迂語解亦有好處大抵北方之學經是近本實也答吕伯恭别紙上蔡堯舜事業横在胷中之説若謂堯舜自將已做了底事業横在胷中則世間無此等小噐量底堯舜若説學者則凡聖賢一言一行皆當潜心玩索要識得他底蘊自家分上一一要用豈可不存留在胷次耶明道玩物喪志之説蓋是箴上蔡記誦博識而不理會道理之病渠得此語遂一向掃蕩直要得胷中曠然無一毫所能則可謂矯枉過其正矣觀其論曾㸃事遂及列子御風以為易做則可見也大抵明道所謂與學者語如扶醉人真是如此來喻有懲創太過之説亦正謂此吾人真不可不深自警察耳誰毁誰譽已具答子約書中然頃時聞伯恭議論常有過厚之意今此所論却與往者不同豈亦前所謂矯枉過正之論耶聖人大公至正處似無人情然其隱惡揚善之心則未嘗無也此乃天地生物之心孔門教人求仁正是要得如此耳試更思之復以見教為幸言仁諸説欽夫近亦答來於舊文頗有所改易然於鄙意亦尚有未安處大率此書當時自不必作今既為之則須句句字字安頓得有下落始得不容更有非指言仁體而備禮説過之語在裏面教後人走作也性與天道不可得而聞但是聞者未易解耳聖賢之言固無所不盡如孟子説箇浩然之氣大小面生然亦只説得箇難言了下面便指陳剖析一向説將去更無毫髪不盡處也伊尹先知先覺伊川以為知是知此事覺是覺此理與上蔡所謂心有知覺意思逈然不同向來晦叔諸公亦正引此相難蓋不深考也且如而今還敢道伊尹天民之先仁否試更子細較量便可見矣懲創太過不免倚著之病近亦深覺其然然嘗見明道有言學者須守下學上達之語乃學之要又似且如此用功基脚却稍牢固未敢便離却下學之地别求上達處也但當更於存養踐履上着力不可只考同異校詳畧專為章句之學而已大抵道理平鋪放著極低平處有至髙妙底道理不待指東畫西説南道北然後為得不傳之妙也明者思之以為如何養忠厚革澆浮之論甚善要當以此為主而剖析精微之功自不相妨耳和靖錄中説伊川未嘗言前輩之短此意甚善今人往往見二先生兄弟自許之髙便都有箇下視前輩意思此俗不可長和靖之言要當表而出之也答吕伯恭論淵源錄元豐中詔起吕申公此段初固知其有誤然以其不害大體故不復刋今欲正之亦善但去司馬溫公溫公不起八字及依程集本題改寄為贈可也明道言當與元豐大臣共政此事昨來已嘗論之然亦有未盡今詳此事乃是聖賢之用義理之正非姑為權譎茍以濟事於一時也蓋伊川氣象自與明道不同而其論變化人材亦有此意見外書胡氏所記易傳於暌之初爻亦有不絶小人之説足見此事自是正理當然非權譎之私也然亦須有明道如此廣大規模和平氣象而其誠心昭著足以感人然後有以盡其用耳常人之心既不足以窺測此理又無此等力量自是信不及設有信者又不免以權譎利害之心為之則其悖理而速禍也為尤甚矣此今之君子所以不能無疑於明道之言也胡氏所記尹氏亦疑之豈所謂未可與權者耶邵子文晚著此書於其早嵗之所逮聞者年月先後容或小差若語意本末則不應全誤且所謂二公並相蓋終言之召宗丞未行以疾卒亦記其不及用耳非必以為二公既相然後召明道也又謂邵錄多出公濟恐亦未然蓋其父子文體自不同也折栁事有無不可知但劉公非妄語人而春秋有傳疑之法不應遽削之也且伊川之諌其至誠惻怛防微慮逺既發乎愛君之誠其㴠養善端培植治本又合乎告君之道皆可以為後世法而於輔導少主尤所當知至其餘味之無窮則善學者雖以自養可也故區區鄙意深欲存之蓋其説如此非一端也今乃以一説疑之而遽欲刋去豈不可惜若猶必以為病則但注其下云某人云國朝講筵儀制甚肅恐無此事使後之君子以理求者得其心以事考者信其迹其亦庶乎其可矣范公不為程門弟子下卷范公語中論之已詳此年譜所載特鮮于所錄之本文耳然不削去門人二字者范公語中既引以為説則此不可削史固有變例也但來喻引范公日記以為伊川所為范公未必盡知若率先具素饌則應大與東坡忤何以能處程蘓之間而無違言乎此則恐於事理皆未盡也蓋范公所記正叔獨奏乞就寛涼處講讀而并及修展邇英次第則固善之之辭而非有譏貶之意也但伊川已奏而事方施行則自不必更言而在范公之自處則亦或有不敢言者至於國忌齋筵葷素所宜則以范公之賢於已之所行自當顧義理之是非以為從違不當視同列之喜怒以為前卻也使其果欲依違兩間曲全交好則具素饌既忤東坡具酒肉亦忤伊川若慮於彼而忽於此則亦非所以兩全矣况范公之意未必出此而它書所記亦云范醇夫輩食素秦黄輩食肉則所記雖不同而范公之不畏東坡而毎事狥從亦當時所共知矣故嘗竊意范公雖不純師程氏而實尊仰取法焉其於東坡則但以鄉黨游從之好素相親厚而立朝議論趣向畧同至其制行之殊則迥然水火之不相入且觀其辨理伊川之奏則其心豈盡以東坡為是哉但不能辨之於當時而發之於數年之後此則剛强不足不免乎兩狥之私者而其所重在此故卒不能勝其義理之公也大抵程蘓學行邪正不同勢不兩立故東坡之於伊川素懷憎疾雖無素饌之隙亦不相容若於范公則交情既深而其氣象聲勢無足畏者故雖有左袒之嫌而不以害其平生之驩也侯師聖論二先生大槩亦得之但語意少不足耳亦不必删去也文潞公事但注其後云某人云先生判監時潞公未嘗尹洛疑此有小誤以管窺天此伊川本語見於遺書不必曲為隱諱兼其語有抑揚善讀者當自知之若為其不善讀而毁吾説以避之則古今書傳之得存者寡矣横渠墓表出於吕汲公汲公雖尊横渠然不講其學而溺於釋氏故其言多依違兩間隂為佛老之地蓋非深知横渠者惜乎當時諸老先生莫之正也如云學者苦聖人之微而珍佛老之易入如此則是儒學異端皆可入道但此難而彼易耳又稱横渠不必以佛老而合乎先王之道如此則是本合由老佛然後可以合道但横渠不必然而偶自合耳此等言語與横渠著書立言攘斥異學一生辛苦之心全背馳了今若存之非但無所發明且使讀者謂必由老佛易以入道則其為害有不可勝言者非若前段所疑年月事迹之差而已也又行狀記事已詳表文所記無居狀外者亦不必重出吕侍講學佛老似不必載如何溝封奉聖鄉雖非封建然亦可以為封建之漸且無時不可為若曰分茅胙土大封王侯則主少國疑誠非可為之時矣但伊川决不至如此不曉事必待晚年更歴之多然後知其不可也大抵前輩議論不能無小不同今兩存之學者正好思索商量非若汲公之論横渠大本不同其流有害也楊應之事以少見故悉取之亦變例也恐可訪問更増廣之楊於程門亦未必在弟子列也吕進伯和叔本當别出以事少無本末故附之與叔甚非是告訪問增益别立兩條臨川有薛氏汲公甥也可因人問之薛博士語中胡公所論蓋以越職言事便非語黙之當然又以其得罪之重知其言必有過當處耳詞之未瑩故若可疑然蘓乃元符末年應詔上書恐未可以越職罪之也此事吾輩更合商量非特為蘓公之是非也楊公墓志首尾聨貫不容剪截故全書之亦變例也胡公所辨發明述作之意最為有功似不可去胡公行狀取屏斥學生事乃為作學錄行學規之様轍非獨為後來論列張本也然明道叙述中亦有如此者劉立之記罷判武學事伊川存而不去蓋欲備見事情雖知氣象之小而不得避也其它浮辭多合删節當時失於草草耳卷首諸公當時以具名實稍著故不悉書自今觀之誠覺曠闕但此間少文字之人檢閲須仗伯恭與諸朋友共成之也答吕伯恭熹昨見竒卿敬扣之以比日講授次第聞只令諸生讀左氏及諸賢奏疏至於諸經論孟則恐學者徒務空言而不以告也不知是否若果如此則恐未安蓋為學之序為已而後可以及人達理然後可以制事故程夫子教人先讀論孟次及諸經然後看史其序不可亂也若恐其徒務空言但當就論孟經書中教以躬行之意庶不相逺至於左氏奏疏之言則皆時事利害而非學者切身之急務也其為空言亦益甚矣而欲使之從事其間而得躬行之實不亦背馳之甚乎愚見如此不敢不獻所疑惟髙明裁之答劉子澄四月十三日左廸功郎監潭州南嶽廟朱熹謹向西再拜復書主簿學士足下熹至愚極陋自幼事事不能及人顧乃不自度量妄竊有意於古人為已之學雖講之有年矣而未始有聞也徒以從事之久足迹相接於先生長者之門反覆論辨不絶於一二朋友之口是以人或以務學之名歸之而世之不識其面目不接其言議者遂相與疑之以為是果何如人也誠使一日見其面目聽其辭氣而徐察其所為則冗然一庸人耳其不唾之而去者幾希執事以盛年壯氣清節直道發軔進塗既有聞於當世矣而説學好問之意勤勤有加又將有意於古人為已之學者而然邪誠如是則所以取友而輔仁者擇之亦宜審矣乃道聽於人枉道垂顧以禮於名為務學而未始有聞之庸人畀之手書辭髙而禮下熹誠不佞不識執事於夫人之言何所取信而遽為謙屈以至於此也既又留連竟日告語不倦雖蔬食菜羮相與共之畧無厭怠之色則又疑執事真若有取於熹者顧朴陋荒淺殆不能有以裨補一二為慙率意妄言間亦自知其可笑也然則執事果何所取於斯哉恐懼增劇因風陳布莫究所懷連日快晴計已次昭武矣承顔盡懽退有怡怡之樂為况良不惡向暑千萬以時自重答劉子澄來書深以異學侵畔為憂自是而憂之則有不勝其憂者惟能於講學體驗處加功使吾胸中洞然無疑則彼自不能為吾疾矣若不求衆理之明而徒恃片言之守則雖早夜憂虞僅能不為所奪而吾之胷中初未免於憒憒則是亦何足道願老兄專以聖賢之言反求諸身一一體察須使一一曉然無疑積日既久自當有見但恐用意不精或貪多務廣或得少為足則無由明爾熹比來溫習略見日前所未到一二大節目頗覺省力但昏弱之姿執之不固尤悔日積計有甚於吾友之所患者乃承訪以所疑使將何辭以對耶然以所聞質之則似不可不兩進也程夫子曰㴠養須用敬進學則在致知此二言者體用本末無不該備試用一日之功當得其趣不然空抱疑悔不惟無益反有害矣夫㴠養之功則非他人所得與在賢者加之意而已若致知之事則正須友朋講學之助庶有發明不知今者見讀何書作如何究索與何人辨論惟毋欲速毋蓄疑先後疾徐適當其可則功日進而不窮矣因書或有以見教勿憚辭費熹亦不敢不盡愚也向見前輩有志於學而性涉猶豫者其内省甚深下問甚切然不肯沛然用力於日用間以是終身抱不决之疑此可以為戒而不可以為法也伯恭近通問否比亦嘗附一書不知達否所示三錄極有警發人處然亦有合商量者所云只被公家學佛又顧子敦治通典之説此兩條曾與伯恭商量否既云從容侍食告語之詳而又云云則疑若有欲告而不得盡之意既云專治通典使應變浹洽而元祐經筵駮議乃似未始畧知今古之人此不知亦有説耶如未嘗語及告因書為扣伯恭却以見教為幸今世學者語髙則淪於空寂卑則滯於形器中間正當𦂳要親切合理㑹處却無人留意此道之所以不明不行而邪説暴行所以肆行而莫之禁也不知伯恭後來見得此事如何所欲言似此者非一無由而論徒增耿耿答劉子澄反復書辭具悉近况但學者正欲胷中廓然大公明白四達方於致知窮理有得力處今乃追咎往昔念念不忘竊恐徒自煎熬無復理義悦心之味也程子所謂迫切不中理則反為不誠而正慮此耳升高自下陟遐自邇能不遺寸晷而不計近功則終必有主矣如何如何張吕時得書有所講論然亦頗有未定者未欲報去也大抵聖賢立言本自平易而平易之中其旨無窮今必推之使髙鑿之使深是未必真能高深而固已離其本指喪其平易無窮之味矣所論綠衣篇意極溫厚得學詩之本矣但添入外來意思太多致本文本意反不條暢此集傳所以於諸先生之言有不敢盡載者也試更思之如何答劉子澄知言之書用意精切但其氣象急迫終少和平又數大節目亦皆差誤如性無善惡心為已發先知後敬之類皆失聖賢本指頃與欽夫伯恭論之甚詳亦皆有反復雖有小小未合然其大槩亦畧同矣文字頗多未能寫去又有掎摭前輩之嫌亦不欲其流傳也然此等文字且未須看俟自家於論孟諸經平易明白處見得分明無疑然後可以逐一考究判其是否固未可盡以為是亦未易輕以為非也天運不息品物流形無萬物皆逝而已獨不去之理故程子因韓公之歎而告之曰此常理從來如是何歎焉此意已分明矣韓公不喻而曰老者行去矣故夫子又告之曰公勿去可也以理之所必無者曉之如首篇所云請别尋一箇好底性來換了此不好的性著之意爾及公自知其不能不去則告之曰不能則去可也言亦順夫常理而已反復此章之意只如此恐不必於不去處别求道理也明道德性寛大規模廣濶伊川氣質剛方文理宻察其道雖同而造德各異故明道嘗為條例司官不以為凂而伊川所作行狀乃獨不載其事明道猶謂青苖可且放過而伊川乃於西監一狀較計如此此可謂不同矣然明道之放過乃孔子之獵較為兆而伊川之一一理會乃孟子之不見諸侯也此亦何害其為同耶但明道所處是大賢以上事學者未至而輕議之恐失所守伊川所處雖髙然實中人皆可跂及學者只當以此為法則庶乎寡過矣然又當觀用之淺深事之大小裁酌其宜難執一意此君子所以貴窮理也横渠龍女衣冠事却是一時偶見未到若見得到横渠必不肯放過蓋此乃禮官職事使明道當之亦不肯放過也劉李游楊四公所到固未敢輕議然如所論亦近之矣但却不專為仕宦奪志而然蓋劉李未嘗不仕游楊非固狥俗自其所見有淺深故所就有純駁耳大抵學問𦂳要是見處要得透徹然不自主敬致知上著工夫亦無入頭處也學者所志固當大至於論事則當視已之所處與所論之事所告之人而為淺深則無失言失人之患出位曠官之責矣吾學若果未至見若果未明既未能自信且不為人所信則寧退而自求耳言而背其所學用而不副其言皆不可也卒章所問甚切在賢者處之必已熟矣淺陋何足以及此然竊謂此事難以言語定論須且虛心觀理積習功夫令一日之間胷次洞然則隨事隨物無不各有一定之理矣無補於事而祗以取名固所不為然亦有義所當為而或疑於二者則亦不得而避也如此處極要斟酌須是理明義精則源源自見不待問人矣答劉子澄此間文字修改不定朝成暮毁甚覺可笑直卿必能言之所喻學者心粗愛看見成義理此亦人之通患但雖如此終是須要自家玩味浹洽考訂精詳方信得及通計亦是許多工夫也綱目亦修得二十許巻此一卷是正本五巻義例益精宻上下十有餘年亂臣賊子真無所匿其形矣恨相去逺不得少借餘力一加訂正異時脱藁終當以奉累耳近有溫公論史漢名節處覺得有未盡處但知黨錮諸賢趨死不避為光武明章之烈而不知建安以後中州士大夫只知有曹氏不知有漢室却是黨錮殺戮之禍有以毆之也且以荀氏一門論之則荀淑正言於梁氏用事之日而其子爽已濡跡於董卓專命之朝及其孫彧則遂為唐衡之壻曹操之臣而不知以為非矣蓋剛大直方之氣折於凶虐之餘而漸圖所以全身就事之計故不覺其淪胥而至此耳想其當時父兄師友之間亦自有一種議論文飾蓋覆使驟而聽之者不覺其為非而真以為是必有深謀奇計可以活國救民於萬分有一之中也邪説横流所以甚於洪水猛獸之害孟子豈欺予哉年來讀書只覺得此意思分明叅前倚衡自不能舍雖知以是為人所惡而終窮以死其心誠甘樂之不自以為悔也來喻之云真知我者尚何言哉然亦願子澄深察此意有以自振於頽波之中也欽夫得書云嘗得子澄書於所謂云云者亦頗所疑也答劉子澄程子遺書廣東未寄來道逺難督趣甚撓人耳近一朋友借得游先生家本有鮑若雨録數條頗佳昨所未見也它雜出者已一面編集但殊費心力知言已刋行謹納一本幸視至暇日熟觀亦發人意思也周之想時過從所論何事異時來簿延平則有承教之期矣所委記文非敢忘之亦衮衮未暇旦夕當思所以應命者幸察答劉子澄七月二十一日熹頓首再拜子澄通守奉常老兄詹總幹章叅議兩致手帖良以為慰比日秋以復涼伏惟尊候萬福熹五月間因曹挺之行附書想已達矣悲惱之餘心氣間作加以瘡腫諸疾交攻更無一日寜帖恐不復能支久矣日前為學緩於反已追思凡百多可悔者所論著文字亦坐此病多無著實處囘首茫然計非嵗月功夫所能救治以此愈不自快前時猶得敬夫伯恭時惠規益得以警省二友云亡耳中絶不聞此等語因循偷惰安得不至於此今乃深有望於吾子澄自此惠書痛加鐫誨乃君子愛人之意也朗澧之行覽觀山川感今慨古亦足償其勞矣又有同行令弟感發精進此尤可樂者恐有行記撰錄一時之勝願以相寄也李丈到闕未聞有何大議論經筵直宿足以從容起沃亦非細事也游誠之聞到三山已久一向不得書其人彊敏可喜而忮狠之根不除又計較世俗利害太切切恐不免上蔡鸚鵡之譏耳許生初意其飄然無累方欲約之來此教小兒今聞其既授室此事又差池矣塊坐窮山無嚴師畏友之益其不為小人之歸也鮮矣奈何奈何直卿赴試長沙病於清江賴向丈軫視之前日聞得亟遣人往覓信至今兩旬未還甚令人懸心然必是已向安遂西行矣此間後生中只有渠尚可望但亦傷太狹耳昨渠行時亦屬令過省景陽公度不知病後能枉道經由否小學書曽為整頓否幸早為之尋便見寄幸幸昨來奉報只欲如此間所編者今細思之不若來教規模之善但今所編皆法制之語若欲更添嘉言善行兩類即兩類之中自須各兼取經史子集之言其説乃備但須約取勿令太泛乃佳如管仲畏威如疾之語心毎愛之文章尤不可泛如離騷忠潔之志固亦可尚然只正經一篇已自多了此須更子細决擇叙古䝉求亦太多兼奥澀難讀恐非啟䝉之具却是古樂府及杜子美詩意思好可取者多令其喜諷詠易入心最為有益也來喻又有避主張程氏之嫌程氏何待吾輩主張然立言垂訓事關久逺亦豈當避此嫌耶其詳雖己見於近思然其一言半句灼然親切不可不使後學早聞而先入者自不妨特見於此書也若只欲其合於世俗而使庸人愛之則符讀書城南一篇足矣何事勞吾人捃摭之功哉荒田如何措置能録示其施行條目為幸更如何勸得離軍歸正人情願耕佃尤佳向曽於封事中及此去冬奏對猶蒙上記憶宣喻以為善也學校頗得人表率否不然亦恐無益徒費錢糧耳精舍四言并十詠幸早為賦之適得祁師忠書聞書堂中元前後可立木又寄得所為編定武當集録甚簡當但與王叔堅林質夫論兵一二篇頗佳何為不錄耶熹向承見語有為昆弟之約未敢遽信而忽蒙加以非據之稱一向因循不得辭避今欲復尋故約而罷去無實之稱如蒙報書須用此禮即大幸也千萬痛察痛察社記得為撰數十言叙致本末亦使拙者省得一半氣力尤妙荆州地勢四平其守當在外楚人所謂方城為城漢水為池是也若不能守直至城下則無説矣答劉子澄行記甚佳但人説天池光怪有飛空往來或入簷楹或出自房闥者與所記不類豈偶有所遺抑所見適止此耶此為陳寳之屬無足深怪世人胷次昏憒狹隘自以為疑耳此記流傳亦足以少袪其惑也答劉子澄熹一出三月歸已迫嵗病軀幸無他臂痛竟不脱然去體但不甚妨事可置不問却是精神困憊目力昏暗全看文字不得甚覺害事耳舊書且得直卿在此商量逐日改得些少比舊儘覺精宻且令寫出浄本未知向後看得又何如也到泉南宗司教官有陳葵者處州人頗佳其學似陸子静而溫厚簡直過之但亦傷不讀書講學不免有杜撰處又自信甚篤不可囘耳後生中亦有一二可教其一已入陳君保社其一度今嵗當來此然亦恐只堪自守未必可大望自餘則更是難指望此甚可慮蓋世俗啾喧自其常態正使能致焚坑之禍亦何足道却是自家這裡無人接續極為可憂耳讀所寄文字切切然有與世俗争較曲直之意竊謂不必如此若講學功夫實有所到自然見得聖人所謂不知不慍不是虛語今却只為學人弄故紙安得似他不虚過了光隂所以於此都無實得力處乂且心知其為玩物喪志而不能決然舍棄此為深可惜者且既謂之玩物喪志便與河南數珠不同彼其為此正是恐喪志耳班范外事不知編得於已分有何所益於世教有何所補而埋沒身心於此不得超脱亦無惑乎子静之徒高視大言而竊笑吾徒之枉用心也且羅守之賢如此與之同官相好乃不能補其所不足而反益其所有餘又從而自陷焉亦獨何哉數年來此道不幸朋舊凋喪區區所望以共扶此道者尚賴吾子澄耳今乃如此令人悼心失圖悵然累日不知所以為懷不審子澄能俯聴愚言而改之乎不然則已矣無復有望於此世矣奈何奈何小學書却非此比幸早成之精舍詩拈筆可就亦不妨早見寄也羅守之文可謂有意於古矣社壇記已寫送似矣此是狀體文章不古不今不知是何亂道而人來求不已殊不可曉但可笑耳于尉策題亦不易此等人且収拾教減得分數亦是一事桃原詩卷甚佳但李習之復性書已有禪了石林考其年是未見藥山時作必是有此根苗韓公不曽斬截得㫁後來遂張主耳詩中所辯却恐未必然也向丈詩初亦未解承喻乃荷其見愛之深當因書謝之也拙詩并序錄呈韓丈為作記來意態閑暇甚可愛渠更欲改一二處未及寫去也祁居之論兵處何為不取願聞其説説易詩誠可疑也濂溪書堂聞規模甚廣鄙意恐不必如此將來無人住得亦只是倒了不若裁損制度而壯其材植更為買少田以贍守者使其可以長久乃為佳耳壽安銘乃大佳恨得之晚今亦當刻板散施也趙蘄水書來聞嘗就取庶人章解當時草草説得不周徧後在㑹稽因探禹穴見壁間有古靈勸喻文愛其言簡切有理因刻印散之凡投牒者亦與人一本并刻石置臺門外今各往一通恐亦可散施或有益也公度聞近到建昌娶婦甚念一見之而不可得奈何奈何因書更勸其向裡做工夫莫又錯了路頭也知通不受互送罪不在專殺譚賴之下可惜不作一章劾了少快公論耳一笑一笑然老兄宿逋已盡償又有菜飯可喫又已穿壙買棺可謂了事快活人如僕則債未盡償食米不足將來不免永作祠官方免溝壑儉德亦方用力但惜乎其已晚耳有意入閩相見甚善熹固衰憊意老兄未至此然觀來書説得亦可畏誠不可不謀一再㑹合但恐諸公迫於公議有不得已而相挽者或能敗此約耳然若能遂吐至言力扶公議則其功不細又不敢以私計不遂為恨也楊子直何為到彼相聚幾日曾説廟學配祀升黜之議否不合與晁家人相聚來遂一向與孟子不足亦可怪也三山見趙子直稍欵莆中過龔實之墓下并見其子弟令人感歎陛辭論恢復乃是勸勿輕舉之意反遭醜詆甚可傷耳與劉子澄呉生之傳甚駭人聴不得禍根乃爾近日此類非一不了官事連累平人其勢駸駸恐未遽已使人憂懼奈何奈何襄陽之役不為無補細讀來書及詩令人慨歎此事未知將來分付甚人天意必有在矣吾徒之力無如之何只有講學修身傳扶大教使後生輩知有此道理大家用力庶幾人材風俗它日有以為濟世安民之助而已所喻戲謔本欲詞之巧而然此固有之然亦是自家有此玩侮之意以為之根而日用之間流轉運用機械活熟致得臨事不覺出來又自以為情信詞巧主於愛人可以無害於義理故不復更加防遏以至於此蓋不惟害事而所以害於心術者尤深昔横渠先生嘗言之矣見之近思四此當痛改不可緩也近覺所聞所知真實行得令人大段歡喜與尋常㑹得説得不同此不可不知不可不勉也博雜之病亦是把做小事忽畧了以為不足以喪人之志又不自知是自家病痛却以應副人情為解此亦是大病非小病須痛斬截也吾人未老先衰餘日幾何而費日力於此却於自家身心上都不著力豈不是顛倒迷惑之甚耶小學書却於此殊科只用數日工夫便可辦幸早成之便中遣寄也得公度書有哭弟之悲又云甚窘深以為念地逺無力不能少助之為恨李章甚不易比來作何功夫須更切已用力乃有實頭進步處耳此間學者未有大段可分付者然亦有一二將來零星揍合或可大家扶持也與劉子澄喻及治財聴訟望祀之意甚善所刻之書皆有益但小學惜乎太遽又不䝉潤色耳近畧修改每章之首加以本書或本人名字又别為題詞韻語庶便童習今謾録去一觀它日有暇終望為補故事之缺也羅集等異時刻就各求一二本端良止此極可傷惜信道不及亦是合下看得記誦詞章太重了後來又於此得味所以一向不肯放下未必專為禁忌指目也若使見得此道理重便斬作萬段亦須向前豈容復有顧慮耶近年道學外面被俗人攻擊裡面被吾黨作壞婺州自伯恭死後百怪都出至如子約别説一般差異的話全然不是孔孟規模却做管商見識令人駭歎然亦是伯恭自有須拖泥帶水致得如此又令人追恨也子静一味是禪却無許多功利術數目下収歛得學者身心不為無力然其下稍無所据依恐亦未免害事也去年被人强作張吕畫賛及敬夫集序今并録呈婺州學者甚不樂也李丈奏議行狀可得一觀幸甚甚恨不得一見此老然讀其書却是大模様大手段非如一種左右掇拾委曲計校小小家計為無用之學也它時與羅鄂州小集皆願附名於其後然亦只能作題䟦無力做得大文字也被薌林向丈來催後序正冗未能下筆近得書乃以死見要甚令人皇恐也社記樸拙粗踈不成文字不知端良以為如何渠文字細宻有經緯可愛真如來喻之云也汝昭嵗前到山間只得一宿便發病遽歸近聞尚未全安渠却是將䕶太過易得生疾耳伯起聞己到官想經由必欵曲居晦近一再相㑹皆為人多説話不得旦夕無事當招其入山或過武夷相聚數日也蔡季通劉韜仲諸人近日皆長進潘德夫之子友端廷對甚切直尤延之甚愛之為同寮所抑頗降其等此不足計渠兄弟皆好此輩後生將來皆可望也熹又三四日祠禄便滿前日因便已託尤延之為再請勢必得之食貧不得已復為此舉甚不滿人意前此聞諸人頗有蓋抺之意決難承當此不過徒與談者藉口耳然若得其用汝昭故事亦可優游卒嵗也不審明者以為如何建陽有丘伯興者字敦詩廉謹質實今為武安節度推官得書云趙清獻嘗為此官嘗即廨舍營一堂求名以見師慕趙公之意熹為名曰愛直蓋取碑額云爾渠復求記以不暇作辭之己語之將為轉求於子澄矣不識能為作否此亦好題目得勉為出數語為幸公度不及别書向來諸生頗復來集否離羣之後誰更進益耶西山詩蘓黄之外却是三孔有筆力但不知所謂攙搶枉矢指何人耳晁張一時聲價如此詩在衆人中未覺穎出也此等小技直是有定分况其大者功力不到處可强耶廣陵歸途必取道浙中到衢信間能畧見過喚集朋友説話數日否老矣多病後會不可知此日足可惜也與劉子澄諸書今嵗都修得一過比舊儘覺簡易條暢矣恨不得呈以商量也小學見此修改益以古今故事移首篇於書尾使初學開巻便有受用而末巻益以周程張子教人大畧及鄉約雜儀之類别為下篇凡定著六篇更數日方寫得成恨仲叔不能等候得後便當附呈也知欲一來建安甚善甚善前書亦嘗奉問欲就中路深避處相聚數時不知曽踏逐得此去處否麻姑當是佳處但聞去城太近不免人事之擾却不濟事耳武夷結茅雖就然亦苦此覺得却是朋友直來相訪只就書院中寢食則都無外面閒人相擾也晉陵將來如何尤丈得書亦云甚願得賢守臨之但恐難合耳今豐守稍正當諸司已不樂之不知將來竟如何前此似有相物色作史官者今又寂然想又有主張者此等自有時節但景色日見不佳萬一不免即難出手耳向丈著甚來由之語是此老子受用得力處然却不是薌林句法也序文極力只做得如此却是好箇題目所恨筆力弱耳仲叔來此前此在社倉宿食相去差逺近方移來閣下渠又告歸其人資性平和看文字亦易曉然似亦習成閒懶離羣之後全不曾做得功夫到此方討册子看便未有可商量處如倉庫無紅腐貫朽之積軍士無超距投石之勇只是旋収旋支或鼓或罷終是不成頭緒已向渠説别後惜取光隂須看敎滿肚疑難不能得相見相見後三五日説不透方是長進也希仲相見毎問動静亦甚以晉陵之行為慮也居晦才力有餘晦伯韜仲恐不及然意趣則皆可喜誠之久不相見不知後來遊諸賢間所進如何但向覺其物我太深胷中不甚坦夷此甚礙著事耳伯恭無恙時愛説史學身後為後生輩糊塗説出一般惡口小家議論賤王尊霸謀利計功更不可聴子約立脚不住亦曰吾兄蓋嘗言之云爾中間不免極力排之今幸稍定然其彊不可令者猶未肯竪降幡也但昨日得婺人書云子約五月間得眩瞀之疾繼以藏府不安或作或止地逺未得安信甚令人念之也子静寄得對語來語意圓轉渾浩無凝滯處亦是渠所得效驗但不免些禪的意思昨答書戲之云這些子恐是葱嶺帶來渠嶺不伏然實是如此諱不得也近日建昌説得動地撐眉努目百怪俱出甚可憂懼渠亦本是好意但不合只以私意為主更不講學㴠養直做得如此狂妄世俗滔滔無話可説有志於學者又為此説引去真吾道之不幸也公度書來似有此病痛不知李章如何學問固是須著勇猛然此勇猛却要有箇用處若只兩手握拳努筋著力枉費十分氣力下稍無可成就便須只是怪妄而已呉伯起資質本是大段昏弱故得此氣力便能振厲而短長相補不至於怪然亦失之偏枯恐不能大有所就若資性中本有些子精神被此發作如陽藏人喫却伏火丹砂其不發狂者幾希耳近日因看大學見得此意甚分明聖賢已是八字打開了但人自不領會却向外狂走耳所寄諸書刻皆佳端良之亡為可惜也然其文意亦傷冗乃是困於所長耳郡守題名記法戒甚備射亭詞筆皆佳不知兩君為如何人也與劉子澄衡陽改命不省所繇今日忽聞蘓訓直又有别與近次之命此於取舍之際不無可疑不審何以處之計必有定論不容草草也學館答問甚佳曽君亦不易得但所須有的當存主處此等始為有助耳家塾祀夫子於古未聞若以義起當約釋菜禮為之乃佳開元政和兩書必有之可叅考也時令之書恨未得見不知所補於家國者何事為急因便幸示及并喻及子細也子路不能變化氣質之論言之不難政懼行之不易是以難輕言耳周子有言聖人之教使人自易其惡自至其中而已爾竊意如子路者可謂能易其惡矣若至其中一節功夫則雖夫子毎毎提撕然未見其有用力處也人百已千者終可必至宜若登天則終不可及兩論正自不同又何疑耶大學近再看過方見得下手用功處路陌徑直日前看得誠是不切亂道誤人也趙子直入蜀前日至武夷别之亦與説游誠之周居晦渠却云今只要尋箇不説話底人看此議論似已怕此一等人了宜乎作貴人也更進一步便叅到周子充地位矣張甥向學不易得可喜但讀大學章句恐無長進須向裏面尋討實下手處乃佳耳直卿去冬暫歸今已復來仁卿亦來相訪見在此意思亦甚好也便人告行復作此附之未能盡所欲言但念果為湖南之行即相望益逺令人作惡耳宋憲樂善愛民可與共事諸子頗有意向學但前此未得師友今在彼又為戴溪鶻突若到彼可力與救㧞亦一學也與劉子澄使至辱誨示得聞到郡諸况深用慰喜信後秋深益熱恭惟尊候萬福條教所先必有以大慰逺人之望者不審謂何今既累月上下亦必已相安矣酒引竟作如何處置宋憲亦當可商量天下事有極要委曲者趙子直在此講求臨汀鹽法利病甚悉竟以諸司議論不一而罷甚可惜然亦是渠合下不與漕司商量之過不可專罪它人也居官無修業之益若以俗學言之誠是如此若論聖門所謂徳業者却初不在日用之外只押文字便是進德修業地頭不必編綴異聞乃為修業也近覺向來為學實有向外浮泛之弊不惟自誤而誤人亦不少方别尋得一頭緒似差簡約端的始知文字言語之外真别有用心處恨未得面論也浙中後來事體大段支離乖僻恐不止似正似邪而已極令人難説只得皇恐痛自警省恐未可專執舊説以為取舍也小學能為刋行亦佳但須更為稍加損益乃善近得韓丈書云如鄧攸縛子於樹之屬似涉己甚恐此等處誠可削也若不欲盡去其事且刋前此語亦佳耳史傳中嘉言善行及近世諸先生教人切近之語亦多有未載者更望刷出補入乃為佳也衡州劉徳老宋憲嘗言之二君却未聞僻郡有此亦可喜此間却自難得也與劉子澄老兄歸來無事又得祠禄添助俸餘無復衣食之累杜門讀書有足樂者不審比來日用事復如何且省雜看向裏做些功夫為善熹病雖日衰然此意思却似看得轉見分明親切嵗前看通書極力説箇幾字儘有警發人處近則公私邪正逺則廢興存亡只於此處看破便斡轉了此是日用第一親切功夫精粗隱顯一時穿透堯舜所謂惟精惟一孔子所謂克己復禮便是此事食芹而美甚欲獻之吾君也去嵗作高彦先祠堂記前日漳守方送來今往一本此等議論亦觸時忌㑹帶累人喫章也廬陵舊學子却須聚集高劉諸人頗長進否今日無事可為只有収拾後生磨礲成就是著得力處而此間朋友鼓作不起深為可慮不知彼中如何更望留意以身率之乃所望也向讀女戒見其言有未備及鄙淺處伯恭亦嘗病之間嘗欲别集古語如小學之狀為數篇其目曰正静曰卑弱曰孝愛曰和睦曰勤謹曰儉質曰寛惠曰講學班氏書可取者亦删取之如正静篇即如杜子美秉心忡忡防身如律之語亦可入凡守身事夫之事皆是也和睦謂宜其家人寛惠謂逮下無疾妬凡御下之事病倦不能檢閲幸更為詳此目有無漏落有即補之而輯成一書亦一事也向見所編家訓其中似已該備只就彼采擇更益以經史子集中事以經為先不必太多精擇而審取之尤佳也與劉子澄承寄示所和鴻慶舊詩三復感歎但麻鞵之契今何敢望有如此事耶槐隂詩文講巻皆佳季章蓋所謂為切問近思之學者真不易得但似有迫切狹吝之意見得道理到處十分到不到處亦十分不到想見都不讀書理㑹文義雖理㑹亦是先將己意向前攙㫁扭揑主張所以有來喻云云之病景陽又忒寛慢自己分上想見是不親切也公度向時得見資質儘過諸人但後來覺得亦有局促私吝之意不知今又如何也巻子隨看各以鄙見批在紙背請更詳之似此講論初聞之以為當有益故嘗往來問目欲令諸生條對以今觀之則問者本無所疑而答者初無所見多是臨時應課塞白似此講論恐無所益又有一種切己病痛日用功夫只在當人著實向前自家了取本不用與人商量亦非它人言説所能干預縱欲警覺同志只合舉起話頭令其思省其聞之者亦只合猛省提掇向自己分上著力不當更著言語論量應對如人有病只合急急求藥既得藥只合急急服餌不當更著言語形容此病更著言語賛歎此藥也今將實踐履事却作閑言語説了方其説時意在於説而不在於行此恐不惟無益而又反有害也以愚見觀之似不若將聖賢之書大家講究一件有疑即問有見即答無疑無見者不必拘以課程如此却以實有功夫不枉了閑言語不知老兄以為如何也晦庵集巻三十五欽定四庫全書晦庵集巻三十六宋朱子撰
