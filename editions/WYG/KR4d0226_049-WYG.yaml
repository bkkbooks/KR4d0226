body:
  text: 答王子合遇前月末送伯恭至鵝湖陸子壽兄弟來㑹講論之間深覺有益此月八日方分手而歸也伯恭奉祠已久亦每談志行之美也所諭變化氣質方可言學此意甚善但如鄙意則以為惟學為能變化氣質耳若不讀書窮理主敬存心而徒切切計較於今昨是非之間恐其勞而無補也不審明者以為如何答王子合向來觀復其見天地之心乎易傳云動之端乃天地之心也未覩其旨近思得之敢質於先生遇謂天地之心生生不已太極一動二氣運行互為其根盖未嘗或息非可以動靜言也其曰動之端云者指流行之體示之即生物之原者也遺書云天只是以生為道天地之心固在於生物然於生處觀之則偏於動而不知動之所以然非指其端無以見生生之理也在人則惻隠之心是也乍見孺子將入井必有怵惕惻隠此心不逺於此察之庶可見矣此心雖非心之本體然始發見在是故推此心則廓乎天地之間無所不愛人惟汨於欲而不知復則是心泯然不見猶窮隂沍蔽萬物歸根生生之理雖未嘗或息何自見之一陽微動生意油然此復所以見天地之心也在學者工夫則平日涵養語黙作止須要識得端倪則心體昭然可黙識矣故伊川云善學者不若於已發之際觀之觀於已發識其未發克己不已一旦復之則造次顛沛皆見此心之妙始可以言仁矣所喻復見天地心之説甚善然此須通動靜隂陽善惡觀之見得各是一理而此意無所不通始盡其曲折耳學者工夫則只如易傳所説知其不善則速改以從善此是要約處若説須要識得端倪而心體可識則却是添却一事也鄙見如此或恐未然更告諭及子晦相見煩致意未及奉書歐陽慶嗣書云甚頼切磨之益想日有至論也答王子合所喻思慮不一胸次凝滯此學者之通患然難驟革莫若移此心以窮理使向於彼者專則繫於此者不解而自釋矣答王子合子晦所謂使無童子之言則曾子亦泊然委順未足以病其死唯童子之言一入其聴而士死於大夫之簀則有所不安故必舉扶而易之然後無一毫愧心而安其死此數句甚善但謂大夫有賜於士之禮則未知所據似未安也子合所謂大夫之簀季孫安得賜諸曾子曾子亦安得受諸季孫曾子固曰我未之能易則其平日盖欲易之矣此論亦善但謂曾子辭季孫之仕則亦無據而曰不欲為已甚而黽勉以受其賜則又生於世俗委曲計較之私而非聖賢之心矣又云死生之際則異於是盖有一毫不正則有累於其生如此則是人之生也可無不為必將死而後始為計也此亦必不然矣今但平心而論則季孫之賜曾子之受皆為非禮或者因仍習俗嘗有是事而未能正耳但及其疾病不可以變之時一聞人言而必舉扶以易之則非大賢不能矣此事切要處只在此毫釐頃刻之間固不必以其受之為合禮而可安亦不必以為與世周旋不得已而受之也况善吾生乃所以善吾死豈有平時黽勉狥情安於僣禮必俟將死而後不肯一毫之差而足以善其死耶且若如此則聖賢臨死之際事緒紛然亦不勝其改革矣若曾子之事計其未死之前有人言之則必即時易之而不俟将死之日矣然就二説論之謂受簀合禮者但失之輕易粗略考之不精而謂黽勉周旋者其巧曲支離所以為心術之害者甚大恐不止於此一事要當推類究索拔本塞源然後心得其正而可語聖賢之學也鄙見如此幸復相與考之再以見喻答王子合昨承問及復卦之説如所諭固善然亦有説盖隂陽生殺固無間㫁而亦不容並行且如人方窮物欲豈可便謂其間天理元不間㫁而且肆其欲哉要須窮欲之心滅息然後天理乃得萌耳程夫子所謂天地間雖無截然為隂為陽之理然其升降生殺之大分不可無也此語最為完備然隂陽動靜是造化之機不能相無者若善惡則有貞妄之分人當克彼以復此然後可耳至所謂可識心體者則終覺有病盖窮理之學只是要識如何為是如何為非事物之來無所疑惑耳非以此心又識一心然後得為窮理也曾子受季孫之賜無可緣飾只得做不是所以後來須要易了方死只如此看多少直截若謂因仍習俗非曾子之為然則向所謂黽勉周旋者又豈得為曾子之為邪要之一等是錯了不若只如此看猶不失為仁者易辭之過也如何如何答王子合所問禮文曲折此在經訓甚明但今世人情有不能行者且依溫公書儀之説亦不為無據也見成服及祥禫處然今日月已久計已如此行之矣家祭一節熹頃居䘮不曾行但至時節略具飯食墨衰入廟酌酒瞻拜而已然亦卒哭後方如此前此無衣服可入廟也今服其䘮未葬亦不敢行祭非略之乃謹之也不審明者以為如何答王子合前書所論實地功夫者甚善但常存此意時復提撕勿令墜墮乃佳今時學者未論外誘多只是因循怠惰自放倒耳真不可以不戒至於出門有碍之説則似未然自家持守處固是不可放過至於應世接物同異淺深豈容固必但看得破把得定自不妨各隨分量應副將去何必如此懷不平之心而浪自苦哉纔有此等意思恐亦便是本原有不察處政不可作兩截看也今書所論中庸大旨盖多得之但言其上下察也其者指道體而言察者昭著之義言道體之流行發見昭著如此也謝楊之意似皆以為觀察之察若如其言則此其字應是指人而言不知此時豈有人之可指而亦豈上下文之意耶吕氏以夫婦所知所能為費聖人所不知不能為隠此為用横渠説而異乎伊川者然伊川亦不説著費隠二字如何分畫但想其意不如此耳天地閉為不恕一語雖有病然大意取象是如此如易之隂陽以天地自然之氣論之則不可相無以君子小人之象言之則聖人之意未嘗不欲天下之盡為君子而無一小人也豈相病哉其鬼不神是老子語謝氏語解所引正與其語錄相表裏不知如何見得優劣處恐不必如此分别也恐别有説更煩詳喻二十七章説則所分畫似全未是恐更當以章句之説考之乾知大始説者多為主宰之論似若微妙而反粗淺盖若如此則乾與大始各是一物而以此一物管彼一物如今言某官知某州事也故伊川先生只以當字釋之則其言雖若淺近却無二物之嫌意自渾全也不顯二字二十六章者别無他義故只用詩意卒章所引緣自章首尚絅之云與章末無聲無臭皆有隠微深宻之意故知其當别為一義與詩不同也知逺之近知風之自據表而知裏也知微之顯由内以達外也宗廟南向堂室皆南向但室户在室南壁之東偏而南向牖在室南壁之西偏而南向故以室西南隅為奥而為尊者之居所謂宗室牖下也既以西南為尊者之位則室中之位固以東鄉為尊矣非謂廟東鄉而太祖東向也然亦非獨太祖也凡廟皆南鄉而本廟之主在其廟室中皆東鄉但袷祭於太廟之時則獨太祖不易其位而羣廟之主合食於前者皆南鄉北鄉以敘昭穆耳禘祭於太廟則又以所出之帝為東鄉而太祖反居南鄉為配位也通典開元禮釋奠先聖東向先師南向乃古禮也堂上之位則以南向為尊如儀禮鄉飲酒賓席牖前南向今沈存中説祭禮朝踐於堂亦以南向為尊而政和新儀亦有是説但未見所據之本文又秦漢間廣武君王陵母皆云東向坐田蚡傳亦云自坐東鄉而坐其兄南鄉此則不知其為室中為堂上但猶以東鄉為尊則可見矣答王子合别紙所論甚悉但如此講論愈覺支離勢須異時面見口講指畫乃可究見底藴今且當就理義分明處理㑹令徑路滑熟庶於上達處有可漸進之階耳祭禮廟室西上證據甚多但通典注中有夫人之主處右之説而賈頊祭儀又云夫人版皆設於府君之左韓魏公祭圖亦以妣位居考之東詳此廟室既以西為上則不應考東而妣西恐通典或字誤耳此書雖舛杭本亦多舊誤孝子之稱據禮亦有如此通稱者如云孝子某使介子某執其常事之類但今當各以其屬書之似為穏當耳答王子合丁未十二月二十五日謝氏致生致死之説亦是且借此字以明當祭與不當祭之意致生之者如事死如事生事亡如事存是也致死之者如絶地天通廢撤滛祀之類是也若於所當祭者疑其有又疑其無則誠意不至矣是不得不致生之也於所不當祭者疑其無又疑其有則不能無恐懼畏怯矣是不得不致死之也此意與檀弓論明器處自不相害如鬼神二字或以一氣消息而言或以二氣隂陽而言説處雖不同然其理則一而已矣人以為神便是致生之以為不神便是致死之然此兩句獨看却有病須連上文看可與不可兩字方見道理實處不是私意造作若不然即是應觀法界性一切唯心造之説矣其他未暇詳論盖成伯告歸甚迫故且附此餘俟來春相見面論大率尊德性一條章句似已詳備更熟玩之自見功夫分别處日用間常切提撕著實下手方見得力處若只解説無有了期不濟事也答王子合細看前書諸説謝氏之言大概得之若以本文上下考之即誠不免有病乃若其意則所謂致生之者即是人以為神致死之者即是人以為不神之意耳天神地示人鬼只是一理亦只是一氣中庸所云未嘗分别人鬼不在内也人鬼固是終歸於盡然誠意所格便如在其上下左右豈可謂祀典所載不謂是耶奇怪不測皆人心自為之固是如此然亦須辨得是合有合無若都不分别則又只是一切唯心造之説而古今小説所載鬼怪事皆為有實矣此又不可不察也答王子合動靜無端隂陽無始本不可以先後言然就中間截㫁言之則亦不害其有先後也觀周子所言太極動而生陽則其未動之前固已嘗靜矣又言静極復動則已静之後固必有動矣如春秋冬夏元亨利貞固不能無先後然不冬則何以為春而不貞又何以為元就此看之又自有先後也又如克己復禮然後可以為仁固不可謂前此無仁然必由靜而後動也惟精惟一而後可以執中固不可謂前此無中然亦由靜而後動也舉此類而推之反復循環無非至理但看從甚處説起則當處便自有先後也性之善猶水之下此善字却是就人物稟受以後而言據其發用之初對其成就之極又自為隂陽也念念相逢事事相續無頃刻不如此大意亦與前段相似細推之可見來喻所引乃舊本後來思之不能又生支節轉費分疏故嘗削去然今得子合如此商量却好不然則此意終不分明也愛人利物等語亦不甚精後已刪去矣仁字須是就一事上見綂體之全就綂體處見一事之實方始活絡無滯礙處此段甚好如云氣之所聚理即在焉然理終為主此即所謂妙合也又云自其生化之所自出而言故曰妙合此句却不甚親切鬼神第一段甚好二氣之分即一氣之運所謂一動一靜互為其根分隂分陽兩儀立焉者也在人者以分言之則精為隂而氣為陽故魄為鬼而魂為神以運言之則消為隂而息為陽故伸為神而歸為鬼然魂性動故當其伸時非無魄也而必以魂為主魄性静故方其歸時非無魂也而必以魄為主則亦初無二理矣幽滯之魄終歸於盡以此論伯有為厲之事則可矣然亦須兼魂魄而言不可專指幽隂也若論魂魄之正則便只是隂陽元非他物若天地之隂陽無窮則人物之魂魄無盡所以誠意所格有感必通尤不得專以隂滯未散終歸於盡為説矣大學直卿看過有疑處已貼在内可詳之但知止則止字為重言知其所當止也知至則知字為重言其知識到極處也今曰格物致知格是極乎知之至其地位固如此然其文意不同亦不可以不察答王子合隂陽之氣相勝而不能相無其為善惡之象則異乎此盖以氣言則動静無端隂陽無始其本固並立而無先後之序善惡之分也若以善惡之象而言則人之性本獨有善而無惡其為學亦欲去惡而全善不復得以不能相無者而為言矣今以隂陽為善惡之象而又曰不能相無故必曰小人日為不善而善心未嘗不間見以為隂不能無陽之證然則曷不曰君子日為善而惡心亦未嘗不間見以為陽不能無隂之證耶盖亦知其無是理矣且又曰克盡己私純是義理亦不離乎隂陽之正則善固可以無惡矣所謂不能相無者又安在耶大凡義理精微之際合散交錯其變無窮而不相違悖且以隂陽善惡論之則隂陽之正皆善也其沴皆惡也周子所謂剛善剛惡柔亦如之者是也以象類言則陽善而隂惡以動静言則陽客而隂主此類甚多要當大其心以觀之不可以一説拘也窮理之學誠不可以頓進然必窮之以漸俟其積累之多而廓然貫通乃為識大體耳今以窮理之學不可頓進而欲先識夫大體則未知所謂大體者果何物耶道即理也以人所共由而言則謂之道以其各有條理而言則謂之理其目則不出乎君臣父子兄弟夫婦朋友之間而其實無二物也今曰子貢曾㸃知道矣而窮理未盡則未知所謂道者又何物耶心猶鏡也但無塵垢之蔽則本體自明物來能照今欲自識此心是猶欲以鏡自照而見夫鏡也既無此理則非别以一心又識一心而何後書所論欲識端倪未免助長者得之矣然猶曰其體不可不識似亦未離前日窠臼也細看後書已改識字為知字又云心體之知亦似已覺前弊但未脱然耳答王子合聖人以此洗心聖人以此洗心此字指蓍卦之徳六爻之義而言洗心言聖人玩此理而黙契其妙也退蔵於宻但言未感物之時耳及其吉凶與民同患則所用者亦此理而已其所以知來者向之所謂圓而神者也其所以藏往者向之所謂方以知者也神武不殺言聖人之不假卜筮而知吉凶也是以明於天之道以下乃言敎民卜筮之事而聖人亦未嘗不敬而信之以神明其德也此章文義只如此程先生説或是一時意到而言不暇考其文義今但玩味其意别看可也若牽合經旨則費力耳孟子言性善一章伊川先生謂性之本又謂極本窮源之性明道先生則謂人生而静以上不容説纔説性時便已不是性凡人説性只是説繼之者善也伊川以為本而明道言其繼何也竊思伊川之言只謂性之本然耳明道言人生而静以上不容説則周子之所謂無極也不可容言也若太極則性之謂也太極固純是善自無極而言則只可謂之繼明道之言所以發明周子之意也伊川之意只是説性之本然無不善耳所以為極本窮源之性與明道之意不相妨鄙見如此周子所謂無極而太極非謂太極之上别有無極也但言太極非有物耳如云上天之載無聲無臭故下文云無極之真二五之精既言無極則不復别舉太極也若如今説則此處豈不欠一太極字耶人生而静静者固是性然只有生字便帶却氣質了但生字已上又不容説盖此道理未有形見處故今纔説性便須帶著氣質無能懸空説得性者繼之者善本是説造化發育之功明道此處却是就人性發用處説如孟子所謂乃若其情則可以為善之類是也伊川所言極本窮源之性乃是對氣質之性而言言其氣質雖善惡不同然極本窮源而論之則性未嘗不善也易變易也隨時變易以從道也易即道也然以變易而得名道者自然不易之理也從之者亦適當之而已非以此而從彼也易之所以變易者固皆是理之當然聖人作易則因其爻象之變灼見理之所當然者而繫之辭敎人以變易從道之方耳如乾初則潛二則見之類皆隨時變易以從道之謂也乾聖人之分也可欲之善屬焉坤學者之分也有諸已之信屬焉云云此説大概得之但乾坤皆以性情為言不當分無形有形只可論自然與用力之異耳八卦之位如何康節説伏羲八卦乾位本在南坤位本在北文王重易時更定此位其説甚長大槩近於附㑹穿鑿故不曾深留意然説卦所説卦位竟亦不能使人曉然且當闕之不必彊通也答王子合竊謂聖人既己玩易而黙契其妙自然退藏於宻吉凶與民同患更無先後之可言理固無先後然時與事則不能無先後之殊矣此等處須子細著實理㑹不可一向掠空説向上去無收殺也性之初只有善本無惡之可言乃四德之元五常之仁也孟子所謂性善者此是也明道言繼之者善方言性之發用則四端之心是也烏得與情合而言之性之始終一於善而已不當云性之初只有善也若如所云則謂性之終為有惡可乎性之發用非情而何情之初則可謂有善而無惡耳乃若其情若字恐亦未必訓順也答王子合己酉閏五月十八日所喻祠記前日之書似已奉報不知後來頗見邸報否語黙隠顯自有時節前日膚仲亦以修學來求記謹不敢作矣今只有解釋經義與時事無大相闗且流俗所不觀故猶不免偷閒整頓然亦凜凜不敢自保况敢作文章説道理大書深刻與人遮屋壁使見其姓名指瑕求釁以重世俗之憎病乎李伯諫初去時極要整頓學校後來病痛多般立脚不住都放倒了大抵吾輩於貨色兩闗打不透便更無語可説也大學解義平穏但諸生聴者湏時時抽摘問難審其聴後果能反復尋繹與否近覺講學之功不在向前只在退後若非温故不能知新盖非惟不能知新且并故者亦不記得日用之間便成相忘雖欲不放其良心不可得矣此事切宜自警并以提撕學者為佳如其不然則吕藍田所謂無可講者真不虚矣若得它就此得些滋味趣向立得一箇基址即向後自住不得若都茫然無本可據徒然費人詞説久逺成得甚事切望於此留意不須鐫碑立名只為一時觀美無益於人邂逅或能生事也答王子合使天下皆知此理而求止焉固是新民之事然其所以使之如此者必有道矣示之表儀固是所以新之之本然已屬明明德之分矣須知政敎法度之施於民者亦無不欲其止於至善也定靜安慮得五字是功效次第不是工夫節目興孝興弟不倍上行下效之意上章已言之矣治國此章再舉之者平天下乃欲引起下文君子必須絜矩然後可以平天下之意不然則雖民化其上以興於善而天下終不免於不平也故此一章首尾皆以絜矩之意推之而未嘗復言躬行化下之説然則治國平天下雖無二道然其設施之際不可謂無異術也意雖心之所發然誠意工夫却只在致知上做來若見得道理無纎毫不盡處即意自無不誠矣意誠然後心得其正自有先後今曰主於心而由中以出安有不誠正是顛倒説了以上四説請詳之横渠先生有言義理有疑即濯去舊見以來新意此言最有理盖舊見已是錯了今又就上面更起意思擘畫分疏費力愈多而於本經正文意思轉見昏了須是一切放下只将經文虚心涵泳令其本意瞭然心目之間無少差互則却囘頭來看舊來見處其是非得失不崇朝而決矣答王子合示喻曲折具曉所謂但區區之意初見彼間風俗鄙陋汙濁上不知有禮法下不知有條禁其細民無知猶或可憐而號為士子者恃彊挾詐靡所不為其可疾為尤甚故於此輩茍得其情則必痛治之盖惟恐其不嚴而無以警動於愚俗至於廉退好修之士柔良鰥寡之民則未嘗以此加之也細民籍籍不知此意妄生恐懼而彼為士者亦何遽至畏縮而不敢來相見乎若果有之即是其見識不髙趨向凡下無以異於愚民為政者亦安能每人而悦之哉至如經界一事固知不能無小擾盖驅田里之民使之隨官荷畚持鍤揭竿引繩以犇走於山林田畝之間豈若其杜門安坐飽食而嬉之為逸哉但以為若不為此則貧民受害無有己時故忍而為之庶其一勞而永逸耳若一一恤此必待其人人情願而後行之則無時而可行矣且如此間紹興年間正施行時人人嗟怨如在湯火之中是時固目見之亦以為非所當行但訖事之後田税均齊里閭安靖公私皆享其利遂無一人以為非者凡事亦要其久逺如何耳但惜乎此事未及下手而上下共以私意壞之使人預憂其擾而不見其利此則非熹之罪而當世自有任其責者尚何言哉然當時若更施行則其擾不但土封而已不知噂沓又復如何也若便指土封為擾而謂經界之不善則如子合者亦未究此利害也桂林之行亦引此自列然後得免後世當有知此心者耳新學既成氣象開豁但願自今以往游其間者亦各放開心胸莫作舊時卑污暗昧見識乃為佳耳答王子合所喻土封事當時却無人來論訴亦無人子細説及熹又尋即去郡故其事不及露而失於究治耳但如來喻所云所費不多不能與之訟於官府則其為害應亦不至太甚但今已不行無可得説便且借此為話端而興謗議耳若果盡行則熹自料雖使更用嚴刑峻法此等小擾亦恐終不能免其謗必有大於此者而如子合者亦將有畨悔青苗之議矣此可付一笑也少時見所在立土封皆為人題作李椿年墓豈不知人之常情惡勞喜逸顧以為利害之實有不得而避者耳如禹治水益焚山周公驅猛獸豈能不役人徒而坐致成功想見當時亦必須有不樂者但有見識人須自見得利害之實知其勞我者乃所以逸我自不怨耳子合議漢事甚熟亦曾看漢髙初定天下蕭何大治宫室又從婁敬説徙齊楚大姓數十萬於長安不知當時是費㡬箇土封底功夫而不聞天下之不安其於今日事勢何如也子餘留此久適熹病不得朝夕相聚又見渠長上不欲痛下鈐鎚後來自覺如此含糊恐誤朋友方著力催儧功夫則渠已有行日矣其有尚宿留者用新法課程近日却頗長進信乎小仁者大仁之賊而無面目者乃長久人情也答林伯和示喻前此盖嘗博求師友而至今未能有得足見求道懇切之意以熹觀之此殆師友之間所以相告者未必盡循聖門學者入德之序使賢者未有親切用力之處而然耳大抵聖人之敎博之以文然後約之以禮而大學之道以明明德為先新民為後近世語道者務為髙妙直截既無博文之功而所以約之者又非有復禮之實其工於記誦文詞之習者則又未嘗反求諸身而囂然遽以判㫁古今髙談治體自任是皆使人迷於入德之序而陷於空虚博雜之中其資質敦篤慤實可以為善而智識或不逮人者往往尤被其害此不可不察也為老兄今日之計莫若且以持敬為先而加以講學省察之助盖人心之病不放縱即昬惰如賢者必無放縱之患但恐不免有昬惰處若日用之間務以整齊嚴肅自持常加警策即不至昬惰矣講學莫先於語孟而讀論孟者又須逐章熟讀切已深思不通然後考諸先儒之説以發明之如二程先生説得親切處直須看得爛熟與經文一般成誦在心乃可加省察之功盖與講學互相發明但日用應接思慮隠微之間毎每加察其善端之發慊於吾心而合於聖賢之言則勉厲而力行之其邪志之萌愧於吾心而戾於聖賢之訓則果決而速去之大抵見善必為聞惡必去不使有頃刻悠悠意態則為學之本立矣異時漸有餘力然後以次漸讀諸書㫄通當世之務盖亦未晚今不須預為過計之憂以失先後之序也若不務此而但欲為依本分無過惡人則不惟無以自進於日新正恐無本可據亦未必果能依本分無過惡也無由面諭姑此布萬一幸試留意焉此紙勿以示人但叔和㡬道及林兄昆仲諸人亦不可不知耳答林叔和示喻為學本末足見雅志嘗觀當世儒先論學初非甚異止緣自視太過必謂它人所論一無可取遂致各立門庭互相非毁使學者觀聴惶惑不知所從竊意莫若平視彼已公聴並觀兼取衆長以為已善擇其切於已者先次用力而於其所未及者姑置而兩存之俟所用力果有一入頭處然後以次推究纎悉詳盡不使或有一事之遺然後可謂善學不可遽是此而非彼入主而出奴也答林叔和襄事既在秋冬日下想亦少寛雖或紛冗不得近書册然此心此理隨處操存隨處體察亦無往而非學也只在日間常切警省勿令昬惰耳答林叔和孟子程子所説才字之意不同既是聖賢之言後學如何便敢判斷但此事道理只就自己身上體認便自見得而其所以為是非得失者亦不容無分别也如集註中以程子為宻即是見得孟子所説未免少有疎處今但以程子為主而推其説以隂補孟子之不足則於理無遺而兩書之説亦不至甚相妨矣答林熙之易文言德不孤正是發明大字意思謂德盛者得之矣然與物同亦是此意試玩敬義立而與物同之意當得之恐不可云只是説與物同也答陳膚仲孔碩所論詩序之疑舊嘗有此論而朋友多不謂然亦不能與之力爭姑著吾説以俟後之知者而已闗雎序文之失固然論語之意亦謂其樂得淑女也不過而為滛其哀夫不得也不過而為傷正如詩文之謂耳但序者不曉乃析哀樂淫傷為四事而所謂傷善之心者尤為無理是則不可不察也然此等處姑黙識之不須遽與人辨今人耳學都不将心究索難與論是非也大抵諸經文字有古今之殊又為傳注障礙若非理明義精卒難決擇不如且讀論孟大學中庸平易明白而意自深逺只要人玩味尋繹目下便可踐履也陸學固有似禪處然鄙意近覺婺州朋友專事聞見而於自己身心全無功夫所以每勸學者兼取其善要得身心稍稍端静方於義理知所決擇非欲其兀然無作以冀於一旦豁然大悟也吾道之衰正坐學者各守已偏不能兼取衆善所以終有不明不行之弊非是細事答陳膚仲來書云今日反復諸書以收心至涵養工夫日有所奪未見其效此又殊不可曉夫讀書固收心之一助然今只讀書時收得心而不讀書時便為事所奪則是心之存也常少而其放也常多矣且胡為而不移此讀書工夫向不讀書處用力使動靜兩得而此心無時不存乎然所謂涵養功夫亦非是閉眉合眼如土偶人然後謂之涵養也只要應事接物處之不失此心各得其理而已諸書解偶未有定本漫此奉報可試思之若於此得力却逺勝看解也聞有用度不足之憂何故如此豈非意氣太豪日用間羞言撙節計量之事而又多狥人情應副求假不免有虚内事外之弊耶此雖與吝嗇鄙細者相去懸隔然其為失中則均恐亦當自省而改之也答陳膚仲累書喻及敎導曲折甚善此傳丞便來雖不得書傳亦具言近况知人情頗相信足以為喜但更須自家勉力使義理精通踐履牢實足以應學者之求而服其心則成已成物兩無虧欠如其不然只靠些規矩賞罰以束縳之則亦粗足以齊其外而已究竟亦何益乎科舉文字固不可廢然近年飜弄得鬼怪百出都無誠實正當意思一味穿穴旁支曲徑以為新竒最是永嘉浮偽纎巧不美尤甚而後生輩多宗師之此是今日莫大之弊向來知舉輩盖知惡之而不能識其病之所在顧反抉摘一字一句以為瑖疵使人嗤笑今欲革之莫若取三十年前渾厚純正明白俊偉之文誦以為法此亦正人心作士氣之一事也大學説得如何近得王子合書彼亦説此寄得講義來頗詳悉恨未見膚仲所講有便幸錄來也絜矩文義更宜反復上下句意未可容易立説若如所喻則老老興孝等句與絜矩之道有何交涉耶熹兩年擾擾今幸粗定辭職未允已再請矣此非欲為髙自是義無可受之説不得不力辭世俗不解人意尤悶人也大學近修得益精宻平實恨未有别本可寄去易啓蒙太極西銘通書解義學記各一本漫往四明頗通問否曾見其讀西銘説否全然不識文理便敢妄議前輩令人不平然亦甚可笑也向來辨論理非不直所自愧者初無懇惻之意而以戲侮之心出之所以召怨而起閙也答陳膚仲講説次第且如此亦得但終是平日不曾做得工夫今旋揑合恐未必能有益耳又有本不欲為而卒為之本欲為而終不能是當便立定脚跟斷不移易如此方立得事若只如此輕易浮泛終何所成不但敎導一事也絜矩更無可疑且更詳味須破得舊説方立得新説不然只是看得未透未可容易下語也近覺朋友讀書多是茍簡未曾曉㑹得便只如此打過何况更要它更将已曉㑹得處反復玩味言外别見新意決是有所不能矣以此理㑹文字只是備禮無一事做得到底悠悠泛泛半明半暗都不成次第如何得有一箇半箇發憤忘食索性理㑹敎十分透徹少慰衰朽之望乎西銘後題是去年未離家時所題後來不能去得然此是道理所繫我且直之固不容有所避也仁仲所説因書報及漫欲知耳所云不必置辨今時流俗例為此説乃是自見道理不明纔有此説便有此説之害如許行之並耕白圭之治水二十取一若似今人所見則孟子亦何用與之辨耶釋奠儀政和五禮中陳設行事兩條中有自相牴牾處著尊犧尊象尊酌獻先聖先師不知曾見此失否向在南康曾有申禮部状論之頗詳今未必有本但細考之可見王伯照本却未見有便幸錄寄并所定須知見寄更加叅考方可刋行也政和禮只首章仲秋下便疎脱舊見申明中已改正近寫得一本却是此條如有舊日頒䧏印本可檢看不然即託人於太常問之也學記本當作但近日道學朋黨之論方起著甚來由立此標榜招拳惹踢耶已展者不可縮此却容斟酌耳又况韓文公脚下不是做文章處為人指笑却怪他不得也答陳膚仲老老長長恤孤正是治國之事皆人君躬行以化其下者至於有夫三者之效則國治矣故欲平天下者必須先有此箇本領效驗然後有以為地而致其絜矩之功所謂平天下在治其國者也文勢甚明無可疑者其不能絜矩之病章句或問三處説極分明如來喻所謂奪其財力使不得養其父母者亦無疑矣又何以更有憤然不平善心為之不生之説耶凡此等處皆是處心不寧靜看書不子細之病與前日所論釋奠禮文疎略處大抵畧相似更宜深以為戒讀書别無法只要所煩子細是第一義也答陳膚仲承以家務叢委妨於學問為憂此固無可奈何者然亦只此便是用功實地但每事看得道理不令容易放過更於其間見得平日病痛痛加剪除則為學之道何以加此若起一脱去之心生一排遣之念則理事却成兩截讀書亦無用處矣但得少間隙時不可閒坐説話過了時日須偷些小工夫看些小文字窮究聖賢所説底道理乃可以培植本原庶㡬枝葉自然長旺耳答滕德粹璘僕與足下雖幸獲同土壤而自先世已去鄉井中間才得一歸埽丘墓省族姻今又二十餘年以故於鄉里後來之秀少所接識計其不相存錄亦已久矣而昆仲乃獨惠然枉書道説過盛非所敢當然所論為學之意則正區區所望於鄉人者甚幸甚幸夫學者患不知其所歸趣與其所以蔽害之者是以徘徊歧路而不能得所從入今足下既知程氏之學不異於孔孟之傳而讀其書矣又知科舉之奪志佛老之殊歸皆不足事則亦循是而定取舍焉爾復何疑而千里以問於僕之不能耶意者於其所欲去者既未能脱然於胸中所欲就者又雜然並進而不無貪多欲速之意是以雖知其然而未免於茫然無得之歎耳足下誠若有志則願暫置於彼而致精於此取其一書自首而尾日之所玩不使過一二章心念躬行若不知復有他書者如是終篇而後更受業焉則漸涵之久心定理明而将有以自得之矣論語一書聖門親切之訓程氏之所以敎尤以為先足下不以愚言為不信則願自此書始因風寓謝他未暇及昆仲書無異指故不復别致幸察答滕德粹所問禱祠之惑此盖燭理未明之故又為憂患所迫故立不定今雖未能遽明但且謹守自家規矩一面講學窮理遇聖賢有説此事處便更著力加意理㑹積累功夫漸漬日久一旦忽然有開明處便自然不為所惑矣今未能然且當謹守聖賢訓戒以為根脚如程子所謂不敢自信而信其師者始為寄足之地不然則飄搖没溺終不能有以自立矣答滕德粹補試得失如何此不見補試牓然計此亦分定矣雖斷置不下徒自紛紜豈能移易毫髪於其間哉而其所以害夫學問之道者則為不細盖物欲利害之私日交戰於胸中亦何暇而及於玩索存養之功也耶近思所疑但熟玩之自當漸見次第但恐心不專一則無由可通耳答滕德粹到官既久民情利病必已周知更宜每事加意使隨事有以及人則亦可以充其職業而無愧於廩食矣親炙諸賢想亦有益日用之間常更加持守講習之功以求其逺者大者則區區之所願也答滕德粹知官閒頗得讀書不知做得何功夫嵗月如流易得空過彼中朋友書來多稱德粹之賢然鄙意所望者則不止此願更勉力益加探討之功勿令異時相見無疑可問乃所望耳谿堂雜文久欲為作序但以當時收拾得太少詩篇四六之外雜文僅有兩篇想亦未是當時著力處未有意思可以發明又不成只做一篇通用不著題底文字以故遲遲至今欲留此人等候草成附去又此數日正為諸處人督迫文字困憊殊甚不免且小須也釋氏之説易以惑人誠如來喻然如所謂若有所喜則已是中其毒矣恐須於吾學有進步處庶㡬可解不然雖欲如淫聲美色以逺之恐已無及於事而毒之浸淫侵蝕日以益深也答滕德粹所示語説一條甚善但程先生説自不可廢今作實事推説太廣却恐又有礙也兼看文字且虚心體認實用功處而就已分用力方有實效若一向只如此立説却不濟事也大抵學問以變化氣質為功不知向年遲緩悠悠意思頗能有所改革否若猶未也更須痛自鞭策乃副所望耳答滕德粹示喻讀荘周書泛觀無害但不必深留意耳若謂已知為學之大端而自比於明道則恐未然明道乃是當時己見大意而尚有疑其説之相似故始雖博取而終卒棄之向來相聚見德粹似於此理見得未甚端的且尚不能無疑於釋子之論今若更以荘周之説助之恐為所漂蕩而無以自立也况今日諸先生議論流傳於世得失已分明又非當日之比耶若論泛觀則世間文字皆須看過又不特荘子也承有意此來不如乘間早決此計流光易失衰老尤不可恃果欲究竟此事似不宜太因循也答滕德粹熹昨者再辭恩命復叨祠祿幸且杜門無足言者前書所喻深悉學道愛人之志然退藏之計已決不獲奉以周旋聞鄉州絹税近遂有蠲減之命亦足為慶也答滕德粹璘近讀論語禮之用和為貴觀諸家解多以和為樂璘思之和固是樂然便以和為樂恐未穏當須於禮中自求所謂和乃可因問之長上或設喻以見告曰所謂禮者猶天尊地卑而乾坤定卑髙以陳而貴賤位截然甚嚴也及其用則天道下濟而光明地道卑而上行此豈非和乎璘當時聴之甚以為然矣已而思之亦恐只是影説過畢竟禮中之和不可見望先生有以敎之如曲禮所陳禮之條目甚詳不知何者為和乎和固不可便指為樂然乃樂之所由生所設喻亦甚當如曲禮之目皆禮也然皆理義所宜人情所安行之而上下親疎各得其所豈非和乎舍弟珙近自太學附信歸問仁知動静之説盖學中近以為論題也然説者只云仁之靜亦未嘗不動而大體則靜處是仁知之動亦未嘗不靜而大體則動處是知多是以文辭影説過畢竟不明言動靜如何璘取精義讀之亦未能曉因子細玩味此兩句乃若有所曉盖仁者靜知者動仁知非動靜也乃仁知之人其情性或動或靜耳而説者只就仁知上求動靜所以多説不明譬如圓者動方者靜不可便指方圓為動靜也然璘雖曉得如此却未知仁者之所以靜知者之所以動如何形容望先生詳賜指敎仁者敦厚和粹安於義理故靜知者明徹疏通達於事變故動但詳味仁智二字氣象自見得動静處非但可施於文字而已答滕德粹示喻縷縷備悉但若果能真使私情不勝正理便是確然可據之地不必舍此而他求也顧恐或未能耳記序之作或不免俯狥俗情誠如來喻然其間亦不敢甚逺其實異時善讀者當自得之也衰病日侵求去未獲便民之事所不敢忘然其可否亦何可必少須旬月復申前請耳淳叟國正想時相見有何講論方丈計亦時㑹見也因便附此草草惟千萬以時進學自重答滕德粹示問曲折具悉大抵守官且以廉勤愛氏為先其它事難預論幸四明多賢士可以從遊不惟可以咨決所疑至於為學修身亦皆可以取益熹所識者楊敬仲蕳吕子約監米倉所聞者沈國正煥袁和叔燮到彼皆可從游也答滕德粹熹冬來却幸稍健正思叔重來得數日之欵亦足少慰離索但念吾友昆仲不知近日功夫如何切宜痛加矯厲專一切功庶㡬不至悠悠虚度時日也答滕德粹知敎授里門來學者衆甚善甚善大抵今日後生輩以科舉為急不暇聴人説好話此是大病須先與説破此病令其安心俟命然後可敎告以收拾身心討論義理次第當有進耳序文甚佳文字只取達意而已正不必過為華靡辨巧也答滕德章示喻大學之説甚善熹舊所為書近加修訂稍有條理補闕處正如來喻矣令人抄冩未得奉寄也所論義利之説得之聴訟之云則不必如此説君止於仁以體仁足以長人居上不寛等語觀之可見盖為人上者無此意思即上下乖暌壅隔而無以相有矣所引淇澳詩但以形容盛德至善之充盛宣著耳其餘則舊解已詳更熟考之當自見也答滕德章吾友秋試不利士友所嘆然淹速有時不足深計且當力學修已為急耳陸丈敎人於收歛學者散亂身心甚有功然講學趣向亦不可緩要當兩進乃佳耳熹病餘衰耗不敢看文字恐勞心發病耳後生精敏且當勉學未可以此為例也答滕德章熹衰病益侵無足言者南軒之文近方為編得一本然尚有不敢盡載者東萊文字須其弟編定乃可行然近日書坊皆已妄有流傳不可得而禁戢矣示喻溪堂序跋此固所不忘但年來病思昬憒作文甚艱乂欠人債負頗多須少暇乃可為耳聞德粹以新侯之來頗不安迹仕宦遭此是亦命但當以道自守不可輕為之屈也答滕德章德粹之來幸此欵曲所恨賢者在逺未遂合并之願耳廷對甚佳三復增歎然今既得脱去場屋足以專意為已之學更望勉力以慰平日期望之意此間曲折德粹歸想能言之不復縷縷也答滕德章縣僻官卑想亦少事然勾銷簿鈔所繫不輕政自不可忽也暇日讀何書作何事然學問别無他巧只要持守純固講誦精熟耳兩事皆以專一悠久為功二三間斷為敗不可不深念也安定詩舊所未見温潤和平真有德之言也答滕德章到官既久聞學政甚修想見横經之暇亦自不妨進修之益也熹衰病益侵無足言者鄉在彼刋得四經四子當時校勘自謂甚子細今觀其間乃猶有誤字如書禹貢厥貢羽毛之羽誤作禹字詩下武三后在天之三誤作王字今不能盡記或因過目遇有此類幸令匠人隨手改正也古易音訓最後數版有欲改易處今冩去所欲全換者兩版并第三十四版之末行五字此已是依元版大小及行字疎宻寫定今但只令人依此寫過看令不錯誤然後分付匠人改之為佳此只是修改舊版但宻為之勿以語人使之如不聞者乃佳若與人商量必有以偽學相沮難反致傳播者此不可不戒也答林子玉振竊讀太極圖傳云陽之變也隂之合也不知陽何以言變隂何以言合陽動而隂隨之故云變合又水隂盛故居右火陽盛故居左不知隂盛何以居右陽盛何以居左左右但以隂陽之分耳又木陽穉故次火金隂穉故次水豈以水生木土生金耶以四時之序推之可見又五殊二實無餘欠也不知何以見得無餘欠又云隂陽一太極精粗本末無彼此也不知何以見得無彼此又云五行之生也各一其性無假借也不知何以謂之無假借此三段意已分明更玩味之當自見得又乾男坤女以氣化者言萬物化生以形化者言不知何以見得以氣化言又何以見得以形化言天地生物其序固如此遺書中論氣化處可見又分隂分陽兩儀立焉分之所以一定而不可移也不知謂名分之分性分之分分猶定位耳又動靜者所乘之機也此豈言其命之流行而不已者耶此句更連上句玩味之可見其意又以質而語其生之序則曰水火木金土而水木陽也火金隂也此豈就圖而指其序耶而水木何以謂之陽火金何以謂之隂天一生水地二生火天三生木也四生金一三陽也二四隂也又以氣而語其生之序則木火土金水而木火陽也金水隂也此豈即其運用處而言之耶而木火何以謂之陽金水何以謂之隂此以四時而言春夏為陽秋冬為隂又伊川先生解孟子云不得於言勿求於心此觀人之法擇之乃謂不得於言謂在已失之於言也而孟子與公孫丑問答論知言大槩謂知人之言不知擇之之説還可從否孟子文義正謂在已者失之於言耳然言為心聲則在已在人皆如此也又伊川先生云志氣之帥不可小觀某竊謂以志帥氣此為養氣者而言不知所謂小觀之意如何不可小觀只是不可小看了之意更熟味之又切要之道無如敬以直内又云有主於内則虚不知直内還只是虚其内耶敬則無委曲故直直則無係累故虚不可便以直内為虚其内也又云德不孤必有鄰到德盛後自無窒礙左右逢其原也某畢竟曉不孤之義未得不孤只是盛德意又云集義所生者集衆義而生浩然之氣非義外襲而取之也不知集義何以能生氣而生之意義又如何義外襲我而取氣熹常謂孟子之意盖謂此氣乃集義而生事皆合義則胸中浩然俯仰無所愧怍矣非行義而襲取此氣於外如掩襲之襲以此取彼也又見濟之兄云中和以性言寂感以心言言伊川曾有此語不知此語如何伊川無此語只是此間朋友如此商量耳又見濟之兄云喜怒哀樂未發謂之中此中是在中之義猶言喜怒哀樂是在中底道理而伊川云中所以状性之體段濟之云此與在中之義一般看某竊恐有異同頃見石兄論此甚好可更質問商量當見異同之實也又中庸言鳶飛戾天魚躍於淵上下察也某竊謂此察字是道理著見之義不知如何察是著見之義然須見其所著見者是何物始得細觀所問似思索未深如此汎問恐無所益當更革去好髙之弊且就平易處深思反復句讀沉濳訓義久之自然習氣消除意思開闊也答廖季碩俁久不聞動靜正此馳情漕臺使至忽辱惠問獲審比日熱暑闗決有相台候萬福為慰誠齋薦語精當真無愧詞第顧衰蹤不足為重而恐或反為累耳西銘首論天地萬物與我同體之意固極宏大然其所論事天功夫則自于時保之以下方極親切承喻日誦此書計必有以深得乎此矣戴在伯向見朋友間多稱之恨未之識也答廖季碩比兩辱書良以為慰又深愧感尤異登聞士友咸喜修塗逸駕自此其可量耶累書下問勤懇顧何愛於一言但欲以其所以自信自守者為獻則誤賢者於迂濶而不可行之地欲舍其所以自信自守者為説則又不知所以言也是以久而不知所以對惟髙明之有以擇焉於此二柄其必有所處矣答廖季碩熹衰晚遭此大禍痛苦不可為懐請祠得歸已及里門矣去家益近觸目傷感尤不易堪也見剛之詞三復悚歎足見厲志之篤至於見屬之意則有所不敢承也誠齋直道孤立不容於朝然歛其惠於一路猶足以及人也知有講評之樂尤以歆羨越上親朋乆不聞問泰州計亦不乆當受代乃有悼亡之悲人生信鮮歡也考異答林伯和囂然一作嚚然答陳膚仲今欲革之一作救之晦菴集卷四十九欽定四庫全書
