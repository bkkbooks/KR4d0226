front:
  text: 書時事出處
  hash: sha256:63b652ef8ad326372951259a65085fd5f726f976c158e07eb5e76e30db455bee
body:
  text: 與史丞相劄子熹申謝常禮已具公函候問勤誠又見前幅不敢復有陳及以慁鈞聽唯其愚賤之鄙懐則有不得不為執事言者熹伏自頃者誤䝉陶鑄懇辭不獲不敢屢瀆朝聽即已力疾上道來見吏民違負初心已積慚憤而閑放之久驟嬰吏役觸事迷塞復有血指汗顔之羞加之伉拙有素不能俯仰流俗雖欲抑而為之念已不入時宜輙復慨然自廢計此孤危竊恐未敢告去之間已不免於彈射之禍矣在熹愚賤不足深惜所可惜者明公薦延海内名士今無得立於朝者甚或重遭詆毁被以惡名而去若又以熹之故重為門墻之辱則於私義誠有所不敢安者切望鈞慈早賜垂念使得先駭機之未發而奉其不肖之身以歸老於故丘則明公之賜之厚又百倍於前日之所䝉矣冐昧威尊伏增恐懼至於病衰目暗作字草畧并冀寛度有以亮之幸甚幸甚與王樞宻劄子熹申謝常禮已具公函候問勤誠又見前幅不敢復有陳及以慁鈞聽唯其區區之鄙懐則有不得不為執事言者熹伏自鉛山拜領鈞翰之賜開譬詳悉愛念良厚遂不敢復請謹已力疾來見吏民違負初心已積慚憤而閒放之久遽從吏役觸事迷塞復有血指汗顔之羞加之伉拙有素不能俯仰流俗雖欲抑而為之念已不入時宜不忍徒變所守輙復慨然自廢計此孤危竊恐未及引去之間而已有或擊之者雖欲夙夜究心詢求民瘼為此一方除深錮之害興久遠之利以副聖上特達之知羣公薦寵之意亦不可得矣有少文字託潘郎中袁寺丞靣禀若䝉矜念早賜宛轉使得先駭機之末發而去之則熹之受賜又不啻前日之所䝉矣冐瀆威尊伏深戰栗病衰目暗字畫不謹并乞矜恕與袁寺丞書熹失計此來無可言者初若稍可支吾亦不敢必為去計今内則精神昏憒兩目生花白晝對人往往坐睡而省閲文案簽書決遣之際為尤甚此一當去也外則財用耗竭支遣不行性本疎拙不能稽考收拾恐更一二月轉見狼狽此二當去也至於刑獄最是重事而一經監司呵問官吏便欲望風希㫖變異情節則是此事亦復不得自專此三當去也鄙性伉直不能俯仰所以忍饑杜門不敢萌仕進意今行年五十乃復變其所守為此睢盱以求苟免於譴辱中夜思之既以自愧而當其俯仰之時大悶不聊深恐不能自抑而忽發其狂疾此四當去也到官兩月思歸之情不能自閟往往無日不發於言語書問之間官吏知之亦不復以尊重難危見期所以號令不行財賦不辦而熹以一身孤客於此攜小兒甥在此無婦女看當無日不病熹時又須自視問其醫藥家中碎小想見無人收拾亦復不成模様業已不為久計又不容復往般取以耗公家此五當去也䝉喻作書從班言路諸公此非所憚但初意只一二月間便去故不能虛為此以違素心今既不能得去又有所奏請事勢須關白已不免作書與之但言語拙直不能婉順其間未必不有觸其忌諱者或反以速其抨彈亦不可知此六當去也向來閒中私竊有所論著自謂庶幾可以傳前聖之心開後學之耳目一非細事今既來此無復功夫可以向此而衰困澌盡與死為鄰萬一溘然於此則此事遂成千古之恨非獨熹不瞑目而已也此七當去也當去之事畧數之有此七條其他曲折不暇徧舉熹亦已有書懇諸公丐祠然又不敢盡言此意只告尊兄力為一言使必從所請乃千萬之幸大抵自度材力事勢祠廟之外不選甚差遣都做不得小即小狼狽大即大狼狽遠即遠狼狽近即近狼狽諸公儻相哀憐必欲扶持而全安之豈應使至此極耶幸以此意極力盡言使不至於再請以煩尊聽則大善不然繼此亦須有請但恐前所陳者忽有一事不恰好則諸公雖欲曲相維持亦無所用其力耳與曹晉叔書熹比既多病而郡中窘闕外縣廢壊本初不為久計不欲深料理今決不容久安前月末巳上祠請度更半月必有報萬一不遂不免再請以必得為期耳學中時到今已漸有能致思者但恨非久客不能盡所以告語之意廬阜亦唯三峽玉淵為最勝然暫遊不欵賔從猥多不無勞擾亦不敢數出也作官不好相此可見山亦不可得遊而况其他乎谷簾遠未能至但飲其水信佳恨遠不能奉寄以助甘㫖之奉耳趙丞書擇以附的便渠前日遣人來有書今却附納直卿已歸所與之書亦回納也周子一冊二圖已就令内去又一本寄伯謨不及别書便中承書甚慰意也子澄近到此相聚甚樂謾知之與楊教授書熹昨日靣懇寢罷鏤板事未䝉深察竊自愧恨誠意不孚言語不足以取信於左右欲遂息黙則事有利害不容但已須至再有塵瀆蓋兹事之不可者四而長者之未喻區區之心者一此書雖多前賢之說而其去取盡出鄙見未必中理或誤後人此不可之一也政使可傳而脩改未定其未滿鄙意者尚多今日流傳既廣即將來蓋棺之後定本雖出恐終不免彼此異同為熹終身之恨此其不可之二也忝為長吏於此而使同官用學糧錢刻已所著之書内則有朋友之譙責外則有世俗之譏嘲雖非本心豈容自辨又况孤危之縱無故常招吻脣今乃自作此事使不相悅者得以為的而射之不唯其啾喧呫囁使人厭聞甚或緝以成罪亦非難事政如頃年魏安行刻程尚書論語乃至坐贓論此不遠之鑒此其不可之三也近聞􅄔源有人刻熹西銘等說方此移書毁之書行未幾遽自為此彼之聞者豈不怪笑其被毁者豈不怨怒此又使熹重得罪於鄉黨宗族此其不可之四也昨日蓋嘗以此為懇而執事不深曉直以熹為謬為謙遜者熹之不得已而為此書其不遜甚矣正以非其一時苟作之文是以謹之重之而不敢輕出而平日每見朋友輕出其未成之書使人摹印流傳而不之禁者未嘗不病其自任之不重而自期之不遠也區區於此實有廣已造大之羞而執事者反謂其謬為謙遜而為此不情之語其不相察亦甚矣愚意迫切不得不力懇於左右幸辱矜照一言罷之其所已刻者熹請得以私錢奉贖毁去而其已置之版却得面議别刻一書以成仁者開廣道術之意自不失為善事不審尊意以為如何專此布露切冀痛察與臺端書熹未見顔色比輙妄以名姓自通方以僣瀆自咎乃䝉教答又枉手帖之誨降屈威重謀及疎遠此古人之事而執事者行之甚盛甚盛顧熹之愚不足以當之然敢無詞以對蓋嘗竊謂欲起膏盲之疾者必攻其受病之處而其用功之緩速制藥之寒温又有不可以頃刻毫釐差者今天下之病在膏盲者久矣夫人而能知之夫人而欲言之顧以不當其任則雖欲一效其伎而無所施耳乃者天子以執事有廉靖貞孤之操擢寘諫垣納用其言屏去姦惡皆所謂膏盲之餘證海内有志之士知上之心蓋已深悟隱疾之在躬而欲假執事之藥以去之也又知執事之心所以姑從事於此者蓋亦以為之兆耳其必將有以譴之則夫所謂病本者可去無疑也然而側聽累月未有所聞則又懼夫二竪子者知良醫之傷已而先為術以去之以是憂疑不知所定尚幸聖心堅定不入其言而又進執事於臺端之重是必君臣之間已有一定之計足以少慰士大夫心然熹之愚竊獨私憂過計意夫姦賊窺見端倪則其所以自為謀者必將愈深愈切而有先執事以發其機者不審執事何以處之蓋伐木而剪其枝葉不若斧其根壅水而捍其波流不若塞其源鳴金鼔耀戈甲而譟呼以逐虎不若乘其方睡而斃之之速也今執事則既撼而覺之矣又猶欲緩視徐趨以當其虓怒決裂之勢熹竊為執事者危之也然此等小人有生以來自朝至暮無非罪惡不可殫數且又人主素以倡優奴僕畜之初不責其名檢而間者議臣乃復抉擿苛細而一一以陳之其不納則宜矣唯其日侍燕閑逢迎縱臾使人主之心恬於逸欲而法家拂士之言不得以進狃於卑近而正大久遠之計不得以聞賄賂公行姦邪堵立蓋凡所以為天下國家之綱紀者日傾月壊而上下相䝉莫敢以告是則此一二人之罪所以上通於天而深為今日膏盲之病者執事誠能聲此為罪揚於王庭深贊聖主去邪勿疑之志又引同列之賢合謀并力以決去之則天下膏盲之病者庶幾其可去矣太平萬歳熹雖不武尚能為執事誦之不識執事亦有意乎熹比因三月九日指揮已畧為明主言之矣顧疎賤之言未足取信而或以取戾謹已束裝恭俟嚴譴惟執事者毋以為戒而亟深圖之則天下幸甚亟遣此人專此布禀交淺言深分疎禮簡蓋區區之心深以古人之事望於執事而不復以世俗之常態自疑伏惟深察然此書也一讀焉而采其意然後削而投之火中不足為外人道也引領臺寺不勝拳拳小貼子此事所繫不輕其成否不可必但義所當為有不得而避者願早決計萬一不濟此心固無負於幽明四方忠義之士必有聞風而興起者直言日聞聖主之心終必感寤矣葵藿野心言及於此不勝憤激痛恨之至與皇甫帥書似聞戎車將有湖廣之役不審定以何日戒塗伏計運籌決勝自有成筭疎遠不當僭有所陳然慕用之私懐不自已輙效其愚惟髙明裁之熹生長閩中又嘗試吏泉漳之間其地宻邇江西頃歲山冦出沒之處紹興十八九年間朝廷屢遣重兵卒不得志甚者至於敗䘐狼狽不還及後專委陳太尉敏招募土兵而後克之所謂左翼軍者是也蓋此輩初無行陳部伍憑恃險阻跳踉山谷之間正得用其長技而官軍乃以堂堂之陳當之地形兵勢凡彼之所長者皆我之所短是以毎戰而每不勝也近年茶冦形勢正亦如此所以江西官兵屢為所敗而卒以摧鋒敢死之兵困之此往事之明驗也竊計今日湖廣之冦正亦類此熹願太尉養威持重擇形勝之地堅壁以待之而廣募土人鄉兵厚其金帛結以恩意使之出入山林上下溪谷以與此獠從事則彼之長技正與賊同又倚太尉之威聲以順討逆彼假息遊魂之衆亦將何所逃其命哉熹書生也輒語兵事近於僭率而可笑然私心惓惓竊恐太尉不勝忠義奮發之心直欲以輕兵銳進深窮巢穴草薙而禽獮之則非計之得也大率東南形勢絶與西北不同願更博訪而審度之以圖萬全之功則區區之望也仰恃知照敢布陳之以竢采擇惟不以其狂妄畏怯而鄙棄之則幸甚幸甚與王漕劄子熹輒布誠悃仰瀆台聽熹比䝉聖恩誤膺郡寄懇辭弗獲亦既視事唯是小邦民貧財匱歲必乏數月之糧熹到任以來官兵廪給全無顆粒可以支遣究原其弊縁本軍三邑所管苗米止四萬六千餘石每年科撥起四萬外餘米亦係使臺盡數刷發如此則本軍將何所取以供用度較之旁郡如饒池州皆有存留贍用官兵米數獨本軍先來有失申請存留支遣况今來除上供已起外自餘未發米數係諸縣先因旱澇有逃移死亡及零殘拖欠無戸可催之數縱有催到非惟不多又且累政隨即借兊目今虛掛欠籍用敢輒拜公牘冐浼控告欲乞台慈仰體邇者聖詔丁寧之意計盈虛通有無將淳熈三年四年五年未起零殘之數悉從蠲免繼自今以往亦乞存留以為贍用官兵之費髙明必有以矜憐之與其留腐倉庾終為後人之妄費孰若使千里並受其賜而民力不至於重困耶惟執事圖之干冐台嚴不勝恐悚與顔提舉劄子熹昨者輒以撥米干冐台聽仰荷矜憐俯從所請然顒俟久之未䝉明文行下今復專人具禀欲乞台慈特照舊例早賜開允不勝幸甚復有少禀本軍米斛舊來多就建康交納近一兩年忽䝉使臺改撥入都不唯小郡頓增水脚之費無所從出而舟船艱得裝發遲緩盤剝留滯耗折百端於事有甚不便者今亦有狀申禀乞賜台㫖只令赴建康府交納儻䝉垂念不勝厚幸與顔提舉劄子熹不揆疎遠疵賤之跡自到任來數以職事仰干台聽例䝉矜照感幸已深惟是至今未被明文行下竊與一郡官吏軍民同切翹跂以俟嘉命今此又有所禀仰祈恩施内循進越不勝恐悚熹昨以星子一縣稅錢偏重奏乞蠲減亦已具申聞矣今聞睿㫖已下使臺竊惟聖天子明目達聰之意雖不間於蒭蕘至於其所決然取信而亡疑則在明使者之一言耳欲望台慈早賜垂念遣吏核實具以上聞使一方疲瘁遺氓速霑仁聖之休澤不勝幸甚至於前請亦乞始終大賜以慰顒顒之望千萬幸甚幸甚與顔提舉劄子熹瞻望使臺無由伏謁傾仰不自勝長至節臨又不獲奉觴羣吏之後尤切馳情已具公牘脩慶竊惟清名重德士論所歸履兹剛長之辰固不待祝而諸福朋來也熹昨者使還䝉賜手教復以標凖新圖魯公墓帖為貺尤荷不鄙之意前此因遣牙吏部綱嘗具禀劄畧陳固陋計今當已徹聽聞矣恐或未安更望垂誨幸甚幸甚撥米二事仰荷台念感激尤深蠲租之請亦當已䝉施行矣區區衰拙不堪為吏强顔於此百事隤廢若非明使者矜而容之種種假借久已罪去矣復有少懇别紙布之伏乞台照與顔提舉劄子熹復有少禀敝郡今秋少雨晚田多旱除星子都昌多是早田被災處少唯有建昌一縣晚田數多前此失於訪問遂速檢放之限近因遣佐官行縣乃知其實則又不容坐視已具奏聞及申使司而熹已具狀申省自劾矣見亦一面遣官行視俟見分數當復具申使司得賜矜從畧與減放不勝幸甚星子王令老成篤實邑人甚愛之同官中如其比者蓋少也小郡荒凉人材衰乏同官中可任者不過三數人其間又有有材而過當其他則又難言所以凡事費力不能滿人意誠無心顔久尸榮禄自劾之請既上即束裝以俟罷遣矣每荷垂念故敢并及之與執政劄子熹昨以疾病侵凌不堪吏責屢以祠官之請冐瀆朝聽伏䝉鈞慈垂念未忍棄捐不惟發教下臨慰藉勤懇至於士友之間傳道所以誨飭存撫之意又諄諄焉自惟疵賤何以堪之感激之心無以為喻自是遂欲勉竭駑頓冀以仰答恩私意謂姑使上不得罪於朝廷下不得罪於百姓則亦可以少延時月徐罄前懇而山野愚瞢不能斟酌事宜近因屬縣旱傷失於檢放加以催科不無追擾遂致人戸流移怨讟蠭起仰惟朝寄本以為民俯循素心亦期及物今乃一舉而兩失之日夕憂愧疾病益侵勢恐不堪復加勉彊不得不早為計謹已具申都省欲望鈞慈特與敷奏絀削罷遣以謝無告之民熹雖飯疏沒齒何敢有怨或䝉矜憐曲加全䕶使其仍得祠官之禄以終餘年則其幸抑又甚矣干冐崇嚴不勝戰栗與丞相劄子熹輙有危懇仰干洪造熹昨䝉誤恩畀以符竹自度疎野不堪委寄累辭不獲黽俛就事今十閲月矣惟念君相所以眷顧使令之意不敢不竭駑頓以圖報稱而材力有限疾病相仍形苦心勞卒無善狀政荒財匱歲惡民流自去秋以來知舊往來涉其境者問於道塗黄童白叟無不愁歎蹙頞或苦其刑政之苛或病其征賦之重以至流聞遠邇亦莫不然貽書譙責提耳告戒者殆無虛日以故去冬嘗以公狀申省自劾又以劄目哀鳴冀得早䝉敷奏亟賜罷免而鈞慈含覆未遽矜從疎遠賤微何敢固必謹以抑心自强祗服官次不敢復有所言矣而一二月來國言愈甚士友之責愈深使人日夕憂惶不知所以自處夫為政而不宜於民為所厭苦至於如此誠無心可居官府無顔可食俸禄不免復冐威嚴再有陳請而又竊惟某官終欲曲賜保全不忍以其罪戾之跡聞於天聽故於公劄更不敢具述如上曲折儻䝉開陳得以病免其何幸如之仰瀆髙明俯伏俟罪與丞相别紙熹區區愚懇已具前幅復不自量輙有踰涯之請忘其罪戾敢私言之熹愚昩之資少即疎懶書史之外酷好山水今以某官造化之力乃得為吏廬阜之下其丘林泉石號為東南最殊勝處固己私愜所願而去歲勞農山間又得所謂白鹿洞者溪山邃宻林趣茂美尤有幽絶之致熹惟是雖遐僻而實先朝所嘗留意不當廢墜至於如此乃即其處復立七架小屋五間亦已具狀申省矣因竊妄意以為朝廷儻欲復修廢官以闡祖宗崇儒右文之化則熹雖不肖請得充備洞主之員將與一二學徒讀書講道於其間庶幾上有以副知遇使令之意下有以遂其平生之懐若復更䝉矜憐假之稍廪畧如祠官之入則在熹又為過望而於州縣亦不甚至有糜耗顧以事體希濶言之若草野而倨侮者是以不敢輙具公狀申聞惟冀鈞慈深察愚悃都俞之暇因事及之萬一可從則熹之受賜為不淺矣狂妄之罪亦惟有以寛之與王樞使劄子熹不避狂僭瀆尊之罪復有迫切之懇須盡布陳熹素愚昧不曉物情加以閑散日久尤不諳悉吏事至此將及一年凡所施為雖不敢不竭愚慮而所見乖謬動失民和四方士友貽書見責者積於儿閣不知其幾而前件陳克己者尤其詳盡其間歴數謬政無一可者迹其所聞皆有實狀區區鄙劣亦豈不欲痛自矯厲以補前愆而精力凋殘已有所不能及者矣竊以為此非姦民猾吏流言飛文之書乃出於相愛慕來問學之口尤足取信故敢冐昧繳連陳獻若䝉鈞念得以徧呈東府兩公庶幾有以察熹前言之非妄者早為開陳亟賜罷免或如前兩劄所請者則熹猶可以不重得罪於此民而此邦之人猶可以安其生業而免於流亡死徙之患不勝幸甚干犯頻仍伏紙尤增隕越與丞相劄子熹仰恃知照忘其罪戾猶復别有私懇輒以仰干鈞聽熹近因尋訪得白鹿洞故基稍加興葺已具曲折上之尚書矣今以罪戾義當自屏而狂妄進越猶欲並縁此事輒有私請蓋熹前幅所懇二端竊計必有一遂若直䝉賜以罷免則固無復敢有所言若以洪私曲被使得復備祠官之列則熹竊願丞相特為敷奏舉先朝之故事脩洞主之廢官使熹得備執經焉而其禄賜畧比於祠官則熹之榮幸甚矣蓋與其使之以崇奉異教之香火為名而無事以坐食不若脩祖宗之令典使之以文學禮義為官而食其食之為美也熹遠外之蹤率易及此誠有草野之侮之嫌然其實亦朝廷正名革弊之一事竊惟聖君賢佐必垂察焉是以敢冐言之與曹晉叔書熹求去久不獲近忽得機仲及一二知識報諸公已有見許之意其說可笑㑹前數日已遣人行投此機㑹勢必得之曾原伯亦許為致力也但聞敬夫病殊可憂前此得請意欲一往視之若見歸湖南即自江西便道以歸也此間謬政想亦傳聞近得陳勝私書責以煩刑暴歛數條已封與王季海託其轉呈東府矣今但得脫去為上更不論此是非虛實也季通子直到此相攻亦甚力次第不虛傳也劉公度來此不能久居其氣質不易得也徳廣留家於此暫歸臨江矣東老可傷此人行遽未暇致奠因見其子幸及之擇之書角煩付往近刻康節書納一本他無可寄也答黄教授書熹無狀居此一年有餘率意直前不能違道干譽得罪於士民多矣請祠雖已報聞然旦夕自當以他罪行遣不至久為仁里之害也示喻曲折深荷愛念然必欲使熹餧㗖虎狼保養蛇蝎使姦猾肆行無所畏憚而得歌頌之聲洋溢遠近則亦平生素心所不為也姓髙人事文叔在此備見首尾此而可恕則亦無以官吏為矣至如木炭錢事亦是州郡所當為而幸上司之見聽方恨不能推類盡蠲苛擾初不以是而求歌頌於斯人也此錢都昌所減獨多又是毛掾考究之力此人固有過當處然細詢田野之言而考之案牘以求其實則前日銷骨之毁亦云甚矣此舉錯枉直之間所以難明非有道以照之則所自謂公正者未必非私意之尤也區區不喜自辯又於老兄不可有隱情故久不知所以為報今偶有便信筆及之非欲較比是非亦欲老兄深察於公私名實之間而真得其所謂本心之正耳太極之說甚善南軒遺言兩句不知其本文上下所指何事俟更問之定叟也與江東陳帥書兹者伏審榮被明綸進班亞保竊惟明主思賢念舊之意可謂盛矣然使相公尚淹藩服而未得究其輔贊彌綸之業則海内有識之士猶以為恨抑無故而驟遷在彼權幸寵利之臣則可而施於相公則於四方之觀聽亦不能無所疑也不審髙明何以處此熹則竊為門下憂之而未敢以為賀也兹承鈞慈遠賜手書竊審嘗欲有所論建自以文不逮意而罷熹於是竊為門下喜焉而敢冐進其說夫諫說主於忠誠不尚文飾且今日之言有不可緩者猶救火追亡人也况以相公之忠義懇切豈真以文不足為病而怠於納誨者哉亦曰將有待而言之耳夫苟誠有待而言之則其所待無有大於今日之所遭者願相公因辭謝之章而因有以附見其說不必引據鋪張不須委曲回互直以心之所欲言時之所甚患者條件剖析為明主言之其所病者乃在於文之過而不病其不足也幸而聽從天下固受其賜而相公之榮豈止於今日不幸而不入則相公辭受之決亦不難處矣失今不言於天下之事固失其機而在我者不無昧利之嫌一旦雖欲復有所言人亦莫之聽矣長孫無忌之事與近歲李叅政光前車尚未遠也况今所授正與其人併肩而處若果出於無心尚為可取且又安知其不故以是風切相公而使與之同哉熹疎賤狂瞽之言意謂必觸雷霆之怒今聞己降付後省矣是明主固優容之但此章宣露賤迹自是愈孤危矣夫以聖恩之寛大於熹又且容之而况於相公乎萬一未即開納無後咎餘責亦可保矣願相公勿疑極意盡言以扶宗社以救生靈熹不勝激切懇禱之至與陳帥畫一劄子一本路諸郡旱損處多竊料將來賑濟用米不少然今來旱勢甚廣近郡之榖不復可仰須廣為規畫多致米斛乃可接濟至於乾道七年本軍得米凡五萬石然流殍之民不可勝數田里空虚至今未復此不可不早慮也似聞總所積榖頗多日就陳腐更久亦不堪用若得商量措置且就支此米餉給諸軍而計諸路綱運除檢放外更許截留分與諸州般運賑糶收簇價錢所管或候豐年補前本色斛斗亦為利便一目今旱勢如此而漕司差人在此催發舊欠夫催欠之與救災事體各别不可雙行欲乞一言且與追回其他州郡想亦有此并得一例施行尤為幸甚若是戸部指揮漕司自合申請停緩或不敢言則丞相自當言之亦致和消沴之一術而救急安民之切務也一去年赦恩所放官物諸司依舊理催欲乞帥司因此旱傷作訪聞檢舉行下諸州令逐一具申特與蠲放一旱災如此良由賦歛苛急民氣不和所致欲乞丞相建言乞將赦恩所放之後一年官物并行除放一本軍建昌縣去年放旱米三千餘石總所漕司累次行下令於上供軍用數内分豁此甚允當今漕司忽變其說令本軍全於軍用數内除豁不得減上供數熹有劄子懇兩漕别本具呈乞賜鈞念一言及之是亦救荒之助也一本軍申漕倉兩司乞撥錢米修結石寨狀别本具呈并乞鈞念或䝉應副亦可并下諸州放此施行募民充役可以集官事濟饑民消盜賊伏乞鈞照熹復有愚懇欲從漕司借留六年上供零米五千餘石約今冬或來春可還有狀申漕司今亦録呈乞賜宛轉及之幸甚適又檢得乾道七年省劄亦録梗槩上呈恐今歲事體不減此也提舉逓鋪司牒有近日雨水日多之說恐江東已霑足矣此獨無有柰何與陳帥書前此屢以上流遏糴利害申禀未䝉施行今本軍糴米人船已為隆興邀截不許解離又凡客販皆為阻絶江西頗有得熟州郡本自不須如此又况著令及累降指揮皆有明文已作書力懇之恐其未必經意蓋自初糴已節次懇之今乃約束愈峻其意亦可見矣切乞早賜移文仍申朝省或具奏聞乞遍下諸路約束不獨此邦䝉大賜也頃時劉樞遭旱首奏此事其後客船輻凑米價自減此最為救荒之急務向䝉賜教乃謂上流皆旱無所告糴但擬撥樁積米此但為建康州郡計耳然贑吉鼎澧湖南諸郡皆熟若用劉樞舊例請奏此米皆可致而一路受賜矣不然則樁積之米得賜取撥使諸郡各得三五萬石亦為幸甚漕使本别具禀熹偶足疾大作疼痛亡憀不敢多作字只乞鈞念為達此懇同賜區處以速為上移文至江西附逓恐遲得為專人徑往千萬之幸與江東王漕劄子熹久不拜起居之問日有瞻仰人還被教感慰亡窮䝉喻置寨事極荷台念但事已差池今又方有救災之急未暇再請若稍定未去終當料理耳減稅事尤感垂意之勤初謂必可遂請適有牙吏還自臨安云省吏果以使司未保明為言勢須再下此終有望於維持也白鹿官書拜賜甚寵謹已别具謝劄矣但今歲旱勢甚盛此自五月半間得雨之後枯旱至今雖有得少雨處殊不沾洽旱稻已無可言晚禾亦未可保民情皇皇未知所以慰安之者而使司差人在郡追人吏催官物者凡三四輩熹雖不敢拒違台命然當此之時督責縣道追擾農民則實有所不忍得賜追還令得一意講求備禦賑恤之政以救此遺民於溝壑之中不勝幸甚其可辦者熹固自不敢緩也又建昌去歲檢放總所已行下今均在上供州用數中而反未䝉使司除豁上供之數尤非所望於仁人君子者熹竊惑之更乞深賜省察狂妄冐瀆皇恐死罪熹前幅所禀之外更有石隄一事已具公狀申聞不審台慈賜念否若今之君子則固不敢以此望之惟執事者儻以禹稷之心為心則此一役也而可以兩濟得䝉垂意不勝幸甚此或有委并乞垂示熹前幅所禀去冬放旱事初已得使帖如總司之云矣既而中改一予一奪殊不可曉今别具公狀及劄子乞賜台覽若決不可行則熹於此不容宿留便當自劾去官雖重得罪不敢辭矣本欲初秋即申祠請又遭旱虐自以為義不當求自逸故勉强於此若不獲已則亦不免冐此嫌耳一生忍窮不敢求仕正為如此且未來此時知友皆以為于公之仁必能庸崔君今乃反為所誤而姚提㸃平生不相識乃能俯聽愚言一奏減本軍木炭錢二千貫不審亦嘗聞之否熹老矣已無意於人間不堪久此鬱鬱也與漕司畫一劄子一本軍昨具奏乞依乾道七年例支撥錢米應副後來照得元數頗多恐難應副遂再具實欠軍糧米奏乞截留六年殘欠五千石及今年擬放七分外三分米一萬餘石庶幾數少易撥今續契勘諸縣檢放分處大段乾損處多恐不能及三分之數即雖䝉朝廷許截上件米亦恐不足支遣更俟取到實放數外合納之數却行紐計欠數申禀或别具奏乞送使司預乞台照一本軍常平米通兩縣計五萬石見行取會下戸仰食之人數目未到候將來冬後闕食即將上件米斛分等第糶給别具措畫詳細申聞或恐米數不足即乞支撥應副熹已兊那諸色官錢往鄰近收糴約可得萬餘石但若錢少而近地米價已髙難運耳一石隄已差官計料以俟徐推之來此舉本不敢容易蓋欲因此贍給饑民一舉兩利切乞留念一去秋建昌檢放米當依台喻申省部乞下使司乞賜保明除豁然此又是一重往復不知徑自使司申請如何此已一靣申部矣一星子減稅省部對補之說乃似肉糜之論可付一笑若本軍本縣自有名色可補即何用更乞減放耶近世議論大抵如此令人氣塞見已别具公狀申聞仍申朝省極論其繆預乞台悉一聞得贑吉諸州及湖北鼎澧諸州皆熟得湖南􅉟憲書云湖北米船填街塞巷增價招邀氣象甚可喜欲乞更與帥相商度乞奏指揮兩路不得阻節客販許下流被害州軍徑具奏聞重作行遣此一項早乞留念與王運使劄子熹復有少禀近凖使牒奉行詔書取㑹本軍金榖出納大數初欲一一從實供申偶㑹得池州式様官吏皆以為當效其所為可無後悔遂止據有正當窠名合收之數以為收支之數而凡州郡多方措畫以添助支遣者皆不敢載大約所供才十之二三而米猶不在數中也見欲一靣如此攢寫供申然在鄙意終有未安蓋聖詔所為丁寧使臺所謂取索凡以欲知州縣有無之實而均給之以寛民力耳今乃如此在熹素心則為上欺使臺以及君父在州郡利害則恐今既自謂有餘後日將不得䝉均給之惠以病其民也是以深竊疑之未敢不以實對然官吏之說則又有二端焉其一以為州郡措置所收窠名多不正當恐有詰責莫任其咎此則便文自營之計熹所不敢避也其一以為若盡實供具出數今日固未必實有均給之惠而盡實供具入數異時上官所見不同或將按籍而取之則州郡必致重困此則其說不為無理而熹有所不敢違也是以尤竊疑之又未敢遽以實對伏念旬日不能自定敢以此私於下執事伏惟台慈開示所鄉使得奉以從事不勝幸甚與江西張帥劄子一熹比數以短劄承候起居計悉已塵几下今者復有少懇輒敢以冐聞聽熹以不德招殃致凶又無術畧以濟饑饉已屢伸告糴之請然小郡貧薄不能多致儲積遠近軍民唯仰客販沿流而下得以餬口其引領南望朝夕之勤蓋不啻農夫之望歲也今乃竊聞督府所臨南自贑吉西極袁筠東被南城方地數千里幸䝉德政之餘休皆有秋成之慶而任事者私憂過計未撤津梁之禁熹愚竊以髙明方以天下之重自任其視鄰道何以異於吾民願賜一言俾除其禁則不惟蕞爾小邦歌舞大賜抑自是以東列城數十實均頼之率爾干冐始猶自疑及念前日荔子分甘之意然後有以決知執事之不棄此土之人也是以敢卒言之伏惟台慈俯賜矜照與江西張帥劄子一咫尺門牙無縁進謁第切傾鄉之私比以告糴仰干台聽竊意必䝉矜念今聞收糴牙吏未及解發而使府約束愈峻遂不能歸且鄙郡荒凉舊雖豐歲亦不免仰食船粟之來自封境者况今旱歉溝壑在前其所望於餘波之惠者又非他日之比前記之懇雖出僭易然亦仁人君子所宜動心也今再具禀及以公文為請伏惟髙明擴一視同仁之心敦救災恤鄰之義俯賜矜允千萬幸甚千萬幸甚與江西錢漕劄子比以民饑告糴隆興已具曲折懇張帥意必䝉其憐閔推所餘以并活此邦之人乃今聞其約束愈峻所遣牙吏得米而不能歸至於客販亦復斷絶若上流果亦荒旱則不敢請傳聞贑吉臨川諸郡及隆興屬邑自有豐熟去處則江西當自不至闕食而其餘波因可以及隣境恐不必過計為此以傷一視同仁之心害救災恤鄰之義熹已手書復致此懇於張帥更望台慈賜以一言之重使得早遂見聽則此邦之人仰戴仁人之施其可量哉與江西張漕劄子熹未見顔色輙有祈懇比以民饑告糴隆興已具曲折懇禀張帥閣學意必䝉其憐憫拯此困急今乃聞其約束愈峻所遣牙吏得米而不能歸至於客販亦復斷絶竊縁本軍地瘠民貧雖號熟年不免仰食上流諸郡况今凶儉事勢可知然若上流果亦荒旱則亦不敢固請今贑吉臨川諸郡及隆興屬邑皆有豐熟去處則使節所臨江西一路決當不至闕食而其餘波自可惠及鄰境是以敢布其私欲望台慈一言於張帥早得放行本軍所糴及弛客販之禁則台座活人之恩被於鄰道此邦之人所以感激歸戴者為如何哉與江西張帥劄子三熹累具懇禀告糴米船乞賜照應條法及近降指揮特與通放亦已累䝉公移回報開許良感仁庇之及但奉新令尉乃敢公然違戾百端攔遏其意必使敝邑饑民束手受斃而後已設若使境之旱與弊軍等則熹不敢有請今使境諸邑粒米狼戾發洩不行而弊軍諸縣放皆及八分山谷之民已苦艱食所遣糴米本錢又皆兊借上供錢物方此自劾罪無所逃竊意窮苦之狀必䝉矜憐不謂此輩乃爾不仁既格詔㫖又違使臺約束而所以貽患於鄰邑者尤為無狀熹已具公文上之幕府欲望台慈詳酌將本縣官吏重作行遣將本軍米船早賜通放上以體聖朝一視同仁之恩下以見盛府救災恤鄰之義不勝幸甚與星子諸縣議荒政書熹為政不德致此旱災雖已究心多方措置庶幾吾民得以保其生業而免於饑餓流離之苦然竊自念智力淺短不惟精神思慮多所不周而事體次第亦須由軍而縣方能推以及民若非二縣同官各存至公至誠之心深念邦本民命之重相與恊力豈能有濟今有愚見懇切布聞條具如後一逐縣知佐既是同在一縣恊力公家當以至公至誠之心相與凡百事務切要通情仔細商量從長措置自然政修事舉民受其賜苟或上忽其下唯務私已吝權下慢其上但知偷安避事則公家之務何由可濟况今災數非常民情危迫經營措置當如拯溺救焚之急不可小有遲緩齟齬有誤民間性命之計切告深體此意盡革前弊庶幾事有成功民受實惠一檢放之恩著在令甲謹已遵奉施行今請同官當其任者少帶人從嚴切戒約給與糧米錢物不得縱容需索搔擾又須不憚勞苦逐一親到地頭不可端坐寛凉去處止慿鄉保撰成文字又須依公檢定分數切不可將荒作熟亦不可將熟作荒其間或有疑似去處或有用力勤苦之人寧可分明過加優恤不可縱令隨行胥吏受其計囑别作情弊一勸諭上戸請詳本軍立去帳式令鄉衆依公推舉約定所䕃客戸所糶米榖數目縣司畧備酒果延請勸諭厚其禮意諭以利害不可縱令胥吏非理搔擾上户既是富足之家必能體悉此意其間恐有未能致悉之人亦當再三勸諭審其虚實量與增減如更詐欺抵拒即具姓名申軍切待别作施行一根括貧民請詳本軍所立帳式行下諸都隅官保正仔細抄劄著實開排再三叮嚀說諭不得容情作弊妄供足食之家漏落無告之人將來供到更於本都喚集父老貧民逐一讀示公共審實衆議平允即與保明如有未當就令改正將根括隅官保正重行責罰一將來糶米亦請一靣早與上戸及糴米人戸公共商議置塲去處務令公私貧富遠近之人各得其便大抵官米只於縣市出糶上戸米榖即與近便鄉村置場出糶不須般載往來徒有勞費如有大叚有餘不足去處及將來發糶常平米斛即具因依申來切待别行措置一凡郡中行下寛恤事件各請誠心公共推行如有未當或未盡事宜更望仔細示喻當行改正右件如前各請痛察如或未䝉聽從尚仍前弊致此饑民一有狼狽即當直以公法從事不容更奉周旋矣千萬至懇至懇與執政劄子熹輒有危迫之懇已具公劄申陳然其曲折有不敢盡言於君父之前者復此干冐鈞聽得賜宛轉陶鑄不勝幸甚熹昨縁疾病不堪吏役累具劄目乞備祠官至五月間伏凖尚書省劄子奉聖㫖不允自惟卑賤不敢頻有祈扣觸犯天威欲俟新秋乃伸前請而德薄政荒招致災旱深念千里民命之重不忍當此艱難窮困之秋輒求自便於是屈心抑志黽俛服官祈禱百方卒無所効又慮將來軍民必致闕食不免行下屬縣勸諭富民根括下戸那兊官錢於隣近州縣米價稍平去處收糴米斛凖備賑給又已申奏朝廷及申轉運常平兩司乞行救助更欲勉悉疲駑講求荒政以副聖主子愛黎元之意而力小任重日夕驚憂遂致心疾大叚發動上災下潦勢甚危急在熹一身死生夜旦所不足言實懼失於備禦有誤一方饑民横致流殍則熹為上負朝廷死有餘憾於是不復敢顧辭難避事之嫌有此申禀欲望鈞慈憐察特賜敷奏與熹宫廟差遣使得歸死故山仍催已差下人石􅗐疾速前來料理荒政救濟饑民不勝幸甚小貼子伏念熹昨以朝命敦迫勉彊到官不敢携家為久住計祗挈一小兒在此方十餘歲今若病勢有加即彼此存没一時狼狽欲望鈞慈深賜憐察與周叅政劄子熹竊以仲秋之月暄凉未定恭惟參政鈞候起居萬福熹前日專人奏記㝷即奉被逓中所賜手教伏讀再三感慰亡踰又蒙垂喻繆妄所陳聖㫖乃有假借納用之意自推疎賤不宜得此悚戴之私殆未易以言說既也然前事不聞有所施行後事更被詰問若將反以違滯之罪罪之者惜乎聖主虚心受言之美未有以見於行事之實也加之賤體自遣人後心痛寖劇而足疾復作痛楚非常不能履地在告已旬日矣自度衰頺不堪勉强恐誤一郡軍民性命日夕憂懼不能自安謹再具劄子申布賤懇然於所職亦不敢忘過計之憂頃有狀奏乞截綱運充軍糧事并以申省然於羣公前己致問不敢頻有煩瀆願因間語賜一言焉得并前劄早賜開陳使熹得輿病以歸而軍民不至狼狽不勝幸甚力疾專此具禀不能他及瞻望台躔邈在霄漢無由進拜第切拳拳與周參政劄子近得尤倉書已具道鈞意矣固知遠方下邑朝廷不當偏有應副然災傷如此竊意似當隨其重輕普加恩意也昨日省符行下議臣奏請檢放之弊所謂但憂郡計之不支不慮民力之愈困者真可謂仁人之言矣三復歎息不意議者猶能及此方之對補之論蓋不啻九牛毛也然郡計之不支亦非細事熹嘗論之矣切望垂意朝廷之體固不當私一郡尤不可棄諸郡也不審鈞意以為如何未能自脫而欲為左右言可謂僭妄然區區之心有不能已者其所以望於參政者蓋非特今人之事也伏惟恕而察之幸甚本路尤倉甚留意然常平之積恐不足以周今歲之用聞建康樁積甚富而漕司亦有餘財但相去之遠呼呌不聞未知所以為計耳前此減稅及乞放去年建昌三千餘石猶不任責况有大於此者尚何望哉觀此事勢上下決不相應熹性狷狹進則有搪突之傷退則迫切無憀疾病侵加恐徒死而無益參政儻哀憐之不若投畀閑散以安全之乃為大幸然其所請截撥應副乃一郡之計初不繫於熹之去留也遏糴之請尤急聞其用法甚峻犯者或乃沒入其家此望早賜約束少遲則早榖向盡晚米價髙雖通無益矣熹又思之恐得祠去此見在同僚未有能亢此難者已與尤倉宻計更調守者然朝廷亦當一面催促代者彼至則足以蘇此人但道里遼遠未能猝至耳凡此皆望深賜留念幸甚幸甚又蒙垂喻所以曉子澄者莫非至當之言不勝歎服但未知子澄之意果如何若熹則方與邦人厄於陳蔡之間雖有雜燒之令亦不暇起而争救之矣匆匆亟遣此人未及究鄙懐之一二然其僭易煩瀆之罪己不勝悚仄矣并乞鈞察千萬之幸與周參政劄子熹復有愚見懐不能己敢以私於下執事今歲之旱其勢甚廣比見連日降㫖所以為祈禱寛恤之計者足以知聖主之憂勞矣然所謂禁屠宰決杖罪放房緡及茶鹽賞錢者恐未足以為應天之實而今日又報蠲放綱運欠米十石以下者此尤近於兒戱欲以此消己成之災息未形之患吁亦難矣成湯桑林之禱宣王側身修行之意其反求諸己者為如何哉熹竊思之今日之事應天之實有四曰求直言曰修闕政曰黜邪佞曰舉正直恤民之大者有六曰重放稅租乞行下諸路監司察州郡不受訴者郡守察其縣令皆以名聞曰通放米船乞下江西湖南路仍許下流諸路州軍具奏重行責罰曰勸分賑乏曰截留綱運曰嚴禁盜賊曰紏劾貪懦區區念此至熟悉矣欲卬首信眉一言於上又慮出位干時未必取信故敢以告於執事伏惟都俞之暇從容造膝一為明主極言之則天下幸甚與周參政别紙竊聞參政間以隔并之災過自引咎顧留行之詔既下則明公不得終遂其髙矣然天戒昭昭聖心警懼惕然有意於講闕政以召和氣此實盡忠補過轉禍為福不可失之幾願明公深以為意則天下幸甚熹前日所陳應天恤民之目皆今日之急務而求言之詔尤四方所渴聞者不識明公亦有意乎若復推遷失此大會則自今以往熹之言不復能出諸口矣引領東閣不勝拳拳與陳師中書熹試郡無狀以丞相庇臨之力幸及終更復叨除命傳聞嘗汚丞相薦墨是以有此意者偶因臧否支郡及之比歸見劉平父乃知所以假借稱道者過實殊甚使人愧懼踧踖不知所言丞相既已失之老兄在旁又不力諫止使熹負此無實之名他日反為門墻之累追悔何可及耶欲具書謝丞相具道此意偶值此便未暇更旬日間當有的便續修致也歸途所過知識往往能道次舍經歴之狀但未知果以何日至莆中舊第區區不勝瞻仰也熹閏月二十七日受代即日出城遊山玩水自江州界渡江在道十餘日以前月十九日到家疾病支離且得休息江西勅告尚未被受衰懶豈復堪此幸闕期尚遠得以徐為去就耳自明之亡行且期矣念之怛然痛恨如新不知向來所喻編次文字今己就否渠所立自足以不朽然其議論曲折亦不可不使後人聞之也其家事復如何朋友傳説令女弟甚賢必能養老撫孤以全栢舟之節此事更在丞相夫人奬勸扶植以成就之使自明沒為忠臣而其室家生為節婦斯亦人倫之美事計老兄昆仲必不憚贊成之也昔伊川先生嘗論此事以為餓死事小失節事大自世俗觀之誠為迂濶然自知經識理之君子觀之當有以知其不可易也伏况丞相一代元老名教所宗舉錯之間不可不審熹既辱知之厚於義不可不言未敢直前願因老兄而宻白之不自知其為僭率也與陳丞相别紙自明云亡忽將朞歲念之令人心折其家想時收安問熹前日致書師中兄有所關白不審尊意以為何如聞自明不幸旬月之前嘗手書列女傳數條以遺其家人此殆有先識者然其所以拳拳於此亦豈有他正以人倫風教為重而欲全之閨門耳伏惟相公深留意焉與福建顔漕劄子前日已被改除信劄傳聞㑹稽斗米八百錢其勢不容辭避己申乞奏事矣邵武勢須四五日間方得歸即治裝以俟命萬一成行恐不復得請教不勝引領之懐凡所以居官治民及救荒方畧有可見教者尚冀不鄙幸甚幸甚道間詢問收成次第云僅可得六七分今又遭雨若未遽止即不得及此數矣恐欲聞其實故敢及之與顔漕劄子熹衰病之餘彊顔一出適此大祲費縣官數十萬而越人之殍猶不可以數計俯仰幽明跼踳憂愧殆未易以言喻也加以伉拙不堪世俗之迫隘中間求去不得復此宿留今幸二麥登場賑救訖事見攅帳目申發即㝷前請庶幾觀變玩占可以無大過耳浙東山佳處都未得放懐登覽剡中雖兩到然憂累方深無復佳興也若便得報罷當取道石橋龍湫以歸庶不負此行耳前承枉書竊審軺車一出周徧八都狂冦束手姦民屏息山谷困窮受賜多矣他可以為一方久遠計者尚冀髙明慮之千萬幸甚上宰相書六月八日具位謹奉書再拜獻於某官熹嘗謂天下之事有緩急之勢朝廷之政有緩急之宜當緩而急則繁細苛察無以存大體而朝廷之氣為之不舒當急而緩則怠慢廢弛無以赴事幾而天下之事日入於壊均之二者皆失也然愚以為當緩而急者其害固不為小若當急而反緩則其害有不可勝言者不可以不察也竊觀今日之勢可謂當急而不可緩者矣然今日之政則反是愚不知其何以然也去歲諸路之饑浙東為甚浙東之饑紹興為甚聖天子閔念元元之無辜傾囷倒廪以救之而甚者至出内帑之藏以補其不足德意之厚與天同功熹於是時憊卧田野而明公實推挽之使得與被使令趨走之末仰惟知遇撫己慙怍然自受任以來夙夜憂歎恐無以仰承聖天子之明命而辱明公之知於此時也是以不憚奔走之勞不厭奏請之煩以盡其職之當為者求以報塞萬一而乃奏請諸事多見抑却幸而從者又率稽緩後時無益於事而其甚者則又漠然無所可否若墮深井之中至其又甚者則遂至於按劾不行反遭傷中而明公意所左右又自曉然使人憤懣自悔其來而求去不得遂使因仍以至於今比日以來神明消耗思慮恍惚兩目昏澁省閲艱辛方欲少俟旬日别上封章冀蒙哀憐得就閑佚又以連日不雨旱勢復作紹興諸邑仰水髙田已盡龜拆而山鄉更有種不及入土之處明􅄔台州皆來告旱勢甚可憂雖已一靣多方祈禱必冀感通然天道髙遠事有不可期者萬一更加旬日未遂所求則去年境界又在目前而上自大農下及閭巷公私蓄積頻年發散亦自無餘後日之憂必有萬倍於前日者熹之迂愚固不知所以為計誠恐雖以聖主之聰明聖智明公之深謀遠慮亦未必有斷然不可易之長策真可以惠活饑民彈壓姦盜而保其必無意外之患也熹是以徬徨􅇶迫未敢遽請而復冐昧一罄其愚惟明公試幸聽之竊惟朝廷今日之政無大無小一歸弛緩今亦未暇一一條數以慁崇徳且以荒政論之則於天下之事最為當急而不可緩者而荒政之中有兩事焉又其甚急而不可少緩者也一曰給降緡錢廣糴米斛今二廣之米艫舳相接於四明之境乘時收糴不至甚貴而又顆粒匀净不雜糠粃乾燥堅碩可以久藏欲望明公察此事理特與敷奏降給緡錢三二百萬付熹收糴則百萬之粟旬月可辦儲蓄既多緩急足用政使朝廷别有支撥一紙朝馳而米夕發矣且往時不免轉大農之粟發内帑之幣以應四方之求矣積之於此與彼何異而又乘錢廣糴利重費輕殆與臨期支撥糴貴傷財者不可同日而語且今米船已集求售無所停住日久坐失本利後者懲創因不復來無窮之害實自今始此一事也二曰速行賞典激勵富室蓋此一策本以誘民事急則籍之以為一時之用事定則酬之以為後日之勤旋觀今日失信已多别有緩急何以使衆欲望明公察此事理特與敷奏照會元降即與推恩使已輸者無怨恨不滿之意未輸者有歆豔慕用之心信令既行願應者衆則緩急之間雖百萬之粟可指揮而辦况是此策不關經費揆時度事最為利宜而乃遷延歲月沮抑百端使去歲者至今未及霑賞而今歲者方且反覆郤難未見涯際是失信天下固足以為今日之所甚憂而自壊其權宜濟事之策者亦今日之所可惜也謀國之計乖戾若此臨事而悔其可及哉此二事也然或者之論則以為朝廷一節財用重惜名器以為國之大政將在於此二者之請恐難必濟愚竊以為不然也夫樽節財用在於塞侵欺滲漏之弊愛惜名器在於抑無功幸得之賞今將預儲積蓄以大為一方之備則非所謂侵欺滲漏之弊也推行恩賞以昭示國家之信則非所謂無功幸得之賞也且國家經費用度至廣而耗於養兵者十而八九至於將帥之臣則以軍籍之虚數而濟其侵欺之姦餽餫之臣則以薄籍之虚文而行其盜竊之計苞苴輦載爭多鬬巧以歸於權倖之門者歲不知其幾巨萬明公不此之正顧乃規規焉較計毫末於饑民口吻之中以是為樽節財用之計愚不知其何說也國家官爵布滿天下而所以予之者非可以限數也今上自執政下及庶僚内而侍從之華外而牧守之重皆可以交結託附而得而比來歸正之人近習戚里之輩大者荷旄仗節小者正任横行又不知其幾何人明公不此之愛而顧愛此廸功文學承信校尉十數人之賞以為重惜名器之計愚亦不知其何說也然熹亦嘗竊思其故而得其說矣大抵朝廷愛民之心不如惜費之甚是以不肯為極力救民之事明公憂國之念不如愛身之切是以但務為阿諛順指之計此其自謀可謂盡矣然自旁觀者論之則亦可謂不思之甚者也蓋民之與財孰輕孰重身之與國孰大孰小財散則可復聚民心一失則不可以復收身危猶可復安國勢一傾則不可以復正至於民散國危而措身無所則其所聚有不為大盜積者耶明公試觀自古國家傾覆之由何嘗不起於盜賊盜賊竊發之端何嘗不生於饑餓赤眉黄巾葛榮黄巢之徒其已事可見也數公當此無事之時處置一二小事尚且瞻前顧後踰時越月而不能有所定萬一薦饑之餘事果有不可知者不審明公何以處之明公自度果有以處之則熹不敢言若果無以處之則與其拱手熟視而俟其禍敗之必至孰若圖難於易圖大於細有以消弭其端而使之不至於此也古之人固有雍容深宻不可窺測平居黙然若無所營而臨大事決大策不動聲氣而措天下於太山之安者然從今觀之自其平日無事之時而規模措畫固已先定於胸中是以應變之際敏妙神速決不若是其泄泄而㳫㳫也况今祖宗之讐恥未報文武之境土未復主上憂勞惕厲未嘗一日忘北向之志而民貧兵怨中外空虚綱紀陵夷風俗敗壊政使風調雨節時和歲豐尚不可謂之無事况其饑饉狼狽至於如此為大臣者乃不愛惜分隂勤勞庶務如周公之坐以待旦如武侯之經事綜物以成上意之所欲為者顧欲從容偃仰玩歲愒日以僥倖目前之無事殊不知如此不已禍本日深熹恐所憂者當不在於流殍而在於盜賊受其害者當不止於官吏而及於邦家竊不自勝漆室嫠婦之憂一念至此心膽墮地念不可不一為明主言之而猶未敢率然以進敢先以告於下執事惟明公深察其言以前日遲頓寛緩之咎自列於明主之前君臣相誓務以盡變前規共趨時務之急而於熹所陳荒政一二事者少加意焉則熹雖衰病不堪吏役尚可勉悉疲駑以備鞭策至其必不可支吾而去後來之人亦得以因其已成之緒葺理整頓仰分顧憂如其不然則熹之愚昧衰遲固不能為此無麫之不托而其狂妄將有不能忍於明主之前者明公不如早罷其官守解其印綬使毋得以其狂瞽之言上瀆聖聰則熹也謹當緘口結舌歸卧田間養鷄種黍以俟明公功業之成而羞愧以死是亦明公始終之厚賜也情迫意切矢口盡言伏惟明公之留意焉與陳丞相别紙蒙諭第二令孫為學之意乃能舍世俗之所尚而求夫有貴於已者此蓋家庭平日不言之教有以啓之非面命耳提之所及也熹嘗聞之師友大學一篇乃入徳之門戸學者當先講習知得為學次第規模乃可讀語孟中庸先見義理根原體用之大畧然後徐考諸經以極其趣庶幾有得蓋諸經條制不同功夫浩博若不先讀大學論孟中庸令胸中開明自有主宰未易可遽求也為學之初尤當深以貪多躐等好髙尚異為戒耳然此猶是知見邊事若但入耳出口以資談說則亦何所用之既已知得便當謹守力行乃為學問之實耳伊洛文字亦多恐難遍覽只前此所禀近思録乃其要領只此一書尚恐理會未徹不在多看也大學中庸向所納呈繆說近多改正旦夕别寫拜呈近又編小學一書備載古人事親事長洒掃應對之法亦有補於學者併俟録呈乞賜裁訂以授承學也考異與陳丞相别紙先見義理一作究見晦庵集巻二十六欽定四庫全書晦庵集巻二十七宋朱子撰
