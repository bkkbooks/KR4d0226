body:
  text: 奏台州免納丁絹狀具位臣朱熹臣巡厯至台州據屬縣人户陳狀稱逐年身丁每丁合給本色絹三尺五寸并錢七十一文被州縣登承抑納絹七尺其實本州每丁只發納上供三尺五寸却將錢七十一文令人户倍輸折納本色竊念本州縣人戶連遭荒旱細民艱食見䝉追催𦂳急無所從出乞將逓年多納理作今年合納其今年倍納在官乞理為來年合納之數臣喚到台州典級楊松年陸迅等供拖照案例臨海五縣人户合納丁絹除第一等止第四等係將丁産税錢併紐科納絹帛外所有第五等丁絹檢準建炎三年十一月三日徳音節文兩浙人户嵗出丁鹽錢每丁納錢二百二十七文竝令納絹一丈綿一兩已是太重自今第五等以下人戸一半依舊折納外餘一半折納見錢台州人戸身丁每丁供鹽稅錢一百四十一文足折納絹七尺自紹興三年首正將第五等人戸丁鹽錢除一半折納絹三尺五寸外有一半折納見錢七十文足五分計減退本色絹數是致闕少絹帛支遣本州於紹興四年相度貼支官錢揍納具申朝廷獲奉聖㫖令台州樁管見錢與人戸納到數目依市價賣發不得科敷搔擾本州自紹興四年以後却將第五等人戸合納一半丁錢七十文五分足紐納絹三尺五寸照得第五等人戸計一十九萬九千八十四丁合納丁鹽錢二萬八千七百貫八百四十四文除一半納本色外有一半止合納丁錢一萬四千三十五貫四百二十二文足本州却將上件丁錢紐作本色絹三尺五寸催納計絹一萬六千五百九十匹一丈二尺以致人戸陳理今來若放免一半丁絹却合催納一半丁錢一萬四千三十五貫四百二十二文足其所免上件丁絹本州逐年自有支用䟎剰紬絹一萬六千二百餘匹可以通那充官兵等支遣不礙起發上供綱運之數臣照對台州諸縣連年災傷細民重困若不優加存恤必見流移其第五等人戸所納丁稅既有元降建炎三年指揮許納一半見錢自不應竝納本色今來台州若免納一半丁絹本州自有䟎剰紬絹可以通那支遣不礙起發上供之數委無相妨臣已行下台州及臨海等縣遵照建炎三年獲降聖㫖令人戸逐年每丁送納絹三尺五寸并一半見錢七十文五分足免致重困貧民下戸不得仍前違戾科抑外須至奏聞者右謹錄奏聞謹狀再乞給降錢物及減放住催水利等狀具位臣朱熹臣於今月初一日及六日兩次具奏乞給降錢物應副本路諸州糶濟支用等事至今半月未奉進止竊緣自今已向深秋欲得上項錢物給付逐州及早運糴其餘事件亦合早作措置庻幾將來飢民得沾實惠不至復似去年措置後時追悔無及但緣臣近日不合按劾知台州唐仲友不公不法事件違忤貴臣不敢更以私書手劄陳懇廟堂催促敷奏竊慮進呈淹緩有誤一道飢民性命之計今不免再具畫一事目奏聞欲望聖慈鍳兹愚悃發自宸𠂻斟酌事宜特降處分先將愚臣重賜行遣别選膚使錫以緡錢使布寛大之恩其減放住催水利募糴等事亦係本路救荒𦂳要節目若俟新官奏請然後施行必是遲緩誤事欲乞權依臣奏且與施行不勝幸甚須至奏聞者一奏乞特降睿㫖支撥錢一百七十萬貫揍前所給通作二百萬貫令臣及早分給諸州廣行運糴俟見糶給戸口實數却行計度支用不盡之數先次拘收回納仍乞於内紐計米數量給空名告身五七十道并度牒官㑹揍成二百萬貫付臣收掌如有獻助及格之人合臣與安撫使書塡給付一奏乞特降睿㫖於今來所降減半指揮内刪去將來檢踏見得災傷最重處方得保明取㫖之文只依乾道七年耿延年所請已得指揮施行一奏乞特降睿㫖將本路災傷縣分大戸夏稅權行住催少俟檢放秋米分數定日却將夏稅亦依分數蠲減一奏乞特降睿㫖許臣前項所請百七十萬貫却於數内量撥什三候諸州通判申到合興修水利去處即與審實應副其合糶給人有應募者即令繳納糶給由厯就顧入役俟畢工日糶給如舊一奏乞特降睿㫖許令被災州縣人戸苖米五斗以下不候檢踏先次蠲放令轉運司疾速施行一奏乞特降睿㫖申嚴米穀不得收稅舊法仍詔有司諸被災州縣人戸欲興販物貨往外州府收糴米穀就闕米處出糶者各經所在或縣或州或監司自陳所帯貨物判執前去其糶米訖所買回貨亦各從所在自陳判執回歸往回所過竝不得輙收分文稅錢違者竝依稅米穀法必行無赦徑下轉運司約束施行一奏乞特降睿㫖就撥紹興府先給到度牒一百道換到米及明州先䝉降到二十萬貫糴到米竝付本司均撥應副紹興府明州糶濟及貸與食利人戸興修水利却於二百萬貫内除豁其水利貸錢向後豐年却令逐旋回納右謹錄奏聞伏候勅㫖乞降㫖令婺州撥還所借常平米狀具位臣朱熹臣伏準尚書省劄子備據知婺州錢佃奏乞於本州見管常平義倉米内支借二萬石支遣軍粮八月三日三省同奉聖㫖許支借二萬石限至歲終撥還臣除已㳟禀施行外臣竊見義倉米在法唯充賑給不許他用今歲婺州諸縣例皆旱傷將來細民必致闕食本司尚自申奏朝廷支降官㑹度牒應副本州糴米而義倉窠名正係賑給之數先來本州已曾借過一萬七千石元降指揮候秋成先次撥還尚未還到顆粒今來再借二萬斛止存七千餘石已是不足支遣而所借之米又䝉許令歲終撥還深恐後時有誤糶濟欲望聖慈特降指揮令婺州將兩次借過米三萬七千石趂此秋成盡數先行撥還庻幾可以添助糶濟須至奏聞者右謹錄奏聞伏候勅㫖奏廵厯至台州奉行事件狀具位臣朱熹臣照得本路州縣今歲旱傷臣自七月十五日出廵取道嵊縣迤邐入台州按視及預行措置賑恤事件節次具奏外臣已於八月十八日起離台州取處州前去所有台州奉行事件須至奏聞者一臣七月二十三日到台州二十五日準尚書省劄子恭奉聖㫖給降度牒三百道官㑹一十五萬緡臣即時分撥應副諸州外仍於台州刷到常平司及諸州庫眼有管窠名錢八萬貫及於降到錢㑹内撥錢二萬貫共揍一十萬貫量逐縣災傷輕重地里闊狹均撥應副仍詢訪到土居官員士人誠實練事為衆所服者一縣數人以禮敦請令與州縣當職官公共措置差募人船前往得熟去處收糴米斛循環賑糶仍多方敦請上戸說諭或出米穀或出錢物并行運糴添助賑糶仍據本州申到見管常平義倉米五萬二千餘石已令樁管準備賑濟及一面立式選差都正鄉官等家至戸到從實抄劄法應糶濟大小戸口取見的確數目各隨比近置塲以俟將來闕食就行糶濟仍立罪賞約束不得泛濫抄劄枉費官廩外伏乞聖照一臣所經厯去處得雨之後晚稻之未全損者竝皆長茂可望收成但民間所種不多僅當早稻十之一二其早稻未全損者亦皆抽莖結實土人謂之二稻或謂之傳稻或謂之孕稻其名不一目今有已黄熟處亦有尚帯青色處村民得此接濟所益非細但其稻莖稀疎秕多糓少其色青者已逼霜露恐難指擬至於粟荳油麻蕎麥之類却竝有收次第今冬未至乏絶只為薦饑民無蓋藏竊恐來春必至艱食臣已面諭州縣官吏常切體訪不拘早晚但覺民間闕食便行賑糶收錢運糴循環接濟無損於官有益於民實為利便伏乞聖照一臣體訪到本州黄巖縣界分闊逺近來出榖最多一州四縣皆所仰給其餘波尚能陸運以濟新昌嵊縣之闕然其田皆係邊山瀕海舊有河涇堰閘以時啓閉方得灌溉收成無所損失近年以來多有廢壊去處雖累曾開淘修築又緣所費浩瀚不能周徧臣竊惟水利修則黄巖可無水旱之災黄巖熟則台州可無饑饉之苦其為利害委的非輕遂於降到錢内支一萬貫付本縣及土居官宣教郎林鼐承節郎蔡鎬公共措置給貸食利人戸相度急切要害去處先次興工俟向後豐熟年分却行拘納其林鼐曾任明州定海縣丞敦篤曉練為衆所稱蔡鎬曾任武學諭沈審果決可以集事但本縣知縣范直興不甚曉事恐難倚仗欲乞依本司已獲降到指揮特與嶽廟理作自陳别選清強官權攝縣事庻幾興役救荒不至闕誤伏候勅㫖臣前項所奏給降到錢三十萬貫臣已分撥婺州八萬貫衢州六萬貫處州五萬貫台州二萬貫黄岩興修水利一萬貫及明州定海縣亦乞興修水利已撥一萬貫共已撥二十三萬貫外尚剰七萬貫初欲分撥應副明州紹興府而明州申到已奏乞撥錢一百萬貫臣遂不敢拈出兼婺衢兩州連年荒歉竝無蓄積可以那兌運糴竊恐將來更有欠闕欲且留此錢數更俟聖慈添撥到錢即并諸州再行均給所有添撥之數已兩次具奏今更於後項開說伏乞聖照一臣於八月初三日及十二日兩次具奏更乞聖慈添撥錢物及紹興府明州元降度牒官會所糴米斛通揍作二百萬貫文乞不候檢踏先放五斗以下苖米又乞權住催夏稅零欠候檢放秋苖分數定日并行除豁理納又乞申嚴米榖免稅舊法仍乞特降指揮與免往回物貨及搭帶稅物亦已日久未奉進止欲乞聖慈詳臣兩狀早賜指揮伏候勅㫖右謹錄奏聞伏候勅㫖簽黄臣第二狀内已有陳乞别選膚使付以緡錢一節今更自度決難自効并望聖慈早賜處分奏均減紹興府和買狀同本府臣聞欲救巨患者不可惜小費欲除實弊者不可循虛名臣等叨䝉聖恩備數東浙竊見紹興和買之患民所不堪巧詐之徒姦弊百出前此議者非不欲救而除之而往往過為國家顧惜小費下比流俗茍循虛名是以因循終莫能革臣等不肖誠不足仰窺聖德之萬分然有以知陛下愛民之心燭理之明於此必有所不屑者是以敢昧萬死而一言之伏惟陛下留神財擇臣等契勘浙東七州除温州無和買外其餘六州共管和買二十八萬一千六百四十匹二丈一尺紹興一州獨當一十四萬六千九百三十八匹乃占諸州一半以上緣此重困人不能堪所以子戸詭名巧為姦弊雖有重法終不能禁且如㑹稽一縣經界之初舊例雖是物力三十八貫五百以上起科和買然以通數計之實及四十七貫方滿一疋今亦自三十八貫五百起科以通數計之乃自十八貫六百單一文已科一疋則是向來科納一疋者今增為二匹半矣官之所入不加贏田之在民不加損止緣人苦其重避免者多以故姦偽日滋以至此極向來官吏之有意於民者莫不知有此弊亦未嘗不為之惻然動心評議指畫亦既多端而利害相形終無定說如欲首併詭戸則懼其告訐成風徒敗風俗而暫併復分終不能禁欲以畆頭均紐則縱舍游末重困農民輕重之間亦未為允欲科有產無丁之戸則彼能立詭户者固不憚更立虛丁而寡妻弱子實無丁籍者反受其弊如欲減退物力等則或作鼠尾推排則彼昔者既能析而為三十八貫五百以下之戸矣今豈不能再析而為若干錢以下之戸乎故嘗叅酌前後衆人之論而折𠂻之獨有通計家活浮財物力貫頭均紐之說稍為無弊雖第五等戸昔無今有者未免有言然於其間眞偽亦復相半若真貧民輸一戸之和買不過丈尺彼自不較惟是子戸詭名之衆頓輸數戸積計甚多故尤不以為便而必爭之其力又足以挾下戸唱浮論以揺衆聽故不察其實者遂以自疑而莫能復措其說此和買之議所以汹汹累年而和買之害固未嘗有一毫之損也然竊嘗深究其受病之原則無他焉直以元額之太重而已故今臣等相與熟議輙陳此說欲望聖慈先發德音痛減歲額然後用貫頭均敷之說以定其制惟慮所敷第五等戸之中眞下戸者或受其弊則請叅用高下等第均敷及減免下戸丁錢之說以優恤之但使眞下户者審知此法之行不為厲已而無他辭則彼姦民之浮論亦可以置而不問矣謹畫一條具于后一所以先裁減歲額者臣聞祖宗初立和預買法先支見錢後納紬絹民間實頼其利至有形於歌謡者而當是時本路漕臣有私於越州者其吏復私於㑹稽故此郡縣所抛獨多其後請本之數遂為歲額而錢不復支絹日益貴以至今日而白着之科遂反為一州無窮之害故建炎元年五月一日光堯壽聖憲天體道性仁誠德經武緯文太上皇帝登極赦書有曰和預買法本支實價訪聞官司立價甚低或高擡他物價直凖折或以無實虛劵充數甚者直至受納未支本錢不遵條限前期起催急於星火今來上供之類欲依祖宗法其和預買有前項違戾守令并轉運司竝以違制論加二等仍委提刑司覺察每歲於依限後一月内具有無違戾聞奏不以實聞與同罪仰味大哉之言則是太上皇帝再造之初聖慮之深固已及於此矣而兩聖相承於今五十餘年迫以軍國之須所資至廣卒未能有以仰稱睿謨預支實價以復祖宗之舊者臣等竊思其次獨有擇其甚處如紹興府者有以少解其倒垂之急為庻幾焉爾然今欲去紹興和買之害使無姦弊稍得均平而不先減其當日請本之額譬如負千鈞者背膂之力既已不堪乃不知減其所負之物但欲移而寘之懐䄂亦必無益於事矣故今臣等於此首陳減額之說而議者顧以為有虧經費無所從補徒然奏陳必不聽許則臣等雖愚有以知其必不然也臣等仰觀陛下愛育黎元如親父母有以病告如切其身如頃年四州之虛額饒州之金徽州之絹汀州之銀青陽星子之稅放免蠲除不可勝計而連年水旱施舍貸給何啻數十巨萬何獨於此知其為害之甚而不出捐數萬匹者以紓之乎又况近者已䝉聖恩減免天慶攅陵等處和買二千餘匹固已漸示救患除弊之端矣然通而計之人戸所減每匹纔及一尺有竒而坊本煎鹽坍江放生四色所放尚未除免則臣等所以望於陛下者不但如此而已也臣等竊見浙西和買最重去處無如臨安府者而其數纔及八萬餘匹欲望聖慈將紹興府且依此例為額而蠲其餘數至於版曹經費或有所闕則乞量撥内帑之蓄以補其數蓋如本路坊塲課利出剰錢數歲輸内帑者至若干萬貫皆是近歲曹泳創置窠名即非舊法所當供者如此之類倘捐一二歸之版曹還以補塡本路上供蠲減之數則聖澤下流人知徳意舊弊庻乎其可革矣一所以謂貫頭均紐之說為無弊者蓋今和買之重人悉䂓避詭為下戸長姦滋弊莫可關防如經界之初㑹稽一縣凡為物力錢一百二十六萬餘貫而四等以上科納和買者當一百一十萬餘貫今來四十年所謂四等以上止有物力錢三十七萬九千四百六十貫六百文而轉入五等者乃至七十二萬五百餘貫皆緣和買之重姦猾之民爭為子戸詭名以避均敷而其醇謹畏法不敢為者顧乃為之代受所免之數幾再倍於其舊政之不平莫甚於此從來為州縣者灼知其弊非不嚴詭戸之禁往往隨併隨分終莫能革今若䝉恩先次痛減歲額却以貫頭均敷自物力一丈以上竝紐寸尺則高下多寡其數一定而姦弊無所從出矣若猶以眞實下戸創科為慮則所謂高下等第科敷以及減免下戸身丁之説臣等請得而備陳之一所謂高下等第均敷者上戸舊科和買數多今用貫頭均敷則其數却須少減下戸舊不曾科和買今用貫頭均敷則其數乃是頓增若使頓增數中皆是子戸詭名則固不足恤第其間却有眞實下戸不能無咨怨者故今復為此法以優恤之如第一等物力四十貫當科和買一匹則第二等四十五貫乃科一匹等而下之至於五等則戸愈卑而科愈少矣如此施行庻幾下戸所增不多不至反有重困一所謂減免下戸丁錢者大率第五等中有丁者多是眞實下戸無丁者多是子戸詭名今若將第五等戸所納丁錢特與除放則眞實下戸雖增和買而得除此色官物其乗除之間亦畧足以相補矣右謹件如前欲望聖慈特賜省覧直降睿㫖悉與施行則不惟臣等之幸實紹興闔境百萬生靈數十百年永永無窮之幸貼黄第五等戸計若干丁每丁一歲納錢若干統府八縣計若干貫後闕又小貼子所以欲改畆頭二字為物力貫百者蓋以畆頭科紐則獨有田之家被科而有浮財物力者不與亦有未均之弊故欲改作物力貫百則有田及浮財者皆在其中此奏是衆人商量而新秀州嘉興主簿諸葛千能操筆為之其人有學行審細詳練恐可招而問之必能博盡異同得其利病之實伏乞台照熹上覆奏鹽酒課及差役利害狀臣竊見本司所管鹽酒課利國計所資為甚廣而民情所患為甚深若不根索弊原别行措畫竊恐民力日困亦非國家久逺之利臣雖書生不曉錢穀然其大體亦竊講聞久欲條奏以聞顧以救荒方急有所不暇今以罪疾力請投閑惓惓之私懐不能已輙有已見冐昩奏陳如有可採欲乞别選忠厚通敏之臣付以其事令其詳細稽考因事制宜使民情亟得去其所患而國計永不失其所資實為利便至於差役一事亦屬本司所管今亦有少利害并具其說如後須至奏聞者一浙東所管七州而四州瀕海既是產鹽地分而民間食鹽必資客鈔州縣又有空額比較增虧此不便之大者夫產鹽地分距亭塲去處近或跬歩之間逺亦不踰百里故其私鹽常賤而官鹽常貴利之所在雖有重法不能禁止故販私鹽者百十成羣或用大船般載廵尉既不能訶州郡亦不能詰反與通同資以自利或乞覔財物或私收稅錢如前日所奏台州一歲所收二萬餘貫是也以此之故除明越兩州稍通客販粗有課利外台溫兩州全然不成次第民間公食私鹽客人不復請鈔至有一塲一監累月之間不收一袋不支一袋而官吏縻費吏卒搔擾有不可勝言者然以有比較之法州縣恐有殿罰則不免創立鹽鋪抑勒民戸妄作名色抑令就買出入暗昧不可稽考大畧瘠民以肥吏困農民以資游手為州縣為提舉主管者非不之知然皆以國計所資不敢輙有陳說日深月久民愈無聊若不變通恐成大患臣生長福建竊見本路下四州軍舊行產鹽之法令民隨二稅納產鹽錢而請鹽於官近歲官鹽雖不支給而民間日食私鹽官司既得產鹽稅錢亦不復問其私販雖非正法然實兩便欲乞聖慈特詔本司取㑹福建路轉運司下四州軍見行產鹽法將本路地里逺近鹽價高低比附叅考立為沿海四州鹽法其餘州軍自依舊法施行則亦革弊救民之一事也伏乞聖慈詳酌施行一酒坊之弊其說有四一曰官監二曰買撲三曰拍戸抱額四曰萬戸抱額臣竊以為莫不便於官監莫便於萬戸其他則亦互有利害而萬戸之中亦不能無少利害要在講究詳盡然後施行則庻乎其弊之可革矣今官監之害朝廷既知而罷之矣然州郡占吝多不遵禀戸部漕司所撲仍不廢罷此則害雖除而未盡者也買撲之害在買人有消折本柄破壊家產之患在衆人有掗托抑勒捕捉欺凌之擾雖加禁防法式明備然勢之所在終不能革拍戸抱額則庻幾矣然或額重而抱納不前或藉此而掗托搔擾則其弊亦不異於買撲唯萬戸抱額最為簡便然須以一州或一縣通計田畆浮財物力而均出之使無官戸民戸之殊城居村居之異一槩均敷立為定籍乃為盡善若舍官戶而敷民戸舎城居而困村居不立官簿而私置草簿使吏得以陰肆出没走弄於其間則又病矣此法本路處州見已施行四五十年民無爭訟官省禁防雖其小害尚不能無然入其封境觀其氣象宛然樂國與諸州不同今欲便取其法行於諸州則恐本州課額素輕或非他州之比未可遽議然他州課額雖多從來拘催少曾登足皆是虛名徒掛空簿若䝉聖恩深詔有司取淳熈六年七年八年三歲實催到庫之數叅校取中立為定額然後以此科敷俾為萬戸則亦庻幾安民省事之一端也伏乞聖慈詳酌施行一臣於今年闕月内曾具差役利害事申尚書省幾數千言内有徐詡所畫歇役年限一條最為詳宻而近凖戸部行下乃無一言見施行者臣生長田間頗諳鄙事竊謂其言若得聖明一賜觀覧決須有可采者欲望聖慈特賜宣索觀其大槩然後付之愛民曉事老成詳細之臣令其看詳擇可行者具為條畫别降指揮施行庻於陛下愛民之意少有裨補臣不勝萬幸右謹錄奏聞伏候勅㫖奏義役利害狀具位臣朱熹臣廵厯到處州竊見本州昨奉聖㫖依布衣楊權所請結立義役此見陛下愛民之切雖草茅之言苟有便於民者無不采納施行天下幸甚然本州目今奉行却有未盡善者如令上戸官戸寺觀出田以充義田此誠善矣而本州却令下戸只有田一二畆者亦皆出田或令出錢買田入官而上戸田多之人或却計㑹減縮所出殊少其下戸今既被科出田將來却不充役無緣復收此田之租乃是困貧民以資上戸此一未盡善也如逐都各立役首管收田租排定役次此其出納先後之間亦未免却有不公之弊將來雖施刑罰轉添詞訴此二未盡善也又如逐都所排役次今日已是多有不公而况三五年後貧者或富富者或貧臨事不免却致爭訟此三未盡善也所排役次以上戸輪充都副保正中下戸輪充夏秋戸長上戸安逸而下戸陪費此四未盡善也凡此四事是其大槩目下詞訴紛然何况其間更有隱微曲折未可猝見若不兼採衆論熟加考䆒竊恐將來弊病百出詞訴愈多改之則枉費前功不改則反貽後患將使義役之名重為異議者所笑無復可行之日誠有未便臣昨見紹興府山陰縣見行義役只是本縣勸諭人戸各出義田均給保正戸長各有畆數具載砧基其保正戸長依舊只從本縣定差更不别置役首亦不先排役次而其當役之戸既有義田可收自然樂於充應不至甚相紏訐但其割田未廣去處未免尚仍舊弊若更葺理增置便無此患竊謂其法雖似闊疎然却簡直易明無他弊病又且不須衝改見行條法委實利便故嘗取其印本砧基行下州縣然以未經奏請畫降指揮州縣往往未肯奉行臣愚欲望聖慈詳酌行下處州只令合當應役人戸及官戸寺觀均出義田罷去役首免排役次止用山陰縣法官差保正副長輪收義田仍令上戸兼充戸長俟處州行之有緒却令諸州體倣施行庻幾一變義風永息爭競須至奏聞者右謹錄奏聞伏候勅㫖按知台州唐仲友第一狀外封奏為本路諸州人戸間有流移去處奏聞事内封奏為台州催稅𦂳急戸口流移知台州唐仲友别有不公不法事件臣一面前去審究虛實奏聞事貼黄臣竊見本人近䝉進擢而臣蹤跡方此孤危較權量力實犯不韙顧以疎賤䝉被誤恩實當一路耳目之寄不敢緘黙以負使令伏惟眷照力賜主張免致復為小人陰有中害不勝幸甚具位臣朱熹臣今月十六日起離紹興府白塔院道間遇見台州流民兩輩通計四十七人扶老擕㓜狼狽道途臣問其故皆云本州旱傷至重官司催稅𦂳急不免抛離鄉里前去逐食臣即量給錢物喻令復業竟不能回各已迤邐西去臣因詢究得本州日前似此流移戸口已多目今方是初秋已致如此竊恐向後愈見數多除已行下本州約束令其存撫見在人戸毋致復有流移外臣續訪聞知台州唐仲友催督稅租委是刻急多差官吏在縣追呼屬邑奉承轉相促迫急於星火民不聊生又聞本官在任多有不公不法事件衆口讙譁殊駭聞聽臣今一面躬親前去審究虛實别具聞奏乞賜究治外所有上項事理須至先次奏聞者右謹錄奏聞伏候勅㫖按唐仲友第二狀貼黄奏為知台州唐仲友違法促限催稅搔擾饑民事伏候勅㫖具位臣朱熹臣昨訪聞知台州唐仲友催税急迫致得民戸流移等事即具大畧奏聞今廵厯到本州天台縣據人戸遮道陳訴本縣夏税絹一萬二千餘匹錢三萬六千餘貫緣本州催促嚴峻六月下旬已納及絹五千五百餘匹錢二萬四千餘貫而守臣唐仲友嗔恠知縣趙公植催理遲緩差人下縣追請赴州縣人聞之相與號泣遮欄公植回縣情願各催戸下所欠零税絹二千五百匹限十日内赴州送納方得放免仲友遂專牒縣尉康及祖催納零欠更不照應三限條法及近日累降指揮牒内明言要在六月終以前一切數足又牒縣尉催淳熙七年八年殘欠官物專差人吏牟頴在縣監督及節次差下承局禁子等人絡繹在道乞覔搔擾無所不至又據寧海人戸論訴本州專差天台主簿張伯溫及州吏鄭椿姜允在縣催督去年殘米下戸丁稅百端搔擾本司見行追問未到而聞張伯溫在寧海縣追呼迫急本縣人戸不堪其擾相與羣聚喧譟欲行毆擊伯温知之僅得走免臣竊惟台州頻年災傷民力凋弊仲友儒臣幸得䝉恩典郡專以布宣德澤摩撫疲瘵為職而乃舞智循私動乖仁恕在法夏税省限至八月三十日下限方滿近來戸部擅行指揮必要七月盡數到庫已是違法而仲友乃於戸部所促之限又促一月公行文移督迫屬縣頓辱良吏苦虐饑民使千里之人愁怨歎息無所告訴甚失聖朝所以選用賢良惠恤鰥寡之本意又况方此饑饉人心易搖萬一果然生事不知何以彈壓臣雖疎賤誤䝉任使職在刺舉不敢不言欲望聖慈先將仲友亟賜罷黜以慰邦人之望其不公不法事件臣當一面審實以聞須至奏聞者右謹錄奏聞伏候勅㫖申尚書省狀具位臣朱熹今有狀奏知台州唐仲友促限催税違法擾民乞賜罷黜事緣在道路次舎淺迫慮有漏泄不敢備錄全文申尚書省其狀如䝉聖慈降出欲乞早賜敷奏施行以快千里疲民之憤須至供申右謹具申尚書省伏乞照㑹謹狀按唐仲友第三狀貼黄奏為知台州唐仲友在任不公不法事件除已將干連人送紹興府司理院根勘錄案奏聞欲乞聖慈將唐仲友先賜罷黜仍詔有司毋得觀望嚴行究治事伏候勅㫖此項已追到鐵匠作頭林明供具分明尋别具奏伏乞聖照仲友差官非法估没人戸財產多是差曹格及司戸趙善德案中可見伏乞聖照造假會人蔣輝已據通判趙善伋監押趙彥將就州宅後閂捉獲臣已押送紹興府司理院傳聞此人在此造作假會甚多其台州解到行在諸庫官㑹欲乞宻遣公正臣寮驗其眞偽伏乞聖照此項已據人戸潘牧繳到仲友長子手簡與弟子王静内說計囑周士衡論分公事及婦人李六娘訴王静及弟子鮑雙入宅求囑犯姦公事臣追到王静鮑雙供通委有取受詣實尋别奏聞伏乞聖照具位臣朱熹臣昨兩次具狀按劾知台州唐仲友促限催稅違法擾民罪狀聞奏乞賜罷黜及聞本人更有不公不法事件乞候一面審實以聞臣於今月二十三日到本州宻切體訪及先據本州通判申并據士民陳狀皆稱仲友到任以來少曾出㕔受領詞狀多是人吏應褒林木接受財物方得簽押無錢竟不得通以市户應世榮為耳目令其在外刺求富民之隂事民間初無詞訴急遣吏卒奄至其家捕以送獄擇姦貪之吏鍜鍊考掠傅致其罪往往徒配或請囑既行則又忽然縱舎曲直輕重初無定論邦人畏其凶􅆋無不重足而立又本州違法收私鹽稅錢歲計一二萬緡入公使庫以資妄用遂致鹽課不登不免科抑為害特甚又抑勒人户賣公使庫酒催督嚴峻以使臣姚舜卿人吏鄭臻馬澄陸侃為腹心妄行支用至於饋送親知刋印書籍染造匹帛製造器皿打造細甲兵器其數非一逐旋發歸鄉里其他細碎不急之物下至魚鹽臭腐但直一文以上無不津致以歸籠擔動十百計絡繹不絶於路凡此皆人所共見有口者類能言之臣嘗令本州通判趙善伋取其公庫文厯自二十四日己午間至中夜不至據監庫官司理王之純及造買使臣姚舜卿供每遇知州判下支單即時關支出庫所有應干簿籍於今日巳時知州聞得本司勾追馬澄即時盡行拘收入宅有公庫貼司俞實張公輔呉允中備見之純等曾親往控告知州堅執不肯付出仲友又悅營妓嚴蘃欲擕以歸遂令偽稱年老與之落籍多以錢物償其母及兄弟據司理王之統供今年五月滿散聖節方知弟子嚴蘃王蕙張韻王懿四名知州判狀放令前去即不曾承凖本州公文行下妓樂司照㑹仲友身既不正遂不能令其子弟以至白晝公然乘轎出入娼家交通關節受納財賂曾為羣不逞就娼家毆撃狼狽而仲友不敢問其嚴蘂沈芳之徒招權納賂不可盡紀其簿厯文字少經倅貳之手惟倚於臨海縣丞曹格及曹官范杉等格妻與之有㜕姻得出入其家早暮無節物論頗醜凡此細碎汚穢之迹臣不敢縷陳以瀆天聽臣謹按仲友身為儒生早取科目繼登臺省為清望官今又䝉恩出守名郡所宜夙夜恪勤正身率下務以承流宣化牧養小民為職顧乃不思報稱公肆姦心其刻核擾民之政既如臣前奏所述其貪汚不法之狀又如臣今奏所陳而近侍貴臣或未知其所為猶以故意期之以至交章論薦上誤寵擢臣以職事所在恐負使令誠知蹤跡孤危不敢隱情惜已其官屬所言士民所訴與臣前後所聞大畧不異雖其曲折未必盡如所陳然萬口一詞此其中必有可信者而觀其公然占吝公庫文厯不肯解送則其𠂻私折換以蓋日前侵盗入已之迹亦有不待案驗而可知者臣更不敢差官體究慮渉張皇却致本人潜將文案盡底改易無可供證竊謂唯有付之所司盡實根勘則其有無虛實自不可掩除已牒本州通判趙善伋高文虎拘收本州自仲友到任以後至截日終應干收支文厯公案及將合干人等押送紹興府司理院禁勘外欲望聖慈閔此一方久罹凶害亟詔有司毋得觀望嚴行究治依法施行以為逺近四方守臣貪殘不法之戒須至奏聞者一淳熙八年受納秋苖糙米每年是十月半後間開塲仲友信委司戸趙善德差為受納官公然倍取合耗高帯斛面不半月間善德已申所納糙米數足方十一月仲友將人戸未納糙米違法高價一併折錢人戸盡用賤價糶米高價納官一郡皆以為苦至今追催所折米錢更不顧恤朝廷上司時暫住催指揮其收到錢雖入於糴本庫收附多是關入公庫巧作名色支破私用欲乞委官到州監合干人供具去年折納糙米月日石數見得不恤民力一意取錢實迹一淳熙八年春本州荒歉抄劄諸縣合賑濟人戸姓名散給未嘗周徧仲友却專委人吏李廻乘勢監勒鄉司儧具隱落丁稅之人抑勒諸鄉司乘此作弊增減成其姦計詞訴至今不已每縣添至數千人多是失實比常年添增五縣丁產絹數千匹在兩年中納夏稅和買絹未及七分却竝高價折錢困及小民無錢可納增起丁税以無為有為一州無窮之害欲乞委官再行審實早與除豁其所取到添丁錢竝不曾起發不審將作何用一公使庫自來不許賣酒緣添歸正人合支些小供給錢仲友到任以來以此為名公庫每日貨賣生酒至一百八十餘貫煑酒亦及此數一日且以三百貫為率一月凡九千貫一年凡收十萬餘貫其所造酒米麥之屬既竝取於倉庫羡餘而所收息錢大半不曾收附公使庫錢厯竝是入已一自到任以來緣公庫賣酒錢額既高督責兵官尉司逐日捕捉私造酒麴及糶糯米糯穀者所犯之家與四鄰盡是籍没貲產以充自立賞錢格所犯止於升合亦不能免兩年中破壊二千餘家其間久繫囹圄染疫而死者甚多所犯甚輕竝出私意文致其罪至於徒配如兵士盧宗之類闔郡軍民寃恨無一日安迹一公庫所入舊例竝支見任官員逐月供給及宴會之屬自兩年來却以糴本庫錢撥入軍資庫軍資庫撥入公使庫以支供給公庫之錢既富乃巧作名色以饋送為名多至五百貫少至數十貫專委公庫手分馬澄支行及書表司楊楠偽作書劄送與官員封角了當却供入宅堂又其間婺州親戚如妻之親兄何知縣何敎授其子之妻父曹宣敎其表弟高宣敎者甚多止宿郡齋爭受關節以此頻作宴會無不預坐留連數月臨行饋送各以數百千及去年十一月次子取婦凡供帳幙帟染破紫綾羅絹凡數百匹從人衣衫數百領樂妓衣服並是什物庫陸侃支公使庫錢往仲友私家婺州所開綵帛舖高價買到暗花羅并𤓰子春羅三四百匹及紅花數百斤本州收買紫草千百斤日逐拘繫染戸在宅堂及公庫變染紅紫其妓弟四十餘人都行首嚴蘃分眞紅暗花羅餘行首分瓜子羅其餘分春羅毎人分俵眞紅大袖帔子背子紅裙衫叚幃子各一副一州驚駭自來未嘗有知州為妓弟製造衣服名件不一違法如此盡是父子踰濫以此取媚其餘所染到眞紅紫物帛並發歸婺州本家綵帛舖貨賣其子親會宴集經月姻族内外一文以上皆取辦於公庫其妓弟今夏又分紗帛衣名件並如前一仲友專委司戸趙善德兼管公庫前後妄自支使並無合破名色條例善德將滿遂宻獻計以收買米麴物料為名於今年二月上旬一日之間支錢二萬貫皆是入已並無他處簿書收附證照一司戸趙善德兼管糴本庫今年二月上旬忽支落十餘萬貫以轉運司差官㸃檢且欲移寄他庫為名此項錢後來即不見起發亦不見拘收並無下落一仲友專委人吏鄭榛陳忠充財賦司凡官賦所入其間有不該係省及諸庫收附者盡是别作名色支破差人往外州買銀子及收到來即不知將作何用及就本州置買銀塲逐日監繫舖戸稍違限期無不重斷多是以所賣公庫生酒錢支買不曾附厯先是司戸趙善德及二胥吏同謀作弊逐時於公庫以犒賞為名支錢遺賂善徳一歲至二三千緡其妄用錢物甚於泥沙不可明說其兩吏所支亦數百貫一仲友少曾坐㕔受領詞狀間有判下人戸論訴皆係應褒林木接受忽自宅堂傳出盡是子弟同坐啇議判詞其父子或自相爭執弟妓早晚出入宅堂公然請囑每事皆有定價多至數千緡又縱獄吏百端乞覔民間寃苦不可勝言一仲友自到任來本性喜引致姦私公事或告首事不干已或幃箔曖昩不明或僧道與人有寃並行受領皆欲窮究根底並不憑信獄官推司所勘自引歸花園中亭舘及宅堂後宴坐去處親自鞫問語言穢媟吏卒羞聞當面露示其合該刑名至重之意其弟妓與心腹人吏住持鄉僧等内外相通同共請托取受貨賂不可勝計並是子弟專決其所諾不副者雖已釋去復行追繫增其刑名所需既滿者刑名雖重結案之後平白不斷如僧景猷犯姦事道士祝元善亦預景猷富厚責賂甚重不能應其所需則籍没其衣鉢莊產之屬祝元善因栖霞知宫姓李者以彈琴出入宅堂首以厚賂徑逹未斷間先令放出竟不斷罪李承節之妻為應楊所犯乃外甥犯從舅母或佃者犯主母干連十餘人臨斷時得二千緡平白不斷富室黄士龍黄日新更易其妻穢不可言並自引上親勘既受其物至今不斷凡此等事皆顯然人所共知者一兩獄直日收禁罪囚羅織枝蔓不容獄官依法裁處須令逐日過㕔取禀己意以為輕重高下每事多是曲法枉㫁緣此拘繫既多致死百餘人全不顧恤一仲友在鄉開張魚鮝舗去年有客人販到鮝鮭一船凡數百篰更不容本州人戸貨買並自低價販般歸本家出賣並差本州兵級般運其他海味悉皆稱是至今逐時販運不絶一仲友自到任以來關集刋字工匠在小㕔側雕小字賦集每集二千道刋板既成般運歸本家書坊貨賣其第一次所刋賦板印賣將漫今又關集工匠又刋一番凡材料口食紙墨之類並是支破官錢又乘勢雕造花板印染斑襭之屬凡數十片發歸本家綵帛舗充染帛用一仲友因修造兵器前後發買牛羊皮穿甲及生絲打弓弩弦支破不可勝計其牛羊皮買來甚少錢亦不歸所買生絲除量支作工弩弦用外並發歸本家綵帛舗機織貨賣一仲友又因修造兵器自造精細鐵甲數副及弓弩刀鎗各十數件收入宅堂不知將作何用一本州新報恩寺元有住持僧誣以他罪逐去却請鄉僧介登來此住持早晚出入宅堂傳度關節凡五縣僧寺易換住持幾遍盡是介登保明乞差通同接受貨賣每處必數百緡其中皆是婺州富僧近又有應世榮者亦作士戸狀陳乞即時給帖其無忌憚容小人紊亂郡政一至於此一仲友自到任以來違法招刺廂兵每一名必立定價外寨兵士一百貫在城兵士止三五十貫下至學院子修合醫人刋碑刋版工匠弟妓厨子各得干預請求去年七月間有外寨兵士經州下狀告論兵士周榮託仙居縣丞楊浩齎錢一千貫囑本官㕔子轉求刺軍十名事雖送有司緣錢入已竟不追究有案狀可騐若刷具仲友自到任以來刺過廂兵人數可照所受錢數一本州販香牙人應世榮姦猾小人因其家資稍厚左右引置以曾與仲友建立生祠乃延為上客與之頌賛親自題寫世榮乃刻石誇張因此妄作聲勢出入宅堂仲友專一信委為心腹牙爪凡首姦獲酒盡是世榮發之仲友却令臨海縣丞將帯兵卒數十人追捕每一如此闔郡搔擾驚走其他挑起事端及報其私寃羅織平人寘於重憲不可勝數所㫁輕重並出世榮已意全無州郡雖士大夫善人之家亦被凌衊郡人指為殃禍其人取受前後不可計數每事所得必與其子弟分受若非送有司勘其情犯編配逺惡去處何以贖䧟害鄉土善良無窮之罪一臨海縣丞曹格係仲友長子妻黨其人㐫暴貪婪全無忌憚自仲友到任倚恃至親之故妄作聲勢凌侮同官捶撻胥吏凡士大夫不問見任寄居無不遭其譛訴以其妻出入郡齋日有醜惡之聲傳播一郡公然不時出入宅堂或入其子舎傳度關節百端取受并仲友長子之妻父曹宣敎者即曹格之堂兄往來曹格之家通同干預公事全無顧藉仲友弟婦兒女婦姪不時往曹格之家飲燕媟狎無禮靡所不至全無亷恥其曹格日來縱横尤甚每年受納官物皆干求差預百端阻抑人戸所納之物絹必挼拶令破綿子曬或經月米麥必十來日宿倉又多取合耗人之寃苦無所告訴似此姦猾小吏輙敢憑藉聲勢苦虐士民可不明正典刑一仲友有三子長曰士俊次曰士特士濟及其甥姪數人隨侍來此自到任見客則立於屏側引問公事則環於坐隅或與胥吏混立紛然干預有簽押決遣各出己意不容其父下筆多因賄賂先入其父不止明知有公受其欺者是非曲直一切反戾其父子各據弟妓三子多出入王静沈玉張嬋朱妙沈芳之家盤合簡貼絡繹道路本州士民有得其子所與弟妓書簡受關節者亦曾連粘投狀訴于提刑行司一仲友自到任以來寵愛弟妓遂與諸子更相踰濫行首嚴蘃稍以色稱仲友與之媟狎雖在公筵全無頋忌公然與之落籍令表弟高宣教以公庫轎乘錢物津發歸婺州别宅嚴蘃臨行時係是仲友祖母私忌乃假却在宅堂令公庫安排筵㑹餞送嚴蘂近來又與沈芳王静沈玉張嬋朱妙等更互留宿宅堂供直仲友洗浴引斷公事多是沈芳先入私約商議既定沈芳親抱仲友㓜女出㕔事勸解仲友偽作依從形狀即時寛放如應揚犯姦等事並是臨時裝㸃此等情態本州亢旱啓建祈雨道塲安撫司文牒傳奉聖㫖令精意祈求非不嚴切仲友却追拘收外縣弟子十餘人及散樂二三十人逐日出入宅堂以下碁彈琴為名公然於道塲前往來一日寄居士民在儀門下修設水陸道塲其長子士俊自臨海縣丞曹格家醉歸帯挾弟妓數人於本處觀視嬉笑歌唱無所不至士庻嘆恨皆云太守如此兒子又如此如何㑹有雨澤感應又因㫁屠日仲友却令公厨供造法煑雞鵞蹄肚食物入宅堂其長子士俊又以盤合乘貯生料猪羊水雞之類送與行首王静人皆驚駭緣此百姓忿怒因士俊閧游無節公然捶打於弟妓家更不敢根究一仲友有婺州隣近人周四㑹放烟火其妻㑹下碁仲友招喚來此遇作州會以呈藝為由每次支破公庫錢酒計十餘貫前後支過錢約數百貫妻常出入宅堂下碁仲友却委放烟火人探聽外事如犯姦首酒等事亦是此人在外邀來稍不如意即時挑發其間又有在婺州喚到刋字碑塑佛工匠十餘人壁截郡治堂屋安歇支破公庫錢物供贍專是在外探刺生事一仲友造置浮橋破費支萬餘貫官錢搔擾五縣百姓數月方就初以濟人往來為名及橋成了却專置一司以收力勝為名攔截過往舟船滿三日一次放過百端阻節捜檢生出公事不可勝計此項若不早與奏聞行下廢罷却是本州添一稅塲遺害無窮向去復有掊刻之人因而增添收稅課額若一兩政循襲必不肯廢此大係利害橋成未及一年已收過力勝錢二千五百餘貫見有簿厯可照一仲友貪墨無恥素乏亷稱到官之初適見公使庫有前政積下官錢十餘萬貫竟遂有席卷之意乃擇姦猾使臣姚舜卿為監官并與公庫手分馬澄日夕握手宻謀將公庫諸色官錢巧作名色支破變轉官㑹並用竹籠盛貯入宅輙先令其子節次作文字行李擔押歸前後幾數萬緡皆有實跡及染造眞紫色帛等物動至數千匹皆用官錢託以人事為名逐旋發歸以為貨賣之資其他不急之物往往稱是乞追姚舜卿馬澄並帳設庫專知陸侃送清強官司勘鞫便見著實今來既得改除歸鄉行李亦數百擔他可知矣有雕匠姓蔣人因造假㑹事發永康縣差人宻來擒捕仲友輙令兵卒刼取反將承差人送獄絣打永康縣無如之何徑申提刑司牒本州發遣仲友輙作本人身死備申至今尚在本州其不遵法度皆此類也右具通判及士民所述仲友罪狀謹件如前謹錄奏聞伏候勅㫖晦菴集卷十八欽定四庫全書晦菴集卷十九宋朱子撰
