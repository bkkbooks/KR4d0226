body:
  text: 書知舊門人問答答張仁叔毅居敬行簡程子意與仲弓不同當以仲弓之言為正不改其樂近覺集注克已復禮之目說得未盡已改作博文約禮之序矣更思之所說不改其樂學者不能躐進唯子貢之無諂可為此語有病可并思之孟之反一段所說支離非聖人本意約之以禮禮字便作理字看不得正是持守有節文處克已復禮之禮亦然醫書不仁之說所論得之但亦須實見此理不可只如此說過也用之則行則字之意恐不如此富不可求此章之意但方言其不可求耳未遽及夫求之而得禍也兩意雖畧相似而大不同可更審之君子所貴乎道者三若如此説則道與物為二矣况其文義本不如此集註説得甚明可更詳之霍光臨大節亦有大虧欠處耐久行逺之説得之但不知如何見得仁以為已任之重仁是何物又如何其任也可更思之一易再易之説問之果然或恐中原地美其瘠土亦勝此間之膏腴也什一之法傳於今者大略如此其詳則不可得而知矣以孟子考之野九一而助國中什一使自賦其輕重又不同而考之周禮則行助法處有公田而行貢法處無公田也孟子集注中似已言其大略可更詳之此等亦難卒曉須以周禮為本而參取孟子班固何休諸説訂之庶幾可見髣髴然恐終亦不能有定論也但不可不盡其異同耳粟一石值錢三十文一嵗而止用錢三百可見古來錢重然其賣買皆然則人亦不以為病也其他葢不可考云李悝百畆而收百五十石者粟也鼂錯百畆而收不過百石者似恐是米然則其多少固自有不同耳所論律吕恐看得未子細須作一圖子分定十二律之位却於中間空處别用紙作一小輪子寫五聲之位當心用紙條穿定令可輪轉却依通典十二律之均逐一認定分别正聲子聲則自見得次序分明不可只如此空説也葢正聲是全律之聲如黄鐘九寸是也子聲是半律之聲如黄鐘四寸半是也一均之内以宫聲為主其律當最長其商角徴羽之律若短即用正聲或有長者則只可折半用子聲此所謂一均五聲而分正聲子聲之法也十二律既自有正聲又皆有子聲以待十二均之用所謂黄鐘大吕太蔟無子聲以其一均之内商角徴羽四聲皆短於本律故也若以中吕為宫則黄鐘為徴而當用子聲矣若以蕤賔為宫則大吕為徴而當用子聲矣若以林鐘為宫則太蔟為徴而當用子聲矣此十二律所以皆有子聲也試更用此推之當自曉得不然即須面論乃可通也所論三月不違仁人之生也直先難後獲齊魯之變中庸之德博施濟衆黙而識之德之不修志於道四教仁逺等章説皆得之然亦更宜詳味答楊仲思來喻仁説似亦未瑩如云仁以行之則心無不一此語甚有病又云無思無慮之時每加提省此亦非是所謂敬者只是要専一耳初不偏在静處也又聞尊丈逺出不知是往何許尊年獨旅恐非所宜為子弟者當有以代其勞也漳州陳安卿書來甚長進不易得也答楊仲思所論仁字大意得之更宜子細就此玩味庶幾漸次簡潔分明仍就實處加功勿令間斷乃實為已物耳不然辨析雖精無益於得也答楊仲思前書所問數條皆大義也但字義同異之間分别未明故難遽曉今但看横渠形而後有氣質之性善反之則天地之性存焉一段將此兩箇性字分别自生之謂性以下凡説性字者孰是天地之性孰是氣質之性則其理自明矣公仁之説亦是如此公則無情仁則有愛公字屬理仁字屬人克已復禮不容一毫之私豈非公乎親親仁民而無一物之不愛豈非仁乎以此推之意亦可見答楊仲思所示疑義若據易文即艮其背即是止其所之義而伊川説作兩般恐非經之本指然其言止欲於無見乃非禮勿視勿聴之義於學者亦不為無用更思之答謝成之熹病老益衰今年尤甚亦理之常無足怪者况身外之悠悠又可復置胸中耶所恨聞道既晚而行之不力上無以悟主聴下無以變時習而使斯文蒙其黮闇是則不能無愧於古人耳所示二典説大槩近似目昏尚未及細看此中今年絶無來學者只邵武一朋友見編書説未備近又遭喪俟其稍定當招來講究亦放詩傳作一書彼編所看後編得接續寄來尤幸恐當有所助耳但三山林少穎説亦多可取乃不見編入何耶李氏説為誰其論放勛字義與林説正相似又以欽哉為戒飭二女之詞則正與鄙意合也葢女于時觀厥刑于二女皆堯語其下云釐降二女于媯汭嬪于虞乃是史記其下嫁二女於媯水而為婦於虞氏於是堯戒以欽哉正如所謂必敬必戒者乃叙事之體也自孔傳便以女於時以下為史官所記故失其指耳諸詩亦佳但此等亦是枉費功夫不切自已底事若論為學治已治人有多少事至如天文地理禮樂制度軍旅刑法皆是著實有用之事業無非自己本分内事古人六藝之教所以游其心者正在於此其與玩意於空言以校工拙於篇牘之間者其損益相萬萬矣若但以詩言之則淵明所以為髙正在其超然自得不費安排處東坡乃欲篇篇句句依韻而和之雖其髙才合揍得著似不費力然已失其自然之趣矣况今又出其後正使能因難而見竒亦豈所以言詩也哉東坡亦自曉此觀其所作黄子思詩序論李杜處便自可見但為才氣所使又頗要驚俗眼所以不免為此俗下之計耳答黄道夫天地之間有理有氣理也者形而上之道也生物之本也氣也者形而下之器也生物之具也是以人物之生必稟此理然後有性必稟此氣然後有形其性其形雖不外乎一身然其道器之間分際甚明不可亂也若劉康公所謂天地之中所謂命者理也非氣也所謂人受以生所謂動作威儀之則者性也非形也今不審此而以魂魄鬼神解之則是指氣為理而索性於形矣豈不誤哉所引禮運之言本亦自有分别其曰天地之徳者理也其曰隂陽之交鬼神之㑹者氣也今乃一之亦不審之誤也詩曰天生烝民有物有則周子曰無極之真二五之精妙合而凝所謂真者理也所謂精者氣也所謂則者性也所謂物者形也上下千有餘年之間言者非一人記者非一筆而其説之同如合符契非能牽聮配合而强使之齊也此義理之原學者不可不察答黄道夫示喻性氣之説甚善但則者人之所以循乎天循字恐未安葢則之一字方是人之所受乎天者至於所謂養之以福乃所謂循乎天耳西銘天地之塞似亦著擴充字未得但謂充滿乎天地之間莫非氣而吾所得以為形骸者皆此氣耳天地之帥則天地之心而理在其間也五行謂水火木金土耳各一其性則為仁義禮智信之理而五行各專其一人則兼備此性而無不善及其感動則中節者為善不中節者為不善也答李子能亢宗累承喻及為學之意甚善甚善但如此用力頭緒太多令人紛擾無進步處故程先生説涵養須是敬進學則在致知若只於此用力自然此心常存衆理自著日用應接各有條理矣近思録前三四卷專説此事近修定大學解亦説得此次第分明近思必已有之大學今往一本可細考之依此節次做一兩年功夫自當見得門路立得根本也陳後之持守見識皆不易得不知今年曾得來城中否與之講貫當有深益劉叔文守得亦好但未知後來所見如何耳為學十分要自己著力然亦不可不資朋友之助要在審取之耳朱飛卿逺來見此相聚但亦苦多病未嘗不相與談及子能也答陳廉夫示喻縷縷足認雅意但為學功夫不在日用之外檢身則動静語黙居家則事親事長窮理則讀書講義大抵只要分别一箇是非而去彼取此耳無他𤣥妙之可言也論其至近至易則即今便可用力論其至急至切則即今便當用力莫更遲疑且隨深淺用一日之力便有一日之效到有疑處方好尋人商量則其長進通達不可量矣若即今全不下手必待他日逺求師友然後用力則目下蹉過却合做底親切功夫虚度了難得底少壯時節正使他日得聖賢而師之亦無積累憑藉之資可受鉗錘未能真有益也答陳叔向葵去嵗南遊幸遂既見之願别後忽忽踰年欲致一書未暇而使至竟辱先施感愧不可言示喻學者不能身踐而騖於空言此誠今世莫大之患然亦不善讀書者之咎耳夫書之設豈徒然哉大抵聖賢之教無一言一句不是入德門戸如所謂禮樂不可斯須去身者尤為深切直當佩服存省以終其身不但後學也但道體無盡人見易偏内外本末又不可不兼舉此亦所當知耳答舒提幹示喻兩條深荷發藥偶奉祠已得請姑為辟色辟言之計蕃固之禍恐亦正坐不能知難而退耳所刻二書竊意賢者於鄭注吕説之云猶有未深考者願少加詳焉而摭其義理之不合者復以見教則幸甚幸甚答顔子壽鑄昨辱枉顧并示長書具悉雅意但君子行身自有法義固不求於茍異亦不期於必同至於行道濟時用舍行藏又有非人力所能必致者聖賢之教厯厯可考如賢者之所論是乃謀利計功之意非熹之所敢聞也大率近世此説甚熾人心不正而習俗不美正坐此耳願更思之毋為卒陷溺也答邊汝實所欲言者不過前夕然亦非謂全然不事其心但資次等級未應遽爾超躐須物格知至然後意可誠心可正耳答李次張承留意七篇之指想深有所契義利之際固當深明而力辨然伊洛發明未接物時主敬為善一段功夫更須精進乃佳不爾幾無所据以審夫義利之分也試以此質之南軒當亦以為然耳答方平叔銓伏承逺貽書劄禮意甚勤而所以教誨責望之者甚至熹愚不肖懼不足以當也顧獨惟念自省事來聞師友之訓讀聖人之書觀其教人不過講學修身以全其所受於天者出為世用則隨其大小推吾之所有以及人至於用與不用合與不合則直任之葢未嘗以是必於人亦未嘗以是變於已以此自信誓將終身由之而不自知其力之果足以有至焉否也今讀來教其觀於當世之變詳矣然諰諰然常有憂其不合而必於求合之意其責君子也已詳其狥小人也已甚是雖憂世之心甚深而古之聖賢非不憂世者其規模氣象似或不如此也孟子曰人病舍其田而耘人之田所求於人者重而所以自任也輕其論狂狷鄉原之得失以及君子反經之意尤所謂深切而著明者孔子亦曰古之學者為已今之學者為人有志之士深省乎此亦足以判然無疑於舜蹠之間矣不審明者以為如何答王欽之承喻編次程書以類相從此亦用功之一端若求之於此而驗之於日用思慮作為之間玩索操存無所偏廢則窮理居敬之功交相為助而兩造其極矣玩物喪志之戒乃為求多聞而不切已者發遺書又有不可外面只務泛觀物理正如游騎無所歸之説亦為此耳至於義理雖明而踐履不至者則亦多端或是知之未深或是行之不力或是氣質之偏有難化處在彼誠為累德然在我觀之但當内自警省不使加乎其身而不可以此遽起輕視前輩之心且疑講學之無益也因下問之及輒效其愚未知中否有未當者却望垂喻答王欽之所須問目竊謂不必如此但取一書從頭逐段子細理㑹久之必自有疑有得若平時泛泛都不著實循序讀書未説義理不精且是心緒支離無箇主宰處與義理自不相親又無積累功夫參互考證驟然理㑹一件兩件若是小小題目則不足留心擇其大者又有躐等之弊終無浹洽之功非區區所以望於尊兄者故不敢承命凂聞但願頗采前説而以論語為先一日只看一二段莫問精粗難易但只從頭看將去讀而未曉則思思而未曉則讀反復玩味久之必自有得矣近年與朋友商量亦多以此告之然未見有看得徹尾者人情喜新厭常乃如此甚可歎論語二十篇尚不耐煩看得了况所謂死而後已者又豈能辦如此長逺功夫耶答王欽之來書謂窮理不必泥古人言句固是也然亦豈可盡捨古人言句哉程夫子曰窮理亦多端或讀書講明道理或論古今人物别其是非或應事接物求其當否皆窮理也夫講道眀理别是非而察之於應接事物之際以克去已私求夫天理循循而進無迫切陵節之弊則亦何患夫與古人背馳也若欲盡捨去古人言句道理之不明是非之不别泛然無所决擇雖欲惟出處語黙之察譬之適越者不知東西南北之殊而僕僕然奔走於途其不北入燕則東入齊西入秦耳答胡平一元衡白鹿聞極留念甚善甚善所謂時文之外别無可相啟發者語似過謙此亦在夫為之而已豈真有限隔而不容一窺其門戸哉所喻三代正朔之説舊嘗疑此而深究之卒至於不可稽考而益重其所疑因置不論今讀來喻考究雖詳然反復再三亦未有以釋所疑也如云周家記年必首十一月而春秋乃書春正月又云未嘗改月號以冬為春假夏月而亂周典則未知春秋所謂春正月者其下所書之事為建子月之事耶建寅月之事耶若云建子月事則春正月者豈非改月號而以冬為春若云建寅月事則是用夏正月而亂周典矣安得云未嘗云云如是耶前人葢已見此不通故為胡氏之學者為之説曰春正月者夫子意在行夏之時而以建寅之月為嵗首也其下所書之事即建子月之事無其位而不敢自專也如此則或可以不礙然春秋所書之月遂與月下之事常差兩月則恐聖人作經又不若是之紛更多事也凡此之類反復推説儘有可通亦儘有可難雖嘗遍問前輩亦未有决然堅定不可移之説竊謂讀書凡若此類與其求必通而陷於鑿且又虚費目力而無補於日用切已之功則似不若闕之之為愈也若夫所謂日用切已之功則聖賢言之詳矣其在大學論語中庸孟子者文義分明指意平實讀之曉然如見父兄説門内事無片言半詞之可疑者什八九也曷為不少置其心於此而必用意於彼之﨑嶇哉因書附報偶及於此幸明者有以察之也答楊志仁璹示喻不省所謂然不知賢者之所為學者欲得之於已耶欲見稱於人耶觀此用心灼見差誤請便就此推究來厯痛與掃除乃為格物之實耳不然此心外馳不著自已徒然誦説恐無所益也答楊志仁兩書所喻存養工夫甚喜甚慰固知他人不能如此著實用功但此亦是闕依本分事正不須把來作竒特想只合趂此心地明净處大著胸懐將世間道理精粗表裏從頭至尾理㑹一畨交他真箇通透無疑礙處方是向進若只守此些箇不敢放開每看義理亦只揀取𤣥妙髙逺無形無象處方肯理㑹如此則遂成偏枯倒向一邊將為有體無用之學而與老佛無以異矣所論理氣先後等説正坐如此怕説有氣方具此理恐成氣先於理何故却都不看有此理後方有此氣既有此氣然後此理有安頓處大而天地細而螻蟻其生皆是如此又何慮天地之生無所付受耶要之理之一字不可以有無論未有天地之時便已如此了也張子説得費力惟是太極通書數章説得極分明熹解得又極分明可更子細看便自見得也浩然之氣若據孟子所言即合儘就粗處看不須如明道先生之説若欲理㑹明道先生説底則亦只合就日用間已身上回頭識取不須如此説作費力也日月至焉若説顔子即誠不可如此説今既明言回也其心三月不違其餘則但能如此則其工夫疏宻久近較然可見何為而復有此疑耶且曰非本文之義則未知以本文之義為當如何耶至德之論又更難言論語中只有兩處一為文王而發則是對武王誓師而言一為泰伯而發則是對太王翦商而言若論其志則文王固髙於武王而泰伯所處又髙於文王若論其事則泰伯王季文王武王皆處聖人之不得已而泰伯為獨全其心表裏無憾也不然則又何以有武未盡善之嘆且以夷齊為得仁耶前此諸儒説到此處皆為愛惜人情宛轉回䕶不敢窮究到底所以更不敢大開口説令人胸次憒憒自欺自誑此病不小想賢者尤當疑駭未敢以為然也然當更思之若信未及即且放下向後時時捉起畧一審玩便自見得也通老聞欲見訪顒俟其來不及作書因見煩為致意然又恨志仁有書社之守不能偕來為不滿耳答徐子融所論浩氣甚善甚善大率子融志氣剛决故所見亦如此痛快直截無支離纒繞之弊更願益加詳審專就平實親切處推究體認久當有以自信不為髙談虚見所移奪也見正叔説向得曾參多一唯之句深有契合此正是大病今只此一唯尚且理㑹不得如何欲更向他頭上過去也答徐子融子融志趣操守非他人所及但苦從初心不向裏故雖稠人廣坐閉眉合眼而實有矜能異衆之心非不讀書講義而未嘗潛心黙究剖析精㣲但據一時所見粗淺意思便立議論説來説去都無意味枉費筆舌如向來所論雞抱卵事才卿便取僧言以為至當而不究彼之所事與吾不同之實固為疎畧而子融力攻其失乃不於此著眼而支離蔓衍但言雞不合抱卵而不知檢㸃其所抱之非卵凡皆類此全不子細只向外走自已分上了無所得故中間數為賢者言之所謂向外非謂子融不能閉眉合眼也想子融自恃有此便謂已能向裏而人不知故心不服而有北門之辨至於詞氣俱厲殊駭觀聽然味其言如所謂無鬼神無釋氏者皆無義理夫鬼神二字著於六經而釋氏之説見行於世學者當講究識其真妄若不識得縱使絶口不談豈能使之無邪子融議論粗率不精大率類此若是果能向裏思量分别詳細豈至此耶今詳來書所謂觀書究義反身順理攻其惡毋攻人之惡者依舊是錯認話頭若只似日前做功夫即所究之義所順之理所攻之惡皆恐未真實也且講論是非正為自家欲明此理不是攻人之惡若理㑹得是於自家分上儘有得力處若看錯了即終日閉口不别是非剗地不是矣此葢日前窮理未精便自主張得重又為不勝已者妄相尊奬致得自處太髙將義理都低看淺看了今若覺悟須且虚心退後審細辨認令自己胸中了然不惑庶幾有進步處耳答徐子融有性無性之説殊不可曉當時方叔於此本自不曾理㑹率然躐等揀難底問熹若照管得到則於此自合不答且只教他子細熟讀聖賢明白平易切實之言就已分上依次第做功夫方有益於彼而我亦不為失言却不合隨其所問率然答之致渠一向如此狂妄此熹之罪也駟不及舌雖悔莫追然既有此話頭乂不容不結末今試更為諸君言之若猶未以為然則亦可以忘言矣伊川先生言性即理也此一句自古無人敢如此道心則知覺之在人而具此理者也横渠先生又言由太虚有天之名由氣化有道之名合虚與氣有性之名合性與知覺有心之名其名義亦甚宻皆不易之至論也葢天之生物其理固無差别但人物所禀形氣不同故其心有明暗之殊而性有全不全之異耳若所謂仁則是性中四德之首非在性外别為一物而與性並行也然惟人心至靈故能全此四德而發為四端物則氣偏駁而心昏蔽固有所不能全矣然其父子之相親君臣之相統間亦有僅存而不昧者然欲其克已復禮以為仁善善惡惡以為義則有所不能矣然不可謂無是性也若生物之無知覺者則又其形氣偏中之偏者故理之在是物者亦隨其形氣而自為一物之理雖若不復可論仁義禮智之彷彿然亦不可謂無是性也此理甚明無難曉者自是方叔暗昧膠固不足深責不謂子融亦不曉也至引釋氏識神之説則又無干涉葢釋氏以虚空寂滅為宗故以識神為生死根本若吾儒之論則識神乃是心之妙用如何無得但以此言性則無交涉耳又謂枯槁之物只有氣質之性而無本然之性此語尤可笑若果如此則是物只有一性而人却有兩性矣此語非常醜差葢由不知氣質之性只是此性墮在氣質之中故隨氣質而自為一性正周子所謂各一其性者向使元無本然之性則此氣質之性又從何處得來耶况亦非獨周程張子之言為然如孔子言成之者性又言各正性命何嘗分别某物是有性底某物是無性底孟子言山之性水之性山水何嘗有知覺耶若於此看得通透即知天下無無性之物除是無物方無此性若有此物即如來喻木燒為灰人隂為土亦有此灰土之氣既有灰土之氣即有灰土之性安得謂枯槁無性也又如挾其性而遺之以下種種怪説尤為可笑今亦不暇細辯但請虚心静慮詳味此説當自見得如看未透即且放下就平易明白切實處玩索涵養使心地虚明久之須自見得不須如此信口信意馳騁空言無益於已而徒取易言之罪也如不謂然則請子融方叔自立此論以為宗㫖熹亦安能必二公之見從耶至於易之説又别是一事今於自己分上見成易曉底物尚且理㑹不得何暇及此當俟異日心虚氣平萬理融徹看得世間文字言語無不通達始可細細商量耳此等若理㑹不得亦未妨事且闕所疑而徐思之不當便如此咆哮無禮也答徐子融熹今年一病幾至不可支吾午節後方能强起比前一二年幾似争十年氣血矣老境如此無足怪者亦有朋友十數人在此相聚絶少得穎悟懇切者前日病中猛省亦不可全責學者深自恐懼今幸稍蘇更當益加策勵庶幾不負所以來之意但恨相去差逺不得子融為之表率使相觀而善耳前書所論方叔之説大槩已是但其末云性有昏明則又將性作知覺看矣試更思之如何答宋深之之源熹往者入城幸一再見雖人事怱怱未得款語然已足以自慰矣别後不得奉問積有馳情兹辱惠書獲聞比日侍奉佳慶進學有日新之功尤以忻沃經史諸説足見玩理修辭之意可為後生讀書之法屬以病目方讀得一二篇其詞氣深博而義理通暢甚可喜也異時益求勝已之友相與講明古人為已之學而力行之則其所進當有不止於此者矣三聖相授允執厥中與孟子所論子莫執中者文同而意異葢精一於道心之微則無適而非中者其曰允執則非徒然而執之矣子莫之為執中則其為我不敢為楊朱之深兼愛不敢為墨翟之過而於二者之間執其一節以為中耳故由三聖以為中則其中活由子莫以為中則其中死中之活者不待權而無不中中之死者則非學乎聖人之學不能有以權之而常適於中也權者權衡之權言其可以稱物之輕重而游移前郤以適於平葢所以節量仁義之輕重而時措之非如近世所謂將以濟乎仁義之窮者也至於孔孟言性之異則其説又長未易以片言質然略而論之則夫子雜乎氣質而言之孟子乃專言其性之理也雜乎氣質而言之故不曰同而曰近葢以為不能無善惡之殊但未至如其所習之逺耳以理而言則上帝之降衷人心之秉􅂜初豈有二理哉但此理在人有難以指言者故孟子之告公都子但以其才與情者明之譬如欲觀水之必清而其源不可到則亦觀諸流之未逺者而源之必清可知矣此二義皆聖賢所罕言者而近世大儒如河南程先生横渠張先生嘗發明之其説甚詳具在方冊者今倉司所印遺書即程氏説而張氏之書則蜀中自有版本不知亦嘗考之否熹自十四五時得兩家之書讀之至今四十餘年但覺其義之深指之逺而近世紛紛所謂文章議論者殆不足復過眼信乎孟氏以來一人而已然非用力之深者亦無以信其必然也舊嘗擇其言之近者别為一書名近思録今往一通了翁責沈墨刻亦可見前輩師友源流併以奉寄幸細讀之有疑復見告也令弟叔季詩易之説亦甚詳明區區所望葢不殊前之云也答宋深之且附去大學中庸本大小學序兩篇幸視至大學當在中庸之前熹向在浙東刻本見為一編恐勾倉尚在彼可就求之此三本者昆仲且分讀也近年學者多不讀書見昆仲篤志如此甚不易得所恨相聚之晚不得盡吐腹心前日臨岐不勝忡悵然講學貴於實見義理要在熟讀精思潛心玩味不可貪多務得搜獵敷衍便為究竟也二序待次畧為呈白恐有指摘處便中幸喻及也答宋深之大學是聖門最初用功處格物又是大學最初用功處試考其説就日用間如此作功夫久之意思自别見得世間一切利欲好樂皆不足以動心便是小小見效處也荀楊言性得失忘記前語首尾云何然此等處若於自己分上見得分明則亦不待人言自然見得矣但恐讀書之時無為已之意只欲以資口耳作文字即意思浮淺看他義理不出也答宋深之示喻知止之説足見留意然所謂止乃萬物各有定理之謂要在格物窮理乃可知之知之不疑然後此心有定而可以應物非强遏而力制之也格物功夫前書已再録去然亦未盡旦夕當再寫一本去也前本千萬且勿示人看令有疑處乃有進處耳科舉事業初無髙論賢者俯就葢有餘力既知有命之説則日用之間内外本末不須作兩截看必先了此然後及彼也戴監廟久聞其名講學從容必有至論季隨允升相聚各有何説因來一一録示庶知彼中進學次第也答宋深之示喻大學所疑已悉格物無傳為有闕文章句已詳言之卒章是推治國之道以平天下文意甚明亦已詳説不知何故尚以為疑豈讀之未熟耶更宜玩味不厭煩復則自分明矣格物致知是大學第一義修已治人之道無不從此而出終身要得受用豈是細事來喻乃欲不勞而俟其自格一何言之易耶近世學者氣輕質薄不耐持久每以欲速之心懐徼幸躐等之望又有科舉世俗之學以奪其志所以常若有所驅脅迫逐而不暇從容以及乎有成也答宋深之所喻大學以格物為先此得之矣但以致知為致其所以格物而謂格物為及人及物之事則似於文義殊未詳也向來寫去大學説其間固未盡善近已復多改更然其所載程先生説此二處文理極分明又并功夫節次一時俱盡不知何故看得如此草率竊意此病從平日科舉之學壊了心術致得如此適答子容書已極言之矣孔子曰古之學者為已今之學者為人程先生曰為已者欲得之於已也為人者欲見知於人也又曰女為君子儒無為小人儒程先生曰君子儒為已小人儒為人此是古今學者君子小人之分差之毫釐繆以千里處切宜審之答宋深之示喻為學之意益以精專而兄弟相勉見於詩什深慰老懐又知更有蘇范諸賢相與切磋尤以為喜所問持養觀書之説前此講之已詳約而言之持養之方不過敬之一字而讀書則世間無一事是不合知者但要循序量力而進耳五峯之書知言為精然其間亦不能無小小可議處其他往往又不能及故向來敬夫不欲甚廣其傳今想廣仲之意恐亦有所難言者非靳惜也南軒文此間鏤版有兩本其一熹為序者差不雜黄州亦有官本篇秩尤多然多是少作可恨也此間本無見存者不及寄去後得之當别附便耳然讀書要須辨得精粗得失乃於已分有益若但泛然看過即枉費功力矣韓子於道見其大體規模極分明但未能究其所從來而體察操履處皆不細宻其排佛老亦據其所見而言之耳程先生説西銘乃原道宗祖此言可以推其淺深也近似之説固應辨析以曉未悟然須自見得已分上道理極分明然後可以任此責如其未然而欲以口舌校勝負恐徒起紛競之端而卒無益於道術之明暗也孟子論鄉原亂德之害而卒以君子反經為説此所謂上策莫如自治者况異端邪説日增月益其出無窮近年尤甚葢有不可勝排者惟吾學既明則彼自滅熄耳此學者所當勉而不可以外求者也澤之容之不及别狀意不殊前相望數千里㑹見無期惟千萬力學自愛答宋容之之汪所喻讀書未能有疑此初學之通患葢縁平日讀書只為科舉之計貪多務得不暇子細慣得意思長時忙迫凡看文字不問精粗一例只作如此涉獵如東坡易解乾卦中説性命繫辭中説道處數章及潁濵解孟子浩然之氣處皆是此類無一字成言語今當深以此事為戒洗滌浄盡别立規模將合看文字擇其尤精而最急者且看一書一日隨力且看一兩段俟一段已曉方換一段一書皆畢方換一書先要虚心平氣熟讀精思令一字一句皆有下落諸家注解一一通貫然後可以較其是非以求聖賢立言之本意雖已得之亦且更如此反復玩味令其義理浹洽於中淪肌浹髓然後乃可言學耳只如所論大學以正心誠意為本此便是不子細處且請試考經文正心誠意致知格物何者為先後耶其他如好樂茍善不害於正之説必有事焉而勿正心之説敬必以誠為先之説亦互有得失但終是本領未正未容輕議便使一一剖析將去亦恐未必有益可且就此三四義上子細思索勿正心即更看古注及諸先生説後便見喻為佳就此反復殊勝泛論也大抵科舉之學誤人知見壊人心術其技愈精其害愈甚正恐前日所從師友多是只得此流今以上來諸説求之則比所聞於石鼓者恐亦未免於此也答宋澤之自頃人還辱書之後不能再致問訊尋有臨漳之役道里益逺音問益難通徒增悵想而已今春不幸長子喪亡哀痛不堪亟請祠以歸行過三山始遇來使并領書五通乃知先丈郎中已遂窀穸之奉及前此遣人與今再遣曲折備見昆仲顯親傳逺之意悠久誠確有人所甚難者又不勝其悲歎也即此盛夏雨寒逺惟侍奉佳福銘文之喻昨承喻及極知不能然念先契之厚固已心許久矣今兹人來適此禍難初意决不能辦欲且遣還來人俟向後稍閒為之别尋的便附去既而思之昆仲越數千里而來求銘再遣使而後得達此意已不可孤向後因循未必得償此諾則何以見先丈於地下遂留來人隨至建陽輟哀排冗亟為草定繕寫封内但鄙拙不文無以發揮行治之實而事狀所載亦有不能悉書者一則志狀之體詳畧自應不同二則慮其欲益而反損如所記未第時事之類三則病其頗涉於神怪此三説者更望髙明有以察之也今且寫得一本旦夕事定别抄數本寄都下託范文叔發遞附便必可達也及承深之遂承遺澤即登仕版以究先公欲行未盡之志而澤之容之亦將讀書求志以承家學之傳此皆區區之所深望而垂問勤懇又見不自滿足之意但千里逺書難盡心曲今且以其大者言之大抵今之學者之病最是先學作文干禄使心不寧静不暇深究義理故於古今之學義利之間不復能察其界限分别之際而無以知其輕重取捨之所宜所以誦數雖博文詞雖工而祗以重為此心之害要須反此然後可以議為學之方耳向者葢亦屢嘗相為道此然覺賢者意中未甚明了終未免以文字言語為功夫聲名利禄為歸趣今以所述事狀觀之亦可驗其不誣矣若諸賢者果以愚言為不謬則願且以定省應接之餘功收拾思慮完養精神暫置其所已學者勿令洶湧鼓發狂閙却於此處深察前所謂古今之學義利之間粒剖銖分勿令交互則其輕重取舍之極自當判然於胷中不待矯拂而趣操自分聖學之門庭始可以漸而推尋矣此是學者立心第一義此志先定然後修已治人之方乃可决擇而修持耳人還無以為意臨漳所刻諸書十餘種謾見逺懐書後各有題跋見所為刻之意近思録比舊本增多數條如買櫝還珠之論尤可以警今日學者用心之繆家儀鄉儀亦有補於風教幸勿以為空言而輕讀之也答陳器之所示四條第一第三兩條得之但以公為仁似未精伊川先生明言仁道難言惟公近之非以公便為仁又云公而以人體之故為仁竊詳此意公之為仁猶言去其壅塞則水自通流然便謂無壅塞者為水則不可更以此意推之可見仁字下落也又中之為義固非專為剛柔相半之謂然當剛則剛當柔則柔當剛柔相半則相半亦皆自有中也試更思之如何答陳器之問玉山講義性是太極渾然之體本不可以名字言但其中含具萬理而綱理之大者有四故命之曰仁義禮智孔門未嘗備言至孟子而始備言之者葢孔子時性善之理素明雖不詳著其條而説自具至孟子時異端蠭起往往以性為不善孟子懼是理之不明而思有以明之茍但曰渾然全體則恐其如無星之秤無寸之尺終不足以曉天下於是别而言之界為四破而四端之説於是而立葢四端之未發也雖寂然不動而其中自有條理自有間架不是儱侗都無一物所以外邊纔感中間便應如赤子入井之事感則仁之理便應而惻隠之心於是乎形如過廟過朝之事感則禮之理便應而恭敬之心於是乎形葢由其中間衆理渾具各各分明故外邊所遇隨感而應所以四端之發各有面貌之不同是以孟子析而為四以示學者使知渾然全體之中而粲然有條若此則性之善可知矣然四端之未發也所謂渾然全體無聲臭之可言無形象之可見何以知其粲然有條如此葢是理之可驗乃依然就他發處驗得凡物必有本根性之理雖無形而端的之發最可驗故由其惻隠所以必知其有仁由其羞惡所以必知其有義由其恭敬所以必知其有禮由其是非所以必知其有智使其本無是理於内則何以有是端於外由其有是端於外所以必知有是理於内而不可誣也故孟子言乃若其情則可以為善矣乃所謂善也是則孟子之言性善葢亦遡其情而逆知之耳仁義禮智既知得界限分曉又須知四者之中仁義是箇對立底闗鍵葢仁仁也而禮則仁之著義義也而智則義之藏猶春夏秋冬雖為四時然春夏皆陽之屬也秋冬皆隂之屬也故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義是知天地之道不兩則不能以立故端雖有四而立之者則兩耳仁義雖對立而成兩然仁實貫通乎四者之中葢偏言則一事專言則包四者故仁者仁之本體禮者仁之節文義者仁之斷制智者仁之分别猶春夏秋冬雖不同而同出乎春春則春之生也夏則春之長也秋則春之成也冬則春之藏也自四而兩自兩而一則統之有宗㑹之有元矣故曰五行一隂陽隂陽一太極是天地之理固然也仁包四端而智居四端之末者葢冬者藏也所以始萬物而終萬物者也智有藏之義焉有終始之義焉則惻隠羞惡恭敬是三者皆有可為之事而智則無事可為但分别其為是為非爾是以謂之藏也又惻隠羞惡恭敬皆是一面底道理而是非則有兩面既别其所是又别其所非是終始萬物之象故仁為四端之首而智則能成始能成終猶元氣雖四德之長然元不生於元而生於貞葢由天地之化不翕聚則不能發散理固然也仁智交際之間乃萬化之機軸此理循環不窮脗合無間程子所謂動静無端隂陽無始者此也答葉味道賀所喻既祔之後主不當復於寢此恐不然向見陸子静居母喪時力主此説其兄子壽疑之皆以書來見問因以儀禮注中之説告之渠初乃不曾細看而率然立論及聞此説遂以為只是注説初非經之本文不足據信當時嘗痛闢之考訂甚詳且以為未論古禮如何但今只如此卒哭之後便除靈席則孝子之心豈能自安邪其後子壽書來乃伏其謬而有他日負荆之語今偶不見當時往還舊牘因更以他書考而論之如大戴禮諸侯遷廟篇云君及從者皆𤣥服則是三年大祥之後既除喪而後遷矣其詞但告遷而不言祔則是既祔之後主復於寢而至此方遷於廟矣如穀梁云易檐改塗禮志云更釁其廟則是必先遷髙祖於太廟夾室然後可以壊釁其故廟而納祖考之主又俟遷祖考於新廟然後可以壊釁其故廟而納新祔之主矣如左氏云特祀於寢而國語有日祭之文韋昭曰謂日上食於祖禰則是主復寢後猶日上食矣但穀梁所謂練而壊廟乃在三年之内似恐太速禮志所謂釁廟而移故主乃不俟其廟之虚而遽壊之恐非人情左氏所謂祔而作主則與禮經虞主用桑者不合所謂烝嘗禘於廟則與王制喪三年不祭者不合疑左氏所説乃當時之失杜氏因之遂有國君卒哭而除服之説皆非禮之正大率左氏言禮多此類也皆不足信而國語日祭月祀時享既與周禮祀天神祭地祇享人鬼之名不合韋昭又謂日上食於祖禰月祀於曾髙時享於二祧亦但與祭法略相表裏而不見於他經又主既復寢而日祭之則其几筵未知當俟臨祭而後設耶或常設而不除也此類皆無明文更當詳攷又古者廟有昭穆之次昭常為昭穆常為穆故祔新死者於其祖父之廟則為告其祖父以當遷他廟而告新死者以當入此廟之漸也今公私之廟皆為同堂異室以西為上之制而無復左昭右穆之次一有遞遷而羣室皆遷而新死者當入於其禰之故室矣此乃禮之大節與古不同而為禮者猶執祔於祖父之文似無意義然欲遂變而祔於禰廟則又非愛禮存羊之意竊意與其依違牽制而均不免為失禮曷若獻議於朝盡復公私之廟皆為左昭右穆之制而一洗其繆之為快乎答葉味道祔説向嘗細攷欲以奉報意謂已遣今承喻却未收得必是不曾遣去然今又尋不見大抵禮注穀梁皆謂練而遷廟大戴禮諸侯遷廟其説亦然此是古人必以練而遷其几筵於廟而猶日祭之如横渠之説然今人家廟只有一間祖考同之豈容如此况又已過時只得從温公之儀亦適當世人情之宜雖考之於古少有不同要未為大失禮也錢君所論亦甚精詳但謂既祔之後主不當復於寢則似未安葢祔與遷自是兩事祔者奉新死之主以祭於其所當入之祖廟而并祭其祖若告其祖以將遷於他廟若適士二廟則此祖已當遷於夾室矣而告新死者以將遷於此廟也既告已則復新死者之主於寢而主亦未遷比至於練乃遷其祖入他廟或夾室而遷新死者之主於其廟耳其未遷於廟與既遷而未祥饋羞自如他日如此則廟自不虚寢亦有饋皆非如錢君所慮也頃年陸子壽兄弟親喪亦來問此時以既祔復主告之而子静固以為不然直欲於卒哭而祔之後徹其几筵子壽疑而復問因又告之以為如此則亦無復問其禮之如何只此卒哭之後便徹几筵便非孝子之心已失禮之大本矣子静終不謂然而子壽遂服以書來謝至有負荆請罪之語今錢君之論雖無子静之薄而其所疑亦非也不知味道看得如何幸更與錢講之復以見告也答葉味道五服飲食居處之節昨嘗聞其略但喪大記有叔母世母故主宗子食肉飲酒之文注云義服恩輕不知自始死至未葬之前可以通行何如但一人向隅滿堂不樂服既不輕而飲食居處獨不為之制節可乎禮既無文不可强説竊意在喪次則自當如本服之制歸私家則自如其或可也喪大記三年之喪禫而從御吉祭而復寢期居廬終喪不御於内者父在為母為妻齊衰期者大功布衰九月者皆三月不御於内不知小功緦獨無明文其義安在禮既無文即當自如矣服輕故也親迎男女遭喪之禮曾子問之詳矣今有男就成於女家久而未歸若婿之父母死女之本喪如之何若女之父母死其女之制服如之何此乃原頭不是且放在塗之禮行之可也然既嫁則服自當降既除而歸夫家耳曾子問曰婚禮既納幣有吉日女之父母死則如之何孔子曰婿使人弔如婿父母死則女之家亦使人弔云云如未有吉日獨不當弔乎恐無不弔之理賀去冬侍坐承斟酌古今之制謂居喪冠服當與吉服稱其制度等級已略言及近見親戚有居母喪用温公寛袖襴衫布幞頭取其與吉服相符而又加首絰要絰而去温公之布四脚不知可行否今考政和五禮喪服却用古制凖此而行則亦無特然改制之嫌却恐吉服須講求一酌中制度相與行之耳昔侍先生見早晨入影堂焚香展拜而昏暮無復再入未知尊意如何向見今趙丞相日於影堂行昏定之禮或在燕集之後竊疑未安故每常只循舊禮晨謁而已按雜記姑姊妹其夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親不主此謂姑姊妹無子寡而死也夫若無族矣則前後家東西家無有則里尹主之或曰主之而祔於夫之黨妻之黨自主之非也夫之黨其祖姑也今賀有姑其夫家闕反歸父母家既耆耄他日捨兄弟姪之外無為主者但不知既無所祔豈忍其神之無歸乎古法既廢鄰家里尹决不肯祭他人之親則從宜而祀之别室其亦可也女子適人為父母服期傳云不貳斬也賤婦喪母遂於既葬卒哭而歸繼看喪大記曰喪父母既練而歸期九月既葬而歸注云歸謂歸夫家也其既葬而歸者乃婦人為祖父母為兄弟之為父後者耳賀雖令反終其月數而誤歸之月不知尚可補填乎因思他人或在母家彼此有所不便不可以待練之久其不可以不歸也又如之何補填如今追服意亦近厚或有不便歸而不變其居處飲食之節可也衣服則不可不變此亦以意言之深恐不免汰哉之誚也答葉味道省闈想甚得意奏名必在前列但尚未見後場題目不知主司意鄉如何要之得失已有定分人徒自為擾擾耳改字不若只就舊名之為安門生之禮若在髙等恐例須謁見即不可廢若只在行間亦不必詣之也禮書未能得了而衰病日侵恐未必能究竟此事也漢卿必時相見四方更有何朋友在都下凡百宜以謹宻為上事了能一過此相聚否李敬子尚留此志尚堅苦不易得但看義理未甚明徹細宻耳答徐居甫寓向看五峯言天理人欲同行而異情同體而異用兩句頗疑同體異用之説然猶未見真有未安處今看得天理乃自然之理人欲乃自欺之情不順自然即是私偽不是天理即是人欲二者面目自别發於人心自不同寓常驗之舉動間茍出於天理之所當為胷中自是平正無有歉愧自是寛泰無有不足接人待物自是無乖忤學者雖不常㑹如此要是此心存時便如此此心不存則不如此須是讀書講義理常令此心不間斷則天理常存矣若有放慢時節任人欲發去則胸中自是急迫麤率自是不公不正為不善事雖不欲人之知胸中自是有愧赧然亦自不可揜如何要去天理中見得人欲人欲中見得天理二者夐然判别恐説同體不可亦恐無同行之理若曰心本為利却假以行與那真於為義者其迹相似如此説同行猶可今下天理人欲字似少分别未審是然否頃與欽夫商量此兩句謂同行異情者是謂同體異用者非請更詳之志於道據於德依於仁一章集注之説備矣寓看來一節宻似一節志於道則心心念念惟在人倫日用之所當行者决不向利欲邊去其志定矣據於德如孝親悌長等事皆吾所自得而行之者慮有照管不到時節當據守之而勿失則吾之所得者實矣依於仁則全其本心之德而不間於人欲之私生生之體自流行不息工夫至此亦云熟矣此三節自立脚大綱以至工夫精察如此志道即夫子志學處以等級次第言耳據德大畧如貧而無諂富而無驕之類謂其能守也依仁如貧而樂富而好禮謂其不違仁也游於藝是行有餘力則以學文未知此説通否此段看得好但所引貧富者不相似孝弟為仁之本章注謂仁者心之德愛之理顔淵問仁章又謂仁者心之全德合二處推明其説未審當否心德則生道也葢天地以生物為心故人得之以為心者謂之仁其體則同天地而貫萬物其理則統萬善而包四端論其名狀則沖和温粹渾龎涵蓄常生生不死乃得謂之仁焉此即乾之元在四時而為春者也以仁而主四者則隨其地分發為羞惡為辭遜為是非莫不各當其所若不以仁為主而以别箇為主則但見不相對副但見乖隔不順且天地失其所以為主而人亦不得其所以生者矣此所以言仁専一心之德者豈不以其綱維管攝之妙乎敬愛之理只從孝弟發明自孝弟而推原其本則惟有此理已耳所謂以仁為孝弟之本是也孝弟而擴充其用則為仁民愛物之事所謂為仁以孝弟為本是也竊恐心之德以專言愛之理以偏言專言之本則發為偏言之用偏言之用則合於專言之本不可以小大本末二之也自仁道之不明也人惟拘於氣稟蔽於私欲則生道有息而天理不行否隔壅塞不能貫通如人疾病血氣不運於四支則手足頑麻不知痛痒而醫者亦謂之不仁人能有以體乎仁必其無一毫之私得以間其生生之體使之流行貫注無有不達無有不徧然後為能全其心之德愛之理也此顔子之克已仲弓之敬恕與聖人居處恭執事敬博學篤志切問近思等處正欲使工夫縝宻也必磨洗蕩滌其私使無一毫之留所以喚此仁使之充長條達無不周徧則心德自全而仁斯在我矣伏乞嚴喻此段大意得之但愛之理未可以用言耳更味之久當浹洽自見得失也敬之一字初看似有兩體一是主一無適心體常存無所走作之意一是遇事小心謹畏不敢慢易之意近看得遇事小心謹畏是心心念念常在這一事上無多歧之惑便有心廣體胖之氣象此非主一無適而何動而無二三之雜者主此一也静而無邪妄之念者亦主此一也主一葢兼動静而言静而無事惟主於往來出入之息耳未審然否謂主一兼動静而言是也出入之息此句不可曉寓一日訪蕃叟先生因説孟子盡心知性處陳先生云人須是知得始得若不知得就事上做得些小濟得甚事寓以為此説甚然陳先生問盡其心者作如何説寓對言心統性情㑹衆理而妙萬物者也心最難盡惟是知得性方能盡得心能盡其心者以知其性故也葢性者理之得於天而自然者也如君之仁父之慈子之孝以至於日用之所當為者皆有箇根原來厯處惟知之無一毫之不盡無一節之不極然後吾心之體至通至明無所蔽惑斯為盡其心矣陳先生以為不然乃言甚事不從心生只要盡得此心凡所存主凡所動作起居使合於理便是盡得此心此心既盡則自能知性如耳之聴正聲目之視正色手足舉動合禮皆是性寓云向所聞於先生長者與此不同耳目手足只是形耳目手足之所以能如此者方是性陳先生曰某之所以與朱丈不同者正以此耳公下稍自知某説為是某之用意不同恐難猝合寓所聞如此未得其精但盡其心者知其性也一句書上一箇者字下應一箇也字不知語脉當如何説寓之所對不畔尊㫖否此段論得甚好但恐下稍不長進則反見彼説為是耳今日正好著力也寓向在道院問親迎禮先生言親迎以來從温公婦入門以後從伊川云廟見不必候三月只遲之半月亦可葢少存古人重配著代之義今婦人入門即廟見葢舉世行之近見鄉里諸賢頗信左氏先配後祖之説豈後世紛紛之言不足據莫若從古為正否永嘉有儀禮之學合見得此事是非左氏固難盡信然其後説親迎處亦有布几筵告廟而來之説恐所謂後祖者譏其失此禮耳禮支子不祭祭必告宗子然諸侯之嫡子已是襲爵其次子始立宗大夫士以嫡子為宗所以上承祖宗之重下垂百代之傳而不敢少慢者後世禮教不明人家多以異姓為後寓所見鄉里有一人家兄弟二人其兄早亡無後遂立異姓為後後來弟却有子及舉行祭禮異姓子既為嫡主與凡題主及祝版皆用其名若論宗法祭惟宗子主之其他支子但得預其祭而已今異姓為後者既非祖宗氣血所傳乃欲以為宗子而專主其祭乎寓意欲以從弟之長者共主其祭事亦同著名行禮庶幾祖先之靈或歆享之不知可以義起否伏乞裁教立異姓為後此固今人之失今亦難以追正但預祭之時盡吾孝敬之誠心可也行弔之日不飲酒食肉此古人因變而變常為得情性之正然先王制禮因人情而為之節文必情與文稱乃為得宜寓恐弔喪之日不飲酒食肉可以施於有服之親或情分之厚者若弔泛常之人只當於行弔之時不飲酒食肉弔畢則復常既與死者平時分疎但只少變平日以存古意可也未審尊意以為然否有服則不但弔日不飲酒食肉矣其他則視情分之厚薄可也答徐居甫君子之道費而隱章鳶飛魚躍是子思喫𦂳為人處必有事焉而勿正心是孟子喫𦂳為人處皆是要人就此瞥地便見得箇天理全體若未見得且更虚心涵泳不可迫切追求穿鑿注解也君子之道造端乎夫婦及其至也察乎天地葢夫婦則情意宻而易於陷溺不於此致謹則私欲行於玩狎之地自欺於人所不知之境人倫大法雖講於師友之前亦未保其不壊於幽隠之處儻知造端之重隠㣲之際恐懼戒謹則是工夫從裏面做出以之事父兄處朋友皆易為力而有功矣本只是説至近處似此推説亦好天地之大也人猶有所憾恐非謂天能生覆而不能形載地能形載而不能生覆人猶有憾處恐只在於隂陽寒暑之或乖其常吉凶灾祥之或失其宜品類之枯敗夭折而不得遂其理此雖天地不能無憾人固不能無憾於此也既是不可必望其全便是有未足處兩端謂衆論不同之極致都是就善處説如斷獄一人以為當死一人以為當罰今酌其中而行之否然所謂中非如子莫之所執也鬼神為德注云體物是其為物之體不知此體字是體用之體還復是體質之體鬼神者氣之往來也須有此氣方有此物是為物之體也答徐志伯浩示喻堂銘極荷不鄙三數年來不敢開口道一字尚且無著身處今安敢為此以重其罪又使餘波所濺及於賢者乎兼堂中四壁環列前輩之象吾乃幅巾便服而遊燕寢卧於其中似亦非便鄉聞劉子澄在衡陽作朱陵道院自居正堂而以兩廡為前賢祠堂嘗竊疑其非是恨渠已去不及正之也横渠先生亦言傳得夫子畫像而無可設之處正為此耳幸試思之此雖細故其間亦自不容無義理也答鄧衛老絅問近思録乾健也健而無息之謂乾如何見得天之健處四德之元猶五常之仁云云絅謂偏言一事仁之用也專言四者仁之體也仁之用莫若愛仁之體則愛有所不能盡必包四者論之而後仁之體可見仁之一事乃所以包四者不可離其一事而别求兼四者之仁也滿腔子是惻隱之心莫只是不餒否心要在腔子裏莫只是不放却否所謂腔子之義豈禪俗語耶腔子猶言軀殻耳只是俗語非禪語也滿腔子只是言充塞周徧本來如此未説到不餒處下句所説得之凡物有本末不可分為兩段事灑掃應對是其然必有所以然絅竊謂是其然者人事也所以然者天理也下學而上達也大槩是如此更詳玩之楊子拔一毛不為云云絅竊謂三子皆執一而不知權故也使楊子之拔一毛不為施之在陋巷之時即顔子矣墨子之摩頂放踵施之三過其門不入之時即禹矣故所謂中者惟可與權者能之楊墨學不足以知道其心偏而不中豈復能為禹顔之事可更思之昔受學於周茂叔每令尋顔子仲尼樂處所樂者何事絅謂孔顔之所樂者循理而已矣此等處未易一言斷且宜虚心玩味兼考聖賢為學用力處實下功夫方自見得如此硬説無益於事也曾㸃漆雕已見大意絅謂大意者得非天理流行之妙聖賢作用之氣象與二子胸中灑落無一毫虧欠安行天理之至葢舜有天下而不與焉者也但二子已能窺測乎此未必身造乎此也故曰已見大意且如此説亦未有病然須實下功夫真有見處方有意味耳敬義夾持直上達天德自此絅謂夾持者豈内外並進之謂乎直上者豈進進不已之謂乎直上者不為物慾所累而倒東來西之謂也視聽思慮動作皆天理也人但於其中要識得真與妄爾識字是𦂳要處要識得時須是學始得横渠先生謂范巽之曰吾輩不及古人病源何在巽之請問先生曰此非難悟設此語者葢欲學者存意之不妄庶游心寖熟有一日脱然如大寐之得醒耳横渠先生之意正要學者將此題目時時省察使之積久貫熟而自得之耳非謂只要如此説殺也明道先生曰某寫字時甚敬非是要字好只此是學絅謂此正在勿忘勿助之間也今作字怱怱則不復成字是忘也或作意令好則愈不能好是助也以此知持敬者正勿忘勿助之間也若如此説則只是要字好矣非明道先生之意也伊川在講筵不曾請俸又不求封叙絅謂若是應舉得官便只當以常調自處雖陳乞封䕃可也本以應舉得官則當只以常調自處此自今常人言之如此可也然朝廷待士却不當如此伊川先生所以難言之也但云其説甚長則是其意以為要當從科舉法都改變了乃為正耳近看韓魏公論不當使道士於正殿設醮而不知設醮之非亦是此類須説到廢道士而罷設醮方是究竟也介甫言律是八分書絅謂八分者豈王氏謂其深刻猶未及於十分也律所以明法禁非不有助於教化但於根本上少有欠闕耳八分是其所長處二分乃其所闕此言是他見得者葢許之之詞非譏之也治天下不由井地終無由得平周道只是均平又曰井田卒歸於封建乃定絅按張氏言治大抵以井田封建為主程先生論封建頗取栁子厚之説而范唐鑑亦推廣之至胡氏管見乃力詆子厚并排蘇范其説反與程門不合何也遺書中只有一條論封建而取栁子厚者其他處却不如此恐此一段乃記録之誤也范氏説多茍簡不足為法胡氏之論雖正然其言利害亦有所偏要之封建郡縣互有利害但其理則當以封建為公耳此類且徐講之非今日所急也釋氏之説若欲窮其説而去取之則其説未能窮固已化而為佛矣絅素不喜讀異端之書然徒知其跡而未究其去著儻遇辨詰詞必窮矣絅自度決不至陷溺則亦不至騁辨然一物不知君子所恥也不知於此當何以處之理有未窮則胸中不能無疑礙雖不陷溺亦偶然耳况未必不陷溺耶至於欲騁辨而恥不知尤是末節不足言但窮理功夫不可有所遺然又當審其緩急之序也明道先生曰周茂叔忩前草不除去子厚觀驢鳴亦謂如此又曰子厚聞生皇子云云絅謂此即天地生物之心而人物所得以為心者葢仁之事也聖賢千言萬句所謂傳心者惟此而已大槩然矣但不可只如此説了便休須是常切玩味涵養也答鄧衛老昨所示卷子久無便不得報所論鬼神者甚有條理不易看得如此但説乾健處云只行之一字便見草率之甚下文云云則又全不應所問矣恐可更深思而詳説之也又以楊墨為學仁義而過亦非是彼乃正為不識仁義耳非學之過而不得中也曾㸃之説乃不真實之尤者今亦未須便論見處且當理㑹如何是實下功夫底方法次第而用力焉久當自有得耳若只如此揣摸籠罩將去即人人㑹説更要髙妙亦得但不濟事反害事耳答張敬之顯父梁恵王移民移粟之政周官廪人之職未嘗廢孟子非之者豈以恵王不知仁政之本耶此無異議但當熟玩孟子所説王政之始終其措置施行之方略次第耳孟子答齊宣王愛牛一段此等處與上章亦無甚異但要熟讀詳玩耳必有事焉一段顯父謂此二者界限極難分别葢不致力則便無所事而幾於忘才著意則未免預期欲速而流於助但將心平鋪謹守則又未見脱灑處此一段依孟子本文只合就養氣上説集注言之備矣明道先生移就持敬上説却是養氣已前一段事功夫雖宻然恐不若且依孟子看也愛無差等施由親始夷子既知此説便當一親疎合貴賤方得今却曰施由親始則是又將親疎對待而言豈非吾之愛又有差等哉其詞氣牴牾信乎遁而窮矣夷之所説愛無差等此是大病其言施由親始雖若粗有差别然亦是施此無差等之愛耳故孟子但責其二本而不論其下句之自相矛盾也夷之所以卒能感動而自知其非葢因孟子極言非為人泚之心有以切中其病耳此是𦂳要處當著眼目也滕文公之問逾迫而孟子所以答之者若無可為謀者極其規模所就亦不過太王畏天保國之事至於萬章之問宋而孟子遽以成湯樂天之事反覆告之豈滕之地褊小不足以有為而王偃滅滕伐薛敗諸侯之兵果有可畏之實耶彊弱者勢也得失者事也宋滕之彊弱有異故其得失之效不同但其一事之如此而為得如此而為失則其理未嘗不同耳若曰以彊弱為得失則是彊者常得弱者常失也豈其然乎以善服人則有心於求勝故人得以勝之以善養人則至誠樂與而人自心悦誠服其原亦判於公私義利之間也以善服人者惟恐人之進於善也如張華之對晉武帝恐吴人更立令主則江南不可取之類是也以善養人者唯恐人之不入於善也若湯之事葛遺之牛羊使人往為之耕之類是也孟子既以智為始聖為終則智者致知之事聖者極至之名其終復曰智巧聖力是智反妙於聖矣南軒以為論學則智聖有始終之序語道則聖之極是智之極者也此説似可以破前所疑不知如何智是見得徹之名聖是行得到之號有先後而無淺深也聖而不智如水母之無蝦亦將何所到乎孟子謂乃若其情則可以為善而周子有五性感動而善惡分是又以善惡於動處並言之豈孟子就其情之未發而周子就其情之已發者言之乎情未必皆善也然而本則可以為善而不可以為惡唯反其情故為惡耳孟子指其正者而言也周子兼其正與反者而言也莊子有遁天倍情之語亦此意也頃蒙見教云往者同安因聞鐘聲遂悟收心之法顯父不揆驗之信然當時所説聞鐘聲者本意不謂如此但言人心出入無時鐘之一聲未息而吾之心已屢變矣潮汐月臨子午則潮生其理謂何豈以子者陽之始午者陽之極月為隂屬故其氣交激而至此耶潮汐之説余襄公言之尤詳大抵天地之間東西為緯南北為經故子午夘酉為四方之正位而潮之進退以月至此位為節耳以氣之消息言之則子者隂之極而陽之始午者陽之極而隂之始夘為陽中酉為隂中也答張敬之向所示問目看得路脉全未是又多未曉此章之正意而遽引他説以雜乎其間展轉相迷彼此都曉不得不濟得事且當依傍本文逐句逐字解釋文理令其通透見得古人説此話是此意了更將來反覆玩味久之自有見處不須如此比類也聖智巧力之説則已得之矣此便是看他處底様子也又論聖賢優劣此亦是癡人比較父祖年甲髙下之説學問工夫都不在此枉費心思言語之力也答丁賔臣碩十二月十一日熹叩首上啟丁君省元老友頃幸接承便辱垂問雖喜用意之髙逺然竊觀容止之間未甚和粹意其未似聖門學者氣象而所問又太多而不切有不容以一詞相反復者用是黙黙不知所對及承訪逮至於再三而不免少露鄙懐則足下已艴然於色而不欲聞矣自是以來彼此之懐終不相悉而今者承書遂有督過之意三復以還愧怍亡已夫道在生人日用之間而著於聖賢方冊之内固非先知先覺者所獨得而後來者無所與也又非先知先覺者所能專而使後來者不得聞也患在學者不能虚心循序反復沈潛而妄意躐等自謂有見講論之條則又不過欲人之知已而不求其益欲人之同已而不求其正一有不合則遂發憤肆罵而無所不至此所以求之愈迫而愈不近也足下誠以是而深思之則熹之前日所以告足下者已悉矣足下之學其是非得失亦明矣如以為然繼此見問敢不敬對如曰不然則髙明之藴必有非愚昧所及知者幸寛其咎而姑自信其説焉可也恵貺江蟹感領至意江茶五瓶少見㣲意布則例不敢受前日柯國材之子來饋亦已卻之非獨於左右為然也答丁賔臣來喻富貴利達莫非天命軒冕儻來似未可必足見信道之篤然反復其言乃於得失之間未免有尤人之意似又全未得力何耶末由面扣臨風馳想切兾以時自愛益遜志於義理之學是所願望答鄭艮示及疑義足見勉學之意已畧奉答但大抵用意未盡親切更宜虚心詳味未要生疑只且似林一之看養氣章順文看去足矣久之自當有見處有疑處也答黄嵩老大抵人情苦於猶豫多致因循一向嬾廢今但心所欲為向前便做不要遲疑等待即只此目下頃刻之間亦須漸見功效矣年運易往時不待人况中歲以後尤宜汲汲也答黄令裕示喻道之大本未有真見之期此只是急迫之病道之大本豈别是一物但日用中隨事觀省久當自見然亦須是虚心游意積其功力庶幾有得若一向如此急迫則方寸之間躁擾不寧終無可得之期矣答黄令裕一作黄敬之所喻日用功夫甚親切但更就此勉力為佳然書策亦不可廢若一向如此又恐偏枯别生病也左氏之説未暇及此若論當讀之書何止左氏但朋友只看論語孟子已無餘力何暇更及他書也答黄令裕一作黄敬之收書雖見鄉道之切然更宜寛以居之使其優柔漸漬有以自得乃為有益正不在如此迫切也大學文義通貫所不難見須更反復要見下手用力處而從事焉乃為有諸已耳若只如此安排布置口説得行未至未當得功夫也考異答徐子融有性無性之説不容不結束一作結抹第二十版安能必二公之見從安能一作安敢第二十二版答宋深之大學是聖門最初用功處然此等處一作然此等語第二十五版晦庵集巻五十八欽定四庫全書晦庵集巻五十九宋朱子撰書問答一本作知舊門人問答答
