  text: 晦庵先生朱文公文集卷第九十一墓誌銘
  hash: sha256:db763b270978a046ff7606eb86132c7b3205c6492f2ece267494f9cd2dd4ab85
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0226_SBCK_091-1a}
body:
  text: 劉十九府君墓誌銘熹年十四五時以先君遺命學於故聘士劉君先生時㓜且愚未足以識其大者逺者特觀於容貌詞氣之間知其偉然非今世之士也旣又􅀗見于先生之兄十九丈府君者詞色俯仰盖與先生不異而温厚謹良則又過之因亦甚敬愛其爲人及少長而先生以女妻之又得數徃拜於府君之側時府君老矣然其持巳接人動有法度危坐終日無怠惰偃側之容與人言必依於孝弟忠信至於治生處事之方耕稼􅁞績之務亦皆纚纚有條理間而及於先世遺事與夫郷里故家舊俗之傳則必顧而歎曰吾之不復見此也乆矣夫熹於是退而每爲朋友道之以爲前輩氣質淳厚悃愊無華而其謹於禮法粲然有文又如此蓋不惟其天資之羙抑亦昇平教化之餘澤衣冠文物之遺風其視今人誦書業文沾沾自喜而輕儇浮媠反無以異於市井之人者相去逺矣如是三十餘年而府君卒既葬其子某狀其行以授熹使爲之書以表于墓道熹按府君諱某字致端建寧府崇安人其曾大父職方郎中贈開府儀同三司諱某始以文學起家歴典數州皆有惠愛大父朝請郎諱某爲縣有所不得行其志年未七十即致其事以歸父某明經勵行不仕以卒而郷人敬之娶同郡余氏讀書史有智識實生府君兄弟國子􅀕酒翁公所爲志其墓者也府君於兄弟爲最長自少則任家事以故不及於學而其孝愛恭敬誠信敦篤自有以過人者家世清貧至先府君時食口益衆府君經營纎宻而不失大體盖凡春秋晨夕之奉婚䘮燕勞之湏以至族姻黨友賀吉而弔凶其厚薄徃來之數無不稱情而合禮者先府君於是得以放情事外而遂其高諸弟亦皆得以遊學四方親師取友各成就其器業而聘君先生卓然傑立遂爲一世之聞人名立於不朽實府君有以相之也府君自少無外慕晚􅀊足跡不出里門者數十年其精神氣力老而不衰登山臨水常翛然獨往其所以自樂者人不得而言也年八十有五以乾道癸巳正月病卒于家而葬於宅之西南數百歩曰彭原者府君娶信安祝氏有賢行前卒子男某也女適進士江之瑞孫男潤女三人凡狀之所載如此與熹前所竊論者實相發明謹叙而并書之且爲之銘銘曰士學口耳弗誠以身旣佻以儇汙我冠紳孰如丈人庸信庸謹詞無支葉動有繩凖彭原之木有翳其隂我銘斯刻以詔來今國録魏公墓誌銘元履姓魏氏舊名挺之後更名掞之則字子實然其以元履聞也乆故稱者莫能易也家建寧府建陽縣之招賢里以儒學顯其胄出遷徙之所繇則故侍郎胡公寅巳識於元履先君子之墓矣元履㓜有大志以長遊郡庠事籍溪先生胡公憲先生竒之巳而徧從郷之儒先長者遊間適四方又盡交其先逹名士於是聞見日廣而聲稱日益大嘗客衢守章傑家會故相趙忠簡公薨海上歸葬常山傑雅怨趙公又希秦檜意逮繋其家人劾治甚急人畏其􅇯虐無敢議者元履獨􅁣然以書噍讓傑長揖徑歸傑亦不能害也兩以郷舉試禮部皆不第閩帥汪公應辰建守陳公正同知其賢相與論薦于朝時相尼之又不得召後數歳詔舉遺逸部刺史苪公燁遂帥其寮與帥守六人者共以元履行􅁩爲言於是詔特徴之元履辭謝不􅀗則以布衣入見極陳當世之務大要勸上以修德業正人心養士氣爲恢復之本上􅅄歎開納勞問移時明日遂有詔賜同進士出身授左迪功郎守太學録乾道四年十有二月也異時學官不與諸生接亦漫不省學事徒養望自高而巳元履旣就職則日進諸生而教誨之且視其居有壊者或幾壓焉則請于朝得緡錢四十萬以葺之釋奠孔子祠職當分獻先賢之從祀者則先事白宰相王安石父子以邪􅀃惑主聽溺人心馴致禍亂不應祀典而河南程氏兄弟唱明絶學以幸來今其功爲大請言於上廢安石父子勿祀而追爵程氏兄弟使從食不聽它日又言太學之教宜以德行經術爲先其次尤當使之通習世務以備官使今壹以空言浮􅀃取人非是又不聽至它政事有係安危治亂之機而宰相不能正臺諌侍從不敢言者亦無不抗䟽盡言以諫至三四上不納則移病杜門以書質責宰相語尤切宰相雅知元履招徠之至是始不能平而元履前巳數求去矣遂以迎親予告使歸行數日罷爲台州州學教授元履自少則有志于當世晚而遇主謂可以行其學然其仕不能半􅀊而不合以歸閒獨喟然嘆曰上恩深厚如此而吾學不至無以感悟報塞吾罪大矣先是嘗榜其書之室曰艮齋至是日處其間方將條理舊學以益求其所未至從遊之士梢有自逺來者而不幸病不起矣病革時顧念君親處理家事無一言之繆其母視之不巾不見也戒其子母以僧巫俗禮凂我且以書召其友新安朱熹至則盡以終事爲􅀉而訣卒之日實九年閏月壬戍其年五十有八矣娶同郡劉氏徴士勉之之兄女先十九年卒繼室虞氏子男二人孝伯國學進士孝朋尚幼所爲文章若論議訓􅀃合數十卷藏于家元履於學無不講而􅀹長於前代治亂廢興存亡之􅀃以至本朝故事之實皆領略通貫識其大者平居論􅀃聽者悚然居家謹䘮􅀕重禮法恤親舊雖貧不懈從父有落南者千里迎養死葬如禮而字其􅀌尤有恩􅀊饑爲粥以食餓者而力請移粟於官邑里頼焉又嘗請督郷人之不葬其親者富予期貧予費而掩其無主後者以千數爲文以戒生子而不舉者所全活者亦甚衆與人交尤盡情嘉其善而救其失如恐不及後進以禮來者苟有一長必汲汲推挽成就之其處心制行􅀋如此故嘗有病其爲人太過者元履􅀏曰不猶愈於横目自營者耶至或訾其近名則蹙然曰使夫人而皆避此嫌則爲善之路絶矣此其學道愛人之本意也嗚呼使其老夀通逹舉而施之則其所以及人者爲如何哉孝伯將以七月巳未奉其柩葬所居之南不十里所謂長坂者元履平生時所樂處也予往蒞其卜孝伯泣拜奉嚴君士敦之狀以銘文爲請予惟元履垂絶之言若有及此者顧雖不能不忍􅀒也則應曰諾退視其狀不誣因掇其大者序而銘之銘曰謂天嗇之則􅂚其材且志也曰其德之則又不年以位也竟使抱其餘以没於地也我銘以哀之又以掩其隧也陳師德墓誌銘自周衰官失而民無常産士不知學或者務爲剽掠纂組之工以希名射利盖本出於俯仰寒餓之迫有不􅀗巳者而其後或更以爲能焉俗弊風訛迭相夸尚於是公卿子弟之才者往往亦慕而爲之無所於迫而徒取衒鬻之羞頋反薄君恩輕世禄􅂢本學以從事於場屋無用之文舉世競馳恬不覺悟而聖賢修巳治人之方國家禮義廉恥之教益泯泯矣嗚呼斯其爲弊也乆矣不有卓然高志逺識之士其孰能有以反之哉如吾師德者盖庻幾焉而又不及就其志而疾病以死其亦可哀也巳師德莆田人姓陳氏名定丞相信安公之第三子也母曰福國夫人聶氏師德生秀異自孩㓜巳有成人之度年十二三則巳知古人爲巳之學而不屑爲舉子之文矣一日以公命因予友括蒼呉君耕老以書來道其志而請業焉予三復其辭而嘉之然亦意其必巳􅁋思力索於空幻恍惚之場也則報之曰聖賢之學雖不可以淺意量然學之者必自其近而易者始師德於是始欲因予言而反求之旣疲於􅀫昔思慮之苦而感疾殆矣其後屢欲求見且將徧求世之有道君子而師友之竟以病不果行且死猶語其友方耒耕道使言於予以不及相見爲深恨明年其仲兄守師中見予於建陽遂以耕道所狀行實一通屬予銘其竁予不忍辭也狀言師德性至孝事信安公及母夫人曲盡愛敬劑和烹飪必躬必親左右周旋不違義理而未嘗失顔色於兄弟尤友愛以公奏授右承奉郎娶同郡林氏朝請郎一鳴之女年二十有五以淳熈甲午七月已亥卒於其疾之革也公夫人徃視之謂曰死生有命汝所知也師德拱手對曰戰戰競競如臨深淵如履薄冰又頋其兄屬以問學修身之意越夕而逝公夫人􅂘之哀以其伯兄之子福孫後之而葬之石泉祖塋之側嗚呼有如師德之志而其行事可得而書者止於如此是不亦可哀也哉然其所立視世俗之學昧利辱身得巳而不已者則旣絶矣夫豈不足以頗慰公夫人之念與其兄弟朋友之思哉予是以銘曰士孰不學其方則殊毫忽之差有蹠其徒卓哉若人惟義之學刻意劬躬蹈履前覺天不耆之以駿其奔淵冰免矣志氣則存石泉之瀕于祔于宅孰全其歸視此幽刻何叔京墓碣銘邵武之東百里而近七臺之麓小溪之濵有君子者曰何君名鎬字叔京予􅀗從之遊相好也今年冬過予於寒泉精舎留止浹旬歸而屬疾旣病則手書來告訣語不及􅀻獨以不􅀗終養卒學爲深念而於當世之慮亦眷眷不忘也時予别君甫踰月發書驚歎失聲亟走省焉至則君已逝矣旣入􅂘盡哀明日君之親友門人以予至皆復來㑹哭相弔議語葬故君嗣子琰亦衰絰杖出拜伏􅂘固以銘墓爲請予惟君實以其死累我今其子又哀以請如是其何􅀃之辭則與諸來會者共訂君事皆曰君家䑓溪且數世世有隱德至君皇考諱兊始仕爲左朝奉􅀰通判辰州事娶陳氏劉氏林氏鄧氏皆封安人而君劉出也生孝謹有器識旣出就􅀓暮歸則不復去親側誦書日數千言爲文敏而有思趣尚高逺識者竒之辰州嘗受程氏中庸之學於故殿中侍御史東平馬公伸服行不怠又以其忠節事狀移書太史忤秦檜下吏竄南方危死不恨間復悉以其所聞者語君君旣受其􅀃則益務貫穿經史取友四方愽考旁資以相參伍盖乆而後有以自信之於是一意操存杜門終日澹然若無所營者至其論􅀃古今指陳得失則又明白慷􅁣可舉而行平居崇德義厲廉節絶口未嘗及功利至於收族恤􅀌興事濟衆則又懇惻憂勞如巳嗜欲言行相循没身不懈由此南州之爲程學者始又知有馬氏之傳焉始用辰州致仕恩􅀘官授泉州安溪主簿未赴鄧舅祚帥江西辟掌書冩機宜文字再調汀州上杭丞數行縣事專用寛簡爲治白罷稅外無名之賦人便安之部使者鄭君伯熊名好士行部得君喜甚頋郡事爲不理囚繋或累􅀊月不得釋檄君佐其守君入幕悉取文書閱視具得其所以然者持白守决遣之旬日皆盡又以田稅不均貧弱受病夙夜疚思爲所以均之之􅀃甚備他所以彌縫􅀘助者亦盡其力而守頋不恱君即謝去君事鄧安人素謹其赴上杭也安人以瘴毒爲憚君不敢請遂單行至官􅀊以公事一再歸省每行輙不受俸秩滿計其月十有四悉歸其劵於有司一時學士僚友高君學行多師尊之而當路鮮識之者君固不求亦不自悔獨以年格循資調潭州善化令將行而卒年四十有八淳熈乙未十有一月丁丑晦也君爲人清夷恬曠廉直惠和談經論事簡易條暢所著書有易論語􅀃史論詩文數十卷其言多可傳者晚築書堂所居南坂上名以高逺用見巳志疾病召子弟教戒一以義理終不及家人生産事獨曰治䘮以禮勿用浮屠􅀑教亂吾法而巳娶同郡李氏其叔父郁學於􅀛山楊公所謂西山先生者也子男琰爲長次某長女適呉大同次馬棟次未行也諸君所論君行事如此皆予所聞知琰等葬君東碭之原予旣書其最納竁中然間嘗􅀼目君學行可以司教育論議可以陪獻納而其心誠才實又可以宣德澤而惠鰥寡今乃僅得一縣令而又不及試以死此爲重可哀者乃復叙次其詳刻石表墓且系以銘銘曰清直而温夷易而方惟學不懈厥猷以光孰啓于家而尼于􅀖孰豐其粹而嗇其長帝罔弗􅂨氣或交沴旣欽厥承君則奚愧莫尊匪德莫乆匪言銘以相之刻石墓門夫人吕氏墓誌銘夫人姓吕氏建寧府建陽縣長平里人其先世於唐爲河東著姓乾符中有侍御史行立者避地始家建陽入宋餘百年乃有顯人而夫人之父希􅀃亦進士中第剛介不苟合晚乃爲劒浦令以卒夫人生愿慤不妄􅃧􅀏未笄失其母劒浦俾治家事撫弟妹如成人尋以歸邵武饒君偉事舅姑甚得其懽心餘年生子幹甫睟而寡夫人誓志秉節毅然不可奪無何劒浦及皇舅漳州府君亦皆卒而姑氏固前沒饒氏固清貧諸叔妹皆㓜稚夫人以孀婦抱弱子持守門户奉承賔􅀕和輯上下内外斬斬無間言其出内用度不以一錢自􅀻文簿整整雖龠合分寸無所漏少或遺亡則爲之躊躇不懌者累日指馭僕妾接隣婦里嫗咸有恩意幹㓜時愛之異甚捧視潄沐一不以委他人及少長遣就學則程其術業謹其出入交遊之際未嘗輙借以顔色幹亦孝謹敦實能自力學問見稱朋友間中淳熈二年進士第人謂夫人盛年苦節以有斯子今且享其報矣始夫人女弟爲劉氏婦早卒至是其子崇之與幹偕選夫人爲其母之不見每及之未嘗不悲嘆出涕人又以是知夫人之薄於榮利而厚於孝慈也幹調吉州吉水縣尉將行夫人屬㣲疾一夕遂不起聞者莫不哀之􅀊丁酉秋七月十四日也時年五十有六明年幹卜葬夫人於其郷之思順里而奉其友江州録事參軍游九思之狀來請銘拜起涕泗嗚咽不能言予哀其志亦雅聞夫人行實如游􅁺言因刪取其大者叙而銘之曰皇皇后帝垂三綱制婦繋夫隂統陽盛衰脩夭􅀄莫量有繋弗改兹厥常吁嗟夫人仁且莊祗􅀂帝訓篤不忘疚㷀艱􅁄廪欲僵卒濟厥子後以昌玉靈食墨此澗岡納詞誅行告幽荒山夷淵實無壊傷特奏名李公墓誌銘邵武軍光澤縣東里所有地曰烏洲李氏世居之爲郡著姓其先有贈大理評事者諱鐸始以文行知名郷黨生太常博士誥始登進士第卒贈朝請大夫陳忠肅公賢之稱其眞率樂易有古人之風其仲子深紹聖間以論斥時相之姦與任公伯雨等俱入元祐籍季曰處士濬隱居不仕而其葬也右文殿修撰李公夔實銘之盖自其先世所與交游姻好盡一時知名士故其子弟見聞開廓趣尚髙逺不與世俗同􅀂特奏府君諱某字得之者則處士之長子也少治周禮學兼通左氏春秋爲文簡古不逐時好弱冠遊太學薦而不第舎法行當充貢又不果行竟以累試禮部思奏名天府將入奉廷對前一日卒於臨安之客舎實紹興五年八月十八日年才五十有二歸殯宅之東岡三十二年其子吕乃更卜兆于烏君山下獅子嶺之原奉其柩而遷焉淳熈六年吕始見予廬阜之陽如舊相識一日泣而言曰吕不孝先人之没二十七年而後克以禮葬塟又十有九年矣而未克識將無以爲幽逺無窮之計惟吾子幸而予之銘因出其親友崇陽大夫游君訔之狀以請予辭謝不􅀗乃次其事如右按狀又言府君爲人事親孝謹友愛其弟甚篤之死不少衰遇族黨有恩意少有忿争則爲居閒極力平處不令入官府不幸死䘮則爲經理其家事而任其婚嫁之責嘗有死上庠者遣仲弟護其匶以歸里人有以惡聲至者未嘗與之較至周其急則輟衣食不頋也諸弟嘗問善人之道府君語之曰臨事而無隂據便利之心斯可矣又嘗語人事有當爲力雖未及亦勉爲之􅀂必有餘而後爲則終無時矣此其行身及物之本意也平居方嚴不妄􅃧􅀏而遇事輙應無所凝滯從弟西山先生嘗靣歎曰兄於答問若不經意而受其言者反覆十思終無以易此非諸弟所能及也性尤敦厚質實發言處事不以幽顯物我爲間樂聞人善而務掩其惡所與交皆巨人長者無不愛而敬之縣嘗以民兵爲屬府君爲制戰陳撃刺之法而以時閱習之甚可觀也今欲以聞冀爲府君得勲賞府君􅀏謝去不復有所預時海内多虞舉人有不能試禮部者往往以恩直􅀘官人有謂府君盍自言者府君不荅老之將至婆娑丘林吟諷書史􅓉然自適未嘗有不遇之歎也嗚呼予生晚不及識府君而游君不予欺也則府君者可謂好德有常之士矣乃不得少見於用以沒其身其亦可悲也夫夫人上官氏朝議大夫合之女繼室黃氏曲江令銓之女子男三人吕爲長次某次某女四人游君與將仕郎高志旻從政郎何鎬保義郎上官賁其婿也孫男女於今二十有六人而吕之彊學旣有聞又教諸子皆有法天之所以報府君者其將在於此乎乃爲之銘使刻宰上以竢其詞曰利不自予惟義之取義則彊爲惟仁之歸孰長其源不豐其委斯丘斯藏有起無墜金紫光禄大夫黃公墓誌銘淳熈六年春正月端明殿學士黃公寢疾于邵武故縣之􅀻第熹往問其起居謁入公正衣冠舉扶起坐顧中子瀚召熹入至則又扶以立辱與揖譲爲禮共坐食飲恭謹不懈如常時卒食又扶而起涕泣爲熹言曰中也先考妣之藏乆未克識盖不敢輕以屬人今以累子子其爲我成之熹頓首辭謝不敢當而公命之不置熹懼以乆勞公則不敢辭而受命以出歸又以書辭未報而公薨諸子遣使來計且致遺命以同郡李君吕之狀來熹旣哭公盡哀且念今則無所於辭乃考其狀而附以所聞爲列其事曰謹按右宣義郎致仕贈金紫光禄大夫黃公諱崇字彦高其先光州固始人十一世祖􅈾避地閩中今爲邵武軍邵武縣人曾祖扆有隱徳爲郷里所尊晚以子仕登朝授太常丞以卒故知制誥吕公夏卿實銘其墓後以孫履爲尚書右丞累贈司徒祖汝臣不仕父豫用右丞奏爲右承務郎皆以孝謹聞於郷黨公自㓜力學日誦千言人謂是且大其門矣旣長承務公任以家事於是無復進取意旣􅀌而貧悉力治䘮不以累其昆弟而所以爲禮者無不備觀者歎息母孫夫人春秋高性嚴而多病公致養勤劇得其驩心隣家有李永者尚氣節雅敬慕公察公養親之意有餘而力不足請助公以經紀公亦信之不疑竭貲付之一不問其出入如是者十有五年李䘖公德將死感􅁣執公手曰子吾父也公之兄客遊以疫死人無敢往視之者公獨毅然告行千里還柩視其橐得餘貲尚百餘萬悉奉以歸其丘嫂不以一毫自􅀻平居恭儉自守不妄取予至其教子擇師雖輟衣食無所愛由是二子皆舉進士及公時取高科以德業風槩各有聞於當世既又並登朝列遇郊慶奏公爲右宣義郎而致其事公乗安車東西就養二子皆孝謹篤至諸孫滿前晨夕所以奉養娯樂公者甚備郷黨榮之紹興癸酉正月十九日以疾卒于南劒州沙縣之寺舎享年八十有一其年十月葬于九墪先塋之次娶建安游氏先卒亦以二子故追封孺人一女適貢士劉紀公卒時端明公方以某官通判建州事而季子章亦以某官知沙縣事其後端明公􅀍遇太上皇帝擢館職郎曹史官攝賛書命兼司業􅀕酒侍講歴工吏兵禮部侍郎又以府教授給事中兵部尚書事今上皇帝侍讀禁中正色立朝聲烈甚茂以顯謨龍圖閣學士退老于家天子又乞言焉即拜端明殿學士恩禮殊渥而海内有識之士亦莫不歸心焉沙縣屢宰劇邑有能稱然不肯媚事權豪後以御史中丞湯鵬舉薦入臺爲主薄以又持論不阿而去提舉福建路常平茶事知台州所至聲績皆可紀以是累贈公至金紫光禄大夫夫人亦啓封本郡而孫曽仕者又十餘人然後郷人知公所以遺其子孫者爲無窮也李君又言吕以壻公孫女嘗得拜公堂上間竊窺觀公之爲人望之儼然即之温然危坐竟日無惰容雖遇臧獲不妄言􅀏自少至老如一日熹以是又知端明公之德之盛所以没身於禮而不倦者爲有自來也嗚呼公其亦賢矣哉敬爲作銘銘曰司徒之德浹于州郷矧其孫曽弗俊以良光禄之賢克篤其慶隱耀弗章及子而盛其盛伊何學士尚書介也英英亦假節符國慶所覃逮其考廟結紫垂黃天子有詔匪爵之貴惟德之褒保而弗墜有積彌高我思古人恍其對接承命作銘用亶來葉建安郡夫人游氏墓誌銘有宋建安郡夫人游氏右宣義郎致仕贈金紫光禄大夫邵武黃公諱崇之妻而子端明殿學士諱中台州史君諱章之所追爵也世爲建州建陽縣長平里人曾祖正卿祖希古父儀皆不仕而有􅀮德郷里推長者夫人資静淑族毋阮氏以婦德爲女師夫人㓜嘗學焉受班昭女訓通其大義至它組紉筆札之藝皆不待刻意而能輙過人早􅀌其母鍾愛之以歸大夫公事舅姑承􅀕祀勤肅不懈舅喜賔客佳辰令節親舊滿門夫人供饋唯謹未嘗頃刻自逸而委勞於娣姒也姑性嚴諸婦侍旁有二十年不命坐者夫人獨能順適其意盥櫛温清禮無違者姑有疾非夫人進藥不嘗毎因事指言以爲諸婦模楷遭舅䘮大夫公素貧昆弟相顧謀鬻田以葬夫人曰毋隳爾先業爲也退斥橐中􅋔以奉其役以故大夫公得以不煩於衆而襄大事大夫公爲人誠慤莊重夫人以柔順堅正佐之相敬如賔謀無不恊其待遇族姻謙謹有禮樂道其羙而不喜聞其過至其貧困則賙之必盡其力日誦女訓及它經言以自箴警亦頗信尚浮屠法娠子則必端居静室焚香讀儒佛書不疾呼不怒視曰此古人胎教之法也故其子生皆賢材而夫人所以教之者又甚至稍能言則寘膝上授以詩書少長即爲迎師擇友教詔諄悉從兄御史先生學於河南程氏行業淳懿爲學者所宗夫人毎語諸子曰視乃舅而師法之足以爲良士矣紹興壬子四月二十三日以疾卒病革大夫公泣視之夫人曰生死聚散如夜旦然何以戚戚爲哉於是年五十有六矣二子皆舉進士中其科而端明公實以第二人賜第其後侍從兩朝出入二十餘年忠言直節老而益壯退居于郷天子閔勞以事嘗遣信使奉璽書就而問之其忠孝大節固巳偉然而其言行之細又皆可紀人以爲夫人之遺教也台州嘗爲御史臺主簿亦以治行精敏議論慷􅁣有聞於時二公前後凡逢慶恩得追榮其母至今封里人榮之一女則貢士劉紀其壻也卒之明年葬于邵武縣石岐之原大夫公嘗命台州狀其行而未有所託銘後四十有六年端明公乃以命熹其語具於大夫公之誌此不著獨按狀文剟其大者書而銘之銘曰長平之游世有德人弗耀于世乃里其仁女士攸宜壺彞是式配德娠賢慶餘善積尚書刺史之德之才湯沐之封本􅀖是開煌煌命書賁此玄宅伐石􅂐辭永世貽則端明殿學士黃公墓誌銘公姓黃氏諱中字通老其先有諱􅈾者自光州固始縣入閩始家邵武至公間十有二世矣公之曾大父汝臣不仕大父豫假承務郎父崇贈金紫光禄大夫母游氏追封建安郡夫人公生而頴悟端慤少長受書不過一再讀退輙黙然危坐竟日問之則皆巳成誦矣未冠從舅御史先生定夫愛其厚重手書爲夫人賀踰冠入太學會京城失守僞楚僣位號公即日出居于外旣而􅀖昌果遣學官致僞詔藥物勞問諸生公以前出故獨無所汙建炎再造丞相潜善公族祖父也雅器重公薦諸朝詔􅀘修職郎御營使司幹辦公事紹興五年舉進士對策廷中極論孝弟之意冀以感動聖心天子果異其言擢置上第名次舉首授左文林郎保寧軍節度推官改宣義郎主管南外敦宗院代還秦丞相檜方用事察公意不附巳差通判建州事罹外艱服除復差通判紹興府事時公登第二十有餘年矣轉徙外服士友嘆其滯淹而公處之泊如也檜巳死公道稍開上記公姓名乃召以爲秘書省校書郎兼實録院檢討官遷著作佐郎兼普安恩平郡王府教授遷司封貟外郎兼權國子司業滿􅀊爲眞紹興二十八年充賀金國生辰使與賀正使祕書少監沈介相先後明年公還獨言虜作治汴宮役去萬計此必欲徙居以見迫不可不早自爲計時約和旣乆中外解弛無復戰守之備上聞公言矍然曰非但爲離宮耶公曰臣見其營表之目宫寢悉備此豈止爲離宮者以臣度之虜勢必南虜甫居汴則壯士徤馬不數日可至淮上事勢巳迫惟陛下亟深圖之上是公言而宰相皆不恱顧詰公曰沈監之歸属耳不聞此言公安得獨爲此殊不以爲意踰月公復往扣之且曰即不以鄙言爲可信請治其罪又皆憮然莫應而右相湯思退怒甚至以語侵公公不爲動巳乃除沈吏部侍郎而徙公祕書少監以抑之公猶以􅁁備爲言不聽則請􅀘外上不許曰黃某可謂恬退有守矣除起居郎賜以鞍馬非故事也踰月兼權中書舎人顯仁太后崩百官朝臨將避辰日公以非經且引唐太宗哭張公謹事争之巳而卜殯日適在權制釋服之外有司議百官以吉服陪位公又論之曰唐制殯在易月之内則曰百僚各服其服啓殯在易月之外則曰各服其初服今殯雖過期獨不得以啓殯例之而服其􅀄服乎且䘮與其易寧戚惟稽古定制有以伸臣子之至情者則幸甚尋差同知三十年貢舉權工部侍郎奏御前軍器所領屬中人其調度程品工部軍器監有不得而聞者非祖宗正名建官之意請得隷屬稽考不報金人來賀天申節充接伴使故事錫宴使者謝於庭中至是辭以方暑請拜宇下公持不可乃如故事遂爲送伴使還又言聞虜日繕兵不休且其重兵皆屯中州宜有以待之明年兼侍講又兼吏兵部侍郎㑹將有事于明堂公請母新幄帟母設四輅以節浮費詔從之旣而虜使復以天申來賀方引見遽以欽宗皇帝訃聞且多出不遜語諸公惟駭不知所爲至謂上不可以凶服見使者欲俟其去乃發䘮公聞之馳白宰相此國家大事臣子至痛之節一有失禮謂天下後世何且使人或問故將何以對於是始議行禮公又率諸同列請對論决䇿用兵事衆莫有同者公乃獨陳備禦方略且曰朝廷與􅄷虜通好二十餘年之間我未嘗一日言戰虜未嘗一日忘戰以我歳幣㗖彼士卒我日益削虜日益彊今幸天裭其魄使先墜言以警陛下惟陛下亟加聖心焉盖公自使還三年每進對未嘗不以兹事爲言至是上始入其􅀃然不數月而虜亮巳擁衆渡淮矣遷權禮部侍郎入謝因論淮西將士不用命請擇大臣督諸軍旣而殿帥楊存中以御營使行公又率同列論存中不可遣狀甚力虜􅀐至江壖朝臣震怖争遣家逃匿公獨晏然如平日家人亦朝暮請行公曰天子六宫在是吾爲從臣獨安適耶比虜退唯公與左相陳魯公家在城中衆皆慚服於是車駕將撫師建康而欽宗未祔廟留守湯思退請省虞以速祔公持不可上納用焉而議者猶謂凶服不可以即戎上曰吾固以縞素詔中外矣卒從公言而行月朔留司百官當入臨思退復議寢其禮公又力争得不罷比作主當瘞重公又以􅀄服請右相朱倬不可曰徽考大行有故事矣公曰此前日之誤今正當改之耳倬因妄謂上意實然臣子務爲恭順可也公曰責難於君乃爲恭耳虜旣易主明年復遣使來通好議者皆曰土地實也君臣名也先實後名我之利也公又奏曰君臣之名旣定則實將從之百世不易者土地則其得失取予非有定也安得反謂之實而先之乎上然之詔公去權號㑹有詔問足食足兵之計公以量入爲出爲對且曰今天下財賦半入内帑有司莫能計其盈虚請悉以歸左藏且引唐楊炎告德宗語曰陛下仁聖豈不能爲德宗之爲哉上亦善之然未及行也未幾今天子受禪登極公始盖嘗與聞其議至是自以舊學老臣且察左右有以術數惑上聽者首以堯舜禹湯文武周孔所傳正心誠意致知格物之􅀃爲上敷陳甚悉㑹詔給筆札侍臣論天下事公旣條上且申前奏極論内帑之弊於是有詔更以内藏激賞爲左藏南庫明年兼國子祭酒詔以旱蝗星變命近臣言闕政公曰前給筆札群臣悉巳條對今什未一二施行夫言非難行之爲難願陛下力行而巳無以多言爲也巳而有㫖自今太上皇后令皆以聖㫖爲號公以故典争之不得宰相建遣王之望使虜約和公又論之亦不從俄兼給事中明年天申上夀議者以欽宗服除將復用樂事下禮曹公奏曰臣事君猶子事父禮親䘮未葬不除服春秋君弑賊不討則雖葬不書以明臣子之罪况今欽宗實未葬也而遽作樂不亦失禮違經之甚乎退復以白宰相且引永祐龍輴未返時事爲比左相湯思退曰時巳遣使奉迎今則未也公曰此又誰之責耶右相張魏公亦曰今乃爲親之故不得以前日比公曰太上皇帝於欽宗親弟昆且常北靣事之有君臣之義尤恐非所安也退具草將復論之詞益壯厲尋有㫖集議而廟堂間遣禮官來偵公意公出奏草示之知公議正不可屈乃寢公在東臺不半􅀊詔勑下者問理如何未嘗顧已徇人小有所屈内侍李綽徐紳賈竑梁珂遷官不應法諫官劉度坐論近習龍大淵忤㫖􅀘郡巳􅃨罷之公壹不書讀繳奏以聞左右巳深忌之會復有㫖賜安穆皇后家墳寺田而僧遂奪取殿前選􅄡軍所買丁禩田以自入軍士以爲言事下户部尚書韓仲通以爲不可而侍郎錢端禮觀望獨奏予之公復封上曰今若奉行前詔則當以官田給賜不當取諸軍家所買若謂丁禩得之非道軍家不應得買則亦當還直取田不當遽乾沒也䟽奏群小相與益肆媒孽公遂以特㫖罷中書舎人馬騏上䟽留公未報而言事官尹穡希意投隙詆公爲張公黨騏後亦不能自堅而公竟去國矣明年乾道改元公年適七十即移文所居邵武軍引年告老除集英殿修撰致仕進敷文閣待制乆之上亦寖悟思公言將復用之五年因御講筵顧侍臣力黃某老儒今居何許年幾何矣筯力彊否於是召公赴闕公辭謝不􅀗明年乃起公以老成􅀫望直道正言去國七年至是復來觀者如堵入對内殿問勞甚寵時用事者方以權譎功利日肆欺罔公因復以前奏正心誠意致知􅁉物者爲上精言之又言比年以來言和者忘不共戴天之讎固非乆安之計而言戰者徒爲無顧忌大言又無必勝之䇿必也暫與之和而亟爲之備内修政理而外觀時變則庻乎其可耳上皆聽納以爲兵部尚書兼侍讀毎當入直上常先遣人􅃸視至則亟召入坐語極從容如是數月月必一再見公知無不言其大者則迎請欽廟梓宫罷天申錫宴也􅀄公在禮部論止作樂事公去踰年卒用之然猶未設宴也至是將錫宴公奏申前􅀃且曰三綱五常聖人所以維持天下之要道湏􅁷不可無也欽宗梓宮逺在沙漠爲臣子者未嘗以一言及之獨不錫宴一事僅存如魯告朔之餼羊爾今又廢之則三綱五常掃地盡矣陛下將何以責天下臣子之不盡忠孝於君親哉巳而詔遣中書舎人范成大使虜以山陵爲請公又奏曰陛下聖孝及此天下幸甚然置欽廟梓宮而不問則有所未盡於人心且雖夷狄之無君其或以是而窺我矣上善其言而不及用虜於是果肆嫚言人乃服公論之正而識之早也公又嘗奏請命有司作乾道會計録以制國用罷去發運使及它民間利病􅁁防得失數事公前以不得其言而􅀍䜛以去其復來也將有以卒行其志而上意郷公亦益厚至是不能卒􅀊又以言不盡用浩然有歸志然猶未忍决求去也乃陳十要道之􅀃以獻曰用人而不自用者治天下之要道也以公議進退人材者用人之要道也察其正直納忠阿謏順㫖者辨君子小人之要道也廣開言路者防壅蔽之要道也考核事實者聼言之要道也量入爲出者理財之要道也精選監司者理郡邑之要道也痛懲贓吏者恤民之要道也求文武之臣面陳方略者選將帥之要道也稽考兵籍省財之要道也言皆切中時病每奏一篇上未嘗不稱善公遂從容乞身以歸詞旨堅確上不能奪乃除顯謨閣學士提舉江州太平興國宮入謝且辤上意殊眷眷内出犀帶香茗爲賜既歸再䟽告老遂以龍圖閣學士致仕淳􅄉元年上意猶欲用公以公篤老不敢召則上手爲書遣使詣公訪以天下利害朝政闕失進職端明殿學士且以銀絹將之公受詔感激拜䟽以謝略曰朝政之闕失多矣其尤失者君子在野小人在位政出多門言路壅塞廉恥道喪貨賂公行也天下之利害多矣其尤害民者官吏貪墨賦歛煩重財用匱竭盜賊多有獄訟不理政以賄成也臣願進君子退小人精選諸道部使者以察州縣則朝政有經民不告病矣公之復歸又十年雖身安田里老夀康寜無復它念然其心未嘗一日忘朝廷間語及詩事或慷􅁣悲辛不能巳聞者蓋動心焉然尚冀公之復起而卒有以寤上心也七年八月竟以疾薨于家之正寢先是屬疾踰年手草遺表猶以山陵境土欽廟梓宮爲言而戒上以人主之職不可假之左右言尤剴切至是上之上聞悲悼朝野相弔詔以正議大夫告其第享年八十有五累封江夏郡開國侯食邑千五百户實封百户娶熊氏詹氏又娶詹氏封淑人三男源通直郎瀚承務郎浩從政郎六女承議郎倪治通直郎呉應時宣教郎謝源明承事郎張鑄承事郎陳景山其婿也第二子及第二女皆夭孫男七人女五人公天性莊重終日儼然坐立有常處未嘗傾側跛􅀝語黙有常節未嘗戯言苟􅀏它人視之若有所拘縶而不能頃刻安者公獨㤗然以終其身雖在燕􅀻亦未嘗湏􅁷變也居家孝友篤至夫婦相敬如賔與人交恭而信淡而乆苟非其義一介不取諸人亦不以予人少時貧窶炊􅁰或不繼而處之甚安至其力所可致則亦不使親與其憂也晚􅀊宦逹而自奉簡薄不改於舊惟祭祀則致豐㓗細大必身親之仕州縣奉法循理敦尚風教在朝廷守經据正思深慮逺不爲激訐之言表襮之行以矜巳取名然誠意所格愈乆而上下愈信服之上雅敬重公屢有大用意而公卒不少貶以求合上問進取必謹對曰先自治問理財必謹對曰量入爲出始終一􅀃未嘗少及功利至於忠孝大節敬終追逺之際則深有所不能忘者蓋自始對詔䇿巳發其端而痛夫欽廟梓宫之未返則論之終身至於垂絶之言不釋也嗚呼悲夫推公此心可謂無歉於幽明而其法戒之所存雖與天壤相弊可也尤恬於勢利興廢之間人莫見其喜愠之色爲郡從事時驗茶劵有僞者吏白公當受賞公謝却之罷惇宗而造朝也臨安學官與試貢士公以朝命攝其事時見官外猶有缺貟用事者故以嘗公巳而試事畢公即解印去其人曰所攝黨缺貟盍亦自言以審之乎公竟不顧用事者以是惡之在王府時龍大淵爲内知巳親幸它教授或與過從觴詠公獨未嘗與之坐朝夕見則揖而退其後它教授多􅀩其力公獨不徙官爲司業時芝草生武成廟武學官吏請以聞公不答則隂圖以獻宰相召長貳而詰之曰治世之瑞抑而不奏何耶􅀕酒周公綰未對公指所畫對曰治世何用此爲周退語人曰黃公之言精切簡當惜不使爲諫諍官也六和塔成宰相命諸逹官人冩釋氏四十二章之一刻之壁間公謝不能請至再終不與其不惑異端又如此所居官人莫敢干以􅀻然公初未嘗有意固拒之也蜀士有仕于朝者同列多靳侮之獨感公遇巳厚然公亦未嘗有意獨厚之也尤喜薦士王詹事十朋張舎人震皆公所引張忠獻公劉太尉錡之復用公力爲多然未嘗以告人諸公或不之知也致事里居前後十五年􅀵死恤􅀌振貧繼絶􅀩頼者衆而公未嘗有自德之色平居門無雜賔邑里後生有來見者躬與爲禮如對大賔諄諄教語必依於孝弟忠信未嘗以爵齒自高而有懈意惰容也盖公之爲人生質粹羙天下之物旣無足以動於其心其學於天下之義理又皆不待問辨而巳識其大者若其誠意躬行則又渾然不見其勉強之意而謙厚慤實尤以空言爲恥以故當世鮮克知之然親炙而有得焉則未有不厭然心服者嗚呼所謂訥言敏行實浮於名者公其是與明年將葬嗣子源使其弟翰狀公行事屬熹以銘熹辱公知顧甚厚且嘗受命以識先大夫先夫人之墓矣不復敢辭乃敬叙其事而銘之公墓在邵武縣仁澤郷里居第之北曰原葬以十二月􅀄五日其銘曰天下國家孰匪當務􅂚爲斯本身則其處事物之理指數其窮􅂚其大者維孝與忠我觀黃公天􅂌淳則植本自躬有大其識儼其若思履衡蹈從盛德之表見于聲容烝烝于家懇懇于國敬終厚逺靡有遺貸根深末荗綱舉目隨行滿當世言爲寳􅀛出入兩朝初終一意酬酢佑神表裏一致因而不究君子惜之勒銘幽宫維以質之武經大夫趙公墓誌銘公諱某字夢周有宋太宗皇帝之六世孫也其曾大父某大父某皆爲開府儀同三司贈太師追王韓成二國事皆見國史父某舉進士中第未及仕而卒贈中奉大夫公生睦親宅以郊祀恩􅀘成忠郎少􅀌能自植立刻意爲學欲以文字成名於世遭亂轉徙不克遂其志年甫冠調監常州宜興縣稅是時冦難未夷道路艱􅁄公治征筭不以苛皦爲事徃來便之在官獨居一室日以讀書鼓琴爲事一無他嗜同寮莫測其所爲至使人隂伺之巳乃信服參知政事張公守亦知其賢更以爲饒州永平監舊法課卒淘土取弃銅以益鑄用數登萬斤輙書勞受賞前後相承程董峻切役者病之公至獨歎曰􅇤人肥巳吾弗忍也亟罷去而節他費以足用守董耘賢之且愛其詞章薦於朝請爲易文資不果去居信之弋陽一時名勝争迎致舘榖且遣子弟從之遊乆之自請爲祠官得主管華州雲臺觀始來居邵武時中書舎人王洋知軍事尤深禮敬與酬唱徃來稱嘆不置秩滿爲建昌軍兵馬都監郡守知其廉帑蔵出納悉以諉之復監泉州郡使司糴事公知前積蠧弊歎曰踵是則吾固不能正之則􅀩其辜者必衆吾豈爲禍始乎因力辭之旣而有求代其任者果不免聞者歎服晚再爲福建路兵馬鈐轄累官至武經大夫行年七十有三淳熈六年七月某日以疾卒公配恭人滿氏某官中行之曾孫女子男五人善俊朝議大夫直龍圖閣知廬州主管淮西安撫司公事善佐朝散郎知常德府事善儀秉義郎善任承節郎善傑忠翊郎而善任蚤卒女七人亦夭其五人則從政郎鄧祖攸迪功郎􅀭珵李絪黃造司馬􅣫其壻也孫男女各二人皆㓜明年諸􅀌特奉公柩葬于邵武縣新屯西宅之原而書其事狀如此使人來請銘熹雅聞公爲人恬淡寛愽自少以㢘謹自將平居未嘗有愠色尤不喜言人過以急難告者必周之未嘗計有無也生長太平公族間不爲華靡之習從宦所至壹以仁恕惻怛爲心雖勢卑不得盡行其志然其隨事及物亦足以見其胷中所存者滿恭人有賢行諸子皆以文學稱而淮西常德連中進士第皆及公無恙時􅀍遇通顯知名當世公晚更得閒適因不復問家事顓用棊酒自娯而老夀以没嗚呼是亦可以無憾也夫乃考其狀叙而銘之銘曰唯紓人之勞寧郤巳之進豈曰巳之㢘而速人以病仁夫趙公有睪其宫我銘斯石以詔其終夫人徐氏墓誌銘夫人徐氏温州瑞安縣人世隱德不仕夫人生柔順静正父母愛之擇所宜歸以配郡人張君某旣歸事舅姑盡禮晨夕敬問衣服食飲寒燠之宜而節適之舅姑未食不敢食未寢不敢寢姑性嚴重事有不可其意終日不懌左右莫能近夫人獨從容娯侍所以開釋其意者萬方俟其語􅀏復常乃敢退如是者十有八年隣里親族覸之不見其一日懈也舅始沒哀毀不勝衰張君家故饒財喜賔客中􅀊少窶約然不以屑意朋舊過門輙飭庖具饌相與樂飲如故時館客於家至或旬月不厭夫人節衣食以奉其費無難色不使張君知其有異於前也佐張君教諸子皆有文行旣而其長􅀭卿遂登進士第仕州縣以敦樸詳練爲諸公長者所知張君由此亦以太上慶夀恩􅀘承務郎而致其事老夀家居子孫滿前郷鄰以爲榮而夫人巳不及見乆矣盖夫人以紹興二十六年十二月卒享年五十有五凡生三男三女揚卿之弟曰振卿曰卿女伯季蚤卒仲適成忠郎􅁥左藏西庫林鏞孫男八人女六人卒後四年乃克祔於先姑周氏之塋又二十有五年而揚卿以從致郎爲南康軍學教授與予聮事相好也一日狀夫人之行以告曰揚卿之禄巳不得逮其母日夜痛于厥心如又不能有以表其行實之懿於方來則不孝之罪死有餘責敢敬泣拜以請夫子幸哀而予之銘是使揚卿得以不死其親而免於戾也予辭謝不􅀗而未及爲明年去郡楊卿又以書來請不置乃序其事而銘之其詞曰旣孝旣敬又儉以勤天􅂚報之子秀而文生短慶長儲豐饗嗇銘以訂之百世其澤劉氏妹墓誌銘新瀏陽丞建安劉君子翔彦集之妻呉郡朱氏者先太史吏部府君之女而熹之女弟也爲人質實易良自㓜不見其有妄言愠色生五年面失先君先孺人愛之年二十有一以歸劉氏事皇舅大夫公禮敬飭備下及旁側侍御委曲逢將􅀹有人所難者大夫公沒佐彦集理家事勤約不􅈈撫教諸子愛而有節其逮下有恩意門内之治雍如也淳熈八年年四十有三二月乙未以疾卒子男二人瑾瑱皆將仕郎女二人未嫁彦集將以是􅀊十月辛酉藏其柩於崇安縣西三里大夫公塋左若干歩謂予曰子盍銘諸予寡兄弟先君之遺女唯此妹予旣杜門山間而妹亦幸不逺嫁一􅀊中率再三見其逺别惟從其家之官時爲然然不一二􅀊輙歸復相見今其病死而予適從吏役歸則不復相見矣獨與彦集相持大慟而彦集又爲予道其將死時與家人訣别付託兒女狀尤使人不忍聞嗚呼孰謂吾妹而遽至此耶老病且哀不能文彊書此以識其壙且爲銘曰哀哀吾弟歸藏其丘懿此遺德後人之休邵武縣丞謝君墓碣銘臨川有隱君子曰溪堂先生謝君名逸字無逸與其弟竹友先生名薖字㓜槃俱學詩於黃太史氏而以清介㢘節有聞於時然皆不遇以死是以獨以其詩行於四方而其行業之懿則非其邑子有不得而詳焉是可歎巳竹友之子曰敏行字長訥自號中隱居士娶季氏生子曰源字資深始以進士得官爲文林郎邵武軍邵武縣丞且以慶恩得封其母爲太安人盖將有以大其門者而不幸以卒識者莫不傷之資深自㓜日誦數千言少長受經屬文有聲庠塾間士大夫之賢者來臨川聞其名莫不延致而賔禮之再試禮部中第宰相以兩先生故不使從吏部選言於上以爲建昌軍學教授居官静重有守然事有當爲亦不憚改革也嘗祠其郷之賢者五人於學以勸諸生而故劉侍郎季高爲之記秩滿諸生相率狀其行治扣漕臺請留之使者知其賢顧法不可因相與薦之得稍遷秩復教授江州州學未行遭父䘮終制調􅂭興府南昌縣丞㑹李侍郎仁甫將漕江西披輯舊聞以脩一路圖經於官属中獨以資深爲可與於此者又與諸使者共薦之嘗行邑事􅀊餘屬帥守以聚歛爲急諸邑奉承唯謹而資深獨無所屈常歎曰迫貧民以奉上官吾弗忍爲也帥守以是於資深獨不恱而邑人深德之旣去父兄子弟相與送之數里不絶帥守愧歎亟以薦書追而與之詣曹校考當改京祑㑹舉將有故不果遂來邵武當路者多知其賢而常平使者宋君若水尤敬重之又率同列交薦章下而資深巳病不起矣時年五十有八淳熈辛丑九月巳丑也資深天資渾厚人少見其喜怒未第時斆學以奉甘㫖教撫弟妹而婚嫁之郷黨稱其孝友家世清貧獨有園㕓數畒中隱君旣以其號榜之至資深雖從官然於生産亦不能有所増益獨葺此園築室其間雜蒔花木􅂼果桑竹暇日挾􅁽吟哦其間雖飯䟽飲水不自知其有不足也其詩秀潤和雅有二祖風致存者百餘篇號空齋詩藁云資深娶同郡黃氏生三男五女男曰樞曰機曰椿女所適曰嚴享甫曰饒祁餘未有行也資深在邵武時嘗以檄書便道過我予雅聞資深名一見即知其長者旣去遊武夷山水間得予所結廬處復留詩見屬予以是又知其句律之妙可追前輩無慚也顧未及酬而聞其訃又以病不能往弔今樞等旣葬資深中隱君墓之側而以書奉資深親友呉君炳若之狀來請銘時予方病欲謝不能又念資深前日賦詩相属之意不可以終莫之償也乃爲之銘銘曰惟君家世隱淪載其德之後人君承之勢欲振􅂗未半隕厥身藏於斯從隱君陵爲谷訂此文司農寺丞翁君墓碣銘紹興中宰相秦檜專柄用事諸有故怨及不附巳者皆誣以罪竄嶺海故相趙忠簡公用此死朱崖天子哀之還其柩將葬衢州常山縣郡將章傑紹聖丞相惇諸孫雅怨趙公當國時奉詔治惇罪又希檜㫖陽以善意檄常山尉翁君􅀩之護其䘮一日下書翁君曰趙氏􅀻爲酒以飲役夫亟捕寘之法而隂使人喻意使并搜取趙公平日知舊往來書䟽欲以敗趙氏快􅀻憾且媚檜取羙官翁君不可則㗖以利又不可則脅以威往反再三翁君度傑意壯不但巳或更屬它吏則事有不可爲者即宻告趙氏夜取諸文書悉燒之無片􅁓在翌旦乃往爲搜捕者而以無所得告傑怒又廉知翁君女弟適故禮部侍郎胡公寅實當時草詔罪狀惇者益怒乃誣翁君它罪劾之㑹胡公弟寧爲尚書郎具以其事白檜檜亦悟爲傑所賣下其事安撫使問狀徙翁君官旁郡趙氏亦竟得無它而傑遂廢不復用當是時天下莫不高翁君之􅁩慕翁君之名而想見其爲人者今天子即位近臣乃以其事聞上亟召見嘉歎其節改秩再除中都官皆以省貟􅀘外晚乃歸爲司農寺丞未幾而卒聞者莫不哀之君字子功世家建寧府崇安縣之白水村大父彦深宣和中爲祕書少監梁師成欲一見之不可得遂乆不徙官其後歷國子􅀕酒太常少卿以集英殿脩撰歸老于家父揆文林郎宻州司士曹事亦以文行知名蚤卒君以集英任􅀘登仕郎調右迪功郎尉常山移婺之蘭溪更調明州司理參軍以母䘮不赴主管吏部架閣文字又以少母䘮去官改郎監登聞鼓院出爲江南東路安撫司主管機宜文字當塗澇疫君以檄按行拯療極力全活甚衆除軍器監丞又主江西安撫機宜文字復值􅀊凶君佐其府咨訪處畫用力􅀹多使龔公茂良與諸使者合言於朝乃召丞大農卒時年五十有二淳熈元年二月十三日也君自㓜卓犖不群曹偶敬憚而孝謹順悌事集英及母兄無間言兄沒撫其􅀌甚厚嫁其女先巳女集英引年恩當及君子君推以予從祖弟履之家居不問有無仕官不計升黜至於周人之急則亦不復知有難易多寡之擇即有不逮雖奔走乞貸勞辱不憚也歷陽張􅀳彦以子孝祥􅀍親擢冠多士故忤相檜意逮繋廷尉親舊畏禍及巳莫與通求所以爲橐饘費者無所得君聞之獨􅁣然謁其兄罄家貲得白金百兩遺之會檜死事壹解後張氏父子俱官逹以此德君終其身不能忘君與之遊亦每規正其失無所避人兩賢之在江西時同寮劉氏子􅄾奔父䘮病疫甚殆人莫敢視君獨輿致其家蚤暮躬治粥藥􅄾得不死它所爲􅀋此人所難者甚衆不勝紀平居食客滿堂莫非有求於君者而君不之厭也娶李氏紹興史官彌正之女先卒無子以從祖兄誠之之子樗年爲後一女適修職郎王伸君家自集英時有别業金陵君即居之旣卒遂葬江寧縣西北村祔以李氏後數年君之甥豫章通守胡君大原狀君行事以來曰舅氏志未克申而不幸至此其高節馴行有不可以弗識者子盍識諸吾且刻其墓上予婦家與君有連姻得蚤從君游相期甚厚讀其書爲出涕不忍辭也乃書其事而銘之銘曰仁全故家知折姦謀勇蹈大難賁育其儔偉哉若人躬此逹德俛哉終身靡有回遹無曰斯丘四尺之崇忘􅀻起懦千載高風晦庵先生朱文公文集卷第九十一候官縣儒學訓導劉簮校
