body:
  text: 書問答論事與籍溪胡原仲先生熹拜覆正字丈丈尊前熹拜違教席忽巳月餘瞻慕之誠食息不置即日秋暑未䦨伏惟祕府清暇尊候動止萬福熹侍親養疾幸粗遣不煩賜念但自别後殊不聞動静今日拜省二十姑亦云未得到在所消息不勝懸想耳計程月初可到今想視事乆矣官居廪食之况不敢問物情時變必巳了然於胷中矣如有用我而將奚先此則區區所欲聞也因來賜書願以開示少紓畎畒之憂幸甚幸甚吾道不幸范丈前月十八日遂不起疾憂時深切信道篤誠世豈復有斯人哉前此往哭其殯視其家生理蕭然未知所稅衆議葬於渭曲從其卜居之志甚善但聞其家欲居㤗寧似非良計然伯修樂之人不得而間也熹初與元履諸人議以爲居建陽一則便於墳墓二則便於講學三則便於生事言之甚詳未有見從之意􅀼惟范丈平日教誨之􅁩未敢黙然故敢復言於左右伏想一慟之餘亦當念之至此因書一提其耳或能改轍東來則甚善也八哥此月亦物故其重不幸如此可傷伯逢令姪自崇安徑趨邵武聞留止數日想今巳行矣不得一見甚以爲恨共父數相見否迎侍乍到不知爲况又如何旬父後月􅀄可歸到尚留邵武旦夕亦當歸也山中絶無事早秔􅀵熟斗榖售十五錢小民無他恙幸可寧息謾恐欲知之熹衰疾幸不作氣體似亦差勝向欲得眞齊州半夏合固真丹不知都下有之否如可㝷訪乞爲置得一二兩便中􅀉示幸甚蓋病雖小愈不得不過爲隄防也伯誠仙尉尊兄想非晩可歸矣不敢别狀天氣向凉伏乞順時保重行􅁬壯猷以慰人望謹啓不備與籍溪胡先生熹拜覆正字丈丈尊前前月附便拜書不知巳逹尊視否自拜違後一向不聞問數日前拜省二十姑宜人􅀩出示家問􅀗聞詳實深以爲喜承嘗有賜書然亦未拜領也即日秋氣澄明伏惟尊候動止萬福熹奉親養疾幸安田里不敢上勤紀録但里中秋來闕雨此數日来晩稻秀而將實尤覺焦渇爲患方議祈禱謾恐欲知范丈卜以重陽日葬近得伯崇書令爲䖏葬禮一二變節一日爲檢閱今日方略定矣逺地不得求正於丈丈及有爲撰壙中誌石文并俟他日請教倦甚拜書不能詳范家事於共父書中言之頗子細乞轉詢之也熹前書所議謀居一事與前日所見家問中意偶合此事􅀔難復與盖其家巳目元履與熹爲伯崇之黨矣可歎之甚然不能息意者政以范丈平日教誨之德不敢忘耳得丈丈因書告語之甚善秋巳向深江上消息如何得且平善甚幸然愚意反以爲憂蓋今出師防戍轉輸科歛所不能免聞沿江海州縣巳騷然矣歳􅀊如此何以支吾此不待兩兵相加而坐受弊之􅀔也前日劉子源来此道嶺上拜别所聞誨言以爲必極論天下事至於慷􅁣洒涕有以見仁人之心不能忘世如此近又見共父家兵士說丈丈至彼耳􅃪漸聦天其或者將一試大儒之效乎聞之喜而不􅄰伏計必有規模素定於胷中熹竊謂天下形􅀔如前所云者亦當路所不可不知也救之之術獨在救其本根而巳若隨其變而一一應之則其變無窮豈可勝救也哉而所謂救其本根之術不過視天下人望之所屬者舉而用之使其舉措用舎必當於人心則天下之心翕然聚於朝廷之上其氣力易以鼓動如羸病之人鍼藥所不能及􅌊其丹田氣海則氣血萃於本根而耳目手足利矣不審丈丈以爲如何因筆不覺及此燈下作書目力方倦極草草不如法伏乞尊察未拜侍間伏乞保重以俟休命中秋前一日謹拜啓不備熹拜覆與范直閣胡丈書中復主前日一貫之說甚力但云若理㑹得向上一著則無有内外上下逺近邊際廓然四通八逹矣熹竊謂此語深符鄙意盖旣無有内外邊際則何往而非一貫哉忠恕盖指其近而言之而其意則在言外矣聞子直說吾丈猶未以卑論爲然敢復其說如此幸垂教其是非焉熹頃至延平見李愿中丈問以一貫忠恕之說見謂忠恕正曾子見䖏及門人有問則亦以其所見諭之而巳豈有二言哉熹復問以近世儒者之說如何曰如此則道有二致矣非也其言適與卑意不約而合謾以布聞李丈名侗師事羅仲素先生羅嘗見伊川後卒業􅀛山之門深見稱許其棄後學乆矣李丈獨深得其閫奥經學純明􅆂養精粹延平士人甚尊事之請以爲郡學正雖不復應舉而温謙慤厚八與之䖏乆而不見其涯􅊊然君子人也先子與之遊數十年道􅁩之契甚深與范直閣伏奉賜教􅀗聞邇日起居之詳慰感亡以喻信後暑雨應候伏惟盛德所臨百神勞相台候萬福熹親旁粗遣未有可言者伏􅀩教諭忠恕之說自非愛予之􅀷不鄙其愚豈肯勤勤反復如此感幸深矣但伏思之終未有契䖏不敢隱黙請畢其詞以求正於左右熹前書所論忠恕則一而在聖人在學者則不能無異此正猶孟子言由仁義行與行仁義之别耳孟子之言不可謂以仁義爲有二則熹之言亦非謂忠恕爲有二也但聖賢所論各有所爲而發故當隨事而釋之雖明道先生見道之明亦不能合二者而爲一也非不能合盖不可合也彊而合之不降高以就卑即推近以爲逺始􅀝一偏終必乖戾盖非理之本然是乃所以爲不一也盖曽子專爲發明聖人一貫之㫖所謂由忠恕行者也子思專爲指示學者入德之方所謂行忠恕者也所指旣殊安得不以爲二然核其所以爲忠恕者則其本體盖未嘗不同也以此而論今所􅀍教問曲折可以無疑矣不識尊意以爲然否若夫曽子所言發明一貫之㫖熹前書一再論之皆未􅀩决其可否熹又有以明之蓋忠恕二字自衆人觀之於聖人分上極爲小事然聖人分上無非極致蓋旣曰一貫則無小大之殊故也猶天道至教四時行百物生莫非造化之神不可專以太虚無形爲道體而判形而下者爲粗迹也此孔子所謂吾無隱乎爾者不離日用之間二三子知之未至而疑其有隱則是正以道爲無形以日用忠恕爲粗迹故曽子於此指以示之耳此說雖陋乃二程先生之舊說上蔡謝先生又發明之顧熹之愚實未及此但以聞見之知推衍爲說是以不自知其當否而每有請焉更望詳覽前書重賜提誨不勝幸甚前日諸疑亦望早賜鐫譬俾母疑爲望時序向􅀬伏乞爲道保重以湏環召區區不勝大願不備與范直閣四月一日領所賜教帖伏讀再三仰佩眷予之厚感慰不可以言前日因平甫遣人亦嘗拜狀矣不審已逹台􅃪否即日􅀄夏清和伏惟班布多暇台候起居萬福熹奉親屏䖏幸粗遣免山間深僻亦可觀書又得胡丈來歸朝夕有就正之所窮約之中此亦足樂矣迫於親養夏末湏爲武林之行計不三四月未得定居也伏􅀩别􅁓垂諭忠恕義仰荷不棄其愚與之反復爲賜甚厚謹以来教所示熟思之矣敢復爲說以請益焉熹所謂忠恕者乃曾子於一貫之語黙有所契因門人之問故於所見道體之中指此二事日用最切者以明道之無所不在所謂已矣者又以見隨寓各足無非全體也忠恕兩字在聖人有聖人之用在學者有學者之用如曾子所言則聖人之忠恕也無非極致二程所謂維天之命於穆不已天地變化草水蕃者正所以發明此義也如夫子所以告學者與子思中庸之說則爲學者言之也故明道先生謂曾子所言與違道不逺異者動以天爾盖動以天者事皆處極曾子之所言者是也學者之於忠恕未免參校彼巳推巳及人則宜其未能誠一於天安得與聖人之忠恕者同日而語也若曽子之所言則以聖人之忠恕言之而見其與性與天道者未嘗有二所以爲一貫也然此所謂異者亦以所至之不同言之猶中庸安行利行勉行之别耳苟下學而上逹焉則亦豈有所隔閡哉愚見如此更乞教其不至者重賜鐫曉使得所正焉不勝幸甚他疑義尚多􅀩諭使得請敎此􅀫昔之願但今日方聞伯崇欲以􅀄三四日行迫􅃍未暇抄録所記俟暇日料理有便即附行也前日在共父處見直閣丈還朝陛對副本讀之不能舎去愛君敬主之義盖終篇三致意焉然乆矣莫以此言謦欬吾君之側者矣近日所用雖不能盡滿人望其間若亦有一二端士焉前言儻見思乎思其言必用其人延登之命計亦非晩矣願爲斯道斯民厚自保重副此歸依與范直閣熹向嘗以忠恕一貫之􅀃質疑於亟丈伏􅀩鐫曉切至但於愚見尚有未安比因玩索遂於舊􅀃益有發明乃知前者請教之時雖畧窺大義然􅆂泳未乆􅀃詞未瑩致煩辨析之勤如此今再録近所訓義一叚拜呈乞賜批鑿可否示下容更思索續具咨請也去􅀊在同安獨居幾閱􅀊㸔論語近十篇其間疑處極多筆札不能載以求教伏􅁓但切馳仰與慶國卓夫人熹輙有愚見􅀄欲面禀今旣不成行敢此布之五哥嶽廟近自春中以来頓减遊燕復近書􅁽若常能如此寡過可期更望因書褒勸以􅅄成之且聞尊意欲爲經營幹官差遣不知然否熹則竊以爲不可近世人家子弟多因爲此壊却心性一生仕官費力盖其生長富貴本不知艱難一旦仕官便爲此官逐司只有使長一人可相拘轄又間有寛厚長者即以貴遊子弟相待不欲以法度見繩上無職事了辦之責下無吏民窺伺之憂而州縣守倅􅀔反出巳下可以凌轢故後生子弟爲此官者無不傲慢縱恣席􅀔凌人其謹􅅚者雖不至此亦縁不親民事觸事懵然非如州縣小吏等級相承職事相轄一日廢慢則罪戾及之故仕於州縣者常曉事而少過愚意以爲平父可且令參部受簿尉之屬乃爲正當若不欲如此即舎人兄爲營一稍在人下有職事喫人打罵差遣乃所以成就之若必欲與求幹官乃是置之有過之地誤其終身恐非太碩人高明教子之本意也受恩深厚冐昧及此皇恐皇恐熹所禀大槩如此更有曲折意度􅁓盡冩不得舎人兄長必深委悉只乞因其侍次試以問之必以爲然也熹又覆上黃端明八月十一日具位熹敢齋沐裁書請納再拜之禮于致政尚書端明文丈台座熹聞之孟子有言天下有逹尊三爵一齒一德一此言三者之尊逹于天下人所當敬而不可以慢焉者也雖然爵也齒也盖有偶然而得之者是以其尊施于朝廷者則不及於郷黨施于郷黨者則不及於朝廷而人之敬之也亦或以貌而不以心惟徳也者得於心充於身刑於家而推於郷黨而逹於朝廷者也有是而兼夫二者之尊焉則通行天下人莫不貴雖歛然退避不以自居而人之所以心恱而誠服者盖不可解矣恭惟明公以兩朝侍從元老上還印綬而退處于家自天子不敢煩以政賜之几杖而乞言焉其位與年固非偶然而得之者矣而明公則未嘗以是而自異於人其所以默而成之不言而信者則日新又新而未嘗有止也此天下知德之士所以莫不竊慕下風之義俱有執鞭之願而熹之愚則有甚焉者盖其平生氣禀偏駁治巳則不能謹於細㣲立志則不能持於常乆以至待人接物之際温厚和平之氣不能勝其粗厲猛起之心是以常竊自悼以爲安得朝夕望見明公之盛德容貌而師法其萬一庻幾可以飭身􅀘過於將來而不遂爲小人之歸也今日之來盖將頓首再拜于堂下以償其夙昔之願伏惟明公坐而受之使得自進於門人弟子之列而不􅀌其所以來之意則熹之幸也郷往之深不自知其僣越敢以書先于將命者而立于廡下以聽可否之命熹不勝皇恐之至與王􅀛齡熹窮居晩學無所肖似往者學不知方而過不自料妄以爲國家所恃以爲重天下所頼以爲安風俗所以旣漓而不可以復淳紀綱所以旣壊而不可以復理無一不係乎人焉是以聞天下之士有聲名節行爲時論所歸者則切切然以不得見乎其人爲歎及其乆也或得見之或不得見之而熹之拳拳不少衰也聞其進爲時用則私以爲喜聞其阨窮廢置則私以爲憂及夫要其所就而觀之則始終大節眞可敬仰者盖無幾人而言論風㫖卒無可稱功名事業卒無可紀者亦徃徃而有以此喟然自歎知天下所謂聲名節行者亦未足以定天下之人而天下之事未知其果將何􅀉也自是以來雖不敢易其賢賢之心緩其憂世之志然亦􅀼自􅀏其前日所求於人之重而所以自待者反輕如孟子之所譏也於是始復取其所聞於師友者夙夜講明動静體察求仁格物不敢弛其一日之勞以庻幾乎有聞者而於前日之所爲切切然者則旣有所不睱矣當是時聽於士大夫之論聽於輿人走卒之言下至於閭閻市里女婦兒童之聚亦莫不曰天下之望今有王公也已而得其爲進士時所奉大對讀之已而得其在舘閣時上奏事讀之已而得其爲柱史在臺諌遷侍郎時所論諌事讀之已而又得其爲故大丞相魏國公之誄文及楚東酬唱等詩讀之觀其立言措意上自奏對陳說下逮燕􅀏從容蓋無一言一字不出於天理人倫之大而世俗所謂利害得䘮榮辱死生之變一無所入於其中讀之真能使人胷中浩然鄙吝消落誠不自意克頑㢘懦立之效乃於吾身見之於是作而歎曰士之求仁固當以反求諸已爲務然豈不曰事其大夫之賢者云哉今以前日失數公者自懲是以一噎而廢食也於是􅁣然復有求見於左右之意而未􅀗也昨聞明公還自䕫州撫臨近甸而熹之里閈交游適有得佐下風者因以書賀之蓋喜其得賢大夫事之而自傷無狀獨不得一從賔客之後以望大君子道德之餘光也不意夤縁與其向來鄙妄無取之言皆得徹聞於視聽明公又不以凡陋爲可棄狂僣爲可罪而辱枉手筆以抵宋倅盛有以稱道竊惟明公之志豈非以世衰道㣲遺君後親之論交作肆行無所忌憚舉俗滔滔思有以障其橫流者是以有取於愚者一得之慮因以不求其素而借之辭色也耶明公之志則正矣大矣而熹之愚未有穪明公之意也雖然有一於此其惟益思砥礪不敢廢其所謂講明體察求仁格物之功者使理日益明義日益精操而存之日益固擴而充之日益逺則明公之賜庻乎其有以承之而幸明公之終教之也雖然明公以一身當四海士大夫軍民一面之責其一語一黙一動一静之間所係亦不輕矣伏惟盛德大業前定不窮其剛徤中正篤實輝光者固無所勉疆以熹之所覩記則古語所謂行百里者半九十里明公其亦念之况今人物􅆌然如明公者僅可一二數是以天下之人責望尤切而明公􅀹不可以不戒不審明公以爲如何哉熹又聞之古之君子尊德性矣而必曰道問學致廣大矣必曰盡精㣲極高明矣必曰道中庸温故知新矣必曰敦厚崇禮盖不如是則所學所守必有偏而不備之處惟其如是是故居上而不驕爲下而不倍有道則足以興無道則足以容而無一偏之蔽也熹之區區以此深有望於門下盖所謂德性廣大高明知新者必有所措而所謂問學精㣲中庸崇禮者又非别爲一事也狂易無取明公其必有以裁之徃者明公在䕫成都汪公聲聞宻邇竊意有足樂者此来時通問否此公􅆂養深厚寛静有容使當大事必有不動聲色而内外賔服者明公相知之深一日進爲於世引􅀋之舉其必有所先矣熹杜門養親足以自遣昨嘗一至湖湘岀資交遊講論之益歸來忽􅀍除命旣不敢辭而拜命矣然明公未歸朝廷熹亦何所望而敢前也引領牙纛未有瞻拜之期向風馳義日以勤止輙敢復因宋倅相爲介紹致書下執事以道其拳拳之誠伏惟照察與陳丞相一本作與龔實之熹竊觀古之君子有志於天下者莫不以致天下之賢爲急而其所以急於求賢者非欲使之綴緝言語譽道功德以爲一時觀聽之美而巳盖將以廣其見聞之所不及思慮之所不至且慮夫䖏巳接物之間或有未盡善者而將使之有以正之也是以其求之不得不􅀶其禮之不得不厚其待之不得不誠必使天下之賢識與不識莫不樂自􅃱於吾前以輔吾過然後吾之德業得以無愧乎隱微而寖極乎光大耳然彼賢者其明旣足以燭事理之微其守旣足以遵聖賢之轍則其自䖏必高而不能同流合汙以求譽自待必厚而不能陳詞飾說以自媒自信必篤而不能趨走唯諾以苟容也是以王公大人雖有好賢樂善之誠而未必得聞其姓名識其面目盡其心志之底藴又况􅀄無此意而其所取特在乎文字言語之間乎恭惟明公以厚德重望爲海内所宗仰者有年矣而天下之賢士大夫似未得盡出於門下也豈明公所以好之者未至歟所以求之者未力歟所以待之者未盡歟此則必有可得而言之者矣盖好士而取之文字言語之間則道學德行之士吾不得而聞之矣求士而取之投書獻啓之流則自重有恥之士吾不得而見之矣待士而雜之妄庸便佞之伍則志節慷􅁣之士寜有長揖而去耳而况乎所謂對偶駢儷䛕佞無實以求恱乎世俗之文又文字之末流非徒有志於高逺者鄙之而不爲若乃文士之有識者亦未有肯深留意於其間者也而聞者􅀼聽於下風似聞明公專欲以此評天下之士若其果然則熹竊以爲誤矣江右舊多文士而近歳以来行􅁩志節之士有聞者亦彬彬焉惟明公留意取其􅆠明正直者以自輔而又表其惇厚㢘退者以厲俗毋先文藝以後器識則陳太傅不得專美於前而天下之士亦庻乎不失望於明公矣衰病屏伏所欲靣論者非一而不􅀗前姑進其大者如此若􅀩采擇則熹所不及言者必有輕千里而告於明公者矣與劉共父近略到城中歸方數日見平父示近問承􅀉聲存問感感但所論二先生集則愚意不能無疑伯逢主張家學固應如此熹不敢議所不可觧者以老兄之聦明􅀶識欽夫之造詣精深而不曉此此可恠耳若此書是文定所著即湏依文定本爲正今此乃是二先生集但彼中本偶出文定家文定當時亦只是據所傳録之本雖文定盖不能保其無一字之訛也今别得善本復加􅀘綴乃是文定所欲聞文定復生亦無嫌間不知二兄何苦尚爾依違也此間所用二本固不能盡善亦有灼然却是此間本誤者當時更不曽冩去但只是平氣虚心看得義理通處便當從之豈可肚裏先横却一箇胡文定後不復信道理耶如定性書及明道叙述上冨公與謝帥書中刪􅁍數十字及辭官表倒􅁍次序易傳序改沿爲泝祭文改姪爲猶子之􅀋皆非本文必是文定刪改熹看得此數處有無甚害者但亦可惜改􅁍本文蓋本文自不害義理故也叙述及富謝書是也有曲爲回互而反失事實害義理者辭表是也曲爲回互便是私意害義理矣惟定性書首尾雖非要切之辭然明道謂横渠實父表弟聞道雖有先後然不􅀿以聞道之故傲其父兄如此語録􅀃二先生與學者語有不合處明道則曰更有啇量伊川則直云不是明道氣象如此與今􅀁刪之書氣象􅀋乎不􅀋乎且文定答學者書雖有不合亦甚宛轉不至如此無含蓄況明道乎今如此刪去不過是减得數十箇閑字而壊􅁍一箇從容和樂底大體氣象恐文定亦是偶然一時意思欲直截發明向上事更不暇照管此等處或是當時未見全本亦不可知今豈可曲意狥從耶向見李先生本出􅀛山家猶雜以游察院之文比訪得㳺集乃知其誤以白先生先生歎息曰此書􅀁自來可謂端的猶有此誤況其它又可盡信耶只此便是虚巳從善公平正大之心本亦不是難事但今人先着一箇私意横在肚裏便見此等事爲難及耳又猶子二字前論未盡禮記云喪服兄弟之子猶子也言人爲兄弟之子喪服猶巳之子非􅀁施於平時也況猶字本亦不是稱呼只是記禮者之辭如下文嫂叔之無服姑姊妹之薄也今豈可沿此遂謂嫂爲無服而名姑姊妹以薄乎古人固不謂兄弟之子爲姪然亦無云猶子者但云兄之子弟之子孫亦曰兄孫耳二先生非不知此然猶從俗稱姪者蓋亦無害於義理也此等處文定旣得以一時已見改易二程本文今人乃不得據相傳别本改正文定􅀁改之未安處此何理耶又明道論王覇劄子等數篇胡本亦無乃此間録去有􅀁脫誤非文定之失伊川上仁廟書此間本無後來乃是用欽夫元􅀉胡家本校亦脫兩句此非以他人本改文定本乃是印本自不曽依得文定本耳似此之􅀋恐是全不曽參照只見人來說自家刻得文字多錯校得不精便一切逆拒之㡬何而不爲訑訑之聲音顔色拒人於千里之外乎夫樂聞過勇遷善有大於此者猶將有望於兩兄不意只此一小事便直如此殊失􅀁望然則區區􅀁以劇論不置者正恐此私意根株消磨不去隨事滋長爲害不細亦不專爲二先生之文也如必以胡氏之書一字不可改易則又請以一事明之集中與吕與叔論中書注云子居和叔之子胡氏編語録時意其爲邢恕之子遂削此注直於正文子居之上加一邢字頃疑吕氏亦有和叔因以書問欽夫答云嘗問之邢氏果無子居者以此例之則胡氏之書亦豈能一無繆誤乃欲不問是非一切從之乎況此刀文字間舛誤與其本原節目處􅀄無􅀁妨何必一一遵之而不敢改乎近以文定當立祠於郷郡􅀃􅀿求􅀖彦二公皆指其小節疑之魏元履至爲扼腕今二兄欲尊師之而又守其尤小節處以爲不可改是文定有􅀁謂大者終不見知於當世也此等處非特二先生之文之不幸亦文定之不幸耳今旣用官錢刋一部書却全不賭是只守却胡家錯本文字以爲至當可謂直截不成議論恐文定之心却湏該遍流通决不如是之陋也若􅀃文定决然主張此書以爲天下後世必當依此即與五介甫主張三經字􅀃何異作是􅀃者却是謗文定矣設使㣲似有此亦是克未盡底巳私􅀁謂賢者之過横渠􅀁謂其不善者共改之正􅀁望於後學不當守巳殘而妬道眞使其遺風餘弊波蕩於末流也程子嘗言人之爲學其失在於自主張太過横渠猶戒以自處太重無復以來天下之善今觀二兄主張此事得無近此聖賢稽衆舎巳兼聽並觀之意似不然也胡子知言亦云學欲約不欲陋此得無近於陋耶如云當於他處别刋此尤是不情悠悠之􅀃與月攘一雞何異非小生􅀁敢聞也每恨此道衰㣲邪􅀃昌熾舉世無可告語者望二兄於千里之外盖不翅飢渴之於飲食乃不知主意如此偏枯若得從容賔客之後終日正言又不知􅀁以不合者復㡬何耳欽夫尊兄不及别狀􅀁欲言者不過如此幸爲呈似􅀁云或不中理却望指教熹却不敢憚改也向􅀁録去數紙合改處當時極費心力又且勞煩衆人意以爲必依此改正故此間更無别本今旣不用切勿毁棄千萬盡爲収拾便中􅀉來當十襲藏之以俟後世耳向求數十本欲遍遺朋友今亦不湏􅀉來熹不敢以此等錯本文字誤朋友也天寒手凍作字不成不能傾竭懐抱惟加察而恕其狂妄可也與劉共父修德之􅀃但云主上憂勤恭儉非不修德然而上而天心未豫下而人心未和凡􅀁欲爲多不響􅀿疑於修德之實有未至焉蓋修德之實在乎去人欲存天理人欲不必聲色貨利之娯宫室觀遊之侈也但存諸心者小失其正便是人欲必也存祗懼之心以畏天擴寛宏之度以盡下不敢自是而欲人必巳同不徇偏見而謂衆無足取不甘受侫人而外敬正士不狃於近利而昧於逺猷出入起居發號施令念兹在兹不敢忘怠而又擇端人正士剛明忠直能盡言極諌者朝夕與居左右不使近習便利捷給之人得以窺伺間􅂩承迎指意汙染氣習惑亂聦明務使此心虚明廣大平正中和表裏洞然無一豪私意之累然後爲德之脩而上可以格天下可以感人凡􅀁欲爲無不如志陛下自省於是數者其心有得於中乎其方從事於此而有未至乎其無乃謂此無益而正背馳乎一有不合乎此則臣恐􅀁謂修徳之實者有􅀁未至也恢復之形一叚切中今日之病前日籖帖更定數語非是欲苟全正論蓋只此豪􅁵之間便是人欲天理同行異情處不可不精察而明辨也夫内修自治本是吾事􅀁當爲非欲與人爲敵然後爲之而爲之之道必急其實而緩其名必以深厚淵塞爲務而不爲浮薄淺露之態然後可以蓄可乆之徳而成可大之功亦非爲畏泄其機而固爲是不可測也若謂姑爲純正之論而其實必用機心扶隂謀然後可則是心迹乖離内外判析孔子讀而儀秦行矣彼管仲啇君呉起申不害非無一切之功而􅀁以卒得罪於聖人之門者正在於此願明者之熟察之也與劉共父平父示别􅁓諭及明道冠服事熹初意旣在學校立祠密邇先聖先師之側則不􅀿直用野服爲象故有此議兼在延平學中見曹御史陳了翁象亦是豸冠法服二公自去諌職流落於外皆非卒於其官者見聞習熟因欲援以爲例而未嘗計其當時之得失也今如或者之言固亦有理但明道之爲御史初非攝官而宗正除未嘗就職此其考之亦恐有未精也竊謂今日御史法冠乃是追用其平生冠服之最盛者似亦無害於理不然則直用承議郎本品法服亦佳據㑹要則九品官皆有法服但不知元豐官制後􅀉禄官有法服與否耳又不然則直用幞頭公服亦可甞見其家畫本緋衣也但太不近古耳鄙見如此更惟髙明裁之或者􅀁謂伊川祠堂之制不知何謂更告詢之并問何人􅀁立今在何處可也與劉共父熹前幅􅀁禀訪問人材事初若率然旣而思之此最急務然其意有未盡者輙詳論之如左云古之大臣以其一身任天下之重非以其一耳目之聦明一手足之勤力爲能周天下之事也其􅀁頼以共正君心同斷國論必有待於衆賢之􅂇焉是以君子將以其身任此責者必咨詢訪問取之於無事之時而參伍校量用之扵有事之日蓋方其責之必加扵巳而未及也無旦暮倉卒之須則其觀之得以乆無利害紛拏之惑則其察之得以精誠心素著則其得之多歳引月長則其蓄之富自重者無􅀁嫌而敢進則無幽隱之不盡欲進者無􅀁爲而不來則無巧僞之亂眞乆且精故有以知其短長之實而不差多且富故有以使其更迭爲用而不竭幽隱畢逹則讜言日聞而吾徳脩取舎不眩則望實日􅂭而士心附此古之君子􅀁以成尊主庇民之功於一時而其遺風餘韻猶有稱思於後世者也今之人則不然其於天下之士固有漠然不以爲意者矣其求之者又或得之近而不知其遺於逺足於少而不知其漏於多求之備而不知其失於詳也其平居暇日􅀁以自任者雖重而􅀁以待天下之士者不過如此是以勤勞惻怛雖盡於鰥寡孤獨之情而未及乎本根長乆之計恩威功譽雖播於兒童走卒之口而未諭乎賢士大夫之心此蓋未及乎有爲而天下之士先以訑訑之聲音顔色待之矣至於臨事倉卒而􅀁蓄之材不足以待用乃始欲泛然求巳􅀁未知之賢而用之不亦難哉或曰然則未當其任而欲先得天下之賢者冝柰何曰權力􅀁及則察之舉之禮際􅀁及則親之厚之皆不及則稱之譽之又不及則郷之慕之如是而猶以爲未足也又於其􅀋而求之不以小惡揜大善不以衆短棄一長其如此而巳抑吾聞之李文公之言曰有人告曰某􅀁有女國色也天下之人必將極其力而求之無􅀁愛也有人告曰某所有人國士也天下之人則不能一徃而先焉此豈非好德不如好色者乎嗚呼欲任天下之重者誠反此而求之則亦無患乎土之不至矣答韓無咎誨諭儒釋之異在乎分合之間旣聞命矣頃見蘇子由張子韶書皆以佛學有得於形而上者而不可以治世嘗竊􅀏之是豈知天命之性而叙秩命討巳粲然無􅀁不具於其中乎彼其􅀁以分者是亦未嘗眞有得於斯耳不審髙明以爲如何和靖兩書昔嘗見之其謹於傳疑之意則是而遂欲禁絶學者使不復觀則恐過矣如以春秋改用夏時爲無此􅀃以傳爲按經爲斷爲背於理則疑其考之未精或未盡聞他人􅀁聞而欲一以巳􅀁聞者槩之之失也春秋傳乃伊川􅀁自著其詞有曰周正月非春也假天時以立義耳若果無改用夏時之意則此􅀃復何謂乎况序文􅀁引論語之言尤爲明白不可謂初未嘗有此意也又門人􅀁記有答黄聱隅之語謂以傳考經之事迹以經别傳之眞僞者蓋見於兩家之書是亦猶􅀁謂傳爲案經爲斷之意而豈二人􅀁記不期而皆誤乎推此兩條則凡和静􅀁謂非先生語者恐特他人聞之而和静亦未聞耳今疑信未分而不復思繹遽以一偏之􅀃盡廢衆人􅀁傳之書似不若盡存其􅀃而深思熟講以考其眞僞得失之爲善也況明道行狀云其辨析精㣲稍見於世者學者之􅀁傳耳觀此則伊川之意亦非全不令學者看語録但在人自着眼看耳如論語之書亦是七十子之門人纂録成書今未有以爲非孔子自作而棄不讀者此皆語録不可廢之驗幸更深察之如何如何與芮國器燁竊聞學政一新多士風動深副區區之望但今日學制近出崇觀專以月書季攷爲陞黜使學者屑屑然較計得失於毫􅁵間而近嵗之俗又專務以文字新竒相髙不復根據經之本義以故學者益騖於華靡無復探索根原敦勵名檢之志大抵􅀁以破壊其心術者不一而足蓋先王􅀁以明倫善俗成就人材之意掃地盡矣惟元祐間伊川程夫子在朝與修學制獨有意乎深革其弊而當時咸謂之迂闊無􅀁施行今其書具在意者後之君子必有能舉而行之區區願執事少加意焉則學者之幸也又蘇氏學術不正其險譎慢易之習入人心深今乃大覺其害亦望有以抑之使歸於正尤􅀁幸願與芮國器昨者妄以鄙見薦聞伏􅀩垂諭反復其􅀃幸甚幸甚然熹竊以爲未嘗行之不可逆料今日之不可行且事亦顧理之􅀁在如何耳理在當行不以行之難易爲作輟也盡心竭力而爲之不幸而至於眞不可行然後巳焉則亦無􅀁憾於吾心矣蘇氏之學以雄深敏妙之文煽其傾危變幻之習以故􅀍其毒者淪肌浹髓而不自知今日正當抜本塞源以一學者之聽庶乎其可以障狂瀾而東之若方且懲之而又遽有取其􅀁長之意􅀼恐學者未知􅀁擇一取一捨之間又將與之俱化而無以自還是則執事者之􅀁宜憂也答鄭景望龔帥過建陽遣人相聞不及一見爲恨今日季教授見訪云嘗小􅅃道其語皆出於忠厚長者然在愚意尚未有深解處如論范忠宣救蔡新州及元祐流人以爲至當之舉熹嘗竊論此矣以爲元祐諸賢憂確之不可制欲以口語擠之固爲未當而范公乃欲預爲自全之計是亦未免於自私皆非天討有罪之意也至其論諸公忽反爾之言違好還之戒自取禍敗尤非正理使後世見無禮於君親者拱手坐視而不敢逐則必此言之爲也且舜流四凶族爲臯陶者亦殊不念反爾之戒何耶推此心以徃恐無適而非私者邵子文以爲明道􅀁見與忠宣合正恐徒見􅀁施之相似而未見􅀁􅀤之不同蓋毫􅁵之間天理人欲之差有不可同年而語者矣又聞深以好名爲戒此固然矣然偏持此論將恐廉隅毁頓其弊有甚於好名故先聖云君子疾没世而名不稱焉而又曰君子求諸巳詳味此言不偏不􅀝表裏該備此其􅀁以爲聖人之言歟學者要當於此玩心則勿忘勿助之間天理卓然事事物物無非至當矣熹又記向􅀩靣誨堯舜之世一用輕刑當時嘗以􅀁疑爲請匆匆不及究其􅀃近熟思之有不可不論者但觀臯陶􅀁言帝德罔愆以下一節便是聖人之心涵育􅀤生眞與天地同德而物或自逆于理以干天誅則夫輕重取舎之間自有决然不易之理其宥過非私恩其刑故非私怒罪疑而輕非姑息功疑而重非過予如天地四時之運寒凉肅殺常居其半而涵養發生之心未始不流行乎其間此􅀁以好生之德洽于民心而自不犯于有司非旣犯而縱舎之謂也不審髙明以爲如何又别本聞二十一日旌斾定行何丞之諭巳不及事矣然渠􅀁言大槩謂盗賊之餘土曠人稀州縣以昔日嵗計之額取辦今日見存之戸民力素巳不堪後來復以荒田之産均之見戸由此流移愈多公私愈困耳向􅀩靣誨堯舜之世一用輕刑當時嘗以􅀁疑爲請匆匆不及究其􅀃近熟思之亦有不可不論者但觀臯陶􅀁言帝徳罔愆以下一節便見聖人之心涵育發生其與天地同德而物或自逆于理以干天誅則夫輕重取舎之間亦自有決然不易之理其宥過非私恩其刑故非私怒罪疑而輕非姑息功疑而重非過予如天地四時之運寒凉肅殺常居其半而涵育發生之心未始不流行乎其間此􅀁以好生之徳洽于民心而自不犯于有司非旣抵冐而復縱舎之也夫旣不能止民之惡而又爲輕刑以誘之使得以肆其㐫􅁀於人而無􅀁忌則不惟彼見􅁀者無以自伸之爲􅁈而姦民之犯于有司者且將日以益衆亦非聖人匡直輔翼使民迁善逺罪之意也答鄭景望虞書論刑最詳而舜典􅀁記尤宻其曰象以典刑者象如天之垂象以示人而典者常也示人以常刑􅀁謂墨劓剕宫大辟五刑之正也􅀁以待夫元惡大憝殺人傷人穿窬滛放凡罪之不可宥者也曰流宥五刑者流放竄殛之􅀋􅀁以待夫罪之稍輕雖入於五刑而情可矜法可疑與夫親貴勲勞而不可加以刑者也四凶正合此法曰鞭作官刑扑作教刑者官府學校之刑以待夫罪之輕者也曰金作贖刑罪之極輕雖入於鞭朴之刑而情法猶有可議者也疑後世始有贖五刑法非聖人意也此五句者從重及輕各有條理法之正也曰􅌌災肆赦者􅌌謂過悞災謂不幸若人有如此而入於當贖之刑則亦不罰其金而直赦之也此一條專爲輕刑設春秋肆大􅌌則過悞之大入于典刑者亦肆之矣所以爲失刑也書又曰宥過無大明過之大入於典刑者特用流法以宥之耳曰怙終賊刑者怙謂有恃終謂再犯若人有如此而入于當宥之法則亦不宥以流而必刑之也此二句者或由重而即輕或由䡖而入重猶今律之有名例又用法之􅁠衡􅀁謂法外意也聖人立法制刑之本末此七言者大略盡之矣雖其䡖重取舎陽舒隂慘之不同然欽㢤欽哉惟刑之恤之意則未始不行乎其間也盖其輕重毫􅁵之間各有攸當者乃天討不易之定理而欽恤之意行乎其間則可以見聖人好生之本心矣夫豈一於輕而巳哉又以舜命皐陶之辭考之士官􅀁掌惟象流二法而巳鞭朴以下官府學校隨事施行不領於士官事之宜也其曰惟明克允則或刑或宥亦惟其當而無以加矣又豈一於宥而無刑哉今必曰堯舜之世有宥而無刑則是殺人者不死而傷人者不刑也是聖人之心不忍於元惡大憝而反忍於衘􅁈抱痛之良民也是􅀁謂怙終賊刑刑故無小者皆爲空言以悞後世也其必不然也亦明矣夫刑雖非先王􅀁恃以爲治然以刑弼教禁民爲非則􅀁謂傷肌膚以懲惡者亦旣竭心思而繼之以不忍人之政之一端也今徒流之法旣不足以止穿窬􅁋放之姦而其過於重者則又有不當死而死如彊􅁀􅂍滿之􅀋者苟采陳羣之議一以宫剕之辟當之則雖殘其支體而實全其軀命且絶其爲亂之本而使後無以肆焉豈不仰合先王之意而下適當世之宜哉況君子得志而有爲則養之之具教之之術亦必隨力之􅀁至而汲汲焉固不􅀿因循苟且直以不養不教爲當然而熟視其爭奪相殺於前也答鄭景望初謂按行㳙吉必不渝期今􅀁賜字殊未及此何耶逺民傾首以聴車馬之音乆矣行期屢却無乃使之失望而下吏之奉約束聽期㑹者將亦因是解弛而不䖍乎伏惟執事者試深慮之􅆫易及此皇懼之至示諭明道程文不必見於正集考求前此固多如此然先生􅀿舉時巳自聞道今讀其文􅀁論無非正理非如今世舉子阿時徇俗之文乃有愧而不可傳也曽南豐序王深父之文以爲片言半簡非大義􅀁繋皆存而不去􅀁以明深父之於細行皆可傳也况先生非欲以文顯者而即此程文便可見其經綸之業巳具於此時雖文采不􅃩而卓然皆有可行之實正學以言未嘗有一辭之苟其􅀁以警悟後學亦不爲不深矣愚意只欲仍舊次第不審台意以爲如何答鄭景望家祭禮三䇿并上不知可􅀘入見版本卷中否若可添入即孟詵徐􅃳兩家當在賈頊家薦儀之後孟爲第七徐爲第八而遞僣以後篇數至政和五禮爲第十一而繼以孫日用爲第十二乃以杜公四時祭享儀爲第十三而遞儧以後至范氏祭儀爲第十九又於後序中改十有六爲十有九仍刪去孟詵徐􅃳孫日用七字此版湏别換不然即存舊序而别作數語附見其後尢爲詳實不審尊意以爲如何更俟誨諭也但寫校須令精審無誤然後刻版免致將來更改費力爲佳或未刻間且并冩定上版眞本􅀉示容與諸生詳勘納上尤便也答􅀹延之袤熹杜門竊食不敢與聞外間一事尚不能無虎食其外之憂衰病疲薾雖在山林亦不能有㝷幽選勝之樂但時有一二學子相從於寂寞之濵講論古人爲巳之學至㑹心處輙復欣然忘食不自知道學之犯科也年來目昏不甚敢讀書經􅀃閑看踈漏頗多不免隨事改正比舊又差勝矣綱目不敢動着恐遂爲千古之恨􅀩教楊雄荀彧二事按温公舊例凡莽臣皆書死如太師王舜之􅀋獨於楊雄匿其􅀁受莽朝官稱而以卒書似渉曲筆不免却按本例書之曰莾大夫楊雄死以爲足以警夫畏死失節之流而初亦未改温公直筆之正例也荀彧却是漢侍中光禄大夫而參丞相軍事其死乃是自殺故但據實書之曰某官某人自殺而系於曹操撃孫􅁠至濡須之下非故以彧爲漢臣也然悉書其官亦見其實漢天子近臣而附賊不忠之罪非與其爲漢臣也此等處當時極費區處不審竟得免於後世之公論否胡氏論彧爲操謀臣而劫遷九錫二事皆爲董昭先發故欲少緩九錫之議以俟他日徐自發之其不遂而自殺乃劉穆之之􅀋而宋齊丘於南唐事亦相似此論竊謂得彧之情不審尊意以爲何如李淙謝廓皆略識之李在此作縣甚得民情謝甚俊即任伯參政之孫其家有古書者也但呉仲權亦聞其名見其文字甚清警未知材氣如此也今日下位後生中尚不爲無人雖眞僞相半然亦且得勸勉奨就之未敢䡖有遺弃也陳同父近得書大言如昨亦力勸之令其稍就歛退若未見信即後日之患猶或有甚於此者甚可念也叔祖奉使葬事甚荷憐念此事初未敢有請不謂巳􅀩特逹如此不知今有定論否叔祖當日挺身請使留虜中十六年竟保全節而歸以奏對論和不可專恃且虜有可圖之釁忤秦丞相遂廢以死在虜中時嘗有祭徽廟文或傳以歸乙覧感動錫賚甚寵其書皆在此此便不的不敢附呈鄙意輙欲次其行事以請於左右幸而并賜之銘則宗族子孫皆受不貲之惠矣叔祖受知於晁景迂學甚愽詩甚工也荅尤延之垂諭楊雄事足見君子以恕待物之心區區鄙意正以其與王舜之徒􅀁以事莽者雖異而其爲事莾則同故竊取趙盾許止之例而槩以莽臣書之􅀁以著萬世臣子之戒明雖無臣賊之心但畏死貪生而有其迹則亦不免於誅絶之罪此正春秋謹嚴之法若温公之變例則不知何􅀁據依晩學愚昧實有􅀁不敢從也不審專意以爲如何如未中理却望垂教也答林黄中栗室戸之􅀃屡􅀩指教竟􅀁未曉盖如􅀁論即室戸乃在房之西偏而入室者先必由房而後進至于室矣歴考禮書不見此曲折䖏郤子之登必自西階房戸雖在室戸之東盖亦無􅀁經見恐未足以證室戸之必東出也愚意於此深􅀁未解更丐一言以發其蔽幸甚幸甚又見易圖深詆邵氏先天之􅀃舊亦甞見其書然未曉其􅀁以爲􅀃者髙明旣斥其短必巳洞見其底藴矣因來并乞數語掊撃其繆又大幸也答林黄中誨喻縷縷備悉樂章必巳得之因風幸早示及丘推參選未還尚未得聞室戸之誨大抵􅀁欲知者此戸南鄕西鄕果安􅀁决而經傳實據果安􅀁取不論傳授之有無也邵氏先天之􅀃以鄙見窺之如井蛙之議滄海而髙明直以不知而作斥之則小大之不同量有不可同年而語者此熹之前書所以未敢輕效其愚而姑少見其􅀁疑也示諭邵氏本以發明易道而於易無􅀁發明熹則以爲易之與道非有異也易道旣明則易之爲書卦爻象数皆在其中不待論􅀃而自然可覩若曰道明而書不白則􅀁謂道者恐未得爲道之眞也不審髙明之意果如何其或文予而實不予則熹請以邵氏之淺近踈略者言之盖一圗之内太極兩儀四象八卦生出次第位置行列不待安排而粲然有序以至於第四分而爲十六第五分而爲三十二第六分而爲六十四則其因而重之亦不待用意推移而與前之三分焉者未甞不脗合也比之并累三陽以爲乾連疊三隂以爲坤然後以意交錯而成六子又先畫八卦於内復畫八卦於外以旋相加而後得爲六十四卦者其出於天理之自然與人爲之造作蓋不同矣况其髙深閑闊精密㣲妙又有非熹之􅀁能言者今不之察而遽以不知而作詆之熹恐後之議今猶今之議昔是以竊爲門下惜之而不自知其言之僣易也答林黄中􅀁扣鄉飲酒疑義近細考􅀁奏樂有不用二南小雅六笙詩而用南吕無射兩宫十章不知何據豈有以見古之鄕樂用此律而冩其遺聲邪將古樂巳亡不可稽考而别制此樂也然則特用此律其㫖安在又所奏樂必有辭聲必有譜而律之短長必有定論凡此數端皆􅀁未諭幸因風詳悉指教與郭沖晦熹窮鄕晩出妄竊有志於道雖幸有聞於師友而行之不力荏苒頺侵今犬馬之年五十有一矣脩身齊家未有可見之効而志氣不彊不能固守貧賤之節彊起從宦舊學愈荒施之於人尤齟齬而不合大抵志不能帥氣理未能勝私中夜以思怛然内疚髙明不鄙不知將何以教誨之熹􅀁拱而竢也向來次輯諸書雖亦各有據依不敢妄意損益然疑信異􅀓不無牴牾嘗得汪丈端明示以執事􅀁辨數事方且復書質之汪丈更求一二左驗别加是正則汪公巳􅂢賔客矣自此每念一扣門下以畢其􅀃而相去絶逺無從致問今幸得通姓名又以單車此來無復文書可以檢索不復記向之􅀁欲質問者尚俟異時還家别圖寓信但恐益逺難致耳近刻程先生尹和靖二帖及白鹿五賢二記各納一本伏幸視至其間恐有可因以垂教者切望不棄與郭沖晦易􅀃云數者䇿之􅀁宗而䇿爲巳定之數熹竊謂數是自然之數䇿即蓍之莖數也禮曰􅀛爲卜筴爲筮是巳老陽一爻過揲三十六䇿故積六爻而得二百一十有六䇿耳又云大衍之数五十是爲自然之數皆不可窮其義熹竊謂旣謂之數恐必有可窮之理又云竒者所掛之一也扐者左右兩揲之餘也得左右兩揲之餘寘於前以竒歸之也熹竊謂竒者左右四揲之餘也扐指間也謂四揲左手之䇿而歸其餘於無名指間四揲右手之䇿而歸其餘於中指之間也一掛之間凡再扐則五歳之間凡再閠之象也又云三多三少人言其數雖不差而其名非矣熹竊謂多少之􅀃雖不經見然其實以一約四以竒爲少以偶爲多而巳九八者兩其四也隂之偶也故謂之多五四者一其四也陽之竒也故謂之少竒陽體貟其法徑一圍三而用其全故少之數三偶隂體方其法徑一圍四而用其半故多之數二歸竒積三三而爲九則其過揲者四之而爲三十六矣歸竒積三二而爲六則其過揲者四之而爲二十四矣歸竒積二三一二而爲八則其過揲者四之而爲三十二矣歸竒積二二一三而爲七則其過揲者四之而爲二十八矣過揲之數雖先得之然其數衆而䌓歸竒之數雖後得之然其數寡而約紀数之法以約御繁不以衆制寡故先儒舊􅀃專以多少决隂陽之老少而過揲之數亦􅄀㑹焉初非有異􅀃也然七八九六􅀁以爲隂陽之老少者其􅀃又本於圗書定於四􅁚詳見後段其歸竒之數亦因揲而得之耳大抵河圖洛書者七八九六之祖也四􅁚之形體次第者其父也歸竒之竒偶方圎者其子也過揲而以四乘之者其孫也今自歸竒以上皆棄不録而獨以過揲四乘之數爲􅀃恐或未究􅁚數之本原也又云四營而後有爻又曰一掛再扐共爲三變而成一爻熹竊謂四營方成一變故云成易易即變也積十二營三掛六扐乃成三變三變然後成爻易有太極是生兩儀兩儀生四象四象生八卦熹竊謂此一節乃孔子發明伏羲畫卦自然之形體次第最爲切要古今􅀃者惟康節明道二先生爲能知之故康節之言曰一分爲二二分爲四四分爲八八分爲十六十六分爲三十二三十二分爲六十四猶根之有榦榦之有枝愈大則愈小愈細則愈繁而明道先生以爲加一倍法其發明孔子之言又可謂最切要矣蓋以河圖洛書論之太極者虚其中之象也兩儀者隂陽竒耦之象也四象者河圖之一合六二合七三合八四合九洛書之一含九二含八三含七四含六也八卦者河圗四正四隅之位洛書四實四虚之數也以卦畫言之太極者象數未形之全體也兩儀者一爲陽而一爲隂陽數一而隂數二也四象者陽之上生一陽則爲二而謂之太陽生一隂則爲而謂之少隂隂之上生一陽則爲而謂之少陽生一隂則爲而謂之太隂也四象旣立則太陽居一而含九少隂居二而含八少陽居三而含七太隂居四而含六此六七八九之數􅀁由定也八卦者太陽之上生一陽則爲􅥅而名乾生一隂則爲􅯬而名兊少隂之上生一陽則爲􅬀而名離生一隂則爲􅪽而名震少陽之上生一陽則爲􅮫而名巽生一隂則爲􅩦而名坎太隂之上生一陽則爲􅩥而名艮生一隂則爲􅧒而名坤康節先天之􅀃􅀁謂乾一兊二離三震四巽五坎六艮七坤八者蓋謂此也至於八卦之上又各生一隂一陽則爲四畫者十有六經雖無文而康節􅀁謂八分爲十六者此也四畫之上又各有一隂一陽則爲五畫者三十有二經雖無文而康節􅀁謂十六分爲三十二者此也五畫之上又各生一隂一陽則爲六畫之卦六十有四而八卦相重又各得乾一兊二离三震四巽五坎六艮七坤八之次其在圖可見矣今旣以七八九六爲四象又以揲之以四爲四象疑或有未安也河圖洛書熹􅀼以大傳之文詳之河圖洛書蓋皆聖人􅀁取以爲八卦者而九疇亦并出焉今以其象觀之則虚其中者􅀁以爲易也實其中者􅀁以爲洪範也其􅀁以爲易者巳見於前叚矣所以爲洪範則河圖九疇之象洛書五行之數有不可誣者恐不得以其出於緯書而略之也叢書云理出乎三才分岀於人道西銘專爲理言不爲分設熹􅀼謂西銘之書横渠先生􅀁以示人至爲深切而伊川先生又以理一而分殊者賛之言雖至約而理則無餘矣蓋乾之爲父坤之爲母􅀁謂理一者也然乾坤者天下之父母也父母者一身之父母也則其分不得而不殊矣故以民爲同胞物爲吾與者自其天下之父母者言之􅀁謂理一者也然謂之民則非真以爲吾之同胞謂之物則非眞以爲我之同􅀋矣此自其一身之父母者言之􅀁謂分殊者也又況其曰同胞曰吾與曰宗子曰家相曰老曰㓜曰聖曰賢曰顚連而無告則於其中間又有如是差等之殊哉但其􅀁謂理一者貫乎分殊之中而未始相離耳此天地自然古今不易之理而二夫子始發明之非一時救弊之言姑以彊此而弱彼也又云西銘止以假塗非終身之學也熹竊謂西銘之言指吾體性之􅀁自來以明父乾母坤之實極樂天踐形窮神知化之妙以至於無一行之不慊而没身焉故伊川先生以爲充得盡時便是聖人恐非專爲始學者一時􅀁見而發也又云性善之善非善惡之善熹竊謂極本窮原之善與善惡末流之善非有二也但以其發與未􅀤言之有不同耳蓋未發之善只有此善而其發爲善惡之善者亦此善也旣􅀤之後乃有不善以雜焉而其􅀁謂善者即極本窮原之􅀤耳叢書􅀁謂無爲之時性動之後者旣得之矣而又曰性善之善非善惡之善則熹竊恐其自相矛盾而有以起學者之疑也又云孟子以養氣爲學以不動心爲始熹􅀼謂孟子之學蓋以窮理集義爲始不動心爲效蓋唯窮理爲能知言唯集義爲能養其浩然之氣理明而無􅀁疑氣充而無所懼故能當大任而不動心考於本章次第可見矣答程可乆逈熹昨者拜書草率重􅀩枉答誨示懃懇并劉􅁺轉示􅀁製古度量及圖義一􅁽伏讀捧玩開􅀤良多其爲感慰不可具言熹􅀌陋之學於古人制度多􅀁未講近看范蜀公集引房庶漢志别夲比今増多數字又論貟分方分之差亦甚詳悉竊意其􅀁以與司馬公胡先生不同之端正在於此􅀁當明辨今圖義中似已不取其􅀃然未嘗質其􅀁以不然之意熹於此有未曉然者因便更乞詳以見教幸甚劉􅁺又云􅀩許并􅀉古權亦願早得之也温公周尺刻本舊亦嘗依放制得一枚乃短於今鐡尺寸許不知何故如此差誤俟檢舊本續求教也口賦阡陌二􅀃并荷指教考證精􅀶歎服尤深但阡陌二字鄙意未能無疑因以來教千百之義推之則熹前􅀃􅀁謂徑涂爲阡者當爲陌畛道爲陌者當爲阡盖史記索隱引風俗通南北曰阡東西曰陌又云河南以東西爲阡南北爲陌今以遂人之法考之當以後􅀃爲正也遂人鄭注徑從畛横涂從道横今考一徑之内爲田百畒一涂之内爲田百夫而徑涂皆從即􅀁謂南北之陌一畛之内爲田千畒一道之内爲田千夫而畛道皆横即􅀁謂東西之阡也其立名取義正以夫畒之數得之而其字爲道路之􅀋則當以自而不當从人蓋史記其本字而漢志則因假借而亂之恐不當引以爲據也馬阡陌之間成羣正謂往來田間道路之上富者連阡陌亦謂兼并踰制跨阡連陌不守先王􅆠理之舊界耳若作仟伯字􅀃恐難分明也不審尊意以爲如何􅁍望終賜誨示幸甚􅎧一本作阝答程可乆熹昨承寵示公劄諭及􅁰尺制度極荷不鄙但素所未講同官亦少有能知其􅀃者􅀼慮髙明必有一定之論却乞垂教幸甚幸甚弊郡向來製造祭器時未準頒降此􅁽只用臨川印本司馬書儀内周尺爲之殊覺低小今雖得此制亦已無力可修改矣并㡬台悉少懇田賦夫田二書更欲求得數本以廣長者捄世之心得早拜賜甚幸甚幸答程可乆太極之義正謂理之極致耳有是理即有是物無先後次序之可言故曰易有太極則是太極乃在隂陽之中而非在隂陽之外也今以大中訓之又以乾坤未判大衍未分之時論之恐未安也形而上者謂之道形而下者謂之器今論太極而曰其物謂之神又以天地未分元氣合而爲一者言之亦恐未安也有是理即有是氣氣則無不兩者故易曰太極生兩儀而老子乃謂道先生一而後一乃生二則其察理亦不精矣老莊之言之失大抵􅀋此恐不足引以爲證也兩儀四象之􅀃閩中前輩嘗有爲此􅀃者鄙意亦竊謂然初未敢自信也今得來示斯判然矣但謂兩儀爲乾坤之初爻謂四象爲乾坤初二相錯而成則恐立言有未瑩者蓋方其爲兩儀則未有四象也方其爲四象則未有八卦也安得先有乾坤之名初二之辨哉妄意兩儀只可謂之隂陽四象乃可各加以太少之别而其序亦當以太陽少陽少隂太隂爲次蓋􅀁謂遞升而倍之者不得越與而先爲也此序旣定又遞升而倍之適得乾一兊二離三震四巽五坎六艮七坤八之序也與邵氏先天圗合此乃伏羲始畫八卦自然次序非人私智􅀁能安排學易者不可不知也􅀳公子貞屯悔豫之占韋氏舊注固有不通而來示之云鄙意亦不能無􅀁疑也蓋以穆姜東宫之占言之則􅀁謂艮之八者正指其􅀁當占之爻而言之也今云貞屯悔豫皆八也而釋之以爲指三爻之不變者而言則非其當占之爻而於卦之吉凶無􅀁繋矣據本文語􅀔似是連得兩卦而皆不值老陽老隂之爻故結之曰皆八也而占之曰閉而不通爻無爲也盖曰卦體不動爻無􅀁用占爾然兩卦之中亦有陽爻又不爲偏言皆八則此􅀃似亦未安且東宫之占􅀃亦未定恐或只是遇艮卦之六爻不變者但乃艮其背不􅀗其身行其庭不見其人之占史彊爲之隨之􅀃以苟恱于姜耳故傳者記史之言而曰是謂艮之隨明非正法之本然也然其九三上九亦是陽爻又似可疑大抵古書殘闕未易以臆􅀃斷惟占筮之法則其象數具存恐有可以義起者推而得之乃􅀁謂活法耳答程可乆熹前書􅀁謂太極不在隂陽之外者正與來教􅀁謂不􅀝於隂陽而生隂陽者合但熹以形而上下者其實初不相雜故曰在隂陽之中吾丈以形而上下者其名不可相雜故曰不在隂陽之外雖􅀁自而言不同而初未嘗有異也但如今日􅀁引舊􅀃則太極乃在天地未分之前而無􅀁與於今日之爲隂陽此恐於前􅀁謂不􅀝於隂陽而生隂陽者有自相矛盾處更望詳考見教兩儀四象恐雖如先天之序乃爲自然之數而始乾終坤理􅀔亦無不可若必欲初二次乃是以意安排而非自然之序又二象之上各生兩爻即湏以乾兊艮坤爲次復無􅀁據更乞詳考見教乾坤六爻圖位鄙意亦有未曉處更乞誨示揲􅆱新圖内䇿數不知於占筮有用處否亦乞開諭答程可乆臨汀鹽筴旣無可言經界又不得行民之窮困日以益甚但有散爲流庸聚爲盗賊兩事耳廣右首議之人行遣甚峻近世少見其比益令人􅂴開口柰何柰何黄齊賢韵語用心甚苦諸圖尤有功夫甚不易得巳遵尊命以數語附卷末晩生淺學何足爲重三復長者之言爲之􅁣歎科舉之弊至於如此柰何柰何答程可乆􅀁諭爲學本末甚詳且悉前書􅀁謂世道衰㣲異言蠭出其甚乖刺者固巳䧟人於犯刑受辱之地其近似而小差者亦足使人支離繳繞而不得以聖賢爲歸岐多路惑甚可懼也願且虚心徐觀古訓句解章析使節節透徹段段爛熟自然見得爲學次第不須别立門庭固守死法也答程可乆示諭曲折令人􅁣歎然今日上下相迫􅀔亦有不得巳者故事之從違可否常在人而不可必唯審時量力從吾所好爲在巳而可以無不如志爾先生研精於易至有成書樂行憂違伏想胷中巳有成筭固非晩學􅀁得而輕議也答程可乆程書易原近方得之謹以授來使易學啓􅀩當巳經省覽矣有未安處幸辱鐫誨上饒財賦源流得蒙録示幸甚伯謨􅀃近有刻石記文亦願得之也又有小懇欲求妙墨爲寫大戴禮武王踐祚一篇以爲左右觀省之戒不審可否卷子納上得􅀩揮染不勝幸甚答程可乆忽聞有奉祠之命爲之惘然得非反以貳車改正之舉而激之至此也邪世路險􅇖人情不可測以長者之寛平􅀶厚處之尚未能坦然無􅀁繋閡况如鄙狹之姿又安可望於少行其志耶行亦力請祈還故官仰􅁇後塵爾答程可乆春秋例目拜貺甚厚其間議論小國自貶其爵以從殺禮最爲得其情者頃年每疑胡氏􅅬子朝􅁊之􅀃非春秋惡惡短之義今巳釋然蓋後來鄭大夫亦有鄭伯男也而使從諸侯之賦之􅀃則當時諸侯之願自貶者固多但覇主必以此禮責之故有不得而自遂爾然其他尚有欲請教者便遽未暇大抵此經簡奥立􅀃雖易而貫通爲難以故平日不敢措意其間假以数年未知其可學否爾答程㤗之大昌道生一一生二二生三熹恐此道字即易之太極一乃陽數之竒二乃隂數之偶三乃竒偶之積其曰二生三者猶所謂二與一爲三也若直以一爲太極則不容復言道生一矣詳其文􅀔與列子易変而爲一之語正同所謂一者皆形変之始耳不得爲非数之一也䇿數䇿者􅆱之莖數曲禮所謂䇿爲筮者是也大傳􅀁謂乾坤二篇之䇿者正以其掛扐之外見存􅆱数爲言耳蓋揲􅆱之法凡三揲掛扐通十三䇿而見存三十六䇿則爲老陽之爻三揲掛扐通十七䇿而見存三十二䇿則爲少隂之爻三揲掛扐通二十一䇿而見存二十八䇿則爲少陽之爻三揲掛扐通二十五䇿而見存二十四䇿則爲老隂之爻大傳專以六爻乗老陽老隂而言故曰乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十其實六爻之爲隂陽者老少錯雜其積而爲乾者未必皆老陽其積而爲坤者未必皆老隂其爲六子諸卦者或陽或隂亦互有老少焉盖老少之别本􅀁以生爻而非􅀁以名卦今但以乾有老陽之象坤有老隂之象六子有少隂陽之象且均其䇿数又偶合焉而因假此以明彼則可若便以乾六爻皆爲老陽坤六爻皆爲老隂六子皆爲少陽少隂則恐其未安也但三百六十者隂陽之合其数必齊於此若乾坤之爻而皆得於少隂陽也則乾之䇿六其二十八而爲百六十八坤之䇿六其三十二而爲百九十二其合亦爲三百六十此則不可易也河洛圗書論雖以四十五者爲河圗五十五者爲洛書然序論之文多先書而後圖蓋必以五十五數爲體而後四十五者之變可得而推又况易傳明有五十有五之文而洪範又有九位之數耶當朞易卦之位震東離南兊西坎北者為一說十二辟卦分屬十二辰者爲一􅀃及焦延夀爲卦氣直日之法乃合二􅀃而一之旣以八卦之震离兊坎二十四爻直四時又以十二辟卦直十二月且爲分四十八卦爲之公侯卿大夫而六日七分之􅀃生焉若以八卦爲主則十二卦之乾不當爲巳之辟坤不當為亥之辟艮不當侯於申酉巽不當侯於戍亥若以十二卦爲主則八卦之乾不當在西北坤不當在西南艮不當在東北巽不當在東南彼此二􅀃互爲矛盾且其分四十八卦爲公侯卿大夫以附於十二辟卦初無法象而直以意言本巳無􅀁据矣不待論其减去四卦二十四爻而後可以見其失也􅀭雄太元次第乃是全用焦法其八十一首蓋亦去其震离兊坎者而但擬其六十卦耳諸家於八十一首多有作擬震离坎兊者近世許翰始正其誤至立踦贏二賛則正以七百二十九賛又不足乎六十卦六日七分之數而益之恐不可反据其􅀃以正焦氏之失也孔頴逹孔氏是一揲也四字先儒莫有覺其誤者今論正之信有功矣但細詳䟽文後段孔氏實非不曉揲法者但爲之不熟故其言之易差而誤多此四字耳其云合扵掛扐之處又云合於掛扐之一處而緫掛之則實有誤然於其大數亦不差也畢中和畢氏揲法視䟽義爲詳柳子厚詆劉夢得以爲膚末於學者誤矣畢論三揲皆掛一正合四營之義唯以三揲之掛扐分措於三指間爲小誤然於其大數亦不差也其言餘一益三之屬乃夢得立文太簡之誤使讀者疑其不出於自然而出於人意耳此與孔氏之失固不可不正然恐亦不可不原其情也答程㤗之熹昨聞禹貢之書巳有奏篇轉借累年乃得其全猶恨繪事易差間有難攷究處近乃得温陵印本披圖按􅀃如指諸掌幸甚幸甚此書之傳爲有益於學者但頃在南康兩年其地宜在彭蠡九江東陵敷淺原之間而考其山川形􅀔之實殊不相􅀿因考諸􅀃疑晁氏九江東陵之􅀃以爲洞庭巴陵者爲可信蓋江流自澧而東即至洞庭而巴陵又在洞庭之東也若謂九江即今江州之地即其下少東便合彭蠡之口不􅀿言至東陵然後東迆北㑹于匯也白氏􅀁論敷淺原者亦有理而未盡盖詳經文敷淺原合是衡山東北一支盡處疑即今廬阜但無明文可考耳徳安縣敷陽山正在廬山之西南故謂之敷陽非以其地即爲敷淺原也若如舊􅀃正以敷陽爲敷淺原則此山甚小又非山脉盡處若遂如晁氏之􅀃以爲江入海處則合是今京口􅀁過之水又不但九江而巳也若以衡山東北盡處而言即爲廬阜無疑蓋自岷山東南至衡山又自衡山東北而至此則九江之原出於此三山之北者皆合於洞庭而注於岷江故自衡山而至此者必過九江也此以地􅀔考之妄謂如此不審參以他書其合否又如何但著書者多是臆度未必身到足歴故其􅀃亦難盡據未必如今目見之親切著明耳閤下向者固嘗經行而留意之乆記覽之富其必有以質之故敢輙獻􅀁疑伏惟有以教之幸也答程㤗之病中得窺易老新書之祕有以見立言之指深逺奥􅀶非先儒思慮􅀁及矣尚以道中籃輿徭兀神思昏憒未容盡究底藴獨記舊讀儼若容止作容字而蘇黄門亦解爲修容不惰之意嘗疑此或非老子意後見一相書引此乃以容字爲客字於是釋然知老子此七句而三恊韻以客韻釋脗若符契又此凡言若某者皆有事物之實􅀁謂客者亦曰不敢爲主而無與於故事其容儼然耳近見温公注本亦作容字竊意古本必更有可考者雖非大義􅀁繋然恐亦可備討論之萬一不審合意以爲如何答李夀翁熹竊嘗聞之侍郎知易學之妙深造理窟每恨不得執經請業兹辱誨諭警省多矣麻衣易􅀃熹舊見之常疑其文字言語不􅀋五代國初時體製而其義理尤多淺俗意恐只是近三五十年以來人収拾佛老術數緒餘􅀁造嘗題數語於其後以俟知者及去年至此見一戴主簿者名師愈即今印本卷後題䟦之人初亦忘記其有此書但每見其􅀃易專以麻衣爲宗而問其傳授來歴則又祕而不言後乃得其􅀁著他書觀之則其文體意象多與􅀁謂麻衣易􅀃者相似而間亦多有附㑹假託之談以是心始疑其出扵此人因復徧問􅀖人則雖無能言其贗作之實者然亦無能知其傳授之􅀁從也用此决知其爲此人􅀁造不疑然是時其人巳老病昏塞難可深扣又㝷即物故遂不復可致詰但今考其書則自麻衣本文及陳李戴汪題四家之文如出一手此亦其同出戴氏之一驗而其義理則於鄙意尤􅀁不能無疑今以台諭之及當復試加考訂他日别求教也程君蓍􅀃亦嘗見之其人見爲進賢令至此數得通書愷悌􅀶雅君子人也自别有易􅀃又有田制書近􅀉印本及􅀁刻范伯逹丈夫田􅀃來今各以一編呈納伏幸視至他􅀁欲請教者非一屬以􅀊凶郡中多事留此便人日乆且草具此拜禀早晩别㝷使拜啓次答陳體仁􅂪别􅁓開示􅀃詩之意尢詳因得以窺一二大者不敢自外敢以求扵左右來教謂詩本爲樂而作故今學者必以聲求之則知其不苟作矣此論善矣然愚意有不能無疑者蓋以虞書攷之則詩之作本爲言志而巳方其詩也未有歌也及其歌也未有樂也以聲依永以律和聲則樂乃爲詩而作非詩爲樂而作也三代之時禮樂用扵朝廷而下逹於閭巷學者諷誦其言以求其志詠其聲執其器舞蹈其節以涵養其心則聲樂之􅀁助於詩者爲多然猶曰興扵詩成扵樂其求之固有序矣是以凡聖賢之言詩主扵聲者少而發其義者多仲尼􅀁謂思無邪孟子􅀁謂以意逆志者誠以詩之􅀁以作本乎其志之􅀁存然後詩可得而言也得其志而不得其聲者有矣未有不得其志而能通其聲者也就使得之止其鍾皷之䌑鏘而巳豈聖人樂云樂云之意哉况今去孔孟之時千有餘年古樂散亡無復可考而欲以聲求詩則未知古樂之遺聲今皆以推而得之乎三百五篇皆可恊之音律而􅀍之絃歌巳乎誠旣得之則􅀁􅂇扵詩多矣然恐未得爲詩之本也况未必可得則今之􅀁講得無有畫餅之譏乎故愚意竊以爲詩出乎志者也樂出乎詩者也然則志者詩之本而樂者其末也末雖亡不害本之存患學者不能平心和氣從容諷詠以求之情性之中耳有得乎此然後可得而言顧􅀁得之淺深如何耳有舜之文德則聲爲律而身爲度蕭韶二南之聲不患其不作此雖未易言然其理蓋不誣也不審以爲如何二南分王者諸侯之風大序之􅀃恐未爲過其曰聖賢淺深之辨則􅀃者之鑿也程夫子謂二南猶易之乾坤而􅀛山楊氏以爲一體而相成其􅀃當矣試考之如何召南夫人恐是當時諸侯夫人􅀍文王太姒之化者二南之􅀿似亦不可專以爲樂聲之􅀿爲言盖必有理存乎其間豈有無事之理無理之事哉惟即其理而求之理得則事在其中矣答顔魯子熹昨􅀩諭及深衣謹并幅巾大帶納上皆温公遺製也但帶當結處合有黒紐之組􅀁未能備其􅀃見扵書儀本章可考而増益也又有黒履亦見書儀此不敢納呈去古益逺其冠服制度僅存而可攷者獨有此耳然逺方士子亦所罕見往往人自爲制詭異不經近於服妖甚可歎也若得當世慱聞好禮者表而出之以廣其傳庻㡬其不泯乎答顔魯子䝉諭深衣約紐正所未暁向借得者亦闕此制但既云絛似紳而加濶即與今之匾絛相似不知其制果如何又今法服背後垂綬亦是古組綬之遺象不記其以何物爲之恐亦可参考􅁍俟訂正垂教也又承垂諭景望謙卦忌􅄹之􅀃未審曲折并薛氏􅄦神事於此素亦未能无疑顧恨未得面扣其㫖以祛所惑或恐有可以言語發明者幸因筆及之也熹忽例􅀩誤㤙寛其致旱之罪而過録㣲勞皆出推借之及􅀄不敢辤適郡人􅀿募賑済者數家合得官資皆未放行義難先受不免申堂辤免并乞早與推㤙矣恐􅁒知其曲折故敢及之非敢固爲矯激也晦庵先生朱文公文集卷第三十七閩縣學訓導何器校
