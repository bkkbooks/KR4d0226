body:
  text: 辤免辤免江東運使狀一右熹見任主管西京嵩山崇福宫忽於今月九日凖尚書省劄子奉聖㫖朱熹除江東轉運副使塡見闕不候受告疾速之任任滿前來奏事熹聞命震驚不知所措伏念熹空踈無取疾病早衰入仕四十餘年止是循常竊禄本無竒節可以踰人徒以屡蒙恩私横加除用間有非其分之所當得與其力之所能堪者不得不控辤以干朝聴而傳聞不察指目多端獨荷夀皇天日之照臨許全素守又辱聖主雲章之藻飾誤借寵褒遂得偷安里閭畢願香火在於愚分巳極叨踰不謂聖恩記憐遂加任使仰惟始􅀄清明之日正是賢智馳騖之秋顧雖殘廢之餘豈不願效尺寸實以積衰旣乆百恙交攻心勦形疲視昏聴重竊自揣度决然不堪一路耳目之􅀉若不祈哀丐免必致自取顛隮兼熹祖郷徽州正屬本路見有墳墓宗族田産在婺源竊慮在法亦合囬避欲望朝廷洞照本末曲爲敷奏特與追􅃦新命令熹復還故官庶㡬少安愚賤之迹則熹不勝千萬幸甚謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有愚誠仰干崇聽仐者伏蒙聖恩除熹江南東路轉運副使此蓋廟堂光輔聖主圖起治功旣巳並用羣材不忍獨遺一士之意非特熹之私幸然熹以乆病積衰目昏耳重心力凋殘動多遺忘自度不堪公朝一道之􅀉巳具狀申尚書省乞賜敷奏寢罷去訖其間所陳病證皆有實迹不敢輙有一詞之偽至於墳墓田産有嫌當避理亦明甚欲望洪造矜憐早賜將上曲爲開陳使得依舊竊食祠官以安賤迹實熹疾病􅀌危千萬之幸干冐威尊不勝俯伏震懼之至辤免江東運使狀二右熹十月二十一日凖尚書省劄子據熹辤免新除江南東路轉運副使恩命及回避祖郷田産事十月五日奉聖㫖免囬避依巳降指揮疾速之任熹巳於當日望􅆣謝恩訖竊聞臣之事君猶子事父東西南北唯命之從熹雖至愚敢忘斯義又況平生碌碌􅀄無竒節今者該遇覃恩轉官改賜章服並是隨衆陳乞冐昧祗受豈敢獨於聖恩除授差遣乃飾它詞固爲遜避上干違命之誅下速近名之謗實以衰病支離不容勉疆且於衆疾之中目昏為甚今但拜官入境便有吏民訴訟遮擁道路百十為羣􅀂但草草一觀備禮撥遣即於愚心有所未安􅀂欲子細披閱必期有以上副使令下慰民望則熹之目力實所不堪未論其它職業曠廢只此一事便見踈虞在熹􅀌踨固難逃於吏議而於公朝推擇之意亦豈不至上累聖明反復思惟益増惶懼不免復此控訴祈免誤恩欲望朝廷特賜敷奏令熹仍舊奉祠竊禄以安愚分干冐威尊下情不任戰灼之至謹具申尚書省伏候鈞㫖小貼子熹所陳回避田産事雖蒙聖恩特免回避然熹宗族衰㣲子弟猥衆當此之際豈無寅縁侵擾郷鄰紊煩官府之害故雖未敢祗受而巳不勝憂懼之懷然不敢專以此事爲辭者盖恐又煩朝廷換移别路差遣而熹衰病終是不堪又湏再有塵瀆則熹􅀗罪愈深無由自解伏乞鈞慈俯賜憐察與宰執劄子熹輙布腹心仰干造化熹昨蒙聖恩擢貳江東將漕之􅀉自度衰病不堪任使且有故里之嫌恐招物議即巳具狀辤免今乃蒙恩特免回避仍令疾速之任仰認隆指感極涕零但熹衆疾所攻目􅌌爲甚受理詞訴搜㝷案牘皆有所不堪者竊恐黽勉到官必致曠􅆣上誤委􅀉爲罪益深巳有公狀申尚書省欲望鈞慈特賜將上冀蒙聖慈矜閔追寢前命仍􅂌祠禄以安愚分則熹區區不勝幸甚干瀆崇嚴無任俯伏俟罪之至辤免知漳州狀右熹準尚書省劄子奉聖㫖差知漳州塡見闕不候受敕疾速之任候任滿前来奏事者伏念熹昨者懇辤江東恩命陳乞依舊祠禄今準前件指揮雖未盡從所請然巳極爲優幸自惟么麽無所取材乃蒙聖主覆冐容載之恩公朝委曲成就之意至於如此豈冝復有辤避以重違命之誅實以所苦目疾昏暗愈甚省閱書判皆有所妨􅀂不自量冐昧祗赴必至貽患千里􅀗罪非輕是以再三籌度終不􅀗巳而復敢冐鈇􅃏之威以畢前懇欲望鈞慈特賜敷奏令熹依舊奉祠以安愚分固爲莫大之幸或且别與僻逺閑慢差遣一次使得少效㣲勞仰承德意而免於曠職殃民之罪以全晚節則亦熹之幸也謹具狀申尚書省伏􅀱鈞㫖小貼子竊見諸路帥司參議之屬比之宫觀粗有職業但以禮秩太優不敢陳乞􅀂蒙陶鎔使得備數過望幸甚與宰執劄子熹􅂺有私懇仰干公聽熹昨者懇辤江東恩命巳蒙聖恩改􅂌郡紱此蓋廟堂矜憐衰朽曲賜陶鎔有以及此幸甚幸甚但熹所苦目疾比復増劇自度决然不任郡事巳具狀申省乞許辤免􅀂蒙矜憐令熹依舊奉祠固爲甚幸或與改一閑慢差遣使得少効㣲勞仰承徳意而免於曠職殃民之罪則於熹亦爲甚幸屡瀆威嚴俯伏戰汗辤免知漳州劄子熹伏準尚書省劄子以熹辤免差知漳州恩命令熹依巳降指揮疾速之任者螻蟻寸誠未能上逹天聽又迫巳行之命有不容勉􅆠者敢復控辤以干洪造伏念熹多病早衰本非一證昨以餘疾雖切巳身未至有妨職事以故不敢一一陳述而專以目􅌌爲言又念聖主臨御之􅀄非是臣子堅卧固辤之日以故不敢必求祠禄而并以閑局爲請區區愚悃自謂必蒙矜憐不意廟堂未察其私不為及時將上使熹違命日乆進退無據今又反蒙朝命督趣危懼益深是以不免復此控訴伏望鈞慈俯垂聽察特與敷奏除熹依舊宫􅀚或合入閑慢差遣一次使熹得以㝷訪醫藥休養衰殘庶㡬未死之前或可别聽驅䇿則熹不勝千萬幸甚干冐威嚴無任俯伏俟罪之至自劾本州地震及患脚氣不能祗赴錫宴妨廢職務乞賜罷黜奏狀右臣中年病廢乆託祠官近蒙聖恩起分符竹到任今恰半年却無大叚疾痛又􅀍聖訓令臣相度本州先行經界利害臣竊自幸以爲􅀂得慿恃威靈更且彊徤誓當竭力奉行仁政使一方千里之内貧富之民各得其所而州縣之間亦得以􅀮覈姦欺實出失䧟財賦而免於白撰歳計違法害民之弊而臣不幸賦性至愚臨事多暗刑政乖戾侵迫隂陽當州境内自九月以來累次地震臣實恐懼未及申奏待罪而舊苦脚氣忽然發動痛楚寒􅀬倍於常年遍傳兩足連及右臂以至㑹慶聖節滿散錫宴之日病勢方劇臣以臣子之􅁩不敢自安亟欲彊自扶掖少伸三呼百拜之恭而筋骨拘攣不容自力􅁨悸反側無地自容只此一節巳無心顔可居士民之上又况在告日乆嶽訟稽留今雖畧能彊起視事而病中服藥出汗過多氣血精神日益凋耗一郡軍民之務日有萬端思慮少或不周爲害非細加以年􅀊向晚播榖有期而所請經界至今未奉進止設使即今便蒙行下巳是後時雖欲竭力奉行終恐不免緩不及事之責以是思惟憂惶怵迫不知所以爲計輙冐萬死哀􅈼以聞伏惟聖慈察臣守土失職事上不恭之罪特賜罷黜投之遠裔以爲中外臣子之戒臣死且不朽儻或憐臣愚暗拙踈疾病狼狽之實不加大譴曲賜保全使臣得以自裹殘骸歸􅉎故土亦死且不朽干犯天威臣無任震懼隕越之至謹録奏聞伏候勑旨乞宫觀劄子熹輙有哀懇仰瀆崇聽熹昨以􅀍病不堪郡􅀉輙露􅄬閑之請伏蒙聖恩未賜俞􅁢亦㑹殘軀稍可支吾不敢再有陳乞續凖轉運司牒􅀍奉聖㫖許令本州先行經界熹即巳遵禀日逐講究漸見倫緒只俟秋冬下手打量意謂可以少效疲駑仰副使令之意而熹無狀行􅀒幽明長男暫徃婺州遽爾夭殁不惟老病之餘不堪悲痛而料理喪葬収拾遺􅀌相去隔遠私計實有未便雖欲彊自扶持黽勉從事􅀔有不可得者欲望鈞慈特為敷奏復俾奉祠退歸田里則熹父子存殁均􅀍莫大之恩不勝千萬幸甚辤免祕閣修撰狀一右熹昨蒙聖恩權發遣漳州事在任陳乞奉祠今月二十七日準尚書省劄子奉聖㫖依淳熈十六年正月二十三日指揮除祕閣修撰差主管南京鴻慶宫任便居住熹巳於當日望闕謝恩將本州牌印職事交割次官通判軍州事高伉管幹訖獨念熹以愚賤踈遠無所能似昨者誤蒙至尊夀皇聖帝非常之知巳曽除授前件職名熹以無名授受力具辤免適當聖上即政之􅀄巳荷聖恩特降襃詔曲從其請自爾以來曽未再朞守郡一年又無絲髪勞效可紀特以禍患輙丐便私巳乖陳力致身之義方竊恐懼不謂天慈矜閔許以投閑復申前命有此超躐内自循省何以克堪所有前件除祕閣修撰恩命熹實不敢祗受欲望朝廷特爲敷奏許熹辤免則不惟在熹愚分不貽冐受之譏其於公朝亦免輕授之失熹下情無任懇禱激切之至謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有誠懇仰干崇聽熹昨以禍患陳乞祠禄以便私計伏蒙聖慈矜憐即賜開􅁢拜命之次感極涕零但又蒙誤恩復申進職之命則熹昔巳力辤於前今又無名再叨横寵區區私義實有所不自安者巳具公狀申尚書省欲望鈞慈特賜敷奏収還成命令熹且以舊職寅奉眞游而免於受爵不遜之譏則在熹愚分榮幸巳多伏惟高明俯垂照察辤免祕閣修撰狀二右熹七月四日凖尚書省劄子以熹辤免新除祕閣修撰恩命奉聖㫖不許辤免者陳誠未力聞命不遑謹巳即日望闕謝恩訖伏念熹昨於淳熈十六年内􅀍前件恩除兩具辤免所陳事理巳極詳備所以當時便蒙開􅁢今者乃以私故丐祠又叨申命之寵在熹愚分尤所未安蓋􅀂使熹在任之日遭罹災患而能抑制􅀻情黽勉王事究宣聖朝經界之仁政以惠千里侵􅁈失職之民或於懇求去郡之際遂能辤榮納禄致其爲臣之事以謹不能者止之戒則朝廷之旌勞􅅄退猶頗有名而熹之辤受取舎尚不爲甚無􅀃者今皆不然則於前此所陳之外又有此不當受之􅀃二焉是以雖迫宸命之嚴而顧慮徘􅆦進退無據不免上冐瀆尊之罪下觸干名之嫌復控血誠仰干公聴欲望鈞慈特爲敷奏収還巳行告命别降勑牒指揮令熹且以舊帶職名仍充祠官差遣則在熹巳不勝其過分叨榮之幸干冐威嚴皇恐無地伏候鈞㫖與宰執劄子熹輙有愚昧不移之懇􅄪冐威嚴仰瀆鈞聴熹一昨辤免新除祕閣修撰恩命近凖省劄奉聖㫖不許辤免在熹㣲賤曲荷天慈寛其狂僣之誅加以申命之寵固不當再有辤避然反覆以思在任既無􅀹異可賞之功求去又無廉退可襃之節􅌤顔冐受實懼無名謹巳􅄪具公狀申省辤免欲望特賜矜憐都俞之際曲爲敷奏得從所乞實爲至幸干慁頻煩伏深戰栗辤免湖南運使狀一右熹十月九日凖尚書省劄子奉聖㫖除熹荆湖南路轉運副使填見闕不候受告疾速之任任滿前來奏事熹聞命震驚罔知所措巳於當日望闕謝恩訖伏念熹前任假守漳州適縁長男物故輙丐閑秩歸治喪葬蒙恩得備祠官到任方及月餘凡百經營未有次第加以憂患摧頽精力衰耗雖欲痛自策勵勉赴事功終恐無以仰稱使令之意欲望朝廷特爲敷奏収還成命令熹且食祠禄以終餘年不勝千萬幸甚謹具狀申尚書省伏候鈞旨與宰執劄子熹輙有愚懇仰干公􅃪熹昨以私家患難乞歸治葬伏蒙矜憐陶鑄祠禄今来到任方及十月貧家舉動費力凡百尚未就緒今者忽􅀍聖恩付以湖南將漕之節仰體皇慈不遺􅀌遠之意不勝感荷激切之至然熹之家事如前所陳而憂患以來精力凋耗竊恐無以仰副使令自速罪戾欲望某官特賜敷奏収還成命令熹且食祠禄以終餘年則熹不勝千萬幸甚冐瀆威嚴俯伏竢罪辤免湖南運使狀二賤事疑當作􅕄事右熹昨具狀辤免新除荆湖南路轉運副使恩命近凖尚書省劄子奉聖㫖不許辤免仍依巳降指揮疾速之任熹巳於當日望闕謝恩訖仰戴皇慈容覆之深恭體聖訓丁寜之切極知臣子之義不當復以家事爲辭便欲起發前去祗服賤事以稱明詔顧竊惟念昨者蒙恩假守漳州伏值聖㫖行下臣僚申請乞行本州經界令熹相度聞奏熹竊見本州紹興年中經界良法方行遽罷貧民産去稅存不堪追呼之擾冨家業多稅少益長兼并之勢後來朝廷節次欲再舉行皆以豪右浮言沮撓而輟積至于今苦樂不均公私受弊有害國家發政施仁之實日甚一日無有窮已是以不勝憤懣即以巳見論其當行本路諸司審此曲折亦巳條具申奏伏蒙聖恩特從所請貧民下户欣幸方深而鄉官􅁟豪巳慘然不樂怨謗蠭起矣今者果聞巳行住罷静惟厥咎由熹愚昧思慮不審上誤朝廷得逭誅夷巳爲幸免更叨寵擢益紊彛章熹雖不才粗識廉恥誠無心復效奔走無顔復臨吏民無宜復當委􅀉輙冐萬死自劾以聞伏望公朝特賜敷奏収還除命重行黜責以爲不度時勢生事擾民之戒謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙罄愚􅂨􅄪干洪造熹昨以私家喪葬未畢懇辭湖南之行伏蒙聖恩未賜俞允仰惟詔令督遣之嚴俯念臣職驅馳之賤不敢更以家事爲請自求便安惟是伏思見識迂踈思慮淺短中間􅀍㫖相度經界不量事勢上誤朝廷􅀒犯巳深何以復堪一道耳目之􅀉􅂺巳具狀申省自劾欲望鈞慈俯垂聴察特爲敷奏􅀵還成命重賜黜責使得退省前愆免罹後咎則熹不勝千萬幸甚辤免湖南運使狀三右熹今月二十日準尚書省劄子以熹具狀自劾前任漳州相度經界不合妄乞施行上誤朝聴乞賜敷奏収還湖南轉運副使除命别行黜責奉聖㫖漳州經界議行巳乆湖南使節事不相􅀜可依巳降指揮疾速之任者自罹罪戾當伏重誅上頼皇慈曲加容覆不唯赦其萬死而又申以訓詞慰喻丁寕趣令之任盖雖慈父之於愛子其恩勤閔惻不過如此在熹一介踈遠疵賤何以堪之是以聞命拜恩至於感泣便欲即日就道祗服厥官以稱明詔而熹命窮福薄災病相挻舊苦脚氣今春發動腫痛寒􅀬倍於常年目今困重未􅀎歩履設使從今便得减瘥更加休養三數月間亦恐未堪上道曠日彌乆既乖承命之恭而本司􅆣官巳是數月恐亦不無廢務在熹愚分􅀹所未安欲望朝廷特賜敷奏令熹􅀘滿舊任宫􅀚差遣庶㡬得以深省前愆免罹後咎不勝幸甚謹具伏申尚書省伏候鈞㫖與宰執劄子熹輙輸賤誠上瀆鈞聴熹昨以前任妄議經界罪戾自劾乞罷新除湖南將漕恩命伏蒙聖慈赦宥洗雪趣遣之官訓喻丁寧反復勤至踈賤小臣何以得此所宜即日引道以稱所蒙而脚氣發動異於常年曉夕呻吟不能履地委實不容起發前去竊慮乆稽詔命仰觸雷霆之威巳具狀申尚書省陳乞祠禄外區區愚悃欲望鈞慈憐閔早賜開陳得諧卑願以活餘年千萬幸甚冐昧威嚴俯伏竢罪辤免知静江府狀一右熹十二月十九日凖尚書省劄子奉聖㫖除知靜江府熹聞命震驚竊自惟念􅀌賤寒遠碌碌無聞伏自聖主臨御于今累年又未嘗得羣下士仰望日月之光而聖恩厖鴻不間幽隱擢自閑散付以名藩在熹感激誠無以喻謹已即時望闕謝恩訖再念熹性本至愚學無所就自其少日巳不如人矧今衰殘寜復有用又況靜江守臣實兼帥司職事有數千里邊面軍民之􅀉舉措得失所係不輕自度無能决難冐處加以所患脚氣之疾作止不常春夏二時尤難將攝萬一前路發動却致稽留朝命在熹愚分尤所未安欲望朝廷特賜敷奏寢罷巳降指揮令熹依舊宫􅀚實爲大幸謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有危懇仰扣公朝熹伏凖省劄恭奉聖㫖除知靜江府事區區感激盖不勝言顧以罪戾之餘疾病沉痼不堪任使而内自揆度迂踈悖謬又非邉帥之才實不敢冐當重􅀉以累君相知人之明輙具公狀申省辤免欲望某官特賜省覽曲爲開陳許其遜避以安愚分熹冐凟威尊不勝皇恐戰栗之至辤免知靜江府狀二右熹正月二十三日凖正月七日尚書省劄子以熹辤免知靜江府恩命正月六日奉聖㫖不許辤免依巳降指揮疾速之任熹聞命震驚隕越無地竊伏思念罪戾􅀌蹤誤蒙収用命輕恩重感激難勝向使自量粗能供事豈敢􅂺有辤避以速刑誅實以材質凢庸識慮淺暗向来假守支郡非有繁難然猶不能審度時宜以致上誤朝聴雖幸曲蒙寛貸􅀗免譴訶然而内自省循未忘憂懼以故前年蒙恩將漕湖南尚且不敢拜受况今除授實專西南一面軍政邊防之􅀉責任至重非它帥比則熹又安敢冐受而不辤哉前狀所陳懇切詳盡不謂未蒙照察申命益嚴熹雖至愚亦豈不知微賤之臣分義有守不當再有煩瀆然反復以思區區所言非止自爲身計實恐邊境事宜或有緩急全頼帥臣區䖏鎮壓而熹乖繆妄發又復如前必將有以仰貽國家南顧之憂者非細事也是敢昧死復有陳述至於憂悴蚤衰足疾時作目昏耳重心氣短乏凡此種種於熹私計有不便者則皆不敢言矣伏惟朝廷曲垂矜閔再爲開陳収回誤恩俾還舊秩熹不勝祈懇激切俯伏俟命之至謹具狀申尚書省伏􅀱鈞㫖與宰執劄子熹輙布誠懇仰扣公朝熹昨具狀辤免知静江府恩命今凖省劄備奉聖㫖未賜􅁢俞聞命憂懼莫知所措然區區愚慮猶有未能巳者巳再具狀申尚書省伏乞丞相少保國公參政相公詳賜省覧曲爲開陳収回誤恩復􅂌祠禄千萬􅄑甚千萬􅄑甚小貼子愚慮終恐踈拙不足以當一面之􅀉或有緩急必誤使令欲望知院相公樞宻同知相公深加照察曲爲開陳収囬誤恩以安愚分辤免知潭州狀一右熹十二月􅀄十日凖尚書省劄子奉聖㫖差知潭州者伏念熹踈謬不材試郡無狀觧罷之後方知循省所以中間兩蒙聖恩皆甞力陳愚悃竟荷從欲尚叨祠禄以盡餘年不意今者又蒙記憐有此除授三年之間三􅀍抆拭自惟何者有此叨踰假使衰病支離不堪扶曵亦當聞命奔走不敢復有辤避實以區區愚慮前巳控陳而昨來巳曽辤免知静江府又不能無辤逺就近之嫌在熹私義􅀹難冐處所有降到省劄内聖㫖指揮竊縁熹見遭大功之䘮準格未該除服未敢望闕謝恩巳送建陽縣庫􅀉収訖欲望朝廷檢㑹前此兩畨辤免申狀詳酌事理早賜開陳令熹仍舊􅀘滿宫􅀚考任實爲大􅄑謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有誠懇仰干朝􅃪熹􅄑蒙陶鑄備数祠官竊禄養痾方以愧幸忽蒙恩命假守長沙仰戴鴻私伏深感涕重念熹賦性迂闊處事乖踈昨試偏州巳無善狀所以兩年之間再蒙除用力陳悃愊得遂退藏不意今来復此叨冐載循涯分實所未安又況昨來巳辤逺戍於今未乆復玷近藩擇地顧私人言可畏謹巳具狀申尚書省乞賜敷奏寢罷欲望某官曲垂矜閔早賜開陳使得仍舊奉祠苟安田里則熹千萬􅄑甚冐犯威尊不勝戰栗辤免知潭州狀二熹昨蒙聖恩差知潭州即巳具狀申乞􅀘滿宫觀考任今準尚書省劄子奉聖㫖不允依巳降指揮疾速之任熹聞命震驚即巳望闕謝恩訖伏念熹自罹災患日覺摧頽唯有踈頑略無悛改所以前此再辤誤恩皆荷天慈俯從人欲不謂今者尚閟俞音竊自省循决難黽勉是敢冐昧再有控陳欲望矜憐特賜敷奏曲從所請或􅂌偏州改命通才徃奠南服則不惟衰晚無狀􅀗逃戒得之譏亦足使處置得宜益壯維藩之􅀔熹不勝鞠躬祈懇引領俟命之至謹具狀申尚書省伏候鈞㫖與宰執劄子熹區區愚悃前屢控陳天􅃪未回日深恐懼今復有狀披告朝廷􅀂蒙矜憐許歸祠館别咨時彦徃布止恩則賢否公私各得其所而爲􅄑大矣萬一未蒙體察必使復效驅馳亦乞别與陶鑄逺小州軍或充以次閑慢差遣則於私義雖或未免冐昧之譏而爲湖南一道軍民之計猶爲莫大之幸再干威重彌切戰兢伏惟髙明俯賜財􅄑乞放歸田里狀右熹叨􅀍聖恩濫分民社兼領一道事任非輕顧嘗竊謂天下國家之所以長乆安寜唯頼朝廷三綱五常之教有以建立修明於上然後守藩述職之臣有以禀承宣布於下所以内外相維小大順序雖有彊猾姦宄之人無所逞其志而爲亂不然則以一介白靣書生彊而置諸數千百里軍民之上彼亦何所慿恃而能服其衆哉熹雖至愚自知甚審而亦粗嘗竊窺古今治亂安危存亡之變矣誠恐朽鈍之餘不堪今日方靣之􅀉兼以近者伏奉大行至尊壽皇聖帝遺誥攀號不逮迷悶隕絶自覺精力亦難支吾欲望朝廷特賜敷奏放歸田里速選明牧以濟多虞則不唯下保衰殘亦庶㡬不至上誤國家建設藩屏之意熹不勝幸甚謹具狀申三省樞密院伏候鈞㫖辭免召命狀右熹凖七月十一日尚書省劄子奉聖㫖令熹赴行在奏事者聞命震懾不知所爲謹巳望􅆣祗受稱謝訖恭惟聖上受禪之􅀄一新庶政寤寐俊傑恊圖事功宜得超異之才以承付託之重而搜􅀭之失下及凢庸是蓋不惟無益於時亦恐適足重取􅅓誚況熹衰晚疾病摧殘方以不堪治劇爲憂故敢輙以投閑爲請又以未蒙開􅁢未敢再干朝聴誠不自意誤恩猥及俯仰踧踖無所逃避􅀂使區區之精神筋力稍堪勉彊亦豈不願及此際㑹效其㳙埃以卒平生變君憂國畢義願忠之志顧實支離不堪扶曵政使得至殿庭亦恐顛沛失容増益罪戾是以不免控瀝肝膽冀蒙哀憐俾還香火之班以終蝼蟻之命則熹不勝大幸今亦不敢仰稽朝命乆留軍府巳將職事牌印交割本路運判何異迤邐前路聴候指揮外謹具申尚書省欲望鈞慈特賜敷奏伏候鈞㫖與宰執劄子熹􅂺有誠懇仰干朝聴熹衰病迂踈不適世用蒙恩􅀘郡并以一道軍民爲􅀉到任未乆巳覺疲憊方恐仰􅀌任使輙敢便請退閑豈意非常之恩使得赴􅆣奏事熹雖至愚竊自揆度荒陋不學頑鄙無聞不惟無以仰禆嗣皇訪落之􅀄政而目疼足腫不利進趨使造殿庭必致顛踣除巳詳具曲折申尚書省一靣起發前路聴候指揮外欲望某官察其悃愊曲賜矜憐特爲敷陳俾諧私願則熹不勝幸甚干冐威嚴伏増震恐辤免煥章閣待制侍講奏狀一右臣昨任潭州日蒙恩令赴行在奏事方以迂踈疾病力具懇辤巳歷兩旬未奉報可今者東歸道中忽􅀍省劄誤蒙聖恩除臣煥章閣待制兼侍講者臣聞命震驚罔知所措恭惟國家設官分職以熈庶事其遷進之序選用之方雖甚細㣲莫不有法而況次對之官班通禁近其自内而除者猶有歳月之限在外而擢者必以勞效而陞從昔以來未嘗輕授至於經帷則又仰􅀜帝學在今􅀄政尤所當先必得醇儒使任其職然後有以發揮道要感格君心大明謹始之規以爲出治之本􅀹不可以不遴其選也如臣踈賤乆以病廢比叨試用又復罔功固巳不堪超躐不次之除聞見甚淺記識不彊妄意本原亦未知要則又無以仰副招延自近之意在臣非敢自愛實恐不免冐昧之譏有累維新之政加以肓聵跛躄不利走趨昨蒙収召之恩巳伸辤避之懇所有今來恩命臣實不敢祗受欲望皇帝陛下察其悃愊特賜矜憐俯狥愚誠曲全素志則臣不勝千萬幸甚臣無任瞻天望聖激切祈懇之至謹録奏聞伏候勑㫖與宰執劄子熹輙有私懇仰干公聴熹昨任潭州特蒙収召方以疾病迂踈力祈寢罷未奉報可忽􅀍殊恩擢陞次對之聮俾司勸講之職除命超躐近比所無聞命震驚措身無所謹巳具奏辤免外欲望某官察今所陳參以前狀即見區區懇避之實但使暫詣􅆣庭一修朝覲揣其分際猶所不堪況欲接武俊遊入侍經幄旣冐叨踰之誚復深頓踣之虞在於鄙懐可勝慙懼敢乞特爲敷奏速賜収還俾以舊官續食祠廪庶安愚分免累清朝熹不勝千萬幸願之至辤免煥章閣待制侍講奏狀二右臣昨具狀奏辤免新除煥章閣待制侍講恩命今到信州仍準尚書省劄子奉聖㫖不允者愚􅂨己竭聦聴未回須至敷陳再干旒扆蓋念臣迂闊無能分甘閑散雖自蚤年入仕而實歴􅁵務差遣僅及五任通計不滿九考前後伏蒙兩朝聖恩除授職名内自循省巳爲過分所有見帶祕閣修撰仍是紹熈二年八月祗受至今僅及三年其間即無絲髪勞效可録資淺望輕旣不足以汙侍從之選加以年齡晚莫學殖荒落目肓聽重歩履艱難其於􅂆講經幄出入禁闥私竊自揆􅀹所不堪所以懇辤皆出情實即非飾詞備禮姑應故事而巳不謂螻蟻之誠不足仰動天􅃪聞命踧踖恐懼益深又竊惟念皇帝陛下嗣位之􅀄方將一新庶政所宜愛惜名器不可輕以假人􅀂使僥倖之門一開其弊豈可復塞至於萬機之暇愽延儒臣早夜孜孜專意講學盖將求所以深得親懽者為建極導民之本思所以大振朝綱者爲防微慮逺之圖顧問之臣實資輔養用人或謬所係非輕并望聖明曲垂洞照亟還虚授以穆師言臣以昨辤召命巳􅀍疾速前來供職指揮今兹祈免詔除又奉不允之詔不敢更有留滯見已一面起離信州前路􅃪候處分仰冀聖慈早賜開􅁢臣不勝千萬幸甚之至謹録奏聞伏候􅃙㫖與宰執劄子熹輒控鄙誠仰干朝􅃪熹攝承帥閫方愧不堪誤辱聖恩特加収召辤免未􅀗又奉詔除亟拜遜章未蒙開允今再具奏冀得収還恩命區區誠懇悉巳敷陳皆出實情即非僞飾如蒙降出切望某官早賜將上詳爲開陳庶幾聖主無輕授之譏賤臣免非據之辱盡繄大造圖報敢忘干冐威嚴不勝恐懼辤免煥章閣待制侍講乞且帶元官職詣闕奏狀三右臣凖尚書省劄子以臣再狀辤免新除煥章閣待制侍講恩命九月十四日三省同奉聖㫖依巳降指揮不允疾速前来供職者愚􅂨屡竭天􅃪未回祗誦恩言益増震悸伏念臣猥以凡品遭值昌辰龍德天飛萬物咸覩豈不願以此時進趨軒陛仰瞻穆穆之光況使執經入侍帷幄得以所學論􅀃人主之前臣雖至愚亦豈不冀幸少有萬一可以仰禆聖聦特以次對異恩無故超受在臣私分實難自安是以徬徨未敢拜受今来復凖前項聖㫖雖巳望闕遥謝聖恩即日起發前去外欲乞到日許臣且依七月十一日巳降指揮帶元官職詣闕奏事所有新除􅁍俟面奏辤免别聴處分冐瀆宸嚴臣不任惶懼隕越之至謹録奏聞伏候勑㫖申省狀右熹凖尚書省劄子以熹再狀辤免新除煥章閣待制侍講恩命九月十四日三省同奉聖㫖依巳降指揮不允疾速前来供職者伏念熹愚賤小臣屢煩嚴詔不敢再三辤避謹巳即日起發前去欲乞到日許熹且依七月十一日元降指揮帶元官職詣闕奏事所有新除却俟靣奏辤免别聽處分除巳具狀奏聞外謹具申尚書省伏乞照㑹又申省狀右熹凖尚書省劄子以熹辤免新除待制侍講恩命奉聖㫖不允依巳降指揮疾速前来供職者伏念熹昨以聖恩過厚私義未安三具懇辤自知拙訥不能仰動聖聽所以未敢必冀開􅁢只乞許帶元官赴闕奏事面陳悃愊别聽處分今来巳到國門又凖前項指揮在熹猶有未盡之懐决然不敢冐昧祗受然又不敢再具奏牘頻煩天􅃪欲望朝廷特賜敷奏依熹前請庶幾早得趨赴行宫奏事瞻望日月之光則熹不勝幸甚謹具狀申尚書省伏候鈞㫖辤免待制侍講面奏劄子臣一介草野􅀄乏寸長遭遇兩朝過加擢用不􅄑未能有以報效萬一而大行至尊壽皇聖帝奄棄萬國奉諱攀號欲死無路旋聞太上皇帝哀疚迫切亦厭萬機臣子之心尤極震懼所􅄑復得遭值皇帝陛下祗膺寳命正位當天臨御之􅀄首加記憶召命既出除目隨頒稽以故常實為超躐自惟鄙拙重以衰殘義當力辤以安愚分顧以當仕有職不敢屢瀆天威冐昧以来唯冀仰望清光俯鑒愚欵今􅄑二事巳遂所懐雖先犬馬退就溝壑亦無所恨唯是新除恩命累奏辤免未蒙開􅁢在臣愚悃亦豈不願因此際㑹得以所聞一二仰賛大猷獨恨病衰足弱拜起艱難目左翳而右昏耳右聾而左重内自量度必至㒹隮伏惟聖明必巳洞照欲望矜憐特賜處分収還元降除命令臣姑守舊官賜以祠禄放歸田里待盡餘齡則臣不勝千萬大􅄑干冐宸嚴伏俟誅殛取進止辤免待制改作􅀃書狀右熹昨具劄子面奏辤免新除煥章閣待制侍講恩命續凖尚書省劄子奉聖㫖依巳降指揮不􅁢日下供職者熹昨䝉誤恩輒加奬㧞實以資淺不敢冐受愚誠屢控天聴未孚至於面有奏陳意謂必蒙矜許乃䝉恩㫖尚閟俞音祗拜以還不勝感激熹巳仰體聖意不敢力辤講筵職事第以未得進􅀃先受厚恩萬一異時未有報效而疾病發作不可支吾遂竊侍從職名而去則熹之愚死有餘罪欲望朝廷察其情實特為開陳與免待制職名改作􅀃書差遣容熹即日拜命供職或勉強年􅀊之間少有􅀘於聖主緝熈光明之學見諸行事之實發號施令罔有不臧然後隨衆霑恩熹亦不敢多遜古語有之事君者大言入則望大利小言入則望小利夫進言於君而望其利巳非正理況今一言未入而遽受大利區區於此尤所未安然不敢數具奏狀上勞聖覽謹具狀申尚書省伏候鈞㫖與宰執劄子熹昨日面禀懇辤恩命意謂愚悃必蒙矜照今􅀍省劄乃奏睿㫖未賜允俞誠意未孚深自咎責然念既蒙君相恩意之重如此今巳不敢力辤講筵職事唯是職名太峻前巳具陳庶官侍講亦無近比欲乞改正然後供職庶於愚分稍得自安熹有狀申省敷述義理巳極詳盡欲望某官特爲開陳不憚改命使熹千里而來早得進􅀃上前不至遷延虚度時日亦區區千萬之􅄑頻有干瀆伏深恐懼謝御筆以次對係衘供職奏狀右臣十月􅀄十日準御前降到御筆一封付臣令臣勿復牢辤次對之職臣昨以新除恩命超躐異常累具辤免日望開允豈意仰勤聖主親御翰墨俯賜襃諭令勿牢辤踈賤小臣分不當得拜受伏讀不勝恐懼謹巳仰遵聖訓係衘供職外謹具奏聞伏乞睿照回中使劄子云熹伏蒙轉到御筆一封巳祗受訖今有奏狀一封􅁛謝得爲進呈不勝􅄑甚辤免兼實録院同修撰奏狀一右臣今月十四日凖尚書省劄子奉聖㫖差臣兼實録院同修撰者臣聞命震駭不知所爲伏惟高宗皇帝中興艱難實同創業成功盛徳莫可形容信史所傳垂法萬世宜得鴻愽之士執簡操筆其間庶㡬將來有以考信如臣固陋才不逮人白首章句之間僅􅀎略通訓詁入侍經幄巳愧叨踰至於蒐輯舊聞勒成大典自知寡陋本非所長况復病衰心目俱廢豈能冐昧􅆠所不能塵穢簡編以取􅅓誚在臣非敢自愛實懼仰貽聖朝之羞所有前件恩命臣決不敢祗受欲望聖慈洞鑒誠悃特賜追寢以安愚分謹録奏聞伏候勑㫖辤免兼實録院同修撰奏狀二右臣昨具狀辤免差兼實録院同修撰恩命今凖尚書省劄子奉聖㫖不允者􅄋懇控陳必期從欲聞命悚惕不知所言重念臣愚素無史學然於是非得失之故實有善善惡惡之心又况先臣在紹興􅀄甞掌兹事實事高宗皇帝其於豊祐紹符之際分别邪正用力爲多臣雖至愚敢忘斯志今􅀗叨冐復踐世官在臣􅀻心豈非幸􅂅但恨心力凋耗目翳耳昏記憶檢㝷皆所不便復叨選擇備數經帷晝繹夜思猶懼不逮豈有餘力可效編摩所以懇辤即非備禮雖􅀍譴郤恐懼徒深義當固辤不容黙巳儻蒙聖察特賜允從庶使妄庸􅀗安愚分臣無任祈天望聖千萬懇激之至謹録奏聞伏候勑㫖謝御筆與宫􅀚奏狀右臣今月二十一日伏準降到御筆賜臣朕憫卿􅂄艾方此隆冬恐難立講巳除卿宫􅀚可知悉臣衰病餘年不知引退曲蒙聖造特賜矜憐臣無任感恩荷聖激切屏營之至謹具狀奏謝伏乞聖照乞放謝辤狀右熹今月二十一日伏凖御筆除熹宫􅀚巳具奏稱謝訖縁熹脚氣發動有妨拜跪欲望朝廷特賜敷奏與免謝辤謹具狀申尚書省伏候指揮辤免寳文閣待制與郡狀右熹昨者恭奉御筆除熹宫􅀚續凖尚書省劄子奉聖㫖與放謝辤熹即巳起發前路􅃪候指揮至二十五日晚又準尚書省劄子奉聖㫖除熹寳文閣待制與州郡差遣熹聞命震驚不知所措伏念熹戇拙有餘􅂆講無狀分當顯黜豈合優遷況耳重目肓累嘗靣奏州郡繁劇􅀹所不堪所有恩命決難祗受欲望朝廷特賜敷奏令熹只以本官仍舊主管南京鴻慶宫庶恊師言以安愚分謹具狀申尚書省伏候指揮辤免兩次除授待制職名及知江陵府奏狀右臣昨奉手詔宣諭除臣宫􅀚継準省劄又蒙聖恩除臣寳文閣待制與州郡差遣臣以無名不敢冐受即具辤免又準省劄恭奉聖㫖不允仍除臣知江陵府不候受告疾速之任者寳儲峻秩荆楚要藩委􅀉益隆視逺猶邇恩㫖之重捧戴難勝然臣伏念昨者皇帝陛下即位之􅀄臣以愚賤踈逺之蹤首蒙眷知召置講席正以庶官無由入侍禁闥故特假以侍從職名臣於是時固巳自料衰病迂闊勢必不能乆奉清問故嘗再三懇辤乞以本官充職庶免後日别致紛紜不唯不蒙開允乃更曲荷天慈加賜手札俾速祗受此見陛下虚心求善屈巳下賢之意近歳以來君臣之間所未有也而臣不佞適幸遭逢可謂千載一時之㑹私念􅀂得因此罄竭凡陋禆􅀘聦明是亦臣子之至願學問之􅀄心因遂不敢力辤輙爾冐受供職四旬屢得進講凡所関啓多蒙開納而臣戇愚迫切便欲致君堯舜之上遂觸忌諱以煩譴訶皇慈過恩猶不加罪親御翰墨俾就退閑旬日之間除書繼下蕩滌瑕垢曲全始終是亦近歳以來君臣之間所未有也臣雖至愚豈不知感所宜即日拜命奔走率職别圖後效以塞前愆而反覆思惟前日之罪旣以學力未充誠意不至無以仰稱明詔感悟天􅂨釁咎巳深不容湔洗所有元借職名巳是難復冐居豈敢更叨進擢之寵至於西門甲兵委􅀉尤重亦豈目肓耳聵之人所宜竊據以誤使令昨來雖略申陳然猶未盡底藴是致今復有此誤恩揣分量材決難祗受是敢􅄋懇直貢封章欲望聖明俯垂鑒察正其􅘃曠之罪追還新舊職名俾以􅀉禄元官復奉鴻慶故宫列聖香火庶㡬憑恃威靈􅆂濡徳澤未填溝壑之間猶及親見陛下聖學日新聖徳日茂盡送徃事居之孝極用賢納諌之誠永御丕圖爲宋令主則臣雖即死無復遺憾干試雷霆眷戀軒幄無任皇恐激切之至謹録奏聞伏候勑㫖貼黄臣伏覩元祐􅀄特起河南處士程頥以爲通直􅀰崇政殿􅀃書後以人言罷守本官權同主管西京國子監頥上奏乞歸田里其間有云若臣元是朝官朝廷用爲􅀃書雖罷􅀃書􅁍以朝官去乃其分也臣本無官只因􅀃書授以朝官既罷􅀃書獨取朝官而去極無義理臣今實以侍講之故得此待制職名既罷侍講即所授職名理合追奪與頥所陳事理實無以異伏望聖慈鑒察許臣辤免不勝至􅄑申省狀右熹昨具狀申乞辤免進職與郡恩命今準尚書省劄子奉聖㫖不􅁢仍除熹知江陵府不候受告疾速之任者伏念熹無所能似元係庶官只因聖主欲令進講遂除侍從職名今既奉職無狀莫􅀘豪分尚蒙寛恩假以秩禄即於私分巳爲過優先来所授侍從職名自不當得況又寵加峻秩俾殿大藩􅀹非罪戾殘廢之人所能􅀒荷巳具奏聞乞賜追還新舊職名只以本官還奉鴻慶香火其間叙述義理詳明如蒙降岀欲望朝廷早賜敷奏特從所請千萬􅄑甚謹具狀申尚書省伏候指揮與宰執劄子熹昨􅀍寛恩奉祠去國自疑罪戾不􅀗躬詣大府靣禀辤行下懐至今不勝悵仰兹者乃復叨􅀍除書進職寶儲作牧荆楚在熹無狀失職􅀒痾實無心顔可備驅使謹巳具奏申省皆極詳明不敢逐一覼􅈁以勤􅃪覽欲望鈞慈察其悃愊特與將上力賜開陳使區區賤迹得以自安實衰朽迂愚千萬之􅄑干冐威尊不勝震悚乞追還煥章閣待制奏狀二正月十四日右臣昨具狀奏辤免新除寶文閣待制知江陵府恩命并乞追還昨來任侍講日所帶煥章閣待制職名今凖尚書省牒奉勑宜差提舉南京鴻慶宫臣巳於今月十一日望闕謝恩祗受訖得辤閫􅀉還備祠官仰荷天慈俯從人欲恩深莫報感極難言然而尚有待制職名未蒙鐫削區區愚悃須至重陳伏念臣本是庶官無它勞效元帶祕閣修撰巳是兩朝過恩比者只縁聖意欲亦令講書遂使暫陪邇列臣亦自知衰病迂闊決難乆冐寵榮故於聞命之􅀄即嘗􅄋懇具奏乞免進職改授􅀃書不謂鄙誠未能上逹更煩親札襃諭益勤遂爾冐居未及兩月果以罪戾遣罷而歸所􅀍誤恩理宜追奪而一再陳懇竟未矜從仰戴皇慈豈勝感激顧以愚分實有未安敢觸天威復此祈扣伏望聖明洞照早賜収還或令依舊論撰職名改作主管宫觀差遣則在朝廷黜陟之典免紊􅃔章而於微臣進退之宜亦全私誼謹録奏聞伏候勑㫖貼黄臣仐雖巳拜命繫衘然尚未敢幇勘請給恭俟報可伏乞聖照申省狀右熹昨具狀申奏辤免進職􅀘郡恩命及乞追還先來任侍講日所帶待制職名近準勑命特授前件宫觀差遣熹巳即時望􅆣拜受訖唯是所乞追還職名未奉俞􅁢理難冐據恐懼益深除巳再具奏聞外欲望朝廷更賜敷奏特從􅀁請以安愚分則熹不勝千萬幸甚謹具狀申尚書省伏候鈞㫖與宰執劄子熹􅂺有誠懇再冐威嚴熹昨具申奏辤免進職􅀘郡恩命巳荷開􅁢改授祠官尚有所乞􅀵還待制職名未蒙施行熹巳具奏及申朝廷再有祈懇欲望某官深賜照察特爲開陳俾遂所祈以安愚分則熹不勝千萬幸甚乞追還待制職名奏狀三右臣三月三日準尚書省劄子以臣再奏乞追還煥章閣待制職名奉聖㫖不允臣巳即時望􅆣遥謝聖恩訖但念臣之所請實出丹􅂨天聴太髙未賜開允迫以私義決難冐居敢復控陳必冀省察盖臣竊以西廂待對名列近臣班序旣崇恩禮􅀹渥盖國家所以寵待儒學議論之賢欲其雖或守藩奉祠於外而猶有論思獻納之責不異朝夕陪侍於禁闥之下出入乎周衛之間也臣之凡愚素號山野入侍經幄僅及四旬意見闊踈言辭鄙拙固巳自知不堪選用之意惟有中間􅂺議僖祖皇帝皇家始祖不當一旦并行祧毀且使太廟之祀止及八世降於天子九廟之禮尤非􅀁宜獨蒙聖恩特賜宣問親奉玉音以謂僖祖之廟自不當遷至于再三即以所進議狀并劄子並行降出竊意巳蒙嘉納必遂施行不謂􅀌論難持竟亦無取退伏循省益愧心顔尚借寵榮許仍舊職非但有乖輿論亦恐上累清朝控避莫回周章失㩀敢冐萬死再犯天威欲望聖明察臣誠悃縱未重加貶黜亦合􅀵還誤恩庶使􅀌蹤􅀗逃後咎臣無任祈天望聖皇恐俟罪之至謹録奏聞伏候勑㫖申省狀右熹三月三日準尚書省劄子以熹奏乞收還待制職名奉聖㫖不􅁢者愚誠旣竭聦􅃪未囬私義未安不容寢黙重以向來曽有妄議太廟􅀄室不合遷毀巳蒙聖主宣問嘉納而朝廷不爲施行竊疑其間所陳必是有違典禮自知不學無術難以復厠近班謹巳再具奏聞欲望朝廷特爲將上早賜行遣以爲臣子􅀌陋寡聞輕議大典之戒熹不勝幸甚謹具狀申尚書省伏候鈞㫖與宰執劄子熹昨具狀奏乞賜收還元降待制恩命未蒙開允私義未安不容寢黙重以向來曽有妄議太廟􅀄室不合遷毀巳蒙聖主宣問嘉納而朝廷不爲施行竊疑其間所陳必是有違典禮自知不學無術難以復厠近班謹巳再具奏聞并具狀申朝廷矣欲望鈞慈特爲將上早賜行遣以爲臣子􅀌陋寡聞輕議大典之戒熹不勝幸甚干冐威尊皇恐俟罪申省狀右熹伏準尚書省降到劄子一道以熹辤免煥章閣待制職名奉聖㫖不允縁熹目仐脚氣發作手足拘攣不堪拜起謝恩不得巳送建寧府建陽縣􅀉􅀵候痊安日請領别具申奏次謹先具狀申尚書省伏乞照㑹申建寧府乞保明致仕狀右熹舊患脚氣近數發動日加困重不可支吾欲乞守本官致仕謹具狀申建寧府伏乞照㑹依條施行謹狀乞追還待制職名及守本官致仕奏狀四右臣昨具狀奏乞賜追還待制職名三月二十八日準尚書省劄子伏奉聖㫖次對之職除授巳乆與廟議􅀄不相􅀜依巳降指揮不允不得再有陳請臣以見患脚氣有妨拜跪不得謝恩祗受遂將所􅀍省劄權送建陽縣庫􅀉􅀵仍申尚書省照㑹去訖後来不意病勢危篤自知難戀聖朝依例合乞致仕又念見係庶官不敢專具奏牘遂申本貫依條陳乞今來復準省劄恭奉聖㫖未賜開􅁢戴恩重疊恐懼難勝揣分捫心但知感激唯是區區本以郷來入侍日淺自知未有毫髪報稱不當仍帶舊職出領祠官所以懇避再三即非過爲沽激況今疾病沉痼雖未即死精華巳竭後效無期更竊寵榮義益難䖏兼覩近日從臣有自西掖出守大藩者猶自止帶修撰况臣罪戾方此投閑而所得職名過爲優厚以此較彼誠有未安是敢不避煩瀆之誅復陳迫切之悃欲望皇明委照聖度并容深察愚􅂨參稽近比特降睿㫖俾遂所祈則臣不勝千萬大幸所有昨来陳乞致仕實縁病􅀔危迫方敢冐昧今雖苟延殘息終是不堪異日使令不敢更叨廪禄以速滿盈之咎亦望矜憐并賜俞􅁢使就窮約庶保餘年臣無任祈天望聖俯伏俟命之至謹録奏聞伏候勑㫖貼黄臣今者伏蒙吏部降到告命磨勘轉官臣即巳謝恩祗受可見愚􅂨非敢飾詞妄爲遜避伏乞聖照申省狀右熹累具申奏乞罷所帶職名及於建寜府陳乞保明致仕今準尚書省劄子各奉聖㫖未賜開􅁢熹以私義難安不能自已不免復申前請别具奏陳如􅂪降岀欲望朝廷特賜將上俯從所請早賜施行不勝􅄑甚謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有危懇仰干鈞􅃪熹昨以入侍日淺無􅀘豪分既領祠官不當復帶舊職累奏乞行追奪未蒙開􅁢近者復以疾病危篤陳乞致仕又蒙聖恩未從所請伏念熹前後所乞皆岀誠心非敢詭衆飾辭過爲矯激未能感格深不自安不免再露血誠復干天􅃪其間陳叙曲折援引比例極爲詳盡若蒙降岀欲望朝廷深察情悃力賜開陳使孤危之迹早遂退藏免以罪戾姓名愚昧識見數千旒扆乆紊彛章招致人言重煩譴斥則熹不勝千萬大􅄑情迫意切言語無倫伏惟鈞慈并賜容照乞追還待制職名并自劾不合妄議永阜􅑼陵事奏狀五右臣昨累具奏乞免帶待制職名仍以病衰再乞致仕伏蒙聖慈特降睿㫖辤職謝事非朕􅄖賢之意不得再有陳請臣即已望闕拜命恭謝聖恩訖自惟愚賤誤􅀍睿知陳力無堪輒求閑退更蒙寵渥申諭隆私假以優賢之名􅁍其再至之請顧臣何者可稱衮襃感激之深無言以諭所乞致仕謹巳恭禀聖訓未敢再溷宸聦所辤職名亦巳仰體睿慈不敢再祈避免然伏自念去歳叨冐􅀗厠周行曽因集議永阜􅑼宫妄意輙陳管見欲乞少寛逺日改卜神臯庶妥威靈以延運祚後雖罷議無所施行然在􅀻心豈容自昧今者伏覩進奏院報前日小大之臣曽議此者皆巳坐罪次第降黜而臣狂妄又嘗靣奏其跡尤不可揜其罪尤不可赦但以所入文字不曽付外是致漏網未抵譴訶􅀂遂隠匿不言更冐榮寵竊慮祗受之後公論不容未及終朝便煩禠奪顧㣲臣進退之義雖不足言而聖朝刑賞之中則爲可惜以此之故反復思惟復致憂疑未敢拜受輙冐斧􅃏自劾以聞伏望聖明􅁬發威㫁付之司敗以肅􅀖刑庶免煩言重勞淵􅃪臣無任祈天俟罪踧踖屏營之至謹錄奏聞伏候勑㫖申省狀右熹昨具申奏乞免帶待制職名仍以病衰再乞致仕今來伏準尚書省劄子奉聖㫖辤職謝事非朕􅄖賢之意不得再有陳請熹巳望闕謝恩恭禀聖訓未敢再乞致仕以煩朝􅃪所有職名仰體聖恩本亦不敢更具辤免􅁍縁去年集議永阜􅑼宫蓋嘗妄陳管見欲乞少緩發引之期别擇寧神之地今者竊見前日臣僚有曽論此者皆巳坐罪次第行遣而熹無狀乃獨幸免區區愚慮實不自安􅀂使祗受聖恩復忝近列竊料非乆即致煩言迷誤朝廷紊亂刑賞愚賤之迹􅀗罪愈深謹巳具奏自劾恭俟嚴誅如蒙降出乞賜將上取㫖特賜處分則熹不勝千萬幸甚謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有愚悃仰干公􅃪熹昨者累奏辤免職名再奏陳乞致仕近準省劄批降睿㫖示以􅄖賢之意杜其再至之請恩指隆厚假借超踰熹雖至愚豈不知感告老之牘未敢重陳除職之㤙亦擬拜受但以頃於􅑼陵嘗有妄議今見前後同爲此􅀃者皆巳坐罪行遣而熹獨漏網更冐寵榮竊料公論終不見容異日決難幸免萬一拜命之後即致煩言則不唯使聖朝失刑賞之中而區區賤迹亦乖進退之義俯仰踧踖無地自容謹巳具奏自劾及申朝廷去訖欲望某官曲加憐念特賜開陳照例施行庻愜輿議熹不勝千萬祈懇之至乞追還待制職名奏狀六臣昨具奏自劾擅議山陵陳乞免帶舊職今者伏準尚書省劄子恭奉聖㫖朱熹自劾無罪可待餘依巳降指揮者頻瀆天威乆湏嚴譴復蒙寛宥感極涕零伏念臣自去歳誤蒙聖恩擢寘近列使侍講筵即以迁踈寡陋資淺望輕懇辤四五而不􅀗命遂巳不敢復辤講職只慮所帶職名大爲超躐今􅀂冐受則將來或有罷免􅁍須回納又致紛紜遂具狀申省乞賜敷奏令臣且以元官舊職改充􅀃書其所陳􅀃極爲詳備㝷以宸翰下臨不容固避然而口與心誓所有職名只是暫受權帶以爲入從之階異時􅀂罷講官此職決當回納庶以少贖今日不能力辤之罪其後果以老病怯寒不能立講曲蒙矜憫重賜親筆除臣宫觀旣巳拜命又􅀍恩㫖進職與郡則臣不敢當而亟如向來􅀻誓之言具奏辤免雖幸追􅃦後命而猶未鐫舊職自是之後凡四具奏力申前懇率皆不蒙開允蓋臣本意止爲巳罷講官不敢復帶侍從職名而於其間三次奏狀乃因它事忘其前語此其所以屢瀆聖聰而曽不足以少回天意者也於今始覺前日之繆不敢再有他􅀃輙冐萬死復此祈恩伏惟聖明洞鍳誠悃特降睿㫖照臣去年申省及後來第一第二次辤免奏狀早賜施行使臣得以本官仍奉香火屏伏田畝以終餘年則臣不勝千萬大幸干冐宸嚴無任祈天俟命激切屏營之至伏候􅃙㫖貼黄臣聞或者謂臣去􅀊􅀄除之日巳受䟽封錫服之寵該遇饗恩又叨封贈䕃􅀘之澤其後又承吏部取㑹磨勘得轉一官皆爲巳受侍從恩数之實今於職名乃欲回避不無作僞之嫌臣味其言極爲有理實於彼時思慮不及致此冐昧追悔無由今又不敢輙乞回納伏望聖慈并賜處分討論改正臣不勝幸甚乞改正巳受過從官恩数狀右熹昨具狀奏乞免待制職名巳蒙聖恩特賜開允仍舊充祕閣修撰提舉南京鴻慶宫巳於今月六日望闕祗受及奉表稱謝訖竊縁元奏内有貼黄稱於昨來巳冐䟽封錫服之寵封贈䕃􅀘之澤及用檢舉磨勘轉官皆爲巳受從官恩数乞賜䖏分討論改正今來未奉進止在熹􅀻義實所未安然又不敢頻具封章上瀆天􅃪只乞朝廷更賜矜憐特爲敷奏申勑攸司將熹所陳五項事理檢照條例逐一討論悉行改正庶安愚分免紊彛章則熹不勝大願謹具狀申尚書省伏候鈞㫖與宰執劄子熹復有誠懇敢瀆公聴熹昨來辤免近職巳荷聖恩特從所請不勝幸甚但元奏貼黄内所陳䟽封錫服磨勘封贈䕃􅀘五項欲乞并行改正未蒙施行在熹愚計深不自安今來不敢别具奏牘輙具公狀申尚書省欲乞將上取㫖特降䖏分則熹不勝千萬幸甚申建寜府乞保明致仕狀熹年滿七十疾病衰殘尚忝階官義當納禄伏縁見係謫籍不敢冐貢封章乞依條備録申奏令熹守本官致仕庶得偷安田里以盡餘年伏候台㫖與宰執劄子熹輙有􅀻懇仰干公聴熹伏爲今􅀊年滿七十疾病衰殘尚忝階官義當納禄又以見係謫籍不敢冐貢封章遂經本貫建寧府具狀陳乞本府以熹罪戾不敢依條保奏巳爲備録申尚書省去訖欲望鈞慈矜念特與敷奏令熹守本官致仕庶得偷安故里待盡餘年則熹不勝千萬幸甚冐瀆威嚴伏深戰栗乞致仕狀右熹昨爲年滿七十疾病衰殘尚忝階官義當納禄又以見係謫籍不敢冐貢封章遂經本貫建寧府具狀陳乞本府以熹罪戾不敢依條保奏巳爲備録申尚書省去訖近者忽覩臣僚論列士大夫老不知退之弊巳得聖㫖播告施行因伏自念雖幸日前巳嘗有請然今累月未聞可報竊慮本府所申在路或有遺失致熹寸誠不能上逹且將重得違戾聖制干犯名教之罪反復思惟不勝恐懼不免冐昧驀越披訴欲望朝廷矜憐特賜敷奏依熹所乞令守本官致仕庶安賤迹以盡餘年免以􅀌愚再煩吏議則熹不勝千萬幸甚謹具狀申尚書省伏候鈞㫖與宰執劄子熹輙有􅀻懇仰干公聴熹昨爲年滿七十疾病衰殘尚忝階官義當納禄又以見係謫籍不敢冐貢封章遂經本貫建寧府具狀陳乞本府以熹罪戾不敢依條保奏巳爲備録申尚書省去訖今來日乆未奉進止又聞臣僚建議申嚴致仕條限巳得聖㫖播告施行􅀼慮元狀稽留遺墜使熹重得違戾聖制干犯名教之罪不勝憂懼不免再具公狀徑申朝廷欲望鈞慈矜念特與敷奏令熹守本官致仕庶得偷安故里待盡餘年免以􅀌蹤再煩吏議則熹不勝千萬幸甚冐瀆威嚴伏深戰栗與宰執劄子熹輙有危懇再干崇聴熹草野㣲命罪戾􅀌蹤始生之年號紀建炎􅀊在庚戍􅀿舉入仕脚色分明推移至今適滿七十足􅀊考之禮經合乞致仕顧念名在謫籍深慮不合自陳因竊詢考條貫乃知元無妨礙遂於去冬預懇州郡投納公狀乞作今年正月開假之日備錄申奏而閭里横議官吏過疑咸謂􅀒罪之人無事可致不當冐昧自求優逸遷延稽故不爲依條保奏至二月半間方得申尚書省狀一􅁓又以􅀻家貧乏無力遣人至三月􅀄方得附發前去㝷覩邸報知有臺臣章䟽申嚴休致舊法巳得指揮播告施行方幸所請前巳控陳􅀻􅀊官年元無増减然而引頸俟命今巳五旬􅁍方探問得此狀三月末間尚未申到竊慮在路稽違或是别有沉匿致使㣲誠無路上逹則於元犯姦惡大罪之外且將更取違戾聖制干犯名教之誅枯朽之餘豈堪摧拉謹巳具狀徑申朝廷及具公劄申禀去訖恐此􅃈末無由上徹鈞聽故敢復此縷縷敷陳冐犯威嚴伏祈鑒照與宰執劄子熹竊以孟夏漸􅀬伏惟某官廊廟尊嚴政幾暇豫神人依頼鈞候起居萬福熹罪戾􅀌蹤名在謫籍化鈞無外得以偷安區區鄙懐豈不知感兹縁年及禮合告休又蒙某官特爲開陳即賜俞􅁢所以上昭聖明􅄖老念舊洗垢匿瑕之羙意下使衰朽􅂢棄之人得託退休之號除廢錮之籍而少慰其出身事主一世勤苦之夙心則其爲賜也大矣其爲􅂆也廣矣然猶非爲熹一人設也至於加賜鈞翰封示勑書且復垂諭所以委曲保全之意則又仰見洪鈞大化之中克勤小物之慮至深至逺而熹獨幸得􅀍此賜之爲安且吉也感激之􅀻言有不能喻者禮當修具公啓略布萬一而聖制有嚴不敢干紊謹具短劄少見下誠伏惟鈞慈特垂照察黄閤在望趨拜無期切乞順時之宜從民之望益保崇重以永太平之基熹下情不勝瞻望拳拳之祝諸執政無然猶至吉也一節晦庵先生朱文公文集卷第二十三考異乞追還待制職名奏狀三議論之賢議一作講閩縣學訓導何器校
