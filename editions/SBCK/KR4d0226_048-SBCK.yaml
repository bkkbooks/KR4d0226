body:
  text: 書問答一本作知舊門人問答答吕子約聞後來有來依講席者斆學之功交相爲助政自不悪但所論經指頗􅁴支蔓如云維清一篇又周禮之所寓此等議論又支蔓之尤甚者只似時文如此即我􅀅亦周禮之所寓矣太皥臯陶之祀一旦廢絶固足以見世衰道䘮之徴然其未泯則扵世道却未􅀎大有所扶助如胡致堂兄弟極論關雎專美后妃之不妬忌而以獨􅀌亡隋爲證熹嘗論之以爲妬忌之禍固足以破家㓕國而不妬忌之美未足以建極興􅀖也此等處􅂲皆是道理太多随語生解要湏滌除令胸次虚明直截然後真箇道理方始流行不至似此支蔓勞攘徒爲心害有損無益也詩􅀃鄙意雖未必是然看子約議論如此自是無縁得契合更請打併了此一落索後看却須有㑹心處也答吕子約丁未七月三日示喻維清須句二義旣是真實見得足以自信則亦何待他人之言但鄙意􅁴得此般偏旁􅀉搭議論無光明正大氣象終不甚喜聞故前此輙爾獻疑而今雖承誨諭之悉竟亦不能深暁也戰國時秦趙出伯益齊出舜楚出祝融魏出畢公燕岀召公韓亦􅁎姓之國此獨非聖賢之後邪又有一事向讀元城譚録論劉壯輿字畫處嘗疑其言之過以今觀之則似信而有徴者不審明者以爲如何公謹之言不記云何来喻云云得無有尤人之意邪答吕子約九月十三日日用功夫不敢以老病而自懈覺得此心操存舎亡只在反掌之間鄉来誠是太渉支離盖無本以自立則事事皆病耳来喻拈出劉康公語甚善甚善但上面蹉却話頭􅂲亦是義理太多費了精神故向裏時少耳詩􅀃乆巳成書無人冩得不􅀎奉􅀉亦見子約專治小序而不讀詩故自度其􅀃未易合而不􅀉耳謂變風止乎禮義其失甚明但􅀂只以小序論之則未見其失耳讀古人書直是要虚著心大著肚髙著眼方有少分相應􅀂左􅃒右攔前拖後拽随語生解節上生枝則更讀萬卷書亦無用處也易書似巳納去何爲未見􅂲此誤記後便喻及却納去此亦是見近日􅀃者多端都􅀅自然底道理穿鑿壊了固不得巳而出之耳聞子約教學者讀禮甚善然此書無一綱領無下手處頃年欲作一功夫後􅁴精力向衰遂不敢下手近日潘恭叔討去整頓未知做得如何但禮文今日只慿注䟽不過鄭氏一家之􅀃此更合商量耳齋中見作如何理㑹必有一規模様轍因風幸示一二也又聞講授亦頗勤勞此􅂲或有未便今日正要清源正本以察事變之㡬㣲豈可一向汨溺扵故􅁓堆中使精神昬弊失後忘前而可以謂之學乎答吕子約聞欲與二友俱来而復不果深以爲恨年来覺得日前爲學不得要領自做身主不起反爲文字奪却精神不是小病毎一念之惕然自懼且爲朋友憂之而毎得子約書輙復恍然尤不知所以爲賢者謀也且如臨事遲回瞻前顧後只此亦可見得心術影子當時􅀂得相聚一畨彼此極論庻㡬或有判决之助今又失此㡬㑹極令人悵恨也訓導後生􅀂􅀃得是當極有可自警省處不㑹减人氣力􅀂只如此支離漫無統紀則雖不教後生亦只見得展轉迷惑無出頭處也答吕子約示喻授學之意甚善但更湏小作課程責其精熟乃爲有益􅀂只似日前大飡長啜貪多務速即不濟事耳洒掃應對乃小子之學今旣失之扵前矣然旣壯長而專使用力扵此則􅂲亦無味而難入要須有以使之内外本末兩進而不偏乃爲佳耳向見􅀃書旁推曲􅀃蔓􅄛太多此是大病􅀂是􅀄學便遭如此􅅶繞即展轉迷闇無復超脫之期矣要當且令看得大意正當精約則其趣味自長不在如此支離多􅀃也答吕子約十一月二十七日子合到此亦畧􅀎言彼中相聚曲折云子約頗訝熹書中語太峻不記是何事􅀂只是􅀃易處則来書又有權術及伯恭心迹未明等語殊不可曉竊􅂲今亦不湏如此支蔓只且做一不知不㑹底人虚心看聖賢所􅀃言語未要便將自家許多道理見識與之争衡退歩乆之却湏自有箇融㑹處盖自家道理見識未必不是只是覺得太多了却似都不容他古人開口不覺蹉過了他􅀃底道理耳至如前人議論得失今亦何暇爲渠分踈且捄取自家目今見處是要切事􅀂舎却自巳又捄那一頭則轉見多事不􅀎得了矣前日借得荆公日録閑看其論某人但􅀎􅀂古未能稽古此等􅀃話想平日巳知其失而笑之然不知其病所以至此者亦只是道理太多不得聖賢言語中下一兩箇閑慢字便著􅂃􅀃出許多道理来楦塞得更轉動不得只此便是病根未論所􅀃之邪正得失也所論易是聖人模冩隂陽造化此􅀃甚善但􅂲扵盡其言處未免多著道理􅀃殺了耳此非面論未易究竟然向扵啓蒙後載所述四言数章􅀃得似巳分明卒章尤切不知曽細看否幸試考之有所未安却望見教也對班在何時今日極難􅀃話而在踈逺爲尤難看得且只收歛得人主心念不至大叚走作是第一義其他道理非不可􅀃只􅂲􅀃得未必應急救病耳􅀂此處不下功夫便要飜騰拆洗了安静和平底家計做艱難辛苦底功夫􅂲尤不相當耳禮書巳領但䘮禮合在􅀕禮之前乃是只􅂲不欲改動本書卷帙則且如此亦不妨也但士庻人祭禮都無一字豈脫漏邪若其本無則亦太草草矣鄉人欲者甚多便欲送書坊鏤版以有此疑更俟一報幸早示及也恰冩至此忽報巳有農簿之命此亦可喜但不知不蹉却對班否又􅂲釋奠祭器等文字又因循也然舊同官有可語者得更叮嘱之尤佳㡬道且得改秩亦是一事其弟在此亦佳台州又有一師䢼者在此亦儘知用力不易得也子欽恨未識面􅀉得禮圖来甚精未暇細考此却好一員禮官也但􅀃易亦多􅃈碎穿穴耳十弟事不知竟如何今日一箇風俗如此不知士大夫是何等見識也别􅁓數事皆切中其病如偏執闊踈貴氣之云尤是親切一種樂因循者巳不足言其有作爲之意又有此病豈天固不生材扵今日邪前日因饒廷老去嘗􅀉聲痛箴之不知􅀎聴受否奉常差彊人意但􅁴亦欠子細商量甚恨前此匆匆不􅀎甚欵也其可喜處却是簡潔而不支蔓故力專而􅀔不分又沈静而有思量故機圓而語有力􅀂安排得在要地湏儘可望也叔昌必巳之官同父爲况如何頗亦謀所以善後之計否因書幸痛箴之此却是箇改過遷善底時節㡬㑹所謂乃今可爲者正謂此耳切告留念答吕子約示喻日用功夫如此甚善然亦且要見得一大頭腦分明便扵操舎之間有用力處如實有一物把住放行在自家手裏不是謾􅀃求其放心實却茫茫無把捉處也公而以人體之只是無私心而此理自然流行耳非是公後又􅀅此意尋討他也答吕子約所示日用功夫大慰所望舊讀胡子知言答或人以放心求放心之問怪其覼縷散漫不切嘗代之下語云知其放而欲求之則不放矣嘗恨學者不領此意今觀来論庻㡬得之矣所論必有事焉鳶飛魚躍意亦甚當孔子只􅀃箇先難後􅀗一句便是這話後来子思孟子程子爲人之意轉切故其語轉險直􅀃到活潑潑地處耳知得如此巳是不易更且虚心寛意不要回頭轉腦計較論量却向外面􅀶觀衆理益自培殖則根本愈固而枝葉愈茂矣􅀂只扵此静坐處尋討却􅂲不免正心助長之病或又失之則一蹴而堕扵釋子之見矣亦可戒也讀書如論孟是直􅀃日用眼前事文理無可疑先儒􅀃得雖淺却别無穿鑿壊了處如詩易之􅀋則爲先儒穿鑿所壊使人不見當来立言本意此又是一種功夫直是要人虚心平氣本文之下打疊交空蕩蕩地不要留一字先儒舊􅀃莫問他是何人所􅀃所尊所親所憎所惡一切莫問而唯本文本意是求則聖賢之指得矣􅀂扵此處先有私主便爲所蔽而不得其正此夏蟲井蛙所以卒見笑扵大方之家也且如向来主張史記時變之學以近日都人觀美出涕沱􅀂之章觀之亦可見其流弊之所極矣此乃前人有醇徳而無虚心之弊反爲所誘以堕一偏之見今日子弟欲發其所長而覆其所短正在專扵自巳分上公聴並觀打破前来窠臼乃可以發明前人本来心事之正而使學者戒其所偏此在子約比之他人又有此一重檐􅀒尤不可以不勉也答吕子約誨諭工夫且要得見一箇大頭腦便扵操舎間有用力處如實有一物把住放行在我手裏不是漫􅀃􅀵其放心某盖嘗深體之此箇大頭腦本非外靣物事是我元初本有底其曰人生而静其曰喜怒哀樂之未發其曰寂然不動人汩汩地過了日月不曽存息不曽實見此體叚如何㑹有用力處程子謂這箇義理仁者又看做仁了智者又看做智了百姓日用而不知此所以君子之道鮮此箇亦不少亦不剰只是人看他不見不大叚信得此話及其言扵勿忘勿助長間認取者認乎此也認得此則一動一静皆不昧矣惻􅀮羞惡辭譲是非四端之著也操存乆則發見多忿􅓰憂患好樂􅂲懼不得其正也放舎甚則日滋長記得南軒先生謂驗厥操舎乃知出入乃是見得主腦扵操舎間有用力處之實話盖苟知主腦不放下雖是未􅀎常常操存然語黙應酬間歴歷􅀎自省驗雖非實有一物在我手裏然可欲者是我底物不可放失不可欲者非是我物不可留藏雖謂之實有一物在我手裏亦可也􅀂是謾􅀃旣無歸􅀫亦無依㩀縦使彊把捉得住亦止是襲取夫豈是我元有底邪愚見如此敢望指教省驗一作有驗此叚大槩甚正當親切操存乆則發見多放舎甚則日滋長此二句甚好誨諭胡子知言舉或人以放心求心之問恠其覼縷散漫不切嘗代之下語云知其放而欲求之則不放矣某竊謂或者之問元不識心體所對雖欲使人察夫良心之苗裔致操存之功然􅀃得驚惶不縝宻便是用功處未到􅂲方􅀃時亦未免是放也自家所知固有廣狹淺深處然曽云省察則是我元初者非我元􅀄者真妄客主亦豈不識箇體叚模様操存稍熟則省察浸精省察浸精則操存愈固昨之所謂非放者今猶覺其爲放昨之所謂相近者今猶覺其尚逺近看遺書􅀃修辭立其誠乃是體當自家敬以直内義以方外之實事又􅀃聖賢千言萬語只是欲人􅀅巳放之心約之使反復入身来自􅀎㝷向上去下學而上逹此語方是不覼縷散漫自􅁴用力雖未􅀎敏勇然實欲從事扵斯也又嘗深自體驗固是知其放而求之則不放然其間㡬多艱難曲巧方其志不勝氣其爲抑遏掩蔽心固知之如醉中知醉而未醒夣中知夣而未􅁴非澄治平帖亦未易遽存及其身心向裏有頓放處非不是我来爲主然浮念忽起病根􅀮然又思乎此也方有端緒他思便来間之展轉牽引把捉不住近得一法扵致思之時而思慮忽起􅀂所當思也則便以筆識之不使之累吾心然亦難槩論盖適有所感當便尋繹則只得放下元􅀄所思却致思乎此􅀂非所當思也則當深省而消去之亦頗有效驗第扵主一功夫未至不􅀎如程子所謂使他思時方思然且得随力量如此存察更望指教此意大槩亦好但太支蔓不直截不􅁴却􅀅此心放了􅂲當一切掃去且􅀅所代五峯一語早晚提撕令有箇要約處乃佳不然又似程子􅀃温公爲中所亂矣誨諭謂必有事焉鳶飛魚躍孔子只􅀃箇先難後􅀗一句便是這話後来子思孟子程子爲人之意轉切故其語轉險直􅀃到活潑潑地某􅀼謂此箇義理固是自家元有底無少無剰初無差異然亦湏實見到這裏不可少有鶻突聖賢設敎固不越扵下學而上逹然著書立言必有不容巳者如鳶飛魚躍子思雖以上下察爲言固巳示諸人然非得伊洛諸君子再拈掇出来如何理㑹得是子思喫緊爲人處其曰與必有事焉而勿正之意同旣􅀃得親切與我相應又曰㑹得活潑潑地不㑹得時只是弄精䰟則又􅂲人􅀅此玩弄走作以爲神通妙用却入私意却成助長却失了元初本有底其爲害又不特入扵語險而巳大抵窮理工夫􅀂不􅀎認取則非我所及者皆爲渉虚􅀂􅀎認取則一動一静天理流行莫非無極之真也程子又云勿忘勿助只是養生之法不識怎養生此語極善盖識箇主腦則勿忘勿助而養而無害非勿忘勿助是本體扵勿忘勿助之間認取本體也此全在學者扵巳分上實自體認方信得聖賢之言先儒之論都是􅀅實得者􅀃與人不是􅀃分外事顧我之領畧淺深何如耳敢望誨示此叚看得亦未親切湏知必有事焉只此一句便合見得天理流行活潑潑地方要扵此著意尋討便窒礙了如􅀃先難只此二字巳見得爲仁工夫然扵此處才有計較便夾雜了故才􅀃上句便􅀃下句以急救之如方安頓一物在此又便即時除却是非教人先安排此有事勿正之兩端而就其中以求之也誨諭謂只扵静坐處尋討却􅂲不免助長之病或又失之則一蹴而堕扵釋氏之見某自顧渙散之乆近稍收拾粗有静養工夫然工夫淺薄客慮猶多雖未至便有此病然亦豈敢不常自警省也兼亦自􅁴未堕釋氏之見者盖釋氏是從空處求吾儒是自實處見喜怒哀樂之未發初非空無寂然不動本皆完具釋氏扵此看得偏闕所以随在生病又元者善之長底意思釋氏旣不識元絶􅁼離群以寂㓕爲樂反指天地之心爲幻妄􅀅四端苗裔遏絶閉塞不容其流行􅀂儒者則要扵此發處認取也近看周子動而無動静而無静之語頗有所省夫動而無動則喚不有止静而無静則喚不森然此雖非天下之至神不􅀎與扵此然一動一静之本體盖元如是因此静存動察旣無交互亦不落空今所慮者非在扵堕釋氏之見乃在扵日用之間主敬守義工夫自不接續而巳􅀂扵此􅀎自力則敬義夾持此心少放自不到得生病痛也所見如此更願指誨此正如明道所􅀃扶醉人語不溺扵虚無空寂即淪於紛擾支離矣誨諭讀書如論語孟子是直􅀃日用眼前事文理無可疑先儒􅀃得雖淺却别無穿鑿壊了處如詩易之􅁼則爲先儒穿鑿所壊不見當来立言本意此又是一種功夫直是要人虛心平氣本文之下打疊交空蕩蕩地不要留先儒一字舊􅀃莫問他是何人所􅀃所尊所親所憎所惡一切莫問而唯本文本義是求則聖賢之指得矣某深惟訓誨真可謂直截指示雖非某所及未􅀎言下即承然敢不黙㑹此意第有所欲論辨當􅄍露者亦不敢不詳陳之某徃者讀書有時自驗扵㑹心處固有不待注釋訓􅀃而見得明白然此心稍有蔽虧即便忘失且又閱理不熟大指精義弗􅀎致察􅀂非自生意見即便讀過不􅁴終歸之因循鶻突而已日来豈敢以爲􅀎讀稍􅀎收拾身心有箇主腦義理之實漸漸相親玩索先􅁴所􅀃時時有契扵心反復讀之其扵本文本義固􅀎打疊到空蕩蕩田地然扵用意深處漸􅀎進其所知随其文義亦各略見所􅀃着落因此見得讀書之法固是要見得立言本意不要繳繞支離然湏是自有工夫使義理来相浹洽方􅀎與書相應若與書相應始􅀎善思通其精㣲而意味無窮雖當讀時固不可先留舊􅀃在胷中然虚心平氣待其自見有意要掃去他亦不得苟要掃去則又是我底意見亦未必是真實指義也如讀易只以程子易傳爲主非不知象占爲不可廢然文王夫子作􅂏象文言大傳所發明者却不在扵象上直是要人得其辭以通其意其曰易變易也随時變易以從道也其間吉㐫消長之理進退存亡之道備扵辭推詞考卦可以知變象與占在其中其曰至㣲者理至著者象體用一源顯㣲無間其曰乾坤爲易知諸卦爲難知今學者不求諸象占固有所闕然學有本末若未䏻玩索乎此而欲求之扵象占則扵程子俻扵詞在其中之意不䏻無失也又自孟子後易書非不以象占而傳然非所謂自秦而下其學不傳者果何所指邪雖所見如此然先生謂又是一種工夫則殊未詳更望指敎也大凡讀書湏是虚心以求本文之意爲先若不得本文之意即是任意穿鑿如􅀃㑹心處之􅀋正是大病根本如易之詞乃是象占之詞若舎象占而曰有得扵詞吾未見其有得也此皆過髙之弊所以不免勞動心氣若只虚心以玩本文自無勞心之害誨諭公而以人體之只是無私心而此理自然流行耳非是公後又􅀅此意思尋討也某深味此語固是􅂲人添箇意思尋討然􅁴得下語自傷扵快竊謂仁固難名以覺名仁而覺非仁也以愛名仁而愛則屬情也以公名仁特近仁耳亦難指公爲仁也先生謂仁者愛之理别出性情最爲明白然程子公而以人體之意則扵公字上兼愛之理意思言之盖公雖近仁然又湏實下工夫物物皆體􅀂有扞格各不相貫屬便有未仁若只是􅀃箇公字便此理自流行却欠却體仁工夫也又近看南軒先生復卦賛有云其在扵人純是惻􅀮動匪以斯則非天命曰義禮智位雖不同揆厥所基脉絡流通及近来玉山所刻先生講􅀃扵程子所謂偏言之則一事專言之則包四者雖未􅀎昭晣然却見得此意脉分明其曰偏言則本末次第不可以混言其曰專言則莫不始扵此本扵此而皆一貫也孟子論乍見孺子怵惕惻􅀮之心便􅀃由是觀之無惻􅀮之心非仁無羞惡之心非義無辭譲之心非禮無是非之心非智其只舉惻􅀮一端發見處示人餘三端更不一一拈出夫豈有所畧㢤盖此乃良心苗裔發見最先處乃天地之心萬物之元必自此而後流行不息亨而利貞則是章雖曰偏言而所謂專言之者亦不離此矣仁是本来固有之理不因公而有特因公而存爾如溝渠窒塞故水不通流去其窒塞則水流矣水固不因去塞而有然亦非旣去其塞而又别有一叚工夫使水流通也以此推之所論之得失自見矣又論偏言專言處語意未瑩使人難暁答吕子約代語之喻甚善妄爲此語今巳是十餘年毎以告人無領畧者今乃得子約書知其爲切要之語始有分付處也但前日張富歸所惠書所論或問中語却似未安請且自反扵心分别未發巳􅀤界分令分明却􅀅冊子上所􅀃来合看還是如此否自心下看得未明便􅀅衆􅀃回互恐轉生迷惑㫁置不下也且如子約平生還曽有耳無聞目無見時節否便是祭祀􅀂耳無聞目無見即其升降饋奠皆不􅀎知其時節之所宜雖有賛引之人亦不聞其告語之聲矣故前旒黈纊之􅀃亦只是􅀃欲其專一扵此而不雜他事之意非謂奉祭祀時都無見聞也所謂王乃在中尤無交渉讀書最忌如此支蔓况又平居無事之時乎故程子云􅀂無事時耳湏聞目湏見既云耳湏聞目湏見則與前項所荅巳不同矣又安得曲爲之􅀃而强使爲一義乎至静之時但有􅀎知􅀎覺者而無所知所􅁴之事此扵易卦爲純坤不爲無陽之象􅀂論復卦則湏以有所知􅁴者當之不得合爲一􅀃矣故康節亦云一陽􅀄動處萬物未生時此至㣲至妙處湏虚心静慮方始見得􅀂懐一􅀧偏主彊􅀃意思即方寸之中先自擾擾矣何縁􅀎察得彼之同異邪答吕子約所示四條其前二義雖有小差然猶不至難辨各已畧報去矣至扵未發浩氣二義則皆雜亂膠轕不可爬梳􅂲非一朝之辨所􅀎决本欲置而不論以俟賢者之自悟又􅂲安扵舊􅀃未肯致疑不免畧啓其端千萬虚心垂聴不可一向支蔓固執只要彌縫前人闕誤不知却礙自家端的見處也盖今所論雖累􅁆百言之多然扵中庸但欲守程門問者之􅀃謂未發時耳無聞目無見而巳扵浩氣之􅀃但欲謂此氣元是配合道義而成無道義則氣爲之餒而已其他援引之失皆縁此文以生異義自爲繁冗􅀂一一究析徃復不巳則其􅀃愈繁其義愈汩而未必有益故今奉􅂆不若只取子思孟子之言虚心平看且勿遽増他􅀃只以訓詁字義随句畧解然後反求諸心以驗其本體之實爲如何則其是非可以立判􅀂更疑著則請復詳論之夫未􅀤巳發子思之言巳自明白程子􅁆條引寂然感通者皆與子思本指符合更相發明但答吕與叔之問偶有凡言心者皆指巳發一言之失而随即自謂未當亦無可疑至遺書中􅂊思即是巳發一句則又􅀎􅀤明子思言外之意盖言不待喜怒哀樂之發但有所思即爲巳發此意已極精㣲􅀃到未發界至十分盡頭不復可以有加矣問者不􅀎言下領畧切巳思惟只􅃹要􅀃向前去遂有無聞無見之問㩀此所問之不切與程子平日接人之嚴當時正合不荅不知何故却引惹他致他如此記録前後差舛都無理㑹後来讀者若未敢便以爲非亦且合存而不論今却据守其􅀃字字推詳以爲定論不信程子手書此固未當之言而寜信他人所記自相矛盾之􅀃彊以巳發之名侵過未發之實使人有生巳後未死巳前更無一息未發時節惟有爛熟睡著可爲未發而又不可以立天下之大本此其謬誤又不難曉故或問中粗發其端今旣不信而復有此紛紛之論則請更以心思耳聞目見三事校之以見其地位時節之不同盖心之有知與耳之有聞目之有見爲一等時節雖未發而未嘗無心之有思乃與耳之有聴目之有視爲一等時節一有此則不得爲未發故程子以有思爲巳發則可而記者以無見無聞爲未發則不可􅀂苦未信則請更以程子之言證之如稱許渤持敬而注其下云􅂚嘗有如此聖人又毎力詆坐禪入定之非此言皆何謂邪􅀂必以未發之時無所見聞則又安可譏許渤而非入定㢤此未發巳發之辨也􅀂氣配道義則孟子之意不過曰此氣􅀎配道義若無此氣則其體有不充而餒然耳此其賔主向背條理分合畧無可疑但粗通文理之人無先入偏滯之􅀃以亂其胷次則虚心平氣而讀之無不曉㑹􅀂反諸身而驗之則氣主乎身者也道義主乎心者也氣形而下者也道義形而上者也雖其分之不同然非謂氣在身中而道義在皮外也又何嫌扵以此配彼而爲﨑嶇詰曲以爲之􅀃曰道義本存乎血氣但無道義則此氣便餒而止爲血氣之私故必配義與道然後􅀎浩然而無餒乎語􅀔不順添字太多不知有何慿㩀見得如此􅀂果如此則孟子扵此當别有穏字以盡此意之曲折不當下一配字以離二者合一之本形而又以氣爲主以倒二者賔主之常􅀔也且其上旣言其爲氣也以發語而其下復言無是餒也以承之則所謂是者固指此氣而言􅀂無此氣則體有不充而餒然矣􅀂如来喻以是爲指道義而言􅀂無此道義即氣爲之餒則孟子扵此亦當别下􅁆語以盡此意之曲折又不當如此倒其文而反其義以疑後之讀者如今之云也且􅀂如此則其上本未湏􅀃以直養而無害其下亦不湏更􅀃是集義所生矣今乃連排三句只是一意都無向背彼此之􅀔則巳甚重􅃨而太繁冗矣而其中間一句又如此其暗昧而不分明如此其散緩而無筋骨依以誦􅀃使人迷悶如口含􅑟漆不可吞􅄍竊意孟子胷中明快洒落其發扵言語者必不至扵如此之猥醸而紕繆也又况来喻巳指無是而餒者爲浩氣扵前矣其後又謂無道義則氣爲之餒而但爲血氣之私不亦自相矛盾之甚邪􅀂程子之言則如以金爲器積土成山之喻皆有不􅀎使人無疑者来喻雖亦不敢据以爲􅀃然其所慮􅂲爲二物者亦程子之常言今又不察其施安之所當而冐取以置扵此也其他分別血氣浩氣小體大體皆非孟子正意而妄爲離合却自堕扵二物之嫌原其所以只因配義與道一句不肯依文解義著實平􅀃故湏從頭便作如此手􅀔翻弄乃可以迤邐遷就委曲附㑹而求其通耳孟子言毋􅁀其氣而釋之曰氣體之充又言其爲氣也而指之曰無是餒也是数語者首尾相應表裏相發其所指者正一物耳今必以無􅁀者爲血氣而其爲氣者爲浩然而又􅂲犯二物之戒故又爲之􅀃曰浩氣不離乎血氣徒爲紛擾増添冗長皆非孟子之本意也今亦不暇悉􅁆以䧟扵来喻之覆轍然只如此􅀃巳覺不勝其冗矣幸深思之且以自巳分上明理致知爲急不湏汲汲以救䕶前軰爲事盖其言之得失白黑判然巳不可揜救之無及又况自家身心義理不曽分明正如方在水中未􅀎自㧞又何暇救他人之溺乎但所云未發不可比純坤而當爲太極此却不是小失不敢随例放過且試奉扣􅀂以未發爲太極則已發爲無極邪􅀂謂純坤不得爲未發則宜以何卦爲未發邪竊􅂲更宜静坐放教心胷虚明浄潔却􅀅太極圖及十二卦畫安排頓放令有去著方可下語此張子所謂濯去舊見以来新意者也如决不以爲然則熹不免爲失言者不􅀂權行􅀝閣之爲愈不􅀎如此紛拏彊聒徒費心力有損而無益也答吕子約張元徳訓道爲行固爲踈闊子約非之是也然其所􅀃行字亦不爲全無来歷今不就此與之剖析而別引程子冲漠氣象者以吿之故覺得有堕扵窈􅄀恍惚之病程子所􅀃乃因對義而言故自有編著而不爲病而所以破其􅀃者又似彼東我西不相領畧此乃吾之所見自未透徹未免臆度籠􅇁而强言之所以支離浮汎而不􅀎有所發明也若如鄙意則道之得名只是事物當然之理元徳直以訓行則固不可當時若但以當行之路荅之則因彼之􅀃發吾之意而冲漠之云亦自通貫矣今且以来示所引一隂一陽君臣父子形而上下冲漠氣象等􅀃合而析之則隂陽也君臣父子也皆事物也人之所行也形而下者也萬象紛羅者也是􅁆者各有當然之理即所謂道也當行之路也形而上者也冲漠之無朕者也若以形而上者言之則冲漠者固爲體而其發扵事物之間者爲之用􅀂以形而下者言之則事物又爲體而其理之發見者爲之用不可槩謂形而上者爲道之體天下逹道五爲道之用也元徳所云道不􅀎以自行以下自無病而荅語却􅀃開了其􅀃自是好語但荅他不着爾今更爲下一語云形而上者謂之道物之理也形而下者謂之器物之物也且試屏去他􅀃而只以此二句推之􅀂果見得分明則其他􅀃亦自通貫而無所遺也答吕子約所以不以元徳以道訓行爲然者盖以道爲行則道非行字所􅀎盡又湏以所以行者言之則毋乃欲一而反二乎故以程子道有冲漠氣象吿之欲渠深探夫峻極之體而黙識夫無聲無臭之妙則自知非行之一字所􅀎盡若謂當行之路則􅂲秪可言逹道耳扵論道之原則􅂲難如此著語也形而下即形而上者易傳謂至㣲者理即所謂形而上者也至著者象即所謂形而下者也體用一源顯㣲無間則雖形而上形而下亦只是此箇義理也元徳所􅀃之病前書盡之如来喻之云却攻他不著􅂲是只見自家底是扵鄙論却未深考也謂當行之理爲逹道而冲漠無朕爲道之本原此直是不成􅀃話不謂子約見處乃只如此亦無恠他􅀃之未契也湏㸔得只此當然之理冲漠無朕非此理之外別有一物冲漠無朕也至扵形而上下却有分别湏分得此是體彼是用方􅀃得一源分得此是象彼是理方􅀃得無間􅀂只是一物却不湏更􅀃一源無間也元徳訓道爲行便似来喻訓學爲義理之藴一般一則以所􅀎爲􅀎一則以􅀎爲所􅀎也佛書有􅀎與所􅀎之􅀃􅀎謂人所做作所􅀎謂人所做作底事其分别文義亦甚宻如道則所􅀎之謂學即所謂􅀎也如今小兒屬對看花折柳看與折字是􅀎花與柳是所􅀎此不可亂也此等倫􅀋尚不􅀎通是乃心意大叚麄在豈􅀎及其深㣲之奥邪答吕子約下論語雜論同戊午二月五日所謂五帝紀所取多古文尚書及大戴禮爲主爲知所考信者然伏羲神農見易大傳乃孔聖之言而八卦列扵六經爲萬世文字之祖不知史遷何故乃獨遺而不録遂使史記一書如人有身而無首此尚爲知所考信者邪太史公之洋洋美徳即蘇黄門之騶虞竊脂觀其下文全書不知還撑柱得此􅁆句起否學者扵聖人之道徒習聞其外之文而不考其中之實者徃徃􅁼此王介父所以惑主聴而誤蒼生亦只是此等語耳豈可以此便爲極摯之談而躋之聖賢之列屬以斯道之傳㢤以此等議論爲極至便是自家見得聖賢道理未曽分明􅀍他嚇倒也以史遷􅀎貶卜式與桑羊爲伍又􅀎不與管仲李克爲深知功利之爲害不知六國表所謂世異變成功大議卑易行不必上古貨殖傳譏長貧賤而好語仁義爲可羞者又何謂邪伯夷傳辨許由事固善然其論伯夷之心正與求仁得仁者相反其視蘇氏之古史孰爲􅀎考信扵孔子之言邪謂遷言公孫洪以儒顯爲譏洪之不足爲儒不知果有此意否彼固謂儒者愽而寡要勞而少功是以其事難盡從然則彼所謂儒者其意果何如邪所示􅁆條不暇悉辨若以馬遷與班固並論則固不無優劣而其書􅁆十萬言亦豈無好處但論其大旨則蘇氏兩語􅂲史遷復生不􅀎自解免也今乃諱其所短􅁀其所長以爲無一不合聖人之意推尊崇奨至與六經比隆聞有議其失者則浡然見扵詞色􅁬拳攘臂欲起而扔之一何所見之低矮邪此事不唯見偏識淺去取差謬爲明眼人所笑亦至犯子惡苗碩之戒大爲心術之害不可不知論語一本復下無有字外下無則字學之爲言盖指義理之藴至扵感孚而復有講習相滋之􅀃自夫始學而所願者外則其本巳虧矣謝氏坐如尸坐時習立如齋立時習觀聖人立言之旨有不在彼者尹氏學在巳知不知在人㣲有立我之病以義理之藴訓學字􅂲非字義不成文理後不重章更有􅀃感孚之􅀃與所願者外意似相反且程子扵朋来之樂何故不如此􅀃􅂲更當細思之尹氏􅀃未見立我之病此章是􅀃􅀄學入道之門未湏大叚􅀃得玄妙也鮮則和順積諸中者未厚所積者旣厚其扵逆理亂常之事可以保其必無也犯上之過小作亂之罪大故其言之序如此非謂未厚巳厚而然也務本道生是泛言以起下句之實集註之􅀃宜更詳之巧言令色鮮矣仁此章論明善之功此章只是戒人勿爲巧言令色如何便􅀃得明善之功有所未習其傳或差如師之過商之不及不􅀎不生流弊唯傳而習習而傳然後爲得其正傳傳不習乎文􅀔􅂲不如此曽子之學其傳不差乃是合下見得通透的􅃀非習之功也若所見不是而徒習之愈増其誤耳讀書窮理湏認正意切忌如此縁文生義附㑹穿穴只好做時文不是講學也敬以事言而信則無不盡也信是與民有信期㑹賞罰不欺其民淺言之則魏文侯之期獵商君之徙木亦其􅀋也不湏如此髙􅀃失聖言之本意行有餘力而後學文夫豈以講切爲可緩㦲書固不可不讀但比之行實差緩耳不然則又何必言行有餘力而後學邪究義理之藴言學者不可不究夫義理之藴也因此語爲子夏之言而遂致疑扵其間以子夏之言爲不如孔子亦未爲貶不必如此回䕶但當虚心觀理而随宜斟酌耳義理之藴上著一究字比首章稍成文理然首章之義實當兼踐􅂂而言故謝􅀃亦不可廢若如所􅀃却只􅀃得窮理一􅁁也由乎中而應乎外制乎外所以養其中由乎中而應乎外是推本視聴言動四者皆是由中而出泛言其理之如此耳非謂􅀙裏面做功夫出来也制乎外所以養其中方是􅀃做功夫處全是自外而内自葉流根之意非謂内外交相養與此章之文本不相戾不湏如此分踈也如視聴二箴云心􅀆本虚秉􅃔天性亦皆是推木而言若其功夫則全在制之扵外閑邪勿聴處可更詳之向見叔昌之弟摹刻尹和静所書四箴作由乎中所以應乎外嘗辨其謬後見尹書他本却皆不錯然旣有此誤則尹公想亦未免錯㑹其師之意也荅吕子約戒懼扵不睹不聞者乃謹獨之目而謹獨者乃戒懼扵不睹不聞之緫名似未可分爲二事也今曰道固無適而不在而其要切之處尤在扵􅀮㣲雖無所不謹而所謹者尤在扵獨固欲學者用功轉加切近云云􅀂末章潜雖伏矣不愧屋漏分爲兩節雖可以各相附屬然前一節謂人所不見則屬乎人後一節謂巳之所有則猶有迹比之巳之不睹不聞則又有間矣仐以人之所不見爲謹獨意雖切而反輕以不愧屋漏爲不睹不聞則又㡬扵躐等来示所疑中庸首章数句文義亦通比之章句之􅀃尤省力而有味但以上文考之旣言道不可湏􅁷離即是無精粗􅀮顯之間皆不可離故言戒謹乎不睹不聞以該之若曰自其思慮未起之時早巳戒懼非謂不戒謹乎所睹所聞而只戒謹乎不睹不聞也此兩句是結抹上文不可湏􅁷離一節意思了下文又提起􅀃無不戒謹之中􅀮㣲之間念慮之萌尤不可忽故又欲扵其獨而謹之又别是結抹上文􅀮㣲兩句意思也若如来􅀃則旣言不可湏􅁷離而當戒謹矣下句却不更端而偏言唯􅀮㣲爲顯見而不可不謹其獨則是所睹所聞不隠不㣲之處皆可忽而不謹如此牽連即􅀅上句亦􅀃偏了只這些子意思􅂲扵理有礙且扵文􅀔亦似重􅃨而繁冗耳所謂固欲學者用功轉加謹宻熹之本意却不如此盖無所不戒謹者通乎已發未發而言而謹其獨則專爲巳發而設耳卒章所引濳雖伏矣猶是有此一物藏在􅀮㣲之中不愧屋漏則表裏洞然更無纎芥查滓矣盖首章本静以之動卒章自淺以及深也且所不見非獨而何不動而敬不言而信非戒謹乎其所不睹不聞而何􅀂首章不分别即此等處皆散漫而無統矣荅吕子約不睹不聞旣即是􅀮㣲之間念慮之萌則所謂莫見乎􅀮莫顯乎㣲者盖非别有一段工夫在戒懼不睹不聞之後明矣只爲道不可湏􅁷離與莫見乎􅀮莫顯乎㣲不同戒謹不睹􅂲懼不聞與謹獨不同所以文意各别今却硬􅀃做一事所以一向錯了也既以不睹不聞爲已所不知􅀂􅀎扵此致謹則所謂􅀮㣲之間念慮之萌固已不􅀎不謹􅀂果如此則上叚文意巳足不知何故又湏再􅀃必謹其獨邪􅂚嘗有如此頌絮底聖賢不愧屋漏亦未免扵㣲有迹也謂之表裏洞然更無查滓則􅂲㡬扵陵節矣􅀂猶有迹便是未􅀎無愧扵屋漏矣此段􅀃得愈更支離􅀂只􅃹如此􅅶繞固執則只已見便爲至當之論亦不湏更講論矣前書冩去巳極分明只是不曽子細看先橫著一箇人我之見在胷中扵巳􅀃則只尋是處雖有不是亦瞞過了扵人􅀃則只尋不是處吹毛求疵多方駁難如此則只長得私見豈有長進之理此亦便是論司馬遷底心也今更不􅀎再􅀃得只請􅀅舊本再看􅀅此兩節虚心體認只求其分勿求其合認来認去直到認得成兩段了方是到頭如其未然更不湏再見喻也来教又謂心之有思與耳之有聞目之有見爲一等時節所圈出思字初看即疑􅂲當作知字而尋舊本未見不知當時的是何字又􅂲或是筆誤方欲再請舊本来看子細剖析奉報偶復尋得舊本果是知字不知来喻何故如此錯誤豈舊本脫漏此一節邪如其不然則此等處尚爾踈略又安􅀎得其精㣲之意邪元本兩行今再録去可更詳之舊本云心之有知與耳之有聞目之有見爲一等時節雖未發而未嘗無心之有思乃與耳之有聴目之有視爲一等時節云云再看来書他處所􅀃巳有知字即是舊本元無脫漏是直看得老草􅀅知字思字作一様看耳前書無聞無見之􅀃只做未有聞未有見平看過若看得過重以爲無所聞無所見則誠近扵異端矣未有聞見與無所聞見平看重看不知如何分别更請子細􅀃謂未有聞未有見爲未發所謂冲漠無朕萬象森然巳具不知衆人果􅀎有此時乎學者致知居敬之功積累涵養而庻㡬有此爾子思只􅀃喜怒哀樂今却轉向見聞上去所以􅀃得愈多愈見支離紛冗都無交渉此乃程門請問記録者之罪而後人亦不善讀也不若放下只白直看子思􅀃底湏知上四句分別中和不是􅀃聖人事只是汎􅀃道理名色地頭如此下面􅀃致中和方是􅀃做功夫處而唯聖人爲􅀎盡之􅀂必以未有見聞爲未發處則只是一種神識昬昧底人睡未足時􅀍人驚覺頃刻之間不識四到時節有此氣象聖賢之心湛然淵静聦明洞徹决不如此若必如此則洪範五事當云貌曰僵言曰啞視曰盲聴曰聾思曰塞乃爲得其性而致知居敬費盡工夫却只養得成一枚癡獃罔兩漢矣千不是萬不是痛切奉吿莫作此等見解若信不及一任狐疑今後更不􅀎􅀃得也詳看此段来意更有一大病根乃是不曽識得自家有見聞覺知而無喜怒哀樂時節試更著精彩看莫要只􅃹等閑言語失却真的主宰也以未發爲太極以未發爲太極只此句便不是所以下文一向差却未發者太極之静巳發者太極之動也須如此看得方無偏滯而兩儀四象八卦十二卦之說皆不相礙矣太極動而生陽動則爲巳發矣以動而生陽爲巳發是也即不知静而生隂爲巳發爲未發邪前日所禀未嘗敢以巳發爲無太極也而又云巳生兩儀四􅁚八卦難以爲未發未嘗以巳發爲無太極是也而又云巳生兩儀四象八卦難以爲未發何邪易之無思無爲比未發猶是以心爲言扵性之體叚巳是猶欠拈出以無思無爲爲􅀃心而不及性不知心性兩字是一物邪兩物邪来教謂有此氣来配道義始􅀎充其體而無餒若無此氣来配則雖有道義亦不􅀎不餒矣孟子兩言其爲氣也云云即當以氣字爲主而以下文天地道義等字爲客方是文意今却硬􅀅文義紐轉以道義爲主而氣爲客又􅀅熹􅀃亦添入一来字則區區所見雖謬决不至如此之顛倒也前書之言巳盡今更不􅀎􅀃得只請且依此意捩轉舊来話頭依孟子本文主客形􅀔排齪教成行道有歸著直候􅀅来見得舊􅀃全然不是方是究竟如其不然不若忘言之爲愈也荅吕子約所喻前論未契今且當以􅆂養本原勉強實􅂂爲事此又錯了也此是見識大不分明湏痛下功夫鑚研勘覈教透徹了方是了當自此以後方有下手􅆂養踐􅂂處如横渠先生所見只是小小未瑩伊川先生猶令其且􅆂泳義理不只􅀃完養思慮了便休也如今乃是大叚差舛却不汲汲向此究竟而去別處閑坐道我􅆂養本原勉強實􅂂又聞手冩六經亦是無事費日都不是長進底道理要湏勇猛􅂢棄舊習以求新功不可一向如此悠悠閑過歳月也本欲俟徳華人回附書今日偶有南豐便至道夫處且先附此奉報此事不比尋常不可頃刻失其路脉也大抵學問只有兩途致知力行而巳在人湏是先依次第十分著力節次見効了向後又看甚處欠闕即便於此更加功夫乃是正理今却不肯如此見人􅀃著自家見處未是却不肯服便云且待我􅆂養本原勉強實􅂂此如小兒迷藏之戯你東􅁁来我即西􅁁去閃你西􅁁来我又東􅁁去避如此出沒何時是了邪區區本巳不􅀎􅀃得今更􅀃此後畨若更不相領畧便且付之忘言矣如人上山各自努力到此時節豈更有心情􅃹得他人邪移畨一本作一畨荅吕子約兩書所喻備見日来進學新功甚慰牢落兩卷悉巳條對納呈幸更詳之也大抵爲學只是􅀶文約禮兩端而巳􅀶文之事則講論思索要極精詳然後見得道理巨細精粗無所不盡不可容易草略放過約禮之事則但知得合要如此用功即便著實如此下手更莫思前筭後計較商量所以程子論中庸未發處荅問之際初甚詳宻而其究意只就敬之一字都收殺了其所謂敬又無其他玄妙竒特止是教人毎事習箇專一而巳都無許多閑􅀃話也今詳来喻扵當􅀶處旣不􅀎虚心觀理以求實是如論易詩處是也於當約處乃以引證推􅀃之多反致紛擾如論求其放心而援引論􅀃数十百言不􅀎得了只此便是放其心而不知求矣凡此之􅁼皆扵鄙意深所未安􅀼謂莫􅀂扵此兩塗各致其極無事則專一嚴整以求自巳之放心讀書則虚心玩理以求聖賢之本意不湏如此周􅃒勞攘枉費心力損氣生病而實無益扵得也横渠謂心寧静扵此一向定疊目前縦有何事亦不恤也休􅀅閑細碎在思慮近雖見此漸明然養得未熟有時不好底意思上心来則此見便若有物昬蔽雖目前小小事亦􅀎来相礙因是知得尚未屬巳此理固然然亦湏是真實知至物格方得自然如此􅀂但􅀃時快活間或又不如此則只是想象摶量不􅁕恃也子在川上云云觀諸天地古今事變莫非逝者然故故新新相因不巳以何爲始以何爲終故周子發明太極之藴則曰太極本無極云云聖人之心純亦不巳此乃天徳有天徳便可語王道其要只在謹獨終歸扵謹獨者莫見乎􅀮莫顯乎㣲不扵獨而致謹則天命流行遏于躬而不知矣理固如此然援引太多反汨沒了正意兼所引亦有不相似者如周子無極之語純亦不巳只是無間㫁扵獨而不謹焉則有間㫁而與天地不相似矣太極動而生陽以本體言之即易所謂􅁇之者善也以氣運言之即易所謂復其見天地之心也以卦言之即震之一索咸之男下下字疑也然易傳謂動則終而復始所以恒而不窮雖物有終始而此理無窮則雖動極而静静極復動也云云學者固當兼致静存動察之功然扵動之端而有見乎天地之心斯􅀎窺乎太極之藴矣其曰元亨誠之通利貞誠之復其曰利貞者乾之性情盖以夫人徒見生意之發扵春夏而不知夫藏扵根荄也觀諸草木揺落之時生意􅀂息矣而根荄膏潤苞芽潜萌是乃終而復始盖情性然也有以明乾之性情則知太極之性情矣有以見天地之心則知太極之動而生陽矣此叚尤多可疑請且就通書太極體認令此􅁆項歴落分明未要添入復卦震咸性情等􅀃夾雜得都不明不濟事也震咸尤無干渉性情之義亦非是須各自看乃佳程子暌卦傳曰物雖異而理本同故天下之大群生之衆暌散萬殊而聖人爲􅀎同之某觀至此扵不有兩則無一之義稍分明但所謂理本同者程子之􅀃雖詳終未􅀎實見其理天施地生男倡女随此感彼應盖不􅀎以相無也非理之本同何以如此其爲氣也云云某竊詳此叚所言其爲氣也非有異義上言此氣之浩然體叚本如是養之之法勿忘勿助則無所耗傷而此氣流行充塞無所抑遏盖不待自反而縮也故直之一字當因大剛而爲三徳􅀂坤之直方即浩氣之剛直其可虧欠乎下言此氣合義與道而成而血氣循乎􅁤轍到此則血氣便是義道矣非是養氣之後又待此而爲助也所以再言其爲氣也配義與道盖深明夫此氣之發見本是義道若識得此氣之本然則知所養而其動非血氣矣其曰無是餒也欲人知夫此身之所以爲主者茍或虧失則便枵然也愚見如此不敢不竭言之自反而縮是本章上文坤爻直方是他書異義二者孰爲親踈請試思之得失可見氣是形而下者道義是形而上者如何合得况配義與道分明是􅀅此氣配彼義道而爲之助豈是養氣之後又􅀅此而爲助也如此看得全然不識文義更宜深思未易􅃍立􅀃也此是胷中先有舊􅀃爲所牽制不得虚平故爾滯礙枉費心力可且􅀅舊􅀃􅁠行􅀝閣而只􅀅本文反復玩味乆乆自然漸虚漸平則扵此無疑矣朝聞道夕死可矣近㸔得程子所謂除了身只是理之􅀃扵此最親切盖私乎此身則莫知主乎此身者爲何如其生其死真有同扵醉夣矣云云故大程子謂動容周旋中禮者盛徳之至君子行法以俟命而巳朝聞道夕死可矣之意小程子旣謂死得是又謂苟有此志則不肯一日安扵所不安何止一日湏􅁷不􅀎皆是發明除了身只是理底意思詳觀遺書亦載大程子有云皆實理也人知而信者爲難死生亦大矣非誠知道豈以夕死爲可乎則雖槩言之而日月寒暑屈伸徃来之常理同乎晝夜死生者皆可致察小程子有云聞道者知所以爲人也夕死可矣是不虚生也則又指切言之以明實理所存是亦除了身只是理之意至扵小程子經解乃親筆也則止云人不可以不知道茍得聞道雖死可也雖不加一辭而語意則甚不輕矣今集注本大程子實理之􅀃而以事物當然之理名之固不使人求之恍惚然果足以究斯義乎又大程子非誠知道之言以尹氏所􅀃考之固爲切實然􅂲所謂得者或流扵偏差而未必得其緫腦也某据所曉者􅄍露以求誨剖道字理字禮字法字實理字日月寒暑徃来屈伸之常理事物當然之理此􅁆􅀃不知是同是别除了身只是理只是不以血氣形骸爲主而一循此理耳非謂身外别有一物而謂之理也流扵偏差則非所謂得矣一隂一陽之謂道天地絪緼也􅁇之者善物與無妄也成之者性各正性命也各正性命則屬乎氣禀矣遺書言凡人􅀃性只是􅀃􅁇之者善也孟子言人性善是也又􅀂先言氣禀而後及此周子以萬物資始爲善各正性命爲性此是就造化處􅀃今欲以物與無妄言之則此句屬性而以上句天下雷行爲善方始相對得過程子所云今人􅀃性只是􅀃􅁇之者善此又是近下就人性分上􅀃語各有當更請詳之只看本文都不得引外来一字方始見得向觀遺書所載人生而静以上不容􅀃才􅀃性時便巳不是性也凡人􅀃性只是􅀃􅁇之者善也孟子言人性善是也茫然不曉所謂今始粗曉此文義人生而静天之性也周子所謂主静者以此也然所謂不容􅀃者是豈終不可得而􅀃乎周子不得巳而言之曰無極而太極則指不容􅀃者以喻諸人耳所謂才􅀃性時便巳不是性此却因上文而言之或指太極爲性則非矣盖天命之謂性命之扵人始謂之性也所謂凡人􅀃性只是􅀃􅁇之者善此􅀃得性善最爲親切若秪論成而不論􅁇則有二本非性之果善也故孟子道性善既因其􅁇而得其本源其言惻􅀮仁之端羞惡義之端則又因其發見之苗裔而知其爲固有學者扵此唯有操存之功不舎使漸著察耳此條尤覺紊亂更請且以前叚之􅀃識認文義令有條理未可如此引援衮雜轉見不分明也所謂治絲而棼之也答吕子約所喻􅀶文約禮盡由操存中出固是如此但􅀶文自是一事􅀂只務操存而坐待其中生出􅀶文功夫􅂲無是理大抵學問功夫看得規模定後只一向著力挨向前去莫問如何若何便是先難後􅀗之意􅀂方討得一箇頭緒不曽做得半月十日又却計較以爲未有效驗遂欲别作調度則􅂲一生只得如此移東換西終是不成家計也益公近亦􅀵書扵歐集考訂益精亦不易老来有許多心力也需中庸詩傳此便未可􅀉又􅂲且要操存無暇看讀更俟後便也蘇黄門初不學佛只因在筠州䧟入此漩渦中􅂲是彼中風土不好一生出不得今請著些精彩莫只􅃹回頭轉腦忽然不知不覺也旋入去即不相奈何也風色愈勁精舎諸生方幸各散去今日輔漢卿忽来甚不易渠􅀎自㧞向在臨安相聚見伯恭舊徒無及之者􅀃話儘有頭緒好商量非徳章諸人之比也答吕子約十一月十二日前書所論四事不審雅意云何􅀼意賢者用力扵此不爲不乆其切問近思之意不爲不篤而比觀所講與累書自叙􅀃處覺得瞻前顧後頭緒太多所以胷次爲此等叢雜壅塞􅅶繞不􅀎得明快直截反不得如新學後生聞一言且守一言解一義且守一義雖未􅀎便有所得亦且免得如此支離紛擾狼狽道途日暮程遥無所歸􅀫也晦庵先生朱文公文集卷第四十八閩縣儒學教諭王製校朱文公文集卷第四十八後考異荅吕子約聞後来有来依講席者斆學斆一作教来喻拈出劉康公語出一本作定交空蕩蕩地不要留一字字一本作宗萬象下一本有之字子思只􅀃喜怒哀樂云云不識四到時節不識一本作不知癡獃罔兩漢一本作癡獃人所喻􅀶文約禮云云精舎諸生方幸各散去各下一本有已字
