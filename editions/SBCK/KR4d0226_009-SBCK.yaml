body:
  text: 石馬斜川之集分韻賦詩得燈字改􅀊風日好出門欣得朋復招里中彦及此雲間僧行行渉清波斯亭一來登徙􅀝緑樹䕃摩娑蒼石稜遥瞻原野春仰視天宇澄一水旣紆鬱群山正崚嶒時禽悅新陽濳魚躍輕氷却念去年日俯仰愁予􅈾長呤斜川詩日落寒烟凝瞑色變晴景清尊照華燈頽顔感川徂稚齒歡年増酒盡不能起朱欄各􅀷凭游石馬以駕言出遊分韻賦詩得出字抱病守窮廬閉户常罕出坐見春氣􅀷清隂晝䝉密今朝積雨過淑景回煦律不有塵外蹤何由散愁寂行行整巾屨散漫委書帙野逕自縈紆前峰但􅒞崒婆娑茂樹下左右寒流汨亂石翳蒼根於焉憇腰膝追遊固才彦逢遇亦竒逸招邀愧􅀷情晤言永兹日君有尊中物我進沂上瑟日夕不得留餘歡未云畢三月晦日與諸兄爲眞率之約徘徊石馬晚集保福偶成短句奉呈聊發一􅀏春服明朝換晴川漲緑隂追隨皆勝侣邂逅即初心社蹟莓苔古禪扉竹樹􅀷移尊眞惜日畢景共披􅁭儉德遵賢範哇詞愧雅音清和應更好逸想􅀉雲岑是日約後㑹爲仙洲之游比與鄰曲諸賢修舉􅀊事携壺石馬追􅀘斜川之遊而公濟適至飲罷首出和陶之句以紀其勝輙亦用韻酬答兼呈諸同遊者請共賦之皇天分四序代謝無時休昔人抱􅀌念感此成清遊逈眺曽城臯朗詠斜川流􅀊月今幾許長波没輕鷗眷言撫佳辰荒㝷靡遺丘且復置往事及兹命高儔縱䇿聊並歡飛觥起相酬未知千載下亦記此日不商歌有遺音林樂無餘憂但得長如此吾生復何求行視武夷精舍作神山九折溪㳂泝此中半水􅀷波浪闊浮緑春渙渙武夷溪凢九曲多急流亂石北第五曲水特􅀷闊平緩緑漪可愛上有蒼石屏百仭聳雄觀嶄巖露垠堮突兀􅀝霄漢此峯夷上削下㧞地峭立如方屋㡌按舊圖名大隱屏淺麓下縈迴􅀷林乆叢灌胡然閟千載逮此開一旦峯下小山重􅃨中有平地數十丈喬木長藤茂林脩竹交相蔽隱舊無人迹乾道巳丑予舟過而樂之及今始能卜築以醻曩志我乗新村船輟棹青草岸榛莽喜誅鉏靣勢窮考按居然一環堵妙處豈輪奐左右矗竒峯躊躇極佳玩方經始時予以病不能來至是送别山西始自新村買舟以來視􅀁􅅞屋三間制度殊草草然背􅀒大隱屏靣直溪南大山左有魏王上昇峯右有鍾模三教等石極爲雄勝是時芳節䦨紅緑紛有爛好鳥時一鳴王孫逺相喚山多獮猴暫遊意巳愜獨往身猶絆珍重舍瑟人重來足幽伴巳約􅀄夏與同志皆往遊集武夷精舍雜詠并序武夷之溪東流凡九曲而第五曲爲最􅀷蓋其山自北而南者至此而盡聳全石爲一峯㧞地千尺上小平處㣲戴土生林木極蒼翠可玩而四隤稍下則反削而入如方屋帽者舊經􅀁謂大隱屏也屏下兩麓坡坨旁引還復相抱抱中地平廣數畒抱外溪水隨山勢從西北來四屈折始過其南乃復繞山東北流亦四屈折而出溪流兩旁丹崖翠壁林立環擁神剜􅀑刻不可名狀舟行上下者方左右顧瞻錯愕之不暇而忽得平岡長阜蒼藤茂木按􅄛迤靡膠葛䝉翳使人心目曠然以舒窈然以􅀷􅀂不可極者即精舍之􅀁在也􅀡屏下兩麓相抱之中西南向爲屋三間者仁智堂也堂左右兩室左曰􅀮求以待棲息右曰止􅀫以延賔友左麓之外復前引而右抱中又自爲一塢因累石以門之而命曰石門之塢別爲屋其中以俟學者之群居而取學記相觀而善之義命之曰觀善之齋石門之西少南又爲屋以居道流取道書眞誥中語命之曰寒棲之館􅀡觀善前山之顚爲亭回望大隱屏最正且盡取杜子美詩語名以晚對其東出山背臨溪水因故基爲亭取胡公語名以鐵笛說具本詩注中寒栖之外乃植楥列樊以斷兩麓之口掩以柴扉而以武夷精舍之扁掲焉經始於淳熈癸卯之春其夏四月旣望堂成而始來居之四方士友來者亦甚衆莫不歎其佳勝而恨它屋之未具不可以乆􅅏也釣磯茶竈皆在大隱屏西磯石上平在溪北岸竈在溪中流巨石屹然可環坐八九人四靣皆􅀷水當中科臼自然如竈可㸑以㵸茗凢溪水九曲左右皆石壁無側足之徑唯南山之南有蹊焉而精舍乃在溪北以故凢出入乎此者非魚艇不濟總之爲賦小詩十有二篇以紀其實􅀂夫晦明昏旦之異􅀱風烟草木之殊態以至於人物之相羊猿鳥之吟嘯則有一日之間恍惚萬變而不可窮者同好之士其尚有以發於予􅀁欲言而不及者乎哉精舍琴書四十年㡬作山中客一日茅棟成居然我泉石仁智堂我慙仁知心偶自愛山水蒼崖無古今碧澗日千里隠求齋晨䆫林影開夜枕山泉響隱去復何求無言道心長止􅀫寮故人肯相尋共􅀉一茅宇山水爲􅅏行無勞具雞黍石門塢朝開雲氣擁暮掩薜蘿􅀷自􅀏晨門者那知孔氏心觀善齋􅀒笈何方來今朝此同席日用無餘功相看俱努力寒栖館竹間彼何人抱甕靡遺力遥夜更不眠焚香坐看壁晚對亭􅀝笻南山巔郤立有晚對蒼峭矗寒空落日明影翠鐵􅅇亭山前舊有奪秀亭故侍郎胡公明仲嘗與山之隱者劉君兼道遊渉而賦詩焉劉少豪勇游俠使氣晚更晦迹自放山水之間善吹鐵􅅇有穿雲裂石之聲胡公詩有更煩横鐵笛吹與衆仙聴之句亭今廢乆一日與客及道士數人尋其故址適有􅅇聲發於林外悲壯回欝巖石皆震追感舊事因復作亭以識其處仍改今名何人轟鐵􅅇噴薄兩崖開千載留餘響猶疑笙鶴來釣磯削成蒼石稜倒影寒潭碧求日靜垂竿兹心竟誰識茶竈仙翁遺石竈宛在水中央飲罷方舟去茶煙裊細香漁艇出載長煙重歸􅋔片月輕千巖猿鶴友愁絶棹歌聲次公濟精舍韻一室空山裏纎塵逈莫侵􅀂非同臭味誰肯逺過臨健䇿凌丹壑清詩動玉琴溪􅁁一回首平地足﨑嶔奉同公濟諸兄自精舍來集冲佑之􅀊寒軒因邀諸羽客同飲公濟有詩贈守元章師因次其韻蓬萊清淺今幾年武夷突兀還蒼然但忻丹籍有期運不悟翠壁無寅緣鼎中龍虎應浪語紙上爻􅂏非眞傳明朝猿呌三峽路一葉徑上滄浪船出山道中口占川原紅綠一時新暮雨朝晴更可人書􅁽埋頭無了日不如抛却去㝷春淳熈甲辰中春精舎間居戲作武夷櫂歌十首呈諸同遊相與一􅀏武夷山上有仙靈山下寒流曲曲清欲識箇中竒絶䖏櫂歌閑聽兩三聲一曲溪􅁁上釣船幔亭峯影蘸晴川虹橋一斷無消息萬壑千巖鎻翠煙二曲亭亭玉女峰挿花臨水爲誰容道人不復陽臺夣興入前山翠幾重三曲君看架壑船不知停櫂幾何年桑田海水今如許泡沫風燈敢自憐四曲東西兩石巖巖花垂露碧􅧑􅆴金雞呌罷無人見月滿空山水滿潭五曲山高雲氣􅀷長時烟雨暗平林林間有客無人識欵乃聲中萬古心六曲蒼屏遶碧灣茅茨終日掩柴關客來􅀝櫂巖花落猿鳥不驚春意閑七曲移船上碧灘隱屏仙掌更回看人言此處無佳景只有石堂空翠寒此詩後二句一本作却憐昨夜峯頭雨􅄈得飛泉幾道寒八曲風烟勢欲開鼓樓巖下水縈洄莫言此處無佳景自是逰人不上來九曲將窮眼豁然桑麻雨露見平川漁郎更覔桃源路除是人間别有天伏䝉致政少傅相公寵賜􅀉題武夷精舍詩一首拜受捧讀不勝仰歎無以自見區區感幸之誠輙繼高韻繕寫拜呈冒瀆威尊下情恐悚之至望斷鈞天白玉都石田茅屋詎應無况䝉一字榮褒衮便覺千峰勝畫圖舊弼詩情高綠野狂奴心事只風雩蒲輪幾日符嘉夣恰有流霞酒一壺舊弼公􅀁居坊名取答詔語也熹近嘗夣公􅃐召枉臨止飲留􅀫翌日登車手取几間活人書一帙以行意者公當􅄪施醫國之手以活斯人乎李義山武夷詩有流霞酒一杯之句劉子澄逺􅀉羊裘且有懐仁輔義之語戲成两絶爲謝以發千里一􅀏短棹長簔九曲灘晚來閑弄釣魚竿幾回欲過前灣去却怕斜風特地寒誰把羊裘與醉披故人心事不相違狂奴今夜知何處月冷風凄未肯歸過蓋竹作二首二月春風特地寒江樓獨自􅀝欄干箇中詎有行藏意且把前峰細數看浩蕩鷗盟乆未寒征驂聊此駐江干何時買得魚船就乞與人間畫裏看送建陽陳丞伯厚還鄕栝蒼雲壑入秋夣閩嶺風霜侵􅁂絲􅀊晚未􅀵稽古力徑荒曽擬賦歸辭一官坎􅇄嗟丞􅀒百􅀊歡榮慶母慈去歩逶迱無愠色此心惟有古人知拜鴻慶宫有感舊京原廟乆煙塵白髪祠官感􅁣新北望千門空引籍不知何日去朝眞答􅀽機仲論啓䝉忽然半夜一聲雷萬戸千門次第開􅀂識無心含有象許君親見伏羲來半夜一本作平地觀林長仁書卷戲題問答猿去山空鶴亦飛柴門空掩釣魚磯門前樹葉都黄了何事幽人乆不歸爲愛雲泉百尺飛故將茅屋傍苔磯幾年清夣黄塵裏此日秋風一棹歸題嚴居厚溪莊圖平日生涯一短篷只今回首畫圖中平章箇裏無窮事要見三山老放翁謂陸務觀時嚴居厚之官剡中擬縣􅀘以􅆉鳴秋詩天籟誰爲主乗時各自鳴如分百􅆉響來助九秋清未歇吟風調先催泣露聲乾坤闢氛氣草木斂華英易斷愁人夣難安懶婦驚唯應廣成子萬感不􅀜情古語云絡緯鳴􅂴婦驚見詩䟽挽蔡太􅀶疇昔相逢地知君意矯强旋聞將使指勁節動朝行方爲人材喜相期事業長如何􅃍不淑未及􅁂毛蒼乙卯八月晦日浮翠亭次叔通韻弱植有􅀌念獨住窮名山那知􅀊月逝白首塵埃間今朝定何朝憑高睨清灣羣賢亦戾止共此一日閑晤言不知疲林昏鳥飛還勝踐可無紀重來諒非艱留語巖上石母使門常􅀜用丘子服弟韻呈儲行之明府伯玉卓丈及坐上諸友我是溪山舊主人歸來魚鳥便相親一盃與爾同生死萬事從渠更故新謹次縣大夫見屬之韻撫摩凋瘵爲心切摹寫風煙著語親只願從今更無倦清詩美政逐年新承事卓丈置酒白雲山居飮餞致政儲丈叔通因出佳句諸公皆和熹輙亦繼韻聊發坐中一􅀏此題一本作白雲寺送儲柯伯升老去讀書秋樹根山林兒女定誰尊偶縁送客來僧寺却似披雲卧石門物外祗今成跌蕩人間何處不啾喧一杯且爲陽關盡􅀟目從教别淚昏東坡賦徐德占舊居有一爲兒女涴始覺山林尊之句丙辰正月三日贈彭世昌歸山象山聞說是君開雲木參天瀑響雷好去山頭且堅坐等閑莫要下山來和人都試之韻儲胥聞道落􅀄成共喜兒郞意氣生初恨雨聲迷疊皷忽驚晴色動高旌盤牟入詠詩情壯破的傳觴酒令明縱使腐儒東鄉坐不妨堂上有竒兵聚星落成致政陳丈舉酒屬客出示新詩而仲卿朝瑞及劉范二兄相與繼作熹幸以卜鄰得陪勝集率爾次韻聊發一􅀏適親德範仰循循遽喜名章肆筆成賸說臺高今勝昔極知星聚暗還明當家翰藻爭春麗上客詞源徹底清更共鄰翁閑指􅀧千峰環合水無聲謹次陳昭逺丈龍洲鄉社高韻并呈諸兄友幾年社酒醉班荆此日祠壇喜落成誤許俗書輕染汙急傳佳語頌登平年豐巳荷天垂慶人傑還欣地炳靈不信鄰村是塵境請看緑水鎻紅亭懷潭溪舊居憶住潭溪四十年好峰無數列䆫前雖非水抱山環地却是冬温夏冷天遶舎扶踈千箇竹傍崖寒冽一泓泉誰教失計東遷繆憊卧西䆫日滿川􅅴澤應祈一蘇焦槁皆昭逺致政宣義丈及仲卿諸友晝夜精䖍不出道􅂣之力而昭逺丈惠詩反以見屬非􅀁敢當輒依高韻和呈以見鄙懷并簡同社諸兄友精禱由來未浹辰如何嘉澍便遄臻誠通幽隱知無間喜動龍天信有因適歎惔焚千畒盡忽驚滂潤一時均誰云化育流行妙只屬乾坤不屬人奉題李彦中􅀁藏俞侯墨戲不是􅅐中飽丘壑誰能筆下􅄍雲煙故應秪有王摩詰觧寫離騷極目天題劉志夫嚴居厚瀟湘詩卷後瀟湘門外水如天說著令人意慘然試問登高能賦客箇中何似汨羅淵余南遊不能過衡山但見人說衡州門外泊船處風物令人愁未知信否因覧此卷書以訊之聞蛙兩樞盛怒􅃲春池羣吠同聲徹暁帷等是一􅂣狼籍事更無人與問官私延平水南天慶觀夜作石樓雲卧對江城城角吟霜永夜清料得南枝正愁絶不堪聞此斷腸聲墨梅夣裏清江醉墨香蘂寒枝瘦凜氷霜如今白黒渾休問且作人間時世􅋔秋華四首木芙蓉紅芳暁露濃綠樹秋風冷共喜巧回春不妨閑弄影蕙古􅀁謂蕙乃今之零陵香今之蕙不知起於何時也今花得古名旖旎香更好適意欲忘言塵編詎能考木犀喬木生夏凉芳㽔散秋馥未覺􅀊時寒扶踈方遶屋菊青蕋冐珍叢幽姿含暁露政爾破荒寒詎免傷遲暮晦翁足疾得程道人鍼之而愈戲贈此詩十載扶行恃短笻一鍼相値有竒功出門放歩人爭看不是前來勃窣翁戲答楊庭秀問訊離騷之句二首昔誦離騷夜扣舷江湖滿地水浮天只今擁鼻寒䆫底爛却沙頭月一船春到寒汀百草生馬蹄香動楚江聲不甘强借三峰靣且爲靈均作杜蘅佛法不怕爛却禪家語也杜蘅一名馬蹄香本草辨僞藥云細辛則杜蘅水浸令直三峯謂華隂也孝宗皇帝挽歌詞阜陵發引詔許近臣進挽歌辭熹㳟惟盛德大業不易形容方將攄竭鄙思以效萬一􅁳搜連日纔得四語而忽􅀍閔勞之詔罷遣東歸遂不敢成章以進杜門累年每竊私恨戊午之春大病瀕死黙念平生仰􅀌恩遇無路􅀘報感激涕泗不能自巳謹因舊篇續成十有六韻略叙本末以見􅀌臣亡狀死不忘君之意云仗便之便一本作更精一傳心妙文明撫運昌乾坤歸獨御日月要重光不値亡胡􅀊何由復漢疆􅃍移丹極仗便上白雲鄕九有哀同切􅀌臣淚特滂詎因逢舜日曽得厠周行但憶彤墀引頻趨黼坐旁衮華叨假寵縞素識通䘮似有鹽梅契還嗟貝錦傷戴盆驚委照増秩待行香手䟽攄丹悃衡程發皂囊神心􅀿斗轉巽令亟風􅀭未答隆儒厚俄聞脫蹝忙此生知永巳没世恨空長内難開新主遄歸立右廂因山方慘澹去國又愴惶疾病今如許形骸可自量報恩寜複日􅃘死續殘章詩送碧崖􅅴叔懷游廬阜兼簡白鹿山長呉兄唐􅀸及諸􅂄舊三首羗廬不見幾經年一話清遊一悵然此日送君憑問訊千峰影裏舊潺湲知君掛席下清江未見香爐意巳降􅀡上新泉得雄觀便將傑句寫長杠遺君蹤跡莽荆榛曽把詩書爲作新今日總輸呉季子枕流漱石自由身諸人巳致書者此不復及此外更有陳勝私在九疊屏下田舍彭師范在隔江都昌縣界中皆勝士也趙南紀病卧城中不知今能出入否叔懷皆可爲一訪致鄙意不敢輙以僞跡相汙染也山間勝䖏皆有前賢題詠可尋獨新泉近出最名殊勝非三峽漱石所及而余未之見故詩中特言之黄石巖絶高而潄玉之原眼界特曠逺余嘗一詣而不能及近聞故吏張生棄家居之其勇猛精進老守蓋有愧焉叔懷儻至其䖏試爲物色頗存問之爲佳丘子服來訪道間得古梅折以爲贈劉叔通江文卿俱來各有佳句因各次韻爲答三首老枝横出數花新誰􅀉寒齋雪夜春江路猶􅀿有幽伴秪愁難得賞心人用子服韻獨樹臨􅀌岸横枝放淺花不須煩驛使正耐雪斜斜用叔通韻西湖居士㝷詩處今墮軟紅車馬塵半樹横枝空好在只􅀿無地覔髙人用文卿韻用子服韻謝水僊花水中僊子來何處翠䄂黄冠白玉英報道幽人􅀍渠惱著詩送與老難兄引年得請伏􅂪致政學士契丈特垂慶問寵以佳篇捧玩之餘感愧亡量輒借高韻少見謝誠伏幸􅀏㩜一氣無私物自槃放臣偏荷主恩寛方慙妄竊老夫號詎敢重簮􅀶士冠身退未妨閑養病年豐何幸且偷安新篇似許參同社願刺仙舟上釣灘賈生鵩賦大鈞播物史記作大專槃物索隱云專讀作鈞槃猶轉也義與播同􅂪恩許遂休致陳昭逺丈以詩見賀巳和答之復賦一首䦨干苜蓿乆空槃未覺清羸帶眼寛老去光華姦黨籍向來羞辱侍臣冠極知此道無終否且喜閑身得暫安漢祚中天那可料明年太􅀊又涒湯昆反灘建􅂭庚申距今巳未二百四十年矣嘗記年十􅀊時先君􅁣然顧語熹日太祖受命至今百八十年矣歎息乆之銘佩先訓於今甲子又復一周而衰病零落終無以少塞臣子之責因和此詩并記其語以示兒軰爲之盡然感涕云巳未九日子服老弟及仲宣諸友載酒見過坐間居厚廟令出示佳句歎伏之餘次韻爲謝并呈同社諸名勝籬菊斑斑半􅄍黄沜中又報紫茰香輞川有茱茰沜字與泮同􅋔成令節秋還晚撩得高情老更狂載酒極知乖勝踐沾衣却免嘆斜陽是日本約會於周圍屬予有故不果出因集予舍餘年只恐逢辰少吟罷君詩引興長奉和子服老弟黄楊游巖二詩聞道黄楊山上頭千峰環抱百泉幽羡君柱杖年年去飽看人間萬頃秋游洲巖下水泠泠枕石何妨夣裏聽要與他年成故事謾㝷幽處著新亭和劉叔通懐游子􅂪之韻扣角聽君悲復悲壯心未巳欲何之交游半落丘山外離別偏傷老大時尚喜淵濳容賈􅁩不須日飲教􅀽絲病餘我更無憀賴勉爲同懐一賦詩余素不能作唐律和韻尤非􅀁長年來追逐殊覺牽􅆠子服乃令更爲手寫此三詩者不知欲以何用晨起書罷欲記􅀊月方覺是庚申開基節日此亦難逢之㑹感歎乆之叔通老友探梅得句不鄙垂示且有領客携壺之約次韻爲謝聊發一􅀏迎霜破雪是寒梅何事今年獨晚開應爲花神無意管故煩我輩著詩催繁英未怕隨清角踈影誰憐蘸緑盃珍重南鄰諸酒伴又㝷江路覔香來病中承子服老弟同居厚叔通居中居晦諸兄友載酒見過子服有詩牽勉奉和并呈在席幸發一􅀏心期萬壑與千巖屢向君詩得指南乆恨泠然􅀌宿諾偶逢兀者便同參儻䝉大藥分金匕豈羡竒方出玉函誰識留連今夕意沉痾未散莫回驂子服數有詩言黄楊之勝未及往而得足疾故有几者之句是夕坐客皆以霜寒欲亟歸因又有末後句云􅀉江文􅀸劉叔通文卿句律如師律通叔詩情絶世情政使暮年窮到骨不教吟出斷腸聲詩人從古例多窮林下如今又两翁􅀿􅀏湖南老賔友两年吹落市塵中此戲子䝉恐落窮籍不便可發一􅀏也我窮初不爲能詩􅀏殺吹竽濫得癡莫向人前浪分雪世間眞僞有誰知僕不能詩往􅀊爲澹菴胡公以此論薦平生僥倖多􅀋此云梅姑射仙人氷雪容塵心巳共彩雲空年年一􅀏相逢處長在愁煙苦霧中香茶供養黄蘖長老悟公故人之塔并以小詩見意二首擺手臨行一􅀉聲故􅀿離合未忘情炷香瀹茗知何處十二峰前海月明一别人間萬事空他年何處却相逢不須更話三生石紫翠參天十二峰庚申立春前一日雪花寒送蠟梅蕚㬉生春􅀊晚江村路雲迷景更新南城呉氏社倉書樓爲余寫眞如此因題其上慶元庚申二月八日滄洲病叟朱熹仲晦父蒼顔巳是十年前把鏡回看一悵然履薄臨􅀷諒無幾且將餘日付殘編晦庵先生朱文公文集卷第九考異石馬用公濟和陶韻飛觥一作飛觴武夷精舍雜詠序而出一作而去丹崖一作丹壑林立一作森立相羊一作相忘白雲送儲柯僧舍一作僧寺秪今成一作情懐常無處不一作唇觜任􅀟目從教別淚昏一作两眼那因小馬昏和叔通懷子䝉韻聽君一作劉郎半數一作半落不須日一作未湏痛病餘我更無憀賴一作我今乆矣摧頽甚叔通探梅繁英一作落英珍重南鄰諸酒伴一作聞道南鄰多酒伴又尋一作肯尋病中承子服同諸兄友見過􅀫諾一作獨往便同一作遂同儻􅂪一作儻逢方出一作方扣誰識留連今夕意一作且幸親朋相煖􅀬黄蘖悟公塔擺手一作撒手故􅀿一作故知福州府學訓導舒鏊校晦庵先生朱文公文别集卷第九公移漳州延郡士入學牒見臨漳語録契勘州縣兩學講􅀃課程近日以來漸有倫緒但以州郡尊賢尚德之心有所未至致使諸生無所薰陶􅆂養以發其向道入德之􅃐不敏之咎何以自文今覩新汀州知録黃從事器資渾厚操履端方杜門讀書不交權利郷閭有識莫不推高若以禮請屈居州學正録之任兼同主管縣學教導必能使諸生觀感而化有所興起前州學施學正允夀石學正洪慶皆以􅂄艾之年進學不倦強毅方正衆所嚴憚林貢士易簡李進士唐次或究索精㣲或持循雅􅅚察其志行乆益可觀貢士陳淳太學生楊士訓齒雖尚少學巳知方永嘉學生徐寓務學求師志尚堅確凡此數士當職所知若悉招延異其禮際則凡學之子弟藏脩遊息無適而不得良師畏友之益庻幾理義開明德業成就仰副聖朝教養作成之意其在外士人􅀼恐尚有年高德邵閭里推尊經明行修流輩歸重而藏器自珍不求聞逹者更當廣行咨訪續議延請紹熈三年正月􅀄二日牒南康軍請洞學堂長帖以下見南康集謹按國朝會要修復白鹿洞書院巳差􅀘職事學生入洞管幹訖今按江南野史本洞舊制洞主之外更有堂長名目今覩學録楊日新年德老成在洞供職紀綱庻事表率生徒績效可觀合行敦請湏至給帖者右給帖付貢士楊日新凖此充白鹿洞書院堂長職事淳熈七年九月日帖洞學榜契勘本軍廬山白鹿洞書院元係唐朝太子賔客李公遺跡經歴五代號爲國庠及至本朝太平興國中嘗􅀩太宗皇帝賜以官書咸平年又􅀩真宗皇帝重加修葺中間廢壞殆且百年今者本軍鼎新建立教養生徒漸有倫緒又承本路諸司及四方賢士大夫發到文籍􅀵藏應副學者看讀以至山林田土亦巳標簽界至措置撥買規模一新可垂乆逺巳具事狀奏聞乞賜勑額去訖􅀼慮向後諸色等人不知上件事理輙有毀壞以至偷盗文籍侵占田􅁟及過往之人妄有搔擾事属不便湏至曉示者右出榜白鹿洞書院張掛各請知悉淳熈八年閏三月日榜申諭耕桑榜當職二月十五日依凖近降指揮守令出郊勸農巳印給勸農文榜并先來勸諭耕種田土勸課農桑及星子知縣王文林種桑等法文榜發下三縣貼掛曉諭民間通知去訖續據王文林申到勸諭種田方法􅀹爲詳細􅀼慮都建昌縣人户未能通知今分下兩縣曉示郷村人户仰逓相勸諭依此方法及時耕種用力旣勤必有豐年之報再此􅂆諭各冝知悉淳熈七年二月辛丑勸農文當職昨爲本軍民間農事㓕裂累曾出榜反復勸諭自從去􅀊以來凡吾父兄子弟似亦稍相聽信方欲從事於深耕疾耘之務以冀一飽而當職不德刑政失中侵迫隂陽招致旱虐使吾父兄子弟終􅀊勤動而不􅀗有秋之望永思厥咎愧􅀒何言尚幸一二父兄皆能率其子弟當此荒歉之中種麥耕田及時盡力不爲輕去墳墓之計而又頼天之靈宗社之福雨雪應候土􅃳泉通麥旣可期稻又可種嗣􅀊之功似巳有可觀者而當職亦幸免於罪戾且􅀅受代而歸矣今以中春之月祗率典常躬載酒食出郊行田延見一二父兄同舉此觴以告􅀅别父兄其強食自愛謹身循理以教子弟使之孝敬父母慈愛骨肉和睦郷鄰救䘏災患輸納苗稅畏懼公法專心致力於農桑之務如前此勸諭之云者而勿爲飲愽遊惰争闘論訟一切非理違法之事以䧟刑辟其子孫之敏秀者則又教令讀書講學使知先王禮義之教旣以上副國家長育人才之意而爾之門户亦􅀅與有榮焉其前年舊榜及星子知縣王文林耕田種桑法今亦再行給散并此􅂆諭各冝體悉淳熈八年二月招學者入郡學榜惟此􅀖江山竒秀如此俊茂冝倍於他郡而誦絃之聲寥寥曠絶此長吏教化不明之責也今敦請新臨江軍新淦縣尉就軍學傳道堂主盟文社教授緫司教條毎日講書次日覆三八出題四九日納課擇精勤者書考以示勸無籍者給食有籍者以次差􅀘職事其不率教者則有規請賢父老勉其子弟努力從事於學尚庻幾以見其成焉招舉人入白鹿咨目㳟惟國家以科舉取士盖循前代之舊規非以經義詩賦䇿論之區區者爲足以盡得天下之士也然則士之所以講學脩身以待上之選擇者豈當自謂止於記誦綴緝無根之語足以應有司一旦之求而遂巳乎今􅀊科塲觧發赴省待􅀘之士二十有八又文行彬彬識者盖稱之郡亦與有榮焉然惟國家之所以取士與士之所以爲學待用之意有如前所謂者是以更欲與諸君評之今白鹿諸生各巳散歸山林閴寂正學者潜思進學之所諸君肯来當戒都養給館致食以俟專此咨白可否湏報勸農民耘草糞田榜雨水調匀田苗茂盛仰人户及時耘苗㧞去草根多用土糞如法培加巳帖知佐月半以後不測下郷􅀧檢􅀅田中有草無糞之人量行决罰的無輕恕六月六日勸諭趂時請地種麥榜契勘秋来乆旱晚田失􅀵兹幸得雨可種二麥今勸人户趂此天時多耕闊種接濟口食其有無地可耕之人及有力多而地少者仰自踏逐空閑官地具出字號四至畒角經縣陳請布種當與判狀執照免料權給一年其有情願永逺請佃之人亦仰分明聲􅀃即與給據管業特免五年稅料即不得因而侵占他人見耕田地及廣行包占狀外官地頃畒如有違犯許人陳告當以狀内所請地及見種子利充賞本人仍别科罪除巳行下三縣照應施行外湏至曉諭約束者右榜􅂆諭人户請詳此事理趂時多種二麥量力請佃官地務盡人力以相天功庻幾來年不至闕食淳熈六年九月放官私房廊白地錢約束照對目今天色亢陽見行禁止屠殺祈求雨澤未􅀗感應􅀼慮細民不易所有官私房廊白地錢自七月􅀄二日爲頭五十文以上放五日五十文以下放十日措置賑䘏糶糴事件􅀼見軍境乆闕雨澤深慮細民􅀅來艱食合預行招誘客販米舡就軍岀糶并勸誘上户停蓄以備饑急措置事件下項如遇客販米到岸欲就軍岀糶仰赴務陳狀看驗稅物訖令就石寨内捎泊出糶即與免在城稅錢三分或有糶不盡之數欲載往它處湏再經夲務出給􅀜引方得起離前去庻可開防欺隱透漏之弊今帖城下稅務遵依施行尋常客人糶米必經由牙人方敢糶常􅀍邀阻多抽牙錢是致不肯住糶合嚴立榜賞止約許從民旅之便情願交易庻得牙人不敢搔擾使軍今立賞錢一千貫文榜市曹張掛暁示如遇客旅興販米斛到軍聽從民旅之便自行糶糴如牙人不遵今來約束輙敢邀阻解落牙錢許􅀍擾人畫時具狀經使軍陳訢切待勾􅀵犯人重行勘斷追納賞錢入官施行米舡到岸雖欲出糶然貧民下户不過斗糴卒難轉變錢物未免留滯湏當勸諭上户及時􅀵糴不惟他時可濟荒歉於停蓄之家豈無宜利可謂兩便合帖委官敦請上户􅀃諭措置兩縣到岸米舡事照對旱傷細民闕食合行出糶常平米斛應接細民食用切慮向去日乆有誤不測賑濟况今鄰郡州縣收成正是客旅興販米斛之際本軍巳行措置不行􅀵稅仍放免本舡雜物稅錢招納米舡住岸出糶接濟民户日食其兩縣務亦合依此措置招誘米舡候有米舡到岸即􅀅常平米斛住糶凖備􅀅來支用七月十一日帖都昌縣招誘客販米斛免收力勝雜物稅曉諭照對本軍并管属縣日近以來闕少雨澤見今祈禱未􅀗感應米價漸高本軍巳行下城下稅務都建昌縣招誘客販米斛前來從便住糶免􅀵力勝雜物稅錢不得邀阻减尅牙錢之􅀋外􅀼慮客人未能通知湏至曉諭并帖縣依此施行七月十五日再勸修築陂塘契勘今􅀊旱傷盖縁人户不修築陂塘積水􅈅漑田禾致令乾死使軍巳節次行下三縣及散榜給印榜曉示人户陂塘淺漏處亦合併力開掘修築如有欠闕工料支費并諸軍縣借米喫用修築次年送納如陂塘廣闊費用工力數多亦當計料工食申軍切待具申提舉衙撥米借貸措置客米到岸民户收糴不盡曉諭照對管内田禾多有旱損切恐民間闕食巳措置合稅務多方招誘客人米舡住岸出糶接濟民間􅀵糴食用與免􅀵納雜物稅錢今來漸有客旅興販米斛到來如有民戸收糴不盡之數許令牙人并有力之家妆糴停頓凖備接濟合行出榜曉示曉示郷民物貨減饒市稅照對近城郷民全藉􅀅些小係稅之物入城貨賣辦糴口食若依逓年收稅切慮無從所出合􅀅客旅歩擔興販紗帛藥草絲綿雜物依舊􅀵稅外其餘郷民應有些小土産物貨入城轉變並與减饒三分之一合行約束不得因而作弊約束不許偷􅀼禾榖照對三縣管下田禾雖是旱損其間有水源及可車戽去處今来漸次成熟切慮有不守行止之人聚集偷􅀼禾榖合行下廵尉司嚴行禁約約束諸縣泛催官物各給憑由訪聞逐縣㝷常文引勾追欠户更不於引内批鑿少欠是何年分官物名色若干數目泛稱積年拖欠及追人户到官多是人吏作弊不問所欠多寡例􅀅斷罪是致小民憂疑不能安迹合行下諸縣約束如有人户少欠官物各給慿由明言批鑿所欠是何年分官物立限給付少欠之人依限赴官送納免流移民舡力勝照對有流移之民舡至軍岸合行下稅務審實並與蠲免力勝放行禁旅店不許逓傳單獨訪聞管下旅店遇有單獨困病或流移之人到店多是慮其死亡更不容留遂行逓傳驅逐出界因此䘮命合行下諸縣多印榜文於旅店約束遇有過往單獨飢餓困病之人即仰所到店户不得逓傳扛擡送出外界許就便米場驗實量給口食臨安痊日遣去萬一有死亡之人即時報都保審實申縣行下如法埋塟以上七月十五日取㑹管下都分冨家及闕食之家契勘管界乆闕雨澤田禾旱損使軍巳行委官措置招誘客人興販米斛蠲免力勝雜物稅錢禁戢减尅牙錢之弊勸諭前來出糶目今日逐有米不闕軍司亦巳行帖都建昌縣及委官依使軍所行措置招誘客米赴縣住糶及勸諭上户􅀅所有米斛相各逐郷村開倉依時價出糶應接民間食用去訖切慮向去富實尸􅀅米斛停頓不行出糶使細民闕食不便合行立式預先委官取會管下都分蓄積米榖上户及闕食之家如后七月十六日某都共幾家一富家有米可糶者幾家除逐家口食支用供贍地客外有米幾石可糶郷例糴数即依郷例開客户姓名米數併佃客地客姓名一富家無餘米可糶者計幾家而僅能自給其地客佃客不闕仍各開户姓并佃客地客姓名一中産僅能自足而未能盡贍其佃客地客者計幾家開户名取見佃客地客姓名所闕之數一下户合要糴米者幾家作田幾家各開户名大人幾口小人幾口别經營甚業次不作田幾家各開户名大人幾口小人幾口經營甚業次作他人田幾家各開户名係作某人家田大人幾口小人幾口兼經營甚業次右件如前並是着實即無隱漏其闕食之家亦無詐冐重疊仍五家結一保如􅀅來使軍委官審實挑覆却有不實去處甘伏重罪不詞施行旱傷委官驗視照㑹本軍并管属星子都昌建昌三縣自六月以來天色亢陽闕少雨澤田禾乾枯本軍恭依御筆處分嚴禁屠宰精意祈禱及行下諸縣精加祈禱去處今據星子都昌建昌三縣申依應遍詣寺觀神祠及諸潭洞建壇􅀕祀請水精加祈禱雨澤並無感應今來諸郷早禾多有乾損及備據稅户陳德祥等狀披訴所佈田禾縁雨水失時早禾多有乾稿不通收刈申乞委官檢視夲軍今檢凖淳熈令諸官私田災傷秋田以七月聽經縣陳訴至月終止夲軍除巳依條施行及具奏聞申省部監司外湏至出榜三縣􅃹属郷村都保各仰通知以上七月十六日施行旱傷住官物一月契勘本軍三縣遭此旱災早禾乾損巳出榜曉諭人户依投訴旱狀􅀅来檢踏奏减秋稅外有去年秋零少多及今年夏稅全未納及分數縁其所欠並係起發上供及夲軍軍粮之數雖是今年早田不熟在法無縁免放然而訪聞諸縣催無術不免决撻保長搔擾人户當此闕雨之深慮重困民力除巳行下各住追催一月色保長人户奔走期限例遭刑責費去車水工夫今仰人户各體此意逓相告報於住催一月限内自備所欠各赴倉送納上以應副官司起發綱運供贍軍兵下亦使本户不物不􅀍追呼得以一意車水救田别作營求備􅀅來闕食之患公私兩便各仰知悉諭上户承認賑糶米數目契勘本軍管下今􅀊旱傷田禾切慮細民闕食使司巳行下三縣推舉管下冨實有米上户并自能贍給地佃客富家姓名各家見蓄米穀數目或有田産而不多或無田産却有營運蓄積米穀錢物之家敦請赴官以禮勸諭承認賑糶米穀數目申軍所委官并三縣勸諭到上户承認賑糶米共七萬三千二百六十八碩五斗巳檢凖前項條令出給公據付人户􅀵糴米斛回軍賑糶在城上户二十五名共認賑糶米一萬一千六百三十五碩每升價錢一十七文足星子縣勸諭到上户三十一名共認賑糶米一萬一千九百三十五碩每升價錢一十七文足都昌縣勸諭到上户五十九名共認賑糶米二萬八千九百八碩五升每升價錢一十四文足建昌縣勸諭到上户九十一名共認賑糶米二萬八百碩每升價錢一十二文足以上七月十七日約束舗兵本軍盖縁旱傷遂置暦及黄旗縁匣急速前去兩縣追㑹旱傷事件湏管遵依台判日限時刻仰鋪兵連夜走傳至縣仍仰夲縣於暦内批鑿承受日時手分姓名即時依限回報亦仰批發離縣日時責付鋪兵連夜依限赴軍投下以慿稽考違滯去處根究重作施行檢坐乾道指揮檢視旱傷使軍照對管属星子都建昌縣人户陳訴秋田旱傷使軍巳立式出榜三縣暁示人户赴縣投帳繳申使軍切待依條差官檢視减放苗米所有近水郷分可以車戽注䕃得熟田叚切慮人户􅀅旱傷田叚衮同得熟之田影帶披訴今檢凖乾道六年六月二十七日勑户部曽尚書劄子奏契勘州縣每遇災傷依法聴人户經官陳訴差官檢視蠲放稅租訪聞近来往往多􅀍豪户計嘱郷司􅀅豐熟去䖏一例减放其實􅀍旱澇去䖏所委官憚於往来檢視則貧乏下户不得蠲减臣愚欲望聖慈特降睿㫖委諸路漕臣散出文榜於郷村曉諭應有災傷去䖏仰民户依條式於限内陳狀仍録白夲户砧基田産數目四至投連狀前委自縣官􅀅砧基􅀧對坐落郷村四至畒歩差官覈實檢放如輙敢妄移豐熟郷分在旱傷地分僥倖减免許諸色人陳告依條斷罪仍􅀅妄訴田畒並拘沒入官以一半給告人充賞施行若州縣奉行㓕裂從漕臣按治重寘典憲取進止六月二十七日三省同奉聖㫖依兼照檢踏災傷在法差官同合佐詣田所先檢見存苗畒次檢災傷田叚合委官前去三縣郷村究實得熟田叚具帳申軍巳行帖出榜星子都建昌縣約束人户從實投帳以備差官檢放如有􅀅得熟田叚影帶披訴却致披人户陳告定依條斷罪追賞施行七月二十四日施行下諸縣躬親徧詣田叚相視使軍契勘今􅀊三縣田禾旱傷間有邉臨山源溪澗或有得雨去處自熟田叚其稅賦合全行輸納又有邉臨大港并有積水陂塘可以車戽接救田叚皆是人户自入夏一乾之後合家老㓜舉債辛勤用工車水救得其禾稻十中只有三五分熟者即行比倣自熟之田䆒見其數斟量輕重别作一等優䘏兼有無水車戽全然旱死田叚切慮人户􅀅来一槩投訴旱傷欲􅀅各縣郷分分委縣官趂此未曾收刈之際躬親下郷遍詣田叚地頭親自相視仍􅀜呌􅂄保并人户指證供結罪賞攅􅀋開具供申禁戢人從不許乞覔使軍照對所委官下郷切慮􅀅帶合干等人因而生事乞覔搔擾事属不便合令縣給口食與隨行人不得搔擾保正寺觀等人仍立賞􅑙給文榜付檢旱官隨行張掛約束放免官私房廊白地照對星子都建昌縣軍自六月以来天色亢陽闕少雨澤見不住據人户經軍縣陳訴旱傷切慮細民不易理冝寛䘏所有人户承賃官私房廊白地錢自八月􅀄一日爲頭以十分爲率權行减免二分􅀱至来年麥熟日仍舊以上七月二十九日諭人户種蕎麥大小麥仰人户趂此雨潤多種蕎麥及大小麥接濟食用施行人户訴狀乞覔據學生馮椅劄子述照對今􅀊旱荒民户巳是投詞星子見行委官檢踏其在都昌舊来踏旱之弊名色非一不敢不以告者凡押旱狀官中所收則謂之醋息錢直日司乞覔則謂之接狀錢巳下案案吏乞覔則謂之買􅁓錢及投旱帳則謂之投帳錢官貟下郷檢踏供帳民户着押社司乞覔則謂之着字錢檢踏官貟隨從人吏於保正名下乞覔則謂之俵付錢官司行下蠲放所納米斛社司隨斗敷數乞覔則謂之苗頭錢凡此之􅀋皆蠹民之􅀹者官中所放本以􅁉民而民之縻費乃至於是人户旣巳困窮坐受其弊無力赴愬委實切害合行下星子都建昌縣嚴行約束及出榜各縣門并檢踏官隨行張掛曉示人户知委如合干人依前乞覔前項逐色錢數仰人户不以早晚具狀經縣陳訴從本縣拘收犯人申解軍切待根勘依條施行各令知委八月􅀄一日施行專欄牙人不許妄􅀵力勝等錢照對本軍近出榜於上江州軍曉諭客販米斛前来從便住糶免収力勝雜物稅錢及約束不得邀减牙錢之􅀋外切慮牙人并稅務專欄不依先来約束仍前収納力勝等挩錢及牙人妄有邀阻减尅牙錢之􅀋今立賞錢三十貫文省榜市曹并稅務検稅亭張掛曉示客人知委廣行興販米斛前来出糶嬴落利息如稅務專欄等人并米牙人輙敢収納力勝等稅錢及邀阻减尅牙錢之􅀋仰各人不以早晚具狀赴軍陳論切待追収犯人斷罪追賞施行人月􅀄四日禁豪户不許盡行収糶照對本軍管下今歳旱傷訪聞目今外郡客人興販米榖到星子都建昌縣管下諸處口岸出糶多是豪強上户拘占盡數収糴以待来年榖價騰踴之時􅀝収厚利更不容細民􅀵糴事属未便如遇客人販到榖米仰上户不得獨行拘占盡數􅀵糴許細民皆得從便食用管下縣相視約束及開三項田叚使軍契勘在法檢視災傷先檢見存苗畒次檢災傷田叚盖欲趂得人户未及収刈之際略見荒熟大槩的實分數然後豁出熟田細檢荒旱去處不致猾吏姦民通同作弊本軍近縁荒旱檢坐上項條法行下諸縣遵依施行除星子知縣王文林躬親下郷兩日之内多歴都分見得荒熟田叚分明民間咸樂其来不以爲擾都昌權縣孫迪功亦巳申到躬親行視所見災傷等第人情苦樂皆有條理獨有建昌一縣地理稍逺未據申到却訪聞得本縣官吏誤認法意欲􅀅熟田一坵一角逐一看視委是繁碎不惟重優災傷人户亦恐枉費日月不能了辦合行約束且如一坂之田大約百坵内有三五十坵成熟即指定是何人田叚約計畒角抄入熟田數内不在􅀅来檢放之限如一坂百畒只有一二十畒稍稍成熟即不湏逐畒抄劄留與人户充収牛藁口食仍令人户一靣収刈犂翻種麥量留根查聽候檢放或有田靣大槩黃熟而其中有未出者有出而青空者有出而白死者並係茺損然其根查􅁍與熟田無異切恐􅀅来収刈之後誤被抄入熟田數内不得檢放􅀹爲不便今請便行貌約多少定下荒熟分數令人户一靣犂翻種麥如今来所檢熟田數内􅀅来續有死損即仰人户量留穗穡候檢旱官到别行陳訴續與檢放乞行下江西從便客旅興販米穀契勘夲軍并管属諸縣今􅀊旱傷全籍江西豐熟州軍客旅興販米斛出糶接濟細民夲軍巳行散出文榜招誘興販前来與免附載雜物稅錢行下城下稅務約束及出榜曉示米牙人不得减尅分文牙錢令客人自行出糶切慮向上州軍阻節不令榖米下河致使客旅不通及間有興販米榖舟船州軍妄以雜物爲名􅀝収稅錢是􅆀啇賈不肯搬販米榖前来出糶細民失望爲害非輕欲望鈞慈速賜行下江西豐熟州軍許令啇賈從便興販米榖向下以来出糶應接民間食用仍乞嚴行禁戢場務不得妄作名色收納稅錢庻得客旅通行米價不致騰踴約束米牙不得兠􅄃搬米入市等事契勘諸縣郷村人户搬米入市出糶多􅀍米牙人兠􅄃拘截在店入水拌和増擡價􅀡用小升斗岀糶嬴落厚利遂致細民艱食情實切害合行約束約束質庫不許􅀜閉等事契勘質庫户平時開張庫店典質錢物利息所入不爲不多纔值旱傷歳時輙以闕錢􅀜閉邀阻遂致細民急切闕用無處質當兼目今闕雨澤城市古井多􅀍有錢之家拘占夾欄不令衆人汲運情理切害合行告示約束施行戒約上户體認本軍寬䘏小民契勘本軍并諸縣今歳旱傷民間理宜寬䘏今訪聞乾道七年放債豪強之家爲縁旱傷人無以償多􅀍強取去猪羊以至入其家搜奪種子豆麥之􅀋及抑令􅀅見住屋宇并桑園田地抵價折還人無所歸遂致流移有至今尚未能歸業之人本軍雖行下三縣曉諭上户體認本軍寛䘏之意量度欠債人户如粗有収成有力可還之人隨冝取索外其貧乏之人見闕口食委實無可償還仰上户且與寛容俟民力少蘇却行取索如􅀅来人户恃頑不還官司即爲理索外上户乗此旱傷細民闕食之際強以些小錢作合子文字借貸遂空頭年月價貫立契字未及踰時即行填掗預先月日經官投印及有吞圖婦女顧􅂶奴婢致細民受苦不一理合禁約以上八月􅀄八日施行張廷諌訴旱傷事㩀學生張廷諌劄子述夫旱暵之􅀊朝廷檢放秋苗成法具在而上中等户無不力陳必求其放免而後巳縱使官吏有弊亦湏及半下户無力陳告憚於所費故皆不􅄬帳守令慮不及此則有帳者次第减放無帳者多至全催粮食之儲旣絶望於其前追租之吏又驅迫於其後回視屋宇器皿布帛不可食者皆不可售進退皇皇朝暮不能相保今若不待投陳檢視凡下等之苗先此全免放則見存者其志益堅而巳逃者各思反其郷里矣遂行下當縣取會五㪷以下米單名申軍不待檢視先次並與除放施行八月十二日施行邵艮陳訴踏旱利害使軍今照近據管属星子都昌建昌三縣人户陳訴田禾旱傷巳帖委縣官躬親下郷先次檢視熟田具帳供申去後據進士邵艮劄子􅀼見官吏下郷檢視田叚略不問及人户旱傷去䖏惟於每户帳狀供具所熟田畒亦不問所熟分數但勒令供作全熟田叚郷民不知官吏深意皆相顧駭惑夫都昌田禾例冝早秈非若星子早田十居七八安有五月中旬一雨至今而有全熟之理雖陂塘脚下及近容水去䖏間有熟者然頼車戽之勤所得不償所費而又如此便利去䖏其實無幾且以所居一都言之惟麥坊劉坊大寧余干之旱爲尤慘雖或一二分熟者然大槩顆粒不収然則熟田實不能當旱田二十分之一誠恐官司它日以所供熟田多少而定通放秋苗分數則些少熟䖏適所以累及旱傷之家有大不均之病聞之郷老皆以爲今歳之旱酷於辛邜盖彼時人家尚有歳備自夫一旱之後加以連年暗折入間例無盖藏自前月來郷曲上户小民流離巳􅁴相踵且今此正収刈之際人家尚有一二分早禾可恃而巳如此者雖亦糊口迫之誠以催科之窘且深爲後日慮而畫此至無頼計耳比年以来都昌上户多爲小人誣頼故闕乏之際有力之家至不敢與交易由是貧乏下户愈􅁴坐困而無告今郷曲猶未雨油麻粟豆並鳥有赤地未耕二麥且有失時之慮嗣􅀊之計彼􅀅何措此蠲租之惠尤郷民之所深望也昔唐制旱七分租庸調皆免􅀍三分之収非不知取􅂢之盖有深望也本軍遂作訪聞行帖三縣檢視官約束八月十七日委官置場循環收糴米斛照得本軍管界乆闕雨澤旱死田禾目今在市闕米出糶切慮細民闕食合行借撥官錢委官就軍置場措置循環収糴米斛出糶應接細民食用八月十九日約束遊手不許脅持良民契勘今􅀊旱傷委官下郷檢踏成熟田叚外有旱田人户一靣犂翻種麥量留根查聽候别有官前来檢收切慮遊手脅持之人見人户旱田巳經犂翻耕種妄作郷村虚聲首熟欺詐乞覔使善良人户不敢犂翻以至種麥失時不能安業今仰人户知委若實有旱田即依條量留根查以備檢放一靣犂翻種麥免致失時如有似此脅持妄稱陳訴欺詐之人仰􅀍擾人户經官陳理切待追取送獄根勘斷罪施行援例乞撥錢米照對本軍今歳旱傷細民闕食巳行下星子都昌建昌縣委官抄劄合賑糶賑濟户口人數申軍及照得乾道七年旱傷係􅀩提舉常平使司支撥到池州太平州蕪湖繁昌等縣常平米五萬碩差官管押前来本軍分撥下三縣賑糶賑濟遂具申常平提舉使司乞支撥米斛差官管押前来本軍賑糶賑濟續􅀩提舉使司支撥信州貴溪縣常平米五千碩差人前去搬取及支撥池州常平錢五千貫省付軍収糶米斛賑糶以上八月二十七日再諭人户種二麥使軍累行勸諭人户耕種二麥盖爲今年荒旱不比常年湏是併力加工救濟性命今訪聞多有未施工處顯是頑慢巳帖檢旱官并行催趣􅀅頑慢惰農之人量行决罰先此曉諭各仰知悉行下三縣抄劄賑糶人户照對近委官抄劄三縣管下賑糶人户姓名大小口數申軍㝷􅀅巳申到帳拖照得合賑糶人户並不見聲􅀃見住地名去處恐有漏落増添情弊難以稽考合行下逐縣􅀅逐都塌畫地圖􅀞岀山川水陸路徑人户住止去䖏數内不合賑糶人户用紅筆圈欄合賑糶人户用青筆圈欄合賑濟人户黄筆圈欄逐一仔細填冩姓名大小口數令本都保正長等參考詣實繳申切待差官􅀧摘管實六月􅀄十日行下三縣置場照對見委官抄劄三縣賑糶賑濟人户大小口數􅀞圖結甲務要實惠及民無致妄冐所有置場去䖏委官斟量地里逺近分定置場去䖏各縣水陸地里若干其勸諭到上户賑糶米斛亦合撥􅀠近便赴場去䖏以慿施行續㨿三縣申置場共三十五處星子縣置場七處都昌縣置場十一䖏建昌縣置場一十七處九月十五日約束許下户就上户借貸契勘今歳旱傷非常得熟䖏少本軍巳節次行下三縣散榜曉諭人户趂此七脉未乾并力耕墾廣種二麥接濟􅀅来食用如有惰農耕種失時之人即請照巳行榜示行遣其貧乏無種粮之家請諭上户借貸如要官司文暦即印給令上户収執遇有下户借貸麥種粮食即令就暦批領􅀅來還足對行勾銷如有不還官爲理索再諭上户䘏下户借貸契勘今年荒旱非常得熟䖏少本軍多方救䘏務使人户不至飢餓流移及行勸諭人户多種二麥接濟喫用非不叮嚀當職近因岀郊相視陂塘見得麥田多有未施工䖏盖縁人户打穀未了亦是官司勸諭未至其得熟䖏不闕種粮可以佈種然其人旣無飢餓之憂便乃􅂴惰其荒旱處合更勤苦又以難得粮種遂致因循今仰人户速􅀅所収禾榖日下打持趂此土脉未乾并力耕墾其高田堪種麥處即仰一靣種麥其水田不堪種麥處亦仰趂早耕翻多着遍數務要均熟庶得乆逺耐旱冝禾其得熟人户當念幸得収成常生慚愧不可便致惰怠趂此餘力多種二麥􅀅來可以愽得他䖏物貨其遭旱人户當念既遭此難尤當勤力多種食物方可養贍老小不致飢餓流移其下户無種粮者上户當興憫惻之心廣加借貸目今施惠旣可以結鄰里之驩將来􅀵成亦自不失収息之利庶幾過此荒年各保安業今恐前来勸諭未明再此榜示仰人户知委九月十二日革住米舡隱瞞情弊契勘賑糶場収糴米斛如遇米舡到岸内過稅舡隻収糴三分住糶米舡止糴一分其住糶米舡法格並與免収稅錢外訪聞客旅多生奸猾動是數隻到岸於内却􅀅一兩隻作住糶結計在市米牙人令其虚觧牙錢稱就市糶訖却􅀅在舡住糶米斛寅夜搬傳往過稅舡内隱瞞官司合行出榜約束九月二十日行下場所革住米舡隱瞞照得賑糶場近縁住糶米舡客人結計牙人虚觧牙錢夤夜搬傳米斛往過稅米舡之内隱瞞官司有此欺弊遂出榜河岸約束今来尚慮住糶客人雖依曉示在市出糶切慮􅀜防不盡合行下本場自今後遇有住糶米舡即令城下稅務看驗具數􅀜報賑糶場本場權住出糶令客人搬米赴場從本場差人監用本場升斗自行出糶接濟細民日報糶過米數糶足爲給􅀜子放行庶幾杜絶隱瞞官司之弊月二十四日申提舉司􅀅常平米出糶契勘本軍今歳旱傷細民闕食遂行下三縣抄劄到合賑糶賑濟户口人數巳行措置賑糶賑濟所有本軍城下常平倉見椿管米八千八百九十三碩二㪷六升五合二勺除今年八月内盤量欠折米一千六十碩三㪷二升四合外實管見在米七千八百三十二碩九㪷四升四合八勺係是乾道八年以後逐年収糴到數目價錢不一其米經年在敖内有結冒陳􅂢兼照今年七月内管属建昌縣闕少米斛岀糶所支撥義倉米估價應接民間食用毎升計價錢一十文足巳具収報提舉使衙照㑹去訖所是見管和糴米本軍今追到牙人沈先等供具其米經年陳損與受納到人户義倉米陳損色様一同依市價每一升估計價錢一十文足本軍照得上件米係是當来委官和糴到數目切慮􅃜損元價未敢擅便出糶具狀申提舉使衙照會依目今所估價直賑糶應接民間食用庻幾飢民不致流移十月􅀄五日行下置場不許留滯客旅契勘本軍今􅀊旱傷細民闕食雖移文江西州縣通放到客米舟舡又慮牙鋪觧落及市民日糴數少阻滯客旅不便遂行委官置場支撥官錢依市價兩平交量収糴客米以備賑糶應接細民食用今訪聞得本場每遇客米到場中糶更不即時交量及至交量又不即時支還價錢切慮合干人因而作弊留滯乞覔錢物合行約束限當日交量即時當官支給價錢如違􅀅犯人勘斷十月十九日行下兩縣委官捉人户糶米减尅契勘管下今􅀊旱傷細民闕食使軍遂措置支撥官錢差人前徃外州縣收糴到米分撥兩縣出糶訪聞合干人􅀅人户所糴米並不依實支量公然作弊减尅今委逐縣知縣縣尉毎日不測捉人户所糴米三两户當官覆量如有少數即根究觧人赴軍十月二十日申諸司乞行下江西不許遏糴契勘本軍并管属諸縣今􅀊旱傷最甚細民闕食及無米支遣軍粮遂多方借兊官錢差撥公吏前去江西得熟處州縣収糴米數回軍賑糶支遣及檢凖淳熈令災傷官司不得禁止搬販及近降指揮州縣不許閉糴如有遏糴州軍許鄰州越訴及凖今年八月十九日聖㫖節文江東安撫使陳少保奏今􅀊災傷先合措置通放米斛州縣有遏糴去處許行越訴本軍遂節次備坐移文隆興府照會収糴去後巳承回報行下諸縣許令本軍所差人収糴米榖放行今却據差去公吏吕棋狀申在本軍建昌縣管下二陂山田等處四散収糴靖安新建縣郷人米斛欲裝上舡覩奉新縣尉司弓手五十餘人各持鎗棒沿江廵綽不容裝發米斛又􅀍奉新縣差人越界釘斷建昌縣管下三陂潭德爻口陂水把截不放舡隻上下往来巳申建昌縣差保正隅官防護所糴米舡今於十月二十四日􅀍奉新縣差弓級徐成等部領弓手保正等於要路把截不容郷人搬糴米穀申乞施行本軍今照差去公吏吕祺係在本軍建昌縣界収糴靖安新建縣管下米榖其奉新縣官吏公然違戾見行條法及不遵今年八月十九日專降聖㫖指揮輙差弓手持鎗棒㳂河廵綽不容収糴又差人越界前来建昌縣管下三陂把截釘斷水口不惟夲軍所糴米榖百端攔遏不行通放有誤賑糴支遣至於客販米榖舟舡亦不得往来公私利害至重移文隆興府并江西轉運司照詳前項條法指揮請􅀅奉新官吏按劾仍通放米舡并申諸司行下隆興府通放本軍所糴米舡并申御史臺乞依近降指揮彈奏施行十月􅀄王日晦庵先生朱文公文别集卷第九候官縣儒學訓導劉簮校晦庵先生朱文公續集卷第九答劉韜仲問目無求生以害仁有殺身以成仁炳以爲理當死而求生是悖理以偷生失其心之徳也故曰害仁理當死而不顧其身是舎生而取義全其心之徳也故足以成仁􅀂比干諌而死夫子稱其仁所謂殺身以成仁也雖死不顧只是成就一个是而巳使比干當諌不諌而苟免於難則求生以害仁矣未知是否此􅀃得之然更要見得失其心之徳全其心之徳各是如何氣象方見端的君子義以爲質禮以行之孫以出之信以成之何故不及仁更思之有一言可以終身行之者其恕乎巳􅀁不欲勿施於人今之人多以姑息爲恕且自居官者言之爲州縣則不敢擊豪彊爲􅁥司則不敢按􅂍吏爲臺諌則不敢排姦慝爲宰相則不敢退小人皆自以爲恕而不知恕者如心之謂也所惡於上毋以使下所惡於下毋以事上豈姑息之謂乎夫仁者謂之能好人可也而孔子兼能惡人言之炳謂恕字亦當如此體認未知是否此􅀃固善然􅀍排撃遭按退决非巳心之所欲今乃欲施於人又何以爲如心乎請更推之莊以涖之動之不以禮莊敬者禮之容也兩句意疑相重炳謂端莊不慢者敬心之發躬行之事也􅀁謂禮者化民成俗之具􅀂爲之冠昏䘮祭之品節以教民孝弟者是也未知是否動猶動民以行不以言之動禮只是在巳者民之於仁也甚於水火水火吾見蹈而死者矣未見蹈仁而死者也集注之􅀃曲折雖多然詞意精宻發明聖人勉人爲仁之意最爲􅂃切有功或問節取范氏之􅀃詞雖平而意則緩且未見蹈仁而死一句與上文不相應如范氏仁不傷人之􅀃則與上句不合如程子殺身成仁之􅀃與上句合矣而地位不侔炳謂不如集注之􅀃未知是否殺身成仁蹈仁而死同異如何更思之陽貨之惡如此聖人恐無不終絶之意時其亡而徃者亦非欲其稱蓋終不欲見之耳遇諸塗者乃不期而會不可得而避非得巳也未知是否恐未然伊川先生云性即是理炳謂􅀁謂理者仁義禮智是也未知是否四者固性之綱維然其中無所不包更詳味之子曰性相近也又曰惟上智與下愚不移夫人之氣質雖有偏正昏明純駮厚薄之不齊然禀生之初未甚相逺也故謂之相近至於上智之所以爲智下愚之所以爲愚亦皆其氣質使然旣謂之相近矣何故又有上智下愚如是之懸絶也氣象雖相近然亦有如是懸絶者蓋旣曰氣矣便有此不同不足恠也吾豈匏􅀲也哉焉能繋而不食集注云匏􅀲繫於一處而不食物古注云言匏􅀲得繫一處者不食故也吾自食物當東西南北不得如不食之物繋滯一處然匏􅀲未甞不可食而謂之不食物何也不食謂不求食非謂不可食也今俗猶言無口匏亦此􅀋公山佛肹之召諸家之􅀃善矣愚必以楊氏解佛肹章爲得其要蓋公山之召而子路不恱夫子雖以東周之意諭之而子路之意似有所未安也故於佛肹之召又舉其􅀁聞以爲問其自信不苟如此學者未至聖人地位且當以子路爲法庶乎不失其親不可以聖人體道之權藉口恐有學歩邯鄲之患也未知是否得之人而不爲周南召南横渠先生之􅀃􅀁以與諸家不同者何故􅀂曰告之教之則是爲之也􅀃得爲字太重經意恐不然也永知是否爲猶學也今之愚者詐而巳矣智則能詐愚者本無智巧也何故能詐如狂不直侗不愿之類予欲無言蓋夫子以子貢專求之於言語之間告之此以發之子貢未能無疑故夫子曰天何言哉四時行焉百物生焉蓋欲其察之於踐履事爲之實也程子􅀁論孔子之道如日星一叚雖引無言之文然其大意却似􅀃無隱之義至其言猶患門人未能盡曉故曰予欲無言夫恐其不能盡曉當更告之而曰予欲無言何也或曰予欲無言一章實兼無隱乎爾之義蓋四時行百物生􅀁謂無隱也程子之􅀃蓋推明夫子啓發子貢之意欲其求之於踐履事爲之實者未知是否恐人不能盡曉而反欲無言疑得甚好更熟玩之當自見得分明也四時行百物生兩句自爲體用蓋隂陽之理運行不息故百物各遂其生聖人之心純亦不巳故動容周旋自然中禮未知是否有此意宰我遊聖人之門而有短䘮之問不􅀋學者氣象諸家之􅀃或謂至親以期斷而宰我欲質其􅀁知有疑而不敢隱所以爲宰我蓋欲聞其過也炳以爲宰我在聖門雖列於言語之科然哀公問社而有使民戰栗之對方晝而􅃦夫子有朽木糞􅁟之譏觀其地位如此則冝有短䘮之問也未知是否短䘮固是不仁然其不隱不害爲忠信此一事而兼有得失又有重輕年四十而見惡焉其終也巳聖人立言之意固是勉人及時進德然郷人之善者好之其不善者惡之苟有特立獨行之士不徇流俗衆必羣嘲共罵何爲而不見惡學者亦不可不知也未知是否見惡亦謂有可惡之實而得罪於能惡人者非不善者惡之之謂也柳下惠三黜而不去其言若曰苟以直道事人雖適他國終未免三黜若肯枉道事人自不至三黜又何必去父母之􅀖觀其意蓋自信其直道而行不以三黜爲辱也此其所以爲和而介歟若徒知其不去之爲和而不知其所以三黜者之爲有守未足以議柳下惠也未知是否得之接輿歌而過孔子蓋欲以諷切孔子孔子欲與言之則趍而避之孔子使子路問津於長沮桀溺固將有以發之而二人不荅􅀁問傲然有非􅀏孔子之意至於荷篠丈人知子路之賢則止子路􅀫殺鷄爲􅁰而食之見其二子焉其親之厚之如此孔子使子路反見之則先去而不願見矣數子者􅀂謂其無德而􅀮則徉狂耕耘以避亂世澹然不以富貴利逹動其心而􅃀然自信不移􅀂有􅀁得者􅀂謂其無故而隱則危􅀖濁世道旣不行亦未見其必可以仕也特其道止於歸㓗其身而不知聖人􅀁謂仕止乆速者知􅀁謂可無者矣而未知所謂無不可者也故其規模氣象不􅀂聖人之正大􅀂以素隱行恠視之愚意未知是否無道而隱如蘧伯玉柳下惠可也􅀍髪佯狂則行恠矣沮溺荷篠亦非中行之士也柳下惠爲士師三黜而不去所謂降志如不去之類􅀁謂辱身如三黜之􅀋然聖人列之於逸民者不知於何處見得柳下惠遺逸處見上君子不施其親謝氏曰對報之謂施如親黨特無失其爲親而巳豈有施報徃來之意也謝氏之意不明竊意其􅀃若曰君子􅀁以厚於親黨者特欲不失其親親之義而巳豈有施報來徃之意猶吉其豈望施報來徃也具􅀃與經文不通炳􅀁録或問解此叚内有兩句云人之􅀁以害其親親之恩者其失在於望報而不在於施炳謂施字上漏􅁍不字未知是否猶吉之吉疑言字之誤謝􅀃不通故或問中辨之文意分明不脫字也明道先生云人生而静以上不容􅀃才􅀃性時便巳不是性人生而静以上何故不容􅀃才􅀃性時何故巳不是性未明其㫖不容􅀃者未有性之可言不是性者巳不能無氣質之雜矣晦庵先生朱文公續集卷第九閩縣學訓導何器校
