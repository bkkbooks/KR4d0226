body:
  text: 雜著跪坐拜說古人之坐者兩􅂰著地因反其蹠而坐於其上正如今之胡跪者其爲肅拜則又拱兩手而下之至地也其爲頓首則又以頭頓于手上也其爲稽首則又郤其手而以頭著地亦如今之禮拜者皆因跪而益致其恭也故儀禮曰坐取爵曰坐奠爵禮記曰坐而遷之曰一坐再至曰武坐致右軒左老子曰坐進此道之􅀋凡言坐者皆謂跪也􅀂漢文帝與賈生語不􅁴􅂰之前於席管寕坐不箕股榻當􅂰處皆穿皆其明驗老子云雖有拱璧以先駟馬不如坐進此道盖坐即跪也進猶獻也言以重寶厚禮與人不如跪而吿之以此道也今說者乃以爲坐禪之意誤矣然記又云授立不跪授坐不立莊子亦云跪坐而進之則跪與坐又似有小異處疑跪有危義故兩􅂰著地伸腰及股而勢危者爲跪兩􅂰著地以凥著蹠而稍安者爲坐也又詩云不遑啓居而其傳以啓爲跪爾雅以妥爲安而䟽以爲安定之坐夫以啓對居而訓啓爲跪則居之爲坐可見以妥爲安定之坐則跪之爲危坐亦可知盖兩事相似但一危一安爲小不同耳至於拜之爲禮亦無所考但杜子春說太祝九拜處解竒拜云拜時先屈一􅂰今之雅拜也夫特以先屈一􅂰爲雅拜則他拜皆當齊屈兩􅂰如今之禮拜明矣凡此三事書傳皆無明文亦不知其自何時而變而今人有不察也頃年屬錢子言作白鹿禮殿欲據開元禮不爲塑像而臨􅀕設位子言不以爲然而必以塑像爲問予旣畧爲考禮如前之云又記少時聞之先人云嘗至鄭州謁列子祠見其塑像席地而坐則亦并以告之以爲必不得巳而爲塑像則當放此以免於蘇子俯伏匍匐之譏子言又不謂然㑹予亦辭江東之節遂不能強然至今以爲恨也東坡文集私試䇿問云古者坐於席故籩豆之長短簠簋之髙下適與人均今􅁟木之像旣巳巍然於上而列器皿於地使鬼神不享則不可知若其享之則是俯伏匍匐而就地其後乃聞成都府學有漢時禮殿諸像皆席地而跪坐文翁猶是當時􅅣石所爲􅀹足据信不知蘇公蜀人何以不見而云爾也及楊方子直入蜀帥幕府因使訪焉則果如所聞者且爲冩放文翁石􅁚爲小上偶以來而塑手不精或者猶意其或爲加跌也去年又以屬蜀漕楊王休子羙今乃并得先聖先師二像木刻精好視其坐後兩蹠􅀮然見於帷裳之下然後審其所以坐者果爲跪而亡疑也惜乎白鹿塑像之時不得此證以曉子言使東南學者未得復見古人之像以革千載之繆爲之喟然太息姑記本末冩􅀉洞學諸生使書而掲之廟門之左以俟來者考焉周禮太祝九􅉔辯䟽云此九拜之中四種是正拜五者逐事主名還依四種正拜而爲之也又云稽首頓首空首此三者正拜也肅拜婦人之正拜也其餘五者附此四種振動吉拜㓙拜褒拜附稽首竒拜附空首又云空首一拜其餘皆再拜肅拜或再故郤至三肅使者一曰稽首江曰拜頭至地也䟽曰先以兩手拱至地及頭至手又引頭至地多時也稽首稽留之字也稽首拜中最重臣拜君之拜哀十七年公㑹齊侯盟於蒙孟武伯相齊侯稽首公則拜齊人怒武伯曰非天子寡君無所稽首襄三年公如􅀳孟獻子相公稽首知武子曰天子在君辱稽首寡君懼矣郊特牲曰大夫之臣不稽首非尊家臣以避君也是諸侯于天子大夫于諸侯皆當稽首二曰頓首注曰拜頭叩地也䟽曰先以兩手拱至地乃頭至手而又引頭即舉也頭叩地謂􅀂以首叩物然此平敵自相拜家臣於大夫及凢自敵者皆當從頓首之拜也記䟽曰頭叩地不停留地也又曰諸侯相拜則然三曰空首注曰拜頭至手所謂拜手也䟽曰先以兩手拱至地乃頭至手也以其頭不至地故各空首各疑名字之誤君答臣下拜也其有敬事亦稽首洛誥曰拜手稽首是也又曰稽首頓首空首此三者相因而爲之空首而引頭頓地即舉故名頓首而引頭至地稽留多時故名稽首此三者之正拜也四曰振動注曰戰栗變動之拜書曰王動色變記䟽曰謂有敬懼故爲振動䟽曰案中候膺云季秋七月甲子赤雀衘丹入鄷王再拜稽首受案今文太誓得火烏之瑞使以周公書報於王王動色變雖不見拜文與文王受赤雀之命爲稽首拜也五曰吉撡六曰㓙撡注曰吉拜拜而後稽顙謂齊衰不杖以下者言吉者此殷之㓙拜周以其拜與頓首相近故謂之吉拜云㓙拜稽顙而後拜謂三年服者䟽曰拜而後稽顙謂先作頓首後作稽顙稽顙還是頓首但觸地無容則謂之稽顙記曰拜而後稽顙頺乎其順也稽顙而後拜頎乎其至也䟽曰拜是爲親痛深貌惻􅀮之至也記又曰􅀳獻公薨秦穆公使人弔公子重耳勸其反國重耳稽顙而不拜􅂘而起穆公曰稽顙而不拜則未爲後也故不成拜􅂘而起則愛父也䟽曰􅀂爲後則當拜謝其恩今不受其勸故不拜謝所以稽顙者自爲父喪哀號也凡喪禮先稽顙而後拜乃成直稽顙而不拜故云不成拜也今旣聞父死勸其反國之義哀慟而起􅀂欲攀轅然故云則愛父也七曰竒撡八曰襃撡注曰杜子春云竒讀爲竒偶之竒鄭大夫云竒拜謂一拜答臣下拜襃拜再拜神與尸杜子春書又曰竒拜先屈一􅂰今雅拜是䟽云後鄭不從此說九曰肅撡注曰肅拜但俯下手今時撎是也介者不拜故曰爲事故敢肅使者䟽曰肅拜者拜中最輕唯軍中有此肅拜婦人亦以肅拜爲正又曰儀禮賔撎入門推手曰揖引手曰撎記䟽曰少儀妨人告事雖有君賜肅拜壼說今詳經文不言壼之圍徑而但言其髙之度容之量以爲相求互見之功且經言其所容止於斗有五升而注乃以二斗釋之則經之所言者圓壼之實數而注之所言乃借以方體言之而筭法所謂虚加之數也盖壼爲圓形斗五升爲竒數皆繁曲而難計故筭家之術必先借方形虚加整數以定其法然後四分去一以得圓形之實此鄭氏所以舎斗五升之經文而直以二斗爲說也然其言知借而不知還知加而不知减乃於下文遂并方體之所虚加以爲實數又皆必取全寸不計分釐定爲圓壼腹徑九寸而圍二尺七寸則爲失之䟽家雖知其失而不知其所以失顧乃依違其間訖無定說是以讀者不能無疑今以筭法求之凢此定二斗之量者計其積實當爲三百二十四寸而以其髙五寸者分之則毎髙一寸爲廣六十四寸八分此六十四寸者自爲正方又取其八分者割裂而加於正方之外則四靣各得二釐五毫之數乃復合此六十四寸八分者五爲一方壼則其髙五寸其廣八寸五釐而外方三尺二寸二分中受二斗如注之􅀄說矣然此方形者筭術所借以爲虚加之數爾􅀂欲得圓壼之實數則當就此方形規而圓之去其四角虚加之數四分之一使六十四寸八分者但爲四十八寸六分三百二十四寸者但爲二百四十三寸則壼腹之髙雖不減於五寸其廣雖不减於八寸五釐而其外圍則僅爲二尺四寸一分五釐其中所受僅爲斗有五升如經之云無不諧㑹矣深衣制度并圗裁用細白布度用指尺中指中節爲寸衣二幅不裁其長過脇下屬於裳用布二幅中屈而下垂之如今之直領衫但不裁破掖下每幅之下屬裳三幅裳交解十二幅上屬於衣其長及踝用布六幅每幅裁爲二幅一頭廣一頭狹狹頭當廣頭之半以狹頭向上而聮其縫以屬於衣每三幅屬衣一幅圓􅃑用布二幅各中屈之如衣之長屬於衣之左右而縫合其下以爲􅃑其本之廣如衣之長而漸圓殺之以至􅃑口則其徑一尺二寸方領兩􅁭相掩祍在掖下則兩領之㑹自方曲􅅂用布一幅如裳之長交解裁之疊兩廣頭並令向上布􅁁不動但稍裁其内旁太半之下令漸如魚腹末如鳥喙内向而緝之相沓綴於裳上之右旁以掩裳際右幅在下左幅在上布􅁁在外裁處在内衣裳皆縁縁用黒繒具父母以青大父毋以繢領表裏各二寸裳下及邉表裏各一寸半皆就布縁􅃑口表裏亦寸一半布外接出大帶帶用白繒廣四寸夾縫之其長圍要而結於前再繚之爲兩耳及垂其餘爲紳下與裳齊以繒縁其紳之兩旁及下表裏各半寸如縁之色復以五綵絛廣二分約其相結處長與紳齊緇冠糊􅁓爲之武髙寸許前後三寸左右四寸上爲五梁辟積左縫廣四寸長八寸跨頂前後著於武外反屈其兩端各半寸内向黒􅃮之武之兩傍半寸之上竅以受笄笄用齒骨凡白物幅巾用黒繒六尺許刺一􅁁作巾額當中作㡇兩旁三寸許各綴一帶廣一寸許長二尺許循㡇中上反屈之當幅之中斜縫向後去其一角而復反之使巾頂正圓乃以額輙當頭前向後圍裹而繋其帶於緇後餘者垂之黒履白絇繶純綦殿屋廈屋說殿屋五間前皆爲堂後爲房室中間之前爲兩楹間後爲室東間之前爲東楹之東又少東爲阼階上少北爲東序後爲東房西間之前爲西楹之西又少西爲賔階上少北爲西序後爲西房序即墻也設位在東西序者􅀒墻而立也其南爲序端東序之東西序之西爲夾亦謂之廂又說文云廂廊也廊東西序也此亦可見但疑序下脫一外字其前爲東西堂其後爲東西夾室夾外之廣爲側階房後爲北階此其地之盤也其棟則中三間爲一棟横指東西至兩序之上而盡遂自此處分爲四棟邪指四隅上接横棟下與霤齊此其上棟之制所謂四阿也其宇則横棟前後即爲南北兩下横棟盡外即爲東西兩下四棟之旁即各連所向而下四靣榱桷覆堂廉岀階外者謂之廡􅀃文云廡堂下周屋也其屋盡水下處謂之霤此其下字之制也厦屋則前五間後四間無西房堂中三間之後只分爲兩間東房室西其餘並如殿屋之制但五間皆爲横棟棟之前後皆爲兩下之宇横棟盡外有版下垂謂之摶風摶風之下亦爲兩廡接連南北以覆側階但其廡亦不出摶風之外耳儀禮䟽云卿大夫爲夏屋其室兩下而四周之殿屋四阿連下爲廡四靣之簷其水皆多故其簷皆得以霤爲名厦屋南北兩下之廡與殿屋同故其簷亦謂之霤東西兩廡則但爲腰簷不連棟下又不出摶風之外雖或有水亦不能多故但謂之榮謂之翼而不得以霤名也榮翼乃接簷之名䟽乃直指摶風誤矣明堂說論明堂之制者非一熹􅀼意當有九室如井田之制東之中爲青陽太廟東之南爲青陽右箇東之北爲青陽左箇南之中爲明堂太廟南之東即東之南爲明堂左箇南之西即西之南爲明堂右箇西之中爲總章太廟西之南即南之西爲總章左箇西之北即北之西爲總章右箇北之中爲玄堂太廟北之東即東之北爲玄堂右箇北之西即西之北爲玄堂左箇中是爲太廟太室凡四方之太廟異方所其左箇右箇則青陽之右箇乃明堂之左箇明堂之右箇乃總章之左箇也總章之右箇乃玄堂之左箇玄堂之右箇乃青陽之左箇也但随其時之方位開門耳太廟太室則毎季十八日天子居焉古人制事多用井田遺意此恐是也儀禮釋宫宫室之名制不盡見於經其可攷者宫必南郷廟在􅃦東皆有堂有門其外有大門周禮建國之神位右社稷左宗廟宫南郷而廟居左則廟在􅃦東也􅃦廟之大門一曰外門其北盖直􅃦故士喪禮注以􅃦門爲内門中門凡旣入外門其向廟也皆曲而東行又曲而北案士冠禮賔立于外門之外主人迎賔入毎曲揖至于廟門注曰入外門將東曲揖直廟將北曲又揖是也又按聘禮公迎賔于大門内每門每曲揖及廟門賈氏曰諸侯五廟太祖之廟居中二昭居東二穆居西每廟之前兩旁有隔墻墻皆有閤門諸侯受聘于太祖廟太祖廟以西隔墻有三大門東行至太祖廟凡經三閤門故曰毎門也大夫三廟其墻與門亦然故賔問大夫迎賔入亦毎門每曲揖乃及廟門其􅀃當考大夫士之門惟外門内門而巳諸侯則三天子則五庠序則惟有一門郷飲酒射禮主人迎賔于門外入門即三揖至階是也堂之屋南北五架中春之架曰棟次棟之架曰楣郷射禮記曰序則物當棟堂則物當楣注曰是制五架之屋也正中曰棟次曰楣前曰庪賈氏曰中春爲棟棟前一架爲楣楣前接簷爲􅔑今見於經者惟棟與楣而巳棟一名阿案士昏禮賔升當阿致命注曰阿棟也又曰入堂深示親親賈氏曰凡賔升皆當楣此深入當棟故云入堂深也又按聘禮賔升亦當楣賈氏曰凡堂皆五架則五架之屋通乎上下而其廣狹隆殺則異爾後楣以北爲室與房後楣之下以南爲堂以北爲室與房室與房東西相連爲之案少牢饋食禮主人室中獻祝祝拜于席上坐受注曰室中迫狹賈氏曰棟南兩架北亦兩架棟北楣下爲室南壁而開戸以兩架之間爲室故云迫狹也昏禮賔當阿致命鄭云入堂深明不入室是棟北乃有室也序之制則無室案郷射禮記曰序則物當棟堂則物當楣注曰序無室可以深也又禮席賔南靣注曰不言于戸牗之間者此射于序賈氏曰無室則無户牗故也釋宫曰無室曰榭榭即序也人君左右房大夫士東房西室而巳聘禮記􅀂君不見使大夫受聘升受􅀒右房而立大射儀薦脯􅊽由左房是人君之房有左右也公食大夫禮記筵出自東房注曰天子諸侯左右房賈氏曰言左對右言東對西大夫士惟東房西室故直云房而巳然按聘禮賔舘于大夫士君使卿還玉干舘也賔亦退􅀒右房則大夫亦有右房矣又郷飲酒禮記薦出自左房少牢饋食禮主婦薦自東房亦有左房東房之稱當攷室中西南隅謂之奥邢昺曰室戸不當中而近東西南隅最爲深隠故謂之奥而􅀕祀及尊者常處焉東南隅謂之窔鳥吊反郭氏曰窔亦􅀮闇西北隅謂之屋漏詩所謂尚不愧于屋漏是也曽子問謂之當室之白孫炎曰當室日光所漏入也鄭謂當室之白西北隅得戸明者經止曰西北隅室南其戸戸東而牗西說文曰戸半門也牗穿壁以木爲交窓也月令正義曰古者窟居開其上取明雨因霤之是以後人戸室爲中霤開牗者象中霤之取明也牗一名郷其扇在内案士虞禮祝闔牗戸如食間啓戸啓牗郷注曰牗先闔後啓扇在内也郷牗一名是也戸牗之間謂之依郭氏曰窓東戸西也覲禮斧扆亦以設之于此而得扆名士昏禮注曰户西者尊處以尊者及賔客位于此故又曰客位戸東曰房戸之間士冠禮注曰房西室户東也寢廟以室爲主故室戸專得戸名凡言戸者皆室戸􅀂房戸則兼言房以别之大夫士房户之間於堂爲東西之中按詩正義曰郷飲酒義云尊于房戸之間賔主共之由無西房故以房與室戸之間爲中也又郷飲酒禮席賔于戸牗間而義曰坐賔于西北則大夫士之戸牗間在西而房内間爲正中明矣人君之制經無明證按釋宫曰兩階間謂之郷郭氏曰人君南郷當階間則人君之室正中其西爲右房而戸牗間設戾處正中矣又按詩斯干曰築室百堵西南其戸箋曰天子之寢左右房異於一房者之室戸也正義曰大戸唯有一東房故室戸偏東與房相近天子諸侯旣有右房則室當在其中其戸正中比一房之室戸爲西當攷房戸之西曰房外士昏禮記母南靣于房外女出于母左士冠禮尊于房戸之間􅀂庶子則冠于房外南靣注曰謂尊東也是房戸之西得房外之名也房之戸於房南壁亦當近東案士昏禮注曰北堂在房中半以北南北直室東隅東西直房戸與隅間隅間者盖房東西之中兩隅間也房中之東其南爲夾洗直房戸而在房東西之中則房戸在房南壁之東偏可見矣房中半以北曰北堂有北階士昏禮記婦洗在北堂直室東隅注曰北堂房中半以北賈氏曰房與室相連爲之房無北壁故得北堂之名按特牲饋食禮記尊兩壼於房中西墉下南上内賔立于其北東靣南上宗婦北堂北上内賔在宗婦之北乃云北堂又埽洗在北堂而直室東隅是房中半以北爲北堂也婦洗在北堂而士虞禮主婦洗足爵於房中則北堂亦通名房中矣大射儀工人士與梓人升下自北階注曰位在北堂下則北階者北堂之階也堂之上東西有楹楹柱也古之築室者以垣墉爲基而屋其上惟堂上有兩楹而巳楹之設盖於前楣之下按郷射禮曰射自楹間注曰謂射於庠也又曰序則物當棟堂則物當楣物畫地爲物射時所立處也堂謂庠之堂也又曰豫則鉤楹内堂則由楹外當物北靣楫豫即序也鉤楹繞楹也物當棟而升射者必鉤楹内乃北靣就物則棟在楹之内矣物當楣而升射者由楹外北靣就物又鄭氏以爲物在楹間則楹在楣之下也又按釋宫曰梁上楹謂之梲梲侏儒柱也梁楣也侏儒柱在梁之上則楹在楣之下又可知矣堂東西之中曰兩楹間公食大夫禮致豆實陳于㨕外簠簋陳於楹内兩楹間言楹内外矣又言兩楹間知凡言兩楹間者不必與楹相當堂東西之中爾南北之中曰中堂聘禮受玉於中堂與東楹之間注曰中堂南北之中也入堂深尊賔事也賈氏曰後楣以南爲堂堂凡四架前楣與棟之間爲南北堂之中公當楣拜訖更前北侵半架受玉故曰入堂深也案東楹之間侵近東楹非堂東西之中而曰中堂則中堂爲南北之中明矣又按士喪禮注曰中以南謂之堂賈氏曰堂上行事非專一所􅀂近戸即言戸東戸西近房則言房外房東近楹即言東楹西楹近序即言東序西序近階即言東階西階其堂半以南無所􅁇屬者即以堂言之祝浙米于堂是也堂之東西墻謂之序郭氏曰所以序别内外序之外謂之夾室公食大夫禮大夫立于東夾南注曰東於堂賈氏曰序以西爲正堂序東有夾室今立于堂下當東夾是東於堂也又按公食禮宰東夾北西靣賈氏曰位在北堂之南與夾室相當特牲饋食禮豆􅇼鉶在東房注曰東房房中之東當夾北則東夾之北通爲房中矣室中之西與右房之制無明文東夾之北爲房中則西夾之北盖通爲室中其有兩房者則西夾之北通爲右房也歟夾室之前曰箱亦曰東堂西堂覲禮記注曰東箱東夾之前相翔待事之處特牲饋食禮注曰西堂西夾之前近南爾賈氏曰即西箱也釋宫曰室有東西廂曰廟郭氏曰夾室前堂是東廂亦曰東堂西箱亦曰西堂也釋宫又曰無東西廂有室曰􅃦按書顧命䟽寢有東夾西夾士喪禮死于適寢主人降襲絰于序東注曰序東東夾前則正寢亦有夾與箱矣釋宫所謂無東西箱者或者謂廟之寢也歟凡無夾室者則序以外通謂之東堂西堂按郷射禮主人之弓矢在東序東大射儀君之弓矢適東堂大射之東堂即郷射之東序東也此東西堂堂各有階案雜記夫人奔喪升自側階注曰側階旁階奔喪曰婦人奔喪升自東階注曰東階東靣階東靣階則東堂之階其西堂有西靣階也東堂下西堂下曰堂東堂西大射儀賔之弓矢止于西堂下其將射也賔降取弓矢于堂西堂四即西堂下也特牲饋食禮主婦視饎㸑于西堂下記曰饎㸑在西壁則自西壁以東皆謂之西堂下矣又按太射儀執冪者升自西階注曰羞膳者從而東由堂東升自北階立于房中則東堂下可以逹北堂也堂角有坫士冠禮注曰坫在堂角賈氏釋士喪禮曰堂隅有坫以土爲之或謂堂隅爲坫也堂之側􅁁曰廉堂郷飲酒禮設席于堂廉注曰側邉曰廉喪大記正義曰堂廉堂基南畔廉稜之上也又按郷射禮衆弓倚于堂西矢在其上注曰上堂西廉則堂之四周皆有廉也升堂兩階其東階曰阼階士冠禮注曰阼酢也東階所以答酢賔客也毎階有東西兩廉聘禮饔􅂦設于西階前當内廉此則西階之東廉以其近堂之中故曰内廉也士之階三等按士冠禮降三等受爵弁注曰下至也賈氏曰匠人云天子之堂九尺賈馬以爲階九等諸侯堂宜七尺階七等大夫宜五尺階五等士宜三尺故階三等也兩階各在楹之外而近序按郷射禮升階者升自西階繞楹而東燕禮勝爵者二人升自西階序進東楹之西酌散交于楹北注曰楹北西楹之北則西階在西楹之西矣士冠禮冠于東序之筵而記曰冠于阼喪禮攅置于西序而檀弓曰周人殯于西階之上故知階近序也堂下至門謂之庭三分庭一在此設碑聘禮注曰宫必有碑所以識日景知隂陽也賈氏釋士昏禮曰碑在堂下三分庭一在北按聘禮歸饔餼醯􅊽夾碑米設于中庭注曰庭實固當中庭言中庭者南北之中也列當醯􅊽南列米在醯􅊽南而當庭南北之中則三分庭一在北可見矣聘禮注又曰設碑近如堂深堂深謂從堂廉北至房室之壁三分庭一在北設碑而碑如堂深則庭盖三堂之深也又按郷射之侯去堂三十丈大射之侯去堂五十四丈則庭之深可知而其降殺之度從可推矣堂􅂗謂之陳郭氏曰堂下至門徑也其北屬階其南接門内霤接凡入門之後皆三揖至階昏禮注曰三揖者至内霤將曲揖旣曲北靣揖當碑揖賈氏曰至内霤將曲者至門内霤主人將東賔將西賔主相背時也旣曲北靣者賔主各至堂塗北行向堂時也至内霤而東西行趨堂􅂗則堂塗接于霤矣旣至堂塗北靣至階而不復有曲則堂塗直階矣又按聘禮饔􅂦設于西階前陪􅂦當内廉注曰辟堂􅂗也則堂塗在階廉之内矣郷飲酒禮注三揖曰將進揖當陳揖當碑揖陳即堂􅂗也中門屋爲門門之中有闑士冠禮曰席于門中闑西閾外注曰闑撅也玉藻正義曰闑門之中央所竪短木也釋宫曰樴在地者謂之臬郭氏曰即門橛也􅀬則闑者門中所竪短木在地者也其東曰闑東其西曰闑西門限謂之閾釋宫曰秩謂之閾郭氏曰閾門限邢昺曰謂門下横木爲内外之限也其門之兩旁木則謂之棖棖闑之間則謂之中門見禮記闔謂之扉邢昺曰闔門扉也其東扉曰左扉門之廣狹案士昏禮曰納徴儷皮記曰執皮左首随入注曰随入爲門中阨狹賈氏曰皮皆横執之門中阨狹故随入也匠人云廟門容大扄七箇大扄牛􅂦之扄長三尺七箇二丈一尺彼天子廟門此士之廟門降殺甚小故云阨狹也推此則自士以上宫室之制雖同而其廣狹則異矣夾門之堂謂之塾釋宫曰門側之堂謂之塾郭氏曰夾門堂也門之内外其東西皆有塾一門而塾四其外塾南郷按士虞禮陳􅂦門外之右匕爼在西塾之西注曰塾有西者是室南郷又按士冠禮擯者􅀒東塾注曰東塾門内東堂􅀒之北靣則内熟北向也凡門之内兩塾之間謂之宁按聘禮賔問卿大夫迎于外門外及廟門大夫揖入擯者請命賔入三揖並行注曰大夫揖入者省内事也旣有俟于宁也凡至門内霤爲三揖之始上言揖入下言三揖並行則俟于霤南門内兩塾間可知矣李廵曰宁正門内兩塾間義與鄭同謂之宁者以人君門外有正朝視朝則於此宁立故耳周人門與堂脩廣之數不著於經案匠人云夏后氏世室堂脩二七廣四脩一堂脩謂堂南北之深其廣則益以四分脩之一也門堂三之二室三之一門堂通謂門與塾其廣與脩取數於堂得其三之二室三之一者兩室與門各居一分也以夏后氏之制推之則周人之門殺於堂之數亦可得而知矣門之内外東方曰門東西方曰門西特牲饋食禮注曰凡郷内以入爲左右郷外以出爲左右士冠禮注又曰出以東爲左入以東爲右以入爲左右則門西爲左門東爲右郷飲酒禮賔入門左燕禮卿大夫皆入門右是也以出爲左右則門東爲左門西爲右士冠禮主人迎賔出門左西靣士虞禮側享于廟門之右是也闑東曰臬右亦自入者言之也天子諸侯門外之制其見於經者天子有屏諸侯有朝案覲禮侯氏入門右告聴事出自屏南適門西注曰天子外屏釋宫曰屏謂之􅀣郭氏曰小墻當門中曲禮正義曰天子外屏屏在路門之外諸侯内屏屏在路門之内此侯氏出門而􅀮於屏則天子外屏明矣釋宫又曰門屏之間謂之宁謂宁在門之内屏之外此屏㩀諸侯内屏而言也諸侯路寢門外則有正朝大門外則有外朝按聘禮夕幣于寢門外宰入告具于君君朝服出門左南郷注曰寢門外朝也入告入路門而告賈氏曰此路門外正朝之處也是正朝在寢門外也聘禮又曰賔死介復命柩止于門外若介死惟上介造于朝注曰門外大門外也必以柩造朝逹其中心又賔拜饔餼于朝注曰拜於大門外賈氏曰大門外諸侯之外朝也賔拜於朝無入門之交則諸侯外朝在大門外明矣是外朝在大門外也諸侯三朝其燕朝在寢燕禮是也正朝與外朝之制度不見於經盖不可得而考矣寢之後有下室士喪禮記士處適寢又曰朔月􅀂薦新則不饋于下室注曰下室如今之内堂正寢􅃪事賈氏曰下室燕寢也然則士之下室於天子諸侯則爲小寢也春秋傳曰子大叔之廟在道南其寢在廟北其寢廟之寢也廟寢在廟之北則下室在適寢之後可知矣又按喪服􅀓曰有東宫有西宮有南宮有北宮異宮而同財内則曰由命士以上父子皆異宮賈氏釋士昏禮曰異宮者别有寢若不命之士父子雖大院同居其中亦隔别各有門户則下室之外又有異宮也自門以北皆周以墻聘禮釋幣于行注曰喪禮有毁宗躐行出于大門則行神之位在廟門外西方檀弓正義曰毁宗躐行毁廟門西邊墻以出柩也士喪禮爲垼于西墻下注曰西墻中庭之西特牲饋食禮主婦視禧㸑于西堂下記曰饎㸑在西壁注曰西壁堂之西墻下案門之西有墻則墻屬於門矣西墻在中庭之西則墻周乎庭矣西壁在西墻下則墻周乎堂矣墻者墉壁之總名室中謂之墉昏禮尊于室中北墉下是也房與夾亦謂之墉冠禮陳服于房中西墉下聘禮西夾六豆設于西墉下是也堂上謂之序室房與夾謂之墉堂下謂之壁謂之墻其實一也随所在而異其名爾堂下之壁闈門在焉案士喪禮冠者降適東壁見于母注曰適東壁者出闈門也時母在闈門之外婦人入廟由闈門士虞禮賔出主人送主婦亦拜賔注曰女賔也不言出不言送拜之於闈門之内闈門如今東西掖門釋宫曰宫中之門謂之闈郭氏曰謂相通小門也是正門之外又有闈門而在旁壁也人君之堂屋爲四注大夫士則南北兩下而巳士冠禮設洗直于東榮注曰榮屋翼也周制自卿大夫以下其室爲夏屋燕禮設洗當東霤注曰人君爲殿屋也案考工記殿四阿重屋注曰四阿􅀂今之四注屋殷人始爲四注屋則夏后氏之屋南北兩下而已周制天子諸侯得爲殿屋四注卿大夫以下但爲夏屋兩下四注則南北東西皆有霤兩下則唯南北有霤而東西有榮是以燕禮言東霤而大夫士禮則言東榮也霤者說文曰屋水流也徐鍇曰屋檐滴處榮者􅀃文曰屋捛之兩頭起者爲榮又曰梠齊謂之檐楚謂之梠郭璞注上林賦曰南榮屋南檐也義與說文同然則檐之東西起者曰榮謂之榮者爲屋之榮􅅚謂之屋翼者言其軒張如翬斯飛耳士喪禮升自前東榮喪大記降自西北榮是屋有四榮也門之屋雖人君亦兩下爲之燕禮之門内霤則門屋之北霤也凡屋之檐亦謂之宇案士喪禮爲銘置于宇西階上注曰宇梠也􅀃文曰宇屋􅁁也釋宫曰檐謂之樀郭氏曰屋梠邢昺曰屋檐一名樀一名梠又名宇皆屋之四垂也宇西階上者西階之上上當宇也階之上當宇則堂廉與坫亦當宇矣特牲饋食禮主婦視饎㸑于西堂下注曰南齊于坫其記又注曰南北直屋梠是也階上當宇故階當霤郷射禮記磬階間縮霤是也霤以東西爲從故曰縮霤此霤謂堂之南霤也此其著於經而可考者也禮經雖亡闕然於覲見天子之禮於燕射聘食見諸侯之禮餘則見大夫士之禮宫室之名制不見其有異特其廣狹降殺不可考耳案書顧命成王崩於路寢其陳位也有設斧扆牗間南郷則戸牅間也西序東嚮東序西嚮則東西序也西夾南嚮則夾室也東房西房則左右房也賔階靣阼階靣則兩階前也左塾之前右塾之前則門内之塾也畢門之内則路􅃦門也兩階戺則堂廉也東堂西堂則東西廂也東垂西垂則東西堂之宇階上也側階則北階也又云諸侯出廟門俟則與士喪禮殯宫曰廟合也然則鄭氏謂天子廟及路寢如明堂制者盖未必然明堂位與考工記所記明堂之制度者非出於舊典亦未敢必信也又案書多士傳曰天子之堂廣九雉三分其廣以二爲内五分内以一爲髙東房西房北堂各三雉公侯七雉三分廣以二爲内五分内以一爲髙東房西房北堂各一雉伯子男五雉三分廣以二爲内五分内以一爲髙東房西房北堂各一雉士三雉三分廣以二爲内五分内以一爲髙有室無房堂注曰廣榮間相去也雉長三丈内堂東西序之内也髙穹髙也此傳􅀃房堂及室與經亦不合然必有所據姑存之以備參攷答社壇說所喻社壇别􅁓奉報此是見行禮制更可計㑹法司檢淳熈間所攽􅁽子爲佳此事在州郡爲至重今人皆不以爲意太守乃能及此深可爲法又能擇賢者而屬之􅀹見其不苟也州縣社壇方二丈五尺髙三尺四出陛稷壝如社壇之制社以石爲主其形如鍾長二尺五寸方一寸剡其上培其下半四門同一壝二十五歩壇飾各随方色上盖以黄土瘞坎於壇之北壬地南出陛方深取足容物右出政和五禮新儀第二十一卷淳熈中曽有印本攽行州郡法司必有之可更檢㸔又以行事儀考之二壇東西相並坐南向北社壇石主在壇上之南方北門壝外空地須令稍寛可容獻官席位空地之北乃作齊􅈦以備風雨設獻官位獻官南向行事州縣社壇方二丈五尺四歩令每歩六分之一凡言方者皆徑也此言方二丈五尺者從東至西二丈五尺從南至北二丈五尺也後叚壝内二十五歩其說亦然髙三尺旣言壇髙三尺又言壇分三級則是以一尺爲一級也四出陛此陛之級即壇之級也但於四靣陛之兩傍各以石砌作慢道隔斷使其中爲陛級外爲壇級可也社主舊法惟社有主而稷無主不曉其意恐不可以已意增添其言壇上之南方非壇之中也盖神位坐南向北而􅀕器設於神位之北故此石主當壇上南陛之上更宜詳考畫作圗子便可見􅀂在壇中央即無設􅀕處矣四門同一壝二十五歩壝方二十五歩者亦是徑二十五歩謂從東至西二十五歩從南至北二十五歩以丈計之六尺爲歩則爲十五丈也四角築土爲壝髙三尺許使壇上與齊􅈦相望得見壝上不用瓦盖但以磚兩靣砌之使其走水􅀹爲堅固四門當中開門古法不言闊狹恐須闊一丈餘庶㡬行禮執事之人徃來寛展不相妨礙兩旁各立一華表髙一丈許上以横木貫之如門之狀華表於禮無文但見州縣有如此者或恐易得損壞不作亦得請更依此歩數丈數界作方眼中間以􅁓剪作兩壇貼之便見四靣壇脚取壝丈數但壇靣二丈五尺乃最上一級之數下靣更兩級一級須展一尺即壇脚須徑二丈九尺壇飾古者社稷不屋有明文不用磚砌無所考然亦不言磚砌者中原土密雖城壁亦不用磚今南方土踈不砌恐易壊赤􅁟飾之又恐僣於郊壇不可用也瘞坎於壇之北壬地南出陛方深取足容物瘞坎在壇之北壬地即是合在北壝門内兩壇􅁁各於中央下日隔取壬地各用磚石砌作一小天井深闊三四尺許其南作踏道上下閑時以土實之臨祭即令人取去土掃令㓗净祭畢即使人持幣及祝版之屬從踏道下送入坎中然後下土築實依條差人守視燎壇古者祭天以燔燎􅀕地以瘞埋來喻所云燎壇爲風師雨師雷師設者是也古今禮制社稷風雨雷神各有壇又各有方位社稷於西方風師於東北雨雷於東南大畧如此不記子細今州縣亦皆别有壇但方位多不合古不謂建寜大􅀖乃無風雨雷神之壇而寓於社稷之壇也新儀所云在神壇之左而髙於神壇者不謂此社稷壇左設燎壇而髙於社稷壇也植木按周禮社各植之以土之所冝木今當以本府之所宜木植之尺壇壝等亦是禮制當用古尺不當用大尺井田􅀋說漢文帝十三年六月除田租荀氏論曰古者什一而稅以爲天下之中正也今漢民或百一而稅可謂鮮矣然豪彊冨人占田逾侈此處疑有闕字輸其賦太半官收百一之稅民􅀵太半之賦官家之惠優於三代豪彊之􅁀酷於亡秦是上惠不通威福分於豪彊也今不正其本而務除租稅適足以資富疆夫土地者天下之大本也春秋之義諸侯不得專封大夫不得專地今豪民占田或至數百千頃富過王侯是自專封也買賣由巳是自專其地也孝武時董仲舒嘗言冝限民占田至哀帝時乃限民占田不得過三十頃雖有其制卒不得施然三十頃有不乎矣且夫井田之制冝於民衆之時地廣民稀勿爲可也然欲廢之於寡立之於衆土地旣富列在豪彊卒而規之並起怨心則生紛亂制度難行由是觀之􅀂髙帝􅀄定天下及光武中興之後民人稀少立之易矣就未悉備井田之法冝以口數占田爲立科限民得耕種不得買賣以贍貧弱以防兼并且爲制度張本不亦冝乎雖古今異制損益随時然綱紀大畧其致一也本志曰古者建歩立畒六尺爲歩歩百爲􅅕􅅕百爲夫夫三爲屋屋三爲井井方一里是爲九夫八家共之一夫一婦受私田百畆公田十畆是爲八百八十􅅕餘二十畆以爲廬舎出入相交佇班志作守望相接疾病相救民受田上田夫百畆中田夫二百畆下田夫三百畆歲更耕之換易其處何休曰司空謹别田之髙下善惡分爲三品上田一歲一墾中田二歲一墾下田三歲一墾肥饒不得獨樂墝埆不得獨苦三年一换土易居其家衆男爲餘夫亦以口受田如此比士工啇家受田五口乃當農夫一人有賦有税賦謂計口發財六字係班志顔注稅謂公田什一及工啇衡虞之入也賦供車馬兵甲士徒之役充實府庫賜予之費稅給郊宗廟百神之祀天子奉養百官禄食庶事之費充實以下並班志文民年二十受田六十歸田種􅂖必雜五種以備災害中弗得有􅀣以妨五􅂖力耕數耘􅀵穫如㓂盗之至環廬種桑菜茹有畦􅀲瓠果蓏􅉁於彊畔雞豚狗豕無失其時女修􅁞織五十則可以衣帛七十則可以食肉五家爲比五比爲閭四閭爲族五族爲黨五黨爲州五州爲郷郷萬二千五百戸比長位下士自此以上稍登一級至郷爲大夫矣於是閭有序而郷有庠序以明教庠以行禮而視化焉春令民畢出於野其詩云同我婦子饁彼南畆田畯至饎冬則畢入於邑其詩云同我婦子曰爲改歲入此室處春則出民閭胥平旦坐於左塾比長坐於右塾畢出而後歸夕亦如之入者必薪樵輕重相分班白不提挈何休曰晏出後時者不得出暮不持樵者不得入冬則民旣入婦人同巷夜績女工一月得四十五日功必相從者所以省費燭火同工拙而合習俗也男女有不得其所者因而相與歌詠以言其情是月餘子亦在序室未征役爲餘子八歲入小學學六甲四方五行書計之事始知室家長㓜之節始知以下班志文十五入大學學先王禮樂而知朝廷二字班志君臣之禮其有秀異者移於郷學郷學之秀移於國學學於小學諸侯歳貢小學之秀者於天子學於大學其有秀者命曰造士行同而能偶别之以射於郷學以下以何休說増損脩定然後爵命焉孟春之月群居將散行人振木鐸以狥於路以採詩獻之太師比其音律以聞於天子何休曰男年六十女年五十無子者官衣食之使之民間求詩郷移於邑邑移於國國以閒於天子三年耕則餘一年之畜故三年有成成此功也故王者三載考績九年耕餘三年之食進業曰登故三考黜陟再登曰平餘六年食三登曰㤗平二十七歳餘九年食然後至徳流洽禮樂成焉故曰如有王者必世而後仁繇此道也九年以下並以班志修定書曰天秩有禮天罰有罪故聖人因天秩而制五禮因天罰而制五刑建司馬之官設六軍之衆因井田而制軍賦地方一里爲井井十爲通通十爲成成方十里成十爲衆衆班志並作終字十爲同同方百里同十爲封封十爲畿畿方千里地四井爲邑四邑爲丘丘十六井有戎馬一匹牛三頭四丘爲甸六十四井有戎馬四匹兵車一乗牛十二頭甲士三人歩卒七十二人干戈備具是謂司馬之法一同百里提封萬井除山川坑塹城池邑居園囿街路三千六百井定岀賦六千四百井戎馬四百匹兵車百乗此卿大夫采地之大者是謂百乗之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乗此諸侯之大者謂之千乗之國天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乗戎馬車徒干戈素具春振旅以蒐夏㧞舎以苗秋治兵以彌冬大閱以狩於農隙以講事焉五國爲屬屬有長十國爲連連有帥三十國有卒卒有正二百一十國爲州州有牧牧有連帥比年簡車卒正三年簡徒群牧五年大簡輿徒此先王爲國立武足兵之大畧也連帥以下並依班志晦庵先生朱文公文集卷第六十八終福州府儒學訓導鄭璉校
