body:
  text: 雜著北辰辨帝坐惟在紫㣲者据北極七十二度常見不􅀮之中故有北辰之號而常居其所盖天形運轉晝夜不息而此爲之樞如輪之轂如磑之齊雖欲動而不可得非有意於不動也􅀂太微之在翼天市之在尾攝提之在亢其南距赤道也皆近其北距天極也皆逺則固不容於不動而不免與二十八宿同其運行矣故其或東或西或隠或見各有度數仰而觀之盖無晷刻之或停也今曰是與在紫㣲者皆居其所而爲不動者四則是一天而四樞一輪而四轂一磑而四齊也分寸一移則其輻裂而瓦碎也無日矣􅀂之何而能爲運轉之無窮哉此星家淺事不足􅀷辨然或傳冩之誤則不可以不正也聲律辨五聲之序宫最大而沈濁羽最細而輕清啇之大次宮徴之細次羽而角居四者之中焉然丗之論中聲者不以角而以宫何也曰凡聲陽也自下而上未及其半則屬於隂而未暢故不可用上而及半然後屬於陽而始和故即其始而用之以爲宫因其每變而益上則爲商爲角爲變徴爲徴爲羽爲變宫而皆以爲宫之用焉是以宫之一聲在五行爲􅁟在五常爲信在五事爲思盖以其正當衆聲和與未和用與未用隂陽際㑹之中所以爲盛􅀂角則雖當五聲之中而非衆聲之㑹且以七均論之又有變徴以居焉亦非五聲之所取正也然自其聲之始和者推而上之亦至於變宫而止耳自是以上則又過乎輕清而不可以爲宫於是就其兩間而細分之則其别又十有二以其最大而沈濁者爲黄鍾以其極細而輕清者爲應鍾及其旋相爲宫而上下相生以盡五聲二變之用則宫聲常不越乎十二之中而四聲者或時出於其外以取諸律半聲之管然後七均備而一調成也黄鍾之與餘律其所以爲貴賤者亦然􅀂諸半聲以上則又過乎輕清之甚而不可以爲樂矣盖黄鍾之宫始之始中之中也十律之宫始之次而中少過也應鍾之宫始之終而中已盡也諸律半聲過乎輕清始之外而中之上也半聲之外過乎輕清之甚則又外之外上之上而不可爲樂者也正如子時􅀄四刻屬前日正四刻屬後日其兩日之間即所謂始之始中之中也然則聲自屬隂以下亦當黙有十二正變半律之地以為中聲之前叚如子􅀄四刻之為者但無聲氣之可紀耳由是論之則審音之難不在於聲而在於律不在於宫而在於黄鍾盖不以十二律節之則無以著夫五聲之實不得黄鍾之正則十一律者又無所受以爲本律之宫也今有極論宫聲之妙而無曰黄鍾云者則恐其於聲音法制之間猶有所未盡也夫以聲音法制之粗而猶有未盡則雖有黄帝大舜之君伶倫后䕫之佐亦如之何徒手而可以議大樂之和哉又有為宫當配仁之􅀃者恐亦非是迹其所以盖以仁當四德之元而有包四者之義耳夫仁木行而角聲者也以之配宫則仁旣不安而信亦失據然以為可包四者則不害其有是理也夫五行之序木為之始水為之終而􅁟為之中以河圖洛書之數言之則水一木三而􅁟五皆陽之生數而不可易者也故得以更迭爲主而爲五行之綱以徳言之則木爲發生之性水為貞静之體而􅁟又包育之母也故木之包五行也以其流通貫徹而無不在也水之包五行也以其歸根反本而藏於此也􅀂夫􅁟則水火之所􅀉金木之所資居中而􅀿四方一體而載萬􅀋者也故孔子賛乾之四徳而以貞元舉其終始孟子論人之四端而不敢以信者列序於其間盖以為無適而非此也是則宫之綂五聲仁之包五常盖有並行而不悖者矣何必奪彼以予此然後快於其心哉􅄏阡陌辨漢志言秦廢井田開阡陌􅀃者之意皆以􅄏爲􅄏置之􅄏言秦廢井田而始置阡陌也故白居易云人稀􅁟曠者宜修阡陌戸䌓鄊狹者則復井田盖亦以阡陌爲秦制井田爲古法此恐皆未得其事之實也按阡陌者舊􅀃以為田間之道盖因田之疆畔制其廣狹辨其横從以通人物之徃來即周禮所謂遂上之徑溝上之畛洫上之涂澮上之道也然風俗通云南北曰阡東西曰陌又云河南以東西爲阡南北為陌二􅀃不同今以遂人田畆夫家之數考之則當以後􅀃為正盖陌之爲言百也遂洫從而徑涂亦從則遂間百畆洫間百夫而徑涂為陌矣阡之為言千也溝澮横而畛道亦横則溝間千畆澮間千夫而畛道爲阡矣阡陌之名由此而得至於萬夫有川而川上之路周於其外與夫匠人井田之制遂溝洫澮亦皆四周則阡陌之名疑亦因其横從而命之也然遂廣二尺溝四尺洫八尺澮二㝷則丈有六尺矣徑容牛馬畛容大車涂容乗車一􅁤道二􅁤路三􅁤則㡬二丈矣此其水陸占地不得爲田者頗多先王之意非不惜而虚棄之也所以王經界止侵争時畜洩備水旱爲永乆之計有不得不然者其意深矣商君以其急刻之心行茍且之政但見田爲阡陌所束而耕者限於百畆則病其人力之不盡但見阡陌之占地太廣而不得爲田者多則病其地利之有遺又當丗衰法壊之時則其歸授之際必不免有煩擾欺􅀮之姦而阡陌之地切近民田又必有隂據以自私而稅不入於公上者是以一旦􅁬然不顧盡􅄏阡陌悉除禁限而聽民兼并買賣以盡人力墾闢棄地悉爲田疇而不使其有尺寸之遺以盡地利使民有田即爲永業而不復歸授以絶煩擾欺隠之姦使地皆爲田而田皆出稅以覈隂據自私之幸此其爲計正猶楊炎疾浮戸之弊而遂破租庸以爲兩稅盖一時之害雖除而千古聖賢傳授精㣲之意於此盡矣故秦紀鞅傳皆云爲田開阡陌封疆而賦稅平蔡澤亦曰决裂阡陌以静生民之業而一其俗詳味其言則所謂開者乃破壊剗削之意而非創置建立之名所謂阡陌乃三代井田之舊而非秦之所置矣所謂賦稅平者以無欺隠􅀼據之姦也所謂静生民之業者以無歸授取予之煩也以是數者合而証之其理可見而蔡澤之言􅀹爲明白且先王疆理天下均以予民故其田間之道有經有緯不得無法􅀂秦旣除井授之制矣則随地爲田随田爲路尖斜屈曲無所不可又何必取其東西南北之正以爲阡陌而後可以通徃來哉此又以物情事理推之而益見其說之無疑者或乃以漢丗猶有阡陌之名而疑其出於秦之所置殊不知秦之所開亦其曠僻而非通路者耳􅀂其適當衝要而便於徃來則亦豈得而盡廢之哉但必稍侵削之不使復如先王之舊耳或者又以董仲舒言富者連阡陌而請限民名田疑田制之壊由於阡陌此亦非也盖曰富者一家而兼有千夫百夫之田耳至於所謂商賈無農夫之苦有阡陌之得亦以千夫百夫之􅀵而言盖當是時去古未逺此名尚在而遺迹猶有可考者顧一時君臣乃不能推㝷講究而修復之耳豈不可惜也哉九江彭蠡辨嶓􅃁導􅃞東流爲漢又東爲滄浪之水過三澨至于大别南入于江東匯澤爲彭蠡東爲北江入于海又曰岷山導江東别爲沱又東至于澧過九江至于東陵東迆北㑹于匯東爲中江入于海又曰岷山之陽至于衡山過九江至于敷淺原此皆禹貢之文也古今讀者皆以爲是旣出於聖人之手則固不容復有訛謬萬丗之下但當尊信誦習傳之無窮亦無以覈其事實是否爲也是以爲之說者不過随文解義以就章句如說九江則曰江過㝷陽派别爲九或曰有小江九北來注之說彭蠡則曰漢水所匯而江水亦徃㑹焉說北江中江則曰漢旣淮而出爲北江江旣㑹而出爲中江也說九江則但指今日江州治所以當之􅀃敷淺原則但以爲漢歴陵縣之􅀓易山在今日爲江州之徳安縣而巳如是而言姑爲誦􅀃則可矣􅀂以山川形􅀔之實考之吾恐其說有所不通而不能使人無所疑也􅀂曰派别爲九則江流上下洲渚不一今所計以爲九者􅀂必首尾短長均布􅀂一則横斷一節縱别爲九一水之間當有一洲九江之間沙水相間乃爲十有七道於地將無所容􅀂曰參差取之不必齊一則又不知斷自何許而數其九也況洲渚岀􅃿其􅀔不常江陵先有九十九洲後乃復生一洲是豈可以爲地理之定名乎此不可通之妄說也若曰旁計横入小江之數則自岷山以東至入海處不知其當爲㡬十百江矣此又不可通之妄􅀃也且經又言九江孔殷正以見其吐吞壮盛浩無津涯之􅀔决非㝷常分􅂀小江之可當又繼此而後及夫沱潜雲夣則又見其决非今日江州甚逺之下流此又可以證前二􅀃者爲不可通之妄􅀃也􅀂曰漢水匯爲彭蠡而江水亦徃㑹焉則彭蠡之爲澤也實在大江之南自今江州湖口縣南跨南康軍饒州之境以接于􅂭興府之北瀰漫數十百里其源則東自饒徽信州建昌軍南自贑州南安軍西自􅀽筠以至隆興分寕諸邑方數千里之水皆㑹而歸焉北過南康􅀭瀾左里則兩岸漸迫山麓而湖靣稍狹遂東北流以趨湖口而入于江矣然以地􅀔北髙而南下故其入于江也反爲江水所遏而不得遂因郤而自豬以爲是瀰漫數十百里之大澤是則彭蠡之所以爲彭蠡者􅀄非有所仰於江漢之匯而後成也不唯無所仰於江漢而衆流之積日遏日髙􅀔亦不復容江漢之來入矣又況漢水自漢陽軍大别山下南流入江則其水與江混而爲一至此巳七百餘里矣今謂其至此而後一先一後以入于彭蠡旣匯之後又復循次而出以爲二江則其入也何以識其爲昔日之漢水而先行何以識其爲昔日之江水而後㑹其出也何以識其爲昔日之漢水而今分以之北何以識其爲昔日之江水而今分以居中耶且以方言之則冝曰南㑹而不應曰北㑹以實計之則湖口之東今但見其爲一江而不見其分流然則所謂漢水匯爲彭澤而江水亦徃㑹焉者亦不可通之妄說也此數說者旣無一之不窮於是味别洲别之論出焉而終亦不免於窮也盖曰味别則不知凡禹之所爲過門不入胼手胝足而不以爲病者爲欲大濟天下昏墊之民使得平土而居以衣且食而遂其生􅁘抑如陸羽張又新軰但欲較計毫分於齒頰間以爲茗飲一時之快也嗚呼彼以是而爲􅀃者亦可謂童騃不思之甚矣且河之所㑹􅃮沮涇渭伊洛􅗉澗支川􅀹多而􅀄無味别之􅀃濟之所經或潜或見或止或流其變不一而􅀄無味别之􅀃何獨至此而辨之􅀂是悉耶此又可見其爲不通之妄說也􅀂曰洲别則又九江之鑿吾旣辨於前矣􅀂果如此則漢水入江之後便湏常有一洲介於其間以爲江漢之别而湖口入匯之處又當各分爲二以爲出入之辨而後可也今皆無之而湖口横度之處予常過之但見舟北爲大江之濁流舟南爲彭蠡之清漲而巳盖彭蠡之水雖限於江而不得􅂥然及其旣平則亦因其可行之􅂩而又未嘗不相持以東也惡暏所謂中江北江之别乎此又可見其爲不通之妄說也􅀂曰古之九江即今之江州古之敷淺原即今之徳安縣則漢九江郡本在江北而今所謂江州者寔武昌郡之柴桑縣後以江北之㝷陽并柴桑而立郡又自江北徙治江南故江南得有㝷陽之名後又因㝷陽而改爲江州實非古九江地也又况經言過九江至于東陵而後㑹于彭蠡則自今江州城下至湖口縣才四十里不知東陵的在何處何所表異而其志之䌓宻促數乃如此又曰過九江至於敷淺原則巳自江州順流東下湖口又復泝流南上彭蠡百有餘里而後至焉亦何􅀃哉此又不可通之妄說也至於今之所謂敷淺原者爲山甚小而􅋻不足以有所表見而其全體正脉遂起而爲廬阜則甚髙且大以盡乎大江彭蠡之交而所以識夫衡山東過一支之所極者唯是乃爲冝耳今皆反之則吾恐其山川之名古今或異而傳者未必得其真也凢此差舛其􅁼不一讀而不思思而不考者旣昏憒鹵莾而無足言矣其間亦有心知其誤而口不敢言乃反爲之遷就穿鑿以盖其失者則其巧愈甚而其謬愈彰使有識之士讀之愈疑而愈不敢信唯國􅀄胡秘􅁥旦近世晁詹事說之皆以九江爲洞庭則其援證皆極精慱而莆田鄭樵漁仲獨謂東匯澤爲彭蠡東爲北江入于海十三字爲衍文亦爲得之予旣目睹彭蠡有原兩江不分之實又參之以此三說者而深以事理情􅀔求之然後果得其所以誤也盖洪水之患唯河爲甚而兖州乃其中流水曲而流緩地平而􅁟踈故河之患於此爲􅀹甚是以作治之功十有三載然後同於諸州􅀼計當時唯此等處事急民困􅀔重􅟕煩禹乃親涖而身督之不可一日而舎去􅀂梁雍荆􅀭地偏水急不待䟽鑿固巳通行則分遣官屬徃而視之其亦可也况洞庭彭蠡之間乃三苗氏之所居當是之時水澤山林深昧不測彼方􅀒其險阻頑不即工則官屬之徃者固未必遽敢􅀷入其境是以但見彭蠡之爲澤而不知其源之甚遠而且多但見洞庭下流之巳爲江而不知其中流之常爲澤而甚廣也以此致誤宜無足恠􅀂其用字之同異則經之凢例亦自可考顧讀者未􅀷思耳今但刪去東匯北江之衍字而正以洞庭爲九江更以經之凢例通之則過九江至於東陵者言導岷山之水而是水之流横截乎洞庭之口以至東陵也是漢水過三澨之例也過九江至于敷淺原者言導岷陽之山而導山之人至于衡山之麓遂越洞庭之尾東取山路以至乎敷淺原也是導岍岐荆山而逾于河以盡常碣之例也以是觀之則經之文意不亦旣明矣乎􅀂更以它書考之則山海經云廬江出三天子都本注云一作鄣今按丹陽故爲鄣郡其得名盖以此則作鄣爲是入江彭澤西本注云彭澤今彭蠡也在鄱陽彭澤縣漢志亦云廬江出陵陽東南北入江盖陵陽者丹陽之屬縣今寕國府旌徳縣有陵陽山而三天子都乃在徽饒之境疑與陵陽腹背相直故廬江者得出其東南而西流北折以爲鄱餘二水遂以㑹于彭蠡而入于江也及其入江則廬山屹立乎其西南而江之北岸即爲郡之南境疑江與山盖相因以得名而郡境雖在江北亦以其南直此江此山而名之也然則彭蠡安得爲無原而必待漢匯江㑹而成㢤漢志豫章爲郡領縣十八其彭蠡縣下注云禹貢彭蠡澤在西其餘則言水入湖漢者八鄱陽鄱水餘干餘水艾脩水􅂗淦水南城旴水建成蜀水宜春南水南壄彭水入大江者一贑豫章水而湖漢一水則又自雩都東至彭澤入江行千九百八十里也按今地􅀔彭蠡既與江通而豫章諸水不由彭蠡别無入江之路則湖漢者即是彭蠡而其所受衆水之原又不止於廬江而巳也以此而觀則山海經之言猶有未盡且其曰入江彭澤西者本謂逕彭蠡縣之西而入江耳而語意不明遂􅀂析江與澤各爲一水而一東一西以入江者此亦其立言之疵也漢志又自不知湖漢之即爲彭蠡而兩言之又不知入大江者亦必豬于彭蠡而别爲一例又不知湖漢之爲湖正以其澤名之而復兼以漢稱則又承禹貢之誤而弗深考也至於雩都之水則但見其爲一郡衆流之最逺者而遂推爲湖漢之源以主其名則又不知湖漢之名􅀄非一水必自隆興以北衆水皆㑹豬為大澤然後可以名之非雩都一水所可得而專也至如鄭漁仲漢水衍文之􅀃固善矣而其下文江水東迤北㑹于匯東爲中江入于海之數言似亦可疑而彼猶未能盡正也嗚呼禹貢所載者九州之山川吾之足迹未能遍乎荆揚而見其所可疑者巳如此不知耳目見聞之所不及所可疑者又當㡬何是固不可得而知矣至於經之凢例本自明白而諸儒乃有過為新竒之􅀃以亂之者􅀂論導山而逾于河而以為導岍岐荆山之脉使之度河以為壼口諸山之􅀋則亦不待聞見之及而知其謬矣夫禹之治水隨山刋木其所表識諸山之名必其高大可以辨疆域廣􅀶可以奠民居故謹而書之以見其施功之次第􅀄非有意推其脉絡之所自來􅀂今論葬法者之所言也􅀂必寔以山脉言之則亦自有可言而􅀹足以見其􅀃之謬者盖河北諸山本根脊脉皆自代北寰武嵐憲諸州乗高而來其脊以西之水則西流以入龍門西河之上流其脊以東之水則東流而爲桑乾道幽冀以入于海其西一支爲壼口太岳次一支包汾􅀳之源而南岀以爲析城王屋而又西折以爲雷首又次一支乃爲大行又次一支乃爲常山其間各隔沁潞諸川不相連屬豈自岍岐跨河東度而反爲是諸山哉􅀂過九江至于敷淺原亦有襲其謬者以爲衡山之脉東度而來則以見聞所及而知其必不然也盖岷山之脉其一支爲衡山者巳盡於九江之西其一支又南而東度桂嶺者則包湘原而北徑潭􅀽之境以盡於廬阜其一支又南而東度大􅁃者則包彭蠡之原以北至乎建康其一支則又東包浙江之原而北其首以盡于㑹稽南其尾以盡乎閩越也豈衡山之脉能度九江而其度也又直爲敷淺原而巳哉又有欲以􅀭州之三江即爲荆州之中江北江而猶病其闕一乃顧彭蠡之餘波適未有號則姑使之潜冐南江之名以足之且又自謂聖經書法之妙非它人之所及是亦極巧而且新矣然自湖口而下江本無二安得有三且於下文之震澤又懸隔遼夐而不相属也則又安能曲􅀃而彊附之哉問諸吳人震澤下流實有三江以入于海彼旣以目驗之恐其􅀃之必可信而於今尚可考也因并論之以俟來者有以質焉皇極辨洛書九數而五居中洪範九疇而皇極居五故自孔氏傳訓皇極爲大中而諸儒皆祖其􅀃余獨嘗以經之文義語脉求之而有以知其必不然也蓋皇者君之稱也極者至極之義標凖之名常在物之中央而四外望之以取正焉者也故以極爲在中之凖的則可而便訓極爲中則不可􅀂北辰之爲天極脊棟之爲屋極其義皆然而禮所謂民極詩所謂四方之極者於皇極之義爲􅀹近顧今之􅀃者旣誤於此而并失於彼是以其􅀃展轉迷繆而終不能以自明也即如舊􅀃姑亦無問其它但即經文而讀皇爲大讀極爲中則夫所謂惟大作中大則受之爲何等語乎今以余􅀃推之則人君以眇然之身履至尊之位四方輻湊靣内而環觀之自東而望者不過此而西也自南而望者不過此而北也此天下之至中也旣居天下之至中則必有天下之純徳而後可以立至極之標凖故必順五行敬五事以脩其身厚八政恊五紀以齊其政然後至極之標凖卓然有以立乎天下之至中使夫面内而環􅀚者莫不於是而取則焉語其仁則極天下之仁而天下之爲仁者莫能加也其孝則極天下之孝而天下之爲孝者莫能尚也是則所謂皇極者也由是而權之以三徳審之以卜筮驗其休咎於天考其禍福於人如挈裘領豈有一毛之不順哉此洛書之數所以雖始於一終於九而必以五居其中洪範之疇所以雖本於五行究於福極而必以皇極爲之主也􅀂箕子之言有曰皇建其有極云者則以言夫人君以其一身而立至極之標凖於天下也其曰歛時五福用敷錫厥庶民云者則以言夫人君能建其極則爲五福之􅀁聚而又有以使民觀感而化焉則是又能布此福而與其民也其曰惟時厥庶民于汝極錫汝保極云者則以言夫民視君以爲至極之標凖而從其化則是復以此福還錫其君而使之長爲至極之標凖也其曰凡厥庶民無有􅁋朋人無有比德惟皇作極云者則以言夫民之􅀁以能有是德者皆君之德有以爲至極之標凖也其曰凡厥庶民有猷有爲有守汝則念之不恊于極不罹于咎皇則受之云者則以言夫君旣立極於上而下之從化或有淺深遲速之不同其有謀者有才者有德者人君固當念之而不忘其或未能盡合而未抵乎大戾者亦當受之而不拒也其曰而康而色曰予攸好德汝則錫之福時人斯其惟皇之極云者則以言夫人之有能革靣從君而以好德自名則雖未必出於中心之實人君亦當因其自名而與之以善則是人者亦得以君爲極而勉其實也其曰無虐煢獨而畏高明人之有能有爲使羞其行而邦其昌云者則以言夫君之於民一視同仁凡有才能皆使進善則人材衆多而國賴以興也其曰凡厥正人旣富方榖汝弗能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎云者則以言夫凡欲正人者必先有以富之然後可以納之於善􅀂不能使之有􅀁賴於其家則此人必將陷於不義至其無復更有好德之心而後始欲教之以脩身勸之以求福則已無及於事而其起以報汝唯有惡而無善矣蓋人之氣禀或清或濁或純或駁有不可以一律齊者是以聖人所以立極乎上者至嚴至密而所以接引乎下者至寛至廣雖彼之所以化於此者淺深遲速其效或有不同而吾之所以應於彼者長養􅆂育其心未嘗不一也其曰無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極云者則以言夫天下之人皆不敢狥其巳之􅀻以從乎上之化而㑹歸乎至極之標凖也蓋偏陂好惡者巳􅀻之生於心者也偏黨反側者巳􅀻之見於事者也王之義王之道王之路上之化也所謂皇極者也遵義遵道遵路方㑹其極也蕩蕩平平正直則巳歸于極矣其曰皇極之敷言是􅃔是訓于帝其訓云者則以言夫人君以身立極而布命于下則其所以爲常爲教者皆天之理而不異乎上帝之降􅂨也其曰凢厥庶民極之敷言是訓是行以近天子之光云者則以言夫天下之人於君所命皆能受其教而謹行之則是能不自絶逺而有以親􅀍其道徳之光華也其曰曰天子作民父母以爲天下王云者則以言夫人君能立至極之標凖所以能作億兆之父母而爲天下之王也不然則有其位無其徳不足以首出庶物統御人群而履天下之極尊矣是書也原於天之所以錫禹雖其茫昩幽眇有不可得而知者然箕子之所以言之而告武王者則巳備矣顧其詞之宏深奥雅􅀂有未易言者然嘗試虚心平氣而再三反復焉則亦坦然明白而無一字之可疑但先儒未嘗深求其意而不察乎人君所以脩身立道之本是以誤訓皇極爲大中又見其詞多爲含洪寛大之言因復誤認中爲含胡苟且不分善惡之意殊不知極雖居中而非有取乎中之義且中之爲義又以其無過不及至精至當而無有毫􅁵之差亦非如其所指之云也乃以誤認之中爲誤訓之極不謹乎至嚴至密之體而務爲至寛至廣之量其弊將使人君不知脩身以立政而墮於漢元帝之優游唐代宗之姑息卒至於是非顚倒賢否貿亂而禍敗隨之尚何歛福錫民之可望哉嗚呼孔氏則誠誤矣然迹其本心亦曰姑以隨文解義爲口耳佔畢之計而巳不知其禍之至此也而自漢以來迄今千有餘年學士大夫不爲不衆更歷世變不爲不多幸而遺經尚存本文可考其出於人心者又不可得而昧也乃無一人覺其非是而一言以正之者使其患害流于萬世是則豈獨孔氏之罪哉予於是竊有感焉作皇極辨馮當可字時行蜀人慱學能文其集中有封事云願陛下逺便佞踈近習清心寡欲以臨事變此興事造業之根本洪範所謂皇建其有極者也其論皇極深合鄙意然則予前所謂千有餘年無一人覺其繆而正之者亦近誣矣但專經之士無及之者而文士反能識之豈汩没傳注者不免於因陋踵訛而平心誦味者有時而得之文字之外耶慶元丙辰臘月甲寅東齋南䆫記尹和静手筆辨伊川先生曰某在何必看此書􅀂不得某之心只是記得它意豈不有差旣云某在不必看則先生不在之時語録固不可廢矣不得先生之心而徒記巳意此亦學者所當慱學審問精思而明辨之不可以一詞之失而盡廢其餘也但先生在則可以式瞻儀刑親受音㫖自是不必看耳然讀焉而質其疑於先生豈不益有助於發明哉如楊遵道録中記李端伯録至大至剛以直之論􅀂使遵道於此廢而不觀存而不論則亦無以决此語之得失矣伊川所以告和靖者蓋就其力量所至而語之惜乎其不復致疑於此而􅃍誦以終身也所見有淺深故所記有工拙失其意者不假一二言也淺拙而失其意者固不足觀矣其見深其記工而得其意者豈可以彼之失而􅃍廢之哉如世傳史評之􅀋皆非先生所著史評固非先生所著但當論辨以曉學者不可因此并廢語録也紹興􅀄士大夫頗以伊川語録資誦􅀃言事者直以狂恠􅁋鄙詆之蓋難力辨也以語録資誦􅀃者當時士大夫之罪以狂恠􅁋鄙詆之當時言事者之失非語録使然也今悪當時士大夫畏當時言事者而諱語録以爲不足觀是旣􅂇言者以自攻而又無以服當時學者之心也豈不誤哉掇同門所記僅數十端示之愚嘗讀此書矣􅀋多解釋經義之言􅀂程氏之學止於如此則亦無以繼孔孟不傳之緒矣前輩言學欲慱不欲雜欲約不欲陋誠有味哉伊川之學在易傳不必它求也孔子刪詩定書繋周易作春秋而其徒又述其言以爲論語其言反復證明相爲表裏未聞其以此而廢彼也易傳所自作也語録它人作也人之意它人能道者㡬何哉如是則孔氏之門亦可以專治春秋而遂廢論語矣而可乎伊川先生爲中庸解疾革命焚於前門人問焉伊川先生曰某有易傳在足矣何以多爲嘗見别本記或問和靖據語録先生自言中庸巳成書今其書安在和靖曰先生自以爲不滿意而焚之矣此言恐得其眞􅀂無所不滿於其意而專恃易傳逆廢中庸吾恐先生之心不如是之隘也雜學辨何叔京䟦語附蘇氏易解乾之􅂏辭發明性命之理與詩烝民維天之命書湯誥大誓中庸孟子相表裏而大傳之言亦􅀂符契蘇氏不知其􅀃而欲以其所臆度者言之又畏人之指其失也故每爲不可言不可見之􅀃以先後之務爲閃倐滉􅃞不可捕捉之形使讀者茫然雖欲攻之而無所措其辨殊不知性命之理甚明而其爲􅀃至簡今將言之而先曰不可言旣指之而又曰不可見足以眩夫未嘗學問之庸人矣由學者觀之豈不適所以爲未嘗見未嘗知之驗哉然道衰學絶世頗惑之故爲之辨以待後之君子而其它言死生􅀑神之不合者亦并附焉大哉乾元萬物資始乃統天蘇曰此論元也元之爲德不可見也所可見者萬物資始而巳天之德不可勝言也惟是爲能統之愚謂四德之元猶四時之春五常之仁乃天地造化發育之端萬物之所從出故曰萬物資始言取其始於是也存而察之心目之間躰叚昭然未嘗不可見也然惟知道者乃能識之是以蘇氏未之見耳不知病此顧以巳之不見爲當然而謂眞無可見之理不亦惑之甚與雲行􅀨施品物流形蘇曰此所以爲亨也大明終始六位時成時乗六龍以御天蘇曰此所以爲利也愚謂此言聖人體元亨之用非言利也乾道變化各正性命保合大和蘇曰此所以爲貞也愚謂此兼言利貞而下句結之也乃利貞蘇曰并言之也愚謂此結上乾道變化各正性命保合大和之文與大明終始六位時成時乗六龍以御天不相􅀩蘇氏之􅀃亦誤矣蘇曰正直也方其變化各之於情無所不至反而循之各直其性以至於命此所以爲貞也愚謂品物流形莫非乾道之變化而於其中物各正其性命以保合其大和焉此乾之所以爲利且貞也此乃天地化育之源不知更欲反之於何地而又何性之可直何命之可至乎􅀂如其􅀃則保合大和一句無所用矣蘇曰古之君子患性之難見也故以可見者言性以可見者言性皆性之似也愚謂古之君子盡其心則知其性矣未嘗患其難見也其言性也亦未嘗不指而言之非但言其似而巳也且夫性者又豈有一物似之而可取此以况彼耶然則蘇氏所見殆徒見其似者而未知夫性之未嘗有所似也蘇曰君子日修其善以消其不善不善者日消有不可得而消者焉小人日修其不善以消其善善者日消有不可得而消者焉夫不可得而消者堯舜不能加焉桀紂不能逃焉是則性之所在也又曰性之所在庶㡬知之而性卒不可得而言也愚謂蘇氏此言最近於理前章所謂性之所似殆謂是耶夫謂不善日消而有不可得而消者則疑􅀂謂夫本然之至善矣謂善日消而有不可得而消者則疑􅀂謂夫良心之萌蘖矣以是爲性之所在則似矣而蘇氏􅀄不知性之所自來善之所從立則其意似不謂是也特假於浮屠非幻不㓕得無所還者而爲是􅀃以幸其萬一之或中耳是將不察乎繼善成性之所由梏亡反覆之所害而謂人與犬牛之性無以異也而可乎夫其所以重歎性之不可言蓋未甞見所謂性者是以不得而言之也蘇曰聖人以爲猶有性者存乎吾心則是猶有是心也有是心也僞之始也於是又推其至者而假之曰命命令也君之命曰令天之令曰命性之至者非命也無以名之而􅀉之命耳愚謂蘇氏以性存於吾心則爲僞之始是不知性之眞也以性之至者非命而假名之是不知命之實也如此則是人生而無故有此大僞之本聖人又爲之計度隱諱僞立名字以彌縫之此何理哉此蓋未嘗深考夫大傳詩書中庸孟子之􅀃以明此章之義而溺於釋氏未有天地巳有此性之言欲語性於天地生物之前而患夫命者之無所􅀉於是爲此􅀃以處之使兩不相病焉耳使其誠知性命之􅀃矣而欲語之於天地生物之前蓋亦有道必不爲是支離􅁋遁之辭也蘇曰死生壽夭無非命者未嘗去我也而我未嘗覺知焉聖人之於性也至焉則亦不自覺知而巳矣此以爲命也又曰命之與性非有天人之辨也於其不自覺知則謂之命愚謂如蘇氏之􅀃則命無所容命無所容則聖人所謂至命者益無地以處之故爲是􅀃以自迷罔又以罔夫世之不知者而巳豈有命在我而不自覺知而可謂之聖人哉蘇氏又引文言利貞性情之文􅀓㑹其􅀃皆非經之本㫖今不復辨首出庶物萬國咸寜蘇氏云云愚謂此言聖人體利貞之德也蘇氏􅀃無病然其於章句有未盡其􅀃者一隂一陽之謂道繼之者善也成之者性也蘇曰隂陽果何物哉雖有婁曠之聦明未有能得其髣髴者也隂陽交然後生物物生然後有象象立而隂陽隱凢可見者皆物也非隂陽也然謂隂陽爲無有可乎雖至愚知其不然也物何自生哉是故指生物而謂之隂陽與不見隂陽之髣髴而謂之無有皆惑也愚謂隂陽盈天地之間其消息闔闢終始萬物觸目之間有形無形無非是也而蘇氏以爲象立而隂陽隱凢可見者皆物也非隂陽也失其理矣逹隂陽之本者固不指生物而謂之隂陽亦不别求隂陽於物象見聞之外也蘇曰聖人知道之難言也故借隂陽以言之曰一隂一陽之謂道一隂一陽者隂陽未交而物未生之謂也喻道之似莫密於此者矣隂陽一交而生物其始爲水水者無有之際也始離於無而入於有矣老子識之故其言曰上善􅀂水又曰水㡬於道聖人之德雖可以名而不囿於一物􅀂水之無常形此善之上者㡬於道矣而非道也􅀂夫水之未生隂陽之未交廓然無一物而不可謂之無有此眞道之似也愚謂一隂一陽往來不息舉道之全體而言莫著於此者矣而以爲借隂陽以喻道之似則是道與隂陽各爲一物借此而况彼也隂陽之端動靜之機而巳動極而靜靜極而動故隂中有陽陽中有隂未有獨立而孤居者此一隂一陽所以爲道也今曰一隂一陽者隂陽未交而物未生廓然無一物不可謂之無有者道之似也然則道果何物乎此皆不知道之所以爲道而欲以虚無寂㓕之學揣摸而言之故其􅀃如此蘇曰隂陽交而生物道與物接而生善物生而隂陽隱善立而道不見矣故曰繼之者善也成之者性也仁者見道而謂之仁智者見道而謂之智夫仁智聖人之所謂善也善者道之繼而指以爲道則不可今不識其人而識其子因之以見其人則可以謂其人則不可故曰繼之者善也學道而自其繼者始則道不全愚謂繼之者善言道之所出無非善也所謂元也物得是而成之則各正其性命矣而所謂道者固自􅀂也故率性而行則無往而非道此所以天人無二道幽明無二理而一以貫之也而曰隂陽交而生物道與物接而生善物生而隂陽隱善立而道不見善者道之繼而巳學道而自其繼者始則道不全何其言之繆耶且道外無物物外無道今曰道與物接則是道與物爲二截然各据一方至是而始相接也不亦繆乎蘇曰昔者孟子以爲性善以爲至矣讀易而後知其未至也孟子之於性蓋見其繼者而巳矣夫善性之效也孟子未及見性而見其性之效因以所見者爲性猶火之能熟物也吾未見火而指天下之熟物以爲火夫熟物則火之效也愚謂孟子道性善蓋探其本而言之與易之㫖未始有毫髪之異非但言性之效而巳也蘇氏急於立􅀃非特不察於易又不及詳於孟子故其言之悖如此蘇曰敢問性與道之辨曰難言也可言其似道之似則聲也性之似則聞也有聲而後聞耶有聞而後聲耶是二者果一乎果二乎孔子曰人能弘道非道弘人又曰神而明之存乎其人性者所以爲人者也非是無以成道矣愚謂子思子曰率性之謂道邵子曰性者道之形體也與大傳此章之㫖相爲終始言性與道未有􅀂此言之著者也蘇氏之言曲譬巧喻欲言其似而不可得豈􅀂聖賢之言直示而無隱耶昔孔子順謂公孫龍之辨㡬能令臧三耳矣然謂兩耳者甚易而實是也謂三耳者甚難而實非也將從其易而是者乎將從其難而非者乎此言似之矣仁者見之謂之仁知者見之謂之智百姓日用而不知故君子之道鮮矣蘇曰屬目於無形者或見其意之所存故仁者以道爲仁意存乎仁也知者以道爲智意存乎智也賢者存意而妄見愚者日用而不知是以君子之道成之以性者鮮矣愚謂蘇氏不知仁智之根於性顧以仁智爲妄見乃釋老之􅀃聖人之言豈嘗有是哉謂之不見其全則或可矣又曰君子之道成之以性者鮮矣文義亦非原始反終故知死生之􅀃蘇曰人所以不知死生之􅀃者駭之耳原始反終使之了然而不駭也愚謂人不窮理故不知死生之􅀃不知死生之􅀃故不能不駭於死生之變蘇氏反謂由駭之而不知其􅀃失其指矣窮理者原其始之所自出則知其所以生反其終之所於歸則知其所以死夫如是凡所以順生而安死者蓋有道矣豈徒以了然不駭爲竒哉蘇氏於原始反終言之甚略無以知其所謂然以不駭云者驗之知其溺於坐亡立化去來自在之􅀃以爲竒而於聖人之意則昧矣精氣爲物遊䰟爲變是故知􅀑神之情狀蘇曰物􅀑也變神也􅀑常與體魄俱故謂之物神無適而不可故謂之變精氣爲魄魄爲􅀑志氣爲魂魂爲神故禮曰體魄則降志氣在上鄭子産曰其用物也弘矣其取精也多矣古之逹者巳知此矣一人而有二知無是道也然而有魄者有魂者何也衆人之志不出於飲食男女之間與凡飬生之資其資厚者其氣彊其資約者其氣㣲故氣勝志而爲魄聖賢則不然以志一氣清明在躬志氣如神雖禄之天下窮至匹夫無所損益也故志勝氣而爲魂衆人之死爲􅀑而聖人爲神非有二致也志之所在者異也愚謂精聚則魄聚氣聚則魂聚是以爲人物之體至於精竭魄降則氣散魂逰而無不之矣降者屈而無形故謂之􅀑遊者伸而不測故謂之神人物皆然非有聖愚之異也孔子答宰我之問言之詳矣蘇氏蓋不考諸此而失之子産之言是或一道而非此之謂也蘇黃門老子解蘇侍郎晚爲是書合吾儒於老子以爲未足又并釋氏而彌縫之可謂舛矣然其自許甚髙至謂當世無一人可與語此者而其兄東坡公亦以爲不意晚年見此竒特以予觀之其可謂無忌憚者與因爲之辨而或者謂蘇氏兄弟以文義贊佛乗蓋未得其所謂如傳燈録解之屬其失又有甚焉不但此書爲可辨也應之曰予之所病病其學儒之失而流於異端不病其學佛未至而溺於文義也其不得巳而論此豈好辯哉誠懼其亂吾學之傳而失人心之正耳􅀂求諸彼而不得其􅀃則予又何暇知焉蘇曰孔子以仁義禮樂治天下老子絶而棄之或者以爲不同易曰形而上者謂之道形而下者謂之器愚謂道器之名雖異然其實一物也故曰吾道一以貫之此聖人之道所以爲大中至正之極亘萬世而無弊者也蘇氏誦其言不得其意故其爲􅀃無一辭之合學者於此先以予􅀃求之使聖人之意䁱然無疑然後以次讀蘇氏之言其得失判然矣孔子之慮後世也深故示人以器而晦其道愚謂道器一也示人以器則道在其中聖人安得而晦之孔子曰吾無隱乎爾然則晦其道者又豈聖人之心哉大抵蘇氏所謂道者皆離器而言不知其指何物而名之也使中人以下守其器不爲道之所眩以不失爲君子愚謂如蘇氏此言是以道爲能眩人而使之不爲君子也則道之在天下適所以爲斯人之禍矣而中人以上自是以上逹也愚謂聖人所謂逹兼本未精粗而一以貫之也蘇氏之所謂逹則舎器而入道矣老子則不然志於明道而急於開人心愚謂老子之學以無爲爲宗果如此言乃是急急有爲惟恐其緩而失之也然則老子之意蘇氏亦有所不能窺者矣故示人以道而薄於器以爲學者惟器之知則道隱矣故絶仁義棄禮樂以明道愚謂道者仁義禮樂之緫名而仁義禮樂皆道之體用也聖人之脩仁義制禮樂凡以明道故也今曰絶仁義棄禮樂以明道則是舎二五而求十也豈不悖哉夫道不可言可言者皆其似者也逹者因似以識眞而昧者執似以䧟於僞愚謂聖人之言道曰君臣也父子也夫婦也昆弟也朋友之交也不知此言道邪抑言其似者而巳耶執此而行亦有所䧟者耶然則道豈眞不可言但人自不識道與器之未嘗相離也而反求之於昏黙無形之中所以爲是言耳故後世執老子之􅀃以亂天下者有之而學孔子者無大過愚謂善學老子者如漢文景曹參則亦不至亂天下如蘇氏之􅀃則其亂天下也必矣學孔子者所得亦有淺深有過無過未可槩論且如蘇氏非不讀孔子之書而其著書立言以惑悞天下後世如此謂之無過其可得乎因老子之言以逹道者不少而求之於孔子者常苦其無所從愚謂因老子之言以逹道者不少不知指謂何人如何其逹而所逹者何道也且曰不少則非一二人而巳逹道者果如是之衆耶孔子循循善誘誨人不倦入徳之途坦然明白而曰常苦其無所從入則其未嘗一日從事於此不得其門而入可知矣宜其析道與器而以仁義禮樂爲無與於道也然則無所從入之言非能病孔子之道而絶學者之志乃所以自狀其不知道而妄言之實耳二聖人者皆不得巳也愚謂以孔子老聃並􅁛聖人可乎世人譏太史公先黄老後六經然太史公列孔子於世家而以老子與韓非同傳豈不有微意焉其賢於蘇氏逺矣全於此必略於彼矣愚謂有彼有此則天下常有二道也蘇氏後序云六祖所云不思善不思惡即喜怒哀樂之未發也愚謂聖賢雖言未發然其善者固存但無惡耳佛者之言似同而實異不可不察又云蓋中者佛性之異名而和者六度萬行之緫目也愚謂喜怒哀樂而皆中節謂之和而和者天下之逹道也六度萬行吾不知其所謂然毁君臣絶父子以人道之端爲大禁所謂逹道固如是耶又云天下固無二道而所以治人則異君臣父子之間非禮法則亂知禮法而不知道則世之俗儒不足貴也居山林木食澗飲而心存至道雖爲人天師可也而以之治世則亂古之聖人中心行道而不毁世法然後可耳愚謂天下無二道而又有至道世法之殊則是有二道矣然則道何所用於世而世何所資於道耶王氏有髙明處巳中庸處人之論而􅀛山楊公以爲如此則是道常無用於天下而經世之務皆􅀻智之鑿愚於蘇氏亦云張無垢中庸解無垢本佛語而張公子韶侍郎之别號也張公以佛語釋儒書其跡􅀹著故正其名如此張公始學於􅀛山之門而逃儒以歸於釋旣自以爲有得矣而其釋之師語之曰左右旣得欛柄入手開導之際當改頭換靣隨冝􅀃法使殊􅂗同歸則世出世間兩無遺恨矣然此語亦不可使俗輩知將謂實有恁麽事也見大慧禪師與張侍郎書今不見於語録中蓋其徒諱之也用此之故凡張氏所論著皆陽儒而隂釋其離合出入之際務在愚一世之耳目而使之恬不覺悟以入乎釋氏之門雖欲復出而不可得本末指意略如其所受於師者其二本殊歸蓋不特莊周出於子夏李斯原於荀卿而巳也竊不自揆嘗欲爲之論辨以曉當世之惑而大本旣殊無所不異因覽其中庸􅀃姑掇其􅀹甚者什一二著于篇其他如論語孝經大學孟子之􅀃不暇遍爲之辨大抵忽􅃍急迫其所以爲􅀃皆此書之􅀋也天命之謂性率性之謂道脩道之謂教張云天命之謂性第贊性之可貴耳未見人收之爲巳物也率性之謂道則人體之爲巳物而入於仁義禮智中矣然而未見其施設運用也脩道之謂教則仁行於父子義行於君臣禮行於賔主知行於賢者而道之等降隆殺於是而見焉愚謂天命之謂性言性之所以名乃天之所賦人之所受義理之本原非但贊其可貴而巳性亦何待於人贊其貴耶董子曰命者天之令也性者生之質也此可謂庶㡬子思之意而異乎張氏之言矣且旣謂之性則固巳自人所受而言之今曰未爲巳物則是天之生是人也未以此與之而置之他所必是人者自起而收之而後得以爲已物也不知未得此性之前其爲人也孰使之呼吸食息於天地之間以收此性且夫性者又豈塊然一物寓於一處可摶而置之軀殻之中耶仁義禮智性之所有與性爲體者也今曰體爲巳物然後入於仁義禮智之中則是四者逆設於此而後性來於彼也不知方性之未入也是四者又何自而來哉凡此皆不知大本妄意穿鑿之言智者觀之亦不待盡讀其書而是非邪正巳判於此章矣仁行於父子義行於君臣是乃率性之道而遽以爲脩道之教亦失其次序矣是故君子戒愼乎其所不睹止愼其獨也張云不睹不聞少致其忽宜􅀂無害矣然而怠忽之心巳顯於心目之間云云不足以感人動物而招非意之辱莫爲之禍焉此君子所以愼其獨也愚謂君子所以愼其獨者非爲恐招禍辱而已也今曰不睹不聞之間少致其忽􅀄無所害特恐招禍辱而後愼其獨焉非知道者之言也喜怒哀樂之未發謂之中張云未發以前戒愼恐懼無一毫􅀻欲愚謂未發以前天理渾然戒愼恐懼則旣發矣君子中庸張云方率性時戒愼恐懼此學者之事也及其深入性之本原直造所謂天命在我然後爲君臣父子兄弟夫婦之教以幸於天下至於此時聖人之功用興矣愚謂率性之謂道言道之所以得名者如此蓋曰各循其性之本然即所謂道爾非以此爲學者之事亦未有戒愼恐懼之意也脩道之謂教通上下而言之聖人所以立極賢人所以脩身皆在於此非如張氏之􅀃也又曰深入性之本原直造所謂天命在我理亦有礙且必至此地然後爲人倫之教以幸天下則是聖人未至此地之時未有人倫之教而所以至此地者亦不由人倫而入也凡此皆爛漫無根之言乃釋氏之緒餘非吾儒之本指也張云率性之謂道未離本位脩道之謂教不可以離不離名之也愚謂言性有本位則性有方所矣聖賢言性似不如此假如其􅀃則前章云率性所以求中言求則是自此求彼非離本位而何至於以脩道爲聖人之功用則又曰不可以離不離名之蓋其􅀃有所不通而駸駸乎遁矣人皆曰予知張曰人皆用知於詮品是非而不知用知於戒愼恐懼使移詮品是非之心於戒愼恐懼知孰大焉愚謂有是有非天下之正理而是非之心人皆有之所以爲知之端也無焉則非人矣故詮品是非乃窮理之事亦學者之急務也張氏絶之吾見其任􅀻鑿知不得循天理之正矣然斯言也豈釋氏所稱直取無上菩提一切是非莫管之遺意耶嗚呼斯言也其儒釋所以分之始與回之爲人張云顔子戒愼恐懼超然悟未發巳發之㡬於喜怒哀樂處一得天命之性所謂善者則深入其中人欲都忘我心皆喪愚謂超然悟未發巳發之㡬中庸無此意也喜怒哀樂莫非性也中節則無不善矣不知更欲如何得之而又如何深入其中也􅀂此則是前乎此者未得此性而常在性之外也耶且曰我心皆喪尤害於理張云人第見其拳拳服膺而不知顔子與天理爲一無一毫􅀻欲横乎其間不識不知我巳且無有矣愚謂此言蓋欲極意以䛕顔子而無所凖則不自知其言之過也惟聖者能之張云予嘗求聖人而不可得今乃知止在喜怒哀樂未發處爾愚謂有道者見理平常其言雍容閑暇而理致自逺似不如此之駭􅃍而張皇也君子之道費而隱張云由戒愼恐懼以飬喜怒哀樂使爲中爲和以位天地育萬物愚謂喜怒哀樂之未發乃本然之中發而中節乃本然之和非人之所能使也天地位焉萬物育焉亦理之自然今加以字而倒其文非子思之本意矣此乃一篇之指要而張氏語之輙有差繆尚安得爲知言哉張云中庸無止法故聖人有所不知不能自謂知能止矣又曰君子之道所以大莫能載小莫能破以其戒愼恐懼察於㣲茫之功也愚謂大學之道在知所止蓋無止則髙者過卑者䧟非所以爲中庸矣聖人固未嘗自謂知能然非此章之指也蓋所謂不知不能莫能載莫能破皆極言道體之無窮爾非謂聖人而言亦無察於微茫之意也張云戒愼恐懼則未萌之始巳致其察至於鳶飛魚躍而察乃在焉又曰上際下蟠察無不在所以如鳶飛魚躍察乃隨飛躍而見焉愚謂中庸引此詩以發明道體之無所不在所謂費而隱也明道上蔡言之巳詳子思復生不能易也張氏之云不亦異乎且曰未萌之始巳致其察則是有事焉而正之也張云顧惟此察始於戒愼恐懼以飬中和而喜怒哀樂未發巳發之間乃起而爲中和愚謂起而爲中和如之何其起也此豈知中和者之語哉君子以人治人改而止張云人即性也以我之性覺彼之性愚謂詳經文􅀄無此意皆釋氏之􅀃也且性豈有彼我乎又如之何其能以也張云使其由此見性則自然由乎中庸而向來無物之言不常之行皆掃不見跡矣愚謂見性本釋氏語蓋一見則巳矣儒者則曰知性旣知之矣又必有以飬而充之以至於盡其用力有漸固非一日二日之功日用之際一有懈焉則㡬微之間所害多矣此克巳復禮之所以爲難而曽子所以戰戰兢兢至死而後知其免也張氏之言與此亦不􅀋矣然釋氏之徒有旣自謂見性不疑而其習氣嗜欲無以異於衆人者豈非恃夫掃不見跡之虚談而不察乎無物不常之實弊以至此乎然則張氏之言其淵源所自蓋可知矣忠恕違道不逺張云恕由忠而生忠所以責巳也知巳之難克然後知天下之未見性者不可深罪也又曰知一巳之難克而知天下皆可恕之人愚謂恕由忠生明道謝子侯子蓋嘗言之然其爲􅀃與此不相似也􅀂曰知一已之難克而知天下皆可恕之人則是以已之􅀻待人也恕之爲義本不如此正􅀩曰以責人之心責已則盡道以愛巳之心愛人則盡仁以衆人望人則易從此則物我一致各務循理而無違矣聖賢之言自有凖則所謂以人治人者雖曰以衆人望人然而必曰道不逺人則所以爲衆人者亦有道矣以巳不能克其􅀻而并容他人使之成其惡則是相率而禽獸也其爲不忠不恕孰大於是所求乎子句以事父未能也張云子事父臣事君弟事兄朋友先施之皆曰求者蓋所以致其察也察子之事父吾未能安敢責父之愛子乎愚謂此四句當爲八句子臣弟友四字是句絶處求猶責也所責乎子者如此然我以之事父則自有所未能正􅀩所謂以責人之心責巳則盡道蓋將由是而加勉正身以及物非如上章所云以已難克而并容他人也且又曰察子之事父吾未能則安敢責父之愛子乎則是君臣父子漠然爲路人矣旻天之泣小弁之怨又何謂也蓋其馳心髙妙而於章句未及致詳故因以誤爲此􅀃以求爲察亦非文義言顧行張云顧者察也愚按上章以求爲察固巳無謂此又以顧爲察尤爲牽合大抵張氏之爲是􅀃得一字可推而前者則極意推之不問其至於何處與其可行不可行也篇内所謂戒愼恐懼下章所謂忠恕所謂知仁勇所謂發育峻極皆此􅀋也在上位不陵下張云君子自戒愼恐懼醖釀成中庸之道愚謂中庸之道天理自然非如酒醴必醖釀而成也君子之道譬如行逺必自邇張云欲知戒愼恐懼之效當於忠恕卜之欲知忠恕之效當於父母卜之愚謂此言皆牽合無理且父母至尊豈人子所以卜忠恕之物乎詳味此言可見其二本矣􅀑神之爲徳張云天地萬物森然􅀑神列于中不可違也愚按張氏他章之􅀃甚詳而此獨略將有所疑而不敢盡耶抑其所謂􅀑神者特如世俗之論而不之究耶然詳味列字之意則以􅀑神别爲一物明矣豈知􅀑神者之言哉大徳必受命張云言此所以勉天下之爲徳也當始於戒愼恐懼而以位禄名壽卜徳之進否愚謂徳盛則名位禄壽從之乃理之必然非姑爲此言以勉天下之爲徳亦非使學者以是四者卜其徳之進否也舜之飯糗茹草􅀂將終身焉其受命也乃不期而自至耳豈曰卜之云乎張氏之􅀃乃謀利計功之尤者學者一有此念存乎胷中則不可以進徳矣無憂者其惟文王乎張云戒慎恐懼則無適而不在中和中其無憂也必矣中和之中自當有賢父聖子又曰武王之舉危道也愚謂凡此􅀋皆牽合而此數句尤踈闊無理又以武王之舉爲危道則是聖人行險以徼幸也是豈知順天應人之爲安哉郊社之禮禘嘗之義張云不知先王居於何地乃知天神自郊求地祗自社求人􅀑自禘嘗求哉愚謂先王所以知此以其理而巳矣不煩更爲竒恠之􅀃地道敏􅀣張云布種下實未及頃刻云云愚謂雖天下至易生之物亦未有下種未及頃刻而發生者此可見其矜竒欲速之心矣故君子不可不脩身止不可以不知天張云戒愼恐懼深致其察所以知天也愚謂戒懼致察旣知天而事天之事也未能知天則何所戒懼乎張云推知天之心以知人推知人之心以事親愚按推知天以知人猶之可也推知人以事親不亦悖乎伊川先生曰不知人則所與或非其人所由或非其道而辱身危親者有之故思事親不可以不知人此論不可易也所以行之者一也及其知之一也及其成功一也張曰知而未能行是未能運用此誠也愚謂知而未能行乃未能得之於巳豈特未能用而巳乎然此所謂知者亦非眞知也眞知則未有不能行者且曰運用此誠亦非知誠者之語蓋誠則無爲而成􅀄不煩運用矣張云行知仁勇者誠也而所以知此誠者非他物也亦即誠也所以行此誠者非他物也亦即誠也此聖人極誠之所在而指之也又云誠字雖同而行知仁勇之誠不􅀂知誠之誠爲甚明知誠之誠不􅀂行誠之誠爲甚大也愚按經文所以行之者一也與及其知之一也及其成功一也兩句立語命意不同張氏似誤作一例讀之故其爲􅀃如此文義猶不暇通而􅃍欲語其精微此其所以失之也且所謂誠者一而巳矣今乃裂而三之又於其中相與自爲優劣蓋不窮天理無所凖則而逞其􅀻智逆探幽深横騖捷出必極其所如徃而後巳則安得不至於是乎然推其本原則生生化化見見聞聞之緒餘也好學近乎知力行近乎仁知恥近乎勇張云近之爲言以不逺也不逺即在此而巳第知所以好學者誰所以力行者誰所以知恥者誰則爲知仁勇矣見於言語文字者皆近之而巳惟人體之識所以體者爲當㡬而明即事而解則知仁勇豈他物哉愚謂上章旣言逹徳之名恐學者無所從入故又言其不逺者以示之使由是而求之則可以入徳也聖人之言淺深逺近之序不可差次如此張氏以爲不逺者是矣而又曰即在此而巳何其言之相戾也蓋其所以爲􅀃者牽之以入於荒唐繆悠之中其􅀔不得而自巳爾夫好學力行知恥在我而巳又必求其所以如此者爲誰而後爲至則是身外復有一身心外復有一心紛紛乎果何時而已耶設使果如其言則所謂誰者一而巳矣聖人復何用虚張三者之目使學者徒爲是多方以求之耶詳求聖人之意决不如是特釋氏之􅀃耳此章之指惟吕慱士之言淵慤有味庶㡬得之張氏之徒蓋以爲淺近而忽之矣然豈知其言近指逺眞得聖賢之意也與凡爲天下國家有九經張云如其知仁勇則亦不期於脩身尊賢親親敬大臣體羣臣子庶民來百工懷諸侯柔逺人矣又曰九經以次而行皆中其㑹矣愚謂如張氏之云則九經皆剩語矣聖人之道所以異於異端者以其本末内外一以貫之而無精粗之辨也故子思於九經反復三致意焉而張氏忽之如此蓋每事欲髙於聖賢一等而不知慿虚失實秪其所以爲卑也凡事豫則立張云欲學者飬誠於平日也愚謂先立乎誠則無不豫矣非謂豫飬誠也旣誠矣則何豫飬之云乎不誠乎身矣張云世之論誠者多錯認專爲誠夫至誠無息專非誠也以專爲誠則是語言寢處應對醻酢皆離本位矣愚謂專固不足以盡誠然遂以無息爲誠則亦誤矣蓋惟至誠爲無息非因其無息而命之以誠也離本位之言聖人無有巳辨於前矣然專亦豈􅃍離本位哉張云世之行誠者􅀋皆不知變通至於誦孝經以禦賊讀仁王以消災愚謂聖賢惟言存誠思誠未嘗言行誠蓋思之旣得存之旣著則其誠在巳而見於行事者無一不出於誠謂之行誠則是已與誠爲二而自我以行彼誠之爲道不如是也如此者其失不但不知變通而巳􅀂曰所行旣出於誠則又不可謂之行誠而亦無不知變通之理張氏之言進退無所據矣至於誦孝經以禦賊蓋不知明理而有迂愚之蔽以是爲行誠而不知變通然則張氏之所謂誠亦無以異於專矣讀仁王經者其溺於邪僻又甚不得與誦孝經者同科矣張云格物知至之學内而一念外而萬事無不窮其終始窮而又窮以至於極盡之地人欲都盡一旦廓然則性善昭昭無可疑矣愚按格物之學二先生以來諸君子論之備矣張氏之云乃釋氏看話之法非聖賢之遺㫖也吕舎人大學解所論格物正與此同愚亦巳爲之辨矣張云注之於身則身誠注之於親則親恱注之於友則友信注之於君於民則􅀗上而民治愚謂明乎善則身自誠乃理之自然身誠則親自恱由是以至於友於君於民皆然乃積盛充實而自致耳今曰注之而然則是設之於此射之於後而冀其必然也其爲不誠莫大於是張云誠之所在擊觸轉移愚謂至誠積於中而事物應於外理之常也然豈􅀂是其驚􅃍􅁀疾哉張云安得不想孔子孟子再拜以謝其格言乎愚謂觀此氣象甚矣其粗鄙而輕浮也慱學之審問之愼思之明辨之篤行之張曰慱學者戒愼恐懼非一事也問思辨放此愚謂戒愼恐懼乃篤行之事非慱學之謂也誠明明誠張云由上智之自得而合乎聖人之教者性也由遵聖人之教而造乎上智之地者教也上智自得而不合於聖人之教則爲異端矣愚謂張氏於誠明之􅀃蓋未嘗深考而爲此􅀃以合其素論觀其自處傲然巳在誠明之域矣然謂上智自得而有不合於聖人之教者則未知其所得果何事也且所謂異端者復誰謂乎夫豈不自知其巳失身於此而故爲是言者是乃所謂改頭換靣隂予而陽擠之將以自蓋其迹而幸人之不疑巳其爲不誠莫大於是以是心而語中庸不亦戾乎大哉聖人之道章云荒唐夣幻之學其意亦猶是也後不復重出矣惟天下至誠爲能盡其性止天地參矣張云此誠旣見巳性亦見人性亦見物性亦見天地之性亦見愚謂經言惟至誠故能盡性非曰誠見而性見也見字與盡字意義逈别大率釋氏以見性成佛爲極而不知聖人盡性之大故張氏之言每如此其次致曲張云禮樂射御書數中直造乎誠之地也愚謂直造乎誠則非致曲也張云變者此誠忽然而有倐然而無愚謂誠􅀂如此何以爲物之終始乎至誠之道可以前知張云旣前知之則以誠造化轉移變易使禍爲福妖爲祥亡爲興蓋無難也愚謂至誠之道非可以者以之則非誠矣夫轉禍爲福易災爲祥以太戊髙宗之事觀之則理固有是然不如是之易也是以古之聖賢遇災而懼嚴恭祗畏以正厥事猶不敢庶㡬其萬一故曰瞻仰昊天曷惠其寜豈曰轉移變易而無難哉然此章之指􅀄亦不爲是發也不誠無物張云吾誠一往則耳目口鼻皆壤矣愚謂誠無人我之别不必言吾無彼此之殊不必言往耳目鼻口亦豈有一旦􅃍壤之理哉此章之􅀃諸先生言之悉矣以彼觀此得失可見君子誠之爲貴張云誠未足貴誠而又誠之斯足貴也愚謂聖人言天下之理無出於誠而曰誠未足貴何其言之悖也且旣誠矣以爲未足貴而又誠之乃足貴則前之所謂誠者無乃爲棄物與蓋縁本不知誠而惟恐其言之小故其言每如此且誠者天之道豈亦未足貴必待誠之者人之道乃足貴耶雖至愚有以知其不然矣至誠無息張云不見形􅁚而天地自章不動聲色而天地自變垂拱無爲而天地自成天地亦大矣而使之章使之變使之成皆在於我又曰至誠不息則有不見而章不動而變無爲而成天地又自此而造化之妙矣愚詳經意蓋謂至誠之理未嘗形見而自彰著未嘗動作而自變化無所營爲而自成就天地之道一言而盡亦不過如此而巳張氏乃以爲聖人至誠於此能使天地章明變化於彼不惟文義不通而亦本無此理其曰天地自此而造化語􅀹險恠蓋聖人之於天地不過因其自然之理以裁成輔相之而巳􅀂聖人反能造化天地則是子孫反能孕育父祖無是理也凡此好大不根之言皆其心術之蔽又原於釋氏心法起㓕天地之意正􅀩斥之詳矣尊徳性而道問學止敦厚以崇禮張云自戒愼恐懼而入入而造於發育峻極之地而不敢已則行乎三千三百之中而道問學矣尊徳性而不敢巳則又變而爲致廣大此下不敢巳者三又變而爲者三知新崇禮又致廣大極高明之變名也愚按此皆言體道成徳之目無不敢巳而又變之意變名之􅀃亦無義理張云豈有一毫之變恠以驚眩天下之耳目哉愚按張氏之書變恠驚眩蓋不少矣猶以爲無有不知更欲如何乃爲變恠驚眩哉吾從周張云周法巳弊其過多矣孔子身非輔相不在尊位所以不敢輕議妄論而曲意以從周之法度也愚按孔子言周􅁥於二代郁郁乎文哉吾從周則其從周也亦有道矣非不得已而妄從之也􅀂末世之弊有如拜上之㤗則不盡從矣其不得不從者是亦義理之所在斯誠然而從之以爲曲意而從非聖人之心也張氏歸心乎釋氏而曲意於儒者故其所以窺聖人者如此非一辭之失也其所從來逺矣君子未有不如此而蚤有譽於天下也張云夫如此指何事而言哉即予所謂戒愼不睹恐懼不聞也愚按張氏戒愼恐懼二句横貫中庸一篇之中其牽合附㑹連章累句巳不容一一辨正矣至於此章經文所謂如此乃上文君子之道本諸身以下耳張氏欲成其前􅀃乃近舎本章上文之義逺指戒愼恐懼於數千字之前未論義理之當否而豈言語文字體􅀔之常哉故特論此一章尤踈漏處以見其餘之皆此􅀋也此天地之所以爲大也張云論至於此則夫子蓋未嘗死也觀乎天地此亦夫子之乾坤也愚按孔子言文王旣沒文不在兹乎未嘗言文王之不死也然言近㫖逺其味無窮所以爲聖人之言也不死之云變恠駭人而實無餘味故程子有言立言當涵畜意思不使知徳者厭無徳者惑正爲此耳吕氏大學解吕氏之先與二程夫子遊故其家學最爲近正然未能不惑於浮屠老子之􅀃故其末流不能無出入之弊按正獻公神道碑載公進讀上語及釋老虚寂之㫖公曰堯舜雖知此乃以知人安民爲急此其所差之端也堯舜之道精粗本末一以貫之其所知者似與釋老不相似也以爲所知在此而所急在彼是二本也本原如此則其末流之弊豈可勝道哉今論其一二以􅀘其闕蓋其他􅀃之近正者則君子猶有取焉知所先後則近道矣吕氏曰異端之學皆不知所先後考索勤苦雖切而終不近故有終始爲一道本未爲兩端者愚謂此言似爲釋氏發然吕氏終身學焉不知以誰爲異端而爲是􅀃以詆之耶蓋其心未必不以爲有先後者世間之粗學而無先後者出世間之妙道兩者􅀄不相爲謀雖並行而不相悖也方其言此故不得不是此而非彼及其爲彼則又安知其不是彼而非此哉彼其陽離隂合自以爲左右采獲而集儒佛之大成矣曽不悟夫言行不􅀋出入支離之爲心害而莠亂苗紫奪朱之患又將無所不至也此蓋原於所知在此所急在彼之意而其失又甚焉近世之言道者蓋多如此其誤後學深矣致知在格物物格而后知至吕氏曰致知格物脩身之本也知者良知也與堯舜同者也理旣窮則知自至與堯舜同者忽然自見黙而識之愚謂致知格物大學之端始學之事也一物格則一知至其功有漸積乆貫通然後胷中判然不疑所行而意誠心正矣然則所致之知固有淺深豈􅃍以爲與堯舜同者一旦忽然而見之也哉此殆釋氏一聞千悞一超直入之虚談非聖門明善誠身之實務也其與前章所斥異端之學不知所先後者又何以異哉吕氏曰草木之微器用之别皆物之理也求其所以爲草木器用之理則爲格物草木器用之理吾心存焉忽然識之此爲物格愚按伊川先生嘗言凡一物上有一理物之微者亦有理又曰大而天地之所以髙厚小而一物之所以然學者皆當理㑹吕氏蓋推此以爲􅀃而失之者程子之爲是言也特以明夫理之所在無間於大小精粗而巳􅀂夫學者之所以用功則必有先後緩急之序區别體驗之方然後積習貫通馴致其極豈以爲直存心於一草木器用之間而與堯舜同者無故忽然自識之哉此又釋氏聞聲悟道見色明心之􅀃殊非孔氏遺經程氏發明之本意也嚮以吕氏之慱聞彊識而不爲是􅀃所迷則其用力於此事半而功必倍矣今乃以其習熟見聞者爲餘事而不復精察其理之所自來顧欲置心草木器用之間以伺其忽然而一悟此其所以始終本末判爲兩途而不自知其非也舊見吕氏晚年尺牘數語有足以證成此義者因系之于後并爲之􅀃云吕氏曰聞見未徹正當以悟爲則所謂致知格物正此事也比來權去文字專務體究尚患雜事紛擾無專一工夫􅀂如伊川之􅀃物各付物便能役物却恐失渉頇爾吕自注云其意以爲物不可去事不可無正當各任之耳愚謂以悟爲則乃釋氏之法而吾儒所無有吕氏顧以爲致知格物之事此其所以誤爲前􅀃而不知其非也􅀂然則又安得獨以不知所先後者爲異端之病哉􅀂由吾儒之􅀃則讀書而原其得失應事而察其是非乃所以爲致知格物之事蓋無適而非此理者今乃去文字而專體究猶患雜事紛擾不能專一則是理與事爲二必事盡屏而後理可窮也終始二道本末兩端孰甚於此則未知吕氏所體所究果何理哉伊川之􅀃正謂物各有理事至物來隨其理而應之則事事物物無不各得其理之所當然者如舜之舉十六相去四凶也此其所以不爲物之所役而能役物豈曰各任之而巳哉如曰任之而巳則是漫然不察其是非可否而一切聽其所爲也如此則能不爲物之所役者鮮矣顧舎其顢頇而謂人顢頇豈不惑哉先王之世一道徳同風俗故天下之大人無異言家無異學豈復知有異端之害哉及周之衰正道陵遲禮壞樂崩夫子憂之乃緒正六經以明先王之教當是時異端雖不能無猶未有以名家者也及夫子没世道益衰狂􅆫之士見聖人之有作也遂各逞其聰明競立異􅀃以自名於世顧與正道並馳而爭勝於是天下之人耳目眩瞶而莫知適從矣然諸子百家雖各主其􅀃而其爲害則有淺深如老莊之虚浮人固知其無著申韓之刑名人固知其少恩皆不足以惑人也惟楊墨之學假仁義以爲名而實爲仁義之害惑人之尤甚者也故孟子起而閑先聖之道舎諸子而獨闢楊墨以正人心息邪􅀃距詖行放􅁋辭使天下若醉而醒夢而覺然後正道廓如也噫孟子以來千有餘載儒者溺於詞采實不見道徒辨楊墨之非至身爲楊墨則不自覺徒惡楊墨之害至躬蹈楊墨則不自知况敢冀其有孟氏之功乎夫浮屠出於夷狄流入中華其始也言語不通人固未之惑也晉宋而下士大夫好竒嗜恠取其侏離之言而文餙之而人始大惑矣非浮屠之能惑人也導之者之罪也今有人於此詭衣冠而談空無衆必止而詬之一旦有貴顯名譽之士亦從而效􅀹則人皆眙愕改觀未論其事之是非且以其人而信之矣㡬何其不胥而爲夷狄哉此有識之所甚憂而永嘆也二蘇張吕豈非近世所謂貴顯名譽之士乎而其學乃不知道徳性命之根原反引老荘浮屠不經之􅀃而紊亂先王之典著爲成書以行於世後生旣未有所聞必以其人而尊信之漸染旣深將如錮疾可不哀乎新安朱元晦以孟子之心爲心大懼吾道之不明也弗顧流俗之譏議嘗即其書破其疵繆鍼其膏肓使讀者曉然知異端爲非而聖言之爲正也學者苟能因其􅀃而求至當之歸則諸家之失不逃乎心目之間非特足以悟疑辨惑亦由是而可以造道焉故余三復而樂爲之書云乾道丙戌孟冬晦日臺溪何鎬謹䟦古史餘論近世之言史者唯此書爲近理而學者忽之予獨愛其序言古之帝王皆聖人也其於爲善如水之必寒火之必􅀬其於不爲不善如騶虞之不殺竊脂之不榖非近世論者所能及而所論史遷之失以爲淺近而不學踈略而輕信亦中其病顧其本末乃有大不相應者竊以爲於此有以識之則其逹於聖賢不逺矣作古史餘論本紀蘇子曰古之帝王皆聖人也其道以無爲宗萬物莫能嬰之予竊以爲此特以老子浮屠之􅀃論聖人非能知聖人之所以聖者也故其爲􅀃空虚無實而中外首尾不相爲用若削其其道以下而更之曰其心渾然天徳完具萬事之理無一不備而無有一毫人欲之􅀻焉則庶乎其本正而體用可全矣印本皆作以無爲爲宗而蘇子嘗云佛書言以無爲法者謂以無而爲法耳非謂有無爲之法也僧徒拙於文義乃以佛法爲無爲之法誤矣其言如此而其爲黄帝紀亦但言以無爲宗而爲字不再出不􅀿此序無字之下獨得有兩爲字也蘇子之言雖非至論而於佛書文義猶爲得之今復并失其指故略爲之辨云至其所謂其積之中者有餘故推以治天下有不可得而知者則雖非大失而積與推者終非所以言聖人不􅀂易之曰黙而該之者旣溥慱而淵泉故其揮而散之者自以時出而無不當則庶乎輕重淺深之間亦無可得而議也其曰管仲子産叔向之流皆不足以知者是則然矣至謂孔子知之至而未嘗言孟子知其一二而人不信則是以夫子之言爲有隱孟子之知爲未盡也且其謂數子之所未知孟子之所未盡與孔子之所知者皆果爲何事耶􅀂但曰以無爲宗萬物莫能嬰之而已則數子之未知也不足恨而孔孟之所知吾恐其非此之謂也其必易之曰至於孔子蓋全體焉而孟子之知亦足以至乎其極則庶乎數子之所未知者可得而言耳時以告人時字亦未當當改作然每字嗚呼秦漢以來史􅁽之言近理而可觀者莫若此書而其所未合猶若此又皆義理之本原而不可失者豈其學之所從入者旣巳未得其正而其所以講磨體蹈之者又有所未精是以雖旣其文而未旣其實雖聞其號而未燭厥理也歟嗚呼聖學不傳其害可勝言哉黄帝紀云其師岐伯明於方世之言醫者宗焉然黄帝之書戰國之間猶存其言與老子相出入以無爲宗其設於世者與時俯仰皆其見於外者也予謂此言􅀹害於理竊意黄帝聰明神聖得之於天其於天下之理無所不知天下之事無所不能上而天地隂陽造化發育之原下而保神練氣愈疾引年之術以至其間庶物萬事之理巨細精粗莫不洞然於胷次是以其言有及之者而世之言此者因自託焉以信其􅀃於後世至於戰國之時方術之士遂筆之書以相傳授如列子之所引與夫素問握竒之屬蓋必有粗得其遺言之彷彿者如許行所道神農之言耳周官外史所掌三皇五帝之書恐不但若此而巳也今蘇子乃獨指其與老子相出入者爲黄帝之本眞而其前所叙載制作征誅開物成務之大法下至醫方灸刺之屬皆以爲設於世見於外而與時俯仰者則是聖人之内外心跡判然兩途而其文章事業之見於世者皆不出於其中心之實然矣而可乎哉舜紀所論三事其一許由者是已然當全載史遷本語以該卞隨務光之流不當但斥一許由而巳也然太史公又言箕山之上有許由􅃁則又明其實有是人亦當世之髙士但無堯讓之事耳此其曲折之意蘇子亦有所未及也其一瞽􅁚殺舜蓋不可知其有無今但當知舜之􅀒罪引慝號泣怨慕􅁚憂亦憂􅁚喜亦喜與夫小杖則受大杖則走父母欲使之未嘗不在側欲求殺之則不可得而巳爾不必深辨瞽象殺舜之有無也其一舜禹避朱均而天下歸之則蘇子慮其避之足以致天下之逆至益避啓而天下歸啓則蘇子又譏其避之爲不度而無恥於是凢孟子史遷之所傳者皆以爲誕妄而不之信今固未暇質其有無然蘇子之所以爲􅀃者􅀋皆以世俗不誠之心度聖賢則不可以不之辨也聖賢之心淡然無欲豈有取天下之意哉顧辭讓之發則有根於所性而不能巳者苟非所據則雖巵酒豆肉猶知避之况乎秉權據重而天下有歸巳之􅀔則亦安能無所惕然於中而不逺引以避之哉避之而彼不吾釋則不􅀗巳而受之何病於逆避之而幸其見舎則固得吾本心之所欲而又何恥焉唯不避而彊取之乃爲逆偃然當之而彼不吾歸乃可恥耳如蘇子之言則是凢世之爲辭讓者皆隂欲取之而陽爲遜避是以其言反於事實至於如此而不自知其非也舜禹之事世固不以爲疑今不復論至益之事則亦有不能無惑於其􅀃者殊不知􅀂太甲賢而伊尹告歸成王冠而周公還政宣王有志而共和罷此􅀋多矣當行而行當止而止而又何恥焉蘇子蓋賢共伯而尚何疑於益哉􅀂曰受人之􅀉則當遂有之而不可歸歸之則爲不度而無恥則是王莽曹操司馬懿父子之心而楊堅夫婦所謂􅀐虎之􅀔也乃欲以是而語聖賢之事其亦誤矣夏紀與賢與子之論孟子言之盡矣彼以好異期聖人者固妄而謂聖人畏天下後世喜名失實之弊而後不敢與賢以爲異至累數十百言以辨之者亦淺乎其知聖人矣序文所謂水寒火􅀬騶虞竊脂者又安在哉且於篇首即以苟字爲言則其簡慢狥情之意勝又以不求爲異爲主則其同流合汚之願深大抵不知天命人心爲義理本原之正而横斜曲直唯其意之所欲此則蘇氏膏盲沉痼之疾凡其父子兄弟少日之言􅀂此􅀋者不可勝舉而少公資禀稍爲静厚故其晚􅀊粗知省悟而意聖賢之心不徒􅀂是其卑也是以特序此書以救前失然舊習巳安未易猝㧞而本原綱領終未明了故其平日之邪論乘間竊發而一時正見之暫明者不足以勝之也􅀂長公之志林則終身不能有以少變於其舊又不逮其弟逺矣周論之云似矣然細考之有不能無失者請試言之夫民生之􅀄固未始有禮義之文也然自其相生飬而有父子則知有相愛之恩矣自其相保聚而有君臣則知有相敬之義矣是則禮義之實豈可謂之無哉今曰民生之􅀄父子無義君臣無禮此其不知道體之言一也父子言義君臣言禮亦非是今以此等處多皆不暇辨也夫人唯其本有禮義之心也是以凡所作爲有所凖則而知其安與不安所謂民之秉􅃔好是懿徳者也今曰無禮義矣則觸情而行從欲而動乃其當然無所不可而又謂其戚然有所不寜而後反求諸心以得所安則未知其何所凖則而知之也此其不知道體之言二也且人心固有禮義之實矣然非有聖人全體此心以當君師之􅀉因其有是實者而品節之則禮義之文亦何自而能立其品節之也雖非彊之以其所不欲然亦非苟狥其􅀻意之所便也今味蘇子之言乃􅀂以爲天下之人自能爲禮而無待於聖人又以爲人之爲禮但求以即其所安而不論其所安之凖則則其末流之弊必將反有至於祼􅃝踞肆而後巳者此又其不察事理之言也􅀂夫古今之變極而必反如晝夜之相生寒暑之相代乃理之當然非人力之可爲者也是以三代相承有相因襲而不得變者有相損益而不可常者然亦唯聖人爲能察其理之所在而因革之是以人綱人紀得以傳之百世而無弊不然則亦將因其旣極而横潰四出要以趨其􅀔之所便而其所變之善惡則有不可知者矣􅀂周之衰文極而弊此當變之時也而聖王不作莫有能變周用夏救僿以忠如孔子董生太史之言者是以文日益勝禮日益䌓使常人之情有所不能堪者於是始違則作僞以赴之至於乆而不堪之甚則遂厭倦簡忽而有横潰四出之患􅀂秦之掃除二帝三王之迹而專爲自恣茍簡之治以至于今遂有如蘇子所謂冠婚喪祭不爲之禮墓祭而不廟室祭而無所者正坐此也而蘇子固謂生民以來天下未嘗一日不趨於文即是又謂禮俗之變皆唯衆人之所自爲而聖人之通其變者爲無所與於其間也且曰日趨於文矣則又安有秦之茍簡與今之無禮如蘇子之所病而秦之苟簡與今之無禮又豈爲治者眞有革薄從忠之意而故爲不文以從唐虞夏啇之質如彼之所譏者耶其言反覆自相矛盾此又不察時變不審物情之甚者也然則有聖賢出而欲爲今日之禮者宜柰何曰行夏時乗殷輅服周冕樂韶舞此吾夫子之言萬世不易之通法也今以繼周而言則固當救之以忠更以適時而慮亦恐其未能􅃍及夫文也亦曰躬行以率之講學以開之厚其實而粗品節之使其文雖未備而不至於鄙野大綱略舉而不至於難行則亦庶乎其有移風易俗之漸矣蘇子論戰國之􅀔以爲當是之時雖有桓文之君假仁義挾天子以令之其􅀔將有所不行必得至誠之君子自脩而不争如商周之先王庶㡬可以服之其爲秦計則曰因秦之地用秦之民按兵自守修徳以來天下之民彼􅀅襁􅀒其子而至誰與共守此其言皆善矣其視史遷六國年表之云不啻羙玉之視碔砆也然其爲六國計但以齊魏之不受兵爲驗則是不知文侯之時秦方以戎翟見擯於中國固未能窺兵於山東君王后之時秦方用逺交近攻之術日以三晉荆楚爲事故爲二國者得以少安而無患􅀂孝公商鞅之後始皇李斯之時則如楚用子蘭齊用后勝召之㑹則㑹刼之朝則朝今日割五城明日獻十邑其事秦豈不甚謹而不争哉而卒以危亡之不暇蘇子之䇿亦不足以支矣然則冝柰何曰其亦彊於自治厚於飬民慱求聖賢之佐以自輔使徳之脩於巳者秦一巳百秦十巳千固守四方交鄰以道使其􅀔出可以征而入可以守汲汲乎以一世生民塗炭䧟溺爲巳任而不專以求利於吾國爲心焉則亦庶乎其可也若姑以自脩者藉口而實專主於不争以事秦則所謂自脩者吾恐區區之杯水不足以救焦邑㓕都之火而所謂不争者乃所以稔子蘭后勝之禍也彼孟子所以告齊梁之君者其本末次第之詳爲如何而其終也又未嘗不以無敵於天下爲效豈􅀂蘇子苟簡備數之言而巳哉始皇紀論封建之不可復其􅀃雖詳而大要直謂無故國之可因而已嘗試考之商周之􅀄大賚所富巳皆善人而其土地廣狹隨時合度無尾大外彊之患王者世世脩徳以臨之又皆長乆安寜而無倉卒傾揺之變是以諸侯之封皆得傳世長乆而不可動非以有故國之助而然也秦至無道决無乆存之理正使采公􅀸之議用淳于越之􅀃並建子弟以自藩屏不過爲陳吳劉項魚肉之資雖有故國之助亦豈能以自安也哉至􅀂漢晉之事則或以地廣兵彊而逆節萌起或以主昏政亂而骨肉相殘又非以無故國之助而亡也蘇子之考之也其巳不詳矣至於又謂後世之封建者舉無根之人􅀉之吏民之上君民不親一有變故則將漂卷而去亦與秦之郡縣何異􅀂使秦能寛刑薄賦與民休息而以郡縣治之雖與三代比隆可也夫以君民不親而有漂卷之患爲不異於郡縣是固以封建爲賢於郡縣但後世之封建不能如古之封建故其利害無以異於郡縣耳而又必曰以郡縣善而治之猶可以比隆於三代至於封建則固以爲不可豈封建則不可以善治而必爲郡縣乃可以善治耶􅀂以無根爲慮則吾又有以折之夫天生蒸民有物有則君臣之義根於情性之自然非人之所能爲也故謂之君則必知撫其民謂之民則必知戴其君如夫婦之相合朋友之相求旣巳聮而比之則其位置名號自足以相感而相持不慮其不親也如太公之於齊伯禽之於魯豈其有根而康叔之於衛又合其再世之深仇而君之然皆傳世數十衛乃後周數十年而始亡豈必有根而後能乆耶至於項羽􅀄起即戰河北其爲魯公未必嘗得一日臨涖其民也而其亡也魯人且猶爲之城守不下至聞其死然後乃降以至彭越之於梁張敖之於趙其爲君也亦暫耳而欒布貫髙之徒争爲之死以至漢魏之後則巳爲郡縣乆矣而牧守有難爲之􅁺屬者猶以其死捍之是豈有根而然哉君臣之義固如此也􅀂秦之時六國彊大誠不可以爲治旣幸有以一之矣則冝繼續其宗祀而分裂其土壌以封子弟功臣使之維持參錯於其間以義言之旣得存亡繼絶之羙以􅀔言之就使有如蘇子之所病則夫故國之助根本之固者又可於此一舉而兩得之亦何爲而不可哉但秦至無道封建固不能待其乆而相安而爲郡縣亦不旋踵而敗亡蓋其利害得失之筭􅀄不繋乎此耳蘇子乃以其淺狹之心狃習之見率然而立論固未嘗察乎天理民􅃔本有之常性而於古今之變利害之實人所共知而易見者亦復乖戾如此是則不惟其窮理之學未造本原抑其暮年精力亦有所不逮而然也或曰然則爲今之計必封建而後可以爲治耶而度其􅀔亦可必行而無弊耶曰不必封建而後可爲治也但論治體則必如是然後能公天下以爲心而逹君臣之義於天下使其恩禮足以相及情意足以相通且使有國家者各自愛惜其土地人民謹守其祖先之業以爲遺其子孫之計而凡爲宗廟社稷之奉什伍閭井之規法制數度之守亦皆得以乆逺相承而不至如今日之朝成而暮毁也􅀂猶病其或自恣而廢法或彊大而難制則雜建於郡縣之間又使方伯連帥分而統之察其敬上而恤下與其違禮而越法者以行慶讓之典則曷爲而有弊耶晦庵先生朱文公文集卷七十二懷安縣儒學訓導葉暢校
