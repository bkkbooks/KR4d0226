body:
  text: 答馮作肅所諭兩條如叔京兄所論孔子非沮子貢乃勉其進此意甚善而作肅所疑亦有不得不疑者但此章自不必别爲之說但看伊川先生觧云我不欲人之加諸我吾亦欲無加諸人仁也己所不欲勿施於人恕也恕則子貢可勉而能仁則非子貢之所及此意極分明矣􅀶施濟衆之問與此語先後不可考疑却因能近取譬之言用力有功而有欲無加人之說也熹嘗謂欲立人欲逹人即子貢所謂欲無加人仁之事也能近取譬求仁之方即孔子所謂勿施於人恕之事也熟玩文意似當如此然諸先逹未之嘗言未知是否幸試思之更白叔京兄質其可否復以見諭幸甚又所引與􅀧爲證恐聖人與􅀧之意不止如此亦可并商量也答馮作肅所諭懲創後生妄作之弊甚善然亦不可以此而緩於窮理但勿好異求新非人是已則知識益明而無穿穴之害矣􅀂因陋畜疑不爲勇决之計又非所以矯氣質之偏而進乎日新也答馮作肅示諭頗爲他慮所牽不得一意講習只得且將明白義理澆灌涵養令此義理之心常勝便是緊切功夫乆之須得力也答馮作肅敬義之說甚善然居敬窮理二者不可偏廢有所倫廢則德􅀌而無所利矣動静仁智之體對下文樂壽爲仁智之效而言猶言其體段如此耳非體用之謂也學者求爲仁智之事亦只如上章居敬窮理之說便是用力處􅀂欲動中求諍静中求動却太支離然亦無可求之理也以伊尹爲天民蓋以其事言之如耕莘應聘之事即分明見得有此蹤跡也治亦進亂亦進是指五就湯五就桀而言乃是就湯之後以湯之心爲心非不待可行而􅃍行之謂也傳說是大賢比伊尹須少貶其見可而後行雖同但所以行者或不及耳周孔又高􅀡是正己而物正之事可行而行亦有所不足道矣二南乃天子諸侯燕樂用之鄕人用之􅀖國所以風天下也然隨事自有正樂者則兼及之如燕禮自有鹿鳴等詩無正樂者則專用之如鄉飮酒別無詩也恐是如此然亦未及考也可欲之善與􅁇善之善同有諸巳之信與成之者性理雖一而所施則異當更深察之性情等說有巳見叔京書者但所與嵩􅀸論者今議其得失於此嵩􅀸云理即性也不可言本此言得之程子亦云性即理也今見遺書二十二上但其下分别感有内外則有病作肅非之是也作肅又云性者自然理則必然而不可悖亂者此意亦近之語亦有病但下云理不待性而後有必因性而後著此則有大病蓋如此則以性與理爲二也下云性者理之㑹却好理者性之通則又未然蓋理便是性之所有之理性便是理之所㑹之地而嵩􅀸失之於太無分别作肅又失之於太分别所以各人只說得一􅁁也作肅云情本於性故與性爲對心則於斯二者有所知覺而能爲之綂御者也未動而無以綂之則空寂而巳巳動而無以綂之則放肆而巳此數句却好但必以不動爲心則又非矣􅀂心本不動則孟子又何必四十而後不動心乎須知未動爲性巳動爲情心則貫乎動静而無不在焉則知三者之說矣知言曰性立天下之有情效天下之動心妙性情之德此言甚精宻與其他說話不同試玩味之則知所言之失矣答連嵩􅀸正顔色斯近信矣此言持養乆熟之功正其顔色即近於信蓋表裏如一非但色莊而巳以上下兩句考之可見非謂正顔色即是近信也􅀂非持養有素則正顔色而不近信者多矣􅀫諾者未有以副其諾而預諾之如今人未有此物而先以此物許人之􅀋集觧不用此義盡心以見處而言盡性以行處而言易簀結纓未須論優劣但看古人謹於禮法不以死生之變易其所守如此便使人有行一不義殺一不辜而得天下不爲之心此是緊要處子路仕衛之失前輩論之多矣然子路却是見不到非知其非義而茍爲也以道左爲無用則道乃無用之物也而可乎但仁是􅀡指人心親切之妙道是綂言義理公共之名故其言有親䟽其實則無二物也中庸曰脩道以仁胡子亦謂人而不仁則道義息意亦可見天地設位而易行乎其中以造化言之也乾坤成列而易立乎其中以卦位言之也乾者萬物之始對坤而言天地之道也元者萬物之始對亨利貞而言四時之序也錯綜求之其義乃盡功用妙用之說來諭得之所謂天地之性即我之性豈有死而􅃍亡之理此􅀃亦未爲非但不知爲此說者以天地爲主耶以我爲主耶􅀂以天地爲主則此性即自是天地間一箇公共道理更無人物彼此之間死生古今之别雖曰死而不亡然非有我之得私矣􅀂以我爲主則只是於自已身上認得一箇精神魂魄有知有覺之物即便目爲巳性把持作弄到死不肯放舍謂之死而不亡是乃私意之尤者尚何足與語死生之說性命之理哉釋氏之學本是如此今其徒之黠者往往自知其陋而稍諱之却去上頭别說一般玄妙道理雖􅀂滉漾不可致詰然其歸􅀫實不外此􅀂果如此則是一箇天地性中别有􅀂干人物之性每性各有界限不相交雜改名換姓自生自死更不由天地隂陽造化而爲天地隂陽者亦無所施其造化矣是豈有此理乎煩以此問子晦渠必有說却以見諭答嵩􅀸爲其多聞也爲其賢也多聞何以謂之師夫賢有小大記曰以人望人則賢者可知至於多識前言往行以畜其德易之大畜故可以爲師賢與多聞細分固當有别但􅀂只如此理㑹則與王氏新經何異恐不必􅀷致意也下段春秋補助之說放此配義與道而不言仁充塞天地之間則仁在其中矣孟子言氣主於集義故也更熟看上下文子細思索不可只如此草草說過樂正子有諸已之謂信與反身而誠則能動人也如何信有諸已誠則能動人也信與誠大槩相似但反身而誠所指處地位稍高亦未論能動人否也孟子不見儲子謂其儀不及物夫儲子之平陸特遣人致幣交於孟子則其接也不以禮孟子何以受其幣而不見豈非不屑教誨之道與孔子不見孺悲而鼓瑟之義同􅀄不自來但以幣交未爲非禮但孟子旣受之後便當來見而又不來則其誠之不至可知矣故孟子過而不見施報之宜也亦不屑之教誨也楚令尹子南之子棄疾雍紏之妻一告而殺夫一不告而殺父二者亦不幸而遇此然當如何爲正居二者之間調護勸止使不至於相夷者上也勸之不從死而以身悟之次也舍是亦無䇿矣桓公不足以有爲民不免左袵管仲之不死得爲仁乎或以爲管仲自信其才雖不遇而仲之仁自􅀂也􅀂夫成功則天也孔子許管仲以仁正以其功言之耳非以管仲爲仁人也􅀂其無功又何得爲仁乎答連嵩􅀸㳟敬二字語孟之言多矣如敬而無失與人㳟而有禮居處㳟執事敬行已也㳟事上也敬責難於君謂之㳟陳善閉邪謂之敬伊川先生言發於外者謂之㳟有諸中者謂之敬蓋㳟敬只一理表裏之言以此意觧語孟之言似不契莫是有輕重否㳟主容敬主事自學者而言則㳟不如敬之力自成德而言則敬不如㳟之安􅀑神馮依此亦有理莫見乎隱莫顯乎微而巳此莫只是誠之不可揜感而遂通之意否􅀑神馮依之說大槩固然然先生蓋難言之亦不可不識其意也窮神則無易矣此言人能窮神則易之道在我矣豈復别有易哉乾是聖人道理坤是賢人道理乾是自然而然坤便有用力處論性不論氣不備論氣不論性不明論性不論氣則無以見生質之異論氣不論性則無以見理義之同兵法逺交近攻須是審行此道智崇禮卑之意蓋學者其知要高明其行須切近立則見其參於前所見者何事竊謂言忠信行篤敬所主者誠敬而巳所主者旣誠敬則所見者亦此理而無妄矣故坐必如尸立必如齊此理未嘗不在前也二說皆善顔淵問仁孔子告之以仁與禮仁與禮果異乎竊謂五常百行理無不貫仁者人此者也義者宜此禮者履此仁之與禮其命名雖不同各有所當皆天理也人之所以滅天理者以爲人欲所勝耳人能克去已私則天理者復動容周旋中禮仁孰大焉仁禮之說亦得之但仁其綂體而禮其節文耳答連嵩􅀸德輶如毛民鮮克舉之孔子所謂爲仁由巳也仁以爲已任不亦重乎程子所謂克已最難也周子亦曰至易而行難果而􅃀無難焉蓋輕故易重故難知其易故行之必果知其難則守之宜􅃀能果能􅃀則又何難之有乎恐不必引尭舜病諸以爲任重之證也死生有命言禀之素定非今日所能移富貴在天言制之在彼非人力所能致如所諭却費力也天下歸仁熟考經文及程氏􅀃似只謂天下之人以仁歸之與吕氏贊不同蓋事事合理則人莫不稱其仁如宗族􅁛孝鄕黨􅁛悌之比􅀂有毫髪之私留於胷中則見乎外者必有所不可揜矣人亦必以其實而􅁛之又何歸仁之有知化只是知化育之道不必以知爲主但窮神知化存神過化伊川橫渠􅀃此二義皆不同試考其說當孰從耶忠質文不見於經然亦有理蓋忠則只是誠實質便有損文就質之意矣曽子言仁人此義宜此只就孝上說孟子言仁之實義之實則兼孝悌而言程子言此雖只是一理然湏分别得出是亦理一而分殊之意大凡道理皆如此也此是說遺書第一卷中仁人此一段夫仁者已欲立而立人已欲逹而逹人所謂以已及物仁也能近取譬可謂仁之方也已所謂推已及物恕也並行不悖一章甚善此君子􅀁以不謂命也但尭舜孔子爲䟽戚之異似未然此各是發明一事皆不以天而廢人者然所謂人者是亦天而巳矣此􅀁以並行而不相悖也答程允夫洵讀蘇氏書愛其議論不爲空言竊敬慕焉蘇氏議論切近事情固有可喜處然亦譎矣至於衒浮華而忘本實貴通逹而賤名檢此其爲害又不但空言而已然則其所謂可喜者考其要歸恐亦未免於空言也爲學之道戞戞乎難哉爲學之道至簡至易但患不知其方而溺心於淺近無用之地則反見其難耳頴濵浩然一叚未知􅀁去取反復讀孟子此章則蘇氏之失自見孟子集觧先録要切處一二事如論養氣論性之􅀋孟子集觧雖巳具藁然尚多􅀁疑無人商􅃀此二義尤難明豈敢輕爲之說而妄以示人乎來書謂此二義爲甚切處固然然學者當自􅀶而約自易而難自近而逺自下而高乃得其序今舍七篇而􅀡欲論此是躐等也爲學之序不當如此而来書指顧須索氣象輕肆其病尤大窮理之要不必􅀷求先儒􅀁謂行得卽是者此最至論􅀂論雖高而不可行失之迂且矯此􅀁謂過猶不及其爲失中一也窮理之要不必􅀷求此語有大病殊駭聞􅃪行得即是固爲至論然窮理不􅀷則安知􅀁行之可否哉宰予以短䘮爲安是以不可爲可也子路以正名爲迂是以可爲不可也彼親見聖人日聞善誘猶有是失况於餘人恐不但如此而巳窮理旣明則理之􅀁在動必由之無論高而不可行之理但世俗以茍且淺近之見謂之不可行耳如行不由徑固世俗之􅀁謂迂不行私謁固世俗之􅀁謂矯又豈知理之􅀁在言之雖􅀂甚高而未嘗不可行哉理之􅀁在即是中道惟窮之不􅀷則無􅀁凖則而有過不及之患未有窮理旣􅀷而反有此患也易曰精義入神以致用也蓋惟如此然後可以應務未至於此則凡􅀁作爲皆出於私意之鑿􅄀行而巳雖使或中君子不貴也前􅀁論蘇頴濵正以其行事爲可法耳蘇黄門謂之近世名􅀸則可前書以顔子方之僕不得不論也今此􅀁論又以爲行事可法本朝人物最盛行事可法者甚衆不但蘇公而巳大抵學者貴於知道蘇公早拾蘇張之緒餘晚醉佛老之糟粕謂之知道可乎古史中論黄帝尭舜禹益子路管仲曽子子思孟子老􅆅之屬皆不中理未易槩舉但其辨足以文之世之學者窮理不􅀷因為􅀁昡耳僕數年前亦嘗惑焉近􅀊始覺其繆􅀁謂行事者内以處已外以應物内外俱盡乃可無悔古人􅀁貴於時中者此也不然得於已而失於物是亦獨行而巳矣處已接物内外無二道也得於已而失於物者無之故凡失於物者皆未得於已者也然得謂得此理失謂失此理非世俗􅀁謂得失也􅀂世俗所謂得失者則非君子􅀁當論矣時中之說亦未易言􅀂如來諭則是安常習故同流合汙小人無忌憚之中庸後漢之胡廣是也豈􅀁謂時中者哉大抵俗學多爲此說以開茍且放肆之地而爲蘇學者爲尤甚蓋其源流如此其誤後學多矣答程允夫􅀁示詩文筆力甚快書中􅀁云則未敢聞命别紙條析以徃試熟看數過當自見得大抵自道學不明千有餘年爲士者習於耳目見聞之陋􅀁識􅀁趣不過如此如欲爲文章之士而巳則以吾弟之才少加勉勵自應不在人後但不當妄談義理徒取誚於識者􅀂果有意於古人之學則如􅀁示皆未得其門而入者要須把作一件大事􅀷思力究厚養力行然後可議耳但恐浮艶之詞染習巳􅀷未能勇決棄彼而取此則非僕之􅀁敢知也答程允夫熹承􅀉示前書􅀁諭皆未中理不得不相曉來書謂熹之言乃論蘇氏之粗者不知如何而論乃得蘇氏之精者此在吾弟必更有說然熹則以爲道一而已正則表裏皆正譎則表裏皆譎豈可以析精粗爲二致此正不知道之過也又謂洗垢索瘢則孟子以下皆有可論此非獨不見蘇氏之失又并孟子而不知也夫蘇氏之失著矣知道愈明見之愈切雖欲爲之覆藏而不可得何待洗垢而索之耶􅀂孟子則如青天白日無垢可洗無瘢可索今欲掩蘇氏之疵而援以爲比豈不適􅀁以彰之耶黄門比之乃兄似稍簡靜然謂簡静爲有道則與子張之指清忠爲仁何以異第􅀷考孔子􅀁答之意則知簡靜之與有道蓋有間矣况蘇公雖名簡靜而實隂險元祐末年規取相位力引小人􅀭畏使傾范忠宣公而以巳代之旣不效矣則誦其彈文於坐以動范公此豈有道君子􅀁爲哉此非熹之言前輩固巳筆之於書矣吾弟乃謂其躬行不後二程何其考之不詳而言之之易也二程之學始焉未得其要是以出入於佛老及其反求而得諸六經也則豈固以佛老爲是哉如蘇氏之學則方其年少氣豪固嘗妄觝禪學如大悲閣中和院等記可見矣及其中􅀊流落不偶鬰鬰失志然後匍匐而歸焉始終迷惑進退無據以比程氏正楊子先病後瘳先瘳後病之說吾弟比而同之是又欲洗垢而索孟子之瘢也又謂程氏於佛老之言皆􅀭抑而隂用之夫竊人之財猶謂之盗况程氏之學以誠爲宗今乃隂竊異端之說而公排之以蓋其跡不亦盗憎主人之意乎必􅀂是言則􅀁謂誠者安在而吾弟之􅀁以敬仰之意果何謂也挾天子以令諸侯乃權臣跋扈借資以取重於天下豈眞尊主者哉􅀂儒者論道而以是爲心則亦非眞尊六經者此其心術之間反覆畔援去道巳不啻百千萬里之逺方且自爲邪說詖行之不暇又何暇攻百氏而望其服於巳也凡此皆蘇氏心術之蔽故其吐辭立論出於此者十而八九吾弟讀之愛其文辭之工而不察其義理之悖日往月來遂與之化如入鮑魚之肆乆則不聞其臭矣而此道之傳無聲色臭味之可娯非􅀂侈麗閎􅄛之辭縱橫捭闔之辨有以眩世俗之耳目而蠱其心自非眞能洗心滌慮以入其中眞積力乆卓然自見道體之不二不容復有毫髪邪妄雜於其間則豈肯􅃍然舍其平生之􅀁尊敬向慕者而信此一夫之口哉故伊川之爲明道墓表曰學者於道知所向然後見斯人之爲功知所至然後見斯名之􅁛情蓋爲此也然世衰道㣲邪僞交熾士溺於見聞之陋各自是其􅀁是􅀂非痛加剖析使邪正眞僞判然有歸則學者將何􅀁適從以知􅀁向况欲望其至之乎此熹之􅀁不得不爲吾弟極言而忘其􅆫越之罪也程氏書布在天下􅀁至有之此間􅀁有不過是耳謾􅀉大全集一本􅀛山語録一本去大全中有他人之文目録中已題出矣恐已自有之如未有且留看夏中􅀉來未晚也程氏高弟尹公嘗謂易傳乃夫子自著欲知其道者求之於此足矣不必傍觀他書蓋語録或有他人􅀁記未必盡得先生意也又言先生踐履盡一部易其作傳只是因而寫成此言尤有味試更思之􅀂信得及試用年􅀊之功屏去雜學致精於此自當有得始知前日􅀁謂蘇程之室者無以異於雜薫蕕冰炭於一器之中欲其芳㓗而不汙蓋亦難矣蘇氏文辭偉麗近世無匹􅀂欲作文自不妨模範但其詞意矜豪譎詭亦有非知道君子􅀁欲聞是以平時毎讀之雖未嘗不喜然旣喜未嘗不厭往往不能終帙而罷非故欲絶之也理勢自然蓋不可暁然則彼醉於其說者欲入吾道之門豈不猶吾之讀彼書也哉亦無恠其一胡一越而終不合矣蘇程固嘗同朝程子之去蘇公嗾孔文仲齕而去之也使其道果同如吾弟之􅀁論則雖異世亦且神交豈至􅀂是之戾耶文仲爲蘇􅀁嗾初不自知晚乃大覺憤悶嘔血以至於死見於吕正獻公之遺書尚可考也吾弟未之見耳因筆及此似傷􅀡矣然不􅀡則道不見吾弟察之幸甚答程允夫仁者天理也理之􅀁發莫不有自然之節中其節則有自然之和此禮樂之􅀁自出也人而不仁滅天理夫何有於禮樂此說甚善但仁天理也此句更當消詳不可只如此說過明則有禮樂幽則有􅀑神􅀑神者造化之妙用禮樂者人心之妙用此說亦善禮之用和爲貴禮之用以和爲貴也和如和􅅅可否相濟先王制禮􅀁以節人情抑其太過而濟其不及也􅀂知和而和則有􅀁偏勝如以水濟水誰能食之中庸曰發而皆中節謂之和知和而和則不中節矣以和對同則和字中巳有禮字意思以和對禮則二者又不可不分恐不必引和􅅅相濟之說政者法度也法度非刑不立故欲以政道民者必以刑齊民德者義理也義理非禮不行故欲以德道民者必以禮齊民二者之決而王伯分矣人君於此不可不審此一正君而國定之機也此說亦善然先王非無政刑也但不專恃以爲治耳孔氏之門雖􅀁學者有淺􅀷然皆以誠實不欺爲主子曰由誨汝知之乎知之爲知之不知爲不知是知也教之以誠也􅀂未得謂得未證謂證是謂自欺如此人者其本巳差安可與入道樊遲問智孔子旣吿之矣又質之子夏反覆不知巳不敢以不知爲知也凡此皆爲學用力處此說亦善非其􅀑而祭之謟也謟於􅀑則於人可知矣推說則如此亦可但本文謟字止謂謟於􅀑神耳自孔子謂季氏八佾舞於庭至季氏旅於泰山五段皆聖人欲救天理於將滅故其言哀痛激切與春秋同意此說亦然夏殷之禮􅂎宋固不足徴然使聖人得時得位有􅀁制作雖無􅀁徴而可以義起者亦必將有以處之爲是言者恐後生以私意妄議先王典禮耳夏殷之禮夫子固嘗講之但􅂎宋衰㣲無􅀁考以證吾言耳􅀂得時有作當以義起者固必有以處之但此言之發非謂後生妄議而云耳身有死生而性無死生故􅀑神之情人之情也死生􅀑神之理非窮理之至未易及如此􅀁論恐墮於釋氏之說性固無死生然性字須子細理㑹不可將精神知覺做性字看也居上不寛爲禮不敬臨䘮不哀吾何以觀之哉寛敬哀皆其本也聖人觀人必觀其本實不足而文有餘者皆不足以入道此說得之心有􅀁知覺則明明則公故曰惟仁者能好人能惡人仁者固有知覺然以知覺爲仁則不可更請合仁義禮智四字思惟就中識得仁字乃佳一念之善則惡消矣一念之惡則善消矣故曰苟志於仁矣無惡也又曰未有小人而仁者也此意亦是然語太輕率似是習氣之病更當警察療治也行不由道而得富貴是僥倖也其可茍處乎行不由道而得貧賤是當然也其可茍去乎然則君子處貧賤富貴之際視我之􅀁行如何耳行無愧於道去貧賤而處富貴可也故曰富與貴是人之􅀁欲也不以其道得之不處也貧與賤是人之􅀁惡也不以其道得之不去也當以不以其道爲一句得之爲一句先生批如此說則其字無下落恐不成文理也此章只合依先儒說有得富貴之道有得貧賤之道爲是張子韶云此言君子審富貴而安貧賤亦甚簡當朝聞道夕死可矣天下之事惟死生之際不可以容僞非實有􅀁悟者臨死生未嘗不亂聞道之士原始反終知生之􅀁自來故知死之􅀁自去生死去就之理了然於心無毫髪疑礙故其臨死生也如晝夜如夣覺以爲理之常然惟恐不得正而斃耳何亂之有學至於此然後可以託六尺之􅀌􅀉百里之命臨大節而不可奪也此又雜於釋氏之說更當以二程先生說此處熟味而􅀷求之知吾儒之􅀁謂道者與釋氏逈然不同則知朝聞夕死之說矣君子懐德小人懐土君子懐刑小人懐惠君子安於德義如小人安於居處君子安於法度如小人之安於惠利心之􅀁安一也􅀁以用其心不同耳此蘇氏說之精者亦可取也放於利而行多怨利與害爲對利於巳必害於人利於人必害於巳害於巳則我怨害於人則人怨是利者怨之府也君子循理而行理之􅀁在非無利害也而其爲利害也公故人不得而怨人且不得而怨而况於巳乎此說得之德不􅀌中徳也中必有鄰夫子之道至今天下宗之非有鄰乎此說非是心本仁違之則不仁顔子三月不違仁不違此心也熟味聖人語意似不如此然則何以不言回也其身三月不違心乎凡人有得於此必有樂於此方其樂於此也􅃦可忘也食可廢也蓋莫能語人以其􅀁以然者唯以心體之乃可自見周濂溪嘗使二程先生求顔子􅀁樂者何事而先生亦謂顔子不改其樂其字有味又云使顔子樂道則不爲顔子夫顔子舎道亦何􅀁樂然先生不欲學者作如是見者正恐人心有􅀁繫則雖以道爲樂亦猶物也湏要與道爲一乃可言樂不然我自我道自道與外物何異也須自體㑹乃得之此只是贊咏得一箇樂字未嘗正當說著聖賢樂處更宜於著實處求之易曰敬以􅀡内義以方外敬以養其心無一毫私念可以言􅀡矣由此心而發􅀁施各得其當是之謂義此與中庸言喜怒哀樂未發謂之中發而皆中節謂之和相表裏中庸言理易言學此說是也聖言其􅀁行智言其􅀁知聖智兩盡孔子是也􅀂伯夷伊尹柳下惠者其力皆足以行聖人之事而其知不逮孔子故惟能於清和任處知之盡行之至而其他容有􅀁未周然亦謂之聖者以其於此三者巳臻其極雖使孔子處之亦不過如此故也前輩言人固有力行而不知道者􅀂三子非不知道知之有􅀁未周耳知之未周故伯夷於清則中而於任於和未必中也伊尹柳下惠於任於和則中而於清未必中也易大傳論智常與神相配而中庸􅁛舜亦以大智目之則智之爲言非天下之至神孰能與於此此說亦是但易大傳以下不必如此說智有淺􅀷􅀂孔子之金聲則智之極而無􅀁不周者也學者則隨其知之􅀁及而爲大小耳豈可槩以爲天下之至神乎學道者始於知之終於行之猶作樂者始以金奏終以玉節也孟子之意特取其終始言之不必於金玉上求其義此說亦是但孟子正取金玉以明始終智聖之義蓋金聲有洪纎而玉聲則首尾純一故也不動心一也􅀁養有厚薄􅀁見有正否則􅀁至有淺􅀷觀曽子子夏子路孟子告子北宫􅉳孟施舍之議論趨操則可見矣此章之說更須子細玩索不可如此草草說過郭立之以不動心處巳以擴􅂶之學教人與王介父以高明中庸之學柝爲二致何以異郭立之議論不可暁多􅀋此尹和靖言其自黨論起不復登程氏之門伊川没亦不弔􅀕則其􅀁得可知矣此論未理㑹柝爲二致止恐其􅀁謂不動心者未必孟子之不動心也答程允夫去冬走湖湘講論之益不少然此事須是自做工夫於日用間行住坐卧處方自有見處然後從此操存以至於極方爲巳物爾敬夫􅀁見超詣卓然非􅀁可及近文甚多未暇録且令寫此一銘去此尤勝他文也密院闕期尚逺野性難馴恐不堪復作吏然亦姑任之不能預以爲憂耳􅀁示語孟諸說􅀷見日來進學之力别紙一一答去更且加意如此􅊥討不巳當有得耳丁寜葉仁來時去取書恐更有商量處一一示及􅀌陋無􅀁用心惟得朋友講論則欣然終日千萬有以慰此懷也可欲之謂善此句㝷常如何看因來諭及􅀛山易傳傳出時巳缺乾坤只有草藁數段不甚完備繫辭三四段不絶筆亦不成書此有寫本謾附去然細看亦不甚滿人意不􅀂程傳之厭飫􅂶足潘子淳書頃亦見之蓋雜佛老而言之者亦不必觀向􅀁論蘇學之蔽吾弟相信未及今竟以爲如何他時於巳學上有見處此等自然冰消瓦觧無立脚處遊於聖人之門者難爲言眞不虚語正䝉巳領近泉州刋行程氏遺書乃二先生語録此間􅀁録旦夕得本首當奉􅀉也此學寂寥士友不肯信向吾弟幸有其志又有其才毎一得書爲之増氣更願專一工夫期以數年當有用力處如艮齋銘便是做工夫底節次近日相與考證古聖􅀁傳門庭建立此箇宗㫖相與守之吾弟試熟味之有疑却望示諭秋試得失當巳决早了此一事亦佳然是有命焉亦不足􅀷留意也答程允夫可欲之說甚善伹云可者欲之不可者不欲非善矣乎此語却未安蓋只可欲者便是純粹至善自然發見之端學者正要於此識得而擴充之耳􅀂云可者欲之則巳是擴充之事非善􅀁以得名之意也又謂能持敬則欲自寡此語甚當但紙尾之意以爲須先有􅀁見方有下手用心處則又未然夫持敬用功處伊川言之詳矣只云但莊整齊肅則心便一一則自無非僻之干又云但動容貌整思慮則自然生敬只此便是下手用功處不待先有􅀁見而後能也須是如此方能窮理而有􅀁見惟其有􅀁見則可欲之幾瞭然在目自然樂於從事欲罷不能而其敬日躋矣伊川又言涵養須用敬進學則在致知又言入道莫如敬未有致知而不在敬者考之聖賢之言如此􅀋者亦衆是知聖門之學别無要妙徹頭徹尾只是箇敬字而巳又承苦於妄念而有意於釋氏之學此正是元不曽實下持敬工夫之故若能持敬以窮理則天理自明人欲自消而彼之邪妄將不攻而自破矣至於鳶飛魚躍之問則非他人言語之􅀁能與亦請只於此用力自當見得蓋子思言君子之道費而隱以至于天下莫能載莫能破因舉此兩句以形容天理流行之妙明道上蔡言之巳詳想非有􅀁不觧正是信不及耳欲信得及捨持敬窮理則何以哉􅀁示宗派不知何人爲之昔子貢方人而孔子自謂不睱蓋以學問之道爲有急乎此者故也使此人而知此理則宜亦有􅀁不暇矣無見於此則又何􅀁依據而輕議此道之傳乎若云只據文字􅀁傳則其中差互叢雜亦不可勝道今亦未暇泛論且以耳目􅀁及與前輩􅀁嘗論者言之圖内游定夫􅀁傳四人熹識其三皆未嘗見游公而三公皆師潘子醇亦不云其出游公之門也此殆見游公與四人者皆建人而妄意其爲師弟子耳至於張子韶喻子才之徒雖云親見􅀛山然其言論風㫖䂓摹氣象自與龜山大不相似胡文定公蓋嘗􅀷闢之而熹載其說於程氏遺書之後試􅀷考之則世之以此學自名者其眞僞皆可覈矣胡公答仲并語切中近時學者膏肓之病尤可發􅀷省也三年無改只是說孝子之心如此非指事而言也存得此心則雖或不得巳而改焉亦無害其爲孝矣元祐之於熈豐固有􅀁謂不得巳者然未知當時諸公之心如何若蘇公野花啼鳥之句得無亦有幸禍之心耶答程允夫亦足以發顔子􅀁聞入耳著心布乎四體形乎動靜則足以發明夫子之言矣忠恕誠仁之别誠字以心之全體而言忠字以其應事接物而言此義理之夲名也若曽子之言忠恕則是聖人之事故其忠與誠恕與仁得通言之恕本以推巳及物得名在聖人則爲以巳及物矣侯氏說未嘗誤萬物者誠有病有德者必有言有仁者必有勇洵竊謂有德者未必有言然因事而言則言之中理可必也仁者未必有勇然義􅀁當爲則爲之必力可必也故皆曰必有有德者未必以能言􅁛仁者未必以勇著然云云以下各如􅀁說天下有道則庶人不議不議謂不得與聞國政非謂禁之使勿言也如陽虎之流以庶人而與國政者也恐不如此陽虎饋豚於孔子蓋以大夫自處非庶人也蘇說之誤天何言哉四時行焉百物生焉天何言哉洵竊謂四時行百物生皆天命之流行其理甚著不待言而後明聖人之道亦猶是也行止語黙無非道者不爲言之有無而損益也有言乃不得巳爲學者發耳明道先生言若於此上看得破便信是㑹禪亦非謂此語中有禪蓋言聖人之道坦然明白但於此見得分明則道在是矣不必參禪以求之也如此辨别甚善近世甚有病此言者毎以此意曉之然不能如是之快也子夏曰仕而優則學學而優則仕洵竊謂仕優而不學則無以進德學優而不仕則無以及物仕優而不學固無足議者學優而不仕亦非聖人之中道也故二者皆非也仕優而不學如原伯魯之不說學是也學優而不仕如荷蓧丈人之流是也子夏之言似爲時而發其言雖反覆相因而各有􅀁指或以爲仕而有餘則又學學而有餘則又仕如此則其序當云學而優則仕仕而優則學今反之則知非相因之辭也不知此說是否此說亦佳舊亦嘗疑兩句次序顛倒今云各有􅀁指甚佳遺書載司馬温公嘗問伊川先生欲除一人爲給事中云云洵竊謂若以公言之何嫌之足避豈先生於此亦未能自信邪前賢語黙之節更宜詳味吾輩只爲不理㑹此等處故多悔吝耳近正有一二事可悔忽讀此問爲之矍然上蔡語録中有眞我之語洵竊謂不必如此立論恐啓後人好竒之弊蓋母我之我與我􅀁固有之我字同義異本自分明只下一眞字便似生事二程先生議論不如此上蔡之學􅀁造固􅀷此亦似是其小疵也此說甚當上蔡􅀁云以我視以我􅃪者語亦有病答程允夫􅀛山曰宰我問三年之䘮非不知其爲薄也只爲有疑故不敢隱於孔子只此無隱便是聖人作處􅀛山之意當是如此然聖人之無隱與宰我之無隱亦當識其異處伊川舟行遇風端坐不爲之變自以爲誠敬之力烈風雷雨而舜不迷錯其亦誠敬之力歟舜之不迷此恐不足以言之善爲說辭則於德行或有􅀁未至善言德行則􅀁言皆其自巳分上事也此說得之善與人同以已之善推而與人同爲之也舍已從人樂取諸人以爲善以人之善爲巳之善也此說亦善賢賢事父母事君與朋友交此四者皆能若子夏之言可以言學矣然猶有雖曰未學之語若猶賴乎學者蓋雖能如是而不知其􅀁以能如是者從何而來則􅀁謂行之而不著習矣而不察者也此句意思未見下落請詳言之方可議其得失也羞惡之心義之端故人不可使之無廉恥無廉恥則無以起其好義之心若之何而可化聖人之於民必使之有恥且格者此也人自是不可無恥不必引羞惡好義爲言也知敬親者其色必㳟知愛親者其色必和此皆誠實之發見不可以僞爲故子夏問孝孔子答之以色難據下文恐是言承順父母之色爲難然此說亦好君子周而不比小人比而不周君子循理之􅀁在周流天地之間無不可者其親之也理之􅀁當親也其逺之也理之􅀁當逺也何比之有尊賢容衆嘉善而矜不能此之謂周溺愛狥私黨同伐異此之謂比周周徧也比偏比也不必言周流天地之間謝上蔡曰愼言其餘愼行其餘皆有􅀷意惟近思者可以得之蓋言行有絲毫不愼則於理有絲毫之失則與天地不相似矣愼言其餘愼行其餘籍用白茅之意似此推言於理不害然恐未􅃍說到此也小人之陵上其初蓋㣲􅆫其禮之末節而巳及充其􅆫禮之心遂至於弑父弑君此皆生於忍也故孔子謂季氏八佾舞於庭是可忍也孰不可忍也敢􅆫其禮便是有無君父之心人有中雖不然而能勉彊於其外者君子當求之於其中中者誠也外者僞也故父在當觀其事父之志行者行其志而有成者也父没則人子􅀁以事父之大節始終可覩矣故父没當觀其事父之行事父之行旣巳終始無愧而於三年之間又能不失其平日􅀁以事父之道非孝矣乎此說甚好然文義似未安敏於事如必有事焉之事當爲即爲不失其幾也事只是􅀁行之事必有事焉不知㝷常如何說請詳論之乃見􅀁指之意大抵說經以彼明此固爲簡便然或失其本意則彼此皆不分明􅀁以貴於詳說也子貢曰貧而無謟至告諸往而知來者此爲學之法也亦可以見聖賢悟入􅀷淺處凡窮理自有極致觀聖人如此發明子貢則可見矣此章論進學之實效非論悟入􅀷淺也悟入两字旣是釋氏語便覺氣象入此不得大學􅀁謂知至格物者非悟入之謂死生一理也死而爲􅀑猶生而爲人也但有去來幽顯之異耳如一晝一夜晦明雖異而天理未嘗變也死者去而不來其不變者只是理非有一物常在而不變也更思之子聞之曰是禮也三字可以見聖人氣象宏大後世諸子􅀁不及也詩三百一言以蔽之曰思無邪與闗雎樂而不􅁋哀而不傷皆聖人教人讀詩之法此􅀋言之太略不曉􅀁主之意恐其間有差或致千里之繆也見實理是爲智得實理是爲仁惟仁者能得是理而以得實爲仁則仁之名義隱矣而以得實下疑當有理字理之至實而不可易者莫如仁義禮智信非仁不成如孝弟禮樂㳟寛信敏惠皆仁之用也此數句亦未見下落學者須先有􅀁立故孔子三十而立又曰患􅀁以立然則􅀂何而能立曰窮理以明道則知􅀁立矣立是操存踐履之效􅀁說非是患􅀁以立承不患無位而言蓋曰患無以立乎其位云爾古者言之不出恥躬之不逮也如諸葛孔明草廬中對先主論曹孫利害其後輔蜀抗魏呉其言無一不酬者蓋古人無侈心故無侈言如此􅀁引事不相􅀋劉器之問誠之目於温公曰當自不妄語入此易􅀁謂脩辭立其誠也近之子謂公冶長可妻也長之可妻以其平昔之行也非以無罪陷於縲紲爲可妻也雖嘗陷於縲紲而非其罪則其平昔之行可知吾斯之未能信言我於此事猶未到不疑之地豈敢莅官臨政發之於用乎此事謂何事子謂子貢曰女與回也孰愈孔子以此問子貢則子貢之才亦顔曽之亞然其􅀁以不及二子者正在於以見聞爲學孔子未欲以見聞外事語之故姑云吾與女弗如他日乃警之曰汝以予爲多學而識之者歟道非多學􅀁能識則聞一知十亦非􅀁以爲顔子子貢言聞一知二知十乃語知非語聞也見聞之外復謂何事請更言之忠與清皆仁之用有覺於中忠清皆仁無覺於中仁皆忠清以覺爲仁近年語學之大病如此四句尤爲乖戾蓋若如此則仁又與覺爲二而又在其下矣又敬不違非從父之令謂事親以禮無違於禮也􅀁謂起敬起孝見志不從又敬不違則不得巳而從父之令者有矣勞而不怨則􅀁謂悅則復諌不敢疾怨也若不從而遂違之則父子或至相夷矣居簡而行簡則有志大略小之患以之臨事必有怠忽不舉之處居敬而行簡則心一於敬不以事之大小而此敬有􅀁損益也以之臨事必簡而盡居敬則明燭事幾而無私意之擾故其行必簡爲仁固難歟曰孔子不以易啓人之忽心亦不以難啓人之怠心故曰仁逺乎哉我欲仁斯仁至矣又曰爲之難言之得無訒乎仁固不逺然不欲則不至仁固難爲之則無難致知以明之持敬以養之此學之要也不致知則難於持敬不持敬亦無以致知二者交相爲用固如此然亦當各致其力不可恃此而賚彼也丘之禱乆矣聖人與天地合其德與􅀑神合其吉凶我即天地􅀑神天地􅀑神即我何禱之有自他人言之謂聖人如此可也聖人之心豈以此而自居耶細味丘之禱也乆矣一句語意􅀷厚聖人氣象與天人之分自求多福之意皆可見以能問於不能以多問於寡有􅀂無實􅀂虚犯而不校此聖人之事也非與天同量者不能顔子􅀁以未逹一間者正在此故第曰嘗從事於斯非謂巳能爾也此正是顔子事􅀂聖人則無如此之迹有如此說處便有合内外之意如舜善與人同舍巳從人好察邇言用中於民必兼言之惟顔子行而未成故其事止於如此耳子絶四蓋以此教人也故曰毋毋者戒之之辭毋史記作無當以無爲正未見其止也學必止於中而止非息也於中止行耳百尺竿頭猶須進歩豈有止法乎據上下章止字皆但爲止息之意學止於中乃止其􅀁之止非止息之意字同用異各審其􅀁施竿頭進歩狂妄之言非長於譬喻者四科乃述論語者記孔氏門人之盛如此非孔子之言故皆字而不名與上文不當相屬或曰論語之書出於曽子有子之門人然則二子不在品題之列者豈非門人尊師之意歟四科皆從於陳蔡者故記者因夫子不及門之歎而列之君子之道本末一致灑掃應對之中性與天道存焉行之而著習之而察則至矣孰謂此本也宜先而可傳此末也宜後而可倦哉譬諸草木其始植也爲之區别而已灌漑之長養之自芽蘖以至華實莫不有序豈可誣也然學者多慕逺而忽近告之以性與天道則以為當先而傳教之以灑掃應對則以爲當後而倦焉躐等陵節相欺以爲高學之不成常必由此惟聖人下學上逹有始有卒故自志學充而至於從心不踰矩自可欲之善充而至於不可知之神莫不有序而其成也不可禦焉觀孟子謂俆行後長者爲尭舜之孝弟則灑掃應對進退之際苟行著而習察焉烏有不可至於聖者子夏言我非以灑掃應對爲先而傳之非以性命天道爲後而倦教但道理自有大小之殊不可誣人以其所未至唯聖人然後有始有卒一以貫之無次序之可言耳二先生之􅀃亦是如此但學者不察一例大言無本末精粗之辨反使此叚意指都無歸􅀫須知理則一致而其教不可闕其序不可紊耳蓋惟其理之一致是以其教不可闕其序不可紊也更細思之篤實也學當論其實論其實則與君子者乎與色莊者乎君子有實者也色莊無實者也得之克巳之道篤敬致知而巳非禮勿視勿聽勿言勿動篤敬也所以知其爲非禮者致知也克巳乃篤行之事固資知識之功然以此言之却似不切只合且就操存持養處􅀃方見用力切要處言顧行行顧言故古者言之不出耻躬之不逮也中庸曰力行近乎仁論語司馬牛問仁子曰爲之難言之得無訒乎答司馬牛之意更宜思之質直而好義則能脩身察言而觀色則能知人内能脩身外能知人而又持之以謙此盛徳之士也雖欲不逹得乎此與祿在其中同意名實相稱之謂逹有名無實之謂聞察言觀色如孟子所謂聽其言也觀其眸子人焉瘦哉孔子所言三句皆誠實退讓之事能如此則不期逹而自逹矣非謂能脩身知人而持之以謙也􅀃知人猶逺正意子路問政子曰先之勞之請益曰無倦凡不教而殺不戒視成慢令致期皆無以先之也旣有以先之又當有以勞之帝尭曰勞之來之凡生之而不傷厚之而不困皆勞之之謂也此尭舜之政也其要在力行耳故復告之以無倦先之謂以身率之勞之謂以恩撫之二者苟無誠心乆必倦矣故請益則曰無倦而巳簿書期㑹各有司存然後吾得以留意教化之事故曰先有司先有司然後綱紀立而責有所歸答程􅁢夫張子曰天性在人猶水性之在冰凝釋雖異其爲物一也觀張子之意似謂水凝而爲冰一凝一釋而水之性未嘗動氣聚而爲人一聚一散而人之性未嘗動此所以以冰喻人以水性喻天性也然極其􅀃恐未免流於釋氏兄長以爲如何程子以爲横渠之言誠有過者正謂此等發耳觀孔子子思孟子論性似皆不如此康節云性者道之形體也心者性之郛郭也身者心之區宇也物者身之舟車也􅀑神之理某向嘗䝉指示大意云氣之來者爲神徃者爲􅀑天地曰神曰祗氣之來者也人曰􅀑氣之徃者也此􅀃與張子所謂物之始生氣日至而滋息物生旣盈氣日反而㳺散至之謂神以其伸也反之謂􅀑以其歸也之意同近見兄長所著中庸􅀃亦引此然張子所謂物者通言萬物耶抑特指􅀑神也􅀂特指􅀑神則所謂物者如易大傳言精氣爲物之物爾􅀂通言萬物則上四句乃泛言凡物聚散始終之理如此而下四句始正言􅀑神也精氣爲物嚮亦嘗與季通講此渠云精氣爲物者氣聚而爲人也遊魂爲變者氣散而爲􅀑神也此􅀃如何更望詳賜批教易大傳所謂物張子所論物皆指萬物而言但其所以爲此物者皆隂陽之聚散耳故􅀑神之徳體物而不可遺也所謂氣散而爲􅀑神者非是答程􅁢夫程子曰􅀑神者天地之妙用造化之迹也凢氣之往來聚散無非天地之用而􅀑神尤其妙者也然旣巳動於氣見於用矣是形而下者也故曰造化之迹吕氏曰萬物之莫不有是氣氣也者神之盛也莫不有是􅅎􅅎也者􅀑之盛也故人亦􅀑神之㑹爾中庸􅀃曰􅀑神之爲徳雖不可以耳目見聞接然萬物之聚散始終無非二氣之屈伸往來者是􅀑神之徳爲物之體而無物能遺棄之者也向按此二􅀃則張子所謂物之始生氣日至而滋息物生旣盈氣日返而㳺散乃泛言萬物聚散始終之理如此而􅀑神者亦物之一爾但其徳在物之中為尤盛故爲物之體而莫有能遺之者人亦物之一也其歛散終始亦二氣之屈神往來與􅀑神同故吕氏曰人亦􅀑神之㑹耳然則非特人也凡天地之間禽獸草木之聚散始終其理皆如此也其理一而其得於氣者有隱顯偏正厚薄之不同兹其所以有􅀑神人物之異歟謝氏曰􅀑神是天地妙用流行充塞觸目皆是欲其有則有欲其無則無􅀑神氣也人心之動亦氣也以氣感氣故能相為有無吕氏曰􅀑神周流天地之間無所不在雖寂然不動然因感而必通即此意也詳此兩叚皆是人物􅀑神各爲一物是殆見廟中泥塑􅀑神耳吕氏所謂人亦􅀑神之㑹者甚精更請細推之答程􅁢夫太極解義以太極之動爲誠之通麗乎陽而繼之者善屬焉諍爲誠之復麗乎隂而成之者性屬焉其􅀃本乎通書而或者猶疑周子之言本無分􅀠之意陽善隂惡又以􅀋分又曰中也仁也感也所謂陽也極之用所以行也正也義也寂也所謂隂也極之體所以立也或者疑如此分配恐學者因之或漸至於支離穿鑿不審如何此二義但虚心味之乆當自見􅀂以先入爲主則辯􅀃紛拏無時可通矣仁義中正洵竊謂仁義指實徳而言中正指體叚而言然常疑性之徳有四端而聖賢多獨舉仁義不及禮智何也中正即是禮智解義曰程氏之言性與天道多出此圖然卒未嘗明以此圖示人者疑當時未有能受之者也是則然矣然今乃遽爲之􅀃以傳之是豈先生之意耶當時此書未行故可隱今日流布巳廣􅀂不􅀃破却令學者枉生疑惑故不得巳而爲之􅀃爾濂溪作太極圖􅀤明道化之原横渠作西銘掲示進爲之方然二先生之學不知所造爲孰􅀷此未易窺測然亦非學者所當輕議也程子曰無妄之謂誠不欺其次矣無妄是聖人之誠不欺是學者之誠如何程子此叚似是名理之言不爲人之等差而􅀤也近思錄載横渠論氣二章其􅀃與太極圖動靜隂陽之􅀃相出入然横渠立論不一而足似不􅀂周子之言有本末次第也橫渠論氣與西銘太極各是􅀤明一事不可以此而廢彼其優劣亦不當輕議也程子曰孔子言語句句是自然孟子言語句句是事實所謂事實者豈非是當行可行底事耶然未可謂自然者豈以其猶是思焉而得之歟大槩如此更翫味之所教學者㸔精義􅀃甚善然竊以爲學者須先從師友講貫粗識梗槩然後如此用工不然恐眩於衆􅀃之異同也此乃憚煩欲速之論非所敢聞然亦非獨此書爲然􅀂果有志無書不可讀但能剖析精微翫味乆熟則衆􅀃之異同自不能眩而反爲吾磨礪之資矣答程􅁢夫昨來疑義乆不奉報然後來長進又見得前􅀃之是非也每與吾弟講論覺得吾弟明敏㸔文字不費力見得道理容易分明但似少却玩味踐履功夫故此道理雖㸔得相似分明却與自家身心無干渉所以滋味不長乆􅂊過了便休反不如遲鈍之人多費功夫方㸔得出者意思却乆逺此是本原上一大病非一詞一義之失也記得向在高沙因吾弟􅀃覺得如此講論都無箇歸􅀫處曽奉答云講了便將來踐履即有歸􅀫此語似有味更告思之草此爲報不能多及餘惟力學自愛答程􅁢夫版籍固所職然埶有所壓而不得爲則亦無可奈何潘憲却要理㑹事俟出入少定試更白之或能相聴亦百里之幸也版籍分明自是縣道理財之急務今人只見重疊催稅之利而不察郷吏隱瞞之害故不肯整理此是上下俱落在厮兒計中甚可歎也石鼓之役意思甚好但恐擇之却難處耳魏公好佛敬夫無如之何此正明道先生所謂今之入人因其高明所以爲害尤甚不知這些邪見是壞却世間多少好人破却世間多少好事也誠字得力甚善然知之亦巳晚矣凡百就實事上更著力爲佳答黃子厚知讀精義有得􅀹以爲喜大指固不出二先生之􅀃然並觀博考見其淺深踈宻於毫􅁵之間尤能􅀤人意思使人益信二先生之􅀃不可易也忠信只是一事但自我而􅀚謂之忠自彼而觀謂之信此先生所以有盡巳爲忠盡物爲信之論也鄙意如此試思之然否却見諭登山之興前日失之於跬歩之間今復冐暑而徃則有所不能矣或恐欲㝷舊約即請見過却議行計也伯㳟甚愛上嵐山水前日經行適值風雨􅀹快心目也晦庵先生朱文公文集卷第四十一晦庵先生朱文公文集卷第四十一考異程􅁢夫問答此其心跡之間跡一作術此句更索消詳索一作當至於鳶飛魚躍之問問一作間理之至實理一作道閩縣儒學教諭王製校
