body:
  text: 碑静江府虞帝廟碑廟故有鼻亭神及唐武曌象皆斥去之静江府故有虞帝祠在城東北五里而近虞山之下皇澤之灣蓋莫詳其始所自立而有唐世刻詞在焉有宋淳熈二年春二月今直祕閣張侯栻始行府事奉奠進謁仰視棟宇傾墊弗支圖象錯陳簉以滛厲則竦然曰帝德在人其神在天威靈所加無有逺邇降祠兹土粤有故常而因陋踵訛以至于此弗圖弗革某實懼焉巳事則命撤而新之時又方按國典毁諸旁祀不如法者因悉致其羙材文石以奉兹役作治逾時訖事以告門􅀚嚴顯龎雜逺屏外朝内寢惟帝及二妃之神恭巳靣南儼然臨之秋七月癸未侯率其僚奉承牢醴俯伏灌薦以妥皇靈肸蠁旣通拜手言曰天降生民厥有常性仁義禮智父子君臣爰及昆弟夫婦朋友是曰天叙民所秉􅃔失之毫分穹壤易位惟帝躬聖誠明自然慈孝于家仁敬于􅀖友弟刑妻取人與善從容鉅細各極其極如規之圓如矩之方使凡天下後世之爲人倫者莫不取則髙明慱厚化育並流孰是遐陬敢􅀻其施惟蒼捂野謂帝所藏寅縁此􅀖􅀗恭明祀兹率群吏釁於新宫穆穆威神不仁者逺敢不再拜稽首惟帝之神實臨照之於是三獻成禮神人浹和吏民駿奔咏嘆興起合辭懇請願著石章伻來謁辭以詔無極熹竊惟帝之所以配天立極法施無窮者旣非文字形容所及而傳記所稱南廵不反遂葬蒼梧者又非經言無所考信則皆罔敢知惟是天理人倫之際帝之所以幸教後世者蓋嘗與侯講而志之於侯之意庶㡬識其所以然者乃敬􅂐而顯詩之俾歸刻焉其詩曰虞山之土灕水之滸誰脩虞祀九歌招舞有翼張侯牧此南州懷帝之仁答其祐休載瞻祠宇頽剥支柱明靈弗蠲􅁋傲駢伍乃教綱紀乃夷乃攻乃堂乃基峻宇崇墉帝降不遲四門穆穆侯樂其成來饋來祝惟帝之徳規圓矩方即物而則大倫以光爰自側微動植潜􅀍恭巳當天雲行雨施惠于來世億萬斯年穹天慱地峙嶽流川矧是卉裳舊惟聲教愀然見之興起則效子􅂭于孝臣力其忠侯拜稽首惟帝之功少􅀓劉公神道碑淳熈五年秋七月某日觀文殿學士彭城劉侯珙薨於建康之府舎疾革時手爲書授其弟玶使以屬其友朱熹􅀂曰珙不孝先公少􅀓之墓木大拱而碑未克立蓋猶有待也今家國之讎未報而珙衘恨死矣以是累子何如熹發書慟哭曰嗚呼共父􅃍至此耶且吾蚤失吾父少傅公實􅀵教之共父之責乃吾責也即訪其家得公弟屏山先生所次行狀又得今江陵張侯栻所爲銘以次其事曰公姓劉氏諱子羽字彦脩其先自長安徙建州今爲崇安縣五夫里人曾大父贈朝議大夫太素大父贈太子太保民先皆以儒學教授鄉里而皇考資政殿學士贈太師忠顯公遂以忠孝大節殺身成仁事載國史公其嗣子也少以父任􅀘將仕郎積勞轉宣教郎權浙東安撫司書寫機宜文字入主太僕太府簿遷光禄丞辟河北河東宣撫司書寫機宜文字以功轉朝請大夫授直祕閣建炎三年擢充祕閣修撰知池州改集英殿修撰知秦州未行除御營使司叅賛軍事辟川陜宣撫處置使司叅議軍事四年除徽猷閣待制紹興二年領利州路經略使兼知興元府除寳文閣直學士封彭城縣開國男食邑三百戸三年責授單州團練副使白州安置四年還故官提舉江州太平觀復爲集英殿修撰知鄂州權都督府參議軍事宣諭川陜踰年還報復待制知泉州八年落職奉祠尋責散官漳州安置十年以赦得還十一年復故官起爲沿江安撫使知鎭江府十二年復待制進爵子益封二百戸是􅀊罷復爲太平祠官五年而薨年五十矣公天姿英毅自少卓犖不羣年二十四五時佐忠顯公守越以羸卒數百破睦㓂方臘數十萬衆卒全其城復佐忠顯公守眞定㑹女眞入㓂以大兵圍其城公設方略登陴拒守數月虜不能下而去忠顯公旣以節死公挾喪歸葬號天泣血以必報讎恥自誓朝廷亦素知其材使參御營使軍事時叛將范瓊擁彊兵據上流召之不來來又不肯釋兵中外洶洶知樞密院事張忠獻公與公密謀誅之一日爲遣張俊以千人度江捕他盗者使皆甲而來因召瓊俊及劉光世詣都堂計事爲設飲食食巳諸公相顧未發公坐廡下恐瓊覺事變􅃍取黃􅁓執之趨前舉以麾瓊曰下有敕將軍可詣大理置對瓊愕不知所爲公顧左右擁置輿中衛以俊兵送獄使光世出撫其衆數瓊在圍城中附賊虜迫脅二聖出狩狀且曰所誅止瓊耳汝等固天子自將之兵也衆皆投刃曰諾因悉麾􅀠他軍頃刻而定瓊竟伏誅張公由此益竒公及使川陜遂辟以行至秦州立幕府節度五路諸將規以五年而後出師明年虜窺江淮急張公念禁衛寡弱計所以分撓其兵􅀔者遂合五路之兵以進公以非本計爭之張公曰吾寜不知此顧今東南之事方急不得不爲是耳遂北至富平與虜遇戰不利虜乗勝而前宣撫司退保興州人情大震官屬有建䇿徙治夔州者公叱之曰孺子可斬也四川全盛虜欲入冦乆矣直以川口有䥫山棧道之險未敢􅃍窺耳今不堅守縱使深入而吾乃僻處夔峽遂與􅀜中聲援不復相聞進退失計悔將何及今幸虜方肆掠未逼近郡宣司但當留駐興州外繋􅀜中之望内安全蜀之心急遣官屬出􅀜呼召諸將􅀵集散亡分布險隘堅壁固壘觀釁而動庶㡬猶或可以􅀘前愆續後咎柰何乃爲此言乎張公然公言而諸參佐無敢行者公即自請奉命北出復以單􅀐至秦州分遣腹心召諸亡將諸亡將聞命大喜悉以其衆來會公命驍將呉玠柵和尚原守大散􅀜而分兵悉守諸險塞虜諜知我有備引去明年虜復聚兵來攻再爲玠所敗俘􅀗萬計蜀士以安宣撫司移軍䦘州公請獨留􅀜外調護諸將以通内外聲援軍民之心翕然向之又明年漢中大饑諸帥閉境自守因有違言皆願得公與連兵張公承制可其請公至鎭開􅀜通啇輸粟輯睦鄰援􅅚兵練卒柵險待敵㑹虜復入㓂將道金啇以鄉四川公以書諭金州經略使王彦使伏彊弩於險以俟之彦習用短兵屢平小盗不以公言爲意虜猝至不知所爲逆戰果敗走保石泉時吳玠爲秦鳯經略使公聞彦失守亟移兵守饒風嶺且以語玠玠大驚即越境而東一日夜馳三百里中道少止請公會西縣計事公報曰虜旦夕至饒風下不亟守此是無蜀也公不前吾當徃今又西走不知者謂吾懼而逸爾諸將得無解體乎玠得書即復馳至饒風列營拒守虜人悉力仰攻死傷如積更募死士由間道犯祖溪􅀜以入繞出玠後玠􅃍走還漢中且來邀公欲與俱去公不可留玠先柵定軍山以守玠不可公不得巳退守三泉從兵不及三百人與士卒同粗糲至取草牙木甲噉之遺玠書與訣玠持之泣下欲馳赴公未果其愛將楊政者大呼軍門曰公今不行是􅀒劉公政輩亦且舎公去矣玠乃來㑹三泉時虜游􅀐甚迫玠夜不􅄰起視公方甘􅃦自􅀂旁無警何者􅃍起公請曰此何等時而簡易􅀂是公􅁣然曰吾死命也亦何言玠慙嘆泣下竟不果留公以潭毒山形斗㧞其上寛平有泉水乃築壘守之儲粟十餘萬石盡徙將士家屬柵中積石數十百萬下臨走蜀道數日虜果至營數十里間一夕候􅀐報虜大軍且至諸將皆失色入問計公曰始與公等云何今㓂至欲避邪下令蓐食遲明上馬先至戰地前當山角據胡牀坐諸將追及泣請曰某輩乃當致死於此非公所宜處也公不爲動虜知不可攻亦引退自虜入梁洋蜀中復大震宣撫司官屬爭咎公更爲浮言相恐動力請張公徙治潼川令下軍士憤怒或取其牓毁之公亦以書力爲張公言此巳爲死守虜必不敢越我而南藉令不能守我死行未晚也今一旦輕動􅀂此兵將忿怒恐將有齮齕公墳墓者柰何張公發書大悟立止不行虜遣十餘人持書與旗來招公及玠公斬之餘一人使還曰爲我語羣盗欲來即來吾有死耳何可招也因復與玠謀出銳師腹背撃之未及期而虜巳遁矣蓋方虜未至公巳悉徙梁洋官􅀻之積置他所虜旣深入無所得而糧日匱前後苦攻死傷十五六又聞公之將襲巳也懼故遁公亟遣兵追撃之墮谿谷死者不可計其餘衆不能自拔者猶數十柵皆降之是時虜大酋􅐰离喝兀术輩主兵用事計必取蜀以窺東南其選募戰攻蓋巳不遺餘力而我之謀臣戰將亦無敢爲必守計者獨公與張公恊心戮力毅然以身當兵衝將士視公感激爭􅁬卒全蜀境以蔽上流冦退又方相與定計改紀軍政以圖再舉而張公巳困於讒公亦相次得罪徙白州矣始呉玠爲禆將未知名公獨竒之言於張公張公與語大恱使盡護諸將至是上䟽請還所假節傳棨㦸贖公罪士大夫以是多玠之義而服公之知人旣張公入相大議合兵爲北討計召公赴闕使諭指西師且察􅁁備虚實公還奏虜未可圖冝益治兵廣營田以俟㡬㑹時又方議易置淮西大將且以其兵屬公公復以爲不可遂以親老丐郡以歸泉僧可度以賂結中貴人屬戚里陳氏誣奏奪陳洪進守􅃁寺符州奉行公曰此細事爾然小人罔上如此是乃履霜之漸不可長也即䟽其事以聞僚屬相顧莫敢連署公乃獨奏極言之可度等皆抵罪旣又大興學校以教其人堂序規模略放大學至今爲閩中諸郡之冠巳而淮西軍果亂議者反謂公實使然不責無以係叛將南歸之望於是有臨漳之行聞者􅅓之而公不自辯也在鎭江㑹金虜復渝盟公建議清野盡徙淮東之人於京口撫以威信兵民雜居無敢相侵擾者嘗得盗劾之乃楚州守某者所爲前後攻劫不可計悉具獄弃之市某者亦坐逺竄於是境内帖然道不拾遺旣而虜􅀐乆不至樞密使張俊視師江上以問公公曰此虜異時入㓂飄忽如風雨今更遲回是必有他意巳而果復以和爲請使至植大旗舟上書曰江南撫諭公見之怒夜以他旗易之翌日接伴使者見旗有異大懼索之急公曰吾爲守臣朝論無所與然欲掲此於吾州之境則吾有死而巳索猶不巳乃遣人境外授之會張俊歸奏事上聞公治狀及料敵語於是復有待制之命公以和戎本非乆逺計冝及間暇時修城壘除器械備舟楫以俟時變宰相秦檜不悅諷言者論之罷歸遂不復起薨後十有六年和議果敗虜􅀐直抵采石􅆶洲江津㡬不守於是人始服公前慮之深而恨其不及用也熹之先人晚從公㳺疾病寓書以家事爲􅀉公惻然憐之收教熹如子姪故熹自㓜得拜公左右然巳不及見公履戎開府時事獨見其居家接人孝友樂易􅄏心見誠豁然無纎芥滯吝意好賢樂善輕財喜施於姻親舊故貧病困阨之際􅀹孜孜焉因嘗從公門下士及一二故將問公平生大節又知其忘身狥國之忠决機料敵之明得將士心人人樂爲盡死事皆偉然雖古名將不能過至其爲政則又愛民禮士敦尚教化决姦擿伏不畏彊禦乃有古良吏風及公旣没然後得其議奏諸書讀之知其痛憤無日不在於讎虜而其識慮之深又如此未嘗不􅁣然撫卷廢書而歎也公元妃福國夫人熊氏葬拱辰山忠顯公墓次而屏山先生實表之􅁇室慶國夫人卓氏公没持家二十餘年細大有法内外斬斬彭城侯雖熊出然其撫之厚而教之嚴所以成就其徳業爲多遇族黨親踈曲有恩意薨荆南府舎葬甌寜縣演平之原公子三人彭城侯爲長次瑺承務郎出後公弟祕閣公早卒次玶從事郎亦以公命爲屏山先生後孫男二人學雅承務郎學裘尚㓜女二人長適將仕郎吕欽次未行熹惟公家三世一心以忠孝相傳事業皆可記而公所處􅀹艱且勤績效最著人至于今頼之於是旣悉論載其實又泣而爲之銘以卒承彭城侯之遺命其銘曰天警皇徳曰陂其平復􅂌人傑俾扶厥傾薄言試之于越于鎮卒事于西亦危乃定始郤于秦偪仄飄揺一士之得厥猷以昭再蹶于梁莫相予死亦障其衝校績愈偉岷嶓旣奠江漢滔滔爾職于佚我司其勞曽是弗圖䜛口嗸嗸載北載南倐貶其褒曰和匪同識㣲慮逺豈不諄諄卒莫予展我林我泉我􅀉不淺莫年壯心有逝無反惟忠惟孝自我先公勉哉嗣賢克咸厥功豈不咸之又毁于成詩勸來者永其休聲龍圖閣直學士吳公神道碑淳熈十年夏六月日龍圖閣直學士通奉大夫臨海郡開國公食邑二千四百戸致仕吳公薨于台州仙居縣湖山􅀻第之正寢訃聞天子閔焉詔有司以光禄大夫告其第如故事冬十月癸酉嗣子津等葬公石井中奥之原旣畢事將考令式勒文螭首顯誦公徳傳之無窮乃相與謀使仲子洪以公門生臨川太守陳侯庸之狀來即建安山中請其文於熹熹􅀼聞之當紹興之季年天子憤戎虜之慿陵痛神人之羞辱􅁣然有意收用耆俊以遂中興之烈其所引抜以爲諌諍論議之官者多得直諒敢言之士而吳公者又其偉然有聞於時者也迨其晚􅀊竟以剛鯁不得盡行其志退而老於湖山之下極登臨游泛之樂者十餘年天下莫不髙之而其所立之詳世猶有未悉聞者幸今有碑以詔後世是筆所屬可非其人欲謝不能則又顧念往以使事過公里門公聞其來野服以便輿出見邀於湖上延坐與飲論􅀃平生俯仰感􅁣遂以身後之傳爲託於時謂公特戯語耳不敢承亦不敢辭今雖極自知其不稱然昔旣不及辭於公今又安得辭於公之子耶乃考臨川之狀以次其事如左公諱字明可世爲仙居人上世隱徳不仕至公大父贈武略郎諱􅁢昭始教子孫爲學而公與從兄詠謙遂連取科第及公至大官而贈其父諱師錫至光禄大夫母鄭氏臨海郡夫人公㓜莊重嶷然如成人讀書刻苦至忘􅃦食登紹興二年進士第始爲温州樂清尉瀕海細民以􅀒販魚鹽爲生業屬更定法有􅀻以鹽越境者尉皆劾免旁縣跡捕紛然公獨􅀂不聞曰此貧民之失業者吾其忍以一身之病而愈蹙之耶大治學宫聚其秀民子弟教之其後人材輩出有以直言冠多士爲名臣者更調平江府録事參軍除詳定一司敕令所刪定官遷祕書省正字始公與秦丞相檜有舊至是秦巳顓政事士夫趨附者衆公處其間獨退然如未嘗相識者公坐旅進寒温而巳秦固巳疑之㑹四川宣撫使鄭公剛中薦公自代其狀謂公雖適效一官而髙逺之度常􅀂超邁秦見之愈不樂一日語公曰髙自標置是豈長者之爲乎諷言者論罷之差通判處州事歷佐婺州紹興府檜死乃得知處州未行丁外艱服除知常州又改處州始至諸邑以例獻錢實公帑公曰縣經賦猶不足而欲以此自媚得無病吾民乎盡斥還之民舊苦丁絹重公命損之而以新丁􅀘其額人以爲便踰􅀊以憂去未終喪而諌官何溥薦公材中御史荐有召命免喪入對即除監察御史時金亮將渝􅉀公勸上專務修徳以服之彼以其力我以吾徳則雖彊弱之􅀔不侔而勝􅀒之形已見顧今誠能毋以敵之進退爲憂喜毋以事之緩急爲作輟每下詔令必務痛自悔咎延見羣臣必使力陳闕失隱之心而悉有合於天地發之政而盡無愧於祖宗則人心悅服天亦助順矣上韙其言顧而歎曰何􅄎知人哉未㡬除殿中侍御史㑹两淮戰不利人情惴恐廷臣争陳退避之計公獨􅁬然請對曰今日之事有進無退進爲上䇿退爲無䇿􅀂誤聽此屬之言臣恐士氣衰竭人心沮喪大事去矣有如六飛未􅃍行且以建王爲元帥先往撫師其亦可也上然之未及發而亮巳􅀍屠中原遺民自望王師之至公數奏請乗此機會决䇿親征速圖進取旣上至建康公又言金陵自古英雄以爲帝王之宅矧今北􅁟之人謳吟未改旣聞大駕臨江此必延頸舉踵以望振抜宜遂駐蹕以繋其心上巳開納會有密啓還東者事下侍從臺諌集議以聞公曰今欲控帶襄漢引輸湖廣則臨安不如建康之便經理淮甸􅀿接梁宋則臨安不如建康之近議者徒以一時扈從之人内顧思歸故爲是說以悅其意豈爲國計者哉過聽其言臣恐回鑾之後西師之聲援不接北􅁟之謳吟絶望非細事也然時上下欲歸者衆公言雖苦竟不能奪天下至今惜之髙麗舶主詣明州自言其國願得遣使入賀詔將許之公言髙麗與金人接壌爲之役屬無故有此安知其不爲閒乃詔郤之是時天子臨御旣乆專以文徳厚下故其末流下吏奉承不無因循之弊公於是抗䟽力陳更化之􅀃欲以救時病彊國勢又言欲求死節之士於倉卒之時不􅀂進剛直之士於閒暇之日去􅀊两淮望風奔潰曽無一城能拒守者此秦檜壅塞言路摧折士氣之餘􅧆也能反其道則士氣日振而見危致命者亦有人矣至於廟堂不守詔條以啓僥倖扈從官吏無功受賞大將失軍長吏失守未正刑典戍役方還復行揀􅀧以動衆心凡事有不合於理不便於時者無不悉意盡言􅀘助爲多薦周操陳良翰陳良祐爲御史後皆以諫諍顯在職才半􅀊用事者惡之以公有㑹計名亟白使權戸部侍郎實以解其言職會有詔問足食足兵之䇿公言今大農􅀊入視景徳盛時什加其四而内藏激賞不與焉則賦不可以有加中外兵籍略比太宗定天下時而糧賜什九於他費則兵不可以更募獨有節浮侈精簡閱使官不蠧財而人皆可用則庶乎其可耳俄以集英殿修撰知婺州時今上􅀄即位公陛辭首陳裴垍對唐憲宗爲治先正其心之􅀃以爲臨御之􅀄出治大原無越於此上嘉納焉未入境先詢邑宰能否去其􅀹罷懦不任職者人問其故公曰令於民最親苟非其人太守雖有愛民之心亦何自而逹乎郡帑空乏軍餉不時􅀒上供課亦以萬計公曰是所謂無政事者也即禁掊克减征賦窒滲漏官吏之侵漁假貸者悉寘之法不一两月而公􅀻巳告足矣常患差役不均多致爭訟欲勸民爲義役有言金華長仙鄊民十有一家自以甲乙弟其産以次就役者㡬二十年矣公聞之喜帥郡佐及縣長吏輿致所謂十一人者與合宴于平政堂而更其鄊曰循理里曰信義以褒異之又以鄊之前輩梅公執禮宗公澤潘公良貴鄭公剛中皆以名節才行聞當世乃自爲文以醊其墓居無何詔以公治郡有異等之效改知紹興府充两浙東路安撫使始至宗室子有横於市者公致之獄宗正司遣吏索之相持訩訩公即自劾以聞詔公無罪而以宗室子屬宗正司施教刑焉一郡竦服會稽民貧賦重而折色爲􅀹甚公以永祐菆宫在焉爲奏得視永安縣故事免支移折變邑人便之髙麗竟遣使來公聞其至明州亟草奏申前議得卒謝遣城南鏡湖自東漢時潴以漑田爲利甚廣中廢不治南豐曽舎人佐郡時嘗爲之圖而序之論其利病甚悉公前嗣其官讀其文而有志焉及來鎭守逢􅀊大饑上親札命公賑捄乃得奏請發常平米募饑民以就其役旣成取凡奏請施行之語刻石湖上所以禁防者無不備然公去不一年守臣不能安集流徙反歸咎復湖姦民大姓利於爲田亦結權貴騰謗議而湖復廢矣論者惜之前虜􅀐度浙江郡守以城降而衛士唐抱石狙撃其酋帥不中死罵不絶口越人祠之􅀊乆廢壞公爲改築宫而記其實以勸忠義除權刑部侍郎召對言臣自越來竊感勾踐臥薪嘗膽之意願陛下毋恃虜之必和而益求所以自治如勾踐之爲者以俟時至而後圖之蔑不濟矣又言江浙大水乃陽不勝隂之咎因舉康澄六事爲獻遷給事中謝日靣賜金帶象簡宗室居廣祈恩過制公引前詔郤之不踰月改吏部侍郎會臨安守坐不能詰盗免詔以公爲敷文閣直學士知府事充两浙西路安撫使命下之日都人相賀而吏屬屏氣入謝廷中内侍省爲人求薦及以他鄙事爲屬者公曰吾薦章不可以求而得􅀂某事則詣府自言吾得以法决之耳自是人莫敢干以􅀻大閹髙思聦家僮毆傷酒保公命捕論如法以徇于市宗戚貴人􅀻營佛屋錯雜民㕓藏匿姦盗吏不敢捕公奏請盡撤之由是權豪反目而執政亦不恱託以使虜復除吏部侍郎且議以龍大淵爲副公曰是可與言行事者耶語聞得罷不行而下遷禮部侍郎公力求去乃以舊職提舉江州太平興國宫始公與今退􅀓陳福公俱以剛直見忌於時宰至是陳公以書賀公有鴻鵠髙翔之語未㡬亦引去而中書舎人閻安中乗間爲上言二臣之去非國之福云居再􅀊起知太平州當塗民淳事簡舊爲樂圡而連年調發凋瘵特甚公一意拊摩常賦外一毫不以取民城樓圯壞􅀊調諸縣葺之民病無窮而形制衰削公命撤而新之又維舟以梁姑溪令可度朝命賦甓諸郡以城两淮公以羡財募陶旊又先事以集而民皆莫之知也歴陽築者乆役潰歸聲言欲趨郡境吏民振恐公呼至城下厚犒遣之而密捕倡亂者繋獄以聞有詔襃諭二年進徽猷閣直學士知􅂭興府充冮南西路安撫使江西地廣多盗而大姓武㫁鄊曲爲良民害公䋲以法不少貸曰稂莠去然後嘉榖蕃吾非得巳也㑹􅀊大札巫覡乗間惑人禁㫁醫藥天橫者衆公命縣賞禁絶集群醫分井治療貧者食之全活不可計城舊有䂊章溝比乆湮塞民病塗潦公曰溝洫不通氣鬰不泄疫厲所由生也亟命䟽濬民得爽塏以居公凡六爲郡政各因其俗爲寛猛實惠之可以及人者爲多事有􅀜於教化者未嘗不以爲先嘗言爲􅀖之惠欲其有以徧於里閭唯受兩稅之輸爲不可以不謹故所至必擇廉吏以司之省其沿納諸費而掲其所不可巳者扵塲門輸粟者使得自槩量吏無所容其巧人甚便之自當塗及是凡六上章丐閑不允三和陶公歸來之章以見意至是遂以納禄爲請乃復得太平祠官以歸實乾道之六年也公自少即以氣節自􅀒爲人夷曠無城府早􅀊游太學人巳自目爲豪呉矣建炎􅀄宗澤留守東都天下􅀝以爲重一日士女傾都南下皆行哭失聲言宗公死矣公時未仕客臨安聞之嗚咽流涕終夕不寐爲詩哭之語甚悲壯即日傳播郵亭傳舎處處題寫讀者至爲感泣識者因是益以竒之自爲小官一時卿相名人見者無不推重歸自􅁽府徊翔十有八年僚友有先進用居廟堂者公未嘗以一言求薦引居常慷􅁣謂直道可必行而勲業可立就中間立朝多骯髒不偶又不肯少貶以求合始浩然有歸志矣故嘗卜居其郷石井之西􅀒山臨湖雜蒔華竹築亭館其間延袤數里牓曰湖山清曠窈窕甲於東中至是來歸遂决終焉之計乃作休休之堂而賦詩焉自謂有七宜休者連上章告老不得謝及年七十有一請愈力乃得以龍圖閣直學士致仕於是又作景䟽希白之堂而自號曰湖山居士日與賔客浮舟􅀝杖徜徉其間酌酒賦詩竟日夕不倦如是者十有四年蓋巳翛然􅀂無意於世者而獨其愛君憂國之心未嘗一日忘也中以太上皇帝慶壽推恩故侍臣加以耋老自中大夫特遷通奉大夫薨時年適八十矣娶縉雲郭氏贑州興國縣丞澠之女累封碩人孝謹和懿治家有法度先公兩月卒子男五人津承議郎通判紹興府事洪宣教郎浙東提舉常平司幹辨公事沃承事郎簽書鎭江軍節度判官􅈦公事泊承奉郎永康縣丞深將仕郎女三人嫁承議郎王鏞將作􅁥主簿陳􅀭善者皆先卒㓜未行也孫男女二十人機從事郎樸承務郎餘皆㓜曽孫男一人始公葬先大夫於石井而度其旁百許歩預爲夀藏至是津等奉公以窆而碩人附焉公性至孝遭䘮必廬墓側終制不交人事無墨衰絰先人貲産悉推與二兄育其􅀌女厚齎以遣之官其兄弟之子孫二人方爲義莊義學義冡以俟宗族之貧者而未克就􅀹拳拳於郷邑遇歉􅀊􅂢巳資合公􅀻之力以賑之無所愛好善如巳出嫉惡如􅀻仇延接後進多所成就平居嚴毅􅀂不可犯然謙虚好問而樂聞其過不間微賤教子第􅀹力嘗語之曰􅀂等從宦視官物當如已物視公事當如􅀻事必不得已與其得罪扵百姓寜得罪扵上官吾平生無他長惟不敢以一毫自欺耳蓋其大節之見於朝廷逹於四方者巳卓然不可掩而其􅀻行纎悉又如此自少至老手未嘗釋卷属文不事彫刻而豪徤峻整指意明白爲詩平淡慕樂天而渾厚莊栗又自􅀋其爲人有表奏五卷詩文三十卷和陶詩三卷當塗小集湖山遺老傳一卷藏於家嗚呼是可銘巳銘曰士孰不材病氣與節方春爭華未凍先折有偉豪呉一世之傑睨彼權相弗媚而謁始雖偃蹇竟偶明哲彼虣我仁大論橫發乃賛征謀乃軔還轍言雖弗用時仰壯烈中去朝行偃息名都賦平役義惠逹信孚越城之南日活萬夫思樂鏡水有􅀛有魚天邑嚴嚴貴彊屏氣張旜以行孰俾吾貳公顧曰嘻是足與治于廟于藩姑適吾意姑溪油油惠澤春流鍾陵有莠則廩其秋我湖空明我竹脩脩我倦而歸其樂休休大耋之年從容委蛻循始訖終俯仰奚愧中奥之原有窅其隧我銘不刋以篤來裔觀文殿學士劉公神道碑淳熈五年夏觀文殿學士大中大夫知建康府事江南東路安撫使行宫留守彭城劉公寢疾府舎即拜䟽言臣病力不任府事願上符鑰歸死故山惟陞下哀之時天子方􅀝公以重别都旦莫且召用之未即聽許而公疾巳革矣再䟽請老於是上乃深以爲憂亟遣中貴人挾侍醫馳驛診視未至秋七月甲子公召門下主口授千餘言使具爲奏極言時弊根本且薦群臣之可用者畢封上之有頃而薨上覽奏驚歎即日出公前請老章使以通議大夫致仕及計聞益嗟悼詔贈光禄大夫罷朝一日且命有司護致其喪仍給葬事明年月公之嗣子學雅等遂奉公柩葬於建寜府甌寜縣豐樂里新歷之原而請於朝冀有以易其名者事下奉常以公廉公方正威德克就冝謚忠肅過考功無異詞詔報曰可於是公之終始哀榮無所不備獨墓隧之碑乆未克立學雅等懼數相與涕泣來請文熹蚤託公諸父間遂與公相長大知公爲詳而公晚􅀊相予亦益篤顧雖不文義有所不得辭也公家唐末自長安南徙遂爲建人世居崇安縣五夫里有諱民先者敦樸有行從安定先生受春秋學晚以累舉得官歸家教授學者至數百人累贈太子太保於公爲曽祖太保生忠顯公諱韐靖康之難秉義不屈而死累贈太師忠顯公生徽猷閣待制諱子羽建炎紹興之間佐川陜軍有功累贈少傅公其長子也諱珙字共父少以恩􅀘承務郎長從季父屏山先生學舉進士一科調􅁥紹興府都稅務潭州南嶽廟主管西外敦宗院遭少傅及祖毋韓國夫人吕氏憂除喪爲諸王宫大小學教授權秘書省校勘書籍官禮部郎官中書舎人時秦氏用權乆士大夫巳竊竊言符䜟事檜欲因以追謚其父召㑹禮官議問其法以公不時至怒而逐之踰年檜死乃得主管台州崇道觀召爲大宗正丞改祕書丞遷尚書吏部員外郎除􅁥察御史避薦者還故官銓曹法宻吏姦官不能制公寘令式庭中使選集者得指其違以詰吏人甚便之兼權祕書少􅁥遷起居舎人兼權中書舎人金亮渝盟天子震怒悉師北伐一時詔檄多出公手詞氣激烈聞者或至泣下御史杜莘老劾大閹張去爲忤㫖左降公封還詔書莘老得不去從上幸建康兼權直學士院時張忠獻公􅅏守行宫衆謂車駕東還必以征討軍事爲􅀉俄而詔下乃以楊存中爲江淮宣撫使中外大失望公奏論其不可上曰此特爲張浚地耳命再下宰相召公諭㫖且曰再論則累張公矣公曰某爲國家計豈暇爲張公謀哉再論愈力事乃寢眞除中書舎人直學士院㑹詔立建王爲皇太子宣入視草今上即位借禮部尚書使金國是時南北甫罷兵始爲鈞敵之禮使者往輙困辱而歸人皆爲公危之公受命慷􅁣戒家人悉裘􅁑兼副以行曰藉令不死歸未可期也上聞副使以賄除吏而公獨無所􅀻手札襃諭甚寵然竟以議禮不决不果行也詔以星變旱蝗大詢闕政公言比年以來綱維解縱有賞無罰外則諸將刻剥軍士以事交結内則朝廷不恤諸路路不恤郡郡不恤縣縣不恤民甚或重爲貪虐以快巳􅀻軍民之怨日積于下其禍將有不可勝言者願陛下擴恭儉日新之徳屏馳騁無益之戯登崇俊良斥逺邪佞然後信賞必罰戢近懲逺以脩軍政之闕節浮冗寛賦歛精擇郡守誅鋤贓吏以厚吾民之生則大異庶乎其可消矣間又嘗爲上言􅀿敵無一定之謀而彊國有不易之䇿夫曰和曰戰曰守皆所謂􅀿敵之計不可預圖者惟脩政事以彊國勢使三者之權在我而用無不利乃爲不易之䇿耳故將田師中死其家請得賜第京師又有李珂者以􅀜通貴幸得官而自奏求爲督府􅁺詔從中下公皆奏以爲不可不聽再奏極論竟皆罷之然由此遂多忤近習意而宰相又有隂忌公者出公爲集英殿修撰知泉州未行改知衢州始至委事僚屬一無所問人或以公未更治民意頗輕之旣而欺者得枉者伸羣下歛手不能有所爲始大畏服凡吏員外置者悉罷之受租米使民得自操槩其發鈔消籍皆有程式田里大安乾道元年湖南旱飢郴州宜章民李金以縣抑買乳香急乗衆怒猝起爲亂衆踰萬人分道南出犯廣東西九郡之境還入道州桂陽軍界殺掠萬計連破郴桂兩城數道大震朝廷憂之以公爲敷文閣待制知潭州荆湖南路安撫使公受命兼行以五月入境則賊衆巳數萬人矣亟以實奏請下荆襄發卒奔命且移書制置使沈介曰道逺賊熾比詔下且不及事請以便宜出師即朝廷以擅興爲罪吾自當之不敢以累公也制置使即爲遣兵而詔報亦如公請然皆未有至者而賊􅀔愈張湘隂橋口羣盗又數百人乗亂竊發密邇府下人心益揺公簡役兵撃之募民有得盗斬首者皆厚其賞盗所隱􅂍無多少官一不問不數日悉捕斬無脫者於是賞信刑威士氣大振人知破賊之有期矣六月制置使所遣將田寳楊欽乃以其兵數千人至公所以迎勞慰撫之者甚厚諸軍感􅁬願盡死力公與欽語知其能檄諸軍皆受節度使率其衆鼔行而前下令募賊徒相捕斬詣吏者除罪受賞於是欽等連戰破賊諸將後至者亦遣四出以分賊􅀔通糧道大軍遂入宜章八月鏖龍岡下賊兵數萬自辰至申官軍稍却欽􅀍髮大呼䇿馬橫衝之賊分爲兩其前列精兵殱焉餘皆遁走追至莽山賊黨曹彦黃拱遂執李金與其腹心黄谷以降欽因窮追深入盡誅其酋豪而支黨脅從竄匿山谷者尚衆公諭欽等郤兵而聽其自詣則皆相率聽命􅀊盡師還金等數十人皆伏誅餘皆稱詔釋之復故田宅者以千數奏官曹彦黃拱而列上諸將功狀又不以一毫有所􅀻上嘉歎再三進職敷文閣直學士且賜璽書曰近世書生但務清談經綸實才蓋未之見朕以是每有東􅀳之憂今卿旣誅羣盗而功狀詳實諸將優劣破賊先後歷歷可觀宜益勉旃以副朕意賊地旣定境内正清於是公乃宣布上恩力行寛政且爲請於朝曰今以陛下神靈雖幸破賊然不亟擇守宰寛賦歛以安居民即一李金死一李金生臣恐湖南自是無寜􅀊也又奏留鄂兵以戍郴桂而益廣蒐募以􅀘州兵之缺厚撫犒嚴紀律而時勒習之於是湖南隱然爲重鎭姦盗屏迹啇旅復野􅀫焉三年召還見上首論獨㫁雖英主之能事然必合衆智而質之以至公然後有以合乎天理人心之正而事無不成􅀂弃僉謀狥􅀻見而有獨御區㝢之心焉則適所以蔽其四逹之明而左右􅀻昵之臣將有乗之以干天下之公議者矣次論稅絹退剥羡餘和糴之弊又以州郡禁軍紀律不明驕惰自恣請亟選武臣之􅁬行伍習戎事者使爲將副責以訓練而貴游子弟閤門國信五房出職之輩不得與焉上皆然之以爲翰林學士知制誥兼侍讀間復從容言於上曰世儒多病漢髙帝不悅學輕儒生臣竊獨以爲髙帝之明其所不悅特腐儒之俗學耳誠使當時有以二帝三王之學告之臣知其必將竦然敬信而功烈所就不止此矣因爲上言聖王之學所以明理正心而爲萬事之綱者甚悉上亟稱善是􅀊小不登公請亟詔監司郡守先事條畫荒政所宜不者亦使任其無他又奏州兵營伍教戰之法甚備事皆施行十一月遂拜中大夫同知樞密院事公辭不獲乃進言曰汪應辰陳良翰張栻學行材能皆臣所不逮而栻窮探聖微曉暢軍務曩幸破賊栻謀爲多願陛下亟召用之上可其奏以次登用焉公入西府日召諸軍將佐從容訪問盡得其材用所冝以待選用一日上顧輔臣圖議恢復公曰復讎雪耻誠今日之大計然所以求之必有其道臣願陛下以周宣王爲法側身修行任賢使能以圖内修之實則外攘之効將有不能自巳者計不出此而欲淺謀輕舉以幸其成臣未見其可也上悅明年七月詔兼參知政事公方與一二同列夙夜悉心竭力益圖所以叙進人材寛飬民力討理軍政卒成上意之所欲爲者蓋除福建鈔鹽􅀊額二萬萬罷江西和糴及廣西折米鹽錢又蠲諸路累年逋􅀒金銀榖帛巨億計而公􅀹以輔成上徳振肅朝綱抑僥倖􅅄廉退爲巳任以是近倖側目而流俗亦多不悅蓋上嘗以乆旱齋居請雨一夕而􅀿諸公皆賀公復進言曰陛下誠心感格其􅀿如響此足以見天人相與之際眞有不容髮者矣然則隱微之間纎介之失其􅀿豈不亦猶是乎臣願陛下察此而益謹其獨焉則天下幸甚上爲竦然改容稱善龍大淵曽覿旣逐去未㡬而大淵死上憐覿欲還之公言二人之去天下方仰威㫁而慶盛徳之日新柰何􅃍復爲此且此曹奴􅀠耳憐之則厚賜之可也􅀂引以自近而賔友接之至使得以與聞㡬事進退人材則臣懼非所以􅂭徳業而振綱紀也上感其言爲止不召殿前指揮使王琪嘗密薦士得召用公請其所自上以琪告公退坐堂上呼院吏作頭引召琪至而詰之琪恐懼不能置對請後不敢乃叱遣去無何楊守來言琪嘗檄郡稱受密㫖増築新城若干尺公與諸公請之則上未嘗有是命也公未出殿門遣吏馳取其牘琪不得隱遂以罪罷諸公因奏自今聖㫖不經三省密院者所下之官皆請俟奏審乃得行上欣然從之公即從密院移中外諸官府而内侍省與焉明日忽復有㫖前奏審事勿行因諭諸公即如此則禁中或時須一飲食亦必待奏審然後可得耶公即以藝祖熏籠事對退又與諸公合奏言曰朝廷者陛下之朝廷命令者陛下之命令臣等典司出納不敢廢職而巳今方舉行舊典以正紀綱而巳出復收中外惶惑臣等竊爲陛下惜之時諸公雖更進合辭而公􅀹激切殿中皆驚以故獨罷爲端明殿學士使奉外祠上意尋寤亟詔改知􅂭興府江南西路安撫使公入辭猶以開廣言路講明聖學敦本節用虚巳任賢斥逺邪佞選將撫軍數事爲獻上蹵然曰卿雖去國不忘忠言而材又非他人所及行召卿矣至鎭首蠲稅務新額及罷苗倉大斛屬邑奉新有復出租稅攤配諸鄉􅀊乆民窮相率逃去反失正稅不勝計亦奏除之又除二稅合零租米暗耗免役足錢之弊人或爲公憂不足而公量入爲出未嘗有所乏也明年除資政殿學士知荆南府荆湖北路安撫使始至條上荆襄兵少財匱之狀詔即諉公經畫公因行視襄鄂兵屯並邊形􅀔盡得其實以聞凡回圖役使詭名虚籍之弊與夫部伍教習之法有不善者皆奏罷之先是荆南兵戍襄陽者累年不得歸公奏爲半􅀊畨休之法春夏三軍秋冬四軍更迭往來軍士感悅荆襄故有民兵皆農家子敦樸豪勇土著自愛且居近邊知虜情輕戰閫比稍墮廢公更爲簡閱寛其取丁之數貧者弛其賦役隨郷團結而􅀊閱習焉其資糧械器亦爲處畫各有條理撫循犒賞􅀊費錢一萬萬而不以一介有取於民也明年遭􅁇母慶國夫人卓氏憂又明年起復同知樞密院事荆襄宣撫使遣中使奉璽書即䘮次宣押奏事公引經援禮涕泣懇辭凡五六上不得請時宰相方以恢復大言中上意而政事不脩舉動煩擾識者憂之公乃手䟽别奏具言天下之事有其實而不露其形者無所爲而不成無其實而先示其形者無所爲而不敗今吾所以自治而爲恢復之實者爲如何而乃外招降附内徙營屯規筭未立手足先露其􅀔適足以速禍而致宼臣不知爲此議者將何以待之也且荊襄四支也朝廷腹心元氣也今不憂元氣之憊而慮四支之不彊非臣之所敢知也上納其言爲寢前詔八年免喪乃復除知潭州安撫湖南過闕見上言曰人君能循天下之理然後有以得天下之心而立天下之事然非至誠虚已兼聽並觀使在我者空洞清明而無一毫物欲之蔽亦未有能循天下之理者也因以極論時事言甚切至上加勞再三進職大學士以行公再臨舊鎭不懈益䖍蓋所以自律者愈嚴而所以撫民者愈寛以是人愈畏服而敬愛之􅀊旱民饑公亟遣吏行田蠲租如法而檄轉運常平司移粟諸郡且慮姦民乗時竊發則又遣將益兵戍守遂以無事一旦湖北茶盗數千人入境公盛軍聲以威之而開其自新之路盗多散去其存者蓋無㡬人公乃遣兵然猶深以迎戰邀撃爲戒盗意益緩於是一戰敗之而盡擒以歸獨誅其首惡數人餘悉以􅀠軍籍明年盗之餘黨頼文政等復入境後帥欲盡誅之盗因悉力死戰旣勦湖南軍遂入江西犯廣東官軍數敗將尉死者數十人爲費以大萬計於是人乃服公爲有謀也淳熈二年除知建康府安撫江南東路留守行宫會水且旱公奏閣夏稅錢六千萬緡蠲秋苗米十有六萬六千餘斛沿納他物稱是仍請下漕司遣吏覆視諸州所蠲租其頗未盡者悉以予民禁上流稅米遏糴即他路有敢違者請亦得以名聞抵其罪詔皆從之以是得商人米三百萬斛散之民間又貸諸司錢合三萬萬遣官糴米上江得十四萬九千斛籍農民當賑貸客戸當賑濟者户以口數給米有差村落又皆運米置塲平價賑糶而貸者卒亦不取償焉以府佐趙善珏王以寕及寓士李宗思劉煒領其事分遣群屬循行境中無逺不到公又蚤夜咨訪幽隱畢聞縣給印曆手書告諭誠意旣孚而賞信罰必是以人争效用如辦巳事起是年九月盡明年四月闔境數十萬人無一人􅂢􅇤流徙者上嘉其績賜書褒諭焉公治財寛於民而急於吏所以禁其漁取察其蠧弊者甚悉自累鎭所施行毎益加詳至是人􅀍其澤􅀹深凡屬縣所􅀒課度不能償者悉以丐之而獨重禁其非法病民者􅀍㫖甓城靣以丈計者數十萬用緡錢數萬米千餘斛而役蓋不反民也上積公勞效手札勞奨賚以鞍馬器物甚厚明年進觀文殿學士蓋將復登用之而公病不起矣臨没時所上䟽極言近習用事之禍至引恭顯伾文以爲戒所薦則故相魏國陳公桂帥張栻敬夫也别以手書訣敬夫而熹亦與焉其言皆以未能爲國家報雪讎恥爲深恨蓋其忠孝誠篤雖蹈死生之變而未始須􅁷忘也公爲人機鑒精明議論英發遇事立㫁其威不可犯而居家極孝慈母福國夫人熊氏早薨公哀慕無以自致則以任子恩官其内弟事􅁇毋禮敬飭備遭䘮時年逾五十盡哀致毁得疾㡬殆友愛諸弟晚􅀊彌篤􅀊時祭祀酌古今禮而敬以行之内外功緦之戚必素服以終月數在官爲罷燕樂同寮有喪亦如之將薨遺命治喪母得用浮屠法後諸賢公往往效之其在州郡治平聽察令行禁止而於愛民厚俗之意􅀹孜孜焉事或小失雖下吏言之無不立改大脩潭州嶽麓書院養士數十人而屬張子敬夫往遊其間告以古人爲巳之學謂明道程公先生嘗官建康屬邑爲之立祠學宫而刻陳忠肅公責沈之文於壁以示學者民有骨肉之訟躬以恩義反復辨告甚或深自引咎聞者皆失所爭而去其在朝廷危言正色直前無所避忠義􅁬發未嘗以死生動其心而愛君憂國審宻持重不肯爲僥倖嘗試之舉蓋其􅅚躬應事規模科指晚歳皆益精宻故上則人主知之愈深下則學士大夫望之愈重以至兒童走卒莫不知公之忠烈而在荆州時北虜亦每使諜者詗公家世盖知其忠義之有傳也及薨所臨之􅀖軍民徃徃罷市巷哭相與祠之而建康爲􅀹盛且自數歳以來國家每有四方之故而有識之士相與私憂語未嘗不及公也公薨時年五十有七封彭城郡開國侯食邑一千六百戸食實封二百戸其配曰新定郡夫人吕氏故兵部尚書祉之女新興郡夫人韓氏淑人韓氏皆魏國忠獻公四世孫也二男子學雅承務郎學裘承奉郎二女長適迪功郎南劒州劒浦縣尉吕欽次適某官趙崇憲文集八卷奏議十卷内外制二十卷藏於家公自少即以文學知名及登朝廷論思潤色當世􅀹稱其得體然未嘗爲無用之文其駁議又多削藁故所傳止此云學雅以公從弟從事即玶所狀公行事視熹熹受而讀之皆昔所見聞者也因剟其大者著之石而系以銘銘曰昔在陽九失我㤗平東游三紀汴洛羶腥帝始靈承俯仰顧歎曰汝在廷孰抗斯難爰有俊哲三世一心忠精義烈思逺憂深沬血􅁬辭曰此讎耻乃盟乃􅂬顙得無泚不有豪聖孰慮孰圖孰秉武節以行天誅抑臣有聞在周中圯旣脩乃攘厥仆斯起惟聖時􅁥利伸否蟠毋􅁄其欲毋溺其安帝曰俞哉予欽汝誨旣啓于中盍布于外澤流威燀汝則來歸卒輔吾志以究汝爲四鎮十年帝適西顧彼皇顥蒼胡奪之遽我最其迹有孝有忠有政有事有言有功嗟爾嗣人尚承厥慶公思不忘天子聖神晦庵先生朱文公文集卷第八十八懐安縣儒學訓導葉暢校
