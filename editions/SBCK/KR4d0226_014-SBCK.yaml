body:
  text: 奏劄戊申延和奏劄一臣聞昔者帝舜以百姓不親五品不遜而使契爲司徒之官教以人倫父子有親君臣有義夫婦有别長㓜有序朋友有信又慮其教之或不從也則命臯陶作士明刑以弼五教而期于無刑焉蓋三綱五常天理民􅃔之大節而治道之本根也故聖人之治爲之教以明之爲之刑以弼之雖其所施或先或後或緩或急而其丁寧深切之意未嘗不在乎此也乃􅀂三代王者之制則亦有之曰凡聴五刑之訟必原父子之親立君臣之義以權之蓋必如此然後輕重之序可得而論淺深之量可得而測而所以悉其聦明致其忠愛者亦始得其所施而不悖此先王之義刑義殺所以雖或傷民之飢膚殘民之軀命然刑一人而天下之人聳然不敢肆意於爲惡則是乃所以正直輔翼而􅀂其有常之性也後世之論刑者不知出此其䧟扵申啇之刻薄者旣無足論矣至於鄙儒姑息之論異端報􅀿之􅀃俗吏便文自營之計則又一以輕刑爲事然刑愈輕而愈不足以􅌋民之俗徃徃反以長其悖逆作亂之心而使獄訟之愈繁則不講乎先王之法之過也臣伏見近年以来或以妻殺夫或以族子殺族父或以地客殺地主而有司議刑卒從流宥之法夫殺人者不死傷人者不刑雖二帝三王不能以此為治於天下而况於其繋於父子之親君臣之義三綱之重又非凡人之比者乎然臣非敢以此之故遂􅂆陛下深於用法而果於殺人也但竊以爲諸􅀂此􅁼渉於人倫風化之本者有司不以經術義理裁之而世儒之鄙論異端之邪􅀃俗吏之􅀻計得以行乎其間則天理民彛㡬何不至於泯㓕而舜之所謂無刑者又何日而可期㢤故臣伏願陛下深詔中外司政典獄之官凢有獄訟必先論其尊卑上下長㓜親踈之分而後􅃪其曲直之辭凡以下犯上以卑凌尊者雖直不右其不直者罪加凢人之坐其有不幸至於殺傷者雖有疑慮可憫而至於奏讞亦不許輙用擬貸之例又詔儒臣􅀶采經史以及古今賢哲議論及於敎化刑罰之意者刪其精要之語聚爲一書以敎學古入官之士與凡執法治民之官皆使略知古先聖王所以敕典敷敎制刑明辟之大端而不敢隂爲姑息果報便文之計則庶㡬有以助成世教而仰稱陛下好生惡殺期於無刑之本意取進止延和奏劄二臣聞獄者民命之所繫而君子之所盡心也今天下之獄死刑當决者皆自縣而逹之州自州而逹之使者其有疑者又自州而上之朝廷自朝廷而下之􅁄寺􅁄寺讞議而後致辟焉其維持防閑可謂周且審矣然而憲䑓之所詳覆􅁄寺之所讞議者不過受成於州縣之具獄使其文案粗備情節稍圓則雖顛倒是非出入生死盖不得而察也是故欲清庶獄之源者莫􅀂遴選州縣治獄之官今縣之獄委於令其選固巳精矣而未必皆得人其􅁦未易革也􅀂州獄則今銓格凢選人任滿有舉主関陞者方注繁難令録其慮盖已詳矣然注司理者乃不用此令而近制唯進納癃老之人然後不得注擬此外則常調􅀜陞雖昏繆疾病之人皆得而爲之甚至於流外􅀘官􅀂省部胥史亦得而爲之彼以薦舉􅀜陞者固未必盡得才能公正之人然比之昏繆疾病無善可稱與夫胥史之入官者則有間矣蓋昏繆疾病之人苟且微禄唯知自營其於獄事􅂪成吏手漫不加省而胥史之入官者又或狃於故習與吏爲徒販鬻走㺯無所不至故州郡小大之獄徃徃多失其平怨讟咨嗟感傷和氣上爲聖政之累莫此爲甚臣愚欲望陛下明詔銓曹更定選格凡州郡两獄官專注任滿有舉主􅀜陞人或􅀿格不足則次任任滿銓試中第二等以上人其常調關陞及省部胥史並不得注擬見在任者非舉主􅀜陞人即令守倅銓量如委昏繆疾病即保明聞奏特與祠禄其未到人候赴上日亦從守倅銓量方許放上􅀂守倅狥􅀻失實即許􅁥司劾奏罷免所有省部胥史雖巳注官待次並令赴部别與擬授庶幾治獄之官其選少清各知任職仰副陛下欽恤之意取進止貼黄臣契勘縣獄止是知縣獨貟推鞫一或不得其人則拆換􅅃詞變亂情節無所不至今旣未能盡變銓法則亦不容無少更革欲望睿慈詳酌明降指揮令縣丞同行推訊無丞處即用主簿仍遇大囚到獄即限两日内具入門􅅃先次飛申本州及提刑司照㑹庶㡬粗革舊􅁦天下幸甚延和奏劄三臣竊見諸路提刑司所管拘催州縣經緫制錢盖前代之所無而祖宗盛時亦未之有特起於宣和末年倉卒用兵權冝措畫當時建議之臣方且自以爲功而其兄聞之乃爲哭於先廟以爲作俑之禍且及子孫渡江以後雖知其􅁦然費出愈繁遂不能罷復有増加以至于今乃爲大農之經賦有司不復敢有蠲除之議然其始者亦但計其出納多寡之實數而隨以取之則事雖失體而未有甚害及紹興中推行經界之法民間違限契約悉出投印故一二年間此錢之額倍於常􅀊逮其畢事則便復常數而無復前日之羡矣而一時乃有憸侫掊克之人輙爲比較之說以誤朝聽使凡􅀊入經緫制錢悉以經界之年爲額其後雖或知其非義而小變之然猶必使趂及一年所収最多之數至其甚無藝者則雖或災傷年分檢放􅀝閣苗米稅錢巳無所入而所謂經緫制錢者版曹緫所猶不肯與之蠲除上下相臨轉相逼迫下吏無所措其手足則其􅀔必至於巧爲名色取之於民以求幸免司察之官雖知其然然旣利其􅀊額之盈則亦不容有所何問顧猶不足以及數則遂不過將新盖舊􅗗後爲前􅀊月愈深逋􅀒日積大郡所欠十數萬緡小郡亦不下一二萬數官吏操切日益嚴峻而莫有知其事之本原者臣愚不知州縣之煎􅆈局促果何日而少紓斯民之歎息愁怨果何時而少息也陛下厚徳深仁愛民如子疾痛痾癢無細不知抑搔按摩無逺不及顧偶未聞此法之􅁦而巳故臣輙敢冐昧以聞伏望聖慈深照本末特詔有司先將災傷年分撿放􅀝閣苗稅數内所収經緫制額盡依分數豁除然後别詔大臣深圖所以節用􅁉民之術計論經緫制錢合與不合立額比較之利病而罷行之以幸天下臣不勝大願取進止延和奏劄四臣竊見江西路諸州舊有科罰之弊盖因􅀊入有限而費出無常是以不免巧取於民以備支發凡是百姓有事入門不問曲直恣意誅求無有藝極民間受弊不可勝言爲􅁥司州縣者欲一切繩之以法則財計頓闕州縣不可復爲雖有良吏亦無以免若一切恣之不問則法廢不行民怨無告而貪虐之吏更復並縁以濟其私爲害愈甚前此漕司盖甞頗􅂢羡錢以㭪州縣􅀊計之闕而禁其科罰然後逺民得以粗安然聞其間亦有循習舊態未能盡革去處欲望聖慈特降睿㫖令本路帥臣諸司愽訪事宜共行措畫逐一條奏以俟聖裁庶幾官用不乏民賦有經仰寛宵旰之憂潜消災沴之氣一路幸甚取進止延和奏劄五臣􅀼惟陛下以大有爲之資􅁬大有爲之志即位之􅀄慷慨發憤㳟儉勤勞務以内修政事外攘夷狄汛掃陵廟恢復􅁟疆爲巳任如是者二十有七年于兹矣而囙循荏苒日失􅀊亡了無尺寸之效可以仰酬聖志下慰人望不審陛下亦甞中夜以思而求其所以然之􅀃耶以爲所任者非其人則陛下之神明豈可謂所任盡非其人以爲所由者非其道則陛下之仁聖豈可謂所由盡非其道以爲規模不定則陛下之規模甞定矣以爲志氣不立則陛下之志氣甞立矣然且若是何耶臣誠愚賤􅀼爲陛下惑之故甞反覆而思之無乃燕閒蠖濩之中虚明應物之地所謂天理者有未純所謂人欲者有未盡而然歟天理有未純是以爲善常不能充其量人欲有未盡是以除惡常不能去其根爲善而不能充其量除惡而不能去其根是以雖以一念之頃而公私邪正是非得失之㡬未甞不朋分角立而交􅀾於其中故所以體貌大臣者非不厚而便嬖側媚之􅀻顧得以深􅀍腹心之􅀉所以寤寐豪英者非不切而柔邪庸繆之軰顧得以乆竊廊廟之􅁠非不樂聞天下之公議正論而亦有時而不容非不欲堲天下之䜛􅀃殄行而亦未免於誤􅃪非不欲報復陵廟之讎耻而或不免於畏怯苟安之計非不欲愛養生靈之財力而或未免於歎息愁怨之聲凡若此􅀋不一而足是以所用雖不至盡非其人而亦不能盡得其人所由雖不至盡非其道而亦不􅀎盡合其道規模盖甞小定而䘚至於不定志氣盖甞小立而䘚至於不立虚度􅀊月以至於今非獨不足以致治而或反足以召􅅍非獨不可以謀人而實不足以自守非獨天下之人爲陛下惜之臣知陛下之心亦不能不以此爲恨也閒者天啓聖心日新盛德􅁬發英㫁整頓綱維盖有意乎天理之純而人欲之盡矣然臣竊以其事􅀚之則猶恐其未免乎交􅀾之患也盖詰傳冩漏􅂥文字之罪則便嬖側媚之流知所懼矣然而去者未逺而復還存者更進而愈盛則知陛下親寵此曹之意未衰也罷累年竊位盗􅁠之姦則柔邪庸繆之黨知所懼矣然而希次􅀘者襲其迹以僥倖而不訶當言責者懐其􅀻以緘黙而不問則知陛下委任此輩之意猶在也増置諌貟斥逺邪佞則兼􅃪之羙固有以異乎前日矣然可諌之端無窮則其或􅁇進而愈切未知陛下果能納而用之否也辨明誣枉慰撫􅀌直則燭幽之明固有以異乎前日矣然造言之人無責則其或捷出而益巧未知陛下果能逺而絶之否也謝􅁍傲使嘉奬壮圖宜若可以勵苟安之志矣而置將之􅁠旁出奄寺軍政敗壊士䘚愁怨則恐未有以待天下之變振􅅒蠲租重禁科擾宜若可以寛疲民之力矣而􅁥司不擇守令貪殘政煩賦重元元失職則恐未有以固有􅀖之本即是數者而論之則是所謂天理者雖若小勝而所謂人欲者終未盡除也夫以陛下之神聖仁明涖政之乆圖治之切宜其晏然髙拱以享功成治定之安乆矣而􅀊月逾邁四顧茫然隂陽方爭勝􅀒未决不知將復何日何時而可以粗見聖治之成也耶聞之道路比来士大夫之進􅀃者多矣然不探其本而徒指其末不先其難而姑就其易毛舉天下之細故而不本於陛下之身營营馳騁乎事爲利害之末流臣恐其未足以端出治之本清應物之源以賛陛下正大宏逺之圖而使天下之事悉如聖志之所欲也昔者舜禹孔顔之間盖甞病此而講之矣舜之戒禹曰人心惟危道心惟微惟精惟一􅁢執厥中而必継之曰無稽之言勿􅃪弗詢之謀勿庸謹乃有位敬脩其可願四海困窮天禄永終孔子之告顔淵既曰克巳復禮爲仁一日克巳復禮天下歸仁焉爲仁由巳而由人乎㢤而又申之曰非禮勿視非禮勿聴非禮勿言非禮勿動既告之以損益四代之禮樂而又申之曰放鄭聲逺佞人鄭聲􅁋佞人殆嗚呼此千聖相傳心法之要其所以極夫天理之全而察乎人􅁒之盡者可謂兼其本末巨細而舉之矣兩漢以来非無願治之主而莫克有志於此是以雖或随世以就功名而終不得以與乎帝王之盛其或耻爲庸主而思用力於此道則又不免蔽於老子浮屠之􅀃静則徒以虚無寂滅爲樂而不知有所謂實理之原動則徒以應縁無礙爲逹而不知有所謂善惡之機是以日用之間内外􅆾離不相爲用而反以害於政事盖所謂千聖相傳心法之要者於是不復講矣臣愚不肖􅀼願陛下即今日之治效泝而上之以求其所以然之故而於舜禹孔顔所授受者少􅇔意焉自今以徃一念之萌則必謹而察之此爲天理耶爲人􅁒耶果天理也則敬以擴之而不使其少有壅閼果人欲也則敬以克之而不使其少有凝滯推而至於言語動作之間用人䖏事之際無不以是裁之知其爲是而行之則行之惟恐其不力而不當憂其力之過也知其爲非而去之則去之惟恐其不果而不當憂其果之甚也知其爲賢而用之則任之惟恐其不專聚之惟恐其不衆而不當憂其爲黨也知其爲不肖而退之則退之惟恐其不速去之惟恐其不盡而不當憂其有偏也如此則聖心洞然中外融徹無一毫之私欲得以介乎其間而天下之事將惟陛下之所􅁒爲無不如志矣詩曰豐水有􅉮武王豈不仕貽厥孫謀以燕翼子武王烝㦲矧今祖宗光明盛大之業付在陛下將以傳之無窮四海之内所望於陛下者不但數世之仁而巳書曰􅀂藥不暝昡厥疾不瘳惟陛下深􅇔聖志痛自刻勵而力行之使萬世之後猶可以爲後聖法程則宗杜神靈永有依託萬方􅀺獻永有歸徃天下􅄑甚天下幸甚臣􅀌陋寡聞學無所就前此兩􅂪賜對所言大意與此畧同辭不别白㫖不分明曽不足以上悟聖心而陛下哀憐不忍終棄使得復望清光環視其中無他所有輙繹舊聞復以此進僣妄狂率罪當萬死伏惟陛下財赦取進止甲寅行宫便殿奏劄一臣竊聞之天下之事有常有變而其所以䖏事之術有經有􅁠君臣父子定位不易事之常也君令臣行父傳子継道之經也事有不幸而至於不得盡如其常則謂之變而所以處之之術不得全出於經矣是則所謂􅁠也當事之常而守其經雖聖賢不外乎此而衆人亦可能焉至於遭事之變而處之以􅁠則唯大聖大賢爲能不失其正而非衆人之所及也故孔子曰可與立未可與􅁠盖言其難如此而夷齊季札之徒所以輕千乗之國以求即乎吾心之所安寜隕其身亡其國而不敢失其區區之節者亦爲此也乃者天運艱難國有大咎天變爲之見於上地變爲之作於下人情爲之哀恫拂鬱而皆有離叛散亂之心方此之時宗廟社稷危於綴旒是則所謂天下之大變而不可以常理處焉者也是以太皇太后躬定大䇿皇帝陛下寅紹丕圖未及號令之間不越湏􅁷之頃而郷之危者安離者合天下之􅀔翕然而大定此亦可謂處之以􅁠而庶幾乎有以不失其正者矣然自頃至今亦既三月而天變未盡消地變未盡弭君親之心未盡懽學士大夫羣􅀺百姓或反不能無疑於逆順名實之際至於禍亂之本又巳伏於􅁳􅁳之中特待時而發耳臣雖至愚亦知􅀼爲陛下憂之而未知其計之所出故嘗反覆以思而参以所聞則尚猶有可諉者亦曰陛下之心前日未嘗有求位之計今日未嘗忘思親之懐而巳爾嗚呼此則所謂道心微妙之全體天理發用之本然而所以行􅁠而不失其正之根本也誠即是心以充之則孔子所謂求仁得仁而無怨孟子所謂終身訢然樂而忘天下者臣有以知陛下之不難矣借曰天命神噐不可以無傳宗廟社稷不可以無奉則轉禍爲福易危爲安亦豈可以舍此而他求哉充吾未嘗求位之心則可以盡吾􅀒罪引慝之誠充吾未嘗忘親之心則可以致吾温清定省之禮始終不越乎此而大倫可正大本可立矣陛下誠能動心忍性深自抑損所以自處常如前日未嘗有位之時内自宫掖燕􅀻之奉服食噐用之湏不敢一毫有所加於潜邸之舊外至百辟多儀之享恩澤匪頒之式不敢一旦而全享乎萬乗之尊專務積其誠意期以格乎親心然後濬發德音痛自克責嚴飭羽衞益勤問安視膳之行十日一至而不得見則継以五日五日一至而不得見則􅁇以三日三日而不得見則二日而一至以至于無一日而不一至焉俯伏寢門怨慕號泣雖勞且辱有所不憚然而親心猶未底豫慈愛猶未復􅀄逆順名實之疑不渙然而冰釋則臣不信也若夫災異之變禍亂之幾有未盡去則又在乎陛下凝神恭黙深監古先日與大臣講求政理可否相濟惟是之從必使發號施令無一不出乎朝廷進退人材無一不合乎公論不爲偏聴以啓私門則聖徳日新聖治日起而天人之應不得違釁孽之萌不得作矣今日之計莫大於此惟陛下深留聖意而亟圖之若復因循日復一日所以行􅁠者遂失其正則臣恐禍變之来不但禮樂不興刑罰不中而巳也人心易離天命難保厥監不逺深可畏懼臣山野戇愚不識忌諱罪當萬死惟陛下寛之取進止行宫便殿奏劄二臣竊惟皇帝陛下祗膺駿命恭御寳圖正位之􅀄未遑它事而首以愽延儒臣討論經藝爲急先之務盖將求多聞以建事學古訓而有􅀗非若記問愚儒詞章小技誇多以爲愽闘靡以爲工而巳也如是則􅂆講之官所宜遴選顧乃不擇誤及妄庸則臣􅀼以爲過矣盖臣天資至愚極陋雖嘗挾䇿讀書妄以求聖賢之遺㫖而行之不力老矣無聞况於帝王之學則固未之講也其何以當擢任之寵而辱顧問之勤乎是以聞命驚惶不敢奉詔然嘗聞之人之有是生也天固與之以仁義禮智之性而叙其君臣父子之倫制其事物當然之則矣以其氣質之有偏物欲之有蔽也是以或昧其性以亂其倫敗其則而不知反必其學以開之然後有以正心脩身而爲齊家治國之本此人之所以不可不學而其所以學者􅀄非記問詞章之謂而亦非有聖愚貴賤之殊也以是而言則臣之所嘗用力固有可爲陛下言者請遂陳之盖爲學之道莫先於窮理窮理之要必在於讀書讀書之法莫貴於循序而致精而致精之本則又在於居敬而持志此不易之理也夫天下之事莫不有理爲君臣者有君臣之理爲父子者有父子之理爲夫婦爲兄弟爲朋友以至於出入起居應事接物之際亦莫不各有理焉有以窮之則自君臣之大以至事物之微莫不知其所以然與其所當然而亡纎芥之疑善則從之惡則去之而無毫髪之累此爲學所以莫先於窮理也至論天下之理則要妙精微各有攸當亘古亘今不可移易唯古之聖人爲能盡之而其所行所言無不可爲天下後卋不易之大法其餘則順之者爲君子而吉背之者爲小人而凶吉之大者則能保四海而可以爲法凶之甚者則不能保其身而可以爲戒是其粲然之跡必然之效盖莫不具於經訓史冊之中欲窮天下之理而不即是而求之則是正墻靣而立爾此窮理所以必在乎讀書也􅀂夫讀書則其不好之者固怠忽間㫁而無所成矣其好之者又不免乎貪多而務廣徃往未啓其端而遽巳欲探其終未究乎此而忽巳志在乎彼是以雖復終日勤勞不得休息而意緒怱怱常􅀂有所奔趋迫逐而無從容涵泳之樂是又安能深信自得常乆不厭以異於彼之怠忽間㫁而無所成者哉孔子所謂欲速則不逹孟子所謂進銳者退速正謂此也誠能鑒此而有以反之則心潜於一乆而不移而􅀁讀之書文意接連血脉通貫自然漸漬浹洽心與理㑹而善之爲勸者􅀷惡之爲戒者切矣此循序致精􅀁以爲讀書之法也􅀂夫致精之本則在於心而心之爲物至虚至靈神妙不測常爲一身之主以提萬事之綱而不可有頃刻之不存者也一不自覺而馳鶩飛揚以狥物欲於軀殻之外則一身無主萬事無綱雖其俯仰顧盻之間蓋巳不自覺其身之􅀁在而況能反覆聖言參考事物以求義理至當之歸乎孔子􅀁謂君子不重則不威學則不固孟子􅀁謂學問之道無他求其放心而巳矣者正謂此也誠能嚴㳟寅畏常存此心使其終日儼然不爲物欲之􅀁侵亂則以之讀書以之觀理將無􅀁徃而不通以之應事以之接物將無􅀁處而不當矣此居敬持志􅀁以爲讀書之本也此數語者皆愚臣平生爲學艱難辛苦巳試之效竊意聖賢復生􅀁以教人不過如此不獨布衣􅅊帶之士􅀁當從事蓋雖帝王之學殆亦無以易之特以近年以來風俗薄陋士大夫間聞此等語例皆指爲道學必排去之而後巳是以食芹之美無路自通毎抱遺經徒竊慨歎今者乃遇皇帝陛下始初清明無他嗜好獨於問學孜孜不倦而臣當此之時特䝉引對故敢忘其固陋而輒以爲獻伏惟聖明􅀷賜省覽試以其說驗之於身蚤窹晨興無忘今日之志而自彊不息以緝熈于光明使異時嘉靖􅀖國如商高宗興衰撥亂如周宣王以著明人主講學之效卓然爲萬世帝王之標凖則臣雖退伏田野與世長辭與有榮矣何必使之勉彊盲聾扶曵跛躄以汙近侍之列而爲盛世之羞哉干冐宸嚴不勝戰慄惟陛下留神財幸取進止行宫便殿奏劄三退一本作裁臣前任備員潭州兼管荆湖南路安撫司事竊見本路土􅇤民貧無他生理而州縣􅀊計入少出多徃徃例於常賦之外多􅀵加耗重折價錢尚且入不支出公私俱困昨來諸司察見其弊累嘗蠲减務寛民力連年􅀁放蓋巳不貲而州縣起發上供支遣俸給諸色費用尚仍舊額略無􅀁損沿此官司巳是狼狽不可支吾或有非泛賞給調發支賜􅀂更差到諸班換授歸正雜流補官之人復有増加則愈見逼迫無以爲計臣近者嘗與漕司何異備奏全州守臣韓邈􅀁申乞减􅄈差員數可見一端至於其他州縣大略徃徃􅀋此不唯官吏苟逭目前多方趣辨不暇爲國家赤子計而按察之官知其甚不得巳以至於此亦不􅃘盡法按治無由發覺􅀼念本路東望朝廷逺在二千餘里之外而北㩀重湖南撫諸峒形勢􅀁􅀜亦非他道之比萬一民貧不堪誅剥一旦屯結自爲擾亂而盗賊蠻猺相挻而起則不知議者何以處之臣自到任以至去官僅及三月雖未及詳密究其曲折然其大勢如此亦不待智者而後知矣故嘗􅀷以爲憂欲爲料理但以召還之􅃍未暇子細詢考畫一奏聞今者旣䝉賜對又不敢不爲陛下一言欲望聖慈􅀷察一視同仁特詔本路帥臣監司更以前日全州􅀁申事理通之諸郡並行均節將大叚闕乏去處特與痛加退减指定奏聞取㫖行下庶幾州得以恤其縣縣得以寛其民而其間或有不奉詔者亦且無詞以逃其罪則遐逺之民均􅀍實惠而寛大之恩不但爲掛墻壁之具而巳臣奉使亡狀不早上聞以至今日死有餘罪伏惟矜赦而亟圖之則一路幸甚取進止行宮便殿奏劄四侵犯之犯一本作擾臣昨於去冬伏䝉聖恩除知潭州方具辭免未及起發即聞湖北猺人侵犯邵州界分及今年春伏奉聖㫖不許辭免臣遂即日就道比及到官湖北巳行進兵攻討賊氣漸衰遂就招降一向寧帖却據邵州守臣潘燾申到見得從前􅁁防全無措置以致小醜敢肆侵犯因條畫到移置寨柵増撥戍兵利害數條臣與漕臣何異潘燾􅀁申頗有條理遂行詢究見得委的合行措置遂巳具奏乞賜施行竊計巳徹天聽欲望聖慈明詔大臣早賜處分及何異潘燾在任之日依元􅀁申日下措置其提刑趙不迂先次申奏亦與臣等􅀁乞無大異同欲乞并行劄下公共相度從長區處庶使姦賊畏威􅁁民安業實一方永逺之利取進止貼黄巳伏一作旣歸臣昨招到徭賊蒲來矢等巳赴安撫司公參其人衰弱􅀄無能觧但恃險阻敢爾跳梁今巳㐲降則於事理不得不加存䘏欲乞聖慈行下本司常切照管毋失大信庶幾異日復有此輩易以招納伏候聖旨行宫便殿奏劄五臣伏見潭州城壁昨因虜􅀐殘破之後剥落摧圯五十餘年不曽修築近者守臣周必大方議􅀘砌巳䝉朝廷支降度牒一百道賣到錢八萬貫未及興工而必大奉祠就第臣到任之􅀄即行􅀧檢其錢巳支六萬餘貫買到甎􅁅見在餘錢不多不足爲雇工犒設之費又元料只擬用本州諸色軍兵共不過三千餘人竊慮不堪乆役勞苦而其城廣闊中間多有空閑無民居處􅀂盡修築亦無􅀁用枉費工力􅀄巳尅定七月下旬起工而偶値小旱繼以霖雨旋遭國哀人情洶洶未敢容易然念興作有緒􅀁買甎􅁅費錢巳多􅀂遂因循便成廢棄亦又可惜故自登極赦後事勢稍定即别委官􅄪行計度擬將其城北靣一帶荒逈去處量加裁减向裏别築蓋如此則不唯目今工力易辦將來萬一不測有警亦易防守但未及子細條畫而臣忽奉聖恩召令奏事竊恐新任守臣未知始末欲望聖慈行下詳審計度如臣妄議有可施行即乞睿旨再給度牒雜募軍民促减北􅁁近裏修築乗此樂􅀊擇日興工亦爲一方永乆不虞之備取進止乞進德劄子臣竊聞周武王之言曰惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母而孟子又曰堯舜性之湯武反之蓋嘗因此二說而􅀷思之天地之大無不生育固爲萬物之父母矣人於其間又獨得其氣之正而能保其性之全故爲萬物之靈􅀂元后者則於人􅀋之中又獨得其正氣之盛而能保其全性之尤者是以能極天下之聰明而出乎人􅀋之上以覆冐而子蓄之是則􅀁謂作民父母者也然以自古聖賢觀之惟帝堯大舜生而知之安而行之爲能履此位當此責而無媿􅀂成湯武王則其聰明之質固巳不能如堯舜之全矣惟其能學而知能利而行能擇善而固執能克巳而復禮是以有以復其德性聰明之全體而卒亦造夫堯舜之域以爲億兆之父母蓋其生質雖􅀂不及而其反之之至則未嘗不同孔子􅀁謂及其成功一也正此之謂也㳟唯皇帝陛下聰明之質性之於天固非常情􅀁能窺度然而生長􅀷宫春秋方富臣恐稼穡艱難容有未盡知人之情僞容有未盡察國家憲度容有未盡習至於學道脩身立志揆事之本制世御俗發號施令之要亦容有未能無待於講而後明者故竊以爲陛下誠能於此􅀷留聖意日用之間語默動静必求放心以爲之本而於玩經觀史親近儒學巳用力處益用力焉數召大臣切劘治道俾陳今日要急之務略如仁祖開天章閣故事至於君臣進對亦賜温顔反復詢訪以求政事之得失民情之休戚而又因以察其人材之邪正短長庶於天下之事各得其理經歷詳盡浹洽貫通聰明日開志氣日彊德聲日聞治效日著四海之内瞻仰畏愛如親父母則是反之之至而堯舜湯武之盛不過如此不宜妄自菲薄因循苟且而不復以古之賢聖自期也臣本迂儒加以老病自知無用分甘窮寂今者徒以趣召之峻冐昧而來耳目筯骸皆難勉彊然而未敢􅃍以吿歸爲請者誠感眷遇之厚猶欲少􅃘須􅁷以俟陛下聖志之立聖學之成决知異日姦言邪說不能侵亂果如前􅀁期者然後乞身以去則爲上不􅀒天子下不􅀒􅀁學而臣主俱榮矣顧以此事在臣但能言之而其用力則在陛下萬一暮景迫人不容􅀫留則抱此耿耿私恨無窮伏望聖慈憐臣此志察臣此言䇿厲身心勉進德業使臣蚤得遂其􅀁願則雖夕死暝目無憾矣冐瀆宸聽臣無任悃􅅃激切之至取進止貼黄臣聞中庸有言人一能之巳百之人十能之巳千之果能此道雖愚必明雖柔必彊而元祐館職吕大臨爲之說曰君子􅀁以學者爲能變化氣質而巳德勝氣質則愚者可進於明柔者可進於彊不能勝之則雖有志於學亦愚不能明柔不能彊而巳矣蓋均善而無惡者性也人􅀁同也昏明彊弱之禀不齊者才也人􅀁異也誠之者􅀁以反其同而變其異也夫以不美之質求變而美非百倍其功不足以致之今以鹵莽滅裂之學或作或輟以求變其不美之質及不能變則曰天質不美非學􅀁能變是果於自棄其爲不仁甚矣臣少時讀書偶於此語􅀷有省焉􅁬厲感􅁣不能自巳自此爲學方有寸進食芹而美敢以爲獻伏乞聖察乞不以假故逐日進講劄子臣㐲見近制毎遇􅃗日蚤晚進講及至當日或値假故即行權罷又按故事將來大寒大暑亦繫罷講月分㳟聞陛下天性好學晨夕孜孜雖處􅀷宫必不暇逸但臣誤䝉選擇以經入侍固當日有獻納以輔聖志今乃淹旬累月不得脩其職業素餐之刺實不自安故嘗靣奏假日無事正宜進講巳䝉聖慈俯賜嘉納今巳兩日未見施行因省昨來􅀁陳似亦未至詳悉今别具奏欲乞聖明特降睿㫖今後除朔望旬休及過宫日外不以寒暑􅀟􅃗月日諸色假故並令逐日蚤晚進講内有朝殿日分伏恐聖躬乆坐不無少勞却乞權住當日蚤講一次庶幾藏脩遊息無非典學之時聖德日躋天下幸甚取進止乞差官看詳封事劄子臣前日靣奏㳟奉詔㫖以雷雨之異許陳闕失仰見陛下畏天省巳之意然臣未敢奉詔者竊見陛下登極之初巳下明詔來獻言者甚衆未聞一有施行今復求言殆成虚語欲乞睿㫖令後省官鎖􅀫看詳擇其善者條上取㫖以次施行巳䝉聖慈開納再三玉音宣諭如此則求言之詔不爲文具臣不勝感激欣幸而今巳兩日未見指揮竊慮當時􅀁奏他事猥多又無文字可以降出是致遲緩今敢再具奏聞欲望聖明早賜處分庶幾聞者知勸􅀡言日聞開悟聖聦益脩政德應天之實莫大於此取進止十月十七日奉聖㫖差沈有開劉光祖限十日看詳聞奏乞瑞慶節不受賀劄子臣伏覩今日瑞慶節前一日宰執率文武百寮詣行宫便殿拜表稱賀臣巳前來祗赴立班然竊惟念夀皇梓宮在殯陛下追慕方新乃以此時講行賀禮臣當以經術入侍帷幄覩此缺失心實未安乆欲奏聞又念䟽逺不敢􅆫越昨晚忽奉睿㫖特令宣引今日晚講仰見聖心虚懐來善唯恐不及待遇之恩復異常品感激之􅀷不能自巳謹此密奏欲望聖慈速賜傳㫖便令權免其表亦不收接三年之内凢有合稱賀事並依此例庶幾上廣孝治益􅂭聖德風示四表垂法萬世臣不勝大願取進止貼黄臣今􅀁奏雖巳遲晚然羣臣班賀於外而聖主抑而不受益見聖德之盛可爲後世法程伏乞睿照經筵留身靣陳四事劄子臣迂愚衰賤無以逾人仰荷聖明召從逺外置之近侍之列處以勸誦之官此豈私於小臣者哉意者必以其粗嘗講學稍有思慮不肯隨衆默默或有以仰禆聖治萬分之一也而臣伏自到闕三獲進對狂妄之言時䝉采納如增􅄈講日看詳封事不受賀表之屬皆得施行臣竊不自知以爲庶幾可以披􅄋肝膽畢義願忠而無􅀒於陛下􅀁以收録使令之意又􅀼惟念服在内朝實以從容諷議爲職故雖被求言之詔亦不敢輒同外臣撰述文字以致宣􅂥但嘗靣奏一二意望陛下自以聖意施行而累日以來竊觀天意雷霆之後繼以隂雨沉鬱不觧夜明盡昏此必政事誤施大有未厭人望以致隂邪敢干陽德者而臣前日􅀁嘗言之大者尚亦未䝉省察告但碌碌隨群觧釋文義時時陳說一二細㣲以應故事則不唯非陛下􅀁以召用愚臣之意亦豈愚臣􅀁以服事陛下之志哉今有㣲誠須至傾竭臣之􅀁言其最大者則勸陛下凢百自奉􅀷務抑損自宮闈之私居處服用且如濳邸之舊以至外庭禮數僕御恩澤亦未可􅃍然全享萬乗之尊庻幾有以感格親心早遂晨昏定省之願以爲陛下必垂開納而數日來乃聞有㫖修葺舊日東宫爲屋三數百間外議皆謂陛下意欲速成早遂移蹕以爲便安之計不惟未能抑損乃是過有増加臣不知此果出於陛下之心大臣之議軍民之願耶抑亦左右近習倡爲此說以誤陛下而欲因以遂其姦心也臣恐不惟上帝震怒災異數出正當恐懼脩省之時不當興此大役以咈譴告警動之意亦恐畿甸百姓飢餓流離阽於死亡之際忽見朝廷正用此時大興土木修造宫室但以適巳自奉爲事而無矜惻憫憐之心或能怨望忿切以生他變不唯無以感格太上皇帝之心以致未有進見之期亦恐壽皇在殯因山未卜几筵之奉不容少弛太皇太后皇太后皆以尊老之年煢然在憂苦之中晨昏之養􅀹不可闕而四方之人但見陛下亟欲大治宫室速得成就一旦翩然委而去之以就安便六軍萬民之心必又將有扼腕而不平者矣前監未逺甚可懼也至於一離尊親之側輕去􅀝廬之次深宫永巷園囿池臺耳目之娯雜然而進臣又竊恐陛下之心未易當此紛華盛麗之熒惑感移雖欲日親儒士講求經訓以正厥事而進德脩業亦將有􅀁不暇矣此又臣之􅀁大懼也至於壽康定省之禮則臣嘗言之矣而其意有未盡也今聞邇日一再過宫亦未得見而不亟爲之慮如臣􅀁謂下詔自責頻日繼徃者顧乃逶迤舒緩無異尋常之時泛然而徃泛然而歸太上皇帝聞之必以爲此徒備禮而來實無必求見我之意其深閉固拒而不肯見固亦宜矣又聞太上皇后懼忤太上皇帝之意不欲其聞太上之稱又不欲其聞内禪之說此又慮之過者殊不知􅀂但一向如此而不爲宛轉方便使太上皇帝灼知陛下􅀁以不得巳而即位者但欲上安宗社下慰軍民姑以代巳之勞而非敢􅃍享至尊之奉則父子之間上怨怒而下憂懼將何時而巳乎父子天倫三綱􅀁繋不惟陛下之心深􅀁禾安而四方觀聽殊爲不美乆而不圖亦將有借其名以造謗生事者此又臣之􅀁大懼也至於朝廷紀綱􅀹􅀁當嚴上自人主以下至於百執事各有職業不可相侵蓋君雖以制命爲職然必謀之大臣參之給舍使之熟議以求公議之􅀁在然後揚于王庭明出命令而公行之是以朝廷尊嚴命令詳審雖有不當天下亦皆曉然知其謬之出於某人而人主不至獨任其責臣下欲議之者亦得以極意盡言而無􅀁憚此古今之常理亦祖宗之家法也今者陛下即位未能旬月而進退宰執移易臺諌甚者方驟進而忽退之皆出於陛下之獨斷而大臣不與謀給舍不及議正使實出於陛下之獨斷而其事悉當於理亦非爲治之體以啓將來之弊况中外傳聞無不疑惑皆謂左右或竊其柄而其􅀁行又未能盡允於公議乎此弊不革臣恐名爲獨斷而主威不免於下移欲以求治而反不免於致亂蓋自􅂭興以來巳有此失臣嘗再三深爲壽皇論之非獨今日之憂也尚賴壽皇聖性聰明更練世事故於此輩雖以驅使之故稍有假借實亦隂有以制之未至全墮其計然積習成風貽患於後其害巳有不可勝言者如陳源􅀽佐之流皆陛下􅀁親見也柰何又欲襲其跡而蹈之乎且陛下自視聰明剛斷孰與壽皇更練通逹孰與壽皇壽皇尚不能制之於前而陛下乃欲制之於後臣恐其爲患之益􅀷非但前日而巳此又臣之􅀁大懼也至於􅓖宫之卜偏聽臺史膠固謬妄之言墮其交結眩惑之計而不復廣詢術人以求吉地但欲於祐思諸陵之傍儹那遷就苟且了當旣不爲壽皇體魄安寜之慮又不爲宗社血食乆逺之圖則自宰執待從以至軍民皆知其非而不敢力爭夫以壽皇之豐功盛烈百世不忘而􅀁以葬之如此其草草也此豈不又大咈天人之心以致變異之頻仍而貽患於無窮乎此又臣之􅀁大懼也凢此四懼皆非小故臣願陛下􅀷察愚言而反之於心明詔大臣首罷修葺東宫之役而以其工料回就慈福重華之間草創􅃦殿一二十間使粗可居又於宫門之外草創供奉􅀫衛之廬數十間勿使其有偪仄暴露之苦如是則上有以感格太上皇帝之心而速南内進見之期又有以致壽皇几筵之奉而盡兩宫晨昏之禮下有以塞群下窺觀眩惑之姦而慰斯民飢餓流離之歎此一事也􅀂夫過宮之計則臣又願陛下下詔自責减省輿衞入宫之後暫變服色如唐肅宗之改服紫􅂁執控馬前者預詔近屬尊行之賢使之先入首白太上皇后以臣前􅀁陳宛轉方便之說然後隨之而入望見太上皇帝即當流涕伏地抱膝吮乳以伸􅀒罪引慝之誠而太上皇后宗戚貴臣左右環擁更進譬諭觧釋之詞則太上皇帝雖有忿怒之情亦且霍然雲消霧散而懽意浹洽矣此二事也􅀂夫朝廷之紀綱則臣又願陛下􅀷詔左右勿預朝政但使朝廷尊嚴紀綱振肅而國家有泰山之安則此等自然不失富貴長乆之計其實有􅈴庸而􅀁得褒賞未愜衆論者亦詔大臣公議其事稽考令典厚報其勞而凢號令之弛張人才之進退則一委之二三大臣使之反復較量勿狥巳見酌取公論奏而行之批㫖宣行不須奏覆但未令尚書省施行先送後省審覆有不當者限以當日便行繳駁如更有疑則詔大臣與繳駁之官當晚入朝靣議於前互相論難擇其善者稱制臨决則不惟近習不得干預朝權大臣不得專任巳私而陛下亦得以益明習天下之事而無􅀁疑於得失之筭矣此三事也􅀂夫山陵之卜則臣前日嘗以議狀進呈近日又與同列連名具奏今更不敢頻煩聖聽亦望特宣大臣使詳臣等前後􅀁論而决其可否於立談之間先寛七月之期次黜臺史之說别求草澤以營新宫使夀皇之遺體得安於内則宗社生靈皆􅂪福於外矣此四事也凢此四事皆今日最急之務切乞留神反覆思慮斷而行之以答天變以慰人心上以彰聖主用人求諌之實下以伸小臣愛君憂國之忠則臣不勝千萬大幸又竊念臣老病之餘寒齋獨􅀫終夜不􅄰憂慮萬端而進對之時率多遺忘言語精神又不能以自逹是以前日一再靣奏􅀁陳數事有未䝉􅀷察者今因入侍敢復冐昧輒形紙墨伏惟聖明獨賜詳覽而擇其中至於􅀌危之蹤不敢自保竊恐自今以徃不獲乆侍清閒之燕矣臣無任瞻戀懇切皇恐俟罪之至取進止乞留中不受賀表下貼黄臣又聞前日賀表雖䝉退出而未降指揮今後合稱賀事三年之内並與權免其節序變遷並合進名奉慰并乞聖明先賜處分庶幾遇事免致失禮伏􅀱聖㫖竊觀天意下貼黄臣又聞前此雷􅀨之時累曽地震此十七日半夜前後其震尤甚八月半聞蜀中大震墻屋往往傾摧臣雖不曽親見然見者頗多傳聞甚的聖政方新而變異不止天戒甚明必有􅀁爲并乞睿照此三事也下貼黄臣又嘗謂人主當務聰明之實而不可求聰明之名信任大臣日與圖事反覆辯論以求至當之歸此聰明之實也偏聽左右輕信其言每事從中批出處分此聰明之名也務其實者今雖未明乆必通悟務其名者或外間一時可以竦動觀聽然中實未明愈乆而愈暗矣二者之間􅀁差毫􅁵而其得失則有大相逺者伏乞睿照論災異劄子臣竊聞今月五日夜漏方下五六刻間都城之内忽有黒煙四塞草氣襲人咫尺之間不辨人物著於靣目皆爲沙土臣雖不曽親見然親舊相訪見之者多驗之數人其說如一决非虚妄臣竊思惟間者以來災異數見秋冬雷雹苦雨傷稼山摧地陷無􅀁不有皆爲隂盛陽㣲之證陛下雖嘗下責躬之詔出敢諌之令而天心未豫復有此恠亦爲隂聚包陽不和而散之象臣竊懼焉而恐其未有敢以聞於聖聽者也蓋嘗聞之商中宗時有桑榖並生于朝一暮大拱中宗能用巫咸之言恐懼脩德不敢荒寧而商道復興享國長乆至于七十有五年高宗祭于成湯之廟有飛雉升鼎耳而鳴高宗能用祖巳之言克正厥事不敢荒寧而商用嘉靖享國亦乆至于五十有九年古之聖王遇災而懼脩德正事故能變災爲祥其效如此伏願陛下視以爲法克巳自新蚤夜思省舉心動念出言行事之際常􅀂皇天上帝臨之在上宗社神靈守之在旁懔懔然不復敢使一毫私意萌於其間以煩譴告而又申敕中外大小之臣同寅恊㳟日夕謀議以求天意之􅀁在而交修焉則庶乎災害日去而福禄日來矣臣不勝惓惓愛君憂國之至取進止一本乞留中省覽一本乞降付三省樞密院乞令看詳封事官靣奏劄子臣昨具奏乞降指揮看詳臣庶􅀁上封事巳䝉聖慈施行今來竊見看詳官􅀁具進冊其間貼說極爲詳備􅀂令因侍經幄靣奏指陳庶於聰明實有禆補取進止乞討論䘮服劄子臣聞三年之䘮齊䟽之服飦粥之食自天子逹於庶人無貴賤之殊而禮經勑令子爲父嫡孫承重爲祖父皆斬衰三年蓋嫡子當爲父後以承大宗之重而不能襲位以執䘮則嫡孫繼綂而代之執䘮義當然也然自漢文短䘮之後歷代因之天子遂無三年之䘮爲父且然則嫡孫承重從可知巳人紀廢壤三綱不明千有餘年莫能􅁵正及我大行至尊壽皇聖帝至性自天孝誠内發易月之外猶執通䘮朝衣朝冠皆以大布超越千古拘攣牽制之弊革去百王衰陋卑薄之風甚盛德也􅀁宜著在方冊爲世法程子孫守之永永無斁而間者遺誥􅀄頒太上皇帝偶違康豫不能躬就䘮次陛下實以世嫡之重仰承大綂則􅀁謂承重之服著在禮律􅀁宜一遵壽皇巳行之法易月之外且以布衣布冠視朝聽政以代太上皇帝躬執三年之䘮而一時倉卒不及詳議遂用漆紗淺黄之服不唯上違禮律無以風示天下且將使壽皇巳革之弊去而復留巳行之禮舉而復墜臣愚不肖誠竊痛之然旣往之失不及追改唯有將來啓殯發引禮當復用􅀄䘮之服則其變除之節尚有可議欲望陛下仰體壽皇聖孝成法明詔禮官稽攷禮律預行指定其官吏軍民男女方䘮之禮亦宜稍爲之制勿使過爲華靡布告郡國咸使聞知庶幾漸復古制而四海之衆有以著於君臣之義實天下萬世之幸取進止書奏藁後凖五服年月格斬衰三年嫡孫爲祖謂承重者法意甚明而禮經無文但傳云父没而爲祖後者服斬然而不見本經未詳何據但小記云祖父没而爲祖母後者三年可以旁照至爲祖後者條下䟽中􅀁引鄭志乃有諸侯父有廢疾不任國政不任䘮事之問而鄭答以天子諸侯之服皆斬之文方見父在而承國於祖之服向來入此文字時無文字可檢又無朋友可問故大約且以禮律言之亦有疑父在不當承重者時無明白證驗但以禮律人情大意答之心常不安歸來稽考始見此說方得無疑乃知學之不講其害如此而禮經之文誠有闕略不無待於後人向使無鄭康成則此事終未有决斷不可􅀡謂古經定制一字不可増損也乞脩三禮劄子臣聞之六經之道同歸而禮樂之用爲急遭秦㓕學禮樂先壞漢晋以來諸儒􅀘緝竟無全書其頗存者三禮而巳周官一書固爲禮之綱領至其儀法度數則儀禮乃其本經而禮記郊特牲冠義等篇乃其義說耳前此猶有三禮通禮學究諸科禮雖不行而士猶得以誦習而知其說熈寜以來王安石變亂舊制廢罷儀禮而獨存禮記之科棄經任傳遺本宗末其失巳甚而􅀶士諸生又不過誦其虚文以供應舉至於其間亦有因儀法度數之實而立文者則咸幽􅄀而莫知其源一有大議率用耳學臆斷而巳􅀂乃樂之爲教則又絶無師授律尺短長聲音清濁學士大夫莫有知其說者而不知其爲闕也故臣頃在山林嘗與一二學者考訂其說欲以儀禮爲經而取禮記及諸經史雜書􅀁載有及於禮者皆以附於本經之下具列注䟽諸儒之說略有端緒而私家無書檢閱無人抄寫乆之未成會䝉除用學徒分散遂不能就而鍾律之制則士友間亦有得其遺意者竊欲更加參考别爲一書以􅀘六藝之闕而亦未能具也欲望聖明特詔有司許臣就秘書省太常寺關借禮樂諸書自行招致舊日學徒十餘人踏逐空閑官屋數間與之居處令其編􅀋雖有官人亦不繋衘請俸但乞逐月量攴錢米以給飲食紙札油燭之費其抄寫人即乞下臨安府差撥貼司二十餘名􅀱結局日量支犒賞別無推恩則於公家無甚費用而可以興起廢墜垂之永乆使士知實學異時可爲聖朝制作之助則斯文幸甚天下幸甚取進止晦庵先生朱文公文集卷第十四福州府學訓導舒鏊校
