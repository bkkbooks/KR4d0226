body:
  text: 壬午應詔封事八月七日左迪功郎監潭州南嶽廟臣朱熹謹昧死再拜上書于皇帝闕下臣㳟惟太上皇帝再造區夏受命中興憂勤㳟儉三十六年春秋未高方内無事乃深惟天下國家之至計一旦而舉四海之廣天位之尊斷自宸􅂨傳之聖子皇帝陛下㳟承慈訓􅀿期御歷爰初踐阼曽未幾何而設施注措之間􅀁以大慰斯民之望者新而又新曽靡虚日其䂓摹固巳宏逺矣然猶且謙冲退託不以聖智自居首下明詔以求􅀡言此尤足以見帝王之高致知爲治之先務也天下幸甚臣竊伏草茅深自惟念天下之大不爲無人忠言嘉謨崇論谹議計巳日陳於陛下之前尚恐不足仰望清光無以少備採擇况臣之愚雖欲效其區區豈能有􅀘於萬分之一哉又惟即位求言累聖相承以爲故事則未知今日陛下之意姑以備故事而巳耶抑眞欲􅀶盡羣言以冀萬一之􅂇也臣誠愚昧不知􅀁出然愛君尊主出於犬馬之誠有不能自巳者故昧死言之惟陛下留聽臣伏讀詔書有曰朕躬有過失朝政有闕遺斯民有戚休四海有利病並許中外士庻􅀡言極諫者臣竊以陛下濳德宮府幾三十年不邇聲色不殖貨利無一物之嗜好形於宴私無一事之過失聞於中外昧爽而朝嚴㳟寅畏仁孝之德孚于上下􅀁以大繫羣生之仰望濬發太上之深慈以至於膺受付託奄有萬方者其必有以致之矣然則聖躬之過失臣未之聞也今者臨御未幾而延登故老召用􅀡臣抑僥倖以正朝綱雪􅁈憤以作士氣貢奉之私不輸於内帑㳟儉之徳日聞於四方凡天下之人􅀁欲而未行􅀁患而未去者以次罷行幾無遺恨然則朝政之闕遺臣亦未之聞也至於斯民之戚休四海之利病則有之矣然臣屏伏閩陬十有餘年足迹未嘗及乎四方其見聞􅀁及之一二内自隱度皆非今日􅀁宜道於陛下之前者不敢毛舉以溷聖聽至􅀂隂拱噤黙終不爲陛下一言則又非臣之􅀁敢安也臣聞召公之戒成王曰􅀂生子罔不在厥初生自貽哲命孟子之言亦曰雖有智慧不如乗勢方今天命之眷顧方新人心之蘄向方切此亦陛下端本正始自貽哲命之時因時順理乗􅀔有爲之㑹也又况陛下聖德隆盛天下之人傳誦道說有年于兹今者正位宸極萬物咸覩其心蓋皆以非常之事非常之功望於陛下不但爲守文之良主而巳也然而祖宗之境土未復宗廟之讐恥未除戎虜之姦譎不常生民之困悴巳極方此之時陛下􅀁以汲汲有爲以副生靈之望者當如何哉然則今日之事非獨陛下不可失之時抑國家盛衰治亂之機廟社安危榮辱之兆亦皆決乎此矣蓋陛下者我宋之盛主而今日者陛下之盛時於此而不副其望焉則祖宗之遺黎裔胄不復有􅀁歸心矣可不懼哉可不懼哉臣愚死罪竊以爲聖躬雖未有過失而帝王之學不可以不熟講也朝政雖未有闕遺而脩攘之計不可以不早定也利害休戚雖不可徧以䟽舉然本原之地不可以不加意也蓋學不講則過失萌矣計不定則闕遺大矣本不端則末流之弊不可勝言矣臣請得爲陛下詳言之臣聞之堯舜禹之相授也其言曰人心惟危道心惟㣲惟精惟一允執厥中夫堯舜禹皆大聖人也生而知之宜無事於學矣而猶曰精猶曰一猶曰執者明雖生而知之亦資學以成之也陛下聖德純茂同符古聖生而知之臣􅀁不得而窺也然竊聞之道路陛下毓德之初親御簡䇿衡石之程不過諷誦文辭吟咏情性而巳比年以來聖心獨詣欲求大道之要又頗留意於老子釋氏之書踈逺傳聞未知信否然私獨以爲􅀂果如此則非􅀁以奉承天錫神聖之資而躋之堯舜之盛者也蓋記誦華藻非􅀁以探淵源而出治道虚無寂滅非􅀁以貫本末而立大中是以古者聖帝明王之學必將格物致知以極夫事物之變使事物之過乎前者義理􅀁存纎㣲畢照瞭然乎心目之間不容毫髪之隱則自然意誠心正而􅀁以應天下之務者􅀂數一二辨黒白矣苟惟不學與學焉而不主乎此則内外本末顛倒繆戾雖有聰明睿智之資孝友㳟儉之德而智不足以明善識不足以窮理終亦無􅀘乎天下之治亂矣然則人君之學與不學􅀁學之正與不正在乎方寸之間而天下國家之治不治見乎彼者如此其大􅀁繫豈淺淺哉易􅀁謂差之毫釐繆以千里此􅀋之謂也蓋致知格物者堯舜􅀁謂精一也正心誠意者堯舜􅀁謂執中也自古聖人口授心傳而見於行事者惟此而巳至於孔子集厥大成然進而不得其位以施之天下故退而筆之以爲六經以示後世之爲天下國家者於其間語其本末終始先後之序尤詳且明者則今見於戴氏之記􅀁謂大學篇者是也故承議郎程顥與其弟崇政殿說書頥近世大儒實得孔孟以來不傳之學皆以爲此篇乃孔氏遺書學者􅀁當先務誠至論也臣愚伏願陛下捐去舊習無用浮華之文攘斥似是而非邪詖之說少留聖意於此遺經延訪真儒􅀷明厥㫖者置諸左右以備顧問研究充擴務於至精至一之地而知天下國家之􅀁以治者不出乎此然後知體用之一原顯㣲之無間而獨得乎堯舜禹湯文武周公孔子之􅀁傳矣於是考之以六經之文監之以歷代之跡㑹之於心以應當世無窮之變以陛下之明聖而􅀁以浚其源輔其志者如此其備則其􅀁至豈臣愚昧􅀁能量哉然臣非知道者凢此􅀁陳特其􅀁聞於師友之梗槩端緒而巳陛下由是講學而自得之則必有非臣之言􅀁能及者惟陛下􅀷留聖意毋忽則天下幸甚臣又聞之爲天下國家者必有一定不易之計而今日之計不過乎脩政事攘夷狄而巳矣非隱奥而難知也然其計􅀁以不時定者以講和之說疑之也夫金虜於我有不共戴天之讐則其不可和也義理明矣而或者猶爲是說者其意必曰今本根未固形勢未成進未有可以恢復中原之䇿退未有可以備禦衝突之方不􅀂縻以虚禮因其來聘遣使報之請復土􅆠示之以弱使之優游驕怠未􅃍謀我而我得以其間從容興補而大爲之備萬一天意悔禍或誘其􅂨則我之􅀁大欲者將不用一士之命而可以坐得何憚而不爲哉臣􅀼以爲知義理之不可爲矣而猶爲之者必以有利而無害故也而以臣䇿之􅀁謂講和者有百害無一利何苦而必爲之夫復讐討賊自彊爲善之說見於經者不啻詳矣陛下聰明稽古固不待臣一二言之請姑陳其利害而陛下擇焉夫議者􅀁謂本根未固形勢未成進不能攻退不能守何爲而然哉正以有講和之說故也此說不罷則天下之事無一可成之理何哉進無生死一决之計而退有遷延可巳之資則人之情雖欲勉彊自力於進爲而其氣固巳渙然離沮而莫之應矣其守之也必不堅其發之也必不勇此非其志之本然氣爲勢􅀁分志爲氣􅀁奪故也故今日講和之說不罷則陛下之勵志必淺大臣之任責必輕將士之赴功必緩官人百吏之奉承必不能悉其心力以􅃪上之􅀁欲爲然則本根終欲何時而固形勢終欲何時而成恢復又何時而可圖守備又何時而可恃哉其不可冀明矣􅀂曰以虚禮縻之則彼雖仁義不足而凶狡有餘誠有謀我之心則豈爲區區之虚禮而驕誠有兼我之勢則亦豈爲區區之虚禮而輟哉􅀂曰示之以弱則是披腹心露情實而示之以本然之弱非强而示之弱之謂也適􅀁以使之窺見我之底藴知我之無謀而益無忌憚耳縱其不來我恃此以自安勢分氣奪日復一日如前􅀁云者雖復矌日十年亦將何計之可成哉則是􅀁以驕敵者乃􅀁以啓敵而自驕􅀁以緩冦者乃􅀁以養冦而自緩爲虜計則善矣而非吾臣子􅀁宜言也且彼盗有中原􅀊取金幣據全盛之勢以制和與不和之權少懦則以和要我而我不敢動力足則大舉􅀷入而我不及支蓋彼以從容制和而其操術常行乎和之外是以利伸否蟠而進退皆得而我方且仰首於人以􅃪和與不和之命謀國者惟恐失虜人之驩而不爲乆逺之計進則失中原事機之㑹退則沮忠臣義士之心蓋我以汲汲欲和而志慮常䧟乎和之中是以跂前㚄後而進退皆失自宣和靖康以來首尾三四十年虜人專持此計中吾腹心决䇿制勝縱横前却無不如其意者而我墮其術中曽不省悟危國亡師如出一轍去􅀊之事人謂朝廷其知之矣而觧嚴未幾虜使復至彼何憚於我而􅃍爲􅀂是是又欲以前䇿得志於我而我猶不悟也受而報之信節未還而海州之圍巳急矣此其包藏反覆豈易可測而議者猶欲以巳試敗事之餘謀當之其亦不思也哉至於請復土􅆠而冀其萬一之得此又不思之大者夫土􅆠我之舊也雖不幸淪没而豈可使彼仇讐之虜得以制其予奪之權哉顧吾之德之力如何耳我有以取之則彼將不能有而自歸于我我無以取之則彼安肯舉吾力之􅀁不能取者而與我哉且彼能有之而我不能取則我弱彼强不較明矣縱其與我我亦豈能據而有之彼有大恩我有大費而􅀁得者未必堅也向者燕雲三京之事可以監矣是豈可不爲之寒心也哉假使萬有一而出於必不然之計彼誠不我欺而不責其報我必能自保而永無他虞則固善矣然以堂堂大宋不能自力以復祖宗之土字顧乃乞丐於􅄷讐之戎狄以爲國家臣雖不肖竊爲陛下羞之夫前日之遣使報聘以是爲請旣失之矣及陛下嗣位天下之望曰庻幾乎而赦書下者方且禁切諸將毋得進兵申遣使介告諭纂承之意繼脩和好之禮亦􅀂有意於和議之必成而坐待土疆之自復者逺近傳聞頓失􅀁望臣愚不能識其何說而竊歎左右者用計之不詳也古語有之疑事無功疑行無名今虜以好來而兵不戢我􅀁以應之者常不免出於两塗而無一定之計豈非􅀁謂疑事也哉以此號令使觀􅃪熒惑離心觧體是乃未攻而巳却未戰而巳敗也欲以此成恢復之功亦巳難矣然失之未逺易以改圖往者不可諌而來者猶可追也願陛下疇咨大臣總欖羣䇿鑒失之之由求應之之術斷以義理之公參以利害之實罷黜和議追還使人苟未渡淮猶將可及自是以往閉關絶約任賢使能立紀綱厲風俗使吾脩政事攘夷狄之外了然無一毫可恃以爲遷延中巳之資而不敢懷頃刻自安之意然後將相軍民逺近中外無不暁然知陛下之志必於復讐啓土而無玩􅀊愒日之心更相激厲以圖事功數年之外志定氣飽國富兵强於是視吾力之强弱觀彼釁之淺􅀷徐起而圖之中原故地不爲吾有而將焉往此不過少遲數年之乆而理得勢全名正實利其與講和請地茍且僥倖必不可成之虚計不可同年而語也明矣惟陛下􅀷留聖意毋忽則天下幸甚至於四海之利病臣則以爲繫於斯民之戚休斯民之戚休臣則以爲繫乎守令之賢否然而監司者守令之綱也朝廷者監司之本也欲斯民之皆得其􅀁本原之地亦在乎朝廷而巳陛下以爲今日之監司姦贓狼籍肆虐以病民者誰則非宰執臺諫之親舊賔客乎其旣失勢者陛下旣按見其交私之狀而斥去之矣尚在勢者豈無其人顧陛下無自而知之耳然則某事之利爲民之休某事之病爲民之戚陛下雖欲聞之亦誰與奉承而致諸民哉臣以爲惟以正朝廷爲先務則其患可不日而自革而陛下似亦有意乎此矣蓋前日􅀁號召數君子者皆天下􅀁謂忠臣賢士也􅀁以正朝廷之具豈有大於此者哉然其才之􅀁長者不同則任之􅀁宜者亦異願陛下於其大者使之贊元經體以亮天工於其細者使之居官任職以熈庶績能外事者使任典戎􅆬方之責明治體者使備拾遺􅀘過之官又使之各舉􅀁知布之列位以共圖天下之事使踈而賢者雖逺不遺親而否者雖邇必棄毋主先入以致偏􅃪獨任之譏毋篤私恩以犯示人不廣之戒進退取舍惟公論之􅀁在是稽則朝廷正而内外逺近莫敢不一於正矣監司得其人而後列郡之得失可得而知郡守得其人而後屬縣之治否可得而察重其任以責其成舉其善而懲其惡夫如是則事之􅀁謂利民之􅀁謂休將無􅀁不舉事之􅀁謂病民之􅀁謂戚將無􅀁不除又何足以勞聖慮哉苟惟不然而切切然今日降一詔明日行一事欲以惠民而適増其擾者有之欲以興利而益重其害者有之紛紜叢脞旣非君道􅀁宜宣布奉行徒爲觀􅃪之美而巳則亦何補之有况今旱蝗四起民食將乏圖􅀁以寛賦役備賑贍業流逋銷盗賊之計尤在於守令之得其人而其本原之地則又有在願陛下􅀷留聖意毋忽則天下幸甚蓋天下之事至於今日無一不弊而不可以勝陳以獻言者之衆則或巳能略盡之矣然求其􅀁謂要道先務而不可緩者此三事是也夫講學􅀁以明理而導之於前定計􅀁以養氣而督之於後任賢所以脩政而經緯乎其中天下之事無出乎此者矣伏惟陛下因此初政端本正始自貽哲命之時因時順理乗勢有爲之㑹於此三言􅀷加察納果斷力行以幸天下則夫􅀁謂不可勝陳之事凢見於議者之言而合乎義理之公切於利害之計者自然循次及之各得其􅀁􅀂其不然雖有求治之心而致之不得其方雖有致治之方而爲之不得其序一旦㳟儉勞苦憂勤過甚有􅀁不堪而不見其效則亦終於因循怠惰而無􅀁成矣豈天下之人􅀁以延頸舉踵而望陛下之初心哉至於是時雖欲悔之臣恐其倍勞聖慮而成效不可期也又况旱蝗之災環數千里陛下始初清明行􅁩未過而天戒赫然􅀂此其甚其必有說矣臣愚竊以爲此乃天心仁愛陛下之厚不待政過行失而先致其警戒之意以啓聖心使盛德大美始終純全無可非間如商中宗周宣王因災異而脩德以致中興也是宜於此三術屢省而亟圖之以順民心以答天意以陛下之聖明必將有以處此愚臣􅀁慮獨患議者不􅀷惟其􅀁以然之故以爲其間不免有􅀁更張或非太上皇帝之意者陛下􅀁不宜爲以咈親志臣竊以爲誤矣㳟惟太上皇帝至公無心合德天地臨御三紀艱難百爲其用人造事皆因時循理以應事變未嘗膠於一定之說先後始末之不同如春秋冬夏之變相反以成􅀊功存神過化而無有毫髪私意凝滯於其間其􅀁以能超然逺引屣脫萬乗而不以爲難者由是而巳本其傳位陛下之志豈不以陛下必能緝熈帝學以繼跡堯禹乎豈不以陛下必能復讐啓土以增光祖宗乎豈不以陛下必能任賢脩政以惠康小民乎誠如是也則臣之􅀁陳乃􅀁以大奉太上詒謀燕翼之聖心而助成陛下尊親承志之聖孝也議者顧欲守一時偶然之跡一二以循之以是爲太上皇帝之本心則是以事物有形之粗而語天地變化之神也豈不誤哉且古者禪授之懿莫如堯舜之盛而舜承堯禪二十有八年之間其於禮樂刑政更張多矣其大者舉十六相皆堯之􅀁未舉去四凶皆堯之􅀁未去然而舜不以爲嫌堯不以爲罪天下之人不以爲非載在虞書孔子録之以爲大典垂萬世法而况臣之􅀁陳非欲盡取太上皇帝約束紛更之也非貴其􅀁賤賤其􅀁貴而悉更置之也因革損益顧義理如何爾亦何不可而陛下何嫌之有哉願早圖之以幸天下母疑於臣之計也􅀂夫戰守之機形制之勢則臣未之學不敢妄有􅀁陳然竊聞之上流督帥物望素輕黜陟失宜效於巳試下流戍兵􅀡棄淮甸長江之險與虜共之斯乃古今之􅀁共憂愚智之􅀁同惑臣雖鄙闍亦竊疑之况今秋氣巳高虜情叵測傳聞汹汹咸謂或當復有去􅀊之舉雖虚實未可知然是二者實彊弱安危形勢􅀁繫呼噏俯仰之間未足以喻其急也願陛下幷留聖意臣不勝大願臣凢愚不學頃􅀊冐昧羣試有司太上皇帝賜之末第獲叨官禄旣又誤􅃪人言猥加收召適以􅔂病留落不前今則血氣益衰精神益耗屏居山田未知􅀁以仰報大恩之日敢因明詔罄竭愚􅂨昧死獻書以聞迂踈狂妄不識忌諱忤犯貴近切劘事機罪當萬死惟陛下哀憐財赦而擇其中干冐天威臣無任震懼兢惶俯伏待罪之至臣熹昧死再拜庚子應詔封事四月二十一日宣教郎權發遣南康軍事兼管内勸農事提轄本軍界分諸鋪遞角借緋臣朱熹謹齋沭奉䟽東向再拜昧死獻于皇帝陛下臣伏覩三月九日陛下可議臣之奏申敕監司郡守條具民間利病悉以上聞無有所隱臣以布衣諸生蒙被聖恩待罪偏壘乃獲遭値仁聖求言願治不間踈逺如此其敢不悉心竭慮以塞詔㫖然臣嘗病獻言者不惟天下國家之大體而毛舉細故以爲忠􅃪言者不察天下國家之至計而抉擿隱伏以爲明是以獻言雖多而實無􅀁益於人之國􅃪言雖廣而實無以盡天下之美臣誠不佞然不敢專以淺意小言仰奉明詔惟陛下幸於其大者垂􅃪而審行之則天下幸甚臣嘗謂天下國家之大務莫大於恤民而恤民之實在省賦省賦之實在治軍􅀂夫治軍省賦以爲恤民之本則又在夫人君正其心術以立紀綱而巳矣董子􅀁謂正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方蓋謂此也夫民之不可不恤不待魯者而後能知亦不待明者然後能言也然欲知其憔悴困窮之實與其􅀁以致此之由則臣請以􅀁領之郡推之然後以次而及其􅀁以施置之方焉臣謹按南康爲郡土地􅇤薄生物不暢水源乾淺易得枯涸人民稀少榖賤農傷固巳爲貧國矣而其賦稅偏重比之他處或相倍蓰民間雖復盡力耕種􅀁􅀵之利或不足以了納稅賦須至別作營求乃可陪貼輸官是以人無固志生無定業不肯盡力農桑以爲子孫乆逺之計幸遇豐年則賤糶禾榖以苟目前之安一有水旱則扶老携㓜流移四出視其田廬無異逆旅之舍蓋出郊而四望則荒疇敗屋在處有之故臣自到任之初即嘗具奏乞且將星子一縣稅錢特賜蠲减又嘗具申提􅀧坑冶司乞爲敷奏將夏稅􅀁折木炭價錢量减分數其木炭錢巳䝉聖慈曲賜開允獨减稅事漕司相度方上版曹􅀂得更䝉聖恩特依􅀁請則一方憔悴困窮之民自此庻幾復有更生之望矣然以臣計之郡之接境江饒等州土田瘠薄􅀋此者非一郡一縣而巳也稅賦重大如此者非一料一色而巳也􅀂不大爲經理􅀷加隱恤雖復時於其間少有縱舍如以杯水捄一車薪之火恐亦未能大有􅀁濟而剥膚椎髓之禍必且愈􅀷愈酷而不可救元氣日耗根本日傷一旦不幸而有方數千里之水旱則其横潰四出將有不可如何者未知陛下何以處此此臣之􅀁謂民之憔悴困窮而不可不恤者然也而臣􅀁謂省賦理軍者請復爲陛下言之夫有田則有租爲日乆矣而今日民間特以稅重爲苦者正縁二稅之入朝廷盡取以供軍而州縣無復贏餘也夫二稅之入盡以供軍則其物有常數其時有常限而又有貼納水脚轉輸之費州縣皆不容有􅀁寛緩而减免也州縣旣無贏餘以給官吏養軍兵而朝廷發下離軍歸正等人又無紀極支費日增無􅀁取辦則不免創於二稅之外别作名色巧取於民且如納米􅀵耗則自七斗八斗以至於一倍再倍而未止也豫借官物則自一年二年以至三年四年而未止也此外又有月椿移用諸雜名額抛賣乳香科買軍器􅀉招軍兵打造鐵甲之屬自版曹總􅀁以至漕司上下相承遞相促迫今日追究人吏明日取勘知通官吏無􅀁從出不過一切取之於民耳蓋不如是無以􅀘舊欠支目前雖明知其一旦發覺違法抵罪而不及顧也夫以罪及其身而不暇恤尚何暇於民之恤乎以此觀之則今日民貧賦重其􅀁從來亦可知矣􅀂不計理軍實而去其浮冗則民力決不可寛然國家蹙處東南恢復之勲未集􅀁以養兵而固圉者常患其力之不足則兵又未可以􅃍减竊意惟有選將吏覈兵籍可以節軍貲開廣屯田可以實軍儲練習民兵可以益􅁁備誠能行此三者而又時出禁錢以續經用民力庶幾其可寛也今將帥之選率皆膏粱騃子厮役凢流徒以趨走應對爲能苞苴結託爲事物望素輕旣不爲軍士􅀁服而其􅀁以得此差遣􅀁費巳是不貲以故到軍之日惟務裒歛刻剥經營賈販百種搜羅以償債􅀒債􅀒旣足則又别生希望愈肆誅求蓋上􅀁以奉權貴而求陞擢下􅀁以飾子女而快巳私皆於此乎取之至於招􅀵簡閱訓習撫摩凢軍中之急務往往皆不暇及軍士旣巳困於刻剥苦於役使而其有能者又不見優異無能者或反見親寵怨怒鬱積無􅀁伸訴平時旣皆悍然有不服之心一旦緩急何由可恃至於軍中子弟亦有素習弓馬諳暁戰陣者例皆不肯就本軍投募而朝廷反爲之分責州郡枉費錢物拖拽短小生踈無用之人以補軍額凢此數端本末巨細無不乖錯而􅀁謂將帥者私欲飽滿鑽研有效則又可以束裝問塗而望他軍之積以爲巳資矣故近􅀊以來管軍臣僚遷代之速至有一􅀊而再易者是則不惟軍中利病無由究知冗兵浮食日益猥衆而此人之􅀁盗竊破費與夫送故迎新百色支用巳不知其幾何矣至於總餽輸之任者亦皆􅀒􅀝幽隂交通賄賂其􅀁程督驅催東南數十州之脂膏骨髓名爲供軍而輦載以輸於權倖之門者不可以數計􅀂乃屯田民兵二事又特爲誕謾小人竊取官職之資而未聞其有絲毫尺寸可見之效凢此數弊天下之人孰不知之而任事之臣略不敢一言以告陛下惟務迫􅃐州縣使之急征横賦戕伐􅀖本而其􅀁以欺陛下者則曰如是而國可富如是而兵可彊陛下亦聞其說之可喜而未究其實往往誤加奬寵􅂌以事權是以比年以來此軰􅀋皆高官厚禄志滿氣得而生民日益困苦無復聊賴草茅有識之士相與私議竊歎以爲莫大之禍必至之憂近在朝夕顧獨陛下未之知耳爲今之計欲計軍實以紓民力則必盡反前之􅀁爲然後乃可冀也蓋授將印委利權一出於朝廷之公議則可以絶苞苴請託之私務求忠勇沉毅實經行陣曽立勞效之人則可以革輕授非才之弊無苞苴請託之私則刻剥之風可革將得其人則軍士畏愛􅁬厲蒐閱以時而竄名冗食者不得容於其間得人而乆其任則上下相安緩急可恃而又可以省送迎之費軍之汰卒與凢北來歸正􅄈差任滿之人皆可歸之屯田使之與民雜耕而漸損其請給其有材勇事藝之人則計其品秩而多與之田因以爲什伍之長使教其人習於馳射擊刺行伍之法罷去諸州招軍之令而募諸軍子弟之驍勇者則授以田使隸尺籍大抵令與見行屯田民兵之法相爲表􅂨擇老成忠實通曉兵農之務者使領其事付以重權乆其事任母貪小利母急近功俟其果能漸省列屯坐食之兵稍損州郡供軍之數然後議其課最增秩而因任之如此十數年間自然漸見功效􅀂其功效未能􅃍見之間而欲亟圖􅀁以紓州縣民間目前之急者則願􅀷詔主計將輸之臣且於見今樁積金榖綿絹數内每􅀊量撥三二十萬視州郡之貧乏者特與免起上供官物三五分而代其輸向後軍籍旣覈屯田旣成民兵旣練則上項量撥之數可以漸减而州郡免起之數可以漸增州縣事力旣益寛舒然後可以禁其苛歛責以寛恤􅀊課而時稽之不惟去其加耗預借非法科敷之弊又視其土之肥􅇤稅之輕重而均减之庶幾窮困之民得保生業無復流移漂蕩之意􅀁在曠土亦當漸次有人開墾布種而公上之賦亦當自然登足次第増羡不俟程督迫促而國眞可富兵眞可彊矣此臣之􅀁謂省賦治軍之說然也至於􅀁謂其本在於正心術以立紀綱者則非臣職之􅀁當及然天下萬事之根本源流有在於是雖欲避而不言有不可得者且臣頃於隆興初元誤䝉召對蓋巳略陳其梗槩矣今請昧死復爲陛下畢其說焉夫􅀁謂綱者猶􅃠之有綱也􅀁謂紀者猶絲之有紀也網無綱則不能以自張絲無紀則不能以自理故一家則有一家之綱紀一國則有一國之綱紀􅀂乃鄉總於縣縣總於州州總於諸路諸路總於臺省臺省總於宰相而宰相兼綂衆職以與天子相可否而出政令此則天下之綱紀也然而綱紀不能以自立必人主之心術公平正大無偏黨反側之私然後綱紀有􅀁繫而立君心不能以自正必親賢臣逺小人講明義理之歸閉塞私邪之路然後乃可得而正也古先聖王􅀁以立師傅之官設賔友之位置諫諍之職凢以先後縱􅁷左右維持惟恐此心頃刻之間或失其正而巳原其􅀁以然者誠以天下之本在是一有不正則天下萬事將無一物得其正者故不得而不謹也今天下之事如前􅀁陳亦可見矣陛下欲恤民則民生日蹙欲理財則財用日匱欲治軍則軍政日紊欲恢復土宇則未能北向以取中原尺寸之土欲報雪讐恥則未能係單于之頸而飲月氐之頭也此其故何哉宰相臺省師傅賔友諌諍之臣皆失其職而陛下􅀁與親密􅀁與謀議者不過一二近習之臣也此一二小人者上則蠱惑陛下之心志使陛下不信先王之大道而悅於功利之卑說不樂莊士之讜言而安於私暬之鄙態下則招集天下士大夫之嗜利無恥者文武彚分各入其門􅀁喜則隂爲引援擢寘清顯􅀁惡則密行訾毀公肆擠排交通貨賂則􅀁盗者皆陛下之財命卿置將則􅀁竊者皆陛下之柄雖陛下􅀁謂宰相師保賔友諫諍之臣或反出入其門墻承望其風㫖其幸能自立者亦不過齪齪自守而未嘗敢一言以斥之其甚畏公論者乃略能驚逐其徒黨之一二旣不能􅀷有􅀁傷而終亦不敢明言以檮其囊槖巢窟之􅀁在勢成威立中外靡然向之使陛下之號令黜陟不復出於朝廷而出於此一二人之門名爲陛下之獨斷而實此一二人者隂執其柄蓋其􅀁壞非獨壞陛下之綱紀而巳乃并與陛下􅀁以立綱紀者而壞之使天下之忠臣賢士􅀷憂永歎不樂其生而貪利無恥敢於爲惡之人四靣紛然攘袂而起以求逞其􅀁欲然則民又安可得而恤財又安可得而理軍政何自而脩土宇何自而復而宗廟之讐恥又何時而可雪耶臣誠至愚不勝憤懣因伏惟念自頃進對得竭狂瞽陛下不惟赦而不誅其後十八年間两䝉收召五被除擢雖臣愚暗自知無用於世又爲疾病憂患之􅀁牽留有不得祗拜恩命者然陛下之知臣不爲不􅀷憐臣不爲不厚顧臣乃獨畏懦藏縮熟視天下之綱紀廢亂生靈困苦至於如此而不能捐生出死一爲陛下言之是陛下不􅀒臣而臣􅀒陛下也今者幸值聖明開廣言路而臣官守適在可言之數於此而又不言則臣之罪雖萬死不足以自贖是以敢冐言之伏惟陛下曲加容貸􅅏神省察􅁬發剛斷一正宸心斥逺佞邪建立綱紀以幸四海困窮之民則臣不勝大幸干冐斧􅃏臣無任瞻天望聖戰慄俟命之至臣熹昧死再拜謹言貼黄本軍管内去秋晚田旱損去冬地震有聲臣巳各具奏聞去訖是後一向闕雨耕牛疫死今雖得雨恐巳後時而牛死不止勢甚可慮伏乞睿照臣昨䝉賜對靣奉玉音治天下當以正心誠意爲本常竊仰歎聖學高明􅀷逹治本如此天下安得不治比年以來乃聞道路之言妄謂陛下惡聞正心誠意之說臣下當進對者至相告戒以爲諱忌臣雖有以决知其不然然竊􅀷慮此語流傳上累聖德下惑羣􅃪伏望睿明更賜財幸繳進奏䟽狀具位臣朱熹右臣伏覩進奏院報三月九日臣寮奏乞申勑監司郡守條具民間利病悉以上聞無有􅀁隠奉聖旨依奏者臣以非材誤叨郡􅀉竊見管内民間利病有合奏聞事件顧其間有事干機密不宜宣露者謹昧萬死具䟽壹通凖式實封隨狀投進貼黄乞至御前開拆庶幾千慮之得有以仰副陛下求言願治之意干冐天威臣無任跼􅐲俟罪之至謹録奏聞伏􅃸勑㫖戊申封事十一月一日朝奉郞􅀡寳文閣主管西京嵩山崇福宫臣朱熹謹齋沐具䟽昧死再拜獻于皇帝陛下臣猥以庸陋䝉被聖知有年於此矣而兩􅀊以來受恩稠疊有加於前顧視輩流無與爲比其爲感激之􅀷固有言􅀁不能諭者然竊惟念狂妄之言抵觸忌諱雖䝉􅃪納不以爲罪而伏俟數月未見其有略施行者臣誠不自知求􅀁以堪陛下非常之恩者而未知所出也以是慙懼乆不自安不意陛下又欲召而見之臣愚於此仰窺聖意尤不識其果何謂也以爲欲􅃪其計䇿則言巳陳而不可用以爲欲加之恩意則寵旣厚而無以加二者之間未有所當此臣之所以徘徊前却懇扣辭避而不能巳也然而陛下猶未之許則臣又重思之前日進對之時口陳之說迫於疾作而猶有未盡焉者蓋嘗請以封事上聞而乆未敢進豈非陛下偶垂記憶而欲卒聞之乎抑其别有以乎臣不得而知也然君父之命至于再下而爲臣子者堅卧於家則臣於此實有􅀁未安者其􅀁􅀷慮獨恐進見之後􅀁言終不可用而又徒竊誤寵如前之爲則臣之辭受將有􅀁甚難䖏而終得罪者是以輙因前請而悉其􅀁言以獻以爲雖使得至陛下之前􅀁言不過如此伏惟聖慈幸賜觀省􅀂以其言爲是而次第行之則臣之志願千萬滿足退伏巖穴死無􅀁憾萬一聖意必欲其來則臣亦不過求一望見清光而後懇請以歸而巳􅀂見其言果無可取則是臣􅀁學之陋他無􅀁有政使冐進陛下亦將何􅀁用之不􅀂因其懇請而許其歸休猶足以兩有􅀁全也又况陛下之庭侍從之列方有造爲飛語以中害善良唱爲横議以脅持上下其巧謀隂計又有甚於前日之不思而妄發者陛下無爲使臣輕犯其鋒而復蹈巳覆之轍也蓋臣竊觀今日天下之勢如人之有重病内自心腹外逹四肢蓋無一毛一髪不受病者雖於起居飲食未至有妨然其危迫之證􅀷於醫者固巳望之而走矣是必得如盧扁華佗之軰授以神丹妙劑爲之湔腸滌胃以去病根然後可以幸於安全如其不然則病日益􅀷而病者不覺其可寒心殆非俗醫常藥之􅀁能及也故臣前日之奏輒引藥不瞑眩厥疾不瘳之語意蓋爲此而其言有未盡也然天下之事􅀁當言者不勝其衆顧其序有未及者臣不暇言且獨以天下之大本與今日之急務􅀷爲陛下言之蓋天下之大本者陛下之心也今日之急務則輔翼太子選任大臣振舉綱維變化風俗愛養民力脩明軍政六者是也臣請昧死而悉陳之惟陛下之留􅃪焉臣之輒以陛下之心爲天下之大本者何也天下之事千變萬化其端無窮而無一不本於人主之心者此自然之理也故人主之心正則天下之事無一不出於正人主之心不正則天下之事無一得由於正蓋不惟其賞之􅀁勸刑之􅀁威各隨􅀁向勢有不能巳者而其觀感之間風動神速又有甚焉是以人主以眇然之身居􅀷宫之中其心之邪正􅀂不可得而窺者而其符驗之著於外者常􅀂十目􅀁視十手􅀁指而不可掩此大舜􅀁以有惟精惟一之戒孔子所以有克巳復禮之云皆􅀁以正吾此心而爲天下萬事之本也此心旣正則視明􅃪聰周旋中禮而身無不正是以􅀁行無過不及而能執其中雖以天下之大而無一人不歸吾之仁者臣謹按尚書舜告禹曰人心惟危道心惟微惟精惟一允執厥中夫心之虚靈知覺一而巳矣而以爲有人心道心之别者何哉蓋以其或生於形氣之私或原於性命之正而􅀁以爲知覺者不同是以或危殆而不安或精㣲而難見耳然人莫不有是形故雖上智不能無人心亦莫不有是性故雖下愚不能無道心二者雜于方寸之間而不知􅀁以治之則危者愈危㣲者愈㣲而天理之公卒無以勝乎人欲之私矣精則察夫二者之間而不雜也一則守其本心之正而不離也從事於斯無少間斷必使道心常爲一身之主而人心每􅃪命焉則危者安㣲者箸而動静云爲自無過不及之差矣又按論語顔淵問仁子曰克巳復禮爲仁一日克巳復禮天下歸仁焉爲仁由巳而由人乎哉夫仁者本心之全德也巳者一身之私欲也禮者天理之節文也蓋人心之全德莫非天理之􅀁爲然旣有是身則亦不能無人欲之私以害焉故爲仁者必有以勝其私欲而復於禮則事皆天理而本心之德復全於我也心德旣全則雖以天下之大而無一人不歸吾之仁者然其機則固在我而不在人也日日克之不以爲難則私欲淨盡天理流行而仁不可勝用矣此大舜孔子之言而臣􅂺妄論其􅀁以用力之方如此伏乞聖照然邪正之驗著於外者莫先於家人而次及於左右然後有以逹於朝廷而及於天下焉􅀂宮闈之内端莊齊肅后妃有闗雎之德後宫無盛色之譏貫魚順序而無一人敢恃恩私以亂典常納賄賂而行請謁此則家之正也退朝之後從容燕息貴戚近臣擕僕奄尹陪侍左右各㳟其職而上憚不惡之嚴下謹戴盆之戒無一人敢通内外竊威福招權市寵以紊朝政此則左右之正也内自禁省外徹朝廷二者之間洞然無有毫髪私邪之間然後發號施令羣􅃪不疑進賢退姦衆志咸服紀綱得以振而無侵撓之患政事得以脩而無阿私之失此􅀁以朝廷百官六軍萬民無敢不出於正而治道畢也心一不正則是數者固無從而得其正是數者一有不正而曰心正則亦安有是理哉是以古先聖王兢兢業業持守此心雖在紛華波動之中幽獨得肆之地而􅀁以精之一之克之復之如對神明如臨淵谷未嘗敢有須􅁷之怠然猶恐其隱㣲之間或有差失而不自知也是以建師保之官以自開明列諌諍之職以自規正而凢其飮食酒漿衣服次舍器用財賄與夫宦官宫妾之政無一不領於􅃁宰之官使其左右前後一動一静無不制以有司之法而無纎芥之􅂩瞬息之頃得以隱其毫髪之私蓋雖以一人之尊􅀷居九重之邃而懔然常􅀂立乎宗廟之中朝廷之上此先王之治􅀁以由内及外自㣲至著精粹純白無少瑕翳而其遺風餘烈猶可以爲後世法程也臣竊見周禮天官􅃁宰一篇乃周公輔導成王垂法後世用意最􅀷切䖏欲知三代人主正心誠意之學於此考之可見其實伏乞聖照陛下試以是而思之吾之􅀁以精一克復而持守其心者果嘗有如此之功乎􅀁以脩身齊家而正其左右者果嘗有如此之效乎宫省事禁臣固有不得而知者然不見其形而視其影不覩其内而占其外則爵賞之濫貨賂之流閭巷竊言乆巳不勝其籍籍矣臣竊以是窺之則陛下之􅀁以脩之家者恐其未有以及古之聖王也至於左右便嬖之私恩遇過當往者淵覿說抃之徒勢熖熏灼傾動一時今巳無可言矣獨有前日臣􅀁靣奏者雖䝉聖慈委曲開譬然臣之愚終竊以爲此輩但當使之守門傳命供掃除之役不當假借崇長使得逞邪媚作淫巧於内以蕩上心立門庭招權勢於外以累聖政而其有才無才有罪無罪自不當論况其有才適􅀁以爲姦有罪而不可復用乎且如向來主管䘮事欽奉几筵之命逺近傳聞無不竊􅀏臣不知國史書之野史記之播于夷狄傳於後世且以陛下爲何如主也縱有曲折如前日􅀁以諭臣者陛下亦安能家置一喙而人暁之耶刑餘小醜不比人􅀋顧乃熒惑聖心虧損聖德以至此極而公􅀸大臣拱手熟視無一言以救其失臣之痛心始者惟在於此比至都城則又知此曹之用事者非獨此人而侍從之臣蓋巳有出其門者臣伏見陛下即位以來臣下稍有知識無不以此事爲言者旣皆不䝉聴納甚者至或抵罪故自近年以來無復有言此者蓋知其根株牢固不可動揺言之無益徒取乖牾以致􅀁言他事亦不見用故置此事於度外而姑論其次耳不唯如此亦以過失之萌人􅀁創見故以爲異而爭言之及其旣乆則習熟見聞以爲常事而不足言正如近年冬雷秋雪時時有之人遂不以爲異然此豈可常之理哉惟臣愚暗不識時宜故今日猶復論此人􅀁諱言而厭道之事雖幸未䝉誅斥而亦未見有􅀁施行也臣竊思之必使陛下聴踈逺之言而逐其平日􅀷􅀁愛幸之人誠有􅀁難能者然此事利害旣陳於前而臣􅀁􅀷憂又恐其不可爲後聖法也伏惟陛下􅀷爲宗社子孫萬世之慮忍而行之天下幸甚至其納財之塗則又不於士大夫而專於將帥臣於前日亦嘗輒以靣奏而陛下諭臣以爲誠當􅀷察而痛懲之矣退而始聞陛下比於環列之尹巳嘗有􅀁易置乃知陛下固巳􅀷察其弊而無􅀁待於人言然猶未能明正其罪而反寵以崇資巨鎮使卽便安此曹無知何􅀁忌憚况中外將帥其不爲此者無幾陛下亦未能推其􅀋而悉去之也臣竊聞之道路自王抃旣逐之後諸將差除多出此人之手蓋抃與此人專爲諸将交通内侍納賂買官得其指意風喻軍中等第論薦以欺陛下實將帥之牙儈也今雖去之而未正其罪又聞向者鄂帥尅剥之事亦是此人内外營救遂致罪人漏網言者被罪中外至今爲之不平旣而又有匿名揭榜暴其過惡者亦被決配此不惟行遣太偏足為聖政之累而自此之後遂無復有人敢言諸將之罪者以小人握重兵或在周廬肘腋之間或在江湖千里之外而中外無一人敢白其姦此於國計􅀷恐未便前代之􅁥蓋亦非逺伏乞陛下少留聖慮陛下竭生靈之膏血以奉軍旅之費本非得巳而爲軍士者顧乃未嘗得一温飽甚者採薪織屨掇拾糞壤以度朝夕其又甚者至使妻女盛塗澤􅀝市門以求食也怨詈謗讟悖逆絶理至有不可聞者一有緩急不知陛下何􅀁􅀝仗是皆爲將帥者巧爲名色頭㑹箕斂隂奪取其糧賜以自封殖而行貨賂於近習以圖進用彼此旣厭足矣然後時以薄少號爲羡餘隂奉燕私之費以嫁士卒怨怒之毒於陛下且幸陛下一受其獻則後日雖知其罪而不得復有􅀁問也出入禁闥腹心之臣外交將帥共爲欺蔽以至於此豈有一毫愛戴陛下之心哉而陛下不悟反寵暱之以是爲我之私人至使宰相不得議其制置之得失給諫不得論其除授之是非以此而觀則陛下􅀁以正其左右未能及古之聖王又明矣且私之得名何爲也哉据巳分之􅀁獨有而不得以通乎其外之􅁛也故自匹夫而言則以一家爲私而不得以通乎其鄉自鄉人而言則以一鄕爲私而不得以通乎其國自諸侯而言則以一國爲私而不得以通乎天下至於天子則際天之􅀁覆極地之􅀁載莫非巳分之􅀁有而無外之不通矣又何以私爲哉今以不能勝其一念之邪而至於有私心以不能正其家人近習之故而至於有私人以私心用私人則不能無私費於是内損經費之入外納羡餘之獻而至於有私財陛下上爲皇天之􅀁子全付􅀁覆使其無有私而不公之處其􅀁以與我者亦不細矣乃不能充其大而自爲割裂以狹小之使天下萬事之弊莫不由此而出是豈不可惜也哉臣竊聞太祖皇帝改營大内旣成躬御正殿洞開重門顧謂侍臣曰此如我心少有邪曲人皆見之臣竊謂太祖皇帝不爲文字言語之學而其方寸之地正大光明直與尭舜之心如合符節此其􅀁以肇造區夏而垂􅁉無彊也伏惟陛下逺稽前聖而近以皇祖之訓爲法則一心克正而逺近莫敢不一於正矣伏乞聖照􅀂以時勢之利害言之則天下之勢合則彊分則弱故諸葛亮之告其君曰宮中府中俱爲一體陟罰臧否不宜異同􅀂有作姦犯科及爲忠善者宜付有司論其刑賞以昭陛下平明之理不宜偏私使内外異法也當是之時昭烈父子以區區之蜀抗衡天下十分之九䂓取中原以興漢室以亮忠智爲之􅀷謀而其䇿不過如此可謂􅀷知時務之要而暗合乎先王之法矣夫以蜀之小而於其中又以公私自分彼此如兩國然則是將以梁益之半圖呉魏之全又且内小人而外君子廢法令而保姦回使内之􅀁出者日有以賊乎外公之􅀁立者常不足以勝乎私則是此兩國者又自相攻而其内之私者常勝外之公者常􅀒也外有鄰敵之虞内有隂邪之冦日夜夾攻而不置爲國家者亦巳危矣夫以義理言之旣如彼以利害言之又如此則今日之事如不蚤正臣恐陛下之心雖勞於求賢而一有􅀁妨乎此則賢人必不得用而􅀁用者皆庸繆憸巧之人雖勤於立政而一有􅀁礙乎此則善政必不得立而􅀁行者皆阿私苟且之政日往月來養成禍本而貽燕之謀未逺輔相之職不脩紀綱壞於上風俗壞於下民愁兵怨國􅀔日卑一旦猝有不虞臣竊寒心不知陛下何以善其後也然則臣之􅀁謂天下大本惟在陛下之一心者可不汲汲皇皇而求有以正之哉臣昨來靣奏劄子内一節云伏願陛下自今以往一念之萌則必謹而察之此爲天理耶爲人欲耶果天理也則敬以擴之而不使其少有壅閼果人欲也則敬以克之而不使其少有凝滯推而至於言語動作之間用人處事之際無不以是裁之知其爲是而行之則行之惟恐其不力而不當憂其力之過也知其爲非而去之則去之惟恐其不果而不當憂其果之甚也知其爲賢而用之則任之惟恐其不專聚之惟恐其不衆而不當憂其爲黨也知其爲不肖而退之則退之惟恐其不速去之惟恐其不盡而不當憂其有偏也如此則聖心洞然中外融徹無一毫之私欲得以介乎其間而天下之事將惟陛下之􅀁爲無不如志矣今恐日乆元本不存再此具奏伏乞聖照至於輔翼太子之說則臣前日􅀁謂數世之仁者蓋巳㣲發其端而未敢索言之也夫太子天下之本其輔翼之不可不謹見於保􅀓傳者詳矣陛下聖學高明洞貫今古宜不待臣言而喻然臣嘗竊恠陛下􅀁以調護東宫者何其踈略之甚也由前􅀁論而觀之豈非􅀁以自治者猶未免於踈略因是亦以是爲當然而不之慮耶夫自王十朋陳良翰之後宮寮之選號爲得人而能稱其職者蓋巳鮮矣而又時使邪佞儇薄闒冗庸妄之輩或得參錯於其間􅀁謂講讀聞亦姑以􅀿文備數而未聞其有箴䂓之效至於從容朝夕陪侍遊燕者又不過使臣宦者數輩而巳皇太子睿性夙成閱理乆熟雖􅀂無待於輔導然人心難保氣習易汙習於正則正習於邪則邪此古之聖王教世子者􅀁以必選端方正􅀡道術愽聞之士與之居處而又使之逐去邪人不使見惡行蓋常謹之於㣲不待其有過而後䂓也今三代之制雖不可考且以唐之六典論之東宫之官師傅賔客旣職輔導而詹事府兩春坊實擬天子之三省故以詹事庶子領之其選甚重今則師傅賔客旣不復置而詹事庶子有名無實其左右春坊遂􅀡以使臣掌之何其輕且䙝之甚耶夫立太子而不置師傅賔客則無以發其隆師親友尊德樂義之心獨使春坊使臣得侍左右則無以防其戯慢媟狎竒衺雜進之害此巳非細事矣至於皇孫德性未定聞見未廣又非皇太子之比則其保養之具尤不可以不嚴而今日之官屬尤不備責任尤不專豈任事者亦有􅀁未之思耶謂宜􅀷詔大臣討論前代典故東宮除今巳置官外別置師傅賔客之官使與朝夕逰處罷去春坊使臣而使詹事庶子各復其職宫中之事一言之入一令之出必由於此而後通焉又置贊善大夫擬諌官以箴闕失王府則宜稍放六典親王之制置傳友咨議以司訓導置長史司馬以總衆職妙選耆德不雜他材皆置正員不爲兼職明其職掌以責功效則其官屬巳略備矣陛下又當以時召之使侍燕遊從容啓迪凢古先聖王正心脩身平治天下之要陛下之􅀁服行而巳有效與其勉慕而未能及愧悔而未能免者傾倒羅列悉以告之則聖子神孫皆將有以得乎陛下心傳之妙而宗社之安統業之固可以垂於永乆而無窮矣此今日急務之一也臣伏見比者聖詔令皇太子參決庶務此見聖慮之􅀷將使皇太子以時習知國家政事之得失也然臣之愚見則以爲使之習事不􅀂勉其脩德况今皇太子育德春宫幾二十年其於天下之事蓋不待習而無不熟矣獨恐正心脩德之學未至而於物欲之私未免有􅀁係累則雖習於其事而或不能自決於取舍之間故臣竊論輔養之未至者非有他也但欲陛下更􅅏聖意於此而巳伏乞聖照至於選任大臣之說則臣前􅀁謂勞於求賢而賢人不得用者蓋巳發其端矣夫以陛下之聰明豈不知天下之事必得剛明公正之人而後可任也哉其􅀁以常不得如此之人而反容鄙夫之竊位者非有他也􅀡以一念之間未能撤其私邪之蔽而燕􅀻之好便嬖之流不能盡由於法度􅀂用剛明公正之人以爲輔相則恐其有以妨吾之事害吾之人而不得肆是以選掄之際常先排擯此等寘之度外而後取凡疲懦軟熟平日不敢􅀡言正色之人而揣摩之又於其中得其至庸極陋決可保其不至於有􅀁妨者然後舉而加之於位是以除書未出而其物色先定姓名未顯而中外巳逆知其决非天下之第一流矣故以陛下之英明剛斷略不世出而􅀁取以自輔者未嘗有如汲黯魏徴之比顧常反得如秦檜晚年之執政臺諫者而用之彼以人臣竊國柄而畏忠言之悟主以發其姦也故專取此流以塞賢路蔽主心乃其勢之不得巳者陛下尊居宸極威福自巳亦何賴於此輩而乃與之共天下之政以自蔽其聰明自壞其綱紀而使天下受其弊哉夫其􅀁以取之者如此故其選之不得而精選之不精故任之不得而重任之不重則彼之􅀁以自任者亦輕夫以至庸之材當至輕之任則雖名爲大臣而其實不過供給唯諾奉行文書以求不失其窠坐資級如吏卒之爲而巳求其有以輔聖德脩朝政而振紀綱不待智者而知其必不能也下此一等則惟有作姦欺植黨與納貨賂以濁亂陛下之朝廷耳其尤甚者乃至十有餘年而後敗露以去然其列布於後以希次􅀘者又巳不過此等人矣蓋自其爲臺諌爲侍從而其選巳如此其後又擇其􅀹碌碌者而登用之則亦無恠乎陛下常不得天下之賢材而屬任之也然方用之之初亦曰姑欲其無􅀁害於吾之私而巳夫豈知其􅀁以害夫天下之公者乃至於此哉陛下試反是心以求之則庻幾乎得之矣蓋不求其可喜而求其可畏不求其能適吾意而求其能輔吾德不憂其自任之不重而常恐吾􅀁以任之者之未重不爲燕私近習一時之計而爲宗社生靈萬世無窮之計陛下誠以此取之以此任之而猶曰不得其人則臣不信也此今日急務之二也至於振肅紀綱變化風俗之說則臣前􅀁謂勤於立政而善政卒不得立者亦巳發其端矣夫以陛下之心憂勤願治不爲不至豈不欲夫綱維之振風俗之美哉但以一念之間未能去其私邪之蔽是以朝廷之上忠邪雜進刑賞不分士夫之間志􅃐卑汙廉恥廢壞顧猶以爲事理之當然而不思有以振厲矯革之也蓋明於内然後有以齊乎外無諸巳而後可以非諸人今宫省之間禁密之地而天下不公之道不正之人顧乃得以窟穴盤據於其間而陛下目見耳聞無非不公不正之事則其􅀁以熏蒸銷鑠使陛下好善之心不著疾惡之意不深其害巳有不可勝言者矣及其作姦犯法則陛下又未能􅀷割私愛而付諸外廷之議論以有司之法是以紀綱不能無􅀁撓敗而􅀁以施諸外者亦因是而不欲􅀷究切之且如頃年方伯連帥嘗以有贓汙不法聞者矣鞠治未竟而巳有與郡之命及臺臣有言則遂與之祠禄而理爲自陳至於其􅀁藏匿作過之人則又不復逮捕付獄名爲降官而實以觧散其事此雖宰相曲庇鄉黨以欺陛下然臣竊意陛下非全然不悟其欺者意必以爲人情各有􅀁私我旣欲遂我之私則彼亦欲遂彼之私君臣之間顔情稔熟則其勢不得不少容之且以爲雖或如此亦未至甚害於事而不知其敗壞綱紀使中外聞之腹非巷議皆有輕侮朝廷之心姦贓之吏則皆鼓舞相賀不復畏陛下之法令則亦非細故也又如廷臣爭議配享其間邪正曲􅀡固有􅀁在則兩無􅀁問而并去之監司挾私以誣郡守則不問其曲􅀡而兩皆罷免監司使酒以凌郡守亦不問其曲􅀡而兩皆與祠宰相植黨營私孤􅀒任使則曲加保全而使之去臺諌懷其私恩隂拱不言而陛下亦不之問也其有初自小官擢爲臺諫三四年間趨和承意不能建明一事則年除􅀊遷至極其選一日論及一二武臣罪惡則便斥爲郡守而不與職名從臣近典東畿逺帥西蜀一遭飛語則體究具析無􅀁不至及究析來上而􅀁聞不實則言之者晏然一無􅀁訶山陵諸使鬻賣辟闕煩擾吏民御史有言亦無行遣而或反得超遷御史言及畿漕則名􅀘􅀸列而實奪之權其􅀁言者則雖量加絀削而繼以進用臣伏見近年惟有主張近習一事賞信罰必無􅀁假借自餘百事多務含容曲􅀡是非兩無􅀁問似聞聖意以謂如此處置方得均平此誠堯舜之用心也然臣於此竊有疑焉􅀂推其本則臣固巳妄論於前只據平之一字而言則臣於易象稱物平施之言竊有感也蓋古之欲爲平者必稱其物之大小高下而爲其施之多寡厚薄然後乃得其平􅀂不問其是非曲􅀡而待之如一則是善者常不得伸而惡者反幸而免以此爲平是乃􅀁以爲大不平也故雖惟其私意之􅀁在則千􅂗萬轍經營計較必得而後巳甚者以金珠爲脯醢以契劵爲詩文宰相可㗖則㗖宰相近習可通則通近習惟得之求無復廉恥父詔其子兄勉其弟一用此術而不復知有忠義名節之可貴其俗巳成之後則雖賢人君子亦不免習於其說一有剛毅正􅀡守道循理之士出乎其間則羣譏衆排指爲道學之人而加以矯激之罪上惑聖聰下鼓流俗蓋自朝廷之上以及閭里之間十數年來以此二字禁錮天下之賢人君子復如崇宣之間􅀁謂元祐學術者排擯詆辱必使無􅀁容措其身而後巳嗚呼此豈治世之事而尚復􅃘言之哉又其甚者乃敢誦言於衆以爲陛下嘗謂今日天下幸無變故雖有伏節死義之士亦何􅀁用此言一播大爲識者之憂而臣有以知其必非陛下之言也夫伏節死義之士當平居無事之時誠􅀂無􅀁用者然古之人君􅀁以必汲汲以求之者蓋以如此之人臨患難而能外死生則其在平世必能輕爵禄臨患難而能盡忠節則其在平世必能不詭隨平日無事之時得而用之則君心正於上風俗美於下足以逆折姦萌濳消禍本自然不至眞有伏節死義之事非謂必知後日當有變故而預蓄此人以擬之也惟其平日自恃安寜便謂此等人材必無􅀁用而專取一種無道理無學識重爵禄輕名義之人以爲不務矯激而尊寵之是以綱紀日壞風俗日偷非常之禍伏於􅁳􅁳之中而一旦發於意慮之􅀁不及平日􅀁用之人交臂降叛而無一人可同患難然後前日擯棄留落之人始復不幸而著其忠義之節以天寳之亂觀之其將相貴戚近幸之臣皆巳蝢顙賊庭而起兵討賊卒至於殺身湛族而不悔如廵逺杲􅀸之流則逺方下邑人主不識其靣目之人也使明皇早得巡等而用之豈不能銷患於未萌巡等早見用於明皇又何至眞爲伏節死義之舉哉商鑒不逺在夏后之世此識者􅀁以􅀷憂於或者之言也雖以臣知陛下聖學高明識慮􅀷逺决然不至有此議論然每念小人敢託聖訓以蓋其姦而其爲害至於足以􅀷沮天下忠臣義士之氣則亦未嘗不痛心疾首而不敢以識者之慮爲過計之憂也陛下視此風俗爲如何可不反求諸身而亟有以變革之耶此今日急務之三四也至於愛養民力修明軍政之說則民力之未􅁉生於私心之未克而宰相臺諫失職也軍政之未修生於私心之未克而近習得以謀帥也是數說者臣皆巳極陳於前矣今請即民力之未􅁉而推言之臣聞虞允文之爲相也盡取版曹􅀊入窠名之必可指擬者號爲􅀊終羡餘之數而輸之内帑顧以其有名無實積累掛欠空載簿籍不可催理者撥還版曹其爲說曰内帑之積將以備他日用兵進取不時之須而版曹目今經費巳自不失􅀊入之數􅃪其言誠􅅴且美矣然自是以來二十餘年内帑􅀊入不知幾何而認爲私貯典以私人宰相不得以式貢均節其出入版曹不得以簿書勾考其在亡其日銷月耗以奉燕私之費者蓋不知其幾何矣而曷嘗聞其能用此錢以易胡人之首如太祖皇帝之言哉徒使版曹經費闕乏日甚督􅃐日峻以至廢去祖宗以來破分良法而必以十分登足爲限以爲未足則又造爲比較監司郡守殿最之法以誘脅之不復問其政教設施之得失而一以其能剥民奉上者爲賢於是中外承風競爲苛急監司明諭州郡郡守明諭屬邑不必留心民事惟務催督財賦此民力之􅀁以重困之本而稅外無名之賦如和買折帛科罰月椿之屬尚未論也臣伏見祖宗舊法凢州縣催理官物巳及九分以上謂之破分諸司即行住催版曹亦置不問由是州縣得其嬴餘以相􅀘助貧民些少拖欠亦得遷延以待蠲放恩自朝廷惠及閭里君民两足公私俱便此誠不刋之令典也昨自曽懷用事始除此法盡刷州縣舊欠以爲隱漏悉行拘催於是民間稅物毫分銖两盡要登足曽懷以此進身遂取宰相而生靈受害􅁈痛日􅀷得財失民猶爲不可况今政煩賦重民卒流亡􅀁謂財者又將無有可得之理􅀂不蚤救必爲􅀷害臣每讀大學卒章見其􅀁論小人之使爲國家菑害並至雖有善者亦無如之何者其言丁寜痛切未嘗不爲寒心惟陛下少留聖意亟發德音以幸天下其次則陛下􅀁用之宰相不能擇中外大吏而惟狥私情之厚薄􅀁用之臺諌不能公行糾劾而惟快巳意之愛憎是以監司郡守多不得人而其賢者或反以舉職業忤臺諌而遭斥逐也至於監司太多而事權不歸於一銓法雖密而縣令未嘗擇人則又其法之有未善者然其本正則此等不難區處其本未正則雖或舉此臣恐未見其益而反有害也又嘗即夫軍政之不修而推之則臣聞日者諸將之求進也必先掊尅士卒以殖私財然後以此自結於陛下之私人而祈以姓名逹於陛下之貴將貴將得其姓名即以付之軍中使自什伍以上節次保明稱其材武堪任將帥然後具爲奏牘而言之陛下之前陛下但見其等級推先案牘具備則誠以爲公薦而可得人矣而豈知其諧價輸錢巳􅀂晚唐之債帥哉只此一事有耳者無不聞有口者無不道然以其門戸幽􅀷蹤跡詭秘故無路得以窺其交通之實狀是以雖或言之而陛下終不信也夫將者三軍之司命而其選置之方乖刺如此則彼智勇材略之人其孰肯抑心下首於宦官宫妾之門而陛下之􅀁得以爲將帥者皆庸夫走卒固不知兵謀師律之爲何事而惟尅剥之是先交結之是圖矣陛下不知其然而猶望其修明軍政激勸土卒以彊國勢豈不悞哉然將帥之不得人非獨士卒之受其弊也推其爲害之極則又有以及乎民者蓋將帥得人則尺籍嚴而儲蓄羡屯田立而漕運省今爲將帥者如此則固無望其肯核軍實而豐儲蓄矣至於屯田則彼自營者尤􅀁不願故朝廷不免爲之别置使者以典治之而兵屯之衆資其撥遣則又不免使參其務然聞其占護軍人不肯募其願耕者以行而彊其不能者以往至屯則偃蹇不耕而反爲民田之害使者文吏其力蓋有􅀁不能制者是以陛下欲爲之切而乆不得成也屯田不立漕運煩費諸州苗米至或盡數起發而無以供州兵之食則加耗斛靣之弊紛紛而起而民益困矣又凢和買折帛科罰月樁之􅀋往往亦爲供軍之故而不可除􅀂屯田立而􅀁資於諸路者减則此屬庶乎其皆可禁矣今乃不然則是置將之不善而害足以及民也凢此數者根株􅀷固枝條廣闊􅀂不可以朝變而夕除者然究其本則亦在夫陛下之反諸身耳聖心誠無不正則必能出私帑以歸版曹矣版曹不至甚闕必能復破分之法除殿最之科以寛州縣矣聖心誠無不正則必能擇宰相以選牧守矣擇臺諫以公刺舉矣聖心誠無不正則必能嚴宦官兵將交通之禁而以選將屬宰相矣宰相誠得其人則必能爲陛下擇將帥以作士氣討軍實廣屯田以省漕運矣上自朝廷下逹州縣治民典軍之官旣皆得人然後明詔宰相議省監司之員而精其選重其責又詔銓曹使以縣之􅇵易分爲等差而常切詢訪天下之官吏能爲縣者不拘薦舉之有無不限資格之高下而籍其姓名使以次補最􅇵之縣果有治績則優而進之不勝其任則絀而退之凢州縣之間無名非理之供横歛巧取之政其泰甚而可去者可以漸去而民力庶乎其可寛矣至於屯田之利則以臣愚見當使大將募軍士使者招游民各自爲屯不相牽制其給授課督賞罰政令各從本司自爲區處軍中自有將校可使不須别置官吏使者則􅃪其辟置官屬三五人指使一二十人以備使令又擇從官通知兵農之務兼得軍民之情者一員爲屯田使總治兩司之政而通其奏請􅃐其􅀿副又以􅀊時按行察其勤墮之實以行誅賞如此則兩屯心競各務其功田事可成漕運可省而諸路無名非理之供横歛巧取之政前日有􅀁不獲巳而未可盡去者今亦可以悉禁民力庶乎其益􅁉矣此今日急務之五六也屯田一事如臣之䇿亦是將來將帥得人之後方可施行􅀂將帥止如今日􅁍恐徒壊漕司巳成之功無􅀘將帥兵屯之實且乞指揮趂此水災之後廣招流冗并行民屯之䇿以俟見効仍詔漕臣更切詢訪利病之末盡者條具以聞然後隨事商量及時措置庻幾巳成之緒不至動摇輕有廢壊伏乞聖照凢此六事皆不可緩而其本在於陛下之一心一心正則六事無不正一有人心私欲以介乎其間則雖欲憊精勞力以求正夫六事者亦將徒爲文具而天下之事愈至於不可爲矣故􅀁謂天下之大本者又急務之最急而􅀹不可以少緩者惟陛下􅀷留聖意而亟圖之使大本誠正急務誠脩而治效不進國􅀔不彊中原不復􅄷虜不㓕則臣請伏鈇􅃏之誅以謝陛下陛下雖欲赦之臣亦不敢承也然又竊聞之今日士夫之論其與臣不同者非一及究其實則皆􅀁謂似是而非者也蓋其樂因循之無事者則曰陛下之年䆮高而天下亦幸無事年䆮高則血氣不能不衰天下無事則不宜更爲庸人􅀁擾其欲􅁬厲而有爲者則又曰祖宗之積憤不可以不攄中原之故疆不可以不復以此爲務則聖心不待勸勉而自彊舍此不圖則雖欲䇿厲以有爲而無􅀁向望以爲標凖亦卒歸於委靡而巳凢此二說亦皆有理而臣輒皆以爲非者蓋樂因循者知聖人之血氣有時而衰而不知聖人之志氣無時而衰也知天下有事之不可以苟安而不知天下無事之尤不可以少怠也况今日之天下又未得爲無事乎且以衛武公言之其年九十有五矣猶箴儆於國以求䂓諫而作抑戒之詩以自警使人朝夕誦之不離於其側此其年豈不甚高而其戒謹恐懼之心豈以是而少衰乎况陛下視武公之年三分未及其二而責任之重地位之高又有十百千萬於武公者臣雖不肖又安敢先處陛下於武公之下而􅀡謂其不能乎且天下之事非艱難多事之可憂而宴安酖毒之可畏政使功成治定無一事之可爲尚當朝兢夕􅅥居安慮危而不可以少怠况今天下雖􅀂未有目前之急然民貧財匱兵惰將驕外有彊暴之夷虜内有愁怨之軍民其他難言之患隱於耳目之􅀁不加思慮之􅀁不接者近在堂奥之間而逺在數千里之外何可勝數堂奥之說巳陳於前此句更乞陛下少留聖慮追計其前旣未有可見之效却顧於後又未有可守之䂓臣竊見尋常之人將欲属人以一至㣲至細之事猶必先爲䂓摸使其盡善然後􅀁屬之人有􅀁持循而不失吾之􅀁以屬之之意况有天下者將以天下至大之事屬之於人而不先爲盡善可守之䂓以授之乎然臣於此事不敢盡言􅀂䝉聖明少加聖慮則當此之時誠亦一新德業重整綱維不可失之機㑹也臣狂妄􅆫率罪當萬死伏惟陛下裁赦亦安得􅃍謂無事而遂以逸豫處之乎其思􅁬厲者又徒知恢復之不可忘頽墮之不可乆然不知不世之大功易立而至㣲之本心難保中原之戎虜易逐而一巳之私意難除也誠能先其􅀁難則其易者將不言而自辦不先其難而徒欲僥倖於其易則雖朝夕談之不絶於口是亦徒爲虚言以快一時之意而巳又况此事之失巳在隆興之初不合􅃍然罷兵講和遂使宴安酖毒之害日滋日長而坐薪嘗膽之志日逺日忘是以數年以來綱維觧弛釁孽萌生區區東南事猶有不勝慮者何恢復之可圖乎故臣不敢隨例迎合苟爲大言以欺陛下而􅀁望者則惟欲陛下先以東南之未治爲憂而正心克巳以正朝廷脩政事庶幾眞實功效可以馴致而不至於别生患害以妨逺圖蓋􅀁謂善易者不言易而眞有志於恢復者果不在於撫劍抵掌之間也論者又或以爲陛下􅀷於老佛之學而得其識心見性之妙於古先聖王之道蓋有不約而自合者是以不悅於世儒之常談死法而於當世之務則寜以管商一切功利之說爲可取今乃以其􅀁厭飫鄙薄者陳於其前亦見其言愈多而愈不合也臣以爲此亦似是而非之論非􅀁以進盛德於日新也彼老子浮屠之說固有疑於聖賢者矣然其實不同者則此以性命爲眞實而彼以性命爲空虚也此以爲實故􅀁謂寂然不動者萬理粲然於其中而民彜物則無一之不具􅀁謂感而遂通天下之故則必順其事必循其法而無一事之或差彼以爲空則徒知寂滅爲樂而不知其爲實理之原徒知應物見形而不知其有眞妄之别也是以自吾之說而脩之則體用一原顯㣲無間而治心脩身齊家治國無一事之非理由彼之說則其本末横分中外斷絶雖有􅀁謂朗澈靈通虚靜明妙者而無􅀁救於滅理亂倫之罪顛倒運用之失也故自古爲其學者其初無不似有可喜考其終則詖淫邪遁之見鮮有不作而害於政事者是以程顥常闢之曰自謂窮神知化而不足以開物成務言爲無不周徧而實外於倫理窮􅀷極㣲而不可以入尭舜之道天下之學自非淺陋固滯則必入於此是謂正路之榛蕪聖門之蔽塞闢之而後可與入道嗚呼此眞可謂理到之言惜乎其未有以聞於陛下者使陛下過聽髠徒誑妄之說而以爲眞有合於聖人之道至分治心治身治人以爲三術而以儒者之學爲最下則臣竊爲陛下憂此心之害於政事而惜此說之布於來今也如或未以臣言爲然則聖質不爲不高學之不爲不及而􅀁以正心脩身以及天下者其效果安在也是豈可不思其􅀁以然者而亟反之哉臣聞仁宗時有程顥者與其弟頤同受學於周敦頥實得孔孟以來不傳之緒同時又有邵雍張載相與愽約遂使聖道闇而復明其功甚大俗儒淺學旣不足以窺其緼奥姦人鄙夫又以其言居必識敬動由禮義有害於巳之􅀁爲以故相與怨疾指爲道學而加詆訕焉臣巳略論於前矣夫世俗無知旣以道學爲不美則是必欲舉世之人俱無道俱不學悉如巳之􅀁爲而後適於其意耳邪說肆行人心頗僻無􅀁忌憚乃至於此此正閔馬父之􅀁􅀷憂也今敦頥等􅀁著之書頗藏冊府陛下試取而觀之聖學高明必將有默相契合而見諸行事者􅀂遂於此賜一言以表章之則正心之效不惟自得而􅀁以正人心亦在是矣伏惟陛下􅀷留聖意􅀂夫管商功利之說則又陋矣陛下􅀁以取之者則以旣斥儒者之道爲常談死法而天下之務日至於前彼浮屠之學又不足以應之是以有味乎彼之言而冀其富國彊兵或有近效耳然自行其說至今幾年而國日益貧兵日益弱􅀁謂近效者亦未之見而聖賢􅀁傳生財之道理財之義文武之怒道德之威則固􅀁以爲富彊之大而反未有講之者也豈不誤哉今議者徒見老佛之高管商之便而聖賢􅀁傳明善誠身齊家治國平天下者􅀄無新竒可喜之說遂以爲常談死法而不足學夫豈知其常談之中自有妙理死法之中自有活法固非老佛管商之陋􅀁能彷彿其萬分也哉伏惟陛下察臣之言以究四說之同異而明辨之則知臣之􅀁言非臣􅀁爲之說乃古先聖賢之說非聖賢􅀁爲之說乃天經地義自然之理雖以尭舜禹湯文武周孔之聖顔曽伋軻之賢而有􅀁不能違也則於臣之言與夫論者之說其爲取舍從違不終日而决矣抑臣於此又竊有感而自悲焉蓋臣之得事陛下於今二十有七年矣而於其間得見陛下數不過三自其始見於隆興之􅀄固嘗輒以近習爲言矣辛丑再見又嘗論之今􅀊三見而其􅀁言又不過此臣遐方下土田野之人豈有積怨􅀷怒於此曹而固欲攻之以快巳私也哉其􅀁以至於屢進不合而不敢悔者區區之意獨爲國家之計而不敢自爲身謀其愚亦可見矣然自頃以來􅀊月逾邁如川之流一往而不復反不惟臣之蒼顔白髪巳迫遲暮而竊仰天顔亦覺非昔時矣臣之鄙滯固不能别有忠言竒謀以禆聖聽而陛下日新之盛德亦未能有以使臣釋然而忘其夙昔之憂也則臣於此安得不􅀷有感而重自悲乎身伏衡茅心馳魏闕竊不勝其愛君憂國之誠敢冐萬死刳􅄋肺肝以效野人食芹炙背之獻且以自乞其不肖之身焉臣區區私計輒冐威顔并此陳述臣賦性拙􅀡不能隨世俯仰故自早年即自揣度决是不堪從宦􅀁以一向竊食祠禄前後九任豈不知有致身之義亦非恬無濟物之心寜爲退藏蓋以避禍中間稍䝉任使果然自速顛隮十年之間措身無􅀁今者一出又致紛紜幸賴聖明保全終始増其禄秩使足以免於飢寒進其官資使足以延於嗣息此皆巳非臣平生意望􅀁及天地之恩不啻厚矣今者奏䟽止爲感激陛下虚心屈巳容受狂言故竭平日憂國之誠以畢前日願忠之意􅀁冀上有􅀘於聖明下無􅀒於􅀁學而巳非敢變其􅀄心而復有進爲之望也􅀂䝉聖慈詳賜觀覽循其本末次第施行使臣之言卓然實有可見之效則臣不待違心犯患以汚周行而其榮遇巳不在諸臣之後矣如其謬妄無可施行則投閑置散乃分之宜雖欲借之恩私適足增其慚懼决非臣之􅀁敢當也竊恐陛下見其􅀁論懇切誤謂尚堪使令故復具奏伏乞聖察伏惟陛下哀憐財赦而擇其中則非獨愚臣之幸實宗社生靈之幸臣之􅀁論雖爲一時之弊然其規畫實皆治體之要可以傳之乆逺而無窮蓋前聖後聖其時雖異而其爲道未嘗不同此臣之言􅀁以非徒有望於今日而又將有望於後來也踈逺賤微言不敢盡伏惟聖慈憐臣愚忠赦其萬死或因皇太子參决之際特賜宣示千萬幸甚臣熹誠惶誠恐昧死再拜謹言考異壬午應詔居官任職一本作任責上流督帥一作師帥皇帝之意者一本無者字戊申封事意蓋爲此一作如此小註幸未䝉一作不䝉然猶未能一作未嘗是皆爲將帥一本無爲字小註而此人趣操不謹一作不定减則此屬一本無則字則又曰一本無又字晦庵先生朱文公文集卷第十一福州府學訓導舒鏊校晦庵先生朱文公續集卷第十一與劉德華充迪某聞風甚乆屏跡丘樊無由瞻奉兹焉假守密邇治封政化流聞益勤傾跂謹因致問布此腹心諒辱深照某衰病餘生不堪吏事兹􅀩聖恩强􅂌民社扶曵至此不敢爲乆居計顧念未有以仰報使人之意者訪聞管下諸縣有與貴邑地􅀔交錯稅籍猥并之處􅀁以賦重民貧凋殘特甚向來貴邑得賢守令力爲申請巳􅀩蠲减之恩而此間獨仍其舊念欲以此哀告朝廷仰祈寸澤輙擬就借貴邑當來申請一宗文字以爲楷式諒仁人之心無間彼此得檢示去人令就抄録以歸實爲厚幸某乆不奉問鄕徃馳情比以郡境枯旱異常夙夜憂勞不知􅀁以爲計意者君子􅀁臨當不至是也備災之具經營似頗有緒但檢放一事未有長䇿盖太詳則民有勞費太略則又恐有不均之歎竊恐貴邑施行規模次第必有可見教者專人咨請切幸毋吝法曹經由曽請見否巳囑其歸塗靣扣詳細矣引領以俟至懇至懇建昌利病恐有􅀁聞幸以見警千萬至禱某承示及公文巳行下通放矣聞貴邑􅀁勸未甚多恐不可不早爲之􅀁諸司未必可指凖此間多是兊那合起官錢遣人收糴將來糶畢還錢盖未晚也奉新臨川聞頗有米市井販鬻之家亦可勸諭使徃糴也但陳法還自建昌聞元檢放分􅁆過多今又不可失信王星子與毛􅁺遍行其境還亦言僅可得一分耳民窮固可哀而官司之計將如之何積憂熏心百病交作求去不得未知􅀁以爲計也某數日爲江西舡粟不下憂窘不可言今聞始得少通然財賦有經而饑民猥衆雖竭􅀁有以糴不能爲旬月之備今再遣陳􅁺走建昌更令請教陳謹實勤懇同官中不多得建昌諸人旣難深託百里之命正在此人耳切告推誠毋隱使鄰道之人均􅀍惠澤而守官者頼以不得罪於其民固仁人􅀁樂爲者是以忘其再三之瀆而敬以爲請當辱垂念也昨見三牓懇惻之心形於文墨讀之令人感歎不能自巳貴境放及㡬分别作如何措畫皆望見教中間小報言者有謂州官檢放但憂郡計之不足不恤民力之巳困者可謂平論聞聖心極焦勞但無如有司出内之吝耳某又聞檢放得實州家悉巳施行此見懇惻之誠孚于上下尤深喜慰某示喻仰見憂民之切不勝感􅁣但此雖號鄰􅀖然情意素不相通豈敢輙爾干預恐或徒爲紛紛而無益也向來甞爲錢漕僣道賢德今一書禱之幸試逹之然湏更得民户自言乃相應耳吾人相求而不相值彼亦果何心哉可歎可歎某衰病多故乆不得附致問訊然采聽道塗􅀼知捄荒之政究心悉力不勝歎仰恨有封壤之拘不得少佐下風也某昨移建昌之粟於都昌此兩日給散方畢遂可上奏與之丐賞庶不失信於此人幸甚幸甚孫僉適到此首談長者捄荒之意相與歎息錢漕前日通書巳道區區然政不湏此也敝郡兩邑月解千緍自去夏之供至今不得一文郡中獨力支吾幸不至大叚曠闕前日猶恐將來爲縣道之累巳悉與削其籍矣今日爲縣誠難􅀂郡不恤縣則亦何以責縣之不恤其民乎頋上供給餉種種有不可闕者未知朝廷終何以惠綏之耳某􅀌拙亡庸不自揆度妄意一出竟速顛隮尚頼聖明照知本末假寵從欲􅀁以矜憐慰藉之者甚厚顧無㳙塵可以伏伸報效感之多不􅀂愧之甚也某復􅀩垂喻義學記文極荷不鄙謹巳略述數語具道雅意但卒章之意不欲但以􅀔榮禄利爲言故不復叙植桂之名將來入石只用今􅀁寫去八字書額足矣文字荒淺指意闊踈不審尊意以爲如何不知當屬何人書之更告詳酌也某昨􅀩不鄙委撰義學記文不敢固違草具求教兹辱垂示乃知巳便刋石未加指摘遽爾流播愧懼多矣記中第十行周字下元有澹字今似脫去恐寫去時脫了問兒子乃云寫時亦甞疑之曽來請問乃知是古贍字不應遺忘恐或刻時失之耳此於大義無妨但細讀之覺比上句少一字想無害也其文雖鄙然􅀁叙契丈二事皆可以爲世法更欲多得數十本散施知舊庶有能勉慕其萬分者右得之劉侯之孫觀光今爲浦城尉尉始來過書院祠謁甚敬言乃祖叅議公甞受知文公先生出􅀁蔵帖數十皆集􅀁不載㡬敬讀之其間格言至論真有􅀘世道遂刻以附于集因嘆文公之筆流落世間不傳者凢㡬又嘆前軰流風遺韻日逺日亡其存者㡬能嗣守家訓不替祖風如尉者又寧有㡬賢矣哉劉侯玉山人文公嘗爲之記義學云淳祐庚戌二月甲子後學徐㡬謹識義學記載前集其間誤字觀此可證抑重有感於聖人古史闕文之嘆云
