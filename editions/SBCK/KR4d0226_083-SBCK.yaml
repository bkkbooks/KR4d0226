body:
  text: 䟦䟦朱奉使奏狀右叔祖奉使直閣分還自虜中乞表朱昭等死節事狀也叔祖字少章少從景迂晁公先生學建炎􅀄以諸生􅀿募奉使虜廷守節不屈􅀍留雲中積十六年紹興癸亥和約定乃得歸召對便殿公言虜情詭詐和不可恃宜有以待之又言虜􅀔雖强而無道義以固其國衰亂有萌㡬不可失願益脩徳振兵以俟其變秦丞相巳不樂及上此奏檜益怒遂寢其事不報而公亦旋卒昭等忠義之節遂不復有言者熹每讀其書未嘗不爲之歔欷流涕也今觀歷陽龔君所纂中興忠義録至纎悉矣然亦無昭等名乃録此狀以􅀉和州史君敷文張公請刻而附於其後庶㡬此數人者得託以不朽又記頃見㑹稽有衛士唐某祠問其故曰虜䧟㑹稽車駕倉猝東幸而某以病不及從帥守李鄴亟以城降一日虜酋與鄴並轡行城中某憤怒甚則懷磚石從道旁狙擊之不中因􅀍執􅀅殺之罵不絶口而終越人義而祠之事聞詔賜廟額曰故給事中吳公芾嘗刻石以記其事今此録亦不見恐可并求其記而附刻之也紹熈辛亥十月辛巳新安朱熹書䟦趙直閣忠節録直閣趙公忠義之節爲詔所褒著在信史不可泯没而考其平生所立始終巨細未嘗一念不在國家又足以見見危致命之誠非出於一時事􅀔之偶然也其孫彦橚力學有志又將有以大其門者間以書來視予此録病中讀之蹶然起坐爲之三嘆不能自巳因書其後以見區區慕仰之􅀻云紹熈三年春二月壬辰新安朱熹書䟦趙朝奉行實詩曰秉心塞淵騋牝三千此見人之所以成其富强之業者非必權譎計數之爲務而在於誠實深厚之中也今觀此編則趙侯之行詩人之言豈不兩相發哉侯之子孫旣能脩文學以致爵位又能得當代名勝之文字以顯其親而垂無窮是亦可謂賢矣予是以識之紹熈壬子春二月壬寅朱熹書䟦王荆公進鄴侯遺事奏藁臣前日伏奉聖㫖令進鄴侯遺事今繕冩巳具􅀼以宇文黒􅆩之中材遇傾側擾攘之時而輔之以區區之蘇綽乃能制法如此陛下天縱上智卓然之材有百年無事之中國欲追堯舜三代其􅀔不難豈宜毎事尚或依違牽制流俗不能一有所立以爲天下長計而令任䇿之臣更以蘇綽爲愧也蓋創業垂統其施有漸伏惟成筭巳在聖心臣雖甚愚誠願自竭庶慿末光不以投老餘年爲竊位之臣而巳所有鄴侯遺事謹隨此上進取進止集本宇文黑􅆩之中材下云遇傾側窮困之時而輔以區區之蘇綽然其爲法尚有可取伏惟陛下天縱上智卓然之材全有百年無事萬里之中國欲創業垂統追堯舜三代在明道制衆運之而巳如李泌所稱豈足道哉顧求多聞以考古今得失之數則此書亦或可備省覽熈寜奏對日録云熈寜二年閏十一月十九日上日侯叔獻有言義勇上畨文字必是見制置司商量來余曰此事似可爲恐湏待年􅀊間議之晹叔曰今募兵未消又養上畨義勇則調度􅀹不易余因爲上言募兵之害終不可經乆僉以爲如此余曰今養兵雖多及用則患少以民與兵爲兩故也又五代禍亂之虞終未能去以此等皆本無頼姦猾之人故也上因問府兵之制曰何處言府兵最備余曰李鄴侯傳言之詳備上日府兵與租庸調法相須否余日今上畨供役則以衣糧給之則無貧富皆可以入衛出戍雖未有租庸調法亦可爲也但義勇不湏刺手背刺手背何􅀘於制御之實今旣以良民爲之當以禮義奨養刺手背但使其不樂而實無􅀘也又擇其鄊閭豪傑爲之將校量加奨㧞則人自恱服今募兵爲􅀫衛乃有積官至刺史防團者移此與彼固無不可况不至如此費官禄巳足使人樂爲之陛下審擇近臣使皆有政事之材則他時可令分將此等軍今募兵出於無頼之人尚可爲軍廂主則近臣以上豈不可及此輩此乃先王成法社稷之大計也上良以爲然先君子少喜學荆公書每訪其蹟晚得此藁以校集本小有不同意此爲未定也熹常恨不曉寫進李鄴侯傳於宇文㤗蘇綽事何所預而獨愛其􅁓尾三行語氣凌厲筆􅀔低昻尚有以見其跨越古今幹旋宇宙之意疑此非小故也後讀熈寜奏對日録乃得其說如此甚矣神宗之有志而公之得君也然其後募兵之費竟不能揖而保甲之擾遍天下則所謂定計數於前必事功於後者果何如哉因抄日録家傳本語以附于後覽者有考焉紹熈壬子春二月十九日新安朱熹䟦方季申所校韓文余自少喜讀韓文常病世無善本每欲精校一通以廣流布而未暇也今觀方季申此本讎正精密辨訂詳慱其用力勤矣但舉正之篇所立四例頗有自相矛盾者又不盡著諸本同異爲未盡善蓋此等書前人爲之巳有成例􅀂大書本文於上而用顔監漢書法悉注衆本之同異於其下因考其是非以見定從今本之意則讀者有以曉然知衆本之得失而益信吾書之取舎不誣矣萬一考訂或有未盡取舎不無小差亦得尚存他本别字不遂泯没以待後之君子􅀹乆遠之慮也又季申所謂謝本則紹興甲戍乙亥之間予官温陵謝公弟如晦之子景英爲舶司屬官嘗於其几間見之蓋用天台印本剪裂粘綴依陳後山本别爲次序而卷首欵以建炎奉使之印因讀其送陳秀才序一篇則何不信之有句内輙用丹筆圍去不字􅀄甚駭之再加㝷繹乃知必去此字然後一篇首尾始復貫通蓋傳襲之誤乆矣讀者雖亦微覺其硋而未暇深究也常竊識之以驗他本皆不其然此本雖精亦復不見豈季申讀時便文縱口尚不免小有遺脫將所見者非其眞本先傳校者巳失此字也耶紹熈壬子孟夏病中偶記其後䟦趙中丞行實元祐中丞趙公之元孫舉示予此書一篇趙公之孝謹醇篤雖古人猶難之三復其書令人起敬不勝霜露風木之悲也嘗竊妄謂趙氏家法甚似漢萬石君而其講學制事移孝爲忠之美則石氏不及逺矣因輙􅀻記其語於其後尚恨所謂奏議二十九篇未得盡見而行實之記無始終屨歷􅀊月次第故於其他有不得而論也紹熈壬子秋九月八日新安朱熹題䟦徐來叔歸師堂詩同安徐君來叔取孟子語曹交之言名其堂曰歸師某官戴君尹成旣記之矣來叔復以示予曰願得一言以發明之予謂孟子之言正爲不知反求諸身而專務求師於外者設耳夫道雖􅀂大路然非上智生知之質亦豈能不藉師友而獨得之哉要當有以發其端倪然後有餘師者可得而求耳來叔其以予言思之庶乎其不虚爲此名也紹熈壬子十月㑹慶節日新安朱熹書䟦尹和静帖河南尹君來自臨川出示其大父和静先生遺像及手書歐陽文忠公所作三志仰瞻伏讀不勝敬歎旣模其像以藏于家尹君又俾記於誌文之後熹惟尹氏世徳之盛旣得歐陽公之文以發揮之而和静手書唯謹是亦足以傳世矣􅀌愚晚學何敢僣易輙賛一辭顧其請不巳乃别書幅􅁓以附卷尾云紹熈壬子十月二十五日新安朱熹記䟦唐人暮雨牧牛圖予老於農圃日親犂耙故雖不識􅀞而知此􅀞之爲眞牛也彼其前者却顧而徐行後者驤首而騰赴目光烱然眞􅀂相語以雨而相速以歸者覽者未必知也良工獨苦渠不信然延平余無競出示此卷卷中有劉忠定鄒忠公題字覽之并足使人起敬而龍山老人又先君所選士而余所嘗趨走焉者也俛仰存没爲之􅁣然因識其後而歸之紹熈壬子中冬壬辰新安朱熹䟦楊深父家藏東坡帖楊深父頃甞示予以東坡公與其先世往來手書二􅁓予巳識其後矣今又得盡覽其餘益知二公相與之驩始終不替而又足以見人心公論所在之不可以刑禍屈也因復識之以申前說使世之簡賢附􅀔者知所愧云紹熈壬子中冬壬辰新安朱熹書䟦蔡神與絶筆友生蔡君季通一日奉書一卷以示熹而泣拜且言曰此先人絶筆之書也先人自㓜警悟七􅀊即能爲詩旣長慱學强記髙簡廓落不能與世俗相俯仰因去逰四方聞見益廣遂於易象天文地理三式之說無所不通而皆能訂其得失中年乃歸買田築室於武夷之陽其間屢遭盗賊水火之變而浩然不以屑意杜門掃軌專以讀書教子爲事元定生十年即教使讀西銘梢長則又示以程氏語録邵氏經世張氏正􅀩等書而語之曰此孔孟之正脉也爾其勉􅏧晚􅀊屬疾手書此􅁓以付元定其他丁寜之語亦無不出於忠厚誠實而􅀹以没溺於利慾爲殺身之戒元定涕泣拜受于今四十年旣不能拳拳服􅈾以無失墜而又不能有以表著而顯􅀭之誠竊懼其泯沒而無傳焉惟吾子幸哀而予之一言則不朽之惠豈惟子孫頼之語訖又泣以拜熹亦拜受其書而伏讀之爲之喟然太息曰死生之際人之所不容僞而誠之積者未有不顯于後者也蔡公平生所以教其子者不干利禄而開之以聖賢之學則其志識之髙逺固巳非世人所及矣及其委衾屬纊之餘而其所託猶不異於平日且其字畫壯偉意氣間暇又能無怛於始終之變如此是豈可以勉强而僞爲哉夫如是是以生雖不遇而季通乃能承厥志於今日學行之餘􅀹䆳律曆討論定著遂成一家之言使千古之誤曠然一新而遡其源流皆有明法是亦足以顯其親於無窮尚奚以予言爲哉顧其請之勤有不可虚者是以備論而竊識於其後蔡氏之先仕唐末爲建陽令始家於麻沙世十傳而至公諱發字神與娶同縣詹氏而生季通以紹興壬申􅀊六月卒卒時年六十有四云紹熈壬子􅀊冬十有二月戊申大寒日新安朱熹謹書䟦劉叔通詩卷壬子冬叔通之詩不爲雕刻纂組之工而其平易從容不費力處乃有餘味頃予所見佳句多矣而或不見於此卷豈予所謂大好者乃叔通所謂大不得意者耶寒夜擁鑪風雪大摯吟諷之餘戯書其後雲谷晦菴老人䟦吕伯恭書說予徃年送伯恭父於鵝湖知其有此書而未及見也因問其間得無亦有闕文疑義者乎而伯恭父曰無有予心固竊恠之後數年再㑹於衢州伯恭父始謂予曰書之文誠有不可解者甚悔前日之不能闕所疑也予乃歎伯恭父之學巳精而其進猶未巳然其後竟未及有所刋訂而􅃍不起疾則其微詞奥義無所更索而此書不可廢矣今伯恭父之内弟曽侯致虚鋟木南康而屬予記其後予惟伯恭父所以告予者雖其徒或未必知因具論其本末如此使讀者知求伯恭父晚所欲闕者而闕之則庶㡬乎得其所以書矣紹熈壬予􅀊除日新安朱熹書䟦魏侍郎集建炎紹興之間强虜慿陵兩宫隔絶天子不勝晨夕温凊之念思得忠智敏辯之士徃來兵間以通和好而見大夫媮媠畏縮無肯行者獨故侍郎建安魏公與熹之族祖袐閣公以諸生自薦慷􅁣請行擁蓋張旜略相先後卒冐白刃致命虜廷侍郎公㝷以不受僞官握節以死而族祖亦以必死自誓偶得全璧而歸雖其所值有生死之不同然其􅂢軀狗國之本志素定於胷中者則未始不同也魏公之孫瑛見示此編俾書其後熹惟二公忠義大節固巳載在史􅁽傳之萬世特兩家絶域風霜之舊不可使後之人無聞焉謹齋祓而􅀼識之紹熈癸丑七月􅀄吉具位朱熹謹書書橫渠康節帖後右橫渠先生帖康節先生詩楊文靖陳忠肅二公䟦語故皆藏楊氏而屏山劉氏得之熹因借本摹刻以傳學者其曰餘杭東齋者楊氏記也紹熈癸丑八月丙午朱熹書先吏部手澤後内弟祝康國出示先君子與外大父書熹之不肖於是始生故書中及之今六十有四年矣捧玩手澤涕血交零敬書其後而歸之紹熈癸丑十二月七日􅀌朝散郎祕閣修撰主管南京鴻慶宫熹謹書䟦余巖起集熹少時猶頗及見前輩而聞其餘論覩其立心處巳則以剛介質直爲賢當官立事則以强毅果斷爲得至其爲文則又務爲明白磊落指切事情而無含胡臠卷睢盱側媚之熊使讀之者不過一再即曉然知其爲論某事出某䇿而彼此無疑也近年以來風俗一變上自朝廷搢紳下及閭巷韋布相與傳習一種議論制行立言專以醖藉襲藏圎熟軟羙爲尚使與之居者窮年而莫測其中之所懷聽其言者終日而不知其意之所鄊回視四五十年之前風聲氣俗蓋不啻寒暑晝夜之相反是熟使之然哉觀於龍山余公之文者亦可以􅁣然而有感矣余公諱良弼字巖起自爲諸生即以文鳴於塲屋以鄊舉􅀋試外臺熹之先君子與故直祕閣吴公公路得其文而異之以爲眞有可用之實取而寘之前列旋入幕府即以畫䇿平賊有功出入中外遂分帥閫皆有聲烈平生爲文甚多亡逸之餘所存止此然皆無實􅀿用之作不爲空言没後二十八年其季子大用尉建陽出以相視熹以先世之􅆻又嘗獲以少吏事公於温陵辱獎進而􅀵教焉衰莫零落乃復得斯文而讀之其所感於今昔之變又當如何也哉孔予曰吾猶及史之闕文也有馬者借人乘之今亡巳夫熹於余公之文亦云因太息而書其後大用廉介不苟遇事敢前蓋有公之風烈云紹熈癸丑十二月庚申朝散郎祕閣修撰主管南京鴻慶宫朱熹書書僞詔後熹聞之長老建炎南渡之􅀄車駕巳幸錢塘而留張忠獻公於平江以爲後鎭時故兵部侍郎湯公實爲守將一日聞有赦令當至心獨疑之亟走以白張公公曰姑遣吏屬知書解事者馳往發視有故則緩驛􅀐之行而先取以歸則事可議矣湯公然之則遣州學教授某官往視而歸乃明受僞詔也則又以告曰是則其可宣乎張公曰不然事巳至此胡可匿且卒徒觖於望賜吾屬先受禍矣又何忠之能輸哉湯公曰然則宜柰何張公曰今便發庫錢以示行賞之意乃屏僞赦而隂取故府所藏登極赦書置輿中迎豋譙門讀而張之即􅂢其階禁無敢􅂺登者而散給金帛如常時郊賚故事則可矣湯公行之於是人情略定乃决大計熹常恨世徒知張公復辟之功爲大而於湯公相與謀議曲折所助之深則少有能言之者今讀其家傳又得其焚僞詔事而以前所聞者參之亦足以見公之處此素定不可誣矣兹事􅀹偉而行狀墓誌及其他記録皆略不書何哉柳宗元言司馬遷記荆軻徴夏無且記留侯徴畫工今太史氏方將纂輯髙宗中興盛烈以垂萬世得無亦有取於斯乎紹熈甲寅正月癸亥朔旦朝散郎祕閣修撰主管南京鴻慶宫朱熹謹書題趙清獻事實後國家自熈豐元祐以來人才政事分爲兩塗是此者非彼鄊左者背右旣不可得而同矣而於其同之中又有異焉則若元祐之朔黨洛黨川黨而熈豐之曽文肅趙清獻張丞相又與章蔡自不同也熹少時從趙公之孫惠州使君游得觀趙公手記所與蔡京異論本末蓋嘗三復而歎公之不幸今復從惠州之子某得此書而讀之則又深惟其故而重歎國家之大不幸也夫以趙公之自言下不欲結怨於百姓則必不肯肆行煩苛争奪之橫政中不欲得罪於士大夫則必不肯唱爲禁錮忠賢之邪說外不欲失信於夷狄則必不肯妄起開拓燕薊之狂謀而考其平生質厚清約有過人者則又知其必不肯爲蔡京之􅁋侈導䛕以蠱上心而納之於有過之地也是則雖曰同出於熈豐而其邪正得失之間豈可同年而語哉且春秋明王法而不廢五伯之功元城劉忠定公傷政宣之亂而曰莫􅀂且宗神考然則後之君子之於此書豈不猶有取焉嗚呼其亦可悲也哉其亦可悲也哉紹熈甲寅元日癸亥鴻慶外史朱熹書䟦吕舎人與薛元亮帖薛公安貧守賤之節吕公好賢尚徳之心覽此卷者可以得師矣紹熈甲寅孟夏旣望新安朱熹書䟦薛畏翁詩諸生或問敬當何訓余告之曰是不得而訓也惟畏庶㡬近之今觀薛公之自名與所以訓其孫者知鄙之言不繆也紹熈甲寅孟夏旣望新安朱熹仲晦父觀于臨川城南之客舎因書其後云䟦曽裘父劉子澄帖紹熈甲寅􅀄夏予以赴官長沙道過臨川汪君見過出此卷見示乃曽裘父劉子澄筆迹也旣仰青溪先生之髙行又感二君所立皆凛凛乎其有前軰之遺風而今皆不可見矣爲之掩卷太息汪君得名家之傳有良友之助所學必有以過人者恨以王事馳驅不及細扣之也朱熹仲晦父書䟦吕舎人青溪􅀋藁紹興紫微吕公名徳之重一言一動皆有法戒固非後學可得而賛也其論汪謝諸賢髙志清節皆足以傳信後世孰敢改評獨饒節者一旦毁削膚髪殄絶天倫而諸公環視無一人能止而救之者或乃從更嗟嘆以是爲不可及亦獨何哉因觀此卷竊有感焉輙太息而志其後紹熈甲寅夏四月旣望朱熹仲晦父書䟦曽裘父贈屈待舉詩昔李起居成季見其姪大參漢老之文曰汝於文吾不能有所與但勿求人知耳余嘗愛其言毎爲士友誦之今來江西見其士友多妙於語言而徃徃不能無求人知之意豈於李公之誨未之講耶將旣曰爲文則􅀔必不能無待於外也屈君以詩見知於艇齋矣而猶不能不借重於衆口辱以謂予因爲書此云新安朱熹仲晦父䟦曽仲恭文前輩文字規模宏濶論議雄偉不爲脂韋嫵媚之熊其風氣習俗蓋如此故宣和之後建紹繼起危亂雖極而士氣不衰觀曽公之文亦可以見其彷彿矣近􅀊以來能言之士例以容冶調笑爲工無復丈夫之氣識者蓋深憂之而不能有以正也因讀此編輙􅀻記於其後云䟦鄭宣撫帖賢士大夫不容於邪枉以放於竄逐流離之禍雖其平生至親篤友亦或背而去之甚者安視其狼狽因辱而莫之䘏也當此之時乃有常日未嘗一通聲問之人獨能奮然不顧一時權臣之威虐﨑嶇反側以致其擁護扶持之力而不少懈彼豈故爲詭激之行以驚世取名哉特以秉􅃔好徳之良心憤世疾邪之壯志獨有得於天分之多而又能不爲􅀻情邪念之所回奪是以於此自有不能巳耳嘗記頃年侍坐於端殿尚書汪公見其於當世之士有能此者每極稱歎以爲難能􅀄蓋未能不以爲疑逮此晚􅀊更事旣多然後知其言之有味而識其有􅀘於世教之深也偶觀南豐魯衡父所藏宣撫鄭公與其先君教授公手帖􅀼獨重有感焉因書其後而歸之以爲世之君子宜有讀之而泚其顙者云䟦曽南豐帖熹未冠而讀南豐先生之文愛其詞嚴而理正居常誦習以爲人之爲言必當如此乃爲非苟作者而於王子發舎人所謂自比劉向不知視韓愈如何者竊有感焉今乃得於先生之族孫濰見其親筆不勝歎息文昭公字頃嘗於長樂僧舎見之至於湘潭文肅之書則亦今始得觀也紹熈甲寅夏四月二十二日新安朱熹書于宜春昌山渡之客舎題吕舎人帖人之大倫有五而朋友居其一然世人鮮克知之獨吕公於此爲拳拳焉觀於此帖可以見矣至於其間多以詩文爲教則公晚􅀊蓋深悔之覽者又不可以不知也紹熈甲寅四月二十四日新安朱熹書書夀皇批荅魏丞相奉使劄子臣熹以隆興􅀄元召對垂拱妄論講和非䇿􅃴􅆻上指其後乃聞諸公率定盟約竊意一時君臣之計必有甚不得巳者今得仰窺夀皇聖帝詔報丞相夀春公出疆請事於是信其不誣而夀春公志節之偉謀慮之精於此亦可見矣公子熊夣視臣此軸適當奉諱之後奉玩摧裂涕血交頥敢拜手稽首而書其下方䟦辨志録伯恭父作此書余所見凡數本此又章貢李和卿所次序者其前後次第雖或不同然其所以使人警懼懲毖而謹於細㣲以就全徳之意則未嘗不同也安成彭君又受而傳布之唯恐不廣此意亦可嘉巳紹熈甲寅七月中伏日新安朱熹書于長沙郡齋䟦趙清獻公家問及文富帖䟦語後趙清獻公晚知濂溪先生甚深而先生所以告公者亦甚悉見於章貢送行之篇者可考也而公於佛學蓋没身焉何邪因覽此卷爲之歎息云紹熈甲寅七月二十七日新安朱熹謹記元師在魏一方信嚮蓋所謂魏府老華嚴乃一僧耳讀師爲帥而遂以爲魏公誤矣此題李石䟦語後富公帖中語乃逺方懸料未定之詞碑文所記其必有考矣東坡豈右介父而誣公者耶此題何萬䟦語後䟦三家禮範嗚呼禮廢乆矣士大夫㓜而未嘗習於身是以長而無以行於家長而無以行於家是以進而無以議於朝廷施於郡縣退而無以教於閭里傳之子孫而莫或知其職之不脩也長沙郡慱士邵君囦得吾亡友敬夫所次三家禮範之書而刻之學宫蓋欲吾黨之士相與深考而力行之以厚􅃔倫而新陋俗其意美矣然程張之言猶頗未具獨司馬氏爲成書而讀者見其節文度數之詳有􅀂未易究者徃徃未見習行而巳有望風退怯之意又或見其堂室之廣給使之多儀物之盛而竊自病其力之不足是以其書雖布而傳者徒爲篋笥之藏未有能舉而行之者也殊不知禮書之文雖多而身親試之或不過於頃刻其物雖慱而亦有所謂不􅀂禮不足而敬有餘者今乃以安於驕佚而逆憚其難以小不備之故而反就於大不備豈不誤哉故熹嘗欲因司馬氏之書參考諸家之說裁訂增損舉綱張目以附其後使覽之者得提其要以及其詳而不憚其難行之者雖貧且賤亦得以具其大節略其䌓文而不失其本意也顧以病衰不能及巳今感邵君之意輙復書以識焉嗚呼後之君子其尚有以成吾之志也夫紹熈甲寅八月巳丑朔新安朱熹書書邵康節誡子孫眞蹟後右薌林向氏所藏康節先生誡子孫之文也熹嘗從故友劉子澄得其摹本刻石廬山白鹿精舎今乃􅀗覩其眞格言心畫模範一世伯虎得而葆之所以佑啓厥後者爲亡窮矣借觀累月玩不釋手巳復竊識其後而歸之紹熈甲寅八月日新安朱熹書于豐城傳舎䟦謝艮齋與黃生詩黃生事人有始終之義不以生死二其心蓋有士大夫所難者其節固可嘉而詹公之取人至能使之如此謝公與一時諸名勝又從而表章之皆盛徳事也紹熈甲寅秋社戊申晦翁覽而歎之爲題其後云䟦卨侯行實濠倅卨侯之事尚書謝公傳之巳詳而其孫鈞又欲予記其後予以爲天下之事有其實足矣以爲徒實而不文或不得以傳於後也故文以述之至文以述之而又出於一代醇儒碩徳之手則其傳亦旣逺而足恃矣而又使他人飾虚詞以賛之雖累千百言亦何所加於其實哉旣謝不爲而鈞之請不置且以謝公之命命之予不􅀗避也乃記其語於臨江道旁之客舎云紹熈甲寅八月十七日新安朱熹書䟦曽裘父艇齋師友尺牘此編皆諸前輩所與艇齋曽公往來書䟽也其子濰録以成書乃亦置予言於其間非其倫矣紹熈甲寅經由臨川得而觀之深以愧歎嗚呼艇齋旣不幸即世而卷中人亦往往逝去獨陸務觀與予在耳此又重可悲也八月二十七日熹記書程子禘說後王者禘其祖之所自出以其祖配之而立四廟庶子生亦如之禘其祖之所自出始受姓者也其祖配之以始祖配也文武必以稷配後世必以文王配所出之祖無廟於太祖之廟禘之而巳萬物本乎天人本乎祖故以所出之祖配天也周之后稷生於姜嫄姜嫄巳上更推不去也文武之功起於后稷故配天者湏以后稷嚴父莫大於配天宗祀文王於明堂以配上帝帝即天也聚天之神而言之則謂之上帝此武王祀文王推父以配上帝湏以父也曰昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝不曰武王者以周之禮樂出於周公制作故以其作禮樂者言之猶言魯之郊禘非禮周公其衰是周公之法壞也􅀂是成王祭上帝則湏配以武王配天之祖則不易雖百世惟以后稷配上帝則必以父若宣王祭上帝則亦以厲王雖聖如堯舜不可以爲父雖惡如幽厲不害其爲所生也故祭法言有虞氏宗堯非也如此則湏舜是堯之子苟非其子雖授舜以天下之重不可謂之父也如此則是堯養舜以爲養男也禪讓之事蔑然矣以始祖配天湏在冬至一陽始生萬物之始祭用圎丘器用陶匏藁秸服用大裘而祭宗祀九月萬物之成父者我之所自生帝者生物之祖故推以爲配而祭於明堂也本朝以太祖配於圓丘以禰配於眀堂自介甫此議方正先此祭五帝又祭昊天上帝并配者六位自介甫議惟祭昊天上帝以禰配之太祖而上有僖順翼宣先嘗以僖祧之矣介甫議以爲不當祧順以下祧可也何者本朝推僖祖爲始巳上不可得而推也或難以僖祖無功業亦當祧以是言之則英雄以得天下自巳力爲之並不得與祖徳或謂靈乏無根醴泉無源物豈有無本而生者今日天下基本蓋出於此人安得爲無功業故朝廷復立僖祖廟爲得禮介甫所見終是髙於世俗之儒熹未見此論時諸生亦有發難以爲僖祖無功徳者熹答之曰誰教他㑹生得好孫子人皆以爲戯談而或􅀏之今得楊子直所録伊川先生說所謂今天下基本皆出於此人安得爲無功業乃與熹言黙契至哉言乎天下百年不决之是非於此乎定矣紹熈甲寅閏十月七日臨安寓舎謹書䟦魯直書踐祚篇紹熈甲寅閏十月十日餞范文叔於張功父南湖之上功父出此爲贈云舊得其眞蹟藏之近以主上踐祚巳訓釋并上御府矣因省數曰前入侍講筵上語嘗及此也熹謹記䟦趙清獻公遺帖趙清獻公清忠之節孝友之行冠映古今非賛歎之所可及今年自長沙趨朝屢得見其遺墨皆家問也此卷藏其族孫遵家􅀹見慈祥雍睦之意獨恨三亭蕪没不得追尋晚歩遺跡不勝髙山仰止之歎遵温謹好學能業其家其必有以復之紹熈甲寅中冬八日新安朱熹題於祥符方丈云䟦司馬忠㓗公帖熹舊見張敬夫議司馬忠㓗公謚狀每恨不得其事之本末今過玉山而公之孫爲縣尹始􅀗此帖而觀之敬夫之議可謂信而有徴矣紹熈甲寅中冬十有二日新安朱熹識䟦司馬文正公通鑑綱要眞蹟右司馬文正公手書楚漢間事一卷疑是通鑑目録草藁然又加以總目則今本所無且别有綱要之名不知又是何書也嗚呼公之願忠君父陳古納誨之心可謂切矣竊觀遺跡三復敬歎敢識其後云䟦王樞密答司馬忠㓗公帖司馬忠㓗公仗節虜廷誓死不屈此其報王樞密手書而王公繳進之章也熹竊聞之族祖祕閣公在建炎􅀄實介王公首使不測之虜其後虜人先遣王公歸後往來議講和事而族祖獨留雲中十餘年髙宗皇帝嘉其守節嘗因間使賜以器物甚厚此帖所謝豈亦上賜而使不以君命將之歟不然王公不􅀿持以進也族祖後與洪張二公五人者皆得生還而王馬二公相繼死北方皆全其節吁亦盛矣然觀此帖又足以見一時國歩艱難主憂臣辱之意荒凉慘澹如在目中使人太息流涕不能巳巳因詳記其本末云䟦司焉文正公薦賢帖熹伏讀此書􅀼惟文正公薦賢之公心畫之正皆其盛徳之支流餘裔固不待賛說而人知其可師矣􅀂乃一時諸賢所以受知於公而􅀗名薦書者則恐覽者未能深觀而内省發憤而思齊也如龎元英之居喪以禮蓋一事而屢書焉則公之意可見而此書之存其於世教豈小􅀘哉惜其元豐以後不及豋載而彼爲黨籍者亦足以􅀘此書之闕而集其大成矣熹於是又有感焉因竊記於其後以爲後之君子必有同此歎者紹熈甲寅中冬庚子朱熹謹記再䟦王荆公進鄴侯遺事奏藁熹家所藏荆公進鄴侯家傳奏草臨川石刻摹本丞相益公論之詳矣然所議上畨義勇當時竟不聞有所施行而保甲保馬之法人多不以爲便蓋鄴侯所謂得時用􅀔舎􅀔用力利害相逺固如此也抑公此􅁓詞氣激烈筆􅀔低昻高視一時下陋千古而版本文集所載乃更爲卑順容恱之意是必自疑其亢厲巳甚而抑損之其慮深矣然論其實似不􅀂此􅁓之云發於邂逅感觸之􅀄􅀹足以見其胷懷本趣之爲快也夫以荆公之得神祖可謂千載之一時矣顧乃低徊􅀂此而猶未免有鬰鬰未盡之懷君臣之際功名之㑹嗚呼難哉紹熈甲寅臘月辛巳夜讀有感因書以識其後書釋奠申明指揮後歐陽公言古禮今皆廢失州縣幸有社稷釋奠風雨雷師之祭民猶得以識先王之禮而吏多不習至其臨事舉多不中而色不莊使民無所瞻仰見者怠焉熹始讀之每疑其言之過及仕州縣身親見之而後知公之不妄也淳熈巳亥􅀄守南康嘗一言之朝廷爲取政和新儀鏤版頒下而其本書自多牴牾復以告焉則莫之省矣紹熈庚戌復自臨漳列上釋奠數事且移書禮官督趣乃得頗爲討究則淳熈所鏤之版巳不復存百計索之然後得諸老吏之家又以議論不一越再􅀊乃能定議條奏得請施行而主其事者適徙他官因格不下及又再􅀊而熹守長沙則前慱士詹體仁還爲少卿始復取往年所􅀍敕命下之本郡然吏文重複䌓冗㡬不可讀且曰屬有大典禮未遑徧下諸州也旣而熹亦召還奏事行有日矣又適病目不能省文書顧念兹事得請之難而今所下書乃如此又度其必不能繼下諸州􅀂不亟䟽理而明布宣之是爲巳得請於上而復重見格於下也且自我請之自我尼之不可於是力疾躬爲鈎校刪剔猥釀定爲數條以附州案俾移學官符屬縣且􅀜帥司并下廵内諸州僅畢而行則聞詹卿􅀘外而奉常果不復下其書他州矣熹到闕亦不能兩月而歸明年長沙郡文學邵囦乃以書來曰以公之拳拳於此也謹巳鋟木而廣其傳矣熹嘉其志因爲叙其本末以視後之君子使知夫禮之易廢事之難成􅀋如此不止釋奠一端而巳也慶元元年􅀊在乙􅆗正月五日朝請郎朱熹謹書䟦李侍郎武夷詩觀妙東楹李公侍郎遺墨語意清婉字畫端勁每至其下輙諷玩不能去然􅀊乆剥裂又適當施供張處後十數年當不復可讀矣别爲摹刻授道士使䧟置壁間庶㡬來者得以想見前輩風度李公諱彌遜時以力詆和議出守臨漳云慶元乙􅆗正月甲寅朱熹書䟦東坡剛說蘇文忠公爲孫君介夫作剛說其􅀁以發明孫君之爲人者至矣然剛之所以近仁爲其不詘於欲而能有以全其本心之徳不待見於活人然後可知也寜都主簿鄭載徳得遺跡於君家將摹刻而寘之學宫間以視予因爲識其左方以告觀者使勉夫剛而益求􅀁以爲仁之方云慶元乙􅆗二月癸未新安朱熹書䟦李勉仲詩卷建陽李君從禮一字勉仲予兒時嘗與同學舎然是時從禮旣冠巳有俊聲矣後十餘年乃與予俱試禮部從禮不偶而歸遂放意詩酒間得疾不起始從禮未死時予居屏山􅀊不過一再至建陽與從禮遊不能欵但見其􅁭懷坦然意象軒豁論說縱横雜以詼􅀏傲倪一世􅀂都無意於事者及間見得其詩句乃極清新穩密時出巧思偉麗可喜然亦不多見也晚􅀊來居考亭往茶坂得江文卿而與之遊文卿從禮子婿也能誦從禮佳句􅀹多皆前所未聞者且言嘗次其遺稿得若干篇後爲親友傳玩而失之獨留此卷乃與其先君子唱酬往來者属予書其事因爲略識梗槩如此卷中字孝伯者即文卿先君子老而嗜學喜爲詩寓詞託諷多憂國閔時語愛從禮之才與爲忘年友云慶元乙􅆗三月晦日新安朱熹書䟦郭長陽醫書紹熈甲寅夏予赴長沙道過新喻謁見故煥章學士謝公昌國於其家公爲留飲語及長陽冲晦郭公先生言行甚悉因出醫書曆書數帙曰此先生所著也予於二家之學皆所未習不能有以測其說之淺深則請以歸將以暇日熟讀而精求之而公􅀻倥偬水陸奔馳終􅀊不得休復未暇也明年夏大病㡬死適㑹故人子王漢伯紀自金華來訪而親友方士繇伯謨亦自籍溪來同視予疾數日間乃􅀂粗有生意間及謝公所授長陽醫書二君亟請觀焉乃出以視之則皆警喜曰此竒書也蓋其說雖若一出古經而無所益損然古經之深逺浩慱難㝷而此書之分别部居易見也安得廣其流布使世之學爲方者家藏而人誦之以知古昔聖賢醫道之源委而不病其難耶予念蔡忠惠公之守長樂疾巫覡主病蠱毒殺人之姦旣禁絶之而又擇民之聦明者教以醫藥使治疾病此仁人之心也今閩帥詹卿元善實􅀘蔡公之處而政以慈惠爲先試以語之儻有意耶亟以扣之而元善報曰敬諾乃屬二君讎正刋􅀘而書其本末如此以􅀉之抑予嘗謂古人之於脉其察之固非一道然今世通行唯寸􅀜尺之法爲最要且其說具於難經之首篇則亦非下俚俗說也故郭公此書備載其語而并取丁徳用密排三指之法以釋之夫難經則至矣至於徳用之法則予竊意診者之指有肥瘠病者之臂有長短以是相求或未得爲定論也蓋嘗細考經之所以分寸尺者皆自􅀜而前郤以距乎魚際尺澤是則所謂􅀜者必有一定之處亦若魚際尺澤之可以外見而先識也然今諸書皆無的然之論唯千金以爲寸口之處其骨自髙而􅀜尺皆由是而却取焉則其言之先後位之進退若與經文不合獨俗間所傳脉訣五七言韻語者詞最鄙淺非叔和本書眀甚乃能直指髙骨爲􅀜而分其前後以爲寸尺隂陽之位似得難經本指然世之髙醫以其贗也遂委棄而羞言之予非精於道者不能有以正也姑附見其說於此以俟明者而折中焉慶元元年乙􅆗􅀊五月丙午鴻慶外史新安朱熹書題嗣子詩卷大兒自㓜開爽不􅀋常兒予常恐其墮於浮靡之習不敢教以詩文旣沒後許進之乃出其所與唱和詩卷示予予􅀄不知其能道此語也爲之揮涕不能巳不忍復觀也爲書其後而歸之以識予哀云慶元乙􅆗六月旣望晦翁書䟦邵康節檢束二大字康節先生自言大筆快意而其書蹟謹嚴如此豈所謂從心所欲而自不踰矩者耶慶元乙􅆗七月旣望後學朱熹觀趙􅂂常所藏撿束大字敬書䟦蒼玉詩卷余頃􅀊數往來江西飽聞閤皁之勝每以不能一往遊焉爲恨今觀蒼玉詩卷則亦不待身到脚歷而小院廻廊風篁雪竹巳了了在眼中矣軒中主人讀書弹琴終日遊居寢卧其間而不知􅀊月之逝其樂詎可量耶况今桂山先生巳往遺墨益可貴重陳君其葆藏之慶元乙􅆗七月二十八日鴻慶外史朱熹書䟦武侯像賛乾道丁亥􅀊予遊長沙見張敬夫書室有武侯畫像甚古云是劉丈子駒家藏唐閻立本筆因謂敬夫盍爲之賛敬夫欣然口占立就語簡意到聞者歎服以爲非深知武侯心事者不能道也王兄齊賢因摹本而屬敬夫手題其上後二十九年齊賢諸子出以視予俯仰疇昔如昨日事而三君子皆不可見矣爲之太息記其下方慶元乙􅆗秋八月丁丑新安朱熹仲晦父䟦魏元􅂂墓表元􅂂之塟熹實銘之而刻石納壙中矣其曰事有繋安危治亂之機者則曽覿召還之命也時覿􅀔方盛熹竊過憂恐貽異時丘隴之禍故不欲察察言之而敬夫復表其墓亦放此意故常􅀻念使吾亡友盡言之忠不白於後世其咎乃繇於我每竊愧焉其後淳熈改元之三年孝宗皇帝因納鄭鑑之言而思元􅂂前所進說顧語執政龔公茂良等歎其直諒將復召而用之則聞其死矣嗟悼乆之即下詔曰朝廷不可無直諒之士掞之雖死其以宣教郎直祕閣告其第蓋是時上雖以舊恩遇覿厚然實未嘗及以政事元􅂂自明皆深詆覿者上皆不怒而亟寵襃之無所間於存没遠近傳聞感歎興起顧以敬夫㝷亦下世遂不及損益舊文次傳兹事而亦至今未及刻也元􅂂從弟誠之比得敬夫手書定本以視其兄之友延平使君黃仲本仲本􅁣然即爲買石而刻焉且屬熹復記贈官事以明孝宗納諌思賢抑制近習之微意深可爲後聖法熹亦幸因得追􅀘志銘之闕庶有以慰元􅂂於地下而自贖其顧望回隱之咎云慶元元年九月庚寅新安朱熹識䟦道士陳景元詩碧虚子道士陳景元也頗讀書能詩文一時名勝多與之遊予嘗見其所注莊子及所書相鶴經書頗醇古可觀計於其輩流中亦當小異然元祐間王仲至嘗薦使校中祕道書范醇夫在􅃈闈極論其不可且引王韶章厚開􅁁時以僧自隨因有經略察訪大師之誚今日豈可復使館閣有編校大師耶今觀此卷見其詩句字畫皆清婉可喜而荆公筆語􅀹髙勝偶憶范公語聊書卷尾以發觀者之一笑云慶元乙􅆗九月癸巳朱熹仲晦父書䟦李參仲行狀鍾山先生李公參仲之子季扎奉其先君子行狀一通不逺數百里謁予於建溪之上拜起垂泣而以銘墓爲請予之先世家婺源與公爲同縣人而客於建也乆矣紹興庚午􅀊予年二十餘始得一歸故郷拜其墳墓宗族姻黨於是廼􅀗識公而聽其餘論心固巳知其賢然是時年少新學未能有以扣也中年復歸而再見公然後從游益親而公巳營鍾山所住爲將老焉之計矣兩林之間渠清沼深竹􅀣􅀩密時命予與程弟允夫徜徉其間講論道義談說古今觴詠流行屢移晷刻間乃出其平生所爲文詞使予誦之則皆髙古竒崛而深厚嚴密如其爲人予以是心益敬公而自恨其不能乆留以日相與追逐於東阡北陌之間也旣别而歸書䟽不絶其後數年聞公物故予以憂患疾病之不寜不能一往哭公而公之諸子不以爲罪更以不朽爲託至受其狀而讀之則又允夫之文也三復之餘公之聲容恍若相接永念故國人物眇然如公之賢寜可復得顧雖不敏其何敢有愛於言乎乃以病衰心力凋耗把筆欲下而神巳不俱來矣遂無以塞季子之意而姑記其篇末如此以見允夫之狀果無媿辭予雖有作亦不能有以加也􅅬珙所記足􅀘狀闕大抵數十年來鄉人子弟多自好而善於文詞亦其師友淵源之有自也慶元元年十一月癸巳冬至吳郡朱熹書于考亭所居清􅃉閣䟦吕仁甫諸公帖靖康之亂中原塗炭衣冠人物萃於東南吕公廣問仁父來主婺源簿而奉其兄和問節夫以俱又有維揚羅公靖仲共竦叔共亦來客焉於是李氏父子得從之游而􅅬户曹愷南夫亦受其學觀於此卷可見一時問學源流之盛矣然惟仁父晚􅀊官逹其他諸公多没不顯􅅬􅀹以雋才蚤逝鄉人至今嗟惜之而李丈參仲獨以老壽終爲後進所髙仰雖亦不得施其所有於當世而諸公者乃反頼之以傳其所著􅅬君傳簿㕔記可考也末有建人魏元履與參仲之弟元質書魏時名挺之後改掞之以特起爲官數直諌不得乆居中旣没而天子思之詔襃䘏焉元質亦有羙才好學不幸亦不壽又可見李氏之多賢也慶元乙􅆗仲冬甲辰朱熹題書李參仲家藏二程先生語録後程氏書􅀄出時人以其難得而珍貴之然未必皆能講究而踐行之也近年以來傳者浸廣而後人知其如絲麻榖粟之不可一日無然眞能好之而不舎者則亦鮮矣因觀吕􅅬李三君子傳授舊編及李丈䟦語竊有感焉謹識于後慶元乙􅆗中冬甲辰朱熹記題嚴居厚與馬莊甫唱和詩軸嚴居厚攝事閩清不滿兩月而與其令尹馬莊甫更唱迭酬遂至盈軸争新􅃲巧時出古談篇篇皆有思致讀之不􅁴宦情覊思恍然在目諷詠不巳爲書其後慶元乙􅆗臘月望日遯翁䟦吳中丞家傳故御史中丞吳公剛直之操著於大觀政和之間事具國史略與此傳相表裏其有不合則傳聞之異詞爾至其論薦游御史毛諌議胡文定公皆一世名士足以見公之知人其薦胡公而徽宗亟以手札審其名氏又足以見聖主急賢之羙意則皆不見於史而獨此書爲可考焉是不可以無傳也光禄公與胡公游有朋友之􅁩見於胡公所與吕兵書手簡而熹先君子亦雅相敬重嘗贈以詩有問訊䄂中醫國手不􅀿長與一笻閑之句今讀曾尚書所爲銘識又如此嗚呼其亦可謂賢父子矣其族孫芾出此書以見示因書其後以示公之族黨尚思有以繼其遺烈云慶元丙辰正月二十四日家傳又記􅀍㫖鞠陳正彚事即陳忠肅公所謂獄詞平允閱實於片言之中者史亦不書蓋闕文也張閣守杭乞兼領花石事亦不見他書當表而出之以著其惡云䟦趙忠簡公帖趙公􅀄謫潮州時哭其季子而行旣行又喪長子熹家有吕紫微與先君手書言之猶云不知此老力量能堪之否此帖云今年在貶所而渭亡適半􅀊則是猶在潮未過海也衢守章傑實紹聖故相諸孫雅怨趙公故藉此以發其􅀻忿秦檜知其不專爲巳而借力以逞憾也故不直之不惟翁尉事解傑亦遂廢不用蓋不爲疑其巳甚也翁又胡侍郎妻兄胡亦草制罪狀章厚者其家持此事訴􅁈乃得移蘭溪予與翁亦親舊知之􅀹詳因記於此以􅀘䟦語之未盡云慶元丙辰二月十三日晦翁題再䟦趙忠簡公帖趙公爲相時髙宗因覽元符諌官任伯雨章䟽論章厚蔡卞嘗乞追廢宣仁聖烈皇后事赫然震怒召直學士院胡寅草詔手書以付三省削奪厚卞官爵禁錮親戚子孫其詞有誰無母慈何忍至此之語天下快之趙公猶以行遣太重奏爲申理乞免錮其親戚髙廟手詔襃其仁恕頗爲未减今宸翰猶藏趙氏或爲刻石以傳於世矣然章氏子孫不知也但見趙公力主元祐因謂此事皆出其意而深怨之世亦鮮知其曲折者因復并記於此云䟦張魏公詩羣兇用事人心去大義重新天意回解使中原無左袵斯文千古未塵埃舉大義以清中原此張公平生心事也觀於此詩可見其寢食之不忘然竟不得遂其志可勝嘆哉書張魏公與謝參政帖浚再拜􅇮以急於禄養未及盡心于學兹縁罷退􅀄欲託庇三衢庶有承教之便比又恭領處分俾居福唐失此依頼殊用慊然差人種種悉荷留意􅀹所感激浚再拜熹伏讀丞相張忠獻公所與參政上蔡謝公手書是時張公巳建大功豋右府矣而其執禮之恭如此且又欿然自以爲未始學者而有受教之願焉甚盛徳也謝公外孫甄述祖出以見示三復之餘歎仰不足謹録一通藏之巾篋而敬書其後以歸之慶元丙辰二月甲寅具位朱熹謹記又䟦此張魏公所與謝參政書也凡三幅前幅稱判府參政文丈鈞座後又一書内一幅云某以未􅀍受告命不果具細階拜書伏幸照察其恭如此䟦向伯元遺戒自佛教入中國上自朝廷下逹閭巷治喪禮者一用其法老子之徒厭苦岑寂輙亦傚其所爲鄙陋不經可恠可􅀏而習俗靡然恬不覺悞在唐唯姚文獻公在本朝則司馬文正公􅀜洛程張諸君子以及近世張忠獻公始斥不用然亦未能盡障其橫流也近故朝議大夫向公伯元少受學於胡文定公晚年退處于家尊聞行知不以老而少懈及啓手足親書幅􅁓戒其子孫勿爲世俗所謂道場者筆札端好詞意謹嚴與平日不少異諸􅀌士伯等奉承遺指不敢失墜旣又謀刻諸石以詒乆遠間以視熹熹竊以爲此書之行可爲世法觀者誠能因而推之盡祛末俗之陋以求先王之禮而審行之則斯言也不但爲向氏一門之訓而巳因識其後以發之慶元二年二月辛未新安朱熹謹書書廖徳明仁壽廬條約後匹夫單行而遇疾病無有妻孥之養親舊之託與夫室廬枕席之具醫藥食飲之湏則其輿曵驅馳􅁀露飢渇而轉于溝壑也必矣先王之政道路廬舎委積之法至詳至密而不聞其及此豈有司者因失其傳邪國朝受命覆冐區宇􅆂育􅀺元百有餘年至於崇寜大觀之間功成治定惠澤洋溢隆盛極矣而上聖之心猶軫一夫之不􅀗始詔州縣立安濟坊居養院以收䘏疾病癃老之人徳至渥矣中以多虞不無廢缺近􅀊以來頗復修舉而莆之爲郡縣者猶未暇也今其大夫廖君徳明獨有感焉乃即縣南爲舎一區牓曰仁壽之廬使凡道路往來疾病之民咸得以託􅀫而就哺又請於郡得廢寺之産􅀊入粟􅀂干斛者以供懐安縣儒學訓導葉暢校晦庵先生朱文公文集卷第八十三
