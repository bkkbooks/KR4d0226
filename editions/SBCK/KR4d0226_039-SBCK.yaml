body:
  text: 書問答答戴邁熹來此得足下於衆人之中望其容色接其議論而知足下之所存􅀂有所蓄積而未得其所以發之者心獨期足下可共進於此道及以論語之說授諸生諸生方愕眙不知所向而足下獨以爲可信也手抄口誦而心惟之熹謂足下將得其所以發之者矣甚慰所望今辱書及以所抄四大編示之而責其淺陋之辭託名經端則非熹之任而足下之過也夫執經南靣而以其說與門人弟子相授受此其非熹之任明矣熹無所復道獨敢竊議足下之所以過願寛其􅆫易而幸聴之夫學期以自得之而巳人知之不知之無所與於我也今足下自謂其巳自得之耶則宜無汲汲於此而熹之言亦何爲足下重不然雖熹妄言之於足下何有足下之爲甚過足下勉自求之期有以自得之而後巳熹雖荒落矣尚能與足下上下其說而講評之四編且以歸書室而具其所以然者報足下幸察答林巒辱示書及所爲文三篇􅀂以是質於熹者熹少不喜辭長復嬾廢亡以副足下意然嘗聞之學之道非汲汲乎辭也必其心有以自得之則其見乎辭者非得巳也是以古之立言者其辭粹然不期以異於世俗而後之讀之者知其卓然非世俗之士也今足下之詞富矣其主意立說高矣然􅀋多採摭先儒數家之說以就之耳足下之所以自得者何如哉夫子所謂德之棄者蓋傷此也足下改之甚善示喻推所聞以講學閭里間亦甚善記曰教然後知困知困則知所以自􅆠矣熹所望於足下者在此足下勉旃答林巒率性之謂道脩道之謂教伊川先生說率性之謂道通人物而言更以其說思之脩道之謂教二先生及侯氏說却如此然恐不如吕游楊說尤溪集觧想巳見之喜怒哀樂未發謂之中伊川先生云涵養於未發之時則可求中於未發之前則不可宜更思之檢此叚熟看民鮮能乆矣與甚矣吾衰也乆矣之乆同乆矣之意得之夫婦之愚伊川先生論之巳詳大抵自夫婦之所能知能行􅀡至聖人天地所不能盡皆是說費處而所謂隱者不離於此也道不逺人此叚文義未通又多用佛語尤覺走作且更熟玩其文義爲佳正已而不求人則無怨凡讀書且虚心看此一處文義令語意分明趣味浹洽乃佳切不可妄引他處言語來相雜非惟不相似且是亂了此中正意血脉也答吕侁惠書甚慰所守審如是足下之所存誠逺且大非熹所能及也顧不能不以貧自累而求有以得於人則足下之忍其大而不忍其細又非熹之所能知也抑熹之官於此祿不足以仁其家而無以副足下之意敢以所聞爲謝冀足下之堅其守也貧者士之常惟無易其操則甚善答楊宋卿前辱柬手啓一通及所爲詩一編吟諷累日不忍去手足下之賜甚厚吏事匆匆報謝不時足下勿過熹聞詩者志之所之在心爲志􅀤言爲詩然則詩者豈復有工拙哉亦視其志之所向者高下如何耳是以古之君子徳足以求其志必出於高明純一之地其於詩固不學而能之至於格律之精粗用韻屬對比事遣辭之善否今以魏􅀳以前諸賢之作考之蓋未有用意於其間者而况於古詩之流乎近世作者乃始留情於此故詩有工拙之論而葩藻之詞勝言志之功隱矣熹不能詩而聞其􅀃如此無以報足下意姑道一二盛編再拜封納并以爲謝答柯國材翰辱書示以顔子子貢俱以仁爲問而夫子告之有􅀂不同者此固嘗思之而非如足下之􅀃也爲仁由巳此論為仁之至要蓋始終不離乎此夫其所以求師友而事之之心豈自外至哉旣得師友而事之矣然不求諸巳則師友者自師友耳我何有焉以此意推之則二􅀃者􅀄不異也如足下之言恐非長善救失之意足下思之而反復其􅀃則熹之願他所以見屬者豈熹所敢當哉戴陳二生趣向文辭皆可觀固知其所自矣有友如此足以輔仁敢以爲足下賀而僕亦將有頼焉齋居無事宜有暇日以時過我幸得講以所聞而非所敢望也答柯國材蔡彊來領三月六月九月三書急拆疾讀如奉誨語良慰乆别不聞問之懷幸甚幸甚信後􅀊巳晚矣不審爲况何如伏惟味道有相尊候萬福熹奉親粗遣武學闕尚有三年勢不能待目今貧病之迫巳甚旦夕當宛轉請祠也親年日老生事益􅂓落雖吾道固如此然人子之心不能不􅁣然耳時事竟為和戎所悮今􅀊虜人大入據有淮南留屯不去監前事之失不汲汲於渡江欲圖萬全之舉此可爲寒心而我之所以待敵者内外本末一切刓弊又甚於往年妄論之時矣奈何奈何逺書不能詳言也熹自延平逝去學問無分寸之進汨汨度日無朋友之助未知終何所歸􅀫邇來雖病軀粗徤然心力凋弱目前之事十亡八九至於觀書全不復記以此兀兀於致知格物之地全無所􅀤明思見吾國材精篤之論而不可得臨書怳然也所示易卦次叙此未深究不敢輕為之􅀃但本圖自􅀄爻而隂陽判左三十二卦共一陽右三十二卦共一隂次爻又一變而又交兊與艮交震與巽交而八卦小成矣其上因而重之而成六十四卦此次叙甚明其所以為易者盖因隂陽往來相易而得名非專請震巽四五相易而然也此理在天地間無時不然仰􅀚俯察暑往寒來莫非運用恐不待考諸圖象而後明也然古人制作之妙顯􅀤乾坤造化之機有如此者是亦可樂而玩之耳不合無愧之􅀃在我固然第所不能無恨者精神言語不足以感悟萬一爲恨耳􅀂人人持不合無愧之􅀃則君臣之大倫廢矣如何如何李君好學禮賢其志可嘉國材想亦推誠與之講論有可采處􅀂得同爲此來眞寡陋之幸也春秋工夫未及下手而先生棄去蓋亦以心志凋殘不堪記憶此書雖云本根天理然實與人事貫通若不稽考事迹參以諸儒之􅀃亦未易明也故未及請其􅀃然嘗略聞其一二以爲春秋一事各是􅀤明一例如㸔風水移歩換形但以今人之心求聖人之意未到聖人灑然處不能無失耳此亦可見先生􅀤明之大㫖也論語比年畧加工夫亦只是文義訓詁之學終未有脫然處更有詩及孟子各有少文字地逺不欲將本子去又無人别寫得不得相與商確爲恨爾􅀂遂此來之約則庶㡬得講之耳三序示及想見用心之精但毎毎推與過當恐未得爲不易之論又論語序云學爲仁一節不知見得仁字如何分明後靣節次如何成禠此義湏句句有下落始得不可只如此含糊也近衢州一江元適登仕泳以書來云頃􅀊獨學常窺求仁之端又謂湏明識所謂元者體諸中而無疑則道之進也化也基諸此矣此論似非苟然黙識試一思之如何江君未相識書多好議論亦是一老成前軰也易序中云此以無思似以至此恐亦不能無病試更思之近方再讀此經建陽一學者亦欲講之因招之來年教兒軰得與共學用年􅀊工夫㸔如何昨齊仲􅀉疑義來乃不知是石丞者妄意批鑿非所施於素昧平生之人然渠旣以此道相期必不相恠但在熹有僣率之咎耳所欲言者無窮以乆不得書無所􅀤端今得來示又以來人立俟天寒手冷作字不成不能究悉胷中所欲言千里相望豈勝􅁣嘆但願果能乘便一來庶得傾倒不然終非􅁓札所能具也閤正孺人令郎各安佳老人以下幸安每勤問念至感未由㑹晤之前千萬以時進道自愛不宣閏月晦日熹頓首再拜國材丈執事欲識仁字大槩且㸔不仁之人可見蓋其心頑如鐵石不問義理事任巳知是以謂之不仁識此氣象則仁之爲道可推而知矣因書試言所得以荅合否如何耳答柯國材傳序鄙意不欲如此昨因論語小傳之作巳罄鄙懷不䝉領畧遂更不敢復言今所惠書反謂有所愛於言何耶行行之號尤非所以矯氣習之偏而反之於中和之域區區之意亦不願老丈之爲此稱也如何答柯國材示諭忠恕之􅀃甚詳舊􅀃似是如此近因詳㸔明道上蔡諸公之􅀃却覺舊有病蓋湏認得忠恕便是道之全體忠體而恕用然後一貫之語方有落處􅀂言恕乃一貫􅀤出又却差了此意也如未深曉且以明道上蔡之語思之反復玩味當自見之不可以迫急之心求之如所引忠恕篤欽以下尤不干事彼蓋各言入道之門求仁之方耳與聖人之忠恕道體本然處􅀄不相干也一隂一陽不記舊􅀃􅀂如所示即亦是謬妄之􅀃不知當時如何敢胡􅀃今更不須理㑹但㸔一隂一陽往來不息即是道之全體非道之外别有道也逆順之􅀃康節以爲先天之數今旣曉圖子不得彊􅀃亦不通不􅀂且置之易序兩句大病在彼此二字上今改得下靣不濟事也凡此數􅀃姑塞來問未知中否有便却望垂教幸甚幸甚石文相聚所談何事其篤誠好學巳不易得而議論明快想講論之際少所凝􅆡也書來有少反復草草作荅不能盡所言大抵講學只要理㑹義理非人所能爲乃天理也天理自然各有定體以爲深逺而抑之使近者非也以爲淺近而鑿之使深者亦非也學者患在不明此理而取决於心夫心何常之有好高者巳過高矣而猶患其卑􅆡於近者巳太近矣而猶病其逺此道之所以不明不行而學者所以各自爲方而不能相通也前此以陳許二友好爲高竒喜立新􅀃往往過於義理之中正故常因書箴之蓋因其病而藥之非以爲凡講學者皆當畫於淺近而遂止也然觀聖賢之學與近世諸先生長者之論則所謂高逺者亦不在乎創意立􅀃之間伊川云吾年二十時解釋經義與今無異然思今日意味覺得與少時自别又尹和靖門人稱尹公於經書不爲講解而耳順心得如誦巳言此豈必以創意立􅀃爲高哉今吾軰望此地位甚逺大槩讀書且因先儒之􅀃通其文義而玩味之使之浹洽於心自見意味可也如舊􅀃不通而偶自見得别有意思則亦不妨但必欲於傳注之外别求所謂自得者而務立新􅀃則於先儒之􅀃或未能究而遽舎之矣如此則用心愈勞而去道愈逺恐駸駸然失天理之正而䧟於人欲之私非學問之本意也且謂之自得則是自然而得豈可彊求也哉今人多是認作獨自之自故不安於他人之􅀃而必巳出耳凡此皆石丈書中未及盡布者或因講論之次閑爲及之幸甚幸甚并以呈齊仲順之不知如此卑􅀃還可高意否二公更不及别書也徐丈惠書云有疑難數板却未見之豈封書時遺之耶偶數時村中乏􅁓亦不别拜狀只煩爲致此意幸甚幸甚順之書中似以橫渠平易其心之􅀃爲不然談何容易更且思之爲佳蓋所謂平易者非苟簡輕易之謂也群居終日别作何工夫便中千萬示及一二苟有未安不憚獻所疑以求益也答許順之示諭記中語病的當改云知用其力而不知所以用力之方則未有不反爲之累如何大抵見道未明揣摩求合自然有漏綻處得公如此琢磨爲益大矣後便見報幸甚兩書皆有來意甚慰所望當在何時耶近讀何書工夫次第如何熹論語􅀃方了第十三篇小小疑悟時有之但終未見道體親切處如􅀃仁者渾然與物同體之􅀋皆未有實見處反思茫然爲將奈何熹比因堂劄促行再入文字乞候終秩萬一諸公不欲如此得一教官之屬南去即相見之期近矣但分别之事豈可預料耶山間無他事􅀊豐米賤農家極費力然細民飽食遂無他志亦一幸也答許順之熹衰老幸向安然氣體虚弱非復昔時心力亦未復都不敢思慮舊業荒廢無所􅀤明反而求之似於存養用力處未有地位甚以自懼耳如吾友於此却巳有餘第未能逹於詞命之間恐其間亦有未徹底處却宜於事物名數上着少工夫蓋旣無精粗本末之異即此亦不可忽也喪禮留意甚佳但其度數亦不易曉􅀂哀敬之實則吾友素知之矣當益有餘味也近得橫渠語錄有云曲禮乃天地五藏䰟􅅎心府寓於其事試思此語亦足以􅀤耳記文如所改甚善但所辨􅀃未能盡曉熹意欲云心之為體亦微矣彼不知用力於此者固狥於物欲而不自知餘即悉如來示蓋不能用其力之語亦似有病了眞如衆盲模象逹者見之可付一􅀏答許順之檀弓篇云殷旣練而祔周卒哭而祔孔子善殷㩀孔子以殷禮爲善則當從殷禮練而祔無疑矣然今難遽從者蓋今䘮禮皆周禮也葬而虞虞而卒哭卒哭而祔是一項事首尾相貫􅀂改從殷禮俟練而祔即周人之虞亦不可行欲求殷禮而證之又不可得是以雖有孔子之言而未敢改也温公只依周禮唐開元禮及近世亦有改者然終不安禮文極是宻察不可儱侗故聖人致詳於此豪髪不差蓋未詳未盡則於已之心且不能安民之不從尚未論也疑夫子於二代之禮必有􅀋此者闕其一二則無所證矣前書因見讀禮故勸以致詳微細因有損所有餘勉所不足之言來書乃謂本末精粗夲無二致何用如此分别此又誤矣􅀂每每如此則更無用功處更無開口處矣子夏對子游之語以爲譬之草木區以别矣何嘗如此儱侗來惟宻察於區别之中見其本無二致者然後上逹之事可在其中矣如吾子之􅀃是先向上逹處坐却聖人之意正不如是雖至於尭舜孔子之聖其自處常只在下學處也上逹處不可著工夫更無依泊處日用動静語黙無非下學聖人豈曽離此來今動不動便先􅀃箇本末精粗無二致正是鶻崙吞􅀥向來李丈􅀃鐵籠􅇁却之病恐未免也答許順之承在縣庠爲諸生講􅀃甚善甚善但所􅀉諸􅀃求之皆似太過􅀂一向如此恐駸駸然遂失正途入於異端之􅀃爲害亦不細差之豪􅁵謬以千里况此非特豪􅁵之差乎三復來示爲之悵然巳輙用愚見附注於下然其曲折非筆端可盡恐當且以二先生及范尹二公之􅀃爲標準反復玩味只於平易慤實之處認取至當之理凡前日所從事一副當高竒新妙之􅀃並且􅀝閣乆之見實理自然都使不著矣蓋爲從前相聚時熹亦自有此病所以相漸染成此習尚今日乃成相誤惟以自咎耳如子韶之􅀃直截不是正理􅀃得儘高儘妙處病痛愈深此可以爲戒而不可學也何由靣話究此精微臨風鬰結無有窮已國材元聘爲况如何昨􅀉得疑難來又是一般􅀃話大抵齊仲順之失之太幽深順之尤甚而三公失之太執著執著者有時而通幽深者蕩而不反矣中間一條平坦官路却沒人行著只管上山下水是甚意思因書可錄此意及二序送之爲致不及書之意范伯崇學大進劉徳明者亦稍識理趣皆可喜耳伯崇雜􅀃一􅁓附去可見其持守不差見理漸明之大槩矣然其􅀃有少未盡更求之却以見喻伯崇去年春間得書問論語數叚其􅀃甚高妙因以呈李先生李先生以爲不然令其慤實做工夫後來便别此亦是一格也然其當時高妙之􅀃亦只是依諸先生􅀃而推言之過當處耳非如順之所示硬將文義拗橫􅀃却也切宜速改至祝至祝大抵文義先儒盡之蓋古今人情不相逺文字言語只是如此但有所自得之人㸔得這意味不同耳其􅀃非能蝢異於衆也不可只管立􅀃求竒恐失正理却與流俗詭異之學無以異也只據他文理反復玩味乆之自明且是胷中開泰無許多勞攘此一事巳快活了試依此加功如何答許順之讀書大抵只就事上理㑹㸔他語意如何不必過爲深昧之􅀃却失聖賢本意自家用心亦不得其正䧟於支離恠僻之域所害不細矣切宜戒之只就平易慤實處理㑹也必有事焉之書不曽接得不知如何上蔡云出入起居無非事者正以待之則先事而迎忘則渉乎去念助長則近於􅅏情聖人之心如鏡所以異於衆人也觀此所謂事者只是事事之事遇此一事則事此一事本體昭然此便見所謂操則存舎則亡也見此理極平易只在目前人自貪慕高逺所以求之過當而自失之也近再㸔論語尹先生􅀃句句有意味可更玩之不可以爲常談而忽之也伊川先生云立言當含畜意思不可使知徳者厭無徳者惑此言深有味更思之如何答許順之空空如也或者多引眞空義如何二程先生􅀃此叚甚分明橫渠􅀃似過當了愚謂且以二程先生之􅀃爲主理㑹正當文義道理自在裏許只管談玄􅀃妙却恐流入詖淫邪遁裏去貧而樂云云善莫病於有爲學莫病於自足有爲則無爲而或輟自足則不足而或止此學者之太病而賢逹之必期於進徳也蓋善自已之當然而學湏至於不厭知所當然則貧而樂富而好禮驕與謟無所事也知所不厭則切瑳以道學􅅣磨以自脩學問明辯之不可已也是宜引詩以自况亦明道學之無窮也此叚雖無病然語脉中窒礙處亦多大凡不必如此立􅀃此先儒之􅀃巳畧具矣李光祖􅀃甚善不逆詐不億不信此有以見聖人皆欲天下後世歸於寛厚長者之域處蓋天下不能皆君子不能皆小人私淑艾之可也今設有詐與不信之人彼未必不心知其非第此以誠實之道處之亦未必不觀感而化不亦善乎何用逆億爲然君子可欺以其方難罔以非其道􅀍以小人之道來使此而不先覺豈不爲所罔乎故亦在所先覺方爲賢耳逆詐億不信恐惹起自家機械之心非欲彼觀感而化也胡明仲云逆億在心是自詐自不信也只是此意􅀂如此􅀃便支離了不親切抑亦先覺者是賢乎李光祖曰理地明白則私智無所用之矣此􅀃極善齊仲云抑亦二字當玩味有深意固是如此莫湏也著先覺方是賢乎乎者疑問之辭以上意未盡故疑問也杜夫子曾語宰我明命􅀑神以爲黔首則百姓以畏萬民以服則知古人立社豈虚設哉亦以土地所宜之木而使民知戒懼其爲教莫大焉然哀公問社宰我宰我受學聖人之門豈無格言以正其心術直以是而長之逢之宜得罪於聖人故反覆重言而深罪之如我戰則克夫子非不知陣而對靈公必以爼豆􅀳乗楚檮杌魯春秋孟子非不知聞而對威文以無傳凡此皆引君於當道曽謂宰我乆學於聖人而不之知豈有􅀘於名教者耶此叚只依古註爲是又謂古人立木於社使民知所存著知社之神必有所司則國君所以守社稷其嚴乎三桓擅改而魯之權失所司則哀公之問社宰我因其問而言使民戰栗惜乎其􅀃之不詳故夫子歎之曰成事不􅀃謂不爲之詳􅀃也遂事不諌謂不因事而諌也使宰我之知不足以知之則無責可矣知而言之不盡此聖人之所以惜之也旣徃不咎蓋因其問而可以言而不言旣徃之失今則無及矣無可咎也猶曰今無可言矣答許順之與四時俱者無近功所以可大受而不可小知也謂他只如此一事之能否不足以盡君子之藴故不可小知任天下重而不懼故可大受小人一才之長亦可器而使但不可以任大事耳和順道徳而理於義窮理盡性以至於命莫非命也順受其正則君子於此將如何哉亦曰脩其在我者以聽其在天者而巳矣和順於道徳是黙契本原處理於義是應變合宜處物物皆有理湏一一推窮性則是理之極處故云盡命則性之所自來處以此推之自不重􅃨不必如前所􅀃答許順之山間有一二學者相從但其間絶難得好資質者近得一人似可喜亦甚醇厚將來亦可望也齋舎迫狹巳遷在圭甫屋後佛頂菴中相聚矣向聞與齊仲在凈隱不知得多少時㸔何文字如何作工夫今􅀊復相聚否所有􅀤明條示數端得反復焉亦勝空書往來耳所示孟子􅀃備見用意之精然愚意竊謂如此反似求索太過援引大雜使聖賢立言之本意汩沒不明巳逐叚妄以巳意畧論其一二梗槩矣可以􅀋推其餘不能一一備論也語錄中有一節正論此今亦錄去可詳味之便見病痛處亦非小疾不可執吝以爲無傷而不之改也齊仲元聘書中各有少辨論大抵亦止是理㑹近時學者過髙之失可并取觀也答許順之亦將以利吾國乎以利心爲仁義即非仁義之正不待有不利然後仁義阻也孟子見梁襄王出語人曰云云定于一只是混一之一與徳惟一之一不同不必過爲此􅀃出而語人亦是偶然􅀃及不必言公天下之善以下云云之􅀃齊宣王問曰齊桓􅀳文之事可得聞乎云云君子之道譬如行逺必自邇譬如升高必自卑推之有本用之有序􅀄非有甚高難行之事但病不求之耳歸而求之有餘師安在乎行險以僥倖區區於覇者之爲而昧於遵王之道哉故孟子特指惻怛愛牛之一端以啓其行不著而習不察之病欲齊王之知吾有是心亦曾於愛牛處見之吾安得而自失之耶反之吾身急於百姓何止乎及禽獸而巳正納約自牗之論因其明以投之也惜乎齊王終身由之而不知其道且曰夫我乃行之反而求之不得吾心是亦豈眞知反而求之哉第不過見孟子之論而一時消盡鄙吝之心故有是云爾使真知求之則明益明而聖益聖能自巳乎不得吾心無有是也此叚甚好然語亦有過當處齊宣王問曰交鄰國有道乎湯事􅁑之事見於孟子詳味其曲折則知聖人之心矣君子不以天下儉其親云云此極言仁人孝子之心親切處當其親親之重雖大而天下苟得用心亦不以為大而儉於其親而不用也况其餘乎非必天下也推其心是如此此􅀃甚好熹舊􅀃此句以猶爲也不爲天下惜一棺椁之費而儉於其親也更參酌㸔如何爲穩却示報也有餘不敢盡云云在我雖有餘然猶不敢以爲盡謂只如此了蓋道體無窮雖文王亦只得云望道而未之見耳有餘不敢盡似止是過者俯而就之之意故下文云言顧行行顧言君子胡不慥慥爾其文意可見也答許順之石丈惠書以夫子見謂詳此二字古人用之本非尊稱如伐顓􅁷之季氏毀仲尼之叔孫皆得以稱蓋猶曰夫夫之人之比耳然以孔門弟子稱仲尼以此故後之人往往避其號蓋不惟不敢使人以是加諸巳亦不敢以是加諸人也熹􅀄通書不欲紛紜及此幸爲一言􅁇此惠音削去二字乃所願望不然不敢拜而受也告爲深陳之至懇至懇且旣以道相知凡百禮文之過其宜者恐亦有可刋落者得并及之幸甚幸甚答許順之此間窮陋夏秋間伯崇來相聚得數十日講論稍有所契自其去此間㡬絶講矣幸秋來老人粗健心間無事得一意體驗比之舊日漸覺明快方有下工夫處日前眞是一目引衆盲耳其􅀃在石丈書中更不縷縷試取觀之爲如何却一語也更有一絶云半畆方塘一鑑開天光雲影共徘徊問渠那得清如許爲有源頭活水來試舉似石丈如何湖南之行勸止者多然其􅀃不一獨吾友之言爲當然亦有未盡處後來劉帥遣到人時巳􅀬遂輟行要之亦是不索性也答許順之書中所諭皆的當之論所恨無餘味耳更向平易著實處子細玩索湏於無味中得味乃知有餘味之味耳之所譬焉如石丈所􅀃反求諸身亦是要切但經文指意恐不必如此脩身等事前章已􅀃了此章正是理㑹脩身齊家中間事􅀂不如此即愛憎予奪皆不得其所矣譬字只是度量擬議之意義以方外之事然義􅀄不在外也如何如何敬齋記所論極切當近方表裏㸔得無疑此理要人識得識得即雖百千萬億不爲多無聲無􅆨不爲少􅀂如所疑即三綱五常都無頓處九經三史皆爲剰語矣此正是順之從來一箇窠􅍫何故至今出脫不得豈自以為是之過耶聞有敬字不活之論莫是順之敬得來不活否却不干敬字事惟敬故活不敬便不活矣此事所差豪􅁵便有千里之繆非書札所能盡切在細思㑹當有契耳先覺之論只著得誠字感字亦是贅語只如文字不敢與柯丈見便是逆詐億不信了吾人心中豈有許多事耶夜氣之􅀃近得來答始覺前􅀃之有病也答許順之今􅀊却得擇之在此大有所益始知前後多是悠悠度日自兹䇿勵不敢不䖍但道力衰薄未知能終不退轉否耳大學之􅀃近日多所更定舊􅀃極陋處不少大抵本領不是只管妄作自悮悮人深爲可懼耳向所論敬字不活者知何近日又見此字緊切處從前亦只是且如此􅀃擇之必相報矣答許順之熹一出㡬半年學問思辯之益警􅀤爲多大抵聖門求仁格物之學無一事與釋氏同所以㝷常議論間偶因記憶自然及之非是特然立意與之争勝􅀒較曲直也想見孟子之闢楊墨亦是如此故其言曰予豈好辯哉予不得巳也今觀所與祝弟書乃有謗釋氏之語殊使人驚嘆不知吾友别後所見如何而爲是語也及細讀二書則所可恠者不特此耳且論其大者如所謂棲心淡泊與世少求玩聖賢之言可以資吾神養吾眞者一一勘過只此二十餘字無一字不有病痛夫人心是活物當動而動當静而静動静不失其時則其道光明矣是乃本心全體大用如何湏要棲之淡泊然後爲得且此心是箇什麽又如何其可棲也耶聖賢之言無精粗巨細無非本心天理之妙􅀂眞㸔得破便成巳成物更無二致内外本末一以貫之豈獨爲資吾神養吾眞者而設哉􅀂將聖賢之言作如此㸔直是全無交渉聖門之學所以與異端不同者灼然在此􅀂㸔不破便直喚作謗釋氏亦何足恠吾友若信得及且做年􅀊工夫屏除舊習案上只看六經語孟及程氏文字著開擴心胷向一切事物上理㑹第一不得喚作塵事昏心也方知體用一源顯微無間是眞實語不但做兩句好言語􅀃爲資神養眞胡荼自巳之􅀃而巳也又承見警此則甚荷相愛之深然儒者之學於此亦只是順理而巳當顯則顯當黙則黙􅀂􅆂養深淳則􅀤必中節更無差互旣未到此地位自是隨其氣習所􅀤不同然􅀂一向矯枉過直則柔弱者必致狂􅁀剛􅆠者必爲退縮都不見天理之當然惟聖門之學以求仁格物爲先所以􅀤處自然見得是非可否不差毫髪其工夫到與不到却在人今吾友見教要使天下之人不知有自家方做得事且道此一念從何處來喚做本心得否喚做天理得否直是私意上又起私意縦使磨挫掩藏得全不􅀤露似箇没氣底死人亦只是計校利害之私與聖門求仁格物順理􅆂養氣象大故懸隔信知儒釋只此豪􅁵間便是繆以千里處却望吾友更深思之仍將此書遍呈諸同志相與反復商􅃀不可又似向來􅀃先覺之義更不與徐柯二丈見也朋友商論正要得失分明彼此有益何必於此揜覆只此是私意根株􅀂不拔去使之廓然太公何縁見得義理眞實處耶所論好善優於天下只是一箇公字此等處何不公之甚也答許順之􅀹溪書來議論極佳不知平日講論於此等處有異同否􅀂無異同則亦可疑耳擇之所見日精工夫日宻甚覺可畏如熹軰今只是見得一大綱如此不至墮落邪魔外道耳􅀂子細工夫則豈敢望渠也徐柯二丈及汝器近思諸友相聚􅀃何等話向者程舶來求語錄本子去刋因屬令送下邑中委諸公分校近得信却不送往只令葉學古就城中獨校如此成何文字巳再作書答之再送下覆校千萬與二丈三友子細校過但􅀃釋氏處不可上下其手此是四海九州千年萬􅀊文字非一巳之私也近聞越州洪适欲刋張子韶經觧爲之憂嘆不能去懷􅀂見得孟子正人心承三聖意思方知此心不是苟然也二先生集一部納去可與二丈及林王陳諸友同看巳有一本并通書送縣學通書偶盡且􅀉此去亦適值只有此一本不能徧􅀉耳聞巳喫肉甚善推此􅀋而擴充則異􅀃不能惑矣答許順之承上巳日書知嘗到城中校書曲折甚慰甚慰但且據舊本爲定􅀂顯然謬誤商量改正不妨其有闕誤可疑無可依據者寜且存之以俟後學切不可以私意輙有更改盖前賢指意深逺容易更改或失本眞以誤後來其罪將有所歸不可容易千萬千萬舊來亦好妄意有所增損近來或得别本證之或自思索㸔破極有可􅀏者或得朋友栺出所幸當時只是附注其傍不曾全然塗改耳亦嘗爲人校書誤以意改一兩處追之不及至今以爲恨也答許順之文字鏤板有次第否無異論否徐柯二丈通問否學之不講似是而非之論肆行而莫之禁所欲言者非書可旣答許順之石兄書來云順之旦夕到彼深欲去相聚以此間事緒牽繫動不得屈指月日直到來年春夏間始得少間耳㓜兒未有讀書處甚以爲撓地逺不能遣去􅀹溪甚可恨也經閣所要二書偶未有本俟有􅀉去答許順之乾之爲卦上下純乾天之動也人欲不與焉潜只得潜見合當見三則過矣君子尤當致謹四則徳盛仁熟磨不磷􅄺不緇不可以常情測進退去就時不可失皆所以進吾徳脩吾業也先儒多以舜自深山之中及其爲天下之事明之其弊恐必至於王氏謂九三之知九五之位可至而至之得非以利而言乎乾卦皆聖人之徳六爻乃其所處之位也如以舜明之深得其象舜亦非知尭之位可至而往至之也熟讀程傳可見不湏别立􅀃􅀂專以進徳爲言則九五上九兩爻又如何解人而不仁如禮何人而不仁如樂何仁也者人也合而言之道也旣巳不仁痒痾疾痛巳尚不知頑􅁳之甚安知其禮樂之爲禮樂也是其無如之何也宜矣大畧如此更宜玩味㸔教著實何有於我哉自聖人觀衆人則徧爲爾徳無不可者自衆人觀聖人則猶天之不可階而升也故聖人因事發見示之以無有也猶曰女奚不曰云云皆其本分事爾此意固好然聖人之詞不如是之夸也恐只是謙退不居之詞論語有兩處何有於我哉湏并觀之夜氣不足以存始論豈無仁義之心哉無之是生不得惟其物交物則惟知有物遂與隔絶孟子於夜氣言之當其萬慮澄寂之中體之虚明自别引而喪之者無有矣故欲以復之􅀄爻及之庶幾有以用力如何人皆本有仁義之心但爲物欲所害恰似都無了然及其夜中休息之時不與物接其氣稍清自然仁義之良心却存得些子所以平旦起來未與物接之際好悪皆合於理然才方如此旦晝之所爲便來梏亡之此仁義之心便依前都不見了至其甚也夜間雖得休息氣亦不清存此仁義之心不得便與禽獸不逺學者正當於旦晝之所爲處理㑹克巳復禮懲忿窒慾令此氣常清則仁義之心常存非是必待夜間萬慮澄寂然後用功也􅀂必如此則日間幹當甚事也不逺復更檢易傳㸔與所論亦不相似操則存仁能守之舎則亡仁不能守之出入無時莫知其郷惟心之謂與仁之不可巳也如是似以操則存舎則亡爲人心惟危出入無時莫如其郷爲道心惟微妄意推測慙怍之甚乞賜提誨一二庶知所向幸甚幸甚孟子此四句只是􅀃人心是箇活物湏是操守不要放舎亦不湏如此安排也心一也操而存則義理明而謂之道心舎而亡則物欲肆而謂之人心亡不是無只是走出逐物去了自人心而􅀵回便是道心自道心而放出便是人心頃刻之間恍惚萬狀所謂出入無時莫知其郷也所引仁字尤不是正是倒􅀃了且更平心玩味不要􅀃得太高妙無形影非唯教他人理㑹不得自家亦理㑹不得也大率講學本爲聖賢之言難明故就下靣􅀃出教分明􅀂是向上靣􅀃將去即轉見理㑹不得矣如建州人未識泉州湏且教他從南劔州問路去豈可教他過漳州㝷耶此是大病不可不知答許順之所論操舎存亡之􅀃大槩得之然有未分明處湏他日靣論也在山頭理㑹數條始知舊􅀃太高之弊如君子不謂命止是以所值於外者而言如舜之於瞽瞍文王之於紂晏嬰之於孔子孔子之不得時位之􅀋不須􅀃氣質不同蓋爲下兩句􅀃不行故也凡􅀂此􅀋甚多皆好高之弊大抵讀書以此爲戒且於平易切近分明處理㑹爲佳耳答許順之春來弔喪問疾畧無少暇前月末間元履又不起疾交逰凋落可爲傷歎而􅀊月如流悔吝日積亦將無聞而死爲可懼耳所喻孟子疑處甚善鄙意㝷常正以疑此􅀂如諸家之􅀃即每事只􅀃得一􅁁要湏􅀃口之於味云云此固性之所欲然在人則有所賦之分在理則有不易之則皆命也是以君子不謂之性而付命於天仁之於父子云云在我則有厚薄之禀在彼則有遇不遇之殊是皆命也然有性焉是以君子不謂之命而責成於已湏如此㸔意思方圓無欠闕處請試思之更與石丈諸公參較喻及爲幸答許順之尤川學政甚肅一方向風極可喜擇之書來云古田宰聞之亦欲效顰果爾則石宰之化不止行於尤川矣天下事無不可爲但在人自彊如何耳觀此可見也順之旣有室家不免畧營生理書中所􅀃不知當如何措畫此固不得不爾也粗有衣食之資便免俯仰於人敗人意思此亦養氣之一助也但不可汲汲皇皇役心規利耳想順之於此必有處决不至如此也答許順之齋記子細㸔未甚活絡未湏刋刻如何學不到此地位彊勉鬭凑不通檢􅀧如此如此便是靈驗處也答許順之閤中安好想亦能􅅴淡泊相􅂇經家務也脩身齊家只此是學更欲别於何處留心耶熹因循苟且今將老矣而進脩之功略不加進於此每有愧焉相見似無可􅀃别後又覺得有無限􅀃話合商量以此臨風每深懷想耳答許順之熹爲朝廷不許辭免州府差官逼迫甚無好况然亦只得力伸巳志他無可言者示喻是吾憂也楊謝之􅀃固未爲得順之所論亦過當唯尹公乃是􅀤明程子之意試更思之似亦只是稱巳勉人之意聖人本意似只如此也答許順之所示數條鄙意有未安者巳具􅁓尾大抵舊來多以佛老之似亂孔孟之眞故每有過高之弊近年方覺其非而亦未能盡革但時有所覺漸趨平穩耳順之此病􅀹深當痛省察矯揉也鄧尉持已愛人如此甚不易得但今時學者輕率大言先將㳟敬退讓之心壞了不是小病􅀂實有爲巳之意先去此病然後可耳答許順之潮州有一許敬之者聞嘗相過甚好不知謝簿識之否煩爲問云今在何處因書報及陳君詩亦佳大凡學者勉其務實少近名爲佳耳答陳齊仲向所􅀉示詩解用意甚深多以太深之故而反失之凡所疑處重巳標出及錄舊􅀃求教幸試思之因便垂誨幸幸三事之喻甚善但旣知其驕矜走失而猶以爲未可去不知更欲如何方可去也差之毫􅁵繆以千里豈容公然走失耶相馬之􅀃恐與忠恕之意不同蓋忠恕之理則一而人之所見有淺深耳豈有所揀擇取􅃕於其間哉學者欲知忠恕一貫之指恐亦當自違道不逺處著力方始隱約得一箇氣象豈可判然以爲二物而不相管耶格物之論伊川意雖謂眼前無非是物然其格之也亦須有緩急先後之序豈遽以爲存心於一草木器用之間而忽然懸悟也哉且如今爲此學而不窮天理明人倫講聖言通世故乃兀然存心於一草木一器用之間此是何學問如此而望有所得是炊沙而欲其成飯也來諭似未看破此處病敗恐不免出入依違之弊耳近嘗辯論雜學家數家之􅀃謾錄此數條去不審高明以爲如何順之不二法門則不可休不可休似未是不二法門請更於此下語如何渠所􅀉來孟子􅀃大抵其􅀃亦苦於太高却失本意可更商量須於平易明白中薦取不必如此打遶也答徐元聘文王無伐紂之心而天與之人歸之其􅀔必誅紂而後巳故有肅將天威大勲未集之語但紂惡未盈天命未絶故文王猶得以三分之二而服事紂􅀂使文王未崩十二三年紂惡不悛天命巳絶則孟津之事文王亦豈得而辭哉以此見文武之心未嘗不同皆無秋意視天與人而巳伊川謂無觀政之事非深見文武之心不能及此非爲存名教而􅀤也􅀂有心要存名教而於事實有所改易則夫子之錄泰誓武成其不存名教甚矣近世有存名教之􅀃大害事將聖人心迹都做兩截㸔了殊不知聖人所行便是名數􅀂所行如此而所教如彼則非所以爲聖人矣周公東征不必言用權自是王室至親與諸侯連衡背叛當國大臣豈有坐視不救之理帥師征之乃是正義不待可與權者而後能也􅀂馬鄭以爲東行避謗乃鄙生腐儒不逹時務之􅀃可不辨而自明陳少南於經㫖多踈略不通􅀧撿處極多不足據以爲􅀃來教所謂周公之志非爲身謀也爲先王謀也非爲先王謀也以身任天下之重也此語極佳召公不􅀃蓋以爲周公歸政之後不當復留而巳亦老而當去故周公言二人不可不留之意曰嗚呼君巳曰時我我亦不敢寜于上帝命弗永逺念天威越我民罔尤違又歴道古今聖賢􅀝頼老成以固其國家之事又曰予不惠􅀂兹多誥予惟用閔于天越民只此便見周公之心每讀至此未嘗不喟然太息也試於此等處虚心求之如何答徐元聘承喻人物之性同異之􅀃此正所當疑當講者而考訂精詳又見志意之不衰也慰幸慰幸熹聞之人物之性本無不同而氣禀則不能無異耳程子所謂率性之謂道兼人物而言又云不獨人爾萬物皆然者以性之同然者而言也所謂人受天地之正氣與萬物不同又云只是物不能推人則能推之者以氣禀之異而言也故又曰論性不論氣不備論氣不論性不明二之便不是熟味此言可見先生之意豈􅀂釋氏之云哉來喻云云胡子知言正如此􅀃内一章首云子思子曰者是也然性只是理恐難如此分裂只是隨氣質所賦之不同故或有所蔽而不能明耳理則􅀄無二也至孟子􅀃中所引乃因孟子之言只􅀃人分上道理􅀂子思之意則本兼人物而言之也性同氣異只此四字包含無限道理幸試思之􅀂於此見得即於聖賢之言都無窒礙矣答王近思向所􅀉論筆勢甚可觀但少主宰著眼目多􅀍題目轉却已是大病又多用莊子語虚浮無骨肋試取孟韓子班馬書大議論處熟讀之及後世歐曾老蘇文字亦當細考乃見爲文用力處今人多見出莊子題目便用莊子語殊不知此正是千人一律文章􅀂出莊子題目自家却從别處做將來方是出衆文字也老鈍乆不爲文如此主張未知是否更思之更思之抑人之爲學亦不專爲科舉而巳不審吾友比來於爲巳之學亦嘗致意否汝器諸友相聚日所講者何事因來更詳及此爲佳答王近思窮居且爾憂苦之餘無復仕進意杜門脩身以畢此生而已累書所問縁多出入無人收拾往徃散落以此不及奉報然其大畧只是要做文字應科舉誇世俗而巳年來􅂴廢於此􅀹悉棄置不能有所可否於其間也答王近思示喻學之難易及别􅁓所疑足見好問之意本欲一一答去然熟觀之似未嘗致思而汎然發問者􅀂此又率然奉答竊恐秪爲口耳之資而無益問學之實今且請吾友只將所問數條自加研究自設疑難以吾心之安否驗衆理之是非縦未全通亦湏可見大畧然後復以見諭計其間當有不待問而决者矣所云或者競生新意不知此是何人并幸喻及答王近思别􅁓所示適此冗冗不及細觀大抵似有要􅀃高妙作文章之意此近世學者之大患也但日用之間以敬爲主而於古昔聖賢及近世二先生之言逐一反復子細玩味勿遽立􅀃以求近功則乆之當有貫通處而胷次了然無疑矣答王近思所論縷縷巳悉大抵吾友明勉有餘而少持重韜晦氣象此是大病今秋􅀂與薦送能迂道一見過幸幸所懐當面布之乃可盡耳聞祝弟持大學􅀃及觀過知仁辨論去皆是向來草藁徃返未定之􅀃渠乃不知本末持去悮人甚不便可爲焚之答王近思前此欲銘先夫人之墓以未嘗習爲之無以應命亦自念君子之事親以誠正不在此但能篤志力行使人謂之君子之子則其爲親榮也大矣祭文􅀹所未解凡喪父在父爲主今自主之一失也古者將葬祖奠遣奠祝以事告而無文辭二失也古人居喪則言不文蓋哀戚勝之不能文也今文甚矣又將振而矜之此三失也孔子曰喪與其易也寜戚吾友其未之思歟大抵吾友誠慤之心似有未至而華藻之飾常過其哀故所爲文亦皆辭勝理文勝質有輕􅀭詭異之態而無沉潜温厚之風不可不深自警省訥言敏行以改故習之謬也答王近思校書聞用力甚動近作一序畧見編纂之意􅀂但欲旦夕自警則亦何必求其辭之美耶精思力行於送往事居之際而識其所由來是則學者之急務也答王近思所示疑問深見好學之篤巳輙具注所見於下且更於先逹所言之中擇取其精要者一􅀃反復玩味乆而不忘當自有心解處不可妄以私意穿鑿恐失之浸逺難收拾也如必聞其政之􅀃亦駸駸然走作了也戒之戒之答王近思到此怱怱三月政不得施教不得行日有愧怍而巳所論巳悉洪範􅀃未暇細㸔此間相去不逺不知能畧見訪相聚數日否此事湏欵曲講論方見意味非文字言語可􅀉也人還草草餘俟靣道答王近思平時無事是非之辯似不能惑事至而應則䧟於非者十七八雖隨即追悔後來之失又只如故今欲臨事時所謂可喜可恠可畏可沮者不能移其平時之心其道何由此是夲心䧟溺之乆義理浸灌未透之病且宜讀書窮理常不間斷則物欲之心自不能勝而本心之義理安且固矣顔子在陋巷而顔路􅅴㫖有闕則人子不能無憂顔子方不改其樂必有處此矣此􅀃亦只是上條意思此重則彼自輕别無方法别無意思也孔子謂夷齊不念舊惡則是其父子兄弟之間猶有可議也蘇氏違言之􅀃果可據乎孔子之言必有見矣伯夷旣長且賢其父無故舎之而立叔齊此必有故故蘇氏疑之觀子貢問怨乎之意似或有此意然不必疑但㸔後來求仁得仁便無怨處則可以見聖賢之心便有甚死讎亦只如此消融了也孫思邈膽欲大之􅀃有所未喻彼丈夫也我丈夫也吾何畏彼哉霍光小心謹厚而許后之事不可以爲不知馬援戒諸子以口過而裏屍之禍乃口過之所致二人之編在小學無亦取其一節耶采葑采菲無以下體取人之善爲巳師法正不當如此論也答王近思昨在郡怱怱不能欵曲至今爲恨耳别􅁓疑義巳悉奉答亦恨向來不得靣論也熹歸來數日卜葬未定湖南誤恩不容祗赴又聞經界報罷不見信於朝廷如此如何更可任一道之􅀉耶􅀄辭未􅁢近巳上章自劾次第必得請矣答王近思吾道一以貫之此􅀃未是更檢精義中二程先生及謝侯二􅀃熟㸔楊尹􅀃正是錯㑹明道意然曽子是力行得熟後見得今人只是􅀃得自是意味不同正便􅀃得十分亦不濟事仁此􅀃未是更檢伊川先生􅀃孝悌爲仁之本愽愛之謂仁心譬如榖種三處㸔更檢易傳復卦􅂏辭及孟子論四端處子細㸔答魏元履欲爲春秋學甚善但前軰以爲此乃學者最後一叚事蓋自非理明義精則止是較得失考同異心緒轉雜與讀史傳摭故實無以異况如老兄心中本閙恐非所以矯失而趨中也愚意以爲不􅀂只㸔論語用年􅀊工夫却㸔證候淺深别作道理然但論語中㸔得有味餘經亦迎刄而解矣聖人之言平易中有精深處不可穿鑿求速成又不可苟且閑㸔過直須是置心平淡慤實之地玩味探索而虚恬省事以養之遲乆不懈當自覺其益切不可以輕易急迫之心求旦暮之功又不可因循媮惰虚度光隂也語録中一兩叚􅀃此事處别􅁓上呈可見此非臆􅀃亦見春秋之未易學也􅀂於此見得一義理血脉方覺從前一團私意妄想自家身心尚且奈何不下如何􅀃得行道救時底話眞是可􅀏語錄散漫亦難㸔卒無入頭處􅀂只欲遮眼又不濟事不􅀂且只就論語中做工夫有胡丈㑹義􅀄本否二先生􅀃論語處皆在其中矣大抵只㸔二先生及其門人數家之􅀃足矣㑹義中如王元澤二蘇宋咸雜􅀃甚多皆未湏㸔徒亂人耳所欲言者甚多然其序􅀃未到幸且勉力終不敢自外也答魏元履裘父所云欲於論語作數􅀃此語可疑㝷常讀書只爲􅅐中偶有所見不能黙契故不得巳而形之於口恐其遺忘故不得巳而筆之於書􅀄不覺其成􅀃也􅀂讀書而先有立􅀃之心則此一念已外馳矣􅀂何而有味耶老兄所論昭烈知有權而不知有正愚意則以謂先主見幾不明經權俱失當劉琮迎降之際不能取荆州烏在其知權耶至於狼狽失據乃不得已而出於盗竊之計善用權者正不如此􅀂聲罪致討以義取之乃是用權之善蓋權不離正正自有權二者􅀄非二物也子房用智之過有微近譎處其小者如躡足之􅀋其大則扶漢以爲韓而終身不以語人也􅀂武侯即名義俱正無所隱匿其爲漢復讎之志如青天白日人人得而知之有􅀘於天下後世非子房比也蓋爲武侯之所爲則難而子房投間乗隙得爲即爲故其就之爲易耳頃見李先生亦言孔明不􅀂子房之從容而子房不􅀂武侯之正大也不審尊意以爲如何答魏元履比來觀何書大抵人當有以自樂則用行捨藏之間隨所遇以安之和静先生云如霽則行如潦則休此言有味也三哥失解能自遣否後生所慮學不足身不立爾得失區區何足深介意也與魏應仲元履子三哥年長宜自知力學以副親庭責望之意不可自比兒曹虚度時日逐日早起依本􅀧禮記左傳各二百字參以釋文正其音讀儼然端坐各誦百遍訖誦孟子三二十遍熟復玩味訖㸔史數板不過五六反復數遍文詞通暢議論精宻處誦數過爲佳大抵所讀經史切要反復精詳方能漸見㫖趣誦之宜舒緩不迫令字字分明更湏端莊正坐如對聖賢則心定而義理易究不可貪多務廣渉獵鹵莾纔㸔過了便謂巳通小有疑處即更思索思索不通即置小冊子逐日抄記以時省閱俟歸日逐一理㑹切不可含糊護短耻於資問而終身受此黯暗以自欺也又置簿記逐日所誦􅀃起止以俟歸日稽考起居坐立務要端莊不可傾􅀝恐至昏怠出入歩趨務要凝重不可票輕以害徳性以謙遜自牧以和敬待人凡事切湏謹飭無故不須出入少􅀃閑話恐廢光隂勿觀雜書恐分精力早晚頻自􅀧檢所習之業毎旬休日將一旬内書温習數過勿令心少有放佚則自然漸近道理講習易明矣答范伯崇癸未前書所詢民可使由之一叚熹竊謂兩􅀃似不相妨蓋民但可使由之耳至於知之必待其自覺非可使也由之而不知不害其爲循理及其自覺此理而知之則沛然矣必使之知則人求知之心勝而由之不安甚者遂不復由而惟知之爲務其害豈可勝言釋氏之學是巳大抵由之而自知則隨其淺深自有安處使之知則知之必不至至者亦過之而與不及者無以異此機心惑志所以生也答范伯崇蘇氏陳靈以後未嘗無詩之􅀃似可取而有病蓋先儒所謂無詩者固非謂詩不復作也但謂夫子不取耳康節先生云自從刪後更無詩者亦是此意蘇氏非之亦不察之甚矣故熹於集傳中引蘇氏之􅀃而繫之曰愚謂伯樂之所不顧則謂之無馬可矣夫子之所不取則謂之無詩可矣正􅀤明先儒之意也大抵二蘇議論皆失之太快無先儒惇實氣象不奈咀嚼所長固不可廢然亦不可不知其失也十五國風次序恐未必有意而先儒及近世諸先生皆言之故集傳中不敢提起蓋詭隨非所安而辨論非所敢也歐陽公本末論甚佳熹亦收在後語中矣似此等且當闕之而先其所急乃爲得耳不可使知之謂凡民耳學者固欲知之但亦湏積累涵泳由之而熟一日脫然自有知處乃可亦非可使之彊求知也機心惑志就吕􅀶士之􅀃求之則只如前日所􅀃爲是學者未知所止則不必言機心惑志只是㝠行妄作耳機心惑志正謂見得一斑半􅀧而鑿知自私之流也聖人教人不過􅀶文約禮而學者所造自有淺深此喟然弗畔所以不同也顔子見聖人接人處都從根本上􅀤見横渠所指是也餘人但能因聖人所示之方愽文以窮理約禮以脩身如此立得定則亦庶乎可以不爲外物誘林異端遷惑矣自今觀之顔子地位見處固未敢輕議只弗畔一節亦恐工夫未到此不可容易㸔也性中只有仁義禮智􅂚嘗有孝悌來此語亦要體㑹得是􅀂差了即不成道理盖天下無性外之物豈性外别有一物名孝悌乎但方在性中即但見仁義禮智四者而已仁便包攝了孝悌在其中但未􅀤出來未有孝悌之名耳非孝悌與仁各是一物性中只有仁而無孝悌也仁所包攝不止孝悌凡慈愛惻隱之心皆所包也猶天地一元之氣只有水火木金土言水而不曰江河淮濟言木而不曰梧檟樲􅁄非有彼而無此也伊川又云爲仁以孝悌爲本事之夲守之本之􅀋是也論性則以仁爲孝悌之本天下之大本之􅀋是也此皆要言細思之則自見矣答范伯崇衛君待子而爲政熹嘗問先生瞽䏂殺人事先生曰蒯聵父子只爲無此心所以爲法律所縛都轉動不得􅀂舜之心則法律縛他不住終身訢然樂而忘天下求仁得仁何怨之有然此亦只是論其心爾豈容他如此去得問先儒八議之􅀃如何曰此乃蔽罪時事其􅀄湏著執之不執則士師失其職矣熹嘗以先生之意參諸明道及文定之􅀃明道􅀃見師訓文定􅀃見哀二年竊謂蒯聵父子之事其進退可否只㸔輙之心如何爾􅀂輙有拒父之心則固無可論􅀂有避父之心則衛之臣子以君臣之義當拒蒯聵而輔之􅀂其必辭則請命而更立君可矣設或輙賢而國人不聽其去則爲輙者又當權輕重而處之使君臣父子之間道並行而不相悖亦必有道苟不能然則逃之而巳矣義至於此巳極精微但不可有毫髪私意於其間耳來喻以謂蒯聵之來諸大夫當身任其責請命於天子而以逆命討之是矣巳嘗有天子之命而蒯聵違之則不請命亦可但又云輙不與謀其事避位而聽於天子則恐不免有假手於大夫以拒父而隂幸天子之與巳之心焉掩耳盗鍾爲罪愈大許多私意都在只是免得自家犯手情理􅀹不好也又云遽然興師以脅其父於人子之心安乎自衛國言之則興師以拒得罪於先君而不當立之世子義也自輙言之則雖巳不與謀而聽大夫之所爲請命於天子而討之亦何心哉來喻本欲臣子之義兩得立意甚善但推而言之便有此病似是於輙之處心緊要處㸔得未甚灑落所以如此孟子所謂不得於言勿求於心不可者此也故愚竊謂輙之心但當只見父子之親爲大而不可一日立乎其位自始至終自表至裏只是一箇逃而去之便無一事都不見其他方是直截不審伯崇以爲如何子貢問士伊川先生所云以子貢平時氣象知之又味夫子所答之意有耻不辱􅂊是依本分不踈脫不是過當底事儘似退後一歩􅀃然考其實則甚難所謂篤實自得之事也便可見往來答問意㫖子貢所以請問其次者蓋爲自省見得有未穩當處可見孔門學者爲巳之實􅀂曰固巳優爲便是失照管也答范伯崇來書謂聖人未嘗以得天下爲心是矣但謂可取則取未可以取則不取莫非順乎天理如此則是有待而爲也語似有病嘗謂文王之事紂惟知以臣事君而巳都不見其他兹其所以爲至徳也􅀂謂三分天下紂尚有其一未忍輕去臣位以商之先王徳澤未忘暦數未終紂惡未甚聖人􅀂之何而取之則是文王之事紂非其本心蓋有不得巳焉耳􅀂是則安得謂之至徳哉至於武王之伐紂觀政于商亦豈有取之之心而紂罔有悛心武王灼見天命人心之歸巳也不得不順而應之故曰予弗順天厥罪惟均以此觀之足見武王之伐紂順乎天而應乎人無可疑矣此恱與來書云云固不多争但此處不容有毫髮之差天理人欲王道霸術之所以分其端特在於此耳來書以謂文武之心􅀄無異㫖固是如此但恐此處不分明即所謂無異㫖者乃是一時差􅁍耳孟子論取之而燕民不恱則勿取文王是也取之而燕民恱則取之武王是也此亦止爲齊王欲取燕故引之於文武之道非謂文王欲取商以商人不恱而止而武王見商人之恱而歸巳而遂往取之也如言仲尼不有天下益伊尹周公不有天下豈益周公伊尹仲尼皆有有天下之願而以無天子薦之與天意未有所廢而不得乎直是論其理如此耳凡此􅀋皆須研究體味見得聖人之心脫落自在無私毫惹絆處方見義理之精微於日用中自然得力所謂知至而意誠也蓋幾微之間衆理昭晣雖欲自欺而不可得矣至此方可􅀃言外見意得意忘言不然止是鑚故􅁓耳愚意如此不知伯崇以爲如何恐有踈繆處切望反復幸甚三分天下一節似因十亂之事而遂言之兼此前後數章皆是歴舉古聖王事如孟子舜明庶物以下數章之比更詳考見教爲幸逹巷黨人本不知孔子但歎美其􅀶學而惜其無所成名謂不以一善得名也此言至爲淺近然自察邇言者觀之則於此便見聖人道徳純備不可以一善各愚夫愚婦可以與知而其所以然者聖人有所不知也故孔子不欲以黨人之所稱者自居而曰必欲使我有所執而成名則吾嘗執御矣何不以是見名乎此章吕與叔􅀃蓋如此但其辭約耳餘􅀃似皆未滿人意如何如何答范伯崇同吕子約蔣子先易變易也隨時變易以從道也易也時也道也皆一也自其流行不息而言之則謂之易自其推遷無常而言之則謂之時而其所以然之理則謂之道時之古今乃道之古今時之盛衰乃道之盛衰人徒見其變動之無窮也而不知其時之運也徒見其時之運也而不知其道之爲也道之爲道實造化之樞機生物之根本其隨其從非有所隨有所從也一氣運行自有所不得巳焉耳所謂易有太極其此之謂歟一􅀃當處便是時其變動不居往來無窮者易也其所以然者道也一􅀃易道之生也故曰易變易也然易有太極故又曰隨時變易以從道也故伊川曰君子順時如影之隨形可離非道也夏􅁑冬裘飢食渇飲豈有一毫人爲加乎其間哉隨時而巳時至自從而自不可須􅁷離也以是知隨時變易以從道三者雖􅀂異名而易之於道􅀄無兩物也然自學者分上言之茍未識夫所謂易則時食而飲時􅁑而裘毫􅁵之差其應皆忒則將以何爲道哉又嘗以是思之盡天下之變而巳不自道者其易之體歟未嘗截然離析者其斯之謂道歟易變易也隨時變易以從道也此指易而言謂人事也以理言之一流行而無窮則時之遷移固自未嘗不隨其所當然而然也當然而然即從道也就人言之衆人不識易而不能體則時旣遷而不知遂以倒行逆施而違其時之所當然惟聖賢之流行無窮而識之體之其身即易故能變易以從道所謂隨時變易以從道猶曰時中云耳道不可直謂之中姑借時中而言耳未知是否易指卦爻而言以乾卦之潜見躍飛之􅀋觀之則隨時變易以從道者可見矣有以見天下之動而觀其㑹通以行其典禮者聖人事也先觀動之一字則知㑹通者變動之緫也天下之事變動無窮而其所以至於如此變動無窮者必有一事爲之端由也此一事者萬變之所緫也聖人則有以見天下之動而舉目即觀夫變動之所緫故無窮之事變滔滔然各入其綱目而事事物物各處之以其所當然所謂行其典禮也典禮事物中之所有而當然者也一􅀃觀㑹通以行典禮㑹通綱要也事物之樞也觀㑹通猶云知至行典禮猶云至之也如父父子子之㑹通惟慈孝而巳至於父止於慈子止於孝各止其則是乃行其典禮也苟不知父父之慈子子之孝則將何自而行其禮乎一􅀃㑹通㑹而且通也未知孰是㑹以物之所聚而言通以事之所宜而言聖人生而知之者也然未生於天地之間則始終之理雖具而大明之者誰乎雲行雨施品物流形聖人出焉大明天道之終始便是卦之六位應時俱成更無漸次由是時乘六龍以御天而變化無窮焉天地設位理固皆具聖人成能理乃大明具者天也明者人也先生批云抹處說得甚巧然極有病自大哉乾元至品物流形是言元亨之義大明終始至以御天是􅀃聖人體元亨之用耳四徳之元專言之則全體生生之理也故足以包四者偏言之則指萬物􅀤生之端而巳故止於一事孔子之言仁專言之也孟子之言仁義偏言之也保合大和即是保合此生理也天地氤氲乃天地保合此生物之理造化不息及其萬物化生之後則萬物各自保合其生理不保合則無物矣各正性命言其禀賦之􅀄保合大和言於旣得之後天地萬物蓋莫不然不可作兩節􅀃也見龍在田徳施普也如日方升雖未中天而其光巳無所不􅀍矣九二君徳巳著至九五然後得其位耳元者善之長也亦仁而巳體仁則痒疴疾痛舉切吾身故足以長人亨者嘉之㑹㑹通也㑹而通也通有交之意嘉㑹猶言慶㑹㑹通而不嘉者有矣如小人同謀其情非不通也然非嘉美之㑹又安有亨乎利者義之和和合於義即利也利物足以和義盖義者得宜之謂也處得其宜不逆於物即所謂利利則義之行豈不足以和義乎貞者事之榦徹頭徹尾不可欠闕人之遇事所以頽惰不立而失其素志者不貞故也此所謂貞固足以幹事文言四徳大槩就人事言之自君子體仁以下體乾之徳見諸行事者也是以係之曰君子行此四徳者故曰乾元亨利貞嘉之㑹衆美之㑹也如萬物之長暢茂蕃鮮不約而㑹也君子能嘉其㑹則可以合於禮矣如動容周旋無不中禮是也利是義之和處義有分别斷割疑於不和然行而各得其宜是乃和也君子之所謂利也利物謂使物各得其所非自利之私也榦猶身之有骨故板築之栽謂之楨榦推此可以識貞之理矣乾元亨利貞猶言性仁義禮智此語甚穩當􅀄九龍徳而潜隱止言其自信自樂而巳至九二出見地上始見其純亦不巳之功也潜者隱而未見行而未成徳雖已完特未著耳旣處無過之地則唯在閑邪純敬而已雖曰無過然而不閑則有過矣􅃀乎其不可拔非專謂退遯不改其操也憂樂行違時焉而巳其守無自而可奪如富貴不淫貧賤不移之意忠信脩辭且大綱􅀃所以進徳脩業之道知至知終則又詳言其始終工夫之序如此親切縝宻無纎悉之間隙忠信便是著實根基根基不實何以進歩脩辭立誠只於平日語黙之際以氣上驗之思與不思而􅀤意味自别明道所謂體當自家敬以直内義以方外之實事者只觀􅀤言之平易躁妄便見其徳之厚薄所養之淺深矣知至則知其道之所止至之乃行矣而驗其所知也知終則見其道之極致終之乃力行而期至於所歸􅀫之地也知而行行而知者交相警􅀤而其道日益光明終日乾乾又安得一息之間哉九三雖曰聖人之學其實通上下而言學者亦可用力聖學淵源幾無餘藴矣忠信心也脩辭事也然藴於心者所以見於事也脩於事者所以養其心也此聖人之學所以内外兩進而非判然兩事也知至至之主至知終終之主終程子此說極分明矣上下無常進退無恒非爲邪枉非離群􅀋則其心之所處果安在哉隨時而變動静不失其宜乃進徳脩業之實也遺書云仁道難言唯公近之非以公訓仁當公之時仁之氣象自可黙識公固非仁然公乃所以仁也仁之氣象於此固可黙識然學者之於仁非徒欲識之而巳答范伯崇有朋自逺方來以平生之所聞驗之􅀂合符節而無絲髪之差豈不樂哉此出於上蔡而其本􅀃太廣撮其要如此此但以志合道同故可樂謝先生謂無絲髪之差不免過言事君則能格其非心不至於以訐爲直格君心之非者大人之事孝悌固是順徳然所造有淺深未必皆能大人之所爲也犯顔而諌主於愛君夫子之告子路亦曰勿欺也而犯之然則所謂犯上者恐不如此直謂出事公卿凡在已上者能移孝心以事之不至犯分而已犯上不必專爲事君凡在巳上者皆是舉事君如此則其他可知孟子曰惟大人爲能格君心之非而穆王命伯冏以繩愆紏繆格其非心則不必大人也前賢如董仲舒之流非一人皆能使其君媿畏而不敢爲非是亦格其非心也記曰辭欲巧詩美仲山甫而以令儀令色稱之則巧言令色非盡不仁也􅀂巧言令色而無徳以將之以是􅀃人之觀聽此之謂失其本心焉得仁有諸中而形諸外則其色必莊而非有意於令其辭必順而非有意於巧君子所以貴乎道者如此詩人所以美仲山甫之徳而非巧言令色之謂也辭欲巧自承上文情欲信爲􅀃蓋曰旣有誠心須善辭令以將之耳與此異㫖鮮者立言婉微之體所謂辭不迫切而意巳獨至者􅀂謂非盡不仁則巧言令色有時而仁矣義恐未安又曰無徳以將之故鮮仁竊謂巧言令色其本巳不正何能復有徳以將之耶辭欲巧乃斷章取義有徳者言雖巧色雖令無害􅀂徒巧言令色小人而巳信近於義橫渠說與謝說自不同如橫渠􅀃逺耻辱一句恐不通竊謂此章意在謹始如言湏當近義慮其後之不可復也㳟湏當近禮恐其自貽耻辱也不敢失親於可賤之人懼其非所可宗也有言必慮其所終行必稽其所敝之意此論頗善退而省其私亦足以􅀤以私爲私室如古注說恐未安竊謂私是顔子自受用處夫子退而黙省之以爲亦足以啓予矣此一句游大信說蓋非顔子不能深喻夫子之言非夫子不足以知顔子之所以潜心也以私爲顔子自受用處恐未安退非夫子退乃顔子退也􅀤啓􅀤也始也如愚人似無所啓􅀤今省其私乃有啓􅀤與啓予之啓不同視其所以此章蓋􅄒上文爲說退而省其私私所安也論語立言雖間以􅀋相從每稱子曰即自爲一叚不必專以上下文求之温故知新學至此而無窮矣至於夫子而猶曰學不厭非以其無窮哉可以爲師者以其足以待無方之問也温故而不知新雖能讀三墳五典八索九丘足以爲史而不足以爲師也此論甚佳人而無信車之與馬牛本兩物以輗軏交乎其間而引重致逺無所不至焉物與我未合亦二物以信行乎其間則物我一致矣夫然後行本文只言車無輗軏不可行譬如人無信亦不可行今乃添入馬牛於其間此蘇氏之鑿子入太廟舊􅀃謂禮主於敬毎事問所以爲敬恐勝今􅀃楊先生之􅀃甚長答范伯崇王制喪三年不􅀕天地社稷惟越紼而行事鄭氏不解不􅀕之義按吕􅀶士云人事之重莫甚於哀死故有䘮者之毀如不欲生大功之喪業猶可廢喪不貳事如此則􅀕雖至重亦有所不行蓋􅀕而誠至則忘哀􅀕而誠不至則不如不􅀕之爲愈後世哀死不如古人之隆故多疑於此鄭氏解惟􅀕天地社稷云不以卑廢尊也愚謂此􅀃非是按天子諸侯之喪所不􅀕者惟宗廟爾郊社五祀皆不廢也天地可言尊於宗廟五祀社稷不尊於宗廟也但内事用情故宗廟雖尊而有所不行外事由文故社稷五祀不可廢其􅀕曽子問䟽所謂外神不可以巳私喪乆廢其􅀕其􅀃優於鄭氏矣内事用情者以子孫哀戚之情推祖考之心知其必有所不安於此曽子問篇曰天子崩國君薨祝取羣廟之主而藏諸祖廟鄭氏注曰象有凶者聚也愚謂此蓋示與子孫同憂之意而子孫之於祖考至敬不文又不可使人攝事必也親之則衰麤不可以臨􅀕又不可以釋衰而吉服狥情而廢禮亦明矣外事由文者有國家者百神爾主天子之於天地諸侯之於社稷大夫之於五祀皆禮文之不可巳者非􅀂子孫之於祖考也以文爲尚故不得以私喪乆廢其􅀕而其􅀕之也必以吉禮吉服故不得巳隨其輕重而使人攝焉期於無廢其文而巳雖哀戚方深交神之意有所不至不得巳也以文而行其亦禮之稱乎又曽子問天子崩殯天子七日而殯五祀之􅀕不行哀戚方甚故不􅀕旣殯而􅀕䟽曰五祀外神不可以巳私喪乆廢其􅀕故旣殯哀情稍殺而後􅀕也其􅀕也尸入三飯不侑酳不酢而巳矣不備禮也自啓􅀅葬啓殯至于反哭旣葬而反五祀之􅀕不行啓殯見柩哀情益深故亦不􅀕巳葬而􅀕義同旣葬祀畢獻而巳也未純吉也鄭氏曰郊亦然社亦然唯嘗禘宗廟俟吉也諸侯自薨至殯諸侯五日而殯自啓至于反哭奉帥天子如天子之禮也左傳僖公三十三年凡君薨卒哭而祔祔而作主特祀於主蒸嘗禘於廟杜氏注謂此天子諸侯之禮不通於卿大夫盖卒哭後特用喪禮祀新死者於􅆍而宗廟四時嘗􅀕自如舊也此與禮記不同釋例又引􅀳三月而葬悼公改服脩官烝于曲沃㑹于溴梁之事為驗戰國禮變如此盖三年之喪諸侯莫之行乆矣左傳特記一時之事而杜氏乃誤爲正禮也右三條皆非士大夫之制然其禮有可得而推者古大夫宗廟有五祀推外事由文之意則五祀惟自卒至殯自啓至于反哭暫廢旣葬殯則使家臣攝之推内事用情之理則宗廟之􅀕宜亦廢也今人家無五祀惟享先一事遭喪而廢蓋無疑矣在喪廢􅀕古禮可攷者如此但古人居喪衰麻之衣不釋於身哭泣之聲不絶於口其出入居處言語飲食皆與平日絶異故宗廟之􅀕雖廢而幽明之間兩無憾焉今人居喪與古人異卒哭之後遂墨其衰凡出入居處言語飲食與平日之所爲皆不廢也而獨廢此一事恐亦有所未安竊謂欲處此義者但當自省所以居喪之禮果能始卒一一合於古禮即廢􅀕無可疑􅀂他時不免墨衰出入或其他有所未合者尚多即卒哭之前不得巳準禮且廢卒哭之後可以畧放左傳杜注之􅀃遇四時􅀕日以衰服特祀於几筵用墨衰常祀於家廟可也左傳之意卒哭前亦廢􅀕也但卒哭之期須旣葬立主三虞之後十日而祭以成事方可耳温公高氏二書載此節文甚詳可以熟攷􅀂神柩在而欲以百日爲斷墨衰出入則決然不可愚見如此不知伯崇以爲如何然主奉喪􅀕乃令兄職此事非伯崇所得專但以此儀從容咨講更與知禮者評之庶其聴則可矣萬一有所不合則熹聞之喪與其哀不足而禮有餘不􅀂禮不足而哀有餘夫子亦言䘮與其易也寧戚熹常解此義以為具文備禮而非致慤焉之為易今人多此病試思之此則伯崇所當勉也更思之答范伯崇須送行語哀苦中不復能爲文然觀伯諌之言巳是藥石但更湏求所以立其本耳日用之間以莊敬爲主凡事自立章程鞭約近裏勿令心志流漫其剛大之本乎由此益加窮理之功以聖賢之言爲必可信以古人之事爲必可行則世俗小小利害不能爲吾累矣當官㢘謹是吾軰本分事不待多􅀃然微細處亦須照管不可忽畧因循怠墮吕氏童䝉訓下卷數條防閑之道甚至皆可佩服自治旣不苟更能事上以禮接物以誠臨民以寛御吏以法而簿書期㑹之間亦無所不用其敬焉則庶乎其少過矣暇日勿廢温習少飲酒擇交遊子澄相去不逺眞直諒多聞之益果能受其實攻而不憚改焉則彼亦將不憚啓告之煩矣區區所以相告者不過如此恐臨别匆匆不能盡舉預以拜聞惟所材擇答范伯崇熹比携二子過寒泉招季通來相聚更有一二朋友來相聚􅀄不廢講議但昏惰不敏自救不給何能有以及人而學者氣禀強弱不齊各有病痛未見卓然可恃者此亦殊可懼也知老兄官守不苟又得賢守相聼從得以少伸巳志深副所望向來猶恐應變之才有所不周今乃如此信乎氣質之用小道學之力大而程子所謂一命之士苟存心愛物於人必有所濟者非虚語也凡百勉旃以大逺業之基増吾黨之氣幸甚但乆留郡中於簿領之責竊恐曠弛亦似非便受納旣畢所謂他事􅀂他人所可辦者即不􅀂且歸邑中之爲愈也如何或未能歸凡百亦須戒懼逺避嫌疑無爲恩怨之府乃佳欽夫得行所學吾道之幸但此事大難不可喜而可懼近復如何得正月書亦未有異聞也論學依舊有好高傷快之弊熹近覺此事全放在底下著實涵養玩味方見工夫有一二叚雜問答漫寫呈當否俟喻及他所欲言非書所能盡也答范伯崇伯諌前日過此季通亦來㑹相與劇論儒佛之異因問伯諌天命之謂性此句爲實邪爲空邪渠以爲實熹云如此則作空見者誤矣且今欲窮實理亦何頼於前日之空見哉又爲季通指近事譬喻渠遂釋然似肯放下舊學􅀂自此不爲異議所移則吾道又得此人其資禀志尚過人數等眞有望矣答范伯崇欽夫日前議論傷快無涵養本原功夫終是覺得應事匆匆熹亦近方覺此病不是小事也伯㳟講論甚好但毎事要鶻圇􅀃作一塊又生怕人說異端俗學之非護蘇氏尤力以爲争校是非不如歛藏持養頃見子澄有此論巳作書力辦之不知竟以爲如何也子澄通書否渠向疑處當時答得却有病近㸔此書病􅀹多文定云好解經而不喜讀書大抵皆是捉住一箇道理便橫􅀃竪􅀃都不曽涵泳文理極有􅀃不行處如程子文字往往􅀹㸔不熟也因作子澄書爲致意答范伯崇伯崇近日何以用功官事擾擾想不得一向静坐㸔書然暇時速須􅀵歛身心或正容端坐或思泳義理事物之來隨事省察務令動静有節作止有常毋使放逸則内外本末交相浸灌而大本可立衆理易明矣此外别無著力處官事有可以及人處想不憚出力然檢身馭下尤不可不加意也答范伯崇前書所論數事大槩得之但語意多未著實曽子有疾之說近嘗通考諸􅀃私論其故今以上呈幸更爲訂之心無死生所論意亦是但所謂自我而立自觀我者而言此語却大有病知言中議論多病近䟽所疑與敬夫伯㳟議論有小往復文多未能錄􅀉亦懼頗有摭掎前軰之嫌大抵如心以成性相爲體用性無善惡心無死生天理人欲同體異用先識仁體然後敬有所施先志於大然後從事於小如本天道變化爲世俗酬酢及論㳺夏問孝之􅀋此􅀋極多又其辭意多迫急少寛􅁉良由務以智力探取全無涵養之功所以至此可以爲戒然其思索精到處亦何可及也巨室恐如吕與叔大學解中云乃吾之一家耳室者私室家則室之巨者也蓋承上文之意讀之只合如此􅀃意思方正當語勢亦穩帖􅀂以巨室爲彊家便有著心牢籠之意雖􅀃不可違道干譽終是專立此意爲標準便有縫罅不似聖賢平日規模也如何舊􅀃天下歸仁用吕與叔賛􅀃夫子言性與天道用上蔡說近覺皆未是試更推之復以見告觀書比何所得因來亦告及之極所欲聞也欽夫近爲學者􅀋集論語仁字各爲之說許􅀉來㸔然熹却不欲做此工夫伯崇以爲然否欽夫又􅀃當仁不讓於師要當此時識所以不讓者何物則知此仁矣此說是否答范伯崇異端害正固君子所當闢然湏是吾學旣明洞見大本逹道之全體然後據天理以開有我之私因彼非以察吾道之正議論之間彼此交盡而内外之道一以貫之如孟子論養氣而及告子義外之非因夷子而􅀤天理一本之大此豈徒攻彼之失而巳哉所以推明吾學之極致本原亦可謂無餘藴矣如此然後能距楊墨而列於聖賢之徒不然譊譊相訾以客氣爭勝􅀒是未免於前軰自敝之譏也晦庵先生朱文公文集卷第三十九閩縣儒學教諭王製校
