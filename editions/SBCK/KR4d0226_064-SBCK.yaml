body:
  text: 書知舊門人問答答鞏仲至豊聞名􅂅見爲日乆矣茲辱枉顧乃遂夙心慰幸可量别後又承惠問并示武夷佳句􅀗聞于役之暇不廢山水之娱賦詠從容曲盡佳致􅀹以爲喜比想巳還官次乆矣霜寒之後繼以暄暖諒惟幕府有相起處多福熹衰病益甚最苦拘攣不能信詘起居動作皆有所妨樞帥經由以此不得敬謁然聞其寛和盡下想於賢佐必知所敬禮也昌父入城未歸計必還此度歲矣偶便寓此病軀憚於慿几口占不謹幸深原照答鞏仲至掌丞轉致近問􅀗聞比日春序浸暄幕府優㳺起處佳福足以爲慰熹衰病拘攣日甚一日死生長短本所不計但未死之前轉動不得亦令人無况耳告老之章州郡未肯騰奏雖荷其見憐不欲使觸禍機然鄙意巳决無所復顧爲此􅀫留令人腹煩耳樞帥經由不及一見荷其答書之意甚勤􅁇此未敢爲問徃來多能道其政事之羙而來書之所發明􅀹足起人意也子約子弟近得書云歲前明招大火其柩㡬不免幸而􅀗全􅁍不知其厚葬之說但得汪時發書似頗有所不快意不知曲折如何也叔昌老不長進亦是前日向外意多脚根不牢實耳輕棄簞瓢之句令人深省顧未知真樂所在則雖欲不棄而不可得此須别有箇著力處乃足恃耳武夷續詩讀之無非向來經行所歴景物宛然益歎摹寫之妙詩序縱横放肆多出前人未發之祕但詆江西而進宛陵不能不駭俗聽耳少時嘗讀梅詩亦知愛之而於一時諸公所􅁛道如河豚等篇有所未喻用此頗疑張徐之論亦未爲過至於寂寥短章閑暇蕭散猶有魏􅀳以前髙風餘韻而不極力於當世之􅁤轍者則恐論者有未盡察也不審賢者雅意謂何所録警䇿二卷者亦可使得一見耶此人還日幸望録􅀉千萬之望貴眷􅀰娘一一佳􅁉皃輩蒙問感感昌父昨日得書巳到家矣􅀉詩甚冨􅀌瘦亦益甚矣憲䑓王幹前日過此嘗託致區區今有一書與之煩爲轉達書中囑渠一二事幸爲扣其可否以語直卿也答鞏仲至稍不聞問巳􅇵馳情昨日遞中奉吿之辱􅀗審比日春和幕府多餘體履佳􅆘良以爲慰録􅀉舊詩得以快讀雄麗精切歎服深矣簞瓢之句得其全篇又深感􅁣也但梅詩之評未能盡解當俟得所集録始敢扣也張巨山乃學魏􅀳六朝之作非宗江西者其詩閑澹髙逺恐亦未可謂不深於詩者也坡公病李杜而推韋栁盖亦自悔其平時之作而未能自拔者其言似亦有味不審明者視之以爲如何也無由靣論臨風快想因來更望切磋究之老病乆已無復此夣亦聊以暇日銷憂耳告老之章已上但已差晚爲可恨故舊諸賢不得不任其責也留徐方脫囚拘彭曽㡬堕􅀘處世途艱險吁可畏哉然亦何可避也答鞏仲至遞中兩辱惠書并有詩筒之况荷意勤矣又知小姪劉親皆以垂念之故得以􅀼食益深感愧信後清和恭惟幕府有相起處佳福所需惡語􅀹荷不鄙此於吾人豈有所愛但近年此等一切廢置向巳許爲放翁作老學齋銘後亦不復敢著語髙明應巳黙解不待縷縷自辨數也抑又聞之古之聖賢所以教人不過使之講明天下之義理以開發其心之知識然後力行固守以終其身而凡其見之言論措之事業者莫不由是以出􅀄非此外别有岐路可施功力以致文字之華靡事業之恢宏也故易之文言於乾九三實明學之始終而其所謂忠信所以進徳者欲吾之心實明是理而真好惡之􅀂其好好色而惡惡臭也所謂修辭立誠以居業者欲吾之謹夫所發以致其實而􅀹先於言語之易放而難􅀵也其曰修辭豈作文之謂哉今或者以修辭名左右之齋吾固未知其所謂然設􅀂盡如文言之本指則猶恐此事當在忠信進徳之後而未可以遽及􅀂如或者賦詩之所詠歎則恐其於乾乾夕惕之意又益逺而不相似也鄙意於此深有所不能無疑者今雖不敢承命以爲記然念此事於人所􅀜不細有不可以不之講者故敢私以爲請幸試思之而還以一言判其是非焉至於佳篇之貺則意益厚矣顧惟頓拙於此豈敢有所與三復以還但知賛歎而巳然因此偶記頃年學道未能專一之時亦嘗間考詩之原委因知古今之詩凡有三變盖自書傳所記虞夏以來下及魏􅀳自爲一等自晋宋間顔謝以後下及唐􅀄自爲一等自沈宋以後定著律詩下及今日又爲一等然自唐初以前其爲詩者固有高下而法猶未變至律詩出而後詩之與法始皆大變以至今日益巧益宻而無復古人之風矣故嘗妄欲抄取經史諸書所載韻語下及文選漢魏古詞以盡乎郭景純陶淵明之所作自爲一編而附于三百篇楚辭之後以爲詩之根本準則又於其下二等之中擇其近於古者各爲一編以爲之羽翼輿衛且以李杜言之則如李之古風五十首杜之秦蜀紀行遣興出塞潼􅀜石濠夏日夏夜諸篇律詩則如王維韋應物輩亦自有蕭散之趣未至如今日之細碎卑冗無餘味也其不合者則悉去之不使其接於吾之耳目而入於吾之胷次要使方寸之中無一字世俗言語意思則其爲詩不期於髙逺而自髙逺矣然顧爲學之務有急於此者亦復自知材力短弱決不能追古人而與之並遂悉棄去不能復爲况今老病百念休歇寜尚復語此乎然感左右見顧之重􅀂以爲可語此者故聊復言之恐或可以少􅂇百尺竿頭更進一歩之􅀔也來喻所云潄六藝之芳􅃳以求真澹此誠極至之論然恐亦須先識得古今體製雅俗鄊背仍更洗滌得盡腸胃間夙生葷血脂膏然後此語方有所措如其未然􅀼恐穢濁爲主芳潤入不得也近世詩人正縁不曽透得此􅀜而規規於近局故其所就皆不滿人意無足深論然旣就其中而論之則又互有短長不可一槩抑此伸彼况權度未審其所去取又或未能盡合天下之公也此說甚長非書可究他時或得靣論庶㡬可盡但恐彼時且要結絶修辭公案無暇可及此耳記文甚徤說盡事理但恐亦當更考歐曾遺法料簡刮摩使其清明峻㓗之中自有雍容俯仰之態則其傳當愈逺而使人愈無遺憾矣僣易併及愧悚之深不審明者於意云何亦幸有以反覆之也長溪王君之詩竟如何此有一黄子厚者其詩自楚漢諸作中來絶不􅀋世人語人亦少能知之近以社倉出内譏察不謹狼狽憂鬰以至於死甚可傷也放翁詩書録􅀉幸甚此亦得其近書筆力愈精徤頃嘗憂其迹太近能太髙或爲有力者所牽挽不得全此晚節計今决可免矣此亦非細事也仙逰之政無人肯爲推出此理􅀔之常無足恠者况在渠家法又自不當計此耶偶得浙漕去秋䇿問謾録去不知曽見之否清議固知不可泯㓕然能出此亦不易也熹病益甚跬歩不能自致而神昏氣痞支體酸痛殆非乆作人間客者矣休致之請前月􅀄間附便以行至今寂然未聞可報恐所附人遲滯不達設更淹留當自有臺劾施行不待催督矣答鞏仲至乆不聞問良以郷徃前日便中特承惠書具聞近况足以爲慰訊後劇暑恭惟幕府有相尊履佳福熹衰病沈痼日甚一日告老之章且幸得請將謂世巳相忘然猶未脫誰何之域尸居餘氣何足加念彼亦正自過慮也逺承垂問深感愛念牋敬固非所敢當者然亦恨異時不得託名文集中耳修辭齋名本意乃如此然易之本㫖自有先後前書固巳言之矣栗字再見虞書皆莊敬謹嚴之意以是名齋非徒有取於木也扁榜便欲爲書隅數日臂痛不能運筆且當少湏也說詩之繆甚愧率爾然後來細讀前後所示諸篇始能深味雋永之趣盖巳自成一家之言矣豈當復有所措說於其間哉但來書所論平淡二字誤盡天下詩人恐非至當之言而明者亦復不以爲非是則熹所深不識也夫古人之詩本豈有意於平淡哉但對今之狂恠雕鎪神頭􅀑靣則見其平對今之肥膩腥臊酸鹹苦澁則見其淡耳自有詩之􅀄以及魏晉作者非一而其高處無不出此左右固自以爲亦嘗從頭㸔得一過而諳其升降沿革矣則豈不察於此者但恐如李漢所謂謂易以下爲古文因以爲無所用於今世不􅀂近體之可以恱人之觀聴以是不免有是今非古之意遂不復有意於古人之髙風逺韻耳又謂有意於平淡者即非純古然則有意於今之不平淡者得爲純古乎又謂水落石出自歸此路則吾未見終身習於鄭衛之哇􅁋而能卒自歸於英莖韶頀之雅正者也鄙見如此幸試思之以爲如何也荆公唐選本非其用意處乃就宋次道家所有而因爲􅀧定耳觀其序引有費日力於此良可惜也之嘆則可以見此老之用心矣夫豈以區區掇拾唐人一言半句爲􅄒作而必欲其無所遺哉且自今觀之其所集録亦只前數卷爲可觀􅀂使老僕任此筆削恐當更去其半乃厭人意耳不知此說明者又以爲如何也放翁近報亦巳掛冠盖自不得不爾近有人自日􅁁來云今春議者欲起洪景盧與此老付以史筆置局湖山以就間曠巳而當路有忌之者其事遂􅃦今日此等好事亦做不得然在此翁􅁍且免得一畨拖出來亦非細事前書盖巳慮此乃知人之所見有畧同者或云張伯子實唱其說此亦甚不易也得江西書云孫從之亦巳物故人物􅆌然令人短氣此亦非人力所能爲也留衛公一書恐有的便煩爲遣去似聞樞帥巳有奉祠之命不知然否果爾必送來因得過留爲數日之欵幸甚答鞏仲至遞中辱書獲聞比日盛暑幕府優游起居超勝良以爲慰新詩見􅀉􅀹荷不鄙讀之便􅁴烏石靈源去人不逺當此炎燠洒然如羾寒門而濯清風也記文更定莊重詳實足以傳逺悟老真不朽矣放翁筆力愈徤但恨無故􅀍天津橋上胡孫擾亂􅁍爲大耳三藏覷見柳州南澗等詩最是放不下者但其氣格髙逺㫖趣幽深故讀之者苦不甚􅁴此亦古今文字言語得失利病之所由可不審哉景迂誌文謾令録示亦幸渠文要自不可曉也氣候不佳故舊中時復塌了一兩人令人欝欝仲止不謂乃能自立如此深可愛敬􅀹喜南澗之有後足強人意也黄巖老中間過此亦嘗相訪惠詩一篇甚佳亦見其刋行小集冠以誠齋之詩稱其似蕭東夫且謂東夫似陳後山而平生未見東夫詩也此事至爲淺末然㸔􅁍魏晉以前諸作便􅁴無開口處甚可􅀏耳焦山瘞鶴銘下有冬日泛舟詩一篇句法旣髙字體亦勝與銘文意象大畧相似必是一手作者自題王姓而名逸近世好事者亦少􅁛之獨趙徳夫金石録題識頗詳而以作者爲王瓉必是當時所傳本其名尚完也今選詩中有此名字而此詩體製只似唐人恐又或非一人不知亦曾見之否中間託陳安行子弟問之云從來無問及者獨張機仲臨鎮時嘗遣人摹之因得數本今徃一通幸試考之以爲如何也熹病日益侵無足言者承欲冬間謁告還浙千萬迃轡爲數日之留當得欵晤以盡所欲言者答鞏仲至熹以氣痞益甚不能親布前幅來書在遞角中而詩卷乃似有拆動處不知何故以此知逺書亦難多談也向說簡齋詩有合改定處如能爲之料理幸爲印一本來只用粗􅁓庶得就􅁽塗改附回改正易爲力吕書奏議近方得見印本因得詳考當日規模機㑹深可嘆息但其間亦不免有漏落此間人有冩本與此互有詳畧其間擊人者恐其子弟避讐刪去如宻奏條畫誅范瓊計䇿後卒施行其語亦是一大公案不知何故亦不載也前書方報黄子厚之死今有方伯謨者亦死矣其詩比子厚更温潤可觀方進未巳乃年甫五十而逝􅀹足傷惜也此間有劉叔通者亦能詩今日得其兩篇謾以􅀉呈不識髙明以爲如何也熹又上答鞏仲至比日秋冷恭惟幕府燕閑起處佳福此間數日前一水非常今幸無他聞下流頗有所損不知果如何但雨意未巳早稻十分成熟而不得以時收割此爲可慮耳近日得昌父斯逺書附到書一角今附徃中有大卷意必是詩累年不見斯逺一字欲發封觀之又不欲破戒或㸔畢幸轉以見示也但斯逺省闈不偶家無内􅂇嗣續之計亦復茫然急欲爲謀婚之計而未有其處不知親舊間亦有可爲物色處否想二公書中亦湏說及此事渠來見囑此間無處可致力只得并奉凂也答鞏仲至前蔡君歸辱書及此專人又奉手告欣審比日秋暑尊候萬福一水逺近多罹其害此間亦然所不及門者三五尺耳簡齋詩巳領但得閩本就校即刋脩覆校􅀹易爲力旦夕稍暇或取此間所有者塗改􅀉呈也吕公奏議恨未見鄭武子所校本鄭乃其客必無舛繆也王瓉詩誠如所喻劉詩得經題品甚幸旦夕當令録數篇奉􅀉也所論自刋詩文此風極可笑又可歎也樓記姉銘筆力甚勁歎仰亡巳尹少稷文近世誠不易得晚節狼狽殊可惜也晁銘不可曉亦不但此篇不知當時何以得重名於世也日鑄之惠感領厚意來使立俟未有以爲報也答鞏仲至前日人還草草附報殊不盡意比秋益涼恭惟起處多勝陳詩誤字今别用􅁓録去湏逐字分付修了㸔過就此勾消了方再付一字乃可無誤此雖細事然亦湏經歴方見自然成法也樓記不知巳入石未細㸔尚有兩三處可疑具之别􅁓幸更詳之也匆匆附遞不暇他及未由承晤千萬自愛答鞏仲至武夷非建山之全體不待辨而知且於此上下文無所屬似成剰語􅀂欲破蘇公茶圃之􅀃則語又太畧兼亦本不相􅀜也漕司所領茶事止爲􅁟貢玉食之一端耳非如他路與鹽法並行而領於一司也今云鹽爲大而茶次之似非事實又車運之䇿此殊不聞不知其說果如何也夫爲政者材可以勝乎事事不可以勝乎材此兩句頗􅀋舉子文然亦謂欲其材之勝乎事不欲事之勝乎材則可今此語􅀔似未妥帖試深味之可見可以二字正富公碑中趙濟能揺之􅀋也熹上呈答鞏仲至置中奉告欣審比日秋清尊履佳福兩詩三記併領嘉惠􅀹増慰懌但鄭君之爲人不復記憶有如來示誠不易得也宗司刻石簡嚴得體書亦清婉可愛安濟則似太詳雖云合有許多說話然亦當有所取舎觀前輩所作可見也率易及此如何如何帥官稱盖欲以見廟堂之舊然不知於古亦有􅀄否似不􅀂只書職名之爲正也昌父得書欲來相訪而病復大作但能口占一􅁓及􅀉未病時手寫詩一編清苦寒痩如其爲人其間亦有斯逺仲止數詩皆有思致足以慰離索但未知訊後病巳差未耳直卿乆不得書聞有徙家之興此固所欲但於渠聚徒之計則恐失之便無以爲生亦須細啇量耳論作官則誠不􅀂聚徒之爲安也偶與應辰過門云欲請見亟附此􅁓不能究懹抱衰病中間嘗小愈今復大作拘攣痞滿有甚於前矣放翁得近書甚徤謾知之􅆱卦考誤無别本當於番易求之但恐題跋者恐其累巳巳遭投削耳答鞏仲至稍不聞問積有馳情比日冬温恭惟幕府多暇動履有休眷集郎娘一一佳慶熹老病衰朽有加無瘳置之不足道也但書課未畢而不能俯躬伏几以究其業此爲悵恨耳適聞帥司行下發諸舉子倉租米變糶買銀赴司送納不省何謂前政辛勤規畫爲此活人之計其心甚仁其惠甚逺何忍一旦遽破壤之耶今之從政者固不可以此望之特賢者􅆘從事於其間則似不冝有此耳不審文書所下亦嘗􅀜由參署而後行抑吏輩徑下之而􅀄不以白也州縣得之直便行下無復啇量所幸今非糶變之時且得􅀫留故爲奉扣幸更審之􅀂無急切之用不知亦可且與行下仍舊􅀵支否况此一縣所有不多不過八百餘斛糶之得千緍耳帥司不待此而後冨而徒使自是以徃生子之家失救接之􅂇且將復起故時殺棄之風則作俑之過將於誰責而可耶設􅀂必有急切湏至移用則向時後山千緍之米似􅁍可以抽回盖彼處巳有社倉市戸村民一例請貸􅀄無間隔不必爲此偏惠以厚㳺手而又􅀄無收貯之地又無專掌之人以今夏私糶之事驗之亦可見其無用而有害矣􅀂不􅀵回將來不過又只如此或更别生大害􅀒累後人不􅀂及今行下令其收拾樁管俟來春以後得價之時發糶解赴使司之爲便也兼此事今年行得非常乖繆追呼驚擾數月不定及至胥吏乞覔飽足之後有罪者不坐而無􅇳者枉費從旁觀之令人扼腕但以未決之時嫌於請囑不欲言之今事巳過乃敢說耳􅀂欲收回便可行下徑自指定專委一二人爲首及早收拾蔡姓者極富且畏事似可託也即郷時去相見名六瑞者之族衰退之人不當與此􅀂非幕府有吾人在則亦不復能啓口矣然其可否當自以盛意財之勿使外間人知拙者嘗有言以重其咎也亟作此托任尉附便或發遞以行匆匆不暇他及直卿一書幸指揮送達向見說冬間欲謁告暫歸浙中計必取道於此儻得左顧庶㡬少欵答鞏仲至前日方以尺書附遞不審巳達未也便中􅀗書得聞比日冬温幕府從容起處佳福足以爲慰水西之逰甚恨不得陪杖屦然細讀詩文巳如身歴而目見之矣舊聞此處頗佳亦未嘗得到也昌父後來不得書只得彼中知識報來云病未能出戸不知後來復如何良可念也世本舊聞先人說家間亦嘗有之以兵火失去然則世間亦須尚有本但今見於諸經注䟽者恐亦或出附會假託未必可慿據正亦不必苦求耳謝鳯之文不知果何如近日廬陵人來說紹興間有大府丞長樂陳剛中彦柔者坐以啓賀胡澹庵謫安逺宰而死周益公尚議其人因爲檢長樂志則但云終於江隂簽判都不及所歴官及謫死事方此爲扣其郷人使㝷訪之此其不幸又有甚於謝鳯者􅀹可歎也前書所論􅅒粟事不知巳爲料理否切勿令外間知僕嘗有言也福州舊有楚詞白本不知印板今尚在否字書板様頗佳歲乆計或漫滅然讎校亦不至精不知能爲區處因其舊本􅄪校重刻以貽好事否如能作此即幸報及待爲畧㸔過結縁也近讀伯恭所集文鑑極有可啇量處前輩要亦多浪得名者不知後世公論竟如何爾答鞏仲至熹近以兩書附逓知皆逹否李教授過門甚遽欲作書而不暇蓍卦􅀃今日方得之因以附納幸視至江西諸郡如元城語録之􅀋雖免雜燒然皆束之髙閣此獨幸免豈非種􅀣醫藥之儔皆所不禁也耶可發一􅀏答鞏仲至昨日吴應辰來辱書今日又得逓中答字􅀗審比日冬寒尊履佳福深用慰感火後佳句曲盡事情引而伸之有足爲長太息者豈止此而巳哉示喻米事巳悉其人前日亦録得縣中所􅀍倅􅈦公文㸔云奉帥司之命本欲封呈猝㝷不見也度今自不能巳湏别得一文字說破前日之誤乃可止耳須早行下爲佳不可更待報矣後山之人不待别儲而飽收還乃爲上䇿幸更審之此􅁍須俟見報萬一必以前人巳行不欲廢罷即俟丞歸當如所諭也但富家深懲徃事亦自畏其累巳未必敢承當耳答鞏仲至昨日逓中辱書且審比日幕府優㳺所履佳福良以爲慰痔疾想巳平復此疾人多有之僕亦嘗爲所苦然見人用刀仗毒藥攻之者或至反爲大害因只服黄連枳殻等藥及用馬藍菜煎湯薫似􅁴有效不審曾用之否熹足弱氣痞遇寒益甚此兩日來雖用兩人扶掖亦行不得長至前後因感冐伏枕㡬不能起衰老自應如此亦不足深恠也楚詞板旣漫滅雖修得亦不濟事然欲重刋又不可整理使其可以就加讐校􅀂修得了可就彼中先校一畨􅁍以一凈本見示當爲參訂改定啇量􅀂别刋得一本亦佳事也近得古田一士人所著􅀘音一卷亦甚有功異時當併以奉􅀉也陳寺丞事巖老之兄尚未報來年歳未逺亦須尚可詢問但當時作地志之人亦太草草耳文鑑誠如所論李文叔前此亦但見其論文數篇頗有可觀今亦不能記憶但如戰國䇿序則恐文健意弱太作爲傷正氣耳要之文章正統在唐及本朝各不過兩三人其餘大率多不滿人意止可爲知者道耳直卿尚未到此初意其來可以乆逺相聚不謂又爲諸生所留亦其食貧不得不爲此耳三詩皆佳作但首篇用韻多所未曉前此所示諸篇亦多有􅀋此者屢欲奉扣而輙忘之古韻雖有此例如大明詩林與興叶之􅀋然在今日却恐不無訛謬之嫌耳然林與興叶亦是秦語以興爲韻乃其方言終非音韻之正今蜀人語猶如此盖多用鼻音也名畫想多有之性甚愛此而無由多見他時經由得盡携以見顧使􅀗與寓目焉千萬幸也彼中亦有畫手能以意作古人事跡否此間門前衆人作一小亭舊名聚星今欲於照壁上畫陳太丘見荀朗陵事而無可屬筆者甚以爲撓今録其事之本文去幸試爲尋訪能畫者令作一草卷􅀉及爲幸但以兩幅􅁓爲之此間􅁍自可添展也又有一事郷見聖泉寺有李邕碑􅀛趺螭首鐫刻甚精六螭紏結旣異今製而􅀛狀逼真雖稍破析然猶有生意也幸爲㝷一木工巧於雕鏤者以木冩之用寸折尺不過髙尺餘便中􅀉示爲望放翁老筆􅀹徤在今當推爲第一流近聞復有載筆之招不知果否方欲徃求一文字或恐以此疑賤迹之爲累未必肯作耳悟老化去甚可傷血疾渠舊有之未必服藥之悮也意公恨未之識見劉叔通說向在三山見一老僧自云客石林家甚又頗能道其餘論不知便是此人否如其不然亦可因令㝷訪計其年事亦當是七十以上矣雖無老成人尚有典刑此語深可念也前懐安尉楊岳從事乃􅀛山先生之孫郷來在官不幸肓廢稼軒憐之爲之呼醫治療竟不能視後來鄭樞特爲請祠今在彼城中寓居因其便還匆匆附此渠必不能岀謁以其賢者之後時遣人存問之少有乏無力可周䘏計亦所不憚也病中迫不得巳不免作一文字精力不逮殊覺辛苦此間窮陋無人啇量甚恨相去之逺不得就求訂正也答鞏仲至春寒多病不能奉一字以爲新歲之慶逓中忽辱惠問􅀗聞比日幕中多暇起處寕適足慰馳情熹病益衰無足云者示喻所苦亦巳向安甚善此疾最忌飲酒􅀂能痛節當不藥而愈也楚詞脩未旋了旋􅀉數板節次發來爲幸古田􅀘音此間無人冩得今􅀉一書與蘇君幸轉託縣官差人賫去郷下尋之就其傳録􅀹便亦聞渠冩本頗經刪節巳囑令爲全録去矣然此嘗編得音考一卷音謂集古今正音恊韻通而爲一考謂考諸本同異并附其間只欲别爲一卷附之書後不必􅍴入正文之下礙人眼目妨人吟諷但亦未甚詳宻正文有異同但擇一穏者爲定可也又可附此古田全書俟旦夕稍暇一靣修寫􅀉呈彼中不知巳曽下手未亦望随得巳了者節次􅀉來也􅀂巳詳善即此中本更不須􅀉去矣劉侍讀書氣平文緩乃自經術中來比之蘇公誠有髙古之趣但亦􅁴詞多理寡苦無甚發明耳大抵古人文字要當随其所長取之難以一時所見遽定品目也李文叔論文諸說向見林擇之有之不曽冩得巳書報令録去或可并移書古田就取也畫笥許觀甚幸儻得附名􅀹所􅂅也聚星閣此亦巳令草草爲之市工俗筆殊不能起人意亦嘗輙爲之賛今謾録去幸勿示人也余君之作竟能否便中并望早􅀉及也石林胡僧頃亦見之盖葉公自有鍳賞其所使臨摹者必當時之善工也要之年來事事漸低此等人物亦自日少一日爲可歎耳􅀛跌恐須作全者向見所隕之元故亦在側也吴生玄武信爲竒筆但􅀛背之文正脊之甲五應五行次甲八應八卦又次甲廿四應節氣亦自然之理此􅁍不足亦欠子細然九方皐之相馬又不當以此論耳社記頃未之見世間此等遺落不遇知者可勝數哉放翁乆不得書欲徃從覔一文字所繋頗重又恐賤跡累其升騰未敢啓口也楊君荷枉顧此其不易得又有甚於前二公矣榮陽始亦甚趦趄令汪季路百計脅之乃肯聴耳此君殊可念有可垂手處幸曲爲拯㧞也長樂劉君一書煩爲轉逹直卿云渠有知識在城中巳令批在書背幸令人問之恐未有便却告專介爲送至縣中託縣官遣人逹之盖所編禮書在渠處欲亟取來趂此疾病少間之際并力了之故不可緩切幸垂念也欲言甚衆書不能盡唯冀以時自愛千萬之禱悟老聞欲爲志其塔果爾亦甚幸也答鞏仲至陳太丘詣荀朗陵貧儉無僕􅃥陳寔傳曰寔字仲弓頴川陳昌人爲聞喜令太丘長風化宣流先賢行狀曰荀淑字季和潁川頴隂人也所㧞􅅊􅄄芻牧之中執案刀筆之吏皆爲英彦舉方正􅀘朗陵侯相所在流化乃使元方將軍先賢行狀曰陳紀字元方寔長子也至徳絶俗與寔髙名並著而弟諶又配之每宰府辟召羔鴈成羣世號三君百城皆圖畫季方持杖從後長文尚小載著車中旣至荀使叔慈應門􅄌明行酒餘六龍下食張璠漢紀曰淑有八子儉緄靖燾汪爽肅敷淑居西豪里縣令苑康曰昔髙陽氏有才子八人遂署其里曰髙陽里時人號曰八龍文􅀂亦小坐著䣛前于時太史奏真人東行檀道鸞續􅀳陽秋曰陳仲弓從諸子姪造荀父子于時徳星聚太史奏五百里賢人聚所畫陳荀聚星事􅀂作兩叚即前叚當畫太丘乗牛車在塗而元方等侍行後叚當畫叔慈應門朗陵對客七龍侍食又當重畫太丘與朗陵相對而二子一孫侍立又叔􅄌本在門外迎客客旣入燕則又不當乆立門外亦須畫其侍立於朗陵之側此皆似渉重􅃨兩叚之間又須更作山石林麓分隔前後皆費注解􅀂只畫作一叚則但爲太丘乗車到門之象而叔􅄌在門外迎客七龍扶侍朗陵岀至庭中而文􅀂在其後即免重􅃨亦有遺意但􅁍不見對飲行食及坐文􅀂於䣛前事有不備耳凡此未能自决不知盛意如何更望相度及與畫者啇量取令穩當乃佳耳更考後漢處士冠服教之答鞏仲至兩承惠書良慰馳想比日春深寒暖尚未定恭惟幕府有相所履佳福葉帥昨日已過此聞張書當來不乆計賢者必護印至境上􅀂得早來使可􅀫留爲一兩日􅅃深所望也楚詞當俟靣議元本字亦不小可便以小竹􅁓草印一本携以見示此間匠者工於剪貼􅀂只就此訂正將來便可上板不湏再寫又生一重脫誤亦省事也蘇君處所寫􅀘音如巳到幸亦携來此間所有本子不全恐將來闕畧􅁍不滿人意也聚星圖此間巳先令人畫今詳所􅀉大槩不甚相逺但此間者車中堂上有兩太丘心頗疑之今得所示􅁍差穩當此必嘗經明者較量也但閩中人不好事畫筆㡬絶爲可歎耳禮書半藁略可寫淨旦夕􅀉直卿處仍就使㕔借筆吏數人抄過一本王元石亦要抄一本仍更爲寫一本當俟彼中寫了􅁍􅀉莆中也時論少寛但置籍事予奪不同而同出一手要路諸人有忽從外􅀘者亦非意料所及不知彼中所聞果如何也放翁且喜結局不是小事尚未得以書賀之熹衰病益甚苦楚之態亦非言語所能形容者不能復縷縷也會靣有期預以爲喜答易簡盡得孝弟便是仁云云立說太冗而意不精切大抵後多􅀋此言語輕躁動輙有忤知和緩可療而臨事復然小學之書先在於一切世味淡薄自然見富貴不歆羡見貧賤不厭悪臨患難無求免一向優人抑巳損躬􅁉物之事皆可優爲之先生編集是書此意􅀹多如顔氏家訓六事豈貪名徇俗羡慕者能之推此則貽教之始以至五品之遜各盡其道皆由此充按伏罪過全在不能去一矜心所以諸病皆由於此㸔文字且逐條㸔各是一事不湏如此牽合小學之書自明倫五叚明父子章全在一親字上明君臣章全在一義字上明夫婦章全在一别字上明長㓜章全在一序字上明朋友章全在一交字上始讀昬禮萬世之始至男女有别然後父子親漢武帝溺於聲色㳺燕後宫父子不親遂致戾太子之變此亦夫婦無别而父子不親之一證語在戾太子傳可檢㸔然亦非獨此也問敬敬不是萬慮休置之謂只要随事專一謹畏不放逸耳不湏許多閑說話也小學賔客之禮見於朋友之章莫以一時之交亦有切偲之意相觀而善之理否不湏如此理㑹賔主自是朋友之􅀋如郷鄰還徃及師弟子之屬於五逹道亦朋友之􅀋也不入此門則無管攝處矣讀書求意義雖知爛熟之爲羙而氣習已慣惟恐不多之念未能頓忘旣知其非便當改之不湏更如此支蔓小學載内則三十有室遜友視志男女之教温公巳有說其餘亦大槩立一節限耳不必如此細碎馬援以譏議戒諸子而不免於譏議馬援之言自可爲法不須如此支蔓如此則須削去此叚後生又如何得聞此一叚說話而以爲戒乎理之根原推演孝義不記此話頭因何而起􅀂與安卿所問同是一時所聞則渠說巳得之矣敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者㓙敬義自有輕重然所說太冗孟子養氣說此條差勝然􅁍只是依放集注别無新說㸔文字且要如此理會教本文說精熟乆之自随淺深有見處正不必支蔓生說穿鑿援引也答何倅前蒙誨及經書中所說欲字以鄙意所見人之生不能不感物而動曰感物而動性之欲也言亦性所有也而其要係乎心君宰與不宰耳心宰則情得正率乎性之常而不可以欲言矣心不宰則情流而䧟溺其性專爲人欲矣􅀂夫所謂可欲之謂善盖指言體元者善之長之意心之所爲宰者也要當黙識之而不可以言語誨也不知是否更望見教尺書莫盡此悰答江彦謀所論正蒙大㫖則恐失之太容易爾夫道之極致物我固爲一矣然豈獨物我之間驗之盖天地􅀑神幽明􅀮顯本末精粗無不通貫而爲一也正蒙之㫖誠不外是然聖賢言之則已多矣正蒙之作復何爲乎恐湏反復研究其說求其所以一者而合之於其所謂一者必銖銖而較之至於鈞而必合寸寸而度之至於丈而不差然後爲得也孟子曰愽學而詳說之將以反說約也正爲是爾今學之未慱說之未詳而遽欲一言探其極致則是銖兩未分而臆料鈞石分寸不辨而自計􅎣引不惟精粗二致大小殊觀非所謂一以貫之者愚恐小差積而大繆生所謂鈞石丈引者亦不得其真矣此躐等妄意之蔽世之有志於爲巳之學而未知其方者其病每如此也明道先生行􅃺云先生教人自致知至於知止意誠至於平天下洒掃應對至於窮理盡性循循有序病世之學者舎近而趨逺處下而窺髙所以輕自大而卒無得也此言至矣彦謀以爲如何答趙宰伏承誨諭良荷不鄙但屏居杜門不敢干與外事向來雖聞貴縣令保正副出錢雇募耆長人甚苦之亦不敢遽有禀白但嘗因下問之辱欲乞慱詢民情之所利病而罷行之正爲此耳􅀄不知其爲倉司指揮亦不聞他縣之有此也今聞巳行罷去自此境内應􅃥之家得保生業則其受賜已厚而上司當亦能察其無他矣恐不必更假拙者之言以爲輕重也自餘曲折更託劉􅁥廟禀知并㡬情照答吴尉聞以軄事見知憲䑓甚尉然聲聞過情君子恥之􅀄官僻縣遽爲上官獎拔如此可以爲懼而未可遽以爲喜且當痛自檢􅅚黽勉王事謹終如始不可便爲恣肆及萌躁進之心也答吴尉岳倉書曲折前書巳報矣只此便是學問底道理平日所與講論者不過此耳幸思之仕官只是廉勤自守進退遲速自有時節切不可起妄念也官期不逺不審何日定行到官凢百以廉勤愛民爲心乃佳答吴尉大抵守官只要律巳公廉執事勤謹晝夜孜孜如臨淵谷便自無他患害􅂊是有所依􅀝便使人怠惰放縱不知不􅁴錯做了事也官所不比郷居凡百動有利害諸事切冝畏謹也答趙􅀰中熹伏蒙垂喻先正忠簡公行狀不勝恐悚此事􅀄以令兄提舉􅀰中見屬之勤不合容易承當旣而精力日衰失前忘後記事作文比之昔日倍􅁴費力况此事體之大不唯先丞相一身之徳業難遽形容而事􅀜國論將來史官所據以垂萬世者將在於此自度恐終不足以辨此今陳丈君舉郎中精敏該洽詞筆髙妙皆熹所不能望其萬一者􅀂舉而屬之公論無不以爲宜者而熹託契門下旣乆且厚固無形迹之嫌也專此布􅈤伏幸深察答趙尉壆九月八日熹扣首復書剡尉趙君奉議熹未得識靣而逺辱貽書副以手劄已荷厚意而示以先正中丞行實使之論􅄒以附其後則意又甚厚而非熹區區所得當也顧於先徳慕用之深又不敢辭輙具數語如别􅁓􅀂當代諸賢巳有跋語幸以附其後而奏議之書尚欲寅縁請得一觀儻辱開許只託石滁州附上虞潘幹處或􅀉臨安趙節推彼應時有便來也􅆘此俗冗留來使數日乃得布此病倦草草仍不復作劄併㡬情亮向寒千萬以時爲門戸自愛講學之意尚俟他日得以靣論不宣熹􅄪拜答卓周佐示喻巳悉鄙意嘗謂朝廷設官求賢故在上者不當以請託而薦人士人當有禮義㢘耻故在下者不當自衒鬻而求薦平生守此愚見故爲小官時不敢求薦後來叨冐刺舉亦不敢以舉削應副人情官吏亦不敢挾書求薦其在閑居非無親舊在官亦未嘗敢爲人作書求薦唯老成淹滯實有才徳之人衆謂當與致力者乃以公論告之此事首末衆所共知向者亦屢嘗奉告矣今乃復見喻如此何貪躁不思之甚耶前日巳禀尊丈教子如此似非所謂義方熹若在官有人合薦者見其如此亦不復薦之矣况使作書宛轉求薦耶試思此言反巳爲學異時才徳有聞自不患於不逹今不須如此汲汲反取人鄙薄也答任行甫治甲銷鈔足見州郡相知之意職事固不可不盡心然凡百亦冝韜晦勿太向前爲佳答任行甫塵中汨􅃿墜堕了人須是忙裏早晚提撕時以書􅁽灌漑勿令斷絶爲庶㡬爾潘書亦非所急不知林本竟如何當時是韓范二公所編須稍詳備有條理􅀂有筆吏妙取一本亦佳也答任行甫前書所喻賣鹽事旣是州府相委無如之何只得竭力但不可因此多有更張以形跡前人廣陳利害以取衆怨如私㑹之􅀋乃爲佳爾况賣鹽一事是州府財計本根㝷常是幕官職事今以􅁥當處之巳不穏當萬一須犯此二戒􅀹爲不便即不􅀂託以病或别作縁故以力辭之之爲愈也况今巳書一考在任之日不多自可漸爲去計豈可更當此委任取人忌嫉正使無前所說二事衆人亦必側目􅀂不早自引退必有後悔無疑更審思之乆欲奉報此事因循至今深以爲慮偶有此便謾附此􅁓不睱他及也答任行甫承有來期􅀹以爲喜但不知新官到後便得脫否所謂不敢不自警者更冝深念居今之世惟有一味退後勿求人知爲上䇿耳官卑禄薄雖不快意然比之一介寒士區區斆學仰食於人者則巳爲㤗矣􅀂以爲不足妄有覬覦恐所得無㡬而後日之悔將有不可追者千萬深思餘俟靣見乃可决爾答許進之人生諸事大抵且得随縁順處勉力讀書省節浮費令稍有贏餘以俟不時之須乃佳耳前書所論孟子偶以病中不暇細㸔今㝷不見讀書且熟讀細㸔自當漸見意味不可支離穿鑿以求見解也答程􅀓之熹與足下爲同郡人然彼此未相識靣而足下以書先之此意厚矣夫佛老之言不得以道名足下之說是也至於吾之所謂道與其所以求之之方則足下之言有畧而未究其藴者無從靣講臨風悵然異時因來有以見語千萬甚望過此則有非衰拙之所敢知者不知所以報也答吕紹先示喻所以持守門戸不妄取予之意甚慰所望更冀勉㫋以承先訓地逺無以致區區此意不敢不盡也答吕紹先承喻亦苦食貧此吾輩之常唯當益堅所守庶不墜先訓爲佳耳答江端伯示喻爲學之方足見留意事物未見不可逆料誠如所論唯有因聖賢之所巳言者而求之爲庶㡬耳故爲學不可以不讀書而讀書之法又當熟讀沈思反覆涵泳銖積寸累乆自見功不惟理明心亦自定􅀂欲徒爲渉獵而求此理之明又欲别求方便以望此心之定其亦難矣答潘立之所論西銘大槩亦只是如此㸔不知近日更讀何書有啇量處便中可示及也所問祭禮古人雖有始祖亦只是􅀕於大宗之家􅀂小宗則祭上高祖而下然又有三廟二廟一廟􅀕􅃦之差其尊卑之殺極爲詳悉非謂家家皆可祭始祖也今法制不立家自爲俗此等事􅀂未能遽變則且從俗可也支子之祭亦是如此􅀼謂只於宗子之家立主而􅀕其支子則只用牌子其形如木主而不判前後不爲䧟中及兩竅不爲櫝以從降殺之義不知如何可更啇量也答趙民表古人之學以致知爲先而致知之方在乎格物所謂格物云者河南夫子所謂或讀書講明義理或尚論古人别其是非或應接事物而處其當否皆格物之事也格物知至則行無不力而遇事不患其無立矣然欲從事於此要湏屏逺外好使力專而不分則庶乎其進之易耳答謝與權伏蒙致政知縣學士寵賜手書喻以先契伏讀悲感不可具言且審即日春和燕居清暇夀體康寕又􅀼忻慰熹學晚無似徒以少日習聞父兄師友之訓稍知用力於句讀文義之間區區自守欲寡其過而未能固不敢坐談玄奥驚世駭俗以􅀒所聞也老丈過聴以爲可教辱先以書語以淵源所自來者顧熹何人可以與此屬此跧伏未有趨侍之期引領向風但切傾仰程書固不能無誤亦恨未得靣承質其是非姑因便風寓此致謝伏惟以時節宣益綏夀祉是所深望答陳謩辱書甚厚但所謂先知先􅁴則今世自有􅁣然任其責者而熹非其人也所論爲學之意亦甚善顧此乃終身事業非可索於咄嗟指顧之間者但當循序講明著實持守不令日用之間少有間斷如是乆乆當自得之不當較計功程如世之出舉錢啇子本者之營營也答劉朝弼承示以文編感相與之意甚厚讀之三日未得其所以然故敢布之左右熹聞之君子之於學非特與今之學者並而争一旦之功也固將求至乎古人之所至者而後巳然後可與語學矣夫將求至乎古人之所至者而後巳則非規撫綴緝之所能就其必有以度越世俗庸常之見而直以古人之事自期然後可得而至也夫古人之學何爲哉致知以明之立志以守之造之以精深充之以光大雖至乎聖人可也不出乎此而營營馳聘於末流竭精憊思惟懼夫蓄藏之不冨誦說之不工雖曰能之非吾之所謂學也盖循乎古人之事上之可以至聖賢之域下之可以安性命而固貧窮得時而行亦何所不利哉由今之所爲極其效足以與今之爲士者並而争一旦之功其得與失又未可知也非棄學與故足下之患患知之不明志之不果造之未至乎剛大而已蓄藏之不富誦說之不工則君子不患矣僕之所聞如此故於足下之文詞義之間不知所以裁惟足下有以亮之答陳頥剛衰孏杜門罕接人事未嘗得見顔色而足下不鄙以書先之長牋短幅爲禮以厚而先集髙文并以見貺則此意又益勤矣然區區頑鈍自少爲學知守章句謹行止冀以獨善其身無爲先人羞辱而巳有如足下志尚之髙規模之廣則非平生夢􅄰之所敢及也無以爲報愧恨亡巳先公胷中之竒凛有生氣適有逺􅃥未及細觀然􅀼窺一二亦足以見藴蓄之不凡矣序引見屬豈所敢當况又不暇固當蒙見察也盛製兩編言多適用不爲苟作三復嘆仰所論治郡條目􅀹切事情䆠學得此不必以吏爲師矣答姚􅝘一云答盧粹中承問及爲學之意足見志尚之逺甚慰甚慰盖嘗聞之人之一身應事接物無非義理之所在人雖不能盡知然其大端冝亦無不聞者要在力行其所巳知而勉求其所未至則自近及逺由粗至精循循有序而日有可見之功矣幸試思而勉之幸甚幸甚答林質疑問兩條至誠之說固難躐等遽論熹巳於四子後序中巳畧言之矣不謂性命集注甚明恐未詳考之過冝且平心寛意反復玩味必當自見或與朋友講之亦必得其說也答李好古向來見陸刪定所聞如何􅀂以爲然當用其言專心致志庶㡬可以有得不當復引他說以分其志􅀂有所疑亦當且就此處啇量不當遽舎所受而逺求也東問西聴以致惶惑徒資口耳空長枝葉而無益於學問之實不􅂅賢者爲之是以有問而未敢對也答范叔應絜矩章專言財用繼言用人盖人主不能絜矩者皆由利心之起故狥巳欲而不知有人此所以專言財用也人才用舎最係人心向背􅀂能以公滅私好惡從衆則用舎當於人心矣此所以􅁇言用人也答徐景光􅃂示復性一篇伏讀再三開警甚至如所謂聖人不待覺而復賢者能求復其性者深合乎孟子堯舜性之湯武反之之說又所論顔子克巳復禮一節意亦甚正歎服亡巳但所云聖人之性虗寂而静者非所以語性所云心齋坐忘者亦非所以論顔氏克巳復禮之實也至於卒章所論心性之别以爲心能惑性則又可疑之大者熹嘗謂有是形則有是心而心之所得乎天之理則謂之性仁義禮智是也性之所感於物而動則謂之情惻􅀮羞惡是非辭遜是也是三者人皆有之不以聖凢爲有無也但聖人則氣清而心正故性全而情不亂耳學者則當存心以飬性而節其情也今以聖人爲無心而遂以爲心不可以須􅁷有事然則天之所以與我者何爲而獨有此贅物乎答吴深父示喻日用之間或有所疑而未必不善者此固見善不明之過當汲汲於窮理然所可懼者則恐實有可疑而不知以爲疑耳此則尤當講究體察也答朱岑昨辱枉書爲報不謹方以自愧茲􅀍再告良荷不忘之意前書下問之目皆所當疑但當自其近者以次詢䆒通其一而後及其二則疑之釋也有漸矣􅀂衆難羣疑輻輳於胷中僕懼其徒爲此擾擾而卒無開悟之日也不識足下以爲如何也如有取焉􅂅舉其疑之近者一二條以告熹請得以所聞爲足下言之而明者擇焉答孫吉甫徳粹之來逺辱惠書雖未識靣然足以知賢者之志矣所喻氣質過剛未能自克而欲求其所以轉移變化之道夫知其所偏而欲勝之在吾日用之間屢省而痛懲之耳故周子有自易其惡自至其中之說是豈他人所得而與於其間哉然此亦或有說焉不明於理而徒􅁒救其偏亦恐矯枉之過而反失夫中也故右人之學雖莫急於自脩而讀書講學之功有所不廢盖不如是無以見夫道體之全而審其是非邪正之端也未由相見幸且勉力答汪㑹之所􅀉大學愧煩刋刻䟦語􅀹見留意千聖相傳門戸路徑不過如此前世儒者未嘗熟讀而深求其意故所以爲學者不知出此而墮於記誦文詞之末其好髙者又轉而入於老子釋氏之門此道之所以不明不行而人才少風俗衰也但今雖幸畧窺大㫖然循其序而實用力焉亦恨未能到得古人地位所以每欲推之以語同志而求其輔仁之􅂇於今乃得吾㑹之於中表間豈不幸甚更􅂅益深考之而實從事焉使其次第功程日有可見之驗則其進歩自不能巳矣與湖南諸公論中和第一書中庸未發巳發之義前此認得此心流行之體又因程子凡言心者皆指巳發而言遂日心爲巳發性爲未發然觀程子之書多所不合因復思之乃知前日之說非惟心性之名命之不當而日用功夫全無本領盖所失者不但文義之間而巳按文集遺書諸說似皆以思慮未萌事物未至之時爲喜怒哀樂之未發當此之時即是此心寂然不動之體而天命之性當體具焉以其無過不及不偏不􅀝故謂之中及其感而遂通天下之故則喜怒衰樂之性發焉而心之用可見以其無不中節無所乖戾故謂之和此則人心之正而情性之徳然也然未發之前不可尋覔巳􅁴之後不容安排但平日莊敬􅉼飬之功至而無人欲之私以亂之則其未發也鏡明水止而其發也無不中節矣此是日用本領工夫至於随事省察即物推明亦必以是爲本而於已發之際觀之則其具於未發之前者固可嘿識故程子之答蘇季明反復論辨極於詳宻而卒之不過以敬爲言又曰敬而無失即所以中又曰人道莫如敬未有致知而不在敬者又曰􅆂飬湏是敬進學則在致知盖爲此也向來講論思索直以心爲巳發而日用工夫亦止以察識端倪爲最􅀄下手處以故闕􅁍平日􅉼飬一叚工夫使人胷中擾擾無深潜純一之味而其發之言語事爲之間亦常急迫浮露無復雍容深厚之風盖所見一差其害乃至於此不可以不審也程子所謂凡言心者皆指巳發而言此乃指赤子之心而言而謂凡言心者則其爲說之誤故又自以爲未當而復正之固不可以執其巳改之言而盡疑諸說之誤又不可遂以爲未當而不究其所指之殊也不審諸君子以爲如何答或人爲學兩途誠如所喻然循其序而進之亦一而巳矣心有不存物何可格然所謂存心者非拘執係縳而加桎梏焉也盖嘗於紛擾外馳之際一念之間一有􅁴焉則即此而在矣勿忘勿􅂇長不加一毫智力於其間則是心也其庶㡬乎答或人仁者人也合而言之道也此章解釋仁字道字之所以名君子引而不發躍如也引而不發謂漸啓其端而不竟其說躍如謂義理昭著如有物躍然於心目之間答或人一云與余正甫二先生所論敬字湏該貫動静㸔方其無事而存主不懈者固敬也及其酬酢不亂者亦敬也故曰毋不敬儼􅀂思又曰事思敬執事敬豈必以攝心坐禪而謂之敬哉禮樂固必相湏然所謂樂者亦不過謂胷中無事而自和樂耳非是著意放開一路而欲其和樂也然欲胷中無事非敬不能故程子曰敬則自然和樂而周子亦以爲禮先而樂後此可見也則自得後湏放開不然却只是守此言旣自得之則自然心與理㑹不爲禮法所拘而自中節􅀂未能如此則是未有所得􅂊方是守法之人爾亦非謂旣自得之又􅁍湏放開也克己復禮固非易事然顔子用力乃在於視聴言動禮與非禮之間未敢便道得其本心而了無一事也此其所以先難而後􅀗歟今言之甚易而苦其行之之難亦不考諸此而巳矣答或人自此巳下共十書元題答或人一云其間是答劉公度昨來所示疑義乆無便可奉報今并納還鄙說或恐未安不惜痛加辨析也大學等書近復刋訂體製比舊亦巳不同恨未有人可録􅀉耳尚書頃嘗讀之苦其難而不能竟也注䟽程張之外蘇氏說亦有可觀但終是不純粹林少頴說召誥巳前亦詳備聞新安有吴林老禆傳頗有發明􅁍未曽見試并考之諸家雖或淺近要亦不無小􅀘但在詳擇之耳不可以篇帙浩汗而遽憚其煩也大抵讀書先且虚心考其文詞指意所歸然後可以要其義理之所在近見學者多是先立巳見不問經文向背之􅀔而横以義理加之其說雖不悖理然非經文本意也如此則但據巳見自爲一書亦可何必讀古聖賢之書哉所以讀書政恐吾之所見未必是而求正於彼耳惟其闕文斷簡名器物色有不可考者則無可柰何其他在藏理中可推而得者切湏字字句句反復消詳不可草草􅀃過也答或人前書妄論想荷不鄙然亦未知果中理否但所聞於師友者如此驗之聖賢之言又如此􅀼獨安之不敢自棄以狥流俗耳執事議論文章多出於忠厚之意反身自求冝有以自樂者乃獨以無名爲患不得試爲憂而欲思其次者何耶題跋用意􅀹㦝側推此足以善一世之俗矣歎服之深不容復措詞也答或人大學中庸無異道而所自立者有淺深但循序以進其義自見今未湏懸料也孟子盡心之說熹於大學或問中嘗略言之其序可見大抵讀書且求句中大意令逐處各自分明即彼此深淺自然可見今未及各求本處文義便於彼此叅考所以費力多而未易合也見得分明反復􅉼泳此是要切功夫淺深之辨本非學之急務也答或人謝㳺楊尹侯郭張皆門人也程門髙第不止此數人如劉質夫李端伯吕與叔諸公所造􅀹深所得􅀹粹四端五典者窮理之本恐當云明四端察五典者窮理之要大凡盡此而可以推及其餘者本也一事而有首尾之名也了此而可以次及其餘者要也衆事而有緩急之名也以此推之則三十條者之得失畧可見矣或以仁訓覺訓公者此二訓程子巳嘗明其不然恐不必更著於此藍田吕侍講吕終於正字未嘗作講官張無垢此書深闢佛氏而所引之言以此爲號終不穏當請更詳之又諸公稱號合立一條例差等如泰山海陵徂徠濂溪明道伊川横渠康節稱先生如云㤗山孫先生公卿稱謚如云王文正公當云然世本豈得而出哉格物以窮之多識前言徃行以擇之就有道以正之歸諸心以居之多識而擇之乃所以格物不當分格物多識爲二事而反以格物爲先多識爲後也格物就正固皆心之所爲不待更歸諸心而後可居也且歸諸心者亦想􅁚之而巳矣未見其踐履之實亦􅀂之何而能居乎􅀼恐此語不能無病􅀂論爲學之序則中庸所謂慱學審問謹思明辨篤行者盡之故程子以爲五者廢其一則非學而藍田吕氏解釋甚詳其語皆慤實而有味也察於天行止樂循理也窮理者欲知事物之所以然與其所當然者而巳知其所以然故志不惑知其所當然故行不謬非謂取彼之理而歸諸此也程子所謂物我一理􅂊明彼即曉此不必言觀物而反諸身者盖巳說破此病况又加所謂宛轉者焉則其支離間隔之病益巳甚矣吕氏謂誠者理之實然誠之爲言實也然經傳用之各有所指不可一槩論也如吕氏此說即周子所謂誠者聖人之本盖指實理而言之者也如周子所謂聖誠而巳矣即中庸所謂天下至誠者指人之實有此理者而言也温公所謂誠即大學所謂誠其意者指人之實其心而不自欺者言也此條誠字援引不一使學者不能曉當稍分别之吕侍講論寡欲此乃吕原明侍講安人安百姓則又擴而大之也修巳以安人以安百姓盖其積愈盛而其效益廣爾廣非有擴而大之之意也致用者窮經之本程子曰窮經將以致用也則其本末先後固有在矣今以致用爲窮經之本恐未安也􅀂曰求實用者窮經之本其庶㡬乎推巳及人者治道之本恕者待人之本推巳及人即所謂恕此兩條不惟重復而别出恕字恐有流於姑息之病程明道立門庭以慎獨兩字前賢據實理以教人􅀄無立門庭之意慎獨固操存之要然明道教人本末具備亦非獨此二字而巳審􅀔者平天下之本此語未安下文亦多此􅀋唯澄源節用立志守正四語爲最穩耳順人情人情不能皆正故古人治世以大徳不以小惠然則固有不必皆順之人情者􅀂曰順人心則氣􅁚差正當耳井田肉刑二事儘有曲折恐亦未可遽以爲非知良心者去惡之本此叚意思未安封建之說與井田肉刑相􅀋皆未易輕論也賞罰者行師之本又曰師之道又貴乎以正耳此二語似倒置弘毅者任重之本據曽子􅀃弘主任重毅主致逺伊川論守令云云康節論新法此二事恐不􅀋上下文意原思爲宰衡麓之說其文義恐未安知止詳下文所引云云至物我俱敗矣是量力之事伊川元城及易三節是防㣲慮遠之事陳希夷以下乃爲知止之事今槩以知止目之恐未盡也和靖論語録云云此語恐非通論孔門之教未嘗專恃春秋而直廢論語也道之大本程子論未發之中與無過不及之中不同恐更當詳考吕氏楊氏中字之說此二說恐有未安處東學温公語常不及變此語甚佳然終恐難持不􅀂不論之爲愈學者於巳發處用工此􅁍不枉費心力程子言存飬於未發之前則可求中於未發之前則不可然則未發之前固有平日存飬之功矣不必須待巳發然後用工也答或人前賢之說雖或煩冗反晦經㫖然其源深流逺氣象從容實與聖賢㣲意泯然黙契今雖務爲簡㓗然細觀之􅁴得却有淺迫氣象而玩索未精􅉼飬不熟言句之間粗率而礙理處􅁍多有之尹和靖嘗言經雖以誦說而傳亦以講解而陋此言深有味也近方見此意思􅀂更得數年閑放未死當更於閑静中陶汰之庶㡬内外俱進不􅀒平日師友之訓但恐無復此日耳􅀛山立言􅁍似有意於含蓄而不盡遂多假借寄託之語殊不快人意聖賢之言則本是欲人易曉而其中自然有含蓄耳答或人前書所論仁義禮智不記别有何語然其大槩今且是要識此四字之名件訓詁而巳如所示說似太髙逺反不的當也更檢遺書論孝弟爲仁之本及仁性也孝弟用也處及慱愛之謂仁又答心如􅂖種之說但㸔此三叚更以前聖賢之言參之則自見無所疑惻􅀮不能貫三者向見何兄亦深以爲疑竟不能决此不難曉更熟㸔孟子不忍人之心一章及外書中明道說謝子玩物䘮志之說則亦自分明矣夜氣一章所示􅀹未安去年曾答順之此可就取㸔有疑處􅁍喻及大抵所論多未著實不周匝又時爲險句竒語軒輊於其間􅀹覺不穩當似是㸔文字少又忽畧了平易處而專㨂艱難髙逺底㸔故其用力愈勞而爲說愈雜可試更思之復以見示幸幸所示多所未安别􅁓具報幸更平心詳緩紬繹令意味浹洽自然安頓穩帖不如此踸踔竒險也答或人知得如此是病即便不如此是藥􅀂更問何由得如此則是􅀐驢覔驢只成一塲閑說話矣誠敬固非窮理不能然一向如此牽連說過前頭􅁍恐蹉過脚下工夫也慱文約禮學者之􅀄湏作兩般理㑹而各盡其力則乆之見得功效􅁍能交相爲􅂇而打成一片􅀂合下便要兩相􅀝靠互相推託則彼此擔閣都不成次第矣然所謂慱非泛然廣覧雜記掇拾異聞以讀多取勝之謂此又不可不知惟后非賢不乂言人君必任賢而後可以致治也惟賢非后不食言人君當任飬賢之責也髙宗本意如此問者疑其成病固察之不詳而答者亦無一人說破此意何耶近思録本爲學者不能徧觀諸先生之書故掇其要切者使有入道之漸􅀂巳㸔得浹洽通曉自當推􅀋旁通以致其慱􅀂㸔得未熟只此數卷之書尚不能曉㑹何暇盡求頭􅁁所載之書而悉觀之乎又云少輟功夫取而詳味不知是輟何功夫此語􅀹不可曉義利之大分武侯知之有非他人所及者亦其天資有過人處􅀂其細㣲之間則不能無未察處豈其學有未足故耶觀其讀書之時他人務爲精熟而巳則獨觀大㫖此其大者固非人所及而不務精熟亦豈得無欠闕耶􅀂極言之則以孟子顔子亦未免有如此處故横渠先生云孟子之於聖人猶是麤者以聖爲志而忌立標凖者必有事焉而勿正也循循不巳而自有所至者心勿忘勿􅂇長也先難後􅀗意亦􅀋此學者講論思索以求事物義理聖賢指意則當極其慱􅀂論操存舎亡之間則只此毫􅁵之間便是天理人欲死生存亡之分至簡至約無許多比並較量思前筭後也今問頭自有病痛答者又不能一剪剪斷直下剖判言愈多而道愈逺矣問者所謂思慮􅁁義理上者亦曰思所以處事之冝耳但其語不莊故正叔疑其誤而直卿亦似未得其語意也程子曰動静者隂陽之本况五氣交運則益參差不齊矣賦形之􅀋冝其雜揉者衆而精一者間或值焉以此觀之則陽一隂二之云恐亦未可以爲非也盖理則純粹至善而􅂔則雜揉不齊内君子外小人凢所以抑隂而扶陽者乃順乎理以裁成輔相而濟夫􅂔數之不及者也又何病乎郷原是一種小廉曲謹阿世狥俗之人今曰云云非其義也又云胷懐明爽一日千里者此爲實曽用人之人與他說雖善而未必實有功夫者不同然其迫切之病驕吝之私亦非他人所及也又有謂堕於習俗之見釋氏之善者杜門獨善則可此亦非是更思之見善明是平日功夫用心剛是臨事決斷二者皆不可闕而當以平日功夫爲先不然則其所謂剛者未必不爲狂妄激發過中之行矣答劉公度來書深以不得卒業於湖湘爲恨此見志道之篤然徃者以衒鬻之嫌而緩於請益亦太不勇矣彼自干名我自講學彼亦安能浼我耶三千之徒豈皆􅃀然爲道而來􅀂以自附爲嫌則顔曾之流亦且不屑於孔氏之門矣豈不誤哉所論主敬之說固學者之切務然此亦要得講學窮理之功見得世間道理歴歴分明方肯如此著力􅀂於聖賢之言有所忽畧不曽逐句逐字子細理㑹見得道理都未分明􅁍如何捺生硬做得成如所謂齊心致敬於平旦之頃以求理之所在者亦恐徒勞而無􅀘也古人之學欲其造次顛沛之不離今乃獨求之平旦之頃則其他時節是勾當甚事耶所論濂溪見處亦恐未然濂溪所見正爲與異端不同故立言垂教句句著實如此􅀂如此論即是所見一般但此公而彼私此大而彼小耳且旣有公私大小之不同則其所同者又何事耶凡此皆恐未易遽論要當降心遜志且就讀書講學上子細用功乆之自有見處也義理細宻直是使麤心㸔不得乍㸔極似䌓碎乆之純熟貫通則綱舉目張有自然省力處向見論事文字綱領不甚分明今乃知其病之在此也僣易及之千萬照亮胡文定春秋曽熟㸔否未論義理且㸔其文字亦便見此老胷中間架規撫不草草也直卿志堅思苦與之處甚有益此道不是小事須喫些辛苦方可望也答或人示喻爲學次第甚慰所望果能充此聖賢門戸真可䇿而進矣近世學者多是向外走作不知此心之妙是爲萬事根本其知之者又只是撑眉努眼喝罵將去便謂只此便是良心本性無有不善却不知道若不操存踐履講究體驗則只此撑眉努眼便是私意人欲自信愈篤則其狂妄愈甚此不可不深察而逺避之也答或人仁者與天爲一智者聴天所命與天爲一者嘉人之善矜人之惡無所擇於利害故能以大事小聴天所命者循理而行順時而動不敢用其私心故能以小事大然此亦各因一事而言惟仁者能如此智者能如此耳非專以事大事小爲仁智之分樂天畏天之别也仁者固能事小然豈不能事大智者固能事大然豈不能事小但其事之情則有樂天畏天之異耳保天下保一國以其徳之厚薄量之大小而言亦無一定之拘畏天之威于時保之此智者畏天而保天下之事也所云忘私克巳乃畏天之事樂天則無私之可忘無巳之可克矣度􅀔量力乃計利害之私智者知天理之當然而敬以循之所以爲畏天也晦庵先生朱文公文集卷第六十四終福州府儒學訓導鄭璉校正
