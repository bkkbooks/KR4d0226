body:
  text: 答陳明仲熹窮居奉飬粗安義分無足言者惟是精力有限而道體無窮人欲易迷而天理難復凛乎日以憂懼盖未知所以脫於小人之歸者方念未能得叩餘論以自警􅀤忽得來教乃知高明之見巳如此自顧疲駑雖殫十駕之勤亦無以相及矣矍然驚嘆不知所言至於反復再三則有不能無疑者蓋來喻自謂嘗有省處此心直與孔孟無異言行之間旣從容而自中矣如此則是老兄之學巳到聖賢地位尚復何疑而其後乃復更有學無得老將至之歎則又無以異於某所憂者此雖出於退讓不居之意然與􅀄之所言亦太相反矣使熹將何取信而能亡疑於長者之言耶又以其他議論參考之竊意老兄􅆂飬之功雖至而窮理之學未明是以日用之間多所未察雖言之過而亦不自知也老兄旣不鄙其愚而辱問焉熹雖淺陋亦不敢以虚厚意也區區管見願老兄於格物致知之學稍留意焉聖賢之言則反求諸心而加涵泳之功日用之間則精察其理而審毫􅁵之辨積日累月存驗擴充庶乎其眞有省而孔孟之心殆可識矣示喻讀書之目恐亦太多姑以應課程可矣欲其從容玩味理與神㑹則恐决不能也程子之書司馬張楊之􅀃不知其果皆出於一轍耶抑有所不同也此等處切湏著眼不可㝷行數墨備禮㸔過而巳旣荷愛予直以此道相期不覺僣易盡布所懷伏惟旣以温公之心爲心必有以容之然􅀃而繹從而改尚不能無望於高明也但能如程子所謂不敢自信而信其師如此著力兩三年間亦當自見得矣汪丈毎以吕申公爲準則比觀其家傳所載學佛事殊可􅀏彼其徳器渾厚謹嚴亦可謂難得矣一溺其心於此乃與世俗之見無異又爲依違中立之計以避其名此其心亦可謂支離之甚矣顧自以爲簡易則吾不知其􅀃也程子曰欲不學佛見得他小便自然不學眞知言哉答陳明仲所示諸􅀃足見留意便遽未暇條對大抵終有未脫禪學規模處更願於平易著實處理㑹不必以頓然有省爲竒只要漸覺意味明白深長便是功效然亦不可存此計較功效之心但循循不巳自有至矣答陳明仲前書所論不求安飽惟在敏於事上著力此恐倒却文意兼義亦不如此蓋惟無求飽求安之心乃能敏於事耳謹於言亦不專爲耻躬之不逮大凡言語皆當謹也愚見如此未知是否答陳明仲喻及論語諸􅀃以此乆不修報然觀大槩貪慕高逺􅀃得過當處多却不是言下正意如首章論耻躬不逮便􅀃古人誠貫天地行通神明今人作僞行詐欺世盗名都未合􅀃到此且熟味古者言之不出恥躬之不逮也緊要用力處是如何不必􅀃向前去如此乆之意味自别且如尹和靖講􅀃便都無似此簡約精微極好涵泳也推此一章餘皆可見答陳明仲程集荷借及略看一二處止是長沙􅀄開本如易傳序㳂流作泝流􅀕文姪作猶子之􅀋皆胡家以意改者後来多所改正可從子飛永之殊勝此本也答陳明仲累承示經􅀃比舊益明白矣然猶有推求太廣處反失本意今不睱一一具禀異時靣見當得一一指陳以求可否大抵讀書當擇先儒舊􅀃之當於理者反復玩味朝夕涵泳便與本經正言之意通貫浹洽於胷中然後有益不必段段立􅀃徒為􅀚美而實未必深有得於心也講學正要反復研窮方見義理歸􅀫處不可只略􅀃過便休也答陳明仲向辱書喻有意於程氏之學甚善甚善然向聞留意空門甚切不知何故乃復舎彼而將求之於此豈亦知前之失而然邪抑以為彼此􅀄不相妨既釋而不害其為儒也二者必有一矣由前之􅀃則程氏教人以論孟大學中庸為本須於此數書熟讀詳味有㑹心處方自見得如其未然讀之不厭熟講之不厭煩非如釋氏指理為障而兀然坐守無義之語以俟其僥倖而一得也此數書程氏與其門人髙弟為􅀃甚詳試訪求之自首至尾循守加功湏如小兒授書節節而進乃隹不可匆匆繙閱無􅀘於事又不可雜以他􅀃徒亂宗㫖也如蘇氏之􅀋􅀂曰彼此不相妨儒釋可以並進則非淺陋所敢聞也答陳明仲示喻讀書遺忘此士友之通患無藥可醫只有少讀深思令其意味浹洽當稍見功耳讀易亦隹但經書難讀而此書為􅀹難盖未開卷時巳有一重象數大槩工夫開卷之後經文本意又多􅀍先儒硬􅀃殺了令人看得意思局促不見本来開物成務活法廷老所傳鄙􅀃正為欲救此弊但當時草草抄出踈畧未成文字耳然試畧考之亦粗見門户梗槩􅀂有他􅀃則非吾之所敢聞也答陳明仲丞事如過割一條亦是民間休戚所係頃在同安見官户富家吏人市户典買田業不肯受業操有餘之勢力以坐困破賣家計狼狽之人殊使人扼腕毎縣中有送来整理者必了於一日之中盖不如此則村民有􅀫食廢業之患而市人富家得以持乆困之使不敢伸理此最弊之大者嘗見友人陳元滂􅀃昔年趨事吏部許公於邵陽許公自言吾作縣有八字法請問之則曰開収人丁推割産稅而巳此可謂知為政之本者願髙明志之明道行狀及門人叙述中所論政事叙指無事亦宜熟看殊開發人意思也所詢䘮禮别􅁓具禀顧亦考未精又適此數時擾擾不及致思恐未必是更可轉詢知禮之士庶不誤耳别􅁓靈席居中堂家無二主似合少近西為宜朔祭子爲主按喪禮凡喪父在父爲主則父在子無主喪之禮也又曰父没兄弟同居各主其喪注云各爲妻子之喪爲主也則是凡妻之喪夫自爲主也今以子爲喪主似未安先遣柩歸而奉䰟帛終喪埋帛立主時在官所此於古無􅀄旣不能盡從古制即且如此亦可然終不是也奉祀者題其子此亦未安且不須題奉祀之名亦得廟别三丗别設一位於其下禮卒哭而祔於祖姑三年而後入廟今旣未葬則三虞卒哭之制無所施不􅀂終喪立主而祔祔畢於家廟旁設小位以奉其主不可於廟中别設位也愚見如此未知是否告更以温公書儀及髙氏送終禮參考之當有定論也答陳明仲喻及喪禮踰朞主祭之疑此未有可考但司馬氏大小祥祭巳除服者皆與祭則主祭者雖巳除服亦何害於主祭乎但不可純用吉服須略如弔服或忌日之服可也更告􅀶詢深於禮者議之答陳明仲祭禮比得書亦及此數條各巳隨事􅁵正如配祭只用元妃繼室則爲别廟或有庶母又爲别廟或妻先亡又爲别廟弟先亡無後亦爲别廟與伯叔祖父兄之無後者凡五等須各以一室爲之不可雜也冬至巳有始祖之祭是月又是仲月自當時祭故不更别祭其他俗節則巳有各依鄕俗之文自不妨隨俗増損但元旦則在官者有朝謁之禮恐不得專精於祭事熹郷里􅁍止於除夕前三四日行事此亦更在斟酌也忌日服制王彦輔塵史載冨鄭公用垂脚黲紗幞頭黲布衫脂皮帶如今人禫服之制此亦未得汪丈報不知以爲如何也答陳明仲喪服前書巳具去昨日又略爲元伯道一二恐古制未明或且只用四脚襴衫之制亦可但虞祭後方可釋服然後奉主㱕廟耳自啓殯至虞其間吉禮􅁠停可也次日恐亦未宜遽講賀禮恐令嗣有未安尊兄以禮意喻之則無疑矣此最禮之大節精意所在衣裳制度抑其次耳答陳明仲苟欲聞過但當一一容受不當復計其虗實則事無大小人皆樂告而無隱情矣􅀂切切計較必與辨爭恐非告以有過則喜之意也答陳明仲不逺遊與三年無改各是一章文義自不相䝉或欲牽合彊爲一􅀃非聖人本意也竊謂夫子此言只是發明孝子之心耳蓋父之所行雖或有所當改然苟未至於不可一朝居則爲之子者未忍遽革而有待於三年亦可見其不忍死其親之心矣此心是本但能存得此心則父之道或終身不可改或一日不可行皆隨其事之重輕而處之不失其宜矣聖人特指此心以示人所謂貫徹上下之言而豈曰姑以是爲中制也哉􅀂如所喻章句文義固巳不通而其間又極有害義理處夫謂三年而免於父母之懷者責宰予耳父母之愛其子而子之愛其親皆出於自然而無窮豈計歳月而論施報之爲哉􅀂所謂中乃天理人倫之極致隨時而所在不同以禹稷顔子之事觀之則可見矣今曰姑以中制言之則是欲於半上落下之間指爲一定之中以同流俗合汙世而巳豈聖人之所謂中也㢤答陳明仲爲長府與季氏聚歛事相因與否不可知不必附㑹爲􅀃子路鼓瑟不和盖未能盡變其氣質所云未能上逹不巳語不親切屢空之空恐是空乏屢至空乏而處之能安此顔子所以庶㡬於道也下文以子貢貨殖爲對文意尤分明􅀂以空爲心空而屢空猶頻復則顔子乃是易傳所謂復善而不能固之人矣何以爲顔子子路非謂不學而可以爲政但謂爲學不必讀書耳上古未有文字之時學者固無書可讀而中人以上固有不待讀書而自得者但自聖賢有作則道之載於經者詳矣雖孔子之聖不能離是以爲學也捨是不求而欲以政學既失之矣况又責之中材之人乎然子路使子羔爲宰本意未必及此但因夫子之言而託此以自解耳故夫子以為佞而惡之曽􅀧見道無疑心不累事其胷次洒落有非言語所能形容者故雖夫子有如或知爾之問而其所對亦未嘗少出其位焉盖􅀂將終身於此者而其語言氣象則固位天地育萬物之事也但其下學工夫實未至此故夫子雖喟然與之而終以爲狂也克巳之目不及思所論大槩得之然有未盡熹竊謂洪範五事以思爲主蓋不可見而行乎四者之間也然操存之漸必自其可見者而爲之法則切近明白而易以持守故五事之次思最在後而夫子於此亦徧舉四勿而不及夫思焉蓋欲學者循其可見易守之法以養其不可見不可係之心也至於乆而不懈則表裏如一而私意無所容矣程子四箴意正如此試熟玩之亦自可見學固以至聖爲極習固是作聖之方然恐未須如此􅀃且當理㑹聖賢之所學者何事其習之也何術乃見入德之門所謂切問而近思也人不知而不愠和靖所謂學在巳知不知在人何愠之有者最爲的當盖如此而言乃見爲巳用心之約處􅀂以容人爲􅀃竊恐爲巳之心不切而又渉乎自廣狹人之病其去道益逺矣嘗見或人􅀃此乃有容天之論此又欲大無窮而不知其䧟於狂妄者也答李伯諌甲申詳觀所論大抵以釋氏爲主而於吾儒之􅀃近於釋者取之異於釋者在孔孟則多方遷就以曲求其合在伊洛則無所忌憚而直斥其非夫直斥其非者固未識其㫖而然所取所合亦竊取其似是而非者耳故語意之間不免走作不得於言而求諸心則從􅀄讀孔孟伊洛文字止是資舉業此來書之語固無縁得其指歸所以敢謂聖學止於如此至於後来學佛乃是怕生死此亦來書中之語而力究之故䧟溺深從始至末皆是利心所謂差之毫􅁵者其在兹乎然敢詆伊洛而不敢非孔孟者直以舉世尊之而吾又身為儒者故不敢耳豈真知孔孟之可信而信之㦲是猶不敢顯然背畔而毁冠裂冕㧞本塞源之心巳􅀼發矣學者豈可使有此心萌於胷中㦲來書云於程氏雖未能望其堂奥而巳窺其藩籬矣熹􅀼謂聖人道在六經若日星之明程氏之􅀃見於其書者亦詳矣然若只將印行冊子從頭掲過略曉文義便為得之則當時門人弟子亦非全然鈍根無轉智之人豈不能如此領㑹而孔門弟子之從其師厄窮飢餓終其身而不敢去程氏之門巳仕者忘爵禄未仕者忘飢寒此游察院語此亦必有謂矣試將聖學做禪様看日有孜孜竭才而進􅀼恐更有事在然後程氏藩籬可得而議也來書謂聖門以仁為要而釋氏亦言正覺亦號能仁又引程氏之􅀃為證熹􅀼謂程氏之􅀃以釋氏窮幽極微之論􅀚之似未肯以為極至之論但老兄與儒者辨不得不借其言為重耳然儒者言仁之體則然至語其用則毫􅁵必察故曰仁之實事親是也又曰孝弟也者其為仁之本與此體用所以一源而顯微所以無間也釋氏之云正覺能仁者其論則髙矣美矣然其本果安在乎來書引天下歸仁以證滅度衆生之􅀃熹􅀼謂恐相似而不同伊川先生曰克巳復禮則事事皆仁故曰天下歸仁試用此意思之毫髪不可差差則入於異學矣來書云夫子語仁以克巳爲要佛氏論性以無心爲宗而以􅀛山心不可無之􅀃爲非熹謂所謂巳者對物之稱乃是私認爲巳而就此起計較生愛欲故當克之克之而自復於理則仁矣心乃本有之物虚明純一貫徹感通所以盡性體道皆由於此今以爲妄而欲去之又自知其不可而曰有眞心存焉此亦來書之語則又是有心矣如此則無心之􅀃何必全是而不言無心之􅀃何必全非乎􅀂以無心爲是則克巳乃是有心無心何以克巳􅀂以克巳爲是則請從事於斯而足矣又何必克巳於此而無心於彼爲此二本而枝其辭也來書云輪回因果之􅀃造妖􅑃恠以誑愚惑衆故逹磨亦排斥之熹竊謂輪回因果之􅀃乃佛􅀃也今以佛爲聖人而斥其言至於如此則老兄非特叛孔子又謗佛矣豈非知其􅀃之有所窮也而爲是遁辭以自解免哉抑亦不得巳於儒者而姑爲此計以緩其攻也嗚呼吾未見聖人立􅀃以誑愚惑衆而聖人之徒倒戈以伐其師也孰謂本末殊歸首尾衡決如是而尚可以爲道乎來書云韓退之排佛而敬大顚則亦未能排眞佛也熹謂退之稱大顚頗聰明識道理能外形骸以理自勝不爲事物侵亂而巳其與原道所稱以之爲巳則順而祥以之爲人則愛而公以之爲天下國家則無所處而不當者果如何耶來書云形有死生眞性常在熹謂性無僞冐不必言眞未嘗不在不必言在蓋所謂性即天地所以生物之理所謂維天之命於穆不巳大哉乾元萬物資始者也􅂚嘗不在而豈有我之所能私乎釋氏所云眞性不知其與此同乎否也同乎此則古人盡心以知性知天其學固有所爲非欲其死而常在也苟異乎此而欲空妄心見眞性惟恐其死而失之非自私自利而何是猶所謂廉賈五之不可不謂之貨殖也伊川之論未易遽非亦未易遽曉他日於儒學見得一箇􅒑模乃知其不我欺耳來書謂伊川先生所云内外不備者爲不然蓋無有能直内而不能方外者此論甚當據此正是熹所疑處􅀂使釋氏果能敬以直内則便能義以方外便須有父子有君臣三綱五常闕一不可今曰能直内矣而其所以方外者果安在乎又豈數者之外别有所謂義乎以此而觀伊川之語可謂失之恕矣然其意不然特老兄未之察耳所謂有直内者亦謂其有心地一叚工夫耳但其用功却有不同處故其􅀤有差他却全不管著此所以無方外之一節也固是有根株則必有枝葉然五榖之根株則生五榖之枝葉華實而可食稊稗之根株則生稊稗之枝葉華實而不可食此則不同耳參术以根株而愈疾鉤吻以根株而殺人其所以殺人者豈在根株之外而致其毒哉來書云不能於根株之外别致其巧也故明道先生又云釋氏惟務上逹而無下學然則其上逹處豈有是也元不相連屬但有間㫁非道也此可以見内外不備之意矣然來書之云却是從儒向佛故猶籍先生之言以爲重􅀂眞胡種族則亦不肯招認此語矣如何如何來書云以理爲障者特欲去其私意小智熹謂認私意小智作理字正是不識理字來書又謂上蔡云佛氏不肯就理者爲非熹謂􅀂不識理字則此亦未易以口舌争也他日解此乃知所言之可􅀏耳來書云儒佛見處旣無二理其設教何異也蓋儒教本人事釋教本死生本人事故緩於見性本死生故急於見性熹謂既謂之本則此上無復有物矣今旣二本不知所同者何事而所謂儒本人事緩見性者亦殊無理三聖作易首曰乾元亨利貞子思作中庸首曰天命之謂性孔子言性與天道而孟子道性善此爲本於人事乎本於天道乎緩於性乎急於性乎然著急字亦不得俗儒正坐不知天理之大故爲異􅀃所迷反謂聖學知人事而不知死生豈不誤哉聖賢教人盡心以知性躬行以盡性終始本末自有次第一皆本諸天理緩也緩不得急也急不得直是盡性至命方是極則非如見性之􅀃一見之而遂巳也上蔡云釋氏之論性猶儒者之論心釋氏之論心猶儒者之論意此語剖析極精試思之如何來書云子貢之明逹性與天道猶不與聞熹竊謂此正癡人前􅀃夣之過也來書又謂釋氏本死生悟者湏徹底悟去故祖師以來由此得道者多熹謂徹底悟去之人不知本末内外是一是二二則道有二致一則死生人事一以貫之無所不了不知傳燈錄中許多祖師幾人做得尭舜禹稷幾人做得文武周孔須有徴驗處來書云特聖人以中道自任不欲學者躐等熹謂此正是王氏高明處巳中庸處人之􅀃􅀛山嘗力詆之矣須知所謂不欲學者躐等者乃是天理本然非是聖人安排教如此譬諸草木區以别矣且如一莖小􅀣不道他無草木之性然其長湏有漸是亦性也所謂便欲當人立地成佛者正如將小􅀣來噴一口水便要他立地干雲蔽日豈有是理便欲當人立地成佛亦是來書中語設使有此幻術亦不可謂之循理此亦見自私自利之規模處來書云引大易生死之􅀃程氏語黙日月洪鑪之論熹按此四者之􅀃􅀄無二致來書許其三排其一不知何所折􅂨而云然然則所許三􅀃恐未得其本意也愚意以爲不必更於此理㑹且當按聖門下學工夫求之乆自上逹所謂未知生焉知死也來書云聖人體易至於窮神知化未之或知之妙熹疑此語脉中有病又云生死之際必不如是之任滅也熹謂任滅二字亦是釋氏言之聖人於死生固非任滅亦􅀄不見任滅之病更以前叚參之來書云曹參楊億不學儒不害爲偉人熹前書巳奉答矣而細思之則老兄固云夫子之道乃萬世仁義禮樂之主今乃有不學儒而自知道者則夫子何足爲萬世仁義禮樂之主也且仁義禮樂果何物乎又曹參楊億二人相擬正自不倫曹參在漢􅀄功臣中人品儘麤踈後來却能如此避正堂􅃕蓋公治齊相漢與民休息亦非常人做得其所見似亦儘髙所可借者未聞聖人之道而止於是耳楊億工於纎麗浮巧之文巳非知道者所爲然資禀清介立朝獻替略有可觀而釋子特以爲知道者以其有八角磨盤之句耳然旣謂之知釋氏之道則於死生之際宜亦有過人者而方丁謂之逐萊公也以他事召億至中書億乃恐懼至於便液俱下靣無人色當此時也八角磨盤果安在哉事見蘇黄門龍川别志第一卷之末蘇公非詆佛者其言當不誣矣然則此二人者雖皆未得爲知道然億非參之倫也子比而同之過矣蓋老氏之學淺於佛而其失亦淺正如申韓之學淺於楊墨而其害亦淺因論二人謾及之亦不可不知也來書云鹽官講義急於學者見道便欲人立地成佛熹於前叚巳論之矣然其失亦不專在此自是所見過中無著實處氣象之間蓋亦可見來書所謂􅀤明西洛諸公所未言者即其過處也嘗聞之師曰二蘇聰明過人所􅀃語孟儘有好處蓋天地間道理不過如此有時便見得到皆聰明之􅀤也但見到處却有病􅀂欲窮理不可不論也見到處却有病此語極有味試一思之不可以爲平常而忽之也答李伯諌承喻及從事心性之本以求變化氣質之功之􅀃此意甚善然愚意此理􅀄無内外本末之間凡日用間涵泳夲原酬酢事變以至講􅀃辯論考究㝷繹一動一静無非存心養性變化氣質之實事學者之病在於爲人而不爲巳故見得其間一種稍向外者皆爲外事􅀂實有爲巳之心但於此顯然處嚴立規程力加持守日就月將不令退轉則便是孟子所謂深造以道者蓋其所謂深者乃功夫積累之深而所謂道者則不外乎日用顯然之事也及其眞積力乆内外如一則心性之妙無不存而氣質之偏無不化矣所謂自得之而居安資深也豈離外而内悪淺而深舎學問思辯力行之實而别有從事心性之妙也哉至於易之爲書因隂陽之變以形事物之理大小精粗無所不備􅀹不可以是内非外厭動求静之心讀之鄙意如此故於來喻多所未安竊恐向來學佛病根有未除者故敢以告然恐亦未必盡當於理惟高明擇之答李伯諌誨諭勤勤深荷不鄙然人之爲學各有所見豈能必於盡同亦各信其所信而勉焉耳今髙明所造日深日逺而愚䝉底􅆡不能變其􅀄心竊意必無可合之理來書乃欲曲加鐫誨期之異日雖荷眷舊之私然恐亦徒爲競辨而無􅀘於進脩之實也謹此少謝厚意之辱伏幸裁照答呉公濟來書云儒釋之道本同末異熹謂本同則末必不異末異則本必不同正如二木是一種之根無縁却生兩種之實來書云夫子專言人事生理而佛氏則兼人􅀑生死而言之熹按伯諌書中亦有此意巳於答伯諌書中論之矣他日取觀可見鄙意抑又有􅀃焉不知生死人􅀑爲一乎爲二乎􅀂以爲一則專言人事生理者其於死與􅀑神固巳兼之矣不待兼之而後兼也􅀂須别作一頭項窮究曉㑹則是始終幽明却有間隔似此見處竊恐未安來書云夫子罕言之者正謂民不可使知恐聞之而生惑熹謂聖人於死生􅀑神雖不切切言之然於六經之言格物誠意之方天道性命之􅀃以至文爲制度之間名器事物之小莫非示人以始終幽明之理蓋巳無所不備􅀂於此講究分明而心得之則仰觀俯察洞然其無所疑矣豈聞之而反有所惑耶但人自不學故聖人不能使之必知耳非有所秘而不言也今乃反謂聖人秘而不言宜其惑於異􅀃而不知所止也來書云賢士大夫因佛學見性然後知夫子果有不傳之妙論語之書非口耳可傳授熹謂論語固非口耳所可傳授然其間自有下工夫處不待學佛而後知也學佛而後知則所謂論語者乃佛氏之論語而非孔氏之論語矣正如用琵琶蓁筝方響觱栗奏雅樂節拍雖同而音韻乖矣來書云因語孟見理然後知佛氏事理俱無礙之􅀃熹按上文言因佛學見性此言因語孟見理理與性同乎異乎幸剖析言之以曉未悟但恐眞見語孟所言之理則釋氏事理無礙之間所礙多矣來書云幽明之故死生之􅀃晝夜之道􅀄無二理明之於幽生之於死猶晝之於夜也􅀑神之情狀見乎幽者爲不可誣則輪回因果之􅀃有不可非者謂上智不在此域可也謂必無是理不可也熹竊謂幽明死生晝夜固無二理然須是明於大本而究其所自來然後知其實無二也不然則所謂無二者恐不免於彌縫牽合而反爲有二矣􅀑神者造化之跡伊川語乃二氣之良能也橫渠語不但見乎幽而巳以爲專見乎幽似此未識􅀑神之爲何物所以溺於輪回因果之􅀃也幽則有􅀑神者對禮樂而言之大抵未嘗熟究聖人六經之㫖而遽欲以所得於外學者籠􅇁臆度言之此所以多言而愈不合也至又謂不可謂無此理特上智不在此域此􅀹害理蓋不知此理是合有耶合無耶以爲不可謂必無是理則是合有也合有則盈天地之間皆是此理無空闕處而上智之人獨不與焉不知又向甚處安身立命􅀂是合無則凡此所謂不可無之理乃衆生之妄見而非眞諦也此其與聖人之心大相逺矣而曰聖人無兩心吾不信也答趙佐卿所示易􅀃足見玩意之深不勝歎服此經舊亦嘗伏讀然每病其未有入處乃承見喻使反復其論盖乆不知其所以對也顧厚意不可以終辭姑以已意畧䟽其後未知當否惟高明裁之復有以誨警之則幸甚大抵聖經惟論孟文詞平易而切於日用讀之疑少而益多􅀂易春秋則􅀹爲隱奥而難知者是以平日畏之而不敢輕讀也答曹􅀳叔近仁之􅀃來喻固未安擇之􅀃亦有病竊原聖人之意非是教人於此體仁乃是言如此之人於求仁爲近耳雖有此質正須實下求仁功夫乃可實見近處未能如此即須矯揉到此地位然後於仁爲近可下功夫􅀂只守却剛毅木訥四字要想象思量出仁體來則恐無是理也答林擇之用中熹以崇安水災􅀍諸司檄來與縣官議賑恤事因爲之遍走山谷間十日而後返大率今時肉食者漠然無意於民直是難與圖事不知此箇端緒何故汨没得如此不見頭影因知􅀂此學不明天下事决無可爲之理王丞文字足罷去因力薦何叔京攝其事􅀂得此人來將來檢放一叚事須有條理但只恐才不足然終是勝今日諸人耳此水所及不甚廣但􅀤源處皆是高山裂石涌水川原田畆無復東西皆爲巨石之積死傷幾百人行村落間視其漂蕩之路聽其􅁈號之聲殆不復能爲懐云云所􅀉李先之記文體靣甚佳趣向甚正但緊切處殊不端的只云此爲仁此爲義却何如便由此而用之且􅀂眞知仁義之實則又不可云以誠而意以正而心此􅀋非一大抵此是尤緊切處只如此他可勿論也恐更有可指處因來更論之以起惰氣也答林擇之熹奉養粗安舊學不敢廢得擴之朝夕議論相􅂇爲多幸甚敬夫得書竟主觀過之􅀃因復細思此􅀃大害事復以書扣之擴之錄得藁子奉呈不知擇之以爲如何也伯逢來問造端夫婦之􅀃偶亦嘗思之前此􅀃得汎濫不縝宻今答之如此擴之亦巳錄去矣近見古人下工夫處極是精宻日用之間不敢不勉庶幾他時相見或有尺寸之進耳敬夫又有書理㑹􅀕儀以墓􅀕節祠爲不可然二先生皆言墓􅀕不害義理又節物所尚古人未有故止於時􅀕今人時節隨俗燕飲各以其物祖考生存之日蓋嘗用之今子孫不廢此而能恝然於祖宗乎此恐大泥古不盡如事存之意方欲相與反復庶歸至當但舊儀亦甚草草近再修削頗可觀一􅀊只七􅀕爲正祭自元日以下皆用告朔之禮以薦節物於隆殺之際似勝舊儀便遽未及寫去答林擇之熹侍旁如昨祠官再請􅀂更不得請當如所戒近事則無可􅀃觀左史之除可見綱紀之紊但如諸公􅀂不相捨不得不一行又聞亦有招致南軒之意果爾猶或庶㡬但恐終不能用爾所欲言甚衆逺書不欲多談可黙㑹也元履竟爲揆路所逐雖其多言未必一一中節亦坐謄藁四出之故然其爲吾君謀也則忠士大夫以言見逐非國家美事亦使幽隱之賢難自進耳近得南軒書諸􅀃皆相然諾但先察識後涵養之論執之尚堅未􅀤已􅀤條理亦未甚明蓋乍易舊􅀃猶待就所安耳敬以􅀡内爲􅀄學之急務誠如所諭亦巳報南軒云擇之於此無異論矣此事統體操存不作兩叚日用間便覺得力嘗驗之否康節云􅀂非前聖開䝉吝幾作人間小丈夫誠哉是言近讀易傳見得隂陽剛柔一箇道理儘有商量未易以書見也兩叚之疑動静之􅀃甚佳赤子之心前書巳嘗言之謂言其體則無賢愚少長之别今日赤子之心巳是指其用而言之前此似亦未理㑹到此試爲思之如何來諭謂其言非寂然不動與未􅀤不同爲將動静做不好􅀃似􅀄無此意但言不專此而言則兼巳􅀤感通之用在其中耳今者只如前書推明程子之意則亦不須如此分别費力矣答林擇之此有李伯諌往時溺於禪學近忽微知其非昨來此留數日蔡季通亦來㑹劇論不置遂肯捨去舊習此亦殊不易蓋其人資禀本佳誠心欲爲爲巳之學雖一􅁁䧟溺而每事講究求合義理以故稍悟天命之性非空虚之物然􅀄猶戀著舊見謂不相妨今則已脫然矣可尚可尚仲尼焉學體物而不可遺春王正月胡傳之􅀃如何谷神不死此數義近皆來問者幸各以數語明之遺書論天地之中數段亦告爲求其㫖見喻更以周禮唐天文志系之爲佳答林擇之昨得􅀳叔書􅀃剛毅木訥近仁云擇之嘗告以仁者人所以肖天地之機要湏就􅀤見處㸔得通神自然識得細看此􅀃似非所以曉人乃所以惑人􅀳叔縁此􅀃得來轉没交渉不免就其􅀃答之似稍平穩今謾錄去不知還更有病否孔門求仁功夫似只是如此著實􅀃未有後來許多玄妙也通神之語恐亦有病况不務涵飬本根而直㸔􅀤處􅀹所未安仁者人所以肖天地之機要此句極好然却只是一句好􅀃話正如世俗所謂卦影者未知仁者定理㑹不得知仁者又不消得如此􅀃與它要之聖賢言仁自不如此觀論語孟子可見矣如何如何答林擇之所答二公問甚精當熹亦嘗答之只􅀃得大槩不能如此之宻然勸深父且㸔語孟大學其意亦如所示也仲弓一叚太迫切觀渠氣質與識致所及似禁不得如此鉗鎚也􅀳叔亦是自悠悠諸公覺得且如此何丞近得書亦未有進處餘則不聞問也季通兩日儘得講論亦欲附書未暇渠終是未專一􅀂䧏伏得此病痛下方有可用力處巳深告之未知如何終日憒憒自救不了更添得此累思與吾擇之相聚觀感警益之助何可得耶瞻仰非虚言也昨日書中論未􅀤者㸔得如何兩日思之疑舊來所􅀃於心性之實未有差而未􅀤巳􅀤字頓放得未甚穩當疑未􅀤只是思慮事物之未接時於此便可見性之體叚故可謂之中而不可謂之性也􅀤而中節是思慮事物巳交之際皆得其理故可謂之和而不可謂之心心則通貫乎巳􅀤未􅀤之間乃大易生生流行一動一静之全體也云云舊疑遺書所記不審今以此勘之無一不合信乎天下之書未可輕讀聖賢指趣未易明道體精微未易究也答林擇之太山爲高矣然太山頂上巳不屬太山此喻道體之無窮而事業雖大終有限量爾故下文云云意可見也又旣得後須放開此亦非謂湏要放開但謂旣有所得自然意思廣大規模開廓湏字如用必字􅀂未能如此便是未有所得只是守爾蓋以放開與否爲得與未得之驗􅀂謂有意須放教開則大害事矣上蔡論周恭叔放開忒早此語亦有病也鳶飛魚躍察見天理正與中庸本文察字異指便入尭舜氣象亦只是見得天理自然不煩思勉處爾􅀂實欲到此地位更有多少功夫而可易其言耶疑上蔡此語亦傷快也近來玩索漸見聖門進趣實地但苦惰廢不能如人意爾答林擇之竹尺一枚煩以夏至日依古法立表以測其日中之景細度其長短示及孟􅀃正欲煩訂正俟見靣納向來數書所講亦併俟靣論但顯道記憶語中數叚子細㸔皆好只太山頂上巳不屬太山此但論道體之無窮而事業雖大終有限量耳故下文云云意可見矣欽夫春來未得書聞􅀊前屢對上意甚向之然十寒衆楚愛莫助之未知竟何如耳鄭丈至誠樂善當時少比必能相親其徳器粹然從容厚重亦可佳也答林擇之比因朋友講論深究近世學者之病只是合下欠却持敬工夫所以事事滅裂其言敬者又只􅀃能存此心自然中理至於容貌詞氣往往全不加工設使眞能如此存得亦與釋老何異上蔡􅀃便有此病了又况心慮荒忽未必眞能存得耶程子言敬必以整齊嚴肅正衣冠尊瞻視爲先又言未有箕踞而心不慢者如此乃是至論而先聖􅀃克巳復禮㝷常講􅀃於禮字毎不快意必訓作理字然後巳今乃知其精微縝宻非常情所及耳近畧整頓孟子􅀃見得此老直是把得定但常放教到極險處方與一斡轉斡轉後便見天理人欲􅀡是判然非有命世之才見道極分明不能如此然亦只此便是英氣害事處便是才高無可依據處學者亦不可不知也答林擇之熹哀苦之餘無他外誘日用之間痛自歛飭乃知敬字之功親切要妙乃如此而前日不知於此用力徒以口耳浪費光隂人欲横流天理幾滅今而思之怛然震悚蓋不知所以措其躬也答林擇之所論顔孟不同處極善極善正要見此曲折始無窒礙耳比來想亦只如此用功熹近只就此處見得向來所未見底意思乃知存乆自明何待窮索之語是眞實不誑語今未能乆巳有此驗况眞能乆邪但當益加勉勵不敢少弛其勞耳拙齋和篇莊重和平讀之如見其人煩爲多致謝意莊子詩亦皆有味但可惜只玩心於此耳竊恐論語孟程之書平易眞實處更有滋味從前咬嚼未破所以向此作活計然不敢僣易獻此􅀃顧無以謝其不鄙之意只煩擇之從容爲逹此懷也吕公家傳深有警悟人處前軰涵養深厚乃如此但其論學殊有病如云不主一門不私一􅀃則􅀶而雜矣如云直截勁捷以造聖人則約而陋矣舉此二端可見其本末之皆病此所以流於異學而不自知其非耶而作此傳者又自有不可曉處如云雖萬物之理本末一致而必欲有爲此􅀋甚多不知是何等語又義例不明所載同時諸人或名或字非褒非貶皆不可考至如蘇公則前字後名􅀹無所據豈其學無綱領故文字亦象之而然邪最後論佛學􅀹可駭歎程氏之門千言萬語只要見儒者與釋氏不同處而吕公學於程氏意欲直造聖人盡其平生之力乃反見得佛與聖人合豈不背戾之甚哉夫以其資質之粹美涵養之深厚如此疑􅀂不叛於道而窮理不精錯謬如此流傳於世使有志於道而未知所擇者坐爲所悞蓋非特莠之亂苗紫之亂朱而巳也奈何奈何答林擇之所論大抵皆得之然鄙意亦有未安處如滿腔子是惻隱之心此是就人身上指出此理充塞處最爲親切􅀂於此見得即萬物一體更無内外之别􅀂見不得却去腔子外㝷覔則莾莾蕩蕩愈無交渉矣陳經正云我見天地萬物皆我之性不復知我身之爲我矣伊川先生曰他人食飽公無餒乎正是􅀃破此病知言亦云釋氏以虚空沙界爲巳身而不知其父母所生之身亦是􅀃此病也三代正朔以元祀十有二月考之則商人但以建丑之月爲􅀊首而不改月號時亦必不改也以孟子七八月十一月十二月之􅀃考之則周人以建子之月爲正月而不改時改月者後工之彌文不改時者天時不可改故􅀕􅂎田獵猶以夏時爲正以書一月戊午厥四月哉生明之􅀋考之則古史例不書時以程子假天時以立義之云考之則是夫子作春秋時特加此四字以繫年見行夏時之意􅀂如胡傳之􅀃則是周亦未嘗改月而孔子特以夏正建寅之月爲􅀊首月下所書之事却是周正建子月事自是之後月與事常相差兩月恐聖人制作之意不如是之紛更煩擾其所制作亦不如是之錯亂無章也愚見如此而考之劉質夫􅀃亦云先書春王正月而後書二百四十二年之事皆天理也似亦以春字爲夫子所加王字亦非史䇿舊文但魯史本謂之春秋則又似元有此字而杜元凱左傳後序載汲冡竹書乃晉國之史却以夏正建寅之月爲􅀊首則又似胡氏之􅀃可爲據此間無竹書煩爲見拙齋扣之或有此書借錄一兩年示及幸甚幸甚又漢書元年冬十月注家以爲武帝改用夏時之後史官追正其事亦未知是否此亦更煩子細詢考也金聲或洪或殺清濁萬殊玉聲清越和平首尾如一故樂之作也八音克諧雖􅀂無所先後然奏之以金節之以玉其序亦有不可紊者焉蓋其奏之也所以極其變也其節之也所以成其章也變者雖殊而所以成者未嘗不一成者雖一而所歴之變洪纎清濁亦無所不具於至一之中聖人之知精粗大小無所不周聖人之徳精粗大小無所不備其始卒相成蓋如此此金聲而玉振之所以譬夫孔子之集大成而非三子之所得與也然即其全而論其偏則纎而不能洪清而不能濁者是其金聲之不備也不能備乎金聲而遽以玉振之雖其所以振之者未嘗有異然其所振一全一闕則其玉之爲聲亦有所不能同矣此與來喻大同小異更請詳之却以見告仲尼焉學舊來􅀃得太高詳味文意文武之道只指先王之禮樂刑政教化文章而巳故特言文武而又以未墜於地言之􅀂論道體則不容如此立言矣但向來貪􅀃箇高底意思將此一句都瞞過了李光祖雖亦曲爲之􅀃然費氣力似不􅀂四平放下意味深長也但聖人所以能無不學無不師而一以貫之便是有箇生而知之底本領不然則便是近世􅀶雜之學而非所以爲孔子故子貢之對雖􅀂遜辭然其推尊之意亦不得而隱矣答林擇之逰山之計束裝借人行有日矣得伯㳟書却欲此來遂復中輟山水之興雖未能忘然杜門省事未必不隹也潘丈之政爲閩中第一其愛民好士近世誠少比恨未識之耳端叔向見欽夫稱之㳟叔昨在建寜得一見匆匆不能欵然知其惑於世俗高妙之虚談矣大抵好高欲速學者之通患而爲此􅀃者立論高而用功省適有以投其隙是以聞其􅀃者欣然從之唯恐不及往往遺棄事物畧脫章句而相與馳逐於虚曠􅄀漠之中其實學禪之不至者而自託於吾學以少避其名耳道學不明變恠百出以欺世眩俗後生之有志者爲所引取䧟於邪妄而不自知深可悼懼也擇之既從其招致要當有以開之使決然無惑於彼乃爲不􅀒其相向之意然擇之向來亦頗有好竒自是之弊今更當虚心下意向平實處加潜玩浸灌之功不令小有自主張之意則自益益人之功庶乎其兩進矣答林擇之所示疑義巳畧㸔端叔㳟叔惠書極感其意但如此用功鄙意不能無疑要湏把此事來做一平常事㸔朴實頭做將去乆之自然見效不必如此大驚小恠起模畫様也且朋友相聚逐日相見晤語目擊爲益巳多何必如此忉忉動形􅁓筆然後爲講學耶如此非惟勞攘無益且是氣象不好其流風之弊將有不可勝言者可試思之非小故也其間所論操存涵養苦要分别先後巳是無緊要而元禮忽然生出一句心有未嘗放者遂就此上生出無限枝葉不知今苦苦理㑹得此一句有甚緊切日用爲巳功夫處耶又如可欲之善向來􅀃得亦太高了故端叔所論雖失之而擇之亦未爲得也擴之云巳子細報去此不復縷縷矣卷尾二叚却好大扺􅀃得是當自然放下穩帖無許多枝蔓甈􅥳處且如二公所論可欲之善是欲向甚處安頓也答林擇之用中不仁者不可以乆處約長處樂後􅀃得之蓋君子而不仁者有矣夫未有小人而仁者也此皆所謂不仁者但所失亦有淺深乆速之差耳大抵聖人之言雖渾然無所不包而學者却要見得中間曲折也好仁者無以易其所好則尚自尚也悪不仁者不使加乎其身則加自加也􅀂謂人不能加尚之恐未遽有此意也兼我方悪不仁於此又安能必彼之不見加乎用力於仁又是次一等人故曰盖有之矣􅀂好仁悪不仁之人則地位儘高直是難得禮記無欲而好仁無畏而悪不仁者天下一人而巳正是此意曹交識致凡下又有挾貴求安之意故孟子拒之然所以告之者亦極親切非終拒之也使其因此明辨力行而自得之則知孟子之􅀤巳也深矣顧交必不能耳子思泄柳之事恐無空留行道之别但謂穆公之留子思出於誠意今客之來非有王命耳程子有言志壹氣壹專一之意􅀂志專在淫僻豈不動氣氣專在喜怒豈不動志當只依此􅀃來喻此一段皆好但此兩句正倒􅀃却與本文下句不相應耳按喪服傳出母之服朞但爲父後者無服耳子思此事不可暁兼汙隆之􅀃亦似無交渉或記者之誤與易簀事據曽子自言則非不知者蓋因季孫之賜而用雖有所縁然終是未能無失但舉扶而易之當下便冰消凍釋耳文之不可無質猶質之不可無文􅀂質而不文則虎豹之鞟猶犬羊之鞟矣鞟湏依舊􅀃細㸔來喻却覺文義不通天以誠命萬物萬物以誠順天此語固有病而所改云天命萬物萬物奉天誠也亦枯槁費力􅀂曰天之命物也以其誠誠之在物也謂之天不知如何答林擇之誠之在物謂之天前書論之巳詳來書所􅀃依舊非本意向爲此語乃本物與無妄之意言天命散在萬物而各爲其物之天耳意雖如此然窮窘迫切自覺殊非佳語也觀過知仁只依伊川􅀃更以和靖􅀃足之聖人本意似不過如此記曰仁者之過易辭也語曰苟志於仁矣無悪也如此推之亦可見矣子張所問子文文子只􅀃得事不見其心所以處此者的實如何所以見他仁與不仁未得伊川云􅀂無喜愠何以知其非仁乎如此理㑹方見得聖門所􅀃仁字直是親切􅀂如五峯之􅀃却􅀃出去得更逺了與仁字親切處轉無交渉矣知言中􅀃仁字多􅀋此切脉觀雞之􅀃固佳然方切脉觀雞之際便有許多曲折則一心二用自相妨奪非唯仁不可見而脉之浮沉緩急雞之形色意態皆有所不暇觀矣竊意此語但因切脉而見血氣之周流因觀雞雛而見生意之呈露故即此指以示人如引醫家手足頑痺之語舉周子不去庭草之事皆此意爾􅀂如來諭觀雞之􅀃文義猶或可通至切脉之云則文義决不如此又所云同一機者頗􅀋無垢句法孟敬子問疾一章但㸔二先生及尹和靖􅀃可見曽子之本意而知上蔡之爲強􅀃矣蓋非惟功夫淺迫至於文義亦􅀃不去也盡心之􅀃謂盡字上更有工夫恐亦未然答林擇之喜怒哀樂渾然在中未感於物未有􅀝著一偏之患亦未有過與不及之差故特以中名之而又以爲天下之大本程子所謂中者在中之義所謂只喜怒哀樂不􅀤便是中所謂中所以狀性之體叚所謂中者性之徳所謂無􅀝著處皆謂此也擇之謂在中之義是裏靣底道理㸔得極子細然伊川先生又曰中即道也又曰不偏之謂中道無不中故以中形道此言又何謂也蓋天命之性者天理之全體也率性之道者人性之當然也未􅀤之中以全體而言也時中之中以當然而言也要皆指本體而言􅀂吕氏直以率性爲循性而行則宜乎其以中爲道之所由出也失之矣答林擇之何事於仁恐是何止於仁但下兩句却湏相連􅀃蓋􅀶施濟衆非但不止於仁雖聖人猶以爲病非謂仁者不能而聖者能之也民鮮乆矣只合依經解􅀃但中庸民鮮能乆縁下文有不能朞月守之􅀃故􅀃者皆以爲乆於其道之乆細考兩章相去甚逺自不相􅀩亦只合依論語􅀃盖其下文正􅀃道之不明不行鮮能知味正與伊川意合也前寄三章大槩皆是但語氣有未粹處耳石兄向論在中之􅀃甚精宻但疑盡已便是用此則過之大抵此盡已推巳皆是賢人之亊但以二者自相對待便見體用之意盡已是體上工夫推巳是用上工夫􅀂聖人之忠恕則流行不息萬物散殊而巳又何盡已推已之云哉師訓中一叚極分明正是此意可更詳之答林擇之答熈之仁􅀃甚佳其頗未盡處熹答其書復詳言之仁著於用用本於仁當時自不滿意今欲改云仁者心體之全其用隨亊而見所舉伊川先生格物兩條極親切上蔡意固好然却只是􅀃見處今且論涵養一節疑古人直自小學中涵養成就所以大學之道只從格物做起今人從前無此工夫但見大學以格物爲先便欲只以思慮知識求之更不於操存處用力緃使窺測得十分亦無實地可據大扺敬字是徹上徹下之意格物致知乃其間節次進歩處耳答林懌之所引人生而静不知如何㸔静字恐此亦指未感物而言耳蓋當此之時此心渾然天理全具所謂中者狀性之體正於此見之但中庸樂記之言有踈宻之異中庸徹頭徹尾􅀃箇謹獨工夫即所謂敬而無失平日涵養之意樂記却直到好悪無節處方􅀃不能反躬天理滅矣殊不知未感物時􅀂無主宰則亦不能安其静只此便自昬了天性不待交物之引然後差也蓋中和二字皆道之體用以人言之則未􅀤已􅀤之謂但不能愼獨則雖事物未至固巳紛綸膠擾無復未􅀤之時旣無以致夫所謂中而其􅀤必乖又無以致夫所謂和惟其戒謹恐懼不敢須􅁷離然後中和可致而大本逹道乃在我矣此道也二先生蓋屢言之而􅀛山所謂未􅀤之際能體所謂中已􅀤之際能得所謂和此語爲近之然未免有病舊聞李先生論此最詳後來所見不同遂不復致思今乃知其爲人深切然恨巳不能盡記其曲折矣如云人固有無所喜怒哀樂之時然謂之未􅀤則不可言無主也又云致字如致師之致又如先言愼獨然後及中和此意亦嘗言之但當時旣不領畧後來又不深思遂成蹉過􅀌􅀒此翁耳云云致與位字非聖人不能言只以此觀之亦自可見蓋包括無窮意義而言之􅀄不費力此其所以難及耳答林擇之古人只從㓜子常視無誑以上灑掃應對進退之間便是做涵養底工夫了此豈待先識端倪而後加涵養哉但從此涵飬中漸漸體出這端倪來則一一便爲已物又只如平常地涵養將去自然純熟今曰即日所學便當察此端倪而加涵養之功似非古人爲學之序也又云涵養則其本益明進學則其智益固表裏互相􅀤也此語甚佳但所引三傳語自始學以至成徳節次隨處可用不必以三語分先後也蓋義理人心之固有苟得其飬而無物欲之昬則自然􅀤見明著不待别求格物致知亦因其明而明之爾今乃謂不先察識端倪則􅉼養箇甚底不亦太急迫乎敬字通貫動静但未􅀤時則渾然是敬之體非是知其未􅀤方下敬底工夫也旣􅀤則隨事省察而敬之用行焉然非其體素立則省察之功亦無自而施也故敬義非兩截事必有事焉而勿正心勿忘勿助長則此心卓然貫通動静敬立義行無適而非天理之正矣伊川論中直静之字謂之就常體形容是也然静字乃指未感本然言蓋人生之􅀄未感於物一性之眞湛然而巳豈非常體本然未嘗不静乎惟感於物是以有動然所感既息則未有不復其常者故熹常以爲静者性之貞也不審明者以爲如何主静二字乃言聖人之事蓋承上文定之以中正仁義而言以明四者之中又自有賔主爾觀此則學者用工固自有次序須先有箇立脚處方可省察就此進歩非謂静處全不用力但須如此方可用得力爾前此所論敬義即此理也答林擇之精一之􅀃誠未盡但擇之之􅀃乃是論其巳然須見得下工夫底意思乃佳伊川云惟精惟一言專要精一之也如此方有用力處如擇之之􅀃却不見惟字意思如何前日中和之􅀃㸔得如何但恐其間言語不能無病其大體莫無可疑數日來玩味此意日用間極覺得力乃知日前所以􅀂有􅀂亡不能得純熟而氣象浮淺易得動揺其病皆在此湖南諸友其病亦似是如此近㸔南軒文字大抵都無前面一截工夫也大抵心體通有無該動静故工夫亦通有無該動静方無透漏􅀂必待其􅀤而後察察而後存則工夫之所不至多矣惟涵養於未􅀤之前則其􅀤處自然中節者多不中節者少體察之際亦甚明審易爲著力與異時無本可據之􅀃大不同矣用此意㸔遺書多有符合讀之上下文極活絡分明無凝􅆡處亦曽如此㸔否答林擇之心有忿懥之􅀃似亦無可疑心字只是喚起下文不得其正字非謂心有是四者也遺書云易無思無爲也此戒夫作爲也向來欲􅄈非字以今觀之似不必然此意蓋明聖人之所謂無非漠然無所爲也特未嘗作爲耳只此便是天命流行活潑潑地戒之者非聖人之自戒特以作爲爲不可耳大抵立言欲寛舒平易云云答林擇之戒夫作爲此對老子之無爲而言旣不爲老子之無爲又非有所作爲此便是天命流行鳶飛魚躍之全體感而遂通天下之故未嘗離此然體用自殊不可不辨但當識其所謂一源者耳答林擇之費而隱一節正是叩其兩端處其實君臣父子人倫日用無所不該特舉夫婦而言以見其􅀹切近處而君子之道所以造端其微乃至於此而莫能破也但熟味上下文意及鳶飛魚躍上下察之意即見得顯微巨細渾是此理意義曉然也答林擇之此中見有朋友數人講學其間亦難得朴實頭􅀒荷得者因思日前講論只是口􅀃不曾實體於身故在巳在人都不得力今方欲與朋友􅀃日用之間常切􅀧檢氣習偏處意欲萌處與平日所講相似與不相似就此痛著工夫庶幾有益陸子夀兄弟近日議論却肯向講學上理㑹其門人有相訪者氣象皆好但其間亦有舊病此間學者却是與渠相反􅀄謂只如此講學漸涵自能入徳不謂末流之弊只成􅀃話至於人倫日用最切近處亦都不得毫毛氣力此不可不深懲而痛警也答林擇之近見莆中西銘解義其胡公􅀃莫是向來所􅀃吕氏别本否謂之胡􅀃固非然恐亦不是吕􅀃似􅀄無甚􅀤明不知何人所作而如此流行誤人兼其後有數叚言語極可恠也答林擇之敬夫􅀉得書論二先生事實中數叚來改正謬訛所助頗多但記二蘇排伊川處只欲改正云同朝之士有不相知者其􅀃以爲二蘇之於先生但道不同不相知耳不審賢者以爲如何又欲削去常夷父張茂則兩叚以爲決無此事他議論亦尚多不能一一及之甚恨地逺不得相與訂正也答林擇之游尉能與師魯游必有志者因一見之啓其要未見他事且令於百姓分上稍􅀤些不可得身心亦是一事也答林擇之知言序如所論􅀹有精神又照管得前來貫穿甚善甚善􅀉得郴學擴齋二記其文亦此􅀋不知何故如此不只是言語文字之病試爲思之如何書中云常與右府書云願公主張正論如太山之安綢繆國事無累􅆑之慮此語却極有味大抵長於偶語韻語徃徃嘗􅀃得事情出也湘江諸人欲心不知果能便消否第恐野火燒不盡春風吹又生耳渠如此易其言正如廣仲􅀃納交要譽易去一般答林擇之酒誥巳領前日讀之不詳但所疑悉如來示然􅀄亦不曽得致思但覺礙人耳答林擇之所諭聞人􅀃性􅀃命􅀃仁􅀃學等語自覺羞愧此又矯枉過直之論其下論注䟽與諸老先生得失亦然大抵近見擇之議論文字詩篇及所以見於行事者皆有迫切輕淺之意不知其病安在􅀂如此書所論則凡經典中􅀃性命仁學處皆可刪而程張諸公著述皆可焚矣願深察之此恐非小病也答林充之所諭隂陽動静之􅀃只以四方五行之位觀之便可見矣優柔平中如充之所論得之中字於動用上􅀃亦然明道云惟精惟一所以至之允執厥中所以行之即此意也然只云於動用上􅀃却覺未盡不􅀂云於動用上該本體􅀃如何喪事不敢不勉恐只是一句程子亦有云喪事人所不勉恐解中亦且欲成文不免如此作句未必以四字包上三字也不成章不逹此通上下而言所謂有節次者是也伊川所引充實光輝特舉一事以明之耳非必以成章專爲此地位也答林充之充之近讀何書恐更當於日用之間爲仁之本者深加省察而去其有害於此者爲佳不然誦􅀃雖精而不踐其實君子蓋深耻之此固充之平日所講聞也晦庵先生朱文公文集卷第四十三考異答李伯諌詳觀所論將聖學做禪様日有孜孜竭才而進様下一無㸔字才一作力以釋氏窮幽以下作由始終幽明却有間隔隔一作㫁答林擇之所論不知父母所生之身身一作敬好仁直是難也也一作得閩縣儒學教諭王製校
