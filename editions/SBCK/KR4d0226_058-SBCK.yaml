body:
  text: 書知舊門人問答答張仁叔毅居敬行簡程子意與仲弓不同當以仲弓之言爲正不改其樂近􅁴集注克巳復禮之目說得未盡巳改作慱文約禮之序矣更思之所說不改其樂學者不能躐進唯子貢之無謟可爲此語有病可并思之孟之反一叚所說支離非聖人本意約之以禮禮字便作理字㸔不得正是持守有節文處克巳復禮之禮亦然醫書不仁之說所論得之但亦湏實見此理不可只如此􅀃過也用之則行則字之意恐不如此富不可求此章之意但方言其不可求耳未遽及夫求之而得禍也兩意雖畧相似而大不同可更審之君子所貴乎道者三􅀂如此􅀃則道與物爲二矣况其文義本不如此集註說得甚明可更詳之霍光臨大節亦大有虧欠處耐乆行逺之說得之但不知如何見得仁以爲巳任之重仁是何物又如何其任也可更思之一易􅄪易之說問之果然或恐中原地羙其􅇤土亦勝此間之膏􅃾也什一之法傳於今者大畧如此其詳則不可得而知矣以孟子考之野九一而助國中什一使自賦其輕重又不同而考之周禮則行助法處有公田而行貢法處無公田也孟子集注中似巳言其大畧可更詳之此等亦難卒曉須以周禮爲本而參取孟子班固何休諸說訂之庶㡬可見髣髴然恐終亦不能有定論也但不可不盡其異同耳粟一石值錢三十文一􅀊而止用錢三百可見古來錢重然其賣買皆然則人亦不以爲病也其他盖不可考云李悝百畆而收百五十石者粟也鼂錯百畆而收不過百石者似恐是米然則其多少固自有不同耳所論律吕恐㸔得未子細須作一圖子分定十二律之位却於中間空處别用􅁓作一小輪子寫五聲之位當心用􅁓條穿定令可輪轉􅁍依通典十二律之均逐一認定分别正聲子聲則自見得次序分明不可只如此空說也盖正聲是全律之聲如黄鐘九寸是也子聲是半律之聲如黄鐘四寸半是也一均之内以宫聲爲主其律當最長其啇角徵羽之律􅀂短即用正聲或有長者則只可折半用子聲此所謂一均五聲而分正聲子聲之法也十二律旣自有正聲又皆有子聲以待十二均之用所謂黄鐘太吕太簇無子聲以其一均之内啇角徴羽四聲皆短於本律故也􅀂以中吕爲宫則黄鐘爲徴而當用子聲矣􅀂以􅅋賔爲宫則大吕爲徵而當用子聲矣􅀂以林鐘爲宫則太簇爲徴而當用子聲矣此十二律所以皆有子聲也試更用此推之當自曉得不然即須面論乃可通也所論三月不違仁人之生也直先難後􅀗齊魯之變中庸之徳􅀶施濟衆默而識之徳之不脩志於道四教仁逺等章􅀃皆得之然亦更冝詳味答楊仲思來喻仁說似亦未􅉷如云仁以行之則心無不一此語甚有病又云無思無慮之時毎加提省此亦非是所謂敬者只是要專一耳􅀄不偏在静處也又聞尊丈逺出不知是徃何許尊年獨旅恐非所宜爲子弟者當有以代其勞也漳州陳安卿書來甚長進不易得也答楊仲思所論仁字大意得之更宜子細就此玩味庶㡬漸次簡㓗分明仍就實處加功勿令間斷乃實爲巳物耳不然辨折雖精無益於得也答楊仲思前書所問數條皆大義也但字義同異之間分别未明故難􅑈曉今但㸔横渠形而後有氣質之性善反之則天地之性存焉一叚將此兩箇性字分别自生之謂性以下凢說性字者孰是天地之性孰是氣質之性則其理自明矣公仁之說亦是如此公則無情仁則有愛公字屬理仁字屬人克巳復禮不容一毫之􅀻豈非公乎親親仁民而無一物之不愛豈非仁乎以此推之意亦可見答楊仲思所示疑義􅀂據易文即艮其背即是止其所之義而伊川說作兩般恐非經之本指然其言止欲於無見乃非禮勿視勿􅃪之義於學者亦不爲無用更思之答謝成之熹病老益衰今年􅀹甚亦理之常無足恠者况身外之悠悠又可復置胷中耶所恨聞道旣晚而行之不力上無以悟主聽下無以變時習而使斯文蒙其黮闇是則不能無愧於古人耳所示二典說大槩近似目昏尚未及細看此中今年絶無來學者只邵武一朋友見編書說未備近又遭喪俟其稍定當招來講䆒亦放詩傳作一書彼編所㸔後篇得接續􅀉來􅀹幸恐當有所􅂇耳但三山林少頴說亦多可取乃不見編入何耶李氏說爲誰其論放勛字義與林說正相似又以欽哉爲戒􅅚二女之詞則正與鄙意合也盖女于時觀厥刑于二女皆堯語其下云􅁵降二女于嬀汭嬪于虞乃是史記其下嫁二女於嬀水而爲婦於虞氏於是堯戒以欽哉正如所謂必敬必戒者乃叙事之體也自孔傳便以女于時以下爲史官所記故失其指耳諸詩亦佳但此等亦是枉費功夫不切自巳底事􅀂論爲學治巳治人有多少事至如天文地理禮樂制度軍旅刑法皆是著實有用之事業無非自巳本分内事古人六藝之教所以游其心者正在於此其與玩意於空言以校工拙於篇牘之間者其損益相萬萬矣􅀂但以詩言之則淵明所以爲高正在其超然自得不費安排處東坡乃欲篇篇句句依韻而和之雖其髙才合揍得著似不費力然巳失其自然之趣矣况今又出其後正使能因難而見竒亦豈所以言詩也哉東坡亦自曉此觀其所作黄子思詩序論李杜處便自可見但爲才氣所使又頗要驚俗眼所以不免爲此俗下之計耳答黄道夫天地之間有理有氣理也者形而上之道也生物之本也氣也者形而下之器也生物之具也是以人物之生必禀此理然後有性必禀此氣然後有形其性其形雖不外乎一身然其道器之間分際甚明不可亂也􅀂劉康公所謂天地之中所謂命者理也非氣也所謂人受以生所謂動作威儀之則者性也非形也今不審此而以䰟􅷠􅀑神解之則是指氣爲理而索性於形矣豈不誤哉所引禮運之言本亦自有分别其曰天地之徳者理也其曰隂陽之交􅀑神之㑹者氣也今乃一之亦不審之誤也詩曰天生烝民有物有則周子曰無極之真二五之精妙合而凝所謂真者理也所謂精者氣也所謂則者性也所謂物者形也上下千有餘年之間言者非一人記者非一筆而其􅀃之同如合符契非能牽聮配合而強使之齊也此義理之原學者不可不察答黄道夫示喻性氣之􅀃甚善但則者人之所以循乎天循字恐未安盖則之一字方是人之所受乎天者至於所謂飬之以福乃所謂循乎天耳西銘天地之塞似亦著擴充字未得但謂充滿乎天地之間莫非氣而吾所得以爲形骸者皆此氣耳天地之帥則天地之心而理在其間也五行謂水火木金􅁟耳各一其性則爲仁義禮智信之理而五行各專其一人則兼備此性而無不善及其感動則中節者爲善不中節者爲不善也答李子能亢宗累承喻及爲學之意甚善甚善但如此用力頭緒太多令人紛擾無進歩處故程先生說􅆂飬須是敬進學則在致知􅀂只於此用力自然此心常存衆理自著日用應接各有條理矣近思録前三四卷專說此事近修定大學解亦說得此次第分明近思必巳有之大學今徃一本可細考之依此節次做一兩年功夫自當見得門路立得根本也陳後之持守見識皆不易得不知今年曽復來城中否與之講貫當有􅀷益劉叔文守得亦好但未知後來所見如何耳爲學十分要自巳著力然亦不可不資朋友之􅂇要在審取之耳朱飛卿逺來見此相聚但亦苦多病未嘗不相與談及子能也答陳廉夫示喻縷縷足詔雅意但爲學功夫不在日用之外檢身則動静語黙居家則事親事長窮理則讀書講義大抵只要分别一箇是非而去彼取此耳無他玄妙之可言也論其至近至易則即今便可用力論其至急至切則即今便當用力莫更遲疑且随􅀷淺用一日之力便有一日之效到有疑處方好㝷人啇量則其長進通逹不可量矣􅀂即今全不下手必待他日逺求師友然後用力則目下蹉過却合做底親切功夫虗度了難得底少壯時節正使他日得聖賢而師之亦無積累慿藉之資可受鉗錘未必能真有益也答陳叔向葵去􅀊南逰幸遂旣見之􅂅别後怱怱踰年欲致一書未暇而便至竟辱先施感愧不可言示喻學者不能身踐而䳱於空言此誠今世莫大之患然亦不善讀書者之咎耳書之設豈端使然哉大抵聖贒之教無一言一句不是入徳門戸如所謂禮樂不可斯須去身者􅀹爲􅀷切眞當佩服存省以終其身不但後學也但道體無盡人見易偏内外本末又不可不兼舉此亦所當知耳答舒提幹示喻兩條􅀷荷發藥偶奉祠已得請姑爲辟色辟言之計蕃固之禍恐亦正坐不能知難而退耳所刻二書􅀼意賢者於鄭注吕􅀃之云猶有未􅀷考者􅂅少加詳焉而摭其義理之不合者復以見教則幸甚幸甚答顔子夀鑄昨辱枉顧并示長書具悉雅意但君子行身自有法義固不求於苟異亦不期於必同至於行道濟時用舎行藏又有非人力所能必致者聖賢之教歴歴可考如賢者之所論是乃謀利計功之意非熹之所敢聞也大率近世此說甚熾人心不正而習俗不羙正坐此耳􅂅更思之毋爲卒䧟溺也答邊汝實所欲言者不過前夕然亦非謂全然不事其心但資次等級未應遽爾超躐湏物格知至然後意可誠心可正耳答李次張承留意七篇之指想􅀷有所契義利之際固當􅀷明而力辨然伊洛發明未接物時主敬爲善一叚功夫更湏精進乃佳不爾㡬無所据以審夫義利之分也試以此質之南軒當亦以爲然耳答方平叔銓伏承逺貽書劄禮意甚勤而所以教誨責望之者甚至熹愚不肖懼不足以當也顧獨惟念自省事來聞師友之訓讀聖人之書觀其教人不過講學修身以全其所受於天者出爲世用則随其大小推吾之所有以及人至於用與不用合與不合則直任之蓋未嘗以是必於人亦未嘗以是變於巳以此自信誓將終身由之而不自知其力之果足以有至焉否也今讀來教其觀於當世之變詳矣然諰諰然常有憂其不合而必於求合之意其責君子也巳詳其狥小人也巳甚是雖憂世之心甚􅀷而古之聖賢非不憂世者其規模氣􅁚似或不如此也孟子曰人病舎其田而耘人之田所求於人者重而所以自任也輕其論狂狷郷原之得失以及君子反經之意􅀹所謂深切而著明者孔子亦曰古之學者爲巳今之學者爲人有志之士􅀷省乎此亦足以判然無疑於舜蹠之間矣不審明者以爲如何答王欽之承喻編次程書以􅀋相從此亦用功之一端􅀂求之於此而驗之於日用思慮作爲之間玩索操存無所偏廢則窮理居敬之功交相爲助而兩造其極矣玩物䘮志之戒乃爲求多聞而不切巳者發遺書又有不可外靣只務泛觀物理正如㳺􅀐無所歸之說亦爲此耳至於義理雖明而踐履不至者則亦多端或是知之未􅀷或是行之不力或是氣質之偏有難化處在彼誠爲累徳然在我觀之但當内自警省不使加乎其身而不可以此遽起輕視前輩之心且疑講學之無益也因下問之及輙效其愚未知中否有未當者却望垂喻答王欽之所須問目􅀼謂不必如此但取一書從頭逐叚子細理㑹乆之必自有疑有得􅀂平時泛泛都不著實循序讀書未說義理不精且是心緒支離無箇主宰處與義理自不相親又無積累功夫參互考證驟然理㑹一件兩件􅀂是小小題目則不足留心擇其大者又有躐等之弊終無浹洽之功非區區所以望於尊兄者故不敢承命浼聞但􅂅頗采前說而以論語爲先一日只㸔一二叚莫問精粗難易但只從頭㸔將去讀而未曉則思思而未曉則讀反復玩味乆之必自有得矣近年與朋友商量亦多以此告之然未見有㸔得徹尾者人情喜新厭常乃如此甚可歎論語二十篇尚不耐煩㸔得了况所謂死而後巳者又豈能辨如此長遠功夫耶答王欽之來書謂窮理不必泥古人言句固是也然亦豈可盡捨古人言句哉程夫子曰窮理亦多端或讀書講明道理或論古今人物别其是非或應事接物求其當否皆窮理也夫講道明理别是非而察之於應接事物之際以克去巳私求夫天理循循而進無迫切陵節之弊則亦何患夫與古人背馳也􅀂欲盡捨去古人言句道理之不明是非之不别泛然無所决擇雖欲惟出處語黙之察譬之􅆘越者不知東西南北之殊而僕僕然奔走於途其不北入燕則東入齊西入秦耳答胡平一元衡白鹿聞極留念甚善甚善所謂時文之外别無可相啓發者語似過謙此亦在夫爲之而巳豈真有限隔而不容一窺其門戸哉所喻三代正朔之說舊嘗疑此而􅀷䆒之卒至於不可稽考而益重其所疑因置不論今讀來喻考究雖詳然反復再三亦未有以釋所疑也如云周家記年必首十一月而春秋乃書春正月又云未嘗改月號以冬爲春假夏月而亂周典則未知春秋所謂春正月者其下所書之事爲建子月之事耶建寅月之事耶􅀂云建子月事則春正月者豈非改月號而以冬爲春􅀂云建寅月事則是用夏正月而亂周典矣安得云未嘗云云如是耶前人盖巳見此不通故爲胡氏之學者爲之說曰春正月者夫子意在行夏之時而以建寅之月爲歳首也其下所書之事即建子月之事無其位而不敢自專也如此則或可以不礙然春秋所書之月逐與月下之事常差兩月則恐聖人作經又不􅀂是之紛更多事也凢此之􅀋反復推􅀃儘有可通亦儘有可難雖嘗遍問前輩亦未有决然堅定不可移之說􅀼謂讀書凢􅀂此􅀋與其求必通而䧟於鑿且又虚費日力而無􅀘於日用切巳之功則似不􅀂闕之之爲愈也􅀂夫所謂日用切已之功則聖賢言之詳矣其在大學論語中庸孟子者文義分明指意平實讀之曉然如見父兄說門内事無片言半詞之可疑者什八九也􅂚爲不少置其心於此而必用意於彼之﨑嶇哉因書附報偶及於此幸明者有以察之也答楊志仁璹示諭不省所謂然不知賢者之所爲學者欲得之於巳耶欲見􅁛於人耶觀此用心灼見差誤請便就此推究來歷痛與掃除乃爲格物之實耳不然此心外馳不著自巳徒然誦說恐無所益也答楊志仁兩書所喻存飬工夫甚喜甚慰固知他人不能如此著實用工但此亦是依本分事正不湏把來作竒特想只合趂此心地明净處大著胷懐將世間道理精粗表裏從頭至尾理㑹一畨交他真箇通透無疑礙處方是向進􅀂只守此些箇不敢放開毎㸔義理亦只㨂取玄妙高逺無形無􅁚處方肯理㑹如此則遂成偏枯倒向一邊將爲有體無用之學而與老佛無以異矣所論理氣先後等說正坐如此怕說有氣方具此理恐成氣先於理何故却都不㸔有此理後方有此氣旣有此氣然後此理有安頓處大而天地細而螻蟻其生皆是如此又何慮天地之生無所付受耶要之理之一字不可以有無論未有天地之時便巳如此了也張子說得費力惟是太極通書數章說得極分明熹解得又極分明可更子細㸔便自見得也浩然之氣􅀂㨿孟子所言即合儘就粗處㸔不湏如明道先生之􅀃􅀂欲理會明道先生說底則亦只合就日用間巳身上回頭識取不須如此說作費力也日月至焉􅀂􅀃顔子即誠不可如此說今旣明言回也其心三月不違其餘則但能如此則其工夫䟽宻乆近較然可見何爲而復有此疑耶且曰非夲文之義則未知以本文之義爲當如何耶至徳之論又更難言論語中只有兩處一爲文王而發則是對武王誓師而言一爲㤗伯而發則是對太王翦啇而言􅀂論其志則文王固髙於武王而泰伯所處又髙於文王􅀂論其事則泰伯王季文王武王皆處聖人之不得巳而㤗伯爲獨全其心表裏無憾也不然則又何以有武未盡善之嘆且以夷齊爲得仁耶前此諸儒說到此處皆爲愛惜人情宛轉回護不敢窮究到底所以更不敢大􅄏口說令人胷次憒憒自欺自誑此病不小想賢者􅀹當疑駭未敢以爲然也然當更思之􅀂信未及即且放下向後時時提起略一審玩便自見得也通老聞欲見訪顒俟其來不及作書因見煩爲致意然又恨志仁有書社之守不能偕來爲不滿耳答徐子融昭然所論浩氣甚善甚善大率子融志氣剛决故所見亦如此痛快直截無支離􅆞繞之弊更􅂅益加詳審專就平實親切處推究體認乆當有以自信不爲髙談虚見所移奪也見正叔說向得曽參多一唯之句􅀷有契合此正是大病今只此一唯尚且理㑹不得如何欲更向他頭上過去也答徐子融子融志趣操守非他人所及但苦從􅀄心不向裏故雖稠人廣坐閉眉合眼而實有矜能異衆之心非不讀書講義而未嘗潜心黙究剖析精㣲但㨿一時所見粗淺意思便立議論說來說去都無意味枉費筆舌如向來所論雞抱夘事才郷便取僧言以爲至當而不究彼之所事與吾不同之實固爲踈畧而子融力攻其失乃不於此著眼而支離蔓衍但言雞不合抱夘而不知檢􅀧其所抱之非夘凢皆􅀋此全不子細只向外走自巳分上了無所得故中間數爲賢者言之所謂向外非謂子融不能閉眉合眼也想子融自恃有此便謂巳能向裏而人不知故心不服而有北門之辨至於詞氣俱厲殊駭觀聴然味其言如所謂無􅀑神無釋氏者皆無義理夫􅀑神二字著於六經而釋氏之說見行於世學者當講究識其真妄􅀂不識得縱使絶口不談豈能使之無邪子融議論粗率不精大率􅀋此􅀂是果能向裏思量分别詳細豈至此耶今詳來書所謂觀書究義反身順理攻其惡毋攻人之惡者依舊是錯認話頭􅀂只似日前做功夫即所究之義所順之理所攻之惡皆恐未真實也且講論是非正爲自家欲明此理不是攻人之惡􅀂理會得是於自家分上儘有得力處􅀂㸔錯了即終日閉口不别是非剗地不是矣此盖日前窮理未精便自主張得重又爲不勝巳者妄相尊獎致得自處太髙將義理都低㸔淺㸔了今􅀂覺悟須且虚心退後審細辨認令自巳胷中了然不惑庶㡬有進歩處耳答徐子融有性無性之說殊不可曉當時方叔於此本自不曽理㑹率然躐等㨂難底問熹􅀂照管得到則於此自合不答且只教他子細熟讀聖賢明白平易切實之言就巳分上依次第做功夫方有益於彼而我亦不爲失言却不合随其所問率然答之致渠一向如此狂妄此熹之罪也駟不及舌雖悔莫追然旣有此話頭又不容不結末今試更爲諸君言之􅀂猶未以爲然則亦可以忘言矣伊川先生言性即理也此一句自古無人敢如此道心則知覺之在人而具此理者也横渠先生又言由太虚有天之名由氣化有道之名合虚與氣有性之名合性與知覺有心之名其名義亦甚宻皆不易之至論也盖天之生物其理固無差别但人物所禀形氣不同故其心有明暗之殊而性有全不全之異耳􅀂所謂仁則是性中四徳之首非在性外别爲一物而與性並行也然惟人心至靈故能全此四徳而發爲四端物則氣偏駁而心昏蔽固有所不能全矣然其父子之相親君臣之相統間亦有僅存而不昧者然欲其克巳復禮以爲仁善善惡惡以爲義則有所不能矣然不可謂無是性也􅀂生物之無知􅁴者則又其形氣偏中之偏者故理之在是物者亦随其形氣而自爲一物之理雖􅀂不復可論仁義禮智之彷彿然亦不可謂無是性也此理甚明無難曉者自是方叔暗昧膠固不足􅀷責不謂子融亦不曉也至引釋氏識神之􅀃則又無干渉盖釋氏以虚空寂㓕爲宗故以識神爲生死根本􅀂吾儒之論則識神乃是心之妙用如何無得但以此言性則無交渉耳又謂枯槁之物只有氣質之性而無本然之性此語􅀹可􅀏􅀂果如此則是物只有一性而人􅁍有兩性矣此語非常醜差盖由不知氣質之性只是此性墮在氣質之中故随氣質而自爲一性正周子所謂各一其性者向使元無本然之性則此氣質之性又從何處得來耶况亦非獨周程張子之言爲然如孔子言成之者性又言各正性命何嘗分别某物是有性底某物是無性底孟子言山之性水之性山水何甞有知􅁴耶􅀂於此㸔得通透即知天下無無性之物除是無物方無此性􅀂有此物即如來喻木燒爲􅁅人隂爲土亦有此􅁅土之氣旣有􅁅土之氣即有􅁅土之性安得謂枯槁無性也又如狹其性而遺之以下種種恠􅀃􅀹爲可􅀏今亦不暇細辯但請虚心静慮詳味此􅀃當自見得如㸔未透即且放下就平易明白切實處玩索􅆂飬使心地虚明乆之須自見得不須如此信口信意馳騁空言無益於巳而徒取易言之罪也如不謂然則請子融方叔自立此論以爲宗㫖熹亦安能必二公之見從耶至於易之說又别是一事今於自巳分上見成易曉底物尚且理㑹不得何暇及此當俟異日心虚氣平萬理融徹㸔得世間文字言語無不通逹始可細細啇量耳此等􅀂理會不得亦未妨事且闕所疑而徐思之不當便如此咆哱無禮也答徐子融熹今年一病㡬至不可支吾午節後方能強起比前一二年㡬似争十年氣血矣老境如此無足恠者亦有朋友十數人在此相聚絶少得頴悟懇切者前日病中猛省亦不可全責學者􅀷自恐懼今幸稍蘇更當益加䇿勵庶㡬不􅀒所以來之意但恨相去差逺不得子融爲之表率使相觀而善耳前書所論方叔之說大槩巳是但其末云性有昏明則又將性作知􅁴㸔矣試更思之如何答宋􅀷之之源熹徃者入城幸一再見雖人事怱怱未得欵語然巳足以自慰矣别後不得奉問積有馳情茲辱惠書􅀗聞比日侍奉佳慶進學有日新之功􅀹以忻沃經史諸說足見玩埋修辭之意可爲後生讀書之法屬以病目方讀得一二篇其詞氣􅀷慱而義理通暢甚可喜也異時益求勝巳之友相與講明古人爲巳之學而力行之則其所進當有不止於此者矣三聖相授允執厥中與孟子所論子莫執中者文同而意異盖精一於道心之㣲則無適而非中者其曰允執則非徒然而執之矣子莫之爲執中則其爲我不敢爲楊朱之􅀷兼愛不敢爲墨翟之過而於二者之間執其一節以爲中耳故由三聖以爲中則其中活由子莫以爲中則其中死中之活者不待權而無不中中之死者則非學乎聖人之學不能有以權之而常􅆘於中也權者權衡之權言其可以􅁛物之輕重而㳺移前郤以適於平盖所以節量仁義之輕重而時措之非如近世所謂將以濟乎仁義之窮者也至於孔孟言性之異則其說又長未易以片言質然略而論之則夫子雜乎氣質而言之孟子乃專言其性之理也雜乎氣質而言之故不曰同而曰近盖以爲不能無善惡之殊但未至如其所習之逺耳以理而言則上帝之􅑙裏人心之秉彛􅀄豈有二理哉但此理在人有難以指言者故孟子之告公都子但以其才與情者明之譬如欲觀水之必清而其源不可到則亦觀諸流之未逺者而源之必清可知矣此二義皆聖賢所罕言者而近世大儒如河南程先生横渠張先生嘗發明之其􅀃甚詳具在方􅉺者今倉司所印遺書即程氏說而張氏之書則蜀中自有版夲不知亦嘗考之否熹自十四五時得兩家之書讀之至今四十餘年但􅁴其義之􅀷指之逺而近世紛紛所謂文章議論者殆不足復過眼信乎孟氏以來一人而已然非用力之􅀷者亦無以信其必然也舊嘗擇其言之近者别爲一書名近思録今徃一通了翁責沈墨刻亦可見前輩師友源流併以奉􅀉幸細讀之有疑復見告也令弟叔季詩易之說亦甚詳明區區所望盖不殊前之云也答宋􅀷之且附去大學中庸本大小學序兩篇幸視至大學當在中庸之前熹向在淅東刻本見爲一編恐勾倉尚在彼可就求之此三本者昆仲且分讀也近年學者多不讀書見昆仲篤志如此甚不易得所恨相聚之晚不得盡􅄍腹心前日臨岐不勝忡悵然講學貴於實見義理要在熟讀精思潜心玩味不可貪多務得搜獵敷衍便爲究竟也二序侍次畧爲呈白恐有指摘處便中幸喻及也答宋􅀷之大學是聖門最􅀄用功處格物又是大學最􅀄用功處試考其說就日用間如此作功夫乆之意思自别見得世間一切利欲好樂皆不足以動心便是小小見効處也荀楊言性得失忘記前語首尾云何然此等處􅀂於自已分上見得分明則亦不待人言自然見得矣但恐讀書之時無爲巳之意只欲以資口耳作文字即意思浮淺㸔他義理不出也答宋􅀷之示喻知止之說足見留意然所謂止乃萬物各有定理之謂要在格物窮理乃可知之知之不疑然後此心有定而可以應物非強遏而力制之也格物功夫前書巳􅄪録去然亦未盡旦夕當再寫一本去也前本千萬且勿示人㸔令有疑處乃有進處耳科舉事業􅀄無高論賢者俯就盖有餘力旣知有命之說則日用之間内外本末不須作兩截㸔必先了此然後及彼也戴監廟乆聞其名講學從容必有至論季随允升相聚各有何說因來一一録示庶知彼中進學次第也答宋􅀷之示喻大學所疑巳悉格物無傳爲有闕文章句巳詳言之卒章是推治國之道以平天下文意甚明亦已詳說不知何故尚以爲疑豈讀之未熟耶更宜玩味不厭煩復則自分明矣格物致知是大學第一義脩巳治人之道無不從此而出終身要得受用豈是細事來喻乃欲不勞而俟其自格一何言之易耶近世學者氣輕質薄不耐持乆每以欲速之心懐徼幸躐等之望又有科舉世俗之學以奪其志所以常􅀂有所驅脅迫逐而不睱從容以及乎有成也答宋􅀷之所喻大學以格物爲先此得之矣但以致知爲致其所以格物而謂格物爲及人及物之事則似於文義殊未詳也向來寫去大學說其間固未盡善近巳復多改更然其所載程先生說此二處文理極分明又并功夫節次一時俱盡不知何故㸔得如此草率􅀼意此病從平日科舉之學壊了心術致得如此適答子容書巳極言之矣孔子曰古之學者爲巳今之學者爲人程先生日爲巳者欲得之於巳也爲人者欲見知於人也又曰女爲君子儒無爲小人儒程先生曰君子儒爲巳小人儒爲人此是古今學者君子小人之分差之毫􅁵繆以千里處切宜審之答宋􅀷之示喻爲學之意益以精專而兄弟相勉見於詩什􅀷慰老懐又知更有蘇范諸賢相與切磋􅀹以爲喜所問持飬觀書之說前此講之巳詳約而言之持飬之方不過敬之一字而讀書則世間無一事是不合知者但要循序量力而進耳五峯之書知言爲精然其間亦不能無小小可議處其他徃徃又不能及故向來敬夫不欲甚廣其傳今想廣仲之意恐亦有所難言者非靳惜也南軒文此間鏤版有兩本其一熹爲序者差不雜黄州亦有官本篇秩􅀹多然多是少作可恨也此間本無見存者不及􅀉去後得之當别附便耳然讀書要須辨得精粗得失乃於巳分有益􅀂但泛然㸔過即枉費功力矣韓子於道見其大體規模極分明但未能究其所從來而體察操履處皆不細宻其排佛老亦據其所見而言之耳程先生說西銘乃原道宗祖此言可以推其淺深也近似之說固應辨析以暁未悟然須自見得巳分上道理極分明然後可以任此責如其未然而欲以口舌校勝􅀒恐徒起紛競之端而卒無益於道術之明暗也孟子論郷原亂徳之害而卒以君子反經爲說此所謂上䇿莫如自治者况異端邪說日増月益其出無窮近年􅀹甚盖有不可勝排者惟吾學旣明則彼自㓕熄耳此學者所當勉而不可以外求者也澤之容之不及别狀意不殊前相望數千里會見無期惟千萬力學自愛答宋容之之汪所喻讀書未能有疑此􅀄學之通患盖縁平日讀書只爲科舉之計貪多務得不暇子細慣得意思長時忙迫凢㸔文字不問精粗一例只作如此渉獵如東坡易解乾卦中說性命繫辭中說道處數章及頴濵解盂子浩然之氣處皆是比􅁼無一字成言語今當􅀷以此事爲戒洗滌淨盡别立規模將合㸔文字擇其􅀹精而最急者且㸔一書一日随力且㸔一兩叚俟一叚巳曉方換一叚一書皆畢方換一書先要虗心平氣熟讀精思令一字一句皆有下落諸家注解一一通貫然後可以較其是非以求聖賢立言之本意雖巳得之亦且更如此反復玩味令其義理浹洽於中淪肌浹髓然後乃可言學耳只如所論大學以正心誠意爲本此便是不子細處且請試考經文正心誠意致知格物何者爲先後耶其他如好樂苟善不害於正之說必有事焉而勿正心之說敬必以誠爲先之說亦互有得失但終是本領未正未容輕議便使一一剖析將去亦恐未必有益可且就此三四義上子細思索勿正心即更㸔古注及諸先生說後便見喻爲佳就此反復殊勝泛論也大抵科舉之學誤人知見壊人心術其技愈精其害愈甚正恐前日所從師友多是只得此流今以上來諸說求之則比所聞於石鼓者恐亦未免於此也答宋澤之自頃人還辱書之後不能再致問訊㝷有臨漳之􅃥道里益逺音問益難通徒增悵想而巳今春不幸長子䘮亡哀痛不堪亟請祠以歸行過三山始遇來使并領書五通乃知先丈􅀰中巳遂窀穸之奉及前此遣人與今再遣曲折備見昆仲顯親傳逺之意悠乆誠􅃀有人所甚難者又不勝其悲歎也即此盛夏雨寒逺惟侍奉佳福銘文之喻昨承喻及極知不能然念先契之厚固巳心許乆矣今兹人來適此禍難􅀄意决不能辦欲且遣還來人俟向後稍間爲之别㝷的便附去旣而思之昆仲越數千里而來求銘再遣使而後得逹此意巳不可􅀌向後因循未必得償此諾則何以見先丈於地下遂留來人随至建陽輟哀排冗亟爲草定繕寫封内但鄙拙不文無以發揮行治之實而事狀所載亦有不能悉書者一則志􅃺之體詳畧自應不同二則慮其欲益而反損如所記未第時事之􅀋三則病其頗渉於神恠此三說者更望髙明有以察之也今且寫得一本旦夕事定别抄數本􅀉都下託范文叔發遞附便必可逹也及承深之遂承遺澤即登仕版以究先公欲行未盡之志而澤之容之亦將讀書求志以承家學之傳此皆區區之所深望而垂問勤􅈤又見不自滿足之意但千里逺書難盡心曲今且以其大者言之大抵今之學者之病最是先學作文干禄使心不寜静不暇深究義理故於古今之學義利之間不復能察其界限分别之際而無以知其輕重取捨之所宜所以誦數雖慱文詞雖工而抵以重爲此心之害要須反此然後可以議爲學之方耳向者盖亦屢嘗相爲道此然􅁴賢者意中未甚明了終未兔以文字言語爲功夫聲名利禄爲歸極今以所述事狀觀之亦可驗其不誣矣􅀂諸賢者果以愚言為不謬則􅂅且以定省應接之餘功收拾思慮完養精神暫置其所巳學者勿令洶湧鼓發狂閙却於此處深察前所謂古今之學義利之間粒剖銖分勿令交互則其輕重取舎之極自當判然於胷中不待矯拂而趣操自分聖學之門庭始可以漸而推㝷矣此是學者立心第一義此志先定然後脩巳治人之方乃可决擇而脩待耳人還無以爲意臨漳所刻諸書十餘種謾見逺懐書後各有題䟦見所爲刻之意近思録比舊本増多數條如買櫝還珠之論􅀹可以警今日學者用心之繆家儀鄊儀亦有􅀘於風教幸勿以爲空言而輕讀之也答陳器之所示四條第一第三兩條得之但以公爲仁似未精伊川先生明言仁道難言惟公近之非以公便爲仁又云公而以人體之故爲仁􅀼詳此意公之爲仁猶言去其壅塞則水自通流然便謂無壅塞者爲水則不可更以此意推之可見仁字下落也又中之爲義固非專爲剛柔相半之謂然當剛則剛當柔則柔當剛柔相半則相半亦皆自有中也試更思之如何答陳器之問玉山講義性是太極渾然之體本不可以名字言但其中含具萬理而綱理之大者有四故命之曰仁義禮智孔門未嘗備言至孟子而始備言之者盖孔子時性善之理素明雖不詳著其條而􅀃自具至孟子時異端蠭起徃徃以性爲不善孟子懼是理之不明而思有以明之苟但曰渾然全體則恐其如無星之秤無寸之尺終不足以曉天下於是别而言之界爲四破而四端之說於是而立盖四端之未發也雖寂然不動而其中自有條理自有間架不是儱侗都無一物所以外邊纔感中間便應如赤子入井之事感則仁之理便應而惻􅀮之心於是乎形如過廟過朝之事感則禮之理便應而恭敬之心於是乎形盖由其中間衆理渾具各各分明故外􅁁所遇随感而應所以四端之發各有靣貌之不同是以孟子析而爲四以示學者使知渾然全體之中而粲然有條􅀂此則性之善可知矣然四端之未發也所謂渾然全體無聲臭之可言無形􅁚之可見何以知其粲然有條如此盖是理之可驗乃依然就他發處驗得凢物必有本根性之理雖無形而端的之發最可驗故由其惻隱所以必知其有仁由其羞惡所以必知其有義由其恭敬所以必知其有禮由其是非所以必知其有智使其本無是理於内則何以有是端於外由其有是端於外所以必知有是理於内而不可誣也故孟子言乃􅀂其情則可以爲善矣乃所謂善也是則孟子之言性善盖亦遡其情而逆知之耳仁義禮智旣知得界限分曉又須知四者之中仁義是箇對立底􅀜鍵盖仁仁也而禮則仁之著義義也而智則義之藏猶春夏秋冬雖爲四時然春夏皆陽之屬也秋冬皆隂之屬也故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義是知天地之道不兩則不能以立故端雖有四而立之者則兩耳仁義雖對立而成兩然仁實貫通乎四者之中盖偏言則一事專言則包四者故仁者仁之本體禮者仁之節文義者仁之斷制智者仁之分别猶春夏秋冬雖不同而同出乎春春則春之生也夏則春之長也秋則春之成也冬則春之藏也自四而兩自兩而一則綂之有宗㑹之有元矣故曰五行一隂陽隂陽一太極是天地之理固然也仁包四端而智居四端之末者盖冬者藏也所以始萬物而終萬物者也智有藏之義焉有終始之義焉則惻􅀮羞惡恭敬是三者皆有可爲之事而智則無事可爲但分别其爲是爲非爾是以謂之藏也又惻􅀮羞惡恭敬皆是一靣底道理而是非則有兩靣旣别其所是又别其所非是終始萬物之􅁚故仁爲四端之首而智則能成始能成終猶元氣雖四徳之長然元不生於元而生於貞盖由天地之化不翕聚則不能發散理固然也仁智交際之間乃萬化之機軸此理循環不窮脗合無間程子所謂動静無端隂陽無始者比也答葉味道賀所喻旣祔之後主不當復于􅃦此恐不然向見陸子静居母䘮時力主此說其兄子夀疑之皆以書來見問因以儀禮注中之說告之渠􅀄乃不曽細㸔而率然立論及聞此說遂以爲只是注說􅀄非經之本文不足据信當時嘗痛闢之考訂甚詳且以爲未論古禮如何但今只如此卒哭之後便除靈席則孝子之心豈能自安邪其後子夀書來乃㐲其謬而有他日􅀒荆之語今偶不見當時徃還舊牘因更以他書考而論之如大戴禮諸侯遷廟篇云君及從者皆玄服則是三年大祥之後旣除䘮而後遷矣其詞但告遷而不言祔則是旣祔之後主復于􅃦而至此方遷于廟矣如􅂖梁云易檐改􅂗禮志云更釁其廟則是必先遷髙祖於太廟夾室然後可以壊釁其故廟而納祖考之主又俟遷祖考於新廟然後可以壊釁其故廟而納新祔之主矣如左氏云特祀於􅃦而國語有日祭之文􅅊昭曰謂日上食於祖爾則是主復􅃦後猶日上食矣但􅂖梁所謂練而壊廟乃在三年之内似恐太速禮志所謂釁廟而移故主乃不俟其廟之虗而遽壊之恐非人情左氏所謂祔而作主則與禮經虞主用桑者不合所謂烝嘗禘於廟則與王制䘮三年不祭者不合疑左氏所說乃當時之失杜氏因之遂有國君卒哭而除服之說皆非禮之正大率左氏言禮多此􅀋也皆不足信而國語日祭月祀時享旣與周禮祀天神祭地祇享人􅀑之名不合􅅊昭又謂日上食於祖禰月祀於曽髙時享於二祧亦但與祭法畧相表裏而不見於他經又主旣復􅃦而日􅀕之則其几筵未知當俟臨祭而後設耶或常設而不除也此􅀋皆無明文更當詳攷又古者廟有昭穆之次昭常爲昭穆常爲穆故祔新死者于其祖父之廟則爲告其祖父以當遷他廟而告新死者以當入此廟之漸也今公私之廟皆爲同堂異室以西爲上之制而無復左昭右穆之次一有遞遷而羣室皆遷而新死者當入于其禰之故室矣此乃禮之大節與古不同而爲禮者猶執祔于祖父之文似無意義然欲遂變而祔于禰廟則又非愛禮存羊之意􅀼意與其依違牽制而均不免爲失禮􅂚􅀂獻議於朝盡復公私之廟皆爲左昭右穆之制而一洗其繆之爲快乎答葉味道祔說向嘗細攷欲以奉報意謂巳遣今承喻却未收得必是不曽遣去然今又㝷不見大抵禮注􅂖梁皆謂練而遷廟大戴禮諸侯遷廟其說亦然此是古人必以練而遷其几筵於廟而猶日祭之如横渠之說然今人家廟只有一間祖考同之豈容如此况又巳過時只得從温公之儀亦適當世人情之宜雖攷之於古少有不同要未爲大失禮也錢君所論亦甚精詳伹謂旣祔之後主不當復于􅃦則似未安盖祔與遷自是兩事祔者奉新死之主以􅀕于其所當入之祖廟而并􅀕其祖􅀂告其祖以將遷于他廟􅀂適士二廟則此祖巳當遷于夾室矣而告新死者以將遷于此廟也旣告巳則復新死者之主於􅃦而祖亦未遷比至於練乃遷其祖入他廟或夾室而遷新死者之主于其廟耳其未遷于廟與旣遷而未祥饋羞自如他日如此則廟自不虗􅃦亦有饋皆非如錢君所慮也頃年陸子夀兄弟親䘮亦來問此時以旣祔復主告之而子静固以爲不然直欲於卒哭而祔之後徹其几筵子夀疑而復問因又告之以爲如此則亦無復問其禮之如何只此卒哭之後便徹几筵便非孝子之心巳失禮之大本矣子静終不謂然而子夀遂服以書來謝至有􅀒荆請罪之語今錢君之論雖無子静之薄而其所疑亦非也不知味道㸔得如何幸更與錢講之復以見告也答葉味道五服飲食居處之節昨嘗聞其畧但䘮大記有叔母世毋故主宗子食肉飲酒之文注云義服恩輕不知自始死至未葬之前可以通行何如但一人向隅滿堂不樂服旣不輕而飲食居處獨不爲之制節可乎禮旣無文不可強說􅀼意在喪次則自當如本服之制歸私家則自如其或可也䘮大記三年之䘮禫而從御吉􅀕而復􅃦期居廬終䘮不御於内者父在爲母爲妻齊衰期者大功布衰九月者皆三月不御於内不知小功緦獨無明文其義安在禮旣無文即當自如矣服輕故也親迎男女遭䘮之禮曽子問之詳矣今有男就成於女家乆而未歸􅀂婿之父毋死女之本䘮如之何􅀂女之父母死其女之制服如之何此乃原頭不是且放在塗之禮行之可也然旣嫁則服自當降旣除而歸夫家耳曽子問曰昏禮旣納弊有吉日女之父母死則如之何孔子曰婿使人弔如婿父母死則女之家亦使人弔云云如未有吉日獨不當弔乎恐無不弔之理賀去冬侍坐承斟酌古今之制謂居䘮冠服當與吉服稱其制度等級巳略言及近見親戚有居母喪用温公寛䄂襴衫布幞頭取其與吉服相符而又加首經要經而去温公之布四脚不知可行否今考政和五禮䘮服却用古制凖此而行則亦無特然改制之嫌却恐吉服須講求一酌中制度相與行之耳昔侍先生見早晨入影堂焚香展拜而昏暮無復􅂯入未知尊意如何向見今趙丞相日於影堂行昏定之禮或在燕集之後􅀼疑未安故毎常只循舊禮晨謁而巳按雜記姑姉妹其夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親不主此謂姑姉妹無子寡而死也夫􅀂無族矣則前後家東西家無有則里尹主之或曰主之而祔於夫之黨妻之黨自主之非也夫之黨其祖姑也今賀有姑其夫家反歸父母家旣耆耄他日捨兄弟姪之外無爲主者但不知旣無所祔豈忍其神之無歸乎古法旣廢鄰家里尹决不肯􅀕他人之親則從宜而祀之别室其亦可也女子適人爲父毋服期傳云不貳斬也賤婦䘮母遂於旣葬卒哭而歸繼㸔䘮大記曰喪父毋旣練而歸期九月既葬而歸注云歸謂歸夫家也其旣葬而歸者乃婦人爲祖父母爲兄弟之爲父後者耳賀雖令反終其月數而誤歸之月不知尚可􅀘塡乎因思他人或在母家彼此有所不便不可以待練之乆其不可以不歸也又如之何􅀘塡如今追服意亦近厚或有不便歸而不變其居處飲食之節可也衣服則不可不變此亦以意言之深恐不免汰㢤之誚也答葉味道省闈想甚得意奏名必在前列但尚未見後場題目不知主司意郷如何要之得失巳有定分人徒自爲擾擾耳改字不􅀂只就舊名之爲安門生之禮􅀂在高等恐例須謁見即不可廢􅀂只在行間亦不必詣之也禮書未能得了而衰病日侵恐未必能究竟此事也漢卿必時相見四方更有何朋友在都下凢百宜以謹密爲上事了能一過此相聚否李敬子尚留此志尚堅苦不易得但㸔義理未甚明徹細密耳答徐居甫寓向看五峯言天理人欲同行而異情同體而異用兩句頗疑同體異用之􅀃然猶未見眞有未安處今看得天理乃自然之理人欲乃自欺之情不順自然即是私僞不是天理即是人欲二者靣目自别發於人心自不同寓常驗之舉動間苟出於天理之所當爲胷中自是平正無有慊愧自是寛㤗無有不足接人待物自是無乖忤學者雖不常㑹如此要是此心存時便如此此心不存則不如此湏是讀書講義理常令此心不間㫁則天理常存矣若有放慢時節任人欲發去則胷中自是急迫麤率自是不公不正爲不善事雖不欲人之知胷中目是有愧赧然亦自不可揜如何要去天理中見得人欲人欲中見得天理二者夐然判别恐􅀃同體不可亦恐無同行之理若曰心本爲利却假以行與那眞於爲義者其迹相似如此􅀃同行猶可今下天理人欲字似少分别未審是然否頃與欽夫商量此兩句謂同行異情者是謂同體異用者非請更詳之志於道據於德依於仁一章集注之􅀃備矣寓看来一節密似一節志於道則心心念念惟在人倫日用之所當行者决不向利欲􅁁去其志定矣據於徳如孝親悌長等事皆吾所自得而行之者慮有照管不到時節當據守之而勿失則吾之所得者實矣依於仁則全其本心之徳而不間於人欲之私生生之體自流行不息工夫至此亦云熟矣此三節自立脚大綱以至工夫精察如此志道即夫子志學處以等級次第言耳據德大略如貧而無謟富而無驕之􅀋謂其能守也依仁如貧而樂富而好禮謂其不違仁也游於藝是行有餘力則以學文未知此􅀃通否此叚看得好但所引貧富者不相似孝弟爲仁之本章注謂仁者心之德愛之理顔淵問仁章又謂仁者心之全徳合二處推明其􅀃未審當否心徳則生道也盖天地以生物爲心故人得之以爲心者謂之仁其體則同天地而貫萬物其理則綂萬善而包四端論其名狀則沖和温粹渾龎涵蓄常生生不死乃得謂之仁焉此即乾之元在四時而爲春者也以仁而主四者則隨其地分發爲羞惡爲辤遜爲是非莫不各當其所若不以仁爲主而以别箇爲主則但見不相對副但見􅆾隔不順且天地失其所以爲主而人亦不得其所以生者矣此所以言仁專一心之德者豈不以其維綱管攝之妙乎敬愛之理只從孝弟上發明自孝弟而推原其本則惟有此理耳所謂以仁爲孝弟之夲是也孝弟而廣充其用則爲仁民愛物之事所謂爲仁以孝弟爲本是也􅀼恐心之德以專言愛之理以偏言專言之夲則發爲偏言之用偏言之用則合於專言之本不可以小大本末二之也自仁道之不明也人惟拘於氣禀蔽於私欲則生道有息而天理不行否隔壅塞不能貫通如人疾病血氣不運於四支則手足頑麻不知痛痒而醫者亦謂之不仁人能有以體乎仁必其無一毫之私得以間其生生之體使之流行貫注無有不逹無有不徧然後爲能全其心之德愛之理也此顔子之克巳仲弓之敬恕與聖人居處恭執事敬􅀶學篤志切問近思等處正欲使工夫縝密也必磨洗蕩滌其私使無一毫之留所以喚此仁使之充長條逹無不周徧則心德自全而仁斯在我矣伏乞嚴喻此叚大意得之但愛之理未可以用言耳更味之乆當浹洽自見得失也敬之一字􅀄看似有兩體一是主一無適心體常存無所走作之意一是遇事小心謹畏不敢慢易之意近看得遇事小心謹畏是心心念念常在這一事上無多岐之惑便有心廣體胖之氣象此非主一無適而何動而無二三之雜者主此一也靜而無邪妄之念者亦主此一也主一盖兼動靜而言静而無事惟主於往来岀入之息耳未審然否謂主一兼動静而言是也岀入之息此句不可曉寓一日訪蕃叟先生因􅀃孟子盡心知性處陳先生云人須是知得始得􅀂不知得就事上做得些小濟得甚事寓以爲此􅀃甚然陳先生問盡其心者作如何􅀃寓對言心統性情㑹衆理而妙萬物者也心最難盡惟是知得性方能盡得心能盡其心者以知其性故也盖性者理之得於天而自然者也如君之仁父之慈子之孝以至於日用之所當爲者皆有箇根原来歷處惟知之無一毫之不盡無一節之不極然後吾心之體至通至明無所蔽惑斯爲盡其心矣陳先生以爲不然乃言甚事不從心生只要盡得此心凢所存主凢所動作起居使合於理便是盡得此心此心既盡則自能知性如耳之聴正聲目之視正色手足舉動合禮皆是性寓云向所聞於先生長者與此不同耳目手足只是形耳目手足之所以能如此者方是性陳先生曰某之所以與朱丈不同者正以此耳公下稍自知某􅀃爲是某之用意不同恐難猝合寓所聞如此未得其精但盡其心者知其性也一句盡上一箇者字下應一箇也字不知語脉當如何􅀃寓之所對不畔尊㫖否此叚論得甚好但恐下稍不長進則反見彼􅀃爲是耳今日正好著力也寓向在道院問親迎禮先生言親迎以来從温公婦入門以後從伊川云廟見不必􅀱三月只遲之半月亦可盖少存古人重配著代之義今婦人入門即廟見盖舉丗行之近見郷里諸賢頗信左氏先配後祖之􅀃豈後丗紛紛之言不足據莫若從古爲正否永嘉有儀禮之學合見得此事是非左氏固難盡信然其後􅀃親迎處亦有布几筵告廟而来之􅀃恐所謂後祖者譏其失此禮耳禮支子不􅀕􅀕必告宗子然諸子之嫡子有是襲爵其次子始立宗大夫士以嫡子爲宗所以上承祖宗之重下垂百代之傳而不敢少慢者後丗禮教不明人家多以異姓爲後寓所見郷里有一人家兄弟二人其兄早亡無後遂立異姓爲後後来弟却有子及舉行􅀕禮異姓子既爲嫡主與凡題主及祝版皆用其名若論宗法􅀕惟宗子主之其他支子但得預其􅀕而巳今異姓爲後者既非祖宗氣血所傳乃欲以爲宗子而專主其􅀕乎寓意欲以從弟之長者共主其􅀕事亦同著名行禮庶幾祖先之靈或歆享之不知可以義起否伏乞裁教立異姓爲後此固今人之失今亦難以追正但預􅀕之時盡吾孝敬之誠心可也行弔之日不飲酒食肉此古人因變而變常爲得情􅒏之正然先王制禮因人情而爲之節文必情與文􅁛乃爲得宜寓恐弔䘮之日不飲酒食肉可以施於有服之親或情分之厚者若弔泛常之人只當於行弔之時不飲酒食肉弔畢則復常既與死者平時分踈但則少變平日以存古意可也未審尊意以爲然否有服則不但弔日不飲酒食肉矣其他則視情分之厚薄可也答徐居甫君子之道費而隱章鳶飛魚躍是子思喫緊爲人處必有事焉而勿正心是孟子喫緊爲人處皆是要人就此瞥地便見得箇天理全體若未見得且更虚心涵泳不可迫切追求穿鑿注觧也君子之道造端乎夫婦及其至也察乎天地蓋夫婦則情意密而易於䧟溺不於此致謹則私欲行於玩狎之地自欺於人所不知之境人倫大法雖講於師友之前亦未保其不壊於幽隱之處儻知造端之重隱微之際恐懼戒謹則是工夫從裏面做出以之事父兄處朋友皆易爲力而有功矣本只是􅀃至近處似此推􅀃亦好天地之大也人猶有所憾恐非謂天能生覆而不能形載地能形載而不能生覆人猶有憾處恐只在於隂陽寒暑之或乖其常吉凶災祥之或失其宜品􅀋之枯敗夭折而不得遂其理此雖天地不能無憾人固不能無憾於此也旣是不可必望其全便是有未足處兩端謂衆論不同之極致都是就善處􅀃如㫁獄一人以爲當死一人以爲當罰今酌其中而行之否然所謂中非如子莫之所執也􅀑神爲德注云體物是其爲物之體不知此體字是體用之體還復是體質之體􅀑神者氣之徃来也須有此氣方有此物是爲物之體也答徐志伯浩示喻堂銘極荷不鄙三數年来不敢開口道一字尚且無著身處今安敢爲此以重其罪又使餘波所濺及於賢者乎兼堂中四壁環列前輩之􅁚吾乃幅巾便服而遊燕􅃦卧於其中似亦非便郷聞劉子澄在衡陽作朱陵道院自居正堂而以兩廡爲前賢祠堂嘗􅀼疑其非是恨渠已去不及正之也横渠先生亦言傳得夫子􅀞像而無可設之處正爲此耳幸試思之此雖細故其間亦自不容無義理也答鄧衞老絅問近思録乾健也健而無息之謂乾如何見得天之健處四德之元猶五常之仁云云絅謂偏言一事仁之用也專言四者仁之體也仁之用莫若愛仁之體則愛有所不能盡必包四者論之而後仁之體可見仁之一事乃所以包四者不可離其一事而别求兼四者之仁也滿腔子是惻隱之心莫只是不餒否心要在腔子裏莫只是不放却否所謂腔子之義豈禪俗語耶腔子猶言軀殻耳只是俗語非禪語也滿腔子只是言充塞周徧本来如此未􅀃到不餒處下句所􅀃得之凢物有本末不可分爲兩叚事灑掃應對是其然必有所以然絅􅀼謂是其然者人事也所以然者天理也下學而上逹也大槩是如此更詳玩之楊子拔一毛不爲云云絅􅀼謂三子皆執一而不知䙮故也使楊子之拔一毛不爲施之在陋巷之時即顔子矣墨子之摩頂放踵施之三過其門不入之時即禹矣故所謂中者惟可與權者能之楊墨學不足以知道其心偏而不中豈復能爲禹顔之事可更思之昔受學於周茂叔毎令尋顔子仲尼樂處所樂者何事絅謂孔顔之所樂者循理而巳矣此等處未易一言㫁且宜虚心玩味兼考聖賢爲學用力處實下功夫方自見得如此硬􅀃無益於事也曽􅀧􅃮雕巳見大意絅謂大意者得非天理流行之妙聖賢作用之氣􅁚與二子胷中灑落無一毫虧欠安行天理之至蓋舜有天下而不與焉者也但二子巳能窺測乎此未必身造乎此也故曰已見大意且如此􅀃亦未有病然湏實下功夫眞有見處方有意味耳敬義夾持直上逹天徳自此絅謂夾持者豈内外並進之謂乎直上者豈進進不巳之謂乎直上者不爲物慾所累而倒東耒西之謂也視􅃪思慮動作皆天理也人但於其中要識得眞與妄爾識字是緊要處要識得時湏是學始得横渠先生謂范巽之曰吾輩不及古人病源何在巽之請問先生曰此非難悟設此語者盖欲學者存意之不妄庶㳺心浸熟有一日脫然如大寐之得醒耳横渠先生之意正要學者將此題目時時省察使之積乆貫熟而自得之耳非謂只要如此􅀃殺也明道先生曰某冩字時甚敬非是要字好只此是學絅謂此正在勿忘勿助之間也今作字怱怱則不復成字是忘也或作意令好則愈不能好是助也以此知持敬者正勿忘勿􅂇之間也若如此􅀃則只是要字好矣非明道先生之意也伊川在講筵不曽請俸又不求封叙絅謂􅀂是應舉得官便只當以常調自處雖陳乞封䕃可也本以應舉得官則當只以常調自處此自今常人言之如此可也然朝廷待士却不當如此伊川先生所以難言之也但云其􅀃甚長則是其意以爲要當從科舉法都改變了乃爲正耳近看韓魏公論不當使道士於正殿設醮而不知設醮之非亦是此􅀋湏􅀃到廢道士而罷設醮方是䆒竟也介甫言律是八分書絅謂八分者豈王氏謂其深刻猶未及於十分也律所以明法禁非亦有助於教化但於根本上少有欠闕耳八分是其所長處二分乃其所闕此言是他見得者盖許之之詞非譏之也洽天下不由井地終無由得平周道只是均平又曰井田卒歸於封建乃定絅按張氏言治大抵以井田封建爲主程先生論封建頗取柳子厚之􅀃而范唐鑑亦推廣之至胡氏管見乃力詆子厚并排蘇范其􅀃反與程門不合何也遺書中只有一條論封建而取柳子厚者其他處却不如此恐此一叚乃記録之誤也范氏􅀃多苟簡不足爲法胡氏之論雖正然其言利害亦有所偏要之封建郡縣互有利害但其理則當以封建爲公耳此􅀋且徐講之非今日所急也釋氏之􅀃若欲窮其􅀃而去取之則其􅀃未能窮固已化而爲佛矣絅素不喜讀異端之書然徒知其跡而未䆒其去著儻遇辯詰詞必窮矣綗自度决不至䧟溺則亦不至騁辯然一物不知君子所耻也不知於此當何以處之理有未窮則胷中不能無疑礙雖不䧟溺亦偶然耳况未必不䧟溺耶至於欲騁辯而恥不知尤是末節不足言但窮理功夫不可有所遺然又當審其緩急之序也明道先生曰周茂叔䆫前草不除去子厚觀驢鳴亦謂如此又曰子厚聞生皇子云云絧謂此即天地生物之心而人物所得以爲心者蓋仁之事也聖賢千言萬句所謂傳心者惟此而巳大槩然矣但不可只如此􅀃了便休須是常切玩味涵養也答鄧衛老昨所示卷子乆無便不得報所論􅀑神者甚有條理不易看得如此但􅀃乾徤處云只行之一字便見草率之甚下文云云則又全不應所問矣恐可更深思而詳􅀃之也又以楊墨爲學仁義而過亦非是彼乃正爲不識仁義耳非學之過而不得中也曽􅀧之􅀃乃不眞實之􅀹者今亦未須便論見處且當理㑹如何是實下功夫底方法次第而用力焉乆當自有得耳若只如此揣摸籠􅇁將去即人人會􅀃更要髙妙亦得但不濟事反害事耳答張敬之顯父梁惠王移民移粟之政周官廪人之職未甞廢孟子非之者豈以惠王不知仁政之本耶此無異議但當熟玩孟子所􅀃王政之始終其措置施行之方略次第耳孟子答齊宣王愛牛一叚此等處與上章亦無甚異但要熟讀詳玩耳必有事焉一叚顯父謂此二者界限極難分别盖不􅆀力則便無所事而幾於忘才著意則未免預期欲速而流於助但將心平鋪謹守則又未見脫灑處此一叚依孟子本文只合就養氣上􅀃集注言之備矣明道先生移就持敬上􅀃􅁍是養氣巳前一叚事功夫雖密然恐不若且依孟子看也愛無差等施由親始夷子旣知此􅀃便當一親踈合貴賤方得今􅁍曰施由親始則是又將親踈對待而言豈非吾之愛又有差等哉其詞氣牴牾信乎遁而窮矣夷之所􅀃愛無差等此是大病其言施由親始雖若粗有差别然亦是施此無差等之愛耳故孟子但責其二本而不論其下句之自相矛盾也夷之所以卒能感動而自知其非盖因孟子極言非爲人泚之心有以切中其病耳此是緊要處當著眼目也􅅬文公之問逾迫而孟子所以答之者若無可爲謀者極其規模所就亦不過太王畏天保國之事至於萬章之問宋而孟子遽以成湯樂天之事反覆告之豈􅅬之地􅄶小不足以有爲而王偃滅􅅬伐薛敗諸侯之兵果有可畏之實耶彊弱者􅀔也得失者事也宋􅅬之彊弱有異故其得失之効不同但其一事之如此而爲得如此而爲失則其理未嘗不同耳若曰以彊弱爲得失則是彊者常得弱者常失也豈其然乎以善服人則有心於求勝故人得以勝之以善養人則至誠樂與而人自心恱誠服其原亦判於公私義利之間也以善服人者惟恐人之進於善也如張華之對晋武帝恐呉人更立令主則江南不可取之􅀋是也以善養人者唯恐人之不入於善也若湯之事􅁑遺之牛羊使人徃爲之耕之􅀋是也孟子旣以智爲始聖爲終則智者致知之事聖者極至之名其終復曰智巧聖力是智反妙於聖矣南軒以爲論學則智聖有始終之序語道則聖之極是智之極者也此􅀃似可以破前所疑不知如何智是見得徹之名聖是行得到之號有先後而無淺深也聖而不智如水母之無鰕亦將何所到乎孟子謂乃若其情則可以爲善而周子有五性感動而善惡分是又以善惡於動處並言之豈孟子就其情之未發而周子就其情之巳發者言之乎情未必皆善也然而本則可以爲善而不可以爲惡唯反其情故爲惡耳孟子指其正者而言也周子兼其正與反者而言也莊子有遁天倍情之語亦此意也頃蒙見教云往者同安因聞鍾聲遂悟収心之法􅂋父不揆驗之信然當時所􅀃聞鍾聲者本意不謂如此但言人心出入無時鍾之一聲未息而吾之心巳屢變矣潮汝月臨子午則潮王其理謂何豈以子者陽之始午者陽之極月爲隂屬故其氣交激而至此耶潮汐之􅀃余襄公言之􅀹詳大抵天地之間東西爲緯南北爲經故子午􅆗酉爲四方之正位而潮之進退以月至此位爲節耳以氣之消息言之則子者隂之極而陽之始午者陽之極而隂之始􅆗爲陽中酉爲隂中也答張敬之向所示問目看得路脉全未是又多未曉此章之正意而􅃍引他􅀃以雜乎其間展轉相迷彼此都曉不得不濟得事且當依傍本文逐句逐字觧釋文理令其通透見得古人􅀃此話是此意了更將来反覆玩味乆之自有見處不湏如此比􅀋也聖智巧力之􅀃則巳得之矣此便是看他處底様子也又論聖賢優劣此亦是癡人比較父祖年甲髙下之􅀃學問工夫都不在此枉費心思言語之力也答丁賔臣碩十二月十一日熹扣首上啓丁君省元老友頃幸接承便辱垂問雖喜用意之髙逺然􅀼􅀚容止之間未甚和粹意其未似聖門學者氣象而所問又太多而不切有不容以一詞相反復者用是黙黙不知所對及承訪逮至於再三而不免少露鄙懐則足下巳艴然於色而不欲聞矣自是以来彼此之懐終不相悉而今者承書遂有督過之意三復以還愧怍亡巳夫道在生人日用之間而著於聖賢方冊之内固非先知先覺者所獨得而後来者無所與也又非先知先覺者所能專而使後来者不得聞也患在學者不能虚心循序反復沈潜而妄意躐等自謂有見講論之際則又不過欲人之知巳而不求其益欲人之同巳而不求其正一有不合則遂發憤肆罵而無所不至此所以求之愈迫而愈不近也足下誠以是而深思之則熹之前日所以告足下者巳悉矣足下之學其是非得失亦明矣如以爲然􅁇此見問敢不敬對如曰不然則髙明之藴必有非愚昧所及知者幸寛其咎而姑自信其􅀃焉可也惠况江􅈉感領至意江茶五瓶少見微意布則例不敢受前日柯國材之子来饋亦已郤之非獨於左右爲然也答丁賔臣來喻富貴利逹莫非天命軒冕儻来似未可必足見信道之篤然反復其言乃於得失之間未免有􅀹人之意似又全未得力何耶未由面扣臨風馳想切冀以時自愛益遜志於義理之學是所願望答鄭艮示及疑義足見勉學之意巳略奉答但大低用意未盡親切更冝虚心詳味未要生疑只且似林一之看養氣章順文看去足矣乆之自當有見處有疑處也答黄嵩老大抵人情苦於猶豫多致因循一向􅈸廢今但心所欲爲向前便做不要遲疑等待即只此目下頃刻之間亦須漸見功效矣年運易徃時不待人况中􅀊以後􅀹宜汲汲也答黄令􅁉示喻道之大本未有眞見之期此只是急迫之病道之大夲豈别是一物但日用中隨事觀省乆當自見然亦須是虚心㳺意積其功力庶㡬有得􅀂一向如此急迫則方寸之間躁擾不寜終無可得之期矣答黄令􅁉一作黄敬之所喻日用功夫甚親切但更就此勉力爲佳然書䇿亦不可廢􅀂一向如此又恐偏枯别生病也左氏之􅀃未睱及此若論當讀之書何止左氏但朋友只看論語孟子巳無餘力何睱更及他書也答黄令􅁉一作黄敬之収書雖見郷道之切然更冝寛以居之使其優柔漸漬有以自得乃爲有益正不在如此迫切也大學文義通貫所不難見湏更反復要見下手用力處而􅀙事焉乃爲有諸巳耳􅀂只如此安排布置口􅀃得行未至未當得功夫也晦庵先生朱文公文集卷第五十八考異答徐子融有性無性之􅀃不容不結末一作結抹第二十版安能必二公之見􅀙安能一作安敢第二十二版答宋深之大學是聖門最􅀄用功處然此等處一作然此等語第二十五版福州府學訓導鄭璉校
