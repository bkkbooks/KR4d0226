body:
  text: 經筵講義大學臣熹曰大學者大人之學也古之爲教者有小子之學有大人之學小子之學灑掃應對進退之節詩書禮樂射御書數之文是也大人之學窮理脩身齊家治國平天下之道是也此篇􅀁記皆大人之學故以大學名之臣又嘗竊謂自天之生此民而莫不賦之以仁義禮智之性叙之以君臣父子兄弟夫婦朋友之倫則天下之理固巳無不具於一人之身矣但以人自有生而有血氣之身則不能無氣質之偏以拘之於前而又有物欲之私以蔽之於後􅀁以不能皆知其性以至於亂其倫理而䧟於邪僻也是以古之聖王設爲學校以教天下之人使自王世子王子公侯卿大夫元士之適子以至庶人之子皆以八歳而入小學十有五歳而入大學必皆有以去其氣質之偏物欲之蔽以復其性以盡其倫而後巳焉此先王之世􅀁以自天子至於庶人無一人之不學而天下國家􅀁以治日常多而亂日常少也及周之衰聖賢不作於是小學之教廢而人之行藝不脩大學之教廢而世之道德不明其書雖有存者皆不過爲世儒誦說口耳之資而巳未有能因其文以旣其實必求其理而責之於身者也是以風俗敗壞人才衰之爲君者不知君之道爲臣者不知臣之道爲父者不知父之道爲子者不知子之道􅀁以天下之治日常少而亂日常多皆由此學不講之故也至于我朝天運開泰於是河南程顥及其弟頥始得孔孟以來不傳之緒而其􅀁以開示學者則於此篇之㫖􅀷致意焉􅀂其言曰大學乃孔氏遺書須從此學則不差又曰大學乃初學入德之門於今可見古人爲學次第者賴有此篇尚存其他則莫如論孟其可謂知言之要矣後之君子欲脩巳以治人而及於天下國家者豈可以舍是而他求哉臣以無能􅀗奉明詔使以此篇進講謹誦􅀁聞釋其名義如右惟聖明之留意焉大學之道在明明德在親民在止於至善臣熹曰大學者大人之學也明明之也明德者人之􅀁得乎天至明而不昧者也但爲氣禀􅀁拘人欲􅀁蔽則有時而昏故當有以明之而復其􅀄也親程氏以爲字當作新是也其義則去其舊而新之云爾言旣能自明其明德又當推以及人使人亦有以去其舊染之汙也止者必至於是而不遷之意至善則事理當然之極也言明明德新民皆當至於至善之地而不遷蓋必其有以盡夫天理之極而無一毫人欲之私也此三者大學之綱領也臣竊謂天道流行發育萬物而人物之生莫不得其􅀁以生者以爲一身之主但其􅀁以爲此身者則又不能無􅀁資乎隂陽五行之氣而氣之爲物有偏有正有通有塞有清有濁有純有駁以生之􅀋而言之則得其正且通者爲人得其偏且塞者爲物以人之􅁼而言之則得其清且純者爲聖爲賢得其濁且駁者爲愚爲不肖其得夫氣之偏且塞而爲物者固無以全其􅀁得以生之全體矣惟得其正且通而爲人則其􅀁以生之全體無不皆備於我而其方寸之間虚靈洞徹萬理粲然有以應乎事物之變而不昧是􅀁謂明德者也人之􅀁以爲人而異於禽獸者以此而其􅀁以可爲堯舜而參天地贊化育者亦不外乎此也然又以其􅀁得之氣有清濁純駁之不齊也是以極清且純者氣與理一而自無物欲之蔽自其次者而下則皆巳不無氣禀之枸矣又以拘於氣禀之心接乎事物無窮之變則其目之欲色耳之欲聲口之欲味鼻之欲臭四肢之欲安佚􅀁以害乎其德者又豈可勝言也哉二者相因反覆􅀷固是以此德之明日益昏昧而此心之靈其􅀁知者不過情欲利害之私而巳是則雖曰有人之形而實何以逺於禽獸雖曰可以爲堯舜而參天地然亦不能有以自知矣是以聖人施教旣巳養之於小學之中而後􅄏之以大學之道其必先之以格物致知之說者􅀁以使之即其􅀁養之中而發其明之之端也繼之以誠意正心脩身之目者則又􅀁以使之因其巳明之端而致其明之之實也夫旣有以發其明之之端而又有以致其明之之實則吾之􅀁得於天而未嘗不明者豈不超然無有氣質物欲之累而復得其本然之明哉是則􅀁謂明明德者而非有􅀁作爲於性分之外也然其􅀁謂明德者又人人之􅀁同得而非有我之得私也向也俱爲物欲之􅀁蔽則其賢愚之分固無以大相逺者今吾旣幸有以自明矣則視彼衆人之同得乎此而不能自明者方且甘心迷惑没溺於卑汙苟賤之中而不自知也豈不爲之惻然而思有以救之哉故必推吾之􅀁自明者以及之始於齊家中於治國而終及於平天下使彼有是明德而不能自明者亦皆如我之有以自明而去其舊染之汙焉是則􅀁謂新民者而亦非有􅀁付􅂌増益之也然德之在巳而當明與其在民而當新者則又皆非人力之􅀁爲而吾之􅀁以明而新之者又非可以私意苟且而爲也是其􅀁以得之於天而見於日用之間者固巳莫不各有本然一定之則矣以其義理精㣲之極有不可得而名者故姑以至善目之而傳􅀁謂君之仁臣之敬子之孝父之慈與人交之信乃其目之大者也衆人之心固莫不有是而或不能知學者雖或知之而亦鮮能必至於是而不去此爲大學之教者􅀁以慮其理雖復而有不純欲雖克而有不盡將無以盡夫脩巳治人之道而必以是爲明德新民之標的也欲明德而新民者誠能求必至是而不容其少有過不及之差焉則其􅀁以去人欲而復天理者無毫髪之遺恨矣知止而后有定定而后能靜靜而后能安安而後能慮慮而后能得臣熹曰止者􅀁當止之地即至善之􅀁在也知之則志有定向靜謂心不外馳安謂􅀁處而安慮謂思無不審得謂得其􅀁止臣謹桉此一節推本上文之意言明德新民􅀁以止於至善之由也蓋明德新民固皆欲其止於至善然非先有以知其􅀁當止之地則不能有以得其􅀁當止者而止之如射者固欲其中然不先有以知其􅀁當中之地則不能有以得其􅀁當中者而中之也知止云者物格知至而於天下之事皆有以知其至善之􅀁在是則吾􅀁當止之地也能知􅀁止則方寸之間事事物物皆有定理矣理旣有定則無以動其心而能静矣心旣能静則無􅀁擇於地而能安矣能安則日用之間從容閒暇事至物來有以揆之而能慮矣能慮則隨事觀理極深研幾無不各得其􅀁止之地而止之矣物有本末事有終始知􅀁先後則近道矣臣熹曰明德爲本新民爲未知止爲始能得爲終本始􅀁先末終􅀁後此結上文两節之意臣竊謂明德新民兩物而内外相對故曰本末知止能得一事而首尾相因故曰終始誠知先其本而後其末先其始而後其終也則其進爲有序而至於道也不逺矣蓋欲治人者不可不先於治巳欲體道者不可不先於知道此則天下國家之逹道通義而爲人君者尤不可以不審是以臣愚竊願陛下􅀷留聖意伏乞睿照古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先脩其身欲脩其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物臣熹曰明明德於天下者使天下之人皆有以明其明德也心者身之􅀁主也誠實也意者心之􅀁發也實其心之􅀁發欲其一於善而無自欺也致推極也知猶識也推極吾之知識欲其􅀁知無不盡也格至也物猶事也窮至事物之理欲其極處無不到也此八者大學之條目也臣謹按此言大學之序其詳如此蓋綱領之條目也格物致知誠意正心脩身者明明德之事也齊家治國平天下者新民之事也格物致知􅀁以求知至善之􅀁在自誠意以至於平天下􅀁以求得夫至善而止之也􅀁謂明明德於天下者自明其明德而推以新民使天下之人皆有以明其明德也人皆有以明其明德則各誠其意各正其心各脩其身各親其親各長其長而天下無不平矣然天下之本在國故欲平天下者必先有以治其國國之本在家故欲治國者必先有以齊其家家之本在身故欲齊家者必先有以脩其身至於身之主則心也一有不得其本然之正則身無􅀁主雖欲勉彊以脩之亦不可得而脩矣故欲脩身者必先有以正其心心之發則意也不能純一於善而不免爲自欺則心爲􅀁累雖欲勉彊以正之亦不可得而正矣故欲正心者必先有以誠其意􅀂夫知則心之神明妙衆理而宰萬物者也不能推而致之使其内外昭融無􅀁不盡則隱微之際私欲萌焉雖欲勉彊以誠之亦不可得而誠矣故欲誠意者必先有以致其知致者推致之謂如䘮致乎哀之致言推之而至於盡也至於物則理之􅀁在人􅀁必有而不能無者也不能即而窮之使其精粗隠顯究極無餘則理􅀁未窮知固不盡雖欲勉彊以致之亦不可得而致矣故致知之道在乎即事觀理以格夫物格者極至之謂如格于文祖之格言窮之而至其極也物格而后知至知至而后意誠意誠而后心正心正而后身脩身脩而后家齊家齊而后國治國治而后天下平臣熹曰物格者物理之極處無不到也知至者吾心之􅀁知無不盡也知旣盡則意可得而實矣意旣實則心可得而正矣臣謹按此覆說上文之意也物格者事物之理各有以詣其極而無餘之謂也理之在物者旣詣其極而無餘則知之在我者亦隨􅀁詣而無不盡矣知無不盡則心之􅀁發可一於善而無不實矣意不自欺則心之本體可致其虚而無不正矣心得其正則身之􅀁處可不䧟於其􅀁偏而無不脩矣身無不脩則推之天下國家亦舉而措之耳豈外此而求之智謀功利之末哉自天子以至於庶人壹是皆以脩身爲本臣熹曰壹是一切也正心以上皆􅀁以脩身也齊家以下則舉此而措之耳其本亂而末治者否矣其􅀁厚者薄而其􅀁薄者厚未之有也臣熹曰本謂身也􅀁厚謂家也此两節結上文两節之意臣竊謂以身對天下國家而言則身爲本而天下國家爲末以家對國與天下而言則其理雖未嘗不一然其厚薄之分亦不容無等差矣故不能格物致知以誠意正心而脩其身則本必亂而末不可治不親其親不長其長則􅀁厚者薄而無以及人之親長此皆必然之理也孟子􅀁謂天下國家皆本於身又謂於􅀁厚者薄無􅀁不薄其言皆本於此蓋君猶表也民猶影也表正則影無不正矣君猶源也民猶流也源清則流無不清矣􅀂夫天下之物則有親有踈有近有逺而心之應物則有重有輕有長有短親者重而踈者輕近者長而逺者短重而長者在􅀁先輕而短者在􅀁後亦理勢之必然非人之􅀁能爲也是以此章詳陳大學之條目曰格物曰致知曰誠意曰正心曰脩身曰齊家曰治國曰平天下凢有八事而於章末獨以脩身齊家二事結之亦猶前章知􅀁先後之云而其旨益以􅀷矣臣願陛下清閒之燕從容諷味常存於心不使忘失每出一言則必反而思之曰此於脩身得無有􅀁害乎每行一事則必反而思之曰此於脩身得無有􅀁害乎小而嚬􅀏念慮之間大而號令黜陟之際無一不反而思之必無害也然後從之有害則不敢也則又夙興而思之曰吾於吾親得無有未厚乎夜􅄰而思之曰吾於吾親得無有未厚乎以至於出入起居造次食息無時不反而思之必巳厚也然後守之而勿失一有未厚則又恐懼而益加厚焉念念如此無少間斷則庶乎身脩親悅舉而措諸天下無難矣惟陛下􅀷留聖意臣又謹按自此以上皆大學經文自則近道矣以上爲前章自古之欲明明德於天下者以下爲後章前章略提綱領後章細分條目鉅細相涵首尾相應極爲詳備蓋夫子􅀁誦古經之言而曽子記之自此以下傳文十章則曽子之意而門人記之也當俟異日詳究其說然必先讀經文使之習熟而綱領條目羅列􅅐中如指諸掌然後􅀶考傳文隨事體察而實致其力使吾􅀁以明徳而新民者無不止於至善而天下之人皆有以見其意誠心正身脩家齊國治天下平之效則大學之道不在於書而在於我矣伏惟陛下􅀷留聖意則天下幸甚康誥曰克明德臣熹曰克能也又有勝義言文工能明其明德也太甲曰顧諟天之明命臣熹曰顧目在之也諟古是字通用天之明命即人之明德也言先王之心常欲明其明德如目在夫物不敢忘也帝典曰克明峻德臣熹曰峻書作俊大也大德即明德也言堯能明其大德也皆自明也臣熹曰結􅀁引書以釋明明德之意皆謂自明巳之明德也臣謹按此傳之首章釋經文明明德之義舊本脫誤今移在此其曰克明德者見人皆有是明德而不能明唯文王能明之也夫人之􅀁以不能明其明德者何哉氣禀物欲害之也蓋氣偏而失之太剛則有􅀁不克氣偏而失之太柔則有􅀁不克聲色之欲蔽之則有􅀁不克貨利之欲蔽之則有􅀁不克不獨此耳凢有一毫之偏蔽得以害之則皆有􅀁不克唯文王無氣禀物欲之偏蔽故能有以勝之而無難也其曰顧諟天之明命者人受天地之中以生􅀁謂命也故人之明德非他也即天之􅀁以命我而至善之􅀁存也是其全體大用蓋無時而不發見於日用之間事親事長飲食起居其􅀁當然各有明法人唯不察於此是以氣禀物欲得以蔽之而不能自明常目在之無少間斷眞􅀂見其參於前􅀝於衡也則明德常明而天命在我矣其曰克明峻德者人之爲德未嘗不明而其明之爲體亦未嘗不大但人自有以昏之是以旣不能明而又自陷於一物之小唯堯爲能明其大德而無昏昧狹小之累是則􅀁謂止於至善也皆自明也者言此上􅀁引三句皆言人當有以自明其明德也能自明其明德則能治其天下國家而有以新民矣湯之盤銘曰苟日新日日新又日新臣熹曰盤沐浴之盤也銘名其器以自戒之辭也苟誠也湯以爲人之洗濯其心以去惡如沐浴其身以去垢故銘其盤言誠能一日有以滌其舊染之汙而自新則當因其巳新者而日日新之又日新之不可畧有間斷也康誥曰作新民臣熹曰鼓之舞之之謂作言振起其自新之民也詩曰周雖舊􅀖其命維新臣熹曰言周國雖舊至文王能新其德以及於民而始受天命也是故君子無􅀁不用其極臣熹曰自新新民皆欲止於至善也臣謹按此傳之二章釋新民之義也蓋沐浴之盤者常用之器而銘者自警之辭也古之聖賢兢兢業業固無時而不戒謹恐懼然猶恐其意有􅀁怠而忽忘之也是以於其常用之器各因其事而刻銘以致戒焉欲其常接乎目毎警乎心而不至於忽忘也其辭􅀁謂苟日新日日新又日新者則取沐浴之事而言之蓋人之有是德猶其有是身也德之本明猶其身之本㓗也德之明而利欲昏之猶身之㓗而塵垢汙之也一旦存養省察之功眞有以去其前日利欲之昏而日新焉則亦猶其䟽瀹澡雪而有以去其前日塵垢之汙也然旣新矣而􅀁以新之之功不繼則利欲之交將復有如前日之昏猶旣㓗矣而􅀁以㓗之之功不繼則塵垢之集將復有如前日之汙也故必因其巳新而日日新之又日新之使其存養省察之功無少間斷則明德常明而不復爲利欲之昏亦如人之一日沭浴而日日沭浴又無日而不沭浴使其䟽瀹澡雪之功無少間斷則身常㓗清而不復爲舊染之汙也昔成湯􅀁以反之而至於聖者正惟學於伊尹而有得於此故有感乎沭浴之事而刻銘於盤以自戒焉而稱其德者亦曰不邇聲色不殖貨利又曰以義制事以禮制心又曰從諌弗咈改過不吝又曰與人不求備檢身􅀂不及皆日新之謂也至詩􅀁謂聖敬日躋者則其語意於日新爲至近而敬之一字又見其􅀁以日新之本蓋不如是則亦何地可據而能日繼其功哉其後伊尹復政太甲復以終始惟一時乃日新爲丁寧之戒蓋於是時太甲方且自怨自艾於桐處仁遷義而歸是亦􅀁謂苟日新者故復推其嘗以吿于湯者告之欲其日進乎此無􅀁間斷而有以繼其烈祖之成德也其意亦􅀷切矣至周武王踐祚之初受師尚父丹書之戒而於几席觴豆刀劍戸牗盥槃莫不銘焉則亦聞湯之風而興起者皆可以爲萬世帝王之法矣傳者釋新民之義而及於此蓋以是爲自明之至而新民之端也其曰作新民者武王之封康叔以商之餘民染紂汙俗而失其本心也故作康誥之書而告之以此欲其有以鼓舞而作興之使之振􅁬踴躍以去其惡而遷於善舍其舊而進乎新也然此豈聲色號令之􅀁及哉亦自新而巳矣其曰周雖舊􅀖其命維新者言周之有􅀖自后稷以來千有餘年至於文王聖德日新而民亦丕變故天命之以有天下是其􅀖雖舊而命則新也蓋民之視效在君而天之視聽在民􅀂君之德昏蔽􅁾濁而無以日新則民德隨之亦爲昏蔽􅁾濁而日入於亂民俗旣壞則天命去之而國勢衰弊無復光華如人向老如日將暮日凋日瘁日昏日暗不覺滅亡之將至􅀂其有以自新而推以及民使民之德亦無不新則天命之新將不旋日而至矣其曰君子無􅀁不用其極者盤銘言自新也康誥言新民也文王之詩自新新民之極也故曰君子無􅀁不用其極極即至善之云也用其極者求其止於是而巳矣詩云􅀖畿千里惟民􅀁止臣熹曰􅀖畿王者之都也止居也言物各有􅀁當止之處也詩云緡蠻黄鳥止于丘隅子曰於止知其􅀁止可以人而不如鳥乎臣熹曰緡蠻鳥聲丘隅岑蔚之處子曰以下孔子說詩之辭言人當知􅀁當止之處也詩云穆穆文王於緝熈敬止爲人君止於仁爲人臣止於敬爲人子止於孝爲人父止於慈與國人交止於信臣熹曰穆穆􅀷逺之意於嘆美辭緝繼續也熈光明也敬止言其無不敬而安􅀁止也引此而言聖人之止無非至善五者乃其目之大者也詩云瞻彼淇奥菉竹猗猗有斐君子如切如磋如􅅣如磨瑟􅀆僴􅀆赫􅀆喧􅀆有斐君子終不可諠􅀆如切如磋者道學也如􅅣如磨者自脩也瑟􅀆僴􅀆者恂慄也嚇􅀆喧􅀆者威儀也有斐君子終不可諠􅀆者道盛德至善民之不能忘也臣熹曰淇水名奥隈也菉詩作緑猗猗羙盛貌斐文貌切以刀鋸􅅣以椎鑿皆裁物使成形質也磋以鑢鐋磨以沙石皆治物使其滑澤也治骨角者旣切而復磋之治玉石者旣􅅣而復磨之皆言其治之有緒而進進不巳也瑟嚴密之貌􅍀武毅之貌喧詩作咺赫喧宣著盛大之貌諠詩作諼忘也道言也學謂講習討論之事自脩者省察克治之功恂鄭氏讀作峻恂慄戰懼也威可畏也儀可象也引詩而釋之以見能得至善之􅀁由而又以贊美德容之盛也詩云於􅃧前王不忘君子賢其賢而親其親小人樂其樂而利其利此以没世不忘也臣熹曰於戲嘆詞前王謂文武也君子謂其後賢後王小人謂後民也此言前王盛德至善之餘澤使天下後世無一物不得其􅀁􅀁以雖巳没世而人思慕之愈乆而不忘也此两節咏嘆淫泆其味􅀷長當熟玩之臣謹按此傳之三章釋經文止於至善之義其曰􅀖畿千里維民􅀁止者以民止於􅀖畿明物之各有􅀁止也其曰可以人而不如鳥乎者言鳥於其欲止之時猶知其當止之處豈可人爲萬物之靈而反不如鳥之能知􅀁止而止之也其引穆穆文王以下一節則以聖人之止而明至善之􅀁在也蓋天生烝民有物有則是以萬物庶事莫不各有當止之􅀁但􅀁居之位不同則􅀁止之善不一故爲人君則其􅀁當止者在於仁爲人臣則其􅀁當止者在於敬爲人子則其􅀁當止者在於孝爲人父則其􅀁當止者在於慈與國人交則其􅀁當止者在於信是皆天理人倫之極致發於人心之不容巳者而文王之􅀁以爲法於天下可傳於後世者亦不能加毫末於是焉但衆人􅀋爲氣禀物欲之􅀁昏故不能常敬而失其􅀁止唯聖人之心表裏洞然無有一毫之蔽故連續光明自無不敬而􅀁止者莫非至善不待知􅀁止而後得􅀁止也故傳引此詩而歷陳􅀁止之實使天下後世得以取法焉學者於此誠有以見其發於本心之不容巳者而緝熈之則其敬止之功是亦文王而巳矣詩􅀁謂上天之載無聲無臭儀刑文王萬􅀖作孚正此意也然君之􅀁以仁臣之􅀁以敬子之􅀁以孝父之􅀁以慈朋友之􅀁以信皆人心天命之自然非人之􅀁能爲也但能因事推窮以至其極而又推􅀋以盡其餘則天下之物皆有以見其至善之􅀁在而止之矣其引瞻彼淇澳以下舊本脫誤今移在此其意則以明夫􅀁以得其至善而止之之方與其得止之驗也夫如切如磋言其􅀁以講於學者巳精而益求其精也如􅅣如磨言其􅀁以脩於身者巳密而益求其密也此其􅀁以擇善固執日就月將而得止於至善之由也恂慄者嚴敬之存乎中也威儀者輝光之著乎外也此其􅀁以晬靣盎背施於四體而爲止於至善之驗也盛德至善民不能忘蓋人心之􅀁同然聖人旣先得之而其充盛宣著又如此是以民皆仰之而不能忘也盛德以身之􅀁得而言也至善以理之􅀁極而言也切磋􅅣磨求其止於是而巳矣其引於戲前王不忘以下一節則因上文民不能忘而言也蓋賢其賢者聞而知之仰其德業之盛也親其親者子孫保之思其覆育之恩也樂其樂者含哺鼓腹而安其樂也利其利者耕田鑿井而享其利也此皆先王盛德至善之餘澤故雖巳没世而人猶思之愈乆而不能忘也子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本臣熹日猶人不異於人也情實也引夫子之言而言聖人能使無實之人不敢盡其虚誕之辭蓋我之明德旣明自然有以畏服民之心志故訟不待􅃪而自無也觀於此言可以知本末之先後矣臣謹按此傳之四章釋經文物有本末之義也舊本脫誤今移在此蓋言聖人德盛仁熟􅀁以自明者皆極天下之至善故能大有以畏服其民之心志而使之不敢盡其無實之辭是以雖其聽訟無以異於衆人而自無訟之可聽蓋巳德旣明而民德自新則得其本之明効也或不能然而欲區區於分爭辯訟之間以求新民之效其亦末矣臣又謹按自此以上大學之傳以釋正經前章之義者也其言克明德者欲學者自彊其志以勝其氣禀之偏物欲之蔽而能明其明德也其言顧諟天之明命者欲學者之於天理心存目在而不可以頃刻忘也其言苟日新日日新又日新者欲學者􅀷自省察一日沛然有以去惡而遷善則又如是日日加功而無間斷也其言如切如磋如􅅣如磨者欲學者之不以小善自足而益進其功以求止於至善亦日新之意也凢此數者其言雖殊其意則一臣願陛下􅀷留聖意而實致其功必使一日之間暁然有以見夫氣禀物欲之爲巳害脫然有以去之而無難則天理之明瞭然在目而有以爲日新之地矣然後日日新之又日新之如旣切而復磋之如旣􅅣而復磨之以至於至善在我而無􅀁不用其極則宋雖舊􅀖而天之􅀁以命陛下者則新矣如其不然則臣恐天下之勢將有如前章􅀁謂向老而將暮者臣不勝大懼惟陛下之留意焉此謂知本程子曰衍文也此謂知之至也臣熹曰此句之上當有闕文臣謹按此傳之五章其次當釋物格知至之義今亡其辭而獨留此一句乃章末之結語也臣嘗竊考此篇之㫖其綱領有三其條目有八而格物致知是爲先務今乃獨遺其本傳之文不知其􅀁以發明此㫖者果爲何說甚可惜也然而尚賴程氏之言有可以􅀘其亡者如曰學莫先於正心誠意然欲正心誠意必先致知而欲致知又在格物致盡也格至也凢有一物必有一理窮而至之􅀁謂格物者也然而格物亦非一端如或讀書講明道義或論古今人物而别其是非或應接事物而處其當否皆窮理也但能今日格一件明日又格一件積習旣多然後脫然有貫通處又曰窮理者非謂必盡窮天下之理又非謂止窮得一理便到但自一身之中以至萬物之理理㑹得多自當脫然有悟處又曰格物非欲盡窮天下之物但於一事上窮盡其他可以􅀋推至於言孝則當求其􅀁以爲孝者如何􅀂一事上窮不得且别窮一事或先其易者或先其難者各隨人淺􅀷譬如千蹊萬徑皆可以適國但得一道而入則可以推􅀋而通其餘矣蓋萬物各具一理而萬理同出一原此􅀁以可推而無不通也至於論其􅀁以用力之本則其言又曰學道以知爲先致知以敬爲本又曰涵養須是敬進學則在致知又曰致知在乎􅀁養養知莫過於寡欲論其􅀁以爲敬之方則其言又曰主一之謂敬無適之謂一又曰但莊整齊肅則心便一一則自無非僻之干存之乆而天理明矣至其門人謝良佐之言則曰敬是常惺惺法尹焞之言則曰人能收歛其心不容一物則可以謂之敬矣此皆切至之言􅀷得聖經之㫖傳文雖亡然於此可以得其梗槩矣故臣又拾遺意而論之曰天道流行造化發育凢有聲色貌象而盈於天地之間者皆物也旣有是物則其􅀁以爲是物者莫不各有當然之則具於人心而自不容巳是皆得於天之􅀁賦而非人之􅀁能爲也今且以其至切而近者言之則心之爲物實主於身其體則有仁義禮智之性其用則有惻隱羞惡㳟敬是非之情渾然在中隨感而應各有攸主而不可亂也次而及於身之􅀁具則其口鼻耳目四支之用又次而及於身之􅀁接則有君臣父子夫婦長㓜朋友之常是皆必有當然之則而自不容已􅀁謂理也外而至於人則人之理不異於巳也逺而至於物則物之理不異於人也是乃書􅀁謂降􅂨詩􅀁謂秉彛劉子􅀁謂天地之中子思􅀁謂天命之性孟子􅀁謂仁義之心程氏􅀁謂天然自有之中張載􅀁謂萬物之一原邵雍􅀁謂道之形體者但其氣質有清濁偏正之殊物欲有淺􅀷厚薄之異是以聖之與愚人之與物相與殊絶而不能同耳以其理之同故以一人之心而於天下萬物之理無不能知以其禀之異故於其理或有􅀁不能窮也理有未窮故其知有不盡知有不盡則其心之􅀁發必不能純於義理而無雜乎物欲之私此其􅀁以意有不誠心有不正身有不脩而天下國家不可得而治也昔者聖人蓋有憂之是以於其始教爲之小學而使人習於誠敬則􅀁以養其德性收其放心者巳無􅀁不用其至矣及其進乎大學則􅀁謂格物致知云者又欲其於此有以窮究天下萬物之理而致其知識使之周徧精切而無不盡也􅀂其用力之方則或考之事爲之著或察之念慮之㣲或求之文字之中或索之講論之際使於身心性情之德人倫日用之常以至天地􅀑神之變鳥獸草木之宜莫不有以見其􅀁當然而自不容巳者而又從容反覆而日從事乎其間以至於一日脫然而貫通焉則於天下之理皆有以究其表裏精粗之􅀁極而吾之聰明睿知亦皆有以極其心之本體而無不盡矣凢此推演雖出管窺然實皆聖經賢􅀓之意造道入德之方也抑臣聞之治古之世天下無不學之人而王者之子弟其教之爲尤密蓋自其爲赤子之時而教巳行矣及其出就外傳則又有小學之學及其齒於胄子則又有大學之學凢􅀁以涵養其本原開導其知識之具巳先熟於爲臣爲子之時故其内外凝肅思慮通明之効有以見於君臨天下之日􅀁以能秉本執要醻酢從容取是舍非賞善罰惡而姦言邪說無足以亂其心術也降及後世教化不脩天下之人例不知學而尊且貴者爲尤甚蓋㓜而不知小學之教故其長也無以進乎大學之道凢平日􅀁以涵養其本原開導其知識者旣巳一切鹵莾而無法則其一旦居尊而臨下决無􅀁恃以應事物之變而制其可否之命至此而後始欲學於小學以為大學之基則巳過時而不暇矣夫手握天下之圖身據兆民之上可謂安且榮矣而其心乃茫然不知􅀁以御之之術使中外小大之臣皆得以肆其欺蔽眩惑於前騁其擬議窺覦於後是則豈不反爲大危大累而􅀷可畏哉然而尚幸有可爲者亦曰敬而巳矣􅀂能於此􅀷思猛省痛自䇿勵兼取孟子程氏之言便從今日從事於敬以求放心則猶可以􅆂養本原而致其精明以爲窮理之本伏惟陛下􅀷留聖意實下功夫不可但崇空言以應故事而巳也臣義切愛君不覺煩瀆下情無任恐懼懇激之至􅀁謂誠其意者母自欺也臣熹曰母者禁止之辭也人心本善故其􅀁發亦無不善但以物欲之私雜乎其間是以為善之意有􅀁不實而爲自欺耳能去其欲則無自欺而意無不誠矣如惡惡臭如好好色此之謂自慊故君子必愼其獨也臣熹曰如惡惡􅆨惡之深也如好好色好之切也慊快也足也獨者人􅀁不知而巳􅀁獨知之之地也好善惡惡深切如此則是意常快足而無自欺矣必愼其獨者􅀁以察之於隱微之間不使其有物欲之雜而爲自欺也小人閒居爲不善無􅀁不至見君子而后厭然揜其不善而著其善人之視巳如見其肺肝然則何益矣此謂誠於中形於外故君子必愼其獨也臣熹曰閒居獨處也厭然銷沮閉藏之貌小人爲惡於隱㣲之中而詐善於顯明之地則自欺之甚也然旣實有是惡於中則其證必見於外徒爾自欺而不足以欺人也君子之謹獨不待監此而後能然亦不敢不監此而加勉也曽子曰十目􅀁視十手􅀁指其嚴乎臣熹曰言雖幽隱之中吾􅀁獨知之地而衆􅀁共見有如此者可畏之甚也富潤屋德潤身心廣體胖故君子必誠其意臣熹曰胖安舒也言富則能潤屋矣德則能潤身矣故心無愧怍則體常舒泰德之潤身者然也蓋善之實於中而形於外者如此又君子之􅀁以不可不謹獨而誠其意也臣謹按此傳之第六章承上章之言以釋經文誠意之義者也臣又詳說之曰民之秉彞本無不善故人心之發莫不知善之當爲而欲爲之惟其氣禀之雜物欲之私有以害之是以爲善之意有􅀁不實而不免爲自欺也􅀁謂自欺者外有欲善之形而其隱㣲之間常有不欲者以拒乎内也外有惡惡之狀而其隱㣲之間常有不惡者以主乎中也是以其外雖公而中則私其形常是而心則否是皆自欺之􅀋也􅀁謂誠其意者亦禁乎此而巳矣能禁乎此則其心之􅀁發在於好善則表裏皆好而隱㣲之間無一毫之不好心之􅀁發在於惡惡則表裏皆惡而隱微之間無一毫之不惡是以其好善也如好好色其惡惡也如惡惡臭而方寸之間無有纎芥不快不足之處是則􅀁謂自慊而意之誠也能自慊而意誠則其隱㣲之間無非善之實者君子於此亦致其謹而不使一毫之私得以介乎其間而巳􅀂小人之自欺則不惟形於念慮之間而必見於事爲之際此知其爲惡而揜之則旣不足以自欺人之視巳如見其肺肝則又不足以欺人亦何益之有哉此君子􅀁以又以爲戒而必謹其獨也其引曽子之言以下則􅀁以明夫隱㣲之間實有不善則人皆知之如十目之􅀁同視十手之􅀁同指無不見之甚可畏也隱㣲之間實無不善則其形於外也亦然蓋多財之人其屋必美有德之人其身必脩其心廣大則其體必安舒此又以著理之必然而見君子􅀁以必誠其意之指也然考之於經則􅀁以能誠其意者乃在夫知至蓋知無不至則其於是非得失皆有以剖柝於毫釐之間而心之􅀁發必無外善内惡之弊􅀁以有主於中有地可㩀而致謹於隱㣲之間也􅀂知有不至則其不至之處惡必藏焉以爲自欺之主雖欲致其謹獨之功亦且無主之能爲而無地之可據矣此又傳文之􅀁未發而其理巳具於經者皆不可以不察也然猶爲衆人言之耳􅀂夫人君則以一身託乎兆民之上念慮之間一有不實不惟天下之人皆得以議其後而禍亂乗之又將有不可遏者其爲可畏又不止於十目􅀁視十手􅀁指而巳願陛下於此􅀷加省察實用功夫則天下幸甚如其不然則今日區區之講讀亦徒爲觀聽之美而已何益於治道有無之實以窒夫禍亂之原哉具位凖尚書吏部牒奉聖㫖令侍從兩省臺諌禮官集議四祖祧主宜有􅀁歸者熹今竊詳群議其說雖多而揆以禮經皆有可疑如曰藏於太廟之西夾室則古者唯有子孫祧主上藏於祖考夾室之法而無祖考祧主下藏于子孫夾室之文昔者僖祖未遷則西夾室者僖祖之西夾室也故順翼二祖之主藏焉而無不順之疑今旣祧去僖祖而以太祖􅀕初室矣則夾室者乃太祖之夾室自太祖之室視之如正殿之視朶殿也子孫坐於正殿而以朶殿居其祖考於禮安乎此不可之一也至於祫享則又欲設幄於夾室之前而别􅀕焉則旣不可謂之合食而僖祖神坐正當大祖神坐之背前孫後祖此又不可之二也如曰别立一廟以奉四祖則不唯䘮事即逺有毁無立而􅀁立之廟必在偏位其棟宇儀物亦必不能如太廟之盛是乃名爲尊祖而實卑之又當祫之時群廟之主祫于太廟四祖之主祫于别廟亦不可謂之合食此又不可之三也如曰藏主於天興殿則宗廟原廟古今之禮不同不可相雜而不得合食亦與别廟無異此又不可之四也凢此數者反復尋繹皆不可行議者亦皆知其不安而不知􅀁以然者特以其心急欲尊奉太祖三年一袷時暫東向之故而爲此紛紛不復顧慮殊不知其實無益於太祖之尊而徒使僖祖太祖兩廟威靈常􅀂相與爭校彊弱於㝠㝠之中并使四祖之神疑於受擯徬徨躑躅不知􅀁歸令人傷痛不能自巳不知朝廷方此多事之際亦何急而爲此也今亦無論其他但以太祖皇帝當日追尊帝號之心而黙推之則知太祖今日在天之靈於此必有􅀁不忍而不敢當矣又况僖祖祧主遷於治平而不過數年神宗皇帝復奉以爲始祖巳爲得禮之正而合於人心􅀁謂有其舉之而莫敢廢者乎且孔子論武王周公之孝而曰踐其位行其禮奏其樂愛其􅀁親敬其􅀁尊事死如事生事亡如事存孝之至也今天子旣踐太祖之位行太祖之禮奏太祖之樂矣則當愛太祖之􅀁親敬太祖之􅀁尊􅀁以事太祖者無以異於生存之時乃爲至孝而議者顧欲黜其􅀁追尊之祖考置之他􅀁而又未有一定之處是豈􅀁謂愛敬其􅀁親尊而事之如生存之時乎且議者之􅀁以必爲此說者無他但以太祖膺圖受命化家爲國而王業之興不由僖祖耳􅀂以此言則后稷本封於邰而不窟巳自竄於戎狄公劉太王又再遷而後定文武之興又何嘗盡由於后稷哉但推其本始爲出於此故不可以不􅀕而􅀕之不可以不尊耳豈計其功德之小大有無哉况周人雖以后稷爲太祖而􅀕法亦曰祖文王而宗武王是乃􅀁謂祖有功而宗有德之意故自爲世室而百世不遷以冠群廟則亦不待東向於祫然後可以致崇極之意矣然今日宗廟之制未能如古始以􅁠宜而論之則莫􅀂以僖祖擬周之后稷而􅀕於太祖之初室順祖爲昭翼祖爲穆宣祖爲昭而藏其祧主于西夾室太祖爲穆擬周之文王爲祖而􅀕於太廟之第二室太宗爲昭擬周之武王爲宗而􅀕于太廟之第三室其太祖太宗又皆百世不遷而謂之世室眞宗爲穆其祧主亦且權藏於西夾室仁宗爲昭爲宗而􅀕於第四室亦爲世室如太宗之制英宗爲穆藏主如真宗之制神宗爲昭􅀕第五室哲宗爲穆􅀕第六室徽宗爲昭􅀕第七室欽宗爲穆􅀕第八室高宗爲昭􅀕第九室孝宗爲穆祔第十室異時高宗亦當爲宗爲世室如太宗仁宗之制三􅀊祫享則僖祖東向如故而自順祖以下至于孝宗皆合食焉則於心爲安而於禮爲順矣至于古者宗廟之制今日雖未及議尚期異時興復之後還反舊都則述神宗之志而一新之以正千載之繆成一王之法使昭穆有序而祫享之禮行於室中則又善之太者也蓋尊大祖以東向者義也奉僖祖以東向者恩也義者天下臣子今日之願也恩者太祖皇帝當日之心也與其伸義詘恩以快天下臣子之願孰􅀂詘義伸恩以慰太祖皇帝之心乎韓愈􅀁謂祖以孫尊孫以祖詘者正合此意而又以爲四時各􅀕其廟則􅀁伸之􅀕常多三年然後一祫則􅀁詘之􅀕常少亦中事情故熹於此嘗有感焉竊獨以爲今欲議四祖神位􅀁祔之宜而卒不免於舛逆而難通不􅀂還僖祖於太廟三年而一東向之爲順易而無事也熹􅀌陋寡聞􅀁見如此昨日適以衰病不及預議伏念宗廟事重不敢緘黙須至申聞者右件如前并畫到圖子四􅁓繳連在前謹具狀申尚書省欲乞并賜詳酌敷奏施行伏候鈞㫖小貼子熹謹按禮家先儒之說兄弟傳國者以其嘗爲君臣便同父子各爲一世而天子七廟宗者不在數中此爲禮之正法􅀂今日見行廟制則兄弟相繼者共爲一世而太廟増爲九世宗者又在數中皆禮之末失也故熹狀中􅀁擬太廟世數一凖先儒之說固知未必可用􅀂議者乃用今制而反不曽詳考自僖祖以至孝宗方及十世太祖太宗爲第三世尚在四昭四穆之中今日祧遷只合依孝宗􅀄年遷翼祖例且遷宣祖然後爲得乃不察此而欲一旦無故并遷僖宣二祖又彊析太祖太宗各爲一世旣與哲徽欽高之例不同又使太廟􅀁祀其實僅及八世進不及今之九退不成古之七尤爲􅆾繆無􅀁據依政使熹說迂闊多􅀁更改不可施行其議者并遷二祖析一爲二之失亦合速行改正且遷宣祖而合太祖太宗復爲一世以足九世之數伏乞詳察熹旣爲此議續搜訪得元祐大儒程頥之說以爲太祖而上有僖順翼宣先嘗以僖祧之矣介甫議以爲不當祧順以下祧可也何者本朝推僖祖爲始巳上不可得而推也或難以僖祖無功業亦當祧以是言之則英雄以得天下自巳力爲之並不得與祖德或謂靈芝無根醴泉無源物豈有無本而生者今日天下基本蓋出於此人安得爲無功業故朝廷復立僖祖廟爲得禮介甫􅀁見終是高於世俗之儒熹竊詳頥之議論素與王安石不同至論此事則􅀷服之以爲高於世俗之儒足以見理義人心之􅀁同固有不約而合者但以衆人不免自有爭較彊弱之心雖於祖考亦忘遜避故但見太祖功德之盛而僖祖則民無得而稱焉遂欲尊太祖而卑僖祖又見司馬光韓維之徒皆是大賢人􅀁敬信其議偶不出此而王安石乃以變亂穿鑿得罪於公議故欲堅守二賢之說并安石􅀁當取者而盡廢之􅀁以無故生此紛紛今以程頥之說考之則可以見議論之公而百年不决之是非可坐判矣幷乞詳察臣竊見太祖皇帝受命之初未遑他事首尊四祖之廟而又以僖祖爲四廟之首累聖尊崇罔敢失墜中間雖以世數䆮逺遷之夾室而未及數年議臣章衡復請尊奉以爲太廟之始祖宰相王安石等遂奏以爲本朝自僖祖以上世次不可得而知則僖祖有廟與稷契疑無以異今欲毁其廟而藏其主替祖宗之尊而下祔於子孫非􅀁以順祖宗之孝心也於是神宗皇帝詔從其請而司馬光韓維孫朴孫固等以爲非是力奏爭之其說甚詳然其立意不過以爲太祖受命立極當爲始祖而祫享東向僖祖初無功德親盡當祧而巳臣嘗􅀷考其說而以人心之􅀁安者揆之則僖祖者太祖之高祖考也雖歴世乆逺功德無傳然四世之後篤生神孫順天應人以寜兆庶其爲功德蓋不必身親爲之然後爲盛也是以太祖皇帝首崇立之以爲初廟當此之時蓋巳歸德於祖而不敢以功業自居矣今乃以欲尊太祖之故而必使之奪據僖祖初室東向之位臣恐在天之靈於此有􅀁不忍而不敢當也安石之爲人雖不􅀂光等之賢而其論之正則有不可誣者世之論者不察乎此但見太祖功德之盛而不知因太祖當日崇立僖祖之心以原其􅀁自但見光等之賢非安石章衡之􅀁及而不知反之於巳以即夫心之􅀁安是以紛紛多爲異說臣嘗病其如此毎恨無以正之不謂今者之來適逢此議而又以疾病之故不獲祗赴謹巳略具鄙見申尚書省乞與敷奏并畫成圖本兼論古今宗廟制度得失因又訪得元祐大儒程頥􅀁論深以安石之言爲當貼說詳盡而􅀁論并祧二祖止成八世之說尤爲明白未知已未得達聖聽欲乞宣問詳賜覽觀并下此奏别令詳議以承太祖皇帝尊祖敬宗報本反始之意上延基祚下一民聽千萬幸甚取進止乞䧏付尚書省貼黄臣竊見今者群臣􅀁議奉安四祖之禮多有未安蓋不遷僖祖則百事皆順一遷僖祖則百事皆舛雖復巧作回互終不得其􅀁安而又當此人心危疑之際無故遷移國家始祖之祀亦惑衆聽實爲非便而或者以謂前日之議巳奉聖㫖㳟依難復更改臣竊詳治平四年三月議者請遷僖祖巳詔㳟依至熈寜五年十一月因章衡王安石等申請復還僖祖又詔㳟依蓋宗廟事重雖巳施行理或未安不容不改伏乞聖照議祧廟劄子臣前日面奏祧廟事伏䝉聖慈宣諭􅀂曰僖祖自不當祧高宗即位時不曽祧壽皇即位時亦不曽祧太上即位時又不曽祧今日豈可容易臣㳟承聖訓仰見陛下聖學高明燭見事理尊事宗廟决定疑惑至孝至明非群臣􅀁能及不勝嘆仰然今巳多日未聞降出臣元奏劄子付外施行竊慮萬機之繁未及指揮欲望聖明早賜處分臣不勝幸甚取進止乞降付尚書省進擬詔意廟議劄狀并圖包括古今曲盡底藴非獨可爲今日之法亦可留備他日稽考不􅀂降出更令詳議如彼說妄便可反覆剖析以盡同異如彼說是此便不當固執如但含糊􅀡降指揮却恐不厭衆心反有輕率偏狥之誚􅀂必不欲降出再議即當擬定詔意乞降御筆指揮然終不􅀂再議之爲善也其詔意如左云昨因臣僚請遷僖祖皇帝而尊太祖皇帝爲初室將來袷享即正東向之位當巳㳟依今復思之殊有未便蓋太廟見祀九世十二室僖祖自熈寜以來尊爲始祖􅀕于初室百世不遷遇於享日即居東向之位巳合典禮有其舉之莫敢廢也太祖尚在四昭四穆之内亦未合便居初室亟正東向却使太廟止成八世而四祖不得合食不􅀂上存僖祖爲初室東向如故而遷宣祖一世於西夾室太祖太宗仁宗三室亦爲百世不遷之廟將來永不祧毁庶幾有以仰順祖宗之孝心不至妄减太廟世數且符合食之義以副朕欽承宗廟之意其月日閏十月日兩次巳降指揮更不施行山陵議狀具位臣朱熹凖尚書吏部牒十月九日􅓖宫覆按使孫逢吉狀定到太行至尊壽皇聖帝神穴事三省樞密院同奉聖㫖令侍從臺諌限三日集議聞奏臣方欲赴臺集議忽聞朝廷巳别差官前去宣諭即與衆官具狀申省别聽指揮外臣竊有愚見深恐言之不早有誤大計須至先具奏聞者右臣竊惟至尊壽皇聖帝聖德神功覆冐寰宇深仁厚澤浸潤生民厭世上賔率土哀慕宜得吉土以奉衣冠之藏垂裕後昆永永無極而因山之卜累月于兹議論紛紜訖無定說臣嘗竊究其􅀁以皆縁專信臺史而不廣求術士必取國音坐丙向壬之穴而不􅀶訪名山是以祖略苟簡唯欲祔於紹興諸陵之旁不唯未必得其形勢之善􅀂其穴中水泉之害地靣浮淺之虞偪仄傷破之餘驚動諸陵之慮雖明知之亦不暇顧群臣議者又多不習此等猥賤之末術􅀁以不能堅决剖判致煩明詔􅀶訪在廷臣實痛之其敢無辭以對蓋臣聞之葬之爲言藏也􅀁以藏其祖考之遺體也以子孫而藏其祖考之遺體則必致其謹重誠敬之心以爲安固乆逺之計使其形體全而神靈得安則其子孫盛而􅀕祀不絶此自然之理也是以古人之葬必擇其地而卜筮以决之不吉則更擇而再卜焉近世以來卜筮之法雖廢而擇地之說猶存士庶稍有事力之家欲葬其先者無不廣招術士􅀶訪名山參互比較擇其善之尤者然後用之其或擇之不精地之不吉則必有水泉螻蟻地風之屬以賊其内使其形神不安而子孫亦有死亡絶㓕之憂甚可畏也其或雖得吉地而葬之不厚藏之不􅀷則兵戈亂離之際無不遭罹發掘暴露之變此又其􅀁當慮之大者也至於穿鑿巳多之處地氣巳洩雖有吉地亦無全力而祖塋之側數興土功以致驚動亦能挻災此雖術家之說然亦不爲無理以此而論則今日明詔之􅀁詢者其得失大槩巳可見矣􅀂夫臺史之說謬妄多端以禮而言則記有之曰死者北首生者南向皆從其朔又曰葬於北方北首三代之逹禮也即是古之葬者必坐北而向南蓋南陽而北隂孝子之心不􅃘死其親故雖葬之於墓猶欲其􅀒隂而抱陽也豈有坐南向北反背陽而向隂之理乎􅀂以術言則凢擇地者必先論其主勢之彊弱風氣之聚散水土之淺􅀷穴道之偏正力量之全否然後可以較其地之美惡政使實有國音之說亦必先此五者以得形勝之地然後其術可得而推今乃全不論此而􅀡信其庸妄之偏說但以五音盡􅀋群姓而謂塜宅向背各有􅀁宜乃不經之甚者不惟先儒巳力辨之而近世民間亦多不用今乃以爲祖宗以來世守此法順之則吉逆之則凶則姑亦無問其理之如何但以其事質之則其謬不攻而自破矣蓋自永安遷奉以來巳遵用此法而九世之間國綂再絶靖康之變宗社爲墟高宗中興匹馬南渡壽皇復自旁支入繼大綂至於思陵亦用其法而壽皇倦勤之後旋即升遐太上違豫日乆以至遜位赤山亦用其法而莊文魏邸相繼薨謝􅀂曰吉凶由人不在於地不有􅀁廢其何以興則國音之說自爲無用之談從之未必爲福不從未必爲禍矣何爲信之􅀂是其篤而守之􅀂是其嚴哉􅀂曰其法果驗不可改易則洛越諸陵無不坐南而向北固巳合於國音矣又何吉之少而凶之多耶臺史之言進退無據􅀋皆如此試加詰問使之置對必無辭以自觧矣􅀂以地言則紹興諸陵臣􅀁未覩不敢輕議然趙彦逾固謂舊定神穴土肉淺薄開深五尺下有水石難以安建矣而荆大聲者乃謂新定東頭之穴比之先定神穴高一尺一寸五分開深九尺即無水石臣嘗詳考二人之言反復計度新穴比之舊穴只高一尺一寸五分則是新穴開至六尺一寸五分則與舊穴五尺之下有水石處高低齊等如何却可開至九尺而其下二尺八寸五分者無水石耶且大聲旣知有此無水吉穴當時便當指定何故却定土肉淺薄下有水石之處以爲神穴􅀡至今日前說漏露無地可葬然後乃言之耶其反覆謬妄小人常態雖􅀂不足􅀷責然其姦心乃欲奉壽皇梓宫置之水中而略不顧忌則其罔上迷國大逆無道之罪不容誅矣脫使其言别有曲折然一坂之地其廣幾何而昭慈聖皇皇后巳用之矣徽宗一帝二后又用之矣高宗一帝一后又用之矣計其地氣巳發􅂥而無餘行圍廵路下宫之屬又巳迫狹之甚不可移减今但就其空處即以爲穴東西趲那或逺或近初無定論蓋地理之法譬如針灸自有一定之穴而不可有毫􅁵之差使醫者之施砭艾皆如今日臺史之定宅兆則攻一穴而徧身皆創矣是又安能得其穴道之正乎􅀂果此外别無可求則亦無可柰何而今兩淅數州皆爲近甸三二百里豈無一處可備選擇而獨遷就偪仄於此數歩之間耶政使必欲求得離山坐南向北之地亦當且先泛求壯厚高平可葬之處然後擇其合於此法者况其謬妄不經之說初不足信也耶臣自南來經由嚴州富陽縣見其江山之勝雄偉非常蓋富陽乃孫氏􅀁起之處而嚴州乃髙宗受命之􅀖也說者又言臨安縣乃錢氏故鄕山川形勢寛平􅃉宻而臣未之見也凢此數處臣雖未敢斷其必爲可用然以臣之􅀁巳見聞者逆推其未見未聞安知其不更有佳處萬萬於此而灼然可用者乎但今偏信臺史之言固執紹興之說而不肯求耳􅀂欲求之則臣竊見近年地理之學出於江西福建者爲尤盛政使未必皆精然亦豈無一人粗知梗槩大略平穩優於一二臺史者欲望聖明深察此理斥去荆大聲置之於法即日行下兩浙帥臣監司疾速搜訪量支路費多差人兵轎馬津遣赴闕令於近甸廣行相視得五七處然後遣官按行命使覆按不拘官品但取通曉地理之人參互考校擇一最吉之處以奉壽皇神靈萬世之安雖以迫近七月之期然事大體重不容苟簡其孫逢吉􅀁謂少寛日月别求吉兆爲上此十字者實爲至論惟陛下采而用之庶幾有以少慰天下臣子之心用爲國家祈天永命之助臣本儒生不暁術數非敢妄以淫巫􅮊史之言眩惑聖聽自速譏誚蓋誠不忍以壽皇聖體之重委之水泉沙礫之中殘破浮淺之地是以痛憤激切一爲陛下言之譬如郷鄰親舊之間有以此等大事商量吾乃明知其事之利害必至於此而不盡情以告之人必以爲不忠不信之人而况臣子之於君父又安忍有所顧望而黙黙無言哉惟陛下詳賜省察斷然行之則天下萬世不勝幸甚謹録奏聞伏候勑㫖乞付尚書省臺吏之吏恐當作史晦庵先生朱文公文集卷第十五福州府學訓導舒鏊校
