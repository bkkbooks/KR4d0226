  text: 晦庵先生朱文公文集卷第五十七書知舊門人問荅
  hash: sha256:28e66efa8ce6c32f2de0463380e24f75cf59baf14fb967ff01924e32763d816e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0226_SBCK_057-1a}
body:
  text: 答林一之揆疑問兩條至誠之􅀃固難躐等􅃍論熹於四子後序中巳略言之矣不謂性命集注甚明恐未詳考之過宜且平心寛意反復玩味必當自見或與朋友講之亦必得其􅀃也答林一之所示疑義悉巳附注鄙見於其下大抵向來見賢者言語論議頗多繁雜牽連之病今者所示亦復如此此是大病湏痛掃除凡有文字只就一叚内看並不湏引證旁通如此看得乆之自直截也養氣一章却條暢所以如此只爲此章不雜其它􅀃支蔓耳此得失之證甚明不待逺求也答林一之二解垂示足見别後進學之功悲冗亡憀未暇細考然其大指似巳多得之矣但西銘中申生伯竒事張子但要以此心而事天耳天命不􅑯自無獻公吉父之惑也集注所疑亦甚精宻但天之生物不容有二命只是此一理耳物得之者自有偏正開塞之不同乃其氣禀使然此理甚明程張論之亦甚詳悉可更詳考當見其意告子之失乃是不合以生爲性正是便認氣爲性故其禀不能不同此亦當更細消詳也二十五畒爲貢恐是印本多二十字此眼前事不應如此之誤至如實皆什一之􅀃記得亦用廬舎折除公田二十畒如先儒之舊但此却只􅀃得百畒而徹耳七十而􅂇之法則湏就公田七十畒中尅除廬舎而實計則亦可揍成什一注中必是不曽􅀃此一節此間無本檢不得然此亦是大槩依約不見古法果如何且當取其大指之略通可也如來喻啇人以七畒爲􅂇此語亦踈盖貢􅂇異法貢則直計其五畒之入自賦於官􅂇法則湏計公田之中八家各􅂇七畒只得五十六畒其十四畒湏依古法折除一家各得一畒若干歩爲廬舎方成八家各􅂇耕公田七畒也如謂熹􅀃啇人九分取一周人十分取一恐亦非熹本文啇人九分取一除廬井則爲十分取一如前所云固自分明周人則郷遂溝洫用貢法而自賦自不妨十分取一唯都鄙井田用􅂇法則爲九一然如前􅀃去其廬井則亦不害爲十之一矣周人未嘗專用九一也張子遺法不可見李㤗伯平土書集中有之亦不在此然此等姑緩之亦無害正唯義理之大原與日用親切功夫不可不汲汲耳答李堯卿唐咨示及疑義已悉奉報但恐且當㩀見成文義反復玩味自見深􅃐不必如此附㑹立􅀃無益於事也安卿書来看得道理儘宻此間諸生亦未有及之者知昏期不逺正爲德門之慶區區南官亦喜爲吾道得此人也鄧守下車旣乆諸事當一新鹽筴巳囑鄭丞趙紏言之未知能勇爲否所示􅄦神之􅀃甚精更冝玩索使凡義理皆如此見得有分别而無滯礙則理其可窮矣但所云非實有長存不㓕之氣魄者亦湏知未始不長存耳答李堯卿集注仁者愛之理心之德也妄意推求其􅀃以謂老者安之朋友信之少者懐之此固仁也而亦莫非愛也親親而仁民仁民而愛物此亦仁也而亦莫非愛也所以安之所以信之所以懐之此則理也非愛也理則根原来䖏確然不可易者也愛則指其見於用者言之故愛屬乎情愛乃仁之一事理屬乎性而理乃仁道之大全故愛不是仁而愛之理則仁也理者性也愛者情也性則體情則用仁之爲道本性而該情而心乃性情之主乎主乎性則所以然之理莫不具於心主乎情則所當然之愛莫不發於心由是而理完於此由是而愛行於彼皆心有以主之則仁豈非心之德歟愛之理所􅀃近之心之德更以程子穀種之譬思之道千乗之國章集註謂五者相承各有次序竊意有土有民無非事者敬其事則心專在是􅂊敬便有信底意思民便有觀感之心不敬則心不在焉事便鹵莾便無終始全無誠意何以示信於民哉旣敬而信則主一之功到而無不慤實者其自奉必薄必能節以制度矣制度無非出於民者既知省節必是以民爲念而知所以愛之也愛之則不敢傷之必欲厚其生然非及時以耕則其生亦無自而厚故使之必不違其時矣不審於相承之意是否此等處須㸔有能如此後方能如此之意又看有能如此後又不可不如此之意反復推之乃見曲折主與尸其别如何旣設主祭於其所又迎尸祭於其奥本是一神以奥爲尊以主爲卑何也宗廟之祭設尸謂以人􅀋求之五祀有尸其義如何不是尊奥而卑主但祭五祀皆設主於其處則隨四時更易皆迎尸於奥則四時皆然而其尊有常處耳据禮家􅀃祭山川亦有尸其詳不可考矣論韶武者大槩不出揖譲征伐二條程子則兼大傳爲􅀃集注兼性之反之爲􅀃以中庸三知三行觀之及其成功一也旣謂之成功則一而見於樂又有不同之實何也莫是生知安行終不可得而並雖曰學知利行有可企及之理恐亦只是全盡得許多道理論其天成渾然處其氣象終有間否不惟大傳之􅀃不足信但看兩聖人事業氣象自是有等差如性之反之成功雖一然武王地位終是覺得有㾗迹在樊遲問知告以敬􅀑神而逺之在三代之時民間所謂􅀑神士則有五祀與其先祖此樊遲之所當祭想無後世之所謂􅁋祠者告以敬而逺莫只以五祀爲戒也然以子路請禱觀之則曰禱爾于上下神祗程子謂子路以古人之誄對則是子路但舉此誄詞謂其有此禱之理爾意不在指所禱之神以爲請否􅀑神固不謂􅁋祀然􅁋祀之􅀑神旣不當其位未能除去則亦當敬而逺之耳先生答安郷忘食忘憂是逐事上看一憤一樂循環代至今畧借一事明之學樂至於三月不知肉味此發憤忘食底意及其得之深乃曰不圖爲樂之至於斯此樂以忘憂底意想其逐事上皆有此義故一憤一樂循環代至然亦不以此而終身其言不知老之將至蓋謙巳勉人耳觀耳順從心之年樂且不可得而言况所謂憤耶此􅀃得之然亦太拘滯矣湏看它立言意思如何不可似此泥著也明道先生云百官萬務金革百萬之衆飲水曲肱樂在其中萬變皆在人其實無一事某􅀼意宅百揆總元戎之任與髙卧草廬悠然自樂者其理則一本無大小之分所謂禹稷顔回同道也萬變乃人之萬變在吾心實無一事吾之所以爲心者蓋無入而不自得素冨貴行乎冨貴素貧賤行乎貧賤而巳不審是否吾之所以爲心者如何而能無入而不自得此須意㑹不可只作閑話􅀃過便休也太王有翦啇之志而太伯不從太王欲傳位季歷以及昌則太伯遜位而去莫是翦啇之事在我雖不從而難必於後人若不遜位而去則又兄弟争國違父之命巳先失德此所以固譲也太王既有避狄之心何故又萌翦啇之志於數十年之前莫是以其理與天命推之知啇之必亡周家世世脩徳知不能違天命之眷付耶方其去􅃎也爲民之故不欲驅之􅄡鏑及其傳季歷以及昌亦爲民之故必欲捄之水火之中故避狄翦啇亦時焉耳而巳事雖不同其心則一均之爲民無所利也太伯只是不欲爲此事耳今亦未見其曲折不湏如此穿鑿附㑹也成於樂是古人眞箇學其六律八音習其鍾皷管絃方底於成今人但借其意義以求和順之理如孟子樂之實樂斯二者亦可以底於成否古樂既亡不可復學但講學踐履間可見其遺意耳故曰今之成材也難子罕言利程子謂計利則害義害義則勿道可矣罕言何也有自然之利如云利者義之和是也但專言之則流於貪欲之􅀻耳夫子教人不出愽文約禮二事在門人莫不知有此學惟顔子獨於􅀶約之間有所進有所得故高者有可攀之理堅者有可入之理在前在後者有可從而審其的之理非若其它僅可以弗畔而巳此門人之所以不可企及也此􅀃得之升堂摳衣用兩手則手中無所執矣若有贄及執圭則升堂有不必摳衣但防其不至攝齊否執圭而升則足縮縮如有循自不至攝齊矣執圭上如揖下如授既曰平衡而又有上下莫是心與手齊如歩趨之間其手㣲有上下但高不至過揖下不至過授否得之明衣之制未詳當闕答李堯卿禘􅀃舉趙伯循謂魯太廟以周公爲始祖以文王爲配趙莫只是以意推之否春秋纂例中引證甚詳毎事問之義如何蓋平日講學但聞其名而未識其器物未見其事實故臨事不得不問耳比干之忠方始謂之仁然亦只是一事之仁詳味孔子之言比干恐不是一事之仁祭有小大有天地之祭山川之祭社禝之祭又有所謂五祀之祭及先祖之祭不知隨其大小各有其神耶抑天地間只一理感通耶􅀼嘗思其􅀃天地之間自其成形而觀之或小或大不能無别故王者既爲天下之主則天地之大王者當之故王者祭天地而推之諸侯爲一國之主則境内之名山大川諸侯祭之士爲一家之法則家之有門户中霤之屬爲士者祭之若夫社禝則專爲民而設凡有土有民者莫不各有所建社禝而祭之必有祖而祖在所祭自天子以至於庻人莫不有先祖之祭若論小大之制則因王公士庻而爲之等差其祭秩不能無分别也若論其所以致祭之理則所謂如在其上如在其左右誠之不可揜處則上而王者之於天地下而士庻之於五祀祖先其感通只一理耳上蔡謂祖考精神便是自家精神即此而推天地精神便是王者精神其􅀑神之德感通之理不容有所分别也妄意推求不審是否大槩如此然更有分别曲折處宜詳味之三代革命何故要改正朔夏時既正必欲改之商周無乃好異而未盡相承之義春夏秋冬以成一􅀊此時序之正必欲改之無益於事祗見亂天時耳其改之之義謂何改正朔所以新民之耳目古人蓋有深意而子丑之月亦有可爲􅀊首之義孔子於定公時墮三都欲收其甲兵孟氏不肯墮郕圍之不克聖人舉事自是精審何故郕不肯從命及圍之又不克何也三都當墮是時又有可墮之􅀔故因而乗之孟氏亦非不肯墮但其守者不肯因喚醒了孟氏耳某徃年與先兄異居不知考禮經輙從世俗立家先龕子妄意按温公書儀立牌子不知用古尺只用匠者尺頗長大且實植於跌考用紫嚢妣用緋嚢考妣共用一木匣從上􅇁下至跌伏承台誨云而今不可動謹輙再有懇請家中所設之主既不可動尋常只講俗節之祭向来祭禮行於先兄之家時祭及禰祭某皆預陪祭執事之列自先兄去後舎姪承祭祀祧高祖而祀先兄爲禰某家中既有家先上闕高祖之祭下無禰祭於心實不安欲於時祭畢移饌一分祭高祖於某家某主之遇當祭襧之月亦欲􅀻舉禰祭如何若舉此二祭又成支子有祭庻子祭襧於禮經不合此事只合謹守禮文未可􅃍以義起也况有俗節自足展哀敬之誠乎某家中自高祖而上三墓埋沒草間高祖墓又􅀍曽叔祖以不利其房下欲改葬方發故壙見其中甚温燥倉皇掩塞墓面磚石狼籍自先世皆不及整三墓相去三四里之内又在田頭某徃来其下甚不遑安今欲重脩整春秋薄講墓祭之禮令舎姪主之不審於親盡之墓合祭否墓祭無明文雖親盡而祭恐亦無害自高祖至禰忌日之衣服飲食當如何衆子孫當何如伯叔父母兄弟孫姪嫡子衆子及再從三從巳徃忌日又當如何横渠忌日衣服有數等今恐難􅃍行且主祭者易以黪素之服可也答李堯卿前書所喻大學改字處巳報方簿矣鄭氏字不必去亦無害也盡字固可兼得切意恐切字却是盡於内之意若只作盡字湏兼看得此意乃佳耳康誥小序以爲成王封康叔之書今考其詞謂康叔爲弟而自稱寡兄又多述文王之德而無一字及武王者計乃是武王時書而序者失之向来於或問中曽有此一叚後覺其非急遂刪去之今亦不必添也但存此一句讀者湏自疑著别去推尋也答李堯卿或問所釋皆因經文獨致知舉程子五條於格物之前何也莫是格物致知亦難截然分先後故或問於此章一衮􅀃去否格物致知只是一事難分先後窮理舉延平先生􅀃推其意亦不出於程子謂其規模之大條理之宻有所不逮者莫是延平窮一事必待其融釋脫落然後别窮一事若偶於此一事尚未能􅃍爾融釋是終爲此一事所拘不若程子云且别窮一事或先其易或先其難此便是所不逮䖏否程子之言誠善然窮一事未透又便别窮一事亦不得彼謂有甚不通者不得巳而如此耳不可便執此􅀃容易改換却致功夫不專一也窮理之學於六十四卦大象便是貫通處否貫通湏是無所不通如此􅀃却拘束了經文先從明明德於天下節次􅀃來􅀃至下工夫之處始謂致知在格物又從物格知至節次􅀃去􅀃至成功之終處謂天下平所以如此反覆推􅀃者欲人知夫進功之序則不可不勉又知夫成功之終則不可不至於傳之十章則專以進功爲言蓋進功之序在學者當深知其然則成功之驗自可終耳此傳文釋經之意也此􅀃得之樂意相􅀜禽對語生香不斷􅀣交花此語形容得浩然之氣莫是那相􅀜不斷底意可以見浩然者本自聮屬又交花對語便是無不慊與不餒底意否只是大意如此難似此逐字分析也仁則通上下言聖則造其極孟子於三子清和任各以聖言之此語渉於通上下否三子清和任正是造其極處天地之塞吾其體云云塞者日月之徃来寒暑之迭更與夫星辰之運行山川之融結又五行質之所具氣之所行無非塞乎天地者塞字意得之答陳安卿淳仁字近看未審認得意是否請質諸明訓之下夫仁者天地生物之心而人生所得以爲心者其體則通天地而貫萬物其理則包四端而統萬善蓋專一心之全德而爲性情之主即所謂乾坤之元者也故於此語其名義則以其冲融􅆂育温粹渾厚常生生而不死因謂之仁人惟巳􅀻蔽之是以生道息而天理隔遂頑然不識痛痒而爲忍人人之所以體乎仁者必此身􅀻欲凈盡廓然無以蔽其所得天地生物之體其中真誠懇惻藹然萬物之春意常存徹表徹裏徹巨徹細徹終徹始渾是天理流行無一處不匝無一處不到無一息不貫如一元之氣流行無間斷乃可以當渾然之全體而無愧若一處稍有病痛一㣲細事照管不到一頃刻稍有間斷則此意便􅀻􅀻意行而生道息理便不流通便是頑麻絶愛處烏得渾全是仁如人之一身渾是血氣周流便是純無病人􅂊一指血脉不到便是頑麻不仁處顔子三月不違仁三月之後則㣲有少違然當下便覺融化依然復不見其違焉􅀼意三月之内渾是中心安仁底氣象三月之後便是勉而中否中後又不須勉但乆則又不免於有違耳志學是於斯道方識得大綱大體其心一直向乎此以求之視􅃪􅃦食講論思索無時不念念在此更不參差挿雜轉慮却顧遲回於天理人欲之間而不决此即格物致知用工處也立是於大綱大體巳把得定確然有主於中持之堅守之固而不爲外物所遷奪此即誠意正心脩身用工處也不惑是於大綱大體中又極節目纎悉皆昭晰明徹灼然真知其藴而無一理之或疑矣此即物格處也知天命是又緫其精粗大小根原所自來處全體郭然洞明而㑹萬理於一本矣此即知至處也耳順是我與理一徹表徹裏無間隔違逆聲􅂊入心便通不待吾有以􅃪於彼凡入吾聞者無非至理精義此又物格知至之熟處也從心則心體渾淪是義理如一團光潤良玉如百錬明瑩精金至是則非由我矣凡有動皆隨心之所之行便行止便止喜便喜怒便怒惻隱便惻􅀮羞惡便羞惡無不從容大道上行而莫非凖繩規矩之至絶不容一毫有我於其間此又意誠心正身修之熟處也不審如此分别得否立是物格知至而意誠心正之効不止是用工處不惑知命是意誠心正而所知日進不巳之驗以至耳順則所知又至極而精熟矣餘則来􅀃得之孔文子何以謂之文據其妻太叔事亦大節目處悖理傷義如此其他更不足道矣孔子却不沒其善而許以好學下問何也恐此句直就問謚處􅀃當時人作此謚其本意所取者在此故特因其􅀃而言之亦姑語其大槩而已非羙其有是善而許之否此章固因論謚而發然人有一善之可稱聖人亦必取之此天地之量也陳文子棄馬十乗章集注云去之它國不能審度輕重而䘚反於齊焉輕重字何所指而言之恐重只是去他國不能請方伯連帥以討崔子之罪而輕又不能終守其自㓗之節乃恋恋復反其故居云陳文子以崔子弑君而去齊可也它􅀖未有是事乃以爲猶崔子而去之所謂不審輕重者此也再斯可矣只是就季文子身上行事處􅀃在學者窮索理義則思之思之而又思之愈􅀷而愈精豈可以數限而君子物格知至者萬事透徹事物之来皆有定則則從容以應之亦豈待臨時方致其思不審此語只是文子事抑衆人通法皆當以再爲可耶不容有越思耶而程子又何故只就爲惡一邉􅀃也物格知至者應物雖從容然臨事豈可不思况未至此又豈可不熟思耶故以再思爲衆人之通法蓋至此則思巳熟而事可决過則惑矣與朋友共敝之而無憾有人實無憾朋友之心但於日間合用之物貧無財置之也艱故或敝則闕其用亦不能恝然忘情於是物而不爲之嘆惜不審此於無憾意有妨否雖無憾於朋友而眷眷不能忘情於已敝之物亦非賢逹之心也可也簡可者僅可而有所未盡之辭上句可使南靣亦有可字此可字乃實許之與下可字意不同不審以何别之可字單稱與下文有所指者不同不如樂之者此樂字與顔子之樂意思差異否較其大㮣亦不爭多但此樂之者之字是指物而言是有得乎此道從而樂之也猶樂斯二者之樂樂循理之樂如顔子之樂又較深是安其所得後與萬物爲一㤗然無所窒礙非有物可玩而樂之也發憤忘食是始者著力去求之時樂以忘憂是後来有得而安之時二者先後自不同而氣象亦自不相並按集注意是二者齊著力到老如何是二者之辯處恐在學者於此有先後之截而聖人生知安行徹始徹終渾是如此將那箇截做先將那箇截做後但以其序而言則且如是分别否抑嘗玩味此章三句固是謙已勉人如此然亦可見聖人之心别無它從生至死全渾淪在義理中相與周流不少離而身世事物之念皆灑然不凝於胷次也不審是否忘食忘憂是逐事上􅀃一憤一樂循環代至非謂終身只此一憤一樂也逐事上􅀃故可遂言不知老之將至而爲聖人之謙辭若作終身􅀃則憤短樂長不可并連下句而亦不見聖人自貶之意矣來喻未然而集注亦未盡也子食於有䘮者之側未嘗飽也子於是日哭則不歌盖胷中和樂然後於食能甘羙而飫飽臨乎哀戚之地此心爲之感動而吾之哀樂亦興然於食蓋不下咽矣豈能甘羙而飫飽也哭者哀之至弔死而至於哭必其情之厚者非尋常行弔比也其思感傷悴中情之所形必不能頓然遽釋於一哭之退而便歌樂此二者皆天理自然而然眞情自有所不忍處而非人所強爲者聖人但由天理行順之而不逆耳是謂情性之正本中而逹和而仁之所以流行者也然質之日用間則此事更有曲折如臨乎有喪者之側主人固留飲或辭之不得或與長者同行長者留則少者有不得而辭者辭以實則形主人之非禮辭以疾則僞難揜力辭而峻拒則又恐咈情而近於硜硜之信果不知如何爲當其有情輕不至於哭但以尋常行弔者恐亦不能終食之間不化或感物而􅀏樂或燕㑹於它所與夫送人之葬而與飲胙燕賔等􅀋不審有妨無妨如何若謝氏此章之􅀃其末意恐施於情厚而當哭者則未穩否聖人情性之正當於哀未遽忘處看謝氏乃以忘處爲正豈習忘養生之餘習耶聞韶忘味之􅀃亦然恐皆過矣所喻行弔而遇酒食此須力辭必不得巳而留亦須數辭先起不可􅋨飽程子曰行藏安於所遇命不足道也又謂命爲中人設上智更不言命然孔子曰天生德於予􅁊魋其如予何又曰天之未喪斯文也匡人其如予何又曰公伯寮其如命何皆斷以命而安之之辭何也命遇之􅀃望爲剖示三語皆必其不能爲害之詞與不得巳而􅃪命以自安者不同也伯夷何以只知有父命而不知有天倫叔齊何以只知有天倫而不知有父命恐是在伯夷則其兄弟係於已而父命係於公以二者權之則父命爲尊而兄弟爲卑在叔齊則其父子繫於已而天倫係於公以二者權之則天倫爲重而父子爲輕否以天下之公義裁之則天倫重而父命輕以人子之分言之則又不可分輕重但各認取自家不利便處退一歩便是伯夷叔齊得之矣胡氏春秋後有謹始例􅀃得好子路請禱集注舉士䘮禮疾病行禱五祀程子曰禱者悔過遷善以祈神之祐也范氏亦曰子之於父臣之於君有疾而禱禮之常也然世俗􅂊疾病則靡神不禱靡祀不脩此乃燭理不明而惑於􅁋恠不知死生有命在天彼沉䰟滯魄安能夀之而安能夭之是特郷閭庸夫庸婦鄙陋之見耳今子路如此舉而諸家如此􅀃則亦有此理而或可爲之耶疾病行禱者臣子之於君父各禱於其所當祭士則五祀是也子路所欲禱必非滛祀但不當請耳故孔子不以爲非而但言不必禱之意聖人憂世覺民之心終其身至死而不忘耶抑當憂世覺民非其時此意亦嘗在懷但不戚戚􅀤露也若終其身常不忘則不見聖人胷中休休焉和樂處若時或恬然不戚戚􅀤露則又不見聖人於斯人其心相􅀜甚切處若憂世之心與和樂之心並行而不悖則二者氣象又爲何如聖人之心樂天知命者其常也憂世之心則有感而後見耳君子於其所當怒者正其盛怒之時忽有當喜事來則如何應將應怒了而後應喜耶抑中間且輟怒而應喜喜了又結㫁所怒之事耶抑當權其輕重也喜怒迭至固有輕重然皆自然而應不暇權也但有所養則其所應之分數緩急不失輕重之宜耳先生嘗􅀃善人不足任道狷者剛介有守有骨肋做得事如曾子孟子皆過於剛如文帝是善人只循循自守武帝有狷底氣象足以大有爲又嘗􅀃孟子比原憲則憲狷介謹守有餘然不足以任道孟子便擔當做得事其􅀃狷字意不同何也狂者志高可以有爲狷者志㓗有所不爲而可以有守漢武帝不是狷恐聽之不審也武帝近狂然又不純一不足言也爲善則福報爲惡則禍報其應一一不差者是其理必如此抑氣􅀋相感自如此耶善惡各以氣􅀋相感而得其應便是理合如此淳向者道院中常問未􅀤之前是静而静中有動意否先生答謂不是静中有動意是有動之理淳彼時不及細審後來思之心本是箇活物未􅀤之前雖是静亦常惺在這裏惺便道理在便是大本處故謂之有動之理然旣是常惺不恁地瞑然不省則謂之有動意亦豈不可耶而先生却嫌意字何也恐意字便是已􅀤否抑此字無害而淳聽之誤也凡㸔精微處恐易差更望示教未動而能動者理也未動而欲動者意也人心是箇靈底物如日間未應接之前固是寂然未􅀤於未􅀤中固常恁地惺不恁瞑然不省若夜間有夣之時亦是此心之巳動猶晝之有思如其不夣未覺正當大寐之時此時謂之寂然未􅀤則全沉沉瞑瞑萬事不知不省與木石蓋無異與死相去亦無㡬不可謂寂然未􅀤不知此時心體何所安存所謂靈底何所􅀉寓聖人與常人於此時所以異者如何而學者工夫此時又以何爲驗也寤寐者心之動静也有思無思者又動中之動静也有夣無夣者又静中之動静也但寤陽而寐隂寤清而寐濁寤有主而寐無主故寂然感通之妙必於寤而言之昬禮用命服程子常論之矣然以得為恱言之恐渉於以利言也若其意在於為恱則終是令人有怍容不審於禮果合如何淳正月欲行親迎欲只用冠􅅁如何昬禮用命服乃是古禮如士乗墨車而執鴈皆大夫之禮也冠􅅁只是燕服非所以重正昬禮不若從古之爲正答陳安卿大學舉吾十有五章來教云立是物格知至而意誠心正之效不止是用功處不惑知命是意誠心正而所知日進不已之驗以至於耳順則所知又至極而精熟矣淳竊疑夫立者􅃀然堅固不可移奪固非眞知不能然此時便謂物巳格知巳至恐莫失之大快否又事物之理精微􅆌忽未至於灼然皆無疑惑萬理根原來處未洞見天命流行全體安得謂之知巳至曰所知日進不巳則是靣前猶有可進歩又安得全謂之至而耳順又云所知至極而精熟又何言之重􅃨也而集注於耳順條方云知之至又何也凡此皆淺見未喻抑此之㫖在聖人分上言則聖人合下本是生知義理本是昭著自兒童知巳至極本無疑惑天命全體本無蔽隔當入大學則亦漫勘驗其所以然隨衆做些小致知格物工夫雖做此工夫而與衆超越云云若以學者爲學之序言則自其志學時方一一做致知格物工夫以考察夫義理積十五年之功至於確然有立時是亦眞有所知然後能然未可便謂物巳格知巳至細思此意只得做學者事㸔而聖人所􅀃則是他自見得有畧相似處今窺測它不得也正如曾子借忠恕兩字􅀤明一貫之妙今豈可謂聖人必待施諸巳而不願然後勿施於人也然曾子所借猶有跡之可擬此則全不可知但學者當以此自考耳來教孔文子章云此章固因論謚而􅀤然人有一善之可稱聖人亦必取之此天地之量也淳謂自聖人平心泛論人物言之則凡有一善之可稱雖元惡大憝亦必取之如天地之量無所不容自學者精考人物言之則聖人所取之善當實體以爲法而其不善則亦當知所以自厲大槩是如此然不必􅀃得太過却覺張皇無􅆂蓄意思再思可矣再字未詳如何方是一畨思如何方是再畨思事到靣前便斷置了是一畨思斷置定了更加審訂是第二畨思桓魋其如予何匡人其如予何公伯寮其如命何來教云三語皆必其不能爲害之辭與不得巳而聽命以自安者不同淳􅀼謂三語皆是必其不能爲害之辭此便是聖人樂天知命處見定志􅃀斷然以理自信絶無疑忌顧慮之意雖曰命而實在主於理渾不見有天人之辨彼不得巳而聽命以自安者本不顧夫理義之當如何但以事勢無可奈何遂委之命以自遣而實未能自信乎命與聖人之所謂命者自不同程子所謂命爲中人設即此等所謂命耳故在聖人分上則此等命不足道也是則聖人之所謂命與常人之所謂命者事同而情異焉不審是否聖人所謂命者莫非理上二語是聖人自處處驗之巳然而知其决不能害巳也下一語是爲子服景伯等言知其有命而未知其命之如何但知公伯寮之無如此何耳來教論夷齊云以天下之公義裁之則天倫重而父命輕以人子之分言之則又不可分輕重但各認取自家不便利處退後一歩便是伯夷叔齊得之矣淳詳此􅀼謂諸侯􅁇世襲封所以爲先君之嗣而爵位内必有所承上必有所禀而大倫大義又不至於相悖端可以光付託而無歉然後於國爲正伯夷叔齊以天倫言之則伯夷主器之嫡在法固當立然不得先君之命則内無所承烏得以嗣守宗廟而有國也以父命言之則叔齊固有命矣然伯夷長也叔齊弟也叔齊之徳不越於伯夷其父乃舎嫡立少是一時溺愛之私意非制命以天下之公義者也亂倫失正王法所不與何可以聞于天子而撫國也此皆在巳有礙而不利便處此在伯夷所以不敢挾天倫自處以壓父命之尊只得力辭而不受而决然不敢以或受在叔齊所以不敢恃父一時之命以壓天倫之重只得固譲而不為而决然不敢以或爲此是據其分之所當然以求即乎吾心之安盖不如是則於心終不安爲伯夷者是不受之先君不受之天王而受之於弟爲叔齊者是成父之非命而于王法也豈得爲受國之正乎此􅀃得之但更㸔求仁得仁處􅄪問子路請禱大槩是如此但推得太支蔓如云禱尔于上下神祗只是引此古語以明有禱之理非謂􅁒禱于皇天后􅁟也又嘗疑集注曰聖人未嘗有過無善可遷其素行固巳合於神明故曰丘之禱乆矣夫自其論聖人所以無事於禱者其義固如此然此一句乃聖人自語也聖人之意豈有謂我未嘗有過無善可遷其素行固巳合於神明哉不審此問少曲折更何如聖人固有不居其聖時節又有直截擔當無所推譲時節如天生德於予未喪斯文之􅀋盖誠有不可揜者小學載􅁃黔婁父病毎夕稽顙北辰求以身代而全文此下更云數日而愈果有此應之之理否若果有應之之理則恐是父子一氣此精誠所極則彼旣餒之氣因復爲之充盛否抑此􅆘遭其偶然而實非􅀜於禱實無轉夭爲夀轉禍爲福之理人子於此雖知其無應之之理而又􅁍實行其禮則恐心足不相似禱是正禮自合有應不可謂知其無是理而姑爲之來教云窹􅄰者心之動静也有思無思者又動中之動静也有夣無夣者又静中之動静也但窹陽而􅄰隂窹清而􅄰濁窹有主而􅄰無主故寂然感通之妙必於窹而言之淳思此􅀼謂人生具有隂陽之氣神發於陽魄根於隂心也者則麗隂陽而乗其氣無間於動静即神之所㑹而為魄之主也晝則隂伏藏而陽用事陽主動故神運魄随而為窹夜則陽伏藏而隂主静故魄定而神蟄而為􅄰神之運故虚靈知覺之體燁然呈露有苗裔之可尋如一陽復後萬物之有春意焉此心之寂感所以爲有生神之蟄故虚靈知覺之體沉然潜􅀮悄無蹤跡如純坤之月萬物之生性不可窺其朕焉此心之寂感所以不若窹之妙而於􅄰也爲無主然其中實未嘗泯而有不可測者存呼之則應驚之則覺則是亦未嘗無主而未嘗不妙也故自其大分言之窹陽而􅄰隂而心之所以為動静也細而言之窹之有思者又動中之動而為陽之陽也無思者又動中之静而為陽之隂也􅄰之有夣者又静中之動而為隂之陽也無夣者又静中之静而爲隂之隂也又錯而言之則思之有善與惡者又動中之動陽明隂濁也無思而善􅀿與妄應者又動中之静陽明隂濁也夣之有正與邪者又静中之動陽明隂濁也無夣而易覺與難覺者又静中之静陽明隂濁也一動一静循環交錯聖人與衆人則同而所以爲陽明隂濁則異聖人於動静無不一於清明純粹之主而衆人則雜焉而不齊然則人之學力所係於此亦可以驗矣得之宰予晝􅃦云云予雖非顔閔之倫而在聖門亦英才高弟皆聖人所􅀷屬意者而予懈怠如此故云云學者自是不可懈怠非有巳前許多􅀃話也又前段云吾軄分巳脩而吾事業巳畢乎吾生巳足而吾將俯仰無愧乎云云義理無窮若自謂四事都了而可以自安則雖不晝􅃦而巳爲懈怠矣此叚大支蔓語氣頗似張無垢更冝􅀵歛就親切處㸔此事可否兩言而决耳何用如此􅀃作耶仁者先難而後􅀗先難克巳也旣曰仁者則安得有巳私恐此仁者字非指仁人而言語脉猶曰所謂仁云者必先難後􅀗乃可謂之仁仁人者正其􅁩不謀其利明其道不計其功語意正如此仁者雖巳無私然安敢自謂巳無私乎來示數卷此一様病痛時時有之又集注曰先其事之所難而後其效之所得仁者之心也此處下心字是如何豈此處便巳是仁者之心耶抑求仁而其心當如是也曉此一字未徹仁者之心如是故求仁者之心亦當如之又吕氏四句正是解此意四句然不憚所難爲一句似亦只說得先難意而後􅀗意思不切如何當時本欲只用吕說後見其有此未備故别下語又惜其語非它說所及故存之於後耳述而第三十二章旣以爲之不厭誨人不倦自許而第二章學而不厭誨人不倦集注又謂皆我所不能有或者疑聖人之意不應如此相反欲以第二章亦爲自許之詞而何有於我哉只謂其何但我有此衆人皆能如此庶前後意不相背淳爲􅀃以破之曰聖人之言各随所在而發未嘗參差挿雜當其有􅁛夫子以聖且仁者故夫子辭之而不敢當因退而就夫爲之不厭誨之不倦以自處此是爲謙之意是辭髙而就卑也及人以學而不厭誨人不倦二事歸之夫子則又辭之以我所未嘗有此時爲謙之意是辭其有能以就無能也二處之言雖相襲而意之所主各自不同不居仁聖巳爲謙矣以學不厭誨不倦爲無有又謙之謙也至於事父兄公卿一節則又謙謙之謙也盖聖人只見義理無窮而自巳有未到處是以其言毎下而益見其高也論語或問􅀃桓魋匡人不能違天害巳處此問病處亦與晝􅃦章相􅀋聖人旣知天生德於我决無可害之理矣而避患又必周詳謹宻者何耶云云此身爲天地附託至重云云患之當避自是理合如此衆人亦然不必聖人爲然也君子坦蕩蕩坦蕩二字只相連俱就氣象􅀃只是胷懐平坦寛廣否抑坦字就理􅀃由循理平坦然後胷懐寛廣也只合連􅀃㸔下文對句可見子温而厲威而不猛恭而安集注云盛德之容中正和平隂陽合徳􅀼嘗因其言而分之以上三截爲陽而下三截爲隂似乎有合然又以上三截爲隂而下三截爲陽亦自有合未知所决抑聖人渾是一元氣之㑹無間可得而指學者強爲之形容如且以其􅀃自分三才而言則温然有和之可挹而不可屈奪則人之道也儼然有威之可畏而不􅁀於物則天之道也恭順卑下而恬然無所不安則地之道也自陽根隂而言則温者陽之和厲者隂之嚴威者陽之震不猛者隂之順恭者陽之主安者隂之定自隂根陽而言則温者隂之柔厲者陽之剛威者隂之惨不猛者陽之舒㳟者隂之肅安者陽之健蓋渾然無適而非中正和平之極不可得而偏指者也此􅀃推得亦好㤗伯之事集注云云當時商室雖衰天命時􅀔猶未也大王乃萌是心睥睨於其下豈得不謂之邪志㤗伯固譲爲成父之邪志且自㓗其身而以所不欲者推之後人何以爲至徳集注所謂豈無至公之􅀃又果何如翦商乃詩語不從亦是左氏所記當時必有所据㸔書中􅀃肇基王迹中庸言武王纉太王王季文王之緒則可見矣此聖賢處事之變不可拘以常法處而太伯之譲則是守常而不欲承當此事者也其心即夷齊之心而事之難處則有甚焉尚以成父之邪志責之誤矣以能問於不能章集注採尹氏㡬於無我㡬字只就從事一句可見邪抑併前五句皆可見邪犯而不校亦未能無校此可見非聖人事顔子正在著力不著力之間非但此處可見又只就從事上㸔便分明不湏更􅀃無校之云也篤信好學猶篤行之云不是兩字並言旣篤而又信否集注云篤厚而力也何謂厚而力只是其心加􅂭重於此而又懇切於爲之旣不輕信而又不苟信否篤信只是信得牢固不走作耳未有不輕信苟信之意不輕不苟却在好學上見㤗伯第十六章蘇氏有是徳無是徳之􅀃所謂徳者是原於天命之性否徳字只是􅀃人各有長處不必便引到天命之性處也恫而不愿愿字何訓或謂謹愿則有不放縱之意或謂愿慤則有朴實之意二說各不同不審其義果如何第十七篇鄊原章亦引荀子愿慤之說二說無甚不同鄊人無甚見識其所謂愿未必真愿乃卑陋而随俗之人耳集注又曰侗無知倥倥無能􅀼意侗者同也於物同然一律瞑無識别是猶是也非猶是也倥者空也倥而又倥是表裏俱倥無寸長之實此亦因舊說以字義音韻推之恐或然耳此􅀋只合大槩㸔不湏苦推究也食不厭精膾不厭細集注云言以是爲善非謂必欲如是也􅀼謂善者㣲有未穏善者則有嘉善之意此不厭但不嫌逺而已盖聖人平日簡淡以下文推之聖人凢事子細􅀄無簡淡之意若如所說則記者當云膾不厭粗食不厭糲乃爲正理不應反作如此說也不得其醬不食集注云惡其不備也􅀼疑惡字太重似見聖人有意處惡其不備非惡其味之不羙但忘其貪味不苟食耳集注中仲尼不易爲夫子何也若如中庸第二章所辨則恐在當時爲可耳不曾如此理㑹恐亦不湏如此理㑹也中庸或問乃爲近年有以此疑中庸非子思之作者故及之耳文之爲說大要只是有文理可觀之謂盖凢義理之載於經籍而存乎事物之間與夫見於威儀華采而爲盛徳之輝光形於禮樂制度而爲斯道之顯及所引爲有文理之可觀者皆是云云物相雜故曰文如前所􅀃是也如下靣分别諸說則恐未然如曰則以學文何以見其不爲威儀華采禮樂制度耶大學疑或問云人物之生莫不得其所以生者以爲一身之主近改物字作􅀋字􅀼意􅀋字意固不重疊而字似少開不若只依物字向來改此􅀋字盖爲下文專說人之明徳故不可下物字若作物字即湏更分别人與物之所以異乃爲全備近巳如此改之矣或問云旣真知所止則其必得所止若巳無甚間隔􅀼疑若巳字辭㫖恐未明白欲改作亦非有甚間隔若字意自分明未是真無間隔也格物章或問云其所以精微要妙不可測度者乃在其真積力乆心通黙識之中此句曉之未詳此處細㸔當時下語不精今已改定或問又曰所謂豁然貫通者又非見聞思慮之可及也此句曉之未詳不審此只是方其正一一格物時猶可勉勵用工夫以格之如所謂豁然貫通處必真積之乆從容涵泳優㳺純熟不期而自到非彊􅊥力索可擬議以至耶抑是旣到豁然貫通地位便是真知透徹云云若於此而猶用力思索便是沛然自得前說只以文義推可見何待如此致疑耶或問所引書降􅂨以下八言雖皆所以證夫理而其相次莫亦有序否嘗試推之降􅂨自天賦於人而言秉彛自人禀於天而言􅂨者理之至善而無妄也彛則理之一定而有常也常即善之所爲因有是善故能常􅂨者綂言彛則指定言此二句方舉其大綱而下文則詳之天地之中綂言天地間實理渾然大中無所偏􅀝爲萬􅀖之極而萬物之生莫不以是爲樞紐也此比所謂􅂨則又加􅃀矣天命之性指是理降而在人爲賦生之全體而性則實即夫天理之中而非有二者是二言者一言天一言自天而人又所以兼明夫天賦於人而詳其降􅂨之意也仁義之心仁義乃即天命之性指其實理而心則包具焉以爲體而主於身者也此比所謂彛則又加實矣天然自有之中又細言是理之散於事物之間莫不各有當然一定之則無過無不及皆天之所為而非人之力者而其實又不外於其心此二句又就性而言合􅂨彜而結之盖萬物雖各有當然無過不及之理然揔其根源之所自則只是一大本而同爲一理也此理人物所共由天地間所公共所以謂之道而其體則綂㑹於吾之性非泛然事物之間而不根於其内也􅀼疑此下更冝以周子所謂無極而太極以包天人事物體用動静内外終始一貫爲說似於八言之下其意􅀹爲圎也而不之取不審何也當時只以古今爲次第未有此意周子語意差逺故不得引以爲證恐􅁍費注解也延平格物之說原其意亦自程子說中得之云云又嘗疑前靣反復論難專以程說爲主盖不可以復加矣至此叚引延平說則又曰有非他說所能及未易以口舌爭其辭似抑􅀭低昻有左程右李别立一家之意它說是指門人說語意自明何疑之有傳言謹獨正就誠意著工夫處說或問又就意巳誠之後說夫意之誠者旣無所不盡真能慊快充足仰不愧俯不怍到此地位其􅀔决然自不能巳矣而猶曰不敢弛其謹獨之勞焉所以防慮省察使其日新又新而不至於間斷何也恐此時所謂謹獨與向時所謂謹獨者大不同兩說不見其不同但說到此恰好著力不可間㫁耳絜矩或問云各得其分不相侵越廣狹長短平均如一此四句曉之未詳所惡乎左便是左邊人侵了自家左邊界分而我惡之故我亦不以此待右邊人而不侵他右邊之左如此方得左邊界分分明又以所惡乎右者度之方得右邊界分分明上下前後亦莫不然則四至所向皆得均平而界分方整無偏廣偏狹之病矣作新民是成王封康叔之語而或問中曰武王何也此書序之誤五峯先生嘗言之舊有一叚辨此後以非所急而去之但㸔此與酒誥兩篇只說文王而不及武王又曰朕其弟小子封又曰乃寡兄朂武王自􅁛猶今人云劣兄則可見矣周公􅀄基一節是錯簡又雜疑中庸序曰人莫不有是形故雖上智不能無人心人心只是就形氣上平說天生如此未是就人爲上說然上文又曰或生於形氣之私乃却下私字何也私恐或渉人爲私欲處說似與上智不能無人心句不相合不審如何如飢飽寒燠之􅀋皆生於吾之血氣形體而它人無與焉所謂私也亦未便是不好但不可一向狥之耳程子曰人無父母生日當倍悲痛如先生舊時亦嘗有夀母生朝及大碩人生朝與向日賀高倅詞恐非先生筆不審又何也豈在人子自已言則非其所冝而爲父母待親朋則其情又有不容已處否然恐爲此則是人子以禮律身而以非禮事其親以非禮待於人也其義如何此等事是力量不足放過了處然亦或有不得巳者其情各不同也程子以心使心之說􅀼謂此二心字只以人心道心判之自明白盖上心字即是道心專以理義言之也下心字即是人心而以形氣言之也以心使心則是道心爲一身之主而人心爲聴命也不審是否亦是如此然觀程先生之意只是說自作主宰耳貧者舉事有費財之浩瀚者不能不計度繁約而爲之裁處此與正義不謀利意相妨否􅀼恐謀利者是作這一事更不㸔道理合當如何只論利便於巳與不利便於巳得利便則爲之不得則不爲若貧而費財者只是目下恐口足不相應因斟酌裁處而歸之中其意自不同否當爲而力不及者量宜處乃是義也力可爲而計費吝惜則是謀利而非義矣中庸尚綗條以爲巳立心明之􅁚不審如何以爲巳立心明之􅁚莫是有羙在其中只要自温好不用人知否象字疑下同此說得之然更宜詳味答陳安卿㤗伯篇三分天下有其二以服事商嘗因是而推設使文王當武王之時則革命之事亦爲之否乎武王處文王之地則服事之禮亦如文王否乎􅀼恐此處皆繫乎天不由乎人使天果欲有爲則亦不容文王不欲爲天果未欲有爲則亦不容武王必欲爲聖人之心廓然太公如衡之平彼此一無所偏惟其來而順􅁠以應之耳􅀄何容心預安排指擬於其間文王武王易地則皆然不審是否此非本章正義但欲因其事變㸔聖人心耳張子謂一日天命未絶則爲君當日天命絶則爲獨夫天命絶否視之人情而巳不審一夫之心未觧還得爲天命猶未絶否抑許大公天下之命豈偏在一夫上到此則聖人用權之地惟㡬㣲義精者乃可以决之自不容以常法論也詳考詩書則文武之心可見若使文王漠然無心於天下歛然終守臣節即三分之二亦不當有矣然此等處正夫子所謂未可與權者食肉不食馬肝未爲不知味也髙堅前後大槩只是譬其無階可升無門可入無􅁚可執捉也然而考其髙堅前後之實恐亦不外乎日用行事之近即是日用間事但其理如是之髙堅玄妙耳髙是理義原頭上達處如性天道所由也堅是理義節㑹難考處如數端叅錯盤根錯節處前後是理義變化不居處仰者望而冀及之貌鑚者鑿而求通之意瞻則視之方㣲見也忽則視之又未定也此正用工憤悶懇篤之際而萬疑畢湊欲融未融之時也所謂欲罷之意亦易萌於此矣而夫子在前却循循善誘不亟不徐而教有其序旣慱我以文使我有以廓其知而無一理不洞研諸心又約我以禮使我有以㑹其極而無一理不實踐諸巳至此則堅髙前後之㫖趣要歸亦不外乎其中而有可從升之級有可從入之門有可執守之􅁚矣是以日益有味而中悅懌雖欲罷而自不能巳於是又即仰鑚慱約之功所未精宻而猶可以容吾力者一一極盡更無去處然後向之所以爲堅髙前後者始瞭然盡在目前如渠决水通大明之中睹萬􅁚真見其全體之實卓爾直立於其所昭著親切端的􅃀定而無纎毫凝礙遺遁之處矣然欲更進一歩實與夫子相從於卓爾之地則無所由盖前此猶可以用力此則自大而趨於化自思勉而之不思勉介乎二者之境所未達者一間非人力之所能爲矣但當據其所巳然從容􅆂飬勿忘勿􅂇至於日􅀷月熟則亦將忽不期而自到而非今日之所預知也不審是否卓爾即是前日髙堅前後底今㸔得􅃀定卓然爾如巍巍髙底今從頭徹底皆分明卓然盡在目中無有遺遁節㑹堅底今皆融泮自成條理卓然森列於中不容紊亂前後捉摸兩不定者今則前者灼見其卓然在前不可移於後後者灼見其卓然在後不可移於前不是髙堅前後之外别有所謂卓爾者也諸家多以前爲過後爲不及恐無此意前後只是恍愡不可認定處將以前者爲是耶忽又有在後者焉而前者又似未是皆捉摸不著若見得端的時皆是時中無過不及諸家又以卓爲聖人之中卓却是中然亦恐未可便說中則卓字意又㸔不切矣此說甚善昔聞李先生說此章最是夫子循循然善誘人慱我以文約我以禮至親切處其言有味前後固非專指中字然亦彷彿有些意思逝者如斯夫不舎晝夜嘗因是推之道無一息之停其在天地則見於日徃月來寒徃暑來水流而不息物生而不窮終萬古未嘗間斷其在人則本然虚靈知􅁴之體常生生不巳而日用萬事亦無一非天理流行而無少息故舉是道之全而言之合天地萬物人心萬事綂是無一息之體分而言之則於穆不巳者天之所以與道爲體也生生不巳者心之所以具道之體也純亦不巳者聖人之心所以與天道一體也自強不息者君子所以學聖人存心事天而體夫道也不審是否楊氏此章有不逝之說亦猶觧中庸說死而不亡之意皆是墯異端處此亦得之但范氏說與道爲體四字甚精盖物生水流非道之體乃與道爲體者也可更詳之學道立權章集注舉楊氏曰信道篤然後可與立且篤信是好學以前事旣篤信而後能好學也今此於旣學􅆘道之後􅁍言篤信何也恐信字徹首徹尾不可分先後如篤信而後好學者方只信箇大槩旣學之後而又信道篤者是真知而信之所信意味自不同其言各有主而此意所引篤字又應立字爲切否信道篤三字誠有未盡善者鄊人儺古人所以爲此禮者只爲疫癘乃隂陽一帶不和之氣㳺焉非有形􅁚附著人乃天地精􅂔所㑹故至誠作威嚴以驅之則志帥充實精􅂔彊壯自無疑忌怯懾而有可勝之理否但古人此禮節目不可考想模様亦非後世俚俗之所爲者後漢志中有此想亦近古之遺法顔子無所不說與終日不違聞一知十語之不惰等􅀋若以知上言之則此時方只是天資明睿而學力精敏於聖人之言皆􅀷曉嘿識未是於天下之理廓然無所不通猶未得全謂之物巳格知巳至而復其本心光明知􅁴之全體處盖是時猶有待於聖人之言故也至於所謂卓爾之地乃是廓然貫通而知之至極與聖人生知意味相似矣不審是否恐是如此鄊黨􅀲祭陸氏謂魯論􅀲作必而季氏一篇又是齊論則今此書非漢時魯論之篇乃後世相傳集三論皆有混其間否此雖非大義所係亦當知之何晏序云就魯論篇章考之齊古爲之注然今不可得而分矣舊亦嘗病其如此矣喜怒哀樂未發謂之中發而皆中節謂之和自天道言未發之前聖與愚同此一大本未有是四者之事而均􅆂是四者之理及其發也衆人之所自然中節處亦宛然是本底形見亦與聖人底無異自人道言則聖人未發全醒定旣發則全中節衆人未發則本然底固在而􅉂然不省其發則雖有中節時節而其不中者多矣如中庸此節四句據本文正義恐只是推原性情之本統就天道言若上文兩節乃是就人工夫言所以存中和之體而下文一節則工夫之極又所以致中和之用也然或問中曰以其天地萬物無所不該故曰天下之大本以其古今人物之所共由故曰天下之逹道則此處又不特是未分不在其中矣旣云大本逹道則無一物不在其中矣理有能然有必然有當然有自然處皆湏兼之方於理字訓義爲備否且舉其一二如惻􅀮者氣也其所以能是惻􅀮者理也盖在中有是理然後能形諸外爲是事外不能爲是事則是其中無是理矣此能然處也又如赤子之入井見之者必惻􅀮盖人心是箇活底然其感應之理必如是雖欲忍之而其中惕然自有所不能以巳也不然則是槁木死􅁅理爲有時而息矣此必然處也又如赤子入井則合當爲之惻􅀮盖人與人􅀋其待之理當如此而不容以不如此也不然則是爲悖天理而非人􅀋矣此當然處也當然亦有二一就合做底事上直言其大義如此如入井當惻􅀮與夫爲父當慈爲子當孝之􅀋是也一泛就事中又細㨂别其是是非非當做與不當做處如視其所當視而不視其所不當視聴其所當聴而不聴其所不當聴則得其正而爲理非所當視而視與當視而不視非所當聴而聴與當聴而不聴則爲非理矣此亦當然處也又如所以入井而惻􅀮者皆天理之真流行發見自然而然非有一毫人爲預乎其間此自然處也其他又如動静者氣也其所以能動静者理也動則必静静必復動其必動必静者亦理也事至則當動事過當静者亦理也而其所以一動一静又莫非天理之自然矣又如親親仁民愛物者事其所以能親親仁民愛物者理見其親則必親見其民則必仁見其物則必愛者亦理也在親則當親在民則當仁在物則當愛其當親當仁當愛者亦理也而其所以親之仁之愛之又無非天理之自然矣凢事皆然能然必然者理在事先當然者正就事而直言其理自然則貫事理言之也四者皆不可不兼該而正就事言者必見理直截親切在人道爲有力所以大學章句或問論難處惟專以當然不容巳者爲言亦此意熟則其餘自可􅀋舉矣此意甚備大學本亦更有所以然一句後來㸔得且要見得所當然是要切處若果得不容巳處即自可黙㑹矣公而以人體之故爲仁李公前所問盖以仁字純就生人之􅀋而言某謂人字不當如此說而李公以爲先生說􅂃要在人字上今承批教復未之然某請畢愚見而折􅂨焉􅀼謂此叚之意人字只是指吾此身而言與中庸言仁者人也之人自不同不必重㸔緊要􅁍在體字上盖仁者心之徳主性情宰萬事本是吾身至親至切底物公只是仁之理專言公則只虚空說著理而不見其切於巳故必以身體之然後我與理合而謂之仁亦猶孟子合而言之道也然公果如之何而體如之何而謂之仁亦不過克盡巳私至於此心豁然瑩浄光㓗徹表裏純是天理之公生生無間斷則天地生物之意常存故其寂而未發惺惺不昧如一元之徳昭融於地中之復無一事一物不􅆂在吾生理之中其随感而動也惻然有􅀮如春陽發達於地上之豫無一事非此理之貫無一物非此生意之所􅀍矣此體公之所以爲仁所以能恕所以能愛雖或爲義爲禮爲智爲信無所徃而不通也不審是否此說得之不然則如釋氏之捨身飼虎雖公而不仁矣先生批答李公有云比干不止是一事之仁􅀼謂比干不止是一事之仁只說此一事見其有仁耳盖此大節目上不昏昧則是性綱巳舉其餘自可􅀋從然詳夫子所以許之之意盖亦重在此處以是爲主而於全徳無所妨故耳固非謂止此一事有仁而其他尚有不仁處亦非謂全體渾然無􅆣而不容止以此一事偏指之也故此三仁之仁與一事之仁固異而與合下來全仁者亦自不同先生答李公又云吾之所以爲心者如何而能無入而不自得湏要理㑹􅀼謂湏是知止有定然後無入而不自得也得之然亦湏有􅆂養工夫也吕氏孟子惻􅀮􅀃云盖實傷吾心非譬之也然後知天下皆吾體生物之心皆吾心彼傷則我傷非謀慮所及非勉強所能此所謂皆吾體皆吾心者亦只是以同一理言之否非但同理亦同氣也心說維天之命於穆不巳所以爲生物之主者天之心也人受天命而生因全得夫天之所以生我者以爲一身之主渾然在中虚靈知􅁴常昭昭而不昧生生而不可巳是乃所謂人之心其體則即所謂元亨利貞之道具而爲仁義禮智之性其用則即所謂春夏秋冬之氣發而爲惻􅀮羞悪辭譲是非之情故體雖具於方寸之間而其所以爲體則實與天地同其大萬理盖無所不備而無一物出乎是理之外用雖發乎方寸之間而其所以爲用則實與天地相流通萬事盖無所不貫而無一理不行乎事之中此心之所以爲妙貫動静一顯㣲徹表裏終始無間者也人惟拘於隂陽五行所值之不純而又重以耳目口鼻四支之欲爲之累於是此心始梏於形器之小不能廓然大同無我而其靈亦無以主於心矣人之所以欲全體此心而常爲一身之主者必致知之力到而主敬之功專使胷中光明瑩净超然於氣禀物欲之上而吾本然之體所與天地同大者皆有以周徧昭晣而無一理之不明本然之用與天地流通者皆無所隔絶間斷而無一息之不生是以方其物之未感也則此心澄然惺惺如鑑之虚如衡之平盖真對越乎上帝而萬理皆有定於其中矣及夫物之旣感也則妍􅃖髙下之應皆因彼之自爾而是理固周流該貫莫不各止其所如乾道變化各正性命自無分數之差而亦未嘗與之俱徃矣静而天地之體存一本而萬殊動而天地之用逹萬殊而一貫體常􅆂用用不離體體用渾淪純是天理日常呈露於動静間夫然後向之所以全得於天者在我真有以復其本而維天於穆之命亦與之爲不巳矣此人之所以存夫心之大畧也王丞子正云㸔得儘有功但所謂心之體與天地同大而用與天地流通必有徴驗處更幸見教淳因復有後篇所謂體與天地同其大者以理言之耳盖通天地間惟一實然之理而巳爲造化之樞紐古今人物之所同得但人爲物之靈極是體而全得之總㑹於吾心即所謂性雖㑹在吾之心爲我之性而與天固未嘗間此心之所謂仁即天之元此心之所謂禮即天之亨此心之所謂義即天之利此心之所謂智即天之貞其實一致非引而譬之也天道無外此心之理亦無外天道無限量此心之理亦無限量天道無一物之不體而萬物無一之非天此心之理亦無一物之不體而萬物無一之非吾心那箇不是心做那箇道理不具於心天下豈有性外之物而不綂於吾心是理之中也哉但以理言則爲天地公共不見其切於巳謂之吾心之體則即理之在我有綂屬主宰而其端可尋也此心所以至靈至妙凢理之所至其思隨之無所不至大極於無際而無不通細入於無倫而無不貫前乎上古後乎萬古而無不徹近在跬歩遠在萬里而無不同雖至於位天地育萬物亦不過充吾心體之本然而非外爲者此張子所謂有外之心不足以合心者也所謂用與天地相流通者以是理之流行言之耳盖是理在天地間流行圎轉無一息之停凢萬物萬事小大精粗無一非天理流行吾心全得是理而是理之在吾心亦本無一息不生生而不與天地相流行人惟欲净情逹不隔其所流行然後常與天地流通耳且如惻􅀮一端近而發於親親之間親之所以當親是天命流行者然也吾但與之流行而不􅃜其所親者耳一或少有虧焉則天理隔絶於親親之間而不流行矣次而及於仁民之際如老者之所以當安少者之所以當懐入井者之所以當􅇶惕亦皆天命流行者然也吾但與之流行而不失其所懐所安所怵惕者耳一或少有失焉則天理便隔絶於仁民之際而不流行矣又逺而及於愛物之際如方長之所以不折胎之所以不殺殀之所以不夭亦皆天命流行者然也吾但與之流行而不害其所長所胎所殀者耳一或少有害焉則天理便隔絶於愛物之際而不流行矣凢日用間四端所應皆然但一事不到則天理便隔絶於一事之下一刻不貫則天理便隔絶於一刻之中惟其千條萬緒皆随彼天則之自爾而心爲之周流貫匝無人欲之間焉然後與元亨利貞流行乎天地之間者同一用矣此程子所以指天地變化草木蕃以形容恕心充擴得去之氣􅁚也然亦必有是天地同大之體然後有是天地流通之用亦必有是天地流通之用然後有是天地同大之體則其實又非兩截事也王丞批此篇後截稍近又曰天命性心雖不可謂異物然各有界分不可誣也今且當論心體便一向與性與天衮同說去何徃而不可若見得脫灑一言半句亦自可見更宜􅆂養體察淳再思之體與天地同大用與天地流通自原頭處論􅀼恐亦是如此然一向如此則又渉於過髙而有不切身之弊不若且只就此身日用見定言渾然在中者爲體感而應者爲用爲切實也又􅁴聖賢說話如平常然此二篇辭意恐皆過當併望正之此說甚善更寛著意思􅆂養則愈見精宻矣然又不可一向如此向無形影處追尋更宜於日用事物經書指意史傳得失上做工夫即精粗表裏融㑹貫通而無一理之不盡矣答陳安卿知在王丞處甚善且得朝夕講學有商量也昨所寄諸說乆巳批報但無便可􅀉今并附還又堯卿一􅁓煩爲致意達之也前此所問主祭事据禮合以甲之長孫爲之乃是若其不能則以目今尊長攝行可也如又疾病則以次攝似亦無害異時甲之長孫長成却改正亦不妨也爲僧無後固當祭之無可疑但宗祭說未暇細考後更奉報答陳安卿淳前日疑大學或問然旣真知所止則其必得所止若巳無甚間隔其間四節盖亦推言其所以然之故有此四者淳􅀼謂真能知所止者必真能得所止而定静安慮上下一以貫之當下便一齊都了中間實無纎毫間隔乃聖人地位事也上文若巳無云者其接真知所止必得所止之意誠爲快然旣曰無矣而又繼以甚者則是亦有些間隔而不甚多之辭也恐甚字與無字又不相應否然曰所以欲將若巳無字換爲非有字若之爲言似也雖似如此而其間亦有少過度處也徤歩勇徃􅀔雖必至而亦湏栘歩畧有漸次也孟子所謂盡心今旣定作知至說則知天一條當何繫屬繫之知性之下而盡心之前與知性俱爲一衮事耶抑繫之盡心之下乃知至後又精熟底事耶夫三者固不容截然分先後然就其間細論之亦豈得謂全無少别知性則知天矣據此文􅀔只合在知性裏說一之􅀉問誌石之制在士庶當如何題温公謂當書姓名恐所未安夫婦合葬者所題之辭又當如何宋故進士或云處士某君夫人某氏之墓下畧記名字郷里年歳子孫及葬之年月一之卜以三月半葬併改葬前妣祔于先塋以前妣與其先丈合爲一封􅁟而以繼妣少間數歩又别爲一封􅁟與朋友議以神道尊右而欲二妣皆列於先塋之左不審是否然程子葬穴圖又以昭居左而穆居右而廟制亦左昭右穆此意何也一之所處得之昭穆但分世數不爲分尊卑如父爲穆則子爲昭又豈可以尊卑論乎周室廟制太王文王爲穆王季武王爲昭此可考也明器亦君子不死其親之意熹家不曽用答陳安卿太極者天地之性而心之體也一元者天地之心而性情之㑹也隂陽慘舒者天地之情即性之流行而心之用也不審是否程子曰其體則謂之易其理則謂之道其用則謂之神更以此語參㸔前者納去心􅀃後來覺得首語說天心不的當今改云維天之命於穆不巳所以爲生物之主者天之心也不知是否改得語意全備甚善先生答妻父􅀑神說云所謂非實有長存不㓕之氣魄者又湏知其未始不長存爾廖子晦見此謂長存不㓕乃以天地間公共之氣體言之淳恐只是上蔡所謂祖考精神即自家精神之意耳王子合以爲二說只是一意若非公共底則安有是精神耶不審何從上蔡說是䰟魄二字向聞先生說發用處是䰟定處是魄記事處是魄小兒無記性不定疊皆是魄不足又先生答梁文叔書謂鼻之知臭口之知味魄也耳目中之煖氣䰟也淳􅀼以爲䰟不離氣魄不離體䰟則氣上一箇活處其所流行而不息發越而有生意者也魄則體上一箇精處其所真實􅃀定凝然而不散漫者也䰟魄且如此㸔不湏更支蔓言語間未能無病乆之自見得失今不湏苦求也所與王丞論者則太支離矣王丞說䰟即是氣魄即是體却不是湏知䰟是氣之神魄是體之神可也佛氏􅀃地水火風亦相􅀋月之不受日光處其魄也故十六以後謂之生魄其受日光處則其陽氣之明也故􅀄二三以後謂之生明盖日月只是隂陽之氣非實有形質也明道先生曰生之謂性人生而静以上不容說舊認作未生以前天理未有所降賦時近思此說恐㡬太過人旣未有生則不得謂之性也明矣更何待如此言耶疑此所謂以上云者似只􅀃其從未感物以前至於所以生之始云耳恐非離人言天虗說未生以前事此說費力恐只合仍舊更思之赤子之感於物自天然發處有發以人處如啞鳴震悸則天然之發也如飲乳轉盻孩􅀏者則發以人處也又有人之天處有人之人處如良知良能人之天也順情則喜逆情則怒凡其嗜好則人之人處也所以感者皆從外生所以應者皆從中出静中之知覺伊川以復言之乃其未發者也然先生復卦賛曰生意闖然具此全羙又曰有茁其萌有惻其􅀮又自有生意何也常思之群隂固蔽之中一陽之萌生生之心就本位上巳畧萌出其端但未到發達出於外耳是所謂闖然者在人則爲萬事沈寂之際其中虚靈知覺有活物者存即此便是仁者生生之心就生體巳㣲露出其端矣但未到感動出於外耳是所謂有茁其萌者與伊川說無異惻􅀮則又在茁萌巳後乃巳發見處達而爲惻􅀮也若以時運言則丑盡子􅀄爲復以月運言則晦盡朔交爲復以日運言則黒極而㣲露於東爲復在人言則赤子􅀄生者復也以神識言則神􅀄發知者復也闖字後來亦欲改之但未有穏字耳茁萌惻􅀮􅁍是正指􅀄發處日運以下有說得太遲處更消息之晦庵先生朱文公文集卷五十七終􅀘遺李堯卿問近思録生之謂性性即氣一叚此叚㸔得好更詳味之在明衣之制未詳當缺後陳安卿問子賤之成徳實出於聖門夫子歸於魯多賢者聖人謙厚於此事可見而蘇氏說恐未盡不然在一様病痛時時有之之後福州府儒學訓導鄭璉校
