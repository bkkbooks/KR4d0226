  text: 晦庵先生朱文公集卷第六詩
  hash: sha256:13298769a78cbc27d3b088f33b460f04733082c02a4025014f6b3234e59e7b10
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0226_SBCK_006-1a}
body:
  text: 和人游西巖平生壯志浩無窮老􅀉寒泉亂石中閑去披􅁭弄清泚靜來合眼􅃪玲瓏不知澗寺晴時雨何似溪亭落處風吟罷君詩自瀟灑此心端不限西東次知郡章丈遊山之韻前峰鸞鶴去無蹤邂逅荒㝷得故宫但覺風烟隨意好便驚塵􅁟轉頭空提壺命駕幽期逺授簡哦詩妙處同安得西山一丸藥共隨簫鼓向雲中題周氏溪園三首循澗闢芳園結亭對虚壁澄潭俯幽鑒空翠仰寒滴主人心事逺妙􅀉塵壤隔豈爲功名期而忘此泉石溪亭危亭竹栢間悄蒨日幽絶朔風一以厲愛此枝上雪仰悲玄景駛俯歎群芳歇不用此時來那知􅀊寒節雪亭手種籬間樹枝繁不􅃘刪新亭最佳處勝日共歡顔景晏春紅淺雨餘寒翠􅏰光風回巧􅀏桃李任漫山嫣然亭􅀉林擇之故人千里􅀉書來三復塵􅁭頓豁開勸我從容􅀷燕養莫將佔畢苦沉埋杖藜此日􅀿同趣揮麈何時得共陪珍重相期俱努力自慙殊未竭淵才送林擇之還鄕赴選三首青驪去路欲駸駸回首猶須話此心一别便成三數月有疑誰講過誰箴門外槐花似欲黄高堂應望促歸裝箇中自有超然處肯學兒曹一例忙今朝握手送君歸馬上薰風拂靣吹不用丁寜防曲學寒窓乆矣共心期題林擇之欣木亭危亭俯清川登覽自晨暮佳哉陽春節看此隔溪樹連林爭秀發生意各呈露大化本無言此心誰與晤眞驩水菽外一􅀏和樂孺聊復共徜徉殊形乃同􅃐擇之誦􅀁賦擬吕子進元宵詩因用元韻二首何處元宵好山房入定僧往來衣上月明暗佛前燈實際徒勞說空華詎可憑還教知此意妙用一時興何處元宵好寒龕獨􅄰人月窓同皎皎燈鏡自塵塵靜鑒通天地濳思妙􅀑神却憐迷路子狂走閙城闉次韻擇之梧竹二首并呈季通竹塢􅀷􅀷處檀欒遶舍青暑風成慘淡寒月􅂇清泠客去空塵榻詩來拓采櫺此君同一􅀏午夣頓能醒永日長梧下清隂小院幽自憐風嫋嫋客賦雨瀏瀏作别今千里相思欲九秋更憐同社友復此誤淹􅅏擇之􅀉示􅀷卿唱和烏石南湖佳句輒次元韻三首未識南湖景遥欣二子遊賞心并勝日妙語逼清秋䞉欲携書卷相將買釣舟㣲吟歸去晚杜􅀂滿汀洲平湖􅄅空闊積水暮生寒但見綠千頃不知􅀷幾竿人間元迫隘世路足艱難若了滄洲􅃐無勞正眼看年來年去爲誰忙三伏炎蒸忽變凉閱世謾勞心悁悁懷人空得􅁂蒼蒼詩篇眼界何終極道學心期未􅃍央安得追㝷二三子舞雩風月共徜徉小詩奉送擇之仁友赴漕臺之招後篇喜趙公之得士而不敢致私怨焉然別懷黯然不能成章亦足以見區區也二首之子論交乆􅀷􅂨兩自知提携方有賴離索遽成悲聖處應無數書來肯見私臨分莫惆悵努力共心期珍重東臺老英聲舊􅀁聞能懷􅄍哺意豈但枉書勤得士看如許持心定不群願言推此志清濁見朋分擇之賢友歸途左顧示以四明酬唱煥爛盈編三復咏嘆想見聚遊之樂輒用黄山即事之韻賦呈擇之兼懷子重老兄順之賢友十年身卧白雲堆巳分黄塵斷往回不是幽人遺俗去肯㝷流水渡關來三秋風月從頭說千里湖山覿靣開乆欲過逢須一快豈知勞結倍難裁夜聞擇之誦師曽題畫絶句遐想高致偶成小詩一幅瀟湘不易求新詩誰遣送閑愁遥知水逺天長外更有離騷極目秋次林擴之開善避暑韻二首炎官虐焰遍山村也到蕭蕭柳下門水玉秋菰那可得羡君行處午隂繁山齋幾日旱塵昏欲拂朱絃巳憚煩凉意感君持􅀉我雨聲花思滿􅅐存送林熈之詩五首君行往返一千里過我屏山山下村濁酒寒燈静相對論心􅀡欲到忘言仁體難明君􅀁疑欲求􅀡截轉支離聖言妙緼無窮意涵泳從容只自知天理生生本不窮要從知覺驗流通􅀂知體用元無間始􅀏前來說異同十年燈火與君同誰道年來西復東不學世情雲雨手從教人事馬牛風古鏡重磨要古方眼明偏與日爭光明明􅀡照吾家路莫指并州作故鄉春雪用韓昌黎韻同彭應之作旣有陽春曲那無白雪謡連天飛不斷著地煖還銷未掩高人戸難齊衲子腰稍開銀世界漸長玉枝條興盡愁煙艇行迷認野橋酒腸渾欲凍吟筆爲誰揺殘臘成三白餘寒又一朝香隨梅蘂落輕伴柳花飄神女羞捐佩鮫人敢獻綃東皇應好事避舍亦相饒次彭應之餐雪韻雪水瀹清茗自謂絶世清終然犯煙火况復勞煎烹豈如午霽餘􅊥此竹外楹柘漿發􅅴和寳盌凝寒晶心􅅐旣清凉齒頰亦鏘鳴吞腥期永謝飮玉希長生次彭應之魚樂亭韻亭前活水破輕冰漸見遊鯈傍石稜老子自知魚樂處不須莊惠與同登與劉德明祝濟之胡子寛晚歩偶成雨罷寒逾勁霜威正凛然不知荒逕濕行到野橋􅁁曠望情何極徘徊意莫傳清波涵衆影日落暗晴川劉德明彦集祝弟以夏雲多竒峰爲韻賦詩􅃧成五絶出山幾何時歸來便長夏端居心不怡散䇿長林下爲客厭城市還家辭世紛朝昏何􅀁見但有四山雲閉門事幽討􅀊月忽巳多客來無可問與君共絃歌干時本巳懶􅅐次况亡竒􅀂問中林􅃐婆娑秪自知炎蒸不可柰雲氣滿前峰向夕風吹盡㣲聞逺寺鍾仙洲新亭熹名以晝寒紫㣲張公爲書其額判院劉丈乃出新句輒次高韻二首聞說藤蘿外神龍舊􅀁蟠擘開千丈峽寫盡一􅁭寒賞􅀉三杯酒歸投六尺竿若無詩律好清絶不成歡悄蒨非人境寒蟬夏巳稠陽崖驚素雪午扇怯清秋共說新亭好眞堪妙墨留賞心元不厭仙夣肯來遊時巳聞安國之訃次韻晝寒行穿危磴盡林表見􅀌亭澗瀉千㝷白峰回四靣青塵襟元落落風腋自泠泠一醉今何許無心賦獨醒次判院丈晝寒亭韻有懷平父把酒懷人處幽㝷記往時新亭勞指顧勝踐闕追隨爲報層櫩出莫憂浮柱欹惟應舊飛雪想象合心知次判院丈清湍之什明滅青羅帶周遭碧玉環􅀌亭感陳迹茂樹喜重攀爽氣琴尊外泉聲枕簟間詩成無寫處絶壁蘚痕斑遊密菴分韻賦詩得還字我行得佳友勝日尋名山春山旣妍秀清溪亦潺湲行行造禪扉小憇腰脚頑窮􅊥意未巳理䇿重躋攀入谷翳䝉密俯澗隨泓灣誰將百尺綃掛此長林間雄聲殷地厚洪源㵼天慳偉哉竒特觀償此一日閑􅀁恨境過清悄愴暮當還顧歩三嘆息人生何苦艱遊密菴分韻賦詩得絶字閩鄕饒竒山仙洲故􅁛傑巍然一峰高復與衆山絶傳聞極目處天水逺明滅萬里倐往還三光下羅列我來發􅀌興徑欲躋嵽嵲病骨竟支離何當攀去轍次韻􅀫密菴怱作經宵别􅅐竒莫與陳暮歸誇得句寒苦頓生春道義知無斁文章自有眞它年應共說此日自由身遊密菴弱齡慕丘壑兹山屢遊盤朝隮青􅄀外暮陟浮雲端晴嵐染􅁭裾水石清肺肝俯仰未云巳􅀊月如飛翰中年塵霧牽引脰空長歎曠􅀊一登歷心期殊未闌矧此親友集􅀏談有餘歡結架迫彎碕徙􅀝臨奔湍共惜前古秘今爲後來觀落景麗雲木回風馥秋蘭林昏景益佳悵然撫歸鞍諒哉故山好莫遣兹盟寒游晝寒以茂林脩竹清流激湍分韻賦詩得竹字仙洲幾千􅌇下有雲一谷道人何年來借地結茅屋想應厭塵網􅀉此媚幽獨架亭俯清湍開徑玩飛瀑交游得名勝還往有篇牘杖屨或鼎來共此巖下􅀫夜燈照竒語暁䇿散游目茗椀共甘寒蘭臯薦清馥至今壁間字來者必三讀再拜仰髙山􅋏然心神肅我生雖巳後乆此􅀉齋粥孤興屢呻吟群遊幾追逐十年落塵土尚幸不逺復新凉有佳期幾日戒征軸宵興出門去急雨遍原陸入谷尚輕埃觧􅋔巳銀竹虚空一瞻望逺思翻蹙恧袒跣亟躋攀冠巾如膏沐雲泉増舊觀怒響震寒木􅀷㝷得新賞一簣今再覆同來况才彦行酒屢更僕從容出妙句珠貝爛盈匊後生更亹亹俊語非碌碌吾纓不復洗巳失塵萬斛􅀁恨老無竒千毫眞浪秃聞季通德明諸友入山以詩迎之仍請先徃觀瀑布勝友南窓底看書老􅀊華不因寒瀑響肯到野僧家古徑開能乆新亭去豈賖躋攀那可緩寂寞有雄夸次觀瀑布韻快㵼蒼崖一道泉白龍飛下鬱籃天空山有此眞竒觀􅀝杖來看思凛然和季通晝寒韻萬壑爭流處千年樹石幽危亭因我作勝日爲君􅅏酒􅀏紅裙醉詩慙雜珮酬尚嫌心境窄更約九垓游次韻謁忠顯劉公墓下理亂由來今古同覆車那肯戒前蹤紛紛誤國人無數不昧丹心獨此公次季通晝寒亭韻二首不信高懷與世殊清游試問與誰俱相將靜聴潺湲水洗滌塵􅁭肯自汚山行前後有光輝撲撲浮嵐翠染衣􅀡到仙洲竒絶處晝寒亭下玉龍飛飲清湍亭石上小醉再登晝寒水􅁁今日共傳杯多謝殷勤數子來三伏炎蒸那有此百年懷抱頓能開雲山合匝還生霧雪澗崩騰怒吼雷却恨蒼屏遮逺日凌風􅀡欲跨蓬萊次清湍亭韻二首上下青山今白頭穿雲入塢未能休因君去覔仙洲路却嘆周南獨􅆡􅅏仄徑穿林欲造天未妨停䇿􅃪㳙㳙知君便有刀頭意莫忘仙洲澗底泉立春大雪邀劉圭甫諸兄遊天湖同雲被四野寒氣􅃤悲凉回風一以定宻雪來飄􅀭時當冬候窮開􅀊五日彊蓬巷無與適陟此瓊臺岡賔友旣追隨兒童亦携將攀躋得􅃁頂徙􅀝聊彷徨俯視千里空仰看萬鶴翔逺迷亂峰翠近失平林蒼偃薄瑩神骨咀嚥清肝腸朗詠招隱作悲吟黄竹章古人不可見來者誰能量且復記兹日他年亦難忘次圭父游將軍巖韻二首極目危岑杳靄間誰將層棟壓巑岏瘦笻上上莫辭逺絶境行行得細􅀚眢井尚餘茅絰處考槃無復碩人寛倦來拂石支拳睡萬壑吟風午夣䦨陳迹眞成俯仰間回頭猶認碧巑岏更煩地主殷勤意得盡雲山表裏觀景晏共愁歸路逺年侵獨負酒盃寛明朝覔句酬珠玉剰喜詩情却未闌圭父約爲金斗之遊次韻獻疑聊發一􅀏幾日春風未破寒逺峰晴露玉巑岏不成蠟屐携笻去且復鈎窓拄頰觀聞道追遊當作意故應期日尚能寛隂崖凍合無垂練却恐詩翁興易䦨次彦集經營別墅之作回北成南指顧間要令華敞對巑岏家山信有千巖擁家山堂見武夷諸峯雲月何妨兩處觀傑閣巳資隣築勝熹近䝉知府掇賜舊第樓居新基還見繚墻寛老仙鶴骨殊蕭爽歸興從今豈易䦨彦集圭父擇之同飮白雲精舍以醉酒飽德爲韻熹分得飽字醉中走筆奉呈奔趨名利􅂣禍福急相絞夜窓一反側膚垢紛兩􅀲豈知親朋集晚食聊一飽心期共悠悠文字各稍稍華燭旣屢更詩腸亦頻攪寒更儘渠􅀷􅀌諷寧至卯次劉圭甫和人梅花韻意行欲遍江村路恰到詩人斷魂處梅花未肯􅀏春風蔓草何須怨零露歸來四壁無餘聲俯檻秪有寒塘青美人邂逅一􅀏粲倒影的皪踈枝横寸心乆矣遺紛雜不但老禪齋夏臘此時悢悢欲何言本根落落幾難合走遍諸君詩卷中西湖東閣病還同劃然長􅀏驚夣破碧雲散盡山叢叢平父有攀條嚼蘂繞千回日暮碧雲驚四合之向故云奉酬圭父末利之作玉蘂琅玕樹天香知見薰露寒清透骨風定逺含芬爽致銷繁暑高情謝暁雲遥憐河朔飮那得醉時聞奉酬圭父白蓮之作忽傳䕫府句并送逺公蓮翠蓋臨風逈冰華浥露鮮舞衣清縞袂倒景爛珠􅄤想象芙蓉闕冥􅁳絶世縁次圭父觀魚韻平生三伏斷追遊誰喚來穿澗樹幽初訝網横天影破忽驚人蹴浪花浮鳴榔不用齊呉榜鼓枻何湏學楚謳便有金盤堆白雪却憐清泚向東流奉同黄子厚賦白芙蓉呈劉彦集平父湛湛曲池水暁含風露清田田緑羅蓋粲粲白玉英澹然絶世姿不與穠艶并俯鑒冰雪影詎懷兒女情山中徒淹留堂下空目成獨有忘機客相看两無營觀洪遵􅀟陸譜有感呈劉平甫范仲宣二兄近從新譜識梟盧擬喚安陽舊􅀶徒只恐分隂閑過了更教人誚牧猪奴陶桓公嘗語人日大禹聖者乃惜寸隂至於衆人當惜分隂豈可逸㳺荒醉生無益於時死無聞於後是自棄也諸參佐或以談戯廢事者乃命取其酒器蒲摶之具悉投之江吏將則加鞭朴日樗蒲者牧猪奴戯耳君子當正其衣冠攝其威儀何有蓬頭跣足自謂宏逹耶次劉彦集木犀韻三首衆芳揺落九秋期横出天香第一枝莫似寒梅太􅀌絶更交遥夜􅅇中吹仙衣纔試鬱金黄便覺秋風滿院芳定觀極知先透徹通心豈是故迎將秋到寒巖桂樹叢小山吟罷思悲翁不妨更作淹留計占取人間十里風􅀉謝劉彦集菖蒲之貺二首君家蘭杜乆萋萋近養菖蒲緑未齊乞與幽人伴岑寂小窓風露日低迷泉清石瘦碧纎長秋露懸珠烱夜光箇裏無窮閑造化别來誰與共平章公濟惠山蔬四種并以佳篇來貺因次其韻蔊靈草生何許風泉古澗傍褰裳勤采擷枝筯􅅉芳香冷入玄根閟春歸翠頴長遥知拈起處全體露其常芹晚食寧論肉知君薄世榮瓊田何日種玉本一時生白鶴今休誤青泥舊得名􅀵單還炙背北闕儻􅀜情時公濟試禮部筍新笋因君􅀉康廬入夣中丹元餘故宅翠竹尚餘風日日來威鳯年年饌籜龍猶嫌有兼味不似一源功廬山簡寂觀道士陸脩静之􅀁居從逺法師蓮社之遊賜號丹元先生觀有甜苦笋今者􅀁惠乃甜笋也蕨西山採蕨人蓬首尚傾國懷哉逺莫致引脰氣巳塞頃筐忽墮前此意豈易得良遇不可遲枯笻有餘力題呉公濟風泉亭澗谷居永乆高情未云酬兹焉發天祕始造寒巖幽上有茂樹隂下有清泉流結亭􅀝蒼峭鑿磴窮嵌丘翠壁自屏立青蘚亦環周朅來憇永夏凛􅀂臨清秋仰空韻笙竽俯檻鏘琳璆幽􅃪一以㑹悠然與神謀遐哉超世心暇日聊娯憂􅀏問車馬客誰能淹此留再題呉公濟風泉亭華林翠磵響風泉竟日閑來石上眠更結危亭俯幽聴未妨長作地行仙奉和公濟兄留周賔之句丙申九日端居感時序駕言誰適從聊携二三子杖屨此日同悠哉素心人宴坐空巖中眞成三秋别夣想情何窮行行陟崇岡引脰希高風忽然两相值俯仰迷西東鱣堂偶休閒雞黍聊從容不辭腰脚勞共上西南峰佩茰􅀏長房把菊追陶公遐觀衆山逈一酌千慮融興罷復來歸杳靄秋堂空窺樽訖餘瀝􅀝閣聞踈鍾主人意未䦨驪駒勿怱怱􅀉呉公濟兼簡李伯諫五首客子歸來春未􅀷秪應寒雨罷登臨閑窓竟日焚香坐一叚􅀌明見此心三徑莓苔晝掩􅀜君來問道却空還從今蠟􅄚應無恙有興何妨再入山盤翁别去乆無書可復因循自作踈珍重􅀉聲煩問訊箇中消息定何如繁絃急筦盛流傳清廟遺音乆絶絃欲識寥寥千古意莫將新語勘塵編謂鹽官中庸憶昔殊方乆滯滛年􅀷歸路始駸駸傍人欲問蕇瓢樂理義誰知悅我心公濟和詩見閔耽書勉以教外之樂以詩請問二首至理無言絶淺􅀷塵塵刹刹不相侵如云教外傳眞的却是瞿曇有两心未必瞿曇有两心莫將此意攪儒林欲知陋巷憂時樂只向韋編絶處尋伯諌和詩云邪色哇聲方漫漫是中正氣愈駸駸予謂此乃聖人從心之妙三歎成詩重以問彼二首任從耳畔妍聲過特地􅅐中順氣萌箇裏詎容思勉得羡君一躍了平生闕里當年語從心至今蹤跡尚難尋况君􅀡至無心處肯向人前話淺􅀷游百丈山以徙􅀝弄雲泉分韻賦詩得雲字執􅀬倦煩跼駕言起宵分隨川踏暁月度嶺披朝雲攀縁白石梯拂拭蒼蘚紋噴薄驚快覿琮琤喜先聞竒哉此精廬􅆌然隔塵氛諸公肯同來定非俗子群永日坐清樾短章䇿竒勲􅁣然念疇昔聮􅅂巳荒墳中路忘磬折寸心謾絲棼惟應泉石願三生有餘薫兹游獲重㝷十載心氤氲他年訪舊躅山靈莫移文百丈山六詠石磴層崖俯􅀷幽㣲逕忽中斷努力一躋攀前行有竒觀小澗两崖交翠隂一水自清瀉俯仰契幽情神􅁭頓飄洒山門置屋两山間巧當竒絶處峽束百泉傾澗激回風度石臺出谷轉石稜俯身窺木末夕眺嵐翠分朝隮雲海濶西閣借此雲窓眠静夜心獨苦安得枕下泉去作人間雨瀑布巔崖出飛泉百尺散風雨空質麗晴暉龍鸞共掀舞游籚峰分韻得盡字蘆山一何高上上不可盡我行獨忘疲泉石有招引須􅁷出蒙密矯首眺無畛巳謂極峥嶸仰視猶隠嶙新齋小休憇餘力更勉黽東峰切霄漢首夏正凄緊杖䇿同攀躋極目散幽窘萬里俯連環千重瞰􅀌隼因知平生懷未與塵慮泯歸塗采􅅔蕨晚餉雜蔬筍􅀏謂同來人此願天􅀁允獨往㑹淹留寒棲􅅴菌蠢山阿子慕予無憂勒回軫同丘子服游蘆峰以嶺上多白雲分韻賦詩得白字登巖出􅅝塵入谷媚泉石悠然愜幽趣不覺㡬朝夕高㝷倦冡頂舊賞歎陳迹仰慙仙人杖俯愧謝公屐昨日吾弟來勇往意無斁今晨蓐食罷千􅌇一咫尺心期未究竟眼界巳開闢浮野衆麓青縈雲两川白須􅁷互吞􅄍變化巳今昔曠􅀂塵慮空悲哉人境窄平生有􅀌念萬里思矯翮感此復沖然胡爲尚形役登蘆峰行到蘆峰最上頭幾回振䇿又還休因君好句撩􅀌興却恨雲烟未肯收將游雲谷約同行者躋險擇幽棲搴蘿結茅屋䟽泉下石濞種樹滿煙谷時登北原上一騁千里目雲物下逶迤岡巒逺重複暫辭忽曠􅀊再往恨牽俗因悲昨游侣或巳在􅀑錄前年元履同游暄風悟新陽一􅀨欣衆綠明發君莫遲幽期我當卜九月六日早發潭溪夜登雲谷翌旦賦此懐山不能􅄰中宵命行軒亭午息畏景薄暮登危巒峻極踰百磴縈紆欲千盤行行遂曛黒月落天風寒羽人􅀱中塗良朋集林端問我何􅀁迫而嘗兹險艱疲勞旣云極飢渴不能言投􅋔卧中丘幸此一室寛怒號竟永夕客枕無時安旦起闢幽户竹樹青檀欒驚喜非昔覩披㝷得新觀淹留十日期俯仰有餘歡􅀉語後來子勿辭行路難雲谷二十六詠雲谷寒雲無四時散漫此山谷幸乏霖􅀨姿何妨媚幽獨南澗危石下崢嶸高林上蒼翠中有横飛泉崩奔雜竒麗瀑布峰回危逕轉垂練忽千尋不爲登山倦躊躇秋澗隂雲􅀜白雲去復還黄塵到難入只有澗水聲出闗流更急蓮沼亭亭玉芙蓉逈立映澄碧只愁山月明照作寒露滴杉逕南起雲􅀜口縈紆上草堂天風發清籟山月度寒光雲莊小丘横翠几層嶂復嵯峨釋耒閑來看巖姿此處多泉硤入􅀜但平田復此得清響何必問眞源神􅁭一蕭爽石池兩岸蒼峭石護此碧泓寒秋月來窺影驪珠吐玉盤山楹山楹一悵望恨此雲迷谷仙人不可期縹緲􅀟髻緑藥圃長鑱斸靈根蒔此泉下圃珍劑未須論丹荑巳堪煑井泉山高澤氣通石竇飛靈液黙料谷中雲多􅀿從此出西寮畬田種胡麻結草􅀉林樾珍重無心人寒棲弄明月晦菴憶昔屏山翁示我一言教自信乆未能巖棲冀㣲效草廬青山繞蓬廬白雲障幽戸卒􅀊聊自娯時人莫􅅏顧懷仙西望多竒峰北瞰獨仙府欲致武夷君石壇羅桂醑揮手山臺一揮手從此㫁將迎不見塵中事惟聞打麥聲雲社自作山中人即與雲爲友一嘯雨紛紛無勞三奠酒桃蹊澗裏春泉響種桃泉上頭爛紅紛委地未肯出山流竹塢悄蒨桃蹊北蕭槮竹塢􅀷不堪秋夜永風雨助悲吟漆園舊聞南華仙作吏漆園裏應悟見割憂㗳然空隠几茶坂携籝北嶺西采擷供茗飮一啜夜窓寒跏趺謝衾枕絶頂當年赫㬢臺移治在兹嶺寥廓無四隣三光疑倒影北澗土㫁川亦分北下成隂澗秀石得佳名服􅈾吾敢慢澗有仁義石中溪南下東嶺阿云是中溪道巖樹愛樛枝石田悲蔓草休菴别嶺有精廬林巒亦幽絶無事一往來茶􅀲不須設雲谷雜詩十二首登山夕陽翳東峰㣲月下西嶺不辭青鞋穿陟此巖路永巖路永且躋中情何耿耿值風山下風吹衣山上風㧞木茅茨何足保瀛海慮翻覆未念執鬯人無心還自恧見易傳震卦翫月風起雲氣昏風定天宇肅遥遥萬里暉炯炯穿我屋良友共徘徊山中詎幽獨謝客野人載酒來農談日西夕此意良巳勤感歎情何極歸去莫頻來林􅀷山路黒勞農四體乆不勤筋力坐駑緩何事兩山阿􅄐離豆苗滿多謝植杖翁居然見長短講道高居逺塵雜崇論􅊥杳􅄀亹亹玄運駛林林群動爭天道固如此吾生安得寧懷人吾黨二三子欲來從我遊塵機諒擾擾遐諾終悠悠空山日復晚佇立悵夷猶子厚伯崇有約不至倦遊故人千里別約我仍丹丘云何一觧散書到令人愁此山豈不幽何必賦逺遊時得伯㳟書報罷天台之遊修書紬書厭塵累執簡投雲􅀜靈鑰啓玄秘肅斧鋤幽姦書成莫示人留置此山間宴坐登山思無窮臨水心未厭沉痾何當平膏肓今自砭黙坐秋堂空遐觀靡餘念下山行隨流水聲歩出哀壑底緑樹枝相樛白澗石齒齒樹石無窮年流水日千里還家出去柴門掩歸來蕙草秋素荂林下􅄍清芬衣上浮欲􅀉山中友日暮悵離憂雲谷合記事目效俳體戯作三詩􅀉季通雲􅀜須早築基趾要堅牢栽竹行教密穿池岸欲高乗春移菡蓞帶雪覔蕭槮謂杉徑也更向􅀜門外䟽泉斬亂蒿堂成今六載上雨復旁風逐急添茆蓋連忙畢􅁟功謂柱下貼塼桂林何日秀蘭逕幾時通并築􅀟臺子東山接水筒莊舍宜先立山楹􅁍漸營泉䟽藥圃􅃳堰起石池清早印荒田契仍標別戸名想􅀿頻檢校秪恐欠方兄雲谷懐魏元履歎息艮齋老當年共此來千峰竒絶䖏一望興悠哉病怯披雲卧詩勞擁鼻裁秪今何處􅀁􅀫草閟餘哀送許順之南歸二首門前三逕長蒿萊愧子殷勤千里來校罷遺書却歸去此心元自不曽􅁅幾年江海事幽㝷偏與雲僧話此心今日肯來論舊學􅀊寒猶恐雪霜侵􅀫雲際寺許順之將别以詩求教次韻薄暮投花縣聮車入翠㣲長林生缺月永夜照寒扉情話欣無斁離懐悵有違勉哉􅆠毅力千里要同歸挽汪端明三首聖主興炎運明公起妙年材推漢庭右學自北方傳出入丹心壯安危素髪鮮空餘題劍在光燭舊林泉曠宇元無際􅀌標自不群物情良有􅀉䜛口詎堪聞未許時明政猶堪史闕文衣冠忽長夜餘子謾紛紛先友當年盛斯文元祐徒艱虞共流落存没半嗚呼顧我眞無頼逢公幸不􅀌秪今還一慟即此是窮塗彦集奉檄歸省示及佳篇次韻奉酬呈諸兄友游子思親乆聚糧不堪官裏簿書忙平生况少鷹鸇意此日尤慙時世粧臘雪未消歡奉檄春風初轉喜還鄉上堂佳慶從容問一嚼何妨累十觴彦集兄再適臨汀惠顧蓬蓽賦詩留別眷予良勤次韻祖行言不盡意賸喜君才老更成伊優叢裏見􅀌撑官身未免心徒壯親膝頻違淚欲横簿領不嫌春筍束廉聲要比玉壺清枉車投翰殷勤甚安得仁言與贈行圭父爲彦集置酒白蓮沼上彦集有詩因次其韻呈坐上諸友大阮歸來客滿堂更移芳席近回塘共憐的皪水花淨并􅀝離披風蓋凉銀筆看題青玉案佳人悵望碧雲鄉此時此景真愁絶病著無因爲舉觴􅀉題宜春使君定叟張兄隠齋此詩恐當合作一首大專槃萬生異體實同氣云胡分彼巳􅀡以私自蔽君家桂林伯德學妙一世閉戸不忘憂纓冠矧行義眷言介弟賢四益謹先􅂌千里各分符一心同盡瘁逺題齋戸冊來表棲息地系述寫心􅅐俯仰資􅅥厲陽嘉旣滌蕩隂慝失封閉介然彼苛癢嚇若我黥劓拊摩極哀恫征取敢常藝戰兢一日力洋溢四封􅀍君看物我間隠顯豈殊致願反振民功更懋根本計次韻題平父兄重建一枝堂畫㦸朱門枕碧山貂蟬元自出儒冠更餘此日林間樂逺繼當年􅂰下歡命駕賔朋千里近放懷琴酒百憂寛遺編却好傳孫子莫遣因循學宴安日用自警示平父圓融無際大無餘即此身心是太虚不向用時勤猛省却於何處味眞􅃾㝷常應對􅀹須謹造次施爲更莫踈一日洞然無别體方知不枉費功夫抄二南􅀉平父因題此詩闕里言詩得賜商子貢子夏千秋誰復與相望鄒汾孟子文中子斷簡光前載關洛張子程子新書襲舊芳析句分章功自少吟風弄月興何長從容咏嘆無今古此樂從兹樂未央題劉平甫定菴五詠定菴風生長林悲雲起空谷暝下有不死人一室常在定巢雲入山何􅀁見雲樹春􅄥􅄥安知巢居子避世於其中山臺林居厭棲迷山頂幸清曠無事一登臨却愁心浩蕩井泉開山昔何人鑿此寒泉井獨夜潄瓊瑶泠然發深省夀穴百年不可期一壑當預卜自憐木偶人空羡王官谷劉平甫席上分韻得寫字􅀊暮風雨交流雲暗平野公子燕華姻招呼及同社高情􅀉壺觴晤語到風雅剪燭夜堂深幽懐共輸寫此詩恐當作一首劉平甫分惠水梔小詩爲謝二首年來衰􅂴罷書􅁋偶向盆山􅀉此心何事凉隂老居士便分幽賞助清吟何處飛來簷蔔林老枝樛屈更蕭槮凄凉杜老江頭句坐對行吟得自箴少陵江頭五詠於梔子詩云於身色有用與道氣傷和和喜雨二絶雨師誰遣送餘春珍重天公惠我民且看歡顔埀白叟莫愁頩頰踏青人黄昏一雨到天明夣裏豐年有頌聲起望平疇烟草緑只今投筆事農耕和章國華祈雨呈平父諸兄三首極目平疇半欲枯遥知精禱意無餘更憐不待䐁蹄祝便得汙邪暗滿車九重清夜仰昭回旱魃知從何處來不是幽人祈得雨又煩丹詔走風雷晴窓揮汗苦驕陽雨檻披衣快晚凉多謝龍公餘事業爲驅寒谷變炎方山館諸兄共賦驟雨鷺鷥二絶平疇焦渴不堪論簫皷悲秋徹帝閽霹􅆮一聲雲自墨山前山後雨翻盆雨罷㣲塘凛欲秋飛來白鳥便夷猶從今認得横塘路水逺天長百不憂唐石雪中春風欲動客辭家霖潦縱横路轉賖行到溪山愁絶處千林一夜玉成花秋日同廖子晦劉淳叟方伯休劉彦集登天湖下飮泉石軒以山水含清暉分韻賦詩得清字間居寡儔侣掩􅀜抱􅀌清良友倐來止曠然舒我情矧此凉秋􅀄暑退裳衣輕相與一携手東山眇遐征前穿林嶺幽俯瞰川原平降集崖寺古徘徊濁醪傾長吟伐木篇濳鱗亦相驚願結沮溺耦窮年此巖耕淳熈戊戌七月二十九日與子晦純叟伯休同發屏山西登雲谷越夕乃至而季通德功亦自山北來㑹賦詩記事以雲卧衣裳冷分韻賦詩得冷字端莢得幽貞考槃􅀉兹嶺未成長往計抱恨中耿耿秋風吹庭樹遥夜枕席冷感彼􅀊序移􅁣此心事永明晨發孤興趣駕向絶境躋攀力雖倦想象意逾騁雲山一以眺俯仰疑倒景檢校石田􅀵眷戀茅屋静淹留復未遂外物愧張邴珍重同來人妙語各清整擊節三嘆餘超然得深省􅀫黄沙以山如翠浪湧分韻賦詩得如字日中秣吾馬日暮膏吾車﨑區渉南嶺浩蕩凌八嶇夜雨薦峰前朝登碧琳瓀蒼茫永歗罷翕忽清景徂去此二三子我行將焉如崔嵬正丘垤萬里思南圖雲谷次呉公濟韻昔營此幽棲邈與世相絶誓將百年身來守固窮節心期苦未遂􅀊月一何闊終然匹夫志肯遽􅅴没没兹晨復登瞰目盡雲一抹激烈永嘯餘朗寥高韻發夫君内德備不學王駘兀觀心見參􅀝出世自英傑朅來肯顧我同去弄雲月㣲言得􅀷扣大句亦􅀌㧞多謝警踈慵未敢嘆瞻忽更問毫􅁵間是同端是别􅀫休菴用德功壁間韻贈陳道人暮入千峰裏寒棲一草菴室連丹竈煖厨引石泉􅅴塵慮紛難到神光暖内含非君有道氣􅀌絶詎能堪挽劉樞密三首天􅂌經綸業家傳忠義心謀謨經國逺勲烈到人􅀷廊廟風雲斷江湖􅀊月侵一朝成殄瘁九牧共沾􅁭談􅀏平蠻䇿焦勞振􅅒功復讐乖􅀫志􅃘死罄餘忠人嘆百身贖天悲一鑑空九原終莫起千載自英風久矣身無用前恩嘆莫償豈期今老大復此重悲傷淚向遺書盡心隨􅀫草荒諸君那不死慟絶􅁂成霜武夷七詠天柱峰屹然天一柱雄鎮斡維東秪說乾坤大誰知立極功洞天絶壁上千㝷隱約巖栖處笙鶴去不還人間自今古畫鶴誰寫青田質高超鴈鶩群長疑風月夜清唳九霄聞仰高堂靣勢來空翠哦詩獨好仁懐人今巳矣誰遣棟梁新此堂與迎緑亭皆劉建康􅀁名禮記引高山仰止景行行止之詩而曰詩之好仁如此趨眞亭危亭乆巳傾秪有頽基在何事往來人不知容􅁂改大小藏巖藏室岌相望塵編何莾鹵欲問伯陽翁風煙迷處􅀁丹竈仙人推卦節煉火守金丹一上煙霄路千年亦不還壬子三月二十七日聞迅雷有感誰將神斧破頑隂地裂山開􅀑失林我願君王法天造早施雄斷答群心晦庵先生朱文公文集卷第六考異和人游西巖澗寺一作澗樹題周氏溪園三首一無後一首次韻梧竹檀欒一作團欒慘淡一作慘澹次開善避暑韻花思滿􅅐存一作花氣滿思存送林熈之妙緼一作妙蓄只自一作合自􅀂知體用元無間一作􅀂明體用眞無間晚歩偶成雨罷寒逾勁一作雨歇寒逾勁暗晴川一作倍澄鮮和晝寒韻爭流一作爭陳樹石一作謝石謁劉公墓誤國一作迷國此公一作我公次彦集別墅信有一作倍有次和人梅花韻本根一作本願蔊芳香一作芬香翠頴一作秀頴芹􅀵單一作􅀵功筍籜龍一作伏龍􅀉呉公濟客子一作投􅌧秪應一作秪因罷登一作倦登從今一作只今􅀉聲一作􅀉音年􅀷一作年來欲問一作􅀂問游百丈山隨川一作隨風石臺出谷一作山谷同丘子服游蘆峰兩川一作滿川杉逕南起一作晨起桃蹊裏春一作東春絶頂移治在兹嶺一作移來名此嶺休菴林巒一作林澗值風山上一作山中謝客酒來一作酒至頻來一作煩來修書雲􅀜一作靈關定菴山臺林居一作林中雲谷次呉公濟韻觀心見參􅀝一作秉心極清淨世自一作世有更問一作且問福州府學訓導舒鏊校晦庵先生朱文公文别集卷第六書林擇之用中以下文公之曾遜濬家藏録藁某侍旁粗安早稻旣登民饑亦少瘳矣然朝廷所遣使者方來所至掲榜施米十日市井游手及近縣之人得之深山窮谷尚有飢民却不沾及然所謂十日亦只虚文只軺車過後便不施矣其實亦無許多米給得也世衰俗薄上下相􅀩無一事真實可歎可歎長沙人來得南軒兄弟湘西朋友書有吾友書四封一角來人云自經由古田今并附此令自徃相尋也書中所論疑義如論浩然之氣處極好盖餒則便是缺了此正氣而氣之本體常浩浩然也但自家身上自間隔了耳不知賢者以爲如何其他不能遍論以去人立索書不能子細也書來并爲詳論之文定祠記知言序遺書二序并録呈和章想書中自有更不冩去祠記渠令爲看未穩處讀之數過但見叢雜難整頓煩子細僉出及注合作如何改易附逓來漕司東㕔令轉致此南軒甚欲速得之語張帥改定冩來芮漕處也三序并告參詳喻及幸更呈諸同志議之旣欲行逺不厭詳熟也千萬并祠記發來林擇之巳經新歳學不加進而年􅀊日侵甚可懼也承昏期在􅀊裏想􅇺老人之意又聞葺居奉祀并講盛禮想營治不無少勞適此涸轍不能少奉助爲愧耳文王之事考之詩書誠如所疑然此馬肝之論也不若姑闕之以俟來者不必身質之也問答方得草草一閱俟徐看有疑耶報去偶此􅀊首多事未暇也南軒一書比亦附致尤川不知逹否聞欲來延平别石丈能與擴之垂興一來相聚數日否及諸朋友在此得一講論亦快事也擴之不及别書承書并􅀉元禮耕老書信巳領所欲言者不過如前更不及别狀樓名旣犯朋友尊長名則亦難用况稠乃木稠非雲稠也更可得一二見報當爲擇其安者林擇之某憂苦如昨至節復不逺痛割不自堪幸朋友不鄙棄責以講習怱怱度日且復支持耳擴之來此相聚極有益其專志苦學非流輩所及但於展拓處終未甚滿人意耳昨欲徃臨安以資用不饒又南軒蹤跡不定且令中輟今却欲且歸而􅀊暮復来再三留之以其歸省之意甚堅不免聽之此間事渠必能一一言之不復縷縷但元履適過此云得其子九月末書南軒求去不􅀗數日甚撓此極知其必然不知渠又何以處之尚幸擴之之輟行也来書所論數條有未合䖏别􅁓具之但􅁴大槩氣象有粗踈䖏不知何故如此似更冝警省也某近覺向来乖繆䖏不可縷數方􅅥然思所以自新者而日用之間悔吝潜積又巳甚多朝夕惴懼不知所以爲計若擇之能一来輔此不逮幸甚然講學之功比舊却覺稍有寸進以此知􅀄學得些静中功夫亦爲助不小尚恨未免泛然應接不得專一於此耳林擇之經說依後書所定甚善但止謂之經說不同諸字尤好又春秋傳序四字不湏别出但序文次行不湏放低則自然可見論語􅀃下不湏注孟子附字又欲移禮記作第七卷而第一行下著二先生三字其後却題明道先生改正大學伊川先生改正大學其小序則仍舊附於第六卷尾論孟說後盖此六卷乃其本書而後一卷今所附者使不相亂乃佳也更白鄭丈看如何向借劉子駒本改字多是胡家改定者非先生本書今不必用然恐有合參考者偶此本在家中今令此人去取納上更仔細啇量爲佳外書旣未備不欲遽出此事正不湏忙今草草做了􅀅來有不如意又不免更易傳者人人殊異無復可信天下後世非所以爲乆逺計也并白鄭丈看如何示及爲幸孟子觧此亦見從頭看起未容􅀉去更俟幾日也林擇之某竟不免爲此來􅀄到事多殊不堪今漸定疊矣但野性危蹤皆非冝乆於此者見爲此􅀖料理减稅事旦夕剡奏列上即繼以奉祠之請矣得否未可期但若不去必無好出􅂣盖巳有氣􅀋不同望風相疾者此要爲不足恤然亦何苦􅀅身博彈射耶云云來此間非案牘即有賔客之擾比於退食則形神俱憊只得瞑目危坐􅀵拾魂魄以待事之復来殊不得看一字平生論著用盡心力皆巳有緒今乃墮此紛擾中不得卒其業精力又巳衰耗如此大以爲懼朋友中有知識者亦皆爲某危之乃知伊川先生做得易傳却是得涪州一行氣力也擇之彼中相從者有可與進於此者乎此中一旬兩到學中然殊未有慰人意䖏未去之間亦且試撈摸看若幸指撥得一二人亦是一方乆逺利害也林擇之某所請竟未報元履傳聞有添差台學之除此不待其自請而撃逐之當路聽言待士之意可見矣所示諸􅀃皆甚精然鄙意有未安者别帋具之擴之亦有說當自封去因来幸反復之以歸至當計此所校亦不多但却是不容小差䖏望速垂報也見喻太着之病此不能無但與其浮泛無根不如脚踏實地爲有進歩䖏耳祭儀藁本納呈未可示人且煩仔細考究喻及日暦中事雖不多然可以􅀘事實之缺此書異時要湏别刋乃佳耳知與諸賢遊從日有直諒多聞之益甚善甚善數詩皆佳率易和去不成言語勿示人也伯山家事如何晞之似亦曾相見来今不記仔細也伯山質實可愛敬但亦染禪學耳向與深卿書乃附劒浦劉親不謂留滯至今欲撿藁本再録去又思擇之所以告語之者必巳甚悉而不能廻則此書雖逹亦未必有效耳今且煩致意但信得孔孟程子􅀃話及時試􅀅許多詖􅁋邪遁說話權行􅀝閣一兩年却就自家這下實做工夫看湏有些巴鼻也今只􅃹狐惑不肯放捨又引明道少時出入釋老之事以飾其􅀃何不􅀅它平生說話仔細思惟看他所以岀入釋老䖏與自家只今全身䧟溺䖏是如何而直爲此倀倀也又如前書所論馮道吕舜徒事此尤害理曾與之劇論否此等處不理㑹則朋友之職廢矣發明義理此亦有之向来何故不曾見渠家似此文字固自有好處尚多向見汪書甚珍秘之然便只向這死水裏渰殺則更無超脫䖏矣不知世間見有六經語孟程子文字旣有志於學因甚不向裏靣做工夫而􅀵拾此等以爲竒特枉􅁍身心可歎可恨也靜勝軒録却未見之如文字不多幸爲録􅀉此近於蔡季通䖏見庭聞藁録一篇乃楊昭逺記􅀛山所舉二先生語殊無精神悶人看不得不知静勝之說又如何耳前日劉子澄􅀉得榮陽公家傳即吕原明也中數叚来一叚􅀃吕􅀄學於伊川後與明道橫渠李公擇孫莘老遊所見日益廣大然公亦未嘗專主一􅀃晚更從高僧宗本脩顒遊觀此則吕家學問更不湏理會直是可以爲戒亦不可不使深卿知若不信則無如之何也拙齋有何說數詩幸早示及籍溪行狀更爲促深卿早冩􅀉来舜臣相見未向逓中亦附書矣項􅁺果如何若果有志當痛與說恐頽波之中救得一箇半箇亦非細事也前書􅀃有一賢宗室從来復相從否福州有一同年趙彦德任丈之甥氣質亦甚好但一向習詞科頃嘗畧勸之聞今年又往試可惜錯了路陌也近聞張安國消息極不佳果如所傳亦可惜耳南軒乆不得書不知爲况復何如所論異同䖏亦未報不知後来看得又如何也深卿詩市㕓差可隱未暇泛滄洲此兩句便是箇因循猶豫㡳意思冝其不能勇猛自􅁬於異學之中也擇之押此韻䖏正中其膏肓不知渠還覺否此亦是偏䖏然吾儕中人之質若無這箇意思定是埋沒了出頭不得也林擇之深父遂死客中深爲悲歎其弟巳爲了後事過此無以助之又此數時艱窘不可言向来府中之謉自正月以来辭之矣百事節省尚無以給旦暮欲致薄禮比亦出手不得巳與其弟說擇之䖏有文字錢可就彼兊錢一千官省并巳有狀及香茶在其弟䖏煩爲於其靈前焚香􅀧茶致此微意累年相聞而不得一見甚可恨也林宰興學之意如何可尚可尚但聞其非乆受代亦湏得後人信得及乃佳不然恐徒費力而爲主其事亦難爲進退耳擇之巳辭尤川耶彼學中今復何人料理欽之寛中諸人能左右提挈否石􅌠乆不得信不知其子病如何文字錢除前日發来者外更有幾何在彼擇之爲帶得幾過古田千萬早示一數於建寧城下轉托晉叔􅀉来爲幸或巳去手能爲􅀵拾專雇一穩當人送来尤便此中來手以俟此物之来然後可以接續印造不然便成間斷費力也千萬早留意爲妙湏知昨巳修定送伯諌䖏未取大率事體亦只如所示但條目差分明耳欽夫屢得書有少反復議論未及録去其大槩曲折亦非靣未易布也力行固不易而講論要得是當亦復如此之難可歎可懼渠所論如云論孟序中不當言漢儒得其言而不得其意盖漢儒雖言亦不得也不知擇之以爲如何某則絶不愛此等􅀃話前輩議論氣象寛宏而其中自有截然不容透漏處豈若是之迫切耶近又得皇王大紀諸論其間大有合啇量䖏不但小小可疑而巳此間朋友亦無甚進益不知擇之比来功夫如何甚欲一見而相去益逺無由會靣此情郷往殆不自勝也向来召命屢下旣懇辭之又託人宛轉近得諸公消息似巳許其辭矣此事只得如此而貧病殊迫亦只得萬事减節看如何欽夫頗以刋書爲不然却云别爲小小生計却無害此殊不可曉别營生計頋恐益猥下耳林擇之歸自政和住家十餘日􅀕祀賔客書問之擾不得少暇固無暇讀一字書今又當出崇安見新守令石宰相招極欲往觀盛禮及與朋友相聚講論而日月匆卒如此無縁去得甚以爲恨不知擇之能撥忙一行否昏期旣在後月度尚可一行也擴之􅀉来文字皆巳領前便承􅀉海物􅀹愧感也中庸因論致曲而能有誠然自明能動人以下巳是誠之成功孟子所謂至誠而不動者未之有也亦可見矣盖生知學知雖異然及其知之成功則一而巳通書正用此意然下文擬議便是致曲之事亦若無異䖏也無所不用其極之說甚巧然恐其本意未必果出於此必不可通闕之可也大學正經云云亦以意言耳傳中引曾子曰知曾式門人成之也南軒語解在尤川未到所論大槩甚當鄙意正如此又言行録流布甚廣其間多合啇量䖏中間以書告之然不勝毛舉近得報云欲改數䖏亦未妥帖要之此書自不必作旣作而􅃍刻之此尤非便昨日得伯諌書亦深議此事也近與伯恭往返議論稍多此人却向進未巳今日臨行無暇録􅀉俟後便也林擇之聞學中巳成次第甚善但尤川學者不無恨於遽去耳更能到彼少留以慰其意否若能因遂過此小欵旬月尤所望也某此如常所欲言者前書巳具之矣游成之来訪其人開爽有用之才也極可喜可喜然更能加沈潜義理工夫所就當益可觀耳渠到此之日擴之亦來得數日遊談少快幽欝之懐但聞浙中學者議論多端亦殊使人憂悶耳以此深欲早就前書之志庻幾小􅀘於世不爲天地間一蠹物者而理義未精日力不足爲之柰何林擇之辱書如講學有緒深以爲慰是日偶與元履及諸朋友在鑪􅈐新庵共増懐想也縣學湏知甚精宻但冩得未有倫理方欲爲畧整頓㑹少冗未暇也所論仁恕之􅀃恐不必如此立說只當以語解爲正遺書所云或是一時之說不必如此牽合􅀘綴也午節在近想湏歸省古田旣未可必即不若且來尤溪耳精義印造未辦辦即如所喻也游成之甚欲一見之恨相去稍逺耳彪德羙赴省回過此相見得一夕欵只是舊時議論且云欽夫見大本未明所以􅀍人轉却亦聞擇之所在恨不一見也林擇之某此碌碌如昨無足言但獨學不長進而逺近朋友亦未見超然有所造詣者􅀊月如流良可憂懼耳擇之尤川留幾何時所論何事此亦乆不得書矣因便仔細報来還家巳來爲况又何如日下作何功夫亦可一一報及相去旣逺難得相聚相聚往往又不能盡所懐别後令人常有耿耿不滿之意後會不知復在何時又不知便得相見果能彼此廓然無許多遮障隔礙否它人固難語此而於擇之猶不能無遺恨不知擇之又自以爲如何也二余在此日乆占之警敏彞孫淳静皆可喜但亦未敢與說向上去恐别生病然又似太冷淡今其告歸云過邑中湏爲一兩日留可更與切磋也熈之不及别書相見煩致意擴之亦然得婺州報云薛士龍物故甚可傷而不及識之尤可恨也尤溪學記及克齋記近復改定及改去􅀊仁說答欽夫數書本欲冩去而二公行速不暇且􅀉欽夫語解去看畢􅀉還并論其說林擇之某哀苦之悰秋來増劇頋念日月易得而音容邈然發於夢寐尤痛切不能堪也此間諸人相聚自五月以後以季通大病無甚倫理近又以事歸旬日間復来便爲入城計亦無復講論之暇矣南軒竟不免去國道之難行乃如此可歎可歎􅀄意其自上饒歸可以一見今却由浙中水路還湖外又聞少留吴興避暑不知果如何渠在榻前儘􅀃得透􅀄謂可以轉得事機要是彼衆我寡難支撑耳林擇之聞縣庠始教閭里郷風之盛足以爲慰所示文字皆甚佳深父埋銘讀之使人惻然興於朋友之義荅問後便多􅀉使得反復爲佳恐有建寧便只􅀉晉叔䖏可也承許見訪因徃尤川甚善但經營創始之勞如此未能數月而林宰觧官擇之辭職畫一之規又􅀅安所付授耶湏及此物色得可相繼者庻幾不虚費賢宰許多心力啇量爲佳近看中庸於章句文義間窺見聖賢述作傳授之意極有條理如繩貫棊局之不可亂因出巳意去取諸家定爲一書與向來大字章句相似未有别本可􅀉只前日畧抄出節目今謾􅀉去亦可見其梗槩矣論語未知焉得仁後来竟如何􅀃因来幸詳及然此湏與雍也仁而不佞孟武伯問三子原憲問克伐怨欲不行夫子不爲衞君殷有三仁管仲如其仁數章相貫推說方見指意耳吾斯之未能信斯字何所指而言或云自指其心然否晝寢之義孰安凡皆望思之見報林擇之師魯深父皆有書來相属勤甚吾友相聚之乆視此凡陋寧堪諸賢許與之過耶師魯􅀉來論解數篇極佳未暇細讀巳􅁴儘有合啇量處旦夕因書相與評之又看如何擇之所造想日深累日不聞益論塵土滿􅁭矣林擇之得欽夫書論太極之說竟主前論殊不可曉伯恭亦得書講論頗詳然􅀹鶻突問荅曲折謾録去一觀遣人遽不能盡録其大槩是如此欽夫云巳得擇之前書亦殊不以爲然也拙齋深卿近有何議論某向答深卿書渠以爲如何前日方答此書了李伯間來訪劇論兩三日舊疑釋去遂肯盡棄所學而從事於此乃知此理卒不可得而殄㓕彼迷溺而不返者亦可憐矣近何叔京過此少留未去伯間季通皆来集講論甚衆恨擇之不在此耳適因舉滿腔子是惻隱之心江民表云腔子外是甚底請諸公下語巳各有說更請擇之亦下一語便中早見喻也石子重得書云來年赴官欲約擇之相聚不知能赴其約否某意甚欲相挽一來而卒不可得爲恨耳擴之得安信否比年氣體如何前欲此來今極暑未可動秋冬間能同一來慰此哀苦否墳所巳畧就緒儘可相聚矣陸崇安相㑹否渠今冬必來赴官某表兄丘子野欲求一依託書館處不知渠請人否告爲託朋友宛轉問之便中見報此兄近日爲况益牢落欲此甚急幸千萬留意或託拙齋深卿問之尤佳林擇之得失旣徃不足言正惟立身行道是乃榮親之大耳比來少得通問而累書無所講論不知進學功夫如何深以爲念也此間朋友亦無與薦者但邵武饒克明赴省前日過此耳季通伯謨皆苦貧極無憀也某不敢受俸乃以無太府暦頭於法有礙非敢以爲高而時俗巳不相察况其大者可歎可歎遊山開正即行承有偕行之意甚善但恐來巳不相及然某過衢信到婺女湏少留能來彼相及亦佳耳欽夫書適有便巳發去渠得疾之由􅀃者多端似亦非一朝一夕之故所由來逺矣近數得書云安徤勝前此必病起過意􅀅護之力也今日聞有静江之除盖近日羣小屢有敗露上意必是開寤思向日之言故龔實之入參時事似欲小變未知竟何如耳此間文字亦未有緒通鑑功夫浩愽甚悔始謀之大銳今甚費心力然業巳爲之不容中輟湏來年春夏間近入山僧寺謝絶人事作一兩月期畢力了之乃可盖心力不強其間稍似間斷便覺條例不貫故湏如此耳林擇之某杜門如昨無足言者但吾人罪戾蹤跡顯不可揜只得屏跡念咎切不可多與人徃來至如時官及其子弟賔客之属尤當逺避勿與交渉乃可自安此不惟擇之當深戒之如充之亦不可不知此意也林擇之某區區粗遣無足言者但齒髪日衰德不加進日􅀒憂愧耳潘丈處人巳歸欲俟秋冬遣人相取想所報書自言其詳矣如此却得且從容家居區處庻務亦是一事但郡中之約恐又不得不應切湏審䖏使乆逺無悔吝乃佳耳必不得巳入學亦不妨只要自處得是當此更在子細也趙帥乆不得書湖事想巳畢自此宜且安静勿興功役爲佳相見亦可力勸之也渠昨許草堂之貲因話爲扣之然不可破官錢恐又作鄭景望也林擇之福公爲賦武夷詩押舞雩字更和不得遂至今未得報謝其書兩日前方和得成亦不免只躡故迹欲作書煩附逹之恐巳歸旦夕自别宅去也造屋事得帥且止之甚善昨􅀜自思量許多紛紛都從十二詠首篇中一我字生出此字真是百病之根若斫不倒觸䖏作災怪也黄啇伯以下見南康集某俯仰塵俗日􅀒初心率意妄行無所聞過自决其不可乆於此但以向議陳請一二事計論未備牽留至今此數日來奏牘始具一二日遣行即并上請祠之章矣姚泉近方歸番陽木炭之請亦未果往亦三五日間中行也老兄下車巳乆學中規範計當一新所以爲教使之聞之諸生莫亦有可與進於此者否此中課程不敢懈然亦未大有益爲可懼耳門不逺計常通問恐於鄙繆中政或有所聞人還禹批誨至懇至􅈤愚頓見事極遟非靣命提耳反復諄悉不能諭切幸不惜痛言之也某欲借盛府􅀕器祭服依倣製造有牒上幙府書􅈤府公更望一言之助使必得之爲幸或恐有大不可携者得令人􅀞圖詳識其尺度之廣狹高下淺深以見授亦幸也􅀕器􅀹荷垂念但期日巳迫未及製造亦有事力所未及者且復專人納還幸付主者然亦疑其未便盡如古制度也木炭事申泉司果見􅁍未知所以爲計幸復思其􅀃以見教也某再上伺請皆未報日夕思歸而兩縣破壊姦民亂政不得不有所更革鉏治似聞傳者以爲不恕然亦只此數日間决遣事竟亦當少息矣盖大慝旣懲小者自當退聽耳但木炭事泉司不從又以蠲租未報未敢再列上前請若遂臨行湏㬰上此奏以償夙心也某衰病支離求去未得日惟得罪於士民是懼然近日兩邑得同官叶力詞訴􅁍粗衰少但賦租之弊未能有以寛之殊不自安耳學中講􅀃不敢廢近亦頗有能問者兩邑亦令整葺教養庻幾有嚮風者敝政恐有所聞切告垂諭至􅈤至􅈤示諭極感愛念之意此亦近方聞之惕然内懼即巳行下戒約及令住催下户它負之可寛者矣又得鐫諭益信所聞之不妄更當申儆之自此有所聞更望子細批誨直截譬曉今者來教似巳未委曲矣切􅈤切􅈤前兩月配一作過寨兵於隆興中間忽爲彼府押回公文中備坐判府安撫龍圖待制台判押回本寨殊不可曉巳回牒復押去矣煩閑爲詢之想是忘記是外路外州配來誤以爲所部不則别有他意也彼中幙府僉書滿􅁓此等事不能􅁴其繆甚可􅀏也此幸無他但建昌之事聞之不早見告者又皆不得其真慬若爲強豪遊􅀃使人愈疑惑近不免煩僉判自往調護始得其真乃知此郎不長厚誤事如此然縣小無官未有可遣代之者甚以爲撓耳山野之人不堪吏職此亦可見旦夕遣冬書更當力請庻不乆爲吏民患苦也某衰病如昨縁建昌事憂撓不可言雖巳遣官檢旱且以後期申省目劾􅀔湏畧减得分數但此縣官吏無一人能爲百姓分别黑白自此之後凌弱􅁀寡􅀅有不勝其弊者未知所以爲計令人暁夕不皇都昌亦甚費力二十年無事之身心一旦至此深以自歎他無可言也警誨諄復敢不銘佩但區區每見凌弱􅁀寡之徒心誠疾之故其發每有過當今當承命而改之然恐終不能盡去也某昨嘗專以建昌事自劾求去昨日人歸諸公又不􅀅上􅀔當復請耳勝私書來􅀃此間受租米事􅀄疑其過徐究之果然雖巳究治然人生精力能有幾何若事事如此索􅀜防則無復閑㤗之時矣其所論弊政非一巳封呈廟堂冀必得去萬一如欲此助爲不小也所懐萬端無由靣論但日來愈􅁴歸思浩然不可遏耳某月􅀄巳專人丐祠後得臨安相識書速令來請云諸公巳有許意至今尚未歸必是適值四明訃至未敢􅀅上度不過旬日必可得矣建昌納苗實有照管不到處然與抑強似不相干稅務依法收稅亦非州郡所得與况士大夫下争啇賈之利無恥至此亦何足䘏近日曽編管建昌一徤訟假儒傳者必又喧沸此事自信甚篤絶無可疑是非毁譽付之衆口少忍旬日則吾巳在汶上矣強盗三人配􅀠嶺海乃向來驚恐都昌之人昨以其情重法輕稍加毒手經由隆興恐有司以爲疑幸爲白錢丈一言於帥座交管傳押爲望此輩吾人所共疾想二公亦不以爲過也喻及帥座下喻之意巳悉此是兩路三州利害如此理會甚善向來亦欲申請而未腵安得謂之侵官本軍今方欲援例有請也然謙德之盛不敢不承幸語及之此間白鹿洞巳畢功前日徃釋菜開講矣延合肥呉君爲職事但渠爲書社所拘恐未必能往却有楊學録者與一二後生欲往也某請祠先遣人昨夕巳歸後軰尚未到周子充曾厚伯極爲致力而竟不效且更看後信如何恐亦且悠悠也初來不爲乆計近復動却歸心在此殊不便今旣如此便再請得之亦是一兩月事不免又且整頓此破落家計以俟譴逐耳昨縁收江溥親戚舡稅幾爲所論當時得此一章亦是草草出場也此間楊僉忽丁憂郡中事愈費力萬一不得去狼狽不可言也柰何木炭却巳得减免矣白鹿洞成未有藏書欲干兩漕求江西諸郡文字巳有劄子懇之及前此亦嘗求之陸倉矣度諸公必見許然見巳有數􅁽恐致重復若以呈二丈托并報陸倉三司合力爲之巳有者不别致則亦易爲力也書辦乞以公牒發來當與收附或刻之金石以示乆逺計二公必樂爲之也旦夕遣人至金陵亦當徧干本路諸使者也某請祠不得比復狂妄輙有所陳計程三五日間當以罪去巳盡遣書冊冗長還家此數日來翹足俟命但未知何所向耳此間諸縣狼狽稅務絶無南來舟揖􅀔亦不可復爲矣比復苦旱近始得雨然亦未能沾足也日間雖無事然意思不佳絶不得近書冊􅂴困即思睡耳白鹿洞記納去一本又一本􅀉梁文叔煩遣致之不及作書也五賢祠記楊廣文自納去矣某無狀居此一年有餘率意直前不能違道干譽得罪於士民多矣請祠雖巳報聞然旦夕自當以他罪行遣不至乆爲仁里之害也示喻曲折深荷愛念然必欲使某餧㗖虎狼保養蛇蝪使姦猾肆行無所畏憚而得歌頌之聲洋溢逺近則亦平生素心所不爲也姓高人事文叔在此備見首尾此而可恕則亦無以官吏爲矣至如木炭錢事亦是州郡所當爲而幸上司之見聽方恨不能推􅀋盡蠲苛擾􅀄不以是而求歌頌於斯人也此錢都昌所减獨多乃是毛􅁺攷究之力此人固有過當處然細詢田野之言而攷之案牘以求其實則前日銷骨之毀亦云甚矣此舉枉錯直之間所以難明非有道以照之則自謂公心者未必非私意之尤也區區不喜自辨又於老兄不可有隱情故乆不知所以爲報今偶有便信筆及之非欲較此是非乃欲老兄深察於名私名實之間則眞得其所謂本心之正耳此􅀖圖經不齊整而都昌爲甚數日來欲略爲條整而不得功夫又無人能爲物色圖􅀞諸邑供來皆不可曉甚􅁴費力也楊僉之去甚失助新來兩􅁺似亦可使也少凂西山有徐􅀐省􅂐書游帷觀大字及許真人并銘煩爲致一二本便中示及五賢祠記納去一本更有一兩刻續致也都昌恐有合入圖經事望垂諭它委勿外某郷辱誨諭奉報踈率旣而思之殆無以答愛我之垕深以愧仄自此有聞不以虚實尚望不替前日之念乃幸之甚旱甚不雨禱祀未有以感格日夕憂懼隆興不至此否家貧願隣富若亦似此間則更無可仰矣柰何柰何此間爲旱災所撓都昌縣官稍解事又請得盛族黃省幹同措置必可無慮但建昌官貟皆不足􅀝仗又遍詢彼邑􅀉居士人無有能分此憂者意欲􅈤南卿爲同邑官區處庻幾下情稍通吏不敢肆其姦罔不知渠肯俯聽否渠雖德安人而建昌亦有産業知彼民情故欲􅀝以爲重耳敢煩語次試爲叩之若許幸早見報當專致書禮請也歸見張帥更勸其通放米舡濟此艱阨千萬千萬某比日懍懔丐祠得知舊報云恐可得果爾甚幸然救荒之備什巳七八成矣旱苗約湏放及八分勸諭發廪得盛族倡率三縣共得榖十萬斛矣但前書所扣王南卿事不知曽爲偵之否幸早報及也得子澄書云廬陵發䇿持論甚正甚慰甚慰小録求一本便中早􅀉幸甚此間中選者數人甚厭物論白鹿諸生文字老成其次曹生秀發可喜但尚欠琢磨小榜之首彭君尤佳惜不與薦書也巳約兩榜之士來白鹿相聚未知皆能來否爾此間事未去間不敢一日少㢮恐得郷間有所聞望一一見諭也某力疾救荒未見涯涘而傳聞遽云云聞之甚懼未知􅀅何以副其實也南卿巳到此相䖏甚欵但渠欲入浙不敢邀留之度其歸程正是急時當頼其出一􅃗手又恐其到闕或爲諸公所留耳告糴荷帥漕留念然縣下或更作難此乃軍粮所湏若賑糶則巳有備矣軍粮尤不可闕者更得從容一言得二公喻意属縣無爲阻節幸甚張帥􅀉鹽鐵論來末卷前少却一板告爲印􅀉更煩於太宗實録中檢白鹿洞一事在太平興國五年會要作六年更詳之六月以洞主明起爲褒信主簿其下有少本未並告録示此巳有之但不知是實録語否耳恐此人等候回文告只付前日送崔子虚人回尤便千萬千萬更問看何人來速即付之也賑糶减半價乃得推賞乃朝廷之命方欲論其不可乞只减二分五􅁵而建昌乃有願賑濟者巳令邑官敦勸盛族若以􅂖二萬碩省賑濟可得兩名霑賞也因書更告及之亦羙事也稅錢事荷留念都昌納米分數方兩日有定論巳减八分以上亦巳申奏乞截留上供若得之即只納占米無不可者只恐未必如人意耳石守以憂不來殊失所望亦巳遣人速後政吴守矣儻得如期觧去幸甚比益昏倦不堪支吾矣某在此不乆又子重不來後日之計未有所付湏及此自了也其子弟能來亦佳但濡沫不能多湏預令知此意耳得都昌諸人書巳復苦旱柰何柰何今年公私之積蕩然一空萬一復旱便無着手䖏矣某無似復叨除目恐愧不自勝尚幸逺次得以從容進退還家數月當申祠吏之請也前月之晦巳書二考代者度此月中旬可到今日復遣人速之矣老兄許來固願少欵但恐文法有拘亦非細事更冀審度之也示喻趙宗丞田極感留意巳撰得四百千省半是糶米剰錢半是某所得諸䖏饋送前日錢丈所惠亦在其中今即移文庫中令項樁管以俟其報告爲發書扣之路運幹不是彦豐否若是即某巳識之并煩爲致意早得一報爲幸雖某去此後人亦當能成此勝縁也來書巳付案中爲事祖矣辛帥之客舟販牛皮過此掛新江西安撫占牌以帟幙􅀩蔽舡窓甚宻而守卒僅三數輩􅀄不肯令搜撿旣得此物遂持帥引來云發赴淮東緫所見其不成行徑巳令拘沒入官昨得辛書却云軍中收買􅀔不爲巳甚當給還之然亦殊不便也因筆及之恐傳聞又有過當耳前書奉叩白鹿買田事如何幸早示報及某未去間有定論爲佳此錢巳送庫􅀉收以俟矣千萬留念某代者巳到二十七日定交郡事即略轉山北迤邐東歸矣脫此樊籠欣快無量但念相見未有近期不能無愴恨耳白鹿田錢巳撥正牒教授候彼回文即可支付也禮器之失不但一爵今朝廷所用宣和禮制局様雖未必皆合古然庻幾近之不知當時禮部印本何故只用舊制向來南康亦無力但以爵形太醜而句容有新鑄者故易之耳其實皆當遣人問於禮寺而盡易之乃爲盡善但恐其費不貲州郡之力不能辦耳福州余丞相家有當時所賜甚精然今亦莫能用也黃南康之政如何渠向在昭武甚佳爲人所擠而罷今能不改其舊則三邑之幸也永卿主薄老兄尚留齋館否昨承惠書此便又遽未能别狀但所問先天圖曲折甚善細詳圖意若自乾一橫排至坤八此則全是自然故說卦云易逆數也皆自巳生以得未生之卦也若如圓圖則湏如此方見隂陽消長次第震一陽離兊二陽乾三陽巽一隂坎艮二隂坤三隂雖似梢渉安排然亦莫非自然之理自冬至至夏至爲順皆自未生而反得巳生之卦盖與前逆數者相反自夏至至冬至爲逆盖與前逆數者同其曰左右與今天文家說左右不同盖從中而分自北至東爲左自南而西爲右其􅀄若有左右之􅀔耳鄙見如此更冀詳之啓􅀩改本未成後便􅀉去近望得伏羲象欲奉之武夷精舎恨賢者不能一來觀之耳此􅁓煩啇伯兄呈似更同爲訂之也新泉之勝聞之爽然自失安得復理杖屨扶此病軀一至其下仰觀俯濯如昔年時或有善􅀞者得爲使􅀞以來幸甚向見楊伯起有切韻書只三四十板而聲形畧備亦嘗傳得而爲人借失之今欲得一本敢煩爲借抄録一本校令審諦便中見􅀉幸甚或語趙守刻得一板流行亦佳此非僞學想亦不至生事也五老新瀑曾往觀否夢寐不忘也某竟以無狀自致人言上累師傅下及朋友愧負憂惕如何可言傳聞賢者亦有里巷侵侮之虞不知云何今日惟可凡事省縮豈復更與此輩争是非較曲直也彼中諸書板本聞幾有焚㓕之禍又云下官有持不可者遂巳不知果然否耶然計此恐終不免向來得本甚多皆爲人取去今欲復得一兩本不知能及未爲煨燼之間印以見􅀉否洪韻當巳抄畢幸早示乃此間付之書坊鏤板甚不費力况非僞學亦無嫌也新泉圖子和成旣爲定藁必巳能盡冩其佳䖏只就覔此草夲不必重摹俗工或能反敗人意也自聞此泉新岀恨未能一遊其下以快心目濺雷噴雪發夢寐也瀑圖韻譜近方得之圖張屋壁坐起對之恨不身到其下也定叟終於落星何不就館城中耶鄭溥之黄伯􅂄相繼物故皆盛年也亦是一時氣數然張鄭􅀹可惜耳楊伯起新年幾􅀊精神筋力想未至衰憊如某也白鹿舊遊恍然夣寐但聞五老峯下新泉三疊頗爲竒勝計此生無由得至其下嘗託黄啇伯陳和成摹􅀞以來摩莎素墨徒以􅁣歎也江德之甚好􅀃易嘗與講論否且看程先生傳亦佳某謬􅀃不足觀然欲觀之湏破開肚腸洗却五辛查滓乃能信得及耳又印夲多錯誤恐難㑹了無由靣談聊發一􅀏􅀅來官滿復歸廬阜耶劉婿得依餘芘幸甚時有以警誨之乃佳外孫聞尚附學想􅀩憐撫某衰朽益甚巳上告老之章它盖無足言者劉婿幸得托芘今􅀅滿矣不知巳離彼未耶李敬子得襄陽教官見在此相聚或傳其闕巳到未知然否幸因便報及也讀易想亦有味此經自有規模格局若看得破則精粗巨細無䖏不可受用如其未然即且􅀅其間㫖意分明䖏反覆玩味亦自可樂不必深求幽逺枉費心力也某之謬說夲未成書往時爲人􅀼出印賣更加錯誤殊不可讀不謂流傳巳到几間更自不足觀也劉婿相見未豁然亦差覺老成此皆教誨之力也某年來衰憊殊甚兩足拘攣不能移歩猶是小故而心腹之疾猶爲可慮服藥無效拱手俟命而巳葉永卿呉害卿周得之李深子某還家方幸休息得以輯理舊書忽􅀍恩除不勝憂懼􅀄欲力辭又聞彼道荐饑巳有流移户口恐辭或不免而失可爲之時遂不免申奏對之請更旬日間必有進止之命若得罷遣且守東岡之陂即大幸也除職􅀄不敢辭但以賑濟四家未􅀍賞因此爲伸理耳聞彼又苦饑想不至如去年之甚然在今日處置當倍費力也深甫所喻减稅事不知後來如何某若得對當且乞减徐守所増中上等稅錢此數不多當必可得其它恐亦難料理也白鹿田巳就緒甚善又聞今侯能枉駕臨之尤幸伯起廷彦爲况如何聞永卿諸公亦嘗入山觀書遐想山林之勝它䖏真未易得令人悵然興懐也但聞或者乃欲􅀞某形象置之其間令人駭然不知誰實爲此向欲作李賔客李九經及三先生祠於其間以未有大成殿遂不敢議今乃遽然如此於義殊不安而諸人所以相期者乃復如是之淺尤非區區之所望也幸以此示諸人亟爲毁撤爲佳不然湏别作區䖏也舜㢸所云白鹿之􅀃當時亦謾及之豈有輙敢號令州郡之理渠自張皇亦不曉事之過也白鹿買田聞巳就緒呉丈又許買牛此尤永逺之利也諸事更頼衆賢左右維持之其必有濟矣朱守書來示及新編圖經乃知其郡政從容綽有餘力如此大凡區區向所欲爲而不暇者今皆備矣又承喻及禁止白鹿葬地一節尤快人意但不知曾追毁其買契否不爾恐尚有後患也白鹿知亦嘗一到甚善甚善每念疇昔相與登臨遊從之樂未嘗不發於夣寐然亦恨當時所以相切磋者猶有所未盡也張廣文别後遽至此深可悲悼某或得至浙東亦遣人視其家也永卿所喻可欲之􅀃恐不然但以詩所謂天生蒸民有物有則民之秉彞好是懿德者觀之則知欲惡之正固有不易之定理矣彼以所當惡者爲所當欲豈其性情之本然者哉孟子集注近方修得一過未及再看更俟少定冩得别本即附去然大凡讀書且徐讀正文虚心􅆂泳切巳省察亦當自見大體意味其間曲折却續求之未晚也唐卿比來爲况如何書來不及菖蒲平安之報何耶去歳災蹇異常病旣日侵秋間又哭一女悲傷無聊屢至危殆忽􅀩除用􅈤祠未􅀗近乃見次又巳有奏事之命不免遣人復申前請行一月矣至今未還不知事竟如何或不得巳即湏到彼靣懇力辭庻幾可脫江西决是不成行也向承録示樂方極感留念今脚氣巳漸輕祕結却變成滑􅂥矣大率氣血漸衰自是如此也啓􅀩近復修改一兩䖏未畢俟印得即奉􅀉易之象數初甚簡易今人不得其說遂至支離使人不曉反遂詆以爲滛巫瞽史之學其亦誤矣馮儀之細讀來示備詳别後進學不倦之意世間萬事湏􅁷變㓕不足置胷中惟有致知力行脩身俟死爲究竟法耳余正父愽學強志亦不易得禮書中間啇量多未合䖏近方見其成編比舊無甚改易所論獨志無助者誠然然渠亦豈容他人之助也此間所集諸家雜􅀃未能如彼之冨然儀禮正經叚落注䟽却差明白但功力頗多而衰病耗昏朋友星散不能得了耳啇伯時時得書講論精宻誠可嘉尚李敬子堅苦有志尤不易得近與諸人皆巳歸只有建昌二吕在此早晚講論粗有條理足慰岑寂也晦庵先生朱文公文别集卷第六候官縣儒學訓導劉簮校晦庵先生朱文公續集卷第六與趙昌甫罪戾之餘物色未巳不知何以見惡如此之深甚可􅀏也近讀經書不得􅁍看些古文章識得古人用意䖏然亦覺轉喉觸諱不敢下筆注解但時發一􅀏耳來書所喻似皆未切事情巳細與長孺言之後有的便渠必一一奉報要之今日只可謹之又謹畏之又畏不可以目下少寛便自舒肆况所謂少寛者又巳激而更甚乎黄乃以力賛建中而去前巳去者將有復來之漸其繼之者與儲以待次者又不令人入􅀂非上心􅁣然開悟發明善􅀋未有少安之望也千萬與諸伯仲深詧此意敬㳟朝夕安以俟之區區不勝眞切之望也昨日得王謙仲書亦如履常所料蓋逺方未見近報耳向讀學易集見其當紹聖元符之際愁居懾處之狀令人傷歎不意今日乃見此境界宛在目前試取一觀亦足以爲法也少時見吕紫㣲與人書􅀃交遊中時復抽了一兩人令人驚懼當時不理㑹得今乃親見此境界也斯逺聞其䘮偶不知果然否經年不得渠書想亦畏僞學汚染也李白詩多􅀃此事惜不能盡暁粗窺端緒亦不暇入静行持但玩其言猶是漢末文字可愛其言存神内照者亦隨時隨處可下功夫未必無益於養病也巳草挂冠之牘開􅀊即上計較平生巳爲優幸獨恨爲學不力有愧􅀄心著書未成不無遺憾耳因便寓此少致問訊之意政逺千萬戒詩止酒以時自愛眷集均慶答江隱君每承諄切之誨􅀂將挈而寘諸聖賢之域顧愚昧未知所以仰稱期待教督之意而又未得親奉指畫於前其爲向仰不勝此心之拳拳别􅁓􅀁喻汪洋愽大不可涯涘仰見所造之深所養之備縱横貫穿上下馳騁無所窮竭底滯雖􅀂某之蒙昧誠不足以語此亦巳昭然􅀂發蒙矣幸甚幸甚然􅀼以平生所聞於師友者驗之其大致規模不能有異獨於其間語夫進脩節序之緩急先後則或未同蓋某之所聞以爲天下之物無一物不具天理所謂寂然不動感而遂通者舉目無不在焉是以聖門之學下學之序始於格物以致其知不離乎日用事物之間别其是非究其可否由是精義入神以致其用其間曲折纎悉容有次序而一理貫通無分叚無時節無方所以爲精也而不離乎粗以爲末也而不離乎本必也優游潜玩饜飫而自得之然後爲至固不可自畫而緩亦不可以欲速而急譬如草木自萌芽生長以至於支葉生實不至其日至之時而揠焉以助之長豈不無益而反害之哉凡此與來教所謂傷時痛俗急於自反且欲㑹通其㫖要以爲駐足之地者其本末指意似􅀂不同故前後反復之言率多違異而語其所詣之極則又不敢以爲不同也姑論其大槩異同之端以爲求教之目其他曲折不敢執普言語以取再三之瀆要之非得靣承不能究此心之所欲言也普疑當作着伏辱墜教所以訓督孜孜不倦有加於昔顧惟庸昧重勞提耳旣感且愧不知所以爲謝也始者獻疑亦非敢以􅀁示大㫖爲不然但疑精義入神一句文義或不如此恐如所論則日用方外之一節似少功用耳及蒙垂喻再三每加精宻讀之恍然自失於直截根源處更無纎芥可疑只是精義入神一句依前未免扭揑愚謂大體巳是正當即不湏强以此句􅀃合費多少心力言語於道體無所發明於文理反有所累某竊終疑之願平心以觀聖人立言之意當信某非敢妄言而此句工夫自有所謂不但如來喻所指而巳拙於文詞又迫私冗來使不能乆駐然此非難知以吾丈髙明尤不難見􅀂無義以方外一節即儒者與異端又何異乎此似未易以内外隔截看也前書别􅁓變化機要二者之分亦非愚妄所曉竊意聖賢之言則一而見之淺深在學者所證本非有預如此分别也昔有人見􅀛山先生請教先生令讀論語其人復問論語中要切是何語先生云皆要切且熟讀可也此語甚有味乍看似平淡没可􅀃只平淡中有味所以其味無窮今人􅀃得來驚天動地非無捷徑可喜只是味短與此殊不倫矣且看論語中一句一字孰有非要切之言者􅀂學者體㑹履踐得皆是性分内􅂃切慤實事便從此反本還源心與理一去豈有剰法哉􅀂如吾丈所謂變化者則聖賢之門無有是也其莊老笁學之緒餘乎反復以思未見其可大抵聖門立言制行自有規矩非意所造乃義理之本然也故日用之間内主於敬而行於義義不擇則不精不精則雖其大體不離於道而言行或流於詭妄則亦與道離而不自知矣故曰和順於道德而理於義而孟子飬浩然之氣亦必曰是集義所生者不識此爲對仁之義乎爲精㣲之義􅀂來喻所云乎且對仁之義亦何以知其不精㣲也但大傳中精字之義不如此耳一去之去字疑前幅所陳謬妄不中理之言必多盖未敢以爲是而求正於左右切望指教區區之病正坐執滯於文字言語之間未能脫然有貫通處其於道體固患夫􅀂存􅀂亡而末有約卓之見耳但精義二字聞諸長者所謂義者冝而巳矣物之有宜有不宜事之有可有不可所謂義也精義者精諸此而巳矣所謂精云者猶曰察之云爾精之之至而入於神則於事物所宜毫􅁵委曲之間無所不悉有不可容言之妙矣此所以致用而用無不利也來教之云似於名言之間小有可疑雖非大指所係然亦學者發端下手處恐不可略故復陳之與鄭景實栗示喻曲折亦是時態之常頃聞仙遊故相葉公之爲縣月計所湏令民以漸輸送故縣帑無餘積而月解無餘欠人甚便之竊計郡計旣寛正當法此稍寛縣道之輸亦公􅀻之利也但恐縣道難託别生它患此在髙明必又有以制之耳儲宰旣去爲怨家所誣亦寓公者爲之先後臺評所指遷學一事乃與賤跡相連士子有初不預謀者亦􅀍流竄其事甚可􅀏或傳不止流竄於爾又可痛也蓋舊學基不佳衆欲遷之乆矣儲宰一日自與邑中士子定議而某亦預焉其人則􅀄不及知而其地亦不堪以葬也它時經由當自知之其可浩歎又不止如今所諭也與饒廷老此間虞士朋與王阮同赴東府飰會乃其鄰郡鄉人必不使人攻之也姑少徐之當見底裏歸􅀫也游誠之或云參選不得巳歸臨海不知然否能碎千金之璧而眷眷於破釜何耶伯啓聞巳西去昨日得浙中書云子約之逝親戚有爲旁郡守者遂不復相聞末俗益偷乃至如此亦可歎也所喻極當􅀄亦疑之後聞所得只是庶官恩例故不自慊今旣不安不如且巳止於未形尤爲深慮保狀巳納還仲本印􅁓今并附其人持歸幸檢入元不曽發封但别用􅁓護之也三衢巳差替人正則恐亦不成赴上矣丁生頃年代君舉於桂陽自刻其詩集而屬君舉序之是時蓋求入社而不可得今日乃爲此言固小人之常態也示及報狀只坡䟽未見此其関捩雖未易窺然其手􅀔規模亦不難見蓋巳排黃子由之􅀃而退之不乆必别有勝􅀒也元善巳如霅川其子假日至此見養子之􅀃愕然曰大人到彼又頭撞矣此語亦有味因見仲本可閑及之世間所傳坡文亦未必皆出其手可更詳之也某病起方得旬日無事比又苦傷風證候雖淺然服藥發散出汗多倦乏不可言屋下濕􅃳坐不得閣上又􅀬無着身處頗以爲苦耳誠之進退不决何乃至此渠年㡬與老拙只争十來歳前􅂗事亦可知􅀂時運來時又自非人力所及也換闕竟如何人生凡百信縁禍福之來豈計較所能免見􅀃賢者慮患過深㡬至成疾何必爾耶伯起想巳赴班引矣中間道學二字摽榜不親切又不曽經官審驗多容僞濫近蒙易以僞號又責保任虚實於是真贗始判矣與張孟逺老益衰百病交作處世能復㡬時而季通子約凶問沓來令人感愴不能爲懐天之蒼蒼其果有所愛憎耶抑都無之而直聴其自爾耶暦􅀃恨未得請餘誨康節之學固非止於爲暦然亦不專爲知來如後世䜟緯之言也幸深考之復以見教幸甚歸來之後叨冐重疊巳深愧仄不意又􅂪収召之恩顧念本末不應復有仕進之計而懇辭未􅀗比不得巳輙縁面奏封事之請妄陳瞽言政使至前所論不過如此計此愚誠當蒙矜允得遂退藏也然語默之間政爾難得中節此舉􅁍是以語爲黙差之毫􅁵則是反速其禍未知竟何似耳子充當巳改秩亦乆不得渠消息也季路之除甚慰物論供職當巳乆矣衰病益侵自去冬來脚弱拘攣心腹痞痛日甚一日服藥略無効驗懸車年及巳言於郡丐上告老之章而有司疑之交舊亦多以爲不可未知竟如何然此意巳决不復能顧利害得失也友人㳺子􅀩趨試南宫行期偶緩過衢欲買舟而無知識可託欲丐指麾幹事人相導之此公定夫先生從孫論議文學皆有餘在此爲可與晤語者計當自識之也記得杲老􅀄謫衡陽有以詩送之者曰逢人深閉口無事學梳頭此語有味可發一􅀏然亦不得只作笑會也答劉德脩似聞祠官秩滿不知亦爲再請之計否耶東方之事想日聞之某竟不免吏議然巳晚矣正使苟安亦何足爲輕重顧未知世道終何如耳餘干時有人徃來履常兄弟且如此昨得其書具道所教戒令人感歎但觀時􅀔恐未有􅀘徒促禍耳機仲元善各巳爲致盛意皆屬道謝子宜在宜春時得書其母年髙不肯來就養甚可念子直罷廬陵後去之章貢外邑寓居亦不甚安子夀間亦得書平父聞亦歸江陵􅁍不得近書也季章必巳到閬中文叔寓居不知爲况定何如亦巳託君亮附書問訊矣東溪志銘髙古峻潔法度深􅃊而渾然不見刻琱之迹三復歎仰以得見爲幸老先生學行之懿遂託此文以不朽矣春間當巳就􅉎恨不得陪素車之㑹也傳之計亦巳襄事其子弟㡬人當能世其學也天雄鐡杖石刻之况荷意甚厚第顧衰懦有不能堪重以爲愧耳今年脚氣幸未大作但耳聵目昏日以益甚舊書不復可讀而頃年整頓儀禮一書􅀻居乏人抄冩學徒又多在逺不能脫藁深慮一旦無以下見古人又恨地逺不得就明者而正之也方念乆不聞動靜忽閱邸報有房陵之行爲之悵然􅃦食俱廢累日不能自釋不審彼以何日就道自簡至房道里㡬何取道何州閱㡬日而後至風􅁟氣候不至甚異否居處飲食能便安否官吏士民頗知相尊敬否吾道之窮一至於此然亦乆知㑹有此事但不謂便在目前耳偶有鄂便託劉公度轉致此間如有的便亦望得一字之報使知動靜少慰逺懐千萬之幸馮李亦復不容季章得郡而名見乃弟䟽中恐亦非乆安者李良仲鴻飛􅁳􅁳使人深羡第恨不得扣其玄中之趣范文叔却幸未見物色想亦深自晦也某足弱氣痛巳半年矣杖䇿人扶僅能略移跬歩而腹脇脹滿不能俯案觀書作字一切皆廢獨於長者未敢依例口占耳數日又加右臂作痛冩字不成衰憊至此無復乆存之理承教無期尚兾以時深爲世道自愛耳某隨例納禄幸巳得請中間蓋亦少有紛紛後雖粗定然猶不免爲從之之累亦可歎也盡室游山大是一叚竒事衰病窮蹙不復能出門戸矣引領髙風徒切歎仰李良仲恨未參識聞其養生頗有竒効恨不得一扣玄㫖參同契絶無善本近校得一通令人刋行方就尚有紪謬處今納一􅁽或因書煩爲扣之渠必於此深有得恐其有錯誤得筆示幸甚也屈平以徃者不及來者未聞而有長生度世之願亦是不堪時人之妄作而欲見其末稍作如何出場耳每讀至此未嘗不發一大􅀏也與方耕道問禮之意甚善顧淺陋何足以議此舊所遵守者温公書儀程氏新禮耳兩書想皆見之擇其善者可也嘉禮有日本合遣人致區區適此朞慘不得如願想能亮之承許改月來訪幸甚幸甚所喻南軒病證極令人􅁨念旦夕專人候之當并拜狀也幕客正要蚤晚從容宻罄忠益來喻乃欲公㕔搢笏納劄誦言殊不成舉措聞之駭歎如是乃是專欲引善歸巳明曲在人非主人所以千里相招之意也又况如此則必大激同官之怒亦使主人難處區區愚慮深爲老兄憂之方念正論衰息吾黨甚􅀌正當凡百詳審委曲調護使人無可指議乃爲盡善􅀂以小故先自乖離外激衆怒内致羣議殊非䇿之得也况向來所辟兩人游巳望風引却今老兄􅀂更做去就豈不大損主人聲望至來喻所謂官吏縱弛此亦當以漸整頓豈容一旦遽行啇君之令乎居上以寛恐南軒自有規模􅀂一向紏之以猛恐非吾軰平日所講之意更請裁之勿爲過舉幸甚幸甚回劉知縣諱君房甞念兒時侍立先君之側見其毎得杼山侍􅀰公書未甞不把玩歎息而善藏之是時雖㓜無所識知然窺其詞意筆蹟之妙亦意其超然非當世之士也其後僅三四年先君即弃諸􅀌蓋巳不及見更化之日矣是以一時去國諸賢次第収用侍郎公亦再登近班而某跧伏窮山不得一拜牀下以脩子弟之㳟至今以爲恨也不意垂老得其賢孫而與之㳺幸亦甚矣三復來誨俯仰今昔甲子殆將一周又自歎其老而無聞也與蔡權郡南康丐祠之請前月半間巳專人入郡度諸公見憐必巳俯從所欲矣昨慮便郡虚有勞費亦已預戒邸吏関白想徹台􅃪也近聞巳除石寺簿爲代與之亦有雅故其人豈弟逹於從政真足以惠一方矣便郡恐當作使郡答盧提翰承問及爲學之意足見志尚之逺甚慰甚慰蓋甞聞之人之一身􅀿事接物無非義理之􅀁在人雖不能盡知然其大端宜亦無不聞者要在力行其所已知而勉求其所未至則自近及逺由粗至精循循有序而日有可見之効矣幸試思而勉之幸甚幸甚此有樂靜李公文集謾納一本其後序所云深可以爲干名求進之戒幸試觀之區區奉􅀉意不在於文字也令兄寺簿詞翰兩絶把玩不能去手然豈敢輙以無能之詞妄取僣越之譏囬書幸爲遣行李集并徃亦足以見區區也答儲行之所喻縷縷殊可駭歎此其意不在左右計必又湏醖醸播􅀭成一大事亦不可知然區區之心有可以質於神明者以救民而􅀗罪亦所不敢辤也批書遲緩亦且得寛心忍耐爲佳聞建安亦未得去崇安􅁍巳得好消息矣縣中近日大槩幸巳無它但西路之窘日迫官司要巳再輪上戸至八月初然無人監督以明者行之尚且不免爲虚文况今日􅁘適得蔡倉書尚有挽留之意􅀂能領其悃欵幡然一來千萬幸甚昨日劉居之相訪具言麻沙事體云一種貧民至有餓而死者聞之惻然今日文卿相過亦􅀃諸處輪糶巳足上戸便謂事畢雖有米者亦不復糶最是崇化一郷可慮梁文叔亦言長平一帶小民般運崇安早榖日不下百人或恐彼中土人争占攔截亦能生事此皆可深慮者􅀼意左右聞此亦不必待其劒㦸如林流血成川然後爲復來計矣且是目今便覺上下人情不通有話便難出口適因蔡倉見問巳告之云不􅀂便􅀜諸司再煩左右一來權領一職帶取印杖從間道直趨崇化麻沙徃來監糶并措置救荒事目付之簿尉以俟事之略定而歸似亦無不可者不知雅意如何文卿亦􅀃縣中士民盛傳舊尹復來其意似亦可憐不􅀿便恝然弃之也適又與文卿􅀃自今以徃境内有一夫不得其死一夫身􅀍刀創則左右皆不得辤其責切幸察此苦言少回必去之志勿信庸人徇巳忘物之􅀃以誤逺圖恐異日思之不能無追悔也向來此間行事得失當亦有可自警省者或謂却是欠些僞學其言雖可􅀏然恐有理不審於意云何也閑中讀書奉親足以自樂外物之來聖賢所不能必况吾人手但新學一旦措手而委之庸髠數日前巳互遷象設令人憤歎不能巳而一縣下人􅀂貴􅀂賤􅀂賢􅀂愚無有以爲意者惟曽堅伯相見新帥來以爲士子當相率訴之范仲宣深以爲然而漠然無有應者此亦見人之識見分量之不同也季通之行浩然無㡬㣲不適意丘子服獨爲之涕泣流漣而不能巳處事變恤窮交亦兩得其理也張鄭黄鄧相繼物故吕子約前月亦不起疾殊可傷悼亦是氣運使然豈可專咎章子厚耶元善到霅後一再得書殊恨失計初亦有􅀁迫而然失之不能斷决耳季通在湖南耳根却静然諸遷客聞髙安之報想亦不免打草蛇驚也人生由命非由他此言雖淺誠有味也偶有自江西來者得東坡與何人手簡墨刻適與意會今徃一通可銘坐右也東坡帖附見示及数書皆有逺别惘然之意雖兄之愛我厚然僕本以鐡心石腸望公何乃爾耶吾儕雖老且窮而道理貫心肝忠義填骨髓直湏談􅀏於死生之際若見僕困窮便相爲邑邑則與不學道者不大相逺矣凡造道深至中必不爾出於相好之篤而巳然朋友之義專務規諌故輙以狂言廣兄意耳兄雖壈坎於時遇事有可尊主澤民者便忘軀爲之禍福得䘮付與造物非兄僕豈發此看訖便可火之不知者以爲詬病也某皇恐則不字疑後道道字恐誤後愛愛字疑一互字上下必有誤吾人不合偶得一官遂以官爲業一日投閑便有食不足之歎彼此皆然然在此則身自當之無所怨悔亦知賢者以親飬之故不能不介念也來春之行不知都下報者云何若非以鈎黨之故則不雖重坐但經赦宥便是無事人只是一堕此城却恐未有出期雖然只是参選然亦湏䑓参出人而前恐又重遭指目湏更審而後道告詞傳聞数聮不曽見全篇㝷常此等只拂略􅀃過今乃鋪叙如行遣禁從帥臣之體不知果是誰筆因便幸略批喻也某却至今不曽受告亦不見報行詞命喫俸半年未曽立案殊不可曉也避地盖出於不得巳其他却無􅀃但後愛兩司對移之命既行彼乃深怨以爲自此發之不知二公經年不通問也時論率兩三月湏有一畨引作近報集議赦條不知意果如何恐亦只爲諸巳行遣人恐死􅁅之復然耳張帥到未此公􅃍去朝廷不省所謂議者盖深惜之彼當巳得其􅀃矣來使方今還自府中􅃴此兩日所苦大作力疾草此不能究所欲言然前書計亦非晚當至矣獨樂園圖恐司馬守便之官未暇刻得與之議爲辨一互刻之亦佳但其詩頗有誤字見山䑓詩中陶通明乃陶􅀮居之别􅃅今作淵明當改正耳前賢遺迹正爾何関人事而使人想象愛慕不能忘雖不得復至其䖏而猶欲見之圖􅀞之間使其流傳之廣且逺而未至於泯㓕然則爲士君子者其可不力於爲善哉所喻批滿今始得之萬事遲速自有時節固非人力所能爲也代人上書者不知得之何人此人固非佳士然恐亦未􅀿􅃍至於此當更察之􅀂其果然則誠爲狗􅇾不食其餘矣彼挾怨妄言者固自不足責也前日亦料從人不欲復過此亟折簡呼文卿令其徃見固欲􅀉聲昨日得報乃云冬􅀵方冗未能自㧞今承喻及有問道過門之意似亦未便幸更審之大抵欲面言者無它但欲每事詳審持重耳觀人之失亦坐自處未能深静之故􅀂處晦觀明處静觀動則無不察矣前日廖子晦歸􅀃新闕巳爲人所受想巳聞之理􅀔自􅀿爾也詞命巳行乃東山之筆有塩課入巳之語渠自對人誦之不知巳􅀍受否聞某亦有之渠􅁍云是同官作其􅀔不應如此但至今不下亦不見人傳誦必是醜詆以媚用事者而深藏以蓋其迹甚可􅀏也帥幕無事可以讀書而西山南浦號爲天下勝處公餘徙􅀝亦有足樂然亦更湏擇交勿忘前事之師乃所望耳小坡一著髙似一著此甚不易必是裏靣􅀃得轉了方下得此手脚然此亦至危之機更湏深自防衞一種細故得放過且放過勿令人疑事事皆出於巳乃爲佳耳鄒公亦有安靜之􅀃次第善類湏少安也王巽伯未能去否向語渠㝷獨樂園圖摹刻流布不知曽爲之否不及作書因見幸爲扣之也景初素守於此可驗世路升沉何足深計但得此心無愧所得多矣衞公近得書􅀉梅巖圖來初欲令作記俄聞溪城之報且罷休矣甚愧不得一逰其間并以文字結縁也至之且得如此亦是一事大抵吾黨例多困窮只得存活得過但是十分亨泰矣後之晚娶深入瘴地似不善便此􅀖之侯一再通問亦依様􅀞胡盧荅之不爲難也晦庵先生朱文公續集卷第六閩縣學訓導何器校
