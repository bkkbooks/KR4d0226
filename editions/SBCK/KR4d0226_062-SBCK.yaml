  text: 晦庵先生朱文公文集卷第六十二書知舊門人問答
  hash: sha256:0956c4bb61d085ea567f4e907e655ee1b2b4123dba13fb9b46a5c96817ff37f3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0226_SBCK_062-1a}
body:
  text: 答張元德洽細讀来書知進學之意不倦甚慰讀書切忌貪多唯少則易以精熟而學問得力處正在於此苟爲不熟不如稊稗非虚語也大學等書近多改定處未暇録􅀉亦有未及整頓者如論孟兩書甚恨其出之早也此間事雖不多然亦終日擾擾少得暇看文字甚覺􅀊月之可惜也通書太極之㫖更宜虚心熟玩乃見鄙􅀃一字不可易處政使濂溪復生亦必莞爾而􅀏也若如所論則所謂靜者别在四者之外而不相管矣而可乎顔子所以發聖人之藴恐不可以一事言盖聖人全體大用無不一一於顔子身上發見也孰不可忍亦不必如此􅀃此等處有兩􅀃當時存之皆不偶然更宜詳玩也武成文字不曾帶来不能盡記春秋之􅀃􅀹所未究此􅀋又是一種功夫未曉即且闕之可也易數之􅀃近有一書謾徃讀之來問所疑巳悉具其中矣七經向見其􅀄成之本後未得也計此亦是劉公少時作不然則亦以其多而不能精故耶其間詩􅀃􅀹草草也答張元德示喻欲来未能之意此固無可如何但日月侵㝷縱不得親師友亦須自作工程潜思黙究令胷中明徹見得道理都無疑礙方是於踐履功夫有進歩處若只如此悠悠閑過了誠可惜耳所示諸􅀃似未㝷着縫罅雖巳各注其後然只如此講學恐未有深益也名齋之意甚善然着實用功不湏如此安立標榜處雖亦未有大害然亦便見用心淺處􅀂實做得功夫是當自無暇及此等不急之務也大學近巳刋行今附去一本雖未是定本然亦稍勝扵舊也臨漳四子四經各往一本其後各有䟦語可見讀之之法請詳之所問易數雖非講學所急然亦見用意未精且更推尋爲佳􅀂如此自見得一門戸决須自信得及正不必問伊川横渠􅀃如何也􅀂前人􅀃巳分明則此書不作矣正爲􅀃者太支離不􅀃者又太簡略所以不得巳而作孔氏雜􅀃冩了多時今附還其間多是抄出江鄰㡬嘉祐雜志也答張元徳示喻爲學之意似覺未甚果決專一更宜勉力科塲不逺想不免分了功夫然此等得失眞實有命􅀂信未及放不下亦須且將此字頓在面前政使未全得力亦可減得些小分數不爲無􅂇夫子所謂不知命無以爲君子正謂此也􅅴君處見送行語含兄意亦甚佳兄弟自爲慱約想有味也但􅅴君詞筆頗工而趣向未正數日苦口告之未知能勇決否耳所喻易數大槩近之但此等自然法象深玩索之自見端的􅀄見似人安排而實非人所能安排也以一爲三以一爲二所謂一者謂一揲所得之竒偶未是一爻也一竒爲三故三竒爲九方得老陽之爻一偶爲二故三偶爲六方得老隂之爻两偶一竒乃爲少陽之七两竒一偶乃爲少隂之八此數甚明但看得不子細耳􅅴君歸可更切磋之人材難得可惜只如此汨没了一生也答張元德衡陽之訃想已聞之深足傷歎然當路攻擊意殊未巳今雖如此亦恐更有追削禁錮之􅁼而一時善􅁼次第皆不可保吾輩閑中講學固爲羙事然亦恐有不可測者此方深以爲懼而賢者乃以勸彭丈何也熹幸巳得祠差可自安近與學者講論􅀹覺横渠成誦之􅀃最爲徑捷蓋未論看得義理如何且是収得此心有歸著處不至走作然亦湏是專一精研使一書通透爛熟都無記不起處方可别換一書乃爲有益􅀂但輪流通念而覈之不精則亦未免枉費工夫也湏是都通透後又却如此温習乃爲佳耳所􅀃易傳極有難記當處蓋經之文意本自寛平今傳却太詳宻便非本意所以只舉經文則傳之所言提挈不起貫穿不來須是於易之外别作一意思讀之方得其極㝷常每欲將緊要處逐項抄出别爲一書而未暇大抵讀書求義寜略毋詳寜踈毋密始有餘地也詳故碎宻故拘歐嚴譚君近來看得又如何更望以此相勉但於所讀之書經文注脚記得首尾通貫浹洽方有可玩繹處如其不然泛􅀚雜論徒費日月決無所益也所論新法大槩亦是如此然介甫所謂勝流俗者亦非先立此意以壓諸賢只是見理不明用心不廣故至於此􅀂得明道先生與一時諸賢向源頭與之啇量令其胷中見得義理分明許多人欲客氣自無處著亦不患其不改矣􅀂便以不可與有爲待之而不察其所欲勝之流俗亦眞有未盡善處則亦非所以爲天下之公而自䧟於一偏之􅀃矣頃見趙丞相所編諸公奏議論新法者自有數卷其言雖不爲不多然眞能識其病根而中其要害者殊少無惑乎彼之以爲流俗之浮言而不足恤也至如祧廟一事當時發言盈庭多者累數千字而無一言可以的當與介父爭是非者但今人只見介父所言便以爲非排介父者便以爲是所以徒爲競辨而不能使天下之論卒定於一也此􅀃甚長非面論未易䆒答張元德來書所論通復二字甚密然亦有未切處􅁇之者善云者造化流行萬物方資以始而未實也成之者性云者物生巳實造化與物各藏其用而無所爲也在人則感物而動者通也寂然不動者復也以此推之圖象􅀮然不待多言而自可黙喻矣四德則隂陽各二而誠無不貫安得不謂五行之性乎凡此更反復之當自見也太伯之事正也太王王季文武之事􅁠也􅁠而不失其正則並行而不相悖矣此義聖人盖難言之若看未透且姑置之不必深致疑亦不必多爲􅀃也廟議看得似亦未精子孫之於祖考恩雖無窮而義則有止不可過不可不及亦並行而不悖且以周而言之欲使之黜后稷而祖文武固丗俗淺薄之論􅀂遂欲使之越后稷而祖帝嚳以至於無窮又賢者過之之失也答張元德配義與道之􅀃殊不可曉大抵讀書須且虚心靜慮依傍文義推尋句脉看定此句指意是􅀃何事略用今人言語襯帖替換一兩字􅀃得古人意思出來先教自家心裏分明歴落如與古人對靣􅀃話彼此對答無一言一字不相肯可此外都無閑雜􅀃話方是得箇入處怕見如此棄却本文肆爲浮􅀃􅀃得􅀰當都忘了從􅀄因甚話頭􅀃得到此此最學者之大病也故程先生有􅀃書非古意轉使人薄漢儒下帷講誦未必是􅀃書又􅀃作論語觧已是剰了又以毛公􅀃詩爲有儒者氣象􅀚此等處其意盖可見今􅀃配義與道却不就孟子上理㑹如何是義如何是道如何是氣如何地配便一郷掉開了只單􅀃箇道字巳是無捉摸處又將道字訓作行字􅀹無交渉􅀃得愈多去理愈逺矣今合且先理㑹如何是義却就義字上推如何是道道之與義同異如何如何又要氣来配他配字又是何意適檢集注􅀃得儘分明了不知曾子細看否只此數字分明即孟子意思分明可見而程子所謂沖漠氣象亦在其中􅀄非有二􅀃也子約所􅀃亦未免向别處去如此支離轉無交渉却恐不免眞爲擎拳竪拂者所􅀏矣其它所論時習率性鳶魚等􅀃今皆未暇論論得亦未有益可且理㑹此配義與道令分明便中早報及也答張元德人心雖未有喜怒哀樂而物欲之根存焉則固巳偏於此矣故於其所偏者得之則喜且樂失之則怒而哀無復顧義理也此段􅀃得是但物欲之根存焉之􅀃恐未然人固有偏好一物者然此一物未上心時安得不謂之未發之中乎欲下功夫正當於此看取子約心性之􅀃甚可駭来俞所引孟子甚當張云孟子論性而以惻隱羞惡恭敬是非之心爲􅀃亦可謂失心性之辨乎性難知而心可盡所謂盡其心者如程子所謂當處便認取此句不干事與今日格一物明日格一物知性也積習旣乆脫然貫通之謂也盡心也又如論語集注所云隨事精察知性也而未知其體之一盡心也眞積力乆而將有所得此即盡心知性之案此叚内注字係先生批心性一物知則皆知但盡之爲難耳又性可逐事言心則舉其全體也禹惡㫖酒一章此等處只逐句看不必如此牽合天王狩于河陽春秋熹所未學不敢強爲之􅀃然以人情度之天王狩于河陽恐是當時史䇿巳如此書蓋當時周室雖㣲名分尚在晉文公召王固是不順然史䇿所書想必不敢明言晉侯召王也李傕郭汜朱全忠盗賊狂恣唯力是視亦未必曾讀春秋見有此事而效之也習静坐以立其本而於思慮應事專一以致其用以此爲主一之法如何明道敎人静坐蓋爲是時諸人相從只在學中無甚外事故敎之如此今􅀂無事固是只得静坐􅀂特地將静坐做一件功夫則却是釋子坐禪矣但只著一敬字通貫動静則於二者之間自無間㫁處不湏如此分别也語孟或問乃丁酉本不知後來改定如何論孟集注後來改定處多遂與或問不甚相應又無功夫修得或問故不曽傳岀今莫若且就正經上玩味有未通處參考集注更自思索爲佳不可恃此未定之書便以爲是也答張元德嘗讀歐陽公論許丗子止之事未免疑之及讀胡文定公傳未足以破其疑洽􅁇而考之左氏公羊之傳自明但後人因穀梁不嘗藥之􅀃遂執此一句以爲止之罪如此而巳殊不考左氏曰許悼公瘧飲丗子止之藥卒公羊曰止進藥而藥殺也此可以見悼公之死於藥矣當時之事雖未有明文而洽嘗􅀚近丗治瘧者以砒霜鍜而餌之多愈然不得法不愈而反殺人者亦多矣悼公之死必此􅀋也不然當時所進非必死之藥止偶不嘗而巳則公羊何以謂之藥殺丗子何爲遽棄國而出奔孟子曰殺人以挺與刃有以異乎以刃與政有以異乎進藥而藥殺可不謂之弑哉其所以異於啇臣蔡般者過與故之不同耳心雖不同而春秋之文一施之者以臣子之於君父不可過也如此􅀚之似足以正近世經傳之失而破歐公之疑不識先生以爲如何胡文定通㫖中引曽吉父􅀃如律中合御藥誤不如本方造御舟誤不牢固之􅀋巳有此意矣但考之於經不見許止棄國出奔之事不知果何謂也答張元德舊與朋友􅀃話毎恠其不觧人意而不知其所以然者近方覺得學者讀了書􅃪了話元不曽著心記當紬繹玩味至有兩年看一部易傳都不記得緊要處者雖其根鈍使然亦是不肯用力乃知橫渠教人讀書必欲成誦眞是學者第一義須是如此巳上方有著力處也歐嚴二君後来曽相見否此中甚難得人深可憂懼也所望以永斯文之傳者如二三君盖無幾人也答􅅴吉甫此間爲况幸亦如常但朋友自不敢住多巳引去亦隨時之義也所示之􅀃今却附還大抵看得未甚浹洽言多窒礙且宜少讀而益加潜心反復玩味之功也中庸言健順仁義禮智之性妄意以爲健順用也仁義禮智之性體也健順二字在上者先言用而後言體又以配上文先言隂陽而後言五行未知是否健順之體即性也合而言之則健順分而言之則曰仁義禮智仁禮健而義智順也先生前􅀊論伊尹樂堯舜之道一段云樂堯舜之道須是見得是獨自底非是衆家常住底今􅀊先生又言衆家常住底何者非堯舜之道又言若堯舜之道便是衆家常住底則不消更􅀃堯舜後􅀃近是但所記語有差今亦不記當時因何􅀃此也蔡丈云天根是好人之情狀月窟是小人之情狀三十六宫是八卦隂陽之爻某疑人物二字恐未可便以善惡㫁之又言三十六宫都是春即月窟亦爲春也陽善隂惡聖賢如此􅀃處極多盖自正理而言二者固不可相無以對待而言則又各自有所主康節所詠恐是指生物之源而言則正氣爲人偏氣爲物爲隂陽之辨季通所論却是推􅀃然意亦通也答􅅴吉甫集注中􅀃曽􅀧處有樂此終身一句不知如何􅀚舜居深山之中伊尹耕於有莘之野豈不是樂此以終身後来事業亦偶然耳若先有一毫安排等待之心便成病痛矣注中若無此句即此一轉語全無收拾答它聖人問頭不著只如禪家擎拳竪拂之意矣君子所以異於人以其存心昨蒙賜教謂存心者處心也集注又曰以仁存心言以是存於心而不忘也而直卿􅀃是以其心之所存處看它念念在何處某以爲若如先生之誨則是以仁禮存在心中若直卿之言則是以心存在仁禮上二􅀃孰是直卿􅀃得亦是但要夲文意義順似注􅀃又須知不是將心去存在仁禮上亦不是將仁禮存在心裏也蔡丈言天根爲好人之情狀月窟爲小人之情狀又云隂陽都將做好􅀃也得以隂爲惡陽爲善亦得伏蒙賜教以爲陽善隂惡聖賢如此􅀃處極多盖自正理而言二者固不可相無以對待而言則又各有所主某疑康節先言天根月窟是合偏正而言後言以爲都是春者是專以正者言之不知是否看遺書中善惡皆天理及惡亦不可不謂之性不可以濁者不謂之水等語及易傳陽無可盡之理一節即此義可推矣更以事寔考之只如鴟梟蝮蝎惡草毒藥還可道不是天地隂陽之氣所生否答林退思􅀘知讀書有漸甚善甚善但亦須且讀一書先其近而易知者字字考驗句句推詳上句了然後及下句前段了然後及後段乃能眞實該徧無所不通使自家意思便與古聖賢意思泯然無間不見古今彼此之隔乃爲眞讀書耳答林退思某區區之見亦惟以儒者職分實不易盡今之學者皆有小噐易盈之患於所當知或聞而不講或講而不精是以見道不全而應用有闕用是憤悱不遑自安懼所見之有偏則所至之不逺反復聖賢之典泛參百氏之書師事名儒以證所疑以質所見庶幾識斯道之全體明入德之大方事有大變則有以處之時有大幾則足以應之顧瞻海内之君子自治嚴密規摹廣大而進修不巳體用兼該本末具舉惟先生一人今屈於貧困寸歩不能自致不􅀗以酬其所欲身雖在此而心則在函丈也某在天地間甚不足道亦知不肯爲小人儒慨念往古道學素明到春秋時賢士大夫議論與夫經理其國尚有標置正學既晦人物便不耐檢􅀧資禀粹温者間有暗合古人仁心處尚足以維持國體使意脉未絶資禀竒􅊆者間有暗合古人仁政處尚足以把持事務使丗變未極更要進前擔􅀒自應是去不得此某所以欲汲汲講究成巳之仁成物之知庶幾識古人所謂大學者今以乏財不得進拜函丈誰其成就之律曆兵法要識端涯莫指其蹤古今損益大変職分所當急朝夕看諸儒之論以巳見揣摩迄不知其㫖郷間諸賢無有􅀵而教之者只得將六經涵泳耳某聞明學問之全體而後可以底夫大成盖知至其所至而不能終其所終者有矣未有不知至其所至而能終其所終者也孔門之髙弟若子夏子游子張止於有聖人一體則造夫全體者寜有幾人然全體之不知則有同門異户之患雖欲有其一體不可得矣古之君子所以終日孜孜惟恐學不足以知性命之正才不足以成天下之務識不足以周萬物之情者以爲不如是則有所偏􅀝而無以立乎其大者也大者之不立猶不登㤗山無以見天下之小不遊大海無以見衆流之同歸一源所存既卑安藜藿之􅅴難語太牢之味固有以聦明爲障思慮爲賊自以爲見性成佛終不明寂然不動之體也以智力之所操持謀略之所駕馭自許以致功立業終不明行所無事之知也渉獵先民之論泛􅀚古今之書自許以愽學多聞終不知皮之不存毛將焉􅀓也夫是之謂無以立乎其大者也若知從事於其本而以道之全體爲準的則學足以知性命之正必通乎死生之􅀃而異端不能惑矣才足以成天下之務則坦然見王道之易行不至於不以堯之所以治民者治民矣識足以周萬物之情則所識前言往行無非畜德不至泛濫無統迄無立身之地矣君子反經而巳經正則由天下之正路而業可大也德可新也血氣有盛衰而與生俱生者未嘗變也所遇有窮逹在我未嘗有加損也智及乎此則可與造全體矣某雖昏蒙尚知自勉追懐古人夫豈無志今丗英才誰肯自卑今欲考百氏之同異収歛其偏以求其全郷居僻陋書􅁽無所取欲廣交四方之名人合其所長用以自反貧窶無資寸歩不能自致深慮日月易流有􅀒􅀄志結茅爲庵以退爲名奉親之暇􅆂泳六經退省乎日用之間自求日新之功庶乎有得焉耳敢望先生發揮其義來示備悉學者之志固不可不以逺大自期然􅀚孔門之教則其所從言之者至爲卑近不過孝弟忠信持守誦習之間而於所謂學問之全體􅀄不察察言之也若其髙弟弟子多亦僅得其一體夫以夫子之聖諸子之賢其於道之全體豈不能一言盡之以相授納而顧爲是拘拘者以狹道之傳畫人之志何哉盖所謂道之全體雖高且大而其實未嘗不貫乎日用細微切近之間苟恱其高而忽於近慕於大而略於細則無漸次經由之實而徒有懸想跂望之勞亦終不能以自逹矣故聖人之教循循有序不過使人反而求之至近至小之中慱之以文以開其講學之端約之以禮以嚴其踐履之實使之得寸則守其寸得尺則守其尺如是乆之日滋月益然後道之全體乃有所郷望而漸可識有所循習而漸可能自是而往俛焉孳孳斃而後已而其所造之淺深所就之廣狹亦非可以必詣而預期也故夫子嘗以先難後􅀗爲仁又以先事後得爲崇德盖於此小差則心失其正雖有鑚堅仰髙之志而反爲謀利計功之私矣仁何自而得德何自而崇哉聊誦所聞以答下問之意至於庵記大字之需則非學之急亦老􅂴之所不暇也舒大夫向嘗相見於㑹稽所論未合今想其學益有成矣聞其政亦甚佳有本者固如是也不及爲書因見􅄑略道意答王􅀳輔峴爲學大槩且以收拾身心爲夲更將聖賢之言從頭熟讀逐字訓釋逐句消詳逐㱼反復虚心量力且要曉得句下文意未可便肆巳見妄起浮論也答王􅀳輔示喻卒哭之禮近丗以百日爲期盖自開元失之今從周制葬後三虞而後卒哭得之矣若祔則孔子雖有善殷之語然論語中庸皆有從周之􅀃則無其位而不敢作禮樂計亦未敢遽然舎周而從殷也況祔于祖父方是告祖父以將遷它廟告新死者以將入祖廟之意巳􅀕則主復于寢非有二主之嫌也主復于寢見儀禮鄭氏注至三年之䘮畢則又祫􅀕而遷祖父之主以入它廟奉新死者之主以入祖廟此見周禮鄭注及横渠先生􅀃則祔與遷自是兩事亦不必如殷之練而祔矣禮法重事不容草草卒哭而祔不若且從温公之􅀃庶幾寡過耳答王􅀳輔自去秋冬及此開正三辱枉書皆無便可報無疑人来又承惠問􅀹以爲慰訊後巳復改􅀊逺惟感時追慕孝履支勝熹病益深無可言者前書所論告子之􅀃此等議論不湏置意中亦不湏容易與之辨論且只自家理會聖賢之所巳言而求其㫖意之所在乆之精熟自然見得是非不著問人矣大學巳領便中却欲更求十數本可以分及同志也太極西銘切不湏廣盖丗問巳自有本爲此冗長無益於事或徒能相累耳徐侍􅀰所欲鏤版之書恨未之見然此等亦不必看徒亂人耳且著實向裏就切近明白實處理會便不誤人也此間諸書南康板本成後亦無甚人修改處不知有黑􅀧子者是何本也只看其間有大同小異處子細咨問季章參考得失便自見得若有所疑切冀見諭當爲契勘奉報也南軒之書多未㫁手而不幸即丗而或者不察一例流傳使人不能無遺恨所以前此爲之刋削别爲定本盖推本其遺意非敢以私見輒有去取也如大愚之􅀃兼看亦佳但其䂓模亦太闊逺不若且就本經文義上爛熟咀嚼之爲愈也無疑人到多日偶以雪寒不能作書而其人不能乆候口占布此殊不盡意正逺千萬節哀自愛答王􅀳輔荐承委喻極荷不鄙實以多病畏事不敢作文字以故前此不敢聞命今不􅀗巳輙以數字附于行狀之末少見鄙意然巳覺太露筋骨切告勿以示人恐彼此不穩便非獨罪戾之蹤爲有害也向来子約每言郷學之意甚羙然於愚意􅀼恐務實之意未若好名之多學道之志未若爲文之力此亦郷黨習尚流風之弊其所從来也逺宜賢者之未免也自今以往更願反躬自省以擇乎二者之間察其孰緩孰急以爲先後姑屏舊習而取凡聖賢之言若大學若論孟若中庸者朝夕讀之精思力行以序而廣使道義之實有以悅於心而充諸巳則自將無慕於外而所以顯親揚名者必有以異乎前日之爲矣􅀂以名位之爲尊言語之爲麗聞譽之爲誇而汲汲乎伐石攻木以爲事則是非獨老拙羞之抑子約平生所望於賢者亦將大不滿於泉下矣所喻鄙文何乃爲此曲折巳託劉季章言之此豈止載禍相餉而巳耶答王􅀳輔所喻䟦語今再冩去臨川者亦累問不得報此書度巳浮湛不可得矣今亦不須問也疑義足見向學之意墓祭不可考先儒􅀃恐是􅀕土神但今俗行拜掃之禮其來巳乆似不可廢又墳墓非如古人之族葬若只一處合爲一分而遥􅀕之亦似未便此等不若隨俗各􅀕之爲便也其他闕文數處或是或否皆非講學之急務况集注中又巳有􅀃甚明自可􅀚考不必問也畏縮之􅀃蘇黄門亦云然非本文之意兼集注中亦巳有定論禮書縮訓直者非一它日當見之乃先儒之舊不可易也范碑曲折嘗以鄙意請於益公未蒙剖決然此公􅀭歷之乆更事爲多必有見處後生况亦未須遽論此事豈可因此便議前輩之失非所以致敬於逹尊也程紏所編年譜是終身看得此事不透深可憐憫渠元不曾􅀉来却是身後爲人在廣州鏤版方得見之甚恨不得及早止之做此話欛没了期也然世間識者亦少但恐後丗有明眼人指􅀧出来耳吾友今亦未湏理會此等且理會自家著緊切身要用底道理乆之見識漸明履踐漸實自不􅀍人瞞亦不湏與人辨論紛爭也季章耿介於人有責善之益重九後若未来可力致之逸居獨學無師友之益不知不覺過失日滋功夫無由長進不可忽也景陽悼亡可念才臣書未到巽伯亦未有人来書􅀉婺女迂迴難通今後只託人􅀉臨川劉教授處可也不知渠書中有何􅀃毎念仁里諸賢相與甚至而未得與之痛相切磨悠悠􅀊月日益晚暮良以爲恨如無疑亦然也因見各煩爲致此意答杜仁仲良仲自頃聞昆仲之名而願得一見乆矣中間僅得識良仲之面而於仁仲尚復差池至今爲恨兹者乃承不鄙致問許以来辱此意厚矣然理義不外於吾身但能反躬力索毋使因循有所間㫁則無不得之理孟子所謂歸而求之有餘師者此也願益勉旃以副此望異時有以自得之則雖相望之逺亦不異於合堂同席而居矣答杜仁仲示喻爲學之意甚善操存舎亡此外無著力處但常切提撕勿計功效乆當自得力耳理固不可以偏正通塞言然氣禀既殊則氣之偏者便只得理之偏氣之塞者便自與理相隔是理之在人亦不能無偏塞也橫渠論受光有大小昏明而照納不二其􅀃甚備可試考之人心道心不能無異亦是如此然亦不須致疑但惟精惟一是著力要切處耳魂魄之􅀃極詳密矣文叔書中亦論此巳答之可取一􅀚來喻得失亦巳具其中也答杜仁仲得文叔書具道才質之羙恨未一見兹辱惠書喜聞比日所履佳勝示喻爲學之意甚善若果見得端緒常切提撕不少自恕則氣質昏弱非所病矣千萬勉旃少副所望答杜仁仲良仲示喻敬字工夫甚善凡聖賢之言皆貫動静如云求其放心亦不是閉眉合眼死守此心不令放出也只是要得識此心之正如惻隱羞惡之􅀋於動靜間都無走失耳所論氣禀有偏而理之統體未嘗有異亦得之明道又謂不可以濁者不爲水亦是此意也但謂神即是理却恐未然更宜思之仁仲所論朝聞夕死則愚意見得二先生之􅀃􅀄不甚異盖道即事物當然不易之理若見得破即隨生隨死皆有所處生固所欲死亦無害也答杜仁仲良仲前書所論數條皆善但更勉力研䆒玩味乆之自然見處明白踐履從容不費安排仁仲盖有意於切問近思之學者然亦便如此不得更須愽之以文始有進歩處耳答杜仁仲良仲所示疑義巳附已意於其後試詳考之更加虚心游意反復玩味乆當自釋然也仁仲反躬克巳之意甚切雖未知所病者何事然旣知其病即内自訟而亟改之耳何暇呫呫誦言以咎旣往之失而求改過之名哉今不亟改而徒言之又自表其未有改之之實也則是病中生病名外取名不但無益而已五行之神神是理之發用而乗氣以出入者故易曰神也者如萬物而爲言者也來喻大槩得之但恐却將神字全作氣看則又誤耳明道云生之謂性一條明道此章内性字有指其墮在氣質中者而言有指其本原至善者而言須且分别此一字令分明不差方可子細逐項消詳今來喻大槩盖巳得之只其間有未細密處且更虚心玩味乆當益精耳継之者善易中本指道化流行之妙而言此却是就人身上指其發用之端而言如孟子論性善只以情可爲善爲􅀃盖此發用處便見本原之至善不待别求若可别求則是人生而靜以上却容􅀃也孟子所論天下之言性者則故而巳矣亦是此意更詳之所云水之方分􅂀者未曉来意恐非明道之本㫖也答杜貫道讀書課程甚善但思慮亦不可過苦但虚心游意時時玩索乆之當自見縫罅意味持守亦不必著意安排但亦只且如此從容􅂊覺散漫即便提撕即自常在此矣答杜貫道節次示及諸􅀃皆善但不巳其功乆之見處漸分明矣其間雖有小禾通處今亦不暇一一條析奉報也致道歸草草附此作書多不能詳細仁里諸賢多得相處但賢者與良仲仁仲未得一見耳或能相與一來大幸靣見指􅀃殊勝書問徃還也答池從周前此辱書未報今又承惠問􅀹以愧感詢及所疑足見嗜學之意但讀論語大學亦是􅀄學門户且得如此向前更有多少功夫豈可便慮其雜但此二書亦須反復熟讀著力研究乃可見其意耳所問論語首章但將所學反復思繹常切遵行便是時習習之之乆自有􅀃處此只是爲學實事别無深逺㫖趣也汎愛雖非初學之切務然旣與物接若都恝然與之相忘亦非義理自是須泛愛也􅀚賢者之意似只欲以兀然自守爲是故所論每毎如此願少恢廓之不然只終不免於昏陋狹隘而無所發明也答胡文叔璟承書喻及先世交遊之好不勝感愴三復書詞乃知有志傳家之學又以爲慰今世徇俗爲人之學固不足道其稍知用心於内者徃徃又以􅕽於髙逺而失之是可歎也来喻之云似巳察於此者但常專心致志思繹踐行有疑則與同志講而明之則庶乎其有得矣答潘坦翁履孫集注觧多聞擇其善者而從謂所從不可不擇多見而識謂善惡皆當存之以備參攷某恐經文止曰識之未有皆存善惡以備參攷之意本文之義只如此不容别爲之􅀃盖擇字生於從字識則未有便從之意故不言擇善也子與人歌而善程子曰歌必全章也與割不正不食席不正不坐同某未曉其義反之猶言從頭再起也若只就中間接續便和則不成全章矣故必使其歌巳畢從頭再起然後和之則得全章程子意盖如此然某意亦恐未盡也師摯之始􅀜雎之亂某謂亂者指其成言之爾盖樂章至亂而始成不要其成無以見其羙盛爾非專指亂而言也此等處今不得聞古人之樂難以深論且如集注大槩􅀃過可也不踐迹一章集注曰善人質羙而未學者也某謂質羙故不爲惡未學故不能知古人所以行者而踐之惟其不踐跡故亦無自而入於室也集注用程張二先生􅀃其理甚精恐非如来喻之云也更詳之答奚仲淵示喻所聞足見志道躬行之實慰幸歎仰盖不勝言但孟子論浩然之氣是集義所生非謂集義於此以養彼浩然之氣也又謂不必於應用處斟酌是否亦恐未免離内外判心迹之病聖賢所謂義者正欲於應用處斟酌耳但日用功夫自有先後緩􅇥不可先其細者而緩於大體恐仲淵意是如此若其不然恐更合商量也義理之間誠當明辨然非有格物致知與敬以直内之功則亦難明而易失来喻所謂熟處難忘者恐坐此也然亦學者之通患如熹正苦此而未能自脫耳伯起舊游每病其不以此事爲急今乃能勇猛精進如此人固未易量也計左提右挈長者之力爲多異時歸老田間復得此一益友爲幸甚矣趙德廣在此日相見殊愧不能有以發其志意者昨見所與渠書當知所以自勉也答􅀺季忱示及兩卷各巳批注封還幸細考之語孟更須寛心細意看令通徹易則恐未易讀如此穿鑿似枉費心力也盖易本􅁲筮之書故先王設官掌於太􅁲而不列於學校學校所教詩書禮樂而巳至孔子乃於其中推出所以設卦􅀚象繋詞之㫖而因以識夫吉㐫進退存亡之道盖聖人當時巳曉卜筮之法與其詞意所在如􅀃田狩即實是田狩􅀃􅀕祀即實是􅀕祀征伐昏媾之􅀋皆無非譬喻也故就其間推出此理耳若在今日則巳不得其法又不曉其詞而暗中摸索妄起私意􅀼恐便有聖賢復生亦未易通與其虚費心力於此不若且看詩書禮樂之爲明白而易知也然大學論孟中庸又在四者之先須都理會得透徹方可略看易之大指亦未爲睌今所論論語尚爾未通豈宜遽及此耶答傅敬子昨承逺訪别来又巳累月辱書欣審比日所履佳勝講學須且著實自家理會寛著意思涵泳思索方能有得如今来所喻亦須且自看有疑處方好商量若只如此泛問不濟事又所記心性之語亦似語脉中不無差誤今不省記當時如何􅀃也所欲大字及二卦􅀃􅀹是兒戯若眞實做功夫何用此等裝飾耶答傅誠子兹承惠書足見好學之篤巳足爲慰矣比想冬温所履佳勝所示疑問皆有急迫之意此最爲學之害須且放下只平平地讀書玩味其意理會未得處且記著時時拈起看恐乆之須有得力處若只如此枉費心力不濟事也幾微之間善者便是天理惡者便是人欲􅂊覺如此便存其善去其惡可也何難剖析之有第二條亦不湏得如此理會且討箇書讀換􅁍許多勞攘乆之湏放得下第三條旣知得大有妨害便掃除了何問之有如此紛紜自作纒繞無了期也答高國楹所喻不能處事乃學者之通病然欲别求方法力與之競轉成紛擾而卒無可勝之理不若虚心讀書􅀚理􅀵拾念慮使之專一長乆則自然精明而此病可除矣但讀書亦有次第且取其切於身心者讀之若經理丗務啇略古今􅀼恐今日力量未易遽及且少緩之亦未爲失也答常鄭卿聞學中諸事漸有條理􅀹以爲喜學校規矩雖不可無亦不可專恃湏多得好朋友在其間表率􅂆導使之有郷慕之意則教者不勞而學者有益今得擇之復来則可因之以招致其餘矣鄙意又恐更湏招致得依本分識道理能作舉業者三數輩參錯其間使之誘進此一等後生亦是一事但此湏緩緩子細圖之恐其間有趨向不同反能爲害則不濟事也頃年又見黄叔張在此作教官時教小學生誦書旬日一試如答墨義然立定分數考察去留似亦有益小學教諭見無職事可掌使任其責似亦兩便試推此􅀋多爲之塗以收拾教養之則人情感恱當無扞格之患矣答李晦叔煇所􅀃工夫亦且如此做去看乆逺如何有疑却喻及呉􅁺亦聞其人相處有何議論邪隆興江法曹有書􅀉渠處必時有便也其人清苦力學但溺佛好穿鑿耳令弟今在何處前得其書未能别答所論顔子凖的甚善但難如此泛論湏子細􅀃岀日用工夫次第曲折方見得是非耳幸以此意語之也答李晦叔所論持敬讀書表裏用力切須實下功夫不可徒爲虚􅀃然表裏亦非二事但不可取此而舎彼耳其實互相爲用只是一事􅂊􅀃性字便是以人所受而言此理便與氣合了但直指其性則於氣中又湏見得别是一物始得不可混并􅀃也江􅁺所言物性本惡安有是理来諭巳得之矣更切涵養爲佳耳答李晦叔持敬讀書只是一事而表裏各用力耳若有所偏便疑都不曾做工夫今且逐日著實做將去未湏比量難易計較得失徒然紛􅅰不濟事反害事要令日用之間只見本心義理都不見有它物方有得力處耳所問􅀕禮各以所見報去可更詳之聞户曹多學禮􅀃唐人議論可試扣之可檢看也江法􅁺清苦力學不可多得人之所見要亦未能盡同但偏執不通輕於述作此爲大不便耳程氏􅀕儀謂凡配止以正妻一人或奉祠之人是再娶所生即以所生毋配煇􅀼謂凡配止用正妻一人是也若再娶者無子或祔􅀕别位亦可也若奉祀者是再娶之子乃許用所生配而正妻無子遂不得配享可乎程先生此􅀃恐誤唐㑹要中有論凡是嫡母無先後皆當並祔合􅀕與古者諸侯之禮不同古今家􅀕禮中亦有此叚但恐彼無本耳夫主不可以二者也四明髙氏之􅀃云耳煇詳此意謂有宗子之家主􅀕故庶子止以其牲􅀕于宗子之家可也是不可以有二主也今人若兄弟異居相去遼逺欲各􅀕其父祖亦謂不可以二主乎兄弟異居廟􅀄不異只合兄􅀕而弟與執事或以物助之爲宜向見􅀃前輩有如此而相去逺者則兄家設主弟不立主只於􅀕時旋設位以􅁓榜標記逐位􅀕畢焚之如此似亦得禮之變也更詳之魏公贈謚只告于廟疑爲得禮但今世皆告墓恐未免隨俗耳更冀裁之大抵讀書當擇先儒舊􅀃之當於理者反覆玩味朝夕涵泳使與本經之言之意通貫浹洽於胷中然後有益不必段段立􅀃徒爲􅀚羙而實未有得於心也答李晦叔所問數條大槩相􅀋只是所從言之不同其實則無異義但虚心遊意兼存而並觀之乆當自見其實固並行而不悖也程子不得於言之􅀃恐記者之誤不必深疑吕后稱制武氏革命事體不同自分明光武追廢自其私意不得爲中理也答李晦叔范氏曰聖人同於人者血氣也異於人者志氣也血氣有時而衰志氣則無時而衰也先生於集注中去却上句血字及下句氣字然今南康所刋本又却仍舊從范􅀃不知如何氣一也主於心者則爲志氣主於形體者即爲血氣范氏本􅀃盖如此向來誤去其本文兩字後来覺得未穩故改從舊􅀃集注觧不知命無以爲君子謂知有命而信之人不知命則避害趨利何以爲君子而觧公伯寮愬子路章乃云聖人於利害之際則不待决於命而後安二􅀃似相反某謂公伯寮章指聖人言所以不决之於命而此章乃爲欲爲君子者而設不知如何来􅀃是也上蔡􅀃得此意思好語録中有之肌膚之㑹筋骸之束乃是持敬用力之乆便覺得身心如此東萊謂操存則血氣循􅁤而不亂収斂則精神内守而不浮恐是此意某㝷常試之誠覺得如此然於閙處又却不然東萊此􅀃是也然不當作兩句看此處只是放去収来頃刻間事只一操字巳是多了不湏如此著意安排也先生頃者次對實以侍講之故除此與伊川除􅀃書而授朝官者何異伊川罷􅀃書而辭朝官先生罷侍講而辭待制事體實同伊川素不曽陳乞封叙先生旣用次對奏薦又却力辭職名學者多未喻陳和父以爲伊川出處與先生不同居其位則受其恩數乃理之常至他日不合而去但當辭其職耳不當并辭恩數也不知如何此事不敢自分踈後世須自有公論也子事父母劉元承所編二先生語録謂婦拜於堂下子不當拜於堂下盖父子主恩婦乃義合子婦一例恐不當有分别温公􅀕畢獻壽雖言叙立如􅀕所之位而不言陞降恐亦皆在堂上也爲長子三年及爲伯叔兄弟皆朞服而不觧官爲士者許赴舉不知當官與赴舉時還吉服耶衰服耶若湏􅁻服則又與五服所載年月有戾矣此等事只得遵朝廷法令若心自不安不欲赴舉則勿行可也當官則無法可觧罷伊川先生看詳學制亦云不禁冐衰守常此可見矣但雖不得不暫釋衰亦未可遽純􅁻也答李晦叔大學或問中隂陽五行之􅀃先生答黃寺丞云隂陽之爲五行有分而言之有合而言之煇嘗推之云云分合之􅀃固如此然就原頭定體上􅀃則未分五行時只謂之隂陽未分五性時只謂之徤順及分而言之則陽爲木火隂爲金水徤爲仁禮順爲智義或問曰然於其正且通之中又或不無清濁羙惡之異故其所賦之質又有智愚賢不肖之殊煇􅀼嘗謂命可言所賦性可言所受而智愚賢不肖是其所禀之氣有清濁羙惡之不同也先生却以智愚賢不肖不歸於所禀而歸於所賦何耶賦猶俗語云分俵均敷之意書傳之􅀃或以性言或以形言當隨處看或問曰然而本明之體得之於天終有不可得而昧者是以雖其昏蔽之極而恍惚之間一有覺焉則即此介然之頃而其本體巳洞然矣煇􅀼詳數句只是發明本明之體終有不可得而昧之意若就學者用工夫上􅀃則恍惚之間㫁無自覺之理須是格物致知誠意正心脩身功夫次第曲折然後本明之體可得而明若是􅄀然都無覺處則此能致知者是何人耶此是最親切處所宜深察答李晦叔煇􅇮者因舉肌膚之會筋骸之束兩句􅀼意謂與東萊所謂操存則氣血循􅁤而不亂收歛則精神内守而不浮正是此意先生批誨云此􅀃是也然不必作兩句看煇因思之未見有重疊處此等處只是閑􅀃不湏著力更下注脚枉費心力先生又批誨云此處只是放去􅀵来頃刻間事只一操字巳是多了不湏如此著意安排也煇􅀼謂心之存亡出入特繋於人之操舎如何耳但聖人則不操而常存衆人則操之而後存也先生云只一操字巳是多了煇乆而未喻近者看􅀛山觧七十而從心所欲之義謂聖人從容中道無事乎操然後始悟先生批誨之意正是爲巳存者設若心不能無放則固不可不操但太著意安排是􅂇長也未審先生以爲如何此是至親切處􅀛山之􅀃亦不謂此湏反之於心只就放去収来時體看只此操時當處便存只要功夫接續不令間㫁耳煇􅀼嘗謂學者却須當常存此心於莊端靜一之中母使一毫私意雜乎其間則方寸之間自有主宰不致散漫走作而虚靈洞徹之本體庶乎可以黙識矣然欲眞實識其虚靈洞徹之本體則又湏是日與義理相親克去巳私然後心之本體可得而識罷却許多閑安排除却許多閑言語只看操則存一句是如何亦不可重疊更下注脚煇􅀼嘗謂自昔明明德於天下者亦湏由格物致知功夫次第曲折然後始能自明其明德也今使天下之人皆有以明其明德便能各誠其意各正其心各修其身各親其親各長其長而格物致知之功略不煩於用力焉豈不墮於不擇其本而直圖其末之弊若欲正心誠意湏是格物致知然若􅀃道各格其物各致其知則似不成言語只得如此􅀃過如云一是皆以修身爲本豈是刪了上四事耶或問曰但其氣質有清濁偏正之殊物欲有淺深厚薄之異是以聖之於愚人之與物相與懸絶而不能同耳煇􅀼詳此叚所􅀃氣質物欲分聖愚人物處似覺可疑若以清濁分聖愚偏正分人物則物欲厚薄淺深一句復將何指若謂指聖愚則聖人無物欲之私若謂􅀃人物則物又不可以淺深厚薄論未曉清濁偏正等􅀃乃本正蒙中語而吕慱士中庸詳􅀃又推明之然亦是將人物賢智愚不肖相對而分言之即須如此若大槩而論則人清而物濁人正而物偏又細别之則智乃清之清賢乃正之正愚乃清之濁不肖乃正之偏而横渠所謂物有近人之性者又濁之清偏之正也物欲淺深厚薄乃通爲衆人而言若作有無則此一等人甚少難入羣隊故只得且如此下語若以爲疑則不若改聖字作賢字亦省得分觧而聖人自不妨超然出於其外也横渠先生曰祔葬祔􅀕極至理而論只合祔一人夫婦之道當其􅀄婚未嘗約再配是夫只合一娶婦只合一嫁今婦人夫死而不可再嫁如天地之大義然夫豈得而再娶然以重者計之養親承家􅀕祀継續不可無也故有再娶之理然其葬其祔雖爲同穴同几筵然譬之人情一室中豈容二妻以義断之湏祔以首娶継室别爲一所可也煇頃看程氏􅀕儀謂凡配用正妻一人或奉祀之人是再娶所生即以所生配煇甞疑之謂凡配止用正妻一人是也若再娶者無子或祔􅀕别位亦可也若奉祀者是再娶之子乃許用所生配而正妻無子遂不得配享可乎先生答云程先生此􅀃恐誤唐㑹要中有論凡是嫡毋無先後皆當並祔合􅀕與古者諸侯之禮不同煇􅀼疑橫渠乃是及至理而論不得不然若欲處之近人情只合從先生所答夫婦之義如乾大坤至自有等差故方其生存夫得有妻有妾而妻之所天不容有二况於死而配祔又非生存之比横渠之􅀃似亦推之有大過也只合從唐人所議爲允况又有前妻無子後妻有子之礙其􅀔將有甚杌隉而不安者唯葬則今人夫婦未必皆合葬継室别營兆域宜亦可耳問缺理固如此然湏實用其力不可只做好語􅀃過人當有以培養之然後積漸純熟向上有進歩處答余國秀宋傑所謂貼裏者但謂不可向外理㑹不干巳事及求知於人之􅀋耳若學問之功則無内外身心之間無粗細隱􅂋之分􅀄時且要大綱持守勿令放逸而常切提撕漸加􅃊密更讀聖賢之書逐句逐字一一理會從頭至尾不要㨂擇如此乆之自當見得分明守得純熟矣今看此􅉺大抵不曾著實持守而遽責純熟之功不曾循序講䆒而務極精微之藴正使􅀃得相似只與做舉業一般於巳分上全無干渉此正不貼裏之病也以下數叚皆是此病不能一一論辨也宋傑嘗謂聖人之道簡易明白而學者所以處巳接物大抵以和爲貴故每覺有順從苟且因循之失然纔著意舉一二事又覺有矯枉過正之病旣知如此便速改之何問之有凡事亦自有恰好道理更精察之則無過直之弊矣宋傑􅀼惟古人多處貧困而㤗然不以累其心不知何道今值窮困若一切不問則理􅀔不容巳若欲辨集則未免有屈志􅌤顔之事窮湏是忍忍到熟處自無戚戚之念矣韓退之盛山詩序􅀃玩而忘之以文辭也云云文辭淺事苟能玩而樂之尚可以忘仕進之窮通況吾日誦聖賢之言探索髙逺如此而臨事全不得力此亦足以見其玩之未深矣答余國秀始嘗推測人之身所以與天地隂陽交際處而不得其􅀃旣讀太極圖􅀃其中有云人物之始以氣化而生者也氣聚成形則形交氣感遂以形化􅀼謂交際處於此可見然形化旣定雖不復氣化而大化之流行接續如川流之不息凡飲食呼吸皆是流通處此身雖由父母生而莫非天地隂陽之化此其所以有天地具情性而可以參天地賛化育也歟其大槩来歷固是如此然須理㑹得其性情之德體用分别各是何面目始得湏逐一體認玩味令日用間發見處的當分明也又嘗因推測人之身而并及於物以至動植之殊各極其本原而察之􅀼謂隂陽五行之氣化生萬物其清濁偏正之不同亦從􅀄有定而其後大化流行亦不能變易如人之必爲萬物之靈麟鳯􅀛龍之靈知猩猩鸚武之能言之􅀋皆是從􅀄如此後来亦如此以身而言則所以爲耳目鼻口四肢百體者皆有當然之理以至爲衆人爲百物皆然不可不一一辨别得非是只要如此推􅀃也􅀼嘗因求放心而謂視聽思慮由巳時是心存不由巳時是心放李敬子以爲合理時是心存且謂某有認氣爲心之病孟子􅀃存其心養其性只是要人常常操守此心不令放逸則自能去講學以明義理而動靜之間皆有以順其性之當然也􅀼謂人性本具衆理本明萬善由氣質物欲之雜所以昏蔽上智之資無此雜故一明盡明無有查滓中人以降必有此雜但多少厚薄之不同耳故必逐一求明明得一分則去得一分之雜直待所見盡明所雜盡去本性方復學者體此以致復性之功不知如何此􅀃是但須是實識得其裏面義理之體用乃爲有以明之不可只如此鶻突􅀃過也舜聞一善言見一善行若決江河恐只是無氣禀物欲之累故吾心之理與聞見脗然相契其决如此顔子不違如愚亦是如此若子路有聞云云則其立志雖勇然用力亦似􅁴難恐亦未免爲氣禀物欲所累也同上氣禀物欲均爲害性然物欲之害易見氣禀之害難知然氣禀有二若昏而不明則隨所學可以漸進於明若偏而不中則強者只見得聖賢剛處弱者又只見聖賢寛和處不知如何所學漸明則所偏亦當漸覺矣體察情之動處爲學功夫固當有先後然亦不是截然今日爲此明日爲彼也且如所謂先明性之本體而敬以守之固是如此然從􅀄若都不敬亦何由得有見耶先生序此四者爲格物之先􅀼謂學者欲從事於學必先明乎此而後進學之功有實地之可據苟爲不然則終覺散漫無統而所學終無所歸􅀫矣或問中此段只是􅀃從自已身心上推去到事物上都有許多道理但要逐節逐件識得不是只要如此包􅀃也荅李敬子燔余國秀宋傑一本無余國秀燔氣質躁迫每於先生強探力取之戒積漸㴠泳之訓玩味用功但臨事時終􅁴爲害今只靠定視􅃪言動常於此四事上著力又以義理融液之頗覺得力然後是病根常在不須如此做伎倆但才覺時便克將去莫更計較功効遲速也後叚放此燔􅀼謂顔子四勿今人非不􅁒如此只爲不知其孰爲禮孰爲非禮顔子所以􅂊聞克復之語便知請問其目􅂊聞四勿之語便承當去雖是資質絶人亦必是素於慱文約禮上用功今之學者且先以愽約爲先而四勿之戒隨其所知施之應酬漸漸望其貼近庶有實効旣知如此何不用力然􅀶文約禮亦非二事而異時之深純亦不外乎今日之勉強也燔􅀼妄謂性之者多由内以逹諸外而自不廢夫在外之功反之者多資外以養乎内而始有契夫内之理如顔子之四勿曾子之三省與夫􅀶文約禮動容正顔之事皆資外養内之事也今之學者唯當悉意於此勿之省之亦由内要之内外不是判然兩件事也燔􅀼謂先生教人只是欲人持敬致知克巳以復其性其間條目却自多端自做功夫看即自見得不湏如此泛問也燔謂敬齋箴後面似少從容意思欲先生更著數語使學者遵守庶幾無持之太甚轉不安樂之弊前巳言之矣燔祖妣􅂢弃朋友以劉輝嫡孫承重事見告遂申州以請于朝續凖報許後見范蜀公亦嘗論及乃知輝非苟然者而舜弼始終以爲此事只當從衆今事巳無及但朋友間不幸而值此不知當如何若父是祖之嫡長子巳是父之嫡長子即合承重無疑如其不然則前日之舉爲過於厚亦不必以爲悔也朋友之問則但當以禮律告之不可使人從巳之誤也當言循理守法不當言從衆燔嘗疑伊川平日断不肯與人作墓誌不知其意何在至太中及明道又却用之而其叔父姪女之􅀋亦復自作何也伊川先生􅀄無㫁不作志之􅀃疑以不能甚工於文又或未必得其事實故少作耳集中亦有叔父墓誌者施之於家可無前二者之慮也燔家中舊有祖産今欲禀家叔諸房各以人口多少備辦經用儲之堂前以爲乆逺團欒之計然衆志難諧未有所處諸位各辦􅀊計其力不能辨者如之何此湏熟慮􅀶訪其宜不可草草也燔免䘮之後親戚朋友􅂆以赴部以病不能行或以爲敎官可以請祠燔欲姑守前志且爲養病讀書計未知不仕之意有何義理只可自以大義裁之不湏問人亦非它人所能决也􅀂無正定義理則爲貧而仕古人有之不須如此前郤也燔嘗謂欲君德之羙當重保傅之選欲士風之羙當正敎取之法欲吏道之良當乆其任欲民俗厚當興禮樂欲彊甲兵當倣寓兵之意欲足財用當急農桑之務大槩是如此然須更讀書窮理􅀶􅀚古今聖賢所處之方始有實用不爲空言也燔謂後世人才不振士風不羙在於科舉之法然使便用明道賔興之論伊川看詳之制則今之任學校者皆由科舉而出亦豈能遽變而至道哉明道所言始終本末次序甚明伊川立法姑以爲之兆耳然欲變今而從古亦不過從此規模以漸爲之其􅀄不能不費力矯揉乆之成熟則自然丕變矣燔謂釋老之學所以舛謬只縁未能致知但據偏見直情徑行所以與吾道背馳使其能求通於聖人則其所至豈小小哉又嘗求二氏之學所以盛衰之故釋氏主於心縁其就根本上用力故乆而愈熾老氏主於身縁其所執亦淺狹故乆而微削且熟􅀚義理乆之自然精密未湏如此樁定死法也燔外家司姓外祖早丗外曾祖復子一戴姓者戴死無子只一女舅氏爲之服三年䘮且合葬祖塋祠之家廟屢禀之舅氏遷戴氏葬之它所改外祖合葬外不是祖母之側除戴氏之享使其女主之量分産業使之備禮事今雖未行而朋舊多以爲然續又思之云云􅀄􅀃甚善然亦有一句未是以河廣之義推之可見又思以下則又過矣不共戴天謂父母見殺而其人不死者耳移之於此似非其倫􅀂果如此則禮經何爲而制服邪夫死而嫁固爲失節然亦有不得已者聖人不能禁也則爲之制禮以處其子而母不得與其􅀕焉其貶之亦明矣燔見朋友間多有増親年以希恩霈者且悔之又恐兄弟間有堅欲陳乞者燔以爲不若作一狀子刺破乞備申省部照㑹方爲堅决兄弟若􅁒陳乞但委曲爲陳不可誣親以欺其君之意足矣何必作此痕迹邪燔因與朋友論及冐貫赴試事以爲豈可不攻獨國秀以爲不湏攻幸一言以定衆志不知要如何攻若只經官陳狀乞泛行約束即不妨􅀂指名告示聚衆毆擊則非所宜矣燔􅀼謂明德新民不是自巳一切事都做了後方去新民隨所及所值而爲之耳兩語有病至善乃萬理盡明各造其極然後爲至至善是自然底道理如此􅀃不得爲善如堯舜文王之爲聖湯武之爲征伐周公之爲臣孔子之爲師伊尹之爲志顔子之爲學又謂至善在巳則爲天命之性在事則爲率性之道推之天下則爲脩道之教此聖人之事也若學者則就教上尋求向上去到得極處皆只一般元無加損􅀃得未是亦不湏如此閑􅀃知止能得燔嘗謂洞然無蔽之謂知􅃀然有實之謂得明則誠矣近之但語未􅉷知善之明也得身之誠也近之慮謂知之􅀹精而心思所值無不周悉是燔謂知止則志不惑亂而有定嚮志定則此心無擾而靜心静則此身無適而不安心静身安則用自利事物之来不特能即事見埋又能先事爲防如後甲三日後庚三日之云其於事之終始先後已至未然皆無遺鍳皆無失舉矣如是而後爲得其所止則可以謂之誠有是善而誠極是矣此叚得之燔謂知則知其所當然慮則并極其未然知是閑時知得慮是到手後須要處置得是燔謂知止有明而未誠處得止則一一皆誠矣到得至誠田地上靣更有變化不測在未須如此閑思想看文字且理會當處義理漸覺意味深長乃佳如此支離不濟事也燔謂大學之意當持敬以養其所知之本格物以廣其所知之端使吾心虚明洞徹舉無不燭則是非當否各以呈露而至善所在自不容有所蔽矣周舜㢸以謂知止者非萬理併皆昭徹然後謂之知止一事便有一理即其所知而求得其所止所謂能得者非是動容周旋各當其則一事得其所止如仁敬孝慈之􅁼皆爲至善􅀂必以動容周旋當則言之則將使學者没世窮年無復可以知止而得其所止矣經之所言是學之等級然知有淺深得有大小存乎其人難以一槩論也物有本末本末燔謂先後之中更有輕重本末之先後重始終之先後輕不須如此分别枉費心思道理又不如此無益而有害也燔謂注文於明明徳於天下者之下似少自巳推之之意經文次序巳自詳悉何用更􅀃或問扵明明徳於天下處只言誠意正心脩身而不及致知又益以親親長長而不及齊家治國平天下願聞其指致知所以明之親親長長即齊家之大者平天下之事蓋新民之極功則用益廣而法宜益詳今考傳文則皆感發維持之意而不及乎它似未免乎略平天下章以絜矩推之而詳言同貨利公好惡之事其法可謂詳矣何謂略耶大學傳九章其家不可敎􅀼疑可字當爲能字彼之不可敎即我之不能敎也可之與能彼此之詞也􅀂作家不能敎則不詞矣傳之九章大率皆躬行之事而未及乎爲政八章亦然成敎於國則政事之施在其中矣但須以躬行爲本故特詳之本末輕重固自不同也宋傑嘗於親愛而辟上用功如兄之子常欲愛之如巳子每以第五倫爲鑒但愛巳子之心終重於愛兄之子常欲二字即十起之心也須見得天理發見之本然則所處厚薄雖有差等而不害其理之一矣燔近於家間區處一二事便覺上下睽隔情意寖薄欲遂置而不問則諸事不整不知且只於身上自理會莫屑屑問它如何威如之吉反身之謂也宋傑嘗􅀚傳文論脩身在正其心嘗每用力自克亦頗得力而敬子不以爲然以謂􅀂論是當須還是喜怒中節乃可然宋傑今日之所謂得力者仍是隨意之所便者以致力而實未深察夫不能自巳者也正心之功􅀂自知至意誠中來則不須如此安排而自無不正矣未到此地則亦隨力隨分省察持守可也不須如此計較且向格物處用功乃爲知所先後耳燔謂喜怒憂懼之氣心實帥之帥稍動揺氣不聴命則必有是四者之累學者固當逐件上用功然非先正其帥亦未見其爲全功也如此則與此傳文意全然背戾矣試更推之如何誠意謹其發正心存其體又曰誠意者實所發於我而我命之心正則不問寂感而本體常在兩條􅀃意誠皆未安宋傑嘗􅀚傳之六章注文釋自欺謹獨處皆以物欲爲言或問則兼氣禀言之似爲全備此等處不須疑語意自合有詳略處也宋傑􅀼謂動於物欲而假善以自欺易識而易治雜於氣禀而爲善之不切難識而難治欲得精察氣禀之爲害而克治之當以何道考之經文可也燔居常好善惡惡覺得直是分明然或至自傷其和而施之於人亦多彊猛固必而無容養之意夫好惡眞切如此而病復隨之者何哉此等處自覺是病便自治之不湏問人亦非人所能預也康叔臨淵以爲一物格則一知至燔謂所謂物格者乃衆理俱窮相發互通以至透徹無復餘藴然後爲格若謂一物明一知進則可一物格一知至則不可伊川先生曰今日格一件明日格一件叔臨又謂或問所謂内外昭融内謂理之在巳者外謂理之在物者内謂理之隱微處外謂理之周徧處燔謂釋氏不務格物而但欲自知故一意澄定而所見不周盡吾儒静以養其所知之本動以廣其所知之端兩者互進精密無遺故所見周盡而有以全其天然自有之中大槩近之然亦未盡或問所謂詣其極而無餘隨所詣無不盡燔謂詣其極猶渠成隨所詣猶水隨渠至譬喻未精然亦不湏如此模冩程先生􅀃學者之知道必如知虎者燔謂不待􅀔法迫驅而自不能巳無所爲而樂於爲之者眞知者也然知而習習而熟又精思而後浸得其眞非一知即能洞徹也此亦以中人言之前巳略論之宋傑讀書遇曉不得處即掉下再三讀之竟不曉即置不復問不知其病何在其病在是論古今人物而别其是非宋傑人之過惡豈可輕論但黙觀之而反諸巳或有未明則密以資於師友而勿􅁀於外可也論天地之所以高深燔天之外無窮而其中央空處有限天左旋而星拱極仰觀可見四遊之􅀃則未可知然暦家之􅀃乃以筭數得之非鑿空而言也􅀂果有之亦與左旋拱北之􅀃不相妨如虚空中一圓毬自内而觀之其坐向不動而常左旋自外而觀之則又一靣四遊以薄四表而止也康節天地自相依附之􅀃燔以爲此􅀃與周子太極圖程子動静無端隂陽無始之義一致非曆家所能窺測康節之言大體固如是矣然暦家之􅀃亦湏考之方見其細密處如禮記月令䟽及􅀳天文志皆不可不讀也近見一書名天經只是近世人所作然􅁼集古今言天者極爲該備不知曽見之否􅀑神之所以幽􅂋上蔡云動而不已其神乎滯而有迹其􅀑乎燔謂􅀑雖爲屈乆而必散似無滯留於迹之理云云神顯而􅀑幽上蔡滯而有迹之語誠如所論其它大槩亦是如此然夫子所以答季路之問者又所當思也小學注子事父母孫事祖父母同燔謂諸父諸母親同服同而不及之者何哉諸父異宫非可以徧詣而定省之且若如此則將不得專乎事父母矣此愛敬之等差也程先生齊不容有思之􅀃燔嘗以爲齊其不齊求與􅀑神接一意所􅀕之親乃所以致齊也􅀕義之言似未爲失不知其意果如何􅀕義之言大槩然爾伊川先生之言乃極至之論須就事上驗之乃見其實程先生云致知之要當知至善之所在如父止於慈子止於孝之􅀋燔謂物之大㫖各有精要若泛求之殆亦徒爲紛紛無所底止伊川先生所論格物功夫數條湏通作一義看方見互相發明處如此一條湏與求其所以奉養温清之法者通看也晦庵先生朱文公文集卷第六十二福州府學訓導鄭璉校六十二卷考異􅀘遺答張元徳来書所論通復云云而誠無不貫下一本作故以爲五行之性亦無可疑更請詳之太伯之事正也文武之事􅁠而不失其正也此義並行􅀄不相悖􅀂看未透且闕之亦無害􅀂見得義理表裏洞然則自見得有下落矣荆公廟議亦湏看得禮家文字熟後方見得無可疑者今人正欲廢稷不祀賢者乃并嚳以上而遂之無窮此􅀚過於黨之論也答李晦叔横渠先主曰附􅁙附祭云云不得配享可乎下一本有煇舊曽如此請問先生下無荅字有後来拜領批誨云云諸侯之禮不同下有伏詳先生批誨巳自極合人情然横渠所􅀃又如此尋常舎弟亦疑祔祭之義爲未安適與横渠所論暗合煇􅀼疑横渠云云只合􅀙先生下無所答有􅀃萬一􅀙横渠􅀃則前妻無子而祀奉者却是再娶之子又將何以處之
