body:
  text: 書江張呂劉問答與張敬夫四月一日春秋正朔事比以書考之凡書月皆不著時疑古史記事例只如此至孔子作春秋然後以天時加王月以明上奉天時下正王朔之義而加春於建子之月則行夏時之意亦在其中觀伊川先生劉質夫之意似是如此但春秋兩字乃魯史之舊名又似有所未通幸更與晦叔訂之以見教也答張敬夫竊承政成事簡暇日復有講習之樂英材心化多士風靡此爲吾道之幸豈特一郡之福哉奏罷丁錢此舉甚羙􅀄謂遂􅀗蠲除不知僅免一􅀊雖亦不爲無􅀘特非乆逺利耳然熹竊謂有身則有庸此近古之法蓋食王土爲王民亦無終􅀊安坐不輸一錢之理但不當取之太過使至於不能供耳今欲再奏不􅀂請令白丁下户每􅀊人納一二百錢四等而上毎等遞增一二百使至于極等則略如今日之數似亦不爲厲民而上可以不失大農經費之入下可以爲貧民乆逺之利於朝廷今日事力亦易聽從而可以必濟不審尊意以爲如何似聞浙中諸郡有全不輸筭賦者有取之無藝至于不可堪者凡此不均皆爲未便朝廷自合因此總㑹所入之大數斟酌裁損而均平之乃爲盡善至如尊兄前奏有不容援例之語亦非愚心之所安也聚歛之臣誠可憎疾爲國家者明道正義以端本於上而百官有司景從響附於下則此輩之材寸長尺短亦無所不可用但使之知吾節用􅁉民之意而謹其職守則自不至於病民矣今議者不正其本而唯末之齊斥彼之短而自無長䇿以濟月前之急此所以用力多而見功寡卒無􅀘於國事而虚爲此紛紛也伯恭漸釋舊疑朋友之幸但得渠於此有用力處則􅀊月之間舊病不患不除矣此有李伯聞者名宗思舊嘗學佛自以爲有所見論辨累年不肯少屈近嘗來訪復理前語熹因問之天命之謂性公以此句爲空無一法耶爲萬理畢具耶􅀂空則浮屠勝果實則儒者是此亦不待兩言而決矣渠雖以爲實而猶戀著前見則請因前所謂空者而講學以實之熹又告之曰此實理也而以爲空則前日之見悞矣今欲眞窮實理亦何藉於前日巳悞之空見而爲此二三耶渠遂脫然肯􅂢舊習而從事於此此人氣質甚羙内行脩飭守官亦不苟得其回頭吾道殊有頼也前此答福州一朋友書正論此事書才畢而伯聞至不一二日其言果驗亦可恠也今以上呈二人伯恭皆識之深卿者舊從伯恭逰聞其家學守之甚固但聞全不肯向此學用功正恐難猝㧞也答張敬夫示喻黃公灑落之語舊見李先生稱之以爲不易窺測到此今以爲知言語誠太重但所改語又似太輕只云識者亦有取焉故備列之如何所謂灑落只是形容一箇不疑所行清明髙逺之意􅀂有一豪私吝心則何處更有此等氣象邪只如此㸔有道者胷懐表裏亦自可見􅀂更討落著則非言語所及在人自見得如何如曽􅀧舎瑟之對亦何嘗􅀃破落著在甚處邪通書䟦語甚精然愚意猶恐其太侈更能歛退以就質約爲佳太極解後來所改不多别􅁓上呈來當處更乞指教但所喻無極二五不可混􅀃而無極之眞合屬上句此則未能無疑蓋􅀂如此則無極之眞自爲一物不與二五相合而二五之凝化生萬物又無與乎太極也如此豈不害理之甚兼無極之眞屬之上句自不成文理請熟味之當見得也各具一太極來喻固善然一事一物上各自具足此理著箇一字方見得無欠剰處似亦不妨不審尊意以爲如何擇之亦􅀉得此書草來大槩領略一過與鄙意同後不曽子細􅀧檢不知其病如何或是病痛一般不自覺其病耳伯恭不鄙下問不敢不盡愚但恐未是更賴指摘近日覺得向來胡􅀃多悞却朋友大以爲懼自此講論大湏子細一字不可容易放過庶得至當之歸也别􅁓所諭邵氏所記今只入外書不入行狀所疑小人不可共事固然然尭不誅四凶伊尹五就桀孔子行乎季孫惟聖人有此作用而明道或庻㡬焉觀其所在爲政而上下響應論新法而荆公不怒同列異意者亦稱其賢此等事􅀋非常人所及所謂元豐大臣當與共事蓋實見其可而有是言非傳聞之誤也然力量未至此而欲學之則誤矣序目中語所更定者甚穏然本語熹向所謂先生之學大要則可知巳者正如春秋序所謂大義數十炳如日星乃易見也之比非薄春秋之詞也不改似亦無害􅀂必欲改則新語亦未甚活落大抵割裂􅀘綴終非完物自是不能佳耳與張敬夫伯恭想時時相見欲作書不暇告爲致意向得渠兩書似日前只向愽雜處用功􅁍於要約處不曽子細研究病痛頗多不知近日復如何大抵愽雜極害事如閫範之作指意極佳然讀書只如此亦有何意味耶先逹所以深懲玩物喪志之弊者正爲是耳范醇夫一生作此等功夫想見將聖賢之言都只忙中草草看過抄節一畨便是事了元不曽子細玩味所以從二先生許乆見處全不精明是豈不可戒也耶渠又爲留意科舉文字之乆出入蘇氏父子波瀾新巧之外更求新巧壞了心路遂一向不以蘇學爲非左遮右攔陽擠隂助此尤使人不滿意向雖以書極論之亦未知果以爲然否近讀孟子至答公都子好辨一章三復之餘廢書太息只爲見得天理􅑯㬠分明便自然如此住不得􅀂見不到此又如何强得也然聖賢奉行天討􅁍自有箇不易之理故曰能言距楊墨者聖人之徒也此便與春秋討亂臣賊子之意一般舊來讀過亦不覺近乃識之耳不審老兄以爲如何答張敬夫建陽一二士人歸自臨安云嘗􅀗奉教亦録得數十段答問來其間極有可疑處雖所録或失本意亦必有些來歷也又有泛然之問略不曽經思索答之未竟而遽巳更端者亦皆一一酬酢此非惟於彼無益而在我者亦不中語黙之節矣又隨問遽答􅀂與之爭先較捷者此其間豈無牽彊草略處流傳謬誤爲害不細就令皆是亦徒爲口耳之資程子所謂轉使人薄者蓋慮此耳元履嘗疑學徒日衆非中都官守所宜熹却不慮此但恐來學者皆只是如此而爲教者俯就太過略不審其所自則悔吝譏彈將有所不免矣況其流弊無窮不止爲一時之害道之興喪實將繋焉願明者之熟慮之也答張敬夫􅀋聚孔孟言仁處以求夫仁之􅀃程子爲人之意可謂深切然專一如此用功却恐不免長欲速好徑之心滋入耳出口之弊亦不可不察也大抵二先生之前學者全不知有仁字凡聖賢􅀃仁處不過只作愛字看了自二先生以來學者始知理㑹仁字不敢只作愛􅀃然其流復不免有弊者蓋專務􅀃仁而於操存涵泳之功不免有所忽略故無復優柔厭飫之味克巳復禮之實不但其蔽也愚而巳而又一向離了愛字懸空揣摸旣無眞實見處故其爲􅀃恍惚驚恠弊病百端殆反不􅀂全不知有仁字而只作愛字看却之爲愈也熹竊嘗謂􅀂實欲求仁固莫􅀂力行之近但不學以明之則有擿埴􅁳行之患故其蔽愚􅀂主敬致知交相爲助則自無此蔽矣􅀂且欲暁得仁之名義則又不􅀂且將愛字推求􅀂見得仁之所以愛而愛之所以不能盡仁則仁之名義意思暸然在目矣􅀄不必求之於恍愡有無之間也此雖比之今日髙妙之􅀃稍爲平易然論語中巳不肯如此迫切注解􅀃破至孟子方間有􅀃破處然亦多是以愛爲言如惻隠之􅁼殊不􅀋近世學者驚恠恍愡窮髙極逺之言也今此録所以釋論語之言而首章曰仁其可知次章曰仁之義可得而求其後又多所以明仁之義云者愚竊恐其非聖賢發言之本意也又如首章雖列二先生之􅀃而所解實用上蔡之意正伊川􅀃中問者所謂由孝弟可以至仁而先生非之者恐當更詳究之也答張敬夫大抵觀過知仁之􅀃欲只如尹􅀃發明程子之意意味自覺深長如來喻者猶是要就此處彊窺仁體又一句岐爲二􅀃似未甚安帖也又太極中正仁義之􅀃􅀂謂四者皆有動靜則周子於此更列四者之目爲剰語矣但熟玩四字指意自有動靜其於道理極是分明蓋此四字便是元亨利貞四字仁元中亨義利正貞元亨利貞一通一復豈得爲無動靜乎近日深玩此理覺得一語嘿一起居無非太極之妙正不須以分别爲嫌也仁所以生之語固未瑩然語仁之用如此不語似亦無害不審髙明以爲如何答張敬夫細看言仁序云雖欲竭力以爲仁而善之不明其弊有不可勝言者此數句似未安爲仁固是湏當明善然仁字主意不如此所以孔子每以仁智對言之也近年􅀃得仁字與智字都無分别故於令尹子文陳文子事􅀃得差殊氣象淺迫全與聖人語意不相似觀此序文意思首尾恐亦未免此病更惟思之如何答張敬夫中字之􅀃甚善而所論狀性形道之不同尤爲精宻開發多矣然愚意竊恐程子所云只一箇中字但用不同此語更可玩味夫所謂只一箇中字者中字之義未嘗不同亦曰不偏不􅀝無過不及而巳矣然用不同者則有所謂在中之義者有所謂中之道者是也蓋所謂在中之義者言喜怒哀樂之未發渾然在中亭亭當當未有箇偏􅀝過不及處其謂之中者蓋所以狀性之體段也有所謂中之道者乃即事即物自有箇恰好底道理不偏不􅀝無過不及其謂之中者則所以形道之實也只此亦便可見來教所謂狀性形道之不同者但又見得中字只是一般道理以此狀性之體叚則爲未􅀤之中以此形道則爲無過不及之中耳且所謂在中之義猶曰在裏靣底道理云爾非以在中之中字解未􅀤之中字也愚見如此不審髙明以爲如何忠恕之􅀃竊意明道是就人分上分别淺深而言伊川是就理上該貫上下而言􅀂就人分上􅀃則違道不逺者賢人推之之事也一以貫之者聖人之不待推也􅀂就理上平􅀃則忠只是盡巳恕只是推巳但其所以盡所以推則聖賢之分不同如明道之􅀃耳聖人雖不待推然由巳及物對忠而言是亦推之也大抵明道之言􅀤明極致通透灑落善開􅀤人伊川之言即事明理質慤精深尤耐咀嚼然明道之言一見便好乆看愈好所以賢愚皆􅀗其益伊川之言乍見未好乆看方好故非乆於玩索者不能識其味此其自任所以有成人材尊師道之不同明道渾然天成不犯人力伊川功夫造極可奪天巧所引盡心知天恐是充擴得去之意不知是否秦漢諸儒解釋文義雖未盡當然所得亦多今且就分數多處論之則以爲得其言而不得其意與奪之際似巳平允􅀂更於此一向刻核過當却恐意思迫窄而議論偏頗反不足以服彼之心如向來所論知言不當言釋氏欲仁之病矣大率議論要得氣象寛宏而其中自有精宻透漏不得處方有餘味如易傳序中􅀃秦漢以來儒者之弊及令人看王弼胡安定王介甫易之􅀋亦可見矣况此序下文反復致意不一而足不應猶有安於卑近之嫌也又所謂言雖近而索之無窮指雖逺而操之有要自謂此言頗有含蓄不審髙明以爲如何以愛論仁猶升髙自下尚可因此附近推求庶其得之􅀂如近日之􅀃則道近求逺一向没交渉矣此區區所以妄爲前日之論而不自知其偏也至謂􅀋聚言仁亦恐有病者正爲近日學者厭煩就簡避迂求捷此風巳盛方且日趨於險薄􅀂又更爲此以導之恐益長其計􅀗欲速之心方寸愈見促迫紛擾而反䧟於不仁耳然却不思所􅀋諸􅀃其中下學上逹之方蓋巳無所不具苟能深玩而力行之則又安有此弊今􅀩來喻始悟前􅀃之非敢不承命然猶恐不能人人皆肯如此慤實用功則亦未免尚有過計之憂不知可以更作一後序略采此意以警後之學者否不然或只盡載此諸徃返議論以附其後亦庶乎其有益耳不審尊意以爲如何答張敬夫壬辰冬答晦叔書鄙意正如此巳復推明其􅀃以求教於晦叔矣但於來示所謂知底事者亦未能無疑巳并論之今錄以上呈更乞垂教在中之義之􅀃來諭􅀃得性道未嘗相離此意極善但所謂此時蓋在乎中者文意簡略熹所未暁更乞詳諭又謂巳􅀤之後中何嘗不在裏靣此恐亦非文意蓋旣言未發時在中則是對巳發時在外矣但發而中節即此在中之理發形於外如所謂即事即物無不有箇恰好底道理是也一不中節則在中之理雖曰天命之秉彛而當此之時亦且漂蕩淪胥而不知其所存矣但能反之則又未嘗不在於此此程子所以謂以道言之則無時而不中以事言之則有時而中也所以又謂善觀者却於巳發之際觀之也􅀂謂巳發之後中又只在裏面則又似向來所􅀃以未發之中自爲一物與巳發者不相渉入而巳發之際常挾此物以自隨也然此義又有更要子細處夫此心廓然􅀄豈有中外之限但以未發巳發分之則湏如此亦􅀂操舎存亡出入之云耳并乞詳之心譬之水是因知言有此言而發然性情旣有動靜善惡旣有順逆則此言乃自然之理非用意差排也人無有不善此一言固足以具性情之理然非所以論性情之名義也􅀂論名義則如今來所􅀃亦無害理不費力更推詳之太極圖立象盡意剖析幽㣲周子蓋不得巳而作也觀其手授之意蓋以爲唯程子爲能受之程子之祕而不示疑亦未有能受之者爾夫旣未能黙識於言意之表則道聽塗􅀃其弊必有甚焉近年巳覺頗有此弊矣觀其答張閎中書云書雖未出學未嘗不傳第患無受之者及東見録中論横渠清虚一大之􅀃使人向别處走不􅀂且只道敬則其㣲意亦可見矣􅀂西銘則推人以知天即近以明逺於學者之用爲尤切非􅀂此書詳於天而略於人有不可以驟而語者也孔子雅言詩書執禮而於易則鮮及焉其意亦猶此耳韓子曰尭舜之利民也大禹之慮民也深其周子程子之謂乎熹向所謂㣲意者如此不識髙明以爲如何答張敬夫所引家語只是證明中庸章句要見自哀公問政至擇善固執處只是一時之語耳於義理指歸􅀄無所害似不必如此力加排斥也大率觀書但當虚心平氣以徐觀義理之所在如其可取雖世俗庸人之言有所不廢如有可疑雖或傳以爲聖賢之言亦湏更加審擇自然意味平和道理明白脚踏實地動有據依無籠􅇁自欺之患􅀂以此爲卑近不足留意便欲以明道先生爲法竊恐力量見識不到它地位其爲泛濫殆有甚焉此亦不可不深慮也且不知此章旣不以家語爲證其章句之分當復如何爲定耶家語固有駁雜處然其間亦豈無一言之得耶一槩如此立論深恐終啓學者好髙自大之弊願明者熟察之其他如首章及論費隠處後來略巳脩改如來喻之意然􅀂必謂兩字全然不可分􅀃則又是向來伯恭之論體用一源矣如何如何答張敬夫語解語解云學者工夫固無間斷又當時時紬繹其端緒而涵泳之此語恐倒置􅀂工夫巳無間㫁則不必更言時習時習者乃所以爲無間斷之漸也巧言令色一段自辭欲巧以下少曲折近與陳明仲論此􅀃具别􅁓三省者曽子之爲仁恐不必如此􅀃蓋聖門學者莫非爲仁不必專指此事而言意思却似淺狹了大抵學者爲其所不得不爲者至於人欲盡而天理全則仁在是矣􅀂先有箇云我欲以此去爲仁便是先􅀗也昨於知言疑義中嘗論此意矣傳不習乎疑只當爲傳而不習之意則文理順亦是先孝弟而後學文之􅀋道千乗之國道字意恐未安友不如巳恐只是不勝巳胡侍郎􅀃得此意思好愼非獨不忽追非獨不忘恐不必如此􅀃上蔡多好如此似有病也厚者德之所聚而惡之所由消靡此句亦未安父在觀其志一章似皆未安信近於義則言必可復矣恭近於禮則可逺恥辱矣因是二者而不失其所親則亦可尚也巳熹舊􅀃此章只如此似於文意明順與上文孝弟謹信而親仁下文篤敏愼而就正意亦相􅀋不審尊意以爲如何樂與好禮視無謟無驕正猶羙玉之與碔砆此句與後面必也無謟無驕然後樂與好禮可得而進焉者似相戾蓋玉石有定形而不可變唯王霸之異本殊歸者乃得以此爲譬耳熹又嘗論此所引詩正謂孔子以無謟無驕爲未足必至於樂與好禮而後巳有似乎治骨角者旣切之而復磋之治玉石者旣􅅣之而復磨之蓋不離是質而治之益精之意也如何如何患不知人恐未合􅀃到明盡天理處正爲取友用人而言耳大率此解雖比舊􅀃巳爲平援尚時有貪􅀃髙逺恐怕低了之意更乞平心放下意味當更深長也首章便如此矣援字疑穏字之誤答張敬夫論中庸章句率夫性之自然此語誠似太快然上文􅀃性巳詳下文又舉仁義禮智以爲之目則此句似亦無害或必當改則改爲所有字如何然恐不􅀂不改之渾然也不睹不聞等字如此剖析誠似支離然不如此則經文所謂不睹不聞所謂隠微所謂獨三段都無分别却似重􅃨冗長湏似熹􅀃方見得戒愼不睹恐懼不聞是大綱􅀃結上文可離非道之意莫見乎􅀮莫顯乎㣲是就此不睹不聞之中提起善惡之㡬而言故君子愼其獨蓋其文􅀔有表裏賔主之異湏略分别意思方覺分明無重􅃨處耳隨時爲中爲改作處如何道之不明不行來喻與鄙意大指不異但語有詳略逺近不同耳然熹所謂不必知不必行所當知所當行等句正是要形容中字意思所謂以爲不足行以爲不必知不知所以行不求所以知等句又是􅂃切􅀜紐處恐不可闕但鄙論自覺有箇􅃈碎促狹氣象不能如來教之髙明簡暢爲可恨然􅀻竊以謂不期於同而期於是而巳故又未能遽舎所安萬一將來就此或有尺寸之進此病當自去耳大抵近年所脩諸書多􅀋此以此未满意欲爲踈通簡易之􅀃又恐散漫無収拾處不知所以裁之也答張敬夫中庸謹獨䖏誠覺未甚顯煥然著盡氣力只􅀃得如此近􅁒只改末後一句云所謂獨者合二者而言之不睹之睹不聞之聞也比舊似巳稍勝然終亦未爲分明也更乞以尊意爲下數語如何以敬爲主則内外肅然不忘不助而心自存不知以敬爲主而欲存心則不免將一箇心把捉一箇心外面未有一事時裏靣已是三頭兩緒不勝其擾擾矣就使實能把捉得住只此巳是大病況未必真能把捉得住乎儒釋之異亦只於此便分了如云常見此心光爍爍地便是有兩箇主宰了不知光者是真心乎見者是真心乎來諭剖析雖極精微􅁍似未及此意愚慮及此不審是否如何何有於我哉古注云人無是行於我獨我有之按此語是孔子自言此三事何人能有如我者哉孔子之意盖欲勉人以學也伊川先生似亦是如此􅀃黙識而無厭倦何有於我哉勉人學當如是也所以發明夫子之意而尹和靖云孰能如孔子者哉是以勉學者云耳又所以發明伊川之意蓋此兩項七事乃人之當然而示之以近者故聖人以此自居而不以爲嫌如云不如丘之好學之意語雖􅀂少􅀭而意實巳深自抑矣吕氏之􅀃句中添字太多恐非本意如吾有知乎哉無知也兩句文義亦自難􅀃近看似此等處極多日前都草草懸空􅀃過了也再答敬夫論中庸章句執其兩端熹􅀃是推明程子之意未有過巧之病如來諭云云固先儒所未及然􅁍似過巧兼此方論中未應遽及此又似隔驀􅀃過了一位也強哉矯矯強貌古注云爾似巳得之吕楊之􅀃􅁍恐不平穏也素隠俟更思之造端乎夫婦如此􅀃固好但恐句中欠字太多兼造端兩字是實下功夫之意不應如此泛濫也此類當兩存之人心之所安者即道也上文有率性之謂道云云故其下可以如此􅀃􅀂恐人錯㑹當更暁破耳㳺子之言行相顧爲有餘不足之事恐未安此數句各是一事不可混而爲一也細意玩之自可見矣此亦當兩存之章句之失誠如尊喻此間朋友亦有疑其如此者但鄙意疑此書旣是子思所著首尾次序又皆分明不應中間出此數章全無次序所以區區推考如此竊意其中必湏略有此意正使不盡如此亦勝如信彩逐叚各自立􅀃不相管屬也更望細考􅀂果未安當爲疑詞以見之大率擺落章句談􅀃玄妙慣了心性乍見如此􅃈細區别自是不柰煩耳與張敬夫六月二十八日夷齊讓國而逃諫伐而餓此二事還相関否或謂先巳讓國則後來自是不合更食周粟􅀂爾則當時自不必歸周亦不待見牧野之事又諌不從而後去也且􅀂前日已曽如彼即今日更不得如此此與時中之義不知又如何凡此鄙意皆所未安幸乞垂教答張敬夫三月十四日熹昨承誨諭五王之事以爲但復唐祚而不立中宗則武曌可誅後患亦絶此誠至論但中宗雖不肖而當時幽廢特以一言之失罪狀未著人望未絶觀一時忠賢之心與其募兵北討之事及後來諸公􅀃李多祚之語則是亦未遽爲獨夫也乃欲逆探未形之禍一旦舎之而更立宗室恐反爲計校利害之􅀻非所以順人心乘天理而事亦未必可成也愚慮如此然而此外又未見别有長䇿不知髙明以爲如何􅀂維州事則亦嘗思之矣唐與牛李蓋皆失之也夫不知春秋之義而輕與戎盟及其犯約攻圍魯州又不能聲罪致討絶其朝貢至此乃欲效其失信叛盟之罪而受其叛臣則其義有所不可矣然還其地可也縳送悉怛謀使肆其殘酷則亦過矣􅀂論利害則僧孺固爲人言以恐文宗如致堂之所論而吐蕃卒不能因維州以爲唐患則徳􅁉之計不行亦未足爲深恨也計髙明於此必有定論幸并以見教牛論正而心則私李計譎而心則正何有於我哉後來思尹子􅀃誠未安竊意只是不居之詞聖人之言此􅀋甚多不以俯就爲嫌也惡知其非有也頃時亦嘗爲􅀃正如晦叔之意後來又以爲疑乃如尊兄所諭今細思之却不􅀂從晦叔之􅀃文意俱順法戒亦嚴不啓末流之弊也如何如何答張敬夫十二月熹窮居如昨無足言者但逺去師友之益兀兀度日讀書反巳固不無警省處終是旁無彊輔因循汨没㝷復失之近日一種向外走作心悅之而不能自巳者皆凖止酒例戒而絶之似覺省事此前輩所謂下士晚聞道聊以拙自修者􅀂充擴不巳􅀘復前非庶其有日舊讀中庸愼獨大學誠意母自欺處常苦求之太過措詞煩猥近日乃覺其非此正是最切近處最分明處乃舎之而談空於􅄀漠之間其亦悞矣方竊以此意痛自檢勒懔然度日惟恐有怠而失之也至於文字之間亦覺向來病痛不少蓋平日解經最爲守章句者然亦多是推衍文義自做一片文字非惟屋下架屋􅀃得意味淡薄且是使人看者將注與經作兩項功夫做了下稍看得支離至於本㫖全不相照以此方知漢儒可謂善􅀃經者不過只􅀃訓詁使人以此訓詁玩索經文訓詁經文不相離異只做一道看了直是意味深長也中庸大學章句縁此略修一過再錄上呈然覺其間更有合刪處論語亦如此草定一本未暇脫藁孟子則方欲爲之而日力未及也近又讀易見一意思聖人作易本是使人卜筮以決所行之可否而因之以教人爲善如嚴君平所謂與人子言依於孝與人臣言依於忠者故卦爻之辭只是因依象􅀋虚設於此以待扣而決者使以所值之辭決所疑之事似􅀂假之神明而亦必有是理而後有是辭但理無不正故其丁寧告戒之詞皆依於正天下之動所以正夫一而不繆於所之也以此意讀之似覺卦爻十翼指意通暢但文意字義猶時有窒礙蓋亦合純作義理􅀃者所以彊通而不覺其礙者也今亦錄首篇二卦拜呈此􅀃乍聞之必未以爲然然且置之勿以示人時時虚心略賜省閱乆之或信其不妄耳傷急不容耐之病固亦自知其然深以爲苦而未能革􅀂得伯恭朝夕相處當得減損但地逺不能數見爲恨耳此間朋友絶少進益者擇之乆不相見覺得病痛日深頃與伯恭相聚亦深歎今日學者可大受者殊少也柰何柰何子夀兄弟氣象甚好其病却是盡廢講學而專務踐覆􅁍於踐履之中要人提撕省察悟得本心此爲病之大者要其操持謹質表裏不二實有以過人者惜乎其自信太過規模窄狹不復取人之善將流於異學而不自知耳鄕約之書偶家有藏本且欲流行其實恐亦難行如所喻也然使讀者見之因前輩所以教人善俗者而知自修之日亦庶乎其小􅀘耳日疑目字之誤答張敬夫集大成􅀃孔子之謂集大成集合也言合衆理而大備於身也或曰集謂合樂成謂樂之一變此即以樂譬之也集大成也者金聲而玉振之也金聲也者始條理也玉振之也者終條理也始條理者智之事也終條理者聖之事也此以樂明之也金聲之變無窮玉聲首尾如一振之者振而節之猶今樂之有拍也凡作樂者始以金奏而後以玉振之猶聖人之合衆理而備於身也條理衆理之脉絡也始窮其然而􅈁析毫分者智也終備於身而渾然一貫者聖也二者惟孔子全之三子則始不盡而終不備也漢兒寛論封禪亦云兼緫條貫金聲而玉振之意亦如此疑此古樂家語也知譬則巧也聖譬則力也猶射於百歩之外也其至爾力也其中非爾力也此復以射明之也射之所以中者巧也其所以至者力也中雖在至之後然其必中之巧則在未發之前也孔子巧力兼全至而且中三子力而不巧各至其至而不能中也若顔子則巧足以中特力未充而死耳承示及集大成􅀃發明詳備此􅀃大意不過如此今所欲論者正在言語氣象㣲細曲折之間然則來􅀃似頗傷冗費脚手無餘味矣金玉二字正是譬喻親切有功處今却不曽􅀃及只做始終字看了如此則孟子此一節譬喻全是剰語矣舊見學者所傳在臨安時􅀃此一段却似簡當然亦不能盡記熹舊所解又偶爲人借去不及參考得失然記得亦似太多今略􅀃如前竊謂似此巳是不精約使人無可玩味了􅀂更著外來意思言語即愈支離矣不審髙明以爲如何答敬夫孟子􅀃疑義告子篇論性數章按此解之體不爲章解句釋氣象髙逺然全不略􅀃文義便以己意立論又或别用外字體貼而無脉絡連綴使不暁者展轉迷惑粗暁者一向支離如此數章論性其病尤甚蓋本文不過數語而所解者文過數倍本文只謂之性而解中謂之太極凡此之􅀋將使學者不暇求經而先坐困於吾􅀃非先賢談經之體也且如易傳巳爲太詳然必先釋字義次釋文義然後推本而索言之其淺深近逺詳密有序不如是之匆遽而繁雜也大抵解經但可略釋文義名物而使學者自求之乃爲有益耳夜氣不足以存解云夜氣之所息能有㡬安可得而存乎按此句之義非謂夜氣之不存也凡言存亡者皆指心而言耳觀上下文可見云仁義之心又云放其良心又云操則存舎則亡惟心之謂與正有存亡二字意尤明白蓋人皆有是良心而放之矣至於日夜之所息而平旦之好惡與人相近者則其夜氣所存之良心也及其旦晝之所爲有梏亡之則此心又不可見􅀂梏亡反覆而不巳則雖有日夜之所息者亦至㣲薄而不足以存其仁義之良心矣非謂夜氣有存亡也􅀂以氣言則此章文意首尾衡決殊無血脉意味矣程子亦曰夜氣之所存者良知良能也意蓋如此然舊看孟子未暁此意亦只草草看過也大體小體此章之解意未明而􅀃太漫蓋唯其意之未明是以其􅀃不得而不漫也按本文耳目之官不思而蔽於物心之官則思此兩節方是分别小體之不可從而大體之當從之意觧云從其大體心之官也從其小体耳目之官也只此便多却從其四字矣下文始結之云此二者皆天之所以與我者但當先立乎其大者則小者不能奪耳此章内先立乎其大者一句方是􅀃用力處而此句内立字尤爲要切據今所觧全不曽提掇著立字而只以思爲主心不立而徒思吾未見其可也於是又有君子徇理小人狥欲之􅀃又有思非汎而無統之􅀃又有事事物物皆有所以然之􅀃雖有心得其宰之云然乃在於動而從理之後此由不明孟子之本意是以其􅀃雖漫而愈支離也七八年前見徐吉卿􅀃曽問焦某先生爲學之要焦云先立乎其大者是時熹􅀃此章正如此解之支離聞之惘然不解其語今而思之乃知焦公之學於躬行上有得力處反身而誠觧云反身而至於誠則心與理一云云按此解語意極髙然只是賛詠之語施之於經則無發明之􅂇施之於巳則無體驗之功竊恐當如張子之􅀃以行無不慊於心解之乃有落著兼樂莫大焉便是仰不愧俯不怍之意尤慤實有味也􅀂只懸空􅀃過便與禪家無以異矣所過者化所存者神觧中引程子張子之􅀃合而爲一按此程子張子之􅀃自不同不可合爲一􅀃程子云所過者化是身所經歴處所存者神所存主處便神是言凡所經過處人皆化也而心所存主處便有鼓舞風動之意不待其居之乆而後見其效也經歷及便字尤見其意又引緩來動和及易傳革卦所引用亦可見也今以孟子上下文意求之恐當從程子爲是張子􅀃雖精㣲然恐非本文之意也君子不謂命也此一章前一節文意分明然其指意似亦止爲不得其欲者而發後一節古今􅀃者未有定論今讀此解􅀃智之於賢者聖人之於天道兩句極爲有功但上三句却似未穩蓋但云出於自然則只似言性而非所以語命矣頃見陳􅀓良作此論意正如此方以爲疑不知其出於此豈嘗以是告之耶熹竊謂此三句只合依程子􅀃爲禀有厚薄亦與下兩句相通蓋聖與賢則其禀之厚而君子所自以爲禀之薄而不及者也然則此一節亦專爲禀之薄者而發可欲之謂善有諸巳之謂信竊詳所解熹舊􅀃亦然自今觀之恐過髙而非本意也蓋此六位爲六等人爾今爲是􅀃則所謂善者乃指其理而非目其人之言矣與後五位文意不同又舊􅀃信爲自信之意今按此六位皆它人指而名之之辭然則亦不得爲自信之信矣近看此兩句意思似稍穩當蓋善者人之所同欲惡者人之所同惡人之爲人有可欲而無可惡則可謂之善人矣然此特天資之善耳不知善之爲善則守之不固有時而失之惟知其所以爲善而固守之然後能實有諸巳而不失乃可謂之信人也張子曰可欲之謂善志仁則無惡也誠善於心之謂信正是此意不審高明以爲如何此􅀃信字未是後别有􅀃前書所示孟子數義皆善但條理字恐不必如此􅀃蓋此兩字不能該得許多意思也始條理終條理猶曰智之事聖之事云爾條理字不湏深􅀃但金玉二字却湏就始終字上􅀃得有來歷乃佳耳易之􅀃固知未合亦嘗拜禀姑置之以俟徐考矣大抵平日􅀃得習熟乍聞此􅀃自是信不及但虚心而微玩之乆當釋然耳􅀂稍作意主張求索便爲舊􅀃所蔽矣此書近亦未暇卒業却看得周禮儀禮一過注䟽見成却覺不甚費力也亦嘗爲人作得數篇記文隨事頗有發明卒未有人冩得俟送碑人回附呈求教也心氣未和每加鐫治竟不能悛中間嘗覺求理太多而涵泳之功少故日常匆迫而不暇於省察遂欲盡罷生面功夫且讀舊所習熟者而加涵養之力竟復汩没又不能遂大抵氣質動擾處多難收歛也且如近讀二禮亦是無事生事也蘄州文字亦嘗見之􅀄意其􅀃止是不喜人闢佛而惡人之溺於佛者旣而考之其間大有包藏遂爲出數百言以暁之只欲俟伯諌歸而示之未欲廣其書也近年士子稍稍知向學而恠妄之􅀃亦復螽起其立志不髙見理不徹者皆爲所引取甚可慮也間嘗與佛者語記其􅀃亦成數篇後便并附呈次昨夕因看大學舊􅀃見人之所親愛而辟焉處依古注讀作譬字恐於下文意思不屬據此辟字只合讀作僻字蓋此言常人於其好惡之私常有所偏而失其正故無以察乎好惡之公而施於家者又溺於情愛之間亦所以多失其道理而不能整齊也如此讀之文理極順又與上章文􅀔正相似且此篇惟有此五辟字卒章有辟則爲天下僇辟字亦讀爲僻足以相明但畏敬兩字􅀄尚疑之細看只爲人所懾憚如見季子位髙金多之比云爾此􅀃尤生不知尊意以爲如何然此非索而􅀗之偶讀而意思及此耳近年靜中看得文義似此處極多但不敢一向㝷求而於受用得力處則亦未有意思耳與張敬夫論癸巳論語􅀃學而時習之程子曰時復紬繹本文作思繹今此所引改思爲紬不知何􅀃學者之於義理當時紬繹其端緒而涵泳之也學而時習之此是論語第一句句中五字雖有虚實輕重之不同然字字皆有意味無一字無下落讀者不可以不詳而􅀃者尤不可以有所略也學之爲言效也以巳有所未知而效夫知者以求其知以巳有所未能而效夫能者以求其能之謂也而者承上起下之辭也時者無時而不然也習者重複温習也之者指其所知之理所能之事而言也言人旣學矣而又時時温習其所知之理所能之事也蓋人而不學則無以知其所當知之理無以能其所當爲之亊學而不習則雖知其理能其事然亦生澁危殆而不能以自安習而不時雖曰習之而其功夫間斷一􅁀十寒終不足以成其習之之功矣聖言雖約而其指意曲折深宻而無窮蓋如此凡爲解者雖不必如此􅃈細剖析然亦湏包含得許多意思方爲完備今詳所解於學而兩字全然闊略而但言紬繹義理以解時習之意夫人不知學其將何以知義理之所在而紬繹之乎且必曰紬繹義理之端緒而涵泳之又似義理之中别有一物爲之端緒􅀂繭之有絲旣紬繹出來又從而涵泳之也語意煩擾徒使學者胷中􅅰􅅰拈一放一將有揠苗助長之患非所以示人入德之方也􅀃者油然内慊也程子但言浹洽於中則􅀃雖不正觧􅀃字而􅀃字之意巳分明旣述程語而又増此句似渉重􅃨則慊者行事合理而中心滿足之意施之於此似亦未安孝弟也者其爲仁之本與自孝弟而始爲仁之道生而不窮按有子之意程子之􅀃王謂事親從兄愛人利物莫非爲仁之道但事親從兄者本也愛人利物者末也本立然後末有所從出故孝弟立而爲仁之道生也今此所觧語意雖髙而不親切其愛雖有差等而其心無不溥矣此章仁字正指愛之理而言曰易傳所謂偏言則一事者是也故程子於此但言孝弟行於家而後仁愛及於物乃著實指事而言其言雖近而指則逺也今以心無不溥形容所包雖廣然恐非本㫖殊覺意味之浮淺也曰字恐誤巧言令色􅀂夫君子之脩身謹於言語容貌之間乃所以體當在巳之實事是求仁之要也此意甚善但恐湏先設疑問以發之此語方有所指今無所發端而遽言之則於經無所當而反亂其本意矣如易傳中發明經外之意亦必設爲問答以起之蓋湏如此方有節次來歷且不與上文觧經正意相雜而其抑揚反覆之間尤見得義理分明耳爲人謀而不忠處於巳者不盡也處字未安道千乗之國信於巳也巳字未安自使民以時之外此句無所當恐是羡字母友不如巳者不但取其如巳者又當友其勝巳者經但言母友不如巳者以見友必勝巳之意今乃以如巳勝己分爲二等則失之矣而其立言造意又似欲髙出於聖言之上者觧中此􅀋甚多恐非小病也愼終追逺愼非獨不忘之謂誠信以終之也追非獨不忽之謂乆而篤之也以愼爲不忘追爲不忽􅀂舊有此􅀃則當引其􅀃而破之􅀂􅀄無此􅀃則此兩句亦無所當矣且下文兩句所觧亦未的當凡事如是所以養德者厚矣愼終追遠自是天理之所當然人心之所不能巳者人能如此則其徳自厚而民化之矣今下一養字則是所以爲此者乃是欲以養德而其意不專於愼終追逺矣厚者德之聚而惡之所由以消靡也此語於經無當於理未安父在觀其志志欲爲之而有不得行則孝子之所以致其深愛者可知此章舊有兩􅀃一􅀃以爲爲人子者父在則能觀其父之志而承順之父没則能􅀚其父之行而繼述之此經所言亦爲人之父不能皆賢不能皆不肖故通上下而言以中人爲法耳今解又云三年無改者言其常也似亦非是若言其常則父之所行子當終身守之可也豈但以三年無改爲孝哉信近於義恭謂貌恭又曰恭而過於實適所以招恥辱恭不近禮謂之無節而過卑則可謂之貌恭而過實則失之矣且貌恭而過實亦非所以取耻辱也言而不可復則不可行將至於失其信矣或欲守其不可復之言則􅊇於理而反害於信矣此結句似不分明恐未盡所欲言之曲折也竊原本意盖曰欲其言之信於人而不度於義者復之則害於義不復則害於信進退之間蓋無適而可也故君子欲其言之信於人也必度其近於義而後出焉則凡其所言者後無不可復之患矣恐湏如此說破方分明也就有道而正焉異世而求之書本文未有此意恐不湏過􅀃或必欲言之則别爲一節而設問以起之可也貧而樂富而好禮進於善道有日新之功其意味蓋無窮矣此語不實詩三百其言皆出於惻怛之公心非有它也惻怛與公心字不相屬非有它也乃嫌於有它而觧之之辭然亦泛矣詩􅀤於人情似無有它之嫌􅀂有所嫌亦湏指言何事不可但以有它二字槩之也無違生事之以禮以敬養也死葬之以禮必誠必信也􅀕之以禮致敬而忠也專言敬則愛不足專言誠信則文不足忠字尤所未暁然致敬而忠恐亦未足以盡􅀕禮大率聖人此言至約而所包極廣條舉悉数猶恐不盡况欲率然以一言該之乎十世可知􅀂夫自嬴秦氏廢先王之道而一出於私意之所爲有王者作其於􅁇承之際非損益之可言直盡因革之宜而巳此一節立意甚偏而氣象褊迫無聖人公平正大隨事順理之意且如此說則是聖人之言不足以盡古今之變其所謂百世可知者未及再世而巳不驗矣嘗究此章之指惟古注馬氏得之何晏雖取其􅀃而復亂以巳意以故後來諸家祖習其言展轉謬誤失之愈遠至近世呉才老胡致堂始得其說最爲精當呉􅀃有續解考異二書而考異中此章之􅀃爲尤詳願試一􅀚或有取焉大抵此二家􅀃其它好處亦多不可以其後出而忽之也非其􅀑而􅀕之謟也無其􅀑神是徒爲謟而巳聖人之意罪其􅀕非其􅀑之爲謟而不㡬其􅀕無其􅀑之徒爲謟也謟自惡德豈論其有􅀑無􅀑徒與不徒也哉韶武聖人之心􅀄無二致揖遜征伐時焉而巳此理固然但此處解羙善兩字而爲此􅀃似以舜武心皆盡羙而武王之事有未盡善則羙字反重而善字反輕爲不倫耳盖羙者声容之盛以其致治之功而言也善者致羙之實以其德與事而言也然以德而言則性之反之雖有不同而成功􅀄無適莫而不知義故狥其􅀻意以爲可否而反爲有適有莫既有適莫故遂不復求義之所在而卒䧟於一偏之􅀃也求爲可知􅀂曰使巳有可知之實則人將知之是亦患莫巳知而巳豈君子之心哉此􅀃過當􅀂曰所謂求爲可知者亦曰爲其所當爲而巳非謂務皎皎之行以求聞於人也則可矣一以貫之道無不該也有􅀮􅂋内外本末之致焉􅀂無􅀮􅂋内外本末之致則所謂一貫者亦何所施哉此意其善然其辭則似生於辨論反覆之餘者今發之無端則無所當而反爲煩雜􅀂曰聖人之心於天下事物之理無所不該雖有内外本末􅀮􅂋之殊而未嘗不一以貫之也則言順而理得矣欲訥於言言欲訥者畏天命行欲敏者恭天職言行自當如此不必爲畏天命恭天職而然今􅀂此言則是以言行爲小而必􅁛天以大之也且言行之分属未穏當行之欲敏獨非畏天命耶晝􅃦知抑精矣抑字恐誤臧文仲世方以小慧爲知小慧似非所以言臧文仲季文子非誠其思此語未善顔淵季路侍爲吾之所當爲而巳則其於勞也奚施施勞舊􅀃皆以施爲勿施於人之施勞者勞辱之事今如此􅀃語不分明子細推㝷似亦以施爲夸張之意勞爲功勞之勞其意雖亦可通但不知勞字有如此用者否耳必如此􅀃更須子細考證􅀃令明白乃佳存乎公理此句亦未善質勝文則野失而爲府史之史寧􅀂爲野人之野乎此用楊氏與其史也寧野之意然彼亦以爲必不得巳而有所偏勝則寧􅀂此耳今解乃先言此而又言矯揉就中之說則旣曰寧爲野人之野矣又何必更􅀃脩勉而進其文乎文理錯雜前後矛盾使讀者不知所以用力之方恐當移此於矯揉就中之後則庶乎言有序而不悖也人之生也直罔則昧其性是􅁳行而已矣此􅀃似好然承上文直字相對而言則當爲欺罔之罔中人以下不驟而語之以上是亦所以教之也孟子言不屑之教誨是亦教誨之蓋爲不屑之教誨已是絶之而不復教誨然其所以警之者亦不爲不至故曰是亦教誨之而巳矣所謂亦者非其正意之辭也􅀂孔子所言中人以下未可語上而不驟語之以性與天道之極致但就其地位告之以切已著實之事乃是教之道正合如此非􅀂不屑之教誨全不告語而但棄絶以警之也今日是亦教誨之也則似教人者不問其人品之髙下必盡告以性與天道之極致然後始可謂之教誨才不如此便與絶而不教者無異此極害理非聖門教人之法也且著此一句非惟有害上文之意覺得下文意思亦成躐等氣象不佳試思之􅀂但改云不驟而語之以上是乃所以漸而進之使其切問近思而自得之也則上下文意接續貫通而氣象無病矣此所撰集注巳依此文冩入矣敬􅀑神而逺之逺而不敬是誣而巳誣字未安知仁動靜知之體動而靜在其中仁之體靜而動在其中此義甚精蓋周子太極之遺意亦巳冩入集注諸􅀃之後矣但在此處讀之覺得有急迫之病略加曲折别作一節意思發明乃佳大抵此解之病在於太急迫而少和緩耳子見南子過衛國必見寡小君孔子居衛最乆不可但言過衛見小君者禮之當然非特衛國如此也夫子􅃪衞國之政必自衛君之身始此理固然然其間似少曲折只如此􅀃則亦粗􅁀而可畏矣試更思之􅀂何􅀶施濟衆不當以此言仁也仁之道不當如此求也但言不當而不言其所以不當之故不足以發聖人之意先言仁者而後以仁之方結之立人逹人仁也能近取譬恕也自是兩事非本一事而先言後結也述而不作聖人所以自居者平昜如此平易二字􅀃不著老彭孔子事同而情性功用則異孔子賢於尭舜非老彭之所及人皆知之自不須􅀃但其謙退不居而反自比焉且其辭氣極於遜譲而又出於誠實如此此其所以爲盛德之至也爲之說者正當於此發其深微之意使學者反復潜玩識得聖人氣象而因以消其虚驕傲誕之習乃爲有力今但以平易二字等閑􅀃過而於卒章忽爲此論是乃聖人鞠躬遜避於前而吾黨爲之攘􅃑扼腕於後也且無乃使夫學者疑夫聖人之不以誠居謙也乎哉大率此解多務發明言外之意而不知其反戻於本文之指爲病亦不細也黙而識之黙識非言意之所可及盖森然於不睹不聞之中也又云世之言黙識者􅀋皆想像億度驚恠恍惚不知聖門實學貴於踐履􅀮㣲之際無非眞實黙識只是不假論辨而暁此亊理如侯子辨揔老之􅀃是巳盖此乃聖人之謙詞未遽􅀃到如此深逺處也且此􅀃雖自踐履言之然其詞氣則與所謂驚恠恍惚者亦無以相逺矣子之燕居聖人聲氣容色之所形如影之隨行声氣容色不離於形同是一物影之於形雖曰相隨然􅁍是二物以此况彼欲宻而反䟽矣且衆人声氣容色之所形亦以有於中而見於外者豈獨聖人爲然㢤志於道藝者所以養吾德性而巳上四句解釋不甚親切而此句尤有病盖藝雖未節然亦事理之當然莫不各有自然之則焉曰游於藝者特欲其隨事􅀿物各不悖於理而巳不悖於理則吾之德性固得其養然􅀄非期於爲是以養之也此解之云亦原於不屑卑近之意故耻於游藝而爲此􅀃以自廣耳又按張子曰藝者日爲之分義也詳味此句便見得藝是合有之物非必爲其可以飬徳性而後游之也自行束脩以上辭氣容色之間何莫非誨也固不保其徃爾誨字之意恐未􅀃到辭氣容色之間亦未有不保其徃之意也盖吾無􅀮乎爾乃爲二三子以爲有􅀮而發不保其徃乃爲門人疑於互鄉童子而發皆非平日之常言不􅀿於此無故而及之也若以禮来者不以一言告之而必俟其自得於辭氣容色之間又先萌不保其徃之意則非聖人物來順􅀿之心矣此一章之中而􅀃過兩節意思尤覺氣迫而味短也憤悱憤則見於辭氣悱則見於顔色此兩字與先儒􅀃正相反不知别有據否子謂顔淵其用也豈有意於行之其舎也豈有意於藏之聖人固無意必然亦謂無􅀻意期必之心耳若其救時及物之意皇皇不舎豈可謂無意於行之哉至於舎之而藏則雖非其所欲謂舎之而猶無意於藏則亦過矣若果如此則是孔顔之心漠然無意於􅀿物推而後行曵而後徃如佛老之爲也聖人與異端不同䖏正在於此不可不察也程子於此但言用舎無與於巳行藏安於所遇者也詳味其言中正微宻不爲矯激過髙之􅀃而語意卓然自不可及其所由來者逺矣程子又云樂行憂違憂與樂皆道也非巳之􅀻也與此相似亦可玩味子行三軍則誰與臨事而懼好謀而成古之人所以成天下之事而不失也豈獨可行三軍而巳㢤臨事而惧好謀而成本爲行三軍而發故就行三軍上觀之尤見精宻盖聖人之言雖曰無所不通而即事即物毫􅁵之間又自有不可易䖏􅀂如此解之云是乃程子所謂終日乾乾節節推去之病矣子所雅言性與天道亦豈外是而它得哉固是如此然未須􅀃子不語語亂則損志損志二字未安弋不射宿不忍乘危乗危二字未安奢則不孫聖人斯言非勉學者爲儉而巳聖人深惡奢之爲害而寧取夫儉之失焉則其所以勉學者之爲儉其意切矣今爲此􅀃是又欲求髙於聖人而不知其言之過心之病也温公謂楊子作玄本以明易非敢别作一書以與易競今讀此書雖名爲􅀃論語者然考其實則㡬欲與論語競矣鄙意於此深所未安不識髙明以爲如何曽子有疾召門弟子形體且不可傷則其天性可得而傷乎此亦過髙之􅀃非曽子之本意也且當著明本文之意使學者深慮保其形體之不傷而盡心焉是則曽子所爲丁寧之意也且天性亦豈有可傷之理乎孟敬子問之將死而言善人之性則然此語太略㡬不可暁恐當加詳焉動容貌者動以禮也正顔色者正而不妄也出詞氣者言有物也動容貌則􅁀慢之事可逺正顔色則以實而近信出詞氣則鄙倍之意可逺此􅀃蓋出於謝氏以文意求之旣所未安而以義理􅀚之則尤有病蓋此文意但謂君子之所貴乎道者有此三事動容貌而必中禮也正顔色而非色莊也出詞氣而能合理也蓋必平日莊敬誠實涵養有素方能如此􅀂其不然則動容貌而不能逺􅁀慢矣正顔色而不能近信矣出詞氣而不能逺鄙倍矣文􅀔如此極爲順便又其用功在於平日積累深厚而其效驗乃見於此意味尤覺深長明道尹氏􅀃蓋如此惟謝氏之􅀃以動正出爲下功處而此解宗之夫經但云動則其以禮與否未可知但云正則其妄與不妄未可見但云出則其有物無物亦未有以驗也蓋夫子嘗言非禮勿動則動容固有非禮者矣今但曰動則􅁀慢如何而遽可逺乎又曰色取仁而行違則正色固有不實者矣今但曰正則信如何而遽可近乎又曰出其言不善則出言固有不善者矣今但曰出則鄙倍如何而遽可遠乎此以文義考之皆所未合且其用力至淺而責效過深正恐未免於浮躁淺迫之病非聖賢之本指也弘毅弘由充擴而成此句似說不著民可使由之使自得之此亦但謂使之由之耳非謂使之知也蕩蕩乎民無能名焉無所不該而其用則宻只廣大便難名不必言其用之宻也禹吾無間然矣皆所以成其性耳禹之所行皆理之所當然固是本出於性然禹亦爲其所當爲而巳非以其能成吾性而後爲之也子絶四絶而不復萌此顔子不貳過之事非所以語孔子蓋此絶字猶曰無耳然必言絶而不言無者見其無之甚也顔淵喟然歎曰約我以禮謂使之宅至理於􅀮微之際候氏曰愽文致知格物也約禮克巳復禮也其􅀃最善此解􅀃得幽深却無意味也必曰如者言其始見之端的者然也此句亦不可暁未見好徳衆人物其性此語未安蓋性非人所能物衆人但不能養其性而流於物耳性則未嘗物也語之而不惰不惰謂不惰其言也夫子之言昭然發見於顔子日用之中此之謂不惰惰字乃怠惰之義如所解乃墜墮之義字自作墮或有通作墮者不作惰也且其爲􅀃又取禪家語墮之意鄙意於此尤所未安也衣敝緼􅂁不忮不求之外必有事焉此語不可暁可與共學或者指􅁠爲反經合道驚世難能之事世俗所謂􅁠者乃隨俗習非偷安苟得如公羊祭仲廢君之􅀋耳正不謂驚世難能之事也唐棣之華唐棣之詩周公誅管蔡之事論語及詩召南作唐棣小雅作常棣無作棠者而小雅常字亦無唐音爾雅又云唐棣棣常棣移則唐棣常棣自是兩物而夫子所引非小雅之常棣矣且今小雅常棣之詩章句聮屬不􅀿别有一章如此蓋逸詩爾論語此下别爲一章不連上文范氏蘇氏巳如此􅀃但以爲思賢之詩則未必然耳或􅀃此爲孔子所刪小雅詩中之一章亦無所考且以文意參之今詩之中當爲第幾章耶食饐而餲聖人所欲不存豈有一毫加於此哉此句不可暁出三日不食之矣或出三日則寧不食焉按經文此句乃觧上文祭肉不出三日之意言所以三日之中食之必盡而不使有餘者蓋以􅀂出三日則人將不食而厭棄之非所以敬神惠也不可則止有不合於正理則從而止之按經文意不可則止但謂不合則去耳前篇論朋友處不可則止文意正同今爲此􅀃穿鑿費力而不成文理竊所未安且兩句文同不􅀿指意頓異如此也􅀧爾何如曽子非有樂乎此也至故行有不揜焉也此論甚髙然反復玩之則夸張侈大之辭勝而慤實淵深之味少且其間文意首尾自相背戾處極多且如所謂曽子非有樂乎此也蓋以見夫無不得其樂之意耳只此一句便自有兩重病痛夫謂曽子非有樂乎此此本於明道先生簞瓢陋巷非有可樂之􅀃也然顔曽之樂雖同而所從言之則異不可不察也蓋簞瓢陋巷實非可樂之事顔子不幸遭之而能不以人之所憂改其樂耳􅀂其所樂則固在夫簞瓢陋巷之外也故學者欲求顔子之樂而即其事以求之則有没世而不可得者此明道之􅀃所以爲有功也􅀂夫曽晢言志乃其中心之所願而可樂之事也盖其見道分明無所係累從容和樂欲與萬物各得其所之意莫不靄然見於詞氣之間明道所謂與聖人之志同便是尭舜氣象者正指此而言之也學者欲求曽晢之胷懐氣象而舎此以求之則亦有没世而不可得者矣夫二子之樂雖同而所從言則其異有如此者今乃以彼之意爲此之􅀃豈不誤哉且夫子之問欲知四子之所志也四子之對皆以其平日所志而言也今於曽晢之言獨謂其特以見夫無所不得其樂之意則是曽晢於夫子之問獨不言其平日之所志而臨時信口撰成数句無當之大言以夸其無所不樂之髙也如此則與禪家拈槌竪拂指東畫西者何以異哉其不得罪於聖人幸矣又何喟然見與之可望乎至於此下雖名爲推􅀃曽晢之意者然盡黜其言而直伸已見則愚恐其自信太重視聖賢太輕立􅀃太髙而卒歸於無實也且所謂無不得其樂者固以人而言之矣而其下文乃以天理自然不可妄助不可過不及不可􅀝著者釋之則未知其以理而言耶抑以人言之耶以理而言則與上文得其所樂之云似不相􅀿以人而言則曽晢之心艱危恐迫傾側動揺亦巳甚矣又何以得其所樂而爲天理之自然􅁘其以爲叙秩命討天則所存尭舜所以無爲而治者則求諸曽晢之言殊未見此曲折且此旣許之以聖人之事矣又以爲聖門實學存養之地則是方以爲學者之事也􅀂曰姑以爲學者之事而巳而又以爲行有所不揜焉則是又并所謂有養者而奪之也凡此数節殊不相􅀿皆熹之所不能暁者竊惟此章之㫖惟明道先生發明的當􅀂上蔡之􅀃徒賛其無所系著之意而不明其對時育物之心至引列子御風之事爲比則其雜於老莊之見而不近聖賢氣象尤􅂋然矣凡此􅀃中諸可疑處恐皆原於此􅀃竊謂髙明更當留意必如横渠先生所謂濯去舊見以来新意者庶有以得聖賢之本心耳論語中大節目似此者不過数章不可草草如此􅀃過也克巳復禮斯言自始學至成徳皆當從事至無所見夫克矣此一節意思似亦因向來以克巳爲後段事故有此反復之論今但如此發之無端恐亦湏設問答以起之子帥以正其有不率者則明法勑罰以示之亦所以教也理固如此但此處未􅀿遽如此􅀃奪却本文正意耳易曰明罰勑法此倒其文不知别有意否直躬世之徇名而不究其實者至㡬何其不􅀂是哉此不知所指言者謂何等事文意殊不明也爲命雖然至言外之意也恐聖人未有此意但作今自推􅀃却不妨耳人也以其有人之道也古注云猶詩所謂伊人此􅀃當矣莊子曰之人也物莫之傷亦與此同􅀂曰有人之道極言之則太重管仲不能當淺言之則太輕又非所以語管仲也孟公綽趙魏老在當時號爲家事治者此句不可暁恐傳本有誤字正譎程子曰云云此解恐當用致堂􅀃向見伯恭􅀃亦如此古之學者爲巳所以成物特成巳之推而巳按此爲人非成物之謂伊川以求知於人解之意可見矣􅀂學而先以成物爲心固失其序然猶非􅀻於巳者恐亦非當時學者所及也吕與叔中庸序中亦如此錯解了不逆詐孔注文義爲順按孔注文義極不順惟楊氏􅀃得之抑者反語之詞如云求之與抑與之與硜硜然小人哉抑亦可以爲次矣皆略反上文之意也微生畆包注訓固爲陋此解是恐亦未安諒隂大君勑五典以治天下而廢三年之逹喪經文未有此意短䘮自是後世之失􅀂欲􅀤明當别立論而推以及之不可只如此􅀃無來歴也脩巳以敬敬有淺深敬之道盡則脩巳之道亦盡而安人安百姓皆在其中此意甚善但敬有淺深一句在此於上下文並無所當反使人疑脩巳是敬之淺者安百姓是敬之深者今但削去此四字及下文一亦字則意義通暢自無病矣原壌㓜而孫弟至見其弊之所自也恐聖人無此意今以爲當如是推之則可耳予一以貫之所謂約我以禮者歟此􅀃巳見顔淵喟然章此亦子貢􅀄年事旣曰當其可則子貢是時􅀿巳黙契夫子之意矣後來所言夫子之得􅀖家者安知不由此而得之何以知其爲􅀄年事耶此等既無考據而論又未端的且􅀄非經之本意不言亦無害也子張問行人雖不見知而在巳者未嘗不行夫子之言言其常理此人雖不知别是一段事未􅀿遽􅀃以亂夫子之意向後别以巳意推言則可耳參前􅀝衡使之存乎忠信篤敬之理也此謂言必欲其忠信行必欲其篤敬念念不忘而有以形於必目之間耳若不責之於言行之實而徒曰存其理而不舎亦何益哉卷而懐之猶有卷而懷之之意未及潜龍之隠見恐不須如此說志士仁人仁者人之􅀁以生也苟虧其􅀁以生者則其生也亦何爲哉志士仁人所以不求生以害仁者乃其心中自有打不過處不忍就彼以害此且非爲恐虧其所以生者而後殺身以成仁也所謂成仁者亦但以遂其良心之所安而巳非欲全其所以生而後爲之也此觧中常有一種意思不以仁義忠孝爲吾心之不能巳者而以爲畏天命謹天職欲全其所以生者而後爲之則是本心之外别有一念計及此等利害重輕而後爲之也誠使眞能舎生取義亦出於計較之􅀻而無慤實自盡之意矣大率全所以生等􅀃自它人旁􅀚者言之以爲我能如此則可􅀂挾是心以爲善則巳不妥帖況自言之豈不益可􅀏乎吕覧所載直躬證父一事而載取名事正􅀋此耳放鄭聲逺佞人非聖人必待戒乎此也於此設戒是乃聖人之道也此是聖人立法垂世之言似不必如此􅀃然禹以丹朱戒舜舜以予違汝弼責其臣便􅀃聖人必戒乎此亦何害乎此蓋尊聖人之心太過故凡百費力主張不知氣象􅁍似輕淺迫㣣無寛愽渾厚意味也一言終身行之行恕則忠可得而存矣此句未安當云誠能行恕則忠固在其中矣誰毀誰譽毁者指其過譽者􅀭其羙此􅀃未盡愚謂毁者惡未至此而深詆之也譽者善未至此而驟􅁛之也非但語其已然之善惡而巳誰毁誰譽謂吾於人無毀譽之意也聖人之心仁恕公平實無毀譽非但無其意而巳有所譽必有所試因其有是實而稱之此亦未盡試猶驗也聖人或時有所譽者雖其人善未至此然必嘗有以驗之而知其將至是矣蓋聖人善善之速惡惡之緩而於其速也亦無所苟焉又曰可毁可譽在彼又曰不云有所毁聖人樂與人爲善也必有所試而後譽則其於毀亦可知矣􅀂如此􅀃則是聖人固常有毁但於此著其有譽而匿其有毀以取忠厚之名也而可乎毁破壊也如器物之未敗而故破壊之聖人豈有是乎禮樂征伐自天子出天子亦豈敢以爲巳所可專而加􅀻意於其間哉亦曰奉天理而巳意見原壤夷俟子張問行章三愆言而當其可非養之有素不能也聖人此言只是戒人言語以時不可妄發未􅀃到此地位也言及之而不言當言之理不􅀤也此語甚恠蓋爲飬之有素所牽而􅀤耳然􅀂如此則是自見不到有􅀮於人矣生而知之其至雖一而其氣象規模終有不同者此一節當刪去於解經之意亦未有所闕也子謂伯魚爲者躬行其實也按諸先生多如此􅀃意極親切但尋文義恐不然耳爲只是誦讀講貫墻靣只是無所見書所謂不學墻靣亦未􅀃到不躬行則行不得處也患得之所爲患得者計利自便之心也此句解得文義不分明而語意亦不親切君子有惡以子貢之有問至抑可知矣夫子之問未見惡人之疑子貢之對亦未見檢身之意三仁皆稱爲仁以其不失其性而巳此􅀃仁字恐不親切荷篠植杖而芸亦不迫矣止子路􅀫則其爲人蓋有餘􅁉又曰行以避焉隘可知也此語自相矛盾不施其親引尹氏􅀃尹氏固佳然不知施字作如何解若如謝氏雖亦引無失其親爲解然却訓施爲施報之施則誤矣此等處湏􅀃破令明白也陸德明釋文本作弛字音詩􅁓反是唐􅀄本猶不作施字也吕與叔亦讀爲弛而不引釋文未必其考於此蓋偶合耳今當從此音讀士見危致命楊氏曰云云似不必如此分別君子學以致其道致者極其致也恐當云致者極其所至也自未合者言之非用力以致之則不能有諸躬道固欲其有諸躬然此經意但謂極其所至耳不爲有諸躬者􅀤也􅀂曰有諸躬則當訓致爲致師之致如蘇氏之􅀃矣然本文意不如此大徳小徳小德節目也此章􅀃甚佳但以記所謂後其節目者觀之則此二字似未甚當子夏之門人小子君子之道孰爲當先而可傳至循其序而用力耳詳本文之意正謂君子之道本末一致豈有以爲先而傳之豈有以爲後而倦教者但學者地位高下不同如草木之大小自有區别故其爲教不得不殊耳􅀄無大小雖分而生意皆足本末雖殊而道無不存之意也焉可誣也蘇氏得之有始有卒尹氏得之此章文義如此而巳但近年以來爲諸先生􅀤明本末一致之理而不甚解其文義固失其指歸然考之程書明道嘗言先傳後倦君子教人有序先傳以近者小者而後教以逺者大者非是先傳以近小而後不教以逺大也此觧最爲得之然以其言緩而無竒故讀者忽之而不深考耳孟莊子孟莊子所以不改意其事雖未盡善而亦不至於悖理害事之甚與莊子乃獻子之子獻子賢大夫其臣必賢其政必善莊子之賢不及其父而能守之終身不改故夫子以爲難盖善之也此臨川鄧丈元亞􅀃諸家所不及也仲尼焉學萬物􅄹於天地之間莫非文武之道􅀄無存亡增損近年􅀃者多用此意􅀄􅀂新竒可喜然旣曰萬物􅄹於天地之間則其爲道也非文武所能專矣旣曰􅀄無存亡増損則未墜於地之云又無所當矣且􅀂如此則天地之間可以目擊而心㑹又何待於賢者識其大不賢者識其小一一學之然後得耶竊譯文意所謂文武之道但謂周家之制度典章爾孔子之時猶有存者故云未墜也大抵近世學者喜聞佛老之言常遷吾􅀃以就之故其弊至此讀者平心退歩反復於句讀文義之間則有以知其失矣生榮死哀生榮死哀無不得其所者也所解不明似謂天下之人其生皆榮其死皆哀無不得其所者不知是否􅀂如此􅀃則不然矣子貢言夫子得􅀖家時其效如此范氏所謂生則天下􅁔誦死則如䘮考妣者是也謹􅁠量此亦帝王爲治之要此篇多闕文當各考其本文所出而解之有不可通者闕之可也謹􅁠量以下皆武王事當自周有大賚以下至公則悅爲一章蓋興㓕國繼絶世舉逸民當時皆有其事而所重民食䘮祭即武成所謂重民五教惟食䘮祭者也晦庵朱文公先生文集卷第三十一閩縣學訓導何器校
