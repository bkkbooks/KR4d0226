body:
  text: 屏山先生劉公墓表屏山先生劉公旣沒二十有一年一日其嗣子玶涕泣爲其故學者朱熹言曰玶不幸蚤􅀌先人葬旣不及銘而墓道亦至今未克表大懼不孝􅀗戾幽明亟欲建石琢辭以覺于後而惟先人不及用於世其事業無得而稱唯道德之懿不可以不白而知者又益鮮未有所屬筆獨吾子嘗學於先人盍以所見聞者爲我書之熹竊㐲原念所以得遊先生之門者具有顚末其於今日之􅁩固不敢辭而又有不敢不辭者蓋先人疾病時嘗顧語熹曰籍溪胡原仲白水劉致中屏山劉彦冲此三人者吾友也其學皆有淵源吾所敬畏吾即死汝往父事之而惟其言之聽則吾死不恨矣熹飲泣受言不敢忘旣􅀌則奉以告于三君子而禀學焉時先生之兄侍􅀰公尤以􅀵䘏􅀌窮爲巳任以故熹獨得朝夕于先生之側而先生亦不鄙其愚穉所以教示期許皆非常人之事今乃幸得屬辭比事以相兹役顧恨弗􅀗其何敢辭惟是駑劣老矣無聞蓋未有以副先生疇昔之意而慰吾父泉壌之思其何能有以究闡幽㣲信示乆逺此又熹之所以不敢不辭者則起拜辭謝不敢當而玶重以大􅁩要責於是不得終辭而輙論次其事如左方謹按建之劉氏至忠顯公始大公以節死于靖康之難而歸葬其郷崇安縣拱辰山之南今其墓西二十有五歩少南有丘焉則先生之所藏也先生忠顯公之季子諱子翬而彦冲其字也世系本末具刻于忠顯之賜碑此不復著先生少􅀒竒才未冠遊太學聲譽出等夷以父任􅀘承務􅀰辟眞定幕府旋屬禍亂忠顯公薨京師先生痛憤家國非常之變執䘮過禮哭墓三年服除通判興化軍事秩滿以最聞詔還蒞故官先生始以哀毀致羸疾至是自以不復堪吏責遂丐閒局主管武夷山冲佑􅀚以歸世家屏山下潭溪之上有園林水石之勝於是俯仰其間盡弃人間事自號病翁獨居一室危坐或竟日夜㗳然無一言意有所得則筆之於書或詠歌焉以自適間數日輒一走拱辰墓下瞻望裵回涕泗嗚咽或累日而後返事繼母吕夫人盡誠敬兄弟之間怡怡如也侍􅀰公之子珙㓜開爽嗜學先生愛且竒之教以文行經業不少􅈈而必使務其逺者大者與胡劉二先生爲道義交相見講學外無一雜言他所與遊亦皆海内知名士靡不歎服深逺自以爲不及而先生之心未嘗少自足雖聞常人有片言之善無不從容咨叩必竭两端而後巳至族黨後生來問學者則亦隨其器質告語成就終日無倦色如是者盖十有七年四爲崇道祠官累階右承議􅀰享年四十有七以紹興十七年十有二月丙申卒始得疾甚㣲即入詣家廟泣别母夫人前徧以書告訣素所與徃來者召珙付以家事指示葬處中外􅀌遺人人爲計乆逺昏官舎業之旣巳則日與學者論􅀃脩身求道之要作訓戒數百言彈琴賦詩澹然如平日熹時以童子侍疾一日請問先生平昔入道次第先生欣然告之曰吾少未聞道官莆田時以疾病始接佛老子之徒聞其所謂清净寂㓕者而心恱之以爲道在是矣比歸讀吾書而有契焉然後知吾道之大其體用之全乃如此抑吾於易得入德之門焉所謂不逺復者則吾之三字符也佩服周旋罔敢失墜於是嘗作復齋銘聖傳論以見吾志然吾忘吾言乆矣今乃相爲言之汝尚勉哉熹頓首受教居兩日而先生沒所著書詩合爲文集二十卷娶陸氏封孺人先先生十七年卒無子葬忠顯公墓東三十有五歩有先生所紀其家世德善􅈓焉蓋先生不再聘則以侍郎公之㓜子玶爲後今爲右脩職郎實立此表熹方爲次其文而西府建安公亦以書来曰叔父之墓弗識珙則與有責焉熹讀之瞿然曰是乃吾之罪也乃亟起書石而系以銘銘曰神心惚恍經緯萬方孰握其機而挈其綱嗟惟先生立德之本旣覺而存復則不逺亦曰于仕我止我行亦生而死我安且寜拱辰西南有銘斯碣嘉我後人仰止遺烈朝奉劉公墓表淳熈五年正月丙辰朝奉郎主管台州崇道觀劉公卒于䂊章之􅀻第四月癸酉嗣子孟容等奉其匶葬于臨江軍清江縣思賢郷安陽里全塘之原明年孟容衰絰來見予廬山下奉公族弟鄂州通守清之子澄之狀泣而以告曰孟容之先人不幸不及從先生遊而孟容顧得問學承教於左右惟是先人之墓當有碣而未有文以刻焉敢介叔父以其狀爲請惟先生幸哀怜之予與子澄故友善今孟容來又謹㓗自好學問有方固知其故家遺業之傳爲有自來讀其狀又知公德性履行之詳如此問之嘗識公者皆如狀言不誣則亦自恨其不幸而不及識公也旣乃爲序其事而銘之公諱􅀛年字且老其先從李氏朝京師始自􅀽州臨江徙其籍開封府祥符縣魏陵郷呉兒村遂爲聞家公之曽祖公非先生諱攽以文學致大名元祐中爲中書舎人卒祖方雄州防禦推官贈右通奉大夫父襄右朝請大夫贈朝議大夫公以從祖奏爲將仕郎又以大夫公奏爲從事郎調峽州司户參軍遭䘮不赴改臨安府錢塘縣主簿歴道州軍事判官改宣教郎知常德府武陵縣事通判沅州事主管台州崇道觀累階朝奉􅀰賜服五品而卒其爲人静重純篤十三􅀊遭母呉夫人䘮哀慕如成人從大夫公居番陽餘二十年日以讀書作文爲事無故未嘗出齊扉鄰里或不識其靣大夫公性嚴與人多忤公左右承順唯謹退而接其郷黨族􅊚又皆曲盡其情以故其不能無憾於大夫公者亦往往銷釋無復芥蔕皆曰公之能子也少時銳意決科稍不遇即舎去居常晦黙不自矜伐謹嚴拘畏無一毫自放繩墨之外所居一日必葺服器一物必整盛夏衣冠襪履不暫釋居閑亦必雞鳴而起處闇室如對大賔待童僕小人亦盡誠慤所居之室必書謹獨正心字掲之座右錢塘今爲赤縣公爲主簿時秦檜方用事郷黨􅊚舊或以文字見知登顯仕者謂公曰盍亦求之公不應退治簿書益謹至他職事亦多與貴要人接公益自閉匿以故得竟秦氏敗無所汚人以爲難在道州太守季公南夀深知公旣以政事文詞薦諸朝比去懐其餘章以授後守曰判官賢而不求人知恐君或失之也故留此以竢惟君留意後守許諾及其去又如之公以是改官在武陵遇民以寛吏有罪則立治之不少貸然亦不求其過也縣境田多荒冐耕者衆其徤者與吏爲一侵漁訴訟展轉不止公爲推窮本始必見端緒而予奪之訟爲少息楚俗右􅀑其􅁋祀有曰潘仙翁者歳時集㑹摐金鼓執戈矛迎而祭之公命尉杜師顔撤屋毀像􅀵其兵刃罪其倡之者衆然後定縣十年不升降户等賦役不均咸以爲病公始爲改造帳籍民無異詞部使者相與以其治行聞于朝有㫖記姓名中書然公秩滿則詣尚書銓注官以歸卒不一見丞相也沅並邉蠻人侵掠無寧歳公佐郡時群獠大動守懼求去公攝其事按邉防舊法訪問財處立爲條約以授邉吏明諭威禁而以無事鎭之蠻果帖服公佐州常言長貳失和多由下有勝心以駕其上故雖善意亦或不得伸惟盡吾所以事長官之禮而行吾所以佐長官之義則庻其見信矣晚見孟容從子澄學聽其誦􅀃而恱之謂子澄曰君言之善吾亦且將從事於此顧恨晚矣一日召諸子告之曰觀星暦書吾殆止此汝曹勉旃毋爲門户羞也因誡以誠實詳審謹禮擇交嚴分守察細㣲数事藹然皆長者之言居二年而病旣病猶扶掖以奉家􅀕病革孟容泣而誦其平日正心之訓則㣲視而頷之盖其爲人始終之槩如此嗚呼是亦可謂善信人矣而其官不遂夀不長又如此其可悲夫公娶昌􅀺韓氏生兩男子孟容爲長免䘮舉進士中其科授迪功􅀰新􅀽州分宜縣主簿孟將以公遺澤􅀘將仕郎一女孟蓁未行予觀孟容固賢而聞孟將亦好學然則公世之興盖未艾也其又足以少慰也夫其銘曰吁嗟劉公篤世休道雖晚聞德蚤脩長途方騁􅀊不􅇔志業有嗣無餘憂清江之曲全塘幽方趺圭首千千秋過者視此式其丘按會要臨江軍以筠州清江縣置新喻自􅀽州新淦自吉州來隷而歐陽公作主客集賢墓碑皆云吉州臨江人今狀又云􅀽州臨江人恐有差誤請更詳之韓溪翁程君墓表韓溪翁先君子韋齋先生之内弟程君也諱字復亨徽之婺源人少􅀌從先君子學於閩中因得講聞一時儒先長者之餘論而心恱之抄綴誦習晨夕不少懈先君子愛其勤敏於其歸書六言以贈之皆事親脩身爲學之要君拜受其言以歸益自樹立務記覽爲詞章思所以大其門者然君爲人坦夷跌宕不事脩飾好讀左氏書爲文輙傚其體不能屈意用舉子尺度以故乆不利於場屋家故貧至君益困中歳奉親徙居窮山中自號韓溪翁山田百畒環堵蕭然無以卒􅀊而君處之泊如也晚益不得志因自放於杯酒間酒酣諷左氏書雜以國風雅頌之篇坐者聳然傾聽其俯仰疾徐之間頓挫抑􅀭如有節族至於放臣􅀌子怨夫寡婦之辭又未嘗不三復感􅁣而出涕流漣也庸夫孺子從旁竊觀時或􅀏而侮之君謷然不以爲意盖其中所抱􅀒有不得騁者故託此以自遣至它行事則其不合於理者固鮮矣乾道元年年五十九以疾卒後十年君夫人胡氏亦沒遂合葬于懐金郷福林冷水之原盖新安番陽信安諸程皆出梁鎭西將軍忠壯公靈洗其家婺源者又自歙之黃墩徙而來譜牒具在聞之先君子忠壯公葬黃墩其墓以石爲封今尚在也君家自其大父某始與郷薦父某亦以郡學上舎當貢京師皆不幸蚤卒至君學益勤而其師友淵源所漸者益逺顧亦不逢以沒其世而有子曰洵好學而敏於文君竒愛之曰是足以成吾志矣旣又屢薦不第今乃以特恩授信州文學識者恨之然洵故嘗從熹論爲學大要意其所以成君之志者在此而不在彼也熹祖母君之姑因謂君叔父㓜從先君子在臨安時時見君來先君子或留與飲君必盡􅋨而論􅀃衮衮不能自休旣長歸郷里又得拜君而君辱教誨之則君益以老矣然得酒輙歌呼談噱意氣猶不衰也今又三十餘年洵乃以書奉君學徒李君繒之狀請表君墓惟念始終顧二父於今皆不可見而熹與洵􅀌露之餘亦俱老大乃流涕而書之盖以重歎君家之不遇又惟潦倒無以副君疇昔之意而自悲也嗚呼洵尚勉之哉淳熈八年八月乙卯表姪具位未熹述曹立之墓表淳熈乙未歳予送吕伯恭至信之鵝湖而江西陸子夀及弟子静與劉子澄諸人皆來相與講其所聞甚樂子夀昆弟於學者少所稱許間獨爲予道餘干曹立之之爲人且曰立之多得君所爲書甚欲一見君與張敬夫也後五年予守南康立之果來目其貌耳其言知其嘗從事於爲巳之學而信子壽昆弟之不予欺也欲留與居而立之有􅀫諾不果及予受代以去而所請白鹿洞書院賜額有㫖施行如章郡守吳郡錢侯子言以予之惓惓於是也亟以書來問孰可爲師者予因以立之告子言聞之欣然具書禮授使者走餘千踵立之之門以請而立之病不能行矣十年二月辛亥竟不起年方三十有七子靜以書來相弔具道立之將死其言烱然在道不少異於平日相與深歎惜之嗚呼吾道之衰乆矣比年以來敬夫子壽伯恭皆以盛年相􅁇淪謝而後進之可兾以嗣事於方來者亦多夭没今又失吾立之然則子靜與予之相弔也豈徒以遊好之􅀻情也哉立之名建其先自金陵來徙家至立之八世矣立之父諱天明始爲儒立之㓜頴悟日誦数千言少長知自刻厲學古今文皆可􅀚一日得河南程氏書讀之始知聖賢之學爲有在也則􅁣然盡弃其􅀁爲者而大覃思於諸經歴訪當世儒先有能明其道者將就學焉聞張敬夫講道湖湘欲往見之不能致有告以沙隨程氏學古行髙者即徃從之得其指歸既又聞陸氏兄弟獨以心之所得者爲學其􅀃有非文字言語之􅀁及者則又往受其學乆而若有得焉子壽蓋深許之而立之未敢以自足也則又寓書以講於張氏敬夫發書亦喜曰是眞可與共學矣然敬夫尋没立之竟不得見後至南康乃盡得其遺文以考其爲學始終之致於是喟然歎曰吾平生於學無所聞而不究其歸者而今而後乃有定論而不疑矣自是窮理益精反躬益切而於朋友講習之際亦必以其所得者告之蓋其書有曰學必貴於知道而道非一聞可悟一超可入也循下學之則加窮理之工由淺而深由近而遠則庶乎其可矣今必先期於一悟而遂至於弃百事以趋之則吾恐未悟之間狼狽巳甚又况忽下趋髙未有幸而得之者耶此其晚􅀊用力之標的程度也今􅀊元日知病之不可爲矣猶書其牖曰未死之前不可自棄遷善改過自是愈篤死之日起正衣冠危坐如平日語其弟廷曰吾雖甚病而學益進此心瑩㓗無復纎翳如是而死庻其可以言命矣語訖就枕未安而没嗚呼立之雖不幸蚤死不卒其志然所以自樹立者至此亦豈他人所及哉立之事親孝菽水之養驩如也愛其弟甚至與相切磋如嚴師友姊嫁而卒撫其􅀌以有成與人交敬而忠苟心所未安雖師􅀃不曲從必反復以歸於是而後巳其於予規正􅀹切也視人有急難周之必盡其力雖貧病不計榜其齋曰無妄杜門終日里巷有不識其面者日用間自省小有過差即書之􅁽其討論經學有得亦悉記之及爲他文甚衆病中欲舉而焚之廷弗忍旣没而視諸篋則已亡其半矣乃裒自論定以來所作得十餘卷其他猶多可傳者顧以立之遺意弗敢出也立之嘗娶婦不恱於姑教之不從而去故卒無子至是廷以母命立宗人之子愿爲後而葬立之萬春郷栗田原先􅉷之右且以立之遺文數篇及其友成忠郎趙君伯域之狀不遠數百里來請銘予於立之相得雖晚而知之深望之厚哀其死而屢出涕焉其可以無從乎然立之巳葬不及識于壙中乃書其事使以表于墓上又系之曰胡子有言學欲愽不欲雜欲約不欲陋信哉如立之者愽而不雜約而不陋使天假之年以盡其力則斯道之傳其庻幾乎嗚呼今短命而死矣豈不可哀也哉是歳五月乙酉新安朱熹述西山先生李公墓表西山先生李公者􅀛山先生楊文靖公之門人也􅀛山旣受學於河南程氏歸以其􅀃教授東南一時學者翕然趨之而􅀛山每告之曰唐虞以前載籍未具而當是之時聖賢􅀂彼其多也晚周以來下歴秦漢以迄于今文字之多至不可以數計然曠千百年欲求一人如顔曾者而不可得則是道之所以傳固不在於文字而古之聖賢所以爲聖賢者其用心必有在矣及李公請見於餘杭則其告之亦曰學者當知古人之學何所用心學之將以何用􅀂曰孔門之學仁而已則何爲而謂之仁􅀂曰仁人心也則何者而謂之人心耶李公受言退求其􅀃以進愈投而愈不合於是獨取論語孟子之書而伏讀之蚤夜不懈十有八年然後渙然􅀂有得也􅀛山蓋深許之而公之語學者亦曰學者於經讀之又讀而於其無味之處益致思焉至於羣疑並興􅃦食不置然後始當驟進耳􅀛山旣没後進多從之遊後舉遺逸召對卒官福建路安撫司主􅃹機宜文字而葬其郷邵武軍光澤縣東黄嶺之原學者共追號爲西山先生云公諱郁字光祖元祐黨人朝散郎深之子母安仁縣君陳氏贈諌議大夫陳忠肅公之女兄也公㓜不好弄坐立必莊少長學於舅氏陳公器之踰冠乃見􅀛山而請業焉􅀛山一見竒之即妻以女旣而以朝散公遺命出爲叔父將仕郎庭之後中間游大學􅀍郷薦皆不第紹興􅀄天子􅁣然有志中興大業思得山林遺逸魁傑非常之材而用之㑹遣御史朱異行郡國詔俾搜訪以聞異聞公名使還以對召對便殿所陳皆當世大務上爲改容傾聴請退而留者再詔以爲右迪功郎尋除詳定一司勑令所刪定官未乆以憂去用進書恩特改承務郎及免喪㑹秦丞相檜巳用事公自度不能俯仰禄仕遂築室邑之西山往來讀書其間家益窮空人有不堪其憂者公獨曠然不以爲意然當世賢士大夫益髙仰之遷官者多引以自代乆之起家佐閩帥幕府人謂非公所宜處而公不辭旣至人謂公且不屑爲而公治文書惟謹日訪民情戚休利病以告其長而罷行之一日帥用小人言欲毀民居數十爲列肆酤酒以牟利公白其非便帥不樂頗見色詞公即移病告老帥悟慚謝公爲強起二十年七月壬辰竟以疾卒年六十有五矣公天資粹羙而涵養有方其事上恭而有禮其御下嚴而有恩平居未嘗有惰容誨人終日無倦色自奉甚約而事親極其厚於所後尤兢兢致孝服喪毀瘠如禮治喪必誠信至竭其貲不吝兄階官杭州罵賊死公事寡嫂如母教􅀌姪遣遺女皆如巳子其於世務人情官政文法下至行陣農圃之事靡不究知然竟不及用於世以没識者恨之所著書有易傳參同契論孟遺秉及平生遺文合數十卷藏于家夫人楊氏􅀛山先生第三女有賢行通經史大意平居誨飭子孫整齊内外皆中禮法後公十六年卒子揆成務郎陳公誌於將仕之墓所謂延孫者也晚以德壽慶恩􅀘官而卒女適同郡上官墨卿孫男閑闡䦎闤女適某人閑於是以迪功郎爲全州州學教授始將伐石以銘其墓而來請文以識焉嗚呼聖賢遠矣然其所以立言垂訓開示後學其亦可謂至哉顧自秦漢以來道學不傳儒者不知反巳潜心而一以記覧誦􅀃爲事是以有道君子深以爲憂然亦未嘗遂以束書不讀坐談空妙爲可以徼幸於有聞也􅀂􅀛山之所以教與西山之所以學其亦足以觀矣予是以著之而并記其行事後之君子尚有考也淳熈十有二年秋八月巳􅆗具位朱熹述太孺人邵氏墓表金華時鎬旣奉其母夫人邵氏之柩祔于循理鄊九里原先府君之墓使其子源以永嘉葉適所爲行述及别記事實各一通來告曰先人之䘮先師東萊夫子幸與之銘而吾子書之矣今又以不孝罹大禍間雖幸畢藏事惟是幽堂之刻所以垂永乆者未有所屬敢介前惠重拜以請予時病卧田間起受其書讀之曰夫人婺州金華縣人曽祖瓊祖恱父之才嫁其縣清江時君汝翼時君世昌樂而魁尨沉厚方臘之亂㓂燔略空君一一自建置盡絶其前人夫人能左右以敏無荒事焉家旣成時君遂用法度嚴内外文學訓子孫立信務與稱重郡閭夫人又能奉承以恪無逸志時氏族良家巨子孫競於文科舉上其名人皆尊愛時君以及夫人時君没天人亦將老矣具呼家人與爲條約親冩刻之屏使合居有禮綴食無專以不忘時君之法清江東南畦戸數百臨水而茇舎時潦出其上民往往棲木自救有浮去者夫人始命舟糗飯拯之歳以爲常豫蓄棺告疫死者以歛人懐其惠晚遭太上皇帝皇后慶壽恩得封大孺人加賜冠帔淳熈十年七月庚寅卒年七十有一三子鎬錡錝二女適劉晏陳褒孫源淇演溱灋潚潭澡湂孫女其二適陳之望汪叔貽餘尚㓜曾孫榘􅕬杲女莊葍盖葉君所叙云爾其於夫人始終之際詳矣而别記手書條約之詞一曰子孫謹守家法毋得違悖二曰晨興鳴板長㓜詣影堂早參次㑹中堂叙揖三曰男女出入財貨出納僕妾增减必禀家長四曰凡爲子婦毋得蓄私財五曰女僕無故不許出中門蒼頭毋得􅂺升堂室入庖厨則予於是有以知夫人之所以教者得齊家之要至其又謂夫人天性儉質不徇華靡服御有常未嘗追逐時好有所變易歳時奉祭甚謹嘗以冬享割􅁏手寒刀墜諸婦請代而弗許也毋何晚得末疾歸省􅂺惓惓不忍去比卒年幾六十矣猶􅂼食以終喪女兄孀居貧病護視周悉遇其子弟恩意有加時君篤於教子一時髦俊多客其門夫人日飭饌具必躬臨之雖勤劇無倦意則予於是又有以見夫人之所以教者蓋以其身而不專在於言語之間也嗚呼是可尚巳旣以病不果銘姑記其實如此以授源使歸刻石表墓上淳熈十有二年冬十月戊辰新安朱熹撰董君景房墓表番陽董君景房者諱爲良世家徳興之海口大父濬始仕至宗正少卿父元一秀州司法參軍君少有大志嘗學於江山徐公誠叟先生之門受其􅀃而歸益務求友講而脩焉不數年遂以文行聞於州郷再試禮部不第退處于家讀書講學不復以聲利榮逹爲事郷人相與益高仰之而君之學盖日進月益而未可量也淳熈十一月九月一旦得疾卒年甫五十有四士友聞者莫不哀之盖君爲人儻蕩無城府家故饒給兄弟始求分異君力止之不可則盡聽其所擇而獨取其所遺及故書數篋藏焉旣而兄弟或破其産君極力資奉不計有亡死者葬之而撫其􅀌焉族姻郷黨之貧無歸者衣食之罷不能者教誨之不幸而有急難者救護之皆極勤懇闘訟之不决者爲曉譬以義理往往心服失其所争而去􅀊飢姦民肆掠物情大恐君爲官畫䇿以便宜發廪振貸而密以兵掩其渠帥寘于法人頼以安雅有當世之志於官政民俗弛張之際尤孜孜焉嘗記其見聞思慮所及者作活國書一編其言質慤詳盡不爲華靡而所規畫常以厚下固本爲先識者韙之恨其不得見於用也君娶周氏子男二人從起從治女六人其三巳適人進士齊節程矩齊牧其壻也君卒之明月葬其里之黃栢原沙隨先生程公可乆雅知君實銘其壙而從起又以君友人太學生程端􅀩之狀來請文以表墓上予故家君旁縣頃􅀊還里中君以所論經子諸􅀃來見别後又數以書來有所問辨時君猶有四方之志予因以所聞古人爲巳之􅀃告之而君不以其言爲非也然則其可無詞乃取程生狀摭其可紀之大者書以授從起俾歸刻之嗚呼君則巳矣而予言不没則百世之下於此尚有考也淳熈丙午三月庚辰宣教郎直徽猷閣主管華州雲臺觀新安朱熹述令人羅氏墓表故左司郎中張公之配曰令人羅氏南劒州沙縣人世爲縣望姓家法嚴整令人生二十有二年而歸張公事姑羅恭人以孝謹聞恭人愛之如巳女張公故貧􅀄仕將遣其女弟而無資令人悉出橐中􅑽以奉之無吝色事公二兄旦暮率諸㓜稚以次問起居無一日闕禮子姪就學歸沐輙具湯餅㑹諸娣姒男女語次從容問所學業勞勉諸姪以勵其子油油如也羅恭人嘗苦末疾令人静夜必露香致禱願損巳夀以延姑年如是者數月恭人疾頓平而後三年令人一旦􅁀卒恭人哭之慟至老念之不能忘與人言必稱其孝至於泣下且歎曰不意吾兒失此内助之賢也令人性儉約謙下好禮法有識度嫁時篋中有黲色絺衣忌日輙􅀍以奉􅀕稱慰如儀常所服禮衣橫帔如民間法或告以張公且通朝籍盍改用命服令人曰此非拜恩何敢服也卒以禮終生以政和戊戍卒以紹興癸酉葬劒浦縣呉張氏大墓之左若干歩後三十八年嗣子士佺來訪予於臨漳請銘左司公之墓一日復奉令人之事涕泣以請曰吾母之賢孝如此而不幸蚤終士佺兄弟生不及養巳􅀒終天之痛矣今又不能述其德善以垂乆逺其何以見於地下惟吾子哀之予不忍辭也旣受其書而讀之因竊惟念孝愛和謹婦道之常世猶有難之者而令人至委身以代姑死守禮以終其身是其賢於人也逺矣其可以無傳也哉因爲叙此以表其墓令人生二男士佺今爲朝奉􅀰通判融州事其弟士僴嘗爲修職郎監藩葑酒庫以卒四女進士宗大同謝舒宣義郎陳善慶文林郎黃東其婿也紹熈二年二月日朱熹述程君正思墓表士患不知學知學矣而知所擇之爲難能擇矣而勇足以行之内不顧於巳􅀻外不牽於俗習此又難也嗚呼若番陽程君端􅀩正思者其所謂知所擇而能行之者歟乃不及一試而又無年以死使人不得見其德業之所成就是可哀巳正思天資端慤自㓜巳知自好稍長即能愽求師友以自開益遂以詞藝名薦書旣乃見予於婺源聞諸老先生所以教人之大指退即􅁣然發憤以求道修身爲巳任討論探索功力兼人雖其精㣲或未究極而其固守力行之功則巳過人逺矣始時名下之字同於周程至是亟請其父而更焉其居家事親能開義理於幾㣲之際多所感悟而不失其驩心䘮母葬􅀕推本古經以正流俗之謬郷人多以爲法其在太學儕輩􅀋趨時好不復知有聖賢之學正思擇其可告語者因事推誠誨誘不倦從而化者亦頗衆然其爲人剛介不苟合聞人講學議政有所未安輙造門辨質或移書譬曉必極其是非可否之分而後巳㑹大臣有樂豪縱而賤名檢者見脩士即以邪氣目之而又言於上曰是屬且能亡人之國於是學官承其風㫖因課試發䇿直以王程蘇氏之學爲問盖將以其向背爲取舎對者靡然無敢正言其失正思獨􅁬筆抗論無所依違而所以分别邪正之間輕重淺深又皆中理雖竟以是無所合而歸然其抑邪與正之助亦多矣旣歸即以病不起紹熈二年十一月一日也享年四十有九聞者莫不哀之方疾革時手書來曰端􅀩死不恨恨不克終養而卒業於門耳然巳無可言願先生自愛蚤就羣書以竢來哲世不我知天豈亦不我知也哉予雅意正思任道勇而用志專必能卒究精㣲之藴以廣斯道之傳者遽讀其書不覺失聲流涕旣而視其筆跡謹好如常日又知其間於死生之際如此爲之痛惜乆而不能平也明年正思之父將葬正思於其郷之某處使其二弟端臨端本狀其事以來請所以表其墓者予按其言正思曽祖宏祖汝能皆有郷行父易今以修職郎致仕母俞氏妻王氏生一男師聖一女適同縣董濬而它則與予所聞者皆不異又觀其言正思自少謹信異常兒大父將沒知其可託以一老婢諉焉正思時年十四五涕泣受命護視勤懇十有六年始終無少懈至是屬疾雖病尊親臨之必冠巾乃敢見將卒悉屏婦女户外戒治䘮無用浮屠法所以告二弟朋友皆人倫大法所繋不雜它語是皆宜書因并前所論者書之使碣墓上後之君子庻有考焉淳熈三年秋九月乙亥新安朱熹述程君公才墓表紹熈二年冬番陽程君正思病且革以書抵予告訣且書其先大父府君之行事而求識其墓予旣哀正思之力學任道而不幸蚤死又知其大父之賢如此而無所聞於後世矧其將死深悲之屬不在它人是固不可以無言也按正思言府君諱汝能字公才天資純篤不由學問而孝弟忠信自有以絶人者父性嚴府君事之順焉於其行事有未安者必以正諌諌而不入則退而謹伺之意解復諌卒聽從乃巳母得末疾三年衣不解帶居不入室時其起居飲食之節而躬致養焉雖矢溲之役不以累它人也事兄謹甚兄好飲佚遊府君懼顯兄過以貽親憂委曲其間彌縫甚至卒以無間言親沒析其産兄欲善田宅恣所取無難色平生口無惡言妄語足迹不渉官府之門居郷接物恂恂謹敕不怒而人敬畏之周人之急必盡其力雖或􅀒之不計也郷人有死而亡子者治其䘮甚飭或欲沒入其貲産爲告官立後至今不絶處家慈愛而能嚴子弟不敢爲纎芥非理事今沒三十年郷人行旅言之猶有思慕出涕者嗚呼兹非夫子所謂十室之邑忠信如巳者乎是乃三代之遺民而非今世之士所能及也使其得聞聖賢之教而講學以明之其所至可量哉正思病亟作書其詳如此而字畫謹細如常時且謂它行之懿猶有不及書者今問其家得其世系則番陽之程皆祖梁忠壯公靈洗唐乾符間有名維者以金紫光禄大夫海州鹽鐵使將兵討巢賊不利始居饒州樂平之銀城後徙新建而地析爲德興縣故今爲德興人自鹽鐡十二世而生府君之父諱宏亦有郷行娶齊氏生府君府君娶氏生二子曰晟曰易晟先卒易今以修職郎致其事而又有正思爲之子意者程氏其將興乎今正思雖不幸而二弟亦知爲學是固未可知也乃書此碑刻石墓左以竢墓在某某郷某里某處晟之子曰端友曰伯雲易之子曰端誠曰端􅀩曰端臨曰端本正思即端􅀩也予亦巳别識其墓云三年壬子秋九月丙子新安朱熹書安人王氏墓表國子􅀶士成都范君文叔以書致其母夫人之事於熹曰仲黼不天蚤失先人之教先夫人撫育成就甚艱且勤以及于兹而葬不及銘無以發其潜懿吾心惄然不敢寧也敢拜以請熹讀其書旣蹙然不敢當又讀其狀益惟文字之蕪淺而無以信夫人之德於後世顧文叔之賢未及識靣而心巳敬之且其所以屬我者又如此其重也乃不敢辭而按其狀則簽書東川節度判官㕔事盧君蹈之所述也其言曰夫人成都華陽人姓王氏祖曰贈金紫光禄大夫諱廷妣文安郡夫人勾龍氏父曰左朝議大夫諱輔妣宜人何氏夫人自㓜以專静才明稱於其家年甫笄歸同郡范君諱漼盖范氏自蜀郡忠文公中書榮國公徙居許洛至是始還故郷文獻未逺子弟皆有典刑非清門淑質不易作對夫人一踐其庭禮容肅穆纎悉中度雖在房闥禮敬自將燕􅀻之言無一不可道於外者范君始爲仙井監録事參軍後以宣教郎知雅州盧山縣事夫人居家儉約不以出内細故累其君子范君閱具獄晨夜寒暑不少懈夫人猶從旁從􅁷之曰毋憚淹晷之勞而使彼􅀒沒世之􅁈也故范君爲吏以清白著其治獄以平􅁢稱夫人盖有助焉范君旣從官不復問生理身後家事益落落夫人􅁣然自力以濟其艱使二子得以盡力於學繼踐世科人以爲榮而夫人不色喜顧語之曰吾悲汝父之不及見也雖然汝家世以清德直道爲門閥汝曹問學宜知所本仕不患不逹患無以稱耳藜糗吾能甘之母遽以三釡爲也二子以是益自厲於學而仲黼杜門幾十年不汲汲於進取蜀人高其行東游呉楚張敬天吕伯恭一見皆歎賞具以其學告之今在朝列尊守所聞不狥世習而忠君愛國悃􅅃無巳識者皆􅀝重焉此又夫人之教有以成之也􅀄范君仲兄洪雅君蚤卒無子范君將以少子仲芸後之未及而終後六年仲芸奏名南省夫人大合族黨申范君之命以告于祖禰而卒使奉其祀焉聞者皆以爲難洪雅之妻前巳更嫁至是乃卒人以其服爲疑夫人曰禮不爲嫁母服而律有心喪三年之文且是嘗爲洪雅配得不爲芸母乎即日命仲芸服喪如律聞者益以爲難􅀊時典祀身親蠲㓗待賔客接宗姻曲盡禮節而御下一以慈恕至其平居教詔子孫援前言質往行又皆有本有末蓋可書而誦也卒於淳熈八年六月甲辰葬於十三年八月丙申墓在雙流縣宜城郷曹池山實從盧山君之兆始以夫封孺人後以子贈安人仲黼今以通直郎爲國子博士兼皇姪許國公府教授仲芸嘗以從政郎爲彭山令而先卒女五人一適王晞孟一適程師䕫一未行餘皆夭嗚呼夫人之所以相其夫而成其子者盧君狀之詳矣然猶事之常也至其出少子以後仲父旣又使之服其所後嫁母之䘮則處變事而不失其權有當世士大夫之所甚難而深愧焉者嗚呼賢哉兹其所以爲吾文叔之母也歟嗚呼賢哉紹熈三年玄黓困敦秋九月戊子具位朱熹述聘士劉公先生墓表先生姓劉氏建州崇安縣五夫里之白水人其曽大父諱滋起身農畒以進士高第仕至尚書職方郎中累贈開府儀同三司吏部尚書大父諱照朝請郎再世皆有清德中歳即休官退處以大耄終父諱元振始不仕然亦以馴行稱先生諱勉之字致中自㓜強學日誦数千言耳目所接一過不復忘其爲文肆筆而成滂沛閎闊凌厲頓挫儕輩少能及之踰冠以郷舉詣太學時蔡京用事方禁士母得挾元祐書制師生􅀵司連坐法犯者罪至流徙名爲一道德者而寔以鉗天下之口先生心獨知其非是隂訪伊洛程氏之傳得其書藏去深夜同舎生皆熟寐乃始探篋解袠下帷然膏潜抄而黙誦之聞涪陵譙公天授嘗從程夫子遊兼䆳易學適以事至京師即往扣焉盡得其學之本末旣而遂厭科舉之業一日棄録牒揖諸生而歸道南都見元城劉忠定公過毗陵見􅀛山楊文靖公皆請業焉而劉公尤竒其材留語數十日告以平生行巳立朝大節以至方外之學它人所不及聞者無不傾盡先生拜受其言精思力行朝夕不怠乆而若有得焉則疇昔所聞一言之善融㑹貫通皆爲巳用而其踐履日以莊篤與籍溪胡公原仲屏山劉公彦冲兩先生友善日以講論切磋爲事其於當世之務若不屑焉而論􅀃區處鉅細顯㣲皆有條理亂後故山室廬荒頓乃即建陽近郊蕭屯别墅結草爲堂讀書其中力耕稼以自給澹若無求於世而一時賢士大夫莫不注心高仰之中書舎人吕公居仁知之尤深嘗以小詩問訊有老大多材十年堅坐之句世傳以爲實録是時國家南渡幾十年謀復中原以攄􅀫憤而未有一定之計方且寤寐俊傑與圖事功吕公乃與同列曾公天游李公似之張公子猷三數人者共列其行􅁩志業以聞於朝特詔詣闕將行屏山先生爲作招劒之文以祝之其卒之亂曰寳劒徠奉君王撫四夷定八荒時乎時毋深藏其所望於先生者蓋如此旣至㑹秦丞相檜巳顓國枋爲其事非巳出不能平時又方决屈巳和戎之䇿惡聞天下正論意山林之士不顧利害敢盡言觸忌諱尤不欲使見天子談當世事第令䇿試後省給札俾上其對先生知道不易行即日謝病歸杜門高卧十餘年造養益熟名聞益尊故相趙忠簡公出鎮南州道出里門紆轡入謁坐語移日彌加歎重然其去未幾即遭䜛竄海外以沒同時知先生者亦皆廢錮不復用於是先生竟不及一試於用而卒于家享年五十有九有志之士莫不哀之紹興十九年二月十日也先生學本爲巳而才周世用臨事財處不動聲氣平居嚴敬自持若不可犯而接物之際恂恂和恱色􅀏可親其臨財廉一介不妄取少時婦家富而無子謀盡以貲産歸女氏旣謝不納又擇其宗屬之賢者舉而􅂌之使奉其先祀其與人交誠信懇惻同里胡公明仲侍郎蚤出爲季父後不自知其本親郷人多􅀼議之而莫以告先生獨爲移書具陳本末所以然者胡公感其言爲數歸省恩禮略備議以少息熹之先君子蚤與先生遊相好將沒深以後事爲􅀉且戒熹徃學焉及棄諸􅀌先生􅁣然爲經理其家事而教誨熹如子姪旣又以其息女歸之親舊覉貧􅀵恤扶助亦皆曲盡恩意學子造門隨其材品爲􅀃聖賢教學門户以及前言徃行之懿終日娓娓無倦色自壯至老如一日也娶連氏無子以從兄之子思温爲後二女子其長歸于我次適朝奉郎范念德思温亦無子又以從弟之子澧後之建州於今爲建寧府先生墓在草堂渉溪西北七里所羣玉郷三桂里之學士原其葬時不及銘逮今且五十年後生之及見先生者日加少熹懼其益乆而遂將無所考也乃追記其世家學行之最而伐石以表焉慶元戊午正月已亥朔旦門人朝奉大夫致仕朱熹述晦庵先生朱文公文集卷第九十候官縣儒學訓導劉簮校
