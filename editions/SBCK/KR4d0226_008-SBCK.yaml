body:
  text: 詩買船至演平拜建康劉公墓下遂入城假館梅山堂感涕有作維舟新曆口歩上秣陵阡高丘忽嵯峨􅀫草迷荒烟拜起淚再滴哀哉不能言驅車旦復東借此虚堂眠念昔堂中人經營幾何年一旦舍之去千秋不言還露井益清渫風林更修鮮思公獨不見涕下如奔川感􅁣西州門愴悢山陽篇晤嘆日隱樹悲歌月當軒堂堂忠孝心終古諒弗諼尚與呉門子歸來故山巔晚雨凉甚偶得小詩請問遊山之日并請劉平父作主人二首幾年不踏仙洲路夣入青藤古木間好趂新秋一畨雨晝寒亭下弄潺湲廬阜歸來秪短笻觧包茶茗粗能供􅀂須載酒邀賔客付與屏山七老翁􅀫密菴分韻賦詩得衣字不到仙洲􅀊月移携壺特地欵巖扉巳驚素雪清人骨更喜蒼烟染客衣新賞不妨頻徙􅀝舊題何事獨嘘嚱明朝驛􅀐黄塵裏莫待迷塗始賦歸讀子厚歩月詩時方聞吕伯㳟訃後數日賦此晚歩曲池上西風吹我裳仰觀天宇闊愛此明月光念我素心人􅆌焉天一方没者永乖隔存者爲參商飄零百􅀊期寂寞幽􅁂霜還坐三太息高林鬰蒼蒼次子厚秋懷韻秋風何方來爲我滌殘暑庭梧亦何與索索終夜雨􅁳思感物變念此離索苦浩蕩信莫量幽紛那得覩丁年舍我去憔悴故其􅀁廓落濟時心頽然復安取永懷平生友夣想見眉宇今晨枉秀句爛􅀂朝霞舉去去同采芝高軒坐凝佇黎嶺西南水石佳處不减廬阜戲呈子厚谷􅀷石瘦水潺潺便是楞伽折桂間珍重下邳圯上客一年幾度到廬山讀子厚詩卷用其卒章晨起之韻作詩􅀉之晝永倦殘暑宵分喜新凉天雞一振翼爛爛暁月光病榻感虚徐中庭起翶翔懷哉榖城子物外乆不忙掩抑琴調希激烈歌聲長契闊恨清賞佳期未渠央緘詞託歸鳥側佇何能忘登廬峰二首循磵躋危磴披雲得勝遊蓬茅増舊葺竹樹喜新稠夣想三秋别徘徊十日留餘年端可料此地欲長休佳友紛來集欣然㑹􅀫心風泉陪徙􅀝雲月共窺臨雅唱情俱勝㣲言思獨深兹遊非逸豫邂逅得良箴蘆峰次韻澗水流千􅌇巖姿起萬般扶藜雖有興駐屐諒難安好客能同趣羣峰肯縱觀蒼茫却無際誰與話愁端次瑞泉詩韻興懷來賞􅃐對景却忘言偶與同遊客行逢幽澗原淺泓排積腐暗竇溢流渾終待寒泉食無憂水鏡昏五禽言和王仲衡尚書提胡蘆沽美酒春風浩蕩吹花柳不用沙頭􅀟玉瓶鳥歌蝶舞爲君壽祗今醉是君恩昨日之愁愁殺人不如歸去􅀌城越絶三春暮故山只在白雲間望極雲􅀷不知處不如歸去不如歸千仭岡頭一振衣泥滑滑泥滑滑秦望雲荒鏡湖闊緑秧刺水水拍堤牙旗畫舸凌風發使君行樂三江頭泥滑水􅀷君莫憂脫袴脫袴桑葉隂隂墻下路回頭忽憶舎中妻去年巳逐它人去舊袴脫了却不辭新袴知教阿誰做麥熟吟去年種麥有德音秪今種熟誰快活種者已卧官墻隂仁公有政惠存殁肯使催租更隳突酬黄子厚見訪歸途惠詩韻􅇫驥倦千里籠鶴思九臯念昔田舍日不知山林高一朝逢世紛故丘得濳逃平生棲遁志兹焉始堅牢故人榖城翁高情北䆫陶亦復喜我歸巾車􅅃林巢申旦更離闊中情重忉忉游密菴分韻賦詩得清字誤落塵中􅀊序驚歸來猶幸此身輕便將舊友㝷山去更喜新詩取意成暖翠乍看渾欲滴寒流重􅃪不勝清箇中有趣無人㑹琴罷尊空月四更游密菴得空字欲覔仙洲路須乗萬里風飮泉雲出岫卧嶺月流空永夜渾無􅄰悲歌莫與同起來殘樹影清絶小樓東昨爲許進之書胎仙字因以名其室或疑欠舞字者故作此以觧之寒山寒月冷颼颼􅃗影􅀌桐萬里遊帝樂夣回三疊逺胎仙舞罷一簾秋未愁悄寂無人㑹只恐蹁躚不自休却􅀏蕊珠何處􅀁兩忘蝴蝶與莊周正月五日欲用斜川故事結客載酒過伯休新居風雨不果二月五日始克踐約坐間以陶公卒章二十字分韻熹得中字賦呈諸同遊者玄景彫暮節青陽變暄風忽㝷斜川句感此勝日逢駕言當出遊一寫浩蕩􅅐雲物疑異􅀱凄迷乆連空今朝復何朝頓覺芳景融疇曩庶復踐隣曲歡來同伊雅一籃輿連翩數枝笻緑野生逺思清川照衰容遥瞻西山足突兀彌畒宫庭宇豁清曠林園鬱青葱於焉一逍遥芳樽間鳴桐旣爵日樹隱班荆汀草豐纎鱗動㣲波新荑冠幽叢惆悵景易晏徘徊思無窮願書今日懐逺􅀉柴桑翁仰止固窮節愧兹百年中次吕季克東堂九詠野塘小隱傳得希夷九卦圖歸來不復夣榮途野塘竟日無人到讀盡床頭種樹書敬義堂高臺巨牓意何如住此知非小丈夫浩氣擴充無内外肯誇心月夜同孤方拙寮一室歸來萬事新䆫間横竹掛朝紳九流未讓圜機士四海寜慙巧宦人吟哦室蒲團竹几睡瞢騰客問君今幾折肱身世兩忘無可答起㝷詩句遶階行愛蓮聞道移根玉井旁開花十丈是㝷常月明露冷無人見獨爲先生引興長月臺臺上無人伴苦吟歸鴉過盡日西沉須􅁷玉匣開塵鏡却有孤光共此心菜畦雨餘菜甲翠光匀􅂎菊成畦亦自春骨相定知非食肉可能長伴箇中人海裳屏蜀樹成行翠作圍花開時節更芳菲主人夣亦㝷春去栩栩􅀷穿錦障飛橘堤君家池上幾時栽千樹玲瓏亦富哉荷盡菊殘秋欲老一年佳處眼中來挽呉給事三首臺省傾群望江湖去一麾語聞三諫切政有百年思不盡雲龍㑹還㝷霧豹期誰知七休詠翻入八哀詩粤自辭神武超然絶世紛前身䟽太傅今日范忠文圃樹寒留月湖波冷浸雲懸知千載下此地想遺芬憶昔觀風􅀉登堂識老成忘年見交態把酒話詩情别去如三􅀊書來忽九京却思憑檻語􅃘􅃍勒公銘伏讀雲臺壁間秘閣郎中盤谷傅丈題詩齒及賤名追懷曩昔不勝感涕􅂺次元韻呈諸同遊計亦同此歎也提携當日沗忘年曽向瑕丘獨請前喜看玄雲生素壁恍疑後學厠先賢公遊汗漫今何許我病摧頽乆自憐只有空山無􅀊月􅀝天寒木但蒼然是日景仁景􅀄二兄行視卜宅亦􅀫山間謹并録呈尤􅇵悲愴耳次韻􅀉題萬頃寒光奉呈休齋先生閑將􅀊月老煙汀更遣詩情到杳􅁳遊子故應悲舊國壯懷那肯泣新亭一官避世今頭白萬卷􅀵功乆汗青但見潮生與潮落不知沉醉又還醒熹伏䝉休齋先生惠詩見留謹次高韻二首忽驚蕭颯鬢毛秋起向泉山覔舊遊盤谷門前淚沾臆雲臺溪上雪䝉頭歸歟吾黨又千里老矣心期但一丘珍重休齋書滿屋可無三􅀫爲君留望望西山日幾回更憐一雨洗浮埃逺遊莫說雲門寺往事聊㝷單父臺雞犬蕭踈迷洞口交親零落半巖隈尊前見在君須􅃲速上籃輿相逐來用林擇之韻别陳休齋别離不覺􅀊時侵兩地相望共此心今日還成一尊酒它年􅀿記百篇吟傷情後㑹無期定握手交情有舊􅀷多謝晚風知此意不催寒日下踈林奉酬九日東峰道人溥公見贈之作幾年回首夣雲關此日重來兩􅁂斑􅀧檢梁間新􅀊月招呼臺上舊溪山三生漫說終無據萬法由來本自閑一􅀏支郞又相惱新詩不落語言間和林擇之鳯凰山韻木落髻鬟擁湖平粧鏡空荒亡餘舊事慘澹只悲風興發千山裏詩成一􅀏中諸君莫惆悵吾道固當窮次林擇之凉峰韻觧轡林間寺歸鴉晚欲盤望中嵐翠合愁外夕陽殘尊酒何妨盡羇心且自寛無端滿䆫月遥夜不勝寒熹去温陵二十七年而復來顯菴益老見􅀱七里亭又以佳句見招而休齋陳丈寺丞黄丈皆屬和焉因次韻奉酬併呈二丈不因辭吏役那得觧天刑故國重來逺寒山依舊青興懷感陳迹舉目愴新亭尚喜灣頭老禪房許扣扄答黄叔張日君趨玉陛抗䟽肅􅀖刑便有榮褒衮無勞涕伏青衆流爭靡靡一柱獨亭亭只恐追鋒急那容晝揜扄次韻陳休齋蓮華峰之作八石天開勢絶攀筭來未似此心頑巳吞繚白縈青外依舊箇中雲夣寛次黄叔張􅀫凉峰韻菡蓞含跗天外秀婆娑散影月中􅀌惜無畫手追前輩寫就凉峰憇寂圖至鳯凰山再作門前寒水青銅闕林外晴峰紫㡌􅀌記得南垞通桞浪依稀全是輞川圖見梅用攀字韻年來羞把玉梅攀萬樹爭春我獨頑只有顛狂無告訴詩腸欲斷酒腸寛次韻陳休齋懐古堂平昔塵編裏心期本自幽那堪舊泉石更作此追遊好句看猶在遺忠愴巳休亦知今日意不逐大江流􅀉題九日山廓然亭昨遊九日山散髪巖上石仰看天宇近俯歎塵境窄歸來今幾時夣想掛蒼壁聞公結茅地恍復記疇昔年隨流水逝事與浮雲失了知廓然處初不從外得遥憐植杖翁鶴骨􅀟眼碧永歗月明中秋風桂花白用林擇之韻呈陳福公昔公秉鈞衡金玉我王度中年幾湖海􅅯息安國歩巋然九鼎重翩􅀂􅀌雲去俯仰天地間誰哉此同趣用前韻答方􅀡甫小儒談大方任意略權度未行要疾走踉蹡不成歩唯應過量人不作與麽去請君敞書帷爲我說歸趣用前韻答林史君十年􅇵傾馳此日際風度胡然龔黄最未接夔龍歩詩成肯􅃍休客醉那得去却恐驛書來湖山適成趣題君子亭清晨坐武觀凉風動高旌挾􅃓一􅀏起屈此四座英破的亦巳屢穿楊詎云精軍吏不敢賀高鳥時相驚觧韛脫決遂緩帶飄華纓俯仰新亭幽曠然塵慮清内正外自􅀡三揖奚􅀁爭端居得􅀷玩君子非虚名伏承侍郞使君垂示􅀁與少傅國公唱酬西湖佳句謹次高韻聊發一􅀏二首百年地闢有竒功創見猶驚鶴髪翁共喜安車迎國老更傳佳句走郵童閑來且看潮頭入樂事寜憂酒􅊦空㑹見台星與卿月交光齊照廣寒宮越王城下水融融此樂從今與衆同滿眼芰荷方永日轉頭禾黍便西風湖光盡處天容闊潮信來時海氣通酬唱不誇風物好一心憂國願年豐伏承子􅀡都督侍郞臨餞逺郊仍邀嚴州郞中及諸名勝相與燕集分韻賦詩熹得時字輙成鄙句芳􅀊倐云晏故山風雪時胡爲在中路復此行遲遲爲有賢主人愛客情依依昨夕西門道終宴不能辭今朝復何朝祖帳遥相追賔從俱俊賢車馬有光輝敞扉得華觀俯檻臨清池南州淑氣多蕩節佳景隨雪樹雖改色青山正含姿朱氏園外谷中有梅近百株是日花落巳盡開樽酌春醪授簡哦新詩但覺四坐驩不知寸晷移流雲暗寒空蒼煙染人衣相看暮色至我去公當歸别䄂不􅃘分扣扣陳苦詞願公崇令德慰我渴與飢臘月九日晚發懐安公父教授夀翁知丞載酒爲別而元禮景嵩子木擇之廷老考叔舜民諸賢相與同舟乗便風頃刻數十里江空月明飲酒樂甚因以星垂平野闊月湧大江流分韻熹得星字醉中别去乃得數語略紀一時之勝云掛㠶望煙渚整棹別津亭風水巳云便我行安得停離樽枉羣賢濁醪愧先傾二公厨船未至先飮舟中餘尊談􅀏不知逺但覺江流清江水上流接建劍溪潮􅀁不及水益清駛獵獵􅅴蔗洲茫茫白沙汀斯須復回首秪有遥山青􅅴蔗白沙兩地名相去十許里頃刻而過野色一以暝川光皛􅀌明中流􅃞華月極浦涵踈星酒酣客散歸茫然獨宵征起視天宇闊此身一浮萍難追五湖遊未願三閭醒且詠招隱作􅀌舟轉竛竮伏䝉制置閣學侍郞示及致政少傅相公送行長句并得竊窺酬和佳篇伏讀之餘不勝慰幸謹次高韻少見愚悃以餞車塵伏惟采矚二首公子威名動海濵四年相與愧情親忽聞黄􅃏分全蜀更祝彤庭列九賔公以上章請對執手便驚成契闊贈言還喜和陽春政成但祝歸來早别恨無端莫重陳地兼梁益盛中權自昔疇咨出萬全定喜封章來活國故煩伏軾去籌􅁁公去嵗嘗有密䟽上賜手札褒諭軍民傳詔歡聲溢婦女迎門巧􅀏妍要答君恩與人望可無清教逮初筵諸葛武侯初領益州牧發教與羣下曰夫參署者集衆思廣忠益也􅀂逺小嫌難相違覆曠闕損矣違覆而得中猶棄敝蹻而􅀗珠玉然人心􅀂不能盡惟徐元􅀡䖏兹不惑又董㓜宰參署七年事有不至至于十反來相啓告苟能慕元􅀡之十一㓜宰之勤渠有忠於國則亮可以少過矣又曰昔初交州平屢聞得失後交元􅀡勤見啓告前參事於㓜宰每言必盡後從事於偉度數有諫止雖資性鄙暗不能盡納然與四子終始好合亦足以明其不疑於􅀡言矣伏讀致政少傅相公送趙成都佳句兩篇不勝慰幸巳次高韻并餞其行而再賦此章以見區區瞻仰之意繕録拜呈伏乞采覧二首歸來寂莫卧漳濵夣想威容阻再親綠野遥聞花欲語赤書還喜鴈來賔閑中有句人爭誦妙處無心物自春行馬不因吾輩設􅅐竒猶得話陳陳一旦高辭將相權身名從此慶􅀟全人誇迹巳風塵外誰道心遊日月􅁁未許前賢專晚節更將餘事發春妍君王􅀂要詢黄髮便好臨雍促肆筵送彦集之官瀏陽急景彫暮節高風振空林病夫掩闗卧長謡擁􅀌衾聞君千里行四牡方駸駸重此别離感青天欲愁隂君行豈不勞民瘼亦巳􅀷催科處處急椎鑿年年侵君行寛彼甿足以慰我心薦書㑹滿篋社酒還同斟􅀁念家同産與君如瑟琴兹焉不並駕宰木寒蕭槮尚喜吾諸甥男㳟女知欽明朝復相憶悵望楚山岑次劉正之芙蓉韻三首淺緑􅀷紅出短籬望中都是可憐枝要看亂颭寒塘水更待金風滿意吹凌波􅀡欲渡横塘却愛無人獨自芳且􅀝新漪閑照影更憑女伴一扶將㣲吟澤畔幾扶笻自􅀏摧頽一秃翁羞見芙蓉好顔色且憑詩律傲西風晦庵先生朱文公文集卷第八考異晚雨凉甚賔客一作賔去付與一作分付吟哦室兩忘一作相忘休齊惠詩次韻忽驚蕭颯一作還家不覺老矣一作老去珍重一作見說三􅀫一作三日望望一作悵望逺遊一作勝遊蕭踈迷一作荒凉悲見在一作有酒速上一作好上逐來一作趂來至鳯凰山再作銅􅆣一作銅闊次韻懐古堂巳休一作未休竒題廓然亭俯歎一作俯視周擇之韻呈福公誰哉一作懷哉次韻芙蓉扶笻一作枝笻福州府學訓導舒鏊校晦菴先生朱文公文别集卷第八雜著釋氏論上建安呉應槱家藏湯東潤䟦或問孟子言盡心知性存心養性而釋氏之學亦以識心見性爲本其道豈不亦有偶同者耶朱子曰儒佛之所以不同正以是一言耳曰何也曰性也者天之所以命乎人而具乎心者也情也者性之所以應乎物而岀乎心者也心也者人之所以主乎身而以統性情者也故仁義禮智者性也而心之所以爲體也惻隱羞惡恭敬辭譲者情也而心之所以爲用也盖所謂􅑙􅂨于民有物有則者儒也故其所以盡心知性者以其窮理而極乎心之所之所有者無不識也所謂養性巳而不失其夲則性是則情之所發亦無不正而可以應物餘矣性不見其分别給之與其指者實在精神魂魄之聚而吾儒所謂形而下者耳至其所以識心者則必别立一心以識此心而其所謂見性者又未嘗睹夫民之􅂨物之則也旣不睹夫性之本然則物之所感情之所發皆不得其道理於是槩以爲巳累而盡絶之雖至於反易天常殄㓕人理而不顧也然則儒術之所以異其本豈不在此一言之間乎曰釋氏之不得爲見性則聞命矣至於心則吾曰盡之存之而彼曰識之何以不同而又何以見其别立一心耶曰心也者人之所以主於身而統性情者也一而不二者也爲主而不爲客者也命物而不命於物者也惟其理有未窮而物或蔽之故其明有所不照私有未克而物或累之故其體有所不存是以聖人之教使人窮理以極其量之所包勝私以去其體之所害是其所以盡心而存心者雖其用力有所不同然皆因其一者以應夫萬因其主者以待夫客因其命物者以命夫物而未嘗曰反而識乎此心存乎此心也若釋氏之云識心則必􅀵視反聽以求識其體於恍惚之中如人以目視目以口齕口雖無可得之理其􅀔必不能不相汝爾於其間也此非别立一心而何哉夫别立一心則一者二而主者客分矣而又塊然自守㓕情廢事以自棄君臣父子之間則心之用亦息矣夫所指以爲心性與其所以從事焉者乃如此然則不謂之異端耶􅀃而何哉曰然則其徒盖有實能恍然若有所睹而樂之不厭至於遺外形骸而死生之變不足動之者此又何邪曰是其心之用旣不交於外矣而其體之分於内者乃自相同而不舎焉其志專而切其機危而迫是以精神之極而一旦惘然若有失也近世所謂看心之法又其所以至此之捷徑盖皆原於莊周承蜩削鐻之論而又加巧宻焉爾然昧於天理而特爲是以自􅀻焉則亦何足稱於君子之門哉釋氏論下或問子之言釋氏之術原於莊子承蜩削鐻之論其有稽乎朱子曰何獨此哉凡彼言之精者皆􅀼取莊列之說以爲之宋景文公於唐書李蔚等傳旣言之矣盖佛之所生去中國絶逺其書來者文字音讀皆累數譯而後通而其所謂禪者則又出於口耳之傳而無文字之可據以故人人得竄其說以附益之而不復有所考驗今其所以或可見者獨頼其割裂裝綴之迹猶有隱然於文字之間而不可揜者耳盖凡佛之書其始來者如四十二章遺教法華金剛光明之􅀋其所言者不過清虚縁業之論神通變見之術而巳及其中間爲其學者如惠逺僧肇之流乃始稍􅀼莊列之言以相之然尚未敢正以爲岀於佛之口也及其乆而恥於假借則遂顯然篡取其意而文以浮屠之言如楞嚴所謂自聞即莊子之意而貟􅁴所謂四大各離今者妄身當在何處即列子所謂精神入其門骨骸反其根我尚何存者也凡若此􅀋不可勝舉然其說皆萃於書首其無以繼之然後佛之本真乃如結壇誦呪二十五輪之􅀋以至於大力金剛吉盤茶􅀑之属則其麄鄙俗惡之狀校之首章重玄極妙之指盖水火之不相入矣至於禪者之言則其始也盖亦出於晋宋清談論議之餘習而稍務反求静養以黙證之或能頗出神怪以衒流俗而巳如一葉五花之䜟􅃗履西歸之􅀃雖未必實有是事然亦可見當時所尚者止於如此也其後傳之旣乆聦明才智之士或頗出於其間而自􅁴其陋於是更出巳意益求前人之所不及者以隂佐之而盡諱其怪幻鄙俚之談於是其􅀃一旦超然真若出乎道德性命之上而惑之者遂以爲果非堯舜周孔之所能及矣然其虚夸詭譎之情險巧儇浮之態展轉相高日以益甚則又反不若其􅀄清虚静黙之說猶爲彼善於此也以是觀之則凡釋氏之夲末真僞可知而其所􅀼豈獨承蜩削鐻之一言而巳哉且又有一􅀃焉夫佛書本皆胡語譯而通之則或以數字爲中國之一字或以一字而爲中國之數字而今其所謂偈者句齊字偶了無餘欠至於所謂二十八祖傳法之所爲者則又頗恊中國音韻或用唐詩聲律自其唐之稍􅃛如惠洪輩者則巳能知其謬而強爲說以文之顧服衣冠通今古號爲士大夫如楊大年蘇子由者反不悟而筆之於書也嗚呼以是推之則亦不必問其理之是非而其増加之僞迹狀明白益無所逃矣宋公之論信而有證世之惑者於此其亦可以少悟也哉陳請釋奠申禮部檢狀見臨漳語録伏覩淳熈六年尚書禮部頒降淳熈編􅀋􅀕祀儀式内有合行申請事件湏至申聞一神位某近得禮部侍郎王普所著釋奠儀式考其位次爵號皆與此本不同大抵此圖自東而西兩兩相對而王氏本自東序一至五次西序一至五又次東廊一至卅六又次西廊一至卅五次西廊泗水侯孔鯉次東廊沂水侯孔伋遂連中都伯左丘明以下至賈逵又次西廊杜子春以下至王安石詳此次序固不如今圖之善但此圖十哲次序亦有小誤盖以論語考之當以閔損爲第一在東序冉耕爲第二在西序冉雍爲第三在東序宰予爲第四在西序端木賜爲第五在東序仲由爲第六在西序冉求爲第七在東序言􅅯爲第八在西序卜啇爲第九在東序曾參爲第十在西序今迺以冉雍爲第一閔損爲第三冉求爲第六仲由爲第七則亦誤矣又其爵號王氏本費公爲琅琊公鄭公爲東平公薛公爲下邳公齊公爲臨淄公􅀺公爲􅀺陽公徐公爲彭城公衛公爲河内公吴公爲丹陽公魏公爲河東公成侯爲武成侯未知孰是又按國朝㑹要政和間沂水侯與泗水侯俱封仍同從祀則王氏本爲得之而此圖獨闕泗水委是脫誤其左丘明以下當從此圖兩兩相對但左丘明當在西廊對孔伋而荀况以下當在東廊公羊髙以下當左西廊兩兩相對與此相反乃爲得之耳伏乞更賜詳考改正行下一祭器並依聶崇義之禮圖様式某伏見政和年中議禮局鑄造􅀕器皆考三代器物遺法制度精宻氣象淳古足見一時文物之盛可以爲後世法故紹興十五年曾有聖㫖以其様制開􅀃印造頒付州縣遵用今州縣旣無此本而所頒􅑙儀式印本尚仍聶氏舊圖之陋恐未爲得欲乞行下所属别行圖􅀞鏤板頒行令州縣依凖製造其用銅者許以鈆錫雜鑄收還舊本悉行毁棄更不行用一釋奠時日注云仲春上丁仲秋下丁某檢凖紹興乾道淳熈令並云二月八月上丁釋奠文宣王即無下丁之文又嘗􅀼見五禮申明􅁽内有當時州郡申請禮局巳改下丁爲上丁訖其後又見故敷文閣待制薛弼任杭州教授日所申今到本州檢㝷頒􅑙舊本却無此條恐是前後節次頒􅑙致有漏落􅀅來如􅀩别行鏤板即乞先於儀内改下丁作上丁字仍檢申明􅁽内備録此條全文附載篇末以證元夲之失仍下州郡有舊本處並行批鑿改正庻使州縣奉行有所依據一元本陳設條内著尊四犧尊四著當作犧當作象今來頒降新本巳行改正而政和年中頒􅑙舊本尚仍其舊州縣奉行不無疑惑􅀅來如􅀩别行鏤板即乞附載後来改正因依於篇後或只􅀅某此狀全文附載仍下州郡合􅀅舊本批鑿庻幾明白不至疑誤一釋莫儀舊本鄒國公下並有舒王字今巳刪去而不著其所以然者亦與舊本牴牾􅀅来如􅀩别行鏤板即乞檢㑹靖康年中罷王安石配享先聖章䟽指揮並行附載仍下州郡並􅀅舊本批鑿啓回余衡州秀實衡州之孫師魯家藏賦禄真祠方遂燕居之適承流巨屏莫回成命之頒顧修問之未遑辱移書之先及恭惟某官受材宏偉􅆂德粹温問學有原盡得傳家之奥要文詞甚蔚坐觀作者之典刑盍升臺閣之聮猶屈江湖之守方慕先賢之治益觀羙化之成鈴閤少留姑慰逺民之意璽書亟下遂還近侍之班某乆仰英猷未諧良覿同寅有望儻分南服之憂歸賦可期即返東臯之樂回王正臣見大同集伏念行能無取藝業不脩學不足以見古人之用心徒極鑚研之力仕不足以行平日之所志第勞刀筆之間至於典禮義文學之官首誦說講論之事聖言高逺雖莫究於指歸絶業光明庻有開於來者過勤厚意貺以華牋仰褒飾之過冝顧省循而何有謹奉啓上謝回衆解元以下見南康集􅀼審待問澤宫登名天府方幸究宣於明詔敢期誤枉於華牋披味以還感藏難喻解元先輩學推庠序行著州閭出膺續食之求足爲勸駕之重顧念朝家設科以取士本務得賢然而學者挾䇿以讀書但期干禄伊欲一新於敝俗不能無望於群公輙誦淺聞少酬盛禮惟窮理脩身之要當有志於古人則尊主庇民之功庻無慚於當世回待􅀘生􅀼審待問澤宫登名槐市方幸究宣於明詔敢期誤枉於華牋披味以還感藏難喻然朝家建學養士之意正爲育材而諸生辭家射䇿之心但期干禄伊欲一新於敝俗不能無望於群公輙誦淺聞少酬盛禮惟古人爲巳之志當有餘師則大學新民之功庻無違教晦庵先生朱文公文别集卷第八候官縣儒學訓導劉簮校晦庵先生朱文公續集卷第八答折憲名知常示及先正樞宻端明少師家傳一通拜受伏讀得以仰窺精忠壯烈始終大致少慰生平尊慕鄉徃之心甚大幸也顧又重勤台喻必使次輯以記埏道之碑則區區所以不敢僣易以承嘉命者巳悉具前書矣今雖鐫戒益勤孝思愈切然在某􅀻計利害之實則不能有加於前也伏惟矜憐反復前􅀃而改圖之使得免於不韙之罪衆多之怨則某不勝千萬之幸與黄知府􅂺有不􅀗巳之懇事渉鄉閭利病􅀔甚迫切敢忘分守巳具公劄干冐公聽幸賜采覽斟酌行下千萬幸甚前日迎候之初便􅀩誨諭仰見仁人之心視斯人之不􅀗真不啻􅀂痒疴疾痛之切其身竊意樂聞斯言不以爲罪是以敢布其愚撥米曲折固知仁民之切無􅀁吝於此况又使府自認脚費此尤出於望外下邑饑民荷更生之賜感戴宜如何耶儲宰行巳􅁆日縣郭近封可保無虞但崇化麻沙以西一帶素少早田唐石乃全無之只此數十里間尚爾嗸嗸􅀻居杜門亦不知其詳細爲如何聞有臺劾亦旣施行而未有􅀍受亦未見章䟽遣書著衘頗有所礙幸辱情照或章䟽巳報行得賜指撝錄示爲幸昨􅀩垂示報狀極荷眷念區區尋亦巳拜恩命矣罪戾彰徹固不可逃然縣宰批罷一事至乃上玷清重尤切愧恐而不敢自明竊計髙明固巳洞照其實矣至於友生連坐亦􅀩矜念委曲周至益見仁人之用心爲不可及感歎亡巳但旣鐫罷名書罪籍不知􅀉禄餘俸合與不合幇勘巳戒幹人計會所司更乞台㫖稽考法令然後施行恐不應得免貽後日之紛紛也答江清卿􅀩喻湖北書極荷不外但年來藏拙不敢復與外事又伯升書言周憲於麟之自有薦論之意而麟之不欲爲自衒鬻者此意皆甚羙竊謂寧少忍之以遂麟之之髙不當共爲喣濡之態以􅃜其一簣之功也先夫人髙識懿行冝得當世大賢紀述以詔後世而尊兄過聽誤以見屬自顧淺陋何以稱此然以委重之勤慕仰之素勉竭其愚以承尊命謹繕冩納呈幸賜裁訂而取舎之乃􅀁願望即不可用不必過存形迹以累先德之羙也向來􅀁苦何疾今想巳脫然矣細觀妙畫知目疾之向平爲可喜也然中年氣血非前日之比服藥亦難見効惟有虗心調氣静以飬之庶或少可􅀘助耳答滕誠夫部綱之役不辭而行甚善甚善親闈慈念固當眷戀然亦可更以王事靡盬之義反復寛譬乃爲兩全也與葉彦忠易傳且留是正不妨易自伏羲始畫八卦三畫文王重爲六十四六畫作繋卦􅂏辭周公作繋爻辭孔子作􅂏乃釋文王之􅂏通謂之􅂏象文言繫辭􅀃卦序卦雜卦而􅂏象繋辭各分上下是爲十翼舊􅀃如此承問及之示喻爲學有緒尤以爲慰且只如此用功旦夕相見却得靣論也大學近脩得稍平正前本亦不能無所偏耳詩傳兩本煩爲以新本校舊本其不同者依新本改正有􅁓卅副在内恐要帖換也校時湏兩人對看一聽一讀乃佳着旬日功夫當可畢也答李伯諌某陸陸如昨無可言者兩月來修得数書亦有一二論􅀃文字甚思與老兄評之而相望邈然又無人抄得徒此欎欎想聞之亦不無歎恨也比來觀書進學誘掖後進次第如何深所欲聞因書詳及之爲幸通鑑綱目三國以後草藁之屬臨行忘記􅀃及今想隨行有的便旋付及幸甚唐事巳了但欲東漢之末接三國脩之庻㡬有緒易爲力耳然伯起者亦尚悠悠近㳺誠之伯鈞之子相過開爽可喜渠南北事甚熟或取過伯起者託渠料理也某碌碌之况巳具前書通鑑文字近方得暇脩得数卷南北朝者伯起不承當巳託元善矣度渠必能成之但見脩者巳殊費功夫蓋舊看正史不熟倉卒無討頭處計今秋可了見到者餘者望早付及此間杜門山中尚不能免賔客書問之擾想官下少暇也壁記巳在前書中但齋記未成耳惡扎不堪用不􅀂别託善書者書之也周翰書詞傾倒相與甚至恨未識靣耳子禮兄金渠巳認還七月以後息錢矣但書肆狼狽日甚深用􅀒愧要之此等自非吾曹所當爲冝其至此但恨収拾得又不好愈使人意不滿耳楊州書巳别付逓去彼此各是破戒甚覺難措辭也此事長沙必能爲辨吾人徒自擾擾未必有益第好􅀏耳因書亦當督之也通鑑諸書全不得下功前此却脩得􅀳事粗定條例因事參考亦頗詳宻但􅀳事最末兩三卷未到故前書奉速今承喻巳􅀉少輿處必是少輿遺下不曽送來也此亦不難俟卒成之耳宋以後事分屬張元善巳脩得大字數卷來尚未得􅀧勘􅀂得年歳間無出入有人抄冩此甚不難了但恐不得如人意耳六象似亦送少輿不知何故未到俟别摹去近得曲江濂溪象比舊傳南安本殊丰厚精彩亦當改正也讀易想有味有可論者便中語及爲幸欽夫此數時常得書論述甚多言仁及江西所刋太極解蓋屡勸其収起印板似未甚以爲然不能深論也大抵近日議論語孟解巳見一二篇雖無鄉時過髙之失而寛縱草率絶難􅀧檢不知何故如此無由相見殊使人憂之長沙書來􅀃又分門編本朝事及作論篤一書雖盗跖之言有可取者亦載其中不知作此等文字是何意思使人都理會不下因書蓋略諷之不知又以爲然否也書肆之敗始謀不􅆇理必至此無可言者旣敗之後紛紛口語互相排撃更不可理會幸巳自脫去不能復問晦伯必自報去某於此却似放得下但焉謖未易根究耳一􅀏所示近文甚佳但似太髙不着題大凡立言要湏因人變化而無包含不盡處乃爲善言耳向見欽夫文字病痛正是如此也近有文字􅁆篇及與伯恭問答􅁆條偶當入城未能􅀉徃少懇欲煩爲尋訪龎安常難經􅀃及聞别有論醫文字頗多得并爲訪問傳得一本示及爲幸答趙景昭减稅文字不知巳遣行未今再遣此人去漕司取申省狀恐未遣可就付也今日風色甚佳而情思益憒憒臨風永歎不知􅀁言答毛朋夀向見季通􅀃甚俊敏更能勉力操脩以世家學爲佳耳大學文字季通者尚未爲定本旦夕當取來更爲改正乃可傳也場屋之文固知賢者未能免俗然先有以立乎其大者然後出而應之則得失榮枯不能爲吾累矣不識髙明以爲如何就􅀘逺行爲榮親計此意甚羙然古人亦有所謂不以得於外者爲親榮者亦不可不知也答馬竒之椅獨至至字疑某衰晚疾病待盡朝夕無足言者細讀來示備詳别後進學不倦之意世間萬事湏􅁷變㓕不足置􅎍中惟有致知力行修身俟死爲究竟法耳余正父愽學强志亦不易得禮書中間啇量多未合處近方見其成編比舊無甚改易所謂獨至無助者誠然然渠亦豈容它人之助也此間所集諸家雜􅀃未能如彼之好然儀禮正經叚落注䟽却差明白但功力頗多而衰病耗昏朋友星散不能得了耳啇伯時時得書講論精宻誠可嘉尚李敬子堅苦有志尤不易得近與諸人皆巳歸只有建昌二吕在此蚤晚講論粗有條理足慰岑寂也與王撫州阮字南卿南北形象雖在逺方無由究悉然大槩亦可意料目前固非危機交急之時其爲長慮郤顧亦豈一無可施設者竊計方規素定其􅀁區畫必有次第幸􅀩見告乃荷不鄙也某今年公􅀻之年皆七十矣疾病益衰氣痞滿腹足弱筋攣不能轉動跬歩之間亦湏人扶乃能自致閑廢之餘固無職事可効但尚忝階官義當納禄又不敢自通牋奏懇求州郡累月僅得一申省狀方此發去而聞臺評巳及此事其間詞語不無深意矣未知所請竟復如何然幸巳少伸巳志即此外一切不復計也老兄氣軆從來清徤今尚只如舊時否宣布之餘何以爲樂想見彎弓盤馬横槊賦詩正自不减當年湖海之氣也此人趙雯相隨頗乆今因其省親江淮間附此問訊其人恐有可驅使處得􅀠戯下幸甚與長子受之早晚授業請益隨衆例不得怠慢日間思索有疑用􅁽子隨手劄記候見質問不得放過所聞誨語歸安下處思省要切之言逐日劄記歸日要看見好文字亦録取歸來不得自擅出入與人徃還初到問先生有合見者見之不令見則不必徃人來相見亦啓禀然後徃報之此外不得出入一歩居處湏是居敬不得倨肆惰慢言語湏要諦當不得戯􅀏喧譁凡事謙恭不得尚氣凌人自取恥辱不得飲酒荒思廢業亦恐言語差錯失巳忤人尤當深戒不可言人過惡及􅀃人家長短是非有來告者亦勿酬荅於先生之前尤不可􅀃同學之短交遊之間尤當審擇雖是同學亦不可無親䟽之辨此皆當請於先生聽其􅀁教大凡敦厚忠信能攻吾過者益友也其謟䛕輕薄傲慢䙝狎導人爲惡者損友也推此求之亦自合見得五七分更問以審之百無所失矣但恐志趣卑凡不能克巳從善則益者不期䟽而日逺損者不期近而日親此湏痛加檢􅀧而矯革之不可荏苒漸習自趍小人之域如此則雖有賢師長亦無救㧞自家處矣見人嘉言善行則敬慕而紀録之見人好文字勝巳者則借來熟看或傳錄之而咨問之思與之齊而後巳不拘長少惟善是取以上數條切冝謹守其􅀁未及亦可據此推廣大抵只是勤謹二字循之而上有無限好事吾雖未敢言而竊爲汝願之反之而下有無限不好事吾雖不欲言而未免爲汝憂之也蓋汝􅀂好學在家足可讀書作文講明義理不待逺離􅂰下千里從師汝旣不能如此即是自不好學巳無可望之理然今遣汝者恐汝在家汨於俗務不得專意又父子之間不欲晝夜督責及無朋友聞見故令汝一行汝􅀂到彼能􅁬然勇爲力改故習一味勤謹則吾猶有望不然則徒勞費只與在家一般他日歸來又只是舊時伎倆人物不知汝將何靣目歸見父母親戚郷黨故舊耶念之念之夙興夜􅄰無忝爾所生在此一行千萬弩力到婺州先討店􅁠歇泊定即盥櫛具刺去見吕正字初見便禀某以大人之命逺來親依先生講席之下禮合展拜儻蒙収留伏乞端受便拜兩拜如未受即再致懇云未􅀩納拜不勝皇恐更望先生尊慈特賜容納况某於門下自先祖父以來事契深厚切望垂允又再拜起問寒暄畢又進言某晚學小生乆聞先生徳義道學之盛今日幸得瞻拜不勝慰幸坐定茶畢再起叙晚學無知大人遣來從學之意竊聞先生至誠樂育願賜開􅁢使某得早晚親炙不勝幸甚又云來時大人拜意有書投納即出書投之又進􅀃大人再令拜禀限以地逺不得瞻拜􅀰中公几筵今有香一炷令某拜獻今參拜之初未敢遽請容來日再詣門下令弟宣教大人亦有書并俟來日請見靣納揖退略就坐又揖而起如問它事即随事􅀿荅如將来􅀫食即云大人書中巳具禀更聴尊㫖次日將香再去仍具刺并以刺謁其弟問㸔同居有㡬子弟皆見之只問門下人可知也見其兄弟皆拜茶罷便起禀某昨日禀知乞詣靈筵瞻拜更俟尊命如引入即詣靈前再拜焚香又再拜訖拜其兄弟兩拜進􅀃大人致問昨聞􅀰中丈丈奄弃明時限以地逺不􅀗奔慰不勝慘愴之私令某拜禀切望以時節哀爲道自愛又再拜趍出如問就學􅀫食去處即􅀃昨􅀩喻潘丈教授許借安泊大人之意不敢以某乆累其家恐兩不穩便巳自有書與之只欲就其家借一空闊房舎或近宅屋宇安下不知尊意如何㸔􅀃如何如今相見即借人出去併問其兄弟㡬人并見之如不問即且去俟午間再去見問此事見潘丈亦如此􅀃大抵禮數務要恭謹詳緩不要張皇顛錯何丈托問婺州􅀉居前軰有姜子方者是李中書之甥在婺州住建炎間曽從馬殿院伸辟爲撫喻司屬官今其家有何子弟間見先生􅀃吾問宗留守家子弟聞多有在婺州者其家記録留守公事頗詳不知可託借傳一本否墓誌亦是曽侍中作吕家必有本也韋齋與祝公書跋松奉嬢子幸安小五娘九月十五日午時免娠生男子幸皆安樂自去年十二月初在建州權職官聞有虜􅀐自江西入邵武者遂棄所攝携家上政和寓壟寺五月初間龔儀叛兵燒處州入龍泉買舟倉皇携家下南劒入尤溪而某自以单車下福唐見程帥在福唐聞賊兵破松溪隘駸駸東下巳入建州攻南劒甚急又匆匆自間道還尤溪六月十四日早到縣而賊兵巳在十􅁆里外矣幸二舎弟巳般家深遯是日即刻與縣官同走至家間所遁處賊在延平爲官軍所破倉皇自山路欲遁下漳泉至此非其本心也過縣更不駐不甚害人亦不縱火家中上下幸皆無恙而隨行及留寓舎中衣服文字之􅀋皆無所損失比他人爲尤幸也七月間方還縣而甌寧土冦范汝爲者出没建劒之間其衆􅁆千官軍遇之輙潰諸司不免請官招安巳還狀受犒設將散其衆無何大兵自會稽來必欲進計昨日方報大兵冐昧入賊巢䘮失􅁆千人賊􅀔又震大略自今夏以來未甞有一枕之安此懐如何得程夀隆近書云郷里頗擾擾不詳言其故度切近江淛其可憂當不啻此惟聚糧深遯勿以一豪珍幣自隨乃爲上䇿此中雖城居但日夕爲遁入深山之計生意草草凡事苟且不知百年未滿之間如此者更㡬時而後定邪來書謂某􅂴於從仕非也中世士大夫以官爲家如農夫之於田其敢惰邪但未能赴行在間閩中􅀁有不過權局逺不過三五月道里有逺近便不便携家即厚費獨行又非便是以且此跧藏意亦欲俟來春無事一走㑹稽别當奉報晉道帥福辟得一貟屬官湏京朝官大年又未曽參部一切差遣皆礙是以皆參差也裘四乆此頗忠戇可任旣忤逢年當擾攘中遂不告而去情理不復可耐今此復來察其意色不復可制蓄毎日来就食而夜􅀫客舎然地逺難得人力來徃彼此資以通耗且羇縻不絶猶冀尚可鞭䇿耳方賊至六月間在村中裘四亦在彼􅁆使人呼之不至却妄云某在福唐未還又云賊破福州皆妄言也婺源先廬所在興􅄰未嘗忘也來書相勸以歸當俟國家克復中州南北大定歸未晚也内弟祝康國出示先君子與外大父書熹之不肖於是始生故書中及之今六十有四年捧玩手澤涕血交零敬書其後而歸之紹熈癸丑十二月七日􅀌朝散郎秘閣脩撰主管南京鴻慶宫熹謹書跋韋齋書昆陽賦爲兒甥讀光武紀至昆陽之􅀾熹問何以能􅀂是爲道梗槩欣然領解故書蘇子瞻昆陽賦􅂌之子瞻作此賦時方二十一二歳耳筆力豪壯不减司焉相如也韋齋紹興庚申熹年十一歳先君罷官行朝來寓建陽登髙丘氏之居暇日手書此賦以授熹爲􅀃古今成敗興亡大致慨然乆之於今忽忽五十有九年矣病中因覧蘇集追念疇昔如昨日事而􅀌露之餘霜露永感爲之泫然流涕不能自巳復書此以示兒軰云慶元戊午四月朔旦䟦陸務觀詩漠漠炊煙村逺近鼕鼕儺鼓埭西東三乂古路殘蕪裏一曲清江淡靄中外物巳忘如敝屣此身無伴等覊鴻天寒寂寞籬門晚又見浮生一嵗窮季扎聞歌小雅而識其思而不貳怒而不傷者近世東坡公讀桞子厚南澗中題乃得其憂中有樂樂中有憂者而深悲之放翁之詩如此後之君子其必有以處之矣慶元巳未七月二十日雲谷老人觀陳希真􅀁蔵爲記其後䟦魏丞相使虜帖内脩政事外攘夷狄復文武之境􅁟會諸侯于東都此夀皇帝當日之本心也屈巳和戎豈其􅀗巳然非丞相夀春公之􅀷謀壯節猶㡬不足以成之豈興事造功之果爲不易耶公之子熊夣出此宸翰以示臣熹適當奉諱之後捧玩摧裂涕泗交零謹拜手稽首而識其下方云晦庵朱先生文公續集卷八閩縣學訓導何器校
