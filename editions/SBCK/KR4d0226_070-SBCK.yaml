body:
  text: 雜著讀吕氏詩記桑中高甲辰春詩體不同固有鋪陳其事不加一詞而意自見者然必其事之猶可言者若清人之詩是也至於桑中溱洧之篇則雅人荘士有難言之者矣孔子之稱思無邪也以爲詩三百篇勸善懲惡雖其要歸無不出扵正然未有􅀂此言之約而盡者耳非以作詩之人所思皆無邪也今必曰彼以無邪之思鋪陳淫亂之事而閔惜懲創之意自見於言外則􅂚􅀂曰彼雖以有邪之思作之而我以無邪之思讀之則彼之自狀其醜者乃所以爲吾警懼懲創之資耶而况曲爲訓􅀃而求其無邪於彼不􅀂反而得之於我之易也巧爲辨數而歸其無邪於彼不􅀂反而責之於我之切也若夫雅也鄭也衛也求之諸篇固各有其目矣雅則大雅小雅􅀂干篇是也鄭則鄭風􅀂干篇是也衛則邶鄘衛風􅀂干篇是也是則自衛反魯以來未之有改而風雅之篇􅀃者又有正變之别焉至於桑中小序政散民流而不可止之文與樂記合則是詩之爲桑間又不爲無所㩀者今必曰三百篇皆雅而大小雅不獨爲雅鄭風不爲鄭邶鄘衛之風不爲衛桑中不爲桑間亡國之音則其篇帙混亂邪正錯糅非復孔子之舊矣夫二南正風房中之樂也郷樂也二雅之正朝廷之樂也商周之頌宗廟之樂也是或見於序義或岀於傳記皆有可考至於變雅則固巳無施於事而變風又特里巷之歌謡其領在樂官者以爲可以識時變觀土風而賢於四夷之樂耳今必曰三百篇者皆􅀕祀朝聘之所用則未知桑中溱洧之屬當以薦何等之􅀑神接何等之賔客耶蓋古者天子巡守命太師陳詩以觀民風固不問其美惡而悉陳以觀也旣巳陳之固不問其美惡而悉存以訓也然其與先生雅頌之正篇帙不同施用亦異如前所陳則固不嫌於厖雜矣今於雅鄭之實察之旣不詳於厖雜之名畏之又太甚顧乃引夫浮放之鄙詞而文以風刺之美說必欲強而置諸先王雅頌之列是乃反爲厖雜之甚而不自知也夫以胡部與鄭衛合奏猶曰不可而况強以桑中溱洧爲雅樂又欲合於鹿鳴文王清廟之什而奏之宗廟之中朝廷之上乎其以二詩爲猶止於中聲者太史公所謂孔子皆弦歌之以求合於韶武之音其誤蓋亦如此然古樂旣亡無所考正則吾不敢必爲之􅀃獨以其理與其詞推之有以知其必不然耳又以爲近於勸百諷一而止乎禮義則又信大序之過者夫子虚上林侈矣然自天子芒然而思以下猶實有所謂諷也漢廣知不可而不求大車有所畏而不敢則猶有所謂禮義之止也􅀂桑中溱洧則吾不知其何詞之諷而何禮義之止乎若曰孔子嘗欲放鄭聲矣不當於此又收之以備六籍也此則曽南豐於戰國䇿劉元城於三不足之論皆嘗言之又豈俟吾言而後白也哉大抵吾􅀃之病不過得罪於桑間洧外之人而其力猶足以完先生之樂彼􅀃而善則二詩之幸甚矣抑其於溱洧而取范氏之􅀃則又似以放鄭聲者豈理之自然固有不可奪耶因讀桑中之說而惜前論之不及竟又痛伯恭之不可作也因書其後以爲使伯恭生而聞此雖未必􅃍以爲然亦當爲我逌然而一􅀏也嗚呼悲夫讀唐志歐陽子曰三代而上治出於一而禮樂逹於天下三代而下治出於二而禮樂爲虗名此古今不易之至論也然彼知政事禮樂之不可不出於一而未知道德文章之􅀹不可使岀於二也夫古之聖賢其文可謂盛矣然􅀄豈有意學爲如是之文哉有是實於中則必有是文於外如天有是氣則必有日月星辰之光耀地有是形則必有山川草木之行列聖賢之心旣有是精明純粹之實以旁薄充塞乎其内則其著見於外者亦必自然條理分明光輝發越而不可揜蓋不必託於言語著於簡􅁽而後謂之文但自一身接於萬事凡其語黙動静人所可得而見者無所適而非文也姑舉其最而言則易之卦畫詩之詠歌書之記言春秋之述事與夫禮之威儀樂之節奏皆巳列爲六經而垂萬世其文之盛後世固莫能及然其所以盛而不可及者豈無所自來而世亦莫之識也故夫子之言曰文王旣沒文不在兹乎蓋雖巳決知不得辭其責矣然猶若逡廵顧望而不能無所疑也至於推其所以興衰則又以爲是皆出於天命之所爲而非人力之所及此其體之甚重夫豈世俗所謂文者所能當哉孟軻氏沒聖學失傳天下之士背本趨末不求知道養德以充其内而汲汲乎徒以文章爲事業然在戰國之時􅀂申商孫呉之術蘇張范蔡之辯列禦冦莊周荀况之言屈平之賦以至秦漢之間韓非李斯陸生賈傅董相史遷劉向班固下至嚴安徐樂之流猶皆先有其實而後託之於言唯其無本而不能一出於道是以君子猶或羞之及至宋玉相如王褒揚雄之徒則一以浮華爲尚而無實之可言矣雄之太元法言蓋亦長楊校獵之流而粗變其音節􅀄非實爲明道講學而作也東京以降訖于隋唐數百年間愈下愈衰則其去道益逺而無實之文亦無足論韓愈氏出始􅁴其陋􅁣然號於一世欲去陳言以追詩書六藝之作而其弊精神縻􅀊月又有甚於前世諸人之所爲者然猶幸其畧知不根無實之不足恃因是頗泝其源而適有㑹焉於是原道諸篇始作而其言曰根之茂者其實遂膏之沃者其光曄仁義之人其言藹如也其徒和之亦曰未有不深於道而能文者則亦庻幾其賢矣然今讀其書則其出於謟䛕戯豫放浪而無實者自不爲少􅀂夫所原之道則亦徒能言其大體而未見其有探討服行之效使其言之爲文者皆必由是以出也故其論古人則又直以屈原孟軻馬遷相如楊雄爲一等而猶不及於董賈其論當世之弊則但以詞不巳出而遂有神狙聖伏之嘆至於其徒之論亦但以剽掠􅆫竊爲文之病大振頽風教人自爲爲韓之功則其師生之間傳受之際蓋未免裂道與文以爲兩物而於其輕重緩急本末賔主之分又未免於倒懸而逆置之也自是以來又復衰歇數十百年而後歐陽子出其文之妙蓋巳不愧於韓氏而其曰治出於一云者則自荀楊以下皆不能及而韓亦未有聞焉是則疑若幾於道矣然考其終身之言與其行事之實則恐其亦未免於韓氏之病也抑又嘗以其徒之􅀃考之則誦其言者旣曰吾老將休付子斯文矣而又必曰我所謂文必與道俱其推尊之也旣曰今之韓愈矣而又必引夫文不在兹者以張其􅀃由前之􅀃則道之與文吾不知其果爲一耶爲二耶由後之􅀃則文王孔子之文吾又不知其與韓歐之文果若是其班乎否也嗚呼學之不講久矣習俗之謬其可勝言也哉吾讀唐書而有感因書其說以訂之讀大紀宇宙之間一理而已天得之而爲天地得之而爲地而凡生於天地之間者又各得之以爲性其張之爲三綱其紀之爲五常蓋皆此理之流行無所適而不在若其消息盈虗循環不已則自未始有物之前以至人消物盡之後終則復始始復有終又未嘗有頃刻之或停也儒者於此旣有以得於心之本然矣則其内外精粗自不容有纎毫之間而其所以脩巳治人垂世立教者亦不容其有纎毫造作輕重之􅀻焉是以因其自然之理而成自然之功則有以參天地賛化育而幽明巨細無一物之遺也􅀂夫釋氏則自其因地之􅀄而與此理巳背馳矣乃欲其所見之不差所行之不繆則豈可得哉蓋其所以爲學之本心正爲惡此理之充塞無間而使巳不得一席無理之地以自安厭此理之流行不息而使巳不得一息無理之時以自肆也是以叛君親棄妻子入山林􅂢軀命以求其所謂空無寂㓕之地而逃焉其量亦巳隘而其勢亦巳逆矣然以其立心之堅苦用力之精專亦有以大過人者故能卒如所欲而實有見焉但以其言行求之則其所見雖自以爲至玄極妙有不可以思慮言語到者而於吾之所謂窮天地亘古今本然不可易之實理則反瞢然其一無所覩也雖自以爲直指人心而實不識心雖自以爲見性成佛而實不識性是以殄㓕彞倫堕於禽獸之域而猶不自知其有罪蓋其實見之差有以䧟之非其心之不然而故欲爲是以惑世而罔人也至其爲􅀃之窮然後乃有不舎一法之論則似始有爲是遁詞以蓋前失之意然亦其秉彞之善有終不可得而殄㓕者是以剪伐之餘而猶有此之僅存又以牽於實見之差是以有其意而無其理能言之而卒不能有以踐其言也凡釋氏之所以爲釋氏者始終本末不過如此蓋亦無足言矣然以其有空寂之􅀃而不累於物欲也則世之所謂賢者好之矣以其有玄妙之說而不滯於形器也則世之所謂智者恱之矣以其有生死輪回之􅀃而自謂可以不淪於罪苦也則天下之傭奴㸑婢黥髠盗賊亦匍匐而歸之矣此其爲􅀃所以張皇輝赫震耀千古而爲吾徒者方且蠢焉鞠躬屏氣爲之奔走服役之不暇也幸而一有間世之傑乃能不爲之屈而有聲罪致討之心焉然又不能究其實見之差而詆以爲幻見空􅀃不能正之以天理全體之大而偏引交通生育之一􅀃以爲主則既不得其要領矣而徒欲以戎狄之醜號加之其於吾徒又未嘗教之以内脩自治之實而徒驕之以中華列聖之可以爲重則吾恐其不唯無以坐􅀵摧䧟廓清之功或乃徃遺之禽而反爲吾黨之詬也嗚呼惜哉讀兩陳諌議遺墨天下有自然不易之公論而言之者或不免於有所避就故多失之若諸公熈寧日録之辯是也嘗記頃年獲侍坐於故端殿上饒汪公縱言及於日録熹因妄謂日録固爲邪􅀃然諸賢攻之亦未得其要領是以言者瀆而􅃪者疑用力多而見功寡也蓋嘗即其書而考之則凡安石之所以惑亂神祖之聰明而變移其心術使不得遂其大有爲之志而反爲一世禍敗之原者其􅀮㣲深切皆聚此書而其詞􅄡筆勢縱橫椑闔煒燁譎誑又非安石之口不能言非安石之手不能書也以爲蔡十撰造之言固無是理况其見諸行事深切著明者又以相爲表裏亦不待晚年懟筆有所増加而後爲可罪也然使當時用其垂絶之智舉而焚之則後来載筆之士於其帷幄之間深謀宻計雖欲畢力搜訪極意形容􅀔必不能得之如此之悉而傳聞異詞虚實相半亦不能使人無溢惡之疑且如勿令上知之語世所共傳終以手筆不存故使陸佃得爲隱諱雖以元祐衆賢之力争辯之苦而不能有以正也此見陸佃供答史院取問状何幸其徒自爲失計出此真蹟以􅁀其悪於天下便當摭其肆情反理之實正其迷國誤朝之罪而直以安石爲誅首是乃所謂自然不易之公論不唯可以訂已徃之謬而又足以開後来之惑柰何乃以畏避嫌疑之故反爲迂曲回互之言指爲撰造増加誣僞謗詆之書而欲加刋削以㓕其迹乎汪公歎息深以愚言爲然今觀閑樂陳公遺帖了齋陳公表藁追憶前語自愧學之不進所知不能有以甚異於徃時又歎汪公之不可復見也爲之掩卷太息而書其後抑又嘗恠了翁晚􅀊之論多岀此帖之餘然其自訟改過之書曽無一言以及此而獨謂􅀛山楊氏寔發其機語見責沈其所贈兄孫漸者即幾叟少卿後改名淵者也幾叟楊公之壻嘗以楊公之語吿翁曰更留那老子做甚底翁􅀄亦駭其言幾叟復爲反復申言之翁乃悔悟故其語曰余之自訟改過頼其一言而漸於是時亦以所聞警佘之謬云是則論者亦頗疑之而以今考之此書之作寔在建中崇寧之間書云吾友遷謫猶居善地疑居袁州時也且其言猶以日録爲蔡卞之所託而其後了翁合浦尊堯之書亦未直攻安石也至於大觀􅀄年而後四明之論始作進表雖在政和元年然公居明州實大觀􅀄年也則其推言所自獨歸功於楊氏而不及閑樂有不可誣者矣顧其後書雖謂天使安石自冩誣悖之心然猶有懟筆増加歸過神考之云則終未免於所謂有所回互避就而失之者也又觀閑樂此書之指所以罪狀安石者至深切矣然考其事不過數條若曰改祖宗之法而行三代之政也廢春秋而謂人主有北靣之禮也學本出於刑名度數而不足於性命道德也釋經奥義多出先儒而旁引釋氏也是數條者安石信無所逃其罪矣然其所以受病之源遺禍之本則閑樂之言有所未及而其所指以爲􅀃者亦自不能使人無可恨也今亦無論其他而姑以安石之素行與日録之首章言之則安石行已立朝之大節在當世爲如何而其始見神宗也直以漢文帝唐太宗之不足法者爲言復以諸葛亮魏元成之不足爲者自任此其志識之卓然又皆秦漢以來諸儒所未聞者而豈一時諸賢之所及哉然其爲人質雖清介而器本偏狹志雖高逺而學實凡近其所論􅀃蓋特見聞億度之近似耳顧乃挾以爲高足巳自聖不復知以格物致知克巳復禮爲事而勉求其所未至以増益其所不能是以其於天下之事每以躁率任意而失之於前又以狠愎狥􅀻而敗之於後此其所以爲受病之原而閑樂未之言也􅀂其所以遺禍之本則自其得君之􅀄而巳有以中之使之恱其高駭其竒而意斯人之不可無矣及其任之以事而日􅃪其言則又有以信夫斯人之果不可無也於是爲之力拒羣言而一􅃪其所爲唯恐其一旦去我而無與成吾事也及其訏謨既久漸􅆂透徹則遂心融神㑹而與之爲一以至於能掣其柄而自操之則其運動弛張又巳在我而彼之用舎去留不足爲吾重輕矣於是安石卒去而天下之政始盡出於宸􅂨了翁所謂萬幾獨運於元豐閑樂所謂屏棄金陵十年不召者蓋皆指此然了翁知其獨運而不知其所運者乃安石之機閑樂見安石之身若不用而不知其心之未嘗不用也是以凡安石之所爲卒之得以附於陵廟之尊託於謨訓之重而天下之人愈不敢議以至於魚爛河决而後巳焉此則安石所以遺禍之本而閑樂亦未之言也若閑樂之論祖宗法度但當謹守而不可變尤爲痛切是固然矣然祖宗之所以爲法蓋亦因事制宜以趨一時之便而其仰循前代俯狥流俗者尚多有之未必皆其竭心思法聖智以遺子孫而欲其萬世守之者也是以行之旣久而不能無弊則變而通之是乃後人之責故慶曆之􅀄杜范韓富諸公變之不遂而論者至今以爲恨况其後此又數十年其弊固當益甚於前而當時議者亦多以爲當變如吕正獻公父子家傳及河南程氏眉山蘇氏之書蓋皆可考雖閑樂此論若有不同而不免亦有仁皇之末適當因革之時之􅀃則是安石之變法固不可謂非其時而其設心亦未爲失其正也但以其躁率任意而不能熟講精思以爲百全無弊可久之計是以天下之民不以爲便而一時元臣故老賢士大夫羣起而力争之者乃或未能究其利病之實至其所以爲􅀃又多出於安石規模之下由是安石之心愈益自信以爲天下之人眞莫巳􅀂而隂幸其言之不足爲巳病因遂肆其狠愎倒行逆施固不復可望其能勝已􅀻以求利病之實而充其平日所以自任之本心矣此新法之禍所以卒至於横流而不可救閑樂雖能深斥其非而未察其所以爲非者乃由於此此其爲說所以不能使人無所恨者一也至謂安石逺取三代􅄅茫不可稽考之事而力行之此又不知三代之政布在方册雖時有先後而道無古今舉而行之正不能無望於後之君子但其名實之辨本末之序緩急之宜則有不可以毫釐差者苟能於此察焉而無所悖則其遺法雖若􅄅茫不可稽考然神而明之在我而巳何不可行之有彼安石之所謂周禮乃姑取其附於巳意者而借其名高以服衆口耳豈眞有意於古者哉若眞有意於古則格君之本親賢之務養民之政善俗之方凡古之所謂當先而宜急者􅂚爲不少留意而獨於財利兵刑爲汲汲耶大本不正名是實非先後之宜又皆倒置以是稽古徒益亂耳豈專􅄅茫不可稽考之罪哉閑樂不察乎此而斷然自畫直以三代之法爲不可行又獨指其􅄅茫不可稽考者而譏之此又使人不能無恨者二也若安石之廢春秋語北靣則亦其志識過髙而不能窮理勝􅀻之弊是以厭三傳凡例條目之煩惡諸儒臆度附致之巧有太過者而不思其大倫大法固有炳如日星而不可誣者也因前聖尊師重道之意以推武王太公之事有太過者而所以考其禮之文者有未詳也是其闕於審重而輕爲論􅀃直廢大典固爲可罪然謂其因此而亂君臣之名分又并與孟子迭爲賔主之􅀃而非之則亦峻文深詆而矯枉過直矣此又其使人不能無恨者三也若夫道德性命之與刑名度數則其精粗本末雖若有間然其相爲表裏如影隨形則又不可得而分别也今謂安石之學獨有得於刑名度數而道德性命則爲有所不足是不知其於此即有不足則於彼也亦將何自而得其正耶夫以佛老之言爲妙道而謂禮法事變爲粗迹此正王氏之深蔽今欲譏之而不免反墮其說之中則巳誤矣又况其於粗迹之謬可指而言者蓋亦不可勝數政恐未可輕以有得許之也今姑舉其一二而言之若其實有得於刑名度數也則其所以脩於身者豈至於與僧卧地而顧客褫衣如錢景諶之所叙乎所以著于篇者豈至於分文析字以爲學而又不能辯乎六書之法如字􅀃之書乎了翁以爲安石之進字說蓋欲布之海内神考雖好其書玩味不忘而不以布於海内者以教化之本不在是也此亦非是夫周禮六藝之教所謂書者不過使人以六書之法分别天下之書文而知此字之聲形爲如何欲其逺近齊同而不亂耳非有眞空無相無作之說也安石旣廢其五法而專以㑹意爲言有所不通則遂旁取後来書傳一時偶然之語以爲證至其甚也則又逺引老佛之言前世中國所未嘗有者而說合之其穿鑿舛繆顯然之迹如此豈但不知性命道德之本而亦豈可謂其有得於刑名度數之末哉不唯以此自誤又以其說上惑人主使其玩味於此而不忘其罪爲大了翁之言盖亦踈矣所以施於家者豈至於使其妻窮奢極侈斥逐娣姒而詬叱官吏如林希魏㤗之所書豈至於使其子囚首跣足箕踞於前而干預國政如邵伯温之所記乎所以施於政者豈至於乖事理咈民情而於當世禮樂文章教化之本或有失其道理者乃不能一有所正至其小者如䳺鶉公事按問條法亦皆繆戾煩碎而不即於人心乎以此等而推之則如閑樂之所云亦恐其未免於過予而其所以不能使人無可恨者四也若其釋經之病則亦以自處太髙而不能明理勝􅀻之故故於聖賢之言既不能虚心静慮以求其立言之本意於諸儒之同異又不能反復詳宻以辨其爲􅀃之是非但以巳意穿鑿附麗極其力之所通而肆爲支蔓浮虗之說至於天命人心日用事物之所以然既巳不能反求諸身以驗其實則一切舉而歸之於佛老及論先王之政則又騁􅀻意飾姦言以爲違衆自用剥民興利斥逐忠賢杜塞公論之地唯其意有所忽而不以爲事者則或苟因舊說而不暇擇其是非也閑樂於此乃不責其違本㫖棄舊􅀃惑異教文姦言之罪而徒譏其奥義多出鄭孔意若反病其不能盡黜先儒之􅀃以自爲一家之言者則又不能使人無恨者五也夫安石以其學術之誤敗國殄民至於如此而起自熈豐訖于宣靖六十年間誦􅀃推明按爲國是鄙儒俗生隨風而靡者既無足道有識之士則孰有不寒心者顧以姦賊蔽􅀩禁網嚴宻是以飲氣吞聲莫敢指議獨兩陳公乃能出死力以排之其於平居書䟽還徃講論切磨唯恐其言之不盡斯亦可謂賢矣然其所以爲􅀃者不過如此豈其所以爲學者亦自未得聖賢之門戸所以觀理制事者猶未免於有蔽而然耶故嘗歷考一時諸賢之論以求至當則唯􅀛山楊氏指其離内外判心迹使道常無用於天下而經世之務皆􅀻智之鑿者最爲近之其論紹述而以爲當師其意不當泥其迹者亦能曲盡其理之當而無回互之失見􅀛山語録因鄒道郷之論而發者雖元城劉公所謂只宗神考者有所不逮劉公語見韓瓘談録不但兩陳公而巳也然及其請罷廟學配食之章則又不能如其平日之言以正其罪顧乃屑屑焉偏指鳬鷖一義以爲寔奢汰之原此爲􅀗殺人于貨之盗而議其竊鈎之罪對放飯流歠之客而議其齒决之非視兩陳公之言乃反有不能及者是以至今又幾百年而其是非之原終未明白徃者雖不足論而來者之監亦學者之所不可不知也故􅀼并著其􅀃以俟同志講而擇焉巳未八月因爲精舎諸生說偶記莊生語云其所謂道非道則所言之韙不免於非此正王氏之謂也後兩日有語予曰荆公正坐爲一道德所誤耳予謂之曰一道德者先王之政非王氏之􅀻􅀃也子何病焉若道此語於荆公之前彼不過相視一􅀏而言曰正爲公不識道德耳吾恐子之將無詞以對也兩轉語偶與前說相似故筆其後云讀蘇氏紀年程弟􅁢夫雅好蘇學蓋嘗以講於余而終不能無異同之論故其爲此書也用心甚苦而獨不以見視比其既没乃得見之則有甚陋而可愧者恨不及與之反復其說也姑掇其尤者一二論之以爲死者有知尚當有以識余之意爾蘇黃門言吾暮年於義理無所不通蓋悟孔子一以貫之之㫖又曰夫子之道一以貫之惟一爲能萬變而不窮故諸弟子之問或仁或孝或從政或事君所問不同而夫子答之亦無窮者一以貫之故也然夫子不以一貫者告人何哉夫子中道而立彼由此而悟如顔子者其所得亦不過於問仁問爲􅀖爾而終與聖人交臂其它雖未大有所得苟日從事於仁孝從政事君之間亦不失爲士君子故曰下學而上逹蓋其所學者此而其所達者亦此非有二也衆人未逹疑夫學之外别有形而上者故曰夫子之不可及也猶天之不可階而升也夫子之道豈果􅀂豋天之難哉又曰君子之教人不可以同科也譬諸草木大者使之遂其大小者使之成其小區别使各極其分量斯足矣故中人以下姑使之從事於洒掃應對進退可也苟比其大小而同乎一科使學者躐等以爲進相誣以爲高豈善教者哉􅀂乃聖人則其開端便自逺大及其至也亦不過是而巳故曰有始有卒者其唯聖人乎有始有卒非自始以至終言唯聖人然後能始終一致也古史曰善乎子夏之教人也始於洒掃應對進退而不急於道使其來者自盡於學日引月長而道自至故曰百工居肆以成其事君子學以致其道譬如農夫之殖草木既爲之區漑種而時耨之風雨旣至大小􅅴苦莫不咸得其性而農夫無所用巧也孔子曰君子上逹小人下逹逹之有上下出乎其人而非教者之力也異哉今世之教者聞道不明而急於夸世非性命道德不出於口雖禮樂政刑有所不言矣而况於洒掃應對進退也哉教者未必知而學者未必信務爲大言以相欺天下之僞自是而起此子夏所謂誣也又曰公言每夜熟寐至五鼓􅀄即􅄃衣起坐此即所謂天下何思何慮之時也蓋天下本自無思慮但人不具此眼目不能識之爾太史曰道有不可以名言者古之聖人命之曰一􅀉之曰中舜之禪禹曰人心惟危道心惟㣲惟精惟一允執厥中聖人之欲以道相詔者至於一與中盡矣昔者孔子與諸弟子言無所不至然而未嘗及此也蓋嘗與子貢言之矣曰賜也汝以予爲多學而識之者歟曰然非歟曰非也予一以貫之雖與子貢言之而孔子之言之也難而子貢之受之也未信至於曾子不然孔子曰參乎吾道一以貫之曾子曰唯曽子出門人問曽子曰夫子之道忠恕而巳矣蓋孔子之告之也不疑而曽子之受之也不惑則與子貢異矣然曾子以一爲忠恕則知門人之不足告也夫及孔子旣沒曽子傳之子思子思因其􅀃而廣之曰喜怒哀樂之未發謂之中發而皆中節謂之和中者天下之大本也和者天下之逹道也致中和天地位焉萬物育焉子思之說旣出而天下始知一之與中在是矣然子思以授孟子孟子又推之以爲性善之論性善之論出而一與中始枝矣烏乎孔子之所以不告諸弟子者蓋爲是歟前兩叚紀年所載皆其門人所記語意闕略恐於蘇公之言有不能無失者不足以極余之辨故考諸古史以足之如此云聖人之所謂道者天而巳矣天大無外造化發育皆在其間運轉流行無少間息雖其形象變化有萬不同然其爲理一而巳矣聖人生知安行與天同德其於天下之理幽明巨細固無一物之不知而日用之間應事接物動容周旋又無一理之不當然非物物而思之事事而勉之也故曰吾道一以貫之固非塊然以守一物於象罔之間如所謂五鼓振衣何思何慮者遂指以爲妙道之極而隂祕藏之不以告人而時岀其餘以愚學者之未逹使姑爲善人君子而已也然夫子之告子貢蓋以知而言其告曾子則以行而論至於夫子言之之難易二子聞之之得失則古史之言雖若近之然謂曽子以門人不足告而姑以忠恕爲言則是不知忠恕之相爲體用正所以明夫一貫之實矣至於㳺夏之論洒掃應對之云云者乃謂小子之學所當由此而漸進非謂一告以此而遂一􅃪其所爲終身無復有所告語也觀夫子之與顔淵言至于終日而淵歎之以爲善誘循循愽文約禮則聖人之所以教人有始有卒蓋亦可見但不躐等而巳今曰教不可以同科姑使之從事於此而教者遂不復有所與則固昧於教學之序又謂顔子平生所問止於論語所記爲仁爲􅀖之二條則其考之又可謂不詳矣夫子之言下學而上逹正謂下學於人事之卑近而上逹於天理之精㣲爾今曰所學者此而其所達者亦此則是終身下學而未嘗上逹也又以子貢爲未達而疑夫學之外别有形而上者以病其猶天不可階之言則夫形而上下者雖不可以二物言然謂學之外别無形而上者則是但有事而無理但有下學而無可上逹也雖曰人皆可以爲堯舜然謂其必可至而無難則是顔子末由也巳之歎孟子大而化之之語皆爲未達也其言不急於道而待其自至如農夫區種而無所用巧皆非是獨其譏當世言道之失蓋指王氏而言則爲近之然所謂道者巳亦莫之識而未免於誣也蓋王氏之誣人以其言者誣之也蘇氏之誣人以其不言者誣之也二者雖殊其失則均矣凡此皆其學之所不及而妄言之故其失如此至於天下何思何慮正謂雖萬變之紛紜而所以應之各有定理不假思慮而知也今以中夜起坐斯湏之頃當之則是日出事生之後此何思何慮者遂爲閑廢之物而無所用矣彼所謂得一貫之㫖者殆不過此豈不陋哉古史所引舜禹授受之言亦非本義蓋惟精惟一􅁢執厥中亦言精一别於人心道心之間而守其道心始終不貳則其所行自無過不及而合中道耳非以一名道而􅀉之於中也又謂孟子爲性善之論而一與中始枝尤爲謬妄今未暇辨後章詳之記易誤否之匪人近見一􅀃謂不當有之匪人三字蓋由比之匪人而誤若以音言則比自去聲否自上聲字義巳不同􅀂以義言則比之匪人爲所附非其人否之匪人爲否塞非人道語脉又不同决是衍字其􅂏傳之文遂亦因之而誤如坎􅁚之樽酒簋簋下復因誤讀而加貳字也不記是何人􅀃姑記於此云記永嘉儀禮誤字儀禮人所罕讀難得善本而鄭注賈䟽之外先儒舊說多不復見陸氏釋文亦甚䟽略近世永嘉張淳忠甫校定印本又爲一書以識其誤號爲精宻然亦不能無舛謬若其經首冠以鄭氏目録而其開卷第一板士冠禮篇中第三行即云主人玄冠朝服則是於天子諸侯之士朝服皮弁素積此諸侯二字按賈䟽所載本在天子字上而爲句絶自釋文所引誤倒其文而此本因之遂無文理不復可讀蓋日視朝之服天子皮弁而諸侯朝服君臣同之故鄭氏之意以爲此主人玄冠朝服則是諸侯之士若天子之士則當服皮弁素積與此不同耳今釋文既誤倒之張本又襲其誤而不能正則未知其讀之如何而爲句又如何而爲􅀃也又少牢饋食禮日用丁巳乃戊巳之巳故注云取其令名自丁寧自變改蓋本說文改字從巳從支爲巳有過支之則改之義而下條之注又云不得丁亥則己亥亦可用其理甚明而諸本或冩巳爲辰巳之巳釋文遂以祀音張氏亦不能􅁴其誤也其尤甚者則如郷射篇横而奉之奉或誤寫作拳而釋文遂以權音毎讀令人不􅁴失􅀏張亦不能正而曲從之推此而言則其它舛謬計必尚多病倦不暇細考姑記此三條以告觀者耳蜀中石本􅀹多誤於此巳字三四乃鑱㓕其上體豈亦疑之而未知所决耶記郷射疑誤郷射篇若無大夫則唯賔而注云長一人舉觶如燕禮媵爵之爲者余始讀此嘗疑長一人舉觶五字本是經文而印本誤入注中既而考之凡舉觶皆卑且少者爲之非賔長之事故此乃主人之贊者二人舉觶于賔及大夫若無大夫則於二人長㓜之中但選一人使之舉觶于賔而非反使賔長自舉觶也至考燕禮小臣請媵爵者而公命長注云長謂選卿大夫中長㓜可使者於是又見長字之義至小臣作下大夫二人媵爵又請致者而公命皆致則序進又知其或命長則但以一人媵爵如此篇之長一人以舉觶于賔乃注文所引之明證但其詞大畧有以致讀者之疑耳昔邢子才不喜校書而曰日思其誤更是一適劉斯立猶深病之况此書不誤而人自誤反謂書誤而欲妄下雌黄於其間其得罪於信古闕疑之君子當如何耶因感其事又恐後之讀者亦或如余之誤遂書以識云記程門諸子論學同異熹讀程門諸子之書見其所論爲學之方有不同者因以程子之言質之而􅀼記之如左胡氏曰物物致察宛轉歸巳楊氏曰物不可勝窮也反身而誠則舉天下之物在我矣程子曰所謂窮理者非必盡窮天下之物又非只窮一物而衆理皆通但要積累多後脫然有貫通處又曰物我一理才明彼即曉此不必言因見物而反求諸身也然語其大至天地之所以高厚語其小至一物之所以然學者皆當理㑹胡氏曰只於巳發處用功􅁍不枉費心力楊氏曰未發之際以心體之則中之體自見執而勿失無人欲之􅀻焉發必中節矣程子曰思於未發之前求中即是巳發但言存飬於未發之時則可惟􅆂飬久則喜怒哀樂之發自中節矣又曰學者莫若先理㑹敬能敬則自知此矣謝氏曰明道先生先使學者有所知識却從敬入又曰既有知識窮得物理却從敬上􅆂養出來自然是别正容謹節外靣威儀非禮之本尹氏曰先生教人只是專令用敬以直内習之既久自然有所得也程子曰入道莫如敬未有能致知而不在敬者又曰動容貌整思慮則自然生敬存此久之則自然天理明又曰􅆂飬須用敬進學則在致知又曰敬只是􅆂飬一事必有事焉須當集義只知用敬不知集義却是都無事也右諸􅀃之不同者以程子之言質之唯尹氏之言爲近所少者致知集義之功耳不知其言之序有未及耶抑其意果盡於此也然大本旣立則亦不患無地以崇其德矣故愚於此竊願盡心焉因書其後以自詔云記謝上蔡論語疑義學而時習之學是前一叚事旣學矣又能時習所以恱也上蔡􅀃得習字好然少發明學字之意似無來歴耳恱乃習之之熟義理油然而生處上蔡但云如此則德聚語亦未瑩有朋自逺方來觀聖人立言正意止爲朋友講習上蔡所推似亦太逺人不知而不愠學固非欲人知亦非有意欲人不知是以人知之不加喜人不知不加愠此聖門所發義理之正也老氏知我者希則我貴矣此異端自􅀻之見與聖門氣象逈然不同上蔡引之似未察也又云自待者厚亦是語病按此章惟伊川先生之說語約而味長最得聖人本意其次似皆不若尹和靖如上蔡之說非不竒偉然多過中少餘味矣其爲人也孝弟仁至難言故聖賢之言或指其方或語其用未嘗直指其體而名言之也上蔡云古人語仁多矣然終非仁也又云孝弟可以論仁而孝弟非仁也正欲發明此意然不􅁴乗快一向􅀃開了至於其間界分脉絡自有相管攝聮屬處却不曽分明爲人指出故讀之者只見曠蕩無可撈摸便更向别處走此其立言之病也又云人心之不僞者莫如事親從兄以是心而充之則無適而非仁矣此語亦皆未安蓋性之所有而根於心者莫非眞實不但孝弟爲不僞也但孝弟乃人心之不可巳者所􅀤最親切所繫最重大故行仁之道必自此始非謂充擴孝弟可以求仁也此章之義恐只當從伊川􅀃巧言令色言自巧色自令不害其爲仁好其言令其色便是不仁矣云豈以此爲不仁立語恐未安道千乗之國學者專爲記誦之學而不知所用固不可然遂以爲不待讀書而􅃍以政學則􅀹不可大抵脩身齊家治國平天下皆學者分内事而其先後固有序矣讀書求義理乃格物致知之事所以發明正心誠意之端也學者不本於此乃欲責成於人民社稷之間求其必當於理而無悖吾見其難矣且天下國家雖有大小之殊然聖人於此亦各止其所焉非有所爲而爲之也上蔡云古人得百里之地而君之皆能以朝諸侯有天下則千乗之國亦可見其用心矣此似以爲朝諸侯有天下之故而用心於千乗之國之意恐亦有病弟子入則孝此章指人以所向之方使學者知所先後而巳未遽及盡孝弟察人倫也大抵上蔡氣象宏闊所見髙明微有不屑卑近之意故其􅀃必至此然後巳亦一病也賢賢易色雖曰未學乃假設之辭非指一人而言今直以大舜生知人倫之至言之却似執文害義也且聖賢之語隨其淺深各有至理亦不必湏一槩􅀃到聖人地位也主忠信此一節皆學者之事主忠信蓋見此實理而不敢違之謂􅃍以黙而成之不言而信釋之似亦太高矣禮之用和爲貴殆不若夷俟踞肆之愈此語欲有所矯而不知其過於正患不知人知人者爲大乎人知者爲大乎此又渉乎知我希自待厚之􅀻矣近世學者蓋有未少有得而俯視等夷者豈非此語之流生禍哉上蔡於公冶長序篇論知人處甚佳此章却有病上蔡語中諸如此􅀋甚多此據鄙見論其􅀹甚者耳後篇隨看抄岀幾於叚叚有可疑處不欲盡寫呈大槩亦只是一種病即此亦可以見其餘也近看諸􅀃惟伊川所觧語意􅆂滀㫖味無窮其次尹氏守得定不走作所少者精神耳夫以上蔡高明之見在程門蓋鮮儷焉而其立言不滿人意處尚如此况其餘哉然則吾屬於此亦可以深自警矣記疑偶得雜書一編不知何人所記意其或岀於吾黨而於鄙意不能無所疑也懼其流傳久逺上累師門因竊識之以俟君子考焉淳熈丙申三月乙􅆗先生言於上曰先聖後聖若合符節非傳聖人之道傳聖人之心也非傳聖人之心也傳巳之心也巳之心無異聖人之心廣大無垠萬善皆備欲傳聖人之道擴充此心焉耳愚謂此言務爲高逺而實無用力之地聖賢所以告其君者似不如是也夫學聖人之道乃能知聖人之心知聖人之心以治其心而至於與聖人之心無以異焉是乃所謂傳心者也豈曰不傳其道而傳其心不傳其心而傳巳之心哉且旣曰巳之心矣則又何傳之有况不本於講明存養之漸而直以擴充為言則亦將以何者爲心之正而擴充之耶夫進言於君而其虚夸不實如此是不惟不能有所禆􅀘而適所以啓其談空自聖之弊後之學者尤不可以不戒也某􅀄見先生即誨之曰人之所以靈於萬物者何也謂之心如何是心謂之性如何是性宜思之愚謂此固窮理之事然非所以語初學者某問楊文靖公云聞之伊川不偏之謂中不易之謂庸如何先生曰是非先生之言不然則􅀄年之􅀃也昔伊川親批吕與叔中庸說曰不倚之謂中其言未瑩吾親問伊川伊川曰中無􅀝著某未逹先生曰若􅀃不􅀝須是有四旁方言不􅀝得不􅀝者中立不􅀝也愚謂不偏者明道體之自然即無所􅀝著之意也不􅀝則以人而言乃見其不􅀝於物耳故程子以不偏名中而謂不􅀝者爲未瑩今以不􅀝者之未瑩乃欲舉不偏者而廢之其亦誤矣問要看喜怒哀樂未發才看便是巳發如何見得中曰且只静觀愚謂此問甚切惜乎答之不善也蓋曰静觀則固爲巳發而且與之爲二矣程子使人􅆂飬於未發之前而不使人求中於其間其㫖深矣問伊川先生答鮮于侁之問曰􅀂顔子而樂道則不足爲顔子如何曰心上一毫不留􅀂有心樂道即有著矣愚按程子之言但謂聖賢之心與道爲一故無適而不樂􅀂以道爲一物而樂之則心與道二而非􅀁以爲顔子耳某子之云乃老佛緒餘非程子之本意也自得處豈得分毫進􅀂見則便見明道云才􅀃明日便是悠悠學者拈起一處思量須是要便見􅀂悠悠即玩矣􅀂未有見又且放過愚謂學固欲其自得而自得誠不可以分毫論然欲其自得則必其積累漸漬然後有以浹洽而貫通焉爾孟子􅀁謂􅀷造之以道者此也今欲自得而責其便見則無乃狂躁急迫之甚且未知其􅀁見者又果何事也耶程子之言乃因學如不及而言初不爲見處發也又曰􅀂未有見又且放過則其進退遲速無􅀁據矣其誤後學亦甚矣哉到恍然神悟處不是智力求底道理學者安能免得不用力恍然神悟乃異學之語儒者則惟有窮理之功積習之久觸􅀋貫通而黙有以自信耳問未見天下歸仁且非禮勿視聴言動當自有見否曰固是然要便見天下歸仁進學在致知􅆂飬在敬不可偏廢愚按天下歸仁程子述孔顔之意亦曰天下皆􅁛其仁而巳乃謂躬行實履之效非語其見處也必􅀂以見處言則如問者之言猶爲未逺而所謂湏要便見者則其狂躁而迫切也甚矣進學􅉼飬乃程子語然程子所謂致知正欲其即事窮理而積累貫通非欲其恍然神悟而便見天下歸仁也問思慮紛擾如何曰人心本無思慮多是憶旣徃與未來事愚謂心之有思乃體之有用所以知來藏徃周流貫徹而無一物之不該也但能敬以操之則常得其正而無紛擾之患今患其紛擾而告以本無則固不盡乎心之體用且夫本無之說又惡能止其紛擾之巳然哉問浩然之氣塞乎天地之間曰孟子且如此􅀃耳論其洞達無間又豈止塞乎天地而巳哉愚嘗􅀷患近世學者躐等之弊發言立論不問其理之當否而惟恐其說之不高今讀此書乃知前軰之言旣有以啓之者矣飬氣之􅀃學者且當熟講其方而實用力焉至於事皆合義而無不歉於心則是氣浩然充塞天地盖不待言而自喻矣今不論此而遽爲浩蕩無涯之􅀃以求出乎孟子之上其欺巳而誣人亦甚矣哉知性即明死生之說性猶水也愚謂性即理也其目則仁義禮智是巳今不察此而曰知性即明死生之說是以性爲一物而往來岀没乎生死之間也非釋氏之意而何哉某問如何是萬物皆備於我先生正容曰萬物皆備於我某言下有省愚觀古今聖賢問答之詞未有如此之例其學者亦未有如此􅃍有得者此皆習聞近世禪學之風而慕效之不自知其相率而陷於自欺也學者須是下學而上達云云愚謂此理固然然未嘗告以下學之方而遽爲此說便有使人躐等欲速而不安於下學之意某人自言初疑逝者如斯夫每見先逹必問人皆有說以相告及問先生則曰􅀂說與公只說得我底公却自無􅀁得某遂心服一二年間才見即問先生但曰理是如此其後某人有詩云云至此方有􅀁得愚謂川上之歎聖人有感於道體之無窮而語之以勉人使汲汲於進學耳然先儒不明其􅀁感之意故程子特發明之而不暇及乎其他傳者不􅀷考遂以聖人此言專爲指示道體而發則巳誤矣今􅀂以其正而言之則問者本無可疑而告者但當告以汲汲進學之意􅀂循其誤而言之則學者毎見必問才見即問其躐等甚矣告者乃不之抑而反引之於恍惚不可測知之境其凌節亦甚矣且某人者自謂有得而􅀁爲詩語乃老佛陳腐之常談而巳惡在其有得耶或問儒佛同異先生曰公本來處還有儒佛否愚謂天命之性固未嘗有儒也然儒佛是非之理則巳具矣必以未嘗有者爲言則奚獨儒佛也固亦未嘗有堯桀也然堯之所以爲堯桀之所以爲桀則豈可以莫之辨哉今某子之言乃如此是欲以夫本來無有者混儒佛而一之也此禪學末流􅁋遁之常談俗學之士從風而靡有不足恠獨某子自謂親承有道而立言如此則爲不可解耳或問立則見其參於前在輿則見其􅀝於衡先生曰參前􅀝衡非有物也謂之無則不可某人亦有詩云參􅀝前衡豈易陳只今便了乃相親昔人求劒尋舟跡大似子張書在紳愚謂孔子答子張以忠信篤敬而有參前倚衡之說盖欲其力行二語造次不忘􅀂曰坐見於墻食見於􅃵云耳而近世說者展轉恠妄至於如此亦可歎巳且其所謂只今便了乃相親者竊取異學鄙俚之常談可羞甚矣乃敢下視前賢肆其譏侮不亦無忌憚之甚哉或云天下歸仁只是物物皆歸吾仁先生指䆫問曰此還歸仁否或人黙然某人有詩云大海因風起萬漚形軀雖異暗周流風漚未狀端何􅀂此處應湏要徹頭愚按天下歸仁說巳見前今且以所謂物物皆歸吾仁者論之則指牎之問亦應之曰此若不歸吾仁則必無故而􅆷敗之矣大凢義理莫不如此皆有體驗之實若但如此詩之說則近世禪學之下者􅀋能言之豈孔顔所以相傳之實學哉顔子聞天下歸仁又問克巳之目請事斯語所以㳺泳此理也愚謂天下歸仁者克巳之效問目請事乃其用功之實也某子之言失其序矣問盡心知性知天是知之存心飬性事天是飬之先生曰不然昔嘗問伊川造得到後還要􅆂飬否伊川曰造得到後更說甚􅆂飬盡心知性知之至也知之至則心即性性即天天即性性即心所以生天生地此言天之形體化育萬物其次則欲存心飬性以事天愚按問者之言於孟子之文義得之矣某子所引程子之言乃聖人之事非爲衆人設也程子所謂造得到者正謂足目俱到無所不盡耳而某子乃獨以知之爲說而又通之衆人豈其本發問之時所謂造得到者巳如今之所謂而程子不之察耶􅀂使程子於此如孔子於子張之問達也則所以吿之者必不然矣又云心即性性即天天即性性即心此語亦無倫理且天地乃本有之物非心所能生也􅀂曰心能生天之形體是乃釋氏想澄成國􅁟之餘論張子嘗力排之矣先生之門人甲有詩云誰道堅髙不易知生來頃刻未嘗離乙答之云􅀂道堅髙不易知湏知此語已成非饒君向此知端的未免猶爲我與伊先生以乙之言爲是愚按堅髙云者顔子形容夫子之道不易窺測之辭爾非有一物頑然而堅嶢然而髙也今甲巳失之而乙又甚焉且皆儇淺無稽絶不􅀋儒者氣􅁚某子乃不以甲爲非而又以乙爲是亦不可曉也已晦庵先生朱文公文集卷第七十懐安縣儒學訓導葉暢校
