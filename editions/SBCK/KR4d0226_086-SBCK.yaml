body:
  text: 祝文行郷飲酒禮告先聖文一昨朝廷舉行鄉飲酒之禮而縣之有司奉行不謹容節謬亂儀矩闕踈甚不足以稱明天子舉遺興禮之意今者賔興有日熹謹與諸生考恊禮文推闡聖制周旋揖遜一如舊章即事之􅀄敢以舎菜之禮謹修䖍告經史閣上梁告先聖文書樓之役工告僝功䖍舉脩梁卜日惟謹敢以釋菜之禮告于先聖先師至聖文宣王惟先聖先師啓迪衆志􅂌以有成謹告告護學祠文書樓之役工告僝功䖍舉脩梁卜日惟謹是用告于爾神惟爾有神尚祐衆心以相兹事奉安蘇丞相祠告先聖文故相蘇公頌同安人也其道學淵深􅂂行純固天下學士大夫之所宗仰而邑于後生聞見單淺弗克䆒知父兄閔焉用告有司請即學宫􅀊時奉祠以建遺烈使學者有所興起今旣畢事將妥厥靈敢以舎菜之禮告于先聖先師之神謹告屏弟子貟告先聖文熹不肖昨以布衣諸生推擇爲此縣吏而得參聽其學事而行能寡薄治教不孚所領弟子貟有某某者乃爲􅁋慝之行以溷有司熹竊自惟身不行道無以率礪其人使至扵此又不能蚤正刑辟以彈治之則是徳刑两弛而士之不率者終無禁也是故告于先聖先師請正學則恥以明刑夫扑作敎刑而二物以収其威固先聖先師學校之政所以遺後世法也唯先聖先師臨之在上熹敢不拜手稽首奉安蘇丞相祠文泉人衣冠之盛自國􅀄以至于今其間顯人或至公卿者多矣然而終始大節可考而知則未有􅀂公之盛者也惟公著節扵熈寜登庸扵元祐而幅巾謝事偃仰婆娑扵紹聖元符之間然則公之所自任扵進退出處之間者可謂無􅀁苟矣是蓋將比古之所謂大臣者豈獨泉人數公而已哉今以邑人之意祠公扵學即事之始敢布其􅂨尚饗奉安蘇丞相􅀞像文惟公始終一節出入五朝高風聳乎士林盛烈銘于勲府矧兹故邑實仰餘光悵親炙之無從冀瞻依之有地是用省徳儀扵廟院建遺烈扵學宫營表方將儀圖聿至式瞻精字爰寓神棲旣恊吉扵靈辰敢式陳扵菲薦尚饗準赦謁諸廟文天子郊見上帝􅁵事告成還御路門班􅀕澤扵海内以爾神有功扵民載在祀典申詔有司以禮報􅀕臣某不佞奉承明詔敢不奉制幣㓗犧牲駿奔走以告祠下惟爾有神尚克膺天子丕顯休命尚饗請雨謁北山神文乃者邑民以􅀊事有謁于君侯君侯過恩賜之吉卜而許以来是故將有以塡撫綏寜之也民其敢不懽欣舞歌以樂神賜吏其敢不㓗齊芬苾以拜神休惟風雨水旱癘疫之不時以君侯之不顯威神是震是祓俾無災害則豈惟斯人專羙其賜吏亦與免扵曠弛之憂惟君侯之留意焉春祈謁廟文間者􅀊比不登民塡溝壑今幸改􅀊人得以修其畎畆農桑之務惟是雨暘以時俾無水旱螟螣之災則非人力之所能及惟君侯加惠之則幸矣某祗承祀典敢不齋粛明薦以獻以祈秋賽謁廟文今兹荐罹水旱之數宜不得下熟然頗有所収足以慰夫三農之心而供有司之賦者實神有以佑之也不然民飢而死吏之憂豈有所極哉仲冬之月祗循故事以告謝神不敢愛其㓗牲醴酒惟不足以答神之賜而豈敢有所祈辤先聖文熹祗服厥事于兹五年業荒行隳過咎日積雖逭厥罰􅂚慊于心辤吏告歸愧仰崇仞謹告南康謁先聖文熹蚤以諸生推擇爲吏中遭疾病即退丘園乃得其耕耨之餘日伏讀先聖先師之遺書夜思晝行不敢以昧陋自棄者二十餘年扵此矣誤􅂪聖恩假守兹郡懇辤不􅀗輿曵而来疇昔所聞庶幾小試而蒲桞之質衰不待年憒眊支離巳深不夢之歎大懼弗稱以辱君師祗事之􅀄敢以誠告惟先聖先師之靈實誘其􅂨使幸不獲罪扵其民而蚤遂歸田以終故業則熹不勝幸甚謹告白鹿洞成告先聖文維淳熈七年􅀊次庚子三月癸丑朔十八日庚午具位敢昭告于先聖至聖文宣王熹昨按國朝故事及郡圖經得白鹿洞之遺址扵城東北十五里盖唐李渤之􅀮居江南李氏因以爲國學及我太宗皇帝又嘗賜之書史以幸敎其學者而淪壊日乆莾爲丘墟因竊惟念幸以諸生得奉詔條顓以布宣敎化爲職顧弗此圖懼速譴戾乃議復立今幸訖功將率同志講學其間意庶㡬乎先聖先師之傳用以答揚太宗皇帝之光訓鼓篋之始敢率賔佐合師生恭脩釋菜之禮以見于先聖以先師兖國公先師鄒國公配尚饗白鹿洞成告先師文熹仰稽國典建此學宫鼔篋之􅀄恭脩釋菜之禮惟公發揚聖藴垂敎無窮敢率故常式陳明薦從祀配神尚饗鄒國公云惟公命世脩業克紹聖傳奉安濂溪先生祠文惟先生道學淵懿得傳於天上􅁇孔顔下啓程氏使當世學者得見聖賢千載之上如聞其聲如睹其容授受服行措諸事業傳諸永乆而不失其正其功烈之盛盖自孟氏以來未始有也熹欽誦遺編􅀗啓蒙吝兹焉試郡又得嗣守條敎扵百有二十餘年之後是用式嚴貌象作廟學宫并以明道先生程公伊川先生程公配神從享惟先生之靈實臨鑒之謹告謁故侍中太尉長沙陶威公祠文惟公忠順勤勞機神明鑒没而不朽食此江濆其亦有以相之使民安扵下官給扵上而熹也早得収其疾病之軀以幸免扵娑婆之嘆則公之賜大矣􅅃謁之􅀄敢以誠告謁李尚書劉屯田祠文熹猥承人乏假守玆邦祗事之􅀄以禮見于先聖先師而視其學則有公之遺祠在焉仰惟壯節高風夙所欽慕敢下再拜伏謁以致其高山景行之思惟公之靈尚克臨鑒謹告告熊孝子墓文維淳熈六年􅀊次巳亥五月戊午朔具位熹謹遣某致􅀕于唐故孝子冝春縣丞熊府君之墓熹叨􅀍誤恩假守兹土視事之始考諸圖經以求此􅀖前賢潜徳􅀮行之實扵建昌得陳太中大夫從事中郎二司馬君以及府君之事蓋皆以孝徳聞而府君精誠之感獨致涌水成川之應􅀻心􅀼敬仰焉然按圖以求其故迹則二司馬君之墓不可知而府君之墓宅學基猶有遺處謹命有司依凖赦令禁禦樵牧其唐朝旌表舊門亦巳復請于朝俟報脩立而先遣僚吏敬以酒肴之奠昭告此誠尚其英靈来鑒来享祭屯田劉居士墓文熹舊讀歐陽子廬山高之詩而仰公之名恨生遐僻不得一来仰其山之高而拜公之墓也兹誤上恩􅂌以郡紱至止之日望于四郊則山屹立千仭者故在而公之華屋山丘零落殆盡幾無迹之可㝷矣乃訪􅀖之􅂄老俊彦得公之墓扵城西荒􅈋廢圃之間其不爲耕耨之所及者蓋巳無㡬因復作爲門垣而亭以表焉又得嘉名扵寓士之賢者書而掲之以見公志庶㡬嗣而官扵是者有以謹其樵牧之禁東西行而過扵是者有以興起其剛毅廉退之心盖不惟有以少慰夙昔鄉徃之􅀻亦可以仰稱聖天子所以使之承流宣化之意也工告訖役一奠致誠公而有靈庶其鑒饗謹告奉安五賢祠文熹誤膺朝命来守是􅀖至止之􅀄得拜劉李二公之像扵學欽􅋍高風考觀正論旣有以慰夙心者旣又咨訪得陶公栗里故居扵郡境且知秘丞劉公蓋嘗禄扵筦庫而忠肅陳公又嘗辱爲遷民也永惟數公大節清名危言直道遺烈所在千載如生爰始爰謀合享斯室季月之吉神位告成敢合僚吏率諸生以禮告于祠下蘋藻在列誠意感通羣公有靈尚克歆顧謁廟文熹抱病田間不堪爲吏乆矣聖天子哀憐不忍終棄強􅂌符竹使爲此􅀖輿曵而来亦旣視事以衰眊罷軟之資當民貧財匱之際大懼曠闕無以克當明恩惟神受職明廷以食玆土其與命吏憂責惟均其亦有以相之使民安扵下官給扵上而熹也蚤得収其疾病之軀以歸老故丘則神之賜大矣欵謁之􅀄敢以誠告它不敢以有所祈謹告謁社稷文熹叨􅀍恩除假守兹土載惟社稷民命所依柢率故常按行封壝用嚴國典式對神休謹告廣佑廟祈雨文大王有功徳於此􅁟之人苟有雨􅊙之憂無不禱于大王其禱之也則無不昭答如影響之隨至斯民之心歸之如父毋信之如􅆱蔡者有年扵此矣間者上天降災陽􅄽隂伏嘉生百物不􅂪滋􅃳熹等乃大速亂于厥禱祠之事罔克專于大王懈堕弗䖍咎由熹等而使千里之民田疇涸枯禾稼稿悴今其甚者有􅀂燔灼矣雖並走羣望懇祈備至而雲氣將交旋即解駁焦然不能有膚寸之合秋陽益驕燥烈殊甚物之􅂪害日以益深􅀂自今以徃三日不雨則千里之民所恃以爲生者蕩析無餘而無以爲食其老弱將轉乎溝壑而死少壯者將散而爲盗賊以争其旦夕之命其禍亂之至豈有所極㢤失今不捄三日之後大王雖顧而哀之不可拯巳故熹等􅀻􅀼計議以爲莫􅀂奔走歸誠請命于大王之祠下大王􅀂哀其迫切赦其前愆有以惠緩之則三日之内熹等齊􅀫以俟休命三日而不應則是大王終棄絶之熹等退而恐懼以待誅殛不敢復進而禱矣恭惟大王闔闢造化一雨之恩蓋其餘事誠有意哀此千里之民則願無愛而亟爲之熹等之願也拜伏于庭不勝哀扣懇切之至謹告廣佑廟謝雨文天乆不雨苗之秀而將實者秋陽􅁀之日以憔悴田將無以爲収人將無以爲食大命近止罔或不憂我父子兄弟是用夙夜不遑啓居更相告語奔走羅拜于祠之庭而請命焉君王顧哀昭答如響禱之明日甘澤沛然晝雨宵零越五六日而未艾崗陵漸潤草木蕃滋孰是嘉生而不豐好徳宏施普恩大澤深夫豈可以言報顧無以自致其拳拳率脩故常祗薦蘋藻惟君王降佑歆享則斯人之願也豐利侯祈雨文熹多病不才濫尸郡􅀉修政不徳以干隂陽之和自秋以来天乆不雨早稻雖巳収成而晚田不免告病吁嗟之禱徧于群望而嘉澤未應風日益高氣日益寒雲旣合而復離禾旣秀而不能有以實也朝兢夕􅅥不遑啓居惟侯聦明乆食兹土雨暘之柄惟厥攸司日者雖巳致祠懼或不能蠲㓗以逹誠意欲躬走謁又恨符印之守不克以前謹遣某官奔告祠下而熹祗率僚吏拜送于門西望叩頭再拜以請惟侯哀矜賜之一雨以卒終􅀊之惠則豈惟吏之不良􅀗免於戾而􅀖人父子實蒙其休所以報事侯者其敢有􅈈也祈雨文間以旱災奉詔致禱閱月踰時雨不可得稻之早熟者什失八九而吏之所以爲禮樂與辤者亦旣竭矣欲取水湫淵詣祠祀而專力乎人事之備則又念夫稻有晚出而未就者不能無冀幸於萬一於是感歎憤激不能自巳躬詣靈液而冀于有神請復與神爲三日之期以聴休命惟神受職帝庭降食兹􅁟以福其人爲事今人之急如此神􅀂弗聞亦何神㢤􅀂三日不雨雨而不周且浹于四封惟天聦明吾恐神之不得安其室神尚聴之毋忽秋報祝文各有之各一本作國春禱秋報各有令典􅀊雖不登而有司不敢廢亦不敢以怠比者徧禱于神神非不加貺于民也直後時而􅀩休者淺爾爰陳嘉薦敬脩常事神其顧歆益惠我民祈晴文東土之民荐罹水旱其幸免於溝壑者指二麥以救朝夕之急而又相與戮力事農以冀有秋其得失之􅄸死生係之非常􅀊比也又今天雨不休湖水汎濫小麥之未収者亦旣折腐不得以食而新苗未立水没其㒹又將無復西成之望吏民憂懼術無所施惟神威靈作鎮茲圡其必以顧而哀之汛掃浮隂錫以晴霽則神之惠也民之幸也熹等濫將使指實分顧憂敢不齊祓再拜以請惟神鍳之謹告禹廟云王威神在天降食兹土謝晴文乃者以水潦之災有禱于神􅀩神之休開廓氛翳使麥収稻植人得逭其溝壑之憂旣有日矣熹等敢不躬拜祠下跪薦牲酒以答靈貺惟神歆顧終此大恩賚以豐年驅其厲􅀑俾我民復得以遂其有生之樂則神之賜於兹圡爲無窮其食於兹土爲無愧祈雨文吏旣不德無以媚于上下以召和氣而福斯人其所以布主恩救民命者罔不惟神之依故熹往者嘗輙有請於神而亦旣受其賜矣然方是時霖潦之災獨環越百里之間爲然若今之旱則自浙河以東爲州者七無不告病􅂢瘠之民凛然日有狼顧之憂乃不齊祓奔走以告于神其將安所歸命敢叩祠庭頓顙屏息以俟嘉應惟神幸哀憐之謹告漳州謁先聖文維紹興元年歳次庚戌四月甲申朔二十七日庚戌具位朱熹謹以清酌之奠敢昭告于先聖至聖文宣王熹緫髪聞道白首無成兹荷誤恩復叨郡􅀉涖事之始載見祠廷永念平生怛焉内疚尚蘄啓佑俾度其心毋悖所聞以速大戾謹告刋四經成告先聖文敢昭告于先聖至聖文宣王先師兖國公先師鄒國公熹恭惟六經大訓炳若日星垂世作程靡有終極不幸前遭秦火煨燼之厄後罹漢儒穿鑿之繆不惟㣲詞奥㫖莫得其傳至扵篇帙之次亦復殽亂遥遥千載莫覺莫悟惟易一經或嘗正定而熹不敏又嘗考之書詩而得其小序之失參稽本末皆有明驗私竊以爲不當引之以冠本經聖言之上是以不量鄙淺輙加緒正刋刻布流以曉當世上以具告熹病卧不能拜起謹遣從事敬奉其書以告于先聖先師之廷神靈如在尚鑒此心式相其行萬世幸甚謹告謁高東溪祠文惟先生剛方之操鯁切之言一視險夷至死不變所謂一世之偉人非獨一郷之善士也熹敬仰髙風爲日旣乆又幸嘗得執筆編列祠事而今日之來􅀗拜堂下則於隱忍回互之譏若有愧焉炷香酌酒歛祍陳詞伏惟先生之靈有以鑒之謹告又謁高東溪祠文謹以釋奠之明日致􅀕于東溪先生高公惟公志節堅高議論英發不容何病至死弗渝顧我顓􅀩舊勞嚮往肇玆明薦庶激懦貪謹告謁李龍學祠文紹興之初公在邇列力闢和議見忌權臣出守此􅀖治行亦著竟以􅂊口去郡臥家人懐其忠建此遺烈熹愚不肖􅀗奉餘規永惟先人實同聲氣載瞻劒履感􅁣増深敢薦馨香尚祈昭鑒謹告謁三賢祠文謹以釋奠之明日致􅀕于唐相國常公四門助教歐陽公高州刺史周公閩自唐世始有華風惟爾三賢實爲首倡稱思未泯延及于兹報事之䖍吏不敢廢謹告謁端明侍􅀰蔡忠惠公祠文惟公忠言惠政著自中朝筮仕之初嘗屈兹郡􅀊時雖乆稱思未忘厥有遺祠英靈如在熹雖不敏實仰髙風涖事之􅀄敬脩禮謁謹告謁崔統領祠文惟侯忠存報國勇不謀身厥有遺祠英靈如在我来伊始稽率故常敢薦肴觴用伸悼歎謹告謁諸廟文國家受天明命奄有萬方分職任功幽顯無間熹奉制􅃙來撫漳民永惟明靈實同憂􅀉涖事之始祗欵䘏祠敢竭愚􅂨與神爲誓修身奉法節用愛人熹雖至愚不敢不勉􅇌除疫癘時節雨􅊙非人所能是乃神職吏有不吏神得而誅神或不神則又奚咎肴羞在列馨香發聞惟神聦明鑒此心曲謁社禝文社禝之神實司民命故先王之法以民爲貴社禝次之而牧民者其重不得班焉肆我國家稽古立制使凡爲守令者始至則親謁于其祠所其所以愛民敬神之意厚矣熹恭承聖詔来守此􅀖式舉舊章尚祈昭鑒謹告凖即位赦祭神文新天子端命帝庭光臨大寳敷錫海内咸與惟新䖍命有司式稽舊典嶽祗川后若古帝王義士忠臣悉嚴祀事庶臣分土職在布宣奉醪羞致祠下惟神鑒格歆此德馨永佑我民以對休命謁修道州三先生祠文維紹熈五年􅀊次甲寅八月日謹遣學生迪功郎道州寜逺縣尉馮允中致􅀕于濂溪先生周公明道先生程公伊川先生程公於皇道體沕穆無窮羲農旣逺孔孟爲宗秦漢以還名崇實否文字所傳糟粕而巳大賢起之千載一逢兩程之緒自我周翁清瀟之原有嚴貌象欲覿無因徒有悵望吏以毀告閔然于􅂨出金少府往佐其功爰俾諸生敬陳一酹先生臨之有赫無昧尚饗修三閭忠㓗侯廟奉安祝文惟神爲國上謀遭䜛放逐行吟憔悴厥有離騷懐沙自沉勇赴茲水遺祠錫號帝有􅉖書吏惰不供神用弗宇乃今修奉亦旣訖功敢饌靈神敢陳椒醑惟神降鑒永奠厥居滄洲精舎告先聖文維紹熈五年􅀊次甲寅十有二月丁巳朔十有三日巳巳後學朱熹敢昭告于先聖至聖文宣王恭惟道統逺自羲軒集厥大成允屬元聖述古垂訓萬世作程三千其徒化若時雨維顔曾氏傳得其宗逮思及輿益以光大自時厥後口耳失眞千有餘年乃曰有繼周程授受萬理一原曰邵曰張爰及司馬學雖殊轍道則同歸俾我後人如夜復旦熹以凢陋少􅀩義方中靡常師晚逢有道載鑚載仰雖未有聞頼天之靈幸無失墜逮兹退老同好鼎來落此一丘群居伊始探原推本敢昩厥􅀄奠以告䖍尚其昭格陟降庭止惠我光明傳之方来永永無斁今以吉日謹率諸生恭修釋菜之禮以先師兖國公顔氏郕侯曾氏沂水侯孔氏鄒國公孟氏配濂溪周先生明道程先生伊川程先生康節邵先生橫渠張先生温國司馬文正公延平李先生從祀尚饗歸新安祭墓文一去郷井二十七年喬木興懐實勞夢想兹焉展掃悲悼増深所願宗盟共加嚴護神靈安止餘􅂟下流凡在雲仍畢霑玆䕃酒肴之奠惟告其􅂨精爽如存尚祈鑒享又􅀕告逺祖墓文維年月日逺孫熹謹率姪某姪孫某等以酒果告于逺祖二十一公制置府君祖妣杜氏夫人之墓惟昔顯祖作鎮玆􅀖開我後人載祀乆逺封塋所􅀉奉守弗䖍它人有之莫克伸理玆用震怛􅈼于有司郷評亦公遂復其舊伐石崇土俾後弗迷即事之􅀄敢謝其譴謹告焚黃文日者天子始見上帝於㤗壇頒慶宇内凡有列於朝者皆得追榮其先以廣孝治故我皇考班通九列而皇妣號比郡封聖澤所加幽顯咸頼熹愚不肖乆深不泊之悲祗奉制書徒切哀隕謹以清酌時羞㳙日以吿伏惟思靈對此休命謹告又焚黃文日者天子始郊頌慶宇内熹以職秩得從大夫之後故我亡室錫號有加恭奉制書俯仰悼歎惟爾有靈尚克嘉之謹告又焚黃文新天子端命帝廷欽承天序敷錫有位咸得追榮其先有司承詔遂以皇考贈中大夫之命来告于第慈顔永隔餘五十年祗對寵光感涕何極謹因祭􅀊恭奉制書拜手以告而熹不肖繼忝從班大饗之恩復􅈾錫命肆我皇妣爰及故嬪亦得扳聮並受祭澤􅁝綸異數行即薦陳尚期恩靈歆荷亡斁謹告又焚黃文恭惟先君天賦異質孝友之行足繼前修雅徤之文追古作者爵夀弗稱隕於半塗施及後人叨􅀍寵禄追榮七命始列從班而先夫人亦􅈾顯號厚德之報不在其兹並命帝廷璽封䨥檢賛辭褒異視昔有加唯是音容日荒日逺生我勞瘁追養靡從祗奉命書舎爵以告涕泗摧咽不知所云尚饗又焚黃文君以辛亥郊恩始受大夫妻之號及今饗賚予忝近列而君之號又躐進焉念昔相從惟艱惟悴君能勤力相我實多豈意莫年寵榮狎至君之季子亦􅀍賞延而君不少須是可悲巳奉奠致詔君其􅃪之尚饗又焚黃文熹頼遺訓竊位于朝􅀗􅀍慶恩追榮禰廟亦有年矣比以鉤黨廢錮憂畏過深以故及今始克祗奉命書以告于􅃦廟惟我皇考洞視今古靡有遺情陟降如存尚克歆此丕顯休命頋熹衰頽年迫告休使我皇考未躋極品而先夫人亦未克正小君之號流根之報無復後期永念及兹痛恨何極仰惟慈􅄻俯鑒愚􅂨尚啓後人不日昌大熹瞻望恩靈不勝感慕摧咽之至謹告贈官告皇考文往􅀊天子用事㤗壇上帝降歆福祚昭答慶賜之澤覃及萬方中外幽明罔不咸頼謂熹名秩有列内朝降以命書賁其禰廟顧念􅀌藐禄不逮親祗奉明恩益深哀慕兹用齋祓致誥寢庭欽惟神靈服此休顯熹雖不肖敢不敬恭惟孝惟忠無或荒墜嗣有褒賜尚克嘉之覆其後人延于永世第三男授官告家廟文熹前任煥章閣待制該遇明堂大禮赦恩奏􅀘第三男在巳􅀩聖恩授承務郎祗承先訓􅀩􅀍賞延餘慶所覃益深永慕遷居告家廟文熹罪戾不天㓜失所怙祗奉遺訓往依諸劉卜葬卜居亦旣累歳時移事改存沒未安乃眷此郷實亦皇考所嘗愛賞而欲卜居之地今旣定宅敢伸䖍告以安祖考之靈伏惟降鍳永奠厥居垂之子孫世萬無極致仕告家廟文維慶元五年歳次巳未六月辛酉朔孝孫具位熹敢因時享昭告于祖考之靈熹至愚不肖􅀩􅀍先世遺德􅀗祗祀事五十餘年歳時戰兢罔敢怠忽至于今兹行年七十衰病侵凌筋骸弛廢巳􅀩聖恩許令致事所有家政當傳子孫而嗣子旣亡藐􅀌孫鑑次當承緒於又年㓜未堪跪奠今巳定議屬之奉祀而使二子埜在相與佐之俟其成童加冠于首乃躬厥事異時朝廷察熹遺忠或有恩意亦令首及伏惟祖考擁佑頋歆永永亡斁熹不勝大願其諸家務亦當計度區處分属埜等及諸孫息使有分職以守門户尋别具告而施行之熹之衰病􅀔難支乆如以恩靈尚延喘息之間猶當黽勉提緫大綱不使荒頽以辱先訓伏惟祖考實鑒臨之謹告告考妣文孝子具位熹敢昭告于皇考太史吏部贈通議大夫府君皇妣孺人贈碩人祝氏熹不考􅀌露垂六十年不能以時考次先君行實以表于墓迹其所由雖實有待然而怠緩不䖍罪巳無所逃矣逮今晚暮衰病侵加改卜之謀始有定論乃克紬繹遺文􅀓之時事撰成行狀一通粗以發明先君立朝議論本末而皇妣德範梗槩亦以附書將以請銘于故相退􅀓益國周公庻幾有以闡揚潜懿昭示後来使子子孫孫􅂆忠勉孝以無忘考妣啓佑丁寜垂􅁉永乆之意繕冩旣成先事以告惟是荒塞之餘不無闕漏熹不勝悲切皇懼之至伏惟恩靈如在鍳此哀誠則熹不勝千萬幸甚謹告時􅀕祝文粤此季秋成物之始藐兹弱質維望以降胡江反永念劬勞莫伸報効昊天罔極悲慕何窮謹以云云􅀊􅀕祝文氣序流易􅀊律將更追逺感時不勝永慕謹以㓗牲剛鬛粢盛醴齊祗薦􅀊事以某人祔食尚享􅀕土地文敢昭告于土地之神仲秋之月萬寳將成􅀩神之休幸兹遣免式陳菲薦用以掲䖍尚其顧歆永垂庇祐又􅀕土地文熹窮年奔走兹復奠居老㓜無虞以及改􅀊繄神之頼報事敢愆尚其顧歆永垂覆祐謹告又􅀕土地文維此仲春􅀊功云始若時昭事敢有弗欽蘋藻雖㣲庶將誠意惟神􅁥享永奠厥居夏云仲夏應期時物暢茂秋云維此仲秋􅀊功將就若時報事冬云維此仲冬􅀊功告畢若時報事􅀊云􅀊律將更幸兹安吉若時報事改末句爲介以春祺又祭土地文春日載陽兹維仲月式陳明薦用格神休尚其頋歆俾我無斁氣序徂遷時維仲夏氣序徂遷仲秋戒秋冬序告中一陽来復墓􅀕文􅀊序流易雨露旣濡瞻省唐石改爲載念封塋不勝哀慕唐石改爲不勝載念謹用清酌時羞祗薦􅀊事唐石改爲薦其常事尚饗又墓祭文􅀊序流易雨露旣濡念爾音容永隔泉壌一觴之酹病不能親諒爾有知尚識予意后土祝文兹以暮春修祀先壠餘處改作按行丘壠惟神保祐樵牧不驚敢薦馨香式昭報事尚祈鑒享永頼無窮謹告又后土祝文玆以春餘有事先壠唐石等處改爲丘壠載惟保祐實頼神休式薦醪羞尚祈據饗延于永乆無有後艱謹告又謁李龍學祠文謹以釋奠之明日致􅀕于龍學侍郎李公惟此廟學實公所遷人到于今追頌勞烈矧惟忠慮抑有前聞薦此芳馨豈專報享謹告晦庵先生朱文公文集卷第八十六懐安縣儒學訓導葉暢校
