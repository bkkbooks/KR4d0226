body:
  text: 奏狀乞蠲减星子縣稅錢第二狀第一狀闕臣誤蒙聖恩竢辠偏壘自度庸愚無以􅀘報到任以來夙夜憂勞惟思所以上布聖恩下求民瘼仰副使令之萬一者竊見本軍諸縣大抵􅂽凉田野榛蕪人煙稀少而星子一縣爲尤甚因竊究其所以乃知日前兵亂流移民方復業而官吏節次増起稅額及和買折帛數目浩瀚人戸盡力供輸有所不給則復轉徙流亡無復顧戀郷井之意其幸存者亦皆苟且偷安不爲子孫長乆之慮一旦小有水旱則復顧而之他觀其氣象如腐草浮苴無有根蔕愁歎亡聊深可憐憫是以去年六月曾以此縣稅錢利害條具聞奏乞賜蠲减伏􅀩聖恩即日降出而戸部下之本路漕司漕司委官究實復以申部取旨施行百里疲羸日夕仰望聖澤之下流不啻飢渇而戸部乃以去歳議臣之請復下漕司責以對補吏民相顧悼心失圖臣愚惶惑亦不知所以爲計然竊伏惟念陛下寛仁勤儉恭巳愛民四方逺近凢以病告無不惻然興念即賜復除臣不敢廣引前事且如近者汀州所貢白金歳數千兩一旦沛然出令舉以丐之了無難色此豈復責其有所取償而後予之㢤慘怛之愛發扵誠心而不可巳也而徃者議臣不􅁕以窺測天地含容施生之大徳􅂺爲對􅀘之􅀃以逆沮逺近祈恩望幸之心臣雖至愚有以知其决非陛下之本心也且州郡誠有餘財自當措置兊那以紓民力豈復敢以此等􅃈末上勞天􅃪正爲公私匱乏不􅀎相救是以冐昧有此陳請今乃限以對􅀘之􅀃不附其􅀃則逺縣窮民永無蘇息之期必從其􅀃則􅀔無從出不過剜􅁏􅀘瘡以欺天㒺人不惟無益而或反以爲害不惟仰失陛下愛民之本心而臣之愚亦有所不忍爲也是以敢冐萬死復以奏聞欲望聖􅄌特降睿旨檢㑹前奏依汀州例直賜蠲放施行計其所捐除不礙上供數外不過紬絹一千五十餘匹錢二千九百餘貫比之汀州之數未爲甚費而可以少寛斯人使得安其生業臣不任祈天瀝懇皇恐俟命之至奏南康軍旱傷狀照㑹本軍并􅃹屬星子都昌建昌縣自六月以來天色亢陽缺少雨澤田禾乾枯本軍恭依御筆處分嚴禁屠宰精意祈禳及行下逐縣精加祈禱去後今㩀星子都昌建昌縣申依應遍詣寺觀神祠及諸潭洞建壇祭祀請水精加祈禱雨澤並無感應今來諸郷早禾多有乾損及備㩀稅戸陳徳祥等狀披訴所布田禾縁雨水失時早禾多有乾槁不通􅀵刈申乞委官檢視本軍今檢凖淳熈令諸官私田災傷秋田以七月聴經縣陳訴至月終止本軍除巳依條施行外湏至奏聞乞放免租稅及撥錢米充軍糧賑濟狀臣伏覩本軍今爲乆缺雨澤早田旱損巳依凖令式具狀奏聞訖照對本軍地􅂽田􅇤稅重民貧昨扵乾道七年曽遭大旱伏蒙聖恩放免本年夏秋二稅錢米紬絹共八萬六千三百二十貫石匹及詔本路監司應副軍糧米四千石撥到糴軍糧米錢九千餘貫并撥本軍未起米一萬一千七百餘石本軍借兊過乳香度牒錢一萬餘貫凑糴軍糧攴遣官兵及撥到賑濟米五萬石又拖欠兩年上供折帛月椿等錢共九萬三千四百一十六貫石匹兩然後遺民復得存活以至今日今茲不幸復罹枯旱之災又蒙陛下親降御筆深詔守臣精加祈禱而臣奉職無狀無以感格幽明祈禱兩月殊無應効今則早田什損七八晚田亦未可知正得薄􅀵其數亦不䏻當早田之一二訪聞􅂄老云乾道七年之旱雖不止扵如此然當時承屢豐之後富家猶有蓄積人情未至驚憂又以朝廷散利薄征賑給之厚而人民猶不免扵流移殍死閭井蕭條至今未復况今民間蓄積不及徃時人情巳甚憂懼目下軍糧便闕攴遣計料見􅃹常平斛斗亦􅂲􅀅來不􅁕賑濟攴用若不􅄋懇先事奏聞竊􅂲将來流殍之禍及他意外之憂又有甚扵前日欲望聖慈早降睿㫖許依分數放免稅租外更令轉運常平兩司多撥錢米應副軍糧凖備賑濟則一郡軍民庻㡬不致大叚狼狽冐犯天威臣無任􅂲懼待辠之至再奏南康軍旱傷狀照對本軍􅃹屬星子都昌建昌三縣􅃹下諸鄉自春夏以來雨澤少愆尋行祈禱扵五月中旬巳􅀗感應稍稍霑足遂至髙下之田皆巳布種至六月上旬以來又闕雨澤及遍詣􅃹屬靈跡寺觀神祠諸處淵潭取水建置壇塲依法􅁽祭龍及修設醮筵禁止屠宰精加祈禱自後未􅀗感應其􅃹下民戸陂塘所積水利雖車戽注䕃禾稻縁乾亢日乆兼又風色滲漏是致民田多有乾槁不通􅀵刈見不住㩀人戸投陳旱傷不絶本軍恭依御筆處分嚴禁屠宰精意祈禳及行下逐縣精加祈禱去後㩀星子都昌建昌縣申依應遍詣寺觀神祠及諸潭洞建壇祭祀請水精加祈禱雨澤並無感應今來諸鄉早禾多有乾損及備㩀稅戸陳徳祥等狀披訴所有田禾縁雨水失時早禾多有乾槁不通􅀵刈申乞委官檢視本軍檢凖淳熈令諸官私田災傷秋田以七月􅃪經縣陳訴至月終止具録奏聞乞截留米綱充軍糧賑糶賑給狀臣熹昨以衰病無䏻退居田野陛下過聴不忍棄􅂢超資越序付以千里民社之􅀉徳至渥也而臣亡狀不䏻悉心營職宣布寛恩馴致旱災害及民物雖巳嘗具奏聞及申省部諸司乞行賑救今來竊聞接濟飢民事常平司巳行措置惟有軍糧一節利害尤爲不輕而未聞諸司有所措置竊慮一旦事出意外辠無所逃湏至昧死再有陳奏伏望聖明俯乗臨照臣契勘南康軍受納人戸苗米計四萬六千五百一十九石遞年科撥並充上供起發而本軍官吏軍兵一歳糧廪計當用米二萬七千五百一十三石並無科名攴撥從來只扵人戸輸納苗米多􅀵加耗髙量斛面及侵攴漕司科撥未盡米斛應副攴遣昨扵淳熈五年内奉聖㫖令人戸自行把槩見青交量每斛巳减斛面二斗及臣到任訪聞民間猶以所納爲重又行措置减去加耗一斗所入之數旣巳不多然若無水旱災傷非泛支遣更以别色官錢多方糴􅀘亦可僅免曠闕今者不幸遭此旱傷差官檢放雖未見得分數多寡然以目所見叅之傳聞其􅀔所􅀵未必及三四分竊慮􅀅來减放之後實納苗米頭數不多當此凶年所减加耗斛面又難以復行增起即本軍官兵所攴糧廪委是並無指擬夫民飢猶䏻流移逐食軍兵旣係尺籍從來仰食扵官豈容一日有所欠闕臣旣淺短無術可爲旬月以來晝度夜思以至成疾雖巳畧控危􅂨陳乞罷免然念州郡事􅀔日就危迫又有萬倍扵一身者若不力告朝廷早爲之所而但偷爲一身之計自求安便則其上􅀒陛下㧞擢任使之恩雖復萬死猶有餘辠故不自揆其踈賤輙敢復具情實冐昧奏聞欲望聖慈哀憐逺方軍民遭此旱虐凛然日有講壑之憂特降睿旨許留淳熈六年殘零未起米綱及七年合起米綱並充本軍軍糧及賑糶賑給支用其賑糶米錢􅀱􅀅來收到别随綱運解發庻㡬一郡生靈若軍若民皆得以保其螻蟻之㣲命共感天地造化無窮之恩更乞憐臣所患心疾不堪思慮又苦脚氣不任歩􅂂早賜罷免仍催巳差下人石􅗐不􅀱般家接人疾速前來之任使臣得輿病還家待盡餘息則臣之私計亦爲幸甚謹録奏聞伏候勑旨貼黄照對本軍淳熈六年米綱未起僅五千石今年苗米且約减放七分即所餘合納米不過一萬三千九百五十五石若􅂪聖旨盡行撥賜亦不爲多又况賑糶米錢􅀅來續次發納即其實攴之數愈更不多此在朝廷至爲㣲末而可以救活一郡軍民之命誠非細事伏乞聖照奏推廣御筆指揮二事狀具位臣朱熹伏覩本路安撫使司牒備奉御筆指揮頗聞雨澤愆期有妨農務仰本路帥守勤恤民􅀮决遣滯獄嚴禁屠宰精加祈禳若未感格即具奏聞當議降香前來期扵必應俾雨澤霑足寛朕憂軫卿等各勉􅏧母怠臣伏讀聖訓有以仰見陛下畏天之誠愛民之切雖成湯桑林之禱宣王雲漢之章無以過此甚盛徳也臣幸以愚賤􅀗奉詔旨謹以謄冩播告質之幽明仰慿威靈屡􅀗感應但其雨澤不至浹洽均匀目今正是早禾􅄍穗結實之時尚多闕水去處又聞湖南湖北淮西等路例皆枯旱􅀅來不幸或至荒歉即雖移民移粟之小惠亦無所施臣是以夙夜憂惕不遑啓居竊以愚見推廣聖訓畫爲二䇿具以奏聞如有可採乞賜施行庻㡬有以導迎和氣銷去旱災仰寛陛下宵旰之憂惟是不量卑鄙屢犯天威無任震懼隕越之至臣之所陳謹具如后一臣伏讀聖詔有曰勤恤民􅀮臣謹巳遵禀施行訖然臣竊聞陸贄有言民者􅀖之本財者民之心其心傷則其本傷其本傷其攴幹凋瘁而根柢蹶㧞矣推此言之則今日所以勤恤民􅀮莫若寛其稅賦弛其逋􅀒然後可以慰恱其心而感召和氣也臣自去年到任之􅀄即以本軍星子縣稅賦偏重嘗具奏聞乞賜蠲减及續體訪到三縣夏料木炭錢科紐太重亦嘗具申省部及提􅀧司其木炭錢近得提􅀧司保明條奏巳蒙聖恩蠲减二千貫訖獨星子减稅一事雖􅂪聖恩施行而戸部行下漕司漕司委官覈實近日方得回申戸部此事若格以有司之法必是方多沮難未容便得蠲减所願聖慈深賜矜憐直降睿㫖特依所乞則此縣之民庻㡬復得樂生安土永爲王民不勝幸甚臣又竊見州縣積欠官物巳凖去年明堂赦書自淳熈三年以前並行除放而近者上司行下依舊催督至如本軍雖小而所催除虚額逃閣外凡一十三項計三萬四千七百三十三貫石匹兩其他大郡抑又可知其間所欠雖復名色多端然而皆是赦恩巳放之物今日再行催理不唯仰􅃜帝王大信而其爲害有不可勝言者盖若勒令州縣填􅀘則州縣無所􅀙出必至額外巧作名色取之扵民若但責之欠人則其間多巳貧乏狼狽雖使賣妻鬻子不足塡納而􅁥繋在官無復解脫之期均之二者皆不足以足用豐財而適􅁕以傷和致沴爲害不輕臣愚欲望聖慈特推曠蕩之恩自淳熈三年以前但干欠􅀒官物不問是何名色凡赦恩巳放若巳放而未盡者一切蠲除如有違詔􅂺行催理仰􅀍受官司繳連具奏委自三省看詳􅀅施行官司重作行遣其􅀍苦人戸亦許逕赴登聞皷院進狀陳理依此施行庻㡬聖恩下逹民情上通可以感格和平銷去災沴惟聖明留意則天下幸甚一臣伏讀聖詔有曰决遣滯獄臣謹巳遵禀施行訖然臣竊聞之易曰君子明謹用刑而不留獄此聖人觀象立教萬世不易之法也今州縣之獄勘結圓備情法相當者並皆即随時决遣惟其刑名疑慮情理可閔者法當具案聞奏下之刑寺審閱輕重取自聖裁而州縣不敢以意决也此深得古人明謹用刑之意矣然奏案一上動渉年歳且如本軍昨扵淳熈四年十一月内申樞宻院乞奏刼賊倪敏忠辠案其罪狀明白􅀄無可疑而凡經二年有半至今年三月内方凖勑斷行下其他似此亦且非一竊計他州繁􅇵去處此􅀋尤多若使皆是行刼殺人之賊偶有疑慮使之乆幽囹圄亦何足恤其間盖有法重情輕之人本爲有􅁕憫憐冀得􅂪􅀍恩貸而反淹延禁繋不得早遂解釋則恐非聖人所謂不留獄之意也臣愚欲望聖慈特詔大臣一員專督理官嚴立程限令将諸州奏案依先後資次排日結絶其合貸命􅀙輕之人湏當日便與行下其情理深重不該减降者即更寛與一限責令審覈然後行下庻㡬輕者早得决遣釋放重者不至倉卒枉濫是亦導和弭災之一術惟聖明留意則天下幸甚右謹件如前謹録奏聞伏候勑㫖奏借兊上供官錢糴米并乞權行􅀝閣夏稅錢帛狀臣昨爲本軍今年災傷至重奏乞截留兩年上供米斛内循狂妄伏俟誅夷不謂聖恩即垂􅄏􅁢臣與合郡千里軍民鼔舞相慶仰戴天地父母再生之恩雖復􅂢軀隕首誠不􅁕以仰報萬分之一今來檢放旱傷秋苗通計不止七分除巳一面攅具奏聞外復有危迫之懇湏至冐昧以聞竊見本軍今年所理夏稅縁自省限起催以來即苦旱乾人戸車水救田日不暇給憂勞愁歎實與常歳不同遂不敢嚴責諸縣依限催理只令􅂆諭人戸自行輸納至今截日方㩀納到絹九千四百匹錢一萬六千七百三十五貫二百五十九文省其絹一面攴裝起發所有見錢竊縁本軍别無儲積可備賑糶不免擅行兊借并未起淳熈六年折帛錢七千三百一十九貫二百九十六文省通前兩項共錢二萬四千五十二貫五百五十五文省趂此米價未起之間收糴米斛約計可得一萬一千五百七十石賑糶飢民􅁍俟糶畢收簇元錢節次起發其餘人戸所欠錢絹數目尚多而民間自今以徃飢餓寒凍之憂日甚一日漸次無力可以供輸臣誠不忍更行催督以速其流離轉死之禍敢冐萬死復以上聞欲望聖慈更賜哀憐許􅀅本軍今年人戸永納夏稅錢帛權行􅀝閣令􅀱來年􅁞麥成熟却随新稅帶納庶㡬飢餓餘民得保生業不勝萬幸所有臣輙􅀅上供官錢借兊糴米之辠敢不俯伏恭俟朝典伏乞聖慈併賜施行臣無任瞻天望聖皇懼懇切之至乞撥賜檢放合納苗米充軍糧狀凖尚書省劄子宣敎郎權發遣南康軍朱熹奏爲今歳旱傷除接濟飢民一事常平司巳行措置惟有軍糧歳用二萬七千五百一十三石並無窠名攴撥乞将淳熈六年未起米五千石并今年苗米檢放外餘數乞盡行撥賜充軍糧及賑糶賑給攴用奉聖㫖令本路提舉常平司将所部州軍應管常平義倉錢米通融寛數攴撥外更許本軍􅀅淳熈六年未起米並皆盡數存留充軍糧及賑糶等攴用内糶到價錢令項樁管非奉朝廷指揮不得擅行攴使其淳熈七年分來候見得實旱傷分數别行申取朝廷指揮本軍除巳遵禀施行外今㩀星子都昌建昌縣申到檢放通計八分四毫四絲所有今秋苗米􅃹催四萬六千五百餘石除放八分四毫四絲計米三萬七千四百餘石外合納米九千九十餘石竊縁本軍一年攴遣米計二萬七千五百一十三石政使盡蒙撥賜上項米斛其扵歳計尚闕攴遣若扵數内更令發起即其狼狽又将有不可勝言者欲望聖慈矜憐􅀌逺特許盡數攴撥上件放外苗米與充軍糧則一郡軍民不勝幸甚伏􅀱勑旨奏勸諭到賑濟人戸狀照對本軍今歳旱傷細民闕食巳行下􅃹屬星子都昌建昌縣勸諭到上戸張世亨等承認米􅂖賑糶接濟民間食用巳行下逐縣告示上戸依所認數目椿􅃹在家伺􅀱差官審實監糶去後續凖行在尚書戸部符九月十九日辰時凖淳熈七年九月十三日勑中書門下省檢㑹昨凖乾道七年八月一日勑節文訪聞湖南江西間有旱傷州軍竊慮米價踴貴細民艱食理合委州縣守令勸諭有米斛富室上户如有賑濟飢民之人許從州縣審究指實保明申朝廷依今來立定格目給降付身􅀘授名目内無官人一千五百石􅀘進義校尉願􅀘不理選限将仕郎聴二千石􅀘進武校尉如係進士與免文解一次不係進士候到部與免短使一次四千石􅀘承信郎如係進士與補上州文學五千石􅀘承節郎如係進士補迪功郎符本軍疾速施行本軍遂恭禀行下星子都昌建昌縣􅂆諭承認賑糶米􅂖之人如願􅀅來賑濟依今來所降指揮格法推賞去後今㩀都昌建昌縣狀申􅂆諭到元認賑糶米􅂖稅户張世亨張􅀖獻劉師輿黃澄四名各情願依格法将米􅂖賑濟飢民乞依今降指揮保奏推賞本軍巳行下逐縣告示張世亨等依數樁管米斛伺􅀱本軍給暦付飢民及差官前去監轄賑濟飢民請領食用􅀱見的實賑過米數别行保奏推賞外湏至奏聞者繳納南康任滿合奏禀事件狀臣熹昨扵淳熈五年凖勑差前件差遣續奉聖㫖令臣任滿前來奏事臣巳扵次年三月到任至今年三月巳係成資方欲等􅀱替人前來交割職事即依元降指揮前去奏事忽扵三月二十五日凖尚書省劄子奉聖㫖除臣提舉江南西路常平茶鹽公事自顧踈頑巳試無狀荐蒙任使恩重命輕未敢􅃍有辭避巳扵當日望闕謝恩祗受訖縁爲替人未到凖法未得離任其元降奏事指揮又縁巳有前件恩命兼臣見患心氣精神不全思慮應對動有差錯不敢前詣國門聴􅀱進止外伏念臣愚賤踈逺在任二年凡所奏陳多蒙開納甫及終更曽無績効又蒙聖恩有此陞擢臣雖至愚然早服父師之訓其扵君臣大義與夫古今治亂得失之故粗亦識其梗槩豈不願得一望天日之光少罄平日愚忠之萬一顧以衰頺不􅀗自盡退就田􅅕死有遺憾惟是今任職事尚有合具奏禀事件不免具事狀條畫以聞而緫其目如左湏至奏聞者一臣熹狀奏爲本軍星子縣稅錢太重欲乞直降睿旨特賜蠲减事一臣熹狀繳連本軍狀奏爲􅂆諭到稅戸張世亨張􅀖獻劉師輿黃澄共承認米一萬九千石賑濟飢民給賜了畢欲乞不候諸司保明早依元降賞格推恩事一臣熹狀奏爲乞降指揮淳熈七年􅀍災之郡不得催理積欠及将􅀝閣夏稅特與蠲放其上三等户零欠夏稅亦與多作料次逐年帶納事一臣熹奏爲乞賜白鹿洞書院勑額及乞頒降光堯夀聖憲天體道性仁誠徳經武緯文太上皇帝御書石經及國子監九經注䟽等事右謹具如前欲望聖慈特降睿旨逐一施行不勝幸甚臣瞻望闕庭無任慕戀祈懇之至謹録奏聞伏候勑旨一右臣誤􅂪聖恩俟辠偏壘自度庸愚無以􅀘報到任以來夙夜憂勞惟思所以上布聖恩下求民瘼仰副使令之萬一者竊見本軍諸縣大抵荒凉田野榛蕪人煙稀少而星子一縣爲尤甚因竊究其所以乃知日前兵亂流移民方復業而官吏節次增起稅額及和買折帛數目浩瀚人户盡力供輸有所不給則復轉徙流亡無復顧戀鄉井之意其幸存者亦皆苟且偷安不爲子孫長乆之慮一旦小有水旱則復顧而之他􅀚其氣象如腐草浮苴無有根蔕愁歎亡􅂓深可憐憫是以到任之初曽以此縣稅錢利害條具聞奏乞賜蠲减伏􅀩聖恩即日降出而戸部下之本路漕司漕司委官究實復以申部取旨施行百里疲羸日夕仰望聖澤之下流不啻飢渴而戸部乃以徃者議臣之請復下漕司責以對補吏民相顧悼心失圖臣愚惶惑亦不知所以爲計者是以黙息乆之不敢復有奏陳今旣終更不逺郡境又遭去年之旱其憔悴無憀之態又有甚扵前所陳者是以不敢愛死復嬰鈇􅃏而一言之夫以民之貧病至扵如此州郡誠有餘財自當措置兊那以紓其力豈便敢以此等􅃈末上勞天聴正爲公私匱乏不能相敕是以冐昧有此陳請今乃限以對補之􅀃使逺民之疾苦不得以上聞而陛下之徳澤不得以下究此殆議者過計之憂臣雖至愚有以知其决非仁聖之本心也欲望聖慈特降睿旨将淳熈六年十月十九日對補指揮更不施行仍照有司檢㑹臣熹前奏本軍星子縣稅錢事直賜蠲放盖其所􅂢除不礙上供數外不過紬絹一千五十餘匹錢二千九百餘貫此扵大農之經費不足以當九牛之一毛而可以少寛百里之民使得安其生業臣不任祈天􅄋懇惶恐俟命之至謹録奏聞伏候勑旨二貼黃奏爲本軍􅂆諭都昌建昌縣稅戸張世亨劉師輿進士張􅀖獻待􅀘太學生黃澄賑濟飢民斗斛照會本軍去歳旱傷至重細民闕食雖有樁管及撥到常平米斛數目不多深􅂲不䏻周給遂行􅂆諭到􅃹屬上戸承認米數賑糶接濟民間食用續扵去年十月十一日凖行在尚書戸部九月十六日辰時凖淳熈七年九月十三日勑中書門下省檢凖乾道七年八月一日勑節文訪聞湖南江西間有旱傷州軍竊慮米價踴貴細民艱食理合委州縣守令􅂆諭有米斛富室上戸如有賑濟飢民之人許從州縣審究指實保明申朝廷依今來立定格且給降付身補授名目内無官人一千五百石􅀘進義校尉願補不理選限将仕郎聽二千石補進武校尉如係進士與免文解一次不係進士候到部與免短使一次四千石補承信郎如係進士與􅀘上州文學五千石補承節郎如係進士與補廸功郎符本軍疾速施行本軍恭禀行下􅃹屬再行勸諭承認賑糶米數之人如願将來賑濟切待審究保明申朝廷依今來所降指揮格法推賞去後㩀都昌建昌縣申數内勸諭到元認糶米稅戸張世亨劉師輿進士張􅀖獻黃澄四名各情願承認米依格法賑濟内建昌縣稅戸張世亨五千石乞補承節郎進士張􅀖獻五千石乞􅀘迪功郎稅戸劉師輿四千石乞補承信郎并都昌縣待補太學生黃澄五千石乞補迪功郎各乞依今降指揮保奏施行本軍遂行下告示張世亨等依數樁米伺􅀱給暦付飢民差官監轄賑濟巳扵去年十二月二十八日先具奏聞及申本路諸監司照㑹去訖續㩀􅃹屬星子都昌建昌三縣共抄劄闕食飢民二萬九千五百七十八戸數内大人一十二萬七千六百七口小兒九萬二百七十六口本軍各印給暦頭牌面置簿暦發送逐縣當職官給散付人戸預扵縣市及諸鄉均定去處共置三十五場分差見任􅀉居指使添差監押酒稅務監廟大小使臣共三十五員監轄賑糶賑濟及委縣官分場廵察嚴戢减尅乞覔之弊自淳熈八年正月初一日爲始令抄劄到闕食人戸赴場賑糶其鰥寡􅀌獨之人即以常平米斛依法賑濟至正月内又縁雪寒行下屬縣􅀅元係賑糶飢民用上件張世亨黄澄等米及常平義倉米一例賑濟兩日至三月内又慮飢民艱得錢􅀵糴米斛再自十一日爲頭行下諸縣􅀅巳給暦賑糶飢民一例普行賑濟一十三日通作半月及照得都昌縣止有黃澄一名承認賑濟米五千石凑所􅃹義倉米㑹計賑濟不周本軍遂扵建昌縣張世亨等賑濟米内撥米四千石本軍措置官錢和雇脚夫舟舡裝載發送都昌縣交管分扵置場去處責令監轄賑濟至閏三月十五日終節次㩀都昌縣建昌縣申到張世亨張􅀖獻劉師輿黃澄賑濟過米撮筭共計一萬九千石星子縣元無勸諭到上戸賑濟米斛即以常平義倉米斛依例普行賑濟外本軍節次行下都昌建昌知縣逐旋審究的實賑濟過張世亨黃澄等米數保明申軍去後㩀迪功郎監城下酒稅權都昌縣事孫僑通直郞知建昌縣事林叔坦狀保明到張世亨張􅀖獻劉師輿黃澄賑濟過米一萬九千石委是節次賑濟飢民食用之數即無冐濫本軍一面差委從政郞本軍司法叅軍陳祖永前去都昌建昌縣覈實到張世亨張􅀖獻劉師輿黃澄賑濟米一萬九千石委是賑濟過的實之數本軍再行稽考别無冐濫保明是實本軍勘㑹得張世亨劉師輿各係稅戸張􅀖獻係應舉習詩賦終塲士人并黃澄係扵淳熈四年秋試應舉習詩賦取中待􅀘太學生第十五名是實其張世亨張􅀖獻劉師輿黃澄賑濟過米數各應得近降指揮賞格數内稅戸張世亨賑濟過米五千石合􅀘承節郞稅戸劉師輿賑濟過米四千石合􅀘承信郞進士張􅀖獻賑濟過米五千石合􅀘迪功郞待􅀘太學生黃澄賑濟過米五千石合􅀘迪功郎除已具申本路安撫司轉運司提舉司提刑司照㑹依條保奏推賞外欲望聖慈下所屬給降合得付身發下以慿給付張世亨張􅀖獻劉師輿黃澄祗受湏至奏聞者貼黃臣契勘本軍􅃹下去秋種麥甚廣春􅀄亦極茂盛續次訪聞近縁雨水頗多大叚傷損民間養􅅙亦縁雨濕桑柘不至十分成熟伏乞聖照臣契勘除上項張世亨等四家米數巳行攴散了畢外續次訪聞都昌縣下尚有漏落人户未曽賑濟除巳帖本縣知佐審實用義倉米攴散去訖伏乞聖照貼黃奏爲乞特詔有司不􅀱諸司保明􅀅本軍所奏黃澄等賑濟早賜依格推賞奏聞事右臣昨奉淳熈七年九月十三日聖旨勸諭到本軍人戸黄澄等出備米一萬九千石賑濟飢民巳曽累具畫一奏聞去訖近縁春初風雪寒凍及三月以來農功将起巳帖諸縣将上件米普行賑濟􅃹内飢民兩次通計二萬九千五百七十八戸數内大人一十二萬七千六百七口小兒九萬二百七十六口大人一斗五升小兒七升五合足爲半月之糧今巳了畢千里之民旣免扵飢餓流離殍死之憂無不歡呼鼔舞感戴聖恩臣亦多方體察詢究委無欺􅀮漏落誑妄不實之弊巳因近降指揮具事狀申本路監司乞行保奏外竊縁當來勸諭並是臣親書榜帖分遣官屬再三徃復示以朝廷命令官賞之信其人乃肯欣然􅃪命今臣秩滿非乆解罷􅀂不力爲奏陳早乞推賞萬一他日有司視同常事巧爲沮郤則不惟使臣得辠扵民亦􅂲朝廷異時命令無以取信扵下本軍不免别具狀奏欲望聖慈特詔有司不􅀱諸司保明将本軍所奏黃澄張世亨張􅀖獻劉師輿早賜處分依格推賞庻㡬民間早􅀗爲善之利日後或有災傷富民易以勸率貧民不至狼狽實爲永乆之利臣不勝大願其本軍奏狀繳連在前謹録奏聞伏􅀱勑旨三右臣輙有愚見上瀆聖聦臣竊見本軍去年大旱田􅅕不􅀵幸蒙聖恩减放秋苗􅀝閣夏稅而又申詔有司發廪勸分前後丁寧勤勤懇懇凡所以加惠扵無告之窮民者至深至厚以故今歳開春以來及今巳是七十餘日而閭里細民幸不至扵大叚闕食又幸目今雨澤以時原野漸潤竊料不過四五十日則二麥可􅀵又四五十日則早稻相繼决不至扵復有流離􅂢瘠之禍以勤陛下宵旰之憂矣然臣竊以爲捄􅂽之政蠲除賑貸固當汲汲扵其始而撫存休養尤在謹之扵其終譬如傷寒大病之人方其病時湯劑砭灸固不可以少緩而其旣愈之後飲食起居之間所以将護節宣小失其宜則勞復之證百死一生尤不可以不深畏也今者飢餓之民雖得􅀩􅀍聖恩以幸免扵死亡然亦􅀋皆鳥形鵠面薾然無異扵大病之新起􅀂有司加意撫綏寛其財力則一二年間筋骸氣血庻㡬可復其舊若遂以爲旣愈而不復致其調攝之功但見其尚䏻耕墾田疇撑拄門戸而􅃍欲責以累年之逋􅀒與夫去歳􅀝閣之官物則是人者其必無全理矣竊聞乾道七年之旱夏稅秋苗亦皆嘗蒙聖恩矣而流殍甚衆迄今不復者正以次年帶納前料稅物者迫之也然考其實所謂帶納者初未嘗大叚有人納到以佐有司用度之闕而姦胥猾吏得以並縁搔擾則其害有不可勝言者其後淳熈元年九月四日乃以荐饑始􅀩蠲放則三年之間所失巳多而無及扵事矣今舊逋未除新稅将起斯人懔懔巳有狼顧之憂臣愚欲望陛下赦臣之辠察臣之言亟詔有司凡去年􅀍災之郡盡今年毋得催理積年舊欠及将去年􅀝閣夏稅悉與蠲放其上二等人戸當此㐫年細民所從仰食其間亦有出粟减價賑糶而不及賞格者欲望聖慈普加恩施許􅀅去年殘欠夏稅多作料數逐年帶納則覆載之間幅員之内當此災旱之餘無有一夫一婦不􅀍堯舜之澤矣臣愚賤踈逺不當妄有陳奏實以誤膺委􅀉職在牧民竊扵詔令之間有以仰窺陛下子愛􅀺元之心有加無巳大懼無以仰稱萬分是以不敢不盡其愚冐瀆天威臣無任􅂲懼顛越之至謹録奏聞伏􅀱勑㫖四右臣竊嘗伏讀國朝會要恭覩太宗皇帝嘗因江州守臣周述之奏詔以國子監九經賜廬山白鹿洞書院既又以其洞主明起爲蔡州褒信縣主簿以旌儒學毎恨無由一至其處仰觀遺迹及􅀩聖恩假守兹土到任之初考按圖經詢究境内民間利病乃知書院正在本軍星子縣界而陳舜俞廬山記又載真宗皇帝咸平五年嘗勑有司重加修繕間因行視陂塘始得經由其地見其山川環合草木秀潤真閒燕講學之區而荒凉廢壊無復棟宇因竊惟念太宗皇帝真宗皇帝所以幸教多士垂􅁉萬世之意其盛如彼而下吏淺聞弗克原念以稱萬分之辠其大如此駭懼震慴不皇啓居既又按考此山老佛之祠盖以百數兵亂之餘次第興葺鮮不復其舊者獨此儒館莾爲荆榛雖本軍已有軍學足以養士然此洞之興逺自前代累聖相傳眷顧光寵徳意深逺理不可廢况境内觀寺鐘皷相聞殄棄彛倫談􅀃空幻未有厭其多者而先王禮義之宮所以化民成俗之本者乃反寂寥希闊合軍與縣僅有三所而已然則復修此洞盖未足爲煩扵是始議即其故基度爲小屋二十餘間教養生徒一二十人節縮經營今巳了畢但其勑額官書皆巳燒毀散失無復存者不敢擅行標榜􅀵置輙昧萬死具奏以聞欲望聖明俯賜鑒察追述太宗皇帝真宗皇帝聖神遺意特降勑命仍舊以白鹿洞書院爲額仍詔國子監仰摹光堯夀聖憲天體道性仁誠徳繼武緯文太上皇帝御書石經及印版本九經䟽論語孟子等書給賜本洞奉守看讀扵以褒廣前烈光闡儒風非獨愚臣學子之幸實天下萬世之幸謹録奏聞伏候勑㫖貼黄臣頃年親見潭州嶽麓書院尚存舊碑大書勑賜嶽麓書院六字伏乞睿照阿馬奏案内小貼子臣熹等契勘阿馬既與外人通情宻謀殺夫自是不容旁有知證本不敢具案奏聞今凖提刑司牒湏至具奏謹按本人所犯􅈥絶三綱情狀􅃤酷聞之猶可酸鼻竊慮有司因循常格擬從减等之坐有害風教事體不輕欲望聖明洞察特依常法以警昬愚以正􅀖法臣等不任大願奏紹興府都監賈祐之不抄劄飢民狀照對紹興府諸縣今􅀊災傷飢民流移闕食甚衆恭禀聖訓寅夕究心奉行縁本府山隂㑹稽縣人戸不住遮道告訴抄劄不盡漏落不實臣即巳措置專設一局見今呼集耆保郷司專委本府當職官敦請郷官重行隔别審實其在城五廂􅆣食細民及流移到府之人本府雖委逐廂官沿門抄劄訪聞多是止慿廂典合干人多有不實不盡亦行前來陳訴臣又巳送下廂官審實抄劄所有他處流移到府臣亦巳行下本府與縣令佐約束停房店舎不得多􅀵賃資并津渡邀滯仍遍行􅀵拾病患飢困及遺棄小兒就寛闊寺院安著攴撥常平官錢收買紫薪藁薦給衣襖之􅀋修合藥餌醫治煮造三兩等稀稠粥次第救助仍委請慈悲僧道主􅃹看養所行非不告戒臣今月十九日㩀馬林等投狀稱是􅌘縣人事人事疑當作人氏移在本府第一廂居住闕食飢餓内有馬百四一名扶到臣治所巳是飢餓日乆十分羸困􅂊到不乆即便倒死臣即令醫人用藥灌救移時方得甦醒遂行呼到本廂官武翼郎紹興府兵馬都監賈祐之取問元不抄劄供報因依本官應對不行及先來承受本府牒委及承臣送下陳狀並無抄劄事因報應本官委是不職難以存留在任臣除巳先􅀅賈祐之牒紹興府對移本府指使差遣外欲望聖慈特降睿旨重賜黜責以爲官吏奉行賑濟不䖍之戒乞借撥官㑹給降度牒及推賞獻助人狀未論止許之許疑當作計臣昨􅀍臨遣備使浙東又蒙聖慈賜以錢㑹三十萬貫以給一路賑糶賑濟自謂遭値聖恩􅂭厚至扵如此其􅀔必可以救活此道之人伏自入境以來日㩀紹興府㑹稽山隂兩縣人戸投訴抄劄漏落遂将諸縣悉行根括先㩀兩縣申到比舊計増二十五萬六千一百九十二口其餘諸縣尚未申到計其縣分地里之大小戸口决當數倍於此盖縁當来諸縣抄劄不甚子細而又渉日旣乆向之粗能自給者今皆闕食所以飢民之數日有増加因以此數考按本府昨來均定所得錢米撥下諸縣之數其爲欠闕數目尚多遂将昨來所􅂪給降㑹子等錢除五萬貫諸州申到巳無見在更留五萬凖備諸州取撥外即計逐縣大小及巳得錢米多寡等第均給計巳支費十八萬餘貫而㑹稽山隂兩縣自占九萬餘貫其餘凖擬諸縣申到再劄人數别行均給者共不過一萬餘貫計可得米三四千石而巳事􅀔危迫不免逐急扵鹽司錢内借撥九萬餘貫牒紹興府措置運糴然亦僅可得米二萬餘石而巳以兩縣再劄所添計之則此二萬二三千石之米其􅀔豈足以均及諸縣之人然而兩縣所得一家不過日得一二升一口不過日得一二合而巳此皆僅足以苟延喘息而不􅁕以救其死命竊料更加旬月未論不得食者必致殍死而此得食之人亦有羸困不䏻以自存者矣又况當來計料糶濟止到三月十五日便行住罷巳不䏻給而麥熟猶在四月麥之熟否姑置未論止許住罷至麥熟猶有半月餘日無以接濟夫以紹興一郡之飢自臣未到巳􅂪撥賜米十四萬石錢九萬貫至臣有請又􅂪聖恩如此其厚而臣智術淺短不䏻變通其所施爲止扵如此竊恐考之扵今則徒有賑救之名而無賑救之實要之於後則旣巳養之數月之乆而不免棄之旬日之間徒費陛下軍國之儲數十大萬而不足以稱陛下救民水火之心固臣之無狀死不償責至扵减米増賞雖巳得旨通行而去年獻助之人至今未􅂪推賞度牒換米雖巳得㫖給降而米數太多度牒一道計當錢千五百緡以此至今皆未聞有應募者則此竊􅂲陛下憂勞惻怛慱施濟衆廣大無窮之心或格扵有司拘孿纎嗇之議而不得以下究也臣巳與帥臣王希吕同狀奏聞欲望聖慈更賜憐憫再行借撥㑹子三十萬貫及今糴米五六萬石通融接續措畫糶濟而復扵此詳具其所以然者以聞其去年本路所奏合推賞人則乞特詔有司直與推賞給降告命付之本州令守臣喚上當􅈦秪受不湏更令官司保明徒爲文具其度牒亦乞裁减半價只作百五十石仍再給降三百本付紹興府令臣與王希吕同共掌􅃹交到米斛即與書填則人必樂從應募者衆凡此三者儻蒙施行庻㡬此郡飢民逐家一日各添得米一二升逐口一日各添得米二三合而逐縣續有劄到漏落戸口及流移歸業之人亦得以漸次收拾不至飢死旣有以卒究陛下憂勞惻怛􅀶施濟衆廣大無窮之心而草野愚臣亦得以慿藉威靈不􅀒飢民之命千萬幸甚如其不然則臣計巳窮終必仰􅀌任使伏自到任以來朝夕憂懼精神耗竭四肢緩弱時復麻痺竊􅂲一旦溘然無以見百萬餒􅀑扵地下欲望聖慈赦其罪戾許臣罷免使得脫此􅁈債歸骨故山亦千萬幸甚披心􅄋血干冐宸嚴臣無任􅂲懼戰栗之至奏捄􅂽事宜狀臣蒙恩将命浙東奉行救恤到官日夕考究求所以上副焦勞之意竊見浙東諸州例皆􅂽歉台明號爲最熟亦不䏻無少損而紹興府之飢􅂽昔所未有臣以目所覩回思去歳南康之歉猶謂之樂歳可也賑救旣在所急事體宜先奏聞今紹興八邑餘姚上虞號爲稍熟然亦不及半收新昌山隂㑹稽所損皆七八分􅌘縣旱及九分蕭山諸暨水旱相仍㡬全無􅀵今除餘姚上虞稍似可緩外且論蕭山等六縣約其所􅀵不過十一先次朝廷撥米一十四萬七千石錢九萬貫并本司前官申朝廷扵衢婺州通融撥到義倉錢三萬八千七十五貫一百文明州義倉米五干石數目非不多州郡日夕惟賑濟是務官吏稍解事者皆奔走不暇雖􅀉居士大夫亦不敢寧處不可謂不留意然終未有能救飢莩之實民情嗷嗷日甚一日不獨下戸乏食而士子宦族第三等人戸有自陳願預乞丐之列者驗其形骸誠非得巳兼自秋來賣田拆屋斫伐桑柘鬻妻子貨耕牛無所不至不較價之甚賤而以得售爲幸典質則庫戸無錢舉貸則上戸無力藝業者技無所用營運者貨無所售魚鰕螺蚌乆巳竭澤野菜草根取掘又盡百萬生齒飢困攴離朝不謀夕其尤甚者衣不盖形面無人色扶老􅂝㓜號呼宛轉所在成群見之使人酸辛􅇶惕不忍正視其死亡者盖亦不少臣深究其所以然正縁紹興扡狹人稠所産不􅁕充用稔歳亦資鄰郡非若浙西米斛之多又以和買偏重無巨富之家連遭水旱兼失􅅙麥些小積􅂖春首勸糶無有存者上戸先巳匱乏是以細民無所仰給狼狽急迫至扵如此大抵􅂽歉自五分以下猶可措置盖以五分之粟給十分之人稍行􅂆分便可苟活今以空虚之郡而􅂽及九分則一分之粟旣不能給十倍之人而戸口甚多所闕浩瀚亦有非移民移粟所䏻􅀘助者臣所目見心思兼詢訪士夫父老者旣如此復約墾田收租之數以證之除餘姚上虞外今􅀅田畆計其􅀊入六縣爲田度二百萬畆每畆出米二石計􅀊􅀵四百餘萬又􅀅今再抄劄山隂㑹稽兩縣口數以約六縣之數則山隂㑹稽丁口半扵諸暨􅌘縣而比新昌蕭山相去不逺絶長􅀘短兩縣當六縣四分之一今抄劄山隂㑹稽四等五等貧乏之戸計三十四萬口四等之稍自給及上三等者不預焉則統計六縣之貧民約須一百三十萬口併上戸當不下百四十萬計稔􅀊所歛四百萬石米除上供及州用外養百四十萬之生齒日計猶不䏻及二升之數則所謂樂􅀊無餘者既信而有證矣又約六縣所蠲放分數以計今歳民間所􅀵不過十分之一則所不􅀵之米約計三百六十萬石而所􅀵止四十萬石闕乏數目如此浩瀚則所謂􅀘助無策者又信而有證矣今将紹興府先所得錢一十二萬八千七十五貫一百文并臣所得三十萬貫除五萬貫諸州申到已無見在又掯留五萬貫均給諸州外不過共折米八萬二千餘石并前項米一十四萬石緫而計之不及其田租所闕十分之一今來措置除蕭山僅􅀎口給半月外其餘五縣以戸計之日之所得固巳不過一二升若以口計之則日之所得又不過一二合是僅足以使之皆知聖主憂勞憫恤不忍坐視之意而巳若謂如此而便足以救其必死之命則固難指凖然遂欲以百三十萬之貧民盡仰官司口以升計麥秋之前九十餘日當爲粟百萬石則亦非朝廷今日事力之所及也然臣竊謂有司之力誠有限量而聖主天地父母覆載生育之心則無終窮以有限之力言之則捄護之切撥賜之多誠若不可以有加扵今日然以陛下無窮之心論之則豈不欲使此􅀖更得數十萬石之粟以必救數十萬人之命其忍直以無可奈何處之而熟視其飢餓顚仆扵前乎故臣輙敢歴叙其所見聞考驗之實本末如此而别具施行事目以干聖􅃪惟陛下哀憐財幸意迫情切言無倫次臣無任皇􅂲俟辠之至奏紹興府指使宻克勤偷盗官米狀照對紹興府諸縣去􅀊旱傷飢困及流移之民見今闕食昨􅀩聖恩撥下米斛賑濟紹興府遂差指使保義郎宻克勤徃平江府請取米一萬三千石分下上虞新昌􅌘縣交缷賑濟今月􅀄七日臣廵歷到􅌘縣􅀧撿㩀􅌘縣主簿迪功郎葉梓申承本縣差徃三界鎮交量宻克勤請到賑濟米一萬石依應躬親将本府通判承議郎吳津較量斛斗交量每斛比少米一升五合又令親随斗子葉吉等徑自用斛行槩意在虧减升合兼其米盡用糠泥拌和􅁍乃􅀝恃本府指使對衆抑捺意欲庇護舡稍合干人作弊縁此未敢交量乞施行及㩀本縣土豪黄彦等列狀陳訴宻克勤押到米䝉告示前去般擔並係濕惡夾雜糠泥及每斗不應本塲斛斗去後折欠􅀒累不便臣尋取到米様看視其米多係糠土拌和遂喚到斗子康勝對衆用斛量計每石少欠九升扵内量出一斗篩簸内有泥土碎米一升二合并糠一升一合通約所押一萬三千石内折欠拌和之數計米四千一百六十石臣竊惟陛下聖慈天覆矜憫飢民給賜米斛徳意至爲深厚然以臣所見􅌘縣一帶飢餓之民羸困瘦􅇤宛轉道路呼號之聲不可忍聞其不免扵死亡者巳不勝計其密克勤乃敢輙􅀅官米如此偷盗作踐使飢餓之民不得霑􅀍實惠情理重害不可容恕除巳牒本府通判承議郎吳津逐急用􅌘縣斛斗交量發下本縣賑濟仍拘􅃹密克勤聴候施行及牒紹興府送獄根勘取見著實依法施行外欲望聖慈先􅀅本人重作施行仍令紹興府疾速根勘􅁥追所盗米斛送納入官庻副賑濟奏廵歷合奏聞陳乞事件狀臣自正月四日起奏紹興府迤邐廵歷有合奏聞陳乞事件今具下項欲望聖慈檢㑹臣前兩狀所奏及今所陳事理再賜官㑹三十萬貫速行舊歳之賞痛减度牒之價庻㡬儲備稍豐官吏更敢放手救活飢民其作捺湖埂亦係一縣新年農事利害之大者并乞特依所乞早賜給降不勝幸甚一臣􅀄六日到三界鎮見有餓損人口頗多其死亡者亦巳不少七日至􅌘縣八日至本縣清化孝節鄉所見尤多飢羸尤甚㩀其稱􅀃皆自八九月來闕食至今其死亡者不可勝數道殣相望深可憐憫臣謹巳再扵昨􅀩給賜錢内取撥五千貫付紹興府通判吳津令􅀵拾賑給􅌘縣新昌及三界鎮一帶病困之人庻㡬稍􅀗安存未至一向死損但􅂲錢少不足攴用伏乞睿照早賜接濟一臣􅀄九日入諸曁界所有縣之東南一帶山鄉所見病損人數絶少問之鄉人云是去年稍得􅀵成去處􅁍見令佐鄉官稱􅀃縣北湖鄉一帶接連蕭山病死人多不减􅌘縣臣亦再撥給賜錢五千貫付紹興府通判劉俁令􅀵拾諸曁蕭山病困之人及根刷到􅂆諭上戸賑糶米未曽出糶之數尚有四千餘石巳牒通判劉俁及本縣催促赴塲増添人戸毎戸除單丁外更與一口􅀵糴及有人戸陳訴乞借官錢及早修捺湖埂縁臣曽與帥臣王希吕連狀奏乞給降米斛未蒙應副今􅂲失時浸損二麥兼廢農工巳逐急扵給賜錢内借撥三千貫應副所有三項錢米雖巳攴撥尚􅂲數少未足攴用伏乞睿照早賜拯濟一臣十三日入婺州界以後事體續具奏聞大抵婺州災傷比之紹興府分數頗輕州縣措置亦似稍有倫理伏乞睿照奏上戸朱熈績不伏賑糶狀臣廵歷到婺州界一路飢民頗少本州見􅀅元撥賜米及􅂆諭到上戸米斛置塲糶濟逐日煮粥以給城市鄉村艱食之人亦巳頗有倫緒臣自入境以來每過米塲必親臨視閱其文暦校其升斗小有欺弊即行懲戒至十四日到金華縣孝順鄉第十二都地名十里牌有朱二十一米塲本場即無人在彼糶米㩀貧乏人戸俞九等列狀哀訴本鄉田産盡賣與豪戸朱縣尉去年􅂽旱本縣給暦令就本都朱二十一米場糴朱縣尉米養濟且九等毎日徃來並不曽般米到來致一村人民飢餓其朱縣尉爲見行司到來却扵沿路散榜詐稱糶米施粥及㩀金二等陳訴朱縣尉雖在十四都糶米即與朱二十一場隔逺二十餘里本人令幹人許浩用使私升及濕􅃳粞碎糙米及将人戸官給暦頭擅自批鑿每七升减作五升五升减作四升又有收下暦頭不肯付還百端抑遏無處告訴又㩀人戸周楊朱子智等衆狀告訴朱縣尉典買産業累年白􅀵花利不肯批割物力皆係出産之家抱空代爲送納臣尋令人暫喚朱縣尉取問本人􅀝恃豪強不伏前來遂委金華縣尉追發㩀縣尉迪功郎陸適申依應追喚朱縣尉係極等上戸居屋三百餘間􅀝恃豪􅀔藏隠在家不伏前來竊縁本人家僕叢衆全無忌憚臣又巳行下本州追發亦復不到臣照得朱縣尉係修職郎朱熈績元因進納補受官資田畆物力雄扵一郡結託􅁠貴凌蔑州縣豪横縱恣靡所不爲本縣昨爲第十二都無上戸米斛可糶就近分撥本人在第十二都朱二十一家置場糶米其朱熈績􅂺敢欺凌縣道不伏發米前去洎至臣廵歷到彼又乃詐出文榜稱就十四都出糶致得一場糴米人戸無從得食其在家所糶又皆减尅升斗虚批暦頭姦弊非一所稱散粥亦是虚文日以一二斗米多用水􅄴煮成粥飲來就食者反爲所誤狼狽而歸凢其所爲無非姦狡切害之事及至官司呼喚又敢公然抵拒首尾三日不肯前来若使人皆如此􅂽政何由可辦欲望聖慈特降睿旨􅀅朱熈績重賜黜責以爲豪右姦猾不恤鄉鄰之戒奏廵歴婺衢捄􅂽事件狀臣昨按視紹興府􅌘縣諸曁縣巳具事目奏聞訖續扵正月十一日入婺州浦江縣界歷義烏金華武義縣由蘭溪縣界入衢州龍逰西安常山開化江山縣今有合奏聞事謹具下項一婺州諸邑蘭溪水旱相仍􅀍災最甚金華次之而境内馬海白沙一帶爲尤甚其他又次之惟永康一縣爲稍輕大槩通計比之紹興府諸邑事體殊不侔然諸縣措置不無乖謬以臣所見武義坊郭巳有飢民而訪聞蘭溪金華山谷之間流殍巳衆幸今守臣錢佃頗􅀎究心料理專委通判一員徃來檢察請到郷官五員日夕商議計當不至大叚闕敗臣尚􅂲其所有錢米不足支用巳扵昨蒙聖恩所賜錢内取撥台州處州義倉米錢五萬貫應副本州糴米糶濟伏乞睿照一衢州常山開化水旱最甚江山次之西安龍遊又次之通計其實不减婺州但縁當時州郡吝扵檢放常山開化係災傷極重去處而常山所放僅及一分六􅁵有竒開化又止一􅁵一毫而巳故文案之間但覺災傷輕可而兩邑之民隂受其害不可勝言聞得歳前死亡巳多今之所見羸餓之民亦有甚扵婺州諸邑者西安雖輕扵兩邑而聞芝溪一源向來俞七俞八作過去處人民巳極困悴加之守倅皆巳逼替吏民解弛無復條貫臣竊憂之巳輙行下本州所得朝廷許撥義倉米五萬石内将一萬石專充賑濟專委曹官兩員鄉官三員分縣措置收拾飢餓羸困之人貌驗支給伏乞睿照一婺州諸邑有災傷稍重而廵歴未到處回程當一一􅀧檢别具奏聞伏乞睿照晦庵先生朱文公文集卷第十六福州府儒學訓導舒鏊校
