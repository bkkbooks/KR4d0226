body:
  text: 詩奉同張敬夫城南二十詠納湖詩筒連畫卷坐㸔復行吟想像南湖水秋來幾許深東渚小山幽桂叢􅀊暮靄佳色花落洞庭波秋風􅄅何極詠歸橋緑漲平湖水朱欄跨小橋舞雩千載事歴歴在今朝船齋考槃雖在陸滉瀁水雲深正爾滄洲趣難忘魏闕心麗澤堂堂後林隂宻堂前湖水深感君懷我意千里夣相尋蘭澗光風浮碧澗蘭杜日猗猗竟歳無人采含薰秪自知書樓君家一編書不自圯上得石室􅀉林端時來玩幽􅄨山齋藏書樓上頭讀書樓下屋懷哉千載心俯仰數椽足䝉軒先生湖海姿䝉養今自閟銘坐仰先賢􅀧畫存􅂏繫石瀬䟽此竹下渠漱彼澗中石暮館繞寒聲秋生動澄碧卷雲亭西山雲氣深徙􅀝一舒歗浩蕩忽搴開爲君展遐眺柳堤渚華􅀄出水堤􅀣亦成行吟罷天津句薫風拂靣凉月榭月色三秋白湖光四靣平與君凌倒景上下極空明濯清渉江采芙蓉十反心無斁不遇無極翁深􅂨竟誰識西嶼朝吟東渚風夕弄西嶼月人境諒非遥湖山自幽絶淙琤谷湖光湛不流嵌竇亦潜注􅀝杖忽淙琤竹深無覔處聽雨舫綵舟停畫槳容與得欹眠夣破蓬窓雨寒聲動一川梅堤仙人冰雪姿貞秀絶倫擬驛使詎知聞尋香問煙水采菱舟湖平秋水碧桂棹木蘭舟一曲菱歌晚驚飛欲下鷗南阜高丘復層􅀚何日去登臨一目長空盡寒江列暮岑次韻􅀓丈武夷道中五絶句地乆天長􅀊不留坐來念念失藏舟囬㸔萬法皆兒戯還直先生一􅀏不分符擁節㡬經年聞道方成屋數椽只恐未容髙枕卧却湏持橐聽鳴鞭勲業今從鏡裏休篋中空有敝貂裘死􅁅那復飛􅀭意惠許深慚不易酬常記桐城十載前幾回風雨對床眠他年空憶今年事却􅀃黃亭共惘然諸郎歩武各駸駸季子尤憐産萬金衣鉢相傳自端的老生無用與安心題􅀞卷丁亥小山飛來小坡坨未雨巳滂濞荒此定何人蘇公有遺記呉􅀞妙絶呉生筆飛􅀭信有神羣仙不愁思歩歩出風塵卵研端溪有潜虬孕此金玉質混沌一竅開千年瀉寒液鬼佛􅁳􅄥罔象姿相好菩薩靣􅀑佛吾詎知水石翫竒變范寛山雄雲氣深􅀣老風霜勁下有考槃人超揺得眞性題祝生畫裴侯愛畫者成癖嵗晚倦逰家四壁隨身只有萬疊山秘不示人私自惜俗人教㸔亦不識我獨摩娑三太息問君何處得此竒和璧隋珠未爲敵答云衢州老祝翁胷次自有隂陽工峙山融川取世界咳雲唾雨呼雷風昨來邂逅衢城東定交斗酒􅂬無窮自言妙處容我識爲我掃此須􅁷中爾時聞名今識靣回首十年齊掣電裴侯巳死我亦衰秪君雖老身猶徤眼明骨輕􅂡不變筆下江山轉葱蒨爲君多織機中練更約無事重相見秀野以喜無多屋宇幸不礙雲山爲韻賦詩熹伏讀佳作率爾攀和韻劇思慳無復律吕􅀏覧之餘賜以斤斧幸甚髙人山水心結習自無始五畆江上園清隂遍桃李一堂聊自娯三徑亦可喜試問避俗翁何如尊賢里温公獨樂園在尊賢里門前車馬客無非朝大夫問公獨何事中嵗遽此圖長安二三公髮白形枯臞隱憂念名節亦有此樂無隱憂念名節張大參䟽中語君侯嗜圖史揷架何其多徙居三十乗流汗幾橐駝千載誰晤語端居自絃歌至哉天下樂嵗月如子何西山一何高雲氣出寒麓中有無事人鳴泉遶茅屋宴坐今幾何無以媚幽獨興至偶成篇呼兒爲余讀我居深山中茅舎破不􅀘上見風攪林下有雲承宇聞公落新宫戸牖不可數􅂴惰心力衰念公亦良苦夜吟招隱詩月落寒泉井自非千載人誰與共清景散髮心朗寥凝神味淵永功名恐相期富貴非所幸仙人空山居道意妙羣物度世君則然脩身吾豈不飛行仰雲路趺坐探理窟獨夜扣星壇清齋具簮笏青山背夕陽兹景公所愛虚堂日落時遷坐一解􅅁嵐分疑有處鳥度知無礙湏􅁷暮色來黙黙無與㑹端居屏塵慮萬事付一尊客來語世故舉白當浮君超揺謝衆甫噂沓從諸孫何以自怡恱窓中見秋雲清溪何迢迢上有千仭山山中學仙侣白石爲門關丹經苦吟哦至道窮躋攀豈知人間世風塵縈九寰次劉秀野􅂼食十三詩韻乳餅清朝薦踈盤乳鉢有眞味不用精瓊糜無勞爛羊胃新笋翛翛江上林白日暗風雨下有萬玉蚪三冬卧寒土紫蕈誰將紫芝苗種此槎上土便學商山翁風餐謝肥羜子薑本草云薑乆食去臭氣通神明或云傷心氣不可多食者非是薑云能損心此謗誰與雪請論去穢功神明㸔朝徹茭荀寒茭翳秋塘風葉自長短刳心一飽餘并得牀敷軟南芥黄龍記昔逰園客有佳遺不謂洛生吟輟餐時擁鼻燁菜小草有貞性託根寒澗幽懦夫曽一嘬感憤不能休木耳􅂼腸乆自安異味非所詫􅀣耳黒垂聃登盤今亦乍蘿蔔紛敷剪翠叢津潤擢玉本寂寞病文園吟餘得深齦芋魁沃野無凶年正得蹲鴟力區種萬葉清深煨奉朝食筍脯南山春笋多萬里行枯腊不落盤餐中今知緑如簀豆腐世傳豆腐本乃淮南王術種豆豆苗稀力竭心巳腐早知淮王術安坐獲泉布白蕈聞􅀃閬風苑瓊田産玉芝不􅀵雲表露烹瀹詎相宜伏讀秀野劉丈間居十五詠謹次高韻率易拜呈伏乞痛加繩削是所願望秀野爲憐蘅芷滿芳洲特地臨江賦逺逰十畆何妨自春色萬縁從此付東流静㸔朝市眞兒戯湏信田園是老謀出處知公有餘􅁉未應辛苦謝靈丘積芳圃樂事從兹不易涯朱門還似野人家行㸔靚艶湏携酒坐對清隂只煑茶曉起蒼凉承墜露晚來光景亂蒸霞平生結習今餘幾試數毗那襋上花家山堂􅀒米歸來手自舂豈知門外有晴峰羡公竟日塵氛逺拄頰㸔山幽興濃心鏡懸知不同調詩壇那敢少争鋒空餘逺嶽尋師意箇裏何妨爲指蹤拙政堂􅂹足寧同曵尾􅀛青山終是費心期陶公歸去有餘樂潘令閑居不足追自􅀏十連非所慕未應三徑苦無資明朝謾擁朱輪去猿鶴咨嗟政爾爲香界幽興年來莫與同滋蘭聊欲汎光風真成佛國香雲界不數淮山桂樹叢花氣無邉曛欲醉靈氛一􅀧静還通何須楚客紉秋佩坐卧經行住此中春谷武夷高處是􅅾萊采得靈根手自裁地僻芳菲鎭長在谷寒蜂蝶未全來紅裳似欲留人醉錦障何妨爲客開飲罷醒心何處所逺山重疊翠成堆舫齋扁舟容與小房櫳揺颺簾旌蜀錦紅兩岸兼葭秋色裏一川煙浪夕陽中不愁灧澦􅀟蓬鬢未怯江湖萬里風築室水中聊爾爾何湏極浦望朱宮藥圃種藥春畦有近功不辭耘耔謾勞躬漸㸔􅂎菊充庖下即見芝英入籠中病去自知非徃日身輕何必御泠風出門㑹有兒童􅀏不是當年植杖翁山人方丈方丈翛然屋數椽檻前流水自清漣蒲團竹几通宵坐掃地焚香白晝眠地窄不容揮麈客室空那有散花天箇中有句無人薦不是諸方五味禪􅀛峯樓楊柳東邉桂樹西小樓晴眺極霏微山川政爾供凝目塵土何妨略振衣俯瞰桑田悲物化閑披蘂笈洞玄機却疑欄外連穹石似厭支牀去不歸月波臺潺潺流水注回塘中作平臺受晚凉四靣不通車馬跡一尊聊飲芰荷香韓公無復吟花島楚客何勞賦葯房少待湏􅁷更清絶月華零露洗匡牀挽􅂼園未覺閑來嵗月頻荷鉏方喜土膏匀連畦巳放瑶簮露覆地行㸔玉本新小摘登盤先餉客晚炊當肉更宜人却憐寂寞公儀子抜盡園􅂼不歎貧秋香徑門外黄塵没九逵坊中叢桂長樛枝三秋冷蕊從開落終嵗清隂不改移幽逕秪愁空翠滴濃香一任晚風吹攀援却恨王孫遠惆悵千林時曲池軒去年種竹長新篁今嵗穿渠過野塘自喜軒窓無俗韻亦知草木有真香林間急雨生秋思水靣微風度晚凉却厭端居苦無事凭欄閑理釣絲長前村題下恐當有梅字玉立寒烟寂寞濵仙姿瀟灑凈無塵千林揺落今如許一樹横斜獨可人真與雪霜娯晚景任從桃柳殿殘春緑隂青子明年事衆口驚嗟􅂦味新秀野劉丈􅀉示南昌諸詩和此兩篇􅅬王閣下水􅀄生聞道登臨復快晴帝子詎知陳迹在長江肯趂曲池平山楹雨罷珠簾捲簷鐸風驚玉佩鳴滿眼悲凉今古恨人生辛苦竟何成知向潮邉弄碧漪欄干三撫􅃞晴輝流傳妙語驚離闊想像清游欲奮飛公去不應停驛􅀐我來直欲掛朝衣南州高士何由見且㸔新荷出水稀次秀野韻五首史君簾閣對脩筠起㸔名園雨後春便賦新詩留野客更傾芳酒酹花神未酬管樂平生志且作羲黄向上人秪恐功名相迫逐不容老子卧漳濵滿園紅紫巳爭新百囀幽禽亦喚人蠟屐未妨泥歩穩珎叢終恨雨來頻卧㸔暁色忻􅀄霽起約良游醉好春却􅀏當年金谷燕相隨僕僕望車塵惆悵春餘幾日光從今風雨莫顚狂急呼我軰穿花去未􅁴詩情與道妨蘿􅅁不湏吟社􅀂角弓聊復賦甘棠淋浪坐客休辭醉飲罷晞身向九陽知君乆矣厭喧卑造物尊前喚小兒一釂未應峩側弁十分聊爾快翻巵治中寂寞凝塵日令尹憂勞退食時正好相㝷發􅀌􅀏莫教牢落􅀒心期當年共剪北山莱脩竹成隂手自栽書卷莫教春色老柴荆肯爲俗人開公能顧我傳新句我欲留公撥舊醅悵望南園芳樹底明年應放小車來留秀野劉丈二首好雨當春過一犂我公逺憶故園西􅀌蓬穩轉清灘急十里行穿緑樹齊路熟巳欣經霧市身輕未怕躡雲梯諸孫剰欲留公住細和新詩丐指迷一去屏山今㡬春歸來三逕但荒榛剪除便覺風煙好徙􅀝還驚物色新樓外千林遮去路階前一水戀行塵勸君更作留連計同社追遊苦未頻次秀野滄波館刈麥二詩傳聞泛宅賀新成破月衝煙取次撑鷁首斜飛寒浪急篷窓側轉好山横知公興有江湖逈顧我詩無玉雪清欲跨船舷還未敢幾時得伴鏡中行急本作息貽牟夙昔但聲歌今見郊園樂事多且喜甌簍符善禱未須蘆菔顰去聲妖娥霞觴政自誇眞一香鉢何煩問畢羅我欲賣刀來學稼不知還許受㕓麽小􅀃有人中麥毒夣紅裳娘子悲歌有一丸蘆菔火吾宮之句次秀野躬耕桑陌舊園之韻二首郊園旱乆尺多蹊昨夜欣沾雨一犂巳辦青鞋隨老圃便驅黃犢過深溪農談剰喜郷隣近饁具仍教婦子携指􅀧竹寒沙碧處不知何似錦城西丈人高致邈難干雲夣何如胷次寛老去未妨詩律在人來只怕酒盃乾故開麥隴供家釀更有蘭章付客㸔下走才慳慙囑和願公物色稍留殘又和秀野二首愁隂一夜轉和風暁㸔花枝露彩濃覔句休教長閉戸出門聊得試扶笻物華始信如詩好春色方知似酒濃多謝隣翁􅀏相迓爲言晴暖更過從江臯晴日麗芳華翠竹踈踈映白沙路轉忽逢沽酒客眼明惟見滿園花望中景助詩人趣物外春歸釋子家向晚却尋芳草逕夕陽流水遶村斜次秀野詠雪韻三首閉門高卧客來稀起㸔天花滿院飛地逈杉篁増勝槩庭虚鳥雀噪空饑酒腸凍澁成新恨病骨侵凌减舊肥頼有􅀽生清興在忍寒應未泣牛衣一夜同雲匝四山䁱來千里共漫漫不應琪􅀣猶含凍翻􅀏楊花許耐寒乗興正須披鶴氅㵸甘猶喜破龍團無端酒思催吟筆却恐長鯨吸海乾開門驚恠雪交加亂落横飛詎有涯宻竹不妨呈勁節早梅何處覔殘花山隂客子湏乗興洛下先生想卧家病廢盃觴寒至骨哦詩無復更豪誇次韻雪後書事二首晴煙裊裊弄晨炊雪屋流澌未覺遲擬挈凍醪追勝踐聊穿蠟屐過踈籬掃開折竹仍三逕認得残梅秪數枝不耐嵗寒心事苦滔滔欲􅀃定從誰未覺春光到柳條誰教飛絮􅀝風揺眼驚銀色迷千界夣斷彤庭散百察梅䲧任從長笛弄竹䆫閑把短檠桃何人剥啄傳清唱更喜殘年樂事饒次韻秀野早梅可愛紅芳愛素芳多情珍重老劉郎踈英的皪尊中影微月黄昏句裏香胷次自憐真玉雪人間何處有冰霜廵簷􅀃盡心期事肯醉佳人錦瑟傍次秀野極目亭韻偶向新亭一破顔高情直􅀉有無間地偏巳隔東西路天闊長圍逺近山浩蕩秪愁春霧合輪囷却喜暮雲還不堪景物撩人甚倒盡詩囊未許慳又坐㸔山花落幔顔不知身在翠雲間食寒到處雨復雨客裏歸來山又山􅀌燈閑無心棲鳥暮忘還世情分逐流年去只有詩情老更慳次秀野春晴山行紀物之句秪憑詩律作生涯到處山林總是家便與清尊卧芳草不妨皂蓋拂殘花側聞温詔詢耆艾好趂春風入殿衙回首能忘舊猿鶴一篇聊爾記年華再用韻題翠壁􅀌亭一目盡天涯俯瞰烟村八九家翠壁何年懸布水緑隂經雨墮危花杖藜徙􅀝凝春望覔句淹留到晚衙珎重詩翁莫相惱枯腸􅭒㫁􅁂絲華次亭字韻詩呈秀野文兼簡王宰三首不駕朝車叩九扄獨携靈壽向新亭人言洞裏春長在自慶樽前老復丁魚樂波閑詩欲就鴻􅁳天闊酒􅀄醒晚來却向南堂坐珎重家山數􅀧青吏散庭空晝掩扄行春只到柳邉亭唱酬共喜摛鴻藻來往何勞􅀏白丁一􅀏歌呼從自醉幾年燠暍爲誰醒定知細札褒􅀭後名入麟臺汗簡青幾年寂寞掩柴扄抱膝長吟竹下亭不向參同論納甲且將耘耔付添丁思玄賦罷驚遥舉止酒詩成恨獨醒却􅀏春風兩蓬􅁂飄蕭無復舊時青次山行佳句呈秀野文三首幾日春隂鎻翠巖忽驚飛蓋度晴嵐身輕似起煙霞痼意適寜論禄位貪句法舊超常語六年華今富逹尊三從容􅀏語無餘事興在南山更向南几杖歸來覔故巖眼中猶記舊煙嵐詩情自昔元無敵世味而今更不貪黙數流年欣望八閑尋隱訣話存三小生自愧衰頽早箇裏憑公爲指南曈曈朝日出高巖􅉡􅉡征衣曵暁嵐向來􅀌舊意林泉老去覺眞貪凄凉烟火一百五零落交逰十二三歎世事卧吹横笛過溪南次秀野泛滄波館至赤石觀刈早稻韻緑雲黄半武夷郷碧水縈紆一􅅁長聞道放船飛皂蓋定知行酒載紅裳櫂謳如賀豐年信農家以早稻為晚禾信樂飲閑酬此日凉禾黍誰言不陽豔晚炊流詠有餘香次秀野韻題卧雲菴君家丘壑本圎成何意尋荒入翠屏爲愛晴雲薦􅀌枕故將閑日付新亭夣魂寂寂衣裳冷心事悠悠簡䇿青更把枯桐寫竒趣鵾絃寒夜獨泠泠奉和秀野見留之句閑卧秋山塵事稀西風催喚出巖扉來㸔甲第清泉好更喜仙翁丹頰肥捫虱坐談端未厭連環入夣却思歸明朝振策千峯頂滿䄂瓊琚背夕暉次秀野種粟韻阿香一􅀏走豐􅂭雨遍平疇萬頃中舊喜樊遲知學圃今㸔許子快論功遥憐鬰鬰翻秋隴預想垂垂弄晩風珍重詩翁且彊健東阡南陌興無窮和秀野蘄簟之句史君兩鬂尚青青學道仍抛後院笙溽暑怏眠知簟好晚凉徐覺喜詩成人從蘄水當年􅀉詩比韓公此日清坐對更深誰是伴唯應闕月共長庚次韻􅀉題芙蕖館三首亂山叢裏有江郷華館清波引興長正喜白鷗輕易狎忽驚紅妓儼分行臨流更好揮椽筆俯檻何妨接羽觴共􅀃仙翁閑日月不因春草夣池塘幻成飛閣􅀏談餘便有新荷水靣鋪指􅀧清波浮菡蓞驚呼紅影碎陬隅且將伴侣同盃酒不用君王予鏡湖多少故交臺閣上問渠落拓更能無不須艇子棹歌來且㸔芙蓉靣靣開卷裏有詩都錦繡席間無地可塵埃風清月白琴三弄緑暗紅深酒一盃明日仲宣樓上去越吟應是首頻回次韻雪後書事二首惆悵江頭幾􅀣梅杖􅀺行遶去還來前時雪壓無尋處昨夜月明依舊開折􅀉遥憐人似王相思應恨劫成􅁅沈吟日落寒鴉起却望柴荆獨自囬滿山殘雪對虚堂想似當年輞口莊門掩不湏垂鐵鎻客來聊復共藜牀故人聞道歌圍暖妙語空傳醉墨香莫爲􅁎姜厭憔悴論文把酒話偏長和秀野韻二首聞道無餘事翛然百慮空何心分彼我無地著窮通昨日青衿子明朝白髮翁天機元自爾不是故匆匆乆矣安岑寂山棲恨不深謾將門自掩那有客相尋炙背迎朝景加趺度夕隂感君傳秀句把卷獨呻吟次秀野暑中二首劇暑悲難度清秋喜却回病隨庚伏盡尊向晚凉開臨水㸔雲去鈎簾待月來勝逰驚昨夣曽上欝蕭臺熹新自雲谷還家絶境人難到唯堪樂此身泉吟青玉峽風度白綸巾獨往寧無意長閑未有因雲山天賜履吾道豈全貧雲谷絶頂四望雲山環數百里次秀野雜詩韻葺居二首丈人高卧碧江頭門掩西風萬木秋重喜青山還遶屋却嫌黄葉漸平溝開軒且放浮嵐入决水徐通廢圃流便覺園林頓蕭爽不妨隨境味玄幽向來鞅掌元非病此日徜徉詎有妨自喜登臺閑瘦竹人驚歩屧響空廊高齋雨過新山色曲沼風來舊水光千里壯心殊未巳不應踈􅂴興能長刻漏無疑莫詣君平肆任運休尋季主家謾設銅壺候尺咫閑參玉表驗分差不妨啓處知時節那更榮枯紀嵗華却羡昇平好官府日高三丈放朝衙栗熟樹雜椅桐􅁇國風莫教林下長蒿蓬種􅀣法栗下不得有草木共期秋實充腸飽不羡春華轉眼空病起數升傳藥録本草云人有脚弱往栗􅀣下啖及數升遂能起行晨興三嚥學仙翁蘇黄門詩云老去自添腰脚病山翁服栗舊傳方客來爲􅀃晨興晚三咽徐􅀵白玉􅄴櫻桃浪得銀絲薦一􅀏􅂊堪發靣紅銀絲見杜詩本草云櫻桃服之令人美顔色山藥恠來朽壤耀瓊英小斸頃筐可代耕豢豹於人儘無分蹲鴟從此不須生雪鑱但使身長健石􅂦何妨手自烹欲賦玉延無好語羞論蜂􅁡與羊羮陳闌齋王延賦有蜂􅁡羊羮之句食梨珍實渾疑露結成香葩况是雪儲精乍驚磊落堆盤出旋剖輕盈照骨明盧橘謾勞誇夏熟柘漿未許析朝酲啖餘更檢桐君錄快果知非浪得名本草謂梨爲快果導引聞􅀃牛刀乆不更閑中應接羡門生向來巳悟藏千界吕公詩云一粒粟中藏世界今日何勞倒五行道書云五行顚倒術龍從火裏出按蹻有時聊戯劇居心無物轉虚明舉觴試問同亭侣九轉工夫早晚成假山焚香作煙雲掬水爲瀑布二首平地俄驚紫翠堆便應題作小飛來爐熏細度巖姿出綫溜遥分壁色開獨往但慿南郭几逺游休剪北山萊人言造化無私力珎重仙翁挽得回一簣工夫莫坐談便教庭際湧千巖眼中水石今成趣物外烟霞舊所耽泉細寒聲生夜壑香銷暝靄變晴嵐兒童也識幽棲地共指南山更近南家釀二首銍艾無中熟懽謡闕屢豐但知愁鬂白那復醉顔紅田舎寒如此侯家事不同新醅撥浮蟻春滿夜堂中聞道兵厨盛春泉響臈蒭定知盈榼送不待扣門求沆瀣應難比茅柴秪自羞病身從法􅅞好客爲公留熹近戒酒故有法縛之句旣作此詩而白衣巳至賔朋巳集可謂詩䜟矣一􅀏酒市二首聞􅀃崇安市家家麴米春樓頭邀上客花底覔南隣詎有當壚子應無折劵人勸君渾莫問一酌便還醇麗藻摛雲錦新章寫陟􅁵詩傳國風體興發酒家旗見􅀃難中聖遥知但啜醨盤餐雜鮭菜那有蟹螯持黄雀鮓黃雀飛鳴處交交異竊脂桑扈􅀼脂盖以不食穀得名稻梁求易足羅網去何遲味厚資偏嗜謀踈闕自爲韓彭尚􅉁􅊽么麽爾誠宜㯽榔憶昔南遊日􅀄嘗靣發紅藥囊知有用茗盌詎能同蠲疾收殊効修眞録異功三彭如不避糜爛七非中本草云㯽榔殺三虫柳子罵尸蟲云撃汝鄷都糜爛縦撗七非見眞誥鄷都者六天之一也又五絶卒章戯簡及之主薄暮年藥裹關身切此外翛然百不貪薏苡載來縁下氣㯽榔收得爲祛痰錦文縷切勸加餐蜃炭扶留共一柈食罷有時求不得英雄邂逅亦飢寒向來試吏著南冠馬甲蠔山得飫餐却藉芳辛來解穢雞心磊落㸔堆柈箇中有味要君參螫吻舂喉乆不甘珎重人心亦如此莫將寒苦換春酣高士沉迷簿領書有時紅糝綴玄須定知不著金柈貯兒女心情本自無劉穆之􅀄士爲主簿晦庵先生朱文公文集卷第三考異詠歸橋載事一作載意麗澤堂相尋一作難尋題祝生畫􅂡不一作䰅不和秀野無始一作此始徙居一作徒車茅屋一作華屋茅舎一作茅屋星壇一作星􅄤分疑一作光宜鳥度知無一作風度却無色來一作色新黙黙無與一作此意心黙端居一作幽居清溪何迢迢上有十􅌇山一作清江水悠悠其上有羣山吟哦一作吟誦塵縈一作塵營新筍翛翛一作脩脩拙政堂咨嗟一作驚嗟藥圃􅂎菊一作枸􅂎㑹有一作會見月波臺潺潺一作濺濺秋香徑千林一作千秋曲池軒秋意一作秋思風動一作風度前村眞與一作直與晚景一作晚興驚嗟一作驚嘆秀野􅀉示南昌直欲一作眞欲次秀野韻復賦一作復和共剪一作去剪留秀野春過一作春遇逺憶一作逺意次秀野躬耕隣共一作隣近下走一作下筆又和秀野曉㸔一作曉著休教一作誰教過從一作過逢草逕一作草路次秀野詠雪韻起㸔一作起見猶喜一作聊喜次亭字韻勞􅀏一作勞喚次山行憑公一作憑君福州府儒學訓導舒鏊校晦庵先生朱文公文别集卷第三書胡籍溪先生以下胡徳方家藏昨日節略禮儀尚有二節可疑敢以求教書儀中云壻揖婦降自西階至婦轎所立舉簾以俟前日見先生云古人用車不可升階乃就階下置車故有降自西階之禮今旣用轎子不知只就㕔上否如此則婦先入轎然後降自西階以出矣又婦旣入婿之家婿導婦以入不見有舉􅀩首之禮未知今如何乞批以見教文叔婦旣用轎子則只就㕔上壻却湏就㕔前上馬舉􅀩首之禮温公不說少間檢伊川集續報去也舉􅀩首之禮適檢伊川集有之乃未就坐飲食時行之今想巳不及矣程沙隨可乆逈以下沙隨之孫仲熊家藏示及古韵通式簡約通貫警發爲多四聲互用無可疑者但切響二字不審義例如何幸望詳賜指喻又其間如積劭植囿淺昧晣七字恐合入四聲互用例中不知何故却入此門亦乞見教麒之爲極十之爲諶似亦是四聲例也近因推考見呉才老功夫儘多但亦有未盡處汎考古書及今方言此􅀋盖不勝舉也詩􅀃見此抄寫未畢畢即拜呈求教矣聞人丈頃年見之三山扣以詩中數事甚􅀩知奬但恨不得欵盡其􅀃耳􅃎詩之􅀃則恐未然盖破斧以後諸詩未必是周大夫刺朝廷之詩此自小序之誤耳它日繆􅀃得徹尊聽當爲印證其可而掊撃其不然乃所願也所喻詩論十篇便中幸早見教爲望汀鹽之弊巳極子直之䇿未爲不然横爲諸司所排使不得伸一方之民可謂重不幸矣晦伯書來所欲更張者尤廣觀此事􅀔如何行得近聞諸司於舊法中减落一二小小縻費便謂可革􅀫弊以一盃水救一車薪之火無以異於小兒之戯論甚可􅀏也孝經妄意所疑不謂汪丈亦有此說近亦條具数處并俟後便拜呈也四營成易正爲易字即是變字故其下文便以十有八變承之再扐後掛即所謂再揲三揲者是又一四營也凡爲四營者三乃成一爻爲四營者十八乃爲一卦此以積數文義求之皆無所礙不審尊意以爲如何也月樁條對亦乞頥指録以見教此事從来只是得於耳學竟未知其端的也廣西鹽法近得詹丈書極以爲便亦録得中間解折范容州劄子畫一来而自彼来者無不以州郡窘乏爲言不知的是如何地逺難遥度傳聞亦難盡信大抵近世作事利民者常苦於掣肘而不得行其爲民害者則因循苟且上下尊守以爲不可易設使便有姚元崇眞有濟世之術亦未必得如其意此可歎也又􅀩别帋垂喻俞廣文立二公祠之意使爲記文尤荷不鄙但此事今日老丈在彼晚學小生豈當僣取而妄爲之此决不敢承命若廣文有請於門下它日文成區區得以題額附名左方亦云幸矣幸逹此意於廣文敬泚筆以俟命也前浦城主簿任希夷經由請見幸與其進而教誨之其人有志於學守官不苟王漕亦令去請教也程可乆附子爲近世通用常藥它人服之未見其􅀬老丈乃獨覺其偏有所助致生它疾此見平時所養之厚而所謂無妄之藥者真不可試之驗也二賢祠記前書巳拜禀矣豈有大師在是而晚生小子敢肆妄言扵其側者乎况陳公平生只得一見若汪公則老丈游從之乆􅄬分之深又非小生之比恐不得而辭也因便寓此偶數日禱雨倦甚又積書問頗多未暇罄所欲言向􅀩喻及詩論前書拜請幸早􅀉示謬􅀃巳冩就然尚有誤字旦夕校畢拜呈以求教誨也易中七八九六之數何自而起􅀃者雖衆終未甚安不審尊意以爲如何州縣祈水旱政和新禮所不載而通典開元禮尚有可依放者唯郷村所禱全無可据苟且從俗扵心有未安者亦幸有以教之也鄭尚書惠叔僑見莆陽所刋稽古録後匆匆去國深荷眷存旣行之後又知榻前開陳之力固知高明非私扵某者然不能不以爲媿也區區舟行冐寒阻風昨夕始到三衢更一二日始遂南去病軀幸可支吾皆餘芘之及也郷在長沙嘗得温公稽古録正本别爲刋刻殊勝令越中本欲俟成書奏御未竟而来又欲靣奏行下取索則又未及而去每念此書温公所以願忠君父之志更歴三朝然後成就其論人君之德有三而材有五者尤爲懇切不可不使聖主聞之不知可以一言及之行下本州取索投進否然不必及某姓名恐罪累之跡延及先賢反致忠言不得聞逹也聞中司巳兼讀官幸更與議之同君舉子夀諸公共白之也程允夫洵以下洪正學刋􅁢夫家藏帖先集無人冩得亦多是應用文字非吾弟今日問學所急故不送前書巳詳言何不見悉耶墓刻不敢忘幸且少寛之譙傳非病翁所作乃原仲致中一丈見之其􅀃亦有病非學問正脉也遺書中李端伯劉質夫所録極精可熟味之便見學問正當用力處矣程􅁢夫某重念先世南来八人度嶺今無一人在者而老人暮年窮約以不肖子與世不諧之故憂窘萬狀無一日舒㤗遂以至此尤重不孝之罪毎一念至此心肝如抽裂也某家中自先人以来不用浮屠法今謹用但卜地未能免俗然亦只求一平穩處尚未有定論計不出今冬也所喻立户事無不可但先人巳立户某又自立一户恐扵理未安更詳度示喻程允夫示喻爲學之意此正克巳功夫所當用力然猶是至粗淺處若不痛加懲窒非惟無以仰窺聖賢閫域恐亦無以自立於州里之間矣此甚可懼不可視爲常事而緩於檢制也上蔡之言警切至到真當朝夕提撕然論其細㣲則區區所愧亦巳多矣尚何以爲賢者􅀚省之助乎今當彼此各致其功庻異時相見無所愧扵今日之言耳􅀚書或有所疑因便䟽示閑時冩得便可旋􅀉徳和處此中時有便人徃還也所論向来解紛之意固是如此然亦平日持巳不嚴故擇交不審而責善之道又有所不至故其末流之弊至於如此此當深自悔責而速改之詳味来辭似未有此意恐更當反復鄙言毋以前􅀃自恕也所要文字正冗未暇致思齋銘亦巳忘記又無草本要不必爾但得識之於心而見諸行事則爲有以發於愚言矣祠閣二記皆不成文字但欲畧見此義理故不得而辭来喻之云非所望於親友間也近思巳成尚未􅀉到到即附去中庸無人冩得只有一本不敢逺􅀉且亦未定不欲廣傳也定性書觧在别帋亦勿示人爲佳雲谷記巳冩􅀉李文矣程欽國後更字允夫家藏帖以下新安汪逄龍刋允夫徃年誤欲作文近年頗􅁴非力所及遂巳罷去不復留情其間頗􅁴省事講學近見延平李先生始略窺門户而疾病乗之未知終得從事於斯否耳大槩此事以􅆂養本原爲先講論經㫖特以輔此而巳向来泛濫出入無所適從名爲學問而實何有亦可􅀏耳示喻蘇程之學愚意二家之􅀃不可同日而語黃門議論所守僅賢其兄以爲顔子以来一人而巳恐未然頃因讀孟子見其所說到􅂃要處便差了養氣一章尤無倫理觀此想淵源來歴不甚深也正􅀩建陽舊有本近來乆不曽見俟病少間當爲尋問也然此書精深難窺測要其本原則不出六經語孟且熟讀語孟以程門諸公之說求之􅆂泳其間當自有得然後此等文字可循次而及方見好處如今不湏雜愽却不濟事無收拾也若果於此有味則世間一種無􅂃要文字皆是妄言綺語自無功夫看得矣近集諸公孟子說爲一書巳就藁又爲詩集傳方了國風小雅二書皆頗可觀或有益於􅀄學恨不令吾弟見之又恨相去稍逺不能得吾弟來相助成之也程允夫表叔墓刻不敢忘重煩督趣愧恐然此尚有少曲折異時得靣論而後下手乃爲穩當先集亦難於出之正亦有所疑耳吾弟近所爲詩文有可􅀉示者否某向到湘中語甚多然皆草率不足觀謾令大兒冩拜魏公墓一篇去此等閑言語正使絶出亦何所用况又不能佳乎然姑以􅀉意焉可耳程允夫觀志觀行此章上蔡謝先生言之最詳盡大抵聖人本意只論孝子之心耳至於事有不得不改者又出於不得巳非其心本然也此義亦通上下而言不必專指人君也天命之謂性則通天下一性耳何相近之有言相近者是指氣質之性而言孟子所謂犬牛人性之殊者亦指此而言也自聖人言之忠恕即道也曾子之言是也自學者言之則由忠恕可以至道也子思之言是也二先生及上蔡論此詳矣冝深體味之不可只恁麽􅀃過浩然之氣大剛直當從伊川之說更冝深思必有事焉而勿正心勿忘勿助長此固是下功夫處然於此湏識得箇夲體始得明道舉鳶飛魚躍活潑潑地以爲與此意同湏要識得方有下功夫處不然才着意便是正才不着意便是忘無有是處聖人之於天道詳來問似看此章大意未分明摘句理㑹冝其不通心徃一叚語皆有病心固未嘗亡但人舎之則有時而不自見耳所謂道心惟㣲者此也程允夫聞以職事忤上官暫移他局不知所争何事若所當争乃見所守此外榮辱不足道也昨誤聞劉智夫得江西倉臺即以書道吾弟及一二知友姓名得其書乃云雖出妄傳然巳爲轉語王南強矣計必能相知但未知新憲爲誰耳此辭職告老皆未允而向来阜陵異議之人趙詹皆巳行遣此獨漏網有所未安巳上自劾之章矣上意必無他但􅀔必不免於何劉之口亦巳判然於心不復爲求全計矣程允夫某病脚恰一月矣尚未能履地而時論又攻之於外因知語黙之有時然語巳在前矣今欲黙之能有所及乎學徒不欲一旦盡遣恐或反致張皇然巳不多自此来者勿受可也帋尾之喻巳悉然臯陶宥之而堯曰殺之毋乃兩失其職耶彭子夀􅀛年以下止堂之孫沚家藏中間傳有召節固疑其非美意巳乃不然方以爲喜及承惠書又知開府以来經理次第尤以爲慰然以時􅀔料之亦決知其不能乆既而果聞巳有奉祠之命矣却不見有文字想又從中而下也此在高明無所輕重但鳴吠唁唁日甚一日其􅀔必湏大有處分其禍不止於縉紳而巳也想以此故亦未能釋然柰何柰何某今夏一病幾死亟上挂冠之請并辭近職􅀩上厚恩未即聽許將欲受之而去􅀊曾議菆陵者例皆􅀗罪自惟狂妄不應獨免遂以自劾章上計今巳有行遣顧地逺未即聞耳閑中讀書却有味但目巳偏肓其未肓者亦日益昏披閱頗艱耳縁此閑坐却有恬養功夫始知前此文字上用力太多亦是一病盖欲應事先湏窮理而欲窮理又湏養得心地本原虚静明澈方能察見幾㣲剖析煩亂而無所差若只如此終日馳騖何縁見得事理分明程夫子所謂學莫先於致知又未有致知而不在敬者正爲此也濂溪諸書亦多是發此意下問之意但以此說推之則其受病之原與夫用藥之方皆可見矣雄附逺􅀉良荷扶衰之意茶五十餅漫附回使以供粗用背時可􅀏大率如此也薌林逝去在渠高年固無憾但後輩失此典刑亦自可恨也舟御不經于越否亦聞否度不免一南轅得免喻嶠幸也茂獻必相㑹賤迹旣不自保又深爲諸賢憂之夏中之病由此増劇中間幸小定今又復作人謀不可及矣柰何柰何彭子夀得張元德書􅀼聞大斾巳次豫章今當稅駕里門矣乍歸想一畨應接有不能免者然自此杜門少休神觀益得玩心率究大業安知天意不以是玉汝於成乎願益勉旃以慰期望零陵經由頗得從容否復有一書幸爲遣致得不浮沈乃幸孫季和應時以下季和之子祖開家藏某到此縁所請未報􅀖人恐虎兕復出於柙邀􅇔不得去巳申省且留此矣黄岩糶濟得伯和諸公在此啇量雖未有定論然亦當不至踈脫但水利一事諸公以爲非得一見任官主持不可下手某巳撥萬緍今使與食利人户興役矣諸人欲得賢者復来見欲差出縣丞却煩吾友攝其事主此工役不知可來否專令此人奉問幸子細籌度見報若不穩當則當别爲申奏專差措置水利亦無不可但在賢者之來與否耳如不可来幸爲計度見任官中有何人可委謝户如何欲煩詢之不知渠肯來否此事非小若得黃巖無水旱則無飢饉之憂向後乞得錢更増益之耳度本路水利未有大於此者餘姚之旱與上虞分數如何幸愽詢見諭孫季和燭溪蕭寺頃􅀊盖嘗一至其間今聞狹書過彼亦有學子相從不勝遐想也精舎諸題悉煩着語属意皆不淺三復歎想恨不即同晤言也比來觀書日用必有程度及所得所疑有可見告者因來及一二以發講論之端爲幸孫季和來喻諄悉備詳爲學次第甚慰所懐大抵學者專務持守者見理多不明專務講學者又無地以爲之夲能如賢者兼集衆善不􅀝於一偏者或寡矣更望虚心玩理寛以居之卒究逺大之業幸甚武夷佳句足見雅懐更求小詩數篇暇曰見􅀉孫季和先志不敢忘但以家居困賔客無縁得就今旣之官却恐應接稍希可以具藁便并送崇禮處令轉致也但書石湏更属人盖目昏殊甚不堪此役一破例之後求者繼至無詞可以却之朋友間如楊子直書儘有法如不識之當爲轉求也孫季和示及易說意甚精宻但近世言易者直棄卜筮而虚談義理致文義牽強無歸􅀫此弊乆矣要湏先以卜筮占决之意求經文本意而復以傳釋之則其命詞之意與其所自來之故皆可漸次而見矣舊讀此書嘗有私記未定而爲人傳出摹印近雖􅀵毁而傳布巳多不知曽見之否其􅀃雖未定然大槩可見循此求之庻不爲鑿空強􅀃也如元享利正只是以卜得此卦者大亨而利於正耳乾卦􅂏傳文言乃孔子推說非文王本意也又嘗作啓􅀩一書亦巳板行不知曽見之否今徃一通試看如何書小序又可考但如康誥等篇决是武王時書却因周公􅀄基以下錯出數簡遂誤以爲成王時書然其詞以康叔爲弟而自稱寡兄追誦文王而不及武王其非周公成王時語的甚吴材老胡明仲皆嘗言之至於梓材半篇全是臣下告君之詞而亦誤以爲周公誥康叔而不之正也其可疑處􅀋此非一太史公雖用其體而不全取其文如啇紀中所載湯誥全非今孔氏書也雖其詞厖亂不若今書之懿然亦見遷書之體或未必全是師法書序也漢書遷嘗從孔安國受書大抵古書多此體如易序卦亦是此􅀋若便斷爲孔子之筆恐無是理也先墓志文不敢忘但爲歸來悲冗中未暇落筆今當少暇旦夕得成當并􅀉叔度轉逹也記序諸篇大意皆正當而詞指清婉可喜此雖餘事然亦見游藝之不苟也入蜀不過荆門否近得劉德脩一書今有報章并書􅁽一匣􅀉之煩爲帶行逹之此公未識靣而書來極勤懇前日之舉全􅀋東漢諸賢計雖甚踈而其意則甚誠切矣亦可敬也恐帥君以姻家之故不能無嫌湏調護之此非爲劉乃爲丘計也可嘆可嘆孫季和某衰老多病益甚於前今兩足拘重不復能動巳兩三月矣度氣血巳衰無復完徤之理只得未死且爾引日巳爲幸矣然世道如此臭味凋落日見稀少亦何用乆生爲也乆欲告老今方及格不敢自請而外郡不爲保奏只得一申省狀亦且發去或者恐觸禍機然不暇頋也向承喻及祠記碣文以例不敢爲人作文字遂不復曽致思所示行實諸書亦巳卷藏不在目前自此或有便别爲冩一通來暇日試爲整齊看如何然必三年然後出之時運固叵量但恐夀非金石不能俟耳祠記亦然但子游之封在唐爲呉侯在政和爲丹陽公而淳熈所頒祀禮乃爲呉公盖十子皆因唐之舊自侯而公然不知何時所加頃年曽爲申請禮寺行下亦無的文今納長沙所刻一通去可試考之也帋尾無可講說之云可爲􅁣歎此固無復可以及人但不知年來自巳分上功夫又如何似聞頗留意於詩文此亦恐虚度光隂也有如衰朽至於今日乃始追恨向來之􅂴惰今欲加功而日子鋪排巳不遍矣此當以爲戒而不可學也孫季和昨需祠記本不敢作以題目稍新不能自巳略爲草定數語謾録去度未可刻以速涪城之禍幸且深藏之也孫季和史公入覲不知復何所處禮畢亟歸亦佳事也某去秋以病請祠不遂此間亦可少安而忽有長子之䘮悲痛􅃤怛無復生意請祠諸公巳相諾而未􅀍命計旦夕即去此矣乆欲遣人至越中而未暇及今始能作書而迫行匆匆又不暇詳悉所委文字亦未能遂就然不敢忘異時未死終當如志也新刻數書各往一本崇禮兄弟欲各􅀉一本而偶盡遂不能及亦不暇作書只煩爲道意也寧海僧竟如何秉彝好德豈容泯㓕於此可驗試􅀉語招呼之若其意堅可率朋友合力助之以成其志亦非細事也劉子澄清之以下廬陵胡翼龍刋静春家藏帖昨承有召命深以爲喜然亦不知行止之計偶到城中黃子來相㝷具言近况爲慰但求教竟不之領又以爲恨比日伏惟于役有相今或巳至在所矣奏對得以伸􅄍所學甚慰士友之望正學以言而不失淺深緩急之冝在賢者必巳講之熟矣黃子又􅀃頗欲多所論白此恐徒取草野倨侮之譏而匆匆晷刻之間􅀔必不容詳細反復則是無故徧觸衆事之機紛冗錯雜而終無感寤之理不若略舉大體切於上心者專指而極言之幸而開納固爲莫大之幸萬一未即聽從亦足以爲之兆異日猶可㝷繹其端緒而終其􅀃也它則非閑人逺書可以一二指陳者在明者熟慮而徐應之毋爲匆匆以致後日之悔也黃子又􅀃見問人材之意此等事度非吾輩事力所及正不湏太遽也劉子澄某幸如昨但伯恭逝去令人悲痛不可言昨嘗以子約計告作書宛轉托子静送去相報近聞渠巳入浙此書恐未即逹然訃報中必巳見之傷悼之懐相與同之也去年方哭敬夫今伯恭又如許吾道之衰一至於此不知天意如何吾人不可不自勉未死巳前恊力支撑也某在家應接隨分擾擾偷閑脩得中庸及孟子下􅁽孟子得公度卷子甚濟事也今且修此經書通鑑看將来如何恐心目俱昬未必了得終遺恨於身後耳西山長句及還家四言意象蕭散吟玩不能去心欲作數語奉答目􅁴意思局迫恐不能佳此是膏盲之病不知如何醫治得寛平間暇些子庻晚年身心稍安樂也沅淬令兄墓表草定納呈不知可用否公度何爲至今未歸報中亦未見所擬官何耶曾子䟦語并徃歸來方得細看雖雜篇所􅀵不如前意思終是好本子見録未得附還更有一二處當畧脩耳近思續録俟旦夕看畢奉報第三録亦佳但如此編録得無勞心否因看書所得隨手抄録不妨若作意收拾搜㝷布置即費心力亦湏且省節爲佳也盖中年精力非少日之比不可不愛惜耳諸􅁑學須静也全文告因便録示千萬荆州論語甚改得好比舊本大不干事若不死更長進深可痛惜伯恭詳審穩當有餘却不及此公俊偉明快也韜仲不苟如此不易其兄晦伯亦甚好它日皆未可量也子玉不聞問旦夕有􅀹川便當􅀉書與之擇之何爲至今不見歸直卿近遣人來納幣甥女不成却是某女子也渠來春同爲金華之行今旣聞伯恭訃决當如約某當一與俱往哭伯恭亦不欲爽前約也鄭景望亦殊可傷前書當報去矣陳正巳今在甚處公度當巳歸来春之約不知竟如何也某忽隨例沾誤恩念有罪無功不敢受又昨奏與獻米人推賞諸公不爲施行前日不免於詞免狀中極論其事逓中得周參書亦於報書中懇之未知竟如何聞江湖間水旱螟蟲民巳荐饑不知州縣有無措置然今年比之去年事體尤不易也廬陵當不至此此間却差稔但剽掠公行甚於常􅀊州縣坐視不復介意此亦殊可慮耳眷集中外俱安諸郎一一佳茂愛女夭折可傷平父次女與㤗兒同􅀊向許議昏近亦不育其女㓜而解事甚可惜今此兒未有親不能不掛懐抱耳向丈得書却来􅀃及薌林集要序甚恨未得見也序文豈敢僣易然此却好題目但恨晚輩不當作又苦心力衰畏作文字耳景陽明年且在致逺家否向見其􅀃話意􅃐儘好恨不得欵曲講論今旣相逺又無由得相聚耳向得書朱君岑何字偶不記憶更告批喻彼中交遊學生并爲一一品題以来尤幸吏老所薦皆淛東知名士亦不易但陸子静亦入此保社不知果巳行未耳惠况􅁓墨筆帖良以愧感無物可􅀉􅀕禮及二小書謾往幸收之昨得延之處􅀕禮三家方属鄭丈􅀘入而渠巳物故旦夕更属新將也弟子職女戒本各爲􅁽而皆以雜儀附之令人家小兒女各取一本讀誦爲便也今此冊爲印者所并又缺雜儀一本不容復改然此無多字致逺更能鋟版流行亦教化善俗之一事也但女戒向見伯恭說欲刪修一兩處忘記問之不知向來曾􅀃及否吕氏二書似亦可刻并廣之也劉子澄某還自莆中道間大病幾不能支卧家月餘幸未即死然神氣衰憊比之春中又什四五矣雲臺將滿方欲俟批書畢遣人宛轉致懇復求舊秩忽尤延之送勑来乃􅀩朝廷檢舉直差雖似小小行遣聞新揆却甚以爲恩意亦爲一畨勞擾但去冬案後􅀵坐未曾决遣不知此又折得過否耳只恐反露綫索觸着駭機亦復任之不能深以爲憂也王漕送示二月十一日手書三復喜慰不自勝但趙南紀云長沙中冬巳見報而老兄正􅀄始得知之何其晚耶今自劾之章復乆未報不知何以處之要當極力再請以得爲期得朝士書皆云爾其相郷慕而未相識如張元善者尤拳拳也先聖象荷􅀉示然此乃湖學所藏昭陵賜安定本向見陳明仲有之因託定叟傳得其温良恭遜之容比此又精善恨未得令兄見之也所謂顔子者相傳是伯魚薛士龍亦云恐湖學當有所傳也偶有便人草率附此不知書到時朱􅙲皂盖巳在甚處所欲言甚衆例不敢岀自􅁴近日意思頗似向來所甚惡者喻王泉之論矣年力頽侵志不勝氣至於如此可懼可懼愛直記文甚佳昨日拜鴻慶勑偶得一絶云舊京原廟乆烟塵白髪祠官感􅁣新北望千門空引籍不知何日去朝真年衰易感不􅁴涕泗之橫集也劉子澄呉大年附到春間所予書足以爲慰比想經暑渉秋尊體益佳健但不知求去不遂之後諸事又當如何想亦不以此而改其度也細讀來書似於此未能忘懐獨􅀩記憶之語又似戯謔病根依然故在也克巳功夫不是易事願益加意而勉焉則區區之幸也王子合遇子合之姪孫鎔家藏前書所喻􅀕禮之位昨因嘗以爲疑但不如此又難區處若只祭三世猶可以曾祖考妣居中而祖東考西然東位考妣之坐巳自難設祖考東而妣西則妣坐迫近曾祖不便考西妣東又與今人坐次相反若􅀕四世則一位居中二位居東一位居西殊不齊整兩兩對設又似敵體不分尊卑况左昭右穆亦是異廟而廟皆南向即與今人相向設位不同又相向設位則舅婦之坐東西相見亦甚不便似不若只以南向西上爲定之爲愈也晦庵先生朱文公文别集卷第三候官縣儒學訓導劉簮校晦庵先生朱文公續集卷第三答蔡季通昨日之别令人黯然然觀賢者處之􅁉如又足强人意也不審晚間便發程否前途千萬加意調節言語諸事更宜謹密飲酒戲笑皆宜切戒歸來便覺有相窺伺者次第恐亦不免乆當自知之一書至直卿亦煩爲託周幹附去或遞去前日亦忘此可見昏罔也昨日二尺短者是周尺長者是何尺耶是景表尺否皆望批喻自奉别後惘惘至今不能忘于懷計行巳過杉嶺不審道間爲况如何武陽曽少留否旣不登車只得緩行無傷吾足乃佳耳一路皆有知舊必不落寞但恐却有􅀿接之煩耳某幸無它諸生旣來遣之不去亦姑任之􅀂有禍害亦非此可免也但極難得人講究文字義理深處便無人可告語殊憒憒益懷仰耳至舂陵煩爲問學中濂溪祠堂無恙否某向有一祝版亦不知在與不在因風語及也别後只得到豐城及宜春書知途中諸况足以爲慰但至今尚未聞到舂陵信深以爲念毎至讀書講學無可咨扣無可告語尤覺仰德之深也三哥子陵一一安佳某足疾前日幾作今又少定未知竟如何但精神日耗血氣日衰舊學荒蕪有退無進恐遂没没無聞而死耳樂書非敢忘之但方此齰舌豈敢更妄作耶此書决然泯没不得近㸔他人􅀁說更無堪入耳者不知老兄平日與元善相處曽說到子細處否但恐子期不曽􅃪得便只似不曽說也近因諸人論琴就一哥借得􅀁畫圖子適合鄙意乃知朝瑞只說得黄鍾一均内最上一弦而􅃍欲以論琴之全軆宜乎膠固偏執而無􅀁合也學不欲陋豈不信哉昨州兵之歸得書知巳到彼足以爲慰僦居寛廣物價㢘平足以度日此外想無他撓高懷􅀁處亦無適而不安也趙守得書甚留意寺居雖有約束然逺郡荒僻舍此則無以待賔旅往往亦不能一一遵守頃在南康此寺常爲客館􅀂自逺嫌不欲居之則亦無害更託人宛轉白之使知曲折可也翁丞便是德功丈之孫否耶渠向來坐事乃尊來見囑力不能及之想未必不見訝也禮書附䟽未到巳與一哥說不􅀂俟斷手後抄之今只寫得一截無䟽尤不濟事也三哥爲况如何想不廢讀書作文比之家居更省􅀿接當日有新功也此間塊處有疑無􅀁講殊覺憒憒昨因見人說琴無歸著謾䟽􅀁疑得數千字欲寫奉􅀉而昨晚一哥方報今日便有人行遂不暇及當俟後便也或有鄭尚明琴史十餘卷緊要處都不曽說著只是閑話耳其書亦是集古今人􅀁說乃止如此是凢事不曽有人理㑹到底也以法言之亦當用旋宫法但恐以諸短律爲宫則弦不惟不可彈亦不可上矣故或說琴只用黄鍾一均似有此理然又只成隋文帝何妥之樂可􅀏耳可預考之俟􅀉􅀁草去求正也頃奉記後厚惠書具聞動息足以爲慰居夷當巳成趣但能素位而行亦何入而不自得也但聞三哥不快甚以爲念計今當已向安矣覺得渠書中語意似放未下更當有以開曉之也琴說納呈幸爲訂其繆子細見喻更有一圖無人畫得大率與候氣淺深同是一法第一弦尤可見其下諸弦乃遞儧向上取聲耳精舍巳空眼前朋友亦不長進只前日永嘉一二人來稍可告語今巳去矣參同契史無􅒌罅亦無心力思量得他但望它日爲劉安之雞犬耳到此見人說趙守家人歸云自始至投館光孝而寺僧自言於官云此人長大恐不能制遂移它處此必戲語可發一笑也素患難行乎患難吾人平日講之熟矣今日正要得力想爲日旣乆處之愈安不以彼此遲速貳其心也趙守易地後來者不相識元善必巳報去矣賤迹復挂彈之繼此湏更有行遣只得靜以俟之􅀂得在湖嶺之間庶得聲問易通亦一幸也律書序客中不暇檢㝷湏俟還家即爲整葺後便奉􅀉也彈之恐當作彈文三哥􅀁苦痁疾想巳向平復千萬寛心將護着頭緒讀書􅆂泳義理乆之有味自不見得世間利害榮辱之有異也閑中些小疾疢􅀁不能無但在我者巳㸔得破把得定則外物之來終不能爲吾患矣􅀁喻雖知巳放得下然亦不必大叚安排也趙守長厚乃􅃍它適新侯聞是黄門之後但無人識之不知又如何􅀂得其有家法思舊事必能善視遷客也􅀁需律序乍歸未暇檢㝷舊本旦夕得之即寫未􅀉去鄙意但能說得有􅀁據依而非蹈襲之意它不能有􅀁發明也禮書未附䟽本未可寫以見喻再三恐亟欲見其梗槩巳取家禮四卷并巳附䟽者一卷納一哥矣其後更湏年􅀊間方了􅀡卿又以憂歸前日到順昌弔之渠云歸安葬畢却可與履之兄弟大家整頓也琴說向􅀉去者尚有說不透處今别改定一條錄呈比舊似差明白近至政和見陳廷臣朝老崇寜間以布衣上書論事謫居舂陵作詩甚多亦有佳句陳乃政和人議論鯁切不易得也不知彼中尚有其踪跡否昨附去琴說有一圖說逐弦五聲者此却失了元本煩三哥爲檢錄來只依元本闊狹界行填注不湏更寫前後說也精舍閴然時有一二亦不能乆法器固不敢望其能依人口說着實讀書者亦自殊少甚可歎也間亦自思此理人人有分不應今日獨如此難啓發恐亦是自家未有爲人手叚無以副其逺來之意甚自愧懼耳呉伯豐在後生中最爲警敏肯着實用功近年說得儘有條理乃不幸而蚤死死後聞其立志守節不爲利害移奪尤使人痛惜也汝玉彦中乃能相念如此甚不易得得楊子􅀡書亦奉問但似云不敢相聞前日答之不曽入題只云小時見趙忠簡李參政諸公在海上門人親舊􅀊時問訊不絶如胡澹菴猶日與知識唱和往來無􅀁不道秦檜亦不能掩捕而盡殺之蓋自有天也以此知人之度量相越其不啻九牛毛旣可歎惜又可深爲平生眼不識人之愧也周純臣頃有一書託直卿􅀉之而不能逹却持以歸今再作數字并附去奉凂能爲轉􅀉幸甚然湏有的便乃可遣也陳廷臣在營道不乆故人少識之然見其詩亦頗跌宕想亦以此不爲人􅀁敬耳别幅􅀁示郡中諸賢聞之不勝悚歎趙守篤老靜退子弟皆賢誠不易得其名謂何幸批喻也歐陽君回書幸逹之楊安諸公恨亦未之識幸各爲致意也張舶似亦略曽相識王參政早􅀊休官泊然無求於世而晚爲秦檜􅀁用傷害忠賢助成凶虐以此得罪於清議朱衣道士諄諄之誨豈無意耶此語密之隂君丹訣見濂溪有詩及之當是此書彼之行此而壽考乃喫豬肉而飽者吾人􅀁知蓋不止此乃不免於衰病豈坐談龍肉而實未得嘗之比耶魏書一哥巳刻就前日􅀉來此必􅀉去矣校得頗精字義音韻皆頗有據依逺勝世俗傳本只欠教外别傳一句耳前書亦嘗泰和弦望之說不知然否近因再㸔又覺主驗明白新本金本是日生恐誤作月字因來更望詳以見告也􅀂來喻􅀁謂非入靜不能見者此實至要之訣但人省爲擾擾不能一意向裏􅆂泳三琴圖此亦失却舊􅀁畫本旦夕得暇當令在子更依候氣說畫出續􅀉去也禮書前卷巳有次第但收拾未聚後卷則儘欠功夫未知能守等得見此定本全編否耶楊簿竟如何江西士人不患不慷􅁣但於本領上多欠功夫耳湯宰􅀁編黨人遺事􅀂曽傳得幸略見示泰和恐當作奉扣人省之省字恐誤前日丘仲高行後㝷得律書序草今略序定又適有彦中處便人過門因附以行度必先丘子到也年來精力衰退文字重滯無氣􅆋此又是三五年前者今日亦做不得矣它􅀁欲言略具前書其不能盡者亦非此􅀁能盡也序中恐有未是處更告詳細􅀧檢一一見喻不敢憚改也自餘千萬自愛爲禱客中得一二同志早晚講論想亦不覺度日也近報令臺諌侍從集議赦條前此未嘗有此豈欲大施沛宥盡釋纍囚也耶但在我者只得爲乆駐之基耳諸朋友􅀁讀何書其􅀁講論亦有可示及者否此自城歸後學館一空亦自省事閑中却自㸔得少文字但昏忘日甚過眼輙不復記覺得不是讀書時節只好閉目靜坐耳琴說前巳􅀉去後又􅀉改定數字不知巳到未律書序亦巳附草本去因有回便幸喻及可否也周南仲竟不免近日方見報行章䟽甚可􅀏也蘇守巳屬計臺矣三哥不及别書想閑暇儘得讀書作文也參同契一哥巳下手刻版矣轉㸔轉曉不得霈恩曠蕩未聞施行而留趙四公存没之恩皆格不下未知賢者去住復何如計高懷必有以處顧舊山朋遊未得􅃍承晤徒爲恨耳諸喻巳悉偶連日脚氣上攻今方少下而右拇緩弱不能握筆又亟欲上五夫力疾撥冗附此數字似聞有􅀋聚討論之㫖仍有期限然則不過中春亦湏見得果决􅀂便歸得何其快也似聞從游之士日衆其間當有可與晤語者則爲况亦當不至落寞旬呈免與不免本非􅀁較康節先生􅀁謂打乖正謂此也一哥兄弟亦自識道理曉事勢凡百􅃘耐不至有他此間如封贈奏薦皆不敢陳乞元善遣使請祠巳至都下聞劉趙徐吕之報亦復縮手平生謾說隨時之義只是傳聞想象今日始是身親歷過與口說不同想亦深得此味也答蔡伯靜啓䝉巳爲㸔畢錯誤數處巳正之又欲􅄈兩句想亦不難但注中尊丈兩句不甚分明不免且印出俟其歸却商量今不能乆俟也筮儀内前日補去者更錯兩字今亦并注可正之亟遣人還草此但㸔得不甚子細可更自㸔一兩過爲佳也事了能見過爲數日􅅃幸甚或於啓䝉上卷之末􅄈數句云卷内蔡氏說爲竒者三爲偶者二蓋凢初揲左手餘一餘二餘三皆竒餘四爲偶至再揲三揲則餘三者亦爲偶故曰竒三偶二也如何天經之說今日􅀁論乃中其病然亦未盡彼論之失正坐以天形爲可低昻反覆耳不知天形一定其間隨人􅀁望固有少不同處而其南北高下自有定位政使人能入於彈圓之下以望之南極雖高而北極之在北方只有更高於南極决不至反入地下而移過南方也但入彈圓下者自不㸔見耳蓋圖雖古􅀁創然終不似天軆孰􅀂一大圓象鑽穴爲星而虚其當隱之䂓以爲甕口乃設短軸於北極之外以綴而運之又設短柱於南極之北以承甕口遂自甕口設四柱小梯以入其中而於梯未架空北入以爲也平使可仰窺而不失渾體耶古人未有此法杜撰可􅀏試一思之恐或爲即著其說以示後人亦不爲無􅀘也梯未之未疑當作末天經巳領其論撰詳悉亦甚不易但回互蓋天頗費力只是近年一􅌉見識不欲惡着古今一个人耳其心則固深知渾蓋之是非也然則孰􅀂據實而論之省詞說乎又况二極交互一說理似不然别􅁓附去可爲詳之不知是如此否尊丈許録示參同火候向見巳寫得多了今必巳竟幸即檢示前日尊丈書中巳云與一哥說更煩留念也歩天歌聞亦有定本今并就借校畢即納還也參同定本納去可便寫白并元本􅀉來更㸔一過然後刻本乃佳簽貼處巳改􅀘矣一兩處無利害又灼然是錯誤即不湏改也玄溝害氣恐未是說人身内事方是設譬之詞緩讀可見也肝肺腎是三物脾是戊巳無可疑者定本亦巳􅄈入矣渾象之說古人巳慮及此但不說如何運轉今當作一小者粗見其形製但難得車匠耳參同契考異方寫得了亦未暇再㸔過今附壽朋納去并此中寫本一􅁽􅀽本一􅁽濟本二􅁽煩逐一對過有合改處並貼出子細批注􅀉來容再㸔修定方可寫白刋行丘夲不甚佳然豈相􅀋篇首却得刪了四字遂可讀改得一字遂叶韻亦不爲無􅂇可試檢㸔以此知讀書不可不愽考也參同考異今以附納其間合改定處各巳摽注其上矣鼎器歌中七聚聚一作竅恐合改竅爲正而以聚爲一作不知如何可更審之􅀂改即正文此句亦合改也自尊文行後惘惘至今不能平適得晦伯報云得近書又不言巳到何處殊増悵想也尊堂不審處之何如不能不以爲念然當有以寛譬之此亦無它害只是如前年逺出一畨耳輿地志納還皇極經世及樂府集却望檢付去人臨川曽景憲書云尊丈巳過彼有以驢爲贈者可免徒歩之勞也昨㸔史記曆書大餘之數第二年即差小餘之數第三年即差以後皆筭不合不知是如何尊丈必曽說夾幸批喻尊丈得近書否此乆不聞信息必是巳過莆中矣啓䝉上􅁽三十六版注中圍一圍當作徑下􅁽第二版前十卦占貞後十卦占悔兩占字並當作主可便改却此三字更子細㸔過爲佳夾恐當作來鄕見尊丈有琴律吕律圖欲略借一觀得檢尋付去人爲幸營道有歸信否數日與人講論有得無可告有疑無可質始覺尊丈之逺爲可恨也奉告乃知􅀁苦脾疾乃爾赤土之約固宜少緩别俟一信也公晦之說極可􅀏其曲折湏靣論尊丈千里逺書戒賢者兄弟勿爲人􅀁誤正爲此耳尊丈要琴絃今欲􅀉去不知何時有便湏得有信掩或籠箱之屬置之其中乃免壓摺損拆之患亦俟一報也伯謨說尊丈有素問運氣節略欲借一觀比略編得些小其間不曉處多問伯謨渠亦茫然未嘗措意以此知尊丈事事不容易放過不可及也書白字畫不方正努胷垤肚甚刺人眼然巳寫了無如之何不知鄕里如何似此一向不識好字豈不見浙中書􅁽只如時文省榜雖極草草然其字體亦不至如此得人憎也復卦處空缺不好㸔移在臨卦上亦何以異其勢湏着儧帖盡此以後二十餘版蓋雖只爭一字而篇末一行只有一字又湏儧動後篇直到􅁽尾也考異俟更子細㸔且令刻正經此更一兩日納去未晚也浙中字様宅上書籍中湏多有之如古夲廣韻寫得最好相傳是唐時仙女呉彩鸞日寫十本者雖未必然要可法也仲撫相見否聞留衛公得㫖自便而謝給事繳之以爲恐徐誼之徒援例有請遂止得量移南劍儲宰復官亦是爲謝􅀁駁乃在銓曹時也向􅀂用李公晦之䇿又湏頭撞然今尚何言哉數日探問未有近信方以爲慮得書知今日可到麻沙不勝傷痛想感事興哀何可堪也前日八哥來訪辱書具悉此事不竢見屬但適此瘖黙不容發口巳嘗託八哥奉報矣本欲今日往􅂇墓下之役因得靣言而累日􅂥瀉氣痛攻刺畏寒愈甚遂不敢出其事它日言之未晚人至承書知􅀁苦向平深以爲慰不知見服何藥切宜更加將護也􅂼食乆亦不便􅀂不欲食肉醫家多以藥和肉爲丸啖之亦􅂇胃氣旣無滋味自無􅀁妨况在禮經自有權制耶昨聞留趙徐吕之報巳令劉二哥奉聞矣事勢如此不知尊丈歸期竟如何當此􅀊莫令人􅁣念不能平也律書證辨中論周徑處自十一其長之分至二􅁵八毫者是也此一節未曉恐有誤字或重複處幸更考之算學文字素􅀁不曉惟賢者之􅃪耳然湏得差簡約爲佳更望留意也三哥用藥見効甚慰先訓尚未得下筆日困賔客一事做不得甚可厭也答蔡仲黙周純臣書荷留念景建書巳領却欲附數字報之今納去􅀂舂陵人未行猶可及也冠義曽㝷得否幸因便􅀉及洪範傳巳領俟更詳㸔然不敢率易改動如餘子書一靣寫後日早來取昨日有臨川便巳略報仲撫頗詳此無益而有害何苦委身以犯其鋒也謝誠之書說六卷陳器之書說二卷今謾附去想未暇㸔且煩爲􅀵起鄕後商量也漳州陳安卿在此其學甚進星室之說俟更詳㸔但云天繞地左旋一日一周此句下恐欠一兩字說地處却似亦說得有病蓋天繞地一周了更過一度日之繞地比天雖退然却一日只一周而無餘也岐梁恐湏兼存衆說而以晁氏爲斷但梁山證據不甚明白耳禹貢有程尚書說􅁽大難送俟到此可見稍暇能早下來爲佳年來病勢交攻困悴日甚要是根本巳衰不復能與病爲敵看此氣象豈是乆於人世者諸書且隨分如此整頓一畨禮書大叚未了最是書說未有分付處因思向日喻及尚書文義通貫猶是第二義直湏見得二帝三王之心而通其􅀁可通毋强通其􅀁難通即此數語便巳參到七八分千萬便撥置此來議定綱領早與下手爲佳諸說此間亦有之但蘇氏傷於簡林氏傷於繁王氏傷於鑿吕氏傷於巧然其間儘有好處如制度之屬秪以䟽文爲本􅀂其間有未穩處更與挑剔令分明耳示喻書說數條皆是但康誥外事與肆汝小子封等處自不可曉只合闕疑某嘗謂尚書有不必觧者有湏着意觧者有略湏觧者有不可觧者其不可觧者正謂此等處耳弗辟之說只從鄭氏爲是向董叔重得書亦辨此條一時信筆答之謂當從古註說後來思之不然是時三叔方流言於國周公處兄弟骨肉之間豈應以片言半語便􅃍然興師以誅之聖人氣象大不如此又成王方疑周公周公固不􅀿不請而自誅之􅀂請之於王王亦未必見從則當時事勢亦未必然雖曰聖人之心公平正大區區嫌疑自不必避但舜避堯之子於南河之南禹避舜之子於陽城自是合如此􅀂居堯之宫逼堯之子即爲􅆲矣或又謂成王疑周公故周公居東不幸成王終不悟不知周公又如何處愚謂周公亦惟盡其忠誠而巳矣胡氏家録有一叚論此極有意味晦庵先生朱文公續集卷之三福州府儒學訓導舒鏊校
