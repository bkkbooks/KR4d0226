body:
  text: 公移州縣官牒恭惟朝廷設官分職等級分明大小相維各有承屬盖以一人之智不䏻遍周衆事所以建立司存使相揔攝然事有統紀雖繁而不亂今覩本州官屬雖具而從來分職未明文書散漫殊無條理財賦獄訟盡出吏手而叅佐以下官受其成詳考舊案亦有不經通判書押處大綱一紊衆目立􅈥􅀂不更張積成深弊今来湏至别行措置如前所陳又仰諸案呈覆巳得判押並湏以次經由通判職官簽押方得行遣文字並湏先經職官次詣通判方得呈知州取押用印行下又凖淳熈令諸縣丞簿尉並日赴長官􅈦或都􅈦簽書當日文書謂應行出者竊詳立法之意盖欲一縣之官同􅃹一縣之事庻得商量詳審與决公事不至留滯民無􅁈枉而比年以来此法不舉所謂過􅈦者不過茶湯相揖而退其扵縣之財賦獄訟知縣旣不謀之佐官佐官亦不請扵知縣大率一出扵知縣一人十數胥吏之手而巳設使知縣才術過人力䏻獨任亦非爲治之體而况爲知縣者有不得人或見事有不明處事有不公則賕賂囑託變亂是非淹延囚係違法害民其弊又有不可勝言者今請諸縣知佐詳照條法逐日聚􅈦議事應受接詞訴理㫁公事催督財賦並要公共商量簽押圓備然後施行庻㡬上合法意下慰民情稍革舊弊都吏具檢牒通判􅈦遍下簽㕔及諸曹官自五月一日爲始依此施行更有未盡事理委自逐官比􅁼推究申請施行最後一項仍貼諸縣請各􅀜牒佐司同共遵守先具各知禀狀申漳州曉諭詞訟牓權發遣軍州事契勘本州近凖提刑行司判下詞狀計二百四十三道其間官吏違法擾民事理彰著者即巳遵依送獄根治其有􅀜繫一方百姓公共利害而非一旦所䏻􅃍革者亦巳廣行咨詢别行措置訖其餘詞狀亦有只是一時爭競些少錢米田宅以致互相誣頼結成仇讐遂失鄰里之驩且􅃜㢘耻之節甚則忘骨􅁏之恩又甚則犯尊卑之分細民如此巳足傷嗟間有自稱進士學生宦族子弟而其所訴亦不免此此􅀖之俗舊稱醇厚一旦下衰至扵如此長民者安得不任其責又何忍一切徒以柱後惠文爲事而不深求所以感發其善心者㢤又况所論或人數衆多或地里遥逺或事非干巳而出扵把持告計之私或詞渉虚妄而肆爲詭名匿迹之計前此未知情由便行追對及至得實善良􅀍擾巳不勝言慮之不深徒自悔咎今巳刷出所承判狀委官置籍先索案祖逐旋看詳然後逐人引問供對庻㡬深審得見實情予奪之間不至差誤􅀂有姦僞先􅀅詞人重行㫁遣務以上奉公法下全私恩不擾良民不長姦惡此病守區區深憂吾民追懐舊俗之本志也􅀅来㫁訖各給㫁由回申照㑹然後逐件勾銷元籍如未􅁢當即仰人戸自從次第官司翻論今恐詞人等候日乆未有施行妄有疑惑復生詞訴除巳具申提刑司外湏至曉諭者右今榜州門張掛曉諭各令知悉更請深自思惟所訴事理或渉虚僞或無大叚利害可以平和即仰早生悔悟降心相從兩下商量出官對定庻㡬有以復此􅀖忠厚醇朴之俗革比年頑嚚偷薄之風少安病守閔惻慚懼之心仰副明使者循行荒逺宣布詔條之意如未聴信别聴指揮儻觸憲章决無輕恕故牓紹熈元年五月日曉諭居䘮持服遵禮律事使州今月初九日有進士吕渭夫狀陳理差役公事狀有稱見居母䘮而身著欄幞皂紗巾持即巳開陳禮法當㕔告戒尚慮逺近未䏻遍知湏至曉諭右當職竊聞先聖有言孝子之䘮親服美不安聞樂不樂食旨不甘此哀戚之情也又曰子生三年然後免扵父母之懐故三年之䘮天下之通䘮也予也有三年之愛扵其父母乎是以昔者先王制爲䘮禮因人之情而節文之其居處衣服飲食之間皆有定制降及中世乃有墨衰之文則巳不䏻無失扵先王之意矣然准律文諸䘮制未終釋服從吉􅀂忘哀作樂自作遣人等徒三年雜戯徒一年即遇樂而聴及叅預吉席者各杖一百則是世無古今俗無厚薄而有國家者所以防範品節之意尚未泯也又况頃年至尊夀皇聖帝躬服髙宗皇帝之䘮素衣素冠皆用麄布當職嘗因奏事親得瞻仰恭惟天子之孝所以感神明而刑四海者如此其盛而此􅀖僻逺聲教未洽乃有居父母之䘮而全釋衰裳盡用吉服者見之駭然良用悲歎自惟凉薄無以瘉人然幸身際盛時目覩聖孝今又得蒙誤恩使以承流宣化爲職敢不明布以喻士民自今以来有居父母之䘮者雖或未䏻盡遵古制全不出入亦湏服麤布黯衫麤布黲巾繫麻絰著布鞋不飲酒不食􅁏不入房室如是三年庻㡬少報劬勞勉遵禮律仰承聖化如其不然國有常憲今榜曉諭各令知悉故榜紹熈元年六月日勸女道還俗牓使州契勘本州日前官司失扵覺察民間多有違法私創庵舎又多是女道住持昨来當職到任之􅀄爲見事有非便即巳坐條出榜禁止今後不得私創庵舎居住丁寧告戒非不嚴切近日因引詞狀見得尚有女道住庵又有􅀍人論訴與人姦通者顯是不遵當職約束故違國家條制誣上行私敗亂風俗湏至再行勸諭者右今榜勸諭本州軍民男女等盖聞人之大倫夫婦居一三綱之首理不可廢是以先王之世男各有分女各有歸有媒有娉以相配偶是以男正乎外女正乎内身脩家齊風俗嚴整嗣續分明人心和平百物順治降及後世禮教不明佛法魔宗乗間竊發唱爲邪􅀃惑亂人心使人男大不㛰女長不嫁謂之出家脩道妄希来生福報􅀂使舉世之人盡從其􅀃則不過百年便無人種天地之間莾爲禽獸之區而父子之親君臣之義有國家者所以維持綱紀之具皆無所施矣幸而從之者少彛倫得不殄㓕其從之者又皆庸下之流雖惑其言而不䏻通其意雖恱其名而不䏻踐其實血氣旣盛情竇日開中雖悔扵出家外又慚扵還俗扵是不昬之男無不盗人之妻不嫁之女無不肆爲􅁋行官司縦而不問則風俗日敗悉繩以法則犯者巳多是雖其人不䏻自謀輕信邪􅀃以至扵此亦其父母不䏻爲其兒女計慮乆逺之罪究觀本末情實可哀此當職前日之榜所以不憚扵丁寧也然昨来告戒未行只縁區處未廣今復詳思與其使之存女道之名以歸父母兄弟之家亦是未爲了當終乆未免悔吝豈若使其年齒尚少容貌未衰者各歸本家聴從尊長之命公行媒娉從便昬嫁以復先王禮義之教以遵人道性情之常息魔佛之妖言革􅁋亂之汚俗豈不美㢤如云昬嫁必有聘定賫送之費則脩道亦有庵舎衣鉢之資爲父母者随家豐儉移此爲彼亦何不可豈可私憂過計苟徇目前而使其男女􅀌單愁苦無所依託以䧟邪僻之行鞭撻之刑㢤凢我長㓜悉聴此言反復深思無貽後悔故榜紹熈元年八月日掲示古靈先生勸諭文古靈先生陳公勸諭爲吾民者父義能正其家兄友䏻養其弟弟敬䏻敬其兄子孝䏻事父母夫婦有恩貧窮相守爲恩􅀂棄妻不養夫䘮改嫁皆是無恩也男女有别男有婦女有夫分别不亂子弟有學䏻知禮義㢘耻鄉閭有禮歳時寒暄皆以恩意徃耒燕飲序老少坐立拜起貧窮患難親戚相救借貸財穀昬姻死䘮隣保相助無墮農桑無作盗賊無學賭􅀶無好争訟無以惡凌善無以富吞貧行者遜路少避長賤避貴輕避重去避来耕者遜畔地有畔不相爭奪班白者不􅀒戴於道路子弟􅀒重執役不令老者擔擎則爲禮義之俗矣以上同保之人今仰互相勸戒孝順父母恭敬長上和睦宗姻周䘏鄰里各依本分脩本業莫作姦盗莫縱飲博莫相闘打莫相論訴莫相侵奪莫相瞞昧愛身忍事畏懼王法保内如有孝子順孫義夫節婦事跡顯著即仰具申當依條旌賞其不率教者亦仰申舉依法究治自餘禁約事件仍已别作施行各宜遵守毋至違犯勸諭榜今具節次施行勸諭事目如後一勸諭保伍互相勸戒事件仰同保人互相勸戒孝順父母恭敬長上和睦宗姻周䘏鄰里各依本分各修本業莫作姦盗莫縱飲􅀶莫相闘打莫相論訴孝子順孫義夫節婦事跡顯著即仰具申當依條格旌賞其不率教者亦仰申舉依法究治一禁約保伍互相紏察事件常切停水防火常切􅁴察盗賊常切禁止闘争不得販賣私塩不得宰殺耕牛不得賭博財物不得傳習魔教保内之人互相􅁴察知而不紏併行坐罪一勸諭士民當知此身本出扵父母而兄弟同出扵父母是以父母兄弟天性之恩至深至重而人之所以愛親敬長者皆生扵本心之自然不是強爲無有窮盡今乃有人不孝不弟扵父母則輙違教命敢闕供承扵兄弟則輕肆忿爭忍相拒絶逆天悖理良可歎傷宜亟自新母速大戾一勸諭士民當知夫婦㛰姻人倫之首媒妁聘問禮律甚嚴而此􅀖之俗有所謂􅃹顧者則本非妻妾而公然同室有所謂逃叛者則不待媒娉而潜相奔誘犯禮違法莫甚扵斯宜亟自新母䧟刑辟一勸諭士民鄉黨族姻所宜親睦或有小忿宜各深思更且委曲調和未可容易論訴盖得理亦湏傷財廢業况無理不免坐罪遭刑終必有㐫切當痛戒一勸諭官戸旣稱仕宦之家即與凢民有異尤當安分循理務在克巳利人又况鄉鄰無非親舊豈可恃強凌弱以富吞貧盛衰循環所宜深念一勸諭遭䘮之家及時安葬不得停䘮在家及􅑼􅀉寺院其有日前停􅀉棺柩􅁅凾並限一月安葬切不湏齋僧供佛廣設威儀但只随家豐儉早令亡人入土如違依條科杖一百官員不得注官士人不得應舉鄉里親知来相弔送但可恊力資助不當責其供備飲食一勸諭男女不得以修道爲名私創庵宇􅀂有如此之人各仰及時㛰嫁一約束寺院民間不得以禮佛傳徑爲名聚集男女晝夜混雜一約束城市鄉村不得以禳災祈福爲名歛掠錢物裝弄傀儡前件勸諭只願民間各識道理自做好人自知不犯有司刑憲無縁相及切湏遵守用保平和如不聴從尚敢干犯國有明法吏不敢私宜各深思無貽後悔曉示經界差甲頭榜漳州契勘本縣日前經界未及均稅􅃍行住罷後来一向不復舉行是以豪家大姓有力之家包併民田而不受産則其産虚樁在無業之家冐占官地而紐租則其租俵􅀉扵不佃之戸姦胥猾吏寅夜作弊走弄出入不可稽考貧民下戸枉􅀍追呼監繫箠楚無所告訴至扵官司財計因此失䧟則又巧爲名色以取扵民雖有􅄌恵之長明察之官欲革舊弊而一新之亦復無所措手如是者盖巳有年矣乃者聖明灼知其弊深加憐憫特詔守臣相度經界利害盖欲仰遵紹興巳行之故典加惠此􅀖重困之痍民務使田稅均平貧富得實免致貧民下戸困扵兼并豪猾之手雖知應役之人不無少擾然欲革百年深錮之弊爲斯民乆逺之計􅀔有不得巳者本州謹巳仰體聖意條具奏聞去訖􅀼􅂲旦夕或􅀩行下便當舉行而逺近士民傳聞不審過有疑慮合行曉諭及有預行撥置事件亦湏先次遍行告報曉示下項一今来經界乃是紹興年中巳行之法當時諸路州縣並皆舉行始初傳聞人亦驚􅂲扇揺眩惑怨謗紛然及至打量田土攅造圖帳一都不過二十餘人逺者不過數月之乆即便結局應役之戸雖不免有勞費然結局之後田土狹闊産錢重輕條理粲然各有歸著在民無業去産存之弊在官無逃亡􅀝閣之欠豪家大姓不容僥倖􅀮瞞貧民下戸不至偏受苦楚至今四五十年人無智愚皆知經界之爲利而不以爲害只是本州推行未畢􅃍行住罷所以民間但知其害而未及知其利之如此姦民猾吏又皆知其利於貧民而不利扵已徃徃互相驚􅂲妄􅀃事端欲使聖朝仁政實惠不得下流而千里之内貧弱之民依前受弊無有窮極實可憐悼今仰人戸詳此事理仰體聖朝寛恤之意莫聴浮言妄有驚擾一經界之法當依紹興年例别差大小正副甲頭專一打量毎都大約不過二三十戸本州諸縣從来本都不曽分十大保無以得見都分闊狹合差小甲頭之數今且行下諸縣仰各告報見役保正副等先納逐都四至之内圍徑㡬里東至西㡬里南至北㡬里約計田園大槩頃畆大槩約度未要的實絇數具狀申縣以慿分畫方界定差大小甲頭􅀅来定差之後打量攅造並委甲頭􅃹幹其見役保正􅀂非合充甲頭之人即依舊只􅃹煙火不預經界事務一打量紐筭置立土封椿摽界至分方造帳畫魚鱗圖砧基簿及供報官司文字應干式様見巳講究見得次第旦夕當行鏤版散下諸縣庻㡬􅀅来經界大小甲頭等人各通曉免至臨時雇募他人重有所費右今榜先次曉諭本州人戸各仰知悉如􅀅来所奏事理得蒙聖恩即賜開􅁢即當别行措置子細曉諭務要不擾而辦以副朝廷綏靖逺方蠲除民瘼之意如所措置有未穏便亦仰及早前来陳􅀃切待别行講究改正施行紹熈元年八月日勸農文契勘生民之本足食爲先是以國家務農重榖使凢州縣守倅皆以勸農爲職每歳二月載酒出郊延見父老喻以課督子弟竭力耕田之意盖欲吾民衣食足而知榮辱倉廪實而知禮節以共趍扵富庻仁夀之域徳至渥也當職幸此承攝敢墜彛章今有勸諭事件開具如後一今来春氣巳中土膏脉起正是耕農時節不可遲緩仰諸父老教訓子弟遞相勸率浸種下秧深耕淺種趨時早者所得亦早用力多者所收亦多無􅃱因循自取飢餓一陂塘水利農事之本今仰同用水人叶力興修取令多蓄水泉凖備将来灌漑如事干衆即時聞官紏率人功借貸錢本日下修築不􅃹誤事一耘犂之功全藉牛力切湏照􅃹及時餧飼不得輙行宰殺致妨農務如有違戾凖􅃙科决脊杖二十每頭追賞五十貫文錮身監納的無輕恕今仰人戸遞相吿戒母致違犯一種田固是本業然粟豆麻麥菜􅂼茄芋之屬亦是可食之物若􅀎種植青黄未交得以接濟不爲無􅀘今仰人戸更以餘力廣行栽種一􅁞桑之務亦是本業而本州從来不宜桑柘盖縁民間種不得法今仰人戸常扵冬月多徃外路買置桑栽相地之宜逐根相去一二丈間深􅄏窠窟多用糞壌試行栽種待其稍長即與削去細碎拳曲枝條數年之後必見其利如未䏻然更加多種吉具麻苧亦可供備衣著免􅀍寒凍一鄉村小民其間多是無田之家湏就田主討田耕作每至耕種耘田時節又就田主生借􅂖米及至終冬成熟方始一併填還佃戸旣頼田主給佃生借以養活家口田主亦藉佃客耕田納租以供贍家計二者相湏方䏻存立今仰人戸遞相告戒佃戸不可侵犯田主田主不可撓虐佃戸如當耕牛車水之時仰田主依常年例應副榖米秋冬􅀵成之後仰佃戸各備所借本息填還其間􅀂有􅀒頑不還之人仰田主經官陳論當爲監納以警頑慢一本州􅃹内荒田頗多盖縁官司有俵􅀉之擾􅁚獸有踏食之患是致人戸不敢􅄏墾今来朝廷推行經界向去産錢官米各有歸著自無俵􅀉之擾本州又巳出榜勸諭人戸䧟殺􅁚獸約束官司不得追取牙齒蹄角今更别立賞錢三十貫如有人戸殺得􅁚者前來請賞即時支給庻㡬去除災害民樂耕耘有欲陳請荒田之人即仰前来陳狀切待勘㑹給付永爲巳業仍依條制與免三年租稅一今来朝廷推行經界本爲富家多置田業不受租産貧民業去産存枉􅀍追擾所以打量歩畆從實均攤即無増添分文升合雖是應役人戸日下不免小勞然實爲子孫永逺無窮之利其打量紐筭之法亦甚簡易昨来巳印行曉示今日又躬親按試要使民戸人人習熟秋成之後依此打量不過一兩月間即便了畢想見貧民無不歡喜只􅂲豪富作弊之家見其不利扵巳必湏撰造語言妄有扇揺今仰深思彼此一等皆是王民豈可自家買田收榖却令他人空頭納稅非惟官法不容亦􅂲别招隂譴不湏如此計較生事沮撓良法一本州節次行下諸縣不得差人下鄉乞覓搔擾科敷抑配強買物色及以補發經緫制錢發納上供銀罷科茶等爲名科罰人戸錢物所以上體朝廷寛恤之意欲使民得安居不廢農業今􅂲諸縣奉行違戾仰􅀍擾人指定實迹前来陳訴切待追究重作行遣一本州節次印給牓文勸諭人戸莫非孝弟忠信禮義廉耻之意今􅂲人戸未䏻遍知别具節畧連粘在前請諸父老常爲解􅀃使後生子弟知所遵守去惡從善取是舎非愛惜體膚保守家業子孫或有美質即遣上學讀書學道修身興起門戸右今出牓散行曉諭外更請父老各以此意勸率鄉閭教戒子弟務令通曉毋致違犯紹熈三年二月日牓龍巖縣勸諭牓具官當職恭奉􅃙命来守此􅀖見本州四縣龍谿諸邑風俗醇厚少有公事干撓州府獨有龍巖一縣地僻山深無海郷魚塩之利其民生理貧薄作業辛苦州府旣逺情意不通縣道公吏又不究心拊摩躬行教化徃徃多差公人下郷搔擾及縦吏人因事乞覓不遵朝制不恤刑獄不䏻分別是非曲直致使其民不見禮義惟務㐫狠強者欺弱壮者凌衰内則不知有親戚骨􅁏之恩外則不知有閭里徃来之好習俗薄惡巳足歎傷至其甚者則又輕侮官司公肆咆哮把持告訐無所不至始則詭名下狀終則􅀅身藏閃及至州縣察其欺詐追捕緊急則便閉門聚衆持杖闘敵殊不思量旣爲王民便當遵守王法州縣之官皆是奉行朝廷政令今旣不然抗拒州縣便是不遵王法不畏朝廷如此所爲何異盗賊縦使一時抵敵得過不知終乆作何収殺雖􅀃本因官吏養成此惡然却終須自巳出頭受罪小者徒配决罰大者殺身破家赤子無知抵冐至此良可悲閔當職旣忝父母之官豈忍坐視不思有以救其未然除巳行下龍巖縣約束官吏務宣教化恪守條法不得似前容縦搔擾外湏至曉諭右今榜龍巖縣􅃹下遍行曉諭上戸豪民各仰知悉其有細民不識文字未䏻通曉即請郷曲長上詳此曲折常切訓誨要使闔縣之人常切思念旣爲王民當守王法自今以後各脩本業莫作姦盗莫恣飲愽莫相闘打莫相論訴莫相侵奪莫相瞞昧愛身忍事畏懼官司不可似前咆哮告訐抵拒追呼􅀝靠㐫狼冐犯刑憲庻㡬一變獷悍之俗復爲禮義之郷子子孫孫永陶聖化如更不改尚習前非州郡雖欲曲法相容亦不可得决當會合巡尉圍掩搜捉依條斷罪的無輕恕今榜曉諭各請詳思趂早革心無貽後悔潭州委教授措置嶽􅅢書院牒契勘夲州州學之外復置嶽􅅢書院本爲有志之士不逺千里求師取友至於是􅀖者無所棲泊以爲優游肄業之地故前帥樞宻忠肅劉公特因舊基復創新館延請故本司侍講張公先生徃来其間使四方来學之士得以傳道授業解惑焉此意甚逺非世俗常見所到也而比年以來師道陵夷講論廢息士氣不振讓者惜之當職叨冐假守䝉􅀍訓詞深以講學教人之務爲􅀉顧恨庸鄙弗克奉承到官兩月又困簿書未能一徃謁殿升堂延見諸生詢考所合罷行事件庻革流弊以還舊規除巳請到醴陵􅀺君貢士充講書職事與學録鄭貢士同行措置外今議别置額外學生十貟以處四方遊學之士依州學則例日破米一升四合錢六十文更不􅀘試聽候當職考察搜訪徑行撥入者庻幾有以上廣聖朝教育人才之意凡使爲學者知所當務不專在於區區課試之間實非小􅀘牒教授及帖書院照會施行仍請一靣指揮合干人排備齋舎几案床榻之屬并帖錢糧官於本州贍學料次錢及書院學糧内通融支給須至行遣約束榜一契勘諸縣民訟人户自合從條次第經陳其公事各有條限民户越訴亦有斷罪刑名徃徃縣道不能結絶遂至留滯引惹詞訴兼又有人不候本縣照限追㑹圓備予决便即先行經州紊煩官府今立限約束自截日爲始應諸縣有人户巳訴未􅀗盗賊限一月闘歐折傷連保辜通五十日㛰田之􅀋限兩月須管結絶行下諸縣遵從外如尚有似此民訟亦照今来日限予决若縣道違期不行結絶方許人戸赴州陳訴切待先追承行人勘斷再立限驅催其縣道又不了絶致人户再有詞訴定追押錄科斷外今仰民户經由書鋪依式書狀仍於狀内分明聲􅀃的於某年月日經縣陳訴巳經幾日本縣不結絶以慿行遣如不明注經縣月日或不候限滿妄稱已過所立日限陳述致追承行人到州見得元經月日未及其人戸連書鋪並行収坐仍毀劈書鋪名印若經本州一月未滿狀詞亦不許再行一官人進士僧道公人謂訴巳事無以次人聽自陳聽親書狀自餘民户並各就書鋪冩状投陳如書鋪不冩本情或非理邀阻許當􅈦執覆一本云或非理飾􅀃及當􅈦執覆不同所詞定行根究書鋪一狀詞並直述事情不得繁詞帶論二事仍言詞不得過二百字一名不得聽兩狀並大字依式眞謹書冩如有干照契据并未盡因依􅃪録白連粘狀前一如告論不干巳事寫狀書鋪與民戸一等科罪一民户詞訴不應爲狀首人自不當岀名其應爲狀首人並要正身如實有事故得用以次人仍聲􅀃因依年月若干有無疾䕃婦人有無疾䕃娠孕於前從實開具或有罪應科决臨時妄行供􅀃先契勘元寫狀書鋪一書鋪如敢違犯本州約束或與人戸寫狀不用印子便令經陳紊煩官司除科罪外並追毀所給印子一人戸陳狀本州給印子靣付茶食人開雕並經茶食人保識方聽下狀以備追呼若人戸理渉虚妄其犯人并書鋪茶食人一例科罪一契勘人戸多有不問事節緊慢不候行押詞狀日分輙行欄轎下狀或投白􅁓今立約束欄轎狀詞並不受接并所投白􅁓止是理訴婚田債􅀒即非緊切利害事件亦非貧窶鰥寡孤獨無告之人顯無忌憚紊煩官府自今後除貧窶老病㓜小寡婦或􅀍劫盗并闘歐殺傷事干人命􅀄詞許於放詞狀日投白􅁓外自餘理訴婚田債􅀒或一時互争等事人戸湏管經由書鋪依式書狀聴引狀日分陳理如有似此違約束之人定當重行斷罪一引押狀詞日分預批暦請台判輪委職官一貟或兩貟就大􅈦側畔用硃劃號數監用朱批事因一引押詞狀除􅀄經州狀外其有事祖狀並各令案吏貼擇出案祖用硃批出緊要情由元詞月日作如何施行某處巳未結絶事因請判一本州鼓角樓所有牌二靣内東畔一靣係軍州官下馬牌西靣係人戸詞訟牌􅀩安撫到任移西畔詞訟牌於東自新開雕屈牌一靣安在詞訟牌之上差使臣一貟監當并置暦一道付監管官如有投牌之人抄上姓名押赴使府出頭取候台㫖施行其牌黒􅃮雕字具􅀃有實􅀒屈緊急事件之人仰於此牌下􅉥立仰監牌使臣即時収領出頭切待施行如敢將閑慢事件不候引狀日分妄作緊急坐牌定行勘斷一有日逐諸雜申并省符公牒文字並置簿子劃隔眼拘管遇夜銷逐旬委官􅀧號一照得日逐所受入匣追索人案文字置外引開排時刻責鋪兵依限走傳如違限委官先追押錄重斷一􅀋狀名色官吏受財枉法將吏侵尅役使殺人行劫殺略姦盗聚衆闘打或抵拒官司豪家大姓侵擾占奪細民田業姦汚婦女闘打見血官貟士人公人軍人僧道執狀巳上當使㕔引押訴婚田地訴分析訴債􅀒闘打不見血差役陂塘巳上都㕔引押一引押詞狀元係􅀟日引押公事元係隻日􅀩安撫到任以􅃗日引押詞狀雙日引押公事一狀式某縣某郷某里姓名一年幾􅀊有無疾䕃合爲狀首堪任杖責係第幾狀一所訴某事合經潭州一即不是代名虚妄無理越訴或隱匿前狀如違甘伏斷罪號令右某入事明注年月指渉某人某事盡實限二百字須至具狀披陳伏候判府安撫修撰特賜台㫖一照對每月長沙等一十二縣合解有無定額月樁等錢從夲司印格目書塡錢物監轄典吏樁辦限次日各分日限申解赴州交納近凖安撫殿撰侍講到任措置逐月輪委佐官坐押内長沙善化縣輪縣丞主薄縣尉并外十縣輪縣丞主薄監當官一貟監轄典押承行人各一名拘樁並限次月􅀄十日到州其錢須要所委官同典吏躬親坐押赴州如觧足典押免行到州不足斷訖典吏就州監催或錢違限不到即追本縣樁錢典吏及拘押錢官下承行㕔子併行勘斷施行一項照應州場日逐受納紹熈五年夏稅錢將入中限未据人户賫納竊恐有悞裝綱支用檢凖令節文諸稅租入中限聴追户頭或以次家人科較品官之家追幹人令曉示人户及早盡數赴州送納如違定當從條􅀧追赴州科較監納施行一項照應湘潭衡山湘郷瀏陽攸縣五縣拖欠紹熈四年秋稅遂將錢差官下縣受納近縁天時亢旱祈禱未應恐人户艱於送納巳自七月􅀄五日帖所委官回州取禀候小熟日却去開場受納去訖竊慮郷民未能遍知仍前追擾合行曉諭今印小榜下縣郷村曉諭人户各宜安心車水灌漑田畒凖備合納稅錢候得雨水熟日依舊差官到彼開􅂣即行送納各令知委一項照對稅務日逐収到牙客人合納河市稅錢並不盡數拘解􅀼慮夲務合干人作弊收錢隱瞞入巳合行約束使司今置板榜務門粘貼本務日逐申收到牙客人錢數曉示通知如本務収稅錢多申到數少不同隱瞞官錢入巳許牙客人具狀告首若客人稅物多供申少亦許同伴人陳首切待追人送獄根勘依條斷罪追賞錢五十貫文各令知委一訪聞諸司案及倉場庫務諸官㕔下擅自存留曽經斷罷及私名之人在逐處抄寫文字合行約束今立賞錢一百貫文府衙門許人指實陳告切待追究將犯人重斷每名追賞錢一百貫文其本處存留人一例斷罪施行一照對諸縣弓手土軍係專一教閱以備彈壓捕盗本州巳節次督責廵尉依時教閱務要武藝精熟仍月具所教人數姓名陞加武藝帳狀申州以慿逐月三分􅀧一赴州按教行下諸縣併各縣廵尉各仰速便先行聲􅀃弓手土軍姓名年甲所習武藝文籍供申仍於籍内便將弓兵分作三畨自今年七月十九日爲始先要第一畨所發弓手齊集到州按教須是向後月十九日以前解發到州應期諸縣合教一契勘諸軍武藝最是弓弩可用近下諸縣􅀧喚弓手上軍赴州按教據各處具到帳籍多是將不㑹武藝之人裝作鎗牌手名色解發委是有悞緩急使喚行下諸縣廵尉各日下盡將所􅃹弓手土軍並令專習弓弩務要捉親射射精絶􅃪候􅀧喚赴州按教仍令兼習义鎗小牌諸般武藝不得私役弓兵妨廢教閲一據客人趙堅等狀􅀼見民間行使砂毛錢鐡錢朝􅋝累降指揮明立法禁非不嚴切今牙鋪尸不遵約束依前夾雜砂錢行使致得客人墜敗財本乞降賞榜於管下瀏陽湘潭醴陵衡山并下攝諸州等處約束使司巳立賞錢五十貫文印給小榜發下長沙等一十二縣下張掛曉示外仍出榜都市并瀏陽湘潭醴陵衡山縣及下攝諸州等處張掛曉諭如有前項違犯之人許諸色人告捉赴官將犯人送獄從條勘斷追給上件賞錢施行一契勘諸廂収領公事多是在廂經日不行申解却令兩辭和對更不申官委是有違條法遂符行下諸廂兵官自今後應有公事即時具狀申解赴府出頭不得隔􅀫及妄作休和申州如違將當行人重斷廂官别有施行一契勘本州累次出榜立賞錢三十貫文禁止百姓及軍人賭愽仍拆毀櫃坊并告報諸營寨廂官及遍牒在城諸官􅈦常切覺察鈐束非不嚴切今来尚有不畏公法之人依前開櫃坊停止軍兵百姓公然賭愽全無忌憚廂廵容縱兵官亦不鈐束深屬不便出榜都市曉示如有前項違犯之人諸色人告捉押赴使府出頭切待將犯人斷罪軍人次第問當各追上件賞錢與告人充賞若諸廂諸㕔諸營寨合干人依前容縱定一例追斷施行一照應近来委送官貟看詳審覆公事文字其間多有引用繁文除看詳公案文狀巳有狀式曉諭外今再立委官審覆申到公事式様請只就元狀内用小帖子節畧事意看詳所斷指定當否今欲如何施行大抵直􅀃事理不須繁文其狀内緊切事理别用小貼子摽􅀃小貼子式節畧􅃺内緊切事理云云某官云云某今竊詳云云某官所斷巳得允當或云未得允當巳開具出榜客位訖一訪聞街市逐時有不逞之徒與軍兵欺壓善良毀打百姓生事作閙出榜都市張掛曉示如有前項違犯之人斷罪監納先下拳錢五貫文每五日一限納錢三百文入官内軍兵押下所屬吹第問當一今後遍下諸縣諸官用符簽㕔請判押檢職官連銜書押行下專下逐縣逐官用帖如常式仍先行下諸縣照會一詞狀當日職官分􅀋呈押具式呈一詞狀帖牒下外諸縣者索案除程一日追人除程兩日五人以上去縣百里以上者除程三日案官鑿定日限案吏朱批某月某日限滿申展者都㕔先次類聚呈押一日者不展兩日者許一展三日者許再展再展而不到者都㕔指定帖某廵尉差人追呼呈押行下一在城差人監追公事各置印齪緊限不展次緊限許一展再展而不到者訊承差人長限日展並簽㕔批鑿不再呈押内長限每三展一押長限如監醫之類一當限文字並午牌以前到午後即是違限不得收接如違申舉一符牌申狀到事有常式事如盗賊發露當催捕判回申當催申抄劄口詞檢驗屍首當差官及官貟陳乞批書之類並即時押訖送所屬案分行遣請判行下如無施行事􅀋聚判照有祖及施行未到即簽㕔擬呈一簽㕔告報諸縣諸官㕔大字書冩文狀須如中指靣大即擬貼述大槩却於狀内抹出緊要情節便見曲折不然又須書冩一過枉費工夫一三獄直日開折司先次呈押餘案抽牌押文字訖退不得再上如有未了文字都吏次早㨂牌入筒取覆抽押内户刑案事繁許次早呈押一都簽㕔申四項奉台判後三項修入見行約束一照對日逐諸案銷生事號簿􅀩約束遇九日銷對􅀼慮積壓今乞次日委官􅀧對逐一批銷書絶乞􅀱九日呈􅀧一照對人户役白􅁓止爲有緊切事干人命劫盗等今来受狀不問事理輕重有白􅁓三四十􅁓訪聞皆是書鋪邀求致令投陳紊煩官司今乞告示書鋪如是凖前邀阻人户致使府問得投白􅁓人曾經書鋪不爲冩狀之人乞賜喚上斷治施行不應受理即行擇退一凖台判索案除程一節追人除程兩日五人以上在縣百里以上者除程三日不到帖廵尉追人一日者不展今欲乞再展一限兩日者許一展今欲再展一限通三限三日者許再展亦通三限一照應近据諸縣申到人户理訴婚田債􅀒皆稱目今正是青黃不接之際告示候務開日施行使司契勘人户互訴㛰田争地多是有力上户之家占據他人物業或是遷延不肯交錢退贖或是抗拒不伏赴官理對只要拖延衮入務限使下户􅀍苦無能結絶檢凖律令諸婚田入務若先有文案交相侵奪者不在此例况今本州多是禺田只有早稻收成之後農家便自無事可以出入理對在田亦少施工未穫之利自可退業以還有理之家諸縣争論田地詞訴可以承行理對不必湏候十月使司巳於六月十八日符長沙等一十二縣遵守施行訖一照應本州近於七月十七日準登寳位赦書内一項應官司房廊白地賃錢並放至紹熈四年終巳出榜都市曉示去訖今訪聞得街市有賃屋居民都有妄稱合從赦書到日之後納起致有争競州司契勘前項赦書即無放至紹熈五年正月以後房錢之文或有屋主自願饒潤即從其便若屋主不願饒􅃳即其賃屋人自合遵從大赦指揮印還不得妄有抵􅀒扇惑生事使司巳於七月二十六日出榜都市曉示訖一契勘本州州學之外復置嶽麓書院云云並同前委教授牒一照對夲州所管上丁釋奠及􅀕祀社禝三獻官􅀕服縁製造年深各並不如法式今欲别行製造􅀄獻六旒冕亞獻四旒冕終獻無旒冕及夲等衣裳大帶中單綬佩蔽􅂰革帶履韈各一副􅀼恐只依印本製造未必盡合禮制申行在太常寺􅀜借上􅀕服每事一件付進奏官楊思恭同夲州差去客司楊暹就臨安府製造回州行用一伏覩紹熈五年七月七日赦書内一項五嶽四瀆名山大川歴代帝王忠臣烈士載於祀典者委所在長吏精㓗致􅀕近祀廟䖏並禁樵採如祠廟損壊今本州支係省錢修葺謹按晋書南中􅀰將湘州刺史譙國司馬王諱承當王厚作亂之際興兵唱義爲國討賊功雖不就志莭可嘉今数百年未有廟貌又按長沙圖誌故通判錢修葺州司契勘東晋王厚之亂湘州刺史譙閔王承起兵討賊不克而死及紹興􅀄年金賊犯順潭州通判孟彦卿趙民彦將官劉玠兵官趙津之皆以忠節没於王事從前未有廟貌州司今来遵奉赦書指揮見行相度創立祠堂塑造神像除晋朝冠服别行討論外所有孟趙兩通判係贈直龍圖閣劉將官係贈武節大夫趙兵官係贈右監門衛將軍未委本品朝服合作是何法制申行在太常寺仍巳差人前去望塑小様照詳典禮給降制度以慿製造施行一照應本州管内南嶽衡山係國家火德興隆之地崇奉之禮極於嚴肅合行封植以壯形􅀔近来官司失於守護致得諸色等人妄行斫伐林木摧殘土石破碎無以保國威靈停滀雲氣慰一方瞻仰歸依之望事屬不便契勘其地並屬寺觀所管即與民間無相干渉理冝措置今帖合同李修職躬親前去體究相度勒本縣廵尉責本寺觀主首摽識簽押除深山人所不見之處許令依舊開墾種植外其山靣瞻望所及即不得似前更行斫伐開墾向後逐年深冬即令寺觀各隨界分多取小木連本栽培以時澆灌務令青活庻幾數年之後山􅀔崇深永爲福地并帖廵尉仰詳前項事理須管同合同李修職前去體究相度逐一凖此施行及出榜嶽山寺張掛約束諸色等人不得依前於山内瞻望所及之處斫伐林木穿毀土石如有前項違犯之人許諸色人於所屬陳告根究從條斷罪施行一契勘目今乆闕兩澤竊慮陂澤湖塘池濼濼正副長專意放養魚鰱之􅀋不肯泄水注䕃致田禾乾槁深屬未便今曉諭陂塘湖長等人如合承水之田闕水即仰日下量分數放水注䕃如占吝不放之人仰食水入户指實陳論追犯人重斷施行看定文案申狀式具位準使帖㩀某人狀或判狀即云使判某人狀訴事備録全文委某看定或云看詳之􅀋並依夲文湏至供申者一某年月日某人狀一某人執到某年月日契字或分開干照遇多項須似此開以年月先後爲次序一檢準勑令格並同右某􅀼詳上件事云云合準某勑如何定斷謹具申某處伏乞照會詳酌施行年月日具位某狀報建陽縣審會船狀右熹承建陽縣公文取㑹本家有無占破船户姓名尋行契勘日前雖有顧到船隻日乆不曽使用今来自合祗應官司差使私家即無執占之理謹具申建陽縣伏乞照㑹謹狀晦庵先生朱文公文集卷第一百右晦庵朱先生文集一百卷閩浙舊皆有刻本浙本洪武􅀄取置南廱不知輯於何人今閩藩所存本則先生季子在所編也其後又有續集若干卷别集若干卷二本亦併􅈓之歴􅀊旣乆刓缺寖多讀者病焉成化戊子仲昭自翰林謫官南都偶得閩本公暇因取浙本校之其間詳畧微有不同如劾唐仲友數章閩本俱不載其所劾事狀世之鄙儒多以是疑先生異論紛起故悉増入使讀者知仲友蠹政害民之實而無所惑於異論也其他無大􅀜繋者則仍其舊惟正其亥豕魯魚之訛而已􅀊丙申閩憲使山隂唐公質夫僉憲蘭溪章公德􅅷閔舊板磨㓕日甚遂以仲昭所校本􅀘之未及訖工而二公相繼去任㝷復殘缺僉憲天台林公一中至慨然以爲己任乆未暇及壬寅秋乃謀扵先生九世孫都轉運伯承君復以仲昭所校本精加讎訂訛者正之腐者易之缺者􅀘之至是始無遺憾矣嗚呼先生不可復作而是編之存可以見其經國之謀焉可以見其濟民之政焉可以見其出䖏之義焉可以見其交際之道焉上而天道之妙下而物理之微明而禮樂之文幽而􅀑神之理大而人倫之常小而人事之變無所不該誠作聖之階梯入道之門户也諸公拳拳相與圖其永乆其嘉惠後學之意不旣深乎工旣吿成仲昭謹識其顛末且以告扵後之君子俾謹守而嗣修之以無替諸公之惠也成化十九年􅀊在癸􅆗二月之朔後學莆田黄仲昭謹識候官縣儒學訓導劉簮校
