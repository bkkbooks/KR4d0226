body:
  text: 書汪張吕劉問答答汪尚書癸未六月九日􅀩垂喻語録中可疑處仰見髙明擇理之精不勝歎服如韓富未嘗同朝王韓拜相先後如所考證蓋無疑矣􅀛山之語或是未嘗深考而所傳聞不能無誤竊謂止以所考􅀊月注其下以示傳疑如何書解三段不􅀋記錄答問之言按行狀自有書觧恐即解中􅀃也共兠事三經義辨中亦云􅀂據經所記即驩兠之罪正坐此尭典所記皆爲後事起本反復詳考即自見矣典刑兩句絶􅀋王氏殊不可暁細推其端即道不可以在之一語自莊子中來所以尤覺不粹以此知異學決不可與聖學同年而語也明矣􅀛山答胡迪功問中一叚老子五千言以自然爲宗謂之不作可也熹亦疑此語如論語老彭之􅀃只以曾子問中言禮數段證之即述而不作信而好古皆可見蓋老聃周之史官掌國之典籍三皇五帝之書故能述古事而信好之如五千言亦或古有是語而老子傳之未可知也蓋列子所引黄帝書即老子谷神不死章也豈所謂三皇五帝之書即􅀛山之意􅁍似習於見聞不以莊老爲非者深所未喻也帝舜申之之􅀃亦嘗疑之旣而考其文則此序乃三篇之序也臯陶矢厥謨即謂臯陶謨篇也禹成厥功即謂大禹謨篇也陳九功之事故日成厥功也申重也帝舜因臯陶陳九徳而禹俞之因復申命禹曰來禹汝亦昌言而禹遂陳益稷篇中之語此一句序益稷篇也以此讀之文意甚明不煩生意今曰不屈於法度之威氣象􅁍殊淺近信乎其非所以言舜也謝楊二先生事頃見胡明仲家所記侯師聖之言有曰明道先生謂謝子雖少魯直是誠篤理㑹事有不透其顙有泚其憤悱如此此語􅁍與羅公所記暗合恐與所謂玩物喪志者有不相害蓋世固有人聦明辨愽而不敏於聞道者矣惟其所􅃐不謬於道而志之不舎是以卒有所聞而其所聞必皆力行深造之所得所以光明卓越直指本原姑以語錄論語解之屬詳考即可知矣如語解中論子路有聞一章可見其用力處也􅀛山􅁍是天質粹羙得之平昜觀其立言亦可見妄論僣越良犯不韙然􅁒取正有道不敢自􅀮其固陋耳乞賜鐫喻可否幸甚幸甚至於不居其聖等􅀃則又有所疑亦不敢嘿并以請教不居其聖若以爲謙辭即與得無所得不􅀋今􅀛山旣云非謂謙而引此爲比則其意正合矣上蔡於語解好古敏求章亦云其言則不居其意則不讓矣亦此意也形色即是天性非離形色别有天性故以色即是空明之􅀛山又於語解屢空處云大而化之則形色天性無二致也無物不空矣亦此意也然恐此􅀋皆是借彼以明此非實以爲此之理即彼之􅀃也所示王丈云天民大人不可分如大聖神之不可優劣熹竊意此等向上地位與學者今日立身處大故懸絶故難遥度今且以諸先生之言求之則聖神固不可分横渠曰聖不可知謂神荘生謬妄又謂有神人焉伊川曰神則聖而不可知非聖人之上又有一等神人也大與聖則不可不分伊川曰大而化之巳與理一也未化者如操尺度量物用之尚不免差巳化者巳即尺度尺度即巳顔子大而未化􅀂化則逹於孔子矣横渠曰大可爲也化不可爲也在熟之而巳易所謂窮神知化乃養盛自致非知力能強也又曰大人未化未能有其大化而後能有其大又曰大㡬聖矣化則位乎天德矣更以言語氣象揣度則逹可行於天下而後行之語正已而物正者亦不得不異且如伊尹曰吾豈􅀂使是君爲尭舜之君哉使是民爲尭舜之民哉豈􅀂於吾身親見之哉又曰予將以斯道覺斯民也非予覺而誰也此可謂逹可行於天下而後行之矣其於舜之恭巳正南靣而巳矣如何哉似此恐未可謂不可分也但其分難見如顔子之未逹一間處只是顔子自知耳狂妄率爾肆意及此伏惟髙明樂與人爲善必不罪而終教之區區下情不勝至望答汪尚書别􅁓示及釋氏之􅀃前日正以疑晦未祛故請其􅀃方虞􅆫越得罪於左右不意貶損髙明與之醻酢如此感戢亡巳熹於釋氏之􅀃蓋嘗師其人尊其道求之亦切至矣然未能有得其後以先生君子之教校夫先後緩急之序於是暫置其􅀃而從事於吾學其始蓋未嘗一日不徃來於心也以爲俟卒究吾􅀃而後求之未爲甚晚耳非敢遽絀絶之也而一二年來心獨有所自安雖未能即有諸巳然欲復求之外學以遂其􅀄心不可得矣然則前輩於釋氏未能忘懐者其心之所安蓋亦必有如此者而或甚焉則豈易以口舌爭哉竊謂但當益進吾學以求所安之是非則彼之所以不安於吾儒之學而必求諸釋氏然後安者必有可得而言者矣所安之是非旣判則所謂反易天常殄滅人􅀋者論之亦可不論亦可固不即此以定取舎也上蔡所云止觀之􅀃恐亦是借彼脩行之目以明吾進學之事􅀂曰彼之參請猶吾所謂致知彼之止觀猶吾所謂克巳也以其語録考之其不以止觀與克巳同塗共轍明矣後之好佛者遂掇去首尾􅀌行此句以爲巳援正如孔子言夷狄之有君不如諸夏之亡也豈眞慕夷狄明道適僧舎見其方食而曰三代威儀盡在是矣豈眞欲入叢林耶胡文定所以取楞嚴圎覺亦恐是謂於其術中猶有可取者非以爲吾儒當取之以資巳學也孔子曰攻乎異端斯害也巳吕慱士謂君子反經而巳矣經正斯無邪慝今惡邪􅀃之害正而攻之則適所以自敝而巳此言誠有味者故熹於釋學雖所木安然未嘗敢公言詆之特以講學所由有在於是故前日略扣其端旣蒙垂敎復不敢不盡所懐恐未中理乞賜開示不憚改也更願勿以鄙􅀃示人要於有定論而巳和戰之􅀃頃甞蒙面誨及今所示非不明白利害較然矣然愚意終未敢安盖衛君待夫子而爲政夫子以正名爲先以子路之賢尚疑其迂然後夫子極言之以爲名之不正其禍至於使民無所措其手足聖人之言萬世之法豈苟然哉惟明人倫逹天理知其上際下蟠無所不極無所逃於天地之間然後信斯言之果不妄也今欲以講和爲名而脩自治之實恐非夫子正名爲先之意内外心迹判爲兩途雖使幸而成功亦儒者之所諱也況先自處於背盟違命之地而使彼得擅其直以責於我内疑上下之心外成讎敵之􅀔皆非計之得也必以揺動爲慮則所謂自治者其惟閉􅀜固圉宼至而戰去不窮追庶可以省息勞費蓄銳待時乎以此自治與夫因機亟决電掃風馳者固不同然猶同歸于是其與講和之計不可同年而語矣不審台意以爲如何答汪尚書甲申十月二十二日熹兹者累日侍行得以親炙竊惟道徳純備固非淺陋所能窺測而於謙虚好問容受盡言之際尤竊有感焉蓋推是心以徃將天下之善皆歸之其於任天下之重也何有愚恐他日之事常人所不能任者閤下終不得而辤也是以不勝拳拳毎以儒釋邪正之辨爲􅀃冀或有助萬分而猶恐其未足於言也請復陳之幸垂聴焉大抵近世言道學者失於太髙讀書講義率常以徑易超絶不歷階梯爲快而於其間曲折精㣲正好玩索處例皆忽略厭棄以爲卑近􅃈屑不足留情以故雖或多聞􅀶識之士其於天下之義理亦不能無所未盡蓋以多聞愽識自爲一事不甚精察其理之所自來􅁍謂别有向上一著與此兩不相􅀜此尹和靖所以有此三事中一事看破則此患亡矣之􅀃可謂切中其病矣理旣未盡而胷中不能無疑乃不復反求諸近顧惑於異端之􅀃益推而置諸􅁳漠不可測知之域兀然終日味無義之語以俟其廓然而一悟殊不知物必格而後明倫必察而後盡格物只是窮理物挌即是理明此乃大學功夫之始濳玩積累各有淺深非有頓悟險絶處也近世儒者語此似亦太髙矣吕舎人書别􅁓録呈彼旣自謂廓然而一悟者其於此猶懵然也則亦何以悟爲哉儒者爲此學而自謂有悟者雖不可謂之懵然其察之亦必不詳者矣又况俟之而未必可得徒使人抱不決之疑志分氣餒虚度􅀊月而倀倀耳􅂚􅀂致一吾宗循下學上逹之序口講心思躬行力究寧煩母略寧下母髙寧淺母深寧拙母巧從容濳玩存乆漸明衆理洞然次第無􅀮然後知夫大中至正之極天理人事之全無不在是􅀄無逈然超絶不可及者而㡬微之間豪􅁵畢察醻酢之際體用渾然雖或使之任至重而處所難亦沛然行其所無事而巳矣又何疑之不決而氣之不完哉縱言至此亦可謂躐等矣然以閤下之明勉而進之恐不足以爲難也此其與外學所謂廓然而一悟者雖未知其孰爲優劣然此一而彼二此實而彼虚則較然矣就使其􅀃有實非吾儒之所及者是乃所以過乎大中至正之矩而與不及者亡以異也窮極幽深過也反倫悖理不及也蓋大本旣立準則自明此孟子所以知言而詖􅁋邪遁接於我者皆不能逃其鑒也生於其心害於其政􅀤於其政害於其事可不戒哉可不懼哉愚意如此不識髙明以爲如何如其可取幸少留意焉旣以自任又以是爲格非定國之本則斯言之􅀤庶不得罪於君子矣或未中理亦乞明賜誨喻將復思而請益焉固無嫌於􅃪納之不弘也􅀌陋寡聞企望之切中國所恃者德夷狄所恃者力今慮國事者大抵以審彼巳較强弱爲言是知夷狄相攻之䇿而未嘗及中國治夷狄之道也蓋以力言之則彼常强我常弱是無時而可勝不得不和也以德言之則振三綱明五常正朝廷勵風俗皆我之所可勉而彼之所不能者是乃中國治夷狄之道而今日所當議也誠能自勵以此則亦何以講和爲哉愚之所憂獨恐力旣不振德又不脩則曰戰曰和俱無上䇿耳悅親有道在於誠身誠身有道在乎明善今和戰殊途兩宫異論秋防巳迫恐誤大計蓋由誠身未至自治未力無以取信於親而然耳必欲違令行義以圖事功其􅀔甚逆而難孰􅀂誠身幾諌以冀感悟其理至順而易㢤答汪尚書熹不揆愚鄙妄陳管見伏䝉高明垂賜誨答反復玩味欽佩無忘然有所疑敢不自竭道在六經何必它求誠如台諭亦可謂要言不煩矣然世之君子亦有雖知其爲如此而不免於淪胥者何哉以彼之爲􅀃者曰子之所求於六經者不過知性知天而巳由吾之術無屈首受書之勞而有其效其見解眞實有過之者無不及焉世之君子旣以是中其好徑欲速之心而不察乎它求之賊道貴仕者又徃徃有王務家私之累聲色􅀔利之娯日力亦不足矣是以雖知至道不外六經而不暇求不􅀂一注心於彼而徼幸其萬一也然則何必云者正矣而熹竊恨其未嚴也􅀂易必以可儻庶㡬乎蓋不必云者無益之辭也不可云者有害之辭也夫二者之間相去遠矣如烏喙食之而殺人則世之相戒者必曰不可食而未有謂不必食而巳者也妄意如此不審髙明以爲如何又蒙教喻以兩蘇之學不可與王氏同科此乃淺陋辭不别白指不分明之過請復陳之於後而來教又以歐陽司馬同於蘇氏則熹亦未能不以爲疑也蓋歐陽司馬之學其於聖賢之髙致固非末學所敢議者然其所存所守皆不失儒者之舊特恐有所未盡耳至於王氏蘇氏則皆以佛老爲聖人旣不純乎儒者之學矣非惡其如此特於此可驗其於吾儒之學無所得而王氏支離穿鑿尤無義味至於甚者㡬􅀋俳優本不足以惑衆徒以一時取合人主假利􅀔以行之至於巳甚故特爲諸老先生之所排詆􅀛山與胡文定書及答蕭子莊書可見其意矣在今日則􅀔窮禍極故其失人人得見之至􅀂蘇氏之言髙者出入有無而曲成義理如易􅀃性命隂陽書之人心道心古史之中一性善老子之道器中和下者指陳利害而切近人情蘇氏此等議論不可殫舉且據論語則東坡之論見陽貨子由之論彼子西皆以利害言之也其智識才辨謀爲氣槩又足以震耀而張皇之使聴者欣然而不知倦非王氏之比也然語道學則迷大本如前注中性命諸􅀃多出私意雜佛老而言之性命之􅀃尤可􅀏熹嘗辨老子說中一段今以拜呈可見其梗槩矣論事實則尚權謀如陽貨子西事乃以此論聖人可見其底藴矣衒浮茟忘本實貴通逹賤名檢此其害天理亂人心妨道術敗風教亦豈盡出王氏之下也哉但其身與其徒皆不甚得志於時無利􅀔以輔之故其􅀃雖行而不能甚乆凡此患害人未盡見故諸老先生得以置而不論使其行於當世亦如王氏之盛則其爲禍不但王氏而巳主名教者亦不得恝然而無言也􅀛山集中雜􅀃數段爲蘇氏􅀤也當時固巳慮此矣程氏語錄中論賢良處亦似有所指蓋王氏之學雖談空虚而無精彩雖急功利而少機變其極也陋如薛昂之徒而巳蔡京雖名推尊王氏然其􅁋侈縱恣所以敗亂天下者不盡出於金陵也􅀛山所論鳬鷖詩乃其所假以爲號耳􅀂蘇氏則其律身巳不􅀂荆公之嚴其爲術要未忘功利而詭祕過之其徒如秦觀李廌之流皆浮誕佻輕士􅀋不齒相與扇縱横捭闔之辨以持其􅀃而漠然不知禮義廉恥之爲何物雖其􅀔利未能有以動人而世之樂放縱惡拘檢者巳紛然向之使其得志則凡蔡京之所爲未必不身爲之也世徒據其巳然者論之是以蘇氏猶得在近世名卿之列而君子樂成人之羙者亦不欲逆探未形之禍以加譏貶至於論道學邪正之際則其辨有在豪􅁵之間者雖欲假借而不能私也今乃欲專貶王氏而曲貸二蘇道術所以不明異端所以益熾實由於此愚恐王氏復生未有以黙其口而厭其心也狂妄􅆫率極言至此恐閤下未以爲然胡不取熹前所陳者數書之􅀃而觀之也以閤下之明秉天理以格人欲據正道以黜異端彼亦將何所遁其情哉熹之愚昧么麽豈不知其力之不足所以􅁣然􅀤憤而不能巳亦決於此而巳矣天下豈有二道哉受學之語見於吕與叔所記二先生語中云昔受學於周茂叔故據以爲􅀃從遊蓋所尊敬而不爲師弟子之辭故范内翰之於二先生胡文定之於三君子熹皆用此字但二先生於康節誠似太重欲改爲與又似太輕不知别下何字爲當更乞示誨幸甚程邵之學固不同然二先生所以推尊康節者至矣蓋以其信道不惑不雜異端班於温公横渠之間則亦未可以其道不同而遽貶之也和靖之言恐如孟子言伯夷伊尹之於孔子爲不同道之比妄意其然不識台意以爲然否抑康節之學抉摘窈㣲與佛老之言豈無一二相似而卓然自信無所汚染此其所見必有端的處比之温公欲護名教而不言者又有間矣因論康節及此并以求敎答汪尚書十一月旣望别􅁓諄誨良荷不鄙自頃致書之後方竊悚懼以俟譴訶豈意髙明不以爲罪而虚受之此眞熹所敬服歎慕而不能巳者幸甚幸甚然所謂一字之失者􅀂推其所自來究其所終極恐其失不但一字而巳更望少留意焉則熹之願也濂溪河南授受之際非末學所敢議然以其迹論之則來教爲得其實矣敢不承命而改焉但通書太極圖之屬更望暇日試一研味恐或不能無􅀘萬分然後有以知二先生之於夫子非􅀂孔子之於老聃郯子萇弘也惟是蘇學邪正之辨終未能無疑於心蓋熹前日所陳乃論其學儒不至而流於詖􅁋邪遁之域竊味來教乃病其學佛未精而滯於智慮言語之間此所以多言而愈不合也夫其始之闢禪學也豈能明天人之藴推性命之原以破其荒誕浮虚之􅀃而反之正哉如大悲閣中和院記之屬直掠彼之粗以角其精據彼之外以攻其内是乃率子弟以攻父母信枝葉而疑本根亦安得不爲之詘哉近世攻釋氏者如韓歐孫石之正􅀛山猶以爲一杯水救一車薪之火況如蘇氏以邪攻邪是束緼灌膏而徃赴之也直以身爲燼而後巳耳來教又以爲蘇氏乃習氣之弊雖不知道而無邪心非􅀂王氏之穿鑿附㑹以濟其私邪之學也熹竊謂學以知道爲本知道則學純而心正見於行事􅀤於言語亦無徃而不得其正焉如王氏者其始學也蓋欲凌跨􅀭韓掩迹顔孟􅀄亦豈遽有邪心哉特以不􅀎知道故其學不純而設心造事遂流入於邪又自以爲是而大爲穿鑿附㑹以文之此其所以重得罪於聖人之門也蘇氏之學雖與王氏􅀂有不同者然其不知道而自以爲是則均焉學不知道其心固無所取則以爲正又自以爲是而肆言之其不爲王氏者特天下未􅀍其禍而巳其穿鑿附㑹之巧如來教所稱論成佛􅀃老子之屬蓋非王氏所及而其心之不正至乃謂湯武􅆲弑而盛稱荀彧以爲聖人之徒凡􅀂此􅀋皆逞其私邪無復忌憚不在王氏之下借曰不然而原情以差其罪則亦不過稍從末減之科而巳豈可以是爲當然而莫之禁乎書曰天討有罪五刑五用哉此刑法之本意也􅀂天理不明無所準則而屑屑焉惟原情之爲務則無乃狥情廢法而縦惡以啓姦乎楊朱學爲義者也而偏於爲我墨翟學爲仁者也而流於兼愛本其設心豈有邪哉皆以善而爲之耳特於本原之際㣲有豪􅁵之差是以孟子推言其禍以爲無父無君而䧟於禽獸辭而闢之不少假借孟子亦豈不原其情而過爲是刻核之論哉誠以其賊天理害人心於㡬㣲之間使人䧟溺而不自知非􅀂刑名狙詐之術其禍淺切而易見也是以㧞本塞源不得不如是之力書曰予畏上帝不敢不正又曰予弗順天厥罪惟均孟子之心亦􅀂是而巳爾以此論之今日之事王氏僅足爲申韓儀衍而蘇氏學不正而言成理又非楊墨之比愚恐孟子復生則其取舎先後必將有在而非如來教之云也區區􅆫越辨論不置非敢自謂工訶古人而取必於然諾實以爲古人致知格物之學有在於是旣以求益而亦意其未必無􅀘於髙明也與汪尚書巳丑去春賜教語及蘇學以爲世人讀之止取文章之妙􅀄不於此求道則其失自可置之夫學者之求道固不於蘇氏之文矣然旣取其文則文之所述有邪有正有是有非是亦皆有道焉固求道者之所不可不講也講去其非以存其是則道固於此乎在矣而何不可之有􅀂曰惟其文之取而不復議其理之是非則是道自道文自文也道外有物固不足以爲道且文而無理又安足以爲文乎蓋道無適而不存者也故即文以講道則文與道兩得而一以貰之否則亦將兩失之矣中無主外無擇其不爲浮誇險詖所入而亂其知思也者㡬希況彼之所以自任者不但曰文章而巳旣亡以考其得失則其肆然而談道德於天下夫亦孰能禦之愚見如此累蒙教告終不能移也又蒙喻及二程之於濂溪亦􅀂横渠之於范文正耳先覺相傳之祕非後學所能窺測誦其詩讀其書則周范之造詣固殊而程張之契悟亦異如曰仲尼顔子所樂吟風弄月以歸皆是當時口傳心受的當親切處後來二先生舉似後學亦不將作第二義看然則行狀所謂反求之六經然後得之者特語夫功用之大全耳至其入處則自濂溪不可誣也􅀂横渠之於文正則異於是蓋當時粗􅀤其端而巳受學乃先生自言此豈自誣者耶大抵近世諸公知濂溪甚淺如吕氏童􅀩訓記其嘗著通書而曰用意髙逺夫通書太極之􅀃所以明天理之根源究萬物之終始豈用意而爲之又何髙下逺近之可道哉近林黃中自九江􅀉其所撰祠堂記文極論濂字偏旁以爲害道尤可駭歎而通書之後次序不倫載蒲宗孟碣銘全文爲害又甚以書暁之度未易入見謀於此别爲叙次而刋之恐􅁍不難辦也舂陵記文亦不可解此道之衰未有甚於今日柰何柰何答汪尚書伏蒙垂教以所不及反覆再四開􅀤良多此足以見閒居味道所造日深而又謙虚退託不自賢智如此區區下懐尤切欣幸第顧淺陋不足以當誘掖之勤兹爲媿懼耳然竊思之東西銘雖同出於一時之作然其詞義之所指氣象之所及淺深廣狹逈然不同是以程門專以西銘開示學者而於東銘則未之嘗言蓋學者誠於西銘之言反復玩味而有以自得之則心廣理明意味自别􅀂東銘則雖分别長傲遂非之失於豪􅁵之間所以開警後學亦不爲不切然意味有窮而於下學功夫蓋猶有未盡者又安得與西銘徹上徹下一以貫之之㫖同日而語哉竊意先賢取舎之意或出於此不審髙明以爲如何至於體用一原􅂋㣲無間之語則近嘗思之前此看得大叚鹵莾子細玩味方知此序無一字無下落無一語無次序其曰至微者理也至著者象也體用一原􅂋㣲無間蓋自理而言則即體而用在其中所謂一原也自象而言則即􅂋而㣲不能外所謂無間也其文理宻察有條不紊乃如此􅀂於此看得分明則即西銘之書而所謂一原無間之實巳瞭然心目之間矣亦何俟於東銘而後足耶􅀂俟東銘而後足則是體用􅂋㣲判然二物必各爲一書然後可以發明之也先生之意恐不如此不審髙明又以爲如何太極圖西銘近因朋友商􅃀嘗竊私記其􅀃見此抄録欲以請教未畢而明仲之僕來索書不欲留之後便當拜呈也然頃以示伯恭渠至今未能無疑蓋學者含糊覆冐之乆一旦遽欲分剖暁析而告語之宜其不能入也又蒙語及前此妄論平易蹉過之言稱許甚過尤切皇恐然竊􅀚來意似以爲先有見處乃能造夫平易此則又似禪家之􅀃熹有所不能無疑也聖門之教下學上逹自平易處講究討論積慮濳心優柔饜飫乆而漸有得焉則日見其髙深逺大而不可窮矣程夫子所謂善學者求言必自近易於近者非知言者也亦謂此耳今日此事非言語臆度所及必先有見然後有以造夫平易則是欲先上逹而後下學譬之是猶先察秋豪而後睹山岳先舉萬石而後勝匹雛也夫道固有非言語臆度所及者然非顔曽以上㡬於化者不能與也今日爲學用力之􅀄正當學問思辨而力行之乃可以變化氣質而入於道顧乃先自禁切不學不思以坐待其無故忽然而有見無乃溺心於無用之地玩􅀊愒日而卒不見其成功乎就使僥倖於恍愡之間亦與天理人心叙秩命討之實了無交渉其所自謂有得者適足爲自私自利之資而巳此則釋氏之禍横流稽天而不可遏者有志之士所以隠憂浩嘆而欲火其書也舊讀明道行狀記其學行事業累數千言而卒道其言不過力排釋氏以爲必闢之而後可以入道後得吕滎公家傳則以爲嘗受學於二程而所以推尊稱羙之辭甚盛考其實亦誠有以大過人者然至其卒章而誦其言則以爲佛之道與聖人合此其師生之間分背矛盾一南一北不審台意平日於此是非之際何以處之天之生物使之一本此是則彼非此非則彼是蓋不容並立而兩存也愚昧無知誤蒙誘進敢竭愚慮庶㡬决疑伏望恕其狂易而終教之幸甚幸甚答汪尚書論家廟癸巳熹伏蒙垂問廟制之􅀃熹昨託陳明仲就借古今諸家祭儀正以􅀌陋寡聞無所質正因欲講求俟其詳備然後請於髙明以定其論耳不謂乃䝉下詢使人茫然不知所對然姑以所示兩條考之竊謂至和之制雖􅀂不合於古而實得其意但有所未盡而巳政和之制則雖稽於古者或得其數而失其意則多矣蓋古者諸侯五廟所謂二昭二穆者髙祖以下四世有服之親也所謂太祖者始封之君百世不毀之廟也今世公侯有家而無國則不得有太祖之廟矣故至和四廟特所謂二昭二穆四世有服之親而無太祖之廟其於古制雖􅀂不同而實不害於得其意也又況古者天子之三公八命及其出封然後得用諸侯之禮蓋仕於王朝者其禮反有所厭而不得伸則今之公卿宜亦未得全用諸侯之禮也禮家又言夏四廟至子孫而五則是凡立五廟者亦是五世以後始封之君正東向之位然後得備其數非於今日立廟之􅀄便立太祖之廟也政和之制蓋皆不考乎此故二昭二穆之上通數髙祖之父以備五世夫旣非始封之君又巳親盡而服絶矣乃苟以備夫五世而祀之於義何所當乎至於大夫三廟􅀃者以爲天子諸侯之大夫皆同蓋古者天子之大夫與諸侯之大夫品秩之數不甚相逺故其制可以如此􅀂今之世則唯侍從官以上乃可以稱天子之大夫至諸侯之大夫則州鎭之幕職官而巳爾横渠先生止爲京官而温公云官比諸侯之大夫則巳貴是安可以拘於古制而使用一等之禮哉故至和之制專以天子之大夫爲法亦深得制禮之意但其自東宫三少而上乃得爲大夫則疑未盡而適士二廟官師一廟之制亦有所未備焉耳政和之制固未必深考古者天子諸侯之大夫同爲一等之􅀃然其意實近之但自大侍從至陞朝官並爲一法則亦太無隆殺之辨矣蓋官職髙下則有古今之不同但以命數凖今品數而論之則禮之等差可得而定矣然此亦論其得失而巳􅀂欲行之則政和之禮行於今日未之有改凡仕於今日而得立廟者豈得而不用哉但其所謂廟者制度草略巳不能如唐制之盛而況於古乎此好禮之士所以未嘗不歎息於斯也然考諸程子之言則以爲髙祖有服不可不祭雖七廟五廟亦止於髙祖雖三廟一廟以至祭寢亦必及於髙祖但有䟽數之不同耳疑此最爲得祭祀之本意今以祭法考之雖未見祭必及髙祖之文然有月祭享嘗之别則古者祭祀以逺近爲䟽數亦可見矣禮家又言大夫有事省於其君干祫及其髙祖此則可爲立三廟而祭及髙祖之驗而來教所疑私家合食之文亦因可見矣但干祫之制它未有可考耳墓祭之禮程氏亦以爲古無之但縁習俗然不害義理但簡於四時之祭可也凡此皆直據鄙見與其所聞而論之以求教於門下伏惟髙明財擇因風還賜一言以決其是非焉則熹不勝幸甚熹又嘗因程氏之􅀃草其祭寢之儀將以行於私家而連年遭喪未及盡試未敢輙以拜呈少俟其備當即請教也答汪尚書前蒙垂諭廟制率易薦聞未知中否不􅀩辨詰殊失所望然􅀂果於台意無疑則亦足自安矣别􅁓下詢尤見謙德之盛愈下而愈光顧熹之愚不足以有所發耳夫宋公以外祖無後而􅀊時􅀕之此其意可謂厚矣然非族之祀於理旣未安而勢不及其子孫則爲慮亦未逺􅂚􅀂訪其族親爲之置後使之以時奉祀之爲安便而乆長哉但貧賤之士則其力或不足以爲此或雖爲之而彼爲後者無所顧於此則亦不能使之致一於所後􅀂宋公則其力非不足爲􅀂爲之而割田築室以居之又奏授之官以禄之則彼爲後者必將感吾之􅁩而不敢乏其祀矣此於義理甚明利害亦不難暁竊意宋公特欲親奉甞之以致吾不忘母家之意而其慮遂不及此耳若果如此則使爲後者主其􅀕而吾特徃助其饋奠亦何爲而不可伏惟髙明試一思之如有可采願早爲之使異時史䇿書之可以爲後世法而宋公之事不得專羙於前則區區之深願也愚見如此不審台意以爲如何答汪尚書伏􅀩垂諭􅀕儀之闕此間前日盖亦有疑之者熹竊以爲正廟配食只合用􅀄配一人其再娶及庶母之屬皆各爲别廟祠之乃於情義兩盡不審台意如何焚黄近世行之墓次不知於禮何據昨見欽夫謝魏公贈謚文字郤只云告廟此與近世所行又不知孰爲得失也更乞台諭幸甚又見王彦輔塵史記富文忠李文定忌日變服事横渠理窟亦有變服之􅀃但其制度皆不同如熹前日所定則與士庶吉服相亂恐不可行不知三家之􅀃當從何者爲是亦乞批誨當續修正也與汪尚書郭子和所辨買宅事元本尚未還納今偶尋不􅀗别錄一本拜納伏乞視至其所辨論不審台意以爲如何如其有徴即合刻之程書本卷之後􅀂其尚在疑信之間則亦不必傳也便還乞示一的報幸甚但其所辨侍疾事云有請問錄象學􅀃及伊川徃來書雖巳焚蕩想渠尚及記憶欲乞因書試爲詢訪或得其大略梗槩當有益於學者而亦可以證明其􅀃之不妄矣渠􅀃又云譙天授亦黨事後門人熹見胡劉二丈􅀃親見譙公自言識伊川於涪陵約以同居洛中及其至洛則伊川巳下世矣問以伊川易學意似不以爲然至考其它言行又頗雜於佛老子之學者恐未得以門人稱也以此一事及其所著象學文字推之則恐其於程門亦有未純師者不知其所謂卒業者果何事耶凡此皆熹所疑敢并以請得賜開喻幸甚幸甚與張欽夫别􅁓侯子論語抄畢内上其間誤字顯然者巳輙爲正之矣但其語時有不瑩豈其不長於文字而然耶抑别有以也頃在豫章見阜卿所傳語録有尹和靖所稱伊川語云侯師正議論只好隔壁􅃪詳味此言以驗此書竊謂其學大抵明白勁正而無深濳縝宻沈浸醲郁之味故於精微曲折之際不免踈略時有鏬縫不得於言而求諸心乃其所見所存有此氣象非但文字之疵也狂妄輙爾輕議前輩可謂不韙然亦講學之一端所不得避不審髙明以爲如何人回􅁍望批誨幸甚幸甚答張欽夫䝉示及答胡彪二書呂氏中庸辨發明親切警悟多矣然有未諭敢條其所以而請於左右答廣仲書切中學者之病然愚意竊謂此病正坐平時燭理未明涵飬未熟以故事物之來無以應之􅀂曰於事物紛至之時精察此心之所起則是似更於應事之外别起一念以察此心以心察心煩擾益甚且又不見事物未至時用力之要此熹所以不能亡疑也儒者之學大要以窮理爲先蓋凡一物有一理湏先明此然後心之所􅀤輕重長短各有準則書所謂天叙天秩天命天討孟子所謂物皆然心爲甚者皆謂此也若不於此先致其知但見其所以爲心者如此識其所以爲心者如此泛然而無所準則則其所存所􅀤亦何自而中於理乎且如釋氏擎拳竪拂運水般柴之􅀃豈不見此心豈不識此心而卒不可與入尭舜之道者正爲不見天理而專認此心以爲主宰故不免流於自私耳前輩有言聖人本天釋氏本心蓋謂此也來示又謂心無時不虚熹以爲心之本體固無時不虚然而人欲巳私汨没乆矣安得一旦遽見此境界乎故聖人必曰正其心而正心必先誠意誠意必先致知其用力次第如此然後可以得心之正而復其本體之虚亦非一日之力矣今直曰無時不虚又曰旣識此心則用無不利此亦失之太快而流於異學之歸矣􅀂儒者之言則必也精義入神而後用無不利可得而語矣孟子存亡出入之􅀃亦欲學者操而存之耳似不爲識此心􅀤也􅀂能常操而存即所謂敬者純矣純則動靜如一而此心無時不存矣今也必曰動處求之則是有意求免乎靜之一偏而不知其反􅀝乎動之一偏也然能常操而存者亦是顔子地位以上人方可言此今又曰識得便能守得則僕亦恐其言之易也明道先生曰旣能體之而樂則亦不患不能守湏如此而言方是攧撲不破絶滲漏無病敗耳髙明之意大抵在於施爲運用處求之正禪家所謂石火電光底消息也而於優游涵泳之功似未甚留意是以求之太迫而得之􅀂驚資之不深而發之太露易所謂寛以居之者正爲不欲其如此耳愚慮及此不識髙明以爲如何與張欽夫先生自注云此書非是但存之以見議論本未耳下篇同此人自有生即有知識事物交來應接不暇念念遷革以至於死其間􅀄無頃刻停息舉世皆然也然聖賢之言則有所謂未發之中寂然不動者夫豈以日用流行者爲巳􅀤而指夫暫而休息不與事接之際爲未􅀤時耶嘗試以此求之則泯然無覺之中邪暗鬰塞似非虚明應物之體而㡬微之際一有覺焉則又便爲巳􅀤而非寂然之謂蓋愈求而愈不可見於是退而驗之於日用之間則凡感之而通觸之而覺蓋有渾然全體應物而不窮者是乃天命流行生生不巳之機雖一日之間萬起萬滅而其寂然之本體則未嘗不寂然也所謂未發如是而巳夫豈别有一物限於一時拘於一處而可以謂之中哉然則天理本眞隨處􅀤見不少停息者其體用固如是而豈物欲之􅀻所能壅遏而梏亡之哉故雖汨於物欲流蕩之中而其良心萌蘖亦未嘗不因事而􅀤見學者於是致察而操存之則庶乎可以貫乎大本逹道之全體而復其􅀄矣不能致察使梏之反覆至於夜氣不足以存而䧟於禽獸則誰之罪哉周子曰五行一隂陽也隂陽一太極也太極本無極也其論至誠則曰靜無而動有程子曰未􅀤之前更如何求只平日涵養便是又曰善觀者􅁍於巳􅀤之際觀之二先生之􅀃如此亦足以驗大本之無所不在良心之未嘗不發矣與張欽夫先生自注云此書所論尤􅆾戾所疑語録皆非是後自有辨􅀃甚詳前書所扣正恐未得端的所以求正兹辱誨喻乃知尚有認爲兩物之蔽深所欲聞幸甚幸甚當時乍見此理言之唯恐不親切分明故有指東畫西張皇走作之態自今觀之只一念間巳具此體用􅀤者方徃而未􅀤者方來了無間斷隔截處夫豈别有物可指而名之哉然天理無窮而人之所見有逺近深淺之不一不審如此見得又果無差否更望一言垂教幸幸所論􅀛山中庸可疑處鄙意近亦謂然又如所謂學者於喜怒哀樂未􅀤之際以心驗之則中之體自見亦未爲盡善大抵此事渾然無分叚時節先後之可言今著一時字一際字便是病痛當時只云寂然不動之體又不知如何語録亦嘗疑一處􅀃存養於未發之時一句及問者謂當中之時耳目無所見聞而答語殊不痛快不知左右所疑是此處否更望指誨也向見所著中論有云未􅀤之前心妙乎性旣􅀤則性行乎心之用矣於此竊亦有疑蓋性無時不行乎心之用但不妨常有未行乎用之性耳今下一前字亦㣲有前後隔截氣象如何如何熟玩中庸只消著一未字便是活處此豈有一息停住時耶只是來得無窮便常有箇未􅀤底耳􅀂無此物則天命有巳時生物有盡處氣化斷絶有古無今乆矣此所謂天下之大本􅀂不眞的見得亦無揣摸處也與張欽夫昨見共父家問以爲二先生集中誤字老兄以爲嘗經文定之手更不可改愚意未暁所謂夫文定固有不可改者如尊君父攘夷狄討亂臣誅賊子之大倫大法雖聖賢復出不能改也􅀂文字之訛安知非當時所傳亦有未盡善者而未得善本以正之歟至所特改數處竊以義理求之恐亦不􅀂先生舊文之善􅀂如老兄所論則是伊川所謂昔所未遑今不得復作前所未安後不得復正者又將起於今日矣巳作共父書詳言之復此具禀更望虚心平氣去彼我之嫌而專以義理求之則於取舎從違之間知所處矣道術衰㣲俗學淺陋極矣振起之任平日深於吾兄望之忽聞此論大以爲憂􅀂每事自主張如此則必無好問察言之理將來任事必有不滿人意處而其流風餘弊又將傳於後學非適一時之害也只如近世諸先逹聞道固有淺深涵養固有厚薄擴充運用固有廣狹然亦不能不各有偏􅀝處但公吾心以玩其氣象自見有當矯革處不可以火濟火以水濟水而益其疾也熹聞道雖晚頼老兄提掖之賜今幸略窺彷彿然於此不能無疑不敢自鄙外於明哲故敢控􅄋一盡所言不審尊意以爲如何其詳則又具於共父書中幸取而并觀之無恠其詞之太直也與張欽夫不先天而開人各因時而立政胡本天作時欽夫云作天字大害事愚謂此言先天與文言之先天不同文言之云先天後天乃是左右參賛之意如左傳云實先後之意思即在中間正合天運不差豪髮所謂啐啄同時也此序所云先天􅁍是天時未至而妄以私意先之􅀂耕穫菑畬之􅀋耳兩先天文同而意不同先天先時􅁍􅀄不異但上言天下言人上言時下言政於文爲恊耳窺聖人之用心胡本無心字欽夫云著心字亦大害事請深思之愚謂孟子言尭舜之治天下豈無所用其心哉言用心莫亦無害於理否别􅁓稱姪固未安稱猶子亦不典按禮有從祖從父之名則亦當有從子從孫之目矣以此爲稱似稍穏當慮偶及此因以求教非敢復議改先生之文也與富公及謝帥書全篇反復無非義理卒章之言止是直言義理之效感應之常如易六十四卦無非言吉凶禍福書四十八篇無非言災祥成敗詩之雅頌極陳福禄夀考之盛以歆動其君而告戒之者尤不爲少卷阿尤著孟子最不言利然對梁王亦曰未有仁義而遺後其君親者答宋牼亦曰然而不王者未之有也此豈以利害動之哉但人自以私心計之便以爲利故不肖者則起貪欲之心賢者則有嫌避之意所􅃐雖殊然其處心之私則一也􅀂夫聖賢以大公至正之心出大公至正之言原始要終莫非至理又何嫌疑之可避哉􅀂使先生全篇主意專用此􅀃則誠害理矣向所見教同行異情之􅀃於此亦可見矣春秋序兩處觀其語脉文勢似熹所據之本爲是先天二字卷中論之巳詳莫無害於理否理旣無害文意又恊何爲而不可從也聖人之用下著心字語意方足尤見親切主宰處下文所謂得其意者是也不能窺其用心則其用豈易言哉故得其意然後能法其用語序然也其精微曲折蓋有不苟然者矣􅀂謂用心非所以言聖人則孟子易傳中言聖人之用心者多矣蓋人之用處無不是心自聖人至於下愚一也但所以用之者有精粗邪正之不同故有聖賢下愚之别不可謂聖人全不用心又不可謂聖人無心可用但其用也妙異乎常人之用耳然又湏知即心即用非有是心而又有用之者也與張欽夫論程集改字二十七日别􅁓伏􅀩垂諭向論程集之誤定性書辤官表兩處巳蒙収録其它亦多見納用此見髙明擇善而從􅀄無適莫而小人向者妄􅀤之過也然所謂不必改不當改者反復求之又似未能不惑於心􅂺復條陳以丐指喻夫所謂不必改者豈以爲文句之間小小同異無所繫於義理之得失而不必改耶熹所論出於巳意則用此􅀃可也今此乃是集諸本而證之按其舊文然後刋正雖或不能一一盡同亦是􅀋㑹數􅀃而求其文勢語脉所趨之便除所謂疑當作某一例之外未嘗敢妄以意更定一􅀧畫也此其合於先生當日本文無疑今􅀂有尊敬重正而不敢忽易之心則當一循其舊不容復有豪髮苟且遷就於其間乃爲盡善惟其不爾故字義迃晦者必承誤彊􅀃而後通如遵誤作尊今便彊􅀃爲尊其所聞之􅀋是也語句刓闕者須以意屬讀然後備如甞食絮羮叱止之無皆字則不成文之􅀋是也此等不惟於文字有害反求諸心則隠微之間得無未免於自欺耶且如吾輩秉筆書事唯務明白其肯故舎所宜用之字而更用它字使人彊􅀃而後通耶其肯故爲刓闕之句使人屬讀而後備耶人情不大相逺有以知其必不然矣改之不過印本字數稀宻不匀不爲觀羙而它無所害然則胡爲而不改也卷子内如此處巳悉用朱圈其上復以上呈然所未圈者似亦不無可取方執筆時不能不小有嫌避之私故不能盡此心今人又來督書不容再閱矣更乞詳之可也所謂不當改者豈謂富謝書春秋序之屬而書中所喻沿泝猶子二􅀃又不當改之尤者耶以熹觀之所謂尤不當改者乃所以爲尤當改也大抵熹之愚意止是不欲專輙改易前賢文字稍存謙退敬讓之心耳􅀂聖賢成書稍有不愜巳意處便率情􅁬筆恣行􅂗改恐此氣象亦自不佳蓋雖所改盡善猶啓末流輕肆自大之弊況未必盡善乎伊川先生嘗語學者病其於巳之言有所不合則置不復思所以終不能合答楊迪及門人二書見集今熹觀此等改字處竊恐先生之意尚有不可不思者而改者未之思也蓋非特巳不之思又使後人不復得見先生手筆之本文雖欲思之以逹於先生之意亦不可得此其爲害豈不甚哉夫以言乎巳則失其恭敬退讓之心以言乎人則啓其輕肆妄作之弊以言乎先生之意則恐猶有未盡者而絶人之思姑無問其所改之得失而以是三者論之其不可巳暁然矣老兄試思前聖入太廟每事問存餼羊謹闕文述而不作信而好古深戒不知而作教人多聞闕疑之心爲如何而視今日紛更專輙之意象又爲如何審此則於此宜亦無待乎熹之言而決且知熹之所以再三冐瀆貢其所不樂聞者豈好巳之􅀃勝得巳而不巳者哉熹請復論沿泝猶子之􅀃以實前議夫改沿爲泝之􅀃熹亦竊聞之矣如此暁破不爲無力然所以不可改者蓋先生之言垂世巳乆此字又無大害義理􅀂不以文辭害其指意則只爲沿字而以因字尋字循字之屬訓之於文似無所害而意亦頗寛舒必欲改爲泝字雖不無一至之得然其氣象􅁍殊迫急似有彊探力取之弊疑先生所以不用此字之意或出於此不然夫豈不知沿泝之别而有此謬哉蓋古書沿字亦不皆爲順流而下之字也荀子云反鈆察之注云鈆與沿同循也惜乎當時莫或疑而扣之少祛後人之惑後之疑者又不能闕而遽改之是以先生之意終巳不明而舉世之人亦莫之思也大抵古書有未安處隨事論著使人知之可矣􅀂遽改之以没其實則安知其果無未盡之意耶漢儒釋經有欲改易處但云某當作某後世猶或非之況遽改乎且非特漢儒而巳孔子刪書血流漂杵之文因而不改孟子繼之亦曰吾於武成取二三䇿而巳終不刋去此文以從巳意之便也然熹又竊料改此字者當時之意亦但欲使人知有此意未必不􅀂孟子之於武成但後人崇信太過便憑此語塗改舊文自爲失耳愚竊以爲此字決當從舊尤所當改􅀂老兄必欲存之以見泝字之有力則請正文只作沿字而注其下云某人云沿當作泝不則云胡本沿作泝不則但云或人可也如此兩存使讀者知用力之方改者無專􅂺之咎而先生之㣲音餘韻後世尚有黙而識之者豈不兩全其適而無所傷乎猶子之稱謂不當改亦所未喻蓋來敎但云姪止是相沿稱之而未見其害義不可稱之意云稱猶子尚庶㡬焉亦未見其所以庶㡬之􅀃是以愚瞢未能卒暁然以書傳考之則亦有所自來蓋爾雅云女子謂兄弟之子爲姪注引左氏姪其從姑以釋之而反復考㝷終不言男子謂兄弟之子爲何也以漢書考之二䟽乃今世所謂叔姪而傳以父子稱之則是古人直謂之子雖漢人猶然也蓋古人淳質不以爲嫌故如是稱之自以爲安降及後世則心有以爲不可不辨者於是假其所以自名於姑者而稱焉雖非古制然亦得别嫌明㣲之意而伯父叔父與夫所謂姑者又皆吾父之同氣也亦何害於親親之義哉今􅀂欲從古則直稱子而巳􅀂且從俗則伊川横渠二先生者皆嘗稱之伊川嘗言禮從宜使從俗有大害義理處則湏改之夫以其言如此而猶稱姪云者是必以爲無大害於義理故也故其遺文出於其家而其子序之以行於世舉無所謂猶子云者而胡本特然稱之是必出於家庭之所筆削無疑也􅀂曰何故它處不改蓋有不可改者如祭文則有對偶之􅀋是也􅀂以稱姪爲非而改之爲是亦當存其舊文而附以新意况本無害理而可遽改之乎今所改者出於檀􅃓之文而彼文止爲喪服兄弟之子與巳子同故曰兄弟之子猶子也與下文嫂叔之無服也姑姉妹之薄也之文同耳豈以爲親屬之定名哉猶即如也其義繋於上文不可殊絶明矣􅀂單稱之即與世俗歇後之語無異􅀂平居假借稱之猶之可也豈可指爲親屬之定名乎􅀂必以爲是則自我作古别爲一家之俗夫亦孰能止之似不必強挽前逹使之同巳以起後世之惑也故愚於此亦以爲尤所當改以從其舊者􅀂必欲之則請亦用前例正文作姪注云胡本作猶子則亦可矣春秋序富謝書其􅀃略具卷中不知是否更欲細論以求可否此人行速屢來督書不暇及矣􅀂猶以爲疑則亦且注其下云元本有某某􅀂干字庶㡬讀者旣見當時言意之實又不揜後賢刪削之功其它亦多􅀋此幸賜詳觀即見區區非有偏主必勝之私但欲此集早成完書不悞後學耳計老兄之意豈異於此但恐見理太明故於文意􅃈細之間不無闊略之處用心太剛故於一時意見所安必欲主張到底所以紛紛未能卒定如熹則淺暗遲鈍一生在文義上做窠窟苟所見未明實不敢妄爲主宰農馬智專所以於此等處不敢便承誨諭而不自知其􅆫易也伏惟少賜寛假使得盡愚將來改定新本便中幸白共父􅀉兩本來容更參定箋注求教所以欲兩本者蓋欲留得一本作底以備後復有所稽考也儻蒙矜恕不録其過而留􅃪焉不勝幸甚幸甚答張欽夫祭􅀃辨訂精審尤荷警􅀤然此二事􅀄亦致疑但見二先生皆有隨俗墓祭不害義理之􅀃故不敢輕廢至於節祠則又有􅀃蓋今之俗節古所無有故古人雖不祭而情亦自安今人旣以此爲重至於是日必具殽羞相宴樂而其節物亦各有宜故世俗之情至於是日不能不思其祖考而復以其物享之雖非禮之正然亦人情之不能巳者但不當專用此而廢四時之正禮耳故前日之意以爲旣有正祭則存此似亦無害今承誨諭以爲黷而不敬此誠中其病然欲遂廢之則恐感時觸物思慕之心又無以自止殊覺不易處且古人不祭則不敢以燕況今於此俗節旣巳據經而廢祭而生者則飲食宴樂隨俗自如殆非事死如事生事亡如事存之意也必盡廢之然後可又恐􅀄無害於義理而特然廢之不惟徒駭俗􅃪亦恐不能行逺則是已廢之祭拘於定制不復能舉而燕飲節物漸於流俗有時而自如也此於天理亦豈得爲安乎夫三王制禮因革不同皆合乎風氣之宜而不違乎義理之正正使聖人復起其於今日之議亦必有所處矣愚意時祭之外各因鄉俗之舊以其所尚之時所用之物奉以犬槃陳於廟中而以告朔之禮奠焉則庶㡬合乎隆殺之節而盡乎委曲之情可行於乆逺而無疑矣至於元日履端之祭禮亦無文今亦只用此例又􅀄定儀時祭用分至則冬至二祭相仍亦近煩瀆今改用卜日之制尤見聴命於神不敢自專之意其它如此脩定處甚多大􅊠多本程氏而參以諸家故特取二先生􅀃今所承用者爲祭􅀃一篇而祭儀祝文又各爲一篇比之昨本稍復精宻繕冩上呈乞賜審訂示及幸甚答張欽夫所示彪丈書論天命未契處想尊兄巳詳語之然彪丈之意似欲更令下語雖自度無岀尊兄之意外者然不敢不自竭以求教也蓋熹昨聞彪丈謂天命惟人得之而物無所與鄙意固巳不能無疑今觀所論則似又指禀生賦形以前爲天命之全體而人物所受皆不得而與焉此則熹之所尤不暁也夫天命不巳固人物之所同得以生者也然豈離乎人物之所受而别有全體哉觀人物之生生無窮則天命之流行不巳可見矣但其所乗之氣有偏正純駁之異是以禀而生者有人物賢否之不一物固隔於氣而不能知衆人亦蔽於欲而不能存是皆有以自絶于天而天命之不巳者􅀄亦未嘗巳也人能反身自求於日用之間存養體察以去其物欲之蔽則求仁得仁本心昭著天命流行之全體固不外乎此身矣故自昔聖賢不過使人盡其所以正心脩身之道則仁在其中而性命之理得伊川先生所謂盡性至命必本於孝弟正謂此耳遺書第十八卷一段論此甚詳夫豈以天命全體置諸􅀍命受生之前四端五典之外而别爲一術以求至乎彼哉蓋仁也者心之道而人之所以盡性至命之樞要也今乃言聖人雖教人以仁而未嘗不本性命以􅀤之則是以仁爲未足而又假性命之云以助之也且謂之大本則天下之理無出於此但自人而言非仁則無自而立故聖門之學以求仁爲要者正所以立大本也今乃謂聖人言仁未嘗不兼大本而言則是仁與大本各爲一物以此兼彼而後可得而言也凡此皆深所未喻不知彪丈之意竟何如耳知言首章即是􅀃破此事其後提掇仁字最爲􅂃切正恐學者作二本三本看了但其間亦有急於暁人而剖析太過略於下學而推􅀃太髙者此所以或啓今日之弊序文之作推明本意以救末流可謂有功於此書而爲幸於學者矣尚何疑之有哉釋氏雖自謂惟明一心然實不識心體雖云心生萬法而實心外有法故無以立天下之大本而内外之道不備然爲其􅀃者猶知左右迷藏曲爲隠諱終不肯言一心之外别有大本也􅀂聖門所謂心則天序天秩天命天討惻隠羞惡是非辭讓莫不該備而無心外之法故孟子曰盡其心者知其性也知其性則知天矣存其心養其性所以事天也是則天人性命豈有二理哉而今之爲此道者反謂此心之外别有大本爲仁之外别有盡性至命之方竊恐非惟􅀌􅀒聖賢立言垂後之意平生承師問道之心竊恐此􅀃流行反爲異學所攻重爲吾道之累故因來示得效其愚幸爲審其是否而復以求教於彪丈幸甚幸甚晦庵先生朱文公文集卷第三十考異答汪尚書論蘇氏學紛然一作歙然訓導何器校
