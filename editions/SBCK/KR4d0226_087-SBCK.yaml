body:
  text: 祭文祭籍溪胡先生文嗚呼哀哉惟公之生氣温質良弱冠而學有志四方發軔􅅾蒿至于臨漳學承于家行著于鄉乃獻王府乃游膠庠中退而休客彼洛陽有隱其居維蜀之莊公乃束脩踵門升堂一語妙契發乎天光浩然東歸衡泌洋洋我簞我瓢我糟我糠或漁于溪或圃于崗水鯉鮮􅃾藥頴豐長以是爲養胡考寕康以是爲樂消揺相羊我心悠悠􅀊月于荒華髪斑衣名聞帝旁弓旌鼎來聘幣是將義不去親欲隱彌彰乃降命書乃賜冠裳乃命典教于梓于桑學徒莘莘儼立成行謦欬未聞眉睫不揚式訛厥心炳其文章作人之功于今靡忘中秘之官典冊是藏公晚而居群儒所望陳謨帝前震聲廟廊人曰先生􅁢仁且剛旋反舊廬旣夀且臧云胡不淑奄忽而亡嗚呼哀哉惟我先君志行文㓗有不吾儕一顧不屑而於我公所愛無斁豈面而朋所趣同轍纊息之言屬以其􅀌公亦見哀不鄙其愚卜兆使藏卜鄰使居擇術使由求田使餔我壯而頑學無所至悔尤巳多視公則愧公不謂然欲終誨之其言諄諄夫豈予欺南風之薫草堂晝寂方侍公言􅃍問公疾公啓手足我不及知遣使饋藥公猶見之謂我當來命延以入我趨適至則巳無及􅃝跣而入哭于􅃦門淵氷之戒竟莫得聞嗚呼哀哉惟昔治命三公是託屏山傾頽草堂㝠漠幸公獨存爛􅀂星辰今亦往矣誰復儀刑嗚呼哀哉人生百年誰則不死公有令名亦旣夀祉全而生之全而歸之公實奚憾後人之思嗚呼哀哉尚饗祭延平李先生文道喪千載兩程勃興有的其緒􅀛山是承􅀛山之南道則與俱有覺其徒望門以趨惟時豫章傳得其宗一簞一瓢凛然髙風猗歟先生早自得師身世兩忘唯道是資精義造約窮深極㣲凍解氷釋發於天機乾端坤倪鬼祕神彰風霆之變日月之光爰曁山川草木昆虫人倫之正王道之中一以貫之其外無餘縷析毫差其分則殊體用混貟隱顯昭融萬變並酬浮雲太空仁孝友弟灑落誠明清通和樂展也大成婆娑丘林世莫我知優哉游哉卒􅀊以嬉迨其季年徳盛道尊有來摳衣發其昏蔽侯伯聞風擁篲以迎大本大經是度是程稅駕云􅀄講議有端疾病乘之醫窮技殫嗚呼先生而止於斯命之不融誰實尸之合散屈伸消息滿虚廓然大公與化爲徒古今一息􅂚計短長物我一身孰爲窮通嗟惟聖學不絶如綫先生得之旣厚以全進未􅀗施退未及傳殉身以殁孰云非天熹也小生丱角趨拜恭惟先君實共源􅂀誾誾侃侃歛袵推先氷壷秋月謂公則然施及後人敢渝斯志從游十年誘掖諄至春山朝榮秋堂夜空即事即理無幽不窮相期日深見勵彌切蹇歩方休鞭䋲巳掣安車暑行過我衡門返斾相遭凉秋巳分熹於此時適有命召問所宜言反覆教詔最後有言吾子勉之凡兹衆理子所自知奉以周旋幸不失墜歸裝朝嚴訃音夕至失聲長號淚落懸泉何意斯言而訣終天病不舉扶殁不飯含奔赴後人死有餘憾儀刑永隔卒業無期墜緒茫茫孰知我悲伏哭柩前奉奠以贄不亡者存鍳此誠意又祭延平李先生文山頽梁壞􅀊月不留即逺有期親賔畢㑹柳車旣􅅚薤露懷悲生榮死哀孰不摧慕熹等乆依教育義重恩深學未傳心言徒在耳載瞻繐綍彌切痛傷築室三年莫酬夙志舉觴一慟永訣終天嗚呼哀哉祭魏元履國録文人生而材乃克自貴材者亦多鮮或有志猗歟元履才英氣豪凌空趠逺志節堅髙爰自弱齡聲華秀發事賢友仁其聞四逹迨其中􅀊攷古驗今訂以經術益宏益深聞人之賢􅀂􅀗於巳推之揚之情􅂚能巳視人之阨􅀂已擠之是振是㧞力無有遺婆娑丘林􅀊月遲莫聘幣鼎來片言感悟謂當用世遂究厥施誰謂落落乃遄其歸歸來考槃于澗于陸慺慺之忠永矢弗告謂當暫愒尋復詔追誰謂一疾而訖於斯嗚呼哀哉念昔交情兄膠我􅃮更攻互磨兄玉我石世途艱險孟門太行兄行我憂兄歸我藏與兄同心誰則如我奚必梁丘君可亦可兄實髙明卒監此心顧託警勵琅琅其音訶佛詆巫考禮正俗奉承靡他葬又得卜長坂之何兄所樂游孰云兹今有墳其丘謂我宜銘亦兄所􅀉行髙文卑秪以爲累日月有時漬緜束芻長慟􅃦門愧恨何如恭惟神靈尚記疇昔感此哀誠來飲來食蔞翣在門往寕厥宫没而不朽君子之終嗚呼哀哉尚饗祭何叔京知縣文程氏唱道英材景從逮罹部黨門舘一空惟時東平志道誠篤請操拔篲甘委秩禄勁節􅀌忠遭難而發身没言存孰嗣其烈侃侃辰州受業于門舉幡報徳亦取斥奔抱􅀒弗施退講于家兄克承之以振厥華惟兄天資髙明峻潔幹父承師􅁢蹈遐轍稽經訂史取友以端慱聞約守惟義之安孝友静㢘不絿不競一試其能亦克有政令于湘􅁟兹適問􅂗云胡不淑而隕其軀兄未病時過我精舎講道論心窮日繼夜旣歸而病亟以書來千萬永訣嗚呼痛哉惟兄之明原始反終罔怛于化以病其公上念母慈下歉徳學逺忠極慮語簡情慤兄子謂予盍銘諸幽外期永世知徳是求􅀂兄之賢實我所畏惟其不能辭則靡愧嗚呼痛哉昔我來斯兄出迎門羅列豆觴語􅀏温温今我來斯奠此空尊長號大慟兄卧不聞嗚呼痛哉祭劉參議文惟公文足以取髙科才足以躋顯仕踐揚中外三十餘年吳蜀之郷自尉而令康新之郡由貳而專白首斑衣内旣懽於榮養朱􅙲皂盖外益謹於承宣旋登王畿出參幕府人謂低徊而不偶公獨逶迤而㤗然方將告休天朝言歸故里捿神乎香火之社玩意乎詩史之編何一疾之弗瘳􅃍百年之難料悵轜車之旣駕倐丹旐以􅀌翩行路酸辛知名悼恨而况􅀖人與邑子孰不齎咨而涕漣嗚呼哀哉熹以孤童早依仁里無所肖似獨荷知憐登髙寫懐每繳紛而近後探嚢搜祕或拏㩴以争先以至發廪勸公築倉移粟旣同憂而共喜如合病以齊痊惟此好之難忘感餘生而自悼舉空觴而一慟􅂓永訣乎終天祭汪尚書文維淳熈三年􅀊次丙申三月朔二十七日壬申從表姪宣教郎主管台州崇道觀朱熹謹以香茶清酌致祭于近故端明殿學士尚書汪公之靈曰嗚呼惟公學貫九流而不自以爲足材髙一世而不自以爲名道尊徳備而不自以爲得位髙聲重而不自以爲榮蓋玩心乎文武之未墜抗志乎先民之所程巍乎其􅀂嵩岱之雄峙浩乎其􅀂滄海之􅆂渟自秀發於妙齡冠倫􅀋而獨立中委棄於諸侯實天脫其覊馽迨壯􅀊之來歸曰良時之儻吾及曽墨突之未黔復吾行之汲汲汨東閩而西蜀亘萬里而周流騰茂實而愈偉􅈾聖神之訪求旣銓綜於天官又潤色乎皇猷謂朝夕之疇咨即進陪於廟謀何儇媚之狡夫獻功利之浮􅀃公抗䟽而指陳請昭姦而堲絶事乃謬而不然吾何爲乎兹列寜隱屏而就間弭長騖之遐轍粤退司於間舘遂遄反乎丘林託僧廬以静處或獨往而孤尋眷塵編而􅀉懐􅀂與世乎無心衆徒嘆公何其樂之獨而孰知公爲有憂之深伊有識之望公釋東山而再起以卒究其所施俾斯民之咸喜胡彼蒼之不可信曽不一老之憗遺忽堂堂而逝去興殄瘁之悲詩熹也􅀌生叨塵末契辱教誨之殊常殆相期於國士雖不見者十年亦音書之相􅁇不鄙謂其庸虚毎咨詢而弗置兹逖聞於訃告悵失聲而永號巾素車以即路越閩嶺之崇髙行踽踽而凉凉孰有如予心之欝陶跽陳詞而侑奠痛人師之難遭祭柯國材文維淳熈四年二月辛未朔旦新安朱熹謹以香茶酒果奠于近故柯君國材老丈之靈俗弊道衰士鮮知學束書不觀遊談燕樂有不其然剽掠爲工乘時射利莫反其躬孰能知君苦心刻意探討之勤白首不置弗榮于禄弗媚于時自信之篤死生莫移余少之時試吏君里實始識君敬慕興起致君序室以表後生弦誦洋洋徳義振聲闊焉反復講評匪同而和肺腑以傾自兹一别遂隔死生何􅃍至此惟君之徳剛毅近仁望之可畏即之可親居今行古勇莫能奪行行之名不肖所怛哀哉巳矣無復斯人緘辭千里􅀉此酸辛嗚呼哀哉伏惟尚饗祭姚式文嗚呼簮纓之鏘然唯子之纍然聲利之􅅝然唯子之澹然貌甚癯􅀆病巳纒不復興􅀆歸其全我之來􅀆閔子賢一臂交􅀆失九泉念官曹􅀆若蟬聮涕子零􅀆具此筵祭吳晦叔文維君學造深㣲行履䋲約交朋友盡切偲之義處兄弟竭怡怡之􅂬脫屣􅀔榮玩心道要方日新而未巳􅃍川逝而不􅅏熹乆辱遊從多􅀩規益暌離雖乆書䟽鼎來忽聞不淑之音實隕無從之涕屬􅆞朞慘逺寓奠觴莫􅀗長言以詠潜徳臨風一慟永訣終天祭劉共父樞密文維淳熈五年􅀊次戊戌九月辛酉朔二十日庚辰從表弟宣教郎主管建寜府武夷山冲佑觀朱熹敢以清酌庶羞之奠告于近故建康留守觀文殿學士彭城劉公之靈嗚呼哀哉天胡付公以瓌竒俊偉之材而不并假以耆耋期耄之夀胡位公以樞機藩屏之重而不遂􅂌以彌綸輔賛之權使公名􅀂極富貴而無欲實則抱憂歎以終天此中外志義之士所以聞公之薨皆失聲而相吊或雖未識公靣而亦不自知其涕泗之流漣者也嗚呼哀哉惟公生有異質早擢巍科退而自保弗競弗譁屈首受書典學于家内􅂶其羙外振厥華曁豋王朝遂掌綸綍獻納綢繆訏謨密勿忤權觸要無所回屈帝眷弗渝試以郡紱受􅃏于南勦頑踣凶婉孌赤子撫摩哀恫禮賢勸學導和致豐報政三年鄒魯其風帝曰來歸本我兵柄曽不㡬時咨以大政公􅁬其庸帝虚以聽張磔宏綱塞絶僣令道直身危突不暇黔出臨两鎮威燀恩漸適嬉于堂􅃍哭于苫恩詔起之有竦其瞻公卧弗承帝悉其孝曰究汝哀來覲來教公言益切公守不撓再撫于潭亦顯其効乃遷建業民病以饑公不寢食起坐嗟咨方略旣張惠術四施曽是流莩化爲充肥帝嘉乃勲加勞進律􅀝毗方深􅃍告以疾忠無隱情諌有遺筆帝驚罷朝悼此良弼嗚呼哀哉我以􅀌童來託公家公不鄙我勸導有加公姿鸞鵠我性麏䴥豈無異同卒莫疵瑕自公進爲論議慷􅁣實始斯公髙明光大公之知我亦晚而最迨其永歸乎札告戒褒徳撫􅀌古昔所難并以諉我我其敢安把書長號涕隕䦨干還坐以思􅁣其永歎念昔帝師爲國死義亞傅承之夷險一致屏山雖隱亦豈忘世公襲其傳克廣無替衆咸謂公當訖外庸入賛皇極下􅁵庶工登賢屏姦復境攘戎内􅁇祖考畢其餘忠天胡難諶而止於此羣邪交慶衆正心死矧予之衰竊究終始願言思公􅂚其有巳嗚呼哀哉昔誦離騷舉公觴􅀆今拜以哭酹公堂􅀆􅀻情公義两怛傷􅀆神靈不昧尚克鑒予之􅂨腸􅀆嗚呼哀哉尚饗又祭劉共父樞密文嗚呼哀哉惟公之薨迨兹半載殄瘁之嘆雖乆彌新日月有期佳城將啓惟時親故罔不悼傷矧予孤生蚤託恩契道義期許晚而益敦臨絶之音􅀉屬良厚其爲感惻豈獨常情迫此詔除懇辭未􅀗義當引道以俟報聞凢公誨言略巳遵奉倘未即死尚圖厥終輀車之行不遑祖送敢持薄奠以訣終天倥偬悲凉言無次叙惟公精爽克鑒此心又祭劉共父樞密文年月日具位朱熹謹遣男埜門人林􅁢中略具酒肴之奠敬奉熹所撰次先正少傅公神道碑銘草藁告于近故􅅏守觀文樞密彭城劉公靈几之前曰在昔􅀊秋公病欲絶自力爲書來告永訣上言國家讎耻未雪􅃁骨易枯此恨難㓕次念遺阡豐碑未掲謂我銘之以永前烈下及諸􅀌覊貫在列謂我教之它靡顧謁字畫方嚴詞氣凛冽是豈死人而有斯􅀃三復悲號心膂貫徹聞公是日三簡并折拜䟽千言忠憤是􅂥我雖不武實仰竒節生旣人英死當鬼傑又惟公家忠孝閥閱紀徳銘功盍付時哲公命不亂􅂚取凡劣諒以􅀌生㓜罹禍孽􅀩􅀍前恩欲報罔竭故略其愚以累斯碣方將渉筆叙次鋪列屬其來西曠日引月迄今乃成事偉詞拙逺薦陳之如聽予决想像两公感涕摧咽顧念滯留塵􅁟覊紲莫相嗣人講貫劘切以此􅀒公一飰再噎頃爲迎師􅀉此筆舌比聞授受稍契磁鉄尚其不厭習乆而悅盡掃童心罔蹈非轍彼齊彼孺悉藉提挈卒大公門緩此憂惙山瓢往酹野蔌并設老涙如傾逺􅀉清血嗚呼哀哉尚饗祭張敬夫殿撰文嗚呼敬夫􅃍棄予而死也耶我昔求道未􅀗其友蔽莫予開吝莫予剖蓋自從公而觀於大業之規模察彼群言之紛紏於是相與切磋以究之而又相厲以死守也丙戌之冬風雪南山觧􅃑櫧州今十五年公試畿輔公翔禁省公牧于南我遯巖嶺顯晦殊迹心莫與同書䟽懇惻鬼神可通公尹江陵我官廬嶽驛􅀐相望音問逾數去臘之窮有來自西告我公疾手書在擕我觀于時神理或僣是疾雖微巳足深念亟遺問訊閱月而歸叩函發書歎吒歔欷時友曽子實同我憂揮涕請行􅁩不忍留曾行未㡬公訃果至張侯適來相向反􅃑嗚呼敬夫竟棄予而死也耶惟公家傳忠孝學造精㣲外爲軍民之所屬望内爲學者之所依歸治民以寛事君以敬正大光明表裏輝映自我觀之非惟十駕之弗及蓋未必終日言而可盡也矧聞公喪痛徹心膂緘詞􅀉哀不遑他語顧聞公之臨絶手遺䟽以納忠召賔佐而與訣委符節而吿終蓋所謂得正而斃者又凛乎其有史魚之風此猶足以爲吾道而增氣抑又可以上悟於宸聦又聞公於此時屬其弟以語予用斯文以爲􅀉意懇懇而無餘顧何徳以堪之然敢不竭其庸虚并矢詞以爲報尚精爽其鑒兹嗚呼哀哉又祭張敬夫殿撰文維淳熈七年􅀊次庚子六月癸未朔六日丁亥具位朱熹竊聞故友敬夫張兄右文修撰大葬有期謹遣清酌時羞奠于柩前南望拜哭起而言曰嗚呼自孔孟之云逺聖學絶而莫􅁇得周翁與程子道乃抗而不墜然微言之輟響今未及乎百􅀊士各􅀻其所聞巳不勝其乖異嗟惟我之與兄脗志同而心契或靣講而未窮又書傳而不置蓋有我之所是而兄以爲非亦有兄之所然而我之所議又有始所共鄊而終悟其偏亦有蚤所同擠而晚得其味蓋繳紛往反者㡬十餘年末乃同歸而一致由是上而天道之微逺而聖言之秘近則進脩之方大則行藏之義以兄之明固巳洞照而無遺􅀂我之愚亦幸竊窺其一二然兄喬木之故家而我衡茅之賤士兄髙明而宏慱我狷狹而迂滯故我嘗謂兄冝以是而行之當時兄亦謂我盍以是而傳之來裔蓋雖隱顯之或殊實則交湏而共濟不惟相知之甚審抑亦自靖而無愧嗚呼孰謂乃使兄終在外以違其心予亦見縻於斯而所願將不遂也政使得間以就其書是亦任左肱而失右臂也傷哉吾道之窮予復何心於此世也惟脩身􅀘過以畢餘年庶有以見兄於下地也聞兄之葬而不得臨獨南望長號以􅀉此酹也惟兄憐而鑒之尚隂有以輔予之志也嗚呼哀哉祭鄭自明文故友台州史君大著鄭兄自明之靈曰比年以來士氣衰弱觀時俯仰狥􅀔前郤其心有一身而無天下其口有唯唯而無諤諤偉哉自明之爲人信所謂喧啾百鳥之群忽見秋天之一鶚者也蓋自其布衣而巳有憂天下之心其揖讓人主之前則直欲排佞倖之朋而折其角其言明白切至磊磊落落憤激峻厲嶢嶢嶽嶽明主所爲虚心而嘉嘆羣公所爲變容而駭愕善􅀋所爲喜幸而心開邪黨所爲戚嗟而氣索偉哉自明之爲人凛乎其有古爭臣之風求之近世則措之鄒陳之間而無怍者也夫何天命之不延竒禍一朝而􅃍作使前日之悲者喜而喜者悲紛慶弔之交錯嗚呼哀哉君昔過我寒泉之濵一語定交情義日親逮上饒之草次語宵分而更㒒謂當擇善以潜心毋以一長而自足粤今兹之秋孟又札書以申之眷予心之悃欵實千載以爲期書適往而訃來噭然號其焉及哦殄瘁之悲詩坌百憂之來集惟平生之忠赤諒雖死而不忘跽陳情於一酹詞與淚而俱楊嗚呼哀哉尚饗祭陸子壽教授文學匪􅀻􅀃惟道是求苟誠心而擇善雖異序以同流如我與兄少不並遊蓋一生而再見遂傾倒以綢繆念昔鵝湖之下實云識靣之􅀄兄命駕而鼎來載季氏而與俱出新篇以示我意懇懇而無餘厭世學之支離新易簡之規模顧予聞之淺陋中獨疑而未安始聽瑩於胷次卒紛繳於談端徐度兄之不可􅃍以辨屈又知兄必將返而深觀遂逡廵而旋返悵猶豫而盤旋别來㡬時兄以書來審前􅀃之未定曰子言之可懷逮予辭官而未􅀗停􅆖道左之僧齋兄乃枉車而來教相與極論而無猜自是以還道合志同何風流而雲散乃一西而一東蓋曠􅀊以索居僅尺書之两通期杖屨之肯顧或慰滿乎予􅂨屬者乃聞兄病在床亟函書而問訊并褁藥而携將曽往使之未返何來音之不祥驚失聲而隕涕沾予􅃑以淋浪嗚呼哀哉今兹之􅀊非龍非蛇何獨賢人之不淑屢興吾黨之深嗟惟兄徳之􅀹粹儼中正而無邪至其降心以從善又豈有一毫驕吝之􅀻耶嗚呼哀哉兄則巳矣此心實存烱然叅􅀝可覺惰昏孰泄予􅂨一慟􅃦門緘辭千里侑此一尊祭黄尚書文大道旣隱淳風日弊氣鍾于人鮮克全粹習而益逺輕肆苟偷言如可重考行則羞猗歟我公受材特異不假修爲嘿與道契端莊静一終日欽欽不動而敬神保是臨賔于王庭昌言大對庸弗順隨乆斥于外晚歸獻納正笏垂紳時而後發一言萬鈞誾誾省曹侃侃禁闥權倖顧之心摧氣奪孝慈㨯懤未返北征引經抗䟽罷宴請行帝嘉其忠衆服其勇咸惜公行係國輕重公嘗老矣兹復告歸祖帳東門觀者歔欷公在故鄉恂恂翼翼士夫髙仰逺邇承式帝曰懷哉舊學之賢乃詢乃訪加璧以先公拜曰都此帝之徳盡言不隱是乃臣職公年雖髙不杖不扶謂當復起駟馬安車一病踰年竟以喪告䟽有遺忠當宁震悼嗚呼哀哉熹以晚學􅀗游公門望公容貌鄙寛薄敦惟其躁輕弗克持乆公不鄙焉撫接加厚去􅀊之春入拜公堂公時巳病志氣則彊正冠肅容不異平日端拱立談教告諄悉豈謂此别遂隔死生聞訃欲往竹符是縈寫哀陳辭漬綿走酹想像徳容恍􅀂瞻對顧惟媮惰不克其躬永言疇昔以此􅀒公又祭黃尚書文巳亥之春拜公床下甞辱靣命先徳是銘自惟晚生弗克堪此懇辭未􅀗而公永歸官守拘牽莫遑弔􅂘寓觴一奠無所復辭於是彊顔勉爲叙次卑鄙進越旣懼且慙今奉以來昧冐陳薦永惟疇昔􅁣想音容徳盛禮恭不以病懈任重道逺何愧昔人今兹之亡寜復可見殄瘁之痛豈以其􅀻惟其榛蕪卒無以稱公靈不昧尚鑒厥􅂨􅀕詹淑人文熹來㑹公葬問舎修容乃聞夫人􅃍亦薨逝其爲駭愕良不自勝恭惟夫人克有令徳作配君子賔敬齊莊化􅀍閨門怡愉肅穆胡不眉壽以永徳聲两殯在堂行道悽惻一觴奉奠少見鄙誠敬想淑靈諒埀歆鑒祭吕伯恭著作文嗚呼哀哉天降割于斯文何其酷耶往􅀊巳奪吾敬夫今者伯恭胡爲又至於不淑耶道學將誰使之振君徳將誰使之復後生將誰使之誨斯民將誰使之福耶經􅀃將誰使之􅁇事記將誰使之續耶􅀂我之愚則病將孰爲之箴而過將誰爲之督耶然則伯恭之亡􅂚爲而不使我失聲而驚呼號天而慟哭耶嗚呼伯恭有􅆱􅀛之智而處之􅀂愚有河漢之辯而守之􅀂訥胷有雲夢之富而不以自多詞有黼黻之華而不易其出此固今之所難而未足以議兄之彷彿也􅀂乃孝友絶人而勉勵如弗及恬淡寡欲而持守不少懈盡言以納忠而羞爲訐秉義以飭躬而耻爲介是則古之君子尚或難之而吾伯恭猶欿然而未肯以自大也蓋其徳宇寛洪識量閎廓旣海納而川停豈澄清而撓濁矧涵濡於先訓紹文獻於厥家又􅂭師而親友極探討之幽遐所以禀之旣厚而飬之深取之旣慱而成之粹宜所立之甚髙亦無求而不備故其講道於家則時雨之化進位于朝則鴻羽之儀造辟陳謨則宣公獨御之對承詔奏篇則右尹祈招之詩上方虚心而聽納衆亦注目其旉施何遭時之不遂遽縈疾而言歸􅁣一卧以三年尚左圖而右書間逍遥以曵杖恍沂上之風雩衆咸喜其有瘳冀卒攄其素藴不惟傳道以著書抑亦後來之程凖何此望之難必奄一夕而長終増有􅀖之殄瘁極吾黨之哀恫嗚呼哀哉我實無似兄辱與遊講摩深切情義綢繆粤前日之枉書尚粲然其手筆始言沉痼之難除猶幸死期之未即中語簡編之次第卒誇草􅀣之深幽謂昔騰牋而有約盍今命駕以來遊欣此㫖之可懐懔訃車而偕至考日月之㡬何不旦暮之三四嗚呼伯恭而􅃍死耶吾道之衰乃至此耶旣爲位以泄哀復緘辭以寓奠冀嗣􅀊之有間尚前言之可踐嗚呼哀哉尚饗祭劉氏妹文年月日兄具位以酒饌祭于亡妹五十六娘之靈昔妹之亡兄縻郡紱病弗及療歛弗克臨歸來撫棺一慟永訣今兹窀穸巳復有期輙具酒肴來哭爾殯兄及老㓜共此一哀惟爾有靈尚其歆享嗚呼痛哉􅀕陳休齋文維淳熈十一年􅀊次甲辰三月庚寅朔二十有七日丙辰具位朱熹謹以香茶酒果奠于近故休齋先生冲佑叅議陳公之靈熹少日遊宦􅀗從公遊於泉漳之間􅀩公愛予誘掖良厚其後别去㡬三十年而去􅀊之冬復得見公相與開懷握手如平生歡公雖老矣而意氣不衰爲我置酒談經論義篇什間作亹亹不休相與追遊連華九日凉􅄘鳯凰雲臺之間晝則聮車夜則對榻視公起居食飲呌呼談噱皆有非後生所能及者謂公壽考宜未艾也然我之還公復載酒餞我洛陽則摻􅃑分􅂝潸然出涕而有此㑹難又之悲矣醉中别去慘然不樂乆而不能平也然亦不謂未及两月而公訃􅃍來嗚呼痛哉公於諸經皆有論述許以􅀉我相與考評而今而後不復得遂此願矣緘詞千里􅀉此一奠尚惟精爽聽我此言嗚呼哀哉尚饗祭許順之文維淳熈十二年四月庚辰宣教郎直徽猷閣主管華州雲䑓觀朱熹謹以香茶及賻幣一匹奠于故友許君順之之靈我官同安諸生相從遊者多矣其恬淡靖退無物欲之累未有如順之者也逮予秩滿相與俱歸不以千里爲逺其後别去二十餘年中間相見不過一再前􅀊雲臺一别匆匆未及究其所欲言不意君之􅃍至此也聞訃􅃤怛寓此一哀君其有靈尚克鑒此尚饗祭劉平父文憶我少日來託君家君時未齓蘭茁其芽誦書琅然意氣英發見者驚嗟謂即聞逹逮其冠􅀊甫就一官兩除莫府再值省員世路威夷耻復自眩婆娑林丘始適于願䟽泉成沼種􅀣著行舘宇連延澗壑青蒼穠春素秋風朝月夕把酒哦詩情髙意適流光荏苒素髪星鮮人爲君屈君獨超然恨山不髙惜水不廣勝日籃輿翩然獨往行樂餘功燕及里閭枵腹夏飽甕兒夜􅈱校考書勞豈慚􅁏食胡不百年享此休逸一病􅃍革百藥莫瘳神理杳冥孰訊厥由親友駿奔行道洒涕矧我於君情寔昆弟蓋自卜居餘四十年豈無他人合散風煙惟我與君俱不諧偶跧伏窮山别希㑹乆中念恩契申以昏姻逮兹晚􅀊情義益親方從君遊􅃍問君疾代君發棠君語諄悉何意一朝隻影蹣􅘐扶疾哭君㡬不自還一奠寢門醪單饌薄唯此哀誠庶通㝠漠嗚呼哀哉祭陳福公文繄名之至下脫一句惟公徳在生民功書信史大節昭然善終善始中興輔相比立豪英曰文曰武各以其名孰如我公道全徳備莫得而名繄名之至亦弗自知惟誠惟一衆善畢隨士於見聞以多爲富公無不窺不以慱著士於詞章以麗爲精公無不能弗以文稱匪清匪濁不夷不惠和不至流㢘不至劌論無苟異亦無必同温温其毅坦坦其恭執法於中不專爲直大姦旣除國論斯一承流於外不一於寛苛嬈不作閭里自安中坐廟堂宏綱是總主徳旣修民聽不聳從容一言㧞佞移寵帝納其忠人服其勇晚而告休稅冕遺紳安車駟馬歸卧里門進不出位退不忘君垣屋雖卑徳義日尊羣行兼融尚不勝記公亦何心有此全羙惟其不有道則彌光两宫之眷四海之望謂當百年再豋承弼卒惠我民永綏王國云胡不淑奄忽長終臨絶之言不忘教忠嗚呼哀哉我從公遊出入三紀晚途間􅀜遂託知巳千里訃至一觴薦誠想公如在酒淚同傾嗚呼哀哉祭詹侍郎文維紹熈元年􅀊次庚戌七月癸丑朔十有一日癸亥具位朱熹謹致奠于近故經略閣學侍郎詹公之靈嗚呼世之學者衆矣其所以爲學者􅀋不過出入乎口耳之間求其篤志力行以期入乎聖賢之域者則鮮矣惟公粹羙之資得於天禀孜孜問學樂善不倦其尊聞行知之效見於日用之間者在家在􅀖隨事可紀蓋一本於中和而行之以慈恕信乎所謂志於仁而無惡者矣晚豋從班出鎭南服急於救弊以綏其民故不暇計百全之利而其害有出於意慮之外者上雖不􅀗巳於積毀之言然暫謫而亟還之則旣有以知公之無罪矣衆亦咸謂啇度財利鈎校米鹽本非所以煩儒學老成之士莫不冀公之復起而有以卒究其所學之藴也不謂歸未及門而􅃍以病告稅駕未㡬而遂至於不起此則有志於學者所以歎息流涕而遺恨於無窮也熹辱知惟舊􅀩念亦深聞訃踰年一奠莫致其爲愧􅀒蓋不勝言緘詞寓哀尚祈鑒享嗚呼哀哉祭潘叔度文嗚呼叔度生非不偶而終身不渉乎仕進之塗家非不足而比老不渝其寒苦之節出門從師則不計生之先後而唯善是主閉戸積學則不顧世之毀譽而唯道是求蓋其立志之髙有如此者是以其躬行之効内則孝友著於家庭外則仁義信於朋友以至於州閭鄊黨莫不髙其峻㓗畏其嚴正而不敢以非義加焉雖世之賢士大夫知之者比肩顧未有能引而致之要路之津使試其學以及於人而遂奄然以􅃿于地也嗚呼哀哉熹愚不肖辱知最深申以㛰姻情義愈篤因風聞訃悲不自勝酹此一觴千古永訣嗚呼哀哉尚饗祭劉子澄文維年庚戌􅀊月朔二十六日具位朱熹謹致祭于亡友子澄劉兄􅀽州使君之靈嗚呼子澄以樂易之姿躬純篤之行立志髙雅信道深堅處家庭則孝弟逹聞交朋友則信義昭著居閒則其講道著書有以樂衆人之所不樂從官則其飬民善俗獨能憂衆人之所不憂至於收恤宗黨而接引後來蓋孜孜焉無不用其至若其樂人之善而矜人之惡又汲汲焉唯恐不盡其誠故賢者與之遊則常幸其有思齊聞過之益不賢者與之處則常病其有明汚招過之羞然世之賢者少而不賢者多是以子澄之得譽寡而􅀩毀衆道不得行於一州而遂齎志以没地也是豈不可爲之深悲而痛恨也耶予以無能蚤結交好切磋之益􅀊晚益親然而解􅃑江磯忽焉十載婁卜再㑹卒焉無期病不得伸執手之悲没不得展撫棺之慟聞訃累月乃能使人而病衰不文言又不足以盡其區區之意引首西望涕泗交流尚幸楊兄昔同遊好屬其一酹足􅀉此心嗚呼子澄其尚能有以知予之悲也耶尚饗祭潘左司文維紹熈元年􅀊次庚戌七月癸丑朔二十有八日庚辰具位朱熹謹致奠于近故太平顯謨左司使君契丈潘公之靈嘗謂論世之學士大夫優於學行者政事之才或未必逹精於政事者學行之趣或未必醇就使能兼二者之長則於去就出處之大節又或未必能無所愧也惟公文學之華行義之實旣有以成於身而信於友及其典州郡殿藩服則其聦明仁愛精審持重所以惠柔良而讋姦􅁀者又卓然非今之從政者所能及爰及晚􅀊稱疾卧家懇避詔除引義慷􅁣是其見㡬之明守道之固􅀿變從容不可回撓又足以􅀜䜛慝之口而奪之氣嗚呼是亦可謂志力之備徳業之全而無歉於爲人矣謂當復起及此聖朝卒究所施以慰士論何其奄忽􅃍即夜䑓凡在聞知莫不傷悼况熹不敏辱知最深書䟽相尋問遺勸勉勤懇之至乆而不忘聞訃失聲涕霣心折顧以衰病復窘王程建此踰年始克布奠鄉風引首悲恨來并惟公不亡鑒此誠意嗚呼哀哉􅀕劉子禮文從表具位朱熹謹以清酌時羞奠于近故劉君子禮六十七兄之靈曰自我少日託昏髙門得從兄遊於今五十年矣每竊見兄志氣堅彊色荘言厲論議英發滚滚不窮而臨事􅀿變從容裁處不動聲氣目無全牛未甞不歎其英邁閎逹老大多材眞有聘君先生之遺風意其必當出􅀿時湏以世前烈豈謂中􅀊事多不諧一日􅁣然謝去塲屋少肆餘力誅草淮鄉數年之間亦有成緒而兄好義周急不間戚䟽肥馬輕裘視猶涕唾遂散其積翩然南歸憇止玉山愛其山川之秀風俗之美遊從之盛則遂求田問舎而定居焉曾未㡬時􅃍以病卧易簀之旦神宇㤗然徧告親朋千萬永訣不鄙謂我幅􅁓丁寜筆􅀔低昻亡異平日赴車來止我病亦衰把書長號不能自巳嗚呼痛哉以兄之才終以不遇而止於此豈非天乎昏憊支離未能亟往拊棺大慟以罄一哀又聞佳城亦旣得􅁲祖奠之日近不踰旬走使緘詞逺􅀉一酹忽焉精爽如在目前嗚呼哀哉伏惟尚饗祭張敬夫城南祠文年月日具位朱熹敬以一觴酹于亡友敬夫侍講左司張公尊兄城南之祠昔從公遊登髙望逺指顧兹􅁟水竹之間謂予肯來相與卒􅀊予以懷􅁟顧謝不能其後聞公開鑿亭沼帶經􅀝杖日遊其間寫景哦詩辱以􅀉我寂寥短韻㡬篇在吟於今㡬何􅀊月犇逝我復來此白髪蒼顔追懷舊遊顧歩涕落未奠􅀫草姑即遺祠玉色金聲恍如對接草木魚鳥莫知我哀􅀕張魏公墓文惟公功存社稷澤在生民上比列星多歴年所英靈陟降千古如存曰有遺丘乃􅀉兹􅁟熹夙深宗慕亦誤知憐兹幸分符􅀗叅守奉瞻言螭首饋奠莫親寓此一觴諒􅀩昭鑒􅀕南軒墓文惟公閎逹之資聞道最早發揮事業逹于家􅀖中􅀊閒居益求其志鶴鳴子和朋簮四來我時自閩亦云戾止更互切磨群疑乃亡厥今㡬何俯仰一世公逝旣乆我老益衰何意重來獨撫陳迹塵筵髣髴拱木荒凉録牒散亡音徽莫紹世道之感平生之懷交切于中有涕橫落欲推公志㩀舊圖新衆􅁢未孚唯以自愧一觴往酹并􅀉此情公乎不忘起聽我語􅀕叔祖奉使直閣文維紹熈五年􅀊次甲寅十月戊子朔二十日丁未從孫具位熹敢昭告于故五十六叔祖父奉使直閣府君故五十六叔祖母㳟人王氏之墓惟昔鼻祖徳潜弗升施及後人克濟其羙公仗漢節立哭虜庭白首來歸無所汙􅄺而熹先子亦翔天朝適以此時遭䜛去國死生契濶遂以終天今四十年熹復來此無所肖似寵秩橫加能薄幸多仰愧前烈恭惟明詔全節是褒照弟㷀然亦霑禄仕瞻望封闕來拜公祠惟公不亡歆此誠意尚饗祭叔父崇仁府君文故三叔父崇仁府君故三叔母安人丁氏之墓昔拜叔父于霅之川粤旣南歸遂不復見及拜叔母于帝之鄉告違未㡬即以訃告今復來此䨇􅃁蕘然微弟之賢孰襄此事旣􅀍先澤行矣官榮尚與後人無怠嗣慶一觴所酹林長草豐尊靈不亡歆此誠意尚饗祭趙丞相文嗚呼惟公天賦中和家傳忠孝愛君憂國懇懇不忘進秉樞機適逄變故禀承慈訓援立聖明計定一時功垂萬世夫何不幸乃困煩言適此退閑忽聞逺役衝風冐雪千里于征行未及休病􅃍不起赴車所曁痛憤惟均白叟黃童興言出涕矧予衰鄙素辱知憐推挽彌縫期於國定何悟反覆接踵言歸我罪未論公行先邁臨風一慟雞絮是將精爽如存尚識兹意嗚呼哀哉尚饗􅀕程允夫文維慶元二年十一月乙巳晦外兄具位謹以香茶酒果奠于内弟吉州録事程允夫之靈此月之􅀄得吾弟九月六日書於便中首言濫得羙名恐爲師門之辱次言老不解事愧貽老兄之憂予蓋深有味乎其言如接􅀏談之適也旣又視其字畫謹好詞氣安閑且言受代有日骨肉俱安則又深以爲喜蓋􅀄不聞其有所疾痛也及二十有九日曽君無疑使以書來乃言吾弟比以此月八日不幸死矣嗚呼哀哉以吾允夫之才之志而止於此且以何疾而􅃍然耶余生多艱今復老病中外兄弟蓋亡㡬人有如允夫􅀹號同志而學與時背仕皆不逄猶冀莫年卒其舊業更相勉厲以畢餘生何意允夫而􅃍止此緘詞往酹悲不能文君其有知尚識此意嗚呼哀哉祭黄子厚文維慶元五年四月二十八日巳丑雲谷老人朱熹謹遣男某奉酒茗之奠告于亡友榖城隱君子厚黄廿八兄之靈曰嗚呼哀哉與君相逢俱十五六夜諷同聲朝嬉競逐尋各壯長居又􅁲鄰講藝論文􅀏語日親兄才甚髙俯睨一世顧獨謂余許以並轡迨其中間合散不常倐然两翁顔衰鬢蒼我行旣艱歸以病廢兄老一丘亦困羣吠念昔兄言凡兹並遊唯我與君庶其後凋亦旣有徴謂可長保此外悠悠置勿復道孰謂兹今兄去而先遺是一老顧影孑然欲往哭兄炙雞絮酒足曵弗前目㫁門柳兄雖巳矣其存則長流傳滿世偉畫名章兄學有徒頗勤收拾庶㡬成編追配騷什唯其清苦絶去羶葷誰其知之後世子雲我論有疑亦竢兄决今則巳夫琴破弦絶嗚呼哀哉尚饗祭蔡季通文維慶元四年􅀊次戊午十月二十有九日癸巳新安朱熹竊聞亡友西山先生蔡君季通覉旅之櫬逺自舂陵言歸故里謹以家饌􅃗雞斗酒酹于柩前嗚呼哀哉尚饗又祭蔡季通文慶元四年十有二月六日新安朱熹竊聞亡友西山先生蔡兄季通輀車祖載將就窀穸巳飭素車往助執紼而連日大病遂不能前謹遣男埜奉香燭茶酒往奠柩前於其行也哭而送之曰嗚呼季通而至此耶精詣之識卓絶之才不可屈之志不可窮之辯不復可得而見矣天之生是人也果何爲耶西山之㒹君擇而居西山之足又卜而藏而我於君之生旣未得造其廬以遂半山之約至於今日又不能扶曵病驅以視君之反此真宅而永訣以終天也並遊之好同志之樂巳矣巳矣哀哉哀哉祭方伯謨文鳴呼痛哉乆此卧病聞君之訃不能往哭東望涕零又以悲悼之深未暇爲文以侑此奠惟君之行未能甚逺英靈炳然當識此意嗚呼痛哉晦庵先生朱文公文集卷第八十七懷安縣儒學訓導葉暢校
