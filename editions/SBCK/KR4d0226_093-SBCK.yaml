body:
  text: 墓誌銘女巳埋銘朱氏女生癸巳因以名叔其字父晦翁毋劉氏生四年哌失恃十有五適笄珥趙聘入奄然逝哀汝生婉而慧雖未學得翁意臨絶言孝友悌從毋藏亦其志父汝銘毋汝視汝有知尚無畏宋淳熈歳丁未月終􅇳壬寅識江君清􅀸墓誌銘淳熈十有四年春二月庚午鶴山江君清卿卒冬十有一月庚申葬于其里少東夏嶺之原前期其弟嗣以書致今臨江通守賈侯應之狀來請銘予幸蚤得從清􅀸游然家居相距百餘里不得旦暮相與切磋琢磨以究其學也然毎一相見則心愈益敬愛之及聞其死以病未克赴弔至是乃輿疾而往􅂘之入其門望其几筵像設見其子甚㓜纍然服䘮撫其匶於西廂不自知其慟也歸乃發賈侯之狀又附以予􅀁知者而具論之君諱明清卿其字也世家建陽縣北樂里曽大父諱測以學行教鄕黨仕止將作監主簿而贈官至太中大夫大父諱立左朝奉郎以吏治循良受知於司馬文正公父諱􅄾左宣教郎永州州學教授覃思春秋之學􅀛山先生楊公見其書而稱之尤以文學行義知名當世娶同縣虞氏而生清卿焉清卿生有異稟書過目輒成誦作文操筆立成皆有思致見者驚歎以爲江氏有子矣以童子見張魏公即開口論天下事儼然如成人公亦竒之年十七遭外憂執䘮如禮旣冠益從諸長老遊讀書問學探討不倦而不肯輕爲論說待守踐行造次必以䂓矩而不務過爲崖異斬絶之行其接物薫然以和然亦未嘗苟然有􅀁阿狥鄕人無不悅而親之然其恬曠虚逺之懷安靖篤實之操誠於中而形於外者人亦望而敬之不敢有以加也始教授公無恙時嘗欲盡以先世遺業奉其兄未及而卒清􅀸卒成其志自䖏雖約不以爲慮毋夫人有賢行自寡居即布衣䟽食以終身及春秋髙遂抱羸疾清卿左右奉養無違旣没葬􅀕如法父同産有適人而老且貧者迎養周給以立其家始終不􅈈鄕人有死於逺官者爲之紏合親故還其䘮而􅉎之有以昆弟訟其先人之遺澤而累􅀊不决者喻以恩義之重一言而觧蓋其志行之􅀁以信於人者非一日也嘗以進士試禮部不合而歸遂無復有進取之念而獨於脩身進德益孳孳焉不以􅀊年之晚疾病之侵而少有自安之意也始亦嘗有意爲浮圖學至是乃喟然曰徒亂人耳卒時年六十有二篋無完衣以歛而一子宗老才七􅀊鄕人無問親䟽賢否􅂘之皆出涕退而相與咨嗟悼歎者無異詞也妻呉氏先卒二女適翁益李懷祖其遺文十餘卷藏於家嗚呼君家比三世以儒學起家從官而皆不大顯至君而學益明行益脩人曰是必且爲世用而有以大其門矣而又不位不年以没于地於是人莫不以是疑於造物之理而爲君惜之予獨有以知君之志其􅀁以爲欣戚者有不在是也然則文􅀸之託銘於予也豈不有以也哉銘曰不同乎今人者君之樂不及乎古人者君之憂蓋其􅀁樂者人以爲戚而其􅀁憂者我以爲休銘焉不慙子孫是􅀵轉運判官黄公墓碣銘公諱洧字清臣姓黄氏建寜府人其先世相傳自光州固始入閩居建陽之水東後徙甌寜之演平曽祖執矩祖伯堅贈承議郎父銳朝請郎提􅀧江淮荆浙福建廣南坑冶公事公以遺􅄻􅀘官調筠州高安尉時江西群盗充斥王帥討捕相繼公以射士爲大軍前行數與賊遇巳事例受薄賞不復以功自言論者多之郡獄治盗詞有白金若干藏某處檄公取之得金數倍從者請私其餘公不可悉以送官人服其廉秩滿授興化軍司理參軍問事旣得其情即復告以法􅀁當得之罪且問􅀂此寜有􅁈乎必反復無異詞巳乃具獄上府以是凡公􅀁鞠雖重辟皆合􅀲扣顙自以不􅁈軍院官謂公曰兩獄一也即有移鞠幸勿爲異吾亦不敢自異於公也公愀然曰事惟其是而巳况司獄人命􅀁繫吾固不敢以徇公公亦安得以狥我乎自今理院􅀁移有不當者幸公改之勿以爲嫌也部使者私欲岀一重囚公持不可乃因行部慮問釋之公白太守復致之獄而竟按其罪太守汪公待舉以是賢公待遇有加一郡之事必咨而後行公亦益爲盡力境内稱治監紹興府錢清鹽􅂣改宣教郎知福州候官縣治以寛簡先教後刑訟者反復暁譬之或失􅀁爭而去民爭先爲里正曰官無賦歛里無盗賊吏不敢􅑧號村落間此時不可失也母夫人江氏故家福州族黨衆盛􅀊時徃來親親之意甚厚而無一人敢以私事爲請者簽書平海軍節度判宫㕔公事郡守辛公次膺鄧公柞范公如圭皆當世賢大夫咸委重焉秩滿造朝給事中黄公祖舜薦公材堪治􅇵清可律貪欲留官中都公辭母老求通判福州以歸未上而太夫人物故執䘮哀毀治葬勤􅇵家益窮空當路有欲周之者顧非其義不取陳正獻公時在從班應詔舉公可奉使典州䘮畢除知南雄州郡小用度不饒舊常法外重贖以取資且榷酒酤增稅柵民告病矣而官用猶不足公至一切罷之人以便安而郡亦未嘗乏事也州故與建饒贑州代輸坑冶司􅀊貢白金各􅀂干兩故事皆取於民以辦公請以郡大小爲差詔悉蠲之郡人賴焉改廣南東路提舉市舶帥守市賈胡香不償􅀡公舉法移州帥愧且懼亟召歸之更爲轉運判官廣學租禮名士益勸諸生以學番禺令近在帥守諸司治􅀁肆意爲姦無按舉者公素聞之至是誨厲之不能改乃捕其吏屬劾之一夕而獄具奏上閱實抵罪以去其餘不循法度以病民者隨罪大小以次䋲治於是一路肅然官吏始知有法守矣市人困於官估丐奪之擾公爲移書一路罷官估除市籍百賈得職物價爲平復上奏請均其法於諸路詔施行之丁籍乆失開收口賦之逋均及鄰伍流亡日衆公選吏分行覈其實而除之一路􅀁蠲凡十有五萬口流冗浸復瀕海蜑戸數萬生理至㣲亦有役於州縣公悉免之按行􅀁部雖烟瘴荒逺無􅀁憚訪問疾苦伸理􅁈抑不可勝計革外銓匿闕狥私之弊人無怨言江浙􅀊飢有㫖發二廣義倉米航海詣永嘉徃時嘗有此役吏並緣以擾民而米不時逹公處之有方且并西道􅀁發轉致之不越月而至永嘉者八萬斛永嘉之人焚香迎拜歩下曰此廣東運使活我也史正志爲發運使專以括取諸道羡錢爲巳功諸道承風􅃪命不暇公曰嶺外貧薄安得視它路財予緡錢千數正志怒欲陷公以罪有以公爲人告者乃巳改使荆湖南路首論諸州以租米饋荆鄂襄陽諸軍地里之逺近不同則運載之費出於民者宜有多寡今諸州不能前知􅀁當詣因悉以逺地爲凖而取其費如潭州􅀊輸三十萬斛則稅外當􅀊輸錢十萬緡民力安得不重困謂宜詔總領􅀁前期下諸州使知􅀁當詣而隨其逺近以􅀵運費庶以少蘇民力異時郡縣預借民田租稅及它非法取民如茶粗如甲札如户帖如乳香如茶引之屬者壹禁絶之官吏或奏抵罪檄州縣勸民益廣陂塘貸以金榖不越月而􅀁脩復以萬計詔頒諸道以爲法㑹有訴耒陽令程資忠貪殘不法事敗而逸者又有訴胥吏挾私枉法黥配士人者公以屬吏則其事乃連提舉常平官胡仰貨賂􅀜通證驗明白公不得巳具以上聞仰黨援衆反得美遷而去公力不勝獄囚乆不决㝷以被㫖按行諸郡入舂陵界聞郴桂􅏇民相聚剽劫即日還車披山通道不一二日而至郴州問賊􅀁巢乗夜罙入群盗不意公來之速相顧駭愕一夕潰去公又召其酋豪譬以禍福而慰安其餘衆檄州運米躬視賑給遂以無事兩郡之民德公之爲悉畫其象生祠之還臺未幾一日得疾遂卒積官朝散郎享年六十有二乾道元年五月十七日也乆之臺臣乃有論胡仰姦狀者於是仰抵罪而公言始信公早􅀌事母孝持身㢘介謹宻輕財重義貧苦乏絶有人所不能堪者而處之㤗然益以暇日誦書史從當世賢人君子遊孜孜焉問所以脩巳治人之術一時先逹無不推重器許之爲人内剛外和接物謙卑雖童􅀠無所忽人有片善稱之不容口至論天下事有不可其意者則未嘗有所假借也居官聽斷分别枉直詳審愜當雖累歳不决之訟案牘如山一閱盡得其情平居未嘗少自暇逸雖疾病不謁告與家人言亦必依於孝弟忠信乆官不遂益以㢘直自將晚雖小試然亦未究其用而忽焉以沒死之日家無餘財還其郷妻孥無所託􅀫士大夫之賢者莫不傷之葬所居慈善郷豐樂里下原之陽娶李氏文定公孫朝散大夫知建寧府佩之女封安人予男四人槪今爲文林􅀰監文思院門格郷貢進士次棫次棿女七人長適同郡張伯愈次適朝請􅀰知贑州事趙善佐次尚㓜而某與張趙氏女皆早卒孫男九人孫女一人槪等以公之與予善也狀其事來請銘予自少從公遊察公始終表裏殆所謂俯仰無愧怍者又按公官第七品當立碣乃叙其事而系以詩使刻寘公墓上以示公之子孫與凡郷人之從宦者使知有所畏慕而興起云其詩曰嗟若黃公懐瑾握瑜半生下僚坦其舒舒晚使于南志則少攄乃其清剛之死弗渝威讋權豪澤流鰥􅀌而其永歸柩靡所廬故山北東有坎其墟我最其蹟圭首方趺咨爾後人母迷厥􅀄過者考德亦式其車朝散黃公墓誌銘始予試吏泉之同安聞旁邑永春有賢令尹曰黃公公廉強介察見微隱吏不能欺而民不忍欺它縣民有􅁈訟率請諉公以决其條教科指操驗稽决人皆傳誦以爲法間嘗以檄書案事渉其境道傍小民稱􅀃令尹不容口其禁令要束大抵皆敦禮義厚風俗戢吏姦恤民隱之意其言明白簡切其逹之也逺近幽隱無不曁焉過門入謁則公方危坐堂上閱學官弟子程課廷中􅞔然無人聲問公所以爲此者公不鄙告語甚悉恨所案事有程不得乆留聽公語也泉之士大夫爲予言永春自故司課江公民表爲令有善政民稱思之以爲無能繼者今黃君節守始無愧江公而吏事精宻有過之者予既罷歸聞近臣有薦公者天子擢以爲監察御史謂公得以行其志矣未幾聞其以病去竟不復起識者恨之後十餘年屏居里中有書生來請受學思苦業精乆而益篤問其出則公之季子也一日出其兄東之書與其母之外弟今提舉廣東市舶江君文叔之狀泣而請曰先君子幸相與有一日之舊敢請銘以賁其幽予不得辭也公諱瑀字德藻其先世居福州長樂縣青山下後乃徙家郡城之東爲閩縣人六世矣曽祖徽祖時皆不仕父南仲七試禮部不偶以公故贈朝奉􅀰而妣陳氏亦封太安人公中紹興八年進士第初任爲饒州司户參軍提􅀧鑄錢官欲市冶工餘糧以規贏利強公高其估公不可則怒欲中以法而求其罪無所得乃更欲薦之公謝不受歳旱郡檄視屬縣民田當免租者公請免之什九而行它縣者以什一告太守洪忠宣公以爲疑却公所上文書俾更之公曰官可罷此不可易且吾巳聞之諸使者矣旣而洪公使視諸縣則公所行縣民獨無流徙乃復善公所爲而薦之罷官貧甚與一力徒歩以歸更調湖北轉運司主管帳司使者向公伯奮一日謂公曰人皆求薦君獨未嘗一言何也即䄂中出奏牘上公可親民者且以心源淵静夷險一操目之公於是改官而人亦以賢向公焉及來永春承冦亂蠱弊之餘田萊多荒民力凋瘁公至首蠲其􅀫􅀒民有鬻業而稅籍不除者悉􅁵正之其文書或不具則履畒而均其稅於是豪民無得幸免而貧弱以蘇民輸賦或後期不使吏與其間獨掲其姓名於市爲之期日而聞者相先以至間不一􅀊流庸盡復賦入再倍其初公又痛以㢘儉自約飭凡例所當得公􅅟錢悉輸之官到罷挈家法當計傭受直亦不取至於燕遊饋送之費又皆一切屏絶而鈎考出内則必以身親之吏無所容其姦於是廪有餘粟庫有餘錢乃視民所病凡前日無名之賦可罷者如浮鹽錢之屬皆罷之不可者如上供銀亦爲損其虚估之直宗子米則以它錢代輸一歳至數百萬左翼軍自漳徙屯郡下當治營屋郡分以屬縣它縣征調輸載民不勝擾公獨出庫錢僦工徒取竹木具陶瓦而分寓便舟以往爲屋餘千間而邑人不之知也里正舊以誅求破屋前後相屬當役者畏避百方惟恐不得脫至是乃有投牒争先爲之者嘗有寡婦􅀒租而逃公寛其期以召之來則使之傭織於人以漸償所􅀒又嘗有請鬻牛以輸􅀒租者公閔然曰柰何使汝失一􅀊之計今春姑以丐汝秋成而輸未晚也其人欣然聽命及期畢如約蓋其及民之大者既巳周浹而於其細者又皆曲盡如此獨豪宗大姓侵刻細民則捕劾窮治之無少貸他所聽斷發擿隱伏人以爲神而卒亦歸於仁恕也大治學舘闢其衢路斥去喧雜作亭其前而刻詞以厲學者語意甚偉延擇脩士課試以時士子上謁者接之於學講學之外一豪之􅀻不敢及也有儒冠而以􅀶訟者爲設席聽事之旁課以論孟通者罷歸否者呼其父兄懲以二物由是俗爲一變始至欵謁羣祀以文告曰令有昏墨神其殛之視社禝祠壇􅈥敝甚即命改爲而又植以名木至今人猶指以思公名之曰御史林遭旱出俸錢具牲酒躬走羣望窮極幽險不以勞爲憚雨爲立應愚民奉佛徃徃􅀻立塔廟僧以是得雜處市里間亂倫敗俗爲良民患公按律令盡撤之且禁僧無得復居外􅀫弊頓革丞有女病若有物慿之者巫曰故邏卒某也死而役於城隍之神實爲祟公怒曰是安敢然杖其土偶而投之溪流女病即愈始時縣人頗神事之巫史因託以爲妖至是乃息云以郡守諸司薦去爲兩浙轉運司幹辦公事有獻鬻公田之䇿者檄公視之歴諸郡盡得其多寡輕重不均之弊還極言其非便且曰公田歳入若干而畜牧芻藁取具焉今一旦鬻之計其􅀗不過數歳之入自是以徃能無橫歛於民乎貴將􅀭存中請地以廣其營實規爲觀游以奉權幸公又以檄徃視還曰營卒若干人度地若干畒而足今所請地且數倍若從其請是壊民田廬冡墓不知其幾而獨爲存中結驩於一幸臣也不可予卒皆罷之㩲秀州華亭縣歳事惡民饑公白常平使者請發廪以賑焉使者以當俟奏報難之公曰民命在朝夕苟可以生之雖重得罪不悔退即發常平廪粟之在縣者全活萬計而使者亦不能有以罪也吏部侍􅀰汪公應辰侍御史汪公澈交章薦公材中御史除御史臺檢法官未幾擢監察御史而公巳病矣告滿請外除江南東路提􅀧刑獄公事未行徙轉運副使視事旬日改知漳州旋丁内艱免䘮請就閑養疾得主管台州崇道觀乾道四年八月二日卒年六十官自左迪功郎七遷至朝散郎即其年十一月庚申葬懐安縣靈山郷長箕山公娶葉氏中奉大夫大任之女封安人五男子杲亦以進士選官至宣教􅀰江南西路提􅀧刑獄司檢法官後公十二年卒東從政􅀰南劒州沙縣丞查幹皆業進士栒亦蚤卒二女子長適承議􅀰江淮湖廣路緫領司幹辦公事任文茂次適奉議􅀰知泉州同安縣余元一而榦即來學請銘者也公資剛介自少即刻苦自厲家貧鬻麯於市而挾書隨之苟非其義雖寒且饑不可得而衣食也閩俗多火葬公遭父䘮親黨憐其貧喻使從俗公哀號不答盡鬻家人衣具卒葬以禮事母兢兢唯恐少傷其意即有譴責未嘗敢自辯數也自奉簡薄而於奉親極其厚至於兄弟族姻之間周貧振乏亦無所愛其力官番陽時有邑子爲紏􅁺以職事不相中㝷以憂去公極力調護之其人初不敢以此望公涕泣慚謝爲舉子時書皆手冩成誦爲文不追時好爲吏一心營職其清苦之操非人所堪而聦明仁愛所以惠於民者亦非人之所能及也平生一以直道自任未嘗小降色辭以希薦寵爲御史時嘗病甚臨安守趙公子潚亦以㢘節著􅀍㫖視公家事見其篋櫝蕭然衣無兼副俯仰歎息者乆之卒之日家亡餘財凡此皆人之所甚難而公之所甚易人固多能言之顧其中猶有大於此者不幸未試而人亦莫之知也蓋公在臺時與殿中侍御史杜公莘老雅相好每以節義相觀勉一日杜以公疾來問訊連呼不應乃大呼曰吾今日擊去王繼先矣公矍然起坐曰君能任職吾不病矣􅊥枕中片􅁓示之乃䟽繼先罪狀甚悉繼先者以醫得幸罪悪盈溢公意蓋有待也居無何杜以論官者張去爲不効求去公就與别喟然太息曰君厚自愛吾亦從此逝矣即日上䟽請去以此視公之志豈但欲爲其所巳爲者而止哉是宜伐石刻辭以告後世之君子乃爲之序其事而銘之銘曰我觀黃公古人之風其剛方而㓗㢘者義之操其慈愛而惠利者仁之功其仁雖僅得施於十室之聚其義則未及折乎百王之􅄡遽抱其餘以息乎此尚有以啓厥後於無窮承事􅀰致仕潘公墓誌銘維潘氏世居括蒼之竹溪巳號著姓後徙金華益爲聞家君之曽大父諱某贈右朝議大夫大父諱某始以儒學起家仕至左朝奉大夫父某以右朝散􅀰致仕累贈大中大夫君諱景憲字叔度㓜頴悟日誦數萬言年九歳以童子貢京師通念十三書􅀃六經大義作三體字詔許特試禮部且賜束帛後入太學益自刻厲一時學官如汪公應辰苪公燁王公十朋皆推重焉擢隆興元年進士第調荆門軍學教授不行請爲南嶽祠官秩滿宰相知君之賢欲留以爲中都官君獨力請太平州學教授逺次以歸宰相問其故君曰本無宦情以汲汲於一官政欲以慰親望耳今二親俱老得逺次尚可日從容於其側它非所望宰相歎息以爲不可及君與東萊吕祖謙伯恭父同年而齒長聞其論􅀃行身探道之意慨然感悟遂棄所學而學焉旣而遭太中公之䘮廬於墓者三年毀瘠骨立未嘗見齒寢興食飲皆以古禮爲節服除遂不復仕日遊吕氏之門躬執弟子之禮誦詩讀書旁貫史氏下至于兹靡不該覽而尤於程氏之易爲盡心焉至它書史考訂蒐輯日有程課鈆黃朱墨未嘗去手爲人峭直耿介與世俗少所合而事親從兄友愛諸弟怡愉肅穆人無間言家本富樂躬率儉素布衣􅂼食一室翛然其枯槁淡薄有人所不可堪者而君處之甚安以是中外化服不敢爲纎芥浮靡事族黨皆慕尚之而君自視欿然常若不足也始嘗學浮屠􅀃旣而學於吕氏晚再悼亡因葬金華之葉山而虚其中以自處築室其旁取朝聞夕死之意命之曰可菴暇日往而遊焉復取舊書讀之悠然自得不知儒釋之有間也買田儲書以待四方之學者又嘗取建寧社倉法出􅀻榖數百斛歳時歛散自葉山以至太中公故居大墓之下各爲一社期歳廣之及九而止予嘗爲記其事然亦未及盡如其志也君旣無當世之願士友知其心者如韓尚書元吉張左司栻曾卿逢鄭卿伯熊皆愛敬之而不敢有推挽意獨曾侍郎逮嘗引以自代頃年諸大夫薦天下士之賢者三十餘人於周丞相君姓名亦在數中而丞相不能用盖諸公或未始識君而君亦漠然無所問人或扣之乃獨喟然以曽鄭兩卿爲知巳人莫測其意也紹熈庚戌君之子自覺以進士試禮部中選君聞之曰此足以代我矣即目列於有司請致其事遂請得改京秩命甫下而君巳卒矣是歳六月巳亥也君先娶邢氏故龍泉主簿􅀖直之女繼室朱氏其父翌新仲紹興間爲中書舎人子男二人長即自覺其次自晦女三人長適朱塾次適蘇虨次適邢文郁孫男二曰問學問禮盖自覺嘗調蕭山主簿而虨今爲臨海主簿君卒時年五十七病不伏枕比終猶歛襟端坐而没語未嘗及其􅀻也自覺將以十月丁酉葬君葉山之藏而以書來屬予銘予始因伯恭父以識君志同氣合遂結㛰姻之好往年以江西使事入奏舟過蘭溪蘭溪距金華不百里金華親故往往來相勞問獨君以書來曰甚願一見以慰離索然子今日之行名爲召客吾是以不果來也比以口語罷歸君又以詩來若曰子今幾過七里灘矣可以巳乎其未耶予不能答而嘗以是愧其爲人乃爲之銘銘曰介剛之節爲世玉雪退省其􅀻敬順怡恱却掃耽書貶身訪道忘食與憂以遂于老昔本不出今復何歸異世同心子平孝威葉山之陽上盈下坎我銘不亡君則奚憾左司張公墓誌銘公姓張氏諱維字振綱一字仲欽南劒州劒浦人世以長者好施予聞於郷曾祖某祖某父某皆不仕而父以公故贈朝議大夫母羅氏亦贈恭人公弱不喜弄自力於學朝議公知其有立常撫而誨之曰貴仕不足言要當以清白大吾家耳未冠而􅀌羅恭人躬服儉素而悉力以奉公學中紹興八年進士第調賀州司理參軍不行徙汀州軍事推官事有不可未嘗不力争郡以故鮮敗事盗起屬邑附從萬衆抄掠三郡之境公護巡尉兵㑹大軍討平之身履巢窟撫其餘衆而歸第功當爲第一而賞不及公不以爲意也秩滿更爲漳州龍溪丞改左宣教􅀰知福州閩縣首定差役條約貲倍者半其停年民以爲便然以公政不苛多欲及公時爲之無争承者巳而制下更定役法適與公所議合今遂定著令云官募丁匠舟楫於民無度而不均公與民約一􅀊丁匠之役不過三日舟别若干爲甲甲直旬日滿則縱之唯所適縣賦故多取具於僧坊公爲區畫使其徒自相督僧得無吏卒之擾而輸益辦今亦爲例僧􅀊以荔予餉州縣公一謝郤曰豈可以口腹易吾操耶積餐錢數十萬義不自取㑹􅁋潦敗官舎匠役或過前約悉取以僦之曰母使吾失信於民也民服其公而愛其廉號之曰張太清見御史家以訟奪僧田公當受代矣趣吏具案閱之以田予僧而去御史怒思有以中傷之求其過纎芥無所得乃巳以便親自請得主管崇道觀以歸㑹陳正獻公知建康府辟公通判府事事無大小悉委又遣攝守當􅂗吏戢而民安之朝廷亦知其治行擢以爲廣南西路提􅀧刑獄公事自虜再通好公每謂符離之役失於輕舉而人心終不以爲非四郡之棄急於休息而人心終不以爲是先嘗告執事者冝將順正救使上意於起居食息不替坐薪嘗膽之誠脩明政事使人心曉然知朝廷未忘中原及對遂以立志開上心且引益之所以戒舜者爲言以謂今日正當汲汲以自治不可狃於小康便謂太平語甚切上曰朕何敢望舜公對曰有爲者亦若是願陛下加之意而巳上嘉納之且俾察部内守令􅆇否以聞公到部按行周徧郡縣南薄瘴海陳船欲渡吏卒扣頭更諌公不顧半濟風作舟師震駭公又不爲動所至􅁁氓歎噭以爲百年未始見使者旌節官吏有望風解印綬去者還臺條上件臧否若干人即日施行且者爲令未滿歳就除直祕閣知静江府主管經畧安撫司公事公爲政平易近民拊循周洽間召長老從容與語授以教條使轉相告戒禁吏妄賦奏減經總之額滯訟或數歳不决者取故牘置便坐暇日躬閱視予奪咸得其情民以便安而治軍甚嚴有􅁀横若亡匿者立命誅斬亡所貸使者得盗百數檻致之府欲盡殺之公爲區别誅其渠率數人餘悉遣去郡學􅋻下諸生議徙它處咸以故始安郡治爲宜而乆爲浮屠氏之室矣至是遺火燔燒略盡公取其地以爲學使者惑異教隂沮止之不得至箝以禍福公又不聽乃卒就功而益之田以繼廪食學者用勸禱祠不於釋老房祀始至按故典新社禝風雨雷師壇壝月遣官屬㓗除爲圖以著其兆域陳脩登降之位甚飭水旱輙齊􅀫致禱無不立應南丹徭莫氏以賂結永樂王氏藉兵以逐其兄而自立旣立而背其約王氏以兵攻之莫氏困急請輸並塞田及銀冶稅􅂣以乞師寮屬皆以爲受之便公曰莫王連兵正坐貪此爾又將以㗖我耶矧國家爲夷夏宗主屬國不奉條約正當以義詰之顧反以利而動彼且有以窺我矣於是遣一小校持檄喻之二酋蝢顙受命即日釋兵去莫氏前此數爲􅁁患至是帖服自請導羅殿馬以報國恩又遣子弟效名馬爲公夀公受而歸之郡廐且厚遣之或告昭州故盗甘文誠者謀叛去郡紿而縳之欲致之死公察其非辜撫而遣之未幾象郡徭反使者欲調兵逐捕公曰以官兵入箐歴險與猿猱角勝􅀒非計也遣禆校戍山口且文告之徭曰前年殺淩鐡徃年殺王宣今年又殺甘文誠是非從若招者耶誰敢聽命公遣文誠示之則皆大喜亟遣子入謝罪江湖游民並海趨漁鹽所過或掠爲盗急之則黨益合朝廷以爲憂至遣荆州軍屯守之公奏創効用軍五百人悉募儔輩爲之隂銷盗本且頼其用悉上還荆州兵帥司舊以回易備􅁁法乆浸弊公至始爲經理均節初年錢不過四千萬季年乃以累萬萬計其後數年再平劇賊皆以効用取勝而軍無乏興皆公力也朝廷知公可用屢擬除代而難其人乃進直徽猷閣留鎮五年上方謀北略移軍建康使者謀作屯營不如指士卒􅁀露乃召公爲江南東路計度轉運副使趣入靣對􅅄公治績且屬以營屯事公更營高燥以違􅁋潦屋凡二萬三千間先爲一間於治舎用是計徒庸慮材用令役賦功僂指而定前使者苟於就事榦植脆撓衣以織葦費二萬萬公易以瓦深廣堅緻於前而費半之府司分作它營以情屬軍中先以辦聞屬吏欲効之公曰一椽未集是亦欺君吾不能也㑹軍帥亦與公議不相中宻白公稽緩遣近璫持詔詰責公以狀對上大喜曰朕固料張某必辦此遣再􅅄諭就加祕閣脩撰以寵其勞江東歳和糴以備儲積先是嘗糴三十萬或以予直太高而損其半公力争不能止至是復以命公而詔問所以經畫狀且曰監前失母傷民公即條奏曰前事之失民以陛下爲不知故獨歸其怨於有司今旣知之乃曰姑以爲鑒而不能償則天下將有以空言疑明詔者矣且江上糴貴於呉中而其直反下陛下一視同仁何愛十數萬緡而獨使江上之民觖望乎諸司餉遺一不受有不可却者别儲之積至三百餘萬㑹和糴有未償之直而失於上聞者即以丐之㝷召入奏事因訪軍務得失時頻年調諸郡兵團教帥府公言南方兵宜安静不當數調發以揺人心江東團教五閱月費緡錢且二千萬諸道計不减此宜擇將分兵戍諸州俾就閱習以息大費折姦萌使廟堂之議得專意以圖北方又言兵無竒不足以取勝今兵雖多未必人人皆勇宜詔諸將精擇驍銳别籍而厚養之以備緩急之用上深然之留爲尚書左司郎中遇事有未便輙詣都坐白或惎曰􅃈􅃈辨切非朝官體公曰都司助調􅂦實㡬㣲所􅀜若視吏籖擬即渉筆書不置可否安用我輩邪居月餘丁内艱初對因及西南徼外夷落道里廣袤上令爲圖以進至是圖成未上而去服除召見乃奏之序言周公戒成王立政勿以憸人惟吉士然後可以詰戎兵陟禹蹟服海表言蓋有指意切而辭不迫識者知其忠藎明年除司晨少卿奏諸道糧綱􅀊凡百數用官舟者多􅀒而雇啇船者不虧蓋啇人自愛其舟故不爲姦櫂卒率募遊手衣食於官無所顧藉歳率虧三萬斛細民勺聚撮累以輸公上而一歳之間輙􅂢三萬斛以惠姦豈不甚可惜哉且運脚與租同輸官不僦運運脚之利州郡􅀻之侵漏之失大農任之孰􅀂惜運脚以僦啇船之爲便乎復爲左司郎中熈豐行義倉法獨不及南方公守桂嘗以爲請不報至是􅀊適荐饑朝廷方講荒政公又以爲言乃得請兼領贍軍酒筦不盡其利而課入大増􅀊羡緡百餘萬㑹課當遷官公辭不􅀗命方請貤之其屬㑹執政有罷去者䜛者意公其與也又知公屢與權幸忤因捃他事論去之先時公巳結廬延平溪南山水之間䟽泉發石號曰盤澗至是徜徉其間縱觀古書以自娯尤玩意於春秋謂經有貶而無襃傳者未盡得聖人意方且緒正其􅀃而未竟也旣而有知公去國之所以然者爲請祠官之禄得主管武夷山冲佑觀公不欲受逡巡數月乃拜命秩滿踰年不復請期以明年七十致仕未及而卒淳熈八年六月癸亥也始時桂人爲公生立祠至是聞䘮相與哭於其下後有賢牧守如李公浩張公栻多視公時行事以爲法而刑獄使者鄭公丙閱其决事故牘歎曰此判不可移端如南山矣其爲名流所推伏盖如此云累階朝請大夫娶羅氏再娶宗氏皆封恭人子士佺今爲朝奉􅀰通判融州事次士僴嘗以修職􅀰監潘葑酒庫而卒又次士㐰修職􅀰常德府司户參軍士儼承信郎女適進士宗大同謝舒宣義􅀰陳善慶文林􅀰黃東所爲文有􅐻澗集若干卷奏議若干卷士佺等葬公太平郷天笁里大篔簹蟠龍山之原而以故右司郎中何侯萬之狀來請銘予嘗一見公於閩縣後不復相值然公之行事則皆接於耳目知狀爲不誣矣何侯又謂公姿禀端􅁉不見喜愠家無􅁎媵禄稍以班族里平居接物甚夷􅙑劂之節遇事乃見意謂當然怨怒不避也中不自快顯寵不願也􅆒歴中外聲績藹然爲朝廷所嘉重􅅄寵者固以此然天子知之士論與之卒不能與世合不大見於設施者抑亦以此歟在江東時㗸命􅅄諭者皆寵昵信臣力足以進退人者公無所􅀻媚再還朝也嬖近知上意向公遣所親道上所稱賞語且致願見之意或勸一見即近用公義不往計臣斡利以羡餘獻者往往見謂材􅀍進用執政數語公以酒羡課獻内帑公􅀏而不答退曰一錢盡公家物朝廷欲用當自取之吾寧以獻自媒邪天官虚席上閱班薄謂執政曰張某資歴高宣勞乆且將用公公於内外既兩無所諧附竟莫有爲助者遡公所守與世相違如是則夫難合而不盡用者公巳逆處懸斷於胷中乆矣不足爲公憾此又爲知公之深者予以是益恨前日之不􅀗蚤自附於交遊也而士佺從予亡友張敬夫官學有聞驗其操執器能信其有似公者乃悉序次其語而銘之銘曰張公㢘正蚤發聞聦明仁愛又敏文中􅀊仗鉞西南奔百蠻震讋民懐恩入椽宰府賛經綸因事納諷忠且勤一朝翩然謝垢氛演仙仙去孰與羣篔簹之臯水清淪佳城鬱鬱芘仍晜我銘不㓕公長存運判宋公墓誌銘公諱若水字子淵成都府雙流縣人其先唐相文貞公裔孫旦以給事中從僖宗入蜀遂家眉之彭山生五子散居成都卭蜀之間號五房宋氏􅀟流其一也公之曽大父右言大父傑父維皆不仕其父以公故累贈奉議􅀰母蹇氏亦贈安人公自㓜即知刻苦爲學邑之賢令如任公淵李公燾皆愛其文行屈輩行與交及將就舉有欲移公試漕臺者公曰欺君誣祖吾不忍也卒從州舉試外省得奏名對䇿廷中切直無所避考官不􅀃猶以冠乙科授左迪功􅀰嘉州龍遊縣主簿未上丁外艱更調龍州仁夀縣主簿監永康軍青城縣味江鎮稅兼合同􅂣先時茶禁甚急而􅀻販益多啇筭甚重而歳額反耗公至弛禁薄征而舊弊頓革課入大増或勸獻其贏以規賞公曰獨不爲後人計耶􅀊旱民争水衆之利羣聚相毆擊且欲爲亂公單馬喻之皆釋伏聽命公又爲禱於靈湫一夕不雨而水溢溝澮皆滿焦槁以蘇物情乃安明年荐饑民又相聚剽掠以求食有期以某日掠鎮民某氏者公召諸豪語曰饑民求食此易與耳􅀻販之徒􅀒勇玩法一與之合非小變也今能出力以致其黨使爲一境之衛不唯足以銷其姦心饑民知吾有備亦憚不敢進此一舉而兩得也諸豪皆應曰諾悉出金幣椎牛釃酒召致其徒雜於居民保伍之間日以兵狥于市公亦帶劒躍馬其間衆皆畏服而饑民遂不敢犯且曰是嘗爲我禱湫出泉者吾當謹避之耳鎮故無學公爲作孔子廟考古制器率諸生行釋奠禮延師儒躬講􅀃士子競勸制帥汪公曁諸使者聞其賢争薦之移知神泉縣始至承廢弛之餘首罷追胥之擾但以幅􅁓書􅀒租與民爲期無敢後者不數日盡償前令􅀫逋爲言州家使得善去邑産黃雀歳供諸司至以百萬計公請罷之民用不擾而物生亦遂至今爲法諸司知其治行徙知嘉州犍爲縣神泉民相率留之不能奪也公於二邑皆治其學校如味江所爲民有訟者躬以義理恩意辨告諄悉皆大感恱無復犯者其􅀹無良不聽令敢以武斷病齊民者乃捕劾之上獄于州罪至流徙於是閭里正清善良皆得其所改宣教郎幹辨諸司糧料院擢太常寺主簿齊􅀫必䖍濯漑必㓗同列愧歎以爲非所及新繁故有藝祖神御蜀帥請改築宫于成都事下太常公聞其且將大興土木窮極侈麗使民不得安爲處駁議事乃得寢遷國子監丞再入太常爲􅀶士轉而爲丞兼吏部考功􅀰官改兵部除祕書丞復兼吏部三舘將以故事爲暴書㑹而上方閔雨避殿降食公爲官長言君父焦勞如此而臣子相與燕樂誠有不自安者官長是其言白罷之以旱故詔館職條上闕政公爲書數萬言歴數當時刑賞之繆以爲是所以干隂陽之和者宰相聞之怒出公提舉江東常平等事上稱公誠實俾移福建閩俗故多不舉子公與帥司合議按律令嚴保伍爲所以禁防誨誘之具甚悉全活者衆汀州逺且多盗又名瘴郷常時使者按行多避不往至是羣盗甫平死傷橫道疫癘大作又非常歳之比公獨􅁣然引車罙入煑藥自隨親問病者飲之民爲盗所攻刼與能捍禦􅁬擊以助官軍有勞効者皆弛其租汀民大喜人人知戴公德建陽招賢里故常别貯常平米数千斛凶歳發以賑民本隱士魏君掞之所爲而歳乆陳腐出納不時反以病民有以版曹所下社倉法告者公喜立爲移書更屬郷人士君子歳歛散之一方尤頼其利除湖南提􅀧刑獄公事建人老稚邀􅃒戀慕至竟日不得發湖南尤多盗皆晝伏豪民家抵夜輙出以故發不時得公至申明保伍之令使相􅀵司盗無所容至有扣頭車下請得召保復歸農業者公皆撫而遣之又檄諸郡精閱禁旅按行所過察視激犒如法月調諸縣弓兵校其藝而誅賞之由是皆樂爲用盗發輙得奏獄官母得兼攝它職又條七事以申儆之於議法尤兢兢焉每論死刑必齊戒露香要質于天然後敢決決日輙罷燕設所以致其欽恤之意者無不盡也屬郡大札遣吏挾醫載藥馳以救之衡山浮户有與土人不相中者詣闕言衡山國之夀嶽祠城東故有溪並城南出後或鑿城北址導水使西不能無斷地脉請築山决水使復故道下公平奏公言水西出歳乆故道皆爲民居今欲東之則是數百家者不無蕩祈離居之苦且夀獄之云無所經見就如其言則國家中興慈皇夀考皆在西流之後尤不宜妄有改作事乃得巳衡州故有石鼓書院墟廢亦乆前使者潘侯畤始復營之公成其終爲増置弟子貟以永嘉戴溪爲之師割田置書教養如法又知䖏士劉某之賢與郡守劉清之交章論薦詔特􅀘官於是學者乃知公好賢尚德之意不獨爲科舉計也􅀍㫖攝帥事飛虎軍素驕悍白晝掠人吏不敢問公一以軍律繩之賞信罰必士民以是得安其居而軍吏亦皆恱服㑹乆不雨請禱過勤遂得疾改除江南西路轉運判官而江西是歳亦大旱下車首問荒政所宜發廪勸分蠲租乞米以次施行其奏請者亦多報可又行帥事事益叢委公自力不少休家人有諌止者皆麾而却之遂以大病然夙興猶視事如常時夜過中遂不起淳熈十五年二月甲子也年五十有八方病革時民相率爲公禳禬無不至晨夕走府門偵起居狀及卒皆縞素吊哭行日號泣挽車哀送數十里不絶湖南吏民聞之有千里來赴義者盖公資禀醇厚隆於孝友䖏内外族姻長少存沒之間不見其少有遺恨爲學勤恪不􅈈旣脫􅂣屋益玩意於聖賢義理之學近自周程張馬之言以逹于經吟諷辨􅀃未嘗虚口推以及人一以仁愛惠利爲心聞善即行如恐不及故所臨􅊩士民愛戴見於風謡非一時諛􅀃空言也其在朝廷据經守正不爲苟合雅爲虞雍公所知其爲之言不過用人材嚴守備以俟敵人之釁而巳嘗因輪對請戒羣下懐􅀻立異迎合紛更之弊損宗戚歳時賜予貴臣給使宣借百司吏禄之費及减畿甸房緡以惠貧弱上皆稱善公因極論恢復大計反覆数百言上益喜顧曰即當相與赴功名之㑹耳事下有司不得盡施行而房緡之惠遂及於天下他議貢舉銓汪之屬又皆廣恩優老革簿從厚之意而其應詔言事則直指宰相挾私罔上之失無所避雖以是不得乆於朝廷不悔也夀皇知公深嘗語近臣斯人乃朕於奏對間得之其在湖南盖嘗有召用意宰相以前忿尼之識者恨焉而爲文汪洋融液務極事情晚歳乃更造約􅀹好讀易嘗夢有問易之一經孰爲門户者應曰隂陽兩書非易門户也耶其精詣純熟盖如此所著書有經解五卷書小傳十卷史論十卷古今詩百卷雜著三十卷奏議五卷前安人張氏蜀之故家漢御史綱之後歷千餘年而譜牒可考不紊安人性賢孝讀書史善筆札通古今識義理而不肯爲詞章父岐嘗宰永康頗以嚴治安人每陳古􅁩以諌旣歸公事舅謹敬奉祀莊肅和叔妹有禮遇族黨有恩舅䘮悉力佐公辦治如法人以爲難公居閒乆上官有欲使攝局者安人不懌曰吾之貲尚足以支伏臘狥禄從人得無隳素志乎公善其言爲謝不往其方直之操士夫或有愧焉不但爲婦人之賢而巳先公十九年卒後安人宇文氏宣教􅀰隲之女子男三人之源之潤之汪皆嗜學而有文女一人適熊應早卒皆張出也之源等以十六年十二月某甲子葬公及張安人於成都縣楊侯郷癸山先墓之次遣人來建安請銘踰年乃逹而予適有臨漳之役使者以書還明年復來則值予哭子悲甚言不能文顧與公相得晚而相知深其爲社倉書院皆嘗爲記述又重之源兄弟之請越數千里連歳再至而不倦也勉爲之銘以致吾意銘曰資之厚􅀆學之􅀶退循循􅀆進諤諤三方一節思無斁九原歸卧不可作我銘其居詔􅄀漠欲知斯人視斯石太孺人陳氏墓誌銘太孺人陳氏建陽縣三桂里人父安世強學􅀶聞嘗立義齋縣南從而學者甚衆娶何氏生太孺人年十有七歸同里周君周君爲人寛和樂易不以家人生産爲事太孺人佐以勤敏持家儉而有法訓督諸子甚嚴至待姻黨遇鄰曲則又咸有恩意少時䘮其親哀慕不懈及嫁亦不逮舅姑而歳時烝享執事必親訖事常嗚咽流涕晚好浮屠法得其大指遂不復問家事惡衣菲食逾二十年而憂人之憂賑其厄窮病苦雖極力不倦中子舉進士登王官再逢慶恩周君得以承奉􅀰致仕太孺人後以宗祀霈澤亦􅃬今號郷人榮之而太孺人所以自處者不少異於平日也紹熈元年三月某日以疾卒于家卒時精爽不亂享年六十有八周君名誼字少賈前五年卒加贈至通直郎三男子明佐明仲明作明仲嘗以承議郎差知邵武軍光澤縣事讀書處事精敏絶人所至未可量也女五人其壻陳錞蕭思濟程必顯陳浏而季未行孫男二人巽亨震亨女三人尚㓜明年某月某日諸子葬太孺人縣西新嶺天湖之陽東望周君廣平山之墓才數百歩明仲以銘來請予雅知之不得辭也銘曰母之賢足以成其子子之賢足以顯其親西嶺之阡百世而新我其銘之以相後人宜人丁氏墓誌銘濠州使君劉侯仲光以書來曰惟吾考妣皆有賢行而禄夀不配其德仲光既不幸蚤􅀌又不能勉進德業以求無􅀒於明訓徒頼遺澤得階末第從宦積勞至叨郡􅀉禄賜豐厚足以飽妻孥飲童僕而慈顔永隔不及少伸區區鳥烏之養每一痛念不如無生獨幸累年以來數逢國家大慶累贈皇考至朝散大夫皇妣至冝人尚有以少慰人子罔極之思者而先冝人之銘乆未克立自念老矣或遂泯沒而無聞則後生小子將不復知前人立家本末重此不孝且無以見先人於地下惟吾子幸哀而與之銘則仲光知免矣敢泣血再拜以請余讀其書不能終篇爲涕下不自禁時方卧病田間氣息奄奄筆研廢棄乆矣然感其意不忍辭也乃考其事狀而次第之冝人姓丁氏世爲永嘉大姓以積善好施聞於郷父諱瑜尤長者兄弟皆以進士官州縣練逹有能名宜人早歸同郡劉君諱某字元黙而劉君之爲人亦誠實無表襮樂善愛士起居有常雖甚暑不􅃝禓家無蒲慱之具喜賙人急遇下有恩然其居家嚴未明而起内外井井教子弟尤有法而冝人配之無遺德焉始入門時舅姑皆亡恙晨昏無違禮内睦娣姒謀嫁諸姑外接親戚輯鄰里恩義俱􅁛重輕有則於是翕然􅁛爲賢婦乆之舅病痱冝人侍養尤勤􅅅非手調不進舅亦非冝人所進不嘗也姑爲比丘尼與冝人年相近病迎歸與共卧起扶掖飲食終歳忘勞姑每感涕謂曰病愈當終身事汝如母臨沒又謂曰即死當報汝地下幸復爲人願爲汝子孫以事汝姻舊間有過失輙爲暁譬諄復甚或垂涕泣而道之聞者感悟遷革乃巳劉氏與同里胡氏有舊好宜人遇之恩意尤篤胡氏長老至今以爲言里人有子好讀書欲爲儒而父難之其母以告冝人旣好喻之又資以金錢使與其子俱試大學以遂其志其人後常以語人且歎息曰今人不復有此風矣大夫公旣嚴於教子冝人又能彌縫其間教諸女以身爲法自未笄時巳令夙興備盥櫛奉藥餌夜嘗躬視扄鐍灑􅌆􅍳輙令持燭行前旣笄則教之酒漿烹飪蓋藏之事祭祀賔客之奉且戒之曰爾曹母厭吾言異日當􅀩其力耳以故諸子皆以文行􅁛而女適人者亦能持其家某年某月日以疾卒年四十有九葬于某縣某郷某里子男三人長曰昭入太學被薦未第而卒次曰某亦早世其季即仲光今以朝散大夫權發遣濠州軍州事女五人嫁周氏葉氏潘氏餘未行而卒孫三人曰邇曰適曰遲曽孫七人曰仁實仁近仁守仁及仁任仁愿仁履也濠州行篤厚早以文學吏治著羙稱仕於朝且通顯一旦求逺郡去有挽而留之者弗顧也士大夫莫不高其㢘静而服其明識不知其母之賢所以資之者如此其逺也然則冝人之行其可以不銘銘曰順尊卑睦婣黨力豈多惠能廣勤夙宵謹㣲細男敏學女恭饋賁幽壤疊閔書季之賢慕有餘䘖深悲考潜德授我銘詔無斁冝人黃氏墓誌銘冝人黃氏今宣義郎致仕陳君衡之配也世爲福州􅃸官人曽祖紹祖遷父仲文皆不仕冝人性淳質不解世俗機事數見欺不自悔旣嫁事舅姑夙夜唯謹相其夫理家事甚飭躬勤儉以衣食撫教諸子甚恩故諸子皆得以自力於學而仲氏遂以進士中第􅀘婺州戸􅁺冝人見其閱貝獄必戒曰人命至重母使有􅁈聞當笞人必戒曰輕之母使重傷見其􅀍檄考貢士必戒曰詳之母忘汝爲舉子時也初好佛書讀誦拜跪終日忘倦一旦忽屏不事曰不在是也無愧心足矣以慶夀恩三􅃬至今號紹熈二年七月乙􅆗卒年子男六人孔夙嘗貢于郷孔碩文林􅀰處州州學教授孔易亦嘗預貢籍孔時先八年沒女五人長壻潘子修蚤世次適脩職郎泉州司户參軍趙彦䕫季尚㓜而二男二女皆夭孫男四人女一人而女亦夭諸子以宣義君之命將以明年某月某日葬冝人某縣某郷某里某處而孔夙孔碩皆嘗從予遊狀其行事如此來請銘不得辭也其銘曰有婦之德爲母之則無愧其心反此眞宅迪功郎致仕董公墓誌銘君諱􅄾字順之饒州德興人董爲德興著姓世有豋儒科者君之曽大父左朝奉郎太醫令大父林右從政郎處州縉雲縣令比兩世皆以才稱父陸始不仕而亦以氣節聞君生有英氣務爲倜儻可喜事不肯踐繩約縉雲君憂其過名之曰執柔而字以順之曰以是爲爾韋絃之戒君佩服唯謹及更今名而猶以舊字行示不敢忘也年二十五始從郷先生韓溪程公受春秋學程公命設几案日與對誦春秋左氏及近世胡氏傳時時爲􅀃大義稍以禮法開之君自是寖若有省痛自刻厲雖益以風義自許而不復事少年豪習矣義役法行首出田粟倡之事以時定里人頼之嘗卜夀藏旣得吉而所知有貧不克葬者舉以􅂌之無吝色少嘗從程君倜及其弟舟學二君沒乆遇其子若孫恩意不少衰其好義多此􅀋晚得諸公家祭禮讀之曰是固可勉自是歳時祀饗齋㓗灌薦跪起如法比老不倦旣絶意進取漸屏家務即所居旁雜藝花木􅂼果以自娯客至開尊命酌劇談終日間及世事而處其是非成敗則雖老於朝市者不逮也淳熈十二年天子奉觴德夀宫推恩耆老以子銖故授迪功郎致仕紹熈三年八月庚寅以疾終年七十有六盖君爲人精悍議論貴決白不爲摸稜含胡態有所喜怒若茹物不下必吐出廼巳然巳過則夷然未嘗􅀫怨人或待以横逆往往更結以恩意使自愧悔以是士之賢者愛之其不肖者傾事之及其卒也皆傷之少嘗讀馬援傳􅁣然慕之旣渉世不偶又頗聞先生長者餘論乃更折節爲儒生自力於善識之者謂其視疇昔猶兩人也嗟夫天下平治士無功名才否一區之死無聲昔人嘗恨之如君者使少有所遇合以其才頡頑一世可量哉娶周氏李氏皆前卒子男四人鎬銖􅃬鎡女三人嫁余梓程徹王中皆周出也而鎬鎡及程氏女亦前卒孫男三人女二人明年銖將葬君湖山之原以周氏祔且屬新吉州録事參軍程洵􅁢夫狀君行如此來請銘予不及識君而韓溪先生者先君子之内弟􅁢夫即其子也銖又來學故聞君之行事爲詳其可辭始君自恨知學晚教子甚力故諸子多材而鎬銖皆舉進士銖尤好學自立庶能成君志者銘曰才之良氣之剛有求必予義之方能不試老其郷嗚呼歸哉此其藏晦庵先生朱文公文集卷第九十三候官縣儒學訓導劉簮校
