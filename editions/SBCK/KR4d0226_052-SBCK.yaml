  text: 晦庵先生朱文公文集卷第五十二書知舊門人問荅
  hash: sha256:0fbd507cfd97d65785ba9a25e6f5e150316319ba244df1c87cad450b2bd0d277
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0226_SBCK_052-1a}
body:
  text: 答呉伯豐必大熹衰晚無堪學不加進足下過聴辱先以書其所以稱頌道􅀃者足以見賢者之志矣然非區區所及也示喻程子格物之􅀃誠若有未易致力者然其曰天地之所以高厚一物之所以然蓋極其大小而言之以明是理之無不在而學問之功不可一物而有遺爾若其所以用力之地則亦不過讀書史應事物如前之云爾豈茫然放其心於汗漫紛綸不可知之域哉或人所引易象之數又似太拘所謂明理亦曰明其所以然與其所當爲者而已鄙見如此不識賢者以爲如何恐有未安幸復見告也子澄去秋相見甚欵近復招之尚未有來信大治近有萬君人傑者見訪見留之學中氣質甚美議論亦可反復殊不易得云亦嘗得從遊也熹比巳丐祠似聞諸公有意聴許適聞張荆州之訃若便得請當一走長沙而歸爾答呉伯豐用力下一本無之意二字讀書甚善所諭亦有條理但不必如此先立凡例但熟讀平㸔從容諷詠積乆當自見得好處也所論㸔大學曲折則未然若㸔大學則當且專㸔大學如都不知有它書相似逐字逐句一一推窮逐章反覆通㸔本章血脉全篇反覆通㸔一篇次第終而復始莫論遍數令其通貫浹洽顚倒爛熟無可得㸔方可别㸔一書今方㸔得一句大學便巳􅀃向中庸上去如此支離蔓衍彼此迷暗互相連累非惟不曉大學亦無功力别可到中庸矣况所比挍􅀄無􅀘於用力之意徒然枉費心力閑立議論畨得語言轉多却於自家分上轉無交渉不可不察也因其本明非是察識端倪把來玩弄以資談􅀃只是因其巳知而益廣其知因其巳能而益精其能耳與湖南􅀃自不同也知止有定之􅀃似亦未然更以章句或問求之爲佳知至意誠之􅀃則大槩得之矣盤銘是注䟽􅀃可自檢㸔當時以下文多巳􅀃故不曽標其名氏耳論孟中庸儘待大學通貫浹洽無可得㸔後方㸔乃佳若奔程趂限一向攅了則雖㸔如不㸔也近方覺此病痛不是小事元來道學不明不是上靣欠却工夫乃是下靣元無根脚若信得及脚踏實地如此做去良心自然不放踐履自然純熟非但讀書一事也横渠先生象記得舊傳蜀中本時云亦有御史象今却不記曽見與不見􅀊乆不復可得其眞但當兼􅀵以見區區尊仰之意而巳但去􅀊此時同遭論列今又適以此時相見亦可􅀏也李衛公書如此正不足傳顧其全書遂不復可見殊可惜耳廬陵近數得書一病不輕且幸巳平復也金溪一向不得書亦省應荅之煩皇極辨併往此亦一破千古之惑可録一本送正淳皆勿廣爲佳耳答呉伯豐詩傳中有音未備者有訓未備者有以經統傳舛其次者此􅀋皆失之不詳今當添入然印本巳定不容増减矣不免别作􅀘脫一卷附之辨􅀃之後此間亦無精力辦得只煩伯豐爲編集其例如後詩集傳􅀘脫周南樛木樂只音止二字合附本字下鄘載馳無我有􅀹􅀹過也三字合附衆人字下無以我爲有過雖爾八字合附大夫君子字下王中谷有蓷遇人之不淑矣淑善也三字合移在歎矣字下以上畧見條例餘皆依此且用草􅁓寫來恐有巳添者却刪去也又黎黒也古語􅀺元猶秦言黔首桑柔篇中第二章注中巳畧言之孟子首篇亦嘗有解今若天保篇中未解可采用其􅀃著於􅀘脫卷中却刪去桑柔篇注或但略言之亦可也更詳之大序先生以是經夫婦傳曰先王謂文武周公成王必大竊謂二南雅頌固多周公時所作然遂謂周公爲先王則恐讀者不能無疑此無甚害蓋周公實行王事制禮樂若止言成王則失其實矣芣苢薄言有之傳曰有藏也然其下章曰掇曰捋曰祮曰襭而首章乃先言藏恐非其序必大恐有是得之之義首章兼舉始終而言後章乃細述其次第詩中亦有此例或於􅀘脫中附入亦可也麟之趾傳以麟興文王后妃以趾興其子故曰麟性仁厚故其趾亦仁厚文王后妃仁厚故其子亦仁厚然則下文吁嗟麟􅀆爲指誰耶正指公子而言耳昔育恐育鞠張子之􅀃固善然推之下文及爾顚覆之云意不甚貫不若前􅀃爲順姑存異義耳然舊􅀃亦不甚明白也君子偕老象之揥也字書云揥整䯻􅁫也是否不識此物姑依舊􅀃字書之􅀃亦與古注不殊也或􅀘脫中附之齊地東至于海西至于河南至于穆陵北至于無棣史記索隱曰按今淮南有故穆陵門是楚之境無棣在遼西􅀌竹服䖍以爲太公受封所至不然也蓋言其征伐所至之域其􅀃如何穆陵在密州之西無棣是今棣州更考地志可見索隱恐非采薇小人所腓傳曰腓猶庇也又引程子曰腓隨動也如足之腓足動則隨而動也必大按易咸傳曰腓足肚行則先動足乃舉之非如腓之自動也易本義亦曰欲行則先自動由程子前􅀃觀之則腓爲隨足以動之物由後二􅀃觀之則腓爲先足而動明矣不當引之以解此詩之義不若猶庇之云得之生民詩牛羊腓字之傳亦以腓爲庇若施於此詩與上文君子所依意義亦相􅀋也此非大義所繫今詳兩􅀃誠不合當刪去然板本巳定只於􅀘脫中􅀃破可也又百卉具腓又有他訓不知此字竟是何義也楚茨以下四篇先生謂即􅃎雅反復讀之其辭氣與七月載芟良耜等篇大抵相􅀋無可疑然又以爲述公卿有田祿者力於農事以奉其宗廟之祭則恐未然蓋周自后稷以農事肇祀其詩未嘗不惓惓於此今以爲􅃎風􅃎頌者皆是也而孟子亦曰禮曰諸侯耕􅂇以供粢盛粢盛不㓗不敢以祭古之人未有不先於民而後致力於神者恐不必專指公卿言之此諸篇在小雅而非天子之詩故止得以公卿言之蓋皆畿内諸侯矣瞻彼洛矣傳以爲諸侯美天子之詩今考其間有以作六師之言則其爲天子之事審矣然二章三章祈頌之語則不過保其家室家􅀖而巳氣象頗狹反若天子所以告諸侯者何也家室家􅀖亦趂韻耳天子以天下爲家雖言家室何害又凡言萬年者多是臣祝君之辭棫樸追琢其章金玉其相傳曰追琢其章所以美其文金玉其相所以美其質然不知所美之人爲誰追琢金玉以興我王之勉勉爾那綏我思成集傳鄭氏所引禮記之􅀃程子則曰此特孝子平日思親之心耳若齊則不容有思有思非齊也必大竊謂人心不容無思齊之日特齊其不齊者爾若思其居處之􅀋乃其致誠意以交乎神者蓋未害其爲齊也未知是否鄭氏所引者常法也程子之義則益精矣子路曾晢冉有公西華侍坐集注謂三子之對夫子無貶辭則皆許之矣而又載程子之􅀃曰三子皆欲得國而治之故夫子不與二􅀃似相牴牾以愚意索之豈非許之者以其材足以有爲而其不與者則未能合巳之志歟不與者不若於曾晢有與􅀧之言耳以孰能爲大之語觀之不害於許其才之可用也程子又曰子路只爲不逹爲國以禮道理若逹却便是這氣象也蓋謂子路之意未免有所作爲而曾􅀧所言則皆行其所無事耳使子路有見於此一皆循其理之所當然而不以巳意參焉則即曾􅀧之氣象矣然必大觀夫子所以哂子路者特以其言之不讓而巳如冉有公西赤之言非不知讓者遂謂之能逹此道理可乎必大於此蓋屢致思而有未能灼然者子路地位巳高故見得此理則其進不可量求赤之讓乃見子路􅀍哂而然非實有見也又其地位與曽􅀧之地位甚逺雖知讓之爲美此外更有多少事耶衛君待子而爲政子曰必也正名乎胡氏之􅀃固正矣然恐夫子以覊旅之臣一旦出公用之而遂謀逐出公此豈近於人情意者夫子若事出公不過具言父子之倫以開曉之使出公自爲去就然後立郢之事可得而議也此􅀃甚善然聖人之權亦有未易以常情窺測者管仲於公子紏其可以無死者以其輔之非義故也若子路之死失在不合仕於孔悝耳既食其祿必死其難可也不審於其始而臨難始曰吾於此可以無死也則愚恐世之反側不忠者得以藉口矣此􅀃甚善然聖人不以不死責管仲何也子路問事君范氏謂犯非子路所難而以不欺爲難夫子路最勇於義者而何難於不欺哉特其燭理不盡而好強其所不知以爲知是以䧟於欺耳以使門人爲臣一事觀之子路之好勇必勝恐未免於欺也侯氏所以求生害仁殺身成仁皆義也非仁也仁義本無二學者當於一道上别出先生曰仁義體一而用殊君子之於事有以仁决者有以義决者蓋仁者不以所惡傷所好之體義士不以所賤易所貴之宜必大復推之曰以仁决者因心以爲取舎必無所違乎其徳以義决者即事以權輕重必無所失乎其宜未知是否此􅀃得之然細㸔侯氏􅀃亦有些意思試更推之答呉伯豐所示諸􅀃别􅁓報去但且如此推究玩味乆當自有得也但前書偶尋未見似其間亦有合報去者今不暇也蘇氏詩傳比之諸家若爲簡直但亦㸔小序不破終覺有惹絆處耳所欲抄集傳縁後來更欲修改一二處且令住寫今須到官方得寫去也廬陵之訃令人痛惜亦苦多事至今未得遣人去也趙守舊相識但不曽通書然亦政不必如此爲人寮屬世俗常禮有不可廢者亦且得隨例不須大叚立異不濟得事徒爲人所指目憎嫌却費調護求寛假所屈愈多也沙隨程丈書來甚相知云居頗相鄰想時相見也姜叔權曽相見否資禀篤實不易得近得書亦甚進能與之遊當有益也子耕當巳歸豫章時得書否正淳必巳赴省矣後來所講如何向來議論似亦傷太快不子細也伯豐所論甚詳宻朋友少及之者更冀勉力副衰朽之望官事更宜加意此後恐音問浸逺難通切祝爲親自愛答吳伯豐大學諸􅀃皆善可以􅀘或問之缺矣但母自欺乃解誠其意之義知未至者固當如此用力然知之至者亦未可便謂不假此也但知未至者禁之雖力而或未能止唯知至然後禁之不難而無不能止耳純粹至善者也其立辭猶曰純粹是至善云耳至善二字與大學中至善同否通書純粹至善猶曰純粹而至善云耳至善與大學理無不同注云中即禮正即智圖解備矣必大向者侍教時雖巳畧聞大意今按圖解有曰其行之也中又曰中者嘉之㑹也所謂中即禮者固明白矣至於正則不過曰其處之也正又曰正者貞之體也智之義固在其中然恐􅀄學者讀之猶未能分明欲乞更詳下一語如何元亨利貞分配仁義禮智先儒巳有定論矣故只如此􅀃意亦自見五殊二實一實萬分二謂隂陽一謂太極然不曰二氣一理而皆以實目之者蓋曰此皆實有之理非但彊爲之名耳五二一萬皆實字殊實實分皆虚字以此推之則所謂二實一實者不相礙也天地之塞吾其體天地之帥吾其性近見南康一士人云頃􅀊曾聞之於先生其字有我去承當之意今考經中􅀄無是􅀃西銘承當之􅀃不記有無此語然實下承當字不得恐當時只是􅀃禀受之意渠記得不子細也存吾順事沒吾寧也二句所論甚當舊􅀃誤矣然以上句富貴貧賤之云例之則亦不可太相連􅀃今改云孝子之身存則其事親也不違其志而巳沒則安而無所愧於親也仁人之身存則其事天也不逆其理而巳没則安而無所愧於天也蓋所謂夭夀不貳而脩身以俟之者故張子之銘以是終焉似得張子之本意繼而有師命沙隨云師非師旅之師是師友之師蓋齊王欲授孟子室養弟子以萬鍾也兩􅀃未知孰是且缺之亦無害孟子􅀄見齊王便有去志但以有師命不可請故雖少留而終不受祿以至將去而王乃有授孟子室之􅀃孟子遂不受而竟去恐不得以授室爲師命也且若果然亦何不可以請之有乎决汝漢排淮泗其􅀃只是一時行文之過别無奥義不足深論况淮泗能壅汝水不能壅漢水今排淮泗而汝水終不入江則排淮泗而後汝漢得以入江之􅀃有不通矣沈存中引李翺南來錄言唐時淮南漕渠猶是流水而汝淮泗水皆從此以入江但今江淮漸深故不通耳此或猶可􅆠􅀃然運河自是夫差所通之邘溝􅀄非禹迹且若如此則淮又不能專逹於海亦不得在四瀆之數矣沈􅀃終亦不能通也宴安之􅀃無之味其言似是無垢句法中庸或問不誤只是文字拙澁不足以逹其意耳必有是心之實當連下文讀之乃通如更覺難曉即上句在天者下更添一決字在人者下更添一容字如何答吴伯豐學問臨事不得力固是静中欠却工夫然欲舎動求静又無此理蓋人之身心動静二字循環反復無時不然但常存此心勿令忘失則隨動隨静無處不是用力處矣且更著實用功不可只於文字上作活計也答吳伯豐示及諸􅀃亦未暇細􅀚但覺子融之􅀃全無倫理而諸友反爲其所牽亦復擾亂又不且整理其大病根原而計較苛細展轉向枝葉上辨論所以言雖多而道理轉不分明今只合且放下許多閑争競而自家理㑹誠之一字是甚道理㸔得精切分明後却合衆􅀃而剖判之當自見得不如此費分踈也正淳書煩爲附便渠㸔得文字却儘子細所􅀉中庸􅀃多得之恐欲見􅀤之却封􅀉之不妨也沙隨八論及史評有印本望􅀉及此不須辨後人自有眼目不至如此晦盲也到此只脩得大學稍勝舊本他書皆未暇整頓今又遭此禍患恐不能乆於世以此益思亟歸更略下少功夫庶不誤後人枉費心力也答吳伯豐衰晚遭此禍故殊不可堪既未即死又且得隨分支吾謀葬撫􅀌觸事傷害不如無生也昨承惠書并致奠禮哀感深矣一向無便無從附報但有馳情比想秋清侍奉之餘宦學増勝沙隨諸書及茶巳領便遽未有物可奉報也此間寓居近市人事應接倍於山間今不復成歸五夫見就此謀卜居巳買得人舊屋明年可移目今且架一小書樓更旬月可畢工也其處山水清䆳可喜陳師道伯脩兩殿院之故里也又有吳仲感名賁常與古靈薦目中亦其里人也若得粗了便可歌哭於斯但用度百出非元料所及亦覺費力耳答吳伯豐歸來半年卜塟尚未定築室亦不能得了湖南之命出於意外􅀄但以私故懇祠然恐或不得請即求便郡藏拙近聞臨漳經界報罷此是廟堂全不相信政使在官亦當自劾求退其義豈容復出巳託人以此告之計其聞此亦難以相􅆠矣閑中頗有學者相㝷早晚不廢講學得以自警然覺得今世爲學不過兩種一則徑趨簡約脫畧過高一則專務外馳支離繁碎其過高者固爲有害然猶爲近本其外馳者詭譎狼狽更不可言吾儕幸稍平正然亦覺欠却涵養本原工夫此不可不自反也所􅀉疑義蓋多得之巳畧注其間矣小差處不難見但却欲賢者更於本原處加功也答吳伯豐巧言令色鮮矣仁游曰使其人志在於善而失其所習則猶可以自反愚謂人之習於不善固無不可反之理然巧令之人又焉有志在於善者是必悔過遷善不復有巧令之習則其志始可得而信耳游氏蓋牽於鮮之爲少而委曲以失之孔子之意正指人爲巧言令色之時其心巳不存耳若能自反則豈不足以爲仁又豈止於鮮仁耶游氏此􅀃無病只是不揍著本文正意子曰弟子入則孝游氏學文之􅀃固足以深警後世棄本逐末之弊然古之所謂學文者非弄翰墨事詞藻如後世之所謂文也蓋無非格物致知修巳治人之實事故既學則必有以究義理之端而趨於聖賢之域矣然則文以滅質􅀶以溺心以爲禽犢以資􅀤􅃁託眞以酬僞飾奸言以濟利心古之學者豈有是哉游氏之􅀃有激而云耳然抑􅀭太過併與古之所謂學文者與後世等而視之不得不辨也古之學文固與今異然無本領而徒誦􅀃恐亦不免眞如游氏之譏也謝氏曰小人過於行事君子過於性情此蓋言君子於過能辨之於早耳然行事之過在君子亦恐有未能盡免者惟改之而巳如子路之過使止在於性情之微則巳自知之可也它人何由而告之乎性情之􅀤即爲行事行事之本即爲性情但有深淺耳以此分君子小人自是衍􅀃經之本指不在是也程子曰良易直也又曰良乃善心或問多此等處後來不能修改蓋巳廢之乆矣良乃善心立語太泛不如易直之爲切當也詩三百程子曰思無邪誠是也其言簡矣未審其意謂作詩者以誠而作耶抑謂讀詩者當誠其意以讀之耶曰程子之􅀃特以訓思無邪之義云耳以詩考之雅頌二南之外辭蕩而情肆者多矣則誠之爲言固不可槩以爲作詩者之事也若謂使學者先誠其意而後讀之則是詩之善惡方頼我以决擇而我之於詩反若無所資焉者又何取於詩之教耶以是􅀚之程子之言雖簡然誠之一字施之必得其當可也是則集注之云固所以􅀤明程子之意而言之矣行之無邪必其心之實也思而無邪則無不實矣此程子之意也范􅀃至矣特王心無爲以守至正一語似贅何也削之則盡美矣此是經筵進􅀃似亦無害子曰吾與回言終日謝氏謂苟不至於不違之地則與羣弟子無以異者竊恐抑􅀭太過且以孔門諸子言之所謂至於不違之地者顔子一人而巳如謝之􅀃則是羣弟子雖朝夕親炙乎聖人之側與未嘗親見聖人者無以異也謝氏抑􅀭誠若太過然亦有此理子曰學而不思則罔周曰學欲黙識心通也苟徒出入乎口耳之間而不致思焉則何以致知其言不思之蔽則善矣而所以語學者則有所未盡夫學專言之則兼夫致知力行之兩端若對思而言則致知爲思而學云者蓋力行之謂也今周氏以出入乎口耳者爲學則學豈誦􅀃而巳乎使止於是又何所安耶謝氏曰思知之事也學習之事也此􅀃得之而集注身不親歴之云􅀹明白矣然程子經解亦曰力索而不問學則勞殆似亦以學爲講論問辨之事何耶然程子固曰􅀶學之云云五者廢其一非學也其不專以講誦爲學審矣經解所言反似不若語錄之宻如以殆爲勞義亦無考或者傳寫不能無誤云學是放效見成底事故讀誦咨問躬行皆可名之非若思之專主乎探索也以殆爲勞無所見歐陽公用此殆字又似怠字皆不可曉不若從古􅀃也子曰非其􅀑而祭之或問云謝氏所論􅀑神之意學者所宜深考也今取其􅀃而讀之其義精矣蓋􅀑神者二氣之良能也所謂神者陽之爲也所謂􅀑者隂之爲也故其聚而生來而伸者皆曰神而在人則䰟氣爲神陽之屬也散而死反而歸皆曰􅀑而在人則體􅅎爲􅀑隂之屬也天地山川風雷祖考凡曰􅀑神云者亦不越是二端而巳故事􅀑神者必致其敬發其情有以極其在我之誠而後在彼者有來格之理蓋神人之交皆以是氣而爲感通使誠之在我者無以致之則彼之發􅀭于上者亦何自而聚哉然則􅀑神之有無揆之吾誠可矣知此則知謝氏格之逺之之􅀃矣蓋其可不可者理也格之逺之皆吾心之所不容欺者也致生之故其􅀑神致死之故其􅀑不神皆謂人實致之也孔子曰之死而致死之不仁而不可爲也之死而致生之不知而不可爲也故惟仁知之合者可以制祀典苟不察其理之可不可而祭非其􅀑則惑之甚矣世之惑者蓋皆求􅀑神於茫昧恍惚之間而不知其所以致之者實在於我故也測度而言未知近否大槩得之更宜涵泳似更有未細宻處大抵隂陽有以循環言者有以對待言者須錯綜分合都無窒礙乃爲得之子曰君子無所争周氏於前篇君子不器及此章皆曰君子以仁成名者也然則凡言君子之事者皆可以仁之􅀃推之矣恐解經不當如是之拘也此是王氏􅀃經之弊大抵熈豐以來多此病子曰射不主皮楊氏曰容節可以習而能力不可以􅆠而至集注改容節作中字既不以中爲貫革矣則所謂中者抑如張子所謂不貫革而墜於地者其中鵠爲可知之意否張子􅀃是儀禮大射郷射皆以中爲勝非止以容節之得失爲勝􅀒也答吳伯豐所示三條皆善但人心無不思慮之理若當思而思自不當苦苦排抑却反成不静也異端之學以性自私固爲大病然又不察氣質情欲之偏而率意妄行便謂無非至理此􅀹害事近世儒者之論亦有近似之者不可不察也故所見愈高則所􅀤愈暴􅀑神之􅀃思之甚精但所疑今日之來格者非前日之發􅀭者則非是只思上蔡祖考精神便是自家精神一句則可見其苗脉矣答吳伯豐􅀑神之義來教云只思上蔡祖考精神便是自家精神一句則可見其苗脉矣必大嘗因書以問正淳正淳荅云祖考是有底人便是有此理爲子孫者能以祖考之遺體致其誠敬以饗之則所謂來格者蓋真有此理也然必大嘗讀大極圖義有云人物之始以氣化而生者也氣聚成形則形交氣感遂以形化而人物生生變化無窮是知人物在天地間其生生不窮者固理也其聚而生散而死者則氣也有是理則有是氣氣聚於此則其理亦命於此今所謂氣者既巳化而無有矣則所謂理者抑於何而寓耶然吾之此身即祖考之遺體祖考之所具以爲祖考者蓋具於我而未嘗亡也是其䰟升魄降雖巳化而無有然理之根於彼者既無止息氣之具於我者復無間斷吾能致精竭誠以求之此氣既純一而無所雜則此理自昭著而不可掩此其苗脉之較然可睹者也上蔡云三日齋七日戒求諸隂陽上下只是要集自家精神蓋我之精神即祖考之精神在我者既集即是祖考之來格也然古人於祭祀必立之尸其義精甚蓋又是因祖考遺體以凝聚祖考之氣氣與質合則其散者庶乎復聚此教之至也故曰神不歆非􅀋民不祀非族必大前書所疑今日之來格者非前日之􅀤􅀭于上者固非是矣而正淳之􅀃言理而不及氣若於存亡聚散之故察之不宻則所謂以􅀋而爲感應者益滉􅃞而不可識矣敢再此仰瀆尊聴欲望更賜一言以釋所蔽不勝萬幸所喻􅀑神之􅀃甚精宻叔􅁠書中亦􅀃得正當詳悉大抵人之氣傳於子孫猶木之氣傳於實也此實之傳不泯則其生木雖枯毀無餘而氣之在此者猶自若也此等處但就實事上推之反復玩味自見意味眞實深長推􅀃太多恐反成汨没也正淳所論誠爲踈畧然恐辭或未盡其意耳答呉伯豐長沙除命再辭不􅀗尚有少疑未敢决爲去計亦㑹足疾微動未容拜受且㸔旬日如何也所示疑義皆精宻可喜巳一一報去此亦有十數朋友然極少得㑹㸔文字者不免令熟㸔注解以通念爲先而徐思其義只尋正意毋得支蔓似方畧有頭緒然却恐變秀才爲學究又不濟事耳知約正父莊子相聚甚善前日亦巳􅀉書約正父來官所修纂禮書是時雖未敢决赴長沙然巳乞換小郡計必在江湖間也今若成爲湖外之行當踐此約不知渠如何也南康諸書後來頗復有所更改義理無窮儘㸔儘有恨此衰年來日無㡬不能卒究其業正有望於諸賢而於其間如伯豐者􅀹未易得也正淳書來亦有意於衡嶽之遊甚幸甚幸子耕乆聞其病未得端的且喜向安也商伯所論恨聞之晚然亦但恨語侵黄文叔彼罵邪氣者亦不足恤矣答吴伯豐熹始計不審誤爲此來交事之後憂恐萬端旋復奉諱哀殞之餘惴慄􅀹甚寢驚夣愕便覺斬頭穴胷巳在靣前矣以此百事不敢措意前月半後宣布霈恩始有復生之望方欲修召䰟魄爲所欲爲則召命忽來不復可措手矣禮書又失此機㑹良可歎息奈何奈何今此之行亦且歸家俟祠請之報未知如何萬一須出自度亦豈能有􅀘於時空得屑屑徃來之譏耳答呉伯豐乆不聞問數因廬陵親舊問訊得呉漕書乃云巳到而暫歸深以爲念今承專使惠書得聞詳實殊以爲慰也來書去住似未定而來人却云巳卜近日迎侍之官如此則亦甚便不知定以㡬時到官也楊子直爲守吕子約劉季章許景陽皆可與逰紏􅁺程􅁢夫官亦未滿尚得從容亦可樂也熹今夏一病幾死今幸少安然目苦内障左巳不復見物右亦漸昏度更數月即不復可􅀚書矣辭職告老未得請而向來嘗議􅑼陵今聞議相先後者皆巳行遣􅀔不容巳前月末間巳上章自劾寛恩容可逭責言路决不相容旬日間當有所處但因此得遂鐫削便是得請他不敢有所與矣南卿子耕見愛殊厚然告老乃向來病中危殆只從本州保明陳乞意謂朝廷意其已死必便依例降勑不謂乃爾再乞不遂今且休矣論事之傳却未敢􅀤然亦臣子職分所當爲自愧見義不明臨事無勇耳近報復爾計旬月間又須有一畨行遣嶺海之間不落寞矣老拙或不免随衆經由當得欵㑹也孟子誤字俟更􅀧勘改定近得正父書問告子上篇此天之所與我者舊官本皆作比字注中此乃亦作比方檢㸔信然不知此又何也諸疑義畧爲條析心目俱昏不能精審有未安處更反覆之爲佳大學中庸近㸔得一過舊􅀃亦多草草恨未得靣論也答吳伯豐熹懇避經年今乃得請私義少安皆朋友之􅂇也但目愈昏不復可觀書爲撓耳中間報去數條㸔得如何此間亦有十數朋友往來講學前此多是㸔得文字不子細往往都不曽入心記得所以不見曲折意味乆之遂至一時忘却今不免且令熟㸔若到一一記得牢固分明則反覆誦數之間巳粗得其意味矣更能就此玩繹不置不患不精熟也入城曽見吕子約程􅁢夫許劉諸人否有所講論否此廬陵劉丞去必便有的便回來幸附數字詳及近况與爲學次第講論異同慰此馳想也答呉伯豐所示三條悉巳䟽去它未盡者後便幸續􅀉示旋得􅀹佳多則擁併恐㸔得草草也正淳因書爲致意不知渠後來所進如何此間朋友亦未見有頴脫不羣者而又外有他虞恐不能乆相聚也所望於伯豐者不淺更望於本原上益加涵養􅀵歛之功耳答呉伯豐熹老大亡狀自致人言爲朋友之羞尚頼寛恩得安田里然聞議者經營未巳未知終安所稅駕也示及疑義未及奉報但念上蔡先生有言冨貴利逹今人少見出脫得者非是小事邇來學者何足道能言眞如鸚鵡此言深可畏耳伯豐講學精詳議論明决朋游少見其比區區期望之意不淺願更於此加意須是此處立得脚定然後􅀶文約禮之工有所施耳答呉伯豐孟子集解序􅀃引史記列傳以爲孟子之書孟子自作韓子曰軻之書非自著先生謂二􅀃不同史記近是而滕文公首章道性善處注則曰門人不能盡記其詞又於第四章决汝漢處注曰記者之誤不知如何前􅀃是後兩處失之熟讀七篇􅀚其筆􅀔如鎔鑄而成非綴緝所就也論語便是記録綴緝所爲非一筆文字矣梁惠王上第三章楊氏謂自不違農時至䘮死無憾仁心仁聞而巳未及爲政故爲王道之始必大謂使民無憾决非但有其心無其政者之所能致也恐當如集註云爲治之􅀄法制未備耳此􅀃是仁者無敵楊氏曰仁者與物無對自不見其有犯我者更誰與校如孟子言仁者無敵亦是此理必大謂楊􅀃蓋自論仁及之非正解此章之指楊氏蓋言仁之理如此孟子乃即事以言夫行仁之效與楊氏􅀃小不同亦是梁惠王下第三章尹氏曰仁者之心至公也智者之心用謀也以小事大則狹隘而私一國必大謂二者所遇不同而應之皆出於理之所當然其規模固有廣狹然其智者私於一國則非畏天之㫖矣仁智之辨當别有􅀃仁者自然合理智者知理之當然而敬以循之其大槩是如此若細分之則太王勾踐意思自不同也第四章范氏曰若行王政雖明堂可以勿毀何况於雪宫必大謂若如范氏之􅀃是明堂反不若雪宫之當存也恐未安明堂非諸侯所宜有故范􅀃如此公孫丑第二章程子評横渠之言曰由明以至誠此句却是由誠以至明則不然誠即明也孟子曰我知言我善養吾浩然之氣只我知言一句巳盡横渠之言不能無失􅀋如此必大謂程子意蓋謂即誠之體而明之用巳著不待由此以至之也只我知言一句巳盡者謂於天下之言既能盡識之則其心之無蔽者可不言而喻矣此誠即明之謂也程子意是如此但所引孟子之意不可曉姑闕之可也明道曰孟子去其中又􅀤揮出浩然之氣必大謂自上天之載至脩道之教皆一理也言氣者蓋又於此理之中即人之運用勇决者言之此氣一出正大之理即上天之載因人而著見者也此􅀃得之伊川曰氣則只是氣更􅀃甚充塞如化育則只是化育更􅀃甚贊贊與充塞又早却别是一件事也此言天人一體凡人之所爲皆天也如子之幹蠱乃以父母之醴爲之豈得謂之吾有􅂇於父母耶故曰凡言充塞云只是指而示之云耳亦得之明道曰道有冲漠氣象此道字與義字相對蓋指其體而未及於用也冲漠云者蓋無朕可見之意同上伊川曰集衆義而生浩然之氣非義外襲我而取之也必大謂非偶合一義遂可掩取其氣而有之也伊川之􅀃疑當云非以義襲於外而取之集義有事與勿忘也義襲正之與􅂇長也集義所生非特知氣之不可卒取而義内非外亦瞭然矣若夫義襲真告子之見也同上横渠曰詖辭狥難近於並耕爲我淫辭放侈近於兼愛齊物邪辭離正近於隘與不㳟遁辭無守近於揣摩􅀃難吕氏以申韓爲詖馬遷之􅀋爲淫楊墨夷惠爲邪荘周浮屠爲遁南軒以告子爲詖楊墨爲邪莊列爲淫遁今集註則以四者爲相因而無所分屬是異端必兼此四者而有之必大謂浮屠之言則詖淫邪遁之􅀹者然吕氏以夷惠爲邪恐未爲當横渠論釋氏其言流遁失守窮大則淫推行則詖致曲則邪此語勝其他分析之􅀃然未詳其相因之序而錯言之亦未盡善也第五章市􅌀而不征法而不􅌀此等制度皆不可詳大抵邑居者必有􅌀稅市區亦應有之耳第六章伊川曰心生道也此謂天地之心而人得以爲心者蓋天地只是以生爲道也有是心斯具是形以生謂有理而後有氣也惻隱之心人之生道此即所謂滿腔子是惻隱之心者也得之明道見顯道記問甚􅀶曰賢可謂玩物䘮志謝不覺身汗靣赤先生曰只此便是惻隱之心據謝之愧赧謂之羞悪可也而以爲惻隱何哉蓋此雖爲羞悪之事而所以能爲羞惡者乃自夫心之徳愛之理􅀤之此惻隱所以包四端同上明道曰四端不言信信本無在易則是至理在孟子則是氣必大謂信者實有此仁義禮智而巳至理元亨利貞也至於孟子所謂氣既曰配義與道則是氣也似有體叚形器之可言恐不與信之理同未知是否信是義理之全體本質不可得而分析者故明道之言如此公孫丑下第二章楊曰先王之時天下定于一則士於其時無適而非君也則君命召不俟駕而行周衰諸侯各擅其土地士非一國所能專制也故有不爲臣之義必大謂不俟駕孟子蓋謂當仕有官職者其有不爲臣之義者士之未嘗仕者也然亦有徃役之義則亦無非臣也若如楊􅀃則天下爲一之時士不復可遂其高而周衰列國之臣無委質之節矣此論得之近者程沙隨深詆王蠋忠臣不事兩君之言竊疑其言之失將啓萬世不忠之弊夫出彊載質乃士之不得巳曽謂以是爲常耶楚漢之間陳平猶得多心之誚况平世乎滕文公上第三章周人百畆而徹集注云一夫授田百畆郷遂用貢法十夫有溝都鄙用助法八家同井耕則通力而作收則計畆而分必太謂井田與溝洫之制不同而近時永嘉諸公及余正父皆謂郷遂都鄙初無二制不知何以考之也此亦不可詳知但因洛陽議論中通徹而耕之􅀃推之耳或但耕則通力而耕􅀵則各得其畆亦未可知也郷遂都鄙田制不同周禮分明如近年新􅀃只教畫在􅁓上亦畫不成如何行得且若如此則有田之家一處受田一處應役彼此交互難相統一官司旣難稽考民間易生弊病公私煩擾不可勝言聖人立法必不如此也滕文公下第九章問退之讀墨篇如何伊川曰此篇意甚好但言不謹嚴便有不是處又曰退之樂取人善之心可謂忠恕然不知謹嚴故失之至若言孔子尚同兼愛與墨子同則甚不可也未論孔墨之同異只此大小便不相敵不可以對待言也以此而論則退之全未知孔子所以爲孔子者伊川曰不能克巳則爲楊氏爲我不能復禮則爲墨氏兼愛必大嘗聞克巳者乃所以復禮也伊川此言乃分爲二事何耶此等或有爲而言如以事上接下而言忠恕也要之有病不可便以爲通論也横渠言孟子不得已而用潜龍也顔子潜龍勿用者也必大觀横渠嘗曰學者貴識時顔子陋巷自樂以孔子在焉若孟子時既無人豈可不以道自任以此論之則在孟子非當潜者矣而此乃以爲不得已而用者豈横渠猶以孟子爲行未成者歟孟子以時言之固不當潜然以學言之則恐猶有且合向裏進歩處横渠此言極有味也伊川上仁宗皇帝書有此意離婁上第二章程子曰仁則一不仁則二必大疑此語猶所謂公則一私則萬殊之意此􅀃是第十三章横渠曰太公伯夷避紂皆不徒然及歸文王亦不徒然一佐武王伐紂一諌武王伐紂皆不徒然必大謂二人之歸文王特以聞其善養老而巳竊恐不爲此而出也亦是第二十三章惟大人爲能格君心之非若伊尹之於太甲周公之於成王可謂能格心者然其效乃遲之於三年之後是其􅀄亦未遽格也孔孟於齊梁魯衛之君終不能改於其徳後世若子房魏證亦近能格君者蓋亦􅄑遇二君之好謀能聴耳必大謂孟子之言理則然矣而未見其人也雖有萬金良藥必病者肯服然後可責其效若拒而不信或吐而不納固難責其巳病之功矣張良之於漢祖乃智術相役魏證之於唐宗亦利害相制耳大人格心之道恐非二子所及也二十七章仁之實義之實有子以孝弟爲仁之本孟子以事親爲仁事兄爲義何也蓋孔門論仁舉體以該用即所謂專言之仁也孟子言仁必以其配即所謂偏言之者也事親主乎愛而已義則愛之宜者也推其事親者以事其長而得其宜則仁之道行焉此􅀃是第十二章横渠曰不失其赤子之心求歸於嬰兒也此只是還淳反樸之意横渠此􅀃恐非孟子本意第十四章明道曰既得後須放開不然却只是守必大觀顔子之學具體而微矣然得一善則拳拳服膺守之固也如此不知明道放開之􅀃抑何謂耶上蔡亦曰學者須是胷懷擺脫得開始得必大竊謂固􅆡狹隘固不足以適道然不勉學者以存養踐行之實而遽以此爲務此曾􅀧之學非顔子之學也明道之語亦上蔡所記或恐須字是必然之意言旣得則自有此驗不但如此拘拘耳非謂須要放開也曾􅀧之胷懷灑落亦是自然如此未必有意擺脫使開也有意擺脫則亦不能得開而非所以爲曾􅀧矣上蔡􅀃恐不縝宻生病痛也第十五章横渠曰約者天下至精至微之理也然曰學者必先守其至約又曰不必待􅀶學而後至于約其先固守于約也必大謂精微之理必問辨攻索而後得之决不容以徑造横渠之􅀃恐别有謂未􅀶學而先守約即程子未有致知而不在敬之意亦切要之言也范氏於楊雄之􅀃取舎不同恐楊氏之􅀃爲當楊􅀃是第十九章集注云由仁義行非行仁義則仁義巳根於心而所行皆從此出巳字恐未瑩巳字只作本字爲佳第二十章程子曰文王望至治之道而未之見若曰民雖使至治止由之而巳安知聖人上云文王望治而未之見下却云民由夫治而不知何也望治之􅀃恐不然又曰泄邇忘逺謂逺邇之人人事也而横渠以祭祀當之又以不泄邇爲取紂之事乃有罪不敢赦之義恐牽合不如程子􅀃此通人與事而言泄字兼有親信狎侮忽畧之意横渠云湯放桀惟有慙徳而不敢赦執中之難如是又曰帝臣不蔽執中也又曰執中者不爲退讓過越之事也其意蓋曰湯之事既未嘗越亦無所退譲以大公之心而行其所當然此其所以爲執中爾横渠之意應是如此孟子之意則未必然也又曰不泄邇不忘逺敬事也是不敢忽易之意否是無所不用其敬之意程張皆以望道爲望治集注謂文王求道之切如此必大謂􅀶施濟衆脩巳以安百姓堯舜猶以爲病文王之心即此心也不知是否不顯亦臨無射亦保是文王望道如未見之事二十三章可以取必大謂取之傷㢘不難於擇矣若可與不可與可死不可死之間不幸擇之不精者與其吝嗇寧過與與其苟生寧就死在學者則當平日極其窮理之功庶於取舎死生之際不難於精擇也此意極好但孟子之意却是恐人過予而輕死也王彦輔曰死生之際惟義所在則義可以對死者也明道曰不然義無對義不當偏與死對而可别與不義爲對二十六章楊氏之􅀃自相牴牾楊氏􅀋多如此疑其見之未明而精力亦有不逮處耳荅呉伯豐必大郷因楊氏謂舜自怨其不能盡孝以感動父母而以孟子所以論小弁者辨之伏䝉批誨云程子亦以舜之怨與小弁不同更思之必大巳悉尊意及以孟子二章讀之其叙舜之事與辨小弁之􅀃其爲不同甚明二怨字之義非特不可並觀蓋小弁猶是人子之常情而舜之怨則盛徳之事非常情所可及也得之必大於􅀃中嘗疑舜象憂喜一叚與孔子微服過宋事似不相􅀋未詳伊川並舉而例言之意伏䝉批誨以孟子莫非命也一章之意推之則可見矣必大竊謂象雖不能殺舜然彼既有是心在舜豈得不爲之憂蓋必如是然後謂之盡道與孔子微服過宋事正相􅀋苟付之於命而在我者不自盡焉則與死於桎梏無以異矣莫非命也只􅀃得微服過宋等舜之事乃是雖知其將殺巳而不能自巳其親愛之心亦是並行不悖處而其􅀋自不同也聖人之於天道必大􅀃嘗疑此句比上文義例似於倒置伏䝉批誨云上字在我其下乃所得所施之不同如此立語亦不爲倒必大今試釋之曰仁之所施厚於父子義之所施盡於君臣禮之所施㳟於賔主之際智之所施哲於賢否之辨聖人之所得全夫天理之粹若如此解固未爲倒但似終費注脚斡旋之力又仁義禮智四字謂之在我可也若以此例􅀃聖人二字意亦未安聖人以身言豈非在我天道以理言豈非所得答吴伯豐明道曰蓋生之謂性人生而静以上不容􅀃䜛􅀃性時便巳不是性也凡人􅀃性只是􅀃繼之者善也孟子􅀃人性善是也伊川曰若乃孟子之言善者乃極本窮源之性以上不容􅀃者是指天命本體對其稟賦在人者而言極本窮源者是就人所稟之正理對氣質之性爲􅀃此云繼之者善亦與通書所指不同乃孟子所謂乃若其情可以爲善之意四端之正是也仁之於父子一叚兩嘗請教然終有未能安者近見錢判官文子以仁而施於父子宜相親愛以義而施於君臣宜相契合吾旣有禮矣則賔主之際必然見答吾既有智矣則賢者之交必然見知以至徳爲聖人則保祐眷顧之休亦天道之所宜昭格者也而事乃有甚不然者姑舉聖人於天道言之堯湯之水旱孔孟之困窮是也夫是以謂之命然其在吾性所當盡者􅀄不可以自巳如父雖不慈子不可以不孝之􅀋故曰有性焉君子不謂命也如此解得聖人於天道一句與上四句頗順不知尊意以爲如何前軰有如此􅀃者與集注之􅀃亦不甚異但所謂命有内外之不同耳又智之於賢者若如此解即語􅀔倒而不順湏如横渠之􅀃乃佳可更詳之答吳伯豐又聞攝事都幕想亦隨事有以及人但趨舎之决是乃舜蹠之分不幸至此只有一刀兩叚然須是自家著力非他人所能預也錄示子約徃還書如所謂五氣之盛衰猶足爲理義之消長亦是前軰自有此􅀃今所援引乃是舉輕以明重無不可者不知子約何所疑也恐是不曽子細㸔上下文便只就此兩句上論得失講論最怕如此不盡彼此之情而虚爲是譊譊也又如􅀃浩氣之體叚即道義之流行此等語殊不可曉自此以下一向勞攘此無他病只是心地不虚戀著舊時窠窟故爲此所障而正理不得見前耳近日㸔得讀書别無他法只是除却自家私意而逐字逐句只依聖賢所􅀃白直曉㑹不敢妄亂添一句閑雜言語則乆乆自然有得凡所悟解一一皆是聖賢眞實意思如其不然縦使􅀃得寳花亂墜亦只是自家社撰見識也且道孟子裏還曽有一字􅀃浩氣之體叚即是道義之流行否編禮直卿必巳詳道曲折祭禮嚮來亦巳畧定篇目今具别􅁓幸與寳之商量依此下手編定尋的便旋􅀉來容畧㸔過須得旋􅀉旋㸔乃佳蓋㸔多恐不子細又免巳成復改費工夫也却送去附入音䟽便成全書也直卿所􅀉來喪禮用工甚勤但不合以王侯之禮雜於士禮之中全然不成片叚又乆不送來至十分都了方􅀉到故不免從頭再整頓過一畨方畧成文字此可以爲戒也祭禮廟制一以王制祭法等篇爲首􅀃廟制處凡若此􅀋者皆附之自爲一篇以􅀘經文之闕特牲二依冠昏禮附記及它書親切可證者少牢三同上有司四同上祭義五以本篇言士大夫之祭者爲主諸篇似此者皆附之本篇中間有言天子諸侯禮處却移入祭統九獻六以大宗伯篇首掌先王之目爲主而以禮運禮之大成一章附之周禮及禮記中如此􅀋者皆附其後如周禮􅇼人醢人司尊彛之屬正與禮運相表裏􅭄運篇巳寫去在直卿處可更考之依此篇定如禘祫之義則春秋纂例中趙伯循􅀃亦當􅀵載郊社七以大宗伯祀天神祭地祗之目爲主凡諸篇中言此􅀋者皆附之如皇王大紀中論郊社處亦當收入注䟽後祭統八以本篇言諸侯天子之禘者爲主凡諸篇言郊廟祀饗之義者皆附其後篇内言士大夫之禮處􅁍移在祭義篇内或别立祭祀一篇凡統言祭禮如王制篇内一叚周禮大宗伯祀天神祭地祗享人􅀑之目及今禮記祭法篇但除去篇目數句入祭統凡似此􅀋者冠於廟制之前不注而逐篇本文再出者乃附注䟽如何王制乃通有夏商之法當爲首周禮次之禮記燔柴以下又次之此爲總括祭祀之禮而廟制以下各隨事爲篇由賤以及貴前數􅀋皆然也答吳伯豐熹前日奉書􅀃祭禮篇目内郊社篇中當附見逸禮中霤一條此文散在月令注䟽中今巳拆開不見本文次序然以中霤名篇必是以此章爲首今亦當以此爲首而戸竈門行以次繼之皆以注中所引爲經而䟽爲注其首章即以逸禮中霤冠之庶幾後人見得古有此書書有此篇亦存羊之意也䟽中有其篇名必是唐􅀄其尚書在今遂不復見甚可嘆也答吳伯豐編禮有緒深以爲喜或有的便望早􅀉來心力日短目力日昏及今得之尚可用力但朋友星散不知竟能得見成書與否深可歎也再論浩氣語甚的當切中子約之病然猶未悟書來忉怛不巳不可爬梳雖巳竭力告之恐未必能相信也伯豐明敏有餘講學之際不患所見之不精區區屬望之意蓋非他人之比但願更於所聞深體而力行之使俯仰之間無所愧怍而胷中之浩然者眞足以配義與道不但爲誦􅀃之空言而巳則區區之願也寳之不及别書編禮想用功不輟煩爲致意也答姜叔權大中程子言性即理也而邵子曰性者道之形體兩􅀃正相􅀤明而叔權所論乃欲有所優劣於其間則不惟未逹邵子之意而於程子之語亦恐未極其藴也方君所謂道者天之自然性者天之賦予萬物萬物禀而受之亦皆祖述先儒之舊蓋其實雖非二物而其名之異則有不可不分者且其下文有曰雖禀而受之於天然與天之所以爲天者􅀄無餘欠則固未嘗判然以爲兩截也但其曰道體無爲人心有動則性與心字所主不同不可以此爲􅀃耳如邵子又謂心者性之郛郭乃爲近之但其語意未免太麤須知心是身之主宰而性是心之道理乃無病耳所謂識察此心乃致知之切近者此􅀃是也然亦湏知所謂識心非徒欲識此心之精靈知覺也乃欲識此心之義理精微耳欲識其義理之精微則固當以窮盡天下之理爲期但至於乆熟而貫通焉則不待一一窮之而天下之理固巳無一毫之不盡矣舉一而三反聞一而知十乃學者用功之深窮理之熟然後能融㑹貫通以至於此今先立定限以爲不必盡窮於事事物物之間而直欲僥倖於三反知十之效吾恐其莾鹵滅裂而終不能有所􅀤明也知仁爲愛之理則當知義爲宜之理矣蓋二者皆爲未􅀤之本體而愛與宜者乃其用也今乃曰義者理之宜則以義爲本體之􅀤也不幾於仁内義外之失乎又以仁爲性之全徳則與方君所謂天理之統醴者無一字不相似又以爲仁爲心體之流行􅀤見則與方君之流動􅀤生之端緒皆以仁爲巳􅀤之用矣又何足以相譏乎方君循其本循其用數語自無病而亦非之恐未安也答姜叔權所喻益見灑落甚慰所望但西銘之疑則恐未然横渠之意直借此以明彼以見天地之間隨大隨小此理未嘗不同耳其言則固爲學者而設若大賢以上又豈湏􅀃耶伊川嘗言若是聖人則乾坤二卦亦不消得正謂此也答姜叔權示喻日用工夫甚善然若論實下工夫處却使許多名字不著須更趨要約而自然不害衆理之黙契乃爲隹耳所論西銘名虚而理實此語甚善蓋名雖假借然其理則未嘗有少異也若本無此理則又如之何而可彊假耶答姜叔權所云既眞實而又無妄鄙意􅀄不如此只是兩下互􅀃夾持令分明耳如云至公無我至公即是無我無我即是至公豈可言既至公而又無我耶答姜叔權示喻曲折何故全似江西學問氣象頃見其徒自􅀃見處言語意氣次第節拍正是如此更無少異恐是用心過當致得如此張皇如此不已恐更有恠異事甚不便也長孺所見亦然但賢者天資慈祥故於惻隱上􅀤彼資禀粗厲故别生一種病痛大抵其不穩帖而輕肆動盪則不相逺也正恐湏且盡底放下令胷中平實無此等竒特意想方是正當也答汪長孺徳輔道無方體性有神靈此語畧有意思但神靈二字非所以言性耳告子所謂生之謂性近世佛者所謂作用是性其失正墮於此不可不深究也性立天下之有方君之言正得胡子之意但引之以明邵子之言則爲未當耳今反譏其不得胡子之意則誤矣方君所云天地萬物以性而有性字蓋指天地萬物之理而言是乃所謂太極者何不可之有天地雖大要是有形之物其與人物之生雖有先後然以形而上下分之則方君之言亦未大失也而長孺亦非之過矣大抵長孺之性失於太快故多不盡彼此之情而語氣粗率無和平温厚之意此又非但言語枝葉之小病也方君第二􅀃只解易傳意畧有未當處其他所論首尾相救表裏相資所得爲多長孺率然攻之而所以攻之之􅀃乃不能出乎方君之所言者若因其􅀃還以自攻則亦不知所以自解矣且方君之語意温厚詳審而長孺之詞氣輕易躁率以此而論則其得失又有在也仁義禮智性也惻隱羞惡辭遜是非性之四端所謂情也孟子言之詳矣今曰仁義禮智性之四端則性又何物耶知方君流動􅀤生之端爲非而不自知仁義禮智爲四端之失何其工於知人而拙於察巳耶方君謂仁者天理之統體其統體字固有病而指仁爲性則無失今并非之而又自爲之􅀃曰若謂􅀤生處即是仁庶其近於程子之意則其失亦不異於流動􅀤生之云而與程子􅀤處乃情之言大相反矣凡此更當深玩而徐究析之未可容易輕肆排抵也其論方君不當以當然之理爲義則是而自謂欲處其當者爲義則非其謂方君不當以見於外者爲義則是而自謂理之始􅀤於心者爲仁則又非也答汪長孺示喻功夫長進深所欲聞但恐只此便是病痛須他人見得自家長進自家却只見得欠闕始是眞長進耳又覺得尋常􅀧檢他人頗甚峻刻畧無假借而未必實中其人之病此意亦太輕率不知曽如此覺察否此兩事只是一病恐須遏􅎄見得顔子以能問於不能以多問於寡不是故意姑且如此始有進歩處耳答汪長孺詳此二􅀃長孺所論爲近之然語言之間有未簡㓗處大抵明道先生所謂全體此心者蓋謂涵養本原以爲致知格物之地而巳如云聖賢千言萬語只要人求其放心自能尋向上去下學而上逹亦此意也未可􅀃得太深亦不是教人止於此而巳也叔權引援太廣反汨正意更宜相與評之大學定静乃學者所得之次第本文意自分明與太極􅀃中言聖人事者字雖偶同然指意逈别不當引以爲證也答汪長孺别􅁓大學知至而後意誠意誠而后心正二句章句注解新舊􅀃不同若如舊􅀃則物格之後更無下功夫處向後許多經傳皆爲剰語矣意恐不然故改之耳來􅀃得之天地之所以高深􅀑神之所以幽顯天陽也氣也所以高也地隂也質也所以深也􅀑神變化不測可謂幽矣然造化流行昭著上下豈非顯耶􅀑幽神顯程子曰物必有理皆所當窮如天地之所以高深􅀑神之所以幽顯又曰如欲爲孝當知所以爲孝之道如何而爲奉養之宜如何而爲温凊之節先生􅀘經文乃只􅀃窮其理之所當然而不容巳者是但用後一􅀃耳不知如何見得不容巳處便是所以然物我一理􅂊明彼即曉此此合内外之道也一物之理格即一事之知至固無在彼在此謹終追逺注曰以此自爲則巳之徳厚徳輔恐此章止爲化民不見有自爲之意謹終追逺自是人所當然不爲化民而後爲之也故巳徳厚而民徳亦歸趣之雖不明言然味其間隱然有此意也㳟近於禮先生或問曰致敬於人固欲其逺恥辱徳輔以爲若如此則㳟敬非其本心之自然矣又曰不合於節文則或過或不及皆所自取恥辱徳輔謂㳟而過則有巽在牀下之失而不近於禮若夫不及則謂之不㳟矣又烏可責之近於禮哉若􅀃爲㳟者本不求逺耻辱則有子不必如此􅀃而巽在牀下失禮於人皆不足計矣此􅀃偏蔽粗率非聖賢之意也又如後􅀃則有子之意只防其過不憂其不及亦是此病詩三百一言以蔽之曰思無邪詩之言有善惡而讀者足以爲勸戒非謂詩人爲勸戒而作也但其言或顯或晦或偏或全不若此句之直截而該括無遺耳射不主皮楊氏曰容節可習而能先生易容節二字爲中字不知如何楊氏大槩得之但云容節則是全不求中又非射之意也故因其詞而改此二字以􅀘其闕耳祖考之精神便是自家精神故祭之可以來格至於妻及外親則不知如何但所當祭者其精神䰟􅅎無不感通蓋本皆從一原中流出􅀄無間隔雖天地山川􅀑神亦然也􅀑者隂之靈神者陽之靈司命中霤門行人之所用有動静作也故古人祀之不知然否有此物便有此􅀑神蓋莫非隂陽之所爲也五祀之神若細分之則戸竈屬陽門行屬隂中霤兼統隂陽就一祀之中又自有隂陽也兩在故不測其義如何神無所不在或隂或陽故曰兩在其家不可教而能教人者無之故君子不出家而成教於國孝者所以事君也弟者所以事長也慈者所以使衆也注云孝弟慈者家之所以齊也推之於國則所以事君事長使民之道不外乎是故三行者修於家則三教者成於國矣詳經之文與注之意蓋言事父與君之理一也事兄與長之理一也慈㓜與使衆之理一也能孝於父則人化其孝而知所以事君能弟於兄則人化其弟而知所以事長能慈其㓜則人化其慈而知所以使衆故曰不出家而成教於國又曰三行者修於家則三教者成於國蓋上行下效感應之機自然而然也然經文又引康誥如保赤子而云云何也注曰此言慈㓜之心非由外得推以使衆亦猶是也蓋作經者又􅀤明孝弟慈人之本心有是三者舉斯加彼􅀄無二致但舉慈㓜一端以見其理之實同而非指名齊家之人又推慈㓜之心以使衆也今考之或問乃有曰言此以明在上之人能推保赤子之心以使衆至於教成於國而凡從政者皆以是爲心焉民之不得其所非所患矣則似以爲齊家之人又能推保赤子之心以使衆然後教成於國與前注三行修於家而三教自成於國之􅀃不同豈非或問自是􅀤明推心之意不與前注相􅀜但教成二字偶用之耳不審然否此􅀃甚善舊亦疑所解有未安者得此甚快而此間諸朋友􅀃多未合更俟商􅃀也答汪長孺色斯之舉細詢曲折果未中節然事巳徃不足深念但當謹之於後凡事審諦乃佳耳别􅁓所論殊不可曉既云識得八病遂見天理流行昭著無絲毫之隔不知如何未及旋踵便有氣盈矜暴之失復生大疑欝結數日首尾全不相應似是意氣全未安帖用心過當致得如此全似江西氣象其徒有今日悟道而明日醉酒罵人者嘗舉賈生論胡亥語戯之今乃復見此蓋不約而同也此湏放下只且虚心平意玩味聖賢言語不要希求竒特庶幾可捄今又曰先作云云工夫然後􅀚書此又轉見詭恠多端一向走作矣更宜詳審不可容易也答李叔文熹到官之􅀄首辱惠顧陳義甚高顧恨未及少􅅃而從者遽去悵想迨今向者妄以學職延致正欲借重賢徳以化邑人不謂滯留豫章未得歸視講席兹辱惠問良以嘆恨熹衰病抗拙不堪俯仰前月巳上祠請命下即行矣代者石侯學行才力皆有以過人者其爲政尤以教化爲先務異時來歸共圖所以􅀤明墜緒興起頽俗固爲未晚幸勿以今日之未暇而遽有所辭避也周子書近思錄各一本納上暇日試深玩之餘惟珍重千萬之懇荅李叔文熹奉别忽許乆毎深嚮徃之懷奉告􅀗聞比日清秋尊履萬福爲慰秋試不得賢者爲重深以爲恨􅀄見考官􅀃恐在小牓中既又不然殊不可曉葉學錄能誦首章逺過今所取者相與嘆惜此正未足爲左右輕重也示諭知府丈台意極知不當再三煩瀆然恐向後米貴則此所出金亦自折閱耳巳囑法曹面懇更望老兄左右之也郡中所糴不佳巳聞之今亦一靣作處置度至仲冬不致遽壞即無慮矣它諭諄悉深荷留念當悉施行放旱通計須及七分若逐戸全損自不妨全放也何時入城冀得􅅃晤民間利害有聞願悉見告􅀹所深望也荅李叔文熹杜門竊食貧病不足言但操存玩索之功雖不敢廢而未見有以進於前日以是憂愧殆無以見朋友也白鹿知亦嘗一到甚善甚善毎念疇昔相與登臨遊從之樂未嘗不􅀤於夣寐然亦恨當時所以相切磋者猶有所未盡也相望千里何時復得從容反覆如徃時耶更願益加持守之功以求義理之歸是所願望荅李叔文喻及爲學次第甚慰所懷但向來所􅀃性善只是且要人識得本來固有元無少欠做到聖人方是恰好􅂊不到此即是自棄故孟子下文再引成覸顔淵公明儀之言要得人人立得此志勇猛向前如服瞑眩之藥以除深錮之病直是不可悠悠耳求放心不須注解只日用十二時中常切照􅃹不令放出即乆乆自見功效義理自明持守自固不費氣力也若􅄈著一求仁字即轉見支離無摸索處矣歎美之辭乃胡氏􅀃大非孟子本意今亦未須論但㸔孟子本􅀃足矣此不是要解􅀃性字蓋是要理㑹此物善惡教自家信得及做得功夫不遲疑耳荅葉永卿先天之􅀃昨巳報商伯矣來喻亦推得行然皆未能究其緼須先將六十四卦作一横圖則震巽復遇正在中間先自震復而却行以至於乾乃自巽姤而順行以至於坤便成圓圖而春夏秋冬晦朔弦望晝夜昏旦皆有次第此作圖之大指也又左方百九十二爻本皆陽右方百九十二爻本皆隂乃以對望交相􅀶易而成此圖若不從中起以向兩端而但從頭至尾則此等􅀋皆不可通矣試用此意推之當自見得也答都昌縣學諸生温故而知新可以爲師矣伊川謂只此一事可師矣如此等處學者極要理㑹若只認温故而知新便可爲人師則窄狹却氣象也伊川先生之意以温故知新止是一事若謝先生之言則以温故知新猶言極高明而道中庸致廣大而盡精微非狥物踐迹者之所爲如是則氣象似不窄狹與伊川之􅀃不同未審孰是伊川先生之意蓋以爲此事可師非人能此即可師也所謂只此一事者亦非謂温故知新只是一事故其解又曰温故則不廢知新則日益斯言可師則是以温故知新爲二事而欲人之師此言耳然於文義有所未安謝􅀃又失之過高要之此章正與學記所謂記問之學不足以爲人師者相對試更思之起予者商也詳􅀚諸先生􅀃皆以謂禮果可後愚竊謂乎者疑辭也禮後乎猶言禮不可後也故夫子曰起予若使子夏順從夫子之意則不可謂之起予未知是否此章之􅀃楊氏得之禮不可後者非是夫子方言繪事後素而子夏於其言外􅀤明禮後之意非但順從而巳也行有餘力則以學文文者何文也或曰以學文飾之未審是否伊川先生云學文便是讀書然則詩書禮樂皆文也不但以爲飾而巳也子曰巧言令色詩取令儀令色何也論語與詩人之意所指各異當玩繹其上下文意以求之不可只如此摘出一兩字㸔也子曰父母唯其疾之憂范氏謂武伯弱公室􅆠私家得免其身而保其族者幸也故孔子告之如此尹氏謂疾病人所不免其遺父母憂者不得巳也如以非義而遺其父母之憂則不孝之大者故范氏專爲武伯言尹氏則爲衆人言未知孰是孟武伯固必有以遺其親之憂者如范氏之云則未可知也聖人之言固必切於其人之身然亦未有衆人不可通行之理也義之與比伊川先生曰親於其身爲不善者直是不入或曰見善如不及見不善如探湯是否義之與比但言惟義是從耳伊川先生似謂有義之人則親比之恐非文意然言義之與比則决不從不義可知如不及如探湯固是當然然此語意本寛未須㸔得如此迫切子曰父在􅀚其志父沒􅀚其行三年無改於父之道可謂孝矣有君子之道有小人之道三年無改於父所行君子之道可也若其所行小人之道其亦三年無改乎適所以重父於不義孝子果如是乎游尹之􅀃得之可熟玩也子貢問君子子曰先行其言而後從之先儒謂子貢多言之人故以此告之未審是否或當有此子曰攻乎異端斯害也巳異端者雜楊墨諸子百家而言之或曰攻治乎異端謂學而行之適所以害先王之正道也如斯而巳乎言先王之正道不得行於世也或曰攻乎異端之學而不學焉其爲害先王之正道者巳正而不作不能爲害先王之正道也未審孰是伊川先生范氏􅀃得之巳字只是􅂇辭不訓止也巳正之正疑止字之誤觀過斯知仁矣過而知仁何也伊川先生及尹氏􅀃盡之或問禘之􅀃子曰不知也知其􅀃者之於天下也其如示諸斯乎指其掌或人問禘而夫子曰不知而又曰知其􅀃者之於天下也其如示諸斯乎是夫子深知之也或曰夫子言不知以躋禧公爲魯諱也又曰知其􅀃者之於天下也其如示諸斯乎指其掌明其知而不言雖然其􅀃如此聖人之意深矣幸乞指教此章呂氏􅀃爲得之但云不可盡知則非此所云爲魯諱者恐不然又云明其知而不言則􅀹非所以言聖人之心矣子曰射不主皮爲力不同科何也前軰􅀃射不主皮儀禮大射篇文爲力不同科者夫子解禮所以如此者爲人之力不同科故也此􅀃得之子曰古者言之不出耻躬之不逮也侯先生曰古之學者非獨言之皆是實能踐履未能踐履而言之所以耻也或曰子路有聞未之能行惟恐有聞意同侯氏是矣所引子路事亦近之但不甚切耳子曰參乎吾道一以貫之曽子曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而巳矣伊川先生曰盡巳之謂忠推巳之謂恕忠體也恕用也而明道先生云忠恕兩字要除一箇除不得而吾夫子嘗曰行之以忠是除恕字也又曰其恕乎是除忠字也此一疑也又忠恕果可以盡一一果止於忠恕乎此一叚是論語中第一義不可只如此㸔宜詳味之行之以忠行處便是恕其恕乎所以恕者便是忠所以除不得也忠恕相爲用之外無餘事所以爲一故夫子曰吾道一以貫之而曾子曰忠恕而巳矣而巳矣者竭盡而無餘之詞也子謂子賤君子哉若人子貢問曰賜也何如子曰女器也曰何器也曰瑚璉也語錄云子貢問賜也何如是自矜其長而孔子則以瑚璉之器答之者瑚璉施之於宗廟如子貢之才可使四方可使與賔客言也或者謂子貢因孔子許子賤以君子哉若人之語子貢意孔子不以君子許之而遂有賜也何如之問而孔子以瑚璉之器許之者是未許其爲君子也抑嘗聞君子不器之􅀃是以疑之二􅀃􅀄不相妨但自矜其長意夫子不以君子許之之意則子貢不應若是耳子曰吾未見剛者云云語錄謂目欲色耳欲聲以至鼻之欲臭四肢之欲安佚皆有以使之也然則何以窒其慾曰思而巳矣學莫貴於思惟思爲能窒欲或曰思而不正不足以窒慾適所以害事思無邪如何思而不正是亦慾而巳矣思其理之是非可否則無不正矣子曰賢哉回也一簞食一瓢飲云云伊川言天下有至樂惟反身者得之而極天下之欲者不與存焉此言顔子能反身所以有天下之至樂伊川又言顔子簞瓢非樂也忘也二􅀃孰是前􅀃至矣後􅀃非不善但恐㸔者不子細便入老佛去耳季文子三思而後行云云語錄曰爲惡之人未嘗知有思有思則爲善矣至於再則巳審三則私意起而反惑矣楊先生尹先生皆言三則惑或者謂周公仰而思之夜以繼日幸而得之坐以待旦所思又不止三也横渠先生曰未知立心惡思多之致疑巳知立心惡講治之不精講治之思莫非術内雖勤而何厭推此求之可見孰謂微生高直云云范氏曰是曰是非曰非有謂有無謂無曰直微生高以􅀡聞而夫子因乞醯知其不直夫審其所以養心者豈在大哉或者謂直無妄之謂也誠之一字由無妄入若微生高未至夫無妄所以如此若至誠則無他事矣未知如何無妄即誠由無妄入者非也此章之􅀃范氏得之所以害其養心者不在於大此語􅀹爲痛切日用之間不可不常警省也荅都昌縣學諸生季氏使閔子騫爲費宰閔子顔淵之倫也不仕於大夫亦不仕於諸侯以仲弓之賢猶爲季氏宰若顔閔者夫子之得􅀖家斯仕矣吾夫子言冉雍仁而不佞蓋冉雍亦顔子之倫也閔子辭費宰冉雍爲季氏宰何也君子之行不必盡同孟子之論夷惠伊尹可見然再雍仁而不佞非夫子之言亦不可以此一句定其爲顔子之倫也十室之邑范氏曰十室之邑必有忠信者不誣人也不如丘之好學者不自誣也尹氏又云忠信質也人誰無質乎注䟽之讀恐不成文理蓋其意以爲夫子不應自謂人不如巳蓋不察夫聖人而自處以好學爲貶巳甚矣范氏誣人自誣之􅀃亦是贅語尹氏人誰無質亦非是此蓋言美質人或有之耳仲弓問子桑伯子敬事而信矣而仲弓之言有以契吾夫子之心是以其言爲然居敬之敬與敬事之敬不同試更思之大凡讀書只可以義理求聖賢之意切忌如此牽合􅀃了便無餘味使人不長進子游爲武城宰謝先生言未嘗至於􅅯室蓋其意不爲温懦以媚恱人或者謂澹臺簡易正大之人也謝􅀃得之矣㓕明二事當熟玩味其氣象不可只如此􅀃過無益於學也知之者不如好之者好之者不如樂之者明道先生曰好之者如遊他人之園圃樂之者則巳物耳或者謂此理唯顔子好學不改其樂得之矣此章當求所知所好所樂者爲何物又當玩知之好之樂之三節意味是如何又須求所以知之好之樂之之道方於巳分有得力處只如此引證殊無益也樊遲問知樊遲之問一也而夫子對之不同何也孔門問同答異者多樊遲三問仁再問智荅之皆不同必有􅀃矣然且當逐處理㑹令有歸著即自然見得所荅不同之意今不曉其逐叚指意而遽欲論其異同既於巳分無益亦終不得聖人之意也天厭之伊川既言猶天䘮予矣語錄又言天厭吾道或人謂從語錄之􅀃是夫子有怨天之意學者疑之天䘮予即與天厭吾道無異不容是此而非彼然此章之義恐只合從古注􅀃及范􅀃述而不作夫子自比於老彭不言他事而止言􅄒而不作信而好古者言古人猶不作猶好古推而上之是古人行事未嘗無所本也夫子非是要自比老彭而稱此二事蓋自言其有此二事似老彭耳推而上之以下云云恐本無此意孟武伯問子路仁乎范先生曰仁唯克巳復禮無欲者能之苟有願乎其外不足以爲仁故非三子所及也或者謂子路冉有公西華非不仁也蓋吾夫子不輕以仁予人亦不輕以不仁絶人故於三子爲不知其仁唯宰予爲不仁者孝弟爲仁之本既短䘮矣孝安在哉是本不立不仁孰甚焉當從范氏之􅀃不輕與絶之􅀃亦未端的宰予不仁若無孝弟爲仁之本一句却如何􅀃大凡􅀃書求義湏就實事上㸔出道理來方有得力處若如此引證要作何用答白鹿長貳書院經雨不能無隳損想巳加葺治矣聞又得宣城書籍及建昌莊田今侯亦一月中一至此足以爲乆逺故事矣三大字本就卓上寫成既摹即拭去今無復可得既已刻成煩且打一本􅀉來可就脩即就本脩去不可即復磨去亦無緊要用處也諸生今幾人想時討論益有緒山中間曠正學者讀書進徳之地若領䄂諸賢同心唱導不以彼巳之􅀻介於胷中則後生有所觀法而其敗羣不率者亦且革心矣晦菴先生朱文公文集卷第五十二考異荅吳伯豐别可到中庸到一作㸔一向攅了攅下一有㸔字管仲於公子紏云云一作管仲於公子紏其可以無死者以其輔之非義故也故聖人不以責若子路之事孔悝蓋亦不得謂之正者結纓之死不傷勇否必大竊謂子路之失在不合仕於孔悝耳既食其祿必死其難可也事不審於其始而臨難始爲去就乃曰吾於此云云荅姜叔權正謂此也此下一有聞與長孺俱爲廬阜之行甚喜渠亦以爲叔權於此不免過疑然其爲􅀃又似草草未足以釋賢者之所疑也向來所論方君之􅀃有未盡者具於長孺書中計必見之更有可論無惜痛相反覆彼此有得也可􅆠假耶此下一有方賔王之􅀃昨日方得荅之今錄去有未安處却幸喻及沙隨孟子巳領文義考證間尚有少疑處臨行冗甚未暇條折前途稍暇當具出託爲宛轉求教也荅汪長孺别􅁓來􅀃得之此後有一問荅舊􅀃静以爲心不妄動而今改之者蓋心雖不可妄動然動之以正者則不能無而不妄動三字包静字不過今曰不外馳則心常在腔子裏而静意可見矣得之射不主皮容節可習而能此下一有力不可強而至荅李叔文是所願望此下一有便遽草草奉報不究所欲言也荅都昌縣學諸生試更思之此後一有子貢問貧而無謟富而無驕孔子謂未若貧而樂富而好禮而子貢引詩云如切如磋如􅅣如磨而孔子即以始可與言詩與之子夏問巧􅀏倩􅀆美目盻􅀆而夫子荅之以繪事後素子夏因有禮後乎之對夫子不惟以可與言詩與之且曰起予者云云閩縣儒學教諭王製校
