body:
  text: 更同安縣學四齋名學舊有四齋許同年去其半以省長諭具貟之冗故今唯兩齋而四門如故又皆錯亂不得其所至於命名之義亦有未安蓋如彚征之名乃學優而仕之事非學者所冝先也掲而名之是以利禄誘人豈斆學者之意哉今欲復四齋之舊以志道據徳依仁游藝目之東西相次自北而南誦習之區各仍舊貫易日新長諭爲志道長諭彚征長諭爲游藝長諭其據徳依仁兩齋請學諭直學選本位學生不係教飬人權充齋長或齋諭許隨衆升堂聴講本學更不差人以塞希覬之路諸職事以爲如何幸與諸生議以見告條其便不便者熹且罷行之同安縣諭學者學如不及猶恐失之此君子所以孜孜焉愛日不倦而競尺寸之隂也今或聞諸生晨起入學未及日中而各巳散去此豈愛日之意也哉夫學者所以爲己而士者或患貧賤􅀔不得學與無所於學而巳􅀔得學又不爲無所於學而猶不勉是亦未嘗有志於學而巳矣然此非士之罪也教不素明而學不素講也今之世父所以詔其子兄所以勉其弟師所以教其弟子弟子之所以學舎科舉之業則無爲也使古人之學止於如此則凢可以得志於科舉斯巳爾所以孜孜焉愛日不倦以至乎死而後巳者果何爲而然哉今之士唯不知此以爲苟足以􅀿有司之求矣則無事乎汲汲爲也是以至於惰遊而不知反終身不能有志於學而君子以爲非士之罪也使教素明於上而學素講於下則士者固將有以用其力而豈有不勉之患哉熹是以於諸君之事不欲舉以有司之法而姑以文告焉諸君苟能致思於科舉之外而知古人之所以爲學則將有欲罷而不能者熹所企而望也諭諸生古之學者八􅀊而入小學學六甲五方書計之事十五而入大學學先聖之禮樂焉非獨教之固將有以飬之也蓋理義以飬其心聲音以飬其耳采色以飬其目舞蹈降豋疾徐俯仰以飬其血脉以至於左右起居盤盂几杖有銘有戒其所以飬之之具可謂備至爾矣夫如是故學者有成材而庠序有實用此先王之教所以爲盛也自學絶而道喪至今千有餘年學校之官有教飬之名而無教之飬之之實學者挾筴而相與嬉其間其傑然者乃知以干禄蹈利爲事至於語聖賢之餘㫖究學問之本原則罔乎莫知所以用其心者其規爲動息舉無以異於凡民而有甚者焉鳴呼此教者過也而豈學者之罪哉然君子以爲是亦有罪焉爾何則今所以異於古者特聲音采色之盛舞蹈降豋疾徐俯仰之容左右起居盤盂几杖之戒有所不及爲至推其本則理義之所以飬其心者固在也諸君日相與誦而傳之顧不察耳然則此之不爲而彼之乆爲又豈非學者之罪哉僕以吏事得與諸君遊今期年矣諸君之業不加進而行􅁩無以自著於州里之間僕心愧焉今旣增修講問之法盖古者理義飬心之術諸君不欲爲君子耶則誰能以是强諸君者苟有志焉是未可以舎此而他求也幸願留意毋忽諭諸職事嘗謂學挍之政不患法制之不立而患理義之不足以恱其心夫理義不足以恱其心而區區於法制之末以防之是猶决湍水注之千仞之壑而徐翳蕭葦以捍其衝流也亦必不勝矣諸生蒙􅀍教飬之日乆矣而行􅁩不能有以信於人豈專法制之不善哉亦諸君子未嘗以禮義教告之也夫教告之而不從則學者之罪苟爲未嘗有以開導教率之則彼亦何所趋而興於行哉故今增修講問之法諸君子其專心致思務有以漸摩之無牽於章句無滯於舊聞要使之知所以正心誠意於飲食起居之間而由之以入於聖賢之域不但爲舉子而巳豈不美哉然法制之不可後者亦旣議而起之矣惟諸君子相與堅守而力持之使義理有以愽其心規矩有以約其外如是而學者猶有不率風俗猶有不厚則非有司之罪惟諸君留意􅀘試牓諭蓋聞君子之學以誠其身非直爲觀聽之美而巳古之君子以是行之其身而推之以教其子弟莫不由此此其風俗所以淳厚而德業所以崇髙也近世之俗不然自父母所以教其子弟固巳使之假手程文以欺罔有司矣新學小生自爲兒童時習見其父兄之誨如此因恬不以爲愧而安受其空虗無實之名内以傲其父兄外以驕其閭里終身不知自力以至卒就小人之歸者未必不由此也故今勸諭縣之父兄有愛其子弟之心者其爲求明師良友使之究義理之指歸而習爲孝弟馴謹之行以誠其身而巳禄爵之不至名譽之不聞非所憂也何必汲汲使之俯心下首務欲因人成事以幸一朝之得而貽終巳之羞哉今兹試􅀘縣學弟子貟屬熹典領故兹勸諭各冝知悉䇿試牓喻孟子稱君子之所以教者五而答問居一焉今發䇿以觀二三子之所藴而折中之是乃古之所謂答問者非徒相與以爲䛕也自今諸生條對所問冝湛思正論於答問之際審加意焉􅀂夫朝廷之事則非草茅所冝言而師生相與之誠意亦不當數見於文字之間也二三子愼之䇿問問古之學者始乎爲士終乎爲聖人此言知所以爲士則知所以爲聖人矣今之爲士者衆而求其至於聖人者或未聞焉豈亦未知所以爲士而然耶將聖人者固不出於斯人之􅀋而古語有不足信者耶顔子曰舜何人哉予何人哉孟子所願則學孔子二子者豈不自量其力之所至而過爲斯言耶不然則士之所以爲士而至於聖人者其必有道矣二三子固今之士是以敢請問焉問建首善自京師始而逹於四方郡邑海隅障徼之逺莫不有學此三代之制與今皆然也然考其風俗之流有薄有厚有失有得則其不相逮至逺豈古今之所以學者異耶將所以學者不必異特業之有至有不至耶二三子釋菜之􅀄願陳二者之􅀃分别而審言之以觀二三子所以來之意也問孟子曰頌其詩讀其書不知其人可乎近世以學名家如海陵胡先生歐陽文忠公王文公司馬文正公蘇編禮父子程御史兄弟其立言具在二三子固嘗讀而誦之矣其於先賢聖人之遺㫖孰爲得其宗者耶願與聞之問孔子曰友其士之仁者又曰就有道而正焉又曰以友輔仁蓋學者之於師友其不可以後如此而孟子曰子歸而求之有餘師又曰君子欲其自得之必如是是豈師友之所能與哉孟子學孔子者而其立言如此豈有異㫖哉幸詳言之以觀二三子所以從事於斯者如何也問世言聖人生知安行不待學而知且能也􅀂孔子者可謂大聖人矣而曰我學不厭又曰吾十有五而志于學又曰不如丘之好學非有待於學耶抑所以學者異乎人之所謂學者耶然則夫子之所以學者果何以也至如稱顔子以好學則曰不遷怒不貳過語學者以好學則曰食無求飽居無求安敏於事而愼於言就有道而正焉至其他縱言至於學者難徧以䟽舉不識其與夫子之所以自謂者有辨耶其無辨也幸詳陳之問唐開元釋奠儀設先聖神位於堂西東向先師位其東北南向􅀄不云有像設及從祀諸子也今以當時人文章所記著考之則皆爲夫子南靣像門人亦像十子而圖其餘於壁是則開元之制施用於當時者亦無㡬耳二三子試實其所以然而斷其得失以對問聖人逺矣六經或在或亡諸子各自爲家與夫諸儒之􅀃經者又皆雜亂而無所統一士之有意於聖人者舎是三者亡以見之矣是將因是以求之耶則其絶亡者不可以屬其雜亂者又易以惑人求以自通不亦難哉或者又以爲道非言􅀃所載顧力行如何耳二者之論僕未能得其中亦諸君所冝講而思也問古以孝廉舉士今廢其科入官者一於進士與夫公卿大夫之世而巳而所以馭其行者則於參選問其葬父母與否於薦舉使舉者任其不犯入巳贓此孝廉之遺意而責之則巳恕矣然猶有不能者何也將所以厲之者非其本與抑法廢不脩而然也今欲獻言於上請以古制舉士而嚴今之法以禦其末流二三子以爲便則具其施行之語爲有司陳之問大學之序將欲明明徳於天下必先於正心誠意而求其所以正心誠意者則曰致知格物而巳然自秦漢以來此學絶講雖躬行君子時或有之而無曰致知格物云者不識其心果巳正意果巳誠未耶􅀂以爲未也則行之而篤化之而從矣以爲已正且誠耶則不由致知格物以致之而何以致然也願二三子言其所以而并以致知格物之所冝用力者爲僕一二陳之問先王之世選舉之法書其徳行道藝者起於鄊閭容或不公而唐虞以來至於成周數百年之間書傳所記無以選舉不實累其上者何耶逮至後世變而任以一切之法􅀂糊名竄書而校其一日之長者亦可謂至公矣而屬者廷議猶謂禁防少弛􅁠倖因以躐取世資者何耶問書􅁛堯平章百姓百姓昭明􅀃者以爲百姓者百官族姓云爾夫以百官族姓無不昭明則堯之所與共天職者富矣及其疇咨廷臣欲任以事則放齊稱子朱驩兠舉共工四岳薦鯀惡在其昭明也耶夫子叙書㫁自堯典將以遺萬世大法而其言􅀂此此又何耶夫子嘗稱觀人至於察其所安則人焉瘦哉帝堯之聖豈獨昧此耶以帝堯之舉而三人者􅀂此然則三代選舉之法書其徳行道藝始於鄊閭者其可盡信也耶二三子其辨明之問臺諌天子耳目之官於天下事無所不得言十餘年來用人出宰相􅀻意盡取當世頑鈍􅄝利無耻之徒以充入之合黨締交共爲姦慝乃者天子灼知其弊旣斥去之乃咨人望使任斯職又下明詔以申警之士懷􅀒所學以仕於世至此可謂得所施矣而崇論弘議未能有所聞於四方何耶今天下之事衆矣二三子試以身代諸公而任其責以爲所當言者何事爲大問官材取士之法三代尚矣漢魏以來至於晉唐郡國選舉公府辟召其法不同然上之所取乎下者其路慱故下之所學以待問者亦各有所以而不專於文藝之一長也至國朝始專以進士入官雖間設科目如所謂賢良方正慱學宏詞者然亦不過文藝而巳夫文者士之末其在君子小人無常分士或懷􅀒道徳而不能此與雖能而耻不屑就者國家安得而用之耶今誠欲復取古制施行之則二三子之意以何者爲便問漢世專門之學如歐陽大小夏侯孔氏書齊魯韓毛詩后氏戴氏禮董氏春秋梁丘費氏易今皆亡矣其僅有存者又巳列於學官其亦可以無惡於專門矣而近世議者深斥之將謂漢世之專門者耶抑别有謂也今百工曲藝莫不有師至於學者尊其所聞則斥以爲專門而深惡之不識其何􅀃也二三子陳之問泉之爲州舊矣其粟米布縷力役之征􅀊入于公者蓋有定計禄士􅅒軍自昔以來量是以爲出不聞其不足也有不足則不爲州乆矣而比年以來困竭殊甚帑藏蕭然無旬月之積二千石每至往往未及下車而惟此之問然文符益䌓縣益急民益貧財賦益屈此其故何耶諸君熟計可行之䇿無爲文詞而巳問夫子稱郊祀后稷以配天宗祀文王於明堂以配上帝夫天之與上帝其果有異耶抑不異也後世鄭康成王肅之徒各以其所聞爲􅀃甚者至流於䜟緯譎恠不可質究皆聖賢所不道其果有可取耶抑無取也恭惟國家承百王之流弊稽古禮文之事旣乆而後大備二三子考先儒之論而折中之以聖制宜有定矣陳之毋隱問經廢不講乆矣士之賢者亦或留意焉而其所以用力者則異而不同也蓋或不求甚解而篤意於近思或恃爲攷證而昧於至理務深􅆌者放宕而不根干利禄者渉獵而無本是四者之於經其得失孰甚二三子言之問漢藝文志春秋家列左氏傳國語皆出魯太史左丘明蓋自司馬子長劉子駿巳定爲丘明所著班生從而實之耳至唐柳宗元始斥外傳爲􅁋誣不槩於聖非出於左氏近世劉侍讀敞又以論語考之謂丘明自夫子前人作春秋内外傳者乃左氏非丘明也諸家之􅀃旣異而柳子之爲是論又自以爲有得於中庸二三子論其是非焉問荀子著書號其篇曰性惡以詆孟子之云性善者而曰塗人可以爲禹夫禹大聖人也語其可知之質可能之具乃在夫塗之人耳人之性也豈果爲惡哉然且云爾者何也二三子推其􅀃以告問李師錫者以書抵韓子稱其所爲不違孔子不以雕琢爲工而韓子報之曰愈將有深於是者與吾子樂之今韓子之書具在所謂深於是者果何所指而言耶問夫子講教洙泗之間三千之徒七十之賢所學者何業所習者何事其言曰二三子以我爲隱乎吾無隱乎爾所隱者復何􅀃飲水曲肱而枕之樂亦在其中矣所樂者抑又何謂耶問忠信所以進徳而夫子之所以教與夫曽子所以省其身亦無不曰忠信云者而夫子又斥言必信行必果者爲小人孟子亦謂言不必信行不必果二端異焉然則學者將何所蹈而可將不必信且果者耶則子路有欺天之失微生有乞醯之譏將必信且果耶則硜硜之號非所以飾其身也二三子其􅀭㩁之問頃與二三子從事於論語之書凡二十篇之􅀃者二三子盡觀之矣雖未能究其義如其文然不可謂未嘗用意於此也惟其逺者大者二三子固巳得諸心而施諸身矣亦可以幸教有司者耶不然則二三子之相從於此非志於道利焉而巳耳非所望於二三子也問仁之體誠深矣自孔門弟子之所以問夫子之所以答與夫後之諸子之所以筆之於書者皆未嘗同也二三子總其所論而折中之必有得矣其有以幸教問人㓜而學之壯而欲行之諸君子今日之所學他日之所以行其可得聞歟問漢大司農丞壽昌議常平之法而御史大夫望之奏以爲非是二者孰爲合於先王之意而施於當今亦孰爲冝耶二三子欲通當世之務不可以不熟察而别言之問國朝官材取士之法進士而巳雖間設科目如所謂賢良方正慱學宏詞者特以疑文隱義困於所不知如此則賢且良矣至以慱學宏詞自命而試於禮部者則又可􅀏蓋遲明裹飯掲篋而坐於省門以竢漏啓鑰而入視所命題退發篋捜之則其中古今事目次輯鱗比而亦有成章矣其平居講學專乎此甚者至於不復讀書也進士之得人巳踈闊矣而所設二科者又如此然則士有懷􅀒道藝以陸沉乎下者其􅀔必耻乎此而亦庸有不能者國家安得而用之耶二三子䇿以爲如何而可問三代學校之制自家塾黨庠遂序以至于國則有學焉其選士興賢之法父師少師之教見於周官王制禮家之􅀃者尚可考也今家塾黨庠遂序之制未立是以州縣雖有學而士之耕飬於田里者逺不能至獨城闕之子得以家居􅅒食而出入以嬉焉至其􅀘弟子貟則去留之節又一决於文藝使士之静厚原慤者以木訥見罷而偶能之者雖纎浮佻巧無不與在選中如此是學之爲教巳不能盡得可教之才而教之者又非有父師少師之齒徳也噫法之未能如古則學校之爲益亦少哉願二三子考其所聞於古而今可行者悉著于篇將摭其施行之語以觀二三子於當世之務如何也問禮云禮云玉帛云乎哉樂云樂云鍾皷云乎哉而夫子之於告朔愛其一羊而不忍去於齊忘韶至於三月而不知肉味何也抑其所以如此者其意乃有所屬而非玉帛鍾皷之謂耶然則果何所屬也幸二三子詳陳之問間者天子數下寛大詔書弛民市征口筭與夫逃賦役者之布又詔稅民毋㑹其踦羸以就成數又詔郡國毋得以羡餘來獻求幸媚恭惟聖天子所以加惠此民者可謂無不至矣外是數者亦可以議蠲復以助廣聖治之萬分者乎願與二三子預講明之以待召問而發焉問先王之世士出於田里者有黨庠遂序之教而公卿大夫之子弟則又有成均之法以飬之蓋無不學之人則無不治之官矣後世士不皆業於學校而學校所以教之者亦非復古法至於卿大夫之子弟則又有塊然未嘗讀書識字而直爲王官者如是而欲吏稱民安化行俗羙於誰責而可哉今欲使之學者必出於庠序世其禄者必出於成均而所以教之者必自洒掃應對進退以至於義精仁熟格物致知以至於治國平天下又當皆合乎先王之意不但爲文詞而巳二三子考於經以爲如之何而可也詳以著于篇無所隱問瑞應之說所從來乆如鳯凰嘉禾騶虞麟趾皆載於書詠於詩其爲瑞也章章矣而或者謂休符不于祥于其仁而巳至引白雉黄犀之屬以爲不祥莫大焉此其􅀃與詩書異矣其亦有所本耶前世祥瑞或以改元紀號或以􅀍之弦歌又或自以徳薄抑而不當凡此數者又孰爲得失耶願二三子陳之問世謂荘周之學出於老氏故其書規模本趣大略相似也至韓子退之始謂子夏之學其後有田子方子方之後流而爲荘周然則周者未嘗學老聃也至以其書之稱子方者考之則子方之學子夏周之學子方者皆不可見韓子之言何據耶又禮經記孔子之言有得於老聃者亦與今道徳上下篇絶不相似而荘生之言則實近之皆不可曉敢請問於諸君焉白鹿書堂䇿問孔子殁七十子喪楊墨之徒出孟子明孔子之道以正之而後其􅀃不得肆千有餘年諸生皆誦􅀃孔子而獨荀卿楊雄王通韓愈號爲以道鳴者然於孟子或非之或自比焉或無稱焉或尊其功以爲不在禹下其歸趣之不同旣如此而是數子者後議其前或以爲同門而異戸或無稱焉或以爲大醇而小疵而不得與於斯道之傳者其於楊墨或㣲議其失或無稱焉或取焉以配孔子其取予之不同又如此是亦必有􅀃矣本朝儒學最盛自歐陽氏王氏蘇氏皆以其學行于朝廷而胡氏程氏亦以其學傳之學者然王蘇本出於歐陽而其末有大不同者胡氏孫氏亦不相容於當時而程氏􅀹不合於王與蘇也是其於孔子之道孰得孰失豈亦無有可論者耶楊墨之􅀃則熄矣然其􅀃之流豈亦無有未盡泯㓕者耶後世又有佛老之􅀃其於楊墨之􅀃同耶異耶自楊雄以來於是二家是非之論蓋亦多不同者又孰爲得其正耶二三子其詳言之問吕伯恭三禮篇次儀禮附記上篇士冠禮冠義附士㛰禮㛰義附士相見禮鄊飲酒禮鄊飲酒義附鄊射禮射義附燕禮燕義附大射禮聘禮聘義附公食大夫禮覲禮儀禮附記下篇喪服喪服小記大傳月服問閒傳附士喪禮旣夕禮士虞禮喪大記奔喪問喪曽子問檀弓附特牲饋食禮少牢饋食禮有司祭義祭統附禮記篇次曲禮内則玉藻少儀投壷深衣六篇爲一􅀋王制月令祭法三篇爲一􅀋文王世子禮運禮器郊特牲明堂位大傳與喪小記誤處多當􅁵正樂記七篇爲一􅀋經解哀公問仲尼燕居坊記儒行六篇爲一􅀋學記中庸表記緇衣大學五篇爲一􅀋以上恐有未安幸更詳之記解經凡解釋文字不可令注脚成文成文則注與經各爲一事人唯㸔注而忘經不然即湏各作一畨理㑹添却一項功夫竊謂湏只似漢儒毛孔之流略釋訓詁名物及文義理致􅀹難明者而其易明處更不湏貼句相續乃爲得體蓋如此則讀者㸔注即知其非經外之文却湏將注再就經上體㑹自然思慮歸一功力不分而其玩索之味亦益深長矣修韓文舉正例大書本文定本上下文無同者即只出一字有同字者即并出上一字疑似多者即出全句字有差互即注云某本作某某本作某二字及全句下即注首加本字後放此今按云云當從某本本同者即前云某某本後云某等本後放此字有多少即注云某本有某本無字有顛倒即注云某某字某本作某某今按以下並同史館修史例先以暦内年月日下刷出合立傳人姓名排定總目次將就題名内刷出逐人拜罷年月注於本目之下次將取到逐人碑志行狀奏議文集之屬附於本目之下各注起某年終某年次將總目内刷出收索到文字人姓名略具鄊貫履歷鏤版行下諸州曉示搜訪取索仍委轉運司專一催督每月上旬差人申送本院不得附遞恐有損失如本月内無收到文字亦仰依限差人申報置諸路申送文字格眼簿一路一扇一月一眼如有申到記當日内收附勾銷注於總目本姓名下依前例讀書之要或問程子通論聖賢氣象之别者數條子旣著之精義之首而不列於集注之端何也曰聖賢氣象髙且逺矣非造道之深知徳之至鄰於其域者不能識而辨之固非始學之士所得驟而語也鄊吾著之書首所以尊聖賢今不列於篇端所以嚴科級亦各有當焉爾且吾於程子之論讀是二書之法則旣掇其要而表之於前矣學者誠能深考而用力焉盡此二書然後乃可與議於彼耳曰然則其用力也柰何曰循序而漸進熟讀而精思可也曰然則請問循序漸進之􅀃曰以二書言之則先論而後孟通一書而後及一書以二書言之則其篇章文句首尾次第亦各有序而不可亂也量力所至約其程課而謹守之字求其訓句索其㫖未得乎前則不敢求其後未通乎此則不敢志乎彼如是循序而漸進焉則意定理明而無踈易凌躐之患矣是不惟讀書之法是乃操心之要􅀹始學者之不可不知也曰其熟讀精思者何耶曰論語一章不過數句易以成誦成誦之後反復玩味於燕間静一之中以湏其浹洽可也孟子每章或千百言反復論辨雖􅀂不可涯者然其條理疎通語意明㓗徐讀而以意隨之出入往來以十百數則其不可涯者將可有以得之於指掌之間矣大抵觀書先湏熟讀使其言皆􅀂出於吾之口繼以精思使其意皆􅀂岀於吾之心然後可以有得爾至於文義有疑衆􅀃紛錯則亦虚心静慮勿􅃍取舎於其間先使一􅀃自爲一􅀃而隨其意之所之以驗其通塞則其􅀹無義理者不待觀於他􅀃而先自屈矣復以衆􅀃互相詰難而求其理之所安以考其是非則似是而非者亦將奪於公論而無以立矣大抵徐行却立處静觀動如攻堅木先其易者而後其節目如解亂繩有所不通則姑置而徐理之此讀書之法也孟子綱領或問綱領諸􅀃孰爲要曰程子之言之要皆巳見於序􅀃矣其以藐大人聖夷惠爲非孟子語則恐其未必然也張子之言亦多可觀但未成性之語自其論易大傳而失之矣後不能悉辨也曰謝氏心性之􅀃如何曰性本體也其用情也心則統性情該動静而爲之主宰也故程子曰心一也有指體而言者有指用而言者蓋謂此也今直以性爲本體而心爲之用則情爲無所用者而心亦偏於動矣且性之爲體正以仁義禮智之未發者而言不但爲視聴作用之本而巳也明乎此則吾之所謂性者彼佛氏固未嘗得窺其彷彿而何足以亂吾之眞哉論語課㑹􅀃古之學者潜心乎六藝之文退而考諸日用有疑焉則問問之弗得弗措也古之所謂傳道授業解惑者如此而巳後世設師弟子貟立學校以群之師之所講有不待弟子之問而弟子之聴於師又非其心之所疑也汎然相與以具一時之文耳學問之道豈止於此哉自秦漢以迄今蓋千有餘年所謂師弟子者皆不過如此此聖人之緒言餘㫖所以不白於後世而後世之風流習尚所以不及於古人也然則學者欲求古人之所至其可以不務古人之所爲乎今將以論語之書與諸君相從學而惟今之所謂講者不足事也是以不敢以區區薄陋所聞告諸君諸君第因先儒之􅀃以逆聖人之所志孜孜焉蚤夜以精思退而考諸日用必將有以自得之而以幸教熹也其有不合熹請得爲諸君言之諸君其無􅀔利之急而盡心於此一有得焉守之以善其身不爲有餘推之以及一鄊一國而至於天下不爲不足熹不肖不敢以是欺諸君也講禮記序􅀃熹聞之學者慱學乎先王六藝之文誦焉以識其辭講焉以通其意而無以約之則非學也故曰慱學而詳􅀃之將以反􅀃約也何謂約禮是也禮者􅂂也謂昔之誦而􅀃者至是可踐而􅂂也故夫子曰君子􅀶學於文約之以禮顔子之稱夫子亦曰慱我以文約我以禮禮之爲義不其大哉然古禮非必有經蓋先王之世上自朝廷下逹閭巷其儀品有章動作有節所謂禮之實者皆踐而􅂂之矣故曰禮儀三百威儀三千待其人而後行則豈必簡䇿而後傳哉其後禮廢儒者惜之乃始論著爲書以傳於世今禮記四十九篇則其遺􅀃巳學而求所以約之者不可以莫之習也今柯君直學將爲諸君誦其􅀃而講明之諸君其聴之母忽易曰知崇禮卑禮以極卑爲事故自飲食居處洒掃欬唾之間皆有儀節聞之􅀂可厭行之􅀂􅃈碎而不綱然唯愈卑故愈約與所謂極崇之智殆未可以差殊觀也夫如是故成性存存而道義出矣此造約之極功也諸君其聴之毋忽新安朱熹云白鹿洞書院掲示父子有親君臣有義夫婦有别長㓜有序朋友有信右五教之目堯舜使契爲司徒敬敷五教即此是也學者學此而巳而其所以學之之序亦有五焉其别如左慱學之審問之謹思之明辨之篤行之右爲學之序學問思辨四者所以窮理也若夫篤行之事則自修身以至于處事接物亦各有要其别如左言忠信行篤敬懲忿窒慾遷善改過右修身之要正其義不謀其利明其道不計其功右處事之要巳所不欲勿施於人行有不得反求諸巳右接物之要熹竊觀古昔聖賢所以教人爲學之意莫非使之講明義理以修其身然後推以及人非徒欲其務記覧爲詞章以釣聲名取利禄而巳也今人之爲學者則旣反是矣然聖賢所以教人之法具存於經有志之士固當熟讀深思而問辨之苟知其理之當然而責其身以必然則夫規矩禁防之具豈待他人設之而後有所持循哉近世於學有規其待學者爲巳淺矣而其爲法又未必古人之意也故今不復以施於此堂而特取凡聖賢所以教人爲學之大端條列如右而掲之楣間諸君其相與講明遵守而責之於身焉則夫思慮云爲之際其所以戒謹而恐懼者必有嚴於彼者矣其有不然而或出於此言之所棄則彼所謂規者必將取之固不得而略也諸君其亦念之哉玉山講義先生曰熹此來得觀學校􅂦新又有靈芝之瑞足見賢宰承流宣化興學誨人之羙意不勝慰喜又承特設講座俾爲諸君誦􅀃雖不敢當然區區所聞亦不得不爲諸君言之盖聞古之學者爲巳今之學者爲人故聖賢教人爲學非是使人綴緝言語造作文辭但爲科名爵禄之計湏是格物致知誠意正心脩身而推之以至於齊家治國可以平治天下方是正當學問諸君肄業于此朝夕講明於此必巳深有所得不然亦湏有疑今日幸得相㑹正好商量彼此之間皆當有益時有程珙起而請曰論語多是􅀃仁孟子􅁍兼􅀃仁義意者夫子􅀃元氣孟子􅀃隂陽仁恐是體義恐是用先生曰孔孟之言有同有異固所當講然今且當理㑹何者爲仁何者爲義曉此两字義理分明方於自巳分上有用力處然後孔孟之言有同異處可得而論如其不曉自巳分上元無工夫􅀃得雖工何益於事且道如何􅀃箇仁義二字底道理大凡天之生物各付一性性非有物只是一箇道理之在我者耳故性之所以爲體只是仁義禮智信五字天下道理不出於此韓文公云人之所以爲性者五其􅀃最爲得之􅁍爲後世之言性者多雜佛老而言所以將性字作知覺心意㸔了非聖賢所􅀃性字本指也五者之中所謂信者是箇眞實無妄底道理如仁義禮智皆眞實而無妄者也故信字更不湏􅀃只仁義禮智四字於中各有分别不可不辨蓋仁則是箇温和慈愛底道理義則是箇斷制裁割底道理禮則是箇恭敬撙節底道理智則是箇分别是非底道理凡此四者具於人心乃是性之本體方其未發漠然無形象之可見及其發而爲用則仁者爲惻隱義者爲羞惡禮者爲恭敬智者爲是非隨事發見各有苗脉不相殽亂所謂情也故孟子曰惻隱之心仁之端也羞惡之心義之端也恭敬之心禮之端也是非之心智之端也謂之端者猶有物在中而不可見必因其端緒發見於外然後可得而㝷也盖一心之中仁義禮智各有界限而其性情體用又自各有分别湏是見得分明然後就此四者之中又自見得仁義两字是箇大界限如天地造化四序流行而其實不過於一隂一陽而巳於此見得分明然後就此又自見得仁字是箇生底意思通貫周流於四者之中仁固仁之本體也義則仁之斷制也禮則仁之節文也智則仁之分别也正如春之生氣貫徹四時春則生之生也夏則生之長也秋則生之收也冬則生之藏也故程子謂四徳之元猶五常之仁偏言則一事專言則包四者正謂此也孔子只言仁以其專言者言之也故但言仁而仁義禮智皆在其中孟子兼言義以其偏言者言之也然亦不是於孔子所言之外添入一箇義字但於一理之中分别出來耳其又兼言禮智亦是如此蓋禮又是仁之著智又是義之藏而仁之一字未嘗不流行乎四者之中也若論體用亦有兩􅀃蓋以仁存於心而義形於外言之則曰仁人心也義人路也而以仁義相爲體用若以仁對惻隱義對羞惡而言則就其一理之中又以未發巳發相爲體用若認得熟㸔得透則玲瓏穿穴縱橫顛倒無處不通而日用之間行著習察無不是著功夫處矣珙又請曰三代以前只是􅀃中􅀃極至孔門答問􅀃著便是仁何也先生曰􅀃中􅀃極今人多錯㑹了他文義今亦未暇一一詳􅀃但至孔門方􅀃仁字則是列聖相傳到此方漸次􅀃親切處爾夫子所以賢於堯舜於此亦可見其一端也然仁之一字湏更於自巳分上實下功夫始得若只如此草草􅀃過無益於事也先生因舉孟子道性善言必􅁛堯舜一章而遂言曰所謂性者適固巳言之矣今復以一事譬之天之生此人如朝廷之命此官人之有此性如官之有此職朝廷所命之職無非使之行法治民豈有不善天之生此人無不與之以仁義禮智之理亦何嘗有不善但欲生此物必湏有氣然後此物有以聚而成質而氣之爲物有清濁昬明之不同禀其清明之氣而無物慾之累則爲聖禀其清明而未純全則未免微有物慾之累而能克以去之則爲賢禀其昬濁之氣又爲物慾之所蔽而不能去則爲愚爲不肖是皆氣禀物慾之所爲而性之善未嘗不同也堯舜之生所受之性亦如是耳但以其氣禀清明自無物慾之蔽故爲堯舜􅀄非有所増益於性分之外也故學者知性善則知堯舜之聖非是强爲識得堯舜做處則便識得性善底規模様子而凡吾日用之間所以去人慾復天理者皆吾分内當然之事其􅀔至順而無難此孟子所以首爲文公言之而又􅁛堯舜以實之也但當戰國之時聖學不明天下之人但知功利之可求而不知巳性之本善聖賢之可學聞是􅀃者非惟不信往往亦不復致疑於其間􅀂文公則雖未能盡信而巳能有所疑矣是其可與進善之萌芽也故孟子於其去而復來迎而謂之曰世子疑吾言乎而又告之曰夫道一而巳矣蓋古今聖愚同此一性則天下固不容有二道但在篤信力行則天下之理雖有至難猶必可至况善乃人之所本有而爲之不難乎然或氣禀昬愚而物慾深固則其􅀔雖順且易亦湏勇猛著力痛切加功然後可以復於其􅀄故孟子又引商書之言曰􅀂藥弗􅉂眩厥疾弗瘳􅀂但悠悠似做不做則雖本甚易而反爲至難矣此章之言雖甚簡約然其反復曲折開曉學者最爲深切諸君更冝熟讀深思反復玩味就日用間便著實下功夫始得中庸所謂尊徳性者正謂此也然聖賢教人始終本末循循有序精粗巨細無有或遺故才尊徳性便有箇道問學一叚事雖當各自加功然亦不是判然兩事也中庸曰大哉聖人之道洋洋乎發育萬物峻極于天優優大哉禮儀三百威儀三千待其人然後行故曰苟不至徳至道不凝焉是故君子尊徳性而道問學致廣大而盡精微極髙明而道中庸温故而知新敦厚以崇禮蓋道之爲體其大無外其小無内無一物之不在焉故君子之學旣能尊徳性以全其大便湏道問學以盡其小其曰致廣大極髙明温故而敦厚則皆尊徳性之功也其曰盡精微道中庸知新而崇禮則皆道問學之事也學者於此固當以尊徳性爲主然於道問學亦不可不盡其力要當使之有以交相滋益互相發明則自然該貫通逹而於道體之全無欠闕處矣今時學者心量窄狹不耐持乆故其爲學略有些少影響見聞便自主張以爲至足不能遍觀慱考反復參驗其務爲簡約者旣蕩而爲異學之空虚其急於功利者又溺而爲流俗之卑近此爲今日之大弊學者􅀹不可以不戒熹又記得昔日曽參見端明汪公見其自少即以文章冠多士致通顯而未嘗少有自滿之色日以師友前輩多識前言往行爲事及其晚年徳成行尊則自近世名卿鮮有能及之者乃是此邦之人諸君視之丈人行耳其遺風餘烈尚未逺也又如縣大夫當代名家自其先正温國文正公以盛徳大業爲百世師所著資治通鑑等書􅀹有􅀘於學者至忠㓗公扈從北狩固守臣節不汙僞命又以忠義聞於當世諸君蓋亦讀其書而聞其風矣自今以往儻能深察愚言於聖賢大學有用力處則凡所見聞寸長片善皆可師法而况於其鄊之先逹與當世賢人君子之道義風節乎詩曰髙山仰止景行行止願諸君留意以副賢大夫教誨作成之意毋使今日之講徒爲空言則區區之望也滄洲精舎諭學者老蘇自言其􅀄學爲文時取論語孟子韓子及其他聖賢之文而兀然端坐終日以讀之者七八年方其始也入其中而惶然以慱觀於其外而駭然以驚及其乆也讀之益精而其胷中豁然以明􅀂人之言固當然者然猶未敢自出其言也歷時旣乆胷中之言日益多不能自制試出而書之巳而再三讀之渾渾乎覺其來之易矣予謂老蘇但爲欲學古人􅀃話聲響極爲細事乃肯用功如此故其所就亦非常人所及如韓退之柳子厚軰亦是如此其答李翊韋中立之書可見其用力處矣然皆只是要作好文章令人稱賞而巳究竟何預巳事却用了許多􅀊月費了許多精神甚可惜也今人􅀃要學道乃是天下第一至大至難之事却全然不曽著力蓋未有能用旬月功夫熟讀一人書者及至見人泛然發問臨時揍合不曽舉得一兩行經傳成文不曽照得一兩處首尾相貫其能言者不過以巳􅀻意敷演立􅀃與聖賢本意義理實處了無干渉何况望其更能反求諸巳眞實見得眞實行得耶如此求師徒費脚力不如歸家杜門依老蘇法以二三年爲期正􅁭危坐將大學論語中庸孟子及詩書禮記程張諸書分明易曉處反復讀之更就自巳身心上存飬玩索著實行􅂂有箇入處方好求師證其所得而訂其謬誤是乃所謂就有道而正焉者而學之成也可冀矣如其不然未見其可故書其􅀃以示來者云又諭學者書不記熟讀可記義不精細思可精唯有志不立直是無著力處只如而今貪利禄而不貪道義要作貴人而不要作好人皆是志不立之病直湏反復思量究見病痛起處勇猛􅁬躍不復作此等人一躍躍出見得聖賢所􅀃千言萬語都無一事不是實語方始立得此志就此積累功夫迤邐向上去大有事在諸君勉旃不是小事増損吕氏鄊約凡鄊之約四一曰徳業相勸二曰過失相規三曰禮俗相交四曰患難相恤衆推有齒徳者一人爲都約正有學行者二人副之約中月輪一人爲直月都副正不與置三籍凡願入約者書于一籍徳業可勸者書于一籍過失可規者書于一籍直月掌之月終則以告于約正而授于其次徳業相勸徳謂見善必行聞過必改能治其身能治其家能事父兄能教子弟能御童僕能肅政教能事長上能睦親故能擇交遊能守㢘介能廣施惠能受􅀉託能救患難能導人爲善能規人過失能爲人謀事能爲衆集事能解􅃲争能决是非能興利除害能居官舉職業謂居家則事父兄教子弟待妻妾在外則事長上接朋友教後生御童僕至于讀書治田營家濟物畏法令謹租賦好禮樂射御書數之􅀋皆可爲之非此之􅀋皆爲無益右件徳業同約之人各自進脩互相勸勉㑹集之日相與推舉其能者書于籍以警勵其不能者過失相規過失謂犯義之過六犯約之過四不脩之過五犯義之過一曰酗􅀶􅃲訟酗謂縱酒喧競慱謂賭慱財物闘謂闘毆罵詈訟謂告人罪惡意在害人誣頼争訴得巳不巳者􅀂事干􅀒累及爲人侵損而訴之者非二曰行止踰違踰禮違法衆惡皆是三曰行不恭遜侮慢齒徳者持人短長者恃强凌人者知過不改聞諫愈甚者四曰言不忠信或爲人謀事䧟人於惡或與人要約退即背之或妄􅀃事端熒惑衆聴者五曰造言誣毁誣人過惡以無爲有以小爲大靣是背非或作嘲味匿名文書及發揚人之􅀻隱無狀可求及喜談人之舊過者六曰營􅀻太甚與人交易傷於掊克者專務進取不恤餘事者無故而好千求假貸者受人􅀉託而有所欺者犯約之過一曰徳業不相勸二曰過失不相規三曰禮俗不相成四曰患難不相恤不脩之過一曰交非其人所交不限士庶但凶惡及㳺惰無行衆所不齒者而巳朝夕與之遊處則爲交非其人􅀂不得巳而暫往還者非二曰㳺戱怠惰㳺謂無故出入及謁見人止務閑適者戯謂戯􅀏無度及意在侵侮或馳馬擊鞠而不賭財物者怠惰謂不脩事業及家事不治門庭不㓗者三曰動作無儀謂進退太踈野及不恭者不當言而言及當言而不言者衣冠太華飾及全不完整者不衣冠而入街市者四曰臨事不恪主事廢忘期㑹後時臨事怠慢者五曰用度不節謂不計有無過爲多費者不能安貧非道營求者右件過失同約之人各自省察互相規戒小則密規之大則衆戒之不聴則㑹集之日直月以告于約正約正以義理誨諭之謝過請改則書于籍以俟其争辨不服與終不能改者皆聴其出約禮俗相交禮俗之交一曰尊㓜輩行二曰造請拜揖三曰請召送迎四曰慶弔贈遺尊㓜輩行凡五等曰尊者謂長於巳三十􅀊以上在父行者曰長者謂長於巳十歳以上在兄行者曰敵者謂年上下不滿十􅀊者長者爲稍長少者爲稍少曰少者謂少於巳十􅀊以下者曰㓜者謂少於巳二十􅀊以下者謂長於巳三十􅀊一本作二十歳造請拜揖凡三條曰凡少者㓜者於尊者長者􅀊首冬至四孟月朔辭見賀謝皆爲禮見皆具門狀用幞頭公服腰帶靴笏無官具名􅁓用僕頭襴衫腰帶繫鞋唯四孟通用㡌子皂衫腰帶凡當行禮而有恙故皆先使人白之或遇􅀨雪則尊長先使人論止來者此外候問起居質疑白事及赴請召皆爲燕見深衣凉衫皆可尊長令免即去之尊者受謁不報􅀊首冬至具巳名牓子令子弟報之如其服長者􅀊首冬至具牓子報之如其服餘令子弟以巳名牓子代行凡敵者歳首冬至辭見賀謝相往還門狀名繼同上唯止服帽子凡尊者長者無事而至少者㓜者之家唯所服深衣凉衫道服背子可也敵者燕見亦然曰凡見尊者長者門外下馬俟於外次乃通名凡往見人入門必問主人食否有他客否有他幹否度無所妨乃命展刺有妨則少俟或且退後皆放此主人使將命者先出迎客客趨入至廡間主人出降階客趨進主人揖之升堂禮見四拜而後坐燕見不拜旅見則旅拜少者㓜者自爲一列㓜者拜則跪而扶之少者拜則跪扶而答其半若尊者長者齒徳殊絶則少者㓜者堅請納拜尊者許則立而受之長者許則曉而扶之拜訖則揖而退主人命之坐則致謝訖揖而坐退凡相見主人語終不更端則告退或主人有倦色或方幹事而有所俟者皆告退可也後皆放此則主人送于廡下􅀂命之上馬則三辭許則揖而退出大門乃上馬不許則從其命凡見敵者門外下馬使人通名俟于廡下或􅈦側禮見則再拜稍少者先拜旅見則特拜退則主人請就階上馬徒行則主人送于門外凡少者以下則先遣人通名主人具衣冠以俟客入門下馬則趨出迎揖升堂來報禮則再拜謝客止之則止退則就階上馬客徒行則迎于大門之外送亦如之仍随其行數歩揖之則止望其行逺乃入曰凡遇尊長於道皆徒行則趨進揖尊長與之言則對否則立於道側以俟尊長巳過乃揖而行或皆乘馬於尊者則回避之於長者則立馬道側揖之俟過乃揖而行若巳徒行而尊長乘馬則回避之凡徒行遇所識乗馬皆放此若巳乘馬而尊長徒行望見則下馬前揖巳避亦然過旣逺乃上馬若尊長令上馬則固辭遇敵者皆乘馬則分道相揖而過彼徒行而不及避則下馬揖之過則上馬遇少者以下皆乗馬彼不及避則揖之而過彼徒行不及避則下馬揖之於幼者則不必下可也請召迎送凡四條凡請尊長飲食親往投書禮薄則不必書専召他客則不可兼召尊長旣來赴明日親往謝之召敵者以書簡明日交使相謝召少者用客目明日客親往謝曰凡聚㑹皆鄊人則坐以齒非士􅀋則不若有親則别叙若有他客有爵者則坐以爵不相妨者坐以齒若有異爵者雖鄊人亦不以齒異爵謂命士大夫以上今陛朝官是若特請召或迎勞出餞皆以專召者爲上客如婚禮則􅊚家爲上客皆不以齒爵爲序曰凡燕集􅀄坐别設卓子於兩楹間置大盃於其上主人降席立於卓東西向上客亦降席立於卓西東向主人取盃親洗上客辭主人置盃卓子上親執酒斟之以器授執事者遂執盃以獻上客上客受之復置卓子上主人西向再拜上客東向再拜興取酒東向跪祭遂飲以盃授賛者遂拜主人答拜若少者以下爲客飲畢而拜則主人跪受如常上客酢主人如前儀主人乃獻衆賔如前儀唯獻酒不拜若衆賔中有齒爵者則特獻如上客之儀不酢若㛰㑹􅊚家爲上客則雖少亦答其拜曰凡有逺出逺歸者則迎送之少者㓜者不過五里敵者不過三里各期㑹於一處拜揖如禮有飲食則就飲食之少者以下俟其旣歸又至其家省之慶弔贈遺凡四條曰凡同約有吉事則慶之冠子生子預薦豋第進官之属皆可賀㛰禮雖曰不賀然禮亦曰賀娶妻者盖但以物􅂇其賔客之費而巳有㐫事則弔之喪塟水火之􅀋每家只家長一人與同約者俱往其書問亦如之若家長有故或與所慶弔者不相接則其次者當之曰凡慶禮如常儀有贈物用幣帛酒食果實之属衆議量力定數多不過三五千少至一二百如情分厚薄不同則從其厚薄或其家力有不足則同約爲之借助器用及爲營幹凡弔禮聞其􅀄喪聞喪同未易服則率同約者深衣而往哭弔之凡弔尊者則爲首者致辭而旅拜敵以下則不拜主人拜則答之少者以下則扶之不識生者則不弔不識死者則不哭且􅂇其凡百經營之事主人旣成服則相率素幞頭素襴衫素帶皆以白生紗絹爲之具酒果食物而往奠之死者是敵以上則拜而奠以下則奠而不拜主人不易服則亦不易服主人不哭則亦不哭情重則雖主人不變不哭亦變而哭之􅐠禮用錢帛衆議其數如慶禮及塟又相率致􅈖俟發引則素服而送之􅈖如􅐠禮或以酒食犒其役夫及爲之幹事及卒哭及小祥及大祥皆常服弔之曰凡喪家不可具酒食衣服以待弔客弔客亦不可受曰凡聞所知之喪或逺不能往則遣使致奠就外次衣弔服再拜哭而送之唯至親篤友爲然過朞年則不哭情重則哭其墓右禮俗相交之事直月主之有期日者爲之期日當紏集者督其違慢凡不如約者以告于約正而詰之且書于籍患難相恤患難之事七一曰水火小則遣人救之甚則親往多率人救且吊之二曰盗賊近者同力追捕有力者爲告之官司其家貧則爲之􅂇出募賞三曰疾病小則遣人問之甚則爲訪醫藥貧則􅂇其飬疾之費四曰死喪闕人則助其幹辨乏財則賻贈借貸五曰孤弱孤遺無依者若能自贍則爲之區處稽其出内或聞于官司或擇人教之及爲求婚􅊚貧者恊力濟之無令失所若有侵欺之者衆人力爲之辨理若稍長而放逸不檢亦防察約束之無令䧟於不義六曰誣枉有爲人誣枉過惡不能自伸者􅀔可以聞於官府則爲言之有方略可以救解則爲解之或其家因而失所者衆共以財濟之七曰貧乏有安貧守分而生計大不足者衆以財濟之或爲之假貸置産以歳月償之右患難相恤之事凡有當救恤者其家告于約正急則同約之近者爲之告約正命直月徧告之且爲之紏集而程督之凡同約者財物器用車馬人僕皆有無相假若不急之用及有所妨者則不必借可借而不借及踰期不還及損壞借物者論如犯約之過書于籍鄰里或有緩急雖非同約而先聞知者亦當救助或不能救助則爲之告于同約而謀之有能如此者則亦書其善於籍以告鄊人以上鄊約四條本出藍田吕氏今取其他書及附巳意稍増損之以通于今而又爲月旦集㑹讀約之禮如左方曰凡預約者月朔皆㑹朔日有故則前期三日别定一日直月報㑹者所居遠者唯赴孟朔又逺者歳一􅄪至可也直月率錢具食每人不過一二百孟朔具果酒三行麵飯一㑹餘月則去酒果或直設飯可也㑹日夙興約正副正直月本家行禮若㑹族罷皆深衣俟于鄊校設先聖先師之象于北壁下無鄊校則别擇一寛閒處先以長少叙拜於東序凡拜尊者跪而扶之長者跪而答其半稍長者俟其俯伏而答之同約者如其服而至有故則先一日使人告于直月同約之家子弟雖未能入籍亦許隨衆序拜未能序拜亦許侍立􅀚禮但不與飲食之㑹或别率錢略設􅀧心於他䖏俟於外次旣集以齒爲序立於門外東向北上約正以下出門西向南上約正與齒是尊者正相向揖迎入門至庭中北靣皆再拜約正升堂上香降與在位者皆再拜約正升降皆自阼階揖分東西向立如門外之位約正三揖客三讓約正先升客從之約正以下升自阼階餘人升自西階皆北靣立約正以下西上餘人東上約正少進西向立副正直月次其右少退直月引尊者東向南上長者西向南上皆以約正之年推之後放此西向者其位在約正之右少進餘人如故約正再拜凡在位者皆再拜此拜尊者尊者受禮如儀唯以約正之年爲受禮之節退北壁下南向東上立直月引長者東靣如􅀄禮退則立於尊者之西東上此拜長者拜時惟尊者不拜直月又引稍長者東向南上約正與在位者皆再拜稍長者答拜退立于西序東向北上此拜稍長者拜時尊者長者不拜直月又引稍少者東靣北上拜約正約正答之稍少者退立于稍長者之南直月以次引少者東北向西北上拜約正約正受禮如儀拜者復位又引㓜者亦如之旣畢揖各就次同列未講禮者拜於西序如􅀄頃之約正揖就坐約正坐堂東南向約中年最尊者坐堂西南向副正直月次約正之東南向西上餘人以齒爲序東西相向以北爲上若有異爵者則坐於尊者之西南向東上直月抗聲讀約一過副正推􅀃其意未逹者許其質問於是約中有善者衆推之有過者直月紏之約正詢其實狀于衆無異辭乃命直月書之直月遂讀記善籍一過命執事以記過籍徧呈在坐各黙觀一過旣畢乃食食畢少休復㑹於堂上或􅀃書或習射講論從容講論湏有益之事不得輙道神恠邪僻悖亂之言及􅀻議朝廷州縣政事得失及􅀭人過惡違者直月紏而書之至晡乃退休致後客位咨目榮陽吕公嘗言京洛􅃱仕官與人相接皆以閑居野服爲禮而歎外郡或不能然其指深矣熹衰朽無狀雖幸巳叨誤恩許􅃱其事而前此或􅀩賔客不鄙下訪􅀄亦未敢􅃍援此例便以老大野逸自居近縁乆病艱於動作屈伸俯仰皆不自由遂不免遵用舊京故俗輙以野服從事然而上衣下裳大帶方履比之凉衫自不爲簡其所便者但取束帶足以爲禮解帶可以燕居免有拘絆􅅶繞之患脫著疼痛之苦而巳切望深察恕此病人且使窮鄊下邑得以復見祖宗盛時京都舊俗其美如此亦􅀘助風教之一端也至於筋骸攣縮轉動艱難迎候不時攀送不及區區之意亦非敢慢并冀有以容之又大幸也熹悚恐拜聞熹衰病之餘不堪拜跪􅀊時享祀巳廢其禮親舊相訪亦望察此非應受者並告權免庶㡬還答之間不至欠闕禮數而又可以免於趨避覆跌之虞千萬幸甚熹又上聞晦庵先生朱文公文集卷第七十四懷安縣儒學訓導葉暢校
