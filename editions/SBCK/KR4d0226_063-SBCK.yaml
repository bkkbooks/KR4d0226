body:
  text: 書知舊門人問答答胡伯量泳治䘮不用浮屠或親意欲用之不知當如何處且以委曲開釋爲先如不可回則又不可咈親意也李敬子􅀃居䘮欲嚴内外之限莫􅀂殯於㕔上庶㡬内外不相通周舜㢸云終䘮不入妻室雖漢之武夫亦能吾人稍知義理當不待防閑之嚴而自不忍爲矣敬子􅀃是古人殯於西堦之上設􅀝廬於庭中皆在中門之外也某舊聞風水之􅀃㫁然無之比因謀􅁙先人周旋思慮不敢輕置旣以審諸巳又以詢諸人旣􅁙之後略聞或者以爲塋竁坐向少有未安便覺􅅥然不安乃知人子之䘮親盡心擇地以求亡者之安亦未爲害然世俗之人但從時師之􅀃專以避凶趨吉爲心旣擇地之形􅀔又擇年月日時之吉凶遂致踰時不􅁙某􅀼謂程先生所謂道路窰井之􅁼固不可不避土色生物之羙固不可不擇然欲盡人子之心則再求衆山拱揖水泉環繞藏風聚氣之地至於擇日則於三日中選之至事辦之辰更以決其卜筮某山不吉某水不吉旣得山水拱揖環繞於前又考其來去之吉凶雖巳脗合又必湏年月日時之皆合其􅀃則恐不必如此不知然否伊川先生力破俗􅀃然亦自言湏是風順地厚之處乃可然則亦湏稍有形􅀔拱揖環抱無空闕處乃可用也但不用某山某水之􅀃耳某昨者營􅁙之時結屋數椽于先壠之西旣􅁙後與諸弟常居其間庶得朝夕展省且免在家人事混雜敬子以爲主喪者旣􅁙當居家蓋神巳歸家則家爲重􅀂念不能忘却令弟輩􅀫墓時一展省可也程先生論古人直是誠實處最可􅀚又以質之舜㢸云廬墓一節不合聖賢之制切不湏爲之某旣聞此二􅀃不欲更遂􅀄志日即則在家間中門外别室更常令一二弟居􅀫墳庵某時一展省未知可否墳土未乾時一展省何害於事但不湏立廬墓之名耳士虞禮記曰卒哭明日以其班祔禮記曰卒哭明日祔于祖父又曰殷練而祔周卒哭而祔孔子善殷開元禮政和禮皆曰禫而祔伊川先生横渠先生喪紀皆曰喪三年而祔温公書儀雖卒哭而祔然祔祭畢只反祖考神主於影堂仍置亡者神主於靈座此是儀禮注以爲不忍一日未有所歸則旣祔自當遷主于廟􅀂似主于靈坐以盡哀奉之意則先設祔祭又復文具不知書儀之意如何續􅀚先生復陸敎授書云吉凶之禮其變有漸卒哭而祔者漸以神事之復主于寢者猶未忍盡以事死之禮事之也又按儀禮始虞之下猶朝夕哭不奠書儀亦謂葬後饋食爲俗禮如此則几筵雖在但以朝夕哭爲猶有事生之意爾儀禮朔月奠下鄭注大祥之後則四時祭焉如此則朔奠於祭後亦似不廢未知是否某向来卒哭後旣失祔祭之禮不知可以練時權宜行之否併乞賜敎祔與遷是兩事卒哭而祔禮有明文遷廟則大戴記以爲在練􅀕之後然又云主􅀕者皆玄服又似可疑若曰禫而後遷則大祥便合徹去凡筵亦有未便記得橫渠有一􅀃今未暇檢俟後便􅀉去按禮居䘮不吊其送葬雖無明文然執紼即是執事禮亦有妨郷俗不特住吊送䘮凡親舊家有􅁻凶之事皆有所遺不知處此當如何􅁻禮固不可預然吊送之禮却似不可廢所謂禮從宜者此也居䘮月朔殷奠薦新及􅀊時常祀合與不合舉行薦新告朔吉凶相襲似不可行未葬可廢旣葬則使輕服或巳除者入廟行禮可也四時大􅀕既葬亦不可行如韓魏公所謂節詞者則亦如薦新行之可也居䘮貧窘多事哀思不能接續常存遇時節時終覺勉強不知如何思親之感發於自然但不以事奪之可也此又豈可别作道理計較而必其哀之至耶某居䘮讀禮欲忘意隨所看所見逐項編次如書儀送終禮之篇目仍取儀禮禮記朝制條法政和儀略之􅁼及先儒議論以次編入庶㡬得以維持哀思不知如何有餘力則爲之不必問人􅀂力未及即且先其功夫之急切者乃爲佳耳某始成服時㨿三禮圖温公書儀髙氏送終禮叅酌爲冠絰衰裳腰絰絞帶按禮衰麻合用生麻布今之麻布􅁼經􅁅治雖縷數不甚密然似與有事其縷無事其布之緦異不知於禮合别造生布或只隨俗用常時麻布爲之先生於此處批云􅀂能别造生布則别造可也此等處但熟考注䟽即自見之其曲折難以書尺論也然喪與其易也寜戚此等處未曉亦未害也廖庚字西仲大冶縣人有䘮服制度又按程先生定主式中尺法注云當今省尺五分弱􅀄欲用此及以裁度覺全然短㣣舜㢸云沙隨程氏尺法與今尺相近曽聞先生以爲極當其尺法巳失之矣不若且只以人身爲度某乃遵用及因讀禮見鄭氏注苴絰大絰之下云中人之扼圍九寸以今人之手約之覺得程先生之法深合古制未審先生當時特取沙隨尺法者何意續得沙隨尺法比古尺只長六寸許尺様温公有圖後人刻之於石其􅀃甚詳沙隨所据即此本也又按三禮圖所畫苴絰之制作繩一圈而圈之又似以麻横􅆞與畫繩之文不同疑與先儒所言環絰相似不諭其制又質之周丈云當只用一大繩自䘮冠額前繞向後結之或以一繩兩頭爲環别以小繩束其兩環某遂遵用然竟未能明左本在下之制近得廖丈西仲名庚所􅀞圖乃似不亂麻之本末紐而爲繩屈爲一圈相交處以細繩繋定本垂於左末屈於内似覺與左本在下之制相合然竟未知適從不知當如何未盡曉所􅀃然恐廖􅀃近之廖君􅀃每得之若相去不逺可靣扣也又按三禮圖絰之四旁綴短繩四條以繋于武周丈云就武上綴帶子四條某􅀼疑用繩者似爲宜但未知旣用繩則齊衰以下武旣用布繋絰亦當用布否此項不記今未暇檢可自詳看注䟽又周丈以苴絰著冠武稍近上處廖丈以爲繋冠於絰上絰在冠之武下二􅀃不同未知孰是絰當在武之外又按䘮服大傳苴絰大搹五分去一以爲帶書儀因論五分去一以爲腰絰然考䘮服經文只言苴絰鄭注謂在首腰皆曰絰如此則以絞帶獨小五分之一而首絰腰絰皆大搹惟士䘮有腰絰小焉之文鄭注乃謂五分去一不知當以此爲㨿否然䘮服所以緫二絰而兼言之覺無分别伏乞指誨此如道服之横襕但綴處稍高耳儀禮衰服用布有尺寸衣只到帶處此半幅乃綴於其下以接之廖􅀃是也某向借到周丈舊所録喪禮内批云先生􅀃衰服之領不比㝷常衫領用邪帛盤旋爲之只用直布一條夾縫作領如州府承局衫領然比見黃丈寺丞乃云常以此禀問先生報云如承局衫領者乃近制杜撰非古制只當如深衣直領未知是否周􅀃誤也古制直領只如今婦人之服近年禮官不曉乃改云直襕衫又於其下注云謂上領不盤遂作上領襕衫而其領則如承局之所服耳黃寺丞􅀃近是但未詳細耳又按䘮服記云祍二尺有五寸注謂凡用布三尺五寸周丈云三尺五寸布裁爲兩處左右相呇此一􅁁之祍也更用布三尺五寸如前爲之即兩􅁁全矣及觀廖丈圖􅀃則惟衰服後式有之似只用三尺五寸之布裁爲兩祍分爲左右亦相呇在後與心聲啓圖合但恐不足以掩裳之兩際如何先生批云旣分扵兩旁便足以掩裳之兩旁矣以丈尺計之恐合如廖􅀃可更詳之廖圖煩畫一本并其注釋全文録示又按書儀要絰交結處兩旁相綴白絹帶繫之使不脫周丈云以小帶綴衰服上以繫絰􅁇攷廖丈之􅀃謂以二小䋲牢綴於要絰相交處以紐繋腰絰象大帶之紐約用組也三􅀃言繋要絰不同不知孰是廖􅀃與温公之􅀃同似亦是注䟽本文可更考之又按儀禮絰五分去一以爲帶始疑帶即絞帶續又􅀚齊衰以下帶用布不用麻則布帶必難以圍量䘮服所指湏别有義但未知絞帶大小以何爲定先生批云此等小節且以意定而徐考之可也書儀謂以細䋲帶繋於其上恐指絞帶先生批非是然絞帶以爲束要絰以爲禮則絰在上矣未委然否吉禮先繋革帶如今之皮束帶其外又有大帶以申束衣故謂之紳凶服先繋絞帶一頭作環以一頭穿之而反扱於腰間以象革帶絰帶則兩頭皆散垂之以象大帶此等處注䟽言之甚詳何不熟考而逺逺来問耶女之服古禮不可考今且依書儀之􅀃可也答胡伯量䘮大記有吉祭而復􅃦之文䟽謂禫祭之後同月之内值􅁻􅀕之節行吉􅀕訖而復􅃦若不當四時􅁻􅀕則踰月􅁻􅀕乃復􅃦不審所謂吉􅀕即月享或禘祫之禮否月享無明文只􅀕法國語有之恐未足据吉􅀕者疑謂禘祫之属然亦無明據今以義起可也不然即且從大記䟽􅀃比者祥􅀕止用再忌日雖衣服不得不易惟食􅁏一節欲以踰月爲節不知如何踰月爲是忌日之變吕氏謂自曽祖以下變服各有等級聞先生於諱日亦變服不知今合如何唐人忌日服黲今不曽製得只用白生絹衫帶黲巾主式用尺程先生所謂省尺者先生以爲即温公三司布帛尺不知其制長短如何温公有一小圖刻石偶尋不見然此等但得一書爲据足矣不必屑屑較計不比聲律有髙下之差也先兄乃先人長子旣娶而死念􅁒爲之立後但旣立後則必當使之主􅀕則某之髙祖亦當祧去否旣更立主􅀕者即祠版亦當改題無疑髙祖祧去雖覺人情不安然别未有以處也家間將来小孫奉祀其􅀔亦當如此可更考之中月而禫中月而禫猶曰中一以上而祔漢書亦云間不一􅀊即鄭注虞禮爲是故杜佑亦從此􅀃但檀弓云是月禫及踰月異旬之􅀃爲不同耳今旣定以二十七月爲期即此等不湏􅃈細如此尋討枉費心力但於其間自致其哀足矣答李􅁇善孝述前此雖未識面然辱惠書知託事契而來書所喻辭氣激昻意象懇􅃀三復竦然􅀼喜公家後來之秀世不乏人也所喻數條巳得用力之端此事無它巧但就巳用力處更著功夫反復純熟自當别有見處無假它求也答李􅁇善所示疑義各以所見附于左方矣來喻甚精到但思之過苦恐心勞而生􅍚析之太繁恐氣薄而少味皆有害乎涵養踐行之功耳其餘曲折敬子元思必能言今日􅍚作執筆甚艱不容盡布答李􅁇善中間朞慘諒不易堪所示條目巳悉奉報矣幸更參攷之敬子毎稱賢者志業之羙甚恨無由相見然天所賦予不外此心而聖賢遺訓具在方􅁽苟能厲志而悉力以從事焉亦不異乎合堂同席而居矣千萬勉旃答李􅁇善嫡子巳娶無子而没或者以爲毋在宜用尊厭之例不湏備禮宗子成人而無子當爲之立後尊厭之􅀃非是嫡子死而無後當誰主其䘮􅀂巳立後則無此疑矣昨者遭䘮之􅀄服制只從俗苟簡不經深切病之今欲依古禮而改爲之如何服巳成而中改似亦未安不􅀂且仍舊政和儀六品以下至庶人無朔奠九品以下至庶人無誌石而温公書儀皆有之今當以何者爲據旣有朝奠則朔奠且遵當代之制不設亦無害但誌石或􅁒以爲乆遠之驗則略其文而淺瘞之亦未遽有􅆫偪之嫌也嘗見前輩􅀃大凡誌石湏在壙上二三尺許即它日或爲畚鍤誤及猶可及止若在壙中則巳􅁀露矣雖或見之無及於事也此􅀃有理檀弓云殷練而祔周卒哭而祔孔子善殷程張二先生以爲湏三年而祔若卒哭而祔則三年却都無事禮卒哭猶存朝夕哭若無主在寢哭於何處若如左傳杜氏注士虞禮鄭氏注所􅀃於經又未有所見不知如何周禮卒哭而祔其􅀃甚詳殷禮只有一句餘不可考孔子之時猶必有證驗故善殷今則難遽復矣况祔與遷自是兩事謂旣祔則無主在寢者似考之未詳若謂只是注文於經無見即亦未見注䟽之所以不可從者不當直以注爲不足信也檀弓旣祔之後唯朝夕哭拜朔奠而張先生以爲三年之中不徹几筵故有日􅀕温公亦謂朝夕當饋食則是朝夕之饋當終䘮行之不變與禮經不合不知如何此等處今丗見行之禮不害其爲厚而又無嫌於僣且當從之納主之儀禮經未見書儀但言遷祠版於影堂别無􅀕告之禮周舜㢸以爲昧然㱕匣恐未爲得先生前書又云諸侯三年䘮畢皆有祭但其禮亡而大夫以下又不可考然則今當何所據耶横渠􅀃三年後祫祭於太廟因其祭畢還主之時遂奉祧主歸於夾室遷主新主皆歸于其廟此似爲得體鄭氏周禮注大宗伯享先王處似亦有此意而舜弼所疑與熹所謂三年䘮畢有祭者似亦暗與之合但旣祥而撤几筵其主且當祔于祖父之廟俟祫畢然後遷耳比巳與敬子伯量詳言之更細考之可見答􅅴道士所云築室藏書此亦恐枉費心力不如且學静坐閑讀舊書滌去世俗塵垢之心始爲真有所歸􅀫耳答陳道士示及諸賢題詠之富得以厭􅀚欣幸多矣又聞更欲結茅山顚岩棲谷飲以求至約之地此意􅀹不可及但若如此則詩篇法籙聲名利養一切外慕盡當屏去乃爲有下手處又不知眞能辨此否爾與㬊亞夫淵奉别逾年思念不置然一向不聞問不知何時到家州舉得失復如何也比日冬寒爲况想佳門中尊幼一一佳適熹去􅀊到闕不及五旬而罷罷前一日送范文叔於北􅀜歸家未乆巳聞劉德脩亦罷歸矣㳺判院相見不及􅅃而别近亦聞其􅀘外不知今在何許信蜀士之多竒也亞夫别後進學如何向見意氣頗多激昻而心志未甚凝定此湏更於日用之間益加持敬工夫直待於此見得本來明德之體動静如一方是有入頭處也因䕫州江敎授便人附此託趙守轉致地逺不能多談唯千萬進徳自愛而巳與㬊亞夫長沙之别忽忽累年都不聞動静深以爲念度周卿來略知還家巳乆不審比日爲況定何如德門尊少計各平安家居爲學所進復如何也熹連年􅍚病今􅀊差勝然氣體日衰自是無復􅆠健之理所幸􅀄心不敢忘廢亦時有朋友往來講習僞學汙染令人恐懼然不得辤也周卿相見必能道此間事與所商􅃀之曲折因其歸謾附此􅁓相望之逺會靣無期唯以􅁣嘆耳與㬊亞夫一别累年都不聞動静不審比日爲況何如計且家居奉養讀書求志不必逺游以弊􅀊月也熹衰朽􅍚病更無無􅍚痛之日明年便七十矣區區僞學亦覺隨分得力但文字不能得了恐爲千載之恨耳蔡季通吕子約吳伯豐相􅁇淪謝深可傷歎眼中朋友未見有十分可望者不知亞夫比來所進如何今因建昌包君粥書之行附此奉問别後爲學功夫次第所得所疑可因其還一二報及渠􅀃欲求其醫書必能自言曲折幸略爲訪問也去年度周卿歸嘗託致意不知曾相見否劉范李游諸賢計各安健前此便中亦時得通聲問也無由會靣千萬進學自愛以慰千里相望之懐目昏燈下草草答郭子從叔雲復男子稱名然諸侯薨復曰臯某甫復恐某甫字爲可疑又周人命字二十弱冠皆以甫字之五十以後乃以伯仲叔季爲别今以諸侯之薨復云甫者乃生時少者之羙稱而非所宜也此等所記異詞不可深考或是諸侯尊故稱字大夫以下皆稱名也但五十乃加伯仲是孔頴逹􅀃据儀禮賈公彦䟽乃是少時便稱伯某甫至五十乃去某甫而專稱伯仲此􅀃爲是如今人於尊者不敢字之而曰幾丈之􅀋銘旌古者旌旣有等故銘亦有等今旣無旌則如温公之制亦適時宜不必以爲疑也重三禮圖有畫象可考然且如温公之􅀃亦自合時之宜不必過泥古禮也古者男子殊衣裳婦人不殊裳今以古人連屬之衰加於婦人殊裳之制加於男子則世俗未之嘗見皆以爲迂且恠而不以爲禮也若考得古制分明改之固善若以爲難即且從俗亦無甚害大帶申束衣革帶以佩玉佩及事佩之等䘮服無所佩旣有要絰而絞帶復何用焉絞帶正象革帶但無佩耳不必疑於用也革帶是正帶以束衣者不專為佩而設大帶乃申束之耳申重也故謂之紳主式祠版伊川主式雖云殺諸侯之制然今亦未見諸侯之制本是如何􅀂以爲疑則只用牌子可也安昌公荀氏是晋荀朂非孫氏也但諸書所載厚薄之度有誤字耳士大夫家而云㡬􅀰㡬公或是上世無官者也江都集禮晋安昌公荀氏祠制云祭版皆正側長一尺二分愽四寸五分厚五分八分大書云云今按它所引或作厚五寸八分通典開元禮皆然詳此八分字連下大書爲文故徐潤云又按不必八分楷書亦可必是荀氏全書本有此文其作五寸者明是後人誤故也􅀂愽四寸五分而厚五寸八分則側面濶於正靣矣決無此理當以集禮爲正􅀌哀子温公所稱蓋因今俗以别父母不欲混并之也且從之亦無害並有父母之䘮􅁙先輕而後重其奠也先重而後輕其虞也先重而後輕同􅁙同奠亦何害焉其所先後者其意爲如何也此雖未詳其義然其法具在不可以巳意輙增損也周制有大宗之禮乃有立適之義立適以爲後故父爲長子權其重者􅀂然今大宗之禮廢無立適之法而子各得以爲後則長子少子當爲不異庶子不得爲長子三年者不必然也父爲長子三年者亦不可以適庶論也宗子雖未能立然服制自當從古是亦愛禮存羊之意不可妄有改易也如漢時宗子法巳廢然其詔令猶云賜民當爲父後者爵一級是此禮意猶在也豈可謂宗法廢而諸子皆得爲父後乎曾子問親迎女在塗而壻之父母死如之何孔子曰女改服布深衣縞緫以趨䘮恐亦有礙開元禮除䘮之後束帶相見不行􅀄昬之禮趨䘮後事皆不言之何也趨䘮之後男居外次女居内次自不相見除䘮而後束帶相見於是而始入御開元之制必有所据矣曽子問取女有吉曰而女死如之何孔子曰壻齊衰而弔旣􅁙而除之夫死亦如之服用斬衰恐今亦難行也未見難行處但人自不肯行耳諒闇以他經考之皆以諒闇爲信黙惟鄭氏獨以爲凶廬天子居凶廬豈合禮制所引翦屏柱楣是两事柱音知主反似是從手不從木也蓋始者戸北向用草爲屏不翦其餘至是改而西向乃翦其餘草始者無柱與楣簷著於地至是乃施短柱及楣以柱其楣架起其簷令稍高而下可作戸也來喻乃於柱楣之下便云旣虞乃翦而除之似謂翦其屏而并及柱楣則誤矣諒隂梁闇未詳古制定如何不敢輙爲之􅀃但假使不如鄭氏􅀃亦未見天子不可居廬之法來喻所云不知何據恐欠子細也滕文公五月居廬是諸侯居廬之驗恐天子亦湏如此旣除服而父之主永遷於影堂耶將與毋之主同在寢耶遷主無文以理推之自當先遷也儀禮父在爲母盧履冰儀是但今條制如此不敢違耳内則云女子十有五而笄二十而嫁有故二十三年而嫁言二十三年而嫁不止一䘮而巳故鄭并云父母䘮也􅀂前遭父服未闋那得爲母三年則是有故二十四而嫁不止二十三也内則之􅀃亦大槩言之耳少遲不過一年二十四而嫁亦未爲晩也離之謂以一物隔二棺之間於槨中也魯則合並两棺置槨中無别物隔之魯衛之祔皆是二棺共爲一槨特離合之有異一棺共槨蓋古者之槨乃合衆材爲之故大小隨人所爲今用全木則無許大木可以爲槨故合􅁙者只同穴而各用槨也明器禮旣有之自不可去然亦更在斟酌今人亦或全不用也招䰟葬招䰟葬非禮先儒巳論之矣伊川􅁙􅀃其穴之次設如尊穴南向北首陪葬前爲兩列亦湏北首故葬圖穴一在子穴二在丑穴三在亥自四至七皆隨其東西而北首而丙午下獨空焉是則伊川之所謂北首者乃南向也又云昭者當南向則穆者又不可得而然也此兩節不曉所問之意恐是錯看了請更詳之昭南向穆北向是廟中祫祭之位於此論之􅀹不相􅀜實葬壙中實築甚善伊川先生葬法有謂某穴安夫婦之位坐堂上則男東而女西卧於室中則男外而女内在穴則北方而北首有左右之分而無内外之别按昬禮良席在東北上此是卧席之位無内外之别也其祖巳葬係南首其後將族葬則不可得而北首則祖墓不可復遷而昭穆易位未見後葬不可北首之意昭穆之􅀃亦不可曉祔當如鄭􅀃伊川恐考之未詳也但三年之後遷主于廟湏更有禮頃嘗論之今并録去李􅁇善問納主之儀禮經未見書儀但言遷祠版於影堂别無􅀕告之禮周舜㢸以爲昧然歸匣恐未爲得先生前書有云諸侯三年䘮畢皆有􅀕但其禮亡而大夫以下又不可考然則今當何所據耶答云橫渠􅀃三年後祫􅀕於太廟因其􅀕畢還主之時遂奉祧主歸於夾室遷主新主皆歸于其廟此似爲得禮鄭氏周禮注太宗伯享先王處似亦有此意而舜㢸所疑與熹所謂三年䘮畢有􅀕者似亦暗與之合但旣祥而撤几筵其主且當祔于祖父之廟俟祫畢然後遷耳比已與敬子伯量詳言之更細考之可見又答王晋輔云示喻卒哭之禮近丗以百日爲期盖自開元失之今從周制葬後三虞而後卒哭得之矣若祔則孔子雖有善殷之語然論語中庸皆有從周之􅀃則無其位而不敢作禮樂計亦未敢遽然舎周而從殷也况祔于祖父方是告祖父以將遷它廟告新死者以將入此廟之意巳􅀕則主復于寢非有二主之嫌也主復于寢見儀禮鄭氏注至三年之喪畢則有祫􅀕而遷祖父之主以入它廟奉新死者之主以入祖廟此見周禮鄭注及橫渠先生􅀃則祔與遷自是兩事亦不必如殷之練而祔矣禮法重事不容草草卒哭而祔不若且從温公之􅀃庶幾寡過耳卒哭以百日爲卒哭是開元禮之􅁠制非正禮也孟獻子禫縣而不樂比御而不入孔子以獻子加於人一等矣今之居喪者當以獻子爲法不可定以二十七月爲拘獻子之哀未忘故過於禮而孔子善之所論恐未然也影堂序位古者一世自爲一廟有門有堂有寢凡屋三重而墻四周焉自後漢以来乃爲同堂異室之廟一世一室而以西爲上如韓文中家廟碑有􅀕􅀄室􅀕東室之語今國家亦只用此制故士大夫家亦無一世一廟之法而一世一室之制亦不能備故温公諸家􅀕禮皆用以右爲尊之􅀃獨文潞公嘗立家廟今温公集中有碑載其制度頗詳亦是一世一室而以右爲上自可檢看伊川之􅀃亦誤昭穆之􅀃則又甚長中庸或問中巳詳言之更當細考大抵今士大夫家只當且以温公之法爲定也庶人吉凶皆得以同行士禮以禮窮則同之可也故不别制禮焉不審若然否恐當如此今有人焉其父尊信浮屠􅀂子􅀂孫皆不忍改將何時而巳恐人子之遭此勿用浮屠可也至於家舎所敬形像必湏三年而後改不知如何如此亦善答郭子從古人六禮自請期以前皆用旦親迎用昬􅀂妻家相去逺只得先一日徃假館於近次早迎歸如何只得如此主人揖壻入壻北靣而拜主人不答拜何也乃爲奠鴈而拜主人自不應答拜鄉人多先廟見舅姑然後配不知如何不是古人必三日廟見謂必宜其家中夫婦巳定意思然後可以廟見成禮之明日便當見舅姑畢方往見於女氏之父母婦至男家未敢便廟見故壻往女氏亦未敢見其父母及其家廟親戚也緊要只是温公與伊川禮男至女家温公本爲是女至男家伊川底爲是古人親迎必乗馬答葉仁父他喻已悉但平生所聞人有此身便有所以爲人之理與生俱生乃天之所付而非人力所能爲也所以凡爲人者只合講明此理而謹守之不可昬棄􅀂乃身外之事榮悴休戚即當一切聽天所爲而無容心焉其自至者亦擇其可而受之其不至者則無求之之理也此是終身立脚地位不可分寸移易孔孟所􅀃極是分明區區早從師友即幸見得此理故嘗以此自勉亦不敢不以此待人所以平生未嘗求知於人亦不欲爲朋友求知唯其一二或以貧老困厄不得其所則嘗言之然亦絶無而僅有也如吾友者於學尚可以勉而亦未爲甚貧且老而困厄之乆者故前此累承喻及皆非區區所欲聞而以方有詭僞之禁故不欲盡其言亦意賢者當黙曉也而今所喻雖􅀂小異於前似終未悉鄙意故不得巳而索言之幸試思之中夜以興痛自省察或能􅁬然一躍盡脫從前三四十年見聞染習之陋不亦快哉不亦快㢤答葉仁父示喻􅀕禮曲折府中自有古今家􅀕禮印版諸家之􅀃皆備如伊川主式亦在其間可令人置一本試詳考之即可見矣但古尺當時所傳恐或未眞今别畫一様去可更參考如不同即當以此爲定也廟中自高祖以下毎世爲一室而考妣各自爲主同匣两娶三娶者伊川則謂廟中只當以元妃配而􅁇室者祭之他所恐於人情不安唐人自有此議云當並配其􅀃見於會要可考也亦在印本古今祭禮中出妻入廟决然不可無可疑者爲子孫者只合􅀊時就其家之廟拜之􅀂相去逺則設位望拜可也此無經見但以意定如此可更與知禮者議之族祖及諸旁親皆不當祭有不可忘者亦放此例足矣諸家之禮唯韓魏公司馬温公之法適中易行今皆見印本中但品味之屬隨家豐約或不必如彼之盛而韓氏齋享一條不可用耳始祖先祖之􅀕伊川方有此􅀃固足以盡孝子慈孫之心然嘗疑其禮近於禘祫非臣民所得用遂不敢行徳厚者流光徳薄者流卑故古者大夫以下極於三廟而于祫可以及其高祖今用先儒之􅀃通祭高祖巳爲過矣其上世乆逺自合遷毀不當更祭也與王元石昨日所喻抄禮書欲俟向後整頓有序即發去莆中但不知彼中分付何人􅀧檢指授幸留數字於此詳道所以然者容并􅀉去爲幸或有餘力得爲别抄一本見􅀉􅀹幸也答孫敬甫未及識面猥辱惠書知雅志之不凡甚以爲慰所喻何君近亦得書尚恨未際然不知其與賢者向来所講爲何事也寜川師友盛言篤實者復謂誰何旣曰篤實而自知其有談玄􅀃妙之過則又何故而反疑學之有捷徑因以墮於輕易放曠之失耶凡此曲折皆所未曉更俟詳以見告然後可議也子約之言盖爲近之而主一無適者亦必有所謂格物窮理者以先後之也故程夫子之言曰􅆂飬必以敬而進學則在致知此兩言者如車兩輪如鳥兩翼未有廢其一而可行可飛者也世衰道㣲異􅀃蠭起其間盖有全出於異端而猶不失於爲巳者其他則皆飾私反理而不足謂之學矣凡此皆因來喻而及之而程子之兩言雖所未論猶將力爲賢者陳之者也敬之與否只在當人一念操舎之間而格物致知莫先於讀書講學之爲事至於讀書又必循序致一積累漸進而後可以有功也反復來書覺有俊氣顧恐於此有不屑耳誠能折節而屈首於斯焉其必有以得之矣近思録中橫渠夫子所論讀書次第最爲精密試一考之當得其趣使還布此薄冗不暇他及答孫敬甫便中􅄪辱手示欣審比日侍履佳慶所諭爲學本末甚詳乃悉前書所謂世道衰㣲異言蠭出其甚乖刺者固巳䧟人於犯刑受辱之地其近似而小差者亦足使人支離繳繞而不得以聖賢爲歸歧多路惑甚可懼也願且虚心徐􅀚古訓句觧章析使節節通透段段爛熟自然見得爲學次第不湏别立門庭固守死法也来人云往昭武不復俟報章今遇此便途中草草奉報未能究所􅁒言正逺惟以時自愛答孫敬甫熹歸来粗遣但今夏一病狼狽殊甚辤職請老皆未得如所􅁒加以肓廢不可􅀚書頗以爲撓耳示喻爲學之意甚善甚善但敬之一字乃學之綱領湏更於此加遇使有所據依以爲致知力行之地乃佳耳大學向来改處無甚緊要今謾往一本近看覺得亦多未親切處乃知義理亡窮未易以淺見窺測也天台朋友有趙師䢼主簿者􅀹佳宣城亦有可與共學者否耶答孫敬甫熹衰病年例春夏湏一發今年發遲者此衰年老態􅁒死之漸亦不足恠也祠官雖幸得請然時論洶洶未有寕息之期賤迹盖未可保然姑使無愧於吾心則可巳它非智慮所能避就也所喻困胷次隱㣲之病而知心之不可不存此意甚善要之持敬致知實交相發而敬常爲主所居旣廣則所向坦然無非大路聖賢事業雖未易以一言盡然其大槩似恐不出此也年來多病杜門閑中見得此意頗端的故樂以告朋友也所論至善之意甚善其終烈文一章􅀹有力如陸氏之學則在近年一種浮淺頗僻議論中固自卓然非其儔匹其徒傳習亦有能脩其身能治其家以施之政事之間者但其宗㫖本自禪學中來不可揜諱當時若只如晁文元陳忠肅諸人分明招認著實受用亦自有得力處不必如此隱諱遮藏改名換姓􅁒以欺人而人不可欺徒以自欺而自䧟於不誠之域也然在吾輩湏但知其如此而勿爲所惑若於吾學果有所見則彼之言釘釘膠粘一切假合處自然解拆破散收拾不来矣切勿與辨以起其紛拏不遜之端而反爲卞莊子所乗也少時喜讀禪學文字見杲老與張侍􅀰書云左右旣得此欛柄入手便可改頭換靣却用儒家言語􅀃向士大夫接引後來學者其大意如此今不盡記其語矣後見張公經觧文字一用此䇿但其遮藏不密索漏露處多故讀之者一見便知其所自來難以純自託於儒者若近年則其爲術益精爲􅀃浸巧抛閃出沒頃刻萬變而幾不可辨矣然自明者􅀚之亦見其徒爾自勞而卒不足以欺人也但杲老之書近見藏中印本却無此語疑是其徒巳知此陋而隂削去之然人家必有舊本可考偶未暇㝷訪也近得江西一後生書有兩語云瞚目扼腕而指本心奮髯切齒而談端緒此亦甚中其郷學之病然亦巳戒之姑務自明毋輕議彼矣信筆不覺縷縷切勿輕以示人又如馬伏波之譏杜季良也所論太極之􅀃亦爲得之然此意直是要得日用之間厚自完養方有實受用處不然則只是空言而反爲彼瞚目切齒者所􅀏矣切宜深戒不可忽也南康語孟是後来所定夲然比讀之尚有合改定處未及下手義理無窮玩之愈乆愈􅁴有􅀃不到處然又只是目前事人自當靣蹉過也大學亦有刪定數處未暇録去今只校得詩傳一本并新刻中庸一本與印到程書􅀕禮并往所􅀉楮劵適足無餘詩及中庸乃買見成者故􅁓不佳然亦不閡翻閱也毀板事近復差緩未知何謂然進卷之毀不可謂無功但巳入人心深所毀者抑其外耳所詢䕃􅀘事實難處然官年實年之􅀃朝廷亦明知之故近年有引實年乞休致者而朝廷以官年未滿却之不知亦可前期審之於省曹否耶答孫敬甫所示大學數條皆極精切由是充之使存養講學之功各盡其極更在勉之而巳然大學所言格物致知只是􅀃得箇題目若􅁒從事於其實湏更􅀶考經史參稽事變使吾胷中廓然無毫髪之疑方到知止有定地位不然只是想象箇無所不通底意象其實未必通也近日因脩禮書見得此意頗分明又見得前賢讀書窮理非不精詣而於平常文義却有牽強費力處此猶是心有未虚氣有未平而􅁒速之意勝也可不戒哉可不戒哉如来喻作新民一條亦頗覺有傷巧處恐作傳者􅀄無此意大抵此傳皆是信手拈來自然貫穿親切諦當無許多安排也所擬格物一條亦似傷冗頃時蓋嘗欲效此體以􅀘其闕而不能就故只用巳意爲之蓋無驅市人以􅀾之才只得用趙人也所論聽訟之􅀃則甚善向亦嘗有此意而未及言蓋毎不能無媿於此如所云南康田訟之􅁼是巳然此事今亦不記不知當時曲折如何恐或别有􅀃也易傳􅀄以未成書故不敢出近覺衰耄不能復有所進頗欲傳之於人而􅀻居無人寫得只有一本不敢逺􅀉俟旦夕抄得却附便奉􅀉但近縁僞學禁嚴不敢從人借書吏故頗費力耳答孫敬甫所論才􅀃存養即是動了此恐未然人之一心本自光明不是死物所謂存養非有安排造作只是不動著他即此知覺烔然不昧但無喜怒哀樂之偏思慮云爲之擾耳當此之時何嘗不静不可必待冥然都無知覺然後謂之静也去年嘗與子約論之渠信未及方此辨論而忽巳爲古人深可歎恨今録其語謾往一觀深體味之便自可見也又論誠意一節極爲精宻但如所論則是不自欺後方能自慊恐非文意蓋自欺自慊两事正相抵背􅂊不自欺即其好惡真如好好色惡惡臭只爲求以自快自足如寒而思衣以自温飢而思食以自飽非有牽強苟且姑以爲人之意􅂊不如此即其好惡皆是爲人而然非有自求快足之意也故其文曰所謂誠其意者毋自欺也而􅁇之曰如惡惡臭如好好色即是正言不自欺之實而其下句乃云此之謂自慊即是言如惡惡臭好好色便是自慊非謂必如此而後能自慊也所論謹獨一節亦似太􅀃開了湏知即此念慮之間便當審其自欺自慊之向背以存誠而去僞不必待其作姦行詐干名蹈利然後謂之自欺也小人閒居以下則是極言其弊必至於此以爲痛切之戒非謂到此方是差了路頭處也其餘文義則如所􅀃推䆒發明皆巳詳密但以上两節當更深考之則首尾該貫無遺恨矣然此工夫亦湏是物格知至然後於此有實下手處不可只以思索議論爲功而巳也此叚章句或問近皆畧有脩改見此刋正舊版俟可印即􅀉去但難得便或只􅀉輔漢卿令其轉逹也正命之􅀃乃是平日脩身謹行經常之法􅀂到殺身成仁捨生取義處豈可以其不得正命而避之乎至於近世前軰有大名節者其處心行事之得失雖非後進所敢輕議然其與聖賢做處有不同者亦湏識得不可依違苟且囬互而曲從也又如所論銷破供帳之􅁼果是好士大夫决不如此亦不待問而明但恐亦有踈略不以爲事而失照􅃹者則不可知今亦不當便以此責人但自家所處不當如此耳父妾之有子者禮經謂之庶母死則爲之服緦麻三月此其名分固有所係􅀄不當論其年齒之長少然其爲禮之隆殺則又當聽從尊長之命非子弟所得而專也隂陽家􅀃前軰所言固爲正論然恐幽明之故有所未盡故不敢從然今亦不湏深考其書但道路所經耳目所接有數里無人煙處有欲住者亦住不得其成聚落有宅舎處便湏山水環合畧成氣象然則欲掩藏其父祖安處其子孫者亦豈可都不㨂擇以爲乆逺安寜之慮而率意爲之乎但不當極意過求必爲富貴利逹之計耳此等事自有酌中恰好處便是正理世俗固爲不及而必爲高論者似亦過之也朋友之喪古經但云朋友麻則如弔服而加麻絰耳然不言日數至於祭奠則温公􅀃聞親戚之䘮者當但爲位哭之不當設􅀕以其神靈不在此也此其大槩如此亦當以其厚薄長少而爲之節難以一定論也小詞前軰亦有爲之者顧其詞義如何􅀂出於正似無甚害然能不作更好也答孫仁甫自任未見顔色辱書甚寵豈以賢兄嘗有講論之舊而有取於其言耶甚媿且感不勝言也所論今世講學之士愈衆而聖人之道愈隳此切至之論也然又有謂不必王道之行而天下之治可立而待者則恐賢者所講之學非聖人之學亦無恠其講者愈衆而道愈隳也大抵天之生物便有常性方寸之間萬善皆足聖人於此不過敎人保養發揮先成諸巳而後及於物耳故聖人巳逺而萬世之下祖述其言能出於此者乃爲得其正綂其過之者則爲墮於老佛之空虚其不及乎此者則爲管晏爲申啇又其毎下者則不自知其淪於盗賊之行而猶欲自託於講學其亦誤矣道之隳也不亦冝乎賢兄近書所論似有端緒想暇日相與評之固宜漸有定論母爲乆此倀倀也便還病倦草草答孫仁甫奉告反復其詞又知賢者英邁之氣有以過人而慮其不屑於下學且將無以爲入德之階也夫人無英氣固安於卑陋而不足以語上其或有之而無以制之則又反爲所使而不肯遜志於學此學者之通患也所以古人設敎自洒掃應對進退之節禮樂射御書數之文必皆使之抑心下首以從事於其間而不敢忽然後可以消磨其飛􅀭倔強之氣而爲入德之階今旣皆無此矣則唯有讀書一事尚可以爲攝伏身心之助然不循序而致謹焉則亦未有益也故今爲賢者計且當就日用間致其下學之功讀書窮理則細立課程柰煩著實而勿求速解操存持守則隨時隨處省覺収斂而母計近功如此積累做得三五年工夫庶㡬心意漸馴根本粗立而有可據之地不然終恐徒爲此氣所使而不得有所就也只如所問舜及東漢二事想亦出於一時信筆之所及非思之不得積其憤悱而後發也所與子約書曽得其報否不知其􅀃云何後便略報及也答余正甫辱書相與之義甚厚而陳義又甚髙三復感歎不知所言然嘗􅀼謂天下之理萬殊然其歸則一而巳矣不容有二三也知所謂一則言行之間雖有不同不害其爲一不知其一而強同之猶不免於二三况遂以二三者爲理之固然而不必同則其爲千里之謬將不俟舉足而巳迷錯於庭戸間矣故明道先生有言經解有不同處不妨但􅂃要處不可不同耳此言有味也所示中庸大學諸論固足以見用力之勤者然足下不以僕爲愚方且千里移書以開講學之端而先有以脅之曰是不可同同即且爲荆舒以禍天下則僕尚何言㢤姑誦其所聞如前者足下儻有意而往復焉則猶將􅁇此以進也答余正甫受弔去􅀊北使弔􅀕君臣皆衰服受之殯宫但辭日適當南内問安之日遂即其處吉服受之不知何故如此又聞頃時髙宗之䘮王丞相必􅁒歸南内見使人㑹有力爭之者遂不果未聞正衙受弔之􅀃不知何從得之也短䘮漢文葬後三易服三十六日而除固差賢於後世之自始遭䘮便計二十七日而除者然大者不正其爲得失不過百歩五十歩之間耳此亦不足論也如楊敬仲之􅀃未嘗見其文字但見章䟽以此詆之私􅀼以爲敬仲之􅀃固未得爲合禮然其賢於今世之以朱紫臨君䘮者逺矣向見孝宗爲髙宗服旣葬猶以白布衣冠視朝此爲甚盛之德破去千載之謬前世但爲人君自不爲服故不能復行古禮當時既是有此機㑹而儒臣禮官不能有所建明以爲一代之制遂使君服於上而臣除於下因陋踵訛至於去􅀊則大行在殯而孝宗所服之服亦不復講深可痛恨故熹嘗有文字論之巳蒙降付禮官討論然熹既去國遂不聞有所施行不知後来竟如何也今詳來喻􅁒以襴幞居䘮而易皂衫爲禫固足以爲復古之漸然襴幞本非䘮服而羔裘玄冠又夫子所不以弔者是皆非臣子所以致哀於君父之服也􅀼謂當如孝宗所制之禮君臣同服而略爲區别以辨上下十三月而服練以祥二十五月而服襕幞以禫二十七月而服朝服以除朝廷州縣皆用此制燕居許服白絹巾白凉衫白帶選人小使臣旣祔除衰而皂巾白涼衫青帶以終䘮庶人吏卒不服紅紫三年如此綿蕝似亦允當不知如何􅀄䘮便當制古䘮服以臨别制布幞頭布公服布革帶以朝乃爲合禮姨舅姨舅親同而服異殊不可曉禮傳但言從母以名加也然則舅亦有父之名胡爲而獨輕也來喻以爲從毋乃毋之姑姉妹而爲媵者恐亦未然盖媵而有子自得庶毋之服况媵之數亦有等差不應一女適人而一家之姑姉妹皆從之且禮又有從毋之夫之文是則從毋固有嫁於他人而不從毋來媵者矣若但從者當服小功則不知不從者又當服何服也凡此皆不可曉難以強通􅀂曰姑守先王之制而不敢改易固爲審重然後王有作因時制宜變而通之恐亦未爲過也嫂叔􅀂如來喻則嫂叔之服有二弔服加麻一也兄弟妻降一等二也不知二者將孰從乎又所謂兄弟同居者乃爲小功以下即不知此降一等者之夫又是何兄弟也凡此於禮文皆有未明不知何者爲是幸更熟考詳以見喻也魏元成加服􅀚當時所加曽祖之服仍爲齊衰而加至五月非降爲小功也今五服格仍遵用之雖於古爲有加然恐亦未爲不可也徴奏云衆子婦舊服小功今請與兄弟之子婦同服大功其加衆子婦之小功與兄弟之子婦同爲大功按儀禮自無兄弟子婦之文不知何據乃爲大功而重於庶婦􅀼謂徴意必以衆子與兄弟之子皆朞而其婦之親踈倒置如此使同爲一等之服耳亦未見其倒置人倫之罪也嫂叔之服先儒固謂雖制服亦可然則徴議未爲大失但以理論外祖父母止服小功則姨與舅自合同爲緦麻徴反加舅之服以同於姨則爲失耳抑此増損服制􅀂果非是亦自只合坐以輕變禮經之罪恐與失節事讎自不相湏也蓋人之資禀見識不同或明於此而暗於彼或得於彼而失於此當取節焉不可株連蔓引而累罪併贓也大夫之妾此叚自鄭注時巳疑傳文之誤今攷女子子適人者爲父及兄弟之爲父後者巳見於齊衰期章爲衆兄弟又見於此大功章唯伯叔父母姑姊妹之服無文而獨見於此則當從鄭注之􅀃無疑矣爲夫之姊妹長殤兄弟姊妹不可偏舉恐是如此神坐上右漢儀后主在帝之右不知見於何處􅀂只是後漢志注中所引漢舊儀則與史之正文不同恐不足爲據史記禘祫處皆云太祖東向昭南向穆北向而舊儀獨云髙皇帝南向髙后右坐昭西向穆東向恐是妄􅀃􅀂别有據則又未可知也但禮云席南鄉北向以西方爲上東向西向以南方爲上則是東向南鄉之席皆上右西向北向之席皆上左也今􅀕禮考妣同席南向則考西妣東自合禮意開元釋奠禮先聖東向先師南向亦以右爲尊與其所定府君夫人配位又不相似不知何也大率古者以右爲尊如周禮云享右􅀕祀詩云旣右烈考亦右文母漢人亦言無能出其右者是皆以右爲尊也又若今􅀕禮一堂之上祖西考東而一席之上考東妣西則舅婦常聮坐矣此似未便也南首按士䘮禮飯章鄭注云尸南首至遷柩于祖乃注云此時柩北首及祖又注云還柩郷外則是古人尸柩皆南首唯朝祖之時爲北首耳非温公創爲此􅀃也若君臨之則升自阼階西郷撫尸當心是尸之南首亦不爲君南靣弔而設也又史記背殯棺之􅀃按索隱謂主人不在殯東將背其殯棺立西階上北靣哭是背也天子乃於階上南靣而弔也正義又云殯宫在西階也天子弔主人背殯棺於西階南立北靣哭天子於阼階北立南面弔也按此二􅀃則是設北靣者子北靣耳非尸北靣也孟子此間所有大官本孟子皆作比字注中亦作比方殊不可曉然孟子古注亦有與正文相背者如士憎兹多口正文増字從心而注訓增爲益則是謂當從土矣至其下文引詩皆有愠字又似觧増字爲憎惡之意是注亦不足爲慿也但此比字正文與注皆同而無文理恐是一處先誤而後人并改以從之耳今不可考但㝷其義理當作此字無疑也迸四惡迸屏通用來喻得之舊亦嘗見此碑但不知如此推􅀃耳記今所定例傳記之附注者低一字它書低二字禮記則以篇名别之記之可附經者則附于經不可附者則自仍舊以􅀘經文之缺亦有巳附於經而又不􅁒移動舊文者則兩見之不知此例如何答余正甫某昨謂禮經闕略不無待於後人不可謂古經定制一字不可增損来喻以爲若遽増損恐啓輕廢禮經之弊熹昨来之意但謂今所編禮書内有古經闕略處湏以注䟽􅀘之不可專任古經而直廢傳注耳如子爲父下便合附以嫡孫爲祖後及諸侯父有廢疾之􅀋其有未安則亦且當論其所疑别爲一書以俟制作之君子非謂今日便􅁒筆削其書也如姨舅嫡婦庻婦兄弟子之婦之服之􅀋古經固未安魏公之論亦有得失然遂以爲慮啓廢經之弊而不敢措一詞於其間則亦非通論矣居䘮朝服麻冕乃是􅀕服顧命用之者以其立後継統事干宗廟故也受􅁽用之者以其在廟而凶服不可入故也舊􅀃以廟門爲殯宫之門不知是否若朝服則古者人君亮隂三年自無變服視朝之禮第不知百官緫巳以􅃪􅃁宰􅃁宰百官各以何服涖事耳想不至便用玄冠黒帶也後世旣無亮隂緫巳之事人主不免視朝聦政則豈可不酌其輕重而爲之􅁠制乎又況古者天子皮弁素積以日視朝衣冠皆白不以爲嫌則今在䘮而白布衣冠以臨朝恐未爲不可但入太廟則湏吉服而小變耳䘮服外親毋黨妻黨之親者只有一重不見有旁推者熹昨以前者所喻以從毋爲姨毋之爲姪娣而隨毋来嫁者故引禮有從毋之夫之文是則從毋固有嫁於他人而不從毋來媵者矣若但從者當服小功則不知不從者又當服何服也盖以疑前喻之不然非謂從毋之夫當有服也今來喻乃如此益非所疑之意矣幸更詳之昨來所喻云魏元成以兄弟子之婦同於衆子婦爲倒置人倫者今又見喻云禮經大抵嚴嫡故重衆子婦不得伉嫡故殺之世父母叔父母與兄弟之子服均於朞則爲旁尊而報服是不當混於衆子子婦也禮經􅃊嫡故儀禮嫡婦大功庶婦小功此固無可疑者但兄弟子之婦則正經無文而舊制爲之大功乃更重於衆子之婦雖以報服使然然於親䟽輕重之間亦可謂不倫矣故魏公因太宗之問而正之然不敢易其報服大功之重而但升嫡婦爲朞乃正得􅃊嫡之義升庶婦爲大功亦未害於降殺之差也前此来喻乃深譏其以兄弟子婦而同於衆子婦爲倒置人倫而不察其實乃以衆子婦而同於兄弟子之婦也熹前所考固有未詳所疑固有未盡而今承來喻又如此亦非熹所以致疑之意也幸更詳之作傳者曰子夏雖未知其真然以今日視之相去二千載孰愈傳者之去周只六七百年耳熹之􅀄意但恐鄭􅀃爲是耳非欲直廢傳文也然便謂去古近者必是而逺者必非則恐亦不得爲通論矣神座尚右古人設席夫婦同几恐不當引後漢各爲帳坐之禮爲證況其所注自與正史本文不同耶又如下條席南向北向以西方爲上東向西向以南方爲上鄭氏旣以上爲席端則考坐在席端妣坐在席末於禮爲順今室中東向之位配位在正位之北亦自有明文也南首必謂尸當北首亦無正經可考只喪大記大歛陳衣君北領大夫士西領儀禮士南領以此推之恐國君以上當北首耳然不敢必以爲然􅀂無他證論而闕之可也答余正甫亡狀黜削乃分之宜唯是重貽朋友羞辱殊不自安耳禮書後来區别章句附以傳記頗有條理王朝數篇亦頗該備只䘮􅀕兩門巳令黃壻携去依例編纂次第非乆􅀉來首尾便略具矣但其間㣲細尚有漏落傳寫訛舛未能盡正更湏費少功夫而附入䟽義一事用力􅀹多亦一靣料理分付浙中朋友分手爲之度湏年􅀊間方得断手也不知老兄所續脩者又作如何規模異時得􅀉示參合考校早成定本爲佳若彼此用功巳多不可偏廢即各爲一書相輔而行亦不相妨也答余正甫示喻編禮并示其目三復歎仰不能巳前此思慮安排百端終覺未穩今如所定更無可疑雖有少倒置處如弟子職曲礼少儀不居書首之􅀋然亦其􅀔如此無可柰何也䘮􅀕二禮别作兩門居􅀖國王朝之後亦甚穩當前此疑於家􅀖更無安頓處也其間只有一二小小疑處恐所取太􅄂其間雜有偽書如孔叢子之􅀋又如國語家語雖非偽書然其詞繁冗恐反爲正書之累又如不附周禮如授田地政等目若不取周禮而􅄂取何休等􅀃恐無綱領是乃名尊周禮而實貶之設使便倣朝事篇亦恐在後而非其序此爲大矛盾處更告詳之又如不附注䟽異義如嫡孫爲祖之􅀋云􅁒以俟學者以三隅反如此則何用更編此書任其縱􅀚而自得可也此亦一大節目當試思之其他些小俟草呇成徐議未晚此二大節却湏先定將来剪貼費力又是一畨功夫也所喻買書以備剪貼恐亦不濟事盖嘗試爲之大小髙下旣不齊等不免又冩一畨不如只就正本籖記起止直授筆吏寫成之爲快也又脩書之式只可作草卷䟽行大字􅁒可添注毎叚空􅁓一行以備剪貼只似公案摺疊成呇逐卷各以􅁓索穿其腰背史院修書例如此取其便於改易也此其大略也始者唯患未有人可分付如來書所喻二人者其一􅀄不相熟其一恐亦未免顧慮道學之累近忽得劉貴溪書欣然肯爲承當此是大竒特事豈非天相此書之窮而􅁒大振發之乎今以此書託渠奉􅀉然渠亦只􅀊杪當代從人不可不早過彼也此間有詹元善大卿舊爲周禮學今亦甚留意見禮目之書甚嘆伏極􅁒一見而私居無力不能致甚以爲恨也但渠亦好國語等書熹􅀼以爲唯周禮爲周道盛時聖賢制作之書若此􅀋者皆衰周末流文字正子貢所謂不賢者識其小者其間又自雜有一時􅆫􅀼之禮益以秉筆者脂粉塗澤之謬詞是所以使周道日以下衰不能振起之所由也至如小戴􅀕法首尾皆出魯語以爲禘郊祖宗皆以其有功於民而祀之展轉支蔓殊無義理凡此之􅀋棄之若可惜而存之又不足爲訓故小戴殊别其文不使相近讀者猶不甚覺豈亦有所病於其言歟又如􅀕法所記廟制與王制亦小不同不知以何爲正此􅀋非一更望精擇而審處之盖此雖止是繤述未敢決然去取然其間輕重予奪之微意亦不可全鹵莾也􅀼意一種繁冗破碎如國語等及賈子篇之􅀋假託不真如孔叢之􅁼今都且寫入􅀋將來却别作一外書以􅀵之庶幾稍有甄别不至混亂􅂉今寫淨本時此等可疑者便與别編却依正篇次序排次使足相照亦自省力更在雅意裁決也大學中庸等篇不必寫注䟽其他有度數者不可無也此間今夏整頓得數篇今雖多不入􅀋然曲禮玉藻保􅀓等學禮一條最有功所􅁵析亦頗詳細又小正月令校得頗詳小正恐湏如此寫方見經傳分明不可以其非古而合之也教法及他篇恐亦或有可取者今并附往凡未粘背者皆是此法最不善故前有摺疊作呇之􅀃又吕芸閣書及潘恭叔趙致道所編今亦并往恐亦可備采擇吕書甚精潘趙互有得失又儀禮之記零卷恐可暫時粘綴今亦附去别各有目零卷巳無用餘者用畢可附來也其他所湏文字建翁必能爲轉借如有闕者却告示喻當悉力爲辨去若前書所要剪貼諸書必􅁒得之亦可致也答呉元士來教云凡樂黄鍾爲宫太蔟爲啇姑洗爲角林鍾爲祉南吕為羽此五者聲律之元也今之五聲獨角聲不得其正以六十律齊之乃姑洗部依行之聲耳姑洗部有五律四律合姑洗下生㽔賔部律獨依行一律合中吕上生黄鍾部律然則今之角聲雖曰依行實爲中吕中吕而下正合還宫之次是以名爲中吕宫而古名清角者以依行本屬姑洗而清於姑洗故謂之清角内㽔賔二字當作􅀿鍾恐是筆誤然兩本皆同更望詳之又曰姑洗一聲十徽律在徽前應在律後者中吕聲髙不能生黄鍾部第一律生黄鍾部第一律者姑洗部之依行也依行爲宫生黄鍾部包育爲祉包育生林鍾部謙待爲啇謙待生大蔟部未知爲羽未知生南吕部南吕爲角然則當十徽者正依行宫也十徽以依行爲應故姑洗律在徽前序或然也今詳此論角聲不得其正發明精到前此所疑皆釋然矣但依行之􅀃則凡十二律皆自黃鍾三分損益上下相生以極乎中吕而以琴考之自龍齦以下至七徽之東凡十二律之位其逺近踈密徃來相生亦與律寸符合京房雖増爲六十律然亦十二正律相生巳徧然後乃生執始係第十三律以至依行係第五十三律遂生包育以極乎南事而終焉其序正與禮運正義六十調同但自黄鍾右旋歷應無南夷林蕤中姑夾太大以爲諸宫之次方其未遍十二律以及中宫之時正律不生子律而琴自南吕上生姑洗亦未見其有不合而湏變以爲子律也今曰琴之角聲乃姑洗部之依行則未知其何自而來忽破此例且將來下生之時不知其將復爲應鍾耶抑遂爲包育也復爲應鍾則數不合便爲包育則從此抺過姑洗以下八正律依行以前四十子律皆成無用矣若曰用正律時自未應遽用子律自無射爲宫之後方用執始以下子律則中吕爲宫又自用内􅀒子律而生黄之分動以下四律􅀄不用依行也至於太蔟之形晋爲宫乃夷汗爲祉依行爲商包育爲羽謙待爲角則是依行未嘗爲中吕之宫且其短長雖若鄰於中吕而其分部實居姑洗亦不得而應於十徽也凡此反復求之竟未之得偶别思得一􅀃具於後段中宮調􅀃中更望垂教来教云古黃鍾今慢角調三正角姑洗中聲古清角今正宫亦名中吕宫三清角中吕中聲又曰若下其角聲於大弦十一徽而取其應則可以復古之正調矣今詳此􅀃慢角三爲姑洗者從大弦十一徽調之而應其弦緩也清角三爲中吕者從大弦十徽調之而應其弦急也以此推之則王侍􅀰所􅀃直以第一弦爲中吕者清角法也不知其􅀃是如此否其間尚有未曉者别見後叚古黃鍾宫調亦曰慢角今詳來教旣曰古黃鍾宫調則此一均正是黃鍾爲宫正聲之調而琴中聲氣之元也又曰今謂之慢角調則是今世猶有此調也然不知今之琴曲何者爲此調何以世俗都不行用而唯以中吕爲宫也且旣知其誤則改而正之似無難者今長者雖知其然而猶未免有傳習之乆莫之能改之歎則又似有未易改者此又何也又此但以見行中吕宫調緩其一弦以爲正角則其餘弦之相應者恐亦湏有差舛不知合與不合并行改易若不改易而但抑按以求其合旣謂之黄鍾正宫又似不當如此此皆未曉更望指喻中吕宫調亦曰正宫亦曰清角今詳来教此但以古黃鍾正調緊第三弦之散聲而因以爲宫耳雖不得姑洗正角之位然角聲所占地位甚廣自十一徽之西以盡乎九徽之東皆角聲之位也今既不循常而􅁒緊其聲則於其中雖移一律􅀄亦不岀本聲之位不必更以京房子律推之強改姑洗之依行使屬中吕然後爲得也但旣以第三弦爲宫則其下即便可就按第六弦黃清以爲祉四弦林鍾爲商七弦太清爲羽五弦南吕爲角皆應於十徽其散聲則自爲祉羽官商如故其上兩弦則聲濁而勝於本宫故不入調而以爲應宫應祉商應羽散聲自爲宫啇來教謂以旋宫命之故曰中吕之宫者正謂此也然詳此調以中吕爲角則巳不得角聲之正以角聲爲宫則又不得宫聲之正又就少宫少商以爲祉羽而反以正宫正啇爲祉羽之應則其遷就雖巧而顚倒失正亦甚矣以此􅀼意􅂉非古樂旋宫正法但不知其自何時而變耳然當時若且私行此調而不廢本曲則人猶得以識其是非今乃反以所變爲正宫而本曲遂不可見則今之所謂琴者非復古樂之全明矣故東坡以爲古之鄭衞豈亦有見於此耶旋宫諸調之法以上黃鍾中吕首尾二宫其法略可見矣但其中吕一宫未有以見其爲古樂旋宫之正法耳若是正法則其餘十律亦當各自爲宫若非正法則其本調亦當并考然後其法乃備故古􅀃有随月用律之法而來教亦謂不必轉軫促弦但依旋宫之法而抑按之正謂此也然亦難只如此泛論湏逐宫指定各以何聲取何弦爲唱各以何弦取何律爲均乃見詳實又以禮運正義之􅀃推之則每律旣巳各爲一宫每宫亦合各有五調而其逐調用律取聲亦各有法此爲琴之綱領而前此􅀃者皆未嘗有明文誠闕典也􅁒望暇日定爲一圖以宫統調以調統聲令其賔主次第各有條理則覧者曉然可爲萬世之法矣若作此圖先須作二圖各具琴之形體徽弦尺寸散聲之位然後以一圖附按聲聲律之位以一圖附泛聲聲律之位則於宫調圖前所附三聲皆以朱字别之刻版則爲白字十徽十一徽舊疑七弦隔一調之六弦皆應於第十徽而第三弦獨於十一徽調之乃應故角聲兼應兩律而其餘四聲皆止應一律前此故嘗請問而角聲兼應兩律之辨則固巳蒙指示矣然依行之􅀃愚意終有所未曉也巳於前章再論之矣至於七弦隔一之應不同在於一徽則又嘗思之七弦散聲爲五聲之正而大弦十二律之位又衆弦散聲之所取正也故逐弦之五聲皆自東而西相爲次第其六弦㑹於十徽則一與三者角與散角應也二與四者祉與散祉應也四與六者宫與散少宫應也五與七者商與散少商應也其第三第五弦會於十一徽則羽與散羽應也義各有當􅀄不相湏故不得同會於一徽無他􅀃也答周深父所示疑義巳悉第一條語意􅀹駁雜未易遽言第二􅀃克巳字頃嘗見人􅀃此略似来喻而更精宻􅀄看似好然細考本文恐不若只作勝巳之私之安穩也第三條孟子􅀃得巳自詳悉正切中今日向外走作之病且只平看自有警發人䖏意味深長似此推􅀃却覺支蔓不親切也大抵人要讀書湏是先收拾身心令稍安静然後開卷方有所益若只如此馳騖紛擾則方寸之間自與道理全不相近如何看得文字今亦不必多言但且閉門端坐半月十日却来􅀚書自當信此言之不妄也晦庵先生朱文公文集卷第六十三福州府學訓導鄭璉校考異􅀘遺答胡伯量治䘮不用浮屠一本作治䘮不用浮屠法而老母之意必􅁒用之違之則咈親意順之則非禮不知當如何䖏李敬子􅀃居䘮一本作舊見親舊家居䘮多略於内外之限其間􅀋多犯禮李丈云如不得巳􅑼勿於堂上只於􅈦上帷次夾截勿令相通庶稍可杜絶此弊某聞此言後自先人􅂢棄遂用李丈􅀃諸􅀌􅃦處柩旁無故不入中門似覺稍免混雜後以貭之周丈云終䘮不入妻室雖漢之武夫亦能之吾人稍知義理者當不待防閑之嚴而自不忍爲矣某􅀼疑周丈之言未宻不知果當何從士虞上有􅀼按士虞云云横渠先生䘮紀下一作又皆曰䘮湏三年而附向来不暇深考只謂禮疑從重始有循俗􅁇考温公書儀雖是卒哭云云此是儀禮注中􅀃下一作揆之人情却似可行然以爲不忍一日未有所歸云云若復主于靈坐庶幾人子得盡其朝夕哀奉之意則又似不湏先設􅀕以爲祔之之名不知書儀之意如何續􅀚麻沙所印先生文集中有復陸教授書大槩云􅁻凶之禮其變有漸先王制禮盖本人情卒哭而祔者漸以神事之復主于􅃦者猶未忍盡以事死之禮事之也􅀼意文集所􅀃固是深察乎仁人孝子之情然禮記言祔亦别有指又且儀禮始虞之下云云如此下一作則几筵雖在朝夕哭之外全然無事文集以先王制禮爲言者但以朝夕哭爲猶有事生之意别有所據云云按儀禮居䘮不弔一本作某自執䘮之後营墳外凢幹皆不敢出直至葬後方出謝人雖知士䘮服有成服拜賔之文然終疑惑不敢循用不知緩岀可否又旣出之後親舊有䘮事在郷俗常禮必湏徃吊且徃送䘮按禮居䘮不弔其送􅁙雖無明文然執紼即是執事在禮亦有所妨據郷俗不特徃弔送􅁙凡親舊有吉㐫之事皆有所遺㐫事送遺固巳悖禮吉禮尤覺不安不知處此二事當如何居䘮月朔殷奠一本作某居父䘮時遇月朔先行殷奠次入影堂薦新雖於常事頗能不廢第先後之序似乎紊亂又既奠之餘哀情未盡便薦獻疑未爲安李丈云莫􅀂先薦新而後朔奠然亦覺不安遇冬至􅀊節雖知禮有䘮不􅀕之文然未敢輕廢影堂之祀但行禮之際稍從簡略周丈云旣居重䘮何睱如此不知居重䘮者􅀊時常祀合與不合舉行殷奠薦新可與不可並舉伏乞裁誨居䘮貧宭多事一本作居父母之䘮旣葬之後哀思不能云云某居䘮讀禮一本作某自居䘮以来於哭泣之餘家事之􅂩與諸弟日讀䘮禮今妄意擬隨所㸔見逐項編次如書儀送終禮之篇目而更加詳焉取儀禮禮記朝制條法政和儀畧之􅁼及先儒議論以次編入固知僣越妄易不應爲此然區區哀誠止欲與弟軰盡心考禮庶幾得以維持哀思不知如何某始成服時下一作以荒迷中無所考據郷俗之制用麄布作欄衫及三梁冠麻爲腰䋲續斍不安遂用三礼圖云云送終禮下一本有麻沙所印心聲啓所畫格式質之周丈參酌爲冠絰衰裳腰絰絞帶粗巳了辨第其間尚多有未安敢以就正按禮衰麻合皆用生麻布云云之緦異下一本作不知要得當禮時合當别造生布爲之或只隨俗用常時麻布爲之云云
