body:
  text: 行狀少師保信軍節度使魏國公致仕贈太保張公行狀上本貫漢州綿竹縣仁賢郷武都里曽祖文矩故不仕贈太師沂國公妣沂國夫人楊氏祖絃故任殿中丞致仕贈太師冀國公妣冀國夫人趙氏王氏父咸故任宣徳郎贈太師雍國公妣秦國夫人計氏公諱浚字德逺本唐宰相張九齡弟節度使九臯之後自九臯徙家長安生子抗抗生仲方仲方生孟常孟常生克勤克勤生生紀紀生璘即公五世祖仕僖宗時爲國子祭酒從幸蜀因居成都壽百有二十歲長子庭堅以䕃爲符寳郎後不仕符寳之子即沂公也沂公蚤世夫人楊氏携三子徙綿竹依外家遂爲綿竹人長子即冀公也冀公㓜慷慨有大志不肯屑屑爲舉子業於書無所不通慶曆元年詔舉茂才異等近臣魚公周詢以公文五十篇應詔召試祕閣報聞時西鄙方用兵魚公謂公曰天子以西事未寜宵旰求賢惟恐不及子其可在草野乎僕當復率賢公卿共薦論不敢隱也遂與程公戡以公慶曆禦戎䇿三十篇上公之䇿大抵謂唐之所患節鎮兵盛今之所患中原兵弱邊鄙有警無以禦敵良由四方藩境無調習之甲兵無親信之士卒兵以衆合將以位充行陳部伍都無倫理何異敺市人而戦古者兵出不踰時今五年矣民困財匱點科不息生盗賊心後患未可量也可不速有改更圖所以爲靖民威敵乆逺之計乎今當以陜西四路河北三路河東一路割兵屬將公選其人不拘官品爲置文臣通曉者二人爲軍謀而使各得自辟其屬丁壯之目財賦之用悉付之勿使中官擾其事勿使小人分其權而通置采訪使二員分部八路提其綱領紏其姦非如轉運提刑運判監軍可悉罷去庶幾事權歸一戎虜可遏而人民可蘇也有㫖下國子監詳定以聞召試西掖張公方平奏公論議優長天子嘉之授將作監主簿實二年之冬事載國史程公尤噐重公及帥涇原辟公掌機宜事移髙陽復辟焉改秩知雷州時黎人擾朱崖朝命委公自四明遣兵数百浮海道往鎮海隅公至不鄙其民撫綏安静冦亦旋息除管幹都進奏院公年踰六十即浩然思歸致其事自號希白先生築希白堂一時賢公卿皆爲賦詩公親教授雍公雍公字君恱中元豊二年進士第歷官州縣職事之外覃思載籍諸子百氏之說無不貫穿而折衷於六經其爲文辭竒偉條暢元祐三年自華州學官以近臣舉應賢良方正能直言極諌科奏篇爲天下第一比閣試乃報罷時太皇太后垂簾哲宗未親庶政自宰相百執事皆選用名彦更張前日王安石政事之弊排斥異議沮抑邊功公念眀時難遇而内有所懷思以𥙷報既不得對無路上逹宰相吕汲公大防方貴重用事公作時議上之大略謂今民和時雍守成求助而戒飭警懼不可以忽況大憂未艾深患未弭博禍未去所謂大憂戢兵之說也所謂深患差役之說也所謂博禍行法之說也戢兵之說其憂有三有損勢耗財之憂有沮軍優民之憂有滋敵玩兵之憂差役之說其患有三有貧富不均之患有州縣勞擾之患有簿書侵撓之患而二者之本則在朝廷惟朝廷之上去私意公是非明可否一本於大中至正法之可行無問於新之與舊議之可用無問於今之與昔除目前之害消㝠㝠之変則所謂大憂者可轉而爲樂所謂深患者可轉而爲安所謂博禍者可轉而爲福今日之治斯可維持於永丗矣汲公不納而識者歎公先見之明且逺云公歸又六年復召試考官以公文辤傑出寘髙等宰相章惇覧其䇿不以元祐爲非且及廟堂用私意等事無所回互甚不恱數日公徃謝之惇嘻笑曰賢良一日之間萬餘言筆鋒眞可畏因授宣德郎簽書劒南西川節度判官􅈦公事人爲公不滿意而公處之恬然惇於是奏罷賢良方正科而更置宏詞科𥘉祖宗立制舉招延天下英俊俾陳時政闕失天子虚巳而聽得士爲多自熈寕六年用事大臣惡人議巳始令進士御試用䇿而罷制科司馬丞相輔元祐𥘉政以求言爲先務遂復置焉至是惇惡雍公辭直又廢之而立詞科詞科之文如表章賛頌記序之屬皆習爲佞䛕者以佞辭易直諌蠧壊士心馴致禍亂而人不知其廢置之源盖在此也公晚得異夢若有告者曰天命爾子名德作宰相未幾而公生故字之曰徳逺云公生四年而雍公没太夫人年二十有五父母欲嫁之誓而弗許勤苦鞠育公能言即教誦雍公文能記事即告以雍公言行無頃刻令去左右故公雖㓜而視必端行必直坐不欹言不誑親族郷黨見者皆稱爲大器年十六入郡學講誦不間蚤夜同輩笑語喧譁若弗聞者未嘗一窺市門教授蘇元老嘆曰張氏盛德乃有是子吾觀其文無虚浮語致逺未可量也甫冠與計偕入上庠太夫人送之拊其背而泣曰門户寒苦賴爾立當朝夕以爾祖爾父之業爲念凡數十條書之䇿以授公公去親側常若在旁無一言一動不遵太夫人之教京師紛華每時節游觀同舎皆出公獨在蓬州老儒有嚴𢋫者時亦逰太學見公之爲咨嗟愛重𢋫嘗學易有得遂以乾坤之說授公公中政和八年進士第知樞密院鄧洵仁蜀人也與雍公有雅舊謂公来見當處以編修官公竟不荅調山南府士曹參軍以歸奉版輿之官山南大府事夥帥重公才識悉以委焉公爲區處細大各有條理治獄明審務盡其情至狴犴木索沐浴食飲亦必躬涖之寒暑不廢以故軍民歸心訟于庭者皆願得下士曹治其受輸盡去舊弊使民得自執權概人又便之公事罷歸即對太夫人讀書至夜分乃寐故同寮之賢者莫不親之其不肖者亦往往革面憚公不敢爲非蒲中孫偉竒父名士也時過府與帥飲至夜分帥命繼酒于公所公謂其使曰此爲何時而欲發鑰取酒酣飲乎郡人其謂何某不敢也復命帥未應竒父整冠拱手曰公有賢屬如此某罪人也問公姓名志之即登車而去又兼權成固縣事秩滿郡人遮道送者以千計畫公像持以送公者至百餘轉運使歎曰爲小官得人之情如此使得志於時又當如何耶調襃城令辟熈河路察訪司幹辦公事到官徧行邊壘覽觀山川形勢時猶有舊戍守將公悉召與握手飲酒問以祖宗以来守邊舊法及軍陣方略之冝盡得其實故公起自踈逺一旦當樞筦之任悉通知边事本末盖自此也有旨以夏人爭地界事委察訪司命其屬徃視分畫公以十數騎直抵界上所謂陽関者夏人始張旗幟騎乗於谷中意不可測及見公開誠遂數語而定改秩至京師調恭州司録以歸㑹靖康改元尚書右丞何㮚薦公同胡寅召審察先是㮚以中丞論事罷去寓居鄭州公調官歸過鄭念㮚亦蜀人粗有時望因見之告以國事阽危宜益自重思經濟之圖無爲淺露㮚心重公及執政首薦焉公到闕聞㮚益輕儇浸失人望𥘉見即以劄子規之辭切厲㮚不恱不復使對止除太常寺主簿未幾而虜至城下公在京師獨與開封府判官趙鼎虞部郎中宋齊愈校書郎胡寅爲至交寢食行止未嘗相舎所講論皆前輩問學之方與所以濟時之䇿時淵聖皇帝召涪陵處士譙定至京師將處以諌職定以言不用力辭杜門不岀公徃候見至再三定開關延入公問所得於前輩者定告公但當熟讀論語公自是益潜心於聖人之微言二聖出城公以聀事在南薫門有燕人姓韓者仕虜爲要官徃来南薫稔識公面一日謂公曰大人輩虜人呼貴酋爲大人以京城之人不肯盡出金帛翌日當洗城指城一角曰至時吾立大皂旗于此爾来立旗下庶可免公笑謂之曰公宜爲大人輩言京師之人若盡死金帛誰從而得乎姓韓人喜若有得色他日復值之謂公曰比日以爾言說諸大人巳罷洗城之議矣此事世莫知也逆臣張邦昌乗時窺僣公逃太學中聞光堯夀聖太上皇帝即位南京星夜馳赴至即除樞宻院編修官改虞部貟外郎㑹上以𥘉履寳位登壇告天公攝太常少卿導引上見公進止雍容静重心重之即欲大用詰朝以語宰執時中書侍郎黃潜善嘗在興元知公治績因稱述焉上簡記他日除公殿中侍御史先是宰相李綱以私意論諌議大夫宋齊愈腰斬公與齊愈素善知齊愈死非其罪謂上𥘉立綱以私意殺侍從典刑不當有傷新政恐失人心旣入臺首論綱罷之駕幸東南道途倉卒後軍統制韓世忠所部軍人劫掠作過逼逐左正言盧臣中墜水死公以雖在艱難擾攘中豈可廢法如此即奏劾世忠擅離軍伍致使師行無紀士卒散逸爲變乞正其罰有㫖從贖公重論奏及乞追捕散逸爲變者上爲奪世忠觀察使上下始肅然知有國法至維揚即勸上無忘二帝比狩常念中原汲汲然脩徳去弊以振紀綱每奏事上未嘗不從容再三問勞泛及爲治之方輙至日􅉴公所論專自人主之身以及近習内侍戚里以爲正天下之本在此乃奏崇觀以来濫授官資乞盡釐正戚里邢煥孟忠厚不當居侍從冝換右職駙馬潘正夫不待扈從先来維揚請治其罪内侍李致道誤國爲深不當引赦叙復尚書董耘獨以藩邸恩夤縁通顯宜即退閑皆蒙采納時以藩邸舊宫錫號升暘至維揚内侍占官寺爲之公奏方時艱難行幸所至豈冝為此以重失人心此必從行官吏欲假威福妄興事端借御前之號為奉巳之私耳乞行罷止上從之遷侍御史賜五品服公感上知眷益思效忠時車駕乆駐維揚人物繁聚而朝廷無一定規摹上下頗觖望公奏近日軍民論議紛然彼得藉口為說者盖二帝遠在沙漠而陞下乃與六宮端居于此何恠人之竊議願明降睿㫖以車駕不為乆住維揚之計曉諭軍民仍乞朝廷早措置六宫定居之地然後陛下以一身廵幸四方規恢逺圖上以慰九廟之心下以副軍民之望他日奏事上謂公曰朕於直言容受不諱近有河北武臣上書不知朝廷事體詆毀朕躬亦不加罪公請以所得聖語布告中外激勸言者庶幾有𥙷扵國上嘉納焉又奏中原天下之根本也朝廷中原之根本也本之不揺事乃可定願降詔㫖敕東京留守司略葺大内及開陜襄鄧等處常切準備車駕廵幸及以今來行在所止不爲乆居之計庶幾内外和恱各思奮勵以圖報國宰相浸不恱又論御營使司屬猥衆俸給獨厚資格超越而未嘗舉其職乞行沙汰使僥倖者無以得志法行自近軍氣必振又論無謂虜不能来當汲汲修備治軍常若寇至遂大咈黄潜善等意公以孀母在逺乞外𥙷除集英殿修撰知興元府公巳登舟候朝辭有旨除禮部侍郎日下供職召對便殿上慰劳宣諭曰卿在臺中知無不言言無不盡朕將有爲政如欲一飛冲天而無羽翼者卿爲朕留當專任用張慤及卿公頓首泣謝不敢言去慤時爲中書侍郎未幾而卒上一日復謂公曰郭三益可與卿共事未㡬而三益亦卒公念虜騎必至而廟堂晏然殊不爲備率同列力爲宰相言之潜善及汪伯彦笑且不信公常以疾在告獨上眷遇益深除公御營參賛軍事撥魯珏楊周等所部兵令同吕頥浩敎習所謂長兵者公親往點閱籍其郷貫年齒與所習藝能復𬒳㫖同頥浩扵江淮措置未㡬虜騎自天長逼近郊公從駕渡江至平江朝議東幸詔朱勝非留呉門禦賊問誰當佐勝非左右莫應公獨慷慨願留遂以本職同節制平江府常秀州江隂軍軍馬車駕遂東時建炎三年二月八日也公行平江四境規度可控扼虜所来道决水漑田爲限立烽堠召土豪與議時禁衛班直及諸軍潰歸無慮數萬衆乏食所至焚劫一夕知府事湯東野蒼黄見公曰城四外焚廬舎火光並起柰何公笑曰此必潰軍之歸正當招集問府藏銀絹有幾即曰勝非便冝出黄牓及旗于門以聖㫖招集支賜銀絹各若干令結甲而入且令市人廣造食物以俟頃之潰兵皆以次入旣得賜又市食無敢譁者明日令依所結甲出盤門赴行在所違者斬如是數日不絶而公舊所敎習長兵至者亦近三千人二十日朱勝非召赴行在公獨節制三月八日東野忽復遽告公聞有赦至公慮時方艱難事變莫測命東野先遣親信官馳至前路發封以告少頃東野馳来曰事變矣乃明受赦也䄂以示公時府中軍民巳知有赦公謂東野令登譙門宣有㫖犒設諸軍一次内外乃定九日有自杭持苗傳劉正彦檄文耒者公慟哭念王室禍變如此戴天履地大義所存雖平江兵少力單而逆順勢殊豈復強弱利害之足較便當唱率忠義舉師復辟誅討叛賊以濟艱難雖孀母在逺身無嗣繼而義有所不可巳也亟召東野及提點刑獄趙哲至喻之且激以忠義二人感激願助因祕其事夜召哲以防江爲名盡調浙西弓兵令東野密治財計十日得省劄召公赴行在時承宣使張俊領萬人自中塗還公遣問之乃云傅等勑俊交割所緫人馬赴秦鳯路緫管任公念上遇俊厚而俊純實可謀大事急使東野啓城撫諭諸軍俊立詣公所公獨留俊握手語曰太尉知皇帝遜位之由否此盖傅正彦欲危社禝語未終泣下交頥俊亦大哭曰有辛永宗者來自杭備爲俊言適徧喻將校輩且當詣張侍郎求决侍郎忠孝必有處置公慮俊意未確復再三感動之俊曰只在侍郎若官家别有它虞何所容身公應曰某處置巳定當即日起兵問罪俊大喜且拜曰更湏侍郎濟以機權莫令驚動官家公給俊軍衣糧并及其家皆大恱公召辛永宗問傅正彦所與謀爲誰曰歸朝官王鈞甫馬柔吉舊聞侍郎嘗識鈞甫等請以書先離間之是夜公發書約吕頥浩劉光世兵來㑹時頥浩節制建業光世領兵鎮江公慮書不逹復遣人賫蠟丸從間道往公巳再𬒳赴行在之命知爲傳等姦謀而兵未集未欲誦言戒東野哲各宻奏虜未退靳賽数萬衆窺平江若張某朝就道恐夕敗事公亦奏張俊驟回平江人情震讋臣不少留恐生事因命俊遣精兵二千扼呉江而奏曰俊兵在平江者多臣故分屯以殺其勢盖懼傅正彦覺勤王之謀先出不意遣兵直擣平江故也十一日附遞發奏臣伏覩三月五日睿聖皇帝親筆朕即位以來強敵侵凌逺至淮甸其意專以朕躬爲言朕恐其興兵不巳枉害生靈畏天順人退避大位臣伏讀再四不覺涕泣臣竊以國家禍難至此皆臣等不能悉心圖事𥙷報朝廷致使土地侵削人民困苦上負睿聖之恩下失天下之望今睿聖皇帝以不忍生靈之故避位求和臣獨有一說不敢不具陳其詳臣竊以當今外難未寧内冦竊起正人主憂勞自任馬上求治之時恐太母以柔静之身皇帝以冲㓜之質端居深處責任臣寮萬一強敵侵凌不肯悔禍則二百年宗廟社禝之基拱手而遂亡矣臣愚不避萬死伏願太母陛下皇帝陛下特軫宸慮祈請睿聖念祖宗付託之重思二帝屬望之勤不憚勤勞親緫要務據形勢之地求自治之計抑去徽名用柔敵國然後太母陛下皇帝陛下監國于中撫靖江左如此則國家大計自爲得之如以臣言爲然乞行下有司令率文武百寮祈請施行貼黃臣契勘伏覩睿聖皇帝方春秋鼎盛而遽爾退避大位恐天下四方聞之不無疑惑萬一别生它虞更乞睿斷詳酌施行并具因依申尚書省伏望朝廷率文武百官力賜祈請及具咨目報苗傳劉正彦某乆病無聊日思趨赴行在縁靳賽人馬過平江平江之人各不安居守貳日夕相守不容出城朝夕事畢即便登途邇者睿聖皇帝以不忍生靈塗炭之故避位求和足見聖心仁愛之誠然當此多難人主馬上圖治之時若睿聖謙冲退避上無以副宗廟之寄次無以慰父兄之望下無以厭四海之心某曩備貟言官日竊見睿聖皇帝聦明英斷意欲有爲止縁小大臣寮誤國至此某叨竊侍從盖亦誤國之人廼至過江事出倉卒向使將相有人睿聖豈肻輕發今太母垂簾皇帝嗣位而睿聖乃退避别宫若不力請俾聖意必回與太母分憂同患共濟艱難中興之宗未易可圖二公苟不身任此事人其謂何當念祖宗二百年㴠養之舊今所恃以存亡惟睿聖皇帝况皇帝天資仁厚從諫如流願勉爲之再三懇請睿聖冝無不允也又與柔吉鈞甫書曰此事當責在二公是日公再𬒳促赴行在之命有進士馮轓者後更名康國與公爲太學之舊來平江相從公察轓慷慨氣義人也夜四鼓呼轓具道所以且云巳具奏及移書今若得一人往靣悉此意大善轓激厲請行詰朝即就道是日再以書促頥浩光世報所處分次序十三日以所奏檢報諸路復督頥浩光世速選精銳來㑹平江而張俊再𬒳赴秦州指揮且命陳思恭緫其兵思恭知逆順信用公言奏不敢交俊兵十四日公𬒳命除禮部尚書將帶人馬疾速赴行在公復奏不可離平江狀十五日傅正彦遣俱重賫詔書撫諭且來呉江代張俊公召重至平江重𥘉桀驁以祕計恐之重逃避旣而公得請兼領俊兵有報韓世忠海船到常熟岸者俊喜曰世忠來事辦矣即白公公以書招之世忠得書號慟十八日見公于平江相對慟哭世忠曰某願與張俊身任之偶甄援自杭來詭稱睿聖靣令促諸軍公使徧諭俊世忠及至鎮江喻光世及部曲等衆皆號慟十九日馮轓至自杭傅正彦答公書皆不情語柔吉鈞甫亦以書來是日頥浩光世報軍行二十日公大犒俊世忠將士令世忠奏以兵歸行在而宻戒世忠急至秀据糧道候大軍至酒五行公親呼諸將校至前厲聲問曰今日之舉孰順孰逆衆皆曰我順賊逆公復厲聲曰若某此事違天悖人可取某頭歸苗傅等聞傅等以觀察使及金鉅萬求某得某者可即日富貴不然一有退縮按以軍法衆感憤應諾世忠軍自平江舟行不絶者三十里軍勢甚振是時逆黨傳聞巳自震懾有改圖之意矣公又恐賊急邀車駕入海道先遣官屬措置召募海船亦甚集二十一日復遣馮轓以書行且令轓居中幾事相應㑹得傅等書云朝廷以右丞待侍郎伊尹周公之任非侍郎其誰當之公不勝忠憤度傅等巳覺公義兵動而我兵勢旣巳立遂因遞報之其略云自古言渉不順謂之指斥乗輿事渉不遜謂之震驚宫闕是以見君輅馬必加禮而致恭盖不如是無以肅名分杜僣亂也廢立之事非常之變謂之大逆不道大逆不道者族矣凡爲人臣者握兵在手遂可以責君之細故而議廢立自古豈有是理者哉今建炎皇帝春秋鼎盛不聞失德于天下一旦遜位豈所宜聞自處巳定雖死無悔嗚呼天佑我宋所以保衞皇帝者歴歴可數出質則虜人欽畏而不敢拘奉使則百姓謳歌而有所属天之所與誰能廢之况祖宗在天之靈豈不昭昭借使事正而或有不測猶愈於終爲不義不忠之人而得罪於天下後世也傅等得書怒遣赤心軍及王淵舊部精銳盡駐臨平而韓世忠之軍巳扼秀州矣公作蠟丸帛書云不得驚動聖駕募人賫付主兵官左言以下八人及知臨安府康允之皆逹又作手牓遣人間道曉諭臨安居民曰訪聞前日睿聖皇帝遜位軍民掩泣各不聊生足見軍民忠義之情世忠旣柢秀州稱病日令將士造雲梯脩弓矢器械傳正彦震駭亟除世忠俊節度使指揮略云世忠俊深曉内禪大義不受張某詿誤二人皆不受命傅正彦又令朝廷降指揮謫公其詞曰張某隂有邪謀欲危社禝責授黃州團練副使郴州安置仍令平江差兵級防送經由行在赴貶所二十四日頤浩以兵至公迓且勉之握手􅐵嘘頥浩亦曰事不諧不過赤族翌日光世亦至二十七日傳檄内外辭曰宋有天下垂二百年太祖太宗開基創業真宗仁宗德澤在民列聖相傳人心未厭昨因内侍童貫首開邊禍遂致虜騎歴歲侵凌逆臣苗傅躬犬彘不食之資取鯨鯢必戮之罪乃因艱難之際敢爲廢立之謀劉正彦以孺子狂生同惡共濟自除節鉞專擅殺生仰惟建炎皇帝憂勤恭儉志在愛民聞亂登門再三慰喻而傅等陳兵列刃凶𦦨彌天逼脅至尊蒼黃遜位語言狂悖所不忍聞大臣和解而不從兵衛皆至於掩泣詔書所至逺近痛心駭戾人情孰不憤怒况傅等掲牓闤市自稱曰余祖宗諱名曽不回避迹其本意實有包藏今者吕頥浩因金陵之師劉光世引部曲之衆張某治兵於平江韓世忠張俊馬彦溥各領精銳辛道宗陳思恭緫率舟師湯東野周杞扼據衝要趙哲調集民兵劉誨李迨餽餉芻粮揚可輔等參議軍事并一行將佐官屬等同時進兵以討元惡師次秀州四方響應用祈請建炎皇帝亟復大位以順人心今檄諸路州軍官吏軍民等當念祖宗􅉼養之恩思君父幽廢之辱各奮忠義共濟多艱所有朝廷見行文字並是傅等僞命及專擅改元即不得施行敢有違戾天下共誅之二十八日張俊光世相繼行聞行在巳有復辟之議矣𥘉公遣馮轓授以計䇿傅正彦聞平江之師將至甚憂恐􅙲知可動即以大義白宰相朱勝非曰張侍郎之意盖以國歩艱難政當馬上治之主上盛年乃傳位襁褓之子聴斷不出簾帷天下恐有不測之變縱主上謙虚固執内禪之論此猶有一說焉主上受淵聖詔爲天下兵馬大元帥今日當以淵聖爲主睿聖稱皇太弟依舊天下兵馬大元帥嗣聖當易稱皇太姪太母垂簾聽政大元帥治兵征伐于外此最爲得䇿勝非令轓與二人議轓反覆告之傅正彦有許意遂與同議都堂轓同傅正彦鈞甫四人並引見太后勞問曰卿等皆忠義之臣轓遂奏曲折議定乞賜傅正彦鐡劵詔宣百官少頃畢集宣詔云二十五日苗傅劉正彦等四人上殿奏事奉聖㫖睿聖皇帝宜稱皇太弟依舊康王天下兵馬大元帥皇帝宜稱皇太姪百官退詣睿聖宫上御殿引見傅正彦詞色粹然問劳有加傅等出宮以手加額曰不意聖天子度量如此旣而傅正彦歸軍逆黨張逵曰趙氏安苗氏危矣王世脩尤大悖三鼓詣勝非府變其事復欲改正嗣皇依舊而睿聖之名止稱處分天下兵馬重事勝非不能奪轓次日力争勝非云勿與較其實一也􅙲遂歸而勤王之師巳悉至秀州三十日公𬒳命同知樞宻院亦不受四月二日公次秀州奉復辟手詔而傅等大兵屯臨平公進發三日次臨平世忠當前俊次之光世又次之逆黨立旗招喻世忠等世忠與戰軍小却世忠親揮刃突前曰今日不爲官家靣上帶幾箭者斬之衆争奮賊黨苗翊等大敗傅正彦相繼逃遁是夕皇帝聖㫖除公知樞宻院事翌日公與頤浩等入内朝見伏地待罪泣下再三慰勞宣喻云曩在睿聖兩宮幾不相通一日朕方啜羮小黃門直趨前傳太母之命曰張浚早來不得巳安置郴州朕不覺覆羮于手今其迹尚存自念卿旣𬒳責此事誰任公嗚咽奏臣蒙陛下眷遇之厚乆歴臺省不能𥙷助致虜騎慿凌禍變竊發臣之罪大敢復論功上再三稱歎獨留公引入後殿過宮庭上宣喻隆祐皇太后知卿忠義欲一識卿靣目適垂簾見卿自庭下過矣公惶恐頓首謝上屬意欲倚公爲相公辭晚進不敢當盖公意以關陜爲中興根本欲請行矣上曰顧無以見朕意解所服玉帶命内侍覆去龍飾賜公曰此祖宗御府所寳也公重辭元樞之命詔書曰卿以小宗伯之職贊天營之事乃能緫合諸師來赴行在之急俾姦究不敢輙肆威聲旣振妖孽宵奔致朝廷於安平無事之地卿之功大矣宜勿復辭傅正彦旣敗走與死黨直趨閩中公命世忠以精兵追之並縳于建州檻至行在所及其黨左言張逵王世脩等伏法建康市𥘉公起義兵行次嘉禾一夕坐至夜分外間警備亦甚嚴忽有刺客至前腰間出文書乃傅正彦遣來賊公賞格甚盛公顧左右皆鼾睡見其辭色不遽問爾欲何如對曰某河北人粗知逆順豈以身爲賊用者况侍郎精忠大節感通神明某又安忍害侍即耶特見備禦未至恐後有來者故來相報耳公下執其手問姓名曰某粗讀書若言姓名是徼後利顧有母在河北今徑歸矣遂拂衣而去其超捷若神公翌日取嘉禾死罪囚斬以徇曰此苗傅等刺客也後亦無它公私識其人狀貌物色之終不遇云盗薛慶嘯聚淮甸兵至數萬附者日衆公以宻邇行闕一有滋蔓爲患不細且聞慶等無所係屬欲歸公麾下請往示大信以招撫之渡江而靳賽等率兵降遂徑至高郵入慶壘從行者不及百人出黃牓示以朝廷恩意慶感服再拜始公入賊壘外間不聞公信浮言胥動頥浩等遽罷公樞筦及聞公訖事還上歎息即日趣公歸且詔就職公辭上撫勞再四復親書御製中和堂詩賜公有曰願同越勾踐焦思先吾身其卒章曰高風動君子屬意種蠡臣仍題其後曰卿看畢可宻藏恐好議者以朕屬意篇什也其眷待如此公素念國家艱危以來措置首尾失當若欲致中興必自關陜始又恐虜或先入陜䧟蜀則東南不復能自保遂慷慨請行詔以公充川陜宣撫處置使便宜黜陟賜親筆詔書曰朕嗣承大統遭時多艱夙夜以思未知攸濟正頼中外有位悉力自效共拯艱危今遣知樞宻院事張某往喻宻㫖黜陟之典得以便冝施行卿等其念祖宗積累之勤勉人臣忠義之節以身徇國無貽名教之羞同德一心共建隆興之業當有茂賞以答殊勲公行有日矣㑹御營平寇將軍范瓊來赴行在瓊自靖康圍城與女真通及京城破逼脅后妃及淵聖太子宗室入虜中又乗勢剽略爲亂左右張邦昌爲之從衛罪狀非一至是聞二兇伏誅始自豫章擁衆入朝旣陛對恃其衆盛悖傲無禮多所邀求且乞貸傳正彦逆黨左言等死公奏大略云瓊大逆不道罪冠三千之辟呼吸群兇布在列郡以待竊發若不乗時顯戮則國法不正且它日必有王敦蘇峻之患臣任樞筦之寄今者𬒳命奉使川陜啓行有日廼心踟蹰若不盡言乞伸典憲死且不瞑上深然之公獨與權樞宻院檢詳文字劉子羽宻謀夜召子羽及選宻院謹飭吏數輩作文書劄榜皆備鎻吏于府中翌早公赴都堂召瓊議事瓊從兵溢塗巷意象自若坐定公數瓊罪瓊愕眙命縛送大理寺子羽已張榜于省門外親以聖㫖撫勞瓊衆曰聖㫖罪止瓊餘皆御前軍也無所預衆頓刃應喏瓊論死兵分隷神武軍自靖康後紀綱不振王室陵夷公首倡大義率諸將誅傅正彦乗輿返正復論正瓊罪而後國法立人心服自武夫悍卒小兒竈婦深山窮谷裔夷絶域皆聞公名盎然歸仰忠義之感實自此也公辟子羽參議軍事遂西行獨念上孤立東南朝廷根本之計未定蚤夜深思苟有所見不敢不納忠以身在外而不言也嘗奏曰前日餘杭二兇鼓亂彼豈眞惡内侍哉當此艱危人情易揺欲爲不順借此以鼓惑衆聽耳然在我者有隙可指其事乃作願陛下謹之察之於細㣲未萌之事每切致意使姦逆無以窺吾間又曰臣累具奏謂前此大臣不肯身任國事意謂事苟差失衆言交攻取禍必大惟因循度日萬一得罪而去亦不過謂庸繆落職領祠而巳此風誤國有素願陛下臨朝之際不匿厥指與大臣决議繼自今必使身任其責脫或敗事誅罰無赦又奏曰聽言之難自古記之書稱先王之盛有曰侍御僕從罔匪正人夫僕從之㣲也而亦必嚴擇盖其朝夕在君側浸潤膚受言爲易入苟使小人得售將何所不至夫小人進䜛說以快其私經營窺測投隙伺間固不正名其事顯斥其人也或因獻談諧之說或假託市井之論夤縁附㑹其端甚㣲人君一或忽之則忠賢去國億兆離心其禍有不可勝言矣臣謂欲盡聽言之道莫若親君子而逺小人不然雖有過人之聦明而朝夕所狎近者旣皆非類漸漬以入其能無過聽之失乎又奏曰自古大有爲之君未有不體乾剛徤而能成其志者也易曰天行徤君子以自強不息人君法天莫大於此少康氏有田一成有衆一旅而夏后之業復振盖其經營越四十年向使其間一萌退縮之意則王業無自而興矣漢高帝困於鴻門屏於巴蜀敗於滎陽京索間屢挫而愈不屈終㓕項氏以啓漢基此二君者豈非剛徤不息而卒能配天乎今日禍變可謂極矣意者天將開中興之基在陛下體乾之剛身任天下而巳願陛下以至公至誠存心惻怛哀矜思天下之所以困窮生民之所以塗炭自反自咎身任其責便佞之惑耳者去之羙麗之恱目者逺之以至於衣服飲食亦惟菲薄之務淡然漠然視天下無足以動吾心者而專以宗社生靈爲念苟言之非有益於宗社生靈者弗言也苟思之非有益於宗社生靈者弗思也持之以堅行之以乆乾乾不息則上可以動天下可以格人由近及逺由内及外民雖至愚豈不感化少康漢祖之事業又何難哉臣於陛下分則君臣情則父子故雖逺去天威而區區愛君之心不敢不思所以自效上手書賜公曰卿自離闕曾未幾時竒畫深規忠言讜論著之簡牘巳三上矣虚懐領覽嘉歎不忘時渡江大赦獨李綱以言者論列貶海外不放還公論奏逆黨如呉幵莫儔顧反得生歸綱雖輕踈亦嘗爲國任事乃不得叙天下謂何上用公奏綱得内徙始公嘗論綱罪至是獨爲伸理其用心公明無私好惡類如此云公自七月離行在經歴長江上及襄漢與帥守監司議儲蓄之宜以待臨幸先是上問公大計公請身任陜蜀之事置司秦川而乞别委大臣韓世忠鎭淮東令吕頥浩扈駕來武昌張俊劉光世等從行與秦川首尾相應朝廷議旣定公行未及武昌而江浙士夫揺動頥浩遂變𥘉議公以十月二十三日抵興元奏曰竊見漢中實天下形勢之地臣頃侍帷幄親聞玉音謂號令中原必基於此臣所以不憚萬里捐軀自效庻幾奉承聖意之萬一謹於興元理財積粟以待廵幸願陛下鑾輿早爲西行之謀前控六路之師後據兩川之粟左通荆襄之財右出秦隴之馬天下大勢斯可定矣始公未至虜巳䧟鄜延鄜延帥郭浩寄治德順軍虜驍將婁宿孛堇於九月二十九日引大軍渡渭河犯永興知軍郭琰遁去虜兵四掠而諸帥方互結仇怨不肯相援人心皇皇公到才旬日即出行關陜復奏請早决西來之期以係天下心至陜訪問風俗罷斥姦贓而尤以捜攬豪傑爲先務一時氣義拳勇之士争集麾下呉玠及其弟璘素負才略求見公願自試公與語竒之時玠方修武郎璘尚副尉公獎予不次擢用命玠爲統制璘領帳前親兵皆感激誓以死報諸帥亦惕息聽命㑹諜報虜將冦東南公即命諸將整軍向虜使婁宿不得下已而虜果大入冦江淮車駕浮海東征四年二月公以虜勢未退治兵入衛未至襄漢遇德音知虜旣北歸矣乃復還關陜奏曰陛下果有意於中興之功非幸關陜不可願先幸鄂渚臣當紏率將士奉迎鑾輿永爲定都大計又奏曰臣竊惟國家不競患難荐殝夷虜慿凌海宇騰沸二聖乆征於逺塞皇輿未復於中原而敵國交兵方興未艾郡邑半䧟於賊手黎元悉困於塗泥自古禍亂所鍾罕有若此之比必欲昊穹悔禍甿庻獲安自非君臣之間更相勉勵痛心嘗膽修德著誠大誅姦邪頓革風俗親君子逺小人去讒佞屏聲色簡嗜慾崇節儉則曷以上應天變下懐民心四海黔黎殊未有休息之日也若昔黃帝遭蚩尤之亂大禹罹洪水之災卒能平夷終歸安治者正以君臣上下苦心勞形杜邪枉之門開公正之道天人響應遐邇恊謀故能平難平之冦成不世之績上手書報公以虜退衂狀且曰卿受命而西大恢逺略布朝廷之惠意得將士之歡心積粟練兵興利除害去取皆當黜陟惟公而又雅志本朝嘉猷屢告眷惟忠懇實副倚毗是月虜大酋粘罕復益二萬騎聲言必取環慶路公率諸將極力捍禦虜勢屢挫生擒女眞及招降契丹燕人甚衆時聞兀术猶在淮西公懼其復擾東南使車駕不得安息事幾有不可測者即謀爲牽制之舉始公陛辭上命公三年而後用師進取至是上亦以虜欲萃兵寇東南御筆命公宜以時進兵分道由同州鄜延以擣虜虚公遂决䇿治兵移檄河東問罪八月十三日收復永興軍虜犬恐急調大酋兀术等由京西路星夜來陜右以九月二十間與粘罕等㑹而五路之師亦以二十四日至耀州富平大戰涇原帥劉錡身率將士先薄虜陣自辰至未殺獲頗衆㑹環慶帥趙哲擅離所部哲軍將校望見塵起驚遁而諸軍亦退舎公斬哲以狥退保興州時陜右兵散各歸本路宣撫司獨親兵實從官屬有獻議退保䕫州者公堅駐不動以扼虜衝獨參議劉子羽毅然與公意合廼劾異議者遣子羽出關召諸將收散亡將士知宣司在興州皆相率㑹子羽于秦亭凡十餘萬公哀死問傷録善咎巳人心恱焉廼命呉玠聚涇原兵據高扼險于鳯翔之和尚原守大散關斷賊來路命關師古等聚熈河兵於岷州大潭一帶命孫渥賈世方等聚涇原鳳翔兵於階成鳯三州以固蜀口虜見備禦巳定輕兵至輙敗不敢近公上䟽待罪上手書報公曰卿便冝收合夷散養銳待時但能據險堅壁謹守要害旣以保固四州之地又能牽制南下之師則惟卿之頼公奉詔益厲諸將嚴備待虜紹興改元五月虜酋烏魯却統大兵來攻和尚原呉玠乗險擊之虜敗走三日間連戰輙勝虜逗留山谷人馬死亡十之四八月粘罕在陜西病篤召諸大酋謂曰吾自入中國未嘗有敢嬰吾鋒者獨張樞宻與我抗我在猶不能取蜀爾曹宜息此意但務自保而巳兀术出而怒曰是謂我不能耶粘罕死即合兵來寇九月親攻和尚原呉玠及其弟璘與合戰出竒邀擊大破之俘䤋酋領及甲兵以萬計兀术僅以身免亟自髠鬄鬚髯狼狽遁歸得其麾蓋等自虜入中國其敗衂未嘗如此也先是上以公奉使陜右捍禦大敵制加公通奉大夫公念自靖康中召赴京師更歴變故出身爲國違去太夫人色養於兹七年乃奏迎太夫人自廣漢來閬中版輿就養又思所以恱毋意遂乞以通奉恩命特封外祖父母優詔許焉二年上謂公未至西方時虜已陸梁蹂踐關陜及引師而歸勢誠不敵而保䕶衝要連挫大敵蜀頼以全聚兵至十五萬勤勞備至制加公檢校少保定國軍節度使賜手書曰朕非敢决取秦穆之效而卿自脩孟明之政是用夙夜歎嘉今遣内侍任源往宣㫖源歸公附奏謝且宻奏曰天下之事每當謹㣲一失於𥘉末不可救夫莫顯者㣲也常情謂爲㣲而忽之明智以其著而謹之唐元宗惑女色而致禄山之禍憲宗任内侍而啓晚唐之禍其𥘉二君之心皆以爲㣲而不加察也孰知其貽害之烈至此哉願陛下於事之㣲每深察焉則天下幸甚是歲公亦遣兄滉及官屬奏事行在所上喜恩意有加公在關陜凡三年以新集之軍當方張之虜蚤夜勤勞親加訓輯其規模經畫皆爲逺大恢復之計以劉子羽爲上賔子羽忠義慷慨有才略諸將歸心任趙開爲都轉運使開善理財治茶鹽酒法方用兵調度百出而民不加賦擢呉玠爲大將守鳯翔玠每戰輙勝虜不敢近而西北遺民聞公威德歸附日衆於是全蜀按堵且以形勢牽制東南江淮亦頼以安然公承制黜陟悉本至公雖郷黨親舊無一毫假借於是士大夫有求於宣司而不得者始紛然起謗議於東南矣有將軍曲端者建炎中任副緫管逼逐帥臣王庻奪其印又方命不受節制富平之役張忠彦等降虜皆端腹心實知其情公送獄論端死而謗者謂公殺端及趙哲爲無辜且任劉子羽趙開呉玠爲非是朝廷疑之三年春遂遣王似來副公公聞即求去且論呉玠劉子羽有功於蜀不應一旦以似加其上公雖累乞去而以負荷國事至重未嘗少忘警備㑹虜大酋撒离喝及劉豫叛黨聚大兵自金啇入冦公命嚴爲清野之計分兵據險前後撓之虜至三泉掠無所得乏食狼狽引遁大軍躡之人馬死曵滿道所喪亡不减鳯翔時是時公累論奏王似不可任而似與宰相吕頥浩有郷里親戚之舊頥浩不恱又或告朱勝非以公唱義平江時嘗有斬勝非語勝非隂肆謗毀詔公赴行在公力求外祠章至十數上上弗許四年二月至行在御史中丞辛丙嘗知潭州公在陜時調丙發潭兵赴湖北丙怯懦不能遣反鼓唱軍士幾致生變公奏劾丙且令提刑司取勘丙憾至是遂率同列劾公誣以危語始公在陜嘗以秦州舊驛秦川舘爲學舎以待河東陜西失職來歸之士給以衣食令一人年長者主之又新復州郡乞鑄印請於朝廷往返動經歲恐失事機即用便宜指揮鑄以給之然後以聞而丙謂公設祕閣以崇儒擬尚方而鑄印公𥘉彼命還闕奏歸上冡取道東蜀䕫峽庻幾安逺近之心而吕頥浩又以書來言若一離川陜事有意外誰任其責宜以事實告上萬一欲尚留宣司當爲開陳如請公不顧也而丙反謂公不肯出蜀意有他圖公恐懼亟以頥浩書進呈上始愕然即詔宣押奏事公竟移疾待罪而論者亦不巳六月遂以本官提舉臨安府洞霄宫福州居住公知虜旣釋川陜之患必將復萃師東南不敢以得罪逺去而不言且是時朝廷巳盛講和好之議乃具奏曰臣竊觀此虜情狀專以和議誤我亦云乆矣彼勢蹙即言和勢盛即復肆前後一轍請姑以近事明之紹興三年秋粘罕有親冦蜀之意先遣王倫還朝且致勤懇盖懼朝廷大兵乗彼虚隙又其爲劉豫之計至委曲周悉也自後九月余覩作難前謀遂寢至十二月余覩之難稍息則復大集畨漢之衆徑造梁洋是時朝廷巳遣潘致堯出使矣次年二月虜困饒風進退未皇先是朝廷開都督府議遣韓世忠直抵泗上虜實畏之於四月遣致堯還其辭婉順欲邀大臣共議此非無所忌憚而然也梁洋之冦未能出境至五月而後得歸旣狼狽矣而世忠大兵㝷復輟行虜之氣力固已復蘇而叛豫之心亦云舒緩所以前日使人之來求請不一故爲難從之事也竊惟此虜傾我社稷壊我陵寢迫我二帝驅我宗室百官自謂怨隙至深其朝夕謀我者不遺餘力矣况劉豫介然處於其中勢不兩立必求援於虜借使暫和心實未巳數年之内指摘他故豈無用兵之辭而我將士率多中原之人謂和議旣定不復進取將解體思歸矣若謂今日不得巳而與之通使爲陛下之㩲敵亦固能用權也願陛下蚤夜深思益爲備具處將士家屬於積粟至安之地使出爲戰守者無返顧奔散之憂精擇竒才以撫川陜之師使積年戍邊者無懈惰懐望之意江淮川陜互爲牽制斥逺和議用定大業臣奉使川陜竊見主兵官除呉玠王彦關師古累經㧞擢備見可任外其餘人才尚衆謹開具如左呉璘楊政可統大兵田晟可緫一路王宗尹王喜王彦可爲統制後皆有聲時服公知人公即日赴福州從者皆去扃輿才兩人旣至闔門以書史自娯是歲九月劉豫之子麟果引虜大兵繇數路入寇騰言侮慢上下恟懼上思公前言之驗罷宰相朱勝非而參知政事趙鼎亦建請車駕幸平江召公任事遂以資政殿學士提舉萬夀觀兼侍讀召不許辭免日下起發手書賜公曰卿去國累月未嘗弭忘考言詢事簡在朕心想卿志在王室益紆籌䇿母庸固辭便可就道夙夜造朝嘉謀嘉猷佇公入告金書疾置絡繹於道公即日行中途條具戰守之宜甚悉且乞先遣岳飛渡江入淮西張聲勢以牽制虜大兵在淮東者以十一月十四日入見玉音撫勞加於疇昔即日復除公知樞宻院事公奏曰人道所先惟忠與孝一虧於巳覆載不容自昔懐姦欺君妬賢賣國當時閭巷細民莫不深怨嫉憤恨不食其肉者至若一心事上守正盡忠雖天下後世皆知企慕稱歎思見其人焉盖理義人心之所同故好惡不期而自定臣以區區淺薄之質㓜𬒳家訓粗知義方平居立身以此自負偶縁遭遇寖獲使令陛下任之太專待之過厚而有怨於臣者攻毀之備至有求於臣者責望之或深上頼聖智保全㣲蹤臣奉使無狀豈不自知至於加臣於大惡之名䧟臣於不義之地隳臣子百世之節貽孀親萬里之憂言之嗚咽痛憤無巳今陛下察其情僞保庇孤忠許以入侍旋擢樞筦在臣毀首碎身無以論報然而公議之所劾訓詞之所戒傳之天下副在史官臣復何顔敢玷近列上親書詔曰張浚愛君憂國出於誠心頃属多艱首唱大義固有功於王室仍雅志於中原謂關中据天下之上游未有舎此而能興起者乗虜百勝之後慨然請行究所施爲無愧人臣之義論其成敗是亦兵家之常矧權重一方愛憎易致逺在千里疑似難明然則道路怨謗之言與夫臺諌風聞之誤盖無足恠比復召浚置之宥宻而觀浚恐懼怵惕如不自安尚慮中外或有所未察歟夫使盡忠竭節之臣懐明哲保身之戒朕甚愧焉可令學士院降詔出牓朝堂時太史局占明年當日食正旦公奏曰臣聞太史推測天象以來年正月之旦日有食之臣竊惟天之愛人君必示以災變使之恐懼修省勉求爲治人主修德畏天則天心眷佑享國無窮如其怠忽不省歸之時𢾗禍有不可勝言者矣然而應天之道在實不在文當求之於心考之於行心有未至者勉之行有不善者改之如天之無不公如天之無不容如天之至誠無私而不失其信則何憂乎治道之不興何患乎賢才之不至哉公旣受命即日赴江上視師時大酋兀术擁兵十萬于維揚朝廷先遣魏良臣王繪奉使軍前還夜與公逮于中塗公問以虜事及大酋問答良臣繪謂虜有長平之衆且喻良臣等當以建州以南王爾家爲小國索銀絹犒軍其數千萬又約韓世忠尅日過江决戰公宻奏使人爲虜恐怵朝廷切不可以其言而動及不須令更往軍前恐我之虚實反爲虜得上然之公遂疾驅臨江召大帥韓世忠張俊劉光世與議且勞其軍將士見公來勇氣十倍旣部分諸將遂留鎮江節度之令韓世忠移書兀术爲言張樞宻已在鎮江𥘉虜諜報公得罪逺貶故悉力來冦至是兀术問世忠所遣麾下王愈吾聞張樞宻貶嶺外何得巳在此愈出公所下文書兀木見公書押色動即強言約日當戰公再遣愈以世忠書往問戰期愈回一日而虜宵遁士馬乏食狼狽死者相屬遣諸將追擊所俘獲甚衆上遣内侍趣公赴行在所五年二月十二日宣制除公宣奉大夫尚書右僕射同中書門下平章事兼知樞宻院事都督諸路軍馬而趙鼎除左僕射先是公在川陜念上繼嗣未立以紹興元年八月十五日上奏曰臣荷陛下恩德之厚事有干於宗廟社稷大計臣知而不言誰敢爲陛下言者惟陛下察其用心貸以萬死臣恭惟陛下自即位以來念兩宫倚託之重夙夜憂勤不近聲色不事玩好是宜天地感格祖宗垂祐受福無窮决致中興臣之區區亦冀依日月之末光獲保終年少效𥙷報臣竊見西漢之制人君即位首建儲嗣所以固基本屬人心臣願陛下時詔大臣講明故事仍先擇宗室之賢優禮厚養以爲藩屏至是入謝復陳宗社大計莫先儲嗣雖陛下聖德昭格春秋方盛必生聖子惟所以系天下之心不可不早定議上首肯乆之乃云宫中見養二人長者藝祖之後年九歲不乆當令就學公出見趙鼎都堂相與仰歎聖德乆之自是與鼎益相勉厲同志恊謀以爲爲治之要必以正本澄源爲先務誠能陳善閉邪使人君無過舉則國勢尊安醜虜自服是以進見之際於塞倖門抑近習尤諄切致意焉嘗奏曰王者以百姓爲心修德立政惟務治其在我則大邦畏其力小邦懐其德天下捨我將安歸哉固不僥倖於近績也仰惟陛下躬不世之資當行王者之事以大有爲正心以正朝廷正朝廷以正百官正百官以正萬民國勢旣隆強虜自服天下自歸因書王朴平邊䇿以獻上嘉納焉又奏臣昨奉清光竊見陛下於君子小人之際反覆詳究退自慶幸以爲治道之本莫大夫辨君子小人之分聖意孜孜于此宗社生靈之福也昔唐李德𥙿言於武宗曰邪正二者勢不相容正人指邪人爲邪邪人亦指正人爲邪人主辨之甚難臣以爲正人如松栢特立不倚邪人如藤蘿非附他物不能自起臣嘗推類而言之君子小人見矣大抵不私其身慨然以天下百姓爲心此君子也謀身之計甚宻而天下百姓之利害我不顧焉此小人也志在於爲道不求名而名自歸之此君子也志在於爲利掠虚美邀浮譽此小人也其言之剛正不撓無所阿狥此君子也辭氣柔佞切切然伺候人主之意於眉目顔色之間此小人也樂道人之善惡稱人之惡此君子也人之有善必攻其所未至而掩之人之有過則欣喜自得如獲至寳旁引曲借必欲開陳於人主之前此小人也難進易退此君子也叨冐爵禄蔑無㢘恥此小人也臣嘗以此而求之君子小人之分庻幾其可以槩見矣小人在位則同於巳者譽之以爲君子異於巳者排之以爲小人不顧公議不恤治亂不畏天地鬼神是以自崇觀以來以至今日有異於巳者而稱其爲君子乎臣以爲必無之也彼其專爲進身自營之計故好惡不公以至於忘身忘家亂天下而莫之悔惟陛下親學問節嗜欲清明其躬以臨照百官則君子小人之情狀又何隱焉上還臨安公留相府未閱月復出江上勞軍至鎭江召韓世忠親喻上㫖使舉軍前屯楚州以撼山東世忠欣然受命即日舉軍渡江公至建康撫張俊軍至太平州撫劉光世軍軍士無不踴躍思奮時巨冦楊么據洞庭重湖朝廷屢命將討之不克公念建康東南都㑹而洞庭實據上流今冦日滋壅遏漕運格塞形勢爲腹心害不先去之無以立國然冦阻重湖春夏則耕耘秋冬水落則收糧于湖寨載老小于泊中而盡驅其衆四出爲暴前日朝廷反謂夏多水潦屢以冬用師故冦得倂力而我不得志今乗其怠盛夏討之彼衆旣散一旦合之固巳疲於奔命又不得守其田畒禾稼蹂踐則有秋冬絶食之憂黨與必携可招來也雖巳命岳飛徃而兵將未必諭此意或退兵殺戮則失勝筭傷國體遂具奏請行上許焉公在道念國家任事不顧身者常遇禍而畏避崇虚譽者常獲福以爲國之大患奏曰今未有疾於此正在膏肓庸醫畏縮方且戒以勿吐勿下姑進參苓而安養之雖終至於必死主人猶以爲愛巳也乃若良醫進剖胷洗腸之術旁觀駭愕指以爲狂至其疾良巳尚不免於輕試之謗自古掠美附衆者得譽常多而骨鯁當權者負謗常重澶淵之役冦凖决䇿親征功存社稷事定之後姦臣乃謂其輕棄萬乗今合天下之力以誅天下之不義雖湯武復生亦必出此而顧乃爲恐懼顧慮之計何由而事功可集哉盖公所以自任者始終如此故每因事爲上言之行至醴陵獄犴數百人盡楊么遣爲間探者帥席益傳至逺縣囚之公召問盡釋其縛給以文書俾分示諸寨曰爾今旣不得保田畒秋冬必乏食且餒死矣不若早降即赦爾死數百人驩呼而徃五月十一日至潭州於是賊寨首領黃誠周倫先請受約束然誠等屢嘗殺招安使命猶自疑不安公遣岳飛分兵屯鼎澧益陽壓以兵勢其黨大恐相繼約日來降丁壯至五九萬老弱不下二十萬公一切以誠信撫之六月湖冦盡平乃更易郡縣姦贓吏宣布寛恩上手書賜公曰覽奏知湖冦已平非卿孜孜憂國不憚勤勞誰能寛朕憂顧奏到之日中外歡賀萬口一詞以謂上流旣定則川陜荆襄形勢接連事力増倍天其以中興之功付之卿乎於是公奏遣岳飛之軍屯荆襄圖中原遂率官屬吏兵泛洞庭而下時重湖連年舟楫不通公舟始行風日清夷父老歎息以爲變殘賊呻吟之區爲和氣也始公定議令韓世忠屯承楚於高郵作家計及公出征而廷議中變公復請去上悟優詔從公𥘉計公旣兩發儲嗣之議至是聞建資善堂皇子出就傅喜不自勝以爲當以擇師傅爲先遂具奏薦起居郎朱震祕閣修撰范冲可任訓導之選公雖在外常以内治爲憂毎有見輙入奏其一謂自昔人君命相與之講論天下大計次第而施行之故日積月累成効可必譬之營室先度基阯次定規模付諸匠者以責其實一有不合安可輕委自建炎以來陛下選用大臣未知責以何事而大臣進說於陛下未知何以奉詔臣但見一相之入引進親舊報讎復怨以行其私意而巳欲望國家之治安其可得乎其二謂祖宗置臺諌本慮夫軍民之利害人才之善惡官吏之能否廟堂不能盡見而周知臺諌得以風聞而論列不幸大臣不得其人則臺諌力争明辨以去之耳今乃不然隂肆揣摩公爲反覆或伺候人主之意或宻結大臣之私捃摭細故以示其公人主不可以不察也其三謂祖宗時郎曹之選非累歴親民不以授自臺閣而爲守貳者十甞七八盖使之更歴世故諳曉民情養成其材以備任使今則不然事口記者可至言官弄文采者皆升館職日進月遷驟竊要位一居京局視州縣爲冗官故有爲大臣而不知民情之休戚財用之盈虚軍政之始末者有爲侍從而不知州縣所宜施行者况責以任天下大計哉上嘉納焉公自岳鄂轉淮西東諸將大議防秋之宜直至承楚僞境震動上念公乆勞于外遣中使賜手書促歸制除公金紫光禄大夫公力辭至四五乃許特封公母計氏秦國夫人賜公兄滉紫章服及五品服二人官公親屬兩人公以十月十一日至行在上勞問曰卿暑行甚勞然湖湘羣盗旣就招撫以成朕不殺之仁卿之功也公頓首謝曰陛下誤知使當重任故臣得效愚計上親書周易否㤗卦以賜焉公奏自古小人傾䧟君子莫不以朋黨爲言夫君子引其類而進志在於天下國家而巳其道同故其所趨向亦同曾何朋黨之有惟小人則不然更相推引本圖利禄詭詐之蹤莫可跡究或故爲小異以彌縫其事或内外符合以信實其言人主於此何所决擇而可哉則亦在夫原其用心而巳矣臣嘗考㤗之𥘉九㧞茅茹以其彚征而象以爲志在外盖言其志在天下國家非爲身故也否之𥘉九㧞茅茹以其彚貞而象以爲志在君則君子連類而退盖將以行善道而未始忘憂國愛君之心焉觀二爻之義而考其用心則朋黨之論可以不攻而自破矣臣又觀否㤗之理起於人君一心之微而利害及於天下百姓方其一念之正其畫爲陽㤗自是而起矣一念之不正其畫爲隂否自是而起矣然而㤗之上六三隂巳盡復變爲陽則小人在外而㤗之所由以生焉當今時適艱難民墜塗炭陛下若能日新其德正厥心於上臣知其將可以致㤗矣異時天道悔禍幸而康寧則願陛下常思其否焉上嘗召公獨對便殿問所宜爲公退奏曰臣竊惟二帝皇族逺處沙漠憂憤無聊與夫輕侮受辱可想而見也尚忍言之哉臣嘗屈指計之如此者盖三千晝夜矣虎狼用意實欲摧折而消磨之也雖然此尚以陛下緫師于南耳異時或一有差跌其禍可勝言乎今事雖有可爲之幾理未有先勝之道盖兵家之事不在交鋒援戰然後勝負可分要在得天下之心則士氣百倍虜叛歸服雖然是豈可以聲音笑貌爲哉心念之間一毫有差四海共知今使天下之人皆曰吾君孝弟之心須臾不忘寢食之間父兄在念當思共爲陛下雪讎矣皆曰吾君之朝君子在位小人屏去侍御僕從罔匪正人譛說不行邪言不入市井之談不聞道義之益日至則内外安心各服其職而有才智者悉思盡其力矣皆曰吾君棄珠玉絶弄好輕犬馬賤刀劒金帛之賞不以予幸惟以予功則上下知勸矣以至吾君言動舉措俱合禮法至誠不倦上格於天則望教化之可行矣如是則將帥之心日以壯士卒之心日以奮天下百姓之心日以歸夷狄雖號荒服然非至若禽獸也聞陛下之盛德知中國之理直則氣折志䘮小大雖異戰必不力衆必不同則陛下何爲而不可成乎或有不然疑似之說毫髪著見天下之人口不敢言而心敢怒異日事乖勢去禍亂立作如覆水之不可救也盖隙見於此則心生於彼不易之道自古爲君之難非特今日也一言之失一行之非或失色於人或失禮於人或一小人在側便足以致禍致難起戎起兵前日明受之變大逆之徒陳兵闕下旁引他辭其監不逺也爲人上者其可不兢畏戒懼耶其警戒深切如此上皆嘉納且命公以所見聞置䇿來上公承命條列以進號中興備覽凡四十一篇立國之本用兵行師之道君子小人之情狀駕馭將帥之方均節財用之冝聽言之要待近習之道以至旣往之得失郡縣之利病莫不備具上深嘉歎置之坐隅六年正月上謂公曰朕每以事幾難明專意精思或逹旦不寐公奏曰陛下以多難之際兩宮幽處一有差失存亡所系慮之誠是也然臣嘗聞之聽雜則易惑多畏則易移以易惑之心行易移之事終歸於無成而巳是以自昔君人者修巳正心惟使仰不愧于天俯不怍於人持剛徤之志洪果毅之實爲所當爲曾不它䘏陛下聦明睿知灼知古今苟大義所在斷以力行夫何往而不濟乎臣願萬機之暇保養天和澄静心氣庻幾利害紛來不至疑惑以福天下以建中興公以虜勢未衰而叛臣劉豫復據中原爲謀叵測不敢皇寧處于朝奏請親行邊塞部分諸將以觀機㑹上許焉即張榜聲豫僣逆之罪以是月中旬啓行公謂楚漢交兵之際漢駐兵殽澠間則楚不敢越境而西盖大軍在前雖有它岐捷徑敵人畏我之議其後不敢踰越而深入也故太原未䧟則粘罕之兵不復濟河亦以此耳論者多以前後空闕虜出它道爲憂曾不議其糧食所自來師徒所自歸不然必環數千里之地盡以兵守之然後爲可安乎旣以此告于上又以此言於同列惟上深以公言爲然至江上㑹諸帥議事命韓世忠據承楚以圖淮陽命劉光世屯合淝以招北軍命張俊練兵建康進屯旴眙命楊沂中領精兵爲後翼佐俊命岳飛進屯襄陽以窺中原形勢旣立國威大振上遣使賜公御書裴度傳以示至意公於諸將中尤稱韓世忠之忠勇岳飛之沉鷙可倚以大事世忠在楚州時入僞地叛賊頗聚兵世忠渡淮擊敗之直引兵至淮陽而還士氣百倍上手賜書公曰世忠旣捷整軍還屯進退合宜中外忻恱每患世忠發憤直前奮身不顧今乃審擇利便不失事機亦卿指授之方卿宜明審虚實徐爲後圖或遣岳飛一窺陳蔡使賊支吾不暇以逸待勞時飛母死扶護葬廬山公乞御筆敦趣其行飛奉詔歸屯公身任輔相雖督軍在外朝廷有大差除不容不預議而孟庾除知樞宻院及高世則除節度使皆不知始末具奏以爲如此則臣不當在相位上親筆喻指焉公以東南形勢莫重建康實爲中興根本且人主居此則北望中原常懐憤惕不敢自暇自逸臨安僻居一隅内則易生安肆外則不足以號召逺近係中原之心奏請車駕以秋冬臨建康撫三軍以圖恢復公又渡江遍撫淮上諸屯屬方盛暑公不憚勞人人感恱時防秋不逺公以方略諭諸帥大抵先圖自守以致其師而乗幾擊之六月制加公食邑食實封時公所遣人自燕山回知徽宗皇帝不豫又聞欽宗皇帝所貽虜酋書奏曰臣近得此信不勝臣子痛切憤激之情仰惟陛下處天子之尊遭父兄之變聖懐惻怛勤切于中固不止坐薪嘗膽也臣願陛下至誠剛健勉強有爲成敗利害在所不恤彼藉姑息之論納小忠之說者爲一巳妻孥計耳使天有志於中興陛下奮然决爲躬冐矢石事無不濟使天無意乎中興陛下雖過爲計慮以圖一身之安曽何𥙷於事乎但當盡其在我一聽天命而巳况夫孝弟可以格天仁厚可以得民推此心行之臣見其福不見其禍也七月有詔促公入覲八月至行在時張俊軍巳進屯盱眙三帥鼎立而岳飛遣兵入僞地直至蔡州焚其積聚時有俘獲公力陳建康之行爲不可緩朝論同者極鮮惟上斷然不疑車駕以九月一日進發逮至平江公又請先徃江上諜報叛賊劉豫及其姪猊挾虜來冦公奏虜疲於奔命决不能悉大衆復來此必皆豫兵公旣行而邊遽不一大將張俊劉光世皆張大賊勢争請益兵自趙鼎而下莫不恟懼至欲移盱眙之屯退合淝之師召岳飛盡以兵東下公獨以爲不然以書戒俊光世曰賊豫之兵以逆犯順若不盡勦何以立國平日亦安用養兵爲今日之事有進擊無退保時楊沂中爲張俊軍統制公令沂中徃屯濠梁且使謂之曰上待統制厚宜及時立大功取節鉞或有差跌某不敢私諸將悚懼聽命公至江上知來爲冦者實劉麟兄弟豫封麟淮西王兵凡六萬人冦巳渡淮南渉夀春逼合淝公調度旣巳定矣而張俊請益兵之書日上劉光世亦欲引兵退保劉豫又令郷兵僞胡服於河南諸州十百爲群由此間者皆言處處有虜騎趙鼎及簽書樞宻院事折彦質惑之移書抵公至七八堅欲飛兵速下又擬條畫項目乞上親書付公大略欲俊光世沂中等退師善還爲保江之計不必守前議公奏俊等渡江則無淮南而長江之險與虜共矣淮南之屯正所以屏蔽大江向若叛賊得㩀淮西因糧就運以爲家計江南其可保乎陛下其能復遣諸將渡江擊賊乎淮西之冦正當合兵掩擊令士氣益振可保必勝若一有退意則大事去矣又岳飛一動則襄漢有警復何所制願陛下勿專制于中使諸將不敢觀望上手書報公曰朕近以邊防所疑事咨問於卿今覽卿奏措置方略審料敵情條理明甚俾朕釋然無復憂顧非卿識慮高逺出人意表何以臻此是時内則廟堂外則諸將人人畏怯務爲退避自全之計雖公逺䇿之忠始終不貳然握兵在外間隙易生向非主上見幾之明不惑羣議則諸將必引而南大勢傾矣及奉此詔異議乃息而諸將亦始爲固守計旣而賊大張聲勢於淮東阻韓世忠承楚之兵不敢進楊沂中亦以十月四日抵濠州公聞光世巳舎廬州而南淮西人情恟動星夜疾馳至采石遣諭光世之衆曰有一人渡江即斬以狥光世聞公來采石大恐即復駐軍與沂中接連相應劉猊分麟兵之半來攻沂中是月十日沂中大破猊於藕塘降殺無遺猊僅以身免麟㧞寨遁走虜獲甚衆得糧舟四百餘艘於是公奏車駕宜乗時早幸江上上賜手書曰賊豫阻兵梟雛犯順夾淮而陣侵夀及濠卿獎率師徒分布要害臨敵益壯仗義直前箕張翼舒風馳電掃遂使凶渠宵遁同惡自焚觀草木以成兵委溝壑而不顧昔周瑜赤壁之舉談笑而成謝安淝上之師指揮而定得賢之効與古何殊寤寐忠勤不忘嘉歎公奏曰逆雛逺遁尚稽授首之期金寇方強未見息戈之日臣之罪大何所逃刑願陛下念十年留滯之非歎雙馭還歸之晚儻爲民而勞巳當有神以相身無使自謀擇利之言得惑至高無私之聽又上奏以賊臣邇者輒入邊塞今雖勝捷而渠魁遁去殺戮雖衆亦吾赤子致彼操戈而輕犯由臣武備之弗嚴願賜顯黜以允公議上深嘉歎焉有㫖都督府隨行官吏軍兵諸色人等備見勤勞可令張某等第保奏公奏馳驅盡瘁職所當然賞或濫加士將解體乞上保奏戰功庻可旌勸軍士又遣内侍賜公古端石硯筆墨刀劒犀甲且召公還及至平江隨班朝見上曰却賊之功盡出右相之力於是趙鼎惶懼乞去方公未至平江時鼎等巳議回蹕臨安公入見之次日具奏曰昨日獲聞聖訓惟是車駕進止一事利害至大盖天下之事不唱則不起不爲則不成今四海之心孰不思戀王室虜叛相結脅之以威雖有智勇無由展竭三歳之間頼陛下一再進撫士氣從之而稍振民心因之而稍回正當示之以形勢庻幾乎激忠起懦而三四大帥者亦不敢懐偷安苟且之心夫天下者陛下之天下也陛下不自致力以爲之先臣懼𬒳堅執銳履危犯險者皆有解體之意今日之事存亡安危所自以分六飛儻還則有識解體内外離心日復一日終以削弱異時復欲下廵幸詔書誰能深信而不疑者何哉彼知朝廷姑以此爲避地之計實無意於圖回天下故也論者不過曰萬一秋冬有警車駕難於逺避夫軍旅同心將士用命扼淮而戰破敵有餘况陛下親臨大江氣當百倍苟士不効力人有離心陛下雖過自爲計將容足於何地乎又不過曰當秋而進士有戰心及春而還絶彼窺伺爲此論者特可紓一時之急應倉卒之警使年年爲之人皆習熟謂我不競當有怨望難乎其立國矣又不過曰賊占上流順舟而下變故不測夫襄漢我所有也賊舟何自而來使虜叛事力有餘果然淩犯水陸偕進自上而濟陛下雖深處臨安亦能以安乎矧惟陛下負四海之重責有爲而未成天下猶矜怜而歸心於陛下不爲而坐待其盡其爲禍可勝言耶要湏剛大志氣恢廓度量以拯救天下爲心仰不愧於天俯不怍於人度事而爲審時而動先謀自治利而誘之致而破之何難而不可濟今臣侍陛下以還歸在臣之謀無所任責臣亦得計矣而爲陛下國家計則爲不忠是以披心腹露肝膽反復一二言之惟陛下詳教而曲諭焉庻幾君臣之間得盡其道不貽萬世之悔上翻然從公計十二月趙鼎出知紹興府專委任公公謂親民之官治道所急而比年以來内重外輕祖宗之法盡廢流落于外者終身不獲用經營于内者積歲得美官又官于朝者不歴民事利害不明詔令之行職事之舉豈能中理民多𬒳其害遂條具以聞郡守監司有治狀任滿除郎郎曹資淺未經民事之人柣滿除監司郡守令中書省御史䑓籍記姓名回日較其治効優加擢用治民無聞者與閑慢差遣舘職未歴民事者除通判郡守殿最如前仍乞降詔又以災異奉復賢良方正科上皆從之七年正月上以公去冬郤敵之功制除特進公懇辭再四先是十二月以禄令成書加金紫光禄大夫公辭不得即求回授兄滉至是上謂公曰卿每有遷除辭之甚力恐於君臣之義有未安也公乃奉命晦庵先生朱文公文集第九十五卷上候官縣儒學訓導劉簮校晦庵先生朱文公文集卷第九十五下行狀少師保信軍節度使魏國公致仕贈太保張公行狀下公與趙鼎當國時議徽宗在沙漠當遣信通問遂遣問安使何蘚等行是年正月二十五日蘚歸報徽宗皇帝寧德皇后相繼上僊上號慟擗踊哀不自勝公奏天子之孝與士庻不同必也仰思所以承宗廟奉社稷者今梓宫未返天下塗炭至讎深恥亘古所無陛下揮涕而起歛髪而趨一怒以安天下之民臣猶以爲晚也數日後求奏事深陳國家禍難涕泣不能興因乞降詔諭中外上命公具草以進親書付外其詞曰朕以不敏不明託於士民之上勉求治道思濟多艱而上帝降罰禍延于我有家天地崩裂諱問逺至鳴呼朕負終身之戚懐無窮之恨凡我臣庻尚忍聞之乎今朕所頼以宏濟大業在兵與民惟爾小大文武之臣早夜孜孜思所以治兵䘏民輔朕不逮皇天后土實照臨之無或自暇不䘏朕憂又以公請命諸大將率三軍發哀成服中外感動公退又具奏待罪曰仰惟陛下時遇艱難身當險阻圖回事業寢食不遑所以思慕兩宫憂勞百姓未嘗一日忘也臣之至愚獲遭任用在諸臣先毎因從容語及北狩事聖情惻怛淚必數行臣感慨自期願殱虜讎十年之間親養闕然爰及妻孥莫之私顧其意亦欲遂陛下孝養之至拯生民塗炭之難則臣之事親保家庻幾得矣昊天不弔禍變忽生使陛下抱無窮之痛積罔極之思哀復何言罪將誰執載念昔者陜蜀之行陛下丁寧告戒且曰我有大隙干虜刷此至恥惟臣是屬而臣終隳成功使賊無憚况以沙漠之墟食飲憂慮兩宫處此違豫固宜今日之禍端自臣致尚叨近輔實愧心顔伏願明賜罷黜亟正典刑仰以慰上皇在天之靈俯以息四海怨怒之氣上降詔起公視事公再上䟽待罪不獲請車駕以二十七日發平江三月十一日至建康時公緫領中外之政㑹車駕廵幸又值國䘏幾事叢委公以一身任之至誠惻怛上下感動人情頼公以安毎對必深言讎恥之大反復再三上未嘗不改容流涕上方厲精克巳務自損節戒飭宫庭内待等無敢少有越度者事無巨細必以咨公賜諸將詔㫖往往命公擬進未嘗易一字四方有災異公必以聞祥瑞則皆抑不奏知果州宇文彬通判龎信孺進嘉禾九穗並鐫秩放罷而四方皆知朝廷好惡所在矣四月公行淮西撫喻諸屯築廬州城治東西關且申防秋備自公來東南太夫人留蜀及再入政府遣人迎侍太夫人安于蜀未即出上爲降㫖召公兄滉俾迎侍而來又遣内侍胡宗回往喻意五月始逹建康而公亦自淮西歸上疊遣中使勞問太夫人賜予稠疊公戴星而出經處國事至暮入侍色養委曲奉承中外觀感歆慕傳相告語以爲美談自公與趙鼎在相位以招來賢才爲急務從列要津多一時之望百執事奔走效職不敢自營人號爲小元祐而公尤未嘗以恩澤私親戚仲兄滉上知其賢累欲加以異恩公輒辭及賜進士第後省官繳駁公非惟不加忤且奏不當以臣故沮後省公議外舅宇文時中政和中爲郎出守大藩舊巳寓直萬里召赴僅進職知湖州舅氏計有功乆在幕府得直徽猷閣公止乞就祕閣人服其公公以人主當務講學以爲脩身致治之本薦河南門人尹焞宜在講筵有㫖趣赴闕㑹旱災且自太夫人以次闔門悉卧病公力求去至再四不得方車駕在平江時公歸自江上奏劉光世握兵數萬無復紀律沈酣酒色不䘏國事語以恢復意氣怫然宜賜罷斥用警將帥上然之罷光世而以其兵盡屬督府公命參謀兵部尚書吕祉往廬州節制公又自往勞之人情恊附上下帖然而樞宻使秦檜知樞宻院事沈與求意以握兵爲督府之嫌奏乞置武帥臺諌觀望繼有請乃以王德爲都統制即軍中取酈瓊副之公歸以爲不然奏論之而瓊等亦與德有舊怨與其下八人列狀訴御史臺乃命張俊爲宣撫使楊沂中劉錡爲制置判官以撫之此軍自聞王德爲帥往往懐疑而酈瓊遂隂有異志唱揺其間八月八日瓊等舉軍叛執吕祉以行欲渡淮歸劉豫祉不肯渡詈瓊等碎齒折首以死公遂引咎力求去位上不得留因問可代者公辭不對上曰秦檜何如公曰近與共事始知其暗上曰然則用趙鼎遂令公擬批召鼎旣出檜謂公必薦巳就閤子與公語良乆上遣人促進所擬文字檜始錯愕而出後反謂鼎上召公而張丞相遲留至上使人促始進入檜之交諜類此公本以檜靖康中建議立趙氏不畏死有力量可與天下事而一時仁賢薦檜尤力公遂椎引旣同朝始覺其顧望包藏故臨行因上問及之先是公遣人賫手榜入僞地云劉豫本以書生𬒳遇太上皇帝曽居言路主上嗣極擢守郷郡當山東之要衝任濟南之委寄眷禮殊厚責望至深俄聞率衆以請降旋乃失身而據位諒亦迫於畏死姑務偷生如能誘致金人使之疲弊精兵徤馬漸次消磨兹誠報國之良圖亦爾爲臣之後効更須愛惜民力勿使傷殘儻或永懐異心自致顯戮豈惟皇天后土有所不容抑恐義士忠臣終懐憤疾金虜用事者見此榜巳疑豫八月豫聞王師欲北向遣韓元英告干虜謂南冦張某緫領烏合之兵或逼宿亳或窺陳蔡或出㐮陽増修器甲趣辦軍裝其志不小先起制人後起制於人欲乞兵同舉虜得此報謂豫眞欲困巳益疑之㑹瓊等叛去公復多遣間散持蠟書故遺之大抵謂豫巳相結約故遣瓊等降而豫又乞兵于虜十月虜副元帥兀术徑領兵來廢豫惜其機㑹之來公巳去位矣盖公以九月五日得請授觀文殿大學士提舉江州太平興國宫左司諌王縉奏乞晋公即日𥙷外都官郎中趙令衿繼上䟽亦罷去而御史中丞周祕殿中侍御史石公揆右正言李誼交章詆公未巳旋落職以朝奉大夫祕書少監分司西京永州居住於是趙鼎復當國而車駕自江上還臨安矣公岀任國事每以不得從容盡子職爲念及旣去國太夫人以公退處欣然從之八年二月抵永左右侍旁凡所以順承親意者無不曲盡太夫人安之不知其爲遷謫也然公自以爲上遇我厚雖流離逺屏亦未嘗一念不在朝廷作草堂旁近以奉版輿遊歴命以三省爲文紀之曰予作堂于寓止客館之東隅僅庇風雨取曾子三省之目以名之其省謂何思吾之忠於君孝於親修於巳者恐或未至也士大夫學聖人之道當求所以通天人之際予之三省將有進於斯而愧其未能也則公之所深省而自得者逺矣是歲秦檜巳得政始决屈巳和戎之議九年正月詔書至永公伏讀恐懼寢食不安移書參知政事孫近大略曰魯仲連不尊秦爲帝且云連寧有蹈東海而死盖知帝秦之禍遲發而大况我至讎深隙廼欲脩好而幸目前少安乎異時歲幣求増而不巳使命絡繹以來臨以至更立妃后變置大臣起罷兵之議建入覲之謀皆或有之矣某是以伏讀詔書不覺戰汗幸公深思宻以啓沃又聞故人李光自洪州召入政府復以此意移書抵之懐不自巳又具劄子以奏曰恭覩詔書之頒再三伏讀通夕不寐今日事之虗實姑未論借令虜中有故上下分離天屬盡歸河南遂復我必德其厚賜謹守信誓將來人情益觧士氣漸消彼或内變旣平指瑕造隙肆無厭之欲發難從之請其將何詞以對顧事理可憂有甚於此者陛下焦心勞慮積意兵政精誠感格將士漸孚一旦北靣事虜聽其號令遊談之士取功於一時忠勲之臣置身於無用小大將帥孰不解體陛下且欲經理河南而有之臣知其無與赴功而共守者矣今從約之遽肆赦之速用世儒之常說答猾虜之詭秘措置失緒不勝寒心願陛下思宗社之計圖恢復之實逼之以大勢庻乎國家可得而立臣罪戾之餘一意養親深不欲論天下事顧惟利害至大至重不忍緘黙以負陛下之知惟陛下晋意二月以大霈復宣奉大夫提舉臨安府洞霄宫任便居住公復具劄子曰竊惟今日事勢處古今之至難一言以斷之在陛下強勉圖事而巳陛下進而有爲則其權在我且順天下之心間雖齟齬終有莫大之福陛下退而不爲則其權在敵且怫天下之心今雖幸安後將有莫大之憂夫在彼者情不可保在我者心不可失外狥敵國内罹實害智者所不爲也仰惟聖慈深計審慮茂圖大業永福元元又自作謝表云敢不專精道學黽勉身修求以事親方謹晨昏之養庻幾報國敢忘藥石之規視此則公許國之忠爲如何哉居旬日又具劄子曰自陛下回駐臨安甫閱歳時聖心之所經營朝論之所啇確專意和議庻幾休息莫不幸其將成矣臣嘗不寐以思屈指而計虜人與我讎釁之深設心措意果欲存吾之國乎抑願其委靡而遂亡也臣意其力弱未暇姑借和以怠我之心勢盛有餘將求故以乗吾之隙理旣甚明事又易見然則紛紛異議可端拱而决矣料虜上䇿還梓宫復母后輿地來歸不失前約結懽篤好以怠我師遲之数年兵無戰意然後遣一介之使持意外之詔假如變置大臣更立妃后將何以塞請虜出中䇿則必重邀求責徽禮失約爽信近在朞年中原之地將有所付如梁武之立北魏王顥者尚庻幾於前虜岀下䇿怒而興師直臨江表勢似可愕而天下之亂或從此而定矣是月復資政殿大學士知福州兼福建路安撫大使公以太夫人念郷不欲東去力辭至再三四月公奏前論講和事未蒙開納又具劄子曰竊惟陛下建炎𥘉載嘗歴大艱天意至深益彰聖德前事不忘後事之鑑伏願亟收人心務振士氣權勢專制操縱自我外之醜虜曷發敢侮之謀内之羣帥益堅盡節之志天下國家我所自定宋之社稷永永無窮夫理有近利亦有深憂有天下者當審機㑹度人情斷大義持柄握權不以與敵腐儒寡能逺見事至而悔將何及焉况夫今日事機尚可因權適變速於救藥惟望聖慈斷以無疑則天下幸甚八月聞虜遣使來以詔諭爲名則又具奏曰臣近者累輸瞽說仰凟聖明誠以憂君過慮不能自息竊惟天下之事有置必有廢有與必有奪虜以詔諭爲名持廢置與奪之大柄且其蓄謀起慮欲以沮人心奪士氣而坐傾吾國臣之所憂不但目前也劉先主曰濟大事以人心爲本此存亡之大計願陛下考臣前後所奏晋神母忽焉福州之命旣累辭不獲公念時事多虞惟在近或可以𥙷報萬一遂受命而東九月至閩中閩素號徤訟難治公謂人心一也正由臨民者先有逆詐億不信之心是以不能感格入境一切諭以義理飭守令誠意民事令郷里長老知書者率勸後生及疆悍者無爲郷黨羞民皆感仰每出觀者至升屋登木如堵墻十年正月上遣中使撫問公附奏謝且曰願陛下全養精神剛大志氣惟果惟斷見幾見㣲察彊弱於言辭之際轉禍福於談笑之間無使噬臍爲天下笑時虜中變盟約復取河南公奏曰臣竊念自群下决回鑾之議國勢不振事機之㑹失者再三向使虜出上䇿還梓宮歸兩殿供湏一無所請宗族隨而盡南則我德虜必深和議不㧞人心懈怠國勢寖㣲異時釁端卒發何以支持臣知天下非陛下之有矣今幸上天警悟虜懐反復士氣尚可作人心尚可回願因權制變轉禍爲福用天下之英才據天下之要勢奪敵之心振我之氣措置一定大勲可集臣又有臆見當燕山新復朝廷恃郭藥師爲固一旦醜虜敗盟藥師先叛何則賣國無恥之人本無它長難與共事願陛下每以爲鑑制御於早無忽繼聞淮上有警連以邊計奏知又條畫海道舟舡利害上嘉公之忠遣中使奬諭公時大治海舟至千艘爲直指山東之計以俟朝命在郡細大之務必躬必親人人感恱和氣薫然訟事清簡山海之寇招捕無餘間引秀士與之講論閩人化之十一年三月劉錡大破兀术于順昌錡本晚出公一見關陜竒之即付以事任錡亦感慨自立公歸薦之上謂錡才識諸將莫及而一時輩流嫉其材能出巳右百計沮遏公旣平湖寇即薦知岳州巳而召赴行在左右扶持付以王彦軍且擢爲騎帥至是錡竟以所部成大功方欲進兵乗虜虚而檜召錡還矣錡還朝上見之首曰張某可謂知人檜遣郎官蓋諒來諷公使附其議當即引公爲樞宻使公答檜書歴言和不可成虜不可縱且靣爲諒言諒歸檜怒時幕將等歸自虜朝廷復遣劉光逺等奉使而公亦力請祠奉親矣十一月除檢校少傳崇信節度使充萬夀觀使免奉朝請去福之日軍民送者咨嗟號泣相屬於道公以蜀逺朝廷不欲徑歸遂奉太夫人寓長沙十二年太母鸞輅來歸制封公和國公具劄子以賀且曰與或爲取安必慮危夫惟務農而彊兵乃可立國而禦侮願勤聖慮終究逺圖公恐太夫人念歸乃即長沙城之南爲屋六十楹以奉色養太夫人安焉築堂牓曰盡心親爲之記大意欲益求所以盡心於君親者居間玩意六經考諸史治亂得失益思前事之機㣲憂時之志一飯未嘗忘也檜旣外交仇讎罔上自肆惡嫉正論諱言兵事自以爲時巳太平日爲浮文侈靡愚弄天下獨忌公甚中丞萬俟卨希檜㫖論公卜宅僣擬至倣五鳯建樓上不以爲然檜遺朝士呉秉信以使事至湖南有所案驗且以官爵誘之秉信造公見其居不過中人常産可辦不覺歎息反宻以檜意告公而歸且奏其實檜黜秉信十六年公念檜欺君誤國使災異數見彗出西方欲力論時事以悟上意又念太夫人年高言之必致禍恐不能堪太夫人覺公形瘠問故公具言所以太夫人誦先雍公紹聖𥘉對方正䇿之詞曰臣寧言而死于斧鉞不忍不言而負陛下至再至三公意遂决乃言曰臣聞受非常之恩者圖非常之報拯焚溺之急者乏徐緩之音竊惟當今事勢譬如養成大疽於頭目心腹之間不决不止决遲則禍大而難測决速則禍輕而易治惟陛下謀之於心斷之以獨謹察情僞豫備倉卒猶之奕棊分據要害審思詳處使在我有不可犯之勢庻幾社稷有安全之理不然日復一日後將噬臍異時以國與敵者反歸罪正議此臣所以食不下咽不能一夕安也儻非陛下聖德在人獲天地之祐承祖宗之慶有以照察其心臣亦何所迯罪事下三省檜大怒時公又以天申節手寫尚書無逸篇具劄子爲賀曰臣嘗潜心聖人之經有可以取必於天膺大福獲大夀决然無疑者輙輸丹誠爲陛下獻臣伏考周公無逸篇啇王中宗嚴恭寅畏天命自度治民祗懼不敢荒寧高宗嘉靖啇邦至於小大無時或怨周文王自朝至於日中昃不遑暇食用咸和萬民不敢盤于遊田以庻邦惟正之供三君者非獨身享安榮而有國長乆後世莫加焉啇自祖甲之後立王生則逸不知稼穡之艱難不聞小人之勞惟耽樂之從是以罔或克夀或十年或五六年或四三年天道昭然其應如響古之聖人以一身莅天下惠澤四海無不如意未嘗少有憂懼退怯之懐凡以天道可必吾無愧歉于心而巳臣不勝臣子祝頌之誠願陛下兢兢業業勉之又勉永堅此心以奉天道天之所以報吾君者宜如何哉七月檜命臺諌論公章四上上以特進提舉江州太平興國宫連州居住樊川周勣者氣義人也自公貶永即來相從公帥福唐辟爲屬公來長沙勣亦從居焉檜累書招勣不得恨之乃謂公與勣誹謗時事亦削勣官竄封州公𬒳命即行自夫人以下皆留侍獨挈子姪徃太夫人送之曰汝無愧矣勉讀聖人書無以家爲念公至貶所月一再遣人至太夫人所日夕讀易精思大㫖𫐠之於編親教授其子栻連爲州景物甚勝暇即䇿杖遊歴連人愛重公争持肴果以迎所至必爲曲留終日時檜益肆凶熖遷謫者不絶于道四方觀望公處之恬然形氣益充實太夫人亦安居長沙公在連作四德銘以示其人曰忠則順天孝則生福勤則業進儉則心逸連人相與鑱之於石家傳人誦焉巳巳歲嶺南瘴疫大作日色晝昏官于連者自太守而下死凡數人郡人無不𬒳疾哭聲連巷郷落至有絶㸑者公和藥拯之病者來請日至千餘人惟公家下至僕厮無一人告病過者咨歎莫不以爲天相忠誠也居連凡四年二十年九月移永州湖湘之人見公歸喜甚争出迎望見公所養勝前退皆歎息相賀公遣人迎太夫人以次年四月至永母子相見彊健如𥘉永舊所嘗居人情尤相安而公兄徽猷公遽以疾終方公官于朝及在貶徽猷公常留太夫人左右恱適其意太夫人鍾愛之至是悲惻殆不能爲懐雖公解釋備至太夫人亦年高多疾矣盖公去國至是幾二十年退然自脩若無能者而天下士無賢不肖莫不傾心武夫健將言公者咨嗟太息至小兒婦女亦知天下有張都督也虜人憚公尤甚歲時使至虜中其主必問公安在方約和時誓書有不得輙更易大臣之語盖懼公復用云至是秦檜寵位旣極老病日侵鄙夫患失之心無所不至無君之迹顯然著見意欲先剪除海内賢士大夫然後肆其所爲尤憚公爲正論宗主使巳不得安欲亟加害命臺臣王珉徐嚞軰有所彈劾語必及公至彈知洪州張宗元文始謂公國賊必欲殺之有張柄者嘗奏請令檜乗金根車其死黨也即擢知潭州汪召錫者娶檜兄女嘗告訐趙令衿遣爲湖南提舉官俾共圖公又使張常先治張宗元獄株連及公以爲未足又捕趙鼎子汾下大理獄備極慘酷考掠無全膚令自誣與公及李光胡寅等謀大逆凡一時賢士五十三人檜所悪者㫮與獄上㑹檜病篤不能書判以死時紹興二十有五年也上始復親庻務先勒檜子熺致仕盡斥群兇公迹稍安而太夫人遽薨有㫖復公職觀文殿大學士除判洪州公已在苫塊矣哀苦扶護以治命當歸葬雍公之兆奏請俟命長沙獨念天下事二十年爲檜所敗壊人心士氣委靡銷鑠政事無綱邊備蕩弛幸其一旦隕斃當汲汲惟新令圖而未見所以慰人望者且聞頑顔亮篡立勢巳驕豪必將妄舉可爲寒心自惟大臣義同休戚不敢以居䘮爲嫌五月具劄子曰臣夙負大罪自謂必死瘴癘之地仰惟陛下優容之矜憐之保全之死骨復生盡岀聖神之造自今以往皆巳死之日而陛下實生之臣今雖居苫塊中安敢恝然遂忘陛下恩德且顧惜一巳而黙不出一言庻幾有𥙷萬一哉惟陛下察其用心恕之而巳臣聞自昔忠臣事君莫不欲其主之聖莫不欲其主之名顯日月功盖宇宙彼知夫國家安榮則其身亦與有安榮故犯顔逆指而不敢辭也姦臣不然惟利是圖不復它䘏導君於非使重失天下之心而隂肆其邪志始則曲意媚順而欺蔽人主之聦明終則專事擅權而潜移生殺之大柄跡其包藏有不可勝言者矣然而身㓕國亡族覆世絶見於史冊歴歴可攷天下後世視之曾大豕之不若彼誠果何所利耶惜乎至愚而莫之思也日者陛下法乾之剛而用以沉潜施設中幾天下四夷孰不畏服是臣可言之秋也臣踈逺不復預聞朝廷幾事而伏自思念今日事勢極矣陛下將拱手而聽其自然乎抑將外存其名而愽謀宻計求所以爲長乆歟臣誠過慮以爲自此數年之後民力益竭財用益乏士卒益老人心益離忠臣烈將淪亡殆盡内憂外患相仍而起陛下將何以爲䇿方祖宗盛時嘗與虜通和惟力敵勢均而國家取兵於西北取財於天下文武之才世不乏人是故得以持乆而百四十年之後靖康大變事出不意禍亂之大亘古所無論者猶恨夫恃和爲安而不自治之失今天下幾何譬之中人之家盗據其堂安居飽食其間而朝夕隂伺吾隙一日之間其舎我乎然則陛下不可不深思力圖於此時也或謂虜嘗有弑立之舉夫弑立之人天地所不容人情所甚惡誠能任賢選能脩德立政斷然爲吾之所當爲口不絶和而實以勢臨之彼必有瓦解之憂借使虜不量度輕爲舉動第堅壁清野以持之明示逆順其衆自離虜之危亡可立而待何則人心必不肯附逆而忘順假之五七年而虜之君臣之分定彼國有人得柄用事雖有賢智莫知爲陛下計矣願陛下精思審謀無忘朝夕無使眞有噬臍之歎夫約和衰弱之時謂不能乆而彊虜之變荐生於内是天賛陛下違天不祥陛下其承之臣聞人主之俯仰天地間所以自立其身者不過忠孝二字此天下之大義不可湏臾少忽也而臣行負神明孤苦餘生親養巳無所施矣事有大義所當爲者不過盡忠於陛下顧雖頭目手足有可捐棄而爲陛下用者所不當顧惜而况親逢聖明極力保全恩德至大使臣有懐私顧巳匿情慮禍之心則是陛下不負臣臣實負陛下天地鬼神其肯容之哉是以不顧嫌疑不避鼎鑊不䘏䜛毀爲陛下陳之陛下勿謂軍民之心爲可忽忠良之言爲可棄夫治天下譬如槃水一决而潰有不可收拾者矣陛下其念之哉臣行年六十死亡無日非若紛紛互持和戰之說惟恐其說之不勝而身之不獲用貪目前之得忽乆逺之圖臣知爲陛下國家計耳陛下安榮臣亦預有安榮臣之自謀亦豈有不審耶幸未即隕得終禮制陛下不以臣爲愚而卒棄之願陛下許臣居嚴婺間優游養痾爲陛下謀畫心腹之臣以畢愚盡忠庻幾有𥙷萬一臣之志願足矣惟陛下廓乾坤之度以精求天下之賢無忘祖宗國家之恥父兄宗族之讎盛德大業昭著後世臣猶幸及見之繼𬒳朝命以太夫人之䘮歸蜀八月行至荆南㑹以星變詔求直言公念虜數年間勢决求釁用兵吾方溺於宴安謂虜可信蕩然無備沈該万俟卨據相位尤不厭天下望朝廷益輕顧伏在苫塊經歴險阻死亡無日不得爲上終言之懐不自安乃復奏曰臣受陛下更生大恩今至憂迫身渉險萬里常恐一旦死塡溝壑終無以仰報萬一思以展盡所懐瞑目無憾臣嘗病世儒牽於戰和異同之說而不知實爲一事或者竊儒爲姦不知經史之心切切焉利禄是圖而有以欺惑陛下之聽也又其甚則大姦大惡挾虜懐貳以自封殖其家簧鼓曲說愚弄天下敢畢陳之臣聞天地之大德曰生而天地生物之功本於秋冬盖非嚴凝之於秋冬則無以敷榮之於春夏然則秋冬之嚴凝乃生物之基也在萃之象曰除戎器戒不虞㤗之九二爻辭曰包荒用馮河㤗萃之世聖人謹於武備如此謂不如是不足以生物而行其心也况時方艱難而可忽略不省啓大禍于後反謂是爲得哉若夫一時之和則亦聖賢生利天下之權矣啇湯事葛矣而終㓕葛書曰湯一征自葛始周太王避狄矣築室于岐未幾謀以却敵詩曰乃立冡土戎醜攸行文王事昆夷矣卒伐之詩曰昆夷駾矣維其喙矣越勾踐事呉矣坐薪嘗膽竟以破呉越語曰越十年生聚而十年教訓彼皆翕之乎始而張之乎終汲汲乎德政修立而以生利爲心未嘗恃和爲安自樂其身而已也漢高祖與頃羽和羽歸太公吕后割鴻溝以西爲漢東爲楚良平進言今楚兵罷食盡釋而弗擊是養虎自遺患也漢王從之卒成大業漢文帝與匈奴和曽無間歲之寧漢文全有天下可謂和以息民方是時百姓猶不免侵凌之苦至武帝始一大征伐之其後單于來朝漢三百年間用以無事唐太宗𥘉定天下有渭上之盟未幾李靖之徒深入沙漠之地犁其庭係其酋海内始安焉兹豈非以和爲權而亦得之哉若夫石晉之有天下則不然取之非其道謀之非其人桑維翰始終於和其言曰願訓農習戰養兵息民俟國無内憂民有餘力觀釁而動動無不成若有深謀者然考其君臣所爲名實不孚于上下朝廷之上專務姑息賞罰失章施設繆戾權移於下政私於上無名之獻莫知紀極一時用事方鎮之臣往往昏于酒色厚于賦歛果于誅戮以害于百姓朝廷莫知所以御之所謂訓農習戰養兵息民略無實事維翰所陳殆爲空言姑欲信其當時必和之說以偷安竊位而巳契丹窺見其心謂晉無人須求凌侮日甚一日後嗣不勝其忿始用景延廣之議僥倖以戰而不知其荒淫怠傲失德非一日天下之心巳離天下之勢巳去天下之財巳匱延廣不學不知行聖賢之權亟思所以復其心立其勢彊其國急於兵戰之争事窮勢極數萬之師無一夫爲之發矢北向者至今爲天下嗤笑言君臣委靡不振服役夷狄者必曰石晉云仰惟陛下聦明聖智孝心純一即位以來簡用實才虜人聞風而畏之於是有議和之事陛下以太母爲重且幸徽宗皇帝梓宫之亟還和之權也不幸用事之臣貪天之功肆意利欲乃欲剪除忠良以聽命於虜而隂蓄其邪心方國家閒暇之時怠傲是圖德政俱廢而專於異巳之去意果安在哉夫虜日夕所願望者欲我之忠良淪沒耳欲我之盡失天下之心耳欲我之將士觧體其氣不復振作耳欲我之懷於宴安以甘于酖毒耳前日用事者一切狥其所甚欲而畢爲之不幾乎與虜爲地歟身死之日天下酌酒相慶不約而同下至田夫野老莫不以手加額其背天逆人不忠于君而天下之心重惡之如此且彼曽不思虜之於我其愛之而和乎其有餘力而肯和乎其國中亦有掣肘之虞而和乎其欲圖之於後而和乎臣謂虜有大讎大怨不可復合譬夫一葉之分今日之和必其酋帥携離人心暌異姑爲此舉以息目前而圖回江淮以去除後患之心其中未嘗一日忘也惜夫昏庸姦賊之人豢於富貴闇於政事曽無尺寸之效以上報扵國家毫髪之惠以下及扵百姓分列黨與布在要郡聚歛珍貨獨厚私室爲身謀爲子孫謀而不知爲陛下謀不知爲國家天下謀坐失事機者二十餘年誤陛下社稷大事有識之士誰不痛心且夫賢才不用政事不修形勢不立而專欲責成受命於虜適足以啓輕侮之心而正墮其計中魯仲連所謂彼將有所予奪梁玉安得晏然乎而甚可痛恨者也敵國之人何自而畏敵國之心何自而服敵國之難何自而成遲以歲月百姓離心將士䘮氣亦危亡而巳矣臣願陛下鑒石晉之敗而法啇湯周太王文王之心用越勾踐之謀考唐漢四君之事以保圖社稷深思大計復人心張國勢立政事以觀機㑹未絶其和而遣一介之使與之分别曲直逆順之理事必有成臣不孝之身親養巳絶舎毒忍死其亡無日徒能爲陛下言之而巳又伏思祖宗之德在天下至大至厚太平之治多歴年所三代盛時有不能及恭惟皇帝陛下禀乾剛之資輔以緝熈之學何爲而不成何治而不致願陛下充其志氣擴其聦明必使清明在躬如太虚然惟是之從以選賢才以修德政以大基業天下幸甚又以所著否㤗卦解義進之奏曰臣徃待罪相位陛下賜臣親書周易否㤗二卦辭其後臣謫居連山益遠天日葵傾之心不能自巳遇朔望必取再拜伏讀竊不自揆爲二卦訓釋乆欲獻之以備乙鑒而負罪積畏無路上逹今謹繕冩昧死以進顧坐井之見豈足以仰𥙷萬一惟臣子愛君之誠則不能自巳焉竊惟易謹君子小人之辨而二卦則其効之尤深切著明者也其事則本諸一心惟陛下留神上付前奏三省宰執沈該萬俟卨湯思退等見之大怒以爲虜初未有釁歳時通問不翅如膠􅃮而公所奏乃若禍在年歲者或笑以爲狂臺諫湯鵬舉凌哲聞之章䟽交上謂公方歸蜀恐揺動逺方有㫖復令永州居住候服闋日取㫖公自扶護西歸抵綿竹即卜日治太夫人葬附雍公之兆賔客紛至自朝及夕哭泣應接不少倦子姪交諫尊年不宜致毀而公孝誠自天不能巳也太夫人旣葬十日而謫命至且有朝㫖促迫甚急公即日就道服闋得㫖落職以本官奉祠居永公自爲表謝曰念君臣雖分於異勢而利害實係於同舟其憂國之誠拳拳不捨盖如此云公自是不復接賔客日紬繹易春秋論孟各爲之說夜則閱司馬氏通鑑如是者又四年而宇文夫人亦終焉自庚辰秋冬朝廷頗聞虜有異志公卿大夫下至軍民無不内懐岌岌日願公還相位表䟽不絶三十一年春有㫖令公湖南路任便居住時臨安積隂命下之日廓然清明上下欣恱公歸至潭五月奉欽宗諱號慟至不能食又聞慮有嫚書不勝痛憤上奏曰孝慈皇帝訃自北來又聞逆虜兵動凡爲臣子孰不痛憤臣徃叨任使孤負眷知主憂臣辱主辱臣死無所逃罪臣又度今日虜勢决無但巳九月十月之間必有所向願陛下與大臣計議早定必守必戰之䇿上安社稷未幾而亮兵大入中外震動十月復公觀文殿大學士判潭州時虜騎跳梁兩淮王權兵潰劉錡引歸鎮江兩淮之人奔迸南來沿江百姓荷檐而立遂改命公判建康府兼行宮留守金書疾置敦促甚遽長沙在逺傳聞不一人人危懼公𬒳命明日即首途曰吾君方憂危臣子之職戴星而趨猶恐其緩至岳陽遇大雪亟買小舟冐風濤泛長江而下且欲經歴諸屯慰接將士未至鄂有士大夫自江東來者云虜焚北采石煙炎漲天南岸人不復可立公母庸進也公愀然曰某𬒳命即携二子來正欲赴君父之急今無所問惟直前求乗輿所在耳長江是時無一舟行獨公以小舟徑下遭大風幾殆北岸又近虜兵從者憂惴甚公不少顧過池陽聞亮𬒳殺然餘衆猶二萬屯和州李顯忠兵在沙上公渡江往勞以建康激賞犒之一軍見公以爲從天而下驩呼増氣虜諜報惴恐一二日遁去顯忠乗士氣銳追之多所俘獲公至建康奏乞車駕早來臨幸聞巳進發乃督官屬治具不半月而辦風采隱然軍民恃以安上至建康公迎見道左衞士見公至以手加額無不喜公復用而悲公乆處瘴癘形容之瘠也車駕入行宫首引公見問勞再四公頓首謝上更生骨肉之賜且曰方秦檜盛時非陛下力賜保全無此身矣上亦爲之慘然曰檜之爲人旣忌且妬後六日再引對公奏國家譬如人之一身必元氣充實然後邪不能干朝廷元氣也今邪氣得以干犯必是元氣之弱或汗或下邪氣固暫退然元氣不壯邪再干之恐難勝任用人才修政事治甲兵惜財用此皆壯元氣之道上改容開納時車駕將還臨安欲付公以江淮之事巳而中止更留御營宿衞使楊存中俾專措置臨發復引公對公奏陛下當京城阽危之際毅然請使不測之虜後復受任開元帥府以孤軍當虜鋒當是時不知陛下之心還知有禍福生死否上曰朕爾時一心家國豈知有禍福豈知有死生對曰是心乃天心也願陛下試反此心而擴充之何畏乎虜賊上首肯焉且勞公曰朕待卿如骨肉卿在此朕無北顧之憂矣卿乆在謫籍聞甚清貧郊祀合得奏薦及封邑當盡以還卿繼遣内侍賜公黃金及象筦筆公皇恐不敢辭秦檜二十年間所以譛公者無所不至有臣子所不忍聞者獨頼上主張不至死地至是上見公辭和氣平無淹滯之歎而温乎忠愛之誠爲之感動對輔臣嘉美再三車駕旣還或有勸公求去者公念舊臣它無在者而國家多虞之際人心尤以巳之去就爲安危不忍舎而逺去日治府事細大必親時虜騎雖去人情未安朝廷頼公屹然増重兩淮之兵渡江歸息而奔走瘡痍之餘重以疫癘自三衙諸軍皆晋建康死者日數十人公親爲分課醫工置暦診候自帥司給藥餌及它費遣官屬監示至日暮公親視暦考其勤惰得失而賞罰之全活甚衆四月楊存中罷公𬒳㫖兼措置兩淮繼兼節制建康鎮江府江池州江隂軍駐屯軍馬時虜以十萬衆圍海州甚急鎭江都統制張子蓋提兵在淮上欲前救聞當受公節制士氣十倍而公受命之日亦即爲書抵子蓋勉以功名令出竒乗虜弊子蓋率兵力戰大破虜衆得脫歸者無幾公謂去歲淮上諸軍奏功例不以實有功者擯不録而庖人厮役悉沾濫賞輕名器耗財用亂紀綱使軍士不復知所勸激奏今海州上功當有以深革其弊使可爲後法於是令諸大將戰勝則命統制官以下至旗頭押擁隊公共保明限三日申稍有繆僞重寘典憲公德威表著將士望風畏愛至是復緫兵權當軍政二十年廢㢮之後問疾痛䘏勞苦撫孤遺禁刻剥勉將士俾知忠順於是人人勉勵慨然有趨事赴功之志公念軍籍日益凋寡中原之人乆困腥羶思慕我宋欲因兹時乗虜事力未彊頓兵淮甸要處以招集忠義來歸之人内以壯軍勢實曠土外以讋虜情系人心奏曰虜人退兵之後士馬物故幾半飲馬長江之志固未敢萌也而用事羣酋人各有心日夜備具似有欲窺淮甸之謀先事預圖理不可緩我之甲兵方之西北之士所存無幾而又去歲捍禦大敵傷折逃亡繼以病死十亦四五馬固同之以今歲事力比量酌度夫人而知其爲弱也議者或欲弭兵息民以治在我此說近是也誠恐虜之圖事未肯但巳一旦倉卒何以待之又况𥙷集將士必資西北之人能戰忍苦方爲可仗然則乗機及時内堅守備外疑敵心左牽右制使之首尾奔趨人情揺動斯爲成筭不可忽也淮甸要處我不先圖異日彊虜起侮渡淮先據形勢則事有難處者矣又奏曰臣體訪得東北今歲蝗蟲大作米價踴貴中原之人極艱於食欲乞朝廷或撥米糧或錢物付臣措置招來吾人人心旣歸虜勢自屈公又以淮楚之人自古可用乗其困擾之後當收以爲兵又奏曰兩淮之人素稱彊力而淮北義兵尤爲忠勁困於虜毒亦巳甚矣讎虜欲報之心盖未嘗一日忘也特部分未嚴器甲不備雖有赤心不能成事自彊虜恣爲殘虐十室九空皇皇夾淮各無所歸臣恐一旦姦夫鼓率千百爲群别致生事謂可因其憤嫉無聊之心而招集之欲置御前萬弩營募民彊壯年十八以上四十五以下堪充弩手之人並不刺臂靣以御前彊弩効用爲名各給文帖書冩郷貫居住之處及顔貌年甲姓名令五人結一保兩保爲一甲十甲爲一隊逓相委保有功同賞有罪同罰於建康府置營寨安泊詔皆從公請公即下令曰兩淮比年累𬒳茶毒父子兄弟夫婦殺傷虜掠不能相保今議爲必守之計復恥雪怨人心所同有願充者宜相率應募至於淮北乆𬒳塗炭素懐忠義欲報國恩亦當來歸共建勲業於是兩淮之人欣然願就率皆彊勇可用公親訓撫之又奏差陳敏爲統制敏起㣲賤聲迹未振公擢於困廢中感激盡力圖報未幾成軍方召募之𥘉浮言鼓動欲敗成績數月間來應者不絶衆論始定公謂虜長於騎我長於歩制歩莫如弩衛弩莫如車乃令敏專制弩治車又謂三國以後自北窺南未有不由清河渦口兩道以舟運粮盖淮北廣衍粮舟不出於淮則懼清野無所得有坐困之勢於是東屯盱眙楚泗以振清河西屯濠夀以扼渦頴大兵進臨聲勢連接人心畢歸精兵可集即具奏言之又乞多募福建海船由東海以窺登萊由清河窺淮陽有㫖下福建選募張子蓋自鎮江來謁公與之語見其智識過人謀慮精審與圖規取山東之計奏子蓋才勇而性剛氣直願優容之且乞益以精甲資以財用俾屯江淮措置招來㑹今上即位公首奏建康行宫當罷工役華采之事據今所營足備臨幸有詔從之上自藩邸熟聞公德望臨朝之𥘉顧問大臣咨嗟歎息首召公赴行在賜公手書曰朕𥘉膺付託以眇然一身當萬幾之繁夙夜祗懼未知攸濟公爲元老𬒳遇太上皇帝禮遇之乆羣臣莫及宜有嘉謀至計輔朕𥘉政方今邊疆未靖備禦之道實難遥度思一見公靣議其當使了然如在目中繄公是望公其疾驅副朕至意公奏曰臣敢不以前日恪事太上皇帝之心事陛下惟一其志有隕無二遂就道未至國門敦促再四至即引見上見公改容禮貌曰乆聞公名今朝廷所恃惟公命内侍賜公坐降問再四公奏人主以務學爲先人主之學本於一心一心合天何事不濟所謂天者天下之公理而巳人主惟嗜慾私溺有以亂之失其公理故必湏兢兢業業朝夕自持使清明在躬惟是之從則賞罰舉措無有不當人心自歸醜虜自服上竦然曰當不忘相公之言公又奏今日便當如創業之𥘉宜毎事以藝祖爲法自一身一家始以率天下公見上天錫英武毎言及兩朝北狩八陵廢隔兆民塗炭讎恥之大感痛形於詞色因力陳和議之非勸上堅志以圖事制除公少傅江淮東西路宣撫使節制建康鎮江府江池州江隂軍屯駐軍馬進封魏國公太上皇退處德夀宫羣臣希得進見獨再引公見輙移時以秋防復徃江上留臨安旬日中使問賜飲食等不絶禮遇冠一時公舟行出國門見蝗自北來飛長數里即具奏曰災異之起必有所因陛下即位之𥘉憂勞庻政豈容有此伏願益修欽畏以答天心抑天之愛陛下殆將有以警勉於𥘉助成聖德也更乞延見近臣咨問時政必使惠澤實及軍民先是公謂新政以人才爲急人才以剛正爲先因䟽當今小大之臣有經挫折而不撓論事切直者凡十數人薦於上且乞以間暇時數引賢者自近賜以從容庻幾啓沃之間有所廣益復薦陳俊卿汪應辰可爲宣撫判官有㫖差俊卿又奏前國子司業王大寳可備勸講論思上遂命召大寳公至江上復奏曰直言不聞非國之福自秦檜用事二十年間誣以它罪賊殺忠良不知幾何人願下明詔以太上之意條具徃以直言獲罪之人各加恩施其誣之以事而身巳淪沒許本家開析事因經朝廷雪訴庻幾冤憤之氣得申今日又奏乞盡天下之公議以用天下之才時洪邁張掄使虜回見公於鎭江具言𥘉到虜中鎻之寓舘不與飲食令於表中換陪臣字公奏虜主恃彊彈壓諸國今日之事惟修德立政寢食之間無忘此讎上慰天心下從人欲不當復遣使以重前失翰林學士史浩建議欲築瓜洲采石城上下公議公謂今臨淮要地俱未措置高郵巢縣家計亦復未立而乃欲驅兵卒但於江干建築城堡豈不示虜削弱失兩淮之心墮將士之氣或有緩急誰肯守兩淮者不若先城泗州便上以公言爲然浩巳爲參知政事力主𥘉議其餘公所措置浩輙不以爲是公以張子蓋可任使鎮淮上圖山東而子蓋所陳浩輙沮抑百端至下堂劄詰責又深遏海州之賞公方招來山東之人至者雲集而浩不肯應副錢糧且謂不當接納以自困公奏乞上幸建康而浩專欲爲懐安計公治舟楫于東海所圖甚逺而浩輙令散遣凢公所爲動皆乖異黨與唱和實繁有徒子蓋西人負氣竟以成疾公遣官屬勞問不絶且乞上親喻之上賜手書撫存備至而子蓋卒不起山東前所結約者皆失望浩遣其腹心司農寺丞史正志來建康專欲沮招納事公論奏曰竊惟國家自南渡以來兵勢單弱頼陜西及東北之人不忘本朝率衆歸附以數萬計臣自爲御營參賛目所親見後之良將精兵往往皆當時歸正人也三十餘年扞禦力戰國勢以安今一旦遽欲絶之事有大不可者此令一下中原之人以吾有棄絶之意必盡失其心一也人心旣失變爲寇讎内則爲虜用外則爲我寇二也今日處分旣出聖意將見淮北之人無復渡淮歸我者人迹旣絶彼之動息無自而知間探之類孰爲而遣三也中原之人本吾赤子今䧟於虜者三十餘年日夜望歸如赤子之仰父母今有脫身而來者父母拒户棄絶之不得衣食於天理人情皆所未順四也自往歲用兵大軍以奔疲疾疫死亡十之四五陛下慨念及此命諸將再行招募若淮北之人不復再渡所募之卒何自而充五也㝷常諸軍招江淛一卒之費不下百緡而其人柔脆多不堪用若非取軍淮北則軍旅之勢日以削弱六也若果絶之人心一失大事去矣國家所系人心爲本惟陛下恢廓聖度同符天地信順獲佑其理必然上見之感悟事得不罷正志又受浩㫖聚兩路監司守臣往瓜洲相度築壘事及見公恃其口辯欲爲浩遊說公折大義正志乃愧恐不敢言將行公復謂之曰歸致意史參政秦檜主和終致誤國參政得君無蹈覆轍浩聞之悚然時浩巳遣使使虜報登寳位公奏陛下𥘉立方欲圖回恢復而遽聞遣使懼天下解體前日洪邁虜中供伏事狀㝷聞虜酋備坐告喻嶺北諸國虜借我和議之名以迫脅諸國類如此願母遣浩竟遣之然虜計巳行亦竟責舊禮不納也十一月有㫖召宣撫判官陳俊卿及公子栻赴行在公附俊郷等奏曰今日之事非大駕親臨建康則决不能盡革宿弊一新令圖鼓軍民之氣動中原之心臣自太上時巳爲此謀盖江南形勢實在於此舎而不爲未見其䇿又奏曰漢文帝𥘉立有司請早建太子以尊宗廟其爲天下國家計甚逺願陛下留意焉公於九月中嘗具奏以謂近聞呉璘之兵在德順曾未幾月與虜大戰不可不爲之深思也使此虜得志於西則氣熖必熾脅制蕃漢聚兵邊陲迫我臣屬事固難處今持乆不决有大利害存焉儻坐視不問貽憂異時非計之得也當令兩淮之師虎視淮壖用觀其變而遣舟師自海道揺山東及多遣忠義結約中原疑惑此虜使有左顧右眄之慮而德順之師知我有奉制之勢將士當亦賈勇自奮至是復令俊卿等力言之時浩巳發詔命璘棄德順盖浩志專欲亟和以自爲功謂德順旣棄則非徒璘無能爲亦固撓公之謀矣上見俊卿等問公動静飲食顔貌曰朕倚公如長城不容浮言揺奪時上巳有欲幸建康之意矣而浩殊不以爲然上遣内侍黃保躬賜公鞍馬手書曰卿以元勲特爲重望慨風塵之未静仗忠義以親行首固邊防徐謀開拓俾朕居尊無復軫慮𬗟思忠赤益用歎嘉俊卿等歸公知車駕來建康之期尚緩深慮有失機㑹復具奏曰人心向背興亡以分建康之行一日有一日之功願仰稽天道俯徇衆情亟定行期以慰中外之望時契丹酋窩斡亦起兵攻虜爲虜所㓕其黨奔潰驍將蕭鷓巴耶律适里自海道來降公以爲女眞一國之兵其數有限向來獨以彊力迫脅中國之民及諸國之人爲用是以兵盛莫敵今當招納吾民厚撫諸國則女眞之心自生疑惑中原諸國莫爲其用虜可亡也奏乞厚撫鷓巴等上從之詔公擬官賞施行仍賜手書勞公曰卿以文武全才副朕倚毗宣威塞垣厥功益茂夷虜來歸中外帖然今賜卿貂㡌等時虜以十萬衆屯河南多張聲勢欲窺兩淮公以大兵屯盱泗濠廬虜不敢動但移牒三省宻院及移書宣撫司虚爲大言欲索海泗唐鄧啇州及歲幣等公奏此皆詭詐不當爲之動卒以無事隆興元年正月九日制除公樞宻使都督建康鎮江府江池州江隂軍屯駐軍馬且命即日開府視事始公命諸將築泗州兩城至是而畢隱然爲邊塞重鎮時虜將萬户蒲察徒穆及僞知泗州大周仁以兵五千屯虹縣都統蕭琦以萬餘人屯靈壁積粮修城遣間不絶公謂至秋必爲邊患當及時掃蕩若破兩城則淮泗可奠枕也且蕭琦素有歸我之意累遣親信至宣撫司㑹主管殿前司李顯忠建康都統制邵宏淵亦獻擣二邑之䇿公具以奏上上手書報可三月召公赴行在公中道具奏曰今之議者孰不持戰守之說其下則欲復遵舊轍重講前好以臣觀之戰守之說是也然而戰守之道本於廟勝君天下者誠能正身以正朝廷正朝廷以正百官正百官以正萬民用之戰則克用之守則固理有决然者矣今德政未洽于人心宿弊未革于天下揆之廟筭深有可疑臣願陛下發乾剛奮獨斷於旬月之間大布德章一新内外盡循太祖太宗之法使南北之人知有大治于後人心旣孚士氣必振于以戰守何往不濟旣至復伸前說上再三歎美謂公當先圖兩城邊患旣紓弊以次革乃命李顯忠出濠州趨靈壁邵宏淵出泗州趨虹縣而令參議馮方隨往犒勞公亦自往臨之將行念軍事利鈍難必恐或小跌傷上有爲之心謂諸葛亮建興六年所上奏其言明切曲盡事機乞上置之坐右嘗觀覽焉又出旗牓軍前曰靣奉聖㫖大軍所至務要秋毫不擾專以慰安百姓爲事敢有行一不義殺一不辜逹於聽聞朕所不赦公渡江聞李顯忠至靈壁而蕭琦中悔以衆來拒顯忠大破之琦所將萬五千人降殺殆盡邵宏淵亦進圍虹縣顯忠㑹之徒穆周仁窮蹙率其衆降亦以萬數公又遣戚方將舟師趨淮陽慮顯忠輕敵深進則親帥官屬前駐盱眙幾便近得以指呼顯忠虜蕭琦至宿州近城琦與家屬及千户頭領等百餘人降遂直抵城下虜僞元帥者遣二萬餘人來戰大破之進攻城將士蟻附而上遂克之中原震動歸附日至上手書曰近日邊報中外鼓舞數十年來無此克捷公以盛夏人疲急召顯忠等還師而上亦戒諸將以持重皆未逹僞副元帥紇石烈志寧率大兵至顯忠等恃勝不復入城但於城外列陣以待士卒頗疲矣僞帥令於陣前打話謂爾若破我當盡歸河南之地旣戰兵引却明日復來戰我師小不利統制官有遁歸者軍心頗揺顯忠等率兵入城虜衆進攻城復殺傷而退居數日得諜者報虜大兵將至顯忠等信之夜引歸虜亦不能追也時虜名酋勇將降執系道精甲破亡不翅三倍是後不復能爲靈壁虹縣之屯矣方𥘉退師公在盱眙去宿不四百里浮言􅍅動傳虜且至官屬中有懐檄以歸者亦有請公亟南轅者公不答遂北渡淮入泗州城軍士歸者勞而撫之視瘡痍拯疾病存録死事旌有功人情胥恱凡數日上下始知虜𥘉無一騎過宿者人心始定時公獨與子栻留盱眙幾月俾將士悉歸憇而後還維揚具奏待罪上手書撫勞公復奏曰今日之事明罰爲本而罰之所行當自臣始上手書報曰卿屢待罪欲罰自卿始卿此言至公豈不感格朕委任卿未嘗少變卿不可以此介意正頼卿經畫他人豈能副卿有㫖降授特進更爲江淮宣撫使宿師之還士大夫素主和議者乗時抵巇非議百出上又賜手書曰今日邊事尤倚卿爲重卿不可以畏人言而懐猶豫前日舉事之𥘉朕與卿獨任此事今日亦須朕與卿終任此事切不可先啓欲和之言又荐遣内侍勞公於是公又苐都統制官以下乞以次行罰時朝廷建遣楊存中以御營使行江上守備首途有日公謂命令不一將士觀望或敗國事身死無益遂論奏之上即日詔存中母行公留真楊大飭兩淮守備命魏勝守海州陳敏守泗州戚方守濠州郭振守六合治高郵巢縣兩城爲大兵家計修滁州關山以扼虜衝聚水軍淮隂馬軍夀春廬州大抵虜人来攻泗州則粮道回逺城中兵二萬餘足以守乗其弊足以勝如其出竒自淮西來則清野堅壁使無所掠既不得進合兵攻之可大破也然是時師退未幾人不自保公命栻往建康挈家屬來維揚衆情大安兩淮郡縣悉増葺屋宇人物熈熈以至郷落亦皆成聚上復召栻奏事公附奏曰自古大有爲之君必有心腹之臣相與恊謀同志以成治功不容秋毫之間然後上下響應影從事克有濟如伊尹之於湯太公之於周其次管夷吾之於齊諸葛亮之於蜀書傳所載始終可考不然作舎道邊何自而成而况安危禍福之幾其應不逺可不畏哉今邊隅粗定軍旅粗整虜以傷敗之故其勢未能爲竭國之舉而臣以孤蹤䟦前㚄後動輙掣肘陛下將安所用之願深惟國計精選天下嵓穴之賢付以中外大柄任之專信之篤如前數君所爲謀出於一不使小臣得以隂間不使異議得以輕揺先内後外以圖恢復庻幾日積月著太平可期載惟陛下當至艱至難之時遇自古未嘗有之彊敵若非君臣相與爲一朝夕圖回不較利鈍終期有成誠恐歲月易流後悔難追甚可痛惜也臣老且病望陛下矜怜賜以骸骨使之待罪山林無令出䖏狼狽取笑天下後世上覽奏謂栻曰雖乞去之章日至朕决不許朕待魏公有加終不爲浮議所惑公聞之不敢復有請時上對近臣未嘗名公獨曰魏公每遣使來必令視公飲食多寡肥瘠何如其眷禮如此八月有㫖復公都督之號虜都元帥㒒散忠義與志寧並貽書三省宻院索四郡及歲幣等且云今兹治兵决在農隙以恐脇我公奏虜力彊則來力弱則止𥘉不在夫和與不和之間使其有隙可乗有機可投雖使人接踵于道卑辭厚禮無所不至亦莫足以遏其鋒也今僞帥書盖知江南之士欲和者衆離間吾心腹撓亂吾成謀坐收全功以肆其忿毒干後惟陛下深察之臣誠過慮竊恐腐儒之論不知大計遂爲眞和曾不知三數年之後虜馬日蕃人心益定我之將士解體怠墯方是時何以枝梧然今日内治未立人多懐私只貴謀身不思爲國軍民之弊漠不加意不求之此而區區於末恐無益也時朝廷欲謝却歸正人巳至者悉加禁切且不欲公多遣間諜恐生邊釁公奏曰自昔創業中興之君圖回天下𥘉非有夙任之將素養之兵舊撫之民爲之用也攷其施設事非一端或取之群盗或得之降虜或以夷狄攻夷狄莫不虚懐大度仰慿天道俯順人心以成大功後世仁德之不孚措置之失宜馴致降人多有背叛此非徒人事之謬盖亦天命之不歸也今陛下紹隆祖宗方務恢復乃於降者而首疑之則左右前後與夫今日軍旅之衆孰不可疑而况它日進撫中原必先招徠事乃可濟若處之失當反激其怒它日人自爲敵計之岀此豈不誤哉陛下將有經營四海之心推誠待人如天如日豈比固陋之士姑爲保身之謀獨無天命之可信哉又奏虜之於我有不戴天之讎挾詐肆欺不遺餘力自宣和靖康以來專以和議撓亂國家反覆詭秘略無一實今敗盟如此而朝廷尚蹈覆轍號爲信義恐生兵隙臣所未喻也昔宋襄公謂君子不重傷不禽二毛而卒敗於楚得無類是乎時湯思退爲右相思退本檜死黨尤急於求和遂遣盧仲賢李栻持書報虜並借職事官以往公又奏仲賢小人多妄不可委信上因其辭戒勿許四郡而宰執則令仲賢等許之無傷栻至境託故不行獨仲賢往㒒散忠義懼之以威仲賢遂䑕伏拱手狀稱歸當禀命許四郡願持書復來仲賢見公謬稱虜有數十萬之衆近邊若不速許四郡今冬必入寇我無以當其鋒且公重臣不宜在江外當亟渡江公知仲賢爲虜所脅即謂之曰某在此邊備巳飭借使虜來當力破之况探報日至虜之屯河南者不過十萬計議得無爲虜游說耶栻復𬒳㫖令入奏公命栻奏仲賢辱國無狀但所謀事未知有無出朝廷之意臣實不預此議栻至上即召見首問仲賢事栻具奏其狀且曰仲賢不可不明正其罰朝廷與爲表裏不可不察上怒下仲賢大理寺思退等惶懼反謂仲賢能說虜削去君臣之禮止以叔姪相往來爲有功百端救之至與左相陳康伯等叩頭殿上乞去上不恱猶鐫仲賢官思退及其黨懼益大唱和議建遣王之望龍大淵爲通問使副公在逺争不能得見諸軍惶惑歸正人尤不自安即出牓諸軍謂虜人妄有邀索如輙敢渡淮當約日决戰朝廷聞公岀此牓皆大恐獨上以爲然公又奏曰伏聞朝廷遣使甚亟思慮反復實不遑寧伏念臣頃居謫籍幾二十年流離困苦加以憂患狼狽萬狀所以養愛此身不敢即死亦以臣子大義負不戴天之深讎終幸一朝得伸素志瞑目無憾幸遇陛下龍飛之始英武奮發慨然有澄清天下之志臣是敢受任而不辭今將士人情日以振作而虜寇作於内師老於外少稽時月形勢畢見載惟此虜若勢力有餘内無掣肘則秋冬之交必引兵長驅要我以和何求不成而乃遣書約期勢實畏怯其狀甚露縱令敢以偏師深入自淮西來爲我則利爲彼非福盖三百里之内野無芻粟扼以不戰又何能爲而直爲此急急也重念臣衰老多病所見所爲迂闊寡合自度賦分單薄無以勝任國事方欲俟歲晚力求休退惟臣所愛者陛下之聖德聞於天下有有爲之時惟臣所憂者夷狄之姦計得以肆行而後悔何及不然臣年餘幾何豈不欲姑就安逸以畢此身而固爲異同於今日也又奏今歲守備甚嚴自秋渉冬𥘉無一事向若虜不貽我以書固自若也不幸因虜以一介持書慢我而朝廷怱遽遣人自招紛紛縁此内外之情各不懐安於國體所係甚大今兹使行事體尤重豈宜更復草草惟此虜若必欲侵凌我雖懇請百拜有不可遏如其不能亦何由而動况專幸寇讎之不我侵急急然徒爲懇免苟安之計臣之所未諭也上賜手書諭意將以首相待公公奏力辭未幾遂召公赴行在奏事公𥘉議答虜書事以爲但當輕遣一介往觀其情僞而爲之所至是乃聞朝廷遣之望等十一月二十五日行至鎮江上奏曰近者竊承朝廷巳定遣使之議臣身在外𥘉不預聞竊惟徽宗欽宗不幸不反亘古非常之巨變凡在臣庻不如無生而八陵乆隔赤子塗炭國家於虜大義若何况逆亮慿陵移書侮嫚邀求大臣坐索壤地其事近在前歲今議者不務力爲自彊之計而因虜帥一貽書遽遣朝士奔走麾下再貽書欲遣侍從近臣趨風聽命復將裒吾民之膏血以奉讎人用猶子之禮以事讎人欺陛下以欵之之名而爲和之之實其說固曰吾將欵之而修吾兵玫不知使命一遣歲幣一出國書一正將士禠氣忠義解體人心憤怨何兵政之可修又不過曰吾將欵之而理吾財用不知今雖遣使而兵不可省備不可撤重以歲幣之費虜使之來復有它須何財用之可理此可見欺陛下以欵之之名實欲行其宿志也彼方惟黨與之是立惟家室之是顧惟富貴之是貪豈復以國事爲心哉况兩朝鑾輿之望巳絶宗室近親流落虜廷戕賊殆盡猶欲與之結和不知於天理安否臣實痛之臣年老多病所論與朝廷略不相合豈可蒙恥更造班列以重敗其素節且陛下廟堂之上豈容狂妄不合之臣濫厠其間臣雖至愚亦誠不忍與今日力主和議之臣並立於朝伏乞早降指揮罷臣機政臣見力疾至前路秀州聽候指揮上賜手書曰覽卿奏欲在秀州候指揮甚非朕所望也卿忠誠爲國天下共知和議事專竢卿到靣盡曲折卿宜速來繼遣内侍丼澤賜公手書曰卿赴召入覲何爲中道遽欲引嫌自陳軍國大事正要卿同心叶濟巳差丼澤宣卿宜體朕意疾速前來公以上意厚甚不敢固辭復上奏曰臣竊聞道路之言謂今兹議和非陛下本心事有不得巳者詢之士大夫多以爲然惟臣昔嘗力陳和之不可爲秦檜所擠瀕死者屢頼太上皇帝保全覆護獲有餘生今日之議臣以國事至大不敢愛身力爲陛下敷陳不知陛下終能主張之否又有事之大者人才混殽風俗陵夷綱紀乆㢮上下偷安巨細積弊内治自彊未見端緒若力圖所以革之一繩以公不䘏浮議則怨謗之言投隙伺間巧爲傷中事必無成若因循不革日復一日何以爲國國政不立何以禦冦不知陛下能力斷於中果行於外君臣一心無間可乗以濟此疑難之業否臣是以食不遑味寢不遑處拳拳憂心有如皦日思所以爲陛下計爲社稷計須臾不敢忽也不然臣年老數竒粗知學道豈敢叨踰榮寵竊位於朝以負陛下社稷哉臣到闕日願賜清間之燕俾盡區區度其是否使之進退有據不違其道不勝幸甚旣至入見上首諭公以欲專委任之意公復力陳和議之失上爲止誓書留使人而令通書官胡昉楊由義先往諭虜帥以四郡不可割之意於是之望大淵待命境上而上與公宻謀若虜帥必欲得四郡當遂追還使人罷和議事十二月二十二日制拜公尚書右僕射同中書門下平章事兼樞宻使都督如故而思退亦轉左僕射上諭當直學士錢周才以注意在公故思退雖爲左相而公恩遇獨隆每奏事上輙晋公與語又時召栻入對賜公御書聖主得賢臣頌思退等素忌公至是益甚公旣入輔首奏當旁招仁賢共濟國事上令條具公奏虞允文陳俊卿汪應辰王十朋張闡可備執政劉珙王大寳杜莘老宜即召還胡銓可備風憲張孝祥可付事任馬時行任盡言馮方皆可備近臣朝士中林栗王秬莫冲張宋卿議論據正可任臺諌皆一時選也公自太上時即建議當駐蹕建康以圖恢復上𥘉即位公入對又首言之及揔師江淮每申前說至是復力言於上曰今不幸建康則宿弊不可革人心不可回王業不可成且秦檜二十年在臨安爲燕安酖毒之計豈可不舎去之而新是圖大抵今日凡事皆當如藝祖創業時務從省約而專以治軍䘏民爲務庻國有瘳不然日復一日未見其可上深感悟通書官胡昉等至宿州僕散忠義以不許四郡之故械繫迫脅昉等不屈忠義計窮更禮而歸之上聞之亟召栻語之故令諭公曰和議之不成天也事當歸一也始議以四月進幸建康公又奏當詔之望等還上批出曰王之望龍大淵并一行禮物並回思退等大駭更約翌日靣奏及至漏舎思退等競執前說公折以正論輙屈是日三月朔旦上當詣德夀宫未登輦召宰執議事思退及參知政事周葵同知樞宻院洪遵叩頭力争上怒聲色頗厲及自德夀宫回復批出曰追回之望等劄子宜速進入適詣德夀宫太上皇帝亦深怒此虜無禮卿等不可專主和議恐取議於天下思退等懼遂以劄子進入發金字逓行公奏胡昉等能不爲虜屈當加賞而向者盧仲賢擅以國家境土許冦與讎宜有重罰有㫖仲賢除名勒停編管郴州又奏宜牓示諸軍諭以僕散忠義械繫使人加以無禮使各奮忠義勉勵待敵趨赴功名庻幾諸軍知曲在虜且知和議不成激昻増氣上令都督以此㫖降牓兩淮荆襄川陜數日之間號令一新中外軍民皆仰上英斷思退計窮復奏力主和議且請上以宗社大計奏禀太上皇帝而後從事上親批其後降付三省曰虜無禮如此卿猶欲言和今日虜勢非秦檜時比卿之議論秦檜之不若故事宰相日一人啓御封是日適公當啓啓畢即轉示思退思退大駭藏去先是上旣决幸建康之議思退等𥘉不與聞後奏事上前語屢屈因請曰和議不成虜至何以待之上曰朕巳决幸建康思退等失色及又見批語乃陽爲皇恐乞祠狀而隂與其黨謀爲傾䧟之計蹤跡詭祕人不得盡知也居數日俄有㫖命公按視江淮公知一日出外姦人必得肆意然趣行之㫖屢下而事之成敗則又有非人力所能爲者乃行旣出國門思退遂與右正言尹穡通謀日夜汲汲益求所以間公者公未抵鎮江道遇王之望等還見之望力主和議因宻奏之而思退等亦相與隂謀謂不毀守備則公不可去和不可成乃令之望等盛毀守備一無以恃者又隂以官爵諷諸將令入文字稱虜盛彊爲畏怯語而穡專主其議百計毀公盖公受任江淮兩年有半念國家多虞醜虜未靖憂恐計度寢不遑安食不遑味祁寒盛暑勞撫將士接納降人講論軍務未嘗少倦少年精力有不能及而公忠義奮激曽不以爲勞諸軍感恱有不待號令而從者計所招來山東淮北忠義之士實建康鎮江兩軍凡萬二千餘人萬弩營所招淮南彊壯及江西羣盗又萬餘人陳敏統之以守泗州淮南軍士知泗爲兩淮要塞皆願以死守至挈父母妻子徃焉要地如海泗高郵巢和六合等皆巳成築其可因水爲險處皆積水爲櫃増置江淮戰艦諸軍弓矢器械悉備兩年冬虜屯重兵十萬于河南爲虚聲脅和至再至三皆有約日决戰之語泗州將士日望虜至成大功而虜亦知吾備禦甚設卒不敢動反爲防我計及是公又以宰相來撫諸軍將士無不踴躍思奮軍聲大振虜聞公來亦檄宿州之兵歸南京㳂邊清野以俟淮北歸正者日來不絶山東豪傑悉遣人來受節度公曉之曰淮北山東之人慕戀國恩厭苦虐政保據山險抗拒賊兵于今累年首領冐難逺來備述爾等忠勤爲之惻痛巳具奏皇帝記録汝等姓名將來大兵進討則掎角爲援晝驚夜刼抄絶糧道如是賊兵深入便當連跨城邑痛勦賊徒勲績儻成節鉞分茅皆所不吝但當觀時量力無或輕動反墯賊計今本朝厲兵秣馬以俟天時汝等亦宜訓習以待王師之至公又以蕭琦乃契丹四軍大王之孫沉勇有謀欲令琦盡統契丹降衆且以檄喻契丹大意謂本朝與契丹有兄弟之好不幸姦臣誤兩國皆𬒳女眞之禍今契丹不祀皇帝無日不念此爾能結約相應本朝當敦存亡繼絶之義虜人益懼遂爲間書鏤板摹印散之境上類後周所以間斛律明月之意督府參議官馮方立朝有直聲臨事不避難遍行兩淮築治城壘最爲勞勩思退等以其效力尤多尤惡之使穡論方不當築城費財凡再章而方罷又論公所費國用不貲公奏計督府遣間探給官吏等二年半之費實不及三十萬緍其餘爲修城造舟除器招軍等用上出公奏思退穡議屈於是始謀更造它事撼公殿前後軍統制張深守泗有勞軍士安之俄有㫖放罷而以趙宻之子廓代之公至淮東詢問知狀奏留深而穡指公此事爲拒命跋扈思退等又相與謀上眷公厚必未肯遽罷公但先罷都督則公自當引去穡奏論如思退計而公自聞馮方罷巳上奏乞罷督府詔從公請而公亦封章力求還政矣穡連䟽詆公愈力左司諌陳良翰奏如公忠勤人望所属不當使去國上謂良翰本無此事且當今人材孰有踰魏公者卿宜遍喻侍從臺諌使知朕此意侍御史周操素同良翰議至是争論甚力然是時公留平江虎丘致仕之章巳八上矣上察公懇誠欲全其去四月二十有二日制除公少師保信軍節度使判福州而思退等遂决棄地求和之議且命宣諭司及統領司磨治督府文書錢物吹毛求疵卒不可得乃巳公力辭恩命上不許至五六除醴泉觀使公雖去國不敢以嫌故有隱奏尹穡姦邪必誤國事又奏勸上務學親賢故舊門生或勸公當勿復問時事後雖有召命亦無庸起公慨然語之曰君臣之義無所逃于天地之間况吾荷兩朝厚恩乆尸重任今雖去國猶日望上心感悟苟有所見安忍不言上復欲用某某當即日就道敢以老病爲辭如公等言復何心哉聞者聳然公以連年疲勞比得退休巳覺衰薾且畏暑未能遂還長沙行次餘干假宗室趙公頙之居而寓止焉所居之南有書室公名之曰養正而爲之銘曰天下之動以正而一正本我有養之斯吉道通天地萬化流出精思力行無忘朝夕日讀易更定前說且曰庻幾未死於學有進也又取易象題坐右曰謹言語節飲食致命遂志反身修德親舊來訪者輙與講論古道終日不倦盖其心純一無出處動静之間如此孟秋旣望公薦享祖考旣奠而跌公起歎曰吾大命不逺矣手書家事付兩子且定祭祀昏䘮之禮俾遵守曰䘮禮不必用浮屠氏且曰吾嘗相國家不能恢復中原盡雪祖宗之恥不欲歸葬先人墓左即死葬我衡山足矣及仲秋二十日猶爲饒守王十朋作不欺室銘有曰泛觀萬物心則惟一如何須臾有欺暗室君子敬義不忘栗栗至二十有二日始寢疾二十八日疾病日晡時命子栻等坐于前問國家得無棄四郡乎且命作奏乞致仕日暮命婦女悉去夜分而薨先是六月末有大星隕于趙氏居養正堂之北光芒若晝趙氏一家盡驚翌日得公書欲來寓居云訃聞上震悼輟視朝兩日有㫖贈公太保栻等不敢違公志扶護還潭州以是歲十一月辛亥葬于衡山縣南嶽之隂豐林郷龍塘之原公自㓜即有濟時之志未嘗觀無益之書未嘗爲無益之文孜孜然求士尚友講論當世之故聞四方利病休戚輙書之冊至一介之賤亦曲加詢訪在京城中親見二帝北狩皇族係虜生民塗炭誓不與虜俱存委質艱難之際事有危疑它人方畏避退縮則挺然以身任之不以死生動其心南渡以來士大夫往往唱爲和說其賢者則不過爲保守江南之計夷狄制命率獸逼人莫知其爲大變公獨毅然以虜未㓕爲巳責必欲正人心雪讎恥復守宇振遺黎顛沛百罹志踰金石晚復際遇主義益堅雖天嗇其功使公困於䜛慝之口不得卒就其志然而表著天心扶持人紀使天下之人曉然復知中國之所以異於夷狄人類之所以異於禽獸者而得其秉彛之正則其功烈之盛亦豈可勝言哉公論事上前務盡道理期於聽從不爲苟激其在官守事無細大必以身親視國事如家事視民疾苦如在巳身至誠懇惻貫徹上下平生四𬒳謫命處炎方幾二紀拳拳念君之心逺而彌篤見朝廷一舉措之善則喜溢詞色一事不厭則憂思終夕不寐嘗曰事君者必此心純一而後能有感格盖其忠義自壯至老或用或舎未嘗有斯湏之間也事太夫人先意承志婉愉順適曲盡其心奉養恭恪寒暑不渝家人婦子見公身率莫敢不敬或時逺去侍側每覺意緒不佳則曰太夫人得無有疾乎遣人候問則其日果太夫人服藥也太夫人方嚴或顔色不和則公拱立左右踧踖若無所容俟太夫人意舒乃敢安盖自膝下至白首如一日太夫人既沒見素所服用之物未嘗不泣下起敬起孝孝誠篤至上自宫禁下至閭閻無不咨嗟歎息縉紳軍民聞風而興起慕用與夫愧悔改行者不可勝計也於兄徽猷公友弟篤至教養其子與巳子不少異置義莊以贍宗族之貧者以至母族䘮葬婚嫁亦皆取給焉歲時祭祀必預戒小大使各嚴恪滌牲治具必親涖焉及祭肅乎如祖考臨之時節嘗新必先薦于廟而後敢食器皿擇精㓗者備薦享不以它用素能飲酒至斗餘及貶連山太夫人曰南方地熱宜省酒即不敢飲及再見太夫人命之飲乃飲遂終身不踰三酌於器用取具不問羙惡平生無玩好視天下之物泊然無足以動其心者燕處飲食皆有常度雖在閨門無戲語無墯容未嘗偏倚而坐未嘗疾呼遽行言必有敎動必有法盛德日新至老無息及在餘于未寢疾間温恭朝夕無絲毫倦怠意絶筆二銘于今讀之猶能使人悚然起敬則公之心雖未易以言語形容然於此亦可以少見其幾矣盖其天資粹美㴠養深厚以至於德成而行尊非強勉所能及也公之學一本天理尤深於易春秋論孟嘗論易數曰易有太極是生兩儀太極一也兩儀三之也分爲二而七八九六之數五十有五此天地之中數也何以知其然盖一三五七九合爲天數而天數不過五二四六八十合爲地數而地數不過五天地竒耦合之爲十揔之爲五十有五自然之數皆不離乎中中故變變故其道不窮聖人神而明之用數之中故消息盈虚之妙闔闢變化之幾皆在於我而動静莫違焉中其至矣又嘗論剛柔之義示子姪曰君道主剛而其動也用柔故乾動則爲坤矣臣道主柔而其動也用剛故坤動則爲乾矣故夫必欲逺聲色必欲去小人必欲配帝王必欲定社稷必欲安民人必欲服四夷乾之剛也君則之於内而主斷也至於禮臣下下賢才撫四鄰愛百姓䘏孤寡虚心取善舎巳從人其動莫非柔矣不敢唱始不敢先事謹禮法循分守安進退守職業坤之柔也臣得之於内而有承者也至於犯顔敢争捐軀盡節可以託六尺之孤可以寄千里之命可殺不可辱可困而不可使爲不義守忠義之大訓弭患難於當年斷大計定大疑正色立朝華夷讋服其動莫非剛矣故夫善觀易者必觀夫剛柔之中而究其所以用則六十四卦三百八十四爻之或得或失成悔或吝或吉或㐫可以類推矣不知剛柔之用不可言易也胡銓求公序其所著春秋傳者公告之曰春秋所書莫非人事章章者作之於心見之於事應之於天毫釐不差夫子叙四時稱天王以謂順天則治生物之功于是興逆天則亂生物之功于是息爲千萬世訓至明也故一言以斷春秋之義曰天理而巳矣嗚呼使王知有天則諸侯知有王大夫知有諸侯陪臣知有大夫馴致之理得之自然禍難孰爲而作哉盖王者知有天而畏之言行必信政教必立喜怒必公用舎必當黜陟必明賞罰必行彼列國諸侯雖曰彊大敢違天不恭以重拂天下之心而自取誅㓕耶周道旣衰王之不王不能正身行禮奉承天心以大明賞罰於天下春秋爲是作以我褒貶代天賞罰庻幾善者勸惡者懼亂臣賊子易慮變志不復接踵于後天地之大德始獲均𬒳萬物聖人先天心法之要蔑有著於此書者矣公於本朝大臣最重李文靖公謂近三代氣象又以寇忠愍富文忠范文正之事爲可法嘗曰萊公自澶淵還恥於城下之盟益勸上修德立政旣不獲用乃有東封西祀之說鄭公使虜還以和議爲恥以自治爲急務而不受樞庭之賞文正自西鄙入參大政勸仁祖開天章閣俾大臣條時務大修政事文正所具二十條無非要切然亦不克施使三公獲盡其猷爲則王業必不至二百年而中㣲也異時歸老山林當作三賢堂於弊廬之側庻幾朝夕想像如見其人豈三公所爲適有契于公心也與毎訓諸子及門人曰學以禮爲本禮以敬爲先又曰學者當清明其心黙存聖賢氣象乆乆自有見處見人有一善爲之喜見辭色子姪輩言動小不中理則對之愀然不樂人自感動公𥘉娶楊國夫人樂氏旬日𬒳命召即造朝及爲侍從或以公盛年勸買妾公曰國事如此太夫人在逺吾何心及此遂終身不置妾再娶蜀國夫人宇文氏賢明淑順與公同志事太夫人盡禮鷄𥘉鳴巳冠帔立寢前俟太夫人寐覺夜則俟太夫人寢至息勻寐安乃去食飲湯藥一一親之太夫人常曰吾兒孝天賜賢婦以成其心内外宗族敬仰無間言起居飲食亦皆如公有常度不渝相對如賔公方貴未嘗言及宇文氏私門每訓諸子曰吾朝夕兢兢履地如履冰惟恐一言之失一事之差盖其德誠足以配公焉先公五年薨葬衡山與公同兆異穴生子男二人長栻右承務郎直祕閣次枃右承奉郎公奏議務坦明不爲虚辭率口誦令子姪書之皆根於心不易一字有紹興奏議隆興奏議各十卷論語解四卷易解并雜記共十卷春秋解六卷中庸解一卷詩書禮解三卷文集十卷惟公忠貫日月孝通神明盛德隣於生禀奥學妙於心通勲存王室澤在生民威震四夷名垂永世平生言行非編録可紀謹掇其大略以備獻于君父下之史官傳之無窮且將以求當世立言之君子述焉謹狀乾道三年十月日左迪功郎特差監潭州南嶽廟朱熹狀晦庵先生朱文公文集卷第九十五下候官縣儒學訓導劉簮校
