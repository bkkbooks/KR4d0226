body:
  text: 封事巳酉擬上封事具位臣朱熹敢拜手稽首言曰臣竊惟皇帝陛下有聰明睿智之資有孝友溫恭之德有寬仁博愛之度有神武不殺之威養德春宫垂二十年一旦受命慈皇親傳大寶龍飛虎變御極當天凡在覆載之間稍有血氣之屬莫不延頸舉踵觀德聽風而臣適逢斯時首蒙趣召且辱賜對得近日月之光感幸之深其敢無説以效愚忠之一二蓋臣聞古之聖賢窮理盡性備道全德其所施為雖無不中於義理然猶未嘗少有自足之心是其平居所以操存省察而致其懲忿窒欲遷善改過之功者固無一念之間斷及其身之所履有大變革則又必因是而有以大警動於其心焉所以謹𥘉始而重自新也伊尹之告太甲曰今王嗣厥德罔不在𥘉又曰今嗣王新服厥命惟新厥德召公之戒成王曰若生子罔不在厥𥘉生自貽哲命今天其命哲命吉凶命歷年知今我𥘉服肆惟王其疾敬德蓋深以是而望於其君其意亦巳切矣今者陛下自儲二而履至尊由監撫而專聽斷其為身之變革孰有大於此者則凡所以警動其心而謹始自新者計巳無所不用其極矣而臣之愚猶竊有懼焉者誠恐萬分有一所以警動自新之目或未悉舉則釁孽之萌將有作於眇綿之間出於防慮之外者是以輒忘踈賤而妄以平日私憂過計之所及者深為陛下籌之則若講學以正心若修身以齊家若逺便嬖以近忠直若抑私恩以抗公道若明義理以絶神姦若擇師傳以輔皇儲若精選任以明體統若振綱紀以厲風俗若節財用以固邦本若修政事以攘夷狄凡是十者皆陛下所當警動自新而不可一有闕焉者也臣不勝犬馬愛君憂國之誠輒敢事為之説而昧死以獻謹條其事如左其一所謂講學以正心者臣聞天下之事其本在於一人而一人之身其主在於一心故人主之心一正則天下之事無有不正人主之心一邪則天下之事無有不邪如表端而影直源濁而流汙其理有必然者是以古先哲王欲明其德於天下者莫不一以正心為本然本心之善其體至微而利欲之攻不勝其衆嘗試驗之一日之間聲色臭味遊衍馳驅土木之華貨利之殖雜進於前日新月盛其間心體湛然善端呈露之時蓋絶無而僅有也苟非講學之功有以開明其心而不迷於是非邪正之所在又必信其理之在我而不可以須臾離焉則亦何以得此心之正勝利欲之私而應事物無窮之變乎然所謂學則又有邪正之别焉味聖賢之言以求義理之當察古今之變以驗得失之幾而必反之身以踐其實者學之正也涉獵記誦而以雜慱相高割裂裝綴而以華靡相勝反之身則無實措之事則無當者學之邪也學之正而心有不正者鮮矣學之邪而心有不邪者亦鮮矣故講學雖所以為正心之要而學之邪正其繫於所行之得失而不可不審者又如此易曰正其本萬事理差之毫釐繆以千里惟聖明之留意焉則天下幸甚其二所謂修身以齊家者臣聞天下之本在國國之本在家故人主之家齊則天下無不治人主之家不齊則未有能治其天下者也是以三代之盛聖賢之君能修其政者莫不本於齊家蓋男正位乎外女正位乎內而夫婦之别嚴者家之齊也妻齊體於上妾接承於下而嫡庶之分定者家之齊也采有德戒聲色近嚴敬逺技能者家之齊也內言不出外言不入苞苴不逹請謁不行者家之齊也然閨門之內恩常掩義是以雖以英雄之才尚有困於酒色溺於情愛而不能自克者苟非正心修身動由禮義使之有以服吾之德而畏吾之威則亦何以正其宫壼杜其請託檢其姻戚而防禍亂之萌哉書曰牝雞之晨惟家之索傳曰福之興莫不本乎室家道之衰莫不始乎梱內惟聖明之留意焉則天下幸甚其三所謂逺便嬖以近忠直者臣聞蓬生麻中不扶而直白沙在泥不染而黑故賈誼之言曰習與正人居之不能無正猶生長於齊之地不能不齊言也習與不正人居之不能無不正猶生長於楚之地不能不楚言也是以古之聖賢欲修身以治人者必逺便嬖以近忠直蓋君子小人如氷炭之不相容薰蕕之不相入小人進則君子必退君子親則小人必踈未有可以兼收並蓄而不相害者也能審乎此以定取舍則其見聞之益薰陶之助所以謹邪僻之防安義理之習者自不能巳而其舉措刑賞所以施於外者必無偏陂之失一有不審則不惟其妄行請託竊弄威權有以害吾之政事而其導諛薰染使人不自知覺而與之俱化則其害吾之本心正性又有不可勝言者然而此輩其類不同蓋有本出下流不知禮義而稍通文墨者亦有服儒衣冠叨竊科第而實全無行檢者是皆國家之大賊人主之大蜮苟非心正身修有以灼見其情狀如臭惡之可惡則亦何以逺之而來忠直之士望德業之成乎諸葛亮有言親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頽也先帝在時每與臣論此事未嘗不歎息痛恨於威靈也本朝大儒程頥在元祐間常進言於朝以為人主當使一日之中親賢士大夫之時多親宦官宫妾之時少則可以涵養氣質薰陶德性此皆切至之言也然後主不能用亮之言故卒以黃皓陳祗而亡其國元祐大臣亦不能白用頥説故紹聖元符之禍至今言之猶可哀痛前事不逺惟聖明之留意焉則天下幸甚其四所謂抑私恩以抗公道者臣聞天無私覆地無私載日月無私照故王者奉三無私以勞於天下則兼臨博愛廓然大公而天下之人莫不心悅而誠服儻於其間復以新舊而為親踈則其偏黨之情𥚹狹之度固巳使人􅍀然有不服之心而其好惡取舍又必不能中於義理而甚則至於沮謀敗國妨德亂政而其害有不可勝言者蓋左右厮役橫加官賞宫府寮屬例得褒遷固不問前例之是非而或者又不問其有無此固舊事之失而不可以不正况今又有蚤懷姦心預自憑結者又將食天之功以為巳力而不顧其仰纍於聖德妬賢嫉能禦下蔽上而不憂其有害於聖政也苟不有以深抑私情痛加屏絶則何以明公道而服衆心革宿弊而防後患乎唐太宗之責龎相壽曰我昔為王為一府作主今為天子為四海作主為四海作主不可偏與一府恩澤若復令爾重位必使為善者皆不用心正為此也又况有國家者當存逺慮若漢高祖之戮丁公我太祖之薄王溥此其深識雄斷皆可以為後聖法惟聖明之留意焉則天下幸甚其五所謂明義理以絶神姦者臣聞天有顯道厥類惟彰作善者降之百祥作不善者降之百殃是以人之禍福皆其自取未有不為善而以諂禱得福者也未有不為惡而以守正得禍者也而况帝王之生實受天命以為郊廟社稷神人之主苟能修德行政康濟兆民則災害之去何待於禳福祿之來何待於禱如其反此則獲罪於天人怨神怒雖欲辟惡鬼以來貞人亦無所益又况先王制禮自天子以至於庶人報本享親皆有常典牲器時日皆有常度明有禮樂幽有鬼神一理貫通初無間隔苟禮之所不載即神之所不享是以祭非其鬼即為淫祀淫祀無福經有明文非固設此以禁之乃其理之自然不可得而易也其或恍惚之間如有影響乃是心無所主妄有憂疑遂為巫祝妖人乘間投隙以逞其姦欺誑惑之術既行則其為禍又將無所不至古今以此坐致亂亡者何可勝數其監蓋亦非逺苟非致精學問以明性命之理使此心洞然無所疑惑當有即有當無即無則亦何據以秉禮執法而絶妖妄之原乎先王之政執左道以亂政假鬼神以疑衆者皆必誅而不以聽其慮深矣然傳有之明於天地之性者不可惑以神怪明於萬物之情者不可罔以非類則其為妄蓋亦不甚難察惟聖明之留意焉則天下幸甚其六所謂擇師傅以輔皇儲者臣聞賈誼作保傅傳其言有曰天下之命繫於太子太子之善在於早諭教與選左右教得而左右正則太子正太子正而天下定矣此天下之至言萬世不可易之定論也至論所以教諭之方則必以孝仁禮義為本而其條目之詳則至於容貌詞氣之微衣服器用之細纎悉曲折皆有法度一有過失則史書之䇿宰撤其膳而又必有進善之旌誹謗之木敢諌之鼓瞽詩史書工誦針諌士傳民語必使至於化與心成中道若性而猶不敢怠焉其選左右之法則有三公之尊有三少之親有道有充有弼有丞上之必得周公太公召公史佚之流乃勝其任下之猶必取於孝弟博聞有道術者不幸一有邪人厠乎其間則必逐而去之是以太子朝夕所與居處出入左右前後無非正人而未嘗見一惡行此三代之君所以有道之長至於纍數百年而不失其天下也當誼之時固巳病於此法之不備然考孝昭之詔則猶知誦習誼之所言而有以不忘乎先王之意降而及於近世則帝王所以教子之法益踈略矣蓋其所以教者不過記誦書札之工而未嘗開以仁孝禮義之習至於容貌詞氣衣服器用則雖極於邪侈而未嘗有以裁之也寮屬具貟而無保傅之嚴講讀備禮而無針規之益至於朝夕所與出入居處而親密無間者則不過宦官近習掃除趨走之流而巳夫以帝王之世當傳付之統上有宗廟社稷之重下有四海蒸民之生前有祖宗垂創之艱後有子孫長久之計而所以輔養之具踈略如此是猶家有明月之珠夜光之璧而委之衢路之側盜賊之衝也豈不危哉詩曰豐水有芭武王豈不仕貽厥孫謀以燕翼子惟聖明之留意焉則天下幸甚其七所謂精選任以明體統者臣聞人主以論相為職宰相以正君為職二者各得其職然後體統正而朝廷尊天下之政必出於一而無多門之弊苟當論相者求其適巳而不求其正巳取其可愛而不取其可畏則人主失其職矣當正君者不以獻可替否為事而以趨和承意為能不以經世宰物為心而以容身固寵為術則宰相失其職矣二者交失其職是以體統不正綱紀不立而左右近習皆得以竊弄威權賣官鬻獄使政體日亂國勢日卑雖有非常之禍伏於冥冥之中而上恬下嬉亦莫知以為慮者是可不察其所以然者而反之以汰其所巳用而審其所將用者乎選之以其能正巳而可畏則必有以得自重之士而吾所以任之不得不重任之既重則彼得以盡其獻可替否之志而行其經世宰物之心而又公選天下直諒敢言之士使為臺諌給舍以參其議論使吾腹心耳目之寄常在於賢士大夫而不在於羣小陟罰臧否之柄常在於廊廟而不出於私門如此而主威不立國勢不強綱維不舉刑政不清民力不𥙿軍政不修者臣不信也書曰成王畏相語曰和臣不忠且以唐太宗之聰明英特號為身兼將相然猶必使天下之事關由宰相審熟便安然後施行蓋謂理勢之當然有不可得而易者惟聖明之留意焉則天下幸甚其八所謂振綱紀以厲風俗者臣聞四海之廣兆民至衆人各有意欲行其私而善為治者乃能總攝而整齊之使之各循其理而莫敢不如吾志之所欲者則以先有綱紀以持之於上而後有風俗以驅之於下也何謂綱紀辨賢否以定上下之分核功罪以公賞罰之施也何謂風俗使人皆知善之可慕而必為皆知不善之可羞而必去也然綱紀之所以振則以宰執秉持而不敢失臺諌輔察而無所私人主又以其大公至正之心恭巳於上而照臨之是以賢者必上不肖者必下有功者必賞有罪者必刑而萬事之統無所缺也綱紀既振則天下之人自將各自矜奮更相勸勉以去惡而從善蓋不待黜陟刑賞一一加於其身而禮義之風廉恥之俗巳丕變矣惟至公之道不行於上是以宰執臺諌有不得人黜陟刑賞多出私意而天下之俗遂至於靡然不知名節行檢之可貴而唯阿諛軟熟奔競交結之為務一有端言正色於其間則羣譏衆棑必使無所容於斯世而後巳此其形勢如將傾之屋輪奐丹雘雖未覺其有變於外而材木之心巳皆蠧朽腐爛而不可復支持矣苟非斷自聖志灑濯其心而有以大警敕之使小大之臣各舉其職以明黜陟以信刑賞則何以振巳頽之綱紀而厲巳壞之風俗乎管子曰禮義廉恥是謂四維四維不張國乃滅亡賈誼嘗為漢文誦之而曰使管子而愚人也則可使管子而少知治體是豈可不為寒心也哉二子之言明白深切非虛語者惟聖明之留意焉則天下幸甚其九所謂節財用以固邦本者臣聞先聖之言治國而有節用愛人之説蓋國家財用皆出於民如有不節而用度有闕則橫賦暴斂必將有及於民者雖有愛人之心而民不𬒳其澤矣是以將愛人者必先節用此不易之理也國家承五季之弊祖宗創業之初日不暇給未及大為經制故其所以取於民者比之前代巳為過厚重以熙豐變法頗有增加而建災以來地削兵多權宜科須又復數倍供輸日久民力已殫而間者諸路上供多入內帑是致戶部經費不足遂廢祖宗破分之法而上供歲額必取十分登足而後巳期限迫促科責嚴峻監司州縣更相督迫唯務自寬巳責何暇更察民情捶撻號呼有使人不忍聞者而州縣歲入多作上供起發則又於額外巧作名色寅緣刻剝此民力之所以大窮也計其所以至此雖云多是贍軍然內自京師外逹郡邑上自宮禁下至胥徒無名浮費亦豈無可省者竊計若能還內帑之入於版曹復破分之法於諸路然後大計中外冗費之可省者悉從廢罷則亦豈不能少有所濟而又擇將帥核軍籍汰浮食廣屯田因時制宜大為分别則供軍不資之費庶幾亦可減節而民力之寬於是始可議矣此其事體至大而綱目叢細類非一言之可盡今亦未暇盡為陛下言之惟聖明留意其本如上八者而後圖之則天下幸甚按前總目此處當有修政事以攘夷狄一條今缺甲寅擬上封事五月二十六日朝散郎祕閣修撰權發遣潭州軍州事兼管內勸農營田事主管荆湖南路安撫司公事馬步軍都總管借紫臣朱熹謹昧死百拜上疏皇帝陛下臣近者竊聞陛下過宫一事多有論諌未蒙採納屢降指揮尋復寢罷觀聽惶惑傳聞駭異如臣孤賤踈逺竊伏草茅不聞外廷末議初不敢妄有開説塵瀆聖聰特以今此蒙恩起當藩屏之任靜思所職上關國體若朝廷正綱紀立主德修人心悅則守土之臣雖極駑鈍尚可憑藉威靈勉自驅策以稱任使儻根本動搖腹心蠱壞大勢傾壓無復可為則中外之臣雖有竒才逺略亦無所施况如迂愚雖欲捐軀報國亦何所用其力哉是以不能自巳有不容不為陛下言者然臣所讀者不過孝經語孟六經之書所學者不過堯舜周孔之道所知者不過三代兩漢以來治亂得失之故所講明者不過仁義禮樂天理人欲之辨所遵守者又不過國家之條法考其歸趣無非欲為臣者忠為子者孝而巳今者取此以為言則在廷之臣言之悉矣陛下聽之亦熟矣捨此以為言則自古天下國家未有可以外此而為治者臣今亦不敢廣引前言備禮上疏以釣敢言之名而歸過於陛下請獨以父子天性之説為陛下流涕而陳之臣聞人之所以有此身者受形於母而資始於父雖有強暴之人見子則憐至於襁褓之兒見父則笑果何為而然哉初無所為而然此父子之道所以為天性而不可解也然父子之間或有不盡其道者是豈為父而天性有不足於慈亦豈為子而天性有不足於孝者哉人心本明天理素具但為物欲所昏利害所蔽故小則傷恩害義而不可開大則滅天亂倫而不可救假如或好飲酒或好貨財或好聲色或好便安如此之類皆物欲也清明之地物欲昏之則父或忘其為慈子或忘其為孝然後造為讒慝者指疑似以為真實指毫髮以為丘山譖之於其父則使施之於其子者不無少過譖之於其子則使施之於其父者䆮失其常然後巧為利害之説以劫之蓋謂如此則必受其利不如此則必蹈其害利害既有以蔽其心此心日益猜疑今日猜疑明日猜疑猜疑不巳子一舉足而得罪於其父父一出言而取怨於其子父子之情壞而禍亂作矣試於暇時或於中夜或於觀書之際或於靜坐之頃捐去物欲之私盡祛利害之蔽默觀此心之本然則父子之間固未嘗不慈且孝也臣竊觀陛下天資仁孝初政清明進退人才動合公論一言之善天下誦之豈獨於天性至親反用其薄况備物之養無大虧闕政事之間無大更革過宮定省本非難行猶豫遲回動踰時月亦獨何也無乃事起於纎微情阻於踈闊方間隙之將萌羣臣不能救之於早及形迹既著又不能察陛下事親之本心且無以和陛下父子之情往往語言拙直援引過當其心雖忠於陛下而不足以感悟陛下之聽徒以激怒陛下故近日臨欲過宫而復輟者陛下未必不曰身為萬乘之主乃不得一事自由乎故不肯屈獨斷之權為羣論所迫耳而陛下父子之情所以至此者臣竊料陛下即位之初便有姦人造為邪説離間陛下之父子如一飲宴之失壽皇慮陛下或怠於為政一言動之愆壽皇憂陛下或至於成疾此皆愛陛下之至切故或形於言而不自以為嫌其意惟欲陛下遷善改過正心修身以奉天地以承祖宗為有宋萬年無疆之休而巳曷嘗有纎芥忿恨如浚井塗廩之意哉而姦人因之造為危語往來間諜以誤聖聽不唯使陛下之身常懷疑懼而使陛下之宮中亦皆嚴憚重華而不敢親近日逺月踈間隙愈大天下之人但見壽皇慈覆天下而於陛下為尤篤陛下所以事壽皇者乃不以孝聞而以失禮聞又不知其為羣小之姦而直以為陛下之失街談巷議偶語族談至有臣子所不敢聽者臣恐不惟如此一旦上帝震怒匹夫流言草野僭亂將仗義而起夷狄外侮興問罪之師當是時六軍之情能使之親附乎萬姓之心能使之固結而不解乎讒邪之人雖復臠而食之其能有及於國家之敗乎如臣之愚雖百千輩咸欲粉身赤族為陛下死其能有輔於社稷之存亡乎又聞壽皇聖躬比者小愆和豫雖未必因此而天下後世寧不曰意念鬱鬱而至此乎夫事固有失於毫釐之間而遂至於不勝悔者臣子之所不忍言而忠於事君者亦不敢隱也昔漢文帝徙淮南王少失思慮而尺布斗粟之謡終身病之夫以兄而不能容其弟雖賢主不敢自恕其過也况以天下之大而不能容其父乎為今之計先遣大臣謝罪於重華次發明詔告諭在廷言前日之所以不能無疑者以讒邪惑亂之故誅此姦人以謝天下屏斥餘黨還始初之清明即日駕過重華問安侍膳以盡父子之歡如此則天下歌舞四夷尊仰書之信史以為美談反危而安特在陛下反覆手之間耳今愛陛下之切者中宫也嘉邸也忠陛下之至者二三大臣也願出臣章與之參訂必有以知臣之惓惓於君父而其言雖陋實宗社之至計也限守逺郡無由請對而忠憤所激不能自巳是以冒死拜疏痛哭流涕而極言之唯陛下赦其狂瞽臣冒犯天威無任震懼殞越之至臣熹昧死百拜乙卯擬上封事文不録晦庵先生朱文公卷第十二福州府學訓導舒鏊校
