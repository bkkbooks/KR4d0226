body:
  text: 奏狀奏衢州守臣李嶧不留意荒政狀臣昨蒙賜對輒論州縣檢放災傷不實之弊伏蒙聖慈開納即降睿旨令臣詢訪不實最多去處按劾施行臣恭稟聖訓伏自到任即行詢訪大抵本路𬒳災諸郡檢放分數多不盡實而衢州尤甚蓋自去歲大水之後知州事朝散郎李嶧專務掩蔽不以實聞及轉運司訪聞差官驗問既得其實反為李嶧執稱無水而其親戚方在政路曲為主張遂再下提刑司體究欲以遂其姦詐幸所差官不肯曲從方欲具以實聞又為李嶧生事把持至今未竟及既遭旱嶧又妄申諸司稱民不闕食未至流移後來甚不得巳然後差官檢視所差之官受其風旨早田之旱例不為檢晚田又不盡實如常山一縣𬒳災最甚通計無慮七八分而嶧乃只作一分六釐減放至開化縣𬒳災不減常山而其所放則又僅及一釐一毫而巳臣今行視兩縣之境水痕尚存髙岸民居皆至半壁山谷之人採取蕨根以充飢腸羸瘦萎黃非復人貌歲前雨寒死亡巳多而李嶧恬然略不加恤對臣依舊隱諱堅執舊説其于荒政全不留意但知一味差人下縣督責財賦急如星火所蒙聖恩撥賜米斛共六萬石不為不多而至今日久並不科撥下縣亦不曉諭民間諸縣官吏尚有𥘉不聞者况于窮民何緣得知聖主天地涵育之恩加以病昏不能視履百度廢弛不成州郡不但檢放不實荒政不修而巳也臣既奉聖訓詢訪見得上件事理不敢緘默以負委寄敢昧萬死按劾以聞伏惟聖慈早賜處分奏請畫一事件狀臣今有合具奏請事件謹具下項一臣昨為紹興府米斛有限飢民日衆向後日月尚逺竊恐無以接續糶濟仰貽宵旰之憂曾具奏聞乞再給會子三十萬貫及盡推去年賞典半減度牒米數至今日久未奉進止今到衢婺見得兩州元係災傷稍輕去處而糶濟之備可接初秋紹興係災傷最重去處而糶濟之備反不能盡春月將來青黃未接必致狼狽無可疑者欲望聖慈檢臣前奏早賜處分庶幾有以接續糶濟不棄前功不勝幸甚一臣昨到婺州為見豪戶修職郎朱熙績不伏糶米抵拒官司曽具奏聞乞賜行遣今據婺州申到本人居鄉豪橫不法事件條目猥多不敢復具奏聞巳條具申尚書省去訖其人多資力能使鬼伏乞睿斷早賜施行不勝幸甚一臣昨凖尚書省劄子勘會巳降指揮行下江浙兩淮旱傷州縣將第四第五等戶今年以前應干殘欠苗稅丁錢並特住催及將官私債負權免理還其流移人拖欠官物亦與除豁不得令保正長代納并攴撥米斛通行賑濟謹巳即時行下州縣遵守施行去訖續據紹興府新昌縣申今年以前未委是淳熙七年官物或是淳熙八年二稅臣亦巳申省欲乞明降指揮未奉回降今來巡歷見得州縣奉行果是互有不同蓋有以今年以前為七年者則八年四等五等夏秋殘欠依舊催理有以今年以前為八年者則八年四等五等夏秋殘欠悉巳住催蓋緣本文未明致此差互臣亦未能别其是非然竊以謂治財思豫寧過於厚渙汗之號有出無反欲望聖慈明降指揮將八年四等五等殘欠併行住催仍乞令臣督其奉行不如法者庶幾雨露之澤均一霑𬒳不勝幸甚一衢州守倅並各任滿在即欲乞特降指揮催促巳差下人前來赴任奏張大聲孫孜檢放早傷不實狀臣昨蒙賜對奏論州縣檢放不實令臣詢訪最多處按效臣詢訪得本路州縣檢放類多不實而衢州為甚衢州檢放既多不實而開化一縣又為尤甚巳節次奏聞外今取會到本州元差監户部贍軍酒庫成忠郎張大聲前去檢視及差龍逰縣丞從政郎孫孜核實逐官自當從實檢視減放却乃觀望本州守臣意指不以恤民為念不曽逐一親詣田頭檢視輒敢欺罔滅裂將七八分以上災傷作一釐一毫八絲六忽檢放是致𬒳災人戶困于輸納追呼監繫決罰之苦流移四出而貧下之民無從得食歲前寒雨死亡甚衆有傷聖朝子育黎元救恤災患之意逐人委是難以存留在任欲望聖慈特降睿旨將張大聲孫孜並行重賜黜責以為日後附下罔上慢法害民之戒乞賜鐫削狀臣昨以職事橫𬒳中傷伏蒙聖明特賜臨照謹巳遵稟復還紹興府界竊見諸暨縣災傷至重疾疫大作民之羸瘠死亡者巳不勝數由臣前日聞命之際震恐猝迫輕去職守有失照𬋩目今雖巳一面多方措置收拾救濟然前日之罪巳在不赦之域加以蹤迹孤危風采銷奪竊恐無以號令州縣卒副使令顧獨惟念飢民生死之命在此數日之間恐勤宸慮未敢再乞賜罷只乞聖慈且將臣見在官職先次鐫削候救荒結局日别行竄責庶允公議乞給降官會等事仍將山隂等縣下戶夏稅秋苗丁錢並行住催狀臣恭𬒳聖恩復抵官次今有職事須至奏聞謹具下項一臣自衢婺州復回紹興府界竊見衢婺災傷比之紹興分數殊少而兩州公私本皆富實賑恤之備足至秋成惟紹興府災傷極重所費不資目今巳是非常狼狽而考其後日之備乃不能盡三月而止竊恐新麥未登之際尚有闕乏之患而下田之麥亦有遭雨浸損去處又巳無復食新之望其豐熟處常歲所收亦不過可為兩月之計五六月間青黃未接之際此必復有以勞聖慮者若至其時方作處置竊恐復有緩不及事之歎如欲及今講究早為措畫則臣昨纍具奏所乞數事今皆尚可行也其一乞推去年獻助之賞者巳蒙節次施行近日遂有婺州進士陳夔詣臣投狀陳乞獻助二千五百石訪聞浦江等縣更有一二家亦欲陳獻此亦可見不吝恩賞之效今若更賜指揮催促省部盡行推賞使無一戶之遺然後鏤板開具頒下諸州廣行曉諭則其慕而效之者當不止此而巳也其二乞減度牒米數亦已蒙減五十石此則恐所減太少未足多致米斛蓋度牒本價止四百貫適今之宜更合少損以濟飢民乃為得䇿不當反髙其直使曠日持久卒無所售以誤指凖也其三則臣嘗與帥臣王希吕同奏再乞撥賜錢會三十萬貫而未蒙開允也此固無厭之請宜不足聽然紹興之民不幸罹此非常之災父老相傳以為數十百年所未嘗有而陛下所以扶持救恤恩勤備至亦數十百年所未嘗有今其不能免于死亡捐棄者已無可言其幸得延殘息以至今日者豈可不為終惠之計而使之旬月之間頓至闕絶以棄前日之功哉抑官會出于印造非有鼓鑄之勞見今通行輕重之權與見錢等雖使更散三數十萬亦未遽有害于流通也况以陛下之至仁至聖夫豈有愛于此而輕百萬人之命哉且又紹興纍年荒歉常平錢米日下支散無復一文一粒可為將來久逺之備今此所乞若蒙聖慈依數撥賜則亦非惟可救目前之急萬一支遣不盡又足以接續收糴更為後日之儲其利尤不細也凡此三者乞留聖念早賜施行庶幾緩急不至誤事然臣尚慮麥前急闕收糴未辦獻助不多有失賙救竊見本路諸州常平義倉米斛尚有餘剩未支遣處欲乞特降指揮許臣照應移用條法量行取撥尤為利便一臣昨具奏乞照應元降指揮明降睿旨住催淳熙八年四等五等殘欠官物未蒙施行而後來戶部勘當止將淳熙七年終殘欠住催于是州縣日前雖已將八年秋米住催者皆復追催其未放者則其催督愈益嚴峻臣于此時適以俟罪不敢復有陳論然竊獨病其深失朝廷命令之體其後乃聞軍器監主簿李嘉言請以臨安餘杭兩縣四五等戶八年苗稅比附徽饒州例亦行住催而陛下可之則又有以知凡此戶部之所行者皆非陛下之本心也蓋所謂四等五等戶者非他也乃今日蒙𬒳糶濟之飢民陛下所為焦心勞思傾囷倒廩而拯之于溝壑之中者也夫以救之如此其悉而猶常慮其有所未至其肯使州縣之吏追呼禁繫加以箠撻而速其死亡也哉况今本路災傷紹興為甚比之徽饒兩州臨安餘杭兩縣事體有甚不侔者若蒙矜憐出自聖意特降指揮將紹興府山隂會稽􅌘縣諸暨蕭山五縣四等五等戶夏稅秋苗丁錢並與住催其餘諸州縣逐都檢放旱傷及五分以上者五等戶亦與住催七分以上者并四等戶並與住催候秋成日併行帶納則𥘉不失縣官之入而足以少寬飢民目下之迫免致流移死損不勝幸甚乞將山隂等縣下戶夏稅和買役錢展限起催狀照對紹興府諸縣去歲水旱相仍田禾損傷人民飢餓幸賴聖恩給賜錢米廣行賑救以至今日二麥既已成熟民之幸免于死亡者亦稍蘇息全籍官司存恤休養方可安業今不住據屬縣第四第五等人戶列狀陳稱災傷之餘生理未復竊恐和買役錢夏稅綿絹凖例起催乞特與具奏放免一年臣照得人戶夏稅綿絹係是朝廷常賦難以放免外惟是起催省限在五月十五日竊見下戶今春乏食養𧖟甚少二麥雖熟亦只得供給口食尚慮將來青黃未接更有闕食之患所有稻田又方蒙聖恩借給秧本始得布種向去早禾成熟尚逺若或依限便行起催竊慮細民未有可以送納不免追呼之擾却致逃移欲望聖慈特降睿旨將紹興府最荒蕭山諸暨􅌘縣會稽山隂五縣第四第五等戶合納今年夏稅和買役錢與展限兩月起催庶幾新榖成熟之時可以送納所有上三等人戶自從常年條限催理如蒙開允從臣所乞則上既不虧縣官經常之費下可少安飢餓羸困之人誠為兩便乞住催𬒳災州縣積年舊欠狀具位臣朱熹臣伏覩四月二十二日聖旨指揮紹興府蕭山諸暨會稽山隂􅌘縣五縣并嚴州諸縣各為去年水旱最甚可將第四第五等人戶合納今年夏稅和買役錢並特與展限兩月起催內有願依條限送納之人聽從其便仰見陛下愛育黎元天地父母之意臣竊慮州縣奉行不虔仰稽睿澤即巳鏤版多印小榜散下紹興府五縣曉示去訖臣訪聞本路𬒳災州縣知通令佐多有只見𧖟麥稍熟便謂民力巳蘇遽于此時催理積年舊欠上下相乘轉相督促使斯民方幸脫于溝壑之憂而一旦便罹追呼決撻囚繫之苦甚可哀痛况今疫氣盛行十室九病呻吟哭泣之聲所不忍聞豈堪官吏更加殘擾臣雖巳行下諸州及通判約束外尚慮未能禁戢欲望聖慈特降指揮令𬒳災最重州縣如紹興府衢婺州且據今年合納官物照應三限條法勸諭人戶及時送納其積年舊欠直候秋冬收成之後逐料帶催庶幾飢餓餘民得以存活其溫台等州去年災傷雖不至甚然亦不為樂歲并乞同此指揮戒飭官吏不得意外生事妄有搔擾則一路生民蒙𬒳德澤不勝幸甚臣以狂妄曲荷優容偶有所聞不敢不奏纍瀆天威臣無任戰粟俟罪之至須至奏聞者右謹録奏聞伏候勑旨乞推賞獻助人狀臣昨具奏乞依前點檢台州措置賑濟官耿延年所奏將本路獻助糶濟米人戶比乾道七年糶濟賞格特減米數之半優與推賞已蒙聖恩開允特降指揮依臣所乞將諸路州縣人戶願出米榖自行般運前來紹興府糶濟減半推賞臣當即恭稟施行節次勸諭到婺州進士陳夔等各赴本司及紹興府入狀情願獻助米斛本司與紹興府各巳差官交量或巳就行散給去訖臣巳與安撫轉運司連名具狀申尚書省及戶部乞依乾道七年及淳熙八年十二月十三日指揮推賞外今來竊恐有司將同常事未即推恩致使失信本人無以激勸來者欲望聖慈特降睿旨依巳降指揮將陳夔等特補合得官資庶幾有以取信于民將來或有災傷易為勸諭實為利便開具逐人所獻米數合補官資畫一下項婺州金華縣進士陳夔獻米二千五百石凖淳熙八年十二月十三日指揮合輔迪功郎婺州浦江縣進士鄭良裔獻米二千石凖淳熙八年十二月十三日指揮合補上州文學婺州東陽縣進士賈大圭獻米二千石凖淳熙八年十二月十三日指揮合補上州文學處州縉雲縣進士詹玠獻米二千五百石凖淳熙八年十二月十三日指揮合補迪功郎奏衢州官吏擅支常平義倉米狀照對臣昨據衢州知州朝奉大夫沈崈一申今年二月二十一日到任適當荒歉之後財計匱乏别無可以措置巳申明朝廷乞于豐儲倉內更給助米二萬石以濟攴遣本州四月合散官兵米四千餘石未有指擬逐急于常平義倉米內權行借兊合有擅支之罪除巳具奏乞賜處分施行外申本司照會本司契勘衢州見𬋩常平義倉米數不多其災傷之餘尚慮新陳未接之際細民闕食凖擬接續濟糶設欲借兊自合申聞朝廷聽候回降又不聞本司知覺輒行擅借四千餘石支散官兵有違條法遂申尚書省乞劄下根究監勒本州擅支借官吏照數補還元舊窠名椿管去後又據衢州申再行借兊義倉米支散五月分官兵糧米本司契勘衢州設有欠闕即合措置于别色米斛應副今來本路州軍見管常平米數不多本司尚且申奏朝廷乞給降錢會收糴若或容令州縣違法侵撥萬一不測有誤指擬再具申尚書省乞賜敷奏依法施行如是本州軍糧委實欠闕即乞别行應副去後未蒙劄下近覩巳降指揮衢州守臣巳行放罪臣伏緣在法義倉穀唯充賑給不得他用即擅支借移用以違制論臣竊惟常平之法所以凖備災傷廣行賑給民命所係利害非輕所以祖宗以來立法之嚴至于如此而議者不以為過以為久長緩急之計非苟徇目前姑息之私者所能知也今衢州當職官不能計度軍儲應副支遣而坐指常平儲蓄之備以為一時之用雖原其情實未必有他情弊而墮廢法度耗散儲蓄漸不可長故臣昨來不欲便具奏劾只具狀申尚書省乞與敷奏依法施行意謂朝廷必須薄行責罰以戒後來今乃一無所問亦不略行戒約即在本司何以約束諸郡况今來旱勢巳成衢州尤甚昨日有轉運司差出官員自彼回來説城中米價巳是七十文足一升兼本州水路淺澀卒難般運他處米斛將來糶濟全仰見𬋩常平義倉米斛尤宜愛惜不可違法妄有侵耗欲望將本州當職官吏略加責罰或念其委實欠闕軍糧即乞朝廷别行應副嚴行約束今後不得輒將常平官物妄有侵支實為久逺之利伏候勑旨奏蝗蟲傷稼狀簽黃奏為紹興府會稽縣廣孝鄉蝗蟲入境臣親到地頭田間看視委有咬傷稻苗今與知紹興府王希吕詢訪祈禱打撲焚瘞奏聞事具位臣朱熹臣昨于今月初四日聞得紹興府會稽縣蝗蟲頗多即遣人走探昨巳據所差人孫勝回報會稽縣白塔寺相對東山下有蝗蟲數多收拾得大者一籃小者一袋其地頭村人皆稱蝗蟲遇夜食稻臣已具事狀并大小蝗蟲二色申尚書省乞賜敷奏去訖臣遂即時乘船出門向曉至蝗蟲地頭廣孝鄉第十都第十七都同會稽令尉步行親到田間看視其蟲大者不多小者無數集于稻苗之上其未結實者莖葉皆為咬傷其巳結實者榖苗皆為咬落委是為災有害苗稼紹興府先巳支錢一百貫文付會稽縣募人打撲赴官埋瘞本司亦巳支錢一百貫文付縣添貼收買據本縣申兩日內巳買到七石三斗八升五合臣亦與帥臣王希吕一面詢究祈禱打撲焚瘞外須至奏聞者右謹録奏聞謹奏御筆回奏狀御筆覽奏知紹興府界蝗頗為災朕心憂懼今不欲專遣使人降香二合付卿等宜即虔潔分詣祈禱又聞蝗之小者滋育甚多可更支賞召人收捕務速殄滅母使遺種以為異日之害故兹札示當體至懷具位臣朱熹臣昨具奏紹興府會稽縣廣孝鄉蝗蟲臣已同本府發錢專令本縣令尉親在地頭召人捕獲收買焚埋每得大者一斗給錢一百文小者每升給錢五十文續奉御札令臣分詣祈禱更行支賞召人收捕務速殄滅臣恭稟聖訓夙夜不遑即同帥臣王希吕就府治設醮祈禳又發錢出榜曉諭于先支賞錢之外更行倍加增貼召人收捕仍差茶鹽司幹辦公事沈大雅前去監視督責及敦請鄉官二員同縣官分頭給賞收捕今據申到截今月十三日通計收到大蟲一石五斗三升六合小蟲二十五石九斗三升九合並巳埋瘞目今尚有一分以上未至盡絶臣續又見諸暨縣寄居與投詞人稱紫巗鄉亦有飛蝗在境臣即巳專委本縣令佐親臨田陌子細從實相視如委的實即從會稽縣所行召人支賞收捕焚埋去外臣伏為本路所𬋩衢婺等六州今歲旱損比之紹興其災尤甚本欲取本月上旬起離前往親行檢視預備賑恤正緣收捕蝗蟲未盡未得起發今不住據逐州縣接續申到事理委是大假緊急不免定取十五日起發前去經由蝗蟲地頭更行督責取見殄滅次第然後取道􅌘縣山間望婺州界迤邐前去前路有合奏聞事件續次申發所有上項事理須至先具奏聞者右謹録奏聞謹奏簽黃臣竊聞旱蝗之災過貽聖慮夙夜焦勞至忘寢味臣雖踈賤不勝感泣震懼之至今此前去災傷州郡敢不究心竭力周爰咨詢庶有以仰稱明詔之萬一但前奏乞錢數事欲望睿旨早賜施行臣雖未到諸郡近日提刑傳淇張詔自彼來歸其言所見委實災傷至重尚慮臣所乞錢數少不足周給臣緣未經目見不敢再具懇請且乞早賜指揮依臣前奏應副施行庶幾前路所到州郡便可布宣德意掯約收糴以慰飢民之望若不得此實無措手之處將來坐視陛下赤子流離溝壑臣雖萬死不足贖罪伏乞聖照臣去年到任已是深冬狼狽急迫措置不辦只得將所蒙給賜錢米計口分俵誠為可惜今來雖是災傷然日月尚寬足可措置臣巳行下逐州通判檢計有合興修水利去處將來廣募飢民給食工作唯是老弱殘疾婦女之類無依者方與賑給庶幾不至又似去年虛費官物伏乞聖照乞修德政以弭天變狀具位臣朱熹右臣昨為本路旱傷祈禱不應纍曽具奏及申尚書省乞為敷奏早作防備近凖省劄巳蒙聖慈特從所請支錢于明州置場糴米而又伏覩陛下發自宸衷特遣中使降香祈禱臣有以見陛下畏天恤民之心至深至切不勝感激願效愚忠顧恨官有常守無由瞻望清光罄竭血誠庶禆萬一不勝犬馬螻蟻區區之情竊謂纍年之旱譴告已深今日之災地分尤廣非惟官府民間儲備巳竭而大農之積亦已無餘又當大禮年分戶部催督州縣積年欠負官物其勢不容少緩凡所以為施舍賑恤之恩者竊恐又必不能如去年之厚臣竊不勝大懼以為此實安危治亂之機非尋常小小災傷之比也為今之計獨有斷自聖心沛然發號深以側身悔過之誠解謝髙穹又以責躬求言之意敷告下土然後君臣相戒痛自省改以承皇天仁愛之心庶幾精神感通轉禍為福其次則唯有盡出內庫之錢以供大禮之費為收糴之本而詔戶部無得催理舊欠詔諸路漕臣遵依條限檢放稅租詔宰臣沙汰𬒳災路分州軍監司守臣之無狀者遴選賢能責以荒政庶幾猶足以下結民心消其乘時作亂之意如其不然臣恐所當憂者不止于餓殍而在于盜賊蒙其害者不止于官吏而止及于國家也臣蒙恩至深不知死所敢冒鈇鉞為陛下言之觸犯天威恭俟夷滅謹録奏聞伏候敕旨地分一作地里再奏衢州官吏擅借支常平義倉米狀具位臣朱熹臣照對本路諸州今歲旱傷比之他郡衢州尤甚將來細民必至艱食全藉本州所𬋩常平義倉米斛賑濟賑糶以救民命臣近點檢衢州沈崈一違法擅行借兊過常平義倉米八千石充四月五月官兵俸料臣巳一面行下衢州督催輔還元舊窠名及具録奏聞乞將本州當職官略行責罰以戒後來未得回降今來再據衢州沈崈一申又于常平米內借支三千五百石充六月分軍糧三箇月共擅借過一萬一千五百石并本州申先借攴過常平米一萬九千五百八十一石五斗六升四合亦係充官兵俸料未曽撥還及稱目下盤量折次米一萬七千七百一十五石五斗一升三合三勺三項共計四萬八千七百九十七石七升七合三勺更有衢州濟糶未盡米一萬八千一百九十九石一斗九升本州所申不曽聲説此項米著落必是亦有互用臣照對在法義倉榖唯充賑給不得他用擅攴用者以違制論况本路諸州所𬋩常平義倉米斛唯衢州萬數稍多輒皆擅行攴用目今見管止有三千一百六十五石三斗八升委是大失指凖而本州略無忌憚甚非朝廷置立常平之意竊慮必有情弊臣除巳一面牒鄰近州追衢州合干人收索赤曆干照逐一根勘從法施行外欲望聖慈先將衢州違法擅攴常平義倉米當職官吏特行青罰以警諸郡為擅用常平義倉米者之戒須至奏聞者右謹録奏聞伏候勑旨奏救荒畫一事件狀臣竊見本路諸郡頻年災傷蒙𬒳聖恩僅獲全濟今又亢旱周遍七州其幸免者不過三五縣比之去年𬒳災地分大假闊逺至于公私積蓄則連年飢歉攴移發散略巳無餘其于措置尤為費力臣本欲此月上旬巡歷諸郡計度合用錢米詢訪合行事務回日類聚奏聞庶免頻煩天德今為紹興府會稽縣界蝗蟲害稼見行監督掩捕埋瘞巳是纍日未見衰減未敢起發前去竊慮合奏請事漸致後時有失及早措畫今略條具一二冒昧以聞伏望聖慈閔此一方重罹災數特垂矜恤早賜施行不勝幸甚一臣昨曽具奏乞詔州縣照應省限理納夏稅不得促限追呼巳蒙聖慈頒下施行今聞諸州間有不遵稟者公行文移必要七月上旬取足顯屬違戾兼昨具奏乞將紹興府去年住催夏稅人戶納過之數依倣秋苗所放分數特與比折今年合納之數亦蒙聖慈行下又為戶部巧為沮難行下本府催督愈峻今來既是復有災傷豈是追呼箠撻催督稅賦之時欲望聖慈特降指揮令𬒳災州郡將所𬋩縣分𬒳災重處特與寬限勸諭送納其不係𬒳災縣分內有𬒳災鄉分亦合較量輕重依此施行其紹興府理折夏稅亦乞直降指揮依臣所乞施行庶幾遭難遺民稍獲安業一臣昨具奏諸州雨暘次第曽有貼黃奏稟乞詔州郡依條受理旱帳及早差官檢放事蓋為田稻既是乾損及其未穫之際便行檢踏即荒熟之狀明白易知非惟官司不得病民亦使姦民無由僥幸所以著令訴旱自有三限夏田四月秋田七月水田八月蓋欲公私兩便近來官吏不曽考究令文但據傳聞云訴旱至八月三十日斷限遂至九月方檢早田則非惟田中無稼之可觀至于根查亦不復可得而見矣于是將旱損早田一切不復檢踏蠲放窮民受苦無所告訴而其狡猾有錢賂吏者則乘此暗昧以熟為荒瞞官作弊皆不可得而稽考去歲本路諸州大率皆然欲乞降指揮劄下轉運司及本司遍牒諸州縣疾速受理旱狀目下差官檢踏旱田荒熟分數其中晚稻田却候八月受狀節次檢踏如有奉行違慢後時失實之處許兩司按劾以聞庶幾窮民將來獲霑實惠目下聞此德音便知朝廷存恤之意不至猖狂别生妄念仰勞宵旰之憂實為利便一賑恤之備去年諸郡公私猶有蓄積緣今春支用數多悉巳無餘今𬒳災之民既是不可不加接濟則其費皆當出于朝廷臣本欲遍詢諸郡約見合用實數然後奏請今恐因循後時失于措置兼聞衢婺明州守臣皆欲丐祠而去台州亦申本司乞撥錢糴米數目甚多又見臣寮劄子論衢州等處見巳乏食及有指揮行下閩廣勸諭客米前來溫州接濟可見一路州軍荒歉匱乏事勢巳急臣今且約一路之數權以一百萬貫為率欲望聖慈特賜開許印給度牒官會早賜給降其度牒欲乞就十分錢數之內且給三分依近降指揮每道且賣五百貫文省或依元價作四百貫文省容臣約度分俵諸州守臣令其多方措置變轉收糴庶幾趂此早榖成熟之際便于左近有米去處價直尚平之時節次收拾免致臨時倉卒貴價收糴緩不及事一訪聞諸州府村落巳有強借劫奪之患此在官司固當禁約然亦須先示存恤之意然後禁其為非庶幾人心懷德畏威易以彈戢若漫不加省待其生事然後誅鉏則所傷巳多所費又廣况其不勝何患不生乞降指揮早撥上項錢數使如臣者得以奉承宣布遍行曉諭即德意所孚固有以銷厭禍亂之萌矣然後明詔安撫提刑兩司察其敢有作過唱亂之人及早擒捕致之典憲庶幾姦民知畏不至生事一去歲獻納糶濟之人近巳各蒙聖恩輔授官資無不感戴然去歲所降減半指揮止于紹興一府施行今則一路皆荒事體不同乞降指揮檢會當來耿延年所乞事理許于浙東一路通行一檢凖常平免役令諸興修農田水利而募𬒳災飢流民充役者其工直糧食以常平錢榖給臣契勘本路水利極有廢壞去處亦有全未興創去處欲俟將來給到錢物即令逐州計度合興修處顧募作役既濟飢民又成永久之利實為兩便一伏見州縣之吏不為不多而其間才能忠信可倚仗者極不易得將來七州糶濟往來督察用人必廣乞降指揮特許將得替待闕丁憂致仕及在法不應差出之官權行差使候結局日如舊庶可集事右謹録奏聞謹奏簽黃臣所乞錢數雖多然以今日明州中色米價計之方糴得二十四五萬石散之七州不為甚多而盤運水腳糜費又在其外伏乞聖照臣所乞紹興府理折夏稅事理極為分明然在中夏以前未經再旱之時行之固若有過優者在今日再旱之後人物煎熬朝不謀夕之際沛然行之以紓民力則恐未為甚過况今據大數通府所放秋苗不過六分三釐以此計之所減夏稅亦不甚多若以去年比例言之今年夏稅亦合住催况此是輔還去年之數直行放免不為過當重念臣自論此事上為省部所嫉下為州郡所仇藉躪形迹無所不至原其本心只為陛下愛養疲民護惜根本誠亦何罪而至于此切望聖明哀憐照察臣竊詳在法檢視蠲閣隸轉運司臣今敢以為請者蓋緣蠲閣賑恤本是一事首尾相須若蠲放後時失實使飢民巳𬒳輸納追呼之擾然後復加賑恤則與割肉啖口無異故臣妄意欲得參與其事庶幾血脈貫通使聖朝賑恤之恩不為虛枉伏乞聖照臣所奏請固皆今日所當施行而此項最為急切竊恐大臣進呈之際謾將一二項不甚緊要事節量行應副却將此項沉溺不為施行俟臣再請則又費月日致失機會且如明州糴米一事臣本是四月二十三日以後節次申奏是時明州米船輻湊正好收糴乃不施行及至六月十一日方得指揮則所有船米巳為上戶收糴殆盡矣今朝廷施行事體緩慢姦弊百端不稱陛下救焚拯溺之意大率類此臣不敢越職奏聞惟是此事切乞斷自聖志力賜主張蓋不惟一路民命所繫實亦國家休戚所關願陛下獨留聖慮臣曽摹得蘇軾與林希書説熙寧中荒政之弊費多而無益以救之遲故也其言深切可為後來之龜鑑近已刻石本司緣是臣下私書不敢容易繳進今有一本急于申奏不及如法標背巳申納尚書省或蒙宣索一賜覽觀仍詔大臣常體此意不勝幸甚此項以後係是次緊內推賞差官兩條亦乞早留聖意乞留婺州通判趙善堅措置賑濟狀具位臣朱熹臣據知婺州錢佃申備據國學進士唐季淵等狀本州去歲遭旱特甚通判朝奉郎趙善堅協力措置災傷廣求利害籍貧乏家七十萬口置濟糶場五百餘所勸諭上戶糶米借貸排日煮粥以食民之不給津遣鄰郡流移收養小兒遺棄病者醫藥以療之無流移凍餒之人存活者幾百萬口實迹可考今歲闔郡乾旱祈禱尚未感通飢餓狼狽指日可待趙善堅前來賑濟有方况今歲之旱甚于去歲善堅解罷在即不惟邦民失所倚賴而州郡亦大失禆助乞特敷奏權留在州同共措置賑濟佃契勘去歲旱歉通判趙善堅專一措置賑濟遍歷諸邑山谷點檢糶場委是宣勞實惠及民今年梅雨愆期旱歉至甚照得通判趙善堅今年七月十八日任滿本州委是闕官措置乞移牒趙善堅權留在任同共措置賑濟候來年細民接食却行解罷臣照對婺州去歲災傷本州通判趙善堅措置濟糶存恤飢民委有勞效本官雖將任滿本州今歲又遭旱傷比之去年尤甚切要知得措置首尾官員差委幹辦欲望聖慈特賜睿旨許從本州守臣錢佃備到士民連狀所請令善堅在任同錢佃協力措置災傷庶免誤事須至奏聞者右謹録奏聞伏候勑旨乞將合該蠲閣夏稅人戶前期輸納者理折今年新稅狀具位臣朱熹臣昨備據紹興府士民魏必大等狀陳訴具狀申奏朝廷乞行下紹興府將災傷諸縣自第一等至第五等人戶照應淳熙八年巳納夏稅和買役錢等依秋苗檢放分數除豁外有餘剩納過分數與理作今年合納夏稅事續承降五月三十日省劄戶部勘當即不委本府去年受納到人戶錢物自第一等至第五等各等各戶納到若干分數比秋苗有無多納過錢絹紬綿數目獲奉聖旨指揮劄下開具保明供申臣巳恭稟施行及照得取會各等逐戶數目緣諸縣戶名萬數浩瀚竊慮遲延有妨催科繼巳具申尚書省今一面取會到諸縣去年總計管納夏稅官物除山園陸地浮財屋産外其湖藉田共計合納二十八萬六千三十七屯匹三丈六尺七寸五分折帛役錢等三十萬三千四百九十六貫七百五十文除𬒳水淹浸倚閣蠲免及人戶納到錢帛外有未納共五萬三千五百七十六屯匹一丈五尺一寸六分錢四萬一千四百六十一貫二百六十八文若以檢放秋苗分數合計七萬一千三百七十八屯匹一丈七尺八寸錢一十萬九千五百一十六貫二百八十二文外諸縣止有剩納三萬七千八百九屯匹三丈九尺八寸六分錢七萬七千二百三貫九百二十六文在官乞理作今年合納之數臣照對紹興府諸縣所𬋩湖藉田畝出納夏秋二稅官物去年緣為災傷其秋苗係隨田內禾稻輕重檢放其所輸夏稅雖因水災得蒙蠲閣後來繼即遭旱水不及處亦無所收緣係未收成以前起催所以人戶多不霑𬒳減放之恩又八月內降到蠲閣指揮之時人戶之善良畏事者皆已輸納其得𬒳聖恩者實皆頑猾之戶事體輕重甚不均一臣又竊覩去歲災傷飢民猥衆尚蒙聖慈撥賜錢米救濟豈有田內夏稅巳蒙蠲閣人戶前期誤行輸納者却不與理折今年新稅甚非朝廷矜恤之意况今夏以來諸邑又多亢旱斯民接連飢荒方苦艱食當此催科之時委實無可輸納若不蒙朝廷特加優恤必見失所况以諸縣數百萬戶口今來所乞通理剩納之數其為物帛止三萬七千八百九十七屯匹三丈九尺八寸六分錢止七萬七千二百三貫九百二十六文數目既少于朝廷所損不多而民戶可霑實惠欲望聖慈俯賜允從特降指揮將人戶去年剩納前項數目與理作今年之數蠲豁庶幾嗷嗷之民得以安業須至奏聞者右謹録奏聞伏候勑旨奏巡歷沿路災傷事理狀具位臣朱熹今具沿路災傷事理下項須至奏聞者一臣七月十六日再到田間看視蝗蟲大者絶少而小者尚多當處多是旱中禾稻皆巳成熟多𬒳喫損人戶皆稱檢官未到見分數不敢收割臣巳牒本府催促所差下官日下出門前來檢視去訖又支錢付曹娥監鹽官收買十四十五都蝗蟲并行埋瘞續據上虞餘姚縣申到本縣蝗蟲頗多亦巳行下催促支錢收捕埋瘞今來頻得雨澤逺近沾足竊意其蟲必當殄滅巳牒本府一面審實具奏伏乞聖照一臣十七日經歷上虞縣界田皆遭旱彌望焦赤間有近水去處尚有些小可望收成觀其災傷委是至重而本縣不受人戶投訴反將投訴人戶刷具舊欠監繫門頭及出招子催督稅賦無問貧富大小人戶五日一限逐限輸官之外人吏定要乞錢一百文省其不到者即差公人下鄉追捉搔擾尤甚乞覔尤多人戶不勝其苦一日之間遮臣泣訴者至五七百狀臣巳送本府存恤究治施行去訖更乞聖慈特賜指揮庶幾州縣有所懲戒免致重困飢民不勝幸甚一臣十八日到􅌘縣其旱勢尤甚于上虞蓋紹興諸縣之旱􅌘為最而上虞次之餘姚又次之然上虞餘姚去年猶得薄收獨􅌘縣一連三年遭此極重之災雖其上戶中家巳覺艱窘鰥寡細民則巳有掇稗子而食者臣曽支錢三十文買到所採稗子一升今申納尚書省欲乞宣索一賜觀覽早降指揮令紹興府將此三縣新舊稅租特與倚閣俟見秋苗合放分數斷自宸衷别賜處分不勝幸甚一臣十九日至新昌縣是日午後連得大雨幾至通夕本縣先來亦苦乾旱早稻皆巳失收中晚之田亦巳龜坼方自中旬以來連日得雨田中遂皆有水中晚之禾間有可望去處可勝上虞等縣但諸縣大抵旱乾日久得雨後時秋序巳深氣候寒冷其間稻苗雖尚青活而不復能結實者亦多有之荒熟之形尤難分别臣巳遍牒檢視官員切宜子細不可差誤伏乞聖照一沿路人戶巳損田假不堪收割皆欲及早耕犂布種蕎麥二麥之屬接續喫用但以檢放未定不敢施工欲望聖慈特降指揮催促檢放庶幾不妨民間及早耕種其有闕少種糧之人更令官司量行應副尤為厚幸一臣二十一日入台州天台縣界以後事理尋别具奏聞伏乞聖照右謹録奏聞伏候敕旨奏知寧海縣王辟綱不職狀具位臣朱熹臣昨為親見台州寧海縣人戶流移巳曽具奏竊慮深軫聖懷自到本州即行詢究見得本縣流移人戶巳是千有餘口其知縣宣教郎王辟綱恬然不恤亦無申報委是不職竊恐將來糶濟事務繁夥必是不能了辦欲望聖慈特賜罷黜或依巳得指揮與監廟一次仍特不理作自陳須至奏聞者右謹録奏聞伏候敕旨奏救荒事宜畫一狀貼黃奏為本路災傷巳蒙聖慈支降錢三十萬貫更乞揍作二百萬貫及别有畫一奏聞等事伏候敕旨具位臣朱熹臣昨以本路荐𬒳災傷輒以賑恤事宜一二條奏伏蒙聖慈曲賜俞允仍賜錢三十萬貫以充七郡糶濟之用德意甚厚臣謹巳奉宣詔旨頒布逺近飢饉餘民感激受賜歡聲如雷此固足以見陛下天地父母生成覆育之恩矣然臣愚暗不知分量輒敢更有無厭之請觸冒萬死復以奏聞伏惟陛下少留聖聽臣不勝幸甚今具下項一臣昨奏請給降錢一百萬貫為一路救荒之備巳蒙聖慈開允應副三十萬貫不勝幸甚然臣自昨者具奏之後續據諸州申到所乞錢數明州一百萬貫婺州六十萬貫處州十萬貫台州十萬貫而紹興府衢溫州尚未申到計其所須當亦不下三二十萬大抵通以一路計之約二百餘萬貫始可足用而臣向來所請不及其半致陛下未知合用實數其所豫者又不及所請之半臣之罪大無所逃刑唯有及今據實披露尚冀可輔萬一臣竊計本路四十一縣除得熟縣分不過十數其餘大抵皆荒且以三十縣計之若得二百萬貫則一路可得米五十萬石而一縣當得一萬六千餘石若止得一百萬貫則一縣但可得米八千餘石今乃僅得三十萬貫則是一路得米不過七萬餘石而一縣為二千餘石而巳其逐縣合糶給戶口雖巳立式行下取會未到然以去年紹興諸邑之費推之則一縣用米有至四五萬石者况今歲之荒甚于去歲一縣飢民之衆其非八千二千石之所能濟亦不待算計而可知矣今欲少俟取見戶數而後計所不足續有陳請則恐地分闊逺取會未能遽集之間而巳後糴米之期矣冬春之間糴者日衆米價日髙臣恐用錢愈多得米愈少而民之飢者愈失望也臣愚欲望聖慈深察前項事理特降睿旨更撥錢一百七十萬揍前所給通作二百萬貫令臣及早分給諸州廣行運糴俟見糶給戶口實數却行計度支用不盡之數先次拘收回納亦未為晚伏候聖旨簽黃竊恐度牒官會發出太多難以發泄今減半賞格巳蒙施行欲乞指揮紐計米數量給空名告身五七十道并度牒官會揍成二百萬貫付臣收掌則富民聞之願獻助者必多如有應格之人即乞許令提舉官與安撫使照應見行減半賞格聚廳書填當面給付亦足以關防私曲情弊伏乞聖照一臣昨奏乞依耿延年所奏浙東一路獻助米斛人戶並與減半推賞巳蒙聖慈開允施行不勝幸甚但指揮內却有將來檢踏見得災傷最重處方得保明取旨之文則臣恐聽者不能無疑而未有應募之意也臣雖已行下州縣令人戶願獻助者先經本司自陳特與摽撥赴災傷最重州縣送納支散然人戶未知省部人吏將來的將是何州縣作災傷最重去處則終不能無疑且天下一家初無彼此而本路災傷重處殆計八九但令在在處處米穀堆積而徐視飢民闕食尤甚去處般運以往則亦無處不可入納又何必逆為此不可取旨之端以疑群聽而誤飢民之命哉臣愚欲望聖慈深察上件事理特降睿旨一依乾道七年耿延年所請巳得指揮施行而刪去今來所增委曲關防之語使大哉之言一哉之心有以宣著暴白于天下則有餘粟者爭先應募而所賜之錢又可會計餘數拘收回納是亦所謂惠而不費者伏候聖旨一臣昨具奏乞詔州縣寬限催稅巳蒙聖慈特詔本路州縣將合納稅賦並照省限催促不得非理搔擾不勝幸甚但今年旱傷實非去年之比若據事理所有夏稅自合依去年例特與住催竊緣節次蠲放蒙恩巳多不敢便為陳乞但今八月十五日省限巳滿州縣自此必是公肆追呼無所忌憚使𬒳災餘民無所告訴馴致死徙仰貽宵旰之憂臣愚欲望聖慈深察上件事理特詔有司將本路𬒳災縣分人戶夏稅權行住催却俟檢放秋苗分數定日却將夏稅亦依分數蠲減一併催理庶幾飢民均𬒳實惠伏候聖旨簽黃臣契勘紹興府今年人戶丁錢巳蒙聖慈盡數蠲放今者本路諸州例遭災旱而台州丁錢最重下戶尤以為苦欲望聖慈許將台州五縣第五等人戶今年丁絹特與蠲放庶幾千里飢民得免追呼決撻之擾不勝幸甚伏取聖旨一臣昨所奏逐項事理並蒙開允獨有依凖舊制募飢民修水利一事未蒙施行臣竊見連年災旱國家不忍坐視天民之死大發倉廩以拯救之其費以巨億計蓋其賑給者固不復收其賑糶者雖曰得錢而所折閲亦不勝計仁聖之心于此固無所吝然飢民百萬安坐飽食而于公私無毫髮之補則議者亦深惜之故臣嘗竊仰稽令甲私計以為若微于數外有所增加以為募民興役之資則救災興利一舉而兩得之其與見行糶給之法利害之算相去甚逺故不自揆既以奏聞而輒下諸州委自通判詢究水利合興復處以俟報可至于近日巡歷又得親見所至原野極目蕭條唯是有陂塘處則其苗之蔚茂秀實無以異于豐歲于是竊歎益知水利之不可不修自謂若得奉承明詔悉力經營令逐村逐保各有陂塘之利如此則民間永無流離餓莩之患而國家亦永無蠲減糶濟之費矣不謂言語踈略未蒙鑒照敢竭其愚重以為請伏望聖慈深察上件事理許臣前項所請百七十萬貫者而令于內量撥什三候諸州通判申到合興修水利去處即與審實應副其合糶給人有應募者即令繳納糶給由曆就顧入役俟畢工日糶給如舊則所損不至甚多而可以成永久之利絶凶年之憂費短利長未為失䇿伏候聖旨簽黃臣又竊恐興修水利所費太多難以攴給即乞且令貸與食利人戶顧工興役却候將來豐熟年分紐計米數量分料次赴官送納椿管在官尤為利便伏候聖旨一臣昨嘗面奏乞令𬒳災州縣人戶苗米五斗以下不候檢踏先次蠲放以絶下戶細民奔走供億計囑陪費之擾誤蒙聖慈曲賜開納今者本路復遭旱虐竊欲取旨依此施行但今檢官巳在田野如蒙開允即乞聖慈特降指揮令轉運司疾速施行若俟命下到臣巡歷去處然後施行却恐緩不及事伏候聖旨一臣伏覩歲既不登所在艱食全賴商賈阜通之利所宜存恤不可搔擾今米榖不得收稅雖有成法而州縣場務多不遵守至于往糶而有所狹之資既糶而有所貿之貨則往來之間經由去處尤以邀阻抽稅為苦是致客人憚于興販欲望聖慈特降睿旨申嚴舊法仍詔有司諸𬒳災州縣人戶欲興販物貨往外州府收糴米穀就闕米處出糶者各經所在或縣或州或監司自陳所帶貨物判執前去其糶米訖所買回貨亦各經所在自陳判執回歸往回所過並不得輒收分文稅錢違者並依稅米榖法必行無赦如蒙開允即乞徑下轉運司約束沿江瀕海所過場務遵稟施行庶幾商販流通民食不匱伏候聖旨右謹録奏聞伏乞勑旨奏明州乞給降官會及本司乞再給官會度牒狀具位臣朱熹臣據明州申契勘本州今歲闕雨𬋩下六縣皆有旱傷去處竊慮細民闕食本州雖有常平錢米所𬋩不多今來事勢不可少緩本州遂于七月十八日具奏乞支降官會一百萬貫下本州循環充本雇備人船出海往潮廣豐熟州軍收糴米斛凖備賑糴賑濟或朝廷不欲支動經常之費即乞支降空名度牒一千道官告三十道下本州轉變糴米未蒙回降申本司乞更賜敷奏臣照對本路諸州今歲皆有旱傷比去年大假不同雖荷聖恩給降官會度牒共三十萬不足支遣臣巳具奏乞再給一百七十萬貫揍前作二百萬貫如蒙朝廷應副便可均給諸州今又據明州所申合行備録奏聞伏望聖慈照臣前奏事理早賜依數給降仍乞就撥紹興府先蒙降到度牒一百道所換米二萬石及明州先蒙降到二十萬貫糴到米並付本司均撥應副紹興府明州糶濟及貸與食利人戶興修水利却于二百萬貫內除豁其水利貸錢向後豐年却令逐旋回納實為利便須至奏聞者右謹録奏聞伏候敕旨晦庵先生朱文公文集卷第十七福州府學訓導舒鏊校
