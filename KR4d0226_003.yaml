body:
  text: 詩奉同張敬夫城南二十詠納湖詩筒連畫卷坐看復行吟想像南湖水秋來幾許深東渚小山幽桂叢歲暮靄佳色花落洞庭波秋風渺何極詠歸橋緑漲平湖水朱欄跨小橋舞雩千載事歷歷在今朝船齋考槃雖在陸滉漾水雲深正爾滄洲趣難忘魏闕心麗澤堂堂後林隂密堂前湖水深感君懷我意千里夢相尋蘭澗光風浮碧澗蘭杜日猗猗竟歲無人采含薰秪自知書樓君家一編書不自圯上得石室寄林端時來玩幽賾山齋藏書樓上頭讀書樓下屋懷哉千載心俯仰數椽足蒙軒先生湖海姿蒙養今自閟銘坐仰先賢點畫存彖繫石瀨疏此竹下渠漱彼澗中石暮館繞寒聲秋生動澄碧卷雲亭西山雲氣深徙倚一舒嘯浩蕩忽搴開為君展遐眺柳堤渚華𥘉出水堤樹亦成行吟罷天津句薰風拂靣涼月榭月色三秋白湖光四靣平與君凌倒景上下極空明濯清涉江采芙蓉十反心無斁不遇無極翁深衷竟誰識西嶼朝吟東渚風夕弄西嶼月人境諒非遙湖山自幽絶淙琤谷湖光湛不流嵌竇亦潛注倚杖忽淙琤竹深無覔處聽雨舫綵舟停畫槳容與得欹眠夢破蓬窗雨寒聲動一川梅堤仙人冰雪姿貞秀絶倫擬驛使詎知聞尋香問煙水采菱舟湖平秋水碧桂棹木蘭舟一曲菱歌晚驚飛欲下鷗南阜高丘復層觀何日去登臨一目長空盡寒江列暮岑次韻傳丈武夷道中五絶句地久天長歲不留坐來念念失藏舟回看萬法皆兒戲還直先生一笑不分符擁節幾經年聞道方成屋數椽只恐未容髙枕卧却須持橐聽鳴鞭勳業今從鏡裏休篋中空有敝貂裘死灰那復飛揚意惠許深慚不易酬常記桐城十載前幾回風雨對床眠他年空憶今年事却説黃亭共惘然諸郎步武各駸駸季子尤憐産萬金衣鉢相傳自端的老生無用與安心題畫卷丁亥小山飛來小坡坨未雨巳滂濞荒此定何人蘇公有遺記吳畫妙絶吳生筆飛揚信有神羣仙不愁思步步出風塵卵研端溪有潛虬孕此金玉質混沌一竅開千年瀉寒液鬼佛冥𪷟罔象姿相好菩薩靣鬼佛吾詎知水石玩竒變范寬山雄雲氣深樹老風霜徑下有考槃人超搖得真性題祝生畫裴侯愛畫者成癖嵗晚倦逰家四壁隨身只有萬疊山祕不示人私自惜俗人教看亦不識我獨摩娑三太息問君何處得此竒和璧隋珠未為敵答云衢州老祝翁胸次自有隂陽工峙山融川取世界咳雲唾雨呼雷風昨來邂逅衢城東定交斗酒歡無窮自言妙處容我識為我掃此須臾中爾時聞名今識靣回首十年齊掣電裴侯巳死我亦衰秪君雖老身猶健眼明骨輕鬚不變筆下江山轉蔥蒨為君多織機中練更約無事重相見秀野以喜無多屋宇幸不礙雲山為韻賦詩熹伏讀佳作率爾攀和韻劇思慳無復律吕笑覽之餘賜以斤斧幸甚髙人山水心結習自無始五畝江上園清隂遍桃李一堂聊自娛三徑亦可喜試問避俗翁何如尊賢里溫公獨樂園在尊賢里門前車馬客無非朝大夫問公獨何事中嵗遽此圖長安二三公髮白形枯臞隱憂念名節亦有此樂無隱憂念名節張大參疏中語君侯嗜圖史插架何其多徙居三十乘流汗幾橐駝千載誰晤語端居自絃歌至哉天下樂嵗月如子何西山一何高雲氣出寒麓中有無事人鳴泉繞茅屋宴坐今幾何無以媚幽獨興至偶成篇呼兒為余讀我居深山中茅舍破不輔上見風攪林下有雲承宇聞公落新宫戶牖不可數懶惰心力衰念公亦良苦夜吟招隱詩月落寒泉井自非千載人誰與共清景散髮心朗寥凝神味淵永功名恐相期富貴非所幸仙人空山居道意妙羣物度世君則然修身吾豈不飛行仰雲路趺坐探理窟獨夜扣星壇清齋具簮笏青山背夕陽兹景公所愛虛堂日落時遷坐一解帶嵐分疑有處鳥度知無礙須臾暮色來默默無與會端居屏塵慮萬事付一尊客來語世故舉白當浮君超搖謝衆甫噂沓從諸孫何以自怡恱窗中見秋雲清溪何迢迢上有千仭山山中學仙侣白石為門關丹經苦吟哦至道窮躋攀豈知人間世風塵縈九寰次劉秀野𬞞食十三詩韻乳餅清朝薦踈盤乳鉢有真味不用精瓊糜無勞爛羊胃新笋翛翛江上林白日暗風雨下有萬玉蚪三冬卧寒土紫菌誰將紫芝苗種此槎上土便學商山翁風餐謝肥羜子薑本草云薑久食去臭氣通神明或云傷心氣不可多食者非是薑云能損心此謗誰與雪請論去穢功神明看朝徹茭荀寒茭翳秋塘風葉自長短刳心一飽餘并得牀敷軟南芥黃龍記昔逰園客有佳遺不謂洛生吟輟餐時擁鼻燁菜小草有貞性託根寒澗幽懦夫曽一嘬感憤不能休木耳𬞞腸久自安異味非所詫樹耳黑垂聃登盤今亦乍蘿蔔紛敷剪翠叢津潤擢玉本寂寞病文園吟餘得深齦芋魁沃野無凶年正得蹲鴟力區種萬葉清深煨奉朝食筍脯南山春笋多萬里行枯臘不落盤餐中今知緑如簀豆腐世傳豆腐本乃淮南王術種豆豆苗稀力竭心巳腐早知淮王術安坐獲泉布白菌聞説閬風苑瓊田産玉芝不收雲表露烹瀹詎相宜伏讀秀野劉丈間居十五詠謹次高韻率易拜呈伏乞痛加繩削是所願望秀野為憐蘅芷滿芳洲特地臨江賦逺逰十畝何妨自春色萬緣從此付東流靜看朝市真兒戲須信田園是老謀出處知公有餘𥙿未應辛苦謝靈丘積芳圃樂事從兹不易涯朱門還似野人家行看靚艷須携酒坐對清隂只煮茶曉起蒼涼承墜露晚來光景亂蒸霞平生結習今餘幾試數毗那襋上花家山堂負米歸來手自舂豈知門外有晴峰羡公竟日塵氛逺拄頰看山幽興濃心鏡懸知不同調詩壇那敢少爭鋒空餘逺嶽尋師意箇裏何妨為指蹤拙政堂驥足寧同曵尾龜青山終是費心期陶公歸去有餘樂潘令間居不足追自笑十連非所慕未應三徑苦無資明朝謾擁朱輪去猿鶴咨嗟政爾為香界幽興年來莫與同滋蘭聊欲泛光風真成佛國香雲界不數淮山桂樹叢花氣無邉曛欲醉靈氛一點靜還通何須楚客紉秋佩坐卧經行住此中春谷武夷高處是蓬萊采得靈根手自裁地僻芳菲鎮長在谷寒蜂蝶未全來紅裳似欲留人醉錦障何妨為客開飲罷醒心何處所逺山重疊翠成堆舫齋扁舟容與小房櫳搖揚簾旌蜀錦紅兩岸兼葭秋色裏一川煙浪夕陽中不愁灧澦雙蓬鬢未怯江湖萬里風築室水中聊爾爾何須極浦望朱宮藥圃種藥春畦有近功不辭耘耔謾勞躬漸看𣏌菊充庖下即見芝英入籠中病去自知非往日身輕何必御泠風出門會有兒童笑不是當年植杖翁山人方丈方丈翛然屋數椽檻前流水自清漣蒲團竹几通宵坐掃地焚香白晝眠地窄不容揮麈客室空那有散花天箇中有句無人薦不是諸方五味禪龜峯樓楊柳東邉桂樹西小樓晴眺極霏微山川政爾供凝目塵土何妨略振衣俯瞰桑田悲物化間披蘂笈洞玄機却疑欄外連穹石似厭支牀去不歸月波臺潺潺流水注回塘中作平臺受晚涼四靣不通車馬迹一尊聊飲芰荷香韓公無復吟花島楚客何勞賦藥房少待須臾更清絶月華零露洗匡牀挽𬞞園未覺間來嵗月頻荷鉏方喜土膏勻連畦巳放瑶簮露覆地行看玉本新小摘登盤先餉客晚炊當肉更宜人却憐寂寞公儀子拔盡園𬞞不歎貧秋香徑門外黃塵沒九逵坊中叢桂長樛枝三秋冷蕊從開落終嵗清隂不改移幽徑秪愁空翠滴濃香一任晚風吹攀援却恨王孫遠惆悵千林時曲池軒去年種竹長新篁今嵗穿渠過野塘自喜軒窗無俗韻亦知草木有真香林間急雨生秋思水靣微風度晚涼却厭端居苦無事憑欄間理釣絲長前村題下恐當有梅字玉立寒煙寂寞濵仙姿瀟灑淨無塵千林搖落今如許一樹橫斜獨可人真與雪霜娛晚景任從桃柳殿殘春緑隂青子明年事衆口驚嗟鼎味新秀野劉丈寄示南昌諸詩和此兩篇滕王閣下水𥘉生聞道登臨復快晴帝子詎知陳迹在長江肯趂曲池平山楹雨罷珠簾捲簷鐸風驚玉佩鳴滿眼悲涼今古恨人生辛苦竟何成知向潮邉弄碧漪欄干三撫漾晴輝流傳妙語驚離闊想像清遊欲奮飛公去不應停驛騎我來直欲挂朝衣南州高士何由見且看新荷出水稀次秀野韻五首史君簾閣對修筠起看名園雨後春便賦新詩留野客更傾芳酒酹花神未酬管樂平生志且作羲黃向上人秪恐功名相迫逐不容老子卧漳濵滿園紅紫巳爭新百囀幽禽亦喚人蠟屐未妨泥步穩珍叢終恨雨來頻卧看曉色欣𥘉霽起約良遊醉好春却笑當年金谷燕相隨僕僕望車塵惆悵春餘幾日光從今風雨莫顚狂急呼我輩穿花去未覺詩情與道妨蘿帶不須吟社若角弓聊復賦甘棠淋浪坐客休辭醉飲罷晞身向九陽知君久矣厭喧卑造物尊前喚小兒一釂未應峩側辨十分聊爾快翻巵治中寂寞凝塵日令尹憂勞退食時正好相尋發孤笑莫教牢落負心期當年共剪北山萊修竹成隂手自栽書卷莫教春色老柴荆肯為俗人開公能顧我傳新句我欲留公撥舊醅悵望南園芳樹底明年應放小車來留秀野劉丈二首好雨當春過一犂我公逺憶故園西孤蓬穩轉清灘急十里行穿緑樹齊路熟巳欣經霧市身輕未怕躡雲梯諸孫剩欲留公住細和新詩丐指迷一去屏山今幾春歸來三徑但荒榛剪除便覺風煙好徙倚還驚物色新樓外千林遮去路階前一水戀行塵勸君更作留連計同社追遊苦未頻次秀野滄波館刈麥二詩傳聞泛宅賀新成破月衝煙取次撑鷁首斜飛寒浪急篷窗側轉好山橫知公興有江湖逈顧我詩無玉雪清欲跨船舷還未敢幾時得伴鏡中行急本作息貽牟夙昔但聲歌今見郊園樂事多且喜甌簍符善禱未須蘆蔔顰去聲妖娥霞觴政自誇真一香鉢何煩問畢羅我欲賣刀來學稼不知還許受㕓麼小説有人中麥毒夢紅裳娘子悲歌有一丸蘆蔔火吾宮之句次秀野躬耕桑陌舊園之韻二首郊園旱久尺多蹊昨夜欣沾雨一犂巳辦青鞋隨老圃便驅黃犢過深溪農談剩喜鄉鄰近饁具仍教婦子携指點竹寒沙碧處不知何似錦城西丈人高致邈難干雲夢何如胸次寬老去未妨詩律在人來只怕酒杯乾故開麥隴供家釀更有蘭章付客看下走才慳慙囑和願公物色稍留殘又和秀野二首愁隂一夜轉和風曉看花枝露彩濃覔句休教長閉戶出門聊得試扶笻物華始信如詩好春色方知似酒濃多謝鄰翁笑相迓為言晴暖更過從江臯晴日麗芳華翠竹踈踈映白沙路轉忽逢沽酒客眼明惟見滿園花望中景助詩人趣物外春歸釋子家向晚却尋芳草徑夕陽流水繞村斜次秀野詠雪韻三首閉門高卧客來稀起看天花滿院飛地逈杉篁增勝槩庭虛鳥雀噪空飢酒腸凍澀成新恨病骨侵凌減舊肥賴有袁生清興在忍寒應未泣牛衣一夜同雲匝四山䁱來千里共漫漫不應琪樹猶含凍翻笑楊花許耐寒乘興正須披鶴氅瀹甘猶喜破龍團無端酒思催吟筆却恐長鯨吸海乾開門驚怪雪交加亂落橫飛詎有涯密竹不妨呈徑節早梅何處覔殘花山隂客子須乘興洛下先生想卧家病廢杯觴寒至骨哦詩無復更豪誇次韻雪後書事二首晴煙裊裊弄晨炊雪屋流澌未覺遲擬挈凍醪追勝踐聊穿蠟屐過踈籬掃開折竹仍三徑認得殘梅秪數枝不耐嵗寒心事苦滔滔欲説定從誰未覺春光到柳條誰教飛絮倚風搖眼驚銀色迷千界夢斷彤庭散百察梅䲧任從長笛弄竹窗間把短檠桃何人剝啄傳清唱更喜殘年樂事饒次韻秀野早梅可愛紅芳愛素芳多情珍重老劉郎踈英的皪尊中影微月黃昏句裏香胸次自憐真玉雪人間何處有冰霜巡簷説盡心期事肯醉佳人錦瑟傍次秀野極目亭韻偶向新亭一破顔高情直寄有無間地偏巳隔東西路天闊長圍逺近山浩蕩秪愁春霧合輪囷却喜暮雲還不堪景物撩人甚倒盡詩囊未許慳又坐看山花落幔顔不知身在翠雲間食寒到處雨復雨客裏歸來山又山孤燈間無心棲鳥暮忘還世情分逐流年去只有詩情老更慳次秀野春晴山行紀物之句秪憑詩律作生涯到處山林總是家便與清尊卧芳草不妨皂蓋拂殘花側聞溫詔詢耆艾好趂春風入殿衙回首能忘舊猿鶴一篇聊爾記年華再用韻題翠壁孤亭一目盡天涯俯瞰煙村八九家翠壁何年懸布水緑隂經雨墮危花杖藜徙倚凝春望覔句淹留到晚衙珍重詩翁莫相惱枯腸􅭒斷鬢絲華次亭字韻詩呈秀野文兼簡王宰三首不駕朝車叩九扄獨携靈壽向新亭人言洞裏春長在自慶樽前老復丁魚樂波間詩欲就鴻冥天闊酒𥘉醒晚來却向南堂坐珍重家山數點青吏散庭空晝掩扄行春只到柳邉亭唱酬共喜摛鴻藻來往何勞笑白丁一笑歌呼從自醉幾年燠暍為誰醒定知細札褒揚後名入麟臺汗簡青幾年寂寞掩柴扄抱膝長吟竹下亭不向參同論納甲且將耘耔付添丁思玄賦罷驚遙舉止酒詩成恨獨醒却笑春風兩蓬鬢飄蕭無復舊時青次山行佳句呈秀野文三首幾日春隂鎖翠巖忽驚飛蓋度晴嵐身輕似起煙霞痼意適寧論祿位貪句法舊超常語六年華今富逹尊三從容笑語無餘事興在南山更向南几杖歸來覔故巖眼中猶記舊煙嵐詩情自昔元無敵世味而今更不貪默數流年欣望八間尋隱訣話存三小生自愧衰頽早箇裏憑公為指南曈曈朝日出高巖􅉡􅉡征衣曵曉嵐向來孤舊意林泉老去覺真貪凄涼煙火一百五零落交逰十二三歎世事卧吹橫笛過溪南次秀野泛滄波館至赤石觀刈早稻韻緑雲黃半武夷鄉碧水縈紆一帶長聞道放船飛皂蓋定知行酒載紅裳棹謳如賀豐年信農家以早稻為晚禾信樂飲間酬此日涼禾黍誰言不陽豔晚炊流詠有餘香次秀野韻題卧雲菴君家丘壑本圎成何意尋荒入翠屏為愛晴雲薦孤枕故將間日付新亭夢魂寂寂衣裳冷心事悠悠簡䇿青更把枯桐寫竒趣鵾絃寒夜獨泠泠奉和秀野見留之句間卧秋山塵事稀西風催喚出巖扉來看甲第清泉好更喜仙翁丹頰肥捫虱坐談端未厭連環入夢却思歸明朝振策千峯頂滿袖瓊琚背夕暉次秀野種粟韻阿香一笑走豐隆雨遍平疇萬頃中舊喜樊遲知學圃今看許子快論功遙憐鬱鬱翻秋隴預想垂垂弄晚風珍重詩翁且強健東阡南陌興無窮和秀野蘄簟之句史君兩鬢尚青青學道仍拋後院笙溽暑怏眠知簟好晚涼徐覺喜詩成人從蘄水當年寄詩比韓公此日清坐對更深誰是伴唯應闕月共長庚次韻寄題芙蕖館三首亂山叢裏有江鄉華館清波引興長正喜白鷗輕易狎忽驚紅妓儼分行臨流更好揮椽筆俯檻何妨接羽觴共説仙翁間日月不因春草夢池塘幻成飛閣笑談餘便有新荷水靣鋪指點清波浮菡蓞驚呼紅影碎陬隅且將伴侣同杯酒不用君王豫鏡湖多少故交臺閣上問渠落拓更能無不須艇子棹歌來且看芙蓉靣靣開卷裏有詩都錦繡席間無地可塵埃風清月白琴三弄緑暗紅深酒一杯明日仲宣樓上去越吟應是首頻回次韻雪後書事二首惆悵江頭幾樹梅杖黎行繞去還來前時雪壓無尋處昨夜月明依舊開折寄遙憐人似王相思應恨劫成灰沈吟日落寒鴉起却望柴荆獨自回滿山殘雪對虛堂想似當年輞口莊門掩不須垂鐵鎖客來聊復共藜牀故人聞道歌圍暖妙語空傳醉墨香莫為姬薑厭憔悴論文把酒話偏長和秀野韻二首聞道無餘事翛然百慮空何心分彼我無地著窮通昨日青襟子明朝白髮翁天機元自爾不是故匆匆久矣安岑寂山棲恨不深謾將門自掩那有客相尋炙背迎朝景加趺度夕隂感君傳秀句把卷獨呻吟次秀野暑中二首劇暑悲難度清秋喜却回病隨庚伏盡尊向晚涼開臨水看雲去鈎簾待月來勝逰驚昨夢曽上鬱蕭臺熹新自雲谷還家絶境人難到唯堪樂此身泉吟青玉峽風度白綸巾獨往寧無意長間未有因雲山天賜履吾道豈全貧雲谷絶頂四望雲山環數百里次秀野雜詩韻葺居二首丈人高卧碧江頭門掩西風萬木秋重喜青山還繞屋却嫌黃葉漸平溝開軒且放浮嵐入決水徐通廢圃流便覺園林頓蕭爽不妨隨境味玄幽向來鞅掌元非病此日徜徉詎有妨自喜登臺間瘦竹人驚步屧響空廊高齋雨過新山色曲沼風來舊水光千里壯心殊未巳不應踈懶興能長刻漏無疑莫詣君平肆任運休尋季主家謾設銅壺候尺咫間參玉表驗分差不妨啓處知時節那更榮枯紀嵗華却羡升平好官府日高三丈放朝衙栗熟樹雜椅桐繼國風莫教林下長蒿蓬種樹法栗下不得有草木共期秋實充腸飽不羡春華轉眼空病起數升傳藥録本草云人有腳弱往栗樹下啖及數升遂能起行晨興三咽學仙翁蘇黃門詩云老去自添腰腳病山翁服栗舊傳方客來為説晨興晚三咽徐收白玉漿櫻桃浪得銀絲薦一笑才堪發靣紅銀絲見杜詩本草云櫻桃服之令人美顔色山藥怪來朽壤耀瓊英小斸頃筐可代耕豢豹於人儘無分蹲鴟從此不須生雪鑱但使身長健石鼎何妨手自烹欲賦玉延無好語羞論蜂蜜與羊羮陳闌齋王延賦有蜂蜜羊羮之句食梨珍實渾疑露結成香葩况是雪儲精乍驚磊落堆盤出旋剖輕盈照骨明盧橘謾勞誇夏熟柘漿未許析朝酲啖餘更檢桐君録快果知非浪得名本草謂梨為快果導引聞説牛刀久不更間中應接羡門生向來巳悟藏千界吕公詩云一粒粟中藏世界今日何勞倒五行道書云五行顚倒術龍從火裏出按蹻有時聊戲劇居心無物轉虛明舉觴試問同亭侣九轉工夫早晚成假山焚香作煙雲掬水為瀑布二首平地俄驚紫翠堆便應題作小飛來爐熏細度巖姿出線溜遙分壁色開獨往但慿南郭几逺遊休剪北山萊人言造化無私力珍重仙翁挽得回一簣工夫莫坐談便教庭際湧千巖眼中水石今成趣物外煙霞舊所耽泉細寒聲生夜壑香銷暝靄變晴嵐兒童也識幽棲地共指南山更近南家釀二首銍艾無中熟歡謡闕屢豐但知愁鬢白那復醉顔紅田舍寒如此侯家事不同新醅撥浮蟻春滿夜堂中聞道兵厨盛春泉響臘芻定知盈榼送不待扣門求沆瀣應難比茅柴秪自羞病身從法縛好客為公留熹近戒酒故有法縛之句既作此詩而白衣巳至賔朋巳集可謂詩讖矣一笑酒市二首聞説崇安市家家麴米春樓頭邀上客花底覔南鄰詎有當壚子應無折劵人勸君渾莫問一酌便還醇麗藻摛雲錦新章寫陟釐詩傳國風體興發酒家旗見説難中聖遙知但啜醨盤餐雜鮭菜那有蟹螯持黃雀鮓黃雀飛鳴處交交異竊脂桑扈竊脂蓋以不食穀得名稻梁求易足羅網去何遲味厚資偏嗜謀踈闕自為韓彭尚𦵔醢么麼爾誠宜檳榔憶昔南遊日𥘉嘗靣發紅藥囊知有用茗碗詎能同蠲疾收殊效修真録異功三彭如不避糜爛七非中本草云檳榔殺三蟲柳子罵尸蟲云擊汝鄷都糜爛縱撗七非見真誥鄷都者六天之一也又五絶卒章戲簡及之主薄暮年藥裹關身切此外翛然百不貪薏苡載來緣下氣檳榔收得為祛痰錦文縷切勸加餐蜃炭扶留共一柈食罷有時求不得英雄邂逅亦飢寒向來試吏著南冠馬甲蠔山得飫餐却藉芳辛來解穢雞心磊落看堆柈箇中有味要君參螫吻舂喉久不甘珍重人心亦如此莫將寒苦換春酣高士沉迷簿領書有時紅糝綴玄須定知不著金柈貯兒女心情本自無劉穆之𥘉士為主簿晦庵先生朱文公文集卷第三考異詠歸橋載事一作載意麗澤堂相尋一作難尋題祝生畫鬚不一作鬚不和秀野無始一作此始徙居一作徒車茅屋一作華屋茅舍一作茅屋星壇一作星躔分疑一作光宜鳥度知無一作風度却無色來一作色新默默無與一作此意心默端居一作幽居清溪何迢迢上有十仞山一作清江水悠悠其上有羣山吟哦一作吟誦塵縈一作塵營新筍翛翛一作修修拙政堂咨嗟一作驚嗟藥圃𣏌菊一作枸𣏌會有一作會見月波臺潺潺一作濺濺秋香徑千林一作千秋曲池軒秋意一作秋思風動一作風度前村真與一作直與晚景一作晚興驚嗟一作驚嘆秀野寄示南昌直欲一作真欲次秀野韻復賦一作復和共剪一作去剪留秀野春過一作春遇逺憶一作逺意次秀野躬耕鄰共一作鄰近下走一作下筆又和秀野曉看一作曉著休教一作誰教過從一作過逢草徑一作草路次秀野詠雪韻起看一作起見猶喜一作聊喜次亭字韻勞笑一作勞喚次山行憑公一作憑君福州府儒學訓導舒鏊校晦庵先生朱文公文别集卷第三書胡籍溪先生以下胡德方家藏昨日節略禮儀尚有二節可疑敢以求教書儀中云壻揖婦降自西階至婦轎所立舉簾以俟前日見先生云古人用車不可升階乃就階下置車故有降自西階之禮今既用轎子不知只就廳上否如此則婦先入轎然後降自西階以出矣又婦既入壻之家壻導婦以入不見有舉蒙首之禮未知今如何乞批以見教文叔婦既用轎子則只就廳上壻却須就廳前上馬舉蒙首之禮溫公不説少間檢伊川集續報去也舉蒙首之禮適檢伊川集有之乃未就坐飲食時行之今想巳不及矣程沙隨可久逈以下沙隨之孫仲熊家藏示及古韻通式簡約通貫警發為多四聲互用無可疑者但切響二字不審義例如何幸望詳賜指喻又其間如積劭植囿淺昧晣七字恐合入四聲互用例中不知何故却入此門亦乞見教麒之為極十之為諶似亦是四聲例也近因推考見吳才老功夫儘多但亦有未盡處泛考古書及今方言此類蓋不勝舉也詩説見此抄寫未畢畢即拜呈求教矣聞人丈頃年見之三山扣以詩中數事甚蒙知奬但恨不得欵盡其説耳豳詩之説則恐未然蓋破斧以後諸詩未必是周大夫刺朝廷之詩此自小序之誤耳它日繆説得徹尊聽當為印證其可而掊擊其不然乃所願也所喻詩論十篇便中幸早見教為望汀鹽之弊巳極子直之䇿未為不然橫為諸司所排使不得伸一方之民可謂重不幸矣晦伯書來所欲更張者尤廣觀此事勢如何行得近聞諸司於舊法中減落一二小小縻費便謂可革宿弊以一杯水救一車薪之火無以異於小兒之戲論甚可笑也孝經妄意所疑不謂汪丈亦有此説近亦條具數處并俟後便拜呈也四營成易正為易字即是變字故其下文便以十有八變承之再扐後挂即所謂再揲三揲者是又一四營也凡為四營者三乃成一爻為四營者十八乃為一卦此以積數文義求之皆無所礙不審尊意以為如何也月樁條對亦乞頥指録以見教此事從來只是得於耳學竟未知其端的也廣西鹽法近得詹丈書極以為便亦録得中間解折范容州劄子畫一來而自彼來者無不以州郡窘乏為言不知的是如何地逺難遙度傳聞亦難盡信大抵近世作事利民者常苦於掣肘而不得行其為民害者則因循苟且上下尊守以為不可易設使便有姚元崇真有濟世之術亦未必得如其意此可歎也又蒙别紙垂喻俞廣文立二公祠之意使為記文尤荷不鄙但此事今日老丈在彼晚學小生豈當僣取而妄為之此決不敢承命若廣文有請於門下它日文成區區得以題額附名左方亦云幸矣幸逹此意於廣文敬泚筆以俟命也前浦城主簿任希夷經由請見幸與其進而教誨之其人有志於學守官不苟王漕亦令去請教也程可久附子為近世通用常藥它人服之未見其熱老丈乃獨覺其偏有所助致生它疾此見平時所養之厚而所謂無妄之藥者真不可試之驗也二賢祠記前書巳拜稟矣豈有大師在是而晚生小子敢肆妄言于其側者乎况陳公平生只得一見若汪公則老丈遊從之久投分之深又非小生之比恐不得而辭也因便寓此偶數日禱雨倦甚又積書問頗多未暇罄所欲言向蒙喻及詩論前書拜請幸早寄示謬説巳寫就然尚有誤字旦夕校畢拜呈以求教誨也易中七八九六之數何自而起説者雖衆終未甚安不審尊意以為如何州縣祈水旱政和新禮所不載而通典開元禮尚有可依放者唯鄉村所禱全無可據苟且從俗于心有未安者亦幸有以教之也鄭尚書惠叔僑見莆陽所刋稽古録後匆匆去國深荷眷存既行之後又知榻前開陳之力固知高明非私于某者然不能不以為愧也區區舟行冒寒阻風昨夕始到三衢更一二日始遂南去病軀幸可支吾皆餘芘之及也鄉在長沙嘗得溫公稽古録正本别為刋刻殊勝令越中本欲俟成書奏御未竟而來又欲靣奏行下取索則又未及而去每念此書溫公所以願忠君父之志更歷三朝然後成就其論人君之德有三而材有五者尤為懇切不可不使聖主聞之不知可以一言及之行下本州取索投進否然不必及某姓名恐罪纍之迹延及先賢反致忠言不得聞逹也聞中司巳兼讀官幸更與議之同君舉子夀諸公共白之也程允夫洵以下洪正學刋允夫家藏帖先集無人寫得亦多是應用文字非吾弟今日問學所急故不送前書巳詳言何不見悉耶墓刻不敢忘幸且少寬之譙傳非病翁所作乃原仲致中一丈見之其説亦有病非學問正脈也遺書中李端伯劉質夫所録極精可熟味之便見學問正當用力處矣程允夫某重念先世南來八人度嶺今無一人在者而老人暮年窮約以不肖子與世不諧之故憂窘萬狀無一日舒泰遂以至此尤重不孝之罪每一念至此心肝如抽裂也某家中自先人以來不用浮屠法今謹用但卜地未能免俗然亦只求一平穩處尚未有定論計不出今冬也所喻立户事無不可但先人巳立户某又自立一户恐于理未安更詳度示喻程允夫示喻為學之意此正克巳功夫所當用力然猶是至粗淺處若不痛加懲窒非惟無以仰窺聖賢閫域恐亦無以自立於州里之間矣此甚可懼不可視為常事而緩於檢制也上蔡之言警切至到真當朝夕提撕然論其細微則區區所愧亦巳多矣尚何以為賢者觀省之助乎今當彼此各致其功庶異時相見無所愧于今日之言耳觀書或有所疑因便疏示間時寫得便可旋寄德和處此中時有便人往還也所論向來解紛之意固是如此然亦平日持巳不嚴故擇交不審而責善之道又有所不至故其末流之弊至於如此此當深自悔責而速改之詳味來辭似未有此意恐更當反復鄙言毋以前説自恕也所要文字正冗未暇致思齋銘亦巳忘記又無草本要不必爾但得識之於心而見諸行事則為有以發於愚言矣祠閣二記皆不成文字但欲略見此義理故不得而辭來喻之云非所望於親友間也近思巳成尚未寄到到即附去中庸無人寫得只有一本不敢逺寄且亦未定不欲廣傳也定性書解在别紙亦勿示人為佳雲谷記巳寫寄李文矣程欽國後更字允夫家藏帖以下新安汪逄龍刋允夫往年誤欲作文近年頗覺非力所及遂巳罷去不復留情其間頗覺省事講學近見延平李先生始略窺門户而疾病乘之未知終得從事於斯否耳大槩此事以涵養本原為先講論經旨特以輔此而巳向來泛濫出入無所適從名為學問而實何有亦可笑耳示喻蘇程之學愚意二家之説不可同日而語黃門議論所守僅賢其兄以為顔子以來一人而巳恐未然頃因讀孟子見其所説到緊要處便差了養氣一章尤無倫理觀此想淵源來歷不甚深也正蒙建陽舊有本近來久不曽見俟病少間當為尋問也然此書精深難窺測要其本原則不出六經語孟且熟讀語孟以程門諸公之説求之涵泳其間當自有得然後此等文字可循次而及方見好處如今不須雜博却不濟事無收拾也若果於此有味則世間一種無緊要文字皆是妄言綺語自無功夫看得矣近集諸公孟子説為一書巳就藁又為詩集傳方了國風小雅二書皆頗可觀或有益於𥘉學恨不令吾弟見之又恨相去稍逺不能得吾弟來相助成之也程允夫表叔墓刻不敢忘重煩督趣愧恐然此尚有少曲折異時得靣論而後下手乃為穩當先集亦難於出之正亦有所疑耳吾弟近所為詩文有可寄示者否某向到湘中語甚多然皆草率不足觀謾令大兒寫拜魏公墓一篇去此等間言語正使絶出亦何所用况又不能佳乎然姑以寄意焉可耳程允夫觀志觀行此章上蔡謝先生言之最詳盡大抵聖人本意只論孝子之心耳至於事有不得不改者又出於不得巳非其心本然也此義亦通上下而言不必專指人君也天命之謂性則通天下一性耳何相近之有言相近者是指氣質之性而言孟子所謂犬牛人性之殊者亦指此而言也自聖人言之忠恕即道也曾子之言是也自學者言之則由忠恕可以至道也子思之言是也二先生及上蔡論此詳矣冝深體味之不可只恁麼説過浩然之氣大剛直當從伊川之説更冝深思必有事焉而勿正心勿忘勿助長此固是下功夫處然於此須識得箇夲體始得明道舉鳶飛魚躍活潑潑地以為與此意同須要識得方有下功夫處不然才著意便是正才不著意便是忘無有是處聖人之於天道詳來問似看此章大意未分明摘句理會冝其不通心往一假語皆有病心固未嘗亡但人舍之則有時而不自見耳所謂道心惟微者此也程允夫聞以職事忤上官暫移他局不知所爭何事若所當爭乃見所守此外榮辱不足道也昨誤聞劉智夫得江西倉臺即以書道吾弟及一二知友姓名得其書乃云雖出妄傳然巳為轉語王南強矣計必能相知但未知新憲為誰耳此辭職告老皆未允而向來阜陵異議之人趙詹皆巳行遣此獨漏網有所未安巳上自劾之章矣上意必無他但勢必不免於何劉之口亦巳判然於心不復為求全計矣程允夫某病腳恰一月矣尚未能履地而時論又攻之於外因知語默之有時然語巳在前矣今欲默之能有所及乎學徒不欲一旦盡遣恐或反致張皇然巳不多自此來者勿受可也紙尾之喻巳悉然臯陶宥之而堯曰殺之毋乃兩失其職耶彭子夀龜年以下止堂之孫沚家藏中間傳有召節固疑其非美意巳乃不然方以為喜及承惠書又知開府以來經理次第尤以為慰然以時勢料之亦決知其不能久既而果聞巳有奉祠之命矣却不見有文字想又從中而下也此在高明無所輕重但鳴吠唁唁日甚一日其勢必須大有處分其禍不止於縉紳而巳也想以此故亦未能釋然奈何奈何某今夏一病幾死亟上挂冠之請并辭近職蒙上厚恩未即聽許將欲受之而去歲曾議菆陵者例皆獲罪自惟狂妄不應獨免遂以自劾章上計今巳有行遣顧地逺未即聞耳間中讀書却有味但目巳偏肓其未肓者亦日益昏披閲頗艱耳緣此間坐却有恬養功夫始知前此文字上用力太多亦是一病蓋欲應事先須窮理而欲窮理又須養得心地本原虛靜明徹方能察見幾微剖析煩亂而無所差若只如此終日馳騖何緣見得事理分明程夫子所謂學莫先於致知又未有致知而不在敬者正為此也濂溪諸書亦多是發此意下問之意但以此説推之則其受病之原與夫用藥之方皆可見矣雄附逺寄良荷扶衰之意茶五十餅漫附回使以供粗用背時可笑大率如此也薌林逝去在渠高年固無憾但後輩失此典刑亦自可恨也舟御不經于越否亦聞否度不免一南轅得免喻嶠幸也茂獻必相會賤迹既不自保又深為諸賢憂之夏中之病由此增劇中間幸小定今又復作人謀不可及矣奈何奈何彭子夀得張元德書竊聞大斾巳次豫章今當稅駕里門矣乍歸想一畨應接有不能免者然自此杜門少休神觀益得玩心率究大業安知天意不以是玉汝於成乎願益勉旃以慰期望零陵經由頗得從容否復有一書幸為遣致得不浮沈乃幸孫季和應時以下季和之子祖開家藏某到此緣所請未報邦人恐虎兕復出於柙邀晉不得去巳申省且留此矣黃岩糶濟得伯和諸公在此啇量雖未有定論然亦當不至踈脫但水利一事諸公以為非得一見任官主持不可下手某巳撥萬緍今使與食利人户興役矣諸人欲得賢者復來見欲差出縣丞却煩吾友攝其事主此工役不知可來否專令此人奉問幸子細籌度見報若不穩當則當别為申奏專差措置水利亦無不可但在賢者之來與否耳如不可來幸為計度見任官中有何人可委謝户如何欲煩詢之不知渠肯來否此事非小若得黃巖無水旱則無飢饉之憂向後乞得錢更增益之耳度本路水利未有大於此者餘姚之旱與上虞分數如何幸博詢見諭孫季和燭溪蕭寺頃歲蓋嘗一至其間今聞狹書過彼亦有學子相從不勝遐想也精舍諸題悉煩著語屬意皆不淺三復歎想恨不即同晤言也比來觀書日用必有程度及所得所疑有可見告者因來及一二以發講論之端為幸孫季和來喻諄悉備詳為學次第甚慰所懷大抵學者專務持守者見理多不明專務講學者又無地以為之夲能如賢者兼集衆善不倚於一偏者或寡矣更望虛心玩理寬以居之卒究逺大之業幸甚武夷佳句足見雅懷更求小詩數篇暇曰見寄孫季和先志不敢忘但以家居困賔客無緣得就今既之官却恐應接稍希可以具藁便并送崇禮處令轉致也但書石須更屬人蓋目昏殊甚不堪此役一破例之後求者繼至無詞可以却之朋友間如楊子直書儘有法如不識之當為轉求也孫季和示及易説意甚精密但近世言易者直棄卜筮而虛談義理致文義牽強無歸宿此弊久矣要須先以卜筮占決之意求經文本意而復以傳釋之則其命詞之意與其所自來之故皆可漸次而見矣舊讀此書嘗有私記未定而為人傳出摹印近雖收毁而傳布巳多不知曽見之否其説雖未定然大槩可見循此求之庶不為鑿空強説也如元享利正只是以卜得此卦者大亨而利於正耳乾卦彖傳文言乃孔子推説非文王本意也又嘗作啓蒙一書亦巳板行不知曽見之否今往一通試看如何書小序又可考但如康誥等篇決是武王時書却因周公𥘉基以下錯出數簡遂誤以為成王時書然其詞以康叔為弟而自稱寡兄追誦文王而不及武王其非周公成王時語的甚吳材老胡明仲皆嘗言之至於梓材半篇全是臣下告君之詞而亦誤以為周公誥康叔而不之正也其可疑處類此非一太史公雖用其體而不全取其文如啇紀中所載湯誥全非今孔氏書也雖其詞厖亂不若今書之懿然亦見遷書之體或未必全是師法書序也漢書遷嘗從孔安國受書大抵古書多此體如易序卦亦是此類若便斷為孔子之筆恐無是理也先墓志文不敢忘但為歸來悲冗中未暇落筆今當少暇旦夕得成當并寄叔度轉逹也記序諸篇大意皆正當而詞指清婉可喜此雖餘事然亦見遊藝之不苟也入蜀不過荆門否近得劉德修一書今有報章并書册一匣寄之煩為帶行逹之此公未識靣而書來極勤懇前日之舉全類東漢諸賢計雖甚踈而其意則甚誠切矣亦可敬也恐帥君以姻家之故不能無嫌須調護之此非為劉乃為丘計也可嘆可嘆孫季和某衰老多病益甚於前今兩足拘重不復能動巳兩三月矣度氣血巳衰無復完健之理只得未死且爾引日巳為幸矣然世道如此臭味凋落日見稀少亦何用久生為也久欲告老今方及格不敢自請而外郡不為保奏只得一申省狀亦且發去或者恐觸禍機然不暇顧也向承喻及祠記碣文以例不敢為人作文字遂不復曽致思所示行實諸書亦巳卷藏不在目前自此或有便别為寫一通來暇日試為整齊看如何然必三年然後出之時運固叵量但恐夀非金石不能俟耳祠記亦然但子遊之封在唐為吳侯在政和為丹陽公而淳熙所頒祀禮乃為吳公蓋十子皆因唐之舊自侯而公然不知何時所加頃年曽為申請禮寺行下亦無的文今納長沙所刻一通去可試考之也紙尾無可講説之云可為慨歎此固無復可以及人但不知年來自巳分上功夫又如何似聞頗留意於詩文此亦恐虛度光隂也有如衰朽至於今日乃始追恨向來之懶惰今欲加功而日子鋪排巳不遍矣此當以為戒而不可學也孫季和昨需祠記本不敢作以題目稍新不能自巳略為草定數語謾録去度未可刻以速涪城之禍幸且深藏之也孫季和史公入覲不知復何所處禮畢亟歸亦佳事也某去秋以病請祠不遂此間亦可少安而忽有長子之喪悲痛慘怛無復生意請祠諸公巳相諾而未𬒳命計旦夕即去此矣久欲遣人至越中而未暇及今始能作書而迫行匆匆又不暇詳悉所委文字亦未能遂就然不敢忘異時未死終當如志也新刻數書各往一本崇禮兄弟欲各寄一本而偶盡遂不能及亦不暇作書只煩為道意也寧海僧竟如何秉彝好德豈容泯滅於此可驗試寄語招呼之若其意堅可率朋友合力助之以成其志亦非細事也劉子澄清之以下廬陵胡翼龍刋靜春家藏帖昨承有召命深以為喜然亦不知行止之計偶到城中黃子來相尋具言近况為慰但求教竟不之領又以為恨比日伏惟于役有相今或巳至在所矣奏對得以伸吐所學甚慰士友之望正學以言而不失淺深緩急之冝在賢者必巳講之熟矣黃子又説頗欲多所論白此恐徒取草野倨侮之譏而匆匆晷刻之間勢必不容詳細反復則是無故遍觸衆事之機紛冗錯雜而終無感寤之理不若略舉大體切於上心者專指而極言之幸而開納固為莫大之幸萬一未即聽從亦足以為之兆異日猶可尋繹其端緒而終其説也它則非間人逺書可以一二指陳者在明者熟慮而徐應之毋為匆匆以致後日之悔也黃子又説見問人材之意此等事度非吾輩事力所及正不須太遽也劉子澄某幸如昨但伯恭逝去令人悲痛不可言昨嘗以子約計告作書宛轉托子靜送去相報近聞渠巳入浙此書恐未即逹然訃報中必巳見之傷悼之懷相與同之也去年方哭敬夫今伯恭又如許吾道之衰一至於此不知天意如何吾人不可不自勉未死巳前協力支撑也某在家應接隨分擾擾偷間修得中庸及孟子下册孟子得公度卷子甚濟事也今且修此經書通鑑看將來如何恐心目俱昏未必了得終遺恨於身後耳西山長句及還家四言意象蕭散吟玩不能去心欲作數語奉答目覺意思局迫恐不能佳此是膏盲之病不知如何醫治得寬平間暇些子庶晚年身心稍安樂也沅淬令兄墓表草定納呈不知可用否公度何為至今未歸報中亦未見所擬官何耶曾子跋語并往歸來方得細看雖雜篇所收不如前意思終是好本子見録未得附還更有一二處當略修耳近思續録俟旦夕看畢奉報第三録亦佳但如此編録得無勞心否因看書所得隨手抄録不妨若作意收拾搜尋布置即費心力亦須且省節為佳也蓋中年精力非少日之比不可不愛惜耳諸葛學須靜也全文告因便録示千萬荆州論語甚改得好比舊本大不干事若不死更長進深可痛惜伯恭詳審穩當有餘却不及此公俊偉明快也韜仲不苟如此不易其兄晦伯亦甚好它日皆未可量也子玉不聞問旦夕有尤川便當寄書與之擇之何為至今不見歸直卿近遣人來納幣甥女不成却是某女子也渠來春同為金華之行今既聞伯恭訃決當如約某當一與俱往哭伯恭亦不欲爽前約也鄭景望亦殊可傷前書當報去矣陳正巳今在甚處公度當巳歸來春之約不知竟如何也某忽隨例沾誤恩念有罪無功不敢受又昨奏與獻米人推賞諸公不為施行前日不免於詞免狀中極論其事遞中得周參書亦於報書中懇之未知竟如何聞江湖間水旱螟蟲民巳荐飢不知州縣有無措置然今年比之去年事體尤不易也廬陵當不至此此間却差稔但剽掠公行甚於常歲州縣坐視不復介意此亦殊可慮耳眷集中外俱安諸郎一一佳茂愛女夭折可傷平父次女與泰兒同歲向許議昏近亦不育其女幼而解事甚可惜今此兒未有親不能不挂懷抱耳向丈得書却來説及薌林集要序甚恨未得見也序文豈敢僣易然此却好題目但恨晚輩不當作又苦心力衰畏作文字耳景陽明年且在致逺家否向見其説話意趣儘好恨不得欵曲講論今既相逺又無由得相聚耳向得書朱君岑何字偶不記憶更告批喻彼中交遊學生并為一一品題以來尤幸吏老所薦皆浙東知名士亦不易但陸子靜亦入此保社不知果巳行未耳惠况𥿄墨筆帖良以愧感無物可寄祭禮及二小書謾往幸收之昨得延之處祭禮三家方屬鄭丈輔入而渠巳物故旦夕更屬新將也弟子職女戒本各為册而皆以雜儀附之令人家小兒女各取一本讀誦為便也今此册為印者所并又缺雜儀一本不容復改然此無多字致逺更能鋟版流行亦教化善俗之一事也但女戒向見伯恭説欲刪修一兩處忘記問之不知向來曾説及否吕氏二書似亦可刻并廣之也劉子澄某還自莆中道間大病幾不能支卧家月餘幸未即死然神氣衰憊比之春中又什四五矣雲臺將滿方欲俟批書畢遣人宛轉致懇復求舊秩忽尤延之送勑來乃蒙朝廷檢舉直差雖似小小行遣聞新揆却甚以為恩意亦為一畨勞擾但去冬案後收坐未曾決遣不知此又折得過否耳只恐反露線索觸著駭機亦復任之不能深以為憂也王漕送示二月十一日手書三復喜慰不自勝但趙南紀云長沙中冬巳見報而老兄正𥘉始得知之何其晚耶今自劾之章復久未報不知何以處之要當極力再請以得為期得朝士書皆云爾其相鄉慕而未相識如張元善者尤拳拳也先聖象荷寄示然此乃湖學所藏昭陵賜安定本向見陳明仲有之因託定叟傳得其溫良恭遜之容比此又精善恨未得令兄見之也所謂顔子者相傳是伯魚薛士龍亦云恐湖學當有所傳也偶有便人草率附此不知書到時朱􅙲皂蓋巳在甚處所欲言甚衆例不敢出自覺近日意思頗似向來所甚惡者喻王泉之論矣年力頽侵志不勝氣至於如此可懼可懼愛直記文甚佳昨日拜鴻慶勑偶得一絶云舊京原廟久煙塵白髮祠官感慨新北望千門空引籍不知何日去朝真年衰易感不覺涕泗之橫集也劉子澄吳大年附到春間所豫書足以為慰比想經暑涉秋尊體益佳健但不知求去不遂之後諸事又當如何想亦不以此而改其度也細讀來書似於此未能忘懷獨蒙記憶之語又似戲謔病根依然故在也克巳功夫不是易事願益加意而勉焉則區區之幸也王子合遇子合之姪孫鎔家藏前書所喻祭禮之位昨因嘗以為疑但不如此又難區處若只祭三世猶可以曾祖考妣居中而祖東考西然東位考妣之坐巳自難設祖考東而妣西則妣坐迫近曾祖不便考西妣東又與今人坐次相反若祭四世則一位居中二位居東一位居西殊不齊整兩兩對設又似敵體不分尊卑况左昭右穆亦是異廟而廟皆南向即與今人相向設位不同又相向設位則舅婦之坐東西相見亦甚不便似不若只以南向西上為定之為愈也晦庵先生朱文公文别集卷第三候官縣儒學訓導劉簮校晦庵先生朱文公續集卷第三答蔡季通昨日之别令人黯然然觀賢者處之𥙿如又足強人意也不審晚間便發程否前途千萬加意調節言語諸事更宜謹密飲酒戲笑皆宜切戒歸來便覺有相窺伺者次第恐亦不免久當自知之一書至直卿亦煩為託周幹附去或遞去前日亦忘此可見昏罔也昨日二尺短者是周尺長者是何尺耶是景表尺否皆望批喻自奉别後惘惘至今不能忘于懷計行巳過杉嶺不審道間為况如何武陽曽少留否既不登車只得緩行無傷吾足乃佳耳一路皆有知舊必不落寞但恐却有應接之煩耳某幸無它諸生既來遣之不去亦姑任之若有禍害亦非此可免也但極難得人講究文字義理深處便無人可告語殊憒憒益懷仰耳至舂陵煩為問學中濂溪祠堂無恙否某向有一祝版亦不知在與不在因風語及也别後只得到豐城及宜春書知途中諸况足以為慰但至今尚未聞到舂陵信深以為念每至讀書講學無可咨扣無可告語尤覺仰德之深也三哥子陵一一安佳某足疾前日幾作今又少定未知竟如何但精神日耗血氣日衰舊學荒蕪有退無進恐遂沒沒無聞而死耳樂書非敢忘之但方此齰舌豈敢更妄作耶此書決然泯沒不得近看他人所説更無堪入耳者不知老兄平日與元善相處曽説到子細處否但恐子期不曽聽得便只似不曽説也近因諸人論琴就一哥借得所畫圖子適合鄙意乃知朝瑞只説得黃鍾一均內最上一弦而遽欲以論琴之全體宜乎膠固偏執而無所合也學不欲陋豈不信哉昨州兵之歸得書知巳到彼足以為慰僦居寬廣物價廉平足以度日此外想無他撓高懷所處亦無適而不安也趙守得書甚留意寺居雖有約束然逺郡荒僻舍此則無以待賔旅往往亦不能一一遵守頃在南康此寺常為客館若自逺嫌不欲居之則亦無害更託人宛轉白之使知曲折可也翁丞便是德功丈之孫否耶渠向來坐事乃尊來見囑力不能及之想未必不見訝也禮書附疏未到巳與一哥説不若俟斷手後抄之今只寫得一截無疏尤不濟事也三哥為况如何想不廢讀書作文比之家居更省應接當日有新功也此間塊處有疑無所講殊覺憒憒昨因見人説琴無歸著謾疏所疑得數千字欲寫奉寄而昨晚一哥方報今日便有人行遂不暇及當俟後便也或有鄭尚明琴史十餘卷緊要處都不曽説著只是間話耳其書亦是集古今人所説乃止如此是凡事不曽有人理會到底也以法言之亦當用旋宫法但恐以諸短律為宫則弦不惟不可彈亦不可上矣故或説琴只用黃鍾一均似有此理然又只成隋文帝何妥之樂可笑耳可預考之俟寄所草去求正也頃奉記後厚惠書具聞動息足以為慰居夷當巳成趣但能素位而行亦何入而不自得也但聞三哥不快甚以為念計今當已向安矣覺得渠書中語意似放未下更當有以開曉之也琴説納呈幸為訂其繆子細見喻更有一圖無人畫得大率與候氣淺深同是一法第一弦尤可見其下諸弦乃遞儧向上取聲耳精舍巳空眼前朋友亦不長進只前日永嘉一二人來稍可告語今巳去矣參同契史無縫罅亦無心力思量得他但望它日為劉安之雞犬耳到此見人説趙守家人歸云自始至投館光孝而寺僧自言於官云此人長大恐不能制遂移它處此必戲語可發一笑也素患難行乎患難吾人平日講之熟矣今日正要得力想為日既久處之愈安不以彼此遲速二其心也趙守易地後來者不相識元善必巳報去矣賤迹復挂彈之繼此須更有行遣只得靜以俟之若得在湖嶺之間庶得聲問易通亦一幸也律書序客中不暇檢尋須俟還家即為整葺後便奉寄也彈之恐當作彈文三哥所苦痁疾想巳向平復千萬寬心將護著頭緒讀書涵泳義理久之有味自不見得世間利害榮辱之有異也間中些小疾疢所不能無但在我者巳看得破把得定則外物之來終不能為吾患矣所喻雖知巳放得下然亦不必大假安排也趙守長厚乃遽它適新侯聞是黃門之後但無人識之不知又如何若得其有家法思舊事必能善視遷客也所需律序乍歸未暇檢尋舊本旦夕得之即寫未寄去鄙意但能説得有所據依而非蹈襲之意它不能有所發明也禮書未附疏本未可寫以見喻再三恐亟欲見其梗槩巳取家禮四卷并巳附疏者一卷納一哥矣其後更須年歲間方了直卿又以憂歸前日到順昌弔之渠云歸安葬畢却可與履之兄弟大家整頓也琴説向寄去者尚有説不透處今别改定一條録呈比舊似差明白近至政和見陳廷臣朝老崇寧間以布衣上書論事謫居舂陵作詩甚多亦有佳句陳乃政和人議論鯁切不易得也不知彼中尚有其蹤迹否昨附去琴説有一圖説逐弦五聲者此却失了元本煩三哥為檢録來只依元本闊狹界行填注不須更寫前後説也精舍閴然時有一二亦不能久法器固不敢望其能依人口説著實讀書者亦自殊少甚可歎也間亦自思此理人人有分不應今日獨如此難啓發恐亦是自家未有為人手假無以副其逺來之意甚自愧懼耳吳伯豐在後生中最為警敏肯著實用功近年説得儘有條理乃不幸而蚤死死後聞其立志守節不為利害移奪尤使人痛惜也汝玉彥中乃能相念如此甚不易得得楊子直書亦奉問但似云不敢相聞前日答之不曽入題只云小時見趙忠簡李參政諸公在海上門人親舊歲時問訊不絶如胡淡菴猶日與知識唱和往來無所不道秦檜亦不能掩捕而盡殺之蓋自有天也以此知人之度量相越其不啻九牛毛既可歎惜又可深為平生眼不識人之愧也周純臣頃有一書託直卿寄之而不能逹却持以歸今再作數字并附去奉凂能為轉寄幸甚然須有的便乃可遣也陳廷臣在營道不久故人少識之然見其詩亦頗跌宕想亦以此不為人所敬耳别幅所示郡中諸賢聞之不勝悚歎趙守篤老靜退子弟皆賢誠不易得其名謂何幸批喻也歐陽君回書幸逹之楊安諸公恨亦未之識幸各為致意也張舶似亦略曽相識王參政早歲休官泊然無求於世而晚為秦檜所用傷害忠賢助成凶虐以此得罪於清議朱衣道士諄諄之誨豈無意耶此語密之隂君丹訣見濂溪有詩及之當是此書彼之行此而壽考乃喫豬肉而飽者吾人所知蓋不止此乃不免於衰病豈坐談龍肉而實未得嘗之比耶魏書一哥巳刻就前日寄來此必寄去矣校得頗精字義音韻皆頗有據依逺勝世俗傳本只欠教外别傳一句耳前書亦嘗泰和弦望之説不知然否近因再看又覺主驗明白新本金本是日生恐誤作月字因來更望詳以見告也若來喻所謂非入靜不能見者此實至要之訣但人省為擾擾不能一意向裏涵泳三琴圖此亦失却舊所畫本旦夕得暇當令在子更依候氣説畫出續寄去也禮書前卷巳有次第但收拾未聚後卷則儘欠功夫未知能守等得見此定本全編否耶楊簿竟如何江西士人不患不慷慨但於本領上多欠功夫耳湯宰所編黨人遺事若曽傳得幸略見示泰和恐當作奉扣人省之省字恐誤前日丘仲高行後尋得律書序草今略序定又適有彥中處便人過門因附以行度必先丘子到也年來精力衰退文字重滯無氣𦦨此又是三五年前者今日亦做不得矣它所欲言略具前書其不能盡者亦非此所能盡也序中恐有未是處更告詳細點檢一一見喻不敢憚改也自餘千萬自愛為禱客中得一二同志早晚講論想亦不覺度日也近報令臺諌侍從集議赦條前此未嘗有此豈欲大施沛宥盡釋纍囚也耶但在我者只得為久駐之基耳諸朋友所讀何書其所講論亦有可示及者否此自城歸後學館一空亦自省事間中却自看得少文字但昏忘日甚過眼輒不復記覺得不是讀書時節只好閉目靜坐耳琴説前巳寄去後又寄改定數字不知巳到未律書序亦巳附草本去因有回便幸喻及可否也周南仲竟不免近日方見報行章疏甚可笑也蘇守巳屬計臺矣三哥不及别書想間暇儘得讀書作文也參同契一哥巳下手刻版矣轉看轉曉不得霈恩曠蕩未聞施行而留趙四公存沒之恩皆格不下未知賢者去住復何如計高懷必有以處顧舊山朋遊未得遽承晤徒為恨耳諸喻巳悉偶連日腳氣上攻今方少下而右拇緩弱不能握筆又亟欲上五夫力疾撥冗附此數字似聞有類聚討論之旨仍有期限然則不過中春亦須見得果決若便歸得何其快也似聞從遊之士日衆其間當有可與晤語者則為况亦當不至落寞旬呈免與不免本非所較康節先生所謂打乖正謂此也一哥兄弟亦自識道理曉事勢凡百忍耐不至有他此間如封贈奏薦皆不敢陳乞元善遣使請祠巳至都下聞劉趙徐吕之報亦復縮手平生謾説隨時之義只是傳聞想象今日始是身親歷過與口説不同想亦深得此味也答蔡伯靜啓蒙巳為看畢錯誤數處巳正之又欲添兩句想亦不難但注中尊丈兩句不甚分明不免且印出俟其歸却商量今不能久俟也筮儀內前日補去者更錯兩字今亦并注可正之亟遣人還草此但看得不甚子細可更自看一兩過為佳也事了能見過為數日𣢾幸甚或於啓蒙上卷之末添數句云卷內蔡氏説為竒者三為偶者二蓋凡初揲左手餘一餘二餘三皆竒餘四為偶至再揲三揲則餘三者亦為偶故曰竒三偶二也如何天經之説今日所論乃中其病然亦未盡彼論之失正坐以天形為可低昻反覆耳不知天形一定其間隨人所望固有少不同處而其南北高下自有定位政使人能入於彈圓之下以望之南極雖高而北極之在北方只有更高於南極決不至反入地下而移過南方也但入彈圓下者自不看見耳蓋圖雖古所創然終不似天體孰若一大圓象鑽穴為星而虛其當隱之規以為甕口乃設短軸於北極之外以綴而運之又設短柱於南極之北以承甕口遂自甕口設四柱小梯以入其中而於梯未架空北入以為也平使可仰窺而不失渾體耶古人未有此法杜撰可笑試一思之恐或為即著其説以示後人亦不為無輔也梯未之未疑當作末天經巳領其論撰詳悉亦甚不易但回互蓋天頗費力只是近年一􅌉見識不欲惡著古今一個人耳其心則固深知渾蓋之是非也然則孰若據實而論之省詞説乎又况二極交互一説理似不然别𥿄附去可為詳之不知是如此否尊丈許録示參同火候向見巳寫得多了今必巳竟幸即檢示前日尊丈書中巳云與一哥説更煩留念也步天歌聞亦有定本今并就借校畢即納還也參同定本納去可便寫白并元本寄來更看一過然後刻本乃佳簽貼處巳改輔矣一兩處無利害又灼然是錯誤即不須改也玄溝害氣恐未是説人身內事方是設譬之詞緩讀可見也肝肺腎是三物脾是戊巳無可疑者定本亦巳添入矣渾象之説古人巳慮及此但不説如何運轉今當作一小者粗見其形製但難得車匠耳參同契考異方寫得了亦未暇再看過今附壽朋納去并此中寫本一册袁本一册濟本二册煩逐一對過有合改處並貼出子細批注寄來容再看修定方可寫白刋行丘夲不甚佳然豈相類篇首却得刪了四字遂可讀改得一字遂叶韻亦不為無助可試檢看以此知讀書不可不博考也參同考異今以附納其間合改定處各巳摽注其上矣鼎器歌中七聚聚一作竅恐合改竅為正而以聚為一作不知如何可更審之若改即正文此句亦合改也自尊文行後惘惘至今不能平適得晦伯報云得近書又不言巳到何處殊增悵想也尊堂不審處之何如不能不以為念然當有以寬譬之此亦無它害只是如前年逺出一畨耳輿地志納還皇極經世及樂府集却望檢付去人臨川曽景憲書云尊丈巳過彼有以驢為贈者可免徒步之勞也昨看史記曆書大餘之數第二年即差小餘之數第三年即差以後皆算不合不知是如何尊丈必曽説夾幸批喻尊丈得近書否此久不聞信息必是巳過莆中矣啓蒙上册三十六版注中圍一圍當作徑下册第二版前十卦占貞後十卦占悔兩占字並當作主可便改却此三字更子細看過為佳夾恐當作來鄉見尊丈有琴律吕律圖欲略借一觀得檢尋付去人為幸營道有歸信否數日與人講論有得無可告有疑無可質始覺尊丈之逺為可恨也奉告乃知所苦脾疾乃爾赤土之約固宜少緩别俟一信也公晦之説極可笑其曲折須靣論尊丈千里逺書戒賢者兄弟勿為人所誤正為此耳尊丈要琴絃今欲寄去不知何時有便須得有信掩或籠箱之屬置之其中乃免壓摺損拆之患亦俟一報也伯謨説尊丈有素問運氣節略欲借一觀比略編得些小其間不曉處多問伯謨渠亦茫然未嘗措意以此知尊丈事事不容易放過不可及也書白字畫不方正努胸垤肚甚刺人眼然巳寫了無如之何不知鄉里如何似此一向不識好字豈不見浙中書册只如時文省榜雖極草草然其字體亦不至如此得人憎也復卦處空缺不好看移在臨卦上亦何以異其勢須著儧帖盡此以後二十餘版蓋雖只爭一字而篇末一行只有一字又須儧動後篇直到册尾也考異俟更子細看且令刻正經此更一兩日納去未晚也浙中字樣宅上書籍中須多有之如古夲廣韻寫得最好相傳是唐時仙女吳彩鸞日寫十本者雖未必然要可法也仲撫相見否聞留衛公得旨自便而謝給事繳之以為恐徐誼之徒援例有請遂止得量移南劍儲宰復官亦是為謝所駁乃在銓曹時也向若用李公晦之䇿又須頭撞然今尚何言哉數日探問未有近信方以為慮得書知今日可到麻沙不勝傷痛想感事興哀何可堪也前日八哥來訪辱書具悉此事不俟見屬但適此瘖默不容發口巳嘗託八哥奉報矣本欲今日往助墓下之役因得靣言而纍日泄瀉氣痛攻刺畏寒愈甚遂不敢出其事它日言之未晚人至承書知所苦向平深以為慰不知見服何藥切宜更加將護也𬞞食久亦不便若不欲食肉醫家多以藥和肉為丸啖之亦助胃氣既無滋味自無所妨况在禮經自有權制耶昨聞留趙徐吕之報巳令劉二哥奉聞矣事勢如此不知尊丈歸期竟如何當此歲莫令人慨念不能平也律書證辨中論周徑處自十一其長之分至二釐八毫者是也此一節未曉恐有誤字或重復處幸更考之算學文字素所不曉惟賢者之聽耳然須得差簡約為佳更望留意也三哥用藥見效甚慰先訓尚未得下筆日困賔客一事做不得甚可厭也答蔡仲默周純臣書荷留念景建書巳領却欲附數字報之今納去若舂陵人未行猶可及也冠義曽尋得否幸因便寄及洪範傳巳領俟更詳看然不敢率易改動如餘子書一靣寫後日早來取昨日有臨川便巳略報仲撫頗詳此無益而有害何苦委身以犯其鋒也謝誠之書説六卷陳器之書説二卷今謾附去想未暇看且煩為收起鄉後商量也漳州陳安卿在此其學甚進星室之説俟更詳看但云天繞地左旋一日一周此句下恐欠一兩字説地處却似亦説得有病蓋天繞地一周了更過一度日之繞地比天雖退然却一日只一周而無餘也岐梁恐須兼存衆説而以朝氏為斷但梁山證據不甚明白耳禹貢有程尚書説册大難送俟到此可見稍暇能早下來為佳年來病勢交攻困悴日甚要是根本巳衰不復能與病為敵看此氣象豈是久於人世者諸書且隨分如此整頓一畨禮書大假未了最是書説未有分付處因思向日喻及尚書文義通貫猶是第二義直須見得二帝三王之心而通其所可通毋強通其所難通即此數語便巳參到七八分千萬便撥置此來議定綱領早與下手為佳諸説此間亦有之但蘇氏傷於簡林氏傷於繁王氏傷於鑿吕氏傷於巧然其間儘有好處如制度之屬秪以疏文為本若其間有未穩處更與挑剔令分明耳示喻書説數條皆是但康誥外事與肆汝小子封等處自不可曉只合闕疑某嘗謂尚書有不必解者有須著意解者有略須解者有不可解者其不可解者正謂此等處耳弗辟之説只從鄭氏為是向董叔重得書亦辨此條一時信筆答之謂當從古注説後來思之不然是時三叔方流言於國周公處兄弟骨肉之間豈應以片言半語便遽然興師以誅之聖人氣象大不如此又成王方疑周公周公固不應不請而自誅之若請之於王王亦未必見從則當時事勢亦未必然雖曰聖人之心公平正大區區嫌疑自不必避但舜避堯之子於南河之南禹避舜之子於陽城自是合如此若居堯之宫逼堯之子即為篡矣或又謂成王疑周公故周公居東不幸成王終不悟不知周公又如何處愚謂周公亦惟盡其忠誠而巳矣胡氏家録有一假論此極有意味晦庵先生朱文公續集卷之三福州府儒學訓導舒鏊校
