body:
  text: 記髙士軒記同安主簿廨皆老屋支拄殆不可居獨西北隅一軒為亢爽可喜意前人為之以待夫治簿書之暇日而燕休焉然視其所以名則若有不屑居之之意豫以為君子當無入而不自得名此非是因更以為髙士軒而客或難豫曰漢世髙士不為主簿者實御史屬漢官御史府典制度文章大夫位上卿亞丞相主其簿書者名秩亦不卑矣彼猶以為凂已而不顧焉故足以為髙也今子僕僕焉在塵埃之中左右朱墨蒙犯箠楚以主縣簿於此而以髙士名其居不亦戾乎豫曰固也是其言也豈不亦曰士安得獨自髙其不遭則可亡不為已乎豫於其言蓋嘗竊有感焉然亦未嘗不病其言之未盡也蓋謂士之不遭可無不為若古之乘田委吏抱關擊柝者焉可也謂士不能獨自髙則若彼者乃以未睹夫髙也夫士誠非有意於自髙然其所以超然獨立乎萬物之表者亦豈有待於外而後髙耶知此則知主縣簿者雖甚卑果不足以害其髙而此軒雖陋髙士者亦或有時而來也顧豫不足以當之其有待於後之君子云爾客唯唯而退因書之壁以為記泉州同安縣學官書後記紹興二十有五年春正月熹以檄書白事大都督府廷中巳事而言於連帥方公曰熹為吏同安得兼治其學事學有師生誦説而經籍弗具學者四來無所業於其間願得撫府所有書以歸使學者得肄習焉公幸哀其愚不以為不可即日減省少府用度金錢屬工官撫以豫縣凡九百八十五卷熹與諸生既受賜則相與羣議所以斂藏守視出內涼暴之禁戒以復于公報皆施行如章熹竊惟公之舉是賜也蓋將以幸教此縣之人而非私於熹之請熹乃幸得以菲薄奉承懼不能稱且無以垂示久逺故敢具刻公所出教而并敘其指意如此揭之以視縣之父兄子弟與學官弟子之有秩於典領者使承公志永永不怠此熹之職守也夏四月丁丑具位謹記射圃記同安縣西北門射圃者監鹽稅曹侯沆所為也紹興二十五年夏縣有警令丞以下部吏士分城以守而曹侯與豫備西北異時寇至常陷西北然則曹侯與豫所守者盜衝也侯一日與豫登城四望慷慨相語曰是不能守吾屬死無處所不可不勉則分背去行所部循勉慰飾喻意吏士士皆感奮為用侯又曰兵家有之曲道險厄則劒楯利仰髙臨下則弓矢便是則射者固嬰城之具而其為技必習之於無事之時然後緩急可賴而用也今蜂蟻之屯雖未能傳吾城而陳而吾之士固將徇我以死亡我其可以不素教而用之哉於是相與相城之隅得隙地斤以為射圃袤六十步三分其袤而廣得一焉屬其徒日射其間其後盜雖巳潰去圃因不廢間往射如𥘉侯謂豫是圃之作吾二人力也衆人不能見將然其以吾二人者為無事而勤民矣盍記其意以視後豫曰諾哉曹侯字德廣武惠王諸孫世將習兵喜文詞通吏事蓋慨然有志於功名者而豫新安朱熹仲晦也時為主簿於此是為記云蘇丞相祠記熹少從先生長者遊聞其道故相蘇公之為人以為慱洽古今通知典故偉然君子長者也熙寧中掌外制時王丞相用事嘗欲有所引拔公以其人不可用且非故事封上之用此罷歸不自悔守益堅當世髙其節與李才元宋次道並稱三舍人云後得毗陵鄒公所撰公行狀又知公始終大節蓋章章如是以是心每慕其為人屬來為吏同安同安公邑里也以公所為問縣人雖其族家子不能言而泉人往往反喜道曽宣靖蔡新州吕太尉事以為盛豫不能識其何説也然嘗伏思之士患不學耳而世之學者或有所怵於外則眩而失其守如公學至矣又能守之終其身一不變此士君子之所難而學者所冝師也因為之立祠於學歲時與學官弟子拜祠焉而記其意如此以視邑人云漳州教授廳壁記教授之為職其可謂難矣惟自任重而不苟者知之其以為易而無難者則苟道也何也曰教授者以天子之命教其邦人凡邦之士廪食縣官而充弟子員者多至五六百餘少不下百十數皆惟教授者是師其必有以率厲化服之使躬問學蹈繩矩出入不悖所聞然後為稱此非反之身而何以哉是可不謂難矣乎不特此爾又當嚴先聖先師之典祀領護廟學而守其圖書服器之藏其體至重下至金榖出內之纎悉亦皆獨任之嗚呼是亦難矣然凡仕於今者無大小莫不有所臨制總攝其任無劇易必皆具文書使可覆視是以雖甚弛者亦有所難而不敢肆獨教授官雖有統若其任之本諸身者則非簿書期會之所能察至其具於有司而可考者上之人又以其儒官優容之雖有不合不問以是為便故今之仕者反利焉而喜為之而孰知所以充其任者如彼其難哉故曰惟自任重而不苟者知之其以為易而無難者則茍道也豫嘗以事至漳其教授陳君與豫有故館豫於其寓直之舍因得盡觀陳君所施於學者豫謂若陳君則可謂知其難矣時陳君方將刻前人名氏於壁屬豫記豫辭謝不能者再三既不得命乃退而書其所聞見如此以為記且以厲後之君子云爾紹興二十六年七月甲子新安朱熹記一經堂記紹興二十三年秋七月豫來同安明年乃得柯君而與之遊相樂也時君以避地邑居教授常百餘人屬豫治學事因得引君以自助君行峻不為苟合由是衆始有所嚴憚至他事亦多賴以濟焉又明年君將反其先人之廬固舊葺壞以居而取楊子所謂古之學者耕且飬三年通一經者號其寢居曰一經之堂間謁豫記之豫謝涉學未久文且下將不能有所發明於吾子之意願更屬可者如是非復一再至今年冬豫將辭吏以去而君又以為請既不得辭乃為之言曰豫聞古之所謂學者非他耕且飬而巳矣其所以不已乎經者何也曰將以格物而致其知也學始乎知惟格物足以致之知之至則意誠心正而大學之序推而逹之無難矣若此者世亦徒知其從事於章句誦説之間而不知其所以然者固將以為耕且養者資也夫豈用力於外哉柯君名翰字國材為人孝謹誠慤介然有以自守於經無不學今將隱矣而其志不自足如此是蓋終身焉則其造詣之極非豫所敢量也姑次比是説為之記云紹興二十六年閏月辛丑新安朱熹記藝齋記友人徐元聘有田舍一區旁治軒窗明潔可喜暇日與子弟講學其間而問名於熹熹故為農知田意嘗謂孟子言人病舍其田而藝人之田所求於人者重而所以自任者輕最為善喻今徐君課其子弟而學於田間姑以藝名齋使學者即事而思之則內外之分定而力之所肆不於人之田矣霜露既繁實而食之所以不願人之膏粱之味也徐君以熹言為然故書以遺之云紹興二十六年閏月五日癸卯新安朱熹書畏壘菴記紹興二十六年之秋豫吏同安適三年矣吏部所使代豫者不至而廨署日以隳敝不可居方以因葺之宜為請於縣會豫奉檄走旁郡因得并載其老幼身送之東歸涉春而反則門廡列舍巳摧壓而不可人矣於是假縣人陳氏之館居焉自縣西北折行數百步入委巷中垣屋庳下無巨麗之觀然其中粗完潔有堂可以接賔友有室可以備棲息誦書史而佳花異卉蔓藥盆荷之屬又皆列蒔於庭下亦足以娛玩耳目而自適其意焉豫獨處其間稍捐外事命友生之嗜學者與居其下拚除井竈之役願留者亦無幾人若常時車馬之客與胥吏之有事於官府者則無所為而來矣客或謂豫所以處此庶乎庚桑子之居畏壘也因名豫居曰畏壘之菴自是閉門終日翛然如在深谷之中不自知身之繫官於此既歲滿而不能去也如是又纍月代豫者卒不至法當自免歸而陳氏謁豫記其事曰使後之人知夫子之嘗居于是也豫惟庚桑子蓋莊周列禦寇所謂有道者豫之學既不足以知之而太史公記又謂凡周所稱畏纍虛亢桑子之屬皆空言無事實然則亡是公非有先生之倫也此皆不可考獨周之書辭指經竒有可觀者豫是以竊取其號而不辭遂書以卑陳氏陳氏世為醫請豫記者名良傑為人謹篤周愼能通其家學云紹興二十七年夏六月十一日新安朱熹記存齋記豫吏同安而遊於其學嘗私以所聞語其士之與豫遊者於是得許生升之為人而敬愛之比豫之辭吏也請與俱歸以共卒其講業焉一日生請於豫曰升之之來也吾親與一二昆弟相為築環堵之室於敝廬之左將歸翳蓬藋而居焉惟夫子為知升之志敢請所以名之者而幸教之則升之願也豫辭謝不獲因念與生相從於今六七年視其學專用心於內而世之所屑一亳不以介於其間嘗竊以為生之學盡有意乎孟氏所謂存其心者於是以存名其齋而告之曰豫不敏何足以知吾子然今也以是名子之齋則於吾子之志竊自以為庶幾焉耳矣而曰必告子以其名之之説則是説也吾子既自知之豫又奚以語吾子抑嘗聞之人之所以位天地之中而為萬物之靈者心而巳矣然心之為體不可以聞見得不可以思慮求謂之有物則不得於言謂之無物則日用之間無適而非是也君子於此亦將何所用其力哉必有事焉而勿正心勿忘勿助長則存之之道也如是而存存而久久而熟心之為體必將瞭然有見乎參倚之間而無一息之不存矣此豫所以名齋之説吾子以為如何生作而對曰此固升之所願學而病未能者請書而記諸屋壁庶乎其有以自礪也豫不獲讓因書以授之俾歸刻焉紹興二十八年九月甲申新安朱熹記牧齋記余為是齋而居之三年矣飢寒危迫之慮未嘗一日弛於其心非有道路行李之勞疾病之憂則無一日不取六經百氏之書以誦之於兹也以其志之篤事之勤如此宜其智益加明業益加進而不知智益昏而業益墮也以是自咎故嘗間而思之夫挾其飢寒危迫之慮以從事於聖人之門而又雜之以道路行李之勞疾病之憂有事物之纍無優遊之樂其於理之精微索之有不得盡其事之是非古今之成敗興廢之故考之有不得其詳矣况古人之學所以漸涵而持飬之者固末嘗得施諸其心而錯諸其躬也如此則凡所為早夜孜孜以冀事業之成而詔道德之進者亦可謂妄矣然古之君子一簞食瓢飲而處之泰然未嘗有戚戚乎其心而汲汲乎其言者彼其窮於當世有甚於余矣而有以自得於巳者如此必其所以用心者或異於豫矣孔子曰貧而樂又曰古之學者為巳其然也豈以飢寒者動其志豈以挾䇿讀書者而謂之學哉豫方務此以自逹於聖人也因述其所以而書其辭於壁以為記歸樂堂記豫嘗為吏於泉之同安而與仙遊朱侯彥實同寮相好也其後豫罷歸且五六年病卧田間浸與當世不相聞知獨朱侯時時書來訪問繾綣道語舊故如平生歡一日書抵豫曰吾方築室先廬之側命之曰歸樂之堂蓋四方之志倦矣將託於是而自休焉子為我記之豫惟幼而學強而仕老而歸歸而樂此常物之大情而士君子之所同也而或者怵迫勢利眷眷軒冕印韍之間老而不能歸或歸矣而酣豢之餘厭苦淡泊顧慕疇昔不能忘情方且咨嗟戚促自以為不得其所而豈知歸之為樂哉或知之矣而顧其前日從官之所為有不能無愧悔于心者則於其所樂雖欲暫而安之其心固不能也然則仕而能歸歸而能樂斯亦豈不難哉朱侯名卿子少有美材學問慷慨入官三十年以強直自遂獨行所志不為勢屈以故浮湛選調行年五十乃登王官然豫視其簿書期會之餘日蓋無一日不命賔友從子姪登山臨水弦歌賦詩放浪於塵埃之外而無幾微留落不偶之意見於言靣則其於勢利如何哉其仕而能歸歸而能樂不待斯堂之作而可信無疑矣顧豫未獲一登斯堂而覽其勝槩然其林壑之美泉石之饒足以供徒倚館宇之邃啓處之適足以寧燕休圖史之富足以娛心目而幽人逸士往來於東阡北陌者足以析名理而啇古今又不待接於耳目而知侯之樂有在乎是也是以承命不辭而記其意如此如天之福異時獲從遊於堂上尚能為侯賦之紹興三十年十二月乙卯建寧府學遊御史祠記故監察御史遊公先生諱酢字定夫此邦之建陽人而河南程氏之髙第弟子也徽廟𥘉為御史未幾去為郡江淮間又退而間居以卒隆興𥘉元歲在癸未先生之殁於是四十有一年矣今敷文閣待制延平陳公實為此邦謂德學之盛有如先生者而無祠於其鄊之學非獨鄊人子弟之過長民者亦有罪焉乃為堂於府學之東偏立像致祠而以書屬熹使記其意熹辭謝弗堪屢返而公不聽於是退考舊聞按龜山楊文靖公所為先生墓志之辭曰豫元豐中受學眀道先生兄弟之門有友二人焉曰上蔡謝顯道公其一也𥘉伊川先生以事至京師一見公謂其資可與適道是時明道知扶溝縣事先生兄弟方以唱明道學為巳任設庠序聚邑人子弟教之召公來職學事公欣然往從之得其微言於是盡棄其學而學焉其後得邑河清豫往見之伊川謂豫曰遊君德器粹然問學日進政事亦絶人遠甚於師門見稱如此其所造可知矣公自幼不羣讀書一過目輒成誦比壯益自力心傳目到不為世儒之習誠于中形于外儀容辭令粲然有文望之知其為成德君子也其事親無違交朋友有信蒞官遇僚吏有恩意雖人樂於自盡而無敢慢其令者惠政在民戴之如父母故去則見思愈久而不忘若其道學足以覺斯人餘潤足以澤天下遭時清明不及用而死此士論共惜之非豫之私言也所著書有中庸義易説詩二南義論孟雜解各一卷文集十卷藏於家蓋楊公所記如此熹惟知先生之深而言足以命其德且信於後宜莫踰於楊公者然則先生之道學德行於此可以觀其詳矣又念每獲侍坐於陳公而聞其語先正忠肅公之與先生遊也笑談論議書疏辭章昔所親見而聞之者至今尚能誦之其雍容仰俯之間又能併得其深微之意使聞者恍然若將復見其人焉此其於先生之道如何哉然則公之所以命祀先生蓋將推其所得於巳者以幸教此邦之人非徒致欽慕之意以修故事而巳也熹既不獲終辭乃悉論著楊公本語而不敢輒贊一辭於其間且復揆公指意所出者如是而并書之以承公命庶乎其可幸無罪云耳嗚呼先生遠矣學者登是堂而拜其像於是記也考其師友之淵源退訪其書而讀之於以求先生之所以學者果惡乎在幸而有以自得之則亦無以異乎親而炙之矣詩曰人之好我視我周行又曰髙山仰止景行行止熹雖不敏願與承學之士勉焉以無忘陳公之德也八月甲子具位朱熹記通鑑室記士之所以能立天下之事者以其有志而巳然非才則無以濟其志非術則無以輔其才是以古之君子未有不兼是三者而能有為於世者也然而所謂術者又豈隂險詭仄朝三暮四之謂哉亦語夫所以處事之方而已矣營丘張侯仲隆慷慨有氣節常以古人功名事業自期許不肯碌碌隨世俗上下至其才器閎慱則又用無不宜蓋臨大事變而愈益精神指麾處畫無一不中幾會者是其志與其材雖未盡見施設而人知其有餘矣然未嘗以是自足也方且慱觀載籍記覽不倦蓋將酌古揆今益求所以盡夫處事之方者而施之非特如世之學士大夫兀兀陳編掇拾華靡以為談聽之資至其施諸事實則泛然無據而巳也嘗客崇安之光化精舍暇日新一室於門右不置餘物獨取資治通鑑數十帙列其中焚香對之日盡數卷蓋上下若干年之間安危治亂之機情偽吉凶之變大者綱提領挈細者縷析亳分心目瞭然無適而非吾處事之方者如是蓋三年矣而其起居飲食宴娛談笑亦無一日而不在是也室之前軒俯視衆山下臨清流邑屋臺觀園林陂澤之勝月星雨露風煙雲物之竒反若有以開滌靈襟助發神觀者尤於讀是書也為宜於是直以通鑑榜之而屬豫記豫聞之古今者時也得失者事也傳之者書也讀之者人也以人讀書而能有以貫古今定得失者仁也蓋人誠能即吾一念之覺者默識而固存之則目見耳聞無非至理而况是書先正溫公之志其為典刑揔會簡牘淵林有如神祖聖詔所褒者是亦豈不足以盡其心乎今侯有當世之志當世之才又能因是書以求盡其術此豈苟然而巳哉然豫猶欲進於行著習察之塗使異時見於用者無毫釐之差也則願以仁之説為侯誦之是以承命不辭而記其本末因附以所聞如此乾道三年秋七月新安朱熹記南嶽遊山後記南嶽唱酬訖于庚辰敬夫既序其所以然者而藏之矣癸未發勝業伯崇亦别其羣從昆弟而來始聞水簾之勝將往一觀以雨不果而趙醇叟胡廣仲伯逄季立井可大來餞雲峯寺酒五行劇論所疑而别丙戍至櫧州熹與伯崇擇之取道東歸而敬夫自此西還長沙矣自癸未至丙戌凡四日自嶽宫至櫧州凡百有八十里其間山川林野風煙景物視向來所見無非詩者而前日既有約矣然亦念夫别日之迫而前日所講蓋有既開其端而未竟者方且相與思繹討論以畢其説則其於詩固有所不暇者焉丙戌之莫熹諗於衆曰詩之作本非有不善也而善人之所以深懲而痛絶之者懼其流而生患耳𥘉亦豈有咎於詩哉然而今逺别之期近在朝夕非言則無以寫難喻之懷然則前日一時矯枉過甚之約今亦可以罷矣皆應曰諾既而敬夫以詩贈吾三人亦各答賦以見意熹則又進而言曰前日之約巳過矣然其戒懼警省之意則不可忘也何則詩本言志則宜其宣暢湮鬱優柔平中而其流乃幾至於喪志羣居有輔仁之益則宜其義精理得動中倫慮而猶或不免於流况乎離羣索居之後事物之變無窮幾微之間毫忽之際其可以營惑耳目感移心意者又將何以禦之哉故前日戒懼警省之意雖曰小過然亦所當過也由是而擴充之庶幾乎其寡過矣敬夫曰子之言善其遂書之以詔毋忘於是盡録贈處諸詩于篇而記其説如此自今暇日時出而觀焉其亦足以當盤盂几杖之戒也夫丁亥新安朱熹記轉運司蠲免鹽錢記代毋忘一本作毋怠皇帝陛下臨御之五年朝廷清明衆職修理乃眷南顧閔兹逺黎某月詔以太常少卿臣某為福建轉運副使而付以鹽策使訪其利病以聞臣某既承詔奔走即事則與判官臣某爰暨屬僚慱詢審訂具以條奏越明年春遂有旨免本道屬州縣逋負鹽課之緡錢九十七萬又詔歲入鈔鹽緡錢二十二萬者其罷之而使漕司歲以緡錢七萬輔經費之闕臣某承命歡喜北向頓首言福建鹽法之弊久矣臣等問諸故府竊見祖宗盛時本道鹽息歲入緡錢十萬而三分之以其一豫漕司佐州縣用度且市貢金其二為鈔法則啇人歲輸京師者為錢六萬六千有竒而巳其後鈔法中弛浮議交煽因盡以委漕司而增其額於是綱運猥并鹽泄不時而民始受弊中間蓋嘗減損然什不能去其三又他用之取具於鹽者亦且數倍舊制顧以歲出有常因不敢議至州縣或不能供又不得以時蠲除新故相仍轉相督趣重為民病歷年滋多今乃幸遇陛下仁聖儉慈不遺遐逺既幸聽愚臣言而又推之以及其所未言者蓋德音再下而鈔額復祖宗之舊逋負捐纍歲之積使州縣之吏無所旁緣以漁獵其民民得休息恩澤隆厚不可勝量臣等駑鈍不材奉使無狀乃幸得奉承聖詔以布于下誠歡誠喜敢不悉力究宣謹察所部無或不虔以廢明命猶懼不稱無以昭示永久則取尚書所下詔旨刻石臺門以諗來者而竊敬識其下方如此又惟陛下躬德神聖天運日新其約已厚民之心終日乾乾有進無巳竊計經制大定上下與足蓋可以日月期矣然則臣等前日所不敢議者且將復有望焉敢昧萬死并記其説而俯伏以俟乾道四年三月謝上蔡語録後記熹頃年校定上蔡先生語録三篇未及脫藁而或者傳去遂鋟木於贛上愚意每遺恨焉比因間暇復為定著此本然亦未敢自以為可傳也因念往時削去版本五十餘章特以理推知其決非先生語𥘉未嘗有所左驗亦不知其果出於何人也後籍溪胡先生入都於其學者吕祖謙得江民表辨道録一篇讀之則盡向所削去五十餘章者首尾次序無一字之差然後知其為江公所著而非謝氏之語益以明白夫江公行誼風節固當世所推髙而陳忠肅公又嘗稱其論明道先生有足目相應之語蓋亦略知吾道之可尊矣而其為言若此豈差之毫釐則夫千里之繆有所必至而不能巳者耶因書以自警且示讀者使母疑舊傳謝先生與胡文定公手柬今并掇其精要之語附三篇之後云乾道戊子四月壬寅熹謹記建寧府崇安縣學二公祠記崇安建之巖邑故宫師趙清獻公嘗為之宰故侍讀胡文定公又其邑里人也兩公之德後學仰之舊矣然數十年之間為是邑者不知其幾何人無能表而出之以化於邑者乾道三年今知縣事溫陵諸葛侯始至則將葺新學校以教其人而深以兩公之祠未立為巳病於是訪求遺像因新學而立祠焉明年五月甲子訖功命諸生皆入于學躬率丞掾與之釋菜于先聖先師而奠于兩公之室三獻成禮揖諸生而進之曰學則孔孟尚矣然居是邦語其風聲氣俗之近則鄉大夫鄉先生之賢者豈可以不知其人哉惟趙公孝弟慈祥履繩蹈矩為政有循良之迹立朝著蹇諤之風清節至行為世標表固諸公之所逮聞也至於胡公聞道伊洛志在春秋著書立言格君垂後所以明天理正人心扶三綱敘九法者深切著明體用該貫而其正色危言據經論事剛大正直之氣亦無所愧於古人則諸君豈盡知之乎吾承乏於此過不自料常欲與諸君相勵以聖賢之事今幸因吾民之餘力校室以修方將日與諸君者從容俯仰乎其間顧念古昔聖賢逺矣則欲諸君自其近者而逹之是以象兩公於此堂也諸君自今以來蓋亦望其容貌而起肅敬之心考其言行以激貪懦之志然後精思熟講反之於心以求至理之所在而折衷焉庶幾學明行尊德久業大果能逹於聖賢之事是則兩公私淑後來之本意而亦區區平日所望於諸君也諸君豈有意乎諸生皆拜曰諸生不敏敢不敬蚤夜以思無辱先生之誨於是既退而諸葛侯使人以是説走山間屬熹為之記熹惟今之為政者固巳不遑於學校之事其或及之而不知所以教則徒以祿利誘人而納之卑汙淺陋之域是乃賊之而於教何有今諸葛侯於兹邑既新其學而語之以聖賢之事又能尊事兩公俾學者由是而逹焉則可謂知所以教矣此其志豈特賢於今之為政者而巳哉既不得辭乃具書其本末以視同志願相與勉焉以無負諸葛侯之教也是月癸未新安朱熹記克齋記性情之德無所不備而一言足以盡其妙曰仁而巳所以求仁者蓋亦多術而一言足以舉其要曰克巳復禮而巳蓋仁也者天地所以生物之心而人物之所得以為心者也惟其得夫天地生物之心以為心是以未發之前四德具焉曰仁義禮智而仁無不統巳發之際四端著焉曰惻隱羞惡辭讓是非而惻隱之心無所不通此仁之體用所以涵育渾全周流貫徹專一心之妙而為衆善之長也然人有是身則有耳目鼻口四肢之欲而或不能無害夫仁人既不仁則其所以滅天理而窮人欲者將益無所不至此君子之學所以汲汲於求仁而求仁之要亦曰去其所以害仁者而巳蓋非禮而視人欲之害仁也非禮而聽人欲之害仁也非禮而言且動焉人欲之害仁也知人欲之所以害仁者在是於是乎有以拔其本塞其源克之克之而又克之以至於一旦豁然欲盡而理純則其胸中之所存者豈不粹然天地生物之心而藹然其若春陽之溫哉默而成之固無一理之不具而無一物之不該也感而通焉則無事之不得於理而無物之不𬒳其愛矣嗚呼此仁之為德所以一言而可以盡性情之妙而其所以求之之要則夫子之所以告顔淵者亦可謂一言而舉也與然自聖賢既逺此學不傳及程氏兩先生出而後學者始得復聞其説顧有志焉者或寡矣若吾友會稽石君子重則聞其説而有志焉者也故嘗以克名齋而屬豫記之豫惟克復之云雖若各為一事其實天理人欲相為消長故克已者乃所以復禮而非克已之外别有復禮之功也今子重擇於斯言而獨以克名其室則其於所以求仁之要又可謂知其要矣是尚奚以豫言為哉自今以往必將因夫所知之要而盡其力至於造次顛沛之頃而無或怠焉則夫所謂仁者其必盎然有所不能自巳於心者矣是又奚以豫言為哉顧其所以見屬之勤有不可以終無言者因備論其本末而書以遺之幸其朝夕見諸屋壁之間而不忘其所有事焉者則亦庶乎求仁之一助云爾乾道壬辰月日新安朱熹謹記味道堂記武陽何君鎬叔京一日以書來謂熹曰吾先君子辰陽府君少事東平馬公先生受中庸之説服習踐行終身不懈間嘗榜其燕居之堂曰味道蓋亦取夫中庸所謂莫不飲食鮮能知味之云也今不肖孤既無以嗣聞斯道惟是朝夕糞除虔居恪處不敢忘先人之志子其為我記之以告于後之人而鎬也亦得出入覽觀焉庶乎其有以自勵也熹惟何公實先君子太史公同年進士熹不及拜其牀下獨幸得從叔京遊而兄事之因得聞其學行之懿顧雖不德不文不足以稱述傳信然慕仰之深願得託名於其屋壁之間以為幸因不敢以不能對謹按公諱某字太和始為少吏南方會馬公以御史宣慰諸道一見賢之奏取為屬因授以所聞於程夫子之門者且悉以平生出處大節告之詳焉既馬公以言事謫死公歸守其學終身不少變其端巳接物發言造事蓋無食息之頃而不惟中庸是依也鄊人愛敬至以中庸何公目之於他經亦無所不學而尤盡心于易作集傳若干卷其忠純篤厚之姿廉靜直方之操得于天而成于學充于內而不暴於外世之君子莫能知也晚以馬公移書偽楚斥使避位之節列上史官宰相惡其分已功逮繫詔獄削籍投荒而終不自悔以殁其身此其於道真可謂飲食而知其味矣帷其知之深是以守之固而行之樂行之樂是以益味其腴而弗能去也然公之所謂道者又豈若世之俗儒習見老佛虛無寂滅之説而遂指以為道也哉考諸公之中庸亦曰五品之民彛而巳熹愚不肖誠不足以窺大人君子所存之萬一然竊意其名堂之意有在於是也是以敢備書之以承叔京之命後之君子得以考焉抑叔京之清夷恬曠不纍世紛既聞道于家庭又取友於四方以益求其所未至其銜訓嗣事而居此堂也可無愧矣今又欲由是益自勵焉是其進之鋭而至之逺其可量哉其可量哉此於法當得附書因并識於此云乾道癸已二月甲申新安朱熹記劉氏墨莊記乾道四年秋熹之友劉清之子澄罷官吳越相過于潭溪之上留語數日相樂也一旦子澄拱而起立且言曰清之之五世祖磨勘工部府君仕太宗朝佐邦計者十餘年既殁而家無餘資獨有圖書數千卷夫人陳氏指以語諸子曰此乃父所謂墨莊也海陵胡公先生聞而賢之為記其事其後諸子及孫比三世果皆以文章器業為時聞人中更變亂書散不守清之之先君子獨深念焉節食縮衣悉力營聚至紹興壬申歲而所謂數千卷者始復其舊故尚書郎徐公兢吳公説皆為大書墨莊二字以題其藏室之扁不幸先人棄諸孤清之兄弟保藏增益僅不失墜以至于今然清之竊惟府君夫人與先君子之本意豈不曰耕道而得道仁在夫熟之而巳乎而不知者意其所謂或出於青紫車馬之間清之不肖誠竊病焉願得一言以發明先世之本意於以垂示子孫丕揚道義之訓甚大惠也熹聞其説則竊自計曰子澄之意誠美矣然劉氏自國𥘉為名家所與通書記事者盡儒先長者矧今子澄所稱又其開業傳家之所自於體為尤重顧熹何人乃敢以其無能之辭度越衆賢上紀兹事於是辭謝不敢當而子澄請之不置既去五六年書疏往來以十數亦未嘗不以此為言也熹惟朋友之義有不可得而終辭者乃紬繹子澄本語與熹所以不敢當之意而敘次之如此嗚呼非祖考之賢孰能以詩書禮樂之積厚其子孫非子孫之賢孰能以仁義道德之實光其祖考自今以來有過劉氏之門而問墨莊之所以名者於此乎考之則知其土之所出廬之所入者在此而不在彼矣蓋磨勘公五子皆有賢名中子主客郎中實生集賢舍人兄弟皆以文學大顯于時而名後世第四子祕書監資簡嚴識大體有傳于英宗實録子澄之先君子即其曽孫也諱某字某官至某仕既不遭無所見於施設今獨其承家燾後之意於此尚可識也生二子長曰靖之子和其季則子澄皆孝友廉靜慱學有文而子澄與熹遊尤篤志於義理之學所謂耕道而熟仁者將於是乎在九年二月丙戌新安朱熹記盡心堂記豫友范伯崇始仕為廬陵屬邑主簿不小其官遇事亡所苟遂以幹敏聞州藉其才奏取以代録事之病不能事者廬陵民素嚚訟治獄者常患不能得其情伯崇既盡心焉而又廉勤以揵于下懇惻以伸於上於是小冤必白而姦民無所幸免一郡稱之官以無事則以暇日葺其問事之堂而取君子盡心之云者榜之又大書噬嗑之卦於屏上且闢其後為方丈之室以會友講學焉一日書來曰願有以記此堂而名其室以幸教我且使來者與有聞焉豫惟王制之篇雖傳以為漢慱士官所出然其所謂刑一成而不可變故君子盡心焉者語約而意周教明而戒密其或者古之遺言也與今伯崇既躬行之而又以名其堂欲其出入起居仰而見之常有以自警也以為未足又取大易電雷之象明斷之義與夫剛柔上下淺深難易之説金矢黃金艱貞貞厲之戒揭於坐右而以蚤夜覽觀焉此其志豈以一得其情而遽喜者哉然猶懼夫學之未至而於父子之親君臣之義纎微之間有所未察則雖欲悉其聰明致其忠愛而不知所以權之故又為退食燕居之所於其後以便講學此則尤非今之為吏者所能及也昔子路曰有民人焉有社稷焉何必讀書然後為學此言近是而夫子惡之然則仕本於學而學必讀書固孔門之遺法也因請命其室曰讀書之室而悉記其本末如此以遺之伯崇家傳正學於道有聞而其小試之效又巳孚於上下如此此其所以讀書者必有以異乎人之讀之矣伯崇平居退然若不能言遇事泛然若無所主豫雖知之深亦未嘗不喜其溫厚之有餘而憂其強毅之不足也今一行作吏其所以自樹立者乃如此而世之聰明才智之士計其當官之效宜可以逺過于伯崇者或乃反不能及豫於此又竊獨有感焉因并書之以風曉當世且以厲來者於無窮伯崇名念德建安人與豫有世舊且有連又相好也乾道癸巳二月丁亥新安朱熹記蘄州教授廳記乾道八年秋豫友建安李君宗思為蘄州學官始至入學釋菜召諸生坐堂上而告之曰朝廷立學建官所以教養人才而待其用德意甚美宗思不佞得備選焉深惟淺陋懼不能稱今將有以告二三子者而相與朝夕乎古人為巳之學庶以無負朝廷教養之意二三子其亦有意於斯乎諸生起而對曰諸生不敏惟先生有以教之則幸甚於是李君退即其居則距學且十里所李君顧而嘆曰學官宜朝夕于學與諸生相切磋者其相距之逺可若是耶翌日相學之東偏有廢壤焉請於州願得為屋以居而日往來於學以供厥事於是通守北海王侯某實領州符嘉李君之意而悉其力以相之役不踰時遂以備告然後李君得以日至於學進諸生而教誨之蓋使之潛思乎論語孟氏之書以求理義之要又考諸編年資治之史以議夫事變之得失焉日力有程不躐不惰探䇿而問勸督以時凡以使之知所以明善修身之方齊家及國之本而於詞藝之習則後焉而不之急也既又禮其士之賢有德者李君之翰而與之居凡學之教治悉使聽焉由是蘄之為士者始知所以為士之事而用其力李君亦喜其教之行而將有成也礱石於堂考前為是官者得自某人以下若干人之名氏歲月刻之而以書屬豫使因記其所以然者豫惟李君之教可能也而其所以教者則非世儒之所及王侯之垂意於學可及也而其不以李君之説為迂闊於事者則非俗吏之所能是皆冝書以詔于後蓋非獨使繼李君而居此者有所考法抑亦承流千里而師帥其民者之所宜知也於是悉書其本末如此俾刻置題名之首云九年秋七月壬子新安朱熹記建寧府建陽縣主簿廳記縣之屬有主簿秩從九品縣一人掌縣之簿書凡户租之版出內之會符檄之委獄訟之成皆總而治之勾檢其事之稽違與其財用之亡失以贊令治蓋主簿之為職如此而豫嘗竊論之以為縣之治雖狹而於民實甚親主其簿書者秩雖卑而用人之得失其休戚於民實甚重顧今銓曹所領員以百數既不容有所推擇而為令者又往往私其政不以及其屬是以官多不得其人而人亦不得其職舉天下之縣偶能其官者計百不一二然亦不過能取夫户租之版而朱墨之耳若其他則固不得而與焉而亦莫或知其職之曠也建陽縣主簿之廨故在縣治西墉下自建炎中火于盜而寓於浮屠之舍距縣且三里所蓋主簿之不得司其局者四十有餘年矣今右通直郎池陽王君某來知縣事則計復焉而未克舉及主簿括蒼葉君某至而尤以不得蚤夜其職為憂乃請於縣而卒成之自經始以至迄事凡百餘日為屋若干楹其費得縣之羡錢五十萬粟斛百凡故地之入于民居者則皆正於舊籍而不之奪也明年葉君以書具本末屬豫記豫佳王君之不私其政與葉君之能憂其職也則為推本其所以設官之意并敘其事而書之以告來者俾無曠於其職既又因葉君之請取孔子為委吏時語名其東偏之室曰當齋其意蓋與此相表裏云乾道九年秋八月辛酉朔新安朱熹記南劒州尤溪縣學記乾道九年九月尤溪縣修廟學成知縣事會稽石君􅗐以書來語其友新安朱熹曰縣之學故在縣東南隅其地隆然以髙靣山臨流背囂塵而挹清曠於處士肄業為宜中徙縣北源上後又毁而復𥘉然其復也士子用隂陽家説為門斜指寅卯之間以出而自門之內因短就狹遂無一物不失其正者􅗐始至而病焉顧以斆學之𥘉未遑外事歲之正月乃始撤而新之既使夫門堂齋序庫庾庖湢無一不得其正而又度作重屋于堂之東以奉先賢以尊古訓唯殿為因其舊然亦繚以重櫩嚴其陛楯而凡像設之不稽于古者則使視諸太學而取正焉靡金錢蓋四十萬用人力三萬工不資諸士不取諸民而事以時就意者吾子亦樂聞之儻辱記焉以幸教其學者於無窮是則􅗐之幸也熹惟石君之為是役也則固已可書矣抑熹嘗得遊於石君而知其所以學者蓋皆古人為巳之學又嘗以事至於其邑而知其所以教者又皆深造自得之餘是則其為可書蓋有大於此役者熹雖不敏誠竊樂得推本而備論之是以承命而不辭焉蓋熹聞之天生斯人而豫之以仁義禮智之性而使之有君臣父子兄弟夫婦朋友之倫所謂民彛者也惟其氣質之稟不能一於純秀之會是以欲動情勝則或以陷溺而不自知焉古先聖王為是之故立學校以教其民而其為教必始於灑掃應對進退之間禮樂射御書數之際使之敬恭朝夕修其孝弟忠信而無違也然後從而教之格物致知以盡其道使知所以自身及家自家及國而逹之天下者蓋無二理其正直輔翼優遊漸漬必使天下之人皆有以不失其性不亂其倫而後巳焉此二帝三王之盛所以化行俗美黎民醇厚而非後世之所能及也自漢以來千有餘歲學校之政與時盛衰而其所以為教者類皆不知出此至於所以勸勉懲督之者又多不得其方甚者至或使之重失其性益亂其倫而不悟是不亦可悲也哉至于我宋文治應期學校之官遍于郡縣其制度詳密規摹宏逺蓋已超䡍漢唐而娓娓乎唐虞三代之隆矣而有司無仲山甫將明之材不能祗承德意若稽治古使學校之所以為教者卓然有以逺過於近代儒先君子或遺恨焉今石君乃獨能學乎古之學而推之以行於今使其學者惟知修身窮理以成其性厚其倫之為事而視世俗之學所以干時取寵者有不屑焉是則石君所以敷教作人可書之大者其視葺新廟學一時之功為如何哉然是役也石君之意亦將以尊嚴國家教化之宫而變其學者之耳目使之有以養於外而齊其內非徒以誇壯觀飾遊聲而巳也蓋其敷教作人之功於是為備惜乎所試者小而所及之不遐也故特序其本末而悉書之蓋非特明石君之志以厲其學者且將以風天下之凡為郡縣者使其皆以石君之心為心焉則聖人之道聖人之化將不憂其不明於天下矣是歲冬十月庚申朔記建寧府崇安縣五夫社倉記乾道戊子春夏之交建人大飢豫居崇安之開耀鄊知縣事諸葛侯廷瑞以書來屬豫及其鄊之耆艾左朝奉郎劉侯如愚曰民飢矣盍為勸豪民發藏粟下其直以振之劉侯與豫奉書從事里人方幸以不飢俄而盜發浦城距境不二十里人情大震藏粟亦且竭劉侯與豫憂之不知所出則以書請于縣于府時敷文閣待制信安徐公嚞知府事即日命有司以船粟六百斛泝溪以來劉侯與豫率鄊人行四十里受之黃亭步下歸籍民口大小仰食者若干人以率受粟民得遂無飢亂以死無不恱喜歡呼聲動旁邑於是浦城之盜無復隨和而束手就擒矣及秋徐公奉祠以去而直敷文閣東陽王公淮繼之是冬有年民願以粟償官貯里中民家將輦載以歸有司而王公曰歲有凶穰不可前料後或艱食得無復有前日之勞其留里中而上其籍於府劉侯與豫既奉教及明年夏又請于府曰山谷細民無蓋藏之積新陳未接雖樂歲不免出倍稱之息貸食豪右而官粟積於無用之地後將紅腐不復可食願自今以來歲一斂散既以紓民之急又得易新以藏俾願貸者出息什二又可以抑僥幸廣儲蓄即不欲者勿強歲或不幸小飢則弛半息大侵則盡蠲之於以惠活鰥寡塞禍亂原甚大惠也請著為例王公報皆施行如章既而王公又去直龍圖閣儀真沈公度繼之劉侯與豫又請曰粟分貯民家於守視出納不便請放古法為社倉以儲之不過出捐一歲之息宜可辦沈公從之且命以錢六萬助其役於是得籍坂黃氏廢地而鳩工度材焉經始於七年五月而成於八月為倉三亭一門墻守舍無一不具司會計董工役者貢士劉復劉得輿里人劉瑞也既成而劉侯之官江西莫府豫又請曰復與得輿皆有力於是倉而劉侯之子將仕郎琦嘗佐其父於此其族子右修職郎玶亦廉平有謀請得與并力府以豫言悉具書禮請焉四人者遂皆就事方且相與講求倉之利病具為條約會丞相清源公出鎮兹土入境問俗豫與諸君因得具以所為條約者迎白于公公以為便則為出教俾歸揭之楣間以視來者於是倉之庶事細大有程可久而不壞矣豫惟成周之制縣都皆有委積以待凶荒而隋唐所謂社倉者亦近古之良法也今皆廢矣獨常平義倉尚有古法之遺意然皆藏於州縣所恩不過市井惰遊輩至於深山長谷力穡逺輸之民則雖飢餓瀕死而不能及也又其為法太密使吏之避事畏法者視民之殍而不肯發往往全其封鐍遞相付授至或纍數十年不一訾省一旦甚不獲巳然後發之則巳化為浮埃聚壤而不可食矣夫以國家愛民之深其慮豈不及此然而未之有改者豈不以里社不能皆有可任之人欲一聽其所為則懼其計私以害公欲謹其出入同於官府則鈎校靡密上下相遁其害又必有甚於前所云者是以難之而有弗暇耳今幸數公相繼其愛民慮逺之心皆出乎法令之外又皆不鄙吾人以為不足任故吾人得以及是數年之間左提右挈上説下教遂能為鄊閭立此無窮之計是豈吾力之獨能哉惟後之君子視其所遭之不易者如此無計私害公以取疑於上而上之人亦毋以小文拘之如數公之心焉則是倉之利夫豈止於一時其視而效之者亦將不止於一鄊而巳也因書其本末如此刻之石以告後之君子云淳熙甲午夏五月丙戌新安朱熹記晦庵先生朱文公文集卷第七十七懷安縣儒學訓導葉暢校
