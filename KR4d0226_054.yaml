body:
  text: 書問答一本作知舊門人問答答孫季和應時所喻平生大病最在輕弱人患不自知耳既自知得如此便合痛下功夫勇猛舍棄不要思前算後庶能矯革所謂藥不瞑昡厥疾不瘳者也明善誠身正當表裏相助不可彼此相推若行之不力而歸咎於知之不明知之不明而歸咎於行之不力即因循擔閣無有進步之期矣它論數條亦所當講别𥿄奉報幸併詳之櫽括程書豈所敢當當時諸先逹蓋嘗有欲為之而未果者然自今觀之却似未為不幸况後學淺陋又安敢議此乎子約漢唐之論在渠非有私心然亦未免程子所謂乃邪心者却是教壞後生此甚不便近年以來彼中學者未曽理會讀書修巳便先懷取一副當功利之心未曽出門踏著正路便先做取落草由徑之計相引去無人處私語密傳以為竒特直是不成模樣故不得不痛排斥之不知子約還知外靣氣象如此否耳中庸章句太極解義方是略説大槩若論裏靣道理精微曲折知它是更有何窮何盡未須便慮説得太詳且當以玩味未熟分畫未明為憂蓋自頃年妄作此書至今未見有人真實下功理會到究竟處也大事記數條其間誠有可疑者如韓信事向來伯恭靣論蓋嘗曰其不反不知後來看得如何須是别看出情節來不然不應如此失入也此可更問子約看如何然渠此書却實自成一家之言亦不為無益於世鄙意所疑却恐其間注腳有太纎巧處如論張湯公孫弘之姦步步掇拾氣象不好却似與渠輩以私智角勝負非聖賢垂世立教之法也諸詩語意清逺讀之令人想見湖山之勝但亦不無前幅所論兩字之病謂輕弱耳子陵仲弓二絶則甚佳嘗觀荀淑能譏刺梁氏而爽巳不敢忤董卓至彧遂為唐衡之壻曹操之臣人家父祖壁立千仞子孫猶自倒東來西况太丘制行如此其末流之弊為賊佐命亦何足怪哉太極之説與繫辭詳略不同乃是互相發明以盡精微之藴最為有功若只依本分模榻則亦何用增此贅語而學者又何由知得其中有許多曲折耶大抵近日議論喜合惡離樂含胡而畏剖析所以凡事都不曽理會到底此一世之通患也明道答橫渠書誠似太快然其間理致血脈精密貫通儘須玩索如大公順應自私用智忘怒觀理便與主敬窮理互相涉入不可草草看過如上文既云以其情順萬事即其下云而無情亦自不妨明道伊川論性踈密固不同然其氣象亦各有極至處明道直是渾然天成伊川直是精細平實正似文王治岐周公制禮之不同又似馬援論漢二祖也封建之論甚佳范公之説大抵切於時務近而易行但於制度規模久逺意思大假欠闕如論租庸兩稅等處亦甚踈略也封建一事向見胡丈明仲所論大抵與來喻相似不知曽見之否要之此論須以聖人不以天下為一家之私作主意而兼論六國形勢以見其利害未嘗不隨義理之是非則可耳以上諸説有未安處却幸反復答孫季和縣事想日有倫理學校固不免為舉子文然亦須告以聖學門庭令士子略知修巳治人之實庶幾於中或有興起作將來種子浙間學問一向外馳百怪俱出不知亦頗覺其弊否寧海僧極令人念之亦可屬之端叔兄弟否若救得此人出彼陷穽足使聞者悚動所係實不輕也所疑三條皆恐未然試深味之當自見得古今書文雜見先秦古記各有證驗豈容廢絀不能無可疑處只當玩其所可知而闕其所不可知耳小序決非孔門之舊安國序亦決非西漢文章向來語人人多不解惟陳同父聞之不疑要是渠識得文字體製意度耳讀書玩理外考證又是一種工夫所得無幾而費力不少向來偶自好之固是一病然亦不可謂無助也孔氏書序與孔叢子文中子大略相似所書孔臧不為宰相而禮賜如三公等事皆無其實而通鑑亦誤信之則考之不精甚矣答石應之所示文字深切詳審説盡事情想當時靣陳又不止此而未足以少回天意此亦時運所繫非人力所能與也更願益加涵飬講學之功而安以俟之事會之來豈有終極安知其不愈鈍而後利耶熹衰朽殊甚春間一病狼狽公謹見之繼此將理一兩月方稍能自支然竟不能復舊幸且復得祠祿休養而幼纍疾病相仍殊無好况心昏目倦不能觀書然日用功夫不敢不勉間亦紬繹舊聞之一二雖無新得然亦愈覺聖賢之不我欺而近時所謂喙喙爭鳴者之亂道而誤人也無由靣論臨風耿耿公謹想巳到彼矣渠趣向意味朋友間少得但意緒頗多支離更與鐫切令稍直截當益長進耳答石應之聞新阡尚未得卜想今巳有定鄉見説大門上世宅兆之勝今日求之未易可得蓋地有盡而求者無巳若欲立定等則必求如此之地而後用之則恐無時而巳耳熹衰病日益沈痼數日來又加寒熱之證愈覺不可支吾相見無期亦勢應爾不足深念猶恨黨錮之禍四海橫流而賢者從容其間獨未有以自明者此則拙者他日視而不瞑之深憂也富貴易得名節難保此雖淺近之言然亦豈可忽哉便中寓此以代面訣答諸葛誠之示喻競辨之端三復惘然愚意比來深欲勸同志者兼取兩家之長不可輕相詆訾就有未合亦且置勿論而姑勉力於吾之所急不謂乃以曹表之故反有所激如來喻之云也不敏之故深以自咎然吾人所學喫緊著力處正在天理人欲二者相去之間耳如今所論則彼之因激而起者於二者之間果何處也子靜平日所以自任正欲身率學者一於天理而不以一毫人欲雜於其間恐決不至如賢者之所疑也義理天下之公而人之所見有未能盡同者正當虛心平氣相與熟講而徐究之以歸於是乃是吾黨之責而向來講論之際見諸賢往往皆有立我自是之意厲色忿詞如對仇敵無復長少之節禮遜之容蓋嘗竊笑以為正使真是仇敵亦何至此但觀諸賢之氣方盛未可遽以片辭取信因默不言至今常不滿也今因來喻輒復陳之不審明者以為如何耳答諸葛誠之所喻子靜不至深諱者不知所諱何事又云銷融其隙者不知隙從何生愚意講論義理只是大家商量尋箇是處𥘉無彼此之間不容更似世俗遮掩回護愛惜人情才有異同便成嫌隙也如何如何所云粗心害道自知明審深所歎服然不知此心何故粗了恐不可不究其所自來也答項平父安世示喻此心元是聖賢只要於未發時常常識得巳發時常常記得此固持守之要但聖人指示為學之方周遍詳密不靠一邊故曰敬義立而德不孤若如今説則只恃一箇敬字更不做集義工夫其德亦孤立而易窮矣須是精粗本末隨處照管不令工夫少有空闕不到之處乃為善學也此心固是聖賢本領然學未講理未明亦有錯認人欲作天理處不可不察識得記得不知所識所記指何物而言若指此心則識者記者復是何物心有二主自相攫拏聖賢之教恐無此法也持守之要大抵只是要得此心常自整頓惺惺了了即未發時不昏昧巳發時不放縱耳愚見如此不知子靜相報如何因風録示或可以警所不逮也伊川先生云涵養須用敬進學則在致知此兩句與從上聖賢相傳指訣如合符契但講學更須寬平其心深沉詳細以究義理要歸處乃為有輔若只草草領略就名數訓詁上著到則不成次第耳答項平父所喻曲折及陸國正語三復爽然所警於昏惰者為厚矣大抵子思以來教人之法惟以尊德性道問學兩事為用力之要今子靜所説專是尊德性事而熹平日所論却是問學上多了所以為彼學者多持守可觀而看得義理全不子細又别説一種杜撰道理遮蓋不肯放下而熹自覺雖於義理上不敢亂説却於緊要為巳為人上多不得力今當反身用力去短集長庶幾不墮一邉耳答項平父官期遽滿當復西歸自此益相遠令人作惡也罵坐之説何乃至是吾人為學别無巧妙不過平心克巳為要耳天民聞又領鄉邑賑貸之役不以丗俗好惡少改其度深可敬服朋友論議不同不能下氣虛心以求實是此深可憂誠之書來言之甚詳巳略報之可取一觀此不復云也聞宗卿子靜蹤迹令人太息然世道廢興亦是運數吾人正當勉其在巳者以俟之耳不必深憤歎徒傷和氣損學力無益於事也答項平父所諭讀書次第甚善但近世學者務反求者便以博觀為外馳務博觀者又以內省為隘狹左右佩劔各主一偏而道術分裂不可復合此學者之大病也若謂堯舜以來所謂兢兢業業便只是讀書程課竊恐有一向外馳之病也如此用力略無虛間意思省察工夫血氣何由可平忿欲何由可弭耶無由靣論徒增耿耿耳答項平父録寄啓書尤以愧荷稱許之過皆不敢當但覺難用兩字著題耳至論為學次第則更儘有啇量大抵人之一心萬理具備若能存得便是聖賢更有何事然聖賢教人所以有許多門路節次而未嘗教人只守此心者蓋為此心此理雖本完具却為氣質之稟不能無偏若不講明體察極精極密往往隨其所偏墮于物欲之私而不自知近丗為此説者觀其言語動作略無毫髮近似聖賢氣象正坐此耳是以聖賢教人雖以恭敬持守為先而于其中又必使之即事即物考古驗今體會推尋內外參合蓋必如此然後見得此心之真此理之正而于丗間萬事一切言語無不洞然了其白黑大學所謂知至意誠孟子所謂知言養氣正謂此也若如來喻乃是合下只守此心全不窮理故此心雖似明白然却不能應事此固巳失之矣後來知此是病雖欲窮理然又不曽將聖賢細密言語向自巳分上精思熟察而便務為涉獵書史通曉丗故之學故於理之精微既不能及又并與向來所守而失之所以倀倀無所依據雖於尋常淺近之説亦不能辨而坐為所惑也夫謂不必先分儒釋者此非實見彼此皆有所當取而不可偏廢也乃是不曽實做自家本分功夫故亦不能知異端詖淫邪遁之害茫然兩無所見而為是依違籠罩之説以自欺而欺人耳若使自家日前曽做得窮理功夫此豈難曉之病耶然今所謂心無不體之物物無不至之心又似只是移出向來所守之心便就日間所接事物上比較耳其於古今聖賢指示剖析細密精微之藴又未嘗入思議也其所是非取舍亦據巳見為定耳又何以察夫氣稟之偏物欲之蔽而得其本心正理之全耶便謂存誠愈固養氣愈充吾恐其察之未審而自許過髙異日忽逢一夫之説又將為所遷惑而不能自安也中間得葉正則書亦方似此依違籠罩而自處甚髙不自知其淺陋殊可憐憫以書告之久不得報恐未必能堪此苦口也大學章句一本謾往其言雖淺然路脈不差節序明審便可行用幸試詳之答項平父所論義襲猶未離乎舊見大抵既為聖賢之學須讀聖賢之書既讀聖賢之書須看得他所説本文上下意義字字融釋無窒礙處方是會得聖賢立言指趣識得如今為學功夫固非可以懸空白撰而得之也如孟子答公孫丑問氣一節專以浩然之氣為主其曰是集義所生者言此氣是積纍行義之功而自生於內也其曰非義襲而取之也言此氣非是所行之義潛往掩襲而取之於外也其曰行有不慊於心則餒矣者言心有不慊即是不合於義而此氣不生也是豈可得而掩取哉告子乃不知此而以義為外則其不動心也直疆制之而頑然不動耳非有此氣而自然不動也故又曰我故曰告子未嘗知義以其外之也然告子之病蓋不知心之慊處即是義之所安其不慊處即是不合於義故直以義為外而不求今人因孟子之言却有見得此意而識義之在內者然又不知心之慊與不慊亦有必待講學省察而後能察其精微者故於學聚問辨之所得皆指為外而以為非義之所在遂一切棄置而不為此與告子之言雖若小異然其實則百步五十步之間耳以此相笑是同浴而譏祼裎也由其所見之偏如此故於義理之精微氣質之偏蔽皆所不察而其發之暴悍狂率無所不至其所慨然自任以為義之所在者或未必不出於人欲之私也來喻敬義二字功夫不同固是如此然敬即學之本而窮理乃其事亦不可全作兩截看也洪範皇極一章乃九疇之本不知曽子細看否先儒訓皇極為大中近聞又有説保極為存心者其説如何幸推詳之復以見告逐句詳説如注疏然方見所論之得失大抵為學但能于此等節目處看得十數條通透縝密即見讀書凡例而聖賢傳付不言之妙皆可以漸得之言語之中矣答項平父所喻巳悉以平父之明敏于此自不應有疑所以未免紛紜却是明敏太過不能深潛密察反復玩味只略見一線路可通便謂理只如此所以為人所惑虛度光隂也孟子之意須從上文看其為氣也配義與道無是餒也是集義所生者非義襲而取之也此上三句本是説氣下兩句是字與非字為對襲字與生字為對其意蓋曰此氣乃集義而自生於中非行義而襲取之於外云爾非謂義不是外襲也今人讀書不子細將聖賢言語都錯看了又復將此草本立一切法橫説竪説誑罅衆生恐其罪不止如范寧之議王弼而巳也答項平父熹一病四五十日危死者數矣今幸粗有生意然不能飲食其勢亦難扶理杜門屏息聽天所命餘無可言者所幸一生辛苦讀書微細揣摩零碎括剔及此暮年略見從上聖賢所以垂世立教之意枝枝相對葉葉相當無一字無下落處若學者能虛心遜志遊泳其間自不患不見入德門户但相見無期不得靣講使平父尚不能無疑於當世諸儒之論此為悢悢耳答陳抑之謙熹從七友間得足下之名而願交焉為日久矣衰病屏伏無從際會每以為恨而聽於往來之言亦知足下之不鄙我而將有以辱况之也年歲以來私家多故不獲以聲問先自通於隸人兹承枉書感愧亡量顧陳義高遠雖古之賢人君子懼不足以堪足下之意而熹之愚何敢當之以自取戾耶然曩亦嘗有聞於先生長者矣勤勞半世泪沒於章句訓詁之間黽勉於規矩繩約之內卒無髙竒深眇之見可以驚世而駭俗者獨幸年來於聖賢遺訓粗若見其坦易明白之不妄而必可行者私竊以為儻得當世明逹秀頴之士相與講之抑彼之過疆此之不及吾道庶其明且行乎三復來書果若有意於此幸甚幸甚竄伏窮山未知見日繼此書疏之往來猶足以見區區也餘惟藏器勉學慰此遐想答俞壽翁太極之書度所見不同論未易合故久不報又思理之所在終不可以不辨近方以書復之其説甚詳未知彼復以為如何也極不訓中此義甚的然自先儒失之久矣未必今人之失也德功渾象之説誠如所喻此公好學而病多蓋不專在言語文字之間也來喻有志未免有見未徹此見賢者自知之明見子靜曽扣之否愚意則以為且當損去浮華還就自已分上切近著實處用功庶幾自有欲罷不能積纍貫通之效若未得下手處恐未免於臆度虛談之弊也答應仁仲大學中庸屢改終未能到得無可改處大學近方稍似少病道理最是講論時説得透才涉𥿄墨便覺不能及其一二縱説得出亦無精彩以此見聖賢心事今只於𥿄上看如何見得到底每一念此未嘗不撫卷慨然也答應仁仲自幾道來聞欲相訪日佇來音比歸不至深以惘然後得呂子約書乃知巳嘗經婺女竟爾相失尤以為恨歸來乃領何來三月所惠書雖巳逺猶足慰意也比日秋冷逺惟德履佳勝熹一出狼狽不可言幾道必巳詳言之矣歸來巳決杜門之計讀書益有味但祠請專人愆期未返未知此事定復何如度亦不出三五日當見果決也甚久欲一見賢者今既不遂因書有以見告者切幸不外啓蒙小學二書偶未有本後便續寄去中庸等書未敢刻聞有盜印者方此追究未定甚以為撓也因便布此未能盡所欲言正逺珍重答應仁仲熹衰病之餘災患復不可堪趙氏聘幣無置之之所故遣歸之今既不受未有以處欲如來喻納之于壙則今巳葬且此間之葬例薄然亦時有意外之患欲置少田以給墓戶則亦不必如此之多欲以施諸鄉人之為橋道者則似於義亦無所當反復思之唯有别以它女再結姻好之為善而家間諸女及孫雖多而年歲無相當者其最長者才十有二耳似此再三籌度皆未有計不知賢者何以教之使于義稍安而無所疑也聞幾道太夫人至為悲慟變食此意尤不敢忘耳熹出處之計未知所定亦復類此浙中士友亦頗有知其曲折者要是杜門藏拙為上計耳答應仁仲久不聞問小兒歸彼告乃知向來體中嘗不佳證亦不輕又喜只今巳漸平復竊計比日起居益快健氣體愈清實也但纍年命駕之約未知能復踐言否熹亦益衰精神筋力皆巳非復昔時勢亦不能逺適何由一承晤語以遂心期念之令人悢悢不能為懷也禮書方了得聘禮巳前巳送致道令與四明一二朋友抄節疏義附入計必轉呈有未安者幸早見教尚及改也覲禮以後黃壻携去廬陵與江右一二朋友成之尚未送來計亦就草藁矣前賢常患儀禮難讀以今觀之只是經不分章記不隨經而注疏各為一書故使讀者不能遽曉今定此本盡去此諸弊恨不得令韓文公見之也易本義不謂遂逹几下舊讀此書每於先儒之説有所不快因以妄意管窺一二亦不自意推尋至此尚恨古書放失聞見單淺今又衰惰不能卒業不知明者何以教之更望詳賜誨諭毋使有待于後世之子雲也正逺切祈以道自重益綏壽祉千萬至望答應仁仲久不聞問辱書為慰信後清和恭惟求志從容尊履多福如聞亦苦目疾莫不至甚妨事否熹則左目全盲右亦漸不見物矣來日幾何學不加益而罪戾日聞未知明者何以警䇿之也惠許來訪固所幸願顧見屬之意有所不敢承耳何時披晤訟此堙鬱更祈珍衛副此真禱答應仁仲熹勸講亡狀竟煩罷斥社門念咎畢此餘生為幸甚矣比來衰悴愈覺支離加以耳重目肓殊費醫治良以為撓然亦老態之常不足怪也因便草草向見朋友編春秋例鄙意亦欲如此正如來喻所云也熹目盲不能親書所喻編禮如此固佳然却太移動本文恐亦未便耳老病益侵而友朋相望皆在千百里外恐此事不能成為終身之恨矣向在長沙臨安皆嘗有意欲藉官司之力為之亦未及開口而罷天於此學如此其厄之何邪可歎可歎答周叔謹葉公謹改姓字應之甚恨未得相見其為學規模次第如何近來呂陸門人互相排斥此由各徇所見之偏而不能公天下之心以觀天下之理甚覺不滿人意應之蓋嘗學于兩家不知其于此看得果如何因話扣之因書喻及為幸也熹近日亦覺向來説話有太支離處反身以求正坐自巳用功亦未切耳因此減去文字功夫覺得間中氣象甚適每勸學者亦且看孟子道性善求放心兩章著實體察收拾為要其餘文字且大槩諷誦涵養未須大假著力考索也答周叔謹叔謹想且留彼應之相聚所講何事文字且虛心平看自有意味勿苦尋支蔓旁生孔穴以汨亂義理之正脈中庸謹思之戒蓋為此也子約書來説得大假支離要是義理太多信口信筆縱橫去得説得轉闊病痛轉深也如所論功體二字太露之類亦是此樣所云須如顔子方無一毫之非禮此説却是但未知其意向在甚處若云人須以顔子自期不可便謂巳至則可若謂顔子方能至此常人不可學他即大不可想渠必不至此誤但亦只是每事須著一句纒繞令不直截耳公謹來書依舊説得太多更冝省約為佳也柷汀州巳成見次不知赴官能入山否朝廷方遣使命行經界議鹽法此亦振民革弊之秋但恐不免少勞心力耳彥章書來云欲見訪却不見到不知何故所論二人外內之偏信然此等處只是容易窄狹自主張太早了便生出無限病痛耳彼既相信不及勢亦無如之何莫若且就巳分上著力之為急也答周叔謹喪禮前書巳報大槩適再考儀禮經五服皆有之一在首一在要大小有差斬衰條下傳中巳言之故不復言耳要絰之下又有帶斬衰絞帶齊衰布帶是也蓋絰帶以象吉服之大帶此帶則象吉服之革帶屈其一端立貫之還以插于要間非齊衰則止用布帶而無要絰也右本在上者齊衰絰之制以麻根處著頭右邉而從額前向左圍向頭後却就右邉元麻根處相接即以麻尾藏在麻根之下麻根搭在麻尾之上綴殺之有纓者以其加於冠外故須著纓方不脫落也辟領儀禮注云辟領廣四寸則與濶中八寸也兩之為尺六寸與來書所言不同不知何故詳此辟領是有辟積之義雖廣四寸須用布濶四寸長八寸者摺其兩頭令就中相接即方四寸而綴定上邉於領之旁以所摺向裏平面向外如今裙之有摺即所謂辟積也溫公所謂裳每幅作三㡇者是也如此即是一旁用八寸兩旁共尺六寸矣管屨疏屨今不可考今略以輕重推之斬衰用今草鞋齊衰用麻鞋可也麻鞋卒伍所著者答周叔謹示喻靜中私意橫生此學者之通患能自省察至此甚不易得此當以敬為主而深察私意之萌多為何事就其重處痛加懲窒久之純熟自當見效不可計功於旦暮而多為説以害之也論語别本未曽改定俟便寄去然且專意就日用處做涵養省察工夫未必不勝讀書也答周叔謹所示仁説差勝往時但所引熹説亦有誤字處恐又錯認了更略契勘為佳然書中所説收拾放心乃是緊切下功夫處講學乃其中之一事今但専一于此下功不須思前算後計較得失講學亦且看直截明白處不要支蔓來書所謂雖若小異然亦不甚相逺者全是子約舊時句法也答王季和鉛别幅之喻具悉至意嘗謂道之在人𥘉非外鑠而聖賢埀訓又皆懇切明白但能虛心熟讀深味其旨而反之于身必有以信其在我而不容自巳則下學上逹自當有所至矣但讀書不可貪多今當且以大學為先逐假熟讀精思須令了了分明方可改讀後假如此庶易見功久久浹洽通貫則無書不可讀矣答王季和來示備悉學者之志固不可不以逺大自期然觀孔門之教則其所從言之者至為卑近不過孝弟忠信持守誦習之間而于所謂學問之全體𥘉不察察言之也若其高弟弟子多亦僅得其一體夫以夫子之聖諸子之賢其于道之全體豈不能一言盡之以相授納而顧為是拘拘者以狹道之傳畫人之志何哉蓋所謂道之全體雖高且大而其實未嘗不貫乎日用細微切近之間苟恱其高而忽于近慕于大而略於細則無漸次經由之實而徒有懸想跂望之勞亦終不能以自逹矣故聖人之教循循有序不過使人反而求之至近至小之中博之以文以開其講學之端約之以禮以嚴其踐履之實使之得寸則守其寸得尺則守其尺如是久之日滋月益然後道之全體乃有所鄉望而漸可識有所循習而漸可能自是而往俯焉孳孳斃而後巳而其所造之淺深所就之廣狹亦非可以必詣而預期也故夫子嘗謂先難後獲為仁又以先事後得為崇德蓋于此小差則心失其正雖有鑽堅仰高之志而反為謀利計功之私矣仁何自而得德何自而崇哉聊誦所聞以答下問之意至於菴記大字之需則非學之急亦老懶之所不睱也舒大夫向嘗相見于會稽所論未合今想其學益有成矣聞其政亦甚佳有本者固如是也不及為書因見幸略道意答傅子淵夢泉荆州云亡忽忽歲晚比又得青田教授陸兄之計吾道不幸乃至于此每一念之痛恨無窮想平生師資之義尤不能為懷也所示江陵問答讀之敬夫之聲容恍若相接悲愴之餘警䇿多矣但其間尚有鄙意所未安者更容熟復續奉報歸納也大抵賢者勇于進道而果于自信未嘗虛心以觀聖賢師友之言而一取決于胸臆氣象言語只似禪家張皇鬪怒殊無寬平正大沉浸醲郁之意荆州所謂有拈捶竪拂意思者可謂一言盡之然左右初不領略而渠亦無後語此愚所深恨也德起得資友益書來甚激昂巳報之云更須講學封殖不可專恃此矣答傅子淵示喻戰栗之義反復思之終未能曉豈以宰我如此注解便涉支離不能簡易故耶熹看此章只是宰我錯解了故聖人深責之不謂其才下注解便成支離如來喻之云也細詳來喻是意外生説附會穿鑿有不勝其支離者舉此一端恐區區所見與賢者不同不但此一事也示及得朋進學之盛深慰鄙懷然二包定夫書來皆躐等好高之論殊不可曉顯道本領只是舊聞正苦其未能猛舍不謂巳見絶於旦評也答傅子淵示喻所以取舍於前日之論者甚悉率爾之言固不能保其無病然道體規模功夫節目只是一理是則俱是非則俱非不容作兩種啇量去彼取此也睱日平心定氣試一思之或有以變化氣質而救一偏之弊則于成巳成物之際未必無小輔耳答傅子淵示喻所得日益高妙非復愚昧所能窺測但願更於小心密察處稍加意焉則所謂主敬窮理者殆亦緝熙光明之所不可巳者而𥘉亦不在渙然心喻者之外也包黃諸君各精進捐去舊習甚善但恐似此一向掠虛則又只是改換名目也超宗逺來殊未有以副其意者却似于巳分著實處未知用力又與諸兄大相反也巳喻其就彼啇量雖稍過于簡約亦無害耳答陳正巳剛往歲得吕東萊書盛稱賢者之為人以為十數年來朋友中未始有也以此心願一見而無從得中間聞欲來訪甚以為喜不久乃聞遽遭閔凶深為傷怛顧以未嘗通問不欲遽修慰禮今者辱書荷意良厚且審秋辰殘暑孝履支福又以為慰示喻為學大致及别𥿄數條皆已深悉但區區於此有不能無疑者蓋上為靈明之空見所持而不得從事於博學篤志切問近思之實下為俊傑之豪氣所動而不暇用力于格物致知誠意正心之本是以所論嘗有厭平實而趍高妙輕道義而喜功名之心其浮陽動俠之意往往發於詞氣之間絶不類聖門學者氣象不知向來伯恭亦嘗以是相規否也熹自年十四五時即嘗有志於此中間非不用力而所見終未端的其言雖或誤中要是想像臆度所幸內無空寂之誘外無功利之貪全此純愚以至今日反復舊聞而有得焉乃知明道先生所謂天理二字却是自家帖體出來者真不妄也沖漠無朕一假恐未可輕議若當此時萬象未具即是上靣一截無形無兆後來𬒳人引入塗轍矣賢者正作此見何乃遽謂古今無人作此語耶敬以直內近思録注中别有一語先生指意甚明蓋雖不以為無然未嘗以為即與吾之所謂敬以直內者無毫髮之差也許渤為人不可知其詳語録中又有一處説其人晨起問人寒暖加減衣服加減一定終日不易即是天資篤厚之人容有不聞隔窗事者非必有寄寂之意而欲其不聞也况此條之下一本注云曷嘗有如此聖人則是先生蓋亦未之許也但歎美其純德與世間一種便儇皎厲之人氣象懸隔亦可尚耳此等皆未可輕易立説訕薄前賢也注疏之學却不須如此主張蘇子由議論自是一偏之説亦何足為凖的也哉董仲舒所立甚高恐未易以世儒詆之今日病痛正為不曽透得道義功利一重關耳若處置胸奴一節便使從來才智之士如婁敬賈誼亦未免此來諭於此豫奪之間不能無高下其手者豈立意之偏而不自覺歟近來浙中怪論蜂起令人憂歎不知伯恭若不死見此以為如何也答陳正已示喻縷縷皆聖賢大業熹何足以知之然亦未得一觀即為朋友傳玩遂失所在今不復能盡記但覺所論不免將內外本末作兩假事而其輕重緩急又有顚倒斘逆之病究觀底裏恐只是後世一種智力功名之心雖強以聖賢經世之説文之而規模氣象與其所謂存神過化上下同流者大不侔矣若戊子年間所見果與聖賢不異即其所發不應如此以故鄙意於此尤有不能無疑者未得面論徒增耿耿耳答朱子繹知讀大學甚善大抵其説雖多多是為學之題目次第緊要是格物兩字却未曽説著下手處故學者之讀此而不得其要者類如數遺棄之齒而求有獲亦沒世窮年而無得矣須著精神領略箇大體規模便尋箇的當下手處著實用功始是會讀大學也答路德章所與子約書甚善但謂東萊遺言有涉於經濟維持者别為一事而異於平日道學之意則恐亦未免有纍於東萊也龜山嘗譏王氏之學離內外判心迹使道常無用於天下而經世之務皆私智之鑿正謂此耳又謂儻遇漢祖唐宗亦須有爭不得且放過處亦是舊時意思尚在方寸之地只有一毫此等見識便是枉尺直尋底根株直須見得正當道理分明不容些兒走作即自然無復此等意思雖欲宛轉回護亦有所不可得矣古之聖賢以枉尺直尋為大病今日議論乃以枉尺直尋為根本若果如此即孟子果然迂闊而公孫衍張儀真可謂大丈夫矣德章巳見大意自不必如此説因筆及之亦恐餘證未解聊復云云耳儀禮編巳收此間朋友未有能辦此者春秋想亦不輟用工此文字未為切巳然亦可惜中廢但稍減課程令日力有餘不至忙迫即玩索􅉼養之功不至欠闕矣答路德章所喻水到渠成之説意思畢竟在渠上未放水東流時巳先作屈曲準備了矣毫釐之差千里之繆孟子程子所以為有功於天理有力於聖門有德於後學者正在此處不知何故前日直如此看倒了今日雖欲回頭而尚為舊習所牽不得自由也答路德章奉一日告獲聞安勝為慰但聞忍窮益堅未有卒歲之計則未能不相為動心也然詳來喻似所以處者亦未有盡善蓋若謂羞於出入則不應去冬未覺而今夏方覺謂厭請託則此等以義裁之一切不與人自不能相干謂所入不足自資則又將去此而有求其得失既未可期而豐約亦未可料此恐皆非所以決為去就之實或者但以平日意氣不能俯仰而忽然有所激觸遂憤然為此而不暇顧計耳大抵德章平日為學於文字議論上用功多於性情義理上用功少所以常有憤鬱不平之意見於詞氣容貌之間而所向者無非﨑嶇逼反不可容身之地此在世俗苟且流徇之中觀之固亦足為高然在吾輩學問義理上看則豈非膏肓深錮之疾而不可以不早治者耶即今且置此勿論而以所喻讀論孟者言之則所謂不愛把來作口頭説話故不敢作問而墮於寡陋者豈亦不為憤鬱不平之氣所發耶夫學者讀書有疑而不能自決故不得巳而不能不問今人無疑而飾問以資談聽者固不足道然遂懲此而不問則未知其果巳洞然而無疑耶抑有疑而耻自同於飾問遂飲默以自愚將未至乎有疑而不能問遂發其憤悶肆其忌克而託於不問以自欺也若巳洞然而無疑則善矣然非上智之資不能及若不幸而倣佛於後兩者之所謂則吾恐其深有妨於進學而大有害於養心也昨見編集春秋蓋嘗奉勸此等得暇為之不可以此而妨吾涵養之務正為此爾但當時又見所編功緒巳成精密可愛他人決做不得遂亦心利其成不欲一向説殺以今觀之則所謂為人謀而不忠者無大於此乃始惕然自悔自咎蓋不獨為賢者惜之也讀書為學本以治心今乃不唯不能治之而乃使向外奔馳不得休息以至於反為之害是豈不為迷惑之甚乎德章氣節偉然非流輩所可及私心常所愛敬而區區之懷猶有未得盡者每竊以為愧且恨也因風布問輒盡言之想所樂聞不至以為罪也答路德章示喻縷縷備悉然其大槩皆自恕之詞以此存心亦無惑乎德之不進而業之不修也吾人為貧只有祿仕一途可以苟活無害於義彼中距臨安不逺豈不能一為參選計而長此羈旅乎此則未論義理而只以利害計之亦未得為是也大抵是日前為學只是讀史傳説世變其治經亦不過是記誦編節向外意多而未嘗反躬內省以究義理之歸故其身心放縱念慮粗淺於自巳分上無毫髮得力處此亦從前師友與有責焉而自家受病比之它人尤更重害此又姿稟不美而無以洗滌變化之罪也今日正當痛自循省向裏消磨庶幾晚節救得一半而一向如此苟簡自恕若不怨天即是尤人殊非平日所望於德章者也來諭每謂熹有相棄之意此亦尤人之論區區所以苦口相告正為不忍相棄耳若巳相棄便可相忘於江湖何至如此忉怛愈增賢者忿懟不平之氣耶只今可且捺下身心除了許多間説話多方擘畫去參了部授一本等合入差遣歸來討一歇泊處將論語孟子正文端坐熟讀口誦心惟雖巳曉得文義亦須逐字忖過洗滌了心肝五臟裏許多忿憾怨毒之氣管取後日須有進步處不但為今日之路德章而巳也向見伯恭説少時性氣粗暴嫌飲食不如意便敢打破家事後因久病只將一册論語早晚間看忽然覺得意思一時平了遂終身無暴怒此可為變化氣質之法不知平時曽與朋友説及此事否德章從學之久不應不聞如何全不學得些子是可謂不善學矣答路德章闕期不逺便可得祿襄陽古郡多前賢遺迹宦遊得此亦正自不惡也示喻為學功夫果充此言何患不進但讀書亦須隨章逐句子細研窮方見意味若只用粗心但求快意恐終無以滌蕩塵埃剗除麟甲也直卿在此問以來書所云渠殊不省然聞過則喜吾人正當勉力不須便懷不平之意必求伸巳而屈人也踏雪之逰果能踐約幸甚答康炳道所論學者之失由其但以致知為事遂至陷溺此於今日之弊誠若近之然恐所謂致知者正是要就事物上見得本來道理即與今日討論制度較計權術者意思功夫逈然不同若致得吾心本然之知豈復有所陷溺耶正坐論事而不求理遂至生此病痛耳熹於此非敢有所與奪但見邪説橫流恐為吾道之害故不得不極言之信之與否則在乎人焉若既排闢之又假借之則恐其弊將有至於飬虎而遺患者矣然區區於此亦固未嘗有所絶於人而不與其進也彼若幡然覺悟去邪歸正又豈熹之所能拒哉東萊文字須子細整頓成編乃可啇量但此事亦不冝甚緩蓋人生不堅固若過却眼前諸人即此事無分付處矣答郭希吕津示喻銘敘此非有所愛但老病心力衰耗不能盡給四方之求不得不自為性命計耳鄙性拙直向使可為即巳為之何至今日更煩再喻然後作耶况今又經一畨悲惱尤覺昏憊決不能辦此且銘重於敘既巳作銘若有餘力何惜於敘而費許多詞説分踈耶誠之若是合下不肯承當即不應為希吕移書以其所不欲者施於人若以其重而不敢為則熹巳任其重者矣渠在今日必不容復有詞也恐此未必誠之之意只是希吕不相亮必欲熹自為之而故為此説耳人之相知貴相知心而古之君子不盡人之歡不竭人之忠所以全交千萬深察乎此言憐其衰老勿破巳成之例以速其就於死地幸甚幸甚答郭希吕知讀論孟不廢甚善且先將正文熟讀就自巳分上看更考諸先生説有發明處者博觀而審取之凡一言一句有益於巳者皆當玩味未可便恐路徑支離而謂所有不必講也墓銘之額更著宋字亦佳伯謨必巳報去矣大抵石長即以十字為兩行石短則以九字為三行隨事之冝可也答郭希吕示喻所以居家事長之意甚善甚善此事他人無致力處正唯自勉而已但謂學問大端不敢躐等言之則鄙意有所未曉者夫學問豈以他求不過欲明此理而力行之耳但其功夫所施有序而莫不以愛親敬長為先非謂學問自是一事可以置之度外而姑從事於孝友之實也故熹竊碩昆仲相與深察此意而講於所謂學問之大端者以求孝弟之實則閨門之內倫理益正恩義益篤將有不期然而然者矣若以學問為一大事不可幾及而汲汲然徒弊精神於科舉文字之間乃欲别求一術以為家庭雍睦悠久之計竊恐天理不明人欲橫生其末流之弊將有不可勝慮不可勝防者不審賢者以為如何答郭希吕來喻縷縷似未悉前後鄙意者蓋人心有全體運用故學問有全體工夫所謂孝弟乃全體中之一事但比他事為至大而最急耳固不可謂學者止此一事便了而其餘事可一切棄置而不問也故聖賢教人必以窮理為先而力行以終之蓋有以明乎此心之全體則孝弟固在其中而他事不在其外孝弟固不容於不勉而他事之緩急本末亦莫不有自然之序苟不明此則為孝弟者未免出於有意且又未必能盡其理而為衆事之本根也今以六經大學論語中庸孟子諸書考之可見矣希吕自謂多病故不能精思博學而姑用力於其所及則固巳為自棄而猶可諉曰近本若遂以為孝弟之外更無學問則其繆見甚矣且誠多病而不能精思博學矣則又曷為而苦心竭力以從事於科舉之文耶此之不為而彼之久為雖曰不厚於利而薄於義吾不信也希吕其更思之書院規模且隨事隨力為之却就事實上考察整理方見次第不須如此預先安排記文扁榜尤是外事但此等意思即見浮淺外馳之驗若於學問全體上切巳處用得功夫即氣象自當深厚宏濶矣太極西銘通書各注一本試熟讀而思之亦求理之一端也大抵學者不可有放過底事久之不巳雖無緊要功夫亦有得力處也答郭希呂示喻縷縷備悉然所謂收心正心不是要得漠然無思念只是要得常自惺覺思所當思而不悖於義理耳别𥿄所示看得全未子細更冝加功專看大學首尾通貫都無所疑然後可讀語孟語孟又無所疑然後可讀中庸今大學全未曉了而便兼看中庸用心叢雜如此何由見得詳細耶且更耐煩專一細看為佳日月易得大事未明甚可懼也答時子雲來喻滿𥿄深所未喻必是當時於此見得太重所以如此執著放捨不下今想未能遽然割棄但請逐日那三五分功夫將古今聖賢之言剖析義利處反復熟讀時時思省義理何自而來利欲何從而有二者於人孰親孰踈孰輕孰重必不得巳孰取孰舍孰緩孰急𥘉看時似無滋味久之須自見得合剖判處則自然放得下矣捨此不務紛紛多言思前算後展轉纒縛一生出不得未論小小得失政使一旦便登高科躋顯官又須别有思量擘畫終不暇向此途矣試思之如何向編近思録欲入數假説科舉壞人心術處而伯恭不肯今日乃知此箇病根從彼時便巳栽種培飬得在心田裏了令人痛恨也答毛舜卿示喻功夫次第似覺頭緒太多今且以敬義二字隨處加功久久自當得力義利之間只得著力分别不當預以難辨為憂聖門只此便是終身事業亦不須别妄想向上一路也答王伯豐洽參以三數之也伍以五數之也如云什伍其民如云或相什伍非直為三與五而巳也蓋紀數之法以三數之則遇五而齊以五數之則遇三而會故荀子曰窺敵制變欲伍以參注引韓子曰省同異之言以知朋黨之分偶參伍之驗以責陳言之實又曰參之以比物伍之以合參而漢書趙廣漢傳亦云參伍其賈以類相凖皆其義也易所謂參伍以變者蓋言或以三數而變之或以五數而變之前後多寡更相反覆以不齊而要其齊如河圖洛書大衍之數伏羲文王之卦曆家之日月五星章蔀紀元是皆各為一法不相依附而不害其相通者也綜字之義沙隨得之然錯綜自是兩事錯者雜而互之也綜者條而理之也參伍錯綜又各自是一事參伍所以通之其治之也簡而疏錯綜所以極之其治之也繁而密太極兩儀四象八卦者伏羲畫卦之法也説卦天地定位至坤以藏之以前伏羲所畫八卦之位也帝出乎震以下文王即伏羲巳成之卦而推其義類之詞也如卦變圗剛來柔進之類亦是就卦巳成後用意推説以此為自彼卦而來耳非真先有彼卦而後方有此卦也古注説賁卦自泰卦而來先儒非之以為乾坤合而為泰豈有泰復變為賁之理殊不知若論伏羲畫卦則六十四卦一時俱了雖乾坤亦無能生諸卦之理若如文王孔子之説則縱橫曲直反覆相生無所不可要在看得活絡無所拘泥則無不通耳易中先儒舊法皆不可廢但互體五行納甲飛伏之類禾及致思耳卦變獨於彖傳之詞有用然舊圖亦未備頃嘗修定今寫去可就空處填畫卦爻而以彖傳考之則卦所從來皆可見矣然其間亦有一卦從數卦而來者須細考之可以見易中象數無所不通不當如今人之拘滯也右初挂左今於圖中如此添修當巳明白矣答楊深父示喻自患柔懦不立而欲務於寬大含容此正以水濟水之謂也前此所以奉告但欲賢者日用之間不昧此心更於應接事物處各求其理之所在則喜怒哀樂自無偏倚而皆中節矣不審賢者以為如何答楊深父所喻諸疑固嘗靣論若未能判然莫若條陳所疑章解而句辨之當有所決不可只如此泛論也略處如某章某説句如何當取而不取過處未安太甚三説亦然乃見所疑之實禮樂刑政之為教如寒暑生殺之為歲此何所疑若如來意則道外有物而刑政專出於蚩尤申商矣此類更宜寬著心胸子細推驗不可只將尋常小小意見窺測也觀橫渠先生論周禮天官處亦可見矣答汪子卿一别纍年疾病多故不獲以時致問訊第積馳仰正思之來辱手書兩通意厚禮勤有非區區淺陋所敢當者然足以見好學之篤雖老而不忘也信後冬深寒暖不常不審尊候何如伏惟起處萬福熹犬馬之齒雖在賢者之後然今亦是老境平生為學非不究心然未有大得力處三復來誨皆其力之所未能及者而何足以少助於髙明但荷意之勤亦不敢隱其固陋耳竊味來書所引論語數條言仁甚悉而所論反復亦不為不詳獨於仁之一字義理意味與其所以用力之方皆未之及豈其於此固有以默契而忘言也耶不然則仁之所以為仁者𥘉未嘗曉然有見於心而的然有得於巳吾恐所謂不違不害者之茫然如捕風繫影之無所措而所以處夫窮通得喪之際者或未能泰然無所動於其中也長者之明雖不至此然以所謂變通之術者觀之則有以見其未免於彼之重而此之輕也昔子貢無諂無驕之問蓋自以為至而夫子以為未若樂與好禮何哉無諂無驕則尚局於貧冨之中樂且好禮則巳超然乎貧富之外也然其所以至此則必嘗有所用其力矣非規規於兩者之間有所較計抑遏而求出於此也又況於自料其必有所不安而預為變通之計則恐其所立又將出於無諂無驕之下也無疑矣區區鄙意竊顧長者於此姑無恤其他而深探聖賢之言以求仁之所以為仁者反諸身而實用其力焉則於所以不違不害者皆如有物之可指而窮通得失之變脫然其無與於我矣不識髙明以為如何若有未安幸復見教也答趙幾道師淵所論時學之弊甚善但所謂冷淡生活者亦恐反遲而禍大耳孟子所以舍申商而距楊墨者正為此也向來正以吾黨孤弱不欲於中自為矛盾亦厭繳紛競辨若可羞者故一切容忍不能極論近乃深覺其弊全然不曽略見天理倣佛一味只將私意東作西捺做出許多詖淫邪遁之説又且空腹髙心妄自尊大俯視聖賢蔑棄禮法只此一節尤為學者心術之害故不免直截與之説破渠輩家計巳成決不肯舍然此説既明庶幾後來者免墮邪見坑中亦是一事耳答趙幾道昔時讀史者不過記其事實托其詞采以供文字之用而巳近世學者頗知其陋則變其法務以考其形勢之利害事情之得失而尤喜稱史遷之書講説推尊幾以為賢於夫子寧舍論孟之屬而讀其書然嘗聞其説之一二不過只是戰國以下見識其正當處不過知尊孔氏而亦徒見其表恱其外之文而巳其曰折衷於夫子者實未知所折衷也後之為史者又不及此以故讀史之士多是意思粗淺於義理之精微多不能識而墮於世俗尋常之見以為雖古聖賢亦不過審於利害之算而巳唯蘇黃門作古史序篇首便言古之聖人其必為善如火之必熱水之必寒不為不善如騶虞之不殺竊脂之不穀於義理大綱領處見得極分明提得極親切雖其下文未能盡善然只此數句巳非近世諸儒所能及矣惜其從𥘉為學功夫本無次序不曽經歷不能見得本末一一諦當只其資質恬靜無他外慕故於此大頭假處窺測得箇影響到此地位正好著力却便墮落釋老門戶中去不能就聖賢指示處立得修巳治人正當規模以見諸事業傳之學者徒然説得此箇意思而其意之所重終止在文字言語之間其徒雖趣力推尊之然竟不曽有人能為拈出此箇話頭以建立宗旨者亦可恨也其論史遷之失兩句亦切中其膏肓不知近日推尊史記者曽為略分解否耳今日巳作書偶思得此語聊復奉告不審以為如何也答劉仲則示喻學問之道不專在書册而在持身接物之間理固如此然便全舍去書册不復以講學問辨為事則恐所以持身接物之際未必皆能識其本源而中於幾會此子路人民社稷何必讀書之論所以見惡於聖人也試以治民理事之餘力益取聖賢之言而讀之而思之當自覺有進步處然後知此言之不妄也大學章句一通謾奉致思之地大抵讀書唯虛心專意循次漸進為可得之如百牢九鼎非可以一嘬而盡其味也答黃冕仲所論為學功夫甚善但若果是見得日用周旋無非至善則亦不必大假著力把捉却恐迫切而反失之但且悠悠隨其所向便是持守久之純熟自見次第矣讀書且就分明處看覷涵泳不必過為考索久之浹洽自然通透也向説小善不足為重輕非是以小善為不足為但謂要識得大體有用功處不專恃此為本領耳善之所在即當從之固不可以其小而忽之也答沙縣宋宰南強跧伏山間聽於道塗與凡士友之言具知政績之美竊謂今之為吏者救過目前不得一意於撫摩之政久矣乃如執事者出乎其間民不告勞而官無廢事是可尚巳如聞當路頗巳相知更碩益修其在我者其實既大則其聲愈閎將不可掩政不必有意於其間也答楊簡卿迪又不聞問辱書審聞新正以來侍奉吉慶為慰又知巳遂書考又得史君薦則尤以為喜但所諭趙帥書在吾友妙年何遽汲汲如此向使前舉未登科不成如今亦要舉狀關升也平性不敢為此故亦不𣣔以此施之於人不喜人宛轉為人求知故亦不欲作此等書反復思之無以應命但有一言為贈冀賢者抗志髙明有以自技於流俗乃所望耳井伯雖實相愛然似未知所以相愛也答江夢良史示喻學校曲折具悉雅志今時教官能晉意如此者誠不易得然更在勉其學業雖未能深解義理且得多讀經史博通古今亦是一事不可只念時文為目前苟簡之計也答吳宜之南所論為學之功若如所言則是大假勇猛精進非復昔人矣然前後屢聞此言而及至相見則生情態度宛然只是舊人元未有毫髮改變則今日之云鄙意固有所未敢信也且不唯所説之病不曽夫而省巳粗踈發言輕易之病又更增長以此為學所謂郤行而求前也答吳冝之他説紛紜皆是不肯安於義命之意以宜之才氣若稍加靜重潛心向學何所不至今乃一味浮躁自立一種苟簡自恕議論讀之令人腹煩如謂世人習俗薄惡難卒與語而欲委曲開導之竊詳此意恐自未免於薄惡而難與語也今日決意登舟無可言者但碩更思此言痛自收斂猶可救得一半若只如前日意思他時之困當有甚於今日者雖欲悔之不能及也所謂學者舍科舉文字未有可從事者不知此語何為而發若如鄙意則科舉文字之外學者儘有合用力處此賢者所當深念也答吳宜之觀來書所論它人長短得失無不精當但平日所見所以讀書為學之意處巳接物之方則甚有不相似者豈其務外者多而反身或闕耶子貢方人子曰賜也賢乎哉夫我則不暇碩冝之常思此句念念向裏就切巳處做功夫他人之長短得失非吾之所當知也陳公之賢固樂聞之然公私多事何能及此新詩固有佳句然亦非事之急况欲投獻求知於人此􅕽外之尤者不可以不戒史論正亦未須遽作且務窮經觀理深自涵養了取自家身分上事為佳答吳宜之承書知巳為入都計今想巳到矣但熹身在間逺豈能為人宛轉求館求試若能如此則親戚間如黃直卿輩當先為圖得矣兼平生為學只學固窮守道一事朋友所以逺來相問亦正為此今若曲徇宜之之意相為經營則是生師之間去仁義而懷利以相接矣豈相尋問學之本意耶答吳宜之所喻易説誠是太略然此書體靣與他經不同只得如此點掇説過多著言語便説殺了先儒注解非是不好只為皆墮此病故不滿人意中間便欲稍移經下注文入傳中庶得經文意思更寬而未有功夫到得今病衰如此更有無限未了底文字恐為沒身之恨矣答徐斯逺文卿文叔作縣不作著實工夫狼狽至如此如何著力辟置之説臨難苟免尤為非義如何可萌此意况未有可求處耶子耕得近信否所苦如何想巳向安如今後生遲鈍者不濟事其開爽者又多􅕽於文采子耕近來覺向裏甚可喜也答徐斯逺彥章守舊説甚固乃是護惜巳見不肯自將來下毒手彈駁如人收得假金不敢試將火煆如此如何得長進僧家有琉璃瓶子禪之説正謂此耳答徐斯逺昌父志操文詞皆非流輩所及至此適值悲撓未能罄竭所懷然大槩亦巳言之不過欲其刋落枝葉就日用間深察義理之本然庶幾有所據依以造實地不但為騷人墨客而巳今渠所志雖不止此然猶覺有偏重之意切巳處却全未有所安也斯逺亦不可不知此意故此具報幸有以交相警切為佳耳彥章議論雖有偏滯不通之病然其意思終是靠裏近實有受用處也答趙昌甫蕃斯逺殊可念吾人當此境界只有固窮兩字是著力處如其不然即墮坑落塹無有是處矣尤是文士巧於言語為人所説易入邪徑如近世陳無已之不見章雷州吕居仁之不答梁師成蓋絶無而僅有之為可貴也答徐彥章承喻諄復益見精詣鄙意竊謂未發之前固不可謂之無物但便謂情性無二更無虛靜時節則不可耳蓋未發之前萬理皆具然乃虛中之實靜中之動渾然未有形影著莫故謂之中及其巳發然後所具之實理乃行乎動者之中耳來喻本欲自拔於異端然却有侵過界分處而主張太過氣象急迫無沈浸醲郁之味尤非小失碩且寬平其心涵泳此理而徐剖折於毫釐之際然後乃為真知儒佛之邪正不必如是之迫切也前日見論語説中破伊川先生孝悌為仁之本之説此正是於情性之際未能分别恐當更加玩味未可率然立論輕詆前賢也致中和一節亦告深思毋以先入之説為主幸甚甚幸答徐彥章示喻主善之云甚佳但善中有動靜二者相對而言則靜者為主而動者為客此天地隂陽自然之理不可以寂滅之嫌而廢也更望虛心平氣徐以思之久必有合矣若固執舊聞舉一廢百懼非所以進於日新也答徐彥章熹前日拜狀而還信巳行遂不得附深負不敏之愧兩日偶看經説有疑義數條别𥿄奉扣并前書送令郎處尋便附致幸反復之使得以致思為望説中中和動靜尤是大義此處一差非唯錯會經旨且於道體便不分明而日用工夫常有急迫之意無深沉安靜氣象恐不可草草放過也答徐彥章論經説所疑純於善而無間斷之謂一此語甚善但所論老釋之病體用之説則恐未然蓋老釋之病在於彖曰反復其道當連下句日月寒暑晦明可言反復死無復生之理今作一例推説恐墯於釋氏輪回之論天地之心與赤子之心恐更有啇量程子與呂與叔問答可見請試詳之中行獨復合內外之道以下未曉其説恐是筆誤不然則為説太髙爻之時義學之等級似皆未契一陽來復與雷在地中只是一義蓋陽生於閉藏之中至微而未可有為之時也今曰不拘乎一則以二者各為一義矣恐未安也然必有事焉此句未曉時習謹獨即所謂有事今乃中間下一然字則似以事字為工夫之條目矣恐或未然孟子説中已别論矣不勉而中之中以未發言恐未安此中字却是發而無過不及之中聖人之心當發而發不待著力而自無過與不及之差非謂不待著力而常不發也誠由動言亦未安謂未動之時未嘗有誠可乎中者無過不及之謂又曰和者中之異名若就厭動而求靜有體而無用耳至於分别體用乃物理之固然非彼之私言也求之吾書雖無體用之云然其曰寂然而未發者固體之謂也其曰感通而方發者固用之謂也且今之所謂一者其間固有動靜之殊則亦豈能無體用之分哉非曰純於善而無間斷則遂晝度夜思無一息之暫停也彼其外物不接內欲不萌之際心體湛然萬理皆備是乃所以為純於善而無間斷之本也今不察此而又不能廢夫寂然不動之説顧獨詆老釋以寂然為宗無乃自相矛盾邪大抵老釋説於靜而欲無天下之動是猶常寐不覺而棄有用於無用聖賢固弗為也今説於動而欲無天下之靜是猶常行不止雖勞而不得息聖賢亦弗能也蓋其失雖有彼此之殊其倚於一偏而非天下之正理則一而巳嗚呼學者能知一隂一陽一動一靜之可以相勝而不能相無又知靜者為主而動者為客焉則庶乎其不昧於道體而日用之間有以用其力耳為上為德為下為民七世之廟萬夫之長説皆未安巳發處言之則可蓋所謂時中也若就未發處言之則中只是未有偏倚之意亦與和字地位不同矣未發只是未應物時雖市并販夫厮役賤隸亦不無此等時節如何諱得方此之時固未有物欲泥沙之汨然發而中節則雖應於物亦未嘗有所汨直是發不中節方有所汨若謂未汨時全是未發巳汨後便是巳發即喜怒哀樂之發永無中節之時矣恐不然也於本有操持涵飬之功便是靜中工夫所謂靜必有事者固未嘗有所動也但當動不動動必中節非如釋氏之務於常寂耳尊德性以下皆至德之方語似未瑩大抵發育峻極三千三百皆至道其人則至德之人也此五句皆所以修至德而凝至道也尊德性所以充其發育峻極之大道問學所以盡其三千三百之小下句放此以其大小兼該精粗不二故居上居下有道無道無所不宜非止為知禮也中庸二字各有所主以為異名亦未安也明道中庸説問之前輩乃吕與叔後來傳者之誤也天地之大以下所説與上文不連貫察著也謂與察於人倫之察同亦未安鳶飛魚躍咸其自爾將誰使察之耶有察之者便不活潑潑地矣所求乎子句以事父未能也句主意立文皆與大學潔矩一節相似人多誤讀今詳來説似亦可疑明則動動以下當從程子説皆以他人而言孟子在下位一章全用中庸語其曰至誠而不動者未之有也即謂此也大哉聖人之道以下至其此之謂歟别是一章知化育不必言如乾知太始之知反古之道以下文考之非不師古之謂也三重當從吕氏説下焉者若謂衰周以下恐當善字不得須别有説矣孟子之不動心當從程子能無畏難而動其心乎之説則一章之指首尾貫通矣丑非疑孟子以得位為樂而動其心故孟子所答之意亦不為此詳味可見矣量敵慮勝是孟施舍譏他人不能無懼之言縮直也儀禮禮記多有此字每與衡字作對下文直飬之説蓋本於此乃一章大指所繫不可失也必有事焉如言有事于上帝有事於顓臾之類非是用力之地乃言須當用力也正者等待期望之意與春秋傳師出不正反戰不正勝之正同古注以望字釋之是也忘者失其所有事助長者望之不至而作為奮迅以增益之也告子論性五説是同是别生之謂性其義如何七月一詩而備三體乃鄭氏不逹周禮籥章之義而生此鑿説不足據信今考周禮不遺餘力而反信此何耶關雎之淑女似指嬪御恐非詩意中即和也和即中也此語已辨於前恐更須子細不可如此草略説過分體用者未必誤學者却恐為此説者能自誤耳皇極立之於此四方之所取正此説甚善但不知所謂潔矩者其義云何據此皇極與所惡於上無以使下一節之意似不同也答包定之近聞永嘉有回祿之災髙居不至驚恐否講習家庭得以從事於孝恭友弟之實非行思坐誦空言之比也然操索涵泳又不可廢不審所讀何書更能溫習論語并觀孟子尚書之屬反復諷誦於明白易曉處直截理會為佳切忌穿鑿屈曲纒繞也陳國録俆太丞諸公曽相見否亦頗得同志相與切磋否此間今年朋友往來不定講學殊無頭緒甚思定之用意精密不易得也千萬勉􅏧以慰逺懷朱文公文集第五十四卷後考異答項平父又復將此草本復一作便答傳子淵前日之論前日一作日前答希吕性命計耳命下有一之字答徐斯逺却全未有所安却一作都答徐彥章操持涵飬一作涵飬操持福州府儒學訓導鄭璉校
