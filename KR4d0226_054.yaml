body:
  text: 書問答一本作知舊門人問答答孫季和應時所喻平生大病最在輕弱人患不自知耳旣自知得如此便合痛下功夫勇猛舍棄不要思前筭後庶能矯革所謂藥不瞑昡厥疾不瘳者也明善誠身正當表裏相助不可彼此相推若行之不力而歸咎於知之不明知之不明而歸咎於行之不力即因循擔閣無有進歩之期矣它論數條亦所當講别𥿄奉報幸併詳之櫽括程書豈所敢當當時諸先逹蓋嘗有欲爲之而未果者然自今觀之却似未爲不幸况後學淺陋又安敢議此乎子約漢唐之論在渠非有私心然亦未免程子所謂乃邪心者却是教壊後生此甚不便近年以來彼中學者未曽理㑹讀書脩巳便先懐取一副當功利之心未曽出門踏著正路便先做取落草由徑之計相引去無人處私語密傳以爲竒特直是不成模様故不得不痛排斥之不知子約還知外靣氣象如此否耳中庸章句太極解義方是略說大槩若論裏靣道理精㣲曲折知它是更有何窮何盡未湏便慮說得太詳且當以玩味未熟分畫未明爲憂蓋自頃年妄作此書至今未見有人眞實下功理㑹到究竟處也大事記數條其間誠有可疑者如韓信事向來伯恭靣論蓋嘗曰其不反不知後來看得如何湏是别看出情節來不然不應如此失入也此可更問子約看如何然渠此書却實自成一家之言亦不爲無益於世鄙意所疑却恐其間注脚有太纎巧處如論張湯公孫弘之姦歩歩掇拾氣象不好却似與渠軰以私智角勝負非聖賢垂世立教之法也諸詩語意清逺讀之令人想見湖山之勝但亦不無前幅所論兩字之病謂輕弱耳子陵仲弓二絶則甚佳嘗觀荀淑能譏刺梁氏而爽巳不敢忤董卓至彧遂爲唐衡之壻曹操之臣人家父祖壁立千仞子孫猶自倒東來西况太丘制行如此其末流之弊爲賊佐命亦何足恠哉太極之說與繫辭詳略不同乃是互相發明以盡精㣲之藴最爲有功若只依本分模榻則亦何用増此贅語而學者又何由知得其中有許多曲折耶大抵近日議論喜合惡離樂含胡而畏剖析所以凡事都不曽理㑹到底此一世之通患也明道答横渠書誠似太快然其間理致血脉精宻貫通儘湏玩索如大公順應自私用智忘怒觀理便與主敬窮理互相渉入不可草草看過如上文旣云以其情順萬事即其下云而無情亦自不妨明道伊川論性踈宻固不同然其氣象亦各有極至處明道直是渾然天成伊川直是精細平實正似文王治岐周公制禮之不同又似馬援論漢二祖也封建之論甚佳范公之說大抵切於時務近而易行但於制度規模乆逺意思大叚欠闕如論租庸兩稅等處亦甚踈略也封建一事向見胡丈明仲所論大抵與來喻相似不知曽見之否要之此論湏以聖人不以天下爲一家之私作主意而兼論六國形勢以見其利害未嘗不隨義理之是非則可耳以上諸說有未安處却幸反復答孫季和縣事想日有倫理學校固不免為舉子文然亦湏告以聖學門庭令士子略知修巳治人之實庶㡬於中或有興起作將來種子浙間學問一向外馳百恠俱出不知亦頗覺其弊否寧海僧極令人念之亦可屬之端叔兄弟否若救得此人岀彼䧟穽足使聞者悚動所係實不輕也所疑三條皆恐未然試深味之當自見得古今書文雜見先秦古記各有證驗豈容廢絀不能無可疑處只當玩其所可知而闕其所不可知耳小序决非孔門之舊安國序亦决非西漢文章向來語人人多不解惟陳同父聞之不疑要是渠識得文字體製意度耳讀書玩理外考證又是一種工夫所得無㡬而費力不少向來偶自好之固是一病然亦不可謂無助也孔氏書序與孔叢子文中子大略相似所書孔臧不爲宰相而禮賜如三公等事皆無其實而通鑑亦誤信之則考之不精甚矣答石應之所示文字深切詳審說盡事情想當時靣陳又不止此而未足以少回天意此亦時運所繫非人力所能與也更願益加涵飬講學之功而安以俟之事㑹之來豈有終極安知其不愈鈍而後利耶熹衰朽殊甚春間一病狼狽公謹見之繼此將理一兩月方稍䏻自支然竟不能復舊幸且復得祠禄休養而㓜累疾病相仍殊無好况心昬目倦不能觀書然日用功夫不敢不勉間亦紬繹舊聞之一二雖無新得然亦愈覺聖賢之不我欺而近時所謂喙喙爭鳴者之亂道而誤人也無由靣論臨風耿耿公謹想巳到彼矣渠趣向意味朋友間少得但意緒頗多支離更與鐫切令稍直截當益長進耳答石應之聞新阡尚未得卜想今巳有定郷見說大門上世宅兆之勝今日求之未易可得蓋地有盡而求者無巳若欲立定等則必求如此之地而後用之則恐無時而巳耳熹衰病日益沈痼數日來又加寒熱之證愈覺不可支吾相見無期亦勢應爾不足深念猶恨黨錮之禍四海横流而賢者從容其間獨未有以自明者此則拙者他日視而不瞑之深憂也富貴易得名節難保此雖淺近之言然亦豈可忽哉便中寓此以代面訣答諸葛誠之示喻競辯之端三復惘然愚意比來深欲勸同志者兼取兩家之長不可輕相詆訾就有未合亦且置勿論而姑勉力於吾之所急不謂乃以曹表之故反有所激如來喻之云也不敏之故深以自咎然吾人所學喫緊著力處正在天理人欲二者相去之間耳如今所論則彼之因激而起者於二者之間果何處也子靜平日所以自任正欲身率學者一於天理而不以一毫人欲雜於其間恐決不至如賢者之所疑也義理天下之公而人之所見有未能盡同者正當虚心平氣相與熟講而徐究之以歸於是乃是吾黨之責而向來講論之際見諸賢往往皆有立我自是之意厲色忿詞如對仇敵無復長少之節禮遜之容蓋嘗竊笑以爲正使眞是仇敵亦何至此但觀諸賢之氣方盛未可遽以片辭取信因黙不言至今常不滿也今因來喻輙復陳之不審明者以爲如何耳答諸葛誠之所喻子靜不至深諱者不知所諱何事又云銷融其隙者不知隙從何生愚意講論義理只是大家商量尋箇是䖏𥘉無彼此之間不容更似世俗遮掩回護愛惜人情纔有異同便成嫌隙也如何如何所云麤心害道自知明審深所歎服然不知此心何故麤了恐不可不究其所自來也答項平父安世示喻此心元是聖賢只要於未發時常常識得巳發時常常記得此固持守之要但聖人指示爲學之方周遍詳密不靠一邊故曰敬義立而徳不孤若如今說則只恃一箇敬字更不做集義工夫其徳亦孤立而易窮矣湏是精粗本末隨䖏照管不令工夫少有空闕不到之處乃爲善學也此心固是聖賢本領然學未講理未明亦有錯認人欲作天理處不可不察識得記得不知所識所記指何物而言若指此心則識者記者復是何物心有二主自相攫拏聖賢之教恐無此法也持守之要大抵只是要得此心常自整頓惺惺了了即未發時不昏昧巳發時不放縱耳愚見如此不知子靜相報如何因風錄示或可以警所不逮也伊川先生云涵養湏用敬進學則在致知此兩句與從上聖賢相傳指訣如合符契但講學更湏寛平其心深沉詳細以究義理要歸䖏乃爲有𥙷若只草草領略就名數訓詁上著到則不成次第耳答項平父所喻曲折及陸國正語三復爽然所警於昏惰者爲厚矣大抵子思以來教人之法惟以尊徳性道問學兩事爲用力之要今子靜所說專是尊徳性事而熹平日所論却是問學上多了所以爲彼學者多持守可觀而㸔得義理全不子細又别說一種杜撰道理遮蓋不肯放下而熹自覺雖於義理上不敢亂說却於緊要爲巳爲人上多不得力今當反身用力去短集長庶㡬不墮一邉耳答項平父官期遽滿當復西歸自此益相遠令人作惡也罵坐之說何乃至是吾人為學别無巧妙不過平心克巳爲要耳天民聞又領郷邑賑貸之役不以丗俗好惡少改其度深可敬服朋友論議不同不䏻下氣虚心以求實是此深可憂誠之書來言之甚詳巳略報之可取一觀此不復云也聞宗卿子靜蹤跡令人太息然世道廢興亦是運數吾人正當勉其在巳者以俟之耳不必深憤歎徒傷和氣損學力無益於事也答項平父所諭讀書次第甚善但近世學者務反求者便以博觀為外馳務博觀者又以内省為隘狹左右佩劔各主一偏而道術分裂不可復合此學者之大病也若謂堯舜以來所謂兢兢業業便只是讀書程課竊恐有一向外馳之病也如此用力略無虚間意思省察工夫血氣何由可平忿欲何由可弭耶無由靣論徒増耿耿耳答項平父錄寄啓書尤以愧荷稱許之過皆不敢當但覺難用兩字著題耳至論為學次第則更儘有啇量大抵人之一心萬理具備若能存得便是聖賢更有何事然聖賢教人所以有許多門路節次而未嘗教人只守此心者蓋爲此心此理雖本完具却爲氣質之禀不能無偏若不講明體察極精極密徃徃隨其所偏墮扵物欲之私而不自知近丗爲此說者觀其言語動作略無毫髪近似聖賢氣象正坐此耳是以聖賢教人雖以恭敬持守為先而扵其中又必使之即事即物考古驗今體㑹推尋内外參合蓋必如此然後見得此心之真此理之正而扵丗間萬事一切言語無不洞然了其白黒大學所謂知至意誠孟子所謂知言養氣正謂此也若如來喻乃是合下只守此心全不窮理故此心雖似明白然却不能應事此固巳失之矣後來知此是病雖欲窮理然又不曽將聖賢細密言語向自巳分上精思熟察而便務爲渉獵書史通曉丗故之學故於理之精㣲既不能及又并與向來所守而失之所以倀倀無所依據雖於尋常淺近之說亦不能辨而坐爲所惑也夫謂不必先分儒釋者此非實見彼此皆有所當取而不可偏廢也乃是不曽實做自家本分功夫故亦不能知異端詖淫邪遁之害茫然兩無所見而爲是依違籠罩之說以自欺而欺人耳若使自家日前曽做得窮理功夫此豈難曉之病耶然今所謂心無不體之物物無不至之心又似只是移出向來所守之心便就日間所接事物上比較耳其於古今聖賢指示剖析細密精㣲之藴又未嘗入思議也其所是非取舎亦据巳見爲定耳又何以察夫氣禀之偏物欲之蔽而得其本心正理之全耶便謂存誠愈固養氣愈充吾恐其察之未審而自許過髙異日忽逢一夫之說又將爲所遷惑而不能自安也中間得葉正則書亦方似此依違籠罩而自處甚髙不自知其淺陋殊可憐憫以書告之乆不得報恐未必能堪此苦口也大學章句一本謾徃其言雖淺然路脉不差節序明審便可行用幸試詳之答項平父所論義襲猶未離乎舊見大抵旣爲聖賢之學湏讀聖賢之書既讀聖賢之書湏看得他所說本文上下意義字字融釋無窒礙處方是㑹得聖賢立言指趣識得如今爲學功夫固非可以懸空白撰而得之也如孟子答公孫丑問氣一節專以浩然之氣為主其曰是集義所生者言此氣是積累行義之功而自生於内也其曰非義襲而取之也言此氣非是所行之義潜徃掩襲而取之於外也其曰行有不慊於心則餒矣者言心有不慊即是不合於義而此氣不生也是豈可得而掩取哉告子乃不知此而以義爲外則其不動心也直疆制之而頑然不動耳非有此氣而自然不動也故又曰我故曰告子未嘗知義以其外之也然告子之病蓋不知心之慊處即是義之所安其不慊處即是不合於義故直以義為外而不求今人因孟子之言却有見得此意而識義之在内者然又不知心之慊與不慊亦有必待講學省察而後䏻察其精㣲者故於學聚問辨之所得皆指爲外而以爲非義之所在遂一切棄置而不爲此與告子之言雖若小異然其實則百歩五十歩之間耳以此相笑是同浴而譏祼裎也由其所見之偏如此故於義理之精㣲氣質之偏蔽皆所不察而其發之暴悍狂率無所不至其所慨然自任以為義之所在者或未必不出於人欲之私也來喻敬義二字功夫不同固是如此然敬即學之本而窮理乃其事亦不可全作兩截看也洪範皇極一章乃九疇之本不知曽子細看否先儒訓皇極爲大中近聞又有說保極爲存心者其說如何幸推詳之復以見告逐句詳說如注䟽然方見所論之得失大抵爲學但能扵此等節目處看得十數條通透縝密即見讀書凡例而聖賢傳付不言之妙皆可以漸得之言語之中矣答項平父所喻巳悉以平父之明敏扵此自不應有疑所以未免紛紜却是明敏太過不䏻深潜密察反復玩味只略見一線路可通便謂理只如此所以爲人所惑虚度光隂也孟子之意湏從上文看其為氣也配義與道無是餒也是集義所生者非義襲而取之也此上三句本是說氣下兩句是字與非字爲對襲字與生字爲對其意蓋曰此氣乃集義而自生於中非行義而襲取之於外云爾非謂義不是外襲也今人讀書不子細將聖賢言語都錯看了又復將此草本立一切法横說竪說誑罅衆生恐其罪不止如范寗之議王弼而巳也答項平父熹一病四五十日危死者數矣今幸粗有生意然不能飲食其勢亦難扶理杜門屏息聽天所命餘無可言者所幸一生辛苦讀書微細揣摩零碎括剔及此暮年略見從上聖賢所以垂世立教之意枝枝相對葉葉相當無一字無下落處若學者能虚心遜志游泳其間自不患不見入德門户但相見無期不得靣講使平父尚不能無疑於當世諸儒之論此爲悢悢耳答陳抑之謙熹從七友間得足下之名而願交焉爲日乆矣衰病屏伏無從際㑹毎以為恨而聽於往來之言亦知足下之不鄙我而將有以辱况之也年歳以來私家多故不獲以聲問先自通於隷人兹承枉書感愧亡量顧陳義高遠雖古之賢人君子懼不足以堪足下之意而熹之愚何敢當之以自取戾耶然曩亦嘗有聞於先生長者矣勤勞半世泪没於章句訓詁之間黽勉於規矩繩約之内卒無髙竒深眇之見可以驚世而駭俗者獨幸年來於聖賢遺訓粗若見其坦易明白之不妄而必可行者私竊以為儻得當世明逹秀頴之士相與講之抑彼之過疆此之不及吾道庶其明且行乎三復來書果若有意於此幸甚幸甚竄伏窮山未知見日繼此書䟽之往來猶足以見區區也餘惟藏器勉學慰此遐想答俞壽翁太極之書度所見不同論未易合故久不報又思理之所在終不可以不辨近方以書復之其說甚詳未知彼復以爲如何也極不訓中此義甚的然自先儒失之乆矣未必今人之失也德功渾象之說誠如所喻此公好學而病多蓋不專在言語文字之間也來喻有志未免有見未徹此見賢者自知之明見子靜曽扣之否愚意則以爲且當損去浮華還就自已分上切近著實處用功庶幾自有欲罷不能積累貫通之效若未得下手處恐未免於臆度虚談之弊也答應仁仲大學中庸屢改終未能到得無可改處大學近方稍似少病道理最是講論時說得透纔渉𥿄墨便覺不能及其一二縱說得出亦無精彩以此見聖賢心事今只於𥿄上看如何見得到底毎一念此未嘗不撫卷慨然也答應仁仲自幾道來聞欲相訪日佇來音比歸不至深以惘然後得呂子約書乃知巳嘗經婺女竟爾相失尤以爲恨歸來乃領何來三月所惠書雖巳逺猶足慰意也比日秋冷逺惟德履佳勝熹一出狼狽不可言幾道必巳詳言之矣歸來巳决杜門之計讀書益有味但祠請專人愆期未返未知此事定復何如度亦不岀三五日當見果决也甚乆欲一見賢者今既不遂因書有以見告者切幸不外啓蒙小學二書偶未有本後便續寄去中庸等書未敢刻聞有盗印者方此追䆒未定甚以爲撓也因便布此未能盡所欲言正逺珎重答應仁仲熹衰病之餘災患復不可堪趙氏聘幣無置之之所故遣歸之今旣不受未有以處欲如來喻納之扵壙則今巳葬且此間之葬例薄然亦時有意外之患欲置少田以給墓戸則亦不必如此之多欲以施諸鄉人之爲橋道者則似於義亦無所當反復思之唯有别以它女再結姻好之爲善而家間諸女及孫雖多而年歲無相當者其最長者才十有二耳似此再三籌度皆未有計不知賢者何以敎之使扵義稍安而無所疑也聞幾道太夫人至爲悲慟變食此意尤不敢忘耳熹出處之計未知所定亦復類此浙中士友亦頗有知其曲折者要是杜門藏拙為上計耳答應仁仲乆不聞問小兒歸彼告乃知向來體中嘗不佳證亦不輕又喜只今巳漸平復竊計比日起居益快健氣體愈清實也但累年命駕之約未知能復踐言否熹亦益衰精神筋力皆巳非復昔時勢亦不能逺適何由一承晤語以遂心期念之令人悢悢不能為懐也禮書方了得聘禮巳前巳送致道令與四明一二朋友抄節䟽義附入計必轉呈有未安者幸早見敎尚及改也覲禮以後黄婿携去廬陵與江右一二朋友成之尚未送來計亦就草藁矣前賢常患儀禮難讀以今觀之只是經不分章記不隨經而注䟽各爲一書故使讀者不能遽曉今定此本盡去此諸弊恨不得令韓文公見之也易本義不謂遂逹几下舊讀此書毎於先儒之說有所不快因以妄意管窺一二亦不自意推尋至此尚恨古書放失聞見單淺今又衰惰不能卒業不知明者何以敎之更望詳賜誨諭毋使有待扵後世之子雲也正逺切祈以道自重益綏壽祉千萬至望答應仁仲久不聞問辱書爲慰信後清和恭惟求志從容尊履多福如聞亦苦目疾莫不至甚妨事否熹則左目全盲右亦漸不見物矣來日幾何學不加益而罪戾日聞未知明者何以警䇿之也惠許來訪固所幸願顧見屬之意有所不敢承耳何時披晤訟此堙鬰更祈珎衛副此眞禱答應仁仲熹勸講亡狀竟煩罷斥社門念咎畢此餘生為幸甚矣比來衰悴愈覺支離加以耳重目肓殊費醫治良以為撓然亦老態之常不足恠也因便草草向見朋友編春秋例鄙意亦欲如此正如來喻所云也熹目盲不能親書所喻編禮如此固佳然却太移動本文恐亦未便耳老病益侵而友朋相望皆在千百里外恐此事不能成為終身之恨矣向在長沙臨安皆嘗有意欲藉官司之力為之亦未及開口而罷天於此學如此其厄之何邪可歎可歎答周叔謹葉公謹改姓字應之甚恨未得相見其爲學規模次第如何近來呂陸門人互相排斥此由各狥所見之偏而不能公天下之心以觀天下之理甚覺不滿人意應之盖嘗學扵两家不知其扵此看得果如何因話扣之因書喻及爲幸也熹近日亦覺向來說話有太支離處反身以求正坐自巳用功亦未切耳因此減去文字功夫覺得閑中氣象甚適毎勸學者亦且看孟子道性善求放心两章著實體察収拾爲要其餘文字且大槩諷誦涵養未湏大叚著力考索也答周叔謹叔謹想且留彼應之相聚所講何事文字且虚心平看自有意味勿苦尋支蔓旁生孔穴以汨亂義理之正脉中庸謹思之戒盖為此也子約書來說得大叚支離要是義理太多信口信筆縦横去得說得轉闊病痛轉深也如所論功体二字太露之類亦是此様所云湏如顔子方無一毫之非禮此說却是但未知其意向在甚處若云人湏以顔子自期不可便謂巳至則可若謂顔子方能至此常人不可學他即大不可想渠必不至此誤但亦只是毎事湏著一句纒繞令不直截耳公謹來書依舊說得太多更冝省約爲佳也柷汀州巳成見次不知赴官能入山否朝廷方遣使命行經界議塩法此亦振民革弊之秋但恐不免少勞心力耳彦章書來云欲見訪却不見到不知何故所論二人外内之偏信然此等處只是容易窄狹自主張太早了便生出無限病痛耳彼旣相信不及勢亦無如之何莫若且就巳分上著力之爲急也答周叔謹喪禮前書巳報大槩適再考儀禮經五服皆有之一在首一在要大小有差斬衰條下傳中巳言之故不復言耳要絰之下又有帶斬衰絞帶齊衰布帶是也蓋絰帶以象吉服之大帶此帶則象吉服之革帶屈其一端立貫之還以挿扵要間非齊衰則止用布帶而無要絰也右本在上者齊衰絰之制以麻根處著頭右邉而從額前向左圍向頭後却就右邉元麻根處相接即以麻尾藏在麻根之下麻根搭在麻尾之上綴殺之有纓者以其加於冠外故湏著纓方不脫落也辟領儀禮注云辟領廣四寸則與濶中八寸也两之爲尺六寸與來書所言不同不知何故詳此辟領是有辟積之義雖廣四寸湏用布濶四寸長八寸者摺其两頭令就中相接即方四寸而綴定上邉於領之旁以所摺向裏平面向外如今裙之有摺即所謂辟積也温公所謂裳毎幅作三㡇者是也如此即是一旁用八寸两旁共尺六寸矣管屨䟽屨今不可考今略以輕重推之斬衰用今草鞋齊衰用麻鞋可也麻鞋卒伍所著者答周叔謹示喻静中私意横生此學者之通患能自省察至此甚不易得此當以敬爲主而深察私意之萌多爲何事就其重處痛加懲窒乆之純熟自當見效不可計功於旦暮而多為說以害之也論語别本未曽改定俟便寄去然且專意就日用處做涵養省察工夫未必不勝讀書也答周叔謹所示仁說差勝徃時但所引熹說亦有誤字處恐又錯認了更畧契勘爲佳然書中所說収拾放心乃是緊切下功夫處講學乃其中之一事今但専一扵此下功不湏思前筭後計較得失講學亦且看直截明白處不要支蔓來書所謂雖若小異然亦不甚相逺者全是子約舊時句法也答王季和鈆别幅之喻具悉至意嘗謂道之在人𥘉非外鑠而聖賢埀訓又皆懇切明白但能虚心熟讀深味其㫖而反之扵身必有以信其在我而不容自巳則下學上逹自當有所至矣但讀書不可貪多今當且以大學爲先逐叚熟讀精思湏令了了分明方可改讀後叚如此庶易見功乆乆浹洽通貫則無書不可讀矣答王季和來示備悉學者之志固不可不以逺大自期然觀孔門之教則其所從言之者至爲卑近不過孝弟忠信持守誦習之間而扵所謂學問之全體𥘉不察察言之也若其高弟弟子多亦僅得其一體夫以夫子之聖諸子之賢其扵道之全體豈不能一言盡之以相授納而顧為是拘拘者以狹道之傳畫人之志何㢤蓋所謂道之全體雖高且大而其實未嘗不貫乎日用細㣲切近之間苟恱其高而忽扵近慕扵大而略於細則無漸次經由之實而徒有懸想跂望之劳亦終不能以自逹矣故聖人之敎循循有序不過使人反而求之至近至小之中博之以文以開其講學之端約之以禮以嚴其踐履之實使之得寸則守其寸得尺則守其尺如是乆之日滋月益然後道之全體乃有所鄉望而漸可識有所循習而漸可能自是而往俛焉孳孳斃而後巳而其所造之淺深所就之廣狹亦非可以必詣而預期也故夫子嘗謂先難後獲爲仁又以先事後得爲崇德蓋扵此小差則心失其正雖有鑚堅仰高之志而反為謀利計功之私矣仁何自而得徳何自而崇哉聊誦所聞以答下問之意至於菴記大字之需則非學之急亦老懶之所不睱也舒大夫向嘗相見扵㑹稽所論未合今想其學益有成矣聞其政亦甚佳有本者固如是也不及為書因見幸畧道意答傅子淵夢泉荆州云亡忽忽歲晚比又得青田教授陸兄之計吾道不幸乃至扵此毎一念之痛恨無窮想平生師資之義尤不䏻為懐也所示江陵問答讀之敬夫之聲容恍若相接悲愴之餘警䇿多矣但其間尚有鄙意所未安者更容熟復續奉報歸納也大抵賢者勇扵進道而果扵自信未嘗虚心以觀聖賢師友之言而壹取决扵胷臆氣象言語只似禪家張皇鬪怒殊無寛平正大沉浸醲郁之意荆州所謂有拈搥竪拂意思者可謂一言盡之然左右初不領畧而渠亦無後語此愚所深恨也徳起得資友益書來甚激昂巳報之云更湏講學封殖不可專恃此矣答傅子淵示喻戦栗之義反復思之終未能曉豈以宰我如此注解便渉支離不能簡易故耶熹看此章只是宰我錯觧了故聖人深責之不謂其纔下注解便成支離如來喻之云也細詳來喻是意外生說附會穿鑿有不勝其支離者舉此一端恐區區所見與賢者不同不但此一事也示及得朋進學之盛深慰鄙懐然二包定夫書來皆躐等好高之論殊不可曉顯道本領只是舊聞正苦其未能猛舎不謂巳見絶於旦評也答傅子淵示喻所以取舎於前日之論者甚悉率爾之言固不能保其無病然道體規模功夫節目只是一理是則俱是非則俱非不容作两種啇量去彼取此也睱日平心定氣試一思之或有以變化氣質而捄一偏之弊則扵成巳成物之際未必無小𥙷耳答傅子淵示喻所得日益高妙非復愚昧所能窺測但願更於小心密察處稍加意焉則所謂主敬窮理者殆亦緝熈光明之所不可巳者而𥘉亦不在渙然心喻者之外也包黄諸君各精進捐去舊習甚善但恐似此一向掠虚則又只是改換名目也超宗逺來殊未有以副其意者却似扵巳分著實處未知用力又與諸兄大相反也巳喻其就彼啇量雖稍過扵簡約亦無害耳答陳正巳剛往歲得吕東萊書盛稱賢者之爲人以爲十數年來朋友中未始有也以此心願一見而無從得中間聞欲來訪甚以爲喜不乆乃聞遽遭閔凶深為傷怛顧以未嘗通問不欲遽脩慰禮今者辱書荷意良厚且審秋辰殘暑孝履支福又以爲慰示喻爲學大致及别𥿄數條皆已深悉但區區於此有不能無疑者蓋上爲靈明之空見所持而不得從事於博學篤志切問近思之實下爲俊傑之豪氣所動而不暇用力扵格物致知誠意正心之本是以所論嘗有厭平實而趍高妙輕道義而喜功名之心其浮陽動俠之意往徃發於詞氣之間絶不類聖門學者氣象不知向來伯恭亦嘗以是相規否也熹自年十四五時即嘗有志於此中間非不用力而所見終未端的其言雖或誤中要是想像臆度所幸内無空寂之誘外無功利之貪全此純愚以至今日反復舊聞而有得焉乃知明道先生所謂天理二字却是自家帖體出來者眞不妄也沖漠無朕一叚恐未可輕議若當此時萬象未具即是上靣一截無形無兆後來𬒳人引入塗轍矣賢者正作此見何乃遽謂古今無人作此語耶敬以直内近思錄注中别有一語先生指意甚明蓋雖不以為無然未嘗以爲即與吾之所謂敬以直内者無毫髮之差也許渤為人不可知其詳語錄中又有一處說其人晨起問人寒暖加減衣服加減一定終日不易即是天資篤厚之人容有不聞隔牎事者非必有寄寂之意而欲其不聞也况此條之下一本注云曷嘗有如此聖人則是先生蓋亦未之許也但歎羙其純德與世間一種便儇皎厲之人氣象懸隔亦可尚耳此等皆未可輕易立說訕薄前賢也注䟽之學却不湏如此主張蘇子由議論自是一偏之說亦何足為凖的也㦲董仲舒所立甚高恐未易以世儒詆之今日病痛正爲不曽透得道義功利一重関耳若處置匈奴一節便使從來才智之士如婁敬賈誼亦未免此來諭於此予奪之間不能無高下其手者豈立意之偏而不自覺歟近來浙中恠論蠭起令人憂歎不知伯㳟若不死見此以為如何也答陳正已示喻縷縷皆聖賢大業熹何足以知之然亦未得一觀即爲朋友傳玩遂失所在今不復能盡記但覺所論不免將内外本末作兩叚事而其輕重緩急又有顚倒斘逆之病究觀底裏恐只是後世一種智力功名之心雖強以聖賢經世之說文之而規模氣象與其所謂存神過化上下同流者大不侔矣若戊子年間所見果與聖賢不異即其所發不應如此以故鄙意於此尤有不能無疑者未得面論徒増耿耿耳答朱子繹知讀大學甚善大抵其說雖多多是爲學之題目次第緊要是格物兩字却未曽說著下手處故學者之讀此而不得其要者類如數遺弃之齒而求有獲亦沒世窮年而無得矣湏著精神領畧箇大體規模便尋箇的當下手處著實用功始是㑹讀大學也答路徳章所與子約書甚善但謂東萊遺言有渉於經濟維持者别爲一事而異於平日道學之意則恐亦未免有累於東萊也龜山嘗譏王氏之學離内外判心迹使道常無用於天下而經世之務皆私智之鑿正謂此耳又謂儻遇漢祖唐宗亦湏有争不得且放過處亦是舊時意思尚在方寸之地只有一毫此等見識便是枉尺直尋底根株直湏見得正當道理分明不容些兒走作即自然無復此等意思雖欲宛轉回護亦有所不可得矣古之聖賢以枉尺直尋爲大病今日議論乃以枉尺直尋爲根本若果如此即孟子果然迂闊而公孫衍張儀眞可謂大丈夫矣徳章巳見大意自不必如此說因筆及之亦恐餘證未解聊復云云耳儀禮編巳收此間朋友未有能辦此者春秋想亦不輟用工此文字未爲切巳然亦可惜中廢但稍減課程令日力有餘不至忙迫即玩索􅉼養之功不至欠闕矣答路徳章所喻水到渠成之說意思畢竟在渠上未放水東流時巳先作屈曲準備了矣毫釐之差千里之繆孟子程子所以爲有功於天理有力於聖門有徳於後學者正在此處不知何故前日直如此㸔倒了今日雖欲回頭而尚爲舊習所牽不得自由也答路徳章奉一日告獲聞安勝爲慰但聞忍窮益堅未有卒歲之計則未能不相爲動心也然詳來喻似所以處者亦未有盡善蓋若謂羞於出入則不應去冬未覺而今夏方覺謂厭請託則此等以義裁之一切不與人自不能相干謂所入不足自資則又將去此而有求其得失既未可期而豐約亦未可料此恐皆非所以决爲去就之實或者但以平日意氣不能俯仰而忽然有所激觸遂憤然爲此而不暇顧計耳大抵徳章平日爲學於文字議論上用功多於性情義理上用功少所以常有憤鬰不平之意見於詞氣容貌之間而所向者無非﨑嶇偪反不可容身之地此在世俗苟且流狥之中觀之固亦足爲高然在吾軰學問義理上㸔則豈非膏肓深錮之疾而不可以不早治者耶即今且置此勿論而以所喻讀論孟者言之則所謂不愛把來作口頭說話故不敢作問而墮於寡陋者豈亦不爲憤鬰不平之氣所發耶夫學者讀書有疑而不能自决故不得巳而不能不問今人無疑而飾問以資談聴者固不足道然遂懲此而不問則未知其果巳洞然而無疑耶抑有疑而耻自同於飾問遂飲黙以自愚將未至乎有疑而不能問遂發其憤悶肆其忌克而託於不問以自欺也若巳洞然而無疑則善矣然非上智之資不能及若不幸而彷彿於後兩者之所謂則吾恐其深有妨於進學而大有害於養心也昨見編集春秋蓋嘗奉勸此等得暇爲之不可以此而妨吾涵養之務正爲此爾但當時又見所編功緒巳成精宻可愛他人决做不得遂亦心利其成不欲一向說殺以今觀之則所謂爲人謀而不忠者無大於此乃始惕然自悔自咎蓋不獨爲賢者惜之也讀書爲學本以治心今乃不唯不能治之而乃使向外奔馳不得休息以至於反爲之害是豈不爲迷惑之甚乎徳章氣節偉然非流軰所可及私心常所愛敬而區區之懷猶有未得盡者毎竊以爲愧且恨也因風布問輙盡言之想所樂聞不至以爲罪也答路徳章示喻縷縷備悉然其大槩皆自恕之詞以此存心亦無惑乎徳之不進而業之不脩也吾人爲貧只有禄仕一途可以苟活無害於義彼中距臨安不逺豈不能一爲參選計而長此覊旅乎此則未論義理而只以利害計之亦未得爲是也大抵是日前爲學只是讀史傳說世變其治經亦不過是記誦編節向外意多而未嘗反躬内省以究義理之歸故其身心放縱念慮粗淺於自巳分上無毫髪得力處此亦從前師友與有責焉而自家受病比之它人尤更重害此又姿禀不羙而無以洗滌變化之罪也今日正當痛自循省向裏消磨庶㡬晚節救得一半而一向如此苟簡自恕若不怨天即是尤人殊非平日所望於徳章者也來諭毎謂熹有相棄之意此亦尤人之論區區所以苦口相告正爲不忍相棄耳若巳相棄便可相忘於江湖何至如此忉怛愈増賢者忿懟不平之氣耶只今可且捺下身心除了許多閑說話多方擘畫去參了部授一本等合入差遣歸來討一歇泊處將論語孟子正文端坐熟讀口誦心惟雖巳曉得文義亦湏逐字忖過洗滌了心肝五臓裏許多忿憾怨毒之氣管取後日湏有進歩處不但爲今日之路徳章而巳也向見伯恭說少時性氣粗暴嫌飲食不如意便敢打破家事後因乆病只將一册論語早晚閑㸔忽然覺得意思一時平了遂終身無暴怒此可爲變化氣質之法不知平時曽與朋友說及此事否徳章從學之乆不應不聞如何全不學得些子是可謂不善學矣答路徳章闕期不逺便可得禄襄陽古郡多前賢遺迹䆠㳺得此亦正自不惡也示喻爲學功夫果充此言何患不進但讀書亦湏随章逐句子細研窮方見意味若只用麤心但求快意恐終無以滌蕩塵埃剗除麟甲也直卿在此問以來書所云渠殊不省然聞過則喜吾人正當勉力不湏便懐不平之意必求伸巳而屈人也踏雪之逰果能踐約幸甚答康炳道所論學者之失由其但以致知爲事遂至䧟溺此於今日之弊誠若近之然恐所謂致知者正是要就事物上見得本來道理即與今日討論制度較計權術者意思功夫逈然不同若致得吾心本然之知豈復有所䧟溺耶正坐論事而不求理遂至生此病痛耳熹於此非敢有所與奪但見邪說横流恐爲吾道之害故不得不極言之信之與否則在乎人焉若旣排闢之又假借之則恐其弊將有至於飬虎而遺患者矣然區區於此亦固未嘗有所絶於人而不與其進也彼若幡然覺悟去邪歸正又豈熹之所能拒哉東萊文字湏子細整頓成編乃可啇量但此事亦不冝甚緩蓋人生不堅固若過却眼前諸人即此事無分付處矣答郭希吕津示喻銘叙此非有所愛但老病心力衰耗不能盡給四方之求不得不自爲性命計耳鄙性拙直向使可爲即巳爲之何至今日更煩再喻然後作耶况今又經一畨悲惱尤覺昏憊决不能辦此且銘重於叙旣巳作銘若有餘力何惜於叙而費許多詞說分踈耶誠之若是合下不肯承當即不應爲希吕移書以其所不欲者施於人若以其重而不敢爲則熹巳任其重者矣渠在今日必不容復有詞也恐此未必誠之之意只是希吕不相亮必欲熹自爲之而故爲此說耳人之相知貴相知心而古之君子不盡人之歡不竭人之忠所以全交千萬深察乎此言憐其衰老勿破巳成之例以速其就於死地幸甚幸甚答郭希吕知讀論孟不廢甚善且先將正文熟讀就自巳分上看更考諸先生說有發明處者愽觀而審取之凡一言一句有益於巳者皆當玩味未可便恐路徑支離而謂所有不必講也墓銘之額更著宋字亦佳伯謨必巳報去矣大抵石長即以十字爲兩行石短則以九字爲三行随事之冝可也答郭希吕示喻所以居家事長之意甚善甚善此事他人無致力處正唯自勉而已但謂學問大端不敢躐等言之則鄙意有所未曉者夫學問豈以他求不過欲明此理而力行之耳但其功夫所施有序而莫不以愛親敬長爲先非謂學問自是一事可以置之度外而姑從事於孝友之實也故熹竊碩昆仲相與深察此意而講於所謂學問之大端者以求孝弟之實則閨門之内倫理益正恩義益篤將有不期然而然者矣若以學問爲一大事不可㡬及而汲汲然徒弊精神於科舉文字之間乃欲别求一術以爲家庭雍睦悠乆之計竊恐天理不明人慾横生其末流之弊將有不可勝慮不可勝防者不審賢者以爲如何答郭希吕來喻縷縷似未悉前後鄙意者盖人心有全體運用故學問有全體工夫所謂孝弟乃全體中之一事但比他事為至大而最急耳固不可謂學者止此一事便了而其餘事可一切棄置而不問也故聖賢教人必以窮理爲先而力行以終之盖有以明乎此心之全體則孝弟固在其中而他事不在其外孝弟固不容於不勉而他事之緩急本末亦莫不有自然之序苟不明此則爲孝弟者未免出於有意且又未必能盡其理而爲衆事之本根也今以六經大學論語中庸孟子諸書考之可見矣希吕自謂多病故不能精思愽學而姑用力於其所及則固巳爲自棄而猶可諉曰近本若遂以為孝弟之外更無學問則其繆見甚矣且誠多病而不能精思愽學矣則又曷為而苦心竭力以從事於科舉之文耶此之不為而彼之乆為雖曰不厚於利而薄於義吾不信也希吕其更思之書院規模且随事随力爲之却就事實上考察整理方見次第不湏如此預先安排記文扁牓尤是外事但此等意思即見浮淺外馳之驗若於學問全體上切巳處用得功夫即氣象自當深厚宏濶矣太極西銘通書各註一本試熟讀而思之亦求理之一端也大抵學者不可有放過底事乆之不巳雖無緊要功夫亦有得力處也答郭希呂示喻縷縷備悉然所謂收心正心不是要得漠然無思念只是要得常自惺覺思所當思而不悖於義理耳别𥿄所示㸔得全未子細更冝加功專㸔大學首尾通貫都無所疑然後可讀語孟語孟又無所疑然後可讀中庸今大學全未曉了而便兼㸔中庸用心叢雜如此何由見得詳細耶且更耐煩專一細㸔爲佳日月易得大事未明甚可懼也答時子雲來喻滿𥿄深所未喻必是當時於此見得太重所以如此執著放捨不下今想未能遽然割棄但請逐日那三五分功夫將古今聖賢之言剖析義利處反復熟讀時時思省義理何自而來利欲何從而有二者於人孰親孰踈孰輕孰重必不得巳孰取孰舎孰緩孰急𥘉㸔時似無滋味乆之湏自見得合剖判處則自然放得下矣捨此不務紛紛多言思前筭後展轉纒縛一生出不得未論小小得失政使一旦便登高科躋顯官又湏别有思量擘畫終不暇向此途矣試思之如何向編近思錄欲入數叚說科舉壞人心術處而伯恭不肯今日乃知此箇病根從彼時便巳栽種培飬得在心田裏了令人痛恨也答毛舜卿示喻功夫次第似覺頭緒太多今且以敬義二字随處加功乆乆自當得力義利之間只得著力分别不當預以難辨爲憂聖門只此便是終身事業亦不湏别妄想向上一路也答王伯豊洽參以三數之也伍以五數之也如云什伍其民如云或相什伍非直爲三與五而巳也盖紀數之法以三數之則遇五而齊以五數之則遇三而㑹故荀子曰窺敵制變欲伍以參注引韓子曰省同異之言以知朋黨之分偶參伍之驗以責陳言之實又曰參之以比物伍之以合參而漢書趙廣漢傳亦云參伍其賈以類相凖皆其義也易所謂參伍以變者盖言或以三數而變之或以五數而變之前後多寡更相反覆以不齊而要其齊如河圖洛書大衍之數伏羲文王之卦暦家之日月五星章蔀紀元是皆各爲一法不相依附而不害其相通者也綜字之義沙随得之然錯綜自是兩事錯者雜而互之也綜者條而理之也參伍錯綜又各自是一事參伍所以通之其治之也簡而䟽錯綜所以極之其治之也繁而宻太極兩儀四象八卦者伏羲畫卦之法也說卦天地定位至坤以藏之以前伏羲所畫八卦之位也帝出乎震以下文王即㐲羲巳成之卦而推其義類之詞也如卦變圗剛來柔進之類亦是就卦巳成後用意推說以此爲自彼卦而來耳非眞先有彼卦而後方有此卦也古注說賁卦自㤗卦而來先儒非之以爲乾坤合而爲㤗豈有㤗復變爲賁之理殊不知若論伏羲畫卦則六十四卦一時俱了雖乾坤亦無能生諸卦之理若如文王孔子之說則縱横曲直反覆相生無所不可要在㸔得活絡無所拘泥則無不通耳易中先儒舊法皆不可廢但互體五行納甲飛伏之類禾及致思耳卦變獨於彖傳之詞有用然舊圖亦未備頃嘗脩定今冩去可就空處填畫卦爻而以彖傳考之則卦所從來皆可見矣然其間亦有一卦從數卦而來者湏細考之可以見易中象數無所不通不當如今人之拘滯也右初掛左今於圖中如此添脩當巳明白矣答楊深父示喻自患柔懦不立而欲務於寛大含容此正以水濟水之謂也前此所以奉告但欲賢者日用之間不昧此心更於應接事物處各求其理之所在則喜怒哀樂自無偏倚而皆中節矣不審賢者以爲如何答楊深父所喻諸疑固嘗靣論若未能判然莫若條陳所疑章解而句辨之當有所決不可只如此泛論也略處如某章某說句如何當取而不取過處未安太甚三說亦然乃見所疑之實禮樂刑政之爲教如寒暑生殺之爲歳此何所疑若如來意則道外有物而刑政專出於蚩尤申商矣此類更宜寛著心胷子細推驗不可只將尋常小小意見窺測也觀横渠先生論周禮天官處亦可見矣答汪子卿一别累年疾病多故不獲以時致問訊第積馳仰正思之來辱手書兩通意厚禮勤有非區區淺陋所敢當者然足以見好學之篤雖老而不忘也信後冬深寒暖不常不審尊候何如伏惟起處萬福熹犬馬之齒雖在賢者之後然今亦是老境平生爲學非不究心然未有大得力處三復來誨皆其力之所未能及者而何足以少助於髙明但荷意之勤亦不敢隱其固陋耳竊味來書所引論語數條言仁甚悉而所論反復亦不爲不詳獨於仁之一字義理意味與其所以用力之方皆未之及豈其於此固有以黙契而忘言也耶不然則仁之所以爲仁者𥘉未嘗曉然有見於心而的然有得於巳吾恐所謂不違不害者之茫然如捕風繫影之無所措而所以處夫窮通得喪之際者或未能㤗然無所動於其中也長者之明雖不至此然以所謂變通之術者觀之則有以見其未免於彼之重而此之輕也昔子貢無謟無驕之問盖自以爲至而夫子以爲未若樂與好禮何哉無謟無驕則尚局於貧冨之中樂且好禮則巳超然乎貧富之外也然其所以至此則必嘗有所用其力矣非規規於兩者之間有所較計抑遏而求出於此也又況於自料其必有所不安而預爲變通之計則恐其所立又將出於無謟無驕之下也無疑矣區區鄙意竊顧長者於此姑無恤其他而深探聖賢之言以求仁之所以爲仁者反諸身而實用其力焉則於所以不違不害者皆如有物之可指而窮通得失之變脫然其無與於我矣不識髙明以爲如何若有未安幸復見教也答趙㡬道師淵所論時學之弊甚善但所謂冷淡生活者亦恐反遲而禍大耳孟子所以舎申商而距楊墨者正爲此也向來正以吾黨孤弱不欲於中自爲矛盾亦厭繳紛競辯若可羞者故一切容忍不能極論近乃深覺其弊全然不曽畧見天理彷彿一味只將私意東作西捺做岀許多詖淫邪遁之說又且空腹髙心妄自尊大俯視聖賢蔑棄禮法只此一節尤爲學者心術之害故不免直截與之說破渠軰家計巳成決不肯舎然此說旣明庶㡬後來者免墮邪見坑中亦是一事耳答趙㡬道昔時讀史者不過記其事實摭其詞采以供文字之用而巳近世學者頗知其陋則變其法務以考其形勢之利害事情之得失而尤喜稱史遷之書講說推尊㡬以爲賢於夫子寜舎論孟之屬而讀其書然嘗聞其說之一二不過只是戰國以下見識其正當處不過知尊孔氏而亦徒見其表恱其外之文而巳其曰折衷於夫子者實未知所折衷也後之爲史者又不及此以故讀史之士多是意思粗淺於義理之精㣲多不能識而墮於世俗尋常之見以爲雖古聖賢亦不過審於利害之筭而巳唯蘇黄門作古史序篇首便言古之聖人其必爲善如火之必熱水之必寒不爲不善如騶虞之不殺竊脂之不糓於義理大綱領處見得極分明提得極親切雖其下文未能盡善然只此數句巳非近世諸儒所能及矣惜其從𥘉爲學功夫本無次序不曽經歴不能見得本末一一諦當只其資質恬静無他外慕故於此大頭叚處窺測得箇影響到此地位正好著力却便墮落釋老門戸中去不能就聖賢指示處立得修巳治人正當規模以見諸事業傳之學者徒然說得此箇意思而其意之所重終止在文字言語之間其徒雖趣力推尊之然竟不曽有人能爲拈出此箇話頭以建立宗㫖者亦可恨也其論史遷之失兩句亦切中其膏肓不知近日推尊史記者曽爲畧分解否耳今日巳作書偶思得此語聊復奉告不審以爲如何也答劉仲則示喻學問之道不專在書冊而在持身接物之間理固如此然便全舎去書冊不復以講學問辨爲事則恐所以持身接物之際未必皆能識其本源而中於㡬㑹此子路人民社稷何必讀書之論所以見悪於聖人也試以治民理事之餘力益取聖賢之言而讀之而思之當自覺有進歩處然後知此言之不妄也大學章句一通謾奉致思之地大抵讀書唯虚心專意循次漸進爲可得之如百牢九鼎非可以一嘬而盡其味也答黄冕仲所論爲學功夫甚善但若果是見得日用周旋無非至善則亦不必大叚著力把捉却恐迫切而反失之但且悠悠随其所向便是持守乆之純熟自見次第矣讀書且就分明處㸔覷涵泳不必過爲考索乆之浹洽自然通透也向說小善不足爲重輕非是以小善爲不足爲但謂要識得大體有用功處不專恃此爲本領耳善之所在即當從之固不可以其小而忽之也答沙縣宋宰南強跧伏山間聴於道塗與凢士友之言具知政績之羙竊謂今之爲吏者捄過目前不得一意於撫摩之政乆矣乃如執事者出乎其間民不告勞而官無廢事是可尚巳如聞當路頗巳相知更碩益修其在我者其實旣大則其聲愈閎將不可揜政不必有意於其間也答楊簡卿迪又不聞問辱書審聞新正以來侍奉吉慶爲慰又知巳遂書考又得史君薦則尤以爲喜但所諭趙帥書在吾友妙年何遽汲汲如此向使前舉未登科不成如今亦要舉狀關陞也平性不敢爲此故亦不𣣔以此施之於人不喜人宛轉爲人求知故亦不欲作此等書反復思之無以應命但有一言爲贈冀賢者抗志髙明有以自技於流俗乃所望耳井伯雖實相愛然似未知所以相愛也答江夣良史示喻學校曲折具悉雅志今時教官能晋意如此者誠不易得然更在勉其學業雖未能深解義理且得多讀經史博通古今亦是一事不可只念時文爲目前苟簡之計也答吴宜之南所論爲學之功若如所言則是大叚勇猛精進非復昔人矣然前後屢聞此言而及至相見則生情態度宛然只是舊人元未有毫髪改變則今日之云鄙意固有所未敢信也且不唯所說之病不曽夫而省巳粗踈發言輕易之病又更増長以此爲學所謂郤行而求前也答吴冝之他說紛紜皆是不肯安於義命之意以宜之才氣若稍加静重潜心向學何所不至今乃一味浮躁自立一種苟簡自恕議論讀之令人腹煩如謂世人習俗薄惡難卒與語而欲委曲開導之竊詳此意恐自未免於薄惡而難與語也今日决意登舟無可言者但碩更思此言痛自收歛猶可捄得一半若只如前日意思他時之困當有甚於今日者雖欲悔之不能及也所謂學者舎科舉文字未有可從事者不知此語何爲而發若如鄙意則科舉文字之外學者儘有合用力處此賢者所當深念也答吴宜之觀來書所論它人長短得失無不精當但平日所見所以讀書爲學之意處巳接物之方則甚有不相似者豈其務外者多而反身或闕耶子貢方人子曰賜也賢乎哉夫我則不暇碩冝之常思此句念念向裏就切巳處做功夫他人之長短得失非吾之所當知也陳公之賢固樂聞之然公私多事何能及此新詩固有佳句然亦非事之急况欲投獻求知於人此􅕽外之尤者不可以不戒史論正亦未湏遽作且務窮經觀理深自涵養了取自家身分上事爲佳答吴宜之承書知巳爲入都計今想巳到矣但熹身在閑逺豈能爲人宛轉求舘求試若能如此則親戚間如黄直卿軰當先爲圖得矣兼平生爲學只學固窮守道一事朋友所以逺來相問亦正爲此今若曲狥宜之之意相爲經營則是生師之間去仁義而懐利以相接矣豈相尋問學之本意耶答吴宜之所喻易說誠是太畧然此書體靣與他經不同只得如此點掇說過多著言語便說殺了先儒注解非是不好只爲皆墮此病故不滿人意中間便欲稍移經下注文入傳中庶得經文意思更寛而未有功夫到得今病衰如此更有無限未了底文字恐爲没身之恨矣答徐斯逺文卿文叔作縣不作著實工夫狼狽至如此如何著力辟置之說臨難苟免尤爲非義如何可萌此意况未有可求處耶子耕得近信否所苦如何想巳向安如今後生遲鈍者不濟事其開爽者又多􅕽於文采子耕近來覺向裏甚可喜也答徐斯逺彦章守舊說甚固乃是護惜巳見不肯自將來下毒手彈駁如人收得假金不敢試將火煆如此如何得長進僧家有琉璃瓶子禪之說正謂此耳答徐斯逺昌父志操文詞皆非流軰所及至此適值悲撓未能罄竭所懐然大槩亦巳言之不過欲其刋落枝葉就日用間深察義理之本然庶㡬有所据依以造實地不但爲騷人墨客而巳今渠所志雖不止此然猶覺有偏重之意切巳處却全未有所安也斯逺亦不可不知此意故此具報幸有以交相警切爲佳耳彦章議論雖有偏滯不通之病然其意思終是靠裏近實有受用處也答趙昌甫蕃斯逺殊可念吾人當此境界只有固窮兩字是著力處如其不然即墮坑落塹無有是處矣尤是文士巧於言語爲人所說易入邪徑如近世陳無已之不見章雷州吕居仁之不答梁師成盖絶無而僅有之爲可貴也答徐彦章承喻諄複益見精詣鄙意竊謂未發之前固不可謂之無物但便謂情性無二更無虚静時節則不可耳盖未發之前萬理皆具然乃虚中之實静中之動渾然未有形影著莫故謂之中及其巳發然後所具之實理乃行乎動者之中耳來喻本欲自抜於異端然却有侵過界分處而主張太過氣象急迫無沈浸醲郁之味尤非小失碩且寛平其心涵泳此理而徐剖折於毫釐之際然後乃爲真知儒佛之邪正不必如是之迫切也前日見論語說中破伊川先生孝悌爲仁之本之說此正是於情性之際未能分别恐當更加玩味未可率然立論輕詆前賢也致中和一節亦告深思毋以先入之說爲主幸甚甚幸答徐彦章示喻主善之云甚佳但善中有動静二者相對而言則静者爲主而動者爲客此天地隂陽自然之理不可以寂滅之嫌而廢也更望虚心平氣徐以思之乆必有合矣若固執舊聞舉一廢百懼非所以進於日新也答徐彦章熹前日拜狀而還信巳行遂不得附深負不敏之愧兩日偶㸔經說有疑義數條别𥿄奉扣并前書送令郎處尋便附致幸反復之使得以致思爲望說中中和動静尤是大義此處一差非唯錯㑹經㫖且於道體便不分明而日用工夫常有急迫之意無深沉安静氣象恐不可草草放過也答徐彦章論經說所疑純於善而無間斷之謂一此語甚善但所論老釋之病體用之說則恐未然盖老釋之病在於彖曰反復其道當連下句日月寒暑晦明可言反復死無復生之理今作一例推說恐墯於釋氏輪廻之論天地之心與赤子之心恐更有啇量程子與呂與叔問答可見請試詳之中行獨復合内外之道以下未曉其說恐是筆誤不然則爲說太髙爻之時義學之等級似皆未契一陽來復與雷在地中只是一義盖陽生於閉藏之中至㣲而未可有爲之時也今曰不拘乎一則以二者各爲一義矣恐未安也然必有事焉此句未曉時習謹獨即所謂有事今乃中間下一然字則似以事字爲工夫之條目矣恐或未然孟子說中已别論矣不勉而中之中以未發言恐未安此中字却是發而無過不及之中聖人之心當發而發不待著力而自無過與不及之差非謂不待著力而常不發也誠由動言亦未安謂未動之時未嘗有誠可乎中者無過不及之謂又曰和者中之異名若就厭動而求静有體而無用耳至於分别體用乃物理之固然非彼之私言也求之吾書雖無體用之云然其曰寂然而未發者固體之謂也其曰感通而方發者固用之謂也且今之所謂一者其間固有動静之殊則亦豈能無體用之分哉非曰純於善而無間斷則遂晝度夜思無一息之暫停也彼其外物不接内欲不萌之際心體湛然萬理皆備是乃所以爲純於善而無間斷之本也今不察此而又不能廢夫寂然不動之說顧獨詆老釋以寂然爲宗無乃自相矛盾邪大抵老釋說於静而欲無天下之動是猶常寐不覺而棄有用於無用聖賢固弗爲也今說於動而欲無天下之静是猶常行不止雖勞而不得息聖賢亦弗能也盖其失雖有彼此之殊其倚於一偏而非天下之正理則一而巳嗚呼學者能知一隂一陽一動一静之可以相勝而不能相無又知静者爲主而動者爲客焉則庶乎其不昧於道體而日用之間有以用其力耳爲上爲徳爲下爲民七世之廟萬夫之長說皆未安巳發處言之則可盖所謂時中也若就未發處言之則中只是未有偏倚之意亦與和字地位不同矣未發只是未應物時雖市并販夫厮役賤隷亦不無此等時節如何諱得方此之時固未有物欲泥沙之汨然發而中節則雖應於物亦未嘗有所汨直是發不中節方有所汨若謂未汨時全是未發巳汨後便是巳發即喜怒哀樂之發永無中節之時矣恐不然也於本有操持涵飬之功便是静中工夫所謂静必有事者固未嘗有所動也但當動不動動必中節非如釋氏之務於常寂耳尊德性以下皆至徳之方語似未瑩大抵發育峻極三千三百皆至道其人則至徳之人也此五句皆所以修至徳而凝至道也尊徳性所以充其發育峻極之大道問學所以盡其三千三百之小下句放此以其大小兼該精粗不二故居上居下有道無道無所不宜非止爲知禮也中庸二字各有所主以爲異名亦未安也明道中庸說問之前軰乃吕與叔後來傳者之誤也天地之大以下所說與上文不連貫察著也謂與察於人倫之察同亦未安鳶飛魚躍咸其自爾將誰使察之耶有察之者便不活潑潑地矣所求乎子句以事父未能也句主意立文皆與大學絜矩一節相似人多誤讀今詳來說似亦可疑明則動動以下當從程子說皆以他人而言孟子在下位一章全用中庸語其曰至誠而不動者未之有也即謂此也大哉聖人之道以下至其此之謂歟别是一章知化育不必言如乾知太始之知反古之道以下文考之非不師古之謂也三重當從吕氏說下焉者若謂衰周以下恐當善字不得湏别有說矣孟子之不動心當從程子能無畏難而動其心乎之說則一章之指首尾貫通矣丑非疑孟子以得位爲樂而動其心故孟子所答之意亦不爲此詳味可見矣量敵慮勝是孟施舎譏他人不能無懼之言縮直也儀禮禮記多有此字毎與衡字作對下文直飬之說盖本於此乃一章大指所繫不可失也必有事焉如言有事于上帝有事於顓臾之類非是用力之地乃言湏當用力也正者等待期望之意與春秋傳師出不正反戰不正勝之正同古注以望字釋之是也忘者失其所有事助長者望之不至而作爲奮迅以増益之也告子論性五說是同是别生之謂性其義如何七月一詩而備三體乃鄭氏不逹周禮籥章之義而生此鑿說不足據信今考周禮不遺餘力而反信此何耶關雎之淑女似指嬪御恐非詩意中即和也和即中也此語已辨於前恐更湏子細不可如此草畧說過分體用者未必誤學者却恐爲此說者能自誤耳皇極立之於此四方之所取正此說甚善但不知所謂絜矩者其義云何據此皇極與所悪於上無以使下一節之意似不同也答包定之近聞永嘉有回禄之災髙居不至驚恐否講習家庭得以從事於孝恭友弟之實非行思坐誦空言之比也然操索涵泳又不可廢不審所讀何書更能温習論語并觀孟子尚書之屬反復諷誦於明白易曉處直截理㑹爲佳切忌穿鑿屈曲纒繞也陳國録俆太丞諸公曽相見否亦頗得同志相與切磋否此間今年朋友徃來不定講學殊無頭緒甚思定之用意精宻不易得也千萬勉􅏧以慰逺懐朱文公文集第五十四卷後考異答項平父又復將此草本復一作便答傳子淵前日之論前日一作日前答希吕性命計耳命下有一之字答徐斯逺却全未有所安却一作都答徐彦章操持涵飬一作涵飬操持福州府儒學訓導鄭璉校
