外切慮其間有上户却將濕惡粗糙米穀赴場出糶有誤民間食用合行下三縣如有上户津般到濕惡粗糙榖米即仰退回令上户津般堪好米穀出糶不得容令作弊并印榜曉示以上正月𥘉六日續置曆下場五日一次開具糶過米照對夲軍𬋩屬旱傷細民闕食巳行下三縣勸諭到上户承認賑糶米榖數目申軍使司巳關防措置約束事件置埸給曆下縣付人户差官監轄自今年正月為頭每五日一次賑糶切慮其間尚有人户不能措辦五日錢一頓收糴合續添賑糶曆一本立式行下三縣關報逐場如有人户願日赴場收糴米斛者即仰賫元立曆頭赴巡察官粘連印押付人户逐日收糴其有人户願依前五日一次赴埸收糴者即仰依巳行事件施行仍五日一次開具糶過米穀文帳供申正月八日行下普作賑濟兩日契勘本軍𬋩屬旱傷尤甚細民闕食巳行下三縣抄劄到闕食户口人數申軍及勸諭到上户張世亨等四名依格承認賑濟米共一萬九千石及依條取撥常平義倉米自淳熙八年正月以後緣管屬寒雪本軍行下屬縣將賑糶人户一例賑濟兩日正月八日帖都建昌縣再諭上户借貸米榖事契勘本軍𬋩屬去歲旱傷巳行下星子等三縣勸諭上户以所收米穀賑糶除認數外有餘剩米榖并不係勸諭賑糶米穀人家遞年多是春間將米榖等生放下户秋冬隨例收息今來上户以旱傷之故慮恐下户將來負欠不還官司不為受理仍以官司勸諭為詞不肯生放使下户用乏失業不便使司今凖淳熙四年十二月𥘉三日指揮節文諸人户賖糶米令欠户還米本外每斗收息五升其生放約秋成計本息還錢亦合一體施行如有施欠不還官為理索所貴兩無虧損合行下三縣散榜勸諭約束施行正月十九日再委官體訪場所合干人減尅等事契勘本軍𬋩下去歲旱傷巳行下三縣勸諭到上户賑糶米穀使司遂措置差官下縣分場監轄賑糶濟及帖縣官分定地頭巡察去訖切慮各縣逐場監糶濟官容縱合干等人減尅升斗及容上户將砂土碎截濕惡空殼米穀赴場中糶濟及巡察官不即前去巡察事屬不便就委官前去體訪如有似此違戾去處即具狀供申正月草二日申監司為賑糶場利害事件契勘本軍并𬋩屬諸縣去歲旱傷至甚細民闕食切慮人户逃移失業遂多方勸諭上户賑糶米榖并將見管常平米數行下分定置場去處官吏監轄糶濟應接細民食用今有下項利害事件合申諸監司正月草九日除本軍勸諭上户樁𬋩米數并於外州和糴及常平米糶濟應接𬋩內細民食用外近來續據人户陳訴當來抄劄漏落姓名及鄰路州軍流民前來逐食又不免行下𬋩屬多方存恤相度賑濟所費米斛比之元來計度數目大改增添而向去小熟日子尚遠切慮所樁米穀不能周給無可接續糶濟却致民間缺食事屬不便乞即撥米二三萬石應副接續糶濟如蒙允許即乞早賜行下取撥去處以慿差撥人船前去搬取本軍昨凖淳熙七年九月十三日勑中書門下省檢會昨凖乾道七年八月一日指揮立定勸諭上户賑糶濟格目給降付身輔授名目內無官人一千五百石輔進義校尉願輔不理選限將仕郎者聽二千石輔進武校尉如係進士免文解一次不係進士候到部與免短使一次四千石輔承信郎如係進士與輔上州文學五千石輔承節郎如係進士補迪功郎如是賑糶依此減半推賞又凖淳熙七年十月八日指揮節文賑糶米於市價減半錢數即照巳降指揮推賞本軍即巳備坐行下𬋩屬勸諭只據上户張世亨張邦獻劉師與黃澄四名承認依格賑濟本軍巳行具奏及申諸監司照會賑糶一項至今尚未有申到承認應格之人蓋緣本軍地瘠民貧除上項四家賑濟之外未有出得上件米榖減半出糶之人是到所認米穀數目不多有闕賑糶欲乞詳酌所申特賜敷奏乞將上户承認賑糶米價止令量減四分之一便與依格推賞却於所得官資比折錢數量展磨勘之類早賜行下勸諭增認庶使上户樂於就賞細民不致闕食今照𬋩屬近來不住有外州縣飢民流移入界夲軍巳行下諸縣存恤及委自當職官勸諭上户收充佃客借與空間屋宇許令請佃係官田土給與種糧趂春開耕如向去豐熟外州縣稅户前來識認官司不得受理如今來所招佃客將來衷私搬走回鄉即許元贍養稅户經所屬陳理官為差人前去追取押回斷罪交還及散榜鄉村遍行曉示外欲乞詳酌更申朝省明􅑙指揮行下庶幾州縣有所遵守不惟安集流民免致失所亦使開闢曠土供納稅賦實為利便二月一日申提舉司借米付人户築陂塘照對𬋩屬星子等三縣去歲旱傷尤甚緣田假多是高仰見𬋩陂塘多是穿漏是致旱死不住據𬋩屬星子都昌建昌人户經官陳乞借口糧修築陂塘本軍行下逐縣委自知縣躬親前去𬋩下逐一驗視所𬋩陂塘如有穿漏及開掘即仰一面計度合用工數供報提舉司乞支撥米斛巳蒙提舉衙回牒指揮支撥保借常平司六百五十四石正月草九日施行闕食未盡抄劄人等事照對本軍𬋩下三縣諸鄉保正當來受情不行依公抄劄闕食人户多將得過隱實之人抄作闕食其實是闕食人户却不抄劄未欲便行追究合行約束仰隅官保正照應本縣巡察官所行事理須𬋩從實隨門再行審實抄劄闕食人户若保正依前滅裂不即同隅官抄劄及將元冒濫人蓋庇或在鄉乞覔人户分文錢物仰隅官具狀陳訴切待追究重作施行有當來不應抄劄隱實有營運物業之家及上户自能贍給地客見執使軍曆頭之人仰隅官保正追收繳納若顔情蓋庇不即追納别致人户陳訴或覺察得知必定重作行遣有委是闕食人户隅官保正不為抄劄或保正等乞覔搔擾仰被擾人户不拘早晚赴本軍陳告切待重作行遣有得過人户妄稱闕食陳乞給曆紊煩官司之人定當追妝赴軍重斷有合追收元給文曆人户輒敢倚恃猾健訟把持不伏追收仰隅官保正具狀陳訴切待重作行遣仰屬縣逐鄉隅官保正從實再行審實抄劄到闕食人户切待委官躬親下鄉隨門審實如再有不實仍前泛濫去處必定追收犯人赴軍定送獄根勘情弊施行以上二月十八日審實糶濟約束照對巳行帖逐縣審實糶濟事件切慮各鄉隅官保正不依所行約束别致引惹詞訴事屬不便合帖屬縣再行約束開具供申各鄉有營運店業興盛之家其元給曆頭合行追取若雖有些小店業買賣微細不能贍給巳請曆頭不合追回如有似此未係抄劄之人亦請今隅官保正從實根括施行毋至泛濫各鄉上户地客如主家自能贍給其元給曆頭合行追收如主家見自闕食不能贍給雖是地客亦合給曆如有似此之人即請隅官保正從實根括毋致泛濫各鄉人户如將户名及第行重賫請去曆頭合行追回如是只用第行雖不用户名實非重疊其巳請曆不合追取人户巳請曆頭如有虛增口數今來核實合行減退即請於曆頭并總簿內分明改正縣市一上等有店業日逐買賣營運興盛及自有稅産贍給不合請給曆頭人户若干開具坊巷逐户姓名大小口數一中等得過之家并公人等合赴縣倉糴米人若干開具坊巷逐户姓名大小口數一下等貧乏小經紀人及雖有些小店業買賣不多并極貧秀才合請曆頭人户若干開具坊巷逐户姓名大小口數以上二月十八日施行權免和糴令客米從便往來本軍旱傷遂支撥官錢委官在軍置場和糴客人米斛循環糶糴應接民間食用及本軍勸諭到上户承認糶米斛并差公吏前去收糴到米斛樁𬋩賑糶濟不闕所有元置和糴賑糶場合權行住糴客人米斛及出榜曉示從便上下出糶免糶客米三分照對本軍去歲旱傷細民闕食遂行措置場和糴客旅米斛三分應接食用今來賑糶濟米數不闕巳行住糴合行散榜上流州軍客旅通知旅行許令人户借貸官司米榖充種子布種照對𬋩下三縣去歲旱傷至重本軍巳行措置賑糶賑濟近來節次據人户經軍陳狀因旱傷目今布種是時闕少種糧乞行借貸常平米斛布田軍司巳行下各縣相度依條施行去訖未據申到今檢凖常平免役令諸災傷計一縣板稅七分以上第四等以下户乏種食者雖舊有欠閣不以月分聽結保貸借米榖不堪充種子紐直以錢各二貫石給限半年隨稅納仍免息利豫以應支數保明申提舉司行訖申尚書户部雖計一縣放稅不及七分而本户稅及七分者凖此今來除星子知縣一靣究實相度依條借貸外所有都建昌縣合委官同各縣知佐相度究見𬋩下第四等以下户委實闕乏種食之人各令結保依條施行二月草七日刋不係賑濟人一例賑濟契勘去歲旱傷細民闕食使軍巳行勸諭到上户承認糶濟米穀及有上户自能贍給佃地客户口外使軍巳印牌曆付闕食人赴場賑糶濟除將見有牌曆合糶濟人户普行賑濟外其上户贍給地佃等日前除豁不係賑糶之人亦行抄劄一例賑濟一十三日自三月十一日為頭將張世亨等所認米及取撥常平米普行賑濟務要實惠二月三日行下各縣抄劄户口并立支米榖正數契勘所支賑糶米緣三縣各鄉間有數户抄劄口數太多恐未盡實合委官與縣官評議豫將所支米穀立定正數賑濟施行二十口以上每户支榖止於五石二十口以下十五口以上每户支穀止於四石二十五口以下計口計日支給如𬋩榖四石以上所支亦止於四石三月十六日都昌縣搬張劉二家米等事照對都昌縣止勸諭到黃澄一名承認賑濟米五千石湊所𬋩義倉米會計賑濟不周夲軍遂行下建昌縣於張世亨劉師輿賑濟米內取撥四千石付都昌縣賑濟其合用顧舟水腳錢每石支錢三十五文省并每石支搬腳錢四十十文足今張劉二家差人搬簷就官請領顧錢並經都昌縣所𬋩常平米錢內支破三月十七日諸縣得米人户依時布種等事使軍近行下諸縣但係元給牌曆賑糶賑濟民户並以勸諭到張世亨黃澄劉將仕米及義倉米並行賑濟半月仰得米人户併力及時耕種田土如合干人減尅不行盡實給數即仰人户徑赴使軍陳訴切侍根究重作施行二月二十三日行下各場普濟半月外照約束接續照對使軍近將勸諭到上户黃澄張世亨等賑濟米斛自今年三月一日為頭普行賑濟通作一十五日今來相次了畢所有元勸諭到上户承認賑糴米斛合行依使軍先來約束接續賑糶應接細民食用閏三月三日委官核實四户賑濟米數縣官保明事照對去歲旱傷細民闕食勸諭到都昌建昌縣上户張世亨等四名共賑濟米一萬九千石本軍遂行措置相度地里逺近分作三十五場委官監轄賑濟及委官巡察近凖尚書省劄子檢會淳熙八年正月二十三日敕中書門下省勘會兩浙江東西湖北淮西州軍去年間有旱傷去處檢坐乾道七年內立定勸諭富室上户賑濟賑糴米斛賞格巳降指揮行下逐路施行近來逐路州軍雖有開具巳勸諭到賑濟賑糴數目緣無逐司保明是致推賞未得切慮因而滯留未稱勸賞之意正月二十三日三省同奉聖旨令逐路安撫轉運提學司各行下所部州縣將願出穀賑濟賑糴之家如有見得數目應格合行推賞即日下縣結罪保明申州州結罪保明申逐司仍仰逐司疾速連䘖保明申尚書省不得少有稽滯今有張世亨等所認賑濟米斛巳行普濟𬋩下闕食人户相次了畢未見逐縣知縣結罪保明申軍施行今帖委司法前去建昌都昌縣核實的確賑濟米穀數目結罪保明供申切待再行稽考施行閏三月三日移文江西通放客米及本軍糴米船事契勘本軍𬋩屬去歲旱傷細民闕食及無軍糧支遣本軍節次借撥官錢五萬三百四十四貫三百七十九文差撥公吏前去江西得熟州軍收糴到米共二萬三千五百二石二斗四升五合回軍賑糴及支遣軍糧并檢凖淳熙令諸米榖遇災傷官司不得禁止搬販及近降指揮州縣不許閉糴如有遏糴州軍許鄰州越訴又凖今年八月十九日聖旨指揮節文江東安撫使陳少保奏今歲災傷先合措置通放米斛州縣遏糴去處許人户經本司越訴遂移文江西轉運司安撫司并奉新縣等通放米船回軍賑糴支遣軍糧施行節次差公吏收糴并撥錢下賑糴場軍資庫錢共二萬一千三百六十二貫八百九十六文四千貫文省差劉京手分盧文彬𬋩押於去年七月十六日前去隆興府𬋩下常池市收糴到米二千三百一十六石九斗六升於八月二十一日到建昌縣交缷賑糶四千貫文省差衙前楊發手分朱綬於去年七月十八日前去隆興府𬋩下進賢縣收糴到米一千九百二十一石八斗一升并榖一百五十八石五斗至十月𥘉九日回軍城下省倉交量米七百九十石都昌縣交量米八百二十一石三斗一升星子縣交量米二百一十石五斗榖一百五十八石五斗一百七十一貫二百文省揍依折帛錢共四千貫差衙前吕祺手分熊瑜𬋩押於去年七月二十九日𬋩押前去收糴二千貫省差衙前吕祺往隆興府𬋩下奉新縣收糴到米七百四十九石六斗於三月十一日回軍九千八十二貫一百一十九文省於去年八月二十五日巳後節次支付在賑糴場收糴米係在後項聲説正支錢二千七百一十二貫文轉支收到公吏糴米剩到錢共六千二百七十貫一百一十九文四百八十貫七十七文省係轉支糴米回納錢付楊發收糴其米在後項聲説一千貫文省支付朱彥俊糴米其米在後項聲説一千六百二十九貫五百文省揍折帛錢共四千貫付衙前謝安道職級高宗選𬋩押於去年七月二十九日往下項去處收糴安一千八百二十六石一升五合於十一月𥘉八日回軍隆興府奉新縣糴到米一千一百六十九石五斗六升五合淮南蘄州糴到米六百五十六石四斗五升折帛錢共二萬八千九貫二百一十文省係淳熙五年六年錢一千三百七十貫五百文省係六年分支付謝安道髙宗選收糴米其共糴到米巳在前項聲説三千八百二十八貫八百文省係六年分錢付吕祺熊瑜收糴米其米巳在前項聲説四千八百八十九貫九百一十文省付在軍賑糴場收糴米係在後項聲説五千貫係七年分錢差衙前孫燾職級江彥和𬋩押於十一月二十五日往隆興府拏湖收糴到米二千二百九十七石一斗六升於今年正月二十三日回軍五千貫文省差職級朱彥俊𬋩柙揍前項共六千貫文省於十一月二十三日往江西吉州收糴共二千八百五十石於今年三月二十九日回軍差機乳香度牒糯米夲錢共八千八百九十二貫二百七三文省四千貫差衙前王邦翰手分蔣安禮𬋩押於八月十五日往隆興府𬋩下常湖收糴米一千九百三十二石八斗九升至十一月二十四日回軍四千四百二十九貫二百七十三文省揍作前項錢共四千九百九貫三百五十文省𬋩押於十二月𥘉一日往隆興府奉新縣收糴二千三百賑濟孤老殘疾不能自存大人二百三十五口小兒一十奏乞推賞賑濟上户照會本軍去歲旱傷至重細民闕食及撥到常平米斛數目不多深恐行勸諭到𬋩屬上户承認米數賑食用續於去年十月十一日凖行符九月十六日辰時凖淳熙七年敕中書門下省檢凖乾道七年文訪聞湖南以下同十二月草八日約束止符本軍恭稟行下𬋩屬再行勸諭之人如願將來賑濟切待審究今來所降指揮格法推賞去後申數內勸諭到元認賑糴米稅户張世亨劉師輿進士張邦獻黃澄四名各情法賑濟內建昌縣稅户張世亨五千石乞輔承節郎進士張邦獻五千石乞輔迪功郎稅户劉師輿四千石乞輔承信郎并都昌縣待輔太學生黃澄五千石乞輔迪功郎奏施行本軍遂行下告示張伺候給曆付飢民及差官監轄賑濟巳於去年十二月二十八日先具奏聞及申夲路諸監司照會去訖續據𬋩屬星子都昌建昌三縣共抄劄闕食飢民二萬九千五百七十八户數內大人一十三萬七千六百七口小兒九萬二百七十六口夲軍各仰給曆頭牌靣置簿曆發送逐縣當職官給散付人户預於縣市及諸鄉均定去處共置三十五場分見見任寄居指使添差監押酒稅監廟等大小使臣共三十五員監轄賑糶賑濟及委縣官分場巡察年戢減尅乞覔之弊自淳熙八年正月𥘉一日為始今抄劄到闕食人户赴場賑糶其鰥寡孤獨之人即以常平米斛依法賑濟至正月內又緣雪寒行下屬縣將元係賑糶飢民用上伴張世亨黃澄等及常平義倉米一例賑濟兩日至三月內又慮飢民難得錢收糴米斛再自十一日為頭行下諸縣將巳給曆賑糶飢民一例普行賑濟一十三日通作半月又照約都昌縣止有黃澄一名承認賑濟五千石湊所𬋩義倉米會計賑濟不周本軍遂於建昌縣張世亨等賑濟米內撥未四千石本軍措置官錢和雇夫腳舟船裝發送都昌縣交𬋩分於置場去處責令監轄賑濟至閏三月十五日終節次據都昌縣建昌縣申到張世亨張邦獻劉師輿黃澄賑濟過米撮等共計一萬九千石星子縣元無勸諭到上户賑濟米斛即以常平義倉米斛依例普行賑濟外本軍節次行下都昌建昌知縣逐旋審究的實賑濟過張世亨黃澄等米數保明申軍去後據迪功郎監城下酒稅權都昌縣事孫僑通直郎知建昌縣事林叔坦狀保明到張世亨張邦獻劉師輿黃澄賑濟過米一萬九千石委是節次賑濟飢民食用之數即無冒濫本軍一靣委差從政郎本軍司法參軍陳祖永前去都建昌縣核實得張世亨張邦獻劉師輿黃澄賑濟米一萬九千石委是賑濟過的實之數本軍再行稽考别無冒濫保明是實本軍勘會得張世亨劉師輿各係稅户張邦獻係應舉習詩賦終場士人并黃澄係於淳熙四年秋試應舉習詩賦取中待輔太學生第十五名是實其張世亨張邦獻劉師輿黃澄賑濟過米數各應得近降指揮賞格數內稅户張世亨賑濟過米五千石合輔承節郎稅户劉師輿賑濟過米四千石合輔承信郎進士張邦獻賑濟過米五千石合輔迪功郎待輔太學生黃澄賑濟過米五千石合輔迪功郎除巳具申本路安撫司轉運司提舉司提刑司照會依條保奏推賞外欲望聖慈下所屬給降合得付身發下以慿給付張世亨等祗受謹録奏聞晦庵先生朱文公文别集卷之十終候官縣儒學訓導劉簮校晦庵先生朱文公續集卷第十答李孝述繼善問目燔之姪孝述嘗求夫心之為物竊見大學或問中論心處每每言虛言靈或言虛明或言神明孟子盡心注云心人之神明竊以為此等專指心之本體而言又見孟子舉心之存亡出入集注以為心之神明不測竊以為此兼言心之體用而盡其始終反覆變態之全夫其本體之通靈如此而其變態之神妙又如此則所以為是物者必不囿於形體而非粗淺血氣之為竊疑是人之一身神氣所聚所以謂之神舍人而無此則身與偶人相似必有此而後有精神知覺做得箇活物恐心又是身上精靈底物事不知可以如此看否孝述又嘗求所以存是心者竊見伊川言人心作主不定如破屋中禦冦又云如一箇翻車每每教學者做箇主或云立箇心又云人心須要定使他思時方思乃是明道亦云人有四百四病皆不由自家則是心須教由自家以此似見得心雖是活物神明不測然是自家身上物事所主在我收住後放去放去後又復收回自家可以自作主宰但患不自做主若自家主張著便在不主張著便走去及才尋求著又在故學者須自為之主使此心常有管攝方得又嘗求所以為主之實竊見伊川論如何為主敬而巳矣又似見得要自做主宰須是敬蓋敬便收束得來謹密正是著力做主處不敬便掉放踈散不復做主了孝述於存心功夫又粗見如此不知是否先生批云理固如此然須用其力不可只做好話説過又當有以培飬之然後積漸純熟向上有進步處孝述按大學章句云明德者人之所得乎天而虛靈不昧以具衆理而應萬事者也竊疑人得正且通之氣故心體中虛虛則靈如水之清火之明鑑之光皆是體虛所以透明心亦然濂溪云靜虛則明明則通似亦可見近驗之於心則日用間覺得一事纍心便有滯礙更不通快是以竊恐虛故靈心惟虛靈所以方寸之內體無不包用無不通能具衆理而應萬事但以氣稟物欲之私有以昏之而不得全其虛靈之本體故理之在是者遂有所蔽而應事接物亦皆雜以私欲不盡出於義理之正是無以具衆理而應萬事矣學者之學恐只是求去其氣稟物欲之昏以復其虛靈之全體蓋心既虛靈則寂然不動感而遂通於所謂具衆理而應萬事者得矣是以大學之教以明明德為主章句或問之言明德必以虛靈為質其言明德功夫又不過欲全其虛靈之體言存飬則曰聖人設教使人默識此心之靈而存之於端莊靜一之中言格物致知則曰人心之靈莫不有知而欲其表裏洞然無所不盡言誠意則曰人之本心至虛至靈衆理畢具而欲其應物皆由此心以發而無所雜言正心則曰心之本體湛然虛明而欲其順應事物而無所動言修身則曰隨事省察之以審其當然之則似亦主虛靈者為説徹頭徹尾許多功夫皆欲全此心之虛靈以融會衆理酬酢萬事而巳以此觀之恐虛靈不昧乃心之所以為心而聖學之基本也不知是否先生批云同上孝述覺得間嘗心存時神氣清爽是時視必明聽必聰言則有倫動則有序有思慮則必專一若身無所事則一身之內如鼻息出入之粗細緩急血脈流行間或凝滯者而有纎微疾癢之處無不分明覺得當時别是一般精神如醉醒寐覺不知可以言心存否先生批云理固如此然亦不可如此屑屑計功效也孝述自覺心放時精神出外更不自知如夢然才知得放時即是心便不放了如知得夢時即是夢覺孔子言我欲仁便是仁至似亦此意故日用間覺得直須謹操持勤檢點蓋操持容有懈時若不測地猛省起來則其懈時之放自不得逺去且不得久去如此維繫之久恐此心只得住裏面如欲睡底人須自家打起精神不可放倒間或精神倦時不覺坐睡又自家擺灑起來不容睡著每每如此自是睡不得愚見如此不知是否先生批云是是但説太多了孝述謂健有為順無為二者隂陽動靜之分仁禮之為健義智之為順竊疑仁之發即有怵惕惻隱之意動於中頑然不動即為不仁禮之行即有恭敬辭遜之容著於外故仁恐為動之始動靜恐皆以漸致猶春之生物萌芽甲拆方動而微禮恐為動之極猶夏之長物而長短小大莫不盡見義則所以制仁禮之宜蓋即其中而為之裁制使隆殺厚薄各適其分似有裁節又收斂之意雖略有所為其亦嚴且約矣智但分别是非當否略無作為又所以為動之本而仁禮之所由發也故義恐為靜之始猶秋之收而去華就實智恐為靜之極猶冬之藏而歸根復命妄意推測如此不知是否先生批云此元亨利貞所以如循環之無端也橫渠先生曰虛靜者仁之本亦此意孝述又見先生答黃寺丞健順仁義禮智之問云有分而言之者有合而言之者孝述於分而言者巳隨愚見陳於上矣復以合而言者求之竊意仁義禮智若以用言則有有為者有無為者故仁禮為健義智為順若論其所以為是四者之實則仁是人之不忍之心似有柔順之意禮之品節一定而不可易似有隂靜之意二者恐是健中有順義之裁制方嚴似有剛斷之意智之周流不滯似有陽動之意二者恐是順中有健於此可見隂陽本不相離之意不知是否先生批云當時之意恐謂分則為四合則為二耳然如所説又自是一意即所謂水隂根陽火陽根隂者孝述又謂木火之為陽動金之為隂靜皆可言若水當為隂靜之極然水流而不息未見所以為至靜處不知當於何處觀之先生批云水寒火熱水下火上其為動靜之分者明矣孝述妄謂五常是五行之德五行之氣其行於天者固未易見若質之在地者竊疑與德之在人者無往而不相配今隨愚陋所見言之五常之未發則本體中存恐如木之在山火之在燧金之在礦水之在地土之未動及其既發而有惻隱羞惡恭敬是非誠實之情恐如火之出而炎上水之流而潤下及由其情充積成行如仁之為孝為弟為睦為姻之類恐如木之為棟梁欀桷火之為燈燭炬燎金之為刀斧盤盞水之為池沼江海土之為磚瓦墻壁故五常之未發只可謂之五常而不可以萬行名及其發而成行隨在不同則各隨其所成之行名之而不得復以五常名矣恐如五行之未動只可謂之五行而不可以它物名及其動而為物有萬不同則各隨其所成之物名之而不得復以五行名矣但十其為五常之性也而萬行之理巳無不包及其為萬殊之行也而五常之體亦未嘗不存恐如五行之方具而萬用之質巳無不全及其為萬殊之用而五行之體亦未嘗不立極而言之則人道周乎四海無非五常之為如物充乎地上而無非五行之為凡此雖未知是否似皆説得去但木之曲直金之從革土之稼穡皆待人為而仁之惻隱義之羞惡信之誠實皆發於性之自然相配不得又土之稼穡與孝述所謂為瓦磚之類又説不上不知五行之與五常本不可如此牽合耶為復可以配説而未得其説耶仁之行固有可言若義禮智信之行皆未見其實然可指之目得非四者之行無往不在而不可一一強名耶區區求之而未得其説先生批云萬物雖不可以五行名然其分各有所屬則亦未離其類也萬行之於五常亦然從革曲直稼穡是其本性之發非人之所能為也若曰人為則胡不能使木從革而金曲直乎孝述妄謂仁義禮智之施恐皆自吾身始次親次民次物仁恐始於愛身禮恐始於敬身義恐始於制此身之冝智恐始於明此身之理蓋不愛其身則是自絶故必不愛親而亦無以愛親不敬其身則是自賤故必不敬親而亦無以敬親至於義智皆然妄意如此不知是否先生批云身者仁義禮智之主不可書書字疑當作言施由此始以有子孟子之言為仁之本仁義之實者觀之其當自親始可見矣孝述妄謂仁義禮智合而成行其發也竊疑先智次仁次禮次義且就身言之恐必知此身受形所自而四肢百骸血氣皆相貫屬吾所當愛然後有自愛之心知愛之而不忍傷則必敬之而不敢忽愛敬既生方可裁制其宜以全愛敬之道若獨指心而言亦恐必先知此心至靈至貴為一身之主然後自愛既愛之而不肯甘心放棄則必嚴敬自持而惟恐以慢易失之既愛既敬然後有可得而裁制者蓋愛而失宜則或至枯守不用而為虛無寂滅或只知飬護而不能痛自克治反非所以為愛敬而失宜則恐持之太甚而有把捉不定之患反不得其所以為敬此愛敬各有其冝而必有斷制之者然未愛未敬則恐無所施其裁制之道自暴自棄則又為復莊敬自重之心不知身心之當愛則恐雖可之而頑然不省豈復有自愛之意區區之愚所以疑是四者之發必有次第而不可棄也若未發之前則四者之體渾然在中不可謂先有此而後有彼但方發之際勢必必相示無雜然並發之理然知識一開則餘三者踵乎其後自有不容巳者是以既發之後則即其一行之中而四者之實無一不在以其本一理故也若以四時言之則恐智為冬藏仁為春生禮為夏長義為秋成歸藏者發生之本發生者長飬之漸而生長又所以為收成之體也夫四時者五氣之布五氣之生定於其初恐非至此而序生但氣之流布則其序必如是而後可然冬令既行則三時之斷起亦有不容遏者是以造化既成之後則即其一物之微而五氣之功無一不在以其本一氣故也以此觀之則仁義禮智合而成行其發之先後亦有可言者妄意如此不知是否先生批云此即前循環之説然説得太破碎又不好且靜以飬之可也大學或問云以理而言之則萬物一原固無人物貴賤之殊以其氣而言之云云是則所謂明德者也孝述竊疑人物之性有偏全之異者不知是受得本同但做處不同為復是受得本不同乎按伊川云天所賦為命物所受為性恐是受得巳不同蓋理之在天本只是一箇渾然全體但人物隨形而受故受得來别人得形氣之正故承當得盡物得形氣之偏故承當不盡偏底物事難為有全底道理孟子集注論生之謂性處云以理言之則仁義禮智之稟豈物之所得而全似亦此意人之形體受盡得這道理所以亦做得這道理盡物之形體受不盡這道理所以亦只隨其所受做得更就其做處言之人得形氣之正故心虛而體全心之知覺便周流貫徹在處通得去形之運動便千變萬化是般做得去是以於其理之精微知亦知得盡做亦做得盡人之所以可為堯舜可參天地皆為有此體質儘做得但患不為或為之而有不充却無不能之理孟子謂王之不王非不能是不為與所謂有是四端而自謂不能吾身不能居仁由義恐皆是安於不為者物得形氣之偏故心塞而體拘心之知覺便拘礙而不能通形之運動便短狹而不能周是以於此理之本體知亦知得淺狹做亦做得淺狹𬒳形氣局定更開不來所以求為人之所為不得如慈烏父子螻蟻君臣之類若論父子君臣之道豈止如慈烏螻蟻之為但此二物所知只止此所能亦止此更去不得了就其所得之分言之如此恐又是人與物做得别處然又有可疑者蓋物雖受此理不盡若隨其所受而發則仁義禮智須皆做得出來然所舉二物又每物只做得一般道理出不能相兼以通其全如此者恐是物所得之理既不能盡其全體又為氣昏隔在裏面發處復不能充其所得之分劑是則容有得為而未為者此二物又是昏塞中各有一點明處所以各發得一般道理特特著見於其他道理便全微了至其餘物又或不能爾此可見物之氣稟又自有不齊處此等性命之説固不當妄意揣量然須略識其梗槩方得隨所見寫呈乞賜開示大端使知所向而求之庶乎其略識矣先生批云既是不曽受得自是不能做得更不須説然橫渠先生亦説人有近物之性物有近人之性者又是一理如貓相乳之類溫公集中亦説有一貓如此而加異焉此其賦性之近人而或過之但為形所拘耳亦可悲也又云然於其正且通之中又或不無清濁善惡之異故其所賦之質又有智愚賢不肖之殊孝述竊謂隂陽五行揔其大全而言之則恐同出一本而人物均稟焉所謂人物之生必得是氣然後有以為百骸九竅五藏之身是也若别其體則恐一氣之中有偏正兩等而為人物貴賤之分所謂得其正且通者為人得其偏且塞者為物是也至極其變則恐偏正之中又自萬殊而為人品物品之分所謂於其正且通之中又不無清濁美惡之異故其所賦之質又有智愚賢不肖之殊者是言人品之異也蓋體之既分則固一定而不可易矣然恐是氣之運一息不留所以俄頃之間變為萬狀彼人物之生各隨其所值以為體是固不能齊也但用變而體不變故人之所稟雖或至濁至惡而所謂正且通者未嘗不在而其為濁惡又自是一般與餘氣之濁惡不同以其是正且通之濁惡故其濁惡澄之為清其惡可易之為美既清既美則所謂正且通者即得其本然之正矣鳥獸草木各以類分而每類中又有等色不同然其形聲臭味各不能變其本體則亦與人相似但人能自化物不能自化耳妄意推測如此不知是否先生批云此大槩然矣亦冝并以上章之意推之孝𫐠謂美惡恐即通書所謂剛柔善惡竊疑清濁以氣言剛柔美惡以氣之為質言清濁恐屬天剛柔美惡恐屬地清濁屬知美惡屬才清濁分智愚美惡分賢不肖上智則清之純而無不美大賢則美之全而無不清上智恐以清言大賢恐以美言其實未嘗有偏若中庸稱舜知回賢是也下此則所謂智者是得清之多而或不足於美所謂賢者是得剛柔一偏之善而或不足於清於是始有賢智之偏故其智不得為上智其賢不得為大賢雖愚不肖恐亦自有等差蓋清濁美惡似為氣質中隂陽之分陽清隂濁陽善隂惡故其氣錯揉變而大要不過此四者但分數參互不齊遂有萬殊不知是否先生批云陳了翁云天氣而地質前輩巳有此説矣孝述又疑氣之始有清無濁有美無惡濁者清之變惡者美之變以其本清本美故可易之以反其本然則所謂變化氣質者似亦所以復其初也不知是否先生批云氣之始固無不善然騰倒到今日則其雜也久矣但其運行交錯則其美惡却各自有會處此上智下愚之所以分也又云然而本明之體得之於天終有不可得而昧者云云所以使之即其所飬之中因其所發而啓其明之之端也孝述竊謂覺是人之本心不容泯沒故乘間發見之時直是昭著不與物雜於此而自識則本心之體即得其真矣上蔡謂人須是識其真心竊恐謂此然此恐亦隨在而有蓋此心或昭著於燕間靜一之時如孟子言平旦之氣或發見於事物感動之際如孟子言人乍見孺子將入井皆有驚惕惻隱之心或求之文字而怡然有得如伊川先生所謂有讀論了後其中得一兩句喜者或索之講論而恍然有悟如夷子聞孟子極論一本之説遂憮然為間而受命凡此恐皆是覺處若素未有覺之前但以為巳有是心而求以存之恐昏隔在此不知實為何物必至覺時方始識其所以為心者既嘗識之則恐不肯甘心以其虛明不昧之體迷溺於卑汙苟賤之中此所以汲汲求明益不能巳而其心路巳開亦自有可進步處與夫茫然未識趣者大不侔矣故孝述竊疑覺為小學大學相承之機不知是否先生批云所論甚精但覺似少渾厚之意知止而后有定定而后能靜靜而后能安安而后能慮慮而后能得孝述謹按章句以物格知至為知止意誠以下為得所止又或問以定靜安為知之所以得之故孝述竊疑定靜安在物格知至之後意誠以下六事未然之前慮則在意誠以下六事將然之際如此言之則定靜安慮在知止得止之間似皆有可實之處不知可否先生批云解中似巳有此意矣孝述又按或問云不有以知其所當止之地則不能有以得其所當止者而止之又云知是知其至善之所在得是得其所止之地而止之孝述竊疑知是知之在彼得是得之在我得則心理俱融理為我有得恐亦只是知不可便指為巳止其處但恐知虛而得實才得之則身亦隨之矣妄意如此不知是否先生批云知與得兩事經文可見孝述竊疑既知之後復有所謂慮而後得者恐知是知之至慮是審之詳夫物格知至則萬理貫通固無不知其至善之所在然恐身有未接則其義理精微容有毫釐之未察或所接之際事復異宜故必於此精加審慮然後始無纎微滲漏之處此知後必慮然後為審不知是否先生批云定靜安是未有事時􅎍次灑然慮是正與事接處對同勘合也致知在格物孝述竊謂人之本心至虛至靈無所不照但以氣稟物欲有以蔽之是以其明不能不昏欲開其明須藉事物之實以運其知思然後其明有可通之理蓋心既有蔽無從下手以開之所以窮究物理者恐是因窮究其所未知而將此心戞刮擦磨治其粗鄙而反覆往來求出其明是以研窮之深其明必將穿漏而出而物之理亦無所遁矣此其所以能格也伊川先生曰思曰睿思慮久後睿自然生又曰致思如掘井初有渾水久後稍引動得清者出來久自明快其説似皆以為人心之明既有所蔽須即事致思然後其明自出孝述恐所謂致知在格物者亦有此意蓋窮至事物之理即所以推極吾之知識也不知是否先生批云理有未明則見物而不見理理無不盡則見理而不見物不見理故心為物蔽而知有不極不見物故知無所蔽而心得其全孝述竊疑心具衆理心雖昏蔽而所具之理未嘗不在但當其蔽隔之時心自為心理自為理不相贅屬如二物未格便覺此一物之理與二不恨入似為心外之理而吾心邀然無之及既格之便覺彼物之理為吾心素有之物夫理在吾心不以未知而無不以既知而有然則所以若內若外者豈其見之異耶抑亦本無此事而孝述所見之謬耶先生批云極是或問云或考之事為之著或察之念慮之微孝述竊謂事為是身之所履善行之著處念慮是心之所發善端之萌處於此考察則心亦不遺可以得理之真實然當事為念慮之時又欲著心考察則是一心二用互有妨礙似難於著力然或問又云人之明德全體大用無時不發見於日用之間人惟不察乎此是以汩於人欲而不知所以自明孟子集注云衆人雖有不忍人之心然物欲害之存焉者寡故不能察識而推之政事之間則又似必著意體察然後有見孝述恐所謂考察是此心常常反求不教外馳心存而不外馳則精神知覺常只照管自家步步不離所以事為之形念慮之起自然默有所見若此心尋常逐外不自管顧則雖間或真心見前亦不知其所發非是臨時以此心為之而又以此心察之也若齊王愛牛孟子屢發之使反求其所以然却在既發之後儘可著力追求意不相妨恐又與當事體察不同以此觀之則此所謂考察既以當事言則似不可重看孝述愚見如此不知是否先生批云不必如此説只是隨處理會是與不是以為取舍向背之決耳又云昔聞延平先生之教云云雖其規模之大條理之密若不逮於程子孝述竊謂規模之大條理之密恐如序所論經文外有以極其規模之大而內有以盡其節目之詳者規模之大恐自積習既多然後脫然有貫通處以下四段即是蓋舉其始終全體而言條理之密恐自物必有理皆所當窮以下六假與前所謂讀書論人應事數端即是蓋備夫功夫項目而言之先生謂其為説逺近虛實大小精粗無不兼盡而復分先後緩急恐亦言其條理之密不知是否先生批云只是如此誠意孝述妄謂人之本心得之於天初無不善所以有不善者恐是人為逆之也誠以動靜驗之靜者天動者人是以靜則無不善動則常有不善使其如伊川所謂動以天焉則恐仍只是善奈何其不全以天而必雜以人遂流於不善今求其實而言之人心未發無為思則其本然之體渾然在此人更不曽動著似即南軒所謂天心者是時安得有不善來中庸所謂喜怒哀樂未發謂之中樂記所謂人生而靜天之性伊川所謂其本真而靜五性具焉又云喜怒哀樂未發何嘗不善又云心本善恐皆指此心而言也及其既發有思有為即屬之人既屬之人即是氣質為之若質純粹則惟其所發無往不與理俱故本然之性得以順逹而無害若有偏駁則其偏駁之發即與理相違至其知思嗜好感物而生者又多求快血氣之私而不由義理之節故夲具焉又每每為所拂害不得沛然順發曩時之善至是遂流於惡矣甚則窮人欲滅天理曩時之善盡反而純於惡中庸所謂發而皆中節謂之和樂記所謂感物而動性之欲以及夫好惡無節而天理滅孟子所謂人性之善猶水之就下其可使為不善猶水可使過顙在山濂溪所謂五性感動而善惡分明道所謂性善猶水之清其繼猶水之流有流至海而終不濁其次有逺近有多少清濁雖不同然非善與惡在性中為兩物相對各自出來伊川所謂其中動而七情出情蕩而性鑿又云發而中節則無往而不善又云發於思慮則有善有不善先生所謂心體本靜然亦不能不動其用固本無不善然亦能流而入不善見印行文集恐皆指心之動處言也夫靜則善動則有不善是心本善而人每拂之為不善聖人之所以有教衆人之所以有學恐只為此濂溪云聖人立教俾人自易其惡自至其中而止伊川云學問之道無他唯知其不善則速改以從善而巳橫渠云領惡而全好必由學又云為學大益在自求變化氣質則所謂教所謂學只是去其惡以全其善耳若其緊切著力處只在此心發動之初蓋私欲之根既埋伏在內不動則巳才動便牽引起來勢之所必然者真心之發其間當有私欲夾雜不能得純一此處雜了前靣便流行不去是以必於此處清本正源使人欲淨盡查滓不留則自此以往天理流行更無梗拂而於其本然者得矣學必以誠意為要竊恐謂此妄以或問之意如此推測是否先生批云説得太多然却未見誠字之意孝述按孟子言上世有見親暴露者其顙有泚而非為人泚中心逹於面目又云人乍見孺子將入井皆有怵惕惻隱之心非為內交要譽惡其聲而然竊以為此等是惻隱之心發得實處楊震莫夜遺之金而不受上蔡自負記問聞明道玩物喪志之譏遂汗流浹背面發赤竊以為此等是羞惡之心發得實處張湛居幽室必整遇妻子若嚴君竊以為此是恭敬之心發得實處孔子誨子路知之為知之不知為不知范氏云是曰是非曰非為直竊以為此是是非之心發得實處人心之發每每如此而無所雜方是意誠若見賢而不能舉舉而不能先見不善而不能退退而不能逺與第五倫兄子嘗病一夜十往退而安寢子有疾雖不視而竟夕不眠竊以為此等是意未誠處不知是否先生批云未親切孝述妄謂顔子之樂恐在克復之後巳過此關克盡巳私故日用間是這道理在胸中平鋪地順流將去無分毫私欲為之梗拂故不待勉強作為自無往而不與此理相周旋所以觸處皆樂雖行乎窮途逆境亦只如此曽不改吾樂焉曽晳之志恐是其胸中脫灑略無繫纍遐想其動靜語默之節了覆其所陳之志似把這道理做家常茶飯相似日用間只如此平平地順行將去似將使萬事萬物各止其所而吾心蕭然略不用意作為於其間亦見夫此理所在天然自有觸目皆然自可坦然順適不假作為故也如孝述自覺是𥘉學不曽窺見一分半分道理便妄自驚喜把來擡劵行時本不自在間只是分付著意似要於道理上加添些做與這氣象天淵不侔若曽晳可謂真知其為天理但伊川則謂其雖知之而未必實能為耳􅃮雕開之未能自信恐是正在此處著力過關未得竊疑其雖未盡見是理自然流行之妙而於本然實體固巳識之但恐識認未至真的又自度此心了他未下然亦可見其直要於打鬪處下死功夫勝過去不但及此而遂巳也孝述妄意揣料如此不知是否先生批云􅃮雕開恐不止如此孝述近來自覺此心分明如有物蒙蔽在內若以存飬言當其放時固是紛紛擾擾全無是處其知把捉時覺得此心在此不曽從他處去但依舊蕩漾湖塗蒙蒙然要光不能得光及至忽然清明時方是襟懷開爽耳目聰明氣象逈别若以窮格言當其求而不得時固是茫然無入處昏懵之極至反覆尋求以揣約得大意又依舊覺得隔了一重更發不破又至暫時看得發時方識認稍明心地方開若以誠意言則日用間身雖物接而此心頑然不動時是全然昏隔了有隨接便動時亦有徐徐略省而後動時動如在親前有愛心在長上之側有敬心但其愛敬意就間發得些又只據見在休了雖欲勉進自是做得來無意味是時心依舊昏有時忽地感悟動得别時其愛直是真切其敬直是嚴畏非有所強而自不能巳是時心方大明故存飬而至於心地明爽窮理而至於識認分明誠意而至於真心發見如此者極是少三者之中意誠時尤少每日省來覺得白日在夢明道先生所謂醉生夢死伊川先生所謂未知道者如醉人恐可説此雖知得是夢要教省只是不能得省如此者豈非質昏之甚而難開汚染之深而難滌耶仰惟先覺憐而教之無使終陷則不勝願幸先生批云但且著實持守不須如此想象計較作弄恐思慮過當别生病痛孝述又自覺質弱心極易動日用間才有小小得失便過喜過懼此心全體動了雖欲自家做主更做不在以至在喧雜繁擾之地多處置不下甚至於亂大槩覺是氣怯而志復無以帥之不知治此病痛孰為要切先生批云只此便是病根前説正慮其如此耳孝述曩以先兄在嫡未及有子而沒疑於所主蒙賜教云若巳立後則無此疑但復有曲折先兄嘗收一襁褓之子為嗣既沒孝述以其未勝喪又别無同居長上遂自主喪才兩月而此子卒曩時之問正此子巳卒之後孝述遂不曽言及先兄將葬孝述復求從兄之子為之後亦在襁褓孝述仍前自主祠板之題只從弟稱及領尊教始悟其非猶有不能勝喪之疑聞之伯量亦云嘗以此問先生先生答云有攝主又按喪大記云子幼則以衰抱之人為之拜是當以所立之子主喪而孝述為之攝自是即欲俟練祭換栗板時易題所稱復有他慮先兄之後固為宗子之子今既收立不知亦謂之嫡孫否若可為嫡孫則廟祭當使之主又未知襁褓之子即可主祭為復待其成人或稍長方可若即可主祭則今日祠板之變固合異日遷廟之稱矣如或未可則今日易從子稱異日復易從弟稱有瀆慢之嫌又按喪服小記云婦之喪虞卒哭其夫若子主之祔則舅主之所主不同而各有所冝既不嫌數更則異日再易祠板所稱恐亦無害又衆議以為必從幼子主之理勢方順孝述於換栗板日巳更稱矣不知是否先生批云攝主但主其事名則宗子主之不可易也細考曽子問諸説可見孝述又疑幼子若即可嗣主宗祀則異時納主恐即據主祀之子祧逺祖矣若未可主祀且從孝述主之則異時所納之主即為旁親不知旁親當别設位而有祧為復只祔于祖而無祧先生批云納主旁親之説未曉所謂可更詳之孝述議親十年展轉牽制尚未成畢老母欲令今冬畢親但先兄几筵未徹老母乃齊衰三年之服復有妨礙然主婚却是叔父欲姑從鄉俗就親不知可否若就畢挈歸凡百從殺衣服皆從素淡不知可否先生批云若叔父主婚即可娶婦無嫌禮律皆可考也但母在而叔父主婚恐亦未安可更詳考也孝述謹按禮壻將親迎父醮而命之今孝述父兄俱沒上惟母在旁尊有叔父不知往迎之時當受母命耶為復受叔父之命耶先生批云當受命於母然母既有服又似難行記得春秋隱二年公羊傳有母命其諸父兄而諸父兄以命使者之説恐可檢看為叔父稱母之命以命之否更詳之更以上條并考之孝述又按禮婦盥饋舅姑若舅巳沒不知可以叔父受盥饋禮否先生批云叔父無盥饋之文蓋與姑受禮禮相妨也母若有服則亦難行此禮要是本領未正百事俱礙耳晦庵先生朱文公續集卷之十閩縣學訓導何器校
