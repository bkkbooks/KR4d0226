body:
  text: 書問答一本作知舊門人問答答劉公度孟容示喻為學之意終覺有好高欲速之弊其説亦巳見令叔書中矣願更詳之講學不厭其詳凡天下事物之理方册聖賢之言皆須子細反覆究竟至於持守却無許多事若覺得未穩只有默默加功著力向前耳今聞廢書不講而反以持守之事為講説之資是乃兩失其宜下梢弄得無收殺只成得杜撰揑合而巳至謂彼中朋友只有季章一人可望此未論其許與之當否然其言之發亦太輕矣舊見公度不如此只此便是新學效驗向見伯恭説孔子順答魏王問天下之高士而曰世無其人此一句似全不是孔子家法此言有味願試思之如何答劉公度所喻世豈能人人同巳人人知巳在我者明瑩無瑕所益多矣此等言語殊不似聖賢意思無乃近日亦為異論漸染自私自利作此見解耶不知聖賢辨異論闢邪説如此之嚴者是為欲人人同巳人人知巳而發耶抑亦在我未能無瑕而猶有待於言語辨説耶今者紛紛正為論易西銘而發雖未免為失言之過然未嘗以此為悔也臨川近説愈肆荆舒祠記曽見之否此等議論皆學問偏枯見識昏昧之故而私意又從而激之若公度之説行則此等事都無人管恣意橫流矣試思之如何衡州之去為有邂逅政不須深自懲創便相學不説話也答劉公度建昌士子過此者多方究得彼中道理端的是異端誤人不少向見賢者亦頗好之近亦覺其非否書中所喻衡州數句為巳之意雖切然恐未免有迫切之病也答劉公度奮發猛舍之喻甚善然亦須以義理浸灌涵養庶幾可以深固久逺不然一時意氣恐未可恃也如何便敢自保不復變耶答劉公度見喻舊見不甚分明更欲别作家計未知底裏果是如何但此事别無竒妙只是見成説底便是道理只要虛心熟玩久之自然見得實處自是不容離叛便是到頭若更欲别求見解即是邪説鮮不流於異端矣君舉春間得書殊不可曉似都不曽見得實理只是要得雜博又不肯分明如此説破却欲包羅和會衆説不令相傷其實都曉不得衆説之是非得失自有合不得處也葉正則亦是如此可歎可歎答劉公度所論為學之意甚善𥘉蓋不能不以為疑今得如此甚慰意也究觀聖門教學循循有序無有合下先求頓悟之理但要持守省察漸久漸熟自然貫通即自有安穩受用處耳千岐萬徑雜物並出皆足以惑世誣民其信之者既陷於一偏而不可救其不信者又無正定趣向而泛濫於其間是亦何能為有亡耶平父相處覺得如何似亦未有箇立腳處也因書更勸勉之答劉仲升别𥿄所示季章議論殊不可曉恐不至如此之謬却是仲升聽得不分明記得不子細語脈間轉却他本意不然則真非吾之所敢知矣大抵學問專守文字但務存養者即不免有支離昏惰之病欲去此病則又不免有妄意躐等懸空杜撰之失而平日不曾子細玩索義理不識文字血脈别無證佐考驗但據一時自已偏見便自主張以為只有此理更無别法只有自巳更無他人只有剛猛剖決更無溫厚和平一向自以為是更不聽人説話此固未論其所説之是非而其粗厲激發已全不似聖賢氣象矣季章意思正是如此若只解義有差下字不穩猶未為深害却是人心道心思理思事等説大假害事若如其言即是四端之發皆屬人心而頑然不動者方是道心所謂格物者只是分别動與不動而不復計其動之是否矣此於體道之要入德之門皆有所妨決然不是道理無疑但如仲升則又墮在支離昏惰之域而所以攻彼者未必皆當於理彼等所以不服亦不可不自警省更就自已身心上做功夫凡一念慮一動作便須著實體認此是天理耶是人欲耶子細辨别勇猛斷置勿令差誤觀書論理亦當如此剖判自然不至似前悠悠度日矣所論語孟兩條亦似未安此等處且玩索見在意趣不須如此立説枉費心力也答劉仲升所諭玩味見成義理甚善然亦須就自已分上體當方見真實意味也顔子之樂原憲之問此等處説時各是一義其實却只是平日許多功夫到此成就見處通透無隔礙行處純熟無齟齬便自然快活自無克伐怨欲之根不是别有一項功夫理會此事也但未知仲升平日所用功夫如何耳此不可不勉也答劉季章劉袁州不謂遂止於此令人心折細讀來書知所以經紀其家者不以生死從違二其心不勝嘆服益見袁州之知人交道之不汚也更望始終此志使其後人有以承繼前人之志千萬之幸也文會規模只如舊耶或有小改易也此間朋友只令專一自看一書有疑問處却與商量似却不枉費功夫然亦未見卓然可望者殊可慮也答劉季章賢者比來為學如何雖未相見然覺得多是不曽寬著心胸細玩義理便要扭揑造作務為切已所以心意急迫而理未大明空自苦而無所得也熹桂林之行辭免未報未知竟如何此間有數士友講學方就緒從官未必有益若得免行成就得一二學者非小事也答劉季章講會想仍舊專看何書此書附廬陵葉尉渠此中人時有往來之便有疑可講不待靣諭但覺得季章意思急迫不寬平務高不務切而不肯平心實看道理只此意思亦殊礙人知見也答劉季章熹去嵗入都不能兩月略無報效罷遣而歸深以自愧今幸復得祠祿杜門養痾足以待盡無足言者但衰病愈甚左目巳盲其右亦昏此數日來幾全不見物矣深欲整頓舊書而病愈如此則所謂有輔於將來者亦不復可期矣答劉季璋所喻為學之意甚善但覺如此私下創立條貫太多指擬安排之心太重亦是大病子約自有此病賢者從來亦未免此今又相合打成一片恐非所以矯偏輔敝而趨於顯明正大之塗也聖賢教人自有成法其間又自有至簡約極明白處但於本原親切提撕直便向前著實進步自可平行直逹迤邐向上何必如此迂曲繚繞百種安排反令此心不虛轉見昏滯耶答劉季章辱書知所苦向安巳可行坐深以為慰比來想疆健勝前矣然計亦不能無廢書册之功但齋居謹疾當亦自有用心處也熹衰朽杜門無足言者但精神昏憊益甚於前雖不敢廢書然度不復能有長進矣外事絶不敢挂口但見朋友當此風頭多是立腳不住况欲望其負荷此道傳之方來應是難凖擬也可慮可慮答劉季章曽再到晉輔處否後生知所趣向亦不易得且勉與成就之令靠裏著實做工夫為佳季章近讀何書作何事業功夫意思比舊如何無疑亦久不得信不知後來於鄙説能信得及否近來福州得黃直卿南康得李敬子説誘得後生多有知趣鄉者雖未見得久逺如何然便覺得此箇氣脈未至斷絶將來萬一有可望者却是近上一種老成朋友若得回頭便可倚賴乃復安於舊習不肯放下深可歎惜耳益公聞甚康健終日應接不倦深為可喜熹則衰病日益沈痼死生常理無足深計但恨為學未副夙心目前文字可以隨分發明聖賢遺意垂示後來者筆削未定纂集未成不能不耿耿耳答劉季章王晉輔來求其尊人銘文久巳齰舌何敢為此以其再來不免題其行狀之後少答其意又慮其便欲刋刻流布則大不便巳作書力戒之矣渠又説欲得鄙文編次鋟木此雖未必果然亦不可有此聲恐渠後生未更事不識時勢不知此是大禍之機或致脫踈書中又不敢深説恐欲蓋而愈章敢煩為痛説此利害當此時節只得杜門讀書潛形匿迹豈可為此喧譁以自取禍耶况如老拙蹤迹又比仁里諸賢事體不同彼或可言而此但當默其理勢不難曉也只如今所題跋亦切不可便將出與人看又刻石鏤板二事并望痛為止之千萬至懇至懇此杜元凱所謂既作之後又復隱諱以避患者固為可笑然亦以子約之故無以答其意而浸淫至此全藉賢者相與致力遏其橫流千萬幸也答劉季章郊霈巳行不知黨錮諸人果得及雞竿下坐否所論配義與道其説甚當所以孟子下文便言是集義所生者此正如來喻之意也但子約終看不透殊不可曉前日巳為極力言之不知其信得及否也答劉季章省闈不合浩然西歸無愧於心所得多矣甚賀甚賀公度近亦得書自是不肯求去致得如此如近日王與之龜齡之子雷季仲陳和父皆以力請得去又何嘗有人苦留之也潘友者近亦遭逐正與公度事體一般此輩進不能為君子退不能為小人不與人出氣令人憤悶也子約想時相聚渠近書來頗能向裏用力然亦有小未善巳為詳説久之必自見得也景陽前此巳嘗附書今不暇再作煩為致意近日目昏今日又加手痛作字頗費力也承欲就文義事物上做功夫甚善然讀書且要虛心平氣隨他文義體當不可先立巳意作勢硬説只成杜撰不見聖賢本意也答劉季章晉輔亦開敏有志趣不易得但涉學尚淺志氣輕率須痛與切磨為佳耳大學中庸看得如何大學近修改一兩處旦夕須就板改定斷手即奉寄也比閲邸狀時論似寖平榛中蜿蜒稍稍引去但恐主人意不堅牢或有反覆即其禍愈甚耳答劉季章熹今年之病發作雖輕而日月甚久又氣體衰乏精神昏耗大與常年不同亦是年紀催促理應如此不足為怪但恨平生功夫只到此地頭前靣地步有餘而日月有限又不得與朋友之賢者相聚日夕切磋恐此意思一旦斷絶更為後賢之憂耳劉五十哥且得如此攛掇結裹向後事不可知但願前人遺德有以誘其衷者庶幾可望於後耳言之令人於邑短氣也時論靜作不常子夀事後又有舊爭之激其黨稍違忤者巳不能容旦夕必更有一畨聳動觀聽底事以扶國是覺得凛凛未知所稅駕處但朋友來者無可拒之理得早行遣了亦是一事收殺也子約幸逄寬恩且得有北歸之漸其實高安窮僻無朋友過從之益書疏往來之便却未必得如廬陵也益公寄惠六一集纂次讎正之功勤亦至矣古人所謂後世子雲者信非虛語然亦正自難遇耳答劉季章讀書只隨書文訓釋玩味意自深長今人却是背却經文橫生它説所以枉費工夫不見長進來喻似巳覺此病者更望勉􅏧千萬之望然又當以草略苟且為戒所謂隨看便起是非之心此句最説著讀書之病蓋理無不具一事必有兩途今才見彼説晝自家便尋夜底道理反之各説一邉互相逃閃更無了期今人問難往往類此甚可笑也答劉季章熹不免果如所料餘年無幾區區舊學足以自娛不能深以為念也若後假則安能保其必無耶所示五條各巳附以巳意大抵來喻於事理情實多是不曽究竟而專以輕重深淺為言故不親切更以此意推類求之則可見矣未盡善也注云舜之德性之也武王之德反之也故其實有不同者某竊謂反之雖異於性之然其至焉則一而巳使武王於反之之後猶有未盡查滓至於感格發露著干樂聲則其所反之工夫必有未盡之處矣樂觀其深矣若不見得性之反之之不同處又豈所謂聞其樂而知其德乎舜與武王固不待論今且論湯武則其反之至與未至恐須有别此等處雖非後學所敢輕議然今但細讀其書恐亦不待聞其樂而後知之也令尹子文之忠陳文子之清固非不仁者之所能為聖人特許其忠清而不許其仁今因夫子之不許其仁而遂疑二子之忠清未必皆出於理之所當然而猶未免乎怨悔之私則聖人之所以許之者亦有不盡之意矣二子忠清而未盡當理故但可謂之忠清而未得為仁此是就其事上著實研究出來若不如此看即不知忠清與仁有何分别此須做箇題目入思議始得未易如此草草説過也默而識之學而不厭誨人不倦注云三者巳非聖人之極至而猶不敢當然則彼所謂夫子既聖之論豈非極至歟詳本文之意説得雖輕然如此解得又似太過如何正為合若聖與仁一假看見得不厭不倦非極至處然夫子之不厭不倦又須與衆人不同故子貢公西華皆有云云之説可更詳之未可與權集注之末有云然以孟子嫂溺援之以手之義推之則權與經亦當有辨某竊謂天下之事只有一箇理所重在此則其理不外乎此當嫂溺之時只合援之以手雖出於急遽不得巳之為乃天理人事之不容巳者也今云有辨開此一線路恐學者因以藉口而小小走作不暇自顧矣如何既云急遽不得巳之為即是權不可常而經可常自有不容無辨處若只説權便是經都無分别却恐其弊不止開一線路而巳膚受之訴不行焉注云訴冤者急迫而切身則聽者不及致詳而發之暴矣某竊恐解得言詞太峻人非昏暴之甚亦未遽至此而乃云因子張之失而告之不惟形容得子張太過且言外求意亦非解經之體如何且論事理還是如此與否不須疑怕觸忤子張也答劉季章昨巳具前幅而細看來書方論董子功利之語而下句所説曽無疑事即依舊是功利之見蓋天下只有一理此是即彼非此非即彼是不容並立故古之聖賢心存目見只有義理都不見有利害可計較日用之間應事接物直是判斷得直截分明而推以及人吐心吐膽亦只如此更無回互若信得及即相與俱入聖賢之域若信不及即在我亦無為人謀而不盡底心而此理是非昭著明白今日此人雖信不及向後他人須有信得及底非但一時之計也若如此所論則在我者未免視人顔色之可否以為語默只此意思何由能使彼信得及乎然此亦無他只是自家看得道義自不曽端的故不能真知是非之辨而為此回枉不是説時病痛乃是見處病痛也試思之如何答劉季章孟子説未有仁而遺其親未有義而後其君便是仁義未嘗不利然董生却説正其義不謀其利明其道不計其功又是仁義未必皆利則自不免去彼而取此蓋孟子之言雖是理之自然然到直截剖判處却不若董生之有力也向聞餘論似多以利隨義而言今細思之恐意脈中帶得偏僻病患試更思之如何答劉季章近得益公書聞且寓晉輔家甚善所欲改字巳别報去前書竟未得下落也文集之議當巳罷止此實於彼無益而於此不便衰老扶病如此又豈能更去廣南行腳耶千萬力為止之更勉其著實為學勿為此等慕名徇外之事方是吾人氣象也來喻所云書能益人與否只在此心等説此又是病根不曽除得以鄙見觀之都無許多間説只著實依文句玩味意趣自深長不須如此又只是立説取勝也前與無疑書亦有少講論曽見之否敬子諸人却甚進此亦無他只是渠肯聽人説話依本分循次序平心看文字不敢如此走作間説耳大率江西人尚氣不肯隨人後凡事要自我出自由自在故不耐煩如此逐些理會須要立箇高論籠罩將去譬如讀書不肯從上至下逐字讀去只要從東至西一抹橫説乍看雖似新巧壓得人過然橫拗粗踈不成義理全然不是聖賢當來本説之意則於巳分究竟成得何事只如臨川前後一二公巨細雖有不同然原其所出則同是此一種見識可以為戒而不可學也因見無疑可出此𥿄大家評量趂此光隂未至晚暮之時做些著實基址積纍將去只將排比章句玩索文理底工夫換了許多杜撰計較别尋路脈底心力須是實有用力處久之自然心地平夷見理明徹庶幾此學有傳不至虛負平生也如於雅意尚未有契可更因書極論勿遽罷休乃所望也答劉季章熹再啓熹病愈甚遇寒尤劇如今日則全然轉動不得藥餌雖不敢廢然未必能取效姑復任之無計可為也所喻巳悉但所謂語句偶爾而實却不然者只此分踈便是舊病未除所謂誠於中形於外此又何可諱耶無疑之病亦是如此適答其書説得頗痛快可試取觀可見鄙意此不復縷縷也又謂病只在懶惰者亦只消得此一病便是無藥可醫人之所以懶惰只緣見此道理不透所以一向提掇不起若見得道理分明自住不得豈容更有懶惰時節耶所謂此外無難除之病者亦信未及况自以為無則其有者將至矣便敢如此斷置竊恐所以自省者亦太踈耳又謂海內善類消磨摧落之後所存無幾此誠可歎若鄙意則謂才見消磨得去此等人便不濟事若使真有所見實有下工夫處則便有鐵輪頂上轉旋亦如何動得他大學定本修換未畢俟得之即寄去王晉輔好且勸它莫𬋩他人是非長短得失且理會教自家道理分明是為急務此事之外不可使有毫髮雜用心處也然人要間𬋩亦只是見理不透無頓自巳身心處所以如此願更察此有以深矯揉之乃為佳耳年來頓覺衰憊殊甚死期將至而朋友間未有大可望者令人憂懼不知所以為懷季章千萬勉旃乃所深望答劉季章熹嵗前得益公書報吳伯豐病瘡甚危適得子約書乃聞其訃深為傷痛近年朋友讀書講學如此君者絶不易得此為可惜不但交逰之私情也聞後事深荷老兄與無疑周全之足見朋友之義答劉季章熹今春大病幾不能起今幸小康然尚未能平步也𥘉意若得未死且當屏棄書册虛心待盡今又覺不能頓爾捐去亦苦頭緒太多不是老年活計徐當以漸節減也益公清健可喜近答其書論范文正公墓碑事以病草草今始能究其説然自覺語言有過當處不知能不相怪否也伯豐𥘉亦不知其能自植立如此但見其於講論辦得下功剖析通貫非一時諸人所及心固期以逺到不謂乃止於此殊可痛惜今承來喻又得聞其後來所守之堅此尤不易吾道不幸遽失此人餘子紛紛才有毛髮利害便章皇失措進退無門亦何足為軒輊耶疾少間亦可漸理舊聞向前進步否慱文約禮不可偏廢雖孔子之教顔氏之學不過是此二事更惟勉旃乃所深望也答劉季章熹今年一病狼狽入夏方粗可支吾但衰憊殊甚講貫之樂只一二朋友在此訓導諸孫時時整頓得舊書訓詁間有差誤而巳禮書四散未得會聚參校其它亦更有合料理文字覺得精力不逮皆不復敢萌意矣賢者作何功夫因書幸及一二答劉季章禮書此數日來方得下手巳整頓得十餘篇但無人抄寫為撓蓋可借人處皆畏偽學之汚染而不肯借其力可以相助者又皆在逺而不副近急不免雇人寫但資用不饒無以奉此費耳答劉季章益公處所懇是先人墓碑幸垂念但行狀它人未見之更告為言及得不示外人為幸也又前書求精舍大字及呈一二文字語次幸并扣之大字願早拜賜鄙文幸痛掊擊也答許景陽一别十年彼此皆非復往時矣近見槐隂問答覺得所論皆太寬緩此非言語之病乃是用功處不緊切耳來書所論未發之中恐不如此似看得太過了只是此理對惡而言則謂之善對濁而言則謂之清對四旁而言則謂之中𥘉非有二物但唯聖人為能全之以致其用衆人則雖有而不能自知是以汨於物欲而亂之耳曽子之説似亦未然嘗謂夫子此機如決積水於千仭之壑故當時曽子一聞便透更無疑滯若如所喻則夫子方是教它曽子漸次消磨曽子元未及下功夫如何便應得箇唯字也此等處且宜虛心玩味不可輕易立説也與陳伯堅沙縣寄到新刻責沈文字畫精神非桂本之比此書流傳足使世之聾盲者有所警覺稍知觸淨非小輔也但恐木本或不耐久耳瓊學記文鄙拙不足有所發明亦緣韓兄將滿方遣人來恐其代去匆匆草成不能滿意耳垂喻舊書云云深愧率爾當時之言蓋亦有為而發以今觀之學者但當深窮聖經使其反之於心而安考之於經而合驗之於外而可行即彼之妄言一覽便破矣若未到此遽欲窮之恐如河南夫子所謂未必能窮而巳化為釋氏矣愚見如此不審尊意以為如何胡季隨近到此數日明敏有志甚可喜也答胡季履大壯向來雖幸一見然忽忽於今巳二十餘年矣時於朋友間得窺佳句足以見所存之一二顧未得會靣為歉耳今承惠問荷意良勤區區每患世衰道微士不知學其溺於卑陋者固無足言其有志於高逺者又或騖於虛名而不求古人為巳之實是以所求於人者甚重而所以自任者甚輕每念聖人樂取諸人以為善之意意其必有非苟然者恨不得與賢者共詳之也季隨明敏朋友中少見其比自惟衰墮豈足以副其逺來之意然亦不敢虛也歸日當相與講之有所未安却望見告得以反復為幸昆仲家學門庭非他人比而區區所望又特在於其實而不在於名願有以深察此意也答胡季隨大時易傳平淡縝密極好看然亦極難看大抵講學須先有一入頭處方好下工夫昨見文叔處所録近文恐看得文字未子細無意味也不必逺求但看知言是下多少工夫不如此散漫泛説無歸宿也龜山易舊亦有寫本此便不甚的未暇檢尋奉寄不知詹丈所舉不同者何事因風詳諭此等處正好商榷也道理無形影唯因事物言語乃可見得是非理會極子細即道理極精微古人所謂物格知至者不過是就此下功夫近日學者説得太高了意思都不確實不曽見理會得一書一事徹頭徹尾東邉綽得幾句西邉綽得幾句都不曽貫穿浹洽此是大病有志之士尤不可以不深戒也答胡季隨熹杜門衰病如昔但覺日前用力泛濫不甚切巳方與一二學者力加鞭約為克巳求仁之功亦粗有得力處也易傳且熟讀未論前聖作易本指且看得程先生意思亦大有益不必更雜看大抵先儒於易之文義多不得其綱領雖多看亦無益然此一事卒難盡説不若且看程傳道理却不錯也所諭文定專治春秋而於諸書循環誦讀以為學者讀書不必徹頭徹尾此殊不可曉既曰文定讀春秋徹頭徹尾則吾人亦豈可不然且又安知其於他書少日巳嘗反復研究得其指歸至於老年然後循環泛讀耶若其不能亦是讀得春秋徹頭徹尾有得力處方始泛讀諸書有歸宿處不然前輩用心篤實決不如今時後生貪多務得涉獵無根也前書鄙論更望熟究其説雖陋然却是三四十年身所親歷今日粗於文義不至大假差錯之效恐非一旦卒然立論所可破也若如來諭不能俟其徹頭徹尾乃是欲速好徑之尤此不可不深省而痛革之也熹於論孟大學中庸一生用功粗有成説然近日讀之一二大節目處猶有謬誤不住修削有時隨手又覺病生以此觀之此豈易事若只恃一時聰明才氣略看一過便謂事了豈不輕脫自誤之甚耶吕伯恭嘗言道理無窮學者先要不得有自足心此至論也幸試思之南軒文集方編得略就便可刋行最好是奏議文字及往還書中論時事處確實痛切今却未敢編入異時當以奏議自作一書而附論事書尺於其後勿令廣傳或世俗好惡稍衰乃可出之耳答胡季隨易傳明白無難看處但此是先生以天下許多道理散入六十四卦三百八十四爻之中將作易看即無意味須將來作事看即句句字字有用處耳詩六義本文極明白而自注疏以來汨之如將巳理之絲重加棼亂近世諸老先生亦殊不覺不知何故如此中間有答潘恭叔問説此甚詳可更扣之當見曲折蓋不如此即六義之名無所用之當時自不必分别祗益紛拏無輔於事也近修詩説别有一假今録去大概亦與前説相似恐或可參照耳學問大頭緒固要商量而似此枝節合理會者亦不為少未得面論徒增耿耿答胡季隨所示諸説似於中庸本文不曽虗心反覆詳玩章句之所絶文義之所指尚多未了而便欲任意立説展轉相高故其説支蔓纒繞了無歸宿莫若且就本文細看覺得章斷句絶文理分明即聖人指意所在與今日用力之方不待如此紛拏辨説而思巳過半矣叔恭所論似是見熹舊説而有此疑疑得大槩有理但曲折處有未盡耳當時舊説誠為有病後來多巳改定矣大抵其言道不可離可離非道是故君子戒愼乎其所不睹恐懼乎其所不聞乃是徹頭徹尾無時無處不下工夫欲其無須臾而離乎道也不睹不聞與獨字不同乃是言其戒懼之至無適不然雖是此等耳目不及無要緊處亦加照管如云聽於無聲視於無形非謂所聞見處却可闊略而特然於此加功也又言莫見乎隱莫顯乎微故君子謹其獨乃是上文全體工夫之中見得此處是一念起處萬事根原又更緊切故當於此加意省察欲其自隱而見自微而顯皆無人欲之私也觀兩莫字即見此處是念慮欲萌而天理人欲之幾最是緊切尤不可不下工處故於全體工夫之中就此更加省察然亦非必待其思慮巳萌而後别以一心察之蓋全體工夫既無間斷即就此處略加提撕便自無透漏也此是兩節文義不同詳略亦異前假中間著是故字後假中間又著故字各接上文以起下意前假即卒章所謂不動而敬不言而信後假即卒章所謂內省不疚無惡於志文義條理大小甚明從來説者多是不察將此兩假只作一假相纒説了便以戒愼恐懼不睹不聞為謹獨所以雜亂重復更説不行前後只是粗瞞過了子細理會便分疏不下也又季隨云純熟未易言也此語恐有病蓋季隨意間常説工夫極至之地窮高極逺決然是不可到如中間熹説讀書須是精熟季隨便云須如文定之於春秋方是精熟今豈易及亦是此意夫謂功夫極至之地如此之高如此之妙則是矜巳之獨能知此而以它人為不知也以為人不可到則是巳亦甘自處於不能也如此則凡講論皆是且做好話説過其與自謂吾身不能居仁由義者雖若有間然其實亦無以大相逺矣不除此病竊恐百事放倒都不到頭非是小失幸深省而痛矯之也又云方其未至純熟天理何嘗不可見乎此又不看本文本意而逞快鬪高隨語生説之過夫中庸本意欲人戒謹恐懼以存天理之實而巳非是教人揣摩想象以求見此理之影也伯夀下一見字巳是有病季隨又更節上生枝更不復以純熟自期只要就此未純熟處便見天理不知見得要作何用為説至此去本日逺以言乎經則非聖賢之本意以言乎學則無可用之實功如此講論恐徒紛擾無所輔於聞道入德之效也其他小節各具於所示本條之下幸更與諸君詳評之也答胡季隨戒懼者以涵養於喜怒哀樂未發之前當此之時寂然不動只下得涵養功夫涵養者所以存天理也愼獨者所以省察於喜怒哀樂巳發之後當此之時一毫放過則流於欲矣判别義利全在此時省察者所以遏人欲也巳發之後蓋指巳發之時對未發而言故云巳發之後不知經意與日用之工是如此否友恭字恭叔此説甚善惟能加涵養之功則自然有省察之實周椿伯夀此説好然説未透戒懼乃所以愼獨也涵養省察之際皆所當然未發之前不容著力只當下涵養工夫來教得之省察於巳發之時此句之病恭叔已言之矣正所以存天理過人欲也恐不可分一之作雨事説則不害於相通作一事説則重復矣不可分中却要見得不可不分處若是全不可分中庸何故重復説作兩節巳發之後立語自覺未穩今欲改作欲發之時然欲發即不屬靜不屬動又欲改作巳發之𥘉友恭作欲發是但亦不是欲發時節别換一心來省察他只是此箇全體戒懼底略更開眼耳戒謹恐懼慎獨統而言之錐只是道都是涵養工夫分而言之則各有所指獨云者它人不知已所獨知之時正友恭所謂已發之𥘉者不睹不聞即是未發之前未發之前無一毫私意之雜此處無走作只是存天理而巳未説到遏人欲處巳發之𥘉天理人欲由是而分此處不放過即是遏人欲天理之存有不待言者如此分説自見端的此説分得好然又須見不可分處如兵家攻守相似各是一事而實相為用也涵養工夫實貫𥘉終而未發之所只須涵養才發處便須用省察工夫至於涵養愈熟則省察愈精矣此數句是致中和天地位萬物育若就聖人言之聖人能致中和則天高地下萬物莫不得其所如風雨不時山夷谷埋皆天地不位萌者折胎者閼皆萬物不育就吾身言之若能於致字用工則俯仰無愧一身之間自然和暢矣此説甚實極其中則大經正大本立而上下位矣極其和則事事物物各得其宜而萬物育矣一之此只説得前一截若聖人不得位便只得如此其理亦無虧欠但事上有不足爾如堯湯不可謂不能致中和而亦有水旱之災叔恭致中和而天地位萬物育者常也堯湯之事非常之變也大抵致中和自吾一念之間培植推廣以至於裁成輔相匡直輔翼無一事之不盡方是至處自一事物之得所區處之合宜以至三光全寒暑平山不童澤不涸飛潛動植各得其性方是天地位萬物育之實效蓋致者推致極處之名須從頭到尾看方見得極處若不説到天地萬物真實效驗便是只説得前一截却要凖折了後一截元不是實推得到極處也省察於欲發之時平日工夫不至而欲臨時下手不亦晚乎大時若如此説則是臨時都不照𬋩不知平日又如何做工夫也竊謂操存涵養乃修身之根本學者操存涵養便是未發之前工夫在其中矣凡省察於巳發正所以求不失其操存涵養者也學者於是二者不可缺一然操存涵養乃其本也諸友互相點檢多得之然却不曽推出所謂根本故論未發之前者竟歸於茫然無著力處或欲推於欲發之𥘉省察則又似略平日之素或兼涵養省察言之者又似鶻突包籠此一假差勝然亦未有的當見處喜怒哀樂之未發謂之中即天命之謂性也發而皆中節謂之和即率性之謂道也定詳程先生説率性文義恐不如此未發之時能體所謂中巳發之後能得所謂和則發而中節始可言矣而中和未易識也未發之前才要體所謂中則巳是發矣此説巳差又發而中節方謂之和今曰得所謂和然後發而中節亦似顚倒説了記得龜山似有此意恐亦誤矣中和未易識亦是嚇人此論著實做處不論難識易識也答胡季隨所示問答皆極詳矣然似皆未嘗精思實踐而多出於一時率然之言故紛紜繳繞而卒無定説也夫謂未發之前不可著力者本謂不可於此探討尋求也則固無害於涵養之説謂當涵養者本謂無事之時常有存主也則固無害於平日涵養之説謂省察於將發之際者謂謹之於念慮之始萌也謂省察於巳發之後者謂審之於言動巳見之後也念慮之萌固不可以不謹言行之著亦安得而不察以熹觀之凡此數條本無甚異善學者觀之自有以見其不可偏廢不至如此紛紜競辨也細看其間却有一假名一之者説得平正的確頗中諸説之病不知曽細考之否答胡季隨彼中議論大略有三種病一是高二是逺三是煩碎以此之故都離却本文説來説去都不記得元是説甚底但能放低著實依本分依次序做工夫久久自當去此病也答胡季隨南軒集誤字巳為檢勘今却附還其間空字向來固巳直書尤延之見之以為無益而賈怨不若刋去今亦不必輔後人讀之自當默喻也但序文後假若欲刪去即不成文字兼此書誤本之傳不但書坊而巳黃州印本亦多有舊來文字不唯無益而反為纍若不如此説破將來必起學者之疑故區區特詳言之其意極為懇到不知何所惡而欲去之耶且世之所貴乎南軒之文者以其發明義理之精而非以其文詞之富也今乃不問其得失是非而唯務多取又欲刪去序文緊切意思竊恐未免乎世俗之見而非南軒所以望乎後學之意試更思之若必欲盡收其文則此序意不相當自不必用須别作一序以破此序之説乃可耳若改而用之非惟熹以為不然南軒有靈亦必憤歎於泉下也久不聞講論之益深以懷想前日諸賢相繼逝去後來未有接續所望於季隨實不勝其勤懇今觀此事竊疑其用力之不篤也更願勉旃以副所望千萬千萬至和至扣答胡季隨元善書説與子靜相見甚欵不知其説如何大抵欲速好徑是今日學者大病向來所講近覺亦未免此以身驗之乃知伊洛拈出敬字真是學問始終日用親切之妙近與朋友商量不若只於此處用力而讀書窮理以發揮之真到聖賢究竟地位亦不出此坦然平白不須妄意思想頓悟懸絶處徒使人顚狂粗率而於日用常行之處反不得其所安也不審别後所見如何幸試以此思之似差平易悠久也答胡季隨熹衰病之餘幸安祠祿誤恩起廢非所克堪巳力懇辭未知可得與否自度尫殘決是不堪繁劇又况蹤迹孤危恐亦無以行其職業後日别致紛紛又如衡陽轉動不得出門一步更須審處也但今年病軀衰瘁殊甚秋中又有哭女之悲轉覺不可支吾矣目昏不能多看文字間中却覺看得道理分明向來諸書隨時修改似亦有長進處恨相去逺不得朝夕討論也易書刋行者只是編出象數大略向亦以一本凂叔綱計必見之今乃聞其有亡奴之厄計此必亦巳失去矣别往一本并南軒集幸收之也所喻克巳之學此意甚佳但云藉此排之似是未得用工要領處近讀知言有問以放心求心者嘗欲别下一語云放而知求則此心不為放矣此處間不容息如夫子所言充巳復禮功夫要切處亦在為仁由巳一句也豈藉外以求之哉性其情乃王輔嗣語而伊洛用之亦曰以性之理節其情而不一之於流動之域耳以意逆志而不以詞害焉似亦無甚害也不遷怒當如二先生説無可疑者不二過亦唯程張得之而橫渠所謂歉於巳者不使萌於再語尤精約也宋漕所委記文屢欲為之而夏秋以來一向為女子病勢驚人不得措詞兼觀其所喻為教者不過舉子事業亦有難措詞者故因循至此今病方小愈未堪思慮勢當小須後也因邵武便草草布此復託象之致之目昏未能他及惟以時進德自愛為禱大抵為學不厭卑近愈卑愈近則功夫愈實而所得愈高逺其直為高逺者則反是此不可不察也答胡季隨間中時有朋友逺來講學其間亦有一二可告語者此道之傳庶幾未至斷絶獨恨相望之逺不得聚首盡情極論以求真是之歸尚此悢悢耳君舉先未相識近復得書其徒亦有來此者折其議論多所未安最是不務切巳惡行直道尤為大害不知講論之間頗亦及此否王氏中説最是渠輩所尊信依倣以為眼目者不知所論者云何復艮之説則程子巳盡之不知别有何疑因書須詳及之乃可下語也答胡季隨前書諸喻讀之惘然季隨學有家傳又從南軒之久何故於此等處尚更有疑向見意思大假寬緩而讀書不務精熟常疑久逺無入頭處必為浮説所動今乃果然艮復之義正當思惟方見親切别𥿄諸疑正當解釋方得分明今乃曰才涉思惟便不親切又云非不能以意解釋但不欲杜撰耳不知却要如何下工夫耶夫子言學而不思則罔中庸説博學審問謹思明辨聖賢遺訓明白如此豈可舍之而徇彼自欺之浮説耶來書譏項平父出入師友之間不為不久而無所得愚亦恐賢者之不見其睫也日月逝矣歲不我與願深省察且將大學論語孟子中庸近思等書子細玩味逐句逐字不可放過久之須見頭緒不可為人所誑虛度光隂也荆門皇極説曽見之否試更熟讀洪範此一條詳解釋其文義看是如此否君舉奏對上問以讀書之法不知其對云何也答胡季隨怯字恐誤學者問曰延平先生語録有曰大抵學者多為私欲所分故用力不精不見其效若欲進步須打斷諸路頭靜坐默識使其泥滓漸漸消去又云靜坐時收拾將來看是如何便如此就偏處著理會又云學者未祛處只求諸心思索有窒礙處及於目用動靜之間有咈戾處便於此致思求其所以然者又云大凡只於微處充擴之方見礙者大爾又引上蔡語云凡事必有根必須有用處尋討要用處將來斬斷便沒事此語可時時經心又云靜中看喜怒哀樂未發時作何氣象不惟於進學有功兼亦是養心之要觀此數説真得聖賢用工緊要處但其間有一假云學者之病在於未有灑然冰釋凍解處縱有力持守不過只是苟免顯然尤悔而巳恐不足道也竊恐所謂灑然氷釋凍解處必於理皆透徹而所知極其精妙方能爾也學者既未能爾又不可以急迫求之只得且持守優柔厭飫以俟其自得如能顯然免於尤悔其工力亦可進矣若直以為不足道恐太甚也大時答曰所謂灑然冰釋凍解只是通透灑落之意學者須常令胸中通透灑落則讀書為學皆通透灑落而道理易進持守亦有味矣若但能苟免顯然悔尤則途之人亦能之誠不足為學者道也且其能苟免顯然悔尤則胸中之所潛藏隱伏者固不為少而亦不足以言學矣此一條嘗以示諸朋友有輔漢卿者下語云灑然冰解凍釋是功夫到後疑情剝落知無不至處知至則意誠而自無私欲之萌不但無形顯之過而巳若只是用意持守著力遏捺苟免顯然尤悔則隱微之中何事不有然亦豈能持久哉意懈力弛則橫放四出矣今曰學者須常令胸中通透灑落恐非延平先生本意此説甚善大抵此箇地位乃是見識分明涵養純熟之效須從真實積纍功用中來不是一旦牽疆著力做得今湖南學者所云不可以急迫求之只得且持守優柔厭飫而俟其自得未為不是但欠窮理一節工夫耳答者乃云學者須常令胸中通透灑落却是不原其本而強欲做此模樣殊不知通透灑落如何令得才有一毫令之之心則終身只是作意助長欺巳欺人永不能到得灑然地位矣學者問曰遺書曰須是大其心使開闊譬如為九層之臺須大做根腳方得恐大其心胸時却無收斂縝密底意思則如何大時答曰心目不可不開闊工夫不可不縝密答語無病然不知如何地得開闊學者問曰遺書曰執事須是敬又不可矜持太過竊謂學者之於敬常懼其放倒既未能從容到自然處恐寧過於矜持亦不妨也大時答曰頃年劉仲本亦曽舉此條以為問蓋嘗答之曰敬是治病之大藥矜持是病之旁證藥力既到病勢既退則旁證亦除矣敬是病之藥矜持是病之旁證此兩句文意齟齬不相照應若以敬喻藥則矜持乃是服藥過劑反生他病之證原其所因蓋為將此敬字别作一物而又以一心守之故有此病若知敬字只是自心自省當體便是則自無此病矣學者問曰遺書曰有諸中必形諸外惟恐不直內直內則外必方至論釋氏之學則謂於敬以直內則有之義以方外則未之有也又似以敬義內外為兩事矣竊謂釋氏之學亦未有能敬以直內若有此則吾儒之所謂必有事焉者自不容去之也大時答曰前一假其意之所重在有諸中必形諸外上後一假其意之所重在義以方外上且謂其敬以直內上則有之味有之二字則非遽許之以為與吾儒之學所謂敬者便可同日而語矣遺書説釋氏有直內無方外者是遊定夫所記恐有差誤東見録中别有一假説既無方外則其直內者豈有是也語意始圓可細考之未可如此逞快率然批判也學者問曰遺書曰釋氏只曰止安知止乎釋氏無實譬之以管窺天只務直上去惟見一偏又却有曰釋氏只到止處無用處無禮義竊謂既無實惟見一偏則其學皆憑虛鑿空無依據矣安可謂其到止處而責之以有用有禮義乎大時答曰釋氏曰止安知止乎此以吾學之所謂止而論之也禪學只到止處無用處無禮義此止字就其學之所謂止而論之也答語甚善論程子説釋氏不知止是以吾學所謂止者而言又云釋氏到止處是以彼所謂止者而言學者問曰遺書曰孟子曰盡其心者知其性也彼所謂識心見性是巳若存心養性一假事則無矣竊謂此一假事釋氏固無之然所謂識心見性恐亦與孟子盡心知性不同盡心者物格知至積習貫通盡得此生生無窮之體故知性之稟於天者蓋無不具也釋氏不立文字一超直入恐未能盡其心而知其性之全也大時答曰釋氏云識心見性與孟子之盡心知性固是不同彼所謂識心見性之云蓋亦就其學而言之爾若存心養性一假則無矣之云所以甚言吾學與釋氏不同也遺書所云釋氏有盡心知性無存心養性亦恐記録者有誤要之釋氏只是恍惚之間見得些心性影子却不曽子細見得真實心性所以都不見裏靣許多道理政使有存養之功亦只是存養得他所見底影子固不可謂之無所見亦不可謂之不能養但所見所養非心性之真耳學者問曰遺書曰學者所貴聞道若執經而問但廣聞見而巳竊謂執經而問雖止於廣聞見而巳須精深究此而後道由是而可得也不然恐未免於説空説悟之弊矣大時答曰所謂學者所貴聞道若執經而問但廣聞見而巳蓋為尋行數墨而無所發明者設而來喻之云謂必須深究乎此然後可以聞道則亦俱墮於一偏矣執經而問者知為巳則所以聞道者不外乎此不然則雖六經皆通亦但為廣聞見而巳問者似有此意然見得未分明故説不出答者之云却似無干涉也學者問曰遺書曰根本須先培壅然後可立趨嚮竊謂學者必須先審其趨嚮而後根本可培壅不然恐無入頭處大時答曰必先培其根本然後審其趨嚮猶作室焉亦必先有基址然後可定所向也先立根本後立趨嚮即所謂未有致知而不在敬者又云收得放心後然後自能尋向上去亦此意也學者問曰遺書曰誠然後能敬未及誠時須敬而後能誠學者如何便能誠恐不若專主於敬而後能誠也大時答曰誠者天之道也而實然之理亦可以言誠敬道之成則聖人矣而整齊嚴肅亦可以言敬此兩事者皆學者所當用力也敬是竦然如有所畏之意誠是真實無妄之名意思不同誠而後能敬者意誠而後心正也敬而後能誠者意雖未誠而能常若有畏則當不敢自欺而進於誠矣此程子之意也問者略見此意而不能逹之於言答者却答不著學者問曰遺書曰只外靣有些罅隙便走了學者能日用間常切操存則可漸無此患矣大時答曰其中充實則其外無罅隙矣外靣只有些罅隙便走了此語分明不須注解只要時時將來提撕便喚得主人公常在常覺也學者曰樂記曰人生而靜天之性也感於物而動性之欲也五峯有曰昧天性感物而動者凡愚也向來朋友中有疑此説謂靜必有動然其動未有不感於物所謂性之欲者恐指巳發而不可無者為言若以為人欲則性中無此五峯乃專以感物而動為言昧天性而歸於凡愚何也大時答曰按本語云知天性感物而通者聖人也察天性感物而節者君子也昧天性感物而動者凡愚也曰知曰察曰昧其辨了然矣今既不察乎此而反其語而言乃以感物而動為昧天性者失其旨矣學者又曰曰知曰察曰昧其辨固了然但鄙意猶有未安者感物而動爾樂記曰止云感物而動性之欲也𥘉未嘗有聖人君子凡愚之分通與節之説今五峯乃云知天性感物而通者聖人也察天性感物而節者君子也昧天性感物而動者凡愚也是不以感物而動為得也更望垂誨大時答曰人生而靜天之性也感於物而動性之欲也物格知至然後好惡形焉好惡無節於內知誘於外不能反躬天理滅矣夫物之感人無窮而人之好惡無節則是物至而人化於物也人化於物者滅天理而窮人欲者也觀其下文明白如此則知先賢之言為不可易矣且味感於物而動性之欲也兩句亦有何好而必欲舍其正意而曲為之説以主張之乎程子云寂然不動感而遂通天下之故者天理具備元無少欠不為堯存不為桀亡父子君臣常理不易何曽動來因不動故言寂然不動感而遂通天下便感非自外來也又曰寂然不動萬象森然巳具感而遂通感則只是自內感不是外靣將一箇物來感於此也又曰寂然不動感而遂通此言人分上事若論道則萬理皆真更不説感與未感又曰蓋人萬物皆備遇事時各因其心之所重者更互而出才見得這事重便有這事出若能物各付物則便自不出來也以此四條之所論者而推之益知先賢之言不可易而所謂感物而動性之欲者不必曲為之説以主張之矣湘山詩云聖人感物靜所發無不正衆人感物動動與物欲競殆亦與先賢之意相為表裏云爾此兩條問者知其可疑不易見得如此但見得未明不能發之於言耳答者乃是不得其説而強言之故其言粗橫而無理想見於心亦必有自不過處只得如此撑拄將去也五峯云昧天性感物而動故問者云五峯乃專以感物而動為昧天性於五峯本説未見其異答者乃責以反其語而失其旨問者又疑樂記本文感物而動𥘉無聖愚之别與五峯語意不同而答者但云觀其下文明白如此則知先賢之言不可易而不言其所以明白而不可易者為如何又謂樂記兩句亦有何好而不言其所以不好之故及引程子四條則又與問者所疑了無干涉但欲以虗昡恐喝而下之安得不謂之粗橫無理而撑拄強説乎今且無論其他而但以胡氏之書言之則春秋傳獲麟章明有聖人之心感物而動之語頃時與廣仲書常論之矣不知今當以文定為是乎五峯為是乎要之此等處在季隨誠有難言者與其曲為辨説而益顯其誤不若付其是非於公論而我無與焉為愈也須知感物而動者聖愚之所同但衆人昧天性故其動也流賢人知天性故其動也節聖人盡天性故其動也無事於節而自無不當耳文義之失猶是小病却是自欺強説乃心腹膏肓之疾他人針藥所不能及須是早自覺悟醫治不可因循掩諱而忌扁鵲之言也答胡季隨所喻兩條前書奉報巳極詳悉若能平心定氣熟復再三必自曉然今乃復有來書之喻其言欲以灑落為始學之事而可以力致皆不過如前書之説至引延平先生之言則又析為兩假而謂前假可以著力令其如此則似全不曽看其所言之文理所謂反覆推究待其融釋者待字之意是如何而自以巳意橫為之説也大率講論文字須且屏去私心然後可以詳考文義以求其理之所在若不如此而只欲以言語取勝則雖纍千萬言終身競辨亦無由有歸著矣是乃徒為多事而重得罪於聖人何名為講學哉故熹不敢復為論説以增前言之贅但願且取前書子細反復其間所云才有令之之心即便終身不能得灑落者此尤切至之論蓋才有此意便不自然其自謂灑落者乃是踈略放肆之異名耳疊此兩三重病痛如何能到真實灑落地位耶古語云反者道之動謙者德之柄濁者清之路昏久則昭明願察此語不要思想凖擬融釋灑落底功效判著且做三五年辛苦不快活底功夫久逺須自有得力處所謂先難而後獲也灑落兩字本是黃太史語後來延平先生拈出亦是且要學者識箇深造自得底氣象以自考其所得之淺深不謂不一再傳而其弊乃至於此此古之聖賢所以只教人於下學處用力至於此等則未之嘗言也顔曽以上都無此等語子思孟子以下乃頗有之亦有所不得巳也樂記知言之辨前書亦巳盡之細看來書似巳無可得説但未肯放下此一團私意耳如此則更説甚講學不如同流合汚著衣喫飯無所用心之省事也其餘諸説未暇悉報願且於此兩假反復自見得從前錯處然後徐而議之則彼亦無難語者幸早報及也答胡季隨熹憂患侵凌來日無幾思與海內知友痛相切磨以求理義全體之至極垂之來世以繼聖賢傳付之望而離羣索居無由會合如季隨者尤所期重而相去甚逺再見恐不可期此可為深歎恨也先訓之嚴後人自不當置議論於其間但性之有無善惡則當舍此而别論之乃無隱避之嫌而得盡其是非之實耳善惡二字便是天理人欲之實體今謂性非人欲可矣由是而并謂性非天理可乎必曰極言乎性之善而不可名又曷若直謂之善而可名之為甚易而實是也比來得書似覺賢者於此未有實地之可據日月易得深可憂懼幸加精進之力入細著實子細推研庶幾有以自信益光前烈千萬至望答沈有開垂諭所以為學之意與其所聞於師友間者甚悉既荷不鄙又幸其警益之深也嘗竊妄謂聖賢教人下學上逹循循有序故從事其間者博而有要約而不孤無妄意凌躐之弊今之言學者類多反此故其高者淪於空幻卑者溺於見聞倀倀然未知其將安所歸宿也竊窺賢者之所志與其所聞計其同異之間其必有所處矣恨未得相與往還上下其説以卒究其所窮也因來更望時有以警告之實孤陋之深望至於慨念吾黨之凋零而欲以進為撫世為不肖者之責此則賢者之失言而非區區之所敢承也答高應朝所示講義發明深切逺方學者得所未聞計必有感動而興起者然此恐但可為𥘉學一時之計若一向只如此説而不教以日用平常意思涵養玩索功夫即恐學者將此家常茶飯做箇怪異竒特底事看了日逐荒忙陷於欲速助長躁率自欺之病久之茫然無實可據則又只學得一埸大話互相恐嚇而終無輔於為巳之實也只如三假所舉諸書大指雖同然恐亦須更令子細看得逐假各有下落方能浹洽通貫有得力處若只如此儱侗看了便休却恐只是粗謾政使便做得成亦是捺生做熟久逺畢竟無意味也答石天民平生為學見得孟子論枉尺直尋意思稍分明自到浙中覺得朋友間却别是一種議論與此不相似心竊怪之昨在丹丘見誠之直説義理與利害只是一事不可分别此大可駭當時亦曽辨論覺得殊未相領至與孟子董子之言例遭排擯不審尊兄平日於此見得如何幸更與諸公講論見教熹竊以為今日之病唯此為大其餘世俗一等近下見識未足為吾患也答沈叔晦衰病如昨無足言者二圗之妄深荷留念言多枝葉而不既其實尤佩警切之戒但區區平日躬所不逮之言與此殊不相似識者當自無疑惟是尋常實有似是而非之論不幸為人傳出異日或能亂道誤人為可懼耳麻沙所刻吕兄文字真偽相半書坊嗜利非間人所能禁在位者恬然不可告語但能為之太息而巳若大事記則雖非全書而實有益於學者有輔於世教區區流傳之意本不為伯恭計况門外之紛紛者乎答沈叔晦帥幕非所以處賢者然自我言之亦何適而不可安耶前日務為學而不觀書此固一偏之論然近日又有一般學問廢經而治史略王道而尊霸術極論古今興亡之變而不察此心存亡之端若只如此讀書則又不若不讀之為愈也况又中年精力有限與其泛觀而博取不若熟讀而精思得尺吾尺得寸吾寸始為不枉用功力耳鄙見如此不審明者以為如何答沈叔晦示喻兩塗之疑足見省身求善不自滿足之意警發多矣自惟偷惰何以及此况又未得靣承事理之間亦有難隃度者何敢容易下語顧以不鄙見屬之厚竊以所喻思之恐所謂聞道讀書者皆救病之良藥也但未知其所謂道者何道所謂書者何書而所以聞之讀之又如何用其力爾區區更願審和其人以究其説而決其是非政使其説未必盡是而因此講求同異之間便自可以見真是之所在向後用力則以前日躬行之實充之且不患其不勇也大抵近年學者求道太迫立論大高往往嗜簡易而憚精詳樂渾全而畏剖折以此不見天理之本然各墮一偏之私見别立門庭互分彼我使道體分裂不合不公此今日之大患也不識明者以為如何子約為人固無可疑但其門庭近日少有變異而流傳巳逺大為學者心術之害故不得不苦口耳近日一派流入江西蹴踏董仲舒而推尊管仲王猛又聞有非陸贄而是德宗者尤可駭異所欲言者甚衆甚衆與沈叔晦熹衰病之餘扶曵至此少時為吏於此接壤頗聞其民俗利病謂或可以少效區區既至乃殊無下手處頃來豐丈過此亦以一二事為寄亦其俗之所甚病今亦未有以報朝廷向來蠲減僅有其名而今乃欲責其實且許郡守自列因得條上一二未知得見從否亦知今日上下艱窘不敢究言然度巳是難施行矣欲行經界半年議尚未定若得遂行却須救得分數然病久證壞要非一藥所能支也奈何奈何因便附此問訊有以見教願悉聞之正逺唯冀以時加衛以慰吾黨之望不宣答沈叔晦克巳復禮前説巳得之却是看得不子細誤答了今承再喻愈詳密無疑矣浩然之氣一章恐須先且虛心熟讀孟子本文未可遽雜它説俟看得孟子本意分明却取諸先生説之通者錯綜於其間方為盡善若合下便雜諸説輥看則下梢只得周旋人情不成理會道理矣近日説經多有此弊蓋巳是看得本指不曽分明又著一尊畏前輩不敢違異之心便覺左右顧瞻動皆窒礙只得曲意周旋更不復敢著實理會義理是非文意當否矣夫尊畏前輩謙遜長厚豈非美事然此處才有偏重便成病痛學者不可不知也又非義襲而取之句內亦未見外面尋義理之意請更詳之橫渠先生言觀書有疑當且濯去舊見以來新意此法最妙凡言易者多只是指蓍卦而言蓍卦何嘗有思有為但只是扣蓍便應無所不通所以為神耳非是别有至神在蓍卦之外也曽子告孟敬子三句不是説今日用功之法乃言平日用功之效如此有得文義方通來喻紏紛殊不可曉也不知其仁之説恐未安且未論義理只看文勢巳自不通若更以義理推之尤見乖戾矣蓋智自是智仁自是仁孔門教人先要學者知此道理便就身上著實踐履到得全無私心渾是天理處方喚作仁如子路諸人正為未到此地故夫子不以許之非但欲其知理而巳也若謂未知者做得皆是而未能察其理之所以然則諸人者又恐未能所為皆是固未暇責其察夫理之所以然也晦庵先生朱文公文集卷第五十三考異答劉季章未盡善也云云必有未盡善之處矣此後二有若曰聖人垂象終是微有不同則當别論儻樂以觀之則似太重矣如何令尹子文之忠云云亦有不盡之意矣此後一有竊詳本文之意似不如此恐是看得仁字與忠清事俱重不曽分别求之遂至疑於太過如何膚受之訴不行焉云云亦未遽至此未字一本作不閩縣儒學教諭王製校
