body:
  text: 書陸陳辨答答陸子夀蒙喻及祔禮此在髙明考之必巳精密然猶謙遜慱謀及於淺陋如此顧熹何足以知之然昔遭喪禍亦嘗考之矣竊以為衆言淆亂則折諸聖孔子之言萬世不可易矣尚復何説况期而神之之意揆之人情亦為允愜但其節文次第今不可考而周禮則有儀禮之書自始死以至祥禫其節文度數詳焉故溫公書儀雖記孔子之言而卒從儀禮之制蓋其意謹於闕疑以為既不得其節文之詳則雖孔子之言亦有所不敢從者耳程子之説意亦甚善然鄭氏説凡祔巳反于寢練而後遷廟左氏春秋傳亦有特祀于主之文則是古人之祔固非遂徹几筵程子於此恐其考之有所未詳也開元禮之説則髙氏既非之矣然其自説大祥徹靈坐之後明日乃祔于廟以為不忍一日未有所歸殊不知既徹之後未祔之前尚有一夕其無所歸也久矣凡此皆有所未安恐不若且從儀禮溫公之説次序節文亦自曲有精意如檀弓諸説可見不審尊兄今巳如何行之碩以示教若猶未也則必不得巳而從髙氏之説但祥祭之日未可撤去几筵或遷稍近廟處直俟明日奉主祔廟然後撤之則猶為亡於禮者之禮耳鄙見如此不審髙明以為如何答陸子夀先王制禮本緣人情吉凶之際其變有漸故始死全用事生之禮既卒哭祔廟然後神之然猶未忍盡變故主復于寢而以事生之禮事之至三年而遷于廟然後全以神事之也此其禮文見於經傳者不一雖未有言其意者然以情度之知其必出於此無疑矣其遷廟一節鄭氏用穀梁練而壞廟之説杜氏用賈逵服虔説則以三年為斷其間同異得失雖未有考然榖梁但言壞舊廟不言遷新主則安知其非於練而遷舊主於三年而納新主邪至於禮疏所解鄭氏説但據周禮廟用卣一句亦非明驗故區區之意竊疑杜氏之説為合於人情也來諭考證雖詳其大槩以為既吉則不可復凶既神事之則不可復以事生之禮接爾竊恐如此非惟未嘗深考古人吉凶變革之漸而亦未暇反求於孝子慈孫深愛至痛之情也至謂古者几筵不終喪而力詆鄭杜之非此尤未敢聞命據禮小斂有席至虞而後有几筵但卒哭而後不復饋食於下室耳古今異宜禮文之變亦有未可深考者然周禮自虞至祔曽不旬日不應方設而遽徹之如此其速也又謂終喪徹几筵不聞有入廟之説亦非也諸侯三年喪畢之祭魯謂之吉禘晉謂之禘祀禮疏謂之特禘者是也但其禮亡而士大夫以下則又不可考耳夫今之禮文其殘闕者多矣豈可以其偶失此文而遽謂無此禮耶又謂壞廟則變昭穆之位亦非也據禮家説昭常為昭穆常為穆故書謂文王為穆考詩謂武王為昭考至左傳猶謂畢原酆郇為文之昭邘晉應韓為武之穆則昭穆之位豈以新主祔廟而可變哉但昭主祔廟則二昭遞遷穆主祔廟則二穆遞遷爾此非今者所論之急但謾言之以見來説考之未精類此又謂古者每代異廟故有祔于祖父祖姑之禮今同一室則不當專祔於一人此則為合於人情矣然伊川先生嘗譏關中學禮者有役文之弊而吕與叔以守經信古學者庶幾無過而巳義起之事正在盛德者行之然則此等苟無大害於義理不若且依舊説亦夫子存羊愛禮之意也熹於禮經不熟而考證亦未及精且以愚意論之如此不審髙明以為如何然亦不特如此熹常以為大凡讀書處事當煩亂疑惑之際正當虛心慱采以求至當或未有得亦當且以闕疑闕殆之意處之若遽以巳所粗通之一説而盡廢巳所未究之衆論則非惟所處之得失或未可知而此心之量亦不宏矣間併及之幸恕狂妄答陸子美伏承示諭太極西銘之失備悉指意然二書之説從前不敢輕議非是從人腳根依他門戶却是反覆看來道理實是如此别未有開口處所以信之不疑而妄以巳見輒為之説正恐未能盡發其奧而反以纍之豈敢自謂有扶掖之功哉今詳來教及省從前所論却恐長者從𥘉便忽其言不曽致思只以自家所見道理為是不知却元來未到他地位而便以巳見輕肆抵排也今亦不暇細論只如太極篇首一句最是長者所深排然殊不知不言無極則太極同於一物而不足為萬化之根不言太極則無極淪於空寂而不能為萬化之根只此一句便見其下語精密微妙無窮而向下所説許多道理條貫脈絡井井不亂只今便在目前而亘古亘今攧撲不破只恐自家見得未曽如此分明直截則其所可疑者乃在此而不在彼也至於西銘之説猶更分明今亦且以首句論之人之一身固是父母所生然父母之所以為父母者即是乾坤若以父母而言則一物各一父母若以乾坤而言則萬物同一父母矣萬物既同一父母則吾體之所以為體者豈非天地之塞吾性之所以為性者豈非天地之帥哉古之君子惟其見得道理真實如此所以親親而仁民仁民而愛物推其所為以至於能以天下為一家中國為一人而非意之也今若必謂人物只是父母所生更與乾坤都無干涉其所以有取於西銘者但取其姑為宏闊廣大之言以形容仁體而破有我之私而巳則是所謂仁體者全是虛名𥘉無實體而小巳之私却是實理合有分别聖賢於此却𥘉不見義理只見利害而妄以巳意造作言語以增飾其所無破壞其所有也若果如此則其立言之失膠固二字豈足以盡之而又何足以破人之梏於一已之私哉大抵古之聖賢千言萬語只是要人明得此理此理既明則不務立論而所言無非義理之言不務正行而所行無非義理之實無有𥘉無此理而姑為此言以救時俗之弊者不知子靜相會曾以此話子細啇量否近見其所論王通續經之説似亦未免此病也此間近日絶難得江西便草草布此却託子靜轉致但以來書半年方逹推之未知何時可到耳如有未當切幸痛與指摘剖析見教理到之言不得不服也答陸子美前書示諭太極西銘之説反復詳盡然此恐未必生於氣習之偏但是急迫看人文字未及盡彼之情而欲遽申巳意是以輕於立論徒為多説而未必果當於理爾且如太極之説熹謂周先生之意恐學者錯認太極别為一物故著無極二字以明之此是推原前賢立言之本意所以不厭重復蓋有深指而來諭便謂熹以太極下同一物是則非惟不盡周先生之妙旨而於熹之淺陋妄説亦未察其情矣又謂著無極字便有虛無好髙之弊則未知尊兄所謂太極是有形器之物耶無形器之物耶若果無形而但有理則無極即是無形太極即是有理明矣又安得為虛無而好髙乎熹所論西銘之意正謂長者以橫渠之言不當謂乾坤實為父母而以膠固斥之故竊疑之以為若如長者之意則是謂人物實無所資於天地恐有所未安爾非熹本説固欲如此也今詳來誨猶以橫渠只是假借之言而未察父母之與乾坤雖其分之有殊而𥘉未嘗有二體但其分之殊則又不得而不辨也熹之愚陋竊碩尊兄更於二家之言少賜反復寬心遊意必使於其所説如出於吾之所為者而無纎芥之疑然後可以發言立論而斷其可否則其為辨也不煩而理之所在無不得矣若一以急迫之意求之則於察理巳不能精而於彼之情又不詳盡則徒為紛紛而雖欲不差不可得矣然只此急迫即是來諭所謂氣質之弊蓋所論之差處雖不在此然其所以差者則原於此而不可誣矣不審尊意以為如何子靜歸來必朝夕得欵聚前書所謂異論卒不能合者當巳有定説矣恨不得側聽其旁時效管窺以求切磋之益也延平新本龜山别録漫內一通近又嘗作一小卜筮書亦以附呈蓋緣近世説易者於象數全然闊略其不然者又太拘滯支離不可究詰故推本聖人經傳中説象數者只此數條以意推之以為是足以上究聖人作易之本指下濟生人觀變玩占之實用學易者決不可以不知而凡説象數之過乎此者皆可以束之髙閣而不必問矣不審尊意以為如何答陸子美示諭縷縷備悉雅意不可則止正當謹如來教不敢復有塵瀆也偶至武夷匆匆布敘不能盡所欲言然大者已不敢言則亦無可言者矣寄陸子靜奏篇垂寄得聞至論慰沃良深其規模宏大而源流深逺豈腐儒鄙生所能窺測不知對揚之際上於何語有領會區區私憂正恐不免萬牛回首之歎然於我亦何病語圓意活渾浩流轉有以見所造之深所養之厚益加歎服但向上一路未曽撥轉處未免使人疑著恐是蔥嶺帶來耳如何如何一笑熹衰病益侵幸叨祠祿遂為希夷直下諸孫良以自慶但香火之地聲教未加不能不使人慨歎耳答陸子靜昨聞嘗有丐外之請而復未遂今定何如莫且宿留否學者後來更得何人顯道得書云嘗詣見不知巳到未子淵去冬相見氣質剛毅極不易得但其偏處亦甚害事雖嘗苦口恐未必以為然今想到部必巳相見亦嘗痛與砭否道理雖極精微然𥘉不在耳目見聞之外是非黑白即在靣前此而不察乃欲别求玄妙於意慮之表亦巳誤矣熹衰病日侵去年災患亦不少此數日來病軀方似略可支吾然精神耗減日甚一日恐終非能久於世者所幸邇來日用功夫頗覺有力無復向來支離之病甚恨未得從容靣論未知異時相見尚復有異同否耳答陸子靜丁未五月二日稅駕巳久諸况想益佳學徒四來所以及人者在此而不在彼矣來書所謂利欲深痼者巳無可言區區所憂却在一種輕為髙論妄生內外精粗之别以良心日用分為兩截謂聖賢之言不必盡信而容貌詞氣之間不必深察者此其為説乖戾狠悖將有大為吾道之害者不待他時末流之弊矣不審明者亦嘗以是為憂乎此事不比尋常小小文義異同恨相去逺無由靣論徒增耿耿耳李子甚不易知向學但亦漸覺好髙鄙意且欲其著實看得目前道理事物分明將來不失將家之舊庶幾有用若便如此談玄説妙却恐兩無所成可惜壞却天生氣質却未必如乃翁朴實頭無許多勞攘耳答陸子靜學者病痛誠如所諭但亦須自家見得平正深密方能藥人之病若自不免於一偏恐醫來醫去反能益其病也所諭與令兄書辭費而理不明今亦不記當時作何等語或恐實有此病承許條析見教何幸如之虛心以俟幸因便見示如有未安却得細論未可便似居士兄遽斷來章也答陸子靜十一月八日熹頓首再拜上啓子靜崇道監丞老兄今夏在玉山便中得書時以入都旋復還舍疾病多故又苦無便不能即報然懷想德義與夫象山泉石之勝未嘗不西望太息也比日冬溫過甚恭惟尊候萬福諸賢兄令子姪眷集以次康寧來學之士亦各佳勝熹兩年冗擾無輔公私第深愧歉不謂今者又蒙收召顧前所𬒳巳極叨踰不敢冒進以速龍斷之譏巳遣人申堂懇免矣萬一未遂所當力請以得為期杜門竊廪溫繹陋學足了此生所恨上恩深厚無路報塞死有餘憾也前書誨諭之悉敢不承教所謂古之聖賢惟理是視言當於理雖婦人孺子有所不棄或乖理致雖出古書不敢盡信此論甚當非世儒淺見所及也但熹竊謂言不難擇而理未易明若於理實有所見則於人言之是非不翅黑白之易辨固不待訊其人之賢否而為去取不幸而吾之所謂理者或但出於一巳之私見則恐其所取舍未足以為羣言之折衷也况理既未明則於人之言恐亦未免有未盡其意者又安可以遽絀古書為不足信而直任胸臆之所裁乎來書反復其於無極太極之辨詳矣然以熹觀之伏羲作易自一畫以下文王演易自乾元以下皆未嘗言太極也而孔子言之孔子贊易自太極以下未嘗言無極也而周子言之夫先聖後聖豈不同條而共貫哉若於此有以灼然實見太極之真體則知不言者不為少而言之者不為多矣何至若此之紛紛哉今既下然則吾之所謂理者恐其未足以為群言之折衷又况於人之言有所不盡者又非一二而巳乎既蒙不鄙而教之熹亦不敢不盡其愚也且夫大傳之太極者何也即兩儀四象八卦之理具於三者之先而緼於三者之內者也聖人之意正以其究竟至極無名可名故特謂之太極猶曰舉天下之至極無以加此云爾𥘉不以其中而命之也至如北極之極屋極之極皇極之極民極之極諸儒雖有解為中者蓋以此物之極常在此物之中非指極字而訓之以中也極者至極而巳以有形者言之則其四方八靣合輳將來到此築底更無去處從此推出四方八靣都無向背一切停勻故謂之極耳後人以其居中而能應四外故指其處而以中言之非以其義為可訓中也至於太極則又𥘉無形象方所之可言但以此理至極而謂之極耳今乃以中名之則是所謂理有未明而不能盡乎人言之意者一也通書理性命章其首二句言理次三句言性次八句言命故其章內無此三字而特以三字名其章以表之則章內之言固巳各有所屬矣蓋其所謂靈所謂一者乃為太極而所謂中者乃氣稟之得中與剛善剛惡柔善柔惡者為五性而屬乎五行𥘉未嘗以是為大極也且曰中焉止矣而又下屬於二氣五行化生萬物之云是亦復成何等文字義理乎今來諭乃指其中者為太極而屬之下文則又理有未明而不能盡乎人言之意者二也若論無極二字乃是周子灼見道體逈出常情不顧旁人是非不計自巳得失勇往直前説出人不敢説底道理令後之學者曉然見得太極之妙不屬有無不落方體若於此看得破方見得此老真得千聖以來不傳之祕非但架屋下之屋疊牀上之牀而巳也今必以為未然是又理有未明而不能盡人言之意者三也至於大傳既曰形而上者謂之道矣而又曰一隂一陽之謂道此豈真以隂陽為形而上者哉正所以見一隂一陽雖屬形器然其所以一隂而一陽者是乃道體之所為也故語道體之至極則謂之太極語太極之流行則謂之道雖有二名𥘉無兩體周子所以謂之無極正以其無方所無形狀以為在無物之前而未嘗不立於有物之後以為在隂陽之外而未嘗不行乎隂陽之中以為通貫全體無乎不在則又𥘉無聲臭影響之可言也今乃深詆無極之不然則是直以太極為有形狀有方所矣直以隂陽為形而上者則又昧於道器之分矣又於形而上者之上復有况太極乎之語則是又以道上别有一物為太極矣此又理有未明而不能盡乎人言之意者四也至熹前書所謂不言無極則太極同於一物而不足為萬化根本不言太極則無極淪於空寂而不能為萬化根本乃是推本周子之意以為當時若不如此兩下説破則讀者錯認語意必有偏見之病聞人説有即謂之實有見人説無即以為真無耳自謂如此説得周子之意巳是大煞分明只恐知道者厭其漏泄之過甚不謂如老兄者乃猶以為未穩而難曉也請以熹書上下文意詳之豈謂太極可以人言而為加損者哉是又理有未明而不能盡乎人言之意者五也來書又謂大傳明言易有太極今乃言無何耶此尤非所望於髙明者今夏因與人言易其人之論正如此當時對之不覺失笑遂至𬒳劾彼俗儒膠固隨語生解不足深怪老兄平日自視為如何而亦為此言耶老兄且謂大傳之所謂有果如兩儀四象八卦之有定位天地五行萬物之有常形耶周子之所謂無是果虛空斷滅都無生物之理耶此又理有未明而不能盡乎人言之意者六也老子復歸於無極無極乃無窮之義如莊生入無窮之門以遊無極之野云爾非若周子所言之意也今乃引之而謂周子之言實出乎彼此又理有未明而不能盡乎人言之意者七也髙明之學超出方外固未易以世間言語論量意見測度今且以愚見執方論之則其未合有如前所陳者亦欲奉報又恐徒為紛紛重使世俗觀笑既而思之若遂不言則恐學者終無所取正較是二者寧可見笑於今人不可得罪於後世是以終不獲巳而竟陳之不識老兄以為如何答陸子靜來書云浙間後生貽書見規以為吾二人者所習各巳成熟終不能以相為莫若置之勿論以俟天下後世之自擇鄙哉言乎此輩凡陋沈溺俗學悖戾如此亦可憐也熹謂天下之理有是有非正學者所當明辨或者之説誠為未當然凡辨論者亦須平心和氣子細消詳反復啇量務求實是乃有歸著如不能然而但於匆遽急迫之中肆支蔓躁率之詞以逞其忿懟不平之氣則恐反不若或者之言安靜和平寬洪悠久猶有君子長者之遺意也來書云人能洪道止敢悉布之熹按此假所説規模宏大而指意精切如曰雖自謂其理巳明安知非私見蔽説及引大舜善與人同等語尤為的當熹雖至愚敢不承教但所謂莫知其非歸於一是者未知果安所決區區於此亦願明者有以深察而實踐其言也來書云古人質實止請卒條之熹詳此説蓋欲專務事實不尚空言其意甚美但今所論無極二字熹固巳謂不言不為少言之不為多矣若以為非則且置之其於事實亦未有害而賢昆仲不見古人指意乃獨無故於此創為浮辨纍數百言三四往返而不能巳其為湮蕪亦巳甚矣而細考其間緊要節目並無酬酢只是一味慢罵虛喝必欲取勝未論顔曽氣象只子貢恐亦不肯如此恐未可遽以此而輕彼也來書云尊兄未嘗止固冒不同也熹亦謂老兄正為未識太極之本無極而有其體故必以中訓極而又以隂陽為形而上者之道虛見之與實見其言果不同也來書云老氏以無止諱也熹詳老氏之言有無以有無為二周子之言有無以有無為一正如南北水火之相反更請子細著眼未可容易譏評也來書云此理乃止子矣更請詳看熹前書曽有無理二字否來書云極亦此止極哉極是名此理之至極中是狀此理之不偏雖然同是此理然其名義各有攸當雖聖賢言之亦未嘗敢有所差互也若皇極之極民極之極乃為標凖之意猶曰立於此而示於彼使其有所向望而取正焉耳非以其中而命之也立我蒸民立與粒通即書所謂蒸民乃粒莫匪爾極則爾指后稷而言蓋曰使我衆人皆得粒食莫非爾后稷之所立者是望耳爾字不指天地極字亦非指所受之中此義尤明白似是急於求勝更不暇考上下文推此一條其餘可見中者天下之大本乃以喜怒哀樂之未發此理渾然無所偏倚而言太極固無偏倚而為萬化之本然其得名自為至極之極而兼有標凖之義𥘉不以中而得名也來書云以極為中止理乎老兄自以中訓極熹未嘗以形訓極也今若此言則是巳不曉文義而謂他人亦不曉也請更詳之來書云大學文言皆言知至熹詳知至二字雖同而在大學則知為實字至為虛字兩字上重而下輕蓋曰心之所知無不到耳在文言則知為虛字至為實字兩字上輕而下重蓋曰有以知其所當至之地耳兩義既自不同而與太極之為至極者又皆不相似請更詳之此義在諸説中亦最分明請試就此推之當知來書未能無失往往類此來書云直以隂陽為形器止道器之分哉若以隂陽為形而上者則形而下者復是何物更請見教若熹愚見與其所聞則曰凡有形有象者皆器也其所以為是器之理者則道也如是則來書所謂始終晦明竒偶之屬皆隂陽所為之器獨其所以為是器之理如目之明耳之聰父之慈子之孝乃為道耳如此分别似差明白不知尊意以為如何此一條亦極分明切望略加思索便見愚言不為無理而其餘亦可以類推矣來書云通書曰止類此周子言中而以和字釋之又曰中節又曰逹道彼非不識字者而其言顯與中庸相戾則亦必有説矣蓋此中字是就氣稟發用而言其無過不及處耳非直指本體未發無所偏倚者而言也豈可以此而訓極為中也哉來書引經必盡全章雖煩不厭而所引通書乃獨截自中焉止矣而下此安得為不誤老兄本自不信周子政使誤引通書亦未為害何必諱此小失而反為不改之過乎來書云大傳止孰古大傳洪範詩禮皆言極而巳未嘗謂極為中也先儒以此極處常在物之中央而為四方之所靣內而取正故因以中釋之蓋亦未為甚失而後人遂直以極為中則又不識先儒之本意矣爾雅乃是纂集古今諸儒訓詁以成書其間蓋亦不能無誤不足據以為古又况其間但有以極訓至以殷齊訓中𥘉未嘗以極為中乎來書云又謂周子止道耳前又云若謂欲言止之上無極而太極猶曰莫之為而為莫之致而至又如曰無為之為皆語勢之當然非謂别有一物也向見欽夫有此説嘗疑其贅今乃正使得著方知欽夫之慮逺也其意則固若曰非如皇極民極屋極之有方所形象而但有此理之至極耳若曉此意則于聖門有何違叛而不肯道乎上天之載是就有中説無無極而太極是就無中説有若實見得即説有説無或先或後都無妨礙今必如此拘泥強生分别曽謂不尚空言專務事實而反如此乎來書云夫乾止自反也太極固未嘗隱于人然人之識太極者則少矣往往只是于禪學中認得箇昭昭靈靈能作用底便謂此是太極而不知所謂太極乃天地萬物本然之理亘古亘今攧撲不破者也逈出常情等語只是俗談即非禪家所能專有不應儒者反當回避况今雖偶然道著而其所見所説即非禪家道理非如他人隂實祖用其説而改頭換靣陽諱其所自來也如曰私其説以自妙而又祕之又曰寄此以神其姦又曰繫絆多少好氣質底學者則恐世間自有此人可當此語熹雖無狀自省得與此語不相似也來書引書云有言逆干汝心必求諸道此聖言也敢不承教但以來書求之于道而未之見但見其詞義差舛氣象粗率似與聖賢不甚相近是以竊自安其淺陋之習聞而未敢輕舍故步以追髙明之獨見耳又記頃年嘗有平心之説而前書見喻曰甲與乙辨方各自是其説甲則曰碩乙平心也乙亦曰碩甲平心也平心之説恐難明白不若據事論理可也此言美矣然熹所謂平心者非直使甲操乙之見乙守甲之説也亦非謂都不論事之是非也但欲兩家姑暫置其是巳非彼之意然後可以據事論理而終得其是非之實如謂治疑獄者當公其心非謂便可改曲者為直改直者為曲也亦非謂都不問其曲直也但不可先以巳意之向背為主然後可以審聽兩造之辭旁求參伍之驗而終得其曲直之當耳今以粗淺之心挾忿懟之氣不肯暫置其是巳非彼之私而欲評義理之得失則雖有判然如黑白之易見者猶恐未免于誤况其差有在于毫釐之間者又將誰使折其衷而能不謬也哉來書云書尾止文耶中間江德功封示三䇿書中有小帖云陸子靜䇿三篇皆親手點對令默封納先欲作書臨行不肯作此並是德功本語不知來喻何故乃爾此細事不足言世俗毁譽亦何足計但賢者言行不同如此為可疑耳德功亦必知是諸生所答自有姓名但云是老兄所付令寄來耳熹巳具此而細看其間亦尚有説未盡處大抵老兄昆仲同立此論而其所以立論之意不同子美尊兄自是天資質實重厚當時看得此理有未盡處不能子細推究便立議論因而自信太過遂不可回見雖有病意實無他老兄却是先立一説務要突過有若子貢以上更不數近世周程諸公故於其言不問是非一例吹毛求疪須要討不是處正使説得十分無病此意却先不好了况其言之粗率又不能無病乎夫子之聖固非以多學而得之然觀其好古敏求實亦未嘗不多學但其中自有一以貫之處耳若只如此空踈杜撰則雖有一而無可貫矣又何足以為孔子乎顔曽所以獨得聖學之傳正為其慱文約禮足目俱到亦不是只如此空踈杜撰也子貢雖未得承道統然其所知似亦不在今人之後但未有禪學可改換耳周程之生時世雖在孟子之下然其道則有不約而合者反覆來書竊恐老兄於其所言多有未解者恐皆永可遽以顔曽自處而輕之也顔子以能問於不能以多問於寡有若無實若虛犯而不校曽子三省其身惟恐謀之不忠交之不信傳之不習其智之崇如彼而禮之卑如此豈有一毫自滿自足強辨取勝之心乎來書之意所以見教者甚至而其末乃有若猶有疑不憚下教之言熹固不敢當此然區區鄙見亦不敢不為老兄傾倒也不審尊意以為如何如曰未然則我日斯邁而月斯征各尊所聞各行所知亦可矣無復可望於必同也言及於此悚息之深千萬幸察近見國史濂溪傳載此圖説乃云自無極而為太極若使濂溪本書實有自為兩字則信如老兄所言不敢辨矣然因渠添此二字却見得本無此字之意愈益分明請試思之答陳同甫數日山間從遊甚樂分袂不勝惘然君舉已到未熹來日上剡溪然不能久留只一兩日便歸蓋城中諸寄居力來言不可行深咎前日衢婺之行也如此則山間之行不容復踐老兄與君舉能一來此間相聚為幸官舍無人得以從容殊勝在道間關置車中不得終日相語也君舉兄不敢遽奉問幸為深致此意千萬千萬戰國䇿論衡一書并自注田説二小帙并往觀之如何也所定文中子千萬携來陳叔逹説有韓公所定禮儀尚未及往借也别後鬱鬱思奉偉論夢想以之臨風引領尤不自勝與陳同甫君舉竟未有來期老兄想亦畏暑未必遽能枉顧勢須秋涼乃可為期但賤迹孤危力小任重政恐旦夕便以罪去耳旱勢巳成三日前猶蒸鬱然竟作雨不成此兩月晨夜凄涼亭午慘烈無復更有雨意雖祈禱不敢不盡誠然視州縣間政事無一可以召和而弭災者未知將復作何究竟也本欲俟旬日間力懇求去緣待罪文字未報未敢遽發今遂遭此旱虐如何更敢求自便但恐自以罪罷則幸甚不然則未知所以為計也不審髙明將何以見教也新論竒偉不常真所創見驚魂未定未敢遽下語俟再得餘篇乃敢請益耳婺人得錢守比之他郡事體殊不同他人直是無一點愛人底心無醫治處也趙倅之去甚可惜鄙意亦欲具曽救荒官吏殿最以聞以方俟罪嫌於論功遂不敢上不知錢守曽再奏否若其遂行實可惜也書義破題真張山人所謂著相題詩者句意俱到不勝嘆服他文有可録示者幸併五篇見教洗此昏憒也向説方巖之下伯恭所樂遊處其名為何其地屬誰氏幸批示近刋伯恭所定古易頗可觀尚未竟少俟斷手即奉寄但恐抱膝長嘯人不讀此等俗生鄙儒文字耳社中諸友朋坐夏安穩山間想見虛涼無城市歊煩之氣比所授之次第亦可使聞一二乎可與立者未可與權碩明者之審此也答陳同甫病中不能整理别頭項文字間取舊書諷詠之亦覺有味於反身之功亦頗有得力處他亦不足言也示喻見豫之意甚厚然僕豈其人乎明者於是乎不免失言之纍矣震之九四向來顔魯子以納甲推賤命以為正當此爻常恨未曉其説今同甫復以事理推配與之暗合如此然則此事固非人之所能為矣附託之戒敢不敬承然其事之曲折未易𥿄筆既也叔昌所云𥘉實有之蓋意老兄上未及於無情而下決不至於不及情是以疑其未免乎此今得來喻乃知老兄遂能以義勝私如此真足為一世之豪矣而區區妄意所謂淺之為丈夫者又以自愧也武夷九曲之中比縳得小屋三數間可以遊息春間嘗一到留上旬餘溪山回合雲煙開斂旦暮萬狀信非人境也嘗有數小詩朋舊為賦者亦多薄冗無人寫得後便當寄呈求數語韓丈亦許為作記文也此生本不擬為時用中間立腳不牢容易一出取困而歸自近事而言則為廢斥自𥘉心而言則可謂爰得我所矣承許見顧若得遂從容此山之間𣢾聽竒偉驚人之論亦平生快事也但聞未免俯就鄉舉正恐自此騫騰未暇尋此寂漠之濵耳䇿問前篇鄙意猶守明招時説後篇極中時弊但須亦大有更張乃可施行若事事只如今日而欲廢法吾恐無法之害又有甚於有法之時也如何如何去年十論大意亦恐援溺之意太多無以存不親授之防耳後生輩未知三綱五常之正道遽聞此説其害將有不可勝救者碩明者之反之也妄意如此或未中理更告反覆幸幸李衛公集一本致几間此公才氣事業當與春秋戰國時何人為比幸一評之早以見寄幸甚與陳同甫比忽聞有意外之禍甚為驚歎方念未有相為致力處又聞巳遂辨白而歸深以為喜人生萬事真無所不有也比日久雨蒸鬱伏惟尊候萬福歸來想諸况仍舊然凡百亦冝痛自收斂此事合説多時不當至今日遲頓不及事固為可罪然觀老兄平時自處於法度之外不樂聞儒生禮法之論雖朋友之賢如伯恭者亦以法度之外相處不敢進其逆耳之論每有規諷必宛轉回互巧為之説然後敢發平日狂妄深竊疑之以為愛老兄者似不當如此方欲俟後會從容面罄其説不意罷逐之遽不及盡此懷也今兹之故雖不知所由或未必有以召之然平日之所積似亦不為無以集衆尤而信讒口者矣老兄髙明剛決非吝於改過者碩以愚言思之絀去義利雙行王霸並用之説而從事於懲忿窒欲遷善改過之事粹然以醇儒之道自律則豈獨免於人道之禍而其所以培壅本根澄源正本為異時發揮事業之地者益光大而髙明矣荷相與之厚忘其狂率敢盡布其腹心雖不足以贖稽緩之罪然或有輔於將來耳不審髙明以為如何悚仄悚仄答陳同甫昨聞洶洶常託叔度致書奉問時猶未知端的不能無憂便中忽得五月二十六日所示字具審曲折喜不可言且得脫此虎口外此是非得失置之不足言也林叔和過此又得聞其事首末尤詳是亦可歎也巳還家之後諸况如何所謂少林面壁老兄決做不得然亦正不當如此名教中自有安樂處區區所碩言者巳具之前書矣大率世間議論不是太過即是不及中間自一條平穩正當大路却無人肯向上頭立腳殊不可曉老兄聰明非他人所及試一思愚言不可以為平平之論而忽之也偶有便匆匆未暇索言答陳同甫夏中朱同人歸辱書始知前事曲折深以愧歎尋亦嘗别附問不謂尚未逹也兹承不逺千里專人枉書尤荷厚意且審還舍以來尊候萬福足以為慰而細詢來使又詳歸路戒心之由重增歎駭也事逺日忘計今處之帖然矣熹衰病杜門忽此生朝孤露之餘方深哽愴乃蒙不忘逺寄新詞副以香果佳品至於裘材又出機杼此意何可忘也但兩詞豪宕清婉各極其趣而投之空山樵牧之社𬒳之衰退老朽之人似太不著題耳示喻縷縷殊激懦衷以老兄之髙明俊傑世間榮悴得失本無足為動心者而細讀來書似未免有不平之氣區區竊獨妄意此殆平日才太髙氣大鋭論太險迹太露之過是以困於所長忽於所短雖復更歷變故顛沛至此而猶未知所以反求之端也嘗謂天理人欲二字不必求之於古今王伯之迹但反之於吾心義利邪正之間察之愈密則其見之愈明持之愈嚴則其發之愈勇孟子所謂浩然之氣者蓋斂然於規矩凖繩不敢走作之中而其自任以天下之重者雖賁育莫能奪也是豈才能血氣之所為哉老兄視漢高帝唐太宗之所為而察其心果出於義耶出於利耶出於邪耶正耶若高帝則私意分數猶未甚熾然巳不可謂之無太宗之心則吾恐其無一念之不出於人欲也直以其能假仁借義以行其私而當時與之爭者才能知術既出其下又不知有仁義之可借是以彼善於此而得以成其功耳若以其能建立國家傳世久逺便謂其得天理之正此正是以成敗論是非但取其獲禽之多而不羞其詭遇之不出於正也千五百年之間正坐如此所以只是架漏牽輔過了時日其間雖或不無小康而堯舜三王周公孔子所傳之道未嘗一日得行於天地之間也若論道之常存却又𥘉非人所能預只是此箇自是亘古亘今常在不滅之物雖千五百年𬒳人作壞終殄滅他不得耳漢唐所謂賢君何嘗有一分氣力扶助得他耶至於儒者成人之論專以儒者之學為出於子夏此恐未可懸斷而子路之問成人夫子亦就其所及而告之故曰亦可以為成人則非成人之至矣為子路為子夏此固左學者各取其性之所近然臧武仲卞莊子冉求中間插一箇孟公綽齊手並腳又要文之以禮樂亦不是管仲蕭何以下規模也向見祭伯恭文亦疑二公何故相與聚頭作如此議論近見叔昌子約書中説話乃知前此此話巳説成了亦嘗因答二公書力辨其説然渠來説得不索性故鄙論之發亦不能如此書之盡耳老兄人物竒偉英特恐不但今日所未見向來得失短長正自不須更挂齒牙向人分説但鄙意更欲賢者百尺竿頭進取一步將來不作三代以下人物省得氣力為漢唐分踈即更脫灑磊落耳李孔霍張則吾豈敢然夷吾景略之事亦不敢為同父碩之也大字甚荷不鄙但尋常不欲為寺觀寫文字不欲破例此亦拘儒常態想又發一笑也寄來𥿄却為寫張公集句坐右銘去或恐萬一有助於積纍涵養睟靣盎背之功耳聞曽到會稽曽逰山否越中山水氣象終是淺促意思不能深逺也武夷亦不至甚好但近處無山隨分占取做自家境界春間至彼山髙水深紅緑相映亦自不惡但年來窘束殊甚詩成屋未就亦無人力可往來每以為念耳答陳同甫人至忽奉誨示獲聞即日春和尊候萬福感慰并集且聞葺治園亭規模甚盛甚恨不得往同其樂而聽髙論之餘也樓臺側畔楊花過簾幕中間燕子飛只是富貴者事做沂水舞雩意思不得亦不是躬耕隴畝抱膝長嘯底氣象却是自家此念未斷便要主張將來做一般看了竊恐此正是病根與平日議論同一關捩也二公詩皆甚髙而正則摹寫尤工卒章致意尤篤令人歎息所惜不曽向頂門上下一針猶落第二義也君舉得郡可喜不知闕在何時正則聞甚長進比得其書甚久不曽答得前日有便巳寫下而復遺之今以附納幸為致之觀其議論亦多與鄙意不同此事儘當啇量但卒乍未能得相聚便得相聚亦恐未便信得及耳坐右銘固知在所鄙棄然區區寫去之意却不可委之他人千萬亟為取以見還為幸自欲投之水火也他所誨諭其説甚長偶病眼數日未愈而來使留此頗久告歸甚亟不免口授小兒别𥿄奉報不審髙明以為如何答陳同甫來教纍𥿄縱橫竒偉神怪百出不可正視雖使孟子復生亦無所容其喙况於愚昧蹇劣又老兄所謂賤儒者復安能措一詞於其間哉然於鄙意實有所未安者不敢雷同曲相阿徇請復陳其一二而明者聽之也來教云云其説雖多然其大槩不過推尊漢唐以為與三代不異貶抑三代以為與漢唐不殊而其所以為説者則不過以為古今異宜聖賢之事不可盡以為法但有救時之志除亂之功則其所為雖不盡合義理亦自不妨為一世英雄然又不肯説此不是義理故又須説天地人並立為三不應天地獨運而人為有息今既天地常存即是漢唐之君只消如此已能做得人底事業而天地有所賴以至今其前後反覆雖縷縷多端要皆以證成此説而巳若熹之愚則其所見固不能不與此異然於其間又有不能不同者今請因其所同而核其所異則夫毫釐之差千里之繆將有可得而言者矣來書心無常泯法無常廢一假乃一書之關鍵鄙意所同未有多於此假者也而其所異亦未有甚於此假者也蓋有是人則有是心有是心則有是法固無常泯常廢之理但謂之無常泯即是有時而泯矣謂之無常廢即是有時而廢矣蓋天理人欲之並行其或斷或續固宜如此至若論其本然之妙則惟有天理而無人欲是以聖人之教必欲其盡去人欲而復全天理也若心則欲其常不泯而不恃其不常泯也法則欲其常不廢而不恃其不常廢也所謂人心惟危道心惟微惟精惟一允執厥中者堯舜禹相傳之密旨也夫人自有生而梏於形體之私則固不能無人心矣然而必有得于天地之正則又不能無道心矣日用之間二者並行迭為勝負而一身之是非得失天下之治亂安危莫不係焉是以欲其擇之精而不使人心得以雜乎道心欲其守之一而不使天理得以流於人欲則凡其所行無一事之不得其中而於天下國家無所處而不當夫豈任人心之自危而以有時而泯者為當然任道心之自微而幸其須臾之不常泯也哉夫堯舜禹之所以相傳者既如此矣至於湯武則聞而知之而又反之以至於此者也夫子之所以傳之顔淵曽參者此也曽子之所以傳之子思孟軻者亦此也故其言曰一日克巳復禮天下歸仁焉又曰吾道一以貫之又曰道不可須臾離也可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞又曰其為氣也至大至剛以直養而無害則塞乎天地之間此其相傳之妙儒者相與謹守而共學焉以為天下雖大而所以治之者不外乎此然自孟子既沒而世不復知有此學一時英雄豪傑之士或以資質之美計慮之精一言一行偶合於道者蓋亦有之而其所以為之田地根本者則固未免乎利欲之私也而世之學者稍有才氣便自不肯低心下意做儒家事業聖學功夫又見有此一種道理不要十分是當不礙諸般作為便可立大功名取大冨貴於是心以為利爭欲慕而為之然又不可全然不顧義理便於此等去處指其須臾之間偶未泯滅底道理以為只此便可與堯舜三代比隆而不察其所以為之田地本根者之無有是處也夫三才之所以為三才者固未嘗有二道也然天地無心而人有欲是以天地之運行無窮而在人者有時而不相似蓋義理之心頃刻不存則人道息人道息則天地之用雖未嘗巳而其在我者則固即此而不行矣不可但見其穹然者常運乎上頽然者常在乎下便以為人道無時不立而天地賴之以存之驗也夫謂道之存亡在人而不可舍人以為道者正以道未嘗亡而人之所以體之者有至有不至耳非謂苟有是身則道自存必無是身然後道乃亡也天下固不能人人為堯然必堯之道行然後人紀可修天地可立也天下固不能人人皆桀然亦不必人人皆桀而後人紀不可修天地不可立也但主張此道之人一念之間不似堯而似桀即此一念之間便是架漏度日牽輔過時矣且曰心不常泯而未免有時之或泯則又豈非所謂半生半死之蟲哉蓋道未嘗息而人自息之所謂非道亡也幽厲不由也正謂此耳惟聖盡倫惟王盡制固非常人所及然立心之本當以盡者為法而不當以不盡者為凖故曰不以舜之所以事堯事君不敬其君者也不以堯之所以治民治民賊其民者也而况謂其非盡欺人以為倫非盡罔世以為制是則雖以來書之辨固不謂其絶無欺人罔世之心矣欺人者人亦欺之罔人者人亦罔之此漢唐之治所以雖極其盛而人不心服終不能無愧於三代之盛時也夫人只是這箇人道只是這箇道豈有三代漢唐之别但以儒者之學不傳而堯舜禹湯文武以來轉相授受之心不明於天下故漢唐之君雖或不能無暗合之時而其全體却只在利欲上此其所以堯舜三代自堯舜三代漢祖唐宗自漢祖唐宗終不能合而為一也今若必欲撤去限隔無古無今則莫若深考堯舜相傳之心法湯武反之之功夫以為凖則而求諸身却就漢祖唐宗心術微處痛加繩削取其偶合而察其所自來黜其悖戾而究其所從起庶幾天地之常經古今之通義有以得之於我不當坐談既往之迹追飾巳然之非便指其偶同者以為全體而謂其真不異於古之聖賢也且如約法三章固善矣而卒不能除三族之令一時功臣無不夷滅除亂之志固善矣而不免竊取宫人私侍其父其他亂倫逆理之事往往皆身犯之蓋舉其始終而言其合於義理者常少而其不合者常多合於義理者常小而其不合者常大但後之觀者於此根本功夫自有欠闕故不知其非而以為無害於理抑或以為雖害於理而不害其獲禽之多也觀其所謂學成人而不必於儒攪金銀銅鐡為一器而主於適用則亦可見其立心之本在於功利有非辨説所能文者矣夫成人之道以儒者之學求之則夫子所謂成人也不以儒者之學求之則吾恐其畔棄繩墨脫略規矩進不得為君子退不得為小人正如攪金銀銅鐡為一器不唯壞却金銀而銅鐡亦不得盡其銅鐡之用也荀卿固譏遊夏之賤儒矣不以大儒目周公乎孔子固稱管仲之功矣不曰小器而不知禮乎人也之説古注得之若管仲為當得一箇人則是以子産之徒為當不得一箇人矣聖人詞氣之際不應如此之粗厲而鄙也其他瑣屑不能盡究但不傳之絶學一事却恐更須討論方見得從上諸聖相傳心法而於後世之事有以裁之而不失其正若不見得却是自家耳目不髙聞見不的其所謂洪者乃混雜而非真洪所謂慣者乃流徇而非真慣竊恐後生傳聞輕相染習使義利之别不明舜跖之塗不判眩流俗之觀聽壞學者之心術不唯老兄為有識者所議而朋友亦且陷於收司連坐之法此熹之所深憂而甚懼者故敢極言以求定論若猶未以為然即不若姑置是事而且求諸身不必徒為譊譊無益於道且使卞莊子之徒得以竊笑於旁而隂行其計也答陳同甫示喻縷縷備悉雅意然區區鄙見常竊以為亘古亘今只是一體順之者成逆之者敗固非古之聖賢所能獨然而後世之所謂英雄豪傑者亦未有能舍此理而得有所建立成就者也但古之聖賢從本根上便有惟精惟一功夫所以能執其中徹頭徹尾無不盡善後來所謂英雄則未嘗有此功夫但在利欲場中頭出頭沒其資美者乃能有所暗合而隨其分數之多少以有所立然其或中或否不能盡善則一而巳來喻所謂三代做得盡漢唐做得不盡者正謂此也然但論其盡與不盡而不論其所以盡與不盡却將聖人事業去就利欲場中比並較量見有倣佛相似便謂聖人樣子不過如此則所謂毫釐之差千里之繆者其在此矣且如管仲之功伊吕以下誰能及之但其心乃利欲之心迹乃利欲之迹是以聖人雖稱其功而孟子董子皆秉法義以裁之不少假借蓋聖人之目固大心固平然於本根親切之地天理人欲之分則有毫釐必計絲髮不差者此在後之賢所以密傳謹守以待後來惟恐其一旦舍吾道義之正以徇彼利欲之私也今不講此而遽欲大其目平其心以斷千古之是非宜其指鐡為金認賊為子而不自知其非也若夫點鐡成金之譬施之有教無類遷善改過之事則可至於古人巳往之迹則其為金為鐡固有定形而非後人口舌議論所能改易久矣今乃欲追點功利之鐡以成道義之金不惟費却間心力無輔於既往正恐礙却正知見有害於方來也若謂漢唐以下便是真金則固無待於點化而其實又有大不然者蓋聖人者金中之金也學聖人而不至者金中猶有鐡也漢祖唐宗用心行事之合理者鐡中之金也曹操劉𥙿之徒則鐡而巳矣夫金中之金乃天命之固然非由外鑠淘擇不淨猶有可憾今乃無故必欲棄舍自家光明寶藏而奔走道路向鐡爐邊查礦中撥取零金不亦悮乎帝王本無異道王通分作兩三等巳非知道之言且其為道行之則是今莫之禦而不為乃謂不得巳而用兩漢之制此皆卑陋之説不足援以為據若果見得不傳底絶學自無此蔽矣今日許多間議論皆原於此學之不明故乃以為笆籬邉物而不之省其為喚銀作鐡亦巳甚矣來諭又謂凡所以為此論者正欲發儒者之所未備以塞後世英雄之口而奪之氣使知千塗萬轍卒走聖人樣子不得以愚觀之正恐不須如此費力但要自家見得道理分明守得正當後世到此地者自然若合符節不假言傳其不到者又何足與之爭耶况此等議論正是推波助瀾縱風止燎使彼益輕聖賢而愈無忌憚又何足以閉其口而奪其氣乎熹前月𥘉間略入城歸來還了幾處人事遂入武夷昨日方歸元甚倦甚目亦大昏作字極艱草草布此語言粗率不容持擇千萬勿過其間亦有瑣細曲拆不暇盡辨然明者讀之固必有以深得其心不待其詞之悉矣何丈墓文筆勢竒逸三復歎息不能巳挽詩以心氣衰弱不能應四方之求多所辭却近不得巳又不免辭多就少隨力應副往往皆不能滿其所欲今若更作此即與墓額犯重破却見行比例矣且乞蠲免如何如何抱膝吟亦未遑致思兼是前論未定恐未必能發明賢者之用心又成虛設若於此不疑則前所云者便是一篇不押韻無音律底好詩自不須更作也如何如何答陳同甫誨諭縷縷甚荷不鄙但區區愚見前書固巳盡之矣細讀來諭愈覺費力正如孫子荆洗耳礪齒之云非不雄辨敏捷然枕流潄石終是不可行也巳往是非不足深較如今日計但當窮理修身學取聖賢事業使窮而有以獨善其身逹則有以兼善天下則庶幾不枉為一世人耳答陳同甫方念久不聞動靜使至忽辱手書獲聞近况深以為喜且承雅詞下逮鄭重有加副以蜀縑佳果吳箋益見眷存之厚顧衰病支離霜露悽惻無可以稱盛意者第增愧怍耳喫緊些兒之句尤荷髙明假借之重然鄙儒俗生何足語此咏歎以還不知所以報也熹今年夏中粗似小康涉秋兩為鄉人牽挽𬞞食請兩積傷脾胃遂不能食食亦不化中間調理稍似復常又為腳氣發動用藥過冷今遂大病疲乏不可言丹附乳石平日不敢向口者今皆雜進尚未見效意氣摧頽如日將暮恐不得久為世上人矣來喻衮衮讀之惘然反復數過尚不能該其首末蓋神思之衰落如此况能相與往復上下其論哉向來讀書頗務精熟中間亦幸了得數書自謂略能窺見古人用心處未覺千歲之為逺然亦無可告語者時一思之以自笑耳其間一二有業未就今病巳矣不能復成書矣不知後世之子雲堯夫復有能成吾志者否然亦已置之不能復措意間也只今日用功夫養病之餘却且收拾身心從事於古人所謂小學者以輔前日粗踈脫略之咎蓋亦心庶幾焉而力或有所未能也同父聞之當復見笑然韓子所謂斂退就新懦趨營悼前猛者區區故人之意尚不能不以此有望於髙明也如何如何此外世俗是非毁譽何足挂齒牙間細讀來書似於此未能無小芥蒂也大風吹倒亭子却似天公會事發彼洛陽亭館又何足深羡也嘗論孟子説大人則藐之孟子固未嘗不畏大人但藐其巍巍然者耳辨得此心即更掀却卧房亦且露地睡似此方是真正大英雄人然此一種英雄却是從戰戰兢兢臨深履薄處做將出來若是血氣粗豪却一點使不著也伯恭平時亦嘗説及此否此公今日何處得來然其於朋友不肯盡情亦使人不能無遺恨也抱膝吟久做不成蓋不合先寄陳葉二詩來田地都𬒳占却教人無下手處也况今病思如此是安能復有好語道得老兄意中事耶承欲為武夷之遊甚慰所望但此山冬寒夏熱不可居惟春暖秋涼紅緑紛葩霜清木脫此兩時節為勝遊耳今春才得一到而不暇宿秋來以病未能再往職事甚覺弛廢若得來春命駕當往為數日𣢾也但有一事處之不安不敢不布聞私居貧約無由遣人往問動靜而歲煩遣介存問生死遂為故事既又闕然不報而坐受此過當之禮雖兄不以為譴而實非愚昧所敢安也自此幸損此禮因人入城時以一二字付叔度子約俾轉以來亦足以道情素不為莫往莫來者矣如何如何答陳同甫熹衰病如昨不足言但所見淺滯只是舊時人承喻正則自以為進後生可畏非虛言也想巳相見必深得其要領恨不得與聞一二然自度愚暗於老兄之言尚多未解政使得聞決是曉會不得如前書所報一二條計於盛意必是未契又如今書所喻過分不止之説亦區區所未喻如僕所見却是自家所以自處者未能盡絶私意之纍而於所以開導聰明者未盡其力爾故夬以五陽之盛而比一隂猶欲決之故其繇曰揚于王庭孚號有厲告自邑不利即戎利有攸往蓋雖危懼自修不極其武而揚庭孚號利有攸往𥘉不顧後患而小却也拙詩前巳拜稟大字固當如戒但恨未識錢君不知其所謂正與大者為如何未敢容易下筆也來詩有大正志學之語逢時報主深悉雅志此在髙明必巳有定論非他人所得預然所謂不能自為時者則又非區區所敢聞也但碩老兄母出於先聖規矩凖繩之外而用力於四端之微以求乎兖公之所樂如其所以告於巍巍當坐之時之心則其行止忤合付之時命有不足言矣就其不遇獨善其身以明大義於天下使天下之學者皆知吾道之正而守之以待上之使令是乃所以報不報之恩者亦豈必進為而撫世哉佛者之言曰將此身心奉塵剎是則名為報佛恩而杜子美亦云四鄰來報出何必吾家操此言皆有味也夫聖賢固不能自為時然其仕久止速皆當其可則其所以自為時者亦非他人之所能奪矣豈以時之不合而變吾所守以徇之哉答陳同甫癸丑九月二十四日自聞榮歸日欲遣人致問未能然亦嘗附鄰舍陳君一書於城中轉逹不知已到未也專使之來伏奉手誨且有新詞厚幣佳實之况感認不忘之意愧怍亡喻然衰晚病疾之餘霜露永感每辱記存始生過為之禮秪益悲愴自此告略去之也比日秋隂伏惟尊候萬福熹既老而病無復強健之理比灼艾後始粗能食然亦未能如舊且少寬旬月未即死耳新詞宛轉説盡風物好處但未知常程正路與竒遇是同是别進御與不進御相去又多少此處更須得長者自下一轉語耳老兄志大宇宙勇邁終古伯恭之論無復改評今日始於後生叢中出一口氣蓋未足為深賀然出身事主由此權輿便不碌碌則異時事業亦可卜矣但來書諸論鄙意頗未盡曉如云無動何以示易不知今欲如何其動如何其易此其區處必有成規恨未得聞其詳也又如二者相似而實不同處亦所未喻若如鄙意則須是先得吾身好黨類亦好方能得吾君好天下國家好而所謂好者又有虛實大小久近之不同若自吾身之好而推之則凡所謂好者皆實皆大而又久逺若不自吾身推之則彌縫掩覆雖可以苟合於一時而凡所謂好者皆為他日不可之病根矣蓋修身事君𥘉非二事不可作兩般看此是千聖相傳正法眼藏平日所聞於師友而竊守之今老且死不容改易如來喻者或是諸人事宜非老僕所敢聞也不知象先所論與此如何向見此公差強人意恨未得欵曲盡所懷耳此中今夏不雨早稻多損秋𥘉一雨意晚稻可望今又不雨多日山間得霜又早次第亦無全功幸日下米價低平且爾遣日未知向後如何耳抱膝之約非敢食言正為前此所論未定不容草草下語須俟他時相逢彈指無言可説方敢通箇消息但恐彼時又不須更作這般間言語耳人還姑此為報未即會晤千萬以時自愛倚俟詔除晦庵先生朱文公文集卷第三十六閩縣學訓導何器校
