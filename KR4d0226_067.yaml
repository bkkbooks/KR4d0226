body:
  text: 雜著元亨利貞說元亨利貞性也生長收藏情也以元生以亨長以利收以貞藏者心也仁義禮智性也惻隱羞惡辭譲是非情也以仁愛以義惡以禮譲以智知者心也性者心之理也情者心之用也心者性情之主也程子曰其體則謂之易其理則謂之道其用則謂之神正謂此也又曰言天之自然者謂之天道言天之付與萬物者謂之天命又曰天地以生物爲心亦謂此也易象說易之有象其取之有所從其推之有所用非苟爲寓言也然兩漢諸儒必欲究其所從則旣滯泥而不通王弼以來直欲推其所用則又踈畧而無㨿二者皆失之一偏而不能闕其所疑之過也且以一端論之乾之爲馬坤之爲牛說卦有明文矣馬之爲徤牛之爲順在物有常理矣至於案文責卦若屯之有馬而無乾離之有牛而無坤乾之六龍則或疑於震坤之牝馬則當反爲乾是皆有不可曉者是以漢儒求之說卦而不得則遂相與創爲互體變卦五行納甲飛伏之法參互以求而幸其偶合其說雖詳然其不可通者終不可通其可通者又皆傳㑹穿鑿而非有自然之勢唯其一二之適然而無待於巧說者爲若可信然上無所關於義理之夲原下無所資於人事之訓戒則又可必苦心極力以求於此而欲必得之哉故王弼曰義苟應徤何必乾乃爲馬爻苟合順何必坤乃爲牛而程子亦曰理無形也故假象以顯義此其所以破先儒膠固支離之失而開後學玩辭玩占之方則至矣然觀其意又似直以易之取象無復有所自來但如詩之比興孟子之譬喻而巳如此則是說卦之作爲無所與於易而近取諸身逺取諸物者亦剰語矣故疑其說亦若有未盡者因竊論之以爲易之取象固必有所自來而其爲說必巳具於大卜之官頋今不可復考則姑闕之而直據辭中之象以求象中之意使足以爲訓戒而决吉㐫如王氏程子與吾本義之云者其亦可矣固不必深求其象之所自來然亦不可直謂假設而遽欲忘之也易精變神說變化之道莫非神之所爲也故知變化之道則知神之所爲矣易有聖人之道四焉所謂變化之道也觀變玩占可以見其精之至矣玩辭觀象可以見其變之至矣然非有寂然感通之神則亦何以爲精爲變而成變化之道哉此變化之道所以爲神之所爲也所以極深者以其㡬也所以研㡬者以其變也極深研㡬所以不疾而速不行而至者以其神也此又發明上文之意復以易有聖人之道四焉者結之也或曰至精至變皆以書言之矣至神之妙亦以書言可乎曰至神之妙固無不在詳考之文意則實亦以書言之也所謂无思无爲寂然不動云者言在冊象在畫蓍在櫝而變未形也至於玩辭觀象而揲蓍以變則感而遂通天下之故矣推而極於天地之大反而驗諸心術之微其一動一静循環始終之際至神之妙亦如此而巳矣鳴呼此其所以不疾而速不行而至也歟參伍以變錯綜其數說參以三數之也伍以五數之也如云什伍其民如云或相什伯非直爲三與五而巳也盖紀數之法以三數之則遇五而齊以五數之則遇三而㑹故荀子曰窺敵制變欲伍以參注引韓子曰省同異之言以知朋黨之分偶三五之驗以責陳言之實又曰參之以比物五之以合三而漢書趙廣漢傳亦云參伍其賈以類相凖皆其義也易所謂三伍以變者盖言或以三數而變之或以伍數而變之前後多寡更相反復以不齊而要其齊如河圗洛書大衍之數伏羲文王之卦暦象之日月五星章蔀紀元是皆各爲一法不相依附而不害其相通也綜字之義沙随得之然錯綜自是兩事錯者雜而互之也綜者條而理之也參伍錯綜又各是一事參伍所以通之其治之也簡而䟽錯綜所以極之其治之也繁而宻易寂感說易曰无思也无爲也寂然不動感而遂通天下之故者何也曰无思慮也无作爲也其寂然者無時而不感其感通者無時而不寂也是乃天命之全體人心之至正所謂體用之一源流行而不息者也疑若不可以時處分矣然於其未發也見其感通之體於巳發也見其寂然之用亦各有當而實未嘗分焉故程子曰中者言寂然不動者也和者言感而遂通者也然中和以性情言者也寂感以心言者也中和盖所以爲寂感也觀言字者字可以見其㣲意矣舜典象刑說聖人之心未感於物其體廣大而虚明絶無毫髪偏倚所謂天下之大本者也及其感於物也則喜怒哀樂之用各随所感而應之無一不中節者所謂天下之達道也盖自本體而言如鏡之未有所照則虚而巳矣如衡之未有所加則平而巳矣至語其用則以其至虚而好醜無所遁其形以其至平而輕重不能違其則此所以致其中和而天地位萬物育雖以天下之大而舉不出乎吾心造化之中也以此而論則知聖人之於天下其所以爲慶賞威刑之具者莫不各有所由而舜典所論敷奏以言明試以功車服以庸與夫制刑明辟之意皆可得而言矣雖然喜而賞者陽也聖人之所欲也怒而刑者隂也聖人之所惡也是以聖人之心雖曰至虚至平無所偏倚而於此二者之間其所以處之者亦不能無小不同者故其言又曰罪疑惟輕功疑惟重此則聖人之㣲意也然其行之也雖曰好賞而不能賞無功之士雖曰惡刑而不敢縱有罪之人而功罪之實苟巳曉然而無疑則雖欲輕之重之而不可得是又未嘗不虚不平而大本之立逹道之行固自若也故其賞也必察其言審其功而後加以車服之賜其刑也必曰象以典刑者畫象而示民以墨劓剕宫大辟五等肉刑之常法也其曰流宥五刑者放之於逺所以寛夫犯此肉刑而情輕之人也其曰鞭作官刑扑作教刑者官府學校之刑所以馭夫罪之小而未麗于五刑者也其曰金作贖刑使之入金而免其罪所以贖夫犯此鞭扑之刑而情之又輕者也此五者刑之法也其曰眚災肆赦者言不幸而觸罪者則肆而赦之其曰怙終賊刑者言有恃而不改者則賊而刑之此二者法外之意猶今律令之名例也其曰欽哉欽哉惟刑之恤哉者此則聖人畏刑之心閔夫死者之不可復生刑者之不可復續惟恐察之有不審施之有不當又雖巳得其情而猶必矜其不教無知而抵冐至此也嗚呼詳此數言則聖人制刑之意可見而其於輕重淺深出入取舎之際亦巳審矣雖其重者或至於誅斬㫁割而不少貸然本其所以至此則其所以施於人者亦必當有如是之酷矣是以聖人不忍其𬒳酷者之衘冤負痛而爲是以報之雖若甚慘而語其實則爲適得其冝雖以不忍之心畏刑之甚而不得赦也唯其情之輕者聖人於此乃得以施其不忍畏刑之意而有以宥之然亦必投之逺方以禦魑魅盖以此等所犯非殺傷人則亦或淫或盗其情雖輕而罪實重若使旣免於刑而又得便還郷里復爲平民則彼之𬒳其害者寡妻孤子將何靣目以見之而此幸免之人髪膚支體了無所傷又將得以遂其前日之惡而不知悔此所以必曰流以宥之而又有五流有宅五宅三居之文也若夫鞭扑之刑則雖刑之至小而其情之輕者亦必許其入金以贖而不忍輙以真刑加之是亦仁矣然而流專以宥肉刑而不下及於鞭扑贖專以待鞭扑而不上及於肉刑則其輕重之間又未嘗不致詳也至於過誤必赦故犯必誅之法則又權衡乎五者之内欽哉欽哉惟刑之恤之㫖則常通貫乎七者之中此聖人制刑明辟之意所以雖或至於殺人而其反覆表裏至精至宻之妙一一皆從廣大虗明心中流出而非私智之所爲也而或者之論乃謂上古惟有肉刑舜之爲流爲贖爲鞭爲朴乃不忍民之斬戮而始爲輕刑者則是自堯以上雖犯鞭朴之刑者亦必使從墨劓之坐而舜之心乃獨不忍於殺傷淫盗之凶賊而反忍於見殺見傷爲所侵犯之良民也聖人之心其不如是之殘賊偏倚而失其正亦巳明矣又謂周之穆王五刑皆贖爲能復舜之舊者則固不察乎舜之贖𥘉不上及於五刑又不察乎穆王之法亦必疑而後贖也且以漢宣之世張敞以討羗之役兵食不繼建爲入糓贖罪之法𥘉亦未嘗及夫殺人及盗之品也而蕭望之等猶以爲如此則富者得生貧者獨死恐開利路以傷治化曾謂三代之隆而以是爲得哉嗚呼世衰學絶士不聞道是以雖有粹羙之資而不免一偏之弊其於聖人公平正大之心有所不識而徒知切切焉飾其偏見之私以爲羙談若此多矣可勝辨哉若夫穆王之事以予料之殆必由其廵逰無度財匱民勞至其末年無以爲計乃特爲此一切權宜之術以自豐而又託於輕刑之說以違道而干譽耳夫子存之盖以示戒而程子䇿試嘗發問焉其意亦可見矣或者又謂四㐫之罪不輕於少正卯舜乃不誅而流之以爲輕刑之驗殊不知共兠朋黨鯀功不就其罪本不至死三苗拒命雖若可誅而蠻夷之國聖人本以荒忽不常待之雖有負犯不爲畔臣則姑竄之逺方亦正得其冝耳非故爲是以輕之也若少正卯之事則予嘗竊疑之盖論語所不載子思孟子所不言雖以左氏春秋内外傳之誣且駁而猶不道也乃獨荀况言之是必齊魯陋儒憤聖人之失軄故爲此說以夸其權耳吾又安敢輕信其言而遽稽以爲决乎聊并記之以俟來者周禮三徳說或問師氏之官以三徳教國子一曰至徳以爲道本二曰敏徳以爲行本三曰孝徳以知逆惡何也曰至徳云者誠意正心端本清源之事道則天人性命之理事物當然之則脩身齊家治國平天下之術也敏徳云者彊志力行畜徳廣業之事行則理之所當爲日可見之跡也孝徳云者尊祖愛親不忘其所由生之事知逆惡則以得於巳者篤實深固有以其知彼之逆惡而事不忍爲者也至徳以爲道本明道先生以之敏徳以爲行本司馬温公以之孝徳以知逆惡則趙無愧徐仲車之徒是已凡此三者雖曰各以其材品之髙下資質之所冝而教之然亦未有專務其一而可以爲成人者也是以列而言之以見其相湏爲用而不可偏廢之意盖不知至徳則敏徳者散漫無綂固不免乎篤學力行而不知道之譏然不務敏徳而一於至則又無以廣業而有空虚之弊不知敏徳則孝徳者僅爲匹夫之行而不足以通于神明然不務孝徳而一於敏則又無以立本而有悖徳之累是以兼陳備舉而無所遺此先王之敎所以本末相資精粗兩盡而不倚於一偏也其又曰教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長何也曰徳也者得於心而無所勉者也行則其所行之法而巳盖不夲之以其徳則無所自得而行不能以自脩不實之以其行則無所持循而徳不能以自進是以旣教之以三徳而必以三行繼之則雖其至末至粗亦無不盡而徳之脩也不自覺矣然是三者似皆孝徳之行而巳至於至徳敏徳則無與焉盖二者之行本無常師必恊于一然後有以獨見而自得之固非教者所得而預言也唯孝徳則其事爲可指故又推其類而兼爲友順之目以詳教之以爲學者雖或未得於心而事亦可得而勉使其行之不巳而得於心焉則進乎徳而無待於勉矣况其又能即是而充之以周於事而泝其原則孰謂至徳敏徳之不可至哉或曰三徳之教大學之學也三行之教小學之學也郷三物之爲教也亦然而巳詳樂記動静説樂記曰人生而静天之性也感於物而動性之欲也何也曰此言性情之妙人之所生而有者也盖人受天地之中以生其未感也純粹至善萬理具焉所謂性也然人有是性則即有是形有是形則即有是心而不能無感於物感於物而動則性之欲者出焉而善惡於是乎分矣性之欲即所謂情也又曰物至而知知而後好惡形焉何也曰上言性情之别此指情之動處爲言而性在其中也物至而知知之者心之感也好之惡之者情也形焉者其動也所以好惡而有自然之節者性也好惡無節於内知誘於外不能反躬天理㓕矣何也曰此言情之所以流而性之所以失也情之好惡本有自然之節惟其不自覺知無所􅉼養而大夲不立是以天則不明於内外物又從而誘之此所以流濫放逸而不自知也苟能於此覺其所以然者而反躬以求之則其流也庶乎其可制矣不能如是而惟情是狥則人欲熾盛而天理滅息尚何難之有哉此一節正天理人欲之機間不容息處惟其反躬自省念念不忘則天理益明存飬自固而外誘不能奪矣夫物之感人無窮而人之好惡無節則是物至而人化物也人化物也者滅天理而窮人欲何也曰上言情之所以流此以其流之甚而不反者言之也好惡之節天之所以與我也而至於無節宰制萬物人之所以爲貴也而反化於物焉天理惟恐其存之不至也而反㓕之人欲惟恐其制之不力也而反窮之則人之所以爲人者至是盡矣然天理秉彛終非可殄滅者雖化物窮欲至於此極苟能反躬以求天里之本然者則𥘉未嘗滅也但染習之深難覺而易昧難反而易流非厲知耻之勇而致百倍之功則不足以復其𥘉爾中庸首章說中庸曰天命之謂性率性之謂道脩道之謂教何也曰天命之謂性渾然全體無所不該也率性之謂道大化流行各有條貫也脩道之謂教克巳復禮日用工夫也知全體然後條貫可㝷而工夫有序然求所以知之又在日用工夫下學上逹而巳矣又曰道也者不可湏臾離也可離非道也是故君子戒謹乎其所不覩恐懼乎其所不聞莫見乎隱莫顯乎㣲故君子謹其獨也何也曰率性之謂道則無時而非道亦無適而非道如之何而可湏臾離也可湏臾離則非率性之謂矣故君子戒謹乎其所不覩恐懼乎其所不聞盖知道之不可湏臾離則隱㣲顯著未嘗有異所以必謹其獨而不敢以湏臾離也然豈怠於顯而偏於獨哉盖獨者致用之源而人所易忽於此而必謹焉則亦無所不謹矣喜怒哀樂未發謂之中發而皆中節謂之和中也者天下之大夲也和也者天下之逹道也致中和天地位焉萬物育焉何也曰天命之性渾然而巳以其體而言之則曰中以其用而言之則曰和中者天地之所以立也故曰大本和者化育之所以行也故曰逹道此天命之全也人之所受盖亦莫非此理之全喜怒哀樂未發是則所謂中也發而莫不中節是則所謂和也然人爲物誘而不能自定則大夲有所不立發而或不中節則逹道有所不行大本不立逹道不行則雖天理流行未嘗間斷而其在我者或㡬乎息矣惟君子知道之不可湏臾離者其體用在是則必有以致之以極其至焉盖敬以直内而喜怒哀樂無所偏倚所以致夫中也義以方外而喜怒哀樂各得其正所以致夫和也敬義夾持涵飬省察無所不用其戒謹恐懼是以當其未發而品節已具随所發用而夲體卓然以至寂然感通無少間斷則中和在我天人無間而天地之所以位萬物之所以育其不外是矣巳發未發說中庸未發已發之義前此認得此心流行之體又因程子凡言之者皆指巳發之云遂月心爲巳發而以性爲未發之中自以爲安矣比觀程子文集遺書見其所論多不符合因再思之乃知前日之說雖於心性之實未始有差而未發巳發命名未當且於日用之際欠却本領一叚工夫盖所失者不但文義之間而巳因條其語而附以巳見吿于朋友碩相與講焉恐或未然當有以正之文集云中即道也又曰道無不中故以中形道又云中即性也此語極未安中也者所以狀性之體叚如天圓地方又云中之爲義自過不及而立名若只以中爲性則中與性不合又云性道不可合一而言中止可言體而不可與性同徳又云中者性之德此爲近之又云不若謂之性中又云喜怒哀樂之未發謂之中赤子之心發而未逺乎中若便謂之中是不識大本也又云赤子之心可以謂之和不可謂之中遺書云只喜怒哀樂不發便是中又云旣思便是巳發喜怒哀樂一般又云當中之時耳無聞目無見然見聞之理在始得又云未發之前謂之静則可静中湏有物始得這裏最是難處能敬則自知此矣又云敬而無失便是喜怒哀樂未發謂之中也敬不可謂之中但敬而無失即所以中也又云中者天下之大本天地間亭亭當當直上直下之理出則不是惟敬而無失最盡又云存飬於未發之前則可求中於未發之前則不可又云未發更怎生求只平日􅉼飬便是􅉼飬久則喜怒哀樂發而中節又云善觀者却於巳發之際觀之右據此諸說皆以思慮未萌事物未至之時爲喜怒哀樂之未發當此之時即是心體流行寂然不動之處而天命之性體叚具焉以其無過不及不偏不倚故謂之中然巳是就心體流行處見故直謂之性則不可吕慱士論此大槩得之特以中即是性赤子之心即是未發則大失之故程子正之解中亦有求中之意盖答書時未服辨耳盖赤子之心動静無常非寂然不動之謂故不可謂之中然無營欲知巧之思故爲未逺乎中耳未發之中本體自然不湏窮索但當此之時敬以持之使此氣象常存而不失則自此而發者其必中節矣此日用之際本領工夫其曰却於巳發之處觀之者所以察其端倪之動而致擴充之功也一不中則非性之本然而心之道或㡬乎息矣故程子於此每以敬而無失爲言又云入道莫如敬未有能致知而不在敬者又曰􅉼養湏是敬進學則在致知以事言之則有動有静以心言之則周流貫徹其工夫𥘉無間㫁也但以静爲本爾周子所謂主静者亦是此意但言静則偏故程子又說敬向來講論思索直以心爲巳發而所論致知格物亦以察識端倪爲𥘉下手處以故缺却平日􅉼飬一叚功夫其日用意趣常偏於動無復深潜純一之味而其發之言語事爲之間亦常躁迫浮露無古聖賢氣象由所見之偏而然爾程子所謂凡言心者皆指巳發而言此却指心體流行而言非謂事物思慮之交也然與中庸本文不合故以爲未當而復正之固不可執其巳改之言而盡疑論說之誤又不可遂以爲當而不究其所指之殊也周子曰無極而太極程子又曰人生而静以上不容說纔說時便巳不是性矣盖聖賢論性無不因心而發若欲專言之則是所謂無極而不容言者亦無體叚之可名矣未審諸君子以爲如何程子養觀說程子曰存養於未發之前則可又曰善觀者却於巳發之際觀之何也曰此持敬之功貫通乎動静之際者也就程子此章論之方其未發必有事焉是乃所謂静中之知覺復之所以見天地之心也及其巳發随事觀省是乃所謂動上求静艮之所以止其所也然則静中之動非敬其孰能形之動中之静非敬其孰動察之故又曰學者莫若先理㑹敬則自知此矣然則學者豈可舎是而他求哉論語或問說一或曰程子以孝弟爲行仁之本而又曰論性則以仁爲孝弟之本何也曰仁之爲性愛之理也其見於用則事親從兄仁民愛物皆其爲之之事也此論性而以仁爲孝弟之本者然也但親者我之所自出兄者同出而先我故事親而孝從兄而弟乃愛之先見而尤切者若君子以此爲務而力行之至於行成而徳立則自親親而仁民仁民而愛物其愛有差等其施有漸次而爲仁之道生生而不窮矣此學孝弟所以爲仁之本也論語或問說二或曰子於有子孝弟之章旣以仁爲愛之理矣於巧言令色鮮仁之章又以爲心之徳何哉曰仁之道大不可以一言而盡也程子論四徳而曰四徳之元猶五常之仁偏言則一事專言則包四者推此而言則可見矣盖仁也者五常之首也而包四者惻隱仁之體也而貫四端故仁之爲義偏言之則曰愛之理前章所言之類是也專言之則曰心之徳後章所言之類是也其實愛之理所以爲心之徳是以聖門之學必以求仁爲要而語其所以行之者則必以孝弟爲先論其所以賊之者則必以巧言令色爲甚記語者所以列此二章於首章之次而其序又如此欲學者知仁之爲急而識其所當務與其所可戒也巧言令色說容貌詞氣之間正學者持養用力之地然有意於巧令以悅人之觀聴則心馳於外而鮮仁矣若是就此持飬發禁躁妄動必温恭只要體當自家直内方外之實事乃是爲巳之切求仁之要復何病乎故夫子告顔淵以克巳復禮之目不過視聴言動之間而曾子將死之善言亦不外乎容貌顔色詞氣三者而巳夫子所謂遜以出之辭欲巧者亦其一事也仲山甫之徳柔嘉維則令儀令色則大賢成徳之行而進乎此者夫子之逞顔色怡怡如也乃聖人動容周旋中禮之事又非仲山甫之所及矣至於小人訐以爲直色厲内荏則雖與巧言令色者不同然考其矯情飾僞之心實巧言令色之尤者故聖人惡之上蔡引此數條而不肯明言其所以然者將使學者深求而自得之也然令學者反求之於冥漠不可知之中失之愈逺言仁録中所解亦少曲折故詳論之使學者無淫思力索之苦而有以審夫用力之㡬焉觀過說觀過之說詳味經意而以伊川之說推之似非專指一人而言乃是通論人之所以有過皆是随其所偏或厚或薄或不忍或忍一有所過無非人欲之私若能於此㸔得兩下偏處便見勿忘勿助長之間天理流行鳶飛魚躍元無間斷故曰觀過斯知仁矣盖言因人之過而觀所偏則亦可以知仁非以爲必如此而後可以知仁也若謂觀巳過竊嘗試之尤覺未穩盖必俟有過而後觀則過惡巳形觀之無及久自悔咎乃是反爲心害而非所以養心若曰不俟有過而預觀平日所偏則此心廓然本無一事却不直下栽培􅉼養乃豫求偏處而注心觀之聖人平日教人養心求仁之術似亦不如此之支離也忠恕說子曰參乎吾道一以貫之曽子曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而巳矣曽子之學主於誠身其於聖人之日用觀省而服習之盖巳熟矣惟未能即此以見夫道之全體則不免疑其有二也然用力之久亦將自得矣故夫子以一貫之理告之盖當其可也曽子於是黙契其㫖然後知向之所從事者莫非道之全體雖變化萬殊而所以貫之者未嘗不一也此其自得之深冝不可以容聲矣然門人有問而以忠恕告之者盖以夫子之道不離乎日用之間自其盡巳而言則謂之忠自其及物而言則謂之恕本末上下皆所以爲一貫惟下學而上達焉則知其未嘗有二也夫子所以告曽子曽子所以告門人豈有異㫖哉君子所貴乎道者三說本末精粗無非道也而君子所貴貴其本而巳矣盖動容貌而能逺暴慢也正顔色而能近信也出辭氣而能逺鄙倍也三者道之得於身者也所謂本也若夫儀章器數之末道雖不外乎是然其分則有司之守而非君子之所有事矣曽子之言其亦如此而巳至論三者之所以然則必有内外交相飬之功焉積之之久而後能至於此也二先生發明此意最爲詳備朱公掞問學劉元承手編内各有一叚至於諸儒徃徃只以臨時強勉修飾爲功此固失之惟上蔡專以動正出三字爲用力處以能此則暴慢鄙倍不期逺而自逺此庶㡬得其本矣然亦只是臨時著力不見平日涵飬功夫又只以由中而出爲正不是恭敬持守之則以二先生之說格之則亦未免爲一偏之論也盡心說盡其心者知其性也知其性則知天矣言人能盡其心則是知其性能知其性則知天也盖天者理之自然而人之所由以生者也性者理之全體而人之所得以生者也心則人之所以主於身而具是理者也天大無外而性禀其全故人之本心其體廓然亦無限量惟其捁於形器之私滯於聞見之小是以有所蔽而不盡人能即事即物窮究其理至於一日㑹貫通徹而無所遺焉則有以全其本心廓然之體而吾之所以爲性與天之所以爲天者皆不外乎此而一以貫之矣太極說動静無端隂陽無始天道也始於陽成於隂本於静流於動者人道也然陽復本於隂静復根於動其動静亦無端其隂陽亦無始則人盖未始離乎天而天亦未始離乎人也元亨誠之通動也利貞誠之復静也元者動之端也本乎静貞者静之質也著乎動一動一静循環無窮而貞也者萬物之所以成終而成始者也故人雖不能不動而立人極者必主乎静惟主乎静則其著乎動也無不中節而不失其本然之静矣静者性之所以立也動者命之所以行也然其實則静亦動之息爾故一動一静皆命之行而行乎動静者乃性之真也故曰天命之謂性情之未發者性也是乃所謂中也天下之大本也性之巳發者情也其皆中節則所謂和也天下之逹道也皆天理之自然也妙性情之徳者心也所以致中和立大本而行達道者也天理之主宰也静而無不該者性之所以爲中也寂然不動者也動而無不中者情之發而得其正也感而遂通者也静而常覺動而常止者心之妙也寂而感感而寂者也明道論性說生之謂性止生之謂也天之付與萬物者謂之命物之禀受於天者謂之性然天命流行必二氣五行交感凝聚然後能生物也性命形而上者也氣則形而下者也形而上者一理渾然無有不善形而下者則紛紜雜揉善惡有所分矣故人物旣生則即此所禀以生之氣而天命之性存焉此程子所以發明告子生之謂性之說而以性即氣氣即性者言之也人生氣禀止不可不謂之性也所禀之氣所以必有善惡之殊者亦性之理也盖氣之流行性爲之主以其氣之或純或駁而善惡分焉故非性中本有二物相對也然氣之惡者其性亦無不善故惡亦不可不謂之性也先生又曰善惡皆天理謂之惡者本非惡但或過或不及便如此盖天下無性外之物本皆善而流於惡矣盖生之謂性止水流而就下也性則性而巳矣何言語之可形容哉故善言性者不過即其發見之端而言之而性之韞因可黙識矣如孟子之論四端是也觀水之流而必下則水之性下可知觀性之發而必善則性之韞善亦可知也皆水也止各自出來此又以水之清濁譬之水之清者性之善也流至海而不汚者氣禀清明自㓜而善聖人性之而全其天者也流未逺而巳濁者氣禀偏駁之甚自㓜而惡者也流旣逺而方濁者長而見異物而遷焉失其赤子之心者也濁有多少氣之昏明純駁有淺深也不可以濁者不爲水惡亦不可不謂之性也然則人雖爲氣所昏流於不善而性未甞不在其中特謂之性則非其本然謂之非性則𥘉不離是以其如此故人不可以不加澄治之功惟能學以勝氣則知此性渾然𥘉未甞壊所謂元𥘉水也雖濁而清者存故非將清來換濁旣清則本無濁故非取濁置一隅也如此則其本善而巳矣性中豈有兩物對立而並行也哉此理天命也止此舜有天下而不與者也此理天命也該始終本末而言也修道雖以人事而言然其所以修者莫非天命之夲然非人私智所能爲也然非聖人有不能盡故以舜明之定性說定性者存飬之功至而得性之本然也性定則動静如一而内外無間矣天地之所以爲天地聖人之所以爲聖人不以其定乎君子之學亦以求定而巳矣故擴然而太公者仁之所以爲體也物來而順應者義之所以爲用也仁立義行則性定而天下之動一矣所謂貞也夫豈急於外誘之除而反爲是憧憧哉然常人之所以不定者非其性之本然也自私以賊夫仁用知以害夫義是以情有所蔽而憧憧耳不知自反以去其所蔽頋以惡外物爲心而反求照於無物之地亦見其用力愈勞而燭理愈昧益以憧憧而不自知也艮其背則不自私矣行無事則不用知矣内外兩忘非忘也一循於理不是内而非外也不是内而非外則大公而順應尚何事物之爲累哉聖人之喜怒大公而順應天理之極也衆人之喜恕自私而用知人欲之盛也忘怒則公觀理則順二者所以爲自反而去蔽之方也夫張子之於道固非後學所敢議然意其彊探力取之意多涵泳完飬之功少故不能無疑於此程子以是發之其㫖深哉觀心說或問佛者有觀心說然乎曰夫心者人之所以主乎身者也一而不二者也爲主而不爲客者也命物而不命於物者也故以心觀物則物之理得今復有物以反觀乎心則是此心之外復有一心而能𬋩乎此心也然則所謂心者爲一耶爲二耶爲主耶爲客耶爲命物者耶爲命於物者耶此亦不待教而審其言之謬矣或者曰若子之言則聖賢所謂精一所謂操存所謂盡心知性存心養性所謂見其參於前而倚於衡者皆何謂哉應之曰此言之相似而不同正苗莠朱紫之間而學者之所當辨者也夫謂人心之危者人欲之萌也道心之㣲者天理之奥也心則一也以正不正而異其名耳惟精惟一則居其正而審其差者也絀其異而反其同者也能如是則信執其中而無過不及之偏矣非以道爲一心人爲一心而又有一心以精一之也夫謂操而存者非以彼操此而存之也舎而亡者非以彼舎此而亡之也心而自操則亡者存舎而不操則存者亡耳然其操之也亦曰不使旦晝之所爲得以梏亡其仁義之良心云爾非塊然兀坐以守其烱然不用之知覺而謂之操存也若盡心云者則格物窮理廓然貫通而有以極夫心之所具之理也存心云者則敬以直内義以方外若前所謂精一操存之道也故盡其心而可以知性知天以其體之不蔽而有以究夫理之自然也存心而可以養性事天以其體之不失而有以順夫理之自然也是豈以心盡心以心存心如兩物之相持而不相舎哉若參前倚衡之云者則爲忠信篤敬而發也盖曰忠信篤敬不忘乎心則無所適而不見其在是云爾亦非有以見夫心之謂也且身在此而心參於前身在輿而心倚於衡是果何理也耶大抵聖人之學本心以窮理而順理以應物如身使臂如臂使指其道夷而通其居廣而安其理實而行自然釋氏之學以心求心以心使心如口齕口如目視目其機危而迫其途險而塞其理虚而其勢逆盖其言雖有若相似者而其實之不同盖如此也然非夫審思明辨之君子其亦孰能無惑於斯耶仁說浙本誤以南軒先生仁說爲先生仁說而以先生仁說爲序仁說又註此篇疑是仁說序姑附此十字今悉刪正之天地以生物爲心者也而人物之生又各得夫天地之心以爲心者也故語心之徳雖其揔攝貫通無所不備然一言以蔽之則曰仁而巳矣請試詳之盖天地之心其徳有四曰元亨利貞而元無不綂其運行焉則爲春夏秋冬之序而春生之氣無所不通故人之爲心其徳亦有四曰仁義禮智而仁無不包其發用焉則爲愛恭宜别之情而惻隱之心無所不貫故論天地之心者則曰乾元坤元則四徳之體用不待悉數而足論人心之妙者則曰仁人心也則四徳之體用亦不待遍舉而該盖仁之爲道乃天地生物之心即物而在情之未發而此體巳具情之旣發而其用不窮誠能體而存之則衆善之源百行之本莫不在是此孔門之教所以必使學者汲汲於求仁也其言有曰克巳復禮爲仁言能克去巳私復乎天理則此心之體無不在而此心之用無不行也又曰居處恭執事敬與人忠則亦所以存此心也又曰事親孝事兄弟及物恕則亦所以行此心也又曰求仁得仁則以譲國而迯諌伐而餓爲能不失乎此心也又曰殺身成仁則以欲甚於生惡甚於死爲能不害乎此心也此心何心也在天地則坱然生物之心在人則温然愛人利物之心包四徳而貫四端者也或曰若子之言則程子所謂愛情仁性不可以愛爲仁者非歟曰不然程子之所訶以愛之發而名仁者也吾之所論以愛之理而名仁者也盖所謂情性者雖其分域之不同然其脉絡之通各有攸屬者則曷嘗判然離絶而不相管哉吾方病夫學者誦程子之言而不求其意遂至於判然離愛而言仁故特論此以發明其遺意而子顧以爲異乎程子之說不亦誤哉或曰程氏之徒言仁多矣盖有謂愛非仁而以萬物與我爲一爲仁之體者矣亦有謂愛非仁而以心有知覺釋仁之名者矣今子之言若是然則彼皆非歟曰彼謂物我爲一者可以見仁之無不愛矣而非仁之所以爲體之真也彼謂心有知覺者可以見仁之包乎智矣而非仁之所以得名之實也觀孔子答子貢慱施濟衆之問與程子所謂覺不可以訓仁者則可見矣子尚安得復以此而論仁哉抑泛言同體者使人含胡昏緩而無警切之功其弊或至於認物爲巳者有之矣專言知覺者使人張皇迫躁而無沉潜之味其弊或至於認欲爲理者有之矣一忘一助二者盖胥失之而知覺之云者於聖門所示樂山能守之氣象尤不相似子尚安得復以此而論仁哉因并記其語作仁說王氏續經說道之在天下未嘗亡而其明晦通塞之不同則如晝夜寒暑之相反故二帝三王之治詩書六藝之文後世莫能及之盖非功效語言之不類乃其本心事實之不侔也雖然維天之命於穆不巳彼所謂道者則固未嘗亡矣而大學之教所謂明徳新民止於至善者又巳具有明法若可階而升焉後之讀其書考其事者誠能深思熟講以探其本謹守力行以踐其實至於一旦豁然而晦者明塞者通則古人之不可及者固巳倐然而在我矣夫豈患其終不及哉苟爲不然而但爲模放假竊之計則不惟精粗懸絶終無可似之理政使似之然於其道亦何足以有所發明此有志爲巳之士所以不屑而有所不暇爲也王仲淹生乎百世之下讀古聖賢之書而粗識其用則於道之未嘗亡者盖有意焉而於明徳新民之學亦不可謂無其志矣然未嘗深探其夲而盡力於其實以求必得夫至善者而止之顧乃挾其窺覘想像之彷彿而謂聖之所以聖賢之所以賢與其所以脩身所以治人而及夫天下國家者舉皆不越乎此是以一見隋文而陳十二䇿則旣不自量其力之不足以爲伊周又不知其君之不可以爲湯武且不待其招而徃不待其問而吿則又輕其道以求售焉及其不遇而歸其年盖亦未爲晚也若能於此反之於身以益求其所未至使明徳之方新民之具皆足以得其至善而止之則異時得君行道安知其卒不逮於古人政使不幸終無所遇至於甚不得巳而筆之於書亦必有以發經言之餘藴而開後學於無窮顧乃不知出此而不勝其好名欲速之心汲汲乎日以著書立言爲巳任則其用心爲巳外矣及其無以自託乃復据拾兩漢以來文字言語之陋功名事業之卑而求其天資之偶合與其竊取而近似者依倣六經次第采輯因以牽挽其人強而躋之二帝三王之列今其遺編雖不可見然考之中說而得其規模之大略則彼之賛易是豈足以知先天後天之相爲體用而髙文武宣之制是豈有精一執中之傳曹劉顔謝之詩是豈有物則秉彛之訓叔孫通公孫述曹褒荀勉之禮樂又孰與伯夷后䕫周公之懿至於宋魏以來一南一北挍功度徳盖未有以相君臣也則其天命人心之向背綂緒繼承之徧正亦何足論而欲攘臂其間奪彼予此以自列於孔子之春秋哉盖旣不自知其學之不足以爲周孔又不知兩漢之不足以爲三王而徒欲以是區區者比而效之於形似影響之間傲然自謂足以承千聖而詔百王矣而不知其𥘉不足以供兒童之一戯又適以是而自納於吴楚僣王之誅使夫後世知道之君子雖或有取於其言而終不能無恨於此是亦可悲也已至於假卜筮象論語而強引唐𥘉文武名臣以爲弟子是乃福郊福畤之所爲而非仲淹之雅意然推原本始乃其平日好髙自大之心有以啓之則亦不得爲無罪矣或曰然則仲淹之學固不得爲孟子之倫矣其視荀揚韓氏亦有可得而優劣者耶曰苟卿之學雜於申啇子雲之學本於黄老而其著書之意盖亦姑託空文以自見耳非如仲淹之學頗近於正而粗有可用之實也至於退之原道諸篇則於道之大原若有非荀揚仲淹之所及者然考其平生意郷之所在終不免於文士浮華放浪之習時俗冨貴利逹之求而其覽觀古今之變將以措諸事業者恐亦未若仲淹之致懇惻而有條理也是以予於仲淹獨深惜之而有所不暇於三子是亦春秋責賢者備之遺意也可勝歎哉飬生主說莊子曰爲善無近名爲惡無近刑縁督以爲經督舊以爲中盖人身有督脉循眷之中貫徹上下見醫書故衣背當中之縫亦謂之督見深衣注皆中意也老莊之學不論義理之當否而但欲依阿於其間以爲全身避患之計正程子所謂閃姦打訛者故其意以爲爲善而近名者爲善之過也爲惡而近刑者亦爲惡之過也唯能不大爲善不大爲惡而但循中以爲常則可以全身而盡年矣然其爲善無近名者語或似是而實不然盖聖賢之道但教人以力於爲善之實𥘉不教人以求名亦不教人以逃名也盖爲學而求名者自非爲己之學盖不足道若畏名之累己而不敢盡其爲學之力則其爲心亦已不公而稍入於惡矣至謂爲惡無近刑則尤悖理夫君子之惡惡如惡惡臭非有所畏而不爲也今乃擇其不至於犯刑者而竊爲之至於刑禍之所在巧其途以避之而不敢犯此其計私而害理又有甚焉乃欲以其依違苟且之兩間爲中之所在而偱之其無忌憚亦益甚矣客甞有語予者曰昔人以誠爲入道之要恐非易行不若以中易誠則人皆可行而無難也予應之曰誠而中者君子之中庸也不誠而中則小人之無忌憚耳今世俗苟偷恣睢之論盖多類此不可不深察也或曰然則莊子之意得無與子莫之執中者類耶曰不然子莫執中但無權耳盖猶擇於義理而誤執此一定之中也莊子之意則不論義理專計利害又非子莫之比矣盖迹其本心實無以異乎世俗郷原之所見而其揣摩精巧校計深切則又非世俗郷原之所及是乃賊徳之尤者所以清談盛而晉俗衰盖其勢有所必至而王通猶以爲非老莊之罪則吾不能識其何說也旣作皇極辨因感此意有相似者謾筆之於其後云觀列子偶書向所謂未發者即列子所謂生之所生者死矣而生生者未甞終形之所形者實矣而形形者未甞有爾豈子思中庸之㫖哉丙申臘日因讀列子書此又觀其言精神入其門骨骸反其根我尚何存者即佛書四大各離今者妄身當在何處之所由出也他若此類甚衆聊記其一二於此可見剽掠之端云參同契說按魏書首言乾坤坎離四卦橐籥之外其次即言屯蒙六十卦以見一日用功之早晚又次即言納甲六卦以見一月用功之進退又次即言十二辟卦以分納甲六卦而兩之盖内以詳理月節而外以兼綂歲功其所取於易以爲說者如是而已𥘉未甞及夫三百八十四爻也今世所傳火候之法乃以三百八十四爻爲一周天之數以一爻直一日而爻多日少則不免去其四卦二十四爻以俟二十四氣之至而漸加焉巳非出於自然脗合之度矣且當日所用之爻或隂或陽𥘉無次第不知功夫有何分别又况一日之間已周三百六十之數而其一氣所加僅得一爻多少重輕不相權凖及此二十四者進增㣲漸退减暴疾無復徃來循環之勢恐亦後人以意爲之未必魏君之本指也竊意此書大要在於坎離二字若於此處得其綱領則功夫之節度魏君所不言者自可以意爲之但使不失其早晚之期進退之節便可用功不必一一拘舊說也故今推得䇿數一法似亦齊整其與爻數之法雖皆魏君所不言然此爲粗有理也盖月以十二卦分之卦得二日有半各以本卦之爻行本爻之䇿自八月觀卦以後至正月㤗卦易用少二十八䇿隂用老二十四策自四月大壯以後至七月否卦陽用老二十六䇿隂用少三十二䇿陽即注意運行隂即放神冥寂一爻已足即一開目舒氣以休息之十二卦周即爲一月之功十二月周即爲一歲之運反復循環無有餘欠其數如左方震一至五復一至三半一陽二十八五隂百二十陽生臨三半至五二陽五十六四隂九十六兌六至十㤗六至八半三陽八十四三隂七十二壯八半至十四陽百四十四二隂六十八乾十一至十五夬十一至十三半五陽百八十一隂三十二乾十三半至十五六陽二百一十六陽極無隂巽十六至二十過十六至十八半一隂三十二五陽百八十隂生遯十八半至二十二隂六十八四陽一百四十四艮三十一至二十五否二十一至二十三半三隂九十六二陽一百八觀二十二半至二十五四隂九十六二陽五十六坤二十六至三十剥二十六至二十八半五隂百二十一陽二十八坤二十八半至三十六隂一百四十四隂極無陽此說欲與季通講之未及冩寄而季通死矣偶閱舊藁爲之泫然戊午臘月一十六日晦庵先生朱文公文集第六十七終福州府儒學訓導鄭璉校正
