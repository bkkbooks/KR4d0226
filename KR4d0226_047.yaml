  text: 晦庵先生朱文公文集卷第四十七書問答一本作知舊門人問答
  hash: sha256:d7a219b49d69ee2d51439ef2d9c7505a486ae86fcb181633ee5f2c47504d445f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0226_SBCK_047-1a}
body:
  text: 答吕子約祖儉示喻縷縷足見力學之志然所讀書似亦太多矣大抵今人讀書務廣而不求精是以刻苦者迫切而無從容之樂平易者泛濫而無精約之功兩者之病雖殊然其所以受病之源則一而巳今觀來喻雖云數書之外有所未暇然只此巳是多少功夫又論孟中庸大學乃學問根本尤當專一致思以求其指意之所在今乃或此或彼泛然讀之此則尤非所以審思明辨而究聖學之淵源也愚意此四書者當以序進毎畢一書首尾通貫意味浹洽然後又易一書乃能有益其餘亦損其半然後可以研味從容深探其立言之旨而無迫切泛濫之累不審賢者以爲如何答吕子約喻及日來進學之功尤慰孤陋且深有助扵警省爲惠厚矣氣質未化偏重難反學者之通病今亦但當用力扵恭敬持養之地而玩意義理以培養之不必反復較計悔咎尅責如此太深却恐有害清明和樂之氣象亦足以妨日新之益也答吕子約示諭縷縷備見篤學力行之意然未免較計務獲之病著此意思橫在方寸間日夕紛擾非所以進扵日新也所讀書亦太多如人大病在床而衆醫雜進百藥交下决無見効之理不若盡力一書令其反復通透而復易一書之爲愈盖不惟專力易見功夫且是心定不雜扵涵養之功亦有助也又謂不欲但爲聞見之知此固當然聞見之知要得正當亦非易事誠未可輕厭而躐等也答吕子約時習之義程子云習重習時復思繹浹洽扵中則說此恐是學原扵思之意凡所當事者皆學也不致其思繹以通之則無自而進苟苦思力索則淺迫無味亦失所謂說矣惟學焉而時復思繹勿忘勿助積累停蓄浹洽涵養杜元凱所謂如江海之浸如膏澤之潤渙然冰釋怡然理順然後爲得此即時習而說之注釋也張先生所云似與程子之意未合此說甚佳南軒解義爲人借去不盡記其說然覺得儘有未安處也巧言令色鮮矣仁恐止當從尹氏說尹說固好然其間曲折恐亦不可不講若有人引上蔡所引許多同異問之尹公他必有說不只如此打過也傳不習乎恐止當從明道說盖恐不習而傳之則在巳審問明辨之功有加無巳篤扵自反而懼扵傳之或差上蔡之說恐與章指未合差下一本有也字如明道說文勢似不甚順若從上蔡之說則先忠信後講學乃與上下章意思相似又文勢安帖不煩多訓似亦有理試更思之父在觀其志一章恐指意在下又志所存也行所爲也有父兄在安得聞斯行之雖欲成父之美而親心未順焉雖欲爲不善而莫得肆焉止觀志之所存可也若親沒矣吾之所欲爲者遂矣故必觀其所爲之專與不專而後可盖雖爲之善然不能忍而遽改則亦謂之死其親可也至扵三年之間事死如事生而無伸巳之意廼謂之孝可謂孝矣云者深嘉之辭若曰如其非道則何待三年是未深體觀其行之意也夫不幸而有所當改是乃吾平日之拳拳而未能孚扵吾親者今也哀痛之深固有所斡旋改移扵不動聲氣之中者矣茍有决厲之意則縦有丘山之善然此心不㡬扵息乎此說甚好但謂固有斡旋改移扵不動聲氣之中者此句未安熹舊来亦嘗有此意後看史書見有居官不改前人之政但因事遷就使人不見其迹者必大恱之以爲代人居官猶有能如此者况扵所天乎因以此問扵李先生先生曰此意雖好但毎事用心如此恐駸駸然所失却多聖人所謂無改者亦謂尚可通行者耳若不幸而有必不可行者則至誠哀痛而改之亦無可奈何不必如此回互也此意竊謂學者不可不知恐當更思之也又有謂其志其行皆指父而言意亦自好試并思之如何日月謂一日一箇亦得論氣之感也謂古今一箇亦得論氣之本也感字未安李文饒謂日月終古常見而光景常新此亦善言天者季路問事鬼神告以事人問死告以知生欲令子路原始觀終聚而通之也未知生焉知死是固然矣未能事人焉能事鬼恐救子路忽扵近之病盖在目今雖曰未能事人然隱㣲之間如執虚奉盈所以事之者自當深用其力茍扵此知所事則事人之道亦可進但闕畧扵事人則益不能事鬼矣熹嘗謂知乾坤變化萬物受命之理則知生而知死矣盡親親長長貴貴尊賢之道則能事人而能事鬼矣只如此看意味自長戒慎隱㣲又别是一事不必牽合作一串也體物而不可遺之義盖物是形而下者物其物則息生不窮是所謂體物而不可遺也即形扵上者也茍物而不物則死矣體云者其流行發見非物自爾而必有體之者也體物之意剖析得甚好但本是鬼神之徳爲此萬物之體非是先有是物而鬼神之徳又從而體之也物而不物則死矣此句有病湏知若初無體之者則亦無是物矣㳺䰟爲變之義如何精魄也耳目之精明爲魄氣魂也口鼻之嘘吸爲䰟二者合而成物精虚魄降則氣散魂逰而無不之矣魄爲鬼魂爲神禮記有孔子答宰我之問正說此理甚詳雜書云魂人陽神也魄人隂神也亦可取橫渠上蔡論此亦詳誰毁誰譽一章恐當看誰字此正見聖人大公無我之心如有所譽者其有所試矣此又聖人無所私好而扵善善之意亦不侵過分毫来誨所謂但有先襃之善而無預詆之惡似恐扵公平之意思未完熹昨来之說善善速惡惡緩正書所謂與其殺不辜寧失不經罪疑惟輕功疑惟重春秋傳所謂善善長惡惡短孔子樂道人之善惡稱人之惡之意而仁包五常元包四徳之發見證驗也聖人之心雖至公至平無私好惡然此箇意思常在便是天地生物之心若但一向恝然無情則恐或有流扵申商慘覈之科矣試更思之洪範皇極亦有此意答吕子約所喻日用工夫足見爲巳之意甚善然別𥿄所論論語首章便是讀書玩理之様轍更無別塗請只如此用功不必切切論功計獲也答吕子約示喻日用功夫有未到處此見省身克巳用力之深不勝歎仰然前後巳屢奉聞不必如此計較迫切但措其心扵中和平正之地而深以義理灌漑培養之自然日有進益如其不然則存養講習之功未及一二而疑悔勞殆之病巳奪其千百矣試更思之至如讀書只且立下一箇簡易可常底程課日日依此積累功夫不要就生疑慮旣要如此又要如彼枉費思慮言語下梢無到頭處昔人所謂多𡵨亡羊者不可不戒也答吕子約巧言令色鮮矣仁論章旨則尹氏之說爲完若旁通其義如辭欲巧之類是廼脩省細宻工夫其發原自別然脩辭之功亦易得入扵安排計較而不自知其所發之偏者亦爲鮮矣仁也發原自別之說甚好修辭之功固易入扵安排計校然亦只得就發原處謹之耳若捨此而別生疑慮則又轉見繳繞不得剖决也曽子之三省爲人謀與朋友交傳諸人惟恐應物之或不如巳而篤扵自反也尹子言諸公逺來依先生之門某豈敢輙爲他說萬一有少差豈不誤他一生恐正是傳不習之意先忠信後講學固是如此但忠因謀言信因交言恐與行有餘力則以學文之意未類上蔡之說竟未敢安所引尹公語甚好然扵此文句中似覺少兩三字聖賢立言不如是之巧而晦也謀不忠則欺扵人交不信則欺扵友傳不習則欺扵巳欺扵師是亦忠信之類耳更思之其志其行皆指父而言意亦好但扵本章之旨恐未安父在觀其志觀其所志之善惡也父沒觀其行觀其所行之肆與否也三年無改扵父之道則事亡如事存而不忍死其親焉故曰可謂孝矣斡旋改移其始止扵隱惡諱過本在扵愛親駸駸而徃易人扵私其病固不細然彌縫調停之工又不可廢所謂度不可行至誠哀痛而改之固不必回互但弗知所以改之之方則或傷扵張皇驟快而無遲遲浸漸之意味亦非篤扵愛親者也謝方明事祖儉舊看得甚可爲法然李先生之言亦要扵此致察先生之言恐更當思之至誠哀痛四字儘有意思存得此心自不至張皇也㩀今日病證似當且服此藥便自胸次開闊黒白分明若更主張調停兩字正是以水濟水竊恐昬昧隘促轉見無進歩處父沒觀行必如舊說亦爲是非邪正之類所包甚廣今只云肆與否却覺拘滯兼又與上句參差下句重併尤未穏當日月終古常見而光景常新其理固如此然所謂常見所謂常新必有科别日月隂陽之精終古不易然非以今日巳昳之光復爲來日将升之光也故常見而常新未能事人而欲事鬼未能知生而欲知死是猶未知其首而欲知其尾也知首之旨當如來教又思事人之旨恐止是不敢欺不敢慢出門如賔之類皆是如此而致敬宻察庻㡬可以交神明矣事如祗事之事所謂盡親親長長貴貴尊賢之道恐扵事字未叶此說甚好比熹說尤親切盖親親長長貴貴尊賢之道固不外乎愛敬但如此說方親切耳然四者之目亦不可廢請更思之視之不見聴之不聞體物而不遺此三句乃指鬼神之徳而言視不見聽不聞無形聲臭味之可聞可見也然却體物而不遺則甚昭然而不可揜也所謂體物者固非先有是物而後體之亦非有體之者而後有是物萬物之體即鬼神之徳猶云氣即性性即氣而不可離也可離則無物矣所謂不可遺者猶言無遺闕滲漏盖常自洋洋生活不間乎晦明代謝也物之聚散始終無非二氣之徃来伸屈是鬼神之徳爲物之體而無物能遺之者也所謂非有體之者而後有是物與所謂無遺闕滲漏者皆非是䰟者其氣也氣散䰟逰而無不之所謂無不之者巳屈之氣尚有在扵天地之間邪抑否也然氣聚則生氣盡則死何者爲逰魂玩逰之一字謂其即便消散又似未盡也體魄藏扵地恐指成質而言如月魄以無光明者言謂耳目之聦明爲魄有所未曉合耳目之聦明而言則魂不離魄聦明即氣之運乃是魄也失其耳目之聦明而言則䰟去魄存恐難以耳目聦明命之爲魄也程子曰䰟氣歸于天消散之意逰魂亦是此意盖離是體魂則無所不之而消散矣雖未必皆即時消散要必終歸扵消散也䰟魄之分更當熟究隂陽之分體魄自是二物魄之降乎地猶今人言眼光落地云爾體即所謂精氣爲物盖必合精與氣然後能成物也洙泗言仁及契丈仁說竊得諷味復之九二休復之吉以下仁也謂𥘉九也易傳云一陽復扵下乃天地之心此正與元者善之長同理竊謂五常之仁猶四時之春至善醇醲不雜孟子指乍見之心爲仁之端下即論非内交要譽而然盖因乍見之眞而可知其有仁也端云者苗裔端倪之謂也覺痛痒則非不仁則覺者所以驗乎仁有彼我心則爲不仁則公者是仁之意思愛是仁之用恕是仁之施而樂山静夀又乃形容仁之體叚也程子氣類相合之言殊覺有味要湏先以萬善之先名仁而後可以用工致力若所謂克己復禮如見如承之類皆用工致力之道也要皆當一一剖析又不敢太成支離失其全體以萬善之先名仁殊不親切且以所引易傳及四時之春者體之即見熹前所論統仁義禮智及四端而言者其分界限明而血脉通貫不必别立名字但要用工致力使真不失此心然後爲得耳答吕子約承喻專看論語浸覺滯固因復看易傳及繫辭此愚意所未喻盖前書布此曲折巳再三矣似巳畧蒙聴察不知何爲而復蹈舊轍也夫論語所記皆聖人言行之要果能專意玩索其味無窮豈有滯固之理竊恐却是不曽專一故不見其味而反以爲滯固耳至如讀易亦當遵用程子之言卦爻繫辭自有先後今亦何所迫切而手忙脚亂一至扵此邪所論主一主事之不同恐亦未然主一只是專一盖無事則湛然安静而不騖扵動有事則随事應變而不及乎他是所謂主事者乃所以爲主一者也觀程子書中所論敬處類集而考之亦可見矣若是有所係戀却是私意雖似專一不舎然旣有係戀則必有事巳過而心未忘身在此而心在彼者此其支離畔援與主一無適非但不同直是相反今比而論之亦可謂不察矣惟其不察扵此是以未能專一而巳有固必矜持之戒身心彼此實有係戀支離之病而反不自知其非又凡前後所言類皆瞻前顧後一前一却之論不曽坦然驀直行得數歩此亦一箇大病根株恐當痛下功夫刋削不可悠悠又只如此說来說去乆之看得只似尋常也答吕子約脩省言辭誠所以立也脩飾言辭僞所以増也發原處甚不同夫子所謂巧令鮮仁推原辭意而察巧令之病所從来止是有所爲而然如未同而言以言餂人脅肩謟笑以喜随人之類皆有所爲也曰鮮矣仁云者獨言巧令之人扵仁或㡬乎息而不敢謂之全無也有所爲之說甚善但不敢謂之全無指意畢竟如何幸更喻及伊川先生解中却云謂非仁也便如此直截說破意又如何曾子之三省忠信而巳則程子包傳不習乎一語解之矣所謂欺扵巳欺扵師想是程子之意但祖儉竊謂傳不習乎亦湏兼就不習而傳扵人上說盖不習而傳則是中有未盡而與欺人無異也與上文同旨而傳習又所當省者故專言之如子夏後爲荘周之類皆由傳之有所未習故流傳之乆不能無弊觀老扵西河之上氣味謂之講習之功全盡未可也惟曽子謹其所傳故至今無弊然彼以其富之言摽使者出大門之義說大人則藐之之訓其血脉貫通皆似有少傷和粹處信乎傳而習之爲難也所謂傳非如釋氏半夜傳法之謂盖在巳有所未克則其動止之間不能無失茍時習之功有所未至流傳扵後豈不有害所論甚善末後注脚尤好但恐文意未如此耳恐當放下許多道理且平心看他文義向甚處去都不要将道理向前牽拽他待他文義有歸著去處穏帖分明後却有箇自然底道理出来不容毫髮有所増損抑揚此處正好玩味也大抵先要虚心爲要耳如禹無間然一叚五峯說得甚好然近日細看恐聖人當日賛歎之時未有此意他似此者甚多李先生之論盖欲拯世人計較之病大要恐人思前筭後遷就回互入扵不誠不直而弗自覺知然人之資禀剛柔不齊則藥其所偏者又恐難一槩論止是要認得此意旨所發而扵計較思筭時常常點檢也日用功夫固當縝宻然覺得如此煩碎繳繞又似自縳殺了故先生之意大抵且要簡節踈目先整頓得大體是當然後却就上面子細點檢是亦學不躐等之意也坎離隂陽之成質故爲上篇之終旣濟坎離之合未濟坎離之交故爲下篇之終五行之運獨言水火又謂爲成質何也隂陽成質水火爲先故洪範一曰水二曰火正蒙中亦有一叚論五行次序說得分明可更檢看數學有乾坤付正性扵離坎之說似亦有理日月隂陽之精氣向時所問殊覺草草所謂終古不易與光景常新者其判別如何非以今日已昳之光復爲来日将升之光固可畧見大化無息而不資扵已散之氣也然竊嘗觀之日月虧食随所食分數則光没而魄存則是魄常在而光有聚散也所謂魄者在天豈有形質邪或乃氣之所聚而所謂終古不易者邪日月之說沈存中筆談中說得好日食時亦非光散但爲物掩耳若論其實湏以終古不易者爲體但其光氣常新耳然亦非但一日一箇盖頃刻不停也二氣五行造化萬物一闔一闢萬變是生所謂五行之氣即雷風水火之運邪又即二氣之參差散殊者邪先儒謂物物皆具則人之氣禀有偏重者謂之皆具可乎或謂雖物皆具而就五行之中有得其多者有得其少者扵此思之殊茫然未曉五行之氣如温凉寒暑燥濕剛柔之類盈天地之間者皆是舉一物無不具此五者但其間有多少分數耳五音五色五味之類皆是也鬼神之徳盖甚難知扵此粗入思慮竟扵體物不遺上看得未極分明扵此不透故不自知而溺扵釋氏處多明道答上蔡語謂向你道有來又恐賢問某討向你道無来你又恁生信得及每每扵此思量乍得乍失近因相識有饋生鵞者欲殺之則甚不忍欲貨之則取其利而殺其身恐有冤之之意常感扵中此病不巳便入因果上去又因夜夣疑若有世間所謂鬼者欲出雖未睡覺然心知其無以理却之竟無有也雖曰以理却之然中心不無驚悸若此類則釋氏之說乆乆極易惑人但先入者爲主可以主張然非實曉亦安能保也鬼神只是氣之屈伸其徳則天命之實理所謂誠也天下豈有一物不以此爲體而後有物者邪以此推之則體物而不可遺者見矣著實見得此理則聖賢所論一一分明不然且虚心向平易分明處別理㑹箇題目勿乆留情扵此却生別種怪異底病痛也生鵞之論只以子釣而不綱弋不射宿孟子逺庖厨之義㫁之便自直截吳才老之論亦是一意然覺得未完吾必謂之學云者謂夫世人不知以是爲學而專以講論爲學也則以學文者謂夫世人不知修其當位之職而徒欲學文也意各有當言各有指似難以未該徧論之伯恭論得此意甚好謂才老之論不可謂不然但其發處有病耳誠然誠然今日兩端之論恐亦正坐此也但若論文義子夏所說終是倚著一邊豈亦矯枉過直而然邪乾知大始程子云乾當始物乾以易知程子又云乾始物之道易似不以此知字爲知崇及極髙明之意當字如何形容乾便是物之太始故以當字言之最爲宻切䰟陽也屬天魄隂也屬地䰟氣歸于天體魄藏于地是也聚而復散者爲䰟聚而不散者爲魄魄非氣也精氣爲物者合氣之聚而復散與夫聚而不散言也逰䰟者專指聚而復散言也來教謂體魄自是兩物未能深曉更願詳賜批誨䰟陽而魄隂故䰟之盡曰散散而上也魄之盡曰降降而下也古人謂之徂落亦是此義林少頴云然今以聚而不散者爲魄恐未然體魄是二物精氣爲物猶言魂魄爲體爾以此推之更有曲折仁者天下之正理此一語與仁意義如何此是對下文禮樂而言非專以訓仁之名義也大率前賢語意寛廣不若今人之急迫今人見得些道理便要䥴鑿開却正是心量小不耐煩耳近日甚覺前日說得惡模様也然說得如此人尚不㑹况不說乎此又不可廢也答吕子約程氏葬說父祖子孫同氣彼安則此安彼危則此危墓以藏體魄也所謂安者何所指邪正指體魄而言耳程子論此意思甚詳讀之使人惻然感動有此疑者豈非惑扵莊生愛其使形者之論邪此異端之言賊恩之大者不可以不辨上蔡以我視我聴等言以子絶四之旨觀之終未免有我底意思雖與放而不知求者逺甚然其究極似未平正也見扵文句者毎每有我底意思五峯作復齋記云知自反而以理視此語無病如此所引非惟有我不平扵下學切巳功夫亦有任意而失理之病其流弊之甚多至扵妄作主忠信之言後扵不重則不威其意如何聖賢所言爲學之序例如此湏先自外面分明有形象處把捉扶竪起来不如今人動便說正心誠意却打入無形影無稽考處去也傳不習乎㩀文勢意脉當以明道言爲正此等處義理亦兩通存之可也程子知周乎萬物而道濟天下故不過釋之曰義之所包知也文意如何程子說易字皆爲易之書而言故其說如此但鄙意似覺未安盖易與天地凖故能彌綸天地之道此固指書而言自仰觀俯察以下湏是有人始得盖聖人因易之書而窮理盡性之事也近讀此書方見得一端緒非面論不能既也夏商損益繼周者亦必有損益盖氣運升降不容不爾特聖人能因時而不逆之耳理大槩如此然非夫子告子張之意請更詳之林放問禮之本歴考程子之言有曰飾實則失實故寧儉又曰儉則實所出又曰節文太過則和那些誠意都不見則儉近本而不可正名曰本也禮正在恰好處泝而上之則儉爲本㳂而下之則奢爲末當以易傳之言爲正龜山發明得亦佳生死者氣運徃来之常也異端以有生爲幻而謂之無常是不明乎天地之性隂陽之本也此說固然程子盖言之矣毎事問程子謂雖知亦問欽慎之至問者問所未知也問所知焉似扵未誠謝氏之說聖人之心恐不如是程子之意雖知其意味甚深然看得未分明以石慶數馬與張湯陽驚事相對觀之可見雖知亦問自有誠僞之别兼或人謂夫子爲鄒人之子則亦夫子始仕初入太廟時事雖平日知其說然未必身親行之而識其物也故問以審之理當如此必不毎入而毎問也然大綱節目與其變異處亦湏問也不以其道得去貧賤當如明道說若曰不以其道得貧賤則不去恐君子之心不如是也明道說意甚宻但文義似費力耳近看得忠恕只是體用其體則純亦不巳其用則塞乎天地其體則實然不易其用則擴然大通然體用一源而不可析也故程子謂看忠恕二字自見相爲用處而夫子曰吾道一以貫之此說甚善出入無時莫知其鄉只是大槩言人之心如是甚言此心無時不感而不可以不操也不操則感動扵不善而失其本心矣雖曰失其本心而感處即心也故程子曰感乃心也而程子答心有亡也之問又曰纔主著事時先生以目視地便在這裏纔過了便不見又云心豈有出入亦以操舎而言盖寂然常感者心之本體惟其操舎之不常故其出入之無止耳惟其常操而存則動無不善而瞬息頃刻之間亦無不在也顔氏之子三月不違其餘則日月至政以此心之常感而易危故也寂然常感者固心之本體也然存者此心之存也亡者此心之亡也非操舎存亡之外别有心之本體也然亦不湏舌說到此只到朱勾處便可且住也答吕子約示喻讀書用力之意甚善所謂收拾向裏固爲急務但亦當虚以待之則心體自存善端自著不可一向抑遏安排也近作一文字正述此意録寄伯崇矣亦屬轉以奉呈也謝說未安者多此類所論孝弟之說盖本有不屑卑近之意故其言日用切身處徃徃多有此意思且如此章不以事親從兄爲本分當然之事而特藉之以爲知仁之資則方其事親從兄之時其心亦不專扵所事而又别起知仁之想矣徃年與正字兄論知言中病痛亦多如此盖其所授受有自来也却是吕與叔先生論民可使由之處意思極好昔侍李先生論近世儒佛雜學之弊因引其說先生亦深然之凡百但以此等意思存之便自平實至扵近世專門之說盖亦不必深論其失取其可取者焉可也答吕子約時復思繹之義如何長沙說中謂紬繹其端緒又何也又時習專以思繹爲訓又何也凡言學多指講論誦讀言之故以習爲思繹長沙說不記云何紬繹端緒亦苦無異義也學即行也所謂所以學者将以行之也意必有在中庸言博學又言篤行則學與行自是兩事說樂之分如何所謂說在心政孟子理義恱我心猶芻豢恱我口之意但所謂樂主發散在外朋友之樂盖亦實見其可樂但此說爲發舒耳謂之主發散在外願明其說謂之發散在外即是由中而出但樂字之義主扵發散在外而得名耳謝氏時習朋来不愠一章意脉似與本章之旨不貫所謂不必同堂合席謂之朋則扵朋来而樂之意似不切所謂知我者希則我貴旣以不知者希爲貴則亦與人不知而愠者相去只一間耳非所謂不見是而無悶者也謝氏說多類此大抵過扵髙逺也孝弟爲仁之本程子謝氏之旨如何程子謂孝弟行扵家而後仁愛及扵物盖以本立而道生也謝氏謂知此心則知仁盖以自是而仁可見是固然也却恐非爲仁自孝弟始之意只當從程子說近年論者多欲設爲機械以求知仁其原盖出扵謝氏且若如其說則其事親從兄之際心亦不專扵所事矣明道論孝弟本其所以生乃爲仁之本而又論守身守之本不失其身而能事其親乃誠孝也推此可以知爲仁之本此意如何明道因論事親又推本守身之意以明必如此然後爲能事其親乃所謂孝子成身之義其爲人也孝弟自然和順慈祥豈復萌犯上之心况扵爲逆理亂常之事乎此盖深言孝弟之爲順徳而人道之根柢也自是而積習著察則爲仁之道自然周溥充大所謂老吾老以及人之老㓜吾㓜以及人之㓜而非過情違道之小仁也故曰本立而道生而又賛之曰孝弟也者其爲仁之本歟若夫仁民而推親親固曰無本然所謂仁民者亦必有甚不仁者矣自仁民而推親親本不足辨然亦不必言必有甚不仁者巧令鮮仁尹氏之說爲完程子直指爲非仁何也詳考程子辭意盖直指脩飾之爲非仁欲學者深知乎仁與不仁之分故他有所未暇論也昨領來喻謂程子如此直截說破恐是此意否程子固是直指脩飾之爲非仁而聖人本意初亦不兼持養者而爲言也但聖人辭氣舒緩程子恐人不㑹更向巧令中求其少有之仁故如此直說破耳曾子之三省忠信而巳而不及傳不習乎一語何也前雖求教謂巳兼釋之今却未曉程子說傳不習乎是不習而傳與人是亦欺人之事故以忠信舉三省此句湏更思之與謝氏孰長入孝出弟謹行信言泛愛親仁盖爲弟爲子日用出入之實職曠此而徒區區扵文義章句間抑末也程子謂非爲巳之學意盖如此然必曰學文者誠以未能著察而品節等差重輕緩急不得其宜則或有所害以此見周伯忱之說甚當謝氏盡孝盡弟以及乎親仁成已至行有餘力則以學文則看得學文頗輕而說得入孝出弟之類一節便做成徳似非本旨意脩弟子之職固所以爲巳然博學扵文以明義理之歸亦爲巳也洪慶善說未有餘力而學文則文㓕其質有餘力而不學文則質勝而野此意亦好道千乗之國政與道之以徳道之以政之道同道猶導也與齊治之義别敬事而信以下或以爲五者或以爲三者當從何說程子釋此章謂今之諸侯能如是足以保其國矣非小乎此也政以今之諸侯所以導其國者不能如是也然否分别道齊二字甚善此章當爲五事然先後相因不可相無則亦一事而巳程子之言固非小此盖以其畧故其言之若不足耳程子謂論性則以仁爲孝弟之本又謂仁是性也孝弟是用也因此得求仁之方要湏是從克巳入程子論季路顔淵言志一段可見盖喜怒好惡之偏頃刻胡越霄壌之判如何得氣脉通貫本末連屬毎覺扵至親上尚有物我處多况扵他人乎直湏是由身至家由家至外檢察消磨漸漸融通則庻乎仁矣前軰謂公近仁愛屬仁而魯論所謂巳欲立逹而立人逹人爲仁之方而孟子所謂仁者如射正巳而發發而不中不怨勝已反求諸巳如此之類皆是欲人之求仁當自克治巳私而入學者但當扵此下手耳向者所謂以萬善之先名仁誠不親切論性則以仁爲本此只是泛說論義理則性中只有仁義禮智而孝弟本出扵仁論爲仁之功夫則孝弟是仁中之最緊切處當務此以立本而仁道生也来喻雖善然非程子立言之本意也一心之謂誠盡心之謂忠其分如何又謂忠天道也其與盡心之義同否一心之謂誠專以體言盡心之謂忠是當體之用忠天道也對恕推巳而言正指盡心之義答吕子約所示心無形體之說鄙意正謂如此不謂賢者之偶同也然所謂寂然之本體殊未明白之云者此則未然盖操之而存則只此便是本體不待别求惟其操之乆而且熟自然安扵義理而不妄動則所謂寂然者當不待察識而自呈露矣今乃欲扵此頃刻之存遽加察識以求其寂然者則吾恐夫寂然之體未必可識而所謂察識者乃所以速其遷動而流扵紛擾急迫之中也程夫子所論纔思便是巳發故涵養扵未發之前則可而求中扵未發之前則不可亦是此意然心一而巳所謂操存者亦豈以此一物操彼一物如鬪者之相捽而不相舎㦲亦曰主一無適非禮不動則中有主而心自存耳聖賢千言萬語考其發端要其歸宿不過如此子約旣識其端不必别生疑慮但循此用功乆而不息自當有所至矣答吕子約向來所喻數條亦皆窮理之要今承喻及有不曉毫髪之語此又范太史所謂小其所知以爲不知之弊竊謂莫若因其所知者玩繹而推廣之自當有味不可捨此而别求恐轉益荒逺而終無得也此類猶是好髙之病不可不警答吕子約示喻縷縷具悉但泛說尚多皆委曲相合恐更當放下且玩索所讀書依本分持養爲佳耳陸子静之賢聞之盖乆然似聞有脫略文字直趨本根之意不知其與中庸學問思辨然後篤行之旨又如何耳答吕子約所喻日用功夫甚善然必謂愽學詳說非初學事則大不然古人之學固以致知格物爲先然其始也必養之扵小學則亦洒掃應對進退之節禮樂射御書數之習而巳是皆酬酢講量之事也豈以此而害夫持養之功㦲必曰有害則是判然以動静爲兩物而居敬窮理無相發之功矣大抵聖賢開示後學進學門庭先後次序極爲明備今皆舎之而自立一說以爲至當殊非淺陋之所聞也向示心說初看頗合鄙意細觀乃復有疑亦嘗竊與朋友論之而未及奉報今得所論益知向所疑者之不謬也盖操舎存亡雖是人心之危然只操之而存則道心之㣲便不外此今必謂此四句非論人心乃是直指動静無端無方無體之妙則失之矣又謂荒忽流轉不知所止雖非本心而可見心體之無滯此亦非也若心體本来只合如此則又何惡其不知所止而必曰主敬以止之歟近與一朋友論此録以奉呈幸試思之復以見告昨日得欽夫書亦論此扵鄙意亦尚有未盡者異時相見面論之筆札不能旣其曲折也答吕子約所示内外兩進之意甚善此是自古聖賢及近世諸老先生相傳進歩直訣但當篤信而力行之不可又爲他說所揺復爲省事欲速之計也近聞陸子静言論風旨之一二全是禪學但變其名號耳競相祖習恐誤後生恨不識之不得深扣其說因獻所疑也然想其說方行亦未必肯聴此老生常談徒竊憂歎而巳操舎存亡之說諸人皆謂人心私欲之爲乃舎之而亡所致却不知所謂存者亦操此而巳矣子約又謂存亡出入皆神明不測之妙而扵其間區别真妄又不分明兩者盖胥失之要之存亡出入固皆神明不測之所爲而其真妄邪正始終動静又不可不辨耳答吕子約來書所喻程門議論鄙意正謂如此此或問之書所爲作也但掎摭前賢深負不韙之罪耳管仲之喻甚正但以夫子之言考之恐無此意程子之意盖欲主張名教而以爲夫子許其不死却不如以爲存而不論之可畏也試更思之答吕子約叔度忽爲佛學私竊憂之前甞因書扣之今此書來不答所問但云實病難除實功難進不敢容易言之而巳如此則是以爲求進實功除實病必求之釋氏然後可而吾聖賢立言垂訓與吾黨平日講學存養皆容易之空言也叔度所見不應如此盖不欲人之議巳而設此以峻却之耳區區雖欲再進其說而巳覺難扵發口然鄙意猶有未能巳者願子約從容自以巳意言之勸其且讀論語看諸先生說而深思之以求聖人之意聖人之意即是天地之心思而得之則實理可見而實病可除實功可進初不待求之釋氏之言矣且求之釋氏却是適越北轅却行求進此區區所以深惜叔度平日之用心而不欲其䧟扵此也頃在静安見其議論之間毎不欲人攻釋氏之非私心固巳疑之今果如此盖本其平日用功只以博學力行爲事而未嘗虚心平氣熟玩聖賢之言以求至理之所在故其弊至扵如此熹恐伯恭亦不得不任其責不知其聞此消息以爲如何然熹之愚猶竊有疑扵伯恭詞氣之間恐其未免有隂主釋氏之意但其徳性深厚能不發之扵口耳此非小病吾軰扵此若猶或有纎芥之疑速湏極力講究以去其非而審其是不可含胡隱忍存而不决以貽他日走作之患也大抵彼中朋友立說過髙立心太迫不肯相聚討論只欲閉門劇讀以必其自得故人自爲學而或不免蔽扵一巳之私見此亦殊非小病耳答吕子約所喻數條足見玩理之深然論孟兩說恐看得太幽暗支離了所謂欲宻而反踈者湏更就明白簡約處看一句只是一句截㫁兩頭都無許多枝蔓方是真實見處也太極諸說亦未見端的處又所謂萬化未嘗止息者是矣然却爲甚扵復然後見天地之心邪請更下此一轉語如何如何答吕子約前書所喻原憲一條似扵鄙意有未安者而來書云云支蔓繳繞只如舊日更望詳細思繹勇猛掃除庻扵正大光明之域有進歩處也答吕子約所論江西之弊切中其病然前書奉告者非論其人也乃論吾學自有未至要在取彼之善以自益耳謂彼全無本原根柢則未知吾之所恃以爲本原根柢者果何在邪幸更思之復以見教答吕子約熹衰病如昨無足言者暇日自力觀書惟覺聖賢之言意味深長儘有向来見不到處若扵子約所謂經史貫通之妙則未有得也然旣曰千里一曲則便不如且就不曲處理㑹之爲愈且如史記禮書篇首四言恐只是大槩說道理如此豈爲秦漢把持天下而設且旣曰把持天下矣則又豈有不由智力而致者邪此等處恐是舎却聖賢經指而求理扵史傳故只見得他底髙逺便一向随他脚跟轉極力賛歎他若看得聖賢說禮樂處有味决定不作此見兼謂其爲秦漢而發此四言亦恐反說低了他意思也讀詩諸說乃是詩小序說非詩說疑亦是從前太扵世變一事留意得重故只見得此意思大率向外底意思多切巳底意思少所以自巳日用之間都不得力前書因論陸子静處及說韓岩時話似巳詳說此病奈何都不見察至今日然後始覺身心欠收拾乎兼此語前此巳屢聞之恐今日所覺亦未必是真覺也所謂秦漢把持天下有不由智力者乃是明招堂上陳同甫說底平日正疑渠此論未安不謂子約亦作此見爲此論也大抵讀書寛平正大者多失之不精而精宻詳審者又有局促姦巧之病雖云人之情僞有不得不察者然此意偏勝便覺自家心術亦染得不好了近年此風頗盛雖純誠厚徳之君子亦徃徃堕扵其中而不自知所以區區常竊憂之而不願子約之爲之也子約何不試取論語孟子中庸大學等書讀之觀其光明正大簡易明白之氣象又豈有如此之狡獪切害處邪世路險窄巳無可言吾人之學聖賢者又将流而入扵功利變詐之習其勢不過一傳再傳天下必有受其禍者而吾道益以不振此非細事也子約思之如何大事記尚有第十一卷半卷未冩今附元冊去幸爲冩足附來不湏裁截装背却恐與前後冊大小不同也此書固佳然昨看論張湯公孫弘處亦不能無疑也答吕子約前書所喻正容謹節之功比想加力此本是小學事然前此不曽做得工夫今若更不補填終成欠闕却爲大學之病也但後書又不免有輕内重外之意氣象殊不能平愚意竊所未安大抵此學以尊徳性求放心爲本而講扵聖賢親切之訓以開明之此爲要切之務若通古今考世變則亦随力所至推廣増益以爲補助耳不當以彼爲重而反輕凝定收歛之實少聖賢親切之訓也若如此說則是學問之道不在扵巳而在扵書不在扵經而在扵史爲子思孟子則孤陋狹劣而不足觀必爲司馬遷班固范曄陳夀之徒然後可以造扵髙明正大簡易明白之域也八字乃來書本語夫學者旣學聖人則當以聖人之教爲主今六經語孟中庸大學之書具在彼以了悟爲髙者旣病其障礙而以爲不可讀此以記覽爲重者又病其狹小而以爲不足觀如是則是聖人所以立言垂訓者徒足以悞人而不足以開人孔子不賢扵堯舜而逹磨遷固賢扵仲尼矣無乃悖之甚邪前書所示中庸詩頌西銘等說皆極精宻意者後書所謂不能下心細意特一時憤激所發耳如其不然則不能下心細意扵孔孟乃能下心細意扵遷固何邪此則尤非區區所素望扵賢者不敢不盡所懐也禮樂之云前此只恐未必史遷有此意耳正使有之乃是挾禮樂動化之權以爲智力把持之用學者所以謹扵毫釐之差而懼其有千里之繆者正爲此耳今不之察而遂指人欲爲天理吾恐其不止扵議論之小失而且爲心術之大害也阡陌二字熹前說亦未是當如風俗通後說乃爲得之盖阡之爲言千也陌之爲言百也遂人徑是百畆之界涂是百夫之界而二者皆從即所謂南北之陌畛是千畆之界道是千夫之界而二者皆橫即所謂東西之阡盖二字名義本以夫畆之數得之决是井田舊制所本有若曰秦始爲之則决裂二字牽彊說合費氣力而無文理且井田旣有徑畛之制而秦人去之則又何必更取東西南北之正以爲阡陌然後可以静生民之業而一其俗㢤此細事不足辨或恐有助扵古今事變之學耳徽録新書近方看得數卷大抵是用長編添修然亦有不盡處長編亦㩀曽布蔡絛爲多此二書雖無狀然亦見其不可掩者禍敗之釁豈偶然㢤讀之令人憤鬰殊損道心也同父事解後得書亦甚呶呶前此盖巳作書慰勞之勸其因此一洗舊轍歛就繩墨若能相信失馬却未必不爲福耳此事向來朋友畏其辯博不究其是非而信奉其說遂無一言及扵儆戒切磋之意所以使渠至此盖有不得不任其責者子約旣敬之扵此恐不可不盡情也叔晦必且家居待除象先呈身之說恐是且欲揚此虚聲以避守髙之嫌然亦不必如此也李和聞亦不爲乆計相見勸其早歸亦是一事渠却甚歸心恭兄教誨與他人不同也誠之恐難說話盖本是氣質有病又𬒳杜撰扛夯作壞了論其好處却自可惜也恭兄文字狀子巳投之當路如醉如夣面前事尚不能𬋩得何可望以此等但近日百恠競出不可禁遏又甚扵前此旣無可奈何但當修其本以勝之早爲收拾平生文字訓說之畧成書而可傳者著爲篇目而公傳道之則彼託真售僞者将不禁而自息矣若但築堤堙水决無可救之理也答吕子約熹再叨祠禄遂爲希夷法眷冐忝之多不勝慚懼今年病軀粗覺勝前時但心目俱昬不堪繙閱深以爲撓耳所喻向來立論之偏近日用功之實甚慰所望兩卷所論皆精義也其間亦有鄙意未合處具之別𥿄幸更思之或猶未安却更反復極論以歸至當乃佳耳同父後來又兩得書巳盡底裏答之最後只問他三代因甚做得盡漢唐因甚做得不盡見頓著聖賢在面前因甚不學而必論漢唐覓他好處并文中子一併破除一上似頗痛快著題未知渠復如何做轉身一路也可因書扣之令録去此無人冩得也兩書皆引惟精惟一者是來書亦扵智力二字必竟看不破放不下殊不知此正是智力中之仁義賔中之主鐡中之金若苦向這裏覓道理便落在五伯假之以下規模裏出身不得孟子董子所以㧞本塞原斬釘截鐡便是正怕後人似此拖泥帶水也熹嘗語此間朋友孟子一生忍窮受餓費盡心力只破得枉尺直尋四字今日諸賢苦心勞力費盡言語只成就枉尺直尋四字不知誵訛在甚麽處此話無告訴處只得仰屋浩歎也史遷固非班范之比然便以爲學者扵此不可有所未足而欲專就此處尋討道理則亦陋矣公謹前日一二書来問所疑覺得却似稍通曉勝徃時也此一等人不能談王說覇然終是慤實謹厚是這一邊人鄙意近来覺得只愛此等人也兩卷之說今亦不能易𥿄仁字固不可專以發用言然却湏識得此是箇能發用底道理始得不然此字便無義理訓釋不得矣且如元者善之長便是萬物資始之端能發用底本體不可将仁之本體做一物又将發用底别做一物也平旦之氣以下一節譬喻得不甚相似至以元氣淋漓星斗清潤爲利貞之象亦不可曉合而言之一句文意亦似未安大抵仁之爲義湏以一意一理求得方就上面說得無不通貫底道理如其不然即是所謂儱侗真如顜頇佛性而仁之一字遂無下落矣向来鄙論之所以作正爲如此中間欽夫盖亦不能無疑後来辨析分明方始無說然其所以自爲之說者終未免有未親切處須知所謂純粹至善者便指生物之心而言方有著實處也今欲改性之徳愛之本六字爲心之徳善之本而天地萬物皆吾體也但心之徳可以通用其他則尤不著題更須細意玩索庻㡬可見耳求其放心與克己復禮恐亦不可分爲兩事盖放却心即視聴言動皆非禮非禮而視聴言動即是放却心此處不容更作兩節今所論却似太支離也養氣一節只說得程子意若論孟子門庭指意又却不然至大至剛只合四字爲句以直養而無害此直字便是上文縮字下文義字孟子之意只是說毎事做得是當即自然無所愧怍意象雄豪所以雖當大任而無所畏懼耳推其本原固未有不立敬而能集義者然此章之意則未及夫敬字也此自程子門庭功夫因此說出来耳易所謂寂然不動感而遂通天下之故乃指蓍卦而言之推之天下萬物無一不如此者初不爲心而發而遂不可以言性也五峯議論似此拘滯處多惜乎不及其時而扣之反復究窮必有至當之論也孝悌則心下心下則此心溥此意甚巧然却走了孝弟二字親切本意若但如此則只卑巽兩字亦得不必云孝弟矣此盖本因立下仁人心也四字要得貫穿許多去處道理又怕惹著愛字故不免有此牽彊似不必如此却只成立議論做文字也未知焉得仁文義句讀恐亦不如此若如此說則前所謂不知其仁等句又作如何說耶程子所謂仁者天下之公善之本也止是賛歎仁字之言非是直解字義如云仁者天下之正理此亦只是包含在内不可便以此爲盡得仁字之義也正顔色斯近信矣盖謂學者平日心不誠實則雖正顔色而不免扵欺僞如所謂色取仁而行違者故以正顔色而能近信爲貴耳亦非如来示注中所云也論語所記有失無失湏見到夫子地位方判㫁得今此所論亦侏儒之觀優耳吾人但當玩索涵養以到爲期自不必如此預先安排此等閑議論無益扵學也所過者化程子扵易傳中引之革九五及其語録中說似皆以爲身所經歴處人化其徳此意平實亦與上下文意相應似不必更爲他說若論人心本虚事物過了便無朕迹却自不妨有此理也凡此數說不知賢者以爲如何如有未安幸更反復也答吕子約自頃承書有專介存問之約日望其至忽得郭希吕書聞嘗感疾不輕甚以爲慮而無從附問但切懸情前日使至忽領手書未及發視亟問来人知巳無他憂疑頓釋旣而細讀乃審向来疾證誠亦可畏今幸平復而又自能過意調攝尤副所望比日竊惟體候益佳健矣但来書以爲勞耗心力所致而諸朋友書亦云讀書過苦使然不知是讀何書若是聖賢之遺言無非存心養性之事决不應反至生病恐又只是太史公作祟耳孟子言學問之道惟在求其放心而程子亦言心要在腔子裏今一向耽著文字令此心全體都奔在冊子上更不知有巳便是箇無知覺不識痛癢之人雖讀得書亦何益扵吾事邪况以子約平日氣體不甚壯實豈可直以耽書之故遂忘飢渇寒暑使外邪客氣得以乗吾之隙是豈聖人謹疾孝子守身之意㢤今旣能以前事爲戒凡百應酬計亦例加節嗇然區區之意扵此猶不能忘言更祝深以門户道學之傳爲念幸甚幸甚枉尺直尋素未嘗以此奉疑也但見頃来議論一變如山移河决使學者震蕩回撓不問愚智人人皆有趍時狥勢馳騖功名之心令人憂懼故不得不極言之盖非獨爲子約惜實爲伯恭惜又重爲正獻滎陽諸公惜也漢唐本體只是智力就中有暗合處故能長乆如此言之却無過當但若講得聖門學問分明則此固無足言者而王道正理未嘗一日而可無者亦不待引此然後爲有徴也設若接引下根亦只須略與說破仍是便須救㧞得他跳出功利窠窟方是聖賢立教本指今乃深入其中做造活計不惟不能救得他人乃并自巳䧟入其中而不能出豈不誤㢤陳正巳書來說得更是怕人今録所答渠書去幸一觀此尤可爲歎息也仁字之說論之愈詳愈覺述昧然竊恐所謂抵就發用之端而言則無由見仁之本體只此一句便是病根也盖孟子論仁雖有惻隱人心之殊程子扵此亦有偏言專言之别然若實扵惻隱之偏言處識得此人心專言者其全體便可見今只爲扵此認得不真故不能有以識其全體乃欲廣大其言以想象而包籠之不知言愈廣大而意愈不親切也程子之言惟榖種一條最爲親切而非以公便爲仁者亦甚縝宻今乃反皆不認而必以易傳偏旁賛歎之言爲直解字義則不惟不識仁亦錯看了易傳矣克巳復禮前說巳得之却是看得不子細誤答了今承再喻愈詳宻無疑矣浩然之氣一章恐須先且虚心熟讀孟子本文未可遽雜他說俟看得孟子本意分明却取諸先生說之通者錯綜扵其間方爲盡善若合下便雜諸說混看則下梢亦只得周旋人情不成理㑹道理矣近日經說多有此弊盖巳是看得本指不曽分明又著一尊畏前軰不敢違異之心便覺左右顧瞻動皆窒礙只得曲意周旋更不復敢著實理㑹義理是非文意當否矣夫尊畏前軰謙遜長厚豈非美事然此處纔有偏重便成病痛學者不可不知也又非義襲而取之句内亦未見外而尋義理之意請更詳之橫渠先生言觀書有疑當且濯去舊見以來新意此法最妙凡言易者多只是指蓍卦而言蓍卦何嘗有思有爲但只是扣著便應無所不通所以爲神耳非是别有至神在蓍卦之外也曽子吿孟敬子三句不是說今日用功之法乃言平日用功之効如此看得文義方通來喻紏紛殊不可曉也不知其仁之說恐未安且未論義理只看文勢巳自不通若更以義理推之尤見乖戾矣盖知自是知仁自是仁孔門教人先要學者知此道理便就身上著實踐履到得全無私心渾是天理處方喚作仁如子路諸人正爲未到此地故夫子不以許之非但欲其知之而巳也若謂未知者做得皆是而未能察其理之所以然則諸人者又恐未能所爲皆是固未暇責其察夫理之所以然也答吕子約日用功夫比復何如文字雖不可廢然涵養本原而察扵天理人欲之判此是日用動静之間不可頃刻間㫁底事若扵此處見得分明自然不到得流入世俗功利權謀裏去矣熹亦近日方實見得向日支離之病雖與彼中證候不同然其忘巳逐物貪外虚内之失則一而巳程子說不得以天下萬物撓巳巳立後自能了得天下萬物今自家一箇身心不知安頓去處而談王說覇将經世事業别作一箇伎倆商量講究不亦誤乎相去逺不得面論書問間終說不盡臨風歎息而巳答吕子約所論爲學之意比向來儘正當矣但所謂省節視聴及閑得心地半時便是半時功夫者却似㣲有趣静之偏所謂鬼神雖無形聲可求而須著視聴者又似推求考索之過由前之說且可爲目前養病之計而非所以爲學由後之說則不惟義理有差而亦非所以休養巳憊之精神也晦庵先生朱文公文集卷第四十七閩縣儒學教諭王製校
