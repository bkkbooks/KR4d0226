  text: 晦庵先生朱文公文集卷第四詩
  hash: sha256:3aade88bbef0bd052695a0790a4dd7426451d69014118b72c4d1af8ea93d6fd8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0226_SBCK_004-1a}
body:
  text: 答王無功在京思故園見郷人問王詩云旅泊多年歲忘去不知廻忽逢門外客道發故郷來歛眉俱握手破涕共􅋦盃慇懃訪朋舊屈曲問童孩衰宗多弟姪若箇賞池臺舊園今在否新樹也應栽桞行踈宻布茅齋寛窄裁經移何處竹别種幾株梅渠當無絶水石計總生苔院果誰先熟林花那後開覊心秪欲問爲報不湏猜行當驅下澤去剪故田萊我從銅川來見子上京客問我故郷事慰子覊旅色子問我所知我對子應識朋遊總彊徤童稚各長成華宗盛文史連墻富池亭獨子園最古舊林間新坰柳行隨堤茅齋㸔地形竹從去年移梅是今年榮渠水經夏響石苔終歲青院果早晚熟林花先後明語罷相歎息浩然起深情歸哉且五斗餉子東臯耕送呉茂實朝市令人昏山林使人傲誰知昏傲兩俱非但說山林是髙蹈短句奉迎荆南幕府二首雄藩荆楚地自古國西門客有籌邊略人知幕府尊時平烽燧冷事省笑談温宛洛何年向竒功要一論軍府資長筭家山輟勝逰故人千里別歸騎兩年秋弔古寧忘恨開尊且破愁相思欲囬首但上曲江樓張敬夫作此樓熹爲之記趙君澤携琴載酒見訪分韻得琴字山城夜寥閴虚堂杳沉沉王孫有高趣挈榼來相尋喜兹煩抱舒未覺杯酒深一爲塵外想再撫丘中琴餘音殷雷動爽籟悲龍吟寄謝筝笛耳寧知山水音寄題瀏陽李氏遺經閣二首老翁無物與孫兒樓上牙籖滿架垂更得南湖親囑付歸來端的有餘師南湖張敬夫書院讀書不見行間墨始識當年教外心箇是儂家真寳藏不應猶羡滿籝金題鄭徳輝悠然堂高人結屋亂雲邊直面羣峰勢接連車馬不來眞避俗簞瓢可樂便忘年移笻緑幄成三徑回首黄塵自一川認得淵明千古意南山經雨更蒼然長溪林一鶚秀才有落髮之願示及諸賢詩卷因題其後二首聞說當機百念休區區何更苦營求早知名教無窮樂陋巷簞瓢也自由貧里煩君特地過金幱誰與換魚簑它年雲水經行遍佛法元來本不多送徳和弟歸婺源二首十舎辛勤觸熱來琴書曽未拂塵埃秋風何事催歸興歩出閩山黄葉堆十年寂寞抱遺經聖路悠悠不計程悞子南來却空去但將迂闊話平生仲縝尊兄對䇿南宫相顧田舎輙賦小詩攀餞行李三徑荒凉獨掩門故人車馬過相存長安此去無千里濁酒何妨盡一尊共說淵源非曩日好披肝膽奉明恩不辭妄竊仁人號執手臨岐敢贈言分水舖壁間讀趙仲縝留題二十字戯續其後水流無彼此地勢有西東若識分時異方知合處同觀者請下一轉語次劉明逺宋子飛反招隱韻二首先生留落歲時多氣湧如山不易磨却學幽人陶靖節正縁三徑起絃歌榮醜窮通秪偶然未妨閑共聳吟肩君能觸處貞齊物我亦平生不怨天送謝周輔入廣夫君壯節與竒謀屈首微官世所羞攬轡未妨聊矍鑠賦詩直爲寫離憂蒼茫嶺海三年别珍重親朋幾日留滿意分携一盃酒登山臨水不能休和亦樂園韻莫笑君家五畆園要須胸次亦平寛坐間花柳隂𥘉合望外山河勢若蟠把酒儘誇雙鬢緑擊鮮争見兩輪丹鄰翁未到心先識更喜詩筒得細觀次韻謝劉仲行惠筍二首誰寄寒林新斸筍開奩喜見白差差知君調我酸寒甚不是封侯食肉姿君詩高處古無師島瘦郊寒詎足差縛得獰龍并寄我句中仍喜見雄姿次季通韻贈范康侯朝霜逼凋梅夕露忽團菊百年風雨過宜笑不宜哭口川失自防心兵幾回觸年來身老大丼此跨下辱永謝五鼎烹聊寄一瓢足雖慙龍蟠泥肯羡鶯出谷適意超混茫放情遺結束俯仰天壤間静勝惟我獨蒼蒼有心栢落落無瑕玉年紀尚無聞頭顱豈湏卜同張明府登凌風亭懐韓無咎日夕和風至西山淡無姿危亭極逺眺勝處良在兹憶昔韓令尹青雲乃心期鞿覊不得聘發此胸中竒前瞻千仭岡俯視萬頃陂神襟一以曠我志浩渺瀰飛車越滄浪天風振裳衣懐哉此焉薄問訊無邊辭今公豈不佳宫商似前徽相携岸晚幘共此長相思次王宰立春日大雪韻是身巳分老菟裘肯爲春回作許愁偶去尋芳朝信馬却來踏雪夜驅牛鋪筵不見小垂手聮句空慙髙結喉更約桃花紅浪暖却陪履舄上蘭舟再次王宰韻相隨到處一羊裘况有澄江散客愁且㸔跳魚并集鳥莫思去馬與來牛歡情往日空回首酒味今年不下喉只待兩公高宴罷却携茶鼎上漁舟送張彦輔赴闕執手何草草送君千里道君行入脩門披膽謁至尊問君此去談何事䄂有諌書三萬字明堂封禪不要論智名勇功非所敦願言中興聖天子脩政攘夷從此始深仁大義天與通農桑萬里長春風朝綱清夷軍律舉邊屯不驚卧哮虎一朝决䇿向中原著鞭寧許他人先天湖四乙丈坐間賞梅作送劉充甫平甫如豫章竹外横枝老屈盤冰壺遥夜玉窓寒兩公明日江南路雪後園林子細㸔哭羅宗約二首江閣論心地重來感慨多故人今巳矣此道竟如何但使窮新得終當訂舊訛話言雖永隔吾欲問滄波行義追前軰孤風凛一生子平婚嫁了元亮去留輕涪萬無歸棹嚴楊有舊盟空令同社客生死痛交情題米元暉畫楚山直叢叢木落秋雲起向暁一登臺滄江日千里觀劉氏山館壁間所畫四時景物各有深趣因爲六言一絶復以其句爲題作五言四詠絶壑雲浮冉冉層巖日隱重重釋子巖中宴坐行人雪裏迷蹤頭上山洩雲脚下雲迷樹不知春淺深但見雲來去夕陽在西峯晚谷背南嶺煩鬰未渠央佇兹清夜景清秋氣蕭瑟遥夜水崩奔自了巖中趣無人可共論悲風號萬竅宻雪變千林匹馬關山路誰知客子心觀祝孝友畫卷爲賦六言一絶復以其句爲題作五言四詠春暁雲山烟樹炎天雨壑風林江閣月臨静夜溪橋雪擁寒襟天邊雲繞山江上烟迷樹不向暁來㸔詎知重疊數炎蒸無處逃亭午轉歊赩萬壑一奔傾千林共蕭瑟草閣臨無地江空秋月寒亦知竒絶景未必要人㸔茆屋無烟火溪橋絶往還山翁獨乗興飄灑一襟寒祝孝友作枕屏小景以霜餘茂樹名之因題此詩山寒夕飈急木落洞庭波幾疊雲屏好一生秋夣多傳安道楊儀之二漕勸農有詩次韻二首並峙雙臺峻分馳四牡閑共欣膏脉潤未要粉況乾詩律何妨細歡情豈遂闌新畬行可問載酒想同㸔世味今如許吾生本自閑心期雖好在欲習未全乾錯莫塵編暗棲遲壯節闌不因勲業晚清鏡亦頻㸔感懷經濟夙所尚隠淪非素期㡬年霜露感白髮忽已垂鑿井北山阯耕田南澗湄乾坤極浩蕩歲晚將何之墨莊五詠墨莊詩書啓山林徳義乆儲積嗣世知有人新畬更開闢冽軒䆫開深井泉窈窕千丈碧何幸且淵澄無勞遽心惻静春堂幽人本何心偶此翳環堵隱几亦無言光風遍寰宇玩易齋竹几横陳處韋編半掩時寥寥三古意此地有深期君子亭倚杖臨寒水披衣立晚風相逢數君子爲我說濂翁齋居感興二十首余讀陳子昻感寓詩愛其詞㫖幽邃音節豪宕非當世詞人所及如丹砂空青金膏水碧雖近乏世用而實物外難得自然之竒寳欲效其體作十數篇顧以思致平凡筆力萎弱竟不能就然亦恨其不精於理而自託於僊佛之間以爲高也齋居無事偶書所見得二十篇雖不能探索微眇追迹前言然皆切於日用之實故言亦近而易知旣以自警且以貽諸同志云昆侖大無外旁薄下深廣隂陽無停機寒暑互來往皇犠古神聖妙契一俯仰不待窺馬圖人文巳宣朗渾然一理貫昭晣非象罔珎重無極翁爲我重指掌吾觀隂陽化升降八紘中前瞻旣無始後際那有終至理諒斯存萬世與今同誰言混沌死幻語驚盲聾人心妙不測出入乗氣機凝冰亦焦火淵淪復天飛至人秉元化動静體無違珠藏澤自媚玉韞山含暉神光燭九垓玄思徹萬微塵編今寥落歎息將安歸静觀靈臺妙萬化此從出云胡自蕪穢反受衆形役厚味紛朶頥妍姿坐傾國崩奔不自悟馳騖靡終畢君㸔穆天子萬里窮轍迹不有祈招詩徐方御宸極涇舟膠楚澤周綱巳陵夷况復王風降故宫黍離離玄聖作春秋哀傷實在兹祥麟一以踣反𬒮空漣洏漂淪又百年僭侯荷爵珪王章乆巳喪何復嗟歎爲馬公𫐠孔業託始有餘悲拳拳信忠厚無乃迷先幾東京失其御刑臣弄天綱西園植姦穢五族沉忠良青青千里草乗時起陸梁當塗轉凶悖炎精遂無光桓桓左將軍仗鉞西南疆伏龍一奮躍鳳雛亦飛翔祀漢配彼天出師驚四方天意竟莫回王圖不偏昌晉史自帝魏後賢盍更張世無魯連子千載徒悲傷晉陽啓唐祚王明紹巢封垂統巳如此繼體宜昏風塵聚瀆天倫牝晨司禍凶乾綱一以墜天樞遂崇崇淫毒穢宸極虐熖燔蒼穹向非狄張徒誰辦取日功云何歐陽子秉筆迷至公唐經亂周紀凢例孰此容侃侃范太史受說伊川翁春秋二三䇿萬古開羣䝉朱光徧炎宇微隂眇重淵寒威閉九野陽徳昭窮泉文明昧謹獨昏迷有開先幾微諒難忽善端本綿綿掩身事齋戒及此防未然閉關息商旅絶彼柔道牽微月墮西嶺爛然衆星光明河斜未落斗柄低復昻感此南北極樞軸遥相當太一有常居仰瞻獨煌煌中天照四國三辰環侍旁人心要如此寂感無邊方放勛始欽明南靣亦㳟巳大哉精一傳萬世立人紀猗歟歎日躋穆穆歌敬止戒􅋙光武烈待旦起周禮㳟惟千載心秋月照寒水魯叟何常師刪述存聖軌吾聞包犠氏爰𥘉闢乾坤乾行配天徳坤布恊地文仰觀玄渾周一息萬里奔俯察方儀静隤然千古存悟彼立象意契此入徳門勤行當不息敬守思彌敦大易圖象隱詩書簡編訛禮樂矧交喪春秋魚魯多瑶琴空寳匣絃絶將如何興言理餘韻龍門有遺歌程子晚居龍門之南顔生躬四勿曾子日三省中庸首謹獨衣錦思尚絅偉哉鄒孟氏雄辨極馳騁操存一言要爲爾挈裘領丹青著明法今古垂煥炳何事千載餘無人踐斯境元亨播羣品利貞固靈根非誠諒無有五性實斯存世人逞私見鑿智道彌昏豈若林居子幽探萬化原飄颻學仙侶遺世在雲山盗啓元命秘竊當生死關金鼎蟠龍虎三年養神丹刀圭一入口白日生羽翰我欲往從之脫屣諒非難但恐逆天道偷生詎能安西方論縁業卑卑喻羣愚流傳世代乆梯接凌空虚顧盻指心性名言超有無捷徑一以開靡然世爭趨號空不踐實躓彼榛棘途誰哉繼三聖爲我焚其書聖人司教化黌序育群材因心有明訓善端得深培天叙旣昭陳人文亦褰開云何百代下學絶教養乖羣居競葩藻争先冠倫魁淳風反淪喪擾擾胡爲哉童䝉貴養正孫弟乃其方雞鳴咸盥櫛問訊謹暄凉奉水勤播灑擁篲周室堂進趨極䖍㳟退息常端莊劬書劇嗜炙見惡逾探湯庸言戒麤誕時行必安詳聖途雖云逺發軔且勿忙十五志于學及時起高翔哀哉牛山木斤斧日相㝷豈無萌蘖在牛羊復來侵㳟惟皇上帝降此仁義心物欲互攻奪孤根孰能任反躬艮其背肅容正冠襟保養方自此何年秀穹林玄天幽且黙仲尼欲無言動植各生遂徳容自清温彼哉夸毗子呫囁徒啾喧但逞言辭好豈知神監昏曰余昧前訓坐此枝葉繁發憤永刋落竒功收一原卜居卜居屏山下俯仰三十秋終然村墟近未愜心期幽近聞西山西深谷開平疇茆茨十數家清川可行舟風俗頗淳朴曠土非難求誓捐三徑資往遂一壑謀伐木南山巔結廬北山頭耕田東溪岸濯足西溪流朋來即共懽客去成孤逰静有山水樂而無身世憂著書俟來哲𥙷過希前脩兹焉畢暮景何必營莬裘游武夷以相期拾瑶草分韻賦詩得瑶字秋聲入庭戸殘暑不敢驕起趂汗漫期兩𬒮天風飄眷焉此家山名號列九霄相與一來集曠然心朗寥棲息共雲屋追㝷喚漁舠一水屢縈回千峯鬰岧嶤蒼然大隱屏林端聳孤標下有雲一壑仙人乆相招授我黄素書贈我英瓊瑶茅茨幾時見自此遺紛囂石子重兄示詩留別次韻爲謝三首此道知君著意深不嫌枯淡苦難禁更湏涵養鑽研力彊矯無忘此日心克巳工夫日用間知君此意乆晞顔摛文妄意輸朋益何似書紳有訂頑喜見薫成百里春更慙謙誨極諄諄願言勉盡精微藴風俗期君使再醇鵝湖寺和陸子夀徳義風流夙所欽別離三載更關心偶扶藜杖出寒谷又枉藍輿度逺岑舊學商量加䆳宻新知培養轉深沉却愁說到無言處不信人間有古今奉陪機仲宗正景仁太史期㑹武夷而文叔茂實二友適自昭武來集相與泛舟九曲周覽巖壑之勝而還機仲景仁唱酬迭作謂僕亦不可以無言也衰病懶廢那復有此勉出數語以塞嘉貺不足爲外人道也此山名自西京傳丹臺紫府天中天似聞雲鶴時降集應笑磨螘空回旋我來適此秋景晏青楓葉赤揺寒烟九還七返不易得千巖萬壑渠能專同遊幸有二三子天卑此叚非徒然梁郎季子山澤臞傅伯爰盎瀛洲仙相逄相得要彊附却恨馬腹勞長鞭黃華未和白雪句畫舸且共清泠川回船罷酒三太息百歲誰復來通泉景仁數日屢誦此句盈虚有數豈終極爲君出此窮愁篇奉答景仁老兄贈别之句古人一去心不傳舉世誰復知其天奔趨嗜欲名利境浩蕩勢若飄風旋嗟予慨此其已乆矧復痼疾霾雲烟禪關夜扣手剥啄丹經晝誦心精專十年齊楚得失裏醉醒夣覺今超然迷心昧性哂笁學貪生惜死悲方仙如何懶惰行不力日月逝矣羲和鞭秪今已逺玄象羡子正似方來川何憂功名與事業但要漙博而淵泉不見君家鼻祖開聖學照耀今古書三篇六經說命篇始有學字復用前韻敬别機仲君家道素幾葉傳只今用舎懸諸天屹然砥柱戰河曲肯似落葉隨風旋奮髯怱作蝟毛磔浩氣勃若霄中烟隱憂尚喜遺直在壯烈未許前人專武夷連日聴竒語令我兩腋風泠然𥘉如茫茫出太極稍似冉冉隨群仙安能局促夜起舞下與祖逖争雄鞭終憐賢屈惜徃日亦念聖孔悲祖川願君盡此一杯酒預澆舌本如懸泉沃心澤物吾有望勒移忍繼鍾山篇讀機仲景仁别後詩語因及詩傳綱目復用前韻道有黙識無言傳向來誤矣空談天只今斷簡窺蠧蝕似向追蠡看蟲旋始知古人有妙處未遽秦谷隨飛煙終然世累苦妨奪下帷發憤那容專一心正爾思鵠至兩手欲救驚頭然書空且復罷咄咄屢舞豈暇陪仙仙兩年罷詩止酒故云功名況乃身外事我馬硉兀丼回鞭解頥果值得水井謂詩傳鍳古亦㑹朝宗川謂綱目兩公知我不罪我便可築室分林泉十年燈下一夜語閑日共賦舂容篇讀通鑑紀事本末用武夷唱和元韻寄機仲先生諌䟽莫與傳忠憤激烈號旻天却憐廣文官舎冷只與文字相周旋上書乞得聊自屏清坐日對銅爐烟功名馳騖往莫悔鉛槧職業今當專要將報答陛下聖矯首北闕還􅏰然屬詞比事有深意慿愚護短驚群仙言未秉太史筆自幸巳執留臺鞭温公以留臺領書局時韓魏公與書有執鞭之語果然敕遣六丁取香羅􅃮匣浮桐川隂凝有戒竦皇鑒恭聞上讀此書有履霜堅氷之語陽剥欲盡生玄泉明年定對白虎殿更誦大學中庸篇頃在武夷宫講正心誠意晦庵先生朱文公文集卷第四考異短句奉迎荆南幕府烽燧泠一本作歌舞盛次劉明逺反招隱韻榮醜窮通一作榮過或窮次韻贈范康侯尚無一作向無次王宰立春日大雪韻肯爲春回作許愁一作時去時來肯作愁去尋芳一作向花城來踏雪一作歸雲谷觀劉氏山舘畫脚下一作脚底觀祝孝友畫雪擁一作雪滿秋月一作耿月感懷一作題佛跡壁夙所一作本所霜露一作風露忽巳一作今巳山阯一作山下齋居感興亦焦一作更焦盍更一作合更淫毒一作如何一作奈何鵞湖寺更關一作轉関出寒谷一作寄寒谷一作過寒谷却愁一作抵愁陪機仲泛舟九曲似聞一作但聞讀機仲景仁别後詩燈下一作燈火福州府儒學訓導舒鏊校晦庵先生朱文公文别集卷第四書劉共甫以下胡德才家藏自領鄂渚所賜書後一向不聞問或云體候嘗小不快不知所苦何恙淺深如何逺方無由得的信徒有懸情耳比日秋凉伏惟忠勤有相鈞候萬福向来㣲恙失去乆矣宰路虚席國論一新幾㣲之間安危所係衆謂明公冝還鈞軸尚此遟遟不無觖望然上流之重當此之際寄任亦不爲輕更願進德愛身審於舉措毋使中外窺覘有所竊議此爲増崇望實填服夷夏之本甚恨相望之逺不獲以時宻罄所懐雖在荒迷不忘憂歎耳區區過計以爲萬一氣體小或未復故常則塞垣髙秋不冝乆處伏惟深以家國大慮爲心勿爲目前華靡細娯牽制回奪則於此不難處矣孔明擇婦正得醜女奉身調度人所不堪彼其正大之氣經綸之藴固巳得於天資然竊意其智慮之所以日益精明威望之所以日益隆重者則寡欲養心之助與爲多焉某自罹禍罰號慕之餘無復外事稍得温習舊學苦淡寂寥之中時有絲髪之見乃知前日所學問者極爲草草而欲以此仰希聖賢下脫塵俗亦巳難矣方作書爲欽夫言之想其未免於此也然此事自古聖賢近代先覺言之巳詳病在學者自立意見别作一般主張耳其詳非靣莫能究顧所謂寡欲養心者其大端也不識高明亦有意乎荆州聞極荒凉無賢士大夫可奉談燕人心至危恐乆流放難復收拾願日取古聖賢書熟讀深思以祛物欲之蔽幸甚欽夫造朝後至今未得書不知所論如何想彼却時得書也劉共甫歲前嘗以書附族叔司理除夕得書云開正方得行今不審巳逹未也此叔年巳礙選格今該慶恩恐可參部得少垂念幸甚渠亦非敢有過望也舊甌寧宰劉元升者不知曽識之否其人㓗㢘曉事再爲甌寧事辦而民安之前後莫能及近宰新喻無故爲程㤗之按罷客於臨江貧甚幾不能自食江西人士皆稱而憐之如此人者苟未有所歸亦可召而使也前書所禀孫教授者果何如近復細續其文必自重而不苟合者似此一等人恐又當降意求之若俟其僕僕以求巳則終不可以得之矣此有邵武守楊獬浦城宰呉燠政皆可觀近以事渉其境見其士民交口稱頌浦城之政細民尤安樂之兩人皆有文學非俗吏它時恐亦可備使令幸畧記之也安道此来未及相見浦城爲守侯所窘渠来始安跡建陽科歛煩獶首劾治之此兩事甚佳也欽夫歲前得書爲政之意甚羙但所請與諸司均節一路財賦者不知者必以爲侵官不知終能恊濟否所論鹽法利害頗與閩中相似渠但深排鈔法而以官般爲善不知官般果能無弊否其求訪人才之意孜孜不倦不自以其才爲可恃而留意於此此尤可敬者使當世王公大人一皆以此爲心不俟人之求巳而汲汲於求人則天下豈有遺才廢事乎甚可歎也劉共甫私門不幸老婦自去夏得疾荏苒踰年療治無瘳此至後一日遂至不起痛悼悽切不能自堪加以㓜累滿前將来百緒便有不能不關心者尤非衰懶所冝未知所以爲計也昨聞尊體微不安深以憂念及此奉告乃始釋然請祠未遂又聞繼有勞賜之寵此盖事功較著聖明深知雖有䜛邪無間可入或者不復乆勞于外矣然想亦未免再請也某祠敕已下適此衰麄尚未及拜受聞昨來諸公將上辭免文字上復有除職之命幸諸公白其不可遂止不爾則愈見顛沛然聖恩深厚何以論報唯有脩身守道以求無負寵嘉之意而巳欽夫得書云長沙傳聞某病消息殊惡此雖非實然亦竟遭凶禍可怪也又具道其經理財賦之詳此足以惠一方矣但趙漕去時意象甚不平不知今相見後復如何也昨蒙喻及徽絹文字不知曾爲剡奏否更得留念幸甚盖雖巳有爲之者更得一言之助則尤有力也近時鄭鑑對䇿事想悉聞之明主可爲忠言自是士大夫顧望蓄縮委曲避就養成今日之勢今又自彼七言之後寂然無復繼者消長之幾正在此毫釐頃刻之間益可寒心計高明雖在外服未忘根本之憂亦當拳拳於此况望實益隆眷禮益厚則圖所以收拾人才紀綱政體者其本末先後必有一定不易之論區區於此更望勉􅏧千萬幸甚祠祀責沈二刻拜賜甚􅌋但記中黙契於中者矣悞作也字不知尚可改否繆文本不足以發揮崇德尚賢之意讀之旣乆愈覺紕漏益增愧耳責沈之義昨巳報平父正爲子高沈姓耳承許續致只得未背者尤便也别𥿄垂喻永隆葬事具悉尊㫖但彦集於此正自憂勞唯恐不足以集事但素不更事凡百過於憂惴急迫而已不審高明所慮何自得之自此竊恐聽言之際更當每加審諦使忠實日親䜛慝日逺則乆大之業粹然無疵不獨施於州里親族之間者其愛憎賢否各得其當而巳僣易皇恐余隱之事前日巳嘗具禀二孫之禾恐止可撥四百秤盖宋家所收自不多若可少增恐亦不可過百秤也唯是隱之父子不解事來此干預宋家産業出言不遜其子尤甚恐將引惹方氏復來生事巳令陳呉二婦作狀經府告示之矣此非得巳不審尊意以爲如何劉共甫過崇安曰首詣三里視彦集所開地岡巒形勢目前無大虧缺而水泉湧溢殊不可曉問之邑人亦無一人能言其所以爲病者但謂間壙太深使然今若移穴近高而淺其壙則無患矣此語使人不敢信因語彦集莫若更呼術人别卜它處此數日亦未聞有定議政恐不易得耳然留彼三日三往諦觀亦覺形勢有可疑處所以致水盖非偶然顧髙明未必信故不復白直論日前所處曲折耳想聞此亦深軫念也劉共甫杜門如昨無足道者但傳聞淮北音問不一心竊憂之及問平父云屢得近書𥘉不及此則彼爲妄傳矣然事之可憂者正亦不在是也近一二士大夫斥言近習無所隱避上亦嘉納但崇信如𥘉畧無變改之効不知又是何人陳此秘計欲以柔道不戰而屈天下忠義之兵彼自爲謀則巧矣而爲國患日深柰何昨承委撰王公集序巳嘗具禀恐不能事以病高明前日偶與平父諸人小飲醉卧中夜少甦因不復能寐感慨俯仰之間若有開其意者忽得數十百言蹶然起坐取火書之竊意以是爲王公集序若可無愧但未知尊意如何耳聞莫子齊祈作行狀甚詳故序文中及之得求一本見寄爲幸今属平父附便拜呈恐不中用却乞示下當畧改入題處别作䟦語爲某之自言者授其子以見區區或粗可用而有當改處亦告垂喻曲折當如所戒也平父昨令與伯謨說招致之意近聞復當少緩亦巳報之矣渠旣未成詣門下欲邀來此相聚而郷人子弟不可率貧家又不能有以資之度其邵武亦未必有相聚處貧悴日侵殊可念耳元履之弟誠之者中間得所予賵金數年質易稍有資聚今秋困索債毆人邂逅致死遂盡索所賫又舉貸以繼之然後得脫今一房四五口立見狼狽殊可憐然無術以捄之往時元履病中亦以此弟見属今無如之何親舊向來干擾殆徧又不容復有請不審樞宻或有不費之惠得賜哀憐千萬之幸然渠𥘉不敢有此望更在裁處也何叔京鎬持敬之說甚善但如所喻則湏是天資儘高底人不甚假修爲之力方能如此若顔曾以下尤湏就視聽言動容貌辭氣上做工夫盖人心無形岀入不定湏就規矩繩墨上守定便自内外帖然豈曰放僻邪侈於内而姑正容謹節於外乎且放僻邪侈正與莊整齊肅相反誠能莊整齊肅則放僻邪侈决知其無所容矣旣無放僻邪侈然後到得自然莊整齊肅地位豈容易可及哉此日用工夫至要約處亦不能多談但請尊兄以一事驗之儼然端莊執事恭恪時此心如何怠惰頽靡渙然不收時此心如何試於此審之則知内外未始相離而所謂莊整齊肅者正所以存其心也廖子晦德明槎溪刻於韶州州學去冬嘗苦臂痛累月不能詘伸今幸少安又以武夷精舎𥘉成不免與諸友朋來集甚恨賢者之不在是其溪山之勝言有不能喻也祠記見属所不敢辭但此間擾擾俟還家草定尋便寄去只恐子晦官滿不及刻耳朱舎人進用正當秦范之時畫䇿事却未聞說者必有來歴可考也向見濂溪家本畫象服紫當是提憲所借明道廟象服緋但伊川不知所服向來南康只用野服盖伊川晚年巳休致可不用朝服也二先生朝服當時未有履只合用鞾了郷飲酒禮石刻本所未見也所寄文字碑刻留家間未見而來書不及其名件不知果何書也近思録字大甚便老眼有便幸寄一二本魏元履弟胡德方家藏病革時顧念君親處理家事無一語謬其母視之不巾不見也戒其子云云去命其學者云云以右有之一節所爲文章若論議訓說合數十卷卷數旣未定不若只以此句包之如何元履於學無不講而尤長於云云識其大者平居論說聽者悚然在學者止周遣之除此一條盖前巳有恤親舊字可包舉也泣拜奉嚴君士敦之状以銘文爲請志文所改大者如此其它悉如來喻填𥙷矣愛君憂國巳云有志於當世足以見之此等事太切切言之又似出位也奉親人之常行若一一紀載則日用百事皆當悉書矣興利除害賙人之急如所載請移粟恤親舊之事便是更不必重出矣隆興乾道時政議不知是何書頃所未見大抵此等皆非草茅所當言者表而出之恐益生病不如爲汎辭以包之也俚俗謂坂爲富如此間大富藉冨皆坂字也向見荆南田官說營田處地名長富即劉先主爲曹操追及處史所謂當陽長坂也然則以坂爲富南北通語要之見於文字當作坂字也汪時法大度婺州有刋帖别後不能一奉問但聞裂裳褁足逺送遷客爲數千里之行意氣偉然不勝歎服未及致書忽辱手示獲聞比日劇暑客裏殊勝尤以爲喜子約此行無愧臣人之義而學士大夫粗知㢘恥如僕等輩有愧於彼者多矣聞廬陵寓舎有園亭江山之勝又得賢者俱行相與講貫亦足以忘其遷謫之懐也向伯元浯以下伯元之孫公永家藏承乏半年了無善狀求去不獲又未敢遽復有請凛凛然日惟得罪於民是懼它無可言也至此刻得周子象圖書說賦凡五種并叙古千文重立直節堂記䟦尾等率易各納一本敬夫爲記濂溪祠堂子澄所書亦并納呈更立陶靖節劉凝之道原李公擇陳了翁堂方求記於尤延之尚未到也得子澄書云書府有康節先生墨蹟甚竒輙欲就請摹刻以垂學者去卒只一兩月可了即專人還納也向伯元春老夏𥘉伏想林居幽勝有足樂者承喻玩意論孟之書尤覺有味恨不得從容侍教於前也某不量踈拙輕出從事無以𥙷報縣官而乖忤貴臣幾蹈不測頼上聖明保全至此且幸未至㒹隮然殊未敢自保也去冬病臂近方小愈然猶未至脫體呻吟之暇繙閱舊書亦有一二學者相與討論足以自樂獨念逺去長者之側不得講去所疑消釋鄙吝爲恨耳向見子澄說書府有康節書陶公詩地逺不敢借觀但時時想象此題目巳覺清氣逼人也向伯元𥿄尾批誨飲食必祭之說㫖意深􅌋不勝歎服盖所開警爲巳多矣君祭先飯先儒舊說盖本如此近世乃有以爲君祭必先黍稷者若然則其音讀亦自不同盖如先儒之說則飯音上聲而爲食之之義如近世之說則飯爲去聲而指所食之物二說雖若皆通然細推之則恐先儒之說爲長盖爲賔主之禮則主人客祭然後客祭主人食而後客食今旣侍食於君則不敢當此禮而子之於父臣之於君飲食必先品嘗之而後敢進亦禮之所當然也故謂侍食者於君之祭也而已先食之其義各得若如近世之說則君祭之先後有非巳之所得與者且祭之先後自有常禮上下同之不必專言君祭乃先飯也鄙見如此不審尊意以爲如何昨承喻及嘗見大學鄙說近有修定本張君抄得幸試取觀有以見教千萬幸甚向伯元某頃叨除用出於意外懇辭幸免然猶復忝郡寄上恩厚矣但年來目疾殊甚恐不復堪吏責免章再上諒必得之也子澄去秋以書來告别方此憂念繼得公度書乃知遣書之後不六七日遂至大故發書一慟痛不可言然至今未能遣人奠之日以愧恨也交遊凋落如晨星矣復失此人吾道亦殊失助也向伯元三數年來無日不病而今年爲尤甚神思疲憊筋骸縱弛飲食不至大减而肌膚消削日就枯槁蒲栁之姿望秋先殞每聞老友聦明輕健過絶於人未嘗不歎衛生之有經而愧謹疾之無術也祠禄將滿未敢再請而朝廷記憶遂有鴻慶之命杜門竊食雖若可以終身然舊京原廟隔在異域每視新衘不勝悲憤之填膺也臨江張洽秀才迂道相訪後生有志甚不易得因其行附以此書并令請見幸予其進而教誨之向伯元蒙寄示先正遺文歛袵警誦不覺終篇竊惟忠義之操高尚之風生平之所想象郷往而不得見者今乃得窺其一二大者於翰墨文字之餘何其幸耶蒙需䟦語晚生豈敢僣越然不敢不有以見區區慕用之私也胡公汪公皆人物標凖名論一定誰得改評時事傳聞有足憂者每念扶持三綱之語益令人感慨也蒙誨諭格物之說不勝悚仄前輩立言豈敢輕議但以河南夫子所謂物我一理才明彼即曉此者觀之即宛轉歸巳者似稍費力耳兼窮理功夫亦是且要識得事物當然之理積乆貫通之後自然所行不疑而實理在我隱㣲之間亦無私念河南所論條目甚明恐亦不必事事比擬然後爲得也又反身而誠乃躬行之至無一理不實有於吾身非爲一時見處發也鄙見如此不審高明以爲如何無由靣請因風不吝垂教千萬之幸然張君所傳大學本子近日又多所更定稍覺平實恨未有人冩得拜呈也向伯元山間少得過從目昏不敢讀書舊學寖隳深以自歎然間静從容却覺意味亦深長也昨得子澄書具道昨寄武夷佳句深有教督之意再加紬繹乃悟㣲指不勝感佩之至近聞汀劒之境有嘯亂者官軍挫衂勢甚可憂貧病支離彷徨瞻頋未知稅駕之所柰何柰何御書古文孝經有墨本否欲求一通此書無善本欲得此讎正也向伯元某祠官秩滿比巳再請聞諸公巳相許旦夕必得之又且藏拙休息病軀何幸如之尚恨貧窶未能即挂衣冠景行高風耳昨蒙委撰先集後語不揆荒拙率爾草成今附便拜呈恐有未當幸却垂喻容改定也晚學不當僣易迫於嘉命不敢辭耳向伯元昨以所撰先公文集序藁本拜呈未蒙鐫改方此悚仄今奉教帖反得褒賞之詞此豈所望也子澄相愛又素多可其言恐亦未爲不易之論更望詳之有未安處却幸指示乃可傳逺耳子澄新除知識多以爲疑聞吾丈亦有着甚來由之語此至論也然尚幸闕期未到得且從容耳子卿官期必不逺未及爲書極懐想也景陽得時親几杖甚幸眞足以銷鄙吝之萌矣向伯元周公去相尚留義興豈過婦家少駐耶近方寄得一書問訊之勸其速歸不知今巳出江上未經由必相見當能道所以然者某不恨其不蚤去恨其不勇爲也天下豈有兼行正道邪術雜用君子小人而可以有爲者去歲入都時巳知其必有今日之禍無疑矣令子知丞歸來文字竟足未耶今時諸司文字多爲有力者所取至或同僚數人同署一帋而脅取之者此與法令所謂恐喝取財者何異火色如此平進者何自得之正當量分自安想賢郎熟聞㢘靖之教其必有以處此矣向伯元某向來妄意作一二小書𥘉不敢以示人近年自覺昏憒不復更有長進有欲傳者因以付之今納四書五冊仰塵燕几恐有悖理幸望指教尚及鐫改也向伯元子澄竟以薦賢遭論與某去冬波及之章正相先後但渠在郡與閑居不同昨聞俟罪丐祠未許此恐當力請而歸乃佳不審尊意以爲如何近得其書甚恨不能早追長者之後塵也景陽何故却歸廬陵乆不相見不知後來學業如何也向伯元某衰病之餘去秋復有哭女之悲支離凋耗益巳甚矣昨叨除命一辭不獲方欲春深闕近力申前請而代者忽以章罷便有奏事指揮聞命彷徨不知所以爲計巳專人致懇不過旬日當有决語萬一未遂即不免一行祈哀君父庻遂本懐耳江右之行勢必難勉強也子澄去替不逺醜正之人又以憂去意其可以善罷從容而歸今乃竟不得免又且便着道學兩字結正罪名世路如此豈復更容着脚不如且杜門讀書只作殘年飽飯之計庻無後悔耳所恨相去之逺不得時扣函丈日奉誨言以滌塵襟銷滯吝此爲恨恨耳黃婿已歸三山赴馬帥之招爲今秋漕試計也後生輩未忘進取爲此計較亦復可笑耳前所納諸書有不當理處切幸指教易數比之諸家巳極簡易要非侍坐從容不能究其說也寵惠銕鏡川墨拜領銕鏡謹置之對坐常以自照如長者儼然臨之不敢不起敬也林井伯成季以下井伯外孫方之㤗家藏某碌碌如昔近旬日來訟牒頓希可以藏拙但經界指揮未下不知竟如何昨夕地再震不知彼中如此否趙帥有來期未此但聞帥司巳發牌印去它則無所聞也經界若行欲挽退翁仲則一來但其地皆煙瘴之郷不知二君肯一來否煩爲㣲扣之别有有精神耐勞苦肯任事而能戢吏愛民者不妨更爲尋訪喻及此或亦專人去約誠之此不厭人多分頭勾當庻事易集也林井伯示喻福公令孫好學之意甚慰鄙懐昨擇之書來亦嘗及此書中間編得草本未曾冩净兼亦止是記得諸公行事大略若欲究其學問根源則不如讀其所著之書爲有益也伊川先生多令學者先看大學此誠學者入德門户某向有集解兩冊納呈福公其間多是集諸先生說不若且看此書其間亦有少未安處後來多改動旦夕别冩得當寄去換舊本也陳公令孫之字謂何幸批報近思録亦好㸔煩并爲說逹之也林井伯承喻諸賢肯來之意尤以愧荷但指揮至今未下聞有陽操兩可而隂實力沮之者此雖兩郡貧民之不幸然使區區之願不讎則亦拙者無窮之恨也蔡用諸君雖未識之然旣爲賢者所稱巳筆之於簡矣惠安文字此正以臬事之故不敢數與之通問無由可致力也某前月脚氣大作兩旬然後愈又苦臂痛中間小愈今復大作作字如此它况可知它不可意者甚多巳專人求去矣林井伯某衰病發歇不常醫者以爲風氣非脚氣似亦有理此數日來却幸小定然亦未敢自保也經界之命雖下然巳後時恐妨農功未敢下手又不免費分踈尚恐有避事飾詞之責然亦無可柰何也學古之薦昨得帥書嘗語及此公論所在人無異詞也簡卿文字極荷不外但某平生畏人來奪文字亦自守不敢求知之戒不敢以其所賤者施之於人故未嘗敢作此等書如學古亦只是自首薦之未嘗爲轉求也千萬見亮爲幸林井伯某去秋今春兩次大病今夏第三女子得疾療治驚憂凡百餘日竟不可救老懐傷痛不可堪忍病軀縁此愈見衰弱奄奄度日無復生意江西之除雖感聖恩然形神如此豈復更堪仕宦巳申省懇辭矣萬一未遂臨期湏力請以得爲期也通老所言極荷留念成都事巳報過未知果如何若真有此可謂踈脫幕府諸人亦不得爲無過矣擇之去住不知如何正恐子直亦不自安也林井伯録示氣訣極荷留念不知曾試如此行持否効驗果如其說否然尚有一二處未盡曉異時湏靣扣也福公書來亦說不成爲三山之行可見審重之意又蒙寄惠武夷長句平易宏深真有德者之言也欲作書和韻附此便致謝以雩字韻險揑合未成且俟後便恐因見次問及幸爲道此意也趙帥進職因任可喜但聞開湖事都下亦頗紛紛人之多言真可畏也林井伯某憂苦杜門卜葬未定忽叨收用之恩頋此私計實有未便巳力懇辭勢必得之此間築室之作未及一巳覺費支吾甚悔始謀之不審也臨漳紛紛後來又不止此薄德繆政累及僚友深以自愧師中必巳歸到前日便人尚未回也彼中諸朋友喜各安佳便遽事冗未及上狀各煩致意趙卿文字未得下筆前日𬒳潘恭叔來守乃翁志銘略爲草得一兩𥿄便覺便旋白濁夢寐不寧此豈治筆硯之時哉永嘉林復以墨來見觀其所製頗似可用求書南遊因附以此朋舊間恐有可爲可譽處幸畧道意巳深喻之不敢有望於賢者矣郡侯好事或使知之亦佳林井伯閑中何以閱日想不廢探討之功伏臘之計不至入思慮否來春當復爲一出計否風波渺然未知所止泊也某去年不甚病今春乃大作幾不能起廖子晦到此見之經由相見必當語及也今幸且能喫飯讀書然明年便七十矣來日能復幾何不知不覺輥到此窮極處亦可笑也餘干乆不得書今年爲黃子由徐子宜觸動機關又復飜騰一上未知何時得平静也仁里諸賢想各安佳草堂想論著不輟今年病中看性理文字不得僅繙得一二小小文書有未識來歴處欲質所疑而不可得殊郷往也師是兄弟爲况如何師中想非乆赴官矣履之亦相聚否别後所進何業也林井伯某今年頓覺衰憊異於常時百病交攻支吾不暇服藥更不見効只得一兩日静坐不讀書則便覺差勝但魔障未除不容如此兩日偶看長編至燕雲事便覺胷次擾擾如在當時廟堂邉境之人甚可笑也閩中一歲而䘮三雋皆未老而遽化近又聞子約之䘮貶死異郷尤足傷悼想聞之亦爲悵然也鄭公得請奉祠歸享甲第之勝想不復以當世爲念矣自其開府之𥘉得一通問後恐蹤跡累人不敢再遣今却不可不致書輙有一緘外題只納左右處幸携見靣納之免思憂慮渠向書來亦只封與詹元善盖恐人之知之也趙子欽彦肅友人林井伯文軒之從子也今往赴省因過餘干勞苦故人之在難者其義甚高到都下不欲參學以避時論欲得一僧舎安泊數月不審能與致力否渠知識自多但難於見人故欲且得僻處潜伏耳方若水壬承喻深悉賢者才業如此及此未爲世用之時加意講學勉力職事以脩其在我者至如士民薦舉之類亦當有以禁之勿令復出不知它人如何如某乆居閑處見此等無非迎合以是心常悪之當官處遇有此等或察其情有姦弊即繋治之不少貸也别帋所喻三先生祠記多事不暇作兼長㤗設此似亦無謂也縣學文字適此擾擾未暇詳閱要之此等粗合有司程度足矣學者湏令此外識得一用心處乃有益耳舊課新詩及啓皆善但四六湏更看前軰歐王曽蘇所爲乃佳然亦不足深晋意也大學近改两處及未印間改之爲善其它民間利害當就州府理㑹龍溪事亦不足深計渠固未嘗喻及也程帖巳領白杜本後䟦有記明道一二事并附入亦佳大率諸義皆傷殘短鋪陳略盡便無可說不見反復論辨節次發明工夫讀之未終巳無餘味矣此學不講之過也大率闘揍巳字太多反失正意据題意則治巳字輕以仲尼字重輕處只消拂掠說過不必如此裝得太重也晦庵先生朱文公文别集卷第四候官縣儒學訓導劉簮校晦庵先生朱文公續集卷第四上答劉晦伯示喻文字非有所愛顧恐晦伯方欲讀書則其序不應始於此耳如何如何韜仲向語及欲來春與居厚同爲此來不知果否更早得一報則兒軰不復别爲招客之計不爾却湏早有定論也到此半年百術俱試而不足以出餓殍於溝中不敢罪嵗徒自咎耳𧖟麥既收船米輻湊民食幸少寛而疫氣大作死者紛然見此醫救埋瘞又慮夏末尚湏闕米亦一靣措置若幸過此一厄則亦且告歸矣精力凋耗又非昔時之比兼離家日乆百事不便此間俯仰費人心力易得言語不容乆居也浙東學者脩潔可喜者多楊敬仲孫季和皆巳薦之諸葛誠之兄弟亦時來相處但心地不虚我見太重恐亦爲學道之障也彼中亦有朋友過從如此間否渠論度量權衡之制甚精若相見煩爲求其様製造古升古尺古秤各一枚便中示及爲幸仕宦遲速要有時命正唯盡心職業安以俟之庶幾不失所守張憲到未向在浙東同官甚好士某所薦楊敬仲孫季和項平公渠皆薦之公疑當作父度量素不曽講究今有書扣之然此是千古未結絶底公案恐終未易以一言定也書煩遣去并趙憲程正思曹挺之書爲一一致之爲幸程在沙隨寓居處不逺可并遣也知趙憲巳相薦甚善此等物合得終是得正不湏汲汲也某以按發贓吏之故諸公相害不遺餘力獨賴聖主保全未至斥逐耳其勢豈可復出到官之後或更有一唐仲友又作如何處置耶只得力辭得罪亦無如之何但兩脚不可過分水嶺一歩耳武夷精舍巳成近與諸生往留旬日甚適但屋宇未備耳立之墓文巳爲作矣而爲陸學者以爲病巳頗不能平鄙意則初無適莫但據實直書耳余君書來詞義甚可觀今有書報之可就取觀也經界事目荷留念打量法中間劉子禮寫來正如此以其無竒煩費而忽之近日較量此法雖拙而易曉亦一靣雕印下諸邑矣但今孟冬巳盡而指揮未下恐有隂沮之者某又見病旦夕不免上奏爲歸田計矣讀韜仲書爲之慨然此雖作郡反不若彼得行其志也此間因不經界失陷省計以大萬數故爲不法擾民之計以補之若不經界真無下手處也只漳浦一項官米錢貳萬二千餘緡今實催五千餘緡而巳凢事如此令人太息昨聞交代有日適詢劍浦人乃云來春方歸不知何故尚爾遲遲也韜仲書報經界復行不知却作如何措置第恐復爲諸司所敗耳鹽筴欲行於一州尚不能勝衆說之排沮况欲通行四郡其間豈無見行之法自不爲害之處而何必爲此紛紛乎若必爲此恐其說尤易沮而難行也應倉自江浙間乍來固不諳此利病然當時若一到汀州親訪民言更廣詢有識以審其是然後回奏亦未爲晚不知何故怱怱如此便欲入城見之以此行蓋難開口說話也來書所喻固皆一方永乆之至計然度今之君子决不能用徒自譊譊耳趙帥在此所爲不無未滿人意處然自今觀之又豈易得也學中教養人數頗多甚不易既難得人可招致只可撥忙自到彼中與之講說就他卑陋處錐劄喚省庶幾猶不爲無益也林帥政事近年巳甚艱得聞其雖嚴而簡此自爲得體如鄭溥之却似傷煩碎然亦不易得也某復得祠只用省劄令還舊任更不曽别出敕也此間竟未得雨田之有水者亦有螟􅭈之灾歲事甚可慮且是熱氣可畏日甚一日未知終如何也小兒極荷留念不知作文竟能入律否看得只合小做規模庶幾浄㓗緊巧易照管渠却汎濫胡說不勒字數令人看得心煩切望痛與鐫切塗抹令其自改立限再呈勿令懶惰推托放過乃幸耳謝公之去傳者不一昨日得元善書乃云以不言罪之此蓋只爲不恊力攻周揆耳誠甫之傳妄也輪對文字亦正當但不甚切然亦不問那下次第亦爲所疾蓋首論正心近似道學也自除一黄掄不知是何人也密訪往往有之然重華却照知諸姦朋結之狀時有聖語云周有甚黨却是王黨盛耳此語儘鎮壓了怪事也聞於中外且得如此亦是幸事尤丈本無向背似與婺尤厚今亦不免尚未見章䟽不知坐何事也某衰病之餘支吾郡事甚覺費力諸邑惟漳浦最狼狽諸事如鬻鹽子斗折豆皆非法子斗者廢寺之田租也坐視半年未有可下手處近方因有㫖條具輙以一二事爲請若䝉施行則科罰之類可以盡禁經界若行則子斗之弊亦可革去折豆見與同官商量雖或未能盡去亦可去其太甚但鬻鹽一事最爲非法而未敢遽議蓋郡計所行萬數不少一旦失之便恐狼狽也經界巳得㫖相度奏檢謾錄呈此亦巳一靣訪問區處以俟命下即便施行意欲及此農隙并力打量田産攅造文字夏料便行新稅未知力能辨否同官中亦有一二人可仗但四縣湏得六七人分頭勾當郡中湏得一兩人總綂大綱乃可集事意欲奉煩賢者一來只就郡中檢校或以時循行諸縣指教督趣元禮亦許來旦夕到矣不知能爲一來否可禀知判官丈如許相助此有數卒送劉壻歸得便就之以行爲幸更欲并邀季通伯崇一處可得六七人也韜仲近得書否養士訓兵想巳有條理此間兩事都做不得深以愧耳蓋作郡之勢不如作縣之親也經界之議此間同官商量正如來喻但漕司便欲施行其意甚羙故或𥘉欲先量城市及山坂無田去處又深計之亦有未便不免回申乞且先分保界立土封以俟秋成而後併手行之今鉏草子去一觀若得前期一到此間與一二同官預定䂓模尤幸不必俟臨時也漕使書又云開正即欲到此恐未有益不若賢者先來議定却請漕使親臨以察其當否之爲便也要是秋中乃來方有益耳經界爲鄰邦隂沮乆巳絶望今日忽得一信却恐且令此州先行此是何等處置廟堂無人乃使一綂之中國有異政甚可笑也然今巳向春田功方起如何更可下手萬一行下亦湏回申且俟農隙也復業之牓不妨早出但此間田荒巳是三十餘年目下却無逃移更俟詢訪也諸論皆切當𥿄札之費諸司或不肯認此亦可自備見有一項閑錢若不因此用却亦湏别作一有利益事不然徒爲後人妄費竊取之資也萬一求去未遂來年秋冬間當舉此役是時恐晦伯巳赴官不知更有何人相助幸爲籌之便中報及趙帥之來留意愈切但所下約束全無檢察姦欺督趣逋負之意因其來問巳力言之仍爲之言若更如此數年鄕官徒守空倉舉子之家無復得米之望矣不知渠能信否大率其政尚寛未免有要人道好之意此亦通人之一蔽也仲宣自連城遣盛僕來此云提宫丈俸錢尚未得巳爲作書懇趙守未知能應副否也季通欲來不知巳起離未恐其巳行更不作書或未行且煩致意也應城書信巳領手痛未及作答渠要學記堂額當俟後便也所論經界利害極爲明白向見何叔京每持此論趙若海陛辭日亦嘗以爲請但說者多以爲不可行私固疑之而揚子直近日過此亦以爲河州民力大困如人大病虚羸未堪汗下當且厚加調養然後可以節次調治其說亦似有理所與諸司劄子事理甚明但諸公何嘗以此等事經意想亦只是虚發耳未敢望其思量到子直所憂處也韜仲相度鈔鹽利害何如兩司之議不恊恐亦終無益也世間萬事類皆如此令人慨歎但吾力所可及者不可不勉庶幾隨事有補救得兩三分也向承寄及沙隨古鐵尺置之几上忽然失之不知彼中見有此様否如有之幸爲别造一枚較令精審勿令一頭長短乃佳仍不必鑿荀朂名字可惡只云温公周漢尺可也經界中間更有無限不好意思不得不力辭今决此計一以明田賦之不可不均一以使秉權者知士大夫之不可以羙官好語牢籠然此意難以語人以來喻者黙契故輙及之耳人來往者傳聞政聲甚羙足以慰所懐正惟不倦以終之耳林帥入境具知吏治羙惡嚴毅有體甚彊人意想必能相知也韜仲亦得書說彼中事甚有條理讀之快人也如來書簡約不惹閑事又自是一種好意思也饒廷老歸聞諸公相許巳有成說而辛卿適至以某嘗扣其廣右事冝疑其可以彊起乃復宿留然近又有書懇尤延之計必從初議矣萬一不允不敢憚逺畏瘴但恐伉拙無𥙷於事而徒失家居講學接引後來之益嵗月愈無多愈可惜耳薛漕之來方議所以寛民力者未得要領而遽有他除雖諸公意不苟然失之此爲可恨耳直卿罷舉不復可勸殊不可曉書信及諸處書悉煩逹之向令渠奉煩根究笛材乃欲以驗季通之律者不知曽根究得否幸更留念也林帥遽至此可駭可惜昨夕趙丞至方得其書人生浮脆如此而某又與之同庚得病尤覺可懼可懼章掾事巳爲言之但今年縁與憲車相𣢾大得罪於鄕人其實不曽開口說一字渠問亦不深應不謂乃得此謗今此事雖不同然此亦不可廣也林帥固賢然近聞其與憲司不恊亦大有行不得處豈其神明將去而不思至此耶抑爲州者固得以捍制使而使者果不可以察縣耶大抵范忠宣所謂恕巳則昏者甚不可不戒使渠自作監司能堪此耶長坂䑕軰之擾兩日未平縣中得黄德威申狀云巳過羅溪范坑屬吉陽界縣宰昨日親行募以重賞計必得之不爾亦不過深入山林四散奔逸或無所得食縊死而巳無能爲也但蔡一哥簡來乃云後山傳聞賊入石溪市中驚疑此决是虚傳此間亦虚傳賊到大田即是此一路也但市中群小却不可不防鎮官無權不足恃此是晦伯當爲鄕里任責且靜以撫之爲一往使别無變動爲佳若論長坂之賊只有七人尉司申來巳獲兩人矣决不能來不湏爲備也昨日得報君舉以謝章奉祠而去未見文字不暁其由亦可駭也少意欲招一同人教諸孫而未有便近可招者不知知識間有此人否湏得兼通經義聲律嚴毅通曉柰煩善誨諭人者乃佳必不得巳只能作義亦得其餘則不可闕也所喻南安韓文乆巳得之舛訛殊甚蓋方李申尊信閣本及舊本反將後來諸家所校定者妄行改易世俗傳訛競稱善本誤人多矣昨爲考異一書專爲此本發也近日潮州取去隱其名以鏤板異時自當見之仐不必寄來但細讀數篇便見紕繆矣少意之少字疑年及告老乃禮之常而異議鄕評横爲沮抑若非臺章催促幾不得遂今幸得之而一二要津亦肯放過亦是一事結抺如來喻所謂結五十年之公案者然閱邸報猶未免有旁及之詞只恐諸賢更欲子細看詳未肯放過來哲手中也所喻泉司事體乃爾亦是地理太逺事權太輕其勢不得不然比見王南卿在番易本司時以涔水不辦親自到彼料理數月其課遂登渠精敏過人其事距今未逺想尚可訪問稽考也孫薛二守一章繳罷孫又長往尤可傷惜大抵時論洶洶殊未定也晦庵先生朱文公續集卷第四上福州府儒學訓導舒鏊校晦庵先生朱文公續集卷第四下答劉韜仲某還家粗遣但心耗目昏老相頓見雖看書亦不能復如舊日矣得子澄書盛稱韜仲居官不苟前日晦伯一再相聚亦甚進益得後來朋友向前如此老朽無復恨矣子澄樂於訓誘知數相見甚善甚善伯㳟竟不起疾令人痛恨非但朋舊之私情而巳示喻數條皆切中其病然迫當去恐不及改耳拂衣之舉尤所未能比遣人持書入都兩月未還計此遲緩是必將從其請矣若得脫此且當恣意遊山不能聴得世間許多是非毁譽也尤川之行初甚駭聴亟以書報趙帥趙帥報書云巳奏俟鈔法定行差韜仲添充漕司屬官專一奉行諸人必未敢動當巳聞之矣尤川今竟差何人只此一事巳足見鹽法之弊漕司何乃全不覺悟耶所論鹽法皆善曽與應倉說否若未即及早詳告之恐其爲漕司所惑悞申却文字也上四州誠不必盡改但建寜以東兩邑利害亦與尤劍無異此等縣道湏别立一法乃佳若其他有利無害處一例改却又却害事反爲汀州及諸邑之累耳如何如何山記乃煩重刻愧甚不知所費幾何今却勝前本矣龜山别録刋行甚善跋語今往幸附之又得尊丈書知莆田未行巳𬒳尤川之檄朋友深以爲慮昨日得居晦書云沙隨巳爲宛轉想必無他不知竟如何但鄙意終是不能無疑耳今雖不攝邑事而往督賦正是索千金於乞丐之夫亦自無下脚手處若椎𫾣不恤則得罪於民若事不辦則又得罪於上官兩者之間亦湏勇决斷置此恐無好出場也鹽筴巳悉聞之帥說王漕亦頗有意相招奉扣不知定如何此君累歷州縣理事亦甚詳細向來正縁兩下情意不通所以擔閣至今若果相問詳爲言之得其幡然一方之幸也鹽法利害曉然無可疑者王漕不知曽去相招否此是趙帥從𥘉不與漕司通情之患若早以䂓模大槩語之當不至此齟齬也林守事某旣不成入府閑人又不欲以書懇之但見趙帥說嘗爲言之彼雖領略然未知其果誠實否與其坐待汰斥不若先事請祠且以此意懇二漕少緩其事渠亦嘗相聴也某答林守書不欲盡言因見煩爲宛轉亦所以答其不見鄙外之惓惓也讀書旣有程課想日有趣季通思索甚精但恐有太過處耳諸書恐有所疑䟽示一二大者爲幸社倉條目適平父携以見過巳商量一一奉報矣太體最是關防隨行人减尅乞覔之弊此爲最急向來某在倉中專治此一事其他亦無甚事也社倉交足甚善此足以破浮說之紛紛矣建陽措置官居晦無以易收支官恐不免煩居厚不知渠屑就否兩倉闕米只得且那融然亦湏申請使知支遣不足之故蓋此消息不可斷絶也示喻社倉巳畢甚善所差官吏事且循春間例可也五六月附籍牓不知平父如何處置恐可會崇安巳如何施行若未行即且俟帥司報應亦未晚也闕支一節却湏早申免至臨時費力建陽火灾異常今時官吏例是如此不容深責但可歎喟而巳道之屈伸自關時運區區人謀豈能爲力但其所論紹聖之事却錯認了對頭甚可笑耳右揆求去復留殊未知所以或云只縁何䟽有及赦文差互處係同擬定或云何别有䟽攻之或云何巳𥙷外皆未審也葛顔之報亦未聞元善求滁巳諾縁范有䟽禁朝士之求去者乃且宿留廟堂亦留此闕俟之月初輪對或云巳除檢詳恐未應如此之峻皆不得端的也二記當作但時論正如此豈是作文字刻金石之時近王子合陳膚仲來求記皆郤之矣不復得偏爲韜仲作也千萬諒之李簿所說甚善但此事近亦多弊今建議者意亦䦨珊未知將作如何收殺也晦庵先生朱文公續集卷之四下福州府儒學訓導舒鏊校
